                flow:
                  - text: CommV24
                    attr: 0
                  - text: "\r\rMODULE CommV24;\r\r\tCONST\r\t\tbits4 = 0; bits5 = 1; bits6 = 2; bits7 = 3; stop15 = 4; stop2 = 5; even = 6; odd = 7;\r\t\tinXonXoff = 8; outXonXoff = 9; inRTS = 10; inDTR = 11; outCTS = 12; outDSR = 13;\r\r\tTYPE Connection = POINTER TO LIMITED RECORD END;\r\r\tPROCEDURE Open (device: ARRAY OF CHAR; baud: INTEGER; opts: SET; OUT conn: Connection);\r\tPROCEDURE Close (c: Connection);\r\tPROCEDURE SendByte (c: Connection; x: BYTE);\r\tPROCEDURE SendBytes (c: Connection; IN x: ARRAY OF BYTE; beg, len: INTEGER);\r\tPROCEDURE Available (c: Connection): INTEGER;\r\tPROCEDURE ReceiveByte (c: Connection; OUT x: BYTE);\r\tPROCEDURE ReceiveBytes (c: Connection; OUT x: ARRAY OF BYTE; beg, len: INTEGER);\r\tPROCEDURE SetBuffers (c: Connection; inpBufSize, outBufSize: INTEGER);\r\tPROCEDURE SetDTR (c: Connection; on: BOOLEAN);\r\tPROCEDURE SetRTS (c: Connection; on: BOOLEAN);\r\tPROCEDURE SetBreak (c: Connection; on: BOOLEAN);\r\tPROCEDURE CTSState (c: Connection): BOOLEAN;\r\tPROCEDURE DSRState (c: Connection): BOOLEAN;\r\tPROCEDURE CDState (c: Connection): BOOLEAN;\r\rEND CommV24.\r\r\rSimple procedural interface to V24 and similar serial devices.\r\r\rCONST "
                    attr: 1
                  - text: "bits4, bits5, bits6, bits7"
                    attr: 2
                  - text: "\rNumber of data bits. These flags may be included in the "
                    attr: 1
                  - text: opts
                    attr: 3
                  - text: " set of procedure "
                    attr: 1
                  - text: Open
                    attr: 3
                  - text: ". At most one of them may be included. If none is included, 8 bits are chosen.\r\rCONST "
                    attr: 1
                  - text: "stop15, stop2"
                    attr: 2
                  - text: "\rNumber of stop bits (1.5 or 2). These flags may be included in the "
                    attr: 1
                  - text: opts
                    attr: 3
                  - text: " set of procedure "
                    attr: 1
                  - text: Open
                    attr: 3
                  - text: ". At most one of them may be included. If none is included, one stop bit is chosen.\r\rCONST "
                    attr: 1
                  - text: "even, odd"
                    attr: 2
                  - text: "\rParity checking. These flags may be included in the "
                    attr: 1
                  - text: opts
                    attr: 3
                  - text: " set of procedure "
                    attr: 1
                  - text: Open
                    attr: 3
                  - text: ". At most one of them may be included. If none is included, no parity checking is chosen.\r\rCONST "
                    attr: 1
                  - text: "inXonXoff, outXonXoff"
                    attr: 2
                  - text: "\rXOn/XOff flow control for input and for output direction. These flags may be included in the "
                    attr: 1
                  - text: opts
                    attr: 3
                  - text: " set of procedure "
                    attr: 1
                  - text: Open
                    attr: 3
                  - text: ".\r\rCONST "
                    attr: 1
                  - text: "inRTS, inDTR, outCTS, outDSR"
                    attr: 2
                  - text: "\rThese flags may be included in the "
                    attr: 1
                  - text: opts
                    attr: 3
                  - text: " set of procedure "
                    attr: 1
                  - text: Open
                    attr: 3
                  - text: ".\r\rTYPE "
                    attr: 1
                  - text: Connection
                    attr: 2
                  - text: "\rLIMITED\rConnection handle. It represents a V24 connection through a particular device.\r\r\rPROCEDURE "
                    attr: 1
                  - text: Open
                    attr: 2
                  - text: " (device: ARRAY OF CHAR; baud: INTEGER; opts: SET; OUT conn: Connection)\rOpens a given device (e.g., \"COM3:\") with the given baudrate and options. Note that a device to which a connection is already open cannot be open a second time before it is closed explicitly.\r\rPost\ropening succeeded\r\tconn # NIL\ropening failed\r\tconn = NIL\r\rPROCEDURE "
                    attr: 1
                  - text: Close
                    attr: 2
                  - text: " (c: Connection)\rCloses an open connection.\r\rPre\rc # NIL\t20\rc is open\t21\r\rPROCEDURE "
                    attr: 1
                  - text: SendByte
