                  - text: " (c: Connection; IN x: ARRAY OF BYTE; beg, len: INTEGER)\r\rPre\rc # NIL\t20\rc is open\t21\rLEN(x) >= beg + len\t22\rlen > 0\t23\r\rPROCEDURE "
                    attr: 1
                  - text: Available
