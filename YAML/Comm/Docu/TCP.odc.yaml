                flow:
                  - text: CommTCP
                    attr: 0
                  - text: "\r\rDriver for "
                    attr: 1
                  - text: CommStreams
                    attr: 2
                  - text: ".\rIt implements TCP/IP streams, using the operating system's sockets interface. It provides the "
                    attr: 1
                  - text: NewListener
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: NewStream
                    attr: 2
                  - text: " factory functions as needed for "
                    attr: 1
                  - text: CommStreams
                    attr: 2
                  - text: ". Do not import "
                    attr: 1
                  - text: CommTCP
                    attr: 2
                  - text: " directly; instead, use "
                    attr: 1
                  - text: CommStreams
                    attr: 2
                  - text: " and specify \"CommTCP\" as the "
                    attr: 1
                  - text: protocol
                    attr: 2
                  - text: " name.\r\r"
                    attr: 1
                  - text: "Parameters "
                    attr: 3
                  - text: localAdr
                    attr: 4
                  - text: " and "
                    attr: 3
                  - text: remoteAdr
                    attr: 4
                  - text: ":"
                    attr: 3
                  - text: "\rThe "
                    attr: 1
                  - text: CommStreams
                    attr: 2
                  - text: " procedures "
                    attr: 1
                  - text: NewStream
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: NewListener
                    attr: 2
                  - text: " feature string parameters "
                    attr: 1
                  - text: remoteAdr
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: localAdr
                    attr: 2
                  - text: ". The interpretation of the strings passed depends on the implementation of the actual driver module. For "
                    attr: 1
                  - text: CommTCP
                    attr: 2
                  - text: " the following holds.\r\rThe "
                    attr: 1
                  - text: remoteAdr
                    attr: 2
                  - text: " (only used with "
                    attr: 1
                  - text: NewStream
                    attr: 2
                  - text: ") must be either an IP address or a host's name, followed by a colon (\":\") and a port number. (Examples: \"127.0.0.1:2\", \"loopback:2\".)\r"
                    attr: 1
                  - text: "\r"
                    attr: 2
                  - text: "The parameter "
                    attr: 1
                  - text: localAdr
                    attr: 2
                  - text: " identifies the port on which a listener is established ("
                    attr: 1
                  - text: NewListener
                    attr: 2
                  - text: ) or from which a remote connection is attempted (
                    attr: 1
                  - text: NewStream
                    attr: 2
                  - text: "). Valid values are\r"
                    attr: 1
