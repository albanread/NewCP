                    attr: 3
                  - text: "* (device: ARRAY OF CHAR; baud: INTEGER; opts: SET; OUT conn: Connection);\r\t\tVAR c: Connection; h: WinApi.HANDLE; res: INTEGER; dcb: WinApi.DCB; to: WinApi.COMMTIMEOUTS;\r\tBEGIN\r\t\th := WinApi.CreateFileW(\r\t\t\tdevice,  WinApi.GENERIC_READ +  WinApi.GENERIC_WRITE, {}, NIL,  WinApi.OPEN_EXISTING, {}, 0);\r\t\tIF h # -1 THEN\r\t\t\tdcb.DCBlength := SIZE(WinApi.DCB);\r\t\t\tres := WinApi.GetCommState(h, dcb);\r\t\t\tIF res # 0 THEN\r\t\t\t\tdcb.BaudRate := baud;\r\t\t\t\tdcb.fBits0 := {0};\t"
                    attr: 0
                  - text: "(* binary *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF opts * {even, odd} # {} THEN INCL(dcb.fBits0, 1) END;\t"
                    attr: 0
                  - text: "(* check parity *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF outCTS IN opts THEN INCL(dcb.fBits0, 2) END;\t"
                    attr: 0
                  - text: "(* CTS out flow control *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF outDSR IN opts THEN INCL(dcb.fBits0, 3) END;\t"
                    attr: 0
                  - text: "(* DSR out flow control *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF inDTR IN opts THEN INCL(dcb.fBits0, 5) END;\t"
                    attr: 0
                  - text: "(* DTR flow control handshake *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF outXonXoff IN opts THEN INCL(dcb.fBits0, 8) END;\t"
                    attr: 0
                  - text: "(* Xon/Xoff out flow control *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF inXonXoff IN opts THEN INCL(dcb.fBits0, 9) END;\t"
                    attr: 0
                  - text: "(* Xob/Xoff in flow control *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF inRTS IN opts THEN INCL(dcb.fBits0, 13) END;\t"
                    attr: 0
                  - text: "(* RTS flow control handshake *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF bits4 IN opts THEN dcb.ByteSize := 4X\r\t\t\t\tELSIF bits5 IN opts THEN dcb.ByteSize := 5X\r\t\t\t\tELSIF bits6 IN opts THEN dcb.ByteSize := 6X\r\t\t\t\tELSIF bits7 IN opts THEN dcb.ByteSize := 7X\r\t\t\t\tELSE dcb.ByteSize := 8X\r\t\t\t\tEND;\r\t\t\t\tIF stop15 IN opts THEN dcb.StopBits := 1X\r\t\t\t\tELSIF stop2 IN opts THEN dcb.StopBits := 2X\r\t\t\t\tELSE dcb.StopBits := 0X\r\t\t\t\tEND;\r\t\t\t\tIF even IN opts THEN dcb.Parity := 2X\r\t\t\t\tELSIF odd IN opts THEN dcb.Parity := 1X\r\t\t\t\tELSE dcb.Parity := 0X\r\t\t\t\tEND;\r\t\t\t\tres := WinApi.SetCommState(h, dcb);\r\t\t\t\tIF res # 0 THEN\r\t\t\t\t\tto.ReadIntervalTimeout := 0;\r\t\t\t\t\tto.ReadTotalTimeoutMultiplier := 0;\r\t\t\t\t\tto.ReadTotalTimeoutConstant := 0;\r\t\t\t\t\tto.WriteTotalTimeoutMultiplier := 0;\r\t\t\t\t\tto.WriteTotalTimeoutConstant := 0;\r\t\t\t\t\tres := WinApi.SetCommTimeouts(h, to);\r\t\t\t\t\tIF res # 0 THEN\r\t\t\t\t\t\tNEW(c); c.hnd := h; c.opts := opts; conn := c\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND Open;\r\r\tPROCEDURE "
