                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Services, CommStreams, Views, TextModels, TextViews, StdLog;\r\r\tCONST\r\t\tprotocol = \"CommTCP\";\t\t\t"
                    attr: 0
                  - text: "(* driver for TCP/IP communication, over Winsock *)"
                    attr: 1
                  - text: "\r\t\tlocalAdr = \"900\";\t\t\t\t\t"
                    attr: 0
                  - text: "(* this is the port on which the server listens *)"
                    attr: 1
                  - text: "\r\r\tTYPE\r\t\tServer = POINTER TO RECORD (Services.Action)\r\t\t\tlistener: CommStreams.Listener\t"
                    attr: 0
                  - text: "(* the server listens using this object and accepts incoming connections*)"
                    attr: 1
                  - text: "\r\t\tEND;\r\r\t\tProcessor = POINTER TO RECORD (Services.Action)\r\t\t\tprev, succ: Processor;\t"
                    attr: 0
                  - text: "(* linked to allow stopping of all active processors with Stop command *)"
                    attr: 1
                  - text: "\r\t\t\tstream: CommStreams.Stream;\t"
                    attr: 0
                  - text: "(* for each connection, a receiver communicates through this object *)"
                    attr: 1
                  - text: "\r\t\t\twriter: TextModels.Writer\r\t\tEND;\r\r\tVAR\r\t\tserver: Server;\r\t\tprocessors: Processor;\r\r\tPROCEDURE (server: Server) Do;\r\t\tVAR s: CommStreams.Stream; p: Processor; t: TextModels.Model;\r\tBEGIN\r\t\tserver.listener.Accept(s);\t"
                    attr: 0
                  - text: "(* poll for a connection *)"
                    attr: 1
                  - text: "\r\t\tIF s # NIL THEN\t"
                    attr: 0
                  - text: "(* upon accept create and start processor for new connection *)"
                    attr: 1
                  - text: "\r\t\t\tNEW(p); p.prev := NIL; p.succ := processors; processors := p;\r\t\t\tIF p.succ # NIL THEN p.succ.prev := p END;\r\t\t\tp.stream := s;\r\t\t\tt := TextModels.dir.New(); p.writer := t.NewWriter(NIL);\r\t\t\tViews.OpenAux(TextViews.dir.New(t), \"Message\");\r\t\t\tServices.DoLater(p, Services.now)\r\t\tEND;\r\t\tServices.DoLater(server, Services.now)\r\tEND Do;\r\r\tPROCEDURE (p: Processor) Do;\r\t\tVAR buf: ARRAY 256 OF BYTE; read, i: INTEGER;\r\tBEGIN\r\t\tp.stream.ReadBytes(buf, 0, LEN(buf), read);\t"
                    attr: 0
                  - text: "(* poll for incoming data *)"
                    attr: 1
                  - text: "\r\t\tIF read > 0 THEN\t"
                    attr: 0
                  - text: "(* write received data into log *)\r"
                    attr: 1
                  - text: "\t\t\ti := 0; WHILE i # read DO p.writer.WriteChar(CHR(buf[i])); INC(i) END;\r\t\t\tServices.DoLater(p, Services.now)\r\t\tELSIF p.stream.IsConnected() THEN\r\t\t\tServices.DoLater(p, Services.now)\r\t\tELSE\r\t\t\tIF p.prev # NIL THEN p.prev.succ := p.succ ELSE processors := p.succ END;\r\t\t\tIF p.succ # NIL THEN p.succ.prev := p.prev END\r\t\tEND\r\tEND Do;\r\r\r\tPROCEDURE "
                    attr: 0
                  - text: Start
                    attr: 3
                  - text: "*;\r\t\tVAR l: CommStreams.Listener; res: INTEGER;\r\tBEGIN\r\t\tIF server = NIL THEN\r\t\t\tCommStreams.NewListener(protocol, localAdr, l, res);\r\t\t\tIF l # NIL THEN\r\t\t\t\tNEW(server); server.listener := l; Services.DoLater(server, Services.now);\r\t\t\t\tStdLog.String(\"server: server started\"); StdLog.Ln\r\t\t\tELSE\r\t\t\t\tStdLog.String(\"server: error starting the server (\"); StdLog.Int(res); StdLog.Char(\")\"); StdLog.Ln\r\t\t\tEND\r\t\tEND\r\tEND Start;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Stop
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\tWHILE processors # NIL DO\r\t\t\tprocessors.stream.Close; Services.RemoveAction(processors);\r\t\t\tprocessors := processors.succ\r\t\tEND;\r\t\tIF server # NIL THEN\r\t\t\tServices.RemoveAction(server);\r\t\t\tserver.listener.Close;\r\t\t\tserver := NIL;\r\t\t\tStdLog.String(\"server: server stopped\"); StdLog.Ln\r\t\tEND\r\tEND Stop;\r\rCLOSE\r\tStop\t"
                    attr: 0
                  - text: "(* prevent the server from trapping after module unloading *)"
                    attr: 1
                  - text: "\rEND CommObxStreamsServer.\r\r"
                    attr: 0
