                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Services, CommStreams, TextModels, TextControllers, StdLog;\r\r\tCONST\r\t\tprotocol = \"CommTCP\";\t\t\t"
                    attr: 0
                  - text: "(* driver for TCP/IP communication, over Winsock *)"
                    attr: 1
                  - text: "\r\t\tremoteAdr = \"127.0.0.1:900\";\t"
                    attr: 0
                  - text: "(* loopback address, so you can test on your local machine;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\tchoose a port number that is not used yet (here: 900).\r\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou could also specify an IP address in the form\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"mymachine.mydomain.com:900\" *)"
                    attr: 1
                  - text: "\r\t\tlocalAdr = \"\";\t\t\t\t\t\t\t"
                    attr: 0
                  - text: "(* don't specify an address or port on the client side *)"
                    attr: 1
                  - text: "\r\r\tTYPE\r\t\tSender = POINTER TO RECORD (Services.Action)\r\t\t\tprev, succ: Sender;\t"
                    attr: 0
                  - text: "(* linked to allow stopping upon module unloading *)"
                    attr: 1
                  - text: "\r\t\t\tstream: CommStreams.Stream;\t"
                    attr: 0
                  - text: "(* during sending, the communicates through this object *)"
                    attr: 1
                  - text: "\r\t\t\tidx, len: INTEGER;\t\t\t\t\t"
                    attr: 0
                  - text: "(* index for start of data into the "
                    attr: 1
                  - text: buf
                    attr: 0
                  - text: " array, and length remaining to be sent *)"
                    attr: 1
                  - text: "\r\t\t\tbuf: ARRAY 256 OF BYTE\t\t"
                    attr: 0
                  - text: "(* data to be sent *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\r\tVAR\r\t\tsenders: Sender;\r\r\tPROCEDURE (s: Sender) Do;\r\t\tVAR written: INTEGER;\r\tBEGIN\r\t\tIF s.stream.IsConnected() THEN\r\t\t\ts.stream.WriteBytes(s.buf, s.idx, s.len, written);\t"
                    attr: 0
                  - text: "(* poll for outgoing data *)"
                    attr: 1
                  - text: "\r\t\t\tINC(s.idx, written); DEC(s.len, written);\r\t\t\tIF s.len > 0 THEN\t"
                    attr: 0
                  - text: "(* keep action alive if there remains further data to send *)"
                    attr: 1
                  - text: "\r\t\t\t\tServices.DoLater(s, Services.now)\r\t\t\tELSE\r\t\t\t\ts.stream.Close;\r\t\t\t\tIF s.prev # NIL THEN s.prev.succ := s.succ ELSE senders := s.succ END;\r\t\t\t\tIF s.succ # NIL THEN s.succ.prev := s.prev END\r\t\t\tEND\r\t\tELSE\t"
                    attr: 0
                  - text: "(* connection was closed by server *)"
                    attr: 1
                  - text: "\r\t\t\tIF s.prev # NIL THEN s.prev.succ := s.succ ELSE senders := s.succ END;\r\t\t\tIF s.succ # NIL THEN s.succ.prev := s.prev END;\r\t\t\tIF s.idx = 0 THEN StdLog.String(\"client: connection was not accepted by server\")\r\t\t\tELSE StdLog.String(\"client: connection was closed by server\")\r\t\t\tEND;\r\t\t\tStdLog.Ln\r\t\tEND\r\tEND Do;\r\r\r\tPROCEDURE Start (s: Sender);\r\t\tVAR stream: CommStreams.Stream; res: INTEGER;\r\tBEGIN\r\t\tCommStreams.NewStream(protocol, localAdr, remoteAdr, stream, res);\r\t\tIF stream # NIL THEN\r\t\t\ts.prev := NIL; s.succ := senders; senders := s;\r\t\t\tIF s.succ # NIL THEN s.succ.prev := s END;\r\t\t\ts.stream := stream;\r\t\t\tServices.DoLater(s, Services.now);\r\t\t\tStdLog.String(\"client: connection opened\"); StdLog.Ln\r\t\tELSE\r\t\t\tStdLog.String(\"client: error opening the connection (\"); StdLog.Int(res); StdLog.Char(\")\"); StdLog.Ln\r\t\tEND\r\tEND Start;\r\r\tPROCEDURE Stop;\r\tBEGIN\r\t\tWHILE senders # NIL DO\r\t\t\tsenders.stream.Close; Services.RemoveAction(senders);\r\t\t\tsenders := senders.succ\r\t\tEND\r\tEND Stop;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SendTextSelection
                    attr: 3
                  - text: "*;\r\t\tVAR c: TextControllers.Controller; beg, end, i, len: INTEGER; rd: TextModels.Reader; ch: CHAR; s: Sender;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tNEW(s);\r\t\t\tc.GetSelection(beg, end);\r\t\t\trd := c.text.NewReader(NIL); rd.SetPos(beg);\r\t\t\ti := 0; len := end - beg;\r\t\t\tIF len >= LEN(s.buf) - 1 THEN len := LEN(s.buf) - 1 END;\t"
                    attr: 0
                  - text: "(* clip string if necessary *)"
                    attr: 1
                  - text: "\r\t\t\tWHILE len # 0 DO\r\t\t\t\trd.ReadChar(ch);\r\t\t\t\tIF ch < 100X THEN\t"
                    attr: 0
                  - text: "(* skip Unicode characters *)"
                    attr: 1
                  - text: "\r\t\t\t\t\ts.buf[i] := SHORT(SHORT(ORD(ch))); INC(i)\r\t\t\t\tEND;\r\t\t\t\tDEC(len)\r\t\t\tEND;\r\t\t\ts.idx := 0; s.len := i;\r\t\t\tStart(s)\r\t\tELSE\r\t\t\tStdLog.String(\"client: no text selection found\"); StdLog.Ln\r\t\tEND\r\tEND SendTextSelection;\r\rCLOSE\r\tStop\t"
                    attr: 0
                  - text: "(* prevent the client from trapping after module unloading *)"
                    attr: 1
                  - text: "\rEND CommObxStreamsClient.\r\r"
                    attr: 0
