                  - text: "\r\t\r\tPROCEDURE AllocSysString (IN s: ARRAY OF CHAR): WinOle.BSTR;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinOleAut.SysAllocString(s);\r\tEND AllocSysString;\r\t\r\tPROCEDURE AllocString (s: WinOle.BSTR): CtlT.Strg;\r\t\tVAR i, n: INTEGER; str: CtlT.Strg;\r\tBEGIN\r\t\tIF s # NIL THEN\r\t\t\tn := WinOleAut.SysStringLen(s);\r\t\t\tNEW(str, n + 1); str^ := s$\r\t\tELSE\r\t\t\tNEW(str, 1); str[0] := 0X\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " str\r\tEND AllocString;\r\t\r\tPROCEDURE AllocSafeArray (len, elsize, flag: INTEGER; OUT arr: WinOleAut.PtrSAFEARRAY; OUT adr: INTEGER);\r\t\tVAR res: COM.RESULT; \r\tBEGIN\r\t\tres := WinOleAut.SafeArrayAllocDescriptor(1, arr); ASSERT(res >= 0, 11);\r\t\tarr.rgsabound[0].lLbound := 0;\r\t\tarr.rgsabound[0].cElements := len;\r\t\tarr.cbElements := elsize;\r\t\tarr.fFeatures := SHORT(arr.fFeatures + SHORT(flag));\r\t\tres := WinOleAut.SafeArrayAllocData(arr); ASSERT(res >= 0, 11);\r\t\tres := WinOleAut.SafeArrayAccessData(arr, adr); ASSERT(res >= 0, 11);\r\tEND AllocSafeArray;\r\t\r\tPROCEDURE AllocSafeArray2 (\r\t\tlen, len1, elsize, flag: INTEGER; OUT arr: WinOleAut.PtrSAFEARRAY; OUT adr: INTEGER\r\t);\r\t\tVAR res: COM.RESULT; \r\tBEGIN\r\t\tres := WinOleAut.SafeArrayAllocDescriptor(2, arr); ASSERT(res >= 0, 11);\r\t\tarr.rgsabound[0].lLbound := 0;\r\t\tarr.rgsabound[0].cElements := len1;\r\t\tarr.rgsabound[1].lLbound := 0;\r\t\tarr.rgsabound[1].cElements := len;\r\t\tarr.cbElements := elsize;\r\t\tarr.fFeatures := SHORT(arr.fFeatures + SHORT(flag));\r\t\tres := WinOleAut.SafeArrayAllocData(arr); ASSERT(res >= 0, 11);\r\t\tres := WinOleAut.SafeArrayAccessData(arr, adr); ASSERT(res >= 0, 11);\r\tEND AllocSafeArray2;\r\t\r\t\r"
