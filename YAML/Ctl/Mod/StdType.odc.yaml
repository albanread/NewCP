                  - text: "\r\t(* Standard OLE Types, help: , id: 0 *)\r\t(* guid: {BEF6E001-A874-101A-8BBA-00AA00300CAB}, lcid: 0, syskind: win32, version: 2.0 *)\r\r\tIMPORT CtlT, CtlC;\r\r\tCONST\r\t\t(* OLE_TRISTATE *)\r\t\t\tUnchecked* = 0;\r\t\t\tChecked* = 1;\r\t\t\tGray* = 2;\r\r\r\tTYPE\r\t\tOLE_COLOR* = INTEGER;\r\t\tOLE_XPOS_PIXELS* = INTEGER;\r\t\tOLE_YPOS_PIXELS* = INTEGER;\r\t\tOLE_XSIZE_PIXELS* = INTEGER;\r\t\tOLE_YSIZE_PIXELS* = INTEGER;\r\t\tOLE_XPOS_HIMETRIC* = INTEGER;\r\t\tOLE_YPOS_HIMETRIC* = INTEGER;\r\t\tOLE_XSIZE_HIMETRIC* = INTEGER;\r\t\tOLE_YSIZE_HIMETRIC* = INTEGER;\r\t\tOLE_XPOS_CONTAINER* = SHORTREAL;\r\t\tOLE_YPOS_CONTAINER* = SHORTREAL;\r\t\tOLE_XSIZE_CONTAINER* = SHORTREAL;\r\t\tOLE_YSIZE_CONTAINER* = SHORTREAL;\r\t\tOLE_HANDLE* = INTEGER;\r\t\tOLE_OPTEXCLUSIVE* = BOOLEAN;\r\t\tOLE_CANCELBOOL* = BOOLEAN;\r\t\tOLE_ENABLEDEFAULTBOOL* = BOOLEAN;\r\t\tOLE_TRISTATE* = INTEGER;\r\t\tFONTNAME* = CtlT.Strg;\r\t\tFONTSIZE* = CtlT.OleCy;\r\t\tFONTBOLD* = BOOLEAN;\r\t\tFONTITALIC* = BOOLEAN;\r\t\tFONTUNDERSCORE* = BOOLEAN;\r\t\tFONTSTRIKETHROUGH* = BOOLEAN;\r\t\tFont* = POINTER TO RECORD (CtlT.Object) END;\r\t\tIFontDisp* = Font;\r\t\tStdFont* = Font;\r\t\tPicture* = POINTER TO RECORD (CtlT.Object) END;\r\t\tIPictureDisp* = Picture;\r\t\tStdPicture* = Picture;\r\r\r\tPROCEDURE ThisFont* (v: CtlT.Any): Font;\r\t\tVAR new: Font;\r\tBEGIN\r\t\tIF v # NIL THEN\r\t\t\tNEW(new); CtlC.InitObj(new, v, \"{BEF6E003-A874-101A-8BBA-00AA00300CAB}\"); RETURN new\r\t\tELSE RETURN NIL\r\t\tEND\r\tEND ThisFont;\r\r\tPROCEDURE IsFont* (v: CtlT.Any): BOOLEAN;\r\tBEGIN\r\t\tRETURN CtlC.IsObj(v, \"{BEF6E003-A874-101A-8BBA-00AA00300CAB}\")\r\tEND IsFont;\r\r\tPROCEDURE ThisPicture* (v: CtlT.Any): Picture;\r\t\tVAR new: Picture;\r\tBEGIN\r\t\tIF v # NIL THEN\r\t\t\tNEW(new); CtlC.InitObj(new, v, \"{7BF80981-BF32-101A-8BBB-00AA00300CAB}\"); RETURN new\r\t\tELSE RETURN NIL\r\t\tEND\r\tEND ThisPicture;\r\r\tPROCEDURE IsPicture* (v: CtlT.Any): BOOLEAN;\r\tBEGIN\r\t\tRETURN CtlC.IsObj(v, \"{7BF80981-BF32-101A-8BBB-00AA00300CAB}\")\r\tEND IsPicture;\r\r\r\r\t(* ---------- Font ---------- *)\r\r\tPROCEDURE (this: Font) Name* (): CtlT.Strg, NEW;\r\tBEGIN\r\t\tRETURN CtlC.GetStr(this, 0)\r\tEND Name;\r\r\tPROCEDURE (this: Font) PUTName* (val: ARRAY OF CHAR), NEW;\r\tBEGIN\r\t\tCtlC.PutStr(this, 0, val)\r\tEND PUTName;\r\r\tPROCEDURE (this: Font) Size* (): CtlT.OleCy, NEW;\r\tBEGIN\r\t\tRETURN CtlC.GetCy(this, 2)\r\tEND Size;\r\r\tPROCEDURE (this: Font) PUTSize* (val: CtlT.OleCy), NEW;\r\tBEGIN\r\t\tCtlC.PutCy(this, 2, val)\r\tEND PUTSize;\r\r\tPROCEDURE (this: Font) Bold* (): BOOLEAN, NEW;\r\tBEGIN\r\t\tRETURN CtlC.GetBool(this, 3)\r\tEND Bold;\r\r\tPROCEDURE (this: Font) PUTBold* (val: BOOLEAN), NEW;\r\tBEGIN\r\t\tCtlC.PutBool(this, 3, val)\r\tEND PUTBold;\r\r\tPROCEDURE (this: Font) Italic* (): BOOLEAN, NEW;\r\tBEGIN\r\t\tRETURN CtlC.GetBool(this, 4)\r\tEND Italic;\r\r\tPROCEDURE (this: Font) PUTItalic* (val: BOOLEAN), NEW;\r\tBEGIN\r\t\tCtlC.PutBool(this, 4, val)\r\tEND PUTItalic;\r\r\tPROCEDURE (this: Font) Underline* (): BOOLEAN, NEW;\r\tBEGIN\r\t\tRETURN CtlC.GetBool(this, 5)\r\tEND Underline;\r\r\tPROCEDURE (this: Font) PUTUnderline* (val: BOOLEAN), NEW;\r\tBEGIN\r\t\tCtlC.PutBool(this, 5, val)\r\tEND PUTUnderline;\r\r\tPROCEDURE (this: Font) Strikethrough* (): BOOLEAN, NEW;\r\tBEGIN\r\t\tRETURN CtlC.GetBool(this, 6)\r\tEND Strikethrough;\r\r\tPROCEDURE (this: Font) PUTStrikethrough* (val: BOOLEAN), NEW;\r\tBEGIN\r\t\tCtlC.PutBool(this, 6, val)\r\tEND PUTStrikethrough;\r\r\tPROCEDURE (this: Font) Weight* (): SHORTINT, NEW;\r\tBEGIN\r\t\tRETURN CtlC.GetSInt(this, 7)\r\tEND Weight;\r\r\tPROCEDURE (this: Font) PUTWeight* (val: SHORTINT), NEW;\r\tBEGIN\r\t\tCtlC.PutSInt(this, 7, val)\r\tEND PUTWeight;\r\r\tPROCEDURE (this: Font) Charset* (): SHORTINT, NEW;\r\tBEGIN\r\t\tRETURN CtlC.GetSInt(this, 8)\r\tEND Charset;\r\r\tPROCEDURE (this: Font) PUTCharset* (val: SHORTINT), NEW;\r\tBEGIN\r\t\tCtlC.PutSInt(this, 8, val)\r\tEND PUTCharset;\r\r\r\t(* ---------- Picture ---------- *)\r\r\tPROCEDURE (this: Picture) Handle* (): OLE_HANDLE, NEW;\r\tBEGIN\r\t\tRETURN CtlC.GetInt(this, 0)\r\tEND Handle;\r\r\tPROCEDURE (this: Picture) hPal* (): OLE_HANDLE, NEW;\r\tBEGIN\r\t\tRETURN CtlC.GetInt(this, 2)\r\tEND hPal;\r\r\tPROCEDURE (this: Picture) PUThPal* (val: OLE_HANDLE), NEW;\r\tBEGIN\r\t\tCtlC.PutInt(this, 2, val)\r\tEND PUThPal;\r\r\tPROCEDURE (this: Picture) Type* (): SHORTINT, NEW;\r\tBEGIN\r\t\tRETURN CtlC.GetSInt(this, 3)\r\tEND Type;\r\r\tPROCEDURE (this: Picture) Width* (): OLE_XSIZE_HIMETRIC, NEW;\r\tBEGIN\r\t\tRETURN CtlC.GetInt(this, 4)\r\tEND Width;\r\r\tPROCEDURE (this: Picture) Height* (): OLE_YSIZE_HIMETRIC, NEW;\r\tBEGIN\r\t\tRETURN CtlC.GetInt(this, 5)\r\tEND Height;\r\r\tPROCEDURE (this: Picture) Render* (hdc: INTEGER; x: INTEGER; y: INTEGER; cx: INTEGER; cy: INTEGER; xSrc: OLE_XPOS_HIMETRIC; ySrc: OLE_YPOS_HIMETRIC; cxSrc: OLE_XSIZE_HIMETRIC; cySrc: OLE_YSIZE_HIMETRIC; lprcWBounds: CtlT.PtrVoid), NEW;\r\t\tVAR arg: ARRAY 10 OF CtlT.Variant;\r\tBEGIN\r\t\tCtlC.IntVar(hdc, arg[9]);\r\t\tCtlC.IntVar(x, arg[8]);\r\t\tCtlC.IntVar(y, arg[7]);\r\t\tCtlC.IntVar(cx, arg[6]);\r\t\tCtlC.IntVar(cy, arg[5]);\r\t\tCtlC.IntVar(xSrc, arg[4]);\r\t\tCtlC.IntVar(ySrc, arg[3]);\r\t\tCtlC.IntVar(cxSrc, arg[2]);\r\t\tCtlC.IntVar(cySrc, arg[1]);\r\t\tCtlC.IntVar(lprcWBounds, arg[0]);\r\t\tCtlC.CallParMethod(this, 6, arg, NIL);\r\tEND Render;\r\r\r\tPROCEDURE NewStdFont* (): Font;\r\tBEGIN\r\t\tRETURN ThisFont(CtlC.NewObj(\"{0BE35203-8F91-11CE-9DE3-00AA004BB851}\"))\r\tEND NewStdFont;\r\r\tPROCEDURE NewStdPicture* (): Picture;\r\tBEGIN\r\t\tRETURN ThisPicture(CtlC.NewObj(\"{0BE35204-8F91-11CE-9DE3-00AA004BB851}\"))\r\tEND NewStdPicture;\r\rEND CtlStdType.\r"
