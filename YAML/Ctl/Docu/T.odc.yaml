                  - text: "real, boolean,\r\t\t\tresult, currency, date, string, interface, enumerator\r"
                    attr: 4
                  - text: "Constants used as values of the "
                    attr: 1
                  - text: typeId
                    attr: 5
                  - text: " field of type "
                    attr: 1
                  - text: Any.
                    attr: 5
                  - text: "\r\r\rTYPE "
                    attr: 1
                  - text: "Strg\r"
                    attr: 4
                  - text: "Basic string type. Used for string-typed out- and in/out-parameters and return values. For in-parameters the type ARRAY OF CHAR is used to permit string constants as actual parameters.\r\r\rTYPE "
                    attr: 1
                  - text: "OleCy\r"
                    attr: 4
                  - text: "Basic currency type used in OLE. "
                    attr: 1
                  - text: OleCy
                    attr: 5
                  - text: " is a fixed point number with 4 decimal digits after the decimal point, stored in a 64 bit integer. The integer value 73500 corresponds to the currency value 7.35.\r\r\rTYPE "
                    attr: 1
                  - text: OleDate
                    attr: 4
                  - text: "\rBasic date/time type used in OLE. "
                    attr: 1
                  - text: OleDate
                    attr: 5
                  - text: " is a 64 bit floating point number containing a fractional day count. The value 2.0 corresponds to midnight 1.1.1900. The exact conversion formula is:\rx := ((second / 60 + minute) / 60 + hour) / 24 + day + 2\rwhere "
                    attr: 1
                  - text: x
                    attr: 5
                  - text: " is the resulting real number and "
                    attr: 1
                  - text: day
                    attr: 5
                  - text: " is the day count since 1.1.1900.\rThe procedures "
                    attr: 1
                  - text: OleDateFromDateAndTime
                    attr: 5
                  - text: " and "
                    attr: 1
                  - text: OleDateToDateAndTime
                    attr: 5
                  - text: " are provided for conversions between "
                    attr: 1
                  - text: OleDate
                    attr: 5
                  - text: " and the BlackBox types "
                    attr: 1
                  - text: Dates.Date
                    attr: 5
                  - text: " amd "
                    attr: 1
                  - text: Dates.Time.
                    attr: 5
                  - text: "\r\r\rTYPE "
                    attr: 1
                  - text: IUnknown
                    attr: 4
                  - text: ", "
                    attr: 1
                  - text: IDispatch
                    attr: 4
                  - text: ", "
