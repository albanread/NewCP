RRAY OF OleDate END;\r\t\tStringArray2 = POINTER TO RECORD (Any) p: POINTER TO ARRAY OF ARRAY OF Strg END;\r\t\tInterfaceArray2 = POINTER TO RECORD (Any) p: POINTER TO ARRAY OF ARRAY OF IUnknown END;\r\r\t\tEnumerator = POINTER TO ABSTRACT RECORD \r\t\t\t(e: Enumerator) First (): Any, NEW, ABSTRACT;\r\t\t\t(e: Enumerator) Next (): Any, NEW, ABSTRACT\r\t\tEND;\r\r\tVAR\r\t\tcontext: SET;\r\t\tlcid: INTEGER;\r\r\tPROCEDURE OleDateFromDateAndTime (IN date: Dates.Date; IN time: Dates.Time): OleDate;\r\tPROCEDURE OleDateToDateAndTime (d: OleDate; OUT date: Dates.Date; OUT time: Dates.Time);\r\t\r\tPROCEDURE Obj (disp: IDispatch): Object;\r\tPROCEDURE Byte (val: BYTE): ByteT;\r\tPROCEDURE SInt (val: SHORTINT): ShortInt;\r\tPROCEDURE Int (val: INTEGER): Integer;\r\tPROCEDURE SReal (val: SHORTREAL): ShortReal;\r\tPROCEDURE Real (val: REAL): RealT;\r\tPROCEDURE Bool (val: BOOLEAN): Boolean;\r\tPROCEDURE Res (val: RESULT): Result;\r\tPROCEDURE Cy (val: OleCy): Currency;\r\tPROCEDURE Date (val: OleDate): DateT;\r\tPROCEDURE Str (IN val: ARRAY OF CHAR): String;\r\tPROCEDURE Intfce (val: IUnknown): Interface;\r\r\tPROCEDURE AnyArr (IN val: ARRAY OF Any): AnyArray;\r\tPROCEDURE ObjArr (IN val: ARRAY OF Object): ObjectArray;\r\tPROCEDURE ByteArr (IN val: ARRAY OF BYTE): ByteArray;\r\tPROCEDURE SIntArr (IN val: ARRAY OF SHORTINT): ShortIntArray;\r\tPROCEDURE IntArr (IN val: ARRAY OF INTEGER): IntegerArray;\r\tPROCEDURE SRealArr (IN val: ARRAY OF SHORTREAL): ShortRealArray;\r\tPROCEDURE RealArr (IN val: ARRAY OF REAL): RealArray;\r\tPROCEDURE BoolArr (IN val: ARRAY OF BOOLEAN): BooleanArray;\r\tPROCEDURE ResArr (IN val: ARRAY OF RESULT): ResultArray;\r\tPROCEDURE CyArr (IN val: ARRAY OF OleCy): CurrencyArray;\r\tPROCEDURE DateArr (IN val: ARRAY OF OleDate): DateArray;\r\tPROCEDURE StrArr (IN val: ARRAY OF Strg): StringArray;\r\tPROCEDURE IntfceArr (IN val: ARRAY OF IUnknown): InterfaceArray;\r\t\r\tPROCEDURE AnyArr2 (IN val: ARRAY OF ARRAY OF Any): AnyArray2;\r\tPROCEDURE ObjArr2 (IN val: ARRAY OF ARRAY OF Object): ObjectArray2;\r\tPROCEDURE ByteArr2 (IN val: ARRAY OF ARRAY OF BYTE): ByteArray2;\r\tPROCEDURE SIntArr2 (IN val: ARRAY OF ARRAY OF SHORTINT): ShortIntArray2;\r\tPROCEDURE IntArr2 (IN val: ARRAY OF ARRAY OF INTEGER): IntegerArray2;\r\tPROCEDURE SRealArr2 (IN val: ARRAY OF ARRAY OF SHORTREAL): ShortRealArray2;\r\tPROCEDURE RealArr2 (IN val: ARRAY OF ARRAY OF REAL): RealArray2;\r\tPROCEDURE BoolArr2 (IN val: ARRAY OF ARRAY OF BOOLEAN): BooleanArray2;\r\tPROCEDURE ResArr2 (IN val: ARRAY OF ARRAY OF RESULT): ResultArray2;\r\tPROCEDURE CyArr2 (IN val: ARRAY OF ARRAY OF OleCy): CurrencyArray2;\r\tPROCEDURE DateArr2 (IN val: ARRAY OF ARRAY OF OleDate): DateArray2;\r\tPROCEDURE StrArr2 (IN val: ARRAY OF ARRAY OF Strg): StringArray2;\r\tPROCEDURE IntfceArr2 (IN val: ARRAY OF ARRAY OF IUnknown): InterfaceArray2;\r\t\r\tPROCEDURE Connect (sink: OutObject; source: Object);\r\tPROCEDURE Disconnect (sink: OutObject; source: Object);\r\tPROCEDURE Disp (obj: Object): IDispatch;\r\rEND CtlT.\r\r\rBase module for OLE automation controller applications. For an introduction to automation controller development see the "
