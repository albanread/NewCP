                    attr: 4
                  - text: ", "
                    attr: 1
                  - text: "ParList\r"
                    attr: 4
                  - text: "OLE types used internally in the automation interface modules.\r\r\rTYPE "
                    attr: 1
                  - text: Any
                    attr: 4
                  - text: "\rABSTRACT\rBase type of all automation types. Covers all possible automation types including arrays. "
                    attr: 1
                  - text: Any
                    attr: 5
                  - text: " is used if the type of a parameter of an automation method is not statically defined. "
                    attr: 1
                  - text: NIL
                    attr: 5
                  - text: " can be used for parameters of type "
                    attr: 1
                  - text: Any
                    attr: 5
                  - text: " if the parameter is not used at all (legal for optional parameters).\r\r"
                    attr: 1
                  - text: typeId
                    attr: 4
