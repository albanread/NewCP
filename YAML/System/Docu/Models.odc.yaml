                  - text: "\r\rDEFINITION Models;\r\r\tIMPORT Stores;\r\r\tCONST clean = 0; notUndoable = 1; invisible = 2;\r\r\tTYPE\r\t\tModel = POINTER TO ABSTRACT RECORD (Stores.Store)\r\t\t\tPROCEDURE (m: Model) Domain (): Stores.Domain, NEW\r\t\tEND;\r\r\t\tContext = POINTER TO ABSTRACT RECORD\r\t\t\t(c: Context) ThisModel (): Model, NEW, ABSTRACT;\r\t\t\t(c: Context) GetSize (OUT w, h: INTEGER), NEW, ABSTRACT;\r\t\t\t(c: Context) SetSize (w, h: INTEGER), NEW, EMPTY;\r\t\t\t(c: Context) Normalize (): BOOLEAN, NEW, ABSTRACT;\r\t\t\t(c: Context) Consider (VAR p: Proposal), NEW, EMPTY;\r\t\t\t(c: Context) MakeVisible (l, t, r, b: INTEGER), NEW, EMPTY\r\t\tEND;\r\r\t\tProposal = ABSTRACT RECORD END;\r\r\t\tMessage = ABSTRACT RECORD\r\t\t\tmodel-: Model;\r\t\t\tera-: INTEGER\r\t\tEND;\r\r\t\tUpdateMsg = EXTENSIBLE RECORD (Message) END;\r\t\tNeutralizeMsg = RECORD (Message) END;\r\r\tPROCEDURE CopyOf (m: Model): Model;\r\tPROCEDURE Broadcast (model: Model; VAR msg: Message);\r\tPROCEDURE Domaincast (d: Stores.Domain; VAR msg: Message);\r\tPROCEDURE BeginModification (type: INTEGER; m: Model);\r\tPROCEDURE EndModification (type: INTEGER; m: Model);\r\tPROCEDURE BeginScript (m: Model; name: Stores.OpName; OUT script: Stores.Operation);\r\tPROCEDURE EndScript (m: Model; script: Stores.Operation);\r\tPROCEDURE Do (m: Model; name: Stores.OpName; op: Stores.Operation);\r\tPROCEDURE LastOp (m: Model): Stores.Operation;\r\tPROCEDURE Bunch (m: Model);\r\tPROCEDURE StopBunching (m: Model);\r\tPROCEDURE Era (m: Model): INTEGER;\r\rEND Models.\r\r\r"
                    attr: 1
                  - view:
                      kind: HostPictures.StdView
