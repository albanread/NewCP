                  - text: "\r\rPROCEDURE (IN i: Item) "
                    attr: 1
                  - text: Valid
                    attr: 6
                  - text: " (): BOOLEAN\rNEW\rDetermines whether the item is valid, i.e., initialized, set to a defined type, and its module is still loaded.\r\rPROCEDURE (IN i: Item) "
                    attr: 1
                  - text: GetTypeName
                    attr: 6
                  - text: " (OUT mod, type: Name)\rNEW\rGet the item's type name and the name of this type's module.\r\rPre\ri.Valid()\t20\ri.typ >= recTyp\t21\rmodule of type is still loaded\t24\r\rPROCEDURE (IN i: Item) "
                    attr: 1
