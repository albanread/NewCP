                  - text: n
                    attr: 4
                  - text: " must be in the range 0..proc.NumParam()-1. "
                    attr: 1
                  - text: par.obj
                    attr: 4
                  - text: " is set to "
                    attr: 1
                  - text: parObj
                    attr: 4
                  - text: ", "
                    attr: 1
                  - text: par.vis
                    attr: 4
                  - text: " reflects the kind of the parameter ("
                    attr: 1
                  - text: value
                    attr: 4
                  - text: ", "
                    attr: 1
                  - text: in
                    attr: 4
                  - text: ", "
                    attr: 1
                  - text: out
                    attr: 4
                  - text: ", or "
                    attr: 1
                  - text: var
                    attr: 4
                  - text: "), and "
                    attr: 1
                  - text: par.typ
                    attr: 4
                  - text: " its type.\r\rPre\rproc.Valid()\t20\rproc.obj = procObj OR proc.typ = procTyp\t21\r\rPROCEDURE (IN proc: Item) "
                    attr: 1
                  - text: GetParamName
                    attr: 6
                  - text: " (n: INTEGER; OUT name: Name)\rNEW\rAssigns the name of the "
                    attr: 1
                  - text: n
