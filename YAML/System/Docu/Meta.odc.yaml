                    attr: 1
                  - text: i
                    attr: 4
                  - text: "'s base type to "
                    attr: 1
                  - text: base
                    attr: 4
                  - text: ".\r\rPre\ri.Valid()\t20\ri.typ IN {recTyp, arrTyp}\t21\r\rPROCEDURE (IN rec: Item) "
                    attr: 1
                  - text: GetThisBaseType
                    attr: 6
                  - text: " (level: INTEGER; VAR base: Item)\rNEW\rAssign "
                    attr: 1
                  - text: i
                    attr: 4
