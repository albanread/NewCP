                    attr: 6
                  - text: ": INTEGER\r"
                    attr: 1
                  - text: vis-
                    attr: 6
                  - text: ": INTEGER\r"
                    attr: 1
                  - text: adr-
                    attr: 6
                  - text: ": INTEGER\rProperties of the object represented by the item. The meaning of the fields depends on the class of the object as follows:\r\r"
                    attr: 1
