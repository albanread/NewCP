                    attr: 4
                  - text: " is set to "
                    attr: 1
                  - text: undef
                    attr: 4
                  - text: ".\r\rPre\rrec.Valid()\t20\rrec.typ IN {recTyp, arrTyp}\t21\rlevel >= 0  &  level < 16\t28\r\rPROCEDURE (IN proc: Item) "
                    attr: 1
                  - text: NumParam
                    attr: 6
                  - text: " (): INTEGER\rNEW\rReturns the number of parameters of a procedure or procedure type.\r\rPre\rproc.Valid()\t20\rproc.obj = procObj OR proc.typ = procTyp\t21\r\rPROCEDURE (IN proc: Item) "
                    attr: 1
                  - text: GetParam
                    attr: 6
                  - text: " (n: INTEGER; VAR par: Item)\rNEW\rAssigns the "
                    attr: 1
                  - text: n
                    attr: 4
                  - text: "-th parameter of "
                    attr: 1
                  - text: proc
                    attr: 4
                  - text: " to "
                    attr: 1
                  - text: par
                    attr: 4
                  - text: ". "
