tem);\r\tPROCEDURE InstallFilter (filter: LookupFilter);\r\tPROCEDURE UninstallFilter (filter: LookupFilter);\r\tPROCEDURE GetThisItem (IN attr: ANYREC; OUT i: Item);\r\rEND Meta.\r\r\r"
                    attr: 1
                  - text: Meta
                    attr: 4
                  - text: " provides access to Component Pascal run-time type information. "
                    attr: 1
                  - text: Meta
                    attr: 4
                  - text: " is restricted to public information, i.e., it doesn't allow access to non-exported items of a module. "
                    attr: 1
                  - text: Meta
                    attr: 4
                  - text: " is safe, it doesn't allow to change data which is not exported as modifiable. Generally, "
                    attr: 1
                  - text: Meta
                    attr: 4
                  - text: " only allows to do with a module what could be done by a normal client module also. The difference is that "
                    attr: 1
                  - text: Meta
                    attr: 4
                  - text: " is more dynamic; it allows inspection and modification of data depending on run-time decisions, without static import of the inspected or modified module.\r\rConstants are not accessible via "
                    attr: 1
                  - text: Meta
                    attr: 4
                  - text: ", they are not represented at run-time in order to minimize space overhead.\r\rExamples:\r"
                    attr: 1
                  - link:
                      target: "StdCmds.OpenDoc('Obx/Mod/Ctrls')"
                      body:
                        - text: ObxCtrls
                          attr: 5
                      attr: 1
                      w: 131250
                      h: 142875
                  - text: "\tslider control, extended from Controls.Control\r"
                    attr: 1
                  - link:
                      target: "StdCmds.OpenDoc('Obx/Mod/FldCtrls')"
                      body:
                        - text: ObxFldCtrls
                          attr: 5
                      attr: 1
                      w: 131250
                      h: 142875
                  - text: "\tspecial-purpose text field control, extended from Controls.Control\r\rHow to call procedures using "
                    attr: 1
                  - text: Meta
                    attr: 4
                  - text: ":\rIn order to call an arbitrary procedure (methods are not possible) whose signature is statically known, the following must be done: first, an item must be created that describes the function:\r\r\tMeta.Lookup(moduleName, item);\r\tIF item.obj = Meta.modObj THEN\r\t\titem.Lookup(procedureName, item);\r\t\tIF item.obj = Meta.procObj THEN\r\t\t\titem.GetVal(item0, ok);\r\t\t\tIF ok THEN\r\t\t\t\titem0.fun(x)\r\t\t\t\t...\r\rThe item "
                    attr: 1
                  - text: item
                    attr: 4
                  - text: " is a normal, non-extended "
                    attr: 1
                  - text: Meta.Item
                    attr: 4
                  - text: " item. In contrast, "
                    attr: 1
                  - text: item0
                    attr: 4
                  - text: " must be an extension of "
                    attr: 1
                  - text: Meta.Value
                    attr: 4
                  - text: " that contains as one additional field a procedure variable of the correct type:\r\r\titem0: RECORD (Meta.Value)\r\t\t\t\tfun: PROCEDURE (x: REAL): REAL\r\t\t\tEND;\r\r\rCONST "
                    attr: 1
                  - text: undef
                    attr: 6
                  - text: "\rPossible result code for object classes, type classes, visibility classes.\r\rCONST "
                    attr: 1
                  - text: "typObj, varObj, procObj, fieldObj, modObj, parObj"
                    attr: 6
                  - text: "\rObject classes.\r\rCONST "
                    attr: 1
                  - text: "boolTyp, sCharTyp, charTyp, byteTyp, sintTyp, intTyp, longTyp,\r\t\t\tsRealTyp, realTyp, setTyp,"
                    attr: 6
                  - text: " "
                    attr: 1
                  - text: "anyRecTyp, anyPtrTyp, procTyp, recTyp, arrTyp, ptrTyp, \r\t\t\tsysPtrTyp"
                    attr: 6
                  - text: "\rType classes.\r\rCONST "
                    attr: 1
                  - text: "final, extensible, limited, abstract"
                    attr: 6
                  - text: "\rRecord attributes.\r\rCONST "
                    attr: 1
                  - text: "hidden, readOnly, exported"
                    attr: 6
                  - text: "\rVisibility classes.\r\rCONST "
                    attr: 1
                  - text: "value, in, out, var"
                    attr: 6
                  - text: "\rParameter kinds.\r\r\rTYPE "
                    attr: 1
                  - text: Name
                    attr: 6
                  - text: "\rString type for meta item names.\r\r\rTYPE "
                    attr: 1
                  - text: Value
                    attr: 6
                  - text: "\rABSTRACT\rA value may be extended exactly once, with a single field.\r\r\rTYPE "
                    attr: 1
                  - text: Item (Value)
                    attr: 6
                  - text: "\r\r"
                    attr: 1
                  - text: obj-
                    attr: 6
                  - text: ": INTEGER\r"
                    attr: 1
