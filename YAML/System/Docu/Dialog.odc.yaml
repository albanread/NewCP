                  - text: checked
                    attr: 3
                  - text: ": BOOLEAN\rInitially set to "
                    attr: 1
                  - text: "FALSE"
                    attr: 2
                  - text: ", this field can be set to "
                    attr: 1
                  - text: "TRUE"
                    attr: 2
                  - text: " to show a check mark for a menu item.\r\r"
                    attr: 1
                  - text: undef
                    attr: 3
                  - text: ": BOOLEAN\rInitially set to "
                    attr: 1
                  - text: "FALSE"
                    attr: 2
                  - text: ", this field can be set to "
                    attr: 1
                  - text: "TRUE"
                    attr: 2
                  - text: " to set the "
                    attr: 1
                  - text: undef
                    attr: 2
                  - text: " state of a control.\r\r"
                    attr: 1
                  - text: readOnly
                    attr: 3
                  - text: ": BOOLEAN\rInitially set to "
                    attr: 1
                  - text: "FALSE"
                    attr: 2
                  - text: ", this field can be set to "
                    attr: 1
                  - text: "TRUE"
                    attr: 2
                  - text: " to set the "
                    attr: 1
                  - text: readOnly
                    attr: 2
                  - text: " state of a control.\r\r"
                    attr: 1
                  - text: label
                    attr: 3
                  - text: ": String\rFor menu items or controls which show different labels depending on the current context, the current string can be deposited here.\r\r\rTYPE "
                    attr: 1
                  - text: GuardProc
                    attr: 3
                  - text: " = PROCEDURE (VAR par: Par)\rMenu guard or control guard commands must have this signature (or the extended version described below). They can set the fields of the "
                    attr: 1
                  - text: par
                    attr: 2
                  - text: " parameter to suitable values. Guard commands are called to determine the current state (in particular to find out whether the item is currently enabled) of a menu item or a control.\rFor menu items, the guard commands are specified in the respective subsystem's "
                    attr: 1
                  - text: /Rsrc/Menus
                    attr: 2
                  - text: " text, or in "
                    attr: 1
                  - text: System/Rsrc/Menus
                    attr: 2
                  - text: ". Menu guard commands are called after the user clicks in the menu bar, and before the menu appears.\rFor controls, the guard commands are specified in the inspector dialog which allows to set the various control properties. Control guard commands are called after the user interactively changed the state of a control, or after a program calls the procedure "
                    attr: 1
                  - text: Update
                    attr: 2
                  - text: " or "
                    attr: 1
                  - text: "UpdateList "
                    attr: 2
                  - text: "(or one of the other update procedures).\r\rNote that when the user clicks in a menu bar, possibly all menu guard commands may be executed. After the contents of an interactor has been changed and "
                    attr: 1
                  - text: Update
                    attr: 2
                  - text: " or "
                    attr: 1
                  - text: "UpdateList "
                    attr: 2
                  - text: "(or one of the other update procedures) has been called, all control guards are executed. This means two things. First, a guard command must be efficient. And second, the module which contains the guard is loaded as soon as the guard is evaluated for the first time. In this respect, menu commands are a certain pitfall during development: when a module has been unloaded, it is reloaded as soon as the user tries to execute a menu command.\r\rGuard commands may only modify fields of their "
                    attr: 1
                  - text: par
                    attr: 2
                  - text: " parameters, they must not modify any other state of the system, e.g., global variables. This means that the evaluation of a guard is similar to a function call without side-effects. Avoiding side-effects is particularly important since guards may be called by the framework at relatively unpredictable times.\r\rAn extended version of "
                    attr: 1
                  - text: GuardProc
                    attr: 2
                  - text: " can be used as an alternative, with the following signature:\r\r\tPROCEDURE (n: INTEGER; VAR par: Par)\r\rAn actual parameter for "
                    attr: 1
                  - text: n
                    attr: 2
                  - text: " must be a constant.\r\r\rTYPE "
                    attr: 1
                  - text: NotifierProc
                    attr: 3
                  - text: " = PROCEDURE (op, from, to: INTEGER)\rA notifier procedure must have one of the following signatures:\r\r\tPROCEDURE (op, from, to: INTEGER)\r\tPROCEDURE (n, op, from, to: INTEGER)\r\rThrough calls of notification procedures, an application can be notified of manipulations of a control. "
                    attr: 1
                  - text: op
                    attr: 2
                  - text: " determines the kind of manipulation:\r"
                    attr: 1
                  - text: op = pressed
                    attr: 2
                  - text: ": A mouse-down event has occurred.\r"
                    attr: 1
                  - text: op = released
                    attr: 2
                  - text: ": A mouse-up event has occurred.\r"
                    attr: 1
                  - text: op = changed
                    attr: 2
                  - text: ": The value of a control (not bound to a "
                    attr: 1
                  - text: SET
                    attr: 2
                  - text: " or a "
                    attr: 1
                  - text: Selection
                    attr: 2
                  - text: ") has been changed.\r"
                    attr: 1
                  - text: op = included
                    attr: 2
                  - text: ": Range "
                    attr: 1
                  - text: "[from..to]"
                    attr: 2
                  - text: " has been included in a "
                    attr: 1
                  - text: SET
                    attr: 2
                  - text: " or a "
                    attr: 1
                  - text: Selection
                    attr: 2
                  - text: ". It wasn't included before.\r"
                    attr: 1
                  - text: op = excluded
                    attr: 2
                  - text: ": Range "
                    attr: 1
                  - text: "[from..to]"
                    attr: 2
                  - text: " has been excluded from a "
                    attr: 1
                  - text: SET
                    attr: 2
                  - text: " or a "
                    attr: 1
                  - text: Selection
                    attr: 2
                  - text: ". It was included before.\r"
                    attr: 1
                  - text: op = set
                    attr: 2
                  - text: ": Range "
                    attr: 1
                  - text: "[from..to]"
                    attr: 2
                  - text: " has been set in a "
                    attr: 1
                  - text: SET
                    attr: 2
                  - text: " or a "
                    attr: 1
                  - text: Selection
                    attr: 2
                  - text: " after clearing the previous selection.\r\rAn actual parameter for "
                    attr: 1
                  - text: n
                    attr: 2
                  - text: " must be a constant.\r\r\rTYPE "
                    attr: 1
                  - text: LangNotifier
                    attr: 3
                  - text: " = POINTER TO ABSTRACT RECORD  END;\rObjects of this type can be registered and unregistered using "
                    attr: 1
                  - text: RegisterLangNotifier
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: RemoveLangNotifier
                    attr: 2
                  - text: ".\r\rPROCEDURE (n: LangNotifier) "
                    attr: 1
                  - text: Notify
                    attr: 3
                  - text: "-\rNEW, ABSTRACT\rThis method is called for all registered "
                    attr: 1
                  - text: LangNotifiers
                    attr: 2
                  - text: " whenever the language is changed. The order in which the language notifiers are called is undefined.\r\r\rVAR "
                    attr: 1
                  - text: metricSystem
                    attr: 3
                  - text: ": BOOLEAN\rThis variable indicates whether sizes should be measured in metric units or in inches.\r\rVAR "
                    attr: 1
                  - text: showsStatus
                    attr: 3
                  - text: ": BOOLEAN\rIndicates whether status messages are currently displayed. If "
                    attr: 1
                  - text: showsStatus = FALSE
                    attr: 2
                  - text: ", the procedures "
                    attr: 1
                  - text: ShowParamStatus
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: ShowStatus
                    attr: 2
                  - text: " will have no visible effect.\r\rVAR "
                    attr: 1
                  - text: version
                    attr: 3
                  - text: ": INTEGER\rIndicates the current major version of BlackBox.\r\t10 = version 1.0\r\t11 = version 1.1\r\t12 = version 1.2\r\t13 = version 1.3\r\t14 = version 1.4\r\t15 = version 1.5\r\t16 = version 1.6\r\t17 = version 1.7\r\rVAR "
                    attr: 1
                  - text: platform
                    attr: 3
                  - text: ": INTEGER\rIndicates on which host operating system the application is running.\r\rVAR "
                    attr: 1
                  - text: appName
                    attr: 3
                  - text: ": ARRAY 32 OF CHAR\rGives the name of the application program which is currently running; the default is \"BlackBox\".\r\rVAR "
                    attr: 1
                  - text: appVersion
                    attr: 3
                  - text: ": ARRAY 32 OF CHAR\rGives the version of the application program which is currently running; the default is taken from the System property 'appVersion'.\r\rVAR "
                    attr: 1
                  - text: language-
                    attr: 3
                  - text: ": Language\rCurrent language in ISO 639 codes. See "
                    attr: 1
                  - text: SetLanguage
                    attr: 2
                  - text: " for more information about language support.\r\rVAR "
                    attr: 1
                  - text: user
                    attr: 3
                  - text: ": ARRAY 32 OF CHAR\rLogin name of current user. Currently not used.\r\rVAR "
                    attr: 1
                  - text: thickCaret
                    attr: 3
                  - text: ": BOOLEAN\rDetermines whether the text subsystem uses a Word-like thick caret or a normal thin caret.\r\rVAR "
                    attr: 1
                  - text: caretPeriod
                    attr: 3
                  - text: ": INTEGER\rDetermines the blinking period that the text subsystem uses for caret blinking. The period is given in ticks (1/1000 second). The default is 500, i.e., half a second.\r\rVAR "
                    attr: 1
                  - text: commandLinePars
                    attr: 3
                  - text: ": String\rCommand line parameters that have been passed when starting BlackBox. Variable "
                    attr: 1
                  - text: commandLinePars
                    attr: 2
                  - text: " contains the string entered on the command line following the /PAR option. The string can be specified enclosed in either single or double quotes. Quotes may be omitted if no white space is contained in the string. If no /PAR option is present on the command line, "
                    attr: 1
                  - text: commandLinePars
                    attr: 2
                  - text: " contains the empty string.\r\rExamples:\r/PAR test\r/PAR \"parameter string\"\r/PAR 'A string containing a \" can be entered like this'\r\rPROCEDURE "
                    attr: 1
                  - text: IsLinux
                    attr: 3
                  - text: " (): BOOLEAN;\rReturns TRUE if and only if the application is runing under any Linux version. Note that in case of using the Windows emulator Wine IsLinux returns FALSE.\r\rPROCEDURE "
                    attr: 1
                  - text: IsMac
                    attr: 3
                  - text: " (): BOOLEAN;\rReturns TRUE if and only if the application is runing under any MacOS version.\r\rPROCEDURE "
                    attr: 1
                  - text: IsWindows
                    attr: 3
                  - text: " (): BOOLEAN;\rReturns TRUE if and only if the application is runing under any Windows verson. Note that also in case of using the Windows emulator Wine IsWindows returns TRUE.\r\rPROCEDURE "
                    attr: 1
                  - text: IsWine
                    attr: 3
                  - text: " (): BOOLEAN;\rReturns TRUE if and only if the application is runing under the Windows emulator Wine. Note that IsWine() implies IsWindows().\r\rPROCEDURE "
                    attr: 1
                  - text: Update
                    attr: 3
                  - text: " (IN x: ANYREC)\rThis procedure should be called after one or several fields of the interactor "
                    attr: 1
                  - text: x
                    attr: 2
                  - text: " have been modified by a program (it is called automatically when a field has been modified interactively via a control). It causes all controls which are bound to fields of this interactor to be updated, and then guards are evaluated.\r\rPROCEDURE "
                    attr: 1
                  - text: UpdateList
                    attr: 3
                  - text: " (IN x: ANYREC)\rFor list-structured controls (list boxes, selection boxes, combo boxes, tree controls), the lists are re-created. For efficiency reasons, this is not done after a call to "
                    attr: 1
                  - text: Update
                    attr: 2
                  - text: ".\rNote that "
                    attr: 1
                  - text: UpdateList
                    attr: 2
                  - text: " also includes the functionality of "
                    attr: 1
                  - text: Update
                    attr: 2
                  - text: ", thus for efficiency reasons you shouldn't call "
                    attr: 1
                  - text: UpdateList(rec); Update(rec)
                    attr: 2
                  - text: ".\r\rPROCEDURE "
                    attr: 1
                  - text: UpdateBool
                    attr: 3
                  - text: " (VAR x: BOOLEAN)\rSimilar to "
                    attr: 1
                  - text: Update
                    attr: 2
                  - text: ", except that it accepts a BOOLEAN parameter.\r\rPROCEDURE "
                    attr: 1
                  - text: UpdateByte
                    attr: 3
                  - text: " (VAR x: BYTE)\rSimilar to "
                    attr: 1
                  - text: Update
                    attr: 2
                  - text: ", except that it accepts a BYTE parameter.\r\rPROCEDURE "
                    attr: 1
                  - text: UpdateChar
                    attr: 3
                  - text: " (VAR x: CHAR)\rSimilar to "
                    attr: 1
                  - text: Update
                    attr: 2
                  - text: ", except that it accepts a CHAR parameter.\r\rPROCEDURE "
                    attr: 1
                  - text: UpdateInt
                    attr: 3
                  - text: " (VAR x: INTEGER)\rSimilar to "
                    attr: 1
                  - text: Update
                    attr: 2
                  - text: ", except that it accepts an INTEGER parameter.\r\rPROCEDURE "
                    attr: 1
                  - text: UpdateLInt
                    attr: 3
                  - text: " (VAR x: LONGINT)\rSimilar to "
                    attr: 1
                  - text: Update
                    attr: 2
                  - text: ", except that it accepts a LONGINT parameter.\r\rPROCEDURE "
                    attr: 1
                  - text: UpdateReal
                    attr: 3
                  - text: " (VAR x: REAL)\rSimilar to "
                    attr: 1
                  - text: Update
                    attr: 2
                  - text: ", except that it accepts a REAL parameter.\r\rPROCEDURE "
                    attr: 1
                  - text: UpdateSChar
                    attr: 3
                  - text: " (VAR x: SHORTCHAR)\rSimilar to "
                    attr: 1
                  - text: Update
                    attr: 2
                  - text: ", except that it accepts a SHORTCHAR parameter.\r\rPROCEDURE "
                    attr: 1
                  - text: UpdateSInt
                    attr: 3
                  - text: " (VAR x: SHORTINT)\rSimilar to "
                    attr: 1
                  - text: Update
                    attr: 2
                  - text: ", except that it accepts a SHORTINT parameter.\r\rPROCEDURE "
                    attr: 1
                  - text: UpdateSReal
                    attr: 3
                  - text: " (VAR x: SHORTREAL)\rSimilar to "
                    attr: 1
                  - text: Update
                    attr: 2
                  - text: ", except that it accepts a SHORTREAL parameter.\r\rPROCEDURE "
                    attr: 1
                  - text: UpdateSString
                    attr: 3
                  - text: " (IN x: ARRAY OF SHORTCHAR)\rSimilar to "
                    attr: 1
                  - text: Update
                    attr: 2
                  - text: ", except that it accepts an ARRAY OF SHORTCHAR parameter.\r\rPROCEDURE "
                    attr: 1
                  - text: UpdateSet
                    attr: 3
                  - text: " (VAR x: SET)\rSimilar to "
                    attr: 1
                  - text: Update
                    attr: 2
                  - text: ", except that it accepts a SET parameter.\r\rPROCEDURE "
                    attr: 1
                  - text: UpdateString
                    attr: 3
                  - text: " (IN x: ARRAY OF CHAR)\rSimilar to "
                    attr: 1
                  - text: Update
                    attr: 2
                  - text: ", except that it accepts an ARRAY OF CHAR parameter.\r\rPROCEDURE "
                    attr: 1
                  - text: "MapParamString "
                    attr: 3
                  - text: "(in, p0, p1, p2: ARRAY OF CHAR; OUT out: ARRAY OF CHAR)\rTranslates string "
                    attr: 1
                  - text: in
                    attr: 2
                  - text: " into string "
                    attr: 1
                  - text: out
                    attr: 2
                  - text: ". Strings of the form \"#Subsystem:message\" are translated if there is a corresponding \"Strings\" resource file for this subsystem (in the subsystem's \"Rsrc\" directory). Otherwise, the \"#Subsystem:\" prefix is stripped away, if there is no resource file.\rAs an example, \"#System:Cancel\" may be translated to \"Cancel\" in the USA, and to \"Abbrechen\" in Germany; or to \"Cancel\" if the resource file or the appropriate entry is missing.\rThree additional input parameters can be spliced into the "
                    attr: 1
                  - text: in
                    attr: 2
                  - text: " parameter. These parameters are inserted where \"^0\", \"^1\", or \"^2\" occur in "
                    attr: 1
                  - text: in
                    attr: 2
                  - text: ". The parameters are not mapped, but merely substituted.\r"
                    attr: 1
                  - text: MapParamString
                    attr: 2
                  - text: " allows to remove country- and language-specific strings from a program source text, while at the same time providing a default string in the program source text such that the program always works, even if string resources are missing.\r\rPROCEDURE "
                    attr: 1
                  - text: MapString
                    attr: 3
                  - text: " (in: ARRAY OF CHAR; OUT out: ARRAY OF CHAR)\rThis is a simplified version of "
                    attr: 1
                  - text: MapParamString
                    attr: 2
                  - text: " which has no additional input parameters.\r\rExcept for performance, equivalent to:\r\tMapParamString(in, \"\", \"\", \"\", out)\r\rPROCEDURE "
                    attr: 1
                  - text: RegisterLangNotifier
                    attr: 3
                  - text: " (notifier: LangNotifier)\rAdds "
                    attr: 1
                  - text: notifier
                    attr: 2
                  - text: " to the list of "
                    attr: 1
                  - text: LangNotifiers
                    attr: 2
                  - text: " to be called every time the language is changed.\r\rPre\r"
                    attr: 1
                  - text: "notifier # NIL\t20\r"
                    attr: 6
                  - text: "\rPROCEDURE "
                    attr: 1
                  - text: RemoveLangNotifier
                    attr: 3
                  - text: " (notifier: LangNotifier)\rRemoves "
                    attr: 1
                  - text: notifier
                    attr: 2
                  - text: " from the list of "
                    attr: 1
                  - text: LangNotifiers
                    attr: 2
                  - text: " called every time the language is changed.\r\rPre\r"
                    attr: 1
                  - text: "notifier # NIL, 20\r"
                    attr: 6
                  - text: "\rPROCEDURE "
                    attr: 1
                  - text: SetLanguage
                    attr: 3
                  - text: " (lang: ARRAY OF CHAR; persistent: BOOLEAN)\rSets the current language to "
                    attr: 1
                  - text: lang
                    attr: 2
                  - text: ", specified in ISO 639 code. This indicates that String resources are not read from the Rsrc-directory directly but from a subdirectory within the Rsrc-directory with the same name as the language code. It also sets the value of the global variable "
                    attr: 1
                  - text: language
                    attr: 2
                  - text: ".\r\rFor example, if "
                    attr: 1
                  - text: lang
                    attr: 2
                  - text: " = \"de\" the String resources are read from the directory \"Rsrc/de\". If no such directory exists or the requested resource does not exist then the resources are read from the normal Rsrc-directory. An empty string implies that no particular language has been selected and resources are read from the Rsrc-directory.\r\rThe "
                    attr: 1
                  - text: persistent
                    attr: 2
                  - text: " parameter indicates whether the setting is being used again when BlackBox is started the next time. "
                    attr: 1
                  - text: persistent
                    attr: 2
                  - text: " = "
                    attr: 1
                  - text: nonPersistent
                    attr: 2
                  - text: " causes a non-permanent change, i.e. the change is effective for this particular instance of BlackBox only. With "
                    attr: 1
                  - text: persistent
                    attr: 2
                  - text: " = "
                    attr: 1
                  - text: persistent
                    attr: 2
                  - text: " the change is registered in a registry and the language will be set immediately when BlackBox starts up next time.\r\rFor information on how to do software that needs to be notified whenever the value of the global variable "
                    attr: 1
                  - text: language
                    attr: 2
                  - text: " is changing, see "
                    attr: 1
                  - text: RegisterLangNotifier
                    attr: 2
                  - text: ".\r\rPre "
                    attr: 1
                  - text: "\r(lang = \"\") OR (LEN(lang$) = 2)\t20"
                    attr: 6
                  - text: "\r\rPROCEDURE "
                    attr: 1
                  - text: ResetLanguage
                    attr: 3
                  - text: "\rResets the current language to the value of the last persistent setting. See also "
                    attr: 1
                  - text: SetLanguage
                    attr: 2
                  - text: ".\r\rPROCEDURE "
                    attr: 1
                  - text: ShowParamMsg
                    attr: 3
                  - text: " (IN str, p0, p1, p2: ARRAY OF CHAR)\rPresents "
                    attr: 1
                  - text: str
                    attr: 2
                  - text: " as a message to the user. The string "
                    attr: 1
                  - text: str
                    attr: 2
                  - text: " is mapped. The additional input parameters "
                    attr: 1
                  - text: p0
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: p1
                    attr: 2
                  - text: ", and "
                    attr: 1
                  - text: p2
                    attr: 2
                  - text: " are not mapped. This procedure is used to present urgent messages to the user, typically alerting the user that some action has failed. It shouldn't be used for casual success messages. If a log window is present it is assumed that the user prefers these kind of messages in the log. Therefore the message is printed in the log if one exists, otherwise the message is displayed in a separately opened dialog box.\r\rPre\rstr # NIL\t20\r\rPROCEDURE "
                    attr: 1
                  - text: ShowMsg
                    attr: 3
                  - text: " PROCEDURE (IN str: ARRAY OF CHAR)\rThis is a simplified version of "
                    attr: 1
                  - text: ShowParamMsg
                    attr: 2
                  - text: " which has no additional input parameters.\r\rExcept for performance, equivalent to:\r\tShowParamMsg(str, \"\", \"\", \"\")\r\rPre\rstr # NIL\t20\r\rPROCEDURE "
                    attr: 1
                  - text: ShowParamStatus
                    attr: 3
                  - text: " (IN str, p0, p1, p2: ARRAY OF CHAR)\rPresents "
                    attr: 1
                  - text: str
                    attr: 2
                  - text: " as a message to the user. The string "
                    attr: 1
                  - text: str
                    attr: 2
                  - text: " is mapped. The additional input parameters "
                    attr: 1
                  - text: p0
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: p1
                    attr: 2
                  - text: ", and "
                    attr: 1
                  - text: p2
                    attr: 2
                  - text: " are not mapped. In contrast to "
                    attr: 1
                  - text: ShowParamMsg
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: ShowParamStatus
                    attr: 2
                  - text: " is used for shorter-lived and less urgent messages; e.g., messages produced and updated during a lengthy process. This procedure should not be used for vital messages, because on some platforms there may be no status area to display status messages, or the message mechanism may be switched off. These conditions are indicated by the global variable "
                    attr: 1
                  - text: showsStatus
                    attr: 2
                  - text: ".\r\rPROCEDURE "
                    attr: 1
                  - text: ShowStatus
                    attr: 3
                  - text: " PROCEDURE (IN str: ARRAY OF CHAR)\rThis is a simplified version of "
                    attr: 1
                  - text: ShowParamStatus
                    attr: 2
                  - text: " which has no additional input parameters.\r\rExcept for performance, equivalent to:\r\tShowParamStatus(str, \"\", \"\", \"\")\r\rPROCEDURE "
                    attr: 1
                  - text: FlushMappings
                    attr: 3
                  - text: "\rString mappings are cached in internal tables for efficiency reasons. This procedure flushes all string mapping tables. This forces a reload of these tables from the string resource files as soon as the mappings are performed again.\r\rPROCEDURE "
                    attr: 1
                  - text: GetOK
                    attr: 3
                  - text: " (IN str, p0, p1, p2: ARRAY OF CHAR; form: SET; OUT res: INTEGER)\rModal dialog\rPresents a mapped string, with the optional parameters "
                    attr: 1
                  - text: p0
                    attr: 2
                  - text: " to "
                    attr: 1
                  - text: p2
                    attr: 2
                  - text: ", in a modal dialog box. "
                    attr: 1
                  - text: form
                    attr: 2
                  - text: " indicates the set of buttons of the dialog box. Only meaningful combinations are allowed:\r\t{ok}\r\t{ok, cancel}\r\t{yes, no}\r\t{yes, no, cancel}\r"
                    attr: 1
                  - text: res
                    attr: 2
                  - text: " indicates which button has been pressed by the user.\r\rPre\r((yes IN form) = (no IN form))  &  ((yes IN form) # (ok IN form))\t20\r\rPost\rres IN form\r\rPROCEDURE "
                    attr: 1
                  - text: GetIntSpec
                    attr: 3
                  - text: " (defType: Files.Type; VAR loc: Files.Locator; OUT name: Files.Name)\rModal dialog\rAsk the user for a file specification "
                    attr: 1
                  - text: "(loc, name)"
                    attr: 2
                  - text: ". "
                    attr: 1
                  - text: defType
                    attr: 2
                  - text: " indicates which file type is desired (\"\" stands for any file type; other types are platform-specific, e.g., \"txt\" for Windows Ascii files or \"TEXT\" for Mac OS Ascii files). "
                    attr: 1
                  - text: "loc # NIL"
                    attr: 2
                  - text: " indicates a valid file specification.\rMac OS: "
                    attr: 1
                  - text: loc
                    attr: 2
                  - text: " is ignored.\r\rPre\rdefType = \"\"  OR  defType is legal type name on this platform\t20\r\rPROCEDURE "
                    attr: 1
                  - text: GetExtSpec
                    attr: 3
                  - text: " (defName: Files.Name; defType: Files.Type; VAR loc: Files.Locator;\r\t\t\t\t\t\t\t\t\t\t\t\tOUT name: Files.Name)\rModal dialog\rAsk the user for a file specification for externalizing a file. "
                    attr: 1
                  - text: defName
                    attr: 2
                  - text: " is the default name presented to the user. "
                    attr: 1
                  - text: defType
                    attr: 2
                  - text: " is the file type which should be used as default type. "
                    attr: 1
                  - text: "loc # NIL"
                    attr: 2
                  - text: " indicates a valid file specification.\rMac OS: "
                    attr: 1
                  - text: loc
                    attr: 2
                  - text: " is ignored.\r\rPre\rdefType = \"\"  OR  defType is legal type name on this platform\t20\r\rPROCEDURE "
                    attr: 1
                  - text: GetColor
                    attr: 3
                  - text: " (in: INTEGER; OUT out: LONGINT; OUT set: BOOLEAN)\rModal dialog\rAsk the user for a color. "
                    attr: 1
