                  - text: "\r\rDEFINITION Dialog;\r\r\tIMPORT Files;\r\r\tCONST\r\t\tpressed = 1; released = 2; changed = 3; included = 5; excluded = 6; set = 7;\r\t\tok = 1; yes = 2; no = 3; cancel = 4;\r\t\twindows32s = 11; windows95 = 12; windowsNT3 = 13; windowsNT4 = 14; windows2000 = 15;\r\t\twindows98 = 16; windowsXP = 17; windowsVista = 18; windows7 = 19; windows8 = 10;\r\t\tmacOS = 21; macOSX = 22; linux = 30; tru64 = 40;\r\t\tfirstPos = 0; lastPos = -1;\r\t\tpersistent = TRUE; nonPersistent = FALSE;\r\r\tTYPE\r\t\tString = ARRAY 256 OF CHAR;\r\r\t\tList = RECORD\r\t\t\tindex, len-: INTEGER;\r\t\t\t(VAR l: List) GetItem (index: INTEGER; OUT item: String), NEW;\r\t\t\t(VAR l: List) SetItem (index: INTEGER; IN item: ARRAY OF CHAR), NEW;\r\t\t\t(VAR l: List) SetLen (len: INTEGER), NEW;\r\t\t\t(VAR l: List) SetResources (IN key: ARRAY OF CHAR), NEW\r\t\tEND;\r\r\t\tSelection = RECORD\r\t\t\tlen-: INTEGER;\r\t\t\t(VAR s: Selection) Excl (from, to: INTEGER), NEW;\r\t\t\t(VAR s: Selection) GetItem (index: INTEGER; OUT item: String), NEW;\r\t\t\t(VAR s: Selection) In (index: INTEGER): BOOLEAN, NEW;\r\t\t\t(VAR s: Selection) Incl (from, to: INTEGER), NEW;\r\t\t\t(VAR s: Selection) SetItem (index: INTEGER; IN item: ARRAY OF CHAR), NEW;\r\t\t\t(VAR s: Selection) SetLen (len: INTEGER), NEW;\r\t\t\t(VAR s: Selection) SetResources (IN key: ARRAY OF CHAR), NEW\r\t\tEND;\r\r\t\tCombo = RECORD\r\t\t\titem: String;\r\t\t\tlen-: INTEGER;\r\t\t\t(VAR c: Combo) GetItem (index: INTEGER; OUT item: String), NEW;\r\t\t\t(VAR c: Combo) SetItem (index: INTEGER; IN item: ARRAY OF CHAR), NEW;\r\t\t\t(VAR c: Combo) SetLen (len: INTEGER), NEW;\r\t\t\t(VAR c: Combo) SetResources (IN key: ARRAY OF CHAR), NEW\r\t\tEND;\r \r\t\tTreeNode = POINTER TO LIMITED RECORD \r\t\t\t(tn: TreeNode) Data (): ANYPTR, NEW;\r\t\t\t(tn: TreeNode) GetName (OUT name: String), NEW;\r\t\t\t(tn: TreeNode) IsExpanded (): BOOLEAN, NEW;\r\t\t\t(tn: TreeNode) IsFolder (): BOOLEAN, NEW;\r\t\t\t(tn: TreeNode) NofChildren (): INTEGER, NEW;\r\t\t\t(tn: TreeNode) SetData (data: ANYPTR), NEW;\r\t\t\t(tn: TreeNode) SetExpansion (expanded: BOOLEAN), NEW;\r\t\t\t(tn: TreeNode) SetName (name: String), NEW;\r\t\t\t(tn: TreeNode) ViewAsFolder (isFolder: BOOLEAN), NEW\r\t\tEND;\r\r\t\tTree = RECORD \r\t\t\t(VAR t: Tree) Child (node: TreeNode; pos: INTEGER): TreeNode, NEW;\r\t\t\t(VAR t: Tree) Delete (node: TreeNode): INTEGER, NEW;\r\t\t\t(VAR t: Tree) DeleteAll, NEW;\r\t\t\t(VAR t: Tree) Move (node, parent: TreeNode; pos: INTEGER), NEW;\r\t\t\t(VAR t: Tree) NewChild (parent: TreeNode; pos: INTEGER; name: String): TreeNode, NEW;\r\t\t\t(VAR t: Tree) Next (node: TreeNode): TreeNode, NEW;\r\t\t\t(VAR t: Tree) NofNodes (): INTEGER, NEW;\r\t\t\t(VAR t: Tree) NofRoots (): INTEGER, NEW;\r\t\t\t(VAR t: Tree) Parent (node: TreeNode): TreeNode, NEW;\r\t\t\t(VAR t: Tree) Prev (node: TreeNode): TreeNode, NEW;\r\t\t\t(VAR t: Tree) Select (node: TreeNode), NEW;\r\t\t\t(VAR t: Tree) Selected (): TreeNode, NEW\r\t\tEND;\r\r\t\tColor = RECORD\r\t\t\tval: INTEGER\r\t\tEND;\r\r\t\tCurrency = RECORD \r\t\t\tval: LONGINT;\r\t\t\tscale: INTEGER\r\t\tEND;\r\r\t\tPar = RECORD\r\t\t\tdisabled: BOOLEAN;\r\t\t\tchecked: BOOLEAN;\r\t\t\tundef: BOOLEAN;\r\t\t\treadOnly: BOOLEAN;\r\t\t\tlabel: String\r\t\tEND;\r\r\t\tGuardProc = PROCEDURE (VAR par: Par);\r\r\t\tNotifierProc = PROCEDURE (op, from, to: INTEGER);\r\r\t\tLanguage = ARRAY 3 OF CHAR;\r\r\t\tLangNotifier = POINTER TO ABSTRACT RECORD \r\t\t\t(n: LangNotifier) Notify-, NEW, ABSTRACT\r\t\tEND;\r\r\tVAR\r\t\tmetricSystem: BOOLEAN;\r\t\tshowsStatus: BOOLEAN;\r\t\tversion: INTEGER;\r\t\tplatform: INTEGER;\r\t\tappName: ARRAY 32 OF CHAR;\r\t\tappVersion: ARRAY 32 OF CHAR;\r\t\tlanguage-: Language;\r\t\tuser: ARRAY 32 OF CHAR;\r\t\tthickCaret: BOOLEAN;\r\t\tcaretPeriod: INTEGER;\r\t\tcommandLinePars: String;\r\r\tPROCEDURE IsLinux (): BOOLEAN;\r\tPROCEDURE IsMac (): BOOLEAN;\r\tPROCEDURE IsWindows (): BOOLEAN;\r\tPROCEDURE IsWine (): BOOLEAN;\r\tPROCEDURE Update (IN x: ANYREC);\r\tPROCEDURE UpdateBool (VAR x: BOOLEAN);\r\tPROCEDURE UpdateByte (VAR x: BYTE);\r\tPROCEDURE UpdateChar (VAR x: CHAR);\r\tPROCEDURE UpdateInt (VAR x: INTEGER);\r\tPROCEDURE UpdateLInt (VAR x: LONGINT);\r\tPROCEDURE UpdateList (IN x: ANYREC);\r\tPROCEDURE UpdateReal (VAR x: REAL);\r\tPROCEDURE UpdateSChar (VAR x: SHORTCHAR);\r\tPROCEDURE UpdateSInt (VAR x: SHORTINT);\r\tPROCEDURE UpdateSReal (VAR x: SHORTREAL);\r\tPROCEDURE UpdateSString (IN x: ARRAY OF SHORTCHAR);\r\tPROCEDURE UpdateSet (VAR x: SET);\r\tPROCEDURE UpdateString (IN x: ARRAY OF CHAR);\r\tPROCEDURE MapParamString (in, p0, p1, p2: ARRAY OF CHAR; OUT out: ARRAY OF CHAR);\r\tPROCEDURE MapString (in: ARRAY OF CHAR; OUT out: ARRAY OF CHAR);\r\tPROCEDURE RegisterLangNotifier (notifier: LangNotifier);\r\tPROCEDURE RemoveLangNotifier (notifier: LangNotifier);\r\tPROCEDURE SetLanguage (lang: Language; persistent: BOOLEAN);\r\tPROCEDURE ResetLanguage;\r\tPROCEDURE ShowParamMsg (IN str, p0, p1, p2: ARRAY OF CHAR);\r\tPROCEDURE ShowMsg (IN str: ARRAY OF CHAR);\r\tPROCEDURE ShowParamStatus (IN str, p0, p1, p2: ARRAY OF CHAR);\r\tPROCEDURE ShowStatus (IN str: ARRAY OF CHAR);\r\tPROCEDURE FlushMappings;\r\tPROCEDURE GetOK (IN str, p0, p1, p2: ARRAY OF CHAR; form: SET; OUT res: INTEGER);\r\tPROCEDURE GetIntSpec (defType: Files.Type; VAR loc: Files.Locator; OUT name: Files.Name);\r\tPROCEDURE GetExtSpec (defName: Files.Name; defType: Files.Type; VAR loc: Files.Locator;\r\t\t\t\t\t\t\t\t\t\t\t\tOUT name: Files.Name);\r\tPROCEDURE GetColor (in: INTEGER; OUT out: INTEGER; OUT set: BOOLEAN);\r\tPROCEDURE Call (IN cmd, errorMsg: ARRAY OF CHAR; OUT res: INTEGER);\r\tPROCEDURE Beep;\r\tPROCEDURE Notify (id0, id1: INTEGER; opts: SET);\r\rEND Dialog.\r\r\rModule "
                    attr: 1
                  - text: Dialog
                    attr: 2
                  - text: " provides a variety of auxiliary services to simplify user interaction of a program. In particular, the output of messages, e.g. error messages, is supported. Furthermore, various base types are provided: "
                    attr: 1
                  - text: "List, Selection, Combo"
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: "Currency, Tree"
                    attr: 2
                  - text: ", etc. These types are known to the framework (more exactly: they are known to module "
                    attr: 1
                  - text: Controls
                    attr: 2
                  - text: ") and can be displayed by suitable controls, i.e. views which display not a normal model, but instead a variable of one of the mentioned types.\r\r\rCONST "
                    attr: 1
                  - text: pressed
                    attr: 3
                  - text: "\rThis value may be passed to the "
                    attr: 1
                  - text: op
                    attr: 2
                  - text: " field of a notifier procedure. It notifies about a mouse-down event, i.e. the primary mouse key has just been pressed.\r\rCONST "
                    attr: 1
                  - text: released
                    attr: 3
                  - text: "\rThis value may be passed to the "
                    attr: 1
                  - text: op
                    attr: 2
                  - text: " field of a notifier procedure. It notifies about a mouse-up event, i.e. the primary mouse key has just been released.\r\rCONST "
                    attr: 1
                  - text: changed
                    attr: 3
                  - text: "\rThis value may be passed to the "
                    attr: 1
                  - text: op
                    attr: 2
                  - text: " field of a notifier procedure. It notifies about some change of an interactor field's value. For a "
                    attr: 1
                  - text: Selection
                    attr: 2
                  - text: ", the more specific constants "
                    attr: 1
                  - text: included
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: excluded
                    attr: 2
                  - text: ", or "
                    attr: 1
                  - text: set
                    attr: 2
                  - text: " are used.\r\rCONST "
                    attr: 1
                  - text: included
                    attr: 3
                  - text: "\rThis value may be passed to the "
                    attr: 1
                  - text: op
                    attr: 2
                  - text: " field of a notifier procedure. It notifies about an inclusion of the range "
                    attr: 1
                  - text: "[from..to]"
                    attr: 2
                  - text: " in a "
                    attr: 1
                  - text: Selection
                    attr: 2
                  - text: ". Before the operation, this range was not included in the set.\r\rCONST "
                    attr: 1
                  - text: excluded
                    attr: 3
                  - text: "\rThis value may be passed to the "
                    attr: 1
                  - text: op
                    attr: 2
                  - text: " field of a notifier procedure. It notifies about an exclusion of the range "
                    attr: 1
                  - text: "[from..to]"
                    attr: 2
                  - text: " in a "
                    attr: 1
                  - text: Selection
                    attr: 2
                  - text: ". Before the operation, this range was included in the set.\r\rCONST "
                    attr: 1
                  - text: set
                    attr: 3
                  - text: "\rThis value may be passed to the "
                    attr: 1
                  - text: op
                    attr: 2
                  - text: " field of a notifier procedure. It notifies about a change in a "
                    attr: 1
                  - text: Selection
                    attr: 2
                  - text: " or "
                    attr: 1
                  - text: SET
                    attr: 2
                  - text: ", resulting in a set {from..to}. Any previous selection was cleared.\r\rCONST "
                    attr: 1
                  - text: ok
                    attr: 3
                  - text: "\rThis value may be used as an element of the "
                    attr: 1
                  - text: form
                    attr: 2
                  - text: " set parameter of procedure "
                    attr: 1
                  - text: GetOK
                    attr: 2
                  - text: ". It indicates that the user has pressed the "
                    attr: 1
                  - text: OK
                    attr: 2
                  - text: " button.\r\rCONST "
                    attr: 1
                  - text: "yes"
                    attr: 3
                  - text: "\rThis value may be used as an element of the "
                    attr: 1
                  - text: form
                    attr: 2
                  - text: " set parameter of procedure "
                    attr: 1
                  - text: GetOK
                    attr: 2
                  - text: ". It indicates that the user has pressed the "
                    attr: 1
                  - text: "Yes"
                    attr: 2
                  - text: " button.\r\rCONST "
                    attr: 1
                  - text: "no"
                    attr: 3
                  - text: "\rThis value may be used as an element of the "
                    attr: 1
                  - text: form
                    attr: 2
                  - text: " set parameter of procedure "
                    attr: 1
                  - text: GetOK
                    attr: 2
                  - text: ". It indicates that the user has pressed the "
                    attr: 1
                  - text: "No"
                    attr: 2
                  - text: " button.\r\rCONST "
                    attr: 1
                  - text: cancel
                    attr: 3
                  - text: "\rThis value may be used as an element of the "
                    attr: 1
                  - text: form
                    attr: 2
                  - text: " set parameter of procedure "
                    attr: 1
                  - text: GetOK
                    attr: 2
                  - text: ". It indicates that the user has pressed the "
                    attr: 1
                  - text: Cancel
                    attr: 2
                  - text: " button.\r\rCONST "
                    attr: 1
                  - text: windows32s
                    attr: 3
                  - text: "\rThis is a possible value of variable "
                    attr: 1
                  - text: platform
                    attr: 2
                  - text: ". It indicates that BlackBox is running on Windows 3.1 (Win32s). This platform is not supported anymore.\r\rCONST "
                    attr: 1
                  - text: windows95
                    attr: 3
                  - text: "\rThis is a possible value of variable "
                    attr: 1
                  - text: platform
                    attr: 2
                  - text: ". It indicates that BlackBox is running on Windows 95, Windows 98, Windows 98SE, or Windows 98 ME.\r\rCONST "
                    attr: 1
                  - text: windowsNT3
                    attr: 3
                  - text: "\rThis is a possible value of variable "
                    attr: 1
                  - text: platform
                    attr: 2
                  - text: ". It indicates that BlackBox is running on Windows NT 3.x.\r\rCONST "
                    attr: 1
                  - text: windowsNT4
                    attr: 3
                  - text: "\rThis is a possible value of variable "
                    attr: 1
                  - text: platform
                    attr: 2
                  - text: ". It indicates that BlackBox is running on Windows NT 4.x.\r\rCONST "
                    attr: 1
                  - text: windows2000
                    attr: 3
                  - text: "\rThis is a possible value of variable "
                    attr: 1
                  - text: platform
                    attr: 2
                  - text: ". It indicates that BlackBox is running on Windows 2000 (formerly called Windows NT 5.0).\r\rCONST "
                    attr: 1
                  - text: windows98
                    attr: 3
                  - text: "\rThis is a possible value of variable "
                    attr: 1
                  - text: platform
                    attr: 2
                  - text: ". It indicates that BlackBox is running on one of the Windows 98 flavors (original Windows 98, Windows 98 SE, or Windows 98 ME).\r\rCONST "
                    attr: 1
                  - text: windowsXP
                    attr: 3
                  - text: "\rThis is a possible value of variable "
                    attr: 1
                  - text: platform
                    attr: 2
                  - text: ". It indicates that BlackBox is running on Windows XP.\r\rCONST "
                    attr: 1
                  - text: windowsVista
                    attr: 3
                  - text: "\rThis is a possible value of variable "
                    attr: 1
                  - text: platform
                    attr: 2
                  - text: ". It indicates that BlackBox is running on Windows Vista.\r\rCONST "
                    attr: 1
                  - text: windows7
                    attr: 3
                  - text: "\rThis is a possible value of variable "
                    attr: 1
                  - text: platform
                    attr: 2
                  - text: ". It indicates that BlackBox is running on Windows 7.\r\rCONST "
                    attr: 1
                  - text: windows8
                    attr: 3
                  - text: "\rThis is a possible value of variable "
                    attr: 1
                  - text: platform
                    attr: 2
                  - text: ". It indicates that BlackBox is running on Windows 8.\r\rCONST "
                    attr: 1
                  - text: macOS
                    attr: 3
                  - text: "\rThis is a possible value of variable "
                    attr: 1
                  - text: platform
                    attr: 2
                  - text: ". It indicates that BlackBox is running on Mac OS 7.x, 8.x, or 9.x. This platform is not supported anymore.\r\rCONST "
                    attr: 1
                  - text: macOSX
                    attr: 3
                  - text: "\rThis is a possible value of variable "
                    attr: 1
                  - text: platform
                    attr: 2
                  - text: ". It indicates that BlackBox is running on Mac OS X. This platform is currently not supported. \r\rCONST "
                    attr: 1
                  - text: linux
                    attr: 3
                  - text: "\rThis is a possible value of variable "
                    attr: 1
                  - text: platform
                    attr: 2
                  - text: ". It indicates that BlackBox is running on Linux. This platform is currently not supported. \r\rCONST "
                    attr: 1
                  - text: tru64
                    attr: 3
                  - text: "\rThis is a possible value of variable "
                    attr: 1
                  - text: platform
                    attr: 2
                  - text: ". It indicates that BlackBox is running on Compaq Tru64 Unix.  This platform is currently not supported.\r\rCONST "
                    attr: 1
                  - text: firstPos
                    attr: 3
                  - text: "\rThis value may be used in calls to "
                    attr: 1
                  - text: Tree
                    attr: 2
                  - text: " variables. It indicates that the first child of a node is requested.\r\rCONST "
                    attr: 1
                  - text: lastPos
                    attr: 3
                  - text: "\rThis value may be used in calls to "
                    attr: 1
                  - text: Tree
                    attr: 2
                  - text: " variables. It indicates that the last child of a node is requested.\r\rCONST "
                    attr: 1
                  - text: persistent
                    attr: 3
                  - text: "\rThis value may be used in calls to "
                    attr: 1
                  - text: SetLanguage
                    attr: 2
                  - text: " variables. It indicates that the setting is to be stored in a persistent registry and used again when BlackBox is started the next time.\r\rCONST "
                    attr: 1
                  - text: nonPersistent
                    attr: 3
                  - text: "\rThis value may be used in calls to "
                    attr: 1
                  - text: SetLanguage
                    attr: 2
                  - text: " variables. It indicates that the setting is not to be stored in a persistent registry and thus will not affect BlackBox the next time it is started.\r\r\rTYPE "
                    attr: 1
                  - text: String
                    attr: 3
                  - text: "\rString type for various names to be displayed for the user, or to be entered by the user.\r\r\rTYPE "
                    attr: 1
                  - text: List
                    attr: 3
                  - text: "\rA list type defines a sub range of the "
                    attr: 1
                  - text: INTEGER
                    attr: 2
                  - text: " type, and an item name (a string) for each element of this range. All valid names can be enumerated by indexing from "
                    attr: 1
                  - text: 0
                    attr: 2
                  - text: " upwards until "
                    attr: 1
                  - text: len - 1
                    attr: 2
                  - text: ".\r\r"
                    attr: 1
                  - text: index
                    attr: 3
                  - text: ": INTEGER\tindex >= -1  &  index < len\rCurrently selected item of the list. If "
                    attr: 1
                  - text: index = -1
                    attr: 2
                  - text: " then no element of the list is selected, which may happen e.g. if "
                    attr: 1
                  - text: len = 0
                    attr: 2
                  - text: ".\r\r"
                    attr: 1
                  - text: len
                    attr: 3
                  - text: "-: INTEGER\tlen >= 0\rNumber of elements in the list.\r\rPROCEDURE (VAR l: List) "
                    attr: 1
                  - text: SetLen
                    attr: 3
                  - text: " (len: INTEGER)\rNEW\rMakes sure that the list has at least "
                    attr: 1
                  - text: len
                    attr: 2
                  - text: " elements available. If "
                    attr: 1
                  - text: "len > l.len"
                    attr: 2
                  - text: ", then the size of the existing list is increased as much as necessary. Note that "
                    attr: 1
                  - text: SetItem
                    attr: 2
                  - text: " also increases the list size if necessary, so "
                    attr: 1
                  - text: SetLen
                    attr: 2
                  - text: " is strictly necessary only to shorten the list. "
                    attr: 1
                  - text: SetLen
                    attr: 2
                  - text: " should be called when the size of the list to be constructed is known in advance, to avoid unnecessary allocations and copying in "
                    attr: 1
                  - text: SetItem
                    attr: 2
                  - text: ".\rIf "
                    attr: 1
                  - text: "len > l.len"
                    attr: 2
                  - text: ", the existing "
                    attr: 1
                  - text: l.len
                    attr: 2
                  - text: " elements are not affected by "
                    attr: 1
                  - text: SetLen
                    attr: 2
                  - text: ".\r\rPre\rlen >= 0\t20\r\rPost\rl.len = len\r\rPROCEDURE (VAR l: List) "
                    attr: 1
                  - text: SetItem
                    attr: 3
                  - text: " (index: INTEGER; IN item: String)\rNEW\rGiven an index "
                    attr: 1
                  - text: index
                    attr: 2
                  - text: ", the corresponding item name is set, or overwritten if it had been set earlier. If "
                    attr: 1
                  - text: "index >= l.len"
                    attr: 2
                  - text: " then the length is increased as much as necessary\r\rPre\rindex >= 0\t20\ritem # \"\"\t21\r\rPost\rindex <l.len'\r\tl.len = l.len'\rindex >= l.len'\r\tl.len = index + 1\r\rPROCEDURE (VAR l: List) "
                    attr: 1
                  - text: GetItem
                    attr: 3
                  - text: " (index: INTEGER; OUT item: String)\rNEW\rGiven an index "
                    attr: 1
                  - text: index
                    attr: 2
                  - text: ", the corresponding item name is returned. If "
                    attr: 1
                  - text: index
                    attr: 2
                  - text: " is outside of the valid index range, the empty string \"\" is returned.\r\rPost\rname # \"\" iff index is in 0 .. l.len - 1\r\rPROCEDURE (VAR l: List) "
                    attr: 1
                  - text: SetResources
                    attr: 3
                  - text: " (IN key: ARRAY OF CHAR)\rNEW\rSet up the item list according to entries in a string resource file. For example, "
                    attr: 1
                  - text: "key = \"#System:colors\""
                    attr: 2
                  - text: " would build up an item list (red, green, blue), assuming that resource file "
                    attr: 1
                  - text: System/Rsrc/Strings
                    attr: 2
                  - text: " contains the entries\r\tkey[0]\tred\r\tkey[1]\tgreen\r\tkey[2]\tblue\r\rPre\rkey # \"\"\t20\r\r\rTYPE "
                    attr: 1
                  - text: Selection
                    attr: 3
                  - text: "\rA selection is similar to a "
                    attr: 1
                  - text: List
                    attr: 2
                  - text: ", except that not only one value can be represented, but between 0 and an arbitrary number of values instead, i.e., a selection is a potentially large set of integers. In this context, the term \"list\" denotes all selectable elements, not only the selected ones.\r\r"
                    attr: 1
                  - text: len
                    attr: 3
                  - text: "-: INTEGER\tlen >= 0\rNumber of elements in the list.\r\rPROCEDURE (VAR s: Selection) "
                    attr: 1
                  - text: SetLen
                    attr: 3
                  - text: " (len: INTEGER)\rNEW\rMakes sure that the list has at least "
                    attr: 1
                  - text: len
