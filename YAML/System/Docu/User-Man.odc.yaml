                      h: 142875
                  - text: "\r\r\r"
                    attr: 2
                  - target:
                      name: Overview
                      body:
                        - text: 1 Overview
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rThis document serves as a user's guide for BlackBox programmers. It is not intended as a manual for the end user of software written with the BlackBox Component Builder. Knowledge of the underlying platform's user interface guidelines is assumed.\r\rWith the BlackBox Component Builder, there are no separate environments for developing programs, for testing and debugging programs, or for the distribution of programs. Instead there is only one, truly integrated, environment for all these purposes. A distribution version of a BlackBox application can be created simply by stripping away all tools which are specific to the development process.\r\r"
                    attr: 2
                  - text: "Neither development tools (the Dev-subsystem) nor documentation may be distributed. However, all other parts of BlackBox may be freely distributed along with applications; there are no royalties or other fees."
                    attr: 5
                  - text: "\r\rSuch a customized BlackBox environment always has the basic capabilities of the BlackBox Component Framework's compound document architecture, and of the standard text and form subsystems. Furthermore, it constitutes a standard Windows or Mac OS application, where the (boot) application can be double-clicked, where documents can be dropped onto the application icon to open them, etc.\r\r\"Native\" applications which are only developed under, but not based on, the BlackBox Component Builder can be created as well. For this purpose, a linker tool is provided. Normally, Component Pascal modules are linked and loaded dynamically, such that a separate linker is not strictly necessary. However, it is possible even for pure BlackBox applications to link or pack all or some of their modules together, in order to reduce the number of files to distribute. For further information about this topic, refer to the document "
                    attr: 2
                  - link:
                      target: "StdCmds.OpenBrowser('Dev/Docu/P-S-I', 'Platform-Specific Issues')"
                      body:
                        - text: Platform-Specific Issues
                          attr: 3
                      attr: 2
                      w: 131250
                      h: 142875
                  - text: ".\r\rOn-line documentation:\rText stretches which are blue and underlined are hyperlinks, and can be followed by clicking on them.\r\rWhen working in the BlackBox Component Builder environment for the first time, the following may be helpful to remember: almost all modifications to BlackBox documents are undoable, making it quite safe to try out a feature. In general, "
                    attr: 2
                  - text: multilevel undo/redo
                    attr: 5
                  - text: " is available, i.e., not only one, but several commands can be undone; as many as memory permits.\r\rMac OS:\rWhenever the system is working on the completion of some command for more than a fraction of a second, BlackBox changes the cursor to a special "
                    attr: 2
                  - text: busy cursor
                    attr: 5
                  - text: " sequence, i.e., a cursor which changes its shape as long as the command is running. However, this does not guarantee that the executing program does make any progress. For example, the busy cursor will keep advancing, even if the program entered an endless loop. Use "
                    attr: 2
                  - text: command-option-.
                    attr: 5
                  - text: " to terminate such a program. Note that it may take a few seconds before you see a reaction.\r\rWindows:\rAn endless loop can be terminated with "
                    attr: 2
                  - text: ctrl-break
                    attr: 5
                  - text: ".\r\r\r"
                    attr: 2
                  - target:
                      name: Conventions
                      body:
                        - text: 2 Conventions
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rThe contents of this documentation mostly applies to both the Windows and Mac OS versions of the BlackBox Component Builder. Where there are differences, e.g., a feature only available on one platform, this is clearly indicated, e.g., as in the previous paragraph. In order to reduce the number of such platform-specific remarks, a few notational conventions are followed:\r\r"
                    attr: 2
                  - text: ꀢ
                    attr: 2
                    wide: true
                  - text: " Mac OS folders are called (sub)directories.\r"
                    attr: 2
                  - text: ꀢ
                    attr: 2
                    wide: true
                  - text: " Path names contain \"/\" as directory separators, as in Unix and in the World-Wide Web.\r"
                    attr: 2
                  - text: ꀢ
                    attr: 2
                    wide: true
                  - text: " File and directory names contain both capital and small letters.\r"
                    attr: 2
                  - text: ꀢ
                    attr: 2
                    wide: true
                  - text: " In chapters which are not Windows-specific, document file names are given without the \".odc\" suffix used in Windows. Thus the file name "
                    attr: 2
                  - text: Text/Rsrc/Find
                    attr: 5
                  - text: " under Windows corresponds to "
                    attr: 2
                  - text: Text\Rsrc\Find.odc
                    attr: 5
                  - text: ", and to "
                    attr: 2
                  - text: "Text:Rsrc:Find"
                    attr: 5
                  - text: " under Mac OS.\r"
                    attr: 2
                  - text: ꀢ
                    attr: 2
                    wide: true
                  - text: " "
                    attr: 2
                  - text: modifier
                    attr: 5
                  - text: " key: on Windows this is the "
                    attr: 2
                  - text: ctrl
                    attr: 5
                  - text: " key, on Mac OS this is the "
                    attr: 2
                  - text: option
                    attr: 5
                  - text: " key.\r"
                    attr: 2
                  - text: ꀢ
                    attr: 2
                    wide: true
                  - text: " menu commands: "
                    attr: 2
                  - text: "M->I"
                    attr: 5
                  - text: " is a shorthand notation for menu item "
                    attr: 2
                  - text: I
                    attr: 5
                  - text: " in menu "
                    attr: 2
                  - text: M
                    attr: 5
                  - text: ", e.g. "
                    attr: 2
                  - text: "File->New"
                    attr: 5
                  - text: ".\r"
                    attr: 2
                  - text: ꀢ
                    attr: 2
                    wide: true
                  - text: " Differences between Windows and Mac OS may be denoted in three different ways: large differences are handled by giving two different sections, one for each platform. In this case, the section title ends in \"(Windows only)\" or \"(Mac OS only)\". If not indicated otherwise, the next section will apply to both platforms again. Smaller differences are described as short notes, typically there is a note on Windows-specific behavior, followed by a note on Mac OS-specific behavior. There is an example at the end of the previous section. For small differences, both versions are given in the same sentence, e.g. \"To drag & pick, hold down the "
                    attr: 2
                  - text: alt
                    attr: 5
                  - text: " key (Windows) / "
                    attr: 2
                  - text: command
                    attr: 5
                  - text: " key (Mac OS) while dragging.\"\r\r\r"
                    attr: 2
                  - target:
                      name: Installation Windows
                      body:
                        - text: 3 Installation (Windows only)
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rThe BlackBox Component Builder requires a PC with an i386 or better, with Windows NT, Windows 2000, Windows XP, or Windows Server 2003.\rA two-button mouse is sufficient, but a three-button mouse is recommended.\r\rThe resulting "
                    attr: 2
                  - text: BlackBox
                    attr: 5
                  - text: " directory contains several files and directories:\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      lead: 11500
                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 1440000 }
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "Files:\rBlackBox.exe\tThe BlackBox Component Framework boot application.\rBlackBox.exe.manifest\tManifest file for BlackBox.exe.\rEmpty.odc\tEmpty BlackBox Component Builder document.\rTour.odc\tA quick tour through the BlackBox Component Builder.\runins000.dat\tData file for BlackBox Component Builder Uninstall.\runins000.exe\tBlackBox Component Builder Uninstall.\r\rDirectories:\rCom\t"
                    attr: 2
                  - text: Direct-To-COM Compiler
                    attr: 6
                  - text: ".\rComm\tCommunications subsystem.\rCtl\tOLE Automation support.\rDev\tDevelopment subsystem.\rDocu\tOn-line documentation not specific to a particular module or subsystem.\rForm\tForm subsystem with the visual designer.\rHost\tPrivate code of BlackBox.\rObx\tObx subsystem, a collection of examples.\rOle\tOLE compound document support.\rSql\tSql subsystem for accessing relational databases.\rStd\tA number of command packages available to the user.\rSystem\tCore of the BlackBox Component Framework.\rText\tText subsystem, with the standard document/program editor.\rWin\tInterface modules for direct Windows API access.\rXhtml\tExporter for text to HTML conversion.\r\r\r"
                    attr: 2
                  - target:
                      name: Server version
                      body:
                        - text: 4 Server installation (Windows only)
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rIf several developers use BlackBox on the same machine(s), it becomes cumbersome to save one's work and clean up after the end of each session, so that the next developer gets a \"clean\" system again. It is even more cumbersome to start working with a copy that hasn't been cleaned up correctly by the previous user. To solve this problem, server support is available for BlackBox.\rBlackBox can be installed and maintained on one central server, while developers use an arbitrary number of client workstations on a local-area network. Preferably, each developer has his or her own working directory on the server (account).\rNote that with the Classic Edition of BlackBox you need seperate licenses for each developer seat using the server installation.\rFor the installation, follow these steps:\r\r1) Install BlackBox in a directory on the server machine, using "
                    attr: 2
                  - text: Setup.exe
                    attr: 5
                  - text: ". The directory must be "
                    attr: 2
                  - text: shared
                    attr: 5
                  - text: " on the network but the access may be restricted to "
                    attr: 2
                  - text: read only
                    attr: 5
                  - text: ".\r\r2) For each workstation / user, create a working directory (either on the server or on the client). The user should have "
                    attr: 2
                  - text: read/write
                    attr: 5
                  - text: " access to this directory. The directory may be empty.\r\r3) For each workstation, create a "
                    attr: 2
                  - text: shortcut
                    attr: 5
                  - text: " with the following contents:\r\r  Command Line (Target): "
                    attr: 2
                  - text: "<BlackBoxDir>"
                    attr: 5
                  - text: "\\BlackBox.exe /Use "
                    attr: 2
                  - text: "<WorkDir>"
                    attr: 5
                  - text: "\r  Working Directory (Start in): "
                    attr: 2
                  - text: "<WorkDir>"
                    attr: 5
                  - text: "\r\rwhere <BlackBoxDir> stands for the full path name of the directory where BlackBox is installed (on the server), and <WorkDir> is the path of the working directory of the actual machine (on the client or on the server). The latter must not end with a backslash (\"\\\"). Use double quotation marks to delimit path names that contain spaces.\r\rExample:\r  Command Line (Target): \"C:\\Program Files\\BlackBox\\BlackBox.exe\" /Use C:\\BlackBox\r  Working Directory (Start in): C:\\BlackBox\r\rThese features, originally introduced for situations where multiple users want to develop with BlackBox, can also be useful in a single-user environment. The idea is to have one directory with the original installation of BlackBox, and a separate directory for all the developer-specific files. If the user opens a file, it is first searched in his or her working directory. If it isn't found there, the corresponding file in the \"server directory\" is opened. When a file is saved, it is always saved in the working directory. This makes it easy to set up entirely separate projects simply by creating separate working directories for them. When an upgrade of BlackBox comes out, only the central \"server directory\" needs to be upgraded. If you use the server features in this way, without having multiple developers using the same installation simultaneously, then "
                    attr: 2
                  - text: "no"
                    attr: 5
                  - text: " special license is required.\r\r\r"
                    attr: 2
                  - target:
                      name: Deinstallation
                      body:
                        - text: 5 Deinstallation
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 1
                  - text: "In the Windows Control Panel, choose "
                    attr: 2
                  - text: Add/Remove Programs
                    attr: 5
                  - text: ". In the displayed list, locate the entry called "
                    attr: 2
                  - text: BlackBox
                    attr: 5
                  - text: " and select the "
                    attr: 2
                  - text: Change/Remove
                    attr: 5
                  - text: " button. Follow the instructions on the screen.\r\r\r"
                    attr: 2
                  - target:
                      name: Windows
                      body:
                        - text: "6 Document Windows, Tool Windows, Auxiliary Windows"
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 1
                  - text: "There are three kinds of windows in BlackBox: document windows, tool windows, and auxiliary windows.\r\rA document window may contain e.g. a text or a form layout, or any other kind of visual object (\"view\"). When the contents of a document window have been modified (made \"dirty\") and the user tries to close the window (or quit the application), the system asks whether it should save the document.\r\rA tool window allows to invoke actions on some document window "
                    attr: 2
                  - text: underneath
                    attr: 5
                  - text: " it. Typically, tool windows are used for modeless dialog boxes.\r\rWindows:\rTool windows look the same way as dialog boxes.\r\rMac OS:\rTool windows look the same way as modeless dialog boxes, i.e. the same way as document windows. In order to make it possible for the user to distinguish tool and document windows, titles of tool windows are put between \"<<\" and \">>\" brackets.\r\rAuxiliary windows are used mainly to hold temporary data for information purposes, e.g., the output of a browser. The contents of an auxiliary window may be editable, but the system does not ask whether a modified auxiliary window should be stored, i.e., it is temporary in nature. The "
                    attr: 2
                  - text: Log
                    attr: 5
                  - text: " window is an example of an auxiliary window.\r\rWindows:\rA document window is decorated with the BlackBox document icon, while an auxiliary window is decorated with the BlackBox application icon. A tool window is not decorated with an icon.\r\rMac OS:\rAuxiliary windows look the same way as document windows. In order to make it possible for the user to distinguish auxiliary and document windows, the titles of auxiliary windows are put between \"[\" and \"]\" brackets.\r\r\r"
                    attr: 2
                  - target:
                      name: Document Size
                      body:
                        - text: 7 Document Size
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rThe size of a document, or more exactly of its outermost (\"root\") view, can be updated in several ways. Its width, or independently its height, can be bound either to a fixed size, to the paper as defined in the "
                    attr: 2
                  - text: Page Setup
                    attr: 5
                  - text: " dialog box, or to the window's current size.\r\rFor example, text views by default have a width bound to the paper page size, and a height bound to the window size. Documentation texts are often bound to the current window size in both dimensions, so that they automatically resize with the window. Such bindings can be changed with the "
                    attr: 2
                  - text: "Tools->Document Size..."
                    attr: 5
                  - text: " dialog box.\r\r\r"
                    attr: 2
                  - target:
                      name: Menu Configuration
                      body:
                        - text: 8 Menu Configuration
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 1
                  - text: "The configurable menus can be inspected using "
                    attr: 2
                  - text: "Info->Menus"
                    attr: 5
                  - text: ". The displayed text can be edited, and the current menu configuration updated accordingly ("
                    attr: 2
                  - text: "Info->Update Menus"
                    attr: 5
                  - text: "). To make changes to the menus permanent, the menu text must be saved to disk. The file "
                    attr: 2
                  - text: System/Rsrc/Menus
                    attr: 5
                  - text: " contains the startup menu configuration, i.e., the text which is opened when "
                    attr: 2
                  - text: "Info->Menus"
                    attr: 5
                  - text: " is executed.\r\rThe menu text consists of a sequence of menu definitions, which themselves consist of sequences of menu items. An example is the following extract of a possible "
                    attr: 2
                  - text: Dev
                    attr: 5
                  - text: " menu definition:\r "
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 72000 }
                        - { stop: 1260000 }
                        - { stop: 1476000 }
                        - { stop: 4104000 }
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "MENU "
                    attr: 1
                  - text: "\"Dev\"\r\t\"Compile\"\t\"K\"\t\"DevCompiler.Compile\"\t\"TextCmds.FocusGuard\"\r\t\"Compile Selection\"\t\"\"\t\"DevCompiler.CompileSelection\"\t\"TextCmds.SelectionGuard\"\r\t"
                    attr: 2
