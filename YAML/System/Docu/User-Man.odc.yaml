                  - text: SEPARATOR
                    attr: 1
                  - text: "\r\t\"Insert Commander\"\t\"\"\t\"DevCommanders.Deposit; StdCmds.PasteView\"\t\"StdCmds.PasteViewGuard\"\r\t\"Execute\"\t\"\"\t\"DevDebug.Execute\"\t\"TextCmds.SelectionGuard\"\r\t\"Unload\"\t\"\"\t\"DevDebug.Unload\"\t\"TextCmds.SelectionGuard\"\r"
                    attr: 2
                  - text: END
                    attr: 1
                  - text: "\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      lead: 11500
                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000001
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\rEvery menu has a name, in this case it is "
                    attr: 2
                  - text: Dev
                    attr: 5
                  - text: ". Optionally, the menu name can be followed by a menu type, e.g.,\r\r"
                    attr: 2
                  - text: "MENU "
                    attr: 1
                  - text: "\"Text\" (\"TextViews.View\")\r\rA typed menu is only installed in the menu bar as long as the current focus has a matching type, i.e., it is context-sensitive. The other menus are always available.\rA menu's type is usually simply the name of a view type. This is only a convention, however. It guarantees that menu types are globally unique, so that no clashes occur.\r\rMac OS:\rStandard menus, i.e., "
                    attr: 2
                  - text: File
                    attr: 5
                  - text: ", "
                    attr: 2
                  - text: Edit
                    attr: 5
                  - text: ", "
                    attr: 2
                  - text: Font
                    attr: 5
                  - text: ", "
                    attr: 2
                  - text: Attributes
                    attr: 5
                  - text: ", and "
                    attr: 2
                  - text: Windows
                    attr: 5
                  - text: " are predefined and not part of a menu configuration text.\r\rThere are two kinds of menu items: normal items and separators. A separator optically organizes a menu into different groups of items. Normal menu items consist of four strings: a label, a keyboard shortcut, an action command, and a guard command. The label is the string presented to the user in the menu. A \"&\" character indicates which character of the label should be underlined (this is a Windows feature, and not available on Mac OS). If you want a \"&\" to appear, you should write a \"&&\" (this also holds for the Mac OS, i.e., the syntax is the same for both platforms).\r\rThe keyboard shortcut, which may be empty, allows to associate a keyboard key to the menu item. The action string contains the command sequence which is activated when the menu item is executed. The guard string, which may be empty, contains a command which is called to determine whether the item is currently enabled or disabled, checked or unchecked, or to set up a current item name which overrides the normal name (e.g., to toggle between "
                    attr: 2
                  - text: Show XYZ
                    attr: 5
                  - text: " and "
                    attr: 2
                  - text: Hide XYZ
                    attr: 5
                  - text: ").\r\rNote: the menu guard is executed for example when the user clicks in the menu bar. This causes the guard's module to become loaded, even if the user never invokes the corresponding command.\r\rNote: if the guard's module cannot be loaded, the menu item remains disabled and the guard is not executed again (for performance reasons). If the module's code becomes available later, e.g., because its module was later compiled, the menu item will remain disabled. To force a re-evaluation of the guard, use the "
                    attr: 2
                  - text: "Dev->Flush Resources"
                    attr: 5
                  - text: " command.\r\rNote: the standard menu configuration uses all letters of the alphabet and the digit \"0\" as keyboard shortcuts. Digits \"1\" to \"9\" are not used. The assignment of keyboard shortcuts, like the whole menu configuration, can easily be adapted to specific needs by appropriately changing the menu text.\r\rWindows:\rThe following keyboard shortcuts can be specified in the keyboard shortcut string (they are ignored under Mac OS):\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      lead: 11500
                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 144000 }
                        - { stop: 1584000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\t\"A\"..\"Z\", \"0\"..\"9\"\tmodifier + key\r\t\"*A\"..\"*Z\", \"*0\"..\"*9\"\tshift + modifier + key\r\t\"F1\"..\"F12\"\tfunction key\r\t\"^F1\"..\"^F12\"\tmodifier + function key\r\t\"*F1\"..\"*F12\"\tshift + function key\r\t\"*^F1\"..\"*^F12\"\tshift + modifier + function key\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      lead: 11500
                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000001
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\rWindows:\rContext menus (pop-up menus activated by the right mouse button) are specified by giving them the name \"*\" instead of a true name. At most one context menu may be untyped, all other context menus must be typed.\rFor example, just add the line\r\r        \"Open &Module\"  \"\"      \"DevCmds.OpenModuleList\"        \"TextCmds.SelectionGuard\"\r\rto the menu  MENU \"*\" (\"TextViews.View\")  in the file "
                    attr: 2
                  - text: Text/Rsrc/Menus
                    attr: 5
                  - text: ". This adds a (text-)context menu item for opening the sources of the module(s) whose name(s) is (are) selected.\r\rIt is possible to put all menu specifications in the menu text "
                    attr: 2
                  - text: System/Rsrc/Menus
                    attr: 5
                  - text: ". However, it is a better idea to keep the menu specifications that refer to a subsystem's commands in this subsystem's resource directory. For example, the "
                    attr: 2
                  - text: Text
                    attr: 5
                  - text: " menu could be specified in "
                    attr: 2
                  - text: Text/Rsrc/Menus
                    attr: 5
                  - text: ". In this case, "
                    attr: 2
                  - text: System/Rsrc/Menus
                    attr: 5
                  - text: " needs a so-called include statement that tells the menu configuration mechanism where to look for further menus:\r\r\t"
                    attr: 2
                  - text: INCLUDE
                    attr: 1
                  - text: " \"Text\"\r\rThe explicit include statements allow to define the exact order in which menus appear in a menu bar. The command\r\r\t"
                    attr: 2
                  - text: INCLUDE
                    attr: 1
                  - text: " \"*\"\r\rincludes all menus that have not been mentioned explicitly before (directly or via an include statement). It is a \"catch all\" for menus, and it is recommended to put it at the end of the "
                    attr: 2
                  - text: System/Rsrc/Menus
                    attr: 5
                  - text: " text. For example, a typical "
                    attr: 2
                  - text: System/Rsrc/Menus
                    attr: 5
                  - text: " text may look as follows:\r\r\t"
                    attr: 2
                  - text: INCLUDE
                    attr: 7
                  - text: " \"Dev\"\r\t"
                    attr: 2
                  - text: INCLUDE
                    attr: 7
                  - text: " \"Form\"\r\t"
                    attr: 2
                  - text: INCLUDE
                    attr: 7
                  - text: " \"Sql\"\r\t"
                    attr: 2
                  - text: INCLUDE
                    attr: 7
                  - text: " \"Obx\"\r\t"
                    attr: 2
                  - text: INCLUDE
                    attr: 7
                  - text: " \"Text\"\r\t"
                    attr: 2
                  - text: INCLUDE
                    attr: 1
                  - text: " \"*\"\r\rNote: when you have edited a menu text different from "
                    attr: 2
                  - text: System/Rsrc/Menus
                    attr: 5
                  - text: ", then don't execute the command "
                    attr: 2
                  - text: "Info->Update Menus"
                    attr: 5
                  - text: ", because this will cause the installation of the edited menu text as root menu text, meaning that you lose all other subsystems' menus. In particular, it is inconvenient if you lose the "
                    attr: 2
                  - text: Info
                    attr: 5
                  - text: " menu in this way, because you then have to leave and restart the application before you can edit and install menus again...\rSo when you have edited some such other menu text, then save it and execute "
                    attr: 2
                  - text: "Info->Update Menus"
                    attr: 5
                  - text: ". This command will re-install all menus, starting with the "
                    attr: 2
                  - text: System/Rsrc/Menus
                    attr: 5
                  - text: " like it does when starting up the application.\r\rSee also modules "
                    attr: 2
                  - link:
                      target: "StdCmds.OpenBrowser('Std/Docu/MenuTool', 'StdMenuTool Docu')"
                      body:
                        - text: StdMenuTool
                          attr: 3
                      attr: 2
                      w: 131250
                      h: 142875
                  - text: " and "
                    attr: 2
                  - link:
                      target: "StdCmds.OpenBrowser('Std/Docu/Cmds', 'StdCmds Docu')"
                      body:
                        - text: StdCmds
                          attr: 3
                      attr: 2
                      w: 131250
                      h: 142875
                  - text: ". The command package modules of all subsystems export commands that may be used in a menu. Consult the various modules' on-line documentation, e.g., "
                    attr: 2
                  - text: Text/Docu/Cmds
                    attr: 5
                  - text: " for module "
                    attr: 2
                  - text: TextCmds
                    attr: 5
                  - text: ".\r\r\r"
                    attr: 2
                  - target:
                      name: String Resources
                      body:
                        - text: 9 String Resources
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rString resources are files which define a mapping between strings, e.g., the string \"untitled\" may be mapped to \"sans titre\". This is useful to prevent hard-wiring textual messages in the program code, in order to make later editing of these messages possible without requiring a recompilation. From a programmer's point of view, string translation is done in several procedures of module "
                    attr: 2
                  - text: Dialog
                    attr: 5
                  - text: ", e.g., "
                    attr: 2
                  - text: Dialog.MapString
                    attr: 5
                  - text: ". String resource files can be normal BlackBox text documents, which simply consist of the keyword STRINGS followed by a sequence of lines; each line contains a string (the key), a TAB, another string (to which the key is mapped), and a carriage return, e.g.,\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      lead: 11500
                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 720000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "STRINGS\runtitled\tsans titre\ropen\touvre\rclose\tferme\r\rThere can be one string resource file per subsystem (cf. "
                    attr: 2
                  - link:
                      target: "StdCmds.OpenBrowser('Docu/Tut-3.odc', 'BlackBox Design Practices');StdLinks.ShowTarget('subsystems')"
                      body:
                        - text: Modules and Subsystems
                          attr: 8
                      attr: 8
                      w: 121725
                      h: 133350
                  - text: "). For example, a call of\r\rDialog.MapString(\"#Form:CntrlInstallFailed\", resultString)\r\rin a program maps the string \"CntrlInstallFailed\" according to the table in the "
                    attr: 2
                  - text: Form/Rsrc/Strings
                    attr: 5
                  - text: " file. In the English version, the mapping is \"form controller installation failed\". In a German version, \"CntrlInstallFailed\" might be mapped to \"Der Form Controller konnte nicht installiert werden\".\r\r"
                    attr: 2
                  - text: "\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 0
                      lead: 11500
                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000001
                      attr: 1
                      w: 360000000
                      h: 444500
                  - target:
                      name: Standard Commands
                      body:
                        - text: 10 Standard Commands
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rIn this section, the menu items of the standard menus "
                    attr: 2
                  - text: File
                    attr: 5
                  - text: ", "
                    attr: 2
                  - text: Edit
                    attr: 5
                  - text: ", "
                    attr: 2
                  - text: Font
                    attr: 5
                  - text: " (Mac OS), "
                    attr: 2
                  - text: Attributes
                    attr: 5
                  - text: ", and "
                    attr: 2
                  - text: Window(s)
                    attr: 5
                  - text: " are described. For a menu item which is not permanently enabled, the condition for enabling it is specified. Often, such a "
                    attr: 2
                  - text: guard
                    attr: 5
                  - text: " command is one of the commands exported by module "
                    attr: 2
                  - text: StdCmds
                    attr: 5
                  - text: ".\r\rWindows:\rUnder Windows, the standard menu items can be configured in the same way as all other menu items, by editing the "
                    attr: 2
                  - text: System/Rsrc/Menus
                    attr: 5
                  - text: " document. Most standard menu items are calls to a command exported by module "
                    attr: 2
                  - text: StdCmds
                    attr: 5
                  - text: ".\r\r\r"
                    attr: 2
                  - target:
                      name: File Menu
                      body:
                        - text: 10.1 File Menu
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\r\r"
                    attr: 2
                  - text: New
                    attr: 1
                  - text: "\rCommand: StdCmds.New\rGuard:\rOpens a new document window containing an empty text view.\r"
                    attr: 2
                  - text: "\rOpen..."
                    attr: 1
                  - text: "\rCommand: HostCmds.Open\rGuard:\rOpens the standard file "
                    attr: 2
                  - text: Open
                    attr: 5
                  - text: " dialog box.\r\rMac OS:\rOnly BlackBox documents (i.e., Mac OS files with file type = \"oODC\"), directories, and volumes are shown. By clicking the "
                    attr: 2
                  - text: More files
                    attr: 5
                  - text: " check box, all other files for which there are converters are shown as well. In the "
                    attr: 2
                  - text: Format
                    attr: 5
                  - text: " pop-up menu, a converter can be chosen in case there are several possible importers.\r\r"
                    attr: 2
                  - text: Open Stationery...
                    attr: 1
                  - text: "\rCommand: StdCmds.OpenStationery\rGuard:\rOpens the standard file "
                    attr: 2
                  - text: Open
                    attr: 5
                  - text: " dialog box, through which a stationery (i.e., template) file can be opened.\r\rMac OS:\rOnly BlackBox documents (i.e., Mac OS files with file type = \"oODC\"), directories, and volumes are shown. By clicking the "
                    attr: 2
                  - text: More files
                    attr: 5
                  - text: " check box, all other files for which there are converters are shown as well. In the "
                    attr: 2
                  - text: Format
                    attr: 5
                  - text: " pop-up menu, a converter can be chosen in case there are several possible importers.\r\r"
                    attr: 2
                  - text: Close
                    attr: 1
                  - text: "\rCommand: HostCmds.Close\rGuard: StdCmds.WindowGuard\rCloses the front window. If the window is a primary document window and its contents has been modified (\"dirty\"), the user is asked whether to save the window's contents in a file.\r\r"
                    attr: 2
                  - text: Save
                    attr: 1
                  - text: "\rCommand: HostCmds.Save\rGuard: HostCmds.SaveGuard\rSaves the front window's contents to a file. If the window's contents has not yet been saved to a file, the user is asked for a file name.\r\r"
                    attr: 2
                  - text: Save As...
                    attr: 1
                  - text: "\rCommand: HostCmds.SaveAs\rGuard: StdCmds.WindowGuard\rSaves the front window's contents to a file. The user is always asked for a file name. After the command, you continue working with the new file.\r\r"
                    attr: 2
                  - text: Save Copy As...
                    attr: 1
                  - text: "\rCommand: HostCmds.SaveCopyAs\rGuard: StdCmds.WindowGuard\rSaves the front window's contents to a file. The user is always asked for a file name. After the command, you continue working with the old file.\r\r"
                    attr: 2
                  - text: Page Setup...
                    attr: 1
                  - text: "\rCommand: HostDialog.InitPageSetup; StdCmds.OpenToolDialog('Host/Rsrc/Cmds', 'Page Setup')\rGuard: StdCmds.WindowGuard\rAsks the user for the page information of the front window's document, for later printing.\r\rIn addition to the data which is specific to the current printer driver, the margins can be set (the distances between the paper's edges and the printed area), and a standard header can be switched on or off. The standard header consists of a page number and a date.\r\rMac OS:\rFor some printer drivers, you should switch on greyscale printing (not black/white), otherwise printing may produce entirely black pages.\r\r"
                    attr: 2
                  - text: Print...
                    attr: 1
                  - text: "\rCommand: HostCmds.Print\rGuard: HostCmds.PrintGuard\rAsks the user for printing information, and then creates a print-out accordingly.\r\r"
                    attr: 2
                  - text: Send Document...
                    attr: 1
                  - text: " (Windows)\rCommand: HostMail.SendDocument\rGuard: HostMail.SendDocumentGuard\rSends the front window's document as an electronic mail.\r\r"
                    attr: 2
                  - text: Send Note...
                    attr: 1
                  - text: " (Windows)\rCommand: HostMail.SendNote\rGuard: HostMail.SendNoteGuard\rSends a note as an electronic mail. The not is initialized with the text selection, if there is one.\r\r"
                    attr: 2
                  - text: Exit
                    attr: 1
                  - text: " (Windows)\r"
                    attr: 2
                  - text: Quit
                    attr: 1
                  - text: " (Mac OS)\rCommand: HostCmds.Exit\rGuard:\rTerminates the application. If windows with modified contents are open, the user is asked whether to save them in files.\r\r\r"
                    attr: 2
                  - target:
                      name: Edit Menu
                      body:
                        - text: 10.2 Edit Menu
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\r\r"
                    attr: 2
                  - text: "Undo [...]"
                    attr: 1
                  - text: "\rCommand: StdCmds.Undo\rGuard: StdCmds.UndoGuard\rReverses the effect of the most recent modifying operation. Usually, the kind of operation is given behind the word \"Undo\", e.g., "
                    attr: 2
                  - text: Undo Paste
                    attr: 5
                  - text: ". Undo can be activated several times, until the opening, creation, or most recent saving of the document. Under low-memory conditions, the number of undoable operations may become reduced.\r\r"
                    attr: 2
                  - text: "Redo [...]"
                    attr: 1
                  - text: "\rCommand: StdCmds.Redo\rGuard: StdCmds.RedoGuard\rRestores the effect of the most recently undone operation. Usually, the kind of operation is given behind the word \"Redo\", e.g., "
                    attr: 2
                  - text: Redo Paste
                    attr: 5
                  - text: ".\r\r"
                    attr: 2
                  - text: Cut
                    attr: 1
                  - text: "\rCommand: HostCmds.CutGuard\rGuard: HostCmds.Cut\rDeletes the selection and puts a copy into the clipboard.\r\r"
                    attr: 2
                  - text: Copy
                    attr: 1
                  - text: "\rCommand: HostCmds.CopyGuard\rGuard: HostCmds.Copy\rPuts a copy of the selection into the clipboard.\r\r"
                    attr: 2
                  - text: Paste
                    attr: 1
                  - text: "\rCommand: HostCmds.PasteGuard\rGuard: HostCmds.Paste\rPastes a copy of the clipboard's contents at the caret position. If the focus view contains the same kind of data as the clipboard, the data is inserted directly into the focus view's data. Otherwise, and if the focus view is a container, a copy of the whole view containing the clipboard data is inserted into the focus view's data.\r\r"
                    attr: 2
                  - text: Delete
                    attr: 1
                  - text: " (Windows)\rCommand: StdCmds.Clear\rGuard: StdCmds.CutGuard\rDeletes the selection, without putting it into the clipboard.\r\r"
                    attr: 2
                  - text: Copy Properties
                    attr: 1
                  - text: "\rCommand: StdCommands.CopyProp\rGuard: StdCmds.SelectionGuard\rCopies the properties of the current selection. This command has no effect on the clipboard contents.\r\r"
                    attr: 2
                  - text: Paste Properties
                    attr: 1
                  - text: "\rCommand: StdCommands.PasteProp\rGuard: StdCmds.SelectionGuard\rPastes the properties that were copied most recently (see "
                    attr: 2
                  - text: CopyProperties
                    attr: 5
                  - text: ").\r\r"
                    attr: 2
                  - text: Paste Object
                    attr: 1
                  - text: " (Windows)\r"
                    attr: 2
                  - text: Paste as Part
                    attr: 1
                  - text: " (Mac OS)\rCommand: HostCmds.PasteObject\rGuard: HostCmds.PasteObjectGuard\rPastes a copy of the clipboard's contents at the caret position. If the focus view is a container, a copy of the whole view containing the clipboard data is inserted into the focus view's data.\r\r"
                    attr: 2
                  - text: Paste Special...
                    attr: 1
                  - text: " (Windows)\rCommand: HostCmds.PasteSpecial\rGuard: HostCmds.PasteObjectGuard\rOpens a dialog box, which allows to choose the data type of the view in the clipboard, if the view supports several possible types.\r\r"
                    attr: 2
                  - text: Paste to Window
                    attr: 1
                  - text: " (Windows)\rCommand: HostCmds.PasteToWindowGuard\rGuard: HostCmds.PasteToWindow\rOpens a copy of the clipboard's contents into a new document window.\r\r"
                    attr: 2
                  - text: Insert Object...
                    attr: 1
                  - text: " (Windows)\rCommand: OleClient.PasteSpecial\rGuard: StdCmds.PasteViewGuard\rOpens a dialog box which shows all installed OLE servers. When one of them is chosen, an object of this type is allocated and inserted into the front window's contents.\r\r"
                    attr: 2
                  - text: Object Properties...
                    attr: 1
                  - text: " (Windows)\rCommand: HostMenus.ObjProperties\rGuard: HostMenus.PropertiesGuard\rOpens an appropriate property sheet for the selected view.\r\r"
                    attr: 2
                  - text: Object
                    attr: 1
                  - text: " (Windows)\rCommand: HostMenus.ObjectMenu\rGuard: HostMenus.ObjectMenuGuard\rShows a submenu with commands for the selected view. These commands, which are determined by the selected view itself, are called \"verbs\". Usually, the first two verbs are "
                    attr: 2
                  - text: Edit
                    attr: 5
                  - text: " and "
                    attr: 2
                  - text: Open
                    attr: 5
                  - text: ":\r\r\t"
                    attr: 2
                  - text: Edit
                    attr: 1
                  - text: "\r\tMakes the selected view the current focus view.\r\r\t"
                    attr: 2
                  - text: Open
                    attr: 1
                  - text: "\r\tOpens a new window showing a second view to the selected view.\r\r\t+ other verbs defined by the selected view.\r\r"
                    attr: 2
                  - text: Clear
                    attr: 1
                  - text: " (Mac OS)\rCommand: StdCmds.Clear\rGuard: StdCmds.CutGuard\rDeletes the selection, without putting it into the clipboard.\r\r"
                    attr: 2
                  - text: Select Document
                    attr: 1
                  - text: "\rCommand: StdCmds.SelectDocument\rGuard: StdCmds.WindowGuard\rSelects the root view of the front window's document as a singleton. Note the difference to "
                    attr: 2
                  - text: Select All
                    attr: 5
                  - text: ", which selects the latter's contents instead (or rather the contents of whatever view is currently the focus).\r\r"
                    attr: 2
                  - text: Select All
                    attr: 1
                  - text: "\rCommand: StdCmds.SelectAll\rGuard: StdCmds.SelectAllGuard\rSelects the whole focus view's contents.\r\r"
                    attr: 2
                  - text: Select Next Object
                    attr: 1
                  - text: " (Windows)\rCommand: StdCmds.SelectNextView\rGuard: StdCmds.ContainerGuard\rIf a view in the container is selected: select the next view.\rIf the last view is selected or there is no singleton selection: select the first view.\r\r"
                    attr: 2
                  - text: Part Info
                    attr: 1
                  - text: " (Mac OS)\rCommand: HostCmds.PartInfo\rGuard: StdCmds.SingletonGuard\rOpens a modeless dialog box with some information about the selected view.\r\r"
                    attr: 2
                  - text: View In Window
                    attr: 1
                  - text: " (Mac OS)\rCommand: HostCmds.ViewInWindow\rGuard: StdCmds.WindowGuard\rOpens a new window on the front window's focus view. The subwindow's title is put between \"(\" and \")\" parentheses. This command is similar to \"New Window\" (see below), except that it opens a new window on the currently focused view, which may or may not be the root view (as in \"New Window\").\r\r"
                    attr: 2
                  - text: Preferences...
                    attr: 1
                  - text: " (Windows)\rCommand: HostDialog.InitPrefDialog; StdCmds.OpenToolDialog('HostDialog.prefs', 'Preferences')\rGuard:\rAllows to define several parameters: whether TrueType metrics are used (for best printing results), whether screen updates are performed during scrolling, the font used as default for texts, the font used as default for controls, and whether the status bar is visible or not.\r\r\r"
                    attr: 2
                  - target:
                      name: Font Menu
                      body:
                        - text: 10.3 Font Menu
                          attr: 1
                        - text: " (Mac OS)"
                          attr: 2
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rAvailable: font-carrying selection or caret in focus view in front window\r\r"
                    attr: 2
                  - text: Default Font
                    attr: 1
                  - text: "\rSets the selection or the caret to the default font. Sets the selection or caret to the chosen font (more exactly: its typeface). The default font corresponds to one of the concrete fonts shown below, but this correspondence may be changed dynamically.\r\r{typeface name}\rThen the list of all the fonts which are currently available is given. Sets the selection or caret to the chosen font (more exactly: its typeface).\r\rThe menu item for the caret's font, or the font of the selection if it is homogeneous, is checked.\r\r"
                    attr: 2
                  - text: Set Default Font
                    attr: 1
                  - text: "\rSets the selection or caret's font as the new default font. All visible text stretches which have the default font as their font are redrawn in the new default font.\r\r\r"
                    attr: 2
                  - target:
                      name: Attributes Menu
                      body:
                        - text: 10.4 Attributes Menu
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\r\rAvailable: style/size/color-carrying selection or caret in focus view in front window\r\rThe following commands work on the selection; if there is no selection, the caret's current attributes are affected instead. These attributes are used as defaults when typing in new text.\r\rFor colors, there is a system-wide color (default color) which can be modified by the user. Under Windows, the default color can be changes using an operating-system utility. Everything drawn in the default color will be updated accordingly.\r\r"
                    attr: 2
                  - text: Regular
                    attr: 1
                  - text: " (Windows)\r"
                    attr: 2
                  - text: Plain
                    attr: 1
                  - text: " (Mac OS)\rCommand: StdCmds.Plain\rGuard: StdCmds.PlainGuard\rChecked: if text to the left and to the right of the caret is plain, or if selection is homogeneously plain (i.e., non-bold, non-italicized, non-underlined, and non-striked-out).\rRemoves all style attributes (bold, italic, underline, strikeout) from the selection.\r\r"
                    attr: 2
                  - text: Bold
                    attr: 1
                  - text: "\rCommand: StdCmds.Bold\rGuard: StdCmds.BoldGuard\rChecked: if text to the left and to the right of the caret is bold, or if selection is homogeneously bold.\rIf the selection is homogeneously bold, it is made non-bold, otherwise it is made bold.\r\r"
                    attr: 2
                  - text: Italic
                    attr: 1
                  - text: "\rCommand: StdCmds.Italic\rGuard: StdCmds.ItalicGuard\rChecked: if text to the left and to the right of the caret is italic, or if selection is homogeneously italic.\rIf the selection is homogeneously italic, it is made non-italic, otherwise it is made italic.\r\r"
                    attr: 2
                  - text: Underline
                    attr: 1
                  - text: "\rCommand: StdCmds.Underline\rGuard: StdCmds.UnderlineGuard\rChecked: if text to the left and to the right of the caret is underlined, or if selection is homogeneously underlined.\rIf the selection is homogeneously underlined, it is made non-underlined, otherwise it is made underlined.\r\r"
                    attr: 2
                  - text: Strikeout
                    attr: 1
                  - text: " (Mac OS)\rCommand: StdCmds.Strikeout\rGuard: StdCmds.StrikeoutGuard\rChecked: if text to the left and to the right of the caret is striked out, or if selection is homogeneously striked out.\rIf the selection is homogeneously striked out, it is made non-striked-out, otherwise it is made striked out.\r\r"
                    attr: 2
                  - text: "(8 point (Windows),) 9 point, 10, 12, 16, 20, 24"
                    attr: 1
                  - text: "\rCommand: StdCmds.Size(size)\rGuard: StdCmds.SizeGuard(size)\rChecked: if text to the left and to the right of the caret has the given size, or if the selection is homogeneously of the given size.\rThe selection is set to the given point size.\r\r"
                    attr: 2
                  - text: Size...
                    attr: 1
                  - text: " (Windows)\r"
                    attr: 2
                  - text: Other Size...
                    attr: 1
                  - text: " (Mac OS)\rCommand: StdCmds.InitSizeDialog; StdCmds.OpenToolDialog('Std/Rsrc/Cmds', 'Size')\rGuard: StdCmds.SizeGuard(-1)\rChecked: if none of the other sizes apply\rA tool dialog box is opened, which allows to enter a particular font size in points, and then to set the selection to this size.\r\r"
                    attr: 2
                  - text: Default Color
                    attr: 1
                  - text: "\rCommand: StdCmds.Color(1000000H)\rGuard: StdCmds.ColorGuard(1000000H)\rChecked: if text to the left and to the right of the caret has the default color, or if the selection is homogeneously of the default color\rSets the selection's color to the default color.\r\r"
                    attr: 2
                  - text: Black
                    attr: 1
                  - text: "\rCommand: StdCmds.Color(0000000H)\rGuard: StdCmds.ColorGuard(0000000H)\rChecked: if text to the left and to the right of the caret is black, or if the selection is homogeneously black\rSets the selection's color to black.\r\r"
                    attr: 2
                  - text: Red
                    attr: 1
                  - text: "\rCommand: StdCmds.Color(00000FFH)\rGuard: StdCmds.ColorGuard(00000FFH)\rChecked: if text to the left and to the right of the caret is red, or if the selection is homogeneously red\rSets the selection's color to red.\r\r"
                    attr: 2
                  - text: Green
                    attr: 1
                  - text: "\rCommand: StdCmds.Color(000FF00H)\rGuard: StdCmds.ColorGuard(000FF00H)\rChecked: if text to the left and to the right of the caret is green, or if the selection is homogeneously green\rSets the selection's color to green.\r\r"
                    attr: 2
                  - text: Blue
                    attr: 1
                  - text: "\rCommand: StdCmds.Color(0FF0000H)\rGuard: StdCmds.ColorGuard(0FF0000H)\rChecked: if text to the left and to the right of the caret is blue, or if the selection is homogeneously blue\rSets the selection's color to blue.\r\r"
                    attr: 2
                  - text: Color...
                    attr: 1
                  - text: " (Windows)\r"
                    attr: 2
                  - text: Other Color...
                    attr: 1
                  - text: " (Mac OS)\rCommand: HostDialog.ColorDialog\rGuard: StdCmds.ColorGuard(-1)\rChecked: if none of the other colors apply\rAsks the user for a color, to which it then sets the selection.\r\r"
                    attr: 2
                  - text: Set Default Color...
                    attr: 1
                  - text: " (Mac OS)\rGuard: color-carrying selection or caret in focus view in front window\rAsks the user for a color, to which it then sets the default color.\r\r"
                    attr: 2
                  - text: Default Font
                    attr: 1
                  - text: " (Windows)\rCommand: StdCmds.DefaultFont\rGuard: StdCmds.DefaultFontGuard\rSets the selection to the default font.\r\r"
                    attr: 2
                  - text: Font...
                    attr: 1
                  - text: " (Windows)\rCommand: HostDialog.FontDialog\rGuard: StdCmds.TypefaceGuard\rOpens the standard font dialog box and applies the chosen font attributes to the selection.\r\r"
                    attr: 2
                  - text: Typeface...
                    attr: 1
                  - text: " (Windows)\rCommand: HostDialog.TypefaceDialog\rGuard: StdCmds.TypefaceGuard\rOpens the standard font dialog box and applies the chosen font attributes to the selection. In contrast to the "
                    attr: 2
                  - text: Font...
                    attr: 5
                  - text: " command, only the typeface (the name of the font) is changed, but not the other attributes like size or weight (bold/normal).\r\r\r"
                    attr: 2
                  - target:
                      name: Window Menu
                      body:
                        - text: 10.5 Window Menu (Windows) / Windows Menu (Mac OS)
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 1
                  - text: "\r"
                    attr: 2
                  - text: New Window
                    attr: 1
                  - text: "\rCommand: StdCmds.NewWindow\rGuard: StdCmds.WindowGuard\rOpens a new window on the same document as the front window. The window is of the same kind as the front window. The window's title is put between \"(\" and \")\" parentheses.\r\r"
                    attr: 2
                  - text: Cascade
                    attr: 1
                  - text: " (Windows)\r"
                    attr: 2
                  - text: Stack
                    attr: 1
                  - text: " (Mac OS)\rCommand: HostMenus.Cascade\rGuard: StdCmds.WindowGuard\rArrange document windows in an overlapping fashion.\r\r"
                    attr: 2
                  - text: Tile Horizontal
                    attr: 1
                  - text: "\rCommand: HostMenus.TileHorizontal\rGuard: StdCmds.WindowGuard\rArrange windows from left to right in a non-overlapping fashion. This command does not affect non-resizable windows, and it ignores some windows when there are too many open windows for a reasonable tiling. The front window becomes the left-most window.\r\r"
                    attr: 2
                  - text: Tile Vertical
                    attr: 1
                  - text: "\rCommand: HostMenus.TileVertical\rGuard: StdCmds.WindowGuard\rArrange windows from top to bottom in a non-overlapping fashion. This command does not affect non-resizable windows, and it ignores some windows when there are too many open windows for a reasonable tiling. The front window becomes the top-most window.\r\r"
                    attr: 2
                  - text: Arrange Icons
                    attr: 1
                  - text: " (Windows)\rCommand: HostMenus.ArrangeIcons\rGuard: StdCmds.WindowGuard\rArrange icons (minimized windows) at the bottom of the application window.\r\r"
                    attr: 2
                  - text: Show Clipboard / Hide Clipboard
                    attr: 1
                  - text: " (Mac OS)\rIf the clipboard is open, it closes it and all its secondary windows. Otherwise it opens a clipboard window.\r\r"
                    attr: 2
                  - text: "{window}"
                    attr: 1
                  - text: "\rCommand: HostMenus.WindowList\rGuard:\rHere the list of open windows is appended, the front window at the top (checked). Document window titles are in boldface if their contents has been modified.\r\r\r"
                    attr: 2
                  - target:
                      name: CustomCommands
                      body:
                        - text: 11 Custom Commands
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rNot all commands are visible in the default configuration of the menus. The following is a list of modules from the "
                    attr: 2
                  - text: Std
                    attr: 5
                  - text: " subsystem. These modules contain many useful commands but not all of them appear in the menus. For more information about the commands in the modules, please consult the corresponding module documentation.\r"
                    attr: 2
