                  - text: "\tgeneral container\r\r\rCONST "
                    attr: 1
                  - text: undefined
                    attr: 4
                  - text: "\rThis value can be used to denote the width or height of a view as currently undefined.\r\rCONST "
                    attr: 1
                  - text: transparent
                    attr: 4
                  - text: "\rA view may be asked for its background color. In this case, the view may either return a "
                    attr: 1
                  - text: Ports.Color
                    attr: 2
                  - text: " value, or the value "
                    attr: 1
                  - text: transparent
                    attr: 2
                  - text: ". The latter value means that the view's container must find another source for a background color, i.e., for the color which is used to erase the background before the foreground is restored (use "
                    attr: 1
                  - text: "Update "
                    attr: 2
                  - text: "or "
                    attr: 1
                  - text: UpdateIn
                    attr: 2
                  - text: " to restore a view's area in all its frames). Transparency is useful if several views are superimposed on each other, which naturally occurs in a compound document.\r\rCONST "
                    attr: 1
                  - text: "deep, shallow"
                    attr: 4
                  - text: "\rThere are two ways that a view can be copied: "
                    attr: 1
                  - text: deep
                    attr: 2
                  - text: " or "
                    attr: 1
                  - text: shallow
                    attr: 2
                  - text: ". This distinction arises from the fact that a view can carry two types of data: data that it owns completely, and data that it can share with other views. The most important example of the latter is the view's model, if it has one.\rWhen a view is copied, it must be decided whether shareable state should actually be shared with the copy (shallow copy), or whether an independent copy of this state should be created (deep copy). These constants can be passed to a parameter of the "
                    attr: 1
                  - text: CopyModel
                    attr: 2
                  - text: " or the "
                    attr: 1
                  - text: "CopyOf "
                    attr: 2
                  - text: "procedure.\r\rCONST "
                    attr: 1
                  - text: "keepFrames, rebuildFrames"
                    attr: 4
                  - text: "\rWhen part of a view's area must be restored (in every frame on it), there are two possible kinds of restoration: a frame may be kept as it is and only its contents be redrawn, or it may be rebuilt, i.e., newly allocated, set up, and redrawn. The latter is less efficient than the former, and only necessary if the following holds: the view must be a container, and the operation which changed the view might have modified a subview's bounding box (and thus invalidated its subframes). In the rare case where frames are extended, it could sometimes also become necessary to rebuild the frames on a view.\r\rCONST "
                    attr: 1
                  - text: dontAsk
                    attr: 4
                  - text: ", "
                    attr: 1
                  - text: ask
                    attr: 4
                  - text: "\rTheses constants may be passed to the "
                    attr: 1
                  - text: Old
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: Register
                    attr: 2
                  - text: " procedures. They determine whether these procedures allow the user to interactively change "
                    attr: 1
                  - text: loc
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: name
                    attr: 2
                  - text: ", or "
                    attr: 1
                  - text: conv
                    attr: 2
                  - text: " used for the operation.\r\rCONST "
                    attr: 1
                  - text: clean
                    attr: 4
                  - text: "\rPossible value for parameter "
                    attr: 1
                  - text: type
                    attr: 2
                  - text: " of "
                    attr: 1
                  - text: BeginModification/EndModification
                    attr: 2
                  - text: ". Indicates an operation that does not make its document \"dirty\". Example: modifying a text in a way that is considered as \"unimportant\", such as collapsing or expanding a text fold (-> StdFolds).\r\rCONST "
                    attr: 1
                  - text: invisible
                    attr: 4
                  - text: "\rPossible value for parameter "
                    attr: 1
                  - text: type
                    attr: 2
                  - text: " of "
                    attr: 1
                  - text: BeginModification/EndModification
                    attr: 2
                  - text: ". Indicates an operation that \"folds together\" with the previous operation, i.e., does not itself become visible in the Undo/Redo menu items. Invisible operations can be used for operations that by themselves may not be expected to appear in an Undo/Redo menu. Example: setting options in a controller. When executing a Redo operation, after a (visible) operation, all invisible operations are executed. When executing an Undo operation, first all invisible operations are undone and afterwards the visible operations.\r\rCONST "
                    attr: 1
                  - text: notUndoable
                    attr: 4
                  - text: "\rPossible value for parameter "
                    attr: 1
                  - text: type
                    attr: 2
                  - text: " of "
                    attr: 1
                  - text: BeginModification/EndModification
                    attr: 2
                  - text: ". Indicates an operation that cannot be reversed (\"undone\"). This is important for operations where the undo feature would be too expensive.\r\r\rTYPE "
                    attr: 1
                  - text: View (Stores.Store)
                    attr: 4
                  - text: "\rABSTRACT\rA view is a storable object which may contain a model, possibly maintains a scroll position in this model, and generates frames for its display when needed. A view can be regarded as a special editor, and advanced views (containers) are able to contain arbitrary other views as part of their editable data (i.e., of their model).\rViews are allocated by specific view directories, e.g., "
                    attr: 1
                  - text: TextViews.dir
                    attr: 2
                  - text: ".\rViews are used by commands which manipulate the visual presentation of data.\rViews are extended for new kinds of data to be presented visually. Besides the implementation of new commands, the implementation of new view extensions is the central activity of BlackBox programming.\r"
                    attr: 1
                  - text: Restore
                    attr: 2
                  - text: " is the only procedure which necessarily must be implemented in an extension of "
                    attr: 1
                  - text: View
                    attr: 2
                  - text: ". It is called by the framework when the view must be redrawn on a screen or on a printer.\r"
                    attr: 1
                  - text: Internalize
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: Externalize
                    attr: 2
                  - text: " must be implemented in views which contain persistent mutable data. In this case, a view without model should also implement the "
                    attr: 1
                  - text: CopyFromSimpleView
                    attr: 2
                  - text: " procedure, while a view with a model should implement the "
                    attr: 1
                  - text: CopyFromModelView
                    attr: 2
                  - text: " procedure instead. "
                    attr: 1
                  - text: Internalize
                    attr: 2
                  - text: " / "
                    attr: 1
                  - text: Externalize
                    attr: 2
                  - text: " is called by the framework when the user opens / saves a document. "
                    attr: 1
                  - text: CopyFromSimpleView
                    attr: 2
                  - text: " / "
                    attr: 1
                  - text: CopyFromModelView
                    attr: 2
                  - text: " should also be implemented by views with mutable state that should be printable. The reason is that the framework makes a shallow copy of a view that is being printed, in order to avoid the original view to be changed by pagination, scrolling, or similar modifications that may be performed during printing.\r"
                    attr: 1
                  - text: ThisModel
                    attr: 2
                  - text: " must be implemented in views which contain models. It is called by the framework to find out whether this view should receive model messages for this model.\r"
                    attr: 1
                  - text: ConsiderFocusRequestBy
                    attr: 2
                  - text: " should be implemented in container views. It can be called by an embedded view that wants to become focus itself.\r"
                    attr: 1
                  - text: GetBackground
                    attr: 2
                  - text: " must be implemented in views which have non-transparent background colors. It is called by the framework as part of the restore mechanism.\r"
                    attr: 1
                  - text: RestoreMarks
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: Neutralize
                    attr: 2
                  - text: " must be implemented in views which may contain marks like selections or carets. "
                    attr: 1
                  - text: RestoreMarks
                    attr: 2
                  - text: " is called by the framework as part of the restore mechanism, after its corresponding "
                    attr: 1
                  - text: Restore
                    attr: 2
                  - text: " has been called.\r"
                    attr: 1
                  - text: HandleModelMsg
                    attr: 2
                  - text: " must be implemented in views which support partial view updates after a model change. It is called by the framework in order to deliver notifications about changes to the view's model.\r"
                    attr: 1
                  - text: HandleViewMsg
                    attr: 2
                  - text: " must be implemented in views which support marks, or which don't use the delayed update mechanism for some other reason. It is called by the framework to deliver view messages via all currently visible paths (i.e., via frames) to this view.\r"
                    attr: 1
                  - text: HandleCtrlMsg
                    attr: 2
                  - text: " must be implemented in editable views. It is called by the surrounding container if it considers the receiving view to be the current focus.\r"
                    attr: 1
                  - text: HandlePropMsg
                    attr: 2
                  - text: " must be implemented in views which support preferences and properties (-> Properties). It is called by the surrounding container to find out about the way that the embedded view would like to be treated.\r"
                    attr: 1
                  - text: InitContext
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: GetNewFrame
                    attr: 2
                  - text: " are usually not extended.\rA view's domain is the same as the domain of its container and of all embedded views and models. The domain identifies the document in which the view, its context, and its contents are embedded. The view's "
                    attr: 1
                  - text: PropagateDomain
                    attr: 2
                  - text: " procedure propagates the assigned domain to its model, if there is one.\r\r"
                    attr: 1
                  - text: context
                    attr: 4
                  - text: "-: Models.Context\rThe view's context links the view to its container. Communication between view and container occurs via the context. A context belongs (and is managed by) the container, but carried by the view.\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: InitContext
                    attr: 4
                  - text: " (context: Models.Context)\rNEW, EXTENSIBLE\rAssigns "
                    attr: 1
                  - text: context
                    attr: 2
                  - text: " to "
                    attr: 1
                  - text: v.context
                    attr: 2
                  - text: ".\r"
                    attr: 1
                  - text: InitContext
                    attr: 2
                  - text: " is called by "
                    attr: 1
                  - text: v
                    attr: 2
                  - text: "'s container, when v is being embedded in it (which means that the container creates a suitable context for "
                    attr: 1
                  - text: v
                    attr: 2
                  - text: ").\r"
                    attr: 1
                  - text: InitContext
                    attr: 2
                  - text: " is usually not extended, only view wrappers need to extend it in order to forward a context.\r\rPre\rcontext # NIL\t21\rv.context = NIL OR v.context = context\t22\r\rPost\rv.context = context\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: GetBackground
                    attr: 4
                  - text: " (VAR color: Ports.Color)\rNEW, EMPTY\rThis procedure may return a background color of the view. Upon input, "
                    attr: 1
                  - text: color = transparent
                    attr: 2
                  - text: ".\r"
                    attr: 1
                  - text: GetBackground
                    attr: 2
                  - text: " is called internally.\r"
                    attr: 1
                  - text: GetBackground
                    attr: 2
                  - text: " is implemented if a view needs a non-transparent background color.\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: Neutralize
                    attr: 4
                  - text: "\rNEW, EMPTY\rThis procedure should remove all marks that a view carries.\r"
                    attr: 1
                  - text: Neutralize
                    attr: 2
                  - text: " is called by the framework.\r"
                    attr: 1
                  - text: Neutralize
                    attr: 2
                  - text: " is implemented by views which may contain marks.\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: ConsiderFocusRequestBy-
                    attr: 4
                  - text: " (view: View)\rNEW, EMPTY\rA subview of "
                    attr: 1
                  - text: v
                    attr: 2
                  - text: " may request to become focus. Its container may or may not grant this request.\r"
                    attr: 1
                  - text: ConsiderFocusRequestBy
                    attr: 2
                  - text: " is called by a subview.\r"
                    attr: 1
                  - text: ConsiderFocusRequestBy
                    attr: 2
                  - text: " is implemented in a container view.\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: GetNewFrame
                    attr: 4
                  - text: " (VAR f: Frame)\rNEW, EMPTY\rThe procedure may generate a frame for the view. Upon entry, "
                    attr: 1
                  - text: f = NIL
                    attr: 2
                  - text: ".\rThis procedure is rarely implemented (mainly in native controls).\r"
                    attr: 1
                  - text: GetNewFrame
                    attr: 2
                  - text: " is called internally.\r"
                    attr: 1
                  - text: GetNewFrame
                    attr: 2
                  - text: " is implemented in views which need specialized extended view frames.\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: Restore
                    attr: 4
                  - text: " (f: Frame; l, t, r, b: INTEGER)\rNEW, ABSTRACT\rA view implementation must implement this procedure, to draw all or part of its contents. For drawing, a frame is passed to the view, whose drawing procedures can be called in the "
                    attr: 1
                  - text: Restore
                    attr: 2
                  - text: " procedure.\rOnly the rectangle "
                    attr: 1
                  - text: "(l, t, r, b)"
                    attr: 2
                  - text: ", which is given in universal coordinates, needs to be restored. Since drawing is clipped to this rectangle automatically, it is sometimes the best solution to simply restore the whole view's contents. However, often it is significantly faster to restore only the contents of the rectangle.\rIf necessary, the size of the view can be determined by calling "
                    attr: 1
                  - text: v.context.GetSize
                    attr: 2
                  - text: ". Consistent with the frame drawing operations (as described in the documentation of module "
                    attr: 1
                  - text: Ports
                    attr: 2
                  - text: "), the origin for drawing is the view's top-left corner, with positive x-values to the right, and positive y-values to the bottom.\rFor drawing at screen pixel resolutions without rounding errors, the frame's "
                    attr: 1
                  - text: f.dot
                    attr: 2
                  - text: " field is useful. The value "
                    attr: 1
                  - text: f.unit
                    attr: 2
                  - text: " can be inspected to obtain the size of a pixel in universal coordinates (see the documentation of module "
                    attr: 1
                  - text: Fonts
                    attr: 2
                  - text: "). For example, this allows to adapt to the different resolutions during screen display and during printing.\rIf drawing should be done in different ways depending on whether the view is being displayed on screen or whether it is being printed, then "
                    attr: 1
                  - text: Views.IsPrinterFrame(f)
                    attr: 2
                  - text: " can be used to determine whether it is being printed or displayed on screen.\r"
                    attr: 1
                  - text: Restore
                    attr: 2
                  - text: " is called internally by the framework, whenever some part of the view becomes newly visible, or after someone has called "
                    attr: 1
                  - text: Views.Update
                    attr: 2
                  - text: " or "
                    attr: 1
                  - text: Views.UpdateIn
                    attr: 2
                  - text: " for this view. "
                    attr: 1
                  - text: Restore
                    attr: 2
                  - text: " is rarely called directly by a view itself. No assumptions are allowed of when "
                    attr: 1
                  - text: Restore
                    attr: 2
                  - text: " is called, how often, in which order, etc. "
                    attr: 1
                  - text: Restore
                    attr: 2
                  - text: " should simply draw everything within the given rectangle, it must not assume that something is still on screen from the last time it was called.\rSince views may be nested, a container must be drawn before the views contained in it are draw. The framework calls "
                    attr: 1
                  - text: Restore
                    attr: 2
                  - text: " methods in the correct order, from the \"back\" to the \"front\". An embedded view thus lies always \"above\" its container. As an exception of the back-to-front drawing rule, BlackBox allows to draw marks (in particular: selections) of a container "
                    attr: 1
                  - text: on top
                    attr: 2
                  - text: " of the contained views. This can be achieved by moving the restoration of marks to the view's "
                    attr: 1
                  - text: RestoreMarks
                    attr: 2
                  - text: " method. This is only necessary for view containers, however.\r"
                    attr: 1
                  - text: Restore
                    attr: 2
                  - text: " must be implemented in every view extension. It is the only view procedure whose implementation is mandatory, not optional.\r\rPre\rf # NIL\t20\rf.view = v\t21\rv.context # NIL\t22\r0 <= f.l <= l <= r <= f.r <= width of view\t23\r0 <= f.t <= t <= b <= f.b <= height of view\t24\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: RestoreMarks
                    attr: 4
                  - text: " (f: Frame; l, t, r, b: INTEGER)\rNEW, EMPTY\rRestore all marks (in particular any selection) of view "
                    attr: 1
                  - text: v
                    attr: 2
                  - text: " via frame "
                    attr: 1
                  - text: f
                    attr: 2
                  - text: ". Only the rectangle "
                    attr: 1
                  - text: "(l, t, r, b)"
                    attr: 2
                  - text: ", which is given in universal coordinates, needs to be restored. A frame contains the method "
                    attr: 1
                  - text: MarkRect
                    attr: 2
                  - text: " which is provided particularly for the drawing of marks.\r"
                    attr: 1
                  - text: RestoreMarks
                    attr: 2
                  - text: " is called locally by the framework as part of the restore mechanism, after its corresponding "
                    attr: 1
                  - text: Restore
                    attr: 2
                  - text: " has been called.\r"
                    attr: 1
                  - text: RestoreMarks
                    attr: 2
                  - text: " is implemented in views which support any kind of marks, e.g., selection, caret, or focus marks.\r\rPre\rf # NIL\t20\rf.view = v\t21\rv.context # NIL\t22\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: HandleViewMsg
                    attr: 4
                  - text: "- (f: Frame; VAR msg: Message)\rNEW, EMPTY\rMessage handler for view messages.\r"
                    attr: 1
                  - text: HandleViewMsg
                    attr: 2
                  - text: " is called locally.\r"
                    attr: 1
                  - text: HandleViewMsg
                    attr: 2
                  - text: " is implemented in views which support marks (e.g., selection marks), and in views which support different frame contents for the same view (a rare case).\r\rPre\rf # NIL\tguaranteed\rf.view = v\tguaranteed\rv.context # NIL\tguaranteed\rmsg.view = v  OR  msg.view = NIL\tguaranteed\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: HandleCtrlMsg
                    attr: 4
                  - text: " (f: Frame; VAR msg: CtrlMessage; VAR focus: View)\rNEW, EMPTY\rMessage handler for messages to the focus.\r"
                    attr: 1
                  - text: HandleCtrlMsg
                    attr: 2
                  - text: " is called by the view's container, indirectly via "
                    attr: 1
                  - text: ForwardCtrlMsg
                    attr: 2
                  - text: ". If a controller message needs to be forwarded to an embedded view, set "
                    attr: 1
                  - text: focus
                    attr: 2
                  - text: " to this view. The framework will perform forwarding after "
                    attr: 1
                  - text: HandleCtrlMsg
                    attr: 2
                  - text: " returns. In the rare cases where this is not an adequate solution, "
                    attr: 1
                  - text: "ForwardCtrlMsg "
                    attr: 2
                  - text: "must be used; the embedded view's "
                    attr: 1
                  - text: HandleCtrlMsg
                    attr: 2
                  - text: " must never be called directly. After "
                    attr: 1
                  - text: ForwardCtrlMsg
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: focus
                    attr: 2
                  - text: " must be set to "
                    attr: 1
                  - text: NIL
                    attr: 2
                  - text: ", so that the message is not forwarded twice.\rDuring mouse tracking (i.e., when handling a "
                    attr: 1
                  - text: Controllers.TrackMsg
                    attr: 2
                  - text: "), drawing should only occur in frame "
                    attr: 1
                  - text: f
                    attr: 2
                  - text: ". This also implies that during mouse tracking, no update messages should be sent. If necessary, an update model message should be sent after the mouse button was released.\r"
                    attr: 1
                  - text: HandleCtrlMsg
                    attr: 2
                  - text: " is extended in editable views.\r\rPre\rf # NIL\t20\rf.view = v\t21\rv.context # NIL\t22\rfocus = NIL\t23\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: HandlePropMsg
                    attr: 4
                  - text: "- (VAR p: PropMessage)\rNEW, EMPTY\rProperty messages can be passed to a view via its "
                    attr: 1
                  - text: HandlePropMsg
                    attr: 2
                  - text: " procedure.\r"
                    attr: 1
                  - text: HandlePropMsg
                    attr: 2
                  - text: " is called by the view's container. The global procedure "
                    attr: 1
                  - text: HandlePropMsg
                    attr: 2
                  - text: " (see further below) is used to send a property message to a view.\r"
                    attr: 1
                  - text: HandlePropMsg
                    attr: 2
                  - text: " is called locally.\r"
                    attr: 1
                  - text: HandlePropMsg
                    attr: 2
                  - text: " is implemented in views which support properties (not described here).\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: HandleModelMsg
                    attr: 4
                  - text: "- (VAR msg: Models.Message)\rNEW, EMPTY\rMessage handler for model messages.\r"
                    attr: 1
                  - text: HandleModelMsg
                    attr: 2
                  - text: " is called locally.\r"
                    attr: 1
                  - text: HandleModelMsg
                    attr: 2
                  - text: " is implemented in views with a model which support updates after a model modification.\r\rPre\rmsg.model # NIL\t20\rmsg.model = v.ThisModel()\t21\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: CopyFrom
                    attr: 4
                  - text: "- (source: Stores.Store)\rThis method has become final. It calls the "
                    attr: 1
                  - text: CopyFromSimpleView
                    attr: 2
                  - text: " or "
                    attr: 1
                  - text: CopyFromModelView
                    attr: 2
                  - text: ", respectively. It checks that these procedures don't change the view context.\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: CopyFromSimpleView
                    attr: 4
                  - text: "- (source: View)\rNEW, EMPTY\rThe procedure should be implemented in views which have no model. It should copy view-specific data from "
                    attr: 1
                  - text: source
                    attr: 2
                  - text: ". "
                    attr: 1
                  - text: CopyFromSimpleView
                    attr: 2
                  - text: " is called as part of module "
                    attr: 1
                  - text: Views
                    attr: 2
                  - text: "' copy operations ("
                    attr: 1
                  - text: CopyOf
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: CopyWithNewModel
                    attr: 2
                  - text: ").\rNote: it is not permissible to implement both "
                    attr: 1
                  - text: CopyFromModelView
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: CopyFromSimpleView
                    attr: 2
                  - text: " simultaneously!\r\rPre\rsource # NIL\tguaranteed\rTYP(source) = TYP(v)\tguaranteed\rCopyFromModelView must not be implemented\t20\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: CopyFromModelView
                    attr: 4
                  - text: "- (source: View; model: Models.Model)\rNEW, EMPTY\rThe procedure must be implemented in views which have a model, and only in them. The major exception where a view without model may still implement "
                    attr: 1
                  - text: CopyFromModelView
                    attr: 2
                  - text: " instead of "
                    attr: 1
                  - text: CopyFromSimpleView
                    attr: 2
                  - text: " are wrapper views: using "
                    attr: 1
                  - text: CopyFromModelView
                    attr: 2
                  - text: " they can be implemented flexibly enough to wrap arbitrary views, whether they have models or not.\rThe procedure should initialize its model to "
                    attr: 1
                  - text: model
                    attr: 2
                  - text: ". If necessary, it can copy view-specific data from "
                    attr: 1
                  - text: source
                    attr: 2
                  - text: ". "
                    attr: 1
                  - text: CopyFromModelView
                    attr: 2
                  - text: " is called as part of module "
                    attr: 1
                  - text: Views
                    attr: 2
                  - text: "' copy operations ("
                    attr: 1
                  - text: CopyOf
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: CopyWithNewModel
                    attr: 2
                  - text: ").\rNote that if "
                    attr: 1
                  - text: model = source.ThisModel()
                    attr: 2
                  - text: ", then a shallow copy is being performed.\rNote: it is not permissible to implement both "
                    attr: 1
                  - text: CopyFromModelView
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: CopyFromSimpleView
                    attr: 2
                  - text: " simultaneously!\r\rPre\rsource # NIL\tguaranteed\rTYP(source) = TYP(v)\tguaranteed\rmodel # NIL  =>  TYP(model) = TYP(source.ThisModel())\tguaranteed\rCopyFromSimpleView must not be implemented\t20\r\rPost\rv.ThisModel() = model\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: ThisModel
                    attr: 4
                  - text: " (): Models.Model\rNEW, EXTENSIBLE\rReturns the view's model, if it has one. The default implementation returns "
                    attr: 1
                  - text: NIL
                    attr: 2
                  - text: ".\r"
                    attr: 1
                  - text: ThisModel
                    attr: 2
                  - text: " is called internally.\r"
                    attr: 1
                  - text: ThisModel
                    attr: 2
                  - text: " is replaced by views which contain models. A view with a model must always return the same model, i.e., the one which was assigned to it upon initialization.\r\r\rTYPE "
                    attr: 1
                  - text: Alien (View)
                    attr: 4
                  - text: "\rLIMITED\rIf the internalization of a view fails, either because its implementing module(s) cannot be loaded, or because it cancelled internalization (e.g., because of a version conflict), an alien is produced instead (this happens in procedure "
                    attr: 1
                  - text: ReadView
                    attr: 2
                  - text: "). An alien is immutable and doesn't contain a model. It contains an alien store which can be inspected to determine the type of the alien, and the cause for it to be an alien.\rEvery container must be able to operate even if one or several of its embedded views are aliens. If the view's model is an alien store, the view may turn itself into an alien.\rAliens are allocated in "
                    attr: 1
                  - text: ReadView
                    attr: 2
                  - text: ".\r\r"
                    attr: 1
                  - text: store
                    attr: 4
                  - text: "-: Stores.Alien\tstore # NIL\rThe alien store which has been generated by a "
                    attr: 1
                  - text: Stores.Reader
                    attr: 2
                  - text: " during internalization of the view.\r\r\rTYPE "
                    attr: 1
                  - text: Message
                    attr: 4
                  - text: "\rABSTRACT\rBase type of all view messages. Such messages are sent when a view's state has changed, in order to render the display consistent again. There may be several frames displaying the same view, such that every one of them needs to be updated.\rMessages are sent by views when their states have changed and if they cannot use BlackBox's delayed update mechanism. This is true mainly when drawing marks, e.g., selection marks.\rMessages are extended to indicate what kind of update should be performed on a frame.\r\r"
                    attr: 1
                  - text: view
                    attr: 4
                  - text: "-: View\rThe view which has changed. If "
                    attr: 1
                  - text: view = NIL
                    attr: 2
                  - text: ", all frames with the same domain are notified of the view change.\r\r\rTYPE "
                    attr: 1
                  - text: NotifyMsg (Message)
                    attr: 4
                  - text: "\rEXTENSIBLE\rThis message notifies all visible views about a change in an interactor's state (-> Dialog).\r"
                    attr: 1
                  - text: NotifyMsg
                    attr: 2
                  - text: " is sent by the interactor procedures "
                    attr: 1
                  - text: Update
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: UpdateList
                    attr: 2
                  - text: " in module "
                    attr: 1
                  - text: Dialog
                    attr: 2
                  - text: ".\r"
                    attr: 1
                  - text: NotifyMsg
                    attr: 2
                  - text: " is never extended.\r"
                    attr: 1
                  - text: NotifyMsg
                    attr: 2
                  - text: " is sent only internally.\r\r"
                    attr: 1
                  - text: "id0, id1"
                    attr: 4
                  - text: ": INTEGER\rIdentification of the interactor or of one of its fields.\r\r"
                    attr: 1
                  - text: opts
                    attr: 4
                  - text: ": SET\rDetermines whether controls (not described here) should check their guards, for example.\r\r\rTYPE "
                    attr: 1
                  - text: Frame (Ports.Frame)
                    attr: 4
                  - text: "\rABSTRACT\rAll input and output operations of a view pass through a frame. A frame manages the whole layout of views on a port, including clipping. Model and view messages are broadcast along frame trees. A frame tree's internal structure is hidden. Frames are volatile objects, they are allocated and released by BlackBox whenever necessary, e.g., when the frame's window is resized. Thus they cannot be used to carry application-specific state, except for caches.\rFrames are allocated by a view's "
                    attr: 1
                  - text: GetNewFrame
                    attr: 2
                  - text: " procedure.\rFrames are managed internally, and passed as parameters to view procedures whenever necessary.\rStandard frames are sufficient for most purposes, and thus rarely extended.\r\r"
                    attr: 1
                  - text: "l-, t-, r-, b-"
                    attr: 4
                  - text: ": INTEGER\t0 <= l <= r  &  0 <= t <= b\rThe visible area of the view in this frame. The values are in universal coordinates, relative to the frame's view's top-left corner.\rFor example, "
                    attr: 1
                  - text: f.l + f.gx
                    attr: 2
                  - text: " is the distance of the left frame border from the left port (display, printer) border in universal coordinates; "
                    attr: 1
                  - text: (f.l + f.gx) DIV f.unit
                    attr: 2
                  - text: " is the same distance in pixels.\r\r"
                    attr: 1
                  - text: view
                    attr: 4
                  - text: "-: View\tview # NIL\rThe frame's view.\r\r"
                    attr: 1
                  - text: front-
                    attr: 4
                  - text: ": BOOLEAN\rFlag which tells whether the frame is part of the front window\r"
                    attr: 1
                  - text: "\rmark-"
                    attr: 4
                  - text: ": BOOLEAN\rFlag which tells whether the frame is on its window's focus path, i.e., whether marks (caret, selection) should be drawn. Typically, marking procedures work the following way:\r\r\tIF f.mark THEN\r\t\tIF f.front THEN DrawMark(f) ELSE DrawBackgroundMark(f) END\r\tEND\r\rPROCEDURE (f: Frame) "
                    attr: 1
                  - text: Close
                    attr: 4
                  - text: "\rNEW, EMPTY\rPerform finalization before the frame is removed.\rAfter a call to "
                    attr: 1
                  - text: Close
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: f.view
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: f.rider
                    attr: 2
                  - text: " are set to "
                    attr: 1
                  - text: NIL
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: f.ConnectTo(NIL)
                    attr: 2
                  - text: " is called.\r"
                    attr: 1
                  - text: Close
                    attr: 2
                  - text: " is called internally.\r\r\rTYPE "
                    attr: 1
                  - text: RootFrame
                    attr: 4
                  - text: "\rThis type is used internally.\r\r"
                    attr: 1
                  - text: flags
                    attr: 4
                  - text: "-: SET\rWindow-specific flags. Reserved for future use.\r\r\rTYPE "
                    attr: 1
                  - text: PropMessage
                    attr: 4
                  - text: "\rABSTRACT\rUse its alias "
                    attr: 1
                  - text: Properties.Message
                    attr: 2
                  - text: " instead (properties are not described here).\r\r\rTYPE "
                    attr: 1
                  - text: CtrlMessage
                    attr: 4
                  - text: "\rABSTRACT\rBase type of all controller messages. Use its alias "
                    attr: 1
                  - text: Controllers.Message
                    attr: 2
                  - text: " instead.\r\r\rTYPE "
                    attr: 1
                  - text: CtrlMsgHandler
                    attr: 4
                  - text: "\rUsed internally.\r\r\rTYPE "
                    attr: 1
                  - text: Title
                    attr: 4
                  - text: "\rType for view titles, e.g., in windows.\r\r\rTYPE "
                    attr: 1
                  - text: UpdateCachesMsg (Message)
                    attr: 4
                  - text: "\rEXTENSIBLE\rUsed internally.\r\rTYPE "
                    attr: 1
                  - text: ScrollClassMsg (Message)
                    attr: 4
                  - text: "\rEXTENSIBLE\rUsed internally.\r\r\rPROCEDURE "
                    attr: 1
                  - text: Broadcast
                    attr: 4
                  - text: " (v: View; VAR msg: Message)\rBroadcast "
                    attr: 1
                  - text: msg
                    attr: 2
                  - text: " for "
                    attr: 1
                  - text: view
                    attr: 2
                  - text: ". Before broadcasting, parameter "
                    attr: 1
                  - text: v
                    attr: 2
                  - text: " is assigned to the message's "
                    attr: 1
                  - text: view
                    attr: 2
                  - text: "-Field. The actual broadcast only takes place if "
                    attr: 1
                  - text: "v.domain # NIL"
                    attr: 2
                  - text: ".\rBroadcast is called by a view whenever its state has changed and the delayed restore mechanism is not sufficient, e.g., to update frame-specific marks. "
                    attr: 1
                  - text: v
                    attr: 2
                  - text: " will receive "
                    attr: 1
                  - text: msg
                    attr: 2
                  - text: " once for every visible frame on itself.\rThe handler of a view message may not recursively broadcast another view message, since this could cause the messages to be received in another order than they have been sent, which would result in errors very hard to find.\r\rPre\rv # NIL\t20\rno recursion\t21\r\rPost\rmsg.view = v\r\rPROCEDURE "
                    attr: 1
                  - text: Domaincast
                    attr: 4
                  - text: " (domain: Stores.Domain; VAR msg: Message)\rBroadcasts "
                    attr: 1
                  - text: msg
                    attr: 2
                  - text: " inside "
                    attr: 1
                  - text: domain
                    attr: 2
                  - text: ". For visual objects, the domain corresponds to the object's document. "
                    attr: 1
                  - text: Domaincast
                    attr: 2
                  - text: " is only necessary in exceptional cases; usually a view message is sent in places where the corresponding view, and not only its domain, is known. In these cases, "
                    attr: 1
                  - text: Broadcast
                    attr: 2
                  - text: " is the appropriate (and faster) procedure.\r\rPROCEDURE "
                    attr: 1
                  - text: Omnicast
                    attr: 4
                  - text: " (VAR msg: ANYREC)\rBroadcast "
                    attr: 1
                  - text: msg
                    attr: 2
