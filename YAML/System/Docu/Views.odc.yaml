                    attr: 1
                  - text: conv = NIL
                    attr: 2
                  - text: " means that no conversion is necessary, i.e., the file format gets the standard BlackBox format.\r\rPre\rview # NIL\t20\rask  OR  loc # NIL\t22\rask  OR  name # \"\"\t23\r\rPost\roperation was successful\r\tres = 0\roperation was not successful\r\tres # 0\r\rPROCEDURE "
                    attr: 1
