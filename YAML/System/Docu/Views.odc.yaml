                  - text: " (view: View)\rDeposit a view for later use, typically for opening it in a window, or for pasting it to the focus.\rDeposit is used only by allocation commands, i.e., commands which allocate and then deposit a concrete view type.\r\rPre\rview # NIL\t20\r\rPROCEDURE "
                    attr: 1
                  - text: RestoreDomain
                    attr: 4
                  - text: " (domain: Stores.Domain)\rThis procedure forces a restoration of all update regions on views of "
                    attr: 1
                  - text: domain
                    attr: 2
                  - text: ".\rNormally, the display is updated in a delayed fashion, i.e., an update region is built for all invalid view areas (using "
                    attr: 1
