                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: UpdateIn
                    attr: 2
                  - text: "), and the display update according to this region is performed when the framework is idle, i.e., between commands. However, sometimes it is necessary to enforce a display update "
                    attr: 1
                  - text: during
                    attr: 2
                  - text: " a command, for which this procedure can be used. The need for enforced update comes from scrolling: if a view should be scrolled, the effect of scrolling should become immediately visible.\r\rPROCEDURE "
