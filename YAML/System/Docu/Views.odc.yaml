                  - text: "\r\rFigure 1. Model-View-Controller Separation\r\r\rA "
                    attr: 1
                  - text: view
                    attr: 2
                  - text: " is a rectangular display object which provides visual presentation of data. Views are storable, and may be embedded recursively.\rA view often contains a "
                    attr: 1
                  - text: Models.Model
                    attr: 2
                  - text: " which represents some data, and sometimes a "
                    attr: 1
                  - text: Controllers.Controller
                    attr: 2
                  - text: " which provides interaction of the view with the user. There may be several views for each model simultaneously, but at most one controller per view.\rIf several views share the same model, every change of the model must cause all its views to update their contents accordingly. Module "
                    attr: 1
                  - text: Models
                    attr: 2
                  - text: " provides a messaging mechanism through which visible views can be notified of model modifications, and thus re-establish the display's consistency.\rIt is possible to implement views which do not contain a model. These views cannot use the messaging mechanism of module "
                    attr: 1
                  - text: Models
                    attr: 2
                  - text: ". Therefore, such views usually don't share data and are independent from each other. Typically, these views are simple "
                    attr: 1
                  - text: controls
                    attr: 2
                  - text: " which implement a very specific functionality that relies on cooperation with the control's container, e.g., a form view container.\rIt is also possible to implement views which do not contain a controller. This is possible because all messages to a controller are sent to the controller's view, not directly to the controller itself. Thus a view can decide whether to handle these messages itself, or whether to forward them to a controller. Simple views don't contain a controller.\rBecause a view is an extension of a "
                    attr: 1
                  - text: Stores.Store
                    attr: 2
                  - text: ", it can be embedded in a model, such that it is externalized and internalized as part of this model. This makes it possible to realize compound documents, which contain views containing views containing views...\rWhen a view needs to draw to the screen (or printer), it can do this through a "
                    attr: 1
                  - text: frame
                    attr: 2
                  - text: ". A frame is an access path (a mapper) to the port on which the view is presented. Since several windows may show the same document with its hierarchy of views, one and the same view may be visible several times simultaneously. This results in several frames for the same view simultaneously, and therefore in the need to update a view change in several frames.\rIn general, the reaction to a model modification happens in two steps. In the first step, the nature of the model's change is broadcast to all visible views, using the model broadcast mechanism of module "
                    attr: 1
                  - text: Models
                    attr: 2
                  - text: ". This causes every visible view to update its own state, if necessary. In the second step, every view which has changed its state uses the view broadcast mechanism of module "
                    attr: 1
                  - text: Views
                    attr: 2
                  - text: ", to notify all frames for this view. In fact, since frames are usually not extended, the view itself performs the update for each of its frames. This second broadcast step is normally invisible to the programmer, because he merely needs to determine the view's region which needs updating. The actual update of this region in each of its frames is done by the framework.\rA view may behave differently depending on the model in which it is embedded, i.e., depending on its context. For this purpose, a variable of type "
                    attr: 1
                  - text: Models.Context
                    attr: 2
                  - text: " is carried by a view, as a link to its container.\rFor every user interaction, e.g., the press of a key, a view must be defined which should handle this interaction, i.e., a so-called "
                    attr: 1
                  - text: focus
                    attr: 2
                  - text: ". BlackBox doesn't know which view is the current focus. BlackBox only provides a strategy which decides which window is focus. Since a window may contain a hierarchy of views, a view which has received an interaction message  a controller message  must decide on its own whether it is the focus itself, or whether it contains another view which might be focus instead. In the former case, it handles the messages itself, in the latter case, it forwards the message to this view.\rEvery window contains a tree of frames. This tree corresponds to the visible views of the window. Every view may only draw inside its own borders, drawing outside of its borders must be prevented. Frames provide the necessary clipping facility. The management of the frame tree and of clipping is largely transparent to the view programmer.\r\rExamples:\r"
                    attr: 1
                  - link:
                      target: "StdCmds.OpenBrowser('Obx/Docu/Patterns', 'ObxPatterns Docu')"
