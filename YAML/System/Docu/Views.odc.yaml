                  - text: " (v: View; l, t, r, b: INTEGER; rebuild: BOOLEAN)\rCauses rectangle "
                    attr: 1
                  - text: "(l, t, r, b)"
                    attr: 2
                  - text: " of view "
                    attr: 1
                  - text: v
                    attr: 2
                  - text: " to be restored, in "
                    attr: 1
                  - text: all
                    attr: 2
                  - text: " frames displaying "
                    attr: 1
                  - text: v
                    attr: 2
                  - text: ". The update occurs delayed, after the currently executing command has terminated. "
                    attr: 1
                  - text: rebuild
                    attr: 2
                  - text: " should be set to "
                    attr: 1
                  - text: keepFrames
                    attr: 2
                  - text: " for non-containers or for operations which didn't modify the layout of a container (i.e., the places and sizes of embedded views). Otherwise, "
                    attr: 1
                  - text: rebuildFrames
                    attr: 2
                  - text: " should be passed.\r\rPre\rv # NIL\t20\r\rPROCEDURE "
                    attr: 1
                  - text: ReadView
                    attr: 4
                  - text: " (VAR rd: Stores.Reader; OUT v: View)\rReads view "
