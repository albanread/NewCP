                    attr: 1
                  - text: StopBunching
                    attr: 4
                  - text: " (v: View)\rThese procedures handle modifications of a view. They are used in the same way as their model counterparts in module "
                    attr: 1
                  - text: Models
                    attr: 2
                  - text: " (-> Models). Note that these view procedures are provided for convenience, they are mostly identical to the "
                    attr: 1
                  - text: Models
                    attr: 2
                  - text: ". The only noticeable difference is that a view operation only affects this view, and doesn't affect other views even if they show the same model. For example, a script that modifies a view's model should use the "
                    attr: 1
                  - text: Models
                    attr: 2
                  - text: " procedure, so that all views are updated correctly. A script that modifies only a view's private state should use the procedures above.\r\rPROCEDURE "
                    attr: 1
                  - text: ForwardCtrlMsg
                    attr: 4
                  - text: " (f: Frame; VAR msg: CtrlMessage)\rThis procedure should be used to send a controller message along the focus path. Usually, it is called within an implementation of "
                    attr: 1
                  - text: HandleCtrlMsg
                    attr: 2
                  - text: ". This is only necessary if it is not sufficient to just set the "
                    attr: 1
                  - text: focus
                    attr: 2
                  - text: " parameter of "
                    attr: 1
                  - text: HandleCtrlMsg
                    attr: 2
                  - text: " to the embedded view to which forwarding should occur. This in turn is only necessary if "
                    attr: 1
                  - text: HandleCtrlMsg
                    attr: 2
                  - text: " needs to do some postprocessing after forwarding has occurred. In this case, it calls "
                    attr: 1
                  - text: ForwardCtrlMsg
                    attr: 2
                  - text: " and then makes sure that "
                    attr: 1
                  - text: focus = NIL
                    attr: 2
                  - text: ".\r\rPre\rf # NIL\t20\r\rPROCEDURE "
                    attr: 1
                  - text: Update
                    attr: 4
                  - text: " (v: View; rebuild: BOOLEAN)\rCauses view "
                    attr: 1
                  - text: v
                    attr: 2
                  - text: " to be restored, in "
                    attr: 1
                  - text: all
                    attr: 2
                  - text: " frames displaying "
                    attr: 1
                  - text: v
                    attr: 2
                  - text: ". The update occurs delayed, after the currently executing command has terminated. "
                    attr: 1
                  - text: rebuild
                    attr: 2
                  - text: " should be set to "
                    attr: 1
                  - text: keepFrames
                    attr: 2
                  - text: " for non-containers or for operations which didn't modify the layout of a container (i.e., the places and sizes of embedded views). Otherwise, "
                    attr: 1
                  - text: rebuildFrames
                    attr: 2
                  - text: " should be passed.\r\rPre\rv # NIL\t20\r\rPROCEDURE "
                    attr: 1
