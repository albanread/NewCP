                  - text: "\r\rDEFINITION Views;\r\r\tIMPORT Files, Fonts, Stores, Ports, Converters, Models;\r\r\tCONST\r\t\tundefined = 0;\r\t\ttransparent = 0FF000000H;\r\t\tdeep = FALSE; shallow = TRUE;\r\t\tkeepFrames = FALSE; rebuildFrames = TRUE;\r\t\tdontAsk = FALSE; ask = TRUE;\r\t\tclean = 0; notUndoable = 1; invisible = 2;\r\r\tTYPE\r\t\tView = POINTER TO ABSTRACT RECORD (Stores.Store)\r\t\t\tcontext-: Models.Context;\r\t\t\t(v: View) InitContext (context: Models.Context), NEW, EXTENSIBLE;\r\t\t\t(v: View) GetBackground (VAR color: Ports.Color), NEW, EMPTY;\r\t\t\t(v: View) Neutralize, NEW, EMPTY;\r\t\t\t(v: View) ConsiderFocusRequestBy- (view: View), NEW, EMPTY;\r\t\t\t(v: View) GetNewFrame (VAR frame: Frame), NEW, EMPTY;\r\t\t\t(v: View) Restore (f: Frame; l, t, r, b: INTEGER), NEW, ABSTRACT;\r\t\t\t(v: View) RestoreMarks (f: Frame; l, t, r, b: INTEGER), NEW, EMPTY;\r\t\t\t(v: View) HandleViewMsg- (f: Frame; VAR msg: Message), NEW, EMPTY;\r\t\t\t(v: View) HandleCtrlMsg (f: Frame; VAR msg: CtrlMessage; VAR focus: View), NEW, EMPTY;\r\t\t\t(v: View) HandlePropMsg- (VAR p: PropMessage), NEW, EMPTY;\r\t\t\t(v: View) HandleModelMsg- (VAR msg: Models.Message), NEW, EMPTY;\r\t\t\t(v: View) CopyFrom- (source: View);\r\t\t\t(v: View) CopyFromSimpleView- (source: View), NEW, EMPTY;\r\t\t\t(v: View) CopyFromModelView- (source: View; model: Models.Model), NEW, EMPTY;\r\t\t\t(v: View) ThisModel (): Models.Model, NEW, EXTENSIBLE\r\t\tEND;\r\r\t\tAlien = POINTER TO LIMITED RECORD (View)\r\t\t\tstore-: Stores.Alien\r\t\tEND;\r\r\t\tMessage = ABSTRACT RECORD\r\t\t\tview-: View\r\t\tEND;\r\r\t\tNotifyMsg = EXTENSIBLE RECORD (Message)\r\t\t\tid0, id1: INTEGER;\r\t\t\topts: SET\r\t\tEND;\r\r\t\tFrame = POINTER TO ABSTRACT RECORD (Ports.Frame)\r\t\t\tl-, t-, r-, b-: INTEGER;\r\t\t\tview-: View;\r\t\t\tfront-, mark-: BOOLEAN;\r\t\t\t(f: Frame) Close, NEW, EMPTY\r\t\tEND;\r\r\t\tRootFrame = POINTER TO RECORD (Frame)\r\t\t\tflags-: SET\r\t\tEND;\r\r\t\tPropMessage = ABSTRACT RECORD END;\r\r\t\tCtrlMessage = ABSTRACT RECORD END;\r\r\t\tCtrlMsgHandler = PROCEDURE (op: INTEGER; f, g: Frame; VAR msg: CtrlMessage;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR mark, front, req: BOOLEAN);\r\r\t\tTitle = ARRAY 64 OF CHAR;\r\r\t\tUpdateCachesMsg = EXTENSIBLE RECORD (Message) END;\r\r\t\tScrollClassMsg = RECORD (Message)\r\t\t\tallowBitmapScrolling: BOOLEAN\r\t\tEND;\r\r\tVAR HandleCtrlMsg-: CtrlMsgHandler;\r\r\tPROCEDURE Broadcast (v: View; VAR msg: Message);\r\tPROCEDURE Domaincast (domain: Stores.Domain; VAR msg: Message);\r\tPROCEDURE Omnicast (VAR msg: ANYREC);\r\tPROCEDURE HandlePropMsg (v: View; VAR msg: PropMessage);\r\tPROCEDURE Era (v: View): INTEGER;\r\tPROCEDURE BeginModification (type: INTEGER; v: View);\r\tPROCEDURE EndModification (type: INTEGER; v: View);\r\tPROCEDURE BeginScript (v: View; name: Stores.OpName; OUT script: Stores.Operation);\r\tPROCEDURE EndScript (v: View; script: Stores.Operation);\r\tPROCEDURE Do (v: View; name: Stores.OpName; op: Stores.Operation);\r\tPROCEDURE LastOp (v: View): Stores.Operation;\r\tPROCEDURE Bunch (v: View);\r\tPROCEDURE StopBunching (v: View);\r\tPROCEDURE ForwardCtrlMsg (f: Frame; VAR msg: CtrlMessage);\r\tPROCEDURE Update (v: View; rebuild: BOOLEAN);\r\tPROCEDURE UpdateIn (v: View; l, t, r, b: INTEGER; rebuild: BOOLEAN);\r\tPROCEDURE ReadView (VAR rd: Stores.Reader; OUT v: View);\r\tPROCEDURE WriteView (VAR wr: Stores.Writer; v: View);\r\tPROCEDURE CopyOf (v: View; shallow: BOOLEAN): View;\r\tPROCEDURE CopyWithNewModel (v: View; m: Models.Model): View;\r\tPROCEDURE ReadFont (VAR rd: Stores.Reader; OUT f: Fonts.Font);\r\tPROCEDURE WriteFont (VAR wr: Stores.Writer; f: Fonts.Font);\r\tPROCEDURE IsPrinterFrame (f: Frame): BOOLEAN;\r\tPROCEDURE InstallFrame (host: Frame; view: View; x, y, level: INTEGER; focus: BOOLEAN);\r\tPROCEDURE ThisFrame (host: Frame; view: View): Frame;\r\tPROCEDURE FrameAt (host: Frame, x, y: INTEGER): Frame;\r\tPROCEDURE Old (ask: BOOLEAN; VAR loc: Files.Locator; VAR name: Files.Name;\r\t\t\t\t\t\t\t\t\tVAR conv: Converters.Converter): View;\r\tPROCEDURE OldView (loc: Files.Locator; name: Files.Name): View;\r\tPROCEDURE Register (view: View; ask: BOOLEAN; VAR loc: Files.Locator; VAR name: Files.Name;\r\t\t\t\t\t\t\t\t\t\tVAR conv: Converters.Converter; OUT res: INTEGER);\r\tPROCEDURE RegisterView (view: View; loc: Files.Locator; name: Files.Name);\r\tPROCEDURE Open (view: View; loc: Files.Locator; name: Files.Name; conv: Converters.Converter);\r\tPROCEDURE OpenView (view: View);\r\tPROCEDURE OpenAux (view: View; title: Title);\r\tPROCEDURE Deposit (view: View);\r\tPROCEDURE RestoreDomain (domain: Stores.Domain);\r\tPROCEDURE Scroll (v: View; dx, dy: INTEGER);\r\tPROCEDURE SetDir (d: Directory);\r\r\tPROCEDURE MarkBorders (root: RootFrame);\r\tPROCEDURE MarkBorder (host: Frame; v: View; l, t, r, b: INTEGER);\r\tPROCEDURE Fetch (OUT view: View);\r\tPROCEDURE Available (): INTEGER;\r\tPROCEDURE ClearQueue;\r\tPROCEDURE RemoveFrame (host, f: Frame);\r\tPROCEDURE RemoveFrames (host: Frame; l, t, r, b: INTEGER);\r\tPROCEDURE BroadcastModelMsg (f: Frame; VAR msg: Models.Message);\r\tPROCEDURE BroadcastViewMsg (f: Frame; VAR msg: Message);\r\tPROCEDURE HandleCtrlMsg (op: INTEGER; f, g: Frame; VAR msg: CtrlMessage;\r\t\t\t\t\t\t\t\t\t\t\t\t\tVAR target, front: BOOLEAN);\r\tPROCEDURE SetRoot (root: RootFrame; view: View; front: BOOLEAN; flags: SET);\r\tPROCEDURE AdaptRoot (root: RootFrame);\r\tPROCEDURE RootOf (f: Frame): RootFrame;\r\tPROCEDURE HostOf (f: Frame): Frame;\r\tPROCEDURE UpdateRoot (root: RootFrame; l, t, r, b: INTEGER; rebuild: BOOLEAN);\r\tPROCEDURE RestoreRoot (root: RootFrame; l, t, r, b: INTEGER);\r\tPROCEDURE ValidateRoot (root: RootFrame);\r\tPROCEDURE InitCtrl (p: CtrlMsgHandler);\r\tPROCEDURE IsInvalid (v: View): BOOLEAN;\r\tPROCEDURE RevalidateView (v: View);\r\rEND Views.\r\r\r"
                    attr: 1
                  - view:
                      kind: HostPictures.StdView
