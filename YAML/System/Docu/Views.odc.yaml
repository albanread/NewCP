                  - text: " (VAR wr: Stores.Writer; f: Fonts.Font)\rWrites a font to a writer.\r\rPre\rf # NIL\t20\r\rPROCEDURE "
                    attr: 1
                  - text: IsPrinterFrame
                    attr: 4
                  - text: " (f: Frame): BOOLEAN\rThis function can be used to determine whether "
                    attr: 1
                  - text: f
                    attr: 2
                  - text: "'s view is currently being restored on a printer or preview port.\r\rPre\rf # NIL\t20\r\rPROCEDURE "
                    attr: 1
                  - text: InstallFrame
                    attr: 4
                  - text: " (host: Frame; view: View; x, y, level: INTEGER; focus: BOOLEAN)\rIf "
                    attr: 1
                  - text: view
                    attr: 2
                  - text: " has no corresponding embedded frame in "
                    attr: 1
                  - text: host
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: Install
                    attr: 2
                  - text: " allocates and installs a new one for it, otherwise the existing frame is kept. Parameters "
                    attr: 1
                  - text: x
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: y
                    attr: 2
                  - text: " give the position of the view's top-left corner relative to the container view's (i.e., "
                    attr: 1
                  - text: host.view
                    attr: 2
                  - text: ") top-left corner. The frame ordering can be influenced by passing a view level at which "
                    attr: 1
                  - text: view
                    attr: 2
                  - text: " lies logically. Levels need not be unique (pass 0 if you don't care, e.g., if you never have overlapping frames). A frame always lies \"above\" other frames with smaller levels. Parameter "
                    attr: 1
                  - text: focus
                    attr: 2
                  - text: " tells whether the frame is part of the focus path.\r\rPre\rhost # NIL\t20\rhost is opened in window\t21\rview # NIL\t22\rview.context # NIL\t23\rview.Domain() # NIL\t24\r\rPROCEDURE "
                    attr: 1
                  - text: ThisFrame
                    attr: 4
                  - text: " (host: Frame; view: View): Frame\rSearches the embedded frame of "
                    attr: 1
                  - text: host
                    attr: 2
                  - text: " which contains view "
                    attr: 1
                  - text: view
                    attr: 2
                  - text: ".\r\rPre\rhost # NIL\t20\r\rPost\rresult = NIL\r\tview = NIL  OR  not found\rresult # NIL\r\tview # NIL  &  found\r\tresult.view = view\r\rPROCEDURE "
                    attr: 1
                  - text: FrameAt
                    attr: 4
                  - text: " (host: Frame; x, y: INTEGER): Frame\rSearches the embedded frame of "
                    attr: 1
                  - text: host
                    attr: 2
                  - text: " which contains point "
                    attr: 1
                  - text: "(x, y)"
                    attr: 2
                  - text: ".\r\rPre\rhost # NIL\t20\r\rPost\rresult = NIL\r\tno embedded frame at (x, y)\rresult # NIL\r\tresult contains (x, y)\r\rPROCEDURE "
                    attr: 1
                  - text: Old
                    attr: 4
                  - text: " (ask: BOOLEAN; VAR loc: Files.Locator; VAR name: Files.Name;\r\t\t\t\t\t\t\t\tVAR conv: Converters.Converter): View\rThis procedure looks up a file, reads in the document in this file, and then returns the root view of this document. If the file is already opened in a window, the root view of this window's document is returned instead of reading the file. Parameter "
                    attr: 1
                  - text: ask
                    attr: 2
                  - text: " determines whether or not the user is asked interactively for the triple "
                    attr: 1
                  - text: "(loc, name, conv)"
                    attr: 2
                  - text: ", via a standard file dialog. With this dialog, the user can navigate in the host file system's directory structure.\r"
                    attr: 1
                  - text: "loc, name, conv"
                    attr: 2
                  - text: " are treated as in-out parameters. On input, their values are used as defaults. If "
                    attr: 1
                  - text: ask
                    attr: 2
                  - text: " then the user may cause them to change.\r"
                    attr: 1
                  - text: "loc, name"
                    attr: 2
                  - text: " determine the file from which the document was read.\r"
                    attr: 1
                  - text: conv
                    attr: 2
                  - text: " determines the converter which is used for reading the document. "
                    attr: 1
                  - text: conv = NIL
                    attr: 2
                  - text: " means that no conversion is necessary, i.e., the file format already has the standard BlackBox format.\r\rPre\rask  OR  loc # NIL\t20\rask  OR  name # \"\"\t21\r\rPost\rresult = NIL\r\tloc.res # 0\rresult # NIL\r\tloc.res = 0\r\tresult.context # NIL\r~ask\r\tloc = loc'  &  name = name'  &  conv = conv'\r\rPROCEDURE "
                    attr: 1
                  - text: OldView
                    attr: 4
                  - text: " (loc: Files.Locator; name: Files.Name): View\r"
                    attr: 1
                  - text: OldView
                    attr: 2
                  - text: " is an abbreviation of "
                    attr: 1
                  - text: "Old(dontAsk, loc, name, NIL)"
                    attr: 2
                  - text: ".\r\rPROCEDURE "
                    attr: 1
                  - text: Register
                    attr: 4
                  - text: " (view: View; ask: BOOLEAN; VAR loc: Files.Locator;\r\t\t\t\t\t\t\t\t\t\tVAR name: Files.Name; VAR conv: Converters.Converter;\r\t\t\t\t\t\t\t\t\t\tOUT res: INTEGER)\rSaves "
                    attr: 1
                  - text: view
                    attr: 2
                  - text: "'s document in a file. Parameter "
                    attr: 1
                  - text: ask
                    attr: 2
                  - text: " determines whether or not the user is asked interactively for the triple "
                    attr: 1
                  - text: "(loc, name, conv)"
                    attr: 2
                  - text: ", via a standard file dialog. With this dialog, the user can navigate in the host file system's directory structure.\r"
                    attr: 1
                  - text: "loc, name, conv"
                    attr: 2
                  - text: " are treated as in-out parameters. On input, their values are used as defaults. If "
                    attr: 1
                  - text: ask
                    attr: 2
                  - text: " then the user may cause them to change.\r"
                    attr: 1
