                    attr: 1
                  - text: RestoreRect
                    attr: 2
                  - text: ". "
                    attr: 1
                  - text: SaveRect
                    attr: 2
                  - text: " must be balanced by "
                    attr: 1
                  - text: "RestoreRect(l, t, r, b, disposeBuffer)"
                    attr: 2
                  - text: ".\rCalls to "
                    attr: 1
