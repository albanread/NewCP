                  - text: Frame
                    attr: 3
                  - text: "\rABSTRACT\rA Frame is a mapper for a port. Every frame has its own coordinate system. All coordinates used for a frame are measured in universal units. Most frame operations forward to the frame's rider, i.e., they call the frame rider's corresponding procedure, and perform the necessary coordinate transformations (scaling between universal units and pixels, and a translation by the frame's origin).\rA frame "
                    attr: 1
                  - text: f
                    attr: 2
                  - text: " translates from local universal coordinates to global pixel coordinates using the following transformation:\r\t\tx := (f.gx + x) DIV f.unit; y := (f.gy + y) DIV f.unit;\t(* frame -> rider coordinates *)\rThe opposit transformation is:\r\t\tx := x * f.unit - f.gx; y := y * f.unit - f.gy;\t(* rider -> frame coordinates *)\rThe rider's clipping rectangle is always set up such that drawing cannot occur outside of the frame, i.e., outside of the drawing view. Be careful if you change the rider's clipping rectangle (using the rider's "
                    attr: 1
                  - text: SetRect
                    attr: 2
                  - text: " method), since this introduces mutable state that you have to manage.\rFrames are allocated by views.\rFrames are used by views, for drawing and for mouse polling.\rFrames are extended internally ("
                    attr: 1
                  - text: Views.Frame
                    attr: 2
                  - text: ").\r\r"
                    attr: 1
                  - text: unit
                    attr: 3
                  - text: "-: INTEGER\tunit > 0\rThe size of a pixel in universal units.\r\r"
                    attr: 1
                  - text: dot-
                    attr: 3
                  - text: ": INTEGER\tdot = point - point MOD unit\rThis value can be used as an approximation of "
                    attr: 1
                  - text: point
                    attr: 2
                  - text: ", rounded to a pixel. By using "
                    attr: 1
                  - text: dot
                    attr: 2
                  - text: " instead of "
                    attr: 1
                  - text: point
                    attr: 2
                  - text: ", ugly rounding errors can be avoided. For example, if you used "
                    attr: 1
                  - text: point
                    attr: 2
                  - text: " as the thickness of a line, and a pixel were slightly larger than "
                    attr: 1
                  - text: point
                    attr: 2
                  - text: ", the line might disappear altogether. Moreover, you may want to use a very thin line on the screen (about one pixel) as a hairline, but not have it become too small on a laser printer (where the frame's "
                    attr: 1
                  - text: unit
                    attr: 2
                  - text: " is much smaller than on screen). In these cases, "
                    attr: 1
                  - text: dot
                    attr: 2
                  - text: " comes handy.\r\r"
                    attr: 1
                  - text: rider
                    attr: 3
                  - text: "-: Ports.Rider\rRider which links the frame to a port.\r\r"
                    attr: 1
                  - text: "gx-, gy-"
                    attr: 3
                  - text: ": INTEGER\t[units]\rThe frame's origin in global coordinates (i.e., relative to the port's upper-left corner), but in units instead of pixels. This is an exception from the rule that riders use pixels, while frames use units.\r\rPROCEDURE (f: Frame) "
                    attr: 1
                  - text: ConnectTo
                    attr: 3
                  - text: " (p: Port)\rNEW, EXTENSIBLE\rConnects the frame to a port. All other frame procedures require a connected frame, i.e., "
                    attr: 1
                  - text: "rider # NIL"
                    attr: 2
                  - text: ". This precondition is not checked explicitly.\r"
                    attr: 1
                  - text: ConnectTo
                    attr: 2
                  - text: " is used internally.\r\rPost\rp = NIL\r\tf.unit = 0\r\tf.rider = NIL\rp # NIL\r\tf.unit = p.unit\r\tf.rider # NIL  &  f.rider.Base() = p\r\tf.dot = point - point MOD p.unit\r\rPROCEDURE (f: Frame) "
                    attr: 1
                  - text: SetOffset
                    attr: 3
                  - text: " (gx, gy: INTEGER)\rNEW, EXTENSIBLE\rSets the frame's origin, in global coordinates (i.e., relative to the port's upper-left corner), but in units instead of pixels. All local coordinates are relative to this origin. This method is only for internal use in the framework.\r"
                    attr: 1
                  - text: SetOffset
                    attr: 2
                  - text: " is used internally.\r\rPre\rf.rider # NIL\t20\r\rPost\rf.gx = gx  &  f.gy = gy\r\rPROCEDURE (f: Frame) "
                    attr: 1
                  - text: SaveRect
