                  - text: "\r\rDEFINITION Integers;\r\r\tIMPORT Files;\r\r\tTYPE Integer = POINTER;\r\r\tPROCEDURE Abs (x: Integer): Integer;\r\tPROCEDURE Compare (x, y: Integer): INTEGER;\r\tPROCEDURE ConvertFromString (IN s: ARRAY OF CHAR; OUT x: Integer);\r\tPROCEDURE ConvertToString (x: Integer; OUT s: ARRAY OF CHAR);\r\tPROCEDURE Difference (x, y: Integer): Integer;\r\tPROCEDURE Digits10Of (x: Integer): INTEGER;\r\tPROCEDURE Entier (x: REAL): Integer;\r\tPROCEDURE Externalize (w: Files.Writer; x: Integer);\r\tPROCEDURE Float (x: Integer): REAL;\r\tPROCEDURE GCD (x, y: Integer): Integer;\r\tPROCEDURE Internalize (r: Files.Reader; OUT x: Integer);\r\tPROCEDURE Long (x: LONGINT): Integer;\r\tPROCEDURE Power (x: Integer; exp: INTEGER): Integer;\r\tPROCEDURE Product (x, y: Integer): Integer;\r\tPROCEDURE QuoRem (x, y: Integer; OUT quo, rem: Integer);\r\tPROCEDURE Quotient (x, y: Integer): Integer;\r\tPROCEDURE Remainder (x, y: Integer): Integer;\r\tPROCEDURE Short (x: Integer): LONGINT;\r\tPROCEDURE Sign (x: Integer): INTEGER;\r\tPROCEDURE Sum (x, y: Integer): Integer;\r\tPROCEDURE ThisDigit10 (x: Integer; exp10: INTEGER): CHAR;\r\rEND Integers.\r\r\rModule "
                    attr: 1
                  - text: Integer
                    attr: 2
                  - text: " implements an abstract data type "
                    attr: 1
                  - text: Integer
                    attr: 2
                  - text: " to represent arbitrary precision integer numbers. It also offers the most important arithmetical operations on such numbers and a variety of conversion operations. The arithmetical operations include summation, multiplication, powering, computations of quotients, remainders, and greatest common divisors.\r\rWith respect to assignment and procedure parameters, variables of type "
                    attr: 1
                  - text: Integers.Integer
                    attr: 2
                  - text: " can be used in the same way as variables of the numerical types built into the language. Of course, to perform operations with such variables, special procedures have to be called. The \"operators\" +, -, *, DIV, MOD, etc. cannot be used . The same holds for comparisons.\r\rNote: Though the language syntax allows two variables of type "
                    attr: 1
                  - text: Integers.Integer
                    attr: 2
                  - text: " to be compared using the \"=\"-operator, the result is not what you would expect. Instead of values, pointers to objects representing the values are compared. Thus, the comparison may yield the result "
                    attr: 1
                  - text: "FALSE"
                    attr: 2
                  - text: ", although the values of the variables are equal. Hence, use the "
                    attr: 1
                  - text: Integers.Compare
                    attr: 2
                  - text: "-function instead of the \"=\"-operator.\r\rThe individual values are represented by objects on the heap rather than the stack. Clients of module "
                    attr: 1
                  - text: Integers
                    attr: 2
                  - text: " will use references to these objects only. Values of existing objects cannot be changed (they are immutable). Thus, copying such values is completely safe; it is not possible to inadvertantly change a value via an alias pointer.\r\rThe space needed to represent a small integer is that of the minimum object size of your Component Pascal implementation. To represent a large value, the required memory is proportional to the number of decimal digits in the value. Each of the operations offered by module "
                    attr: 1
                  - text: Integers
                    attr: 2
                  - text: " allocates memory necessary to represent its result, but no extra memory will be allocated beyond that (space for intermediate results is allocated on the stack).\r\rExamples of client modules:\r"
                    attr: 1
                  - link:
                      target: "StdCmds.OpenBrowser('Obx/Docu/Fact', 'ObxFact docu')"
                      body:
                        - text: ObxFact docu
                          attr: 3
                      attr: 1
                      w: 131250
                      h: 142875
                  - text: "\tcalculate factorials\r"
                    attr: 1
                  - link:
                      target: "StdCmds.OpenBrowser('Obx/Docu/RatCalc', 'ObxRatCalc docu')"
                      body:
                        - text: ObxFract docu
                          attr: 3
                      attr: 1
                      w: 131250
                      h: 142875
                  - text: "\tcalculatior/simplifier for rational numbers\r\r\rTYPE "
                    attr: 1
                  - text: Integer
                    attr: 4
                  - text: "\rOpaque\rOpaque type to represent integers of arbitrary size. Values of this type are allocated on the heap.  The required memory size depends on the number of decimals to be represented. The objects are immutable.\r\r\rPROCEDURE "
                    attr: 1
                  - text: Long
                    attr: 4
                  - text: " (x: LONGINT): Integer\r"
                    attr: 1
                  - text: Long
                    attr: 2
                  - text: " generates a new "
                    attr: 1
                  - text: Integer
                    attr: 2
                  - text: " from a "
                    attr: 1
                  - text: LONGINT
                    attr: 2
                  - text: " variable.\r\rPROCEDURE "
                    attr: 1
                  - text: Entier
                    attr: 4
                  - text: " (x: REAL): Integer\r"
                    attr: 1
                  - text: Entier
                    attr: 2
                  - text: " generates a new "
                    attr: 1
                  - text: Integer
                    attr: 2
                  - text: " from a "
                    attr: 1
                  - text: REAL
                    attr: 2
                  - text: " variable. "
                    attr: 1
                  - text: Entier
                    attr: 2
                  - text: " rounds similar to the "
                    attr: 1
                  - text: ENTIER
                    attr: 2
                  - text: "-function of the Component Pascal programming language; both implement the floor-function.\r\rPROCEDURE "
                    attr: 1
                  - text: Short
                    attr: 4
                  - text: " (x: Integer): LONGINT\r"
                    attr: 1
                  - text: Short
                    attr: 2
                  - text: " converts a value of type "
                    attr: 1
