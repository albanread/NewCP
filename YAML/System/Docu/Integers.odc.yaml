                  - text: ", "
                    attr: 1
                  - text: Remainder
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: Power
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: GCD
                    attr: 2
                  - text: " (= greatest common divisor), and "
                    attr: 1
                  - text: Abs
                    attr: 2
                  - text: " (= absolute value) are defined as to be expected. In particular, "
                    attr: 1
                  - text: Quotient
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: Remainder
                    attr: 2
                  - text: " are defined according the Component Pascal rules for "
                    attr: 1
                  - text: DIV
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: MOD
                    attr: 2
                  - text: ". If both quotient and remainder need to be computed, for performance reasons the procedure "
                    attr: 1
                  - text: QuoRem
                    attr: 2
                  - text: " should be called instead of the individual functions "
                    attr: 1
                  - text: Quotient
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: Remainder
                    attr: 2
                  - text: ". "
                    attr: 1
                  - text: Power
                    attr: 2
                  - text: " requires the exponent to be non-negative.\r\rPre (Quotient, Remainder, QuoRem)\ry # 0\r\rPre (Power)\rexp >= 0\r\rPROCEDURE "
                    attr: 1
                  - text: Compare
                    attr: 4
                  - text: " (x, y: Integer): INTEGER\rCompares the values of "
                    attr: 1
                  - text: x
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: y
                    attr: 2
                  - text: ". With this function, all comparison relations can be built: to compute the value of ("
                    attr: 1
                  - text: x op y
                    attr: 2
                  - text: ) write (
                    attr: 1
                  - text: "Compare(x, y) op 0"
                    attr: 2
                  - text: "), where "
                    attr: 1
                  - text: op
                    attr: 2
                  - text: " is one of =, #, <, <=, >, >=.\r\rPost\rx < y\r\tresult < 0\rx = y\r\tresult = 0\rx > y\r\tresult > 0\r\rPROCEDURE "
                    attr: 1
                  - text: Sign
                    attr: 4
                  - text: " (x: Integer): INTEGER\rThe sign of "
                    attr: 1
                  - text: x
                    attr: 2
                  - text: ".\r\rPost\rx > 0\r\tresult = 1\rx = 0\r\tresult = 0\rx < 0\r\tresult = -1\r\rPROCEDURE "
                    attr: 1
                  - text: Digits10Of
                    attr: 4
                  - text: " (x: Integer): INTEGER\rThe number of decimal digits needed to represent "
                    attr: 1
                  - text: x
                    attr: 2
                  - text: ".\rException: for "
                    attr: 1
                  - text: x = 0
                    attr: 2
                  - text: " the result is the value 0.\r\rPROCEDURE "
                    attr: 1
                  - text: ThisDigit10
                    attr: 4
                  - text: " (x: Integer; exp10: INTEGER): CHAR\rThis "
                    attr: 1
                  - text: Digit10
                    attr: 2
                  - text: " returns a single decimal digit as a character.\r\rPre\rexp10 >= 0\t20\r\rPost\r\"0\" <= result <= \"9\"\rexp10 >= Digits10Of(x)\r\tresult = \"0\"\r\rPROCEDURE "
                    attr: 1
                  - text: ConvertFromString
                    attr: 4
                  - text: " (IN s: ARRAY OF CHAR; OUT x: Integer)\rPROCEDURE "
                    attr: 1
                  - text: ConvertToString
                    attr: 4
                  - text: " (x: Integer; OUT s: ARRAY OF CHAR)\r"
                    attr: 1
                  - text: ConvertFromString
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: ConvertToString
                    attr: 2
                  - text: " are used to read an "
                    attr: 1
                  - text: Integer
                    attr: 2
                  - text: " from a string resp. to write an "
                    attr: 1
                  - text: Integer
                    attr: 2
                  - text: " to a string. "
                    attr: 1
                  - text: ConvertToString
                    attr: 2
                  - text: " requires that the string is long enough to represent the "
                    attr: 1
                  - text: Integer
                    attr: 2
                  - text: ".\r\rPre (ConvertToString)\r(Sign(x) >= 0) & (LEN(s) >= Digits10Of(x) + 1)\rOR\r(Sign(x) < 0) & (LEN(s) >= Digits10Of(x) + 2)\r\rPROCEDURE "
                    attr: 1
