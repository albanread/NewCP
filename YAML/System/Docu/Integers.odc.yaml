                    attr: 2
                  - text: " into a "
                    attr: 1
                  - text: LONGINT
                    attr: 2
                  - text: ".\r\rPre\rMIN(LONGINT) <= x <= MAX(LONGINT)\r\rPROCEDURE "
                    attr: 1
                  - text: Float
                    attr: 4
                  - text: " (x: Integer): REAL\r"
                    attr: 1
