                  - text: Abs
                    attr: 4
                  - text: " (x: Integer): Integer\rThe arithmetic operations "
                    attr: 1
                  - text: Sum
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: Difference
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: Product
                    attr: 2
