                  - text: "\r\rDEFINITION Stores;\r\r\tIMPORT Files;\r\r\tCONST\r\t\talienVersion = 1; alienComponent = 2;\r\t\tinconsistentVersion = -1; inconsistentType = -2; moduleFileNotFound = -3;\r\t\tinvalidModuleFile = -4; inconsModuleVersion = -5; typeNotFound = -6;\r\r\tTYPE\r\t\tTypeName = ARRAY 64 OF CHAR;\r\t\tTypePath = ARRAY 16 OF TypeName;\r\r\t\tOpName = ARRAY 32 OF CHAR;\r\r\t\tDomain = POINTER TO LIMITED RECORD\r\t\t\tPROCEDURE (d: Domain) GetSequencer (): ANYPTR, NEW;\r\t\t\tPROCEDURE (d: Domain) SetSequencer (sequencer: ANYPTR), NEW\r\t\tEND;\r\r\t\tOperation = POINTER TO ABSTRACT RECORD\r\t\t\tPROCEDURE (op: Operation) Do, NEW, ABSTRACT\r\t\tEND;\r\r\t\tStore = POINTER TO ABSTRACT RECORD\r\t\t\tPROCEDURE (s: Store) Domain (): Domain, NEW;\r\t\t\tPROCEDURE (s: Store) CopyFrom- (source: Store), NEW, EMPTY;\r\t\t\tPROCEDURE (s: Store) Internalize- (VAR rd: Reader), NEW, EMPTY;\r\t\t\tPROCEDURE (s: Store) Externalize- (VAR wr: Writer), NEW, EMPTY;\r\t\t\tPROCEDURE (s: Store) ExternalizeAs- (VAR s1: Store), NEW, EMPTY\r\t\tEND;\r\r\t\tReader = RECORD\r\t\t\trider-: Files.Reader;\r\t\t\tcancelled-: BOOLEAN;\r\t\t\treadAlien-: BOOLEAN;\r\t\t\t(VAR rd: Reader) ConnectTo (f: Files.File), NEW;\r\t\t\t(VAR rd: Reader) Pos (): INTEGER, NEW;\r\t\t\t(VAR rd: Reader) SetPos (pos: INTEGER), NEW;\r\t\t\t(VAR rd: Reader) ReadBool (OUT x: BOOLEAN), NEW;\r\t\t\t(VAR rd: Reader) ReadSChar (OUT x: SHORTCHAR), NEW;\r\t\t\t(VAR rd: Reader) ReadXChar (OUT x: CHAR), NEW;\r\t\t\t(VAR rd: Reader) ReadChar (OUT x: CHAR), NEW;\r\t\t\t(VAR rd: Reader) ReadByte (OUT x: BYTE), NEW;\r\t\t\t(VAR rd: Reader) ReadSInt (OUT x: SHORTINT), NEW;\r\t\t\t(VAR rd: Reader) ReadXInt (OUT x: INTEGER), NEW;\r\t\t\t(VAR rd: Reader) ReadInt (OUT x: INTEGER), NEW;\r\t\t\t(VAR rd: Reader) ReadLong (OUT x: LONGINT), NEW;\r\t\t\t(VAR rd: Reader) ReadSReal (OUT x: SHORTREAL), NEW;\r\t\t\t(VAR rd: Reader) ReadXReal (OUT x: REAL), NEW;\r\t\t\t(VAR rd: Reader) ReadReal (OUT x: REAL), NEW;\r\t\t\t(VAR rd: Reader) ReadSet (OUT x: SET), NEW;\r\t\t\t(VAR rd: Reader) ReadSString (OUT x: ARRAY OF SHORTCHAR), NEW;\r\t\t\t(VAR rd: Reader) ReadXString (OUT x: ARRAY OF CHAR), NEW;\r\t\t\t(VAR rd: Reader) ReadString (OUT x: ARRAY OF CHAR), NEW;\r\t\t\t(VAR rd: Reader) ReadStore (OUT x: Store), NEW;\r\t\t\t(VAR rd: Reader) ReadVersion (min, max: INTEGER; OUT version: INTEGER), NEW;\r\t\t\t(VAR rd: Reader) TurnIntoAlien (cause: INTEGER), NEW\r\t\tEND;\r\r\t\tWriter = RECORD\r\t\t\trider-: Files.Writer;\r\t\t\twrittenStore-: Store;\r\t\t\t(VAR wr: Writer) ConnectTo (f: Files.File), NEW;\r\t\t\t(VAR wr: Writer) Pos (): INTEGER, NEW;\r\t\t\t(VAR wr: Writer) SetPos (pos: INTEGER), NEW;\r\t\t\t(VAR wr: Writer) WriteBool (x: BOOLEAN), NEW;\r\t\t\t(VAR wr: Writer) WriteSChar (x: SHORTCHAR), NEW;\r\t\t\t(VAR wr: Writer) WriteXChar (x: CHAR), NEW;\r\t\t\t(VAR wr: Writer) WriteChar (x: CHAR), NEW;\r\t\t\t(VAR wr: Writer) WriteByte (x: BYTE), NEW;\r\t\t\t(VAR wr: Writer) WriteSInt (x: SHORTINT), NEW;\r\t\t\t(VAR wr: Writer) WriteXInt (x: INTEGER), NEW;\r\t\t\t(VAR wr: Writer) WriteInt (x: INTEGER), NEW;\r\t\t\t(VAR wr: Writer) WriteLong (x: LONGINT), NEW;\r\t\t\t(VAR wr: Writer) WriteSReal (x: SHORTREAL), NEW;\r\t\t\t(VAR wr: Writer) WriteXReal (x: REAL), NEW;\r\t\t\t(VAR wr: Writer) WriteReal (x: REAL), NEW;\r\t\t\t(VAR wr: Writer) WriteSet (x: SET), NEW;\r\t\t\t(VAR wr: Writer) WriteSString (IN x: ARRAY OF SHORTCHAR), NEW;\r\t\t\t(VAR wr: Writer) WriteXString (IN x: ARRAY OF CHAR), NEW;\r\t\t\t(VAR wr: Writer) WriteString (IN x: ARRAY OF CHAR), NEW;\r\t\t\t(VAR wr: Writer) WriteStore (x: Store), NEW;\r\t\t\t(VAR wr: Writer) WriteVersion (version: INTEGER), NEW\r\t\tEND;\r\r\t\tAlienComp = POINTER TO LIMITED RECORD\r\t\t\tnext-: AlienComp\r\t\tEND;\r\r\t\tAlienPiece = POINTER TO LIMITED RECORD (AlienComp)\r\t\t\tnext-: AlienComp;\r\t\t\tpos-, len-: INTEGER\r\t\tEND;\r\r\t\tAlienPart = POINTER TO LIMITED RECORD (AlienComp)\r\t\t\tnext-: AlienComp;\r\t\t\tstore-: Store\r\t\tEND;\r\r\t\tAlien = POINTER TO LIMITED RECORD (Store)\r\t\t\tpath-: TypePath;\r\t\t\tcause-: INTEGER;\r\t\t\tfile-: Files.File;\r\t\t\tcomps-: AlienComp\r\t\tEND;\r\r\tPROCEDURE InitDomain (s: Store);\r\tPROCEDURE CopyOf (s: Store): Store;\r\tPROCEDURE Join (s0, s1: Store);\r\tPROCEDURE Joined (s0, s1: Store): BOOLEAN;\r\tPROCEDURE Unattached (s: Store): BOOLEAN;\r\tPROCEDURE ExternalizeProxy (s: Store): Store;\r\tPROCEDURE Report (IN msg, p0, p1, p2: ARRAY OF CHAR);\r\rEND Stores.\r\r\r"
                    attr: 1
                  - text: Introduction
                    attr: 2
                  - text: "\r\rModule "
                    attr: 1
                  - text: Stores
                    attr: 3
                  - text: " defines a data type "
                    attr: 1
                  - text: Store
                    attr: 3
                  - text: ", which should be used as base type of all storable extensible objects. When storing an object of an extensible type, it is necessary to store not only its contents but also its particular type. The type is needed to create an object of the correct type when reading the data in again.\rA variable of (an extension of) type "
                    attr: 1
                  - text: Store
                    attr: 3
                  - text: " is stored in a file. A store must implement the "
                    attr: 1
                  - text: Internalize
                    attr: 3
                  - text: " procedure which takes a "
                    attr: 1
                  - text: Reader
                    attr: 3
                  - text: " as parameter, and the "
                    attr: 1
                  - text: Externalize
                    attr: 3
                  - text: " procedure which takes a "
                    attr: 1
                  - text: Writer
                    attr: 3
                  - text: " as parameter. These procedures read/write the store's persistent state. (A store may also have temporary state which is not internalized/externalized.) Readers and writers are mappers on files. The types "
                    attr: 1
                  - text: Views.View
                    attr: 3
                  - text: " and "
                    attr: 1
                  - text: TextModels.Model
                    attr: 3
                  - text: " are examples of "
                    attr: 1
                  - text: Store
                    attr: 3
                  - text: " extensions.\r\rStores may form arbitrary graphs. The \"boundary\" of a graph is determined by its "
                    attr: 1
                  - text: domain
                    attr: 3
                  - text: ". This is an object that represents the whole collection of stores that can be externalized to a file, or be internalized from a file. The stores of a domain are externalized and internalized such that pointers among them are reconstructed correctly upon internalization. In particular, "
                    attr: 1
                  - text: alias pointers
                    attr: 3
                  - text: " are handled correctly: if several stores point to another element of the same domain, this element is read in only once, and all the pointers to it are rebuilt. Arbitrary graphs can be handled this way, e.g., cyclic data structures. Links to stores of other domains are prohibited.\r\rA document consists of a hierarchy of views and models, both of which are stores. Possibly there may occur further stores in a document, such as text attribute objects or controller objects. All stores of a document share the same domain.\rThe stores of a domain may be manipulated indirectly via "
                    attr: 1
                  - text: operation
                    attr: 3
                  - text: " objects. An operation implements a method "
                    attr: 1
                  - text: Do
                    attr: 3
                  - text: ", which must be auto-inverse (i.e., executing it twice undoes its effect). This is the key to the undo/redo mechanism of the compound document architecture of BlackBox. However, in principle it could also be used by a transaction mechanism to implement transactions on persistent non-document data represented as stores.\r\rThe contents of a store is stored in a file. When reading the same file by another BlackBox configuration, it may occur that not all necessary modules are available in this configuration, i.e., the module which defines the store's type cannot be loaded. Yet reading such an \"alien\" store does not fail completely. Instead of the correct store type, an \"alien\" object is generated. Obviously such an alien cannot interpret the data it represents, and therefore cannot provide any special behavior. However, it may be copied and stored into another file, such that its contents on the new file are intact and consistent.\r\rTo define the set of stores that belong to a domain and to set up an actual domain, two procedures have to be provided by the framework. A first procedure is needed to collect stores in sets and to join store sets, and a second procedure is used to assign an actual domain object to a set of stores. In BlackBox these procedures are "
                    attr: 1
                  - text: Join
                    attr: 3
                  - text: " and "
                    attr: 1
                  - text: InitDomain
                    attr: 3
                  - text: ". They are discussed in more detail below.\r\r"
                    attr: 1
                  - text: "Join\r"
                    attr: 2
                  - text: "\r"
                    attr: 3
                  - text: "Procedure "
                    attr: 1
                  - text: Join
                    attr: 3
                  - text: " is used to join two store sets. This procedure has to be called whenever a link from a store in one set is established to a store in the other set. As arguments, representatives of the two store sets have to be passed. "
                    attr: 1
                  - text: Join
                    attr: 3
                  - text: " is symmetric. If the two stores which are passed as arguments already belong to the same set, "
                    attr: 1
                  - text: Join
                    attr: 3
                  - text: " has no effect. Figure 1 demonstrates the effect of a "
                    attr: 1
                  - text: Join
                    attr: 3
                  - text: " operation on two store sets X and Y.\r\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 136525
                      dsc: 28575
                      grid: 165100
                      tabs:
                        - { stop: 360000 }
                      attr: 1
                      w: 360000000
                      h: 444500
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 8
                      bodyPos: 1166
                      bodyLen: 7537
                    attr: 1
                    w: 6009120
                    h: 1301040
                  - text: "Figure 1: Effect of a Join operation on two disjoint store sets X and Y."
                    attr: 3
                  - text: "\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 136525
                      dsc: 28575
                      grid: 165100
                      opts: 0x00000003
                      tabs:
                        - { stop: 360000 }
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "\r"
                    attr: 1
                  - text: Join
                    attr: 3
                  - text: " calls have to be added at those places where newly created stores are connected, usually in a factory procedure. All those stores have to be joined with a store "
                    attr: 1
                  - text: s
                    attr: 3
                  - text: " which are written to disk in the "
                    attr: 1
                  - text: Externalize
                    attr: 3
                  - text: " method of store "
                    attr: 1
                  - text: s
                    attr: 3
                  - text: ". "
                    attr: 1
                  - text: "\r\rJoin"
                    attr: 3
                  - text: " calls are not necessary in the "
                    attr: 1
                  - text: Internalize
                    attr: 3
                  - text: " and "
                    attr: 1
                  - text: CopyOf
                    attr: 3
                  - text: " methods where usually also links between stores are established. Module "
                    attr: 1
                  - text: Stores
                    attr: 3
                  - text: " has sufficient information to join these stores itself.\r"
                    attr: 1
                  - text: "\r"
                    attr: 2
                  - text: "The function "
                    attr: 1
                  - text: "Joined "
                    attr: 3
                  - text: "allows to test whether two given stores belong to the same store set, i.e., whether they have been joined or not. "
                    attr: 1
                  - text: "Joined "
                    attr: 3
                  - text: "is symmetric, reflexive and transitive.\r\r"
                    attr: 1
                  - text: InitDomain
                    attr: 2
                  - text: "\r\rIn order to assign an actual domain object to a free store or a store set, the procedure "
                    attr: 1
                  - text: InitDomain
                    attr: 3
                  - text: " is called. As parameter a member of the set (or a single store) is passed. The actual domain object is created inside module "
                    attr: 1
                  - text: "Stores "
                    attr: 3
                  - text: (
                    attr: 1
                  - text: Domain
                    attr: 3
                  - text: " is limited) and then assigned to all stores in the set"
                    attr: 1
                  - text: .
                    attr: 3
                  - text: " After a domain has been assigned to a store graph this domain can be accessed with the "
                    attr: 1
                  - text: "Domain() "
                    attr: 3
                  - text: "method defined in the "
                    attr: 1
                  - text: Store
                    attr: 3
                  - text: " type. If "
                    attr: 1
                  - text: InitDomain
                    attr: 3
                  - text: " is called on a store which is already assigned to a domain object, then the procedure has no effect. The framework calls "
                    attr: 1
                  - text: InitDomain
                    attr: 3
                  - text: " in module "
                    attr: 1
                  - text: Documents
                    attr: 3
                  - text: " only whenever a new document is created. Usually, there is no need for BlackBox programmers to call "
                    attr: 1
                  - text: InitDomain
                    attr: 3
                  - text: " themselves, except when a deep copy of a document is created.\r\rThe arguments of "
                    attr: 1
                  - text: Join
                    attr: 3
                  - text: " may or may not be bound to a domain. If only one argument store is bound to a domain, then the effect of "
                    attr: 1
                  - text: Join
                    attr: 3
                  - text: " is that all stores in the other set are bound to the same domain object. If both arguments are bound to a domain then they have to be bound to the same one and "
                    attr: 1
                  - text: Join
                    attr: 3
                  - text: " has no effect, otherwise a precondition trap is raised.\r\rThe function "
                    attr: 1
                  - text: "Joined "
                    attr: 3
                  - text: "can be applied on stores independent of whether they are bound to a domain or not. If store "
                    attr: 1
                  - text: s0
                    attr: 3
                  - text: " or "
                    attr: 1
                  - text: s1
                    attr: 3
                  - text: " is bound to a domain, then "
                    attr: 1
                  - text: "Joined(s0, s1)"
                    attr: 3
                  - text: " is equivalent to "
                    attr: 1
                  - text: s0.Domain() = s1.Domain()
                    attr: 3
                  - text: ".\r\rThe procedures "
                    attr: 1
                  - text: Join
                    attr: 3
                  - text: " and "
                    attr: 1
                  - text: InitDomain
                    attr: 3
                  - text: " specify the following pre and post conditions.\r\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 136525
                      dsc: 28575
                      grid: 165100
                      opts: 0x00000003
                      tabs:
                        - { stop: 360000 }
                        - { stop: 504000 }
                        - { stop: 1080000 }
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "\tPROCEDURE "
                    attr: 1
                  - text: "Join "
                    attr: 2
                  - text: "(s0, s1: Store)\r\t\tPRE 20\ts0 # NIL\r\t\tPRE 21\ts1 # NIL\r\t\tPRE 22\ts0.Domain() = NIL OR s1.Domain() = NIL OR s0.Domain() = s1.Domain()\r\t\tPOST\tJoined(s0, s1)\r\t\r\tPROCEDURE"
                    attr: 1
                  - text: " InitDomain "
                    attr: 2
                  - text: "(s: Store)\r\t\tPRE 20\ts # NIL\r\t\tPOST\ts.Domain() # NIL\r\t\rIf two stores have to be joined and precondition 22 is not met, then a deep copy of one of the two stores has to be generated using "
                    attr: 1
                  - text: CopyOf.
                    attr: 3
                  - text: "\r\r"
                    attr: 1
                  - text: "Alias pointers and copying\r\r"
                    attr: 2
                  - text: "The stores of a domain are externalized and internalized such that pointers among them are reconstructed correctly upon internalization. In particular, "
                    attr: 1
                  - text: alias pointers
                    attr: 3
                  - text: " are handled correctly: if several stores point to a particular element of the same domain, this element is read in only once, and all the pointers to it are rebuilt. Arbitrary graphs can be handled this way, including cyclic data structures.\r\rCloning of stores is provided by procedure "
                    attr: 1
                  - text: CopyOf
                    attr: 3
                  - text: ". This procedure creates a new object and then calls the "
                    attr: 1
                  - text: CopyFrom
                    attr: 3
                  - text: " method with the original object as parameter. This mechanism can conceptually be regarded as writing the store to a file and then reading it back as a clone.\r\rAlias pointers are handled correctly. Whenever "
                    attr: 1
                  - text: CopyOf
                    attr: 3
                  - text: " is called, all copied stores are stored in a table which is associated with the store's set of joined stores. All recursive calls of "
                    attr: 1
                  - text: CopyOf
                    attr: 3
                  - text: " can access this information. After the top-level call of "
                    attr: 1
                  - text: "CopyOf "
                    attr: 3
                  - text: "terminates, the table with the copies is discarded. \r\rHowever, there would be a problem with restoring alias pointers if during a call of "
                    attr: 1
                  - text: CopyOf
                    attr: 3
                  - text: " additional stores are added to the store set which contains the alias information. Therefore, "
                    attr: 1
                  - text: "Join(s0, s1) "
                    attr: 3
                  - text: "must not be called while a "
                    attr: 1
                  - text: CopyOf
                    attr: 3
                  - text: " operation is active either on "
                    attr: 1
                  - text: s0
                    attr: 3
                  - text: " or on "
                    attr: 1
                  - text: s1
                    attr: 3
                  - text: ". If such a situation appears, then an implementation trap is raised. This can be avoided by joining the involved stores before copying the store graph.\r\r"
                    attr: 1
                  - text: "Additional Remarks\r\r"
                    attr: 2
                  - text: "Aliens\r"
                    attr: 3
                  - text: "\r"
                    attr: 2
                  - text: "Aliens are handled in a special way regarding domains. Since aliens are immutable, they are never copied and can be inserted into any store graph. As a store can only reference one domain, this would violate the rule that a store in a document may not refer to stores that belong to another domain. Therefore, all aliens are assigned a special domain for aliens. Module "
                    attr: 1
                  - text: Stores
                    attr: 3
                  - text: " knows this rule and does not trap if an alien is externalized.\r\r"
                    attr: 1
                  - text: "Operations and undo\r\r"
                    attr: 3
                  - text: "Calls of "
                    attr: 1
                  - text: Join
                    attr: 3
                  - text: " or "
                    attr: 1
                  - text: InitDomain
                    attr: 3
                  - text: " on stores are not operations, thus these calls cannot be undone! If stores are joined or assigned to a domain as a side effect of an operation and if the operation is undone, then the asignments which were performed on involved stores are not undone. This may require that a deep copy is generated before an operation is applied to a store graph.\r\r"
                    attr: 1
                  - text: Shallow copies
                    attr: 3
                  - text: "\r\rModule "
                    attr: 1
                  - text: Views
                    attr: 3
                  - text: " offers a procedure "
                    attr: 1
                  - text: "CopyOf "
                    attr: 3
                  - text: " which allows to make shallow copies of views. A shallow copy of a view means that the copy refers to the same model like the original. As models and views are always joined, this implies that a view and its shallow copy are also joined.\r\r"
                    attr: 1
                  - text: Inspecting a store set
                    attr: 3
                  - text: "\r\rA store set cannot be inspected programmatically beyond what is offered by procedure "
                    attr: 1
                  - text: Joined
                    attr: 3
                  - text: ". However, the debugger allows to iterate over all stores in a store set. The stores which belong to the same store set are linked in a circular list. As soon as a domain object is associated to the set, the links are set to "
                    attr: 1
                  - text: NIL
                    attr: 3
                  - text: " and each store in the set refers to the new domain object. To iterate over a store set the debugger has to be called before the store set is bound. Then, the stores can be iterated with the store's next field. Listing 2 shows a simple procedure which generates an empty text view and then opens the debugger. Following the "
                    attr: 1
                  - text: next
                    attr: 3
                  - text: " fields of the view "
                    attr: 1
                  - text: v
                    attr: 3
                  - text: ", you see that the following seven stores are joined in one set: "
                    attr: 1
                  - text: TextModels.Model
                    attr: 3
                  - text: ", "
                    attr: 1
                  - text: TextModels.Attributes
                    attr: 3
                  - text: ", "
                    attr: 1
                  - text: TextRulers.Ruler
                    attr: 3
                  - text: ", "
                    attr: 1
                  - text: TextRulers.Style
                    attr: 3
                  - text: ", "
                    attr: 1
                  - text: TextRulers.Attributes
                    attr: 3
                  - text: ", "
                    attr: 1
                  - text: TextViews.View
                    attr: 3
                  - text: " and "
                    attr: 1
                  - text: TextControllers.Controller
                    attr: 3
                  - text: ".\r\r"
                    attr: 1
                  - ruler:
                      first: 360000
                      left: 360000
                      right: 5940000
                      lead: 50800
                      dsc: 28575
                      grid: 1
                      opts: 0x00000003
                      tabs:
                        - { stop: 504000 }
                        - { stop: 648000 }
                        - { stop: 792000 }
                        - { stop: 936000 }
                        - { stop: 2520000 }
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "MODULE Test;\r\r\tIMPORT TextViews, TextModels;\r\t\r\tPROCEDURE "
                    attr: 4
                  - text: Do
                    attr: 5
                  - text: "*;\r\t\tVAR v: TextViews.View;\r\tBEGIN\r\t\tv := TextViews.dir.New(TextModels.dir.New());\r\t\tHALT(0);\r\tEND Do;\r\t\rEND Test.\r\r"
                    attr: 4
                  - text: "Listing 2: Inspecting the stores in a store set\r"
                    attr: 3
                  - ruler:
                      left: 0
