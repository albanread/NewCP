                      h: 444500
                  - text: "\rUnattached\r"
                    attr: 3
                  - text: "\rFunction "
                    attr: 1
                  - text: Unattached(s)
                    attr: 3
                  - text: " tests whether a store"
                    attr: 1
                  - text: " s "
                    attr: 3
                  - text: "has been joined to other stores or was bound to a domain. If neither is the case "
                    attr: 1
                  - text: "Unattached "
                    attr: 3
                  - text: "returns "
                    attr: 1
                  - text: "TRUE"
                    attr: 3
                  - text: ". This function is only provided by the framework to decide whether a single store can be simply joined to another store graph or whether a deep copy must be generated; e.g., for a store that is kept in a cache and which may be joined to different store graphs.\r\rFor this special purpose the following code pattern is used. In this example, store "
                    attr: 1
                  - text: s1
                    attr: 3
                  - text: " is copied if it is attached. This way an unnecessary copy call in the case that the store is unattached is prevented.\r\r"
                    attr: 1
                  - text: "\tIF ~Stores.Joined(s0, s1) THEN\r\t\tIF ~Stores.Unattached(s1) THEN s1 := Stores.CopyOf(s1) END;\r\t\tStores.Join(s0, s1)\r\tEND;\r\r"
                    attr: 4
                  - text: "The pattern is not symmetric because it is often known statically that either s0 or s1 should never be copied. It is used for small stores which are generated once and which may be joined to different store sets.\r\r"
                    attr: 1
                  - text: Data types
                    attr: 2
                  - text: "\r\r"
                    attr: 1
                  - text: Stores
                    attr: 3
                  - text: " provides a pair of mapper types, which are used as parameters in a store's "
                    attr: 1
                  - text: Internalize
                    attr: 3
                  - text: " and "
                    attr: 1
                  - text: Externalize
                    attr: 3
                  - text: " procedures. These readers/writers use the following external (little endian) format:\r\rBOOLEAN\r\t1 byte (0 = FALSE, 1 = TRUE)\r\rSHORTCHAR\r\t1 byte in the Latin-1 character set (i.e., Unicode page 0; 00X..0FFX)\r\rCHAR\r\t2 byte in the Unicode character set (0000X..0FFFFX)\r\rBYTE\r\t1 byte (-128..127)\r\rSHORTINT\r\t2 bytes (-32768..32767)\r\rINTEGER\r\t4 bytes (-2147483648..2147483647)\r\rLONGINT\r\t8 bytes (-9223372036854775808..9223372036854775807)\r\rSHORTREAL\r\t4 bytes IEEE format\r\rREAL\r\t8 bytes IEEE format\r\rSET\r\t4 bytes (least significant bit = element 0)\r\rShort String\r\tstring in the Latin-1 character set, followed by a 00X\r\rString\r\tstring in the Unicode character set, followed by a 0000X\r\r\rCONST "
                    attr: 1
                  - text: alienVersion
                    attr: 2
                  - text: "\rThis value is assigned to a "
                    attr: 1
                  - text: Reader
                    attr: 3
                  - text: "'s "
                    attr: 1
                  - text: cause
                    attr: 3
                  - text: " field if "
                    attr: 1
                  - text: Reader.ReadVersion
                    attr: 3
                  - text: " read a version outside of the specified range.\r\rCONST "
                    attr: 1
                  - text: alienComponent
                    attr: 2
                  - text: "\rThis value can be used as "
                    attr: 1
                  - text: cause
                    attr: 3
                  - text: " parameter to "
                    attr: 1
                  - text: Reader.TurnIntoAlien
                    attr: 3
                  - text: " to indicate that the store itself could be read, but that some store contained in it is an alien. As an example, a view may turn itself into an alien if its model is an alien.\r\rCONST "
                    attr: 1
                  - text: inconsistentVersion
                    attr: 2
                  - text: "\rThis value is assigned to a "
                    attr: 1
                  - text: Reader
                    attr: 3
                  - text: "'s "
                    attr: 1
                  - text: cause
                    attr: 3
                  - text: " field if "
                    attr: 1
                  - text: Reader.ReadVersion
                    attr: 3
                  - text: " read a data block which has an inconsistent length, i.e., not all of its data have been read, or it has been attempted to read beyond the end of the data.\r\rCONST "
                    attr: 1
                  - text: inconsistentType
                    attr: 2
                  - text: "\rThis value is assigned to a "
                    attr: 1
                  - text: Reader
                    attr: 3
                  - text: "'s "
                    attr: 1
                  - text: cause
                    attr: 3
                  - text: " field if "
                    attr: 1
                  - text: Reader.ReadVersion
                    attr: 3
                  - text: " detected a change in the type extension hierarchy of the internalized type.\r\rCONST "
                    attr: 1
                  - text: moduleFileNotFound
                    attr: 2
                  - text: "\rThis value is assigned to a "
                    attr: 1
                  - text: Reader
                    attr: 3
                  - text: "'s "
                    attr: 1
                  - text: cause
                    attr: 3
                  - text: " field if "
                    attr: 1
                  - text: Reader.ReadVersion
                    attr: 3
                  - text: " tried to load a module defining an internalized type, and the codefile for this module couldn't be found.\r\rCONST "
                    attr: 1
                  - text: invalidModuleFile
                    attr: 2
                  - text: "\rThis value is assigned to a "
                    attr: 1
                  - text: Reader
                    attr: 3
                  - text: "'s "
                    attr: 1
                  - text: cause
                    attr: 3
                  - text: " field if "
                    attr: 1
                  - text: Reader.ReadVersion
                    attr: 3
                  - text: " tried to load a module defining an internalized type, and the module couldn't be loaded because it imports another module which cannot be loaded for some reason.\r\rCONST "
                    attr: 1
                  - text: inconsModuleVersion
                    attr: 2
                  - text: "\rThis value is assigned to a "
                    attr: 1
                  - text: Reader
                    attr: 3
                  - text: "'s "
                    attr: 1
                  - text: cause
                    attr: 3
                  - text: " field if "
                    attr: 1
                  - text: Reader.ReadVersion
                    attr: 3
                  - text: " tried to load a module defining an internalized type, and the module couldn't be loaded because its version is inconsistent with some already loaded module.\r\rCONST "
                    attr: 1
                  - text: typeNotFound
                    attr: 2
                  - text: "\rThis value is assigned to a "
                    attr: 1
                  - text: Reader
                    attr: 3
                  - text: "'s "
                    attr: 1
                  - text: cause
                    attr: 3
                  - text: " field if "
                    attr: 1
                  - text: Reader.ReadVersion
                    attr: 3
                  - text: " tried to internalize a non-existing type (the module was found, however).\r\r\rTYPE "
                    attr: 1
                  - text: TypeName
                    attr: 2
                  - text: "\rString type for the type name of an object.\r\r\rTYPE "
                    attr: 1
                  - text: TypePath
                    attr: 2
                  - text: "\rArray of type names.\r\r\rTYPE "
                    attr: 1
                  - text: OpName
                    attr: 2
                  - text: "\rString type for the name of an operation.\r\r\rTYPE "
                    attr: 1
                  - text: Domain
                    attr: 2
                  - text: "\rLIMITED\rA domain represents a graph of stores which may be saved in a file as a whole. All stores of a domain refer to an object of type "
                    attr: 1
                  - text: Domain
                    attr: 3
                  - text: ".\r\rPROCEDURE (d: Domain) GetSequencer (): ANYPTR\rNEW\rUsed internally.\r\rPROCEDURE (d: Domain) SetSequencer (sequencer: ANYPTR)\rNEW\rUsed internally.\r\r\rTYPE "
                    attr: 1
                  - text: Operation
                    attr: 2
                  - text: "\rABSTRACT\rAn operation is an object that represents a command performed on some store(s) of a domain. An operation can be undone (i.e., aborted) and redone.\r\rPROCEDURE (op: Operation) "
                    attr: 1
                  - text: Do
                    attr: 2
                  - text: "\rNEW, ABSTRACT\rThis method implements the actual behavior of the operation. It must be auto-inverse, i.e., if executed an even number of times, it must have no effect. If executed an odd number of times, it should have the same effect.\r\r\rTYPE "
                    attr: 1
                  - text: Store
                    attr: 2
                  - text: "\r"
                    attr: 3
                  - text: "ABSTRACT\rStorable extensible data types like "
                    attr: 1
                  - text: Views.View
                    attr: 3
                  - text: " or "
                    attr: 1
                  - text: TextModels.Text
                    attr: 3
                  - text: " are derived from "
                    attr: 1
                  - text: Store
                    attr: 3
                  - text: ".\rStores are typically allocated by suitable directories, e.g., "
                    attr: 1
                  - text: Views.Directory
                    attr: 3
                  - text: " or "
                    attr: 1
                  - text: TextModels.Directory
                    attr: 3
                  - text: ".\rStores are used as base types for all objects that must be both extensible and persistent.\r\rPROCEDURE (s: Store) "
                    attr: 1
                  - text: Domain
                    attr: 2
                  - text: " (): Domain\rNEW\rA store may be associated with a domain. This is done by the procedure "
                    attr: 1
                  - text: InitDomain
                    attr: 3
                  - text: ", which assigns a domain to the store.\r"
                    attr: 1
                  - text: Domain
                    attr: 3
                  - text: " may be called by arbitrary clients.\r\rPROCEDURE (s: Store) "
                    attr: 1
                  - text: CopyFrom
                    attr: 2
                  - text: "- (source: Store)\rNEW, EMPTY\rCopy the contents of "
                    attr: 1
                  - text: source
                    attr: 3
                  - text: " to "
                    attr: 1
                  - text: s
                    attr: 3
                  - text: ". Copying is a deep copy.\r\rPre\rsource # NIL\tguaranteed\rTYP(source) = TYP(s)\tguaranteed\rs.Domain() = NIL\tguaranteed\rs is not yet initialized\tguaranteed\r\rPROCEDURE (s: Store) "
                    attr: 1
                  - text: Internalize
                    attr: 2
                  - text: "- (VAR rd: Reader)\rNEW, EMPTY\r(For backward compatibility, this method is actually still EXTENSIBLE. This may change in the future.)\rReads the contents of "
                    attr: 1
                  - text: s
                    attr: 3
                  - text: " from reader "
                    attr: 1
                  - text: rd
                    attr: 3
                  - text: ". "
                    attr: 1
                  - text: Internalize
                    attr: 3
                  - text: " must read the same (amount of) data as is written by the corresponding "
                    attr: 1
                  - text: Externalize
                    attr: 3
                  - text: " procedure.\r"
                    attr: 1
                  - text: Internalize
                    attr: 3
                  - text: " is called locally.\r"
                    attr: 1
                  - text: Internalize
                    attr: 3
                  - text: " is extended by various persistent object types, e.g., models, views, and controllers.\r\rPre\rsource.Domain() = NIL\tguaranteed\rsource is not yet initialized\tguaranteed\r\rPROCEDURE (s: Store) "
                    attr: 1
                  - text: Externalize
                    attr: 2
                  - text: "- (VAR wr: Writer)\rNEW, EMPTY\r(For backward compatibility, this method is actually still EXTENSIBLE. This may change in the future.)\rWrite the contents of "
                    attr: 1
                  - text: s
                    attr: 3
                  - text: " to writer "
                    attr: 1
                  - text: wr
                    attr: 3
                  - text: ". "
                    attr: 1
                  - text: Externalize
                    attr: 3
                  - text: " must write the same (amount of) data as is read by the corresponding "
                    attr: 1
                  - text: Internalize
                    attr: 3
                  - text: " procedure.\r"
                    attr: 1
                  - text: Externalize
                    attr: 3
                  - text: " ist called locally.\r"
                    attr: 1
                  - text: Externalize
                    attr: 3
                  - text: " is extended by various persistent object types, e.g., models, views, and controllers.\r\rPROCEDURE (s: Store) "
                    attr: 1
                  - text: ExternalizeAs
                    attr: 2
                  - text: "- (VAR s1: Store)\rNEW, EMPTY\rBefore a store's "
                    attr: 1
                  - text: Externalize
                    attr: 3
                  - text: " procedure is called, its "
                    attr: 1
                  - text: ExternalizeAs
                    attr: 3
                  - text: " procedure is called, which gives the store the opportunity to denote another store that should be externalized in its place (a \"proxy\"). It is also possible to set "
                    attr: 1
                  - text: s1
                    attr: 3
                  - text: " to "
                    attr: 1
                  - text: NIL
                    attr: 3
                  - text: ", which means that the store should not be externalized at all. This is used e.g. for compiler error markers, which are never stored.\r"
                    attr: 1
                  - text: ExternalizeAs
                    attr: 3
                  - text: " ist called locally.\r\rPre\rs1 = s\tguaranteed\r\r\rTYPE "
                    attr: 1
                  - text: Reader
                    attr: 2
                  - text: "\rReader for Component Pascal values like integers, reals, or sets. A reader contains a "
                    attr: 1
                  - text: Files.Reader
                    attr: 3
                  - text: ", to which it forwards most operations.\rReaders are used in the "
                    attr: 1
                  - text: Store.Internalize
                    attr: 3
                  - text: " procedure.\rReaders are not extensible.\r\r"
                    attr: 1
                  - text: rider
                    attr: 2
                  - text: "-: Files.Reader\rThe file rider which links a "
                    attr: 1
                  - text: Reader
                    attr: 3
                  - text: " to a file.\r\r"
                    attr: 1
                  - text: cancelled
                    attr: 2
                  - text: "-: BOOLEAN\tvalid during a "
                    attr: 1
                  - text: Store.Internalize
                    attr: 3
                  - text: " call\rTells whether the currently executing "
                    attr: 1
                  - text: Internalize
                    attr: 3
                  - text: " has been called by "
                    attr: 1
                  - text: ReadVersion
                    attr: 3
                  - text: " or "
                    attr: 1
                  - text: TurnIntoAlien
                    attr: 3
                  - text: ".\r\r"
                    attr: 1
                  - text: readAlien
                    attr: 2
                  - text: "-: BOOLEAN\rTells whether any alien has been read since the last "
                    attr: 1
                  - text: ConnectTo
                    attr: 3
                  - text: ".\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: ConnectTo
                    attr: 2
                  - text: " (f: Files.File)\rNEW\rConnect the reader to a file. All the following operations require connected readers, i.e., "
                    attr: 1
                  - text: "rd.rider # NIL"
                    attr: 3
                  - text: ". This precondition is not checked explicitly, however. After connecting, the reader's position is at the beginning of the file. If the same reader should be reused on another file, it must first be closed, by connecting it to "
                    attr: 1
                  - text: NIL
                    attr: 3
                  - text: ".\r"
                    attr: 1
                  - text: ConnectTo
                    attr: 3
                  - text: " is used internally.\r\rPre\r20\t(f = NIL) OR (rd.rider = NIL)\r\rPost\rf = NIL\r\trd.rider = NIL\rf # NIL\r\t(rd.rider # NIL) & (rd.rider.Base() = f)\r\trd.Pos() = 0\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: Pos
                    attr: 2
                  - text: " (): INTEGER\rNEW\rReturns the reader's current position.\r\rPost\r0 <= result <= rd.rider.Base().Length()\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: SetPos
                    attr: 2
                  - text: " (pos: INTEGER)\rNEW\rSets the reader's current position to "
                    attr: 1
                  - text: pos
                    attr: 3
                  - text: ".\r\rPre\r20\tpos >= 0\r21\tpos <= rd.rider.Base().Length()\r\rPost\rrd.Pos() = pos\r~rd.rider.eof\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: ReadBool
                    attr: 2
                  - text: " (OUT x: BOOLEAN)\rNEW\rReads a Boolean value.\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: ReadSChar
                    attr: 2
                  - text: " (OUT x: SHORTCHAR)\rNEW\rReads a short character (00X..0FFX).\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: ReadXChar
                    attr: 2
                  - text: " (OUT x: CHAR)\rNEW\rSame as "
                    attr: 1
                  - text: ReadSChar
                    attr: 3
                  - text: ", but has a "
                    attr: 1
                  - text: CHAR
                    attr: 3
                  - text: "-type parameter.\rThis procedure is provided to simplify migration from Release 1.2 to 1.3.\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: ReadChar
                    attr: 2
                  - text: " (OUT x: CHAR)\rNEW\rReads a character (0000X..0FFFFX).\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: ReadByte
                    attr: 2
                  - text: " (OUT x: BYTE)\rNEW\rReads a very short integer (-128..127).\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: ReadSInt
                    attr: 2
                  - text: " (OUT x: SHORTINT)\rNEW\rReads a short integer (-32768..32767).\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: ReadXInt
                    attr: 2
                  - text: " (OUT x: INTEGER)\rNEW\rSame as "
                    attr: 1
                  - text: ReadSInt
                    attr: 3
                  - text: ", but has an "
                    attr: 1
                  - text: INTEGER
                    attr: 3
                  - text: "-type parameter.\rThis procedure is provided to simplify migration from Release 1.2 to 1.3.\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: ReadInt
                    attr: 2
                  - text: " (OUT x: INTEGER)\rNEW\rReads an integer (-2147483648..2147483647).\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: ReadLong
                    attr: 2
                  - text: " (OUT x: LONGINT)\rNEW\rReads a long integer (-9223372036854775808..9223372036854775807).\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: ReadSReal
                    attr: 2
                  - text: " (OUT x: SHORTREAL)\rNEW\rReads a short real (32-bit IEEE number).\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: ReadXReal
                    attr: 2
                  - text: " (OUT x: REAL)\rNEW\rSame as "
                    attr: 1
                  - text: ReadSReal
                    attr: 3
                  - text: ", but has a "
                    attr: 1
                  - text: REAL
                    attr: 3
                  - text: "-type parameter.\rThis procedure is provided to simplify migration from Release 1.2 to 1.3.\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: ReadReal
                    attr: 2
                  - text: " (OUT x: REAL)\rNEW\rReads a real (64-bit IEEE number).\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: ReadSet
                    attr: 2
                  - text: " (OUT x: SET)\rNEW\rReads a set (32 elements).\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: ReadSString
                    attr: 2
                  - text: " (OUT x: ARRAY OF SHORTCHAR)\rNEW\rReads a 0X-terminated short string.\r\rPre\rinvalid index\t LEN(x) > Length(string)\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: ReadXString
                    attr: 2
                  - text: " (OUT x: ARRAY OF CHAR)\rNEW\rSame as "
                    attr: 1
                  - text: ReadSString
                    attr: 3
                  - text: ", but has a string-type parameter.\rThis procedure is provided to simplify migration from Release 1.2 to 1.3.\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: ReadString
                    attr: 2
                  - text: " (OUT x: ARRAY OF CHAR)\rNEW\rReads a 0X-terminated string.\r\rPre\rinvalid index\t LEN(x) > Length(string)\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: ReadStore
                    attr: 2
                  - text: " (OUT x: Store)\rNEW\rReads a store's type, allocates it, and then reads its contents, by calling the store's "
                    attr: 1
                  - text: Internalize
                    attr: 3
                  - text: " procedure. "
                    attr: 1
                  - text: x
                    attr: 3
                  - text: " may also be "
                    attr: 1
                  - text: NIL
                    attr: 3
                  - text: ", or an alien if the store's module cannot be loaded, or if internalization has been cancelled by the "
                    attr: 1
                  - text: Internalize
                    attr: 3
                  - text: " procedure.\rIf the store has already been read in, a pointer to the same store is returned instead of allocating a new one. This means that arbitrary graphs that have been written with "
                    attr: 1
                  - text: WriteStore
                    attr: 3
                  - text: " are reconstructed correctly, including alias pointers to the same store, cycles, etc.\rIf the file on which the reader operates does not contain correct input, then an assertion trap will be caused (traps 101 to trap 106).\r\rPre\r20\tthe reader is at the start position of a new store\r\rPost\rempty store on file\r\tx = NIL\rnon-empty store on file\r\tx # NIL\r\t\tx IS Alien\r\t\t\tx.cause # 0\r\t\t\tx.type # \"\"\r\t\t\tx.file # NIL\r\t\t\tx.pos >= 0\tbeginning of store's data\r\t\t\tx.len >= 0\tlength of store's data\r\t\t\talien store contents are on x.file in the range [x.pos .. x.pos + x.len[.\r\t\t\tThese data include only the store's contents, not its prefix\r\t\t~(x IS Alien)\r\t\t\tx was read successfully\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: ReadVersion
                    attr: 2
                  - text: " (min, max: INTEGER; OUT version: INTEGER)\rNEW\rRead a version byte and return it in "
                    attr: 1
                  - text: version
                    attr: 3
                  - text: ". If "
                    attr: 1
                  - text: version
                    attr: 3
                  - text: " is not in the specified range "
                    attr: 1
                  - text: "[min .. max]"
                    attr: 3
                  - text: ", the store currently being read is turned into an alien, with "
                    attr: 1
                  - text: cause = alienVersion
                    attr: 3
                  - text: ".\r\rPre\r20\t0 <= min <= max\r\rPost\rmin <= version <= max\r\tlegal version\r(version < min) OR (version > max)\r\tillegal version\r\trd.cause = alienVersion\r\trd.cancelled\r\trd.readAlien\r\rPROCEDURE (VAR rd: Reader) "
                    attr: 1
                  - text: TurnIntoAlien
                    attr: 2
                  - text: " (cause: INTEGER)\rNEW\rA store which is currently being internalized can turn itself into an alien, e.g., if it has read a component store which is an alien.\r\rPre\r20\tcause > 0\r\r\rTYPE "
                    attr: 1
                  - text: Writer
                    attr: 2
                  - text: "\rWriter for Component Pascal values like integers, reals, or sets. A writer contains a "
                    attr: 1
                  - text: Files.Writer
                    attr: 3
                  - text: ", to which it forwards most operations.\rWriters are used in the "
                    attr: 1
                  - text: Externalize
                    attr: 3
                  - text: " procedure.\rWriters are not extensible.\r\r"
                    attr: 1
                  - text: rider
                    attr: 2
                  - text: "-: Files.Writer\rA file rider which links a "
                    attr: 1
                  - text: Writer
                    attr: 3
                  - text: " to a file.\r\r"
                    attr: 1
                  - text: writtenStore
                    attr: 2
                  - text: "-: Store\rStore which was most recently written as an effect of a call to "
                    attr: 1
                  - text: WriteStore
                    attr: 3
                  - text: ".\r\rPROCEDURE (VAR wr: Writer) "
                    attr: 1
                  - text: ConnectTo
                    attr: 2
                  - text: " (f: Files.File)\rNEW\rConnect the writer to a file. All the following operations require connected writers, i.e., "
                    attr: 1
                  - text: "wr.rider # NIL"
                    attr: 3
                  - text: ". This precondition is not checked explicitly, however. After connecting, the writer's position is at the end of the file. If the same writer should be reused on another file, it must first be closed, by connecting it to "
                    attr: 1
                  - text: NIL
                    attr: 3
                  - text: ".\r"
                    attr: 1
                  - text: ConnectTo
                    attr: 3
                  - text: " is used internally.\r\rPre\r20\t(f = NIL) OR (wr.rider = NIL)\r\rPost\rf = NIL\r\twr.rider = NIL\rf # NIL\r\twr.rider # NIL  &  wr.rider.Base() = f\r\twr.Pos() = wr.rider.Base().Length()\r\rPROCEDURE (VAR wr: Writer) "
                    attr: 1
                  - text: Pos
                    attr: 2
                  - text: " (): INTEGER\rNEW\rReturns the writer's current position.\r\rPost\r0 <= result <= wr.rider.Base().Length()\r\rPROCEDURE (VAR wr: Writer) "
                    attr: 1
                  - text: SetPos
                    attr: 2
                  - text: " (pos: INTEGER)\rNEW\rSets the writer's current position to "
                    attr: 1
                  - text: pos
                    attr: 3
                  - text: ".\r\rPre\r20\tpos >= 0\r21\tpos <= wr.rider.Base().Length()\r\rPost\rwr.Pos() = pos\r\rPROCEDURE (VAR wr: Writer) "
                    attr: 1
                  - text: WriteBool
                    attr: 2
                  - text: " (x: BOOLEAN)\rNEW\rWrites a Boolean value.\r\rPROCEDURE (VAR wr: Writer) "
                    attr: 1
                  - text: WriteSChar
                    attr: 2
                  - text: " (x: SHORTCHAR)\rNEW\rWrites a character (00X..0FFX).\r\rPROCEDURE (VAR wr: Writer) "
                    attr: 1
                  - text: WriteXChar
                    attr: 2
