                  - text: WriteStore
                    attr: 2
                  - text: " (x: Store)\rNEW\rWrites the store's type and then its contents, by calling the store's "
                    attr: 1
                  - text: Externalize
                    attr: 3
                  - text: " procedure. "
                    attr: 1
                  - text: x
                    attr: 3
                  - text: " may also be "
                    attr: 1
                  - text: NIL
                    attr: 3
                  - text: ", or an alien. Before "
                    attr: 1
                  - text: Externalize
                    attr: 3
                  - text: ", "
                    attr: 1
                  - text: ExternalizeAs
                    attr: 3
                  - text: " is called in order to give the store the opportunity to denote a proxy which should be stored in its stead. "
                    attr: 1
                  - text: WriteStore
                    attr: 3
                  - text: " writes "
                    attr: 1
                  - text: x
                    attr: 3
                  - text: " and (via "
                    attr: 1
                  - text: Externalize
                    attr: 3
                  - text: ") all the stores that it contains. Cycles are handled correctly, i.e., a store is only written once, even if referenced several times in a complex graph.\rAll stores that are written using the same writer must have the identical domain.\r\rPre\r20\twr.rider # NIL\r21\tx # NIL  =>  writer must have no domain, or the same one as x (and as all previously written stores)\r\rPROCEDURE (VAR wr: Writer) "
                    attr: 1
                  - text: WriteVersion
                    attr: 2
                  - text: " (version: INTEGER)\rNEW\rWrites a version byte.\r\rPre\r20\t0 <= version <= 127\r\r\rTYPE "
                    attr: 1
                  - text: "AlienComp, AlienPiece, AlienPart, Alien"
                    attr: 2
                  - text: "\rLIMITED\rThese auxiliary types are used internally, to handle alien stores.\r\r\rPROCEDURE "
                    attr: 1
                  - text: Join
                    attr: 2
                  - text: " (s0, s1: Store)\rJoin two stores in the same store set. See the explanation at the beginning of this text.\r\rPre\r20\ts0 # NIL\r21\ts1 # NIL\r22\ts0.Domain() = NIL  OR  s1.Domain() = NIL  OR  s0.Domain() = s1.Domain()\r\rPost\rJoined(s0, s1)\r\rPROCEDURE "
                    attr: 1
                  - text: Joined
                    attr: 2
                  - text: " (s0, s1: Store): BOOLEAN\rTest whether two stores are joined. "
                    attr: 1
                  - text: "Joined(x, x)"
                    attr: 3
                  - text: " always returns "
                    attr: 1
                  - text: "TRUE"
                    attr: 3
                  - text: ", i.e., it is reflexive.\r\rPre\r20\ts0 # NIL\r21\ts1 # NIL\r\rPROCEDURE "
                    attr: 1
                  - text: Unattached
                    attr: 2
                  - text: " (s: Store): BOOLEAN\rTests whether "
                    attr: 1
                  - text: s
                    attr: 3
                  - text: " is not attached to a domain "
                    attr: 1
                  - text: and
                    attr: 3
                  - text: " whether it has not been joined with another store.\rRarely used.\r\rPre\r20\ts # NIL\r\rPROCEDURE "
                    attr: 1
                  - text: CopyOf
                    attr: 2
                  - text: " (s: Store): Store\rReturns the clone of a store, with its contents copied. \r"
                    attr: 1
                  - text: CopyOf
                    attr: 3
                  - text: " allocates a new record with the same "
                    attr: 1
                  - text: dynamic
                    attr: 3
                  - text: " type as "
                    attr: 1
                  - text: s
                    attr: 3
                  - text: ", and initializes it by calling its "
                    attr: 1
                  - text: CopyFrom
                    attr: 3
                  - text: " procedure. The copy is a deep copy.\r\rPre\r20\ts # NIL\r\rPost\r(result # NIL) & (result # s)\rTYP(result) = TYP(s)\r\rPROCEDURE "
                    attr: 1
                  - text: InitDomain
                    attr: 2
                  - text: " (s: Store)\rInitializes the domain of store "
                    attr: 1
                  - text: s
                    attr: 3
                  - text: ". See the explanation at the beginning of this text.\r\rPre\r20\ts # NIL\r\rPost\rs.Domain() # NIL\r\rPROCEDURE "
                    attr: 1
                  - text: ExternalizeProxy
                    attr: 2
                  - text: " (s: Store): Store\rCauses "
                    attr: 1
                  - text: s
                    attr: 3
                  - text: " to call its "
                    attr: 1
                  - text: ExternalizeAs
                    attr: 3
                  - text: " method, basically doing the following:\r\r\tIF s # NIL THEN s.ExternalizeAs(s) END;\r\tRETURN s\r\rPROCEDURE "
                    attr: 1
                  - text: Report
                    attr: 2
                  - text: " (IN msg, p0, p1, p2: ARRAY OF CHAR)\rWhen a store encounters a problem during internalization, it can report the problem by calling this procedure. The parameters are similar to "
                    attr: 1
                  - text: Dialog.ShowParamMsg
                    attr: 3
                  - text: ".\r"
                    attr: 1
