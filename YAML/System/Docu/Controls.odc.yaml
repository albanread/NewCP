                  - text: NewGroup
                    attr: 3
                  - text: " (p: Prop): Control\rNEW, ABSTRACT\rAllocates and returns a new group.\r\r\rTYPE "
                    attr: 1
                  - text: Prop (Properties.Property)
                    attr: 3
                  - text: "\rA property object describes various attributes of a control. There are messages which allow to poll or set the control properties of a control (-> Properties, -> Controllers).\r\r"
                    attr: 1
                  - text: opt
                    attr: 3
                  - text: ": ARRAY 5 OF BOOLEAN;\rUp to five Boolean options. Their meaning depends on the control's type.\r\r"
                    attr: 1
                  - text: link
                    attr: 3
                  - text: ": Dialog.String\rName of the field or procedure to which control is linked, e.g., \"TextCmds.find.replace\".\r\r"
                    attr: 1
                  - text: label
                    attr: 3
                  - text: ": Dialog.String\rString label of the control. Ignored for fields, list boxes, selection boxes, combo boxes and tree controls.\r\r"
                    attr: 1
                  - text: guard
                    attr: 3
                  - text: ": Dialog.String\rOptional name of guard command.\r\r"
                    attr: 1
                  - text: notifier
                    attr: 3
                  - text: ": Dialog.String\rOptional name of notifier command.\r\r"
                    attr: 1
                  - text: level
                    attr: 3
                  - text: ": INTEGER\tonly valid for radio buttons.\rDetermines for which value of the bound variable the control is \"on\".\r\r\rTYPE "
                    attr: 1
                  - text: DefaultsPref (Properties.Preference)
                    attr: 3
                  - text: "\rThis preference message allows to override the general defaults of a control's temporary state.\r\r"
                    attr: 1
                  - text: "disabled, undef, readOnly"
                    attr: 3
                  - text: ": BOOLEAN\rState of the control. It is being determined in three steps:\r1) general default:\r\tdisabled := ~c.item.Valid()\r\tundef := FALSE\r\treadOnly := c.item.vis = Meta.readOnly\r2) control-specific default:\r\tby handling the "
                    attr: 1
                  - text: DefaultsPref
                    attr: 2
                  - text: " message, the general default can be overwritten.\r\tFor example, with buttons: disabled := link = \"\"\r3) guard call:\r\tIf there is a guard, the guard result is used, otherwise the default.\r\r\rTYPE "
                    attr: 1
                  - text: PropPref (Properties.Preference)
                    attr: 3
                  - text: "\rPreference message which allows to specify the valid properties of the receiving control.\r{link, label, guard, notifier, customFont} is the default. By handling the "
                    attr: 1
                  - text: PropPref
                    attr: 2
                  - text: " message, elements of the valid set can be added or removed.\r\r"
                    attr: 1
                  - text: valid
                    attr: 3
                  - text: ": SET\r\r\rVAR "
                    attr: 1
                  - text: "dir-, stdDir-"
                    attr: 3
                  - text: ": Directory\tdir # NIL  &  stdDir # NIL\rDirectories for the lookup of standard controls.\r\rVAR "
                    attr: 1
                  - text: par-
                    attr: 3
                  - text: ": Control\rBefore a control's guard or notifier procedure is called, and before any controller message is sent to it, the control is assigned to "
                    attr: 1
                  - text: par
                    attr: 2
                  - text: ". Afterwards, it is reset to its previous value. This variable can be used in a command to determine the currently active control.\r\r\rPROCEDURE "
                    attr: 1
                  - text: Notify
                    attr: 3
