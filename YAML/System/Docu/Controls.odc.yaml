                    attr: 1
                  - text: opt4
                    attr: 2
                  - text: " used for tree control.\r\r\rTYPE "
                    attr: 1
                  - text: Control (Views.View)
                    attr: 3
                  - text: "\rABSTRACT\rBase type for controls that can be linked to global variables or procedures via metaprogramming. Such a control has no separate model, the item to which it is linked takes the role of a model.\r\r"
                    attr: 1
                  - text: item
                    attr: 3
                  - text: "-: Meta.Item\rThis item describes the variable or procedure to which the control is linked.\r\r"
                    attr: 1
                  - text: disabled
                    attr: 3
                  - text: "-, "
                    attr: 1
                  - text: undef
                    attr: 3
                  - text: "-, "
                    attr: 1
                  - text: readOnly
                    attr: 3
                  - text: "-: BOOLEAN\rThe current temporary state of any control.\r\r"
                    attr: 1
                  - text: customFont
                    attr: 3
                  - text: "-: BOOLEAN\rThis flag determines whether the control's font is taken from the operating system configuration, or from the "
                    attr: 1
                  - text: font
                    attr: 2
                  - text: " variable below.\r\r"
                    attr: 1
                  - text: font
                    attr: 3
                  - text: "-: Fonts.Font\tfont # NIL -> customFont\rThe control's custom font ("
                    attr: 1
                  - text: customFont
                    attr: 2
                  - text: " must be "
                    attr: 1
                  - text: "TRUE"
                    attr: 2
                  - text: " when "
                    attr: 1
                  - text: font
                    attr: 2
                  - text: " is used, i.e., when it is not "
                    attr: 1
                  - text: NIL
                    attr: 2
                  - text: ").\r\r"
                    attr: 1
                  - text: label
                    attr: 3
                  - text: "-: Dialog.String\rThe control's label.\r\r"
