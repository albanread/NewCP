                    attr: 1
                  - text: "CopyFromSimpleView, HandleCtrlMsg, HandlePropMsg, HandlePropMsg"
                    attr: 2
                  - text: ". These methods are made final, and call their new empty extension hooks.\r\rPROCEDURE (c: Control) "
                    attr: 1
                  - text: CheckLink
                    attr: 3
                  - text: "- (VAR ok: BOOLEAN)\rNEW, EMPTY\rThis hook procedure allows a control to check whether the item to which it is linked is acceptable. For example, a checkbox control would accept a link to a Boolean item, but not to an integer item.\r\rPROCEDURE (c: Control) "
                    attr: 1
                  - text: Update
                    attr: 3
                  - text: "- (f: Views.Frame; op, from, to: INTEGER)\rNEW, EMPTY\rUpdate the display of a control. For list-structured controls, the list is not changed.\r\rPROCEDURE (c: Control) "
                    attr: 1
                  - text: UpdateList
                    attr: 3
                  - text: "- (f: Views.Frame)\rNEW, EMPTY\rUpdate the display of a list-structured control, including a rebuilding of its list elements.\r\r\rTYPE "
