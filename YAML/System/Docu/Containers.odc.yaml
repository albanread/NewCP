                  - text: "\r\rDEFINITION Containers;\r\r\tIMPORT Controllers, Stores, Views, Models, Properties;\r\r\tCONST\r\t\tnoSelection = 0; noFocus = 1; noCaret = 2;\r\t\tmask = {noSelection, noCaret}; layout = {noFocus};\r\t\tdeselect = FALSE; select = TRUE;\r\t\tany = FALSE; selection = TRUE;\r\t\thide = FALSE; show = TRUE;\r\r\tTYPE\r\t\tModel = POINTER TO ABSTRACT RECORD (Models.Model)\r\t\t\t(m: Model) GetEmbeddingLimits (OUT minW, maxW, minH, maxH: INTEGER), NEW, ABSTRACT;\r\t\t\t(m: Model) ReplaceView (old, new: Views.View), NEW, ABSTRACT;\r\t\t\t(m: Model) InitFrom- (source: Model), NEW, EMPTY\r\t\tEND;\r\r\t\tView = POINTER TO ABSTRACT RECORD (Views.View)\r\t\t\t(v: View) CopyFromModelView2- (source: Views.View; model: Models.Model), NEW, EMPTY;\r\t\t\t(v: View) Externalize2- (VAR rd: Stores.Writer), NEW, EMPTY;\r\t\t\t(v: View) HandleCtrlMsg2- (f: Views.Frame; VAR msg: Views.CtrlMessage;\r\t\t\t\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View), NEW, EMPTY;\r\t\t\t(v: View) HandleModelMsg2- (VAR msg: Models.Message), NEW, EMPTY;\r\t\t\t(v: View) HandlePropMsg2- (VAR p: Views.PropMessage), NEW, EMPTY;\r\t\t\t(v: View) HandleViewMsg2- (f: Views.Frame; VAR msg: Views.Message), NEW, EMPTY;\r\t\t\t(v: View) Internalize2- (VAR rd: Stores.Reader), NEW, EMPTY;\r\t\t\t(v: View) InitModel (m: Model), NEW;\r\t\t\t(v: View) InitModel2- (m: Model), NEW, EMPTY;\r\t\t\t(v: View) AcceptableModel- (m: Model): BOOLEAN, NEW, ABSTRACT;\r\t\t\t(v: View) ThisModel (): Model, EXTENSIBLE;\r\t\t\t(v: View) SetController (c: Controller), NEW;\r\t\t\t(v: View) ThisController (): Controller, NEW, EXTENSIBLE;\r\t\t\t(v: View) GetRect (f: Views.Frame; view: Views.View; OUT l, t, r, b: INTEGER), NEW, ABSTRACT;\r\t\t\t(v: View) CatchModelMsg (VAR msg: Models.Message), NEW, EMPTY;\r\t\t\t(v: View) CatchViewMsg (f: Views.Frame; VAR msg: Views.Message), NEW, EMPTY;\r\t\t\t(v: View) CatchCtrlMsg (f: Views.Frame; VAR msg: Views.CtrlMessage;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View), NEW, EMPTY;\r\t\t\t(v: View) CatchPropMsg (VAR msg: Views.PropMessage), NEW, EMPTY\r\t\tEND;\r\r\t\tController = POINTER TO ABSTRACT RECORD (Controllers.Controller)\r\t\t\topts-: SET;\r\t\t\t(c: Controller) ThisView (): View, EXTENSIBLE;\r\t\t\t(c: Controller) SetOpts (opts: SET), NEW, EXTENSIBLE;\r\t\t\t(c: Controller) GetContextType (OUT type: Stores.TypeName), NEW, ABSTRACT;\r\t\t\t(c: Controller) GetValidOps (OUT valid: SET), NEW, ABSTRACT;\r\t\t\t(c: Controller) NativeModel (m: Models.Model): BOOLEAN, NEW, ABSTRACT;\r\t\t\t(c: Controller) NativeView (v: Views.View): BOOLEAN, NEW, ABSTRACT;\r\t\t\t(c: Controller) NativeCursorAt (f: Views.Frame; x, y: INTEGER): INTEGER, NEW, ABSTRACT;\r\t\t\t(c: Controller) PickNativeProp (f: Views.Frame; x, y: INTEGER;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR p: Properties.Property), NEW, EMPTY;\r\t\t\t(c: Controller) PollNativeProp (selection: BOOLEAN; VAR p: Properties.Property;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR truncated: BOOLEAN), NEW, EMPTY;\r\t\t\t(c: Controller) SetNativeProp (selection: BOOLEAN; old, p: Properties.Property), NEW, EMPTY;\r\t\t\t(c: Controller) MakeViewVisible (v: Views.View), NEW, EMPTY;\r\t\t\t(c: Controller) GetFirstView (selection: BOOLEAN; OUT v: Views.View), NEW, ABSTRACT;\r\t\t\t(c: Controller) GetNextView (selection: BOOLEAN; VAR v: Views.View), NEW, ABSTRACT;\r\t\t\t(c: Controller) GetPrevView (selection: BOOLEAN; VAR v: Views.View), NEW, EXTENSIBLE;\r\t\t\t(c: Controller) CanDrop (f: Views.Frame; x, y: INTEGER): BOOLEAN, NEW, EXTENSIBLE;\r\t\t\t(c: Controller) MarkDropTarget (src, dst: Views.Frame; sx, sy, dx, dy, w, h, rx, ry: INTEGER;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\ttype: Stores.TypeName; isSingle, show: BOOLEAN), NEW, EMPTY;\r\t\t\t(c: Controller) Drop (src, dst: Views.Frame; sx, sy, dx, dy, w, h, rx, ry: INTEGER;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tview: Views.View; isSingle: BOOLEAN), NEW, ABSTRACT;\r\t\t\t(c: Controller) MarkPickTarget (src, dst: Views.Frame;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tsx, sy, dx, dy: INTEGER; show: BOOLEAN), NEW, EMPTY;\r\t\t\t(c: Controller) TrackMarks (f: Views.Frame; x, y: INTEGER;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t units, extend, add: BOOLEAN), NEW, ABSTRACT;\r\t\t\t(c: Controller) Resize (view: Views.View; l, t, r, b: INTEGER), NEW, ABSTRACT;\r\t\t\t(c: Controller) GetSelectionBounds (f: Views.Frame;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tOUT x, y, w, h: INTEGER), NEW, EXTENSIBLE;\r\t\t\t(c: Controller) DeleteSelection, NEW, ABSTRACT;\r\t\t\t(c: Controller) MoveLocalSelection (src, dst: Views.Frame;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tsx, sy, dx, dy: INTEGER), NEW, ABSTRACT;\r\t\t\t(c: Controller) CopyLocalSelection (src, dst: Views.Frame;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tsx, sy, dx, dy: INTEGER), NEW, ABSTRACT;\r\t\t\t(c: Controller) SelectionCopy (): Model, NEW, ABSTRACT;\r\t\t\t(c: Controller) NativePaste (m: Models.Model; f: Views.Frame), NEW, ABSTRACT;\r\t\t\t(c: Controller) ArrowChar (f: Views.Frame; ch: CHAR; units, select: BOOLEAN), NEW, ABSTRACT;\r\t\t\t(c: Controller) ControlChar (f: Views.Frame; ch: CHAR), NEW, ABSTRACT;\r\t\t\t(c: Controller) PasteChar (ch: CHAR), NEW, ABSTRACT;\r\t\t\t(c: Controller) PasteView (f: Views.Frame; v: Views.View; w, h: INTEGER), NEW, ABSTRACT;\r\t\t\t(c: Controller) HasSelection (): BOOLEAN, NEW, EXTENSIBLE;\r\t\t\t(c: Controller) Selectable (): BOOLEAN, NEW, ABSTRACT;\r\t\t\t(c: Controller) Singleton (): Views.View, NEW;\r\t\t\t(c: Controller) SetSingleton (s: Views.View), NEW, EXTENSIBLE;\r\t\t\t(c: Controller) SelectAll (select: BOOLEAN), NEW, ABSTRACT;\r\t\t\t(c: Controller) InSelection (f: Views.Frame; x, y: INTEGER): BOOLEAN, NEW, ABSTRACT;\r\t\t\t(c: Controller) MarkSelection (f: Views.Frame; show: BOOLEAN), NEW, EXTENSIBLE;\r\t\t\t(c: Controller) SetFocus (focus: Views.View), NEW;\r\t\t\t(c: Controller) HasCaret (): BOOLEAN, NEW, ABSTRACT;\r\t\t\t(c: Controller) MarkCaret (f: Views.Frame; show: BOOLEAN), NEW, ABSTRACT;\r\t\t\t(c: Controller) Mark (f: Views.Frame; l, t, r, b: INTEGER; show: BOOLEAN), NEW, EXTENSIBLE\r\t\tEND;\r\r\t\tDirectory = POINTER TO ABSTRACT RECORD \r\t\t\t(d: Directory) New (): Controller, NEW, EXTENSIBLE;\r\t\t\t(d: Directory) NewController (opts: SET): Controller, NEW, ABSTRACT\r\t\tEND;\r\r\t\tDropPref = RECORD (Properties.Preference)\r\t\t\tmode-: SET;\r\t\t\tokToDrop: BOOLEAN\r\t\tEND;\r\r\t\tGetOpts = RECORD (Views.PropMessage)\r\t\t\tvalid, opts: SET\r\t\tEND;\r\r\t\tSetOpts = RECORD (Views.PropMessage)\r\t\t\tvalid, opts: SET\r\t\tEND;\r\r\tPROCEDURE Focus (): Controller;\r\tPROCEDURE FocusSingleton (): Views.View;\r\tPROCEDURE MarkSingleton (c: Controller; f: Views.Frame; show: BOOLEAN);\r\tPROCEDURE FadeMarks (c: Controller; show: BOOLEAN);\r\rEND Containers.\r\r\rContainers are views which may contain other (embedded) views. Typically, containers belong to one of two categories. The first category contains containers with a fixed structure and fixed types of the embedded views. For example, an e-mail container view may consist of exactly two views: a toolbar view at the top, and a text view below. The layout of these views typically cannot be edited. Such views are called "
                    attr: 1
                  - text: static containers
                    attr: 2
                  - text: ".\rThe second category of containers can embed arbitrary numbers of views, which can be of arbitrary types. Text views and form views are typical examples of such dynamic container views. Only this second category of container views, called "
                    attr: 1
                  - text: dynamic containers
                    attr: 2
                  - text: ", is supported by module "
                    attr: 1
                  - text: Containers
                    attr: 2
                  - text: ", and it is the topic of this text.\rDynamic containers consist of a variable number of embedded views, plus some "
                    attr: 1
                  - text: intrinsic contents
                    attr: 2
                  - text: ". Text views for example have text as their intrinsic contents, but also allow to let arbitrary views (i.e., non-intrinsic contents) flow along in the text. Form views are degenerated in the sense that they provide no intrinsic contents of their own.\rDifferent compound document standards (OLE, OpenDoc) differ in the way they treat selections and the focus. The focus is the currently edited view, the view which receives keyboard events, the view which determines the currently available menus, the view which contains the currently relevant selection, caret, or other mark.\r"
                    attr: 1
                  - text: Containers
                    attr: 2
                  - text: " provides the building blocks for container views, including special container models and container controllers. Other than most BlackBox modules, "
                    attr: 1
                  - text: Containers
                    attr: 2
                  - text: " exports several partially implemented types, rather than pure interface types. What is implemented is provided in a form suitable for the used platform, i.e. user interface differences are hidden by the implementation of "
                    attr: 1
                  - text: Containers
                    attr: 2
                  - text: ".\rIn particular, "
                    attr: 1
                  - text: Containers
                    attr: 2
                  - text: " fully implements "
                    attr: 1
                  - text: singleton selections
                    attr: 2
                  - text: ", i.e., selections which cover exactly one view and no intrinsic contents. Such selections are subject to special operations and require platform-dependent treatment. Also, "
                    attr: 1
                  - text: Containers
                    attr: 2
                  - text: " implements the focus concept: a single embedded view within a controller's model that is picked by the user as current focus.\r\rExample: "
                    attr: 1
                  - link:
                      target: "StdCmds.OpenBrowser('Form/Docu/Sys-Map', 'Map to Form Subsystem')"
                      body:
                        - text: Form subsystem  map
                          attr: 3
                      attr: 1
                      w: 131250
                      h: 142875
                  - text: "\r\r\rCONST "
                    attr: 1
                  - text: noSelection
                    attr: 4
                  - text: ", "
                    attr: 1
                  - text: noFocus
                    attr: 4
                  - text: ", "
                    attr: 1
                  - text: noCaret
                    attr: 4
                  - text: "\rPossible elements of "
                    attr: 1
                  - text: Controller.opt
                    attr: 2
                  - text: ". "
                    attr: 1
                  - text: noSelection
                    attr: 2
                  - text: " denotes that selections should be switched off, "
                    attr: 1
                  - text: noFocus
                    attr: 2
                  - text: " denotes that no embedded view should be allowed to become focus, and "
                    attr: 1
                  - text: noCaret
                    attr: 2
                  - text: " denotes that the caret (insertion mark) and thus the possibility to type or paste should be switched off.\r\rCONST "
                    attr: 1
                  - text: mask
                    attr: 4
                  - text: ", "
                    attr: 1
                  - text: layout
                    attr: 4
                  - text: "\rTwo particularly useful subsets of "
                    attr: 1
                  - text: Controller.opt
                    attr: 2
                  - text: ". A "
                    attr: 1
                  - text: mask
                    attr: 2
                  - text: " prevents editing of the container's intrinsic contents, but enables focusing and thereby editing of the contained objects; for example, this allows to use a form without changing the form itself. A "
                    attr: 1
                  - text: layout
                    attr: 2
                  - text: " does just the opposite: focusing and therefore editing of contained objects is inhibited, but the container's intrinsic contents may be freely edited; for example, this is useful when editing a form without wanting to actually activate, say, a button, while editing its position in the form.\r\rCONST "
                    attr: 1
                  - text: deselect
                    attr: 4
                  - text: ", "
                    attr: 1
                  - text: select
                    attr: 4
                  - text: "\rPossible values of the "
                    attr: 1
                  - text: select
                    attr: 2
                  - text: " parameter of "
                    attr: 1
                  - text: Controller.SelectAll
                    attr: 2
                  - text: ".\r\rCONST "
                    attr: 1
                  - text: any
                    attr: 4
                  - text: ", "
                    attr: 1
                  - text: selection
                    attr: 4
                  - text: "\rPossible values of the "
                    attr: 1
                  - text: selection
                    attr: 2
                  - text: " parameters of "
                    attr: 1
                  - text: Controller.GetFirstView
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: Controller.GetNextView
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: Controller.GetPrevView
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: Controller.PollNativeProp
                    attr: 2
                  - text: ", and "
                    attr: 1
                  - text: Controller.SetNativeProp
                    attr: 2
                  - text: ". Controls whether the range of the operation is the current selection or the whole container contents.\r\rCONST "
                    attr: 1
                  - text: hide
                    attr: 4
                  - text: ", "
                    attr: 1
                  - text: show
                    attr: 4
                  - text: "\rPossible values of the "
                    attr: 1
                  - text: show
                    attr: 2
                  - text: " parameter of "
                    attr: 1
                  - text: FadeMarks
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: MarkSingleton
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: Controller.Mark
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: Controller.MarkCaret
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: Controller.MarkDropTarget
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: Controller.MarkPickTarget
                    attr: 2
                  - text: ", and "
                    attr: 1
                  - text: Controller.MarkSelections
                    attr: 2
                  - text: ". Controls whether the respective mark is to be hidden or shown.\r\r\rTYPE "
                    attr: 1
                  - text: Model (Models.Model)
                    attr: 4
                  - text: "\rABSTRACT\rModels for containers.\r\rPROCEDURE (m: Model) "
                    attr: 1
                  - text: GetEmbeddingLimits
                    attr: 4
                  - text: " (OUT minW, maxW, minH, maxH: INTEGER)\rNEW, ABSTRACT\rReturn minimum ("
                    attr: 1
                  - text: minW
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: minH
                    attr: 2
                  - text: ) and maximum (
                    attr: 1
                  - text: maxW
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: maxH
                    attr: 2
                  - text: ") bounds on view sizes to be embedded in model "
                    attr: 1
                  - text: m
                    attr: 2
                  - text: ". If it is tried to embed a view into "
                    attr: 1
                  - text: m
                    attr: 2
                  - text: " with width < "
                    attr: 1
                  - text: minW
                    attr: 2
                  - text: ", width >= "
                    attr: 1
                  - text: maxW
                    attr: 2
                  - text: ", height < "
                    attr: 1
                  - text: minH
                    attr: 2
                  - text: ", or height >= "
                    attr: 1
                  - text: maxH
                    attr: 2
                  - text: ", then "
                    attr: 1
                  - text: m
                    attr: 2
                  - text: " should (but is not absolutely required to) modify the size of the embedded view in order to make it fit.\r\rPost\r0 <= minW <= maxW\r0 <= minH <= maxH\r\rPROCEDURE (m: Model) "
                    attr: 1
                  - text: ReplaceView
                    attr: 4
                  - text: " (old, new: Views.View)\rNEW, ABSTRACT\rIn-place substitution of view "
                    attr: 1
                  - text: old
                    attr: 2
                  - text: " which must be embedded in "
                    attr: 1
                  - text: m
                    attr: 2
                  - text: " by view "
                    attr: 1
                  - text: new
                    attr: 2
                  - text: " which must not yet be embedded anywhere. As a result, "
                    attr: 1
                  - text: new
                    attr: 2
                  - text: " gets embedded in "
                    attr: 1
                  - text: m
                    attr: 2
                  - text: ", but "
                    attr: 1
                  - text: old
                    attr: 2
                  - text: " retains its context which it then shares with "
                    attr: 1
                  - text: new
                    attr: 2
                  - text: ". Replacing a view inplace allows "
                    attr: 1
                  - text: wrapping
                    attr: 2
                  - text: " of views: A new view takes place of an existing one, adds some new properties, but still can hold a reference to the old view and delegate requests to the old view. Since the old view has maintained its context, it will continue to function as if it where directly embedded in "
                    attr: 1
                  - text: m
                    attr: 2
                  - text: ".\r\rPre\rold # NIL\rold.context.ThisModel() = m\rEmbeddedIn(old, m)\rnew # NIL\rnew.context = NIL\r\rPost\rNotEmbedded(old)\rnew.context.ThisModel() = m\rnew.context = old.context\r\rPROCEDURE (m: Model) "
                    attr: 1
                  - text: InitFrom
                    attr: 4
                  - text: "- (source: Model)\rNEW, EMPTY\rInitialize model "
                    attr: 1
                  - text: m
                    attr: 2
                  - text: ", which has been newly allocated as an object of the same type as "
                    attr: 1
                  - text: source
                    attr: 2
                  - text: ". In some (rare) cases, it may be useful to share some internal data structures between "
                    attr: 1
                  - text: m
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: source
                    attr: 2
                  - text: ".\r\rPre\rsource # NIL\rType(m) = Type(source)\r\r\rTYPE "
                    attr: 1
                  - text: View (Views.View)
                    attr: 4
                  - text: "\rABSTRACT\rViews for containers.\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: Internalize
                    attr: 4
                  - text: " (VAR rd: Stores.Reader)\rClarification of inherited procedure\rFully implements internalization for views without intrinsic persistent state by handling internalization of the container view's model and controller. If the model internalization fails, the view is turned into an alien and internalization of "
                    attr: 1
                  - text: v
                    attr: 2
                  - text: " is cancelled; otherwise the model is attached to "
                    attr: 1
                  - text: v
                    attr: 2
                  - text: ". If the controller internalization fails, the controller is kept for later externalization to prevent loss of information, but is otherwise not connected to the view ("
                    attr: 1
                  - text: v.ThisController() = NIL
                    attr: 2
                  - text: "), and the view is internalized normally (i.e., not turned into an alien).\rSuper call at the beginning is mandatory\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: Externalize
                    attr: 4
                  - text: " (VAR wr: Stores.Writer)\rClarification of inherited procedure\rFully implements externalization for views without intrinsic persistent state by handling externalization of the container view's model and controller. If "
                    attr: 1
                  - text: v
                    attr: 2
                  - text: " has been internalized before with an alien controller, and no other controller has been installed thereafter, then the alien controller will be externalized, although "
                    attr: 1
                  - text: v.ThisController() = NIL
                    attr: 2
                  - text: ".\rSuper call at the beginning is mandatory\r\rPre\rv.ThisModel() # NIL\t20\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: CopyFrom
                    attr: 4
                  - text: " (source: Stores.Store)\rClarification of inherited procedure\rAssuming that the model of "
                    attr: 1
                  - text: v
                    attr: 2
                  - text: " has already been established, copy the controller and possibly other view state from "
                    attr: 1
                  - text: source
                    attr: 2
                  - text: ". If "
                    attr: 1
                  - text: source
                    attr: 2
                  - text: " holds a hidden alien controller (cf. "
                    attr: 1
                  - text: Internalize
                    attr: 2
                  - text: " above), a reference to it is also copied.\rSuper call at the beginning is mandatory\r\rPre\rv.ThisModel() # NIL\t20\r\rPost\rsource.ThisController() = NIL\r\tv.ThisController() = NIL\rsource.ThisController() # NIL\r\tv.ThisController() = source.ThisController().Clone().CopyFrom(source.ThisController())\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: ThisModel
                    attr: 4
                  - text: " (): Model\rEXTENSIBLE\rReturn the model of "
                    attr: 1
                  - text: v
                    attr: 2
                  - text: ".\rCovariant narrowing of function result.\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: InitModel
                    attr: 4
                  - text: " (m: Containers.Model)\rNEW\rAssign a model to this view.\r\rPre\r(v.ThisModel() = NIL) OR (v.ThisModel() = m)\t20\rm # NIL\t21\rv.AcceptableModel(m)\t22\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: InitModel2-
                    attr: 4
                  - text: " (m: Containers.Model)\rNEW, EMPTY\rExtension hook called by "
                    attr: 1
                  - text: InitModel
                    attr: 2
                  - text: ".\r\rPROCEDURE (v: View) "
                    attr: 1
                  - text: SetController
