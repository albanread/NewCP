                      opts: 0x00000003
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "A particular BlackBox implementation may return additional, platform-specific, error codes. These error codes always have negative values.\r\rPROCEDURE (f: File) "
                    attr: 1
                  - text: Close
                    attr: 4
                  - text: "\rNEW, ABSTRACT\rCloses an open file. Close does nothing if the file is not open. If a call to "
                    attr: 1
                  - text: New
                    attr: 2
                  - text: " or "
                    attr: 1
                  - text: Old
                    attr: 2
                  - text: " is not balanced by a call to "
                    attr: 1
                  - text: Close
                    attr: 2
                  - text: ", the "
                    attr: 1
                  - text: Close
                    attr: 2
                  - text: " is later performed automatically, at an unspecified time. If it is known that a file won't be used again, it is recommended to call its "
                    attr: 1
                  - text: Close
                    attr: 2
                  - text: " procedure.\rThe file "
                    attr: 1
                  - text: f
                    attr: 2
                  - text: " and the riders operating on file "
                    attr: 1
                  - text: f
                    attr: 2
                  - text: " are not valid anymore after closing "
                    attr: 1
                  - text: f
                    attr: 2
                  - text: ", i.e., no more file or rider operations may be performed on it. However, the closed file can be retrieved and opened again by procedure "
                    attr: 1
                  - text: Old
                    attr: 2
                  - text: ".\r"
                    attr: 1
                  - text: Close
                    attr: 2
                  - text: " may call "
                    attr: 1
                  - text: Flush
                    attr: 2
                  - text: " internally.\r"
                    attr: 1
                  - text: Close
                    attr: 2
                  - text: " should (but need not necessarily) be called explicitly after a file is not needed anymore.\r\rPROCEDURE (f: File) "
                    attr: 1
                  - text: Closed
                    attr: 4
                  - text: " (): BOOLEAN,\rNEW, ABSTRACT;\rReturns the information about file state.\r\rPROCEDURE (f: File) "
                    attr: 1
                  - text: Shared
                    attr: 4
                  - text: " (): BOOLEAN,\rNEW, ABSTRACT;\rReturns the information about file state.\r\rPROCEDURE (f: File) "
                    attr: 1
                  - text: InitType
                    attr: 4
                  - text: " (type: Type)\rInitializes the file's "
                    attr: 1
                  - text: type
                    attr: 2
                  - text: " field.\r\rPre\rtype # \"\"\t20\rf.type = \"\" OR f.type = type\t21\r\r\rTYPE "
                    attr: 1
                  - text: Reader
                    attr: 4
                  - text: "\rABSTRACT\rReading access path to a file carrier.\rReaders are allocated by their base files.\rReaders are used by commands which read non-BlackBox files and operate at the byte level.\rReaders are extended internally.\r\r"
                    attr: 1
                  - text: eof
                    attr: 4
                  - text: ": BOOLEAN\rSet when it has been attempted to read the byte after the end of the file (by "
                    attr: 1
                  - text: ReadByte
                    attr: 2
                  - text: " or "
                    attr: 1
                  - text: ReadBytes
                    attr: 2
                  - text: "). Reset when the reader is generated or positioned.\r\rPROCEDURE (r: Reader) "
                    attr: 1
                  - text: Base
                    attr: 4
                  - text: " (): File\rNEW, ABSTRACT\rReturns the file to which the reader is currently connected.\r\rPost\rresult # NIL\r\rPROCEDURE (r: Reader) "
                    attr: 1
                  - text: Pos
                    attr: 4
                  - text: " (): INTEGER\rNEW, ABSTRACT\rReturns the reader's current position.\r\rPost\r0 <= result <= r.Base().Length()\r\rPROCEDURE (r: Reader) "
                    attr: 1
                  - text: SetPos
                    attr: 4
                  - text: " (pos: INTEGER)\rNEW, ABSTRACT\rSets the reader's current position to "
                    attr: 1
                  - text: pos
                    attr: 2
                  - text: " and clears the "
                    attr: 1
                  - text: eof
                    attr: 2
                  - text: " flag.\r\rPre\rpos >= 0\t20\rpos <= r.Base().Length()\t21\r\rPost\rr.Pos() = pos\r~r.eof\r\rPROCEDURE (r: Reader) "
                    attr: 1
                  - text: ReadByte
                    attr: 4
                  - text: " (OUT x: BYTE)\rNEW, ABSTRACT\rAttempts to read the byte after the current position. If successful, it increments the position by one. If the current position (before reading) is at the end of the available data, i.e., "
                    attr: 1
                  - text: Pos
                    attr: 2
                  - text: " equals the carrier data's length, then "
                    attr: 1
                  - text: r.eof
                    attr: 2
                  - text: " is set.\r"
                    attr: 1
                  - text: ReadByte
                    attr: 2
                  - text: " internally may call "
                    attr: 1
                  - text: SetPos
                    attr: 2
                  - text: ".\r\rPost\rr.Pos()' < r.Base().Length()\r\tr.Pos() = r.Pos()' + 1\r\t~r.eof\r\tx = byte after r.Pos()'\rr.Pos()' = r.Base().Length()\r\tr.Pos() = r.Base().Length()\r\tr.eof\r\tx = 0H\r\rPROCEDURE (r: Reader) "
                    attr: 1
                  - text: ReadBytes
                    attr: 4
                  - text: " (VAR x: ARRAY OF BYTE; beg, len: INTEGER)\rNEW, ABSTRACT\rAttempts to read "
                    attr: 1
                  - text: len
                    attr: 2
                  - text: " bytes after the current position. It increments the position by the number of bytes which have been read successfully. If reading is continued beyond the file's length, then "
                    attr: 1
                  - text: r.eof
                    attr: 2
                  - text: " is set. The data are transferred to the array "
                    attr: 1
                  - text: x
                    attr: 2
                  - text: " starting at element "
                    attr: 1
                  - text: beg
                    attr: 2
                  - text: ".\r"
                    attr: 1
                  - text: ReadBytes
                    attr: 2
                  - text: " internally may call "
                    attr: 1
                  - text: SetPos
                    attr: 2
                  - text: ".\r\rPre\rbeg >= 0\t20\rlen >= 0\t21\rbeg + len <= LEN(x)\t22\r\rPost\rr.Pos()' <= r.Base().Length() - len\r\tr.Pos() = r.Pos()' + len\r\t~r.eof\r\tlen bytes read after r.Pos()' and transferred into x\rr.Pos()' > r.Base().Length() - len\r\tr.Pos() = r.Base().Length()\r\tr.eof\r\tr.Base().Length() - r.Pos()' bytes read after r.Pos()' and transferred into x\r\r\rTYPE "
                    attr: 1
                  - text: Writer
                    attr: 4
                  - text: "\rABSTRACT\rWriting access path to a file carrier.\rWriters are allocated by their base files.\rWriters are used by commands which write non-BlackBox files and operate at the byte level.\rWriters are extended internally.\r\rPROCEDURE (w: Writer) "
                    attr: 1
                  - text: Base
                    attr: 4
                  - text: " (): File\rNEW, ABSTRACT\rReturns the file to which the writer is currently connected.\r\rPost\rresult # NIL\r\rPROCEDURE (w: Writer) "
                    attr: 1
                  - text: Pos
                    attr: 4
                  - text: " (): INTEGER\rNEW, ABSTRACT\rReturns the writer's current position.\r\rPost\r0 <= result <= w.Base().Length()\r\rPROCEDURE (w: Writer) "
                    attr: 1
                  - text: SetPos
                    attr: 4
                  - text: " (pos: INTEGER)\rNEW, ABSTRACT\rSets the writer's current position to "
                    attr: 1
                  - text: pos
                    attr: 2
                  - text: ".\r\rPre\rpos >= 0\t20\rpos <= w.Base().Length()\t21\r\rPost\rw.Pos() = pos\r\rPROCEDURE (w: Writer) "
                    attr: 1
                  - text: WriteByte
                    attr: 4
                  - text: " (x: BYTE)\rNEW, ABSTRACT\rWrites a byte after the current position, then increments the current position. If the current position is at the end of the carrier data, the writer's length is incremented also.\r"
                    attr: 1
                  - text: WriteByte
                    attr: 2
                  - text: " internally may call "
                    attr: 1
                  - text: SetPos
                    attr: 2
                  - text: ".\r\rPost\rx written at w.Pos()'\rw.Pos() = w.Pos()' + 1\rw.Pos()' < w.Base().Length()'\r\tw.Base().Length() = w.Base().Length()'\r\tx has overwritten old value after w.Pos()'\rw.Pos()' = w.Base().Length()'\r\tw.Base().Length() = w.Base().Length()' + 1\r\tx was appended\r\rPROCEDURE (w: Writer) "
                    attr: 1
                  - text: WriteBytes
                    attr: 4
                  - text: " (IN x: ARRAY OF BYTE; beg, len: INTEGER)\rNEW, ABSTRACT\rWrites "
                    attr: 1
                  - text: len
                    attr: 2
                  - text: " bytes after the current position and increments the position accordingly. If necessary the stream's length is increased. The data are transferred from array "
                    attr: 1
                  - text: x
                    attr: 2
                  - text: " starting with element "
                    attr: 1
                  - text: beg
                    attr: 2
                  - text: ".\r"
                    attr: 1
                  - text: WriteBytes
                    attr: 2
                  - text: " internally may call "
                    attr: 1
                  - text: SetPos
                    attr: 2
                  - text: ".\r\rPre\rbeg >= 0\t20\rlen >= 0\t21\rbeg + len <= LEN(x)\t22\r\rPost\rlen bytes transferred from variable x to carrier\rw.Pos() = w.Pos()' + len\rw.Pos()' + len <= w.Base().Length()'\r\tw.Base().Length() = w.Base().Length()'\rw.Pos()' + len > w.Base().Length()'\r\tw.Base().Length() = w.Pos()' + len\r\r\rTYPE "
                    attr: 1
                  - text: Directory
                    attr: 4
                  - text: "\rABSTRACT\rDirectory for the lookup in and manipulation of file directories.\rFile directories are allocated by BlackBox.\rFile directories are used by commands which operate on non-BlackBox files.\rFile directories are extended internally.\r\rPROCEDURE (d: Directory) "
                    attr: 1
                  - text: This
                    attr: 4
                  - text: " (IN path: ARRAY OF CHAR): Locator\rNEW, ABSTRACT\rReturns a locator, given a path name in the host platform's syntax.\r"
                    attr: 1
                  - text: This
                    attr: 2
                  - text: " may perform some validity checks, e.g., whether the syntax of the name is correct. Passing the empty string yields a default location (typically the BlackBox directory itself).\r\rPost\rresult # NIL\rresult.res = 0\r\tlegal locator\rresult.res # 0\r\tillegal locator\r\rPROCEDURE (d: Directory) "
                    attr: 1
                  - text: Temp
                    attr: 4
                  - text: " (): File\rNEW, ABSTRACT\rReturns a temporary file. This file is anonymous, i.e., not registered in a directory. (In host file systems where anonymous files are not directly supported, they may appear under temporary names in a suitable subdirectory.) Registration is not possible on a temporary file.\rA temporary file always has both read and write capabilities (mutable file).\r\rPost\rresult # NIL\r\rPROCEDURE (d: Directory) "
                    attr: 1
                  - text: New
                    attr: 4
                  - text: " (loc: Locator; ask: BOOLEAN): File\rNEW, ABSTRACT\rReturns a new file object (or "
                    attr: 1
                  - text: NIL
                    attr: 2
                  - text: " if this is not possible). This file is anonymous, i.e., not yet registered in the directory. (In host file systems where anonymous files are not directly supported, they may appear under temporary names in subdirectory "
                    attr: 1
                  - text: loc.
                    attr: 2
                  - text: ") If the file is registered later, it will appear in the subdirectory specified by "
                    attr: 1
                  - text: loc
                    attr: 2
                  - text: ".\rIf "
                    attr: 1
                  - text: loc
                    attr: 2
                  - text: " indicates a location that does not yet exist, the necessary location(s) (i.e., directories) must be created first. Parameter "
                    attr: 1
                  - text: ask
                    attr: 2
                  - text: " determines whether the user is asked for the permission to do so. Pass either the constant "
                    attr: 1
                  - text: ask
                    attr: 2
                  - text: " or "
                    attr: 1
                  - text: dontAsk
                    attr: 2
                  - text: ".\rA new file always has both read and write capabilities (mutable file).\rIf location "
                    attr: 1
                  - text: loc
                    attr: 2
                  - text: " does not exist, the user may be asked whether the location should be created ("
                    attr: 1
                  - text: loc.res = 0
                    attr: 2
                  - text: ) or not (
                    attr: 1
                  - text: loc.res = 8
                    attr: 2
                  - text: ").\r\rPre\rloc # NIL\t20\r\rPost\rresult # NIL\r\tloc.res = 0\tno error\rresult = NIL\r\tloc.res = 1\tinvalid name\r\tloc.res = 2\tlocation not found\r\tloc.res = 4\twrite-protection\r\tloc.res = 5\tio error\r\tloc.res = 8\tcancelled\r\rPROCEDURE (d: Directory) "
                    attr: 1
                  - text: Old
                    attr: 4
                  - text: " (loc: Locator; name: Name; shared: BOOLEAN): File\rNEW, ABSTRACT\rLooks up and opens a file with name "
                    attr: 1
                  - text: name
                    attr: 2
                  - text: " at location "
                    attr: 1
                  - text: loc
                    attr: 2
                  - text: ". It returns this file (or "
                    attr: 1
                  - text: NIL
                    attr: 2
                  - text: " if this is not possible). Parameter "
                    attr: 1
                  - text: shared
                    attr: 2
                  - text: " determines whether the returned file is in shared or in exclusive mode. A shared file provides read-only access. This means that several applications may read the file simultaneously, but it may not be modified. An exclusively opened file provides exclusive read and write access. This means that both read and write access are denied to any other application. Note however, that the application may pass on the file pointer to wherever it likes. The point is, another application cannot gain access to the file solely via the file directory, without cooperation of the application which currently has access. Moreover, \"exclusive\" access does not imply that only one rider may be active on the file.\rA file is usually opened in shared mode. To change its contents, a new file is generated and then registered under the old name. If only a small part of the data is actually changed, it may be more appropriate to use the exclusive mode instead, e.g. when implementing simple data bases. In this case, the file should be closed explicitly as soon as it isn't needed anymore.\r\rPre\rloc # NIL\t20\rname # \"\"\t21\r\rPost\rresult # NIL\r\tloc.res = 0\tno error\rresult = NIL\r\tloc.res = 1\tinvalid name\r\tloc.res = 2\tlocation or file not found\r\tloc.res = 6\taccess denied\r\rPROCEDURE (d: Directory) "
                    attr: 1
                  - text: Delete
                    attr: 4
                  - text: " (loc: Locator; name: Name)\rNEW, ABSTRACT\rDeletes the file specified by "
                    attr: 1
                  - text: loc
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: name
                    attr: 2
                  - text: ".\r\rPre\rloc # NIL\t20\r\rPost\rloc.res = 0\tno error\rloc.res = 1\tinvalid parameter (name or locator)\rloc.res = 2\tlocation or file not found\rloc.res = 4\twrite-protection\rloc.res = 5\tio error\r\rPROCEDURE (d: Directory) "
                    attr: 1
                  - text: Rename
                    attr: 4
                  - text: " (loc: Locator; old, new: Name; ask: BOOLEAN)\rNEW, ABSTRACT\rRename the file specified by "
                    attr: 1
                  - text: loc
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: new
                    attr: 2
                  - text: " to the local name "
                    attr: 1
                  - text: new
                    attr: 2
                  - text: ". If a file with name "
                    attr: 1
                  - text: new
                    attr: 2
                  - text: " already exists, it must be deleted first. Parameter "
                    attr: 1
                  - text: ask
                    attr: 2
                  - text: " determines whether the user is asked for the permission to do so. Pass either the constant "
                    attr: 1
                  - text: ask
                    attr: 2
                  - text: " or "
                    attr: 1
                  - text: dontAsk
                    attr: 2
                  - text: ".\r\rPre\rloc # NIL\t20\r\rPost\rloc.res = 0\tno error\rloc.res = 1\tinvalid parameter (locator or name)\rloc.res = 2\tlocation or file not found\rloc.res = 3\tfile already exists\rloc.res = 4\twrite-protection\rloc.res = 5\tio error\r\rPROCEDURE (d: Directory) "
                    attr: 1
                  - text: SameFile
                    attr: 4
                  - text: " (loc0: Locator; name0: Name;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tloc1: Locator; name1: Name): BOOLEAN;\rNEW, ABSTRACT\rDetermines whether two "
                    attr: 1
                  - text: "(locator, name)"
                    attr: 2
                  - text: " pairs denote the same file.\r\rPre\rloc0 # NIL\t20\rname0 # \"\"\t21\rloc1 # NIL\t22\rname1 # \"\"\t23\r\rPROCEDURE (d: Directory) "
                    attr: 1
                  - text: FileList
                    attr: 4
                  - text: " (loc: Locator): FileInfo\rNEW, ABSTRACT\rReturns information about the files at a given location. The result is a linear list of file descriptions, in no particular order. The procedure may alter "
                    attr: 1
                  - text: loc.res
                    attr: 2
                  - text: ".\r\rPre\rloc # NIL\t20\r\rPROCEDURE (d: Directory) "
                    attr: 1
                  - text: LocList
                    attr: 4
                  - text: " (loc: Locator): LocInfo\rNEW, ABSTRACT\rReturns information about subdirectories at a given location. The result is a linear list of location (subdirectory) descriptions, in no particular order. The procedure may alter "
                    attr: 1
                  - text: loc.res
                    attr: 2
                  - text: ".\r\rPre\rloc # NIL\t20\r\rPROCEDURE (d: Directory) "
                    attr: 1
                  - text: GetFileName
                    attr: 4
                  - text: " (name: Name; type: Type; OUT filename: Name)\rNEW, ABSTRACT\rMake a file name out of a file and its type.\rWindows: filename = name + \".\" + type\rMac OS: filename = name\r\r\rVAR "
                    attr: 1
                  - text: "dir-, stdDir-"
                    attr: 4
                  - text: ": Directory\t(dir # NIL) & (stdDir # NIL)\rDirectories for the lookup of files.\r\rPROCEDURE "
                    attr: 1
                  - text: SetDir
                    attr: 4
                  - text: " (d: Directory)\rAssigns directory.\r"
                    attr: 1
                  - text: SetDir
                    attr: 2
                  - text: " is used in configuration routines.\r\rPre\rd # NIL\t20\r\rPost\rstdDir' = NIL\r\tstdDir = d\rstdDir' # NIL\r\tstdDir = stdDir'\rdir = d\r\rVAR "
                    attr: 1
                  - text: docType
                    attr: 4
                  - text: "-, "
                    attr: 1
                  - text: objType
                    attr: 4
                  - text: "-, "
                    attr: 1
                  - text: symType
                    attr: 4
                  - text: "-: Type\t(docType # NIL) & (objType # NIL) & (symType # NIL)\rFile types of BlackBox documents ("
                    attr: 1
                  - text: docType
                    attr: 2
                  - text: "), of BlackBox code files ("
                    attr: 1
                  - text: objType
                    attr: 2
                  - text: "), and of BlackBox symbol files ("
                    attr: 1
                  - text: symType
                    attr: 2
                  - text: ").\r"
                    attr: 1
