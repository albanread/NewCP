                  - text: "(* sequencing utilities *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE Prepend (s: Script; st: Stores.Store; IN name: Stores.OpName; op: Stores.Operation);\r\t\tVAR e: OpElem;\r\tBEGIN\r\t\tASSERT(op # NIL, 20);\r\t\tNEW(e); e.st := st; e.op := op; e.name := name;\r\t\te.next := s.list; s.list := e\r\tEND Prepend;\r\r\tPROCEDURE Push (VAR list, e: OpElem);\r\tBEGIN\r\t\te.next := list; list := e\r\tEND Push;\r\r\tPROCEDURE Pop (VAR list, e: OpElem);\r\tBEGIN\r\t\te := list; list := list.next\r\tEND Pop;\r\r\tPROCEDURE Reduce (VAR list: OpElem; max: INTEGER);\r\t\tVAR e: OpElem;\r\tBEGIN\r\t\te := list; WHILE (max > 1) & (e # NIL) DO DEC(max); e := e.next END;\r\t\tIF e # NIL THEN e.next := NIL END\r\tEND Reduce;\r\t\r\tPROCEDURE (r: Reducer) Reduce (full: BOOLEAN);\r\t\tVAR e: OpElem; n: INTEGER; w: Window;\r\tBEGIN\r\t\tIF dir # NIL THEN\r\t\t\tw := dir.First();\r\t\t\tWHILE w # NIL DO\r\t\t\t\tIF w.seq IS StdSequencer THEN\r\t\t\t\t\tIF full THEN\r\t\t\t\t\t\tn := 1\r\t\t\t\t\tELSE\r\t\t\t\t\t\tn := 0; e := w.seq(StdSequencer).undo;\r\t\t\t\t\t\tWHILE e # NIL DO INC(n); e := e.next END;\r\t\t\t\t\t\tIF n > 20 THEN n := n DIV 2 ELSE n := 10 END\r\t\t\t\t\tEND;\r\t\t\t\t\tReduce(w.seq(StdSequencer).undo, n)\r\t\t\t\tEND;\r\t\t\t\tw := dir.Next(w)\r\t\t\tEND\r\t\tEND;\r\t\tKernel.InstallReducer(r)\r\tEND Reduce;\r\r\tPROCEDURE Reset (s: StdSequencer);\r\tBEGIN\r\t\ts.trapEra := Kernel.trapCount;\r\t\tIF (s.entryLevel # 0) OR (s.nestLevel # 0) THEN\r\t\t\ts.modLevel := 0;\r\t\t\ts.entryLevel := 0;\r\t\t\ts.nestLevel := 0;\r\t\t\ts.lastSt := NIL;\r\t\t\ts.lastOp := NIL;\r\t\t\ts.script := NIL;\r\t\t\ts.noUndo := FALSE;\r\t\t\ts.undo := NIL; s.redo := NIL;\r\t\t\ts.invisibleLevel := 0;\r\t\t\ts.transparentLevel := 0;\r\t\t\ts.notRecordedLevel := 0\r\t\tEND\r\tEND Reset;\r\r\tPROCEDURE Neutralize (st: Stores.Store);\r\t\tVAR neutralize: Models.NeutralizeMsg;\r\tBEGIN\r\t\tIF st # NIL THEN\t"
                    attr: 0
                  - text: "(* st = NIL for scripts *)"
                    attr: 1
                  - text: "\r\t\t\tWITH st: Models.Model DO\r\t\t\t\tModels.Broadcast(st, neutralize)\r\t\t\t| st: Views.View DO\r\t\t\t\tst.Neutralize\r\t\t\tELSE\r\t\t\tEND\r\t\tEND\r\tEND Neutralize;\r\r\tPROCEDURE Do (s: StdSequencer; st: Stores.Store; op: Stores.Operation);\r\tBEGIN\r\t\tINC(s.entryLevel); s.lastSt := NIL; s.lastOp := NIL;\r\t\tNeutralize(st); op.Do;\r\t\tDEC(s.entryLevel)\r\tEND Do;\r\r\tPROCEDURE AffectsDoc (s: StdSequencer; st: Stores.Store): BOOLEAN;\r\t\tVAR v, w: Window;\r\tBEGIN\r\t\tw := s.home;\r\t\tIF (w = NIL) OR (st = w.doc) OR (st = w.doc.ThisView()) THEN\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE\r\t\tELSE\r\t\t\tv := w.link;\r\t\t\tWHILE (v # w) & (st # v.doc) & (st # v.doc.ThisView()) DO v := v.link END;\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " v = w\r\t\tEND\r\tEND AffectsDoc;\r\r\r\t"
                    attr: 0
                  - text: "(* Script *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (s: Script) Do;\r\t\tVAR e, f, g: OpElem;\r\tBEGIN\r\t\te := s.list; f := NIL;\r\t\tREPEAT\r\t\t\tNeutralize(e.st); e.op.Do;\r\t\t\tg := e.next; e.next := f; f := e; e := g\r\t\tUNTIL e = NIL;\r\t\ts.list := f\r\tEND Do;\r\r\r\t"
                    attr: 0
                  - text: "(* StdSequencer *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (s: StdSequencer) Handle (VAR msg: ANYREC);\r\t"
                    attr: 0
                  - text: "(* send message to all windows attached to s *)"
                    attr: 1
                  - text: "\r\t\tVAR w: Window;\r\tBEGIN\r\t\tIF s.trapEra # Kernel.trapCount THEN Reset(s) END;\r\t\tWITH msg: Models.Message DO\r\t\t\tIF msg IS Models.UpdateMsg THEN\r\t\t\t\tProperties.IncEra;\r\t\t\t\tIF s.entryLevel = 0 THEN\r\t\t\t\t\t"
                    attr: 0
                  - text: "(* updates in dominated model bypassed the sequencer *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tReset(s);\t"
                    attr: 0
                  - text: "(* panic reset: clear sequencer *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tINC(s.modLevel)\t"
                    attr: 0
                  - text: "(* but leave dirty *)"
                    attr: 1
                  - text: "\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tw := dir.First();\r\t\t\tWHILE w # NIL DO\r\t\t\t\tIF w.seq = s THEN w.BroadcastModelMsg(msg) END;\r\t\t\t\tw := dir.Next(w)\r\t\t\tEND\r\t\t| msg: Views.Message DO\r\t\t\tw := dir.First();\r\t\t\tWHILE w # NIL DO\r\t\t\t\tIF w.seq = s THEN w.BroadcastViewMsg(msg) END;\r\t\t\t\tw := dir.Next(w)\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND Handle;\r\r\r\tPROCEDURE (s: StdSequencer) Dirty (): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " s.modLevel > 0\r\tEND Dirty;\r\r\tPROCEDURE (s: StdSequencer) SetDirty (dirty: BOOLEAN);\r\tBEGIN\r\t\tIF dirty THEN INC(s.modLevel) ELSE s.modLevel := 0 END\r\tEND SetDirty;\r\r\tPROCEDURE (s: StdSequencer) LastOp (st: Stores.Store): Stores.Operation;\r\tBEGIN\r\t\tASSERT(st # NIL, 20);\r\t\tIF s.lastSt = st THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " s.lastOp ELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL END\r\tEND LastOp;\r\r\r\tPROCEDURE (s: StdSequencer) BeginScript (IN name: Stores.OpName; VAR script: Stores.Operation);\r\t\tVAR sop: Script;\r\tBEGIN\r\t\tIF s.trapEra # Kernel.trapCount THEN Reset(s) END;\r\t\tINC(s.nestLevel);\r\t\tIF (s.nestLevel = 1) & (s.invisibleLevel = 0) & (s.transparentLevel = 0) & (s.notRecordedLevel = 0) THEN\r\t\t\tINC(s.modLevel)\r\t\tEND;\r\t\ts.lastSt := NIL; s.lastOp := NIL;\r\t\tNEW(sop); sop.up := s.script; sop.list := NIL; sop.level := s.nestLevel; sop.name := name;\r\t\ts.script := sop;\r\t\tscript := sop\r\tEND BeginScript;\r\r\tPROCEDURE (s: StdSequencer) Do (st: Stores.Store; IN name: Stores.OpName; op: Stores.Operation);\r\t\tVAR e: OpElem;\r\tBEGIN\r\t\tASSERT(st # NIL, 20); ASSERT(op # NIL, 21);\r\t\tIF s.trapEra # Kernel.trapCount THEN Reset(s) END;\r\t\tDo(s, st, op);\r\t\tIF s.noUndo THEN\t"
                    attr: 0
                  - text: "(* cannot undo: unbalanced BeginModification pending *)"
                    attr: 1
                  - text: "\r\t\t\ts.lastSt := NIL; s.lastOp := NIL\r\t\tELSIF (s.entryLevel = 0)\t"
                    attr: 0
                  - text: "(* don't record when called from within op.Do *)"
                    attr: 1
                  - text: "\r\t\t& AffectsDoc(s, st) THEN\t"
                    attr: 0
                  - text: "(* don't record when Do affected child window only *)"
                    attr: 1
                  - text: "\r\t\t\ts.lastSt := st; s.lastOp := op;\r\t\t\tIF s.notRecordedLevel = 0 THEN\r\t\t\t\ts.redo := NIL;\t"
                    attr: 0
                  - text: "(* clear redo stack *)"
                    attr: 1
                  - text: "\r\t\t\tEND;\r\t\t\tIF s.script # NIL THEN\r\t\t\t\tPrepend(s.script, st, name, op)\r\t\t\tELSE\r\t\t\t\tIF (s.invisibleLevel = 0) & (s.transparentLevel = 0) & (s.notRecordedLevel = 0) THEN INC(s.modLevel) END;\r\t\t\t\tIF s.notRecordedLevel = 0 THEN\r"
                    attr: 0
                  - text: "\t\t\t\t"
                    attr: 4
                  - text: "\tNEW(e); e.st := st; e.op := op; e.name := name;\r\t\t\t\t\te.invisible := s.invisibleLevel > 0; e.transparent := s.transparentLevel > 0;\r\t\t\t\t\tPush(s.undo, e)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND Do;\r\r\tPROCEDURE (s: StdSequencer) Bunch (st: Stores.Store);\r\t\tVAR lastOp: Stores.Operation;\r\tBEGIN\r\t\tIF s.trapEra # Kernel.trapCount THEN Reset(s) END;\r\t\tASSERT(st # NIL, 20); ASSERT(st = s.lastSt, 21);\r\t\tlastOp := s.lastOp;\r\t\tDo(s, st, lastOp);\r\t\tIF s.noUndo THEN\r\t\t\ts.lastSt := NIL; s.lastOp := NIL\r\t\tELSIF (s.entryLevel = 0)\t"
                    attr: 0
                  - text: "(* don't record when called from within op.Do *)"
                    attr: 1
                  - text: "\r\t\t& AffectsDoc(s, st) THEN\t"
                    attr: 0
                  - text: "(* don't record when Do affected child window only *)"
                    attr: 1
                  - text: "\r\t\t\ts.lastSt := st; s.lastOp := lastOp\r\t\tEND\r\tEND Bunch;\r\r\tPROCEDURE (s: StdSequencer) EndScript (script: Stores.Operation);\r\t\tVAR e: OpElem;\r\tBEGIN\r\t\tIF s.trapEra # Kernel.trapCount THEN Reset(s) END;\r\t\tASSERT(script # NIL, 20); ASSERT(s.script = script, 21);\r\t\tWITH script: Script DO\r\t\t\tASSERT(s.nestLevel = script.level, 22);\r\t\t\ts.script := script.up;\r\t\t\tIF s.entryLevel = 0 THEN\t"
                    attr: 0
                  - text: "(* don't record when called from within op.Do *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF script.list # NIL THEN\r\t\t\t\t\tIF s.script # NIL THEN\r\t\t\t\t\t\tPrepend(s.script, NIL, script.name, script)\r\t\t\t\t\tELSE\t"
                    attr: 0
                  - text: "(* outermost scripting level *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\ts.redo := NIL;\t"
                    attr: 0
                  - text: "(* clear redo stack *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\tIF ~s.noUndo THEN\r\t\t\t\t\t\t\tNEW(e); e.st := NIL; e.op := script; e.name := script.name;\r\t\t\t\t\t\t\te.invisible := s.invisibleLevel > 0; e.transparent := s.transparentLevel > 0;\r\t\t\t\t\t\t\tIF s.notRecordedLevel=0 THEN Push(s.undo, e) END\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\ts.lastSt := NIL; s.lastOp := NIL\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\t\tIF (s.script = NIL) & (s.modLevel > 0) & (s.invisibleLevel = 0) & (s.transparentLevel = 0) THEN \r\t\t\t\t\t\tDEC(s.modLevel)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND;\r\t\tDEC(s.nestLevel);\r\t\tIF s.nestLevel = 0 THEN ASSERT(s.script = NIL, 22); s.noUndo := FALSE END\r\tEND EndScript;\r\r\tPROCEDURE (s: StdSequencer) StopBunching;\r\tBEGIN\r\t\ts.lastSt := NIL; s.lastOp := NIL\r\tEND StopBunching;\r\r\tPROCEDURE (s: StdSequencer) BeginModification (type: INTEGER; st: Stores.Store);\r\tBEGIN\r\t\tIF s.trapEra # Kernel.trapCount THEN Reset(s) END;\r\t\tIF s.nestLevel < LEN(s.modStack) THEN s.modStack[s.nestLevel].store := st; s.modStack[s.nestLevel].type := type END;\r\t\tINC(s.nestLevel);\r\t\tIF type = Sequencers.notUndoable THEN\r\t\t\tINC(s.modLevel);\t"
                    attr: 0
                  - text: "(* unbalanced! *)"
                    attr: 1
                  - text: "\r\t\t\ts.noUndo := TRUE; s.undo := NIL; s.redo := NIL;\r\t\t\ts.lastSt := NIL; s.lastOp := NIL;\r\t\t\tINC(s.entryLevel)\t"
                    attr: 0
                  - text: "(* virtual entry of modification \"operation\" *)\r"
                    attr: 1
                  - text: "\t\tELSIF type = Sequencers.invisible THEN\r\t\t\tINC(s.invisibleLevel)\r\t\tELSIF type = Sequencers.clean THEN\r\t\t\tINC(s.transparentLevel)\r\t\tELSIF type = notRecorded THEN\r\t\t\tINC(s.notRecordedLevel)\r\t\tEND\r\tEND BeginModification;\r\r\tPROCEDURE (s: StdSequencer) EndModification (type: INTEGER; st: Stores.Store);\r\tBEGIN\r\t\tIF s.trapEra # Kernel.trapCount THEN Reset(s) END;\r\t\tASSERT(s.nestLevel > 0, 20);\r\t\tIF s.nestLevel <= LEN(s.modStack) THEN\r\t\t\tASSERT((s.modStack[s.nestLevel - 1].store = st) & (s.modStack[s.nestLevel - 1].type = type), 21)\r\t\tEND;\r\t\tDEC(s.nestLevel);\r\t\tIF type = Sequencers.notUndoable THEN\r\t\t\tDEC(s.entryLevel)\r\t\tELSIF type = Sequencers.invisible THEN\r\t\t\tDEC(s.invisibleLevel)\r\t\tELSIF type = Sequencers.clean THEN\r\t\t\tDEC(s.transparentLevel)\r\t\tELSIF type = notRecorded THEN\r\t\t\tDEC(s.notRecordedLevel)\r\t\tEND;\r\t\tIF s.nestLevel = 0 THEN ASSERT(s.script = NIL, 22); s.noUndo := FALSE END\r\tEND EndModification;\r\r\tPROCEDURE (s: StdSequencer) CanUndo (): BOOLEAN;\r\t\tVAR op: OpElem;\r\tBEGIN\r\t\tIF s.trapEra # Kernel.trapCount THEN Reset(s) END;\r\t\top := s.undo;\r\t\tWHILE (op # NIL) & op.invisible DO op := op.next END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " op # NIL\r\tEND CanUndo;\r\r\tPROCEDURE (s: StdSequencer) CanRedo (): BOOLEAN;\r\t\tVAR op: OpElem;\r\tBEGIN\r\t\tIF s.trapEra # Kernel.trapCount THEN Reset(s) END;\r\t\top := s.redo;\r\t\tWHILE (op # NIL) & op.invisible DO op := op.next END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " op # NIL\r\tEND CanRedo;\r\r\tPROCEDURE (s: StdSequencer) GetUndoName (VAR name: Stores.OpName);\r\t\tVAR op: OpElem;\r\tBEGIN\r\t\tIF s.trapEra # Kernel.trapCount THEN Reset(s) END;\r\t\top := s.undo;\r\t\tWHILE (op # NIL) & op.invisible DO op := op.next END;\r\t\tIF op # NIL THEN name := op.name$ ELSE name[0] := 0X END\r\tEND GetUndoName;\r\r\tPROCEDURE (s: StdSequencer) GetRedoName (VAR name: Stores.OpName);\r\t\tVAR op: OpElem;\r\tBEGIN\r\t\tIF s.trapEra # Kernel.trapCount THEN Reset(s) END;\r\t\top := s.redo;\r\t\tWHILE (op # NIL) & op.invisible DO op := op.next END;\r\t\tIF op # NIL THEN name := op.name$ ELSE name[0] := 0X END\r\tEND GetRedoName;\r\r\tPROCEDURE (s: StdSequencer) Undo;\r\t\tVAR e: OpElem;\r\tBEGIN\r\t\tIF s.trapEra # Kernel.trapCount THEN Reset(s) END;\r\t\tIF s.undo # NIL THEN\r\t\t\tREPEAT\r\t\t\t\tPop(s.undo, e); Do(s, e.st, e.op); Push(s.redo, e)\r\t\t\tUNTIL ~e.invisible OR (s.undo = NIL);\r\t\t\tIF ~e.transparent THEN\r\t\t\t\tIF s.modLevel > 0 THEN DEC(s.modLevel) END\r\t\t\tEND\r\t\tEND\r\tEND Undo;\r\r\tPROCEDURE (s: StdSequencer) Redo;\r\t\tVAR e: OpElem;\r\tBEGIN\r\t\tIF s.trapEra # Kernel.trapCount THEN Reset(s) END;\r\t\tIF s.redo # NIL THEN\r\t\t\tPop(s.redo, e); Do(s, e.st, e.op); Push(s.undo, e);\r\t\t\tWHILE (s.redo # NIL) & s.redo.invisible DO\r\t\t\t\tPop(s.redo, e); Do(s, e.st, e.op); Push(s.undo, e)\r\t\t\tEND;\r\t\t\tIF ~e.transparent THEN\r\t\t\t\tINC(s.modLevel)\r\t\t\tEND\r\t\tEND\r\tEND Redo;\r\r\r\t"
                    attr: 0
                  - text: "(* Forwarder *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (f: Forwarder) Forward (target: BOOLEAN; VAR msg: Controllers.Message);\r\t\tVAR w: Window;\r\tBEGIN\r\t\tw := dir.Focus(target);\r\t\tIF w # NIL THEN w.ForwardCtrlMsg(msg) END\r\tEND Forward;\r\r\tPROCEDURE (f: Forwarder) Transfer (VAR msg: Controllers.TransferMessage);\r\t\tVAR w: Window; h: Views.Frame; p: Ports.Port; sx, sy, tx, ty, pw, ph: INTEGER;\r\tBEGIN\r\t\th := msg.source; p := h.rider.Base();\r\t\t"
                    attr: 0
                  - text: "(* (msg.x, msg.y) is point in local coordinates of source frame *)"
                    attr: 1
                  - text: "\r\t\tsx := (msg.x + h.gx) DIV h.unit;\r\t\tsy := (msg.y + h.gy) DIV h.unit;\r\t\t"
                    attr: 0
                  - text: "(* (sx, sy) is point in global coordinates of source port *)"
                    attr: 1
                  - text: "\r\t\tdir.GetThisWindow(p, sx, sy, tx, ty, w);\r\t\tIF w # NIL THEN\r\t\t\t"
                    attr: 0
                  - text: "(* (tx, ty) is point in global coordinates of target port *)\r\t\t\t"
                    attr: 1
                  - text: "w.port.GetSize(pw, ph);"
                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\t\t\tmsg.x := tx * w.port.unit;\r\t\t\tmsg.y := ty * w.port.unit;\r\t\t\t"
                    attr: 0
                  - text: "(* (msg.x, msg.y) is point in coordinates of target window *)"
                    attr: 1
                  - text: "\r\t\t\tw.ForwardCtrlMsg(msg)\r\t\tEND\r\tEND Transfer;\r\r\r\t"
                    attr: 0
                  - text: "(** miscellaneous **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: SetDir
                    attr: 3
                  - text: "* (d: Directory);\r\tBEGIN\r\t\tASSERT(d # NIL, 20);\r\t\tIF stdDir = NIL THEN stdDir := d END;\r\t\tdir := d\r\tEND SetDir;\r\r\t"
                    attr: 0
                  - text: "(* reuse of open documents; relevant flags are isAux, isTool, allowDuplicates *)"
                    attr: 1
                  - text: "\r\tPROCEDURE "
                    attr: 0
                  - text: GetBySpec
                    attr: 3
                  - text: "* (loc: Files.Locator; name: Files.Name; conv: Converters.Converter;\r\t\t\t\t\t\t\t\t\t\t\tflags: SET): Window;\r\t\tVAR tool, aux: BOOLEAN; w: Window;\r\tBEGIN\r\t\tIF ~(allowDuplicates IN flags) & (loc # NIL) & (loc.res # 77) & (name # \"\") THEN\r\t\t\tKernel.MakeFileName(name, \"\");\r\t\t\ttool := isTool IN flags; aux := isAux IN flags;\r\t\t\tw := dir.First();\r\t\t\tWHILE w # NIL DO\r\t\t\t\tIF ~(allowDuplicates IN w.flags) & (w.loc # NIL) & (w.loc.res # 77) & (w.name # \"\")\r\t\t\t\t& Files.dir.SameFile(loc, name, w.loc, w.name) & (w.conv = conv)\r\t\t\t\t& (tool = (isTool IN w.flags)) & (aux = (isAux IN w.flags)) THEN\r\t\t\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " w\r\t\t\t\tEND ;\r\t\t\t\tw := dir.Next(w)\r\t\t\tEND\r\t\tEND ;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL\r\tEND GetBySpec;\r\r"
                    attr: 0
                  - text: "\tPROCEDURE "
                    attr: 5
                  - text: SelectBySpec
                    attr: 6
                  - text: "* (loc: Files.Locator; name: Files.Name; conv: Converters.Converter; \r\t\t\t\t\t\t\t\t\t\t\t\tflags: SET; VAR done: BOOLEAN);\r\t\tVAR w: Window;\r\tBEGIN\r\t\tw := GetBySpec(loc, name, conv, flags);\r\t\tIF w # NIL THEN dir.Select(w, lazy); done := TRUE ELSE done := FALSE END\r\tEND SelectBySpec;\r"
                    attr: 5
                  - text: "\r\tPROCEDURE "
                    attr: 0
                  - text: SelectByTitle
                    attr: 3
                  - text: "* (v: Views.View; flags: SET; title: Views.Title; VAR done: BOOLEAN);\r\t\tVAR w: Window; t: Views.Title; n1, n2: ARRAY 64 OF CHAR;\r\tBEGIN\r\t\tdone := FALSE;\r\t\tIF v # NIL THEN\r\t\t\tIF v IS Documents.Document THEN v := v(Documents.Document).ThisView() END;\r\t\t\tServices.GetTypeName(v, n1)\r\t\tELSE n1 := \"\"\r\t\tEND;\r\t\tw := dir.First();\r\t\tWHILE w # NIL DO\r\t\t\tIF ((w.flags / flags) * {isAux, isTool} = {}) & ~(allowDuplicates IN w.flags) THEN\r\t\t\t\tw.GetTitle(t);\r\t\t\t\tIF t = title THEN\r\t\t\t\t\tServices.GetTypeName(w.doc.ThisView(), n2);\r\t\t\t\t\tIF (n1 = \"\") OR (n1 = n2) THEN dir.Select(w, lazy); done := TRUE; "
                    attr: 0
