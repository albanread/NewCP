                  - text: "\r\t\tw.doc := doc; w.flags := flags;\r\t\tIF w.seq = NIL THEN\r\t\t\tASSERT(doc.Domain() # NIL, 27);\r\t\t\tany := doc.Domain().GetSequencer();\r\t\t\tIF any # NIL THEN\r\t\t\t\tASSERT(any IS Sequencers.Sequencer, 26);\r\t\t\t\tw.seq := any(Sequencers.Sequencer)\r\t\t\tELSE\r\t\t\t\tw.seq := d.NewSequencer();\r\t\t\t\tdoc.Domain().SetSequencer(w.seq)\r\t\t\tEND\t\t\t\r\t\tEND;\r\t\ts := w.seq;\r\t\tWITH s: StdSequencer DO\r\t\t\tIF s.home = NIL THEN s.home := w END\r\t\tELSE\r\t\tEND;\r\t\tNEW(c); c.win := w; doc.InitContext(c);\r\t\tdoc.GetNewFrame(f); w.frame := f(Views.RootFrame);\r\t\tw.frame.ConnectTo(w.port);\r\t\tViews.SetRoot(w.frame, w.doc, FALSE, w.flags);\r\t\tw.SetSpec(loc, fname, conv)\r\tEND Open;\r\r\tPROCEDURE (d: Directory) "
