                    attr: 0
                  - text: H
                    attr: 3
                  - text: "*: INTEGER;\r\t\tcurrent: View;\r\t\tframe: Views.Frame;\r\r\tPROCEDURE (v: View) FINALIZE;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tres := WinApi.DeleteDC(v.dc);\r\t\tres := WinApi.DeleteObject(v.map);\r\t\tv.dc := 0; v.map := 0\r\tEND FINALIZE;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Open
                    attr: 3
                  - text: "*;\r\t\tVAR res: INTEGER; v: View; dc: WinApi.HANDLE;\r\tBEGIN\r\t\tNEW(v);\r\t\tdc := WinApi.GetDC(0);\r\t\tv.dc := WinApi.CreateCompatibleDC(dc);\r\t\tv.map := WinApi.CreateCompatibleBitmap(dc, W, H);\r\t\tres := WinApi.SelectObject(v.dc, v.map);\r\t\tres := WinApi.ReleaseDC(0, dc);\r\t\tres := WinApi.SelectObject(v.dc, WinApi.GetStockObject(WinApi.WHITE_BRUSH));\r\t\tres := WinApi.SelectObject(v.dc, WinApi.GetStockObject(WinApi.NULL_PEN));\r\t\tres := WinApi.Rectangle(v.dc, 0, 0, W + 1, H + 1);\r\t\tViews.OpenAux(v, \"XYplane\");\r\t\tcurrent := v\r\tEND Open;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Dot
                    attr: 3
                  - text: "* (x, y, mode: INTEGER);\r\t\tVAR res, u: INTEGER; p: HostPorts.Port; col: Ports.Color;\r\tBEGIN\r\t\tIF (x >= 0) & (x < maxW) & (y >= 0) & (y < maxH) THEN\r\t\t\ty := maxH - 1 - y;\r\t\t\tIF mode = draw THEN col := Ports.black ELSE col := Ports.white END;\r\t\t\tres := WinApi.SetPixel(current.dc, x, y, col);\r\t\t\tIF (frame # NIL) & (frame.rider # NIL) THEN\r\t\t\t\tu := frame.unit; p := frame.rider(HostPorts.Rider).port;\r\t\t\t\tres := WinApi.SetPixel(p.dc, frame.gx DIV u + x, frame.gy DIV u + y, col);\r\t\t\t\tIF res = -1 THEN\r\t\t\t\t\tframe.DrawRect(x * u, y * u, (x + 1) * u, (y + 1) * u, Ports.fill, col)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND Dot;\r\r\tPROCEDURE "
                    attr: 0
                  - text: IsDot
                    attr: 3
                  - text: "* (x, y: INTEGER): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.GetPixel(current.dc, x, maxH - 1 - y) # Ports.white\r\tEND IsDot;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ReadKey
                    attr: 3
                  - text: "* (): CHAR;\r\t\tVAR res: INTEGER; msg: WinApi.MSG;\r\tBEGIN\r\t\tIF WinApi.PeekMessageW(msg, 0, WinApi.WM_KEYDOWN, WinApi.WM_CHAR, 1) # 0 THEN\r\t\t\tIF msg.message = WinApi.WM_CHAR THEN\r\t\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " CHR(msg.wParam)\r\t\t\tELSE\r\t\t\t\tres := WinApi.TranslateMessage(msg);\r\t\t\t\tres := WinApi.DispatchMessageW(msg)\r\t\t\tEND\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " 0X\r\tEND ReadKey;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Clear
                    attr: 3
                  - text: "*;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tres := WinApi.Rectangle(current.dc, 0, 0, W + 1, H + 1);\r\t\tViews.Update(current, Views.keepFrames)\r\tEND Clear;\r\r\r\tPROCEDURE (v: View) Internalize (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER; res, x, y, i: INTEGER; dc: WinApi.HANDLE; s: SET;\r\tBEGIN\r\t\tv.Internalize^(rd);\r\t\tIF ~rd.cancelled THEN\r\t\t\trd.ReadVersion(0, 0, version);\r\t\t\tIF ~rd.cancelled THEN\r\t\t\t\tdc := WinApi.GetDC(0);\r\t\t\t\tv.dc := WinApi.CreateCompatibleDC(dc);\r\t\t\t\tv.map := WinApi.CreateCompatibleBitmap(dc, W, H);\r\t\t\t\tres := WinApi.SelectObject(v.dc, v.map);\r\t\t\t\tres := WinApi.ReleaseDC(0, dc);\r\t\t\t\tres := WinApi.SelectObject(v.dc, WinApi.GetStockObject(WinApi.WHITE_BRUSH));\r\t\t\t\tres := WinApi.SelectObject(v.dc, WinApi.GetStockObject(WinApi.NULL_PEN));\r\t\t\t\tres := WinApi.Rectangle(v.dc, 0, 0, W + 1, H + 1);\r\t\t\t\ty := 0;\r\t\t\t\tWHILE y < maxH DO\r\t\t\t\t\tx := 0;\r\t\t\t\t\tWHILE x < maxW DO\r\t\t\t\t\t\trd.ReadSet(s); i := 0;\r\t\t\t\t\t\tWHILE i < 32 DO\r\t\t\t\t\t\t\tIF i IN s THEN res := WinApi.SetPixel(v.dc, x, y, Ports.black) END;\r\t\t\t\t\t\t\tINC(i); INC(x)\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND;\r\t\t\t\t\tINC(y)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (v: View) Externalize (VAR wr: Stores.Writer);\r\t\tVAR x, y, i: INTEGER; s: SET;\r\tBEGIN\r\t\tv.Externalize^(wr);\r\t\twr.WriteVersion(0);\r\t\ty := 0;\r\t\tWHILE y < maxH DO\r\t\t\tx := 0;\r\t\t\tWHILE x < maxW DO\r\t\t\t\ti := 0; s := {};\r\t\t\t\tWHILE i < 32 DO\r\t\t\t\t\tIF WinApi.GetPixel(v.dc, x, y) # Ports.white THEN INCL(s, i) END;\r\t\t\t\t\tINC(i); INC(x)\r\t\t\t\tEND;\r\t\t\t\twr.WriteSet(s)\r\t\t\tEND;\r\t\t\tINC(y)\r\t\tEND\r\tEND Externalize;\r\r\tPROCEDURE (v: View) CopyFromSimpleView (source: Views.View);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tWITH source: View DO v.dc := source.dc; \r\t\t\tv.dc := WinApi.CreateCompatibleDC(source.dc);\r\t\t\tv.map := WinApi.CreateCompatibleBitmap(source.dc, W, H);\r\t\t\tres := WinApi.SelectObject(v.dc, v.map);\r\t\t\tres := WinApi.BitBlt(v.dc, 0, 0, W, H, source.dc, 0, 0, 00CC0020H)\r\t\tEND\r\tEND CopyFromSimpleView;\r\r\tPROCEDURE (v: View) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR rd: HostPorts.Rider; x, y, u, rl, rt, rr, rb: INTEGER;\r\tBEGIN\r\t\trd := f.rider(HostPorts.Rider);\r\t\tIF rd.port.wnd # 0 THEN\t"
                    attr: 0
                  - text: "(* copy to screen *)"
                    attr: 1
                  - text: "\r\t\t\tframe := f;\r\t\t\tf.rider.GetRect(rl, rt, rr, rb);\r\t\t\trd.CopyFrom(v.dc, rl - f.gx DIV f.unit, rt - f.gy DIV f.unit)\r\t\tELSE\t"
                    attr: 0
                  - text: "(* copy to printer *)"
                    attr: 1
                  - text: "\r\t\t\tu := HostWindows.unit; y := 0;\r\t\t\tWHILE y < maxH DO\r\t\t\t\tx := 0;\r\t\t\t\tWHILE x < maxW DO\r\t\t\t\t\tIF WinApi.GetPixel(v.dc, x, y) # Ports.white THEN\r\t\t\t\t\t\tf.DrawRect(x * u, y * u, (x + 1) * u, (y + 1) * u, Ports.fill, Ports.black)\r\t\t\t\t\tEND;\r\t\t\t\t\tINC(x)\r\t\t\t\tEND;\r\t\t\t\tINC(y)\r\t\t\tEND\r\t\tEND\r\tEND Restore;\r\t\r\tPROCEDURE (v: View) HandlePropMsg (VAR msg: Properties.Message);\r\tBEGIN\r\t\tWITH msg: Properties.SizePref DO\r\t\t\tmsg.w := W * HostWindows.unit;\r\t\t\tmsg.h := H * HostWindows.unit\r\t\t| msg: Properties.ResizePref DO\r\t\t\tmsg.fixed := TRUE\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\t\rBEGIN\r\tX := 0; Y := 0; W := maxW; H := maxH\rEND XYplane.\r"
                    attr: 0
