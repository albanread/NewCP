                    attr: 3
                  - text: "* = 0; "
                    attr: 0
                  - text: draw
                    attr: 3
                  - text: "* = 1;\r\t\tmaxW = 256; maxH = 256;\r\r\tTYPE\r\t\tView = POINTER TO RECORD (Views.View)\r\t\t\tdc: WinApi.HANDLE;\r\t\t\tmap: WinApi.HANDLE\r\t\tEND;\r\r\tVAR\r\t\t"
                    attr: 0
