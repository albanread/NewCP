                    attr: 0
                  - text: "\t(*\r\t\tReturns the current bias, in minutes, for local time translation on this computer. The bias is the difference, \r\t\tin minutes, between Coordinated Universal Time (UTC) and local time. All translations between UTC and\r\t\tlocal time are based on the following formula: \r\t\t\tUTC = local time + bias \r \t*)\t\t\r"
