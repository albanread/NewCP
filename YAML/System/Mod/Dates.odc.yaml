                  - text: "* (IN d: Date): INTEGER;\r\t\tVAR y, m, n: INTEGER;\r\tBEGIN\r\t\ty := d.year; m := d.month - 3;\r\t\tIF m < 0 THEN INC(m, 12); DEC(y) END;\r\t\tn := y * 1461 DIV 4 + (m * 153 + 2) DIV 5 + d.day - 306;\r\t\tIF n > 577737 THEN n := n - (y DIV 100 * 3 - 5) DIV 4 END;\r\t\tRETURN n\r\tEND Day;\r\r\tPROCEDURE "
                    attr: 0
                  - text: DayToDate
                    attr: 3
                  - text: "* (n: INTEGER; OUT d: Date);\r\t\tVAR c, y, m: INTEGER;\r\tBEGIN\r\t\tIF n > 577737 THEN\r\t\t\tn := n * 4 + 1215; c := n DIV 146097; n := n MOD 146097 DIV 4\r\t\tELSE\r\t\t\tn := n + 305; c := 0\r\t\tEND;\r\t\tn := n * 4 + 3; y := n DIV 1461; n := n MOD 1461 DIV 4;\r\t\tn := n * 5 + 2; m := n DIV 153; n := n MOD 153 DIV 5;\r\t\tIF m > 9 THEN m := m - 12; INC(y) END;\r\t\td.year := SHORT(100 * c + y);\r\t\td.month := SHORT(m + 3);\r\t\td.day := SHORT(n + 1)\r\tEND DayToDate;\r\r\tPROCEDURE "
