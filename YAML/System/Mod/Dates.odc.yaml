                    attr: 3
                  - text: "* (IN d: Date): BOOLEAN;\r\t\tVAR y, m, d1: INTEGER;\r\tBEGIN\r\t\tIF (d.year < 1) OR (d.year > 9999) OR (d.month < 1) OR (d.month > 12) OR (d.day < 1) THEN\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE\r\t\tELSE\r\t\t\ty := d.year; m := d.month;\r\t\t\tIF m = 2 THEN\r\t\t\t\tIF (y < 1583) & (y MOD 4 = 0)\r\t\t\t\tOR (y MOD 4 = 0) & ((y MOD 100 # 0) OR (y MOD 400 = 0)) THEN\r\t\t\t\t\td1 := 29\r\t\t\t\tELSE d1 := 28\r\t\t\t\tEND\r\t\t\tELSIF m IN {1, 3, 5, 7, 8, 10, 12} THEN d1 := 31\r\t\t\tELSE d1 := 30\r\t\t\tEND;\r\t\t\tIF (y = 1582) & (m = 10) & (d.day > 4) & (d.day < 15) THEN "
