                  - text: GetEasterDate
                    attr: 3
                  - text: "* (year: INTEGER; OUT d: Date);\r\t\tVAR  k, m, n, a, b, c, d0, e, o: INTEGER; month, day: INTEGER;\r\tBEGIN\r\t\tASSERT((year >= 1583) & (year <= 2299), 20);\r\t\tk := year DIV 100 - 15;\r\t\tm := M[k]; n := N[k];\r\t\ta := year MOD 19; b := year MOD 4; c := year MOD 7;\r\t\td0 := (19*a + m) MOD 30; e := (2*b+4*c+6*d0+n) MOD 7;\r\t\to := 21+d0+e; month := 3+o DIV 31; day := o MOD 31+1;\r\t\tIF month = 4 THEN\r\t\t\tIF day = 26 THEN day := 19\r\t\t\tELSIF (day = 25) & (d0=28) & (e = 6) & (a > 10) THEN day := 18\r\t\t\tEND\r\t\tEND;\r\t\td.year := year;\r\t\td.month := month;\r\t\td.day := day\r\tEND GetEasterDate;\r\r\tPROCEDURE  "
