                  - text: "* (root: RootFrame);\r\t\tVAR rgn: Region; f: Frame; v: View; i, n: INTEGER;\r\tBEGIN\r\t\tASSERT(root # NIL, 20); ASSERT(root.state = open, 21);\r\t\trgn := root.update; n := rgn.n; rgn.n := 0; i := 0;\r\t\tWHILE i < n DO\r\t\t\tIF rgn.r[i].rebuild THEN\r\t\t\t\tv := rgn.r[i].v;\r\t\t\t\tIF v # NIL THEN f := ThisCand(root, v) ELSE f := NIL END;\r\t\t\t\tIF f = NIL THEN f := root END;\r\t\t\t\tRemoveFrames(f, rgn.r[i].l - f.gx, rgn.r[i].t - f.gy, rgn.r[i].r - f.gx, rgn.r[i].b - f.gy)\r\t\t\tEND;\r\t\t\tINC(i)\r\t\tEND;\r\t\ti := 0;\r\t\tWHILE i < n DO\r\t\t\tRestoreRoot(root, rgn.r[i].l - root.gx, rgn.r[i].t - root.gy, rgn.r[i].r - root.gx, rgn.r[i].b - root.gy);\r\t\t\tINC(i)\r\t\tEND\r\tEND ValidateRoot;\r\r\tPROCEDURE MarkBordersIn (f: Frame);\r\t\tVAR g: Frame; w, h: INTEGER;\r\tBEGIN\r\t\tg := f.down;\r\t\tWHILE g # NIL DO\r\t\t\tg.view.context.GetSize(w, h);\r\t\t\tMarkBorder(f, g.view, g.x, g.y, g.x + w, g.y + h);\r\t\t\tMarkBordersIn(g);\r\t\t\tg := g.next\r\t\tEND\r\tEND MarkBordersIn;\r\r\tPROCEDURE "
