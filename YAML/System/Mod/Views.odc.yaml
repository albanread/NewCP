                  - text: "* (f: Frame): BOOLEAN;\r\t\tVAR p: Ports.Port;\r\tBEGIN\r\t\tASSERT(f # NIL, 20); ASSERT(f.state = open, 21);\r\t\tp := f.rider.Base();\r\t\t"
