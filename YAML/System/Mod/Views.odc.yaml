                    attr: 1
                  - text: "\r\r\tPROCEDURE SetClip (f: Frame; l, t, r, b: INTEGER);\r\t\tVAR u: INTEGER;\r\tBEGIN\r\t\tASSERT(f.rider # NIL, 20); ASSERT(l <= r, 21); ASSERT(t <= b, 22);\r\t\tu := f.unit;\r\t\tf.rider.SetRect((l + f.gx) DIV u, (t + f.gy) DIV u, (r + f.gx) DIV u, (b + f.gy) DIV u);\r\t\tf.l := l; f.t := t; f.r := r; f.b := b\r\tEND SetClip;\r\r\tPROCEDURE Close (f: Frame);\r\tBEGIN\r\t\tf.Close;\r\t\tf.state := closed;\r\t\tf.up := NIL; f.down := NIL; f.next := NIL; f.view := NIL;\r\t\tf.ConnectTo(NIL)\r\tEND Close;\r\r\tPROCEDURE AdaptFrameTo (f: Frame; orgX, orgY: INTEGER);\r\t\tVAR g, p, q: Frame; port: Ports.Port;\r\t\t\tw, h,  pl, pt, pr, pb,  gl, gt, gr, gb,  gx, gy: INTEGER;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: "(* pre: environment (i.e. parent frame / port) has already been set up *)"
                    attr: 1
                  - text: "\r\t\tASSERT(f.view # NIL, 20); ASSERT(f.view.context # NIL, 21);\r\t\tf.x := orgX; f.y := orgY;\t"
                    attr: 0
                  - text: "(* set new origin *)"
                    attr: 1
                  - text: "\r\t\tg := f.up;\r\t\tIF g # NIL THEN\t"
                    attr: 0
                  - text: "(* parent frame is environment *)\r"
                    attr: 1
                  - text: "\t\t\tf.gx0 := g.gx + orgX; f.gy0 := g.gy + orgY;\r\t\t\tf.SetOffset(f.gx0 - f.sx, f.gy0 - f.sy);\r\t\t\tpl := g.gx + g.l; pt := g.gy + g.t; pr := g.gx + g.r; pb := g.gy + g.b\r\t\tELSE\t"
                    attr: 0
                  - text: "(* port is environment *)"
                    attr: 1
                  - text: "\r\t\t\tf.gx0 := orgX; f.gy0 := orgY;\r\t\t\tf.SetOffset(f.gx0 - f.sx, f.gy0 - f.sy);\r\t\t\tport := f.rider.Base();\r\t\t\tport.GetSize(w, h);\r\t\t\tpl := 0; pt := 0; pr := w * f.unit; pb := h * f.unit\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: "(* (pl, pt, pr, pb) is parent clipping rectangle, in global coordinates, and in units *)"
                    attr: 1
                  - text: "\r\t\tgx := f.gx; gy := f.gy; f.view.context.GetSize(w, h);\r\t\tgl := gx; gt := gy; gr := gx + w; gb := gy + h;\r\t\t"
                    attr: 0
                  - text: "(* (gl, gt, gr, gb) is desired clipping rectangle, in global coordinates, and in units *)\r"
                    attr: 1
                  - text: "\t\tIF gl < pl THEN gl := pl END;\r\t\tIF gt < pt THEN gt := pt END;\r\t\tIF gr > pr THEN gr := pr END;\r\t\tIF gb > pb THEN gb := pb END;\r\t\tIF (gl >= gr) OR (gt >= gb) THEN gr := gl; gb := gt END;\r\t\tSetClip(f, gl - gx + f.sx, gt - gy + f.sy, gr - gx + f.sx, gb - gy + f.sy);\r\t\t"
                    attr: 0
                  - text: "(* (f.l, f.t, f.r, f.b) is final clipping rectangle, in local coordinates, and in units *)"
                    attr: 1
                  - text: "\r\t\tg := f.down; f.down := NIL; p := NIL;\r\t\tWHILE g # NIL DO\t"
                    attr: 0
                  - text: "(* adapt child frames *)"
                    attr: 1
                  - text: "\r\t\t\tq := g.next; g.next := NIL;\r\t\t\tAdaptFrameTo(g, g.x, g.y);\r\t\t\tIF g.l = g.r THEN\t"
                    attr: 0
                  - text: "(* empty child frame: remove *)"
                    attr: 1
                  - text: "\r\t\t\t\tClose(g)\r\t\t\tELSE\t"
                    attr: 0
                  - text: "(* insert in new frame list *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF p = NIL THEN f.down := g ELSE p.next := g END;\r\t\t\t\tp := g\r\t\t\tEND;\r\t\t\tg := q\r\t\tEND\r\t\t"
                    attr: 0
                  - text: "(* post: frame is set; child frames are set, nonempty, and clipped to frame *)"
                    attr: 1
                  - text: "\r\tEND AdaptFrameTo;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SetRoot
                    attr: 3
                  - text: "* (root: RootFrame; view: View; front: BOOLEAN; flags: SET);\r\tBEGIN\r\t\tASSERT(root # NIL, 20); ASSERT(root.rider # NIL, 21);\r\t\tASSERT(view # NIL, 22); ASSERT(view.context # NIL, 23);\r\t\tASSERT(view.Domain() # NIL, 24);\r\t\tASSERT(root.state IN {new, open}, 25);\r\t\troot.view := view;\r\t\troot.front := front; root.mark := TRUE; root.flags := flags;\r\t\troot.state := open;\r\t\tIF root.update = NIL THEN NEW(root.update); root.update.n := 0 END\r\tEND SetRoot;\r\r\tPROCEDURE "
                    attr: 0
