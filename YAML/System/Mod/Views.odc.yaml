                  - text: "* (v: View; m: Models.Model): View;\r\t\tVAR w, a: View; op: INTEGER; b: Alien; fm: Models.Model;\r\tBEGIN\r\t\tASSERT(v # NIL, 20);\r\t\tfm := v.ThisModel(); ASSERT(fm # NIL, 21);\r\t\tASSERT(m # NIL, 22);\r\t\tASSERT(Services.SameType(m, fm), 23);\r\t\tIF ~(handler IN v.bad) THEN\r\t\t\ta := actView; op := actOp; actView := v; actOp := handler;\r\t\t\tcopyModel := m;\r\t\t\tw := Stores.CopyOf(v)(View);\r\t\t\tactView := a; actOp := op\r\t\tELSE\r\t\t\tNEW(b); w := b; w.bad := {handler..externalize}\r\t\tEND;\r\t\t"
