                  - text: "(* Rect, Region *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE Union (VAR u: Rect; r: Rect);\r\tBEGIN\r\t\tIF r.v # u.v THEN u.v := NIL END;\r\t\tIF r.rebuild THEN u.rebuild := TRUE END;\r\t\tIF r.l < u.l THEN u.l := r.l END;\r\t\tIF r.t < u.t THEN u.t := r.t END;\r\t\tIF r.r > u.r THEN u.r := r.r END;\r\t\tIF r.b > u.b THEN u.b := r.b END\r\tEND Union;\r\r\tPROCEDURE Add (rgn: Region; v: View; rebuild: BOOLEAN; gl, gt, gr, gb: INTEGER);\r"
                    attr: 0
                  - text: "\t\t"
                    attr: 5
                  - text: "(* does not perfectly maintain invariant of non-overlapping approx rects ... *)"
                    attr: 1
                  - text: "\r\t\tVAR q: Rect; i, j, n: INTEGER; x: ARRAY maxN OF BOOLEAN;\r\tBEGIN\r\t\tq.v := v; q.rebuild := rebuild; q.l := gl; q.t := gt; q.r := gr; q.b := gb;\r\t\tn := rgn.n + 1;\r\t\ti := 0;\r\t\tWHILE i < rgn.n DO\r\t\t\tx[i] := (gl < rgn.r[i].r) & (rgn.r[i].l < gr) & (gt < rgn.r[i].b) & (rgn.r[i].t < gb);\r\t\t\tIF x[i] THEN Union(q, rgn.r[i]); DEC(n) END;\r\t\t\tINC(i)\r\t\tEND;\r\t\tIF n > maxN THEN\r\t\t\t"
                    attr: 0
                  - text: "(* n = maxN + 1 -> merge q with arbitrarily picked rect and Add *)"
                    attr: 1
                  - text: "\r\t\t\tUnion(q, rgn.r[maxN - 1]); Add(rgn, v, q.rebuild, q.l, q.t, q.r, q.b)\r\t\tELSE\r\t\t\ti := 0; WHILE (i < rgn.n) & ~x[i] DO INC(i) END;\r\t\t\trgn.r[i] := q; INC(i); WHILE (i < rgn.n) & ~x[i] DO INC(i) END;\r\t\t\tj := i; WHILE (i < rgn.n) & x[i] DO INC(i) END;\r\t\t\tWHILE i < rgn.n DO\t"
                    attr: 0
                  - text: "(* ~x[i] *)"
                    attr: 1
                  - text: "\r\t\t\t\trgn.r[j] := rgn.r[i]; INC(j); INC(i);\r\t\t\t\tWHILE (i < rgn.n) & x[i] DO INC(i) END\r\t\t\tEND;\r\t\t\trgn.n := n\r\t\tEND\r\tEND Add;\r\r\tPROCEDURE AddRect (root: RootFrame; f: Frame; l, t, r, b: INTEGER; rebuild: BOOLEAN);\r\t\tVAR rl, rt, rr, rb: INTEGER; i: INTEGER;\r\tBEGIN\r\t\tINC(l, f.gx); INC(t, f.gy); INC(r, f.gx); INC(b, f.gy);\r\t\trl := root.l + root.gx; rt := root.t + root.gy; rr := root.r + root.gx; rb := root.b + root.gy;\r\t\tIF l < rl THEN l := rl END;\r\t\tIF t < rt THEN t := rt END;\r\t\tIF r > rr THEN r := rr END;\r\t\tIF b > rb THEN b := rb END;\r\t\tIF (l < r) & (t < b) THEN\r\t\t\tAdd(root.update, f.view, rebuild, l, t, r, b);\r\t\t\ti := 0;\r\t\t\tWHILE (i < root.update.n)\r\t\t\t\t& (~root.update.r[i].rebuild OR (root.update.r[i].v # NIL)) DO INC(i) END;\r\t\t\tIF i < root.update.n THEN Add(root.update, root.view, TRUE, rl, rt, rr, rb) END\r\t\tEND\r\tEND AddRect;\r\r\r\t"
