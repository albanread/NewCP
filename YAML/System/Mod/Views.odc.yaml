                    attr: 0
                  - text: InstallFrame
                    attr: 3
                  - text: "* (host: Frame; view: View; x, y, level: INTEGER; focus: BOOLEAN);\r\t\tVAR e, f, g: Frame; w, h,  l, t, r, b: INTEGER; m: Models.Model; std: StdFrame;\r\t\t\tmsg: UpdateCachesMsg; a: View; op: INTEGER;\r\tBEGIN\r\t\tASSERT(host # NIL, 20); ASSERT(host.state = open, 21);\r\t\tASSERT(view # NIL, 22); ASSERT(view.context # NIL, 23);\r\t\tASSERT(view.Domain() # NIL, 24);\r\t\te := NIL; g := host.down; WHILE (g # NIL) & (g.view # view) DO e := g; g := g.next END;\r\t\tIF g = NIL THEN\t"
                    attr: 0
                  - text: "(* frame for "
                    attr: 1
                  - text: view
                    attr: 0
                  - text: " not yet in child frame list *)"
                    attr: 1
                  - text: "\r\t\t\tview.context.GetSize(w, h);\r\t\t\tIF w > MAX(INTEGER) DIV 2 THEN w := MAX(INTEGER) DIV 2 END;\r\t\t\tIF h > MAX(INTEGER) DIV 2 THEN h := MAX(INTEGER) DIV 2 END;\r\t\t\tl := x; t := y; r := x + w; b := y + h;\r\t\t\t"
                    attr: 0
                  - text: "(* (l, t, r, b) is child frame rectangle, in local coordinates, and in units *)"
                    attr: 1
                  - text: "\r\t\t\tIF (l < host.r) & (t < host.b) & (r > host.l) & (b > host.t) THEN\t"
                    attr: 0
                  - text: "(* visible *)"
                    attr: 1
                  - text: "\r\t\t\t\tg := NIL; view.GetNewFrame(g);\r\t\t\t\tIF g = NIL THEN NEW(std); g := std END;\r\t\t\t\tASSERT(~(g IS RootFrame), 100);\r\t\t\t\te := NIL; f := host.down; WHILE (f # NIL) & (f.level <= level) DO e := f; f := f.next END;\r\t\t\t\tIF e = NIL THEN g.next := host.down; host.down := g ELSE g.next := e.next; e.next := g END;\r\t\t\t\tg.down := NIL; g.up := host; g.level := level;\r\t\t\t\tg.view := view;\r\t\t\t\tg.ConnectTo(host.rider.Base());\r\t\t\t\tg.state := open;\r\t\t\t\tAdaptFrameTo(g, x, y);\r\t\t\t\tIF ~(handler IN view.bad) THEN\r\t\t\t\t\ta := actView; op := actOp; actView := view; actOp := handler;\r\t\t\t\t\tview.HandleViewMsg(g, msg);\r\t\t\t\t\tactView := a; actOp := op\r\t\t\t\tEND;\r\t\t\t\tm := view.ThisModel();\r\t\t\t\tIF m # NIL THEN view.era := Models.Era(m) END;\r\t\t\tEND\r\t\tELSE\r\t\t\tIF g.level # level THEN\t"
                    attr: 0
                  - text: "(* adapt to modified z-order *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF e = NIL THEN host.down := g.next ELSE e.next := g.next END;\r\t\t\t\te := NIL; f := host.down; WHILE (f # NIL) & (f.level <= level) DO e := f; f := f.next END;\r\t\t\t\tIF e = NIL THEN g.next := host.down; host.down := g ELSE g.next := e.next; e.next := g END;\r\t\t\t\tg.level := level\r\t\t\tEND;\r\t\t\tAdaptFrameTo(g, x, y)\t"
                    attr: 0
                  - text: "(* may close g, leaving g.state = closed *)"
                    attr: 1
                  - text: "\r"
                    attr: 0
                  - text: "\t\t\t"
                    attr: 5
                  - text: "(* possibly optimize: don't call Adapt if x=g.x, y=g.y, \"host.era=g.era\" *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\t\tIF (g # NIL) & (g.state = open) THEN\r\t\t\tIF focus THEN\r\t\t\t\tg.front := host.front; g.mark := host.mark\r\t\t\tELSE\r\t\t\t\tg.front := FALSE; g.mark := FALSE\r\t\t\tEND\r\t\tEND\r\tEND InstallFrame;\r\r\tPROCEDURE RemoveAll (f: Frame);\r\t\tVAR g, p: Frame;\r\tBEGIN\r\t\tg := f.down; WHILE g # NIL DO p := g.next; RemoveAll(g); Close(g); g := p END;\r\t\tf.down := NIL\r\tEND RemoveAll;\r\r\tPROCEDURE "
                    attr: 0
                  - text: RemoveFrame
                    attr: 3
                  - text: "* (host, f: Frame);\r\t\tVAR g, h: Frame;\r\tBEGIN\r\t\tASSERT(host # NIL, 20); ASSERT(host.state = open, 21);\r\t\tASSERT(f # NIL, 22); ASSERT(f.up = host, 23);\r\t\tg := host.down; h := NIL;\r\t\tWHILE (g # NIL) & (g # f) DO h := g; g := g.next END;\r\t\tASSERT(g = f, 24);\r\t\tIF h = NIL THEN host.down := f.next ELSE h.next := f.next END;\r\t\tRemoveAll(f); Close(f)\r\tEND RemoveFrame;\r\r\tPROCEDURE "
                    attr: 0
                  - text: RemoveFrames
                    attr: 3
                  - text: "* (host: Frame; l, t, r, b: INTEGER);\r\t\tVAR f, g: Frame; gl, gt, gr, gb: INTEGER;\r\tBEGIN\r\t\tASSERT(host # NIL, 20); ASSERT(host.state = open, 21);\r\t\tIF l < host.l THEN l := host.l END;\r\t\tIF t < host.t THEN t := host.t END;\r\t\tIF r > host.r THEN r := host.r END;\r\t\tIF b > host.b THEN b := host.b END;\r\t\tIF (l < r) & (t < b) THEN\r\t\t\tgl := l + host.gx; gt := t + host.gy; gr := r + host.gx; gb := b + host.gy;\r\t\t\tf := host.down;\r\t\t\tWHILE f # NIL DO\r\t\t\t\tg := f; f := f.next;\r\t\t\t\tIF (gl < g.r + g.gx) & (g.l + g.gx < gr) & (gt < g.b + g.gy) & (g.t + g.gy < gb) THEN\r\t\t\t\t\tRemoveFrame(host, g)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND RemoveFrames;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ThisFrame
                    attr: 3
                  - text: "* (host: Frame; view: View): Frame;\r\t\tVAR g: Frame;\r\tBEGIN\r\t\tASSERT(host # NIL, 20); ASSERT(host.state = open, 21);\r\t\tg := host.down; WHILE (g # NIL) & (g.view # view) DO g := g.next END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 5
                  - text: " g\r\tEND ThisFrame;\r\r\tPROCEDURE "
                    attr: 0
                  - text: FrameAt
                    attr: 3
                  - text: "* (host: Frame; x, y: INTEGER): Frame;\r\t"
                    attr: 0
                  - text: "(** return frontmost sub-frame of host that contains (x, y) **)"
                    attr: 5
                  - text: "\r\t\tVAR g, h: Frame;\r\tBEGIN\r\t\tASSERT(host # NIL, 20); ASSERT(host.state = open, 21);\r\t\tg := host.down; h := NIL; INC(x, host.gx); INC(y, host.gy);\r\t\tWHILE g # NIL DO\r\t\t\tIF (g.gx + g.l <= x) & (x < g.gx + g.r) & (g.gy + g.t <= y) & (y < g.gy + g.b) THEN\r\t\t\t\th := g\r\t\t\tEND;\r\t\t\tg := g.next\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 5
                  - text: " h\r\tEND FrameAt;\r\r\tPROCEDURE ShiftFrames (f: Frame; dx, dy: INTEGER);\r\t\tVAR g, h: Frame;\r\tBEGIN\r\t\tg := f.down;\r\t\tWHILE g # NIL DO\r\t\t\th := g; g := g.next;\r\t\t\tAdaptFrameTo(h, h.x + dx, h.y + dy);\r\t\t\tIF h.l = h.r THEN RemoveFrame(f, h) END\r\t\tEND\r\tEND ShiftFrames;\r\r\tPROCEDURE UpdateExposedArea (f: Frame; dx, dy: INTEGER);\r\t\tVAR root: RootFrame;\r\tBEGIN\r\t\troot := RootOf(f);\r\t\tIF dy > 0 THEN\r\t\t\tAddRect(root, f, f.l, f.t, f.r, f.t + dy, keepFrames);\r\t\t\tIF dx > 0 THEN\r\t\t\t\tAddRect(root, f, f.l, f.t + dy, f.l + dx, f.b, keepFrames)\r\t\t\tELSE\r\t\t\t\tAddRect(root, f, f.r + dx, f.t + dy, f.r, f.b, keepFrames)\r\t\t\tEND\r\t\tELSE\r\t\t\tAddRect(root, f, f.l, f.b + dy, f.r, f.b, keepFrames);\r\t\t\tIF dx > 0 THEN\r\t\t\t\tAddRect(root, f, f.l, f.t, f.l + dx, f.b + dy, keepFrames)\r\t\t\tELSE\r\t\t\t\tAddRect(root, f, f.r + dx, f.t, f.r, f.b + dy, keepFrames)\r\t\t\tEND\r\t\tEND\r\tEND UpdateExposedArea;\r\r\tPROCEDURE ScrollFrame (f: Frame; dx, dy: INTEGER);\r\t\tVAR g: Frame; u, dx0, dy0: INTEGER; bitmapScrolling: BOOLEAN; msg: ScrollClassMsg;\r\tBEGIN\r\t\tg := f.up;\r\t\tbitmapScrolling := TRUE;\r\t\tIF (g # NIL) THEN\r\t\t\tWHILE bitmapScrolling & (g.up # NIL) DO\r\t\t\t\tmsg.allowBitmapScrolling := FALSE; g.view.HandleViewMsg(g, msg);\r\t\t\t\tbitmapScrolling := bitmapScrolling & msg.allowBitmapScrolling;\r\t\t\t\tg  := g.up\r\t\t\tEND\r\t\tEND;\r\t\tIF bitmapScrolling THEN\r\t\t\tu := f.unit; dx0 := dx; dy0 := dy;\r\t\t\tINC(dx, f.sx); INC(dy, f.sy); DEC(f.l, f.sx); DEC(f.t, f.sy); DEC(f.r, f.sx); DEC(f.b, f.sy);\r\t\t\tf.sx := dx MOD u; f.sy := dy MOD u;\r\t\t\tDEC(dx, f.sx); DEC(dy, f.sy); INC(f.l, f.sx); INC(f.t, f.sy); INC(f.r, f.sx); INC(f.b, f.sy);\r\t\t\tf.SetOffset(f.gx0 - f.sx, f.gy0 - f.sy);\r\t\t\tShiftFrames(f, dx0, dy0);\r\t\t\tf.Scroll(dx, dy);\r\t\t\tUpdateExposedArea(f, dx, dy)\r\t\tELSE AddRect(RootOf(f), f, f.l, f.t, f.r, f.b, rebuildFrames)\r\t\tEND\r\tEND ScrollFrame;\r\r\tPROCEDURE "
                    attr: 0
                  - text: BroadcastModelMsg
                    attr: 3
                  - text: "* (f: Frame; VAR msg: Models.Message);\r\t\tVAR v, a: View; send: BOOLEAN; op: INTEGER;\r\tBEGIN\r\t\tASSERT(f # NIL, 20); ASSERT(f.state = open, 21);\r\t\tv := f.view;\r\t\tIF ~(handler IN v.bad) THEN\r\t\t\ta := actView; op := actOp; actView := v; actOp := handler;\r\t\t\tIF msg.model # NIL THEN\r\t\t\t\tIF (msg.model = v.ThisModel()) & (msg.era > v.era) THEN\r\t\t\t\t\tsend := (msg.era - v.era = 1);\r\t\t\t\t\tv.era := msg.era;\r\t\t\t\t\tIF ~send THEN\r\t\t\t\t\t\tLog.synch := FALSE;\r\t\t\t\t\t\tHALT(100)\r\t\t\t\t\tEND\r\t\t\t\tELSE send := FALSE\r\t\t\t\tEND\r\t\t\tELSE send := TRUE\r\t\t\tEND;\r\t\t\tIF send THEN\r\t\t\t\tWITH msg: Models.NeutralizeMsg DO\r\t\t\t\t\tv.Neutralize\r\t\t\t\tELSE\r\t\t\t\t\t v.HandleModelMsg(msg)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tactView := a; actOp := op\r\t\tEND;\r\t\tf := f.down; WHILE f # NIL DO BroadcastModelMsg(f, msg); f := f.next END\r\tEND BroadcastModelMsg;\r\r\tPROCEDURE HandleUpdateMsg (f: Frame; VAR msg: UpdateMsg);\r\t\tVAR root: RootFrame; g: Frame; l, t, r, b,  dx, dy: INTEGER;\r\tBEGIN\r\t\troot := RootOf(f);\r\t\tIF msg.scroll THEN\r\t\t\tIF root.update.n = 0 THEN\r\t\t\t\tScrollFrame(f, msg.dx, msg.dy)\r\t\t\tELSE\r\t\t\t\tAddRect(root, f, f.l, f.t, f.r, f.b, msg.rebuild)\r\t\t\tEND\r\t\tELSE\r\t\t\tIF msg.all THEN\r\t\t\t\tIF f # root THEN g := f.up ELSE g := root END;\r\t\t\t\tdx := f.gx - g.gx; dy := f.gy - g.gy;\r\t\t\t\tAddRect(root, g, f.l + dx, f.t + dy, f.r + dx, f.b + dy, msg.rebuild)\r\t\t\tELSE\r\t\t\t\tl := msg.l; t := msg.t; r := msg.r; b := msg.b;\r\t\t\t\tIF l < f.l THEN l := f.l END;\r\t\t\t\tIF t < f.t THEN t := f.t END;\r\t\t\t\tIF r > f.r THEN r := f.r END;\r\t\t\t\tIF b > f.b THEN b := f.b END;\r\t\t\t\tAddRect(root, f, l, t, r, b, msg.rebuild)\r\t\t\tEND\r\t\tEND\r\tEND HandleUpdateMsg;\r\r\tPROCEDURE "
                    attr: 0
                  - text: BroadcastViewMsg
                    attr: 3
                  - text: "* (f: Frame; VAR msg: Message);\r\t\tVAR v, a: View; op: INTEGER;\r\tBEGIN\r\t\tASSERT(f # NIL, 20); ASSERT(f.state = open, 21);\r\t\tv := f.view;\r\t\tIF (msg.view = v) OR (msg.view = NIL) THEN\r\t\t\tWITH msg: UpdateMsg DO\r\t\t\t\tHandleUpdateMsg(f, msg)\r\t\t\tELSE\r\t\t\t\tIF ~(handler IN v.bad) THEN\r\t\t\t\t\ta := actView; op := actOp; actView := v; actOp := handler;\r\t\t\t\t\tv.HandleViewMsg(f, msg);\r\t\t\t\t\tactView := a; actOp := op\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND;\r\t\tIF msg.view # v THEN\r\t\t\tf := f.down; WHILE f # NIL DO BroadcastViewMsg(f, msg); f := f.next END\r\t\tEND\r\tEND BroadcastViewMsg;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ForwardCtrlMsg
                    attr: 3
                  - text: "* (f: Frame; VAR msg: CtrlMessage);\r\t\tCONST pre = 0; translate = 1; backoff = 2; final = 3;\r\t\tVAR v, focus, a: View; g, h: Frame; op: INTEGER; req: BOOLEAN;\r\tBEGIN\r\t\tASSERT(f # NIL, 20); ASSERT(f.state = open, 21);\r\t\tv := f.view;\r\t\tfocus := NIL; g := f.up; req := FALSE;\r\t\tHandleCtrlMsg(pre, f, g, msg, f.mark, f.front, req);\r\t\tIF ~(handler IN v.bad) THEN\r\t\t\ta := actView; op := actOp; actView := v; actOp := handler;\r\t\t\tv.HandleCtrlMsg(f, msg, focus);\r\t\t\tactView := a; actOp := op\r\t\tEND;\r\t\tIF focus # NIL THEN\t"
                    attr: 0
                  - text: "(* propagate msg to another view *)"
                    attr: 1
                  - text: "\r\t\t\tIF (f.focus # NIL) & (f.focus.view = focus) THEN\t"
                    attr: 0
                  - text: "(* cache hit *)"
                    attr: 1
                  - text: "\r\t\t\t\th := f.focus\r\t\t\tELSE\t"
                    attr: 0
                  - text: "(* cache miss *)"
                    attr: 1
                  - text: "\r\t\t\t\th := f.down; WHILE (h # NIL) & (h.view # focus) DO h := h.next END\r\t\t\tEND;\r\t\t\tIF h # NIL THEN\r\t\t\t\tHandleCtrlMsg(translate, f, h, msg, f.mark, f.front, req);\r\t\t\t\tf.focus := h; ForwardCtrlMsg(h, msg);\r\t\t\t\tHandleCtrlMsg(backoff, f, g, msg, f.mark, f.front, req)\r\t\t\tEND\r\t\tELSE\r\t\t\tHandleCtrlMsg(final, f, g, msg, f.mark, f.front, req)\r\t\tEND;\r\t\tIF req & (g # NIL) THEN g.view.ConsiderFocusRequestBy(f.view) END\r\tEND ForwardCtrlMsg;\r\r\r\tPROCEDURE RestoreFrame (f: Frame; l, t, r, b: INTEGER);\r\t\tVAR rd: Ports.Rider; g: Frame; v, a: View; op: INTEGER;\r\t\t\tu, w, h,  cl, ct, cr, cb,  dx, dy: INTEGER; col: Ports.Color;\r\tBEGIN\r\t\tIF l < f.l THEN l := f.l END;\r\t\tIF t < f.t THEN t := f.t END;\r\t\tIF r > f.r THEN r := f.r END;\r\t\tIF b > f.b THEN b := f.b END;\r\t\tIF (l < r) & (t < b) THEN\t"
                    attr: 0
                  - text: "(* non-empty rectangle to be restored *)"
                    attr: 1
                  - text: "\r\t\t\tv := f.view; rd := f.rider; u := f.unit;\r\t\t\trd.GetRect(cl, ct, cr, cb);\t"
                    attr: 0
                  - text: "(* save clip rectangle *)"
                    attr: 1
                  - text: "\r\t\t\trd.SetRect((f.gx + l) DIV u, (f.gy + t) DIV u, (f.gx + r) DIV u, (f.gy + b) DIV u);\r\t\t\tIF ~(restore IN v.bad) THEN\r\t\t\t\ta := actView; op := actOp; actView := v; actOp := restore;\r\t\t\t\tcol := transparent; v.GetBackground(col);\r\t\t\t\tIF col # transparent THEN f.DrawRect(l, t, r, b, Ports.fill, col) END;\r\t\t\t\tv.Restore(f, l, t, r, b);\r\t\t\t\tg := f.down;\r\t\t\t\tWHILE g # NIL DO\t"
                    attr: 0
                  - text: "(* loop over all subframes to handle overlaps *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tdx := f.gx - g.gx; dy := f.gy - g.gy;\r\t\t\t\t\tRestoreFrame(g, l + dx, t + dy, r + dx, b + dy);\r\t\t\t\t\tg := g.next\r\t\t\t\tEND;\r\t\t\t\tv.RestoreMarks(f, l, t, r, b);\r\t\t\t\tactView := a; actOp := op\r\t\t\tEND;\r\t\t\tIF v.bad # {} THEN\r\t\t\t\tIF externalize IN v.bad THEN\r\t\t\t\t\tu := f.dot; v.context.GetSize(w, h);\r\t\t\t\t\tf.DrawLine(0, 0, w - u, h - u, u, Ports.grey75);\r\t\t\t\t\tf.DrawLine(w - u, 0, 0, h - u, u, Ports.grey75)\r\t\t\t\tEND;\r\t\t\t\tf.MarkRect(l, t, r, b, Ports.fill, Ports.dim25, Ports.show)\r\t\t\tEND;\r\t\t\trd.SetRect(cl, ct, cr, cb)\t"
                    attr: 0
                  - text: "(* restore current clip rectangle *)"
                    attr: 1
                  - text: "\r\t\tEND\r\tEND RestoreFrame;\r\r\tPROCEDURE "
                    attr: 0
                  - text: RestoreRoot
                    attr: 3
                  - text: "* (root: RootFrame; l, t, r, b: INTEGER);\r\t\tVAR port: Ports.Port; rd: Ports.Rider;\r\t\t\tu,  gl, gt, gr, gb: INTEGER; col: Ports.Color;\r\tBEGIN\r\t\tASSERT(root # NIL, 20); ASSERT(root.state = open, 21);\r\t\tASSERT(root.update.n = 0, 22);\r\t\tIF l < root.l THEN l := root.l END;\r\t\tIF t < root.t THEN t := root.t END;\r\t\tIF r > root.r THEN r := root.r END;\r\t\tIF b > root.b THEN b := root.b END;\r\t\tIF (l < r) & (t < b) THEN\r\t\t\tu := root.unit;\r\t\t\tgl := l + root.gx; gt := t + root.gy; gr := r + root.gx; gb := b + root.gy;\r\t\t\trd := root.rider; port := rd.Base();\r\t\t\tactFrame := root;\r\t\t\tIF ~IsPrinterFrame(root) THEN port.OpenBuffer(gl DIV u, gt DIV u, gr DIV u, gb DIV u) END;\r\t\t\tcol := transparent; root.view.GetBackground(col);\r\t\t\tASSERT(col # transparent, 100);\r\t\t\tRestoreFrame(root, l, t, r, b);\r\t\t\tIF ~IsPrinterFrame(root) THEN port.CloseBuffer END;\r\t\t\tactFrame := NIL\r\t\tEND\r\tEND RestoreRoot;\r\r\tPROCEDURE ThisCand (f: Frame; v: View): Frame;\r\t"
                    attr: 0
                  - text: "(* find frame g with g.view = v *)"
                    attr: 1
                  - text: "\r\t\tVAR g: Frame;\r\tBEGIN\r\t\tWHILE (f # NIL) & (f.view # v) DO\r\t\t\tg := ThisCand(f.down, v);\r\t\t\tIF g # NIL THEN f := g ELSE f := f.next END\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 5
                  - text: " f\r\tEND ThisCand;\r\r\tPROCEDURE "
                    attr: 0
