                  - text: "* (v: View; shallow: BOOLEAN): View;\r\t\tVAR w, a: View; op: INTEGER; b: Alien;\r\tBEGIN\r\t\tASSERT(v # NIL, 20);\r\t\tIF ~(handler IN v.bad) THEN\r\t\t\ta := actView; op := actOp; actView := NIL; actOp := handler;\r\t\t\tIF shallow THEN copyModel := v.ThisModel() END;\r\t\t\tactView := v;\r\t\t\tw := Stores.CopyOf(v)(View);\r\t\t\tactView := a; actOp := op\r\t\tELSE\r\t\t\tNEW(b); w := b; w.bad := {handler..externalize}\r\t\tEND;\r\t\tIF shallow THEN Stores.Join(w, v) END;\r\t\t"
