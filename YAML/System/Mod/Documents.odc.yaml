                  - text: " c.model\r\tEND ThisModel;\r\r\tPROCEDURE (c: StdContext) GetSize (OUT w, h: INTEGER);\r\t\tVAR m: Model; dc: Models.Context; l, t, r, b: INTEGER;\r\tBEGIN\r\t\tm := c.model;\r\t\tm.doc.PollRect(l, t, r, b); w := r - l; h := b - t;\r\t\tdc := m.doc.context;\r\t\tIF dc # NIL THEN\r\t\t\tWITH dc: PrinterContext DO\r\t\t\t\tw := MIN(w, dc.r - dc.l); h := MIN(h, dc.b - dc.t)\r\t\t\tELSE\r\t\t\tEND\r\t\tEND;\r"
