                  - text: RETURN
                    attr: 3
                  - text: " v IS StdDocument\r\tEND NativeView;\r\r\tPROCEDURE (c: Controller) NativeCursorAt (f: Views.Frame; x, y: INTEGER): INTEGER;\r\tBEGIN\r\t\t"
