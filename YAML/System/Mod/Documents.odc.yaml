                  - text: " END;\r\t\trd.ReadVersion(minVersion, maxStdDocVersion, thisVersion);\r\t\tIF rd.cancelled THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\trd.ReadInt(d.pw); rd.ReadInt(d.ph);\r\t\trd.ReadInt(d.pl); rd.ReadInt(d.pt); rd.ReadInt(d.pr); rd.ReadInt(d.pb);\r\t\trd.ReadBool(d.decorate);\r\t\t"
                    attr: 0
                  - text: "(* change infinite height to \"fit to window\" *)\r\t\t"
                    attr: 1
                  - text: "c := d.ThisController();\r\t\tIF (c # NIL) & (d.model.b >= 29000 * Ports.mm) & (c.opts * {winHeight, pageHeight} = {}) THEN\r\t\t\tc.SetOpts(c.opts + {winHeight})\r\t\tEND;\r\t\tc.SetOpts(c.opts - {Containers.noSelection});\r\t\td.x := 0; d.y := 0;\r\t\tStores.InitDomain(d)\r\tEND Internalize2;\r\r\tPROCEDURE (d: StdDocument) Externalize2 (VAR wr: Stores.Writer);\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: "ASSERT(d.original = NIL, 100);"
                    attr: 3
                  - text: "\r\t\td.Externalize2^(wr);\r\t\twr.WriteVersion(maxStdDocVersion);\r\t\twr.WriteInt(d.pw); wr.WriteInt(d.ph);\r\t\twr.WriteInt(d.pl); wr.WriteInt(d.pt); wr.WriteInt(d.pr); wr.WriteInt(d.pb);\r\t\twr.WriteBool(d.decorate)\r\tEND Externalize2;\r\r\tPROCEDURE (d: StdDocument) CopyFromModelView2 (source: Views.View; model: Models.Model);\r\tBEGIN\r\t\tWITH source: StdDocument DO\r\t\t\td.pw := source.pw; d.ph := source.ph;\r\t\t\td.pl := source.pl; d.pt := source.pt; d.pr := source.pr; d.pb := source.pb;\r\t\t\td.decorate := source.decorate\r\t\tEND\r\tEND CopyFromModelView2;\r\t\r\tPROCEDURE (d: StdDocument) AcceptableModel (m: Containers.Model): BOOLEAN;\r\tBEGIN\r\t\tRETURN m IS Model\r\tEND AcceptableModel;\r\t\r\tPROCEDURE (d: StdDocument) InitModel2 (m: Containers.Model);\r\tBEGIN\r\t\tASSERT((d.model = NIL) OR (d.model = m), 20);\r\t\tASSERT(m IS Model, 23);\r\t\tWITH m: Model DO d.model := m; m.doc := d END\r\tEND InitModel2;\r\t\r\tPROCEDURE (d: StdDocument) PollRect (VAR l, t, r, b: INTEGER);\r\t\tVAR c: Containers.Controller; doc: StdDocument; ww, wh, pw, ph: INTEGER;\r\tBEGIN\r\t\tIF d.original = NIL THEN doc := d ELSE doc := d.original END;\r\t\tl := d.model.l; t := d.model.t;\r\t\tpw := doc.pr - doc.pl; ph := doc.pb - doc.pt;\r\t\tIF d.context = NIL THEN ww := 0; wh := 0\r\t\tELSIF d.context IS PrinterContext THEN ww := pw; wh := ph\r\t\tELSE d.context.GetSize(ww, wh); DEC(ww, 2 * l); DEC(wh, 2 * t)\r\t\tEND;\r\t\tc := d.ThisController();\r\t\tIF pageWidth IN c.opts THEN r := l + pw\r\t\tELSIF winWidth IN c.opts THEN\r\t\t\tIF ww > 0 THEN r := l + ww ELSE r := d.model.r END\r\t\tELSE r := l + doc.model.r - doc.model.l\r\t\tEND;\r\t\tIF pageHeight IN c.opts THEN b := t + ph\r\t\tELSIF winHeight IN c.opts THEN \r\t\t\tIF wh > 0 THEN b := t + wh ELSE b := d.model.b END\r\t\tELSE b := t + doc.model.b - doc.model.t\r\t\tEND;\r"
                    attr: 0
                  - text: "\t\t"
                    attr: 3
                  - text: "ASSERT(r > l, 60); ASSERT(b > t, 61)\r\tEND PollRect;\r\r\tPROCEDURE (d: StdDocument) PollPage (VAR w, h, l, t, r, b: INTEGER; VAR decorate: BOOLEAN);\r\t\tVAR doc: StdDocument;\r\tBEGIN\r\t\tIF d.original = NIL THEN doc := d ELSE doc := d.original END;\r\t\tw := doc.pw; h := doc.ph;\r\t\tl := doc.pl; t := doc.pt; r := doc.pr; b := doc.pb;\r\t\tdecorate := doc.decorate\r\tEND PollPage;\r\r\tPROCEDURE (d: StdDocument) DocCopyOf (v: Views.View): Document;\r\t\tVAR c0, c1: Containers.Controller; u: Views.View; new: Document; w, h: INTEGER;\r\tBEGIN\r\t\tASSERT(v # NIL, 20);\r\t\tASSERT(~(v IS Document), 21);\r\t\tASSERT(d.Domain() = v.Domain(), 22);\r\t\tASSERT(d.Domain() # NIL, 23);\r\t\tViews.BeginModification(3, v);  \r\t\tu := Views.CopyOf(v, Views.shallow);\r\t\tv.context.GetSize(w, h);\r\t\tnew := dir.New(u, w, h);\r\t\tWITH new: StdDocument DO\r\t\t\tIF d.original # NIL THEN new.original := d.original ELSE new.original := d END\r\t\tEND;\r\t\tc0 := d.ThisController();\r\t\tc1 := new.ThisController();\r\t\tc1.SetOpts(c0.opts);\r\t\tViews.EndModification(3, v);\r\t\tRETURN new\r\tEND DocCopyOf;\r\r\tPROCEDURE (d: StdDocument) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR c: Containers.Controller; m: Model; con: Models.Context; s: Views.View;\r\tBEGIN\r\t\tm := d.model; con := d.context;\r\t\tWITH con: PrinterContext DO\r\t\t\tIF con.param.page.alternate & ~ODD(con.param.page.first + Printing.Current()) THEN\r\t\t\t\tViews.InstallFrame(f, m.view, con.pw - con.r, con.t, 0, FALSE)\r\t\t\tELSE\r\t\t\t\tViews.InstallFrame(f, m.view, con.l, con.t, 0, FALSE)\r\t\t\tEND\r\t\tELSE\r\t\t\tc := d.ThisController(); s := c.Singleton();\r\t\t\tViews.InstallFrame(f, m.view, m.l + d.x, m.t + d.y, 0, s = NIL)\r\t\tEND\r\tEND Restore;\r\r\tPROCEDURE (d: StdDocument) GetRect (f: Views.Frame; view: Views.View; OUT l, t, r, b: INTEGER);\r\t\tVAR l0, t0, r0, b0: INTEGER;\r\tBEGIN\r\t\td.PollRect(l0, t0, r0, b0);\r\t\tl := l0 + d.x; t := t0 + d.y; r := r0 + d.x; b := b0 + d.y\r\tEND GetRect;\r\r\tPROCEDURE (d: StdDocument) SetView (view: Views.View; w, h: INTEGER);\r\t\tCONST\r\t\t\twA4 = 210 * mm; hA4 = 296 * mm;\t"
                    attr: 0
                  - text: "(* A4 default paper size *)"
                    attr: 1
                  - text: "\r\t\t\tlm = 20 * mm; tm = 20 * mm; rm = 20 * mm; bm = 20 * mm;\r\t\tVAR m: Model; c: StdContext; prt: Printers.Printer;\r\t\t\tctrl: Containers.Controller; opts: SET; rp: Properties.ResizePref;\r\t\t\tu, minW, maxW, minH, maxH,  defW, defH,  dw, dh,  pw, ph,\r\t\t\tpageW, pageH,  paperW, paperH,  leftM, topM, rightM, botM: INTEGER;\r\t\t\tl, t, r, b: INTEGER; port: Ports.Port;\r\tBEGIN\r\t\tASSERT(view # NIL, 20); ASSERT(~(view IS Document), 21);\r\t\tASSERT(d.original = NIL, 100);\r\t\tm := d.model;\r\t\tNEW(c); c.model := m; view.InitContext(c);\r\t\tIF d.context # NIL THEN Stores.Join(d, view) END;\r\t\tIF Printers.dir # NIL THEN prt := Printers.dir.Current() ELSE prt := NIL END;\r\t\tIF prt # NIL THEN\r\t\t\tprt.SetOrientation(FALSE);\r\t\t\tport := prt.ThisPort(); prt.GetRect(l, t, r, b);\r\t\t\tport.GetSize(pw, ph); u := port.unit;\r\t\t\tpaperW := r - l; paperH := b - t;\r\t\t\tpageW := paperW - lm - rm; pageH := paperH - tm - bm;\r\t\t\tleftM := lm; topM := tm; rightM := rm; botM := bm;\r\t\t\tIF pageW > pw * u THEN pageW := pw * u END;\r\t\t\tIF pageH > ph * u THEN pageH := ph * u END;\r\t\t\tIF leftM + l < 0 THEN dw := -(leftM + l)\r\t\t\tELSIF paperW - rightM + l > pw * u THEN dw := pw * u - (paperW - rightM + l)\r\t\t\tELSE dw := 0\r\t\t\tEND;\r\t\t\tIF topM + t < 0 THEN dh := -(topM + t)\r\t\t\tELSIF paperH - botM + t > ph * u THEN dh := ph * u - (paperH - botM + t)\r\t\t\tELSE dh := 0\r\t\t\tEND;\r\t\t\tINC(leftM, dw); INC(topM, dh); INC(rightM, dw); INC(botM, dh)\r\t\tELSE\r\t\t\tpaperW := wA4; paperH := hA4;\r\t\t\tpageW := paperW - lm - rm; pageH := paperH - tm - bm;\r\t\t\tleftM := lm; topM := tm; rightM := rm; botM := bm\r\t\tEND;\r\t\tm.GetEmbeddingLimits(minW, maxW, minH, maxH);\r\t\tdefW := MAX(minW, pageW - m.l - defB);\r\t\tdefH := MAX(minH, pageH - m.t - defB);\r\t\tProperties.PreferredSize(view, minW, maxW, minH, maxH, defW, defH, w, h);\r\t\topts := {}; rp.fixed := FALSE;\r\t\trp.horFitToPage := FALSE;\r\t\trp.verFitToPage := FALSE;\r\t\trp.horFitToWin := FALSE;\r\t\trp.verFitToWin := FALSE;\r\t\tViews.HandlePropMsg(view, rp);\r\t\tIF rp.horFitToPage THEN INCL(opts, pageWidth)\r\t\tELSIF rp.horFitToWin THEN INCL(opts, winWidth)\r\t\tEND;\r\t\tIF rp.verFitToPage THEN INCL(opts, pageHeight)\r\t\tELSIF rp.verFitToWin THEN INCL(opts, winHeight)\r\t\tEND;\r\t\tViews.BeginModification(Views.notUndoable, d);\r\t\tm.view := view; d.x := 0; d.y := 0;\r\t\tctrl := d.ThisController();\r\t\tctrl.SetOpts(ctrl.opts - {pageWidth..winHeight});\r\t\td.SetPage(paperW, paperH, leftM, topM, paperW - rightM, paperH - botM, plain);\r\t\tASSERT(w > 0, 100); ASSERT(h > 0, 101);\r\t\td.SetRect(m.l, m.t, m.l + w, m.t + h);\r\t\tctrl.SetOpts(ctrl.opts + opts);\r\t\tViews.EndModification(Views.notUndoable, d);\r\t\tStores.Join(d, view);"
                    attr: 0
                  - text: "\r"
                    attr: 3
                  - text: "\t\tViews.Update(d, Views.rebuildFrames)\r\tEND SetView;\r\r\tPROCEDURE (d: StdDocument) ThisView (): Views.View;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " d.model.view\r\tEND ThisView;\r\t\r\tPROCEDURE (d: StdDocument) OriginalView (): Views.View;\r\tBEGIN\r\t\tIF d.original = NIL THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " d.model.view\r\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " d.original.model.view\r\t\tEND\r\tEND OriginalView;\r\r\tPROCEDURE (d: StdDocument) SetRect (l, t, r, b: INTEGER);\r\t\tVAR m: Model; op: SetRectOp; c: Containers.Controller; w, h: INTEGER;\r\tBEGIN\r\t\tASSERT(l < r, 22); ASSERT(t < b, 25);\r\t\tm := d.model;\r\t\tIF (m.l # l) OR (m.t # t) THEN\r\t\t\tm.r := l + m.r - m.l; m.l := l;\r\t\t\tm.b := t + m.b - m.t; m.t := t;\r\t\t\tViews.Update(d, Views.rebuildFrames)\r\t\tEND;\r\t\tIF d.original # NIL THEN m := d.original.model END;\r\t\tc := d.ThisController(); w := r - l; h := b - t;\r\t\tIF (pageWidth IN c.opts) OR (winWidth IN c.opts) THEN w := m.r - m.l END;\r\t\tIF (pageHeight IN c.opts) OR (winHeight IN c.opts) THEN h := m.b - m.t END;\r\t\tIF (w # m.r - m.l) OR (h # m.b - m.t) THEN\r\t\t\tNEW(op); op.model := m; op.w:= w; op.h := h;\r\t\t\tViews.Do(d, resizingKey, op)\r\t\tEND\r\tEND SetRect;\r\r\tPROCEDURE (d: StdDocument) SetPage (pw, ph, pl, pt, pr, pb: INTEGER; decorate: BOOLEAN);\r\t\tVAR op: SetPageOp; doc: StdDocument;\r\tBEGIN\r\t\tIF d.original = NIL THEN doc := d ELSE doc := d.original END;\r\t\tIF (doc.pw # pw) OR (doc.ph # ph) OR (doc.decorate # decorate)\r\t\tOR (doc.pl # pl) OR (doc.pt # pt) OR (doc.pr # pr) OR (doc.pb # pb) THEN\r\t\t\tASSERT(0 <= pw, 20);\r\t\t\tASSERT(0 <= ph, 22);\r\t\t\tASSERT(0 <= pl, 24); ASSERT(pl < pr, 25); ASSERT(pr <= pw, 26);\r\t\t\tASSERT(0 <= pt, 27); ASSERT(pt < pb, 28); ASSERT(pb <= ph, 29);\r\t\t\tNEW(op);\r\t\t\top.d := doc;\r\t\t\top.pw := pw; op.ph := ph; op.pl := pl; op.pt := pt; op.pr := pr; op.pb := pb;\r\t\t\top.decorate := decorate;\r\t\t\tViews.Do(doc, pageSetupKey, op)\r\t\tEND\r\tEND SetPage;\r\r\tPROCEDURE (v: StdDocument) HandleViewMsg2 (f: Views.Frame; VAR msg: Views.Message);\r\tBEGIN\r\t\tWITH msg: UpdateMsg DO\r\t\t\tIF (msg.doc = v) OR (msg.doc = v.original) THEN\r\t\t\t\tViews.Update(v, Views.rebuildFrames)\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND HandleViewMsg2;\r\r\tPROCEDURE (d: StdDocument) HandleCtrlMsg2 (f: Views.Frame; VAR msg: Controllers.Message;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\tBEGIN\r\t\tWITH f: Views.RootFrame DO\r\t\t\tWITH msg: Controllers.PollSectionMsg DO\r\t\t\t\tPollSection(d, f, msg); focus := NIL\r\t\t\t| msg: Controllers.ScrollMsg DO\r\t\t\t\tScroll(d, f, msg); focus := NIL\r\t\t\t| msg: Controllers.PageMsg DO\r\t\t\t\tPage(d, f, msg); focus := NIL\r\t\t\tELSE\r\t\t\tEND\r\t\tEND\r\tEND HandleCtrlMsg2;\r\r\r\t"
                    attr: 0
                  - text: "(* Controller *)\r\r"
                    attr: 1
                  - text: "\tPROCEDURE (c: Controller) Internalize2 (VAR rd: Stores.Reader);\r\t\tVAR v: INTEGER;\r\tBEGIN\r\t\trd.ReadVersion(minVersion, maxCtrlVersion, v)\r\tEND Internalize2;\r\r\tPROCEDURE (c: Controller) Externalize2 (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteVersion(maxCtrlVersion)\r\tEND Externalize2;\r\r\tPROCEDURE (c: Controller) InitView2 (v: Views.View);\r\tBEGIN\r\t\tIF v # NIL THEN c.doc := v(StdDocument) ELSE c.doc := NIL END\r\tEND InitView2;\r\r\tPROCEDURE (c: Controller) GetContextType (OUT type: Stores.TypeName);\r\tEND GetContextType;\r\r\tPROCEDURE (c: Controller) GetValidOps (OUT valid: SET);\r\tBEGIN\r\t\tIF c.Singleton() # NIL THEN\r\t\t\tvalid := {Controllers.copy}\r\t\tEND\r\tEND GetValidOps;\r\r\tPROCEDURE (c: Controller) NativeModel (m: Models.Model): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
