                    attr: 0
                  - text: "(** miscellaneous **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: Print
                    attr: 3
                  - text: "* (d: Document; p: Printers.Printer; par: Printing.Par);\r\t\tVAR dom: Stores.Domain; d1: Document; f: Views.RootFrame; g: Views.Frame;\r\t\t\tc: PrinterContext; from, to, this, copies, w, h, u, k: INTEGER; page: Controllers.PageMsg;\r\t\t\ttitle: Views.Title; port: Ports.Port;\r\tBEGIN\r\t\tASSERT(d # NIL, 20); ASSERT(p # NIL, 21);\r\t\tASSERT(par # NIL, 22);\r\t\tASSERT(par.page.from >= 0, 23); ASSERT(par.page.from <= par.page.to, 24);\r\t\tASSERT(par.copies > 0, 25);\r\t\tIF (par.header.right # \"\") OR (par.page.alternate & (par.header.left # \"\")) THEN\r\t\t\tASSERT(par.header.font # NIL, 26)\r\t\tEND;\r\t\tIF (par.footer.right # \"\") OR (par.page.alternate & (par.footer.left # \"\")) THEN\r\t\t\tASSERT(par.footer.font # NIL, 27)\r\t\tEND;\r\t\tIF par.page.title = \"\" THEN title := \"(\" + Dialog.appName + \")\" ELSE title := par.page.title END;\r\t\tfrom := par.page.from; to := par.page.to;\r\t\tcopies := par.copies;\r\t\tCheckOrientation(d, p);\r"
                    attr: 0
                  - text: "\t\t"
                    attr: 4
                  - text: "p.OpenJob(copies, title);\r\t\tIF p.res = 0 THEN\r\t\t\tdom := d.Domain();\r\t\t\tASSERT(dom # NIL, 100);\r\t\t\tc := NewPrinterContext(d, p, par);\r\t\t\td1 := PrinterDoc(d, c);\r\t\t\tCheckOrientation(d, p);\t"
                    attr: 0
                  - text: "(* New in PrinterDoc resets printer orientation *)"
                    attr: 1
                  - text: "\r\t\t\td1.GetNewFrame(g); f := g(Views.RootFrame); f.ConnectTo(p.ThisPort());\r\t\t\tViews.SetRoot(f, d1, FALSE, {}); Views.AdaptRoot(f);\r\t\t\tcurrent := 0; (*par.page.current := 0; *)\r\t\t\td1.Restore(f, 0, 0, 0, 0);\t"
                    attr: 0
                  - text: "(* install frame for doc's view *)"
                    attr: 1
                  - text: "\r\t\t\tKernel.PushTrapCleaner(cleaner);\r\t\t\tport := p.ThisPort();\r\t\t\tPrinting.par := par;\r\t\t\tpage.op := Controllers.gotoPageX; page.pageX := 0;\r\t\t\tpage.done := FALSE; page.eox := FALSE;\r\t\t\tViews.ForwardCtrlMsg(f, page);\r\t\t\tIF page.done THEN"
                    attr: 0
                  - text: " "
                    attr: 1
                  - text: "this := 0 ELSE this := from END;\r\t\t\tpage.op := Controllers.gotoPageY; page.pageY := this;\r\t\t\tpage.done := FALSE; page.eoy := FALSE;\r\t\t\tViews.ForwardCtrlMsg(f, page);\r\t\t\tIF ~page.done & (from > 0) OR page.eox OR page.eoy THEN to := -1 END;\r\t\t\tWHILE this <= to DO\r\t\t\t\tIF this >= from THEN\r\t\t\t\t\tcurrent := this; (*par.page.current := this;*)\r\t\t\t\t\tport.GetSize(w, h); u := port.unit;\r\t\t\t\t\tFOR k := copies TO par.copies DO\r\t\t\t\t\t\tp.OpenPage;\r\t\t\t\t\t\tIF p.res = 0 THEN\r\t\t\t\t\t\t\tViews.RemoveFrames(f, 0, 0, w * u, h * u);\r\t\t\t\t\t\t\tViews.RestoreRoot(f, 0, 0, w * u, h * u)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tp.ClosePage\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tIF p.res # abort THEN INC(this) ELSE to := -1 END;\r\t\t\t\tIF this <= to THEN\r\t\t\t\t\tpage.op := Controllers.nextPageX;\r\t\t\t\t\tpage.done := FALSE; page.eox := FALSE;\r\t\t\t\t\tViews.ForwardCtrlMsg(f, page);\r\t\t\t\t\tIF ~page.done OR page.eox THEN\r\t\t\t\t\t\tIF page.done THEN\r\t\t\t\t\t\t\tpage.op := Controllers.gotoPageX; page.pageX := 0;\r\t\t\t\t\t\t\tpage.done := FALSE; page.eox := FALSE;\r\t\t\t\t\t\t\tViews.ForwardCtrlMsg(f, page)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tpage.op := Controllers.nextPageY;\r\t\t\t\t\t\tpage.done := FALSE; page.eoy := FALSE;\r\t\t\t\t\t\tViews.ForwardCtrlMsg(f, page);\r\t\t\t\t\t\tIF ~page.done OR page.eoy THEN to := -1 END\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tPrinting.par := NIL;\r\t\t\tKernel.PopTrapCleaner(cleaner)\r\t\tELSE Dialog.ShowMsg(\"#System:FailedToOpenPrintJob\")\r\t\tEND;\r\t\tp.CloseJob\r\tEND Print;\r\r\tPROCEDURE (hook: PrintingHook) Current(): INTEGER;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " current\r\tEND Current;\r\t\r\tPROCEDURE (hook: PrintingHook) Print (v: Views.View; par: Printing.Par);\r\t\tVAR dom: Stores.Domain;  d: Document; f: Views.RootFrame; c: PrinterContext;\r\t\t\tw, h, u: INTEGER; p: Printers.Printer; g: Views.Frame; title: Views.Title;\r\t\t\tk, copies: INTEGER; port: Ports.Port;\r\tBEGIN\r\t\tASSERT(v # NIL, 20);\r\t\tp := Printers.dir.Current();\r\t\tASSERT(p # NIL, 21);\r\t\tIF v IS Document THEN Print(v(Document), p, par); "
