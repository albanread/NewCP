                  - text: "* (view: Views.View; w, h: INTEGER): Document, NEW, ABSTRACT;\r\r\r\t"
                    attr: 0
                  - text: "(* operations *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (op: SetRectOp) Do;\r\t\tVAR m: Model; w, h: INTEGER; upd: UpdateMsg;\r\tBEGIN\r\t\tm := op.model;\r\t\tw := m.r - m.l; h := m.b - m.t;\r\t\tm.r := m.l + op.w; m.b := m.t + op.h;\r\t\top.w := w; op.h := h;\r\t\tIF m.doc.context # NIL THEN\r\t\t\tupd.doc := m.doc;\r\t\t\tViews.Domaincast(m.doc.Domain(), upd)\r\t\tEND\r\tEND Do;\r\r\tPROCEDURE (op: SetPageOp) Do;\r\t\tVAR d: StdDocument; pw, ph, pl, pt, pr, pb: INTEGER; decorate: BOOLEAN; upd: UpdateMsg;\r\tBEGIN\r\t\td := op.d;\r\t\tpw := d.pw; ph := d.ph; pl := d.pl; pt := d.pt; pr := d.pr; pb := d.pb;\r\t\tdecorate := d.decorate;\r\t\td.pw := op.pw; d.ph := op.ph; d.pl := op.pl; d.pt := op.pt; d.pr := op.pr; d.pb := op.pb;\r\t\td.decorate := op.decorate;\r\t\top.pw := pw; op.ph := d.ph; op.pl := pl; op.pt := pt; op.pr := pr; op.pb := pb;\r\t\top.decorate := decorate;\r\t\tIF d.context # NIL THEN\r\t\t\tupd.doc := d;\r\t\t\tViews.Domaincast(d.Domain(), upd)\r\t\tEND\r\tEND Do;\r\r\tPROCEDURE (op: ReplaceViewOp) Do;\r\t\tVAR new: Views.View; upd: UpdateMsg;\r\tBEGIN\r\t\tnew := op.new; op.new := op.model.view; op.model.view := new;\r\t\tupd.doc := op.model.doc;\r\t\tIF upd.doc.context # NIL THEN\r\t\t\tViews.Domaincast(upd.doc.Domain(), upd)\r\t\tEND\r\tEND Do;\r\r\r\t"
                    attr: 0
                  - text: "(* printing support for StdDocument *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE CheckOrientation (d: Document; prt: Printers.Printer);\r\t\tVAR w, h, l, t, r, b: INTEGER; decorate: BOOLEAN;\r\tBEGIN\r\t\td.PollPage(w, h, l, t, r, b, decorate);\r\t\tprt.SetOrientation(w > h)\r\tEND CheckOrientation;\r\r\tPROCEDURE NewPrinterContext (d: Document; prt: Printers.Printer; p: Printing.Par): PrinterContext;\r\t\tVAR c: PrinterContext;\r\t\t\tpw, ph,  x0, y0, x1, y1, l, t, r, b: INTEGER; decorate: BOOLEAN;\r\tBEGIN\r\t\tprt.GetRect(x0, y0, x1, y1);\r\t\td.PollPage(pw, ph, l, t, r, b, decorate);\r\t\tINC(l, x0); INC(t, y0); INC(r, x0); INC(b, y0);\r\t\tNEW(c); (* c.Domain() := d.Domain(); (* dom *)*) c.param := p; Dates.GetDate(c.date); Dates.GetTime(c.time);\r\t\tc.pr := prt;\r\t\tc.l := l; c.t := t; c.r := r; c.b := b;\r\t\tc.pw := pw + 2 * x0; c.ph := ph + 2 * y0;\t"
                    attr: 0
                  - text: "(* paper reduced to printer range *)"
                    attr: 1
                  - text: "\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " c\r\tEND NewPrinterContext;\r\r\tPROCEDURE Decorate (c: PrinterContext; f: Views.Frame);\r\t\tVAR p: Printing.Par; x0, x1, y, asc, dsc, w: INTEGER; alt: BOOLEAN;\r\tBEGIN\r\t\tp := c.param;\r\t\talt := p.page.alternate & ~ODD(p.page.first + Printing.Current() (* p.page.current *));\r\t\tIF alt THEN x0 := c.pw - c.r; x1 := c.pw - c.l\r\t\tELSE x0 := c.l; x1 := c.r\r\t\tEND;\r\t\tIF (alt & (p.header.left # \"\")) OR (~alt & (p.header.right # \"\")) THEN\r\t\t\tp.header.font.GetBounds(asc, dsc, w);\r\t\t\ty := c.t - p.header.gap - dsc;\r\t\t\tPrinting.PrintBanner(f, p.page, p.header, c.date, c.time, x0, x1, y)\r\t\tEND;\r\t\tIF (alt & (p.footer.left # \"\")) OR (~alt & (p.footer.right # \"\")) THEN\r\t\t\tp.footer.font.GetBounds(asc, dsc, w);\r\t\t\ty := c.b + p.footer.gap + asc;\r\t\t\tPrinting.PrintBanner(f, p.page, p.footer, c.date, c.time, x0, x1, y)\r\t\tEND\r\tEND Decorate;\r\r\r\t"
                    attr: 0
                  - text: "(* support for StdDocument paging *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE HasFocus (v: Views.View; f: Views.Frame): BOOLEAN;\r\t\tVAR focus: Views.View; dummy: Controllers.PollFocusMsg;\r\tBEGIN\r\t\tfocus := NIL; dummy.focus := NIL;\r\t\tv.HandleCtrlMsg(f, dummy, focus);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " focus # NIL\r\tEND HasFocus;\r\t\r\tPROCEDURE ScrollDoc(v: StdDocument; x, y: INTEGER);\r\tBEGIN\r\t\tIF (x # v.x) OR (y # v.y) THEN\r\t\t\tViews.Scroll(v, x - v.x, y - v.y);\r\t\t\tv.x := x; v.y := y\r\t\tEND\r\tEND ScrollDoc;\r\r\tPROCEDURE PollSection (v: StdDocument; f: Views.Frame; VAR msg: Controllers.PollSectionMsg);\r\t\tVAR mv: Views.View; g: Views.Frame; vs, ps, ws, p, l, t, r, b: INTEGER; c: Containers.Controller;\r\tBEGIN\r\t\tmv := v.model.view;\r\t\tg := Views.ThisFrame(f, mv);\r\t\tc := v.ThisController();\r\t\tIF c.Singleton() # NIL THEN g := NIL END;\r\t\tIF g # NIL THEN Views.ForwardCtrlMsg(g, msg) END;\r\t\tIF (g = NIL) OR ~msg.done & (~msg.focus OR ~HasFocus(mv, g)) THEN\r\t\t\tv.PollRect(l, t, r, b);\r\t\t\tIF msg.vertical THEN\r\t\t\t\tps := f.b - f.t; vs := b + t; p := -v.y\r\t\t\tELSE\r\t\t\t\tps := f.r - f.l; vs := r + l;  p := -v.x\r\t\t\tEND;\r\t\t\tIF ps > vs THEN ps := vs END;\r\t\t\tws := vs - ps;\r\t\t\tIF p > ws THEN\r\t\t\t\tp := ws;\r\t\t\t\tIF msg.vertical THEN ScrollDoc(v, v.x, -p)\r\t\t\t\tELSE ScrollDoc(v, -p, v.y)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tmsg.wholeSize := vs;\r\t\t\tmsg.partSize := ps;\r\t\t\tmsg.partPos := p;\r\t\t\tmsg.valid := ws > Ports.point\r\t\tEND;\r\t\tmsg.done := TRUE\r\tEND PollSection;\r\r\tPROCEDURE Scroll (v: StdDocument; f: Views.Frame; VAR msg: Controllers.ScrollMsg);\r\t\tVAR mv: Views.View; g: Views.Frame; vs, ps, ws, p, l, t, r, b: INTEGER; c: Containers.Controller;\r\tBEGIN\r\t\tmv := v.model.view;\r\t\tg := Views.ThisFrame(f, mv);\r\t\tc := v.ThisController();\r\t\tIF c.Singleton() # NIL THEN g := NIL END;\r\t\tIF g # NIL THEN Views.ForwardCtrlMsg(g, msg) END;\r\t\tIF (g = NIL) OR ~msg.done & (~msg.focus OR ~HasFocus(mv, g)) THEN\r\t\t\tv.PollRect(l, t, r, b);\r\t\t\tIF msg.vertical THEN\r\t\t\t\tps := f.b - f.t; vs := b + t; p := -v.y\r\t\t\tELSE\r\t\t\t\tps := f.r - f.l; vs := r + l; p := -v.x\r\t\t\tEND;\r\t\t\tws := vs - ps;\r\t\t\tCASE msg.op OF\r\t\t\t  Controllers.decLine: p := MAX(0, p - scrollUnit)\r\t\t\t| Controllers.incLine: p := MIN(ws, p + scrollUnit)\r\t\t\t| Controllers.decPage: p := MAX(0, p - ps + scrollUnit)\r\t\t\t| Controllers.incPage: p := MIN(ws, p + ps - scrollUnit)\r\t\t\t| Controllers.gotoPos: p := MAX(0, MIN(ws, msg.pos))\r\t\t\tELSE\r\t\t\tEND;\r\t\t\tIF msg.vertical THEN ScrollDoc(v, v.x, -p)\r\t\t\tELSE ScrollDoc(v, -p, v.y)\r\t\t\tEND\r\t\tEND;\r\t\tmsg.done := TRUE\r\tEND Scroll;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: "MakeVisible*"
                    attr: 3
                  - text: " (d: Document; f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR x, y, w, h, dw, dh, ml, mt, mr, mb: INTEGER;\r\tBEGIN\r\t\tWITH d: StdDocument DO\r\t\t\td.context.GetSize(w, h);\r\t\t\tx := -d.x; y := -d.y;\r\t\t\td.PollRect(ml, mt, mr, mb);\r\t\t\tdw := mr + ml - w; dh := mb + mt - h;\r\t\t\tIF dw > 0 THEN\r\t\t\t\tIF r > x + w - 2 * ml THEN x := r - w + 2 * ml END;\r\t\t\t\tIF l < x THEN x := l END;\r\t\t\t\tIF x < 0 THEN x := 0 ELSIF x > dw THEN x := dw END\r\t\t\tEND;\r\t\t\tIF dh > 0 THEN\r\t\t\t\tIF b > y + h - 2 * mt THEN y := b - h + 2 * mt END;\r\t\t\t\tIF t < y THEN y := t END;\r\t\t\t\tIF y < 0 THEN y := 0 ELSIF y > dh THEN y := dh END\r\t\t\tEND;\r\t\t\tScrollDoc(d, -x, -y)\r\t\tEND\r\tEND MakeVisible;\r\r\tPROCEDURE Page (d: StdDocument; f: Views.Frame;\r\t\t\t\t\t\t\t\tVAR msg: Controllers.PageMsg);\r\t\tVAR g: Views.Frame;\r\tBEGIN\r\t\tg := Views.ThisFrame(f, d.model.view);\r\t\tIF g # NIL THEN Views.ForwardCtrlMsg(g, msg) END\r\tEND Page;\r\t\r\r\t"
                    attr: 0
                  - text: "(* Model *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (m: Model) Internalize (VAR rd: Stores.Reader);\r\t\tVAR c: StdContext; thisVersion: INTEGER; l, t, r, b: INTEGER;\r\tBEGIN\r\t\tm.Internalize^(rd);\r\t\tIF rd.cancelled THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\trd.ReadVersion(minVersion, maxModelVersion, thisVersion);\r\t\tIF rd.cancelled THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\tViews.ReadView(rd, m.view);\r\t\trd.ReadInt(l); rd.ReadInt(t); rd.ReadInt(r); rd.ReadInt(b);\r\t\tm.l := defB; m.t := defB; m.r := defB + r - l; m.b := defB + b - t;\r\t\tNEW(c); c.model := m; m.view.InitContext(c)\r\tEND Internalize;\r\r\tPROCEDURE (m: Model) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\tASSERT(m.doc.original = NIL, 100);\r\t\tm.Externalize^(wr);\r\t\twr.WriteVersion(maxModelVersion);\r"
                    attr: 0
                  - text: "\t\t"
                    attr: 3
                  - text: "Views.WriteView(wr, m.view);\r\t\twr.WriteInt(m.l); wr.WriteInt(m.t); wr.WriteInt(m.r); wr.WriteInt(m.b)\r\tEND Externalize;\r\r\tPROCEDURE (m: Model) CopyFrom (source: Stores.Store);\r\t\tVAR c: StdContext;\r\tBEGIN\r\t\tWITH source: Model DO\r\t\t\tm.view := Stores.CopyOf(source.view)(Views.View);\r\t\t\tm.l := source.l; m.t := source.t; m.r := source.r; m.b := source.b;\r\t\t\tNEW(c); c.model := m; m.view.InitContext(c)\r\t\tEND\r\tEND CopyFrom;\r\t\r\tPROCEDURE (m: Model) InitFrom (source: Containers.Model);\r\t\tVAR c: StdContext;\r\tBEGIN\r\t\tWITH source: Model DO\r\t\t\tm.view := Stores.CopyOf(source.view)(Views.View);\r\t\t\tm.l := source.l; m.t := source.t; m.r := source.r; m.b := source.b;\r\t\t\tNEW(c); c.model := m; m.view.InitContext(c)\r\t\tEND\r\tEND InitFrom;\r\r\tPROCEDURE (m: Model) GetEmbeddingLimits (OUT minW, maxW, minH, maxH: INTEGER);\r\tBEGIN\r\t\tminW := 5 * mm; minH := 5 * mm;\r\t\tmaxW := MAX(INTEGER) DIV 2; maxH := MAX(INTEGER) DIV 2\r\tEND GetEmbeddingLimits;\r\r\tPROCEDURE (m: Model) ReplaceView (old, new: Views.View);\r\t\tVAR con: Models.Context; op: ReplaceViewOp;\r\tBEGIN\r\t\tASSERT(old # NIL, 20); con := old.context;\r\t\tASSERT(con # NIL, 21); ASSERT(con.ThisModel() = m, 22);\r\t\tASSERT(new # NIL, 23);\r\t\tASSERT((new.context = NIL) OR (new.context = con), 24);\r\t\tIF new # old THEN\r\t\t\tIF new.context = NIL THEN new.InitContext(con) END;\r\t\t\tStores.Join(m, new);\r\t\t\tNEW(op); op.model := m; op.new := new;\r\t\t\tModels.Do(m, \"#System:ReplaceView\", op)\r\t\tEND\r\tEND ReplaceView;\r\r\r\t"
                    attr: 0
                  - text: "(* StdDocument *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (d: StdDocument) Internalize2 (VAR rd: Stores.Reader);\r\t\tVAR thisVersion: INTEGER; c: Containers.Controller;\r\tBEGIN\r\t\td.Internalize2^(rd);\r\t\tIF rd.cancelled THEN "
                    attr: 0
