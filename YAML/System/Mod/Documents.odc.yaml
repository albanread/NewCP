                  - text: "* (VAR w, h, l, t, r, b: INTEGER;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR decorate: BOOLEAN), NEW, ABSTRACT;\r\r\r\t"
                    attr: 0
                  - text: "(** Context **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (c: Context) "
