                    attr: 0
                  - text: "seq: ANYPTR;"
                    attr: 3
                  - text: "\r\tBEGIN\r\t\tv := d.ThisView();\r\r\t\tIF d.Domain() # NIL THEN seq:=d.Domain().GetSequencer();\r\t\t\tIF seq#NIL THEN seq(Sequencers.Sequencer).BeginModification(Sequencers.invisible, d) END\r\t\tEND;\r\t\tu := Views.CopyOf(v, Views.shallow);\r\t\tIF d.Domain() # NIL THEN seq:=d.Domain().GetSequencer();\r\t\t\tIF seq#NIL THEN seq(Sequencers.Sequencer).EndModification(Sequencers.invisible, d) END\r\t\tEND;\r\r\t\td.PollPage(w, h, l, t, r, b, dec); pw := r - l; ph := b - t;\t"
                    attr: 0
                  - text: "(* page size *)"
                    attr: 1
                  - text: "\r\t\tv.context.GetSize(w, h);\r\t\tct := d.ThisController();\r\t\tIF winWidth IN ct.opts THEN w := pw END;\t"
                    attr: 0
                  - text: "(* fit to win -> fit to page *)"
                    attr: 1
                  - text: "\r\t\tIF winHeight IN ct.opts THEN h := ph END;\r\t\tp := NewPager(u, w, h, pw, ph);\r\t\tASSERT(Stores.Joined(p, d), 100);\r\t\tpd := dir.New(p, pw, ph);\r\t\tpd.InitContext(c);\r\t\t"
