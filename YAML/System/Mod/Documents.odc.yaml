                  - text: "(** Pager **)"
                    attr: 1
                  - text: "\r\t\r\r\tPROCEDURE (p: Pager) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tViews.InstallFrame(f, p.con.view, -p.x, -p.y, 0, FALSE)\r\tEND Restore;\r\t\r\tPROCEDURE (p: Pager) HandleCtrlMsg (f: Views.Frame; VAR msg: Views.CtrlMessage; VAR focus: Views.View);\r\t\tVAR v: Views.View; g: Views.Frame;\r\tBEGIN\r\t\tWITH msg: Controllers.PageMsg DO\r\t\t\tv := p.con.view; g := Views.ThisFrame(f, v);\r\t\t\tIF g = NIL THEN\r\t\t\t\tViews.InstallFrame(f, v, 0, 0, 0, FALSE);\r\t\t\t\tg := Views.ThisFrame(f, v)\r\t\t\tEND;\r\t\t\tIF g # NIL THEN\r\t\t\t\tViews.ForwardCtrlMsg(g, msg);\r\t\t\t\tIF ~msg.done THEN\r\t\t\t\t\tIF p.con.w > p.w THEN \t"
                    attr: 0
                  - text: "(* needs horizontal paging *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\tIF msg.op = Controllers.gotoPageX THEN p.x := msg.pageX * p.w; msg.done := TRUE\r\t\t\t\t\t\tELSIF msg.op = Controllers.nextPageX THEN p.x := p.x + p.w; msg.done := TRUE\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF p.x >= p.con.w THEN msg.eox := TRUE; p.x := 0 END\r\t\t\t\t\tEND;\r\t\t\t\t\tIF p.con.h > p.h THEN\t"
                    attr: 0
                  - text: "(* needs vertical paging *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\tIF msg.op = Controllers.gotoPageY THEN p.y := msg.pageY * p.h; msg.done := TRUE\r\t\t\t\t\t\tELSIF msg.op = Controllers.nextPageY THEN p.y := p.y + p.h; msg.done := TRUE\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF p.y >= p.con.h THEN msg.eoy := TRUE; p.y := 0 END\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE focus := p.con.view\r\t\tEND\r\tEND HandleCtrlMsg;\r\t\r\tPROCEDURE NewPager (v: Views.View; w, h, pw, ph: INTEGER): Pager;\r\t\tVAR p: Pager; c: PContext;\r\tBEGIN\r\t\tNEW(c); c.view := v; c.w := w; c.h := h; v.InitContext(c);\r\t\tNEW(p); p.con := c; p.w := pw; p.h := ph; p.x := 0; p.y := 0;\r\t\tStores.Join(v, p);\r\t\t"
                    attr: 0
