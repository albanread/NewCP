                    attr: 1
                  - text: "\r\t\tVAR p: Property;\r\tBEGIN\r\t\tCollectProp(p);\r\t\tWHILE (p # NIL) & ~(p IS StdProp) DO p := p.next END;\r\t\tIF p # NIL THEN\r\t\t\tprop := p(StdProp); prop.next := NIL\r\t\tELSE\r\t\t\tNEW(prop); prop.known := {}\r\t\tEND;\r\t\tprop.valid := prop.valid * prop.known;\r\t\tprop.style.val := prop.style.val * prop.style.mask\r\tEND CollectStdProp;\r\r\tPROCEDURE "
                    attr: 0
