                  - text: "IntersectWith*"
                    attr: 3
                  - text: " (q: Property; OUT equal: BOOLEAN), NEW, ABSTRACT;\r\r\tPROCEDURE (p: StdProp) "
                    attr: 0
                  - text: "IntersectWith*"
                    attr: 3
                  - text: " (q: Property; OUT equal: BOOLEAN);\r\t\tVAR valid: SET; c, m: SET; eq: BOOLEAN;\r\tBEGIN\r\t\tWITH q: StdProp DO\r\t\t\tvalid := p.valid * q.valid; equal := TRUE;\r\t\t\tIF p.color.val # q.color.val THEN EXCL(valid, color) END;\r\t\t\tIF p.typeface # q.typeface THEN EXCL(valid, typeface) END;\r\t\t\tIF p.size # q.size THEN EXCL(valid, size) END;\r\t\t\tIntersectSelections(p.style.val, p.style.mask, q.style.val, q.style.mask, c, m, eq);\r\t\t\tIF m = {} THEN EXCL(valid, style)\r\t\t\tELSIF (style IN valid) & ~eq THEN p.style.mask := m; equal := FALSE\r\t\t\tEND;\r\t\t\tIF p.weight # q.weight THEN EXCL(valid, weight) END;\r\t\t\tIF p.valid # valid THEN p.valid := valid; equal := FALSE END\r\t\tEND\r\tEND IntersectWith;\r\r\tPROCEDURE (p: SizeProp) "
                    attr: 0
                  - text: "IntersectWith*"
                    attr: 3
                  - text: " (q: Property; OUT equal: BOOLEAN);\r\t\tVAR valid: SET;\r\tBEGIN\r\t\tWITH q: SizeProp DO\r\t\t\tvalid := p.valid * q.valid; equal := TRUE;\r\t\t\tIF p.width # q.width THEN EXCL(valid, width) END;\r\t\t\tIF p.height # q.height THEN EXCL(valid, height) END;\r\t\t\tIF p.valid # valid THEN p.valid := valid; equal := FALSE END\r\t\tEND\r\tEND IntersectWith;\r\r\r\t"
