                  - text: Insert
                    attr: 3
                  - text: "* (VAR list: Property; x: Property);\r\t\tVAR p, q: Property; ta: INTEGER;\r\tBEGIN\r\t\tASSERT(x # NIL, 20); ASSERT(x.next = NIL, 21); ASSERT(x # list, 22);\r\t\tASSERT(x.valid - x.known = {}, 23);\r\t\tIF list # NIL THEN\r\t\t\tASSERT(list.valid - list.known = {}, 24);\r\t\t\tASSERT(Services.TypeLevel(list) = 1, 25)\r\t\tEND;\r\t\tta := SYSTEM.TYP(x^);\r\t\tASSERT(Services.TypeLevel(x) = 1, 26);\r\t\tp := list; q := NIL;\r\t\tWHILE (p # NIL) & (SYSTEM.TYP(p^) < ta) DO\r\t\t\tq := p; p := p.next\r\t\tEND;\r\t\tIF (p # NIL) & (SYSTEM.TYP(p^) = ta) THEN x.next := p.next ELSE x.next := p END;\r\t\tIF q # NIL THEN q.next := x ELSE list := x END\r\tEND Insert;\r\r\tPROCEDURE "
