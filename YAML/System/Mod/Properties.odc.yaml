                  - text: "* (VAR base, override: Property);\r\t\tVAR p, q, r, s: Property; tp, tr: INTEGER;\r\tBEGIN\r\t\tASSERT((base # override) OR (base = NIL), 20);\r\t\tp := base; q := NIL; r := override; override := NIL;\r\t\tIF p # NIL THEN\r\t\t\ttp := SYSTEM.TYP(p^);\r\t\t\tASSERT(Services.TypeLevel(p) = 1, 21)\r\t\tEND;\r\t\tIF r # NIL THEN\r\t\t\ttr := SYSTEM.TYP(r^);\r\t\t\tASSERT(Services.TypeLevel(r) = 1, 22)\r\t\tEND;\r\t\tWHILE (p # NIL) & (r # NIL) DO\r\t\t\tASSERT(p # r, 23);\r\t\t\tWHILE (p # NIL) & (tp < tr) DO\r\t\t\t\tq := p; p := p.next;\r\t\t\t\tIF p # NIL THEN tp := SYSTEM.TYP(p^) END\r\t\t\tEND;\r\t\t\tIF p # NIL THEN\r\t\t\t\tIF tp = tr THEN\r\t\t\t\t\ts := p.next; p.next := NIL; p := s;\r\t\t\t\t\tIF p # NIL THEN tp := SYSTEM.TYP(p^) END\r\t\t\t\tELSE \r\t\t\t\tEND;\r\t\t\t\ts := r.next;\r\t\t\t\tIF q # NIL THEN q.next := r ELSE base := r END;\r\t\t\t\tq := r; r.next := p; r := s;\r\t\t\t\tIF r # NIL THEN tr := SYSTEM.TYP(r^) END\r\t\t\tEND\r\t\tEND;\r\t\tIF r # NIL THEN\r\t\t\tIF q # NIL THEN q.next := r ELSE base := r END\r\t\tEND\r\tEND Merge;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Intersect
                    attr: 3
                  - text: "* (VAR list: Property; x: Property; OUT equal: BOOLEAN);\r\t\tVAR l, p, q, r, s: Property; plen, rlen, ta: INTEGER; filtered: BOOLEAN;\r\tBEGIN\r\t\tASSERT((x # list) OR (list = NIL), 20);\r\t\tIF list # NIL THEN ASSERT(Services.TypeLevel(list) = 1, 21) END;\r\t\tIF x # NIL THEN ASSERT(Services.TypeLevel(x) = 1, 22) END;\r\t\tp := list; s := NIL; list := NIL; l := NIL; plen := 0;\r\t\tr := x; rlen := 0; filtered := FALSE;\r\t\tWHILE (p # NIL) & (r # NIL) DO\r\t\t\tq := p.next; p.next := NIL; INC(plen);\r\t\t\tta := SYSTEM.TYP(p^);\r\t\t\tWHILE (r # NIL) & (SYSTEM.TYP(r^) < ta) DO\r\t\t\t\tr := r.next; INC(rlen)\r\t\t\tEND;\r\t\t\tIF (r # NIL) & (SYSTEM.TYP(r^) = ta) THEN\r\t\t\t\tASSERT(r # p, 23);\r\t\t\t\tIF l # NIL THEN s.next := p ELSE l := p END;\r\t\t\t\ts := p;\r\t\t\t\tp.known := p.known + r.known;\r\t\t\t\tp.IntersectWith(r, equal);\r\t\t\t\tfiltered := filtered OR ~equal OR (p.valid # r.valid);\r\t\t\t\tr := r.next; INC(rlen)\r\t\t\tEND;\r\t\t\tp := q\r\t\tEND;\r\t\tlist := l;\r\t\tequal := (p = NIL) & (r = NIL) & (plen = rlen) & ~filtered\r\tEND Intersect;\r\r\r\t"
                    attr: 0
                  - text: "(** support for IntersectWith methods **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: IntersectSelections
                    attr: 3
                  - text: "* (a, aMask, b, bMask: SET; OUT c, cMask: SET; OUT equal: BOOLEAN);\r\tBEGIN\r\t\tcMask := aMask * bMask - (a / b);\r\t\tc := a * cMask;\r\t\tequal := (aMask = bMask) & (bMask = cMask)\r\tEND IntersectSelections;\r\r\r\t"
                    attr: 0
                  - text: "(** standard preferences protocols **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: PreferredSize
                    attr: 3
                  - text: "* (v: Views.View; minW, maxW, minH, maxH,  defW, defH: INTEGER;\r\t\t\t\t\t\t\t\t\t\t\t\tVAR w, h: INTEGER);\r\t\tVAR p: SizePref;\r\tBEGIN\r\t\tASSERT(Views.undefined < minW, 20); ASSERT(minW < maxW, 21);\r\t\tASSERT(Views.undefined < minH, 23); ASSERT(minH < maxH, 24);\r\t\tASSERT(Views.undefined <= defW, 26);\r\t\tASSERT(Views.undefined <= defH, 28);\r\t\tIF (w < Views.undefined) OR (w > maxW) THEN w := defW END;\r\t\tIF (h < Views.undefined) OR (h > maxH) THEN h := defH END;\r\t\tp.w := w; p.h := h; p.fixedW := FALSE; p.fixedH := FALSE;\r\t\tViews.HandlePropMsg(v, p); w := p.w; h := p.h;\r\t\tIF w = Views.undefined THEN w := defW END;\r\t\tIF h = Views.undefined THEN h := defH END;\r\t\tIF w < minW THEN w := minW ELSIF w > maxW THEN w := maxW END;\r\t\tIF h < minH THEN h := minH ELSIF h > maxH THEN h := maxH END\r\tEND PreferredSize;\r\r\r\t"
                    attr: 0
                  - text: "(** common resizing constraints **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: ProportionalConstraint
                    attr: 3
                  - text: "* (scaleW, scaleH: INTEGER; fixedW, fixedH: BOOLEAN; VAR w, h: INTEGER);\r\t"
                    attr: 0
                  - text: "(** pre: w > Views.undefined, h > Views.undefined **)"
                    attr: 1
                  - text: "\r\t"
                    attr: 0
                  - text: "(** post: (E s: s * scaleW = w, s * scaleH = h), |w * h - w' * h'| min! **)"
                    attr: 1
                  - text: "\r\t\tVAR area: REAL;\r\tBEGIN\r\t\tASSERT(scaleW > Views.undefined, 22); ASSERT(scaleH > Views.undefined, 23);\r\t\tIF fixedH THEN\r\t\t\tASSERT(~fixedW, 24);\r\t\t\tASSERT(h > Views.undefined, 21);\r\t\t\tarea := h; area := area * scaleW;\r\t\t\tw := SHORT(ENTIER(area / scaleH))\r\t\tELSIF fixedW THEN\r\t\t\tASSERT(w > Views.undefined, 20);\r\t\t\tarea := w; area := area * scaleH;\r\t\t\th := SHORT(ENTIER(area / scaleW))\r\t\tELSE\r\t\t\tASSERT(w > Views.undefined, 20); ASSERT(h > Views.undefined, 21);\r\t\t\tarea := w; area := area * h;\r\t\t\tw := SHORT(ENTIER(Math.(*L*)Sqrt(area * scaleW / scaleH)));\r\t\t\th := SHORT(ENTIER(Math.(*L*)Sqrt(area * scaleH / scaleW)))\r\t\tEND\r\tEND ProportionalConstraint;\r\r\tPROCEDURE "
                    attr: 0
                  - text: GridConstraint
                    attr: 3
                  - text: "* (gridX, gridY: INTEGER; VAR x, y: INTEGER);\r\t\tVAR dx, dy: INTEGER;\r\tBEGIN\r\t\tASSERT(gridX > Views.undefined, 20);\r\t\tASSERT(gridY > Views.undefined, 21);\r\t\tdx := x MOD gridX;\r\t\tIF dx < gridX DIV 2 THEN DEC(x, dx) ELSE INC(x, (-x) MOD gridX) END;\r\t\tdy := y MOD gridY;\r\t\tIF dy < gridY DIV 2 THEN DEC(y, dy) ELSE INC(y, (-y) MOD gridY) END\r\tEND GridConstraint;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ThisType
                    attr: 3
                  - text: "* (view: Views.View; type: Stores.TypeName): Views.View;\r\t\tVAR msg: TypePref;\r\tBEGIN\r\t\tmsg.type := type; msg.view := NIL;\r\t\tViews.HandlePropMsg(view, msg);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " msg.view\r\tEND ThisType;\r\t\rEND Properties.\r"
                    attr: 0
