                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Meta, Files, Stores, Dialog;\r\r\tCONST\r\t\t"
                    attr: 0
                  - text: "(* hints *)"
                    attr: 1
                  - text: "\r\t\t"
                    attr: 0
                  - text: importAll
                    attr: 3
                  - text: "* = 0;\t"
                    attr: 0
                  - text: "(* can import all file types *)"
                    attr: 1
                  - text: "\r"
                    attr: 0
                  - text: "\t\t"
                    attr: 1
                  - text: "canceled = 8;\r\r\tTYPE\r\t\t"
                    attr: 0
                  - text: Importer
                    attr: 3
                  - text: "* = PROCEDURE (f: Files.File; OUT s: Stores.Store);\r\t\t"
                    attr: 0
                  - text: Exporter
                    attr: 3
                  - text: "* = PROCEDURE (s: Stores.Store; f: Files.File);\r\t\t"
                    attr: 0
                  - text: Converter
                    attr: 3
                  - text: "* = POINTER TO RECORD\r\t\t\tnext-: Converter;\r\t\t\timp-, exp-: Dialog.String;\r\t\t\tstoreType-: Stores.TypeName;\r\t\t\tfileType-: Files.Type;\r\t\t\topts-: SET\r\t\tEND;\r\r\t\tImpVal = RECORD (Meta.Value) p: Importer END;\r\t\tExpVal = RECORD (Meta.Value) p: Exporter END;\r\r\tVAR\r\t\t"
                    attr: 0
                  - text: list
                    attr: 3
                  - text: "-: Converter;\r\t\tdoc: Converter;\r\r\tPROCEDURE GetCommand (name: Dialog.String; VAR val: Meta.Value; VAR ok: BOOLEAN);\r\t\tVAR i: Meta.Item;\r\tBEGIN\r\t\tMeta.LookupPath(name, i);\r\t\tIF (i.obj = Meta.procObj) OR (i.obj = Meta.varObj) & (i.typ = Meta.procTyp) THEN\r\t\t\ti.GetVal(val, ok)\r\t\tELSE ok := FALSE\r\t\tEND\r\tEND GetCommand;\r\r\r\tPROCEDURE "
                    attr: 0
                  - text: Register
                    attr: 3
                  - text: "* (imp, exp: Dialog.String; storeType: Stores.TypeName; fileType: Files.Type; opts: SET);\r\t\tVAR e, f: Converter;\r\tBEGIN\r\t\tASSERT((imp # \"\") OR (exp # \"\"), 20); ASSERT(fileType # \"\", 21);\r\t\tNEW(e); e.next := NIL;\r\t\te.imp := imp; e.exp := exp; e.fileType := fileType; e.storeType := storeType; e.opts := opts;\r\t\tIF (storeType = \"\") & (doc = NIL) THEN doc := e END;\r\t\tIF list = NIL THEN list := e\r\t\tELSE f := list;\r\t\t\tWHILE f.next # NIL DO f := f.next END;\r\t\t\tf.next := e\r\t\tEND\r\tEND Register;\r\r\r\tPROCEDURE "
                    attr: 0
                  - text: Import
                    attr: 3
                  - text: "* (loc: Files.Locator; name: Files.Name; VAR conv: Converter; OUT s: Stores.Store);\r\t\tVAR file: Files.File; val: ImpVal; ok: BOOLEAN;\r\tBEGIN\r\t\tASSERT(loc # NIL, 20); ASSERT(name # \"\", 21);\r\t\tfile := Files.dir.Old(loc, name, Files.shared); s := NIL;\r\t\tIF file # NIL THEN\r\t\t\tIF conv = NIL THEN\r\t\t\t\tconv := list;\r\t\t\t\tWHILE (conv # NIL) & ((conv.fileType # file.type) OR (conv.imp = \"\")) DO conv := conv.next END;\r\t\t\t\tIF conv = NIL THEN\r\t\t\t\t\tconv := list; WHILE (conv # NIL) & ~(importAll IN conv.opts) DO conv := conv.next END\r\t\t\t\tEND\r\t\t\tELSE ASSERT(conv.imp # \"\", 22)\r\t\t\tEND;\r\t\t\tIF conv # NIL THEN\r\t\t\t\tGetCommand(conv.imp, val, ok);\r\t\t\t\tIF ok THEN val.p(file, s)\r\t\t\t\tELSE Dialog.ShowMsg(\"#System:ConverterFailed\")\r\t\t\t\tEND\r\t\t\tELSE Dialog.ShowMsg(\"#System:NoConverterFound\")\r\t\t\tEND\r\t\tEND\r\tEND Import;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Export
                    attr: 3
                  - text: "* (loc: Files.Locator; name: Files.Name; conv: Converter; s: Stores.Store);\r\t\tVAR res: INTEGER; file: Files.File; val: ExpVal; ok: BOOLEAN;\r\tBEGIN\r\t\tASSERT(s # NIL, 20); ASSERT(~(s IS Stores.Alien), 21);\r\t\tASSERT(loc # NIL, 22); ASSERT(name # \"\", 23);\r\t\tfile := Files.dir.New(loc, Files.ask); (* fileLoc := loc; *)\r\t\tIF file # NIL THEN\r\t\t\tIF conv = NIL THEN\r\t\t\t\tconv := doc\r\t\t\tELSE ASSERT(conv.exp # \"\", 24)\r\t\t\tEND;\r\t\t\tGetCommand(conv.exp, val, ok);\r\t\t\tIF ok THEN\r\t\t\t\tval.p(s, file);\r\t\t\t\tIF loc.res # canceled THEN\r\t\t\t\t\tfile.Register(name, conv.fileType, Files.ask, res); loc.res := res\r\t\t\t\tEND\r\t\t\tELSE Dialog.ShowMsg(\"#System:ConverterFailed\"); loc.res := canceled\r\t\t\tEND\r\t\tEND\r\tEND Export;\r\rBEGIN\r\tlist := NIL\rEND Converters.\r"
                    attr: 0
