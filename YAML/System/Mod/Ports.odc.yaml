                    attr: 0
                  - text: "DrawPath*"
                    attr: 3
                  - text: " (IN p: ARRAY OF Point; n, s: INTEGER; col: Color; path: INTEGER), NEW;\r\r\t\tPROCEDURE Draw(p: ARRAY OF Point);\r\t\t\tVAR i, u: INTEGER;\r\t\tBEGIN\r\t\t\tu := f.unit; s := s DIV u;\r\t\t\ti := 0;\r\t\t\tWHILE i # n DO\r\t\t\t\tp[i].x := (f.gx + p[i].x) DIV u; p[i].y := (f.gy + p[i].y) DIV u;\r\t\t\t\tINC(i)\r\t\t\tEND;\r\t\t\tf.rider.DrawPath(p, n, s, col, path)\r\t\tEND Draw;\r\r\tBEGIN\r\t\tASSERT(n >= 0, 20); ASSERT(n <= LEN(p), 21);\r\t\tASSERT((s # fill) OR (path = closedPoly) OR (path = closedBezier), 22);\r\t\tASSERT(s >= fill, 23);\r\t\tDraw(p)\r\tEND DrawPath;\r\r\tPROCEDURE (f: Frame) "
