                  - text: "ConnectTo*"
                    attr: 3
                  - text: " (p: Port), NEW, EXTENSIBLE;\r\t\tVAR w, h: INTEGER;\r\tBEGIN\r\t\tIF p # NIL THEN\r\t\t\tf.rider := p.NewRider(); f.unit := p.unit;\r\t\t\tp.GetSize(w, h);\r\t\t\tf.dot := point - point MOD f.unit;\r\t\tELSE\r\t\t\tf.rider := NIL; f.unit := 0\r\t\tEND\r\tEND ConnectTo;\r\r\tPROCEDURE (f: Frame) "
                    attr: 0
                  - text: "SetOffset*"
                    attr: 3
                  - text: " (gx, gy: INTEGER), NEW, EXTENSIBLE;\r\t\tVAR u: INTEGER;\r\tBEGIN\r\t\tu := f.unit;\r\t\tIF ((gx - f.gx) MOD u = 0) & ((gy - f.gy) MOD u = 0) THEN\r\t\t\tf.rider.Move((gx - f.gx) DIV u, (gy - f.gy) DIV u)\r\t\tEND;\r\t\tf.gx := gx; f.gy := gy\r\tEND SetOffset;\r\t\r\tPROCEDURE (f: Frame) "
                    attr: 0
                  - text: "SaveRect*"
                    attr: 3
                  - text: " (l, t, r, b: INTEGER; VAR res: INTEGER), NEW;\r\t\tVAR u: INTEGER;\r\tBEGIN\r\t\tASSERT((l <= r) & (t <= b), 20);\r\t\tu := f.unit;\r\t\tl := (f.gx + l) DIV u; t := (f.gy + t) DIV u;\r\t\tr := (f.gx + r) DIV u; b := (f.gy + b) DIV u;\r\t\tf.rider.SaveRect(l, t, r, b, res);\r\tEND SaveRect;\r\t\r\tPROCEDURE (f: Frame) "
                    attr: 0
                  - text: "RestoreRect*"
                    attr: 3
                  - text: " (l, t, r, b: INTEGER; dispose: BOOLEAN), NEW;\r\t\tVAR u: INTEGER;\r\tBEGIN\r\t\tASSERT((l <= r) & (t <= b), 20);\r\t\tu := f.unit;\r\t\tl := (f.gx + l) DIV u; t := (f.gy + t) DIV u;\r\t\tr := (f.gx + r) DIV u; b := (f.gy + b) DIV u;\r\t\tf.rider.RestoreRect(l, t, r, b, dispose);\r\tEND RestoreRect;\r\t\r\tPROCEDURE (f: Frame) "
                    attr: 0
                  - text: "DrawRect*"
                    attr: 3
                  - text: " (l, t, r, b, s: INTEGER; col: Color), NEW;\r\t\tVAR u: INTEGER;\r\tBEGIN\r\t\tASSERT((l <= r) & (t <= b), 20); ASSERT(s >= fill, 21);\r\t\tu := f.unit;\r\t\tl := (f.gx + l) DIV u; t := (f.gy + t) DIV u;\r\t\tr := (f.gx + r) DIV u; b := (f.gy + b) DIV u;\r\t\ts := s DIV u;\r\t\tf.rider.DrawRect(l, t, r, b, s, col)\r\tEND DrawRect;\r\r\tPROCEDURE (f: Frame) "
                    attr: 0
                  - text: "DrawOval*"
                    attr: 3
                  - text: " (l, t, r, b, s: INTEGER; col: Color), NEW;\r\t\tVAR u: INTEGER;\r\tBEGIN\r\t\tASSERT((l <= r) & (t <= b), 20); ASSERT(s >= fill, 21);\r\t\tu := f.unit;\r\t\tl := (f.gx + l) DIV u; t := (f.gy + t) DIV u;\r\t\tr := (f.gx + r) DIV u; b := (f.gy + b) DIV u;\r\t\ts := s DIV u;\r\t\tf.rider.DrawOval(l, t, r, b, s, col)\r\tEND DrawOval;\r\r\tPROCEDURE (f: Frame) "
