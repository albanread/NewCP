                    attr: 0
                  - text: NotifyFlushCaches
                    attr: 3
                  - text: "*;\r\t\tVAR msg: NotifyMsg;\r\tBEGIN\r\t\tmsg.opts := {flushCaches}; msg.id0 := 0; msg.id1 := 0;\r\t\tViews.Omnicast(msg)\r\tEND NotifyFlushCaches;\r\t\r\tPROCEDURE GetName (VAR path, name: ARRAY OF CHAR; VAR i: INTEGER);\r\t\tVAR j: INTEGER; ch: CHAR;\r\tBEGIN\r\t\tj := 0; ch := path[i];\r\t\tWHILE (j < LEN(name) - 1) & Strings.IsIdent(ch) DO\r\t\t\tname[j] := ch; INC(i); INC(j); ch := path[i]\r\t\tEND;\r\t\tIF (ch = 0X) OR (ch = \".\") OR (ch = \"[\") OR (ch = \"^\") THEN name[j] := 0X\r\t\tELSE name[0] := 0X\r\t\tEND\r\tEND GetName;\r\r\tPROCEDURE LookupPath (path: ARRAY OF CHAR; VAR i: Meta.Item;\r\t\t\t\t\t\t\t\t\t\t\t\tVAR adr: ARRAY OF INTEGER; VAR num: INTEGER);\r\t\tVAR j, n: INTEGER; name: Meta.Name; ch: CHAR;\r\tBEGIN\r\t\tpath[LEN(path) - 1] := 0X; j := 0; num := 0;\r\t\tGetName(path, name, j); Meta.Lookup(name, i);\r\t\tIF (i.obj = Meta.modObj) & (path[j] = \".\") THEN\r\t\t\tINC(j); GetName(path, name, j);\r\t\t\ti.Lookup(name, i); ch := path[j]; INC(j);\r\t\t\tWHILE i.obj = Meta.varObj DO\r\t\t\t\tadr[num] := i.adr;\r\t\t\t\tIF num < LEN(adr) - 1 THEN INC(num) END;\r\t\t\t\tIF ch = 0X THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " \r\t\t\t\tELSIF i.typ IN {Meta.ptrTyp, Meta.anyPtrTyp, Meta.sysPtrTyp} THEN\r\t\t\t\t\tIF ch = \"^\" THEN ch := path[j]; INC(j) END;\r\t\t\t\t\ti.Deref(i)\r\t\t\t\tELSIF (i.typ = Meta.recTyp) & (ch = \".\") THEN\r\t\t\t\t\tGetName(path, name, j); i.Lookup(name, i);\r\t\t\t\t\tch := path[j]; INC(j)\r\t\t\t\tELSIF (i.typ = Meta.arrTyp) & (ch = \"[\") THEN\r\t\t\t\t\tch := path[j]; INC(j); n := 0;\r\t\t\t\t\tWHILE (ch >= \"0\") & (ch <= \"9\") DO n := 10 * n + ORD(ch) - ORD(\"0\"); ch := path[j]; INC(j) END;\r\t\t\t\t\tIF ch = \"]\" THEN ch := path[j]; INC(j); i.Index(n, i) ELSE Meta.Lookup(\"\", i) END\r\t\t\t\tELSE Meta.Lookup(\"\", i)\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE\r\t\t\tMeta.LookupPath(path, i); num := 0;\r\t\t\tIF i.obj = Meta.varObj THEN adr[0] := i.adr; num := 1\r\t\t\tELSIF i.obj # Meta.procObj THEN Meta.Lookup(\"\", i)\r\t\t\tEND\r\t\tEND\r\tEND LookupPath;\r\r\tPROCEDURE Sort (VAR adr: ARRAY OF INTEGER; num: INTEGER);\r\t\tVAR i, j, p: INTEGER;\r\tBEGIN\r\t\ti := 1;\r\t\tWHILE i < num DO\r\t\t\tp := adr[i]; j := i;\r\t\t\tWHILE (j >= 1) & (adr[j - 1] > p) DO adr[j] := adr[j - 1]; DEC(j) END;\r\t\t\tadr[j] := p; INC(i)\r\t\tEND\r\tEND Sort;\r\r\tPROCEDURE GetTypeName (IN item: Meta.Item; OUT name: Meta.Name);\r\t\tVAR mod: Meta.Name;\r\tBEGIN\r\t\tIF (item.typ = Meta.recTyp) THEN\r\t\t\titem.GetTypeName(mod, name);\r\t\t\tIF (mod = \"Dialog\") OR (mod = \"Dates\") THEN (* ok *)\r\t\t\tELSE name := \"\"\r\t\t\tEND\r\t\tELSE name := \"\"\r\t\tEND\r\tEND GetTypeName;\r\r\tPROCEDURE "
                    attr: 0
                  - text: OpenLink
                    attr: 3
                  - text: "* (c: Control; p: Prop);\r\t\tVAR ok: BOOLEAN;\r\tBEGIN\r\t\tASSERT(c # NIL, 20); ASSERT(p # NIL, 21);\r\t\tc.num := 0;\r\t\tc.prop := Properties.CopyOf(p)(Prop);\r\t\tIF c.font = NIL THEN\r\t\t\tIF c.customFont THEN c.font := StdCFrames.defaultLightFont\r\t\t\tELSE c.font := StdCFrames.defaultFont\r\t\t\tEND\r\t\tEND;\r\t\tc.guardErr := FALSE; c.notifyErr := FALSE;\r\t\tLookupPath(p.link, c.item, c.adr, c.num);\r\t\tIF c.item.obj = Meta.varObj THEN\r\t\t\tSort(c.adr, c.num);\r\t\t\tok := TRUE; c.CheckLink(ok);\r\t\t\tIF ~ok THEN\r\t\t\t\tMeta.Lookup(\"\", c.item);\r\t\t\t\tDialog.ShowParamMsg(\"#System:HasWrongType\", p.link, \"\", \"\")\r\t\t\tEND\r\t\tELSE\r\t\t\tMeta.Lookup(\"\", c.item); c.num := 0\r\t\tEND;\r\t\tCallGuard(c);\r\t\tc.stamp := stamp\r\tEND OpenLink;\r\r\r\t"
                    attr: 0
