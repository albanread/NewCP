                  - text: "* (c: Control; f: Views.Frame; op, from, to: INTEGER);\r\t\tVAR msg: NotifyMsg;\r\tBEGIN\r\t\tIF ~c.readOnly & ~ c.disabled THEN\r\t\t\tCallNotifier(c, op, from, to);\r\t\t\tIF op >= Dialog.changed THEN\r"
