                  - text: " (q: Properties.Property; OUT equal: BOOLEAN);\r\t\tVAR valid: SET;\r\tBEGIN\r\t\tWITH q: Prop DO\r\t\t\tvalid := p.valid * q.valid; equal := TRUE;\r\t\t\tIF p.link # q.link THEN EXCL(valid, link) END;\r\t\t\tIF p.label # q.label THEN EXCL(valid, label) END;\r\t\t\tIF p.guard # q.guard THEN EXCL(valid, guard) END;\r\t\t\tIF p.notifier # q.notifier THEN EXCL(valid, notifier) END;\r\t\t\tIF p.level # q.level THEN EXCL(valid, level) END;\r\t\t\tIF p.opt[0] # q.opt[0] THEN EXCL(valid, opt0) END;\r\t\t\tIF p.opt[1] # q.opt[1] THEN EXCL(valid, opt1) END;\r\t\t\tIF p.opt[2] # q.opt[2] THEN EXCL(valid, opt2) END;\r\t\t\tIF p.opt[3] # q.opt[3] THEN EXCL(valid, opt3) END;\r\t\t\tIF p.opt[4] # q.opt[4] THEN EXCL(valid, opt4) END;\r\t\t\tIF p.valid # valid THEN p.valid := valid; equal := FALSE END\r\t\tEND\r\tEND IntersectWith;\r\r\r\t"
