                  - text: " END;\r\t\tNEW(c.prop);\r\t\tIF thisVersion >= 3 THEN\r\t\t\trd.ReadString(c.prop.link);\r\t\t\trd.ReadString(c.prop.label);\r\t\t\trd.ReadString(c.prop.guard);\r\t\t\trd.ReadString(c.prop.notifier);\r\t\t\trd.ReadInt(c.prop.level);\r\t\t\trd.ReadBool(c.customFont);\r\t\t\trd.ReadBool(c.prop.opt[0]);\r\t\t\trd.ReadBool(c.prop.opt[1]);\r\t\t\trd.ReadBool(c.prop.opt[2]);\r\t\t\trd.ReadBool(c.prop.opt[3]);\r\t\t\trd.ReadBool(c.prop.opt[4]);\r\t\t\tIF c.customFont & (thisVersion = 4) THEN\r\t\t\t\tViews.ReadFont(rd, c.font)\r\t\t\tEND\r\t\tELSE\r\t\t\trd.ReadXString(c.prop.link);\r\t\t\trd.ReadXString(c.prop.label);\r\t\t\trd.ReadXString(c.prop.guard);\r\t\t\tc.prop.notifier := \"\";\r\t\t\tc.prop.opt[2] := FALSE;\r\t\t\tc.prop.opt[3] := FALSE;\r\t\t\tc.prop.opt[4] := FALSE;\r\t\t\tsort := FALSE;\r\t\t\tIF thisVersion = 2 THEN\r\t\t\t\trd.ReadXString(c.prop.notifier);\r\t\t\t\trd.ReadBool(sort);\r\t\t\t\trd.ReadBool(c.prop.opt[multiLine])\r\t\t\tELSIF thisVersion = 1 THEN\r\t\t\t\trd.ReadXString(c.prop.notifier);\r\t\t\t\trd.ReadBool(sort)\r\t\t\tEND;\r\t\t\trd.ReadBool(x);\t"
