                  - text: "\r\r\tPROCEDURE IsShortcut (ch: CHAR; c: Control): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " Strings.Upper(ch) = c.shortcut\r\tEND IsShortcut;\r\r\tPROCEDURE ExtractShortcut (c: Control);\r\t\tVAR label: Dialog.String; i: INTEGER; ch, sCh: CHAR;\r\tBEGIN\r\t\tDialog.MapString(c.label, label);\r\t\ti := 0; ch := label[0]; sCh := \"&\";\r\t\tWHILE sCh = \"&\" DO\r\t\t\tWHILE (ch # 0X) & (ch # \"&\") DO INC(i); ch := label[i] END;\r\t\t\tIF ch = 0X THEN sCh := 0X\r\t\t\tELSE INC(i); sCh := label[i]; INC(i); ch := label[i]\r\t\t\tEND\r\t\tEND;\r\t\tc.shortcut := Strings.Upper(sCh)\r\tEND ExtractShortcut;\r\r\tPROCEDURE GetGuardProc (name: ARRAY OF CHAR; VAR i: Meta.Item; VAR err: BOOLEAN;\r\t\t\t\t\t\t\t\t\t\t\t\tVAR par: BOOLEAN; VAR n: INTEGER);\r\t\tVAR j, k, e: INTEGER; num: ARRAY 32 OF CHAR;\r\tBEGIN\r\t\tj := 0;\r\t\tWHILE (name[j] # 0X) & (name[j] # \"(\") DO INC(j) END;\r\t\tIF name[j] = \"(\" THEN\r\t\t\tINC(j); k := 0;\r\t\t\tWHILE (name[j] # 0X) & (name[j] # \")\") DO num[k] := name[j]; INC(j); INC(k) END;\r\t\t\tIF (name[j] = \")\") & (name[j+1] = 0X) THEN\r\t\t\t\tnum[k] := 0X; Strings.StringToInt(num, n, e);\r\t\t\t\tIF e = 0 THEN\r\t\t\t\t\tname[j - k - 1] := 0X;\r\t\t\t\t\tMeta.LookupPath(name, i); par := TRUE\r\t\t\t\tELSE\r\t\t\t\t\tIF ~err THEN\r\t\t\t\t\t\tDialog.ShowParamMsg(\"#System:SyntaxErrorIn\", name, \"\", \"\");\r\t\t\t\t\t\terr := TRUE\r\t\t\t\t\tEND;\r\t\t\t\t\tMeta.Lookup(\"\", i);\r\t\t\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: "\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tIF ~err THEN\r\t\t\t\t\tDialog.ShowParamMsg(\"#System:SyntaxErrorIn\", name, \"\", \"\");\r\t\t\t\t\terr := TRUE\r\t\t\t\tEND;\r\t\t\t\tMeta.Lookup(\"\", i);\r\t\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: "\r\t\t\tEND\r\t\tELSE\r\t\t\tMeta.LookupPath(name, i); par := FALSE\r\t\tEND;\r\t\tIF (i.obj = Meta.procObj) OR (i.obj = Meta.varObj) & (i.typ = Meta.procTyp) THEN (*ok *)\r\t\tELSE\r\t\t\tIF ~err THEN\r\t\t\t\tIF i.obj = Meta.undef THEN\r\t\t\t\t\tDialog.ShowParamMsg(\"#System:NotFound\", name, \"\", \"\")\r\t\t\t\tELSE\r\t\t\t\t\tDialog.ShowParamMsg(\"#System:HasWrongType\", name, \"\", \"\")\r\t\t\t\tEND;\r\t\t\t\terr := TRUE\r\t\t\tEND;\r\t\t\tMeta.Lookup(\"\", i)\r\t\tEND\r\tEND GetGuardProc;\r\t\r\tPROCEDURE CallGuard (c: Control);\r\t\tVAR ok, up: BOOLEAN; n: INTEGER; dpar: Dialog.Par; p: Control;\r\t\t\tv: GuardProcVal; vp: GuardProcPVal; i: Meta.Item; pref: DefaultsPref;\r\tBEGIN\r\t\tControllers.SetCurrentPath(Controllers.targetPath);\r\t\tpref.disabled := ~c.item.Valid();\r\t\tpref.undef := FALSE;\r\t\tpref.readOnly := c.item.vis = Meta.readOnly;\r\t\tViews.HandlePropMsg(c, pref);\r\t\tc.disabled := pref.disabled;\r\t\tc.undef := pref.undef;\r\t\tc.readOnly := pref.readOnly;\r\t\tc.label := c.prop.label$;\r\t\tIF ~c.disabled & (c.prop.guard # \"\") & ~c.guardErr THEN\r\t\t\tIF cleanerInstalled = 0 THEN Kernel.PushTrapCleaner(cleaner) END;\r\t\t\tINC(cleanerInstalled);\r\t\t\tp := par; par := c;\r\t\t\tdpar.disabled := FALSE; dpar.undef := FALSE;\r\t\t\tdpar.readOnly := c.readOnly;\r\t\t\tdpar.checked := FALSE; dpar.label := c.label$;\r\t\t\tGetGuardProc(c.prop.guard, i, c.guardErr, up, n);\r\t\t\tIF i.obj # Meta.undef THEN\r\t\t\t\tIF up THEN\t"
                    attr: 0
                  - text: "(* call with numeric parameter *)"
                    attr: 1
                  - text: "\r\t\t\t\t\ti.GetVal(vp, ok);\r\t\t\t\t\tIF ok THEN vp.p(n, dpar) END\r\t\t\t\tELSE\r\t\t\t\t\ti.GetVal(v, ok);\r\t\t\t\t\tIF ok THEN v.p(dpar) END\r\t\t\t\tEND;\r\t\t\t\tIF ok THEN\r\t\t\t\t\tc.disabled := dpar.disabled;\r\t\t\t\t\tc.undef := dpar.undef;\r\t\t\t\t\tIF dpar.readOnly THEN c.readOnly := TRUE END;\r\t\t\t\t\tIF dpar.label # c.label THEN c.label := dpar.label END\r\t\t\t\tELSIF ~c.guardErr THEN\r\t\t\t\t\tDialog.ShowParamMsg(\"#System:HasWrongType\", c.prop.guard, \"\", \"\");\r\t\t\t\t\tc.guardErr := TRUE\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tpar := p;\r\t\t\tDEC(cleanerInstalled);\r\t\t\tIF cleanerInstalled = 0 THEN Kernel.PopTrapCleaner(cleaner) END\r\t\tEND;\r\t\tExtractShortcut(c);\r\t\tControllers.ResetCurrentPath()\r\tEND CallGuard;\r\r\tPROCEDURE CallNotifier (c: Control; op, from, to: INTEGER);\r\t\tVAR ok, up: BOOLEAN; n: INTEGER; vold: NotifyProcValOld; vp: NotifyProcPVal;\r\t\t\ti: Meta.Item; p: Control;\r\tBEGIN\r\t\tIF c.prop.notifier # \"\" THEN\r\t\t\tIF cleanerInstalled = 0 THEN Kernel.PushTrapCleaner(cleaner) END;\r\t\t\tINC(cleanerInstalled);\r\t\t\tp := par; par := c;\r\t\t\tIF c.prop.notifier[0] = \"!\" THEN\r\t\t\t\tIF op = Dialog.pressed THEN\r\t\t\t\t\tc.prop.notifier[0] := \" \";\r\t\t\t\t\tDialog.ShowStatus(c.prop.notifier);\r\t\t\t\t\tc.prop.notifier[0] := \"!\"\r\t\t\t\tELSIF op = Dialog.released THEN\r\t\t\t\t\tDialog.ShowStatus(\"\")\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tGetGuardProc(c.prop.notifier, i, c.notifyErr, up, n);\r\t\t\t\tIF i.obj # Meta.undef THEN\r\t\t\t\t\tIF up THEN\t"
                    attr: 0
                  - text: "(* call with numeric parameter *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\ti.GetVal(vp, ok);\r\t\t\t\t\t\tIF ok THEN vp.p(n, op, from, to) END\r\t\t\t\t\tELSE\r\t\t\t\t\t\ti.GetVal(vold, ok);\r\t\t\t\t\t\tIF ok THEN vold.p(op, from, to) END\r\t\t\t\t\tEND;\r\t\t\t\t\tIF ~ok & ~c.notifyErr THEN\r\t\t\t\t\t\tDialog.ShowParamMsg(\"#System:HasWrongType\", c.prop.notifier, \"\", \"\");\r\t\t\t\t\t\tc.notifyErr := TRUE\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tpar := p;\r\t\t\tDEC(cleanerInstalled);\r\t\t\tIF cleanerInstalled = 0 THEN Kernel.PopTrapCleaner(cleaner) END\r\t\tEND\r\tEND CallNotifier;\r\r\tPROCEDURE DCHint (modifiers: SET): INTEGER;\r\tBEGIN\r\t\tIF Controllers.doubleClick IN modifiers THEN "
