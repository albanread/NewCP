                    attr: 0
                  - text: HandleViewMsg
                    attr: 3
                  - text: "- (f: Views.Frame; VAR msg: Views.Message);\r\t\tVAR disabled, undef, readOnly, done, allDone: BOOLEAN; i: INTEGER; lbl: Dialog.String;\r\tBEGIN\r\t\tWITH msg: Views.NotifyMsg DO\r\t\t\tdone := FALSE; allDone := FALSE;\r\t\t\tIF guardCheck IN msg.opts THEN\r\t\t\t\t"
                    attr: 0
                  - text: "(* should call c.Update for each frame but Views.Update only once *)"
                    attr: 1
                  - text: "\r\t\t\t\tWITH f: StdCFrames.Caption DO lbl := f.label$\r\t\t\t\t| f: StdCFrames.PushButton DO lbl := f.label$\r\t\t\t\t| f: StdCFrames.RadioButton DO lbl := f.label$\r\t\t\t\t| f: StdCFrames.CheckBox DO lbl := f.label$\r\t\t\t\t| f: StdCFrames.Group DO lbl := f.label$\r\t\t\t\tELSE lbl := c.label$\r\t\t\t\tEND;\r\t\t\t\tWITH f: StdCFrames.Frame DO\r\t\t\t\t\tdisabled := f.disabled; undef := f.undef; readOnly := f.readOnly\r\t\t\t\tELSE\r\t\t\t\t\tdisabled := c.disabled; undef := c.undef; readOnly := c.readOnly\r\t\t\t\tEND;\r\t\t\t\tCallGuard(c);\r\t\t\t\tIF (c.disabled # disabled) OR (c.undef # undef)\r\t\t\t\tOR (c.readOnly # readOnly) OR (c.label # lbl) THEN\r\t\t\t\t\tWITH f: StdCFrames.Frame DO\r\t\t\t\t\t\tIF f.noRedraw THEN\r\t\t\t\t\t\t\tf.disabled := c.disabled;\r\t\t\t\t\t\t\tf.undef := c.undef;\r\t\t\t\t\t\t\tf.readOnly := c.readOnly;\r\t\t\t\t\t\t\tc.Update(f, 0, 0, 0); done := TRUE\r\t\t\t\t\t\tELSE Views.Update(c, Views.rebuildFrames); allDone := TRUE\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE Views.Update(c, Views.keepFrames); done := TRUE\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF flushCaches IN msg.opts THEN\r\t\t\t\tViews.Update(c, Views.rebuildFrames)\r\t\t\tEND;\r\t\t\ti := 0; WHILE (i < c.num) & (c.adr[i] < msg.id0) DO INC(i) END;\r\t\t\tIF (i < c.num) & (c.adr[i] < msg.id1) & ~allDone THEN\r\t\t\t\tIF (update IN msg.opts) & ~done THEN\r\t\t\t\t\tWITH msg: NotifyMsg DO\r\t\t\t\t\t\tIF msg.frame # f THEN\t"
                    attr: 0
                  - text: "(* don't update origin frame *)\r\t\t\t\t\t\t\t"
                    attr: 1
                  - text: "c.Update(f, msg.op, msg.from, msg.to)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE\r\t\t\t\t\t\tc.Update(f, 0, 0, 0)\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tIF listUpdate IN msg.opts THEN\r\t\t\t\t\tc.UpdateList(f)\r\t\t\t\tEND\r\t\t\tEND\r\t\t| msg: Views.UpdateCachesMsg DO\r\t\t\tIF c.stamp # stamp THEN\r\t\t\t\tOpenLink(c, c.prop);\r\t\t\t\tIF msg IS UpdateCachesMsg THEN\r\t\t\t\t\tViews.Update(c, Views.rebuildFrames)\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE\r\t\tEND;\r\t\tc.HandleViewMsg2(f, msg)\r\tEND HandleViewMsg;\r\r\tPROCEDURE (c: Control) "
                    attr: 0
                  - text: HandleCtrlMsg
                    attr: 3
                  - text: "* (f: Views.Frame; VAR msg: Controllers.Message;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\t\tVAR sp: Properties.SizeProp; p: Control; dcOk: BOOLEAN;\r\tBEGIN\r\t\tIF cleanerInstalled = 0 THEN Kernel.PushTrapCleaner(cleaner) END;\r\t\tINC(cleanerInstalled);\r\t\tp := par; par := c;\r\t\tWITH msg: Properties.PollPickMsg DO\r\t\t\tmsg.dest := f\r\t\t| msg: Properties.PickMsg DO\r\t\t\tNEW(sp); sp.known := {Properties.width, Properties.height}; sp.valid := sp.known;\r\t\t\tc.context.GetSize(sp.width, sp.height);\r\t\t\tProperties.Insert(msg.prop, sp)\r\t\t| msg: Controllers.TrackMsg DO\r\t\t\tIF ~c.disabled THEN\r\t\t\t\tdcOk := TRUE;\r\t\t\t\tIF f IS StdCFrames.Frame THEN dcOk := f(StdCFrames.Frame).DblClickOk(msg.x, msg.y) END;\r\t\t\t\tIF (DCHint(msg.modifiers) = 1)  & dcOk THEN\r\t\t\t\t\t(* double click *)\r\t\t\t\t\tNotify(c, f, Dialog.pressed, 1, 0)\r\t\t\t\tELSE\r\t\t\t\t\tNotify(c, f, Dialog.pressed, 0, 0)\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE\r\t\tEND;\r\t\tc.HandleCtrlMsg2(f, msg, focus);\r\t\tWITH msg: Controllers.TrackMsg DO\r\t\t\tIF ~c.disabled THEN\r\t\t\t\tNotify(c, f, Dialog.released, 0, 0)\r\t\t\tEND\r\t\tELSE\r\t\tEND;\r\t\tpar := p;\r\t\tDEC(cleanerInstalled);\r\t\tIF cleanerInstalled = 0 THEN Kernel.PopTrapCleaner(cleaner) END\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE (c: Control) "
                    attr: 0
                  - text: HandlePropMsg
                    attr: 3
                  - text: "- (VAR msg: Properties.Message);\r\t\tVAR fpref: Properties.FocusPref; stp: Properties.StdProp;\r\t\t\tcp: Prop; ppref: PropPref; op: Op; valid: SET; p: Properties.Property;\r\t\t\tfop: FontOp; face: Fonts.Typeface; size, weight: INTEGER; style: SET;\r\tBEGIN\r\t\tWITH msg: Properties.ControlPref DO\r\t\t\tIF (msg.char = lineChar) OR (msg.char = esc) THEN msg.accepts := FALSE END;\r\t\t\tIF ~c.disabled & ~c.readOnly & IsShortcut(msg.char, c) THEN\r\t\t\t\tfpref.hotFocus := FALSE; fpref.setFocus := FALSE; fpref.atLocation := FALSE;\r\t\t\t\tViews.HandlePropMsg(c, fpref);\r\t\t\t\tIF fpref.setFocus THEN msg.getFocus := TRUE END\r\t\t\tEND\r\t\t| msg: Properties.PollMsg DO\r\t\t\tppref.valid := {link, label, notifier, guard};\r\t\t\tViews.HandlePropMsg(c, ppref);\r\t\t\tcp := Properties.CopyOf(c.prop)(Prop);\r\t\t\tcp.valid := ppref.valid; cp.known := cp.valid; cp.readOnly := {};\r\t\t\tProperties.Insert(msg.prop, cp);\r\t\t\tNEW(stp);\r\t\t\tstp.valid := {Properties.typeface..Properties.weight};\r\t\t\tstp.known := stp.valid;\r\t\t\tIF c.customFont THEN stp.typeface := c.font.typeface$\r\t\t\tELSE stp.typeface := Fonts.default\r\t\t\tEND;\r\t\t\tstp.size := c.font.size; stp.style.val := c.font.style; stp.weight := c.font.weight;\r\t\t\tstp.style.mask := {Fonts.italic, Fonts.strikeout, Fonts.underline};\r\t\t\tProperties.Insert(msg.prop, stp)\r\t\t| msg: Properties.SetMsg DO\r\t\t\tp := msg.prop; op := NIL; fop := NIL;\r\t\t\tWHILE (p # NIL) & (op = NIL) DO\r\t\t\t\tWITH p: Prop DO\r\t\t\t\t\tppref.valid := {link, label, notifier, guard};\r\t\t\t\t\tViews.HandlePropMsg(c, ppref);\r\t\t\t\t\tvalid := p.valid * ppref.valid;\r\t\t\t\t\tIF valid # {} THEN\r\t\t\t\t\t\tNEW(op); \r\t\t\t\t\t\top.ctrl := c; \r\t\t\t\t\t\top.prop := Properties.CopyOf(p)(Prop); op.prop.valid := valid\r\t\t\t\t\tEND\r\t\t\t\t| p: Properties.StdProp DO\r\t\t\t\t\tvalid := p.valid * {Properties.typeface..Properties.weight};\r\t\t\t\t\tIF valid # {} THEN\r\t\t\t\t\t\tNEW(fop); fop.ctrl := c;\r\t\t\t\t\t\tface := c.font.typeface$; size := c.font.size; style := c.font.style; weight := c.font.weight;\r\t\t\t\t\t\tIF Properties.typeface IN p.valid THEN face := p.typeface$;\r\t\t\t\t\t\t\tIF face = Fonts.default THEN face := StdCFrames.defaultFont.typeface END\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF Properties.size IN p.valid THEN size := p.size END;\r\t\t\t\t\t\tIF Properties.style IN p.valid THEN\r\t\t\t\t\t\t\tstyle := (p.style.val * p.style.mask) + (style - p.style.mask)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF Properties.weight IN p.valid THEN weight := p.weight END;\r\t\t\t\t\t\tfop.custom := TRUE;\r\t\t\t\t\t\tfop.font := Fonts.dir.This(face, size, style, weight);\r\t\t\t\t\t\tIF (fop.font.typeface = StdCFrames.defaultFont.typeface)\r\t\t\t\t\t\t& (fop.font.size = StdCFrames.defaultFont.size)\r\t\t\t\t\t\t& (fop.font.style = StdCFrames.defaultFont.style)\r\t\t\t\t\t\t& (fop.font.weight = StdCFrames.defaultFont.weight) THEN\r\t\t\t\t\t\t\tfop.custom := FALSE;\r\t\t\t\t\t\t\tfop.font := StdCFrames.defaultFont\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\tEND;\r\t\t\t\tp := p.next\r\t\t\tEND;\r\t\t\tIF op # NIL THEN Views.Do(c, \"#System:SetProp\", op) END;\r\t\t\tIF fop # NIL THEN Views.Do(c, \"#System:SetProp\", fop) END\r\t\t| msg: Properties.TypePref DO\r\t\t\tIF Services.Is(c, msg.type) THEN msg.view := c END\r\t\tELSE\r\t\tEND;\r\t\tc.HandlePropMsg2(msg)\r\tEND HandlePropMsg;\r\r\r\t"
                    attr: 0
                  - text: "(* Op *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (op: Op) Do;\r\t\tVAR c: Control; prop: Prop;\r\tBEGIN\r\t\tc := op.ctrl;\r\t\tprop := Properties.CopyOf(c.prop)(Prop);\r\t\tprop.valid := op.prop.valid;\t"
                    attr: 0
                  - text: "(* fields to be restored *)"
                    attr: 1
                  - text: "\r\t\tIF link IN op.prop.valid THEN c.prop.link := op.prop.link END;\r\t\tIF label IN op.prop.valid THEN c.prop.label := op.prop.label END;\r\t\tIF guard IN op.prop.valid THEN c.prop.guard := op.prop.guard END;\r\t\tIF notifier IN op.prop.valid THEN c.prop.notifier := op.prop.notifier END;\r\t\tIF level IN op.prop.valid THEN c.prop.level := op.prop.level END;\r\t\tIF opt0 IN op.prop.valid THEN c.prop.opt[0] := op.prop.opt[0] END;\r\t\tIF opt1 IN op.prop.valid THEN c.prop.opt[1] := op.prop.opt[1] END;\r\t\tIF opt2 IN op.prop.valid THEN c.prop.opt[2] := op.prop.opt[2] END;\r\t\tIF opt3 IN op.prop.valid THEN c.prop.opt[3] := op.prop.opt[3] END;\r\t\tIF opt4 IN op.prop.valid THEN c.prop.opt[4] := op.prop.opt[4] END;\r\t\tIF c.prop.guard # prop.guard THEN c.guardErr := FALSE END;\r\t\tIF c.prop.notifier # prop.notifier THEN c.notifyErr := FALSE END;\r\t\tIF c.prop.link # prop.link THEN OpenLink(c, c.prop) ELSE CallGuard(c) END;\r\t\top.prop := prop;\r\t\tViews.Update(c, Views.rebuildFrames)\r\tEND Do;\r\r\tPROCEDURE (op: FontOp) Do;\r\t\tVAR c: Control; custom: BOOLEAN; font: Fonts.Font;\r\tBEGIN\r\t\tc := op.ctrl;\r\t\tcustom := c.customFont; c.customFont := op.custom; op.custom := custom;\r\t\tfont := c.font; c.font := op.font; op.font := font;\r\t\tViews.Update(c, Views.rebuildFrames)\r\tEND Do;\r\r\r"
                    attr: 0
                  - text: "\t(* ------------------------- standard controls ------------------------- *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE CatchCtrlMsg (c: Control; f: Views.Frame; VAR msg: Controllers.Message;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\tBEGIN\r\t\tIF ~c.disabled THEN\r\t\t\tWITH f: StdCFrames.Frame DO\r\t\t\t\tWITH msg: Controllers.PollCursorMsg DO\r\t\t\t\t\tf.GetCursor(msg.x, msg.y, msg.modifiers, msg.cursor)\r\t\t\t\t| msg: Controllers.PollOpsMsg DO\r\t\t\t\t\tmsg.valid := {Controllers.pasteChar}\r\t\t\t\t| msg: Controllers.TrackMsg DO\r\t\t\t\t\tf.MouseDown(msg.x, msg.y, msg.modifiers)\r\t\t\t\t| msg: Controllers.MarkMsg DO\r\t\t\t\t\tf.Mark(msg.show, msg.focus)\r\t\t\t\t|msg: Controllers.WheelMsg DO\r\t\t\t\t\tf.WheelMove(msg.x, msg.y, msg.op, msg.nofLines, msg.done)\r\t\t\t\tELSE\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND CatchCtrlMsg;\r\t\r\r\t"
