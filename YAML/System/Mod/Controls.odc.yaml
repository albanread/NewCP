                  - text: "\r\r\tPROCEDURE (a: Action) Do;\r\t\tVAR msg: Views.NotifyMsg;\r\tBEGIN\r\t\tIF Windows.dir # NIL THEN\r\t\t\tIF a.w # NIL THEN\r\t\t\t\tINC(a.cnt);\r\t\t\t\tmsg.id0 := 0; msg.id1 := 0; msg.opts := {guardCheck};\r\t\t\t\tIF a.w.seq # NIL THEN a.w.seq.Handle(msg) END;\r\t\t\t\ta.w := Windows.dir.Next(a.w);\r\t\t\t\tWHILE (a.w # NIL) & a.w.sub DO a.w := Windows.dir.Next(a.w) END\r\t\t\tELSE\r\t\t\t\tIF a.cnt = 0 THEN a.resolution := Services.resolution\r\t\t\t\tELSE a.resolution := Services.resolution DIV a.cnt DIV 2\r\t\t\t\tEND;\r\t\t\t\ta.cnt := 0;\r\t\t\t\ta.w := Windows.dir.First();\r\t\t\t\tWHILE (a.w # NIL) & a.w.sub DO a.w := Windows.dir.Next(a.w) END\r\t\t\tEND\r\t\tEND;\r\t\tServices.DoLater(a, Services.Ticks() + a.resolution)\r\tEND Do;\r\rBEGIN\r\tInit;\r\tNEW(action); action.w := NIL; action.cnt := 0; Services.DoLater(action, Services.now)\rCLOSE\r\tServices.RemoveAction(action)\rEND Controls.\r"
