                  - text: "\r\tIMPORT TextMappers, TextControllers;\r\r\tVAR\r\t\t"
                    attr: 0
                  - text: Done
                    attr: 3
                  - text: "-: BOOLEAN;\r\t\ts: TextMappers.Scanner;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Open
                    attr: 3
                  - text: "*;\r\t\tVAR c: TextControllers.Controller; beg, end: INTEGER;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF c # NIL THEN\r\t\t\tIF c.HasSelection() THEN c.GetSelection(beg, end) ELSE beg := 0 END;\r\t\t\ts.ConnectTo(c.text); s.SetPos(beg); s.rider.Read; Done := TRUE\r\t\tELSE\r\t\t\ts.ConnectTo(NIL); Done := FALSE\r\t\tEND\r\tEND Open;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Char
                    attr: 3
                  - text: "* (OUT ch: CHAR);\r\tBEGIN\r\t\tIF Done THEN\r\t\t\tIF s.rider.eot THEN Done := FALSE\r\t\t\tELSE ch := s.rider.char; s.rider.Read\r\t\t\tEND\r\t\tEND\r\tEND Char;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Int
                    attr: 3
                  - text: "* (OUT i: INTEGER);\r\tBEGIN\r\t\tIF Done THEN\r\t\t\ts.Scan;\r\t\t\tIF (s.type = TextMappers.int) THEN\r\t\t\t\ti := s.int\r\t\t\tELSE Done := FALSE\r\t\t\tEND\r\t\tEND\r\tEND Int;\r\r\tPROCEDURE "
                    attr: 0
                  - text: LongInt
                    attr: 3
                  - text: "* (OUT l: LONGINT);\r\tBEGIN\r\t\tIF Done THEN\r\t\t\ts.Scan;\r\t\t\tIF (s.type = TextMappers.lint) OR (s.type = TextMappers.int) THEN\r\t\t\t\tl := s.lint\r\t\t\tELSE Done := FALSE\r\t\t\tEND\r\t\tEND\r\tEND LongInt;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Real
                    attr: 3
                  - text: "* (OUT x: REAL);\r\tBEGIN\r\t\tIF Done THEN\r\t\t\ts.Scan;\r\t\t\tIF s.type = TextMappers.real THEN\r\t\t\t\tx := SHORT(s.real)\r\t\t\tELSIF s.type = TextMappers.int THEN\r\t\t\t\tx := s.int\r\t\t\tELSE Done := FALSE\r\t\t\tEND\r\t\tEND\r\tEND Real;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Name
