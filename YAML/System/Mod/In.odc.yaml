                  - text: "* (OUT name: ARRAY OF CHAR);\r\tBEGIN\r\t\tIF Done THEN\r\t\t\ts.Scan;\r\t\t\tTextMappers.ScanQualIdent(s, name, Done)\r\t\tEND\r\tEND Name;\r\r\tPROCEDURE "
