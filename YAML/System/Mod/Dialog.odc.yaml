                    attr: 1
                  - text: "\r\t\t\tIF (t.firstRoot = NIL) OR (pos = 0) THEN\r\t\t\t\tnode.next := t.firstRoot; node.prev := NIL;\r\t\t\t\tIF t.firstRoot # NIL THEN t.firstRoot.prev := node END;\r\t\t\t\tt.firstRoot := node\r\t\t\tELSE\r\t\t\t\tcur := t.firstRoot;\r\t\t\t\tIF pos = lastPos THEN pos := t.nofRoots END;\r\t\t\t\tWHILE (cur # NIL) & (pos > 0) DO\r\t\t\t\t\tprev := cur; cur := t.Next(cur); DEC(pos)\r\t\t\t\tEND;\r\t\t\t\tIF cur = NIL THEN\r\t\t\t\t\tprev.next := node; node.prev := prev\r\t\t\t\tELSE\r\t\t\t\t\tnode.next := cur; node.prev := cur.prev; cur.prev := node; prev.next := node\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tINC(t.nofRoots)\r\t\tELSE\t"
