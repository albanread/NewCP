                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Files, Math;\r\r\tCONST\r\t\tB = 10000; DecPerDig = 4; BinBase = 16 * 1024;\r\t\tKaratsubaBreak = 41;\r\r\tTYPE\r\t\tIndex = INTEGER;\r\t\tDigit = SHORTINT;\r\t\tDoubleDigit = INTEGER;\r\r\t\tIntegerDesc = ARRAY OF Digit;\t(* "
                    attr: 0
                  - text: to hide internal structure from interface
                    attr: 1
                  - text: " *)\r\t\t"
                    attr: 0
                  - text: Integer
                    attr: 3
                  - text: "* = POINTER TO IntegerDesc;\r\t\tBuffer = RECORD\r\t\t\tdigit: Integer;\r\t\t\tbeg, len: Index\r\t\tEND;\r\r\tVAR zero, one, two, buf6: Integer;\r\r\tPROCEDURE CopyOf (x: Integer; len: Index): Integer;\r\t\tVAR buf: Integer;\r\tBEGIN\r\t\tASSERT(len > 0, 20);\r\t\tNEW(buf, len);\r\t\tREPEAT DEC(len); buf[len] := x[len] UNTIL len = 0;\r\t\tRETURN buf\r\tEND CopyOf;\r\r\t(* "
                    attr: 0
                  - text: Operations on Digits
                    attr: 1
                  - text: " *)\r\r\tPROCEDURE Add (x, y, sum: Integer; xL, yL: Index; OUT sumL: Index);\r\t\tVAR i, l: Index; c: Digit;\r\tBEGIN\r\t\tl := MIN(xL, yL);\r\t\ti := 0; c := 0;\r\t\tWHILE i < l DO c := SHORT(c DIV B + x[i] + y[i]); sum[i] := SHORT(c MOD B); INC(i) END;\r\t\tWHILE i < xL DO c := SHORT(c DIV B + x[i]); sum[i] := SHORT(c MOD B); INC(i) END;\r\t\tWHILE i < yL DO c := SHORT(c DIV B + y[i]); sum[i] := SHORT(c MOD B); INC(i) END;\r\t\tIF c >= B THEN sum[i] := SHORT(c DIV B); INC(i) END;\r\t\tsumL := i\r\tEND Add;\r\r\tPROCEDURE Subtract (x, y, dif: Integer; xL, yL: Index; OUT difL: Index);\r\t\tVAR i: Index; c, d: Digit;\r\tBEGIN\r\t\tASSERT(xL >= yL, 20);\r\t\ti := 0; difL := 0; c := 0;\r\t\tWHILE i < yL DO\r\t\t\tc := SHORT(c DIV B + x[i] - y[i]); d := SHORT(c MOD B);\r\t\t\tIF d # 0 THEN\r\t\t\t\tWHILE difL # i DO dif[difL] := 0; INC(difL) END;\r\t\t\t\tdif[i] := d; INC(difL)\r\t\t\tEND;\r\t\t\tINC(i)\r\t\tEND;\r\t\tWHILE i < xL DO\r\t\t\tc := SHORT(c DIV B + x[i]); d := SHORT(c MOD B);\r\t\t\tIF d # 0 THEN\r\t\t\t\tWHILE difL # i DO dif[difL] := 0; INC(difL) END;\r\t\t\t\tdif[i] := d; INC(difL)\r\t\t\tEND;\r\t\t\tINC(i)\r\t\tEND;\r\t\tASSERT(c DIV B = 0, 100)\r\tEND Subtract;\r\r\tPROCEDURE OneDigitMult (a, b: Buffer; VAR c: Buffer);\r\t\tVAR i: Index; carry, factor: DoubleDigit;\r\tBEGIN\r\t\tASSERT(a.len = 1, 20);\r\t\tfactor := a.digit[a.beg]; i := 0; carry := 0;\r\t\tWHILE i # b.len DO\r\t\t\tcarry := carry DIV B + factor * b.digit[b.beg + i]; c.digit[c.beg + i] := SHORT(carry MOD B);\r\t\t\tINC(i)\r\t\tEND;\r\t\tIF carry >= B THEN c.digit[c.beg + i] := SHORT(carry DIV B); INC(i) END;\r\t\tc.len := i\r\tEND OneDigitMult;\r\r\tPROCEDURE SimpleMult (a, b: Buffer; VAR c: Buffer);\r\t\tVAR i, j, k: Index; c0, c1: DoubleDigit;\r\tBEGIN\r\t\tASSERT(a.len <= b.len, 20);\r\t\tc.len := a.len + b.len - 1;\r\t\ti := 0; c0 := 0; c1 := 0;\r\t\tREPEAT\r\t\t\tIF i < b.len THEN\r\t\t\t\tIF i < a.len THEN j := i; k := 0 ELSE j := a.len - 1; k := i - a.len + 1 END;\r\t\t\t\tREPEAT\r\t\t\t\t\tc0 := c0 + a.digit[a.beg + j] * b.digit[b.beg + k];\r\t\t\t\t\tIF c0 > MAX(DoubleDigit) - BinBase * (B - 1) THEN\r\t\t\t\t\t\tc1 := c1 + c0 DIV BinBase; c0 := c0 MOD BinBase\r\t\t\t\t\tEND;\r\t\t\t\t\tDEC(j); INC(k)\r\t\t\t\tUNTIL j < 0\r\t\t\tELSE\r\t\t\t\tj := a.len - 1; k := i - a.len + 1;\r\t\t\t\tREPEAT\r\t\t\t\t\tc0 := c0 + a.digit[a.beg + j] * b.digit[b.beg + k];\r\t\t\t\t\tIF c0 > MAX(DoubleDigit) - BinBase * (B - 1) THEN\r\t\t\t\t\t\tc1 := c1 + c0 DIV BinBase; c0 := c0 MOD BinBase\r\t\t\t\t\tEND;\r\t\t\t\t\tDEC(j); INC(k)\r\t\t\t\tUNTIL k = b.len\r\t\t\tEND;\r\t\t\tIF c1 = 0 THEN c.digit[c.beg + i] := SHORT(c0 MOD B); c0 := c0 DIV B\r\t\t\tELSE\r\t\t\t\tc0 := c0 + BinBase * (c1 MOD B);\r\t\t\t\tc.digit[c.beg + i] := SHORT(c0 MOD B); c0 := c0 DIV B; c1 := c1 DIV B\r\t\t\tEND;\r\t\t\tINC(i)\r\t\tUNTIL i = c.len;\r\t\tIF c0 # 0 THEN c.digit[c.beg + c.len] := SHORT(c0); INC(c.len) END\r\tEND SimpleMult;\r\r\tPROCEDURE AddBuf (a, b: Buffer; VAR c: Buffer);\t(* "
                    attr: 0
                  - text: "c := a + b"
                    attr: 1
                  - text: " *)\r\t\tVAR i: Index; carry: Digit;\r\tBEGIN\r\t\tASSERT(a.len <= b.len, 20);\r\t\ti := 0; carry := 0;\r\t\tWHILE i # a.len DO\r\t\t\tcarry := SHORT(carry DIV B + a.digit[a.beg + i] + b.digit[b.beg + i]);\r\t\t\tc.digit[c.beg + i] := SHORT(carry MOD B);\r\t\t\tINC(i)\r\t\tEND;\r\t\tWHILE (i # b.len) & (carry >= B) DO\r\t\t\tcarry := SHORT(carry DIV B + b.digit[b.beg + i]); c.digit[c.beg + i] := SHORT(carry MOD B);\r\t\t\tINC(i)\r\t\tEND;\r\t\tIF carry >= B THEN c.digit[c.beg + i] := SHORT(carry DIV B); INC(i)\r\t\tELSE\r\t\t\tWHILE i # b.len DO c.digit[c.beg + i] := b.digit[b.beg + i]; INC(i) END\r\t\tEND;\r\t\tc.len := i\r\tEND AddBuf;\r\r\tPROCEDURE AddToBuf (VAR a: Buffer; b: Buffer; shift: Index);\t(* "
                    attr: 0
                  - text: "a := a + b * B^shift"
                    attr: 1
                  - text: " *)\r\t\tVAR i, n: Index; carry: Digit;\r\tBEGIN\r\t\tb.beg := b.beg - shift; b.len := b.len + shift; i := shift; n := MIN(a.len, b.len); carry := 0;\r\t\tWHILE i # n DO\r\t\t\tcarry := SHORT(carry DIV B + a.digit[a.beg + i] + b.digit[b.beg + i]);\r\t\t\ta.digit[a.beg + i] := SHORT(carry MOD B);\r\t\t\tINC(i)\r\t\tEND;\r\t\tIF i # a.len THEN\r\t\t\tWHILE (i # a.len) & (carry >= B) DO\r\t\t\t\tcarry := SHORT(carry DIV B + a.digit[a.beg + i]); a.digit[a.beg + i] := SHORT(carry MOD B);\r\t\t\t\tINC(i)\r\t\t\tEND;\r\t\t\tIF carry >= B THEN a.digit[a.beg + i] := SHORT(carry DIV B); INC(i) END\r\t\tELSE\r\t\t\tWHILE (i # b.len) & (carry >= B) DO\r\t\t\t\tcarry := SHORT(carry DIV B + b.digit[b.beg + i]); a.digit[a.beg + i] := SHORT(carry MOD B);\r\t\t\t\tINC(i)\r\t\t\tEND;\r\t\t\tIF carry >= B THEN a.digit[a.beg + i] := SHORT(carry DIV B); INC(i)\r\t\t\tELSE\r\t\t\t\tWHILE i # b.len DO a.digit[a.beg + i] := b.digit[b.beg + i]; INC(i) END\r\t\t\tEND\r\t\tEND;\r\t\ta.len := MAX(i, a.len)\r\tEND AddToBuf;\r\r\tPROCEDURE SubtractFromBuf (VAR a: Buffer; b, c: Buffer);\t(* "
                    attr: 0
                  - text: "a := a - b - c"
                    attr: 1
                  - text: " *)\r\t\tVAR i: Index; carry: Digit;\r\tBEGIN\r\t\tASSERT(b.len <= c.len, 20);\r\t\ti := 0; carry := 0;\r\t\tWHILE i # b.len DO\r\t\t\tcarry := SHORT(carry DIV B + a.digit[a.beg + i] - b.digit[b.beg + i] - c.digit[c.beg + i]);\r\t\t\ta.digit[a.beg + i] := SHORT(carry MOD B);\r\t\t\tINC(i)\r\t\tEND;\r\t\tWHILE i # c.len DO\r\t\t\tcarry := SHORT(carry DIV B + a.digit[a.beg + i] - c.digit[c.beg + i]);\r\t\t\ta.digit[a.beg + i] := SHORT(carry MOD B);\r\t\t\tINC(i)\r\t\tEND;\r\t\tWHILE carry < 0 DO\r\t\t\tcarry := SHORT(carry DIV B + a.digit[a.beg + i]); a.digit[a.beg + i]  := SHORT(carry MOD B);\r\t\t\tINC(i)\r\t\tEND;\r\t\tASSERT(i <= a.len, 100);\r\t\tWHILE (a.len # 0) & (a.digit[a.beg + a.len - 1] = 0) DO DEC(a.len) END\r\tEND SubtractFromBuf;\r\r\tPROCEDURE KStep (a, b: Buffer; VAR c: Buffer; stack: Buffer);\r\t\tVAR n2, i: Index; a0, a1, b0, b1, c0, c1, h: Buffer;\r\tBEGIN\r\t\tASSERT(a.len <= b.len, 20);\r\t\tIF a.len = 0 THEN c.len := 0\r\t\tELSIF a.len = 1 THEN OneDigitMult(a, b, c)\r\t\tELSIF a.len <= KaratsubaBreak THEN SimpleMult(a, b, c)\r\t\tELSE\r\t\t\tn2 := b.len DIV 2;\r\t\t\tc0.digit := c.digit; c0.beg := c.beg; c1.digit := c.digit; c1.beg := c.beg + 2 * n2;\r\t\t\ta0.digit := a.digit; a0.beg := a.beg; a0.len := MIN(a.len, n2);\r\t\t\ta1.digit := a.digit; a1.beg := a.beg + n2; a1.len := MAX(0, a.len - n2);\r\t\t\tWHILE (a0.len # 0) & (a0.digit[a0.beg + a0.len - 1] = 0) DO DEC(a0.len) END;\r\t\t\tb0.digit := b.digit; b0.beg := b.beg; b0.len := MIN(b.len, n2);\r\t\t\tb1.digit := b.digit; b1.beg := b.beg + n2; b1.len := MAX(0, b.len - n2);\r\t\t\tWHILE (b0.len # 0) & (b0.digit[b0.beg + b0.len - 1] = 0) DO DEC(b0.len) END;\r\t\t\tIF (a0.len # 0) OR (b0.len # 0) THEN\r\t\t\t\tIF a0.len <= a1.len THEN AddBuf(a0, a1, c1) ELSE AddBuf(a1, a0, c1) END;\r\t\t\t\tIF b0.len <= b1.len THEN AddBuf(b0, b1, c0) ELSE AddBuf(b1, b0, c0) END;\r\t\t\t\th.digit := stack.digit; h.beg := stack.beg; stack.beg := stack.beg + c0.len + c1.len;\r\t\t\t\tIF c0.len <= c1.len THEN KStep(c0, c1, h, stack) ELSE KStep(c1, c0, h, stack) END;\r\t\t\t\tIF a0.len <= b0.len THEN KStep(a0, b0, c0, stack) ELSE KStep(b0, a0, c0, stack) END;\r\t\t\t\tKStep(a1, b1, c1, stack);\r\t\t\t\tIF c0.len <= c1.len THEN SubtractFromBuf(h, c0, c1) ELSE SubtractFromBuf(h, c1, c0) END;\r\t\t\t\tIF c1.len # 0 THEN\r\t\t\t\t\ti := c0.beg + c0.len;\r\t\t\t\t\tWHILE i < c1.beg DO c.digit[i] := 0; INC(i) END;\r\t\t\t\t\tc.len := c1.beg + c1.len - c.beg\r\t\t\t\tELSE\r\t\t\t\t\tWHILE c0.len < n2 DO c0.digit[c0.beg + c0.len] := 0; INC(c0.len) END;\r\t\t\t\t\tc.len := c0.len\r\t\t\t\tEND;\r\t\t\t\tASSERT(h.len # 0, 100);\r\t\t\t\tAddToBuf(c, h, n2)\r\t\t\tELSE\r\t\t\t\tKStep(a1, b1, c1, stack); c.len := c1.beg + c1.len - c.beg;\r\t\t\t\ti := c.beg;\r\t\t\t\tWHILE i # c1.beg DO c.digit[i] := 0; INC(i) END\r\t\t\tEND\r\t\tEND\r\tEND KStep;\r\r\tPROCEDURE Karatsuba (x, y, pro:Integer; xL, yL: Index; OUT proL: Index);\r\t\tVAR a, b, c, stack: Buffer;\r\tBEGIN\r\t\tASSERT(xL <= yL, 20);\r\t\ta.digit := x; a.beg := 0; a.len := xL; b.digit := y; b.beg := 0; b.len := yL;\r\t\tc.digit := pro; c.beg := 0;\r\t\tNEW(stack.digit, 2 * b.len); stack.beg := 0;\r\t\tKStep(a, b, c, stack);\r\t\tproL := c.len\r\tEND Karatsuba;\r\t\r\tPROCEDURE Multiply (x, y, pro: Integer; xL, yL: Index; OUT proL: Index);\r\t\tVAR i, j, k: Index; c0, c1: DoubleDigit;\r\tBEGIN\r\t\tASSERT(xL <= yL, 20);\r\t\tIF xL > KaratsubaBreak THEN Karatsuba(x, y, pro, xL, yL, proL)\r\t\tELSIF xL = 1 THEN\r\t\t\tproL := 0; c1 := x[0]; c0 := 0;\r\t\t\tWHILE proL < yL DO\r\t\t\t\tc0 := c1 * y[proL] + c0; pro[proL] := SHORT(c0 MOD B);\r\t\t\t\tc0 := c0 DIV B ; INC(proL)\r\t\t\tEND;\r\t\t\tIF c0 # 0 THEN pro[proL] := SHORT(c0); INC(proL) END\r\t\tELSE\r\t\t\tproL := xL + yL - 1;\r\t\t\ti := 0; c0 := 0; c1 := 0;\r\t\t\tREPEAT\r\t\t\t\tIF i < yL THEN\r\t\t\t\t\tIF i < xL THEN j := i; k := 0 ELSE j := xL - 1; k := i - xL + 1 END;\r\t\t\t\t\tREPEAT\r\t\t\t\t\t\tc0 := c0 + x[j] * y[k];\r\t\t\t\t\t\tIF c0 > MAX(DoubleDigit) - BinBase * (B - 1) THEN\r\t\t\t\t\t\t\tc1 := c1 + c0 DIV BinBase; c0 := c0 MOD BinBase\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tDEC(j); INC(k)\r\t\t\t\t\tUNTIL j < 0\r\t\t\t\tELSE\r\t\t\t\t\tj := xL - 1; k := i - xL + 1;\r\t\t\t\t\tREPEAT\r\t\t\t\t\t\tc0 := c0 + x[j] * y[k];\r\t\t\t\t\t\tIF c0 > MAX(DoubleDigit) - BinBase * (B - 1) THEN\r\t\t\t\t\t\t\tc1 := c1 + c0 DIV BinBase; c0 := c0 MOD BinBase\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tDEC(j); INC(k)\r\t\t\t\t\tUNTIL k = yL\r\t\t\t\tEND;\r\t\t\t\tIF c1 = 0 THEN pro[i] := SHORT(c0 MOD B); c0 := c0 DIV B\r\t\t\t\tELSE c0 := c0 + BinBase * (c1 MOD B); pro[i] := SHORT(c0 MOD B);\r\t\t\t\t\tc0 := c0 DIV B; c1 := c1 DIV B\r\t\t\t\tEND;\r\t\t\t\tINC(i)\r\t\t\tUNTIL i = proL;\r\t\t\tIF c0 # 0 THEN pro[proL] := SHORT(c0); INC(proL) END\r\t\tEND\r\tEND Multiply;\r\r\tPROCEDURE DecomposeQuoRem (x, y: Integer; xL, yL: Index);\r\t\tVAR ix, iy, j: Index; d, q, h, yLead, ySecond: DoubleDigit; yBuf: Integer;\r\tBEGIN\r\t\tASSERT((yL # 0) & (y[yL - 1] # 0), 20);\r\t\tIF yL = 1 THEN\r\t\t\tj := xL - 1; h := 0; d := y[0];\r\t\t\tWHILE j >= 0 DO h := x[j] + h * B; x[j + 1] := SHORT(h DIV d); h := h MOD d; DEC(j) END;\r\t\t\tx[0] := SHORT(h)\r\t\tELSIF xL >= yL THEN\r\t\t\tx[xL] := 0; d := (B DIV 2 - 1) DIV y[yL - 1] + 1; yBuf := CopyOf(y, yL);\r\t\t\tIF d # 1 THEN\r\t\t\t\tj := 0; h := 0;\r\t\t\t\tWHILE j < xL DO h := d * x[j] + h DIV B; x[j] := SHORT(h MOD B); INC(j) END;\r\t\t\t\tx[xL] := SHORT(h DIV B);\r\t\t\t\tj := 0; h := 0;\r\t\t\t\tWHILE j < yL DO h := d * yBuf[j] + h DIV B; yBuf[j] := SHORT(h MOD B); INC(j) END;\r\t\t\t\tASSERT(h DIV B = 0, 100)\r\t\t\tEND;\r\t\t\tyLead := yBuf[yL - 1]; ySecond := yBuf[yL - 2]; j := xL;\r\t\t\tWHILE j >= yL DO\r\t\t\t\tIF x[j] # yLead THEN q := (x[j] * B + x[j - 1]) DIV yLead ELSE q := B - 1 END;\r\t\t\t\tWHILE ySecond * q > (x[j] * B + x[j - 1] - yLead * q) * B + x[j - 2] DO\r\t\t\t\t\tDEC(q)\r\t\t\t\tEND;\r\t\t\t\tix := j - yL; iy := 0; h := 0;\r\t\t\t\tWHILE iy < yL DO\r\t\t\t\t\th := x[ix] -