                  - text: "\t\t\tELSE\r\t\t\t\tGetValidOps(c, valid);\r\t\t\t\tIF msg.op IN valid THEN\r\t\t\t\t\tCASE msg.op OF\r\t\t\t\t\t| Controllers.pasteChar:\r\t\t\t\t\t\tIF msg.char >= \" \" THEN\r\t\t\t\t\t\t\tc.PasteChar(msg.char)\r\t\t\t\t\t\tELSIF (AL <= msg.char) & (msg.char <= AD) OR\r\t\t\t\t\t\t\t(PL <= msg.char) & (msg.char <= DD) THEN\r\t\t\t\t\t\t\tselect := Controllers.extend IN msg.modifiers;\r\t\t\t\t\t\t\tunits := Controllers.modify IN msg.modifiers;\r\t\t\t\t\t\t\tc.ArrowChar(f, msg.char, units, select)\r\t\t\t\t\t\tELSE c.ControlChar(f, msg.char)\r\t\t\t\t\t\tEND\r\t\t\t\t\t| Controllers.cut, Controllers.copy:\r\t\t\t\t\t\tCopyView(c, msg.view, msg.w, msg.h);\r\t\t\t\t\t\tmsg.isSingle := c.Singleton() # NIL;\r\t\t\t\t\t\tIF msg.op = Controllers.cut THEN c.DeleteSelection END\r\t\t\t\t\t| Controllers.paste:\r\t\t\t\t\t\tIF msg.isSingle THEN\r\t\t\t\t\t\t\tc.PasteView(f, msg.view (* Views.CopyOf(msg.view, Views.deep) *), msg.w, msg.h)\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tPaste(c, f, msg.view, msg.w, msg.h)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSIF (c.opts * modeOpts # mask)\r\t\t\t\t& (msg.op = Controllers.pasteChar) & (msg.char = ESC)\r\t\t\t\t& (~(f IS Views.RootFrame) OR (31 IN c.opts))\r\t\t\t\t& (c = FocusEditor()) \r\t\t\t\t& ((Controllers.extend IN msg.modifiers) OR ~FocusHasSel()) THEN\r\t\t\tIF 31 IN c.opts THEN INCL(msg.modifiers, 31)\r\t\t\tELSE c.SetSingleton(focus)\r\t\t\tEND;\r\t\t\tfocus := NIL\r\t\tELSIF (c.opts * modeOpts # mask) & (c = Focus()) THEN\r\t\t\t"
