                  - text: "(** general marking protocol **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE CheckMaskFocus (c: Controller; f: Views.Frame; VAR focus: Views.View);\r\t\tVAR v: Views.View;\r\tBEGIN\r\t\tIF f.mark & (c.opts * modeOpts = mask) & (c.model # NIL) & ((focus = NIL) OR ~ClaimFocus(focus)) THEN\r\t\t\tc.GetFirstView(any, v);\r\t\t\tWHILE (v # NIL) & ~ClaimFocus(v) DO c.GetNextView(any, v) END;\r\t\t\tIF v # NIL THEN\r\t\t\t\tc.SetFocus(v);\r\t\t\t\tfocus := v\r\t\t\tELSE c.SetFocus(NIL); focus := NIL\r\t\t\tEND\r\t\tEND\r\tEND CheckMaskFocus;\r\t\r\tPROCEDURE (c: Controller) "
