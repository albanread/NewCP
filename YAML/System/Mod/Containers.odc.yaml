                    attr: 3
                  - text: "\r\t\tVAR focus0: Views.View; con: Models.Context; msg: FocusMsg;\r\tBEGIN\r\t\tASSERT(c.model # NIL, 20);\r\t\tfocus0 := c.focus;\r\t\tIF focus # focus0 THEN\r\t\t\tIF focus # NIL THEN\r\t\t\t\tcon := focus.context;\r\t\t\t\tASSERT(con # NIL, 21); ASSERT(con.ThisModel() = c.model, 22);\r\t\t\t\tIF focus0 = NIL THEN c.view.Neutralize END\r\t\t\tEND;\r\t\t\tIF focus0 # NIL THEN\r\t\t\t\tIF ~Views.IsInvalid(focus0) THEN focus0.Neutralize END;\r\t\t\t\tc.bVis := FALSE; msg.set := FALSE; Views.Broadcast(c.view, msg)\r\t\t\tEND;\r\t\t\tc.focus := focus;\r\t\t\tIF focus # NIL THEN\r\t\t\t\tc.MakeViewVisible(focus);\r\t\t\t\tc.bVis := TRUE; msg.set := TRUE; Views.Broadcast(c.view, msg)\r\t\t\tEND\r\t\tEND\r\tEND SetFocus;\r\r\tPROCEDURE (c: Controller) "
