                  - text: "\r\t\t\tIF (msg.op = Controllers.pasteChar) & (msg.char = ESC) THEN\r\t\t\t\tg := Views.ThisFrame(f, focus);\r\t\t\t\tIF g # NIL THEN sel.set := FALSE; Views.ForwardCtrlMsg(g, sel) END\r\t\t\tEND\r\t\tELSIF (c.opts * modeOpts = mask) & (msg.op = Controllers.pasteChar) THEN\r\t\t\tIF alt IN msg.modifiers THEN\r\t\t\t\tCollectControlPref (c, NIL, msg.char, TRUE, v, getFocus, accepts)\r\t\t\tELSE\r\t\t\t\tCollectControlPref (c, focus, msg.char, TRUE, v, getFocus, accepts)\r\t\t\tEND;\r\t\t\t IF v = NIL THEN\r\t\t\t\tCheckMaskFocus(c, f, focus);\r\t\t\t\tCollectControlPref(c, focus, msg.char, TRUE, v, getFocus, accepts)\r\t\t\tEND;\r\t\t\tIF v # NIL THEN\r\t\t\t\tIF getFocus & (v # focus) THEN\r\t\t\t\t\tc.SetFocus(v)\r\t\t\t\tEND;\r\t\t\t\tIF accepts THEN\r\t\t\t\t\tg := Views.ThisFrame(f, v);\r\t\t\t\t\tIF g # NIL THEN Views.ForwardCtrlMsg(g, msg) END\r\t\t\t\tEND;\r\t\t\t\tfocus := NIL\r\t\t\tEND\r\t\tEND\r\tEND Edit;\r\r\tPROCEDURE PollCursor (c: Controller; f: Views.Frame; VAR msg: Controllers.PollCursorMsg; VAR focus: Views.View);\r\t\tVAR l, t, r, b: INTEGER; cursor: INTEGER; sel: Views.View; obj: Views.Frame; inSel: BOOLEAN;\r\tBEGIN\r\t\tcursor := Mechanisms.outside; sel := c.Singleton();\r\t\tIF focus # NIL THEN\r\t\t\tc.view.GetRect(f, focus, l, t, r, b);\r\t\t\tIF (BorderVisible(c, f) OR (f IS Views.RootFrame)) & ~(noSelection IN c.opts) THEN\r\t\t\t\tcursor := Mechanisms.FocusBorderCursor(f, focus, l, t, r, b, msg.x, msg.y)\r\t\t\tELSIF (msg.x >= l) & (msg.x <= r) & (msg.y >= t) & (msg.y <= b) THEN\r\t\t\t\tcursor := Mechanisms.inside\r\t\t\tEND\r\t\tELSIF sel # NIL THEN\r\t\t\tc.view.GetRect(f, sel, l, t, r, b);\r\t\t\tcursor := Mechanisms.SelBorderCursor(f, sel, l, t, r, b, msg.x, msg.y)\r\t\tEND;\r\t\tIF cursor >= 0 THEN\r\t\t\tmsg.cursor := cursor; focus := NIL\r\t\tELSIF (focus # NIL) & (cursor = Mechanisms.inside) THEN\r"
