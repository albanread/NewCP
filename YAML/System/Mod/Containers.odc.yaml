                  - text: "\r\t\tVAR con: Models.Context; msg: SingletonMsg;\r\tBEGIN\r\t\tASSERT(c.model # NIL, 20);\r\t\tASSERT(~(noSelection IN c.opts), 21);\r\t\tIF c.singleton # s THEN\r\t\t\tIF s # NIL THEN\r\t\t\t\tcon := s.context;\r\t\t\t\tASSERT(con # NIL, 22); ASSERT(con.ThisModel() = c.model, 23);\r\t\t\t\tc.view.Neutralize\r\t\t\tELSIF c.singleton # NIL THEN\r\t\t\t\tc.bVis := FALSE; msg.set := FALSE; Views.Broadcast(c.view, msg)\r\t\t\tEND;\r\t\t\tc.singleton := s;\r\t\t\tIF s # NIL THEN c.bVis := TRUE; msg.set := TRUE; Views.Broadcast(c.view, msg) END\r\t\tEND\r\tEND SetSingleton;\r\t\r\tPROCEDURE (c: Controller) "
