                  - text: " (VAR msg: Models.Message), NEW, EXTENSIBLE;\r\tBEGIN\r\t\tASSERT(c.model # NIL, 20)\r\tEND HandleModelMsg;\r\r\tPROCEDURE (c: Controller) "
                    attr: 0
                  - text: "HandleViewMsg*"
                    attr: 3
                  - text: " (f: Views.Frame; VAR msg: Views.Message), NEW, EXTENSIBLE;\r\t\tVAR g: Views.Frame; mark: Controllers.MarkMsg;\r\tBEGIN\r\t\tASSERT(c.model # NIL, 20);\r\t\tIF msg.view = c.view THEN\r\t\t\tWITH msg: ViewMessage DO\r\t\t\t\tWITH msg: FocusMsg DO\r\t\t\t\t\tg := Views.ThisFrame(f, c.focus);\r\t\t\t\t\tIF g # NIL THEN\r\t\t\t\t\t\tIF msg.set THEN\r\t\t\t\t\t\t\tMarkFocus(c, f, show);\r\t\t\t\t\t\t\tmark.show := TRUE; mark.focus := TRUE;\r\t\t\t\t\t\t\tViews.ForwardCtrlMsg(g, mark)\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tmark.show := FALSE; mark.focus := TRUE;\r\t\t\t\t\t\t\tViews.ForwardCtrlMsg(g, mark);\r\t\t\t\t\t\t\tMarkFocus(c, f, hide)\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\t| msg: SingletonMsg DO\r\t\t\t\t\tMarkSingleton(c, f, msg.set)\r\t\t\t\t| msg: FadeMsg DO\r\t\t\t\t\tMarkFocus(c, f, msg.show);\r\t\t\t\t\tMarkSingleton(c, f, msg.show)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\tEND\r\t\tEND\r\tEND HandleViewMsg;\r\r\r\tPROCEDURE CollectControlPref (c: Controller; focus: Views.View; ch: CHAR; cyclic: BOOLEAN;\r\t\t\t\t\t\t\t\t\t\t\t\tVAR v: Views.View; VAR getFocus, accepts: BOOLEAN);\r\t\tVAR first, w: Views.View; p: Properties.ControlPref; back: BOOLEAN;\r\tBEGIN\r\t\tback := (ch = LTAB) OR (ch = AL) OR (ch = AU); first := c.focus;\r\t\tIF first = NIL THEN\r\t\t\tc.GetFirstView(any, first);\r\t\t\tIF back THEN w := first;\r\t\t\t\tWHILE w # NIL DO first := w; c.GetNextView(any, w) END\r\t\t\tEND\r\t\tEND;\r\t\tv := first;\r\t\tWHILE v # NIL DO\r\t\t\tp.char := ch; p.focus := focus;\r\t\t\tp.getFocus := (v # focus) & ((ch = TAB) OR (ch = LTAB)) & ClaimFocus(v);\r\t\t\tp.accepts := (v = focus) & (ch # TAB) & (ch # LTAB);\r\t\t\tViews.HandlePropMsg(v, p);\r\t\t\tIF p.accepts OR (v # focus) & p.getFocus THEN\r\t\t\t"
                    attr: 0
                  - text: "\t"
                    attr: 3
                  - text: "getFocus := p.getFocus; accepts := p.accepts;\r\t\t\t\t"
                    attr: 0
                  - text: "RETURN\r\t\t\t"
                    attr: 3
                  - text: "END;\r\t\t\tIF back THEN c.GetPrevView(any, v) ELSE c.GetNextView(any, v) END;\r\t\t\tIF cyclic & (v = NIL) THEN\r\t\t\t\tc.GetFirstView(any, v);\r\t\t\t\tIF back THEN w := v;\r\t\t\t\t\tWHILE w # NIL DO v := w; c.GetNextView(any, w) END\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF v = first THEN v := NIL END\r\t\tEND;\r\t\tgetFocus := FALSE; accepts := FALSE\r\tEND CollectControlPref;\r\t\r\tPROCEDURE (c: Controller) "
                    attr: 0
                  - text: "HandlePropMsg*"
                    attr: 3
                  - text: " (VAR msg: Properties.Message), NEW, EXTENSIBLE;\r\t\tVAR v: Views.View;\r\tBEGIN\r\t\tASSERT(c.model # NIL, 20);\r\t\tWITH msg: Properties.PollMsg DO\r\t\t\tmsg.prop := ThisProp(c, indirect)\r\t\t| msg: Properties.SetMsg DO\r\t\t\tSetProp(c, msg.old, msg.prop, indirect)\r\t\t| msg: Properties.FocusPref DO\r\t\t\tIF {noSelection, noFocus, noCaret} - c.opts # {} THEN msg.setFocus := TRUE END\r\t\t| msg: GetOpts DO\r\t\t\tmsg.valid := modeOpts; msg.opts := c.opts\r\t\t| msg: SetOpts DO\r\t\t\tc.SetOpts(c.opts - msg.valid + (msg.opts * msg.valid))\r\t\t| msg: Properties.ControlPref DO\r\t\t\tIF c.opts * modeOpts = mask THEN\r\t\t\t\tv := msg.focus;\r\t\t\t\tIF v = c.view THEN v := c.focus END;\r\t\t\t\tCollectControlPref(c, v, msg.char, FALSE, v, msg.getFocus, msg.accepts);\r\t\t\t\tIF msg.getFocus THEN msg.accepts := TRUE END\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\r\r\t"
                    attr: 0
                  - text: "(** Directory **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (d: Directory) "
                    attr: 0
                  - text: "NewController*"
                    attr: 3
                  - text: " (opts: SET): Controller, NEW, ABSTRACT;\r\r\tPROCEDURE (d: Directory) "
                    attr: 0
                  - text: "New*"
                    attr: 3
                  - text: " (): Controller, NEW, EXTENSIBLE;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " d.NewController({})\r\tEND New;\r\r\r\t"
                    attr: 0
                  - text: "(* ViewOp *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (op: ViewOp) Do;\r\t\tVAR v: View; c0, c1: Controller; a0, a1: Stores.Store;\r\tBEGIN\r\t\tv := op.v; c0 := v.controller; a0 := v.alienCtrl; c1 := op.controller; a1 := op.alienCtrl;\r\t\tIF c0 # NIL THEN c0.InitView(NIL) END;\r\t\tv.controller := c1; v.alienCtrl := a1;\r\t\top.controller := c0; op.alienCtrl := a0;\r\t\tIF c1 # NIL THEN c1.InitView(v) END;\r\t\tViews.Update(v, Views.keepFrames)\r\tEND Do;\r\r\r\t"
                    attr: 0
                  - text: "(* ControllerOp *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (op: ControllerOp) Do;\r\t\tVAR c: Controller; opts: SET;\r\tBEGIN\r\t\tc := op.c;\r\t\topts := c.opts; c.opts := op.opts; op.opts := opts;\r\t\tViews.Update(c.view, Views.keepFrames)\r\tEND Do;\r\r\r\t"
                    attr: 0
                  - text: "(* Controller implementation support *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE BorderVisible (c: Controller; f: Views.Frame): BOOLEAN;\r\tBEGIN\r\t\tIF 31 IN c.opts THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE END;\r\t\tIF f IS Views.RootFrame THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE END;\r\t\tIF Services.Is(c.focus, \"OleClient.View\") THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE\r\tEND BorderVisible;\r\r\tPROCEDURE MarkFocus (c: Controller; f: Views.Frame; show: BOOLEAN);\r\t\tVAR focus: Views.View; f1: Views.Frame; l, t, r, b: INTEGER;\r\tBEGIN\r\t\tfocus := c.focus;\r\t\tIF f.front & (focus # NIL) & (~show OR c.bVis) & BorderVisible(c, f) & ~(noSelection IN c.opts) THEN\r\t\t\tf1 := Views.ThisFrame(f, focus);\r\t\t\tIF f1 # NIL THEN\r\t\t\t\tc.bVis := show;\r\t\t\t\tc.view.GetRect(f, focus, l, t, r, b);\r\t\t\t\tIF (l # MAX(INTEGER)) & (t # MAX(INTEGER)) THEN\r\t\t\t\t\tMechanisms.MarkFocusBorder(f, focus, l, t, r, b, show)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND MarkFocus;\r\r\tPROCEDURE "
                    attr: 0
                  - text: MarkSingleton
                    attr: 3
                  - text: "* (c: Controller; f: Views.Frame; show: BOOLEAN);\r\t\tVAR l, t, r, b: INTEGER;\r\tBEGIN\r\t\tIF (*(f.front OR f.target) &*) (~show OR c.bVis) & (c.singleton # NIL) THEN\r\t\t\tc.bVis := show;\r\t\t\tc.view.GetRect(f, c.singleton, l, t, r, b);\r\t\t\tIF (l # MAX(INTEGER)) & (t # MAX(INTEGER)) THEN\r\t\t\t\tMechanisms.MarkSingletonBorder(f, c.singleton, l, t, r, b, show)\r\t\t\tEND\r\t\tEND\r\tEND MarkSingleton;\r\r\tPROCEDURE "
                    attr: 0
                  - text: FadeMarks
                    attr: 3
                  - text: "* (c: Controller; show: BOOLEAN);\r\t\tVAR msg: FadeMsg; v: Views.View; fc: Controller;\r\tBEGIN\r\t\tIF (c.focus # NIL) OR (c.singleton # NIL) THEN\r\t\t\tIF c.bVis # show THEN\r\t\t\t\tIF ~show THEN\r\t\t\t\t\tv := c.focus;\r\t\t\t\t\tWHILE (v # NIL) & (v IS View) DO\r\t\t\t\t\t\tfc := v(View).ThisController();\r\t\t\t\t\t\tfc.bVis := FALSE; v := fc.focus\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tc.bVis := show; msg.show := show; Views.Broadcast(c.view, msg)\r\t\t\tEND\r\t\tEND\r\tEND FadeMarks;\r\r\r\t"
                    attr: 0
                  - text: "(* handle controller messages in editor mode *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE ClaimFocus (v: Views.View): BOOLEAN;\r\t\tVAR p: Properties.FocusPref;\r\tBEGIN\r\t\tp.atLocation := FALSE;\r\t\tp.hotFocus := FALSE; p.setFocus := FALSE;\r\t\tViews.HandlePropMsg(v, p);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " p.setFocus\r\tEND ClaimFocus;\r\t\r\tPROCEDURE ClaimFocusAt (v: Views.View; f, g: Views.Frame; x, y: INTEGER; mask: BOOLEAN): BOOLEAN;\r\t\tVAR p: Properties.FocusPref;\r\tBEGIN\r\t\tp.atLocation := TRUE; p.x := x + f.gx - g.gx; p.y := y + f.gy - g.gy;\r\t\tp.hotFocus := FALSE; p.setFocus := FALSE;\r\t\tViews.HandlePropMsg(v, p);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " p.setFocus & (mask OR ~p.hotFocus)\r\tEND ClaimFocusAt;\r\t\r\tPROCEDURE NeedFocusAt (v: Views.View; f, g: Views.Frame; x, y: INTEGER): BOOLEAN;\r\t\tVAR p: Properties.FocusPref;\r\tBEGIN\r\t\tp.atLocation := TRUE; p.x := x + f.gx - g.gx; p.y := y + f.gy - g.gy;\r\t\tp.hotFocus := FALSE; p.setFocus := FALSE;\r\t\tViews.HandlePropMsg(v, p);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " p.hotFocus OR p.setFocus\r\tEND NeedFocusAt;\r\r\r\tPROCEDURE TrackToResize (c: Controller; f: Views.Frame; v: Views.View; x, y: INTEGER; buttons: SET);\r\t\tVAR minW, maxW, minH, maxH,  l, t, r, b,  w0, h0,  w, h: INTEGER; op: INTEGER; sg, fc: Views.View;\r\tBEGIN\r\t\tc.model.GetEmbeddingLimits(minW, maxW, minH, maxH);\r\t\tc.view.GetRect(f, v, l, t, r, b);\r\t\tw0 := r - l; h0 := b - t; w := w0; h := h0;\r\t\tMechanisms.TrackToResize(f, v, minW, maxW, minH, maxH, l, t, r, b, op, x, y, buttons);\r\t\tIF op = Mechanisms.resize THEN\r\t\t\tsg := c.singleton; fc := c.focus;\r\t\t\tc.Resize(v, l, t, r, b);\r\t\t\tIF c.singleton # sg THEN c.SetSingleton(sg) END;\r\t\t\tIF c.focus # fc THEN c.focus := fc; c.bVis := FALSE END\t"
                    attr: 0
                  - text: "(* delayed c.SetFocus(fc) *)"
                    attr: 1
                  - text: "\r\t\tEND\r\tEND TrackToResize;\r\r\tPROCEDURE TrackToDrop (c: Controller; f: Views.Frame; VAR x, y: INTEGER; buttons: SET;\r\t\t\t\t\t\t\t\t\tVAR pass: BOOLEAN);\r\t\tVAR dest: Views.Frame; m: Models.Model; v: Views.View;\r\t\t\tx0, y0, x1, y1, w, h, rx, ry, destX, destY: INTEGER; op: INTEGER; isDown, isSingle: BOOLEAN; mo: SET;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* drag and drop c's selection: mouse is in selection *)"
                    attr: 1
                  - text: "\r\t\tx0 := x; y0 := y;\r\t\tREPEAT\r\t\t\tf.Input(x1, y1, mo, isDown)\r\t\tUNTIL ~isDown OR (ABS(x1 - x) > 3 * Ports.point) OR (ABS(y1 - y) > 3 * Ports.point);\r\t\tpass := ~isDown;\r\t\tIF ~pass THEN\r\t\t\tv := c.Singleton();\r\t\t\tIF v = NIL THEN v := c.view; isSingle := FALSE\r\t\t\tELSE isSingle := TRUE\r\t\t\tEND;\r\t\t\tc.GetSelectionBounds(f, rx, ry, w, h);\r\t\t\trx := x0 - rx; ry := y0 - ry;\r\t\t\tIF rx < 0 THEN rx := 0 ELSIF rx > w THEN rx := w END;\r\t\t\tIF ry < 0 THEN ry := 0 ELSIF ry > h THEN ry := h END;\r"
                    attr: 0
                  - text: "\t\t\t"
                    attr: 1
                  - text: "IF noCaret IN c.opts THEN op := Mechanisms.copy ELSE op := 0 END;\r\t\t\tMechanisms.TrackToDrop(f, v, isSingle, w, h, rx, ry, dest, destX, destY, op, x, y, buttons);\r\t\t\tIF (op IN {Mechanisms.copy, Mechanisms.move}) THEN\t"
                    attr: 0
                  - text: "(* copy or move selection *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF dest # NIL THEN\r\t\t\t\t\tm := dest.view.ThisModel();\r\t\t\t\t\tIF (dest.view = c.view) OR (m # NIL) & (m = c.view.ThisModel()) THEN\t"
                    attr: 0
                  - text: "(* local drop *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\tIF op = Mechanisms.copy THEN\t"
                    attr: 0
                  - text: "(* local copy *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\t\tc.CopyLocalSelection(f, dest, x0, y0, destX, destY)\r\t\t\t\t\t\tELSIF op = Mechanisms.move THEN\t"
                    attr: 0
                  - text: "(* local move *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\t\tc.MoveLocalSelection(f, dest, x0, y0, destX, destY)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE\t"
                    attr: 0
                  - text: "(* non-local drop *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\tCopyView(c, v, w, h);\t"
                    attr: 0
                  - text: "(* create copy of selection *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\tIF (op = Mechanisms.copy) OR (noCaret IN c.opts) THEN\t"
                    attr: 0
                  - text: "(* drop copy *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\t\tControllers.Drop(x, y, f, x0, y0, v, isSingle, w, h, rx, ry)\r\t\t\t\t\t\tELSIF op = Mechanisms.move THEN\t"
                    attr: 0
                  - text: "(* drop copy and delete original *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\t\tControllers.Drop(x, y, f, x0, y0, v, isSingle, w, h, rx, ry);\r\t\t\t\t\t\t\tc.DeleteSelection;\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tELSIF (op = Mechanisms.move) & ~(noCaret IN c.opts) THEN\r\t\t\t\t\tc.DeleteSelection\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND TrackToDrop;\r\r\tPROCEDURE TrackToPick (c: Controller; f: Views.Frame; x, y: INTEGER; buttons: SET;\r\t\t\t\t\t\t\t\t\tVAR pass: BOOLEAN);\r\t\tVAR p: Properties.Property; dest: Views.Frame; x0, y0, x1, y1, destX, destY: INTEGER;\r\t\t\top: INTEGER; isDown: BOOLEAN; m: SET;\r\tBEGIN\r\t\tx0 := x; y0 := y;\r\t\tREPEAT\r\t\t\tf.Input(x1, y1, m, isDown)\r\t\tUNTIL ~isDown OR (ABS(x1 - x) > 3 * Ports.point) OR (ABS(y1 - y) > 3 * Ports.point);\r\t\tpass := ~isDown;\r\t\tIF ~pass THEN\r\t\t\tMechanisms.TrackToPick(f, dest, destX, destY, op, x, y, buttons);\r\t\t\tIF op IN {Mechanisms.pick, Mechanisms.pickForeign} THEN\r\t\t\t\tProperties.Pick(x, y, f, x0, y0, p);\r\t\t\t\tIF p # NIL THEN SetProp(c, NIL, p, direct) END\r\t\t\tEND\r\t\tEND\r\tEND TrackToPick;\r\r\tPROCEDURE MarkViews (f: Views.Frame);\r\t\tVAR x, y: INTEGER; isDown: BOOLEAN; root: Views.RootFrame; m: SET;\r\tBEGIN\r\t\troot := Views.RootOf(f);\r\t\tViews.MarkBorders(root);\r\t\tREPEAT f.Input(x, y, m, isDown) UNTIL ~isDown;\r\t\tViews.MarkBorders(root)\r\tEND MarkViews;\r\r\tPROCEDURE Track (c: Controller; f: Views.Frame; VAR msg: Controllers.TrackMsg; VAR focus: Views.View);\r\t\tVAR res, l, t, r, b: INTEGER; cursor: INTEGER; sel: Views.View; obj: Views.Frame;\r\t\t\tinSel, pass, extend, add, double, popup: BOOLEAN;\r\tBEGIN\r\t\tcursor := Mechanisms.outside; sel := c.Singleton();\r\t\tIF focus # NIL THEN\r\t\t\tc.view.GetRect(f, focus, l, t, r, b);\r\t\t\tIF (BorderVisible(c, f) OR (f IS Views.RootFrame)) & ~(noSelection IN c.opts) THEN\r\t\t\t\tcursor := Mechanisms.FocusBorderCursor(f, focus, l, t, r, b, msg.x, msg.y)\r\t\t\tELSIF (msg.x >= l) & (msg.x <= r) & (msg.y >= t) & (msg.y <= b) THEN\r\t\t\t\tcursor := Mechanisms.inside\r\t\t\tEND\r\t\tELSIF sel # NIL THEN\r\t\t\tc.view.GetRect(f, sel, l, t, r, b);\r\t\t\tcursor := Mechanisms.SelBorderCursor(f, sel, l, t, r, b, msg.x, msg.y)\r\t\tEND;\r\t\tIF cursor >= 0 THEN\r\t\t\tIF focus # NIL THEN\r"
                    attr: 0
                  - text: "\t\t\t\t(* resize focus *)\r"
                    attr: 1
                  - text: "\t\t\t\tTrackToResize(c, f, focus, msg.x, msg.y, msg.modifiers);\r\t\t\t\tfocus := NIL\r\t\t\tELSE\r"
                    attr: 0
                  - text: "\t\t\t\t(* resize singleton *)\r\t\t\t\t"
                    attr: 1
                  - text: "TrackToResize(c, f, sel, msg.x, msg.y, msg.modifiers)"
                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\t\t\tEND\r\t\tELSIF (focus # NIL) & (cursor = Mechanisms.inside) THEN\r"
                    attr: 0
                  - text: "\t\t\t(* forward to focus *)\r"
                    attr: 1
                  - text: "\t\tELSE\r\t\t\tIF (focus # NIL) & (c.opts * modeOpts # mask) THEN c.SetFocus(NIL) END;\r\t\t\tfocus := NIL;\r\t\t\tinSel := c.InSelection(f, msg.x, msg.y);\r\t\t\textend := Controllers.extend IN msg.modifiers;\r\t\t\tadd := Controllers.modify IN msg.modifiers;\r\t\t\tdouble := Controllers.doubleClick IN msg.modifiers;\r\t\t\tpopup := right IN msg.modifiers;\r\t\t\tobj := Views.FrameAt(f, msg.x, msg.y);\r\t\t\tIF ~inSel &"
                    attr: 0
                  - text: " (~extend OR (noSelection IN c.opts))"
                    attr: 3
                  - text: " THEN \r\t\t\t\tIF obj # NIL THEN\r\t\t\t\t\tIF ~(noFocus IN c.opts) & NeedFocusAt(obj.view, f, obj, msg.x, msg.y)\r\t\t\t\t\t\t\t& "
                    attr: 0
                  - text: (~(alt IN msg.modifiers) OR (noSelection IN c.opts))
                    attr: 3
                  - text: " THEN\r\t\t\t\t\t\t"
                    attr: 0
                  - text: "(* set hot focus *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\tfocus := obj.view;\r\t\t\t\t\t\tIF ClaimFocusAt(focus, f, obj, msg.x, msg.y, c.opts * modeOpts = mask) THEN\r\t\t\t\t\t\t\t"
                    attr: 0
                  - text: "(* set permanent focus *)\r"
                    attr: 1
                  - text: "\t\t\t\t\t\t\t"
                    attr: 3
                  - text: c.SelectAll(deselect);
                    attr: 0
                  - text: "\r"
                    attr: 3
                  - text: "\t\t\t\t\t\t\tc.SetFocus(focus)\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND;\r\t\t\t\t\tIF (focus = NIL) & ~add & ~(noSelection IN c.opts) THEN\r\t\t\t\t\t\t"
                    attr: 0
                  - text: "(* select object *)\r\t\t\t\t\t\t"
                    attr: 1
                  - text: "c.SelectAll(deselect);\r\t\t\t\t\t\tc.SetSingleton(obj.view); inSel := TRUE\r\t\t\t\t\tEND\r\t\t\t\tELSIF ~add THEN c.SelectAll(deselect)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF focus = NIL THEN\r\t\t\t\tIF inSel & double & (popup OR (alt IN msg.modifiers)) THEN "
                    attr: 0
                  - text: "(* properties *)"
                    attr: 1
                  - text: "\r"
                    attr: 3
                  - text: "\t\t\t\t\tDialog.Call(\"StdCmds.ShowProp\", \"\", res)\r\t\t\t\tELSIF inSel & double & (obj # NIL) THEN"
                    attr: 0
                  - text: " "
                    attr: 3
                  - text: "(* primary verb *)"
                    attr: 1
                  - text: "\r"
                    attr: 3
                  - text: "\t\t\t\t\tDialog.Call(\"HostMenus.PrimaryVerb\", \"\", res)\r\t\t\t\tELSIF ~inSel & (alt IN msg.modifiers) & extend THEN\r\t\t\t\t\tMarkViews(f)\r\t\t\t\tELSE\r\t\t\t\t\tIF inSel & ~extend THEN "
                    attr: 0
                  - text: "(* drag *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\tIF (alt IN msg.modifiers) OR (middle IN msg.modifiers) THEN\r\t\t\t\t\t\t\tIF ~(noCaret IN c.opts) THEN\r\t\t\t\t\t\t\t\tTrackToPick(c, f, msg.x, msg.y, msg.modifiers, pass)\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tTrackToDrop(c, f, msg.x, msg.y, msg.modifiers, pass)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF ~pass THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END\r\t\t\t\t\tEND;\r\t\t\t\t\tIF ~(noSelection IN c.opts) & (~inSel OR extend OR add OR (obj = NIL) & ~popup) THEN "
                    attr: 0
                  - text: "(* select *)\r"
                    attr: 1
                  - text: "\t\t\t\t\t\tc.TrackMarks(f, msg.x, msg.y, double, extend, add)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF popup THEN Dialog.Call(\"HostMenus.PopupMenu\", \"\", res) END\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND Track;\r\r\tPROCEDURE CopyView (source: Controller; VAR view: Views.View; VAR w, h: INTEGER);\r\t\tVAR s: Views.View; m: Model; v: View; p: Properties.BoundsPref;\r\tBEGIN\r\t\ts := source.Singleton();\r\t\tIF s # NIL THEN\t"
                    attr: 0
                  - text: "(* create a copy of singular selection *)"
                    attr: 1
                  - text: "\r\t\t\tview := Views.CopyOf(s, Views.deep); s.context.GetSize(w, h)\r\t\tELSE\t"
                    attr: 0
                  - text: "(* create a copy of view with a copy of whole selection as contents *)"
                    attr: 1
                  - text: "\r\t\t\tm := source.SelectionCopy();\r\t\t\tv := Views.CopyWithNewModel(source.view, m)(View);\r\t\t\tp.w := Views.undefined; p.h := Views.undefined; Views.HandlePropMsg(v, p);\r\t\t\tview := v; w := p.w; h := p.h\r\t\tEND\r\tEND CopyView;\r\r\tPROCEDURE Paste (c: Controller; f: Views.Frame; v: Views.View; w, h: INTEGER);\r\t\tVAR m: Models.Model;\r\tBEGIN\r\t\tm := v.ThisModel();\r\t\tIF (m # NIL) & c.NativeModel(m) THEN\r\t\t\t"
                    attr: 0
                  - text: "(* paste whole contents of source view *)"
                    attr: 1
                  - text: "\r\t\t\tc.NativePaste(m, f)\r\t\tELSE\r\t\t\t"
                    attr: 0
                  - text: "(* paste whole view *)"
                    attr: 1
                  - text: "\r\t\t\tc.PasteView(f, v (* Views.CopyOf(v, Views.deep) *), w, h)\r\t\tEND\r\tEND Paste;\r\r\tPROCEDURE GetValidOps (c: Controller; VAR valid: SET);\r\tBEGIN\r\t\tvalid := {}; c.GetValidOps(valid);\r\t\tIF noCaret IN c.opts THEN\r\t\t\tvalid := valid\r\t\t\t\t- {Controllers.pasteChar, Controllers.pasteChar,\r\t\t\t\t\tControllers.paste, Controllers.cut}\r\t\tEND\r\tEND GetValidOps;\r\r\r\tPROCEDURE Transfer (c: Controller; f: Views.Frame;\r\t\t\t\t\t\t\t\tVAR msg: Controllers.TransferMessage; VAR focus: Views.View);\r\t\tVAR g: Views.Frame; inSelection: BOOLEAN; dMsg: DropPref;\r\tBEGIN\r\t\tfocus := NIL;\r\t\tg := Views.FrameAt(f, msg.x, msg.y);\r\t\tWITH msg: Controllers.PollDropMsg DO\r\t\t\tinSelection := c.InSelection(f, msg.x, msg.y);\r\t\t\tdMsg.mode := c.opts; dMsg.okToDrop := FALSE;\r\t\t\tIF g # NIL THEN Views.HandlePropMsg(g.view, dMsg) END;\r\t\t\tIF (g # NIL) & ~inSelection & (dMsg.okToDrop OR ~(noFocus IN c.opts))THEN\r\t\t\t\tfocus := g.view\r\t\t\tELSIF ~(noCaret IN c.opts) & c.CanDrop(f, msg.x, msg.y) THEN\r\t\t\t\tmsg.dest := f;\r\t\t\t\tIF msg.mark THEN\r\t\t\t\t\tc.MarkDropTarget(msg.source, f, msg.sourceX, msg.sourceY, msg.x, msg.y, msg.w, msg.h, msg.rx, msg.ry,\r\t\t\t\t\t\t\t\t\t\t\tmsg.type, msg.isSingle, msg.show)\r\t\t\t\tEND\r\t\t\tEND\r\t\t| msg: Controllers.DropMsg DO\r\t\t\tinSelection := c.InSelection(f, msg.x, msg.y);\r\t\t\tdMsg.mode := c.opts; dMsg.okToDrop := FALSE;\r\t\t\tIF g # NIL THEN Views.HandlePropMsg(g.view, dMsg) END;\r\t\t\tIF (g # NIL) & ~inSelection & (dMsg.okToDrop OR ~(noFocus IN c.opts))THEN\r\t\t\t\tfocus := g.view\r\t\t\tELSIF ~(noCaret IN c.opts) & c.CanDrop(f, msg.x, msg.y) THEN\r\t\t\t\tc.Drop(msg.source, f, msg.sourceX, msg.sourceY, msg.x, msg.y, msg.w, msg.h,\r\t\t\t\t\t\t\tmsg.rx, msg.ry, msg.view, msg.isSingle)\r\t\t\tEND\r\t\t| msg: Properties.PollPickMsg DO\r\t\t\tIF g # NIL THEN\r\t\t\t\tfocus := g.view\r\t\t\tELSE\r\t\t\t\tmsg.dest := f;\r\t\t\t\tIF msg.mark THEN\r\t\t\t\t\tc.MarkPickTarget(msg.source, f, msg.sourceX, msg.sourceY, msg.x, msg.y, msg.show)\r\t\t\t\tEND\r\t\t\tEND\r\t\t| msg: Properties.PickMsg DO\r\t\t\tIF g # NIL THEN\r\t\t\t\tfocus := g.view\r\t\t\tELSE\r\t\t\t\tc.PickNativeProp(f, msg.x, msg.y, msg.prop)\r\t\t\tEND\r\t\tELSE\r\t\t\tIF g # NIL THEN focus := g.view END\r\t\tEND\r\tEND Transfer;\r\r\tPROCEDURE FocusHasSel (): BOOLEAN;\r\t\tVAR msg: Controllers.PollOpsMsg;\r\tBEGIN\r\t\tControllers.PollOps(msg);\r\t\t"
