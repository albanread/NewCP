                  - text: "* (IN s: ARRAY OF CHAR; OUT x: INTEGER; OUT res: INTEGER);\r\t\tCONST hexLimit = MAX(INTEGER) DIV 8 + 1;\r\t\tVAR i, j, k, digits: INTEGER; ch, top: CHAR; neg: BOOLEAN; base: INTEGER;\r\tBEGIN\r\t\tres := 0; i := 0; ch := s[0];\r\t\tWHILE (ch # 0X) & (ch <= \" \") OR (ch = 8BX) OR (ch = 8FX) OR (ch = 0A0X) DO\t("
