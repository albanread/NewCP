                  - text: "\r\t\t\tINC(i); ch := s[i]\r\t\tEND;\r\t\tj := i; top := \"0\";\r\t\tWHILE (ch # 0X) & (ch # \"H\") & (ch # \"X\") & (ch # \"%\") DO \r\t\t\tIF ch > top THEN top := ch END;\r\t\t\tINC(j); ch := s[j]\r\t\tEND;\r\t\tIF (ch = \"H\") OR (ch = \"X\") THEN\r\t\t\tx := 0; ch := s[i];\r\t\t\tIF (\"0\" <= ch) & (ch <= \"9\") OR (\"A\" <= ch) & (ch <= \"F\") THEN\r\t\t\t\tWHILE ch = \"0\" DO INC(i); ch := s[i] END;\r\t\t\t\tdigits := 0;\r\t\t\t\tWHILE (res = 0) & ((\"0\" <= ch) & (ch <= \"9\") OR (\"A\" <= ch) & (ch <= \"F\")) DO\r\t\t\t\t\tIF ch < \"A\" THEN k := ORD(ch) - ORD(\"0\")\r\t\t\t\t\tELSE k := ORD(ch) - ORD(\"A\") + 10\r\t\t\t\t\tEND;\r\t\t\t\t\tIF digits < 8 THEN\r\t\t\t\t\t\tx := x MOD hexLimit;\r\t\t\t\t\t\tIF x >= hexLimit DIV 2 THEN x := x - hexLimit END;\r\t\t\t\t\t\tx := x * 16 + k; INC(i); ch := s[i]\r\t\t\t\t\tELSE res := 1\r\t\t\t\t\tEND;\r\t\t\t\t\tINC(digits)\r\t\t\t\tEND;\r\t\t\t\tIF res = 0 THEN\r\t\t\t\t\tIF (ch # \"H\") & (ch # \"X\") OR (s[i+1] # 0X) THEN res := 2 END\r\t\t\t\tEND\r\t\t\tELSE res := 2\r\t\t\tEND\r\t\tELSE\r\t\t\tIF ch = \"%\" THEN\r\t\t\t\tINC(j); ch := s[j]; base := 0;\r\t\t\t\tIF (\"0\" <= ch) & (ch <= \"9\") THEN\r\t\t\t\t\tk := ORD(ch) - ORD(\"0\");\r\t\t\t\t\tREPEAT\r\t\t\t\t\t\tbase := base * 10 + k;\r\t\t\t\t\t\tINC(j); ch := s[j]; k := ORD(ch) - ORD(\"0\")\r\t\t\t\t\tUNTIL (ch < \"0\") OR (ch > \"9\") OR (base > (MAX(INTEGER) - k) DIV 10);\r\t\t\t\t\tIF (\"0\" <= ch) & (ch <= \"9\") THEN base := 0 END\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tbase := 10\r\t\t\tEND;\r\t\t\t\r\t\t\tIF (base < 2) OR (base > 16) THEN\r\t\t\t\tres := 2\r\t\t\tELSIF (base <= 10) & (ORD(top) < base + ORD(\"0\"))\r\t\t\tOR (base > 10) & (ORD(top) < base - 10 + ORD(\"A\")) THEN\r\t\t\t\tx := 0; ch := s[i]; neg := FALSE;\r\t\t\t\tIF ch = \"-\" THEN INC(i); ch := s[i]; neg := TRUE ELSIF ch = \"+\" THEN INC(i); ch := s[i] END;\r\t\t\t\tWHILE (ch # 0X) & (ch <= \" \") DO INC(i); ch := s[i] END; \r\t\t\t\tIF (\"0\" <= ch) & (ch <= \"9\") OR (\"A\" <= ch) & (ch <= \"F\") THEN\r\t\t\t\t\tIF ch <= \"9\" THEN k := ORD(ch) - ORD(\"0\") ELSE k := ORD(ch) - ORD(\"A\") + 10 END;\r\t\t\t\t\tWHILE ((\"0\" <= ch) & (ch <= \"9\") OR (\"A\" <= ch) & (ch <= \"F\")) & (res = 0) DO\r\t\t\t\t\t\tIF x >= (MIN(INTEGER) + (base - 1) + k) DIV base THEN\r\t\t\t\t\t\t\tx := x * base - k; INC(i); ch := s[i];\r\t\t\t\t\t\t\tIF ch <= \"9\" THEN k := ORD(ch) - ORD(\"0\") ELSE k := ORD(ch) - ORD(\"A\") + 10 END\r\t\t\t\t\t\tELSE res := 1\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tELSE res := 2\r\t\t\t\tEND;\r\t\t\t\tIF res = 0 THEN\r\t\t\t\t\tIF ~neg THEN\r\t\t\t\t\t\tIF x > MIN(INTEGER) THEN x := -x ELSE res := 1 END\r\t\t\t\t\tEND;\r\t\t\t\t\tIF (ch # 0X) & (ch # \"%\") THEN res := 2 END\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tres := 2\r\t\t\tEND\r\t\tEND\r\tEND StringToInt;\r\r\tPROCEDURE "
