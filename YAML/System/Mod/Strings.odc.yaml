                  - text: "\r\t\t\t\tIF exp > 0 THEN\r\t\t\t\t\tn := SHORT(ENTIER(x / Math.IntPower(10, exp)));\r\t\t\t\t\tx := x / Math.IntPower(10, exp) - n\r\t\t\t\tELSIF exp > -maxExp THEN\r\t\t\t\t\tn := SHORT(ENTIER(x * Math.IntPower(10, -exp)));\r\t\t\t\t\tx := x * Math.IntPower(10, -exp) - n\r\t\t\t\tELSE\r\t\t\t\t\tn := SHORT(ENTIER(x * Math.IntPower(10, -exp - 2 * maxDig) * factor * factor));\r\t\t\t\t\tx := x * Math.IntPower(10, -exp - 2 * maxDig) * factor * factor - n\r\t\t\t\tEND;\r\t\t\t\t"
