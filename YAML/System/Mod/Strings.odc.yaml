                  - text: " (x: LONGINT; OUT s: ARRAY OF CHAR);\r\t\tVAR j, k: INTEGER; ch: CHAR; a: ARRAY 32 OF CHAR;\r\tBEGIN\r\t\tIF x # MIN(LONGINT) THEN\r\t\t\tIF x < 0 THEN s[0] := \"-\"; k := 1; x := -x ELSE k := 0 END;\r\t\t\tj := 0; REPEAT a[j] := CHR(x MOD 10 + ORD(\"0\")); x := x DIV 10; INC(j) UNTIL x = 0\r\t\tELSE\r\t\t\ta := minLongIntRev; s[0] := \"-\"; k := 1;\r\t\t\tj := 0; WHILE a[j] # 0X DO INC(j) END\r\t\tEND;\r\t\tASSERT(k + j < LEN(s), 23);\r\t\tREPEAT DEC(j); ch := a[j]; s[k] := ch; INC(k) UNTIL j = 0;\r\t\ts[k] := 0X\r\tEND IntToString;\r\r\tPROCEDURE "
