                    attr: 0
                  - text: "(* rounding correction *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tIF x >= 1 THEN INC(n); x := x - 1 END\r\t\t\t\tELSIF p = -1 THEN INC(n, 5)\r\t\t\t\tELSIF p = -2 THEN INC(n, 50)\r\t\t\t\tELSIF p = -3 THEN INC(n, 500)\r\t\t\t\tEND;\r\t\t\t\ti := 0; k := 1000; INC(exp, 3);\r\t\t\t\tIF n < 1000 THEN k := 100; DEC(exp) END;\r\t\t\t\tWHILE (i < precision) & ((k > 0) OR (x # 0)) DO\r\t\t\t\t\tIF k > 0 THEN p := n DIV k; n := n MOD k; k := k DIV 10\r\t\t\t\t\tELSE x := x * 10; p := SHORT(ENTIER(x)); x := x - p\r\t\t\t\t\tEND;\r\t\t\t\t\tm[i] := CHR(p + ORD(\"0\")); INC(i);\r\t\t\t\t\tIF p # 0 THEN len := i END\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\t"
                    attr: 0
                  - text: "(* x0 = m[0].m[1]...m[len-1] * 10^exp *)"
                    attr: 1
                  - text: "\r\t\t\ti := 0;\r\t\t\tIF (expW < 0) OR (expW = 0) & (exp >= -3) & (exp <= len + 1) THEN\r\t\t\t\tn := exp + 1; k := len - n;\r\t\t\t\tIF n < 1 THEN n := 1 END;\r\t\t\t\tIF expW < 0 THEN k := -expW ELSIF k < 1 THEN k := 1 END;\r\t\t\t\tj := minW - n - k - 1; p := -exp;\r\t\t\t\tIF neg & (p >= MAX(0, n) + MAX(0, k)) THEN neg := FALSE; INC(j) END\r\t\t\tELSE\r\t\t\t\tIF ABS(exp) >= 100 THEN expW := 3\r\t\t\t\tELSIF (expW < 2) & (ABS(exp) >= 10) THEN expW := 2\r\t\t\t\tELSIF expW < 1 THEN expW := 1\r\t\t\t\tEND;\r\t\t\t\tIF len < 2 THEN len := 2 END;\r\t\t\t\tj := minW - len - 3 - expW; k := len;\r\t\t\t\tIF j > 0 THEN\r\t\t\t\t\tk := k + j; j := 0;\r\t\t\t\t\tIF k > precision THEN j := k - precision; k := precision END\r\t\t\t\tEND;\r\t\t\t\tn := 1; DEC(k); p := 0\r\t\t\tEND;\r\t\t\tIF neg & (fillCh = \"0\") THEN s[i] := \"-\"; INC(i); neg := FALSE END;\r\t\t\tWHILE j > 0 DO s[i] := fillCh; INC(i); DEC(j) END;\r\t\t\tIF neg & (i < LEN(s)) THEN s[i] := \"-\"; INC(i) END;\r\t\t\tj := 0;\r\t\t\tWHILE (n > 0) & (i < LEN(s)) DO\r\t\t\t\tIF (p <= 0) & (j < len) THEN s[i] := m[j]; INC(j) ELSE s[i] := \"0\" END;\r\t\t\t\tINC(i); DEC(n); DEC(p)\r\t\t\tEND;\r\t\t\tIF i < LEN(s) THEN s[i] := \".\"; INC(i) END;\r\t\t\tWHILE (k > 0) & (i < LEN(s)) DO\r\t\t\t\tIF (p <= 0) & (j < len) THEN s[i] := m[j]; INC(j) ELSE s[i] := \"0\" END;\r\t\t\t\tINC(i); DEC(k); DEC(p)\r\t\t\tEND;\r\t\t\tIF expW > 0 THEN\r\t\t\t\tIF i < LEN(s) THEN s[i] := \"E\"; INC(i) END;\r\t\t\t\tIF i < LEN(s) THEN\r\t\t\t\t\tIF exp < 0 THEN s[i] := \"-\"; exp := -exp ELSE s[i] := \"+\" END;\r\t\t\t\t\tINC(i)\r\t\t\t\tEND;\r\t\t\t\tIF (expW = 3) & (i < LEN(s)) THEN s[i] := CHR(exp DIV 100 + ORD(\"0\")); INC(i) END;\r\t\t\t\tIF (expW >= 2) & (i < LEN(s)) THEN s[i] := CHR(exp DIV 10 MOD 10 + ORD(\"0\")); INC(i) END;\r\t\t\t\tIF i < LEN(s) THEN s[i] := CHR(exp MOD 10 + ORD(\"0\")); INC(i) END\r\t\t\tEND\r\t\tEND;\r\t\tIF i < LEN(s) THEN s[i] := 0X ELSE HALT(23) END\r\tEND RealToStringForm;\r\