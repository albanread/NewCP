                  - text: "* (x: LONGINT; form, minWidth: INTEGER; fillCh: CHAR;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\tshowBase: BOOLEAN; OUT s: ARRAY OF CHAR);\r\t\tVAR base, i, j, k, si: INTEGER; mSign: BOOLEAN; a: ARRAY 128 OF CHAR; c1, c5, c10: CHAR;\r\tBEGIN\r\t\tASSERT((form = charCode) OR (form = hexadecimal) OR (form = roman) OR ((form >= 2) & (form <= 16)), 20);\r\t\tASSERT(minWidth >= 0, 22);\r\t\tIF form = charCode THEN base := 16\r\t\tELSIF form = hexadecimal THEN base := 16\r\t\tELSE base := form\r\t\tEND;\r\t\t\r\t\tIF form = roman THEN\r\t\t\tASSERT((x > 0) & (x < 3999), 21); \r\t\t\tbase := 1000; i := 0; mSign := FALSE;\r\t\t\tWHILE (base > 0) & (x > 0) DO\r\t\t\t\tIF base = 1 THEN c1 := \"I\"; c5 := \"V\"; c10 := \"X\"\r\t\t\t\tELSIF base = 10 THEN c1 := \"X\"; c5 := \"L\"; c10 := \"C\"\r\t\t\t\tELSIF base = 100 THEN c1 := \"C\"; c5 := \"D\"; c10 := \"M\"\r\t\t\t\tELSE c1 := \"M\"\r\t\t\t\tEND;\r\t\t\t\tk := SHORT(x DIV base); x := x MOD base;\r\t\t\t\tIF k IN {4, 9} THEN a[i] := c1; INC(i) END;\r\t\t\t\tIF k IN {4 .. 8} THEN a[i] := c5; INC(i) END;\r\t\t\t\tIF k = 9 THEN a[i] := c10; INC(i)\r\t\t\t\tELSIF k IN {1 .. 3, 6 .. 8} THEN\r\t\t\t\t\tj := k MOD 5;\r\t\t\t\t\tREPEAT a[i] := c1; INC(i); DEC(j) UNTIL j = 0\r\t\t\t\tEND;\r\t\t\t\tbase := base DIV 10\r\t\t\tEND\r\t\tELSIF (form = hexadecimal) OR (form = charCode) THEN\r\t\t\ti := 0; mSign := FALSE;\r\t\t\tIF showBase THEN DEC(minWidth) END;\r\t\t\tREPEAT\r\t\t\t\ta[i] := digits[x MOD base]; x := x DIV base; INC(i)\r\t\t\tUNTIL (x = 0) OR (x = -1) OR (i = LEN(a));\r\t\t\tIF x = -1 THEN fillCh := \"F\" END\r\t\tELSE\r\t\t\tIF x < 0 THEN\r\t\t\t\ti := 0; mSign := TRUE; DEC(minWidth);\r\t\t\t\tREPEAT\r\t\t\t\t\tIF x MOD base = 0 THEN\r\t\t\t\t\t\ta[i] := digits[0]; x := x DIV base\r\t\t\t\t\tELSE\r\t\t\t\t\t\ta[i] := digits[base - x MOD base]; x := x DIV base + 1\r\t\t\t\t\tEND;\r\t\t\t\t\tINC(i)\r\t\t\t\tUNTIL (x = 0) OR (i = LEN(a))\r\t\t\tELSE\r\t\t\t\ti := 0; mSign := FALSE;\r\t\t\t\tREPEAT\r\t\t\t\t\ta[i] := digits[x MOD base]; x := x DIV base; INC(i)\r\t\t\t\tUNTIL (x = 0) OR (i = LEN(a))\r\t\t\tEND;\r\t\t\tIF showBase THEN DEC(minWidth);\r\t\t\t\tIF base < 10 THEN DEC(minWidth) ELSE DEC(minWidth,2) END\r\t\t\tEND\r\t\tEND;\r\t\tsi := 0;\r\t\tIF mSign & (fillCh = \"0\") & (si < LEN(s)) THEN s[si] := \"-\"; INC(si); mSign := FALSE END;\r\t\tWHILE minWidth > i DO\r\t\t\tIF si < LEN(s) THEN s[si] := fillCh; INC(si) END;\r\t\t\tDEC(minWidth)\r\t\tEND;\r\t\tIF mSign & (si < LEN(s)) THEN s[si] := \"-\"; INC(si) END;\r\t\tIF form = roman THEN\r\t\t\tj := 0;\r\t\t\tWHILE j < i DO \r\t\t\t\tIF si < LEN(s) THEN s[si] := a[j]; INC(si) END; \r\t\t\t\tINC(j)\r\t\t\tEND\r\t\tELSE\r\t\t\tREPEAT DEC(i);\r\t\t\t\tIF si < LEN(s) THEN s[si] := a[i]; INC(si) END\r\t\t\tUNTIL i = 0\r\t\tEND;\r\t\tIF showBase & (form # roman) THEN\r\t\t\tIF (form = charCode) & (si < LEN(s)) THEN s[si] := \"X\"; INC(si)\r\t\t\tELSIF (form = hexadecimal) & (si < LEN(s)) THEN s[si] := \"H\"; INC(si)\r\t\t\tELSIF (form < 10) & (si < LEN(s)-1) THEN s[si] := \"%\"; s[si+1] := digits[base]; INC(si, 2)\r\t\t\tELSIF (si < LEN(s) - 2) THEN\r\t\t\t\ts[si] := \"%\"; s[si+1] := digits[base DIV 10]; s[si+2] := digits[base MOD 10]; INC(si, 3)\r\t\t\tEND\r\t\tEND;\r\t\tIF si < LEN(s) THEN s[si] := 0X ELSE HALT(23) END"
