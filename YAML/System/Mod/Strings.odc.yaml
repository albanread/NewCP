                  - text: "* (x: REAL; precision, minW, expW: INTEGER; fillCh: CHAR;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\tOUT s: ARRAY OF CHAR);\r\t\tVAR exp, len, i, j, n, k, p: INTEGER; m: ARRAY 80 OF CHAR; neg: BOOLEAN;\r\tBEGIN\r\t\tASSERT((precision > 0) (*& (precision <= 18)*), 20);\r\t\tASSERT((minW >= 0) & (minW < LEN(s)), 21);\r\t\tASSERT((expW > -LEN(s)) & (expW <= 3), 22);\r\t\texp := Math.Exponent(x);\r\t\tIF exp = MAX(INTEGER) THEN\r\t\t\tIF fillCh = \"0\" THEN fillCh := digitspace END;\r\t\t\tx := Math.Mantissa(x);\r\t\t\tIF x = -1 THEN m := \"-inf\"; n := 4\r\t\t\tELSIF x = 1 THEN m := \"inf\"; n := 3\r\t\t\tELSE m := \"nan\"; n := 3\r\t\t\tEND;\r\t\t\ti := 0; j := 0;\r\t\t\tWHILE minW > n DO s[i] := fillCh; INC(i); DEC(minW) END;\r\t\t\tWHILE (j <= n) & (i < LEN(s)) DO s[i] := m[j]; INC(i); INC(j) END\r\t\tELSE\r\t\t\tneg := FALSE; len := 1; m := \"00\";\r\t\t\tIF x < 0 THEN x := -x; neg := TRUE; DEC(minW) END;\r\t\t\tIF x # 0 THEN\r\t\t\t\texp := (exp - 8) * 30103 DIV 100000;\t"
