                  - text: "\r\t\tVAR seq: ANYPTR; g: INTEGER;\r\tBEGIN\r\t\tASSERT(m # NIL, 20);\r\t\tmsg.model := m;\r\t\tIF m.Domain() # NIL THEN seq := m.Domain().GetSequencer() ELSE seq := NIL END;\r\t\tIF seq # NIL THEN\r\t\t\tWITH seq: Sequencers.Sequencer DO\r\t\t\t\tINC(m.era); msg.era := m.era;\r\t\t\t\tg := Kernel.trapCount + 1;\r\t\t\t\tIF m.guard > 0 THEN ASSERT(m.guard # g, 21) END;\r\t\t\t\tm.guard := g;\r\t\t\t\tseq.Handle(msg);\r\t\t\t\tm.guard := 0\r\t\t\tELSE\r\t\t\tEND\r\t\tEND\r\tEND Broadcast;\r\rBEGIN\r\tdomainGuard := 0\rEND Models.\r"
