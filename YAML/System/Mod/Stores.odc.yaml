                  - text: "\r\t\t\t\trd.SetPos(pos);\r\t\t\t\tASSERT(rd.cause # 0, 107);\r\t\t\t\tNEW(a); a.path := path; a.cause := rd.cause; a.file := rd.rider.Base();\r\t\t\t\tIF rd.noDomain THEN\r\t\t\t\t\trd.store := a;\r\t\t\t\t\trd.noDomain := FALSE\r\t\t\t\tELSE\r\t\t\t\t\tJoin(rd.store, a)\r\t\t\t\tEND;\r\t\t\t\tIF kind = elem THEN\r\t\t\t\t\ta.id := id; AddStore(rd.eDict, rd.eHead, a)\r\t\t\t\tELSE\r\t\t\t\t\ta.id := id; AddStore(rd.sDict, rd.sHead, a)\r\t\t\t\tEND;\r\t\t\t\tsave := rd.st;\r\t\t\t\trd.nextTypeId := nextTypeId; rd.nextElemId := nextElemId; rd.nextStoreId := nextStoreId;\r\t\t\t\tInternalizeAlien(rd, a.comps, downPos, pos, len);\r\t\t\t\trd.st := save;\r\t\t\t\tx := a;\r\t\t\t\tASSERT(rd.Pos() = rd.st.end, 108);\r\t\t\t\trd.cause := 0; rd.cancelled :=  FALSE; rd.readAlien := TRUE\r\t\t\tEND\r\t\tELSE\r\t\t\tpos := rd.Pos();\r\t\t\t"
