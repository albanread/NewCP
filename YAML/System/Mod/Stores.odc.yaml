                  - text: " (OUT x: Store), NEW;\r\t\tVAR a: Alien; t: Kernel.Type;\r\t\t\tlen, pos, pos1, id, comment, next, down, downPos, nextTypeId, nextElemId, nextStoreId: INTEGER;\r\t\t\tkind: SHORTCHAR; path: TypePath; type: TypeName;\r\t\t\tsave: ReaderState;\r\tBEGIN\r\t\trd.ReadSChar(kind);\r\t\tIF kind = nil THEN\r\t\t\trd.ReadInt(comment); rd.ReadInt(next);\r\t\t\trd.st.end := rd.Pos();\r\t\t\tIF (next > 0) OR ((next = 0) & ODD(comment)) THEN rd.st.next := rd.st.end + next ELSE rd.st.next := 0 END;\r\t\t\tx := NIL\r\t\tELSIF kind = link THEN\r\t\t\trd.ReadInt(id); rd.ReadInt(comment); rd.ReadInt(next);\r\t\t\trd.st.end := rd.Pos();\r\t\t\tIF (next > 0) OR ((next = 0) & ODD(comment)) THEN rd.st.next := rd.st.end + next ELSE rd.st.next := 0 END;\r\t\t\tx := ThisStore(rd.eDict, id)\r\t\tELSIF kind = newlink THEN\r\t\t\trd.ReadInt(id); rd.ReadInt(comment); rd.ReadInt(next);\r\t\t\trd.st.end := rd.Pos();\r\t\t\tIF (next > 0) OR ((next = 0) & ODD(comment)) THEN rd.st.next := rd.st.end + next ELSE rd.st.next := 0 END;\r\t\t\tx := ThisStore(rd.sDict, id)\r\t\tELSIF (kind = store) OR (kind = elem) THEN\r\t\t\tIF kind = elem THEN\r\t\t\t\tid := rd.nextElemId; INC(rd.nextElemId)\r\t\t\tELSE\r\t\t\t\tid := rd.nextStoreId; INC(rd.nextStoreId)\r\t\t\tEND;\r\t\t\tReadPath(rd, path); type := path[0];\r\t\t\tnextTypeId := rd.nextTypeId; nextElemId := rd.nextElemId; nextStoreId := rd.nextStoreId;\r\t\t\trd.ReadInt(comment);\r\t\t\tpos1 := rd.Pos();\r\t\t\trd.ReadInt(next); rd.ReadInt(down); rd.ReadInt(len);\r\t\t\tpos := rd.Pos();\r\t\t\tIF next > 0 THEN rd.st.next := pos1 + next + 4 ELSE rd.st.next := 0 END;\r\t\t\tIF down > 0 THEN downPos := pos1 + down + 8 ELSE downPos := 0 END;\r\t\t\trd.st.end := pos + len;\r\t\t\trd.cause := 0;\r\t\t\tASSERT(len >= 0, 101);\r\t\t\tIF next # 0 THEN\r\t\t\t\tASSERT(rd.st.next > pos1, 102);\r\t\t\t\tIF down # 0 THEN\r\t\t\t\t\tASSERT(downPos < rd.st.next, 103)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF down # 0 THEN\r\t\t\t\tASSERT(downPos > pos1, 104);\r\t\t\t\tASSERT(downPos < rd.st.end, 105)\r\t\t\tEND;\r\t\t\tt := ThisType(type);\r\t\t\tIF t # NIL THEN\r\t\t\t\tx := NewStore(t); x.isElem := kind = elem\r\t\t\tELSE\r\t\t\t\trd.cause := thisTypeRes; AlienTypeReport(rd.cause, type);\r\t\t\t\tx := NIL\r\t\t\tEND;\r\t\t\tIF x # NIL THEN\r\t\t\t\tIF SamePath(t, path) THEN\r\t\t\t\t\tIF kind = elem THEN\r\t\t\t\t\t\tx.id := id; AddStore(rd.eDict, rd.eHead, x)\r\t\t\t\t\tELSE\r\t\t\t\t\t\tx.id := id; AddStore(rd.sDict, rd.sHead, x)\r\t\t\t\t\tEND;\r\t\t\t\t\tsave := rd.st; rd.cause := 0; rd.cancelled :=  FALSE;\r\t\t\t\t\tx.Internalize(rd);\r\t\t\t\t\trd.st := save;\r\t\t\t\t\tIF rd.cause # 0 THEN x := NIL\r\t\t\t\t\tELSIF (rd.Pos() # rd.st.end) OR rd.rider.eof THEN\r\t\t\t\t\t\trd.cause := inconsistentVersion; AlienReport(rd.cause);\r\t\t\t\t\t\tx := NIL\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\t\trd.cause := inconsistentType; AlienTypeReport(rd.cause, type);\r\t\t\t\t\tx := NIL\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\t\r\t\t\tIF x # NIL THEN\r\t\t\t\tIF rd.noDomain THEN\r\t\t\t\t\trd.store := x;\r\t\t\t\t\trd.noDomain := FALSE\r\t\t\t\tELSE\r\t\t\t\t\tJoin(rd.store, x)\r\t\t\t\tEND\r\t\t\tELSE\t"
                    attr: 0
