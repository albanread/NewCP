                  - text: " (VAR w: Writer);\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: HALT
                    attr: 3
                  - text: "(100)\r\tEND Externalize;\r\r\r\t"
                    attr: 0
                  - text: "(* types *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE GetThisTypeName (t: Kernel.Type; VAR type: TypeName);\r\t\tVAR i, j: INTEGER; ch: CHAR; modName, name: Kernel.Name;\r\tBEGIN\r\t\tKernel.GetModName(t.mod, modName);\r\t\tKernel.GetTypeName(t, name);\r\t\ttype := modName$;\r\t\ti := 0; ch := type[0]; WHILE ch # 0X DO INC(i); ch := type[i] END;\r\t\ttype[i] := \".\"; INC(i);\r\t\tj := 0; REPEAT ch := name[j]; type[i] := ch; INC(i); INC(j) UNTIL ch = 0X;\r\t\t"
                    attr: 0
                  - text: "(*\r\t\ttype := modName + \".\" + name;\r\t\t*)"
                    attr: 1
                  - text: "\r\t\tIF compatible THEN\r\t\t\tIF type[i-2] = \"^\" THEN\t"
                    attr: 0
                  - text: "(* for backward compatibility *)"
                    attr: 1
                  - text: "\r\t\t\t\ttype[i-2] := \"D\"; type[i-1] := \"e\"; type[i] := \"s\"; type[i+1] := \"c\"; type[i+2] := 0X \r\t\t\tEND\r\t\tEND\r\tEND GetThisTypeName;\r\r\tPROCEDURE ThisType (type: TypeName): Kernel.Type;\r\t\tVAR m: Kernel.Module; t: Kernel.Type; i, j: INTEGER; ch: CHAR;\r\t\t\ttyp, mod: Kernel.Name; res: INTEGER; str: ARRAY 256 OF CHAR;\r\tBEGIN\r\t\tASSERT(type # \"\", 20);\r\t\ti := 0; ch := type[0];\r\t\tWHILE (ch # \".\") & (ch # 0X) DO mod[i] := ch; INC(i); ch := type[i] END;\r\t\tASSERT(ch = \".\", 21);\r\t\tmod[i] := 0X; INC(i);\r\t\tm := Kernel.ThisMod(mod);\r\t\tIF m # NIL THEN\r\t\t\tj := 0; REPEAT ch := type[i]; typ[j] := ch; INC(i); INC(j) UNTIL ch = 0X;\r\t\t\tt := Kernel.ThisType(m, typ);\r\t\t\tIF "
                    attr: 0
                  - text: (
                    attr: 3
                  - text: "t = NIL) & (j >= 5) THEN\t"
                    attr: 0
                  - text: "(* try pointer type *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF (typ[j-5] = \"D\") & (typ[j-4] = \"e\") & (typ[j-3] = \"s\") & (typ[j-2] = \"c\") THEN\r\t\t\t\t\ttyp[j-5] := \"^\"; typ[j-4] := 0X;\r\t\t\t\t\tt := Kernel.ThisType(m, typ)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF t = NIL THEN thisTypeRes := typeNotFound END\r\t\tELSE\r\t\t\tt := NIL;\r\t\t\tKernel.GetLoaderResult(res, str, str, str);\r\t\t\tCASE res OF\r\t\t\t| Kernel.fileNotFound: thisTypeRes := moduleFileNotFound\r\t\t\t| Kernel.syntaxError: thisTypeRes := invalidModuleFile\r\t\t\t| Kernel.objNotFound: thisTypeRes := inconsModuleVersion\r\t\t\t| Kernel.illegalFPrint: thisTypeRes := inconsModuleVersion\r\t\t\t| Kernel.cyclicImport: thisTypeRes := invalidModuleFile\t"
                    attr: 0
                  - text: "(* cyclic import ... *)"
                    attr: 1
                  - text: "\r\t\t\tELSE thisTypeRes := invalidModuleFile\r\t\t\tEND\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " t\r\tEND ThisType;\r\t\r\tPROCEDURE SameType (IN x, y: TypeName): BOOLEAN;\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\tIF x = y THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE\r\t\tELSE\r\t\t\ti := 0; WHILE x[i] = y[i] DO INC(i) END;\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: "\r\t\t\t\t(x[i] = \"^\") & (x[i+1] = 0X) & (y[i] = \"D\") & (y[i+1] = \"e\") & (y[i+2] = \"s\") & (y[i+3] = \"c\") & (y[i+4] = 0X)\r\t\t\t\tOR (y[i] = \"^\") & (y[i+1] = 0X) & (x[i] = \"D\") & (x[i+1] = \"e\") & (x[i+2] = \"s\") & (x[i+3] = \"c\") & (x[i+4] = 0X)\r\t\tEND\r\tEND SameType;\r\r\tPROCEDURE SamePath (t: Kernel.Type; VAR path: TypePath): BOOLEAN;\r\t"
                    attr: 0
                  - text: "(* check whether t coincides with path *)"
                    attr: 1
                  - text: "\r\t\tVAR tn: TypeName; i, n: INTEGER;\r\tBEGIN\r\t\ti := -1; n := Kernel.LevelOf(t);\r\t\tREPEAT\r\t\t\tGetThisTypeName(t.base[n], tn);\r\t\t\tDEC(n); INC(i)\r\t\tUNTIL (n < 0) OR ~SameType(tn, path[i]);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " SameType(tn, path[i])\r\tEND SamePath;\r\r\tPROCEDURE NewStore (t: Kernel.Type): Store;\r\t\tVAR p: ANYPTR;\r\tBEGIN\r\t\tASSERT(t # NIL, 20);\r\t\tKernel.NewObj(p, t); ASSERT(p # NIL, 100);\r\t\tASSERT(p IS Store, 21);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " p(Store)\r\tEND NewStore;\r\r\r\t"
                    attr: 0
                  - text: "(* type dictionary *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE GetThisType (VAR d: TypeDict; id: INTEGER; VAR type: TypeName);\r\t"
                    attr: 0
                  - text: "(* pre: (id, t) IN dict *)"
                    attr: 1
                  - text: "\r\t\tVAR h, p: TypeDict; org, k: INTEGER;\r\tBEGIN\r\t\tk := id MOD dictLineLen; org := id - k;\r\t\th := NIL; p := d; WHILE p.org # org DO h := p; p := p.next END;\r\t\tIF h # NIL THEN h.next := p.next; p.next := d; d := p END;\r\t\ttype := p.type[k];\r\t\tASSERT(type # \"\", 100)\r\tEND GetThisType;\r\r\tPROCEDURE ThisId (VAR d: TypeDict; t: TypeName): INTEGER;\r\t"
                    attr: 0
                  - text: "(* pre: t # \"\" *)"
                    attr: 1
                  - text: "\r\t"
                    attr: 0
                  - text: "(* post: res = id if (t, id) in dict, res = -1 else *)"
                    attr: 1
                  - text: "\r\t\tVAR h, p: TypeDict; k, id: INTEGER;\r\tBEGIN\r\t\th := NIL; p := d; id := -1;\r\t\tWHILE (p # NIL) & (id < 0) DO\r\t\t\tk := 0; WHILE (k < dictLineLen) & (p.type[k, 0] # 0X) & (p.type[k] # t) DO INC(k) END;\r\t\t\tIF (k < dictLineLen) & (p.type[k, 0] # 0X) THEN id := p.org + k\r\t\t\tELSE h := p; p := p.next\r\t\t\tEND\r\t\tEND;\r\t\tIF (id >= 0) & (h # NIL) THEN h.next := p.next; p.next := d; d := p END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " id\r\tEND ThisId;\r\r\tPROCEDURE ThisBaseId (VAR d: TypeDict; id: INTEGER): INTEGER;\r\t"
                    attr: 0
                  - text: "(* post: res = id if base(t) # NIL, res = -1 if base(t) = NIL; res >= 0 => T(res) = base(t) *)"
                    attr: 1
                  - text: "\r\t\tVAR h, p: TypeDict; k, org, baseId: INTEGER;\r\tBEGIN\r\t\tk := id MOD dictLineLen; org := id - k;\r\t\th := NIL; p := d; WHILE p.org # org DO h := p; p := p.next END;\r\t\tIF h # NIL THEN h.next := p.next; p.next := d; d := p END;\r\t\tbaseId := p.baseId[k];\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " baseId\r\tEND ThisBaseId;\r\r\tPROCEDURE AddType (VAR d, h: TypeDict; id: INTEGER; type: TypeName);\r\t\tVAR k: INTEGER;\r\tBEGIN\r\t\tk := id MOD dictLineLen;\r\t\tIF (h = NIL) OR ((k = 0) & (h.org # id)) THEN\r\t\t\tNEW(h); h.org := id - k; h.next := d; d := h\r\t\tEND;\r\t\th.type[k] := type; h.baseId[k] := -1\r\tEND AddType;\r\r\tPROCEDURE AddBaseId (h: TypeDict; id, baseId: INTEGER);\r\t\tVAR k: INTEGER;\r\tBEGIN\r\t\tk := id MOD dictLineLen;\r\t\th.baseId[k] := baseId\r\tEND AddBaseId;\r\r\tPROCEDURE InitTypeDict (VAR d, h: TypeDict; VAR nextID: INTEGER);\r\tBEGIN\r\t\td := NIL; h := NIL; nextID := 0\r\tEND InitTypeDict;\r\r\r\t"
                    attr: 0
                  - text: "(* store dictionary - used to maintain referential sharing *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE ThisStore (VAR d: StoreDict; id: INTEGER): Store;\r\t"
                    attr: 0
                  - text: "(* pre: (id, s) IN dict *)"
                    attr: 1
                  - text: "\r\t\tVAR h, p: StoreDict; s: Store; k, org: INTEGER;\r\tBEGIN\r\t\tk := id MOD dictLineLen; org := id - k;\r\t\th := NIL; p := d; WHILE p.org # org DO h := p; p := p.next END;\r\t\tIF h # NIL THEN h.next := p.next; p.next := d; d := p END;\r\t\ts := p.elem[k];\r\t\tASSERT(s # NIL, 100);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " s\r\tEND ThisStore;\r\r\tPROCEDURE AddStore (VAR d, h: StoreDict; s: Store);\r\t\tVAR k: INTEGER;\r\tBEGIN\r\t\tk := s.id MOD dictLineLen;\r\t\tIF (h = NIL) OR ((k = 0) & (h.org # s.id)) THEN\r\t\t\tNEW(h); h.org := s.id - k; h.next := d; d := h\r\t\tEND;\r\t\th.elem[k] := s\r\tEND AddStore;\r\r\tPROCEDURE InitStoreDict (VAR d, h: StoreDict; VAR nextID: INTEGER);\r\tBEGIN\r\t\td := NIL; h := NIL; nextID := 0\r\tEND InitStoreDict;\r\r\r\t"
                    attr: 0
                  - text: "(* support for type mapping *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE ReadPath (VAR rd: Reader; VAR path: TypePath);\r\t\tVAR h: TypeDict; id, extId: INTEGER; i: INTEGER; kind: SHORTCHAR;\r\r\t\tPROCEDURE ReadUtf8(OUT x: ARRAY OF CHAR);\r\t\t\tVAR utf8: Kernel.Utf8Name; res: INTEGER;\r\t\tBEGIN\r\t\t\trd.ReadSString(utf8); Kernel.Utf8ToString(utf8, x, res); ASSERT(res = 0)\r\t\tEND ReadUtf8;\r\t\t\r\t\tPROCEDURE AddPathComp (VAR rd: Reader);\r\t\tBEGIN\r\t\t\tIF h # NIL THEN AddBaseId(h, extId, rd.nextTypeId) END;\r\t\t\tAddType(rd.tDict, rd.tHead, rd.nextTypeId, path[i]);\r\t\t\th := rd.tHead; extId := rd.nextTypeId\r\t\tEND AddPathComp;\r\r\tBEGIN\r\t\th := NIL; i := 0; rd.ReadSChar(kind);\r\t\tWHILE kind = newExt DO\r\t\t\tReadUtf8(path[i]);\r\t\t\tAddPathComp(rd); INC(rd.nextTypeId);\r\t\t\tIF path[i] # elemTName THEN INC(i) END;\r\t\t\trd.ReadSChar(kind)\r\t\tEND;\r\t\tIF kind = newBase THEN\r\t\t\tReadUtf8(path[i]);\r\t\t\tAddPathComp(rd); INC(rd.nextTypeId); INC(i)\r\t\tELSE\r\t\t\tASSERT(kind = oldType, 100);\r\t\t\trd.ReadInt(id);\r\t\t\tIF h # NIL THEN AddBaseId(h, extId, id) END;\r\t\t\tREPEAT\r\t\t\t\tGetThisType(rd.tDict, id, path[i]); id := ThisBaseId(rd.tDict, id);\r"
                    attr: 0
                  - text: "\t"
                    attr: 3
                  - text: "\t\t\tIF path[i] # elemTName THEN INC(i) END\r\t\t\tUNTIL id = -1\r\t\tEND;\r\t\tpath[i] := \"\"\r\tEND ReadPath;\r\r\tPROCEDURE WritePath (VAR wr: Writer; VAR path: TypePath);\r\t\tVAR h: TypeDict; id, extId: INTEGER; i, n: INTEGER;\r\t\t\r\t\tPROCEDURE WriteUtf8(IN x: ARRAY OF CHAR);\r\t\t\tVAR utf8: Kernel.Utf8Name; res: INTEGER;\r\t\tBEGIN\r\t\t\tKernel.StringToUtf8(x, utf8, res); ASSERT(res = 0); wr.WriteSString(utf8)\r\t\tEND WriteUtf8;\r\t\t\r\tBEGIN\r\t\th := NIL;\r\t\tn := 0; WHILE path[n] # \"\" DO INC(n) END;\r\t\ti := 0;\r\t\tWHILE i < n DO\r\t\t\tid := ThisId(wr.tDict, path[i]);\r\t\t\tIF id >= 0 THEN\r\t\t\t\tIF h # NIL THEN AddBaseId(h, extId, id) END;\r\t\t\t\twr.WriteSChar(oldType); wr.WriteInt(id); n := i\r\t\t\tELSE\r\t\t\t\tIF i + 1 < n THEN wr.WriteSChar(newExt) ELSE wr.WriteSChar(newBase) END;\r\t\t\t\tWriteUtf8(path[i]);\r\t\t\t\tIF h # NIL THEN AddBaseId(h, extId, wr.nextTypeId) END;\r\t\t\t\tAddType(wr.tDict, wr.tHead, wr.nextTypeId, path[i]);\r\t\t\t\th := wr.tHead; extId := wr.nextTypeId;\r\t\t\t\tINC(wr.nextTypeId);\r\t\t\t\tIF path[i] = modelTName THEN\t\r\t\t\t\t\tid := ThisId(wr.tDict, elemTName); ASSERT(id < 0, 100); ASSERT(i + 2 = n, 101);\r\t\t\t\t\twr.WriteSChar(newExt); WriteUtf8(elemTName);\r\t\t\t\t\tIF h # NIL THEN AddBaseId(h, extId, wr.nextTypeId) END;\r\t\t\t\t\tAddType(wr.tDict, wr.tHead, wr.nextTypeId, elemTName);\r\t\t\t\t\th := wr.tHead; extId := wr.nextTypeId;\r\t\t\t\t\tINC(wr.nextTypeId)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tINC(i)\r\t\tEND\r\tEND WritePath;\r\r\tPROCEDURE WriteType (VAR wr: Writer; t: Kernel.Type);\r\t\tVAR path: TypePath; n, i: INTEGER;\r\tBEGIN\r\t\ti := 0; n := Kernel.LevelOf(t);\r\t\tWHILE n >= 0 DO\r\t\t\tGetThisTypeName(t.base[n], path[i]);\r\t\t\tDEC(n); INC(i)\r\t\tEND;\r\t\tpath[i] := \"\";\r\t\tWritePath(wr, path)\r\tEND WriteType;\r\r\r\t"
                    attr: 0
                  - text: "(* support for alien mapping *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE InternalizeAlien (VAR rd: Reader; VAR comps: AlienComp; down, pos, len: INTEGER);\r\t\tVAR h, p: AlienComp; piece: AlienPiece; part: AlienPart; file: Files.File;\r\t\t\tnext, end, max: INTEGER;\r\tBEGIN\r\t\tfile := rd.rider.Base(); max := file.Length();\r\t\tend := pos + len; h := NIL;\r\t\tIF down # 0 THEN next := down ELSE next := end END;\r\t\tWHILE pos < end DO\r\t\t\tASSERT(end <= max, 100);\r\t\t\tIF pos < next THEN\r\t\t\t\tNEW(piece); piece.pos := pos; piece.len := next - pos;\r\t\t\t\tp := piece; pos := next\r\t\t\tELSE\r\t\t\t\tASSERT(pos = next, 101);\r\t\t\t\trd.SetPos(next);\r\t\t\t\tNEW(part); rd.ReadStore(part.store);\r\t\t\t\tASSERT(rd.st.end > next, 102);\r\t\t\t\tp := part; pos := rd.st.end;\r\t\t\t\tIF rd.st.next > 0 THEN\r\t\t\t\t\tASSERT(rd.st.next > next, 103); next := rd.st.next\r\t\t\t\tELSE next := end\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF h = NIL THEN comps := p ELSE h.next := p END;\r\t\t\th := p\r\t\tEND;\r\t\tASSERT(pos = end, 104);\r\t\trd.SetPos(end)\r\tEND InternalizeAlien;\r\r\tPROCEDURE ExternalizePiece (VAR wr: Writer; file: Files.File; p: AlienPiece);\r\t\tVAR r: Files.Reader; w: Files.Writer; b: BYTE; l, len: INTEGER;\r\tBEGIN\r\t\tl := file.Length(); len := p.len;\r\t\tASSERT(0 <= p.pos, 100); ASSERT(p.pos <= l, 101);\r\t\tASSERT(0 <= len, 102); ASSERT(len <= l - p.pos, 103);\r\t\tr := file.NewReader(NIL); r.SetPos(p.pos);\r\t\tw := wr.rider;\r\t\tWHILE len # 0 DO r.ReadByte(b); w.WriteByte(b); DEC(len) END\r\tEND ExternalizePiece;\r\r\tPROCEDURE ExternalizeAlien (VAR wr: Writer; file: Files.File; comps: AlienComp);\r\t\tVAR p: AlienComp;\r\tBEGIN\r\t\tp := comps;\r\t\tWHILE p # NIL DO\r\t\t\tWITH p: AlienPiece DO\r\t\t\t\tExternalizePiece(wr, file, p)\r\t\t\t| p: AlienPart DO\r\t\t\t\twr.WriteStore(p.store)\r\t\t\tEND;\r\t\t\tp := p.next\r\t\tEND\r\tEND ExternalizeAlien;\r\r\r\t"
                    attr: 0
                  - text: "(** Reader **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (VAR rd: Reader) "
                    attr: 0
                  - text: "ConnectTo*"
                    attr: 3
                  - text: " (f: Files.File), NEW;\r\t"
                    attr: 0
                  - text: "(** pre: rd.rider = NIL  OR  f = NIL **)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tIF f = NIL THEN\r\t\t\trd.rider := NIL\r\t\tELSE\r\t\t\tASSERT(rd.rider = NIL, 20);\r\t\t\trd.rider := f.NewReader(rd.rider); rd.SetPos(0);\r\t\t\tInitTypeDict(rd.tDict, rd.tHead, rd.nextTypeId);\r\t\t\tInitStoreDict(rd.eDict, rd.eHead, rd.nextElemId);\r\t\t\tInitStoreDict(rd.sDict, rd.sHead, rd.nextStoreId);\r\t\t\trd.noDomain := TRUE\r\t\tEND;\r\t\trd.readAlien := FALSE\r\tEND ConnectTo;\r\r\tPROCEDURE (VAR rd: Reader) "
                    attr: 0
                  - text: "SetPos*"
                    attr: 3
                  - text: " (pos: INTEGER), NEW;\r\tBEGIN\r\t\trd.rider.SetPos(pos)\r\tEND SetPos;\r\r\tPROCEDURE (VAR rd: Reader) "
                    attr: 0
                  - text: "Pos*"
                    attr: 3
                  - text: " (): INTEGER, NEW;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " rd.rider.Pos()\r\tEND Pos;\r\r\tPROCEDURE (VAR rd: Reader) "
                    attr: 0
                  - text: "ReadBool*"
                    attr: 3
                  - text: " (OUT x: BOOLEAN), NEW;\r\t\tVAR b: BYTE;\r\tBEGIN\r\t\trd.rider.ReadByte(b); x := b # 0\r\tEND ReadBool;\r\r\tPROCEDURE (VAR rd: Reader) "
                    attr: 0
                  - text: "ReadSChar*"
                    attr: 3
                  - text: " (OUT x: SHORTCHAR), NEW;\r\tBEGIN\r\t\trd.rider.ReadByte(SYSTEM.VAL(BYTE, x))\r\tEND ReadSChar;\r\r\tPROCEDURE (VAR rd: Reader) "
                    attr: 0
                  - text: "ReadXChar*"
                    attr: 3
                  - text: " (OUT x: CHAR), NEW;\r\t\tVAR c: SHORTCHAR;\r\tBEGIN\r\t\trd.rider.ReadByte(SYSTEM.VAL(BYTE,c)); x := c\r\tEND ReadXChar;\r\r\tPROCEDURE (VAR rd: Reader) "
                    attr: 0
                  - text: "ReadChar*"
                    attr: 3
                  - text: " (OUT x: CHAR), NEW;\r\t\tVAR le: ARRAY 2 OF BYTE;\t"
                    attr: 0
                  - text: "(* little endian, big endian *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\trd.rider.ReadBytes(le, 0, 2);\r\t\tx := CHR(le[0] MOD 256 + (le[1] MOD 256) * 256)\r\tEND ReadChar;\r\r\tPROCEDURE (VAR rd: Reader) "
                    attr: 0
                  - text: "ReadByte*"
                    attr: 3
                  - text: " (OUT x: BYTE), NEW;\r\tBEGIN\r\t\trd.rider.ReadByte(x)\r\tEND ReadByte;\r\r\tPROCEDURE (VAR rd: Reader) "
                    attr: 0
                  - text: "ReadSInt*"
                    attr: 3
                  - text: " (OUT x: SHORTINT), NEW;\r\t\tVAR le, be: ARRAY 2 OF BYTE;\t"
                    attr: 0
                  - text: "(* little endian, big endian *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\trd.rider.ReadBytes(le, 0, 2);\r\t\tIF Kernel.littleEndian THEN\r\t\t\tx := SYSTEM.VAL(SHORTINT, le)\r\t\tELSE\r\t\t\tbe[0] := le[1]; be[1] := le[0];\r\t\t\tx := SYSTEM.VAL(SHORTINT, be)\r\t\tEND\r\tEND ReadSInt;\r\r\tPROCEDURE (VAR rd: Reader) "
                    attr: 0
                  - text: "ReadXInt*"
                    attr: 3
                  - text: " (OUT x: INTEGER), NEW;\r\t\tVAR le, be: ARRAY 2 OF BYTE;\t"
                    attr: 0
                  - text: "(* little endian, big endian *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\trd.rider.ReadBytes(le, 0, 2);\r\t\tIF Kernel.littleEndian THEN\r\t\t\tx := SYSTEM.VAL(SHORTINT, le)\r\t\tELSE\r\t\t\tbe[0] := le[1]; be[1] := le[0];\r\t\t\tx := SYSTEM.VAL(SHORTINT, be)\r\t\tEND\r\tEND ReadXInt;\r\r\tPROCEDURE (VAR rd: Reader) "
                    attr: 0
                  - text: "ReadInt*"
                    attr: 3
                  - text: " (OUT x: INTEGER), NEW;\r\t\tVAR le, be: ARRAY 4 OF BYTE;\t"
                    attr: 0
                  - text: "(* little endian, big endian *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\trd.rider.ReadBytes(le, 0, 4);\r\t\tIF Kernel.littleEndian THEN\r\t\t\tx := SYSTEM.VAL(INTEGER, le)\r\t\tELSE\r\t\t\tbe[0] := le[3]; be[1] := le[2]; be[2] := le[1]; be[3] := le[0];\r\t\t\tx := SYSTEM.VAL(INTEGER, be)\r\t\tEND\r\tEND ReadInt;\r\r\tPROCEDURE (VAR rd: Reader) "
                    attr: 0
                  - text: "ReadLong*"
                    attr: 3
                  - text: " (OUT x: LONGINT), NEW;\r\t\tVAR le, be: ARRAY 8 OF BYTE;\t"
                    attr: 0
