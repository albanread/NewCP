                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT WinApi, HostFiles, Dialog, Strings;\r\t\r\tVAR "
                    attr: 0
                  - text: localeId
                    attr: 3
                  - text: "*: INTEGER;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ReadString
                    attr: 3
                  - text: "* (\r\t\tIN key: ARRAY OF CHAR; OUT str: ARRAY OF CHAR; VAR res: INTEGER\r\t);\r\t\tVAR r, len: INTEGER; sw, comp, appl, vers: WinApi.HANDLE;\r\tBEGIN\r\t\tres := WinApi.RegOpenKeyW(WinApi.HKEY_CURRENT_USER, \"Software\", sw);\r\t\tIF res = 0 THEN\r\t\t\tres := WinApi.RegOpenKeyW(sw, \"Oberon\", comp);\r\t\t\tIF res = 0 THEN\r\t\t\t\tres := WinApi.RegOpenKeyW(comp, Dialog.appName, appl);\r\t\t\t\tIF res = 0 THEN\r\t\t\t\t\tres := WinApi.RegOpenKeyW(appl, \"CurrentVersion\", vers);\r\t\t\t\t\tIF res = 0 THEN\r\t\t\t\t\t\tlen := LEN(str);\r\t\t\t\t\t\tres := WinApi.RegQueryValueW(vers, key, str, len);\r\t\t\t\t\t\tr := WinApi.RegCloseKey(vers)\r\t\t\t\t\tEND;\r\t\t\t\t\tr := WinApi.RegCloseKey(appl)\r\t\t\t\tEND;\r\t\t\t\tr := WinApi.RegCloseKey(comp)\r\t\t\tEND;\r\t\t\tr := WinApi.RegCloseKey(sw)\r\t\tEND\r\tEND ReadString;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ReadInt
                    attr: 3
                  - text: "* (IN key: ARRAY OF CHAR; OUT x: INTEGER; OUT res: INTEGER);\r\t\tVAR str: ARRAY 64 OF CHAR;\r\tBEGIN\r\t\tReadString(key, str, res);\r\t\tIF res = 0 THEN Strings.StringToInt(str, x, res) END;\r\tEND ReadInt;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ReadBool
                    attr: 3
                  - text: "* (IN key: ARRAY OF CHAR; OUT x: BOOLEAN; OUT res: INTEGER);\r\t\tVAR str: ARRAY 4 OF CHAR;\r\tBEGIN\r\t\tReadString(key, str, res);\r\t\tIF res = 0 THEN x := str = \"1\" END\r\tEND ReadBool;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ReadIntList
                    attr: 3
                  - text: "* (IN key: ARRAY OF CHAR; OUT x: ARRAY OF INTEGER; OUT res: INTEGER);\r\t\tVAR i, n, val, sig: INTEGER; str: ARRAY 256 OF CHAR;\r\tBEGIN\r\t\tReadString(key, str, res);\r\t\tIF res = 0 THEN\r\t\t\tn := 0; i := 0;\r\t\t\tWHILE str[i] # 0X DO\r\t\t\t\tIF n >= LEN(x) THEN res := 2; "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\t\t\tval := 0; sig := 1;\r\t\t\t\tIF str[i] = \"-\" THEN sig := -1; INC(i) END;\r\t\t\t\tWHILE (str[i] >= \"0\") & (str[i] <= \"9\") DO val := 10 * val + ORD(str[i]) - ORD(\"0\"); INC(i) END;\r\t\t\t\tx[n] := sig * val;\r\t\t\t\tIF str[i] = \",\" THEN INC(i)\r\t\t\t\tELSIF str[i] # 0X THEN res := 1; "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: "\r\t\t\t\tEND;\r\t\t\t\tINC(n)\r\t\t\tEND\r\t\tEND\r\tEND ReadIntList;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: WriteString
                    attr: 3
                  - text: "* (IN key: ARRAY OF CHAR; IN str: ARRAY OF CHAR);\r\t\tVAR res: INTEGER; sw, comp, appl, vers: WinApi.HANDLE;\r\tBEGIN\r\t\tres := WinApi.RegCreateKeyW(WinApi.HKEY_CURRENT_USER, \"Software\", sw);\r\t\tIF res = 0 THEN\r\t\t\tres := WinApi.RegCreateKeyW(sw, \"Oberon\", comp);\r\t\t\tIF res = 0 THEN\r\t\t\t\tres := WinApi.RegCreateKeyW(comp, Dialog.appName, appl);\r\t\t\t\tIF res = 0 THEN\r\t\t\t\t\tres := WinApi.RegCreateKeyW(appl, \"CurrentVersion\", vers);\r\t\t\t\t\tIF res = 0 THEN\r\t\t\t\t\t\tres := WinApi.RegSetValueW(vers, key, WinApi.REG_SZ, str, LEN(str$) * 2)\r\t\t\t\t\tEND;\r\t\t\t\t\tres := WinApi.RegCloseKey(appl)\r\t\t\t\tEND;\r\t\t\t\tres := WinApi.RegCloseKey(comp)\r\t\t\tEND;\r\t\t\tres := WinApi.RegCloseKey(sw)\r\t\tEND\r\tEND WriteString;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: WriteInt
                    attr: 3
                  - text: "* (IN key: ARRAY OF CHAR; x: INTEGER);\r\t\tVAR str: ARRAY 64 OF CHAR;\r\tBEGIN\r\t\tStrings.IntToString(x, str);\r\t\tWriteString(key, str)\r\tEND WriteInt;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: WriteBool
                    attr: 3
                  - text: "* (IN key: ARRAY OF CHAR; x: BOOLEAN);\r\tBEGIN\r\t\tIF x THEN WriteString(key, \"1\") ELSE WriteString(key, \"0\") END\r\tEND WriteBool;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: WriteIntList
                    attr: 3
                  - text: "* (IN key: ARRAY OF CHAR; IN x: ARRAY OF INTEGER);\r\t\tVAR i,j,  n: INTEGER; str: ARRAY 256 OF CHAR; s: ARRAY 16 OF CHAR;\r\tBEGIN\r\t\tn := 0; i := 0;\r\t\tWHILE n < LEN(x) DO\r\t\t\tIF (n > 0) & (i < LEN(str)) THEN str[i] := \",\"; INC(i) END;\r\t\t\tStrings.IntToString(x[n], s); j := 0;\r\t\t\tWHILE (s[j] # 0X) & (i < LEN(str)) DO str[i] := s[j]; INC(i); INC(j) END;\r\t\t\tINC(n)\r\t\tEND;\r\t\tIF i < LEN(str) THEN str[i] := 0X ELSE str[LEN(str) - 1] := 0X END;\r\t\tWriteString(key, str)\r\tEND WriteIntList;\r\t\r\r\tPROCEDURE ReadMeasure;\r\t\tVAR res, len: INTEGER; cp, int: WinApi.HANDLE; str: ARRAY 4 OF CHAR;\r\tBEGIN\r\t\tres := WinApi.GetProfileIntW(\"intl\", \"iMeasure\", 1);\r\t\tDialog.metricSystem := res = 0\r\tEND ReadMeasure;\r\t\r\tPROCEDURE GetMajorVersion(v: ARRAY OF CHAR): INTEGER;\r\t\tVAR majorVersion, pos, res: INTEGER;\r\tBEGIN\r\t\tStrings.Find(v, \".\", 0, pos);\r\t\tIF pos >= 0 THEN "
                    attr: 0
                  - text: "(* maps string v of pattern  \"x.yz\" to integer xy *)"
                    attr: 4
                  - text: "\r\t\t\tStrings.Replace(v, pos, 1, \"\");\r\t\t\tWHILE (\"0\" <= v[pos]) & (v[pos] <= \"9\") DO INC(pos) END ;\r\t\t\tv[pos] := 0X;\r\t\t\tStrings.StringToInt(v, majorVersion, res);\r\t\t\tIF res = 0 THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " majorVersion END\r\t\tEND ;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " 0 "
                    attr: 0
                  - text: "(* invalid pattern; avoid TRAP in startup sequence *)"
                    attr: 4
                  - text: "\r\tEND GetMajorVersion;\r\r\tPROCEDURE Init;\r\t\tVAR name, bname: Dialog.String; res, i, v: INTEGER;\r\tBEGIN\r\t\tv := WinApi.GetVersion();\r\t\tlocaleId := 1024;\t(* user default *)\r\t\tname := HostFiles.appName$;\r\t\tbname := \"BLACKBOX\"; i := 0;\r\t\tWHILE (i < 8) & (CAP(name[i]) = bname[i]) DO INC(i) END;\r\t\tIF i = 8 THEN\r\t\t\tname := \"BlackBox\"\r\t\tELSIF (v < 0) & (v MOD 256 < 4) THEN\r\t\t\ti := 1;\r\t\t\tWHILE name[i] # 0X DO\r\t\t\t\tIF (name[i] >= \"A\") & (name[i] <= \"Z\") THEN name[i] := CHR(ORD(name[i]) + ORD(\"a\") - ORD(\"A\")) END;\r\t\t\t\tINC(i)\r\t\t\tEND\r\t\tEND;\r\t\tDialog.appName := name$;\r\t\tDialog.MapString(\"#System:appVersion\", Dialog.appVersion);\r\t\tDialog.version := GetMajorVersion(Dialog.appVersion);\r\t\tDialog.Call(\"Startup.Setup\", \"\", res);\r\t\tReadMeasure\r\tEND Init;\r\rBEGIN\r\tInit\rEND HostRegistry."
                    attr: 0
