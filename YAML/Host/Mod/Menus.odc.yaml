                  - text: "*;\r\t\tVAR m, n, old: Menu; res, i: INTEGER; used, u: SET; tp: Stores.TypeName; oldBar: WinApi.HANDLE;\r\tBEGIN\r\t\tASSERT(curMenu = NIL, 20);\r\t\tIF firstMenu # NIL THEN\r\t\t\tused := {}; m := firstMenu;\r\t\t\tWHILE m # NIL DO GetHotkey(m.menu, m.hot, used); m := m.next END;\r\t\t\tm := firstMenu; i := 0;\r\t\t\tWHILE m # NIL DO\r\t\t\t\tIF (m.hot = -1) & (m.type = \"\") THEN m.hot := FirstFree(m.menu, used) END;\r\t\t\t\tIF m.isWinMenu THEN m.class := 4; i := 100\r\t\t\t\tELSIF m.isPopup THEN m.class := 10\r\t\t\t\tELSIF i = 0 THEN m.class := 0\r\t\t\t\tELSIF i < 3 THEN m.class := 1\r\t\t\t\tELSIF i < 100 THEN m.class := 3\r\t\t\t\tELSE m.class := 5\r\t\t\t\tEND;\r\t\t\t\tm := m.next; INC(i)\r\t\t\tEND;\r\t\t\tm := firstMenu;\r\t\t\tWHILE m # NIL DO\r\t\t\t\tIF m.hot = -1 THEN\r\t\t\t\t\ttp := m.type$; u := used; n := m;\r\t\t\t\t\tWHILE n # NIL DO\r\t\t\t\t\t\tIF (n.hot = -1) & (n.type = tp) THEN n.hot := FirstFree(n.menu, u) END;\r\t\t\t\t\t\tn := n.next\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tIF m.hot >= 0 THEN SetHotkey(m.menu, m.hot) END;\r\t\t\t\tm := m.next\r\t\t\tEND;\r\t\t\tnewMenuBar := WinApi.CreateMenu();\r\t\t\tm := firstMenu;\r\t\t\tWHILE m # NIL DO\r\t\t\t\tIF ((m.type = \"\") OR (m.type = type)) & ~m.isPopup THEN\r\t\t\t\t\tres := WinApi.AppendMenuW(newMenuBar, WinApi.MF_POPUP, m.menuH, m.menu)\r\t\t\t\tEND;\r\t\t\t\tm := m.next\r\t\t\tEND;\r\t\t\toldBar := menuBar; menuBar := newMenuBar;\r\t\t\twinMenu := newWinMenu; popMenu := newPopMenu;\r\t\t\told := menus; menus := firstMenu; lastId := nextId;\r\t\t\tIF UpdateOleMenus # NIL THEN UpdateOleMenus() END;\r\t\t\tres := WinApi.SendMessageW(HostWindows.client, WinApi.WM_MDISETMENU, menuBar, winMenu);\r\t\t\tIF res # 0 THEN\r\t\t\t\tres := WinApi.DrawMenuBar(HostWindows.main);\r\t\t\t\tm := old;\r\t\t\t\tWHILE m # NIL DO\t"
