                    attr: 1
                  - text: "\r\r\tPROCEDURE PrepareMenu (wnd, menu: WinApi.HANDLE; lParam: INTEGER);\r"
                    attr: 0
                  - text: "\t(* this procedure is called after the user has clicked into the menu bar, but before\r\t\tshowing the menu; to prepare item enabling/disabling, check marks, etc. *)\r"
                    attr: 1
                  - text: "\t\tVAR res, n: INTEGER; failed, ok: BOOLEAN; par: Dialog.Par; m: Menu; i: StdDialog.Item; str: Dialog.String;\r\tBEGIN\r\t\tm := menus;\r\t\tWHILE (m # NIL) & (m.menuH # menu) DO m := m.next END;\r\t\tIF m # NIL THEN\r\t\t\ti := m.firstItem; n := 0;\r\t\t\tWHILE i # NIL DO\r\t\t\t\tWITH i: Item DO\r\t\t\t\t\tIF i.filter^ # \"\" THEN\t"
                    attr: 0
                  - text: "(* custom menu item with custom guard *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\tStdDialog.CheckFilter(i, failed, ok, par);\r\t\t\t\t\t\tIF ~failed THEN\r\t\t\t\t\t\t\tIF par.label = \"-\" THEN\r\t\t\t\t\t\t\t\tIF ~i.del THEN\r\t\t\t\t\t\t\t\t\tres := WinApi.RemoveMenu(m.menuH, n, WinApi.MF_BYPOSITION);\r\t\t\t\t\t\t\t\t\ti.del := TRUE\r\t\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\t\tDEC(n)\r\t\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\t\tIF i.del THEN\r\t\t\t\t\t\t\t\t\tres := WinApi.InsertMenuW(m.menuH, n, WinApi.MF_BYPOSITION, i.id, \"+\");\r\t\t\t\t\t\t\t\t\ti.del := FALSE\r\t\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\t\tIF par.label # i.item$ THEN\r\t\t\t\t\t\t\t\t\tDialog.MapString(par.label, str);\r\t\t\t\t\t\t\t\t\tChangeItem(m, i, str);\r\t\t\t\t\t\t\t\t\tIF i.id = iObject THEN\r\t\t\t\t\t\t\t\t\t\tres := WinApi.ModifyMenuW(\r\t\t\t\t\t\t\t\t\t\t\tm.menuH, n, WinApi.MF_BYPOSITION + WinApi.MF_POPUP, objMenu, str)\r\t\t\t\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\t\t\t\tres := WinApi.ModifyMenuW(m.menuH, n, WinApi.MF_BYPOSITION, i.id, str)\r\t\t\t\t\t\t\t\t\tEND\r\t\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\t\tIF par.disabled THEN\r\t\t\t\t\t\t\t\t\tres := WinApi.EnableMenuItem(\r\t\t\t\t\t\t\t\t\t\tm.menuH, n, WinApi.MF_BYPOSITION + WinApi.MF_GRAYED)\r\t\t\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\t\t\tres := WinApi.EnableMenuItem(m.menuH, n, WinApi.MF_BYPOSITION)\r\t\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\t\tIF par.checked & ~ODD(WinApi.GetMenuState(m.menuH, n, WinApi.MF_BYPOSITION))\r\t\t\t\t\t\t\t\tTHEN\r\t\t\t\t\t\t\t\t\tres := WinApi.CheckMenuItem(\r\t\t\t\t\t\t\t\t\t\tm.menuH, n, WinApi.MF_BYPOSITION + WinApi.MF_CHECKED)\r\t\t\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\t\t\tres := WinApi.CheckMenuItem(m.menuH, n, WinApi.MF_BYPOSITION)\r\t\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\t\tIF ~ok THEN\r\t\t\t\t\t\t\t\t\t"
                    attr: 0
