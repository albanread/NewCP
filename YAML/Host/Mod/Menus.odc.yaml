                  - text: "*;\r\t\tVAR f: Views.Frame; res, x, y: INTEGER; d: BOOLEAN; pt: WinApi.POINT; m: SET;\r\t\t\tmenu: Menu; menuH: WinApi.HANDLE;\r\tBEGIN\r\t\tf := Controllers.FocusFrame();\r\t\tIF (f # NIL) & f.front THEN\r\t\t\tUpdateType();\r\t\t\tmenu := menus;\r\t\t\tWHILE (menu # NIL) & (~menu.isPopup OR (menu.type # \"\") & (menu.type # type)) DO\r\t\t\t\tmenu := menu.next\r\t\t\tEND;\r\t\t\tIF menu # NIL THEN menuH := menu.menuH ELSE menuH := popMenu END;\r\t\t\tIF WinApi.GetCapture() # 0 THEN f.Input(x, y, m, d)\r\t\t\tELSE x := (f.l + f.r) DIV 2; y := (f.t + f.b) DIV 2\r\t\t\tEND;\r\t\t\tpt.x := (x + f.gx) DIV f.unit; pt.y := (y + f.gy) DIV f.unit;\r\t\t\tres := WinApi.ClientToScreen(f.rider(HostPorts.Rider).port.wnd, pt);\r\t\t\tres := WinApi.TrackPopupMenu(menuH, {1}, pt.x, pt.y + 2, 0, HostWindows.main, NIL)\r\t\tEND\r\tEND PopupMenu;\r\t\r\t\r\t"
                    attr: 0
