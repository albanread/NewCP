                  - text: "*;\r\t\tVAR i: Item;\r\tBEGIN\r\t\tASSERT(curMenu # NIL, 20);\r\t\tNEW(i); i.next := NIL;\r\t\tIF curMenu.lastItem = NIL THEN curMenu.firstItem := i ELSE curMenu.lastItem.next := i END;\r\t\tcurMenu.lastItem := i;\r\t\tStdDialog.AddItem(i, \"\", \"\", \"\", \"\");\r\t\ti.id := 0\r\tEND AddSeparator;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Close
                    attr: 3
                  - text: "*;\r\t\tVAR res, j, n: INTEGER; i: StdDialog.Item; tab: POINTER TO ARRAY OF Dialog.String;\r\tBEGIN\r\t\tASSERT(curMenu # NIL, 20);\r\t\ti := curMenu.firstItem; n := 0;\r\t\tWHILE i # NIL DO i := i.next; INC(n) END;\r\t\tNEW(tab, n);\r\t\ti := curMenu.firstItem; j := 0;\r\t\tWHILE i # NIL DO Dialog.MapString(i.item, tab[j]); (* tab[j] := i.item^$; *)i := i.next; INC(j) END;\r\t\tSetHotkeys(tab, j);\r\t\ti := curMenu.firstItem; j := 0;\r\t\tWHILE i # NIL DO\r\t\t\tWITH i: Item DO\r\t\t\t\tIF i.item^ # \"\" THEN\r\t\t\t\t\tSetShortcut(i, tab[j]);\r\t\t\t\t\tIF i.id = iObject THEN\r\t\t\t\t\t\tres := WinApi.AppendMenuW(curMenu.menuH, WinApi.MF_POPUP, objMenu, tab[j])\r\t\t\t\t\tELSE\r\t\t\t\t\t\tres := WinApi.AppendMenuW(curMenu.menuH, {}, i.id, tab[j])\r\t\t\t\t\tEND\r\t\t\t\tELSIF i.next # NIL THEN\r\t\t\t\t\tres := WinApi.AppendMenuW(curMenu.menuH, WinApi.MF_SEPARATOR, 0, NIL)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\ti := i.next; INC(j)\r\t\tEND;\r\t\tIF curMenu.menu = \"*\" THEN curMenu.isPopup := TRUE END;\r\t\tIF curMenu.type = \"WindowMenu\" THEN curMenu.isWinMenu := TRUE; curMenu.type := \"\" END;\r\t\tIF curMenu.isWinMenu THEN newWinMenu := curMenu.menuH\r\t\tELSIF curMenu.type = \"PopupMenu\" THEN newPopMenu := curMenu.menuH\r\t\tEND;\r\t\tIF lastMenu = NIL THEN firstMenu := curMenu ELSE lastMenu.next := curMenu END;\r\t\tlastMenu := curMenu; curMenu := NIL\r\tEND Close;\r\r\tPROCEDURE "
