                  - text: "\r\t\t\t\t\t\t\t\t\tres := WinApi.EnableMenuItem(\r\t\t\t\t\t\t\t\t\t\tm.menuH, n, WinApi.MF_BYPOSITION + WinApi.MF_GRAYED)\r\t\t\t\t\t\t\t\tEND\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\ti := i.next; INC(n)\r\t\t\tEND\r\t\tEND\r\tEND PrepareMenu;\r\t\r\tPROCEDURE HandleCustomMenu (id: INTEGER);\r\t\tVAR m: Menu; i: StdDialog.Item; \r\tBEGIN\r\t\tm := menus;\r\t\tWHILE (m # NIL) & (m.maxId < id) DO m := m.next END;\r\t\tIF m # NIL THEN i := m.firstItem;\r\t\t\tWHILE (i # NIL) & (i(Item).id # id) DO i := i.next END;\r\t\t\tIF i # NIL THEN StdDialog.HandleItem(i) END\r\t\tEND\r\tEND HandleCustomMenu;\r\r\tPROCEDURE MenuCommand (wnd: WinApi.HANDLE; wParam, lParam: INTEGER);\r\t\tVAR res, id: INTEGER; old: WinApi.HANDLE;\r\tBEGIN\r\r\t\told := WinApi.SetCursor(HostPorts.cursors[HostPorts.busyCursor]);\r\t\tDialog.ShowStatus(\"\");\r\r\t\tDEC(gc); id := wParam MOD 65536;\r\t\tCASE id OF\r\t\t| iClose: HostCmds.Close\r\t\t| iUndo: StdCmds.Undo\r\t\t| iCut: HostCmds.Cut\r\t\t| iCopy: HostCmds.Copy\r\t\t| iPaste: HostCmds.Paste\r\t\t| iOpen: HostCmds.Open\r\t\t| iExit: Exit\r\t\t| iUpdateMenus: Dialog.Call(\"StdMenuTool.UpdateAllMenus\", \"\", res)\r\t\t| iPopup: PopupMenu\r\t\t| iObjEdit: SetFocus\r\t\t| iObjOpen: OpenWindow\r\t\t| iProperties: StdCmds.ShowProp\r\t\tELSE\r\t\t\tIF id < firstId THEN HandleVerb(id - iVerb0)\r\t\t\tELSE\r\t\t\t\tres := 0;\t"
