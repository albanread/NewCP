                  - text: "\r\tIMPORT SYSTEM, WinApi, Kernel, Log, Services,\r\t\tFonts, Files, Strings, Ports, Stores, Properties, Printers, Dialog,\r\t\tModels, Views, Controllers, Containers, Converters,\r\t\tDocuments, Windows, Controls,\r\t\tStdDialog, StdInterpreter, StdCmds, HostFonts, HostPorts, \r\t\tHostFiles, HostWindows, HostDialog, HostClipboard, HostCmds, HostCFrames;\r\r\tCONST\r\t\tdebug = FALSE;\r\t\t\r\t\tidlePeriod = 50; "
                    attr: 0
                  - text: "(* ms *)"
                    attr: 1
                  - text: "\r\t\tgcCycle = 100;\r\r\t\t"
                    attr: 0
                  - text: "(* hints *)"
                    attr: 1
                  - text: "\r\t\timpAll = 0;\t"
                    attr: 0
                  - text: "(* can import all file types *)"
                    attr: 1
                  - text: "\r\r\t\tHYPHEN = 90X; NBHYPHEN = 91X; SOFTHYPHEN = 0ADX;\r\t\tNBSPACE = 0A0X; NUMSPACE = 8FX;\r\r\t\tiClose = 100; "
                    attr: 0
                  - text: "(* known in HostWindows *)\r\t\t"
                    attr: 1
                  - text: iUndo = 112; iCut = 114; iCopy = 115; iPaste = 116;
                    attr: 0
                  - text: "\r\t\t"
                    attr: 1
                  - text: "iObject = 120; iPopup = 160; iProperties = 163;\r\t\tiObjEdit = 161; iObjOpen = 162; iVerb0 = 200;\r\t\tiOpen = 102; iUpdateMenus = 111; iExit = 110;\r\r"
                    attr: 0
                  - text: "\t\t(* custom menus *)\r"
                    attr: 1
                  - text: "\t\tfirstId = 300;\r\t\t\r\t\t"
                    attr: 0
                  - text: "(* apllication states *)"
                    attr: 1
                  - text: "\r\t\trunning = 0; hidden = 1; embedded = 2; noAppWin = 3;\r\t\t\r\t\t(* File for specifying command line options *)\r\t\tcmdLinePath = \"System/Rsrc\"; cmdLineFile = \"CommandLine.txt\";\r\t\t\r\r\tTYPE\r\t\t"
                    attr: 0
                  - text: Item
                    attr: 3
                  - text: "* = POINTER TO RECORD (StdDialog.Item)\r\t\t\tid-, code-: INTEGER;\r\t\t\tshift-, ctrl-, del: BOOLEAN\r\t\tEND;\r\r\t\t"
                    attr: 0
                  - text: Menu
                    attr: 3
                  - text: "* = POINTER TO RECORD\r\t\t\tnext-: Menu;\r\t\t\tmenu-, type-: Dialog.String;\r\t\t\tfirstItem-, lastItem: Item;\r\t\t\tmenuH-: WinApi.HANDLE;\r\t\t\tisWinMenu-: BOOLEAN;\r\t\t\tisPopup-: BOOLEAN;\r\t\t\tclass-: INTEGER;\r\t\t\thot, maxId: INTEGER\r\t\tEND;\r\t\t\r\t\t"
                    attr: 0
                  - text: TypeMsg
                    attr: 3
                  - text: "* = EXTENSIBLE RECORD (Properties.Message)\r\t\t\ttype*: ARRAY 64 OF CHAR\t"
                    attr: 0
                  - text: "(** OUT, preset to \"\" **)"
                    attr: 1
                  - text: "\r\t\tEND;\r\t\t\r\r\tVAR\r\t\t"
                    attr: 0
                  - text: "(* active menu bar state *)\r"
                    attr: 1
                  - text: "\t\t"
                    attr: 0
                  - text: menus-
                    attr: 3
                  - text: ": Menu;\r\t\t"
                    attr: 0
                  - text: menuBar
                    attr: 3
                  - text: "-: WinApi.HANDLE;\r\t\t"
                    attr: 0
                  - text: lastId
                    attr: 3
                  - text: "-: INTEGER;\t"
                    attr: 0
                  - text: "(* last custom menu id *)"
                    attr: 1
                  - text: "\r\t\t\r\t\t"
                    attr: 0
                  - text: disablePipe
                    attr: 3
                  - text: "*: BOOLEAN;\r\t\t\r\t\t"
                    attr: 0
                  - text: hookApplWinHandler
                    attr: 3
                  - text: "*: PROCEDURE (message, wPar, lPar: INTEGER; VAR res: INTEGER): BOOLEAN;\r"
                    attr: 0
                  - text: "\t\t\t(* hook for handling application specific messages; returns TRUE iff handled *)\t\t\r"
                    attr: 1
                  - text: "\t\twinMenu, popMenu: WinApi.HANDLE;\r\t\ttype: Stores.TypeName;\r\r\t\t"
                    attr: 0
                  - text: "(* new menu bar state *)"
                    attr: 1
                  - text: "\r\t\tnewMenuBar, newWinMenu, newPopMenu: WinApi.HANDLE;\r\t\tnextId: INTEGER;\t"
                    attr: 0
                  - text: "(* id of next menu item *)"
                    attr: 1
                  - text: "\r\t\tfirstMenu, lastMenu, curMenu: Menu;\r\t\t\r\t\tgc: INTEGER;\t"
                    attr: 0
                  - text: "(* how many events must be executed before next GC *)\r"
                    attr: 1
                  - text: "\t\tdefMenu: WinApi.HANDLE;\t"
                    attr: 0
                  - text: "(* default menu *)"
                    attr: 1
                  - text: "\r\t\tobjMenu: WinApi.HANDLE;\t"
                    attr: 0
                  - text: "(* object menu (verbs) *)"
                    attr: 1
                  - text: "\r\t\tshiftStr, ctrlStr, spaceStr: Dialog.String;\r\t\tminusCode: INTEGER;\t"
                    attr: 0
                  - text: "(* key code for \"-\" *)"
                    attr: 1
                  - text: "\r\t\tnum: INTEGER;\r\t\tmsgId: INTEGER;\r\t\t\r\t\tlocks-: INTEGER;\r\t\tstate: INTEGER;\r\t\t\r\t\topenUsed: BOOLEAN;\r\t\topenParam: ARRAY 256 OF CHAR;\r\t\t\r\t\tisCont*, isObj*: BOOLEAN;\r\t\t\r\t\tUpdateOleMenus*: PROCEDURE;\r\t\tTranslateOleKeys1*: PROCEDURE (VAR msg: WinApi.MSG; VAR done: BOOLEAN);\r\t\tTranslateOleKeys2*: PROCEDURE (VAR msg: WinApi.MSG; VAR done: BOOLEAN);\r\t\t\r\r\tPROCEDURE [1] FINIT 0DBH, 0E3H;\r\tPROCEDURE [1] FCLEX 0DBH, 0E2H;"
                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\tPROCEDURE [1] FLDCW 0D9H, 06DH, 0FCH;\t"
                    attr: 0
                  - text: "(* -4, FP *)"
                    attr: 1
                  - text: "\r\tPROCEDURE [1] FSTCW 0D9H, 07DH, 0FCH;\t"
                    attr: 0
                  - text: "(* -4, FP *)\r"
                    attr: 1
                  - text: "\tPROCEDURE [1] FSTSW 0DDH, 07DH, 0FCH;\t"
                    attr: 0
                  - text: "(* -4, FP *)\r\t\r"
                    attr: 1
                  - text: "\tPROCEDURE CheckFpu;\r\t\tVAR cw: SET;\r\tBEGIN\r\t\tFSTCW;\r\t\tIF cw * {0..5, 8..11} # {1, 2, 3, 4, 5, 8, 9} THEN\r\t\t\tcw := cw - {0..5, 8..11} + {1, 2, 3, 4, 5, 8, 9};\r\t\t\tFCLEX; FLDCW\r\t\tEND\r\tEND CheckFpu;\r\t\r\r\tPROCEDURE "
                    attr: 0
                  - text: Collect
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\tgc := 0\r\tEND Collect;\r\r\r\t"
                    attr: 0
                  - text: "(* hidden application support *)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Lock
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\tINC(locks);\r\t\tIF state = embedded THEN state := hidden END\r\tEND Lock;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Unlock
                    attr: 3
                  - text: "*;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tDEC(locks);\r\t\tIF (state = hidden) & (locks = 0) THEN\r\t\t\tHostClipboard.Flush;\r\t\t\tres := WinApi.DestroyWindow(HostWindows.main)\r\t\tEND\r\tEND Unlock;\r\t\r\r"
                    attr: 0
                  - text: "\t(* shortcut support *)\r"
                    attr: 1
                  - text: "\r\tPROCEDURE Append (VAR a: ARRAY OF CHAR; b: ARRAY OF CHAR);\t"
                    attr: 0
                  - text: "(* a := a + b *)"
                    attr: 1
                  - text: "\r\t\tVAR i, j: INTEGER;\r\tBEGIN\r\t\ti := 0; j := 0;\r\t\tWHILE a[i] # 0X DO INC(i) END;\r\t\tWHILE b[j] # 0X DO a[i] := b[j]; INC(i); INC(j) END;\r\t\ta[i] := 0X\r\tEND Append;\r\t\r\tPROCEDURE SetShortcut (VAR i: Item; VAR name: Dialog.String);\r\t\tVAR j, n: INTEGER; ch, nch: CHAR; a: ARRAY 4 OF CHAR;\r\tBEGIN\r\t\ti.shift := FALSE; i.ctrl := FALSE; i.code := 0; j := 0; ch := i.shortcut[0];\r\t\tWHILE (ch # 0X) & (i.code = 0) DO INC(j);\r\t\t\tIF (ch >= \"a\") & (ch <= \"z\") THEN ch := CAP(ch) END;\r\t\t\tnch := i.shortcut[j];\r\t\t\tIF ch = \"*\" THEN i.shift := TRUE\r\t\t\tELSIF ch = \"^\" THEN i.ctrl := TRUE\r\t\t\tELSIF (ch >= \"A\") & (ch <= \"Z\") OR (ch >= \"0\") & (ch <= \"9\") OR (ch = \" \") THEN\r\t\t\t\tIF (nch >= \"a\") & (nch <= \"z\") THEN nch := CAP(nch) END;\r\t\t\t\tIF nch = 0X THEN i.code := ORD(ch); i.ctrl := TRUE\r\t\t\t\tELSIF ch = \"F\" THEN\r\t\t\t\t\tn := 0;\r\t\t\t\t\tWHILE (nch >= \"0\") & (nch <= \"9\") DO\r\t\t\t\t\t\tn := 10 * n + ORD(nch) - ORD(\"0\"); INC(j); nch := i.shortcut[j]\r\t\t\t\t\tEND;\r\t\t\t\t\tIF (n >= 1) & (n <= 16) THEN i.code := 70H - 1 + n END\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tch := nch\r\t\tEND;\r\t\tIF i.code # 0 THEN\r\t\t\tAppend(name, \"\t\");"
                    attr: 0
                  - text: "\t(* tab *)"
                    attr: 1
                  - text: "\r\t\t\tIF i.shift THEN Append(name, shiftStr) END;\r\t\t\tIF i.ctrl THEN Append(name, ctrlStr) END;\r\t\t\tIF i.code >= 70H THEN\r\t\t\t\ta[0] := \"F\"; n := i.code - 70H + 1; j := 1;\r\t\t\t\tIF n > 9 THEN a[1] := \"1\"; DEC(n, 10); INC(j) END;\r\t\t\t\ta[j] := CHR(n + ORD(\"0\")); a[j+1] := 0X;\r\t\t\t\tAppend(name, a)\r\t\t\tELSIF i.code = ORD(\" \") THEN Append(name, spaceStr)\r\t\t\tELSE a[0] := CHR(i.code); a[1] := 0X; Append(name, a)\r\t\t\tEND\r\t\tEND\r\tEND SetShortcut;\r\t\r"
                    attr: 0
                  - text: "\t(* hotkey support *)\r"
                    attr: 1
                  - text: "\r\tPROCEDURE NextWord (VAR name: Dialog.String; i: INTEGER): INTEGER;\r\tBEGIN\r\t\tWHILE (name[i] # 0X) & (name[i] # \" \") DO INC(i) END;\r\t\tWHILE name[i] = \" \" DO INC(i) END;\r\t\tIF (CAP(name[i]) < \"A\") OR (CAP(name[i]) > \"Z\") THEN i := -1 END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " i\r\tEND NextWord;\r\t\r\tPROCEDURE SetHotkey (VAR name: Dialog.String; i: INTEGER);\r\t\tVAR j: INTEGER;\r\tBEGIN\r\t\tIF name[i] # \"&\" THEN\r\t\t\tj := i;\r\t\t\tWHILE name[j] # 0X DO INC(j) END;\r\t\t\tWHILE j >= i DO name[j+1] := name[j]; DEC(j) END;\r\t\t\tname[i] := \"&\"\r\t\tEND\r\tEND SetHotkey;\r\t\r\tPROCEDURE GetHotkey (VAR name: Dialog.String; VAR pos: INTEGER; VAR used: SET);\r\t\tVAR i: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ti := 0; ch := name[0];\r\t\tWHILE ch # 0X DO\r\t\t\tIF ch = \"&\" THEN\r\t\t\t\tch := name[i + 1];\r\t\t\t\tIF ch = \"&\" THEN INC(i)\r\t\t\t\tELSE\r\t\t\t\t\tpos := i; ch := CAP(ch);\r\t\t\t\t\tIF (ch >= \"A\") & (ch <= \"Z\") THEN INCL(used, ORD(ch) - ORD(\"A\")) END;\r\t\t\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " \r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tINC(i); ch := name[i]\r\t\tEND;\r\t\tpos := -1\r\tEND GetHotkey;\r\t\r\tPROCEDURE FirstFree (VAR name: Dialog.String; VAR used: SET): INTEGER;\r\t\tVAR i: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ti := 0; ch := CAP(name[0]);\r\t\tWHILE (name[i] # 0X) & ((ch < \"A\") OR (ch > \"Z\") OR (ORD(ch) - ORD(\"A\") IN used)) DO\r\t\t\tINC(i); ch := CAP(name[i])\r\t\tEND;\r\t\tIF ch # 0X THEN INCL(used, ORD(ch) - ORD(\"A\"))\r\t\tELSE i := -1\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " i\r\tEND FirstFree;\r\r\tPROCEDURE SetHotkeys (VAR tab: ARRAY OF Dialog.String; n: INTEGER);\r\t\tVAR i, j: INTEGER; ch: CHAR; pos: POINTER TO ARRAY OF INTEGER; used: SET;\r\tBEGIN\r\t\tNEW(pos, LEN(tab));\r\t\tused := {}; i := 0;\r\t\tWHILE i < n DO GetHotkey(tab[i], pos[i], used); INC(i) END;\r\t\ti := 0;\r\t\tWHILE i < n DO\r\t\t\tIF pos[i] = -1 THEN\r\t\t\t\tch := CAP(tab[i, 0]);\r\t\t\t\tIF (ch >= \"A\") & (ch <= \"Z\") & ~(ORD(ch) - ORD(\"A\") IN used) THEN\r\t\t\t\t\tINCL(used, ORD(ch) - ORD(\"A\"));\r\t\t\t\t\tpos[i] := 0\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tINC(i)\r\t\tEND;\r\t\ti := 0;\r\t\tWHILE i < n DO\r\t\t\tIF pos[i] = -1 THEN\r\t\t\t\tj := NextWord(tab[i], 0);\r\t\t\t\tWHILE j >= 0 DO\r\t\t\t\t\tch := CAP(tab[i, j]);\r\t\t\t\t\tIF ~(ORD(ch) - ORD(\"A\") IN used) THEN\r\t\t\t\t\t\tINCL(used, ORD(ch) - ORD(\"A\"));\r\t\t\t\t\t\tpos[i] := j; j := -1\r\t\t\t\t\tELSE\r\t\t\t\t\t\tj := NextWord(tab[i], j)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tINC(i)\r\t\tEND;\r\t\ti := 0;\r\t\tWHILE i < n DO\r\t\t\tIF pos[i] = -1 THEN pos[i] := FirstFree(tab[i], used) END;\r\t\t\tIF pos[i] >= 0 THEN SetHotkey(tab[i], pos[i]) END;\r\t\t\tINC(i)\r\t\tEND\r\tEND SetHotkeys;\r\t\r\tPROCEDURE UpdateHotkey (VAR old, new: Dialog.String);\r\t\tVAR i, j: INTEGER; used: SET; ch: CHAR;\r\tBEGIN\r\t\tGetHotkey(new, i, used);\r\t\tIF i = -1 THEN\r\t\t\tused := {}; GetHotkey(old, i, used);\r\t\t\tIF used # {} THEN\r\t\t\t\tused := -used; i := -1; j := 0;\r\t\t\t\tWHILE j >= 0 DO\r\t\t\t\t\tch := CAP(new[j]);\r\t\t\t\t\tIF ~(ORD(ch) - ORD(\"A\") IN used) THEN\r\t\t\t\t\t\ti := j; j := -1\r\t\t\t\t\tELSE\r\t\t\t\t\t\tj := NextWord(new, j)\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tIF i = -1 THEN i := FirstFree(new, used) END;\r\t\t\t\tIF i >= 0 THEN SetHotkey(new, i) END\r\t\t\tEND\r\t\tEND\r\tEND UpdateHotkey;\r\t\r\r"
                    attr: 0
                  - text: "\t(* custom menus *)\r\t\r\t"
                    attr: 1
                  - text: "PROCEDURE AppendMenu (menu: WinApi.HANDLE; id: INTEGER; name: Dialog.String);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tDialog.MapString(name, name);\r\t\tres := WinApi.AppendMenuW(menu, {}, id, name)\r\tEND AppendMenu;"
                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\r\tPROCEDURE "
                    attr: 0
                  - text: FirstMenu
                    attr: 3
                  - text: "* (): Menu;\r\tBEGIN\r\t\tRETURN menus\r\tEND FirstMenu;\r\r\tPROCEDURE "
                    attr: 0
                  - text: DeleteAll
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\tWHILE WinApi.RemoveMenu(menuBar, 0, WinApi.MF_BYPOSITION) # 0 DO END;\r\t\tfirstMenu := NIL; lastMenu := NIL; curMenu := NIL;\r\t\tnewWinMenu := 0; newPopMenu := 0;\r\t\tnextId := firstId\r\tEND DeleteAll;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Open
                    attr: 3
                  - text: "* (menu, type: ARRAY OF CHAR);\r\tBEGIN\r\t\tASSERT(curMenu = NIL, 20); ASSERT(menu # \"\", 21);\r\t\tNEW(curMenu); curMenu.next := NIL;\r\t\tcurMenu.menuH := WinApi.CreatePopupMenu();\r\t\t(* curMenu.menu := menu$; *)\r\t\tDialog.MapString(menu, curMenu.menu);\r\t\tcurMenu.type := type$;\r\t\tcurMenu.firstItem := NIL\r\tEND Open;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: AddItem
                    attr: 3
                  - text: "* (item, string, shortcut, filter: Dialog.String);\r\t\tVAR i: Item; id: INTEGER;\r\tBEGIN\r\t\tASSERT(curMenu # NIL, 20); ASSERT(item # \"\", 21); ASSERT(string # \"\", 22);\r\t\tIF string = \"HostMenus.WindowList\" THEN\r\t\t\tcurMenu.isWinMenu := TRUE\r\t\tELSE\r\t\t\tNEW(i); i.next := NIL;\r\t\t\tIF curMenu.lastItem = NIL THEN curMenu.firstItem := i ELSE curMenu.lastItem.next := i END;\r\t\t\tcurMenu.lastItem := i;\r\t\t\tStdDialog.AddItem(i, item, string, filter, shortcut);\r\t\t\tIF string = \"HostMenus.ObjectMenu\" THEN id := iObject\r\t\t\tELSE id := nextId; INC(nextId)\r\t\t\tEND;\r\t\t\ti.id := id;\r\t\t\tIF id > curMenu.maxId THEN curMenu.maxId := id END\r\t\tEND\r\tEND AddItem;\r\r\tPROCEDURE ChangeItem (m: Menu; i: Item; VAR name: Dialog.String);\r\t\tVAR res: INTEGER; old: Dialog.String;\r\tBEGIN\r\t\tres := WinApi.GetMenuStringW(m.menuH, i.id, old, LEN(old), {});\r\t\tUpdateHotkey(old, name);\r\t\tSetShortcut(i, name)\r\tEND ChangeItem;\r\r\tPROCEDURE "
