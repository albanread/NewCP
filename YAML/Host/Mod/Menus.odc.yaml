                    attr: 3
                  - text: "*;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tres := WinApi.SendMessageW(HostWindows.main, WinApi.WM_CLOSE, 0, 0)\r\tEND Exit;\r\t\r\r\tPROCEDURE SetFocus;\r\t\tVAR c: Containers.Controller; f: Views.Frame; v, s: Views.View;\r\tBEGIN\r\t\tf := Controllers.FocusFrame(); v := f.view;\r\t\tWITH v: Containers.View DO\r\t\t\tc := v.ThisController();\r\t\t\ts := c.Singleton();\r\t\t\tIF s # NIL THEN c.SetFocus(s) END\r\t\tELSE\r\t\tEND\r\tEND SetFocus;\r\t\r\tPROCEDURE OpenWindow;\r\t\tVAR c: Containers.Controller; f: Views.Frame; v, s: Views.View; doc: Documents.Document;\r\t\t\twin: Windows.Window; title: Views.Title;\r\tBEGIN\r\t\tf := Controllers.FocusFrame(); v := f.view;\r\t\tWITH v: Containers.View DO\r\t\t\tc := v.ThisController();\r\t\t\ts := c.Singleton();\r\t\t\tIF (s # NIL) & (s.ThisModel() # NIL) THEN\r\t\t\t\twin := Windows.dir.Focus(Controllers.frontPath); ASSERT(win # NIL, 100);\r\t\t\t\tdoc := win.doc.DocCopyOf(s);\r\t\t\t\tc := doc.ThisController();\r\t\t\t\tc.SetOpts(c.opts - {Documents.pageWidth, Documents.pageHeight}\r\t\t\t\t\t\t\t\t\t\t+ {Documents.winWidth, Documents.winHeight});\r\t\t\t\t(* Stores.InitDomain(doc, v.domain); done by DocCopyOf *)\r\t\t\t\twin.GetTitle(title);\r\t\t\t\tWindows.dir.OpenSubWindow(Windows.dir.New(), doc, {Windows.isAux}, title)\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND OpenWindow;\r\t\r\tPROCEDURE HandleVerb (n: INTEGER);\r\t\tVAR v: Views.View; dvm: Properties.DoVerbMsg;\r\tBEGIN\r\t\tv := Containers.FocusSingleton();\r\t\tIF v # NIL THEN\r\t\t\tdvm.frame := Views.ThisFrame(Controllers.FocusFrame(), v);\r\t\t\tdvm.verb := n;\r\t\t\tViews.HandlePropMsg(v, dvm)\r\t\tEND\r\tEND HandleVerb;\r\t\r\tPROCEDURE CheckVerb (v: Views.View; n: INTEGER; VAR pvm: Properties.PollVerbMsg);\r\tBEGIN\r\t\tpvm.verb := n;\r\t\tpvm.label := \"\";\r\t\tpvm.disabled := FALSE; pvm.checked := FALSE;\r\t\tViews.HandlePropMsg(v, pvm)\r\tEND CheckVerb;\r\t\r\tPROCEDURE "
