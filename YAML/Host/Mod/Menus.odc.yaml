                    attr: 1
                  - text: "\t\t\ti := 0; id := iVerb0;\r\t\t\tCheckVerb(v, 0, pvm);\r\t\t\tIF pvm.label = \"\" THEN\r\t\t\t\tAppendMenu(objMenu, iObjEdit, \"#Host:Edit\");\r\t\t\t\tAppendMenu(objMenu, iObjOpen, \"#Host:Open\");\r\t\t\t\tIF v.ThisModel() = NIL THEN\r\t\t\t\t\tres := WinApi.EnableMenuItem(objMenu, iObjOpen, WinApi.MF_GRAYED)\r\t\t\t\tEND;\r\t\t\t\tINC(i); INC(id);\r\t\t\t\tCheckVerb(v, i, pvm)\r\t\t\tEND;\r\t\t\tWHILE (id < firstId) & (pvm.label # \"\") DO\r\t\t\t\tstr := pvm.label$;\r\t\t\t\tAppendMenu(objMenu, id, str);\r\t\t\t\tIF pvm.disabled THEN res := WinApi.EnableMenuItem(objMenu, id, WinApi.MF_GRAYED) END;\r\t\t\t\tIF pvm.checked THEN res := WinApi.CheckMenuItem(objMenu, id, WinApi.MF_CHECKED) END;\r\t\t\t\tINC(i); INC(id);\r\t\t\t\tCheckVerb(v, i, pvm)\r\t\t\tEND;\r\t\t\tmsg.type := \"\";\r\t\t\tViews.HandlePropMsg(v, msg);\r\t\t\tIF msg.type # \"\" THEN\r\t\t\t\tDialog.MapString(\"#Host:Object\", str);\r\t\t\t\tpar.label := msg.type + \" \" + str\r\t\t\tELSE\r\t\t\t\tDialog.MapString(\"#Host:Object\", par.label)\r\t\t\tEND\r\t\tELSE\r\t\t\tpar.disabled := TRUE;\r\t\t\tDialog.MapString(\"#Host:Object\", par.label)\r\t\tEND\r\tEND ObjectMenuGuard;\r\r\tPROCEDURE^ UpdateType ();\r\r\tPROCEDURE "
                    attr: 0
