                  - text: " NIL\r\tEND ThisModel;\r\r\tPROCEDURE (c: RootContext) GetSize (OUT w, h: INTEGER);\r\tBEGIN\r\t\tw := c.w; h := c.h\r\tEND GetSize;\r\t\t\r\tPROCEDURE (c: RootContext) Normalize (): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " TRUE\r\tEND Normalize;\r\t\r\tPROCEDURE (d: RootView) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tViews.InstallFrame(f, d.view, 0, 0, 0, FALSE)\r\tEND Restore;\r\t\r\tPROCEDURE (d: RootView) GetNewFrame (VAR frame: Views.Frame);\r\t\tVAR f: Views.RootFrame;\r\tBEGIN\r\t\tNEW(f); frame := f\r\tEND GetNewFrame;\r\r\tPROCEDURE (d: RootView) GetBackground (VAR color: Ports.Color);\r\tBEGIN\r\t\tcolor := Ports.background\r\tEND GetBackground;\r\t\r\tPROCEDURE Paint (dc: WinApi.HDC; v: Views.View; w, h, unit: INTEGER);\r\t\tVAR d: RootView; c: RootContext; p: HostPorts.Port; f: Views.RootFrame; g: Views.Frame;\r\tBEGIN\r\t\tNEW(p);\r\t\tp.Init(unit, Ports.screen);\r\t\tp.SetSize(w, h);\r\t\tp.SetDC(dc, 0);\r\t\tNEW(c);\r\t\tc.w := w * p.unit;\r\t\tc.h := h * p.unit;\r\t\tNEW(d);\r\t\td.view := Views.CopyOf(v, Views.shallow);\r\t\tStores.Join(d, d.view);\r\t\td.InitContext(c);\r\t\td.view.InitContext(c);\r\t\tStores.InitDomain(d);\r\t\td.GetNewFrame(g); f := g(Views.RootFrame); f.ConnectTo(p);\r\t\tViews.SetRoot(f, d, FALSE, {});\r\t\tViews.AdaptRoot(f);\r\t\tViews.RestoreRoot(f, 0, 0, c.w, c.h);\r\tEND Paint;\r\t\r\r\t\r\tPROCEDURE GetHeader (v: StdView; OUT hdr: WinApi.BITMAPINFOHEADER; OUT colors: INTEGER);\r\tBEGIN\r\t\thdr.biSize := SIZE(WinApi.BITMAPINFOHEADER);\r\t\thdr.biWidth := v.w;\r\t\thdr.biHeight := v.h;\r\t\thdr.biPlanes := 1;\r\t\thdr.biBitCount := SHORT(v.bits);\r\t\tIF v.bits = 8 THEN\t"
                    attr: 0
                  - text: "(* use 8 bit & run length encoding *)"
                    attr: 1
                  - text: "\r\t\t\thdr.biCompression := WinApi.BI_RLE8;\r\t\t\tcolors := 256\r\t\tELSIF v.bits = 24 THEN\t"
                    attr: 0
                  - text: "(* use 24 bit true color *)"
                    attr: 1
                  - text: "\r\t\t\thdr.biCompression := WinApi.BI_RGB;\r\t\t\tcolors := 0\r\t\tELSIF v.bits = 0 THEN\t"
                    attr: 0
                  - text: "(* use jpeg *)"
                    attr: 1
                  - text: "\r\t\t\thdr.biCompression := 4 (* WinApi.BI_JPEG *);\r\t\t\tcolors := 0\r\t\tELSE\r\t\t\tHALT(100)\t"
                    attr: 0
                  - text: "(* unsupported format *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\t\thdr.biSizeImage := 0;\r\t\thdr.biXPelsPerMeter := 0;\r\t\thdr.biYPelsPerMeter := 0;\r\t\thdr.biClrUsed := 0;\r\t\thdr.biClrImportant := 0\r\tEND GetHeader;\r\t\r\tPROCEDURE Evaluate (v: StdView; dc: WinApi.HDC);\r\t\tVAR len, adr, res, colors, i: INTEGER;\r\t\t\trd: Stores.Reader; info: BITMAPINFO8; data: POINTER TO ARRAY OF BYTE;\r\tBEGIN\r\t\trd.ConnectTo(v.model.file);\r\t\trd.SetPos(v.model.pos);\r\t\tlen := v.model.len;\r\t\tGetHeader(v, info.header, colors);\r\t\ti := 0; WHILE i < colors DO rd.ReadInt(info.colors[i]); INC(i); DEC(len, 4) END;\r\t\tNEW(data, len);\r\t\trd.rider.ReadBytes(data^, 0, len);\r\t\tv.model.ref := WinApi.CreateCompatibleBitmap(dc, v.w, v.h);\r\t\tinfo.header.biSizeImage := len;\r\t\tres := WinApi.SetDIBits(dc, v.model.ref, 0, v.h, "
