                  - text: "(WinApi.BITMAPINFO, info), WinApi.DIB_RGB_COLORS);\r\t\tIF res = 0 THEN\r\t\t\tres := WinApi.GetLastError();\r\t\t\tIF res = WinApi.ERROR_NOT_ENOUGH_MEMORY THEN HALT(101) ELSE HALT(100) END\r\t\tEND;\r\t\tASSERT(v.model.ref # 0, 102)\r\tEND Evaluate;\r\r\r\t"
                    attr: 0
                  - text: "(* Model *)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE (m: Model) FINALIZE;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF m.ref # 0 THEN\r\t\t\tres := WinApi.DeleteObject(m.ref);\r\t\t\tm.ref := 0\r\t\tEND\r\tEND FINALIZE;\r\t\r\r\t"
                    attr: 0
                  - text: "(* View *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (v: StdView) Internalize (VAR rd: Stores.Reader);\r\t\tVAR m: Model; thisVersion: INTEGER;\r\tBEGIN\r\t\tv.Internalize^(rd);\r\t\tIF rd.cancelled THEN "
                    attr: 0
