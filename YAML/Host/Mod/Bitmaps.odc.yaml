                    attr: 3
                  - text: " END;\r\t\trd.ReadVersion(minVersion, maxVersion, thisVersion);\r\t\tIF rd.cancelled THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\trd.ReadInt(v.w);\r\t\trd.ReadInt(v.h);\r\t\tIF thisVersion > 0 THEN rd.ReadInt(v.bits) ELSE v.bits := 24 END;\r\t\tNEW(m); m.file := rd.rider.Base();\r\t\trd.ReadInt(m.len);\r\t\tm.pos := rd.Pos();\r\t\tm.ref := 0;\t"
                    attr: 0
                  - text: "(* lazy allocation of bitmap data *)"
                    attr: 1
                  - text: "\r\t\tv.model := m;\r\t\trd.SetPos(m.pos + m.len)\r\tEND Internalize;\r\r\tPROCEDURE (v: StdView) Externalize (VAR wr: Stores.Writer);\r\t\tVAR len, res, colors, i: INTEGER;\r\t\t\tr: Files.Reader; b: BYTE; info: BITMAPINFO8; data: POINTER TO ARRAY OF BYTE;\r\tBEGIN\r\t\tv.Externalize^(wr);\r\t\twr.WriteVersion(maxVersion);\r\t\twr.WriteInt(v.w);\r\t\twr.WriteInt(v.h);\r\t\twr.WriteInt(v.bits);\r\t\tIF v.model.file # NIL THEN\r\t\t\tlen := v.model.len;\r\t\t\twr.WriteInt(len);\r\t\t\tr := v.model.file.NewReader(NIL); r.SetPos(v.model.pos);\r\t\t\tWHILE len # 0 DO r.ReadByte(b); wr.WriteSChar(SHORT(CHR(b))); DEC(len) END\r\t\tELSE\r\t\t\tASSERT(v.model.ref # 0, 100);\r\t\t\tGetHeader(v, info.header, colors);\r\t\t\tres := WinApi.GetDIBits(WinApi.GetDC(HostWindows.main), v.model.ref, 0, v.h, 0,\r\t\t\t\t"
                    attr: 0
                  - text: SYSTEM.VAL
                    attr: 4
                  - text: "(WinApi.BITMAPINFO, info), WinApi.DIB_RGB_COLORS);\r\t\t\tIF res = 0 THEN res := WinApi.GetLastError(); HALT(100) END;\r\t\t\tlen := info.header.biSizeImage;\r\t\t\tNEW(data, len);\r\t\t\tres := WinApi.GetDIBits(WinApi.GetDC(HostWindows.main), v.model.ref, 0, v.h,\r"
                    attr: 0
                  - text: "\t\t\t\tSYSTEM.ADR"
                    attr: 4
                  - text: "(data[0]),\r\t\t\t\t"
                    attr: 0
                  - text: SYSTEM.VAL
                    attr: 4
                  - text: "(WinApi.BITMAPINFO, info), WinApi.DIB_RGB_COLORS);\r\t\t\tIF res = 0 THEN res := WinApi.GetLastError(); HALT(100) END;\r\t\t\tINC(len, 4 * colors);\r\t\t\twr.WriteInt(len);\r\t\t\ti := 0; WHILE i < colors DO wr.WriteInt(info.colors[i]); INC(i) END;\r\t\t\twr.rider.WriteBytes(data^, 0, LEN(data));\r\t\t\tv.model.len := len\r\t\tEND;\r\tEND Externalize;\r\r\tPROCEDURE (v: StdView) CopyFromSimpleView (source: Views.View);\r\tBEGIN\r\t\tWITH source: StdView DO\r\t\t\tv.model := source.model;\r\t\t\tv.w := source.w;\r\t\t\tv.h := source.h;\r\t\t\tv.bits := source.bits;\r\t\tEND\r\tEND CopyFromSimpleView;\r\r\tPROCEDURE (v: StdView) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR rd: HostPorts.Rider; res, w, h: INTEGER; dc, pdc, bdc, bdc1: WinApi.HDC; memBM: WinApi.HBITMAP;\r\tBEGIN\r\t\tASSERT(v.model # NIL, 20);\r\t\tv.context.GetSize(w, h);\r\t\tdc := f.rider(HostPorts.Rider).port.homedc;\r\t\tIF WinApi.WindowFromDC(dc) = 0 THEN dc := WinApi.GetDC(HostWindows.main) END;\r\t\tIF v.model.ref = 0 THEN Evaluate(v, dc) END;\r\t\tIF Views.IsPrinterFrame(f) THEN (* "
