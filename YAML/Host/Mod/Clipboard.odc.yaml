                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\r\tIMPORT\r\t\tCOM, WinApi, WinOle,\r\t\tServices, Stores, Views, Documents, OleData, HostWindows;\r\t\t\r\t\r\tTYPE\r\t\tEmptyView = POINTER TO RECORD (Views.View) END;\r\t\t\r\t\r\tVAR\r\t\t"
                    attr: 0
                  - text: cloneAttributes
                    attr: 3
                  - text: "*: BOOLEAN;\t"
                    attr: 0
                  - text: "(* set by HostCmds, used by Importers *)"
                    attr: 1
                  - text: "\r\t\t"
                    attr: 0
                  - text: isText
                    attr: 3
                  - text: "*: BOOLEAN;\t"
                    attr: 0
                  - text: "(* set by HostCmds, used by GetClipView *)"
                    attr: 1
                  - text: "\r\r\t\tdoc: Documents.Document;\t"
                    attr: 0
                  - text: "(* contents of clipboard window *)\r\t\t"
                    attr: 1
                  - text: "isSingleton: BOOLEAN;"
                    attr: 0
                  - text: "\t(* contents of clipboard is singleton view *)\r\t\t"
                    attr: 1
                  - text: "width, height: INTEGER;"
                    attr: 0
                  - text: "\t(* size of clipboard content *)\r"
                    attr: 1
                  - text: "\t\tempty: Views.View;\t"
                    attr: 0
                  - text: "(* contents of empty clipboard *)\r\t\t"
                    attr: 1
                  - text: "cbdata: WinOle.IDataObject;\t"
                    attr: 0
                  - text: "(* data object registred via OLE *)\r\t\t"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Register
                    attr: 3
                  - text: "* (v: Views.View; w, h: INTEGER; isSingle: BOOLEAN);\r\t\tVAR res: COM.RESULT;\r\tBEGIN\r\t\tdoc.SetView(v, w, h);\r\t\twidth := w; height := h;\r\t\tisSingleton := isSingle;\r\t\tcbdata := OleData.ViewData(v, w, h, isSingle);\r\t\tres := WinOle.OleSetClipboard(cbdata)\r\tEND Register;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: GetClipView
                    attr: 3
                  - text: "* (\r\t\ttype: Stores.TypeName; VAR v: Views.View; VAR w, h: INTEGER; VAR isSingle: BOOLEAN\r\t);\r\t\tVAR dobj: WinOle.IDataObject; res: COM.RESULT;\r\tBEGIN\r\t\tv := NIL;\r\t\tIF WinOle.OleIsCurrentClipboard(cbdata) = WinApi.S_OK THEN\r\t\t\tv := Views.CopyOf(doc.ThisView(), Views.deep);\r\t\t\tw := width; h := height; isSingle := isSingleton;\r\t\t\tIF (type # \"\") & ~Services.Is(v, type) THEN v := NIL END\r\t\tELSE\r\t\t\tres := WinOle.OleGetClipboard(dobj);\r\t\t\tIF res >= 0 THEN\r\t\t\t\tIF isText THEN\r\t\t\t\t\tOleData.GetTextDataView(dobj, v, w, h, isSingle)\r\t\t\t\tELSE\r\t\t\t\t\tOleData.GetDataView(dobj, type, v, w, h, isSingle)\r\t\t\t\tEND;\r\t\t\t\tIF v # NIL THEN\r\t\t\t\t\tdoc.SetView(Views.CopyOf(v, Views.deep), w, h);\r\t\t\t\t\twidth := w; height := h;\r\t\t\t\t\tisSingleton := isSingle\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND GetClipView;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ConvertibleTo
                    attr: 3
                  - text: "* (type: Stores.TypeName): BOOLEAN;\r\t\tVAR dobj: WinOle.IDataObject; res: COM.RESULT;\r\tBEGIN\r\t\tIF WinOle.OleIsCurrentClipboard(cbdata) = WinApi.S_OK THEN\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " (type = \"\") OR Services.Is(doc.ThisView(), type)\r\t\tELSE\r\t\t\tres := WinOle.OleGetClipboard(dobj);\r\t\t\tIF res >= 0 THEN\r\t\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " OleData.DataConvTo(dobj, type)\r\t\t\tEND\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE\r\tEND ConvertibleTo;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: "Flush*"
                    attr: 3
                  - text: ";\r\t\tVAR res: COM.RESULT;\r\tBEGIN\r\t\tIF WinOle.OleIsCurrentClipboard(cbdata) = WinApi.S_OK THEN\r\t\t\tres := WinOle.OleFlushClipboard()\r\t\tEND\r\tEND Flush;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Dump
                    attr: 3
                  - text: "*;\r\t\tVAR res: COM.RESULT; dobj: WinOle.IDataObject;\r\tBEGIN\r\t\tres := WinOle.OleGetClipboard(dobj);\r\t\tOleData.DumpData(dobj)\r\tEND Dump;\r\t\r\t\r\tPROCEDURE (v: EmptyView) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tEND Restore;\r\t\r\r\tPROCEDURE Init;\r\t\tVAR e: EmptyView;\r\tBEGIN\r\t\tNEW(e); empty := e;\r\t\t"
                    attr: 0
                  - text: "(* init document to be used to display the clipboard *)"
                    attr: 1
                  - text: "\r\t\tdoc := Documents.dir.New(empty, Views.undefined, Views.undefined);\r\t\tHostWindows.OpenClipboard(doc)\r\tEND Init;\r\t\rBEGIN\r\tInit\rEND HostClipboard.\r\r\t\r"
