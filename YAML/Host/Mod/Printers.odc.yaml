                    attr: 1
                  - text: "\t\t\t\tprinting.pnum := 0;\r\t\t\t\tHostWindows.dir.unmoveable := TRUE;\r\t\t\t\tDialog.Call(dialogCommand, \" \", res);\r\t\t\t\tHostWindows.dir.unmoveable := FALSE;\r\t\t\t\tp.cancel := Windows.dir.First();\r\t"
                    attr: 0
