                  - text: "\r\tIMPORT\r\t\tSYSTEM, WinApi, WinDlg,\r\t\tKernel, Files, Dialog, Ports, HostPorts, Stores, Models, Views, Controllers,\r\t\tProperties, Printers, Printing, Documents, Windows, HostWindows;\r\t\r\tCONST\r\t\teduMsgH = 30 * Ports.point;\r\r\t\tdialogCommand = \"StdCmds.OpenToolDialog('Host/Rsrc/Printing', '#Host:Print')\";\r\t\r\tTYPE\r\t\tPrinter = POINTER TO RECORD (Printers.Printer)\r\t\t\tw, h: INTEGER;\r\t\t\t(* port: HostPorts.Port;\t"
                    attr: 0
