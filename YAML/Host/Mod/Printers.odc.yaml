                    attr: 0
                  - text: "(* reinitialize dc *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\t\tINC(jobLevel)\r\tEND OpenJob;\r\r\tPROCEDURE (p: Printer) CloseJob;\r\t\tVAR res: INTEGER; port: HostPorts.Port;\r\tBEGIN\r\t\tIF jobLevel = 1 THEN\r\t\t\tport := p.ThisPort()(HostPorts.Port);\r\t\t\tIF aborted THEN p.res := Error(WinApi.AbortDoc(port.dc))\r\t\t\tELSE p.res := Error(WinApi.EndDoc(port.dc))\r\t\t\tEND;\r\t\t\tres := WinApi.DeleteDC(port.dc);\r\t\t\tres := WinApi.EnableWindow(HostWindows.main, 1);\r\t\t\tHostPorts.ResetColors;\r\t\t\tIF p.cancel # NIL THEN Windows.dir.Close(p.cancel); p.cancel := NIL END;\r\t\t\tKernel.PopTrapCleaner(p.clean)\r\t\tEND;\r\t\tDEC(jobLevel)\r\tEND CloseJob;\r\t\r\tPROCEDURE (p: Printer) OpenPage;\r\t\tVAR res: INTEGER; port: HostPorts.Port;\r\tBEGIN\r\t\tport := p.ThisPort()(HostPorts.Port);\r\t\tIF ~aborted THEN p.res := Error(WinApi.StartPage(port.dc)) END;\r\t\tINC(printing.pnum);\r\t\tDialog.Update(printing);\r\t\t"
