                  - text: " r\r\tEND NewRider;\r*)\r\tPROCEDURE (p: Printer) OpenJob (VAR copies: INTEGER; name: ARRAY OF CHAR);\r\t\tVAR res: INTEGER; info: WinApi.DOCINFOW; s: Stores.Store; port: HostPorts.Port;\r\tBEGIN\r\t\tIF jobLevel = 0 THEN\r\t\t\taborted := FALSE; copies := 1;\r\t\t\tport := p.ThisPort()(HostPorts.Port);\r\t\t\tport.SetDC(PrinterDC(p.devNames, p.devMode), 0);\r\t\t\tp.res := Error(WinApi.SetAbortProc(port.dc, AbortHandler));\r\t\t\tIF p.res = 0 THEN\r\t"
                    attr: 0
