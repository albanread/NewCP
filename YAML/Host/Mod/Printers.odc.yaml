                    attr: 3
                  - text: "* (devNames, devMode: WinApi.HANDLE): Printers.Printer;\r\t\tVAR p: Printer; dc: WinApi.HANDLE; res: INTEGER;\r\tBEGIN\r\t\tASSERT(devNames # 0, 20);\r\t\tdc := PrinterDC(devNames, devMode);\r\t\tIF dc # 0 THEN\r\t\t\tNEW(p);\r\t\t\tp.devNames := devNames; p.devMode := devMode;\r\t\t\tSetupPrinter(p, dc);\r\t\t\tres := WinApi.DeleteDC(dc)\r\t\tELSE p := NIL\r\t\tEND;\r\t\t"
