                    attr: 1
                  - text: "\r\t\tEND;\r\r(*\r\t\tRider = POINTER TO RECORD (HostPorts.Rider)\r\t\t\tp: Printer\r\t\tEND;\r*)\r\t\tDirectory = POINTER TO RECORD (Printers.Directory) END;\r\t\t\r\t\tTrapCleaner = POINTER TO RECORD (Kernel.TrapCleaner)\r\t\t\tp: Printer\r\t\tEND;\r\r\r\tVAR\r\t\t"
                    attr: 0
                  - text: printing
                    attr: 3
                  - text: "*: RECORD\r\t\t\tpnum-: INTEGER;\r\t\t\tCancel*: PROCEDURE\r\t\tEND;\r\r\t\tdir: Directory;\r\t\tcurrent: Printers.Printer;\r\t\taborted: BOOLEAN;\r\r\t\tsa, sb, sc: ARRAY 64 OF CHAR;\r\t\terr: INTEGER;\r\r\t\tjobLevel: INTEGER;\r\r\r\tPROCEDURE PrinterDC (devNames, devMode: WinApi.HANDLE): WinApi.HANDLE;\r\t\tVAR adr: INTEGER; i: SHORTINT; a, b, c: WinApi.PtrWSTR; dc: WinApi.HANDLE; dm: WinApi.PtrDEVMODEW;\r\tBEGIN\r\t\tadr := WinApi.GlobalLock(devNames);\r\t\tdm := SYSTEM.VAL(WinApi.PtrDEVMODEW, WinApi.GlobalLock(devMode));\r\t\tSYSTEM.GET(adr + 0, i); a := SYSTEM.VAL(WinApi.PtrWSTR, adr + i * SIZE(CHAR));\r\t\tSYSTEM.GET(adr + 2, i); b := SYSTEM.VAL(WinApi.PtrWSTR, adr + i * SIZE(CHAR));\r\t\tSYSTEM.GET(adr + 4, i); c := SYSTEM.VAL(WinApi.PtrWSTR, adr + i * SIZE(CHAR));\r\t\tdc := WinApi.CreateDCW(a, b, c, dm^);\r\t\tIF dc = 0 THEN dc := WinApi.CreateDCW(a, b, c, NIL) END;\r\t\tadr := WinApi.GlobalUnlock(devMode);\r\t\tadr := WinApi.GlobalUnlock(devNames);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " dc\r\tEND PrinterDC;\r\r\tPROCEDURE SetupPrinter (p: Printer; dc: WinApi.HANDLE);\r\t\tVAR res, w, h, pw, ph, nx, ny, unit, ux, uy: INTEGER;\r\t\t\tpt: WinApi.POINT; port: Ports.Port; hport: HostPorts.Port;\r\tBEGIN\r\t\tw := WinApi.GetDeviceCaps(dc, WinApi.HORZRES);\r\t\th := WinApi.GetDeviceCaps(dc, WinApi.VERTRES);\r\t\tnx := WinApi.GetDeviceCaps(dc, WinApi.LOGPIXELSX);\r\t\tny := WinApi.GetDeviceCaps(dc, WinApi.LOGPIXELSY);\r\t\tux := (Ports.inch + nx DIV 2) DIV nx;\r\t\tuy := (Ports.inch + ny DIV 2) DIV ny;\r\t\tunit := ux;\r\t\tIF nx < ny THEN\r\t\t\th := h * nx DIV ny\r\t\tELSIF nx > ny THEN\r\t\t\tw := w * ny DIV nx; unit := uy\r\t\tEND;\r\t\tpw := WinApi.GetDeviceCaps(dc, WinApi.PHYSICALWIDTH);\r\t\tph := WinApi.GetDeviceCaps(dc, WinApi.PHYSICALHEIGHT);\r\t\tIF (pw = 0) OR (ph = 0) THEN\r\t\t\tres := WinApi.Escape(dc, 12, 0, NIL, SYSTEM.ADR(pt));\r\t\t\tASSERT(res > 0, 100);\r\t\t\tpw := pt.x; ph := pt.y\r\t\tEND;\r\t\tpw := pw * ux; ph := ph * uy;\r\t\tnx := WinApi.GetDeviceCaps(dc, WinApi.PHYSICALOFFSETX);\r\t\tny := WinApi.GetDeviceCaps(dc, WinApi.PHYSICALOFFSETY);\r\t\tIF (nx = 0) OR (ny = 0) THEN\r\t\t\tres := WinApi.Escape(dc, 13, 0, NIL, SYSTEM.ADR(pt));\r\t\t\tASSERT(res > 0, 100);\r\t\t\tnx := pt.x; ny := pt.y\r\t\tEND;\r\t\tnx := nx * ux; ny := ny * uy;\r\t\tp.InitPrinter(-nx, -ny, pw - nx, ph - ny);\r\t\tport := p.ThisPort();\r\t\tIF port = NIL THEN\r\t\t\tNEW(hport); p.InitPort(hport); port := hport;\r\t\t\tport.Init(unit, Ports.printer)\r\t\tEND;\r\t\tport.SetSize(w, h)\r\tEND SetupPrinter;\r\r\tPROCEDURE "
                    attr: 0
