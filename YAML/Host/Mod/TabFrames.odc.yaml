                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT\r\t\t"
                    attr: 0
                  - text: SYSTEM
                    attr: 3
                  - text: ", Kernel, WinApi, WinCtl, Fonts, Ports, Views,\r\t\tControllers, Dialog, HostFonts, HostPorts, StdTabViews;\r\r\tCONST\r\t\tDEL = 07X;\r\t\tdlgWindowExtra = 30;\r\r\tTYPE\r\t\tInfo = RECORD\r\t\t\twnd, ctrl: WinApi.HANDLE;\r\t\t\tx1, y1, w1, h1, x2, y2, w2, h2: INTEGER;\r\t\t\thasFocus: BOOLEAN\r\t\tEND;\r\t\t\r\t\tTab = POINTER TO RECORD (StdTabViews.Frame)\r\t\t\ti: Info;\r\t\t\tdispLeft, dispTop, dispWidth, dispHeight: INTEGER\r\t\tEND;\r\r\t\tDirectory = POINTER TO RECORD (StdTabViews.FrameDirectory) END;\r\r\tVAR\r\t\tinstance: WinApi.HANDLE;\r\t\tSubclassCtl: PROCEDURE(wnd: WinApi.HANDLE);"
                    attr: 0
                  - text: "\r\t"
                    attr: 1
                  - text: "\r\t"
                    attr: 0
                  - text: "(* auxiliary procedures *)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE GetSize (f: StdTabViews.Frame; VAR x, y, w, h: INTEGER);\r\t\tVAR u, x0, y0: INTEGER;\r\tBEGIN\r\t\tu := f.unit; f.view.context.GetSize(w, h); x0 := f.gx; y0 := f.gy;\r"
                    attr: 0
                  - text: "\t\t"
                    attr: 3
                  - text: "x := x0 DIV u; y := y0 DIV u;\r\t\tw := (x0 + w) DIV u - x; h := (y0 + h) DIV u - y"
                    attr: 0
                  - text: "\r"
                    attr: 3
                  - text: "\tEND GetSize;\r\t\r\tPROCEDURE Adapt (f: StdTabViews.Frame; VAR i: Info);\r\t\tVAR res, x, y, w, h, cx, cy, cw, ch: INTEGER; r: HostPorts.Rider;\r\tBEGIN\r\t\tIF i.wnd # 0 THEN\r\t\t\tr := f.rider(HostPorts.Rider);\r\t\t\tIF r.port.wnd # 0 THEN\t"
                    attr: 0
                  - text: "(* port is a window *)"
                    attr: 1
                  - text: "\r\t\t\t\tGetSize(f, x, y, w, h);\r\t\t\t\tcx := r.l; cy := r.t; cw := r.r - r.l; ch := r.b - r.t;\r\t\t\t\tIF (cx # i.x1) OR (cy # i.y1) OR (cw # i.w1) OR (ch # i.h1) THEN\r\t\t\t\t\ti.x1 := cx; i.y1 := cy; i.w1 := cw; i.h1 := ch;\r\t\t\t\t\tres := WinApi.MoveWindow(i.wnd, cx, cy, cw, ch, 0)\r\t\t\t\tEND;\r\t\t\t\tDEC(x, cx); DEC(y, cy);\r\t\t\t\tIF (x # i.x2) OR (y # i.y2) OR (w # i.w2) OR (h # i.h2) THEN\r\t\t\t\t\ti.x2 := x; i.y2 := y; i.w2 := w; i.h2 := h;\r\t\t\t\t\tres := WinApi.MoveWindow(i.ctrl, x, y, w, h, 0)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND Adapt;\r\r\tPROCEDURE Open (f: StdTabViews.Frame; class, name: WinApi.PtrWSTR; style, ex: SET; VAR i: Info);\r\t\tVAR res, x, y, w, h, cx, cy, cw, ch: INTEGER; p: HostPorts.Port; s: SET; r: Ports.Rider;\r\tBEGIN\r\t\tf.noRedraw := TRUE;\r\t\tr := f.rider; GetSize(f, x, y, w, h);\r\t\tr.GetRect(cx, cy, cw, ch); cw := cw - cx; ch := ch - cy;\r\t\tp := f.rider(HostPorts.Rider).port;\r\t\tIF p.wnd # 0 THEN\t"
                    attr: 0
                  - text: "(* port is a window *)"
                    attr: 1
                  - text: "\r\t\t\ts := {27, 30};"
                    attr: 0
                  - text: "\t(* disabled, child *)\r"
                    attr: 1
                  - text: "\t\t\ti.wnd := WinApi.CreateWindowExW({}, \"Oberon Tab\", \"\", s, cx, cy, cw, ch, p.wnd, 0, instance, 0);\r\t\t\tIF i.wnd # 0 THEN\r\t\t\t\tDEC(x, cx); DEC(y, cy);\r\t\t\t\tres := WinApi.SetWindowLongW(i.wnd, dlgWindowExtra, SYSTEM.VAL(INTEGER, f));\r\t\t\t\ti.ctrl := WinApi.CreateWindowExW(ex, class, name, style, x, y, w, h, i.wnd, 0, instance, 0);\r\t\t\t\tIF i.ctrl # 0 THEN\r\t\t\t\t\tIF (SubclassCtl # NIL) THEN SubclassCtl(i.ctrl) END;\r\t\t\t\t\tIF f.font # NIL THEN\r\t\t\t\t\t\tres := WinApi.SendMessageW(i.ctrl, WinApi.WM_SETFONT, f.font(HostFonts.Font).dev.id, 0)\r\t\t\t\t\tEND;\r\t\t\t\t\t"
                    attr: 0
                  - text: "Adapt(f, i);"
                    attr: 3
                  - text: "\r\t\t\t"
                    attr: 0
                  - text: "\t\t"
                    attr: 1
                  - text: "res := WinApi.ShowWindow(i.wnd, 1);\r\t\t\t\t\tres := WinApi.ShowWindow(i.ctrl, 1)\r\t\t\t\tELSE res := WinApi.DestroyWindow(i.wnd); i.wnd := 0\r\t\t\t\tEND\r\t\t\tELSE i.ctrl := 0\r\t\t\tEND\r\t\tELSE\t"
                    attr: 0
                  - text: "(* port is a printer -> define temp windows *)\r\t\t\t"
                    attr: 1
                  - text: "i.wnd := 0; i.ctrl := 0\r\t\tEND\r\tEND Open;\r\t\r\tPROCEDURE (f: Tab) Print (l, r, t, b: INTEGER), NEW;\r\t\tVAR \r\t\t\tw, h, sw, asc, dsc, fw, len, sel, i, dm, x, y, top: INTEGER; \r\t\t\tfont: Fonts.Font; tv: StdTabViews.View; s: Dialog.String; v: Views.View; \r\tBEGIN\r\t\tIF f.font # NIL THEN font := f.font ELSE font := HostFonts.dlgFont END;\r\t\tfont.GetBounds(asc, dsc, fw); y := asc + dsc; x := 0; dm := 0;(*y DIV 10;*) top := 0;\r\t\tf.view.context.GetSize(w, h); f.DrawRect(0, 0, w, h, 1, Ports.black);\r\t\ttv := f.view(StdTabViews.View); sel := tv.Index();\r\t\tlen := tv.NofTabs();\r\t\tIF len > 0 THEN \r\t\t\ti := 0; \r\t\t\ttv.GetItem(i, s, v); Dialog.MapString(s, s);\r\t\t\tWHILE (i < len) & (s # \"\") & (v # NIL) DO\r\t\t\t\ttv.GetItem(i, s, v); Dialog.MapString(s, s);\r\t\t\t\tsw := SHORT(ENTIER(font.StringWidth(s) * 1.20)) + 2*dsc;\r\t\t\t\tIF (x + sw + 2*dm) > w THEN \r\t\t\t\t\tf.DrawLine(0, y + 2*dm, w, y + 2*dm, 1, Ports.black);\t\r\t\t\t\t\tx := 0; top := y + 2*dm; y := y + 2*dm + asc + dsc\r\t\t\t\tEND;\r\t\t\t\tIF i = sel THEN \r\t\t\t\t\tf.DrawRect(x, top, x + sw + 2*dm, y + 2*dm, Ports.fill, Ports.black);\r\t\t\t\t\tf.DrawString(x + dm + dsc, y - dsc + dm, Ports.white, s, font)\r\t\t\t\tELSE\r\t\t\t\t\tf.DrawRect(x, top, x + sw + 2*dm, y + 2*dm, 1, Ports.black);\r\t\t\t\t\tf.DrawString(x + dm + dsc, y - dsc + dm, Ports.black, s, font)\r\t\t\t\tEND;\r\t\t\t\tx := x + sw + 2*dm;\r\t\t\t\tINC(i)\r\t\t\tEND;\r\t\t\tf.DrawLine(0, y + 2*dm, w, y + 2*dm, 1, Ports.black);\t\t\t\r\t\t\tf.dispLeft := f.unit; f.dispTop := y + 2*dm + f.unit;\r\t\t\tf.dispWidth := w - 2*f.unit; f.dispHeight := h - (y + 2*dm + f.unit)\r\t\tEND\r\t\t\r\t\t(*\r\t\tIF f.font # NIL THEN font := f.font ELSE font := HostFonts.dlgFont END;\r\t\tfont.GetBounds(asc, dsc, fw); y := asc + dsc; x := 0; dm := y DIV 10; top := 0;\r\t\tf.view.context.GetSize(w, h); f.DrawRect(0, 0, w, h, 1, Ports.black);\r\t\ttv := f.view(StdTabViews.View); sel := tv.Index();\r\t\tlen := tv.NofTabs();\r\t\tIF len > 0 THEN \r\t\t\ttv.GetItem(sel, lbl, v); Dialog.MapString(lbl, lbl);\r\t\t\ts := \" *\" + lbl$ + \"*\"; sv := v;\r\t\t\ti := 0; \r\t\t\tWHILE (i < len) & (lbl # \"\") & (v # NIL) DO\r\t\t\t\tIF i # sel THEN tv.GetItem(i, lbl, v); Dialog.MapString(lbl, lbl); s := s + \" | \" +  lbl END;\r\t\t\t\tINC(i);\r\t\t\tEND;\r\t\t\tf.DrawString(dm, y + dm, Ports.black, s, font);\r\t\t\tf.DrawLine(0, y + 2*dm, w, y + 2*dm, 1, Ports.black);\t\t\t\r\t\t\tf.dispLeft := f.unit; f.dispTop := y + 2*dm + f.unit;\r\t\t\tf.dispWidth := w - 2*f.unit; f.dispHeight := h - (y + 2*dm + f.unit);\r\t\tEND;\r\t\t*)\r\tEND Print;\r\r\tPROCEDURE SendKey (ch: CHAR; wnd: WinApi.HANDLE);\r\t\tVAR res, code: INTEGER;\r\tBEGIN\r\t\tCASE ch OF\r\t\t| 10X: code := 21H\r\t\t| 11X: code := 22H\r\t\t| 12X: code := 21H\r\t\t| 13X: code := 22H\r\t\t| 14X: code := 24H\r\t\t| 15X: code := 23H\r\t\t| 16X: code := 24H\r\t\t| 17X: code := 23H\r\t\t| 1CX: code := 25H\r\t\t| 1DX: code := 27H\r\t\t| 1EX: code := 26H\r\t\t| 1FX: code := 28H\r\t\t| DEL: code := 2EH\r\t\tELSE code := 0\r\t\tEND;\r\t\tIF code # 0 THEN \r\t\t\tres := WinApi.SendMessageW(wnd, WinApi.WM_KEYDOWN, code, 0);\r\t\t\tres := WinApi.SendMessageW(wnd, WinApi.WM_KEYUP, code, 0)\r\t\tELSE\r\t\t\tres := WinApi.SendMessageW(wnd, WinApi.WM_CHAR, ORD(ch), 0)\r\t\tEND\r\tEND SendKey;\r\r\tPROCEDURE HandleMouse (wnd: WinApi.HANDLE; x, y: INTEGER; buttons: SET);\r\t\tVAR res, b, hc, m: INTEGER; pt: WinApi.POINT; w: WinApi.HANDLE; msg: WinApi.MSG;\r\tBEGIN\r\t\tres := WinApi.ReleaseCapture(); b := 0;\r\t\tIF HostPorts.left IN buttons THEN INC(b) END;\r\t\tIF HostPorts.right IN buttons THEN INC(b, 2) END;\r\t\tIF Controllers.extend IN buttons THEN INC(b, 4) END;\r\t\tIF Controllers.modify IN buttons THEN INC(b, 8) END;\r\t\tpt.x := x; pt.y := y;\r\t\tREPEAT\r\t\t\tw := wnd; wnd := WinApi.ChildWindowFromPoint(wnd, pt);\r\t\t\tres := WinApi.ClientToScreen(w, pt);\r\t\t\thc := WinApi.SendMessageW(wnd, WinApi.WM_NCHITTEST, 0, pt.x + pt.y * 65536);\r\t\t\tres := WinApi.ScreenToClient(wnd, pt)\r\t\tUNTIL (hc # 1) OR (w = wnd);\r\t\tIF hc > 1 THEN\r\t\t\tres := WinApi.ClientToScreen(wnd, pt);\r\t\t\tIF ODD(b) THEN m := WinApi.WM_NCLBUTTONDOWN\r\t\t\tELSE m := WinApi.WM_NCRBUTTONDOWN\r\t\t\tEND;\r\t\t\tres := WinApi.SendMessageW(wnd, m, hc, pt.x + pt.y * 65536)\r\t\tELSE\r\t\t\tres := WinApi.GetClassLongW(wnd, -26);\t"
                    attr: 0
                  - text: "(* classStyle *)"
                    attr: 1
                  - text: "\r\t\t\tIF (Controllers.doubleClick IN buttons) & ODD(res DIV 8) THEN\t"
                    attr: 0
                  - text: "(* DblClks IN classStyle *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF ODD(b) THEN m := WinApi.WM_LBUTTONDBLCLK ELSE m := WinApi.WM_RBUTTONDBLCLK END\r\t\t\tELSE\r\t\t\t\tIF ODD(b) THEN m := WinApi.WM_LBUTTONDOWN ELSE m := WinApi.WM_RBUTTONDOWN END\r\t\t\tEND;\r\t\t\tres := WinApi.SendMessageW(wnd, m, b, pt.x + pt.y * 65536)\r\t\tEND;\r\t\tREPEAT\r\t\t\tres := WinApi.GetMessageW(msg, 0, 0, 0);\r\t\t\tIF (msg.message >= WinApi.WM_MOUSEMOVE) & (msg.message <= WinApi.WM_MBUTTONDBLCLK)\r\t\t\tTHEN\r\t\t\t\tb := msg.wParam\r\t\t\tEND;\r\t\t\tres := WinApi.TranslateMessage(msg);\r\t\t\tres := WinApi.DispatchMessageW(msg)\r\t\tUNTIL b MOD 4 = 0\r\tEND HandleMouse;\r\r\tPROCEDURE Mark (on, focus: BOOLEAN; VAR i: Info);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF focus THEN\r\t\t\tIF on THEN\r\t\t\t\tIF ~i.hasFocus THEN\r\t\t\t\t\tres := WinApi.SendMessageW(i.ctrl, WinApi.WM_SETFOCUS, 0, 0);\r\t\t\t\t\ti.hasFocus := TRUE\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tIF i.hasFocus THEN\r\t\t\t\t\tres := WinApi.SendMessageW(i.ctrl, WinApi.WM_KILLFOCUS, 0, 0);\r\t\t\t\t\ti.hasFocus := FALSE\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND Mark;\r\r\t"
                    attr: 0
                  - text: "(* Tab *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (f: Tab) SetOffset (x, y: INTEGER);\r\tBEGIN\r\t\tf.SetOffset^(x, y);\r\t\tAdapt(f, f.i)\r\tEND SetOffset;\r\r\tPROCEDURE (f: Tab) Close;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF f.i.wnd # 0 THEN\t"
                    attr: 0
                  - text: "(* deallocate *)\r"
                    attr: 1
                  - text: "\t\t\tASSERT(f.rider # NIL, 100); ASSERT(f.rider.Base() # NIL, 101);\r\t\t\tres := WinApi.DestroyWindow(f.i.wnd);\r\t\t\tf.i.wnd := 0; f.i.ctrl := 0\r\t\tEND\r\t\t(*f.Close^*)\r\tEND Close;\r\t\r\tPROCEDURE (f: Tab) Update;\r\t\tVAR \r\t\t\tres: INTEGER;\r\tBEGIN\r\t\tIF ~f.disabled THEN\r\t\t\tIF WinApi.IsWindowEnabled(f.i.ctrl) = 0 THEN res := WinApi.EnableWindow(f.i.ctrl, 1) END\r\t\tELSE\r\t\t\tIF WinApi.IsWindowEnabled(f.i.ctrl) # 0 THEN res := WinApi.EnableWindow(f.i.ctrl, 0) END\r\t\tEND;\r\t\tres := WinApi.UpdateWindow(f.i.ctrl)\r\tEND Update;\r\t\r\tPROCEDURE (f: Tab) UpdateList;\r\t\tVAR \r\t\t\tres, i, sel, len: INTEGER; \r\t\t\tti: WinCtl.TCITEMW;\r\t\t\ts: Dialog.String;\r\t\t\trect: WinApi.RECT;\r\t\t\tv: Views.View;\r\t\t\ttv: StdTabViews.View;\r\t\t\thrgn, hrgn1: WinApi.HRGN;\r\tBEGIN\r\t\ttv := f.view(StdTabViews.View); sel := tv.Index();\r\t\tres := WinApi.SendMessageW(f.i.ctrl, WinCtl.TCM_DELETEALLITEMS, 0, 0); \r\t\tlen := tv.NofTabs();\r\t\t(* Add the tabs to the tabcontrol *)\r\t\tIF len > 0 THEN\r\t\t\ti := 0; tv.GetItem(i, s, v); Dialog.MapString(s, s);\r\t\t\tWHILE (i < len) & (s # \"\") & (v # NIL) DO\r\t\t\t\tti.mask := WinCtl.TCIF_TEXT + WinCtl.TCIF_IMAGE; \r\t\t\t\tti.pszText := s; ti.iImage := -1;\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinCtl.TCM_INSERTITEMW, i, SYSTEM.ADR(ti));\r\t\t\t\tINC(i); IF i < len THEN tv.GetItem(i, s, v); Dialog.MapString(s, s) END\r\t\t\tEND\r\t\tEND;\r\t\t(* Get the display area *)\r\t\trect.left := 0; rect.top := 0; rect.right := f.i.w2; rect.bottom := f.i.h2;\r\t\tres := WinApi.SendMessageW(f.i.ctrl, WinCtl.TCM_ADJUSTRECT, WinApi.FALSE, SYSTEM.ADR(rect));\r\t\t(* set the area which the control should redraw *)\r\t\thrgn := WinApi.CreateRectRgn(0, 0, f.i.w2, f.i.h2);\r\t\thrgn1 := WinApi.CreateRectRgn(rect.left, rect.top, rect.right, rect.bottom);\r\t\tres := WinApi.CombineRgn(hrgn, hrgn, hrgn1, WinApi.RGN_DIFF);\r\t\tres := WinApi.SetWindowRgn(f.i.ctrl, hrgn, WinApi.FALSE);\r\t\tIF res = 0 THEN res := WinApi.DeleteObject(hrgn) END;\r\t\tres := WinApi.DeleteObject(hrgn1);\r\t\t(* set the area which the contained views should draw *)\r\t\tf.dispLeft := rect.left * f.unit; f.dispTop := rect.top * f.unit;\r\t\tf.dispWidth := (rect.right - rect.left) * f.unit; f.dispHeight := (rect.bottom - rect.top) * f.unit;\r\t\t(* Set the size and the domain of the views *)\r\t\tIF len > 0 THEN\r\t\t\ti := 0; tv.GetItem(i, s, v);\r\t\t\tWHILE (i < len) & (s # \"\") & (v # NIL) DO\r\t\t\t\tv.context.SetSize(f.dispWidth, f.dispHeight);\r\t\t\t\tINC(i); IF i < len THEN  tv.GetItem(i, s, v) END\r\t\t\tEND\r\t\tEND;\r\t\t(* Reset selection *)\r\t\tres := WinApi.SendMessageW(f.i.ctrl, WinCtl.TCM_SETCURSEL, sel, 0);\r\t\tf.Update\r\tEND UpdateList;\r\t\r\tPROCEDURE (f: Tab) Paint (il, it, ir, ib: INTEGER), NEW;\r\t\tVAR res, l, t, r, b, w, h: INTEGER; ri: HostPorts.Rider; rect: WinApi.RECT;\r\tBEGIN\r\t\tres := WinApi.GetWindowRect(f.i.wnd, rect);\r\t\tw := rect.right  - rect.left; h := rect.bottom - rect.top;\r\t\tri := f.rider(HostPorts.Rider); \r\t\t"
                    attr: 0
