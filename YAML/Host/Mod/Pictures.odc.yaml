                  - text: "\r\tIMPORT\r\t\t"
                    attr: 0
                  - text: SYSTEM
                    attr: 3
                  - text: ", COM, WinApi, WinOle,\r\t\tFiles, Fonts, Ports, Stores, Models, Views, Controllers, Properties, Dialog, Converters,\r\t\tHostPorts, HostWindows, HostClipboard;\r\r\tCONST\r\t\tclip = 0X; fit = 1X; approximate = 2X;\t"
                    attr: 0
                  - text: "(* modes *)"
                    attr: 1
                  - text: "\r\t\tmacPict = 0; winPict = 1;\t"
                    attr: 0
                  - text: "(* types *)"
                    attr: 1
                  - text: "\r\t\tminVersion = 0; maxVersion = 0;\r\r\tTYPE\r\t\tModel = POINTER TO RECORD\r\t\t\tfile: Files.File;\r\t\t\tpos, len: INTEGER;\r\t\t\tref: WinApi.HANDLE;\r\t\t\tdata: POINTER TO ARRAY OF BYTE\r\t\tEND;\r\r\t\tStdView = POINTER TO RECORD (Views.View)\r\t\t\tmodel: Model;\r\t\t\tunit: INTEGER;\r\t\t\tw, h: INTEGER;\r\t\t\tmode: SHORTCHAR;\r\t\t\ttype: BYTE\r\t\tEND;\r\t\t\r\t\r"
                    attr: 0
                  - text: "\t(* Mac Pictures *)\r\r"
                    attr: 1
                  - text: "\tPROCEDURE ReadWord (rd: Files.Reader; VAR x: INTEGER);\r\t\tVAR b: BYTE;\r\tBEGIN\r\t\trd.ReadByte(b); x := 256 * (b MOD 256);\r\t\trd.ReadByte(b); x := x + b MOD 256\r\tEND ReadWord;\r\t\r\tPROCEDURE ReadByte (rd: Files.Reader; VAR x: INTEGER);\r\t\tVAR b: BYTE;\r\tBEGIN\r\t\trd.ReadByte(b); x := b;\r\tEND ReadByte;\r\t\r\tPROCEDURE Skip (rd: Files.Reader; n: INTEGER);\r\tBEGIN\r\t\trd.SetPos(rd.Pos() + n)\r\tEND Skip;\r\t\r\tPROCEDURE DrawMacPicture (v: StdView; f: Views.Frame; w, h: INTEGER);\r\t\tVAR rd: Files.Reader; res, end, len, x, y, z, l, t, r, b, u: INTEGER; op: INTEGER; v2, clipped: BOOLEAN;\r\t\t\tfgnd, bgnd: Ports.Color; str: ARRAY 256 OF CHAR; size, style: INTEGER;\r\t\t\tp: HostPorts.Port; dc: WinApi.HANDLE; poly: ARRAY 512 OF WinApi.POINT; bt: BYTE;\r\t\t\trl, rt, rr, rb, dl, dt, dr, db, ol, ot, or, ob, al, at, ar, ab, as, aa, gl, gt, gr, gb, ow, oh, lx, ly, tx, ty, plen: INTEGER;\r\t\t\tactPen, actBrush, nullPen, nullBrush, fillBrush, bgndBrush, bitmap, font: WinApi.HANDLE;\r\t\t\r\t\tPROCEDURE Point (VAR x, y: INTEGER);\r\t\tBEGIN\r\t\t\tReadWord(rd, y); y := (y + 32768) MOD 65536 - 32768;\r\t\t\tReadWord(rd, x); x := (x + 32768) MOD 65536 - 32768\r\t\tEND Point;\r\t\t\r\t\tPROCEDURE Data (n: INTEGER);\r\t\t\tVAR b: BYTE;\r\t\tBEGIN\r\t\t\tWHILE n > 0 DO rd.ReadByte(b); DEC(n) END\r\t\tEND Data;\r\t\t\r\t\tPROCEDURE Region (VAR l, t, r, b: INTEGER);\r\t\t\tVAR len: INTEGER;\r\t\tBEGIN\r\t\t\tReadWord(rd, len); ReadWord(rd, t); ReadWord(rd, l);\r\t\t\tReadWord(rd, b); ReadWord(rd, r); Data(len - 10)\r\t\tEND Region;\r\t\t\r\t\tPROCEDURE Poly (VAR poly: ARRAY OF WinApi.POINT; VAR len: INTEGER);\r\t\t\tVAR i: INTEGER;\r\t\tBEGIN\r\t\t\tReadWord(rd, len); len := (len - 10) DIV 4;\r\t\t\tReadWord(rd, i); ReadWord(rd, i);\r\t\t\tReadWord(rd, i); ReadWord(rd, i); i := 0;\r\t\t\tWHILE i < len DO Point(poly[i].x, poly[i].y); INC(i) END\r\t\tEND Poly;\r\t\t\r\t\tPROCEDURE Pattern (VAR brush: WinApi.HANDLE);\r\t\t\tVAR pat: ARRAY 8 OF SHORTINT; i: INTEGER; b: BYTE;\r\t\tBEGIN\r\t\t\tres := WinApi.SelectObject(dc, nullBrush);\r\t\t\tres := WinApi.DeleteObject(brush);\r\t\t\tres := WinApi.DeleteObject(bitmap);\r\t\t\ti := 0;\r\t\t\tWHILE i < 8 DO rd.ReadByte(b); pat[i] := SHORT(255 - b MOD 256); INC(i) END;\r\t\t\tbitmap := WinApi.CreateBitmap(8, 8, 1, 1, SYSTEM.ADR(pat));\r\t\t\tbrush := WinApi.CreatePatternBrush(bitmap)\r\t\tEND Pattern;\r\t\t\r\t\tPROCEDURE Pen (x, y: INTEGER);\r\t\tBEGIN\r\t\t\tIF x < y THEN x := y END;\r\t\t\tres := WinApi.SelectObject(dc, nullPen);\r\t\t\tres := WinApi.DeleteObject(actPen);\r\t\t\tIF x = 0 THEN actPen := nullPen ELSE actPen := WinApi.CreatePen(6, x, Ports.black) END\r\t\tEND Pen;\r\t\t\r\t\tPROCEDURE String (VAR s: ARRAY OF CHAR; VAR len: INTEGER);\r\t\t\tVAR b: BYTE; i: INTEGER;\r\t\tBEGIN\r\t\t\trd.ReadByte(b); len := b MOD 256; i := 0;\r\t\t\tWHILE i < len DO\r\t\t\t\trd.ReadByte(b);\r\t\t\t\t"
                    attr: 0
                  - text: "(* mac to windows *)"
                    attr: 4
                  - text: "\r\t\t\t\tIF b >= ORD(\" \") THEN s[i] := CHR(b MOD 256); INC(i) ELSE DEC(len) END\r\t\t\tEND;\r\t\t\ts[i] := 0X;\r\t\tEND String;\r\t\t\r\t\tPROCEDURE PixMap (VAR rowBytes, height: INTEGER; VAR v2: BOOLEAN);\r\t\t\tVAR x: INTEGER;\r\t\tBEGIN\r\t\t\tReadWord(rd, rowBytes); v2 := rowBytes >= 32768;\r\t\t\tReadWord(rd, x); height := x;\r\t\t\tReadWord(rd, x);\r\t\t\tReadWord(rd, x); height := x - height;\r\t\t\tReadWord(rd, x);\r\t\t\tIF v2 THEN\r\t\t\t\tDEC(rowBytes, 32768);\r\t\t\t\tReadWord(rd, x); ReadWord(rd, x); ReadWord(rd, x); ReadWord(rd, x);\r\t\t\t\tPoint(x, y); Point(x, y);\r\t\t\t\tPoint(x, y); Point(x, y);\r\t\t\t\tReadWord(rd, x);\r\t\t\t\tReadWord(rd, x);\r\t\t\t\tReadWord(rd, x);\r\t\t\t\tReadWord(rd, x);\r\t\t\t\tReadWord(rd, x);\r\t\t\t\tReadWord(rd, x)\r\t\t\tEND\r\t\tEND PixMap;\r\t\t\r\t\tPROCEDURE ColorTab;\r\t\t\tVAR x, n: INTEGER;\r\t\tBEGIN\r\t\t\tReadWord(rd, x); ReadWord(rd, x); ReadWord(rd, x); ReadWord(rd, n);\r\t\t\tWHILE n >= 0 DO\r\t\t\t\tReadWord(rd, x); ReadWord(rd, x); ReadWord(rd, x); ReadWord(rd, x);\r\t\t\t\tDEC(n)\r\t\t\tEND\r\t\tEND ColorTab;\r\t\t\r\t\tPROCEDURE PixData (rowBytes, height: INTEGER; v2: BOOLEAN);\r\t\t\tVAR n, m: INTEGER; b: BYTE;\r\t\tBEGIN\r\t\t\tIF rowBytes < 8 THEN\r\t\t\t\tSkip(rd, rowBytes * height)\r\t\t\tELSIF v2 THEN\r\t\t\t\tWHILE height > 0 DO\r\t\t\t\t\tIF rowBytes > 250 THEN ReadWord(rd, n) ELSE rd.ReadByte(b); n := b MOD 256 END;\r\t\t\t\t\tREPEAT\r\t\t\t\t\t\tReadByte(rd, m); DEC(n);\r\t\t\t\t\t\tIF m >= 0 THEN\r\t\t\t\t\t\t\tWHILE m >= 0 DO rd.ReadByte(b); DEC(n); DEC(m) END\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\t"
                    attr: 0
                  - text: "ASSERT(m # -128, 100);"
                    attr: 4
                  - text: "\r\t\t\t\t\t\t\trd.ReadByte(b); DEC(n)\r\t\t\t\t\t\tEND\r\t\t\t\t\tUNTIL n <= 0;\r\t\t\t\t\tDEC(height)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tWHILE height > 0 DO\r\t\t\t\t\tIF rowBytes > 250 THEN ReadWord(rd, n) ELSE rd.ReadByte(b); n := b MOD 256 END;\r\t\t\t\t\tSkip(rd, n); DEC(height)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND PixData;\r\t\t\r\t\tPROCEDURE BitMap (isRegion: BOOLEAN);\r\t\t\tVAR x, y, w, h, l, t, r, b: INTEGER; v2: BOOLEAN;\r\t\tBEGIN\r\t\t\tPixMap(w, h, v2);\r\t\t\tIF v2 THEN ColorTab END;\r\t\t\tPoint(x, y); Point(x, y); Point(x, y); Point(x, y); ReadWord(rd, x);\r\t\t\tIF isRegion THEN Region(l, t, r, b) END;\r\t\t\tPixData(w, h, v2)\r\t\tEND BitMap;\r\t\t\r\t\tPROCEDURE PixPattern;\r\t\t\tVAR type, x, w, h: INTEGER; v2: BOOLEAN;\r\t\tBEGIN\r\t\t\tReadWord(rd, type); Data(8);\r\t\t\tIF type = 1 THEN\r\t\t\t\tPixMap(w, h, v2); ColorTab; PixData(w, h, v2)\r\t\t\tELSIF type = 2 THEN\r\t\t\t\tReadWord(rd, x); ReadWord(rd, x); ReadWord(rd, x)\r\t\t\tELSE HALT(100)\r\t\t\tEND\r\t\tEND PixPattern;\r\t\t\r\t\tPROCEDURE Setup;\r\t\tBEGIN\r\t\t\tCASE op MOD 8 OF\r\t\t\t| 0: res := WinApi.SelectObject(dc, nullBrush); res := WinApi.SelectObject(dc, actPen)\r\t\t\t| 1: res := WinApi.SelectObject(dc, actBrush); res := WinApi.SelectObject(dc, nullPen)\r\t\t\t| 2: res := WinApi.SelectObject(dc, bgndBrush); res := WinApi.SelectObject(dc, nullPen)\r\t\t\t| 4: res := WinApi.SelectObject(dc, fillBrush); res := WinApi.SelectObject(dc, nullPen)\r\t\t\t| 3, 5..7: res := WinApi.SelectObject(dc, nullBrush); res := WinApi.SelectObject(dc, nullPen)\r\t\t\tEND\r\t\tEND Setup;\r\t\t\r\t\tPROCEDURE SetLn;\r\t\tBEGIN\r\t\t\tres := WinApi.SelectObject(dc, actPen)\r\t\tEND SetLn;\r\t\t\r\t\tPROCEDURE NewFont;\r\t\t\tVAR res, weight: INTEGER; old: WinApi.HANDLE;\r\t\tBEGIN\r\t\t\tIF ODD(style) THEN weight := 700 ELSE weight := 400 END;\r\t\t\told := font;\r\t\t\tfont := WinApi.CreateFontW(\r\t\t\t\t-size, 0, 0, 0, weight, style DIV 2 MOD 2, style DIV 4 MOD 2, 0, 0, 3, 2, 1, 6, \"Arial\");\r\t\t\tres := WinApi.SelectObject(dc, font);\r\t\t\tres := WinApi.DeleteObject(old)\r\t\tEND NewFont;\r\t\t\r\t\tPROCEDURE LineTo (x, y: INTEGER);\r\t\t\tVAR res: INTEGER;\r\t\tBEGIN\r\t\t\tIF ~clipped THEN res := WinApi.LineTo(dc, lx, ly)\r\t\t\tELSE res := WinApi.MoveToEx(dc, lx, ly, NIL)\r\t\t\tEND\r\t\tEND LineTo;\r\t\t\r\t\tPROCEDURE Text (x, y: INTEGER);\r\t\t\tVAR res, len: INTEGER; str: ARRAY 256 OF CHAR;\r\t\tBEGIN\r\t\t\tString(str, len);\r\t\t\tIF ~clipped THEN res := WinApi.TextOutW(dc, x, y, str, len) END\r\t\tEND Text;\r\t\t\r\t\tPROCEDURE Rectangle (l, t, r, b: INTEGER);\r\t\t\tVAR res: INTEGER;\r\t\tBEGIN\r\t\t\tIF ~clipped THEN res := WinApi.Rectangle(dc, l, t, r, b) END\r\t\tEND Rectangle;\r\t\t\r\t\tPROCEDURE RoundRect (l, t, r, b, w, h: INTEGER);\r\t\t\tVAR res: INTEGER;\r\t\tBEGIN\r\t\t\tIF ~clipped THEN res := WinApi.RoundRect(dc, l, t, r, b, w, h) END\r\t\tEND RoundRect;\r\t\t\r\t\tPROCEDURE Ellipse (l, t, r, b: INTEGER);\r\t\t\tVAR res: INTEGER;\r\t\tBEGIN\r\t\t\tIF ~clipped THEN res := WinApi.Ellipse(dc, l, t, r, b) END\r\t\tEND Ellipse;\r\t\t\r\t\tPROCEDURE Polyline (VAR poly: ARRAY OF WinApi.POINT; len: INTEGER);\r\t\t\tVAR res: INTEGER;\r\t\tBEGIN\r\t\t\tIF ~clipped THEN res := WinApi.Polyline(dc, poly, len) END\r\t\tEND Polyline;\r\t\t\r\t\tPROCEDURE Polygon (VAR poly: ARRAY OF WinApi.POINT; len: INTEGER);\r\t\t\tVAR res: INTEGER;\r\t\tBEGIN\r\t\t\tIF ~clipped THEN res := WinApi.Polygon(dc, poly, len) END\r\t\tEND Polygon;\r\t\t\r\tBEGIN\r\t\trd := v.model.file.NewReader(NIL);\r\t\trd.SetPos(v.model.pos); end := v.model.pos + v.model.len;\r\t\tReadWord(rd, x); Point(l, t); Point(r, b); v.w := r - l; v.h := b - t; v2 := FALSE;\r\t\tp := f.rider(HostPorts.Rider).port;\r\t\t"
