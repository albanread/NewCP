os() >= end)\r\tEND Dump;\r*)\t\r\t\r\tPROCEDURE Evaluate (v: StdView);\r\t\tVAR len, adr: INTEGER; rd: Files.Reader;\r\tBEGIN\r\t\tlen := v.model.len;\r\t\tIF v.model.data = NIL THEN\r\t\t\trd := v.model.file.NewReader(NIL);\r\t\t\trd.SetPos(v.model.pos);\r\t\t\tNEW(v.model.data, len);\r\t\t\trd.ReadBytes(v.model.data^, 0, len)\r\t\tEND;\r\t\tv.model.ref := WinApi.SetMetaFileBitsEx(len, v.model.data);\r\t\tASSERT(v.model.ref # 0, 100);\r\tEND Evaluate;\r\r\r\t"
