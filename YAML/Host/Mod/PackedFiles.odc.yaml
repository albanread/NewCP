                  - text: "\t(* This module depends on the implementation of DevPacker. *)\r"
                    attr: 3
                  - text: "\r\tIMPORT "
                    attr: 0
                  - text: SYSTEM
                    attr: 3
                  - text: ", Kernel, Files, HostFiles (*, Dialog*);\r\t"
                    attr: 0
                  - text: "\t(* no other imports allowed because of DevDependencies.CreateTool *)"
                    attr: 1
                  - text: "\r\r\tCONST\r\t\t"
                    attr: 0
                  - text: packTag
                    attr: 3
                  - text: "* = 12681268H;\r\t\tversion = 1; (* "
                    attr: 0
                  - text: same as in DevPacker
                    attr: 1
                  - text: " *)\r\r\tTYPE\r\t\tDirectory = POINTER TO RECORD (Files.Directory) END;\r\t\tPackedDirectory = POINTER TO RECORD (Files.Directory) END;\r\t\tFileList = POINTER TO RECORD\r\t\t\tpath, name: Files.Name;\r\t\t\tadr, len: INTEGER;\r\t\t\tyear, month, day, hour, minute, second: INTEGER;\r\t\t\tnext: FileList\r\t\tEND;\r\t\tLocator = POINTER TO RECORD\r\t\t\tname: Files.Name;\r\t\t\tfiles: FileList;\r\t\t\tsublocs: Locator;\r\t\t\tnext: Locator\r\t\tEND;\r\t\tFile = POINTER TO RECORD (Files.File)\r\t\t\tl: FileList;\r\t\t\tf: Files.File\r\t\tEND;\r\t\tReader = POINTER TO RECORD (Files.Reader)\r\t\t\tr: Files.Reader;\r\t\t\tbase: File\r\t\tEND;\r\r\tVAR\r\t\torgdir: Files.Directory;\r\t\t"
                    attr: 0
                  - text: stdDir
                    attr: 3
                  - text: "-, "
                    attr: 0
                  - text: packedDir
                    attr: 3
                  - text: "-: Files.Directory;\r\t\troots: Locator;\r\t\texefile: Files.File;\r\t\tcurloc: HostFiles.Locator;\r\r\t"
                    attr: 0
                  - text: "(* Auxiliary procedures *)\r\r\t"
                    attr: 1
                  - text: "PROCEDURE DebugPrint(IN str: ARRAY OF CHAR);\r\tBEGIN\r\t\t(*\r\t\tDialog.ShowMsg(str)\r\t\t*)\r\tEND DebugPrint;\r\r\tPROCEDURE ReadInt (r: Files.Reader; OUT x: INTEGER);\r\t\tVAR b: ARRAY 4 OF BYTE;\r\tBEGIN\r\t\tr.ReadBytes(b, 0, 4);\r\t\tx := b[0] MOD 256 + 256 * (b[1] MOD 256 + 256 * (b[2] MOD 256 + 256 * (b[3] MOD 256)))\r\tEND ReadInt;\r\r\tPROCEDURE ReadChar (r: Files.Reader; OUT x: CHAR);\r\t\tVAR b: ARRAY 2 OF BYTE;\r\tBEGIN\r\t\tr.ReadBytes(b, 0, 2);\r\t\tx := SYSTEM.VAL(CHAR, b)\r\tEND ReadChar;\r\r\tPROCEDURE ReadString (r: Files.Reader; OUT x: ARRAY OF CHAR);\r\t\tVAR i: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ti := 0; REPEAT ReadChar(r, ch); x[i] := ch; INC(i) UNTIL ch = 0X\r\tEND ReadString;\r\r\tPROCEDURE Diff (VAR a, b: ARRAY OF CHAR; caseSens: BOOLEAN): INTEGER;\r\t\tVAR i: INTEGER; cha, chb: CHAR;\r\tBEGIN\r\t\ti := 0;\r\t\tREPEAT\r\t\t\tcha := a[i]; chb := b[i]; INC(i);\r\t\t\tIF cha # chb THEN\r\t\t\t\tIF ~caseSens THEN\r\t\t\t\t\tcha := Kernel.Upper(cha);\r\t\t\t\t\tchb := Kernel.Upper(chb);\r\t\t\t\tEND;\r\t\t\t\tIF cha = \"\\\" THEN cha := \"/\" END;\r\t\t\t\tIF chb = \"\\\" THEN chb := \"/\" END;\r\t\t\t\tIF cha # chb THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " ORD(cha) - ORD(chb) END\r\t\t\tEND\r\t\tUNTIL cha = 0X;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " 0\r\tEND Diff;\r\r\tPROCEDURE GetType(name: Files.Name; OUT type: Files.Type);\r\t\tVAR l, i: INTEGER;\r\tBEGIN\r\t\tl := LEN(name$); type := \"\";\r\t\tWHILE (l > 0) & (name[l - 1] # '.') DO DEC(l) END;\r\t\tFOR i := 0 TO LEN(name$) - l DO type[i] := name[l + i] END\r\tEND GetType;\r\r\tPROCEDURE GetNextSubLoc (path: Files.Name; beg: INTEGER; OUT res: Files.Name; OUT end: INTEGER);\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\ti := 0; res := \"\";\r\t\tWHILE (beg < LEN(path$)) & (path[beg] # '/') & (path[beg] # '\\') & (path[beg] # ':') DO\r\t\t\tres[i] := path[beg];\r\t\t\tINC(beg); INC(i)\r\t\tEND;\r\t\tres[i] := 0X; end := beg\r\tEND GetNextSubLoc;\r\r\tPROCEDURE GetLoc(path: Files.Name; create: BOOLEAN): Locator;\r\t\tVAR end, diff: INTEGER;sp: Files.Name; loc, tl, last: Locator;\r\tBEGIN\r\t\tsp := \"\";\r\t\tIF path = '' THEN\r\t\t\tDebugPrint(\"Cannot use an empty path.\");\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL\r\t\tELSIF (path[0] = '/') OR (path[0] = '\\') THEN (* network path *)\r\t\t\tIF (path[1] = '/') OR (path[1] = '\\') THEN\r\t\t\t\tGetNextSubLoc(path, 2, sp, end)\r\t\t\tELSE\r\t\t\t\tDebugPrint(\"Invalid network path.\");\r\t\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL\r\t\t\tEND\r\t\tELSIF path[1] = ':' THEN (* absolute path *)\r\t\t\tGetNextSubLoc(path, 0, sp, end)\r\t\tELSE\r\t\t\tDebugPrint(\"No absolute path.\");\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL\r\t\tEND;\r\t\tIF sp # \"\" THEN\r\t\t\tloc := roots; last := loc;\r\t\t\tIF loc # NIL THEN diff := Diff(sp, loc.name, FALSE) END;\r\t\t\tWHILE (loc # NIL) & (diff > 0) DO\r\t\t\t\tlast := loc; loc := loc.next;\r\t\t\t\tIF loc # NIL THEN diff := Diff(sp, loc.name, FALSE) END\r\t\t\tEND;\r\t\t\tIF ((loc = NIL) OR (diff # 0)) & ~create THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL END;\r\t\t\tIF (loc = NIL) OR (diff < 0) THEN\r\t\t\t\tNEW(loc); loc.name := sp;\r\t\t\t\tIF roots = NIL THEN\r\t\t\t\t\troots := loc\r\t\t\t\tELSE\r\t\t\t\t\tloc.next := last.next; last.next := loc\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tGetNextSubLoc(path, 3, sp, end);\r\t\t\tWHILE sp # \"\" DO\r\t\t\t\ttl := loc.sublocs; last := NIL;\r\t\t\t\tIF tl # NIL THEN diff := Diff(sp, tl.name, FALSE) END;\r\t\t\t\tWHILE (tl # NIL) & (diff > 0) DO\r\t\t\t\t\tlast := tl; tl := tl.next;\r\t\t\t\t\tIF tl # NIL THEN diff := Diff(sp, tl.name, FALSE) END\r\t\t\t\tEND;\r\t\t\t\tIF (tl = NIL) OR (diff < 0) THEN\r\t\t\t\t\tIF create THEN\r\t\t\t\t\t\tNEW(tl); tl.name := sp;\r\t\t\t\t\t\tIF last = NIL THEN\r\t\t\t\t\t\t\ttl.next := loc.sublocs; loc.sublocs := tl\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\ttl.next := last.next; last.next := tl\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE\r\t\t\t\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tloc := tl;\r\t\t\t\tGetNextSubLoc(path, end + 1, sp, end)\r\t\t\tEND;\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " loc\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL\r\tEND GetLoc;\r\r\tPROCEDURE ReadResourceTable;\r\t\tVAR r: Files.Reader; tableadr, int, noff, i: INTEGER; str: Files.Name; l: FileList; loc: Locator;\r\tBEGIN\r\t\troots := NIL; r := exefile.NewReader(NIL);\r\t\tr.SetPos(exefile.Length() - 12);\r\t\tReadInt(r, int);\r\t\tIF int = packTag THEN\r\t\t\tReadInt(r, int);\r\t\t\tIF int = version THEN\r\t\t\t\tReadInt(r, tableadr);\r\t\t\t\tr.SetPos(tableadr); ReadInt(r, noff);\r\t\t\t\tNEW(roots);\r\t\t\t\tFOR i := 0 TO noff - 1 DO\r\t\t\t\t\t(* Files are packed in reversed alphabetical order,\r\t\t\t\t\t\tso adding files at the beginning of the list renders an alphabetically sorted list. *)\r\t\t\t\t\tNEW(l);\r\t\t\t\t\tReadString(r, str); l.path := str; ReadString(r, str); l.name := str;\r\t\t\t\t\tReadInt(r, int); l.adr := int; ReadInt(r, int); l.len := int;\r\t\t\t\t\tReadInt(r, int); l.year := int; ReadInt(r, int); l.month := int; ReadInt(r, int); l.day := int;\r\t\t\t\t\tReadInt(r, int); l.hour := int; ReadInt(r, int); l.minute := int; ReadInt(r, int); l.second := int;\r\t\t\t\t\tloc := GetLoc(curloc.path + '/' + l.path, TRUE);\r\t\t\t\t\tl.next := loc.files; loc.files := l\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND ReadResourceTable;\r\r\tPROCEDURE Get (path: HostFiles.FullName; name: Files.Name): Files.File;\r\t\tVAR\r\t\t\tl: FileList; f: File; loc: Locator;\r\t\t\ttype: Files.Type;\r\t\t\tdiff: INTEGER;\r\tBEGIN\r\t\tloc := GetLoc(path$, FALSE);\r\t\tIF loc # NIL THEN l := loc.files ELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL END;\r\t\tIF l # NIL THEN diff := Diff(l.name, name, FALSE) END;\r\t\tWHILE (l # NIL) & (diff < 0) DO\r\t\t\tl := l.next;\r\t\t\tIF l # NIL THEN diff := Diff(l.name, name, FALSE) END\r\t\tEND;\r\t\tIF (l # NIL) & (diff = 0) THEN\r\t\t\tNEW(f); f.l := l; f.f := exefile;\r\t\t\tGetType(name, type); f.InitType(type);\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " f\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL\r\tEND Get;\r\r\t"
                    attr: 0
                  - text: "(* Files.Directory *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (d: Directory) Delete (loc: Files.Locator; name: Files.Name);\r\tBEGIN\r\t\torgdir.Delete(loc, name)\r\tEND Delete;\r\r\tPROCEDURE (d: Directory) FileList (floc: Files.Locator): Files.FileInfo;\r\t\tVAR pi, fi, tfi, nfi, last: Files.FileInfo; firstRes, diff: INTEGER; caseSens: BOOLEAN;\r\tBEGIN\r\t\tASSERT(floc IS HostFiles.Locator, 20);\r\t\tfi := orgdir.FileList(floc); (* Gives an alphabetically sorted list of files. *)\r\t\tfirstRes := floc.res;\r"
                    attr: 0
                  - text: "\t\t"
                    attr: 4
                  - text: "pi := packedDir.FileList(floc); (* Gives an alphabetically sorted list of files. *)\r\t\tIF floc.res = 2 THEN floc.res := firstRes END;\r"
                    attr: 0
                  - text: "\t\t"
                    attr: 4
                  - text: "nfi := NIL; last := NIL; tfi := NIL;\r\t\t(* Both fi and l are alphabetically sorted. And the returned list also has to be alphabetically sorted. *)\r\t\tcaseSens := floc(HostFiles.Locator).caseSens;\r\t\tWHILE (pi # NIL) & (fi # NIL) DO\r\t\t\tdiff := Diff(pi.name, fi.name, caseSens);\r\t\t\tIF diff >= 0 THEN\r\t\t\t\ttfi := fi;\r\t\t\t\tfi := fi.next;\r\t\t\t\tIF diff = 0 THEN pi := pi.next END\r\t\t\tELSE\r\t\t\t\ttfi := pi;\r\t\t\t\tpi := pi.next\r\t\t\tEND;\r\t\t\tIF nfi = NIL THEN nfi := tfi ELSE last.next := tfi END;\r\t\t\tlast := tfi\r\t\tEND;\r\t\tIF pi # NIL THEN\r\t\t\tIF nfi = NIL THEN nfi := pi ELSE last.next := pi END\r\t\tELSIF fi # NIL THEN\r\t\t\tIF nfi = NIL THEN nfi := fi ELSE last.next := fi END\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: "RETURN "
                    attr: 3
                  - text: "nfi\r\tEND FileList;\r\r\tPROCEDURE (d: Directory) GetFileName (name: Files.Name; type: Files.Type; OUT filename: Files.Name);\r\tBEGIN\r\t\torgdir.GetFileName(name, type, filename)\r\tEND GetFileName;\r\r\tPROCEDURE (d: Directory) LocList (floc: Files.Locator): Files.LocInfo;\r\t\tVAR pi, li, nli, last: Files.LocInfo; firstRes, diff: INTEGER; caseSens: BOOLEAN;\r\tBEGIN\r\t\tli := orgdir.LocList(floc);\r\t\tfirstRes := floc.res;\r\t\tpi := packedDir.LocList(floc);\r\t\tIF floc.res = 2 THEN floc.res := firstRes END;\r\t\tcaseSens := floc(HostFiles.Locator).caseSens;\r\t\tnli := NIL;\r\t\t(* Both pi and li are alphabetically ordered. *)\r\t\tWHILE (pi # NIL) & (li # NIL) DO\r\t\t\tdiff := Diff(pi.name, li.name, caseSens);\r\t\t\tIF diff >= 0 THEN\r\t\t\t\tIF nli = NIL THEN nli := li ELSE last.next := li END; last := li;\r\t\t\t\tli := li.next;\r\t\t\t\tIF diff = 0 THEN pi := pi.next END\r\t\t\tELSE\r\t\t\t\tIF nli = NIL THEN nli := pi ELSE last.next := pi END; last := pi;\r\t\t\t\tpi := pi.next\r\t\t\tEND\r\t\tEND;\r\t\tIF pi = NIL THEN\r\t\t\tIF nli = NIL THEN nli := li ELSE last.next := li END\r\t\tELSE\r\t\t\tIF nli = NIL THEN nli := pi ELSE last.next := pi END\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " nli\r\tEND LocList;\r\r\tPROCEDURE (d: Directory) New (loc: Files.Locator; ask: BOOLEAN): Files.File;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " orgdir.New(loc, ask)\r\tEND New;\r\r\tPROCEDURE (d: Directory) Old (loc: Files.Locator; name: Files.Name; shared: BOOLEAN): Files.File;\r\t\tVAR f: Files.File;\r\tBEGIN\r\t\tf := orgdir.Old(loc, name, shared);\r\t\tIF f = NIL THEN f := packedDir.Old(loc, name, shared) END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " f\r\tEND Old;\r\r\tPROCEDURE (d: Directory) Rename (loc: Files.Locator; old, new: Files.Name; ask: BOOLEAN);\r\tBEGIN\r\t\torgdir.Rename(loc, old, new, ask)\r\tEND Rename;\r\r\tPROCEDURE (d: Directory) SameFile (\r\t\tloc0: Files.Locator; name0: Files.Name; loc1: Files.Locator; name1: Files.Name\r\t): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " orgdir.SameFile(loc0, name0, loc1, name1)\r\tEND SameFile;\r\r\tPROCEDURE (d: Directory) Temp (): Files.File;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " orgdir.Temp()\r\tEND Temp;\r\r\tPROCEDURE (d: Directory) This (IN path: ARRAY OF CHAR): Files.Locator;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " orgdir.This(path)\r\tEND This;\r\r\t"
                    attr: 0
                  - text: "(* PackedDirectory *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (d: PackedDirectory) Delete (loc: Files.Locator; name: Files.Name);\r\tBEGIN\r\t\tloc.res := 4 (* "
                    attr: 0
                  - text: write-protection
                    attr: 1
                  - text: " *)\r\tEND Delete;\r\r\tPROCEDURE (d: PackedDirectory) FileList (floc: Files.Locator): Files.FileInfo;\r\t\tVAR nfi, tfi, last: Files.FileInfo; loc: Locator; l: FileList; type: Files.Type; hloc: HostFiles.Locator;\r\tBEGIN\r\t\tASSERT(floc IS HostFiles.Locator, 20);\r\t\thloc := floc(HostFiles.Locator);\r\t\tloc := GetLoc(hloc.path$, FALSE);\r\t\tnfi := NIL;\r\t\tIF loc # NIL THEN\r\t\t\tl := loc.files; last := NIL; tfi := NIL;\r\t\t\t(* l is alphabetically sorted. And the returned list also has to be alphabetically sorted. *)\r\t\t\tWHILE l # NIL DO\r\t\t\t\tGetType(l.name, type);\r\t\t\t\tNEW(tfi); tfi.name := l.name; tfi.type := type; tfi.attr := {Files.readOnly};\r\t\t\t\ttfi.modified.year := l.year; tfi.modified.month := l.month; tfi.modified.day := l.day;\r\t\t\t\ttfi.modified.hour := l.hour; tfi.modified.minute := l.minute; tfi.modified.second := l.second;\r\t\t\t\tIF nfi = NIL THEN nfi := tfi ELSE last.next := tfi END;\r\t\t\t\tlast := tfi;\r\t\t\t\tl := l.next\r\t\t\tEND;\r\t\t\tfloc.res := 0\r\t\tELSE\r\t\t\tfloc.res := 2\r\t\tEND;\r\t\t"
