                  - fold:
                      collapsed: true
                      hidden:
                        - text: "\r\t- it is intended that CheckDll is called inside the procedures SendNote/SendDocument and not in the guards.\r\tThere were suspicious/unsolvable problems with these calls (under Windows 3.11) which lead to nasty\r\terror messages. As a consequence, the menu items are always enabled before they are executed for\tthe first time.\r\t"
                          attr: 0
                      body: []
                      attr: 1
