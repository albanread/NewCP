                  - text: "\r**)\r"
                    attr: 1
                  - text: "\t\t\t\t\r\tIMPORT \r\t\tSYSTEM, WinCmc, WinApi,\r\t\tFiles, Dialog, Converters, Views, Windows,\r\t\tTextModels, TextViews, TextControllers, HostFiles;\r\t\r\tCONST\r\t\ttempFile = \"_mail_.odc\";\r\t\r\tVAR\r\t\ttempLoc: HostFiles.Locator;\r\t\tchecked: BOOLEAN;\r\t\tsendDocument: PROCEDURE(adr, subject, note: WinCmc.string; flgs: WinCmc.flags;\r\t\t\t\t\t\tpaths, names, delimiter: WinCmc.string; id: WinCmc.ui_id): WinCmc.return_code;\r\r\t\t\r\t\r\tPROCEDURE CheckDll*;\r\t\tVAR dll: WinApi.HINSTANCE;\r\tBEGIN\r\t\tIF ~checked THEN\r\t\t\tdll := WinApi.LoadLibraryW(\"MAPI32\");\r\t\t\tIF dll # 0 THEN\r\t\t\t\tSYSTEM.PUT(SYSTEM.ADR(sendDocument), WinApi.GetProcAddress(dll, \"cmc_send_documents\"));\r\t\t\tEND;\r\t\t\tchecked := TRUE\r\t\tEND\r\tEND CheckDll;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SendNote
                    attr: 3
                  - text: "*;\r\t\tVAR c: TextControllers.Controller; r: TextModels.Reader; res: WinCmc.return_code;\r\t\t\ts: POINTER TO ARRAY OF SHORTCHAR; ch: CHAR; beg, end, i: INTEGER; p: WinCmc.string;\r\tBEGIN\r\t\tCheckDll;\r\t\tIF sendDocument # NIL THEN\r\t\t\tc := TextControllers.Focus(); p := NIL;\r\t\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\t\tc.GetSelection(beg, end); \r\t\t\t\tr := c.text.NewReader(NIL); r.SetPos(beg);\r\t\t\t\tNEW(s, (end - beg) * 2 + 1); r.ReadChar(ch); i := 0;\r\t\t\t\tWHILE ~r.eot & (r.Pos() <= end) DO\r\t\t\t\t\tIF (r.view = NIL) & (ch < 100X) THEN\r\t\t\t\t\t\ts[i] := SHORT(ch); INC(i);\r\t\t\t\t\t\tIF ch = 13X THEN s[i] := 10X; INC(i) END\r\t\t\t\t\tEND;\r\t\t\t\t\tr.ReadChar(ch)\r\t\t\t\tEND;\r\t\t\t\ts[i] := 0X; p := s^;\r\t\t\tEND;\r\t\t\tres := sendDocument(NIL, NIL, p,\r\t\t\t\tWinCmc.ERROR_UI_ALLOWED + WinCmc.LOGON_UI_ALLOWED + WinCmc.SEND_UI_REQUESTED,\r\t\t\t\tNIL, NIL, \", \", 0)\r\t\tEND\r\tEND SendNote;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: SendDocument
                    attr: 3
                  - text: "*;\r\t\tVAR w: Windows.Window; res: WinCmc.return_code; name: HostFiles.FullName; title: Views.Title;\r\t\t\tss: ARRAY 260 OF SHORTCHAR; st: ARRAY 64 OF SHORTCHAR;\r\tBEGIN\r\t\tCheckDll;\r\t\tIF sendDocument # NIL THEN\r\t\t\tw := Windows.dir.First();\r\t\t\tIF w # NIL THEN\r\t\t\t\tConverters.Export(tempLoc, tempFile, NIL, w.doc.ThisView());\r\t\t\t\tname := tempLoc.path + \"\\\" + tempFile;\r\t\t\t\tIF w.name # \"\" THEN title := w.name$\r\t\t\t\tELSE w.GetTitle(title); title := title + \".odc\"\r\t\t\t\tEND;\r\t\t\t\tss := SHORT(name$); st := SHORT(title$);\r\t\t\t\tres := sendDocument(NIL, NIL, NIL,\r\t\t\t\t\tWinCmc.ERROR_UI_ALLOWED\r\t\t\t\t\t+ WinCmc.LOGON_UI_ALLOWED\r\t\t\t\t\t+ WinCmc.SEND_UI_REQUESTED,\r\t\t\t\t\tss, st, \", \", 0);\r\t\t\t\tFiles.dir.Delete(tempLoc, tempFile)\r\t\t\tEND\r\t\tEND\r\tEND SendDocument;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: SendNoteGuard
                    attr: 3
                  - text: "* (VAR par: Dialog.Par);\r\tBEGIN\r\t\tIF checked & (sendDocument = NIL) THEN par.disabled := TRUE END\r\tEND SendNoteGuard;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: SendDocumentGuard
                    attr: 3
                  - text: "* (VAR par: Dialog.Par);\r\tBEGIN\r\t\tIF checked & (sendDocument = NIL) OR (Windows.dir.First() = NIL) THEN par.disabled := TRUE END\r\tEND SendDocumentGuard;\r\t\r\tPROCEDURE Init;\r\t\tVAR res: INTEGER; path: HostFiles.FullName;\r\tBEGIN\r\t\tres := WinApi.GetTempPathW(LEN(path), path);\r\t\ttempLoc := HostFiles.NewLocator(path);\r\tEND Init;\r\t\rBEGIN\r\tInit\rEND HostMail.\r\r"
                    attr: 0
