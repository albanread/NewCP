                    attr: 3
                  - text: " WinApi.S_OK\r\tEND DragOver;\r\t\r\tPROCEDURE (this: IDropTarget) DragLeave (): COM.RESULT;\r\tBEGIN\r\t\tIF (this.type # \"\") & (this.win # NIL) THEN\r\t\t\tPollDrop(this, Controllers.hide)\r\t\tEND;\r\t\ttargetFrame := NIL; this.source := NIL;\r\t\t"
                    attr: 0
