                    attr: 0
                  - text: "\t(* drag & drop *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (hook: Hook) "
                    attr: 0
                  - text: TrackToDrop
                    attr: 3
                  - text: "* (f: Views.Frame; view: Views.View;\r\t\t\t\t\t\t\t\t\tisSingle: BOOLEAN; w, h, rx, ry: INTEGER;\r\t\t\t\t\t\t\t\t\tVAR dest: Views.Frame; VAR destX, destY: INTEGER; VAR op: INTEGER;\r\t\t\t\t\t\t\t\t\tVAR x, y: INTEGER; VAR buttons: SET);\r\t\tVAR res: COM.RESULT; mask, mode: SET; p: HostPorts.Port; pt: WinApi.POINT;\r\t\t\tdsrc: IDropSource; data: WinOle.IDataObject;\r\tBEGIN\r\t\tsourceFrame := f; sourceX := x; sourceY := y;\r\t\tdropView := view; isSingleton := isSingle;\r\t\tdropW := w; dropH := h; relX := rx; relY := ry;\r\t\tdata := OleData.ViewDropData(view, w, h, rx, ry, isSingle, ~isSingle);\r\t\tNEW(dsrc); dsrc.key := {};\r\t\tmask := WinOle.DROPEFFECT_COPY;\r\t\tIF op # Mechanisms.copy THEN mask := mask + WinOle.DROPEFFECT_MOVE END;\r\t\tres := WinOle.DoDragDrop(data, dsrc, mask, mode);\r\t\top := Mechanisms.cancelDrop;\r\t\tIF res = WinApi.DRAGDROP_S_DROP THEN\r\t\t\tIF mode * WinOle.DROPEFFECT_MOVE # {} THEN op := Mechanisms.move\r\t\t\tELSIF mode * WinOle.DROPEFFECT_COPY # {} THEN op := Mechanisms.copy\r\t\t\tEND\r\t\tEND;\r\t\tIF targetFrame # NIL THEN\t"
                    attr: 0
                  - text: "(* reconstruct final mouse coordinates in f *)"
                    attr: 1
                  - text: "\r\t\t\tp := targetFrame.rider(HostPorts.Rider).port;\r\t\t\tpt.x := (targetX + targetFrame.gx) DIV p.unit;\r\t\t\tpt.y := (targetY + targetFrame.gy) DIV p.unit;\r\t\t\tres := WinApi.ClientToScreen(p.wnd, pt);\r\t\t\tp := f.rider(HostPorts.Rider).port;\r\t\t\tres := WinApi.ScreenToClient(p.wnd, pt);\r\t\t\tx := pt.x * p.unit - f.gx;\r\t\t\ty := pt.y * p.unit - f.gy\r\t\tEND;\r\t\tdest := targetFrame; destX := targetX; destY := targetY;\r\t\tsourceFrame := NIL; targetFrame := NIL; dropView := NIL\r\tEND TrackToDrop;\r\r\tPROCEDURE PickMode (f, dest: Views.Frame; x, y: INTEGER): INTEGER;\r\t\tVAR mode, cursor: INTEGER;\r\tBEGIN\r\t\tIF WinApi.GetAsyncKeyState(1BH) < 0 THEN mode := escape; cursor := Ports.arrowCursor\r(*\r\t\tELSIF Home(f, x, y) THEN mode := Mechanisms.cancelPick; cursor := Ports.arrowCursor\r*)\r\t\tELSIF dest = NIL THEN mode := Mechanisms.cancelPick; cursor := HostPorts.stopCursor\r\t\tELSE\r\t\t\tcursor := HostPorts.pickCursor;\r\t\t\tIF Services.SameType(dest.view, f.view) THEN\r\t\t\t\tmode := Mechanisms.pick\r\t\t\tELSE mode := Mechanisms.pickForeign\r\t\t\tEND\r\t\tEND;\r\t\tf.SetCursor(cursor);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " mode\r\tEND PickMode;\r\r\tPROCEDURE (hook: Hook) "
                    attr: 0
                  - text: TrackToPick
                    attr: 3
                  - text: "* (f: Views.Frame;\r\t\t\t\t\t\t\t\t\tVAR dest: Views.Frame; VAR destX, destY: INTEGER; VAR op: INTEGER;\r\t\t\t\t\t\t\t\t\tVAR x, y: INTEGER; VAR buttons: SET);\r\t\tVAR d, d0: Views.Frame;\r\t\t\tdx, dy,  x0, y0,  x1, y1: INTEGER; isDown: BOOLEAN; m: SET;\r\tBEGIN\r\t\tx0 := x; y0 := y;\r\t\tProperties.PollPick(x, y, f, x0, y0, Properties.mark, Properties.show, dest, destX, destY);\r\t\t(* MarkTarget(dest, dest # f); *)\r\t\top := PickMode(f, dest, x, y);\r\t\tREPEAT\r\t\t\t(* CheckWindow(TRUE); *)\r\t\t\tf.Input(x1, y1, m, isDown);\r\t\t\tIF (x1 # x) OR (y1 # y) THEN\r\t\t\t\tProperties.PollPick(x1, y1, f, x0, y0, Properties.noMark, Properties.show, d, dx, dy);\r\t\t\t\tIF (d # dest) OR (dx # destX) OR (dy # destY) THEN\r\t\t\t\t\td0 := dest;\r\t\t\t\t\t(* MarkTarget(dest, (dest # f) & (d # d0)); *)\r\t\t\t\t\tProperties.PollPick(x, y, f, x0, y0, Properties.mark, Properties.hide, dest, destX, destY);\r\t\t\t\t\tx := x1; y := y1;\r\t\t\t\t\tProperties.PollPick(x, y, f, x0, y0, Properties.mark, Properties.show, d, dx, dy);\r\t\t\t\t\tdest := d; destX := dx; destY := dy;\r\t\t\t\t\t(* MarkTarget(dest, (dest # f) (* ~home *) & (d # d0)); *)\r\t\t\t\tELSE\r\t\t\t\t\tProperties.PollPick(x, y, f, x0, y0, Properties.mark, Properties.hide, d, dx, dy);\r\t\t\t\t\tx := x1; y := y1;\r\t\t\t\t\tProperties.PollPick(x, y, f, x0, y0, Properties.mark, Properties.show, d, dx, dy)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\top := PickMode(f, dest, x, y)\r\t\tUNTIL ~isDown OR (op = escape);\r\t\tProperties.PollPick(x, y, f, x0, y0, Properties.mark, Properties.hide, d, dx, dy);\r\t\tIF op = escape THEN\r\t\t\tREPEAT f.Input(x, y, m, isDown) UNTIL ~isDown;\r\t\t\top := Mechanisms.cancelPick\r\t\tEND;\r\t\t(* MarkTarget(dest, dest # f); *)\r\t\t(* CheckWindow(FALSE) *)\r\t\tbuttons := {}\r\tEND TrackToPick;\r\r\r\tPROCEDURE (hook: Hook) "
