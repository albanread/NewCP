                    attr: 1
                  - text: "\r\t\tisSingleton: BOOLEAN;\r\t\tdropW, dropH: INTEGER;\r\t\trelX, relY: INTEGER;\r\t\t\r\t\r\t"
                    attr: 0
                  - text: "(** focus borders **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE Fixed (host: Views.Frame; v: Views.View): BOOLEAN;\r\t\tVAR sp: Properties.ResizePref; c: Containers.Controller;\r\tBEGIN\r\t\tc := host.view(Containers.View).ThisController();\r\t\tIF c.opts * {Containers.noCaret, Documents.pageWidth..Documents.winHeight, fixed} # {} THEN\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE\r\t\tEND;\r\t\tsp.fixed := FALSE; Views.HandlePropMsg(v, sp); "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " sp.fixed\r\tEND Fixed;\r\r\tPROCEDURE PaintFocusBorder (f: Views.Frame; focus: Views.View; l, t, r, b: INTEGER);\r\t\tVAR u, s,  w, h,  mx, my,  l0, t0, r0, b0: INTEGER;\r\t\t\r\t\tPROCEDURE PaintHandle (x, y: INTEGER; l, t, r, b: BOOLEAN);\r\t\tBEGIN\r\t\t\tIF l THEN f.DrawRect(x - u, y, x, y + s, Ports.fill, Ports.background) END;\r\t\t\tIF t THEN f.DrawRect(x, y - u, x + s, y, Ports.fill, Ports.background) END;\r\t\t\tIF r THEN f.DrawRect(x + s, y, x + s + u, y + s, Ports.fill, Ports.background) END;\r\t\t\tIF b THEN f.DrawRect(x, y + s, x + s, y + s + u, Ports.fill, Ports.background) END;\r\t\t\tf.DrawRect(x, y, x + s, y + s, Ports.fill, Ports.defaultColor)\r\t\tEND PaintHandle;\r\t\t\r\tBEGIN\r\t\tf.rider.GetRect(l0, t0, r0, b0);\r\t\ts := (handleSize - f.dot) DIV f.unit;\r\t\tf.rider.SetRect(l0 - s, t0 - s, r0 + s, b0 + s);\r\t\tu := f.dot; s := s * f.unit;\r\t\tw := r - l; h := b - t;\r\t\tf.DrawRect(l, t - s, r, t, Ports.fill, Ports.background);\r\t\tf.DrawRect(l, b, r, b + s, Ports.fill, Ports.background);\r\t\tf.DrawRect(l - s, t - s, l, b + s, Ports.fill, Ports.background);\r\t\tf.DrawRect(r, t - s, r + s, b + s, Ports.fill, Ports.background);\r\t\tDEC(s, u);\r\t\tf.MarkRect(l, t - s, r, t, Ports.fill, HostPorts.focusPat, Ports.show);\r\t\tf.MarkRect(l, b, r, b + s, Ports.fill, HostPorts.focusPat, Ports.show);\r\t\tf.MarkRect(l - s, t - s, l, b + s, Ports.fill, HostPorts.focusPat, Ports.show);\r\t\tf.MarkRect(r, t - s, r + s, b + s, Ports.fill, HostPorts.focusPat, Ports.show);\r\t\tIF ~Fixed(f, focus) THEN\r\t\t\tPaintHandle(l - s, t - s, FALSE, FALSE, TRUE, TRUE);\r\t\t\tPaintHandle(r, t - s, TRUE, FALSE, FALSE, TRUE);\r\t\t\tPaintHandle(l - s, b, FALSE, TRUE, TRUE, FALSE);\r\t\t\tPaintHandle(r, b, TRUE, TRUE, FALSE, FALSE);\r\t\t\tIF w > 2 * clipMiddleHandle THEN\r\t\t\t\tmx := (l + r - s) DIV 2;\r\t\t\t\tPaintHandle(mx, t - s, TRUE, FALSE, TRUE, FALSE);\r\t\t\t\tPaintHandle(mx, b, TRUE, FALSE, TRUE, FALSE)\r\t\t\tEND;\r\t\t\tIF h > 2 * clipMiddleHandle THEN\r\t\t\t\tmy := (t + b - s) DIV 2;\r\t\t\t\tPaintHandle(l - s, my, FALSE, TRUE, FALSE, TRUE);\r\t\t\t\tPaintHandle(r, my, FALSE, TRUE, FALSE, TRUE)\r\t\t\tEND\r\t\tEND;\r\t\tf.DrawRect(l - u, t - u, r + u, b + u, u, Ports.defaultColor);\r\t\tf.rider.SetRect(l0, t0, r0, b0)\r\tEND PaintFocusBorder;\r\r\tPROCEDURE (hook: Hook) "
                    attr: 0
                  - text: FocusBorderCursor
                    attr: 3
                  - text: "* (f: Views.Frame; view: Views.View; l, t, r, b: INTEGER;\r\t\t\t\t\t\t\t\t\tx, y: INTEGER): INTEGER;\r\t\tVAR s, u, w, h, mx, my, cursor: INTEGER;\r\t\t\r\t\tPROCEDURE CheckHandle (x0, y0: INTEGER; c: INTEGER);\r\t\tBEGIN\r\t\t\tIF (x >= x0 - u) & (x <= x0 + s) & (y >= y0 - u) & (y <= y0 + s) THEN\r\t\t\t\tcursor := c\r\t\t\tEND\r\t\tEND CheckHandle;\r\t\t\r\tBEGIN\r\t\tu := f.dot; s := handleSize - 2 * u;\r\t\tIF (x < l - s) OR (x > r + s) OR (y < t - s) OR (y > b + s) THEN\r\t\t\tcursor := Mechanisms.outside\r\t\tELSE\r\t\t\tcursor := Mechanisms.inside\r\t\tEND;\r\t\tw := r - l; h := b - t;\r\t\tIF ~Fixed(f, view) THEN\r\t\t\tCheckHandle(l - s, t - s, HostPorts.resizeLCursor);\r\t\t\tCheckHandle(r, t - s, HostPorts.resizeRCursor);\r\t\t\tCheckHandle(l - s, b, HostPorts.resizeRCursor);\r\t\t\tCheckHandle(r, b, HostPorts.resizeLCursor);\r\t\t\tIF w > 2 * clipMiddleHandle THEN\r\t\t\t\tmx := (l + r - s) DIV 2;\r\t\t\t\tCheckHandle(mx, t - s, HostPorts.resizeVCursor);\r\t\t\t\tCheckHandle(mx, b, HostPorts.resizeVCursor)\r\t\t\tEND;\r\t\t\tIF h > 2 * clipMiddleHandle THEN\r\t\t\t\tmy := (t + b - s) DIV 2;\r\t\t\t\tCheckHandle(l - s, my, HostPorts.resizeHCursor);\r\t\t\t\tCheckHandle(r, my, HostPorts.resizeHCursor)\r\t\t\tEND\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " cursor\r\tEND FocusBorderCursor;\r\r\tPROCEDURE RestoreBorderArea (f: Views.Frame; l, t, r, b: INTEGER);\r\t"
                    attr: 0
                  - text: "(* restore area under destructive border mark *)"
                    attr: 1
                  - text: "\r\t\tVAR g: Views.RootFrame; s, dx, dy: INTEGER;\r\tBEGIN\r\t\tg := Views.RootOf(f);\r\t\tdx := f.gx - g.gx; dy := f.gy - g.gy;\r\t\ts := (handleSize - f.dot) DIV f.unit * f.unit;\r\t\tINC(l, dx); INC(t, dy); INC(r, dx); INC(b, dy);\r(*\r\t\tViews.UpdateRoot(g, l - s, t - s, r + s, b + s, FALSE);\r*)\r\t\tViews.ValidateRoot(g);\r\t\tViews.RestoreRoot(g, l - s, t - s, r + s, b + s);\r(*\r\t\tViews.RestoreRoot(g, l - s, t - s, r + s, t);\r\t\tViews.RestoreRoot(g, l - s, t, l, b);\r\t\tViews.RestoreRoot(g, r, t, r + s, b);\r\t\tViews.RestoreRoot(g, l - s, b, r + s, b + s)\r*)\r\tEND RestoreBorderArea;\r\t\r\tPROCEDURE (hook: Hook) "
                    attr: 0
                  - text: MarkFocusBorder
                    attr: 3
                  - text: "* (\r\t\thost: Views.Frame; focus: Views.View; l, t, r, b: INTEGER; show: BOOLEAN\r\t);\r\tBEGIN\r\t\tIF focus # NIL THEN\r\t\t\tIF show THEN\r\t\t\t\tPaintFocusBorder(host, focus, l, t, r, b)\r\t\t\tELSE\r\t\t\t\tRestoreBorderArea(host, l, t, r, b)\r\t\t\tEND\r\t\tEND\r\tEND MarkFocusBorder;\r\t\r\r\t"
                    attr: 0
                  - text: "(** selection borders **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE PaintSelBorder (f: Views.Frame; view: Views.View; l, t, r, b: INTEGER);\r\t\tVAR u, d, w, h,  mx, my, l0, t0, r0, b0: INTEGER; sizeable: BOOLEAN;\r\t\t\r\t\tPROCEDURE PaintHandle (x, y: INTEGER);\r\t\t\tVAR s: INTEGER; ci, co: Ports.Color;\r\t\tBEGIN\r\t\t\tDEC(x, d); DEC(y, d); s := d * 2 + u;\r\t\t\tIF sizeable THEN ci := HostPorts.selBackground; co := HostPorts.selTextCol\r\t\t\tELSE ci := HostPorts.selTextCol; co := HostPorts.selBackground\r\t\t\tEND;\r\t\t\tf.DrawRect(x, y, x + s, y + s, Ports.fill, co);\r\t\t\tINC(x, u); INC(y, u); DEC(s, 2 * u);\r\t\t\tf.DrawRect(x, y, x + s, y + s, Ports.fill, ci);\r(*\t\t\t\r\t\t\tf.DrawRect(x, y, x + s, y + s, Ports.fill, ci);\r\t\t\tf.DrawRect(x, y, x + s, y + s, 0, co)\r*)\r\t\tEND PaintHandle;\r\t\t\r\tBEGIN\r\t\td := (handleSize - f.dot) DIV f.unit DIV 2;\r\t\tf.rider.GetRect(l0, t0, r0, b0);\r\t\tf.rider.SetRect(l0 - d - 1, t0 - d - 1, r0 + d + 1, b0 + d + 1);\r\t\td := d * f.unit; u := f.dot;\r\t\tw := r - l; h := b - t; sizeable := ~Fixed(f, view);\r\t\tDEC(l, u); DEC(t, u);\r"
                    attr: 0
                  - text: "(*\r\t\tf.SaveRect(l - d, t - d, r + u + d, b + u + d, res);\r*)\r"
                    attr: 3
                  - text: "\t\tf.DrawRect(l, t, r + u, b + u, u, HostPorts.selBackground);\r\t\tIF f.front THEN\r\t\t\tIF (w > clipMiddleHandle) & (h > clipMiddleHandle) THEN\r\t\t\t\tPaintHandle(l, t);\r\t\t\t\tPaintHandle(r, t);\r\t\t\t\tPaintHandle(l, b);\r\t\t\t\tPaintHandle(r, b);\r\t\t\t\tIF w > 2 * clipMiddleHandle THEN\r\t\t\t\t\tmx := (l + r) DIV 2;\r\t\t\t\t\tPaintHandle(mx, t);\r\t\t\t\t\tPaintHandle(mx, b)\r\t\t\t\tEND;\r\t\t\t\tIF h > 2 * clipMiddleHandle THEN\r\t\t\t\t\tmy := (t + b) DIV 2;\r\t\t\t\t\tPaintHandle(l, my);\r\t\t\t\t\tPaintHandle(r, my)\r\t\t\t\tEND\r\t\t\tELSIF sizeable THEN\r\t\t\t\tPaintHandle(r, b)\r\t\t\tEND\r\t\tEND;\r\t\tf.rider.SetRect(l0, t0, r0, b0)\r\tEND PaintSelBorder;\r\r\tPROCEDURE (hook: Hook) "
                    attr: 0
                  - text: SelBorderCursor
                    attr: 3
                  - text: "* (f: Views.Frame; view: Views.View; l, t, r, b: INTEGER;\r\t\t\t\t\t\t\t\t\tx, y: INTEGER): INTEGER;\r\t\tVAR d, u, w, h, mx, my, cursor: INTEGER;\r\t\t\r\t\tPROCEDURE CheckHandle (x0, y0: INTEGER; c: INTEGER);\r\t\tBEGIN\r\t\t\tIF (x >= x0 - d) & (x <= x0 + d) & (y >= y0 - d) & (y <= y0 + d) THEN\r\t\t\t\tcursor := c\r\t\t\tEND\r\t\tEND CheckHandle;\r\t\t\r\tBEGIN\r\t\tIF (x < l) OR (x > r) OR (y < t) OR (y > b) THEN cursor := Mechanisms.outside\r\t\tELSE cursor := Mechanisms.inside\r\t\tEND;\r\t\tIF (view # NIL) & ~Fixed(f, view) THEN\r\t\t\td := (handleSize - f.dot) DIV f.unit DIV 2 * f.unit;\r\t\t\tw := r - l; h := b - t; u := f.dot;\r\t\t\tDEC(l, u); DEC(t, u);\r\t\t\tIF (w > clipMiddleHandle) & (h > clipMiddleHandle) THEN\r\t\t\t\tCheckHandle(l, t, HostPorts.resizeLCursor);\r\t\t\t\tCheckHandle(r, t, HostPorts.resizeRCursor);\r\t\t\t\tCheckHandle(l, b, HostPorts.resizeRCursor);\r\t\t\t\tCheckHandle(r, b, HostPorts.resizeLCursor);\r\t\t\t\tIF w > 2 * clipMiddleHandle THEN\r\t\t\t\t\tmx := (l + r) DIV 2;\r\t\t\t\t\tCheckHandle(mx, t, HostPorts.resizeVCursor);\r\t\t\t\t\tCheckHandle(mx, b, HostPorts.resizeVCursor)\r\t\t\t\tEND;\r\t\t\t\tIF h > 2 * clipMiddleHandle THEN\r\t\t\t\t\tmy := (t + b) DIV 2;\r\t\t\t\t\tCheckHandle(l, my, HostPorts.resizeHCursor);\r\t\t\t\t\tCheckHandle(r, my, HostPorts.resizeHCursor)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tCheckHandle(r, b, HostPorts.resizeLCursor)\r\t\t\tEND\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " cursor\r\tEND SelBorderCursor;\r\r\tPROCEDURE RestoreViewArea (f: Views.Frame; l, t, r, b: INTEGER);\r\t"
                    attr: 0
                  - text: "(* restore area under destructive selection mark *)"
                    attr: 1
                  - text: "\r\t\tVAR g: Views.RootFrame; d, dx, dy: INTEGER;\r\tBEGIN\r(*\r\t\t"
                    attr: 0
                  - text: "d := (handleSize - f.dot) DIV f.unit DIV 2 * f.unit + f.dot;"
