                  - text: "* (f: Views.Frame;\r\t\t\t\t\t\t\t\t\t\tn, this: INTEGER;\r\t\t\t\t\t\t\t\t\t\tstring: ARRAY OF ARRAY OF CHAR;\r\t\t\t\t\t\t\t\t\t\tenabled, checked: ARRAY OF BOOLEAN;\r\t\t\t\t\t\t\t\t\t\tVAR i: INTEGER;\r\t\t\t\t\t\t\t\t\t\tVAR x, y: INTEGER; VAR buttons: SET);\r\t\tVAR res, j: INTEGER; menu, wnd: WinApi.HANDLE; pt: WinApi.POINT;\r\t\t\tt: ARRAY 256 OF CHAR; s: SET;\r\tBEGIN\r\t\tASSERT(0 < n, 20); ASSERT(n <= LEN(string), 21);\r\t\tASSERT(LEN(enabled) = LEN(string), 22);\r\t\tASSERT(LEN(checked) = LEN(string), 23);\r\t\twnd := f.rider(HostPorts.Rider).port.wnd;\r\t\tASSERT(wnd # 0, 100);\r\t\tmenu := WinApi.CreatePopupMenu(); j := 0;\r\t\tWHILE j < n DO\r\t\t\tIF string[j] = \"-\" THEN\r\t\t\t\tres := WinApi.AppendMenuW(menu, WinApi.MF_SEPARATOR, 0, NIL)\r\t\t\tELSE\r\t\t\t\tDialog.MapString(string[j], t);\r\t\t\t\tres := WinApi.AppendMenuW(menu, {}, 32000 + j, t);\r\t\t\t\tIF ~enabled[j] THEN\r\t\t\t\t\tres := WinApi.EnableMenuItem(menu, 32000 + j, WinApi.MF_GRAYED)\r\t\t\t\tELSIF checked[j] THEN\r\t\t\t\t\tres := WinApi.CheckMenuItem(menu, 32000 + j, WinApi.MF_GRAYED)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tINC(j)\r\t\tEND;\r\t\tpt.x := (x + f.gx) DIV f.unit; pt.y := (y + f.gy) DIV f.unit;\r\t\tres := WinApi.ClientToScreen(wnd, pt);\r\t\ts := {1, 2};\t"
