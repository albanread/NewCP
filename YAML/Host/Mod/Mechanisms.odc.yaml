                  - text: "\tIMPORT COM,\r\t\tWinApi, WinOle, OleData, \r\t\tServices, Ports, Stores, Views, Controllers, Properties,\r\t\tDialog, Mechanisms, Containers, Documents, Windows,\r\t\tHostPorts;\r\r\r\tCONST\r\t\thandleSize = Ports.point * 11 DIV 2;\r\t\tclipMiddleHandle = handleSize DIV 2 + 2 * Ports.point;\r\r\t\tescape = -2;\r\t\t\r\t\tfixed = 31;"
                    attr: 0
                  - text: "\t(* controller option *)\r\r"
                    attr: 1
                  - text: "\r\tTYPE\r\t\tIDropSource = POINTER TO RECORD (WinOle.IDropSource)\r\t\t\tkey: SET\r\t\tEND;\r\t\t\r\t\tIDropTarget = POINTER TO RECORD (WinOle.IDropTarget)\r\t\t\twin: Windows.Window;\r\t\t\twnd: WinApi.HWND;\r\t\t\tx, y: INTEGER;\r\t\t\tkey, effect: SET;\r\t\t\tsource: Views.Frame;\r\t\t\tsrcX, srcY: INTEGER;\r\t\t\ttype: Stores.TypeName;\r\t\t\tisSingle: BOOLEAN;\r\t\t\tw, h, rx, ry: INTEGER\r\t\tEND;\r\t\t\r\t\tHook = POINTER TO RECORD (Mechanisms.Hook) END;\r\t\t\r\t\r\tVAR\r\t\tsourceFrame: Views.Frame;\t"
                    attr: 0
                  - text: "(* source of drag & drop *)"
                    attr: 1
                  - text: "\r\t\tsourceX, sourceY: INTEGER;\r\t\ttargetFrame: Views.Frame;\t"
                    attr: 0
                  - text: "(* target of drag & drop *)"
                    attr: 1
