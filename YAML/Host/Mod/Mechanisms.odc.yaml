                  - text: TrackToResize
                    attr: 3
                  - text: "* (host: Views.Frame; view: Views.View;\r\t\t\t\t\t\t\t\t\t\tminW, maxW, minH, maxH: INTEGER;\r\t\t\t\t\t\t\t\t\t\tVAR l, t, r, b: INTEGER; VAR op: INTEGER;\r\t\t\t\t\t\t\t\t\t\tVAR x, y: INTEGER; VAR buttons: SET);\r\t\tVAR isDown: BOOLEAN; m: SET; p: Properties.SizePref;\r\t\t\tx1, y1,  dx, dy,  dl, dt, dr, db,  l0, t0, r0, b0,  l1, t1, r1, b1,  w, h,  dw, dh: INTEGER;\r\tBEGIN\r\t\tl0 := l; t0 := t; r0 := r; b0 := b;  dl := 0; dt := 0; dr := 0; db := 0;\r\t\tx1 := (l + r) DIV 2; y1 := (t + b) DIV 2;\r\t\tIF (r - l <= 2 * clipMiddleHandle) OR (ABS(x - x1) > handleSize DIV 2) THEN\r\t\t\tIF x < x1 THEN dl := 1 ELSE dr := 1 END\r\t\tEND;\r\t\tIF (b - t <= 2 * clipMiddleHandle) OR (ABS(y - y1) > handleSize DIV 2) THEN\r\t\t\tIF y < y1 THEN dt := 1 ELSE db := 1 END\r\t\tEND;\r\t\tIF (Controllers.extend IN buttons) & (dl # dr) THEN dl := 1; dr := 1 END;\r\t\tIF (Controllers.extend IN buttons) & (dt # db) THEN dt := 1; db := 1 END;\r\t\thost.MarkRect(l, t, r, b, 0, Ports.dim50, Ports.show);\r\t\tREPEAT\r\t\t\thost.Input(x1, y1, m, isDown);\r\t\t\tIF x1 < host.l THEN x1 := host.l ELSIF x1 > host.r THEN x1 := host.r END;\r\t\t\tIF y1 < host.t THEN y1 := host.t ELSIF y1 > host.b THEN y1 := host.b END;\r\t\t\tdx := x1 - x; dy := y1 - y;\r\t\t\tl1 := l0 + dl * dx; t1 := t0 + dt * dy; r1 := r0 + dr * dx; b1 := b0 + db * dy;\r\t\t\tw := r1 - l1; h := b1 - t1;\r\t\t\tIF (w > 0) & (h > 0) THEN\r\t\t\t\tp.fixedH := (dl = 0) & (dr = 0); p.fixedW := (dt = 0) & (db = 0);\r\t\t\t\tp.w := w; p.h := h; Views.HandlePropMsg(view, p); w := p.w; h := p.h;\r\t\t\t\tIF w < minW THEN w := minW ELSIF w > maxW THEN w := maxW END;\r\t\t\t\tIF h < minH THEN h := minH ELSIF h > maxH THEN h := maxH END;\r\t\t\t\tdw := w - (r1 - l1); dh := h - (b1 - t1);\r\t\t\t\tDEC(l1, dl * dw); DEC(t1, dt * dh);\r\t\t\t\tIF (dl + dr = 0) & (dw # 0) THEN INC(r1, dw) ELSE INC(r1, dr * dw) END;\r\t\t\t\tIF (dt + db = 0) & (dh # 0) THEN INC(b1, dh) ELSE INC(b1, db * dh) END;\r\t\t\t\tIF (l1 # l) OR (t1 # t) OR (r1 # r) OR (b1 # b) THEN\r\t\t\t\t\thost.MarkRect(l, t, r, b, 0, Ports.dim50, Ports.hide);\r\t\t\t\t\tl := l1; t := t1; r := r1; b := b1;\r\t\t\t\t\thost.MarkRect(l, t, r, b, 0, Ports.dim50, Ports.show)\r\t\t\t\tEND\r\t\t\tEND\r\t\tUNTIL ~isDown;\r\t\thost.MarkRect(l, t, r, b, 0, Ports.dim50, Ports.hide);\r\t\tx := x1; y := y1; buttons := {};\r\t\tIF (l # l0) OR (t # t0) OR (r # r0) OR (b # b0) THEN op := Mechanisms.resize\r\t\tELSE op := Mechanisms.cancelResize\r\t\tEND\r\tEND TrackToResize;\r\r\t\r\t"
