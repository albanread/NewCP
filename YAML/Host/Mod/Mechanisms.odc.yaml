                  - text: "* (wnd: WinApi.HWND);\r\t\tVAR res: COM.RESULT;\r\tBEGIN\r\t\tres := WinOle.RevokeDragDrop(wnd)\r\tEND RemoveDropTarget;\r\t\r\tPROCEDURE PollDrop (d: IDropTarget; show: BOOLEAN);\r\t\tVAR msg: Controllers.PollDropMsg; w, h: INTEGER;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: "(* x, y in port coordinates of w *)"
                    attr: 1
                  - text: "\r\t\td.win.port.GetSize(w, h);\r\t\tmsg.x := d.x * d.win.port.unit;\r\t\tmsg.y := d.y * d.win.port.unit;\r\t\t"
                    attr: 0
                  - text: "(* msg.x, msg.y in coordinates of target root frame *)"
                    attr: 1
                  - text: "\r\t\tmsg.source := d.source; msg.sourceX := d.srcX; msg.sourceY := d.srcY;\r\t\tmsg.mark := Controllers.mark; msg.show := show;\r\t\tmsg.type := d.type; msg.isSingle := d.isSingle;\r\t\tmsg.w := d.w; msg.h := d.h; msg.rx := d.rx; msg.ry := d.ry;\r\t\tmsg.dest := NIL;\r\t\td.win.ForwardCtrlMsg(msg);\r\t\t"
                    attr: 0
                  - text: "(* msg.x, msg.y in coordinates of target frame *)"
                    attr: 1
                  - text: "\r\t\ttargetFrame := msg.dest; targetX := msg.x; targetY := msg.y\r\tEND PollDrop;\r\r\tPROCEDURE Drop (d: IDropTarget; v: Views.View; w, h: INTEGER; isSingle: BOOLEAN);\r\t\tVAR msg: Controllers.DropMsg; pw, ph: INTEGER;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: "(* x, y in port coordinates of w *)"
                    attr: 1
                  - text: "\r\t\td.win.port.GetSize(pw, ph);\r\t\tmsg.x := d.x * d.win.port.unit;\r\t\tmsg.y := d.y * d.win.port.unit;\r\t\t"
                    attr: 0
                  - text: "(* msg.x, msg.y in coordinates of target root frame *)"
                    attr: 1
                  - text: "\r\t\tmsg.source := d.source; msg.sourceX := d.srcX; msg.sourceY := d.srcY;\r\t\tmsg.view := v; msg.isSingle := isSingle;\r\t\tmsg.w := w; msg.h := h; msg.rx := d.rx; msg.ry := d.ry;\r\t\td.win.ForwardCtrlMsg(msg)\r\tEND Drop;\r\r"
                    attr: 0
                  - text: "\t"
                    attr: 1
                  - text: "PROCEDURE AppendMenu (menu: WinApi.HANDLE; id: INTEGER; name: Dialog.String);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tDialog.MapString(name, name);\r\t\tres := WinApi.AppendMenuW(menu, {}, id, name)\r\tEND AppendMenu;"
                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\r\tPROCEDURE ShowPopup (f: Views.Frame; x, y: INTEGER; VAR effect: SET);\r\t\tVAR res: INTEGER; menu, wnd: WinApi.HANDLE; msg: WinApi.MSG; pt: WinApi.POINT;\r\tBEGIN\r\t\tmenu := WinApi.CreatePopupMenu();\r\t\tAppendMenu(menu, 32000, \"#Host:MoveHere\");\r\t\tAppendMenu(menu, 32001, \"#Host:CopyHere\");\r\t\tAppendMenu(menu, 32002, \"#Host:LinkHere\");\r\t\tIF effect * WinOle.DROPEFFECT_MOVE = {} THEN\r\t\t\tres := WinApi.EnableMenuItem(menu, 32000, WinApi.MF_GRAYED)\r\t\tEND;\r\t\tIF effect * WinOle.DROPEFFECT_COPY = {} THEN\r\t\t\tres := WinApi.EnableMenuItem(menu, 32001, WinApi.MF_GRAYED)\r\t\tEND;\r\t\tIF effect * WinOle.DROPEFFECT_LINK = {} THEN\r\t\t\tres := WinApi.EnableMenuItem(menu, 32002, WinApi.MF_GRAYED)\r\t\tEND;\r\t\tres := WinApi.AppendMenuW(menu, WinApi.MF_SEPARATOR, 0, NIL);\r\t\tAppendMenu(menu, 32003, \"#System:Cancel\");\r\t\twnd := f.rider(HostPorts.Rider).port.wnd;\r\t\tpt.x := (x + f.gx) DIV f.unit; pt.y := (y + f.gy) DIV f.unit;\r\t\tres := WinApi.ClientToScreen(wnd, pt);\r\t\tres := WinApi.TrackPopupMenu(menu, {1}, pt.x, pt.y, 0, wnd, NIL);\r\t\tres := WinApi.DestroyMenu(menu);\r\t\teffect := WinOle.DROPEFFECT_NONE;\r\t\tIF WinApi.PeekMessageW(msg, wnd, WinApi.WM_COMMAND, WinApi.WM_COMMAND, 1) # 0 THEN\r\t\t\tIF msg.wParam = 32000 THEN effect := WinOle.DROPEFFECT_MOVE\r\t\t\tELSIF msg.wParam = 32001 THEN effect := WinOle.DROPEFFECT_COPY\r\t\t\tELSIF msg.wParam = 32002 THEN effect := WinOle.DROPEFFECT_LINK\r\t\t\tEND\r\t\tEND\r\tEND ShowPopup;\r\t\r\tPROCEDURE Effect (mask, keyState: SET): SET;\r\t\tVAR effect: SET;\r\tBEGIN\r\t\tIF (mask * WinOle.DROPEFFECT_LINK # {})\r\t\t\t& (((WinApi.MK_SHIFT + WinApi.MK_CONTROL) - keyState = {})\r\t\t\t\tOR (mask * (WinOle.DROPEFFECT_MOVE + WinOle.DROPEFFECT_COPY) = {})) THEN\r\t\t\t\t\teffect := WinOle.DROPEFFECT_LINK\r\t\tELSIF (mask * WinOle.DROPEFFECT_COPY # {})\r\t\t\t& ((keyState * WinApi.MK_CONTROL # {})\r\t\t\t\tOR ((WinApi.MK_LBUTTON + WinApi.MK_RBUTTON) - keyState = {})\r\t\t\t\tOR (mask * WinOle.DROPEFFECT_MOVE = {})) THEN effect := WinOle.DROPEFFECT_COPY\r\t\tELSIF mask * WinOle.DROPEFFECT_MOVE # {} THEN effect := WinOle.DROPEFFECT_MOVE\r\t\tELSE effect := WinOle.DROPEFFECT_NONE\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " effect\r\tEND Effect;\r\t\r\tPROCEDURE (this: IDropTarget) DragEnter (dataObj: WinOle.IDataObject; keyState: SET; pt: WinApi.POINT;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR effect: SET): COM.RESULT;\r\t\tVAR res: INTEGER; s: BOOLEAN;\r\tBEGIN\r\t\tIF sourceFrame # NIL THEN\r\t\t\tthis.source := sourceFrame;\r\t\t\tthis.srcX := sourceX; this.srcY := sourceY;\r\t\t\tServices.GetTypeName(dropView, this.type);\r\t\t\tthis.isSingle := isSingleton;\r\t\t\tthis.w := dropW; this.h := dropH;\r\t\t\tthis.rx := relX; this.ry := relY\r\t\tELSE\r\t\t\tOleData.GetDataType(dataObj, this.type, this.w, this.h, this.rx, this.ry, this.isSingle);\r\t\t\tthis.source := NIL\r\t\tEND;\r\t\tIF (this.type # \"\") & (this.win # NIL) THEN\r\t\t\tres := WinApi.ScreenToClient(this.wnd, pt);\r\t\t\tthis.x := pt.x; this.y := pt.y; this.key := keyState;\r\t\t\tPollDrop(this, Controllers.show)\r\t\tEND;\r\t\tIF (this.type # \"\") & (this.win = NIL) OR (targetFrame # NIL) THEN\r\t\t\teffect := Effect(effect, keyState)\r\t\tELSE effect := WinOle.DROPEFFECT_NONE\r\t\tEND;\r\t\t this.effect := effect;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_OK\r\tEND DragEnter;\r\t\r\tPROCEDURE (this: IDropTarget) DragOver (keyState: SET; pt: WinApi.POINT; VAR effect: SET): COM.RESULT;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF (this.type # \"\") & (this.win # NIL) THEN\r\t\t\tres := WinApi.ScreenToClient(this.wnd, pt);\r\t\t\tIF (pt.x # this.x) OR (pt.y # this.y) THEN\r\t\t\t\tPollDrop(this, Controllers.hide);\r\t\t\t\tthis.x := pt.x; this.y := pt.y;\r\t\t\t\tPollDrop(this, Controllers.show)\r\t\t\tEND\r\t\tEND;\r\t\tIF (this.type # \"\") & (this.win = NIL) OR (targetFrame # NIL) THEN\r\t\t\teffect := Effect(effect, keyState)\r\t\tELSE effect := WinOle.DROPEFFECT_NONE\r\t\tEND;\r\t\tthis.effect := effect;\r\t\t"
                    attr: 0
