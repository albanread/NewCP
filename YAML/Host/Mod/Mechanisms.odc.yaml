                  - text: " WinApi.S_OK\r\tEND DragLeave;\r\t\r\tPROCEDURE (this: IDropTarget) Drop (dataObj: WinOle.IDataObject; keyState: SET; pt: WinApi.POINT;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR effect: SET): COM.RESULT;\r\t\tVAR res, w, h: INTEGER; v: Views.View; s: BOOLEAN;\r\t\t\tc: Containers.Controller; m: Containers.Model; p: Properties.BoundsPref;\r\tBEGIN\r\t\tIF this.effect # WinOle.DROPEFFECT_NONE THEN\r\t\t\tIF this.win # NIL THEN\r\t\t\t\tres := WinApi.ScreenToClient(this.wnd, pt);\r\t\t\t\tPollDrop(this, Controllers.hide);\r\t\t\t\tIF targetFrame # NIL THEN\r\t\t\t\t\tWindows.dir.Select(this.win, Windows.eager);\r\t\t\t\t\tIF WinApi.MK_LBUTTON * this.key = {} THEN\t"
                    attr: 0
                  - text: "(* nonstandard drag *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\tShowPopup(targetFrame, targetX, targetY, effect)\r\t\t\t\t\tELSE effect := this.effect\r\t\t\t\t\tEND;\r\t\t\t\t\tIF (effect # WinOle.DROPEFFECT_NONE) & (sourceFrame = NIL) THEN\r\t\t\t\t\t\t"
                    attr: 0
                  - text: "IF Services.Is(targetFrame.view, \"TextViews.View\") THEN"
                    attr: 3
                  - text: "\r"
                    attr: 0
                  - text: "\t\t\t\t\t\t\tOleData.GetTextDataView(dataObj, v, w, h, s)\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t"
                    attr: 3
                  - text: "\tOleData.GetDataView(dataObj, \"\", v, w, h, s)\r\t\t\t\t\t\t"
                    attr: 0
                  - text: END
                    attr: 3
                  - text: ";\r\t\t\t\t\t\tIF v # NIL THEN Drop(this, v, w, h, s)\r\t\t\t\t\t\tELSE effect := WinOle.DROPEFFECT_NONE\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tELSE effect := WinOle.DROPEFFECT_NONE\r\t\t\t\tEND\r\t\t\tELSE\t"
                    attr: 0
                  - text: "(* drop to new window *)"
                    attr: 1
                  - text: "\r\t\t\t\teffect := this.effect;\r\t\t\t\tIF sourceFrame # NIL THEN\r\t\t\t\t\tw := dropW; h := dropH;\r\t\t\t\t\tIF isSingleton THEN\r\t\t\t\t\t\tv := Views.CopyOf(dropView, Views.deep)\r\t\t\t\t\tELSE\r\t\t\t\t\t\tc := dropView(Containers.View).ThisController();\r\t\t\t\t\t\tm := c.SelectionCopy();\r\t\t\t\t\t\tv := Views.CopyWithNewModel(dropView, m);\r\t\t\t\t\t\t"
                    attr: 0
                  - text: "p.w := w; p.h := h; Views.HandlePropMsg(v, p); w := p.w; h := p.h"
                    attr: 3
                  - text: "\r\t\t\t\t\tEND\r\t\t\t\tELSE OleData.GetDataView(dataObj, \"\", v, w, h, s)\r\t\t\t\tEND;\r\t\t\t\tIF v # NIL THEN Views.OpenView(Documents.dir.New(v, w, h));\r\t\t\t\tViews.BeginModification(Views.notUndoable, v);\r\t\t\t\tViews.EndModification(Views.notUndoable, v)\r\t\t\t\tELSE effect := WinOle.DROPEFFECT_NONE\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE effect := WinOle.DROPEFFECT_NONE\r\t\tEND;\r\t\t"
