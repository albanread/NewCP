                    attr: 0
                  - text: "\t\t"
                    attr: 1
                  - text: "fn: WinDlg.OPENFILENAMEW;\r\t\tftype: ARRAY 16 OF CHAR;\r\t\tfilter: ARRAY 2048 OF CHAR;\r\t\tfname: ARRAY 260 OF CHAR;\r\t\tprt: WinDlg.PRINTDLGW;\r\t\tfont: WinDlg.CHOOSEFONTW;\r\t\tlogFont: WinApi.LOGFONTW;\r\t\tcol: WinDlg.CHOOSECOLORW;\r\t\tcustomColors: ARRAY 16 OF Ports.Color;\r\t\tprefFName, prefDName: Fonts.Typeface;\r\t\tprefFSize, prefDSize, prefDWght: INTEGER;\r\t\tprefDStyle: SET;\r\t\ttypeList: ARRAY 64 OF Converters.Converter;\r\t\tdefConv: Converters.Converter;\r\t\tall: Converters.Converter;\r\r\t\tdialogHook: DialogHook;\r"
                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\r\tPROCEDURE Append (VAR s: ARRAY OF CHAR; VAR idx: INTEGER; IN t: ARRAY OF CHAR);\r\t\tVAR len, i: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ti := 0; ch := t[0]; len := LEN(s) - 1;\r\t\tWHILE (idx < len) & (ch # 0X) DO s[idx] := ch; INC(idx); INC(i); ch := t[i] END;\r\t\ts[idx] := 0X\r\tEND Append;\r\r\tPROCEDURE SAppend (VAR s: ARRAY OF CHAR; VAR idx: INTEGER; IN t: ARRAY OF CHAR);\r\t\tVAR len, i: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ti := 0; ch := t[0]; len := LEN(s) - 1;\r\t\tWHILE (idx < len) & (ch # 0X) DO s[idx] := ch; INC(idx); INC(i); ch := t[i] END;\r\t\ts[idx] := 0X\r\tEND SAppend;\r\r\tPROCEDURE MapConv (cmd: ARRAY OF CHAR; VAR name: ARRAY OF CHAR);\r\t\tVAR i: INTEGER; sub, str: Dialog.String;\r\tBEGIN\r\t\tstr := cmd$; i := 0;\r\t\tWHILE str[i] >= \"0\" DO INC(i) END;\r\t\tstr[i] := 0X;\r\t\tKernel.SplitName(str, sub, str);\r\t\tIF sub = \"\" THEN sub := \"System\" END;\r\t\tstr := \"#\"; i := 1;\r\t\tAppend(str, i, sub);\r\t\tAppend(str, i, \":\");\r\t\tAppend(str, i, cmd);\r\t\tDialog.MapString(str, name)\r\tEND MapConv;\r\r\tPROCEDURE WaitDialogClose;\r\t"
                    attr: 0
                  - text: "(* simulates modal dialog *)\r"
                    attr: 1
                  - text: "\t\tVAR res: INTEGER; w: HostWindows.Window; msg: WinApi.MSG;\r\tBEGIN\r\t\tw := HostWindows.dir.First();\r\t\tREPEAT\r\t\t\tIF WinApi.PeekMessageW(msg, 0, 0, 0, 1) # 0 THEN\r\t\t\t\tIF (msg.hwnd = w.wnd) OR (msg.message = WinApi.WM_PAINT) THEN\r\t\t\t\t\tres := WinApi.TranslateMessage(msg);\r\t\t\t\t\tres := WinApi.DispatchMessageW(msg)\r\t\t\t\tEND\r\t\t\tEND\r\t\tUNTIL w.wnd = 0\r\tEND WaitDialogClose;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ShowParamStatus
                    attr: 3
                  - text: "* (IN str, p0, p1, p2: ARRAY OF CHAR);\r\t\tVAR res: INTEGER; st: ARRAY 513 OF CHAR; w: Windows.Window;\r\tBEGIN\r\t\tDialog.MapParamString(str, p0, p1, p2, st);\r\t\tw := Windows.dir.Focus(Controllers.targetPath);\r\t\tIF (w # NIL) & (HostWindows.inPlace IN w.flags) & (ShowOleStatus # NIL) THEN\r\t\t\tShowOleStatus(w, \" \" + st)\r\t\tELSE\r\t\t\tst := \" \" + st;\r\t\t\tres := WinApi.SetWindowTextW(HostWindows.status, st);\r\t\t\tres := WinApi.UpdateWindow(HostWindows.status)\r\t\tEND\r\tEND ShowParamStatus;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ShowParamMsg
                    attr: 3
                  - text: "* (IN str, p0, p1, p2: ARRAY OF CHAR);\r\t\tVAR res: INTEGER; st: ARRAY 512 OF CHAR;\r\tBEGIN\r\t\tASSERT(str # \"\", 20);\r(*\r\t\tIF Dialog.showsStatus THEN\r\t\t\tShowParamStatus(str, p0, p1, p2)\r\t\tELSE\r*)\r\t\t\tDialog.MapParamString(str, p0, p1, p2, st);\r\t\t\tres := WinApi.MessageBoxW(HostWindows.ActualWnd(), st, Dialog.appName, {4, 5})\r(*\r\t\tEND\r*)\r\tEND ShowParamMsg;\r\r\tPROCEDURE (h: ShowHook) ShowParamMsg (IN str, p0, p1, p2: ARRAY OF CHAR);\r\tBEGIN\r\t\tShowParamMsg(str, p0, p1, p2)\r\tEND ShowParamMsg;\r\r\tPROCEDURE (h: ShowHook) ShowParamStatus (IN str, p0, p1, p2: ARRAY OF CHAR);\r\tBEGIN\r\t\tShowParamStatus(str, p0, p1, p2)\r\tEND ShowParamStatus;\r\r"
                    attr: 0
                  - text: "\t(** general OK dialog **)\r"
                    attr: 1
                  - text: "\r\tPROCEDURE (hook: DialogHook) GetOK (IN str, p0, p1, p2: ARRAY OF CHAR; form: SET; OUT res: INTEGER);\r\t\tVAR r: INTEGER; st: ARRAY 512 OF CHAR; type: SET;\r\tBEGIN\r\t\tASSERT(str # \"\", 20);\r\t\tDialog.MapParamString(str, p0, p1, p2, st);\r\t\tIF Dialog.yes IN form THEN\r\t\t\tIF Dialog.cancel IN form THEN type := WinApi.MB_YESNOCANCEL + WinApi.MB_ICONQUESTION\r\t\t\tELSE type := WinApi.MB_YESNO + WinApi.MB_ICONQUESTION\r\t\t\tEND\r\t\tELSE\r\t\t\tIF Dialog.cancel IN form THEN type := WinApi.MB_OKCANCEL + WinApi.MB_ICONWARNING\r\t\t\tELSE type := WinApi.MB_OK + WinApi.MB_ICONWARNING\r\t\t\tEND\r\t\tEND;\r\t\tr := WinApi.MessageBoxW(HostWindows.ActualWnd(), st, Dialog.appName, type);\r\t\tIF r = WinApi.IDOK THEN res := Dialog.ok\r\t\tELSIF r = WinApi.IDCANCEL THEN res := Dialog.cancel\r\t\tELSIF r = WinApi.IDYES THEN res := Dialog.yes\r\t\tELSIF r = WinApi.IDNO THEN res := Dialog.no\r\t\tELSE res := 0\r\t\tEND\r\tEND GetOK;\r\r\r\t"
                    attr: 0
                  - text: "(** time **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (hook: DatesHook) GetTime (OUT d: Dates.Date; OUT t: Dates.Time);\r\t\tVAR dt: WinApi.SYSTEMTIME;\r\tBEGIN\r\t\tWinApi.GetLocalTime(dt);\r\t\td.year := dt.wYear; d.month := dt.wMonth; d.day := dt.wDay;\r\t\tt.hour := dt.wHour; t.minute := dt.wMinute; t.second := dt.wSecond\r\tEND GetTime;\r\r\tPROCEDURE (hook: DatesHook) GetUTCTime (OUT d: Dates.Date; OUT t: Dates.Time);\r\t\tVAR dt: WinApi.SYSTEMTIME;\r\tBEGIN\r\t\tWinApi.GetSystemTime(dt);\r\t\td.year := dt.wYear; d.month := dt.wMonth; d.day := dt.wDay;\r\t\tt.hour := dt.wHour; t.minute := dt.wMinute; t.second := dt.wSecond\r\tEND GetUTCTime;\r\r\tPROCEDURE (hook: DatesHook) GetUTCBias (OUT bias: INTEGER);\r\t\tVAR res: INTEGER; info: WinApi.TIME_ZONE_INFORMATION;\r\tBEGIN\r\t\tbias := 0;\r\t\tres := WinApi.GetTimeZoneInformation(info);\r\t\tIF res # -1 THEN\r\t\t\tIF BITS(res) = WinApi.TIME_ZONE_ID_DAYLIGHT THEN bias := info.Bias + info.DaylightBias\r\t\t\tELSE bias := info.Bias + info.StandardBias\r\t\t\tEND\r\t\tEND\r\tEND GetUTCBias;\r\r\r\t"
                    attr: 0
                  - text: "(** import type dialog **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: ImpOk
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\timpType.done := TRUE;\r\t\tStdCmds.CloseDialog\r\tEND ImpOk;\r\r\r"
                    attr: 0
                  - text: "\t(** file dialogs **)\r"
                    attr: 1
                  - text: "\r\tPROCEDURE (hook: DialogHook) GetIntSpec (\r\t\tIN defType: Files.Type; VAR loc: Files.Locator; OUT name: Files.Name\r\t);\r\t"
                    attr: 0
                  - text: "(* asks user for a file name (for file internalization) *)"
                    attr: 1
                  - text: "\r\t\tVAR res, i, j: INTEGER; lfn: ARRAY 260 OF CHAR;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: "(* set filter *)"
                    attr: 1
                  - text: "\r\t\tftype := defType$; i := 0;\r\t\tIF ftype = \"\" THEN ftype := \"odc\" END;\r\t\tIF ftype # \"*\" THEN\r\t\t\tSAppend(filter, i, \"*.\"); SAppend(filter, i, ftype); INC(i);\r\t\t\tSAppend(filter, i, \"*.\"); SAppend(filter, i, ftype); INC(i)\r\t\tELSE ftype := \"\"\r\t\tEND;\r\t\tSAppend(filter, i, \"*.*\"); INC(i);\r\t\tSAppend(filter, i, \"*.*\"); INC(i);\r\t\tfilter[i] := 0X;\r\t\t"
                    attr: 0
                  - text: "(* open dialog *)\r\t\t"
                    attr: 1
                  - text: "fn.nFilterIndex := 1;\r\t\tfname := \"\";\r\t\tIF loc # NIL THEN\t"
                    attr: 0
                  - text: "(* set old dir *)"
                    attr: 1
                  - text: "\r\t\t\tactualPath := loc(HostFiles.Locator).path$; i := 0\r(*\r\t\t\tWHILE actualPath[i] # 0X DO INC(i) END;\r\t\t\tactualPath[i] := \"\\\"; actualPath[i+1] := 0X\r*)\r\t\tEND;"
                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\t\tfn.Flags := {2, 3, 11, 12, 19};\t"
                    attr: 0
                  - text: "(* hideReadOnly, noChangeDir, pathMustExist, fileMustExist, new look *)"
                    attr: 1
                  - text: "\r\t\tfn.hwndOwner := HostWindows.ActualWnd();\r\t\tIF WinDlg.GetOpenFileNameW(fn) # 0 THEN\r\t\t\ti := 0; j := fn.nFileOffset;\r\t\t\tWHILE fname[j] # 0X DO name[i] := fname[j]; INC(i); INC(j) END;\r\t\t\tname[i] := 0X; fname[fn.nFileOffset - 1] := 0X;\r\t\t\tactualPath := fname$; lfn := fname$;\r\t\t\tloc := HostFiles.NewLocator(lfn)\r\t\tELSE\r\t\t\tloc := NIL;\r\t\t\tres := WinDlg.CommDlgExtendedError();\r\t\t\tASSERT(res = 0, 100)\r\t\tEND;\r\t\tres := WinApi.SetCursor(HostPorts.cursors[HostPorts.busyCursor])\r\tEND GetIntSpec;\r\r\tPROCEDURE "
                    attr: 0
                  - text: GetIntSpec
                    attr: 3
                  - text: "* (VAR loc: Files.Locator; VAR name: Files.Name; VAR conv: Converters.Converter);\r\t"
                    attr: 0
                  - text: "(* asks user for a file name (for file internalization) *)"
                    attr: 1
                  - text: "\r\t\tVAR res, i, j, n: INTEGER; t: Dialog.String; c: Converters.Converter; lfn: ARRAY 260 OF CHAR;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: "(* set filter *)"
                    attr: 1
                  - text: "\r\t\tftype := \"odc\";\r\t\tIF loc # NIL THEN\r\t\t\tdefConv := conv;\r\t\t\tIF conv # NIL THEN ftype := conv.fileType$ END\r\t\tEND;\r\t\ttypeList[0] := Converters.list;\t"
                    attr: 0
                  - text: "(* document converter *)"
                    attr: 1
                  - text: "\r\t\tDialog.MapString(\"#Host:Document\", t);\r\t\ti := 0; SAppend(filter, i, t); SAppend(filter, i, \" (*.odc)\"); INC(i);\r\t\tSAppend(filter, i, \"*.odc\"); INC(i); n := 1;\r"
                    attr: 0
                  - text: "\t\t"
                    attr: 1
                  - text: "fn.nFilterIndex := 1;\r\t\tc := Converters.list;\r\t\tWHILE c # NIL DO\r\t\t\tIF (c.imp # \"\") & (c.fileType # \"odc\") THEN\r\t\t\t\ttypeList[n] := c;\r\t\t\t\tMapConv(c.imp, t); SAppend(filter, i, t);\r\t\t\t\tSAppend(filter, i, \" (*.\"); SAppend(filter, i, c.fileType);\r\t\t\t\tSAppend(filter, i, \")\"); INC(i);\r\t\t\t\tSAppend(filter, i, \"*.\"); SAppend(filter, i, c.fileType); INC(i);\r\t\t\t\tIF defConv = c THEN fn.nFilterIndex := n + 1 END;\r\t\t\t\tINC(n)\r\t\t\tEND;\r\t\t\tc := c.next\r\t\tEND;\r\t\tDialog.MapString(\"#Host:AllFiles\", t);\r\t\tSAppend(filter, i, t); SAppend(filter, i, \" (*.*)\"); INC(i);\r\t\tSAppend(filter, i, \"*.*\"); INC(i);\r\t\tfilter[i] := 0X;\r\t\tIF defConv = all THEN fn.nFilterIndex := n + 1 END;\r\t\t"
                    attr: 0
                  - text: "(* open dialog *)\r"
                    attr: 1
                  - text: "\t\tIF loc # NIL THEN fname := name$\r\t\tELSE fname := \"\"\r\t\tEND;\r\t\tIF loc # NIL THEN\t"
                    attr: 0
                  - text: "(* set old dir *)"
                    attr: 1
                  - text: "\r\t\t\tactualPath := loc(HostFiles.Locator).path$; i := 0;\r\t\t\tWHILE actualPath[i] # 0X DO INC(i) END;\r\t\t\tactualPath[i] := \"\\\"; actualPath[i+1] := 0X\r\t\tEND;"
                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\t\tfn.Flags := {2, 3, 11, 12, 19};\t"
                    attr: 0
                  - text: "(* hideReadOnly, noChangeDir, pathMustExist, fileMustExist, new look *)"
                    attr: 1
                  - text: "\r\t\tfn.hwndOwner := HostWindows.ActualWnd();\r\t\tIF WinDlg.GetOpenFileNameW(fn) # 0 THEN\r\t\t\ti := 0; j := fn.nFileOffset;\r\t\t\tWHILE fname[j] # 0X DO name[i] := fname[j]; INC(i); INC(j) END;\r\t\t\tname[i] := 0X; fname[fn.nFileOffset - 1] := 0X;\r\t\t\tactualPath := fname$; lfn := fname$;\r\t\t\tloc := HostFiles.NewLocator(lfn);\r\t\t\tIF fn.nFilterIndex <= n THEN\r\t\t\t\tconv := typeList[fn.nFilterIndex - 1];\r\t\t\t\tdefConv := conv\r\t\t\tELSE\t"
                    attr: 0
                  - text: "(* ask for desired file type *)\r"
