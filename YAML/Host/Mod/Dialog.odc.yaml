                  - text: "\r\t\tprt.nCopies := 1;\r\t\tprt.hwndOwner := HostWindows.ActualWnd();\r\t\tprt.nFromPage := 1; prt.nToPage := 1;\r\t\tres := WinDlg.PrintDlgW(prt);\r\t\tIF (res = 0) & (WinDlg.CommDlgExtendedError() = 4106) THEN\r\t\t\tprt.hDevMode := 0;\r\t\t\tres := WinDlg.PrintDlgW(prt)\r\t\tEND;\r\t\tIF (res = 0) & (WinDlg.CommDlgExtendedError() = 4108) THEN\r\t\t\tprt.hDevMode := 0; prt.hDevNames := 0;\r\t\t\tres := WinDlg.PrintDlgW(prt)\r\t\tEND;\r\t\tHostPrinters.SetCurrent(prt.hDevNames, prt.hDevMode);\r\t\tIF res # 0 THEN\r\t\t\tIF 0 IN prt.Flags THEN selection := TRUE; from := 0; to := 0\t"
