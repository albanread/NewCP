                  - text: "* (w: Windows.Window; quit: BOOLEAN; VAR res: INTEGER);\r\t\tVAR r: INTEGER; title: Views.Title; text: ARRAY 256 OF CHAR;\r\tBEGIN\r\t\tw.GetTitle(title);\r\t\tDialog.MapParamString(dirtyString, title, 0DX, 0DX, text);\r\t\tr := WinApi.MessageBoxW(w(HostWindows.Window).wnd, text, Dialog.appName, {0, 1, 5});\r\t\tIF r = 6 THEN res := save\r\t\tELSIF r = 2 THEN res := cancel\r\t\tELSE res := 0\r\t\tEND;\r\t\tr := WinApi.SetCursor(HostPorts.cursors[HostPorts.busyCursor])\r\tEND CloseDialog;\r\r\tPROCEDURE (hook: DialogHook) GetColor (in: Ports.Color; OUT out: Ports.Color; OUT set: BOOLEAN);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tcol.rgbResult := in;\r\t\tIF col.rgbResult = Ports.defaultColor THEN col.rgbResult := HostPorts.textCol END;\r\t\tcol.hwndOwner := HostWindows.ActualWnd();\r\t\tset := WinDlg.ChooseColorW(col) # 0;\r\t\tout := col.rgbResult;\r\t\tIF ~set THEN\r\t\t\tres := WinDlg.CommDlgExtendedError();\r\t\t\tASSERT(res = 0, 100)\r\t\tEND;\r\t\tres := WinApi.SetCursor(HostPorts.cursors[HostPorts.busyCursor])\r\tEND GetColor;"
