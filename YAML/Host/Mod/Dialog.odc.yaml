                  - text: "\r\r\tPROCEDURE (v: Preview) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tCONST scale = 16; rmm = Ports.mm DIV scale; size = 460 * rmm;\r\t\tVAR u, w, h, x, y, uu: INTEGER;\r\tBEGIN\r\t\tu := f.unit;\r\t\tIF Dialog.metricSystem THEN uu := 10 * rmm ELSE uu := Ports.inch DIV scale END;\r\t\tw := setup.w DIV scale;\r\t\th := setup.h DIV scale;\r\t\tx := (size - w) DIV 2;\r\t\ty := (size - h) DIV 2;\r\t\tl := SHORT(ENTIER(setup.left * uu));\r\t\tt := SHORT(ENTIER(setup.top * uu));\r\t\tr := SHORT(ENTIER(setup.right * uu));\r\t\tb := SHORT(ENTIER(setup.bottom * uu));\r\t\tf.DrawRect(x, y, x + w, y + h, Ports.fill, Ports.background);\r\t\tf.DrawRect(x - u, y - u, x + w + u, y + h + u, 0, Ports.defaultColor);\r\t\tIF setup.decorate THEN\r\t\t\tIF t < 14 * rmm THEN t := 14 * rmm END;\r\t\t\tf.DrawRect(x + l, y + 10 * rmm, x + l + 20 * rmm, y + 10 * rmm + u, Ports.fill, Ports.defaultColor);\r\t\t\tf.DrawRect(x + w - r - 8 * rmm, y + 10 * rmm, x + w - r, y + 10 * rmm + u, Ports.fill, Ports.defaultColor)\r\t\tEND;\r\t\tIF (w - r > l) & (h - b > t) THEN\r\t\t\tf.DrawRect(x + l, y + t, x + w - r, y + h - b, 0, Ports.defaultColor)\r\t\tEND\r\tEND Restore;\r\r\tPROCEDURE (v: Preview) HandleViewMsg (f: Views.Frame; VAR msg: Views.Message);\r\tBEGIN\r\t\tWITH msg: UpdateMsg DO\r\t\t\tViews.Update(v, Views.keepFrames)\r\t\tELSE\r\t\tEND\r\tEND HandleViewMsg;\r\r\tPROCEDURE "
