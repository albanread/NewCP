                  - text: "\t\tprt.hwndOwner := HostWindows.ActualWnd();\r\t\tres := WinDlg.PrintDlgW(prt);\r\t\tIF (res = 0) & (WinDlg.CommDlgExtendedError() = 4108) THEN\r\t\t\tprt.hDevMode := 0; prt.hDevNames := 0;\r\t\t\tres := WinDlg.PrintDlgW(prt)\r\t\tEND;\r\t\tHostPrinters.SetCurrent(prt.hDevNames, prt.hDevMode);\r\t\tpt := Printers.dir.Current();\r\t\tIF pt # NIL THEN\r\t\t\tHostPrinters.GetPage(pt, setup.w, setup.h);\r\t\t\tsetup.landscape := setup.w > setup.h\r\t\tEND;\r\t\tSetupNotify(Dialog.changed, 0, 0)\r\tEND PrintSetup;\r\r\r\tPROCEDURE "
