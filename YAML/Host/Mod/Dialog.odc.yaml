                  - text: "\r\t\tc := Converters.list; fn.nFilterIndex := 1;\r\t\tDialog.MapString(\"#Host:Document\", t);\r\t\ti := 0; SAppend(filter, i, t); SAppend(filter, i, \" (*.odc)\"); INC(i);\r\t\tSAppend(filter, i, \"*.odc\"); INC(i); n := 1;\r\t\tWHILE c # NIL DO\r\t\t\tIF (c.exp # \"\") & ((c.storeType = \"\") OR Services.Is(s, c.storeType)) & (c.fileType # \"odc\") THEN\r\t\t\t\ttypeList[n] := c;\r\t\t\t\tMapConv(c.exp, t); SAppend(filter, i, t);\r\t\t\t\tSAppend(filter, i, \" (*.\"); SAppend(filter, i, c.fileType);\r\t\t\t\tSAppend(filter, i, \")\"); INC(i);\r\t\t\t\tSAppend(filter, i, \"*.\"); SAppend(filter, i, c.fileType); INC(i);\r\t\t\t\tIF c = conv THEN fn.nFilterIndex := n + 1 END;\r\t\t\t\tINC(n)\r\t\t\tEND;\r\t\t\tc := c.next\r\t\tEND;\r\t\tfilter[i] := 0X;\r\t\t"
