                  - text: "*;\r\t\tVAR win: Windows.Window; w, h, pw, ph, l, t, r, b, uu: INTEGER; p: Printers.Printer;\r\tBEGIN\r\t\twin := Windows.dir.Focus(Controllers.targetPath);\r\t\tIF win # NIL THEN\r\t\t\tIF Dialog.metricSystem THEN uu := Ports.mm DIV 10 ELSE uu := Ports.inch DIV 100 END;\r\t\t\twin.doc.PollPage(w, h, l, t, r, b, setup.decorate);\r\t\t\tp := Printers.dir.Current();\r\t\t\tIF p # NIL THEN HostPrinters.GetPage(p, pw, ph);\r\t\t\t\tIF (pw > ph) = (w > h) THEN w := pw; h := ph ELSE w := ph; h := pw END\r\t\t\tEND;"
