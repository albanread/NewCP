                  - text: "* (OUT x, y: INTEGER; OUT modifiers: SET; OUT isDown: BOOLEAN);\r\t\tVAR msg: WinApi.MSG; wnd, mw: WinApi.HANDLE; pt: WinApi.POINT; res: INTEGER; set: SET;\r\tBEGIN\r\t\tWinApi.Sleep(1);\r\t\twnd := rd.port.wnd; mw := WinApi.GetCapture();\r\t\tres := WinApi.UpdateWindow(wnd);\r\t\tIF WinApi.PeekMessageW(msg, mw, WinApi.WM_MOUSEMOVE,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWinApi.WM_MBUTTONDBLCLK, 1) # 0 THEN\r\t\t\tmx := (msg.lParam + 32768) MOD 65536 - 32768; my := msg.lParam DIV 65536;\r\t\t\tIF (mw # 0) & (wnd # mw) THEN\r\t\t\t\tpt.x := mx; pt.y := my; res := WinApi.ClientToScreen(mw, pt);\r\t\t\t\tres := WinApi.ScreenToClient(wnd, pt); mx := pt.x; my := pt.y\r\t\t\tEND;\r\t\t\tmb := {};\r\t\t\tset := SYSTEM.VAL(SET, msg.wParam);\r\t\t\tIF WinApi.MK_LBUTTON * set # {} THEN INCL(mb, left) END;\r\t\t\tIF WinApi.MK_MBUTTON * set # {} THEN INCL(mb, middle) END;\r\t\t\tIF WinApi.MK_RBUTTON * set # {} THEN INCL(mb, right) END;\r\t\t\tIF WinApi.MK_CONTROL * set # {} THEN INCL(mb, ctrl) END;\r\t\t\tIF WinApi.MK_SHIFT * set # {} THEN INCL(mb, shift) END;\r\t\t\tIF WinApi.GetAsyncKeyState(12H) < 0 THEN INCL(mb, alt) END;\r\t\tEND;\r\t\tIF WinApi.GetSystemMetrics(WinApi.SM_SWAPBUTTON) # 0 THEN\r\t\t\tIF WinApi.GetAsyncKeyState(1) >= 0 THEN EXCL(mb, right) END;\r\t\t\tIF WinApi.GetAsyncKeyState(2) >= 0 THEN EXCL(mb, left) END\r\t\tELSE\r\t\t\tIF WinApi.GetAsyncKeyState(1) >= 0 THEN EXCL(mb, left) END;\r\t\t\tIF WinApi.GetAsyncKeyState(2) >= 0 THEN EXCL(mb, right) END\r\t\tEND;\r\t\tIF WinApi.GetAsyncKeyState(4) >= 0 THEN EXCL(mb, middle) END;\r\t\tIF WinApi.GetAsyncKeyState(WinApi.VK_SHIFT) < 0 THEN\r\t\t\tmb := mb + {shift, extend} ELSE  mb := mb - {shift, extend}\r\t\tEND;\r\t\tIF WinApi.GetAsyncKeyState(WinApi.VK_CONTROL) < 0 THEN\r\t\t\tmb := mb + {ctrl, modify} ELSE  mb := mb - {ctrl, modify}\r\t\tEND;\r\t\tIF WinApi.GetAsyncKeyState(WinApi.VK_MENU) < 0 THEN INCL(mb, alt) ELSE EXCL(mb, alt) END;\r\t\tx := mx; y := my; modifiers := mb; isDown := mb * {