                  - text: "\r\t\t\t"
                    attr: 1
                  - text: "f.i.readOnly := f.readOnly; f.i.undef := f.undef;\r\t\t\tf.val := 0;\r\t\t\tOpen(f, \"EDIT\", \"0\", style, WinApi.WS_EX_CLIENTEDGE, f.i);\r\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.EM_LIMITTEXT, 16, 0);\r\t\t\tf.Update;\r\t\t\tIF f.front & ~f.disabled THEN\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_SETFOCUS, 0, 0);\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_KEYDOWN, 23H, 0)\r\t\t\tEND\r\t\tELSE f.Update\r\t\tEND;\r\t\tIF f.i.wnd # 0 THEN\r\t\t\tPaint(f, f.i)\r\t\tELSE\r\t\t\tf.Get(f, w);\r\t\t\tStrings.IntToString(w, s);\r\t\t\tPrint(f, f.dot, 2 * Ports.point, 0, s)\r\t\tEND\r\tEND Restore;\r\r\tPROCEDURE (f: UpDownField) MouseDown (x, y: INTEGER; buttons: SET);\r\tBEGIN\r\t\tASSERT(~f.disabled, 100);\r\t\tIF f.rider # NIL THEN\r\t\t\tHandleMouse(f.i.wnd, x DIV f.unit, y DIV f.unit, buttons)\r\t\tEND\r\tEND MouseDown;\r\r\tPROCEDURE (f: UpDownField) KeyDown (ch: CHAR);\r\t\tVAR val: INTEGER;\r\tBEGIN\r\t\tASSERT(~f.disabled, 100);\r\t\tIF (ch = AU) OR (ch = AD) THEN\r\t\t\tval := f.val;\r\t\t\tIF ch = AU THEN\r\t\t\t\tIF val <= f.max - f.inc THEN val := val + f.inc ELSE val := f.max END\r\t\t\tELSE\r\t\t\t\tIF val >= f.min + f.inc THEN val := val - f.inc ELSE val := f.min END\r\t\t\tEND;\r\t\t\tIF val # f.val THEN f.Set(f, val); f.Update END\r\t\tELSIF (ch # 0DX) THEN\r\t\t\tSendKey(ch, f.i.ctrl)\r\t\tEND\r\tEND KeyDown;\r\r\tPROCEDURE (f: UpDownField) Edit (op: INTEGER; VAR v: Views.View; VAR w, h: INTEGER;\r\t\t\t\t\t\t\t\t\t\tVAR singleton, clipboard: BOOLEAN);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF clipboard THEN\r\t\t\tIF op = Controllers.cut THEN\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_CUT, 0, 0)\r\t\t\tELSIF op = Controllers.copy THEN\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_COPY, 0, 0)\r\t\t\tELSIF op = Controllers.paste THEN\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_PASTE, 0, 0)\r\t\t\tEND\r\t\tEND\r\tEND Edit;\r\r\tPROCEDURE (f: UpDownField) Idle, EMPTY;\r\r\tPROCEDURE (f: UpDownField) Select (from, to: INTEGER);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF to = MAX(INTEGER) THEN to := -1 END;\r\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.EM_SETSEL, from, to)\r\tEND Select;\r\r\tPROCEDURE (f: UpDownField) GetSelection (OUT from, to: INTEGER);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.EM_GETSEL, SYSTEM.ADR(from), SYSTEM.ADR(to));\r\t\tIF from = -1 THEN to := -1 ELSIF to = -1 THEN to := MAX(INTEGER) END\r\tEND GetSelection;\r\r\tPROCEDURE (f: UpDownField) Mark (on, focus: BOOLEAN);\r\tBEGIN\r\t\tMark(on, f.front, f.i)\r\tEND Mark;\r\r\tPROCEDURE (f: UpDownField) GetCursor (x, y: INTEGER; modifiers: SET; VAR cursor: INTEGER);\r\t\tVAR res, hc: INTEGER; pt: WinApi.POINT;\r\tBEGIN\r\t\tpt.x := (x - 1) DIV f.unit + 1; pt.y := (y - 1) DIV f.unit + 1;\r\t\tres := WinApi.ClientToScreen(f.i.wnd, pt);\r\t\thc := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_NCHITTEST, 0, pt.x + pt.y * 65536);\r\t\tIF hc = 1 THEN cursor := Ports.textCursor END\r\tEND GetCursor;\r\r\r\r\t"
                    attr: 0
                  - text: "(* TimeField *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE GetTimePart (VAR time: Dates.Time; part: INTEGER; VAR val, min, max: INTEGER);\r\tBEGIN\r\t\tIF part = -1 THEN part := lastPart END;\r\t\tIF part = 4 THEN val := time.hour DIV 12; min := 0; max := 1\r\t\tELSIF part = 3 THEN val := time.second; min := 0; max := 59\r\t\tELSIF part = 2 THEN val := time.minute; min := 0; max := 59\r\t\tELSIF lastPart = 3 THEN val := time.hour; min := 0; max := 23\r\t\tELSE val := (time.hour - 1) MOD 12 + 1; min := 1; max := 12\r\t\tEND\r\tEND GetTimePart;\r\r\tPROCEDURE SetTimePart (VAR time: Dates.Time; part: INTEGER; val: INTEGER);\r\tBEGIN\r\t\tIF part = -1 THEN part := lastPart END;\r\t\tIF part = 4 THEN time.hour := val * 12 + time.hour MOD 12\r\t\tELSIF part = 3 THEN time.second := val\r\t\tELSIF part = 2 THEN time.minute := val\r\t\tELSIF lastPart = 3 THEN time.hour := val\r\t\tELSE time.hour := time.hour DIV 12 * 12 + val MOD 12\r\t\tEND\r\tEND SetTimePart;\r\r\tPROCEDURE TimeToString (VAR time: Dates.Time; VAR str: ARRAY OF CHAR);\r\t\tVAR val, min, max, i, j, k: INTEGER;\r\tBEGIN\r\t\tGetTimePart(time, 1, val, min, max);\r\t\tstr[0] := CHR(val DIV 10 + ORD(\"0\"));\r\t\tstr[1] := CHR(val MOD 10 + ORD(\"0\"));\r\t\tstr[2] := timeSep;\r\t\tGetTimePart(time, 2, val, min, max);\r\t\tstr[3] := CHR(val DIV 10 + ORD(\"0\"));\r\t\tstr[4] := CHR(val MOD 10 + ORD(\"0\"));\r\t\tstr[5] := timeSep;\r\t\tGetTimePart(time, 3, val, min, max);\r\t\tstr[6] := CHR(val DIV 10 + ORD(\"0\"));\r\t\tstr[7] := CHR(val MOD 10 + ORD(\"0\"));\r\t\tIF lastPart = 3 THEN\r\t\t\tstr[8] := 0X\r\t\tELSE\r\t\t\tstr[8] := \" \";\r\t\t\ti := 9; j := 0; k := time.hour DIV 12;\r\t\t\tWHILE desig[k, j] # 0X DO str[i] := desig[k, j]; INC(i); INC(j) END;\r\t\t\tstr[i] := 0X\r\t\tEND\r\tEND TimeToString;\r\r\tPROCEDURE (f: TimeField) Select, NEW;\r\t\tVAR res: INTEGER; sel: INTEGER;\r\tBEGIN\r\t\tf.GetSel(f, sel);\r\t\tIF sel = -1 THEN sel := lastPart END;\r\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.EM_SETSEL, 3 * sel - 3, 3 * sel - 1)\r\tEND Select;\r\r\tPROCEDURE (f: TimeField) SetOffset (x, y: INTEGER);\r\tBEGIN\r\t\tf.SetOffset^(x, y);\r\t\tAdapt(f, f.i)\r\tEND SetOffset;\r\r\tPROCEDURE (f: TimeField) Close;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF f.i.wnd # 0 THEN\t"
                    attr: 0
                  - text: "(* deallocate *)\r"
                    attr: 1
                  - text: "\t\t\tASSERT(f.rider # NIL, 100); ASSERT(f.rider.Base() # NIL, 101);\r\t\t\tres := WinApi.DestroyWindow(f.i.wnd);\r\t\t\tf.i.wnd := 0; f.i.ctrl := 0; f.i.ud := 0\r\t\tEND\r\t\t(*f.Close^*)\r\tEND Close;\r\r\tPROCEDURE (f: TimeField) Update;\r\t\tVAR res: INTEGER; s, s1: ARRAY 20 OF CHAR; time: Dates.Time; style: SET;\r\tBEGIN\r\t\tIF ~f.disabled THEN\r\t\t\tIF f.undef THEN s := \"\" ELSE f.Get(f, time); TimeToString(time, s) END;\r\t\t\tIF WinApi.IsWindowEnabled(f.i.ctrl) = 0 THEN res := WinApi.EnableWindow(f.i.ctrl, 1) END;\r\t\t\tIF f.readOnly THEN\r\t\t\t\tIF WinApi.IsWindowEnabled(f.i.ud) # 0 THEN res := WinApi.EnableWindow(f.i.ud, 0) END\r\t\t\tELSE\r\t\t\t\tIF WinApi.IsWindowEnabled(f.i.ud) = 0 THEN res := WinApi.EnableWindow(f.i.ud, 1) END\r\t\t\tEND;\r\t\t\tres := WinApi.GetWindowTextW(f.i.ctrl, s1, LEN(s1));\r\t\t\tIF s # s1 THEN\r\t\t\t\tf.isUpdate := TRUE;\r\t\t\t\tres := WinApi.SetWindowTextW(f.i.ctrl, s);\r\t\t\t\tf.isUpdate := FALSE\r\t\t\tEND;\r\t\t\tstyle := BITS(WinApi.GetWindowLongW(f.i.ctrl, -16));\t"
                    attr: 0
                  - text: "(* window style *)"
                    attr: 1
                  - text: "\r\t\tIF (f.readOnly # f.i.readOnly) OR (f.undef # f.i.undef) THEN\r(*\r\t\t\tres := WinApi.SetWindowLongW(f.i.ctrl, -16, ORD(style / {11}));\r*)\r\t\t\tres := WinApi.InvalidateRect(f.i.ctrl, NIL, 1);\r\t\t\tf.i.readOnly := f.readOnly; f.i.undef := f.undef\r\t\tEND;\r\t\t\tf.Select\r\t\tELSE\r\t\t\tIF WinApi.IsWindowEnabled(f.i.ctrl) # 0 THEN\r\t\t\t\tf.isUpdate := TRUE;\r\t\t\t\tres := WinApi.SetWindowTextW(f.i.ctrl, \"\");\r\t\t\t\tf.isUpdate := FALSE;\r\t\t\t\tres := WinApi.EnableWindow(f.i.ctrl, 0)\r\t\t\tEND;\r\t\t\tIF WinApi.IsWindowEnabled(f.i.ud) # 0 THEN res := WinApi.EnableWindow(f.i.ud, 0) END\r\t\tEND;\r\t\tres := WinApi.UpdateWindow(f.i.ctrl)\r\tEND Update;\r\r\tPROCEDURE (f: TimeField) Restore (l, t, r, b: INTEGER);\r\t\tVAR res, w, h: INTEGER; style: SET; s: ARRAY 20 OF CHAR; time: Dates.Time;\r\tBEGIN\r\t\tIF f.i.ctrl = 0 THEN\t"
                    attr: 0
                  - text: "(* lazy allocation *)\r\t\t\t"
                    attr: 1
                  - text: "f.view.context.GetSize(w, h);\r\t\t\tstyle := {7, 16, 23, 30};\t"
                    attr: 0
                  - text: "(* autohscroll, tabstop, border, child *)"
                    attr: 1
                  - text: "\r(*\r\t\t\tIF f.readOnly THEN INCL(style, 11) END;\t("
                    attr: 0
                  - text: "* readonly *)\r"
                    attr: 1
                  - text: "*)"
                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\t\t\tf.i.readOnly := f.readOnly; f.i.undef := f.undef;\r\t\t\tOpen(f, \"EDIT\", \"\", style, WinApi.WS_EX_CLIENTEDGE, f.i);\r\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.EM_LIMITTEXT, 16, 0);\r\t\t\tf.Update;\r\t\t\tIF f.front & ~f.disabled THEN\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_SETFOCUS, 0, 0);\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_KEYDOWN, 23H, 0)\r\t\t\tEND\r\t\tELSE f.Update\r\t\tEND;\r\t\tIF f.i.wnd # 0 THEN\r\t\t\tPaint(f, f.i)\r\t\tELSE\r\t\t\tf.Get(f, time);\r\t\t\tTimeToString(time, s);\r\t\t\tPrint(f, f.dot, 2 * Ports.point, 0, s)\r\t\tEND\r\tEND Restore;\r\r\tPROCEDURE (f: TimeField) MouseDown (x, y: INTEGER; buttons: SET);\r\t\tVAR res: INTEGER; sel: INTEGER;\r\tBEGIN\r\t\tASSERT(~f.disabled, 100);\r\t\tIF f.rider # NIL THEN\r\t\t\tf.GetSel(f, sel);\r\t\t\tIF sel = 0 THEN f.SetSel(f, 1); f.Select END;\r\t\t\tHandleMouse(f.i.wnd, x DIV f.unit, y DIV f.unit, buttons);\r\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.EM_GETSEL, 0, 0);\r\t\t\tsel := res MOD 65536 DIV 3 + 1;\r\t\t\tIF sel >= lastPart THEN sel := -1 END;\r\t\t\tf.cur := 0; f.SetSel(f, sel); f.Select\r\t\tEND\r\tEND MouseDown;\r\r\tPROCEDURE (f: TimeField) KeyDown (ch: CHAR);\r\t\tVAR sel, s, val, v, min, max: INTEGER; time: Dates.Time;\r\tBEGIN\r\t\tASSERT(~f.disabled, 100);\r\t\tf.GetSel(f, sel); s := sel;\r\t\tIF s = -1 THEN s := lastPart END;\r\t\tf.Get(f, time);\r\t\tGetTimePart(time, s, val, min, max); v := val;\r\t\tIF (ch = TAB) OR (ch = AR) THEN\r\t\t\ts := s MOD lastPart + 1; f.cur := 0\r\t\tELSIF (ch = LTAB) OR (ch = AL) THEN\r\t\t\tDEC(s); f.cur := 0;\r\t\t\tIF s <= 0 THEN s := lastPart END\r\t\tELSIF (ch = PL) OR (ch = DL) THEN\r\t\t\ts := 1; f.cur := 0\r\t\tELSIF (ch = PR) OR (ch = DR) THEN\r\t\t\ts := lastPart; f.cur := 0\r\t\tELSIF (ch = DEL) OR (ch = BS) THEN\r\t\t\tv := min\r\t\tELSIF ch = AU THEN\r\t\t\tIF v < max THEN INC(v) ELSE v := min END\r\t\tELSIF ch = AD THEN\r\t\t\tIF v > min THEN DEC(v) ELSE v := max END\r\t\tELSIF (ch >= \"0\") & (ch <= \"9\") & (s < 4) THEN\r\t\t\tv := v * 10 MOD 100 + ORD(ch) - ORD(\"0\");\r\t\t\tIF v > max THEN v := v MOD 10 ELSIF v < min THEN v := min END\r\t\tELSIF s = 4 THEN\r\t\t\tIF (ch = \" \") OR (CAP(ch) = CAP(desig[1 - v, 0])) THEN v := 1 - v END\r\t\tEND;\r\t\tIF s = lastPart THEN s := -1 END;\r\t\tIF v # val THEN\r\t\t\tSetTimePart(time, s, v); f.Set(f, time); f.Update\r\t\tELSIF s # sel THEN\r\t\t\tf.SetSel(f, s); f.Select\r\t\tEND\r\tEND KeyDown;\r\r\tPROCEDURE (f: TimeField) Edit (op: INTEGER; VAR v: Views.View; VAR w, h: INTEGER;\r\t\t\t\t\t\t\t\t\t\tVAR singleton, clipboard: BOOLEAN);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF clipboard THEN\r\t\t\tIF op = Controllers.copy THEN\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_COPY, 0, 0)\r\t\t\tEND\r\t\tEND\r\tEND Edit;\r\r\tPROCEDURE (f: TimeField) Mark (on, focus: BOOLEAN);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tMark(on, f.front, f.i);\r\t\tIF ~on & focus THEN\r\t\t\tf.SetSel(f, 0); f.cur := 0;\r\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.EM_SETSEL, 0, 0)\r\t\tEND\r\tEND Mark;\r\r\tPROCEDURE (f: TimeField) GetCursor (x, y: INTEGER; modifiers: SET; VAR cursor: INTEGER);\r\t\tVAR res, hc: INTEGER; pt: WinApi.POINT;\r\tBEGIN\r\t\tpt.x := (x - 1) DIV f.unit + 1; pt.y := (y - 1) DIV f.unit + 1;\r\t\tres := WinApi.ClientToScreen(f.i.wnd, pt);\r\t\thc := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_NCHITTEST, 0, pt.x + pt.y * 65536);\r\t\tIF hc = 1 THEN cursor := Ports.textCursor END\r\tEND GetCursor;\r\r\r\r\t"
                    attr: 0
                  - text: "(* DateField *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE GetDatePart (VAR date: Dates.Date; part: INTEGER; OUT val, min, max: INTEGER);\r"
                    attr: 0
                  - text: "\t(* GetDatePart picks the day, month or year part out of a given date and asigns it to the out\r\t\tparameter val, together with the min and max possible values for this part\r\t*)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tIF part = -1 THEN part := 3 END;\r\t\tIF part = yearPart THEN val := date.year; min := 1; max := 9999\r\t\tELSIF part = monthPart THEN val := date.month; min := 1; max := 12\r\t\tELSE\r\t\t\tval := date.day; min := 1;\r\t\t\tIF date.month = 0 THEN\r\t\t\t\tmax := 31\r\t\t\tELSIF date.month = 2 THEN\r\t\t\t\tIF (date.year MOD 4 = 0)\r\t\t\t\t\t& ((date.year < 1583) OR (date.year MOD 100 # 0) OR (date.year MOD 400 = 0))\r\t\t\t\tTHEN\r\t\t\t\t\tmax := 29\r\t\t\t\tELSE max := 28\r\t\t\t\tEND\r\t\t\tELSIF date.month IN {1, 3, 5, 7, 8, 10, 12} THEN max := 31\r\t\t\tELSE max := 30\r\t\t\tEND\r\t\tEND\r\tEND GetDatePart;\r\r\tPROCEDURE SetDatePart (VAR date: Dates.Date; part: INTEGER; val: INTEGER);\r\t(* SetDatePart sets the "
                    attr: 0
                  - text: "day, month or year part in a given date to the value specivied\r\t\tby the parameter val.\r\t\tIf the month is set, the day is adjusted to the possible range of days in this month.\r\t\tIf the day is set, then the month may be changed in order to obtain a valid date\r\t*)"
                    attr: 1
                  - text: "\r\t\tVAR v, min, max: INTEGER;\r\tBEGIN\r\t\tIF part = -1 THEN part := 3 END;\r\t\tIF part = yearPart THEN date.year := val\r\t\tELSIF part = monthPart THEN date.month := val\r\t\tELSE date.day := val\r\t\tEND;\r\t\tGetDatePart(date, dayPart, v, min, max);\r\t\tIF (part = monthPart) THEN"
                    attr: 0
                  - text: " (* adjust day if month value is set and day > max *)"
                    attr: 1
                  - text: "\r\t\t\tIF v > max THEN date.day := max END\r\t\tELSIF part = yearPart THEN"
                    attr: 0
                  - text: " (* adjust month is day value is set and day > max *)"
                    attr: 1
                  - text: "\r\t\t\tIF v > max THEN INC(date.month) END\r\t\tEND\r\tEND SetDatePart;\r\r\tPROCEDURE DateToString (VAR date: Dates.Date; VAR str: ARRAY OF CHAR);\r\t\tVAR val, min, max, p, i: INTEGER;\r\tBEGIN\r\t\tp := 1; i := 0;\r\t\tWHILE p <= 3 DO\r\t\t\tIF p > 1 THEN str[i] := dateSep; INC(i) END;\r\t\t\tGetDatePart(date, p, val, min, max);\r\t\t\tIF max = 9999 THEN\r\t\t\t\tstr[i] := CHR(val DIV 1000 MOD 10 + ORD(\"0\")); INC(i);\r\t\t\t\tstr[i] := CHR(val DIV 100 MOD 10 + ORD(\"0\")); INC(i)\r\t\t\tEND;\r\t\t\tstr[i] := CHR(val DIV 10 MOD 10 + ORD(\"0\")); INC(i);\r\t\t\tstr[i] := CHR(val MOD 10 + ORD(\"0\")); INC(i);\r\t\t\tINC(p)\r\t\tEND;\r\t\tstr[i] := 0X\r\tEND DateToString;\r\r\tPROCEDURE (f: DateField) Select, NEW;\r\t\tVAR res: INTEGER; sel, a, b: INTEGER;\r\tBEGIN\r\t\tf.GetSel(f, sel);\r\t\tIF sel = 1 THEN a := 0; b := del1\r\t\tELSIF sel = 2 THEN a := del1 + 1; b := del2\r\t\tELSE a := del2 + 1; b := del2 + 5\r\t\tEND;\r\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.EM_SETSEL, a, b)\r\tEND Select;\r\r\tPROCEDURE (f: DateField) SetOffset (x, y: INTEGER);\r\tBEGIN\r\t\tf.SetOffset^(x, y);\r\t\tAdapt(f, f.i)\r\tEND SetOffset;\r\r\tPROCEDURE (f: DateField) Close;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF f.i.wnd # 0 THEN\t"
                    attr: 0
                  - text: "(* deallocate *)\r"
                    attr: 1
                  - text: "\t\t\tASSERT(f.rider # NIL, 100); ASSERT(f.rider.Base() # NIL, 101);\r\t\t\tres := WinApi.DestroyWindow(f.i.wnd);\r\t\t\tf.i.wnd := 0; f.i.ctrl := 0; f.i.ud := 0\r\t\tEND\r\t\t(*f.Close^*)\r\tEND Close;\r\r\tPROCEDURE (f: DateField) Update;\r\t\tVAR res: INTEGER; s, s1: ARRAY 20 OF CHAR; date: Dates.Date; style: SET; sel: INTEGER;\r\tBEGIN\r\t\tIF ~f.disabled THEN\r\t\t\tIF f.undef THEN s := \"\"\r\t\t\tELSE f.Get(f, date);\r\t\t\t\tIF f.cnt > 0 THEN f.GetSel(f, sel); SetDatePart(date, sel, f.val) END;\r\t\t\t\tDateToString(date, s)\r\t\t\tEND;\r\t\t\tIF WinApi.IsWindowEnabled(f.i.ctrl) = 0 THEN res := WinApi.EnableWindow(f.i.ctrl, 1) END;\r\t\t\tIF f.readOnly THEN\r\t\t\t\tIF WinApi.IsWindowEnabled(f.i.ud) # 0 THEN res := WinApi.EnableWindow(f.i.ud, 0) END\r\t\t\tELSE\r\t\t\t\tIF WinApi.IsWindowEnabled(f.i.ud) = 0 THEN res := WinApi.EnableWindow(f.i.ud, 1) END\r\t\t\tEND;\r\t\t\tres := WinApi.GetWindowTextW(f.i.ctrl, s1, LEN(s1));\r\t\t\tIF s # s1 THEN\r\t\t\t\tf.isUpdate := TRUE;\r\t\t\t\tres := WinApi.SetWindowTextW(f.i.ctrl, s);\r\t\t\t\tf.isUpdate := FALSE\r\t\t\tEND;\r\t\t\tstyle := BITS(WinApi.GetWindowLongW(f.i.ctrl, -16));\t"
                    attr: 0
                  - text: "(* window style *)"
                    attr: 1
                  - text: "\r\t\t\tIF (f.readOnly # f.i.readOnly) OR (f.undef # f.i.undef) THEN\r\t(*\r\t\t\t\tres := WinApi.SetWindowLongW(f.i.ctrl, -16, ORD(style / {11}));\r\t*)\r\t\t\t\tres := WinApi.InvalidateRect(f.i.ctrl, NIL, 1);\r\t\t\t\tf.i.readOnly := f.readOnly; f.i.undef := f.undef\r\t\t\tEND;\r\t\t\tf.Select\r\t\tELSE\r\t\t\tIF WinApi.IsWindowEnabled(f.i.ctrl) # 0 THEN\r\t\t\t\tf.isUpdate := TRUE;\r\t\t\t\tres := WinApi.SetWindowTextW(f.i.ctrl, \"\");\r\t\t\t\tf.isUpdate := FALSE;\r\t\t\t\tres := WinApi.EnableWindow(f.i.ctrl, 0)\r\t\t\tEND;\r\t\t\tIF WinApi.IsWindowEnabled(f.i.ud) # 0 THEN res := WinApi.EnableWindow(f.i.ud, 0) END\r\t\tEND;\r\t\tres := WinApi.UpdateWindow(f.i.ctrl)\r\tEND Update;\r\r\tPROCEDURE (f: DateField) Restore (l, t, r, b: INTEGER);\r\t\tVAR res, w, h: INTEGER; style: SET; s: ARRAY 20 OF CHAR; date: Dates.Date;\r\tBEGIN\r\t\tIF f.i.ctrl = 0 THEN\t"
                    attr: 0
                  - text: "(* lazy allocation *)\r\t\t\t"
                    attr: 1
                  - text: "f.view.context.GetSize(w, h);\r\t\t\tstyle := {7, 16, 23, 30};\t"
                    attr: 0
                  - text: "(* autohscroll, tabstop, border, child *)"
                    attr: 1
                  - text: "\r(*\r\t\t\tIF f.readOnly THEN INCL(style, 11) END;\t("
                    attr: 0
                  - text: "* readonly *)\r"
                    attr: 1
                  - text: "*)"
                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\t\t\tf.i.readOnly := f.readOnly; f.i.undef := f.undef;\r\t\t\tOpen(f, \"EDIT\", \"\", style, WinApi.WS_EX_CLIENTEDGE, f.i);\r\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.EM_LIMITTEXT, 16, 0);\r\t\t\tf.Update;\r\t\t\tIF f.front & ~f.disabled THEN\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_SETFOCUS, 0, 0);\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_KEYDOWN, 23H, 0)\r\t\t\tEND\r\t\tELSE f.Update\r\t\tEND;\r\t\tIF f.i.wnd # 0 THEN\r\t\t\tPaint(f, f.i)\r\t\tELSE\r\t\t\tf.Get(f, date);\r\t\t\tDateToString(date, s);\r\t\t\tPrint(f, f.dot, 2 * Ports.point, 0, s)\r\t\tEND\r\tEND Restore;\r\r\tPROCEDURE ActualizeDate(f: DateField);\r\t\tVAR sel: INTEGER; date: Dates.Date; val, min, max: INTEGER;\r\tBEGIN\r\t\tIF f.cnt > 0 THEN\r\t\t\tf.GetSel(f, sel); IF sel = -1 THEN sel := 3 END;\r\t\t\tf.Get(f, date);\r\t\t\tIF (sel = yearPart) & (f.cnt <= 2) THEN\r\t\t\t\tIF f.val < 50 THEN f.val := f.val + 2000\r\t\t\t\tELSIF f.val < 100 THEN f.val := f.val + 1900\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tGetDatePart(date, sel, val, min, max);\r\t\t\tIF (min <= f.val) & (f.val <= max) THEN\r\t\t\t\tSetDatePart(date, sel, f.val); f.Set(f, date)\r\t\t\tEND;\r\t\t\tf.cnt := 0;\r\t\t\tf.Update\r\t\tEND\r\tEND ActualizeDate;\r\r\tPROCEDURE (f: DateField) MouseDown (x, y: INTEGER; buttons: SET);\r\t\tVAR res: INTEGER; sel: INTEGER;\r\tBEGIN\r\t\tASSERT(~f.disabled, 100);\r\t\tIF f.rider # NIL THEN\r\t\t\tActualizeDate(f);\r\t\t\tf.GetSel(f, sel);\r\t\t\tIF sel = 0 THEN f.SetSel(f, 1); f.Select END;\r\t\t\tHandleMouse(f.i.wnd, x DIV f.unit, y DIV f.unit, buttons);\r\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.EM_GETSEL, 0, 0);\r\t\t\tres := res MOD 65536;\r\t\t\tIF res <= del1 THEN sel := 1\r\t\t\tELSIF res <= del2 THEN sel := 2\r\t\t\tELSE sel := -1\r\t\t\tEND;\r\t\t\tf.SetSel(f, sel); f.Select\r\t\tEND\r\tEND MouseDown;\r\r\tPROCEDURE (f: DateField) KeyDown (ch: CHAR);\r\t\tVAR sel, s, val, min, max: INTEGER; date: Dates.Date;\r\tBEGIN\r\t\tASSERT(~f.disabled, 100);\r\t\tf.GetSel(f, sel); s := sel;\r\t\tIF s = -1 THEN s := 3 END;\r\t\tf.Get(f, date);\r\t\tGetDatePart(date, s, val, min, max);\r\r\t\tIF (ch = TAB) OR (ch = AR) THEN\r\t\t\ts := s MOD 3 + 1;\r\t\t\tActualizeDate(f)\r\t\tELSIF ((ch = \".\") OR (ch = \",\")) & (f.cnt > 0) THEN\r\t\t\ts := s MOD 3 + 1;\r\t\t\tActualizeDate(f)\r\t\tELSIF (ch = LTAB) OR (ch = AL) THEN\r\t\t\tIF s = 0 THEN s := 1 END;\r\t\t\ts := (s - 2) MOD 3 + 1;\r\t\t\tActualizeDate(f)\r\t\tELSIF (ch = PL) OR (ch = DL) THEN\r\t\t\ts := 1;\r\t\t\tActualizeDate(f)\r\t\tELSIF (ch = PR) OR (ch = DR) THEN\r\t\t\ts := 3;\r\t\t\tActualizeDate(f)\r\t\tELSIF (ch = DEL) OR (ch = BS) THEN\r\t\t\tf.cnt := 4; f.val := min;\r\t\t\tActualizeDate(f)\r\t\tELSIF ch = AU THEN\r\t\t\tIF f.cnt = 0 THEN f.cnt := 4; f.val := val END;\r\t\t\tIF f.val < max THEN INC(f.val) ELSE f.val := min END;\r\t\t\tActualizeDate(f)\r\t\tELSIF ch = AD THEN\r\t\t\tIF f.cnt = 0 THEN f.cnt := 4; f.val := val END;\r\t\t\tIF f.val > min THEN DEC(f.val) ELSE f.val := max END;\r\t\t\tActualizeDate(f)\r\t\tELSIF (ch >= \"0\") & (ch <= \"9\") THEN\r\t\t\tIF s = yearPart THEN\r\t\t\t\tIF f.cnt = 0 THEN\r\t\t\t\t\tf.val := ORD(ch) - ORD(\"0\"); INC(f.cnt);\r\t\t\t\t\tf.Update\r\t\t\t\tELSE\r\t\t\t\t\tf.val := f.val * 10 + ORD(ch) - ORD(\"0\");\r\t\t\t\t\tINC(f.cnt);\r\t\t\t\t\tIF f.cnt = 4 THEN ActualizeDate(f) ELSE f.Update END\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tIF f.cnt = 0 THEN\r\t\t\t\t\tf.val := ORD(ch) - ORD(\"0\"); f.cnt := 1;\r\t\t\t\t\tf.Update\r\t\t\t\tELSE\r\t\t\t\t\tf.val := f.val * 10 MOD 100 + ORD(ch) - ORD(\"0\");\r\t\t\t\t\tIF (s = dayPart) & (max < f.val) & (f.val <= 31) THEN\r\t\t\t\t\t\tINC(date.month); f.Set(f, date); max := 31\r\t\t\t\t\tEND;\r\t\t\t\t\tIF f.val > max THEN f.val := f.val MOD 10 END;\r\t\t\t\t\tActualizeDate(f);\r\t\t\t\t\tINC(s)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND;\r\r\t\tIF s = 3 THEN s := -1 END;\r\t\tIF s # sel THEN\r\t\t\tf.SetSel(f, s); f.Select\r\t\tEND\r\tEND KeyDown;\r\r\tPROCEDURE (f: DateField) Edit (op: INTEGER; VAR v: Views.View; VAR w, h: INTEGER;\r\t\t\t\t\t\t\t\t\t\tVAR singleton, clipboard: BOOLEAN);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF clipboard THEN\r\t\t\tIF op = Controllers.copy THEN\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_COPY, 0, 0)\r\t\t\tEND\r\t\tEND\r\tEND Edit;\r\r\tPROCEDURE (f: DateField) Mark (on, focus: BOOLEAN);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF ~on THEN ActualizeDate(f) END;\r\r\t\tMark(on, f.front, f.i);\r\t\tIF ~on & focus THEN\r\t\t\tf.SetSel(f, 0);\r\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.EM_SETSEL, 0, 0)\r\t\tEND\r\tEND Mark;\r\r\tPROCEDURE (f: DateField) GetCursor (x, y: INTEGER; modifiers: SET; VAR cursor: INTEGER);\r\t\tVAR res, hc: INTEGER; pt: WinApi.POINT;\r\tBEGIN\r\t\tpt.x := (x - 1) DIV f.unit + 1; pt.y := (y - 1) DIV f.unit + 1;\r\t\tres := WinApi.ClientToScreen(f.i.wnd, pt);\r\t\thc := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_NCHITTEST, 0, pt.x + pt.y * 65536);\r\t\tIF hc = 1 THEN cursor := Ports.textCursor END\r\tEND GetCursor;\r\r\r\r\t"
                    attr: 0
                  - text: "(* ColorField *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (f: ColorField) SetOffset (x, y: INTEGER);\r\tBEGIN\r\t\tf.SetOffset^(x, y);\r\t\tAdapt(f, f.i)\r\tEND SetOffset;\r\r\tPROCEDURE (f: ColorField) Close;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF f.i.wnd # 0 THEN\t"
                    attr: 0
                  - text: "(* deallocate *)\r"
                    attr: 1
                  - text: "\t\t\tASSERT(f.rider # NIL, 100); ASSERT(f.rider.Base() # NIL, 101);\r\t\t\tres := WinApi.DestroyWindow(f.i.wnd);\r\t\t\tf.i.wnd := 0; f.i.ctrl := 0\r\t\tEND\r\t\t(*f.Close^*)\r\tEND Close;\r\r\tPROCEDURE (f: ColorField) Update;\r\t\tVAR res, i, j: INTEGER; c: Ports.Color;\r\tBEGIN\r\t\tIF ~f.disabled THEN\r\t\t\tIF WinApi.IsWindowEnabled(f.i.ctrl) = 0 THEN res := WinApi.EnableWindow(f.i.ctrl, 1) END;\r\t\t\tIF f.undef THEN j := -1\r\t\t\tELSE\r\t\t\t\tf.Get(f, c); j := 0;\r\t\t\t\tWHILE (j < numColors) & (c # colors[j]) DO INC(j) END\r\t\t\tEND;\r\t\t\ti := WinApi.SendMessageW(f.i.ctrl, WinApi.CB_GETCURSEL, 0, 0);\r\t\t\tIF (i # j) OR (j = numColors) & (c # f.color) THEN\r\t\t\t\tf.color := c;\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.CB_SETCURSEL, j, 0)\r\t\t\tEND\r\t\tELSE\r\t\t\tIF WinApi.IsWindowEnabled(f.i.ctrl) # 0 THEN\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.CB_SETCURSEL, -1, 0);\r\t\t\t\tres := WinApi.EnableWindow(f.i.ctrl, 0)\r\t\t\tEND\r\t\tEND;\r\t\tIF f.readOnly # f.i.readOnly THEN\r\t\t\tres := WinApi.InvalidateRect(f.i.ctrl, NIL, 1);\r\t\t\tf.i.readOnly := f.readOnly\r\t\tEND;\r\t\tres := WinApi.UpdateWindow(f.i.ctrl)\r\tEND Update;\r\r\tPROCEDURE (f: ColorField) Restore (l, t, r, b: INTEGER);\r\t\tVAR res, w, h, i: INTEGER; style: SET;\r\tBEGIN\r\t\tIF f.i.ctrl = 0 THEN\t"
