                    attr: 1
                  - text: "IF f.himl # NIL THEN ok := WinCtl.ImageList_Destroy(f.himl) END;\r\t\t\tf.himl := WinCtl.ImageList_Create(16, 16, {}, 3, 0);\r\t\t\tIF f.himl # NIL THEN\r\t\t\t\thbmp := WinApi.LoadImageW(\r\t\t\t\t\tinstance, \"#6\", WinApi.IMAGE_ICON, 16, 16, ORD(WinApi.LR_LOADTRANSPARENT));\r\t\t\t\tf.folderimg := WinCtl.ImageList_ReplaceIcon(f.himl, -1, hbmp);\r\t\t\t\tok := WinApi.DestroyIcon(hbmp);\r\t\t\t\thbmp := WinApi.LoadImageW(\r\t\t\t\t\tinstance, \"#7\", WinApi.IMAGE_ICON, 16, 16, ORD(WinApi.LR_LOADTRANSPARENT));\r\t\t\t\tf.openimg := WinCtl.ImageList_ReplaceIcon(f.himl, -1, hbmp);\r\t\t\t\tok := WinApi.DestroyIcon(hbmp);\r\t\t\t\thbmp := WinApi.LoadImageW(\r\t\t\t\t\tinstance, \"#8\", WinApi.IMAGE_ICON, 16, 16, ORD(WinApi.LR_LOADTRANSPARENT));\r\t\t\t\tf.leafimg := WinCtl.ImageList_ReplaceIcon(f.himl, -1, hbmp);\r\t\t\t\tok := WinApi.DestroyIcon(hbmp);\r\t\t\t\tres := WinApi.SendMessageW(\r\t\t\t\t\tf.i.ctrl, WinCtl.TVM_SETIMAGELIST, WinCtl.TVSIL_NORMAL, SYSTEM.VAL(INTEGER, f.himl))\r\t\t\tEND\r\t\tEND\r\tEND Recreate;\r\r\tPROCEDURE (f: TreeFrame) UpdateNT4, NEW;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF ~f.disabled THEN\r\t\t\tIF WinApi.IsWindowEnabled(f.i.ctrl) = 0 THEN\r\t\t\t\tres := WinApi.EnableWindow(f.i.ctrl, 1)\r\t\t\tEND\r\t\tELSE\r\t\t\tIF WinApi.IsWindowEnabled(f.i.ctrl) # 0 THEN\r\t\t\t\tres := WinApi.EnableWindow(f.i.ctrl, 0)\r\t\t\tEND\r\t\tEND;\r\t\tres := WinApi.UpdateWindow(f.i.ctrl);\r\t\tIF ~f.disabled & (f.readOnly # f.i.readOnly) THEN\r\t\t\tIF f.readOnly OR ~f.i.hasFocus THEN res := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_KILLFOCUS, 0, 0)\r\t\t\tEND;\r\t\t\tf.i.readOnly := f.readOnly\r\t\tEND\r\tEND UpdateNT4;\r\r\tPROCEDURE (f: TreeFrame) Update;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF Dialog.platform = Dialog.windowsNT4 THEN f.UpdateNT4; "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\tIF ~f.disabled & ~f.readOnly THEN\r\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinCtl.TV_FIRST + 029, 0, -1); (* TVM_SETBKCOLOR *)\r\t\t\tIF WinApi.IsWindowEnabled(f.i.ctrl) = 0 THEN\r\t\t\t\tres := WinApi.EnableWindow(f.i.ctrl, 1)\r\t\t\tEND\r\t\tELSIF ~f.disabled & f.readOnly THEN\r\t\t\tres := WinApi.SendMessageW(\r\t\t\t\tf.i.ctrl, WinCtl.TV_FIRST + 029, 0, Ports.dialogBackground); (* TVM_SETBKCOLOR *)\r\t\t\tIF WinApi.IsWindowEnabled(f.i.ctrl) = 0 THEN\r\t\t\t\tres := WinApi.EnableWindow(f.i.ctrl, 1)\r\t\t\tEND\r\t\tELSE\r\t\t\tres := WinApi.SendMessageW(\r\t\t\t\tf.i.ctrl, WinCtl.TV_FIRST + 029, 0, Ports.dialogBackground); (* TVM_SETBKCOLOR *)\r\t\t\tIF WinApi.IsWindowEnabled(f.i.ctrl) # 0 THEN\r\t\t\t\tres := WinApi.EnableWindow(f.i.ctrl, 0)\r\t\t\tEND\r\t\tEND;\r\t\tres := WinApi.UpdateWindow(f.i.ctrl);\r\t\tIF ~f.disabled & (f.readOnly # f.i.readOnly) THEN\r\t\t\tIF f.readOnly THEN\r\t\t\t\t(* Selection has to be focused since it won't be visible on a gray backround otherwise *)\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_SETFOCUS, 0, 0)\r\t\t\tELSE\r\t\t\t\tIF ~f.i.hasFocus THEN res := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_KILLFOCUS, 0, 0) END\r\t\t\tEND;\r\t\t\tf.i.readOnly := f.readOnly\r\t\tEND;\r\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_SETFOCUS, 0, 0)\r\tEND Update;\r\r\tPROCEDURE (f: TreeFrame) WinInsertItem (\r\t\tVAR tn: Dialog.TreeNode; pWndAdr: INTEGER; OUT wndAdr: INTEGER\r\t), NEW;\r\t\tVAR res: INTEGER; p: Dialog.TreeNode; s: Dialog.String;\r\t\t\ttvi: WinCtl.TVITEMW; tvins: WinCtl.TVINSERTSTRUCTW;\r\tBEGIN\r\t\tASSERT(tn # NIL, 20);\r\t\tf.treeArray[f.curindex].tn := tn;\r\t\tp := f.Parent(f, tn);\r\t\ttvi.mask := WinCtl.TVIF_TEXT + WinCtl.TVIF_PARAM + WinCtl.TVIF_IMAGE + WinCtl.TVIF_SELECTEDIMAGE;\r\t\ttn.GetName(s); Dialog.MapString(s, s); ConvertFromUnicode(s);\r\t\ttvi.pszText := s; tvi.cchTextMax := LEN(s); tvi.lParam := f.curindex;\r\t\tIF tn.IsFolder() THEN\r\t\t\tIF tn.IsExpanded() THEN tvi.iImage := f.openimg\r\t\t\tELSE tvi.iImage := f.folderimg\r\t\t\tEND\r\t\tELSE\r\t\t\ttvi.iImage := f.leafimg\r\t\tEND;\r\t\ttvi.iSelectedImage := tvi.iImage; tvins.item := tvi;\r\t\ttvins.hParent := SYSTEM.VAL(WinCtl.Ptr_TREEITEM, pWndAdr);\r\t\tIF f.sorted THEN tvins.hInsertAfter := SYSTEM.VAL(WinCtl.Ptr_TREEITEM, WinCtl.TVI_SORT)\r\t\tELSE tvins.hInsertAfter := SYSTEM.VAL(WinCtl.Ptr_TREEITEM, WinCtl.TVI_LAST)\r\t\tEND;\r\t\twndAdr := WinApi.SendMessageW(f.i.ctrl, WinCtl.TVM_INSERTITEMW, 0, SYSTEM.ADR(tvins));\r\t\tf.treeArray[f.curindex].wndAdr := wndAdr;\r\t\tIF p # NIL THEN\r\t\t\tIF p.IsExpanded() THEN\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinCtl.TVM_EXPAND, WinCtl.TVE_EXPAND, pWndAdr)\r\t\t\tELSE\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinCtl.TVM_EXPAND, WinCtl.TVE_COLLAPSE, pWndAdr)\r\t\t\tEND\r\t\tEND;\r\t\tINC(f.curindex)\r\tEND WinInsertItem;\r\r\tPROCEDURE (f: TreeFrame) InsertNode(tn: Dialog.TreeNode; pWndAdr: INTEGER), NEW;\r\t\tVAR wndAdr: INTEGER;\r\tBEGIN\r\t\tIF tn # NIL THEN\r\t\t\tf.WinInsertItem(tn, pWndAdr, wndAdr);\r\t\t\tf.InsertNode(f.Child(f, tn), wndAdr);\r\t\t\tf.InsertNode(f.Next(f, tn), pWndAdr)\r\t\tEND\r\tEND InsertNode;\r\r\tPROCEDURE (f: TreeFrame) UpdateList;\r\t\tVAR res, len, i: INTEGER; done: BOOLEAN; sel: Dialog.TreeNode;\r\tBEGIN\r\t\tf.inUpdateList := TRUE;\r\t\tlen := 0; f.curindex := 0; sel := f.Selected(f);\r\t\tlen := f.NofNodes(f); IF len > 0 THEN NEW(f.treeArray, len) END;\r\t\t(* "
                    attr: 0
                  - text: Throw away the old windows control and create a new one
                    attr: 1
                  - text: " *)\r\t\tf.Recreate();\r\t\t(* "
                    attr: 0
                  - text: Go through the tree and insert new nodes into the treeview
                    attr: 1
                  - text: " *)\r\t\tf.InsertNode(f.Child(f, NIL), WinCtl.TVI_ROOT);\r\t\t(* "
                    attr: 0
                  - text: Select the node that is selected
                    attr: 1
                  - text: " *)\r\t\tIF sel = NIL THEN\r\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinCtl.TVM_SELECTITEM, WinCtl.TVGN_CARET, 0)\r\t\tELSE\r\t\t\ti := 0; done := FALSE;\r\t\t\tWHILE (i < len) & (~done) DO\r\t\t\t\tIF sel = f.treeArray[i].tn THEN\r\t\t\t\t\tres := WinApi.SendMessageW(\r\t\t\t\t\t\tf.i.ctrl, WinCtl.TVM_SELECTITEM, WinCtl.TVGN_CARET, f.treeArray[i].wndAdr);\r\t\t\t\t\tdone := TRUE\r\t\t\t\tEND;\r\t\t\t\tINC(i)\r\t\t\tEND\r\t\tEND;\r\t\tf.Select(f, sel);\r\t\tf.Update;\r\t\tIF f.i.hasFocus THEN res := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_SETFOCUS, 0, 0) END;\r\t\tf.inUpdateList := FALSE\r\tEND UpdateList;\r\r\tPROCEDURE (f: TreeFrame) ExpandCollapse(index, action: INTEGER), NEW;\r\t\tVAR res: INTEGER; tn: Dialog.TreeNode; tvi: WinCtl.TVITEMW;\r\tBEGIN\r\t\ttn := f.treeArray[index].tn;\r\t\tIF action = WinCtl.TVE_COLLAPSE THEN\r\t\t\tf.SetExpansion(f, tn, FALSE)\r\t\tELSIF action = WinCtl.TVE_EXPAND THEN\r\t\t\tf.SetExpansion(f, tn, TRUE)\r\t\tELSIF action = WinCtl.TVE_TOGGLE THEN\r\t\t\tf.SetExpansion(f, tn, ~tn.IsExpanded())\r\t\tEND;\r\t\ttvi.mask := WinCtl.TVIF_IMAGE + WinCtl.TVIF_SELECTEDIMAGE;\r\t\ttvi.hItem := SYSTEM.VAL(WinCtl.Ptr_TREEITEM, f.treeArray[index].wndAdr);\r\t\tIF tn.IsExpanded() THEN\r\t\t\ttvi.iImage := f.openimg; tvi.iSelectedImage := f.openimg\r\t\tELSE\r\t\t\ttvi.iImage := f.folderimg; tvi.iSelectedImage := f.folderimg\r\t\tEND;\r\t\tres := WinApi.SendMessageW(f.i.ctrl, WinCtl.TVM_SETITEMW, 0, SYSTEM.ADR(tvi))\r\tEND ExpandCollapse;\r\r\tPROCEDURE (f: TreeFrame) DblClickOk (x, y: INTEGER): BOOLEAN;\r\t\tVAR res: INTEGER; hinf: WinCtl.TVHITTESTINFO;\r\tBEGIN\r\t\thinf.pt.x := x DIV f.unit; hinf.pt.y := y DIV f.unit;\r\t\tres := WinApi.SendMessageW(f.i.ctrl, WinCtl.TVM_HITTEST, 0, SYSTEM.ADR(hinf));\r\t\tIF hinf.hItem = NIL THEN\r\t\t\tRETURN FALSE\r\t\tELSE\r\t\t\t"
                    attr: 0
