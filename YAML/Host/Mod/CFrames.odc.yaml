                    attr: 1
                  - text: "\t\t\tASSERT(f.rider # NIL, 100); ASSERT(f.rider.Base() # NIL, 101);\r\t\t\tres := WinApi.DestroyWindow(f.i.wnd);\r\t\t\tf.i.wnd := 0; f.i.ctrl := 0\r\t\tEND\r\t\t(*f.Close^*)\r\tEND Close;\r\r\tPROCEDURE (f: ListBox) Update;\r\t\tVAR res, i, j: INTEGER;\r\tBEGIN\r\t\tIF ~f.disabled THEN\r\t\t\tIF WinApi.IsWindowEnabled(f.i.ctrl) = 0 THEN res := WinApi.EnableWindow(f.i.ctrl, 1) END;\r\t\t\tIF f.undef THEN i := -1 ELSE f.Get(f, i) END; j := i;\r\t\t\tIF f.i.dropDown THEN\r\t\t\t\tIF (i < 0) OR (i >= WinApi.SendMessageW(f.i.ctrl, WinApi.CB_GETCOUNT, 0, 0)) THEN j := -1\r\t\t\t\tELSIF f.sorted THEN\r\t\t\t\t\tj := 0;\r\t\t\t\t\tWHILE i # WinApi.SendMessageW(f.i.ctrl, WinApi.CB_GETITEMDATA, j, 0) DO INC(j) END\r\t\t\t\tEND;\r\t\t\t\ti := WinApi.SendMessageW(f.i.ctrl, WinApi.CB_GETCURSEL, j, 0);\r\t\t\t\tIF i # j THEN res := WinApi.SendMessageW(f.i.ctrl, WinApi.CB_SETCURSEL, j, 0) END\r\t\t\tELSE\r\t\t\t\tIF WinApi.IsWindowEnabled(f.i.ctrl) = 0 THEN res := WinApi.EnableWindow(f.i.ctrl, 1) END;\r\t\t\t\tIF (i < 0) OR (i >= WinApi.SendMessageW(f.i.ctrl, WinApi.LB_GETCOUNT, 0, 0)) THEN j := -1\r\t\t\t\tELSIF f.sorted THEN\r\t\t\t\t\tj := 0;\r\t\t\t\t\tWHILE i # WinApi.SendMessageW(f.i.ctrl, WinApi.LB_GETITEMDATA, j, 0) DO INC(j) END\r\t\t\t\tEND;\r\t\t\t\ti := WinApi.SendMessageW(f.i.ctrl, WinApi.LB_GETCURSEL, j, 0);\r\t\t\t\tIF i # j THEN res := WinApi.SendMessageW(f.i.ctrl, WinApi.LB_SETCURSEL, j, 0) END\r\t\t\tEND\r\t\tELSE\r\t\t\tIF WinApi.IsWindowEnabled(f.i.ctrl) # 0 THEN\r\t\t\t\tIF f.i.dropDown THEN\r\t\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.CB_SETCURSEL, -1, 0)\r\t\t\t\tELSE\r\t\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.LB_SETCURSEL, -1, 0)\r\t\t\t\tEND;\r\t\t\t\tres := WinApi.EnableWindow(f.i.ctrl, 0)\r\t\t\tEND\r\t\tEND;\r\t\tIF f.readOnly # f.i.readOnly THEN\r\t\t\tres := WinApi.InvalidateRect(f.i.ctrl, NIL, 1);\r\t\t\tf.i.readOnly := f.readOnly\r\t\tEND;\r\t\tres := WinApi.UpdateWindow(f.i.ctrl)\r\tEND Update;\r\r\tPROCEDURE (f: ListBox) UpdateList;\r\t\tVAR res, i: INTEGER; s: Dialog.String;\r\tBEGIN\r\t\tIF f.i.dropDown THEN\r\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.CB_RESETCONTENT, 0, 0);\r\t\t\ti := 0; f.GetName(f, i, s);\r\t\t\tDialog.MapString(s, s); ConvertFromUnicode(s);\r\t\t\tWHILE s # \"\" DO\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.CB_ADDSTRING, 0, SYSTEM.ADR(s));\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.CB_SETITEMDATA, res, i);\r\t\t\t\tINC(i); f.GetName(f, i, s); Dialog.MapString(s, s); ConvertFromUnicode(s);\r\t\t\tEND;\r\t\t\tAdapt(f, f.i)\r\t\tELSE\r\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.LB_RESETCONTENT, 0, 0);\r\t\t\ti := 0; f.GetName(f, i, s);\r\t\t\tDialog.MapString(s, s); ConvertFromUnicode(s);\r\t\t\tWHILE s # \"\" DO\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.LB_ADDSTRING, 0, SYSTEM.ADR(s));\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.LB_SETITEMDATA, res, i);\r\t\t\t\tINC(i); f.GetName(f, i, s); Dialog.MapString(s, s); ConvertFromUnicode(s);\r\t\t\tEND\r\t\tEND;\r\t\tf.Update\r\tEND UpdateList;\r\r\tPROCEDURE (f: ListBox) Restore (l, t, r, b: INTEGER);\r\t\tVAR i, res, w, h: INTEGER; style: SET; s: ARRAY 512 OF CHAR;\r\tBEGIN\r\t\tIF f.i.ctrl = 0 THEN\t"
