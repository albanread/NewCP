                    attr: 1
                  - text: "Open(f, \"COMBOBOX\", \"\", style, WinApi.WS_EX_CLIENTEDGE, f.i); i := 0;\r\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.CB_SETEXTENDEDUI, 1, 0);\r\t\t\tWHILE i < numColors DO\r\t\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.CB_ADDSTRING, 0, colors[i]);\r\t\t\t\tINC(i)\r\t\t\tEND;\r\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.CB_ADDSTRING, 0, -1);\r\t\t\tAdapt(f, f.i)\r\t\tEND;\r\t\tf.Update;\r\t\tIF f.i.wnd # 0 THEN Paint(f, f.i) ELSE Print(f, f.dot, -1, -1, \"\") END\r\tEND Restore;\r\r\tPROCEDURE (f: ColorField) MouseDown (x, y: INTEGER; buttons: SET);\r\tBEGIN\r\t\tASSERT(~f.disabled, 100);\r\t\tIF f.rider # NIL THEN\r\t\t\tHandleMouse(f.i.wnd, x DIV f.unit, y DIV f.unit, buttons)\r\t\tEND\r\tEND MouseDown;\r\r\tPROCEDURE (f: ColorField) KeyDown (ch: CHAR);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tASSERT(~f.disabled, 100);\r\t\tIF ch = \" \" THEN\r\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_KEYDOWN, ORD(ch), 0);\r\t\t\tres := WinApi.SendMessageW(f.i.ctrl, WinApi.WM_KEYUP, ORD(ch), 0)\r\t\tELSE SendKey(ch, f.i.ctrl)\r\t\tEND\r\tEND KeyDown;\r\r\tPROCEDURE (f: ColorField) Mark (on, focus: BOOLEAN);\r\tBEGIN\r\t\tMark(on, f.front, f.i)\r\tEND Mark;\r\r\r\r\t"
