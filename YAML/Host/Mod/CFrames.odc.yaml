                    attr: 1
                  - text: "\r\t\tupdateAllowed: BOOLEAN;\r\t\tcolors: ARRAY numColors OF Ports.Color;\r"
                    attr: 0
                  - text: "\t\t(* date format *)"
                    attr: 1
                  - text: "\r\t\tdateSep: CHAR;\t"
                    attr: 0
