                  - text: "\r\t\t\tIF (Controllers.doubleClick IN buttons) & ODD(res DIV 8) THEN\t"
                    attr: 0
                  - text: "(* DblClks IN classStyle *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF ODD(b) THEN m := WinApi.WM_LBUTTONDBLCLK ELSE m := WinApi.WM_RBUTTONDBLCLK END\r\t\t\tELSE\r\t\t\t\tIF ODD(b) THEN m := WinApi.WM_LBUTTONDOWN ELSE m := WinApi.WM_RBUTTONDOWN END\r\t\t\tEND;\r\t\t\tres := WinApi.SendMessageW(wnd, m, b, pt.x + pt.y * 65536)\r\t\tEND;\r\t\tREPEAT\r\t\t\tres := WinApi.GetMessageW(msg, 0, 0, 0);\r\t\t\tIF (msg.message >= WinApi.WM_MOUSEMOVE) & (msg.message <= WinApi.WM_MBUTTONDBLCLK) THEN\r\t\t\t\tb := msg.wParam\r\t\t\tEND;\r\t\t\tres := WinApi.TranslateMessage(msg);\r\t\t\tres := WinApi.DispatchMessageW(msg)\r\t\tUNTIL b MOD 4 = 0;\r\t\tinHandleMouse := FALSE; Kernel.PopTrapCleaner(tc)\r\tEND HandleMouse;\r\r\tPROCEDURE HandleWheel (wnd: WinApi.HANDLE; x, y: INTEGER; op, nofLines: INTEGER;\r\t\tVAR done: BOOLEAN\r\t);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF op = Controllers.incPage THEN\r\t\t\tres := WinApi.SendMessageW(wnd, WinApi.WM_VSCROLL, WinApi.SB_PAGEDOWN, WinApi.NULL)\r\t\tELSIF op = Controllers.decPage THEN\r\t\t\tres := WinApi.SendMessageW(wnd, WinApi.WM_VSCROLL, WinApi.SB_PAGEUP, WinApi.NULL)\r\t\tELSE\r\t\t\tIF op = Controllers.incLine THEN\r\t\t\t\top := WinApi.SB_LINEDOWN\r\t\t\tELSE\r\t\t\t\top := WinApi.SB_LINEUP\r\t\t\tEND;\r\t\t\tWHILE nofLines > 0 DO\r\t\t\t\tres := WinApi.SendMessageW(wnd, WinApi.WM_VSCROLL, op, WinApi.NULL);\r\t\t\t\tDEC(nofLines)\r\t\t\tEND\r\t\tEND;\r\t\tdone := TRUE\r\tEND HandleWheel;\r\r\tPROCEDURE Mark (on, focus: BOOLEAN; VAR i: Info);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF focus THEN\r\t\t\tIF on THEN\r\t\t\t\tIF ~i.hasFocus THEN\r\t\t\t\t\tres := WinApi.SendMessageW(i.ctrl, WinApi.WM_SETFOCUS, 0, 0);\r\t\t\t\t\ti.hasFocus := TRUE\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tIF i.hasFocus THEN\r\t\t\t\t\tres := WinApi.SendMessageW(i.ctrl, WinApi.WM_KILLFOCUS, 0, 0);\r\t\t\t\t\ti.hasFocus := FALSE\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND Mark;\r\r\tPROCEDURE SetLabel (IN in: ARRAY OF CHAR; OUT out: ARRAY OF CHAR);\r\tBEGIN\r\t\tDialog.MapString(in, out); ConvertFromUnicode(out);\r\tEND SetLabel;\r\r\tPROCEDURE CheckLabel (IN label: ARRAY OF CHAR; ctrl: INTEGER);\r\t\tVAR res: INTEGER; lbl, s: Dialog.String;\r\tBEGIN\r\t\tDialog.MapString(label, lbl);\r\t\tConvertFromUnicode(lbl);\r\t\tres := WinApi.GetWindowTextW(ctrl, s, LEN(s));\r\t\tIF s # lbl THEN res := WinApi.SetWindowTextW(ctrl, lbl) END\r\tEND CheckLabel;\r\r\t"
