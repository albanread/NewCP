                  - text: "*: BOOLEAN; (* to disable the main window handler in HostMenus *)\r\t\tbrushes: BrushCache;\r\t\t\r\r\t"
                    attr: 0
                  - text: "(* auxiliary procedures *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE ConvertFromUnicode (VAR s: ARRAY OF CHAR);\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\ti := 0;\r\t\tWHILE s[i] # 0X DO\r\t\t\tINC(i)\r\t\tEND\r\tEND ConvertFromUnicode;\r\r\tPROCEDURE ConvertToUnicode (VAR s: ARRAY OF CHAR);\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\ti := 0;\r\t\tWHILE s[i] # 0X DO\r\t\t\tINC(i)\r\t\tEND\r\tEND ConvertToUnicode;\r\r\tPROCEDURE GetSize (f: StdCFrames.Frame; VAR x, y, w, h: INTEGER);\r\t\tVAR u, x0, y0: INTEGER;\r\tBEGIN\r\t\tu := f.unit; f.view.context.GetSize(w, h); x0 := f.gx; y0 := f.gy;\r"
                    attr: 0
                  - text: "\t\t"
                    attr: 3
                  - text: "x := x0 DIV u; y := y0 DIV u;\r\t\tw := (x0 + w) DIV u - x; h := (y0 + h) DIV u - y;\r\t\tIF (SubclassCtl # NIL)\r\t\t\t& ((f IS Field) OR (f IS UpDownField) OR (f IS TimeField) OR (f IS DateField)\r\t\t\t\tOR (f IS ColorField) OR (f IS ListBox) OR (f IS SelectionBox) OR (f IS ComboBox)) THEN\r\t\t\tINC(x, 1); INC(y, 1); DEC(w, 2); DEC(h, 2)\t"
                    attr: 0
                  - text: "(* space for 3d border *)"
                    attr: 1
                  - text: "\r\t\tEND"
                    attr: 0
                  - text: "\r"
                    attr: 3
                  - text: "\tEND GetSize;\r\r\tPROCEDURE Adapt (f: StdCFrames.Frame; VAR i: Info);\r\t\tVAR res, x, y, w, h, cx, cy, cw, ch, udw, n, h0, h1: INTEGER; r: HostPorts.Rider;\r\tBEGIN\r\t\tIF i.wnd # 0 THEN\r\t\t\tr := f.rider(HostPorts.Rider);\r\t\t\tIF r.port.wnd # 0 THEN\t"
                    attr: 0
                  - text: "(* port is a window *)"
                    attr: 1
                  - text: "\r\t\t\t\tGetSize(f, x, y, w, h);\r\t\t\t\tIF i.dropDown THEN\r\t\t\t\t\tn := WinApi.SendMessageW(i.ctrl, WinApi.CB_GETCOUNT, 0, 0);\r\t\t\t\t\th0 := WinApi.SendMessageW(i.ctrl, WinApi.CB_GETITEMHEIGHT, -1, 0);\r\t\t\t\t\th1 := WinApi.SendMessageW(i.ctrl, WinApi.CB_GETITEMHEIGHT, 0, 0);\r\t\t\t\t\tIF n < 1 THEN n := 1 ELSIF n > 8 THEN n := 8 END;\r\t\t\t\t\th := h0 + h1 * n + 8\r\t\t\t\tEND;\r\t\t\t\tcx := r.l; cy := r.t; cw := r.r - r.l; ch := r.b - r.t;\r\t\t\t\tIF (cx # i.x1) OR (cy # i.y1) OR (cw # i.w1) OR (ch # i.h1) THEN\r\t\t\t\t\ti.x1 := cx; i.y1 := cy; i.w1 := cw; i.h1 := ch;\r\t\t\t\t\tres := WinApi.MoveWindow(i.wnd, cx, cy, cw, ch, 0)\r\t\t\t\tEND;\r\t\t\t\tDEC(x, cx); DEC(y, cy);\r\t\t\t\tIF (x # i.x2) OR (y # i.y2) OR (w # i.w2) OR (h # i.h2) THEN\r\t\t\t\t\ti.x2 := x; i.y2 := y; i.w2 := w; i.h2 := h;\r\t\t\t\t\tIF i.ud # 0 THEN\r\t\t\t\t\t\tudw := upDownWidth DIV f.unit;\r\t\t\t\t\t\tres := WinApi.MoveWindow(i.ud, x + w - udw, y + 1, udw, h - 2, 0);\r\t\t\t\t\t\tDEC(w, udw);\r\t\t\t\t\t\tIF SubclassCtl # NIL THEN DEC(w) END\r\t\t\t\t\tEND;\r\t\t\t\t\tres := WinApi.MoveWindow(i.ctrl, x, y, w, h, 0)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND Adapt;\r\r\tPROCEDURE BkGndColor (f: Views.Frame): Ports.Color;\r\t\tVAR bgnd: Ports.Color; g: Views.Frame;\r\tBEGIN\r\t\tg := f;\r\t\tREPEAT\r\t\t\tg := Views.HostOf(g);\r\t\t\tbgnd := Views.transparent;\r\t\t\tg.view.GetBackground(bgnd)\r\t\tUNTIL bgnd # Views.transparent;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " bgnd\r\tEND BkGndColor;\r\r\tPROCEDURE Open (f: StdCFrames.Frame; class, name: WinApi.PtrWSTR;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tstyle, ex: SET; VAR i: Info);\r\t\tVAR res, x, y, w, h, cx, cy, cw, ch, udw: INTEGER; p: HostPorts.Port; s: SET; r: Ports.Rider;\r\tBEGIN\r\t\tf.noRedraw := TRUE;\r\t\tr := f.rider; GetSize(f, x, y, w, h);\r\t\tr.GetRect(cx, cy, cw, ch); cw := cw - cx; ch := ch - cy;\r\t\tp := f.rider(HostPorts.Rider).port;\r\t\tIF p.wnd # 0 THEN\t"
                    attr: 0
                  - text: "(* port is a window *)"
                    attr: 1
                  - text: "\r\t\t\ti.bkgnd := BkGndColor(f);\r\t\t\ts := {27, 30};"
                    attr: 0
                  - text: "\t(* disabled, child *)\r"
                    attr: 1
                  - text: "\t\t\ti.wnd := WinApi.CreateWindowExW({}, \"Oberon Ctrl\", \"\", s, cx, cy, cw, ch, p.wnd, 0, instance, 0);\r\t\t\tIF i.wnd # 0 THEN\r\t\t\t\tDEC(x, cx); DEC(y, cy);\r\t\t\t\tres := WinApi.SetWindowLongW(i.wnd, dlgWindowExtra, SYSTEM.VAL(INTEGER, f));\r\t\t\t\ti.ctrl := WinApi.CreateWindowExW(ex, class, name, style, x, y, w, h, i.wnd, 0, instance, 0);\r\t\t\t\tIF i.ctrl # 0 THEN\r\t\t\t\t\tIF (SubclassCtl # NIL) & ~(f IS PushButton) THEN SubclassCtl(i.ctrl) END;\r\t\t\t\t\tIF f.font # NIL THEN\r\t\t\t\t\t\tres := WinApi.SendMessageW(i.ctrl, WinApi.WM_SETFONT, f.font(HostFonts.Font).dev.id, 0)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF (f IS UpDownField) OR (f IS TimeField) OR (f IS DateField) THEN\r\t\t\t\t\t\tstyle := {23, 28, 30} + WinCtl.UDS_ALIGNRIGHT + WinCtl.UDS_ARROWKEYS;\r\t\t\t\t\t\tudw := upDownWidth DIV f.unit;\r\t\t\t\t\t\ti.ud := WinCtl.CreateUpDownControl(style, x + w - udw, y, udw, h, i.wnd, 0, instance, 0, 1, 0, 0)\r\t\t\t\t\tEND;\r\t\t\t\t\t"
                    attr: 0
                  - text: "Adapt(f, i);"
                    attr: 3
                  - text: "\r\t\t\t"
                    attr: 0
                  - text: "\t\t"
                    attr: 1
                  - text: "res := WinApi.ShowWindow(i.wnd, 1);\r\t\t\t\t\tres := WinApi.ShowWindow(i.ctrl, 1);\r\t\t\t\t\tIF i.ud # 0 THEN res := WinApi.ShowWindow(i.ud, 1) END\r\t\t\t\tELSE res := WinApi.DestroyWindow(i.wnd); i.wnd := 0\r\t\t\t\tEND\r\t\t\tELSE i.ctrl := 0\r\t\t\tEND\r\t\tELSE\t"
                    attr: 0
                  - text: "(* port is a printer -> define temp windows *)\r\t\t\t"
                    attr: 1
                  - text: "i.wnd := 0; i.ctrl := 0\r(*\r\t\t\ts := {27, 31};"
                    attr: 0
                  - text: "\t(* disabled, popup *)\r"
                    attr: 1
                  - text: "\t\t\ti.wnd := WinApi.CreateWindowExW({}, \"Oberon Ctrl\", \"\", s, scW - cw, scH - ch, cw, ch, 0, 0, instance, 0);\r\t\t\tres := WinApi.SetWindowLongW(i.wnd, dlgWindowExtra, SYSTEM.VAL(LONGINT, f));\r\t\t\ti.ctrl := WinApi.CreateWindowExW({}, class, name, style, x - cx, y - cy, w, h, i.wnd, 0, instance, 0)\r*)\r\t\tEND\r\tEND Open;\r\r\tPROCEDURE Paint (f: StdCFrames.Frame; VAR i: Info);\r\t\tVAR res, u: INTEGER; r: HostPorts.Rider;\r\tBEGIN\r\t\tr := f.rider(HostPorts.Rider); u := f.unit;\r\t\t"
                    attr: 0
                  - text: "r.port.CloseBuffer;\r\t"
                    attr: 3
                  - text: "\tupdateAllowed := TRUE;\r\t\tres := WinApi.InvalidateRect(i.wnd, NIL, 0);\r\t\tres := WinApi.InvalidateRect(i.ctrl, NIL, 0);\r\t\tres := WinApi.UpdateWindow(i.wnd);\r\t\tres := WinApi.UpdateWindow(i.ctrl);\r\t\tIF i.ud # 0 THEN res := WinApi.UpdateWindow(i.ud) END;\r\t\tupdateAllowed := FALSE\r\tEND Paint;\r\r\tPROCEDURE PaintRect (f: StdCFrames.Frame; VAR i: Info; l, t, r, b: INTEGER);\r\t\tVAR res, u: INTEGER; ri: HostPorts.Rider; rect: WinApi.RECT;\r\tBEGIN\r\t\tri := f.rider(HostPorts.Rider); u := f.unit;\r\t\t"
                    attr: 0
                  - text: "ri.port.CloseBuffer;\r\t"
                    attr: 3
                  - text: "\tupdateAllowed := TRUE;\r\t\trect.left := l DIV f.unit; rect.top := t DIV f.unit; rect.right := r DIV f.unit; rect.bottom := b DIV f.unit;\r\t\trect.left := rect.left; rect.top := rect.top; rect.right := rect.right; rect.bottom := rect.bottom ;\r\t\t(* round up if possible *)\r\t\tIF rect.left > i.x1 THEN rect.left := rect.left - 1 END;\r\t\tIF rect.top > i.y1 THEN rect.top := rect.top - 1 END;\r\t\tIF rect.right < i.x1 + i.w1 THEN rect.right := rect.right + 1 END;\r\t\tIF rect.bottom < i.y1 + i.h1 THEN rect.bottom := rect.bottom + 1 END;\r\t\tres := WinApi.InvalidateRect(i.wnd, rect, 0);\r\t\tres := WinApi.InvalidateRect(i.ctrl, rect, 0);\r\t\tres := WinApi.UpdateWindow(i.wnd);\r\t\tres := WinApi.UpdateWindow(i.ctrl);\r\t\tIF i.ud # 0 THEN res := WinApi.UpdateWindow(i.ud) END;\r\t\tupdateAllowed := FALSE\r\tEND PaintRect;\r\r\tPROCEDURE ExtractLine (IN s: ARRAY OF CHAR; beg: INTEGER; fnt: Fonts.Font; maxW: INTEGER;\r\t\tOUT line: Dialog.String; OUT lineW, end: INTEGER\r\t);\r\t\tVAR i, len, w: INTEGER; ch: CHAR;\r\tBEGIN\r\t\tlen := LEN(s$);\r\t\tASSERT(beg >= 0, 20); ASSERT(beg < LEN(s$), 21); ASSERT(maxW > 0, 22); ASSERT(fnt # NIL, 23);\r\t\ti := 0; end := beg; lineW := 0; w := 0;\r\t\tREPEAT\r\t\t\tch := s[i + beg];\r\t\t\tIF ch <= \" \" THEN end := i + beg; lineW := w END;\r\t\t\tline[i] := ch; INC(i); line[i] := 0X; w := fnt.StringWidth(line);\r\t\t\tIF (w <= maxW) & ((ch = \"-\") OR (ch = \"_\")) THEN end := i + beg; lineW := w END\r\t\tUNTIL (i + beg = len) OR (w > maxW);\r\t\tIF w <= maxW THEN end := beg + i; line[end - beg] := 0X; lineW := w\r\t\tELSIF end # beg THEN line[end - beg] := 0X\r\t\tELSE end := beg + i - 1; line[i - 1] := 0X; lineW := fnt.StringWidth(line)\r\t\tEND;\r\t\tASSERT(end > beg, 80)\r\tEND ExtractLine;\r\r\tPROCEDURE PrintString (f: Views.Frame; w: INTEGER;\r\t\tIN string: ARRAY OF CHAR; fnt: Fonts.Font; col: Ports.Color;\r\t\tx0, y0: INTEGER; left, right, multiLine: BOOLEAN\r\t);\r\t\tVAR x, sw, asc, dsc, fw, beg, end, len, n: INTEGER; s: Dialog.String;\r\tBEGIN\r\t\tfnt.GetBounds(asc, dsc, fw); sw := fnt.StringWidth(string);\r\t\tw := MAX(fw, w - 2 * x0); (* ensures that always at least one character fits *)\r\t\tbeg := 0; len := LEN(string$); n := 0;\r\t\tWHILE beg < len DO\r\t\t\tIF multiLine THEN ExtractLine(string, beg, fnt, w, s, sw, end)\r\t\t\tELSE s := string$; sw := fnt.StringWidth(s); end := len\r\t\t\tEND;\r\t\t\tIF ~left & ~right THEN x := (w - sw) DIV 2 ELSIF right & ~left THEN x := w - sw ELSE x := 0 END;\r\t\t\tf.DrawString(x0 + x, n * (asc + dsc) + y0, col, s, fnt);\r\t\t\tbeg := end; INC(n);\r\t\t\tIF (beg < len) & (string[beg] = \" \") THEN INC(beg) END\r\t\tEND\r\tEND PrintString;\r\r\tPROCEDURE Print (f: StdCFrames.Frame; d, x, y: INTEGER; label: ARRAY OF CHAR);\r\t\tVAR w, h, sw, a, asc, dsc, fw: INTEGER; font: Fonts.Font; on: BOOLEAN;\r\tBEGIN\r\t\tIF f.font # NIL THEN font := f.font ELSE font := HostFonts.dlgFont END;\r\t\tf.view.context.GetSize(w, h);\r\t\tfont.GetBounds(asc, dsc, fw);\r\t\tIF x < 0 THEN sw := font.StringWidth(label); x := (w - sw) DIV 2 END;\r\t\tIF y < 0 THEN y := (h + asc - dsc) DIV 2\r\t\tELSIF y = 0 THEN y := asc\r\t\tEND;\r\t\ta := (h - 8 * Ports.point) DIV 2;\r\t\tIF d = -1 THEN\r\t\t\tf.DrawRect(2 * Ports.point, a, 10 * Ports.point, a + 8 * Ports.point, f.dot, Ports.defaultColor);\r\t\t\tIF (f IS CheckBox) & (f(CheckBox).Get # NIL) THEN\r\t\t\t\tf(CheckBox).Get(f(CheckBox), on);\r\t\t\t\tIF on THEN\r\t\t\t\t\tf.DrawLine(\r\t\t\t\t\t\t2 * Ports.point + 2 * f.dot, a + 4 * Ports.point, 5 * Ports.point, a + 8 * Ports.point - 2 * f.dot,\r\t\t\t\t\t\t2 * Ports.point, Ports.defaultColor\r\t\t\t\t\t\t);\r\t\t\t\t\tf.DrawLine(\r\t\t\t\t\t\t5 * Ports.point, a + 8 * Ports.point - 2 * f.dot, 10 * Ports.point - 2 * f.dot, a + 2 * f.dot,\r\t\t\t\t\t\t2 * Ports.point, Ports.defaultColor\r\t\t\t\t\t\t)\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSIF d = -2 THEN f.DrawOval(2 * Ports.point, a, 10 * Ports.point, a + 8 * Ports.point, f.dot, Ports.defaultColor);\r\t\t\tIF f(RadioButton).Get # NIL THEN f(RadioButton).Get(f(RadioButton), on);\r\t\t\t\tIF on THEN f.DrawOval(2*Ports.point + 2*f.dot, a+2*f.dot,\r\t\t\t\t\t\t\t\t\t\t\t10*Ports.point - 2*f.dot, a + 8*Ports.point-2*f.dot, Ports.fill, Ports.black)\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSIF d = -3 THEN\r\t\t\tf.DrawRect(0, MIN(asc - f.dot, h), w, MAX(asc - f.dot, h), f.dot, Ports.defaultColor);\r\t\t\tf.DrawRect(x, y - asc, x + font.StringWidth(label), y + dsc, Ports.fill, Ports.background)\r\t\tELSIF d > 0 THEN f.DrawRect(0, 0, w, h, d, Ports.defaultColor)\r\t\tEND;\r(*\r\t\tWITH f: Field DO\r\t\t\tIF f.right & ~f.left THEN x := w - x - font.SStringWidth(label)\r\t\t\tELSIF ~f.right & ~f.left THEN x := (w DIV 2) - (font.SStringWidth(label) DIV 2)\r\t\t\tEND\r\t\t| f: Caption DO\r\t\t\tIF f.right & ~f.left THEN x := w - x - font.SStringWidth(label)\r\t\t\tELSIF ~f.right & ~f.left THEN x := (w DIV 2) - (font.SStringWidth(label) DIV 2)\r\t\t\tEND\r\t\tELSE\r\t\tEND;\r\t\tf.DrawSString(x, y, Ports.defaultColor, label, font)\r*)\r\t\tWITH f: Field DO\r\t\t\tPrintString(f, w, label, font, Ports.defaultColor, x, y, f.left, f.right, f.multiLine)\r\t\t| f: Caption DO\r\t\t\tPrintString(f, w, label, font, Ports.defaultColor, x, y, f.left, f.right, TRUE)\r\t\tELSE\r\t\t\tPrintString(f, w, label, font, Ports.defaultColor, x, y, TRUE, FALSE, FALSE)\r\t\tEND\r\tEND Print;\r\r\tPROCEDURE SendKey (ch: CHAR; wnd: WinApi.HANDLE);\r\t\tVAR res, code: INTEGER;\r\tBEGIN\r\t\tCASE ch OF\r\t\t| 10X: code := 21H\r\t\t| 11X: code := 22H\r\t\t| 12X: code := 21H\r\t\t| 13X: code := 22H\r\t\t| 14X: code := 24H\r\t\t| 15X: code := 23H\r\t\t| 16X: code := 24H\r\t\t| 17X: code := 23H\r\t\t| 1CX: code := 25H\r\t\t| 1DX: code := 27H\r\t\t| 1EX: code := 26H\r\t\t| 1FX: code := 28H\r\t\t| DEL: code := 2EH\r\t\tELSE code := 0\r\t\tEND;\r\t\tIF code # 0 THEN\r\t\t\tres := WinApi.SendMessageW(wnd, WinApi.WM_KEYDOWN, code, 0);\r\t\t\tres := WinApi.SendMessageW(wnd, WinApi.WM_KEYUP, code, 0)\r\t\tELSE\r\t\t\tres := WinApi.SendMessageW(wnd, WinApi.WM_CHAR, ORD(ch), 0)\r\t\tEND\r\tEND SendKey;\r\r\tPROCEDURE (t: TrapCleaner) Cleanup;\r\tBEGIN\r\t\tinHandleMouse := FALSE\r\tEND Cleanup;\r\r\tPROCEDURE HandleMouse (wnd: WinApi.HANDLE; x, y: INTEGER; buttons: SET);\r\t\tVAR res, b, hc, m: INTEGER; pt: WinApi.POINT; w: WinApi.HANDLE; msg: WinApi.MSG;\r\t\t\ttc: TrapCleaner;\r\tBEGIN\r\t\tNEW(tc); Kernel.PushTrapCleaner(tc); inHandleMouse := TRUE;\r\t\tres := WinApi.ReleaseCapture(); b := 0;\r\t\tIF HostPorts.left IN buttons THEN INC(b) END;\r\t\tIF HostPorts.right IN buttons THEN INC(b, 2) END;\r\t\tIF Controllers.extend IN buttons THEN INC(b, 4) END;\r\t\tIF Controllers.modify IN buttons THEN INC(b, 8) END;\r\t\tpt.x := x; pt.y := y;\r\t\tREPEAT\r\t\t\tw := wnd; wnd := WinApi.ChildWindowFromPoint(wnd, pt);\r\t\t\tres := WinApi.ClientToScreen(w, pt);\r\t\t\thc := WinApi.SendMessageW(wnd, WinApi.WM_NCHITTEST, 0, pt.x + pt.y * 65536);\r\t\t\tres := WinApi.ScreenToClient(wnd, pt)\r\t\tUNTIL (hc # 1) OR (w = wnd);\r\t\tIF hc > 1 THEN\r\t\t\tres := WinApi.ClientToScreen(wnd, pt);\r\t\t\tIF ODD(b) THEN m := WinApi.WM_NCLBUTTONDOWN ELSE m := WinApi.WM_NCRBUTTONDOWN END;\r\t\t\tres := WinApi.SendMessageW(wnd, m, hc, pt.x + pt.y * 65536)\r\t\tELSE\r\t\t\tres := WinApi.GetClassLongW(wnd, -26);\t"
                    attr: 0
