                    attr: 3
                  - text: " SYSTEM.VAL(INTEGER, hinf.hItem) = f.treeArray[f.selIndex].wndAdr\r\t\tEND\r\tEND DblClickOk;\r\r\tPROCEDURE (f: TreeFrame) MouseDown (x, y: INTEGER; buttons: SET);\r\tBEGIN\r\t\tASSERT(~f.disabled, 100);\r\t\tIF f.rider # NIL THEN\r\t\t\tHandleMouse(f.i.wnd, x DIV f.unit, y DIV f.unit, buttons)\r\t\tEND\r\tEND MouseDown;\r\r\tPROCEDURE (f: TreeFrame) WheelMove (x, y: INTEGER; op, nofLines: INTEGER; VAR done: BOOLEAN);\r\tBEGIN\r\t\tASSERT(~f.disabled, 100);\r\t\tIF f.rider # NIL THEN\r\t\t\tHandleWheel(f.i.ctrl, x, y, op, nofLines, done)\r\t\tEND\r\tEND WheelMove;\r\r\tPROCEDURE (f: TreeFrame) Restore (l, t, r, b: INTEGER);\r\tBEGIN\r\t\tIF f.i.ctrl = 0 THEN\t"
