                  - text: "\r**)\r\r\t(* ColorField, DateField, TimeField, UpDownField *)"
                    attr: 1
                  - text: "\r\r\tIMPORT\r\t\t"
                    attr: 0
                  - text: SYSTEM
                    attr: 3
                  - text: ", WinApi, WinCtl,\r\t\tKernel, Strings, Dates, Fonts, Ports, Views,\r\t\tControllers, Dialog, HostFonts, HostRegistry, HostPorts, HostWindows, StdCFrames;\r\r\tCONST\r\t\tENTER = 0DX; ESC = 1BX; DEL = 07X; BS = 08X; TAB = 09X; LTAB = 0AX;\r\t\tAL = 1CX; AR = 1DX; AU = 1EX; AD = 1FX;\r\t\tPL = 10X; PR = 11X; PU = 12X; PD = 13X;\r\t\tDL = 14X; DR = 15X; DU = 16X; DD = 17X;\r\t\tdlgWindowExtra = 30;\r\t\tdropDownHeight = 30 * Ports.point;\r\t\tupDownWidth = 11 * Ports.point;\r\t\tnumColors = 7;\r\t\tscrollRange = 16384;\r\r\tTYPE\r\t\tProcedure = PROCEDURE;\r\r\t\tInfo = RECORD\r\t\t\twnd, ctrl, ud: WinApi.HANDLE;\r\t\t\tx1, y1, w1, h1, x2, y2, w2, h2: INTEGER;\r\t\t\thasFocus, dropDown, readOnly, undef: BOOLEAN;\r\t\t\tbkgnd: Ports.Color\r\t\tEND;\r\r\t\tPushButton = POINTER TO RECORD (StdCFrames.PushButton)\r\t\t\ti: Info\r\t\tEND;\r\r\t\tCheckBox = POINTER TO RECORD (StdCFrames.CheckBox)\r\t\t\ti: Info\r\t\tEND;\r\r\t\tRadioButton = POINTER TO RECORD (StdCFrames.RadioButton)\r\t\t\ti: Info\r\t\tEND;\r\r\t\tScrollBar = POINTER TO RECORD (StdCFrames.ScrollBar)\r\t\t\ti: Info\r\t\tEND;\r\r\t\tField = POINTER TO RECORD (StdCFrames.Field)\r\t\t\ti: Info;\r\t\t\tisUpdate: BOOLEAN;\r\t\t\tdel: BOOLEAN (* "
                    attr: 0
                  - text: "needed know when an empty field is allowed. not perfect. "
                    attr: 1
                  - text: "*)\r\t\tEND;\r\r\t\tUpDownField = POINTER TO RECORD (StdCFrames.UpDownField)\r\t\t\ti: Info;\r\t\t\tval: INTEGER;\r\t\t\tisUpdate: BOOLEAN\r\t\tEND;\r\r\t\tDateField = POINTER TO RECORD (StdCFrames.DateField)\r\t\t\ti: Info;\r\t\t\tisUpdate: BOOLEAN;\r\t\t\tcnt, val: INTEGER\t"
                    attr: 0
                  - text: "(* input state: val = current val, cnt = number of key strokes *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\r\t\tTimeField = POINTER TO RECORD (StdCFrames.TimeField)\r\t\t\ti: Info;\r\t\t\tisUpdate: BOOLEAN;\r\t\t\tcur: INTEGER\r\t\tEND;\r\r\t\tColorField = POINTER TO RECORD (StdCFrames.ColorField)\r\t\t\ti: Info;\r\t\t\tcolor: Ports.Color\r\t\tEND;\r\r\t\tListBox = POINTER TO RECORD (StdCFrames.ListBox)\r\t\t\ti: Info\r\t\tEND;\r\r\t\tSelectionBox = POINTER TO RECORD (StdCFrames.SelectionBox)\r\t\t\ti: Info;\r\t\t\tnum: INTEGER\r\t\tEND;\r\r\t\tComboBox = POINTER TO RECORD (StdCFrames.ComboBox)\r\t\t\ti: Info;\r\t\t\tedit: WinApi.HANDLE\r\t\tEND;\r\r\t\tCaption = POINTER TO RECORD (StdCFrames.Caption)\r\t\t\ti: Info\r\t\tEND;\r\r\t\tGroup = POINTER TO RECORD (StdCFrames.Group)\r\t\t\ti: Info\r\t\tEND;\r\r\t\tTFInfo = RECORD\r\t\t\ttn: Dialog.TreeNode;\r\t\t\twndAdr: INTEGER\r\t\tEND;\r\r\t\tTreeFrame = POINTER TO RECORD (StdCFrames.TreeFrame)\r\t\t\ti: Info;\r\t\t\tinUpdateList: BOOLEAN;\r\t\t\ttreeArray: POINTER TO ARRAY OF TFInfo;\r\t\t\tcurindex, selIndex: INTEGER;\r\t\t\tfolderimg, openimg, leafimg: INTEGER;\r\t\t\thiml: WinCtl.Ptr_IMAGELIST\r\t\tEND;\r\r\t\tDirectory = POINTER TO RECORD (StdCFrames.Directory) END;\r\r\t\tTrapCleaner = POINTER TO RECORD (Kernel.TrapCleaner) END;\r\r\t\tBrushCache = POINTER TO RECORD\r\t\t\tnext: BrushCache;\r\t\t\tcol: Ports.Color;\r\t\t\tbrush: WinApi.HANDLE\r\t\tEND;\r\r\tVAR\r\t\tinstance: WinApi.HANDLE;\r\t\tSubclassCtl: PROCEDURE(wnd: WinApi.HANDLE);\r\t\tCtlColor: PROCEDURE(msg, wPar, lPar: INTEGER): INTEGER;\r\t\tscW, scH: INTEGER;\t"
                    attr: 0
