                  - text: "\tPROCEDURE HandleNotifyMsg (wnd: WinApi.HANDLE; lParam, out: INTEGER);\r\t\tVAR\r\t\t\tc: StdCFrames.Frame; ret: INTEGER;\r\t\t\tpnmhdr: WinApi.PtrNMHDR; pnmtv: WinCtl.PtrNMTREEVIEWW;\r\tBEGIN\r\t\tret := WinApi.FALSE;\r\t\tc := SYSTEM.VAL(StdCFrames.Frame, WinApi.GetWindowLongW(wnd, dlgWindowExtra));\r\t\tpnmhdr := SYSTEM.VAL(WinApi.PtrNMHDR, lParam);\r\t\tWITH c: TreeFrame DO\r\t\t\tIF c.i.ctrl # 0 THEN\r\t\t\t\tIF ~c.inUpdateList & c.readOnly & (pnmhdr.code = WinCtl.TVN_SELCHANGINGW) THEN\r\t\t\t\t\tret := WinApi.TRUE\r\t\t\t\tELSIF pnmhdr.code = WinCtl.TVN_SELCHANGEDW THEN\r\t\t\t\t\tpnmtv := SYSTEM.VAL(WinCtl.PtrNMTREEVIEWW, lParam);\r\t\t\t\t\tc.selIndex := pnmtv.itemNew.lParam;\r\t\t\t\t\tc.Select(c, c.treeArray[c.selIndex].tn)\r\t\t\t\tELSIF pnmhdr.code = WinCtl.TVN_ITEMEXPANDEDW THEN\r\t\t\t\t\tpnmtv := SYSTEM.VAL(WinCtl.PtrNMTREEVIEWW, lParam);\r\t\t\t\t\tc.ExpandCollapse(pnmtv.itemNew.lParam, pnmtv.action)\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE\r\t\tEND;\r\t\tSYSTEM.PUT(out, ret)\r\tEND HandleNotifyMsg;\r\r\tPROCEDURE HandleCommand (wnd: WinApi.HANDLE; wParam, lParam: INTEGER);\r\t\tVAR res, nc, i, j: INTEGER; c: StdCFrames.Frame; s: ARRAY 512 OF CHAR;\r\t\t\tps: POINTER TO ARRAY OF CHAR; b: BOOLEAN;\r\tBEGIN\r\t\tc := SYSTEM.VAL(StdCFrames.Frame, WinApi.GetWindowLongW(wnd, dlgWindowExtra));\r\t\tnc := wParam DIV 65536;\r\t\tWITH c: PushButton DO\r\t\t\tIF c.i.ctrl # 0 THEN\r\t\t\t\tIF nc = WinApi.BN_CLICKED THEN Execute(c)\r\t\t\t\tEND\r\t\t\tEND\r\t\t| c: CheckBox DO\r\t\t\tIF c.i.ctrl # 0 THEN\r\t\t\t\tIF nc = WinApi.BN_CLICKED THEN\r\t\t\t\t\ti := WinApi.SendMessageW(c.i.ctrl, WinApi.BM_GETCHECK, 0, 0);\r\t\t\t\t\tIF i = 0 THEN i := 1 ELSE i := 0 END;\r\t\t\t\t\tres := WinApi.SendMessageW(c.i.ctrl, WinApi.BM_SETCHECK, i, 0);\r\t\t\t\t\tc.undef := FALSE; c.Set(c, i = 1)\r(*\r\t\t\t\t\tc.undef := res = 2;\r\t\t\t\t\tc.Set(c, res = 1)\r*)\r\t\t\t\tEND\r\t\t\tEND\r\t\t| c: RadioButton DO\r\t\t\tIF c.i.ctrl # 0 THEN\r\t\t\t\tIF nc = WinApi.BN_CLICKED THEN\r\t\t\t\t\tres := WinApi.SendMessageW(c.i.ctrl, WinApi.BM_GETCHECK, 0, 0);\r\t\t\t\t\tc.Set(c, res # 0)\r\t\t\t\tEND\r\t\t\tEND\r\t\t| c: Field DO\r\t\t\tIF c.i.ctrl # 0 THEN\r\t\t\t\tIF (nc = WinApi.EN_CHANGE) & ~c.isUpdate THEN\r\t\t\t\t\tIF ~c.left THEN (* "
                    attr: 0
                  - text: right center alignment implies multiline which sends two update messages
                    attr: 1
                  - text: " *)\r\t\t\t\t\t\tIF c.maxLen > 255 THEN\r\t\t\t\t\t\t\tNEW(ps, 2 * c.maxLen + 1);\r\t\t\t\t\t\t\tres := WinApi.GetWindowTextW(c.i.ctrl, ps^, LEN(ps^));\r\t\t\t\t\t\t\tIF c.multiLine THEN DelLF(ps^) END;\r\t\t\t\t\t\t\tConvertToUnicode(ps^);\r\t\t\t\t\t\t\tIF c.del OR (ps$ # \"\") THEN c.Set(c, ps^) END\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tres := WinApi.GetWindowTextW(c.i.ctrl, s, LEN(s));\r\t\t\t\t\t\t\tIF c.multiLine THEN DelLF(s) END;\r\t\t\t\t\t\t\tConvertToUnicode(s);\r\t\t\t\t\t\t\tIF c.del OR (s$ # \"\") THEN c.Set(c, s) END\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE\r\t\t\t\t\t\tIF c.maxLen > 255 THEN\r\t\t\t\t\t\t\tNEW(ps, 2 * c.maxLen + 1);\r\t\t\t\t\t\t\tres := WinApi.GetWindowTextW(c.i.ctrl, ps^, LEN(ps^));\r\t\t\t\t\t\t\tIF c.multiLine THEN DelLF(ps^) END;\r\t\t\t\t\t\t\tConvertToUnicode(ps^);\r\t\t\t\t\t\t\tc.Set(c, ps^)\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tres := WinApi.GetWindowTextW(c.i.ctrl, s, LEN(s));\r\t\t\t\t\t\t\tIF c.multiLine THEN DelLF(s) END;\r\t\t\t\t\t\t\tConvertToUnicode(s);\r\t\t\t\t\t\t\tc.Set(c, s)\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\t| c: UpDownField DO\r\t\t\tIF c.i.ctrl # 0 THEN\r\t\t\t\tIF (nc = WinApi.EN_CHANGE) & ~c.isUpdate THEN\r\t\t\t\t\tres := WinApi.GetWindowTextW(c.i.ctrl, s, LEN(s));\r\t\t\t\t\tStrings.StringToInt(s, c.val, res);\r\t\t\t\t\tc.Set(c, c.val)\r\t\t\t\tEND\r\t\t\tEND\r\t\t| c: ColorField DO\r\t\t\tIF c.i.ctrl # 0 THEN\r\t\t\t\tIF nc = WinApi.CBN_SELCHANGE THEN\r\t\t\t\t\ti := WinApi.SendMessageW(c.i.ctrl, WinApi.CB_GETCURSEL, 0, 0);\r\t\t\t\t\tIF i = numColors THEN\r\t\t\t\t\t\tDialog.GetColor(c.color, i, b);\r\t\t\t\t\t\tIF b THEN c.Set(c, i); c.Update END\r\t\t\t\t\tELSIF i >= 0 THEN\r\t\t\t\t\t\tc.color := colors[i]; c.Set(c, c.color)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\t| c: ListBox DO\r\t\t\tIF c.i.ctrl # 0 THEN\r\t\t\t\tIF c.i.dropDown THEN\r\t\t\t\t\tIF nc = WinApi.CBN_SELCHANGE THEN\r\t\t\t\t\t\ti := WinApi.SendMessageW(c.i.ctrl, WinApi.CB_GETCURSEL, 0, 0);\r\t\t\t\t\t\tIF c.sorted THEN i := WinApi.SendMessageW(c.i.ctrl, WinApi.CB_GETITEMDATA, i, 0) END;\r\t\t\t\t\t\tIF i >= 0 THEN c.Set(c, i) END\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\t\tIF nc = WinApi.LBN_SELCHANGE THEN\r\t\t\t\t\t\ti := WinApi.SendMessageW(c.i.ctrl, WinApi.LB_GETCURSEL, 0, 0);\r\t\t\t\t\t\tIF c.sorted THEN i := WinApi.SendMessageW(c.i.ctrl, WinApi.LB_GETITEMDATA, i, 0) END;\r\t\t\t\t\t\tIF i >= 0 THEN c.Set(c, i) END\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\t| c: SelectionBox DO\r\t\t\tIF c.i.ctrl # 0 THEN\r\t\t\t\tIF nc = WinApi.LBN_SELCHANGE THEN\r(*\r\t\t\t\t\ti := WinApi.SendMessageW(c.i.ctrl, WinApi.LBGetAnchorIndex, 0, 0);\r\t\t\t\t\tj := WinApi.SendMessageW(c.i.ctrl, WinApi.LBGetCaretIndex, 0, 0);\r\t\t\t\t\tres := WinApi.SendMessageW(c.i.ctrl, WinApi.LBGetSel, i, 0);\r\t\t\t\t\tIF c.sorted THEN\r\t\t\t\t\t\ti := WinApi.SendMessageW(c.i.ctrl, WinApi.LBGetItemData, i, 0);\r\t\t\t\t\t\tj := WinApi.SendMessageW(c.i.ctrl, WinApi.LBGetItemData, j, 0)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF (i >= 0) & (i < c.num) THEN\r\t\t\t\t\t\tLog.Int(i); Log.Int(j); Log.Ln; Log.Int(wParam); Log.Int(lParam); Log.Int(res); Log.Ln;\r\t\t\t\t\t\tIF (res # 0) THEN c.Incl(c, i, i) ELSE c.Excl(c, i, i) END\r\t\t\t\t\tEND\r*)\r\t\t\t\t\ti := 0;\r\t\t\t\t\tWHILE i < c.num DO\r\t\t\t\t\t\tj := i;\r\t\t\t\t\t\tres := WinApi.SendMessageW(c.i.ctrl, WinApi.LB_GETSEL, j, 0);\r\t\t\t\t\t\tIF c.sorted THEN j := WinApi.SendMessageW(c.i.ctrl, WinApi.LB_GETITEMDATA, j, 0) END;\r\t\t\t\t\t\tc.Get(c, j, b);\r\t\t\t\t\t\tIF (res # 0) & ~b THEN c.Incl(c, j, j)\r\t\t\t\t\t\tELSIF (res = 0) & b THEN c.Excl(c, j, j)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tINC(i)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\t| c: ComboBox DO\r\t\t\tIF c.i.ctrl # 0 THEN\r\t\t\t\tIF nc = WinApi.CBN_EDITCHANGE THEN\r\t\t\t\t\tres := WinApi.GetWindowTextW(c.i.ctrl, s, LEN(s));\r\t\t\t\t\tc.Set(c, s)\r\t\t\t\tELSIF nc = WinApi.CBN_SELCHANGE THEN\r\t\t\t\t\ti := WinApi.SendMessageW(c.i.ctrl, WinApi.CB_GETCURSEL, 0, 0);\r\t\t\t\t\tIF i >= 0 THEN\r\t\t\t\t\t\tres := WinApi.SendMessageW(c.i.ctrl, WinApi.CB_GETLBTEXT, i, SYSTEM.ADR(s));\r\t\t\t\t\t\tc.Set(c, s)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND HandleCommand;\r\r\tPROCEDURE HandleScroll (wnd: WinApi.HANDLE; wParam, lParam: INTEGER);\r\t\tVAR nc, size, sect, pos: INTEGER; c: StdCFrames.Frame; arrows: BOOLEAN;\r\tBEGIN\r\t\tarrows := FALSE;\r\t\tc := SYSTEM.VAL(StdCFrames.Frame, WinApi.GetWindowLongW(wnd, dlgWindowExtra));\r\t\tWITH c: ScrollBar DO\r\t\t\tIF c.i.ctrl # 0 THEN\r\t\t\t\tViews.ValidateRoot(Views.RootOf(c));\r\t\t\t\tnc := wParam MOD 65536; c.Get(c, size, sect, pos);\r\t\t\t\tIF (nc = WinApi.SB_THUMBPOSITION) OR\r\t\t\t\t\tHostWindows.visualScroll & (nc = WinApi.SB_THUMBTRACK) THEN\r\t\t\t\t\t\tc.Set(c, WinApi.MulDiv(wParam DIV 65536, size - sect, scrollRange))\r\t\t\t\tELSIF nc = WinApi.SB_LINEUP THEN c.Track(c, StdCFrames.lineUp, pos)\r\t\t\t\tELSIF nc = WinApi.SB_LINEDOWN THEN c.Track(c, StdCFrames.lineDown, pos)\r\t\t\t\tELSIF nc = WinApi.SB_PAGEUP THEN c.Track(c, StdCFrames.pageUp, pos)\r\t\t\t\tELSIF nc = WinApi.SB_PAGEDOWN THEN c.Track(c, StdCFrames.pageDown, pos)\r\t\t\t\tEND;\r\t\t\t\tc.Update\r\t\t\tEND\r\t\t| c: UpDownField DO\r\t\t\tIF c.i.ctrl # 0 THEN arrows := TRUE END\r\t\t| c: TimeField DO\r\t\t\tIF c.i.ctrl # 0 THEN arrows := TRUE END\r\t\t| c: DateField DO\r\t\t\tIF c.i.ctrl # 0 THEN arrows := TRUE END\r\t\tELSE\r\t\tEND;\r\t\tIF arrows THEN\r\t\t\tnc := wParam MOD 65536;\r\t\t\tIF nc = WinApi.SB_THUMBPOSITION THEN\r\t\t\t\tIF wParam DIV 65536 # 0 THEN c.KeyDown(AU)\r\t\t\t\tELSE c.KeyDown(AD)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND HandleScroll;\r\r\tPROCEDURE HandleDraw (wnd: WinApi.HANDLE; wParam, lParam: INTEGER);\r\t\tVAR res: INTEGER; c: StdCFrames.Frame; p: WinApi.PtrDRAWITEMSTRUCT;\r\t\t\tbrush: WinApi.HANDLE; rect: WinApi.RECT; col: Ports.Color;\r\tBEGIN\r\t\tc := SYSTEM.VAL(StdCFrames.Frame, WinApi.GetWindowLongW(wnd, dlgWindowExtra));\r\t\tp := SYSTEM.VAL(WinApi.PtrDRAWITEMSTRUCT, lParam);\r\t\tWITH c: ColorField DO\r\t\t\tIF 0 IN p.itemState THEN\r\t\t\t\trect := p.rcItem;\r\t\t\t\tbrush := WinApi.CreateSolidBrush(HostPorts.selBackground);\r\t\t\t\tres := WinApi.FillRect(p.hDC, rect, brush);\r\t\t\t\tres := WinApi.DeleteObject(brush);\r\t\t\t\tINC(rect.left); INC(rect.top); DEC(rect.right); DEC(rect.bottom);\r\t\t\t\tbrush := WinApi.CreateSolidBrush(Ports.background);\r\t\t\t\tres := WinApi.FillRect(p.hDC, rect, brush);\r\t\t\t\tres := WinApi.DeleteObject(brush)\r\t\t\tELSE\r\t\t\t\tIF c.disabled OR c.readOnly THEN\r\t\t\t\t\tbrush := WinApi.CreateSolidBrush(Ports.dialogBackground)\r\t\t\t\tELSE\r\t\t\t\t\tbrush := WinApi.CreateSolidBrush(Ports.background)\r\t\t\t\tEND;\r\t\t\t\tres := WinApi.FillRect(p.hDC, p.rcItem, brush);\r\t\t\t\tres := WinApi.DeleteObject(brush)\r\t\t\tEND;\r\t\t\tIF (p.itemID = numColors) & (p.rcItem.top > 20) THEN\r\t\t\t\tbrush := WinApi.CreateSolidBrush(HostPorts.textCol);\r\t\t\t\trect.top := p.rcItem.bottom - 6; rect.bottom := rect.top + 2;\r\t\t\t\trect.left := p.rcItem.left + 4; rect.right := rect.left + 2;\r\t\t\t\tres := WinApi.FillRect(p.hDC, rect, brush);\r\t\t\t\trect.left := p.rcItem.left + 8; rect.right := rect.left + 2;\r\t\t\t\tres := WinApi.FillRect(p.hDC, rect, brush);\r\t\t\t\trect.left := p.rcItem.left + 12; rect.right := rect.left + 2;\r\t\t\t\tres := WinApi.FillRect(p.hDC, rect, brush)\r\t\t\tELSIF p.itemID >= 0 THEN\r\t\t\t\trect := p.rcItem; INC(rect.left, 2); INC(rect.top, 2); DEC(rect.right, 2); DEC(rect.bottom, 2);\r\t\t\t\tIF p.itemID = numColors THEN col := c.color\r\t\t\t\tELSIF (p.itemID >= 0) & (p.itemID < LEN(colors)) THEN col := colors[p.itemID]\r\t\t\t\tELSE col := HostPorts.textCol\r\t\t\t\tEND;\r\t\t\t\tbrush := WinApi.CreateSolidBrush(col);\r\t\t\t\tres := WinApi.FillRect(p.hDC, rect, brush);\r\t\t\t\tres := WinApi.DeleteObject(brush)\r\t\t\tEND\r\t\tEND\r\tEND HandleDraw;\r\r\tPROCEDURE ColorBrush (col: Ports.Color): WinApi.HANDLE;\r\t\tVAR p: BrushCache;\r\tBEGIN\r\t\tIF col 