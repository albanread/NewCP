                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT\r\t\tKernel, Ports, Printers, Files,\r\t\tStores, Views, Controllers, Dialog, Printing,\r\t\tConverters, Sequencers, Documents, Windows,\r\t\tStdDialog, StdCmds,\r\t\tHostFiles, HostWindows, HostDialog, HostClipboard;\r\r\tCONST\r\t\t"
                    attr: 0
                  - text: "(* hints *)"
                    attr: 1
                  - text: "\r\t\timpAll = 0;\t"
                    attr: 0
                  - text: "(* can import all file types *)"
                    attr: 1
                  - text: "\r\t\texpDoc = 1;\t"
                    attr: 0
                  - text: "(* imported view should be stored as document *)"
                    attr: 1
                  - text: "\r\r\tVAR "
                    attr: 0
                  - text: quit
                    attr: 3
                  - text: "*: BOOLEAN;\r\r\r\t"
                    attr: 0
                  - text: "(** File menu **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: "Open*"
                    attr: 3
                  - text: ";\r\t"
                    attr: 0
                  - text: "(** open an existing document or view **)"
                    attr: 1
                  - text: "\r\t\tVAR loc: Files.Locator; name: Files.Name; v: Views.View;\r\t\t\ts: Stores.Store; w: Windows.Window; conv: Converters.Converter;\r\tBEGIN\r\t\tHostDialog.GetIntSpec(loc, name, conv);\r\t\tIF loc # NIL THEN\r\t\t\tw := Windows.GetBySpec(loc, name, conv, {});\r\t\t\tIF w # NIL THEN s := w.doc\r\t\t\tELSE\r\t\t\t\tConverters.Import(loc, name, conv, s);\r\t\t\t\tIF s # NIL THEN StdDialog.RecalcView(s(Views.View)) END\r\t\t\tEND;\r\t\t\tIF s # NIL THEN\r\t\t\t\tv := s(Views.View);\r\t\t\t\tIF (conv # NIL) & (expDoc IN conv.opts) THEN conv := NIL END;\r\t\t\t\tViews.Open(v, loc, name, conv)\r\t\t\tELSE Dialog.ShowParamMsg(\"#System:FailedToOpen\", name, \"\", \"\")\r\t\t\tEND\r\t\tEND\r\tEND Open;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: OpenCopyOf
                    attr: 3
                  - text: "*;\r\t\tVAR loc: Files.Locator; name: Files.Name; conv: Converters.Converter; v: Views.View;\r\tBEGIN\r\t\tv := Views.Old(TRUE, loc, name, conv);\r\t\tIF v # NIL THEN\r\t\t\tIF v.context # NIL THEN\r\t\t\t\tv := Views.CopyOf(v.context(Documents.Context).ThisDoc(), Views.deep);\r\t\t\t\tStores.InitDomain(v)\r\t\t\tELSE v := Views.CopyOf(v, Views.deep)\r\t\t\tEND;\r\t\t\tViews.Open(v, NIL, \"\", conv)\r\t\tEND\r\tEND OpenCopyOf;\r\r\tPROCEDURE SaveWindow (w: Windows.Window; rename: BOOLEAN);\r\t\tVAR title: Views.Title; loc: Files.Locator; name: Files.Name; v: Views.View;\r\t\t\tconv: Converters.Converter; stat: BOOLEAN; i: INTEGER;\r\tBEGIN\r\t\tIF (w # NIL) & (rename OR ~(Windows.neverDirty IN w.flags)) THEN\r\t\t\tv := w.doc.OriginalView();\r\t\t\tloc := w.loc; name := w.name$; conv := w.conv;\r\t\t\tIF name = \"\" THEN Dialog.MapString(\"#System:untitled\", name) END;\r\t\t\tIF (loc = NIL) OR (loc.res = 77) OR (conv # NIL) & (conv.exp = \"\") THEN rename := TRUE END;\r\t\t\tIF rename THEN HostDialog.GetExtSpec(v, loc, name, conv) END;\r\t\t\tIF loc # NIL THEN\r\t\t\t\tDialog.ShowStatus(\"#Host:Saving\");\r\t\t\t\tConverters.Export(loc, name, conv, v);\r\t\t\t\tIF loc.res = 0 THEN\r\t\t\t\t\tIF w.seq.Dirty() THEN\r\t\t\t\t\t\tw.seq.BeginModification(Sequencers.notUndoable, NIL);\r\t\t\t\t\t\tw.seq.EndModification(Sequencers.notUndoable, NIL);\t"
                    attr: 0
                  - text: "(* clear sequencer *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\tw.seq.SetDirty(FALSE)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF rename THEN\r\t\t\t\t\t\ti := 0;\r\t\t\t\t\t\tWHILE (i < LEN(title) - 1) & (name[i] # 0X) DO title[i] := name[i]; INC(i) END;\r\t\t\t\t\t\ttitle[i] := 0X;\r\t\t\t\t\t\tw.SetTitle(title); w.SetSpec(loc, name, conv)\r\t\t\t\t\tEND;\r\t\t\t\t\tDialog.ShowStatus(\"#Host:Saved\")\r\t\t\t\tELSE\r\t\t\t\t\tDialog.ShowStatus(\"#Host:Failed\")\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF ~quit THEN Kernel.Cleanup END\r\t\tEND\r\tEND SaveWindow;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Save
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** save document shown in target window under old name **)"
                    attr: 1
                  - text: "\r\t\tVAR w: Windows.Window;\r\tBEGIN\r\t\tw := Windows.dir.Focus(Controllers.targetPath);\r\t\tSaveWindow(w, FALSE)\r\tEND Save;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SaveAs
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** save document shown in target window under new name **)"
                    attr: 1
                  - text: "\r\t\tVAR w: Windows.Window;\r\tBEGIN\r\t\tw := Windows.dir.Focus(Controllers.targetPath);\r\t\tSaveWindow(w, TRUE)\r\tEND SaveAs;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SaveCopyAs
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** save copy of document shown in target window under new name **)"
                    attr: 1
                  - text: "\r\t\tVAR w: Windows.Window; loc: Files.Locator; name: Files.Name; v: Views.View;\r\t\t\tconv: Converters.Converter;\r\tBEGIN\r\t\tw := Windows.dir.Focus(Controllers.targetPath);\r\t\tIF (w # NIL) THEN\r\t\t\tv := w.doc.OriginalView();\r\t\t\tloc := w.loc; name := w.name$; conv := w.conv;\r\t\t\tIF name = \"\" THEN Dialog.MapString(\"#System:untitled\", name) END;\r\t\t\tHostDialog.GetExtSpec(v, loc, name, conv);\r\t\t\tIF loc # NIL THEN\r\t\t\t\tDialog.ShowStatus(\"#Host:Saving\");\r\t\t\t\tConverters.Export(loc, name, conv, v);\r\t\t\t\tIF loc.res = 0 THEN Dialog.ShowStatus(\"#Host:Saved\")\r\t\t\t\tELSE Dialog.ShowStatus(\"#Host:Failed\")\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF ~quit THEN Kernel.Cleanup END\r\t\tEND\r\tEND SaveCopyAs;\r\r\tPROCEDURE CloseWindow (w: Windows.Window);\r\t\tVAR res: INTEGER; msg: Sequencers.CloseMsg;\r\tBEGIN\r\t\tIF w # NIL THEN\r\t\t\tIF ~w.sub THEN\r\t\t\t\tmsg.sticky := FALSE; w.seq.Notify(msg);\r\t\t\t\tIF ~msg.sticky THEN\r\t\t\t\t\tIF w.seq.Dirty() & ~(Windows.neverDirty IN w.flags) THEN\r\t\t\t\t\t\tHostDialog.CloseDialog(w, quit, res);\r\t\t\t\t\t\tIF res = HostDialog.save THEN\r\t\t\t\t\t\t\tSaveWindow(w, FALSE);\t"
                    attr: 0
                  - text: "(* if saving is canceled, document remains dirty *"
                    attr: 1
                  - text: ")\r\t\t\t\t\t\t\tIF w.seq.Dirty() THEN quit := FALSE\r\t\t\t\t\t\t\tELSE Windows.dir.Close(w)\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tELSIF res = HostDialog.cancel THEN quit := FALSE\r\t\t\t\t\t\tELSE Windows.dir.Close(w)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE Windows.dir.Close(w)\r\t\t\t\t\tEND\r\t\t\t\tELSE quit := FALSE\r\t\t\t\tEND\r\t\t\tELSE Windows.dir.Close(w)\r\t\t\tEND;\r\t\t\tIF ~quit THEN Kernel.Cleanup END\r\t\tEND\r\tEND CloseWindow;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Close
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** close top window **)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tCloseWindow(Windows.dir.First())\r\tEND Close;\r(*\r\tPROCEDURE "
                    attr: 0
                  - text: PageSetup
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** ask user for page size, margins and decoration of the front window's document **)"
                    attr: 1
                  - text: "\r\t\tVAR win: Windows.Window; d: Documents.Document;\r\t\t\tw, h, l, t, r, b,  dl, dt, dr, db: LONGINT; decorate: BOOLEAN; s: Stores.Operation;\r\tBEGIN\r\t\twin := Windows.dir.Focus(Controllers.targetPath);\r\t\tIF win # NIL THEN\r\t\t\td := win.doc;\r\t\t\td.PollPage(w, h, l, t, r, b, decorate);\r\t\t\tHostDialog.PageSetup(w, h, l, t, r, b, decorate);\r\t\t\tIF w > 0 THEN\r\t\t\t\tIF Windows.noResize IN win.flags THEN\r\t\t\t\t\td.PollRect(dl, dt, dr, db);\r\t\t\t\t\tr := l + (dr - dl); b := t + (db - dt)\r\t\t\t\tEND;\r\t\t\t\td.SetPage(w, h, l, t, r, b, decorate)\r\t\t\tEND\r\t\tEND\r\tEND PageSetup;\r*)\r\tPROCEDURE HasSel (w: Windows.Window): BOOLEAN;\r\t\tVAR ops: Controllers.PollOpsMsg;\r\tBEGIN\r\t\tops.type := \"\"; ops.singleton := NIL; ops.selectable := FALSE; ops.valid := {};\r\t\tw.ForwardCtrlMsg(ops);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " ops.singleton # NIL\r\tEND HasSel;\r\r\tPROCEDURE PrintSel (w: Windows.Window; from, to, copies: INTEGER);\r\t\tVAR wt, title: Views.Title; i: INTEGER; edit: Controllers.EditMsg;\r\tBEGIN\r\t\tedit.op := Controllers.copy; edit.view := NIL;\r\t\tedit.clipboard := FALSE; w.ForwardCtrlMsg(edit);\r\t\tASSERT(edit.view # NIL, 100);\r\t\tw.GetTitle(wt); title := \"[\";\r\t\ti := 1; WHILE (wt[i - 1] # 0X) & (i < LEN(title)) DO title[i] := wt[i - 1]; INC(i) END;\r\t\tIF i >= LEN(title) - 1 THEN i := LEN(title) - 2 END;\r\t\ttitle[i] := \"]\"; title[i + 1] := 0X;\r\t\tPrinting.PrintView(edit.view, (*edit.w, edit.h,*) Printing.NewDefaultPar(title))\r\tEND PrintSel;\r\r\tPROCEDURE PrintDoc (w: Windows.Window; from, to, copies: INTEGER);\r\t\tVAR pw, ph, l, t, r, b: INTEGER; decorate: BOOLEAN;\r"
                    attr: 0
                  - text: "\t\t\t"
                    attr: 3
                  - text: "msg: Controllers.ScrollMsg; page: Printing.PageInfo; header, footer: Printing.Banner;\r\tBEGIN\r\t\tw.doc.PollPage(pw, ph, l, t, r, b, decorate);\r\t\tpage.first := 1; page.from := from; page.to := to; page.alternate := FALSE;\r\t\tw.GetTitle(page.title);\r\t\tIF decorate THEN\r\t\t\theader.gap := 5 * Ports.mm; header.right := \"&d&;&p\";\r\t\tELSE\r\t\t\theader.gap := 0; header.right := \"\";\r\t\tEND;\r\t\tfooter.gap := 0; footer.right := \"\";\r\t\tPrinting.PrintView(w.doc, Printing.NewPar(page, header, footer, copies));\r(*\r\t\tmsg.focus := FALSE; msg.vertical := TRUE;\r\t\tmsg.op := Controllers.gotoPos; msg.pos := 0;\r\t\tmsg.done := FALSE; w.ForwardCtrlMsg(msg);\r\t\tViews.UpdateRoot(w.frame, w.frame.l, w.frame.t, w.frame.r, w.frame.b, Views.rebuildFrames)\r*)\r\tEND PrintDoc;\r\r\tPROCEDURE PrintThis (w: Windows.Window; from, to, copies: INTEGER; selection: BOOLEAN);\r\tBEGIN\r\t\tIF copies > 0 THEN\r\t\t\tIF selection THEN\r\t\t\t\tPrintSel(w, from, to, copies)\r\t\t\tELSE\r\t\t\t\tPrintDoc(w, from, to, copies)\r\t\t\tEND\r\t\tEND\r\tEND PrintThis;\r(*\r\tPROCEDURE PrintSelection*;\r\t(** print the front window's selection **)\r\t\tVAR win: Windows.Window; pr: Printers.Printer;\r\t\t\tfrom, to, copies: INTEGER; selection, hasSel: BOOLEAN;\r\tBEGIN\r\t\twin := Windows.dir.Focus(Controllers.path);\r\t\tIF win # NIL THEN\r\t\t\thasSel := HasSel(win); selection := hasSel;\r\t\t\tHostDialog.PrintDialog(hasSel, pr, from, to, copies, selection);\r\t\t\tPrintThis(pr, win, from, to, copies, selection)\r\t\tEND\r\tEND PrintSelection;\r*)\r\tPROCEDURE "
                    attr: 0
                  - text: Print
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** print the front window's document **)"
                    attr: 1
                  - text: "\r\t\tVAR win: Windows.Window;\r\t\t\tfrom, to, copies: INTEGER; selection: BOOLEAN;\r\tBEGIN\r\t\tIF Printers.dir.Available() THEN\r\t\t\twin := Windows.dir.Focus(Controllers.targetPath);\r\t\t\tIF win # NIL THEN\r\t\t\t\tWHILE win.sub DO win := win.link END;\r\t\t\t\tselection := FALSE;\r\t\t\t\tHostDialog.PrintDialog(HasSel(win), from, to, copies, selection);\r\t\t\t\tPrintThis(win, from, to, copies, selection)\r\t\t\tEND;\r\t\t\tKernel.Cleanup\r\t\tEND\r\tEND Print;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Quit
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** stop if all windows can be closed **)"
                    attr: 1
                  - text: "\r\t\tVAR w: Windows.Window;\r\tBEGIN\r\t\tquit := TRUE;\r\t\tw := Windows.dir.First();\r\t\tWHILE (w # NIL) & (HostWindows.inPlace IN w.flags) DO w := Windows.dir.Next(w) END;\r\t\tWHILE (w # NIL) & quit DO\r\t\t\tCloseWindow(w);\r\t\t\tw := Windows.dir.First();\r\t\t\tWHILE (w # NIL) & (HostWindows.inPlace IN w.flags) DO w := Windows.dir.Next(w) END\r\t\tEND\r\tEND Quit;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SaveAll
                    attr: 3
                  - text: "*;\r\t\tVAR w: Windows.Window; res: INTEGER;\r\tBEGIN\r\t\tquit := FALSE;\r\t\tw := Windows.dir.First();\r\t\tWHILE (w # NIL) & (HostWindows.inPlace IN w.flags) DO w := Windows.dir.Next(w) END;\r\t\tres := HostDialog.save;\r\t\tWHILE (w # NIL) & (res # HostDialog.cancel) DO\r\t\t\tIF ~w.sub & w.seq.Dirty() & ~(Windows.neverDirty IN w.flags) THEN\r\t\t\t\tHostDialog.CloseDialog(w, FALSE, res);\r\t\t\t\tIF res = HostDialog.save THEN\r\t\t\t\t\tSaveWindow(w, FALSE)\t"
                    attr: 0
                  - text: "(* if saving is canceled, document remains dirty *"
                    attr: 1
                  - text: ")\r\t\t\t\tEND;\r\t\t\t\tKernel.Cleanup\r\t\t\tEND;\r\t\t\tw := Windows.dir.Next(w)\r\t\tEND\r\tEND SaveAll;\r\r\t"
                    attr: 0
                  - text: "(** Edit menu **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: Cut
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** move the focus document's selection into the clipboard **)"
                    attr: 1
                  - text: "\r\t\tVAR msg: Controllers.EditMsg;\r\tBEGIN\r\t\tmsg.op := Controllers.cut;\r\t\tmsg.clipboard := TRUE;\r\t\tmsg.view := NIL; msg.w := Views.undefined; msg.h := Views.undefined;\r\t\tControllers.Forward(msg);\r\t\tIF msg.view # NIL THEN HostClipboard.Register(msg.view, msg.w, msg.h, msg.isSingle) END\r\tEND Cut;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Copy
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** move a copy of the focus document's selection into the clipboard **)"
                    attr: 1
                  - text: "\r\t\tVAR msg: Controllers.EditMsg;\r\tBEGIN\r\t\tmsg.op := Controllers.copy;\r\t\tmsg.clipboard := TRUE;\r\t\tmsg.view := NIL; msg.w := Views.undefined; msg.h := Views.undefined;\r\t\tControllers.Forward(msg);\r\t\tIF msg.view # NIL THEN HostClipboard.Register(msg.view, msg.w, msg.h, msg.isSingle) END\r\tEND Copy;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Paste
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** let focus document insert a copy of the clipboard's contents **)"
                    attr: 1
                  - text: "\r\t\tVAR ops: Controllers.PollOpsMsg; msg: Controllers.EditMsg;\r\tBEGIN\r\t\tHostClipboard.cloneAttributes := TRUE;\r\t\tHostClipboard.isText := TRUE;\r\t\tControllers.PollOps(ops);\r\t\tHostClipboard.isText := ops.type = \"TextViews.View\";\r\t\tIF Controllers.paste IN ops.valid THEN\r\t\t\tmsg.clipboard := TRUE;\r\t\t\tHostClipboard.GetClipView(ops.pasteType, msg.view, msg.w, msg.h, msg.isSingle);\r\t\t\tIF msg.view # NIL THEN\r\t\t\t\tmsg.op := Controllers.paste; Controllers.Forward(msg)\r\t\t\tEND\r\t\tEND;\r\t\tHostClipboard.cloneAttributes := FALSE;\r\t\tHostClipboard.isText := TRUE;\r\tEND Paste;\r\r\tPROCEDURE "
                    attr: 0
                  - text: PasteObject
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** let focus document insert a copy of the clipboard's contents **)"
                    attr: 1
                  - text: "\r\t\tVAR ops: Controllers.PollOpsMsg; v: Views.View; w, h: INTEGER; s: BOOLEAN;\r\tBEGIN\r\t\tHostClipboard.cloneAttributes := FALSE;\r\t\tControllers.PollOps(ops);\r\t\tIF Controllers.paste IN ops.valid THEN\r\t\t\tHostClipboard.GetClipView(ops.pasteType, v, w, h, s);\r\t\t\tIF v # NIL THEN\r\t\t\t\tControllers.PasteView(v, w, h, TRUE)\r\t\t\tEND\r\t\tEND\r\tEND PasteObject;\r\r\tPROCEDURE "
                    attr: 0
                  - text: PasteToWindow
                    attr: 3
                  - text: "*;\r\t\tVAR v: Views.View; w, h: INTEGER; d: Documents.Document; s: BOOLEAN;\r\tBEGIN\r\t\tHostClipboard.cloneAttributes := FALSE;\r\t\tHostClipboard.GetClipView(\"\", v, w, h, s);\r\t\tIF v # NIL THEN\r\t\t\td := Documents.dir.New(v, w, h);\r\t\t\tViews.OpenView(d)\r\t\tEND\r\tEND PasteToWindow;\r\t\r\t\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: OpenDoc
                    attr: 3
                  - text: "* (file: ARRAY OF CHAR);\r\t\tVAR w: Windows.Window;\r\tBEGIN\r\t\tw := Windows.dir.Focus(FALSE);\r\t\tIF (w.loc # NIL) & (w.loc IS HostFiles.Locator) & (w.loc(HostFiles.Locator).path # \"\") THEN\r\t\t\tStdCmds.OpenDoc(w.loc(HostFiles.Locator).path + \"\\\" + file)\r\t\tELSE\r\t\t\tStdCmds.OpenDoc(file)\r\t\tEND\r\tEND OpenDoc;\r\t\r\t\r\t"
                    attr: 0
