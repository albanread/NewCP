                    attr: 0
                  - text: SYSTEM.MOVE
                    attr: 3
                  - text: "(from, to, count);\r\t\t\t\tINC(w.offset, count); INC(beg, count); DEC(len, count);\r\t\t\t\tIF w.offset > w.buf.len THEN INC(w.base.len, w.offset - w.buf.len); w.buf.len := w.offset END;\r\t\t\t\tw.buf.dirty := TRUE\r\t\t\tEND\r\t\tELSE ASSERT(len = 0, 22)\r\t\tEND\r\tEND WriteBytes;\r\r\r\r\t"
