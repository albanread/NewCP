                    attr: 3
                  - text: "* (loc: Files.Locator): Files.FileInfo;\r\t\tVAR i, res, firstRes, diff: INTEGER; info, first, last: Files.FileInfo; s: FullName;\r\t\t\tfind: WinApi.HANDLE; fd: WinApi.WIN32_FIND_DATAW; st: WinApi.SYSTEMTIME;\r\tBEGIN\r\t\tASSERT(loc # NIL, 20);\r\t\tfirst := NIL; last :=NIL;\r\t\tWITH loc: Locator DO\r\t\t\tAppend(loc.path, wildcard, wildcard, loc.maxLen, s);\r\t\t\tfind := WinApi.FindFirstFileW(s, fd);\r\t\t\tIF find # invalid THEN\r\t\t\t\tREPEAT\r\t\t\t\t\tIF ~(WinApi.FILE_ATTRIBUTE_DIRECTORY * fd.dwFileAttributes # {})\r\t\t\t\t\t\t\t& (LEN(fd.cFileName$) < LEN(info.name)) THEN\r\t\t\t\t\t\tinfo := first; last := NIL; s := fd.cFileName$;\r\t\t\t\t\t\tWHILE (info # NIL) & (Diff(info.name, s, loc.caseSens) < 0) DO last := info; info := info.next END;\r\t\t\t\t\t\tNEW(info);\r\t\t\t\t\t\tinfo.name := fd.cFileName$;\r\t\t\t\t\t\tinfo.length := fd.nFileSizeLow;\r\t\t\t\t\t\tres := WinApi.FileTimeToSystemTime(fd.ftLastWriteTime, st);\r\t\t\t\t\t\tinfo.modified.year := st.wYear;\r\t\t\t\t\t\tinfo.modified.month := st.wMonth;\r\t\t\t\t\t\tinfo.modified.day := st.wDay;\r\t\t\t\t\t\tinfo.modified.hour := st.wHour;\r\t\t\t\t\t\tinfo.modified.minute := st.wMinute;\r\t\t\t\t\t\tinfo.modified.second := st.wSecond;\r\t\t\t\t\t\tinfo.attr := {};\r\t\t\t\t\t\tIF WinApi.FILE_ATTRIBUTE_HIDDEN * fd.dwFileAttributes # {} THEN\r\t\t\t\t\t\t\tINCL(info.attr, Files.hidden)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF WinApi.FILE_ATTRIBUTE_READONLY * fd.dwFileAttributes # {} THEN\r\t\t\t\t\t\t\tINCL(info.attr, Files.readOnly)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF WinApi.FILE_ATTRIBUTE_SYSTEM * fd.dwFileAttributes # {} THEN\r\t\t\t\t\t\t\tINCL(info.attr, Files.system)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF WinApi.FILE_ATTRIBUTE_ARCHIVE * fd.dwFileAttributes # {} THEN\r\t\t\t\t\t\t\tINCL(info.attr, Files.archive)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tGetType(fd.cFileName, info.type);\r\t\t\t\t\t\tIF last = NIL THEN info.next := first; first := info ELSE info.next := last.next; last.next := info END\r\t\t\t\t\tEND;\r\t\t\t\t\ti := WinApi.FindNextFileW(find, fd)\r\t\t\t\tUNTIL i = 0;\r\t\t\t\tres := WinApi.GetLastError(); i := WinApi.FindClose(find)\r\t\t\tELSE res := WinApi.GetLastError()\r\t\t\tEND;\r\t\t\tIF res = noMoreFilesErr THEN res := ok END;\r\t\t\tfirstRes := res;\r\t\t\t"
                    attr: 0
                  - text: "(* check startup directory *)"
                    attr: 1
                  - text: "\r\t\t\tIF (loc.rootLen > 0) & ((res = ok) OR (res = fileNotFoundErr) OR (res = pathNotFoundErr)) THEN\r\t\t\t\tGetShadowDir(loc, s);\r\t\t\t\tAppend(s, wildcard, wildcard, loc.maxLen, s);\r\t\t\t\tfind := WinApi.FindFirstFileW(s, fd);\r\t\t\t\tIF find # invalid THEN\r\t\t\t\t\tREPEAT\r\t\t\t\t\t\tIF ~(WinApi.FILE_ATTRIBUTE_DIRECTORY * fd.dwFileAttributes # {})\r\t\t\t\t\t\t\t\t& (LEN(fd.cFileName$) < LEN(info.name)) THEN\r\t\t\t\t\t\t\tinfo := first; last := NIL; s := fd.cFileName$;\r\t\t\t\t\t\t\tIF info # NIL THEN diff := Diff(info.name, s, loc.caseSens) END;\r\t\t\t\t\t\t\tWHILE (info # NIL) & (diff < 0) DO\r\t\t\t\t\t\t\t\tlast := info; info := info.next;\r\t\t\t\t\t\t\t\tIF info # NIL THEN diff := Diff(info.name, s, loc.caseSens) END\r\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\tIF (info = NIL) OR (diff # 0) THEN\r\t\t\t\t\t\t\t\tNEW(info);\r\t\t\t\t\t\t\t\tinfo.name := fd.cFileName$;\r\t\t\t\t\t\t\t\tinfo.length := fd.nFileSizeLow;\r\t\t\t\t\t\t\t\tres := WinApi.FileTimeToSystemTime(fd.ftLastWriteTime, st);\r\t\t\t\t\t\t\t\tinfo.modified.year := st.wYear;\r\t\t\t\t\t\t\t\tinfo.modified.month := st.wMonth;\r\t\t\t\t\t\t\t\tinfo.modified.day := st.wDay;\r\t\t\t\t\t\t\t\tinfo.modified.hour := st.wHour;\r\t\t\t\t\t\t\t\tinfo.modified.minute := st.wMinute;\r\t\t\t\t\t\t\t\tinfo.modified.second := st.wSecond;\r\t\t\t\t\t\t\t\tinfo.attr := {};\r\t\t\t\t\t\t\t\tIF WinApi.FILE_ATTRIBUTE_HIDDEN * fd.dwFileAttributes # {} THEN\r\t\t\t\t\t\t\t\t\tINCL(info.attr, Files.hidden)\r\t\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\t\tIF WinApi.FILE_ATTRIBUTE_READONLY * fd.dwFileAttributes # {} THEN\r\t\t\t\t\t\t\t\t\tINCL(info.attr, Files.readOnly)\r\t\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\t\tIF WinApi.FILE_ATTRIBUTE_SYSTEM * fd.dwFileAttributes # {} THEN\r\t\t\t\t\t\t\t\t\tINCL(info.attr, Files.system)\r\t\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\t\tIF WinApi.FILE_ATTRIBUTE_ARCHIVE * fd.dwFileAttributes # {} THEN\r\t\t\t\t\t\t\t\t\tINCL(info.attr, Files.archive)\r\t\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\t\tGetType(fd.cFileName, info.type);\r\t\t\t\t\t\t\t\tIF last = NIL THEN info.next := first; first := info ELSE info.next := last.next; last.next := info END\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\ti := WinApi.FindNextFileW(find, fd)\r\t\t\t\t\tUNTIL i = 0;\r\t\t\t\t\tres := WinApi.GetLastError(); i := WinApi.FindClose(find)\r\t\t\t\tELSE res := WinApi.GetLastError()\r\t\t\t\tEND;\r\t\t\t\tIF res = noMoreFilesErr THEN res := ok END\r\t\t\tEND;\r\t\t\tIF (res = fileNotFoundErr) OR (res = pathNotFoundErr) THEN res := firstRes END;\r\t\t\tloc.res := Error(res)\r\t\tELSE loc.res := invalidName\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " first\r\tEND FileList;\r\r\tPROCEDURE (d: Directory) "
