                  - text: "PROCEDURE (VAR id: Counter) Identified (): BOOLEAN;\r\t\tVAR f: File;\r\tBEGIN\r\t\tf := id.obj(File);\r\t\tIF f.state # closed THEN INC(id.count) END;\r\t\t"
