                    attr: 1
                  - text: "\r\t\tdir: Directory;\r\t\twildcard: Files.Type;\r\t\tstartupDir: FullName;\r\t\tstartupLen: INTEGER;\r\t\tres: INTEGER;\r\r\r\tPROCEDURE Error (n: INTEGER): INTEGER;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF n = ok THEN res := ok\r\t\tELSIF n = invalidNameErr THEN res := invalidName\r\t\tELSIF (n = fileNotFoundErr) OR (n = pathNotFoundErr) THEN res := notFound\r\t\tELSIF (n = fileExistsErr) OR (n = alreadyExistsErr) THEN res := existsAlready\r\t\tELSIF n = writeProtectedErr THEN res := writeProtected\r\t\tELSIF (n = sharingErr) OR (n = accessDeniedErr) OR (n = netAccessDeniedErr) THEN res := accessDenied\r\t\tELSIF n = notEnoughMemoryErr THEN res := notEnoughMem\r\t\tELSIF (n = diskFullErr) OR (n = tooManyOpenFilesErr) THEN res := notEnoughDisk\r\t\tELSE res := -n\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " res\r\tEND Error;\r\r\tPROCEDURE Diff (IN a, b: ARRAY OF CHAR; caseSens: BOOLEAN): INTEGER;\r\t\tVAR i: INTEGER; cha, chb: CHAR;\r\tBEGIN\r\t\ti := 0;\r\t\tREPEAT\r\t\t\tcha := a[i]; chb := b[i]; INC(i);\r\t\t\tIF cha # chb THEN\r\t\t\t\tIF ~caseSens THEN\r\t\t\t\t\tcha := Kernel.Upper(cha);\r\t\t\t\t\tchb := Kernel.Upper(chb);\r\t\t\t\tEND;\r\t\t\t\tIF cha = \"\\\" THEN cha := \"/\" END;\r\t\t\t\tIF chb = \"\\\" THEN chb := \"/\" END;\r\t\t\t\tIF cha # chb THEN "
                    attr: 0
