                  - text: " first\r\tEND LocList;\r\r\tPROCEDURE (d: Directory) GetFileName (name: Files.Name; type: Files.Type; OUT filename: Files.Name);\r\tBEGIN\r\t\tAppend(\"\", name, type, LEN(filename), filename)\r\tEND GetFileName;\r\r\t"
                    attr: 0
                  - text: "(** Miscellaneous **)\r\r\t"
