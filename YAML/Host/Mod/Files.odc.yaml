                    attr: 3
                  - text: " NIL\r\t\t\t\tELSE loc.res := ok; "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " f\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF shrd THEN s := shared ELSE s := exclusive END;\r\t\t\tOpenFile(s, fname, ref, res);\r\t\t\tIF ((res = fileNotFoundErr) OR (res = pathNotFoundErr)) & (loc.rootLen > 0) THEN\r\t\t\t\tGetShadowDir(loc, fname);\r\t\t\t\tAppend(fname, name, \"\", loc.maxLen, fname);\r\t\t\t\tf := ThisFile(fname);\r\t\t\t\tIF f # NIL THEN\r\t\t\t\t\tIF ~shrd OR (f.state = exclusive) THEN loc.res := Error(sharingErr); "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL\r\t\t\t\t\tELSE loc.res := ok; "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " f\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tOpenFile(s, fname, ref, res)\r\t\t\tEND;\r\t\t\tIF res = ok THEN\r\t\t\t\tNEW(f); f.loc := loc;\r\t\t\t\tf.swapper := -1; i := 0;\r\t\t\t\tGetType(name, type);\r\t\t\t\tf.InitType(type);\r\t\t\t\tASSERT(ref # invalid, 107);\r\t\t\t\tf.ref := ref; f.name := fname$; f.state := s; f.t := Kernel.Time();\r\t\t\t\tf.len := WinApi.GetFileSize(ref, j)\r\t\t\tEND\r\t\tEND;\r\t\tloc.res := Error(res);\r\t\t"
