                    attr: 3
                  - text: " ORD(cha) - ORD(chb) END\r\t\t\tEND\r(*\r\t\t\tIF (cha = chb)\r\t\t\t\tOR ~caseSens & (CAP(cha) = CAP(chb)) & (CAP(cha) >= \"A\") & ((CAP(cha) <= \"Z\") OR (cha >= \"À\"))\r\t\t\t\tOR ((cha = \"/\") OR (cha = \"\\\")) & ((chb = \"/\") OR (chb = \"\\\")) THEN\t(* ok *)\r\t\t\tELSE "
                    attr: 0
