                  - text: "\r\t\tASSERT(beg >= 0, 21); ASSERT(w.base.state # closed, 25);\r\t\tIF len > 0 THEN\r\t\t\tASSERT(beg + len <= LEN(x), 23);\r\t\t\tWHILE len # 0 DO\r\t\t\t\tIF (w.org # w.buf.org) OR (w.offset >= bufsize) THEN w.SetPos(w.org + w.offset) END;\r\t\t\t\trestInBuf := bufsize - w.offset;\r\t\t\t\tIF restInBuf <= len THEN count := restInBuf ELSE count := len END;\r\t\t\t\tfrom := "
                    attr: 0
                  - text: SYSTEM.ADR
                    attr: 3
                  - text: "(x) + beg; to := "
                    attr: 0
                  - text: SYSTEM.ADR
