                  - text: "* (f: Files.File; VAR year, month, day, hour, minute, second: INTEGER);\r\t\tVAR res: INTEGER; ft: WinApi.FILETIME; st: WinApi.SYSTEMTIME;\r\tBEGIN\r\t\tASSERT(f IS File, 20);\r\t\tres := WinApi.GetFileTime(f(File).ref, NIL, NIL, ft);\r\t\tres := WinApi.FileTimeToSystemTime(ft, st);\r\t\tyear := st.wYear; month := st.wMonth; day := st.wDay;\r\t\thour := st.wHour; minute := st.wMinute; second := st.wSecond\r\tEND GetModDate;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SetRootDir
                    attr: 3
                  - text: "* (path: ARRAY OF CHAR);\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\tdir.startup := NewLocator(path);\r\t\tdir.startup.rootLen := 0; i := 0;\r\t\tWHILE startupDir[i] # 0X DO INC(i) END;\r\t\tstartupLen := i\r\tEND SetRootDir;\r\r\tPROCEDURE GetName (VAR p: WinApi.PtrWSTR; VAR i: INTEGER; OUT name, opt: FullName);\r\t\tVAR ch, tch: CHAR; j: INTEGER;\r\tBEGIN\r\t\tj := 0; ch := p[i]; tch := \" \";\r\t\tWHILE ch = \" \" DO INC(i); ch := p[i] END;\r\t\tIF (ch = \"'\") OR (ch = '\"') THEN tch := ch; INC(i); ch := p[i] END;\r\t\tWHILE (ch >= \" \") & (ch # tch) DO\r\t\t\tname[j] := ch;\r\t\t\tIF Kernel.IsLower(ch) THEN ch := Kernel.Upper(ch)\r\t\t\tELSIF ch = \"-\" THEN ch := \"/\"\r\t\t\tEND;\r\t\t\topt[j] := ch; INC(j); INC(i); ch := p[i]\r\t\tEND;\r\t\tIF ch > \" \" THEN INC(i); ch := p[i] END;\r\t\tWHILE (ch # 0X) & (ch <= \" \") DO INC(i); ch := p[i] END;\r\t\tname[j] := 0X; opt[j] := 0X\r\tEND GetName;\r\r\tPROCEDURE Init;\r\t\tVAR res, res1, i, j: INTEGER; path, opt, s: FullName; attr: SET; p: WinApi.PtrWSTR;\r\t\t\tfind: WinApi.HANDLE; fd: WinApi.WIN32_FIND_DATAW;\r\tBEGIN\r\t\tignoreAsk := FALSE;\r\t\twildcard := \"*\"; NEW(dir);\r\t\tres := WinApi.GetModuleFileNameW(0, path, LEN(path));\r\t\tGetPath(path, startupDir);\r\t\tdir.startup := NewLocator(startupDir);\r\t\tdir.startup.rootLen := 0;\r\t\ti := LEN(startupDir$); startupLen := i;\r\t\t"
                    attr: 0
                  - text: "find := WinApi.FindFirstFileW(path, fd);\r\t\tIF find # invalid THEN\r\t\t\tappName := fd.cFileName$; res := WinApi.FindClose(find)\r\t\tELSE\r\t\t\t"
                    attr: 3
                  - text: "INC(i); j := 0;\r\t\t\tWHILE path[i] # 0X DO appName[j] := path[i]; INC(i); INC(j) END"
                    attr: 0
                  - text: "\r\t\tEND;\r\t\t"
                    attr: 3
                  - text: "i := 0; j := -1;"
                    attr: 0
                  - text: "\r\t\t"
                    attr: 3
                  - text: "WHILE appName[i] # 0X DO\r\t\t\tIF appName[i] = \".\" THEN j := i END;\r\t\t\tINC(i)\r\t\tEND;\r\t\tIF j > 0 THEN appName[j] := 0X END;\r\t\tp := WinApi.GetCommandLineW(); i := 0; res := 1;\r\t\tREPEAT\r\t\t\tGetName(p, i, path, opt);\r\t\t\tIF opt = \"/USE\" THEN\r\t\t\t\tGetName(p, i, path, opt);\r\t\t\t\tres1 := WinApi.ExpandEnvironmentStringsW(path, s, LEN(s) - 2);\r\t\t\t\tIF (res1 = 0) OR (res1 > LEN(s) - 2) THEN s := path ELSE path := s$ END;\r\t\t\t\tattr := BITS(WinApi.GetFileAttributesW(s));\r\t\t\t\tIF (attr # {0..MAX(SET)}) & (WinApi.FILE_ATTRIBUTE_DIRECTORY * attr # {}) THEN res := 0\r\t\t\t\tELSIF (path[1] = \":\") & ((path[2] = 0X) OR (path[2] = \"\\\") & (path[3] = 0X))\r\t\t\t\t\t& (WinApi.GetDriveTypeW(s) >= 2) THEN res := 0\r\t\t\t\tEND\r\t\t\tEND\r\t\tUNTIL (res = 0) OR (p[i] < \" \");\r\t\tIF serverVersion & (res = 0) THEN\r\t\t\ti := LEN(path$);\r\t\t\tIF (path[i-1] = \"/\") OR (path[i-1] = \"\\\") THEN DEC(i); path[i] := 0X END;\r\t\t\tdir.startup := NewLocator(path);\r\t\t\tdir.startup.rootLen := i\r\t\tEND;\r\t\tres := WinApi.GetTempPathW(LEN(path), path);\r\t\tdir.temp := NewLocator(path);\r\t\tFiles.SetDir(dir)\r\tEND Init;\r\r\t"
                    attr: 0
