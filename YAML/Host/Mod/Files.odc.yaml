                  - text: " d.startup.This(path)\r\tEND This;\r\r\tPROCEDURE (d: Directory) New (loc: Files.Locator; ask: BOOLEAN): Files.File;\r\t\tVAR f: File; res: INTEGER; attr: SET;\r\tBEGIN\r\t\tASSERT(loc # NIL, 20); f := NIL; res := ok;\r\t\tWITH loc: Locator DO\r\t\t\tIF loc.path # \"\" THEN\r\t\t\t\tattr := BITS(WinApi.GetFileAttributesW(loc.path));\r\t\t\t\tIF attr = {0..MAX(SET)} THEN\t"
                    attr: 0
                  - text: "(* error *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tres := WinApi.GetLastError();\r\t\t\t\t\tIF (res = fileNotFoundErr) OR (res = pathNotFoundErr) THEN\r\t\t\t\t\t\t"
