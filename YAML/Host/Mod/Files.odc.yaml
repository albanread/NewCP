                  - text: "* (loc: Files.Locator; old, new: Files.Name; ask: BOOLEAN);\r\t\tVAR res, i: INTEGER; oldname, newname, tn: FullName; f: File; attr: SET;\r\tBEGIN\r\t\tASSERT(loc # NIL, 20);\r\t\tWITH loc: Locator DO\r\t\t\tAppend(loc.path, old, \"\", loc.maxLen, oldname); Append(loc.path, new, \"\", loc.maxLen, newname);\r\t\t\tattr :=BITS( WinApi.GetFileAttributesW(oldname));\r\t\t\tIF ORD(attr) # -1 THEN\r\t\t\t\tf := ThisFile(oldname);\r\t\t\t\tIF (f # NIL) & (f.ref # invalid) THEN res := WinApi.CloseHandle(f.ref); f.ref := invalid END;\r\t\t\t\tIF Diff(oldname, newname, loc.caseSens) # 0 THEN\r\t\t\t\t\tCheckDelete(newname, loc.path, ask, res);\r\t\t\t\t\tIF res = ok THEN\r\t\t\t\t\t\tIF WinApi.MoveFileW(oldname, newname) # 0 THEN\r\t\t\t\t\t\t\tIF f # NIL THEN\t"
                    attr: 0
                  - text: "(* still in use => update file table *)\r"
                    attr: 1
                  - text: "\t\t\t\t"
                    attr: 0
                  - text: "\t\t\t\t"
                    attr: 1
                  - text: "f.name := newname$\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tELSE res := WinApi.GetLastError()\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tELSE\t(* destination is same file as source *)\r\t\t\t\t\ttn := oldname$; i := LEN(tn$) - 1;\r\t\t\t\t\tREPEAT\r\t\t\t\t\t\ttn[i] := CHR(ORD(tn[i]) + 1);\r\t\t\t\t\t\tIF WinApi.MoveFileW(oldname, tn) # 0 THEN res := ok\r\t\t\t\t\t\tELSE res := WinApi.GetLastError()\r\t\t\t\t\t\tEND\r\t\t\t\t\tUNTIL (res # fileExistsErr) & (res # alreadyExistsErr) & (res # paramErr);\r\t\t\t\t\tIF res = ok THEN\r\t\t\t\t\t\tIF WinApi.MoveFileW(tn, newname) = 0 THEN res := WinApi.GetLastError() END\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tELSE res := fileNotFoundErr\r\t\t\tEND\r\t\tELSE res := invalidNameErr\r\t\tEND;\r\t\tloc.res := Error(res)\r\tEND Rename;\r\r\tPROCEDURE (d: Directory) "
