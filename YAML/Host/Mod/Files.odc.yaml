                  - text: "(* check startup directory *)"
                    attr: 1
                  - text: "\r\t\t\tIF (loc.rootLen > 0) & ((res = ok) OR (res = fileNotFoundErr) OR (res = pathNotFoundErr)) THEN\r\t\t\t\tGetShadowDir(loc, s);\r\t\t\t\tAppend(s, wildcard, wildcard, loc.maxLen, s);\r\t\t\t\tfind := WinApi.FindFirstFileW(s, fd);\r\t\t\t\tIF find # invalid THEN\r\t\t\t\t\tREPEAT\r\t\t\t\t\t\tIF (WinApi.FILE_ATTRIBUTE_DIRECTORY * fd.dwFileAttributes # {})\r\t\t\t\t\t\t& (fd.cFileName # \".\") & (fd.cFileName # \"..\") & (LEN(fd.cFileName$) < LEN(info.name)) THEN\r\t\t\t\t\t\t\tinfo := first; last := NIL; s := fd.cFileName$;\r\t\t\t\t\t\t\tIF info # NIL THEN diff := Diff(info.name, s, loc.caseSens) END;\r\t\t\t\t\t\t\tWHILE (info # NIL) & (diff < 0) DO\r\t\t\t\t\t\t\t\tlast := info; info := info.next;\r\t\t\t\t\t\t\t\tIF info # NIL THEN diff := Diff(info.name, s, loc.caseSens) END\r\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\tIF (info = NIL) OR (diff # 0) THEN\r\t\t\t\t\t\t\t\tNEW(info);\r\t\t\t\t\t\t\t\tinfo.name := fd.cFileName$;\r\t\t\t\t\t\t\t\tinfo.attr := {};\r\t\t\t\t\t\t\t\tIF WinApi.FILE_ATTRIBUTE_HIDDEN * fd.dwFileAttributes # {} THEN\r\t\t\t\t\t\t\t\t\tINCL(info.attr, Files.hidden)\r\t\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\t\tIF WinApi.FILE_ATTRIBUTE_READONLY * fd.dwFileAttributes # {} THEN\r\t\t\t\t\t\t\t\t\tINCL(info.attr, Files.readOnly)\r\t\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\t\tIF WinApi.FILE_ATTRIBUTE_SYSTEM * fd.dwFileAttributes # {} THEN\r\t\t\t\t\t\t\t\t\tINCL(info.attr, Files.system)\r\t\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\t\tIF WinApi.FILE_ATTRIBUTE_ARCHIVE * fd.dwFileAttributes # {} THEN\r\t\t\t\t\t\t\t\t\tINCL(info.attr, Files.archive)\r\t\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\t\tIF last = NIL THEN info.next := first; first := info ELSE info.next := last.next; last.next := info END\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\ti := WinApi.FindNextFileW(find, fd)\r\t\t\t\t\tUNTIL i = 0;\r\t\t\t\t\tres := WinApi.GetLastError(); i := WinApi.FindClose(find)\r\t\t\t\tELSE res := WinApi.GetLastError()\r\t\t\t\tEND;\r\t\t\t\tIF res = noMoreFilesErr THEN res := ok END\r\t\t\tEND;\r\t\t\tIF (res = fileNotFoundErr) OR (res = pathNotFoundErr) THEN res := firstRes END;\r\t\t\tloc.res := Error(res)\r\t\tELSE loc.res := invalidName\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
