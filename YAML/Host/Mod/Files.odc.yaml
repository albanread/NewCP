                  - text: "* (loc: Files.Locator): Files.LocInfo;\r\t\tVAR i, res, firstRes, diff: INTEGER; first, last, info: Files.LocInfo; s: FullName;\r\t\t\tfind: WinApi.HANDLE; fd: WinApi.WIN32_FIND_DATAW;\r\tBEGIN\r\t\tASSERT(loc # NIL, 20);\r\t\tfirst := NIL; last :=NIL;\r\t\tWITH loc: Locator DO\r\t\t\tAppend(loc.path, wildcard, wildcard, loc.maxLen, s);\r\t\t\tfind := WinApi.FindFirstFileW(s, fd);\r\t\t\tIF find # invalid THEN\r\t\t\t\tREPEAT\r\t\t\t\t\tIF (WinApi.FILE_ATTRIBUTE_DIRECTORY * fd.dwFileAttributes # {})\r\t\t\t\t\t& (fd.cFileName # \".\") & (fd.cFileName # \"..\") & (LEN(fd.cFileName$) < LEN(info.name)) THEN\r\t\t\t\t\t\tinfo := first; last := NIL; s := fd.cFileName$;\r\t\t\t\t\t\tWHILE (info # NIL) & (Diff(info.name, s, loc.caseSens) < 0) DO last := info; info := info.next END;\r\t\t\t\t\t\tNEW(info);\r\t\t\t\t\t\tinfo.name := fd.cFileName$;\r\t\t\t\t\t\tinfo.attr := {};\r\t\t\t\t\t\tIF WinApi.FILE_ATTRIBUTE_HIDDEN * fd.dwFileAttributes # {} THEN\r\t\t\t\t\t\t\tINCL(info.attr, Files.hidden)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF WinApi.FILE_ATTRIBUTE_READONLY * fd.dwFileAttributes # {} THEN\r\t\t\t\t\t\t\tINCL(info.attr, Files.readOnly)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF WinApi.FILE_ATTRIBUTE_SYSTEM * fd.dwFileAttributes # {} THEN\r\t\t\t\t\t\t\tINCL(info.attr, Files.system)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF WinApi.FILE_ATTRIBUTE_ARCHIVE * fd.dwFileAttributes # {} THEN\r\t\t\t\t\t\t\tINCL(info.attr, Files.archive)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF last = NIL THEN info.next := first; first := info ELSE info.next := last.next; last.next := info END\r\t\t\t\t\tEND;\r\t\t\t\t\ti := WinApi.FindNextFileW(find, fd)\r\t\t\t\tUNTIL i = 0;\r\t\t\t\tres := WinApi.GetLastError(); i := WinApi.FindClose(find)\r\t\t\tELSE res := WinApi.GetLastError()\r\t\t\tEND;\r\t\t\tIF res = noMoreFilesErr THEN res := ok END;\r\t\t\tfirstRes := res;\r\t\t\t"
