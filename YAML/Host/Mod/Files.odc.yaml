                  - text: "\r\t\t\t\t\t\tELSE CheckPath(loc.path, ask, res)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE res := pathNotFoundErr\r\t\t\t\t\tEND\r\t\t\t\tELSIF WinApi.FILE_ATTRIBUTE_DIRECTORY * attr = {} THEN res := fileExistsErr\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF res = ok THEN\r\t\t\t\tNEW(f); f.loc := loc; f.name := \"\";\r\t\t\t\tf.state := new; f.swapper := -1; f.len := 0; f.ref := invalid\r\t\t\tEND\r\t\tELSE res := invalidNameErr\r\t\tEND;\r\t\tloc.res := Error(res);\r\t\t"
