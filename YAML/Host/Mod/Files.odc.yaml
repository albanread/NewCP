                    attr: 3
                  - text: " f\r\tEND Temp;\r\r\tPROCEDURE GetShadowDir (loc: Locator; OUT dir: FullName);\r\t\tVAR i, j: INTEGER;\r\tBEGIN\r\t\tdir := startupDir$; i := startupLen; j := loc.rootLen;\r\t\tWHILE loc.path[j] # 0X DO dir[i] := loc.path[j]; INC(i); INC(j) END;\r\t\tdir[i] := 0X\r\tEND GetShadowDir;\r\r\tPROCEDURE (d: Directory) Old (loc: Files.Locator; name: Files.Name; shrd: BOOLEAN): Files.File;\r\t\tVAR res, i, j: INTEGER; f: File; ref: WinApi.HANDLE; fname: FullName; type: Files.Type; s: BYTE;\r\tBEGIN\r\t\tASSERT(loc # NIL, 20); ASSERT(name # \"\", 21);\r\t\tres := ok; f := NIL;\r\t\tWITH loc: Locator DO\r\t\t\tAppend(loc.path, name, \"\", loc.maxLen, fname);\r\t\t\tf := ThisFile(fname);\r\t\t\tIF f # NIL THEN\r\t\t\t\tIF ~shrd OR (f.state = exclusive) THEN loc.res := Error(sharingErr); "
                    attr: 0
