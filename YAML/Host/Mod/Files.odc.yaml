                  - text: "* (IN fname: ARRAY OF CHAR): Locator;\r\t\tVAR loc: Locator; res, n, max, i: INTEGER; root: FullName; ch: CHAR; f: SET;\r\tBEGIN\r\t\tNEW(loc); loc.path := fname$; i := 0;\r\t\tWHILE loc.path[i] # 0X DO INC(i) END;\r\t\tIF (loc.path[i-1] = \"/\") OR (loc.path[i-1] = \"\\\") THEN loc.path[i-1] := 0X END;\r\t\ti := 0; n := 1;\r\t\tIF ((fname[0] = \"\\\") OR (fname[0] = \"/\")) & ((fname[1] = \"\\\") OR (fname[1] = \"/\")) THEN n := 4 END;\r\t\tREPEAT\r\t\t\tch := fname[i]; root[i] := ch; INC(i);\r\t\t\tIF (ch = \"/\") OR (ch = \"\\\") THEN DEC(n) END\r\t\tUNTIL (ch = 0X) OR (n = 0);\r\t\t"
                    attr: 0
                  - text: "IF ch = 0X THEN root[i-1] := \"\\\" END;\r"
                    attr: 3
                  - text: "\t\troot[i] := 0X; res := WinApi.GetVolumeInformationW(root, NIL, 0, n, max, f, NIL, 0);\r\t\tIF res = 0 THEN\r\t\t\tmax := 12; f := {}\t"
                    attr: 0
                  - text: "(* FAT values *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\t\tloc.maxLen := max; loc.caseSens := FALSE;\t(* 0 IN f; *)\t"
                    attr: 0
                  - text: "(* NT erroneously returns true here *)"
                    attr: 1
                  - text: "\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " loc\r\tEND NewLocator;\r\r\tPROCEDURE GetType (IN name: ARRAY OF CHAR; VAR type: Files.Type);\r\t\tVAR i, j: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ti := 0; j := 0;\r\t\tWHILE name[i] # 0X DO INC(i) END;\r\t\tWHILE (i > 0) & (name[i] # \".\") DO DEC(i) END;\r\t\tIF i > 0 THEN\r\t\t\tINC(i); ch := name[i];\r\t\t\tWHILE (j < LEN(type) - 1) & (ch # 0X) DO\r\t\t\t\tch := Kernel.Lower(ch);\r\t\t\t\ttype[j] := ch; INC(j);\r\t\t\t\tINC(i); ch := name[i]\r\t\t\tEND\r\t\tEND;\r\t\ttype[j] := 0X\r\tEND GetType;\r\r\tPROCEDURE Append (IN path, name: ARRAY OF CHAR; type: Files.Type; max: INTEGER;\r\t\tVAR res: ARRAY OF CHAR\r\t);\r\t\tVAR i, j, n, m, dot: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ti := 0;\r\t\tWHILE path[i] # 0X DO res[i] := path[i]; INC(i) END;\r\t\tIF path # \"\" THEN\r\t\t\tASSERT((res[i-1] # \"/\") & (res[i-1] # \"\\\"), 100);\r\t\t\tres[i] := \"\\\"; INC(i)\r\t\tEND;\r\t\tj := 0; ch := name[0]; n := 0; m := max; dot := -1;\r\t\tIF max = 12 THEN m := 8 END;\r\t\tWHILE (i < LEN(res) - 1) & (ch # 0X) DO\r\t\t\tIF (ch = \"/\") OR (ch = \"\\\") THEN\r\t\t\t\tres[i] := ch; INC(i); n := 0; m := max; dot := -1;\r\t\t\t\tIF max = 12 THEN m := 8 END\r\t\t\tELSIF (n < m) OR (ch = \".\") & (n = 8) THEN\r\t\t\t\tres[i] := ch; INC(i); INC(n);\r\t\t\t\tIF ch = \".\" THEN dot := n;\r\t\t\t\t\tIF max = 12 THEN m := n + 3 END\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tINC(j); ch := name[j]\r\t\tEND;\r\t\tIF (dot = -1) & (type # \"\") THEN\r\t\t\tIF max = 12 THEN m := n + 4 END;\r\t\t\tIF (n < m) & (i < LEN(res) - 1) THEN res[i] := \".\"; INC(i); INC(n); dot := n END\r\t\tEND;\r\t\tIF n = dot THEN j := 0;\r\t\t\tWHILE (n < m) & (i < LEN(res) - 1) & (type[j] # 0X) DO res[i] := type[j]; INC(i); INC(j) END\r\t\tEND;\r\t\tres[i] := 0X\r\tEND Append;\r\r\tPROCEDURE CloseFileHandle (f: File; VAR res: INTEGER);\r\tBEGIN\r\t\tIF (f.ref = invalid) OR (WinApi.CloseHandle(f.ref) # 0) THEN res := ok\t"
                    attr: 0
                  - text: "(* !!! *)"
                    attr: 1
                  - text: "\r\t\tELSE res := WinApi.GetLastError()\r\t\tEND;\r\t\tf.ref := invalid\r\tEND CloseFileHandle;\r\r\tPROCEDURE CloseFile (f: File; VAR res: INTEGER);\r\t\tVAR s: INTEGER;\r\tBEGIN\r\t\tIF f.state = exclusive THEN\r\t\t\tf.Flush;\r\t\t\tres := WinApi.FlushFileBuffers(f.ref)\r\t\t END;\r\t\ts := f.state; f.state := closed;\r\t\tCloseFileHandle (f, res);\r\t\tIF (s IN {temp, new, hidden}) & (f.name # \"\") THEN\r\t\t\tres := WinApi.DeleteFileW(f.name)\r\t\tEND\r\tEND CloseFile;\r\r\tPROCEDURE (f: File) FINALIZE;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF f.state # closed THEN CloseFile(f, res) END\r\tEND FINALIZE;\r\r\tPROCEDURE (VAR id: Identifier) Identified (): BOOLEAN;\r\t\tVAR f: File;\r\tBEGIN\r\t\tf := id.obj(File);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " (f.state IN {shared, exclusive}) & (Diff(f.name, id.name, f.loc.caseSens) = 0)\r\tEND Identified;\r\r\tPROCEDURE ThisFile (IN name: FullName): File;\r\t\tVAR id: Identifier; p: ANYPTR;\r\tBEGIN\r\t\tid.typ := SYSTEM.TYP(File); id.name := name$;\r\t\tp := Kernel.ThisFinObj(id);\r\t\tIF p # NIL THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " p(File)\r\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL\r\t\tEND\r\tEND ThisFile;\r\r\tPROCEDURE (VAR s: Searcher) Identified (): BOOLEAN;\r\t\tVAR f: File;\r\tBEGIN\r\t\tf := s.obj(File);\r\t\tIF (f.ref # invalid) & ((s.f = NIL) OR (f.t < s.f.t)) THEN s.f := f END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE\r\tEND Identified;\r\r\tPROCEDURE SearchFileToClose;\r\t\tVAR s: Searcher; p: ANYPTR; (* res: LONGINT; *)\r\tBEGIN\r\t\ts.typ := SYSTEM.TYP(File); s.f := NIL;\r\t\tp := Kernel.ThisFinObj(s);\r\t\tIF s.f # NIL THEN\r\t\t\tres := WinApi.CloseHandle(s.f.ref); s.f.ref := invalid;\r\t\t\tIF res = 0 THEN res := WinApi.GetLastError(); HALT(100) END\r\t\tEND\r\tEND SearchFileToClose;\r\r\tPROCEDURE NewFileRef (state: INTEGER; VAR name: FullName): WinApi.HANDLE;\r\tBEGIN\r\t\tIF state = create THEN\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.CreateFileW(name, WinApi.GENERIC_READ + WinApi.GENERIC_WRITE, {},\r\t\t\t\t\t\t\t\t\t\tNIL, WinApi.CREATE_NEW, WinApi.FILE_ATTRIBUTE_TEMPORARY, 0)\r\t\tELSIF state = shared THEN\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.CreateFileW(name, WinApi.GENERIC_READ, WinApi.FILE_SHARE_READ,\r\t\t\t\t\t\t\t\t\t\tNIL, WinApi.OPEN_EXISTING, {}, 0)\r\t\tELSE\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.CreateFileW(name, WinApi.GENERIC_READ + WinApi.GENERIC_WRITE, {},\r\t\t\t\t\t\t\t\t\t\tNIL, WinApi.OPEN_EXISTING, {}, 0)\r\t\tEND\r\tEND NewFileRef;\r\r\tPROCEDURE OpenFile (state: INTEGER; VAR name: FullName; VAR ref, res: INTEGER);\r\tBEGIN\r\t\tref := NewFileRef(state, name);\r\t\tIF ref = invalid THEN\r\t\t\tres := WinApi.GetLastError();\r\t\t\tIF (res = tooManyOpenFilesErr) OR (res = noSystemResourcesErr) THEN\r\t\t\t\tKernel.Collect;\r\t\t\t\tref := NewFileRef(state, name);\r\t\t\t\tIF ref = invalid THEN\r\t\t\t\t\tres := WinApi.GetLastError();\r\t\t\t\t\tIF (res = tooManyOpenFilesErr) OR (res = noSystemResourcesErr) THEN\r\t\t\t\t\t\tSearchFileToClose;\r\t\t\t\t\t\tref := NewFileRef(state, name);\r\t\t\t\t\t\tIF ref = invalid THEN\r\t\t\t\t\t\t\tres := WinApi.GetLastError()\r\t\t\t\t\t\tELSE res := ok\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tELSE res := ok\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE res := ok\r\t\tEND\r\tEND OpenFile;\r\r\tPROCEDURE GetTempFileName (IN path: FullName; OUT name: FullName; num: INTEGER);\r\t\tVAR i: INTEGER; str: ARRAY 16 OF CHAR;\r\tBEGIN\r\t\tstr := tempName; i := 7;\r\t\tWHILE i > 2 DO\r\t\t\tstr[i] := CHR(num MOD 10 + ORD(\"0\")); DEC(i); num := num DIV 10\r\t\tEND;\r\t\tAppend(path, str, \"\", 8, name)\r\tEND GetTempFileName;\r\r\tPROCEDURE CreateFile (f: File; VAR res: INTEGER);\r\t\tVAR num, n: INTEGER;\r\tBEGIN\r\t\tIF f.name = \"\" THEN\r\t\t\tnum := WinApi.GetTickCount(); n := 200;\r\t\t\tREPEAT\r\t\t\t\tGetTempFileName(f.loc.path, f.name, num); INC(num); DEC(n);\r\t\t\t\tOpenFile(create, f.name, f.ref, res)\r\t\t\tUNTIL (res # fileExistsErr) & (res # alreadyExistsErr) & (res # paramErr) OR (n = 0)\r\t\tELSE\r\t\t\tOpenFile(f.state, f.name, f.ref, res)\r\t\tEND\r\tEND CreateFile;\r\r\tPROCEDURE Delete (IN fname, path: FullName; VAR res: INTEGER);\r\t\tVAR num, n, s: INTEGER; f: File; new: FullName; attr: SET;\r\tBEGIN\r\t\tASSERT(fname # \"\", 100);\r\t\tf := ThisFile(fname);\r\t\tIF f = NIL THEN\r\t\t\tIF WinApi.DeleteFileW(fname) # 0 THEN res := ok\r\t\t\tELSE res := WinApi.GetLastError()\r\t\t\tEND\r\t\tELSE "
