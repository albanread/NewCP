                  - text: "* (loc0: Files.Locator; name0: Files.Name;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tloc1: Files.Locator; name1: Files.Name): BOOLEAN;\r\t\tVAR p0, p1: FullName;\r\tBEGIN\r\t\tASSERT(loc0 # NIL, 20); ASSERT(loc1 # NIL, 21);\r\t\tWITH loc0: Locator DO Append(loc0.path, name0, \"\", loc0.maxLen, p0) END;\r\t\tWITH loc1: Locator DO Append(loc1.path, name1, \"\", loc1.maxLen, p1) END;\r\t\t"
