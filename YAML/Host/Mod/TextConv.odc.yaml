                  - text: " ch\r\tEND ThisWndChar;\r\t\r\tPROCEDURE ParseRichText (rd: Files.Reader; wr: TextModels.Writer; VAR defRuler: TextRulers.Ruler);\r\t\tTYPE \r\t\t\tFontInfo = POINTER TO RECORD id: INTEGER; f: Fonts.Typeface; next: FontInfo END;\r\t\t\tColorInfo = POINTER TO RECORD id: INTEGER; c: Ports.Color; next: ColorInfo END;\r\t\tCONST text = 0; fonttab = 1; colortab = 2; skip = 3;\r\t\tVAR ch: CHAR; tabStyle: SET;\r\t\t\tfact, val, defFont, dest, idx, fnum, cnum, paraPos, i: INTEGER;\r\t\t\tfonts, font: FontInfo; colors: ColorInfo;\r\t\t\thasNum, remPar, skipDest: BOOLEAN;\r\t\t\tf: Fonts.Font; comm: ARRAY 32 OF CHAR;\r\t\t\tc, con: Context; p0: Properties.Property; p: TextRulers.Prop;\r\t\t\truler: TextRulers.Ruler;\r\t\t\tpattr: TextRulers.Attributes;\r\t\t\tskipCnt, uniCnt : INTEGER;\r\t\t\t\r\t\tPROCEDURE Color(i: INTEGER): ColorInfo;\r\t\t\tVAR c: ColorInfo;\r\t\tBEGIN\r\t\t\tASSERT(colors # NIL, 20);\r\t\t\tc := colors;\r\t\t\tWHILE (c # NIL) & (c.id # i) DO c := c.next END;\r\t\t\tASSERT(c # NIL, 100);\r\t\t\t"
                    attr: 0
