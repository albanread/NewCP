                  - text: " f\r\t\tEND Font;\r\t\t\r\t\tPROCEDURE SetFont(i: INTEGER; tf: Fonts.Typeface);\r\t\t\tVAR f: FontInfo;\r\t\tBEGIN\r\t\t\tNEW(f); f.id := i; f.f := tf; f.next := fonts; fonts := f\r\t\tEND SetFont;\r\t\t\r\t\tPROCEDURE Next (VAR ch: CHAR);\r\t\t\tVAR b: BYTE;\r\t\tBEGIN\r\t\t\trd.ReadByte(b); ch := CHR(b MOD 256)\r\t\tEND Next;\r\t\t\r\t\tPROCEDURE Write (ch: CHAR);\r\t\tBEGIN\r\t\t\tIF skipCnt > 0 THEN\r\t\t\t\tDEC(skipCnt)\r\t\t\tELSIF dest = text THEN\r\t\t\t\tIF ch < 100X THEN WriteWndChar(wr, ch)\r\t\t\t\tELSE wr.WriteChar(ch)\r\t\t\t\tEND\r\t\t\tELSIF dest = fonttab THEN\r\t\t\t\tASSERT(font # NIL, 20);\r\t\t\t\tfont.f[idx] := ch; INC(idx); font.f[idx] := 0X\r\t\t\tEND\r\t\tEND Write;\r\t\t\r\t\tPROCEDURE Paragraph;\r\t\t\tVAR v: Views.View;\r\t\tBEGIN\r\t\t\tIF ~pattr.Equals(ruler.style.attr) THEN\t"
                    attr: 0
                  - text: "(* new ruler needed *)"
                    attr: 1
                  - text: "\r\t\t\t\twr.SetPos(paraPos);\r\t\t\t\tv := Views.CopyOf(ruler, Views.deep); ruler := v(TextRulers.Ruler);\r\t\t\t\truler.style.SetAttr(pattr);\r\t\t\t\twr.WriteView(ruler, Views.undefined, Views.undefined);\r\t\t\t\twr.SetPos(wr.Base().Length())\r\t\t\tELSIF (pattr.first # pattr.left)\r\t\t\t\t\tOR (pattr.lead > 0)\r\t\t\t\t\tOR (TextRulers.pageBreak IN pattr.opts) THEN\t"
                    attr: 0
                  - text: "(* paragraph marker needed *)"
                    attr: 1
                  - text: "\r\t\t\t\twr.SetPos(paraPos);\r\t\t\t\twr.WriteChar(FF);\r\t\t\t\twr.SetPos(wr.Base().Length())\r\t\t\tEND;\r\t\t\twr.WriteChar(CR);\r\t\t\tparaPos := wr.Pos()\r\t\tEND Paragraph;\r\t\t\r\tBEGIN\r\t\tdefFont := 0; fnum := 1; f := Fonts.dir.Default(); NEW(fonts); fonts.f := f.typeface; skipCnt := 0; uniCnt := 1;\r\t\tcnum := 1; NEW(colors); SetColor(0, Ports.defaultColor);\r\t\tdest := text; con := NIL; paraPos := 0; remPar := FALSE; skipDest := FALSE;\r\t\tdefRuler := TextRulers.dir.New(NIL); ruler := defRuler; pattr := defRuler.style.attr; tabStyle := {};\r\t\tNext(ch);\r\t\tWHILE ch # 0X DO\r\t\t\tIF ch = \"{\" THEN\r\t\t\t\tskipCnt := 0;\r\t\t\t\tNEW(c); c.dest := dest; c.attr := wr.attr; c.pattr := pattr; c.uniCnt := uniCnt; c.next := con; con := c;\r\t\t\t\tNext(ch)\r\t\t\tELSIF ch = \"}\" THEN\r\t\t\t\tskipCnt := 0;\r\t\t\t\tIF con # NIL THEN\r\t\t\t\t\tdest := con.dest; uniCnt := con.uniCnt; wr.SetAttr(con.attr); pattr := con.pattr; con := con.next\r\t\t\t\tEND;\r\t\t\t\tNext(ch)\r\t\t\tELSIF ch = \"\\\" THEN\r\t\t\t\tNext(ch); i := 0; val := 0;\r\t\t\t\tIF (ch >= \"a\") & (ch <= \"z\") THEN\r\t\t\t\t\tWHILE (ch >= \"a\") & (ch <= \"z\") DO comm[i] := ch; INC(i); Next(ch) END;\r\t\t\t\t\tcomm[i] := 0X; fact := 1; hasNum := FALSE;\r\t\t\t\t\tIF ch = \"-\" THEN fact := -1; Next(ch) END;\r\t\t\t\t\tWHILE (ch >= \"0\") & (ch <= \"9\") DO\r\t\t\t\t\t\tval := 10 * val + ORD(ch) - ORD(\"0\"); Next(ch); hasNum := TRUE\r\t\t\t\t\tEND;\r\t\t\t\t\tval := val * fact;\r\t\t\t\t\tIF ch = \" \" THEN Next(ch) END;\r\t\t\t\t"
                    attr: 0
