                  - text: " w.WriteSString(\"\\-\")\r\t\t\t\t| 0A1X..0ACX, 0AEX..0FFX:\r\t\t\t\t\tw.WriteSString(\"\\'\"); w.WriteIntForm(ORD(ch), TextMappers.hexadecimal, 2, \"0\", FALSE)\r\t\t\t\tELSE\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tr.ReadChar(ch)\r\t\tEND;\r\t\tw.WriteChar(\"}\");\r\t\t"
                    attr: 0
                  - text: "(* header *)"
                    attr: 1
                  - text: "\r\t\tw.SetPos(0);\r\t\tw.WriteSString(\"{\\rtf1\\ansi\\ansicpg1252\\deff0\");\r\t\tw.WriteSString(\"{\\fonttbl\"); i := 0;\r\t\tWHILE i < fnum DO\r\t\t\tIF fonts[i] = Fonts.default THEN fonts[i] := HostFonts.defFont.alias$ END;\r\t\t\tw.WriteSString(\"{\\f\"); w.WriteInt(i); w.WriteSString(\"\\fnil \"); w.WriteString(fonts[i]); w.WriteSString(\";}\");\r\t\t\tINC(i)\r\t\tEND;\r\t\tw.WriteChar(\"}\"); w.WriteLn;\r\t\tw.WriteSString(\"{\\colortbl;\"); i := 1;\r\t\tWHILE i < cnum DO\r\t\t\tw.WriteSString(\"\\red\"); w.WriteInt(colors[i] MOD 256);\r\t\t\tw.WriteSString(\"\\green\"); w.WriteInt(colors[i] DIV 256 MOD 256);\r\t\t\tw.WriteSString(\"\\blue\"); w.WriteInt(colors[i] DIV 65536 MOD 256);\r\t\t\tw.WriteChar(\";\"); INC(i)\r\t\tEND;\r\t\tw.WriteChar(\"}\"); w.WriteLn;\r\t\tw.WriteSString(\"\\deftab216 \");\r\t\tw.WriteSString(\"\\plain\")\r\tEND ConvertToRichText;\r\t\r\t\r\tPROCEDURE "
