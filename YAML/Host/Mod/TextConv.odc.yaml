                  - text: "(* character attributes *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tELSIF comm = \"plain\" THEN\r\t\t\t\t\t\twr.SetAttr(TextModels.NewWeight(wr.attr, Fonts.normal));\r\t\t\t\t\t\twr.SetAttr(TextModels.NewStyle(wr.attr, {}));\r\t\t\t\t\t\twr.SetAttr(TextModels.NewTypeface(wr.attr, Font(defFont).f));\r\t\t\t\t\t\twr.SetAttr(TextModels.NewSize(wr.attr, 24 * halfpoint));\r\t\t\t\t\t\twr.SetAttr(TextModels.NewColor(wr.attr, Ports.defaultColor));\r\t\t\t\t\t\twr.SetAttr(TextModels.NewOffset(wr.attr, 0))\r\t\t\t\t\tELSIF comm = \"b\" THEN\r\t\t\t\t\t\tIF hasNum & (val = 0) THEN wr.SetAttr(TextModels.NewWeight(wr.attr, Fonts.normal))\r\t\t\t\t\t\tELSE wr.SetAttr(TextModels.NewWeight(wr.attr, Fonts.bold))\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSIF comm = \"i\" THEN\r\t\t\t\t\t\tIF hasNum & (val = 0) THEN\r\t\t\t\t\t\t\twr.SetAttr(TextModels.NewStyle(wr.attr, wr.attr.font.style - {Fonts.italic}))\r\t\t\t\t\t\tELSE wr.SetAttr(TextModels.NewStyle(wr.attr, wr.attr.font.style + {Fonts.italic}))\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSIF comm = \"ul\" THEN\r\t\t\t\t\t\tIF hasNum & (val = 0) THEN\r\t\t\t\t\t\t\twr.SetAttr(TextModels.NewStyle(wr.attr, wr.attr.font.style - {Fonts.underline}))\r\t\t\t\t\t\tELSE wr.SetAttr(TextModels.NewStyle(wr.attr, wr.attr.font.style + {Fonts.underline}))\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSIF comm = \"strike\" THEN\r\t\t\t\t\t\tIF hasNum & (val = 0) THEN\r\t\t\t\t\t\t\twr.SetAttr(TextModels.NewStyle(wr.attr, wr.attr.font.style - {Fonts.strikeout}))\r\t\t\t\t\t\tELSE wr.SetAttr(TextModels.NewStyle(wr.attr, wr.attr.font.style + {Fonts.strikeout}))\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSIF comm = \"f\" THEN\r\t\t\t\t\t\tIF ~hasNum THEN val := defFont END;\r\t\t\t\t\t\tIF dest = fonttab THEN \r\t\t\t\t\t\t\tfnum := val; idx := 0; NEW(font); font.id := val; font.next := fonts; fonts := font\r\t\t\t\t\t\tELSE \r\t\t\t\t\t\t\twr.SetAttr(TextModels.NewTypeface(wr.attr, Font(val).f))\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSIF comm = \"fs\" THEN\r\t\t\t\t\t\tIF ~hasNum THEN val := 24 END;\r\t\t\t\t\t\twr.SetAttr(TextModels.NewSize(wr.attr, val * halfpoint))\r\t\t\t\t\tELSIF comm = \"cf\" THEN\r\t\t\t\t\t\twr.SetAttr(TextModels.NewColor(wr.attr, Color(val).c))\r\t\t\t\t\tELSIF comm = \"dn\" THEN\r\t\t\t\t\t\tIF ~hasNum THEN val := 6 END;\r\t\t\t\t\t\twr.SetAttr(TextModels.NewOffset(wr.attr, -(val * halfpoint)))\r\t\t\t\t\tELSIF comm = \"up\" THEN\r\t\t\t\t\t\tIF ~hasNum THEN val := 6 END;\r\t\t\t\t\t\twr.SetAttr(TextModels.NewOffset(wr.attr, val * halfpoint))\r\t\t\t\t\t"
                    attr: 0
                  - text: "(* paragraph attributes *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tELSIF comm = \"pard\" THEN\r\t\t\t\t\t\tpattr := defRuler.style.attr; tabStyle := {}\r\t\t\t\t\tELSIF comm = \"fi\" THEN\r\t\t\t\t\t\tNEW(p);\r\t\t\t\t\t\tp.valid := {TextRulers.first}; p.first := pattr.left + val * twips;\r\t\t\t\t\t\tIF p.first < 0 THEN\t"
                    attr: 0
                  - text: "(* change left indent to make the value legal *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\t\tp.valid := {TextRulers.left, TextRulers.first};\r\t\t\t\t\t\t\tp.left := pattr.left - p.first; p.first := 0\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tpattr := TextRulers.ModifiedAttr(pattr, p)\r\t\t\t\t\tELSIF comm = \"li\" THEN\r\t\t\t\t\t\tNEW(p);\r\t\t\t\t\t\tp.valid := {TextRulers.left, TextRulers.first};\r\t\t\t\t\t\tp.left := val * twips; p.first := p.left + pattr.first - pattr.left;\r\t\t\t\t\t\tpattr := TextRulers.ModifiedAttr(pattr, p)\r\t\t\t\t\tELSIF comm = \"ql\" THEN\r\t\t\t\t\t\tNEW(p);\r\t\t\t\t\t\tp.valid := {TextRulers.opts}; p.opts.val := {TextRulers.leftAdjust};\r\t\t\t\t\t\tp.opts.mask := {TextRulers.leftAdjust, TextRulers.rightAdjust};\r\t\t\t\t\t\tpattr := TextRulers.ModifiedAttr(pattr, p)\r\t\t\t\t\tELSIF comm = \"qr\" THEN\r\t\t\t\t\t\tNEW(p);\r\t\t\t\t\t\tp.valid := {TextRulers.opts}; p.opts.val := {TextRulers.rightAdjust};\r\t\t\t\t\t\tp.opts.mask := {TextRulers.leftAdjust, TextRulers.rightAdjust};\r\t\t\t\t\t\tpattr := TextRulers.ModifiedAttr(pattr, p)\r\t\t\t\t\tELSIF comm = \"qc\" THEN\r\t\t\t\t\t\tNEW(p);\r\t\t\t\t\t\tp.valid := {TextRulers.opts}; p.opts.val := {};\r\t\t\t\t\t\tp.opts.mask := {TextRulers.leftAdjust, TextRulers.rightAdjust};\r\t\t\t\t\t\tpattr := TextRulers.ModifiedAttr(pattr, p)\r\t\t\t\t\tELSIF comm = \"qj\" THEN\r\t\t\t\t\t\tNEW(p);\r\t\t\t\t\t\tp.valid := {TextRulers.opts}; p.opts.val := {TextRulers.leftAdjust, TextRulers.rightAdjust};\r\t\t\t\t\t\tp.opts.mask := {TextRulers.leftAdjust, TextRulers.rightAdjust};\r\t\t\t\t\t\tpattr := TextRulers.ModifiedAttr(pattr, p)\r\t\t\t\t\tELSIF comm = \"sb\" THEN\r\t\t\t\t\t\tNEW(p);\r\t\t\t\t\t\tp.valid := {TextRulers.lead}; p.lead := val * twips;\r\t\t\t\t\t\tpattr := TextRulers.ModifiedAttr(pattr, p)\r\t\t\t\t\tELSIF comm = \"sl\" THEN\r\t\t\t\t\t\tNEW(p);\r\t\t\t\t\t\tp.valid := {TextRulers.grid}; p.grid := val * twips;\r\t\t\t\t\t\tpattr := TextRulers.ModifiedAttr(pattr, p)\r\t\t\t\t\tELSIF comm = \"tqc\" THEN\r\t\t\t\t\t\ttabStyle := {TextRulers.centerTab}\r\t\t\t\t\tELSIF (comm = \"tqr\") OR (comm=\"tqdec\") THEN\r\t\t\t\t\t\ttabStyle := {TextRulers.rightTab}\r\t\t\t\t\tELSIF comm = \"tb\" THEN\r\t\t\t\t\t\tp0 := pattr.Prop(); p := p0(TextRulers.Prop);\r\t\t\t\t\t\tp.valid := {TextRulers.tabs};\r\t\t\t\t\t\tp.tabs.tab[p.tabs.len].stop := val * twips; \r\t\t\t\t\t\tp.tabs.tab[p.tabs.len].type := {TextRulers.barTab}; tabStyle := {}; \r\t\t\t\t\t\tINC(p.tabs.len);\r\t\t\t\t\t\tpattr := TextRulers.ModifiedAttr(pattr, p)\r\t\t\t\t\tELSIF comm = \"tx\" THEN\r\t\t\t\t\t\tp0 := pattr.Prop(); p := p0(TextRulers.Prop);\r\t\t\t\t\t\tp.valid := {TextRulers.tabs};\r\t\t\t\t\t\tp.tabs.tab[p.tabs.len].stop := val * twips; \r\t\t\t\t\t\tp.tabs.tab[p.tabs.len].type := tabStyle; tabStyle := {}; \r\t\t\t\t\t\tINC(p.tabs.len);\r\t\t\t\t\t\tpattr := TextRulers.ModifiedAttr(pattr, p)\r\t\t\t\t\tELSIF comm = \"pagebb\" THEN\r\t\t\t\t\t\tNEW(p);\r\t\t\t\t\t\tp.valid := {TextRulers.opts}; p.opts.val := {TextRulers.pageBreak}; p.opts.mask := p.opts.val;\r\t\t\t\t\t\tpattr := TextRulers.ModifiedAttr(pattr, p)\r\t\t\t\t"
                    attr: 0
                  - text: "\t(* header *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tELSIF comm = \"deff\" THEN\r\t\t\t\t\t\tIF hasNum THEN defFont := val END\r\t\t\t\t\tELSIF comm = \"fonttbl\" THEN\r\t\t\t\t\t\tIF dest # skip THEN dest := fonttab END\r\t\t\t\t\tELSIF comm = \"colortbl\" THEN\r\t\t\t\t\t\tIF dest # skip THEN dest := colortab; cnum := 0; SetColor(0, 0) END\r\t\t\t\t\tELSIF comm = \"red\" THEN\r\t\t\t\t\t\tIF dest = colortab THEN SetColor(cnum, Color(cnum).c + val MOD 256) END\r\t\t\t\t\tELSIF comm = \"green\" THEN\r\t\t\t\t\t\tIF dest = colortab THEN SetColor(cnum, Color(cnum).c + val MOD 256 * 256) END\r\t\t\t\t\tELSIF comm = \"blue\" THEN\r\t\t\t\t\t\tIF dest = colortab THEN SetColor(cnum, Color(cnum).c + val MOD 256 *  65536) END\r\t\t\t\t\tELSIF comm = \"rtf\" THEN\r\t\t\t\t\tELSIF comm = \"ansi\" THEN\r\t\t\t\t\tELSIF comm = \"lang\" THEN\r\t\t\t\t\tELSIF comm = \"langfe\" THEN\r\t\t\t\t\tELSIF comm = \"loch\" THEN\r\t\t\t\t\tELSIF comm = \"ltrch\" THEN\r\t\t\t\t\tELSIF comm = \"rtlch\" THEN\r\t\t\t\t\tELSIF comm = \"ansicpg\" THEN\r\t\t\t\t\t"
                    attr: 0
                  - text: "(* misc *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tELSIF comm = \"bin\" THEN rd.SetPos(rd.Pos() + val - 1); Next(ch)\r\t\t\t\t\t"
                    attr: 0
                  - text: "(* unicode *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tELSIF comm = \"u\" THEN Write(CHR(val)); skipCnt := uniCnt\r\t\t\t\t\tELSIF comm = \"uc\" THEN IF hasNum THEN uniCnt := val END\r\t\t\t\t\tELSIF comm = \"upr\" THEN dest := skip\t"
                    attr: 0
                  - text: "(* skip ANSI part *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tELSIF comm = \"ud\" THEN dest := text\t"
                    attr: 0
                  - text: "(* use Unicode part *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t"
                    attr: 0
                  - text: "(* unhandled destinations *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tELSIF comm = \"author\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"buptim\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"comment\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"creatim\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"doccomm\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"footer\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"footerl\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"footerr\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"footerf\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"footnote\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"ftnsep\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"ftnsepc\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"ftncn\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"header\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"headerl\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"headerr\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"headerf\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"info\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"keywords\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"object\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"operator\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"pict\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"printim\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"private1\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"revtim\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"rxe\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"stylesheet\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"subject\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"tc\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"title\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"txe\" THEN dest := skip\r\t\t\t\t\tELSIF comm = \"xe\" THEN dest := skip\r\t\t\t\t\tELSE "
                    attr: 0
                  - text: "(* unknown *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t"
                    attr: 0
                  - text: "\t"
                    attr: 3
                  - text: "IF skipDest & (con # NIL) & (con.next # NIL) THEN dest := skip END\r\t\t\t\t\tEND;\r\t\t\t\t\tskipDest := FALSE\r\t\t\t\tELSIF ch = \"'\" THEN\r\t\t\t\t\tNext(ch);\r\t\t\t\t\tIF ch <= \"9\" THEN val := ORD(ch) - ORD(\"0\") ELSE val := ORD(CAP(ch)) - ORD(\"A\") + 10 END;\r\t\t\t\t\tNext(ch);\r\t\t\t\t\tIF ch <= \"9\" THEN val := 16 * val + ORD(ch) - ORD(\"0\")\r\t\t\t\t\tELSE val := 16 * val + ORD(CAP(ch)) - ORD(\"A\") + 10\r\t\t\t\t\tEND;\r\t\t\t\t\tWrite(CHR(val)); Next(ch)\r\t\t\t\tELSE\r\t\t\t\t\tIF ch = \"~\" THEN Write(0A0X)\t"
                    attr: 0
                  - text: "(* nonbreaking space *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tELSIF ch = \"-\" THEN Write(0ADX)\t"
                    attr: 0
                  - text: "(* soft hyphen *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tELSIF ch = \"_\" THEN Write(2011X)\t"
                    attr: 0
                  - text: "(* nonbreaking hyphen *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tELSIF ch = \"*\" THEN skipDest := TRUE\r\t\t\t\t\tELSIF (ch = LF) OR (ch = CR) THEN Paragraph\r\t\t\t\t\tELSIF (ch = \"{\") OR (ch = \"}\") OR (ch = \"\\\") THEN Write(ch)\r\t\t\t\t\tEND;\r\t\t\t\t\tNext(ch)\r\t\t\t\tEND\r\t\t\tELSIF ch = \";\" THEN\r\t\t\t\tIF dest = fonttab THEN font := Font(fnum); font.f[idx] := 0X; INC(idx)\r\t\t\t\tELSIF dest = colortab THEN INC(cnum); SetColor(cnum, 0)\r\t\t\t\tELSIF dest = text THEN Write(\";\")\r\t\t\t\tEND;\r\t\t\t\tNext(ch)\r\t\t\tELSIF ch >= \" \" THEN\r\t\t\t\tWrite(ch); Next(ch)\r\t\t\tELSE \r\t\t\t\tNext(ch)\r\t\t\tEND\r\t\tEND\r\tEND ParseRichText;\r\t\r\tPROCEDURE ConvertToRichText (in: TextViews.View; beg, end: INTEGER; VAR out: TextModels.Model);\r\t\tVAR r: TextModels.Reader; w: TextMappers.Formatter; ch: CHAR; f: Fonts.Font;\r\t\t\tattr, attr0: TextModels.Attributes; col: Ports.Color; tf, atf: Fonts.Typeface; p, size, asize, offs: INTEGER;\r\t\t\tstyle, astyle: SET; weight, aweight: INTEGER; rattr, rattr0: TextRulers.Attributes; ruler: TextRulers.Ruler;\r\t\t\ttext: TextModels.Model; firstLine, firstLine0: BOOLEAN; fonts: ARRAY 256 OF Fonts.Typeface;\r\t\t\tcolors: ARRAY 256 OF Ports.Color; fnum, cnum, i: INTEGER;\r\tBEGIN\r\t\tout := TextModels.dir.New(); w.ConnectTo(out);\r\t\tf := Fonts.dir.Default(); tf := f.typeface;\r\t\tfnum := 1; fonts[0] := tf;\r\t\tcnum := 1; colors[0] := Ports.defaultColor;\r\t\tcol := Ports.defaultColor; size := 12 * Ports.point;\r\t\toffs := 0; style := {}; weight := Fonts.normal;\r\t\tattr0 := NIL; rattr0 := NIL; firstLine := TRUE; firstLine0 := FALSE;\r\t\ttext := in.ThisModel(); r := text.NewReader(NIL);\r\t\truler := TextViews.ThisRuler(in, beg); rattr := ruler.style.attr;\r\t\tr.SetPos(beg); r.ReadChar(ch);\r\t\tWHILE ~r.eot & (r.Pos() <= end) DO\r\t\t\tattr := r.attr;\r\t\t\tIF (r.view # NIL) & (r.view IS TextRulers.Ruler) THEN\r\t\t\t\truler := r.view(TextRulers.Ruler); rattr := ruler.style.attr;\r\t\t\t\tfirstLine := TRUE\r\t\t\tELSIF ch = FF THEN firstLine := TRUE\r\t\t\tEND;\r\t\t\tIF (rattr # rattr0) OR (firstLine # firstLine0) THEN\r\t\t\t\tIF (rattr # rattr0) OR (rattr.first # rattr.left) OR (rattr.lead # 0) OR (TextRulers.pageBreak IN rattr.opts)\r\t\t\t\tTHEN\r\t\t\t\t\tw.WriteSString(\"\\pard\");\r\t\t\t\t\tIF rattr.left # 0 THEN\r\t\t\t\t\t\tw.WriteSString(\"\\li\"); w.WriteInt(rattr.left DIV twips)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF firstLine & (rattr.first # rattr.left) THEN\r\t\t\t\t\t\tw.WriteSString(\"\\fi\"); w.WriteInt((rattr.first - rattr.left) DIV twips)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF firstLine & (rattr.lead # 0) THEN\r\t\t\t\t\t\tw.WriteSString(\"\\sb\"); w.WriteInt(rattr.lead DIV twips)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF rattr.grid > Ports.point THEN\r\t\t\t\t\t\tw.WriteSString(\"\\sl\"); w.WriteInt(rattr.grid DIV twips); w.WriteSString(\"\\slmult1\")\r\t\t\t\t\tEND;\r\t\t\t\t\tIF {TextRulers.leftAdjust, TextRulers.rightAdjust} - rattr.opts = {} THEN w.WriteSString(\"\\qj\")\r\t\t\t\t\tELSIF TextRulers.rightAdjust IN rattr.opts THEN w.WriteSString(\"\\qr\")\r\t\t\t\t\tELSIF ~(TextRulers.leftAdjust IN rattr.opts) THEN w.WriteSString(\"\\qc\")\r\t\t\t\t\tEND;\r\t\t\t\t\tIF firstLine & (TextRulers.pageBreak IN rattr.opts) THEN\r\t\t\t\t\t\tw.WriteSString(\"\\pagebb\")\r\t\t\t\t\tEND;\r\t\t\t\t\ti := 0;\r\t\t\t\t\tWHILE i < rattr.tabs.len DO\r\t\t\t\t\t\tIF TextRulers.centerTab IN rattr.tabs.tab[i].type THEN w.WriteSString(\"\\tqc\") END; \r\t\t\t\t\t\tIF TextRulers.rightTab IN rattr.tabs.tab[i].type THEN w.WriteSString(\"\\tqr\") END; \r\t\t\t\t\t\tIF TextRulers.barTab IN rattr.tabs.tab[i].type THEN w.WriteSString(\"\\tb\") END; \r\t\t\t\t\t\tw.WriteSString(\"\\tx\"); w.WriteInt(rattr.tabs.tab[i].stop DIV twips);\r\t\t\t\t\t\tINC(i)\r\t\t\t\t\tEND;\r\t\t\t\t\tw.WriteChar(\" \")\r\t\t\t\tEND;\r\t\t\t\trattr0 := rattr; firstLine0 := firstLine\r\t\t\tEND;\r\t\t\tIF attr # attr0 THEN\r\t\t\t\tp := w.Pos();\r\t\t\t\tIF attr.color # col THEN\r\t\t\t\t\ti := 0; WHILE (i < cnum) & (colors[i] # attr.color) DO INC(i) END;\r\t\t\t\t\tIF i = cnum THEN colors[i] := attr.color; INC(cnum) END;\r\t\t\t\t\tw.WriteSString(\"\\cf\"); w.WriteInt(i);\r\t\t\t\t\tcol := attr.color\r\t\t\t\tEND;\r\t\t\t\tatf := attr.font.typeface$; asize := attr.font.size; astyle := attr.font.style; aweight := attr.font.weight;\r\t\t\t\tIF atf # tf THEN\r\t\t\t\t\ti := 0; WHILE (i < fnum) & (fonts[i] # atf) DO INC(i) END;\r\t\t\t\t\tIF i = fnum THEN fonts[i] := atf; INC(fnum) END;\r\t\t\t\t\tw.WriteSString(\"\\f\"); w.WriteInt(i);\r\t\t\t\t\ttf := atf\r\t\t\t\tEND;\r\t\t\t\tIF asize # size THEN\r\t\t\t\t\tw.WriteSString(\"\\fs\"); w.WriteInt(asize DIV halfpoint);\r\t\t\t\t\tsize := asize\r\t\t\t\tEND;\r\t\t\t\tIF astyle # style THEN\r\t\t\t\t\tIF (Fonts.italic IN astyle) & ~(Fonts.italic IN style) THEN w.WriteSString(\"\\i\")\r\t\t\t\t\tELSIF ~(Fonts.italic IN astyle) & (Fonts.italic IN style) THEN w.WriteSString(\"\\i0\")\r\t\t\t\t\tEND;\r\t\t\t\t\tIF (Fonts.underline IN astyle) & ~(Fonts.underline IN style) THEN w.WriteSString(\"\\ul\")\r\t\t\t\t\tELSIF ~(Fonts.underline IN astyle) & (Fonts.underline IN style) THEN w.WriteSString(\"\\ul0\")\r\t\t\t\t\tEND;\r\t\t\t\t\tIF (Fonts.strikeout IN astyle) & ~(Fonts.strikeout IN style) THEN w.WriteSString(\"\\strike\")\r\t\t\t\t\tELSIF ~(Fonts.strikeout IN astyle) & (Fonts.strikeout IN style) THEN w.WriteSString(\"\\strike0\")\r\t\t\t\t\tEND;\r\t\t\t\t\tstyle := astyle\r\t\t\t\tEND;\r\t\t\t\tIF aweight # weight THEN\r\t\t\t\t\tIF (aweight > Fonts.normal) & (weight = Fonts.normal) THEN w.WriteSString(\"\\b\")\r\t\t\t\t\tELSIF (aweight = Fonts.normal) & (weight > Fonts.normal) THEN w.WriteSString(\"\\b0\")\r\t\t\t\t\tEND;\r\t\t\t\t\tweight := aweight\r\t\t\t\tEND;\r\t\t\t\tIF attr.offset # offs THEN\r\t\t\t\t\tIF attr.offset > 0 THEN w.WriteSString(\"\\up\"); w.WriteInt(attr.offset DIV halfpoint)\r\t\t\t\t\tELSIF attr.offset < 0 THEN w.WriteSString(\"\\dn\"); w.WriteInt(-(attr.offset DIV halfpoint))\r\t\t\t\t\tELSIF offs > 0 THEN w.WriteSString(\"\\up0\")\r\t\t\t\t\tELSE w.WriteSString(\"\\dn0\")\r\t\t\t\t\tEND;\r\t\t\t\t\toffs := attr.offset\r\t\t\t\tEND;\r\t\t\t\tIF w.Pos() # p THEN w.WriteChar(\" \") END;\r\t\t\t\tattr0 := attr\r\t\t\tEND;\r\t\t\tIF ch >= 100X THEN\r\t\t\t\tIF ch = 2002X THEN w.WriteSString(\"\\enspace \")\r\t\t\t\tELSIF ch = 2003X THEN w.WriteSString(\"\\emspace \")\r\t\t\t\tELSIF ch = 2013X THEN w.WriteSString(\"\\endash \")\r\t\t\t\tELSIF ch = 2014X THEN w.WriteSString(\"\\emdash \")\r\t\t\t\tELSIF ch = 2010X THEN w.WriteChar(\"-\")\r\t\t\t\tELSIF ch = 2011X THEN w.WriteSString(\"\\_\")\r\t\t\t\tELSIF ch = 201CX THEN (* "
                    attr: 0
                  - text: "unicode: left double quote"
