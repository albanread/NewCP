                  - text: " *) w.WriteSString(\"\\ldblquote \")\r\t\t\t\tELSIF ch = 201DX THEN (* "
                    attr: 0
                  - text: "unicode: right double quote"
                    attr: 1
                  - text: " *) w.WriteSString(\"\\rdblquote \")\r\t\t\t\tELSIF ch = 2018X THEN (* "
                    attr: 0
                  - text: "unicode: left single quote"
                    attr: 1
                  - text: " *) w.WriteSString(\"\\lquote \")\r\t\t\t\tELSIF ch = 2019X THEN (* "
                    attr: 0
                  - text: "unicode: right single quote"
                    attr: 1
                  - text: " *) w.WriteSString(\"\\rquote \")\t\t\t\t\t\r\t\t\t\tELSE\r\t\t\t\t\tw.WriteSString(\"\\u\"); w.WriteInt(ORD(ch)); \r\t\t\t\t\tch := ThisWndChar(ch);\r\t\t\t\t\tIF ch >= 80X THEN\r\t\t\t\t\t\tw.WriteSString(\"\\'\"); \r\t\t\t\t\t\tw.WriteIntForm(ORD(ch), TextMappers.hexadecimal, 2, \"0\", FALSE)\r\t\t\t\t\tELSE\r\t\t\t\t\t\tw.WriteChar(ch)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tCASE ch OF \r\t\t\t\t| TAB: w.WriteSString(\"\\tab \")\r\t\t\t\t| CR: w.WriteSString(\"\\par \"); w.WriteLn; firstLine := FALSE\r\t\t\t\t| \" \"..\"[\", \"]\"..\"z\", \"|\", \"~\": w.WriteChar(ch)\r\t\t\t\t| \"\\\": w.WriteSString(\"\\\\\")\r\t\t\t\t| \"{\": w.WriteSString(\"\\{\")\r\t\t\t\t| \"}\": w.WriteSString(\"\\}\")\r\t\t\t\t| 8FX: "
