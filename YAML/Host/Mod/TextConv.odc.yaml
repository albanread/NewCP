                    attr: 0
                  - text: "(* euro *)"
                    attr: 1
                  - text: "\r\t\t\tELSIF ch =  201AX THEN ch := 82X\r\t\t\tELSIF ch =  0192X THEN ch := 83X\r\t\t\tELSIF ch =  201EX THEN ch := 84X\r\t\t\tELSIF ch =  2026X THEN ch := 85X\r\t\t\tELSIF ch =  2020X THEN ch := 86X\r\t\t\tELSIF ch =  2021X THEN ch := 87X\r\t\t\tELSIF ch =  02C6X THEN ch := 88X\r\t\t\tELSIF ch =  2030X THEN ch := 89X\r\t\t\tELSIF ch =  0160X THEN ch := 8AX\r\t\t\tELSIF ch =  2039X THEN ch := 8BX\r\t\t\tELSIF ch =  0152X THEN ch := 8CX\r\t\t\tELSIF ch =  2018X THEN ch := 91X\r\t\t\tELSIF ch =  2019X THEN ch := 92X\r\t\t\tELSIF ch =  201CX THEN ch := 93X\r\t\t\tELSIF ch =  201DX THEN ch := 94X\r\t\t\tELSIF ch =  2022X THEN ch := 95X\r\t\t\tELSIF ch =  2013X THEN ch := 96X\r\t\t\tELSIF ch =  2014X THEN ch := 97X\r\t\t\tELSIF ch =  02DCX THEN ch := 98X\r\t\t\tELSIF ch =  2122X THEN ch := 99X\r\t\t\tELSIF ch =  0161X THEN ch := 9AX\r\t\t\tELSIF ch =  203AX THEN ch := 9BX\r\t\t\tELSIF ch =  0153X THEN ch := 9CX\r\t\t\tELSIF ch =  0178X THEN ch := 9FX\r\t\t\tELSE  ch := \"?\"\r\t\t\tEND\r\t\tELSIF ch = 08FX THEN ch := \" \"\t"
