                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: "\r\t\tEND;\t\t\r\t\thnd := MediumGlobal(med);\r\t\tASSERT(hnd # 0, 20);\r\t\tadr := WinApi.GlobalLock(hnd);\r\t\tNEW(rd); rd.adr := adr; rd.pos := 0;\r\t\tt := TextModels.dir.New(); wr := t.NewWriter(NIL);\r\t\tParseRichText(rd, wr, ruler);\r\t\tres := WinApi.GlobalUnlock(hnd);\r\t\tv := TextViews.dir.New(t);\r\t\tv(TextViews.View).SetDefaults(ruler, TextModels.dir.attr);\r\t\tpref.w := Views.undefined; pref.h := Views.undefined;\r\t\tViews.HandlePropMsg(v, pref);\r\t\tw := pref.w; h := pref.h; isSingle := FALSE\r\tEND ImportDRichText;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ImportDUnicode
                    attr: 3
                  - text: "* (VAR med: WinOle.STGMEDIUM; OUT v: Views.View;\r\t\t\t\t\t\t\t\t\t\t\t\tOUT w, h: INTEGER; OUT isSingle: BOOLEAN);\r\t\tVAR t: TextModels.Model; res, adr: INTEGER; wr: TextModels.Writer; uc: CHAR;\r\t\t\thnd: WinApi.HANDLE; attr: TextModels.Attributes; p: Properties.StdProp; pref: Properties.BoundsPref;\r\tBEGIN\r\t\thnd := MediumGlobal(med);\r\t\tASSERT(hnd # 0, 20);\r\t\tadr := WinApi.GlobalLock(hnd);\r\t\tt := TextModels.dir.New(); wr := t.NewWriter(NIL);\r\t\tIF HostClipboard.cloneAttributes THEN\r\t\t\tProperties.CollectStdProp(p);\r\t\t\tNEW(attr); attr.InitFromProp(p);\r\t\t\twr.SetAttr(attr)\r\t\tEND;\r\t\tSYSTEM.GET(adr, uc);\r\t\tWHILE uc # 0X DO\r\t\t\tASSERT(uc # 0FFFEX, 100);\r\t\t\tIF uc < 100X THEN WriteWndChar(wr, uc)\r\t\t\tELSIF uc # 0FEFFX THEN wr.WriteChar(uc)\r\t\t\tEND;\r\t\t\tINC(adr, 2); SYSTEM.GET(adr, uc)\r\t\tEND;\r\t\tres := WinApi.GlobalUnlock(hnd);\r\t\tv := TextViews.dir.New(t);\r\t\tpref.w := Views.undefined; pref.h := Views.undefined;\r\t\tViews.HandlePropMsg(v, pref);\r\t\tw := pref.w; h := pref.h; isSingle := FALSE\r\tEND ImportDUnicode;\r\r\tPROCEDURE "
                    attr: 0
