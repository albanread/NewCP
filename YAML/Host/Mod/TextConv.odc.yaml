                  - text: "\r\t\t\tIF hnd # 0 THEN\r\t\t\t\tadr := WinApi.GlobalLock(hnd);\r\t\t\t\tr := t.NewReader(NIL); r.ReadChar(ch);\r\t\t\t\tWHILE ~r.eot DO\r\t\t\t\t\tSYSTEM.PUT(adr, SHORT(ch)); INC(adr);\r\t\t\t\t\tr.ReadChar(ch)\r\t\t\t\tEND;\r\t\t\t\tSYSTEM.PUT(adr, 0X);\r\t\t\t\tres := WinApi.GlobalUnlock(hnd);\r\t\t\t\tGenGlobalMedium(hnd, NIL, med)\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND ExportDRichText;\r\t\r\tPROCEDURE "
