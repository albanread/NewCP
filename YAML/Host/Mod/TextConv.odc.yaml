                    attr: 3
                  - text: "* (\r\t\tv: Views.View; w, h, x, y: INTEGER; isSingle: BOOLEAN; VAR med: WinOle.STGMEDIUM\r\t);\r\t\tVAR t: TextModels.Model; r: TextModels.Reader; ch: CHAR;\r\t\t\tres, len, adr: INTEGER; hnd: WinApi.HANDLE;\r\tBEGIN\r\t\tASSERT(v # NIL, 20);\r\t\tWITH v: TextViews.View DO\r\t\t\tt := v.ThisModel();\r\t\t\thnd := WinApi.GlobalAlloc({1, 13}, 2 * t.Length() + 1);\t"
                    attr: 0
                  - text: "(* movable, sharable *)"
                    attr: 1
                  - text: "\r\t\t\tIF hnd # 0 THEN\r\t\t\t\tadr  := WinApi.GlobalLock(hnd); len := 0;\r\t\t\t\tr := t.NewReader(NIL); r.ReadChar(ch);\r\t\t\t\tWHILE ~r.eot DO\r\t\t\t\t\tIF (ch # TextModels.viewcode) & (ch # TextModels.para) THEN\r\t\t\t\t\t\tch := ThisWndChar(ch);\r\t\t\t\t\t\tSYSTEM.PUT(adr, SHORT(ch)); INC(adr); INC(len);\r\t\t\t\t\t\tIF ch = CR THEN SYSTEM.PUT(adr, LF); INC(adr); INC(len) END\r\t\t\t\t\tEND;\r\t\t\t\t\tr.ReadChar(ch)\r\t\t\t\tEND;\r\t\t\t\tSYSTEM.PUT(adr, 0X); INC(len);\r\t\t\t\tres := WinApi.GlobalUnlock(hnd);\r\t\t\t\thnd := WinApi.GlobalReAlloc(hnd, len, {});\r\t\t\t\tGenGlobalMedium(hnd, NIL, med)\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND ExportDText;\r\t\r\tPROCEDURE "
                    attr: 0
