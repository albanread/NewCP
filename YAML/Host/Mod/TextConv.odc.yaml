                  - text: " c\r\t\tEND Color;\r\t\t\r\t\tPROCEDURE SetColor(i: INTEGER; c: Ports.Color);\r\t\t\tVAR ci: ColorInfo;\r\t\tBEGIN\r\t\t\tNEW(ci); ci.id := i; ci.c := c; ci.next := colors; colors := ci\r\t\tEND SetColor;\r\t\t\t\r\t\tPROCEDURE Font(i: INTEGER): FontInfo;\r\t\t\tVAR f: FontInfo;\r\t\tBEGIN\r\t\t\tASSERT(fonts # NIL, 20);\r\t\t\tf := fonts;\r\t\t\tWHILE (f # NIL) & (f.id # i) DO f := f.next END;\r\t\t\tASSERT(f # NIL, 100);\r\t\t\t"
                    attr: 0
                  - text: RETURN
