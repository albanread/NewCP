                    attr: 1
                  - text: "\r\t\t\tIF hnd # 0 THEN\r\t\t\t\tadr  := WinApi.GlobalLock(hnd); len := 0;\r\t\t\t\tr := t.NewReader(NIL); r.ReadChar(ch);\r\t\t\t\tWHILE ~r.eot DO\r\t\t\t\t\tIF ch = CR THEN\r\t\t\t\t\t\tSYSTEM.PUT(adr, LONG(CR)); INC(adr, 2); INC(len, 2);\r\t\t\t\t\t\tSYSTEM.PUT(adr, LONG(LF)); INC(adr, 2); INC(len, 2)\r\t\t\t\t\tELSIF (ch >= \" \") OR (ch = TAB) THEN\r\t\t\t\t\t\tIF (ch >= 0EF00X) & (ch <= 0EFFFX) THEN ch := CHR(ORD(ch) - 0EF00H) END;\r\t\t\t\t\t\tSYSTEM.PUT(adr, ch); INC(adr, 2); INC(len, 2)\r\t\t\t\t\tEND;\r\t\t\t\t\tr.ReadChar(ch)\r\t\t\t\tEND;\r\t\t\t\tSYSTEM.PUT(adr, LONG(0X)); INC(len, 2);\r\t\t\t\tres := WinApi.GlobalUnlock(hnd);\r\t\t\t\thnd := WinApi.GlobalReAlloc(hnd, len, {});\r\t\t\t\tGenGlobalMedium(hnd, NIL, med)\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND ExportDUnicode;\r\r\tPROCEDURE "
