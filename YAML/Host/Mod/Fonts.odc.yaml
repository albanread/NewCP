                  - text: "-, "
                    attr: 0
                  - text: useTTMetric
                    attr: 3
                  - text: "-: BOOLEAN;\r\t\tdfName, dgName: Fonts.Typeface;\r\t\tdfSize, dgSize, dgWght: INTEGER;\r\t\tdgStyle: SET;\r\t\tdir: Directory;\r\t\tdefUnit: INTEGER;\t"
                    attr: 0
                  - text: "(* screen resolution *)"
                    attr: 1
                  - text: "\r\t\tdc: WinApi.HANDLE;\r\r\t"
                    attr: 0
                  - text: "(* width tab setup *)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE NewDevFont (\r\t\ttypeface: ARRAY OF CHAR; size, unit: INTEGER; style: SET; weight: INTEGER\r\t): DevFont;\r\t\tVAR df: DevFont; it, ul, so: INTEGER;\r\tBEGIN\r\t\tIF size = 8 * Fonts.point THEN INC(size, Fonts.point DIV 4) END;"
                    attr: 0
                  - text: "\r\t\t"
                    attr: 3
                  - text: "it := 0; ul := 0; so := 0;\r\t\tIF Fonts.italic IN style THEN it := 1 END;\r\t\tIF Fonts.underline IN style THEN ul := 1 END;\r\t\tIF Fonts.strikeout IN style THEN so := 1 END;\r\t\tNEW(df); df.unit := unit; df.next := NIL;\r\t\tdf.id := WinApi.CreateFontW(-((size + unit DIV 2) DIV unit), 0, 0, 0, weight, it, ul, so, "
                    attr: 0
                  - text: 1
                    attr: 3
                  - text: ", 0, 2, 1, 4, typeface);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " df\r\tEND NewDevFont;\r\t\r\tPROCEDURE GetRasterWidth (dc: WinApi.HANDLE; VAR wtab: WTab);\r\t\tVAR res, i, x: INTEGER; str: ARRAY 4 OF CHAR; s: WinApi.SIZE;\r\tBEGIN\r\t\tres := WinApi.GetTextExtentPoint32W(dc, \"x\", 1, s);\r\t\ti := 0; str := \" x\"; x := s.cx;\r\t\tWHILE i < 256 DO\r\t\t\tstr[0] := CHR(i);\r\t\t\tres := WinApi.GetTextExtentPoint32W(dc, str, 2, s);\r\t\t\twtab[i] := s.cx - x; INC(i)\r\t\tEND\r\tEND GetRasterWidth;\r\t\r\tPROCEDURE SetupWTabs (f: Font);\r\t\tVAR res, a, b, max, x, i: INTEGER; tm: WinApi.TEXTMETRICW;\r\t\t\tdf: DevFont; abc: ARRAY 256 OF WinApi.ABC; dc, old: WinApi.HANDLE;\r\tBEGIN\r\t\tdc := WinApi.GetDC(0);\r\t\told := WinApi.SelectObject(dc, f.dev.id);\r\t\tres := WinApi.GetTextMetricsW(dc, tm);\r\t\tIF useTTMetric & ODD(ORD(tm.tmPitchAndFamily) DIV 4) THEN\t"
                    attr: 0
                  - text: "(* use true type metric *)\r"
                    attr: 1
                  - text: "\t\t\tdf := NewDevFont(f.alias, grid, 1, f.style, f.weight);\r\t\t\tres := WinApi.SelectObject(dc, df.id);\r\t\t\tres := WinApi.GetTextMetricsW(dc, tm);\r\t\t\ta := f.size MOD grid; b := f.size DIV grid; f.id := df.id;\r\t\t\tres := WinApi.GetCharABCWidthsW(dc, 0, 255, abc);\r\t\t\tIF res # 0 THEN\r\t\t\t\ti := 0; max := 0;\r\t\t\t\tWHILE i < 256 DO\r\t\t\t\t\tx := -abc[i].abcA;\r\t\t\t\t\tIF x > 0 THEN f.ftab[i] := x * a DIV grid + x * b END;\r\t\t\t\t\tx := -abc[i].abcC;\r\t\t\t\t\tIF x > 0 THEN f.ttab[i] := x * a DIV grid + x * b END;\r\t\t\t\t\tx := abc[i].abcA + abc[i].abcB + abc[i].abcC; x := x * a DIV grid + x * b;\r\t\t\t\t\tIF x > max THEN max := x END;\r\t\t\t\t\tf.wtab[i] := x; INC(i)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tmax := f.w\r\t\t\tEND\r\t\tELSE\t"
                    attr: 0
                  - text: "(* use screen metric *)\r"
                    attr: 1
                  - text: "\t\t\ta := 0; b := defUnit; f.id := f.dev.id;\r\t\t\tGetRasterWidth(dc, f.wtab);\r(*\r\t\t\tres := WinApi.GetCharWidth32W(dc, 0, 255, f.wtab);\r*)\r\t\t\ti := 0; max := 0;\r\t\t\tWHILE i < 256 DO\r\t\t\t\tx := f.wtab[i] * b;\r\t\t\t\tIF x > max THEN max := x END;\r\t\t\t\tf.wtab[i] := x; INC(i)\r\t\t\tEND\r\t\tEND;\r\t\tf.wtab[ORD(figureSpace)] := f.wtab[ORD(\"0\")];\r\t\tf.ftab[ORD(figureSpace)] := f.ftab[ORD(\"0\")];\r\t\tf.ttab[ORD(figureSpace)] := f.ttab[ORD(\"0\")];\r\t\tx := tm.tmAscent + tm.tmExternalLeading; f.asc := x * a DIV grid + x * b;\r\t\tf.dsc := tm.tmDescent * a DIV grid + tm.tmDescent * b;\r\t\tf.w := max; f.a := a; f.b := b;\r\t\tres := WinApi.SelectObject(dc, old);\r\t\tres := WinApi.ReleaseDC(0, dc)\r\tEND SetupWTabs;\r\t\r\tPROCEDURE Cleanup (f: Font);\r\t\tVAR res: INTEGER; df: DevFont;\r\tBEGIN\r\t\tdf := f.dev;\r\t\tIF f.id # df.id THEN res := WinApi.DeleteObject(f.id) END;\r\t\tWHILE df # NIL DO\r\t\t\tres := WinApi.DeleteObject(df.id);\r\t\t\tdf := df.next\r\t\tEND;\r\t\tf.id := 0; f.dev := NIL\r\tEND Cleanup;\r\t"
                    attr: 0
                  - text: "\r\r\t(* width methods for unicode *)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE (f: Font) "
                    attr: 0
                  - text: wTab
                    attr: 3
                  - text: "* (dc: WinApi.HANDLE; ch: CHAR): INTEGER, NEW;\r\t\tVAR res, w: INTEGER; abc: ARRAY 1 OF WinApi.ABC; wt: ARRAY 1 OF INTEGER;\r\tBEGIN\r\t\tIF ch < 100X THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " f.wtab[ORD(ch)] END;\r\t\tres := WinApi.GetCharABCWidthsW(dc, ORD(ch), ORD(ch), abc);\r\t\tIF res # 0 THEN\r\t\t\tw := abc[0].abcA + abc[0].abcB + abc[0].abcC;\r\t\t\tw := w * f.a DIV grid + w * f.b\r\t\tELSE\r\t\t\tres := WinApi.GetCharWidth32W(dc, ORD(ch), ORD(ch), wt);\r\t\t\tIF res # 0 THEN w := wt[0] * f.a DIV grid + wt[0] * f.b\r\t\t\tELSE\r\t\t\t\tres := WinApi.GetCharWidthW(dc, ORD(ch), ORD(ch), wt);\r\t\t\t\tIF res # 0 THEN w := wt[0] * f.a DIV grid + wt[0] * f.b\r\t\t\t\tELSE w := f.wtab[1]\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " w\r\tEND wTab;\r\r\tPROCEDURE (f: Font) "
                    attr: 0
                  - text: fTab
                    attr: 3
                  - text: "* (dc: WinApi.HANDLE; ch: CHAR): INTEGER, NEW;\r\t\tVAR res, w: INTEGER; abc: ARRAY 1 OF WinApi.ABC;\r\tBEGIN\r\t\tIF ch < 100X THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " f.ftab[ORD(ch)] END;\r\t\tres := WinApi.GetCharABCWidthsW(dc, ORD(ch), ORD(ch), abc);\r\t\tIF (res # 0) & (abc[0].abcA < 0) THEN\r\t\t\tw := -abc[0].abcA;\r\t\t\tw := w * f.a DIV grid + w * f.b\r\t\tELSE w := 0\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " w\r\tEND fTab;\r\r\tPROCEDURE (f: Font) "
                    attr: 0
                  - text: tTab
                    attr: 3
                  - text: "* (dc: WinApi.HANDLE; ch: CHAR): INTEGER, NEW;\r\t\tVAR res, w: INTEGER; abc: ARRAY 1 OF WinApi.ABC;\r\tBEGIN\r\t\tIF ch < 100X THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " f.ttab[ORD(ch)] END;\r\t\tres := WinApi.GetCharABCWidthsW(dc, ORD(ch), ORD(ch), abc);\r\t\tIF (res # 0) & (abc[0].abcC < 0) THEN\r\t\t\tw := -abc[0].abcC;\r\t\t\tw := w * f.a DIV grid + w * f.b\r\t\tELSE w := 0\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " w\r\tEND tTab;\r\t\r\tPROCEDURE (df: DevFont) "
                    attr: 0
                  - text: wTab
                    attr: 3
                  - text: "* (dc: WinApi.HANDLE; ch: CHAR): INTEGER, NEW;\r\t\tVAR res, w: INTEGER; wt: ARRAY 1 OF INTEGER;\r\tBEGIN\r\t\tIF ch < 100X THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " df.wtab[ORD(ch)] END;\r\t\tres := WinApi.GetCharWidth32W(dc, ORD(ch), ORD(ch), wt);\r\t\tIF res = 0 THEN res := WinApi.GetCharWidthW(dc, ORD(ch), ORD(ch), wt) END;\r\t\tIF res # 0 THEN w := wt[0] ELSE w := df.wtab[1] END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " w\r\tEND wTab;\r\t\r\r\t"
                    attr: 0
                  - text: "(** Font **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (f: Font) "
                    attr: 0
                  - text: "GetBounds*"
                    attr: 3
                  - text: " (OUT asc, dsc, w: INTEGER);\r\tBEGIN\r\t\tasc := f.asc; dsc := f.dsc; w := f.w\r\tEND GetBounds;\r\t\r\tPROCEDURE (f: Font) "
                    attr: 0
                  - text: SStringWidth
                    attr: 3
                  - text: "* (IN s: ARRAY OF SHORTCHAR): INTEGER;\r\t\tVAR i, w: INTEGER; ch: CHAR;\r\tBEGIN"
                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\t\tw := 0;\r\t\tIF s # \"\" THEN\r\t\t\ti := 0; ch := s[0];\r\t\t\tWHILE ch # 0X DO INC(w, f.wtab[ORD(ch)]); INC(i); ch := s[i] END;\r\t\t\tw := w + f.ftab[ORD(s[0])] + f.ttab[ORD(s[i-1])]\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " w\r\tEND SStringWidth;\r\r\tPROCEDURE (f: Font) "
                    attr: 0
                  - text: StringWidth
                    attr: 3
                  - text: "* (IN s: ARRAY OF CHAR): INTEGER;\r\t\tVAR res, i, w: INTEGER; lc: CHAR; dc, old: WinApi.HANDLE;\r\tBEGIN\r\t\tdc := WinApi.GetDC(0);\r\t\told := WinApi.SelectObject(dc, f.id);\r\t\tw := 0;\r\t\tIF s[0] # 0X THEN\r\t\t\ti := 0; lc := s[0];\r\t\t\tWHILE lc # 0X DO INC(w, f.wTab(dc, lc)); INC(i); lc := s[i] END;\r\t\t\tw := w + f.fTab(dc, s[0]) + f.tTab(dc, s[i-1])\r\t\tEND;\r\t\tres := WinApi.SelectObject(dc, old);\r\t\tres := WinApi.ReleaseDC(0, dc);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " w\r\tEND StringWidth;\r\r\tPROCEDURE (f: Font) "
                    attr: 0
                  - text: IsAlien
                    attr: 3
                  - text: "* (): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " (f.typeface # Fonts.default) & (f.alias # f.typeface)\r\tEND IsAlien;\r\t\r\tPROCEDURE (f: Font) "
                    attr: 0
                  - text: FINALIZE
                    attr: 3
                  - text: -;
                    attr: 0
                  - text: "\r"
