                  - text: "\tBEGIN\r\t\tCleanup(f)\r\tEND FINALIZE;\r\t\r\r\r\t"
                    attr: 0
                  - text: "(* Directory *)\r"
                    attr: 1
                  - text: "\t\r\t\r\tPROCEDURE SetupDevFont (dc: WinApi.HANDLE; df: DevFont);\r\t\tVAR res: INTEGER; abc: ARRAY 1 OF WinApi.ABC;\r\tBEGIN\r\t\tres := WinApi.GetCharABCWidthsW(dc, ORD(\"H\"), ORD(\"H\"), abc);\r\t\tIF res # 0 THEN\t"
                    attr: 0
                  - text: "(* true type *)"
                    attr: 1
                  - text: "\r\t\t\tdf.noGap := (res # 0) & (abc[0].abcA <= 0);\r\t\t\tres := WinApi.GetCharWidth32W(dc, 0, 255, df.wtab);\r\t\tELSE\t"
                    attr: 0
                  - text: "(* raster *)"
                    attr: 1
                  - text: "\r\t\t\tdf.noGap := FALSE;\r\t\t\tGetRasterWidth(dc, df.wtab)\r\t\tEND;\r\t\tdf.wtab[ORD(figureSpace)] := df.wtab[ORD(\"0\")]\r\tEND SetupDevFont;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: InsertDevFont
                    attr: 3
                  - text: "* (dc: WinApi.HANDLE; font: Font; VAR df: DevFont; unit: INTEGER);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tdf := NewDevFont(font.alias, font.size, unit, font.style, font.weight);\r\t\tres := WinApi.SelectObject(dc, df.id);\r\t\tSetupDevFont(dc, df);\r\t\tdf.next := font.dev.next; font.dev.next := df\t"
                    attr: 0
                  - text: "(* screen font remains at list head *)"
                    attr: 1
                  - text: "\r\tEND InsertDevFont;\r\t\r\tPROCEDURE Setup (f: Font; typeface: ARRAY OF CHAR; size: INTEGER; style: SET; weight: INTEGER);\r\t\tVAR res: INTEGER; tm: WinApi.TEXTMETRICW; name: Fonts.Typeface; dc, old: WinApi.HANDLE;\r\tBEGIN\r\t\tdc := WinApi.GetDC(0);\r\t\told := WinApi.SelectObject(dc, f.dev.id);\r\t\tres := WinApi.GetTextFaceW(dc, LEN(name), name);\r\t\tres := WinApi.GetTextMetricsW(dc, tm);\r\t\tf.alias := name$;\r\t\tIF typeface = Fonts.default THEN\r\t\t\tname := Fonts.default\r\t\tELSIF (typeface = \"\") OR (typeface = \".\") THEN\r\t\t\tsize := ((tm.tmHeight - tm.tmInternalLeading) * defUnit + (Fonts.point DIV 2)) DIV Fonts.point * Fonts.point;\r"
                    attr: 0
