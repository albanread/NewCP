                    attr: 0
                  - text: DevFont
                    attr: 3
                  - text: "* = POINTER TO RECORD\r\t\t\tunit-: INTEGER;\r\t\t\tid-: WinApi.HANDLE;\r\t\t\tnext-: DevFont;\r\t\t\tnoGap-: BOOLEAN;\r\t\t\twtab-: WTab\t"
