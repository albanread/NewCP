                    attr: 0
                  - text: "(* coefficients for metric *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\r\t\tDirectory = POINTER TO RECORD (Fonts.Directory) END;\r\t\t\r\t\tIdentifier = RECORD (Kernel.Identifier)\r\t\t\ttface: Fonts.Typeface;\r\t\t\tsize: INTEGER;\r\t\t\tstyle: SET;\r\t\t\tweight: INTEGER\r\t\tEND;\r\r\t\tCounter = RECORD (Kernel.Identifier)\r\t\t\tcount: INTEGER\r\t\tEND;\r\t\t\r\t\tTraverser = RECORD (Kernel.Identifier)\r\t\tEND;\r\t\t\r\t\tPar = RECORD [untagged]\r\t\t\tfirst, last: Fonts.TypefaceInfo\r\t\tEND;\r\t\tParPtr = POINTER TO Par;\r\r\tVAR\r\t\t"
                    attr: 0
                  - text: sysFont-
                    attr: 3
                  - text: ", "
                    attr: 0
                  - text: defFont-
                    attr: 3
                  - text: ", "
                    attr: 0
                  - text: dlgFont-
                    attr: 3
                  - text: ", "
                    attr: 0
                  - text: dlgBoldFont-
                    attr: 3
                  - text: ": Font;\r\t\t"
                    attr: 0
                  - text: isUnicode
