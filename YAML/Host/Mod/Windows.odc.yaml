                  - text: hookDocWinHandler
                    attr: 3
                  - text: "*: PROCEDURE (\r\t\t\twnd: WinApi.HANDLE; message, wParam, lParam: INTEGER; VAR res: INTEGER): BOOLEAN;\r\t\t\t"
                    attr: 0
                  - text: "(* hook for handling application specific messages; returns TRUE iff handled *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE ScrollModPressed (): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.GetAsyncKeyState(11H) < 0\r\tEND ScrollModPressed;\r\r"
                    attr: 0
                  - text: "\t(* auxiliary portable prcedures *)\r"
                    attr: 1
                  - text: "\r\tPROCEDURE GetSection (w: Window; focus, vertical: BOOLEAN;\r\t\t\t\t\t\t\t\tVAR size, sect, pos: INTEGER; VAR valid: BOOLEAN);\r\t\tVAR msg: Controllers.PollSectionMsg;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* portable *)"
                    attr: 1
                  - text: "\r\t\tmsg.focus := focus; msg.vertical := vertical;\r\t\tmsg.wholeSize := 1; msg.partSize := 0; msg.partPos := 0;\r\t\tmsg.valid := FALSE; msg.done := FALSE;\r\t\tw.ForwardCtrlMsg(msg);\r\t\tIF msg.done THEN\r\t\t\tsize := msg.wholeSize; sect := msg.partSize; pos := msg.partPos;\r\t\t\tIF size < 0 THEN size := 0 END;\r\t\t\tIF sect < 0 THEN sect := 0 ELSIF sect > size THEN sect := size END;\r\t\t\tIF pos > size - sect THEN pos := size - sect END;\r\t\t\tIF pos < 0 THEN pos := 0 END\r\t\tELSE size := 1; sect := 0; pos := 0\r\t\tEND;\r\t\tvalid := msg.valid\r\tEND GetSection;\r\r\tPROCEDURE SetOrigin (w: Window; focus, vertical: BOOLEAN; pos: INTEGER);\r"
                    attr: 0
                  - text: "\t(* set origin of window's view *)\r"
                    attr: 1
                  - text: "\t\tVAR msg: Controllers.ScrollMsg;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* portable *)"
                    attr: 1
                  - text: "\r\t\tmsg.focus := focus; msg.vertical := vertical;\r\t\tmsg.op := Controllers.gotoPos; msg.pos := pos;\r\t\tmsg.done := FALSE;\r\t\tw.ForwardCtrlMsg(msg)\r\tEND SetOrigin;\r\r\tPROCEDURE Scroll (w: Window; focus, vertical: BOOLEAN; dir: INTEGER);\r\t"
                    attr: 0
                  - text: "(* scroll relative, by line or page increment or decrement *)"
                    attr: 1
                  - text: "\r\t\tVAR msg: Controllers.ScrollMsg; c: Containers.Controller; v: Views.View;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* portable *)\r"
                    attr: 1
                  - text: "\t\tc := w.doc.ThisController(); v := c.ThisFocus();\r\t\tIF (v # NIL) & (v IS Containers.View) THEN\r\t\t\tContainers.FadeMarks(v(Containers.View).ThisController(), FALSE)\r\t\tEND;\r"
                    attr: 3
                  - text: "\t\tmsg.focus := focus; msg.vertical := vertical;\r\t\tmsg.op := dir;\r\t\tmsg.done := FALSE;\r\t\tw.ForwardCtrlMsg(msg)\r\tEND Scroll;\r\r\r"
                    attr: 0
                  - text: "\t(** miscellaneous procedures **)\r"
                    attr: 1
                  - text: "\r\tPROCEDURE "
                    attr: 0
                  - text: ActualWnd
                    attr: 3
                  - text: "* (): WinApi.HANDLE;\r\tBEGIN\r(*\r\t\tIF (fWindow # NIL) & ~fWindow.child & fWindow.used THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " fWindow.wnd\r\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " main\r\t\tEND\r*)\r\t\tIF (fWindow # NIL) & ~fWindow.child & fWindow.used THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " fWindow.wnd\r\t\tELSIF WinApi.IsWindowVisible(main) # 0 THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " main\r\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " 0\r\t\tEND\r\tEND ActualWnd;\r\r\tPROCEDURE ThisWindow (wnd: WinApi.HANDLE): Window;\r\t(* determine window by its WindowPtr *)\r\tBEGIN\r\t\tIF wnd = cbViewer.wnd THEN RETURN cbViewer\r\t\tELSE RETURN SYSTEM.VAL(Window, WinApi.GetWindowLongW(wnd, 0))\r\t\tEND\r\tEND ThisWindow;\r\r\tPROCEDURE AppendInt (VAR s: ARRAY OF CHAR; n: INTEGER; useSeparators: BOOLEAN);\r\t\tVAR len: INTEGER; i, j: INTEGER; d: ARRAY 32 OF CHAR;\r\tBEGIN\r\t\tASSERT(n >= 0, 20);\r\t\ti := 0; REPEAT\r\t\t\td[i] := CHR(30H + n MOD 10); INC(i); n := n DIV 10;\r\t\t\tIF useSeparators & (i MOD 4 = 3) & (n # 0) THEN d[i] := \"'\"; INC(i) END\r\t\tUNTIL n = 0;\r\t\tlen := LEN(s) - 1;\r\t\tj := 0; WHILE s[j] # 0X DO INC(j) END;\r\t\tIF j + i < len THEN\r\t\t\tREPEAT DEC(i); s[j] := d[i]; INC(j) UNTIL i = 0;\r\t\t\ts[j] := 0X\r\t\tEND\r\tEND AppendInt;\r\r\tPROCEDURE Append (VAR s: ARRAY OF CHAR; t: ARRAY OF CHAR);\r\t\tVAR len: INTEGER; i, j: INTEGER; ch: CHAR;\r\tBEGIN\r\t\tlen := LEN(s);\r\t\ti := 0; WHILE s[i] # 0X DO INC(i) END;\r\t\tj := 0; REPEAT ch := t[j]; s[i] := ch; INC(j); INC(i) UNTIL (ch = 0X) OR (i = len);\r\t\ts[len - 1] := 0X\r\tEND Append;\r\r\tPROCEDURE StripTitle (VAR s: Views.Title);\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\tIF s[0] = \"<\" THEN\r\t\t\ti := 1; WHILE (s[i] # \">\") & (s[i] # 0X) DO s[i - 1] := s[i]; INC(i) END;\r\t\t\tDEC(i); s[i] := 0X\r\t\tEND\r\tEND StripTitle;\r\r\tPROCEDURE GenTitle (w: Window; name: ARRAY OF CHAR; VAR title: ARRAY OF CHAR);\r\t"
                    attr: 0
                  - text: "(* generate window title for a document *)"
                    attr: 1
                  - text: "\r\t\tVAR newName: ARRAY 64 OF CHAR; i: INTEGER;\r\tBEGIN\r\t\tIF w.sub THEN title[0] := \"<\"; title[1] := 0X ELSE title[0] := 0X END;\r\t\tIF name # \"\" THEN\r\t\t\ti := 0;\r\t\t\tWHILE name[i] # 0X DO INC(i) END;\r\t\t\tIF (i > 4) & (name[i-4] = \".\") & (CAP(name[i-3]) = \"O\") & (CAP(name[i-2]) = \"D\") & (CAP(name[i-1]) = \"C\")\r\t\t\tTHEN\r\t\t\t\tname[i-4] := 0X\r\t\t\tEND;\r\t\t\tAppend(title, name)\r\t\tELSE\r\t\t\tDialog.MapString(untitledKey, newName);\r\t\t\tAppend(title, newName); AppendInt(title, newNumber, noSeparators);\r\t\t\tINC(newNumber)\r\t\tEND;\r\t\tIF w.sub THEN Append(title, \">\") END\r\tEND GenTitle;\r\r\tPROCEDURE GenPathTitle (w: Window; OUT title: ARRAY OF CHAR);\r\t\tVAR loc: Files.Locator; ch: CHAR; s1, s2: HostFiles.FullName; i, j: INTEGER;\r\tBEGIN\r\t\tloc := w.loc; title := \"\";\r\t\tWITH loc: HostFiles.Locator DO\r\t\t\ti := 0; ch := loc.path[0]; j := 0; s2 := \"\";\r\t\t\tWHILE ch # 0X DO\r\t\t\t\tIF (ch = \"\\\") OR (ch = \"/\") THEN\r\t\t\t\t\ts1[j] := 0X; s2 := s1$; j := 0\r\t\t\t\tELSE\r\t\t\t\t\ts1[j] := ch; INC(j)\r\t\t\t\tEND;\r\t\t\t\tINC(i); ch := loc.path[i]\r\t\t\tEND;\r\t\t\ts1[j] := 0X;\r\t\t\tIF ((CAP(s1[0]) = \"M\") & (CAP(s1[1]) = \"O\") & (CAP(s1[2]) = \"D\") & (s1[3] = 0X) OR\r\t\t\t\t(CAP(s1[0]) = \"D\") & (CAP(s1[1]) = \"O\") & (CAP(s1[2]) = \"C\") & (CAP(s1[3]) = \"U\") & (s1[4] = 0X) OR\r\t\t\t\t(CAP(s1[0]) = \"R\") & (CAP(s1[1]) = \"S\") & (CAP(s1[2]) = \"R\") & (CAP(s1[3]) = \"C\") & (s1[4] = 0X))\r\t\t\t\t& (s2 # \"\") THEN\r\t\t\t\ttitle := \"(\"; Append(title, s2); Append(title, \")\")\r\t\t\tEND\r\t\tELSE\r\t\tEND;\r\t\tAppend(title, w.name)\r\tEND GenPathTitle;\r\r\tPROCEDURE ThisStyle (base, flags: SET): SET;\r\tBEGIN\r\t\tIF ~(Windows.noHScroll IN flags) THEN INCL(base, 20) END;\t"
                    attr: 0
                  - text: "(* hor scrollbar *)"
                    attr: 1
                  - text: "\r\t\tIF ~(Windows.noVScroll IN flags) THEN INCL(base, 21) END;\t"
                    attr: 0
                  - text: "(* ver scrollbar *)"
