                  - text: "Windows Programming Interfaces\r"
                    attr: 1
                  - text: "\rThe "
                    attr: 0
                  - text: Win
                    attr: 2
                  - text: " subsystem contains the interface modules for the various Windows programming interfaces. The following table shows the available modules and a short desription of their contents:\r\r"
                    attr: 0
                  - text: module
                    attr: 2
                  - text: "\t"
                    attr: 0
                  - text: contents
                    attr: 2
                  - text: "\r\rWinApi\tbasic data types, error codes, basic Win32 functionality\rWinDlg\tcommon dialog box library\rWinCtl\tcommon controls\rWinOle\tbasic COM and OLE interfaces\rWinOleDlg\tOLE dialogs (OleUI...)\rWinOleAut\tOLE automation interfaces\t\rWinOleCtl\tOLE controls interfaces\rWinRpc\tremote procedure call functions\rWinNet\tnetworking and socket functions\rWinMM\tmultimedia services\rWinCmc\tMessaging Application Programming Interface (MAPI)\rWinSql\tDatabase services (ODBC)\r\r\r"
                    attr: 0
                  - text: Naming Conventions
                    attr: 1
                  - text: "\r\rNames are generally the same as in the corresponding C header and help files. An exception applies to pointers which are always named after the structure they point to with a \"Ptr\" prefix.\rExample:\r\rRECT = RECORD [untagged] left, top, right, bottom: INTEGER END;\rPtrRECT = POINTER TO RECT;\r\r\r"
                    attr: 0
                  - text: Parameters
                    attr: 1
                  - text: "\r\rParameters of pointer type are represented as variable parameters (VAR/IN/OUT) whenever possible.\r\r\r"
                    attr: 0
                  - text: Pointers to Pointers
                    attr: 1
                  - text: "\r\rPointers to pointers or basic types cannot be declared directly in Component Pascal. A type of the form\rp: POINTER TO ARRAY [untagged] OF BaseType;\ris used instead. You can use the form p[0] to dereference such a pointer.\r"
                    attr: 0
