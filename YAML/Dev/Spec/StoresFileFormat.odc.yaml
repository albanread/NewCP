                  - text: Stores File Format
                    attr: 0
                  - text: "\r\rStream = { Byte | Structure }.\r\rStructure = Nil | Link | Object.\r\rNil = nil Comment Next.\r\rLink = (link | newlink) ObjectId Comment Next.\r\t(* newlink and link have same meaning in new format, but newlink causes assertion trap in old *)\r\t(* if Next = 0 & Comment = 0 indecates end of link chain, whereas Next = 0 & Comment = 1 indicates\r\t\tnext store at Pos(Next) + 4 *)\r\r\rObject = (elem | store) TypePath Comment Next Down Length Stream.\r\t(* elem = Models.Model-derived type; for backward comp only *)\r \rComment = 00000000. (* extension hook *)\r\rObjectId = 32bits. (* index into object dictionary *)\r\rNext = 32bits. (* offset to next object on same nesting level; 00000000 if none *)\r\rDown = 32bits. (* offset to first object on next lower nesting level; 00000000 if none *)\r\rLength = 32bits. (* length of this object (including all subobjects) *)\r\r\r \rTypePath = OldType | NewType. (* sequence of type names from most precise to root base type *)\r\rOldType = oldType TypeId.\r\rNewType = { NewExtension } (NewBase | OldType).\r\rNewExtension = newExt TypeName.\r\rNewBase = newBase TypeName.\r\rTypeName = String.\r\rTypeId = 32bits. (* index into type dictionary *)\r \r\r \rnil = 80. (* nil store *)\r\rlink = 81. (* link to another elem in same file *)\r\rstore = 82. (* general store *)\r\relem = 83. (* elem store *)\r\rnewlink = 84. (* link to another non-elem store in same file *)\r "
