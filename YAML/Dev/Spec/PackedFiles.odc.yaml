                flow:
                  - text: HostPackedFiles
                    attr: 0
                  - text: "\r\rDEFINITION HostPackedFiles;\r\r\tCONST magicnum = 4711;\r\r\tPROCEDURE IsInstalled;\r\tPROCEDURE RestoreFilesDir;\r\tPROCEDURE SetFilesDir;\r\rEND HostPackedFiles.\r\r\rModule "
                    attr: 1
                  - text: HostPackedFiles
                    attr: 2
                  - text: " is an implementation of "
                    attr: 1
                  - text: "Files.Directory. "
                    attr: 2
                  - text: "The implementation is basically a wrapper around the "
                    attr: 1
                  - text: HostFiles
                    attr: 2
                  - text: " implementation with one major difference: when a file is not present in the file system "
                    attr: 1
                  - text: HostPackedFiles
                    attr: 2
                  - text: " searches the current executable for files packed in there by "
                    attr: 1
                  - text: DevPacker
                    attr: 2
                  - text: ". \r\rSince "
                    attr: 1
                  - text: HostPackedFiles
                    attr: 2
                  - text: " wraps "
                    attr: 1
                  - text: HostFiles
                    attr: 2
                  - text: " it cannot work unless "
                    attr: 1
                  - text: HostFiles
                    attr: 2
                  - text: " is installed first. For "
                    attr: 1
                  - text: HostPackedFiles
                    attr: 2
                  - text: " to work properly it is also important that the exe-file has the right format. This format is explained below.\r\rWhenever "
                    attr: 1
                  - text: HostPackedFiles
                    attr: 2
                  - text: " is loaded it tries to install itself as the "
                    attr: 1
                  - text: Files.Directory
                    attr: 2
                  - text: ". There are two preconditions for "
                    attr: 1
                  - text: HostPackedFiles
                    attr: 2
                  - text: " to be installed; first the current "
                    attr: 1
                  - text: Files.Directory
                    attr: 2
                  - text: " must be a "
                    attr: 1
                  - text: HostFiles
                    attr: 2
                  - text: " implementation and secondly there must be some files packed into the current directory.\r\rCONST "
                    attr: 1
                  - text: "magicnum\r"
                    attr: 3
                  - text: "Used as a magic number in the exe-file to mark the position of the address to the file table. This constant is only exported to make it possible for "
                    attr: 1
                  - text: DevPacker
                    attr: 2
                  - text: " to write the appropriate magic number into the exe-file.\r\rPROCEDURE "
                    attr: 1
                  - text: SetFilesDir
                    attr: 3
                  - text: "\rIf no files are found in the current executable a call to this procedure does nothing. Otherwise it checks if "
                    attr: 1
                  - text: HostFiles
                    attr: 2
                  - text: " is the current directory of "
                    attr: 1
                  - text: Files
                    attr: 2
                  - text: ". In that case it holds a reference to this directory and calls "
                    attr: 1
                  - text: Files.SetDir
                    attr: 2
                  - text: " with the "
                    attr: 1
                  - text: HostPackedFiles.Directory
                    attr: 2
                  - text: ". This procedure is called the first time the module is loaded.\r\rPROCEDURE "
                    attr: 1
                  - text: RestoreFilesDir
                    attr: 3
                  - text: "\rCalls "
                    attr: 1
                  - text: Files.SetDir
                    attr: 2
                  - text: " with the original directory saved by "
                    attr: 1
                  - text: SetFilesDir
                    attr: 2
                  - text: ". Thus, uninstalling "
                    attr: 1
                  - text: HostPackedFiles
                    attr: 2
                  - text: " as the current "
                    attr: 1
                  - text: Files
                    attr: 2
                  - text: " directory.\r\rPROCEDURE "
                    attr: 1
                  - text: IsInstalled
                    attr: 3
                  - text: "\rChecks wether "
                    attr: 1
                  - text: HostPackedFiles.Directory
                    attr: 2
                  - text: " is the directory used by "
                    attr: 1
                  - text: Files
                    attr: 2
                  - text: " or not. This is not always a reliable test, since "
                    attr: 1
                  - text: HostPackedFiles
                    attr: 2
                  - text: " installs itself when it is loaded. A call to "
                    attr: 1
                  - text: IsInstalled
                    attr: 2
                  - text: " may cause "
                    attr: 1
                  - text: HostPackedFiles
                    attr: 2
                  - text: " to be installed. If, however, the result is that "
                    attr: 1
                  - text: HostPackedFiles
                    attr: 2
                  - text: " is not installed then this is a reliable result.\r\r\r"
                    attr: 1
                  - text: Executable File Format Required by HostPackedFiles
                    attr: 3
                  - text: "\r(* Should this really be here? *)\rWhen "
                    attr: 1
                  - text: DevPacker
                    attr: 2
                  - text: " is used to pack files into an executable file it simply appends its information at the end of the file. This means that the first part of such an executable is exactly the same as a normal Windows executable. This text therefore only explains the appended information that "
                    attr: 1
                  - text: DevPacker
                    attr: 2
                  - text: " adds to the file.\r\rThe format of the exe-file can be separated into four parts:\r\r\t1) A Windows executable part\r\t2) Contents of files packed in by "
                    attr: 1
                  - text: DevPacker
                    attr: 2
                  - text: "\r\t3) File table of the files packed in by "
                    attr: 1
                  - text: DevPacker
                    attr: 2
                  - text: "\r\t4) Address of the file table\r\t\rThe four parts appear in this order in the executable, which makes the executable look like Figure 1.\r\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 104775
                      dsc: 28575
                      grid: 1
                      attr: 1
                      w: 360000000
                      h: 444500
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 8
                      bodyPos: 1317
                      bodyLen: 8609
                    attr: 1
                    w: 2313000
                    h: 2689200
                  - text: "\r\rFigure 1. "
                    attr: 1
                  - text: Executable file structure
                    attr: 2
                  - text: ".\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 104775
                      dsc: 28575
                      grid: 1
                      opts: 0x00000001
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "\rThe first part contains the executable generated by the linker command and all Windows resources, such as icons and cursors. Since "
                    attr: 1
                  - text: DevPacker
                    attr: 2
                  - text: " only appends information to the file, it is important that all resources are added before files are packed into the executable. Otherwise the information about how to find the files within the executable will be destroyed.\r\rThe second part is the content of all the files packed in by "
                    attr: 1
                  - text: DevPacker
                    attr: 2
                  - text: ". The contents are simply an array of bytes. To know where a file starts and how long it is the third part, the file table, is needed. The file table has the structure described in Figure 2.\r\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 104775
                      dsc: 28575
                      grid: 1
                      attr: 1
                      w: 360000000
                      h: 444500
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 13
                      bodyPos: 10249
                      bodyLen: 9621
                    attr: 1
                    w: 2079720
                    h: 2308320
                  - text: "\r\rFigure 2. "
                    attr: 1
                  - text: File table structure
                    attr: 2
                  - text: ".\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 104775
                      dsc: 28575
                      grid: 1
                      opts: 0x00000001
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "\rTo avoid sorting each time the "
                    attr: 1
                  - text: HostPackedFiles
                    attr: 2
                  - text: " is loaded, "
                    attr: 1
                  - text: DevPacker
                    attr: 2
                  - text: " does the sorting when files are packed. "
                    attr: 1
                  - text: HostPackedFiles
                    attr: 2
                  - text: " therefore assumes that the files are listed in reversed alphabetical order.\t\r\rThe last eight bytes of the executable are interpreted as two integers, having the meaning shown in Figure 3.\r\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 104775
                      dsc: 28575
                      grid: 1
                      attr: 1
                      w: 360000000
                      h: 444500
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 18
                      bodyPos: 20203
                      bodyLen: 1685
                    attr: 1
                    w: 3679920
                    h: 250920
                  - text: "\r\rFigure 3. "
                    attr: 1
                  - text: Address of the file table
                    attr: 2
                  - text: ".\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 104775
                      dsc: 28575
                      grid: 1
                      opts: 0x00000001
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "\rIf the first integer does not equal "
                    attr: 1
                  - text: HostPackedFiles
                    attr: 2
                  - text: .
                    attr: 1
                  - text: magicnum
                    attr: 2
                  - text: " it is assumed that no files are packed into the executable. Otherwise the next integer is interpreted as the address of the file table within the executable. \r"
                    attr: 1
