                  - text: "\t(* ignore other messages *)"
                    attr: 2
                  - text: "\r\t\tEND\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE (v: View) HandlePropMsg (VAR p: Properties.Message);\r\t\tCONST defaultWidth = 100 * Ports.mm; defaultHeight = 70 * Ports.mm;\r\tBEGIN\r\t\tWITH p: Properties.FocusPref DO\r\t\t\tp.setFocus := TRUE\r\t\t| p: Properties.SizePref DO\r\t\t\tIF p.w = Views.undefined THEN p.w := defaultWidth END;\r\t\t\tIF p.h = Views.undefined THEN p.h := defaultHeight END\r\t\tELSE\t"
