                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Kernel,\r\t\tFiles, Strings, Views, Dialog, Controls,\r\t\tTextModels, TextMappers, TextViews, TextControllers,\r\t\tStdLog, StdDialog,\r\t\tDevMarkers, DevCommanders, DevSelectors,\r\t\tDevCPM, DevCPT, DevCPB, DevCPP, DevCPE, DevCPV := DevCPV486;\r\r\tCONST\r\t\t"
                    attr: 0
                  - text: "(* compiler options: *)"
                    attr: 1
                  - text: "\r\t\tchecks = 0; allchecks = 1; assert = 2; obj = 3; ref = 4; allref = 5; srcpos = 6; reallib = 7; signatures = 8;\r\t\thint = 29; oberon = 30; errorTrap = 31;\r\t\tdefopt = {checks, assert, obj, ref, allref, srcpos, signatures};\r\r\t\t"
                    attr: 0
                  - text: "(* additional scanner types *)"
                    attr: 1
                  - text: "\r\t\timport = 100; module = 101; semicolon = 102; becomes = 103; comEnd = 104;\r\r\tVAR\r\t\tsourceR: TextModels.Reader;\r\t\ts: TextMappers.Scanner;\r\t\tstr: Dialog.String;\r\t\tfound: BOOLEAN;\t"
                    attr: 0
                  - text: "(* DevComDebug was found -> DTC *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE Module (source: TextModels.Reader; opt: SET; log: TextModels.Model; VAR error: BOOLEAN);\r\t\tVAR ext, new: BOOLEAN; p: DevCPT.Node;\r\tBEGIN\r\t\tDevCPM.Init(source, log);\r\t\tIF found THEN INCL(DevCPM.options, DevCPM.comAware) END;\r\t\tIF errorTrap IN opt THEN INCL(DevCPM.options, DevCPM.trap) END;\r\t\tIF oberon IN opt THEN INCL(DevCPM.options, DevCPM.oberon) END;\r\t\tDevCPT.Init(opt);\r\t\tDevCPB.typSize := DevCPV.TypeSize;\r\t\tDevCPT.processor := DevCPV.processor;\r\t\tDevCPP.Module(p);\r\t\tIF DevCPM.noerr THEN\r\t\t\tIF DevCPT.libName # \"\" THEN EXCL(opt, obj) END;\r(*\r\t\t\t"
                    attr: 0
                  - text: IF errorTrap IN opt THEN DevCPDump.DumpTree(p) END;
                    attr: 3
                  - text: "\r*)\r\t\t\tDevCPV.Init(opt); DevCPV.Allocate; DevCPT.Export(ext, new);\r\t\t\tIF DevCPM.noerr & (obj IN opt) THEN\r\t\t\t\tDevCPV.Module(p)\r\t\t\tEND;\r\t\t\tDevCPV.Close\r\t\tEND;\r\t\tIF DevCPM.noerr & (new OR ext) THEN DevCPM.RegisterNewSym\r\t\tELSE DevCPM.DeleteNewSym\r\t\tEND;\r\t\tDevCPT.Close;\r\t\terror := ~DevCPM.noerr;\r\t\tDevCPM.Close;\r\t\tp := NIL;\r\t\tKernel.FastCollect;\r\t\tIF error THEN\r\t\t\tDevCPM.InsertMarks(source.Base());\r\t\t\tDevCPM.LogWLn; DevCPM.LogWStr(\" \");\r\t\t\tIF DevCPM.errors = 1 THEN\r\t\t\t\tDialog.MapString(\"#Dev:OneErrorDetected\", str)\r\t\t\tELSE\r\t\t\t\tDevCPM.LogWNum(DevCPM.errors, 0); Dialog.MapString(\"#Dev:ErrorsDetected\", str)\r\t\t\tEND;\r\t\t\tStdLog.String(str)\r\t\tELSE\r\t\t\tIF hint IN opt THEN DevCPM.InsertMarks(source.Base()) END;\r\t\t\tDevCPM.LogWStr(\"  \"); DevCPM.LogWNum(DevCPE.pc, 8);\r\t\t\tDevCPM.LogWStr(\"  \"); DevCPM.LogWNum(DevCPE.dsize, 8)\r\t\tEND;\r\t\tDevCPM.LogWLn\r\tEND Module;\r\r\tPROCEDURE Scan (VAR s: TextMappers.Scanner);\r\tBEGIN\r\t\ts.Scan;\r\t\tIF s.type = TextMappers.string THEN\r\t\t\tIF s.string = \"MODULE\" THEN s.type := module END\r\t\tELSIF s.type = TextMappers.char THEN\r\t\t\tIF s.char = \"(\" THEN\r\t\t\t\tIF s.rider.char = \"*\" THEN\r\t\t\t\t\ts.rider.Read;\r\t\t\t\t\tREPEAT Scan(s) UNTIL (s.type = TextMappers.eot) OR (s.type = comEnd);\r\t\t\t\t\tScan(s)\r\t\t\t\tEND\r\t\t\tELSIF s.char = \"*\" THEN\r\t\t\t\tIF s.rider.char = \")\" THEN s.rider.Read; s.type := comEnd END\r\t\t\tEND\r\t\tEND\r\tEND Scan;\r\r\tPROCEDURE Do (source, log: TextModels.Model; beg: INTEGER; opt: SET; VAR error: BOOLEAN);\r\t\tVAR s: TextMappers.Scanner;\r\tBEGIN\r\t\tDialog.MapString(\"#Dev:Compiling\", str);\r\t\tStdLog.String(str); StdLog.Char(\" \");\r\t\ts.ConnectTo(source); s.SetPos(beg);\r\t\tScan(s);\r\t\tWHILE (s.type # TextMappers.eot) & (s.type # module) DO Scan(s) END;\r\t\tIF s.type = module THEN\r\t\t\tScan(s);\r\t\t\tIF s.type = TextMappers.string THEN\r\t\t\t\tStdLog.Char('\"'); StdLog.String(s.string); StdLog.Char('\"')\r\t\t\tEND\r\t\tEND;\r\t\tsourceR := source.NewReader(NIL); sourceR.SetPos(beg);\r\t\tModule(sourceR, opt, log, error)\r\tEND Do;\r\r\r\tPROCEDURE Open;\r\tBEGIN\r\t\tDialog.ShowStatus(\"#Dev:Compiling\");\r\t\tStdLog.buf.Delete(0, StdLog.buf.Length())\r\tEND Open;\r\r\tPROCEDURE Close;\r\tBEGIN\r\t\tStdLog.text.Append(StdLog.buf);\r\t\tIF DevCPM.noerr THEN Dialog.ShowStatus(\"#Dev:Ok\")\r\t\tEND;\r\t\tsourceR := NIL;\r\t\tKernel.Cleanup\r\tEND Close;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Compile
                    attr: 3
                  - text: "*;\r\t\tVAR t: TextModels.Model; error: BOOLEAN;\r\tBEGIN\r\t\tOpen;\r\t\tt := TextViews.FocusText();\r\t\tIF t # NIL THEN\r\t\t\tDo(t, StdLog.text, 0, defopt, error);\r\t\t\tIF error THEN DevMarkers.ShowFirstError(t, TextViews.focusOnly) END\r\t\tELSE Dialog.ShowMsg(\"#Dev:NoTextViewFound\")\r\t\tEND;\r\t\tClose\r\tEND Compile;\r\r\tPROCEDURE "
                    attr: 0
                  - text: CompileOpt
                    attr: 3
                  - text: "* (opt: ARRAY OF CHAR);\r\t\tVAR t: TextModels.Model; error: BOOLEAN; i: INTEGER; opts: SET;\r\tBEGIN\r\t\ti := 0; opts := defopt;\r\t\tWHILE opt[i] # 0X DO\r\t\t\tIF opt[i] = \"-\" THEN\r\t\t\t\tIF srcpos IN opts THEN EXCL(opts, srcpos)\r\t\t\t\tELSIF allref IN opts THEN EXCL(opts, allref)\r\t\t\t\tELSIF ref IN opts THEN EXCL(opts, ref)\r\t\t\t\tELSE EXCL(opts, obj)\r\t\t\t\tEND\r\t\t\tELSIF opt[i] = \"!\" THEN\r\t\t\t\tIF assert IN opts THEN EXCL(opts, assert)\r\t\t\t\tELSE EXCL(opts, checks)\r\t\t\t\tEND\r\t\t\tELSIF opt[i] = \"+\" THEN INCL(opts, allchecks)\r\t\t\tELSIF opt[i] = \"?\" THEN INCL(opts, hint)\r\t\t\tELSIF opt[i] = \"@\" THEN INCL(opts, errorTrap)\r\t\t\tELSIF opt[i] = \"$\" THEN INCL(opts, oberon)\r\t\t\tEND;\r\t\t\tINC(i)\r\t\tEND;\r\t\tOpen;\r\t\tt := TextViews.FocusText();\r\t\tIF t # NIL THEN\r\t\t\tDo(t, StdLog.text, 0, opts, error);\r\t\t\tIF error THEN DevMarkers.ShowFirstError(t, TextViews.focusOnly) END\r\t\tELSE Dialog.ShowMsg(\"#Dev:NoTextViewFound\")\r\t\tEND;\r\t\tClose\r\tEND CompileOpt;\r\r\tPROCEDURE "
                    attr: 0
                  - text: CompileText
                    attr: 3
                  - text: "* (text: TextModels.Model; beg: INTEGER; OUT error: BOOLEAN);\r\tBEGIN\r\t\tASSERT(text # NIL, 20); ASSERT((beg >= 0) & (beg <= text.Length()), 21);\r\t\tOpen;\r\t\tDo(text, StdLog.text, beg, defopt, error);\r\t\tIF error THEN DevMarkers.ShowFirstError(text, TextViews.focusOnly) END;\r\t\tClose\r\tEND CompileText;\r\r\tPROCEDURE "
                    attr: 0
                  - text: CompileAndUnload
                    attr: 3
                  - text: "*;\r\t\tVAR t: TextModels.Model; error: BOOLEAN; mod: Kernel.Module; \r\t\t\tn: ARRAY LEN(DevCPT.Name) OF CHAR; res: INTEGER;\r\tBEGIN\r\t\tOpen;\r\t\tt := TextViews.FocusText();\r\t\tIF t # NIL THEN\r\t\t\tDo(t, StdLog.text, 0, defopt, error);\r\t\t\tIF error THEN DevMarkers.ShowFirstError(t, TextViews.focusOnly)\r\t\t\tELSE\r\t\t\t\tStrings.Utf8ToString(DevCPT.SelfName, n, res);\r\t\t\t\tmod := Kernel.ThisLoadedMod(n);\r\t\t\t\tIF mod # NIL THEN\r\t\t\t\t\tKernel.UnloadMod(mod);\r\t\t\t\t\tStrings.Utf8ToString(DevCPT.SelfName, n, res);\r\t\t\t\t\tIF mod.refcnt < 0 THEN\r\t\t\t\t\t\tDialog.MapParamString(\"#Dev:Unloaded\", n, \"\", \"\", str);\r\t\t\t\t\t\tStdLog.String(str); StdLog.Ln;\r\t\t\t\t\t\tControls.Relink\r\t\t\t\t\tELSE\r\t\t\t\t\t\tDialog.MapParamString(\"#Dev:UnloadingFailed\", n, \"\", \"\", str);\r\t\t\t\t\t\tStdLog.String(str); StdLog.Ln\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE Dialog.ShowMsg(\"#Dev:NoTextViewFound\")\r\t\tEND;\r\t\tClose\r\tEND CompileAndUnload;\r\r\tPROCEDURE "
                    attr: 0
                  - text: CompileSelection
                    attr: 3
                  - text: "*;\r\t\tVAR c: TextControllers.Controller; t: TextModels.Model; beg, end: INTEGER; error: BOOLEAN;\r\tBEGIN\r\t\tOpen;\r\t\tc := TextControllers.Focus();\r\t\tIF c # NIL THEN\r\t\t\tt := c.text;\r\t\t\tIF c.HasSelection() THEN\r\t\t\t\tc.GetSelection(beg, end); Do(t, StdLog.text, beg, defopt, error);\r\t\t\t\tIF error THEN DevMarkers.ShowFirstError(t, TextViews.focusOnly) END\r\t\t\tELSE Dialog.ShowMsg(\"#Dev:NoSelectionFound\")\r\t\t\tEND\r\t\tELSE Dialog.ShowMsg(\"#Dev:NoTextViewFound\")\r\t\tEND;\r\t\tClose\r\tEND CompileSelection;\r\r\tPROCEDURE CompileList (beg, end: INTEGER; c: TextControllers.Controller);\r\t\tVAR v: Views.View; i: INTEGER; error, one: BOOLEAN; name: Files.Name; loc: Files.Locator;\r\t\t\tt: TextModels.Model; opts: SET; title, entry: ARRAY 64 OF CHAR;\r\tBEGIN\r\t\ts.SetPos(beg); s.Scan; one := FALSE;\r\t\tWHILE (s.start < end) & (s.type = TextMappers.string) & (s.len < LEN(name)) DO\r\t\t\ts.Scan; one := TRUE;\r\t\t\tWHILE (s.start < end) & (s.type = TextMappers.char) &\r\t\t\t\t((s.char = \"-\") OR (s.char = \"+\") OR\r\t\t\t\t(s.char = \"!\") OR (s.char = \"*\") OR (s.char = \"?\") OR (s.char = \"^\") OR (s.char = \"(\"))\r\t\t\tDO\r\t\t\t\tIF s.char = \"(\" THEN\r\t\t\t\t\tWHILE (s.start < end) & ((s.type # TextMappers.char) OR (s.char # \")\")) DO s.Scan END\r\t\t\t\tEND;\r\t\t\t\ts.Scan\r\t\t\tEND\r\t\tEND;\r\t\tIF one & (s.start >= end) THEN\r\t\t\ts.SetPos(beg); s.Scan; error := FALSE;\r\t\t\tWHILE (s.start < end) & (s.type = TextMappers.string) & ~error DO\r\t\t\t\ti := 0; WHILE i < LEN(name) DO name[i] := 0X; INC(i) END;\r\t\t\t\tStdDialog.GetSubLoc(s.string, \"Mod\", loc, name);\r\t\t\t\tt := NIL;\r\t\t\t\tIF loc # NIL THEN\r\t\t\t\t\tv := Views.OldView(loc, name);\r\t\t\t\t\tIF v # NIL THEN\r\t\t\t\t\t\tWITH v: TextViews.View DO t := v.ThisModel()\r\t\t\t\t\t\tELSE Dialog.ShowParamMsg(\"#Dev:NoTextFileFound\", name, \"\", \"\"); error := TRUE\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE Dialog.ShowParamMsg(\"#Dev:CannotOpenFile\", name, \"\", \"\"); error := TRUE\r\t\t\t\t\tEND\r\t\t\t\tELSE Dialog.ShowParamMsg(\"#System:FileNotFound\", name, \"\", \"\"); error := TRUE\r\t\t\t\tEND;\r\t\t\t\ts.Scan; opts := defopt;\r\t\t\t\tWHILE (s.start < end) & (s.type = TextMappers.char) DO\r\t\t\t\t\tIF s.char = \"-\" THEN\r\t\t\t\t\t\tIF srcpos IN opts THEN EXCL(opts, srcpos)\r\t\t\t\t\t\tELSIF allref IN opts THEN EXCL(opts, allref)\r\t\t\t\t\t\tELSIF ref IN opts THEN EXCL(opts, ref)\r\t\t\t\t\t\tELSE EXCL(opts, obj)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSIF s.char = \"!\" THEN\r\t\t\t\t\t\tIF assert IN opts THEN EXCL(opts, assert)\r\t\t\t\t\t\tELSE EXCL(opts, checks)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSIF s.char = \"+\" THEN INCL(opts, allchecks)\r\t\t\t\t\tELSIF s.char = \"?\" THEN INCL(opts, hint)\r\t\t\t\t\tELSIF s.char = \"@\" THEN INCL(opts, errorTrap)\r\t\t\t\t\tELSIF s.char = \"$\" THEN INCL(opts, oberon)\r\t\t\t\t\tELSIF s.char = \"(\" THEN\r\t\t\t\t\t\ts.Scan;\r\t\t\t\t\t\tWHILE (s.start < end) & (s.type = TextMappers.string) DO\r\t\t\t\t\t\t\ttitle := s.string$; s.Scan;\r\t\t\t\t\t\t\tIF (s.start < end) & (s.type = TextMappers.char) & (s.char = \":\") THEN\r\t\t\t\t\t\t\t\ts.Scan;\r\t\t\t\t\t\t\t\tIF (s.start < end) & (s.type = TextMappers.string) THEN\r\t\t\t\t\t\t\t\t\tentry := s.string$; s.Scan;\r\t\t\t\t\t\t\t\t\tIF t # NIL THEN DevSelectors.ChangeTo(t, title, entry) END\r\t\t\t\t\t\t\t\tEND\r\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\tIF (s.start < end) & (s.type = TextMappers.char) & (s.char = \",\") THEN s.Scan END\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND;\r\t\t\t\t\ts.Scan\r\t\t\t\tEND;\r\t\t\t\tIF t # NIL THEN\r\t\t\t\t\tDo(t, StdLog.text, 0, opts, error)\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE Dialog.ShowMsg(\"#Dev:NotOnlyFileNames\")\r\t\tEND;\r\t\ts.ConnectTo(NIL);\r\t\tIF error & (c # NIL) & c.HasSelection() & (s.start < end) THEN\r\t\t\tc.SetSelection(s.start, end)\r\t\tEND;\r\t\tIF error & (v # NIL) THEN\r\t\t\tViews.Open(v, loc, name, NIL);\r\t\t\tDevMarkers.ShowFirstError(t, TextViews.any)\r\t\tEND\r\tEND CompileList;\r\r\tPROCEDURE "
                    attr: 0
                  - text: CompileModuleList
                    attr: 3
                  - text: "*;\r\t\tVAR c: TextControllers.Controller; beg, end: INTEGER;\r\tBEGIN\r\t\tOpen;\r\t\tc := TextControllers.Focus();\r\t\tIF c # NIL THEN\r\t\t\ts.ConnectTo(c.text);\r\t\t\tIF c.HasSelection() THEN c.GetSelection(beg, end)\r\t\t\tELSE beg := 0; end := c.text.Length()\r\t\t\tEND;\r\t\t\tCompileList(beg, end, c)\r\t\tELSE Dialog.ShowMsg(\"#Dev:NoTextViewFound\")\r\t\tEND;\r\t\tClose\r\tEND CompileModuleList;\r\r\tPROCEDURE "
                    attr: 0
                  - text: CompileThis
                    attr: 3
                  - text: "*;\r\t\tVAR p: DevCommanders.Par; beg, end: INTEGER;\r\tBEGIN\r\t\tOpen;\r\t\tp := DevCommanders.par;\r\t\tIF p # NIL THEN\r\t\t\tDevCommanders.par := NIL;\r\t\t\ts.ConnectTo(p.text); beg := p.beg; end := p.end;\r\t\t\tCompileList(beg, end, NIL)\r\t\tELSE Dialog.ShowMsg(\"#Dev:NoTextViewFound\")\r\t\tEND;\r\t\tClose\r\tEND CompileThis;\r\r\tPROCEDURE Init;\r\t\tVAR loc: Files.Locator; f: Files.File;\r\tBEGIN\r\t\tloc := Files.dir.This(\"Dev\"); loc := loc.This(\"Code\");\r\t\tf := Files.dir.Old(loc, \"ComDebug.ocf\", TRUE);\r\t\tfound := f # NIL;\r\t\tIF f # NIL THEN f.Close END\r\tEND Init;\r\rBEGIN\r\tInit\rEND DevCompiler.\r"
                    attr: 0
