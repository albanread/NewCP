                  - text: "; CPS.Get(sym);\r\t\t\tCPT.libName := \"\";\r\t\t\tIF sym = lbrak THEN\r\t\t\t\tINCL(CPM.options, CPM.interface); CPS.Get(sym);\r\t\t\t\tIF sym = string THEN CPT.libName := CPS.str^$; CPS.Get(sym)\r\t\t\t\tELSE err(string)\r\t\t\t\tEND;\r\t\t\t\tCheckSym(rbrak)\r\t\t\tEND;\r\t\t\tCheckSym(semicolon);\r\t\t\tIF sym = import THEN CPS.Get(sym);\r\t\t\t\tINCL(CPM.options, CPM.comAware); (* BJ: to avoid error when importing COM *)\r\t\t\t\tLOOP\r\t\t\t\t\tIF sym = ident THEN\r\t\t\t\t\t\taliasName := CPS.name$; impName := aliasName$; CPS.Get(sym);\r\t\t\t\t\t\tIF sym = becomes THEN CPS.Get(sym);\r\t\t\t\t\t\t\tIF sym = ident THEN impName := CPS.name$; CPS.Get(sym) ELSE err(ident) END\r\t\t\t\t\t\tEND ;\r\t\t\t\t\t\tCPT.Import(aliasName, impName, done);\r\t\t\t\t\t\tCPS.name := aliasName$;\t(*<<*)\r\t\t\t\t\t\tCPT.Find(CPS.name, obj);\r\t\t\t\t\t\tIF obj # NIL THEN obj.adr := CPM.errpos; obj.num := set END (*<< modules are set by default *)\r\t\t\t\t\tELSE err(ident)\r\t\t\t\t\tEND ;\r\t\t\t\t\tIF sym = comma THEN CPS.Get(sym)\r\t\t\t\t\tELSIF sym = ident THEN err(comma)\r\t\t\t\t\tELSE EXIT\r\t\t\t\t\tEND\r\t\t\t\tEND ;\r\t\t\t\tCheckSym(semicolon)\r\t\t\tEND ;\r\t\t\tIF CPM.noerr THEN \r\t\t\t\tTDinit := NIL; lastTDinit := NIL; c := CPM.errpos;\r\t\t\t\tBlock(procdec, statseq); CPB.Enter(procdec, statseq, NIL); prog := procdec;\r\t\t\t\tprog.conval := CPT.NewConst(); prog.conval.intval := c; prog.conval.intval2 := CPM.startpos;\r\t\t\t\tIF sym = close THEN CPS.Get(sym); StatSeq(prog.link) END;\r\t\t\t\tprog.conval.realval := CPM.startpos;\r\t\t\t\tCheckSym(end);\r\t\t\t\tIF sym = ident THEN\r\t\t\t\t\tIF CPS.name # CPT.SelfName THEN err(4) END ;\r\t\t\t\t\tCPS.Get(sym)\r\t\t\t\tELSE err(ident)\r\t\t\t\tEND;\r\t\t\t\tIF sym # period THEN err(period) END;\r\t\t\t\tCheckScope(CPT.topScope)\t(*<<*)\r\t\t\tEND\r\t\tELSE err(ident)\r\t\tEND ;\r\t\tTDinit := NIL; lastTDinit := NIL\r\tEND Module;\r\r\tPROCEDURE WriteWarnings(text: TextModels.Model; VAR warning: BOOLEAN);\t(*<<O/F*)\r\t\tVAR e: Warning; inserted: SHORTINT;\r\tBEGIN\r\t\tIF errHead.next = NIL THEN warning := FALSE; CPM.LogWStr(\" done\")\r\t\tELSE\r\t\t\twarning := TRUE;\r\t\t\te := errHead.next; inserted := 0;\r\t\t\tWHILE e # NIL DO\r\t\t\t\tDevMarkers.Insert(text, e.pos+inserted, DevMarkers.dir.New(e.n));\t(*<<*)\r\t\t\t\te := e.next; INC(inserted)\r\t\t\tEND\r\t\tEND;\r\t\terrHead := NIL\r\tEND WriteWarnings;\r\r(*<<OP2 procedures *)\r\tPROCEDURE TypeSize(typ: CPT.Struct);\r\tEND TypeSize;\r\r\tPROCEDURE ProcessModule (source: TextModels.Reader; log: TextModels.Model; VAR error, warning: BOOLEAN);\r\t\tVAR p: CPT.Node; script: Stores.Operation; text: TextModels.Model;\r\tBEGIN\r\t\ttext := source.Base();\r\t\tModels.BeginModification(Models.clean, text);\r\t\tModels.BeginScript(text, \"#Dev:InsertMarkers\", script);\r\t\tCPM.Init(source, log);\r\t\tCPT.Init({});\r\t\tCPB.typSize := (*<<OPV.*)TypeSize;\r\t\t(*<<CPT.processor := OPL.processor;*)\r\t\tModule(p);\r\t(*<<\r\t\tIF CPM.noerr THEN\r\t\t\tOPV.Init(opt, DevDebug.breakPos); OPV.Allocate; CPT.Export(ext, new);\r\t\t\tIF CPM.noerr THEN\r\t\t\t\tOPV.Module(p);\r\t\t\t\tIF CPM.noerr THEN\r\t\t\t\t\tIF new OR ext THEN CPM.RegisterNewSym END ;\r\t\t\t\t\tCPM.LogWStr(\"\t\"); CPM.LogWNum(OPL.pc, 8);\r\t\t\t\t\tCPM.LogWStr(\"\t\"); CPM.LogWNum(OPL.dsize, 8)\r\t\t\t\tELSE CPM.DeleteNewSym\r\t\t\t\tEND\r\t\t\tEND ;\r\t\t\tOPL.Close\r\t\tEND ;\r\t*)\r\t\tCPT.Close;\r\t\terror := ~CPM.noerr;\r\t\tCPM.Close;\r\t\tp := NIL;\r\t\tKernel.FastCollect;\r\t\tIF error THEN\r\t\t\tCPM.InsertMarks(source.Base());\r\t\t\tCPM.LogWLn; CPM.LogWStr(\" \");\r\t\t\tIF CPM.errors = 1 THEN\r\t\t\t\tDialog.MapString(\"#Dev:OneErrorDetected\", str)\r\t\t\tELSE\r\t\t\t\tCPM.LogWNum(CPM.errors, 0); Dialog.MapString(\"#Dev:ErrorsDetected\", str)\r\t\t\tEND;\r\t\t\tStdLog.String(str)\r\t\tELSE\t(*<<*)\r\t\t\toptions.statements := nofStats;\r\t\t\tWriteWarnings(text, warning);\r\t\t\tCPM.LogWLn; CPM.LogWNum(nofStats, 0); CPM.LogWStr(\" statements\")\r\t\tEND;\r\t\tCPM.LogWLn; CPM.Close;\r\t\tModels.EndScript(source.Base(), script);\r\t\tModels.EndModification(Models.clean, text)\r\tEND ProcessModule;\r\r\r\tPROCEDURE Do (source, log: TextModels.Model; beg: INTEGER; VAR error, warning: BOOLEAN);\r\t\tVAR r: TextMappers.Scanner;\r\tBEGIN\r\t\tDialog.MapString(\"#Dev:Analyzing\", str);\r\t\tStdLog.String(str); StdLog.Char(\" \");\r\t\toptions.fileName := \"\";\r\t\tr.ConnectTo(source); r.SetPos(beg); r.Scan;\r\t\tIF (r.type = TextMappers.string) & (r.string = \"MODULE\") THEN\r\t\t\tr.Scan;\r\t\t\tIF r.type = TextMappers.string THEN\r\t\t\t\tStdLog.Char('\"'); StdLog.String(r.string); StdLog.Char('\"');\r\t\t\t\toptions.fileName := r.string\r\t\t\tEND\r\t\tEND;\r\t\tsourceR := source.NewReader(NIL); sourceR.SetPos(beg);\r\t\tProcessModule(sourceR, log, error, warning); Dialog.Update(options)\r\tEND Do;\r\r\tPROCEDURE Open;\r\tBEGIN\r\t\tDialog.ShowStatus(\"#Dev:Analyzing\");\r\t\tStdLog.buf.Delete(0, StdLog.buf.Length())\r\tEND Open;\r\t\r\tPROCEDURE Close (noerr: BOOLEAN);\r\tBEGIN\r\t\tStdLog.text.Append(StdLog.buf);\r\t\tIF noerr & CPM.noerr THEN Dialog.ShowStatus(\"#Dev:Ok\")\r\t\tEND;\r\t\tsourceR := NIL;\r\t\tKernel.Cleanup\r\tEND Close;\r\r\tPROCEDURE "
