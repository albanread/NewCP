                    attr: 3
                  - text: "\t\t\tELSE\r\t\t\t\tIF sym = times THEN\t(* mode set later in CPB.CheckAssign *)\r\t\t\t\tELSIF sym = arrow THEN forward := TRUE\r\t\t\t\tELSE err(ident)\r\t\t\t\tEND;\r\t\t\t\tCPS.Get(sym)\r\t\t\tEND\r\t\tEND ;\r\t\tIF sym = lparen THEN TProcDecl\r\t\tELSIF sym = ident THEN CPT.Find(CPS.name, fwd);\r\t\t\tname := CPS.name;\r\t\t\tIF (fwd # NIL) & ((fwd.mnolev # level) OR (fwd.mode = SProc)) THEN fwd := NIL END ;\r\t\t\tIF (fwd # NIL) & (fwd.mode IN {LProc, XProc}) & ~(hasBody IN fwd.conval.setval) THEN\r\t\t\t\t(* there exists a corresponding forward declaration *)\r\t\t\t\tproc := CPT.NewObj(); proc.leaf := TRUE;\r\t\t\t\tproc.mode := mode; proc.conval := CPT.NewConst();\r\t\t\t\tCheckMark(proc);\r\t\t\t\tIF fwd.vis # proc.vis THEN err(118) END\r\t\t\tELSE\r\t\t\t\tIF fwd # NIL THEN err(1); fwd := NIL END ;\r\t\t\t\tCheckOuter;\t(*<<*)\r\t\t\t\tCPT.Insert(name, proc);\r\t\t\t\tproc.mode := mode; proc.conval := CPT.NewConst();\r\t\t\t\tCheckMark(proc)\r\t\t\tEND ;\r\t\t\tpos := CPM.errpos; proc.num := set;\t(*<< procedures are set *)\r\t\t\tIF (proc.vis # internal) & (mode = LProc) THEN mode := XProc END ;\r\t\t\tIF (mode # LProc) & (level > 0) THEN err(73) END ;\r\t\t\tINC(level); CPT.OpenScope(level, proc);\r\t\t\tproc.link := NIL; GetParams;\r\t\t\tIF mode = CProc THEN GetCode\r\t\t\tELSIF CPM.interface IN CPM.options THEN INCL(proc.conval.setval, hasBody)\r\t\t\tELSIF ~forward THEN Body; proc.adr := 0\r\t\t\tELSE proc.adr := CPM.errpos\r\t\t\tEND ;\r\t\t\tproc.adr := pos;\t(*<< *)\r\t\t\tDEC(level); CPT.CloseScope\r\t\tELSE err(ident)\r\t\tEND\r\tEND ProcedureDeclaration;\r\r\tPROCEDURE CaseLabelList(VAR lab, "
