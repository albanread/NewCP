                  - text: "\t\t\tIF lab = NIL THEN lab := x; Insert(root)\r\t\t\tELSIF yval < lab.conval.intval - 1 THEN x.link := lab; lab := x; Insert(root)\r\t\t\tELSIF yval = lab.conval.intval - 1 THEN x.hint := 1; Insert(root); lab.conval.intval := xval\r\t\t\tELSIF xval = lab.conval.intval2 + 1 THEN x.hint := 1; Insert(root); lab.conval.intval2 := yval\r\t\t\tELSE\r\t\t\t\ty := lab;\r\t\t\t\tWHILE (y.link # NIL) & (xval > y.link.conval.intval2 + 1) DO y := y.link END;\r\t\t\t\tIF y.link = NIL THEN y.link := x; Insert(root)\r\t\t\t\tELSIF yval < y.link.conval.intval - 1 THEN x.link := y.link; y.link := x; Insert(root)\r\t\t\t\tELSIF yval = y.link.conval.intval - 1 THEN x.hint := 1; Insert(root); y.link.conval.intval := xval\r\t\t\t\tELSIF xval = y.link.conval.intval2 + 1 THEN x.hint := 1; Insert(root); y.link.conval.intval2 := yval\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF sym = comma THEN CPS.Get(sym)\r\t\t\tELSIF (sym = number) OR (sym = ident) THEN err(comma)\r\t\t\tELSE EXIT\r\t\t\tEND\r\t\tEND\r\tEND CaseLabelList;\r\t\r\tPROCEDURE Evaluate (n: CPT.Node; VAR min, max, num, dist: INTEGER; VAR head: CPT.Node);\r\t\tVAR a: INTEGER;\r\tBEGIN\r\t\ta := MIN(INTEGER);\r\t\tIF n.left # NIL THEN\r\t\t\ta := MIN(INTEGER); Evaluate(n.left, min, a, num, dist, head);\r\t\t\tIF n.conval.intval - a > dist THEN dist := n.conval.intval - a; head := n END\r\t\tELSIF n.conval.intval < min THEN\r\t\t\tmin := n.conval.intval\r\t\tEND;\r\t\tIF n.right # NIL THEN\r\t\t\ta := MAX(INTEGER); Evaluate(n.right, a, max, num, dist, head);\r\t\t\tIF a - n.conval.intval2 > dist THEN dist := a - n.conval.intval2; head := n END\r\t\tELSIF n.conval.intval2 > max THEN\r\t\t\tmax := n.conval.intval2\r\t\tEND;\r\t\tINC(num);\r\t\tIF n.conval.intval < n.conval.intval2 THEN\r\t\t\tINC(num);\r\t\t\tIF n.conval.intval2 - n.conval.intval > dist THEN dist := n.conval.intval2 - n.conval.intval; head := n END\r\t\tEND\r\tEND Evaluate;\r\t\r\tPROCEDURE Rebuild (VAR root: CPT.Node; head: CPT.Node);\r\t\tVAR n: CPT.Node;\r\tBEGIN\r\t\tIF root # head THEN\r\t\t\tIF head.conval.intval2 < root.conval.intval THEN\r\t\t\t\tRebuild(root.left, head);\r\t\t\t\tn := head; WHILE n.right # NIL DO n := n.right END;\r\t\t\t\tn.right := root; root.left := NIL; root := head\r\t\t\tELSE\r\t\t\t\tRebuild(root.right, head);\r\t\t\t\tn := head; WHILE n.left # NIL DO n := n.left END;\r\t\t\t\tn.left := root; root.right := NIL; root := head\r\t\t\tEND\r\t\tEND\r\tEND Rebuild;\r\t\r\tPROCEDURE Optimize (VAR n: CPT.Node);\r\t\tVAR min, max, num, dist, limit: INTEGER; head: CPT.Node;\r\tBEGIN\r\t\tIF n # NIL THEN\r\t\t\tmin := MAX(INTEGER); max := MIN(INTEGER); num := 0; dist := 0; head := n;\r\t\t\tEvaluate(n, min, max, num, dist, head);\r\t\t\tlimit := "
