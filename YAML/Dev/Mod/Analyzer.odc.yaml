                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT\r\t\tStrings, TextMappers, TextModels, TextViews, DevMarkers, Stores, Models, Kernel, Dialog, StdLog, Files,\r\t\tCPT := DevCPT, CPS := DevCPS, CPM := DevCPM, CPB := DevCPB, HostRegistry;\r\t\t\r\tCONST\r\t\t(* numtyp values *)\r\t\tchar = 1; integer = 2; real = 4; int64 = 5; real32 = 6; real64 = 7;\r\r\t\t(*symbol values*)\r\t\tnull = 0; times = 1;\r\t\tand = 5; plus = 6; minus = 7; or = 8; eql = 9;\r\t\tleq = 12; geq = 14;\r\t\tin = 15; is = 16; arrow = 17; dollar = 18; period = 19;\r\t\tcomma = 20; colon = 21; upto = 22; rparen = 23; rbrak = 24;\r\t\trbrace = 25; of = 26; then = 27; do = 28; to = 29;\r\t\tby = 30; not = 33;\r\t\tlparen = 40; lbrak = 41; lbrace = 42; becomes = 44;\r\t\tnumber = 45; nil = 46; string = 47; ident = 48; semicolon = 49;\r\t\tbar = 50; end = 51; else = 52; elsif = 53; until = 54;\r\t\tif = 55; case = 56; while = 57; repeat = 58; for = 59;\r\t\tloop = 60; with = 61; exit = 62; return = 63; array = 64;\r\t\trecord = 65; pointer = 66; begin = 67; const = 68; type = 69;\r\t\tvar = 70; out = 71; procedure = 72; close = 73; import = 74;\r\t\tmodule = 75; eof = 76;\r\r\t\t(* object modes *)\r\t\tVar = 1; VarPar = 2; Con = 3; Fld = 4; Typ = 5; LProc = 6; XProc = 7;\r\t\tSProc = 8; CProc = 9; IProc = 10; Mod = 11; TProc = 13; Attr = 20;\r\r\t\t(* Structure forms *)\r\t\tUndef = 0; Byte = 1; Bool = 2; Char8 = 3; Int8 = 4; Int16 = 5; Int32 = 6;\r\t\tSet = 9;\r\t\tPointer = 13; ProcTyp = 14; Comp = 15;\r\t\tChar16 = 16; Int64 = 18;\r\t\tintSet = {Int8..Int32, Int64}; charSet = {Char8, Char16};\r\t\t\r\t\t(* composite structure forms *)\r\t\tBasic = 1; Array = 2; DynArr = 3; Record = 4;\r\r\t\t(*function number*)\r\t\tnewfn = 1; incfn = 13; sysnewfn = 30;\r\t\t(*<< function number*)\r\t\tordfn = 4;\r\t\tminfn = 7; maxfn = 8; chrfn = 9;\r\t\tsizefn = 12; decfn = 14;\r\t\tinclfn = 15; exclfn = 16; lenfn = 17; bitsfn = 37;\r\t\t(*<< SYSTEM function number*)\r\t\tadrfn = 20;\r\t\tgetfn = 24; getrfn = 26;\r\t\tvalfn = 29;\r\r\t\t(* nodes classes *)\r\t\tNvar = 0; Nvarpar = 1; Nfield = 2; Nderef = 3; Nindex = 4;\r\t\tNconst = 7; Ntype = 8; Nproc = 9; Ncall = 13;\r\t\tNif = 15; Ncaselse = 16; Ncasedo = 17;\r\t\tNifelse = 20; Ncase = 21; Nwhile = 22; Nrepeat = 23; Nloop = 24; Nexit = 25;\r\t\tNwith = 27; Ncomp = 30;\r\r\t\t(* node subclasses *)\r\t\tsuper = 1;\r\t\t\r\t\t(* module visibility of objects *)\r\t\tinternal = 0; external = 1; externalR = 2; inPar = 3; outPar = 4;\r\r\t\t(* procedure flags (conval.setval) *)\r\t\thasBody = 1; isRedef = 2;\r\t\t\r\t\t(* attribute flags (attr.adr, struct.attribute, proc.conval.setval)*)\r\t\tnewAttr = 16; absAttr = 17; limAttr = 18; empAttr = 19; extAttr = 20;\r\t\t\r\t\t(* case statement flags (conval.setval) *)\r\t\tuseTable = 1; useTree = 2;\r\t\t\r\t\t(* sysflags *)\r\t\tinBit = 2; outBit = 4; newBit = 8; iidBit = 16; interface = 10;\r\t\t\r\t\tclean = CPM.ConstNotAlloc;\t(*<< values for obj.linkadr: untouched *)\r\t\tused = clean+1; usedSet = clean+2; set = clean+3;\t(*<< used, used then set, set *)\r\t\tsetUsed = clean+4; setUsedP = clean+5;\t(*<< set then used, possibly set and used (var par) *)\r\t\tnoChange = (setUsedP+15) DIV 16 * 16;\t(*<< for loop variables shouldn't be changed *)\r\r\t\t(*<< error messages *)\r\t\tneverUsed = 900; neverSet = 901; usedBSet = 902; setBNUsed = 903; usedVarPar = 904;\r\t\touterScope = 905; interAcc = 906; (*redefinition = 907; newdefinition = 908;*)\r\t\tstatAfterRetEx = 909; loopVarSet = 910; (*impliedTypeGuard = 911;*)\r\t\tsuperfluousTypeGuard = 912; evaluationSeq = 913; superfluousShort = 914;\r\r\t\tsemicolons = 930;\t(*<< special stuff *)\r\t\t\r\t\t(*<< selector flags for Selector *)\r\t\tSelAssign = TRUE; SelNoAssign = FALSE;\r\t\tSelVarPar = TRUE; SelNoVarPar = FALSE;\r\t\tSelUseBSet = TRUE; SelNoUseBSet = FALSE;\r\r\t\tVersion = \"DevAnalyzer for Component Pascal  (c) SHML  24 Mar 1998\";\r\t\tOptionsFile = \"AnaOpt\"; OptionsType = \"opt\"; OptionsPath = \"Dev/Rsrc\";\t(*<<O/F*)\r\t\t\r\t\tregKey = \"Dev\\Analyzer\\\";\r\t\t\r\tTYPE\r\t\tElem = POINTER TO RECORD\r\t\t\tnext: Elem;\r\t\t\tstruct: CPT.Struct;\r\t\t\tobj, base: CPT.Object;\r\t\t\tpos: INTEGER;\r\t\t\tname: CPT.String\r\t\tEND;\r\t\t\r\t\t\r\t\tWarning = POINTER TO RECORD\t(*<< list of warning positions *)\r\t\t\tnext: Warning;\r\t\t\tn: SHORTINT;\r\t\t\tpos: INTEGER\r\t\tEND;\r\r\tVAR\r\t\toptions*: RECORD\t(*<<O/F*)\r\t\t\tvarpar*, exported*, intermediate*, levels*, tbProcs*,\r\t\t\tsideEffects*, semicolons*: BOOLEAN;\r\t\t\tstatements-: INTEGER; fileName-: TextMappers.String\r\t\tEND;\r\t\terrHead: Warning;\t(*<< root for warning position list *)\r\t\tnofStats: INTEGER;\t(*<< number of statements in module *)\r\t\tsourceR: TextModels.Reader;\r\t\tstr: Dialog.String;\r\r\t\tsym, level: BYTE;\r\t\tLoopLevel: SHORTINT;\r\t\tTDinit, lastTDinit: CPT.Node;\r\t\tuserList: Elem;\r\t\trecList: Elem;\r\t\thasReturn: BOOLEAN;\r\t\t\r\tPROCEDURE^ Type(VAR typ: CPT.Struct; VAR name: CPT.String);\r\tPROCEDURE^ Expression(VAR x: CPT.Node);\r\tPROCEDURE^ Block(VAR procdec, statseq: CPT.Node);\r\t\r\t(* forward type handling *)\r\t\r\tPROCEDURE IncompleteType (typ: CPT.Struct): BOOLEAN;\r\tBEGIN\r\t\tIF typ.form = Pointer THEN typ := typ.BaseTyp END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " (typ = CPT.undftyp) OR (typ.comp = Record) & (typ.BaseTyp = CPT.undftyp)\r\tEND IncompleteType;\r\t\r\tPROCEDURE SetType (struct: CPT.Struct; obj: CPT.Object; typ: CPT.Struct; name: CPT.String);\r\t\tVAR u: Elem;\r\tBEGIN\r\t\tIF obj # NIL THEN obj.typ := typ ELSE struct.BaseTyp := typ END;\r\t\tIF name # NIL THEN\r\t\t\tNEW(u); u.struct := struct; u.obj := obj; u.pos := CPM.errpos; u.name := name;\r\t\t\tu.next := userList; userList := u\r\t\tEND\r\tEND SetType;\r\r\tPROCEDURE CheckAlloc (VAR typ: CPT.Struct; dynAllowed: BOOLEAN; pos: INTEGER);\r\tBEGIN\r\t\ttyp.pvused := TRUE;\r\t\tIF typ.comp = DynArr THEN\r\t\t\tIF ~dynAllowed THEN CPM.Mark(88, pos); typ := CPT.undftyp END\r\t\tELSIF typ.comp = Record THEN\r\t\t\tIF (typ.attribute = absAttr) OR (typ.attribute = limAttr) & (typ.mno # 0) THEN\r\t\t\t\tCPM.Mark(193, pos); typ := CPT.undftyp\r\t\t\tEND\r\t\tEND\r\tEND CheckAlloc;\r\r\tPROCEDURE CheckRecursiveType (outer, inner: CPT.Struct; pos: INTEGER);\r\t\tVAR fld: CPT.Object;\r\tBEGIN\r\t\tIF outer = inner THEN CPM.Mark(58, pos)\r\t\tELSIF inner.comp IN {Array, DynArr} THEN CheckRecursiveType(outer, inner.BaseTyp, pos)\r\t\tELSIF inner.comp = Record THEN\r\t\t\tfld := inner.link;\r\t\t\tWHILE (fld # NIL) & (fld.mode = Fld) DO\r\t\t\t\tCheckRecursiveType(outer, fld.typ, pos);\r\t\t\t\tfld := fld.link\r\t\t\tEND;\r\t\t\tIF inner.BaseTyp # NIL THEN CheckRecursiveType(outer, inner.BaseTyp, pos) END\r\t\tEND\r\tEND CheckRecursiveType;\r\t\r\tPROCEDURE FixType (struct: CPT.Struct; obj: CPT.Object; typ: CPT.Struct; pos: INTEGER);\t"
                    attr: 0
                  - text: "(* fix forward reference *)"
                    attr: 1
                  - text: "\r\t\tVAR t: CPT.Struct; f, bf: CPT.Object; i: SHORTINT;\r\tBEGIN\r\t\tIF obj # NIL THEN\r\t\t\tIF obj.mode = Var THEN\t"
                    attr: 0
                  - text: "(* variable type *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF struct # NIL THEN\t"
                    attr: 0
                  - text: "(* receiver type *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tIF (typ.form # Pointer) OR (typ.BaseTyp # struct) THEN CPM.Mark(180, pos) END\r\t\t\t\tELSE CheckAlloc(typ, obj.mnolev > level, pos)\t"
                    attr: 0
                  - text: "(* TRUE for parameters *)"
                    attr: 1
                  - text: "\r\t\t\t\tEND\r\t\t\tELSIF obj.mode = VarPar THEN\t"
                    attr: 0
                  - text: "(* varpar type *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF struct # NIL THEN\t"
                    attr: 0
                  - text: "(* varpar receiver type *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tIF typ # struct THEN CPM.Mark(180, pos) END\r\t\t\t\tEND\r\t\t\tELSIF obj.mode = Fld THEN\t"
                    attr: 0
                  - text: "(* field type *)"
                    attr: 1
                  - text: "\r\t\t\t\tCheckAlloc(typ, FALSE, pos);\r\t\t\t\tCheckRecursiveType(struct, typ, pos)\r\t\t\tELSIF obj.mode = TProc THEN\t"
                    attr: 0
                  - text: "(* proc return type *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF typ.form = Comp THEN typ := CPT.undftyp; CPM.Mark(54, pos) END\r\t\t\tELSIF obj.mode = Typ THEN\t"
                    attr: 0
                  - text: "(* alias type *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF typ.form IN {Byte..Set, Char16, Int64} THEN\t"
                    attr: 0
                  - text: "(* make alias structure *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tt := CPT.NewStr(typ.form, Basic); i := t.ref;\r\t\t\t\t\tt^ := typ^; t.ref := i; t.strobj := obj; t.mno := 0;\r\t\t\t\t\tt.BaseTyp := typ; typ := t\r\t\t\t\tEND;\r\t\t\t\tIF obj.vis # internal THEN\r\t\t\t\t\tIF typ.comp = Record THEN typ.exp := TRUE\r\t\t\t\t\tELSIF typ.form = Pointer THEN typ.BaseTyp.exp := TRUE\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tELSE HALT(100)\r\t\t\tEND;\r\t\t\tobj.typ := typ\r\t\tELSE\r\t\t\tIF struct.form = Pointer THEN\t"
                    attr: 0
                  - text: "(* pointer base type *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF typ.comp = Record THEN CPM.PropagateRecPtrSysFlag(typ.sysflag, struct.sysflag)\r\t\t\t\tELSIF typ.comp IN {Array, DynArr} THEN CPM.PropagateArrPtrSysFlag(typ.sysflag, struct.sysflag)\r\t\t\t\tELSE typ := CPT.undftyp; CPM.Mark(57, pos)\r\t\t\t\tEND;\r\t\t\t\tstruct.untagged := struct.sysflag # 0;\r\t\t\t\tIF (struct.strobj # NIL) & (struct.strobj.vis # internal) THEN typ.exp := TRUE END\r\t\t\tELSIF struct.comp = Array THEN\t"
                    attr: 0
                  - text: "(* array base type *)"
                    attr: 1
                  - text: "\r\t\t\t\tCheckAlloc(typ, FALSE, pos);\r\t\t\t\tCheckRecursiveType(struct, typ, pos)\r\t\t\tELSIF struct.comp = DynArr THEN\t"
                    attr: 0
                  - text: "(* array base type *)"
                    attr: 1
                  - text: "\r\t\t\t\tCheckAlloc(typ, TRUE, pos);\r\t\t\t\tCheckRecursiveType(struct, typ, pos)\r\t\t\tELSIF struct.comp = Record THEN\t"
                    attr: 0
                  - text: "(* record base type *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF typ.form = Pointer THEN typ := typ.BaseTyp END;\r\t\t\t\ttyp.pvused := TRUE; struct.extlev := SHORT(SHORT(typ.extlev + 1));\r\t\t\t\tCPM.PropagateRecordSysFlag(typ.sysflag, struct.sysflag);\r\t\t\t\tIF (typ.attribute = 0) OR (typ.attribute = limAttr) & (typ.mno # 0) THEN CPM.Mark(181, pos)\r\t\t\t\tELSIF (struct.attribute = absAttr) & (typ.attribute # absAttr) THEN CPM.Mark(191, pos)\r\t\t\t\tELSIF (typ.attribute = limAttr) & (struct.attribute # limAttr) THEN CPM.Mark(197, pos)\r\t\t\t\tEND;\r\t\t\t\tf := struct.link;\r\t\t\t\tWHILE f # NIL DO\t"
                    attr: 0
                  - text: "(* check for field name conflicts *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tCPT.FindField(f.name, typ, bf);\r\t\t\t\t\tIF bf # NIL THEN CPM.Mark(1, pos) END;\r\t\t\t\t\tf := f.link\r\t\t\t\tEND;\r\t\t\t\tCheckRecursiveType(struct, typ, pos);\r\t\t\t\tstruct.untagged := struct.sysflag # 0\r\t\t\tELSIF struct.form = ProcTyp THEN\t"
                    attr: 0
                  - text: "(* proc type return type *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF typ.form = Comp THEN typ := CPT.undftyp; CPM.Mark(54, pos) END;\r\t\t\tELSE HALT(100)\r\t\t\tEND;\r\t\t\tstruct.BaseTyp := typ\r\t\tEND\r\tEND FixType;\r\r\tPROCEDURE CheckForwardTypes;\r\t\tVAR u, next: Elem; progress: BOOLEAN;\r\tBEGIN\r\t\tu := userList; userList := NIL;\r\t\tWHILE u # NIL DO\r\t\t\tnext := u.next; CPS.name := u.name^$; CPT.Find(CPS.name, u.base);\r\t\t\tIF u.base = NIL THEN CPM.Mark(0, u.pos)\r\t\t\tELSIF u.base.mode # Typ THEN CPM.Mark(72, u.pos)\r\t\t\tELSE u.next := userList; userList := u;\t"
                    attr: 0
                  - text: "(* reinsert *)\r\t\t\t\t"
                    attr: 1
                  - text: "IF u.base.num < set THEN (* BJ: If already also used, don't reset *)"
                    attr: 0
                  - text: "\r\t"
                    attr: 1
                  - text: "\t\t\t\tu.base.num := set\t(*<< forward types are set by default *)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tu := next\r\t\tEND;\r\t\tREPEAT\t"
                    attr: 0
                  - text: "(* iteration for multy level alias *)"
                    attr: 1
                  - text: "\r\t\t\tu := userList; userList := NIL; progress := FALSE;\r\t\t\tWHILE u # NIL DO\r\t\t\t\tnext := u.next;\r\t\t\t\tIF IncompleteType(u.base.typ) THEN\r\t\t\t\t\tu.next := userList; userList := u\t"
                    attr: 0
                  - text: "(* reinsert *)"
                    attr: 1
                  - text: "\r\t\t\t\tELSE\r\t\t\t\t\tprogress := TRUE;\r\t\t\t\t\tFixType(u.struct, u.obj, u.base.typ, u.pos)\r\t\t\t\tEND;\r\t\t\t\tu := next\r\t\t\tEND\r\t\tUNTIL (userList = NIL) OR ~progress;\r\t\tu := userList;\t"
                    attr: 0
                  - text: "(* remaining type relations are cyclic *)"
                    attr: 1
                  - text: "\r\t\tWHILE u # NIL DO\r\t\t\tIF (u.obj = NIL) OR (u.obj.mode = Typ) THEN CPM.Mark(58, u.pos) END;\r\t\t\tu := u.next\r\t\tEND\r\tEND CheckForwardTypes;\r\t\r\tPROCEDURE CheckUnimpl (m: CPT.Object; typ: CPT.Struct; pos: INTEGER);\r\t\tVAR obj: CPT.Object; res: INTEGER; n: ARRAY 256 OF CHAR;"
                    attr: 0
                  - text: "\r"
                    attr: 4
                  - text: "\tBEGIN\r\t\tIF m # NIL THEN\r\t\t\tIF (m.mode = TProc) & (absAttr IN m.conval.setval) THEN\r\t\t\t\tCPT.FindField(m.name^, typ, obj);\r\t\t\t\tIF (obj = NIL) OR (obj.mode # TProc) OR (absAttr IN obj.conval.setval) THEN\r\t\t\t\t\tCPM.Mark(192, pos);\r\t\t\t\t\tCPM.LogWLn; CPM.LogWStr(\"  \"); Strings.Utf8ToString(m.name, n, res); CPM.LogWStr(n);\r\t\t\t\t\tCPM.LogWStr(\" not implemented in \"); Strings.Utf8ToString(typ.strobj.name^, n, res); CPM.LogWStr(n)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tCheckUnimpl(m.left, typ, pos);\r\t\t\tCheckUnimpl(m.right, typ, pos)\r\t\tEND\r\tEND CheckUnimpl;\r\t\r\tPROCEDURE CheckRecords (rec: Elem);\r\t\tVAR b: CPT.Struct;\r\tBEGIN\r\t\tWHILE rec # NIL DO\t"
                    attr: 0
                  - text: "(* check for unimplemented methods in base type *)"
                    attr: 1
                  - text: "\r\t\t\tb := rec.struct.BaseTyp;\r\t\t\tWHILE (b # NIL) & (b # CPT.undftyp) DO\r\t\t\t\tCheckUnimpl(b.link, rec.struct, rec.pos);\r\t\t\t\tb := b.BaseTyp\r\t\t\tEND;\r\t\t\trec := rec.next\r\t\tEND\r\tEND CheckRecords;\r\r\r\tPROCEDURE err(n: SHORTINT);\r\tBEGIN CPM.err(n)\r\tEND err;\r\r\tPROCEDURE CheckSym(s: SHORTINT);\r\tBEGIN\r\t\tIF sym = s THEN CPS.Get(sym) ELSE CPM.err(s) END\r\tEND CheckSym;\r\r\tPROCEDURE err2(n: SHORTINT; pos: INTEGER);\t(*<<*)\r\t\tVAR e, h: Warning;\r\tBEGIN\r\t\te := errHead;\r\t\tWHILE (e.next # NIL) & (e.next.pos < pos) DO e := e.next END;\r\t\tIF e.next = NIL THEN \r\t\t\tNEW(e.next); h := e.next\t(* end of list *)\r\t\tELSIF (e.next.pos = pos) & (e.next.n = n) THEN "
                    attr: 0
                  - text: "\r\t\t\tRETURN"
                    attr: 3
                  - text: "\t(* don't allow duplicates *)\r\t\tELSE \r\t\t\tNEW(h); h.next := e.next; e.next := h\r\t\tEND;\r\t\th.n := n; h.pos := pos\r\tEND err2;\r\r\r\tPROCEDURE DumpObj(obj: CPT.Object);\t\t\t\t\t\t\t\r(*\tBEGIN\r\t\tCPM.LogWStr(\"message for object: \"); CPM.LogWStr(obj.name); CPM.LogWLn\r*)\tEND DumpObj;\r\r\r\tPROCEDURE CheckScope(scope: CPT.Object);\t(*<<*)\r\r\t\tPROCEDURE^ Check(obj: CPT.Object);\r\r\t\tPROCEDURE CheckTyp(typ: CPT.Struct);\r\t\tBEGIN\r\t\t\tIF (typ.form = Pointer) & (typ.BaseTyp.strobj = NIL) THEN\t(* only if PTR TO RECORD END *)\r\t\t\t\ttyp := typ.BaseTyp\r\t\t\tEND;\r\t\t\tIF (typ.form = Comp) & (typ.comp = Record) THEN Check(typ.link) END\r\t\tEND CheckTyp;\r\r\t\tPROCEDURE Check(obj: CPT.Object);\r\t\tBEGIN\r\t\t\tIF obj # NIL THEN\r\t\t\t\tCheck(obj.left);\r\t\t\t\tIF (obj.num # setUsed) & (options.exported OR (obj.vis = internal) OR (obj.mode = Mod)) THEN\r\t\t\t\t\tCASE obj.mode OF\r\t\t\t\t\t| Var, VarPar, Fld:\r\t\t\t\t\t\tCASE obj.num OF\r\t\t\t\t\t\t| clean: DumpObj(obj); err2(neverUsed, obj.adr) \r\t\t\t\t\t\t(* | used: DumpObj(obj); err2(neverSet, obj.adr) *)\r\t\t\t\t\t\t| used: IF obj.name[0] # \"@\" THEN DumpObj(obj); err2(neverSet, obj.adr) END\r\t\t\t\t\t\t| usedSet: IF obj.mode # Fld THEN DumpObj(obj); err2(usedBSet, obj.adr) END\r\t\t\t\t\t\t| set: DumpObj(obj); err2(setBNUsed, obj.adr);\r\t\t\t\t\t\t| setUsedP: IF options.varpar & (obj.mode # Fld) THEN DumpObj(obj); err2(usedVarPar, obj.adr); END\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF obj.typ.strobj = NIL THEN CheckTyp(obj.typ) END\t(*x: RECORD ... END*)\r\t\t\t\t\t| Con, Typ: CASE obj.num OF set: DumpObj(obj); err2(neverUsed, obj.adr) END\r\t\t\t\t\t| LProc, XProc, CProc, IProc: CASE obj.num OF set: DumpObj(obj); err2(neverUsed, obj.adr) END\r\t\t\t\t\t| TProc:\t(* neverUsed not determinable for redefined methods because of dynamic binding *)\r\t\t\t\t\t\t(* IF ((obj.link.typ.form = Pointer) & (obj.link.typ.BaseTyp.BaseTyp = NIL) OR\r\t\t\t\t\t\t\t\t(* (obj.link.typ.comp = Record) & *) (obj.link.typ.BaseTyp = NIL)) & (obj.num = set) THEN*)\r\t\t\t\t\t\t(* BJ: Changed this IF to correct ABSTRACT and EMPTY procedures*)\r\t\t\t\t\t\tIF ~(absAttr IN obj.conval.setval) & ~(empAttr IN obj.conval.setval) &\r\t\t\t\t\t\t\t((obj.link.typ.form = Pointer) & (obj.link.typ.BaseTyp.BaseTyp = NIL) OR \r\t\t\t\t\t\t\t (obj.link.typ.BaseTyp = NIL)) & (obj.num = set) THEN \r\t\t\t\t\t\t\tDumpObj(obj); err2(neverUsed, obj.adr)\r\t\t\t\t\t\tEND\r\t\t\t\t\t| Mod: DumpObj(obj); err2(neverUsed, obj.adr)\r\t\t\t\t\tELSE\r\t\t\t\t\tEND\r\t\t\t\tEND;\t(*IF*)\r\t\t\t\tCASE obj.mode OF\r\t\t\t\t| LProc, XProc, IProc, TProc: CheckScope(obj.scope)\r\t\t\t\t| Typ:\r\t\t\t\t\tIF obj.typ.mno = 0 THEN\r\t\t\t\t\t\tCheckTyp(obj.typ)\t(* checking of fields and type bound procedures, only if not imported type! *)\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\tEND;\r\t\t\t\tCheck(obj.right)\r\t\t\tEND\r\t\tEND Check;\r\r\tBEGIN Check(scope.right)\r\tEND CheckScope;\r\r\tPROCEDURE CheckOuter;\t(*<< check outer scopes for obj with OPS.name*)\r\t\tVAR o: CPT.Object;\r\tBEGIN\r\t\tIF options.intermediate THEN\r\t\t\tCPT.Find(CPS.name, o);\r\t\t\tIF o # NIL THEN DumpObj(o); err2(outerScope, CPM.curpos) END\r\t\tEND\r\tEND CheckOuter;\r\r\tPROCEDURE UseType(obj: CPT.Object; pos: INTEGER);\t(*<< type obj gets used*)\r\tBEGIN\r\t\tIF (obj # NIL) & ((obj.vis = internal) OR options.exported) THEN\r\t\t\tIF options.intermediate & (obj.mnolev # level) & (obj.mnolev > 0) THEN\t(*mnolev > 0 -> intermediate*)\r\t\t\t\tDumpObj(obj); err2(interAcc, pos)\r\t\t\tEND;\r\t\t\tCASE obj.num OF clean, set: obj.num := setUsed\r\t\t\t| used, setUsed:\t(* used only for non-declarded type *)\r\t\t\tEND\r\t\tEND\r\tEND UseType;\r\r\tPROCEDURE UseObj(obj: CPT.Object; markUseBSet: BOOLEAN; pos: INTEGER);\t(*<< obj gets used *)\r\tBEGIN\r\t\tIF (obj # NIL) & (obj.mnolev >= 0) THEN\r\t\t\tIF options.intermediate & (obj.mnolev # level) & (obj.mnolev > 0) & (obj.mode < LProc) THEN\r\t\t\t\tDumpObj(obj); err2(interAcc, pos)\r\t\t\tEND;\r\t\t\tCASE obj.num OF\r\t\t\t| clean:\r\t\t\t\tIF (obj.mode = Con) OR (obj.mode # Fld) & (obj.mnolev # level) & ~options.levels THEN\r\t\t\t\t\tobj.num := setUsed\r\t\t\t\tELSE\r\t\t\t\t\tobj.num := used;\r\t\t\t\t\tIF markUseBSet & (obj.mode # SProc) & (obj.mode # Fld) & (obj.typ.form # Comp) THEN\r\t\t\t\t\t\tDumpObj(obj); err2(usedBSet, pos)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\t| set: obj.num := setUsed\r\t\t\tELSE (* already marked as being used *)\r\t\t\tEND\r\t\tEND\r\tEND UseObj;\r\r\tPROCEDURE SetObj(obj: CPT.Object; varPar: BOOLEAN; pos: INTEGER);\t(*<< var/proc/const/field obj gets set*)\r\tBEGIN\r\t\tIF (obj # NIL) & (obj.mnolev >= 0) THEN\r\t\t\tCASE obj.num OF\r\t\t\t| clean: IF varPar THEN obj.num := setUsedP ELSE obj.num := set END\r\t\t\t| used:\r\t\t\t\tIF varPar THEN obj.num := setUsedP\r\t\t\t\tELSIF (obj.mnolev = level) OR options.levels THEN obj.num := usedSet\r\t\t\t\tELSIF ~options.levels THEN obj.num := setUsed\r\t\t\t\tEND\r\t\t\t| usedSet, setUsed, setUsedP:\r\t\t\t| set: IF varPar THEN obj.num := setUsed END\r\t\t\tELSE DumpObj(obj); err2(loopVarSet, pos) (* for loop variable gets set!*)\r\t\t\tEND\r\t\tEND\r\tEND SetObj;\r\r\tPROCEDURE Selector(x: CPT.Node; assignment, varPar, markUseBSet: BOOLEAN; pos: INTEGER);\t(*<<*)\r\tBEGIN\t\t\r\t\tIF assignment THEN\r\t\t\tCASE x.class OF\r\t\t\t| Nvar, Nvarpar, Nfield:\r\t\t\t\tIF (x.class # Nfield) & options.intermediate & (x.obj.mnolev # level) & (x.obj.mnolev > 0) THEN\r\t\t\t\t\tDumpObj(x.obj); err2(interAcc, pos)\t(* assignment to intermediate *)\r\t\t\t\tEND;\r\t\t\t\tSetObj(x.obj, varPar, pos); x := x.left;\t(* assignment to b in {a.}b := ... *)\r\t\t\t| Nindex:\t(* assignment to b in {a.}b{[i]} := ... *)\r\t\t\t\tREPEAT x := x.left UNTIL x.class # Nindex;\r\t\t\t\tIF x.class IN {Nvar, Nvarpar, Nfield} THEN SetObj(x.obj, varPar, pos); x := x.left END\r\t\t\tELSE\r\t\t\tEND;\r\t\t\tWHILE (x # NIL) & (x.class IN {Nvar, Nvarpar, Nfield}) DO SetObj(x.obj, varPar, pos); x := x.left END \r\t\tEND;\r\t\tWHILE x # NIL DO\r\t\t\tIF x.class IN {Nvar, Nvarpar, Nfield, Nconst, Nproc} THEN UseObj(x.obj, markUseBSet, pos); END; \r\t\t\tx := x.left\r\t\tEND\r\tEND Selector;\r\r\tPROCEDURE qualident(VAR id: CPT.Object);\r\t\tVAR obj: CPT.Object; lev: BYTE; m: BOOLEAN;\r\tBEGIN (*sym = ident*)\r\t\tCPT.Find(CPS.name, obj); CPS.Get(sym);\r\t\tm := FALSE;\t(*<<*)\r\t\tIF (sym = period) & (obj # NIL) & (obj.mode = Mod) THEN\r\t\t\tobj.num := setUsed;\t(*<< module gets used (set by default) *)\r\t\t\tm := TRUE;\t(*<< it's a module! *)\r\t\t\tCPS.Get(sym);\r\t\t\tIF sym = ident THEN\r\t\t\t\tCPT.FindImport(CPS.name, obj, obj); CPS.Get(sym)\r\t\t\tELSE err(ident); obj := NIL\r\t\t\tEND\r\t\tEND ;\r\t\tIF obj = NIL THEN err(0);\r\t\t\tobj := CPT.NewObj(); obj.mode := Var; obj.typ := CPT.undftyp; obj.adr := 0\r\t\tELSE lev := obj.mnolev;\r\t\t\tIF (obj.mode IN {Var, VarPar}) & (lev # level) THEN\r\t\t\t\tobj.leaf := FALSE;\r\t\t\t\tIF lev > 0 THEN CPB.StaticLink(SHORT(SHORT(level-lev))"
                    attr: 0
                  - text: ", TRUE"
                    attr: 3
                  - text: ") END\t(* !!! *)\r\t\t\tEND\r\t\tEND ;\r\t\tIF m & (obj # NIL) THEN obj.num := setUsed END;\t(*<< imported obj get used always! *)\r\t\tid := obj\r\tEND qualident;\r\r\tPROCEDURE ConstExpression(VAR x: CPT.Node);\r\tBEGIN Expression(x);\r\t\tIF x.class # Nconst THEN\r\t\t\terr(50); x := CPB.NewIntConst(1) \r\t\tEND\r\tEND ConstExpression;\r\r\tPROCEDURE CheckMark(obj: CPT.Object);\t(* !!! *)\r\tBEGIN \r\t\tCPS.Get(sym);\r\t\tIF (sym = times) OR (sym = minus) THEN\r\t\t\tIF (level > 0) OR ~(obj.mode IN {Var, Fld, TProc}) & (sym = minus) THEN err(41) END ;\r\t\t\tIF sym = times THEN obj.vis := external ELSE obj.vis := externalR END ;\r\t\t\tCPS.Get(sym)\r\t\tELSE obj.vis := internal\r\t\tEND;\r\t\tIF (obj.mode IN {LProc, XProc, Var, Typ}) & (sym = lbrak) THEN\r\t\t\tCPS.Get(sym);\r\t\t\tIF sym = string THEN\r\t\t\t\tIF obj.conval = NIL THEN obj.conval := CPT.NewConst() END;\r\t\t\t\tIF CPS.str^ # \"\" THEN obj.conval.ext := CPS.str END;\r\t\t\t\tCPS.Get(sym);\r\t\t\t\tIF sym = comma THEN\r\t\t\t\t\tCPS.Get(sym);\r\t\t\t\t\tIF sym = string THEN\r\t\t\t\t\t\tIF obj.conval.ext # NIL THEN\r\t\t\t\t\t\t\tobj.conval.link := CPT.NewConst(); obj.conval.link.ext := obj.conval.ext\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tobj.conval.ext := NIL;\r\t\t\t\t\t\tIF CPS.str^ # \"\" THEN obj.conval.ext := CPS.str END;\r\t\t\t\t\t\tCPS.Get(sym)\r\t\t\t\t\tELSE err(string)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tELSE err(string)\r\t\t\tEND;\r\t\t\tCheckSym(rbrak);\r\t\t\tIF ~(CPM.interface IN CPM.options) THEN err(225) END\r\t\tEND\r\tEND CheckMark;\r\r\tPROCEDURE CheckSysFlag (VAR sysflag: SHORTINT;\r\t\t\t\t\t\t\t\t\t\tGetSF: PROCEDURE(IN id: ARRAY OF SHORTCHAR; num: SHORTINT; \r\t\t\t\t\t\t\t\t\t\tVAR flag: SHORTINT));\r\t\tVAR x: CPT.Object; i: SHORTINT;\r\tBEGIN\r\t\tsysflag := 0;\r\t\tIF sym = lbrak THEN\r\t\t\tCPS.Get(sym);\r\t\t\tWHILE (sym = number) OR (sym = ident) OR (sym = string) DO\r\t\t\t\tIF sym = number THEN\r\t\t\t\t\tIF CPS.numtyp = integer THEN\r\t\t\t\t\t\ti := SHORT(CPS.intval); GetSF(\"\", i, sysflag)\r\t\t\t\t\tELSE err(225)\r\t\t\t\t\tEND\r\t\t\t\tELSIF sym = ident THEN\r\t\t\t\t\tCPT.Find(CPS.name, x);\r\t\t\t\t\tIF (x # NIL) & (x.mode = Con) & (x.typ.form IN {Int8, Int16, Int32}) THEN \r\t\t\t\t\t\ti := SHORT(x.conval.intval); GetSF(\"\", i, sysflag)\r\t\t\t\t\tELSE\r\t\t\t\t\t\tGetSF(CPS.name, 0, sysflag)\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\t\tGetSF(CPS.str^, 0, sysflag)\r\t\t\t\tEND;\r\t\t\t\tCPS.Get(sym);\r\t\t\t\tIF (sym = comma) OR (sym = plus) THEN CPS.Get(sym) END\r\t\t\tEND;\r\t\t\tCheckSym(rbrak)\r\t\tEND\r\tEND CheckSysFlag;\r\t\r\tPROCEDURE Receiver(VAR mode, vis: BYTE; VAR name: CPT.Name; VAR typ, rec: CPT.Struct);\r\t\tVAR obj: CPT.Object;tname: CPT.String;\r\tBEGIN \r\t\ttyp := CPT.undftyp; rec := NIL; vis := 0;\r\t\tIF sym = var THEN CPS.Get(sym); mode := VarPar\r\t\tELSIF sym = in THEN CPS.Get(sym); mode := VarPar; vis := inPar\t(* ??? *)\r\t\tELSE mode := Var\r\t\tEND ;\r\t\tname := CPS.name; CheckSym(ident); CheckSym(colon);\r\t\tIF sym # ident THEN err(ident) END;\r\t\tType(typ, tname);\r\t\tIF tname = NIL THEN\r\t\t\tIF typ.form = Pointer THEN  rec := typ.BaseTyp ELSE rec := typ END;\r\t\t\tIF ~((mode = Var) & (typ.form = Pointer) & (rec.comp = Record) OR\r\t\t\t\t(mode = VarPar) & (typ.comp = Record)) THEN err(70); rec := NIL END;\r\t\t\tIF (rec # NIL) & (rec.mno # level) THEN err(72); rec := NIL END\r\t\tELSE err(0)\r\t\tEND;\r\t\tCheckSym(rparen);\r\t\tIF rec = NIL THEN rec := CPT.NewStr(Comp, Record); rec.BaseTyp := NIL END\r\tEND Receiver;\r\t\r\tPROCEDURE FormalParameters(VAR firstPar: CPT.Object; VAR resTyp: CPT.Struct; VAR name: CPT.String);\r\t\tVAR mode, vis: BYTE; sys: SHORTINT;\r\t\t\t\tpar, first, last, newPar, iidPar: CPT.Object; typ: CPT.Struct;\r\tBEGIN\r\t\tfirst := NIL; last := firstPar;\r\t\tnewPar := NIL; iidPar := NIL;\r\t\tIF (sym = ident) OR (sym = var) OR (sym = in) OR (sym = out) THEN\r\t\t\tLOOP\r\t\t\t\tsys := 0; vis := 0;\r\t\t\t\tIF sym = var THEN CPS.Get(sym); mode := VarPar"
                    attr: 0
                  - text: "\r"
                    attr: 3
                  - text: "\t\t\t\tELSIF sym = in THEN CPS.Get(sym); mode := VarPar; vis := inPar\r\t\t\t\tELSIF sym = out THEN CPS.Get(sym); mode := VarPar; vis := outPar\r\t\t\t\tELSE mode := Var\r\t\t\t\tEND ;\r\t\t\t\tIF mode = VarPar THEN "
                    attr: 0
                  - text: "CheckSysFlag(sys, "
                    attr: 3
                  - text: "CPM.GetVarParSysFlag) END;\r"
                    attr: 0
                  - text: "\t\t\t\t"
                    attr: 3
                  - text: "IF ODD(sys DIV inBit) THEN vis := inPar\r\t\t\t\tELSIF ODD(sys DIV outBit) THEN vis := outPar\r\t\t\t\tEND;\r\t\t\t\tIF ODD(sys DIV newBit) & (vis # outPar) THEN err(225)\r\t\t\t\tELSIF ODD(sys DIV iidBit) & (vis # inPar) THEN err(225)\r\t\t\t\tEND;\r\t\t\t\tLOOP\r\t\t\t\t\tIF sym = ident THEN\r\t\t\t\t\t\tCheckOuter;\t(*<<*)\r\t\t\t\t\t\tCPT.Insert(CPS.name, par); CPS.Get(sym);\r\t\t\t\t\t\tpar.adr := CPM.errpos;\t(*<<*)\r\t\t\t\t\t\tpar.mode := mode; par.link := NIL;"
                    attr: 0
                  - text: " "
                    attr: 3
                  - text: "par.vis := vis; "
                    attr: 0
                  - text: "par.sysflag := SHORT(sys);\r"
                    attr: 3
                  - text: "\t\t\t\t\t\tIF mode = VarPar THEN\t(*<< parameters are set, except for out parameters *)\r\t\t\t\t\t\t\tIF vis = inPar THEN par.num := setUsedP\r\t\t\t\t\t\t\tELSIF vis = outPar THEN\r\t\t\t\t\t\t\t\t(* out parameters are not initialized, except for pointers and procedure variables *)\r\t\t\t\t\t\t\t\tpar.num := clean\t\r\t\t\t\t\t\t\tELSE par.num := setUsed \r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tELSE \r\t\t\t\t\t\t\tpar.num := set\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF first = NIL THEN first := par END ;\r\t\t\t\t\t\tIF firstPar = NIL THEN firstPar := par ELSE last.link := par END ;\r\t\t\t\t\t\tlast := par;\r\t\t\t\t\tELSE err(ident)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF sym = comma THEN CPS.Get(sym)\r\t\t\t\t\tELSIF sym = ident THEN err(comma)\r\t\t\t\t\tELSIF sym = var THEN err(comma); CPS.Get(sym)\r\t\t\t\t\tELSE EXIT\r\t\t\t\t\tEND\r\t\t\t\tEND ;\r\t\t\t\tCheckSym(colon); Type(typ, name);\r\t\t\t\tIF mode # VarPar THEN CheckAlloc(typ, TRUE, CPM.errpos) END;\r\t\t\t\tIF (mode = VarPar) & (vis = inPar) & (typ.form # Undef) & (typ.form # Comp) & (typ.sysflag = 0) THEN\r\t\t\t\t\terr(177)\r\t\t\t\tEND;\r\t\t\t\t(* typ.pbused is set when parameter type name is parsed *)\r\t\t\t\tWHILE first # NIL DO\r\t\t\t\t\tSetType (NIL, first, typ, name);\r\t\t\t\t\tIF ODD(sys DIV newBit) THEN\r\t\t\t\t\t\tIF (newPar # NIL) OR (typ.form # Pointer) OR (typ.sysflag # interface) THEN err(168) END;\r\t\t\t\t\t\tnewPar := first\r\t\t\t\t\tELSIF ODD(sys DIV iidBit) THEN\r\t\t\t\t\t\tIF (iidPar # NIL) OR (typ # CPT.guidtyp) THEN err(168) END;\r\t\t\t\t\t\tiidPar := first\r\t\t\t\t\tEND;\r\t\t\t\t\tfirst := first.link\r\t\t\t\tEND;\r\t\t\t\tIF sym = semicolon THEN CPS.Get(sym)\r\t\t\t\tELSIF sym = ident THEN err(semicolon)\r\t\t\t\tELSE EXIT\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND;\r\t\tCheckSym(rparen);\r\t\tIF (newPar = NIL) # (iidPar = NIL) THEN err(168) END;\r\t\tname := NIL;\r\t\tIF sym = colon THEN\r\t\t\tCPS.Get(sym);\r\t\t\tType(resTyp, name);\r\t\t\tIF resTyp.form = Comp THEN resTyp := CPT.undftyp; err(54) END\r\t\tELSE resTyp := CPT.notyp\r\t\tEND\r\tEND FormalParameters;\r\t\r\tPROCEDURE CheckOverwrite (proc, base: CPT.Object; rec: CPT.Struct);\r\t\tVAR o, bo: CPT.Object;\r\tBEGIN\r\t\tIF base # NIL THEN\r\t\t\tIF base.conval.setval * {absAttr, empAttr, extAttr} = {} THEN err(182) END;\r\t\t\tIF (proc.link.mode # base.link.mode) OR (proc.link.vis # base.link.vis)\r\t\t\t\tOR ~CPT.Extends(proc.link.typ, base.link.typ) THEN err(115) END;\r\t\t\to := proc.link; bo := base.link;\r\t\t\tWHILE (o # NIL) & (bo # NIL) DO\r\t\t\t\tIF (bo.sysflag # 0) & (o.sysflag = 0) THEN\t(* propagate sysflags *)\r\t\t\t\t\to.sysflag := bo.sysflag\r\t\t\t\tEND;\r\t\t\t\to := o.link; bo := bo.link\r\t\t\tEND;\r\t\t\tCPB.CheckParameters(proc.link.link, base.link.link, FALSE);\r\t\t\tIF ~CPT.Extends(proc.typ, base.typ) THEN err(117) END;\r\t\t\tIF (base.vis # proc.vis) & ((proc.vis # internal) OR rec.exp) THEN err(183) END;\r\t\t\tINCL(proc.conval.setval, isRedef)\r\t\tEND\r\tEND CheckOverwrite;\r\r\tPROCEDURE GetAttributes (proc, base: CPT.Object; owner: CPT.Struct);\t"
                    attr: 0
                  - text: "(* read method attributes *)"
                    attr: 1
                  - text: "\r\t\tVAR attr, battr: SET; o: CPT.Object;\r\tBEGIN\r\t\tattr := {};\r\t\tIF sym = comma THEN\t"
                    attr: 0
                  - text: "(* read attributes *)"
                    attr: 1
                  - text: "\r\t\t\tCPS.Get(sym);\r\t\t\tIF sym = ident THEN\r\t\t\t\tCPT.Find(CPS.name, o);\r\t\t\t\tIF (o # NIL) & (o.mode = SProc) & (o.adr = newfn) THEN\r\t\t\t\t\tIF ~(CPM.oberon IN CPM.options) THEN INCL(attr, newAttr) ELSE err(178) END;\r\t\t\t\t\tCPS.Get(sym);\r\t\t\t\t\tIF sym = comma THEN\r\t\t\t\t\t\tCPS.Get(sym);\r\t\t\t\t\t\tIF sym = ident THEN CPT.Find(CPS.name, o) ELSE o := NIL; err(ident) END\r\t\t\t\t\tELSE o := NIL\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tIF o # NIL THEN\r\t\t\t\t\tIF (o.mode # Attr) OR (o.adr = limAttr) OR (CPM.oberon IN CPM.options) THEN err(178)\r\t\t\t\t\tELSE INCL(attr, o.adr)\r\t\t\t\t\tEND;\r\t\t\t\t\tCPS.Get(sym)\r\t\t\t\tEND\r\t\t\tELSE err(ident)\r\t\t\tEND\r\t\tEND;\r\t\tIF (base = NIL) & ~(newAttr IN attr) THEN err(185); INCL(attr, newAttr)\r\t\tELSIF (base # NIL) & (newAttr IN attr) THEN err(186)\r\t\tEND;\r\t\tIF (owner.attribute # absAttr) & (absAttr IN attr) THEN err(190) END;\r\t\tIF (owner.attribute = 0) OR (owner.attribute = limAttr) THEN\r\t\t\tIF (empAttr IN attr) & (newAttr IN attr) THEN err(187)\r\t\t\tELSIF extAttr IN attr THEN err(188)\r\t\t\tEND\r\t\tEND;\r\t\tIF base # NIL THEN\r\t\t\tbattr := base.conval.setval;\r\t\t\tIF empAttr IN battr THEN\r\t\t\t\tIF absAttr IN attr THEN err(189) END\r\t\t\tELSIF ~(absAttr IN battr) THEN\r\t\t\t\tIF (absAttr IN attr) OR (empAttr IN attr) THEN err(189) END\r\t\t\tEND\r\t\tEND;\r\t\tIF empAttr IN attr THEN\r\t\t\tIF proc.typ # CPT.notyp THEN err(195)\r\t\t\tELSE\r\t\t\t\to := proc.link; WHILE (o # NIL) & (o.vis # outPar) DO o := o.link END;\r\t\t\t\tIF o # NIL THEN err(195) END\r\t\t\tEND\r\t\tEND;\r\t\tIF (owner.sysflag = interface) & ~(absAttr IN attr) THEN err(162) END;\r\t\tproc.conval.setval := attr\r\tEND GetAttributes;\r\t\r\tPROCEDURE RecordType(VAR typ: CPT.Struct; attr: CPT.Object);\r\t\tVAR fld, first, last: CPT.Object; r: Elem; ftyp: CPT.Struct; name: CPT.String;\r\tBEGIN typ := CPT.NewStr(Comp, Record); typ.BaseTyp := NIL;\r\t\tCheckSysFlag(typ.sysflag, CPM.GetRecordSysFlag);\r\t\tIF attr # NIL THEN\r\t\t\tIF ~(CPM.oberon IN CPM.options) & (attr.adr # empAttr) THEN typ.attribute := SHORT(SHORT(attr.adr))\r\t\t\tELSE err(178)\r\t\t\tEND\r\t\tEND;\r\t\tIF typ.sysflag = interface THEN\r\t\t\tIF (CPS.str # NIL) & (CPS.str[0] = \"{\") THEN typ.ext := CPS.str END;\r\t\t\tIF typ.attribute # absAttr THEN err(163) END;\r\t\t\tIF sym # lparen THEN err(160) END\r\t\tEND;\r\t\tIF sym = lparen THEN\r\t\t\tCPS.Get(sym); (*record extension*)\r\t\t\tIF sym = ident THEN\r\t\t\t\tType(ftyp, name);\r\t\t\t\tIF ftyp.form = Pointer THEN ftyp := ftyp.BaseTyp END;\r\t\t\t\tSetType(typ, NIL, ftyp, name);\r\t\t\t\tIF (ftyp.comp = Record) & (ftyp # CPT.anytyp) THEN\r\t\t\t\t\tftyp.pvused := TRUE; typ.extlev := SHORT(SHORT(ftyp.extlev + 1));\r\t\t\t\t\tCPM.PropagateRecordSysFlag(ftyp.sysflag, typ.sysflag);\r\t\t\t\t\tIF (ftyp.attribute = 0) OR (ftyp.attribute = limAttr) & (ftyp.mno # 0) THEN err(181)\r\t\t\t\t\tELSIF (typ.attribute = absAttr) & (ftyp.attribute # absAttr) THEN err(191)\r\t\t\t\t\tELSIF (ftyp.attribute = limAttr) & (typ.attribute # limAttr) THEN err(197)\r\t\t\t\t\tEND\r\t\t\t\tELSIF ftyp # CPT.undftyp THEN err(53)\r\t\t\t\tEND\r\t\t\tELSE err(ident)\r\t\t\tEND ;\r\t\t\tIF typ.attribute # absAttr THEN\t"
                    attr: 0
                  - text: "(* save typ for unimplemented method check *)"
                    attr: 1
                  - text: "\r\t\t\t\tNEW(r); r.struct := typ; r.pos := CPM.errpos; r.next := recList; recList := r\r\t\t\tEND;\r\t\t\tCheckSym(rparen)\r\t\tEND;\r(*\r\t\tCPT.OpenScope(0, NIL);\r*)\r\t\tfirst := NIL; last := NIL;\r\t\tLOOP\r\t\t\tIF sym = ident THEN\r\t\t\t\tLOOP\r\t\t\t\t\tIF sym = ident THEN\r\t\t\t\t\t\tIF (typ.BaseTyp # NIL) & (typ.BaseTyp # CPT.undftyp) THEN\r\t\t\t\t\t\t\tCPT.FindBaseField(CPS.name, typ, fld);\r\t\t\t\t\t\t\tIF fld # NIL THEN err(1) END\r\t\t\t\t\t\tEND ;\r\t\t\t\t\t\tCPT.FindField(CPS.name, typ, fld);\t(* not needed with actual CPT *)\r\t\t\t\t\t\tIF fld # NIL THEN err(1) END;\r\t\t\t\t\t\tCPT.InsertField(CPS.name, typ, fld);\r\t\t\t\t\t\tfld.mode := Fld; fld.link := NIL; fld.typ := CPT.undftyp;\r\t\t\t\t\t\tCheckMark(fld);\r\t\t\t\t\t\tfld.adr := CPM.errpos; fld.num := clean;\t(*<<*)\r\t\t\t\t\t\tIF first = NIL THEN first := fld END ;\r\t\t\t\t\t\tIF last = NIL THEN typ.link := fld ELSE last.link := fld END ;\r\t\t\t\t\t\tlast := fld\r\t\t\t\t\tELSE err(ident)\r\t\t\t\t\tEND ;\r\t\t\t\t\tIF sym = comma THEN CPS.Get(sym)\r\t\t\t\t\tELSIF sym = ident THEN err(comma)\r\t\t\t\t\tELSE EXIT\r\t\t\t\t\tEND\r\t\t\t\tEND ;\r\t\t\t\tCheckSym(colon); Type(ftyp, name);\r\t\t\t\tCheckAlloc(ftyp, FALSE, CPM.errpos);\r\t\t\t\tWHILE first # NIL DO\r\t\t\t\t\tSetType(typ, first, ftyp, name); first := first.link\r\t\t\t\tEND;\r\t\t\t\tIF typ.sysflag = interface THEN err(161) END\r\t\t\tEND;\r\t\t\tIF sym = semicolon THEN CPS.Get(sym);\r\t\t\t\tIF ((sym = end) OR (sym = semicolon)) & options.semicolons THEN\t(*<< superfluous semicolon *)\r\t\t\t\t\terr2(semicolons, CPM.errpos)\r\t\t\t\tEND\r\t\t\tELSIF sym = ident THEN err(semicolon)\r\t\t\tELSE EXIT\r\t\t\tEND\r\t\tEND;\r(*\r\t"
                    attr: 0
                  - text: "\tIF typ.link # NIL THEN ASSERT(typ.link = CPT.topScope.right) END;"
                    attr: 3
                  - text: "\r\t\ttyp.link := CPT.topScope.right; CPT.CloseScope;\r*)\r\t\ttyp.untagged := typ.sysflag # 0;\r\t\tCPB.Inittd(TDinit, lastTDinit, typ); CheckSym(end)\r\tEND RecordType;\r\r\tPROCEDURE ArrayType(VAR typ: CPT.Struct);\r\t\tVAR x: CPT.Node; n: INTEGER; sysflag: SHORTINT; name: CPT.String;\r\tBEGIN CheckSysFlag(sysflag, CPM.GetArraySysFlag);\r\t\tIF sym = of THEN\t(*dynamic array*)\r\t\t\ttyp := CPT.NewStr(Comp, DynArr); typ.mno := 0; typ.sysflag := sysflag;\r\t\t\tCPS.Get(sym); Type(typ.BaseTyp, name); SetType(typ, NIL, typ.BaseTyp, name);\r\t\t\tCheckAlloc(typ.BaseTyp, TRUE, CPM.errpos);\r\t\t\tIF typ.BaseTyp.comp = DynArr THEN typ.n := typ.BaseTyp.n + 1 ELSE typ.n := 0 END\r\t\tELSE\r\t\t\ttyp := CPT.NewStr(Comp, Array); typ.sysflag := sysflag; ConstExpression(x);\r\t\t\tIF x.typ.form IN {Int8, Int16, Int32} THEN n := x.conval.intval;\r\t\t\t\tIF (n <= 0) OR (n > CPM.MaxIndex) THEN err(63); n := 1 END\r\t\t\tELSE err(42); n := 1\r\t\t\tEND ;\r\t\t\ttyp.n := n;\r\t\t\tIF sym = of THEN\r\t\t\t\tCPS.Get(sym); Type(typ.BaseTyp, name); SetType(typ, NIL, typ.BaseTyp, name);\r\t\t\t\tCheckAlloc(typ.BaseTyp, FALSE, CPM.errpos)\r\t\t\tELSIF sym = comma THEN\r\t\t\t\tCPS.Get(sym);\r\t\t\t\tIF sym # of THEN ArrayType(typ.BaseTyp) END\r\t\t\tELSE err(35)\r\t\t\tEND\r\t\tEND;\r\t\ttyp.untagged := typ.sysflag # 0\r\tEND ArrayType;\r\r\tPROCEDURE PointerType(VAR typ: CPT.Struct);\r\t\tVAR name: CPT.String;\r\tBEGIN typ := CPT.NewStr(Pointer, Basic); CheckSysFlag(typ.sysflag, CPM.GetPointerSysFlag);\r\t\tCheckSym(to);\r\t\tType(typ.BaseTyp, name);\r\t\tSetType(typ, NIL, typ.BaseTyp, name);\r\t\tIF (typ.BaseTyp # CPT.undftyp) & (typ.BaseTyp.comp = Basic) THEN\r\t\t\ttyp.BaseTyp := CPT.undftyp; err(57)\r\t\tEND;\r\t\tIF typ.BaseTyp.comp = Record THEN CPM.PropagateRecPtrSysFlag(typ.BaseTyp.sysflag, typ.sysflag)\r\t\tELSIF typ.BaseTyp.comp IN {Array, DynArr} THEN CPM.PropagateArrPtrSysFlag(typ.BaseTyp.sysflag, typ.sysflag)\r\t\tEND;\r\t\ttyp.untagged := typ.sysflag # 0\r\tEND PointerType;\r\t\r\tPROCEDURE Type (VAR typ: CPT.Struct; VAR name: CPT.String);\t"
                    attr: 0
                  - text: "(* name # NIL => forward reference *)"
                    attr: 1
                  - text: "\r\t\tVAR id: CPT.Object; tname: CPT.String;\r\tBEGIN\r\t\ttyp := CPT.undftyp; name := NIL;\r\t\tIF sym < lparen THEN err(12);\r\t\t\tREPEAT CPS.Get(sym) UNTIL sym >= lparen\r\t\tEND ;\r\t\tIF sym = ident THEN\r\t\t\tCPT.Find(CPS.name, id);\r\t\t\tIF (id = NIL) OR (id.mode = -1) OR (id.mode = Typ) & IncompleteType(id.typ) THEN\t"
                    attr: 0
                  - text: "(* forward type definition *)"
                    attr: 1
                  - text: "\r\t\t\t\tname := CPT.NewName(CPS.name); CPS.Get(sym);\r\t\t\t\tIF (id = NIL) & (sym = period) THEN\t"
                    attr: 0
                  - text: "(* missing module *)"
                    attr: 1
                  - text: "\r\t\t\t\t\terr(0); CPS.Get(sym); name := NIL;\r\t\t\t\t\tIF sym = ident THEN CPS.Get(sym) END\r\t\t\t\tELSIF sym = record THEN\t"
                    attr: 0
                  - text: "(* wrong attribute *)"
                    attr: 1
                  - text: "\r\t\t\t\t\terr(178); CPS.Get(sym); name := NIL; RecordType(typ, NIL)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tqualident(id);\r\t\t\t\tUseType(id, CPM.errpos);\t(*<< type gets used*)\r\t\t\t\tIF id.mode = Typ THEN\r\t\t\t\t\tIF ~(CPM.oberon IN CPM.options)\r\t\t\t\t\t\t& ((id.typ = CPT.lreal64typ) OR (id.typ = CPT.lint64typ) OR (id.typ = CPT.lchar16typ)) THEN err(198) END;\r\t\t\t\t\ttyp := id.typ\r\t\t\t\tELSIF id.mode = Attr THEN\r\t\t\t\t\tIF sym = record THEN\r\t\t\t\t\t\tCPS.Get(sym); RecordType(typ, id)\r\t\t\t\t\tELSE err(12)\r\t\t\t\t\tEND\r\t\t\t\tELSE err(52)\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSIF sym = array THEN\r\t\t\tCPS.Get(sym); ArrayType(typ)\r\t\tELSIF sym = record THEN\r\t\t\tCPS.Get(sym); RecordType(typ, NIL)\r\t\tELSIF sym = pointer THEN\r\t\t\tCPS.Get(sym); PointerType(typ)\r\t\tELSIF sym = procedure THEN\r\t\t\tCPS.Get(sym); typ := CPT.NewStr(ProcTyp, Basic);\r(*\r\t\t\tCheckSysFlag(typ.sysflag, CPM.GetProcTypSysFlag);\r\t\t\ttyp.untagged := typ.sysflag # 0;\r*)\r\t\t\tIF sym = lparen THEN\r\t\t\t\tCPS.Get(sym); CPT.OpenScope(level, NIL);\r\t\t\t\tFormalParameters(typ.link, typ.BaseTyp, tname); SetType(typ, NIL, typ.BaseTyp, tname); CPT.CloseScope\r\t\t\tELSE typ.BaseTyp := CPT.notyp; typ.link := NIL\r\t\t\tEND\r\t\tELSE err(12)\r\t\tEND ;\r\t\tLOOP\r\t\t\tIF (sym >= semicolon) & (sym <= else) OR (sym = rparen) OR (sym = eof)\r\t\t\t\tOR (sym = number) OR (sym = comma) THEN EXIT END;\r\t\t\terr(15); IF sym = ident THEN EXIT END;\r\t\t\tCPS.Get(sym)\r\t\tEND\r\tEND Type;\r\t\r\tPROCEDURE ^ selector(VAR x: CPT.Node);\r\tPROCEDURE ^ StandProcCall(VAR x: CPT.Node);\r\t\r\tPROCEDURE ActualParameters(VAR aparlist: CPT.Node; fpar: CPT.Object; VAR pre, lastp: CPT.Node);\r\t\tVAR apar, last, newPar, iidPar, n: CPT.Node; id: CPT.Object; moreThan1: BOOLEAN;\t(*<< id, moreThan1 *)\r\tBEGIN\r\t\taparlist := NIL; last := NIL;\r\t\tIF sym # rparen THEN\r\t\t\tmoreThan1 := (fpar # NIL) & (fpar.link # NIL);\t(*<<*)\r\t\t\tnewPar := NIL; iidPar := NIL;\r\t\t\tLOOP\r\t\t\t\t(*<< Expression(apar)\told code *)\r\t\t\t\tIF sym # nil THEN\r\t\t\t\t\tIF (fpar # NIL) & (fpar.mode = VarPar) & (fpar.vis # inPar) THEN\t(*<<*)\r\t\t\t\t\t\tqualident(id); apar := CPB.NewLeaf(id); selector(apar);\r\t\t\t\t\t\tIF (apar.class = Nproc) & (apar.obj.mode = SProc) & (apar.obj.adr = valfn) THEN\r\t\t\t\t\t\t\tStandProcCall(apar)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tSelector(apar, SelAssign, SelVarPar, SelUseBSet, CPM.errpos)\r\t\t\t\t\tELSE\t(*<<*)\r\t\t\t\t\t\tExpression(apar);\r\t\t\t\t\t\tIF options.sideEffects & moreThan1 & (apar.class = Ncall) THEN\r\t\t\t\t\t\t\t(*<< proc-calls in param-list: code might depend on evaluation sequence (if more than one param.) *)\r\t\t\t\t\t\t\terr2(evaluationSeq, CPM.errpos)\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND;\r\t\t\t\t\tIF fpar # NIL THEN\r\t\t\t\t\t\tIF (apar.typ.form = Pointer) & (fpar.typ.form = Comp) THEN CPB.DeRef(apar) END;\r\t\t\t\t\t\tCPB.Param(apar, fpar);\r\t\t\t\t\t\tIF fpar.mode = Var THEN CPB.CheckBuffering(apar, NIL, fpar, pre, lastp) END;\r\t\t\t\t\t\tCPB.Link(aparlist, last, apar);\r\t\t\t\t\t\tIF ODD(fpar.sysflag DIV newBit) THEN newPar := apar\r\t\t\t\t\t\tELSIF ODD(fpar.sysflag DIV iidBit) THEN iidPar := apar\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF (newPar # NIL) & (iidPar # NIL) THEN CPB.CheckNewParamPair(newPar, iidPar) END;\r\t\t\t\t\t\tfpar := fpar.link\r\t\t\t\t\tELSE err(64)\r\t\t\t\t\tEND;\r\t\t\t\tELSE\r\t\t\t\t\t fpar := fpar.link; CPS.Get(sym) \r\t\t\t\tEND;\r\t\t\t\tIF sym = comma THEN CPS.Get(sym)\r\t\t\t\tELSIF (lparen <= sym) & (sym <= ident) THEN err(comma)\r\t\t\t\tELSE EXIT\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND;\r\t\tIF fpar # NIL THEN err(65) END\r\tEND ActualParameters;\r\r\tPROCEDURE selector(VAR x: CPT.Node);\r\t\tVAR obj, proc, fpar: CPT.Object; y, apar, pre, lastp: CPT.Node; typ: CPT.Struct; name: CPT.Name;\r\tBEGIN\r\t\tLOOP\r\t\t\tIF sym = lbrak THEN CPS.Get(sym);\r\t\t\t\tLOOP\r\t\t\t\t\tIF (x.typ # NIL) & (x.typ.form = Pointer) THEN CPB.DeRef(x) END ;\r\t\t\t\t\tExpression(y); CPB.Index(x, y);\r\t\t\t\t\tIF sym = comma THEN CPS.Get(sym) ELSE EXIT END\r\t\t\t\tEND ;\r\t\t\t\tCheckSym(rbrak)\r\t\t\tELSIF sym = period THEN \r\t\t\t\tCPS.Get(sym);\r\t\t\t\tIF sym = ident THEN name := CPS.name; CPS.Get(sym);\r\t\t\t\t\tIF x.typ # NIL THEN\r\t\t\t\t\t\tIF x.typ.form = Pointer THEN \r\t\t\t\t\t\t\t\tIF x.obj # NIL THEN UseObj(x.obj, TRUE, x.obj.adr) END;\r\t\t\t\t\t\t\t\tCPB.DeRef(x) \r\t\t\t\t\t\tEND ;\r\t\t\t\t\t\tIF x.typ.comp = Record THEN\r\t\t\t\t\t\t\ttyp := x.typ; CPT.FindField(name, typ, obj); CPB.Field(x, obj);\r\t\t\t\t\t\t\tIF (obj # NIL) & (obj.mode = TProc) THEN\r\t\t\t\t\t\t\t\tIF sym = arrow THEN  (* super call *) CPS.Get(sym);\r\t\t\t\t\t\t\t\t\ty := x.left;\r\t\t\t\t\t\t\t\t\tIF y.class = Nderef THEN y := y.left END ;\t(* y = record variable *)\r\t\t\t\t\t\t\t\t\tIF y.obj # NIL THEN\r\t\t\t\t\t\t\t\t\t\tproc := CPT.topScope;\t(* find innermost scope which owner is a TProc *)\r\t\t\t\t\t\t\t\t\t\tWHILE (proc.link # NIL) & (proc.link.mode # TProc) DO proc := proc.left END ;\r\t\t\t\t\t\t\t\t\t\tIF (proc.link = NIL) OR (proc.link.link # y.obj) THEN err(75) END ;\r\t\t\t\t\t\t\t\t\t\ttyp := y.obj.typ;\r\t\t\t\t\t\t\t\t\t\tIF typ.form = Pointer THEN typ := typ.BaseTyp END ;\r\t\t\t\t\t\t\t\t\t\tCPT.FindBaseField(x.obj.name^, typ, proc);\r\t\t\t\t\t\t\t\t\t\tIF proc # NIL THEN x.subcl := super;\r\t\t\t\t\t\t\t\t\t\t\tUseObj(proc, TRUE, proc.adr);\t(*<< touch super proc*)\r\t\t\t\t\t\t\t\t\t\t\tIF proc.conval.setval * {absAttr, empAttr} # {} THEN err(194) END\r\t\t\t\t\t\t\t\t\t\tELSE err(74)\r\t\t\t\t\t\t\t\t\t\tEND\r\t\t\t\t\t\t\t\t\tELSE err(75)\r\t\t\t\t\t\t\t\t\tEND\r\t\t\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\t\t\tUseObj(obj, TRUE, obj.adr);\t(*<< touch obj only if not super call! *)\r\t\t\t\t\t\t\t\t\tproc := obj;\r\t\t\t\t\t\t\t\t\tWHILE (proc.mnolev >= 0) & ~(newAttr IN proc.conval.setval) & (typ.BaseTyp # NIL) DO\r\t\t\t\t\t\t\t\t\t\t(* find base method *)\r\t\t\t\t\t\t\t\t\t\ttyp := typ.BaseTyp; CPT.FindField(name, typ, proc);\r\t\t\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\t\t\tIF (proc.vis = externalR) & (proc.mnolev < 0) THEN err(196) END;\r\t\t\t\t\t\t\t\tEND ;\r\t\t\t\t\t\t\t\tIF (obj.typ # CPT.notyp) & (sym # lparen) THEN err(lparen) END\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tELSE err(53)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE err(52)\r\t\t\t\t\tEND\r\t\t\t\tELSE err(ident)\r\t\t\t\tEND\r\t\t\tELSIF sym = arrow THEN CPS.Get(sym); CPB.DeRef(x)\r\t\t\tELSIF sym = dollar THEN\r\t\t\t\tIF x.typ.form = Pointer THEN CPB.DeRef(x) END;\r\t\t\t\tCPS.Get(sym); CPB.StrDeref(x)\r\t\t\tELSIF sym = lparen THEN\r\t\t\t\tIF (x.obj # NIL) & (x.obj.mode IN {XProc, LProc, CProc, TProc}) THEN typ := x.obj.typ\r\t\t\t\tELSIF x.typ.form = ProcTyp THEN typ := x.typ.BaseTyp\r\t\t\t\tELSIF x.class = Nproc THEN "
                    attr: 0
                  - text: EXIT
                    attr: 3
                  - text: "\t(* standard procedure *)\r\t\t\t\tELSE typ := NIL\r\t\t\t\tEND;\r\t\t\t\tIF typ # CPT.notyp THEN\r\t\t\t\t\tCPS.Get(sym);\r\t\t\t\t\tIF typ = NIL THEN\t(* type guard *)\r\t\t\t\t\t\tIF sym = ident THEN\r\t\t\t\t\t\t\tqualident(obj);\r\t\t\t\t\t\t\tIF obj.mode = Typ THEN CPB.TypTest(x, obj, TRUE);\r\t\t\t\t\t\t\t\tUseType(obj, CPM.errpos)\t(*<< type gets used*)\r\t\t\t\t\t\t\tELSE err(52)\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tELSE err(ident)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE\t(* function call *)\r\t\t\t\t\t\tpre := NIL; lastp := NIL;\r\t\t\t\t\t\tCPB.PrepCall(x, fpar);\r\t\t\t\t\t\tIF (x.obj # NIL) & (x.obj.mode = TProc) THEN CPB.CheckBuffering(x.left, NIL, x.obj.link, pre, lastp) END;\r\t\t\t\t\t\tActualParameters(apar, fpar, pre, lastp);\r\t\t\t\t\t\tCPB.Call(x, apar, fpar);\r\t\t\t\t\t\tIF pre # NIL THEN CPB.Construct(Ncomp, pre, x); pre.typ := x.typ; x := pre END;\r\t\t\t\t\t\tIF level > 0 THEN CPT.topScope.link.leaf := FALSE END\r\t\t\t\t\tEND;\r\t\t\t\t\tCheckSym(rparen)\r\t\t\t\tELSE "
                    attr: 0
                  - text: EXIT
                    attr: 3
                  - text: "\r\t\t\t\tEND\r(*\r\t\t\tELSIF (sym = lparen) & (x.class # Nproc) & (x.typ.form # ProcTyp) &\r\t\t\t\t\t((x.obj = NIL) OR (x.obj.mode # TProc)) THEN\r\t\t\t\tCPS.Get(sym);\r\t\t\t\tIF sym = ident THEN\r\t\t\t\t\tqualident(obj);\r\t\t\t\t\tIF obj.mode = Typ THEN CPB.TypTest(x, obj, TRUE)\r\t\t\t\t\tELSE err(52)\r\t\t\t\t\tEND\r\t\t\t\tELSE err(ident)\r\t\t\t\tEND ;\r\t\t\t\tCheckSym(rparen)\r*)\r\t\t\tELSE "
                    attr: 0
                  - text: EXIT
                    attr: 3
                  - text: "\r\t\t\tEND\r\t\tEND\r\tEND selector;\r\r\tPROCEDURE StandProcCall(VAR x: CPT.Node);\r\t\tVAR y: CPT.Node; m: BYTE; n: SHORTINT; id: CPT.Object;\t(*<< id *)\r\tBEGIN \r\t\tm := SHORT(SHORT(x.obj.adr)); n := 0;\r\t\tIF sym = lparen THEN CPS.Get(sym);\r\t\t\tIF sym # rparen THEN\r\t\t\t\tLOOP\r\t\t\t\t\tIF n = 0 THEN\r\t\t\t\t\t\t(*<< Expression(x);\told code *)\r\t\t\t\t\t\tCASE m OF\t(*<<*)\r\t\t\t\t\t\t| newfn, sysnewfn:\t(* id will be set by NEW => varPar = FALSE *)\r\t\t\t\t\t\t\tqualident(id); x := CPB.NewLeaf(id); selector(x);\r\t\t\t\t\t\t\tIF (x.class = Nproc) & (x.obj.mode = SProc) & (x.obj.adr = valfn) THEN StandProcCall(x) END;\r\t\t\t\t\t\t\tSelector(x, SelAssign, SelNoVarPar, SelUseBSet, CPM.errpos)\r\t\t\t\t\t\t| incfn, decfn, inclfn, exclfn:\t(* id will be used and then set *)\r\t\t\t\t\t\t\tqualident(id); x := CPB.NewLeaf(id); selector(x);\r\t\t\t\t\t\t\tIF (x.class = Nproc) & (x.obj.mode = SProc) & (x.obj.adr = valfn) THEN StandProcCall(x) END;\r\t\t\t\t\t\t\tSelector(x, SelNoAssign, SelNoVarPar, SelUseBSet, CPM.errpos);\t(* use *)\r\t\t\t\t\t\t\tSelector(x, SelAssign, SelNoVarPar, SelUseBSet, CPM.errpos)\t(* set *)\r\t\t\t\t\t\t| adrfn:\r\t\t\t\t\t\t\tIF sym = ident THEN\t(* no usedBSet message if ADR(id) *)\r\t\t\t\t\t\t\t\tqualident(id); x := CPB.NewLeaf(id); selector(x);\r\t\t\t\t\t\t\t\tSelector(x, SelNoAssign, SelNoVarPar, SelNoUseBSet, CPM.errpos)\r\t\t\t\t\t\t\tELSE \r\t\t\t\t\t\t\t\tExpression(x);\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\t| lenfn:\r\t\t\t\t\t\t\tqualident(id); x := CPB.NewLeaf(id); selector(x);\r\t\t\t\t\t\t\t(* no usedBSet message if LEN(id) *)\r\t\t\t\t\t\t\tSelector(x, SelNoAssign, SelNoVarPar, SelNoUseBSet, CPM.errpos)\t\r\t\t\t\t\t\tELSE Expression(x)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tCPB.StPar0(x, m); n := 1\r\t\t\t\t\tELSIF n = 1 THEN\r\t\t\t\t\t\t(*<< Expression(y);\told code *)\r\t\t\t\t\t\tIF m IN {getfn, getrfn} THEN\t(*<< id will be set by GET, GETREG => varPar = FALSE *)\r\t\t\t\t\t\t\tqualident(id); y := CPB.NewLeaf(id); selector(y);\r\t\t\t\t\t\t\tIF (y.class = Nproc) & (y.obj.mode = SProc) & (y.obj.adr = valfn) THEN StandProcCall(y) END;\r\t\t\t\t\t\t\tSelector(y, SelAssign, SelNoVarPar, SelUseBSet, CPM.errpos)\r\t\t\t\t\t\tELSE Expression(y)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tCPB.StPar1(x, y, m); n := 2\r\t\t\t\t\tELSE Expression(y); CPB.StParN(x, y, m, n); INC(n)\r\t\t\t\t\tEND ;\r\t\t\t\t\tIF sym = comma THEN CPS.Get(sym)\r\t\t\t\t\tELSIF (lparen <= sym) & (sym <= ident) THEN err(comma)\r\t\t\t\t\tELSE EXIT\r\t\t\t\t\tEND\r\t\t\t\tEND ;\r\t\t\t\tCheckSym(rparen)\r\t\t\tELSE CPS.Get(sym)\r\t\t\tEND ;\r\t\t\tCPB.StFct(x, m, n)\r\t\tELSE err(lparen)\r\t\tEND ;\r\t\tIF (level > 0) & ((m = newfn) OR (m = sysnewfn)) THEN CPT.topScope.link.leaf := FALSE END\r\tEND StandProcCall;\r\t\r\tPROCEDURE Element(VAR x: CPT.Node);\r\t\tVAR y: CPT.Node;\r\tBEGIN Expression(x);\r\t\tIF sym = upto THEN\r\t\t\tCPS.Get(sym); Expression(y); CPB.SetRange(x, y)\r\t\tELSE CPB.SetElem(x)\r\t\tEND\r\tEND Element;\r\r\tPROCEDURE Sets(VAR x: CPT.Node);\r\t\tVAR y: CPT.Node;\r\tBEGIN\r\t\tIF sym # rbrace THEN\r\t\t\tElement(x);\r\t\t\tLOOP\r\t\t\t\tIF sym = comma THEN CPS.Get(sym)\r\t\t\t\tELSIF (lparen <= sym) & (sym <= ident) THEN err(comma)\r\t\t\t\tELSE EXIT\r\t\t\t\tEND ;\r\t\t\t\tElement(y); CPB.Op(plus, x, y)\r\t\t\tEND\r\t\tELSE x := CPB.EmptySet()\r\t\tEND ;\r\t\tCheckSym(rbrace)\r\tEND Sets;\r\t\r\tPROCEDURE Factor(VAR x: CPT.Node);\r\t\tVAR id: CPT.Object; pos: INTEGER;\t(*<< pos *)\r\tBEGIN\r\t\tIF sym < not THEN err(13);\r\t\t\tREPEAT CPS.Get(sym) UNTIL sym >= lparen\r\t\tEND ;\r\t\tIF sym = ident THEN\r\t\t\tqualident(id);\r\t\t\tpos := CPM.curpos;\t(*<<*)\r\t\t\tx := CPB.NewLeaf(id); \r\t\t\tUseObj(x.obj, SelUseBSet, pos);\r\t\t\tselector(x);\r\t\t\tIF (x.class = Nfield) & (x.obj.mode = TProc) & (x.obj.link.mode = VarPar) & (x.obj.link.typ.comp = Record) THEN\t\r\t\t\t\t(*<< receiver is var parameter and record *)\r\t\t\t\tSelector(x.left, SelAssign, SelVarPar, SelUseBSet, pos)\r\t\t\tEND;\r\t\t\tSelector(x, SelNoAssign, SelNoVarPar, SelUseBSet, pos);\t(*<<*)\r\t\t\tIF (x.class = Nproc) & (x.obj.mode = SProc) THEN\r\t\t\t\tIF ~((x.obj.adr IN {ordfn, minfn, maxfn, chrfn, sizefn, adrfn, valfn}) OR (x.obj.adr = bitsfn)) THEN\r\t\t\t\t\tINC(nofStats)\t(*<<*)\r\t\t\t\tEND;\r\t\t\t\tStandProcCall(x)\t(* x may be NIL *)\r(*\r\t\t\tELSIF sym = lparen THEN\r\t\t\t\tCPS.Get(sym); CPB.PrepCall(x, fpar);\r\t\t\t\tActualParameters(apar, fpar);\r\t\t\t\tINC(nofStats);\t(*<<*)\r\t\t\t\tCPB.Call(x, apar, fpar);\r\t\t\t\tCheckSym(rparen);\r\t\t\t\tIF level > 0 THEN CPT.topScope.link.leaf := FALSE END\r\t\t\tELSIF id.mode = Typ THEN UseType(id, CPM.errpos)\t(*<< type gets used, e.g. SIZE(Node) *)\r*)\r\t\t\tEND;\r\t\tELSIF sym = number THEN\r\t\t\tCASE CPS.numtyp OF\r\t\t\t   char:\r\t\t\t\tx := CPB.NewIntConst(CPS.intval); x.typ := CPT.char8typ;\r\t\t\t\tIF CPS.intval > 255 THEN x.typ := CPT.char16typ END\r\t\t\t| integer: x := CPB.NewIntConst(CPS.intval)\r\t\t\t| int64: x := CPB.NewLargeIntConst(CPS.intval, CPS.realval)\r\t\t\t| real: x := CPB.NewRealConst(CPS.realval, NIL)\r\t\t\t| real32: x := CPB.NewRealConst(CPS.realval, CPT.real32typ)\r\t\t\t| real64: x := CPB.NewRealConst(CPS.realval, CPT.real64typ)\r\t\t\tEND ;\r\t\t\tCPS.Get(sym)\r\t\tELSIF sym = string THEN\r\t\t\tx := CPB.NewString(CPS.str, CPS.lstr, CPS.intval);\r\t\t\tCPS.Get(sym)\r\t\tELSIF sym = nil THEN\r\t\t\tx := CPB.Nil(); CPS.Get(sym)\r\t\tELSIF sym = lparen THEN\r\t\t\tCPS.Get(sym); Expression(x); CheckSym(rparen)\r\t\tELSIF sym = lbrak THEN\r\t\t\tCPS.Get(sym); err(lparen); Expression(x); CheckSym(rparen)\r\t\tELSIF sym = lbrace THEN CPS.Get(sym); Sets(x)\r\t\tELSIF sym = not THEN\r\t\t\tCPS.Get(sym); Factor(x); CPB.MOp(not, x)\r\t\tELSE err(13); CPS.Get(sym); x := NIL\r\t\tEND ;\r\t\tIF x = NIL THEN x := CPB.NewIntConst(1); x.typ := CPT.undftyp END\r\tEND Factor;\r\r\tPROCEDURE Term(VAR x: CPT.Node);\r\t\tVAR y: CPT.Node; mulop: BYTE;\r\tBEGIN Factor(x);\r\t\tWHILE (times <= sym) & (sym <= and) DO\r\t\t\tmulop := sym; CPS.Get(sym);\r\t\t\tFactor(y); CPB.Op(mulop, x, y)\r\t\tEND\r\tEND Term;\r\r\tPROCEDURE SimpleExpression(VAR x: CPT.Node);\r\t\tVAR y: CPT.Node; addop: BYTE;\r\tBEGIN\r\t\tIF sym = minus THEN CPS.Get(sym); Term(x); CPB.MOp(minus, x)\r\t\tELSIF sym = plus THEN CPS.Get(sym); Term(x); CPB.MOp(plus, x)\r\t\tELSE Term(x)\r\t\tEND ;\r\t\tWHILE (plus <= sym) & (sym <= or) DO\r\t\t\taddop := sym; CPS.Get(sym); Term(y); \r\t\t\tIF x.typ.form = Pointer THEN CPB.DeRef(x) END;\r\t\t\tIF (x.typ.comp IN {Array, DynArr}) & (x.typ.BaseTyp.form IN charSet) THEN CPB.StrDeref(x) END;\r\t\t\tIF y.typ.form = Pointer THEN CPB.DeRef(y) END;\r\t\t\tIF (y.typ.comp IN {Array, DynArr}) & (y.typ.BaseTyp.form IN charSet) THEN CPB.StrDeref(y) END;\r\t\t\tCPB.Op(addop, x, y)\r\t\tEND\r\tEND SimpleExpression;\r\r\tPROCEDURE Expression(VAR x: CPT.Node);\r\t\tVAR y, pre, last: CPT.Node; obj: CPT.Object; relation: BYTE;\r\tBEGIN SimpleExpression(x);\r\t\tIF (eql <= sym) & (sym <= geq) THEN\r\t\t\trelation := sym; CPS.Get(sym); SimpleExpression(y);\r\t\t\tpre := NIL; last := NIL;\r\t\t\tIF (x.typ.comp IN {Array, DynArr}) & (x.typ.BaseTyp.form IN charSet) THEN CPB.StrDeref(x) END;\r\t\t\tIF (y.typ.comp IN {Array, DynArr}) & (y.typ.BaseTyp.form IN charSet) THEN CPB.StrDeref(y) END;\r\t\t\tCPB.CheckBuffering(x, NIL, NIL, pre, last);\r\t\t\tCPB.CheckBuffering(y, NIL, NIL, pre, last);\r\t\t\tCPB.Op(relation, x, y);\r\t\t\tIF pre # NIL THEN CPB.Construct(Ncomp, pre, x); pre.typ := x.typ; x := pre END;\r\t\tELSIF sym = in THEN\r\t\t\tCPS.Get(sym); SimpleExpression(y); CPB.In(x, y)\r\t\tELSIF sym = is THEN\r\t\t\tCPS.Get(sym);\r\t\t\tIF sym = ident THEN\r\t\t\t\tqualident(obj);\r\t\t\t\tUseType(obj, CPM.errpos);\t(*<< type gets used*)\r\t\t\t\tIF obj.mode = Typ THEN CPB.TypTest(x, obj, FALSE)\r\t\t\t\tELSE err(52)\r\t\t\t\tEND\r\t\t\tELSE err(ident)\r\t\t\tEND\r\t\tEND\r\tEND Expression;\r\r\tPROCEDURE ProcedureDeclaration(VAR x: CPT.Node);\r\t\tVAR proc, fwd: CPT.Object;\r\t\t\tname: CPT.Name;\r\t\t\tmode: BYTE;\r\t\t\tforward: BOOLEAN;\r"
                    attr: 0
                  - text: "\t\t\tsys: SHORTINT;"
                    attr: 3
                  - text: "\r\t\t\tpos: INTEGER;\t(*<< *)"
                    attr: 0
                  - text: "\r"
                    attr: 3
                  - text: "\r\t\tPROCEDURE GetCode;\r\t\t\tVAR ext: CPT.ConstExt; i, n, c: INTEGER; s, s2: POINTER TO ARRAY OF SHORTCHAR;\r\t\tBEGIN\r\t\t\tn := 0; NEW(s, 256);\r\t\t\tLOOP\r\t\t\t\tIF sym = number THEN c := CPS.intval; INC(n); i := LEN(s^);\r\t\t\t\t\tIF n > i THEN\t(* if overflow then increase size of array s *)\r\t\t\t\t\t\tNEW(s2, i * 2); WHILE i > 0 DO DEC(i); s2^[i] := s^[i] END; s := s2; s2 := NIL;\r\t\t\t\t\tEND;\r\t\t\t\t\tIF (c < 0) OR (c > 255) OR (n = MAX(INTEGER)) THEN\r\t\t\t\t\t\terr(63); c := 1; n := 1\r\t\t\t\t\tEND ;\r\t\t\t\t\tCPS.Get(sym); s[n - 1] := SHORT(CHR(c))\r\t\t\t\tEND ;\r\t\t\t\tIF sym = comma THEN CPS.Get(sym)\r\t\t\t\tELSIF sym = number THEN err(comma)\r\t\t\t\tELSE EXIT\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF n # 0 THEN NEW(ext, n); i := 0;\r\t\t\t\tWHILE i < n DO ext[i] := s[i]; INC(i) END\r\t\t\tELSE ext := NIL\r\t\t\tEND;\r\t\t\tproc.conval.ext := ext;\r\t\t\tINCL(proc.conval.setval, hasBody)\r\t\tEND GetCode;\r\r\t\tPROCEDURE GetParams;\r\t\t\tVAR name: CPT.String;\r\t\tBEGIN\r\t\t\tproc.mode := mode; proc.typ := CPT.notyp;\r\t\t\t"
                    attr: 0
                  - text: "proc.sysflag := SHORT(sys);"
                    attr: 3
                  - text: "\r\t\t\tproc.conval.setval := {};\r\t\t\tIF sym = lparen THEN\r\t\t\t\tCPS.Get(sym); FormalParameters(proc.link, proc.typ, name);\r\t\t\t\tIF name # NIL THEN err(0) END\r\t\t\tEND;\r\t\t\tCheckForwardTypes; userList := NIL;\r\t\t\tIF fwd # NIL THEN\r\t\t\t\tCPB.CheckParameters(proc.link, fwd.link, TRUE);\r\t\t\t\tIF ~CPT.EqualType(proc.typ, fwd.typ) THEN err(117) END ;\r\t\t\t\tproc := fwd; CPT.topScope := proc.scope;\r\t\t\t\tIF mode = IProc THEN proc.mode := IProc END\r\t\t\tEND\r\t\tEND GetParams;\r\r\t\tPROCEDURE Body;\r\t\t\tVAR procdec, statseq: CPT.Node; c: INTEGER;\r\t\tBEGIN\r\t\t\tc := CPM.errpos;\r\t\t\tINCL(proc.conval.setval, hasBody);\r\t\t\tCheckSym(semicolon); Block(procdec, statseq);\r\t\t\tCPB.Enter(procdec, statseq, proc); x := procdec;\r\t\t\tx.conval := CPT.NewConst(); x.conval.intval := c; x.conval.intval2 := CPM.startpos;\r\t\t\tCheckSym(end);\r\t\t\tIF sym = ident THEN\r\t\t\t\tIF CPS.name # proc.name^ THEN err(4) END ;\r\t\t\t\tCPS.Get(sym)\r\t\t\tELSE err(ident)\r\t\t\tEND\r\t\tEND Body;\r\r\t\tPROCEDURE TProcDecl;\r\t\t\tVAR baseProc, o: CPT.Object;\r\t\t\t\tobjTyp, recTyp: CPT.Struct;\r\t\t\t\tobjMode, objVis: BYTE;\r\t\t\t\tobjName: CPT.Name;\r\t\t\t\tpnode: CPT.Node;\r\t\t\t\tpos1, pos2: INTEGER;\t(*<<*)\r\t\tBEGIN\r\t\t\tCPS.Get(sym); mode := TProc;\r\t\t\tIF level > 0 THEN err(73) END;\r\t\t\tpos1 := CPM.errpos;\t(*<<*)\r\t\t\tReceiver(objMode, objVis, objName, objTyp, recTyp);\r\t\t\tIF sym = ident THEN\r\t\t\t\tname := CPS.name;\r\t\t\t\tCPT.FindField(name, recTyp, fwd);\r\t\t\t\tCPT.FindBaseField(name, recTyp, baseProc);\r\t\t\t\tIF (baseProc # NIL) & (baseProc.mode # TProc) THEN baseProc := NIL END ;\r\t\t\t\tIF fwd = baseProc THEN fwd := NIL END ;\r\t\t\t\tIF (fwd # NIL) & (fwd.mnolev # level) THEN fwd := NIL END ;\r\t\t\t\tIF (fwd # NIL) & (fwd.mode = TProc) & (fwd.conval.setval * {hasBody, absAttr, empAttr} = {}) THEN\r\t\t\t\t\t(* there exists a corresponding forward declaration *)\r\t\t\t\t\tproc := CPT.NewObj(); proc.leaf := TRUE;\r\t\t\t\t\tproc.mode := TProc; proc.conval := CPT.NewConst();\r\t\t\t\t\tCheckMark(proc);\r\t\t\t\t\tIF fwd.vis # proc.vis THEN err(118) END\r\t\t\t\tELSE\r\t\t\t\t\tIF fwd # NIL THEN err(1); fwd := NIL END ;\r\t\t\t\t\tCPT.InsertField(name, recTyp, proc);\r\t\t\t\t\tproc.mode := TProc; proc.conval := CPT.NewConst();\r\t\t\t\t\tCheckMark(proc);\r\t\t\t\t\tIF recTyp.strobj # NIL THEN\t(* preserve declaration order *)\r\t\t\t\t\t\to := recTyp.strobj.link;\r\t\t\t\t\t\tIF o = NIL THEN recTyp.strobj.link := proc\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tWHILE o.nlink # NIL DO o := o.nlink END;\r\t\t\t\t\t\t\to.nlink := proc\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tpos2 := CPM.errpos; proc.num := set;\t(*<< methods are set*)\r\t\t\t\tINC(level); CPT.OpenScope(level, proc);\r\t\t\t\tCPT.Insert(objName, proc.link); proc.link.mode := objMode; proc.link.vis := objVis; proc.link.typ := objTyp;\r\t\t\t\tproc^.link.adr := pos1;\t(*<< *)\r\t\t\t\t(*\r\t\t\t\t(*<< receiver is set/setUsed *)\r\t\t\t\tIF objMode = VarPar THEN proc^.link.num := setUsed ELSE proc^.link.num := set END;\t\r\t\t\t\t*)\r\t\t\t\tproc.link.num := setUsed; (* BJ: No point in warning about recievers. (commented out the line above...)*)\r\t\t\t\tASSERT(CPT.topScope # NIL);\r\t\t\t\tGetParams; \r\t\t\t\tASSERT(CPT.topScope # NIL);\r\t\t\t\tGetAttributes(proc, baseProc, recTyp);\r\t\t\t\t\r\t\t\t\tIF ((absAttr IN proc.conval.setval) OR (empAttr IN proc.conval.setval)) & (proc.link.link # NIL) THEN\r\t\t\t\t\to := proc.link.link;\r\t\t\t\t\tWHILE o # NIL DO o.num := setUsed; o := o.link END;\r\t\t\t\tEND;\r\t\t\t\t\r\t\t\t\tIF (fwd # NIL) & (fwd.conval.setval / proc.conval.setval * {absAttr, empAttr, extAttr} # {}) THEN err(184) END;\r\t\t\t\tCheckOverwrite(proc, baseProc, recTyp);\r\t\t\t\tIF ~forward THEN\r\t\t\t\t\tIF empAttr IN proc.conval.setval THEN\t"
                    attr: 0
                  - text: "(* insert empty procedure *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\tpnode := NIL; CPB.Enter(pnode, NIL, proc);\r\t\t\t\t\t\tpnode.conval := CPT.NewConst();\r\t\t\t\t\t\tpnode.conval.intval := CPM.errpos;\r\t\t\t\t\t\tpnode.conval.intval2 := CPM.errpos;\r\t\t\t\t\t\tx := pnode\r\t\t\t\t\tELSIF ~(absAttr IN proc.conval.setval) THEN Body\r\t\t\t\t\tEND;\r\t\t\t\t\tproc.adr := 0\r\t\t\t\tELSE proc.adr := CPM.errpos\r\t\t\t\tEND;\r\t\t\t\tproc.adr := pos2;\t(*<< *)\r\t\t\t\tDEC(level); CPT.CloseScope\r\t\t\tELSE err(ident)\r\t\t\tEND\r\t\tEND TProcDecl;\r\t\r\tBEGIN proc := NIL; forward := FALSE; x := NIL; mode := LProc;"
                    attr: 0
                  - text: " sys := 0;"
                    attr: 3
                  - text: "\r\t\tIF (sym # ident) & (sym # lparen) THEN\r"
