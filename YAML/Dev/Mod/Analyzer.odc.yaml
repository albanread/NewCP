o varpar *)\r\t\t\t\t\t\terr2(impliedTypeGuard, pos2)\r\t\t\t\t\tEND;\r\t\t\t\t\t*)\r\t\t\t\t\tIF pre # NIL THEN SetPos(x); CPB.Construct(Ncomp, pre, x); x := pre END\r\t\t\t\tELSIF sym = eql THEN\r\t\t\t\t\terr(becomes); CPS.Get(sym); Expression(y); CPB.Assign(x, y)\r\t\t\t\tELSIF (x.class = Nproc) & (x.obj.mode = SProc) THEN\r\t\t\t\t\tStandProcCall(x);\r\t\t\t\t\tIF (x # NIL) & (x.typ # CPT.notyp) THEN err(55) END;\r\t\t\t\t\tIF (x # NIL) & (x.class = Nifelse) THEN\t(* error pos for ASSERT *)\r\t\t\t\t\t\tSetPos(x.left); SetPos(x.left.right)\r\t\t\t\t\tEND;\r\t\t\t\tELSIF x.class = Ncall THEN err(55)\r\t\t\t\tELSE\r\t\t\t\t\tpre := NIL; lastp := NIL;\r\t\t\t\t\tIF (x.class = Nfield) & (x.obj.mode = TProc)\r\t\t\t\t\t\t\t& (x.obj.link.mode = VarPar) & (x.obj.link.typ.comp = Record) THEN\r\t\t\t\t\t\tSelector(x.left, SelAssign, SelVarPar, SelUseBSet, pos1)\t(*<< receiver is var parameter and record *)\r\t\t\t\t\tEND;\r\t\t\t\t\tSelector(x, SelNoAssign, SelNoVarPar, SelUseBSet, pos1);\t(*<< proc in node x gets called *)\r\t\t\t\t\tCPB.PrepCall(x, fpar);\r\t\t\t\t\tIF (x.obj # NIL) & (x.obj.mode = TProc) THEN CPB.CheckBuffering(x.left, NIL, x.obj.link, pre, lastp) END;\r\t\t\t\t\tIF sym = lparen THEN\r\t\t\t\t\t\tCPS.Get(sym); ActualParameters(apar, fpar, pre, lastp); CheckSym(rparen)\r\t\t\t\t\tELSE apar := NIL;\r\t\t\t\t\t\tIF fpar # NIL THEN err(65) END\r\t\t\t\t\tEND ;\r\t\t\t\t\tCPB.Call(x, apar, fpar);\r\t\t\t\t\tIF x.typ # CPT.notyp THEN err(55) END;\r\t\t\t\t\tIF pre # NIL THEN SetPos(x); CPB.Construct(Ncomp, pre, x); x := pre END;\r\t\t\t\t\tIF level > 0 THEN CPT.topScope.link.leaf := FALSE END\r\t\t\t\tEND\r\t\t\tELSIF sym = if THEN\r\t\t\t\tCPS.Get(sym); pos := CPM.startpos; Expression(x); CheckBool(x); CheckSym(then); StatSeq(y);\r\t\t\t\tCPB.Construct(Nif, x, y); SetPos(x); lastif := x;\r\t\t\t\tWHILE sym = elsif DO\r\t\t\t\t\tCPS.Get(sym); pos := CPM.startpos; Expression(y); CheckBool(y); CheckSym(then); StatSeq(z);\r\t\t\t\t\tCPB.Construct(Nif, y, z); SetPos(y); CPB.Link(x, lastif, y)\r\t\t\t\tEND ;\r\t\t\t\tpos := CPM.startpos;\r\t\t\t\tIF sym = else THEN CPS.Get(sym); StatSeq(y) ELSE y := NIL END ;\r\t\t\t\tCPB.Construct(Nifelse, x, y); CheckSym(end); CPB.OptIf(x)\r\t\t\tELSIF sym = case THEN\r\t\t\t\tCPS.Get(sym); pos := CPM.startpos; CasePart(x); CheckSym(end)\r\t\t\tELSIF sym = while THEN\r\t\t\t\tCPS.Get(sym); pos := CPM.startpos; Expression(x); CheckBool(x); CheckSym(do); StatSeq(y);\r\t\t\t\tCPB.Construct(Nwhile, x, y); CheckSym(end)\r\t\t\tELSIF sym = repeat THEN\r\t\t\t\tCPS.Get(sym); StatSeq(x);\r\t\t\t\tIF sym = until THEN CPS.Get(sym); pos := CPM.startpos; Expression(y); CheckBool(y)\r\t\t\t\tELSE err(43)\r\t\t\t\tEND ;\r\t\t\t\tCPB.Construct(Nrepeat, x, y)\r\t\t\tELSIF sym = for THEN\r\t\t\t\tCPS.Get(sym); pos := CPM.startpos;\r\t\t\t\tIF sym = ident THEN qualident(id);\r\t\t\t\t\tSetObj(id, FALSE, CPM.errpos); UseObj(id, TRUE, CPM.errpos);\t(*<< for variable gets set & used*)\r\t\t\t\t\tINC(id.num, noChange);\t(*<< loop variable shouldn't be changed!*)\r\t\t\t\t\tIF ~(id.typ.form IN intSet) THEN err(68) END ;\r\t\t\t\t\tCheckSym(becomes); Expression(y);\r\t\t\t\t\tx := CPB.NewLeaf(id); CPB.Assign(x, y); SetPos(x);\r\t\t\t\t\tCheckSym(to); pos := CPM.startpos; Expression(y);\r\t\t\t\t\tIF y.class # Nconst THEN\r\t\t\t\t\t\tCPB.GetTempVar(\"@for\", x.left.typ, t);\r\t\t\t\t\t\tt.num := setUsed;\t(*<< temporary var gets set and used*)\r\t\t\t\t\t\tz := CPB.NewLeaf(t); CPB.Assign(z, y); SetPos(z); CPB.Link(stat, last, z);\r\t\t\t\t\t\ty := CPB.NewLeaf(t)\r\t\t\t\t\tELSE\r\t\t\t\t\t\tCPB.CheckAssign(x.left.typ, y)\r\t\t\t\t\tEND ;\r\t\t\t\t\tCPB.Link(stat, last, x);\r\t\t\t\t\tp := CPM.startpos;\r\t\t\t\t\tIF sym = by THEN CPS.Get(sym); ConstExpression(z) ELSE z := CPB.NewIntConst(1) END ;\r\t\t\t\t\tx := CPB.NewLeaf(id);\r\t\t\t\t\tIF z.conval.intval > 0 THEN CPB.Op(leq, x, y)\r\t\t\t\t\tELSIF z.conval.intval < 0 THEN CPB.Op(geq, x, y)\r\t\t\t\t\tELSE err(63); CPB.Op(geq, x, y)\r\t\t\t\t\tEND ;\r\t\t\t