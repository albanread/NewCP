 x := y; lastif := x ELSE CPB.Link(x, lastif, y) END \r\t\t\t\t\tEND;\r\t\t\t\t\tIF sym = bar THEN CPS.Get(sym) ELSE EXIT END\r\t\t\t\tEND;\r\t\t\t\te := sym = else; pos := CPM.startpos;\r\t\t\t\tIF e THEN CPS.Get(sym); StatSeq(s) ELSE s := NIL END ;\r\t\t\t\tCPB.Construct(Nwith, x, s); CheckSym(end);\r\t\t\t\tIF e THEN x.subcl := 1 END\r\t\t\tELSIF sym = exit THEN\r\t\t\t\tCPS.Get(sym);\r\t\t\t\tIF LoopLevel = 0 THEN err(46) END ;\r\t\t\t\tCPB.Construct(Nexit, x, NIL);\r\t\t\t\toldSym := exit\t(*<<*)\r\t\t\tELSIF sym = return THEN CPS.Get(sym);\r\t\t\t\tIF sym < semicolon THEN Expression(x) END ;\r\t\t\t\tIF level > 0 THEN CPB.Return(x, CPT.topScope.link)\r\t\t\t\tELSE (* not standard Oberon *) CPB.Return(x, NIL)\r\t\t\t\tEND;\r\t\t\t\thasReturn := TRUE;\r\t\t\t\toldSym := return\t(*<<*)\r\t\t\tELSE\t(*<< empty statement*)\r\t\t\t\tIF options.semicolons THEN\r\t\t\t\t\tIF sym = semicolon THEN err2(semicolons, CPM.errpos)\r\t\t\t\t\tELSIF lastSemi THEN err2(semicolons, lastSemiPos)\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tDEC(nofStats)\r\t\t\tEND ;\r\t\t\tIF x # NIL THEN SetPos(x); CPB.Link(stat, last, x) END ;\r\t\t\tIF sym = semicolon THEN \t(*<<*)\r\t\t\t\tlastSemi := TRUE; lastSemiPos := CPM.errpos\r\t\t\tELSE lastSemi := FALSE\t(*<<*)\r\t\t\tEND;\r\t\t\tIF sym = semicolon THEN CPS.Get(sym)\r\t\t\tELSIF (sym <= ident) OR (if <= sym) & (sym <= return) THEN err(semicolon)\r\t\t\tELSE EXIT\r\t\t\tEND;\r\t\t\tIF (exit <= oldSym) & (oldSym <= return) & ((sym < bar) OR (until < sym)) THEN\t(*<< statement after return/exit*)\r\t\t\t\terr2(statAfterRetEx, CPM.errpos)\r\t\t\tEND\r\t\tEND\r\tEND StatSeq;\r\r\tPROCEDURE Block(VAR procdec, statseq: CPT.Node);\r\t\tVAR typ: CPT.Struct;\r\t\t\tobj, first, last, o: CPT.Object;\r\t\t\tx, lastdec: CPT.Node;\r\t\t\ti: SHORTINT;\r\t\t\trname: CPT.Name;\r\t\t\tname: CPT.String;\r\t\t\trec: Elem;\r\t\t\tpos, save: INTEGER;\t(*<<*)\r\r\tBEGIN\r\t\tfirst := NIL; last := NIL; userList := NIL; recList := NIL;\r\t\tsave := nofStats;\t(*<<*)\r\t\tLOOP\r\t\t\tIF sym = const THEN\r\t\t\t\tCPS.Get(sym);\r\t\t\t\tWHILE sym = ident DO\r\t\t\t\t\tCheckOuter;\t(*<<*)\r\t\t\t\t\tCPT.Insert(CPS.name, obj);\r\t\t\t\t\tobj.mode := Con; CheckMark(obj);\r\t\t\t\t\tobj.typ := CPT.int8typ; obj.mode := Var;\t(* Var to avoid recursive definition *)\r\t\t\t\t\tpos := CPM.errpos;\t(*<<*)\r\t\t\t\t\tIF sym = eql THEN\r\t\t\t\t\t\tCPS.Get(sym); ConstExpression(x)\r\t\t\t\t\tELSIF sym = becomes THEN\r\t\t\t\t\t\terr(eql); CPS.Get(sym); ConstExpression(x)\r\t\t\t\t\tELSE err(eql); x := CPB.NewIntConst(1)\r\t\t\t\t\tEND ;\r\t\t\t\t\tobj.mode := Con; obj.typ := x.typ; obj.conval := x.conval; (* ConstDesc ist not copied *)\r\t\t\t\t\tobj.adr := pos; obj.num := set;\t(*<< constants are set by default*)\r\t\t\t\t\tCheckSym(semicolon)\r\t\t\t\tEND\r\t\t\tEND ;\r\t\t\tIF sym = type THEN\r\t\t\t\tCPS.Get(sym);\r\t\t\t\tWHILE sym = ident DO\r\t\t\t\t\tCheckOuter;\t(*<<*)\r\t\t\t\t\tCPT.Find(CPS.name, obj); (* could have been used as a forward type definition *)\r\t\t\t\t\tIF obj = NIL THEN CPT.Insert(CPS.name, obj) END;\r\t\t\t\t\tobj.mode := -1; obj.typ := CPT.undftyp;\r\t\t\t\t\tCheckMark(obj);\r\t\t\t\t\tobj.adr := CPM.errpos;\r\t\t\t\t\tIF obj.num > clean THEN obj.num := setUsed ELSE  obj.num := set END;\t(*<< types are set by default*)\r\t\t\t\t\tIF sym # eql THEN err(eql) END;\r\t\t\t\t\tIF (sym = eql) OR (sym = becomes) OR (sym = colon) THEN\r\t\t\t\t\t\tCPS.Get(sym); Type(obj.typ, name); SetType(NIL, obj, obj.typ, name)\r\t\t\t\t\tEND;\r\t\t\t\t\tobj.mode := Typ;\r\t\t\t\t\tIF obj.typ.form IN {Byte..Set, Char16, Int64} THEN\t(* make alias structure *)\r\t\t\t\t\t\ttyp := CPT.NewStr(obj.typ.form, Basic); i := typ.ref;\r\t\t\t\t\t\ttyp^ := obj.typ^; typ.ref := i; typ.strobj := NIL; "
