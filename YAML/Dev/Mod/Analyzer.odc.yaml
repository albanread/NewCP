                    attr: 1
                  - text: "\r\t\t\t\t\t\t\trname := obj.name^$; i := 0;\r\t\t\t\t\t\t\tWHILE rname[i] # 0X DO INC(i) END;\r\t\t\t\t\t\t\trname[i] := \"^\"; rname[i+1] := 0X;\r\t\t\t\t\t\t\tCPT.Insert(rname, o); o.mode := Typ; o.typ := typ; typ.strobj := o;\r\t\t\t\t\t\t\to.adr := CPM.errpos; o.num := setUsed\t(*<< anonymous record types are set and used by default*)\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND;\r\t\t\t\t\tIF obj.vis # internal THEN\r\t\t\t\t\t\ttyp := obj.typ;\r\t\t\t\t\t\tIF typ.form = Pointer THEN typ := typ.BaseTyp END;\r\t\t\t\t\t\tIF typ.comp = Record THEN typ.exp := TRUE END\r\t\t\t\t\tEND;\r\t\t\t\t\tCheckSym(semicolon)\r\t\t\t\tEND\r\t\t\tEND ;\r\t\t\tIF sym = var THEN\r\t\t\t\tCPS.Get(sym);\r\t\t\t\tWHILE sym = ident DO\r\t\t\t\t\tLOOP\r\t\t\t\t\t\tIF sym = ident THEN\r\t\t\t\t\t\t\tCheckOuter;\t(*<<*)\r\t\t\t\t\t\t\tCPT.Insert(CPS.name, obj);\r\t\t\t\t\t\t\tobj.mode := Var; obj.link := NIL; obj.leaf := obj.vis = internal; obj.typ := CPT.undftyp;\r\t\t\t\t\t\t\tCheckMark(obj);\r\t\t\t\t\t\t\tobj.adr := CPM.errpos; obj.num := clean;\t(*<<*)\r\t\t\t\t\t\t\tIF first = NIL THEN first := obj END ;\r\t\t\t\t\t\t\tIF last = NIL THEN CPT.topScope.scope := obj ELSE last.link := obj END;\r\t\t\t\t\t\t\tlast := obj\r\t\t\t\t\t\tELSE err(ident)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF sym = comma THEN CPS.Get(sym)\r\t\t\t\t\t\tELSIF sym = ident THEN err(comma); \r\t\t\t\t\t\tELSE EXIT\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND ;\r\t\t\t\t\tCheckSym(colon); Type(typ, name);\r\t\t\t\t\tCheckAlloc(typ, FALSE, CPM.errpos);\r\t\t\t\t\tWHILE first # NIL DO SetType(NIL, first, typ, name); first := first.link END ;\r\t\t\t\t\tCheckSym(semicolon)\r\t\t\t\tEND\r\t\t\tEND ;\r\t\t\tIF (sym < const) OR (sym > var) THEN EXIT END\r\t\tEND ;\r\t\tnofStats := save;\t(*<<*)\r\t\tCheckForwardTypes; \r\t\tuserList := NIL; rec := recList; recList := NIL;\r\t\tCPT.topScope.adr := CPM.errpos;\r\t\tprocdec := NIL; lastdec := NIL;\r\t\tWHILE sym = procedure DO\r\t\t\tCPS.Get(sym); ProcedureDeclaration(x);\r\t\t\tIF x # NIL THEN\r\t\t\t\tIF lastdec = NIL THEN procdec := x ELSE lastdec.link := x END ;\r\t\t\t\tlastdec := x\r\t\t\tEND ;\r\t\t\tCheckSym(semicolon)\r\t\tEND ;\r\t\tIF CPM.noerr & ~(CPM.oberon IN CPM.options) THEN CheckRecords(rec) END;\r\t\thasReturn := FALSE;\r\t\tIF sym = begin THEN CPS.Get(sym); StatSeq(statseq)\r\t\tELSE statseq := NIL\r\t\tEND ;\r\t\tIF (CPT.topScope.link # NIL) & (CPT.topScope.link.typ # CPT.notyp)\r\t\t\t& ~hasReturn & (CPT.topScope.link.sysflag = 0) THEN err(133) END;\r\t\tIF (level = 0) & (TDinit # NIL) THEN\r\t\t\tlastTDinit.link := statseq; statseq := TDinit\r\t\tEND\r\tEND Block;\r\r\tPROCEDURE Module*(VAR prog: CPT.Node);\r\t\tVAR impName, aliasName: CPT.Name; obj: CPT.Object;\t(*<< obj *)\r\t\t\t\tprocdec, statseq: CPT.Node;\r\t\t\t\tc: INTEGER; done: BOOLEAN;\r\tBEGIN\r\t\tCPS.Init; LoopLevel := 0; level := 0; CPS.Get(sym);\r\t\tNEW(errHead); nofStats := 0;\t(*<<*)\r\t\tIF sym = module THEN CPS.Get(sym) ELSE err(16) END ;\r\t\tIF sym = ident THEN\r\t\t\t"
                    attr: 0
                  - text: CPT.Open(CPS.name)
