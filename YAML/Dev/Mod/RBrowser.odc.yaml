                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT\r\t\tStrings, Dialog, Files, Stores, Converters, Fonts, Ports, Views, Containers,\r\t\tTextModels, TextMappers, TextRulers, TextViews, StdLinks, StdFolds, TextControllers, Models;\r\r\tTYPE\r\t\tSubDesc = RECORD\t"
                    attr: 0
                  - text: "(* description of subsystem contents *)"
                    attr: 1
                  - text: "\r\t\t\trsrc: BOOLEAN;\t"
                    attr: 0
                  - text: "(* does subsystem directory have a Rsrc subdirectory? *)"
                    attr: 1
                  - text: "\r\t\t\tsym, code, mod, docu: Files.FileInfo\t"
                    attr: 0
                  - text: "(* file lists of Sym/Code/Mod/Docu subdirectories *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\r\tPROCEDURE Eq (a, b: CHAR): BOOLEAN;\r\tBEGIN\r\t\ta := Strings.Upper(a);\r\t\tb := Strings.Upper(b);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " a = b\r\tEND Eq;\r\r\tPROCEDURE Gt (a, b: CHAR): BOOLEAN;\r\tBEGIN\r\t\ta := Strings.Upper(a);\r\t\tb := Strings.Upper(b);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " a > b\r\tEND Gt;\r\r\tPROCEDURE ClipName (VAR s: ARRAY OF CHAR);\r\t\tVAR h, k: INTEGER; ch: CHAR;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* strip file name suffix *)"
                    attr: 1
                  - text: "\r\t\tIF Dialog.IsWindows() OR Dialog.IsLinux() THEN\r\t\t\tk := - 1; h := 0; ch := s[0];\r\t\t\tWHILE ch # 0X DO\r\t\t\t\tIF ch = \".\" THEN k := h END;\r\t\t\t\tINC(h); ch := s[h]\r\t\t\tEND;\r\t\t\tIF k # - 1 THEN s[k] := 0X END\r\t\tEND\r\tEND ClipName;\r\r\tPROCEDURE Equal (IN a, b: ARRAY OF CHAR): BOOLEAN;\r\t\tVAR i: INTEGER; cha, chb: CHAR;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* string comparison, not case sensitive *)"
                    attr: 1
                  - text: "\r\t\ti := 0; cha := a[0]; chb := b[0];\r\t\tWHILE (cha # 0X) & (chb # 0X) & Eq(cha, chb) DO INC(i); cha := a[i]; chb := b[i] END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " Eq(cha, chb)\r\tEND Equal;\r\r\tPROCEDURE ClippedEqual (a, b: ARRAY OF CHAR): BOOLEAN;\r\t\tVAR i: INTEGER; cha, chb: CHAR;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* string comparison, not case sensitive *)"
                    attr: 1
                  - text: "\r\t\tClipName(a); ClipName(b);\r\t\ti := 0; cha := a[0]; chb := b[0];\r\t\tWHILE (cha # 0X) & (chb # 0X) & Eq(cha, chb) DO INC(i); cha := a[i]; chb := b[i] END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " Eq(cha, chb)\r\tEND ClippedEqual;\r\r\tPROCEDURE ClippedGreater (a, b: ARRAY OF CHAR): BOOLEAN;\r\t\tVAR i: INTEGER; cha, chb: CHAR;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* string comparison, not case sensitive *)"
                    attr: 1
                  - text: "\r\t\tClipName(a); ClipName(b);\r\t\ti := 0; cha := a[0]; chb := b[0];\r\t\tWHILE (cha # 0X) & (chb # 0X) & Eq(cha, chb) DO INC(i); cha := a[i]; chb := b[i] END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " Gt(cha, chb)\r\tEND ClippedGreater;\r\r\tPROCEDURE Ident (s: ARRAY OF CHAR): BOOLEAN;\r\t\tCONST MaxIdLen = 256;\r\t\tVAR i: INTEGER; ch: CHAR;\r\tBEGIN\r\t\tClipName(s); i := 0;\r\t\tREPEAT\r\t\t\tch := s[i]; INC(i)\r\t\tUNTIL ~Strings.IsIdent(ch) OR (i = MaxIdLen);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " ch = 0X\r\tEND Ident;\r\r\tPROCEDURE WriteOpenFold (VAR f: TextMappers.Formatter; hidden: ARRAY OF CHAR);\r\t\tVAR fold: StdFolds.Fold; t: TextModels.Model; w: TextMappers.Formatter;\r\tBEGIN\r\t\tt := TextModels.CloneOf(f.rider.Base());\r\t\tw.ConnectTo(t); w.WriteString(hidden);\r\t\tfold := StdFolds.dir.New(StdFolds.expanded, \"\", t);\r\t\tf.WriteView(fold)\r\tEND WriteOpenFold;\r\r\tPROCEDURE WriteCloseFold (VAR f: TextMappers.Formatter; collaps: BOOLEAN);\r\t\tVAR fold: StdFolds.Fold; m: TextModels.Model;\r\tBEGIN\r\t\tfold := StdFolds.dir.New(StdFolds.expanded, \"\", NIL);\r\t\tf.WriteView(fold);\r\t\tIF collaps THEN fold.Flip; m := f.rider.Base(); f.SetPos(m.Length()) END\r\tEND WriteCloseFold;\r\r\tPROCEDURE WriteLink (VAR f: TextMappers.Formatter; subsystem, directory, file: ARRAY OF CHAR; \r\t\t\t\t\t\t\t\t\t\tattr: TextModels.Attributes);\r\t\tVAR v: Views.View; s: Files.Name;\r\tBEGIN\r\t\tIF directory = \"\" THEN\r\t\t\ts := \"StdCmds.OpenBrowser('\";\r\t\t\ts := s + subsystem + \"/Docu/\";\r\t\t\ts := s + file + \"', '\";\r\t\t\ts := s + subsystem + \"/Docu/\";\r\t\t\ts := s + file + \"')\"\r\t\tELSIF Equal(directory , \"Rsrc\") THEN\r\t\t\ts := \"DevRBrowser.ShowFiles('\";\r\t\t\ts := s + subsystem + \"/Rsrc')\"\r\t\tELSE\r\t\t\ts := \"StdCmds.OpenBrowser('\";\r\t\t\ts := s + subsystem +  \"/\" + directory;\r\t\t\ts := s +  \"/\" + file + \"', '\";\r\t\t\tIF subsystem # \"System\" THEN s := s + subsystem END;\r\t\t\ts := s + file + \"')\"\r\t\tEND;\r\t\tf.rider.SetAttr(attr);\r\t\tv := StdLinks.dir.NewLink(s);\r\t\tf.WriteView(v);\t"
                    attr: 0
                  - text: "(* insert left link view in text *)"
                    attr: 1
                  - text: "\r\t\tIF directory # \"\" THEN s := directory$ ELSE s := file$; ClipName(s) END;\r\t\tf.WriteString(s);\r\t\tv := StdLinks.dir.NewLink(\"\");\r\t\tf.WriteView(v)\t"
                    attr: 0
                  - text: "(* insert right link view in text *)"
                    attr: 1
                  - text: "\r\tEND WriteLink;\r\r\tPROCEDURE WriteString (VAR f: TextMappers.Formatter; s: ARRAY OF CHAR; attr: TextModels.Attributes);\r\tBEGIN\r\t\tf.rider.SetAttr(attr); f.WriteString(s);\r\tEND WriteString;\r\r\tPROCEDURE WriteTab (VAR f: TextMappers.Formatter; attr: TextModels.Attributes);\r\tBEGIN\r\t\tf.rider.SetAttr(attr); f.WriteTab;\r\tEND WriteTab;\r\r\tPROCEDURE WriteLn (VAR f: TextMappers.Formatter; attr: TextModels.Attributes);\r\tBEGIN\r\t\tf.rider.SetAttr(attr); f.WriteLn;\r\tEND WriteLn;\r\r\tPROCEDURE NewRuler (): TextRulers.Ruler;\r\t\tVAR p: TextRulers.Prop;\r\tBEGIN\r\t\tNEW(p);\r\t\tp.tabs.len := 5;\r\t\tp.tabs.tab[0].stop := 4 * Ports.mm;\r\t\tp.tabs.tab[1].stop := 50 * Ports.mm;\r\t\tp.tabs.tab[2].stop := 70 * Ports.mm;\r\t\tp.tabs.tab[3].stop := 90 * Ports.mm;\r\t\tp.tabs.tab[4].stop := 110 * Ports.mm;\r\t\tp.valid := {TextRulers.tabs};\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TextRulers.dir.NewFromProp(p)\r\tEND NewRuler;\r\r\tPROCEDURE MSort (l: Files.FileInfo; n: INTEGER): Files.FileInfo;\r\t\tVAR h, h0, r: Files.FileInfo; n2, i: INTEGER;\r\tBEGIN\r\t\tIF n > 2 THEN\r\t\t\tn2 := n DIV 2; h := l; i := n2; WHILE i # 1 DO DEC(i); h := h.next END;\r\t\t\tr := h.next; h.next := NIL;\t"
                    attr: 0
                  - text: "(* split list into two half-length lists*)"
                    attr: 1
                  - text: "\r\t\t\tl := MSort(l, n2); r := MSort(r, n - n2);\t"
                    attr: 0
                  - text: "(* sort both lists separately *)"
                    attr: 1
                  - text: "\r\t\t\tIF ClippedGreater(r.name, l.name) THEN h := l; l := l.next ELSE h := r; r := r.next END;\r\t\t\th0 := h;\t"
                    attr: 0
                  - text: "(* h0 is back pointer of newly constructed list h *)"
                    attr: 1
                  - text: "\r\t\t\tWHILE (l # NIL) & (r # NIL) DO\r\t\t\t\tIF ClippedGreater(r.name, l.name) THEN h0.next := l; l := l.next ELSE h0.next := r; r := r.next END;\r\t\t\t\th0 := h0.next\r\t\t\tEND;\r\t\t\tIF l # NIL THEN h0.next := l ELSIF r # NIL THEN h0.next := r END;\r\t\t\tl := h\r\t\tELSIF n = 2 THEN\r\t\t\tIF ClippedGreater(l.name, l.next.name) THEN l.next.next := l; l := l.next; l.next.next := NIL END\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " l\r\tEND MSort;\r\r\tPROCEDURE Sort (i: Files.FileInfo): Files.FileInfo;\r\t\tVAR n: INTEGER; h: Files.FileInfo;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* merge sort *)"
                    attr: 1
                  - text: "\r\t\tn := 0; h := i; WHILE h # NIL DO INC(n); h := h.next END;\t"
                    attr: 0
                  - text: "(* count number of list elements *)"
                    attr: 1
                  - text: "\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " MSort(i, n)\r\tEND Sort;\r\r\tPROCEDURE GetThisSubsystem (loc: Files.Locator; VAR sub: SubDesc; VAR isSubsystem: BOOLEAN);\r\t\tVAR i: Files.LocInfo; l: Files.Locator;\r\tBEGIN\r\t\tisSubsystem := FALSE; sub.rsrc := FALSE;\r\t\ti := Files.dir.LocList(loc);\r\t\tWHILE i # NIL DO\r\t\t\tIF Equal(i.name, \"Rsrc\") THEN\r\t\t\t\tisSubsystem := TRUE; sub.rsrc := TRUE\r\t\t\tELSIF Equal(i.name, \"Sym\") OR Equal(i.name, \"Code\") OR\r\t\t\t\t\tEqual(i.name, \"Mod\") OR Equal(i.name, \"Docu\") THEN\r\t\t\t\tisSubsystem := TRUE\r\t\t\tEND;\r\t\t\ti := i.next\r\t\tEND;\r\t\tsub.sym := Files.dir.FileList(loc.This(\"Sym\"));\r\t\tsub.code := Files.dir.FileList(loc.This(\"Code\"));\r\t\tsub.mod := Files.dir.FileList(loc.This(\"Mod\"));\r\t\tsub.docu := Files.dir.FileList(loc.This(\"Docu\"));\r\t\tsub.sym := Sort(sub.sym);\r\t\tsub.code := Sort(sub.code);\r\t\tsub.mod := Sort(sub.mod);\r\t\tsub.docu := Sort(sub.docu)\r\tEND GetThisSubsystem;\r\r\tPROCEDURE Convertible (l: Files.FileInfo): BOOLEAN;\r\t\tVAR c: Converters.Converter;\r\tBEGIN\r\t\tc := Converters.list; WHILE (c # NIL) & (c.fileType # l.type) DO c := c.next END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " c # NIL\r\tEND Convertible;\r\r\tPROCEDURE GetModule (VAR sub: SubDesc; OUT i: Files.FileInfo);\r\tBEGIN\r\t\ti := sub.sym;\r\t\tIF (sub.code # NIL) & ((i = NIL) OR ClippedGreater(i.name, sub.code.name)) THEN i := sub.code END;\r\t\tIF (sub.mod # NIL) & ((i = NIL) OR ClippedGreater(i.name, sub.mod.name)) THEN i := sub.mod END;\r\t\tIF (sub.docu # NIL) & ((i = NIL) OR ClippedGreater(i.name, sub.docu.name)) THEN i := sub.docu END\r\tEND GetModule;\r\r\tPROCEDURE GetNonmodule (VAR l: Files.FileInfo; OUT i: Files.FileInfo);\r\t\tVAR h: Files.FileInfo;\r\tBEGIN\r\t\th := l;\r\t\tIF (h # NIL) & ~Ident(h.name) THEN\r\t\t\ti := l; l := l.next\r\t\tELSIF h # NIL THEN\r\t\t\tWHILE (h.next # NIL) & Ident(h.next.name) DO h := h.next END;\r\t\t\tIF h.next # NIL THEN i := h.next; h.next := i.next ELSE i := NIL END\r\t\tELSE\r\t\t\ti := NIL\r\t\tEND\r\tEND GetNonmodule;\r\r\tPROCEDURE WriteSubsystem (VAR f: TextMappers.Formatter; old, new, bold: TextModels.Attributes;\r\t\t\t\t\t\t\t\t\t\t\t\t\tVAR sub: SubDesc; name: Files.Name);\r\t\tVAR i: Files.FileInfo; modname: Files.Name;\r\tBEGIN\r\t\tWriteString(f, name, bold);\r\t\tWriteString(f, \"   \", old);\r\t\tWriteOpenFold(f, \"\"); WriteLn(f, old);\r\t\tIF sub.rsrc THEN WriteTab(f, old); WriteLink(f, name, \"Rsrc\", \"\", new); WriteLn(f, old) END;\r\t\tGetNonmodule(sub.docu, i);\r\t\tIF i # NIL THEN\r\t\t\tWriteTab(f, old);\r\t\t\tREPEAT\r\t\t\t\tWriteLink(f, name, \"\", i.name, new); WriteString(f, \"   \", old);\r\t\t\t\tGetNonmodule(sub.docu, i)\r\t\t\tUNTIL i = NIL;\r\t\t\tWriteLn(f, old)\r\t\tEND;\r\t\tGetModule(sub, i);\r\t\tWHILE i # NIL DO\t"
                    attr: 0
                  - text: "(* iterate over all modules for which there is a symbol file *)"
                    attr: 1
                  - text: "\r\t\t\tWriteTab(f, old);\r\t\t\tIF ~Equal(name, \"System\") THEN WriteString(f, name, old) END;\t"
                    attr: 0
                  - text: "(* subsystem name *)"
                    attr: 1
                  - text: "\r\t\t\tmodname := i.name;\r\t\t\tClipName(modname);\t"
                    attr: 0
                  - text: "(* file name => module name *)"
                    attr: 1
                  - text: "\r\t\t\tWriteString(f, modname, old);\r\t\t\tWriteTab(f, old);\r\t\t\tIF (sub.sym # NIL) & ClippedEqual(sub.sym.name, i.name) THEN\r\t\t\t\tIF Convertible(sub.sym) THEN WriteLink(f, name, \"Sym\", sub.sym.name, new) END;\r\t\t\t\tsub.sym := sub.sym.next\r\t\t\tEND;\r\t\t\tWriteTab(f, old);\r\t\t\tIF (sub.code # NIL) & ClippedEqual(sub.code.name, i.name) THEN\r\t\t\t\tIF Convertible(sub.code) THEN WriteLink(f, name, \"Code\", sub.code.name, new) END;\r\t\t\t\tsub.code := sub.code.next\r\t\t\tEND;\r\t\t\tWriteTab(f, old);\r\t\t\tIF (sub.mod # NIL) & ClippedEqual(sub.mod.name,  i.name) THEN\r\t\t\t\tIF Convertible(sub.mod) THEN WriteLink(f, name, \"Mod\", sub.mod.name, new) END;\r\t\t\t\tsub.mod := sub.mod.next\r\t\t\tEND;\r\t\t\tWriteTab(f, old);\r\t\t\tIF (sub.docu # NIL) & ClippedEqual(sub.docu.name, i.name) THEN\r\t\t\t\tIF Convertible(sub.docu) THEN WriteLink(f, name, \"Docu\", sub.docu.name, new) END;\r\t\t\t\tsub.docu := sub.docu.next\r\t\t\tEND;\r\t\t\tWriteLn(f, old);\r\t\t\tGetModule(sub, i)\r\t\tEND;\r\t\tWriteCloseFold(f, TRUE);\r\t\tWriteLn(f, old)\r\tEND WriteSubsystem;\r\t\r\tPROCEDURE AddFiles(VAR  t: TextModels.Model);\r\t\tVAR f: TextMappers.Formatter; tv: TextViews.View;\r\t\t\tc: Containers.Controller; old, new, bold: TextModels.Attributes; title: Views.Title;\r\t\t\tsubinfo: Files.LocInfo; root, subloc: Files.Locator; subdesc: SubDesc; isSubsystem: BOOLEAN;\r\t\t\tv: Views.View;\r\tBEGIN\r\t\tf.ConnectTo(t);\r\t\told := f.rider.attr;\r\t\tnew := TextModels.NewStyle(old, old.font.style + {Fonts.underline});\t"
                    attr: 0
                  - text: "(* use underline style *)"
                    attr: 1
                  - text: "\r\t\tnew := TextModels.NewColor(new, Ports.blue);\t"
                    attr: 0
                  - text: "(* use blue color *)"
                    attr: 1
                  - text: "\r\t\tbold := TextModels.NewWeight(old, Fonts.bold);\t"
                    attr: 0
                  - text: "(* use bold outline *)"
                    attr: 1
                  - text: "\r\t\tf.WriteView(NewRuler());\r\t\tv := StdLinks.dir.NewLink(\"DevRBrowser.Update\");\r\t\tf.rider.SetAttr(new);\r\t\tf.WriteView(v);\t"
                    attr: 0
                  - text: "(* insert left link view in text *)"
                    attr: 1
                  - text: "\r\t\tf.WriteString(\"Update\"); f.WriteLn;\r\t\tv := StdLinks.dir.NewLink(\"\");\r\t\tf.WriteView(v);\t"
                    attr: 0
                  - text: "(* insert right link view in text *)"
                    attr: 1
                  - text: "\r\t\tf.WriteLn;\r\t\troot := Files.dir.This(\"\");\r\t\tsubinfo := Files.dir.LocList(root);\r\t\tWHILE subinfo # NIL DO\t"
                    attr: 0
                  - text: "(* iterate over all locations; no particular sorting order is guaranteed *)"
                    attr: 1
                  - text: "\r\t\t\tsubloc := root.This(subinfo.name);\r\t\t\tIF subloc # NIL THEN\r\t\t\t\tGetThisSubsystem(subloc, subdesc, isSubsystem);\r\t\t\t\tIF isSubsystem THEN WriteSubsystem(f, old, new, bold, subdesc, subinfo.name) END\r\t\t\tEND;\r\t\t\tsubinfo := subinfo.next\r\t\tEND\r\tEND AddFiles;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ShowRepository
                    attr: 3
                  - text: "*;\r\t\tVAR t: TextModels.Model; tv: TextViews.View;\r\t\t\tc: Containers.Controller; v: Views.View;\r\tBEGIN\r\t\tt := TextModels.dir.New();\r\t\tAddFiles(t);\r\t\ttv := TextViews.dir.New(t);\r\t\tc := tv.ThisController();\r\t\t"
                    attr: 0
