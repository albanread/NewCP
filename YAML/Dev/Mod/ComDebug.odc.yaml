                  - text: "\r\tIMPORT\r\t\tSYSTEM, COM, WinApi, WinOle,\r\t\tKernel, Strings, Dialog, Fonts, Ports, Stores, Models, Views, Properties, Containers,\r\t\tDocuments, Windows,\r\t\tTextModels, TextRulers, TextViews, TextControllers, TextMappers,\r\t\tDevDebug, DevHeapSpy, StdLog, StdLinks;\r\t\r\t\r\tTYPE\r\t\tBlock = POINTER TO RECORD [untagged]\r\t\t\ttag: Kernel.Type;\r\t\t\tsize: INTEGER;\t\t"
                    attr: 0
                  - text: "(* size of free blocks *)\r"
                    attr: 1
                  - text: "\t\t\tref: INTEGER;\r\t\t\tunk: INTEGER\r\t\tEND;\r\t\tCluster = POINTER TO RECORD [untagged]\r\t\t\tsize: INTEGER;\t"
                    attr: 0
                  - text: "(* total size *)"
                    attr: 1
                  - text: "\r\t\t\tnext: Cluster;\r\t\tEND;\r\r\r\tVAR\r\t\tall: BOOLEAN;\r\t\theaderLen: INTEGER;\r\t\t\r\t\r\tPROCEDURE NewRuler (): TextRulers.Ruler;\r\t\tCONST mm = Ports.mm;\r\t\tVAR p: TextRulers.Prop;\r\tBEGIN\r\t\tNEW(p);\r\t\tp.valid := {TextRulers.right, TextRulers.tabs, TextRulers.opts};\r\t\tp.opts.val := {TextRulers.rightFixed}; p.opts.mask := p.opts.val;\r\t\tp.right := 130 * mm;\r\t\tp.tabs.len := 4;\r\t\tp.tabs.tab[0].stop := 15 * mm; p.tabs.tab[1].stop := 70 * mm;\r\t\tp.tabs.tab[2].stop := 85 * mm; p.tabs.tab[3].stop := 95 * mm;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TextRulers.dir.NewFromProp(p)\r\tEND NewRuler;\r\r\tPROCEDURE OpenViewer (t: TextModels.Model; title: Views.Title; ruler:TextRulers.Ruler);\r\t\tVAR v: TextViews.View; c: Containers.Controller;\r\tBEGIN\r\t\tDialog.MapString(title, title);\r\t\tv := TextViews.dir.New(t);\r\t\tIF ruler # NIL THEN v.SetDefaults(ruler, TextViews.dir.defAttr) END;\r\t\tc := v.ThisController();\r\t\tIF c # NIL THEN\r\t\t\tc.SetOpts(c.opts - {Containers.noFocus, Containers.noSelection} + {Containers.noCaret})\r\t\tEND;\r\t\tViews.OpenAux(v, title)\r\tEND OpenViewer;\r\t\r\tPROCEDURE OpenInfoViewer (t: TextModels.Model; title: Views.Title);\r\t\tVAR v: TextViews.View; c: Containers.Controller; p: Properties.BoundsPref;\r\tBEGIN\r\t\tDialog.MapString(title, title);\r\t\tv := TextViews.dir.New(t);\r\t\tc := v.ThisController();\r\t\tIF c # NIL THEN\r\t\t\tc.SetOpts(c.opts - {Containers.noFocus, Containers.noSelection} + {Containers.noCaret})\r\t\tEND;\r\t\tp.w := Views.undefined; p.h := Views.undefined; Views.HandlePropMsg(v, p);\r\t\tViews.OpenAux(Documents.dir.New(v, p.w, p.h), title)\r\tEND OpenInfoViewer;\r\t\r\t\r\tPROCEDURE Next (b: Block): Block;\t"
                    attr: 0
                  - text: "(* next block in same cluster *)"
                    attr: 1
                  - text: "\r\t\tVAR size: INTEGER; tag: Kernel.Type;\r\tBEGIN\r\t\ttag := SYSTEM.VAL(Kernel.Type, SYSTEM.VAL(INTEGER, b.tag) DIV 4 * 4);\r\t\tsize := tag.size + 4;\r\t\tIF ODD(SYSTEM.VAL(INTEGER, b.tag) DIV 2) THEN size := b.size - SYSTEM.ADR(b.size) + size END;\r\t\tsize := (size + 15) DIV 16 * 16;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " SYSTEM.VAL(Block, SYSTEM.VAL(INTEGER, b) + size)\r\tEND Next;\r\r\tPROCEDURE ShowInterfaces (showHeader: BOOLEAN; VAR out: TextMappers.Formatter);\r\t\tVAR adr, end: INTEGER; modName, name, anchor: Kernel.Name;\r\t\t\ta0: TextModels.Attributes; cluster: Cluster; blk: Block;\r\tBEGIN\r\t\tIF showHeader THEN\r\t\t\tout.WriteString(\"Referenced Interface Records:\");\r\t\t\tout.WriteTab; out.WriteTab;\r\t\t\ta0 := out.rider.attr;\r\t\t\tout.rider.SetAttr(TextModels.NewStyle(out.rider.attr, {Fonts.underline}));\r\t\t\tout.rider.SetAttr(TextModels.NewColor(out.rider.attr, Ports.blue));\r\t\t\tout.WriteView(StdLinks.dir.NewLink(\"DevComDebug.ToggleAllInterfaces\"));\r\t\t\tIF all THEN out.WriteString(\"New\") ELSE out.WriteString(\"All\") END;\r\t\t\tout.WriteView(StdLinks.dir.NewLink(\"\"));\r\t\t\tout.WriteTab;\r\t\t\tout.WriteView(StdLinks.dir.NewLink(\"DevComDebug.UpdateInterfaceRecords\"));\r\t\t\tout.WriteString(\"Update\");\r\t\t\tout.WriteView(StdLinks.dir.NewLink(\"\"));\r\t\t\tout.rider.SetAttr(a0);\r\t\t\tout.WriteLn; out.WriteLn;\r\t\t\theaderLen := out.Pos()\r\t\tEND;\r\t\tcluster := SYSTEM.VAL(Cluster, Kernel.Root());\r\t\tWHILE cluster # NIL DO\r\t\t\tblk := SYSTEM.VAL(Block, SYSTEM.VAL(INTEGER, cluster) + 12);\r\t\t\tend := SYSTEM.VAL(INTEGER, blk) + (cluster.size - 12) DIV 16 * 16;\r\t\t\tWHILE SYSTEM.VAL(INTEGER, blk) < end DO\r\t\t\t\tIF ~(1 IN SYSTEM.VAL(SET, blk.tag))\r\t\t\t\t\t& (SYSTEM.VAL(INTEGER, blk.tag) # SYSTEM.ADR(blk.size))\r\t\t\t\t\t& (blk.tag.base[0] = NIL)\r\t\t\t\tTHEN\r\t\t\t\t\tKernel.GetModName(blk.tag.mod, modName);\r\t\t\t\t\tIF (all OR (modName # \"HostMechanisms\")\r\t\t\t\t\t\t\t& (modName # \"OleServer\")\r\t\t\t\t\t\t\t& (modName # \"OleClient\")\r\t\t\t\t\t\t\t& (modName # \"OleStorage\")\r\t\t\t\t\t\t\t& (modName # \"OleData\")) THEN\r\t\t\t\t\t\tadr := SYSTEM.ADR(blk.size);\r\t\t\t\t\t\tout.WriteString(\"ref: \");\r\t\t\t\t\t\tout.WriteInt(blk.ref); out.WriteTab;\r\t\t\t\t\t\tout.WriteString(modName); out.WriteChar(\".\");\r\t\t\t\t\t\tIF (blk.tag.id DIV 256 # 0) & (blk.tag.mod.refcnt >= 0) THEN\r\t\t\t\t\t\t\tKernel.GetTypeName(blk.tag, name); out.WriteString(name)\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tout.WriteString(\"RECORD\"); \r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tout.WriteTab;\r\t\t\t\t\t\tout.WriteChar(\"[\"); out.WriteIntForm(adr, TextMappers.hexadecimal, 9, \"0\", TextMappers.showBase);\r\t\t\t\t\t\tout.WriteChar(\"]\"); out.WriteChar(\" \");\r\t\t\t\t\t\tout.WriteView(DevDebug.HeapRefView(adr, \"Interface\"));\r\t\t\t\t\t\tDevHeapSpy.GetAnchor(adr, anchor);\r\t\t\t\t\t\tIF anchor # \"\" THEN\r\t\t\t\t\t\t\tout.WriteTab; out.WriteTab; out.WriteChar(\"(\");\r\t\t\t\t\t\t\tout.WriteString(anchor); out.WriteChar(\")\")\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tout.WriteLn\r\t\t\t\t\tEND;\r\t\t\t\tEND;\r\t\t\t\tblk := Next(blk)\r\t\t\tEND;\r\t\t\tcluster := cluster.next\r\t\tEND\r\tEND ShowInterfaces;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ShowInterfaceRecords
                    attr: 3
                  - text: "*;\r\t\tVAR out: TextMappers.Formatter;\r\tBEGIN\r\t\tout.ConnectTo(TextModels.CloneOf(StdLog.buf));\r\t\tShowInterfaces(TRUE, out);\r\t\tOpenViewer(out.rider.Base(), \"Interfaces\", NewRuler());\r\t\tout.ConnectTo(NIL)\r\tEND ShowInterfaceRecords;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: UpdateInterfaceRecords
                    attr: 3
                  - text: "*;\r\t\tVAR t, t0: TextModels.Model; out: TextMappers.Formatter;\r\tBEGIN\r\t\tt0 := TextViews.FocusText();\r\t\tModels.BeginModification(Models.notUndoable, t0);\r\t\tt0.Delete(headerLen, t0.Length());\t"
                    attr: 0
                  - text: "(* removes old object references from text *)"
                    attr: 1
                  - text: "\r\t\tViews.Update(TextViews.Focus(), Views.rebuildFrames);\r\t\tWindows.dir.Update(Windows.dir.First());\t"
                    attr: 0
                  - text: "(* remove frame references *)"
                    attr: 1
                  - text: "\r\t\tKernel.Collect;\r\t\tt := TextModels.CloneOf(t0); (*Stores.InitDomain(t, t0.domain);*) Stores.Join(t, t0);\r\t\tout.ConnectTo(t);\r\t\tShowInterfaces(FALSE, out);\r\t\tt0.Insert(headerLen, t, 0, t.Length());\r\t\tModels.EndModification(Models.notUndoable, t0);\r\t\tout.ConnectTo(NIL)\r\tEND UpdateInterfaceRecords;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ToggleAllInterfaces
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\tall := ~all;\r\t\tUpdateInterfaceRecords\r\tEND ToggleAllInterfaces;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ShowError
                    attr: 3
                  - text: "*;\r\t\tVAR res: INTEGER; c: TextControllers.Controller; r: TextModels.Reader; f: TextMappers.Formatter;\r\t\t\tbeg, end, i: INTEGER; str: ARRAY 1024 OF CHAR; ch: CHAR; s: ARRAY 64 OF CHAR;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tc.GetSelection(beg, end);\r\t\t\tr := c.text.NewReader(NIL);\r\t\t\tr.SetPos(beg); i := 0; r.ReadChar(ch);\r\t\t\tWHILE (beg + i < end) & (i < LEN(s) - 1) & (ch >= \" \") DO s[i] := ch; INC(i); r.ReadChar(ch) END;\r\t\t\ts[i] := 0X;\r\t\t\tStrings.StringToInt(s, i, res);\r\t\t\tIF res = 0 THEN\r\t\t\t\tf.ConnectTo(TextModels.CloneOf(StdLog.buf));\r\t\t\t\tf.WriteString(\"Error Code: \");\r\t\t\t\tf.WriteIntForm(i, TextMappers.hexadecimal, 9, \"0\", TRUE);\r\t\t\t\tf.WriteLn;\r\t\t\t\tf.WriteString(\"(Facility: \");\r\t\t\t\tCASE i DIV 10000H MOD 2000H OF\r\t\t\t\t| 0: f.WriteString(\"NULL, \")\r\t\t\t\t| 1: f.WriteString(\"RPC, \")\r\t\t\t\t| 2: f.WriteString(\"DISPATCH, \")\r\t\t\t\t| 3: f.WriteString(\"STORAGE, \")\r\t\t\t\t| 4: f.WriteString(\"ITF, \")\r\t\t\t\t| 7: f.WriteString(\"WIN32, \")\r\t\t\t\t| 8: f.WriteString(\"WINDOWS, \")\r\t\t\t\t| 10: f.WriteString(\"CONTROL, \")\r\t\t\t\tELSE f.WriteString(\"unknown, \")\r\t\t\t\tEND;\r\t\t\t\tf.WriteString(\"Severity: \");\r\t\t\t\tIF i < 0 THEN f.WriteString(\"Error, \") ELSE f.WriteString(\"Success, \") END;\r\t\t\t\tf.WriteString(\"Code: \");\r\t\t\t\tf.WriteInt(i MOD 10000H);\r\t\t\t\tf.WriteChar(\")\"); f.WriteLn;\r\t\t\t\tf.WriteString(\"Description:\");\r\t\t\t\tf.WriteLn;\r\t\t\t\ti := WinApi.FormatMessageW({12}, 0, i, 0, str, LEN(str), NIL);\r\t\t\t\tIF i > 0 THEN\r\t\t\t\t\tREPEAT DEC(i) UNTIL (i < 0) OR (str[i] >= \" \");\r\t\t\t\t\tstr[i + 1] := 0X;\r\t\t\t\tELSE str := \"\"\r\t\t\t\tEND;\r\t\t\t\tf.WriteString(str);\r\t\t\t\tf.WriteLn;\r\t\t\t\tOpenInfoViewer(f.rider.Base(), \"Show Error\");\r\t\t\t\tf.ConnectTo(NIL)\r\t\t\tEND\r\t\tEND\r\tEND ShowError;\r\t\r\tPROCEDURE Hex (VAR f: TextMappers.Formatter; x, n: INTEGER);\r\tBEGIN\r\t\tIF n > 1 THEN Hex(f, x DIV 16, n - 1) END;\r\t\tx := x MOD 16;\r\t\tIF x >= 10 THEN f.WriteChar(CHR(x + ORD(\"A\") - 10))\r\t\tELSE f.WriteChar(CHR(x + ORD(\"0\")))\r\t\tEND\r\tEND Hex;\r\r\tPROCEDURE "
                    attr: 0
                  - text: NewGuid
