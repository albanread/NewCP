                  - text: "\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tGenConOp(28H, src, dst)\r\t\t\tEND\r\t\tELSE\r\t\t\tGenDirOp(28H, src, dst)\r\t\tEND;\r\t\tIF ovflchk THEN DevCPE.GenByte(0CEH) END;\r\t\tIF (dst.mode # Reg) OR (dst.reg = AX) THEN a1.mode := 0; a2.mode := 0 END\r\tEND GenSub;\r\r\tPROCEDURE GenSubC* (VAR src, dst: Item; first, ovflchk: BOOLEAN);\r\t\tVAR op: INTEGER;\r\tBEGIN\r\t\tASSERT(Size[src.form] = Size[dst.form]);\r\t\tIF first THEN op := 28H ELSE op := 18H END;\r\t\tIF src.mode = Con THEN GenConOp(op, src, dst)\r\t\tELSE GenDirOp(op, src, dst)\r\t\tEND;\r\t\tIF ovflchk THEN DevCPE.GenByte(0CEH) END;\r\t\tIF (dst.mode # Reg) OR (dst.reg = AX) THEN a1.mode := 0; a2.mode := 0 END\r\tEND GenSubC;\r\r\tPROCEDURE GenComp* (VAR src, dst: Item);\r\t\tVAR w: INTEGER;\r\tBEGIN\r\t\tIF src.mode = Con THEN\r\t\t\tIF (src.offset = 0) & (src.obj = NIL) & (dst.mode = Reg) THEN \r\t\t\t\tCheckSize(dst.form, w); DevCPE.GenByte(8 + w); DevCPE.GenByte(0C0H + 9 * dst.reg) (* or r,r *)\r\t\t\tELSE GenConOp(38H, src, dst)\r\t\t\tEND\r\t\tELSE\r\t\t\tGenDirOp(38H, src, dst)\r\t\tEND\r\tEND GenComp;\r\t\r\tPROCEDURE GenAnd* (VAR src, dst: Item);\r\tBEGIN\r\t\tIF src.mode = Con THEN\r\t\t\tIF (src.obj # NIL) OR (src.offset # -1) THEN GenConOp(20H, src, dst) END\r\t\tELSE GenDirOp(20H, src, dst)\r\t\tEND;\r\t\tIF (dst.mode # Reg) OR (dst.reg = AX) THEN a1.mode := 0; a2.mode := 0 END\r\tEND GenAnd;\r\t\r\tPROCEDURE GenOr* (VAR src, dst: Item);\r\tBEGIN\r\t\tIF src.mode = Con THEN\r\t\t\tIF (src.obj # NIL) OR (src.offset # 0) THEN GenConOp(8H, src, dst) END\r\t\tELSE GenDirOp(8H, src, dst)\r\t\tEND;\r\t\tIF (dst.mode # Reg) OR (dst.reg = AX) THEN a1.mode := 0; a2.mode := 0 END\r\tEND GenOr;\r\t\r\tPROCEDURE GenXor* (VAR src, dst: Item);\r\tBEGIN\r\t\tIF src.mode = Con THEN\r\t\t\tIF (src.obj # NIL) OR (src.offset # 0) THEN GenConOp(30H, src, dst) END\r\t\tELSE GenDirOp(30H, src, dst)\r\t\tEND;\r\t\tIF (dst.mode # Reg) OR (dst.reg = AX) THEN a1.mode := 0; a2.mode := 0 END\r\tEND GenXor;\r\t\r\tPROCEDURE GenTest* (VAR x, y: Item);\r\t\tVAR w: INTEGER;\r\tBEGIN\r\t\tASSERT(Size[x.form] = Size[y.form]);\r\t\tCheckSize(x.form, w);\r\t\tIF x.mode = Con THEN\r\t\t\tIF (x.mode = Reg) & (x.reg = AX) THEN\r\t\t\t\tDevCPE.GenByte(0A8H + w); GenConst(x, FALSE)\r\t\t\tELSE\r\t\t\t\tDevCPE.GenByte(0F6H + w); GenCExt(0, y); GenConst(x, FALSE)\r\t\t\tEND\r\t\tELSE\r\t\t\tDevCPE.GenByte(84H + w);\r\t\t\tIF y.mode = Reg THEN GenDExt(y, x) ELSE GenDExt(x, y) END\r\t\tEND\r\tEND GenTest;\r\t\r\tPROCEDURE GenNeg* (VAR dst: Item; ovflchk: BOOLEAN);\r\t\tVAR w: INTEGER;\r\tBEGIN\r\t\tCheckSize(dst.form, w); DevCPE.GenByte(0F6H + w); GenCExt(18H, dst);\r\t\tIF ovflchk THEN DevCPE.GenByte(0CEH) END;\r\t\tIF (dst.mode # Reg) OR (dst.reg = AX) THEN a1.mode := 0; a2.mode := 0 END\r\tEND GenNeg;\r\t\r\tPROCEDURE GenNot* (VAR dst: Item);\r\t\tVAR w: INTEGER;\r\tBEGIN\r\t\tCheckSize(dst.form, w); DevCPE.GenByte(0F6H + w); GenCExt(10H, dst);\r\t\tIF (dst.mode # Reg) OR (dst.reg = AX) THEN a1.mode := 0; a2.mode := 0 END\r\tEND GenNot;\r\t\r\tPROCEDURE GenMul* (VAR src, dst: Item; ovflchk: BOOLEAN);\r\t\tVAR w, s, val, f2, f5, f9: INTEGER;\r\tBEGIN\r\t\tASSERT((dst.mode = Reg) & (Size[src.form] = Size[dst.form]));\r\t\tIF (src.mode = Con) & (src.offset = 1) THEN "
                    attr: 0
