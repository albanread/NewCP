                  - text: "\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tGenConOp(0, src, dst)\r\t\t\tEND\r\t\tELSE\r\t\t\tGenDirOp(0, src, dst)\r\t\tEND;\r\t\tIF ovflchk THEN DevCPE.GenByte(0CEH) END;\r\t\tIF (dst.mode # Reg) OR (dst.reg = AX) THEN a1.mode := 0; a2.mode := 0 END\r\tEND GenAdd;\r\t\r\tPROCEDURE GenAddC* (VAR src, dst: Item; first, ovflchk: BOOLEAN);\r\t\tVAR op: INTEGER;\r\tBEGIN\r\t\tASSERT(Size[src.form] = Size[dst.form]);\r\t\tIF first THEN op := 0 ELSE op := 10H END;\r\t\tIF src.mode = Con THEN GenConOp(op, src, dst)\r\t\tELSE GenDirOp(op, src, dst)\r\t\tEND;\r\t\tIF ovflchk THEN DevCPE.GenByte(0CEH) END;\r\t\tIF (dst.mode # Reg) OR (dst.reg = AX) THEN a1.mode := 0; a2.mode := 0 END\r\tEND GenAddC;\r\t\r\tPROCEDURE GenSub* (VAR src, dst: Item; ovflchk: BOOLEAN);\r\t\tVAR w: INTEGER;\r\tBEGIN\r\t\tASSERT(Size[src.form] = Size[dst.form]);\r\t\tIF src.mode = Con THEN\r\t\t\tIF src.obj = NIL THEN\r\t\t\t\tIF src.offset = 1 THEN\r\t\t\t\t\tIF (dst.mode = Reg) & (dst.form >= Int32) THEN DevCPE.GenByte(48H + dst.reg) (* dec *)\r\t\t\t\t\tELSE CheckSize(dst.form, w); DevCPE.GenByte(0FEH + w); GenCExt(8, dst)\r\t\t\t\t\tEND\r\t\t\t\tELSIF src.offset = -1 THEN\r\t\t\t\t\tIF (dst.mode = Reg) & (dst.form >= Int32) THEN DevCPE.GenByte(40H + dst.reg) (* inc *)\r\t\t\t\t\tELSE CheckSize(dst.form, w); DevCPE.GenByte(0FEH + w); GenCExt(0, dst)\r\t\t\t\t\tEND\r\t\t\t\tELSIF src.offset # 0 THEN\r\t\t\t\t\tGenConOp(28H, src, dst)\r\t\t\t\tELSE "
