                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT DevCPM, DevCPT, DevCPE;\r\t\r\tTYPE\r\t\tItem* = RECORD\r\t\t\tmode*,  tmode*, form*: BYTE;\r\t\t\toffset*, index*, reg*, scale*: INTEGER; (* adr = offset + index * scale *)\r\t\t\ttyp*: DevCPT.Struct;\r\t\t\tobj*: DevCPT.Object\r\t\tEND ;\r\t\t\r(* Items:\r\r"
                    attr: 0
                  - text: "\t mode\t| offset\tindex\t\tscale\t\treg     obj\r------------------------------------------------\r 1 Var\t | adr\t\t xreg\t\t scale\t\t\t\t\t  obj  (ea = FP + adr + xreg * scale)\r 2 VarPar| off     xreg     scale            obj  (ea = [FP + obj.adr] + off + xreg * scale)\r 3 Con\t | val              (val2)           NIL\r   Con   | off                               obj  (val = adr(obj) + off)\r\t Con\t | id\t\t\t\t\t\t\t\t\t\t\t\t\t\t    NIL  (for predefined reals)\r 6 LProc |                                   obj\r 7 XProc |                                   obj\r 9 CProc |                                   obj\t\t\t\t\t\t\r10 IProc |                                   obj\r13 TProc | mthno\t\t\t\t\t\t0/1\t\t          obj\t(0 = normal / 1 = super call)\r14 Ind\t | off\t\t xreg\t\t scale\t\tReg\t      \t(ea = Reg + off + xreg * scale)\r15 Abs\t | adr\t\t xreg\t\t scale\t\t\t\t    NIL  (ea = adr + xreg * scale) \r   Abs\t | off\t\t xreg\t\t scale\t\t\t\t    obj  (ea = adr(obj) + off + xreg * scale)\r   Abs   | off     len      0                obj  (for constant strings and reals)\r16 Stk\t |\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t      \t(ea = ESP)\r17 Cond\t| CC\r18 Reg\t |\t\t\t\t(Reg2)\t\t\t\t\t\t Reg\r19 DInd\t| off\t\t xreg\t\t scale\t\tReg\t      \t(ea = [Reg + off + xreg * scale])\r\r\ttmode\t| record tag     array desc\r-------------------------------------\r  VarPar | [FP + obj.adr + 4]  [FP + obj.adr]\r  Ind    | [Reg - 4]         [Reg + 8]\r  Con    | Adr(typ.strobj)\r"
                    attr: 3
                  - text: "\r*)\r\r\tCONST\r\t\tprocessor* = 10; (* for i386 *)\r\t\tNewLbl* = 0;\r\r\tTYPE\r\t\tLabel* = INTEGER; (* 0: unassigned, > 0: address, < 0: - (linkadr + linktype * 2^24) *)\r\t\t\r\tVAR\r\t\tlevel*: BYTE;\r\t\tone*: DevCPT.Const;\r\r\tCONST\r\t\t(* item base modes (=object modes) *)\r\t\tVar = 1; VarPar = 2; Con = 3; LProc = 6; XProc = 7; CProc = 9; IProc = 10; TProc = 13;\r\t\r\t\t(* item modes for i386 (must not overlap item basemodes,\t> 13) *)\r\t\tInd = 14; Abs = 15; Stk = 16; Cond = 17; Reg = 18; DInd = 19;\r\t\r\t\t(* structure forms *)\r\t\tUndef = 0; Byte = 1; Bool = 2; Char8 = 3; Int8 = 4; Int16 = 5; Int32 = 6;\r\t\tReal32 = 7; Real64 = 8; Set = 9; String8 = 10; NilTyp = 11; NoTyp = 12;\r\t\tPointer = 13; ProcTyp = 14; Comp = 15;\r\t\tChar16 = 16; String16 = 17; Int64 = 18; Guid = 23;\r\t\t\r\t\t(* composite structure forms *)\r\t\tBasic = 1; Array = 2; DynArr = 3; Record = 4;\r\t\t\r\t\t(* condition codes *)\r\t\tccB = 2; ccAE = 3; ccBE = 6; ccA = 7; (* unsigned *)\r\t\tccL = 12; ccGE = 13; ccLE = 14; ccG = 15; (* signed *)\r\t\tccE = 4; ccNE = 5; ccS = 8; ccNS = 9; ccO = 0; ccNO = 1;\r\t\tccAlways = -1; ccNever = -2; ccCall = -3;\r\t\t\r\t\t(* registers *)\r\t\tAX = 0; CX = 1; DX = 2; BX = 3; SP = 4; BP = 5; SI = 6; DI = 7; AH = 4; CH = 5; DH = 6; BH = 7;\r\t\t\r\t\t(* fixup types *)\r\t\tabsolute = 100; relative = 101; copy = 102; table = 103; tableend = 104; short = 105;\r\t\t\r\t\t(* system trap numbers *)\r\t\twithTrap = -1; caseTrap = -2; funcTrap = -3; typTrap = -4;\r\t\trecTrap = -5; ranTrap = -6; inxTrap = -7; copyTrap = -8;\r\t\t\r\r\tVAR\r\t\tSize: ARRAY 32 OF INTEGER;\t(* Size[typ.form] == +/- typ.size *)\r\t\ta1, a2: Item;\r\r\r\tPROCEDURE MakeReg* (VAR x: Item; reg: INTEGER; form: BYTE);\r\tBEGIN\r\t\tASSERT((reg >= 0) & (reg < 8));\r\t\tx.mode := Reg; x.reg := reg; x.form := form\r\tEND MakeReg;\r\t\r\tPROCEDURE MakeConst* (VAR x: Item; val: INTEGER; form: BYTE);\r\tBEGIN\r\t\tx.mode := Con; x.offset := val; x.form := form; x.obj := NIL;\r\tEND MakeConst;\r\r\tPROCEDURE AllocConst* (VAR x: Item; con: DevCPT.Const; form: BYTE);\r\t\tVAR r: REAL; short: SHORTREAL; c: DevCPT.Const; i: INTEGER;\r\tBEGIN\r\t\tIF form IN {Real32, Real64} THEN\r\t\t\tr := con.realval;\r\t\t\tIF ABS(r) <= MAX(SHORTREAL) THEN\r\t\t\t\tshort := SHORT(r);\r\t\t\t\tIF short = r THEN form := Real32\t(* a shortreal can represent the exact value *)\r\t\t\t\tELSE form := Real64\t(* use a real *)\r\t\t\t\tEND\r\t\t\tELSE form := Real64\t(* use a real *)\r\t\t\tEND\r\t\tELSIF form IN {String8, String16, Guid} THEN\r\t\t\tx.index := con.intval2\t(* string length *)\r\t\tEND;\r\t\tDevCPE.AllocConst(con, form, x.obj, x.offset);\r\t\tx.form := form; x.mode := Abs; x.scale := 0\r\tEND AllocConst;\r\r\t(*******************************************************)\r\t\r\tPROCEDURE BegStat*; (* general-purpose procedure which is called before each statement *)\r\tBEGIN\r\tEND BegStat;\r\r\tPROCEDURE EndStat*; (* general-purpose procedure which is called after each statement *)\r\tBEGIN\r\tEND EndStat;\r\r\t(*******************************************************)\r\t\r\tPROCEDURE SetLabel* (VAR L: Label);\r\t\tVAR link, typ, disp, x: INTEGER; c: SHORTCHAR;\r\tBEGIN\r\t\tASSERT(L <= 0); link := -L;\r\t\tWHILE link # 0 DO\r\t\t\ttyp := link DIV 1000000H; link := link MOD 1000000H;\r\t\t\tIF typ = short THEN\r\t\t\t\tdisp := DevCPE.pc - link - 1; ASSERT(disp < 128);\r\t\t\t\tDevCPE.PutByte(link, disp); link := 0\r\t\t\tELSIF typ = relative THEN\r\t\t\t\tx := DevCPE.ThisWord(link); DevCPE.PutWord(link, DevCPE.pc - link - 4); link := x\r\t\t\tELSE\r\t\t\t\tx := DevCPE.ThisWord(link); DevCPE.PutWord(link, DevCPE.pc + typ * 1000000H); link := x\r\t\t\tEND\r\t\tEND;\t\t\r\t\tL := DevCPE.pc;\r\t\ta1.mode := 0; a2.mode := 0\r\tEND SetLabel;\r\t\r\r\t(*******************************************************)\r\t\r\tPROCEDURE GenWord (x: INTEGER);\r\tBEGIN\r\t\tDevCPE.GenByte(x); DevCPE.GenByte(x DIV 256)\r\tEND GenWord;\r\r\tPROCEDURE GenDbl (x: INTEGER);\r\tBEGIN\r\t\tDevCPE.GenByte(x); DevCPE.GenByte(x DIV 256); DevCPE.GenByte(x DIV 10000H); DevCPE.GenByte(x DIV 1000000H)\r\tEND GenDbl;\r\t\r\tPROCEDURE CaseEntry* (tab, from, to: INTEGER);\r\t\tVAR a, e: INTEGER;\r\tBEGIN\r\t\ta := tab + 4 * from; e := tab + 4 * to;\r\t\tWHILE a <= e DO\r\t\t\tDevCPE.PutByte(a, DevCPE.pc);\r\t\t\tDevCPE.PutByte(a + 1, DevCPE.pc DIV 256);\r\t\t\tDevCPE.PutByte(a + 2, DevCPE.pc DIV 65536);\r\t\t\tINC(a, 4)\r\t\tEND;\r\t\ta1.mode := 0; a2.mode := 0\r\tEND CaseEntry;\r\r\tPROCEDURE GenLinked (VAR x: Item; type: BYTE);\r\t\tVAR link: DevCPT.LinkList;\r\tBEGIN\r\t\tIF x.obj = NIL THEN GenDbl(x.offset)\r\t\tELSE\r\t\t\tlink := DevCPE.OffsetLink(x.obj, x.offset);\r\t\t\tIF link # NIL THEN\r\t\t\t\tGenDbl(type * 1000000H + link.linkadr MOD 1000000H);\r\t\t\t\tlink.linkadr := DevCPE.pc - 4\r\t\t\tELSE GenDbl(0)\r\t\t\tEND\r\t\tEND\r\tEND GenLinked;\r\t\r\tPROCEDURE CheckSize (form: BYTE; VAR w: INTEGER);\r\tBEGIN\r\t\tIF form IN {Int16, Char16} THEN DevCPE.GenByte(66H); w := 1\r\t\tELSIF form >= Int32 THEN ASSERT(form IN {Int32, Set, NilTyp, Pointer, ProcTyp}); w := 1\r\t\tELSE w := 0\r\t\tEND\r\tEND CheckSize;\r\t\r\tPROCEDURE CheckForm (form: BYTE; VAR mf: INTEGER);\r\tBEGIN\r\t\tIF form = Real32 THEN mf := 0\r\t\tELSIF form = Real64 THEN mf := 4\r\t\tELSIF form = Int32 THEN mf := 2\r\t\tELSE ASSERT(form = Int16); mf := 6\r\t\tEND\r\tEND CheckForm;\r\t\r\tPROCEDURE CheckConst (VAR x: Item; VAR s: INTEGER);\r\tBEGIN\r\t\tIF (x.form > Int8) & (x.offset >= -128) & (x.offset < 128) & (x.obj = NIL) THEN s := 2\r\t\tELSE s := 0\r\t\tEND \r\tEND CheckConst;\r\t\r\tPROCEDURE GenConst (VAR x: Item; short: BOOLEAN);\r\tBEGIN\r\t\tIF x.obj # NIL THEN GenLinked(x, absolute)\r\t\tELSIF x.form <= Int8 THEN DevCPE.GenByte(x.offset)\r\t\tELSIF short & (x.offset >= -128) & (x.offset < 128) THEN DevCPE.GenByte(x.offset)\r\t\tELSIF x.form IN {Int16, Char16} THEN GenWord(x.offset)\r\t\tELSE GenDbl(x.offset)\r\t\tEND\r\tEND GenConst;\r\t\r\tPROCEDURE GenCExt (code: INTEGER; VAR x: Item);\r\t\tVAR disp, mod, base, scale: INTEGER;\r\tBEGIN\r\t\tASSERT(x.mode IN {Reg, Ind, Abs, Stk});\r\t\tASSERT((code MOD 8 = 0) & (code < 64));\r\t\tdisp := x.offset; base := x.reg; scale := x.scale;\r\t\tIF x.mode = Reg THEN mod := 0C0H; scale := 0\r\t\tELSIF x.mode = Stk THEN base := SP; mod := 0; disp := 0; scale := 0\r\t\tELSIF x.mode = Abs THEN\r\t\t\tIF scale = 1 THEN base := x.index; mod := 80H; scale := 0\r\t\t\tELSE base := BP; mod := 0\r\t\t\tEND\r\t\tELSIF (disp = 0) & (base # BP) THEN mod := 0\r\t\tELSIF (disp >= -128) & (disp < 128) THEN mod := 40H\r\t\tELSE mod := 80H\r\t\tEND;\r\t\tIF scale # 0 THEN\r\t\t\tDevCPE.GenByte(mod + code + 4); base := base + x.index * 8;\r\t\t\tIF scale = 8 THEN DevCPE.GenByte(0C0H + base);\r\t\t\tELSIF scale = 4 THEN DevCPE.GenByte(80H + base);\r\t\t\tELSIF scale = 2 THEN DevCPE.GenByte(40H + base);\r\t\t\tELSE ASSERT(scale = 1); DevCPE.GenByte(base);\r\t\t\tEND;\r\t\tELSE\r\t\t\tDevCPE.GenByte(mod + code + base);\r\t\t\tIF (base = SP) & (mod <= 80H) THEN DevCPE.GenByte(24H) END\r\t\tEND;\r\t\tIF x.mode = Abs THEN GenLinked(x, absolute)\r\t\tELSIF mod = 80H THEN GenDbl(disp)\r\t\tELSIF mod = 40H THEN DevCPE.GenByte(disp)\r\t\tEND\r\tEND GenCExt;\r\t\r\tPROCEDURE GenDExt (VAR r, x: Item);\r\tBEGIN\r\t\tASSERT(r.mode = Reg);\r\t\tGenCExt(r.reg * 8, x)\r\tEND GenDExt;\r\t\r\t(*******************************************************)\r\t\r\tPROCEDURE GenMove* (VAR from, to: Item);\r\t\tVAR w: INTEGER;\r\tBEGIN\r\t\tASSERT(Size[from.form] = Size[to.form]);\r\t\tIF to.mode = Reg THEN\r\t\t\tIF from.mode = Con THEN\r\t\t\t\tIF to.reg = AX THEN\r\r\t\t\t\t\tIF (a1.mode = Con) & (from.offset = a1.offset) & (from.obj = a1.obj) & (from.form = a1.form) THEN\r\t\t\t\t\t"
                    attr: 0
                  - text: "\tRETURN\r\t\t\t\t\t"
                    attr: 4
                  - text: "END;\r\r\t\t\t\t\ta1 := from; a2.mode := 0\r\t\t\t\tEND;\r\t\t\t\tCheckSize(from.form, w);\r\t\t\t\tIF (from.offset = 0) & (from.obj = NIL) THEN\r\t\t\t\t\tDevCPE.GenByte(30H + w); DevCPE.GenByte(0C0H + 9 * to.reg) (* XOR r,r *)\r\t\t\t\tELSE\r\t\t\t\t\tDevCPE.GenByte(0B0H + w * 8 + to.reg); GenConst(from, FALSE)\r\t\t\t\tEND;\r\t\t\tELSIF (to.reg = AX) & (from.mode = Abs) & (from.scale = 0) THEN\r\r\t\t\t\tIF (a1.mode = Abs) & (from.offset = a1.offset) & (from.obj = a1.obj) & (from.form = a1.form)\r\t\t\t\t\tOR (a2.mode = Abs) & (from.offset = a2.offset) & (from.obj = a2.obj) & (from.form = a2.form) THEN\r\t\t\t\t\t"
                    attr: 0
                  - text: "RETURN\r\t\t\t\t"
                    attr: 4
                  - text: "END;\r\r\t\t\t\ta1 := from; a2.mode := 0;\r\t\t\t\tCheckSize(from.form, w);\r\t\t\t\tDevCPE.GenByte(0A0H + w); GenLinked(from, absolute);\r\t\t\tELSIF (from.mode # Reg) OR (from.reg # to.reg) THEN\r\t\t\t\tIF to.reg = AX THEN\r\t\t\t\t\tIF (from.mode = Ind) & (from.scale = 0) & ((from.reg = BP) OR (from.reg = BX)) THEN\r\r\t\t\t\t\t\tIF (a1.mode = Ind) & (from.offset = a1.offset) & (from.reg = a1.reg) & (from.form = a1.form)\r\t\t\t\t\t\t\tOR (a2.mode = Ind) & (from.offset = a2.offset) & (from.reg = a2.reg) & (from.form = a2.form) THEN\r\t\t\t\t\t\t\t"
                    attr: 0
                  - text: "RETURN\r\t\t\t\t\t\t"
                    attr: 4
                  - text: "END;\r\r\t\t\t\t\t\ta1 := from\r\t\t\t\t\tELSE a1.mode := 0\r\t\t\t\t\tEND;\r\t\t\t\t\ta2.mode := 0\r\t\t\t\tEND;\r\t\t\t\tCheckSize(from.form, w);\r\t\t\t\tDevCPE.GenByte(8AH + w); GenDExt(to, from)\r\t\t\tEND \r\t\tELSE\r\t\t\tCheckSize(from.form, w);\r\t\t\tIF from.mode = Con THEN\r\t\t\t\tDevCPE.GenByte(0C6H + w); GenCExt(0, to); GenConst(from, FALSE);\r\t\t\t\ta1.mode := 0; a2.mode := 0\r\t\t\tELSIF (from.reg = AX) & (to.mode = Abs) & (to.scale = 0) THEN\r\t\t\t\tDevCPE.GenByte(0A2H + w); GenLinked(to, absolute);\r\t\t\t\ta2 := to\r\t\t\tELSE\r\t\t\t\tDevCPE.GenByte(88H + w); GenDExt(from, to);\r\t\t\t\tIF from.reg = AX THEN\r\t\t\t\t\tIF (to.mode = Ind) & (to.scale = 0) & ((to.reg = BP) OR (to.reg = BX)) THEN a2 := to END\r\t\t\t\tELSE a1.mode := 0; a2.mode := 0\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND GenMove;\r\t\r\tPROCEDURE GenExtMove* (VAR from, to: Item);\r\t\tVAR w, op: INTEGER;\r\tBEGIN\r\t\tASSERT(from.mode # Con);\r\t\tIF from.form IN {Byte, Char8, Char16} THEN op := 0B6H (* MOVZX *)\r\t\tELSE op := 0BEH (* MOVSX *)\r\t\tEND;\r\t\tIF from.form IN {Int16, Char16} THEN INC(op) END;\r\t\tDevCPE.GenByte(0FH); DevCPE.GenByte(op); GenDExt(to, from);\r\t\tIF to.reg = AX THEN a1.mode := 0; a2.mode := 0 END\r\tEND GenExtMove;\r\t\r\tPROCEDURE GenSignExt* (VAR from, to: Item);\r\tBEGIN\r\t\tASSERT(to.mode = Reg);\r\t\tIF (from.mode = Reg) & (from.reg = AX) & (to.reg = DX) THEN\r\t\t\tDevCPE.GenByte(99H)\t(* cdq *)\r\t\tELSE\r\t\t\tGenMove(from, to);\t(* mov to, from *)\r\t\t\tDevCPE.GenByte(0C1H); GenCExt(38H, to); DevCPE.GenByte(31)\t(* sar to, 31 *)\r\t\tEND\r\tEND GenSignExt;\r\t\r\tPROCEDURE GenLoadAdr* (VAR from, to: Item);\r\tBEGIN\r\t\tASSERT(to.form IN {Int32, Pointer, ProcTyp});\r\t\tIF (from.mode = Abs) & (from.scale = 0) THEN\r\t\t\tDevCPE.GenByte(0B8H + to.reg); GenLinked(from, absolute)\r\t\tELSIF from.mode = Stk THEN\r\t\t\tDevCPE.GenByte(89H); GenCExt(SP * 8, to)\r\t\tELSIF (from.mode # Ind) OR (from.offset # 0) OR (from.scale # 0) THEN\r\t\t\tDevCPE.GenByte(8DH); GenDExt(to, from)\r\t\tELSIF from.reg # to.reg THEN\r\t\t\tDevCPE.GenByte(89H); GenCExt(from.reg * 8, to)\r\t\tELSE RETURN\r\t\tEND;\r\t\tIF to.reg = AX THEN a1.mode := 0; a2.mode := 0 END\r\tEND GenLoadAdr;\r\r\tPROCEDURE GenPush* (VAR src: Item);\r\t\tVAR s: INTEGER;\r\tBEGIN\r\t\tIF src.mode = Con THEN\r\t\t\tASSERT(src.form >= Int32);\r\t\t\tCheckConst(src, s); DevCPE.GenByte(68H + s); GenConst(src, TRUE)\r\t\tELSIF src.mode = Reg THEN\r\t\t\tASSERT((src.form >= Int16) OR (src.reg < 4));\r\t\t\tDevCPE.GenByte(50H + src.reg)\r\t\tELSE\r\t\t\tASSERT(src.form >= Int32);\r\t\t\tDevCPE.GenByte(0FFH); GenCExt(30H, src)\r\t\tEND\r\tEND GenPush;\r\t\r\tPROCEDURE GenPop* (VAR dst: Item);\r\tBEGIN\r\t\tIF dst.mode = Reg THEN\r\t\t\tASSERT((dst.form >= Int16) OR (dst.reg < 4));\r\t\t\tDevCPE.GenByte(58H + dst.reg);\r\t\t\tIF dst.reg = AX THEN a1.mode := 0; a2.mode := 0 END\r\t\tELSE\r\t\t\tDevCPE.GenByte(08FH); GenCExt(0, dst) \r\t\tEND\r\tEND GenPop;\r\t\r\tPROCEDURE GenConOp (op: INTEGER; VAR src, dst: Item);\r\t\tVAR w, s: INTEGER;\r\tBEGIN\r\t\tASSERT(Size[src.form] = Size[dst.form]);\r\t\tCheckSize(src.form, w);\r\t\tCheckConst(src, s);\r\t\tIF (dst.mode = Reg) & (dst.reg = AX) & (s = 0) THEN\r\t\t\tDevCPE.GenByte(op + 4 + w); GenConst(src, FALSE)\r\t\tELSE\r\t\t\tDevCPE.GenByte(80H + s + w); GenCExt(op, dst); GenConst(src, TRUE)\r\t\tEND\r\tEND GenConOp;\r\t\r\tPROCEDURE GenDirOp (op: INTEGER; VAR src, dst: Item);\r\t\tVAR w: INTEGER;\r\tBEGIN\r\t\tASSERT(Size[src.form] = Size[dst.form]);\r\t\tCheckSize(src.form, w);\r\t\tIF dst.mode = Reg THEN\r\t\t\tDevCPE.GenByte(op + 2 + w); GenDExt(dst, src)\r\t\tELSE\r\t\t\tDevCPE.GenByte(op + w); GenDExt(src, dst)\r\t\tEND\r\tEND GenDirOp;\r\r\tPROCEDURE GenAdd* (VAR src, dst: Item; ovflchk: BOOLEAN);\r\t\tVAR w: INTEGER;\r\tBEGIN\r\t\tASSERT(Size[src.form] = Size[dst.form]);\r\t\tIF src.mode = Con THEN\r\t\t\tIF src.obj = NIL THEN\r\t\t\t\tIF src.offset = 1 THEN\r\t\t\t\t\tIF (dst.mode = Reg) & (dst.form >= Int32) THEN DevCPE.GenByte(40H + dst.reg) (* inc *)\r\t\t\t\t\tELSE CheckSize(dst.form, w); DevCPE.GenByte(0FEH + w); GenCExt(0, dst)\r\t\t\t\t\tEND\r\t\t\t\tELSIF src.offset = -1 THEN\r\t\t\t\t\tIF (dst.mode = Reg) & (dst.form >= Int32) THEN DevCPE.GenByte(48H + dst.reg) (* dec *)\r\t\t\t\t\tELSE CheckSize(dst.form, w); DevCPE.GenByte(0FEH + w); GenCExt(8, dst)\r\t\t\t\t\tEND\r\t\t\t\tELSIF src.offset # 0 THEN\r\t\t\t\t\tGenConOp(0, src, dst)\r\t\t\t\tELSE "
