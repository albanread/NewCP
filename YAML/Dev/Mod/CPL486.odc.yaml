                  - text: "\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tCheckSize(src.form, w); CheckConst(src, s);\r\t\t\tDevCPE.GenByte(69H + s); GenDExt(dst, dst); GenConst(src, TRUE)\r\t\tELSE\r\t\t\tCheckSize(src.form, w);\r\t\t\tDevCPE.GenByte(0FH); DevCPE.GenByte(0AFH); GenDExt(dst, src)\r\t\tEND;\r\t\tIF ovflchk THEN DevCPE.GenByte(0CEH) END;\r\t\tIF dst.reg = AX THEN a1.mode := 0; a2.mode := 0 END\r\tEND GenMul;\r\t\r\tPROCEDURE GenDiv* (VAR src: Item; mod, pos: BOOLEAN);\r\t\tVAR w, rem: INTEGER;\r\tBEGIN\r\t\tASSERT(src.mode = Reg);\r\t\tIF src.form >= Int32 THEN DevCPE.GenByte(99H) (* cdq *)\r\t\tELSIF src.form = Int16 THEN DevCPE.GenByte(66H); DevCPE.GenByte(99H) (* cwd *)\r\t\tELSE DevCPE.GenByte(66H); DevCPE.GenByte(98H) (* cbw *)\r\t\tEND;\r\t\tCheckSize(src.form, w); DevCPE.GenByte(0F6H + w); GenCExt(38H, src); (* idiv src *)\r\t\tIF src.form > Int8 THEN rem := 2 (* edx *) ELSE rem := 4 (* ah *) END;\r\t\tIF pos THEN (* src > 0 *)\r\t\t\tCheckSize(src.form, w); DevCPE.GenByte(8 + w); DevCPE.GenByte(0C0H + 9 * rem); (* or rem,rem *)\r\t\t\tIF mod THEN\r\t\t\t\tDevCPE.GenByte(79H); DevCPE.GenByte(2);\t(* jns end *)\r\t\t\t\tDevCPE.GenByte(2 + w); GenCExt(8 * rem, src); (* add rem,src *)\r\t\t\tELSE\r\t\t\t\tDevCPE.GenByte(79H); DevCPE.GenByte(1);\t(* jns end *)\r\t\t\t\tDevCPE.GenByte(48H);\t\t\t\t\t(* dec eax *)\r\t\t\tEND\r\t\tELSE\r\t\t\tCheckSize(src.form, w); DevCPE.GenByte(30H + w); GenCExt(8 * rem, src); (* xor src,rem *)\r\t\t\tIF mod THEN\r\t\t\t\tDevCPE.GenByte(79H);\t(* jns end *)\r\t\t\t\tIF src.form = Int16 THEN DevCPE.GenByte(9); DevCPE.GenByte(66H) ELSE DevCPE.GenByte(8) END;\r\t\t\t\tDevCPE.GenByte(8 + w); DevCPE.GenByte(0C0H + 9 * rem); (* or rem,rem *)\r\t\t\t\tDevCPE.GenByte(74H); DevCPE.GenByte(4);\t(* je end *)\r\t\t\t\tDevCPE.GenByte(30H + w); GenCExt(8 * rem, src); (* xor src,rem *)\r\t\t\t\tDevCPE.GenByte(2 + w); GenCExt(8 * rem, src); (* add rem,src *)\r\t\t\tELSE\r\t\t\t\tDevCPE.GenByte(79H);\t(* jns end *)\r\t\t\t\tIF src.form = Int16 T