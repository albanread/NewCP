                  - text: " END;\r\t\tIF src.form <= Int8 THEN\r\t\t\tASSERT(dst.reg = 0);\r\t\t\tDevCPE.GenByte(0F6H); GenCExt(28H, src)\r\t\tELSIF src.mode = Con THEN\r\t\t\tval := src.offset;\r\t\t\tIF (src.obj = NIL) & (val # 0) & ~ovflchk THEN\r\t\t\t\tf2 := 0; f5 := 0; f9 := 0;\r\t\t\t\tWHILE ~ODD(val) DO val := val DIV 2; INC(f2) END;\r\t\t\t\tWHILE val MOD 9 = 0 DO val := val DIV 9; INC(f9) END;\r\t\t\t\tWHILE val MOD 5 = 0 DO val := val DIV 5; INC(f5) END;\r\t\t\t\tIF ABS(val) <= 3 THEN\r\t\t\t\t\tWHILE f9 > 0 DO\r\t\t\t\t\t\tDevCPE.GenByte(8DH);\r\t\t\t\t\t\tDevCPE.GenByte(dst.reg * 8 + 4);\r\t\t\t\t\t\tDevCPE.GenByte(0C0H + dst.reg * 9);\r\t\t\t\t\t\tDEC(f9)\r\t\t\t\t\tEND;\r\t\t\t\t\tWHILE f5 > 0 DO\r\t\t\t\t\t\tDevCPE.GenByte(8DH);\r\t\t\t\t\t\tDevCPE.GenByte(dst.reg * 8 + 4);\r\t\t\t\t\t\tDevCPE.GenByte(80H + dst.reg * 9);\r\t\t\t\t\t\tDEC(f5)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF ABS(val) = 3 THEN\r\t\t\t\t\t\tDevCPE.GenByte(8DH); DevCPE.GenByte(dst.reg * 8 + 4); DevCPE.GenByte(40H + dst.reg * 9)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF f2 > 1 THEN DevCPE.GenByte(0C1H); DevCPE.GenByte(0E0H + dst.reg); DevCPE.GenByte(f2)\r\t\t\t\t\tELSIF f2 = 1 THEN DevCPE.GenByte(1); DevCPE.GenByte(0C0H + dst.reg * 9)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF val < 0 THEN DevCPE.GenByte(0F7H); GenCExt(18H, dst) END;\r\t\t\t\t\tIF dst.reg = AX THEN a1.mode := 0; a2.mode := 0 END;\r\t\t\t\t\t"
                    attr: 0
