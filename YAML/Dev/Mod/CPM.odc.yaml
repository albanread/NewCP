                  - text: "(* fingerprinting *)\r"
                    attr: 1
                  - text: "\r\tPROCEDURE InitCrcTab;\r"
                    attr: 0
                  - text: "\t\t(* CRC32, high bit first, pre & post inverted *)\r"
                    attr: 1
                  - text: "\t\tCONST poly = {0, 1, 2, 4, 5, 7, 8, 10, 11, 12, 16, 22, 23, 26};\t"
                    attr: 0
                  - text: "(* CRC32 polynom *)"
                    attr: 1
                  - text: "\r\t\tVAR x, c, i: INTEGER;\r\tBEGIN\r\t\tx := 0;\r\t\tWHILE x < 256 DO\r\t\t\tc := x * 1000000H; i := 0;\r\t\t\tWHILE i < 8 DO\r\t\t\t\tIF c < 0 THEN c := ORD(BITS(c * 2) / poly)\r\t\t\t\tELSE c := c * 2\r\t\t\t\tEND;\r\t\t\t\tINC(i)\r\t\t\tEND;\r\t\t\tcrc32tab[ORD(BITS(x) / BITS(255))] := ORD(BITS(c) / BITS(255));\r\t\t\tINC(x)\r\t\tEND\r\tEND InitCrcTab;\r\t\r\tPROCEDURE "
