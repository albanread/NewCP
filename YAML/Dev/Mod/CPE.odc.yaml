                  - text: "* (obj: DevCPT.Object);\r\t\tVAR f: BYTE;\r\tBEGIN\r\t\tIF outRef & (obj # NIL) THEN\r\t\t\tOutRefs(obj.left);\r\t\t\tIF ((obj.mode = Var) OR (obj.mode = VarPar))"
                    attr: 0
                  - text: " & (obj.history # removed)"
                    attr: 3
                  - text: " & (obj.name[0] # \"@\") THEN\r\t\t\t\tf := obj.typ.form;\r\t\t\t\tIF (f IN {Byte .. Set, Pointer, ProcTyp, Char16, Int64}) \r\t\t\t\t\t\tOR outURef & (obj.typ.comp # DynArr)\r\t\t\t\t\t\tOR outAllRef & ~obj.typ.untagged\r\t\t\t\t\t\tOR (obj.typ.comp = Array) & (obj.typ.BaseTyp.form = Char8) THEN\r\t\t\t\t\tIF obj.mode = Var THEN DevCPM.ObjW(0FDX) ELSE DevCPM.ObjW(0FFX) END;\r\t\t\t\t\tIF obj.typ = DevCPT.anyptrtyp THEN DevCPM.ObjW(SHORT(CHR(mAnyPtr)))\r\t\t\t\t\tELSIF obj.typ = DevCPT.anytyp THEN DevCPM.ObjW(SHORT(CHR(mAnyRec)))\r\t\t\t\t\tELSIF obj.typ = DevCPT.sysptrtyp THEN DevCPM.ObjW(SHORT(CHR(mSysPtr)))\r\t\t\t\t\tELSIF f = Char16 THEN DevCPM.ObjW(SHORT(CHR(mChar16)))\r\t\t\t\t\tELSIF f = Int64 THEN DevCPM.ObjW(SHORT(CHR(mInt64)))\r\t\t\t\t\tELSIF obj.typ = DevCPT.guidtyp THEN DevCPM.ObjW(SHORT(CHR(mGuid)))\r\t\t\t\t\tELSIF obj.typ = DevCPT.restyp THEN DevCPM.ObjW(SHORT(CHR(mResult)))\r\t\t\t\t\tELSIF f = Pointer THEN\r\t\t\t\t\t\tIF obj.typ.sysflag = interface THEN DevCPM.ObjW(SHORT(CHR(mInterface)))\r\t\t\t\t\t\tELSIF obj.typ.untagged THEN DevCPM.ObjW(SHORT(CHR(mSysPtr)))\r\t\t\t\t\t\tELSE DevCPM.ObjW(10X); OutReference(TypeObj(obj.typ), 0, absolute)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSIF (f = Comp) & outAllRef & (~obj.typ.untagged OR outURef & (obj.typ.comp # DynArr)) THEN\r\t\t\t\t\t\tDevCPM.ObjW(10X); OutReference(TypeObj(obj.typ), 0, absolute)\r\t\t\t\t\tELSIF f < Int8 THEN DevCPM.ObjW(SHORT(CHR(f - 1)))\r\t\t\t\t\tELSE DevCPM.ObjW(SHORT(CHR(f)))\r\t\t\t\t\tEND;\r\t\t\t\t\tIF obj.mnolev = 0 THEN DevCPM.ObjWNum(obj.adr + dsize) ELSE DevCPM.ObjWNum(obj.adr) END;\r\t\t\t\t\tOutName(obj.name^)\r\t\t\t\tEND\r\t\t\tEND ;\r\t\t\tOutRefs(obj.right)\r\t\tEND\r\tEND OutRefs;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: OutSourceRef
                    attr: 3
                  - text: "* (pos: INTEGER);\r\tBEGIN\r\t\tIF outSrc & (pos # 0) & (pos # srcPos) & (pc > codePos) THEN\r\t\t\tWHILE pc > codePos + 250 DO\r\t\t\t\tDevCPM.ObjW(SHORT(CHR(250)));\r\t\t\t\tINC(codePos, 250);\r\t\t\t\tDevCPM.ObjWNum(0)\r\t\t\tEND;\r\t\t\tDevCPM.ObjW(SHORT(CHR(pc - codePos)));\r\t\t\tcodePos := pc;\r\t\t\tDevCPM.ObjWNum(pos - srcPos);\r\t\t\tsrcPos := pos\r\t\tEND\r\tEND OutSourceRef;\r\r\t\r\tPROCEDURE OutPLink (link: DevCPT.LinkList; adr: INTEGER);\r\tBEGIN\r\t\tWHILE link # NIL DO\r\t\t\t"
                    attr: 0
                  - text: "ASSERT(link.linkadr # 0);"
                    attr: 3
                  - text: "\r\t\t\tDevCPM.ObjWNum(link.linkadr);\r\t\t\tDevCPM.ObjWNum(adr + link.offset);\r\t\t\tlink := link.next\r\t\tEND\r\tEND OutPLink;\r\r\tPROCEDURE OutLink (link: DevCPT.LinkList);\r\tBEGIN\r\t\tOutPLink(link, 0); DevCPM.ObjW(0X)\r\tEND OutLink;\r\t\r\tPROCEDURE OutNames;\r\t\tVAR a, b, c: DevCPT.Object;\r\tBEGIN\r\t\ta := nameList; b := NIL;\r\t\tWHILE a # NIL DO c := a; a := c.nlink; c.nlink := b; b := c END;\r\t\tDevCPM.ObjW(0X);\t(* names[0] = 0X *)\r\t\tWHILE b # NIL DO\r\t\t\tOutName(b.name^);\r\t\t\tb := b.nlink\r\t\tEND;\r\tEND OutNames;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: OutGuid
                    attr: 3
                  - text: "* (VAR str: ARRAY OF SHORTCHAR);\r\t\t\r\t\tPROCEDURE Copy (n: INTEGER);\r\t\t\tVAR x, y: INTEGER;\r\t\tBEGIN\r\t\t\tx := ORD(str[n]); y := ORD(str[n + 1]);\r\t\t\tIF x >= ORD(\"a\") THEN DEC(x, ORD(\"a\") - 10)\r\t\t\tELSIF x >= ORD(\"A\") THEN DEC(x, ORD(\"A\") - 10)\r\t\t\tELSE DEC(x, ORD(\"0\"))\r\t\t\tEND;\r\t\t\tIF y >= ORD(\"a\") THEN DEC(y, ORD(\"a\") - 10)\r\t\t\tELSIF y >= ORD(\"A\") THEN DEC(y, ORD(\"A\") - 10)\r\t\t\tELSE DEC(y, ORD(\"0\"))\r\t\t\tEND;\r\t\t\tDevCPM.ObjW(SHORT(CHR(x * 16 + y)))\r\t\tEND Copy;\r\t\t\r\tBEGIN\r\t\tIF bigEndian THEN\r\t\t\tCopy(1); Copy(3); Copy(5); Copy(7); Copy(10); Copy(12); Copy(15); Copy(17)\r\t\tELSE\r\t\t\tCopy(7); Copy(5); Copy(3); Copy(1); Copy(12); Copy(10); Copy(17); Copy(15)\r\t\tEND;\r\t\tCopy(20); Copy(22); Copy(25); Copy(27); Copy(29); Copy(31); Copy(33); Copy(35)\r\tEND OutGuid;\r\r\tPROCEDURE OutConst (obj: DevCPT.Object);\r\t\tTYPE A4 = ARRAY 4 OF SHORTCHAR; A8 = ARRAY 8 OF SHORTCHAR;\r\t\tVAR a, b, c: DevCPT.Const; r: SHORTREAL; lr: REAL; a4: A4; a8: A8; ch: SHORTCHAR; i, x, hi, low: INTEGER;\r\tBEGIN\r\t\ta := obj.conval; b := NIL;\r\t\tWHILE a # NIL DO c := a; a := c.link; c.link := b; b := c END;\r\t\tWHILE b # NIL DO\r\t\t\tIF String8 IN b.setval THEN\r\t\t\t\tDevCPM.ObjWBytes(b.ext^, b.intval2);\r\t\t\t\tAlign(4)\r\t\t\tELSIF String16 IN b.setval THEN\r\t\t\t\ti := 0; REPEAT DevCPM.GetUtf8(b.ext^, x, i); Out2(x) UNTIL x = 0;\r\t\t\t\tAlign(4)\r\t\t\tELSIF Real32 IN b.setval THEN\r\t\t\t\tr := SHORT(b.realval); a4 := SYSTEM.VAL(A4, r);\r\t\t\t\tIF DevCPM.LEHost = bigEndian THEN\r\t\t\t\t\tch := a4[0]; a4[0] := a4[3]; a4[3] := ch;\r\t\t\t\t\tch := a4[1]; a4[1] := a4[2]; a4[2] := ch\r\t\t\t\tEND;\r\t\t\t\tDevCPM.ObjWBytes(a4, 4)\r\t\t\tELSIF Real64 IN b.setval THEN\r\t\t\t\ta8 := SYSTEM.VAL(A8, b.realval);\r\t\t\t\tIF DevCPM.LEHost = bigEndian THEN\r\t\t\t\t\tch := a8[0]; a8[0] := a8[7]; a8[7] := ch;\r\t\t\t\t\tch := a8[1]; a8[1] := a8[6]; a8[6] := ch;\r\t\t\t\t\tch := a8[2]; a8[2] := a8[5]; a8[5] := ch;\r\t\t\t\t\tch := a8[3]; a8[3] := a8[4]; a8[4] := ch\r\t\t\t\tEND;\r\t\t\t\tDevCPM.ObjWBytes(a8, 8)\r\t\t\tELSIF Int64 IN b.setval THEN\r\t\t\t"
                    attr: 0
                  - text: "\t(* intval moved to intval2 by AllocConst *)"
                    attr: 1
                  - text: "\r\t\t\t\tx := b.intval; b.intval := b.intval2; GetLongWords(b, hi, low); b.intval := x;\r\t\t\t\tIF bigEndian THEN Out4(hi); Out4(low) ELSE Out4(low); Out4(hi) END\r\t\t\tELSIF Guid IN b.setval THEN\r\t\t\t\tOutGuid(b.ext^)\r\t\t\tEND;\r\t\t\tb := b.link\r\t\tEND\r\tEND OutConst;\r\t\r\tPROCEDURE OutStruct (typ: DevCPT.Struct; unt: BOOLEAN);\r\tBEGIN\r\t\tIF typ = NIL THEN Out4(0)\r\t\tELSIF typ = DevCPT.sysptrtyp THEN Out4(mSysPtr)\r\t\tELSIF typ = DevCPT.anytyp THEN Out4(mAnyRec)"
                    attr: 0
                  - text: "\r\t\t"
                    attr: 3
                  - text: "ELSIF typ = DevCPT.anyptrtyp THEN Out4(mAnyPtr)\r\t\tELSIF typ = DevCPT.guidtyp THEN Out4(mGuid)\r\t\tELSIF typ = DevCPT.restyp THEN Out4(mResult)\r\t\tELSE\r\t\t\tCASE typ.form OF\r\t\t\t| Undef, Byte, String8, NilTyp, NoTyp, String16: Out4(0)\r\t\t\t| Bool, Char8: Out4(typ.form - 1)\r\t\t\t| Int8..Set: Out4(typ.form)\r\t\t\t| Char16: Out4(mChar16)\r\t\t\t| Int64: Out4(mInt64)\r\t\t\t| ProcTyp: OutReference(TypeObj(typ), 0, absolute)\r\t\t\t| Pointer:\r\t\t\t\tIF typ.sysflag = interface THEN Out4(mInterface)\r\t\t\t\tELSIF typ.untagged THEN Out4(mSysPtr)\r\t\t\t\tELSE OutReference(TypeObj(typ), 0, absolute)\r\t\t\t\tEND\r\t\t\t| Comp:\r\t\t\t\tIF ~typ.untagged OR (outURef & unt) THEN OutReference(TypeObj(typ), 0, absolute)\r\t\t\t\tELSE Out4(0)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND OutStruct;\r\t\r\tPROCEDURE NameIdx (obj: DevCPT.Object): INTEGER;\r\t\tVAR n: INTEGER;\r\tBEGIN\r\t\tn := 0;\r\t\tIF obj.name # DevCPT.null THEN\r\t\t\tIF obj.num = 0 THEN\r\t\t\t\tobj.num := namex;\r\t\t\t\tWHILE obj.name[n] # 0X DO INC(n) END;\r\t\t\t\tINC(namex, n + 1);\r\t\t\t\tobj.nlink := nameList; nameList := obj\r\t\t\tEND;\r\t\t\tn := obj.num;\r\t\tEND;\r\t\tRETURN n\r\tEND NameIdx;\r\t\r\tPROCEDURE OutSignature (par: DevCPT.Object; retTyp: DevCPT.Struct; OUT pos: INTEGER);\r\t\tVAR p: DevCPT.Object; n, m: INTEGER;\r\tBEGIN\r\t\tpos := DevCPM.ObjLen() - headSize;\r\t\tOutStruct(retTyp, TRUE);\r\t\tp := par; n := 0;\r\t\tWHILE p # NIL DO INC(n); p := p.link END;\r\t\tOut4(n); p := par;\r\t\tWHILE p # NIL DO\r\t\t\tIF p.mode # VarPar THEN m := mValue\r\t\t\tELSIF p.vis = inPar THEN m := mInPar\r\t\t\tELSIF p.vis = outPar THEN m := mOutPar\r\t\t\tELSE m := mVarPar\r\t\t\tEND;\r\t\t\tOut4(NameIdx(p) * 256 + m);\r\t\t\tOutStruct(p.typ, TRUE);\r\t\t\tp := p.link\r\t\tEND\r\tEND OutSignature;\r\t\r\tPROCEDURE PrepObject (obj: DevCPT.Object);\r\tBEGIN\r\t\tIF (obj.mode IN {LProc, XProc, IProc}) & outSignatures THEN"
                    attr: 0
                  - text: "\t(* write param list *)"
                    attr: 1
                  - text: "\r\t\t\tOutSignature(obj.link, obj.typ, obj.conval.intval)\r\t\tEND\r\tEND PrepObject;\r\t\r\tPROCEDURE OutObject (mode, fprint, offs: INTEGER; typ: DevCPT.Struct; obj: DevCPT.Object);\r\t\tVAR vis: INTEGER;\r\tBEGIN\r\t\tOut4(fprint);\r\t\tOut4(offs);\r\t\tIF obj.vis = internal THEN vis := mInternal\r\t\tELSIF obj.vis = externalR THEN vis := mReadonly\r\t\tELSIF obj.vis = external THEN vis := mExported\r\t\tEND;\r\t\tOut4(mode + vis * 16 + NameIdx(obj) * 256);\r\t\tIF (mode = mProc) & outSignatures THEN OutReference(Meta, obj.conval.intval, absolute)\t"
                    attr: 0
                  - text: "(* ref to par list *)"
                    attr: 1
                  - text: "\r\t\tELSE OutStruct(typ, mode = mField)\r\t\tEND\r\tEND OutObject;\r\t\r\tPROCEDURE PrepDesc (desc: DevCPT.Struct);\r\t\tVAR fld: DevCPT.Object; n: INTEGER; l: DevCPT.LinkList; b: DevCPT.Struct;\r\tBEGIN\r\t\tIF desc.comp = Record THEN\t(* write field list *)\r\t\t\tdesc.strobj.adr := DevCPM.ObjLen() - headSize;\r\t\t\tn := 0; fld := desc.link;\r\t\t\tWHILE (fld # NIL) & (fld.mode = Fld) DO\r\t\t\t\tIF expAllFields OR (fld.vis # internal) THEN INC(n) END;\r\t\t\t\tfld := fld.link\r\t\t\tEND;\r\t\t\tOut4(n); fld := desc.link;\r\t\t\tWHILE (fld # NIL) & (fld.mode = Fld) DO\r\t\t\t\tIF expAllFields OR (fld.vis # internal) THEN\r\t\t\t\t\tOutObject(mField, 0, fld.adr, fld.typ, fld)\r\t\t\t\tEND;\r\t\t\t\tfld := fld.link\r\t\t\tEND\r\t\tELSIF (desc.form = ProcTyp) & outSignatures THEN\t"
                    attr: 0
                  - text: "(* write param list *)"
                    attr: 1
                  - text: "\r\t\t\tOutSignature(desc.link, desc.BaseTyp, desc.n)\r\t\tEND;\r\t\t(* assert name and base type are included *)\r\t\tIF desc.untagged THEN n := NameIdx(untgd)\r\t\tELSE n := NameIdx(desc.strobj)\r\t\tEND;\r\t\tIF desc.form # ProcTyp THEN b := desc.BaseTyp;\r\t\t\tIF (b # NIL) & (b # DevCPT.anytyp) & (b # DevCPT.anyptrtyp) & (b.form IN {Pointer, Comp, ProcTyp})\r\t\t\t\t\t& (b.sysflag # interface) & (b # DevCPT.guidtyp)\r\t\t\t\t\t& (~b.untagged OR outURef & (b.form = Comp)) THEN\r\t\t\t\tl := OffsetLink(TypeObj(b), 0)\r\t\t\tEND\r\t\tEND\r\tEND PrepDesc;\r\t\r\tPROCEDURE NumMeth (root: DevCPT.Object; num: INTEGER): DevCPT.Object;\r\t\tVAR obj: DevCPT.Object;\r\tBEGIN\r\t\tIF (root = NIL) OR (root.mode = TProc) & (root.num = num) THEN RETURN root END;\r\t\tobj := NumMeth(root.left, num);\r\t\tIF obj = NIL THEN obj := NumMeth(root.right, num) END;\r\t\tRETURN obj\r\tEND NumMeth;\r\t\r\tPROCEDURE OutDesc (desc: DevCPT.Struct);\r\t\tVAR m: DevCPT.Object; i, nofptr, flddir, size: INTEGER; t, xb: DevCPT.Struct; form, lev, attr: BYTE;\r\t\t\tname: DevCPT.Name;\r\tBEGIN\r\t\tASSERT(~desc.untagged);\r\t\tIF desc.comp = Record THEN\r\t\t\txb := desc; flddir := desc.strobj.adr;\r\t\t\tREPEAT xb := xb.BaseTyp UNTIL (xb = NIL) OR (xb.mno # 0) OR xb.untagged;\r\t\t\tOut4(-1); i := desc.n;\r\t\t\tWHILE i > 0 DO DEC(i); t := desc;\r\t\t\t\tREPEAT\r\t\t\t\t\tm := NumMeth(t.link, i); t := t.BaseTyp\r\t\t\t\tUNTIL (m # NIL) OR (t = xb);\r\t\t\t\tIF m # NIL THEN \r\t\t\t\t\tIF absAttr IN m.conval.setval THEN Out4(0)\r\t\t\t\t\tELSE OutReference(m, 0, absolute)\r\t\t\t\t\tEND\r\t\t\t\tELSIF (xb = NIL) OR xb.untagged THEN Out4(0)\t(* unimplemented ANYREC method *)\r\t\t\t\tELSE OutReference(xb.strobj, -4 - 4 * i, copy)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tdesc.strobj.adr := DevCPM.ObjLen() - headSize;\t(* desc adr *)\r\t\t\tOut4(desc.size);\r\t\t\tOutReference(Mod, 0, absolute);\r\t\t\tIF desc.untagged THEN m := untgd ELSE m := desc.strobj END;\r\t\t\tIF desc.attribute = extAttr THEN attr := 1\r\t\t\tELSIF desc.attribute = limAttr THEN attr := 2\r\t\t\tELSIF desc.attribute = absAttr THEN attr := 3\r\t\t\tELSE attr := 0\r\t\t\tEND;\r\t\t\tOut4(mRecord + attr * 4 + desc.extlev * 16 + NameIdx(m) * 256); i := 0;\r\t\t\tWHILE i <= desc.extlev DO\r\t\t\t\tt := desc;\r\t\t\t\tWHILE t.extlev > i DO t := t.BaseTyp END;\r\t\t\t\tIF t.sysflag = interface THEN Out4(0)\r\t\t\t\tELSIF t.untagged THEN OutReference(TypeObj(t), 0, absolute)\r\t\t\t\tELSIF (t.mno = 0) THEN OutReference(t.strobj, 0, absolute)\r\t\t\t\tELSIF t = xb THEN OutReference(xb.strobj, 0, absolute)\r\t\t\t\tELSE OutReference(xb.strobj, 12 + 4 * i, copy)\r\t\t\t\tEND;\r\t\t\t\tINC(i)\r\t\t\tEND;\r\t\t\tWHILE i <= DevCPM.MaxExts DO Out4(0); INC(i) END;\r\t\t\tOutReference(Meta, flddir, absolute);\t(* ref to field list *)\r\t\t\tnofptr := 0; FindPtrs(desc, 0, FALSE, nofptr);\r\t\t\tOut4(-(4 * nofptr + 4));\r\t\t\tnofptr := 0; FindPtrs(desc, 0, TRUE, nofptr);\r\t\t\tOut4(-1)\r\t\tELSE\r\t\t\tdesc.strobj.adr := DevCPM.ObjLen() - headSize;\r\t\t\tlev := 0; size := 0;\r\t\t\tIF desc.comp = Array THEN\r\t\t\t\tsize := desc.n; form := mArray\r\t\t\tELSIF desc.comp = DynArr THEN\r\t\t\t\tform := mArray; lev := SHORT(SHORT(desc.n + 1))\r\t\t\tELSIF desc.form = Pointer THEN\r\t\t\t\tform := mPointer\r\t\t\tELSE ASSERT(desc.form = ProcTyp);\r\t\t\t\tDevCPM.FPrint(size, XProc); DevCPT.FPrintSign(size, desc.BaseTyp, desc.link); form := mProctyp;\r\t\t\tEND;\r\t\t\tOut4(size);\r\t\t\tOutReference(Mod, 0, absolute);\r\t\t\tIF desc.untagged THEN m := untgd ELSE m := desc.strobj END;\r\t\t\tOut4(form + lev * 16 + NameIdx(m) * 256);\r\t\t\tIF desc.form # ProcTyp THEN OutStruct(desc.BaseTyp, TRUE)\r\t\t\tELSIF outSignatures THEN OutReference(Meta, desc.n, absolute)\t"
