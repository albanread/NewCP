                  - text: "* (VAR name: ARRAY OF SHORTCHAR);\r\tBEGIN\r\t\tDevCPM.ObjW(0FCX); DevCPM.ObjWNum(pc); OutName(name)\r\tEND OutRefName;\r\r\tPROCEDURE "
                    attr: 0
