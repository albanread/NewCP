                  - text: "*;\r\t\tVAR i, j, refSize, expPos, ptrPos, impPos, namePos, procPos,\r\t\t\tcon8Pos, con16Pos, con32Pos, con64Pos, modPos, codePos: INTEGER;\r\t\t\tm, obj, dlist: DevCPT.Object;\r\tBEGIN\r\t(* Ref *)\r\t\tDevCPM.ObjW(0X); (* end mark *)\r\t\trefSize := DevCPM.ObjLen() - headSize;\r\t(* Export *)\r\t\tAlign(4);\r\t\tIF outSignatures THEN PrepExport(DevCPT.topScope.right) END;\t(* procedure signatures *)\r\t\tAlign(8); expPos := DevCPM.ObjLen(); \r\t\tOut4(0);\r\t\tOutExport(DevCPT.topScope.right);\t(* export objects *)\r\t\ti := DevCPM.ObjLen(); DevCPM.ObjSet(expPos); Out4((i - expPos - 4) DIV 16); DevCPM.ObjSet(i);\r\t(* Pointers *)\r\t\tptrPos := DevCPM.ObjLen();\r\t\tobj := DevCPT.topScope.scope; nofptrs := 0;\r\t\tWHILE obj # NIL DO FindPtrs(obj.typ, dsize + obj.adr, FALSE, nofptrs); obj := obj.link END;\r\t\tobj := DevCPT.topScope.scope; i := 0;\r\t\tWHILE obj # NIL DO FindPtrs(obj.typ, dsize + obj.adr, TRUE, i); obj := obj.link END;\r\t\tIF i > 0 THEN Out4(-1); INCL(options, iptrs) END;\r\t(* Prepare Type Descriptors *)\r\t\tdlist := NIL;\r\t\tWHILE descList # NIL DO\r\t\t\tobj := descList; descList := descList.link;\r\t\t\tPrepDesc(obj.typ);\r\t\t\tobj.link := dlist; dlist := obj\r\t\tEND;\r\t(* Import List *)\r\t\timpPos := DevCPM.ObjLen(); i := 0;\r\t\tWHILE i < imports DO Out4(0); INC(i) END;\r\t(* Names *)\r\t\tnamePos := DevCPM.ObjLen(); OutNames;\r\t(* Const *)\r\t\tAlign(4); con8Pos := DevCPM.ObjLen();\r\t\tOutConst(Const8); con16Pos := DevCPM.ObjLen();\r\t\tASSERT(con16Pos MOD 4 = 0); ASSERT(con16Pos - con8Pos = idx8);\r\t\tOutConst(Const16); con32Pos := DevCPM.ObjLen();\r\t\tASSERT(con32Pos MOD 4 = 0); ASSERT(con32Pos - con16Pos = idx16);\r\t\tOutConst(Const32); con64Pos := DevCPM.ObjLen();\r\t\tASSERT(con64Pos MOD 4 = 0); ASSERT(con64Pos - con32Pos = idx32);\r\t\tIF ODD(con64Pos DIV 4) THEN Out4(0); INC(con64Pos, 4) END;\r\t\tOutConst(Const64); ASSERT(DevCPM.ObjLen() - con64Pos = idx64);\r\t(* Module Descriptor *)\r\t\tAlign(16); modPos := DevCPM.ObjLen();\r\t\tOutModDesc(nofptrs, refSize, namePos - headSize, ptrPos - headSize, expPos - headSize, impPos - headSize);\r\t(* Procedure Table *)\r\t\tprocPos := DevCPM.ObjLen();\r\t\tOutProcTable(DevCPT.topScope.right);\r\t\tOut4(0); Out4(0); (* at least one entry in ProcTable *)\r\t\tOut4(0); (* sentinel *)\r\t(* Type Descriptors *)\r\t\tobj := dlist;\r\t\tWHILE obj # NIL DO OutDesc(obj.typ); obj := obj.link END;\r\t(* Code *)\r\t\tcodePos := DevCPM.ObjLen(); WriteCode;\r\t\tWHILE pc MOD 4 # 0 DO DevCPM.ObjW(90X); INC(pc) END;\r\t(* Fixups *)\r\t\tOutLink(KNewRec.links); OutLink(KNewArr.links);\r\t\t(* metalink *)\r\t\tOutPLink(Const8.links, con8Pos - headSize);\r\t\tOutPLink(Const16.links, con16Pos - headSize);\r\t\tOutPLink(Const32.links, con32Pos - headSize);\r\t\tOutPLink(Const64.links, con64Pos - headSize);\r\t\tOutLink(Meta.links);\r\t\t(* desclink *)\r\t\tobj := dlist; i := modPos - headSize;\r\t\tWHILE obj # NIL DO OutPLink(obj.links, obj.adr - i); obj.links := NIL; obj := obj.link END;\r\t\tIF procVarIndirect THEN\r\t\t\tOutPLink(Proc.links, procPos - modPos);\r\t\t\tOutCPLinks(DevCPT.topScope.right, procPos - modPos)\r\t\tEND;\r\t\tOutLink(Mod.links);\r\t\t(* codelink *)\r\t\tIF ~procVarIndirect THEN OutCLinks(DevCPT.topScope.right) END;\r\t\tOutPLink(CaseLinks, 0); OutLink(Code.links);\r\t\t(* datalink *)\r\t\tOutLink(Data.links);\r\t(* Use *)\r\t\tOutUseBlock;\r\t(* Header Fixups *)\r\t\tDevCPM.ObjSet(8);\r\t\tDevCPM.ObjWLInt(headSize);\r\t\tDevCPM.ObjWLInt(modPos - headSize);\r\t\tDevCPM.ObjWLInt(codePos - modPos);\r\t\tDevCPM.ObjWLInt(pc);\r\t\tDevCPM.ObjWLInt(dsize);\r\t\tIF namex > MaxNameTab THEN DevCPM.err(242) END;\r\t\tIF DevCPM.noerr & outObj THEN DevCPM.RegisterObj END\r\tEND OutCode;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Init
                    attr: 3
                  - text: "* (proc: INTEGER; opt: SET);\r\t\tCONST obj = 3; ref = 4; allref = 5; srcpos = 6; bigEnd = 15; pVarInd = 14;\r\tBEGIN\r\t\tprocessor := proc;\r\t\tbigEndian := bigEnd IN opt; procVarIndirect := pVarInd IN opt;\r\t\toutRef := ref IN opt; outAllRef := allref IN opt; outObj := obj IN opt;\r\t\toutURef := useAllRef & outAllRef & (DevCPM.comAware IN DevCPM.options);\r\t\toutSrc := srcpos IN opt;\r\t\tpc := 0; actIdx := CodeLength; blkIdx := 0; \r\t\tidx8 := 0; idx16 := 0; idx32 := 0; idx64 := 0; namex := 1;\r\t\toptions := opt * {0..15}; CodeOvF := FALSE;\r\t\tKNewRec.links := NIL; KNewArr.links := NIL; CaseLinks := NIL;\r\t\tConst8.links := NIL; Const8.conval := NIL; Const16.links := NIL; Const16.conval := NIL;\r\t\tConst32.links := NIL; Const32.conval := NIL; Const64.links := NIL; Const64.conval := NIL;\r\t\tCode.links := NIL; Data.links := NIL; Mod.links := NIL; Proc.links := NIL; Meta.links := NIL;\r\t\tnameList := NIL; descList := NIL; dllList := NIL; dllLast := NIL;\r\t\tcodePos := 0; srcPos := 0;\r\t\tNEW(untgd); untgd.name := DevCPT.NewName(\"!\");\r\t\tcloseLbl := 0\r\tEND Init;\r\r\tPROCEDURE "
                    attr: 0
