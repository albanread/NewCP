                  - text: "* (x: INTEGER);\r\tBEGIN\r\t\tIF actIdx >= CodeLength THEN\r\t\t\tIF blkIdx < CodeBlocks THEN\r\t\t\t\tNEW(actual); code[blkIdx] := actual; INC(blkIdx); actIdx := 0\r\t\t\tELSE\r\t\t\t\tIF ~CodeOvF THEN DevCPM.err(210); CodeOvF := TRUE END;\r\t\t\t\tactIdx := 0; pc := 0\r\t\t\tEND\r\t\tEND;\r\t\tactual^[actIdx] := SHORT(CHR(x MOD 256)); INC(actIdx); INC(pc)\r\tEND GenByte;\r\t\r\tPROCEDURE "
                    attr: 0
