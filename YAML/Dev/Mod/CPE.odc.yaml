                  - text: " ThisByte(a+1) * 256 + ThisByte(a)\r\t\tEND\r\tEND ThisShort;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ThisWord
                    attr: 3
                  - text: "* (a: INTEGER): INTEGER;\r\tBEGIN\r\t\tIF bigEndian THEN\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " ((ThisByte(a) * 256 + ThisByte(a+1)) * 256 + ThisByte(a+2)) * 256 + ThisByte(a+3)\r\t\tELSE\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " ((ThisByte(a+3) * 256 + ThisByte(a+2)) * 256 + ThisByte(a+1)) * 256 + ThisByte(a)\r\t\tEND\r\tEND ThisWord;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: GenByte
