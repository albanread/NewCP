                  - text: " ORD(code[a DIV CodeLength]^[a MOD CodeLength])\r\tEND ThisByte;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ThisShort
                    attr: 3
                  - text: "* (a: INTEGER): INTEGER;\r\tBEGIN\r\t\tIF bigEndian THEN\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " ThisByte(a) * 256 + ThisByte(a+1)\r\t\tELSE\r\t\t\t"
                    attr: 0
