                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT SYSTEM, Dates, DevCPM, DevCPT;\r\r\r\tCONST\r\t\t(* item base modes (=object modes) *)\r\t\tVar = 1; VarPar = 2; Con = 3; LProc = 6; XProc = 7; CProc = 9; IProc = 10; TProc = 13;\r\t\r\t\t(* structure forms *)\r\t\tUndef = 0; Byte = 1; Bool = 2; Char8 = 3; Int8 = 4; Int16 = 5; Int32 = 6;\r\t\tReal32 = 7; Real64 = 8; Set = 9; String8 = 10; NilTyp = 11; NoTyp = 12;\r\t\tPointer = 13; ProcTyp = 14; Comp = 15;\r\t\tChar16 = 16; String16 = 17; Int64 = 18; Guid = 23;\r\t\t\r\t\t(* composite structure forms *)\r\t\tBasic = 1; Array = 2; DynArr = 3; Record = 4;\r\t\t\r\t\t(* object modes *)\r\t\tFld = 4; Typ = 5; Head = 12;\r\t\t\r\t\t(* module visibility of objects *)\r\t\tinternal = 0; external = 1; externalR = 2; inPar = 3; outPar = 4;\r\r\t\t(* history of imported objects *)\r\t\tinserted = 0; same = 1; pbmodified = 2; pvmodified = 3; removed = 4; inconsistent = 5;\r\t\t\r\t\t(* attribute flags (attr.adr, struct.attribute, proc.conval.setval)*)\r\t\tnewAttr = 16; absAttr = 17; limAttr = 18; empAttr = 19; extAttr = 20;\r\t\t\r\t\t(* meta interface consts *)\r\t\tmConst = 1; mTyp = 2; mVar = 3; mProc = 4; mField = 5;\r\t\tmBool = 1; mChar8 = 2; mChar16 = 3; mInt8 = 4; mInt16 = 5; mInt32 = 6;\r\t\tmReal32 = 7; mReal64 = 8; mSet = 9; mInt64 = 10; mAnyRec = 11; mAnyPtr = 12; mSysPtr = 13;\r\t\tmProctyp = 0; mRecord = 1; mArray = 2; mPointer = 3;\r\t\tmInternal = 1; mReadonly = 2; mPrivate = 3; mExported = 4;\r\t\tmValue = 10; mInPar = 11; mOutPar = 12; mVarPar = 13;\r\t\tmInterface = 32; mGuid = 33; mResult = 34;\r\r\t\t(* sysflag *)\r\t\tuntagged = 1; noAlign = 3; union = 7; interface = 10;\r\t\t\r\t\t(* fixup types *)\r\t\tabsolute = 100; relative = 101; copy = 102; table = 103; tableend = 104; short = 105;\r\t\t\r\t\t(* kernel flags *)\r\t\tiptrs = 30;\r\t\t\r\t\texpAllFields = TRUE;\r\t\t\r\t\t(* implementation restrictions *)\r\t\tCodeBlocks = 512;\r\t\tCodeLength = 16384;\r\t\tMaxNameTab = 800000H;\r\t\t\r\t\tuseAllRef = FALSE;\r\t\toutSignatures = TRUE;\r\t\r\tTYPE\r\t\tCodeBlock = POINTER TO ARRAY CodeLength OF SHORTCHAR;\r\t\r\tVAR\r\t\tpc*: INTEGER;\r\t\tdsize*: INTEGER;\t(* global data size *)\r\t\tKNewRec*, KNewArr*: DevCPT.Object;\r\t\tcloseLbl*: INTEGER;\r\t\tCaseLinks*: DevCPT.LinkList;\r\t\t\r\t\tprocessor: INTEGER;\r\t\tbigEndian: BOOLEAN;\r\t\tprocVarIndirect: BOOLEAN;\r\t\tidx8, idx16, idx32, idx64, namex, nofptrs, headSize: INTEGER;\r\t\tConst8, Const16, Const32, Const64, Code, Data, Meta, Mod, Proc, nameList, descList, untgd: DevCPT.Object;\r\t\toutRef, outAllRef, outURef, outSrc, outObj: BOOLEAN;\r\t\tcodePos, srcPos: INTEGER;\r\t\toptions: SET;\r\t\tcode: ARRAY CodeBlocks OF CodeBlock;\r\t\tactual: CodeBlock;\r\t\tactIdx, blkIdx: INTEGER;\r\t\tCodeOvF: BOOLEAN;\r\t\tzero: ARRAY 16 OF SHORTCHAR;\t"
                    attr: 0
                  - text: "(* all 0X *)"
                    attr: 1
                  - text: "\r\t\timports: INTEGER;\r\t\tdllList, dllLast: DevCPT.Object;\r\t\t\r\t\t\r\tPROCEDURE "
                    attr: 0
                  - text: GetLongWords
                    attr: 3
                  - text: "* (con: DevCPT.Const; OUT hi, low: INTEGER);\r\t\tCONST N = 4294967296.0; "
                    attr: 0
                  - text: "(* 2^32 *)"
                    attr: 1
                  - text: "\r\t\tVAR rh, rl: REAL;\r\tBEGIN\r\t\trl := con.intval; rh := con.realval / N;\r\t\tIF rh >= MAX(INTEGER) + 1.0 THEN rh := rh - 1; rl := rl + N\r\t\tELSIF rh < MIN(INTEGER) THEN rh := rh + 1; rl := rl - N\r\t\tEND;\r\t\thi := SHORT(ENTIER(rh));\r\t\trl := rl + (rh - hi) * N;\r\t\tIF rl < 0 THEN hi := hi - 1; rl := rl + N\r\t\tELSIF rl >= N THEN hi := hi + 1; rl := rl - N\r\t\tEND;\r\t\tIF rl >= MAX(INTEGER) + 1.0 THEN rl := rl - N END;\r\t\tlow := SHORT(ENTIER(rl))\r(*\r\t\thi := SHORT(ENTIER((con.realval + con.intval) / 4294967296.0));\r\t\tr := con.realval + con.intval - hi * 4294967296.0;\r\t\tIF r > MAX(INTEGER) THEN r := r - 4294967296.0 END;\r\t\tlow := SHORT(ENTIER(r))\r*)\r\tEND GetLongWords;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: GetRealWord
                    attr: 3
                  - text: "* (con: DevCPT.Const; OUT x: INTEGER);\r\t\tVAR r: SHORTREAL;\r\tBEGIN\r\t\tr := SHORT(con.realval); x := SYSTEM.VAL(INTEGER, r)\r\tEND GetRealWord;\r\t\t\r\tPROCEDURE "
                    attr: 0
                  - text: GetRealWords
                    attr: 3
                  - text: "* (con: DevCPT.Const; OUT hi, low: INTEGER);\r\t\tTYPE A = ARRAY 2 OF INTEGER;\r\t\tVAR a: A;\r\tBEGIN\r\t\ta := SYSTEM.VAL(A, con.realval);\r\t\tIF DevCPM.LEHost THEN hi := a[1]; low := a[0] ELSE hi := a[0]; low := a[1] END\r\tEND GetRealWords;\r\t\t\r\tPROCEDURE IsSame (x, y: REAL): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: "  (x = y) & ((x #  0.) OR (1. / x = 1. / y))\r\tEND IsSame;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: AllocConst
                    attr: 3
                  - text: "* (con: DevCPT.Const; form: BYTE; VAR obj: DevCPT.Object; VAR adr: INTEGER);\r\t\tVAR c: DevCPT.Const;\r\tBEGIN\r\t\tINCL(con.setval, form);\r\t\tCASE form OF\r\t\t| String8:\r\t\t\tobj := Const8; c := obj.conval;\r\t\t\tWHILE (c # NIL) & ((con.setval # c.setval) OR (con.intval2 # c.intval2) OR (con.ext^ # c.ext^)) DO c := c.link END;\r\t\t\tIF c = NIL THEN adr := idx8; INC(idx8, (con.intval2 + 3) DIV 4 * 4) END\r\t\t| String16:\r\t\t\tobj := Const16; c := obj.conval;\r\t\t\tWHILE (c # NIL) & ((con.setval # c.setval) OR (con.intval2 # c.intval2) OR (con.ext^ # c.ext^)) DO c := c.link END;\r\t\t\tIF c = NIL THEN adr := idx16; INC(idx16, (con.intval2 + 1) DIV 2 * 4) END\r\t\t| Int64:\r\t\t\tobj := Const64; c := obj.conval;\r\t\t\tWHILE (c # NIL) & ((con.setval # c.setval) OR (con.intval # c.intval2) OR (con.realval # c.realval)) DO\r\t\t\t\tc := c.link\r\t\t\tEND;\r\t\t\tIF c = NIL THEN con.intval2 := con.intval; adr := idx64; INC(idx64, 8) END\r\t\t| Real32:\r\t\t\tobj := Const32; c := obj.conval;\r\t\t\tWHILE (c # NIL) & ((con.setval # c.setval) OR ~IsSame(con.realval, c.realval)) DO c := c.link END;\r\t\t\tIF c = NIL THEN adr := idx32; INC(idx32, 4) END\r\t\t| Real64:\r\t\t\tobj := Const64; c := obj.conval;\r\t\t\tWHILE (c # NIL) & ((con.setval # c.setval) OR ~IsSame(con.realval, c.realval)) DO c := c.link END;\r\t\t\tIF c = NIL THEN adr := idx64; INC(idx64, 8) END\r\t\t| Guid:\r\t\t\tobj := Const32; c := obj.conval;\r\t\t\tWHILE (c # NIL) & ((con.setval # c.setval) OR (con.intval2 # c.intval2) OR (con.ext^ # c.ext^)) DO c := c.link END;\r\t\t\tIF c = NIL THEN adr := idx32; INC(idx32, 16) END\r\t\tEND;\r\t\tIF c = NIL THEN con.link := obj.conval; obj.conval := con ELSE adr := c.intval END;\r\t\tcon.intval := adr\r\tEND AllocConst;\r\r\r\tPROCEDURE "
                    attr: 0
                  - text: AllocTypDesc
                    attr: 3
                  - text: "* (typ: DevCPT.Struct);\t (* typ.comp = Record *)\r\t\tVAR obj: DevCPT.Object; name: DevCPT.Name;\r\tBEGIN\r\t\tIF typ.strobj = NIL THEN\r\t\t\tname := \"@\"; DevCPT.Insert(name, obj); obj.name := DevCPT.null;\t(* avoid err 1 *)\r\t\t\tobj.mode := Typ; obj.typ := typ; typ.strobj := obj\r\t\tEND\r\tEND AllocTypDesc; \r\r\r\tPROCEDURE "
                    attr: 0
                  - text: PutByte
                    attr: 3
                  - text: "* (a, x: INTEGER);\r\tBEGIN\r\t\tcode[a DIV CodeLength]^[a MOD CodeLength] := SHORT(CHR(x MOD 256))\r\tEND PutByte;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: PutShort
                    attr: 3
                  - text: "* (a, x: INTEGER);\r\tBEGIN\r\t\tIF bigEndian THEN\r\t\t\tPutByte(a, x DIV 256); PutByte(a + 1, x)\r\t\tELSE\r\t\t\tPutByte(a, x); PutByte(a + 1, x DIV 256)\r\t\tEND\r\tEND PutShort;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: PutWord
                    attr: 3
                  - text: "* (a, x: INTEGER);\r\tBEGIN\r\t\tIF bigEndian THEN\r\t\t\tPutByte(a, x DIV 1000000H); PutByte(a + 1, x DIV 10000H);\r\t\t\tPutByte(a + 2, x DIV 256); PutByte(a + 3, x)\r\t\tELSE\r\t\t\tPutByte(a, x); PutByte(a + 1, x DIV 256);\r\t\t\tPutByte(a + 2, x DIV 10000H); PutByte(a + 3, x DIV 1000000H)\r\t\tEND\r\tEND PutWord;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ThisByte
                    attr: 3
                  - text: "* (a: INTEGER): INTEGER;\r\tBEGIN\r\t\t"
                    attr: 0
