                  - text: "* (x: INTEGER);\r\tBEGIN\r\t\tIF bigEndian THEN\r\t\t\tGenByte(x DIV 256); GenByte(x)\r\t\tELSE\r\t\t\tGenByte(x); GenByte(x DIV 256)\r\t\tEND\r\tEND GenShort;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: GenWord
                    attr: 3
                  - text: "* (x: INTEGER);\r\tBEGIN\r\t\tIF bigEndian THEN\r\t\t\tGenByte(x DIV 1000000H); GenByte(x DIV 10000H); GenByte(x DIV 256); GenByte(x)\r\t\tELSE\r\t\t\tGenByte(x); GenByte(x DIV 256); GenByte(x DIV 10000H); GenByte(x DIV 1000000H)\r\t\tEND\r\tEND GenWord;\r\t\r\tPROCEDURE WriteCode;\r\t\tVAR i, j, k, n: INTEGER; b: CodeBlock;\r\tBEGIN\r\t\tj := 0; k := 0;\r\t\tWHILE j < pc DO\r\t\t\tn := pc - j; i := 0; b := code[k];\r\t\t\tIF n > CodeLength THEN n := CodeLength END;\r\t\t\tWHILE i < n DO DevCPM.ObjW(b^[i]); INC(i) END;\r\t\t\tINC(j, n); INC(k)\r\t\tEND\r\tEND WriteCode;\r\r\r\tPROCEDURE "
                    attr: 0
                  - text: OffsetLink
                    attr: 3
                  - text: "* (obj: DevCPT.Object; offs: INTEGER): DevCPT.LinkList;\r\t\tVAR link: DevCPT.LinkList; m: DevCPT.Object;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: "ASSERT((obj.mode # Typ) OR (obj.typ # DevCPT.int32typ));"
                    attr: 3
                  - text: "\r\t\t"
                    attr: 0
                  - text: "ASSERT((obj.mode # Typ) OR (obj.typ # DevCPT.iunktyp) & (obj.typ # DevCPT.guidtyp));"
                    attr: 3
                  - text: "\r\t\tIF obj.mnolev >= 0 THEN\t(* not imported *)\r\t\t\tCASE obj.mode OF\r\t\t\t| Typ: IF obj.links = NIL THEN obj.link := descList; descList := obj END\r\t\t\t| TProc: IF obj.adr = -1 THEN obj := obj.nlink ELSE offs := offs + obj.adr; obj := Code END\r\t\t\t| Var: offs := offs + dsize; obj := Data\r\t\t\t| Con, IProc, XProc, LProc:\r\t\t\tEND\r\t\tELSIF obj.mode = Typ THEN\r\t\t\tIF obj.typ.untagged THEN\t(* add desc for imported untagged types *)\r\t\t\t\tIF obj.links = NIL THEN obj.link := descList; descList := obj END\r\t\t\tELSE\r\t\t\t\tm := DevCPT.GlbMod[-obj.mnolev];\r\t\t\t\tIF m.library # NIL THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL END\t(* type import from dll *)\r\t\t\tEND\r\t\tEND;\r\t\tlink := obj.links;\r\t\tWHILE (link # NIL) & (link.offset # offs) DO link := link.next END;\r\t\tIF link = NIL THEN\r\t\t\tNEW(link); link.offset := offs; link.linkadr := 0;\r\t\t\tlink.next := obj.links; obj.links := link\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " link\r\tEND OffsetLink;\r\r\r\tPROCEDURE "
