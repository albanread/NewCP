                  - text: TypeObj
                    attr: 3
                  - text: "* (typ: DevCPT.Struct): DevCPT.Object;\r\t\tVAR obj: DevCPT.Object;\r\tBEGIN\r\t\tobj := typ.strobj;\r\t\tIF obj = NIL THEN\r\t\t\tobj := DevCPT.NewObj(); obj.leaf := TRUE; obj.mnolev := 0;\r\t\t\tobj.name := DevCPT.null; obj.mode := Typ; obj.typ := typ; typ.strobj := obj\r\t\tEND;\r\t\tRETURN obj\r\tEND TypeObj;\r\r\r\tPROCEDURE Align (n: INTEGER);\r\t\tVAR p: INTEGER;\r\tBEGIN\r\t\tp := DevCPM.ObjLen();\r\t\tDevCPM.ObjWBytes(zero, (-p) MOD n)\r\tEND Align;\r\t\r\tPROCEDURE OutName (VAR name: ARRAY OF SHORTCHAR);\r\t\tVAR ch: SHORTCHAR; i: SHORTINT;\r\tBEGIN i := 0;\r\t\tREPEAT ch := name[i]; DevCPM.ObjW(ch); INC(i) UNTIL ch = 0X\r\tEND OutName;\r\t\r\tPROCEDURE Out2 (x: INTEGER);\t(* byte ordering must correspond to target machine *)\r\tBEGIN\r\t\tIF bigEndian THEN\r\t\t\tDevCPM.ObjW(SHORT(CHR(x DIV 256))); DevCPM.ObjW(SHORT(CHR(x)))\r\t\tELSE\r\t\t\tDevCPM.ObjW(SHORT(CHR(x))); DevCPM.ObjW(SHORT(CHR(x DIV 256)))\r\t\tEND\r\tEND Out2;\r\t\r\tPROCEDURE Out4 (x: INTEGER);\t(* byte ordering must correspond to target machine *)\r\tBEGIN\r\t\tIF bigEndian THEN\r\t\t\tDevCPM.ObjW(SHORT(CHR(x DIV 1000000H))); DevCPM.ObjW(SHORT(CHR(x DIV 10000H)));\r\t\t\tDevCPM.ObjW(SHORT(CHR(x DIV 256))); DevCPM.ObjW(SHORT(CHR(x)))\r\t\tELSE\r\t\t\tDevCPM.ObjWLInt(x)\r\t\tEND\r\tEND Out4;\r\r\tPROCEDURE OutReference (obj: DevCPT.Object; offs, typ: INTEGER);\r\t\tVAR link: DevCPT.LinkList;\r\tBEGIN\r\t\tlink := OffsetLink(obj, offs);\r\t\tIF link # NIL THEN\r\t\t\tOut4(typ * 1000000H + link.linkadr MOD 1000000H);\r\t\t\tlink.linkadr := -(DevCPM.ObjLen() - headSize - 4)\r\t\tELSE Out4(0)\r\t\tEND\r\tEND OutReference;\r\t\r\tPROCEDURE FindPtrs (typ: DevCPT.Struct; adr: INTEGER; ip: BOOLEAN; VAR num: INTEGER);\r\t\tVAR fld: DevCPT.Object; btyp: DevCPT.Struct; i, n: INTEGER;\r\tBEGIN\r\t\tIF typ.form = Pointer THEN\r\t\t\tIF ip & (typ.sysflag = interface)\r\t\t\t\tOR ~ip & ~typ.untagged THEN Out4(adr); INC(num) END\r\t\tELSIF (typ.comp = Record) & (typ.sysflag # union) THEN\r\t\t\tbtyp := typ.BaseTyp;\r\t\t\tIF btyp # NIL THEN FindPtrs(btyp, adr, ip, num) END ;\r\t\t\tfld := typ.link;\r\t\t\tWHILE (fld # NIL) & (fld.mode = Fld) DO\r\t\t\t\tIF ip & (fld.name^ = DevCPM.HdUtPtrName) & (fld.sysflag = interface)\r\t\t\t\t\tOR ~ip & (fld.name^ = DevCPM.HdPtrName) THEN Out4(fld.adr + adr); INC(num)\r\t\t\t\tELSE FindPtrs(fld.typ, fld.adr + adr, ip, num)\r\t\t\t\tEND;\r\t\t\t\tfld := fld.link\r\t\t\tEND\r\t\tELSIF typ.comp = Array THEN\r\t\t\tbtyp := typ.BaseTyp; n := typ.n;\r\t\t\tWHILE btyp.comp = Array DO n := btyp.n * n; btyp := btyp.BaseTyp END ;\r\t\t\tIF (btyp.form = Pointer) OR (btyp.comp = Record) THEN\r\t\t\t\ti := num; FindPtrs(btyp, adr, ip, num);\r\t\t\t\tIF num # i THEN i := 1;\r\t\t\t\t\tWHILE i < n DO\r\t\t\t\t\t\tINC(adr, btyp.size); FindPtrs(btyp, adr, ip, num); INC(i)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND FindPtrs;\r\t\r\r\tPROCEDURE "
                    attr: 0
                  - text: OutRefName
