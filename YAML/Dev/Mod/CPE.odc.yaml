                  - text: "\r\t\t\tEND\r\t\tEND\r\tEND OutDesc;\r\r\tPROCEDURE OutModDesc (nofptr, refSize, namePos, ptrPos, expPos, impPos: INTEGER);\r\t\tVAR i: INTEGER; t: Dates.Time; d: Dates.Date;\r\tBEGIN\r\t\tOut4(0);\t(* link *)\r\t\tOut4(ORD(options));\t(* opts *)\r\t\tOut4(0);\t(* refcnt *)\r\t\tDates.GetDate(d); Dates.GetTime(t); \t(* compile time *)\r\t\tOut2(d.year); Out2(d.month); Out2(d.day);\r\t\tOut2(t.hour); Out2(t.minute); Out2(t.second);\r\t\tOut4(0); Out4(0); Out4(0); \t(* load time *)\r\t\tOut4(0);\t(* ext *)\r\t\tIF closeLbl # 0 THEN OutReference(Code, closeLbl, absolute);\t(* terminator *)\r\t\tELSE Out4(0)\r\t\tEND;\r\t\tOut4(imports);\t(* nofimps *)\r\t\tOut4(nofptr);\t(* nofptrs *)\r\t\tOut4(pc);\t(* csize *)\r\t\tOut4(dsize);\t(* dsize *)\r\t\tOut4(refSize);\t(* rsize *)\r\t\tOutReference(Code, 0, absolute);\t(* code *)\r\t\tOutReference(Data, 0, absolute);\t(* data *)\r\t\tOutReference(Meta, 0, absolute);\t(* refs *)\r\t\tIF procVarIndirect THEN\r\t\t\tOutReference(Proc, 0, absolute);\t(* procBase *)\r\t\tELSE\r\t\t\tOutReference(Code, 0, absolute);\t(* procBase *)\r\t\tEND;\r\t\tOutReference(Data, 0, absolute);\t(* varBase *)\r\t\tOutReference(Meta, namePos, absolute);\t(* names *)\r\t\tOutReference(Meta, ptrPos, absolute);\t(* ptrs *)\r\t\tOutReference(Meta, impPos, absolute);\t(* imports *)\r\t\tOutReference(Meta, expPos, absolute);\t(* export *)\r\t\ti := 0;\t(* name *)\r\t\tWHILE DevCPT.SelfName[i] # 0X DO DevCPM.ObjW(DevCPT.SelfName[i]); INC(i) END;\r\t\tDevCPM.ObjW(0X);\r\t\tAlign(4)\r\tEND OutModDesc;\r\r\tPROCEDURE OutProcTable (obj: DevCPT.Object);\t(* 68000 *)\r\tBEGIN\r\t\tIF obj # NIL THEN\r\t\t\tOutProcTable(obj.left);\r\t\t\tIF obj.mode IN {XProc, IProc} THEN\r\t\t\t\tOut2(4EF9H); OutReference(Code, obj.adr, absolute); Out2(0);\r\t\t\tEND;\r\t\t\tOutProcTable(obj.right);\r\t\tEND;\r\tEND OutProcTable;\r\r\tPROCEDURE PrepExport (obj: DevCPT.Object);\r\tBEGIN\r\t\tIF obj # NIL THEN\r\t\t\tPrepExport(obj.left);\r\t\t\tIF (obj.mode IN {LProc, XProc, IProc}) & (obj.history # removed) & (obj.vis # internal) THEN\r\t\t\t\tPrepObject(obj)\r\t\t\tEND;\r\t\t\tPrepExport(obj.right)\r\t\tEND\r\tEND PrepExport;\r\t\r\tPROCEDURE OutExport (obj: DevCPT.Object);\r\t\tVAR num: INTEGER;\r\tBEGIN\r\t\tIF obj # NIL THEN\r\t\t\tOutExport(obj.left);\r\t\t\tIF (obj.history # removed) & ((obj.vis # internal) OR\r\t\t\t\t\t\t(obj.mode = Typ) & (obj.typ.strobj = obj) & (obj.typ.form = Comp)) THEN\r\t\t\t\tDevCPT.FPrintObj(obj);\r\t\t\t\tIF obj.mode IN {LProc, XProc, IProc} THEN\r\t\t\t\t\tIF procVarIndirect THEN\r\t\t\t\t\t\tASSERT(obj.nlink = NIL);\r\t\t\t\t\t\tnum := obj.num; obj.num := 0;\r\t\t\t\t\t\tOutObject(mProc, obj.fprint, num, NIL, obj);\r\t\t\t\t\t\tobj.num := num\r\t\t\t\t\tELSE\r\t\t\t\t\t\tOutObject(mProc, obj.fprint, obj.adr, NIL, obj)\r\t\t\t\t\tEND\r\t\t\t\tELSIF obj.mode = Var THEN\r\t\t\t\t\tOutObject(mVar, obj.fprint, dsize + obj.adr, obj.typ, obj)\r\t\t\t\tELSIF obj.mode = Typ THEN\r\t\t\t\t\tOutObject(mTyp, obj.typ.pbfp, obj.typ.pvfp, obj.typ, obj)\r\t\t\t\tELSE ASSERT(obj.mode IN {Con, CProc});\r\t\t\t\t\tOutObject(mConst, obj.fprint, 0, NIL, obj)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tOutExport(obj.right)\r\t\tEND\r\tEND OutExport;\r\t\r\tPROCEDURE OutCLinks (obj: DevCPT.Object);\r\tBEGIN\r\t\tIF obj # NIL THEN\r\t\t\tOutCLinks(obj.left);\r\t\t\tIF obj.mode IN {LProc, XProc, IProc} THEN OutPLink(obj.links, obj.adr) END;\r\t\t\tOutCLinks(obj.right)\r\t\tEND\r\tEND OutCLinks;\r\r\tPROCEDURE OutCPLinks (obj: DevCPT.Object; base: INTEGER);\r\tBEGIN\r\t\tIF obj # NIL THEN\r\t\t\tOutCPLinks(obj.left, base);\r\t\t\tIF obj.mode IN {LProc, XProc, IProc} THEN OutPLink(obj.links, obj.num + base) END;\r\t\t\tOutCPLinks(obj.right, base)\r\t\tEND\r\tEND OutCPLinks;\r\r\tPROCEDURE OutImport (obj: DevCPT.Object);\r\t\tVAR typ: DevCPT.Struct; strobj: DevCPT.Object; opt: INTEGER;\r\tBEGIN\r\t\tIF obj # NIL THEN\r\t\t\tOutImport(obj.left);\r\t\t\tIF obj.mode = Typ THEN typ := obj.typ;\r\t\t\t\tIF obj.used OR\r\t\t\t\t\t(typ.form IN {Pointer, Comp}) & (typ.strobj = obj) &\r\t\t\t\t\t\t((obj.links # NIL) OR (obj.name # DevCPT.null) & (typ.pvused OR typ.pbused)) THEN\r\t\t\t\t\tDevCPT.FPrintStr(typ);\r\t\t\t\t\tDevCPM.ObjW(SHORT(CHR(mTyp))); OutName(obj.name^);\r\t\t\t\t\tIF obj.used THEN opt := 2 ELSE opt := 0 END;\r\t\t\t\t\tIF (typ.form = Comp) & ((typ.pvused) OR (obj.name = DevCPT.null)) THEN\r\t\t\t\t\t\tDevCPM.ObjWNum(typ.pvfp); DevCPM.ObjW(SHORT(CHR(opt + 1)));\r\t\t\t\t\t\tIF obj.history = inconsistent THEN DevCPT.FPrintErr(obj, 249) END\r\t\t\t\t\tELSE DevCPM.ObjWNum(typ.pbfp); DevCPM.ObjW(SHORT(CHR(opt)))\r\t\t\t\t\tEND;\r\t\t\t\t\tOutLink(obj.links)\r\t\t\t\tEND\r\t\t\tELSIF obj.used THEN\r\t\t\t\tDevCPT.FPrintObj(obj);\r\t\t\t\tIF obj.mode = Var THEN\r\t\t\t\t\tDevCPM.ObjW(SHORT(CHR(mVar))); OutName(obj.name^);\r\t\t\t\t\tDevCPM.ObjWNum(obj.fprint); OutLink(obj.links)\r\t\t\t\tELSIF obj.mode IN {XProc, IProc} THEN\r\t\t\t\t\tDevCPM.ObjW(SHORT(CHR(mProc))); OutName(obj.name^);\r\t\t\t\t\tDevCPM.ObjWNum(obj.fprint); OutLink(obj.links)\r\t\t\t\tELSE ASSERT(obj.mode IN {Con, CProc});\r\t\t\t\t\tDevCPM.ObjW(SHORT(CHR(mConst))); OutName(obj.name^); DevCPM.ObjWNum(obj.fprint)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tOutImport(obj.right)\r\t\tEND\r\tEND OutImport;\r\t\r\tPROCEDURE OutUseBlock;\r\t\tVAR m, obj: DevCPT.Object; i: INTEGER;\r\tBEGIN\r\t\tm := dllList;\r\t\tWHILE m # NIL DO\r\t\t\tobj := m.nlink;\r\t\t\tWHILE obj # NIL DO\r\t\t\t\tIF obj.mode = Var THEN DevCPM.ObjW(SHORT(CHR(mVar)))\r\t\t\t\tELSE DevCPM.ObjW(SHORT(CHR(mProc)))\r\t\t\t\tEND;\r\t\t\t\tIF obj.entry # NIL THEN OutName(obj.entry^)\r\t\t\t\tELSE OutName(obj.name^);\r\t\t\t\tEND;\r\t\t\t\tDevCPT.FPrintObj(obj); DevCPM.ObjWNum(obj.fprint); OutLink(obj.links);\r\t\t\t\tobj := obj.nlink\r\t\t\tEND;\r\t\t\tDevCPM.ObjW(0X); m := m.link\r\t\tEND;\r\t\ti := 1;\r\t\tWHILE i < DevCPT.nofGmod DO\r\t\t\tobj := DevCPT.GlbMod[i];\r\t\t\tIF obj.library = NIL THEN OutImport(obj.right); DevCPM.ObjW(0X) END;\r\t\t\tINC(i)\r\t\tEND;\r\tEND OutUseBlock;\r\r\tPROCEDURE CollectDll (obj: DevCPT.Object; mod: DevCPT.String);\r\t\tVAR name: DevCPT.String; dll: DevCPT.Object;\r\tBEGIN\r\t\tIF obj # NIL THEN\r\t\t\tCollectDll(obj.left, mod);\r\t\t\tIF obj.used & (obj.mode IN {Var, XProc, IProc}) THEN\r\t\t\t\tIF obj.library # NIL THEN name := obj.library\r\t\t\t\tELSE name := mod\r\t\t\t\tEND;\r\t\t\t\tdll := dllList;\r\t\t\t\tWHILE (dll # NIL) & (dll.library^ # name^) DO dll := dll.link END;\r\t\t\t\tIF dll = NIL THEN\r\t\t\t\t\tNEW(dll); dll.library := name; INC(imports);\r\t\t\t\t\tIF dllList = NIL THEN dllList := dll ELSE dllLast.link := dll END;\r\t\t\t\t\tdllLast := dll; dll.left := dll;\r\t\t\t\tEND;\r\t\t\t\tdll.left.nlink := obj; dll.left := obj\r\t\t\tEND;\r\t\t\tCollectDll(obj.right, mod)\r\t\tEND\r\tEND CollectDll;\r\t\r\tPROCEDURE EnumXProc(obj: DevCPT.Object; VAR num: INTEGER);\r\tBEGIN\r\t\tIF obj # NIL THEN\r\t\t\tEnumXProc(obj.left, num);\r\t\t\tIF obj.mode IN {XProc, IProc} THEN\r\t\t\t\tobj.num := num; INC(num, 8);\r\t\t\tEND;\r\t\t\tEnumXProc(obj.right, num)\r\t\tEND;\r\tEND EnumXProc;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: OutHeader
                    attr: 3
                  - text: "*;\r\t\tVAR i: INTEGER; m: DevCPT.Object;\r\tBEGIN\r\t\tDevCPM.ObjWLInt(processor);\t(* processor type *)\r\t\tDevCPM.ObjWLInt(0); DevCPM.ObjWLInt(0); DevCPM.ObjWLInt(0);\r\t\tDevCPM.ObjWLInt(0); DevCPM.ObjWLInt(0);\t(* sizes *)\r\t\timports := 0; i := 1;\r\t\tWHILE i < DevCPT.nofGmod DO\r\t\t\tm := DevCPT.GlbMod[i];\r\t\t\tIF m.library # NIL THEN\t(* dll import *)\r\t\t\t\tCollectDll(m.right, m.library);\r\t\t\tELSE INC(imports)\t(* module import *)\r\t\t\tEND;\r\t\t\tINC(i)\r\t\tEND;\r\t\tDevCPM.ObjWNum(imports);\t(* num of import *)\r\t\tOutName(DevCPT.SelfName); \r\t\tm := dllList;\r\t\tWHILE m # NIL DO DevCPM.ObjW(\"$\"); OutName(m.library^); m := m.link END;\r\t\ti := 1;\r\t\tWHILE i < DevCPT.nofGmod DO\r\t\t\tm := DevCPT.GlbMod[i];\r\t\t\tIF m.library = NIL THEN OutName(m.name^) END;\r\t\t\tINC(i)\r\t\tEND;\r\t\tAlign(16); headSize := DevCPM.ObjLen();\r\t\tIF procVarIndirect THEN\r\t\t\ti := 0; EnumXProc(DevCPT.topScope.right, i)\r\t\tEND\r\tEND OutHeader;\r\r\tPROCEDURE "
                    attr: 0
                  - text: OutCode
