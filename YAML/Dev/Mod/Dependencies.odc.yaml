                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT\r\t\t"
                    attr: 0
                  - text: Kernel
                    attr: 3
                  - text: ", Files, Dialog, TextMappers, TextControllers, StdDialog, StdFolds, Strings, Views, Ports, \r\t\tFonts, Properties, Controllers, Stores, HostMenus, HostPorts, StdCmds, Math, \r\t\tTextModels, TextViews, Dates, DevCommanders;\r\t\r\tCONST \r\t\tbold = 0; italic = 1;\t(* "
                    attr: 0
                  - text: "used with SetStyle "
                    attr: 1
                  - text: "*)\r\t\tfull = TRUE;\t\t\t(* "
                    attr: 0
                  - text: "used with DependencyList "
                    attr: 1
                  - text: "*)\r\t\timplicit = TRUE; \t   (* used with GetNode *)\r\t\t\r\tTYPE \r\t\tString = ARRAY 256 OF CHAR;\r\t\t\r"
                    attr: 0
                  - text: "\t\t(** Data structure types **)\r\t\t"
                    attr: 1
                  - text: "\r\t\tSubgraph = POINTER TO RECORD (Stores.Store)\r\t\t\tnode: List;\r\t\t\tisImplicit: BOOLEAN;\r\t\t\tnext: Subgraph\r\t\tEND;\r\t\tSubsystemList = POINTER TO RECORD (Stores.Store)\r\t\t\tname:  String;\r\t\t\tisExpanded, isLayedout, isHidden, isBasic, isStart, isSelected: BOOLEAN;\r\t\t\tl, b, w, h, level: INTEGER;\r\t\t\tnext: SubsystemList\r\t\tEND;\r\t\tList = POINTER TO RECORD (Stores.Store)\r\t\t\tname: String;\r\t\t\timports: Subgraph;\r\t\t\tsubsystem: SubsystemList;\r\t\t\tl, b, w, h: INTEGER;\r\t\t\tisLayedout, isHidden, isStart, isSelected, isImported, onlyImplicit: BOOLEAN;\r\t\t\tnext: List\r\t\tEND;\r\t\tNameList = POINTER TO RECORD (Stores.Store)\r\t\t\tname: String; \r\t\t\tnext: NameList\r\t\tEND;\r\t\t\r"
                    attr: 0
                  - text: "\t\t(** View type **)\r\t\t"
                    attr: 1
                  - text: "\r\t\tView = POINTER TO RECORD (Views.View)\r\t\t\tlist: List;\r\t\t\tstartList: NameList;\r\t\t\tsubsystems: SubsystemList;\r\t\t\tmaxLevel, nofMods: INTEGER;\r\t\t\tselfont, normfont: Fonts.Font;\r\t\t\tshowBasic: BOOLEAN\r\t\tEND;\r\t\t\r"
                    attr: 0
                  - text: "\t\t(** Meta types **)"
                    attr: 1
                  - text: "\r\t\t\r\t\tMetaList = POINTER TO RECORD list: List; next: MetaList END;\r\t\tMetaSSList = POINTER TO RECORD sslist: SubsystemList; next: MetaSSList END;\r\t\t\r"
                    attr: 0
                  - text: "\t\t(** Operation types **)\r\t\t\r\t\t"
                    attr: 1
                  - text: "DepOp = POINTER TO ABSTRACT RECORD (Stores.Operation)\r\t\t\tview: View;\r\t\t\tmods: MetaList; subs: MetaSSList\r\t\tEND;\r\t\tExpandOp = POINTER TO RECORD (DepOp) expand: BOOLEAN END;\r\t\tMoveOp = POINTER TO RECORD (DepOp) dx, dy, l, t, r, b: INTEGER END;\r\t\tHideOp = POINTER TO RECORD (DepOp) END;\r\t\tHideBasicOp = POINTER TO RECORD (Stores.Operation) view: View END;\r\t\tShowAllOp = POINTER TO RECORD (DepOp) END;\t\r\t\tExpandAllOp = POINTER TO RECORD (DepOp) expand: BOOLEAN END;\t\r\t\t\t\r\t(** "
                    attr: 0
                  - text: "Forward declaragions "
                    attr: 1
                  - text: "**)\t\t\r\r\tPROCEDURE^ StartAnalysis (startList: NameList; font: Fonts.Font; incImpl: BOOLEAN; OUT v: View);\r\t\r"
                    attr: 0
                  - text: "\t(** Auxiliary procedures **)\r\t"
                    attr: 1
                  - text: "\r\tPROCEDURE RWord (reader: Files.Reader; OUT x: INTEGER);\r\t\tVAR b: BYTE; y: INTEGER;\r\tBEGIN\r\t\treader.ReadByte(b); y := b MOD 256;\r\t\treader.ReadByte(b); y := y + 100H * (b MOD 256);\r\t\treader.ReadByte(b); y := y + 10000H * (b MOD 256);\r\t\treader.ReadByte(b); x := y + 1000000H * b\r\tEND RWord;\r\t\r\tPROCEDURE RNum (reader: Files.Reader; OUT x: INTEGER);\r\t\tVAR b: BYTE; s, y: INTEGER;\r\tBEGIN\r\t\ts := 0; y := 0; reader.ReadByte(b);\r\t\tWHILE b < 0 DO INC(y, ASH(b + 128, s)); INC(s, 7); reader.ReadByte(b) END;\r\t\tx := ASH((b + 64) MOD 128 - 64, s) + y\r\tEND RNum;\r\t\r\tPROCEDURE RName (reader: Files.Reader; OUT name: ARRAY OF CHAR);\r\t\tVAR b: BYTE; i, n, res: INTEGER; s: ARRAY 256 OF SHORTCHAR;\r\tBEGIN\r\t\ti := 0; n := LEN(name) - 1; reader.ReadByte(b);\r\t\tWHILE (i < n) & (b # 0) DO s[i] := SHORT(CHR(b)); INC(i); reader.ReadByte(b) END;\r\t\tWHILE b # 0 DO reader.ReadByte(b) END;\r\t\ts[i] := 0X;\r\t\tStrings.Utf8ToString(s, name, res); ASSERT(res = 0)\r\tEND RName;\r\t\r\tPROCEDURE GetImports(IN name: String; \r\t\t\t\t\t\t\t\t\tOUT imps: POINTER TO ARRAY OF String; OUT nofImps: INTEGER; OUT found: BOOLEAN);\r\t\tVAR \r\t\t\tfile: Files.File; loc: Files.Locator; fileName: Files.Name; reader: Files.Reader;\r\t\t\tn, i, j, tmpWord: INTEGER; \r\t\t\timpName, dollarStr: String; tmpImps: POINTER TO ARRAY OF String;\r\tBEGIN\r\t\tfound := TRUE;\r\t\tStdDialog.GetSubLoc(name, \"Code\", loc, fileName);\r\t\tfile := Files.dir.Old(loc, fileName, Files.shared);\r\t\tIF file # NIL THEN\r\t\t\treader := file.NewReader(NIL); reader.SetPos(0); RWord(reader, n);\r\t\t\tIF n = 6F4F4346H THEN\r\t\t\t\tRWord(reader, tmpWord); RWord(reader, tmpWord); RWord(reader, tmpWord); RWord(reader, tmpWord);\r\t\t\t\tRWord(reader, tmpWord); RWord(reader, tmpWord); RNum(reader, n); RName(reader, impName); \r\t\t\t\ti := 0; nofImps := n; IF nofImps > 0 THEN NEW(imps, nofImps) END;\r\t\t\t\tFOR i :=0 TO n - 1 DO\r\t\t\t\t\tRName(reader, impName); Strings.Extract(impName$, 0, 1, dollarStr);\r\t\t\t\t\tIF dollarStr = \"$\" THEN (* To avoid analysis of windows platform imports *)\r\t\t\t\t\t\timps[i] := \"\"; DEC(nofImps)\r\t\t\t\t\tELSE\r\t\t\t\t\t\timps[i] := impName$\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tIF nofImps # n THEN (* some names are empty, delete them *)\r\t\t\t\t\tIF nofImps = 0 THEN \r\t\t\t\t\t\timps := NIL\r\t\t\t\t\tELSE\r\t\t\t\t\t\tNEW(tmpImps, nofImps); j := 0;\r\t\t\t\t\t\tFOR i := 0 TO n-1 DO IF imps[i] # \"\" THEN tmpImps[j] := imps[i]; INC(j) END END;\r\t\t\t\t\t\timps := tmpImps\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE \r\t\t\tfound := FALSE\r\t\tEND\r\tEND GetImports;\r\t\r\tPROCEDURE GetImplicitDependencies(\r\t\tIN name: String; OUT imps: POINTER TO ARRAY OF String; OUT nofImps: INTEGER\r\t);\r\t\tVAR deps: String; t: TextModels.Model; s: TextMappers.Scanner; i: INTEGER;\r\tBEGIN\r\t\tDialog.MapString(\"#Dev:Implicit.\" + name, deps);\r\t\tIF deps # \"Implicit.\" + name THEN\r\t\t\tt := TextModels.dir.NewFromString(deps); s.ConnectTo(t); s.SetPos(0); s.Scan; i := 0;\r\t\t\tWHILE s.type # TextMappers.eot DO\r\t\t\t\tIF s.type = TextMappers.string THEN INC(i) END;\r\t\t\t\ts.Scan\r\t\t\tEND;\r\t\t\tnofImps := i; NEW(imps, nofImps); \r\t\t\ts.SetPos(0); s.Scan; i := 0;\r\t\t\tWHILE s.type # TextMappers.eot DO\r\t\t\t\tIF s.type = TextMappers.string THEN imps[i] := s.string$; INC(i) END;\r\t\t\t\ts.Scan\r\t\t\tEND\r\t\tELSE\r\t\t\timps := NIL; nofImps := 0\r\t\tEND\r\tEND GetImplicitDependencies;\r\t\r\tPROCEDURE GetModuleList (OUT modList: NameList);\r\t\tVAR c: TextControllers.Controller; s: TextMappers.Scanner; beg, end: INTEGER; l: NameList;\r\tBEGIN\r\t\tmodList := NIL;\r\t\tc := TextControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tc.GetSelection(beg, end);\r\t\t\ts.ConnectTo(c.text); s.SetPos(beg); s.Scan;\r\t\t\tWHILE (s.start < end) & (s.type # TextMappers.invalid) DO\r\t\t\t\tIF (s.type = TextMappers.string) THEN\r\t\t\t\t\tNEW(l); IF modList # NIL THEN Stores.Join(modList, l) END;\r\t\t\t\t\tl.next := modList; l.name := s.string$; modList := l; s.Scan\r\t\t\t\tELSE\r\t\t\t\t\ts.Scan\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND GetModuleList;\r\t\r"
                    attr: 0
                  - text: "\t(** List **)\r\t"
                    attr: 1
                  - text: "\r\tPROCEDURE (l: List) GetExtent(OUT w, h: INTEGER), NEW;\r\tBEGIN\r\t\tIF l.subsystem.isExpanded THEN w := l.w; h:= l.h\r\t\tELSE w := l.subsystem.w; h := l.subsystem.h END\r\tEND GetExtent;\r\r\tPROCEDURE (l: List) GetPosition(OUT x, y: INTEGER), NEW;\r\tBEGIN\r\t\tIF l.subsystem.isExpanded THEN x := l.l; y:= l.b\r\t\tELSE x := l.subsystem.l; y := l.subsystem.b END\r\tEND GetPosition;\r\t\r\tPROCEDURE (l: List) SetPosition(x, y: INTEGER), NEW;\r\tBEGIN\r\t\tIF x < 1 THEN x := 1 END; IF y < 1 THEN y := 1 END; (* To keep objects in the second quadrant *)\r\t\tIF l.subsystem.isExpanded THEN  l.l := x; l.b:= y\r\t\tELSE l.subsystem.l := x; l.subsystem.b := y END\r\tEND SetPosition;\r\t\r\tPROCEDURE (l: List) Selected(): BOOLEAN, NEW;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: "RETURN "
                    attr: 3
                  - text: "l.subsystem.isExpanded & l.isSelected\r\tEND Selected;\r\t\r\tPROCEDURE (l: List) Visible(showBasic: BOOLEAN): BOOLEAN, NEW;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " l.subsystem.isExpanded\r\t\t\t& ~l.isHidden & ~l.subsystem.isHidden & (~l.subsystem.isBasic OR showBasic)\r\tEND Visible;\r\t\r\t\r\t"
                    attr: 0
                  - text: "(** SubsystemList **)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE (s: SubsystemList) Selected(): BOOLEAN, NEW;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: "RETURN "
                    attr: 3
                  - text: "~s.isExpanded & s.isSelected\r\tEND Selected;\r\t\r\tPROCEDURE (s: SubsystemList) Visible(showBasic: BOOLEAN): BOOLEAN, NEW;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " ~s.isExpanded & ~s.isHidden & (~s.isBasic OR showBasic)\r\tEND Visible;\r\t\r"
                    attr: 0
                  - text: "\t\r\t(** View **)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE (v: View) GetNode (name: String; incImpl: BOOLEAN; VAR node: List), NEW;\r\t\tVAR \r\t\t\ttmpList, tmpNode: List; sl: NameList;\r\t\t\ttmpGraph, prevGraph: Subgraph;\r\t\t\tnofImps, i: INTEGER; found: BOOLEAN;\r\t\t\thead, tail: String;\r\t\t\tsslist: SubsystemList;\r\t\t\timps: POINTER TO ARRAY OF String;\r\tBEGIN\r\t\t(* First check if a node with the sought name exists in the nodeList. \r\t\t   Otherwise build a new subgraph from objectfiles. *)\r\t\ttmpList := v.list;\r\t\tWHILE (tmpList # NIL) & (tmpList.name # name) DO tmpList := tmpList.next END;\r\t\tIF tmpList # NIL THEN\r\t\t\tnode := tmpList\r\t\tELSE\r\t\t\t(* Create a new node from an objectfile. *)\r\t\t\tGetImports(name, imps, nofImps, found); \r\t\t\tIF found THEN\r\t\t\t\tNEW(tmpList); Stores.Join(v, tmpList); INC(v.nofMods);\r\t\t\t\ttmpList.name := name; \r\t\t\t\t(* if subsystem exists then use it otherwise create a new one *) \r\t\t\t\tKernel.SplitName(name, head, tail); IF head = \"\" THEN head := \"System\" END;\r\t\t\t\tsslist := v.subsystems;\r\t\t\t\tWHILE (sslist # NIL) & (sslist.name # head) DO sslist := sslist.next END;\r\t\t\t\tIF sslist = NIL THEN\r\t\t\t\t\tNEW (sslist); Stores.Join(v, sslist); sslist.name := head; sslist.next := v.subsystems;\r\t\t\t\t\tsslist.level := v.maxLevel; sslist.isExpanded := FALSE;\r\t\t\t\t\tv.subsystems := sslist \r\t\t\t\tEND;\r\t\t\t\tsl := v.startList; (* If it is one of the start modules it should be expanded *)\r\t\t\t\tWHILE (sl # NIL) & (sl.name # name) DO sl := sl.next END; \r\t\t\t\tIF sl # NIL THEN\r\t\t\t\t\tsslist.isExpanded := TRUE; sslist.level := 1; sslist.isStart := TRUE; tmpList.isStart := TRUE\r\t\t\t\tEND;\r\t\t\t\ttmpList.subsystem := sslist; tmpList.imports := NIL; \r\t\t\t\ttmpList.next := v.list; v.list := tmpList; tmpGraph := NIL;\r\t\t\t\tFOR i := 0 TO nofImps - 1 DO\r\t\t\t\t\tprevGraph := tmpGraph; NEW(tmpGraph); tmpGraph.isImplicit := FALSE; Stores.Join(v, tmpGraph);\r\t\t\t\t\tv.GetNode(imps[i], incImpl, tmpNode);\r\t\t\t\t\ttmpNode.isImported := TRUE; (* "
                    attr: 0
                  - text: to be able to identify root modules
                    attr: 1
                  - text: " *)\r\t\t\t\t\ttmpGraph.node := tmpNode; tmpGraph.next := prevGraph\r\t\t\t\tEND;\r\t\t\t\tIF incImpl THEN\r\t\t\t\t\tGetImplicitDependencies(name, imps, nofImps);\r\t\t\t\t\tFOR i := 0 TO nofImps - 1 DO\r\t\t\t\t\t\tprevGraph := tmpGraph; NEW(tmpGraph); tmpGraph.isImplicit := TRUE; Stores.Join(v, tmpGraph);\r\t\t\t\t\t\tv.GetNode(imps[i], incImpl, tmpNode);\r\t\t\t\t\t\ttmpGraph.node := tmpNode; tmpGraph.next := prevGraph\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\ttmpList.imports := tmpGraph; node := tmpList\r\t\t\tELSE \r\t\t\t\tDialog.ShowParamMsg(\"#Dev:ModuleNotFound\", name, \"\", \"\")\r\t\t\tEND\t\t\r\t\tEND\r\tEND GetNode;\r\t\r\tPROCEDURE (v: View) OnSelectedObject(x, y: INTEGER): BOOLEAN, NEW;\r\t\tVAR \r\t\t\tl: List; s: SubsystemList;\r\tBEGIN\r\t\tl := v.list; \r\t\tWHILE l # NIL DO\r\t\t\tIF l.Visible(v.showBasic) &  l.Selected() & (x > l.l) & (x < l.l + l.w) & (y < l.b) & (y > l.b - l.h) THEN\r\t\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE\r\t\t\tEND;\r\t\t\tl := l.next\r\t\tEND;\r\t\ts := v.subsystems;\r\t\tWHILE s # NIL DO\r\t\t\tIF s.Visible(v.showBasic) & s.Selected() & (x > s.l) & (x < s.l + s.w) & (y < s.b) & (y > s.b - s.h) THEN\r\t\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE\r\t\t\tEND;\r\t\t\ts := s.next\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE\r\tEND OnSelectedObject;\r\t\r\tPROCEDURE (v: View) OnObject(x, y: INTEGER): BOOLEAN, NEW;\r\t\tVAR \r\t\t\tl: List; s: SubsystemList;\r\tBEGIN\r\t\tl := v.list; \r\t\tWHILE l # NIL DO\r\t\t\tIF l.Visible(v.showBasic) & (x > l.l) & (x < l.l + l.w) & (y < l.b) & (y > l.b - l.h) THEN\r\t\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE\r\t\t\tEND;\r\t\t\tl := l.next\r\t\tEND;\r\t\ts := v.subsystems;\r\t\tWHILE s # NIL DO\r\t\t\tIF s.Visible(v.showBasic) & (x > s.l) & (x < s.l + s.w) & (y < s.b) & (y > s.b - s.h) THEN\r\t\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE\r\t\t\tEND;\r\t\t\ts := s.next\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE\r\tEND OnObject;\r\t\r\tPROCEDURE OverLap(l1, t1, r1, b1, l2, t2, r2, b2: INTEGER): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: "  ~((l1 > r2) OR (l2 > r1) OR (t1 > b2) OR (t2 > b1))\r\tEND OverLap;\r\t\r\tPROCEDURE (v: View) Select(x1, y1, x2, y2: INTEGER; modifiers: SET), NEW;\r\t\tVAR l: List; s: SubsystemList;\r\tBEGIN\r\t\tl := v.list; \r\t\tWHILE l # NIL DO\r\t\t\tIF l.Visible(v.showBasic) & OverLap(l.l, l.b - l.h, l.l + l.w, l.b, x1, y1, x2, y2) THEN \r\t\t\t\tIF (Controllers.extend IN modifiers) OR (Controllers.modify IN modifiers) THEN\r\t\t\t\t\tl.isSelected := ~l.isSelected\r\t\t\t\tELSE\r\t\t\t\t\tl.isSelected := TRUE\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tIF ~(Controllers.extend IN modifiers) & ~(Controllers.modify IN modifiers) THEN l.isSelected := FALSE END\r\t\t\tEND;\r\t\t\tl := l.next\r\t\tEND;\r\t\ts := v.subsystems;\r\t\tWHILE s # NIL DO\r\t\t\tIF s.Visible(v.showBasic) & OverLap(s.l, s.b - s.h, s.l + s.w, s.b, x1, y1, x2, y2)  THEN \r\t\t\t\tIF (Controllers.extend IN modifiers) OR (Controllers.modify IN modifiers) THEN\r\t\t\t\t\ts.isSelected := ~s.isSelected\r\t\t\t\tELSE\r\t\t\t\t\ts.isSelected := TRUE\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tIF ~(Controllers.extend IN modifiers) & ~(Controllers.modify IN modifiers) THEN\r\t\t\t\t\ts.isSelected := FALSE\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\ts := s.next\r\t\tEND\r\tEND Select;\r\t\r\tPROCEDURE (v: View) SelectAll(set: BOOLEAN), NEW;\r\t\tVAR l: List; s: SubsystemList;\r\tBEGIN\r\t\tl := v.list; \r\t\tWHILE l # NIL DO l.isSelected := set & l.Visible(v.showBasic); l := l.next END;\r\t\ts := v.subsystems;\r\t\tWHILE s # NIL DO s.isSelected := set & s.Visible(v.showBasic); s := s.next END;\r\t\tViews.Update(v, Views.keepFrames)\r\tEND SelectAll;\r\t\t\r\r"
                    attr: 0
                  - text: "\t(** Operations on the View **)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE (dop: DepOp) AddSelection(), NEW;\r\t\tVAR ml: MetaList; ms: MetaSSList; l: List; s: SubsystemList;\r\tBEGIN\r\t\tASSERT(dop.view # NIL, 20);\r\t\tl := dop.view.list; \r\t\tWHILE l # NIL DO\r\t\t\tIF l.Selected() THEN NEW(ml); ml.list := l; ml.next := dop.mods; dop.mods := ml END; l := l.next\r\t\tEND;\r\t\ts := dop.view.subsystems;\r\t\tWHILE s # NIL DO\r\t\t\tIF s.Selected() THEN NEW(ms); ms.sslist := s; ms.next := dop.subs; dop.subs := ms END; s := s.next\r\t\tEND\r\tEND AddSelection;\r\t\r\tPROCEDURE (e: ExpandOp) Do;\r\t\tVAR l: MetaList; s: MetaSSList;\r\tBEGIN\r\t\tl := e.mods;\r\t\tWHILE l # NIL DO l.list.subsystem.isExpanded := e.expand; l := l.next END;\r\t\ts := e.subs;\r\t\tWHILE s # NIL DO s.sslist.isExpanded := e.expand; s := s.next END;\r\t\te.expand := ~e.expand;\r\t\tViews.Update(e.view, Views.keepFrames)\r\tEND Do;\r\t\r\tPROCEDURE (m: MoveOp) BoundingBox, NEW;\r\t\tVAR l: MetaList; s: MetaSSList; h, d, w: INTEGER;\r\tBEGIN\r\t\tm.l := MAX(INTEGER); m.t := m.l; m.b := 0; m.r := 0;\r\t\tl := m.mods;\r\t\tWHILE l # NIL DO\r\t\t\tIF (l.list.l < m.l) THEN m.l := l.list.l END;\r\t\t\tIF (l.list.b - l.list.h < m.t) THEN m.t := l.list.b - l.list.h END;\r\t\t\tIF (l.list.l + l.list.w >  m.r) THEN m.r := l.list.l + l.list.w END;\r\t\t\tIF (l.list.b > m.b) THEN m.b := l.list.b END;\r\t\t\tl := l.next \r\t\tEND;\r\t\ts := m.subs;\r\t\tWHILE s # NIL DO\r\t\t\tIF (s.sslist.l < m.l) THEN m.l := s.sslist.l END;\r\t\t\tIF (s.sslist.b - s.sslist.h < m.t) THEN m.t := s.sslist.b - s.sslist.h END;\r\t\t\tIF (s.sslist.l + s.sslist.w >  m.r) THEN m.r := s.sslist.l + s.sslist.w END;\r\t\t\tIF (s.sslist.b > m.b) THEN m.b := s.sslist.b END;\r\t\t\ts := s.next \r\t\tEND;\r\t\tm.view.selfont.GetBounds(h, d, w);\r\t\tm.b := m.b + d; (* correction for descent *)\r\t\tm.r := m.r + w; m.l := m.l - w (* correction for incorrect values by italic fonts *)\r\tEND BoundingBox;\r\t\r\tPROCEDURE (m: MoveOp) Do;\r\t\tVAR l: MetaList; s: MetaSSList;\r\tBEGIN\r\t\tl := m.mods;\r\t\tWHILE l # NIL DO l.list.l := l.list.l + m.dx; l.list.b := l.list.b + m.dy; l := l.next END;\r\t\ts := m.subs;\r\t\tWHILE s # NIL DO s.sslist.l := s.sslist.l + m.dx; s.sslist.b := s.sslist.b + m.dy; s := s.next END;\r\t\tm.dx := -m.dx; m.dy := -m.dy;\r\t\tViews.Update(m.view, Views.keepFrames)\r\tEND Do;\r\t\r\tPROCEDURE (h: HideOp) Do;\r\t\tVAR l: MetaList; s: MetaSSList;\r\tBEGIN\r\t\tl := h.mods;\r\t\tWHILE l # NIL DO l.list.isHidden := ~l.list.isHidden; l := l.next END;\r\t\ts := h.subs;\r\t\tWHILE s # NIL DO s.sslist.isHidden := ~s.sslist.isHidden; s := s.next END;\r\t\tViews.Update(h.view, Views.keepFrames)\r\tEND Do;\r\t\r\tPROCEDURE (h: HideBasicOp) Do;\r\tBEGIN\r\t\th.view.showBasic := ~h.view.showBasic;\r\t\tViews.Update(h.view, Views.keepFrames)\r\tEND Do;\r\t\r\tPROCEDURE (s: ShowAllOp) Do;\r\t\tVAR ml: MetaList; mssl: MetaSSList;\r\tBEGIN\r\t\tml := s.mods; mssl := s.subs;\r\t\tWHILE ml # NIL DO ml.list.isHidden := ~ml.list.isHidden; ml := ml.next END;\r\t\tWHILE mssl # NIL DO mssl.sslist.isHidden := ~mssl.sslist.isHidden; mssl := mssl.next END;\r\t\tViews.Update(s.view, Views.keepFrames)\r\tEND Do;\r\t\r\tPROCEDURE (e: ExpandAllOp) Do;\r\t\tVAR mssl: MetaSSList;\r\tBEGIN\r\t\tmssl := e.subs;\r\t\tWHILE mssl # NIL DO mssl.sslist.isExpanded := e.expand; mssl := mssl.next END;\r\t\te.expand := ~e.expand;\r\t\tViews.Update(e.view, Views.keepFrames)\r\tEND Do;\r\t\r\tPROCEDURE (v: View) ExpandCollapse(expand: BOOLEAN), NEW;\r\t\tVAR e: ExpandOp;\r\tBEGIN\r\t\tNEW(e); e.view := v; e.AddSelection; e.expand := expand;\r\t\tIF e.expand THEN e.mods := NIL ELSE e.subs := NIL END;\r\t\tViews.Do(v, \"Toggle Expand/Collapse\", e)\r\tEND ExpandCollapse;\r\t\r\t\r"
                    attr: 0
                  - text: "\t(** Redrawing the view **)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE (v: View) SetExtents, NEW;\r\t\tVAR tmpList: List; ssList: SubsystemList; h, d, w: INTEGER;\r\tBEGIN\r\t\ttmpList := v.list; v.selfont.GetBounds(h, d, w);\r\t\tWHILE tmpList # NIL DO\r\t\t\ttmpList.w := v.selfont.StringWidth(tmpList.name); tmpList.h := h; tmpList := tmpList.next\r\t\tEND;\r\t\tssList := v.subsystems;\r\t\tWHILE ssList # NIL DO\r\t\t\tssList.w := v.selfont.StringWidth(\"[\" + ssList.name + \"]\"); ssList.h := h; ssList := ssList.next\r\t\tEND\r\tEND SetExtents;\r\t\r\tPROCEDURE (v: View)  Layout, NEW;\r\t\tCONST space = 5 * Ports.mm;\r\t\tVAR\r\t\t\twidth, height, xindent, yindent, level: INTEGER;\r\t\t\tlevelIndent: POINTER TO ARRAY OF INTEGER;\r\t\t\ttmpList: List; \r\tBEGIN\r\t\tNEW(levelIndent, v.maxLevel + 1); v.context.GetSize(width, height);\r\t\ttmpList := v.list;\r\t\tWHILE tmpList # NIL DO\r\t\t\tIF tmpList.isStart THEN \r\t\t\t\tyindent := space; level := 0 \r\t\t\tELSE \r\t\t\t\tlevel := tmpList.subsystem.level;\r\t\t\t\tyindent := space + (15 * Ports.mm * level)\r\t\t\tEND;\r\t\t\txindent := space + levelIndent[level];\r\t\t\tWHILE xindent + v.normfont.StringWidth(tmpList.name) > width DO\r\t\t\t\txindent := xindent - width;\r\t\t\t\tyindent := yindent + (4 * Ports.mm)\r\t\t\tEND;\r\t\t\tIF  ~tmpList.subsystem.isBasic OR v.showBasic THEN\r\t\t\t\tIF tmpList.subsystem.isExpanded THEN\r\t\t\t\t\tIF ~tmpList.isHidden & ~tmpList.isLayedout THEN\r\t\t\t\t\t\tlevelIndent[level] := levelIndent[level] + tmpList.w + space;\r\t\t\t\t\t\ttmpList.SetPosition(xindent, yindent); tmpList.isLayedout := TRUE\r\t\t\t\t\tEND\r\t\t\t\tELSIF ~ tmpList.subsystem.isHidden & ~tmpList.subsystem.isLayedout THEN\r\t\t\t\t\tlevelIndent[level] := levelIndent[level] + tmpList.subsystem.w + space;\r\t\t\t\t\ttmpList.SetPosition(xindent, yindent); tmpList.subsystem.isLayedout := TRUE\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\ttmpList := tmpList.next\r\t\tEND\r\tEND Layout;\r\t\r\tPROCEDURE (v: View) DrawArrow(f: Views.Frame; ax, ay, bx, by, s: INTEGER), NEW;\r\t\tCONST ArrowLen = 1 * Ports.mm;\r\t\tTYPE Vector = RECORD x, y: REAL END;\r\t\tVAR a, b, c, d, e, v1, v2: Vector; lenc, m, x, y: REAL; p: ARRAY 3 OF Ports.Point;\r\tBEGIN\r\t\ta.x := ax; a.y := ay; b.x := bx; b.y := by; c.x := b.x - a.x; c.y := b.y - a.y;\r\t\tm := MAX(ABS(c.x), ABS(c.y)); x := c.x / m; y := c.y / m;\r\t\tlenc := m * Math.Sqrt(x * x + y * y); s := MAX(1, SHORT(ENTIER(1.5 * s)) DIV Ports.point); (* scaling factor *)\r\t\te.x := c.x * s / lenc; e.y := c.y * s / lenc; \r\t\td.x := e.y; d.y := - e.x; (* first orthogonal vector *)\r\t\tv1.x := (e.x + d.x) * ArrowLen; v1.y := (e.y + d.y) * ArrowLen; \r\t\tv1.x := -v1.x; v1.y := -v1.y; (* mirror vector *)\r\t\td.x := -d.x; d.y := -d.y; (* second orthogonal vector *)\r\t\tv2.x := (e.x + d.x) * ArrowLen; v2.y := (e.y + d.y) * ArrowLen; \r\t\tv2.x := -v2.x; v2.y := -v2.y; (* mirror vector *)\r\t\tp[0].x := SHORT(ENTIER(b.x));p[0].y := SHORT(ENTIER(b.y));\r\t\tp[1].x := SHORT(ENTIER(b.x + v1.x)); p[1].y := SHORT(ENTIER(b.y + v1.y));\r\t\tp[2].x := SHORT(ENTIER(b.x + v2.x)); p[2].y := SHORT(ENTIER(b.y + v2.y));\r\t\tf.DrawPath(p, 3, Ports.fill, Ports.black, Ports.closedPoly)\r\tEND DrawArrow;\r\t\r\tPROCEDURE (v: View)  DrawDependencies (f: Views.Frame; l, t, r, b: INTEGER), NEW;\r\t\tVAR\r\t\t\txindent, yindent, startx, starty, middlex, middley, sx, sy, thickness: INTEGER;\r\t\t\tsubgraph: Subgraph; tmpList: List; s: SubsystemList;\r\tBEGIN\r\t\tthickness := MAX(2, (v.normfont.size DIV 8));\r\t\tf.DrawRect(l, t, r, b, Ports.fill, Ports.white);\r\t\ttmpList := v.list;\r\t\tWHILE tmpList # NIL DO\r\t\t\tIF tmpList.Visible(v.showBasic) OR tmpList.subsystem.Visible(v.showBasic) THEN\r\t\t\t\tsubgraph := tmpList.imports;\r\t\t\t\ttmpList.GetPosition(startx, starty);\r\t\t\t\tWHILE subgraph # NIL DO\r\t\t\t\t\tIF subgraph.node.Visible(v.showBasic) OR subgraph.node.subsystem.Visible(v.showBasic) THEN\r\t\t\t\t\t\tsubgraph.node.GetPosition(sx, sy);\r\t\t\t\t\t\tmiddlex := ABS(startx - ((startx - sx) DIV 2));\r\t\t\t\t\t\tmiddley := ABS(starty - ((starty - sy) DIV 2));\r\t\t\t\t\t\tIF ~subgraph.isImplicit THEN\r\t\t\t\t\t\t\tf.DrawLine(startx, starty, middlex, middley, thickness, Ports.red);\r\t\t\t\t\t\t\tf.DrawLine(middlex, middley, sx, sy, thickness, Ports.blue)\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tf.DrawLine(startx, starty, middlex, middley, thickness, Ports.grey25);\r\t\t\t\t\t\t\tf.DrawLine(middlex, middley, sx, sy, thickness, Ports.grey25)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF (middlex # startx) OR (middley # starty) THEN\r\t\t\t\t\t\t\tv.DrawArrow(f, startx, starty, middlex, middley, thickness)\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND;\r\t\t\t\t\tsubgraph := subgraph.next\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\ttmpList := tmpList.next\r\t\tEND;\r\t\t(* Draw the names of the modules last, so they end up on top *)\r\t\ttmpList := v.list;\r\t\tWHILE tmpList # NIL DO\r\t\t\tIF tmpList.Visible(v.showBasic) THEN\r\t\t\t\ttmpList.GetPosition(xindent, yindent);\r\t\t\t\tIF tmpList.Selected() THEN\r\t\t\t\t\tf.DrawString(xindent, yindent, Ports.black, tmpList.name, v.selfont)\r\t\t\t\tELSE\r\t\t\t\t\tf.DrawString(xindent, yindent, Ports.black, tmpList.name, v.normfont)\r\t\t\t\tEND;\r\t\t\t\tf.DrawOval(xindent - (Ports.mm DIV 2), yindent - (Ports.mm DIV 2), xindent + (Ports.mm DIV 2), yindent + \r\t\t\t\t\t(Ports.mm DIV 2), Ports.fill, Ports.black)\r\t\t\tEND;\r\t\t\ttmpList := tmpList.next\r\t\tEND;\r\t\ts := v.subsystems;\r\t\tWHILE s # NIL DO\r\t\t\tIF s.Visible(v.showBasic) THEN\r\t\t\t\txindent := s.l; yindent := s.b;\r\t\t\t\tIF s.Selected() THEN\r\t\t\t\t\tf.DrawString(xindent, yindent, Ports.black, \"[\" + s.name + \"]\", v.selfont)\r\t\t\t\tELSE\r\t\t\t\t\tf.DrawString(xindent, yindent, Ports.black, \"[\" + s.name + \"]\", v.normfont)\r\t\t\t\tEND;\r\t\t\t\tf.DrawOval(xindent - (Ports.mm DIV 2), yindent - (Ports.mm DIV 2), xindent + (Ports.mm DIV 2), yindent + \r\t\t\t\t\t(Ports.mm DIV 2), Ports.fill, Ports.black)\r\t\t\tEND;\r\t\t\ts := s.next\r\t\tEND\r\tEND DrawDependencies;\r\t\r\tPROCEDURE (v: View)  Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tv.Layout();\r\t\tv.DrawDependencies(f, l, t, r, b)\r\tEND Restore;\r\t\r\t\r"
                    attr: 0
                  - text: "\t(** Handle view messages **)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE (v: View) SetProps(p: Properties.Property), NEW;\r\t\tVAR \r\t\t\tsize: INTEGER;\r\t\t\ttypeface: Fonts.Typeface;\r\t\t\tprop: Properties.StdProp;\r\t\t\tstyle: SET;\r\tBEGIN\r\t\tWHILE (p # NIL) & ~(p IS Properties.StdProp) DO p := p.next END;\r\t\tIF p # NIL THEN\r\t\t\tprop := p(Properties.StdProp); size := v.normfont.size; \r\t\t\ttypeface := v.normfont.typeface; style := v.normfont.style;\r\t\t\tIF Properties.size IN prop.valid THEN size := prop.size END;\r\t\t\tIF Properties.typeface IN prop.valid THEN typeface := prop.typeface END;\r\t\t\tIF Properties.style IN prop.valid THEN \r\t\t\t\tIF Fonts.underline IN prop.style.mask THEN\r\t\t\t\t\tIF Fonts.underline IN prop.style.val THEN style := style + {Fonts.underline} \r\t\t\t\t\tELSE style := style - {Fonts.underline} END\r\t\t\t\tEND;\r\t\t\t\tIF Fonts.italic IN prop.style.mask THEN\r\t\t\t\t\tIF Fonts.italic IN prop.style.val THEN style := style + {Fonts.italic}\r\t\t\t\t\tELSE style := style - {Fonts.italic} END\r\t\t\t\tEND;\r\t\t\t\tIF Fonts.strikeout IN prop.style.mask THEN\r\t\t\t\t\tIF Fonts.strikeout IN prop.style.val THEN style := style + {Fonts.strikeout}\r\t\t\t\t\tELSE style := style - {Fonts.strikeout} END\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tv.normfont := Fonts.dir.This(typeface, size, style, Fonts.normal);\r\t\t\tv.selfont := Fonts.dir.This(typeface, size, style, Fonts.bold); v.SetExtents();\r\t\t\tViews.Update(v, Views.keepFrames)\r\t\tEND\r\tEND SetProps;\r\t\r\tPROCEDURE (v: View) GetProps(OUT p: Properties.Property), NEW;\r\t\tVAR\r\t\t\tprop: Properties.StdProp;\r\tBEGIN\r\t\t\tNEW(prop); prop.known := {Properties.weight, Properties.size, Properties.typeface, Properties.style};\r\t\t\tprop.valid := {Properties.weight, Properties.size, Properties.typeface, Properties.style};\r\t\t\tprop.typeface := v.normfont.typeface; prop.size := v.normfont.size; prop.weight := v.normfont.weight; \r\t\t\tprop.style.val := v.normfont.style; prop.style.mask := v.normfont.style;\r\t\t\tp := prop\r\tEND GetProps;\r\r\tPROCEDURE (v: View) HandlePropMsg (VAR msg: Properties.Message);\r\t\tCONST min = 50 * Ports.mm; max = 500 * Ports.mm;\r\tBEGIN\r\t\tWITH msg: Properties.SizePref DO\r\t\t\tIF (msg.w = Views.undefined) OR (msg.h = Views.undefined) THEN\r\t\t\t\t msg.w := 200 * Ports.mm; msg.h := 100 * Ports.mm\r\t\t\tELSE\r\t\t\t\tProperties.ProportionalConstraint(2, 1, msg.fixedW, msg.fixedH,\r\t\t\t\t\t\t\t\t\t\tmsg.w, msg.h);\r\t\t\t\tIF msg.h < min THEN\r\t\t\t\t\tmsg.h := min; msg.w := 2 * min\r\t\t\t\tELSIF msg.h > max THEN\r\t\t\t\t\tmsg.h := max; msg.w := 2 * max\r\t\t\t\tEND\r\t\t\tEND\r\t\t| msg: Properties.ResizePref DO\r\t\t\tmsg.horFitToWin := TRUE; msg.verFitToWin := TRUE\r\t\t| msg: Properties.FocusPref DO\r\t\t\tmsg.setFocus := TRUE\r\t\t| msg: Properties.PollMsg DO\r\t\t\tv.GetProps(msg.prop)\r\t\t| msg: Properties.SetMsg DO\r\t\t\tv.SetProps(msg.prop)\r\t\tELSE\t(* ignore other messages *)\r\t\tEND\r\tEND HandlePropMsg;\r\t\r\tPROCEDURE (v: View) HandleMultiSelect (f: Views.Frame; VAR msg: Controllers.TrackMsg), NEW;\r\t\tVAR\r\t\t\tx, y, x1, y1: INTEGER; \r\t\t\tisDown, first: BOOLEAN; m: SET;\r\tBEGIN\r\t\tfirst := TRUE; x1 := -1; y1 := -1;\r\t\tREPEAT \r\t\t\tf.Input(x, y, m, isDown); \r\t\t\tIF (x1 # x) OR (y1 # y) THEN\r\t\t\t\tIF first THEN\r\t\t\t\t\tfirst := FALSE\r\t\t\t\tELSE\r\t\t\t\t\tf.MarkRect(MIN(x1, msg.x), MIN(y1, msg.y), MAX(x1, msg.x), MAX(y1, msg.y), 0, Ports.dim50, FALSE)\r\t\t\t\tEND;\r\t\t\t\tx1 := x; y1 := y;\r\t\t\t\tf.MarkRect(MIN(x1, msg.x), MIN(y1, msg.y), MAX(x1, msg.x), MAX(y1, msg.y), 0, Ports.dim50, TRUE)\r\t\t\tEND\r\t\tUNTIL ~isDown;\r\t\tf.MarkRect(MIN(x1, msg.x), MIN(y1, msg.y), MAX(x1, msg.x), MAX(y1, msg.y), 0, Ports.dim50, FALSE);\r\t\tv.Select(MIN(x1, msg.x), MIN(y1, msg.y), MAX(x1, msg.x), MAX(y1, msg.y), msg.modifiers);\r\t\tViews.Update(v, Views.keepFrames)\r\tEND HandleMultiSelect;\r\t\r\tPROCEDURE (v: View) HandleMove (f: Views.Frame; VAR msg: Controllers.TrackMsg), NEW;\r\t\tVAR\r\t\t\tx1, y1, x, y, res: INTEGER; mo: MoveOp; m: SET; isDown: BOOLEAN;\r\t\t\tml: MetaList; ms: MetaSSList;\r\tBEGIN\r\t\tNEW(mo); mo.view := v; mo.AddSelection; mo.BoundingBox;\r\t\tx1 := msg.x; y1 := msg.y;\r\t\tf.SaveRect(f.l, f.t, f.r, f.b, res);\r\t\tREPEAT \r\t\t\tf.Input(x, y, m, isDown); \r\t\t\tIF (res = 0) & ((x # x1) OR (y # y1)) THEN\r\t\t\t\tx1 := x; y1 := y;\r\t\t\t\tf.RestoreRect(mo.l + mo.dx, mo.t + mo.dy, mo.r + mo.dx, mo.b + mo.dy, Ports.keepBuffer);\r\t\t\t\tmo.dx := x - msg.x; mo.dy := y - msg.y; \r\t\t\t\tIF mo.l + mo.dx < f.l THEN mo.dx := f.l - mo.l END; IF mo.r + mo.dx > f.r THEN mo.dx := f.r - mo.r END;\r\t\t\t\tIF mo.t + mo.dy < f.t THEN mo.dy := f.t - mo.t END; IF mo.b + mo.dy > f.b THEN mo.dy := f.b - mo.b END;\r\t\t\t\tml := mo.mods;\r\t\t\t\tWHILE ml # NIL DO\r\t\t\t\t\tf.DrawString(ml.list.l + mo.dx, ml.list.b + mo.dy, Ports.grey50, ml.list.name, v.selfont); ml := ml.next\r\t\t\t\tEND;\r\t\t\t\tms := mo.subs;\r\t\t\t\tWHILE ms # NIL DO\r\t\t\t\t\tf.DrawString(ms.sslist.l + mo.dx, ms.sslist.b + mo.dy, Ports.grey50, '[' + ms.sslist.name + ']', v.selfont); \r\t\t\t\t\tms := ms.next\r\t\t\t\tEND\r\t\t\tEND\r\t\tUNTIL ~isDown;\r\t\tf.RestoreRect(f.l, f.t, f.r, f.b, Ports.disposeBuffer);\r\t\tViews.Do(v, \"Move\", mo)\r\tEND HandleMove;\r\t\r\tPROCEDURE (v: View) HandleCtrlMsg (f: Views.Frame; VAR msg: Controllers.Message;  VAR focus: Views.View);\r\t\tCONST movedist = Ports.mm * Ports.mm; arrowdist = Ports.mm;\r\t\tVAR\r\t\t\tw, h, x, y, delta: INTEGER; m: SET; \r\t\t\tisDown, isMove: BOOLEAN;\r\t\t\tmo: MoveOp; e: ExpandOp;\r\tBEGIN\r\t\tWITH msg: Controllers.TrackMsg DO\r\t\t\tIF HostPorts.right IN msg.modifiers THEN\r\t\t\t\tHostMenus.PopupMenu\r\t\t\tELSIF (Controllers.doubleClick IN msg.modifiers) THEN\r\t\t\t\tIF v.OnSelectedObject(msg.x, msg.y) THEN\r\t\t\t\t\tNEW(e); e.view := v; e.AddSelection;\r\t\t\t\t\tIF (e.mods # NIL) & (e.subs = NIL) & (e.mods.next = NIL) THEN\r\t\t\t\t\t\te.expand := FALSE; Views.Do(v, \"Collapse \" + e.mods.list.name, e)\r\t\t\t\t\tELSIF (e.mods = NIL) & (e.subs # NIL) & (e.subs.next = NIL) THEN\r\t\t\t\t\t\te.expand := TRUE; Views.Do(v, \"Expand \" + e.subs.sslist.name, e)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tisMove := FALSE;\r\t\t\t\tREPEAT \r\t\t\t\t\tf.Input(x, y, m, isDown); \t\r\t\t\t\t\tIF ~isMove & ((ABS(x - msg.x) * ABS(x - msg.x) + ABS(y - msg.y) * ABS(y - msg.y)) > movedist) THEN\r\t\t\t\t\t\tisMove := TRUE\r\t\t\t\t\tEND\t\r\t\t\t\tUNTIL ~isDown OR isMove;\r\t\t\t\tIF isMove THEN\r\t\t\t\t\tIF v.OnSelectedObject(msg.x, msg.y) THEN \r\t\t\t\t\t\tv.HandleMove(f, msg) \r\t\t\t\t\tELSIF v.OnObject(msg.x, msg.y) THEN\r\t\t\t\t\t\tv.Select(msg.x, msg.y, msg.x, msg.y, {}); v.HandleMove(f, msg)\r\t\t\t\t\tELSE v.HandleMultiSelect(f, msg) END\r\t\t\t\tELSE\r\t\t\t\t\tv.Select(msg.x, msg.y, msg.x, msg.y, msg.modifiers); Views.Update(v, Views.keepFrames)\r\t\t\t\tEND\r\t\t\tEND\r\t\t| msg: Controllers.PollOpsMsg DO\r\t\t\tmsg.valid := {Controllers.copy}; msg.selectable := TRUE; msg.type := \"DevDependencies.View\"\r\t\t| msg: Properties.CollectMsg DO\r\t\t\tv.GetProps(msg.poll.prop)\r\t\t| msg: Properties.EmitMsg DO\r\t\t\tv.SetProps(msg.set.prop); v.context.GetSize(w, h); v.Restore(f, 0, 0, w, h)\r\t\t| msg: Controllers.SelectMsg DO\r\t\t\tv.SelectAll(msg.set)\r\t\t| msg: Controllers.EditMsg DO\r\t\t\tIF (msg.op = Controllers.pasteChar) & (ORD(msg.char) >= 28) & (ORD(msg.char) <= 31) THEN\r\t\t\t\tNEW(mo); mo.view := v; mo.AddSelection; mo.BoundingBox; mo.dx := 0; mo.dy := 0;\r\t\t\t\tIF Controllers.modify IN msg.modifiers THEN delta := f.unit ELSE delta := arrowdist END;\r\t\t\t\tCASE msg.char OF\r\t\t\t\t| CHR(28): mo.dx := -delta | CHR(29): mo.dx := delta \r\t\t\t\t| CHR(30): mo.dy := -delta | CHR(31): mo.dy := delta\r\t\t\t\tEND;\r\t\t\t\tIF mo.l + mo.dx < f.l THEN mo.dx := f.l - mo.l END; IF mo.r + mo.dx > f.r THEN mo.dx := f.r - mo.r END;\r\t\t\t\tIF mo.t + mo.dy < f.t THEN mo.dy := f.t - mo.t END; IF mo.b + mo.dy > f.b THEN mo.dy := f.b - mo.b END;\r\t\t\t\tIF (mo.dy # 0) OR (mo.dx # 0) THEN Views.Do(v, \"Move\", mo) END\r\t\t\tEND\r\t\tELSE (* Ignore other messages *)\r\t\tEND\r\tEND HandleCtrlMsg;\r\r\t\r"
                    attr: 0
                  - text: "\t(** Internalize/Externalize and Copy **)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE (s: SubsystemList) Internalize (VAR rd: Stores.Reader);\r\t\tVAR \r\t\t\tstore: Stores.Store;\r\tBEGIN\r\t\trd.ReadString(s.name); rd.ReadBool(s.isExpanded);\r\t\trd.ReadBool(s.isLayedout); rd.ReadBool(s.isHidden); rd.ReadBool(s.isBasic); rd.ReadBool(s.isStart);\r\t\trd.ReadInt(s.l); rd.ReadInt(s.b); rd.ReadInt(s.w); rd.ReadInt(s.h); rd.ReadInt(s.level);\r\t\trd.ReadStore(store); \r\t\tIF store # NIL THEN\r\t\t\ts.next := store(SubsystemList)\r\t\tELSE\r\t\t\ts.next := NIL\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (s: SubsystemList) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteString(s.name); wr.WriteBool(s.isExpanded);\r\t\twr.WriteBool(s.isLayedout);wr.WriteBool(s.isHidden); wr.WriteBool(s.isBasic); wr.WriteBool(s.isStart);\r\t\twr.WriteInt(s.l); wr.WriteInt(s.b); wr.WriteInt(s.w); wr.WriteInt(s.h); wr.WriteInt(s.level);\r\t\twr.WriteStore(s.next)\r\tEND Externalize;\r\t\r\tPROCEDURE (l: List) Internalize (VAR rd: Stores.Reader);\r\t\tVAR \r\t\t\tstore: Stores.Store;\r\tBEGIN\r\t\trd.ReadString(l.name); rd.ReadInt(l.l); rd.ReadInt(l.b); rd.ReadInt(l.w); rd.ReadInt(l.h);\r\t\trd.ReadBool(l.isLayedout); rd.ReadBool(l.isHidden); rd.ReadBool(l.isStart);\r\t\trd.ReadStore(store); l.subsystem := store(SubsystemList);\r\t\trd.ReadStore(store); \r\t\tIF store # NIL THEN l.imports := store(Subgraph) ELSE l.imports := NIL END;\r\t\trd.ReadStore(store); \r\t\tIF store # NIL THEN l.next := store(List) ELSE l.next := NIL END\r\tEND Internalize;\r\r\tPROCEDURE (l: List) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteString(l.name); wr.WriteInt(l.l); wr.WriteInt(l.b); wr.WriteInt(l.w); wr.WriteInt(l.h);\r\t\twr.WriteBool(l.isLayedout);wr.WriteBool(l.isHidden); wr.WriteBool(l.isStart);\r\t\twr.WriteStore(l.subsystem); wr.WriteStore(l.imports); \r\t\twr.WriteStore(l.next)\r\tEND Externalize;\r\t\r\tPROCEDURE (l: NameList) Internalize (VAR rd: Stores.Reader);\r\t\tVAR \r\t\t\tstore: Stores.Store;\r\tBEGIN\r\t\trd.ReadString(l.name); \r\t\trd.ReadStore(store); \r\t\tIF store # NIL THEN l.next := store(NameList) ELSE l.next := NIL END\r\tEND Internalize;\r\r\tPROCEDURE (l: NameList) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteString(l.name); wr.WriteStore(l.next)\r\tEND Externalize;\r\t\r\tPROCEDURE (g: Subgraph) Internalize (VAR rd: Stores.Reader);\r\t\tVAR \r\t\t\tstore: Stores.Store;\r\tBEGIN\r\t\trd.ReadBool(g.isImplicit);\r\t\trd.ReadStore(store); g.node := store(List); \r\t\trd.ReadStore(store);\r\t\tIF store # NIL THEN g.next := store(Subgraph) ELSE g.next := NIL END\r\tEND Internalize;\r\r\tPROCEDURE (g: Subgraph) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteBool(g.isImplicit); wr.WriteStore(g.node); wr.WriteStore(g.next) \r\tEND Externalize;\r\r\tPROCEDURE (v: View) Internalize (VAR rd: Stores.Reader);\r\t\tVAR \r\t\t\tversion, size: INTEGER;\r\t\t\tstore: Stores.Store;\r\t\t\ttypeface: Fonts.Typeface;\r\t\t\tstyle: SET;\r\tBEGIN\r\t\trd.ReadVersion(0, 0, version);\r\t\tIF ~rd.cancelled THEN\r\t\t\trd.ReadInt(v.maxLevel); rd.ReadBool(v.showBasic);\r\t\t\trd.ReadString(typeface); rd.ReadInt(size); rd.ReadSet(style);\r\t\t\tv.normfont := Fonts.dir.This(typeface, size, style, Fonts.normal);\r\t\t\tv.selfont := Fonts.dir.This(typeface, size, style, Fonts.bold);\r\t\t\trd.ReadStore(store); v.startList := store(NameList); \r\t\t\trd.ReadStore(store); v.subsystems := store(SubsystemList);\r\t\t\trd.ReadStore(store); v.list := store(List)\r\t\tEND\r\tEND Internalize;\r\t\t\r\tPROCEDURE (v: View) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteVersion(0);\r\t\twr.WriteInt(v.maxLevel); wr.WriteBool(v.showBasic);\r\t\twr.WriteString(v.normfont.typeface); wr.WriteInt(v.normfont.size); wr.WriteSet(v.normfont.style);\r\t\twr.WriteStore(v.startList); wr.WriteStore(v.subsystems); wr.WriteStore(v.list)\r\tEND Externalize;\r\t\r\tPROCEDURE (s: SubsystemList) CopyFrom(source: Stores.Store);\r\tBEGIN\r\t\tWITH source: SubsystemList DO\r\t\t\ts.name := source.name;\r\t\t\ts.isExpanded := source.isExpanded; \r\t\t\ts.isLayedout := source.isLayedout;\r\t\t\ts.isHidden := source.isHidden;\r\t\t\ts.isBasic := source.isBasic;\r\t\t\ts.isStart := source.isStart;\r\t\t\ts.l := source.l; s.b := source.b; s.w := source.w; s.h := source.h; s.level := source.level;\r\t\t\tIF source.next # NIL THEN s.next := Stores.CopyOf(source.next)(SubsystemList) END\r\t\tEND\r\tEND CopyFrom;\r\t\r\tPROCEDURE (l: List) CopyFrom(source: Stores.Store);\r\tBEGIN\r\t\tWITH source: List DO\r\t\t\tl.name := source.name; l.l := source.l; l.b := source.b; l.w := source.w; l.h := source.h;  \r\t\t\tl.isLayedout := source.isLayedout; l.isHidden := source.isHidden; l.isStart := source.isStart;\r\t\t\tIF source.imports # NIL THEN l.imports := Stores.CopyOf(source.imports)(Subgraph) END;\r\t\t\tIF source.subsystem # NIL THEN\r\t\t\t\t l.subsystem := Stores.CopyOf(source.subsystem)(SubsystemList)\r\t\t\tEND;\r\t\t\tIF source.next # NIL THEN l.next := Stores.CopyOf(source.next)(List) END\r\t\tEND\r\tEND CopyFrom;\r\r\tPROCEDURE (l: NameList) CopyFrom(source: Stores.Store);\r\tBEGIN\r\t\tWITH source: NameList DO\r\t\t\tl.name := source.name;\r\t\t\tIF source.next # NIL THEN l.next := Stores.CopyOf(source.next)(NameList) END\r\t\tEND\r\tEND CopyFrom;\r\t\r\tPROCEDURE (g: Subgraph) CopyFrom(source: Stores.Store);\r\tBEGIN\r\t\tWITH source: Subgraph DO\r\t\t\tg.isImplicit := source.isImplicit;\r\t\t\tIF source.node # NIL THEN g.node := Stores.CopyOf(source.node)(List) END;\r\t\t\tIF source.next # NIL THEN g.next := Stores.CopyOf(source.next)(Subgraph) END\r\t\tEND\r\tEND CopyFrom;\r\t\r\tPROCEDURE (v: View) CopyFromSimpleView (source: Views.View);\r\tBEGIN\r\t\tWITH source: View DO\r\t\t\tv.maxLevel := source.maxLevel; \r\t\t\tv.normfont := source.normfont;\r\t\t\tv.selfont := source.selfont;\r\t\t\tv.showBasic := source.showBasic;\r\t\t\tv.startList := Stores.CopyOf(source.startList)(NameList);\r\t\t\tv.subsystems := Stores.CopyOf(source.subsystems)(SubsystemList);\r\t\t\tv.list := Stores.CopyOf(source.list)(List)\r\t\tEND\r\tEND CopyFromSimpleView;\r\t\r\t\r"
                    attr: 0
                  - text: "\t(** Guards and Interactors **)\r\t"
                    attr: 1
                  - text: "\r\tPROCEDURE "
                    attr: 0
                  - text: "ExpandClick*"
                    attr: 3
                  - text: ";\r\t\tVAR v: View;\r\tBEGIN\r\t\tv := Controllers.FocusView()(View); \r\t\tIF v # NIL THEN v.ExpandCollapse(TRUE) END\r\tEND ExpandClick;\r\t"
                    attr: 0
                  - text: "\t"
                    attr: 1
                  - text: "\r\tPROCEDURE "
                    attr: 0
                  - text: "CollapseClick*"
                    attr: 3
                  - text: ";\r\t\tVAR v: View;\r\tBEGIN\r\t\tv := Controllers.FocusView()(View); \r\t\tIF v # NIL THEN v.ExpandCollapse(FALSE) END\r\tEND CollapseClick;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: "HideClick*"
                    attr: 3
                  - text: ";\r\t\tVAR v: View; hop: HideOp;\r\tBEGIN\r\t\tv := Controllers.FocusView()(View); \r\t\tIF v # NIL THEN\r\t\t\tNEW(hop); hop.view := v; hop.AddSelection;\r\t\t\tViews.Do(v, \"Hide Item\", hop)\r\t\tEND\r\tEND HideClick;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ToggleBasicSystemsClick
                    attr: 3
                  - text: "*;\r\t\tVAR v: View; hbop: HideBasicOp;\r\tBEGIN\r\t\tv := Controllers.FocusView()(View); \r\t\tIF v # NIL THEN \r\t\t\tNEW(hbop); hbop.view := v; \r\t\t\tIF v.showBasic THEN Views.Do(v, \"Hide Basic Systems\", hbop) \r\t\t\tELSE Views.Do(v, \"Show Basic Systems\", hbop)\r\t\t\tEND\r\t\tEND\r\tEND ToggleBasicSystemsClick;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: "ShowAllClick*"
                    attr: 3
                  - text: ";\r\t\tVAR v: View; l: List; sl: SubsystemList;\r\t\t\t\tso: ShowAllOp; ml: MetaList; ssl: MetaSSList;\r\tBEGIN\r\t\tv := Controllers.FocusView()(View); \r\t\tIF v # NIL THEN \r\t\t\tNEW(so); l := v.list;\r\t\t\tWHILE l # NIL DO \r\t\t\t\tIF l.isHidden THEN NEW(ml); ml.list := l; ml.next := so.mods; so.mods := ml END;\r\t\t\t\tl := l.next \r\t\t\tEND;\r\t\t\tsl := v.subsystems;\r\t\t\tWHILE sl # NIL DO \r\t\t\t\tIF sl.isHidden THEN NEW(ssl); ssl.sslist := sl; ssl.next := so.subs; so.subs := ssl END;\r\t\t\t\tsl := sl.next\r\t\t\tEND;\r\t\t\tIF (so.mods # NIL) OR (so.subs # NIL) THEN so.view := v; Views.Do(v, \"Show All\", so) END\r\t\tEND\r\tEND ShowAllClick;\r\t\r\tPROCEDURE ECAll(eo: ExpandAllOp);\r\t\tVAR v: View; sl: SubsystemList; ssl: MetaSSList;\r\tBEGIN\r\t\tv := Controllers.FocusView()(View); \r\t\tIF v # NIL THEN \r\t\t\tsl := v.subsystems;\r\t\t\tWHILE sl # NIL DO \r\t\t\t\tIF (sl.isExpanded # eo.expand) & ~sl.isHidden & (~sl.isBasic OR v.showBasic) THEN\r\t\t\t\t\tNEW(ssl); ssl.sslist := sl; ssl.next := eo.subs; eo.subs := ssl\r\t\t\t\tEND;\r\t\t\t\tsl := sl.next\r\t\t\tEND;\r\t\t\tIF eo.subs # NIL THEN eo.view := v; Views.Do(v, \"Show All\", eo) END\r\t\tEND\r\tEND ECAll;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: "ExpandAllClick*"
                    attr: 3
                  - text: ";\r\t\tVAR eo: ExpandAllOp; \r\tBEGIN\r\t\tNEW(eo); eo.expand := TRUE; ECAll(eo)\r\tEND ExpandAllClick;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: "CollapseAllClick*"
                    attr: 3
