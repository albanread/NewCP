                    attr: 0
                  - text: "ArrangeClick*"
                    attr: 3
                  - text: "; (* Not undoable *)\r\t\tVAR v: View; l: List; sl: SubsystemList;\r\tBEGIN\r\t\tv := Controllers.FocusView()(View); \r\t\tIF v # NIL THEN \r\t\t\tViews.BeginModification(Views.notUndoable, v);\r\t\t\tl := v.list; \r\t\t\tWHILE l # NIL DO l.isLayedout := FALSE; l := l.next END;\r\t\t\tsl := v.subsystems;\r\t\t\tWHILE sl # NIL DO sl.isLayedout := FALSE; sl := sl.next END;\r\t\t\tViews.Update(v, Views.keepFrames);\r\t\t\tViews.EndModification(Views.notUndoable, v)\r\t\tEND\r\tEND ArrangeClick;\r\t\r\tPROCEDURE DependencyList(v: View; full: BOOLEAN; VAR clist: MetaList);\r\t\tVAR l: List;\r\t\tPROCEDURE RecursiveList(node: List; VAR clist: MetaList);\r\t\t\tVAR imports: Subgraph; ml, prev: MetaList;\r\t\tBEGIN\r\t\t\tIF full OR node.subsystem.isExpanded THEN\r\t\t\t\tml := clist; \r\t\t\t\tWHILE (ml # NIL) & (ml.list # node) DO ml := ml.next END;\r\t\t\t\tIF ml = NIL THEN\r\t\t\t\t\timports := node.imports;\r\t\t\t\t\tWHILE imports # NIL DO\r\t\t\t\t\t\tIF ~imports.isImplicit THEN RecursiveList(imports.node, clist) END;\r\t\t\t\t\t\timports := imports.next\r\t\t\t\t\tEND;\r\t\t\t\t\tml := clist; prev := ml;\r\t\t\t\t\tWHILE (ml # NIL) & (ml.list # node)  DO\r\t\t\t\t\t\t(* "
                    attr: 0
                  - text: "could have been implicitly imported "
                    attr: 1
                  - text: "*)\r\t\t\t\t\t\tprev := ml; ml := ml.next\r\t\t\t\t\tEND;\r\t\t\t\t\tIF ml = NIL THEN\r\t\t\t\t\t\tNEW(ml); ml.list := node;\r\t\t\t\t\t\tIF prev # NIL THEN prev.next := ml END\r\t\t\t\t\tEND;\r\t\t\t\t\tIF clist = NIL THEN clist := ml END;\r\t\t\t\t\timports := node.imports;\r\t\t\t\t\tWHILE imports # NIL DO\r\t\t\t\t\t\tIF imports.isImplicit THEN RecursiveList(imports.node, clist) END;\r\t\t\t\t\t\timports := imports.next\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND RecursiveList;\r\tBEGIN\r\t\tl := v.list; \r\t\tWHILE l # NIL DO\r\t\t\tRecursiveList(l, clist);\r\t\t\tl := l.next\r\t\tEND\r\tEND DependencyList;\r\r\tPROCEDURE SortMetaList(VAR ml: MetaList);\r\t\tVAR l, p, cur, pcur: MetaList;\r\tBEGIN\r\t\tASSERT(ml # NIL, 20);\r\t\tcur := ml.next; pcur := ml;\r\t\tWHILE cur # NIL DO\r\t\t\tp := NIL; l := ml;\r\t\t\tWHILE  (l # cur) & (cur.list.name$ > l.list.name$) DO p := l; l := l.next END;\r\t\t\tIF l = cur THEN\r\t\t\t\tpcur := cur; cur := cur.next\r\t\t\tELSE\r\t\t\t\tpcur.next := cur.next; cur.next := l;\r\t\t\t\tIF p = NIL THEN ml := cur ELSE p.next := cur END;\r\t\t\t\tcur := pcur.next\r\t\t\tEND\r\t\tEND\r\tEND SortMetaList;\r\r\tPROCEDURE MarkImplicitModules(v: View);\r\t\tVAR \r\t\t\tfullList, nonImplList: MetaList; v2: View;\r\tBEGIN\r\t\tIF v.nofMods <= 0 THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\tDependencyList(v, full, fullList);\r\t\tSortMetaList(fullList);\r\t\tStartAnalysis(v.startList, NIL, ~implicit, v2);\r\t\tDependencyList(v2, full, nonImplList);\r\t\tSortMetaList(nonImplList);\r\t\tWHILE nonImplList # NIL DO\r\t\t\tIF nonImplList.list.name$ = fullList.list.name$ THEN\r\t\t\t\tfullList.list.onlyImplicit := FALSE\r\t\t\tELSE\r\t\t\t\tWHILE nonImplList.list.name$ # fullList.list.name$ DO\r\t\t\t\t\tfullList.list.onlyImplicit := TRUE; fullList := fullList.next\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tfullList := fullList.next;\r\t\t\tnonImplList := nonImplList.next\r\t\tEND;\r\t\tWHILE fullList # NIL DO fullList.list.onlyImplicit := TRUE; fullList := fullList.next END\r\tEND MarkImplicitModules;\r\t\r\tPROCEDURE SetStyle(f: TextMappers.Formatter; style: SET);\r\t\tVAR prop: Properties.StdProp;\r\tBEGIN\r\t\tprop := f.rider.attr.Prop()(Properties.StdProp); \r\t\tIF bold IN style THEN prop.weight := Fonts.bold ELSE prop.weight := Fonts.normal END;\r\t\tIF italic IN style THEN INCL(prop.style.val, Fonts.italic); prop.style.mask := prop.style.val \r\t\tELSE EXCL(prop.style.val, Fonts.italic) END;\r\t\tf.rider.SetAttr(TextModels.ModifiedAttr(f.rider.attr, prop))\r\tEND SetStyle;\r\t\r\tPROCEDURE SetGray(f: TextMappers.Formatter);\r\t\tVAR prop: Properties.StdProp;\r\tBEGIN\r\t\tprop := f.rider.attr.Prop()(Properties.StdProp);\r\t\tprop.color.val := Ports.grey25;\r\t\tf.rider.SetAttr(TextModels.ModifiedAttr(f.rider.attr, prop))\r\tEND SetGray;\r\t\r\tPROCEDURE SetDefColor(f: TextMappers.Formatter);\r\t\tVAR prop: Properties.StdProp;\r\tBEGIN\r\t\tprop := f.rider.attr.Prop()(Properties.StdProp);\r\t\tprop.color.val := Ports.defaultColor;\r\t\tf.rider.SetAttr(TextModels.ModifiedAttr(f.rider.attr, prop))\r\tEND SetDefColor;\r\r\tPROCEDURE WritePackList(f: TextMappers.Formatter; v: View);\r\t\tCONST colsPerRow = 3;\r\t\tVAR head, tail: Files.Name; l: List; col: INTEGER;\r\tBEGIN\r\t\tl := v.list; col := 0;\r\t\tWHILE l # NIL DO\r\t\t\tIF l.onlyImplicit THEN SetGray(f) ELSE SetDefColor(f) END;\r\t\t\tKernel.SplitName(l.name, head, tail); IF head = \"\" THEN head := \"System\" END;\r\t\t\tf.WriteString(head + \"/Code/\" + tail + \".ocf \");\r\t\t\tINC(col); IF col >= colsPerRow THEN f.WriteLn; col := 0 END;\r\t\t\tl := l.next\r\t\tEND;\r\t\tSetGray(f); f.WriteString(\"System/Rsrc/Menus.odc\")\r\tEND WritePackList;\r\t\r\tPROCEDURE WriteCommand (VAR f: TextMappers.Formatter; title: Dialog.String; cmd: TextModels.Model);\r\tBEGIN\r\t\tSetStyle(f, {bold}); f.WriteString(title); f.WriteLn; \r\t\tSetStyle(f, {});\r\t\tf.WriteView(StdFolds.dir.New(StdFolds.collapsed, \"\", cmd)); \r\t\t f.WriteString('command');\r\t\tf.WriteView(StdFolds.dir.New(StdFolds.collapsed, \"\", NIL)); \r\t\tf.WriteLn; f.WriteLn\r\tEND WriteCommand;\r\t\r\tPROCEDURE AddHeader (VAR f: TextMappers.Formatter; v: View);\r\t\tVAR sl: NameList; date: Dates.Date; time: Dates.Time; ds, ts: String;\r\tBEGIN\r\t\tDates.GetDate(date); Dates.DateToString(date, Dates.plainLong, ds);\r\t\tDates.GetTime(time); Dates.TimeToString(time, ts);\r\t\tSetStyle(f, {bold});\r\t\tf.WriteString('Tool for: '); sl := v.startList;\r\t\tWHILE sl # NIL DO f.WriteString(sl.name + ' '); sl := sl.next END; f.WriteLn; \r\t\tSetStyle(f, {italic});f.WriteString('Created: ' + ds + ', ' + ts); f.WriteLn; f.WriteLn\r\tEND AddHeader;\r\t\r\tPROCEDURE AddCompileList (VAR f: TextMappers.Formatter; v: View);\r\t\tVAR l: MetaList; m: TextModels.Model; hf:TextMappers.Formatter;\r\tBEGIN\r\t\tm := TextModels.dir.New(); hf.ConnectTo(m);\r\t\tSetStyle(hf, {}); hf.WriteLn;\r\t\thf.WriteView(DevCommanders.dir.New()); hf.WriteString(' DevCompiler.CompileThis '); hf.WriteLn;\r\t\tDependencyList(v, ~full, l);\r\t\tWHILE l # NIL DO \r\t\t\tIF l.list.onlyImplicit THEN SetGray(hf) ELSE SetDefColor(hf) END;\r\t\t\thf.WriteString(l.list.name + ' '); \r\t\t\tl := l.next\r\t\tEND; \r\t\thf.WriteView(DevCommanders.dir.NewEnd()); hf.WriteLn; \r\t\tWriteCommand(f, 'To compile:', m)\r\tEND AddCompileList;\r\r\tPROCEDURE WriteUnloadList(f: TextMappers.Formatter; l: MetaList);\r\tBEGIN\r\t\tIF l # NIL THEN\r\t\t\tWriteUnloadList(f, l.next);\r\t\t\tIF l.list.onlyImplicit THEN SetGray(f) ELSE SetDefColor(f) END;\r\t\t\tf.WriteString(l.list.name + ' ')\r\t\tEND\r\tEND WriteUnloadList;\r\t\r\tPROCEDURE AddUnloadList (VAR f: TextMappers.Formatter; v: View);\r\t\tVAR l: MetaList; m: TextModels.Model; hf:TextMappers.Formatter;\r\tBEGIN\r\t\tm := TextModels.dir.New(); hf.ConnectTo(m);\r\t\tSetStyle(hf, {}); hf.WriteLn;\r\t\thf.WriteView(DevCommanders.dir.New()); hf.WriteString(' DevDebug.UnloadThis '); hf.WriteLn; \r\t\tDependencyList(v, ~full, l);\r\t\tWriteUnloadList(hf, l); hf.WriteView(DevCommanders.dir.NewEnd()); hf.WriteLn;\r\t\tWriteCommand(f, 'To unload:', m)\r\tEND AddUnloadList;\r\t\r\tPROCEDURE AddLinkList (VAR f: TextMappers.Formatter);\r\t\tVAR m: TextModels.Model; hf:TextMappers.Formatter;\r\tBEGIN\r\t\tm := TextModels.dir.New(); hf.ConnectTo(m);\r\t\tSetStyle(hf, {}); hf.WriteLn;\r\t\thf.WriteView(DevCommanders.dir.New()); hf.WriteString(' DevLinker.Link exefilename.exe := '); hf.WriteLn;\r\t\thf.WriteString('Kernel$+ Files HostFiles HostPackedFiles StdLoader'); hf.WriteLn;\r\t\thf.WriteString('1 Applogo.ico 2 Doclogo.ico 3 SFLogo.ico 4 CFLogo.ico 5 DtyLogo.ico'); hf.WriteLn;\r\t\thf.WriteString('6 folderimg.ico 7 openimg.ico 8 leafimg.ico'); hf.WriteLn; \r\t\thf.WriteString('1 Move.cur 2 Copy.cur 3 Link.cur 4 Pick.cur 5 Stop.cur 6 Hand.cur 7 Table.cur');\r\t\thf.WriteView(DevCommanders.dir.NewEnd()); hf.WriteLn;\r\t\tWriteCommand(f, 'To link (executable to which files can be packed):', m)\r\tEND AddLinkList;\r\t\r\tPROCEDURE AddPackList (VAR f: TextMappers.Formatter; v: View);\r\t\tVAR m: TextModels.Model; hf:TextMappers.Formatter;\r\tBEGIN\r\t\tm := TextModels.dir.New(); hf.ConnectTo(m);\r\t\tSetStyle(hf, {}); hf.WriteLn;\r\t\thf.WriteView(DevCommanders.dir.New()); hf.WriteString(' DevPacker.PackThis exefilename.exe :='); hf.WriteLn;\r\t\tWritePackList(hf, v);\r\t\thf.WriteView(DevCommanders.dir.NewEnd()); hf.WriteLn;\r\t\tWriteCommand(f, 'To pack:', m)\r\tEND AddPackList;\r\t\r\tPROCEDURE AddRootList (VAR f: TextMappers.Formatter; v: View);\r\t\tVAR m: TextModels.Model; hf:TextMappers.Formatter; l: List;\r\tBEGIN\r\t\tm := TextModels.dir.New(); hf.ConnectTo(m);\r\t\tSetStyle(hf, {italic}); hf.WriteLn;\r\t\thf.WriteString('(modules which are not imported from any other modules)'); hf.WriteLn;\r\t\tSetStyle(hf, {});\r\t\tl := v.list;\r\t\tWHILE l # NIL DO\r\t\t\tIF ~l.isImported THEN\r\t\t\t\tIF l.onlyImplicit THEN SetGray(hf) ELSE SetDefColor(hf) END;\r\t\t\t\thf.WriteString(l.name + ' ') \r\t\t\tEND;\r\t\t\tl := l.next\r\t\tEND;\r\t\thf.WriteLn;\r\t\tWriteCommand(f, 'Root modules:', m)\r\tEND AddRootList;\r\t\r\tPROCEDURE (v: View)"
