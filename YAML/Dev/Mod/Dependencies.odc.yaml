                  - text: "\t(** Initialization **)\r\t\r"
                    attr: 1
                  - text: "\tPROCEDURE SetBasic(v: View);\r\t\tVAR str: String; t: TextModels.Model; s: TextMappers.Scanner; l, n, sl: NameList; sslist: SubsystemList;\r\t\t\tsub, mod: String;\r\tBEGIN\r\t\tDialog.MapString(\"#Dev:BasicSystems\", str);\r\t\tl := NIL;\r\t\tIF str # \"BasicSystems\" THEN\r\t\t\tt := TextModels.dir.NewFromString(str); s.ConnectTo(t); s.SetPos(0); s.Scan;\r\t\t\tWHILE s.type # TextMappers.eot DO\r\t\t\t\tIF s.type = TextMappers.string THEN\r\t\t\t\t\tsl := v.startList;\r\t\t\t\t\tKernel.SplitName(sl.name, sub, mod); IF sub = \"\" THEN sub := \"System\" END;\r\t\t\t\t\tWHILE (sl # NIL) & (sub # s.string) DO\r\t\t\t\t\t\tKernel.SplitName(sl.name, sub, mod); IF sub = \"\" THEN sub := \"System\" END;\r\t\t\t\t\t\tsl := sl.next\r\t\t\t\t\tEND;\r\t\t\t\t\tIF sl = NIL THEN NEW(n); n.name := s.string$; n.next := l;  l := n END\r\t\t\t\tEND;\r\t\t\t\ts.Scan\r\t\t\tEND;\r\t\t\tsslist := v.subsystems; INC(v.maxLevel);\r\t\t\tWHILE sslist # NIL DO\r\t\t\t\tn := l;\r\t\t\t\tWHILE (n # NIL) & (sslist.name # n.name) DO n := n.next END;\r\t\t\t\tIF n # NIL THEN\r\t\t\t\t\tsslist.isBasic := TRUE; INC(sslist.level)\r\t\t\t\tEND;\r\t\t\t\tsslist := sslist.next\r\t\t\tEND\r\t\tEND\r\tEND SetBasic;\r\t\r\tPROCEDURE StartAnalysis(startList: NameList; font: Fonts.Font; incImpl: BOOLEAN; OUT v: View);\r\t\tVAR rootNode: List; sl: NameList;\r\tBEGIN\r\t\tNEW(v); Stores.Join(v, startList);\r\t\tv.showBasic := FALSE; \r\t\tIF font = NIL THEN font := Fonts.dir.Default() END;\r\t\tv.normfont := Fonts.dir.This(font.typeface, font.size, font.style, Fonts.normal);\r\t\tv.selfont := Fonts.dir.This(font.typeface, font.size, font.style, Fonts.bold);\r\t\tv.startList := startList; v.subsystems := NIL; v.list := NIL; v.maxLevel := 2; v.nofMods := 0;\r\t\tsl := startList;\r\t\tWHILE sl # NIL DO\r\t\t\tv.GetNode(sl.name, incImpl, rootNode);\r\t\t\tsl := sl.next\r\t\tEND;\r\t\tSetBasic(v); v.SetExtents()\r\tEND StartAnalysis;\r\t\r\tPROCEDURE "
