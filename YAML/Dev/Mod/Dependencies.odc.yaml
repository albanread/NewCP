                  - text: "(VAR par: Dialog.Par);\r\t\tVAR v: View; \r\tBEGIN\r\t\tv := Controllers.FocusView()(View); \r\t\tIF v # NIL THEN \r\t\t\tpar.checked := v.showBasic\r\t\tELSE\r\t\t\tpar.disabled := TRUE\r\t\tEND\r\tEND ShowBasicGuard;\r\t\r"
