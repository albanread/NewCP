                    attr: 0
                  - text: "\t(* nil test *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tDevCPL486.MakeReg(r, AX, Int32); tag.offset := 0; DevCPL486.GenTest(r, tag)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tIF tag.mode = Reg THEN y.reg := tag.reg\r\t\t\t\tELSE GetReg(y, Pointer, {}, {}); DevCPL486.GenMove(tag, y)\r\t\t\t\tEND;\r\t\t\t\ty.mode := Ind; y.offset := 0; y.scale := 0\r\t\t\tEND;\r\t\t\tIF (tag.typ.sysflag = interface) & (y.mode = Ind) THEN y.offset := 4 * x.offset\r\t\t\tELSIF tag.typ.untagged THEN DevCPM.err(140)\r\t\t\tELSE\r\t\t\t\tIF x.obj.link.typ.sysflag = interface THEN\t(* correct method number *)\r\t\t\t\t\tx.offset := numPreIntProc + NumOfIntProc(tag.typ) - 1 - x.offset\r\t\t\t\tEND;\r\t\t\t\tINC(y.offset, Mth0Offset - 4 * x.offset)\r\t\t\tEND;\r\t\t\tDevCPL486.GenCall(y); Free(y)\r\t\tELSIF x.mode = CProc THEN\r\t\t\tIF x.obj.link # NIL THEN\t(* tag = first param *)\r\t\t\t\tIF x.obj.link.mode = VarPar THEN\r\t\t\t\t\tGetAdr(tag, {}, wreg - {AX} + {stk, mem, con}); Free(tag)\r\t\t\t\tELSE \r\t\t\t\t\t(* Load(tag, {}, wreg - {AX} + {con}); Free(tag) *)\r\t\t\t\t\t"
                    attr: 0
