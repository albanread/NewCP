                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT "
                    attr: 0
                  - text: SYSTEM
                    attr: 3
                  - text: ", DevCPM, DevCPT, DevCPE, DevCPL486;\r\r\tCONST\r\t\tinitializeAll = FALSE;\t(* initialize all local variable to zero *)\r\t\tinitializeOut = FALSE;\t(* initialize all OUT parameters to zero *)\r\t\tinitializeDyn = FALSE;\t(* initialize all open array OUT parameters to zero *)\r\t\tinitializeStr = FALSE;\t(* initialize rest of string value parameters to zero *)\r\t\t\r\t\tFpuControlRegister = 33EH;\t(* value for fpu control register initialization *)\r\t\t\r\t\t(* structure forms *)\r\t\tUndef = 0; Byte = 1; Bool = 2; Char8 = 3; Int8 = 4; Int16 = 5; Int32 = 6;\r\t\tReal32 = 7; Real64 = 8; Set = 9; String8 = 10; NilTyp = 11; NoTyp = 12;\r\t\tPointer = 13; ProcTyp = 14; Comp = 15;\r\t\tChar16 = 16; String16 = 17; Int64 = 18; Guid = 23;\r\t\tVString16to8 = 29; VString8 = 30; VString16 = 31;\r\t\tintSet = {Int8..Int32, Int64}; realSet = {Real32, Real64};\r\r\t\t(* composite structure forms *)\r\t\tBasic = 1; Array = 2; DynArr = 3; Record = 4;\r\r\t\t(* item base modes (=object modes) *)\r\t\tVar = 1; VarPar = 2; Con = 3; Fld = 4; Typ = 5; LProc = 6; XProc = 7; CProc = 9; IProc = 10; TProc = 13;\r\r\t\t(* item modes for i386 *)\r\t\tInd = 14; Abs = 15; Stk = 16; Cond = 17; Reg = 18; DInd = 19;\r\t\t\r\t\t(* symbol values and ops *)\r\t\ttimes = 1; slash = 2; div = 3; mod = 4;\r\t\tand = 5; plus = 6; minus = 7; or = 8; eql = 9;\r\t\tneq = 10; lss = 11; leq = 12; gtr = 13; geq = 14;\r\t\tin = 15; is = 16; ash = 17; msk = 18; len = 19;\r\t\tconv = 20; abs = 21; cap = 22; odd = 23; not = 33;\r\t\tadr = 24; cc = 25; bit = 26; lsh = 27; rot = 28; val = 29;\r\t\tgetrfn = 26; putrfn = 27;\r\t\tmin = 34; max = 35; typ = 36;\r\r\t\t(* procedure flags (conval.setval) *)\r\t\thasBody = 1; isRedef = 2; slNeeded = 3; imVar = 4; isGuarded = 30; isCallback = 31;\r\r\t\t(* attribute flags (attr.adr, struct.attribute, proc.conval.setval) *)\r\t\tnewAttr = 16; absAttr = 17; limAttr = 18; empAttr = 19; extAttr = 20;\r\t\t\r\t\tfalse = 0; true = 1; nil = 0;\r\r\t\t(* registers *)\r\t\tAX = 0; CX = 1; DX = 2; BX = 3; SP = 4; BP = 5; SI = 6; DI = 7; AH = 4; CH = 5; DH = 6; BH = 7;\r\t\tstk = 31; mem = 30; con = 29; float = 28; high = 27; short = 26; "
                    attr: 0
                  - text: deref = 25;
                    attr: 3
                  - text: " wreg = {AX, BX, CX, DX, SI, DI};\r\t\r\t\t(* GenShiftOp *)\r\t\tROL = 0; ROR = 8H; SHL = 20H; SHR = 28H; SAR = 38H;\r\r\t\t(* GenBitOp *)\r\t\tBT = 20H; BTS = 28H; BTR = 30H;\r\t\t\r\t\t(* GenFDOp *)\r\t\tFADD = 0; FMUL = 8H; FCOM = 10H; FCOMP = 18H; FSUB = 20H; FSUBR = 28H; FDIV = 30H; FDIVR = 38H; \r\t\t\r\t\t(* GenFMOp *)\r\t\tFABS = 1E1H; FCHS = 1E0H; FTST = 1E4H; FSTSW = 7E0H; FUCOM = 2E9H;\r\r\t\t(* GenCode *)\r\t\tSAHF = 9EH; WAIT = 9BH;\r\r\t\t(* condition codes *)\r\t\tccB = 2; ccAE = 3; ccBE = 6; ccA = 7; (* unsigned *)\r\t\tccL = 12; ccGE = 13; ccLE = 14; ccG = 15; (* signed *)\r\t\tccE = 4; ccNE = 5; ccS = 8; ccNS = 9; ccO = 0; ccNO = 1;\r\t\tccAlways = -1; ccNever = -2; ccCall = -3;\r\r\t\t(* sysflag *)\r\t\tuntagged = 1; callback = 2; noAlign = 3; union = 7;\r\t\tinterface = 10; ccall = -10; guarded = 10; noframe = 16;\r\t\tnilBit = 1; enumBits = 8; new = 1; iid = 2;\r\t\tstackArray = 120;\r\t\t\r\t\t(* system trap numbers *)\r\t\twithTrap = -1; caseTrap = -2; funcTrap = -3; typTrap = -4;\r\t\trecTrap = -5; ranTrap = -6; inxTrap = -7; copyTrap = -8;\r\t\t\r\t\t(* module visibility of objects *)\r\t\tinternal = 0; external = 1; externalR = 2; inPar = 3; outPar = 4;\r\r\t\t(* pointer init limits *)\r\t\tMaxPtrs = 10; MaxPush = 4;\r\t\t\r\t\tTag0Offset = 12;\r\t\tMth0Offset = -4;\r\t\tArrDOffs = 8;\r\t\tnumPreIntProc = 2;\r\t\t\r\t\tstackAllocLimit = 2048;\r\r\t\t\r\tVAR\r\t\timLevel*: ARRAY 64 OF BYTE;\r\t\tintHandler*: DevCPT.Object;\r\t\tinxchk, ovflchk, ranchk, typchk, ptrinit, hints: BOOLEAN;\r\t\tWReg, BReg, AllReg: SET; FReg: INTEGER;\r\t\tptrTab: ARRAY MaxPtrs OF INTEGER;\r\t\tstkAllocLbl: DevCPL486.Label;\r\t\tprocedureUsesFpu: BOOLEAN;\r\r\t\r\tPROCEDURE Init* (opt: SET);\r\t\tCONST chk = 0; achk = 1; hint = 29;\r\tBEGIN\r\t\tinxchk := chk IN opt; ovflchk := achk IN opt; ranchk := achk IN opt; typchk := chk IN opt; ptrinit := chk IN opt;\r\t\thints := hint IN opt;\r\t\tstkAllocLbl := DevCPL486.NewLbl\r\tEND Init;\r\r\tPROCEDURE Reversed (cond: BYTE): BYTE;\t(* reversed condition *)\r\tBEGIN\r\t\tIF cond = lss THEN RETURN gtr\r\t\tELSIF cond = gtr THEN RETURN lss\r\t\tELSIF cond = leq THEN RETURN geq\r\t\tELSIF cond = geq THEN RETURN leq\r\t\tELSE RETURN cond\r\t\tEND\r\tEND Reversed;\r\t\r\tPROCEDURE Inverted (cc: INTEGER): INTEGER;\t(* inverted sense of condition code *)\r\tBEGIN\r\t\tIF ODD(cc) THEN RETURN cc-1 ELSE RETURN cc+1 END\r\tEND Inverted;\r\r\tPROCEDURE setCC* (VAR x: DevCPL486.Item; rel: BYTE; reversed, signed: BOOLEAN);\r\tBEGIN\r\t\tIF reversed THEN rel := Reversed(rel) END;\r\t\tCASE rel OF\r\t\t   false: x.offset := ccNever\r\t\t| true: x.offset := ccAlways\r\t\t| eql: x.offset := ccE\r\t\t| neq: x.offset := ccNE\r\t\t| lss: IF signed THEN x.offset := ccL ELSE x.offset := ccB END\r\t\t| leq: IF signed THEN x.offset := ccLE ELSE x.offset := ccBE END\r\t\t| gtr: IF signed THEN x.offset := ccG ELSE x.offset := ccA END\r\t\t| geq: IF signed THEN x.offset := ccGE ELSE x.offset := ccAE END\r\t\tEND;\r\t\tx.mode := Cond; x.form := Bool; x.reg := 0;\r\t\tIF reversed THEN x.reg := 1 END;\r\t\tIF signed THEN INC(x.reg, 2) END\r\tEND setCC;\r\r\tPROCEDURE StackAlloc*;\t(* pre: len = CX bytes; post: len = CX words *)\r\tBEGIN\r\t\tDevCPL486.GenJump(ccCall, stkAllocLbl, FALSE)\r\tEND StackAlloc;\r\t\r\tPROCEDURE^ CheckAv* (reg: INTEGER);\r\r\tPROCEDURE AdjustStack (val: INTEGER);\r\t\tVAR c, sp: DevCPL486.Item;\r\tBEGIN\r\t\tIF val < -stackAllocLimit THEN\r\t\t\tCheckAv(CX);\r\t\t\tDevCPL486.MakeConst(c, -val, Int32); DevCPL486.MakeReg(sp, CX, Int32); DevCPL486.GenMove(c, sp);\r\t\t\tStackAlloc\r\t\tELSIF val # 0 THEN\r\t\t\tDevCPL486.MakeConst(c, val, Int32); DevCPL486.MakeReg(sp, SP, Int32); DevCPL486.GenAdd(c, sp, FALSE)\r\t\tEND\r\tEND AdjustStack;\r\t\r\tPROCEDURE DecStack (form: INTEGER);\r\tBEGIN\r\t\tIF form IN {Real64, Int64} THEN AdjustStack(-8) ELSE AdjustStack(-4) END\r\tEND DecStack;\r\t\r\tPROCEDURE IncStack (form: INTEGER);\r\tBEGIN\r\t\tIF form IN {Real64, Int64} THEN AdjustStack(8) ELSE AdjustStack(4) END\r\tEND IncStack;\r\t\r\t(*-----------------register handling------------------*)\r\t\r\tPROCEDURE SetReg* (reg: SET);\r\tBEGIN\r\t\tAllReg := reg; WReg := reg; BReg := reg * {0..3} + SYSTEM.LSH(reg * {0..3}, 4); FReg := 8\r\tEND SetReg;\r\t\r\tPROCEDURE CheckReg*;\r\t\tVAR reg: SET;\r\tBEGIN\r\t\treg := AllReg - WReg;\r\t\tIF reg # {} THEN\r\t\t\tDevCPM.err(-777); (* register not released *)\r\t\t\tIF AX IN reg THEN DevCPM.LogWStr(\" AX\") END;\r\t\t\tIF BX IN reg THEN DevCPM.LogWStr(\" BX\") END;\r\t\t\tIF CX IN reg THEN DevCPM.LogWStr(\" CX\") END;\r\t\t\tIF DX IN reg THEN DevCPM.LogWStr(\" DX\") END;\r\t\t\tIF SI IN reg THEN DevCPM.LogWStr(\" SI\") END;\r\t\t\tIF DI IN reg THEN DevCPM.LogWStr(\" DI\") END;\r\t\t\tWReg := AllReg; BReg := AllReg * {0..3} + SYSTEM.LSH(AllReg * {0..3}, 4)\r\t\tEND;\r\t\tIF FReg < 8 THEN DevCPM.err(-778); FReg := 8\t (* float register not released *)\r\t\tELSIF FReg > 8 THEN DevCPM.err(-779); FReg := 8\r\t\tEND\r\tEND CheckReg;\r\t\r\tPROCEDURE CheckAv* (reg: INTEGER);\r\tBEGIN\r\t\tASSERT(reg IN WReg)\r\tEND CheckAv; \r\t\r\tPROCEDURE GetReg (VAR x: DevCPL486.Item; f: BYTE; hint, stop: SET);\r\t\tVAR n: INTEGER; s, s1: SET;\r\tBEGIN\r\t\tCASE f OF\r\t\t| Byte, Bool, Char8, Int8:\r\t\t\ts := BReg * {0..3} - stop;\r\t\t\tIF (high IN stop) OR (high IN hint) & (s - hint  # {}) THEN n := 0;\r\t\t\t\tIF s = {} THEN DevCPM.err(215); WReg := wreg; BReg := {0..7}; s := {0..7} END;\r\t\t\t\tIF s - hint # {} THEN s := s - hint END;\r\t\t\t\tWHILE ~(n IN s) DO INC(n) END\r\t\t\tELSE\r\t\t\t\ts := BReg - (stop * {0..3}) - SYSTEM.LSH(stop * {0..3}, 4); n := 0;\r\t\t\t\tIF s = {} THEN DevCPM.err(215); WReg := wreg; BReg := {0..7}; s := {0..7} END;\r\t\t\t\ts1 := s - (hint * {0..3}) - SYSTEM.LSH(hint * {0..3}, 4);\r\t\t\t\tIF s1 # {} THEN s := s1 END;\r\t\t\t\tWHILE ~(n IN s) & ~(n + 4 IN s) DO INC(n) END;\r\t\t\t\tIF ~(n IN s) THEN n := n + 4 END\r\t\t\tEND;\r\t\t\tEXCL(BReg, n); EXCL(WReg, n MOD 4)\r\t\t| Int16, Int32, Set, String8, NilTyp, Pointer, ProcTyp, Comp, Char16, String16: \r\t\t\ts := WReg - stop;\r\t\t\tIF high IN stop THEN s := s * {0..3} END;\r\t\t\tIF s = {} THEN DevCPM.err(215); WReg := wreg; BReg := {0..7}; s := wreg END;\r\t\t\ts1 := s - hint;\r\t\t\tIF high IN hint THEN s1 := s1 * {0..3} END;\r\t\t\tIF s1 # {} THEN s := s1 END;\r\t\t\tIF AX IN s THEN n := AX\r\t\t\tELSIF DX IN s THEN n := DX\r\t\t\tELSIF CX IN s THEN n := CX\r\t\t\tELSIF SI IN s THEN n := SI\r\t\t\tELSIF DI IN s THEN  n := DI\r\t\t\tELSE n := BX (* not used *)\r\t\t\tEND;\r\t\t\tEXCL(WReg, n);\r\t\t\tIF n < 4 THEN EXCL(BReg, n); EXCL(BReg, n + 4) END\r\t\t| Real32, Real64:\r\t\t\tIF (FReg = 0) OR (float IN stop) THEN DevCPM.err(216); FReg := 99 END;\r\t\t\tDEC(FReg); n := 0\r\t\tEND;\r\t\tDevCPL486.MakeReg(x, n, f);\r\tEND GetReg;\r\t\r\tPROCEDURE FreeReg (n, f: INTEGER);\r\tBEGIN\r\t\tIF f <= Int8 THEN\r\t\t\tINCL(BReg, n);\r\t\t\tIF (n + 4) MOD 8 IN BReg THEN INCL(WReg, n MOD 4) END\r\t\tELSIF f IN realSet THEN\r\t\t\tINC(FReg)\r\t\tELSIF n IN AllReg THEN\r\t\t\tINCL(WReg, n);\r\t\t\tIF n < 4 THEN INCL(BReg, n); INCL(BReg, n + 4) END\r\t\tEND\r\tEND FreeReg;\r\t\r\tPROCEDURE FreeWReg (n: INTEGER);\r\tBEGIN\r\t\tIF n IN AllReg THEN\r\t\t\tINCL(WReg, n);\r\t\t\tIF n < 4 THEN INCL(BReg, n); INCL(BReg, n + 4) END\r\t\tEND\r\tEND FreeWReg;\r\t\r\tPROCEDURE Free* (VAR x: DevCPL486.Item);\r\tBEGIN\r\t\tCASE x.mode OF\r\t\t| Var, VarPar, Abs: IF x.scale # 0 THEN FreeWReg(x.index) END\r\t\t| Ind: FreeWReg(x.reg);\r\t\t\tIF x.scale # 0 THEN FreeWReg(x.index) END\r\t\t| Reg: FreeReg(x.reg, x.form);\r\t\t\tIF x.form = Int64 THEN FreeWReg(x.index) END\r\t\tELSE\r\t\tEND\r\tEND Free;\r\t\r\tPROCEDURE FreeHi (VAR x: DevCPL486.Item);\t(* free hi byte of word reg *)\r\tBEGIN\r\t\tIF x.mode = Reg THEN\r\t\t\tIF x.form = Int64 THEN FreeWReg(x.index)\r\t\t\tELSIF x.reg < 4 THEN INCL(BReg, x.reg + 4)\r\t\t\tEND\r\t\tEND\r\tEND FreeHi;\r\r\tPROCEDURE Fits* (VAR x: DevCPL486.Item; stop: SET): BOOLEAN;\t(* x.mode = Reg *)\r\tBEGIN\r\t\tIF (short IN stop) & (x.form <= Int8) THEN RETURN FALSE END;\r\t\tIF x.form <= Int8 THEN RETURN ~(x.reg MOD 4 IN stop) & ((x.reg < 4) OR ~(high IN stop))\r\t\tELSIF x.form IN realSet THEN RETURN ~(float IN stop)\r\t\tELSIF x.form = Int64 THEN RETURN ~(x.reg IN stop) & ~(x.index IN stop)\r\t\tELSE RETURN ~(x.reg IN stop) & ((x.reg < 4) OR ~(high IN stop))\r\t\tEND\r\tEND Fits;\r\t\r\tPROCEDURE Pop* (VAR r: DevCPL486.Item; f: BYTE; hint, stop: SET);\r\t\tVAR rh: DevCPL486.Item;\r\tBEGIN\r\t\tIF f = Int64 THEN\r\t\t\tGetReg(r, Int32, hint, stop); DevCPL486.GenPop(r);\r\t\t\tGetReg(rh, Int32, hint, stop); DevCPL486.GenPop(rh);\r\t\t\tr.form := Int64; r.index := rh.reg\r\t\tELSE\r\t\t\tIF f < Int16 THEN INCL(stop, high) END;\r\t\t\tGetReg(r, f, hint, stop); DevCPL486.GenPop(r)\r\t\tEND\r\tEND Pop;\r\t\r\tPROCEDURE^ LoadLong (VAR x: DevCPL486.Item; hint, stop: SET);\r\t\r\tPROCEDURE Load* (VAR x: DevCPL486.Item; hint, stop: SET);\t(* = Assert(x, hint, stop + {mem, stk}) *)\r\t\tVAR r: DevCPL486.Item; f: BYTE;\r\tBEGIN\r\t\tf := x.typ.form;\r\t\tIF x.mode = Con THEN\r\t\t\tIF (short IN stop) & (x.form IN {Int8, Int16, Bool, Char8, Char16}) THEN f := Int32; x.form := Int32 END;\r\t\t\tIF con IN stop THEN\r\t\t\t\tIF f = Int64 THEN LoadLong(x, hint, stop)\r\t\t\t\tELSE\r\t\t\t\t\tGetReg(r, f, hint, stop); DevCPL486.GenMove(x, r);\r\t\t\t\t\tx.mode := Reg; x.reg := r.reg; x.form := f\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSIF x.mode = Stk THEN\r\t\t\tIF f IN realSet THEN\r\t\t\t\tGetReg(r, f, hint, stop); DevCPL486.GenFLoad(x); IncStack(x.form)\r\t\t\tELSE\r\t\t\t\tPop(r, f, hint, stop)\r\t\t\tEND;\r\t\t\tx.mode := Reg; x.reg := r.reg; x.index := r.index; x.form := f\r\t\tELSIF (short IN stop) & (x.form IN {Int8, Int16, Bool, Char8, Char16}) THEN\r\t\t\tFree(x); GetReg(r, Int32, hint, stop); DevCPL486.GenExtMove(x, r);\r\t\t\tx.mode := Reg; x.reg := r.reg; x.form := Int32\r\t\tELSIF (x.mode # Reg) OR ~Fits(x, stop) THEN\r\t\t\tIF f = Int64 THEN LoadLong(x, hint, stop)\r\t\t\tELSE\r\t\t\t\tFree(x); GetReg(r, f, hint, stop);\r\t\t\t\tIF f IN realSet THEN DevCPL486.GenFLoad(x) ELSE DevCPL486.GenMove(x, r) END;\r\t\t\t\tx.mode := Reg; x.reg := r.reg; x.form := f\r\t\t\tEND\r\t\tEND\r\tEND Load;\r\t\r\tPROCEDURE Push* (VAR x: DevCPL486.Item);\r\t\tVAR y: DevCPL486.Item;\r\tBEGIN\r\t\tIF x.form IN realSet THEN\r\t\t\tLoad(x, {}, {}); DecStack(x.form);\r\t\t\tFree(x); x.mode := Stk;\r\t\t\tIF x.typ = DevCPT.intrealtyp THEN x.form := Int64 END;\r\t\t\tDevCPL486.GenFStore(x, TRUE)\r\t\tELSIF x.form = Int64 THEN\r\t\t\tFree(x); x.form := Int32; y := x;\r\t\t\tIF x.mode = Reg THEN y.reg := x.index ELSE INC(y.offset, 4) END;\r\t\t\tDevCPL486.GenPush(y); DevCPL486.GenPush(x);\r\t\t\tx.mode := Stk; x.form := Int64\r\t\tELSE\r\t\t\tIF x.form < Int16 THEN Load(x, {}, {high})\r\t\t\tELSIF x.form = Int16 THEN Load(x, {}, {})\r\t\t\tEND;\r\t\t\tFree(x); DevCPL486.GenPush(x); x.mode := Stk\r\t\tEND\r\tEND Push;\r\t\r\tPROCEDURE Assert* (VAR x: DevCPL486.Item; hint, stop: SET);\r\t\tVAR r: DevCPL486.Item;\r\tBEGIN\r\t\tIF (short IN stop) & (x.form IN {Int8, Int16, Bool, Char8, Char16}) & (x.mode # Con) THEN\r\t\t\tIF (wreg - stop = {}) & ~(stk IN stop) THEN Load(x, {}, {short}); Push(x)\r\t\t\tELSE Load(x, hint, stop);\r\t\t\tEND\r\t\tELSE\r\t\t\tCASE x.mode OF\r\t\t\t| Var, VarPar: IF ~(mem IN stop) THEN RETURN END\r\t\t\t| Con: IF ~(con IN stop) THEN RETURN END\r\t\t\t| Ind: IF ~(mem IN stop) & ~(x.reg IN stop) & ((x.scale = 0) OR ~(x.index IN stop)) THEN RETURN END\r\t\t\t| Abs: IF ~(mem IN stop) & ((x.scale = 0) OR ~(x.index IN stop)) THEN RETURN END\r\t\t\t| Stk: IF ~(stk IN stop) THEN RETURN END\r\t\t\t| Reg: IF Fits(x, stop) THEN RETURN END\r\t\t\tELSE RETURN\r\t\t\tEND;\r\t\t\tIF ((float IN stop) OR ~(x.typ.form IN realSet) & (wreg - stop = {})) & ~(stk IN stop) THEN Push(x)\r\t\t\tELSE Load(x, hint, stop)\r\t\t\tEND\r\t\tEND\r\tEND Assert;\r\t\r\t(*------------------------------------------------*)\r\r\tPROCEDURE LoadR (VAR x: DevCPL486.Item);\r\tBEGIN\r\t\tIF x.mode # Reg THEN\r\t\t\tFree(x); DevCPL486.GenFLoad(x);\r\t\t\tIF x.mode = Stk THEN IncStack(x.form) END;\r\t\t\tGetReg(x, Real32, {}, {})\r\t\tEND\r\tEND LoadR;\r\r\tPROCEDURE PushR (VAR x: DevCPL486.Item);\r\tBEGIN\r\t\tIF x.mode # Reg THEN LoadR(x) END;\r\t\tDecStack(x.form);\r\t\tFree(x); x.mode := Stk; DevCPL486.GenFStore(x, TRUE)\r\tEND PushR;\r\t\r\tPROCEDURE LoadW (VAR x: DevCPL486.Item; hint, stop: SET);\r\t\tVAR r: DevCPL486.Item;\r\tBEGIN\r\t\tIF x.mode = Stk THEN\r\t\t\tPop(x, x.form, hint, stop)\r\t\tELSE\r\t\t\tFree(x); GetReg(r, x.form, hint, stop);\r\t\t\tDevCPL486.GenMove(x, r);\r\t\t\tx.mode := Reg; x.reg := r.reg\r\t\tEND\r\tEND LoadW;\r\r\tPROCEDURE LoadL (VAR x: DevCPL486.Item; hint, stop: SET);\r\t\tVAR r: DevCPL486.Item;\r\tBEGIN\r\t\tIF x.mode = Stk THEN\r\t\t\tPop(x, x.form, hint, stop);\r\t\t\tIF (x.form < Int32) OR (x.form = Char16) THEN\r\t\t\t\tr := x; x.form := Int32; DevCPL486.GenExtMove(r, x)\r\t\t\tEND\r\t\tELSE\r\t\t\tFree(x);\r\t\t\tIF (x.form < Int32) OR (x.form = Char16) THEN GetReg(r, Int32, hint, stop) ELSE GetReg(r, x.form, hint, stop) END;\r\t\t\tIF x.mode = Con THEN x.form := r.form END;\r\t\t\tIF x.form # r.form THEN DevCPL486.GenExtMove(x, r) ELSE DevCPL486.GenMove(x, r) END;\r\t\t\tx.mode := Reg; x.reg := r.reg; x.form := r.form\r\t\tEND\r\tEND LoadL;\r\t\r\tPROCEDURE LoadLong (VAR x: DevCPL486.Item; hint, stop: SET);\r\t\tVAR r, rh, c: DevCPL486.Item; offs: INTEGER;\r\tBEGIN\r\t\tIF x.form = Int64 THEN\r\t\t\tIF  x.mode = Stk THEN\r\t\t\t\tPop(x, x.form, hint, stop)\r\t\t\tELSIF x.mode = Reg THEN\r\t\t\t\tFreeReg(x.reg, Int32); GetReg(r, Int32, hint, stop);\r\t\t\t\tFreeReg(x.index, Int32); GetReg(rh, Int32, hint, stop);\r\t\t\t\tx.form := Int32; DevCPL486.GenMove(x, r);\r\t\t\t\tx.reg := x.index; DevCPL486.GenMove(x, rh);\r\t\t\t\tx.reg := r.reg; x.index := rh.reg\r\t\t\tELSE\r\t\t\t\tGetReg(rh, Int32, hint, stop + {AX});\r\t\t\t\tFree(x);\r\t\t\t\tGetReg(r, Int32, hint, stop); \r\t\t\t\tx.form := Int32; offs := x.offset;\r\t\t\t\tIF x.mode = Con THEN x.offset := x.scale ELSE INC(x.offset, 4) END;\r\t\t\t\tDevCPL486.GenMove(x, rh);\r\t\t\t\tx.offset := offs;\r\t\t\t\tDevCPL486.GenMove(x, r);\r\t\t\t\tx.mode := Reg; x.reg := r.reg; x.index := rh.reg\r\t\t\tEND\r\t\tELSE\r\t\t\tLoadL(x, hint, stop); GetReg(rh, Int32, hint, stop); DevCPL486.GenSignExt(x, rh);\r\t\t\tx.index := rh.reg\r\t\tEND;\r\t\tx.form := Int64\r\tEND LoadLong;\r\t\r\t(*------------------------------------------------*)\r\t\r\tPROCEDURE CopyReg* (VAR x, y: DevCPL486.Item; hint, stop: SET);\r\tBEGIN\r\t\tASSERT(x.mode = Reg);\r\t\tGetReg(y, x.form, hint, stop);\r\t\tDevCPL486.GenMove(x, y)\r\tEND CopyReg;\r\r\tPROCEDURE GetAdr* (VAR x: DevCPL486.Item; hint, stop: SET);\r\t\tVAR r: DevCPL486.Item;\r\tBEGIN\r\t\tIF x.mode = DInd THEN\r\t\t\tx.mode := Ind\r\t\tELSIF (x.mode = Ind) & (x.offset = 0) & (x.scale = 0) & (x.reg IN wreg) THEN\r\t\t\tx.mode := Reg\r\t\tELSE\r\t\t\tFree(x); GetReg(r, Pointer, hint, stop);\r\t\t\tIF x.mode = Con THEN DevCPL486.GenMove(x, r) ELSE DevCPL486.GenLoadAdr(x, r) END;\r\t\t\tx.mode := Reg; x.reg := r.reg; x.form := Pointer\r\t\tEND;\r\t\tx.form := Pointer; x.typ := DevCPT.anyptrtyp;\r\t\tAssert(x, hint, stop)\r\tEND GetAdr;\r\t\r\tPROCEDURE PushAdr (VAR x: DevCPL486.Item; niltest: BOOLEAN);\r\t\tVAR r, v: DevCPL486.Item;\r\tBEGIN\r\t\tIF (x.mode = Abs) & (x.scale = 0) THEN x.mode := Con; x.form := Pointer\r\t\tELSIF niltest THEN\r\t\t\tGetAdr(x, {}, {mem, stk});\r\t\t\tDevCPL486.MakeReg(r, AX, Int32);\r\t\t\tv.mode := Ind; v.form := Int32; v.offset := 0; v.scale := 0; v.reg := x.reg;\r\t\t\tDevCPL486.GenTest(r, v)\r\t\tELSIF x.mode = DInd THEN x.mode := Ind; x.form := Pointer\r\t\tELSE GetAdr(x, {}, {})\r\t\tEND;\r\t\tFree(x); DevCPL486.GenPush(x)\r\tEND PushAdr;\r\r\tPROCEDURE LevelBase (VAR a: DevCPL486.Item; lev: INTEGER; hint, stop: SET);\r\t\tVAR n: BYTE;\r\tBEGIN\r\t\ta.mode := Ind; a.scale := 0; a.form := Int32; a.typ := DevCPT.int32typ;\r\t\tIF lev = DevCPL486.level THEN a.reg := BP\r\t\tELSE\r\t\t\ta.reg := BX; n := SHORT(SHORT(imLevel[DevCPL486.level] - imLevel[lev]));\r\t\t\tWHILE n > 0 DO\r\t\t\t\ta.offset := -4; LoadL(a, hint, stop); a.mode := Ind; DEC(n)\r\t\t\tEND\r\t\tEND\r\tEND LevelBase;\r\t\r\tPROCEDURE LenDesc (VAR x, len: DevCPL486.Item; typ: DevCPT.Struct); (* set len to LEN(x, -typ.n) *)\r\tBEGIN\r\t\tIF x.tmode = VarPar THEN\r\t\t\tLevelBase(len, x.obj.mnolev, {}, {}); len.offset := x.obj.adr;\r\t\tELSE ASSERT((x.tmode = Ind) & (x.mode = Ind));\r\t\t\tlen := x; len.offset := ArrDOffs; len.scale := 0; len.form := Int32\r\t\tEND;\r\t\tINC(len.offset, typ.n * 4 + 4);\r\t\tIF typ.sysflag = stackArray THEN len.offset := -4 END\r\tEND LenDesc;\r\t\r\tPROCEDURE Tag* (VAR x, tag: DevCPL486.Item);\r\t\tVAR typ: DevCPT.Struct;\r\tBEGIN\r\t\ttyp := x.typ;\r\t\tIF typ.form = Pointer THEN typ := typ.BaseTyp END;\r\t\tIF (x.typ # DevCPT.sysptrtyp) & (typ.attribute = 0) "
                    attr: 0
                  - text: "& ~(DevCPM.oberon IN DevCPM.options)"
                    attr: 3
                  - text: " THEN\t"
                    attr: 0
                  - text: "(* final type *)"
                    attr: 1
                  - text: "\r\t\t\tDevCPL486.MakeConst(tag, 0, Pointer); tag.obj := DevCPE.TypeObj(typ)\r\t\tELSIF x.typ.form = Pointer THEN\r\t\t\tASSERT(x.mode = Reg);\r\t\t\ttag.mode := Ind; tag.reg := x.reg; tag.offset := -4;\r\t\t\tIF x.typ.sysflag = interface THEN tag.offset := 0 END\r\t\tELSIF x.tmode = VarPar THEN\r\t\t\tLevelBase(tag, x.obj.mnolev, {}, {}); tag.offset := x.obj.adr + 4;\r\t\t\tFree(tag)\t(* ??? *)\r\t\tELSIF x.tmode = Ind THEN\r\t\t\tASSERT(x.mode = Ind);\r\t\t\ttag := x; tag.offset := -4\r\t\tELSE\r\t\t\tDevCPL486.MakeConst(tag, 0, Pointer); tag.obj := DevCPE.TypeObj(x.typ)\r\t\tEND;\r\t\ttag.scale := 0; tag.form := Pointer; tag.typ := DevCPT.sysptrtyp\r\tEND Tag;\r\t\r\tPROCEDURE NumOfIntProc (typ: DevCPT.Struct): INTEGER;\r\tBEGIN\r\t\tWHILE (typ # NIL) & (typ.sysflag # interface) DO typ := typ.BaseTyp END;\r\t\tIF typ # NIL THEN RETURN typ.n\r\t\tELSE RETURN 0\r\t\tEND\r\tEND NumOfIntProc;\r\t\r\tPROCEDURE ContainsIPtrs* (typ: DevCPT.Struct): BOOLEAN;\r\t\tVAR fld: DevCPT.Object;\r\tBEGIN\r\t\tWHILE typ.comp IN {DynArr, Array} DO typ := typ.BaseTyp END;\r\t\tIF (typ.form = Pointer) & (typ.sysflag = interface) THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE\r\t\tELSIF (typ.comp = Record) & (typ.sysflag # union) THEN\r\t\t\tREPEAT\r\t\t\t\tfld := typ.link;\r\t\t\t\tWHILE (fld # NIL) & (fld.mode = Fld) DO\r\t\t\t\t\tIF (fld.sysflag = interface) & (fld.name^ = DevCPM.HdUtPtrName) \r\t\t\t\t\t\tOR ContainsIPtrs(fld.typ) THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE END;\r\t\t\t\t\tfld := fld.link\r\t\t\t\tEND;\r\t\t\t\ttyp := typ.BaseTyp\r\t\t\tUNTIL typ = NIL\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE\r\tEND ContainsIPtrs;\r\t\r\tPROCEDURE GuidFromString* (str: DevCPT.ConstExt; VAR x: DevCPL486.Item);\r\t\tVAR cv: DevCPT.Const;\r\tBEGIN\r\t\tIF ~DevCPM.ValidGuid(str^) THEN DevCPM.err(165) END;\r\t\tcv := DevCPT.NewConst();\r\t\tcv.intval := DevCPM.ConstNotAlloc; cv.intval2 := 16; cv.ext := str;\r\t\tDevCPL486.AllocConst(x, cv, Guid); x.typ := DevCPT.guidtyp\r\tEND GuidFromString;\r\t\r\tPROCEDURE IPAddRef* (VAR x: DevCPL486.Item; offset: INTEGER; nilTest: BOOLEAN);\r\t\tVAR r, p, c: DevCPL486.Item; lbl: DevCPL486.Label;\r\tBEGIN\r\t\tASSERT(x.mode IN {Reg, Ind, Abs});\r\t\tASSERT({AX, CX, DX} - WReg = {});\r\t\tIF hints THEN\r\t\t\tIF nilTest THEN DevCPM.err(-701) ELSE DevCPM.err(-700) END\r\t\tEND;\r\t\tIF x.mode # Reg THEN \r\t\t\tGetReg(r, Pointer, {}, {});\r\t\t\tp := x; INC(p.offset, offset); p.form := Pointer; DevCPL486.GenMove(p, r);\r\t\tELSE r := x\r\t\tEND;\r\t\tIF nilTest THEN\r\t\t\tDevCPL486.MakeConst(c, 0, Pointer); DevCPL486.GenComp(c, r);\r\t\t\tlbl := DevCPL486.NewLbl; DevCPL486.GenJump(ccE, lbl, TRUE)\r\t\tEND;\r\t\tDevCPL486.GenPush(r); p := r;\r\t\tIF x.mode # Reg THEN Free(r) END;\r\t\tGetReg(r, Pointer, {}, {});\r\t\tp.mode := Ind; p.offset := 0; p.scale := 0; p.form := Pointer; DevCPL486.GenMove(p, r);\r\t\tp.offset := 4; p.reg := r.reg; Free(r); DevCPL486.GenCall(p);\r\t\tIF nilTest THEN DevCPL486.SetLabel(lbl) END;\r\tEND IPAddRef;\r\t\r\tPROCEDURE IPRelease* (VAR x: DevCPL486.Item; offset: INTEGER; nilTest, nilSet: BOOLEAN);\r\t\tVAR r, p, c: DevCPL486.Item; lbl: DevCPL486.Label;\r\tBEGIN\r\t\tASSERT(x.mode IN {Ind, Abs});\r\t\tASSERT({AX, CX, DX} - WReg = {});\r\t\tIF hints THEN\r\t\t\tIF nilTest THEN DevCPM.err(-703) ELSE DevCPM.err(-702) END\r\t\tEND;\r\t\tGetReg(r, Pointer, {}, {});\r\t\tp := x; INC(p.offset, offset); p.form := Pointer; DevCPL486.GenMove(p, r);\r\t\tDevCPL486.MakeConst(c, 0, Pointer);\r\t\tIF nilTest THEN\r\t\t\tDevCPL486.GenComp(c, r);\r\t\t\tlbl := DevCPL486.NewLbl; DevCPL486.GenJump(ccE, lbl, TRUE)\r\t\tEND;\r\t\tIF nilSet THEN DevCPL486.GenMove(c, p) END;\r\t\tDevCPL486.GenPush(r);\r\t\tp.mode := Ind; p.reg := r.reg; p.offset := 0; p.scale := 0; DevCPL486.GenMove(p, r);\r\t\tp.offset := 8; Free(r); DevCPL486.GenCall(p);\r\t\tIF nilTest THEN DevCPL486.SetLabel(lbl) END;\r\tEND IPRelease;\r\t\r\tPROCEDURE Prepare* (VAR x: DevCPL486.Item; hint, stop: SET);\r\t\tVAR n, i, lev: INTEGER; len, y: DevCPL486.Item; typ: DevCPT.Struct;\r\tBEGIN\r\t\tIF (x.mode IN {Var, VarPar, Ind, Abs}) & (x.scale # 0) THEN\r\t\t\tDevCPL486.MakeReg(y, x.index, Int32); typ := x.typ;\r\t\t\tWHILE typ.comp = DynArr DO (* complete dynamic array iterations *)\r\t\t\t\tLenDesc(x, len, typ); DevCPL486.GenMul(len, y, FALSE); typ := typ.BaseTyp;\r\t\t\t\tIF x.tmode = VarPar THEN Free(len) END;\t(* ??? *)\r\t\t\tEND;\r\t\t\tn := x.scale; i := 0;\r\t\t\tWHILE (n MOD 2 = 0) & (i < 3) DO n := n DIV 2; INC(i) END;\r\t\t\tIF n > 1 THEN (* assure scale factor in {1, 2, 4, 8} *)\r\t\t\t\tDevCPL486.MakeConst(len, n, Int32); DevCPL486.GenMul(len, y, FALSE); x.scale := x.scale DIV n \r\t\t\tEND\r\t\tEND;\r\t\tCASE x.mode OF\r\t\t   Var, VarPar:\r\t\t\t\tlev := x.obj.mnolev;\r\t\t\t\tIF lev <= 0 THEN\r\t\t\t\t\tx.mode := Abs\r\t\t\t\tELSE\r\t\t\t\t\tLevelBase(y, lev, hint, stop);\r\t\t\t\t\tIF x.mode # VarPar THEN\r\t\t\t\t\t\tx.mode := Ind\r\t\t\t\t\tELSIF (deref IN hint) & (x.offset = 0) & (x.scale = 0) THEN\r\t\t\t\t\t\tx.mode := DInd; x.offset := x.obj.adr\r\t\t\t\t\tELSE\r\t\t\t\t\t\ty.offset := x.obj.adr; Load(y, hint, stop); x.mode := Ind\r\t\t\t\t\tEND;\r\t\t\t\t\tx.reg := y.reg\r\t\t\t\tEND;\r\t\t\t\tx.form := x.typ.form\r\t\t| LProc, XProc, IProc:\r\t\t\t\tx.mode := Con; x.offset := 0; x.form := ProcTyp\r\t\t| TProc, CProc:\r\t\t\t\tx.form := ProcTyp\r\t\t| Ind, Abs, Stk, Reg:\r\t\t\t\tIF ~(x.typ.form IN {String8, String16}) THEN x.form := x.typ.form END\r\t\tEND\r\tEND Prepare;\r\t\r\tPROCEDURE Field* (VAR x: DevCPL486.Item; field: DevCPT.Object);\r\tBEGIN\r\t\tINC(x.offset, field.adr); x.tmode := Con\r\tEND Field;\r\t\r\tPROCEDURE DeRef* (VAR x: DevCPL486.Item);\r\t\tVAR btyp: DevCPT.Struct;\r\tBEGIN\r\t\tx.mode := Ind; x.tmode := Ind; x.scale := 0;\r\t\tbtyp := x.typ.BaseTyp;\r\t\tIF btyp.untagged OR (btyp.sysflag = stackArray) THEN x.offset := 0\r\t\tELSIF btyp.comp = DynArr THEN x.offset := ArrDOffs + btyp.size\r\t\tELSIF btyp.comp = Array THEN x.offset := ArrDOffs + 4 \r\t\tELSE x.offset := 0\r\t\tEND\r\tEND DeRef;\r\t\r\tPROCEDURE Index* (VAR x, y: DevCPL486.Item; hint, stop: SET);\t(* x[y] *)\r\t\tVAR idx, len: DevCPL486.Item; btyp: DevCPT.Struct; elsize: INTEGER;\r\tBEGIN\r\t\tbtyp := x.typ.BaseTyp; elsize := btyp.size;\r\t\tIF elsize = 0 THEN Free(y)\r\t\tELSIF x.typ.comp = Array THEN\r\t\t\tlen.mode := Con; len.obj := NIL;\r\t\t\tIF y.mode = Con THEN\r\t\t\t\tINC(x.offset, y.offset * elsize)\r\t\t\tELSE\r\t\t\t\tLoad(y, hint, stop + {mem, stk, short});\r\t\t\t\tIF inxchk THEN\r\t\t\t\t\tDevCPL486.MakeConst(len, x.typ.n, Int32);\r\t\t\t\t\tDevCPL486.GenComp(len, y); DevCPL486.GenAssert(ccB, inxTrap)\r\t\t\t\tEND;\r\t\t\t\tIF x.scale = 0 THEN x.index := y.reg\r\t\t\t\tELSE\r\t\t\t\t\tIF x.scale MOD elsize # 0 THEN\r\t\t\t\t\t\tIF (x.scale MOD 4 = 0) & (elsize MOD 4 = 0) THEN elsize := 4\r\t\t\t\t\t\tELSIF (x.scale MOD 2 = 0) & (elsize MOD 2 = 0) THEN elsize := 2\r\t\t\t\t\t\tELSE elsize := 1\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tDevCPL486.MakeConst(len, btyp.size DIV elsize, Int32);\r\t\t\t\t\t\tDevCPL486.GenMul(len, y, FALSE)\r\t\t\t\t\tEND;\r\t\t\t\t\tDevCPL486.MakeConst(len, x.scale DIV elsize, Int32);\r\t\t\t\t\tDevCPL486.MakeReg(idx, x.index, Int32);\r\t\t\t\t\tDevCPL486.GenMul(len, idx, FALSE); DevCPL486.GenAdd(y, idx, FALSE); Free(y)\r\t\t\t\tEND;\r\t\t\t\tx.scale := elsize\r\t\t\tEND;\r\t\t\tx.tmode := Con\r\t\tELSE (* x.typ.comp = DynArr *)\r\t\t\tIF (btyp.comp = DynArr) & x.typ.untagged THEN DevCPM.err(137) END;\r\t\t\tLenDesc(x, len, x.typ);\r\t\t\tIF x.scale # 0 THEN\r\t\t\t\tDevCPL486.MakeReg(idx, x.index, Int32); \r\t\t\t\tDevCPL486.GenMul(len, idx, FALSE)\r\t\t\tEND;\r\t\t\tIF (y.mode # Con) OR (y.offset # 0) THEN\r\t\t\t\tIF (y.mode # Con) OR (btyp.comp = DynArr) & (x.scale = 0) THEN\r\t\t\t\t\tLoad(y, hint, stop + {mem, stk, con, short})\r\t\t\t\tELSE y.form := Int32\r\t\t\t\tEND;\r\t\t\t\tIF inxchk & ~x.typ.untagged THEN\r\t\t\t\t\tDevCPL486.GenComp(y, len); DevCPL486.GenAssert(ccA, inxTrap)\r\t\t\t\tEND;\r\t\t\t\tIF (y.mode = Con) & (btyp.comp # DynArr) THEN\r\t\t\t\t\tINC(x.offset, y.offset * elsize)\r\t\t\t\tELSIF x.scale = 0 THEN\r\t\t\t\t\tWHILE btyp.comp = DynArr DO btyp := btyp.BaseTyp END;\r\t\t\t\t\tx.index := y.reg; x.scale := btyp.size\r\t\t\t\tELSE\r\t\t\t\t\tDevCPL486.GenAdd(y, idx, FALSE); Free(y)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF x.tmode = VarPar THEN Free(len) END;\t(* ??? *)\r\t\t\tIF x.typ.BaseTyp.comp # DynArr THEN x.tmode := Con END\r\t\tEND\r\tEND Index;\r\t\r\tPROCEDURE TypTest* (VAR x: DevCPL486.Item; testtyp: DevCPT.Struct; guard, equal: BOOLEAN);\r\t\tVAR tag, tdes, r: DevCPL486.Item; typ: DevCPT.Struct;\r\tBEGIN\r\t\ttyp := x.typ;\r\t\tIF typ.form = Pointer THEN testtyp := testtyp.BaseTyp; typ := typ.BaseTyp END;\r\t\tIF ~guard & typ.untagged THEN DevCPM.err(139)\r\t\tELSIF ~guard OR typchk & ~typ.untagged THEN\r\t\t\tIF testtyp.untagged THEN DevCPM.err(139)\r\t\t\tELSE\r\t\t\t\t"
                    attr: 0
                  - text: "IF (x.typ.form = Pointer) & (x.mode # Reg) THEN\r\t\t\t\t\tGetReg(r, Pointer, {}, {}); DevCPL486.GenMove(x, r); Free(r); r.typ := x.typ; Tag(r, tag)"
                    attr: 3
                  - text: "\r\t\t\t\tELSE Tag(x, tag)\r\t\t\t\tEND;\r\t\t\t\tIF ~guard THEN Free(x) END;\r\t\t\t\tIF ~equal THEN\r\t\t\t\t\tGetReg(r, Pointer, {}, {}); DevCPL486.GenMove(tag, r); Free(r);\r\t\t\t\t\ttag.mode := Ind; tag.reg := r.reg; tag.scale := 0; tag.offset := Tag0Offset + 4 * testtyp.extlev\r\t\t\t\tEND;\r\t\t\t\tDevCPL486.MakeConst(tdes, 0, Pointer); tdes.obj := DevCPE.TypeObj(testtyp);\r\t\t\t\tDevCPL486.GenComp(tdes, tag);\r\t\t\t\tIF guard THEN\r\t\t\t\t\tIF equal THEN DevCPL486.GenAssert(ccE, recTrap) ELSE DevCPL486.GenAssert(ccE, typTrap) END\r\t\t\t\tELSE setCC(x, eql, FALSE, FALSE)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND TypTest;\r\t\r\tPROCEDURE ShortTypTest* (VAR x: DevCPL486.Item; testtyp: DevCPT.Struct);\r\t\tVAR tag, tdes: DevCPL486.Item;\r\tBEGIN\r\t\t(* tag must be in AX ! *)\r\t\tIF testtyp.form = Pointer THEN testtyp := testtyp.BaseTyp END;\r\t\tIF testtyp.untagged THEN DevCPM.err(139)\r\t\tELSE\r\t\t\ttag.mode := Ind; tag.reg := AX; tag.scale := 0; tag.offset := Tag0Offset + 4 * testtyp.extlev; tag.form := Pointer;\r\t\t\tDevCPL486.MakeConst(tdes, 0, Pointer); tdes.obj := DevCPE.TypeObj(testtyp);\r\t\t\tDevCPL486.GenComp(tdes, tag);\r\t\t\tsetCC(x, eql, FALSE, FALSE)\r\t\tEND\r\tEND ShortTypTest;\r\r\tPROCEDURE Check (VAR x: DevCPL486.Item; min, max: INTEGER);\r\t\tVAR c: DevCPL486.Item;\r\tBEGIN\r\t\tASSERT((x.mode # Reg) OR (max > 255) OR (max = 31) OR (x.reg < 4));\r\t\tIF ranchk & (x.mode # Con) THEN\r\t\t\tDevCPL486.MakeConst(c, max, x.form); DevCPL486.GenComp(c, x);\r\t\t\tIF min # 0 THEN\r\t\t\t\tDevCPL486.GenAssert(ccLE, ranTrap);\r\t\t\t\tc.offset := min; DevCPL486.GenComp(c, x);\r\t\t\t\tDevCPL486.GenAssert(ccGE, ranTrap)\r\t\t\tELSIF max # 0 THEN\r\t\t\t\tDevCPL486.GenAssert(ccBE, ranTrap)\r\t\t\tELSE\r\t\t\t\tDevCPL486.GenAssert(ccNS, ranTrap)\r\t\t\tEND\r\t\tEND\r\tEND Check;\r\r\tPROCEDURE Floor (VAR x: DevCPL486.Item; useSt1: BOOLEAN);\r\t\tVAR c: DevCPL486.Item; local: DevCPL486.Label;\r\tBEGIN\r\t\tIF useSt1 THEN DevCPL486.GenFMOp(5D1H);\t(* FST ST1 *)\r\t\tELSE DevCPL486.GenFMOp(1C0H);\t(* FLD ST0 *)\r\t\tEND;\r\t\tDevCPL486.GenFMOp(1FCH);\t(* FRNDINT *)\r\t\tDevCPL486.GenFMOp(0D1H);\t(* FCOM *)\r\t\tCheckAv(AX);\r\t\tDevCPL486.GenFMOp(FSTSW);\r\t\tDevCPL486.GenFMOp(5D9H);\t(* FSTP ST1 *)\r\t\t(* DevCPL486.GenCode(WAIT); *) DevCPL486.GenCode(SAHF);\r\t\tlocal := DevCPL486.NewLbl; DevCPL486.GenJump(ccBE, local, TRUE);\r\t\tDevCPL486.AllocConst(c, DevCPL486.one, Real32);\r\t\tDevCPL486.GenFDOp(FSUB, c);\r\t\tDevCPL486.SetLabel(local);\r\tEND Floor;\r\t\r\tPROCEDURE Entier(VAR x: DevCPL486.Item; typ: DevCPT.Struct; hint, stop: SET);\r\tBEGIN\r\t\tIF typ # DevCPT.intrealtyp THEN Floor(x, FALSE) END;\r\t\tDevCPL486.GenFStore(x, TRUE);\r\t\tIF (x.mode = Stk) & (stk IN stop) THEN Pop(x, x.form, hint, stop) END\r\tEND Entier;\r\r\tPROCEDURE ConvMove (VAR x, y: DevCPL486.Item; sysval: BOOLEAN; hint, stop: SET);\t(* x := y *)\r\t\t(* scalar values only, y.mode # Con, all kinds of conversions, x.mode = Undef => convert y only *)\r\t\tVAR f, m: BYTE; s: INTEGER; z: DevCPL486.Item;\r\tBEGIN\r\t\tf := x.form; m := x.mode; ASSERT(m IN {Undef, Reg, Abs, Ind, Stk});\r\t\tIF y.form IN {Real32, Real64} THEN\r\t\t\tIF f IN {Real32, Real64} THEN\r\t\t\t\tIF m = Undef THEN\r\t\t\t\t\tIF (y.form = Real64) & (f = Real32) THEN\r\t\t\t\t\t\tIF y.mode # Reg THEN LoadR(y) END;\r\t\t\t\t\t\tFree(y); DecStack(Real32); y.mode := Stk; y.form := Real32; DevCPL486.GenFStore(y, TRUE)\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\t\tIF y.mode # Reg THEN LoadR(y) END;\r\t\t\t\t\tIF m = Stk THEN DecStack(f) END;\r\t\t\t\t\tIF m # Reg THEN Free(y); DevCPL486.GenFStore(x, TRUE) END;\r\t\t\t\tEND\r\t\t\tELSE (* x not real *)\r\t\t\t\tIF sysval THEN\r\t\t\t\t\tIF y.mode = Reg THEN Free(y);\r\t\t\t\t\t\tIF (m # Stk) & (m # Undef) & (m # Reg) & (f >= Int32) THEN\r\t\t\t\t\t\t\tx.form := y.form; DevCPL486.GenFStore(x, TRUE); x.form := f\r\t\t\t\t\t\tELSIF y.form = Real64 THEN\t(* S.VAL(LONGINT, real) *)\r\t\t\t\t\t\t\tASSERT((m = Undef) & (f = Int64));\r\t\t\t\t\t\t\tDecStack(y.form); y.mode := Stk; DevCPL486.GenFStore(y, TRUE); y.form := Int64;\r\t\t\t\t\t\t\tPop(y, y.form, hint, stop)\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tASSERT(y.form # Real64);\r\t\t\t\t\t\t\tDecStack(y.form); y.mode := Stk; DevCPL486.GenFStore(y, TRUE); y.form := Int32;\r\t\t\t\t\t\t\tIF m # Stk THEN\r\t\t\t\t\t\t\t\tPop(y, y.form, hint, stop);\r\t\t\t\t\t\t\t\tIF f < Int16 THEN ASSERT(y.reg < 4) END;\r\t\t\t\t\t\t\t\ty.form := f;\r\t\t\t\t\t\t\t\tIF m # Undef THEN Free(y); DevCPL486.GenMove(y, x) END\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE (* y.mode # Reg *)\r\t\t\t\t\t\ty.form := f;\r\t\t\t\t\t\tIF m # Undef THEN LoadW(y, hint, stop); Free(y);\r\t\t\t\t\t\t\tIF m = Stk THEN DevCPL486.GenPush(y) ELSE DevCPL486.GenMove(y, x) END\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tELSE (* not sysval *)\r\t\t\t\t\tIF y.mode # Reg THEN LoadR(y) END;\r\t\t\t\t\tFree(y);\r\t\t\t\t\tIF (m # Stk) & (m # Undef) & (m # Reg) & (f >= Int16) & (f # Char16) THEN\r\t\t\t\t\t\tEntier(x, y.typ, hint, stop);\r\t\t\t\t\tELSE\r\t\t\t\t\t\tDecStack(f); y.mode := Stk;\r\t\t\t\t\t\tIF (f < Int16) OR (f = Char16) THEN y.form := Int32 ELSE y.form := f END;\r\t\t\t\t\t\tIF m = Stk THEN Entier(y, y.typ, {}, {})\r\t\t\t\t\t\tELSIF m = Undef THEN Entier(y, y.typ, hint, stop)\r\t\t\t\t\t\tELSE Entier(y, y.typ, hint, stop + {stk})\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF f = Int8 THEN Check(y, -128, 127); FreeHi(y)\r\t\t\t\t\t\tELSIF f = Char8 THEN Check(y, 0, 255); FreeHi(y)\r\t\t\t\t\t\tELSIF f = Char16 THEN Check(y, 0, 65536); FreeHi(y)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\ty.form := f;\r\t\t\t\t\t\tIF (m # Undef) & (m # Stk) THEN\r\t\t\t\t\t\t\tIF f = Int64 THEN\r\t\t\t\t\t\t\t\tFree(y); y.form := Int32; z := x; z.form := Int32; DevCPL486.GenMove(y, z);\r\t\t\t\t\t\t\t\tIF z.mode = Reg THEN z.reg := z.index ELSE INC(z.offset, 4) END;\r\t\t\t\t\t\t\t\ty.reg := y.index; DevCPL486.GenMove(y, z);\r\t\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\t\tFree(y); DevCPL486.GenMove(y, x);\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE (* y not real *)\r\t\t\tIF sysval THEN\r\t\t\t\tIF (y.form < Int16) & (f >= Int16) OR (y.form IN {Int16, Char16}) & (f >= Int32) & (f < Char16) THEN LoadL(y, hint, stop) END;\r\t\t\t\tIF (y.form >= Int16) & (f < Int16) THEN FreeHi(y) END\r\t\t\tELSE\r\t\t\t\tCASE y.form OF\r\t\t\t\t| Byte, Bool:\r\t\t\t\t\t\tIF f = Int64 THEN LoadLong(y, hint, stop)\r\t\t\t\t\t\tELSIF f >= Int16 THEN LoadL(y, hint, stop)\r\t\t\t\t\t\tEND\r\t\t\t\t| Char8:\r\t\t\t\t\t\tIF f = Int8 THEN Check(y, 0, 0)\r\t\t\t\t\t\tELSIF f = Int64 THEN LoadLong(y, hint, stop)\r\t\t\t\t\t\tELSIF f >= Int16 THEN LoadL(y, hint, stop)\r\t\t\t\t\t\tEND\r\t\t\t\t| Char16:\r\t\t\t\t\t\tIF f = Char8 THEN Check(y, 0, 255); FreeHi(y)\r\t\t\t\t\t\tELSIF f = Int8 THEN Check(y, -128, 127); FreeHi(y)\r\t\t\t\t\t\tELSIF f = Int16 THEN Check(y, 0, 0)\r\t\t\t\t\t\tELSIF f = Char16 THEN (* ok *)\r\t\t\t\t\t\tELSIF f = Int64 THEN LoadLong(y, hint, stop)\r\t\t\t\t\t\tELSIF f >= Int32 THEN LoadL(y, hint, stop)\r\t\t\t\t\t\tEND\r\t\t\t\t| Int8:\r\t\t\t\t\t\tIF f = Char8 THEN Check(y, 0, 0)\r\t\t\t\t\t\tELSIF f = Int64 THEN LoadLong(y, hint, stop)\r\t\t\t\t\t\tELSIF f >= Int16 THEN LoadL(y, hint, stop)\r\t\t\t\t\t\tEND\r\t\t\t\t| Int16:\r\t\t\t\t\t\tIF f = Char8 THEN Check(y, 0, 255); FreeHi(y)\r\t\t\t\t\t\tELSIF f = Char16 THEN Check(y, 0, 0)\r\t\t\t\t\t\tELSIF f = Int8 THEN Check(y, -128, 127); FreeHi(y)\r\t\t\t\t\t\tELSIF f = Int64 THEN LoadLong(y, hint, stop)\r\t\t\t\t\t\tELSIF (f = Int32) OR (f = Set) THEN LoadL(y, hint, stop)\r\t\t\t\t\t\tEND\r\t\t\t\t| Int32, Set, Pointer, ProcTyp:\r\t\t\t\t\t\tIF f = Char8 THEN Check(y, 0, 255); FreeHi(y)\r\t\t\t\t\t\tELSIF f = Char16 THEN Check(y, 0, 65536)\r\t\t\t\t\t\tELSIF f = Int8 THEN Check(y, -128, 127); FreeHi(y)\r\t\t\t\t\t\tELSIF f = Int16 THEN Check(y, -32768, 32767)\r\t\t\t\t\t\tELSIF f = Int64 THEN LoadLong(y, hint, stop)\r\t\t\t\t\t\tEND\r\t\t\t\t| Int64:\r\t\t\t\t\t\tIF f IN {Bool..Int32, Char16} THEN\r\t\t\t\t\t\t\t(* make range checks !!! *)\r\t\t\t\t\t\t\tFreeHi(y)\r\t\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF f IN {Real32, Real64} THEN\r\t\t\t\tIF sysval THEN\r\t\t\t\t\tIF (m # Undef) & (m # Reg) THEN\r\t\t\t\t\t\tIF y.mode # Reg THEN LoadW(y, hint, stop) END;\r\t\t\t\t\t\tFree(y);\r\t\t\t\t\t\tIF m = Stk THEN DevCPL486.GenPush(y)\r\t\t\t\t\t\tELSE x.form := Int32; DevCPL486.GenMove(y, x); x.form := f\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE\r\t\t\t\t\t\tIF y.mode = Reg THEN Push(y) END;\r\t\t\t\t\t\ty.form := f;\r\t\t\t\t\t\tIF m = Reg THEN LoadR(y) END\r\t\t\t\t\tEND\r\t\t\t\tELSE (* not sysval *) (* int -> float *)\r\t\t\t\t\tIF y.mode = Reg THEN Push(y) END;\r\t\t\t\t\tIF m = Stk THEN\r\t\t\t\t\t\tFree(y); DevCPL486.GenFLoad(y); s := -4;\r\t\t\t\t\t\tIF f = Real64 THEN DEC(s, 4) END;\r\t\t\t\t\t\tIF y.mode = Stk THEN\r\t\t\t\t\t\t\tIF y.form = Int64 THEN INC(s, 8) ELSE INC(s, 4) END\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF s # 0 THEN AdjustStack(s) END;\r\t\t\t\t\t\tGetReg(y, Real32, {}, {});\r\t\t\t\t\t\tFree(y); DevCPL486.GenFStore(x, TRUE)\r\t\t\t\t\tELSIF m = Reg THEN\r\t\t\t\t\t\tLoadR(y)\r\t\t\t\t\tELSIF m # Undef THEN\r\t\t\t\t\t\tLoadR(y); Free(y); DevCPL486.GenFStore(x, TRUE) \r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\ty.form := f;\r\t\t\t\tIF m = Stk THEN\r\t\t\t\t\tIF ((f < Int32) OR (f = Char16)) & (y.mode # Reg) THEN LoadW(y, hint, stop) END;\r\t\t\t\t\tPush(y)\r\t\t\t\tELSIF m # Undef THEN\r\t\t\t\t\tIF f = Int64 THEN\r\t\t\t\t\t\tIF y.mode # Reg THEN LoadLong(y, hint, stop) END;\r\t\t\t\t\t\tFree(y); y.form := Int32; z := x; z.form := Int32; DevCPL486.GenMove(y, z);\r\t\t\t\t\t\tIF z.mode = Reg THEN ASSERT(z.reg # y.index); z.reg := z.index ELSE INC(z.offset, 4) END;\r\t\t\t\t\t\ty.reg := y.index; DevCPL486.GenMove(y, z);\r\t\t\t\t\tELSE\r\t\t\t\t\t\tIF y.mode # Reg THEN LoadW(y, hint, stop) END;\r\t\t\t\t\t\tFree(y); DevCPL486.GenMove(y, x)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\t\r\tEND ConvMove;\r\r\tPROCEDURE Convert* (VAR x: DevCPL486.Item; f: BYTE; size: INTEGER; hint, stop: SET);\t(* size >= 0: sysval *)\r\t\tVAR y: DevCPL486.Item;\r\tBEGIN\r\t\tASSERT(x.mode # Con);\r\t\tIF (size >= 0)\r\t\t\t& ((size # x.typ.size) & ((size > 4) OR (x.typ.size > 4))\r\t\t\t\tOR (f IN {Comp, Real64}) & (x.mode IN {Reg, Stk})\r\t\t\t\tOR (f  = Int64) & (x.mode = Stk)) THEN DevCPM.err(220) END;\r\t\ty.mode := Undef; y.form := f; ConvMove(y, x, size >= 0, hint, stop)\r\tEND Convert;\r\r\tPROCEDURE LoadCond* (VAR x, y: DevCPL486.Item; F, T: DevCPL486.Label; hint, stop: SET);\r\t\tVAR end, T1: DevCPL486.Label; c, r: DevCPL486.Item;\r\tBEGIN\r\t\tIF mem IN stop THEN GetReg(x, Bool, hint, stop) END;\r\t\tIF (F = DevCPL486.NewLbl) & (T = DevCPL486.NewLbl) THEN (* no label used *)\r\t\t\tDevCPL486.GenSetCC(y.offset, x)\r\t\tELSE\r\t\t\tend := DevCPL486.NewLbl; T1 := DevCPL486.NewLbl;\r\t\t\tDevCPL486.GenJump(y.offset, T1, TRUE);\t(* T1 to enable short jump *)\r\t\t\tDevCPL486.SetLabel(F);\r\t\t\tDevCPL486.MakeConst(c, 0, Bool); DevCPL486.GenMove(c, x);\r\t\t\tDevCPL486.GenJump(ccAlways, end, TRUE);\r\t\t\tDevCPL486.SetLabel(T); DevCPL486.SetLabel(T1); \r\t\t\tDevCPL486.MakeConst(c, 1, Bool); DevCPL486.GenMove(c, x);\r\t\t\tDevCPL486.SetLabel(end)\r\t\tEND;\r\t\tIF x.mode # Reg THEN Free(x) END\r\tEND LoadCond;\r\t\r\tPROCEDURE IntDOp* (VAR x, y: DevCPL486.Item; subcl: BYTE; rev: BOOLEAN);\r\t\tVAR local: DevCPL486.Label;\r\tBEGIN\r\t\tASSERT((x.mode = Reg) OR (y.mode = Reg) OR (y.mode = Con));\r\t\tCASE subcl OF\r\t\t| eql..geq:\r\t\t\t\tDevCPL486.GenComp(y, x); Free(x);\r\t\t\t\tsetCC(x, subcl, rev, x.typ.form IN {Int8..Int32})\r\t\t| times: \r\t\t\t\tIF x.form = Set THEN DevCPL486.GenAnd(y, x) ELSE DevCPL486.GenMul(y, x, ovflchk) END\r\t\t| slash:\r\t\t\t\tDevCPL486.GenXor(y, x)\r\t\t| plus:\r\t\t\t\tIF x.form = Set THEN DevCPL486.GenOr(y, x) ELSE DevCPL486.GenAdd(y, x, ovflchk) END\r\t\t| minus, msk:\r\t\t\t\tIF (x.form = Set) OR (subcl = msk) THEN (* and not *)\r\t\t\t\t\tIF rev THEN DevCPL486.GenNot(x); DevCPL486.GenAnd(y, x)\t\t\t\t\t\t\t\t(* y and not x *)\r\t\t\t\t\tELSIF y.mode = Con THEN y.offset := -1 - y.offset; DevCPL486.GenAnd(y, x)\t(* x and y' *)\r\t\t\t\t\tELSIF y.mode = Reg THEN DevCPL486.GenNot(y); DevCPL486.GenAnd(y, x)\t\t\t(* x and not y *)\r\t\t\t\t\tELSE DevCPL486.GenNot(x); DevCPL486.GenOr(y, x); DevCPL486.GenNot(x)\t\t\t\t\t(* not (not x or y) *)\r\t\t\t\t\tEND\r\t\t\t\tELSE\t(* minus *)\r\t\t\t\t\tIF rev THEN\t(* y - x *)\r\t\t\t\t\t\tIF (y.mode = Con) & (y.offset = -1) THEN DevCPL486.GenNot(x)\r\t\t\t\t\t\tELSE DevCPL486.GenNeg(x, ovflchk); DevCPL486.GenAdd(y, x, ovflchk)\t(* ??? *)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE\t(* x - y *)\r\t\t\t\t\t\tDevCPL486.GenSub(y, x, ovflchk)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t| min, max:\r\t\t\t\tlocal := DevCPL486.NewLbl;\r\t\t\t\tDevCPL486.GenComp(y, x);\r\t\t\t\tIF subcl = min THEN \r\t\t\t\t\tIF x.typ.form IN {Char8, Char16} THEN DevCPL486.GenJump(ccBE, local, TRUE)\r\t\t\t\t\tELSE DevCPL486.GenJump(ccLE, local, TRUE)\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\t\tIF x.typ.form IN {Char8, Char16} THEN DevCPL486.GenJump(ccAE, local, TRUE)\r\t\t\t\t\tELSE DevCPL486.GenJump(ccGE, local, TRUE)\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tDevCPL486.GenMove(y, x);\r\t\t\t\tDevCPL486.SetLabel(local)\r\t\tEND;\r\t\tFree(y);\r\t\tIF x.mode # Reg THEN Free(x) END\r\tEND IntDOp;\r\t\r\tPROCEDURE LargeInc* (VAR x, y: DevCPL486.Item; dec: BOOLEAN);\t(* INC(x, y) or DEC(x, y) *)\r\tBEGIN\r\t\tASSERT(x.form = Int64);\r\t\tIF ~(y.mode IN {Reg, Con}) THEN LoadLong(y, {}, {}) END;\r\t\tFree(x); Free(y); x.form := Int32; y.form := Int32;\r\t\tIF dec THEN DevCPL486.GenSubC(y, x, TRUE, FALSE) ELSE DevCPL486.GenAddC(y, x, TRUE, FALSE) END;\r\t\tINC(x.offset, 4);\r\t\tIF y.mode = Reg THEN y.reg := y.index ELSE y.offset := y.scale END;\r\t\tIF dec THEN DevCPL486.GenSubC(y, x, FALSE, ovflchk) ELSE DevCPL486.GenAddC(y, x, FALSE, ovflchk) END;\r\tEND LargeInc;\r\t\r\tPROCEDURE FloatDOp* (VAR x, y: DevCPL486.Item; subcl: BYTE; rev: BOOLEAN);\r\t\tVAR local: DevCPL486.Label; a, b: DevCPL486.Item;\r\tBEGIN\r\t\tASSERT(x.mode = Reg);\r\t\tIF y.form = Int64 THEN LoadR(y) END;\r\t\tIF y.mode = Reg THEN rev := ~rev END;\r\t\tCASE subcl OF\r\t\t| eql..geq: DevCPL486.GenFDOp(FCOMP, y)\r\t\t| times: DevCPL486.GenFDOp(FMUL, y)\r\t\t| slash: IF rev THEN DevCPL486.GenFDOp(FDIVR, y) ELSE DevCPL486.GenFDOp(FDIV, y) END\r\t\t| plus: DevCPL486.GenFDOp(FADD, y)\r\t\t| minus: IF rev THEN DevCPL486.GenFDOp(FSUBR, y) ELSE DevCPL486.GenFDOp(FSUB, y) END\r\t\t| min, max:\r\t\t\tIF y.mode = Reg THEN\r\t\t\t\tDevCPL486.GenFMOp(0D1H);\t(* FCOM ST1 *)\r\t\t\t\tCheckAv(AX); DevCPL486.GenFMOp(FSTSW); (* DevCPL486.GenCode(WAIT); *) DevCPL486.GenCode(SAHF);\r\t\t\t\tlocal := DevCPL486.NewLbl;\r\t\t\t\tIF subcl = min THEN DevCPL486.GenJump(ccAE, local, TRUE) ELSE DevCPL486.GenJump(ccBE, local, TRUE) END;\r\t\t\t\tDevCPL486.GenFMOp(5D1H);\t(* FST ST1 *)\r\t\t\t\tDevCPL486.SetLabel(local);\r\t\t\t\tDevCPL486.GenFMOp(5D8H)\t(* FSTP ST0 *)\r\t\t\tELSE\r\t\t\t\tDevCPL486.GenFDOp(FCOM, y);\r\t\t\t\tCheckAv(AX); DevCPL486.GenFMOp(FSTSW); (* DevCPL486.GenCode(WAIT); *) DevCPL486.GenCode(SAHF);\r\t\t\t\tlocal := DevCPL486.NewLbl;\r\t\t\t\tIF subcl = min THEN DevCPL486.GenJump(ccBE, local, TRUE) ELSE DevCPL486.GenJump(ccAE, local, TRUE) END;\r\t\t\t\tDevCPL486.GenFMOp(5D8H);\t(* FSTP ST0 *)\r\t\t\t\tDevCPL486.GenFLoad(y);\r\t\t\t\tDevCPL486.SetLabel(local)\r\t\t\tEND\r\t\t(* largeint support *)\r\t\t| div:\r\t\t\tIF y.mode # Reg THEN LoadR(y); rev := ~rev END;\r\t\t\tIF rev THEN DevCPL486.GenFDOp(FDIVR, y) ELSE DevCPL486.GenFDOp(FDIV, y) END;\r\t\t\tFloor(y, FALSE)\r\t\t| mod:\r\t\t\tIF y.mode # Reg THEN LoadR(y); rev := ~rev END;\r\t\t\tIF rev THEN DevCPL486.GenFMOp(1C9H); (* FXCH ST1 *) END;\r\t\t\tDevCPL486.GenFMOp(1F8H);\t(* FPREM *)\r\t\t\tDevCPL486.GenFMOp(1E4H);\t(* FTST *)\r\t\t\tCheckAv(AX);\r\t\t\tDevCPL486.GenFMOp(FSTSW);\r\t\t\tDevCPL486.MakeReg(a, AX, Int32); GetReg(b, Int32, {}, {AX});\r\t\t\tDevCPL486.GenMove(a, b);\r\t\t\tDevCPL486.GenFMOp(0D1H);\t(* FCOM *)\r\t\t\tDevCPL486.GenFMOp(FSTSW);\r\t\t\tDevCPL486.GenXor(b, a); Free(b);\r\t\t\t(* DevCPL486.GenCode(WAIT); *) DevCPL486.GenCode(SAHF);\r\t\t\tlocal := DevCPL486.NewLbl; DevCPL486.GenJump(ccBE, local, TRUE);\r\t\t\tDevCPL486.GenFMOp(0C1H);\t(* FADD ST1 *)\r\t\t\tDevCPL486.SetLabel(local);\r\t\t\tDevCPL486.GenFMOp(5D9H);\t(* FSTP ST1 *)\r\t\t| ash:\r\t\t\tIF y.mode # Reg THEN LoadR(y); rev := ~rev END;\r\t\t\tIF rev THEN DevCPL486.GenFMOp(1C9H); (* FXCH ST1 *) END;\r\t\t\tDevCPL486.GenFMOp(1FDH);\t(* FSCALE *)\r\t\t\tFloor(y, TRUE)\r\t\tEND;\r\t\tIF y.mode = Stk THEN IncStack(y.form) END;\r\t\tFree(y);\r\t\tIF (subcl >= eql) & (subcl <= geq) THEN\r\t\t\tFree(x); CheckAv(AX);\r\t\t\tDevCPL486.GenFMOp(FSTSW);\r\t\t\t(* DevCPL486.GenCode(WAIT); *) DevCPL486.GenCode(SAHF);\r\t\t\tsetCC(x, subcl, rev, FALSE)\r\t\tEND\r\tEND FloatDOp;\r\t\r\tPROCEDURE IntMOp* (VAR x: DevCPL486.Item; subcl: BYTE);\r\t\tVAR L: DevCPL486.Label; c: DevCPL486.Item;\r\tBEGIN\r\t\tCASE subcl OF\r\t\t| minus:\r\t\t\t\tIF x.form = Set THEN DevCPL486.GenNot(x) ELSE DevCPL486.GenNeg(x, ovflchk) END\r\t\t| abs:\r\t\t\t\tL := DevCPL486.NewLbl; DevCPL486.MakeConst(c, 0, x.form);\r\t\t\t\tDevCPL486.GenComp(c, x);\r\t\t\t\tDevCPL486.GenJump(ccNS, L, TRUE);\r\t\t\t\tDevCPL486.GenNeg(x, ovflchk);\r\t\t\t\tDevCPL486.SetLabel(L)\r\t\t| cap:\r\t\t\t\tDevCPL486.MakeConst(c, -1 - 20H, x.form);\r\t\t\t\tDevCPL486.GenAnd(c, x)\r\t\t| not:\r\t\t\t\tDevCPL486.MakeConst(c, 1, x.form);\r\t\t\t\tDevCPL486.GenXor(c, x)\r\t\tEND;\r\t\tIF x.mode # Reg THEN Free(x) END\r\tEND IntMOp;\r\t\r\tPROCEDURE FloatMOp* (VAR x: DevCPL486.Item; subcl: BYTE);\r\tBEGIN\r\t\tASSERT(x.mode = Reg);\r\t\tIF subcl = minus THEN DevCPL486.GenFMOp(FCHS)\r\t\tELSE ASSERT(subcl = abs); DevCPL486.GenFMOp(FABS)\r\t\tEND\r\tEND FloatMOp;\r\r\tPROCEDURE MakeSet* (VAR x: DevCPL486.Item; range, neg: BOOLEAN; hint, stop: SET);\r\t\t(* range neg\tresult\r\t\t\t\tF\tF\t\t{x}\r\t\t\t\tF\tT\t\t-{x}\r\t\t\t\tT\tF\t\t{x..31}\r\t\t\t\tT\tT\t\t-{0..x}\t*)\r\t\tVAR c, r: DevCPL486.Item; val: INTEGER;\r\tBEGIN\r\t\tIF x.mode = Con THEN\r\t\t\tIF range THEN\r\t\t\t\tIF neg THEN val := -2 ELSE val := -1 END;\r\t\t\t\tx.offset := SYSTEM.LSH(val, x.offset)\r\t\t\tELSE\r\t\t\t\tval := 1; x.offset := SYSTEM.LSH(val, x.offset);\r\t\t\t\tIF neg THEN x.offset := -1 - x.offset END\r\t\t\tEND\r\t\tELSE\r\t\t\tCheck(x, 0, 31);\r\t\t\tIF neg THEN val := -2\r\t\t\tELSIF range THEN val := -1\r\t\t\tELSE val := 1\r\t\t\tEND;\r\t\t\tDevCPL486.MakeConst(c, val, Set); GetReg(r, Set, hint, stop); DevCPL486.GenMove(c, r);\r\t\t\tIF range THEN DevCPL486.GenShiftOp(SHL, x, r) ELSE DevCPL486.GenShiftOp(ROL, x, r) END;\r\t\t\tFree(x); x.reg := r.reg\r\t\tEND;\r\t\tx.typ := DevCPT.settyp; x.form := Set\r\tEND MakeSet;\r\t\r\tPROCEDURE MakeCond* (VAR x: DevCPL486.Item);\r\t\tVAR c: DevCPL486.Item;\r\tBEGIN\r\t\tIF x.mode = Con THEN\r\t\t\tsetCC(x, SHORT(SHORT(x.offset)), FALSE, FALSE)\r\t\tELSE\r\t\t\tDevCPL486.MakeConst(c, 0, x.form);\r\t\t\tDevCPL486.GenComp(c, x); Free(x);\r\t\t\tsetCC(x, neq, FALSE, FALSE)\r\t\tEND\r\tEND MakeCond;\r\t\r\tPROCEDURE Not* (VAR x: DevCPL486.Item);\r\t\tVAR a: INTEGER;\r\tBEGIN\r\t\tx.offset := Inverted(x.offset); (* invert cc *)\r\tEND Not;\r\t\r\tPROCEDURE Odd* (VAR x: DevCPL486.Item);\r\t\tVAR c: DevCPL486.Item;\r\tBEGIN\r\t\tIF x.mode = Stk THEN Pop(x, x.form, {}, {}) END;\r\t\tFree(x); DevCPL486.MakeConst(c, 1, x.form);\r\t\tIF x.mode = Reg THEN\r\t\t\tIF x.form IN {Int16, Int64} THEN x.form := Int32; c.form := Int32 END;\r\t\t\tDevCPL486.GenAnd(c, x)\r\t\tELSE\r\t\t\tc.form := Int8; x.form := Int8; DevCPL486.GenTest(c, x)\r\t\tEND;\r\t\tsetCC(x, neq, FALSE, FALSE)\r\tEND Odd;\r\t\r\tPROCEDURE In* (VAR x, y: DevCPL486.Item);\r\tBEGIN\r\t\tIF y.form = Set THEN Check(x, 0, 31) END;\r\t\tDevCPL486.GenBitOp(BT, x, y); Free(x); Free(y);\r\t\tsetCC(x, lss, FALSE, FALSE); (* carry set *)\r\tEND In;\r\t\r\tPROCEDURE Shift* (VAR x, y: DevCPL486.Item; subcl: BYTE);\t(* ASH, LSH, ROT *)\r\t\tVAR L1, L2: DevCPL486.Label; c: DevCPL486.Item; opl, opr: INTEGER;\r\tBEGIN\r\t\tIF subcl = ash THEN opl := SHL; opr := SAR\r\t\tELSIF subcl = lsh THEN opl := SHL; opr := SHR\r\t\tELSE opl := ROL; opr := ROR\r\t\tEND;\r\t\tIF y.mode = Con THEN\r\t\t\tIF y.offset > 0 THEN\r\t\t\t\tDevCPL486.GenShiftOp(opl, y, x)\r\t\t\tELSIF y.offset < 0 THEN\r\t\t\t\ty.offset := -y.offset;\r\t\t\t\tDevCPL486.GenShiftOp(opr, y, x)\r\t\t\tEND\r\t\tELSE\r\t\t\tASSERT(y.mode = Reg);\r\t\t\tCheck(y, -31, 31);\r\t\t\tL1 := DevCPL486.NewLbl; L2 := DevCPL486.NewLbl; \r\t\t\tDevCPL486.MakeConst(c, 0, y.form); DevCPL486.GenComp(c, y);\r\t\t\tDevCPL486.GenJump(ccNS, L1, TRUE);\r\t\t\tDevCPL486.GenNeg(y, FALSE);\r\t\t\tDevCPL486.GenShiftOp(opr, y, x);\r\t\t\tDevCPL486.GenJump(ccAlways, L2, TRUE);\r\t\t\tDevCPL486.SetLabel(L1);\r\t\t\tDevCPL486.GenShiftOp(opl, y, x);\r\t\t\tDevCPL486.SetLabel(L2);\r\t\t\tFree(y)\r\t\tEND;\r\t\tIF x.mode # Reg THEN Free(x) END\r\tEND Shift;\r\r\tPROCEDURE DivMod* (VAR x, y: DevCPL486.Item; mod: BOOLEAN);\r\t\tVAR s: SET; r: DevCPL486.Item; pos: BOOLEAN;\r\tBEGIN\r\t\tASSERT((x.mode = Reg) & (x.reg = AX)); pos := FALSE;\r\t\tIF y.mode = Con THEN pos := (y.offset > 0) & (y.obj = NIL); Load(y, {}, {AX, DX, con}) END;\r\t\tDevCPL486.GenDiv(y, mod, pos); Free(y);\r\t\tIF mod THEN\r\t\t\tr := x; GetReg(x, x.form, {}, wreg - {AX, DX}); Free(r) (* ax -> dx; al -> ah *)\t(* ??? *)\r\t\tEND\r\tEND DivMod;\r\r\tPROCEDURE Mem* (VAR x: DevCPL486.Item; offset: INTEGER; typ: DevCPT.Struct);\t(* x := Mem[x+offset] *)\r\tBEGIN\r\t\tIF x.mode = Con THEN x.mode := Abs; x.obj := NIL; INC(x.offset, offset)\r\t\tELSE ASSERT(x.mode = Reg); x.mode := Ind; x.offset := offset\r\t\tEND;\r\t\tx.scale := 0; x.typ := typ; x.form := typ.form\r\tEND Mem;\r\t\r\tPROCEDURE SysMove* (VAR len: DevCPL486.Item);\t(* implementation of SYSTEM.MOVE *)\r\tBEGIN\r\t\tIF len.mode = Con THEN\r\t\t\tIF len.offset > 0 THEN DevCPL486.GenBlockMove(1, len.offset) END\r\t\tELSE\r\t\t\tLoad(len, {}, wreg - {CX} + {short, mem, stk}); DevCPL486.GenBlockMove(1, 0); Free(len)\r\t\tEND;\r\t\tFreeWReg(SI); FreeWReg(DI)\r\tEND SysMove;\r\t\r\tPROCEDURE Len* (VAR x, y: DevCPL486.Item);\r\t\tVAR typ: DevCPT.Struct; dim: INTEGER;\r\tBEGIN\r\t\tdim := y.offset; typ := x.typ;\r\t\tIF typ.untagged THEN DevCPM.err(136) END;\r\t\tWHILE dim > 0 DO typ := typ.BaseTyp; DEC(dim) END;\r\t\tLenDesc(x, x, typ);\r\tEND Len;\r\t\r\tPROCEDURE StringWSize (VAR x: DevCPL486.Item): INTEGER;\r\tBEGIN\r\t\tCASE x.form OF\r\t\t| String8, VString8: RETURN 1\r\t\t| String16, VString16: RETURN 2\r\t\t| VString16to8: RETURN 0\r\t\t| Comp: RETURN x.typ.BaseTyp.size\r\t\tEND\r\tEND StringWSize;\r\r\tPROCEDURE CmpString* (VAR x, y: DevCPL486.Item; rel: BYTE; rev: BOOLEAN);\r\t\tVAR sw, dw: INTEGER;\r\tBEGIN\r\t\tCheckAv(CX);\r\t\tIF (x.typ = DevCPT.guidtyp) OR (y.typ = DevCPT.guidtyp) THEN\r\t\t\tDevCPL486.GenBlockComp(4, 4)\r\t\tELSIF x.form = String8 THEN DevCPL486.GenBlockComp(1, x.index)\r\t\tELSIF y.form = String8 THEN DevCPL486.GenBlockComp(1, y.index)\r\t\tELSIF x.form = String16 THEN DevCPL486.GenBlockComp(2, x.index)\r\t\tELSIF y.form = String16 THEN DevCPL486.GenBlockComp(2, y.index)\r\t\tELSE DevCPL486.GenStringComp(StringWSize(y), StringWSize(x))\r\t\tEND;\r\t\tFreeWReg(SI); FreeWReg(DI); setCC(x, rel, ~rev, FALSE);\r\tEND CmpString;\r\r\tPROCEDURE VarParDynArr (ftyp: DevCPT.Struct; VAR y: DevCPL486.Item);\r\t\tVAR len, z: DevCPL486.Item; atyp: DevCPT.Struct;\r\tBEGIN\r\t\tatyp := y.typ;\r\t\tWHILE ftyp.comp = DynArr DO\r\t\t\tIF ftyp.BaseTyp = DevCPT.bytetyp THEN\r\t\t\t\tIF atyp.comp = DynArr THEN\r\t\t\t\t\tIF atyp.untagged THEN DevCPM.err(137) END;\r\t\t\t\t\tLenDesc(y, len, atyp);\r\t\t\t\t\tIF y.tmode = VarPar THEN Free(len) END;\t(* ??? *)\r\t\t\t\t\tGetReg(z, Int32, {}, {}); DevCPL486.GenMove(len, z);\r\t\t\t\t\tlen.mode := Reg; len.reg := z.reg; atyp := atyp.BaseTyp;\r\t\t\t\t\tWHILE atyp.comp = DynArr DO\r\t\t\t\t\t\tLenDesc(y, z, atyp); DevCPL486.GenMul(z, len, FALSE);\r\t\t\t\t\t\tIF y.tmode = VarPar THEN Free(z) END;\t(* ??? *)\r\t\t\t\t\t\tatyp := atyp.BaseTyp\r\t\t\t\t\tEND;\r\t\t\t\t\tDevCPL486.MakeConst(z, atyp.size, Int32); DevCPL486.GenMul(z, len, FALSE);\r\t\t\t\t\tFree(len)\r\t\t\t\tELSE\r\t\t\t\t\tDevCPL486.MakeConst(len, atyp.size, Int32)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tIF atyp.comp = DynArr THEN LenDesc(y, len, atyp);\r\t\t\t\t\tIF atyp.untagged THEN DevCPM.err(137) END;\r\t\t\t\t\tIF y.tmode = VarPar THEN Free(len) END;\t(* ??? *)\r\t\t\t\tELSE DevCPL486.MakeConst(len, atyp.n, Int32)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tDevCPL486.GenPush(len);\r\t\t\tftyp := ftyp.BaseTyp; atyp := atyp.BaseTyp\r\t\tEND\r\tEND VarParDynArr;\r\r\tPROCEDURE Assign* (VAR x, y: DevCPL486.Item); (* x := y *)\r\tBEGIN\r\t\tIF y.mode = Con THEN\r\t\t\tIF y.form IN {Real32, Real64} THEN\r\t\t\t\tDevCPL486.GenFLoad(y); GetReg(y, Real32, {}, {});\r\t\t\t\tIF x.mode # Reg THEN Free(y); DevCPL486.GenFStore(x, TRUE) END\t(* ??? move const *)\r\t\t\tELSIF x.form = Int64 THEN\r\t\t\t\tASSERT(x.mode IN {Ind, Abs});\r\t\t\t\ty.form := Int32; x.form := Int32; DevCPL486.GenMove(y, x);\r\t\t\t\ty.offset := y.scale; INC(x.offset, 4); DevCPL486.GenMove(y, x);\r\t\t\t\tDEC(x.offset, 4); x.form := Int64\r\t\t\tELSE\r\t\t\t\tDevCPL486.GenMove(y, x)\r\t\t\tEND\r\t\tELSE\r\t\t\tIF y.form IN {Comp, String8, String16, VString8, VString16} THEN\t(* convert to pointer *)\r\t\t\t\tASSERT(x.form = Pointer);\r\t\t\t\tGetAdr(y, {}, {}); y.typ := x.typ; y.form := Pointer\r\t\t\tEND;\r\t\t\tIF ~(x.form IN realSet) OR ~(y.form IN intSet) THEN Assert(y, {}, {stk}) END;\r\t\t\tConvMove(x, y, FALSE, {}, {})\r\t\tEND;\r\t\tFree(x)\r\tEND Assign;\r\t\r\tPROCEDURE ArrayLen* (VAR x, len: DevCPL486.Item; hint, stop: SET);\r\t\tVAR c: DevCPL486.Item;\r\tBEGIN\r\t\tIF x.typ.comp = Array THEN DevCPL486.MakeConst(c, x.typ.n, Int32); GetReg(len, Int32, hint, stop); DevCPL486.GenMove(c, len)\r\t\tELSIF ~x.typ.untagged THEN LenDesc(x, c, x.typ); GetReg(len, Int32, hint, stop); DevCPL486.GenMove(c, len)\r\t\tELSE len.mode := Con\r\t\tEND;\r\t\tlen.typ := DevCPT.int32typ\r\tEND ArrayLen;\r\r(*\r"
