                  - text: "\t\t\tDevCPL486.GenPush(ap)"
                    attr: 3
                  - text: "\r\t\tELSIF par.typ.comp = DynArr THEN\r\t\t\tIF ap.form IN {String8, String16} THEN\r\t\t\t\tIF ~par.typ.untagged THEN\r\t\t\t\t\tDevCPL486.MakeConst(c, ap.index (* * ap.typ.BaseTyp.size *), Int32); DevCPL486.GenPush(c)\r\t\t\t\tEND;\r\t\t\t\tap.mode := Con; DevCPL486.GenPush(ap);\r\t\t\tELSIF ap.form IN {VString8, VString16} THEN\r\t\t\t\tDevCPL486.MakeReg(a, DX, Pointer); DevCPL486.GenLoadAdr(ap, a);\r\t\t\t\tIF ~par.typ.untagged THEN\r\t\t\t\t\tDevCPL486.MakeReg(c, DI, Pointer); DevCPL486.GenMove(a, c);\r\t\t\t\t\tFree(ap); StrLen(c, ap.typ, TRUE);\r\t\t\t\t\tDevCPL486.GenPush(c); Free(c)\r\t\t\t\tEND;\r\t\t\t\tDevCPL486.GenPush(a)\r\t\t\tELSE\r\t\t\t\tIF ~par.typ.untagged THEN\r\t\t\t\t\tIF ap.typ.comp = DynArr THEN niltest := FALSE END;\t"
                    attr: 0
                  - text: "(* ap dereferenced for length descriptor *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tVarParDynArr(par.typ, ap)\r\t\t\t\tEND;\r\t\t\t\tPushAdr(ap, niltest)\r\t\t\tEND\r\t\tELSIF fp.mode = VarPar THEN\r\t\t\trecTyp := ap.typ;\r\t\t\tIF recTyp.form = Pointer THEN recTyp := recTyp.BaseTyp END;\r\t\t\tIF (par.typ.comp = Record) & (~fp.typ.untagged) THEN\r\t\t\t\tTag(ap, tag);\r\t\t\t\tIF rec & (tag.mode # Con) THEN\r\t\t\t\t\tGetReg(c, Pointer, {}, {}); DevCPL486.GenMove(tag, c); tag := c\r\t\t\t\tEND;\r\t\t\t\tDevCPL486.GenPush(tag);\r\t\t\t\tIF tag.mode # Con THEN niltest := FALSE END;\r\t\t\t\tPushAdr(ap, niltest);\r\t\t\t\tIF rec THEN Free(tag) END\r\t\t\tELSE PushAdr(ap, niltest)\r\t\t\tEND;\r\t\t\ttag.typ := recTyp\r\t\tELSIF par.form = Comp THEN\r\t\t\ts := par.typ.size;\r\t\t\tIF initializeStr & (ap.form IN {String8, String16, VString8, VString16, VString16to8}) THEN\r\t\t\t\ts := (s + 3) DIV 4 * 4; AdjustStack(-s);\r\t\t\t\tIF ap.form IN {String8, String16} THEN\r\t\t\t\t\tIF ap.index > 1 THEN\t(* nonempty string *)\r\t\t\t\t\t\tss := (ap.index * ap.typ.BaseTyp.size + 3) DIV 4 * 4;\r\t\t\t\t\t\tDevCPL486.MakeReg(c, SI, Pointer); DevCPL486.GenLoadAdr(ap, c); Free(ap);\r\t\t\t\t\t\tDevCPL486.MakeReg(c, DI, Pointer); DevCPL486.GenLoadAdr(par, c);\r\t\t\t\t\t\tDevCPL486.GenBlockMove(1, ss);\r\t\t\t\t\tELSE\r\t\t\t\t\t\tss := 0;\r\t\t\t\t\t\tDevCPL486.MakeReg(c, DI, Pointer); DevCPL486.GenLoadAdr(par, c)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF s > ss THEN\r\t\t\t\t\t\tDevCPL486.MakeReg(a, AX, Int32); DevCPL486.MakeConst(c, 0, Int32); DevCPL486.GenMove(c, a);\r\t\t\t\t\t\tDevCPL486.GenBlockStore(1, s - ss)\r\t\t\t\t\tEND;\r\t\t\t\tELSE\r\t\t\t\t\tDevCPL486.MakeReg(c, SI, Pointer); DevCPL486.GenLoadAdr(ap, c); Free(ap);\r\t\t\t\t\tDevCPL486.MakeReg(c, DI, Pointer); DevCPL486.GenLoadAdr(par, c);\r\t\t\t\t\tDevCPL486.GenStringMove("
                    attr: 0
                  - text: "TRUE"
                    attr: 3
                  - text: ", StringWSize(ap), StringWSize(par), par.typ.n);\r\t\t\t\t\tDevCPL486.MakeReg(a, AX, Int32); DevCPL486.MakeConst(c, 0, Int32); DevCPL486.GenMove(c, a);\r\t\t\t\t\tDevCPL486.GenBlockStore(StringWSize(par), 0)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tIF (ap.form IN {String8, String16}) & (ap.index = 1) THEN\t(* empty string *)\r\t\t\t\t\tAdjustStack((4 - s) DIV 4 * 4);\r\t\t\t\t\tDevCPL486.MakeConst(c, 0, Int32); DevCPL486.GenPush(c)\r\t\t\t\tELSE\r\t\t\t\t\tAdjustStack((-s) DIV 4 * 4);\r\t\t\t\t\tDevCPL486.MakeReg(c, SI, Pointer); DevCPL486.GenLoadAdr(ap, c); Free(ap);\r\t\t\t\t\tDevCPL486.MakeReg(c, DI, Pointer); DevCPL486.GenLoadAdr(par, c);\r\t\t\t\t\tIF ap.form IN {String8, String16} THEN\r\t\t\t\t\t\tDevCPL486.GenBlockMove(1, (ap.index * ap.typ.BaseTyp.size + 3) DIV 4 * 4)\r\t\t\t\t\tELSIF ap.form IN {VString8, VString16, VString16to8} THEN\r\t\t\t\t\t\tDevCPL486.GenStringMove(FALSE, StringWSize(ap), StringWSize(par), par.typ.n)\r\t\t\t\t\tELSE\r\t\t\t\t\t\tDevCPL486.GenBlockMove(1, (s + 3) DIV 4 * 4)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSIF ap.mode = Con THEN\r\t\t\tIF ap.form IN {Real32, Real64} THEN\t(* ??? push const *)\r\t\t\t\tDevCPL486.GenFLoad(ap); DecStack(par.typ.form); DevCPL486.GenFStore(par, TRUE)\r\t\t\tELSE\r\t\t\t\tap.form := Int32;\r\t\t\t\tIF par.form = Int64 THEN DevCPL486.MakeConst(c, ap.scale, Int32); DevCPL486.GenPush(c) END;\r\t\t\t\tDevCPL486.GenPush(ap)\r\t\t\tEND\r\t\tELSIF ap.typ.form = Pointer THEN\r\t\t\trecTyp := ap.typ.BaseTyp;\r\t\t\tIF rec THEN\r\t\t\t\tLoad(ap, {}, {}); Tag(ap, tag);\r\t\t\t\tIF tag.mode = Con THEN\t"
                    attr: 0
                  - text: "(* explicit nil test needed *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tDevCPL486.MakeReg(a, AX, Int32);\r\t\t\t\t\tc.mode := Ind; c.form := Int32; c.offset := 0; c.scale := 0; c.reg := ap.reg;\r\t\t\t\t\tDevCPL486.GenTest(a, c)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tDevCPL486.GenPush(ap); Free(ap);\r\t\t\ttag.typ := recTyp\r\t\tELSIF ap.form IN {Comp, String8, String16, VString8, VString16} THEN\t(* convert to pointer *)\r\t\t\tASSERT(par.form = Pointer);\r\t\t\tPushAdr(ap, FALSE)\r\t\tELSE\r\t\t\tConvMove(par, ap, FALSE, {}, {high});\r\t\tEND\r\tEND Param;\r\t\r\tPROCEDURE Result* (proc: DevCPT.Object; VAR res: DevCPL486.Item);\r\t\tVAR r: DevCPL486.Item;\r\tBEGIN\r\t\tDevCPL486.MakeReg(r, AX, proc.typ.form);\t(* don't allocate AX ! *)\r\t\tIF res.mode = Con THEN\r\t\t\tIF r.form IN {Real32, Real64} THEN DevCPL486.GenFLoad(res);\r\t\t\tELSIF r.form = Int64 THEN\r\t\t\t\tr.form := Int32; res.form := Int32; DevCPL486.GenMove(res, r);\r\t\t\t\tr.reg := DX; res.offset := res.scale; DevCPL486.GenMove(res, r)\r\t\t\tELSE DevCPL486.GenMove(res, r);\r\t\t\tEND\r\t\tELSIF res.form IN {Comp, String8, String16, VString8, VString16} THEN\t(* convert to pointer *)\r\t\t\tASSERT(r.form = Pointer);\r\t\t\tGetAdr(res, {}, wreg - {AX})\r\t\tELSE\r\t\t\tr.index := DX;\t(* for int64 *)\r\t\t\tConvMove(r, res, FALSE, wreg - {AX} + {high}, {});\r\t\tEND;\r\t\tFree(res)\r\tEND Result;\r\t\r\tPROCEDURE InitFpu;\r\t\tVAR x: DevCPL486.Item;\r\tBEGIN\r\t\tDevCPL486.MakeConst(x, FpuControlRegister, Int32); DevCPL486.GenPush(x);\r\t\tDevCPL486.GenFMOp(12CH); DevCPL486.GenCode(24H);\t(* FLDCW 0(SP) *)\r\t\tDevCPL486.MakeReg(x, CX, Int32); DevCPL486.GenPop(x);\t(* reset stack *)\r\tEND InitFpu;\r\t\r\tPROCEDURE PrepCall* (proc: DevCPT.Object);\r\t\tVAR lev: BYTE; r: DevCPL486.Item;\r\tBEGIN\r\t\tlev := proc.mnolev;\r\t\tIF (slNeeded IN proc.conval.setval) & (imLevel[lev] > 0) & (imLevel[DevCPL486.level] > imLevel[lev]) THEN\r\t\t\tDevCPL486.MakeReg(r, BX, Pointer); DevCPL486.GenPush(r)\r\t\tEND\r\tEND PrepCall;\r\t\r\tPROCEDURE Call* (VAR x, tag: DevCPL486.Item);\t(* TProc: tag.typ = actual receiver type *)\r\t\tVAR i, n: INTEGER; r, y: DevCPL486.Item; typ: DevCPT.Struct; lev: BYTE; saved: BOOLEAN; p: DevCPT.Object;\r\tBEGIN\r\t\tIF x.mode IN {LProc, XProc, IProc} THEN\r\t\t\tlev := x.obj.mnolev; saved := FALSE;\r\t\t\tIF (slNeeded IN x.obj.conval.setval) & (imLevel[lev] > 0) THEN\t(* pass static link *)\r\t\t\t\tn := imLevel[DevCPL486.level] - imLevel[lev];\r\t\t\t\tIF n > 0 THEN\r\t\t\t\t\tsaved := TRUE;\r\t\t\t\t\ty.mode := Ind; y.scale := 0; y.form := Pointer; y.reg := BX; y.offset := -4;\r\t\t\t\t\tDevCPL486.MakeReg(r, BX, Pointer);\r\t\t\t\t\tWHILE n > 0 DO DevCPL486.GenMove(y, r); DEC(n) END\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tDevCPL486.GenCall(x);\r\t\t\tIF x.obj.sysflag = ccall THEN\t(* remove parameters *)\r\t\t\t\tp := x.obj.link; n := 0;\r\t\t\t\tWHILE p # NIL DO\r\t\t\t\t\tIF p.mode = VarPar THEN INC(n, 4)\r\t\t\t\t\tELSE INC(n, (p.typ.size + 3) DIV 4 * 4)\r\t\t\t\t\tEND;\r\t\t\t\t\tp := p.link\r\t\t\t\tEND;\r\t\t\t\tAdjustStack(n)\r\t\t\tEND;\r\t\t\tIF saved THEN DevCPL486.GenPop(r) END;\r\t\tELSIF x.mode = TProc THEN\r\t\t\tIF x.scale = 1 THEN (* super *)\r\t\t\t\tDevCPL486.MakeConst(tag, 0, Pointer); tag.obj := DevCPE.TypeObj("
                    attr: 0
                  - text: tag.typ.BaseTyp
                    attr: 3
                  - text: ")\r\t\t\tELSIF x.scale = 2 THEN (* static call *)\r\t\t\t\tDevCPL486.MakeConst(tag, 0, Pointer); typ := x.obj.link.typ;\r\t\t\t\tIF typ.form = Pointer THEN typ := typ.BaseTyp END;\r\t\t\t\ttag.obj := DevCPE.TypeObj(typ)\r\t\t\tELSIF x.scale = 3 THEN (* interface method call *)\r\t\t\t\tDevCPM.err(200)\r\t\t\tEND;\r\t\t\tIF tag.mode = Con THEN\r\t\t\t\ty.mode := Abs; y.offset := tag.offset; y.obj := tag.obj; y.scale := 0\r\t\t\tELSIF (x.obj.conval.setval * {absAttr, empAttr, extAttr} = {}) "
