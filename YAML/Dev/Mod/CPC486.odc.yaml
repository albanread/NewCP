                    attr: 3
                  - text: "\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF x.obj.conval.ext # NIL THEN i := 0; n := LEN(x.obj.conval.ext^);\r\t\t\t\tWHILE i < n DO DevCPL486.GenCode(ORD(x.obj.conval.ext^[i])); INC(i) END\r\t\t\tEND\r\t\tELSE\t(* proc var *)\r\t\t\tDevCPL486.GenCall(x); Free(x);\r\t\t\tIF x.typ.sysflag = ccall THEN\t"
