                  - text: "\r\t\t\t\tp := x.typ.link; n := 0;\r\t\t\t\tWHILE p # NIL DO\r\t\t\t\t\tIF p.mode = VarPar THEN INC(n, 4)\r\t\t\t\t\tELSE INC(n, (p.typ.size + 3) DIV 4 * 4)\r\t\t\t\t\tEND;\r\t\t\t\t\tp := p.link\r\t\t\t\tEND;\r\t\t\t\tAdjustStack(n)\r\t\t\tEND;\r\t\t\tx.typ := x.typ.BaseTyp\r\t\tEND;\r\t\tIF procedureUsesFpu & (x.mode = XProc) & (x.obj.mnolev < 0) & (x.obj.mnolev > -128)\r\t\t\t\t& ((x.obj.library # NIL) OR (DevCPT.GlbMod[-x.obj.mnolev].library # NIL)) THEN\t"
                    attr: 0
                  - text: "(* restore fpu *)"
                    attr: 1
                  - text: "\r\t\t\tInitFpu\r\t\tEND;\r\t\tCheckReg;\r\t\tIF x.typ.form = Int64 THEN\r\t\t\tGetReg(x, Int32, {}, wreg - {AX}); GetReg(y, Int32, {}, wreg - {DX});\r\t\t\tx.index := y.reg; x.form := Int64\r\t\tELSIF x.typ.form # NoTyp THEN GetReg(x, x.typ.form, {}, wreg - {AX} + {high})\r\t\tEND\r\tEND Call;\r\t\r\tPROCEDURE CopyDynArray* (adr: INTEGER; typ: DevCPT.Struct);\t(* needs CX, SI, DI *)\r\t\tVAR len, ptr, c, sp, src, dst: DevCPL486.Item; bt: DevCPT.Struct;\r\tBEGIN\r\t\tIF typ.untagged THEN DevCPM.err(-137) END;\r\t\tptr.mode := Ind; ptr.reg := BP; ptr.offset := adr+4; ptr.scale := 0; ptr.form := Pointer;\r\t\tDevCPL486.MakeReg(len, CX, Int32); DevCPL486.MakeReg(sp, SP, Int32);\r\t\tDevCPL486.MakeReg(src, SI, Int32); DevCPL486.MakeReg(dst, DI, Int32);\r\t\tDevCPL486.GenMove(ptr, len); bt := typ.BaseTyp;\r\t\tWHILE bt.comp = DynArr DO\r\t\t\tINC(ptr.offset, 4); DevCPL486.GenMul(ptr, len, FALSE); bt := bt.BaseTyp\r\t\tEND;\r\t\tptr.offset := adr; DevCPL486.GenMove(ptr, src);\r\t\tDevCPL486.MakeConst(c, bt.size, Int32); DevCPL486.GenMul(c, len, FALSE);\r\t\t(* CX = length in bytes *)\r\t\tStackAlloc; \r\t\t(* CX = length in 32bit words *)\r\t\tDevCPL486.GenMove(sp, dst); DevCPL486.GenMove(dst, ptr);\r\t\tDevCPL486.GenBlockMove(4, 0)  (* 32bit moves *)\r\tEND CopyDynArray;\r\t\r\tPROCEDURE Sort (VAR tab: ARRAY OF INTEGER; VAR n: INTEGER);\r\t\tVAR i, j, x: INTEGER;\r\tBEGIN\r\t\t(* align *)\r\t\ti := 1;\r\t\tWHILE i < n DO\r\t\t\tx := tab[i]; j := i-1;\r\t\t\tWHILE (j >= 0) & (tab[j] < x) DO tab[j+1] := tab[j]; DEC(j) END;\r\t\t\ttab[j+1] := x; INC(i)\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: "(* eliminate equals *)"
                    attr: 1
                  - text: "\r\t\ti := 1; j := 1;\r\t\tWHILE i < n DO\r\t\t\tIF tab[i] # tab[i-1] THEN tab[j] := tab[i]; INC(j) END;\r\t\t\tINC(i)\r\t\tEND;\r\t\tn := j\r\tEND Sort;\r\t\r\tPROCEDURE FindPtrs (typ: DevCPT.Struct; adr: INTEGER; VAR num: INTEGER);\r\t\tVAR fld: DevCPT.Object; btyp: DevCPT.Struct; i, n: INTEGER;\r\tBEGIN\r\t\tIF typ.form IN {Pointer, ProcTyp} THEN\r\t\t\tIF num < MaxPtrs THEN ptrTab[num] := adr DIV 4 * 4 END;\r\t\t\tINC(num);\r\t\t\tIF adr MOD 4 # 0 THEN\r\t\t\t\tIF num < MaxPtrs THEN ptrTab[num] := adr DIV 4 * 4 + 4 END;\r\t\t\t\tINC(num)\r\t\t\tEND\r\t\tELSIF typ.comp = Record THEN\r\t\t\tbtyp := typ.BaseTyp;\r\t\t\tIF btyp # NIL THEN FindPtrs(btyp, adr, num) END ;\r\t\t\tfld := typ.link;\r\t\t\tWHILE (fld # NIL) & (fld.mode = Fld) DO\r\t\t\t\tIF (fld.name^ = DevCPM.HdPtrName) OR\r\t\t\t\t\t(fld.name^ = DevCPM.HdUtPtrName) OR\r\t\t\t\t\t(fld.name^ = DevCPM.HdProcName) THEN\r\t\t\t\t\tFindPtrs(DevCPT.sysptrtyp, fld.adr + adr, num)\r\t\t\t\tELSE FindPtrs(fld.typ, fld.adr + adr, num)\r\t\t\t\tEND;\r\t\t\t\tfld := fld.link\r\t\t\tEND\r\t\tELSIF typ.comp = Array THEN\r\t\t\tbtyp := typ.BaseTyp; n := typ.n;\r\t\t\tWHILE btyp.comp = Array DO n := btyp.n * n; btyp := btyp.BaseTyp END ;\r\t\t\tIF (btyp.form = Pointer) OR (btyp.comp = Record) THEN\r\t\t\t\ti := num; FindPtrs(btyp, adr, num);\r\t\t\t\tIF num # i THEN i := 1;\r\t\t\t\t\tWHILE (i < n) & (num <= MaxPtrs) DO\r\t\t\t\t\t\tINC(adr, btyp.size); FindPtrs(btyp, adr, num); INC(i)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND FindPtrs;\r\r\tPROCEDURE InitOutPar (par: DevCPT.Object; VAR zreg: DevCPL486.Item);\r\t\tVAR x, y, c, len: DevCPL486.Item; lbl: DevCPL486.Label; size, s: INTEGER; bt: DevCPT.Struct;\r\tBEGIN\r\t\tx.mode := Ind; x.reg := BP; x.scale := 0; x.form := Pointer; x.offset := par.adr;\r\t\tDevCPL486.MakeReg(y, DI, Int32);\r\t\tIF par.typ.comp # DynArr THEN\r\t\t\tDevCPL486.GenMove(x, y);\r\t\t\tlbl := DevCPL486.NewLbl;\r\t\t\tIF ODD(par.sysflag DIV nilBit) THEN\r\t\t\t\tDevCPL486.GenComp(zreg, y);\r\t\t\t\tDevCPL486.GenJump(ccE, lbl, TRUE)\r\t\t\tEND;\r\t\t\tsize := par.typ.size;\r\t\t\tIF size <= 16 THEN\r\t\t\t\tx.mode := Ind; x.reg := DI; x.form := Int32; x.offset := 0;\r\t\t\t\tWHILE size > 0 DO\r\t\t\t\t\tIF size = 1 THEN x.form := Int8; s := 1\r\t\t\t\t\tELSIF size = 2 THEN x.form := Int16; s := 2\r\t\t\t\t\tELSE x.form := Int32; s := 4\r\t\t\t\t\tEND;\r\t\t\t\t\tzreg.form := x.form; DevCPL486.GenMove(zreg, x); INC(x.offset, s); DEC(size, s)\r\t\t\t\tEND;\r\t\t\t\tzreg.form := Int32\r\t\t\tELSE\r\t\t\t\tDevCPL486.GenBlockStore(1, size)\r\t\t\tEND;\r\t\t\tDevCPL486.SetLabel(lbl)\r\t\tELSIF initializeDyn & ~par.typ.untagged THEN\t"
                    attr: 0
                  - text: "(* untagged open arrays not initialized !!! *)"
                    attr: 3
                  - text: "\r\t\t\tDevCPL486.GenMove(x, y);\r\t\t\tDevCPL486.MakeReg(len, CX, Int32);\r\t\t\tINC(x.offset, 4); DevCPL486.GenMove(x, len); (* first len *)\r\t\t\tbt := par.typ.BaseTyp;\r\t\t\tWHILE bt.comp = DynArr DO\r\t\t\t\tINC(x.offset, 4); DevCPL486.GenMul(x, len, FALSE); bt := bt.BaseTyp\r\t\t\tEND;\r\t\t\tsize := bt.size;\r\t\t\tIF size MOD 4 = 0 THEN size := size DIV 4; s := 4\r\t\t\tELSIF size MOD 2 = 0 THEN size := size DIV 2; s := 2\r\t\t\tELSE s := 1\r\t\t\tEND;\r\t\t\tDevCPL486.MakeConst(c, size, Int32); DevCPL486.GenMul(c, len, FALSE);\r\t\t\tDevCPL486.GenBlockStore(s, 0)\r\t\tEND\r\tEND InitOutPar;\r\r\tPROCEDURE AllocAndInitAll (proc: DevCPT.Object; adr, size: INTEGER; VAR nofptrs: INTEGER);\r\t\tVAR x, y, z, zero: DevCPL486.Item; par: DevCPT.Object; op: INTEGER;\r\tBEGIN\r\t\top := 0; par := proc.link;\r\t\tWHILE par # NIL DO\t(* count out parameters [with COM pointers] *)\r\t\t\tIF (par.mode = VarPar) & (par.vis = outPar) & (initializeOut OR ContainsIPtrs(par.typ)) THEN INC(op) END;\r\t\t\tpar := par.link\r\t\tEND;\r\t\tDevCPL486.MakeConst(zero, 0, Int32);\r\t\tIF (op = 0) & (size <= 8) THEN\t(* use PUSH 0 *)\r\t\t\tWHILE size > 0 DO DevCPL486.GenPush(zero); DEC(size, 4) END\r\t\tELSE\r\t\t\tDevCPL486.MakeReg(z, AX, Int32); DevCPL486.GenMove(zero, z);\r\t\t\tIF size <= 32 THEN\t(* use PUSH reg *)\r\t\t\t\tWHILE size > 0 DO DevCPL486.GenPush(z); DEC(size, 4) END\r\t\t\tELSE\t(* use string store *)\r\t\t\t\tAdjustStack(-size);\r\t\t\t\tDevCPL486.MakeReg(x, SP, Int32); DevCPL486.MakeReg(y, DI, Int32); DevCPL486.GenMove(x, y);\r\t\t\t\tDevCPL486.GenBlockStore(1, size)\r\t\t\tEND;\r\t\t\tIF op > 0 THEN\r\t\t\t\tpar := proc.link;\r\t\t\t\tWHILE par # NIL DO\t(* init out parameters [with COM pointers] *)\r\t\t\t\t\tIF (par.mode = VarPar) & (par.vis = outPar) & (initializeOut OR ContainsIPtrs(par.typ)) THEN InitOutPar(par, z) END;\r\t\t\t\t\tpar := par.link\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND AllocAndInitAll;\r\t\r\tPROCEDURE AllocAndInitPtrs1 (proc: DevCPT.Object; adr, size: INTEGER; VAR nofptrs: INTEGER);\t(* needs AX *)\r\t\tVAR i, base, a, gaps: INTEGER; x, z: DevCPL486.Item; obj: DevCPT.Object;\r\tBEGIN\r\t\tIF ptrinit & (proc.scope # NIL) THEN\r\t\t\tnofptrs := 0; obj := proc.scope.scope;\t(* local variables *)\r\t\t\tWHILE (obj # NIL) & (nofptrs <= MaxPtrs) DO\r\t\t\t\tFindPtrs(obj.typ, obj.adr, nofptrs);\r\t\t\t\tobj := obj.link\r\t\t\tEND;\r\t\t\tIF (nofptrs > 0) & (nofptrs <= MaxPtrs) THEN\r\t\t\t\tbase := proc.conval.intval2;\r\t\t\t\tSort(ptrTab, nofptrs); i := 0; a := size + base; gaps := 0;\r\t\t\t\tWHILE i < nofptrs DO\r\t\t\t\t\tDEC(a, 4);\r\t\t\t\t\tIF a # ptrTab[i] THEN a := ptrTab[i]; INC(gaps) END;\r\t\t\t\t\tINC(i)\r\t\t\t\tEND;\r\t\t\t\tIF a # base THEN INC(gaps) END;\r\t\t\t\tIF (gaps <= (nofptrs + 1) DIV 2) & (size < stackAllocLimit) THEN\r\t\t\t\t\tDevCPL486.MakeConst(z, 0, Pointer);\r\t\t\t\t\tIF (nofptrs > 4) THEN x := z; DevCPL486.MakeReg(z, AX, Int32); DevCPL486.GenMove(x, z) END;\r\t\t\t\t\ti := 0; a := size + base;\r\t\t\t\t\tWHILE i < nofptrs DO\r\t\t\t\t\t\tDEC(a, 4);\r\t\t\t\t\t\tIF a # ptrTab[i] THEN AdjustStack(ptrTab[i] - a); a := ptrTab[i] END;\r\t\t\t\t\t\tDevCPL486.GenPush(z); INC(i)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF a # base THEN AdjustStack(base - a) END\r\t\t\t\tELSE\r\t\t\t\t\tAdjustStack(-size);\r\t\t\t\t\tDevCPL486.MakeConst(x, 0, Pointer); DevCPL486.MakeReg(z, AX, Int32); DevCPL486.GenMove(x, z);\r\t\t\t\t\tx.mode := Ind; x.reg := BP; x.scale := 0; x.form := Pointer; i := 0; \r\t\t\t\t\tWHILE i < nofptrs DO\r\t\t\t\t\t\tx.offset := ptrTab[i]; DevCPL486.GenMove(z, x); INC(i)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tAdjustStack(-size)\r\t\t\tEND\r\t\tELSE\r\t\t\tnofptrs := 0;\r\t\t\tAdjustStack(-size)\r\t\tEND\r\tEND AllocAndInitPtrs1;\r\r\tPROCEDURE InitPtrs2 (proc: DevCPT.Object; adr, size, nofptrs: INTEGER);\t(* needs AX, CX, DI *)\r\t\tVAR x, y, z, zero: DevCPL486.Item; obj: DevCPT.Object; zeroed: BOOLEAN; i: INTEGER; lbl: DevCPL486.Label;\r\tBEGIN\r\t\tIF ptrinit THEN\r\t\t\tzeroed := FALSE; DevCPL486.MakeConst(zero, 0, Pointer);\r\t\t\tIF nofptrs > MaxPtrs THEN\r\t\t\t\tDevCPL486.MakeReg(z, AX, Int32); DevCPL486.GenMove(zero, z); zeroed := TRUE;\r\t\t\t\tx.mode := Ind; x.reg := BP; x.scale := 0; x.form := Pointer; x.offset := adr;\r\t\t\t\tDevCPL486.MakeReg(y, DI, Int32); DevCPL486.GenLoadAdr(x, y);\r\t\t\t\tDevCPL486.GenStrStore(size)\r\t\t\tEND;\r\t\t\tobj := proc.link;\t(* parameters *)\r\t\t\tWHILE obj # NIL DO\r\t\t\t\tIF (obj.mode = VarPar) & (obj.vis = outPar) THEN\r\t\t\t\t\tnofptrs := 0;\r\t\t\t\t\tIF obj.typ.comp = DynArr THEN\t"
                    attr: 0
                  - text: "(* currently not initialized *)"
                    attr: 3
                  - text: "\r\t\t\t\t\tELSE FindPtrs(obj.typ, 0, nofptrs)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF nofptrs > 0 THEN\r\t\t\t\t\t\tIF ~zeroed THEN\r\t\t\t\t\t\t\tDevCPL486.MakeReg(z, AX, Int32); DevCPL486.GenMove(zero, z); zeroed := TRUE\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tx.mode := Ind; x.reg := BP; x.scale := 0; x.form := Pointer; x.offset := obj.adr;\r\t\t\t\t\t\tDevCPL486.MakeReg(y, DI, Int32); DevCPL486.GenMove(x, y);\r\t\t\t\t\t\tIF ODD(obj.sysflag DIV nilBit) THEN\r\t\t\t\t\t\t\tDevCPL486.GenComp(zero, y);\r\t\t\t\t\t\t\tlbl := DevCPL486.NewLbl; DevCPL486.GenJump(ccE, lbl, TRUE)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF nofptrs > MaxPtrs THEN\r\t\t\t\t\t\t\tDevCPL486.GenStrStore(obj.typ.size)\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tSort(ptrTab, nofptrs);\r\t\t\t\t\t\t\tx.reg := DI; i := 0;\r\t\t\t\t\t\t\tWHILE i < nofptrs DO\r\t\t\t\t\t\t\t\tx.offset := ptrTab[i]; DevCPL486.GenMove(z, x); INC(i)\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF ODD(obj.sysflag DIV nilBit) THEN DevCPL486.SetLabel(lbl) END\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tobj := obj.link\r\t\t\tEND\r\t\tEND\r\tEND InitPtrs2;\r\t\r\tPROCEDURE NeedOutPtrInit (proc: DevCPT.Object): BOOLEAN;\r\t\tVAR obj: DevCPT.Object; nofptrs: INTEGER;\r\tBEGIN\r\t\tIF ptrinit THEN\r\t\t\tobj := proc.link;\r\t\t\tWHILE obj # NIL DO\r\t\t\t\tIF (obj.mode = VarPar) & (obj.vis = outPar) THEN\r\t\t\t\t\tnofptrs := 0;\r\t\t\t\t\tIF obj.typ.comp = DynArr THEN\t"
