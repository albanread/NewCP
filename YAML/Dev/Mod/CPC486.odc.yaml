                  - text: "*)\r\t\r\tPROCEDURE AddCopy* (VAR x, y: DevCPL486.Item; last: BOOLEAN); (* x := .. + y + .. *)\r\tBEGIN\r\t\tIF (x.typ.comp = DynArr) & x.typ.untagged THEN\r\t\t\tDevCPL486.GenStringMove(~last, StringWSize(y), StringWSize(x), -1)\r\t\tELSE\r\t\t\tDevCPL486.GenStringMove(~last, StringWSize(y), StringWSize(x), 0)\r\t\tEND;\r\t\tFreeWReg(SI); FreeWReg(DI)\r\tEND AddCopy;\r\t\r\tPROCEDURE Copy* (VAR x, y: DevCPL486.Item; short: BOOLEAN); (* x := y *)\r\t\tVAR sx, sy, sy2, sy4: INTEGER; c, r: DevCPL486.Item;\r\tBEGIN\r\t\tsx := x.typ.size; CheckAv(CX);\r\t\tIF y.form IN {String8, String16} THEN\r\t\t\tsy := y.index * y.typ.BaseTyp.size;\r\t\t\tIF x.typ.comp = Array THEN\t(* adjust size for optimal performance *)\r\t\t\t\tsy2 := sy + sy MOD 2; sy4 := sy2 + sy2 MOD 4;\r\t\t\t\tIF sy4 <= sx THEN sy := sy4\r\t\t\t\tELSIF sy2 <= sx THEN sy := sy2\r\t\t\t\tELSIF sy > sx THEN DevCPM.err(114); sy := 1\r\t\t\t\tEND\r\t\t\tELSIF inxchk & ~x.typ.untagged THEN\t(* check array length *)\r\t\t\t\tFree(x); LenDesc(x, c, x.typ);\r\t\t\t\tDevCPL486.MakeConst(y, y.index, Int32);\r\t\t\t\tDevCPL486.GenComp(y, c); DevCPL486.GenAssert(ccAE, copyTrap);\r\t\t\t\tFree(c)\r\t\t\tEND;\r\t\t\tDevCPL486.GenBlockMove(1, sy)\r\t\tELSIF x.typ.comp = DynArr THEN\r\t\t\tIF x.typ.untagged THEN\r\t\t\t\tDevCPL486.GenStringMove(FALSE, StringWSize(y), StringWSize(x), -1)\r\t\t\tELSE\r\t\t\t\tFree(x); LenDesc(x, c, x.typ); DevCPL486.MakeReg(r, CX, Int32); DevCPL486.GenMove(c, r); Free(c);\r\t\t\t\tDevCPL486.GenStringMove(FALSE, StringWSize(y), StringWSize(x), 0)\r\t\t\tEND\r\t\tELSIF y.form IN {VString16to8, VString8, VString16} THEN\r\t\t\tDevCPL486.GenStringMove(FALSE, StringWSize(y), StringWSize(x), x.typ.n);\r\t\t\tASSERT(y.mode # Stk)\r\t\tELSIF short THEN\t(* COPY *)\r\t\t\tsy := y.typ.size;\r\t\t\tIF (y.typ.comp # DynArr) & (sy < sx) THEN sx := sy END;\r\t\t\tDevCPL486.GenStringMove(FALSE, StringWSize(y), StringWSize(x), x.typ.n);\r\t\t\tIF y.mode = Stk THEN AdjustStack(sy) END\r\t\tELSE\t(* := *)\r\t\t\tIF sx > 0 THEN DevCPL486.GenBlockMove(1, sx) END;\r\t\t\tIF y.mode = Stk THEN AdjustStack(sy) END\r\t\tEND;\r\t\tFreeWReg(SI); FreeWReg(DI)\r\tEND Copy;\r\t\r\tPROCEDURE StrLen* (VAR x: DevCPL486.Item; typ: DevCPT.Struct; incl0x: BOOLEAN);\r\t\tVAR c: DevCPL486.Item;\r\tBEGIN\r\t\tCheckAv(AX); CheckAv(CX);\r\t\tDevCPL486.GenStringLength(typ.BaseTyp.size, -1);\r\t\tFree(x); GetReg(x, Int32, {}, wreg - {CX});\r\t\tDevCPL486.GenNot(x);\r\t\tIF ~incl0x THEN DevCPL486.MakeConst(c, 1, Int32); DevCPL486.GenSub(c, x, FALSE) END;\r\t\tFreeWReg(DI)\r\tEND StrLen;\r\r\tPROCEDURE MulDim* (VAR y, z: DevCPL486.Item; VAR fact: INTEGER; dimtyp: DevCPT.Struct);\t(* z := z * y *)\r\t\tVAR c: DevCPL486.Item;\r\tBEGIN\r\t\tIF y.mode = Con THEN\r\t\t\tIF y.offset <= MAX(INTEGER) DIV fact THEN fact := fact * y.offset\r\t\t\tELSE fact := 1; DevCPM.err(214)\r\t\t\tEND\r\t\tELSE\r\t\t\tIF ranchk OR inxchk THEN\r\t\t\t\tDevCPL486.MakeConst(c, 0, Int32); DevCPL486.GenComp(c, y); DevCPL486.GenAssert(ccG, ranTrap)\r\t\t\tEND;\r\t\t\tDevCPL486.GenPush(y);\r\t\t\tIF z.mode = Con THEN z := y\r\t\t\tELSE DevCPL486.GenMul(y, z, ovflchk OR inxchk); Free(y)\r\t\t\tEND\r\t\tEND\r\tEND MulDim;\r\t\r\tPROCEDURE SetDim* (VAR x, y: DevCPL486.Item; dimtyp: DevCPT.Struct); (* set LEN(x^, -dimtyp.n) *)\r\t\t(* y const or on stack *) \r\t\tVAR z: DevCPL486.Item; end: DevCPL486.Label;\r\tBEGIN\r\t\tASSERT((x.mode = Reg) & (x.form = Pointer));\r\t\tz.mode := Ind; z.reg := x.reg; z.offset := ArrDOffs + 4 + dimtyp.n * 4; z.scale := 0; z.form := Int32;\r\t\tIF y.mode = Con THEN y.form := Int32\r\t\tELSE Pop(y, Int32, {}, {})\r\t\tEND;\r\t\tend := DevCPL486.NewLbl; DevCPL486.GenJump(ccE, end, TRUE);\t(* flags set in New *)\r\t\tDevCPL486.GenMove(y, z);\r\t\tDevCPL486.SetLabel(end);\r\t\tIF y.mode = Reg THEN Free(y) END\r\tEND SetDim;\r\r\tPROCEDURE SysNew* (VAR x: DevCPL486.Item);\r\tBEGIN\r\t\tDevCPM.err(141)\r\tEND SysNew;\r\r\tPROCEDURE New* (VAR x, nofel: DevCPL486.Item; fact: INTEGER);\r\t\t(* x.typ.BaseTyp.comp IN {Record, Array, DynArr} *)\r\t\tVAR p, tag, c: DevCPL486.Item; nofdim, dlen, n: INTEGER; typ, eltyp: DevCPT.Struct; lbl: DevCPL486.Label;\r\tBEGIN\r\t\ttyp := x.typ.BaseTyp;\r\t\tIF typ.untagged THEN DevCPM.err(138) END;\r\t\tIF typ.comp = Record THEN\t(* call to Kernel.NewRec(tag: Tag): ADDRESS *)\r\t\t\tDevCPL486.MakeConst(tag, 0, Pointer); tag.obj := DevCPE.TypeObj(typ);\r\t\t\tIF ContainsIPtrs(typ) THEN INC(tag.offset) END;\r\t\t\tDevCPL486.GenPush(tag);\r\t\t\tp.mode := XProc; p.obj := DevCPE.KNewRec;\r\t\tELSE eltyp := typ.BaseTyp;\r\t\t\tIF typ.comp = Array THEN\r\t\t\t\tnofdim := 0; nofel.mode := Con; nofel.form := Int32; fact := typ.n\r\t\t\tELSE (* DynArr *)\r\t\t\t\tnofdim := typ.n+1;\r\t\t\t\tWHILE eltyp.comp = DynArr DO eltyp := eltyp.BaseTyp END\r\t\t\tEND ;\r\t\t\tWHILE eltyp.comp = Array DO fact := fact * eltyp.n; eltyp := eltyp.BaseTyp END;\r\t\t\tIF eltyp.comp = Record THEN\r\t\t\t\tIF eltyp.untagged THEN DevCPM.err(138) END;\r\t\t\t\tDevCPL486.MakeConst(tag, 0, Pointer); tag.obj := DevCPE.TypeObj(eltyp);\r\t\t\t\tIF ContainsIPtrs(eltyp) THEN INC(tag.offset) END;\r\t\t\tELSIF eltyp.form = Pointer THEN\r\t\t\t\tIF ~eltyp.untagged THEN\r\t\t\t\t\tDevCPL486.MakeConst(tag, 0, Pointer)\t(* special TDesc in Kernel for ARRAY OF pointer *)\r\t\t\t\tELSIF eltyp.sysflag = interface THEN\r\t\t\t\t\tDevCPL486.MakeConst(tag, -1, Pointer)\t(* special TDesc in Kernel for ARRAY OF interface pointer *)\r\t\t\t\tELSE\r\t\t\t\t\tDevCPL486.MakeConst(tag, "
                    attr: 0
                  - text: 12
                    attr: 3
                  - text: ", Pointer)\r\t\t\t\tEND\r\t\t\tELSE\t(* eltyp is pointerless basic type *)\r\t\t\t\tCASE eltyp.form OF\r\t\t\t\t| Undef, Byte, Char8: n := 1;\r\t\t\t\t| Int16: n := 2;\r\t\t\t\t| Int8: n := 3;\r\t\t\t\t| Int32: n := 4;\r\t\t\t\t| Bool: n := 5;\r\t\t\t\t| Set: n := 6;\r\t\t\t\t| Real32: n := 7;\r\t\t\t\t| Real64: n := 8;\r\t\t\t\t| Char16: n := 9;\r\t\t\t\t| Int64: n := 10;\r\t\t\t\t| ProcTyp: n := 11;\r\t\t\t\tEND;\r\t\t\t\tDevCPL486.MakeConst(tag, n, Pointer)\r(*\r\t\t\t\tDevCPL486.MakeConst(tag, eltyp.size, Pointer)\r*)\r\t\t\tEND;\r\t\t\tIF nofel.mode = Con THEN nofel.offset := fact; nofel.obj := NIL\r\t\t\tELSE DevCPL486.MakeConst(p, fact, Int32); DevCPL486.GenMul(p, nofel, ovflchk OR inxchk)\r\t\t\tEND;\r\t\t\tDevCPL486.MakeConst(p, nofdim, Int32); DevCPL486.GenPush(p);\r\t\t\tDevCPL486.GenPush(nofel); Free(nofel); DevCPL486.GenPush(tag);\r\t\t\tp.mode := XProc; p.obj := DevCPE.KNewArr;\r\t\tEND;\r\t\tDevCPL486.GenCall(p); GetReg(x, Pointer, {}, wreg - {AX});\r\t\tIF typ.comp = DynArr THEN\t(* set flags for nil test *)\r\t\t\tDevCPL486.MakeConst(c, 0, Pointer); DevCPL486.GenComp(c, x)\r\t\tELSIF typ.comp = Record THEN\r\t\t\tn := NumOfIntProc(typ);\r\t\t\tIF n > 0 THEN\t(* interface method table pointer setup *)\r\t\t\t\tDevCPL486.MakeConst(c, 0, Pointer); DevCPL486.GenComp(c, x);\r\t\t\t\tlbl := DevCPL486.NewLbl; DevCPL486.GenJump(ccE, lbl, TRUE);\r\t\t\t\ttag.offset := - 4 * (n + numPreIntProc);\r\t\t\t\tp.mode := Ind; p.reg := AX; p.offset := 0; p.scale := 0; p.form := Pointer;\r\t\t\t\tDevCPL486.GenMove(tag, p);\r\t\t\t\tIF nofel.mode # Con THEN\t(* unk pointer setup *)\r\t\t\t\t\tp.offset := 8;\r\t\t\t\t\tDevCPL486.GenMove(nofel, p);\r\t\t\t\t\tFree(nofel)\r\t\t\t\tEND;\r\t\t\t\tDevCPL486.SetLabel(lbl);\r\t\t\tEND\r\t\tEND\r\tEND New;\r\r\tPROCEDURE Param* (fp: DevCPT.Object; rec, niltest: BOOLEAN; VAR ap, tag: DevCPL486.Item);\t(* returns tag if rec *)\r\t\tVAR f: BYTE; s, ss: INTEGER; par, a, c: DevCPL486.Item; recTyp: DevCPT.Struct;\r\tBEGIN\r\t\tpar.mode := Stk; par.typ := fp.typ; par.form := par.typ.form;\r\t\tIF ODD(fp.sysflag DIV nilBit) THEN niltest := FALSE END;\r\t\t"
                    attr: 0
                  - text: "IF ap.typ = DevCPT.niltyp THEN\r"
                    attr: 3
                  - text: "\t\t\t"
                    attr: 0
                  - text: "IF ((par.typ.comp = Record) OR (par.typ.comp = DynArr)) & ~par.typ.untagged THEN\r\t\t\t\tDevCPM.err(142)\r\t\t\tEND;"
                    attr: 3
                  - text: "\r"
