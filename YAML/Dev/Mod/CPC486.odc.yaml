                  - text: " FALSE\r\tEND NeedOutPtrInit;\r\t\r\tPROCEDURE Enter* (proc: DevCPT.Object; empty, useFpu: BOOLEAN);\r\t\tVAR sp, fp, r, r1: DevCPL486.Item; par: DevCPT.Object; adr, size, np: INTEGER;\r\tBEGIN\r\t\tprocedureUsesFpu := useFpu;\r\t\tSetReg({AX, CX, DX, SI, DI});\r\t\tDevCPL486.MakeReg(fp, BP, Pointer); DevCPL486.MakeReg(sp, SP, Pointer);\r\t\tIF proc # NIL THEN (* enter proc *)\r\t\t\tDevCPL486.SetLabel(proc.adr);\r\t\t\tIF (~empty OR NeedOutPtrInit(proc)) & (proc.sysflag # noframe) THEN\r\t\t\t\tDevCPL486.GenPush(fp);\r\t\t\t\tDevCPL486.GenMove(sp, fp);\r\t\t\t\tadr := proc.conval.intval2; size := -adr;\r\t\t\t\tIF size < 0 THEN DevCPM.err(214); size := 256 END;\r\t\t\t\tIF isGuarded IN proc.conval.setval THEN\r\t\t\t\t\tDevCPL486.MakeReg(r, BX, Pointer); DevCPL486.GenPush(r);\r\t\t\t\t\tDevCPL486.MakeReg(r, DI, Pointer); DevCPL486.GenPush(r);\r\t\t\t\t\tDevCPL486.MakeReg(r, SI, Pointer); DevCPL486.GenPush(r);\r\t\t\t\t\tr1.mode := Con; r1.form := Int32; r1.offset := proc.conval.intval - 8; r1.obj := NIL;\r\t\t\t\t\tDevCPL486.GenPush(r1);\r\t\t\t\t\tintHandler.used := TRUE;\r\t\t\t\t\tr1.mode := Con; r1.form := Int32; r1.offset := 0; r1.obj := intHandler;\r\t\t\t\t\tDevCPL486.GenPush(r1);\r\t\t\t\t\tr1.mode := Abs; r1.form := Int32; r1.offset := 0; r1.scale := 0; r1.obj := NIL;\r\t\t\t\t\tDevCPL486.GenCode(64H); DevCPL486.GenPush(r1);\r\t\t\t\t\tDevCPL486.GenCode(64H); DevCPL486.GenMove(sp, r1);\r\t\t\t\t\tDEC(size, 24)\r\t\t\t\tELSE\r\t\t\t\t\tIF imVar IN proc.conval.setval THEN\t(* set down pointer *)\r\t\t\t\t\t\tDevCPL486.MakeReg(r, BX, Pointer); DevCPL486.GenPush(r); DEC(size, 4)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF isCallback IN proc.conval.setval THEN\r\t\t\t\t\t\tDevCPL486.MakeReg(r, DI, Pointer); DevCPL486.GenPush(r);\r\t\t\t\t\t\tDevCPL486.MakeReg(r, SI, Pointer); DevCPL486.GenPush(r); DEC(size, 8)\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tASSERT(size >= 0);\r\t\t\t\tIF initializeAll THEN\r\t\t\t\t\tAllocAndInitAll(proc, adr, size, np)\r\t\t\t\tELSE\r\t\t\t\t\tAllocAndInitPtrs1(proc, adr, size, np);\t(* needs AX *)\r\t\t\t\t\tInitPtrs2(proc, adr, size, np);\t(* needs AX, CX, DI *)\r\t\t\t\tEND;\r\t\t\t\tpar := proc.link;\t(* parameters *)\r\t\t\t\tWHILE par # NIL DO\r\t\t\t\t\tIF (par.mode = Var) & (par.typ.comp = DynArr) THEN \r\t\t\t\t\t\tCopyDynArray(par.adr, par.typ)\r\t\t\t\t\tEND;\r\t\t\t\t\tpar := par.link\r\t\t\t\tEND;\r\t\t\t\tIF imVar IN proc.conval.setval THEN\r\t\t\t\t\tDevCPL486.MakeReg(r, BX, Pointer); DevCPL486.GenMove(fp, r)\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSIF ~empty THEN (* enter module *)\r\t\t\tDevCPL486.GenPush(fp);\r\t\t\tDevCPL486.GenMove(sp, fp);\r\t\t\tDevCPL486.MakeReg(r, DI, Int32); DevCPL486.GenPush(r);\r\t\t\tDevCPL486.MakeReg(r, SI, Int32); DevCPL486.GenPush(r)\r\t\tEND;\r\t\tIF useFpu THEN InitFpu END\r\tEND Enter;\r\t\r\tPROCEDURE Exit* (proc: DevCPT.Object; empty: BOOLEAN);\r\t\tVAR sp, fp, r, x: DevCPL486.Item; mode: SHORTINT; size: INTEGER;\r\tBEGIN\r\t\tDevCPL486.MakeReg(sp, SP, Pointer); DevCPL486.MakeReg(fp, BP, Pointer);\r\t\tIF proc # NIL THEN (* exit proc *)\r\t\t\tIF proc.sysflag # noframe THEN\r\t\t\t\tIF ~empty OR NeedOutPtrInit(proc) THEN\r\t\t\t\t\tIF isGuarded IN proc.conval.setval THEN\t(* remove exception frame *)\r\t\t\t\t\t\tx.mode := Ind; x.reg := BP; x.offset := -24; x.scale := 0; x.form := Int32;\r\t\t\t\t\t\tDevCPL486.MakeReg(r, CX, Int32); DevCPL486.GenMove(x, r);\r\t\t\t\t\t\tx.mode := Abs; x.offset := 0; x.scale := 0; x.form := Int32; x.obj := NIL;\r\t\t\t\t\t\tDevCPL486.GenCode(64H); DevCPL486.GenMove(r, x);\r\t\t\t\t\t\tsize := 12\r\t\t\t\t\tELSE\r\t\t\t\t\t\tsize := 0;\r\t\t\t\t\t\tIF imVar IN proc.conval.setval THEN INC(size, 4) END;\r\t\t\t\t\t\tIF isCallback IN proc.conval.setval THEN INC(size, 8) END\r\t\t\t\t\tEND;\r\t\t\t\t\tIF size > 0 THEN\r\t\t\t\t\t\tx.mode := Ind; x.reg := BP; x.offset := -size; x.scale := 0; x.form := Int32;\r\t\t\t\t\t\tDevCPL486.GenLoadAdr(x, sp);\r\t\t\t\t\t\tIF size > 4 THEN\r\t\t\t\t\t\t\tDevCPL486.MakeReg(r, SI, Int32); DevCPL486.GenPop(r);\r\t\t\t\t\t\t\tDevCPL486.MakeReg(r, DI, Int32); DevCPL486.GenPop(r)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF size # 8 THEN\r\t\t\t\t\t\t\tDevCPL486.MakeReg(r, BX, Int32); DevCPL486.GenPop(r)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE\r\t\t\t\t\t\tDevCPL486.GenMove(fp, sp)\r\t\t\t\t\tEND;\r\t\t\t\t\tDevCPL486.GenPop(fp)\r\t\t\t\tEND;\r\t\t\t\tIF proc.sysflag = ccall THEN DevCPL486.GenReturn(0)\r\t\t\t\tELSE DevCPL486.GenReturn(proc.conval.intval - 8)\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE (* exit module *)\r\t\t\tIF ~empty THEN\r\t\t\t\tDevCPL486.MakeReg(r, SI, Int32); DevCPL486.GenPop(r);\r\t\t\t\tDevCPL486.MakeReg(r, DI, Int32); DevCPL486.GenPop(r);\r\t\t\t\tDevCPL486.GenMove(fp, sp); DevCPL486.GenPop(fp)\r\t\t\tEND;\r\t\t\tDevCPL486.GenReturn(0)\r\t\tEND\r\tEND Exit;\r\t\r\tPROCEDURE InstallStackAlloc*;\r\t\tVAR name: ARRAY 32 OF SHORTCHAR; ax, cx, sp, c, x: DevCPL486.Item; l1, l2: DevCPL486.Label;\r\tBEGIN\r\t\tIF stkAllocLbl # DevCPL486.NewLbl THEN\r\t\t\tDevCPL486.SetLabel(stkAllocLbl);\r\t\t\tDevCPL486.MakeReg(ax, AX, Int32);\r\t\t\tDevCPL486.MakeReg(cx, CX, Int32);\r\t\t\tDevCPL486.MakeReg(sp, SP, Int32);\r\t\t\tDevCPL486.GenPush(ax);\r\t\t\tDevCPL486.MakeConst(c, -5, Int32); DevCPL486.GenAdd(c, cx, FALSE);\r\t\t\tl1 := DevCPL486.NewLbl; DevCPL486.GenJump(ccNS, l1, TRUE);\r\t\t\tDevCPL486.MakeConst(c, 0, Int32); DevCPL486.GenMove(c, cx);\r\t\t\tDevCPL486.SetLabel(l1);\r\t\t\tDevCPL486.MakeConst(c, -4, Int32); DevCPL486.GenAnd(c, cx);\r\t\t\tDevCPL486.GenMove(cx, ax);\r\t\t\tDevCPL486.MakeConst(c, 4095, Int32); DevCPL486.GenAnd(c, ax);\r\t\t\tDevCPL486.GenSub(ax, sp, FALSE);\r\t\t\tDevCPL486.GenMove(cx, ax);\r\t\t\tDevCPL486.MakeConst(c, 12, Int32); DevCPL486.GenShiftOp(SHR, c, ax);\r\t\t\tl2 := DevCPL486.NewLbl; DevCPL486.GenJump(ccE, l2, TRUE);\r\t\t\tl1 := DevCPL486.NewLbl; DevCPL486.SetLabel(l1);\r\t\t\tDevCPL486.MakeConst(c, 0, Int32); DevCPL486.GenPush(c);\r\t\t\tDevCPL486.MakeConst(c, 4092, Int32); DevCPL486.GenSub(c, sp, FALSE);\r\t\t\tDevCPL486.MakeConst(c, -1, Int32); DevCPL486.GenAdd(c, ax, FALSE);\r\t\t\tDevCPL486.GenJump(ccNE, l1, TRUE);\r\t\t\tDevCPL486.SetLabel(l2);\r\t\t\tDevCPL486.MakeConst(c, 8, Int32); DevCPL486.GenAdd(c, cx, FALSE);\r\t\t\tx.mode := Ind; x.form := Int32; x.offset := -4; x.index := CX; x.reg := SP; x.scale := 1;\r\t\t\tDevCPL486.GenMove(x, ax);\r\t\t\tDevCPL486.GenPush(ax);\r\t\t\tDevCPL486.GenMove(x, ax);\r\t\t\tDevCPL486.MakeConst(c, 2, Int32); DevCPL486.GenShiftOp(SHR, c, cx);\r\t\t\tDevCPL486.GenReturn(0);\r\t\t\tname := \"$StackAlloc\"; DevCPE.OutRefName(name);\r\t\tEND\r\tEND InstallStackAlloc;\r\r\tPROCEDURE Trap* (n: INTEGER);\r\tBEGIN\r\t\tDevCPL486.GenAssert(ccNever, n)\r\tEND Trap;\r\t\r\tPROCEDURE Jump* (VAR L: DevCPL486.Label);\r\tBEGIN\r\t\tDevCPL486.GenJump(ccAlways, L, FALSE)\r\tEND Jump;\r\r\tPROCEDURE JumpT* (VAR x: DevCPL486.Item; VAR L: DevCPL486.Label);\r\tBEGIN\r\t\tDevCPL486.GenJump(x.offset, L, FALSE);\r\tEND JumpT; \r\t\r\tPROCEDURE JumpF* (VAR x: DevCPL486.Item; VAR L: DevCPL486.Label);\r\tBEGIN\r\t\tDevCPL486.GenJump(Inverted(x.offset), L, FALSE);\r\tEND JumpF;\r\t\r\tPROCEDURE CaseTableJump* (VAR x: DevCPL486.Item; low, high: INTEGER; VAR else: DevCPL486.Label);\r\t\tVAR c: DevCPL486.Item; n: INTEGER;\r\tBEGIN\r\t\tn := high - low + 1;\r\t\tDevCPL486.MakeConst(c, low, Int32); DevCPL486.GenSub(c, x, FALSE);\r\t\tDevCPL486.MakeConst(c, n, Int32); DevCPL486.GenComp(c, x);\r\t\tDevCPL486.GenJump(ccAE, else, FALSE);\r\t\tDevCPL486.GenCaseJump(x)\r\tEND CaseTableJump;\r\t\r\tPROCEDURE CaseJump* (VAR x: DevCPL486.Item; low, high: INTEGER; VAR this, else: DevCPL486.Label; tree, first: BOOLEAN);\r\t\tVAR c: DevCPL486.Item;\r\tBEGIN\r\t\tIF high = low THEN\r\t\t\tDevCPL486.MakeConst(c, low, Int32); DevCPL486.GenComp(c, x);\r\t\t\tIF tree THEN DevCPL486.GenJump(ccG, else, FALSE) END;\r\t\t\tDevCPL486.GenJump(ccE, this, FALSE)\r\t\tELSIF first THEN\r\t\t\tDevCPL486.MakeConst(c, low, Int32); DevCPL486.GenComp(c, x);\r\t\t\tDevCPL486.GenJump(ccL, else, FALSE);\r\t\t\tDevCPL486.MakeConst(c, high, Int32); DevCPL486.GenComp(c, x);\r\t\t\tDevCPL486.GenJump(ccLE, this, FALSE);\r\t\tELSE\r\t\t\tDevCPL486.MakeConst(c, high, Int32); DevCPL486.GenComp(c, x);\r\t\t\tDevCPL486.GenJump(ccG, else, FALSE);\r\t\t\tDevCPL486.MakeConst(c, low, Int32); DevCPL486.GenComp(c, x);\r\t\t\tDevCPL486.GenJump(ccGE, this, FALSE);\r\t\tEND\r\tEND CaseJump;\r\rBEGIN\r\timLevel[0] := 0\rEND DevCPC486.\r"
