                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT DevCPT;\r\t\r\tCONST\r\t\t"
                    attr: 0
                  - text: "(* UseCalls options *)"
                    attr: 1
                  - text: "\r\t\tlongMop* = 0; longDop* = 1; longConv* = 2; longOdd* = 3;\r\t\trealMop* = 8; realDop* = 9; realConv* = 10;\r\t\tintMulDiv* = 11;\r\t\tforce = 16; hide = 17;\r\t\r\t\t"
                    attr: 0
                  - text: "(* nodes classes *)"
                    attr: 1
                  - text: "\r\t\tNvar = 0; Nvarpar = 1; Nfield = 2; Nderef = 3; Nindex = 4; Nguard = 5; Neguard = 6;\r\t\tNconst = 7; Ntype = 8; Nproc = 9; Nupto = 10; Nmop = 11; Ndop = 12; Ncall = 13;\r\t\tNinittd = 14; Nif = 15; Ncaselse = 16; Ncasedo = 17; Nenter = 18; Nassign = 19;\r\t\tNifelse =20; Ncase = 21; Nwhile = 22; Nrepeat = 23; Nloop = 24; Nexit = 25;\r\t\tNreturn = 26; Nwith = 27; Ntrap = 28; Ncomp = 30;\r\t\tNdrop = 50; Nlabel = 51; Ngoto = 52; Njsr = 53; Nret = 54; Ncmp = 55;\r\t\t\r\t\t"
                    attr: 0
                  - text: "(*function number*)"
                    attr: 1
                  - text: "\r\t\tassign = 0; newfn = 1; incfn = 13; decfn = 14;\r\t\tinclfn = 15; exclfn = 16; copyfn = 18; assertfn = 32;\r\t\tgetfn = 24; putfn = 25; getrfn = 26; putrfn = 27; sysnewfn = 30; movefn = 31;\r\t\t\r\t\t"
                    attr: 0
                  - text: "(* symbol values and ops *)"
                    attr: 1
                  - text: "\r\t\ttimes = 1; slash = 2; div = 3; mod = 4;\r\t\tand = 5; plus = 6; minus = 7; or = 8; eql = 9;\r\t\tneq = 10; lss = 11; leq = 12; gtr = 13; geq = 14;\r\t\tin = 15; is = 16; ash = 17; msk = 18; len = 19;\r\t\tconv = 20; abs = 21; cap = 22; odd = 23; not = 33;\r\t\tadr = 24; cc = 25; bit = 26; lsh = 27; rot = 28; val = 29;\r\t\tmin = 34; max = 35; typfn = 36;\r\t\tthisrecfn = 45; thisarrfn = 46;\r\t\tshl = 50; shr = 51; lshr = 52; xor = 53;\r\r\t\t(* structure forms *)\r\t\tUndef = 0; Byte = 1; Bool = 2; Char8 = 3; Int8 = 4; Int16 = 5; Int32 = 6;\r\t\tReal32 = 7; Real64 = 8; Set = 9; String8 = 10; NilTyp = 11; NoTyp = 12;\r\t\tPointer = 13; ProcTyp = 14; Comp = 15;\r\t\tChar16 = 16; String16 = 17; Int64 = 18;\r\t\tVString16to8 = 29; VString8 = 30; VString16 = 31;\r\t\trealSet = {Real32, Real64};\r\t\tBasic = 1; Array = 2; DynArr = 3; Record = 4;\r\r\t\t\r\r\tPROCEDURE UseThisCall (n: DevCPT.Node; IN name: ARRAY OF SHORTCHAR);\r\t\tVAR mod, nm, moda: DevCPT.Name; mobj, obj: DevCPT.Object; done: BOOLEAN;\r\tBEGIN\r\t\tIF (n.typ.form = Real64) OR (n.left.typ.form = Real64) THEN mod := \"Real\"\r\t\tELSIF (n.typ.form = Real32) OR (n.left.typ.form = Real32) THEN mod := \"SReal\"\r\t\tELSIF (n.typ.form = Int64) OR (n.left.typ.form = Int64) THEN mod := \"Long\"\r\t\tELSE mod := \"Int\"\r\t\tEND;\r\t\tmoda := mod + \"%\";\r\t\tDevCPT.Find(moda, mobj);\r\t\tIF mobj = NIL THEN\r\t\t\tDevCPT.Import(moda, mod, done);\r\t\t\tIF done THEN DevCPT.Find(moda, mobj) END\r\t\tEND;\r\t\tnm := name$; DevCPT.FindImport(nm, mobj, obj);\r\t\tn.class := Ncall; n.subcl := 0; n.obj := obj.link;\r\t\tn.left.link := n.right; n.right := n.left;\r\t\tn.left := DevCPT.NewNode(Nproc);\r\t\tn.left.obj := obj; n.left.typ := obj.typ;\r\t\tASSERT(n.typ.form = obj.typ.form)\r\tEND UseThisCall;\r\t\r\tPROCEDURE Convert (n: DevCPT.Node; typ: DevCPT.Struct);\r\t\tVAR new: DevCPT.Node; r: REAL;\r\tBEGIN\r\t\tIF n.class = Nconst THEN\r\t\t\tASSERT((n.typ.form IN {Int32, Int64}) & (typ = DevCPT.intrealtyp));\r\t\t\tr := n.conval.realval + n.conval.intval;\r\t\t\tIF r = n.conval.realval + n.conval.intval THEN\r\t\t\t\tn.conval.realval := r; n.conval.intval := -1; n.typ := typ; n.obj := NIL\r\t\t\tEND\r\t\tEND;\r\t\tIF (n.typ # typ)\r\t\t\t& ((n.class # Nmop) OR (n.subcl # conv)\r\t\t\t\tOR ~DevCPT.Includes(n.typ.form, n.left.typ.form) & ~DevCPT.Includes(n.typ.form, typ.form)) THEN\r\t\t\tnew := DevCPT.NewNode(0); new^ := n^;\r\t\t\tn.class := Nmop; n.subcl := conv; n.left := new; n.right := NIL; n.obj := NIL\r\t\tEND;\r\t\tn.typ := typ\r\tEND Convert;\r\t\r\tPROCEDURE UseCallForComp (n: DevCPT.Node);\r\t\tVAR new: DevCPT.Node;\r\tBEGIN\r\t\tnew := DevCPT.NewNode(0);\r\t\tnew.left := n.left; new.right := n.right;\r\t\tnew.typ := DevCPT.int32typ;\r\t\tUseThisCall(new, \"Comp\");\r\t\tn.left := new;\r\t\tn.right := DevCPT.NewNode(Nconst); n.right.conval := DevCPT.NewConst();\r\t\tn.right.conval.intval := 0; n.right.conval.realval := 0; n.right.typ := DevCPT.int32typ;\r\tEND UseCallForComp;\r\t\r\tPROCEDURE UseCallForConv (n: DevCPT.Node; opts: SET);\r\t\tVAR f, g: INTEGER; typ: DevCPT.Struct;\r\tBEGIN\r\t\ttyp := n.typ; f := typ.form; g := n.left.typ.form;\r\t\tIF realConv IN opts THEN\r\t\t\tIF f IN realSet THEN\r\t\t\t\tIF g = Real32 THEN UseThisCall(n, \"Long\")\r\t\t\t\tELSIF g = Real64 THEN UseThisCall(n, \"Short\")\r\t\t\t\tELSIF g = Int64 THEN UseThisCall(n, \"LFloat\")\r\t\t\t\tELSIF g = Int32 THEN UseThisCall(n, \"Float\")\r\t\t\t\tELSE Convert(n.left, DevCPT.int32typ); UseThisCall(n, \"Float\")\r\t\t\t\tEND\r\t\t\tELSIF g IN realSet THEN\r\t\t\t\tIF f = Int64 THEN UseThisCall(n, \"LFloor\")\r\t\t\t\tELSIF f = Int32 THEN UseThisCall(n, \"Floor\")\r\t\t\t\tELSE n.typ := DevCPT.int32typ; UseThisCall(n, \"Floor\"); Convert(n, typ)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND;\r\t\tIF longConv IN opts THEN\r\t\t\tIF f = Int64 THEN\r\t\t\t\tIF g = Int32 THEN UseThisCall(n, \"Long\")\r\t\t\t\tELSIF ~(g IN realSet) THEN Convert(n.left, DevCPT.int32typ); UseThisCall(n, \"IntToLong\")\r\t\t\t\tEND\r\t\t\tELSIF g = Int64 THEN\r\t\t\t\tIF f = Int32 THEN UseThisCall(n, \"Short\")\r\t\t\t\tELSIF ~(f IN realSet) THEN n.typ := DevCPT.int32typ; UseThisCall(n, \"LongToInt\"); Convert(n, typ)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND UseCallForConv;\r\t\t\r\tPROCEDURE UseCallForMop (n: DevCPT.Node; opts: SET);\r\tBEGIN\r\t\tCASE n.subcl OF\r\t\t| minus:\r\t\t\tIF (realMop IN opts) & (n.typ.form IN realSet) OR (longMop IN opts) & (n.typ.form = Int64) THEN\r\t\t\t\tUseThisCall(n, \"Neg\")\r\t\t\tEND\r\t\t| abs:\r\t\t\tIF (realMop IN opts) & (n.typ.form IN realSet) OR (longMop IN opts) & (n.typ.form = Int64) THEN\r\t\t\t\tUseThisCall(n, \"Abs\")\r\t\t\tEND\r\t\t| odd:\r\t\t\tIF (longOdd IN opts) & (n.left.typ.form = Int64) THEN UseThisCall(n, \"Odd\") END\r\t\t| conv:\r\t\t\tUseCallForConv(n, opts)\r\t\tELSE\r\t\tEND\r\tEND UseCallForMop;\r\t\t\r\tPROCEDURE UseCallForDop (n: DevCPT.Node; opts: SET);\r\tBEGIN\r\t\tIF (realDop IN opts) & (n.left.typ.form IN realSet)\r\t\t\t\tOR (longDop IN opts) & (n.left.typ.form = Int64)\r\t\t\t\tOR (intMulDiv IN opts) & (n.subcl IN {times, div, mod}) & (n.typ.form = Int32) THEN\r\t\t\tCASE n.subcl OF\r\t\t\t| times: UseThisCall(n, \"Mul\")\r\t\t\t| slash: UseThisCall(n, \"Div\")\r\t\t\t| div: UseThisCall(n, \"Div\")\r\t\t\t| mod: UseThisCall(n, \"Mod\")\r\t\t\t| plus: UseThisCall(n, \"Add\")\r\t\t\t| minus: UseThisCall(n, \"Sub\")\r\t\t\t| ash: UseThisCall(n, \"Ash\")\r\t\t\t| min: UseThisCall(n, \"Min\")\r\t\t\t| max: UseThisCall(n, \"Max\")\r\t\t\t| eql..geq: UseCallForComp(n)\r\t\t\tELSE\r\t\t\tEND\r\t\tEND\r\tEND UseCallForDop;\r\t\r\tPROCEDURE UseCallForMove (n: DevCPT.Node; typ: DevCPT.Struct; opts: SET);\r\t\tVAR f, g: INTEGER;\r\tBEGIN\r\t\tf := n.typ.form; g := typ.form;\r\t\tIF f # g THEN\r\t\t\tIF (realConv IN opts) & ((f IN realSet) OR (g IN realSet))\r\t\t\t\t\tOR (longConv IN opts) & ((f = Int64) OR (g = Int64)) THEN\r\t\t\t\tConvert(n, typ);\r\t\t\t\tUseCallForConv(n, opts)\r\t\t\tEND\r\t\tEND\r\tEND UseCallForMove;\r\t\t\r\tPROCEDURE UseCallForAssign (n: DevCPT.Node; opts: SET);\r\tBEGIN\r\t\tIF n.subcl = assign THEN UseCallForMove(n.right, n.left.typ, opts) END\r\tEND UseCallForAssign;\r\t\r\tPROCEDURE UseCallForReturn (n: DevCPT.Node; opts: SET);\r\tBEGIN\r\t\tIF (n.left # NIL) & (n.obj # NIL) THEN UseCallForMove(n.left, n.obj.typ, opts) END\r\tEND UseCallForReturn;\r\t\r\tPROCEDURE UseCallForParam (n: DevCPT.Node; fp: DevCPT.Object; opts: SET);\r\tBEGIN\r\t\tWHILE n # NIL DO\r\t\t\tUseCallForMove(n, fp.typ, opts);\r\t\t\tn := n.link; fp := fp.link\r\t\tEND\r\tEND UseCallForParam;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: UseCalls
                    attr: 3
                  - text: "* (n: DevCPT.Node; opts: SET);\r\tBEGIN\r\t\tWHILE n # NIL DO\r\t\t\tCASE n.class OF\r\t\t\t| Nmop:\r\t\t\t\tUseCalls(n.left, opts); UseCallForMop(n, opts)\r\t\t\t| Ndop:\r\t\t\t\tUseCalls(n.left, opts); UseCalls(n.right, opts); UseCallForDop(n, opts)\r\t\t\t| Ncase:\r\t\t\t\tUseCalls(n.left, opts); UseCalls(n.right.left, opts); UseCalls(n.right.right, opts)\r\t\t\t| Nassign:\r\t\t\t\tUseCalls(n.left, opts); UseCalls(n.right, opts); UseCallForAssign(n, opts)\r\t\t\t| Ncall:\r\t\t\t\tUseCalls(n.left, opts); UseCalls(n.right, opts); UseCallForParam(n.right, n.obj, opts)\r\t\t\t| Nreturn:\r\t\t\t\tUseCalls(n.left, opts); UseCallForReturn(n, opts)\r\t\t\t| Ncasedo:\r\t\t\t\tUseCalls(n.right, opts)\r\t\t\t| Ngoto, Ndrop, Nloop, Nfield, Nderef, Nguard:\r\t\t\t\tUseCalls(n.left, opts)\r\t\t\t| Nenter, Nifelse, Nif, Nwhile, Nrepeat, Nwith, Ncomp, Nupto, Nindex:\r\t\t\t\tUseCalls(n.left, opts); UseCalls(n.right, opts)\r\t\t\t| Njsr, Nret, Nlabel, Ntrap, Nexit, Ninittd, Ntype, Nproc, Nconst, Nvar, Nvarpar:\r\t\t\tEND;\r\t\t\tn := n.link\r\t\tEND\r\tEND UseCalls;\r\t\r\t\t\r\tPROCEDURE "
                    attr: 0
                  - text: UseReals
                    attr: 3
                  - text: "* (n: DevCPT.Node; opts: SET);\r\tBEGIN\r\t\tWHILE n # NIL DO\r\t\t\tCASE n.class OF\r\t\t\t| Nmop:\r\t\t\t\tIF (longMop IN opts) & (n.typ.form = Int64) & ((n.subcl = abs) OR (n.subcl = minus)) THEN\r\t\t\t\t\tUseReals(n.left, opts - {hide} + {force}); n.typ := DevCPT.intrealtyp\r\t\t\t\tELSIF n.subcl = conv THEN UseReals(n.left, opts - {force} + {hide})\r\t\t\t\tELSE UseReals(n.left, opts - {force, hide})\r\t\t\t\tEND\r\t\t\t| Ndop:\r\t\t\t\tIF (longDop IN opts) & (n.left.typ.form = Int64) THEN\r\t\t\t\t\tUseReals(n.left, opts - {hide} + {force}); UseReals(n.right, opts - {hide} + {force});\r\t\t\t\t\tIF n.typ.form = Int64 THEN n.typ := DevCPT.intrealtyp END\r\t\t\t\tELSE UseReals(n.left, opts - {force, hide}); UseReals(n.right, opts - {force, hide})\r\t\t\t\tEND\r\t\t\t| Ncase:\r\t\t\t\tUseReals(n.left, opts - {force, hide}); UseReals(n.right.left, opts - {force, hide});\r\t\t\t\tUseReals(n.right.right, opts - {force, hide})\r\t\t\t| Ncasedo:\r\t\t\t\tUseReals(n.right, opts - {force, hide})\r\t\t\t| Ngoto, Ndrop, Nloop, Nreturn, Nfield, Nderef, Nguard:\r\t\t\t\tUseReals(n.left, opts - {force, hide})\r\t\t\t| Nenter, Nassign, Ncall, Nifelse, Nif, Nwhile, Nrepeat, Nwith, Ncomp, Nupto, Nindex:\r\t\t\t\tUseReals(n.left, opts - {force, hide}); UseReals(n.right, opts - {force, hide})\r\t\t\t| Njsr, Nret, Nlabel, Ntrap, Nexit, Ninittd, Ntype, Nproc, Nconst, Nvar, Nvarpar:\r\t\t\tEND;\r\t\t\tIF force IN opts THEN Convert(n, DevCPT.intrealtyp)\r\t\t\tELSIF ~(hide IN opts) & (n.typ = DevCPT.intrealtyp) THEN Convert(n, DevCPT.int64typ)\r\t\t\tEND;\r\t\t\tn := n.link\r\t\tEND\r\tEND UseReals;\r\t\t\rEND DevCPH.\r\r\r\r\r\tPROCEDURE Traverse (n: DevCPT.Node; opts: SET);\r\tBEGIN\r\t\tWHILE n # NIL DO\r\t\t\tCASE n.class OF\r\t\t\t| Ncase:\r\t\t\t\tTraverse(n.left, opts); Traverse(n.right.left, opts); Traverse(n.right.right, opts)\r\t\t\t| Ncasedo:\r\t\t\t\tTraverse(n.right, opts)\r\t\t\t| Ngoto, Ndrop, Nloop, Nreturn, Nmop, Nfield, Nderef, Nguard:\r\t\t\t\tTraverse(n.left, opts)\r\t\t\t| Nenter, Nassign, Ncall, Nifelse, Nif, Nwhile, Nrepeat, Nwith, Ncomp, Ndop, Nupto, Nindex:\r\t\t\t\tTraverse(n.left, opts); Traverse(n.right, opts)\r\t\t\t| Njsr, Nret, Nlabel, Ntrap, Nexit, Ninittd, Ntype, Nproc, Nconst, Nvar, Nvarpar:\r\t\t\tEND;\r\t\t\tn := n.link\r\t\tEND\r\tEND Traverse;\r\t\t\r"
