                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Strings, Files, Fonts, Views, TextModels, TextMappers, TextViews, StdCmds, Dialog,\r\t\tDevCommanders;\r\r\tCONST\r\t\t"
                    attr: 0
                  - text: textCmds
                    attr: 3
                  - text: "* = 0; "
                    attr: 0
                  - text: formCmds
                    attr: 3
                  - text: "* = 1; otherCmds = 2;\r\t\t"
                    attr: 0
                  - text: noModelView
                    attr: 3
                  - text: "* = 3; "
                    attr: 0
                  - text: modelView
                    attr: 3
                  - text: "* = 4; "
                    attr: 0
                  - text: complexView
                    attr: 3
                  - text: "* = 5;\r\t\twrapper = 6; specialContainer = 7; generalContainer = 8;\r\r\tVAR\r\t\t"
                    attr: 0
                  - text: create
                    attr: 3
                  - text: "*: RECORD\r\t\t\tsubsystem*: ARRAY 16 OF CHAR;\r\t\t\tkind*: INTEGER;\r\t\t\tCreate*: PROCEDURE\r\t\tEND;\r\r\tPROCEDURE TranslateText (t: TextModels.Model; s: ARRAY OF CHAR);\r\t\tVAR r: TextModels.Reader; w: TextModels.Writer; from, to: INTEGER; i: INTEGER; ch: CHAR;\r\tBEGIN\r\t\tr := t.NewReader(NIL); w := t.NewWriter(NIL);\r\t\tr.ReadChar(ch);\r\t\tWHILE ~r.eot DO\r\t\t\tWHILE ~r.eot & ~(Fonts.strikeout IN r.attr.font.style) DO\r\t\t\t\tr.ReadChar(ch);\r\t\t\tEND;\r\t\t\tIF ~r.eot THEN\r\t\t\t\tfrom := r.Pos() - 1;\r\t\t\t\tWHILE ~r.eot & (Fonts.strikeout IN r.attr.font.style) DO\r\t\t\t\t\tr.ReadChar(ch);\r\t\t\t\tEND;\r\t\t\t\tIF ~r.eot THEN\r\t\t\t\t\tto := r.Pos() - 1;\r\t\t\t\t\tt.Delete(from, to);\r\t\t\t\t\tw.SetPos(from);\r\t\t\t\t\tw.SetAttr(TextModels.NewStyle(r.attr, r.attr.font.style - {Fonts.strikeout}));\r\t\t\t\t\ti := 0; ch := s[0]; WHILE ch # 0X DO w.WriteChar(ch); INC(i); INC(from); ch := s[i] END;\r\t\t\t\t\tr.SetPos(from); r.ReadChar(ch);\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND TranslateText;\r\r\tPROCEDURE TranslateFile (floc: Files.Locator; fname: Files.Name; tloc: Files.Locator; tname: Files.Name;\r\t\t\t\t\t\t\t\t\t\t\tstring: ARRAY OF CHAR; VAR res: INTEGER);\r\t\tVAR v: Views.View;\r\tBEGIN\r\t\tv := Views.OldView(floc, fname);\r\t\tIF v # NIL THEN\r\t\t\tIF v IS TextViews.View THEN\r\t\t\t\tTranslateText(v(TextViews.View).ThisModel(), string);\r\t\t\t\ttloc.res := 76;\t"
                    attr: 0
                  - text: "(* don't ask whether directory should be created *)"
                    attr: 1
                  - text: "\r\t\t\t\tViews.RegisterView(v, tloc, tname);\r\t\t\t\tres := tloc.res\r\t\t\tELSE res := 101\r\t\t\tEND\r\t\tELSE res := 100\r\t\tEND\r\tEND TranslateFile;\r\r\tPROCEDURE TranslateSubsystem (kind: INTEGER; string: ARRAY OF CHAR);\r\t\tVAR loc, new: Files.Locator; t: TextModels.Model; res: INTEGER; f: TextMappers.Formatter;\r\t\t\tv: Views.View;\r\r\t\tPROCEDURE Message (sub, dir, old: ARRAY OF CHAR);\r\t\t\tVAR dummy: INTEGER;\r\t\tBEGIN\r\t\t\tIF res = 0 THEN\r\t\t\t\tf.WriteString(sub); f.WriteString(dir); f.WriteLn\r\t\t\tELSE\r\t\t\t\tDialog.GetOK(\"#Dev:CannotTranslate\", old, \"\", \"\", {Dialog.ok}, dummy)\r\t\t\tEND\r\t\tEND Message;\r\r\tBEGIN\r\t\tt := TextModels.dir.New(); f.ConnectTo(t);\r\t\tloc := Files.dir.This(\"Dev\"); loc := loc.This(\"Rsrc\"); loc := loc.This(\"New\");\r\t\tnew := Files.dir.This(string); new := new.This(\"Mod\");\r\t\tIF kind = textCmds THEN\r\t\t\tTranslateFile(loc, \"Cmds0\", new, \"Cmds\", string, res);\r\t\t\tMessage(string, \"Cmds\", \"Cmds0\")\r\t\tELSIF kind = formCmds THEN\r\t\t\tTranslateFile(loc, \"Cmds1\", new, \"Cmds\", string, res);\r\t\t\tMessage(string, \"Cmds\", \"Cmds1\")\r\t\tELSIF kind = otherCmds THEN\r\t\t\tTranslateFile(loc, \"Cmds2\", new, \"Cmds\", string, res);\r\t\t\tMessage(string, \"Cmds\", \"Cmds2\")\r\t\tELSIF kind = noModelView THEN\r\t\t\tTranslateFile(loc, \"Views3\", new, \"Views\", string, res);\r\t\t\tMessage(string, \"Views\", \"Views3\");\r\t\t\tf.WriteLn;\r\t\t\tf.WriteView(DevCommanders.dir.New());\r\t\t\tf.WriteString(' \"'); f.WriteString(string); f.WriteString('Views.Deposit; StdCmds.Open\"'); f.WriteLn\r\t\tELSIF kind = modelView THEN\r\t\t\tTranslateFile(loc, \"Views4\", new, \"Views\", string, res);\r\t\t\tMessage(string, \"Views\", \"Views4\");\r\t\t\tf.WriteLn;\r\t\t\tf.WriteView(DevCommanders.dir.New());\r\t\t\tf.WriteString(' \"'); f.WriteString(string); f.WriteString('Views.Deposit; StdCmds.Open\"'); f.WriteLn\r\t\tELSIF kind = complexView THEN\r\t\t\tTranslateFile(loc, \"Models5\", new, \"Models\", string, res);\r\t\t\tMessage(string, \"Models\", \"Models5\");\r\t\t\tTranslateFile(loc, \"Views5\", new, \"Views\", string, res);\r\t\t\tMessage(string, \"Views\", \"Views5\");\r\t\t\tTranslateFile(loc, \"Cmds5\", new, \"Cmds\", string, res);\r\t\t\tMessage(string, \"Cmds\", \"Cmds5\");\r\t\t\tf.WriteLn;\r\t\t\tf.WriteView(DevCommanders.dir.New());\r\t\t\tf.WriteString(' \"'); f.WriteString(string); f.WriteString('Views.Deposit; StdCmds.Open\"'); f.WriteLn\r\t\tELSIF kind = wrapper THEN\r\t\t\tTranslateFile(loc, \"Views6\", new, \"Views\", string, res);\r\t\t\tMessage(string, \"Views\", \"Views6\");\r\t\t\tf.WriteLn;\r\t\t\tf.WriteView(DevCommanders.dir.New());\r\t\t\tf.WriteString(' \"'); f.WriteString(string); f.WriteString('Views.Deposit; StdCmds.Open\"'); f.WriteLn\r\t\tELSIF kind = specialContainer THEN\r\t\t\tTranslateFile(loc, \"Views7\", new, \"Views\", string, res);\r\t\t\tMessage(string, \"Views\", \"Views7\");\r\t\t\tf.WriteLn;\r\t\t\tf.WriteView(DevCommanders.dir.New());\r\t\t\tf.WriteString(' \"'); f.WriteString(string); f.WriteString('Views.Deposit; StdCmds.Open\"'); f.WriteLn\r\t\tELSIF kind = generalContainer THEN\r\t\t\tTranslateFile(loc, \"Models8\", new, \"Models\", string, res);\r\t\t\tMessage(string, \"Models\", \"Models8\");\r\t\t\tTranslateFile(loc, \"Views8\", new, \"Views\", string, res);\r\t\t\tMessage(string, \"Views\", \"Views8\");\r\t\t\tTranslateFile(loc, \"Controllers8\", new, \"Controllers\", string, res);\r\t\t\tMessage(string, \"Controllers\", \"Controllers8\");\r\t\t\tTranslateFile(loc, \"Cmds8\", new, \"Cmds\", string, res);\r\t\t\tMessage(string, \"Cmds\", \"Cmds8\");\r\t\t\tf.WriteLn;\r\t\t\tf.WriteView(DevCommanders.dir.New());\r\t\t\tf.WriteString(' \"'); f.WriteString(string); f.WriteString('Views.Deposit; StdCmds.Open\"'); f.WriteLn\r\t\tELSE "
                    attr: 0
                  - text: HALT
                    attr: 3
                  - text: "(20)\r\t\tEND;\r\t\tv := TextViews.dir.New(t);\r\t\tViews.Open(v, new, \"List\", NIL);\r\t\tIF t.Length() > 0 THEN Views.RegisterView(v, new, \"List\") END\r\tEND TranslateSubsystem;\r\r\tPROCEDURE SyntaxOK(IN s: ARRAY OF CHAR): BOOLEAN;\r\t\tVAR i: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ti := 0; ch := s[0];\r\t\tIF ~Strings.IsIdentStart(ch) THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE END ;\r\t\tWHILE Strings.IsUpper(ch) DO INC(i); ch := s[i] END ;\r\t\tIF ch = 0X THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE END ;\r\t\tWHILE Strings.IsIdent(ch) & ~Strings.IsUpper(ch) DO INC(i); ch := s[i] END ;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " ch = 0X\r\tEND SyntaxOK;\r\r\tPROCEDURE Create;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF (LEN(create.subsystem$) < 3) THEN\r\t\t\tDialog.GetOK(\"#Dev:PrefixTooShort\", \"\", \"\", \"\", {Dialog.ok, Dialog.cancel}, res);\r\t\t\tIF res = Dialog.cancel THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END\r\t\tEND ;\r\t\tIF ~Strings.IsUpper(create.subsystem[0]) THEN\r\t\t\tDialog.GetOK(\"#Dev:NotUppercase\", \"\", \"\", \"\", {Dialog.ok, Dialog.cancel}, res);\r\t\t\tIF res = Dialog.cancel THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END\r\t\tEND ;\r\t\tIF (create.kind >= textCmds) & (create.kind <= generalContainer) THEN\r\t\t\tIF SyntaxOK(create.subsystem) THEN\r\t\t\t\tStdCmds.CloseDialog;\r\t\t\t\tTranslateSubsystem(create.kind, create.subsystem);\r\t\t\t\tcreate.subsystem := \"\"\r\t\t\tELSE Dialog.GetOK(\"#Dev:IllegalSyntax\", \"\", \"\", \"\", {Dialog.ok}, res)\r\t\t\tEND\r\t\tELSE Dialog.GetOK(\"#Dev:IllegalKind\", \"\", \"\", \"\", {Dialog.ok}, res)\r\t\tEND\r\tEND Create;\r\rBEGIN\r\tcreate.Create := Create; create.kind := textCmds\rEND DevSubTool."
                    attr: 0
