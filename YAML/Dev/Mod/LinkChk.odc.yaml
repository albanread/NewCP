                  - text: "\r\tIMPORT\r\t\tKernel, Strings, Dialog, Files, Fonts, Ports, Converters, Views, Containers,\r\t\tTextModels, TextMappers, TextViews, TextControllers, StdLinks, StdCmds;\r\r\tCONST\r\t\t"
