                  - text: "* (VAR p: Dialog.Par);\r\tBEGIN\r\t\tp.disabled := (par.scope = oneSubsystem) & ~par.legal\r\tEND CommandGuard;\r\r\tPROCEDURE SyntaxOK(IN s: ARRAY OF CHAR): BOOLEAN;\r\t\tVAR i: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ti := 0; ch := s[0];\r\t\tIF ~Strings.IsIdentStart(ch) THEN "
                    attr: 0
