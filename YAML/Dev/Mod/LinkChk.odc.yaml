                  - text: "* (op, from, to: INTEGER);\r\tBEGIN\r\t\tIF par.scope = oneSubsystem THEN\r\t\t\tpar.legal := SyntaxOK(par.subsystem)\r\t\tELSE\r\t\t\tpar.subsystem := \"\"; par.legal := FALSE\r\t\tEND\r\tEND SubsystemNotifier;\r\rEND DevLinkChk.\r"
                    attr: 0
