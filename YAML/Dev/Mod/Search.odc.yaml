                  - text: "\r\tIMPORT\r\t\tKernel, Files, Fonts, Ports, Models, Views, Containers, Dialog, Windows,\r\t\tTextModels, TextRulers, TextViews, TextControllers, TextMappers, TextCmds, StdLinks;\r\r\tCONST\r\t\tN = 32; T = 10;\r\t\tmaxPat = LEN(TextCmds.find.find);\r\t\tnoMatchFoundKey = \"#Std:NoMatchFound\";\r\t\tlocationKey = \"#Std:Location\";\r\t\tcountKey = \"#Std:Count\";\r\t\tsearchingKey = \"#Std:Searching\";\r\t\topenFindCmdKey = \"#Dev:OpenFindCmd\";\r\t\topenFindCmdNotFoundKey = \"#Dev:OpenFindCmdNotFound\";\r\r\tTYPE\r\t\tPattern = ARRAY maxPat OF CHAR;\r\t\tText = POINTER TO RECORD\r\t\t\tnext: Text;\r\t\t\tnum: INTEGER;\r\t\t\ttitle: Files.Name\r\t\tEND;\r\r\tVAR\r\t\tw: TextMappers.Formatter;\r\r\tPROCEDURE Find (t: TextModels.Model; pat: Pattern; title: Files.Name; VAR list: Text; caseSens: BOOLEAN);\r\t\tVAR r: TextModels.Reader; num: INTEGER; i, j, b, e, n: INTEGER; ch: CHAR; ref: Pattern; l: Text;\r\tBEGIN\r\t\tn := 0; num := 0;\r\t\tWHILE pat[n] # 0X DO\r\t\t\tIF ~caseSens THEN pat[n] := CAP(pat[n]) END ;\r\t\t\tINC(n)\r\t\tEND;\r\t\tr := t.NewReader(NIL);\r\t\tr.SetPos(0); r.ReadChar(ch);\r\t\tWHILE ~r.eot DO\r\t\t\tref[0] := ch; i := 0; j := 0; b := 0; e := 1;\r\t\t\tWHILE ~r.eot & (i < n) DO\r\t\t\t\tIF caseSens & (pat[i]=ch) OR ~caseSens & (pat[i] = CAP(ch)) THEN INC(i); j := (j + 1) MOD maxPat\r\t\t\t\tELSE i := 0; b := (b + 1) MOD maxPat; j := b\r\t\t\t\tEND;\r\t\t\t\tIF j # e THEN ch := ref[j]\r\t\t\t\tELSE r.ReadChar(ch); ref[j] := ch; e := (e + 1) MOD maxPat\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF i = n THEN INC(num) END\r\t\tEND;\r\t\tIF num > 0 THEN\r\t\t\tNEW(l); l.num := num; l.title := title; l.next := list; list := l\r\t\tEND\r\tEND Find;\r\t\r\tPROCEDURE List (list: Text; pat: Pattern; source, caseSens: BOOLEAN);\r\t\tVAR a0: TextModels.Attributes; this, t: Text; max: INTEGER;\r\t\t\tcmd: ARRAY maxPat + LEN(t.title) + 50  OF CHAR;\r\tBEGIN\r\t\tIF list = NIL THEN\r\t\t\tDialog.MapString(noMatchFoundKey, cmd);\r\t\t\tw.WriteString(cmd)\r\t\tELSE\r\t\t\ta0 := w.rider.attr;\r\t\t\tw.rider.SetAttr(TextModels.NewStyle(w.rider.attr, {Fonts.italic}));\r\t\t\tDialog.MapString(locationKey, cmd);\r\t\t\tw.WriteString(cmd); w.WriteTab;\r\t\t\tDialog.MapString(countKey, cmd);\r\t\t\tw.WriteString(cmd); w.WriteLn;\r\t\t\tw.rider.SetAttr(a0);\r\t\t\tREPEAT\r\t\t\t\tt := list; max := 1; this := NIL;\r\t\t\t\tWHILE t # NIL DO\r\t\t\t\t\tIF t.num >= max THEN max := t.num; this := t END;\r\t\t\t\t\tt := t.next\r\t\t\t\tEND;\r\t\t\t\tIF this # NIL THEN\r\t\t\t\t\tw.rider.SetAttr(TextModels.NewStyle(w.rider.attr, {Fonts.underline}));\r\t\t\t\t\tw.rider.SetAttr(TextModels.NewColor(w.rider.attr, Ports.blue));\r\t\t\t\t\tIF source THEN \r\t\t\t\t\t\tcmd := \"StdCmds.OpenDoc('\" + this.title + \"'); DevSearch.SelectCaseSens('\" + pat + \"')\"\r\t\t\t\t\tELSE\r\t\t\t\t\t\tIF caseSens THEN\r\t\t\t\t\t\t\tcmd := \"StdCmds.OpenBrowser('\" + this.title + \"', '\" + this.title + \"'); \" +\r\t\t\t\t\t\t\t\t\"DevSearch.SelectCaseSens('\" + pat + \"')\"\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tcmd := \"StdCmds.OpenBrowser('\" + this.title + \"', '\" + this.title + \"'); \" +\r\t\t\t\t\t\t\t\t\"DevSearch.SelectCaseInSens('\" + pat + \"')\"\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND;\r\t\t\t\t\tw.WriteView(StdLinks.dir.NewLink(cmd));\r\t\t\t\t\tw.WriteString(this.title);\r\t\t\t\t\tw.WriteView(StdLinks.dir.NewLink(\"\"));\r\t\t\t\t\tw.rider.SetAttr(a0);\r\t\t\t\t\tw.WriteTab; w.WriteInt(this.num); w.WriteLn;\r\t\t\t\t\tthis.num := 0\r\t\t\t\tEND\r\t\t\tUNTIL this = NIL\r\t\tEND\r\tEND List;\r\r\tPROCEDURE NewRuler (): TextRulers.Ruler;\r\t\tCONST mm = Ports.mm;\r\t\tVAR p: TextRulers.Prop;\r\tBEGIN\r\t\tNEW(p);\r\t\tp.valid := {TextRulers.right, TextRulers.tabs, TextRulers.opts};\r\t\tp.opts.val := {TextRulers.rightFixed}; p.opts.mask := p.opts.val;\r\t\tp.right := 100 * mm;\r\t\tp.tabs.len := 1;\r\t\tp.tabs.tab[0].stop := 70 * mm;\r\t\t"
