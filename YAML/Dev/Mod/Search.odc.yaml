                  - text: " NIL\r\tEND ThisText;\r\r\tPROCEDURE GetTitle(IN pat: ARRAY OF CHAR; OUT title: Views.Title);\r\t\tVAR pos: INTEGER; i, j: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ttitle := 'Search for \"'; i := LEN(title$); j := 0; ch := pat[0];\r\t\tWHILE (ch # 0X) & (i < LEN(title) - 2) DO\r\t\t\tIF ch < \" \" THEN title[i] := \" \" ELSE title[i] := ch END ; "
