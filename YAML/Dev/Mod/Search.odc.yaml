                    attr: 1
                  - text: "\r\t\t\tINC(i); INC(j); ch := pat[j]\r\t\tEND ;\r\t\tIF ch # 0X THEN title[i - 3] := \".\"; title[i - 2] := \".\"; title[i - 1] := \".\" END ;\r\t\ttitle[i] := '\"'; title[i + 1] := 0X\r\tEND GetTitle;\r\r\tPROCEDURE Search (source, caseSens: BOOLEAN);\r\t\tVAR pat: Pattern; t, log: TextModels.Model; v: Views.View; title: Views.Title; c: Containers.Controller;\r\t\t\tfiles: Files.FileInfo; dirs: Files.LocInfo;\r\t\t\tloc: Files.Locator; path, p: Files.Name; list: Text;\r\tBEGIN\r\t\t(*TextCmds.InitFindDialog; *)\r\t\tpat := TextCmds.find.find$;\r\t\tIF pat # \"\" THEN\r\t\t\tDialog.ShowStatus(searchingKey);\r\t\t\tTextCmds.find.find := pat$;\r\t\t\tlog := TextModels.dir.New();\r\t\t\tw.ConnectTo(log); w.SetPos(0);\r\t\t\tIF source THEN loc := Files.dir.This(\"Mod\"); path := \"Mod\"\r\t\t\tELSE loc := Files.dir.This(\"Docu\"); path := \"Docu\"\r\t\t\tEND;\r\t\t\tfiles := Files.dir.FileList(loc); list := NIL;\r\t\t\tWHILE files # NIL DO\r\t\t\t\tIF files.type = Kernel.docType THEN\r\t\t\t\t\tp := path + \"/\" + files.name;\r\t\t\t\t\tFind(ThisText(loc, files.name), pat, p, list, caseSens)\r\t\t\t\tEND;\r\t\t\t\tfiles := files.next\r\t\t\tEND;\r\t\t\tloc := Files.dir.This(\"\");\r\t\t\tdirs := Files.dir.LocList(loc);\r\t\t\tWHILE dirs # NIL DO\r\t\t\t\tloc := Files.dir.This(dirs.name); path := dirs.name + \"/\";\r\t\t\t\tIF source THEN loc := loc.This(\"Mod\"); path := path + \"Mod\"\r\t\t\t\tELSE loc := loc.This(\"Docu\"); path := path +\"Docu\"\r\t\t\t\tEND;\r\t\t\t\tfiles := Files.dir.FileList(loc);\r\t\t\t\tWHILE files # NIL DO\r\t\t\t\t\tIF files.type = Kernel.docType THEN\r\t\t\t\t\t\tp := path + \"/\" + files.name;\r\t\t\t\t\t\tt := ThisText(loc, files.name);\r\t\t\t\t\t\tIF t # NIL THEN\r\t\t\t\t\t\t\tFind(t, pat, p, list, caseSens)\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND;\r\t\t\t\t\tfiles := files.next\r\t\t\t\tEND;\r\t\t\t\tdirs := dirs.next\r\t\t\tEND;\r\t\t\tList(list, pat, source, caseSens);\r\t\t\tv := TextViews.dir.New(log);\r\t\t\tGetTitle(pat, title);\r\t\t\tv(TextViews.View).SetDefaults(NewRuler(), TextViews.dir.defAttr);\r\t\t\tViews.OpenAux(v, title);\r\t\t\tc := v(Containers.View).ThisController();\r\t\t\tc.SetOpts(c.opts + {Containers.noCaret});\r\t\t\tw.ConnectTo(NIL);\r\t\t\tDialog.ShowStatus(\"\")\r\t\tEND\r\tEND Search;\r\t\r\tPROCEDURE "
