                  - text: "* (pat: ARRAY OF CHAR);\r\t\tVAR res: INTEGER; cmd: Dialog.String;\r\tBEGIN\r\t\tTextCmds.find.find := pat$;\r\t\tTextCmds.find.ignoreCase := TRUE;\r\t\tDialog.Update(TextCmds.find);\r\t\tDialog.MapString(openFindCmdKey, cmd);\r\t\tDialog.Call(cmd, openFindCmdNotFoundKey, res);\r\t\tTextCmds.FindFirst(\"\")\r\tEND SelectCaseInSens;\r\r\r\tPROCEDURE NextChar (r: TextModels.Reader): CHAR;\r\t\tVAR ch: CHAR;\r\tBEGIN\r\t\tREPEAT r.ReadChar(ch) UNTIL (ch > \" \") OR r.eot;\r\t\t"
                    attr: 0
