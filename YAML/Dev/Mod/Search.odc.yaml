                    attr: 3
                  - text: " ch\r\tEND NextChar;\r\r\tPROCEDURE CompTexts (ta, tb: TextModels.Model; VAR sa, sb, ea, eb: INTEGER);\r\t\tVAR da, db, d, i, j, p: INTEGER; t: LONGINT; ra, rb: TextModels.Reader;\r\t\t\tcha, chb: CHAR; s: ARRAY N OF CHAR;\r\tBEGIN\r\t\tra := ta.NewReader(NIL); ra.SetPos(ea);\r\t\trb := tb.NewReader(NIL); rb.SetPos(eb);\r\t\tREPEAT\r\t\t\tcha := NextChar(ra); chb := NextChar(rb)\r\t\tUNTIL (cha # chb) OR ra.eot OR rb.eot;\r\t\tIF ra.eot THEN sa := ra.Pos() ELSE sa := ra.Pos() - 1 END;\r\t\tIF rb.eot THEN sb := rb.Pos() ELSE sb := rb.Pos() - 1 END;\r\t\tt := Kernel.Time() + T * Kernel.timeResolution;\r\t\tda := sa + 1; db := sb + 1; d := 1; j := 0;\r\t\tREPEAT\r\t\t\tea := da;\r\t\t\tIF ea < ta.Length() THEN\r\t\t\t\tra.SetPos(ea); s[0] := NextChar(ra);\r\t\t\t\tda := ra.Pos(); i := 1;\r\t\t\t\tWHILE i < N DO s[i] := NextChar(ra); INC(i) END;\r\t\t\t\ti := 0; rb.SetPos(sb);\r\t\t\t\tREPEAT\r\t\t\t\t\teb := rb.Pos(); chb := NextChar(rb);\r\t\t\t\t\tIF chb = s[0] THEN\r\t\t\t\t\t\tp := rb.Pos(); j := 0;\r\t\t\t\t\t\tWHILE (j < N) & (chb = s[j]) DO chb := NextChar(rb); INC(j) END;\r\t\t\t\t\t\trb.SetPos(p)\r\t\t\t\t\tEND;\r\t\t\t\t\tINC(i)\r\t\t\t\tUNTIL (j = N) OR (i = d) OR rb.eot\r\t\t\tEND;\r\t\t\tINC(d);\r\t\t\tIF j < N THEN\r\t\t\t\teb := db;\r\t\t\t\tIF eb < tb.Length() THEN\r\t\t\t\t\trb.SetPos(eb); s[0] := NextChar(rb);\r\t\t\t\t\tdb := rb.Pos(); i := 1;\r\t\t\t\t\tWHILE i < N DO s[i] := NextChar(rb); INC(i) END;\r\t\t\t\t\ti := 0; ra.SetPos(sa);\r\t\t\t\t\tREPEAT\r\t\t\t\t\t\tea := ra.Pos(); cha := NextChar(ra);\r\t\t\t\t\t\tIF cha = s[0] THEN\r\t\t\t\t\t\t\tp := ra.Pos(); j := 0;\r\t\t\t\t\t\t\tWHILE (j < N) & (cha = s[j]) DO cha := NextChar(ra); INC(j) END;\r\t\t\t\t\t\t\tra.SetPos(p)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tINC(i)\r\t\t\t\t\tUNTIL (j = N) OR (i = d) OR ra.eot\r\t\t\t\tEND\r\t\t\tEND\r\t\tUNTIL (j = N) OR (ea >= ta.Length()) & (eb >= tb.Length()) OR (Kernel.Time() > t);\r\t\tIF j < N THEN ea := ta.Length(); eb := tb.Length() END\r\tEND CompTexts;\r\r\tPROCEDURE "
