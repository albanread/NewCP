                  - text: "\r\tIMPORT\r\t\tServices, Ports, Stores, Models, Views, Controllers, Properties, Dialog, Containers, Documents,\r\t\tTextModels, TextMappers, TextViews, StdFolds;\r\r\tPROCEDURE Indent (VAR f: TextMappers.Formatter; level: INTEGER);\r\tBEGIN\r\t\tWHILE level > 0 DO f.WriteTab; DEC(level) END\r\tEND Indent;\r\r\tPROCEDURE WriteCause (VAR f: TextMappers.Formatter; cause: INTEGER);\r\tBEGIN\r\t\tf.rider.SetAttr(TextModels.NewColor(f.rider.attr, Ports.red));\r\t\tCASE cause OF\r\t\t| Stores.typeNotFound: f.WriteString(\"type in module not found\")\r\t\t| Stores.inconsModuleVersion: f.WriteString(\"inconsistent module version\")\r\t\t| Stores.invalidModuleFile: f.WriteString(\"invalid module file\")\r\t\t| Stores.moduleFileNotFound: f.WriteString(\"module not found\")\r\t\t| Stores.inconsistentType: f.WriteString(\"type path in module inconsistent with stored version\")\r\t\t| Stores.inconsistentVersion: f.WriteString(\"inconsistent version / program error\")\r\t\t| Stores.alienVersion: f.WriteString(\"alien version - outdated program\")\r\t\t| Stores.alienComponent: f.WriteString(\"alien component - required sub-part failed to internalize\")\r\t\tELSE f.WriteString(\"unknown (code\"); f.WriteInt(cause); f.WriteChar(\")\")\r\t\tEND;\r\t\tf.rider.SetAttr(TextModels.NewColor(f.rider.attr, Ports.black));\r\tEND WriteCause;\r\r\tPROCEDURE Out (VAR f: TextMappers.Formatter; level: INTEGER; st: Stores.Store);\r\t\tVAR t: Stores.TypeName;\r\r\t\tPROCEDURE OutAlien (VAR f: TextMappers.Formatter; \r\t\t\t\t\t\t\t\t\t\t\tpath: Stores.TypePath; cause: INTEGER; c: Stores.AlienComp);\r\t\t\tVAR i: INTEGER; t: TextModels.Model; form: TextMappers.Formatter;\r\t\tBEGIN\r\t\t\tf.WriteString(\" \");\r\t\t\tt := TextModels.dir.New(); form.ConnectTo(t);\r\r\t\t\tform.rider.SetAttr(TextModels.NewColor(form.rider.attr, Ports.blue));\r\t\t\tform.WriteString(path[0]); \r\t\t\tform.rider.SetAttr(TextModels.NewColor(form.rider.attr, Ports.black));\r\t\t\tform.WriteLn;\r\t\t\tINC(level);\r\t\t\tIF path[1] # \"\" THEN\r\t\t\t\tIndent(form, level); form.WriteString(\"path: (\");\r\t\t\t\ti := 1;\r\t\t\t\tWHILE path[i] # \"\" DO\r\t\t\t\t\tform.WriteString(path[i]);\r\t\t\t\t\tINC(i);\r\t\t\t\t\tIF path[i] # \"\" THEN form.WriteString(\", \") END\r\t\t\t\tEND;\r\t\t\t\tform.WriteChar(\")\"); form.WriteLn\r\t\t\tEND;\r\t\t\tIndent(form, level); form.WriteString(\"cause: \"); WriteCause(form, cause); form.WriteLn;\r\t\t\tIndent(form, level); form.WriteString(\"comps: \"); form.WriteLn;\r\t\t\tINC(level);\r\t\t\tWHILE c # NIL DO\r\t\t\t\tWITH c: Stores.AlienPiece DO\r\t\t\t\t\tIndent(form, level); form.WriteInt(c.len); form.WriteString(\" bytes data\"); form.WriteLn\r\t\t\t\t| c: Stores.AlienPart DO\r\t\t\t\t\tIF c.store # NIL THEN\r\t\t\t\t\t\tOut(form, level, c.store)\r\t\t\t\t\tELSE Indent(form, level); form.WriteString(\"NIL reference\"); form.WriteLn\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tc := c.next\r\t\t\tEND;\r\t\t\tDEC(level, 2);\r\t\t\tIndent(form, level);\r\t\t\t\r\t\t\tf.WriteView(StdFolds.dir.New(StdFolds.collapsed, \"\", t));\r\t\t\tf.rider.SetAttr(TextModels.NewColor(f.rider.attr, Ports.blue));\r\t\t\tf.WriteString(path[0]); \r\t\t\tf.rider.SetAttr(TextModels.NewColor(f.rider.attr, Ports.black));\r\t\t\tf.WriteView(StdFolds.dir.New(StdFolds.collapsed, \"\", NIL));\r\t\t\tf.WriteLn;\r\t\tEND OutAlien;\r\r\tBEGIN\r\t\tIndent(f, level);\r\t\tWITH st: Stores.Alien DO\r\t\t\tf.WriteString(\"Alien Store\"); OutAlien(f, st.path, st.cause, st.comps)\r\t\tELSE\r\t\t\tServices.GetTypeName(st, t);\r\t\t\tWITH st: Documents.Document DO f.WriteString(\"Document\")\r\t\t\t| st: Containers.Controller DO f.WriteString(\"Container Controller\")\r\t\t\t| st: Containers.View DO f.WriteString(\"Container View\")\r\t\t\t| st: Containers.Model DO f.WriteString(\"Container Model\")\r\t\t\t| st: Controllers.Controller DO f.WriteString(\"Controller\")\r\t\t\t| st: Views.View DO f.WriteString(\"View\")\r\t\t\t| st: Models.Model DO f.WriteString(\"Model\")\r\t\t\tELSE f.WriteString(\"Store\")\r\t\t\tEND;\r\t\t\tf.WriteString(' \"'); f.WriteString(t); f.WriteChar('\"'); f.WriteLn\r\t\tEND\r\tEND Out;\r\r\tPROCEDURE "
