                  - text: "\r\tIMPORT\r\t\tS := SYSTEM, Kernel, Strings,\r\t\tPorts, Models, Views, Services, Stores, Properties, Dialog, Controllers, Documents, DevDebug;\r\r\tCONST\r\t\tresolution = 8; (* "
                    attr: 0
                  - text: "one pixel represents "
                    attr: 1
                  - text: resolution
                    attr: 0
                  - text: " bytes"
                    attr: 1
                  - text: " *)\r\t\tlineW = 512; (* "
                    attr: 0
                  - text: "one line is 512 pixels long, i.e. represents 512 *"
                    attr: 1
                  - text: " resolution "
                    attr: 0
                  - text: bytes
                    attr: 1
                  - text: " *)\r\t\tlineH = 5; (* "
                    attr: 0
                  - text: "one line is "
                    attr: 1
                  - text: "lineH "
                    attr: 0
                  - text: pixels high
                    attr: 1
                  - text: " *)\r\t\tlineVertM = 3; (* "
                    attr: 0
                  - text: margin between two lines
                    attr: 1
                  - text: " *)\r\t\tlineHorM = 2; (* "
                    attr: 0
                  - text: margin between vertical cluster edge and lines
                    attr: 1
                  - text: " *)\r\t\tcluW = lineW + 2*lineHorM;\r\t\tcluHorM = 4; (* cluHorM "
                    attr: 0
                  - text: pixels between left view edge and vertical cluster edge
                    attr: 1
                  - text: " *)\r\t\tcluTopM = 8; (* cluTopM "
                    attr: 0
                  - text: pixels between clusters
                    attr: 1
                  - text: " *)\r\t\t\r\t\tW = (2*cluHorM + cluW) * Ports.point;\r\r\tTYPE\r\t\tBlock = POINTER TO RECORD [untagged]\r\t\t\ttag: Kernel.Type;\r\t\t\tsize: INTEGER;\t\t"
                    attr: 0
                  - text: "(* size of free blocks *)\r"
                    attr: 1
                  - text: "\t\t\tactual: INTEGER;\r\t\t\tfirst: INTEGER\r\t\tEND;\r\t\tCluster = POINTER TO RECORD [untagged]\r\t\t\tsize: INTEGER;\t"
                    attr: 0
                  - text: "(* total size *)"
                    attr: 1
                  - text: "\r\t\t\tnext: Cluster;\r\t\tEND;\r\r\t\tView = POINTER TO RECORD (Views.View)\r\t\t\theight: INTEGER\r\t\tEND;\r\t\t\r\t\tModel = POINTER TO RECORD (Models.Model)\r\t\t\talloc: INTEGER\r\t\tEND;\r\t\t\r\t\tAction = POINTER TO RECORD (Services.Action) END;\r\r\t\tMsg = RECORD (Models.Message) END;\r\t\t\r\tVAR\r\t\tmem: Model;\r\t\tpar-: RECORD\r\t\t\tallocated-: INTEGER; (* "
                    attr: 0
                  - text: number of bytes currently allocated
                    attr: 1
                  - text: " *)\r\t\t\tclusters-: INTEGER; (* "
                    attr: 0
                  - text: number of clusters currently allocated
                    attr: 1
                  - text: " *)\r\t\t\theapsize-: INTEGER (* "
                    attr: 0
                  - text: total bytes currently allocated for heap
                    attr: 1
                  - text: " *)\r\t\tEND;\r\r\tPROCEDURE Append (VAR s: ARRAY OF CHAR; t: ARRAY OF CHAR);\r\t\tVAR len, i, j: INTEGER; ch: CHAR;\r\tBEGIN\r\t\tlen := LEN(s);\r\t\ti := 0; WHILE s[i] # 0X DO INC(i) END;\r\t\tj := 0; REPEAT ch := t[j]; s[i] := ch; INC(j); INC(i) UNTIL (ch = 0X) OR (i = len);\r\t\ts[len - 1] := 0X\r\tEND Append;\r\r\tPROCEDURE SizeOf (f: SHORTCHAR; t: Kernel.Type): INTEGER;\r\t\tVAR x: INTEGER;\r\tBEGIN\r\t\tCASE f OF\r\t\t| 0BX: "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " 0\r\t\t| 1X, 2X, 4X: "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " 1\r\t\t| 3X, 5X: "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " 2\r\t\t| 8X, 0AX: "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " 8\r\t\t| 11X: "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " t.size\r\t\t| 12X:\r\t\t\tx := S.VAL(INTEGER, t.base[0]);\r\t\t\tIF x DIV 256 # 0 THEN x := t.base[0].id MOD 4 + 16 END;\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " t.size * SizeOf(SHORT(CHR(x)), t.base[0])\r\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " 4\r\t\tEND\r\tEND SizeOf;\r\r\tPROCEDURE FormOf (t: Kernel.Type): SHORTCHAR;\r\tBEGIN\r\t\tIF S.VAL(INTEGER, t) DIV 256 = 0 THEN\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " SHORT(CHR(S.VAL(INTEGER, t)))\r\t\tELSE\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " SHORT(CHR(16 + t.id MOD 4))\r\t\tEND\r\tEND FormOf;\r\t\t\r\tPROCEDURE WriteName (t: Kernel.Type; OUT s: ARRAY OF CHAR);\r\t\tVAR modName"
                    attr: 0
                  - text: ","
                    attr: 4
                  - text: " name: Kernel.Name; f: SHORTCHAR;\r\tBEGIN\r\t\tf := FormOf(t);\r\t\tCASE f OF\r\t\t| 0X: Dialog.MapString(\"#Dev:Undefined\", s)\r\t\t| 1X: s := \"BOOLEAN\"\r\t\t| 2X: s := \"SHORTCHAR\"\r\t\t| 3X: s := \"CHAR\"\r\t\t| 4X: s := \"BYTE\"\r\t\t| 5X: s := \"SHORTINT\"\r\t\t| 6X: s := \"INTEGER\"\r\t\t| 7X: s := \"SHORTREAL\"\r\t\t| 8X: s := \"REAL\"\r\t\t| 9X: s := \"SET\"\r\t\t| 0AX: s := \"LONGINT\"\r\t\t| 0BX: s := \"ANYREC\"\r\t\t| 0CX: s := \"ANYPTR\"\r\t\t| 0DX: s := \"POINTER\"\r\t\t| 0EX: s := \"PROCEDURE\"\r\t\t| 0FX: s := \"STRING\"\r\t\t| 10X, 11X, 13X:\r\t\t\tIF (t.id DIV 256 # 0) & (t.mod.refcnt >= 0) THEN\r\t\t\t\tKernel.GetModName(t.mod, modName); s := modName$; Append(s, \".\");\r\t\t\t\tKernel.GetTypeName(t, name); Append(s, name)\r"
                    attr: 0
                  - text: "\t\t\t\t"
                    attr: 4
                  - text: "(* s := modName + \".\" + name; *)"
                    attr: 1
                  - text: "\r"
                    attr: 4
                  - text: "\t\t\tELSIF f = 11X THEN\r\t\t\t\tKernel.GetModName(t.mod, modName); s := modName$; Append(s, \".RECORD\"); \r\t\t\t\t"
                    attr: 0
                  - text: "(* s := modName + \".RECORD\";  *)"
                    attr: 1
                  - text: "\r"
                    attr: 4
                  - text: "\t\t\tELSIF f = 13X THEN\r\t\t\t\ts := \"POINTER\"\r\t\t\tELSE\r\t\t\t\ts := \"PROCEDURE\"\r\t\t\tEND\r\t\t| 20X: s := \"COM.IUnknown\"\r\t\t| 21X: s := \"COM.GUID\"\r\t\t| 22X: s := \"COM.RESULT\"\r\t\tELSE Dialog.MapString(\"#Dev:UnknownFormat\", s)\r\t\tEND\r\tEND WriteName;\r\t\t\r\tPROCEDURE Next (b: Block): Block;\t"
                    attr: 0
                  - text: "(* next block in same cluster *)"
                    attr: 1
                  - text: "\r\t\tVAR size: INTEGER; tag: Kernel.Type;\r\tBEGIN\r\t\ttag := S.VAL(Kernel.Type, S.VAL(INTEGER, b.tag) DIV 4 * 4);\r\t\tsize := tag.size + 4;\r\t\tIF ODD(S.VAL(INTEGER, b.tag) DIV 2) THEN size := b.size - S.ADR(b.size) + size END;\r\t\tsize := (size + 15) DIV 16 * 16;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " S.VAL(Block, S.VAL(INTEGER, b) + size)\r\tEND Next;\r\r\tPROCEDURE ClusterHeight (size: INTEGER): INTEGER;\r\t\t(* "
                    attr: 0
                  - text: height of a cluster in pixels
                    attr: 1
                  - text: " *)\r\t\tVAR noflines: INTEGER;\r\tBEGIN\r\t\tnoflines := ((size DIV resolution) + (lineW-1)) DIV lineW;\r\t\tRETURN noflines * (lineH + lineVertM) + lineVertM;\r\tEND ClusterHeight;\r\r\tPROCEDURE ViewHeight(): INTEGER;\r\t\t(* "
                    attr: 0
                  - text: height of view in universal units
                    attr: 1
                  - text: " *)\r\t\tVAR cluster: Cluster; h: INTEGER;\r\tBEGIN\r\t\tcluster := S.VAL(Cluster, Kernel.Root()); h := 0;\r\t\tWHILE cluster # NIL DO\r\t\t\tINC(h, (cluTopM + ClusterHeight(cluster.size)) * Ports.point);\r\t\t\tcluster := cluster.next;\r\t\tEND;\r\t\tINC(h, cluTopM * Ports.point);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " h;\r\tEND ViewHeight;\r\r\tPROCEDURE PaintMem (f: Views.Frame; top, bottom: INTEGER);\r\t\tVAR cluster: Cluster; b0, blk, next: Block; end: INTEGER;\r\t\t\tclusterTop, clusterH, x, x1, y: INTEGER; (* units *)\r\t\t\tdot, painted, runlen: INTEGER;\r\t\t\tc, c0: INTEGER;\r\tBEGIN\r\t\tdot := (Ports.point DIV f.dot) * f.dot;\r\t\tIF dot = 0 THEN dot := f.dot END;\r\t\tclusterTop := 0;\r\t\tcluster := S.VAL(Cluster, Kernel.Root());\r\t\tWHILE cluster # NIL DO\r\t\t\tINC(clusterTop, cluTopM*dot);\r\t\t\tclusterH := ClusterHeight(cluster.size) * dot;\r\t\t\tIF (clusterTop - cluTopM < bottom) OR (clusterTop + clusterH > top) THEN\r\t\t\t\tf.DrawRect(cluHorM*dot, clusterTop, (cluHorM+cluW)*dot, clusterTop + clusterH,\r\t\t\t\t\t\t\tPorts.fill, Ports.grey25);\r\t\t\t\t(* "
                    attr: 0
                  - text: scan cluster and draw blocks
                    attr: 1
                  - text: " *)\r\t\t\t\tblk := S.VAL(Block, S.VAL(INTEGER, cluster) + 12);\r\t\t\t\tend := S.VAL(INTEGER, blk) + (cluster.size - 12) DIV 16 * 16;\r\t\t\t\tb0 := blk; c0 := -1;\r\t\t\t\ty := clusterTop + lineVertM*dot;\r\t\t\t\tpainted := 16 DIV resolution; (* "
                    attr: 0
                  - text: nof pixels already painted on current line
                    attr: 1
                  - text: " *)\r\t\t\t\tx := (cluHorM+lineHorM+painted)*dot;\r\t\t\t\tWHILE S.VAL(INTEGER, blk) < end DO\r\t\t\t\t\tIF S.VAL(INTEGER, blk.tag) = S.ADR(blk.size) THEN (*"
                    attr: 0
                  - text: " free block "
                    attr: 1
                  - text: "*)\r\t\t\t\t\t\tc := -1; next := S.VAL(Block, S.VAL(INTEGER, blk) + blk.size + 4)\r\t\t\t\t\tELSIF 1 IN S.VAL(SET, blk.tag) THEN (*"
                    attr: 0
                  - text: " array "
                    attr: 1
                  - text: "*)\r\t\t\t\t\t\tc := Ports.blue; next := Next(blk)\r\t\t\t\t\tELSE (* "
                    attr: 0
                  - text: "record "
                    attr: 1
                  - text: "*)\r\t\t\t\t\t\tc := Ports.red; next := S.VAL(Block, S.VAL(INTEGER, blk) + (blk.tag.size + 19) DIV 16 * 16)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF c # c0 THEN\r\t\t\t\t\t\trunlen := (S.VAL(INTEGER, blk) - S.VAL(INTEGER, b0)) DIV resolution;\r\t\t\t\t\t\tWHILE runlen > lineW-painted DO\r\t\t\t\t\t\t\tx1 := (cluHorM+lineHorM+lineW)*dot;\r\t\t\t\t\t\t\tIF (c0 # -1) & (x < x1) THEN\r\t\t\t\t\t\t\t\tf.DrawRect(x, y, x1, y + lineH * dot, Ports.fill, c0)\r\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\tDEC(runlen, lineW-painted); painted := 0;\r\t\t\t\t\t\t\tx := (cluHorM+lineHorM)*dot; INC(y, (lineH+lineVertM) * dot);\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF runlen > 0 THEN\r\t\t\t\t\t\t\tIF c0 # -1 THEN f.DrawRect(x, y, x + runlen*dot, y + lineH * dot, Ports.fill, c0) END;\r\t\t\t\t\t\t\tINC(painted, runlen); INC(x, runlen*dot);\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tb0 := blk; c0 := c\r\t\t\t\t\tEND;\r\t\t\t\t\tblk := next\r\t\t\t\tEND;\r\t\t\t\tIF c0 # -1 THEN\r\t\t\t\t\trunlen := (S.VAL(INTEGER, end) - S.VAL(INTEGER, b0)) DIV resolution;\r\t\t\t\t\tWHILE runlen > lineW-painted DO\r\t\t\t\t\t\tf.DrawRect(x, y, (cluHorM+lineHorM+lineW)*dot, y + lineH * dot, Ports.fill, c0);\r\t\t\t\t\t\tDEC(runlen, lineW-painted); painted := 0;\r\t\t\t\t\t\tx := (cluHorM+lineHorM)*dot; INC(y, (lineH+lineVertM) * dot);\r\t\t\t\t\tEND;\r\t\t\t\t\tIF runlen > 0 THEN f.DrawRect(x, y, x + runlen*dot, y + lineH * dot, Ports.fill, c0) END;\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tcluster := cluster.next;\r\t\t\tINC(clusterTop, clusterH);\r\t\tEND\r\tEND PaintMem;\r\r\tPROCEDURE MarkBlock (f: Views.Frame; sel: Block; on: BOOLEAN);\r\t\tVAR cluster: Cluster; next: Block; end, offs, dot, col: INTEGER; found: BOOLEAN;\r\t\t\tclusterTop, x, y, r, e: INTEGER; (* "
                    attr: 0
                  - text: units
                    attr: 1
                  - text: " *)\r\tBEGIN\r\t\tdot := (Ports.point DIV f.dot) * f.dot;\r\t\tIF dot = 0 THEN dot := f.dot END;\r\t\tclusterTop := 0;\r\t\tcluster := S.VAL(Cluster, Kernel.Root()); found := FALSE;\r\t\tWHILE (cluster # NIL) & ~found DO\r\t\t\tend := S.VAL(INTEGER, cluster) + 12 + (cluster.size - 12) DIV 16 * 16;\r\t\t\tINC(clusterTop, cluTopM * dot);\r\t\t\tIF (S.VAL(INTEGER, cluster) <= S.VAL(INTEGER, sel)) & (S.VAL(INTEGER, sel) < end) THEN\r\t\t\t\tfound := TRUE;\r\t\t\tELSE\r\t\t\t\tINC(clusterTop, ClusterHeight(cluster.size) * dot);\r\t\t\t\tcluster := cluster.next;\r\t\t\tEND\r\t\tEND;\r\t\tIF found THEN (* sel "
                    attr: 0
                  - text: is contained in
                    attr: 1
                  - text: " cluster *)\r\t\t\tIF on THEN col := Ports.green\r\t\t\tELSIF 1 IN S.VAL(SET, sel.tag) THEN col := Ports.blue\r\t\t\tELSE col := Ports.red\r\t\t\tEND;\r\t\t\tnext := Next(sel);\r\t\t\tr := (cluHorM + lineHorM + lineW) * dot;\r\t\t\toffs := (S.VAL(INTEGER, sel) + 4 (* "
                    attr: 0
                  - text: tag
                    attr: 1
                  - text: " *) - S.VAL(INTEGER, cluster)) DIV resolution;\r\t\t\ty := clusterTop + ((offs DIV lineW) * (lineH+lineVertM) + lineVertM) * dot;\r\t\t\tx := (cluHorM + lineHorM + (offs MOD lineW)) * dot;\r\t\t\te := x + (S.VAL(INTEGER, next) - S.VAL(INTEGER, sel)) DIV resolution * dot;\r\t\t\tWHILE e >= r DO\r\t\t\t\tf.DrawRect(x, y, r, y + lineH * dot, Ports.fill, col);\r\t\t\t\tINC(y, (lineH + lineVertM) * dot);\r\t\t\t\tx := (cluHorM + lineHorM) * dot;\r\t\t\t\te := x + e - r;\r\t\t\tEND;\r\t\t\tIF e > x THEN f.DrawRect(x, y, e, y + lineH * dot, Ports.fill, col) END;\r\t\tEND\r\tEND MarkBlock;\r\r\tPROCEDURE ThisCluster (f: Views.Frame; sx, sy: INTEGER): Cluster;\r\t\tVAR cluster: Cluster; dot, clusterTop, clusterH: INTEGER;\r\tBEGIN\r\t\tdot := (Ports.point DIV f.dot) * f.dot;\r\t\tIF dot = 0 THEN dot := f.dot END;\r\t\tcluster := NIL;\r\t\tIF (cluHorM * dot <= sx) & (sx < (cluHorM + 2*lineHorM + lineW) * dot) THEN\r\t\t\tcluster := S.VAL(Cluster, Kernel.Root());\r\t\t\tclusterTop := 0;\r\t\t\tWHILE cluster # NIL DO\r\t\t\t\tINC(clusterTop, cluTopM * dot);\r\t\t\t\tclusterH := ClusterHeight(cluster.size) * dot;\r\t\t\t\tIF (clusterTop <= sy) & (sy < clusterTop + clusterH) THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " cluster\r\t\t\t\tELSE INC(clusterTop, clusterH); cluster := cluster.next;\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " cluster;\r\tEND ThisCluster;\r\r\tPROCEDURE ThisBlock (f: Views.Frame; sx, sy: INTEGER): Block;\r\t\tVAR cluster: Cluster; blk, next: Block; found: BOOLEAN;\r\t\t\tdot, lineno, offs, end, adr: INTEGER;\r\t\t\tclusterTop, clusterH: INTEGER;\r\tBEGIN\r\t\tdot := (Ports.point DIV f.dot) * f.dot;\r\t\tIF dot = 0 THEN dot := f.dot END;\r\t\tIF (sx < (cluHorM + lineHorM) * dot) OR ((cluHorM + lineHorM + lineW) * dot <= sx) THEN\r\t\t\t"
                    attr: 0
