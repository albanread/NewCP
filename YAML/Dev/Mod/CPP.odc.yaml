                  - text: "\r\t\t\tEND;\r\t\t\tu := next\r\t\tEND;\r\t\tREPEAT\t"
                    attr: 0
                  - text: "(* iteration for multy level alias *)"
                    attr: 1
                  - text: "\r\t\t\tu := userList; userList := NIL; progress := FALSE;\r\t\t\tWHILE u # NIL DO\r\t\t\t\tnext := u.next;\r\t\t\t\tIF IncompleteType(u.base.typ) THEN\r\t\t\t\t\tu.next := userList; userList := u\t"
                    attr: 0
                  - text: "(* reinsert *)"
                    attr: 1
                  - text: "\r\t\t\t\tELSE\r\t\t\t\t\tprogress := TRUE;\r\t\t\t\t\tFixType(u.struct, u.obj, u.base.typ, u.pos)\r\t\t\t\tEND;\r\t\t\t\tu := next\r\t\t\tEND\r\t\tUNTIL (userList = NIL) OR ~progress;\r\t\tu := userList;\t"
                    attr: 0
                  - text: "(* remaining type relations are cyclic *)"
                    attr: 1
                  - text: "\r\t\tWHILE u # NIL DO\r\t\t\tIF (u.obj = NIL) OR (u.obj.mode = Typ) THEN DevCPM.Mark(58, u.pos) END;\r\t\t\tu := u.next\r\t\tEND;\r\tEND CheckForwardTypes;\r\t\r\tPROCEDURE CheckUnimpl (m: DevCPT.Object; typ: DevCPT.Struct; pos: INTEGER);\r\t\tVAR obj: DevCPT.Object; res: INTEGER; n: ARRAY LEN(DevCPT.Name) OF CHAR;\r\tBEGIN\r\t\tIF m # NIL THEN\r\t\t\tIF (m.mode = TProc) & (absAttr IN m.conval.setval) THEN\r\t\t\t\tDevCPT.FindField(m.name^, typ, obj);\r\t\t\t\tIF (obj = NIL) OR (obj.mode # TProc) OR (absAttr IN obj.conval.setval) THEN\r\t\t\t\t\tDevCPM.Mark(192, pos);\r\t\t\t\t\tDevCPM.LogWLn; DevCPM.LogWStr(\"  \"); Strings.Utf8ToString(m.name^, n, res); DevCPM.LogWStr(n);\r\t\t\t\t\tDevCPM.LogWStr(\" not implemented\");\r\t\t\t\t\tIF typ.strobj # NIL THEN\r\t\t\t\t\t\tDevCPM.LogWStr(\" in \"); Strings.Utf8ToString(typ.strobj.name^, n, res); DevCPM.LogWStr(n)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tCheckUnimpl(m.left, typ, pos);\r\t\t\tCheckUnimpl(m.right, typ, pos)\r\t\tEND\r\tEND CheckUnimpl;\r\t\r\tPROCEDURE CheckRecords (rec: Elem);\r\t\tVAR b: DevCPT.Struct;\r\tBEGIN\r\t\tWHILE rec # NIL DO\t"
