                  - text: "\t\t\tIF lab = NIL THEN lab := x; Insert(root)\r\t\t\tELSIF yval < lab.conval.intval - 1 THEN x.link := lab; lab := x; Insert(root)\r\t\t\tELSIF yval = lab.conval.intval - 1 THEN x.hint := 1; Insert(root); lab.conval.intval := xval\r\t\t\tELSIF xval = lab.conval.intval2 + 1 THEN x.hint := 1; Insert(root); lab.conval.intval2 := yval\r\t\t\tELSE\r\t\t\t\ty := lab;\r\t\t\t\tWHILE (y.link # NIL) & (xval > y.link.conval.intval2 + 1) DO y := y.link END;\r\t\t\t\tIF y.link = NIL THEN y.link := x; Insert(root)\r\t\t\t\tELSIF yval < y.link.conval.intval - 1 THEN x.link := y.link; y.link := x; Insert(root)\r\t\t\t\tELSIF yval = y.link.conval.intval - 1 THEN x.hint := 1; Insert(root); y.link.conval.intval := xval\r\t\t\t\tELSIF xval = y.link.conval.intval2 + 1 THEN x.hint := 1; Insert(root); y.link.conval.intval2 := yval\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF sym = comma THEN DevCPS.Get(sym)\r\t\t\tELSIF (sym = number) OR (sym = ident) THEN err(comma)\r\t\t\tELSE EXIT\r\t\t\tEND\r\t\tEND\r\tEND CaseLabelList;\r\t\r\tPROCEDURE StatSeq(VAR stat: DevCPT.Node);\r\t\tVAR fpar, id, t: DevCPT.Object; idtyp: DevCPT.Struct; e: BOOLEAN;\r\t\t\t\ts, x, y, z, apar, last, lastif, pre, lastp: DevCPT.Node; pos, p: INTEGER;\r\r\t\tPROCEDURE CasePart(VAR x: DevCPT.Node);\r\t\t\tVAR low, high: INTEGER; e: BOOLEAN; cases, lab, y, lastcase, "
                    attr: 0
                  - text: root
