                    attr: 3
                  - text: "\r\t\t\tEND\r\t\tEND\r\tEND selector;\r\r\tPROCEDURE StandProcCall(VAR x: DevCPT.Node);\r\t\tVAR y: DevCPT.Node; m: BYTE; n: SHORTINT;\r\tBEGIN m := SHORT(SHORT(x.obj.adr)); n := 0;\r\t\tIF sym = lparen THEN DevCPS.Get(sym);\r\t\t\tIF sym # rparen THEN\r\t\t\t\tLOOP\r\t\t\t\t\tIF n = 0 THEN Expression(x); DevCPB.StPar0(x, m); n := 1\r\t\t\t\t\tELSIF n = 1 THEN Expression(y); DevCPB.StPar1(x, y, m); n := 2\r\t\t\t\t\tELSE Expression(y); DevCPB.StParN(x, y, m, n); INC(n)\r\t\t\t\t\tEND ;\r\t\t\t\t\tIF sym = comma THEN DevCPS.Get(sym)\r\t\t\t\t\tELSIF (lparen <= sym) & (sym <= ident) THEN err(comma)\r\t\t\t\t\tELSE EXIT\r\t\t\t\t\tEND\r\t\t\t\tEND ;\r\t\t\t\tCheckSym(rparen)\r\t\t\tELSE DevCPS.Get(sym)\r\t\t\tEND ;\r\t\t\tDevCPB.StFct(x, m, n)\r\t\tELSE err(lparen)\r\t\tEND ;\r\t\tIF (level > 0) & ((m = newfn) OR (m = sysnewfn)) THEN DevCPT.topScope.link.leaf := FALSE END\r\tEND StandProcCall;\r\t\r\tPROCEDURE Element(VAR x: DevCPT.Node);\r\t\tVAR y: DevCPT.Node;\r\tBEGIN Expression(x);\r\t\tIF sym = upto THEN\r\t\t\tDevCPS.Get(sym); Expression(y); DevCPB.SetRange(x, y)\r\t\tELSE DevCPB.SetElem(x)\r\t\tEND\r\tEND Element;\r\r\tPROCEDURE Sets(VAR x: DevCPT.Node);\r\t\tVAR y: DevCPT.Node;\r\tBEGIN\r\t\tIF sym # rbrace THEN\r\t\t\tElement(x);\r\t\t\tLOOP\r\t\t\t\tIF sym = comma THEN DevCPS.Get(sym)\r\t\t\t\tELSIF (lparen <= sym) & (sym <= ident) THEN err(comma)\r\t\t\t\tELSE EXIT\r\t\t\t\tEND ;\r\t\t\t\tElement(y); DevCPB.Op(plus, x, y)\r\t\t\tEND\r\t\tELSE x := DevCPB.EmptySet()\r\t\tEND ;\r\t\tCheckSym(rbrace)\r\tEND Sets;\r\t\r\tPROCEDURE Factor(VAR x: DevCPT.Node);\r\t\tVAR fpar, id: DevCPT.Object; apar: DevCPT.Node;\r\tBEGIN\r\t\tIF sym < not THEN err(13);\r\t\t\tREPEAT DevCPS.Get(sym) UNTIL sym >= lparen\r\t\tEND ;\r\t\tIF sym = ident THEN\r\t\t\tqualident(id); x := DevCPB.NewLeaf(id); selector(x);\r\t\t\tIF (x.class = Nproc) & (x.obj.mode = SProc) THEN StandProcCall(x)\t(* x may be NIL *)\r(*\r\t\t\tELSIF sym = lparen THEN\r\t\t\t\tDevCPS.Get(sym); DevCPB.PrepCall(x, fpar);\r\t\t\t\tActualParameters(apar, fpar);\r\t\t\t\tDevCPB.Call(x, apar, fpar);\r\t\t\t\tCheckSym(rparen);\r\t\t\t\tIF level > 0 THEN DevCPT.topScope.link.leaf := FALSE END\r*)\r\t\t\tEND\r\t\tELSIF sym = number THEN\r\t\t\tCASE DevCPS.numtyp OF\r\t\t\t   char:\r\t\t\t\tx := DevCPB.NewIntConst(DevCPS.intval); x.typ := DevCPT.char8typ;\r\t\t\t\tIF DevCPS.intval > 255 THEN x.typ := DevCPT.char16typ END\r\t\t\t| integer: x := DevCPB.NewIntConst(DevCPS.intval)\r\t\t\t| int64: x := DevCPB.NewLargeIntConst(DevCPS.intval, DevCPS.realval)\r\t\t\t| real: x := DevCPB.NewRealConst(DevCPS.realval, NIL)\r\t\t\t| real32: x := DevCPB.NewRealConst(DevCPS.realval, DevCPT.real32typ)\r\t\t\t| real64: x := DevCPB.NewRealConst(DevCPS.realval, DevCPT.real64typ)\r\t\t\tEND ;\r\t\t\tDevCPS.Get(sym)\r\t\tELSIF sym = string THEN\r\t\t\tx := DevCPB.NewString(DevCPS.str, DevCPS.lstr, DevCPS.intval);\r\t\t\tDevCPS.Get(sym)\r\t\tELSIF sym = nil THEN\r\t\t\tx := DevCPB.Nil(); DevCPS.Get(sym)\r\t\tELSIF sym = lparen THEN\r\t\t\tDevCPS.Get(sym); Expression(x); CheckSym(rparen)\r\t\tELSIF sym = lbrak THEN\r\t\t\tDevCPS.Get(sym); err(lparen); Expression(x); CheckSym(rparen)\r\t\tELSIF sym = lbrace THEN DevCPS.Get(sym); Sets(x)\r\t\tELSIF sym = not THEN\r\t\t\tDevCPS.Get(sym); Factor(x); DevCPB.MOp(not, x)\r\t\tELSE err(13); DevCPS.Get(sym); x := NIL\r\t\tEND ;\r\t\tIF x = NIL THEN x := DevCPB.NewIntConst(1); x.typ := DevCPT.undftyp END\r\tEND Factor;\r\r\tPROCEDURE Term(VAR x: DevCPT.Node);\r\t\tVAR y: DevCPT.Node; mulop: BYTE;\r\tBEGIN Factor(x);\r\t\tWHILE (times <= sym) & (sym <= and) DO\r\t\t\tmulop := sym; DevCPS.Get(sym);\r\t\t\tFactor(y); DevCPB.Op(mulop, x, y)\r\t\tEND\r\tEND Term;\r\r\tPROCEDURE SimpleExpression(VAR x: DevCPT.Node);\r\t\tVAR y: DevCPT.Node; addop: BYTE;\r\tBEGIN\r\t\tIF sym = minus THEN DevCPS.Get(sym); Term(x); DevCPB.MOp(minus, x)\r\t\tELSIF sym = plus THEN DevCPS.Get(sym); Term(x); DevCPB.MOp(plus, x)\r\t\tELSE Term(x)\r\t\tEND ;\r\t\tWHILE (plus <= sym) & (sym <= or) DO\r\t\t\taddop := sym; DevCPS.Get(sym); Term(y); \r\t\t\tIF x.typ.form = Pointer THEN DevCPB.DeRef(x) END;\r\t\t\tIF (x.typ.comp IN {Array, DynArr}) & (x.typ.BaseTyp.form IN charSet) (* OR (x.typ.sysflag = jstr) *) THEN\r\t\t\t\tDevCPB.StrDeref(x)\r\t\t\tEND;\r\t\t\tIF y.typ.form = Pointer THEN DevCPB.DeRef(y) END;\r\t\t\tIF (y.typ.comp IN {Array, DynArr}) & (y.typ.BaseTyp.form IN charSet) (* OR (y.typ.sysflag = jstr) *) THEN\r\t\t\t\tDevCPB.StrDeref(y)\r\t\t\tEND;\r\t\t\tDevCPB.Op(addop, x, y)\r\t\tEND\r\tEND SimpleExpression;\r\r\tPROCEDURE Expression(VAR x: DevCPT.Node);\r\t\tVAR y, pre, last: DevCPT.Node; obj: DevCPT.Object; relation: BYTE;\r\tBEGIN SimpleExpression(x);\r\t\tIF (eql <= sym) & (sym <= geq) THEN\r\t\t\trelation := sym; DevCPS.Get(sym); SimpleExpression(y);\r\t\t\tpre := NIL; last := NIL;\r\t\t\tIF (x.typ.comp IN {Array, DynArr}) & (x.typ.BaseTyp.form IN charSet) THEN\r\t\t\t\tDevCPB.StrDeref(x)\r\t\t\tEND;\r\t\t\tIF (y.typ.comp IN {Array, DynArr}) & (y.typ.BaseTyp.form IN charSet) THEN\r\t\t\t\tDevCPB.StrDeref(y)\r\t\t\tEND;\r\t\t\tDevCPB.CheckBuffering(x, NIL, NIL, pre, last);\r\t\t\tDevCPB.CheckBuffering(y, NIL, NIL, pre, last);\r\t\t\tDevCPB.Op(relation, x, y);\r\t\t\tIF pre # NIL THEN DevCPB.Construct(Ncomp, pre, x); pre.typ := x.typ; x := pre END\r\t\tELSIF sym = in THEN\r\t\t\tDevCPS.Get(sym); SimpleExpression(y); DevCPB.In(x, y)\r\t\tELSIF sym = is THEN\r\t\t\tDevCPS.Get(sym);\r\t\t\tIF sym = ident THEN\r\t\t\t\tqualident(obj);\r\t\t\t\tIF obj.mode = Typ THEN DevCPB.TypTest(x, obj, FALSE)\r\t\t\t\tELSE err(52)\r\t\t\t\tEND\r\t\t\tELSE err(ident)\r\t\t\tEND\r\t\tEND\r\tEND Expression;\r\r\tPROCEDURE ProcedureDeclaration(VAR x: DevCPT.Node);\r\t\tVAR proc, fwd: DevCPT.Object;\r\t\t\tname: DevCPT.Name;\r\t\t\tmode: BYTE;\r\t\t\tforward: BOOLEAN;\r"
                    attr: 0
                  - text: "\t\t\tsys: SHORTINT;\r"
                    attr: 3
                  - text: "\r\t\tPROCEDURE GetCode;\r\t\t\tVAR ext: DevCPT.ConstExt; i, n, c: INTEGER; s, s2: POINTER TO ARRAY OF SHORTCHAR;\r\t\tBEGIN\r\t\t\tn := 0;\r\t\t\tIF sym = string THEN\r\t\t\t\tNEW(ext, DevCPS.intval);\r\t\t\t\tWHILE DevCPS.str[n] # 0X DO ext[n+1] := DevCPS.str[n]; INC(n) END ;\r\t\t\t\text^[0] := SHORT(CHR(n)); DevCPS.Get(sym);\r\t\t\tELSE\r\t\t\t\tNEW(s, 256);\r\t\t\t\tLOOP\r\t\t\t\t\tIF sym = number THEN c := DevCPS.intval; INC(n); i := LEN(s^);\r\t\t\t\t\t\tIF n > i THEN\t(* if overflow then increase size of array s *)\r\t\t\t\t\t\t\tNEW(s2, i * 2); WHILE i > 0 DO DEC(i); s2^[i] := s^[i] END; s := s2; s2 := NIL;\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF (c < 0) OR (c > 255) OR (n = MAX(INTEGER)) THEN\r\t\t\t\t\t\t\terr(63); c := 1; n := 1\r\t\t\t\t\t\tEND ;\r\t\t\t\t\t\tDevCPS.Get(sym); s[n - 1] := SHORT(CHR(c))\r\t\t\t\t\tEND ;\r\t\t\t\t\tIF sym = comma THEN DevCPS.Get(sym)\r\t\t\t\t\tELSIF sym = number THEN err(comma)\r\t\t\t\t\tELSE EXIT\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tIF n # 0 THEN NEW(ext, n); i := 0;\r\t\t\t\t\tWHILE i < n DO ext[i] := s[i]; INC(i) END;\r\t\t\t\tELSE ext := NIL\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tproc.conval.ext := ext;\r\t\t\tINCL(proc.conval.setval, hasBody)\r\t\tEND GetCode;\r\r\t\tPROCEDURE GetParams;\r\t\t\tVAR name: DevCPT.String;\r\t\tBEGIN\r\t\t\tproc.mode := mode; proc.typ := DevCPT.notyp;\r\t\t\t"
                    attr: 0
                  - text: "proc.sysflag := SHORT(sys);"
                    attr: 3
                  - text: "\r\t\t\tproc.conval.setval := {};\r\t\t\tIF sym = lparen THEN\r\t\t\t\tDevCPS.Get(sym); FormalParameters(proc.link, proc.typ, name);\r\t\t\t\tIF name # NIL THEN err(0) END\r\t\t\tEND;\r\t\t\tCheckForwardTypes; userList := NIL;\r\t\t\tIF fwd # NIL THEN\r\t\t\t\tDevCPB.CheckParameters(proc.link, fwd.link, TRUE);\r\t\t\t\tIF ~DevCPT.EqualType(proc.typ, fwd.typ) THEN err(117) END ;\r\t\t\t\tproc := fwd; DevCPT.topScope := proc.scope;\r\t\t\t\tIF mode = IProc THEN proc.mode := IProc END\r\t\t\tEND\r\t\tEND GetParams;\r\r\t\tPROCEDURE Body;\r\t\t\tVAR procdec, statseq: DevCPT.Node; c: INTEGER;\r\t\tBEGIN\r\t\t\tc := DevCPM.errpos;\r\t\t\tINCL(proc.conval.setval, hasBody);\r\t\t\tCheckSym(semicolon); Block(procdec, statseq);\r\t\t\tDevCPB.Enter(procdec, statseq, proc); x := procdec;\r\t\t\tx.conval := DevCPT.NewConst(); x.conval.intval := c; x.conval.intval2 := DevCPM.startpos;\r\t\t\tCheckSym(end);\r\t\t\tIF sym = ident THEN\r\t\t\t\tIF DevCPS.name # proc.name^ THEN err(4) END ;\r\t\t\t\tDevCPS.Get(sym)\r\t\t\tELSE err(ident)\r\t\t\tEND\r\t\tEND Body;\r\r\t\tPROCEDURE TProcDecl;\r\t\t\tVAR baseProc, o: DevCPT.Object;\r\t\t\t\tobjTyp, recTyp: DevCPT.Struct;\r\t\t\t\tobjMode, objVis: BYTE;\r\t\t\t\tobjName: DevCPT.Name;\r\t\t\t\tpnode: DevCPT.Node;\r\t\t\t\tfwdAttr: SET;\r\t\tBEGIN\r\t\t\tDevCPS.Get(sym); mode := TProc;\r\t\t\tIF level > 0 THEN err(73) END;\r\t\t\tReceiver(objMode, objVis, objName, objTyp, recTyp);\r\t\t\tIF sym = ident THEN\r\t\t\t\tname := DevCPS.name;\r\t\t\t\tDevCPT.FindField(name, recTyp, fwd);\r\t\t\t\tDevCPT.FindBaseField(name, recTyp, baseProc);\r\t\t\t\tIF (baseProc # NIL) & (baseProc.mode # TProc) THEN baseProc := NIL; err(1) END ;\r\t\t\t\tIF fwd = baseProc THEN fwd := NIL END ;\r\t\t\t\tIF (fwd # NIL) & (fwd.mnolev # level) THEN fwd := NIL END ;\r\t\t\t\tIF (fwd # NIL) & (fwd.mode = TProc) & (fwd.conval.setval * {hasBody, absAttr, empAttr} = {}) THEN\r\t\t\t\t\t(* there exists a corresponding forward declaration *)\r\t\t\t\t\tproc := DevCPT.NewObj(); proc.leaf := TRUE;\r\t\t\t\t\tproc.mode := TProc; proc.conval := DevCPT.NewConst();\r\t\t\t\t\tCheckMark(proc);\r\t\t\t\t\tIF fwd.vis # proc.vis THEN err(118) END;\r\t\t\t\t\tfwdAttr := fwd.conval.setval\r\t\t\t\tELSE\r\t\t\t\t\tIF fwd # NIL THEN err(1); fwd := NIL END ;\r\t\t\t\t\tDevCPT.InsertField(name, recTyp, proc);\r\t\t\t\t\tproc.mode := TProc; proc.conval := DevCPT.NewConst();\r\t\t\t\t\tCheckMark(proc);\r\t\t\t\t\tIF recTyp.strobj # NIL THEN\t(* preserve declaration order *)\r\t\t\t\t\t\to := recTyp.strobj.link;\r\t\t\t\t\t\tIF o = NIL THEN recTyp.strobj.link := proc\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tWHILE o.nlink # NIL DO o := o.nlink END;\r\t\t\t\t\t\t\to.nlink := proc\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tINC(level); DevCPT.OpenScope(level, proc);\r\t\t\t\tDevCPT.Insert(objName, proc.link); proc.link.mode := objMode; proc.link.vis := objVis; proc.link.typ := objTyp;\r\t\t\t\tASSERT(DevCPT.topScope # NIL);\r\t\t\t\tGetParams;\t"
                    attr: 0
                  - text: "(* may change proc := fwd !!! *)"
                    attr: 3
                  - text: "\r\t\t\t\tASSERT(DevCPT.topScope # NIL);\r\t\t\t\tGetAttributes(proc, baseProc, recTyp);\r\t\t\t\tIF (fwd # NIL) & (fwdAttr / proc.conval.setval * {absAttr, empAttr, extAttr} # {}) THEN err(184) END;\r\t\t\t\tCheckOverwrite(proc, baseProc, recTyp);\r\t\t\t\tIF ~forward THEN\r\t\t\t\t\tIF empAttr IN proc.conval.setval THEN\t"
