                  - text: "\t(* standard procedure *)\r\t\t\t\tELSE typ := NIL\r\t\t\t\tEND;\r\t\t\t\tIF typ # DevCPT.notyp THEN\r\t\t\t\t\tDevCPS.Get(sym);\r\t\t\t\t\tIF typ = NIL THEN\t(* type guard *)\r\t\t\t\t\t\tIF sym = ident THEN\r\t\t\t\t\t\t\tqualident(obj);\r\t\t\t\t\t\t\tIF obj.mode = Typ THEN DevCPB.TypTest(x, obj, TRUE)\r\t\t\t\t\t\t\tELSE err(52)\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tELSE err(ident)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE\t(* function call *)\r\t\t\t\t\t\tpre := NIL; lastp := NIL;\r\t\t\t\t\t\tDevCPB.PrepCall(x, fpar);\r\t\t\t\t\t\tIF (x.obj # NIL) & (x.obj.mode = TProc) THEN DevCPB.CheckBuffering(x.left, NIL, x.obj.link, pre, lastp)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tActualParameters(apar, fpar, pre, lastp);\r\t\t\t\t\t\tDevCPB.Call(x, apar, fpar);\r\t\t\t\t\t\tIF pre # NIL THEN DevCPB.Construct(Ncomp, pre, x); pre.typ := x.typ; x := pre END;\r\t\t\t\t\t\tIF level > 0 THEN DevCPT.topScope.link.leaf := FALSE END\r\t\t\t\t\tEND;\r\t\t\t\t\tCheckSym(rparen)\r\t\t\t\tELSE "
