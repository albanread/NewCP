                  - text: " DO\r\t\t\t\t\t\t\t\t\t\t(* find base method *)\r\t\t\t\t\t\t\t\t\t\ttyp := typ.BaseTyp; DevCPT.FindField(name, typ, proc);\r\t\t\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\t\t\tIF (proc.vis = externalR) & (proc.mnolev < 0) THEN err(196) END;\r\t\t\t\t\t\t\t\tEND ;\r\t\t\t\t\t\t\t\tIF (obj.typ # DevCPT.notyp) & (sym # lparen) THEN err(lparen) END\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tELSE err(53)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE err(52)\r\t\t\t\t\tEND\r\t\t\t\tELSE err(ident)\r\t\t\t\tEND\r\t\t\tELSIF sym = arrow THEN DevCPS.Get(sym); DevCPB.DeRef(x)\r\t\t\tELSIF sym = dollar THEN\r\t\t\t\tIF x.typ.form = Pointer THEN DevCPB.DeRef(x) END;\r\t\t\t\tDevCPS.Get(sym); DevCPB.StrDeref(x)\r\t\t\tELSIF sym = lparen THEN\r\t\t\t\tIF (x.obj # NIL) & (x.obj.mode IN {XProc, LProc, CProc, TProc}) THEN typ := x.obj.typ\r\t\t\t\tELSIF x.typ.form = ProcTyp THEN typ := x.typ.BaseTyp\r\t\t\t\tELSIF x.class = Nproc THEN "
                    attr: 0
