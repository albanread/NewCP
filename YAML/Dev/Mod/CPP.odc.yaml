                    attr: 3
                  - text: " (typ = DevCPT.undftyp) OR (typ.comp = Record) & (typ.BaseTyp = DevCPT.undftyp)\r\tEND IncompleteType;\r\t\r\tPROCEDURE SetType (struct: DevCPT.Struct; obj: DevCPT.Object; typ: DevCPT.Struct; name: DevCPT.String);\r\t\tVAR u: Elem;\r\tBEGIN\r\t\tIF obj # NIL THEN obj.typ := typ ELSE struct.BaseTyp := typ END;\r\t\tIF name # NIL THEN\r\t\t\tNEW(u); u.struct := struct; u.obj := obj; u.pos := DevCPM.errpos; u.name := name;\r\t\t\tu.next := userList; userList := u\r\t\tEND\r\tEND SetType;\r\r\tPROCEDURE CheckAlloc (VAR typ: DevCPT.Struct; dynAllowed: BOOLEAN; pos: INTEGER);\r\tBEGIN\r\t\ttyp.pvused := TRUE;\r\t\tIF typ.comp = DynArr THEN\r\t\t\tIF ~dynAllowed THEN DevCPM.Mark(88, pos); typ := DevCPT.undftyp END\r\t\tELSIF typ.comp = Record THEN\r\t\t\tIF (typ.attribute = absAttr) OR (typ.attribute = limAttr) & (typ.mno # 0) THEN\r\t\t\t\tDevCPM.Mark(193, pos); typ := DevCPT.undftyp\r\t\t\tEND\r\t\tEND\r\tEND CheckAlloc;\r\r\tPROCEDURE CheckRecursiveType (outer, inner: DevCPT.Struct; pos: INTEGER);\r\t\tVAR fld: DevCPT.Object;\r\tBEGIN\r\t\tIF outer = inner THEN DevCPM.Mark(58, pos)\r\t\tELSIF inner.comp IN {Array, DynArr} THEN CheckRecursiveType(outer, inner.BaseTyp, pos)\r\t\tELSIF inner.comp = Record THEN\r\t\t\tfld := inner.link;\r\t\t\tWHILE (fld # NIL) & (fld.mode = Fld) DO\r\t\t\t\tCheckRecursiveType(outer, fld.typ, pos);\r\t\t\t\tfld := fld.link\r\t\t\tEND;\r\t\t\tIF inner.BaseTyp # NIL THEN CheckRecursiveType(outer, inner.BaseTyp, pos) END\r\t\tEND\r\tEND CheckRecursiveType;\r\t\r\tPROCEDURE FixType (struct: DevCPT.Struct; obj: DevCPT.Object; typ: DevCPT.Struct; pos: INTEGER);\r\t"
                    attr: 0
                  - text: "(* fix forward reference *)"
                    attr: 1
                  - text: "\r\t\tVAR t: DevCPT.Struct; f, bf: DevCPT.Object; i: SHORTINT;\r\tBEGIN\r\t\tIF obj # NIL THEN\r\t\t\tIF obj.mode = Var THEN\t"
                    attr: 0
                  - text: "(* variable type *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF struct # NIL THEN\t"
                    attr: 0
                  - text: "(* receiver type *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tIF (typ.form # Pointer) OR (typ.BaseTyp # struct) THEN DevCPM.Mark(180, pos) END;\r\t\t\t\tELSE CheckAlloc(typ, obj.mnolev > level, pos)\t"
                    attr: 0
                  - text: "(* TRUE for parameters *)"
                    attr: 1
                  - text: "\r\t\t\t\tEND\r\t\t\tELSIF obj.mode = VarPar THEN\t"
