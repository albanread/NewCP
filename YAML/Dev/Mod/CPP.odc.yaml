                    attr: 1
                  - text: "\r\t\t\t\tIF struct # NIL THEN\t"
                    attr: 0
                  - text: "(* varpar receiver type *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tIF typ # struct THEN DevCPM.Mark(180, pos) END\r\t\t\t\tEND\r\t\t\tELSIF obj.mode = Fld THEN\t"
                    attr: 0
                  - text: "(* field type *)"
                    attr: 1
                  - text: "\r\t\t\t\tCheckAlloc(typ, FALSE, pos);\r\t\t\t\tCheckRecursiveType(struct, typ, pos)\r\t\t\tELSIF obj.mode = TProc THEN\t"
                    attr: 0
                  - text: "(* proc return type *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF typ.form = Comp THEN typ := DevCPT.undftyp; DevCPM.Mark(54, pos) END\r\t\t\tELSIF obj.mode = Typ THEN\t"
                    attr: 0
                  - text: "(* alias type *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF typ.form IN {Byte..Set, Char16, Int64} THEN\t"
                    attr: 0
                  - text: "(* make alias structure *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tt := DevCPT.NewStr(typ.form, Basic); i := t.ref;\r\t\t\t\t\tt^ := typ^; t.ref := i; t.strobj := obj; t.mno := 0;\r\t\t\t\t\tt.BaseTyp := typ; typ := t\r\t\t\t\tEND;\r\t\t\t\tIF obj.vis # internal THEN\r\t\t\t\t\tIF typ.comp = Record THEN typ.exp := TRUE\r\t\t\t\t\tELSIF typ.form = Pointer THEN typ.BaseTyp.exp := TRUE\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tELSE HALT(100)\r\t\t\tEND;\r\t\t\tobj.typ := typ\r\t\tELSE\r\t\t\tIF struct.form = Pointer THEN\t"
                    attr: 0
