                  - text: "(* check for unimplemented methods in base type *)"
                    attr: 1
                  - text: "\r\t\t\tb := rec.struct.BaseTyp;\r\t\t\tWHILE (b # NIL) & (b # DevCPT.undftyp) DO\r\t\t\t\tCheckUnimpl(b.link, rec.struct, rec.pos);\r\t\t\t\tb := b.BaseTyp\r\t\t\tEND;\r\t\t\trec := rec.next\r\t\tEND\r\tEND CheckRecords;\r\r\r\tPROCEDURE err(n: SHORTINT);\r\tBEGIN DevCPM.err(n)\r\tEND err;\r\r\tPROCEDURE CheckSym(s: SHORTINT);\r\tBEGIN\r\t\tIF sym = s THEN DevCPS.Get(sym) ELSE DevCPM.err(s) END\r\tEND CheckSym;\r\r\tPROCEDURE qualident(VAR id: DevCPT.Object);\r\t\tVAR obj: DevCPT.Object; lev: BYTE;\r\tBEGIN (*sym = ident*)\r\t\tDevCPT.Find(DevCPS.name, obj); DevCPS.Get(sym);\r\t\tIF (sym = period) & (obj # NIL) & (obj.mode = Mod) THEN\r\t\t\tDevCPS.Get(sym);\r\t\t\tIF sym = ident THEN\r\t\t\t\tDevCPT.FindImport(DevCPS.name, obj, obj); DevCPS.Get(sym)\r\t\t\tELSE err(ident); obj := NIL\r\t\t\tEND\r\t\tEND ;\r\t\tIF obj = NIL THEN err(0);\r\t\t\tobj := DevCPT.NewObj(); obj.mode := Var; obj.typ := DevCPT.undftyp; obj.adr := 0\r\t\tELSE lev := obj.mnolev;\r\t\t\tIF (obj.mode IN {Var, VarPar}) & (lev # level) THEN\r\t\t\t\tobj.leaf := FALSE;\r\t\t\t\tIF lev > 0 THEN DevCPB.StaticLink(SHORT(SHORT(level-lev))"
                    attr: 0
                  - text: ", TRUE"
                    attr: 3
                  - text: ") END\t(* !!! *)\r\t\t\tEND\r\t\tEND ;\r\t\tid := obj\r\tEND qualident;\r\r\tPROCEDURE ConstExpression(VAR x: DevCPT.Node);\r\tBEGIN Expression(x);\r\t\tIF x.class # Nconst THEN\r\t\t\terr(50); x := DevCPB.NewIntConst(1) \r\t\tEND\r\tEND ConstExpression;\r\r\tPROCEDURE CheckMark(obj: DevCPT.Object);\t(* !!! *)\r\t\tVAR n: INTEGER; mod: ARRAY 256 OF DevCPT.String;\r\tBEGIN DevCPS.Get(sym);\r\t\tIF (sym = times) OR (sym = minus) THEN\r\t\t\tIF (level > 0) OR ~(obj.mode IN {Var, Fld, TProc}) & (sym = minus) THEN err(41) END ;\r\t\t\tIF sym = times THEN obj.vis := external ELSE obj.vis := externalR END ;\r\t\t\tDevCPS.Get(sym)\r\t\tELSE obj.vis := internal\r\t\tEND;\r\t\tIF (obj.mode IN {TProc, LProc, XProc, CProc, Var, Typ, Con, Fld}) & (sym = lbrak) THEN\r\t\t\tDevCPS.Get(sym);\r\t\t\tIF (sym = number) & (DevCPS.numtyp = char) THEN\r\t\t\t\tNEW(DevCPS.str, 2); DevCPS.str[0] := SHORT(CHR(DevCPS.intval)); DevCPS.str[1] := 0X; sym := string\r\t\t\tEND;\r\t\t\tIF sym = string THEN\r\t\t\t\tIF DevCPS.str^ # \"\" THEN obj.entry := DevCPS.str END;\r\t\t\t\tDevCPS.Get(sym); n := 0;\r\t\t\t\tIF (sym = comma) & (obj.mode IN {LProc, XProc, CProc, Var, Con}) THEN\r\t\t\t\t\tDevCPS.Get(sym);\r\t\t\t\t\tIF (sym = number) & (DevCPS.numtyp = char) THEN\r\t\t\t\t\t\tNEW(DevCPS.str, 2); DevCPS.str[0] := SHORT(CHR(DevCPS.intval)); DevCPS.str[1] := 0X; sym := string\r\t\t\t\t\tEND;\r\t\t\t\t\tIF sym = string THEN\r\t\t\t\t\t\tobj.library := obj.entry; obj.entry := NIL;\r\t\t\t\t\t\tIF DevCPS.str^ # \"\" THEN obj.entry := DevCPS.str END;\r\t\t\t\t\t\tDevCPS.Get(sym);\r\t\t\t\t\tELSE err(string)\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tWHILE sym = comma DO\r\t\t\t\t\tDevCPS.Get(sym);\r\t\t\t\t\tIF (sym = number) & (DevCPS.numtyp = char) THEN\r\t\t\t\t\t\tNEW(DevCPS.str, 2); DevCPS.str[0] := SHORT(CHR(DevCPS.intval)); DevCPS.str[1] := 0X; sym := string\r\t\t\t\t\tEND;\r\t\t\t\t\tIF sym = string THEN\r\t\t\t\t\t\tIF n < LEN(mod) THEN mod[n] := DevCPS.str; INC(n)\r\t\t\t\t\t\tELSE err(235)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tDevCPS.Get(sym)\r\t\t\t\t\tELSE err(string)\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tIF n > 0 THEN\r\t\t\t\t\tNEW(obj.modifiers, n);\r\t\t\t\t\tWHILE n > 0 DO DEC(n); obj.modifiers[n] := mod[n] END\r\t\t\t\tEND\r\t\t\tELSE err(string)\r\t\t\tEND;\r\t\t\tCheckSym(rbrak);\r\t\t\tIF DevCPM.options * {DevCPM.interface, DevCPM.java} = {} THEN err(225) END\r\t\tEND\r\tEND CheckMark;\r\r\tPROCEDURE CheckSysFlag (VAR sysflag: SHORTINT;\r\t\t\t\t\t\t\t\t\t\tGetSF: PROCEDURE(IN id: ARRAY OF SHORTCHAR; num: SHORTINT; VAR flag: SHORTINT));\r\t\tVAR x: DevCPT.Object; i: SHORTINT;\r\tBEGIN\r\t\tsysflag := 0;\r\t\tIF sym = lbrak THEN\r\t\t\tDevCPS.Get(sym);\r\t\t\tWHILE (sym = number) OR (sym = ident) OR (sym = string) DO\r\t\t\t\tIF sym = number THEN\r\t\t\t\t\tIF DevCPS.numtyp = integer THEN\r\t\t\t\t\t\ti := SHORT(DevCPS.intval); GetSF(\"\", i, sysflag)\r\t\t\t\t\tELSE err(225)\r\t\t\t\t\tEND\r\t\t\t\tELSIF sym = ident THEN\r\t\t\t\t\tDevCPT.Find(DevCPS.name, x);\r\t\t\t\t\tIF (x # NIL) & (x.mode = Con) & (x.typ.form IN {Int8, Int16, Int32}) THEN \r\t\t\t\t\t\ti := SHORT(x.conval.intval); GetSF(\"\", i, sysflag)\r\t\t\t\t\tELSE\r\t\t\t\t\t\tGetSF(DevCPS.name, 0, sysflag)\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\t\tGetSF(DevCPS.str^, 0, sysflag)\r\t\t\t\tEND;\r\t\t\t\tDevCPS.Get(sym);\r\t\t\t\tIF (sym = comma) OR (sym = plus) THEN DevCPS.Get(sym) END\r\t\t\tEND;\r\t\t\tCheckSym(rbrak)\r\t\tEND\r\tEND CheckSysFlag;\r\t\r\tPROCEDURE Receiver(VAR mode, vis: BYTE; VAR name: DevCPT.Name; VAR typ, rec: DevCPT.Struct);\r\t\tVAR tname: DevCPT.String;\r\tBEGIN typ := DevCPT.undftyp; rec := NIL; vis := 0;\r\t\tIF sym = var THEN DevCPS.Get(sym); mode := VarPar;\r\t\tELSIF sym = in THEN DevCPS.Get(sym); mode := VarPar; vis := inPar\t(* ??? *)\r\t\tELSE mode := Var\r\t\tEND ;\r\t\tname := DevCPS.name; CheckSym(ident); CheckSym(colon);\r\t\tIF sym # ident THEN err(ident) END;\r\t\tType(typ, tname);\r\t\tIF tname = NIL THEN\r\t\t\tIF typ.form = Pointer THEN  rec := typ.BaseTyp ELSE rec := typ END;\r\t\t\tIF ~((mode = Var) & (typ.form = Pointer) & (rec.comp = Record) OR\r\t\t\t\t(mode = VarPar) & (typ.comp = Record)) THEN err(70); rec := NIL END;\r\t\t\tIF (rec # NIL) & (rec.mno # level) THEN err(72); rec := NIL END\r\t\tELSE err(0)\r\t\tEND;\r\t\tCheckSym(rparen);\r\t\tIF rec = NIL THEN rec := DevCPT.NewStr(Comp, Record); rec.BaseTyp := NIL END\r\tEND Receiver;\r\t\r\tPROCEDURE FormalParameters(\r\t\tVAR firstPar: DevCPT.Object; VAR resTyp: DevCPT.Struct; VAR name: DevCPT.String\r\t);\r\t\tVAR mode, vis: BYTE; sys: SHORTINT;\r\t\t\t\tpar, first, last, newPar, iidPar: DevCPT.Object; typ: DevCPT.Struct;\r\tBEGIN\r\t\tfirst := NIL; last := firstPar;\r\t\tnewPar := NIL; iidPar := NIL;\r\t\tIF (sym = ident) OR (sym = var) OR (sym = in) OR (sym = out) THEN\r\t\t\tLOOP\r\t\t\t\tsys := 0; vis := 0;\r\t\t\t\tIF sym = var THEN DevCPS.Get(sym); mode := VarPar"
                    attr: 0
                  - text: "\r"
                    attr: 3
                  - text: "\t\t\t\tELSIF sym = in THEN DevCPS.Get(sym); mode := VarPar; vis := inPar\r\t\t\t\tELSIF sym = out THEN DevCPS.Get(sym); mode := VarPar; vis := outPar\r\t\t\t\tELSE mode := Var\r\t\t\t\tEND ;\r\t\t\t\tIF mode = VarPar THEN "
                    attr: 0
                  - text: "CheckSysFlag(sys, "
                    attr: 3
                  - text: "DevCPM.GetVarParSysFlag) END;\r"
                    attr: 0
                  - text: "\t\t\t\t"
                    attr: 3
                  - text: "IF ODD(sys DIV inBit) THEN vis := inPar\r\t\t\t\tELSIF ODD(sys DIV outBit) THEN vis := outPar\r\t\t\t\tEND;\r\t\t\t\tIF ODD(sys DIV newBit) & (vis # outPar) THEN err(225)\r\t\t\t\tELSIF ODD(sys DIV iidBit) & (vis # inPar) THEN err(225)\r\t\t\t\tEND;\r\t\t\t\tLOOP\r\t\t\t\t\tIF sym = ident THEN\r\t\t\t\t\t\tDevCPT.Insert(DevCPS.name, par); DevCPS.Get(sym);\r\t\t\t\t\t\tpar.mode := mode; par.link := NIL;"
                    attr: 0
                  - text: " "
                    attr: 3
                  - text: "par.vis := vis; "
                    attr: 0
                  - text: "par.sysflag := SHORT(sys);\r"
                    attr: 3
                  - text: "\t\t\t\t\t\tIF first = NIL THEN first := par END ;\r\t\t\t\t\t\tIF firstPar = NIL THEN firstPar := par ELSE last.link := par END ;\r\t\t\t\t\t\tlast := par\r\t\t\t\t\tELSE err(ident)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF sym = comma THEN DevCPS.Get(sym)\r\t\t\t\t\tELSIF sym = ident THEN err(comma)\r\t\t\t\t\tELSIF sym = var THEN err(comma); DevCPS.Get(sym)\r\t\t\t\t\tELSE EXIT\r\t\t\t\t\tEND\r\t\t\t\tEND ;\r\t\t\t\tCheckSym(colon); Type(typ, name);\r\t\t\t\tIF mode # VarPar THEN CheckAlloc(typ, TRUE, DevCPM.errpos) END;\r"
                    attr: 0
                  - text: "\t\t\t\t"
                    attr: 5
                  - text: "(* IN only allowed for records and arrays *)"
                    attr: 1
                  - text: "\r"
                    attr: 5
                  - text: "\t\t\t\tIF (mode = VarPar) & (vis = inPar) & (typ.form # Undef) & (typ.form # Comp) & (typ.sysflag = 0) THEN err(177)\r\t\t\t\tEND;\r\t\t\t\t(* typ.pbused is set when parameter type name is parsed *)\r\t\t\t\tWHILE first # NIL DO\r\t\t\t\t\tSetType (NIL, first, typ, name);\r\t\t\t\t\tIF DevCPM.com IN DevCPM.options THEN\r\t\t\t\t\t\tIF ODD(sys DIV newBit) THEN\r\t\t\t\t\t\t\tIF (newPar # NIL) OR (typ.form # Pointer) OR (typ.sysflag # interface) THEN err(168) END;\r\t\t\t\t\t\t\tnewPar := first\r\t\t\t\t\t\tELSIF ODD(sys DIV iidBit) THEN\r\t\t\t\t\t\t\tIF (iidPar # NIL) OR (typ # DevCPT.guidtyp) THEN err(168) END;\r\t\t\t\t\t\t\tiidPar := first\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND;\r\t\t\t\t\tfirst := first.link\r\t\t\t\tEND;\r\t\t\t\tIF sym = semicolon THEN DevCPS.Get(sym)\r\t\t\t\tELSIF sym = ident THEN err(semicolon)\r\t\t\t\tELSE EXIT\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND;\r\t\tCheckSym(rparen);\r\t\tIF (newPar = NIL) # (iidPar = NIL) THEN err(168) END;\r\t\tname := NIL;\r\t\tIF sym = colon THEN\r\t\t\tDevCPS.Get(sym);\r\t\t\tType(resTyp, name);\r\t\t\tIF resTyp.form = Comp THEN resTyp := DevCPT.undftyp; err(54) END\r\t\tELSE resTyp := DevCPT.notyp\r\t\tEND\r\tEND FormalParameters;\r\t\r\tPROCEDURE CheckOverwrite (proc, base: DevCPT.Object; rec: DevCPT.Struct);\r\t\tVAR o, bo: DevCPT.Object;\r\tBEGIN\r\t\tIF base # NIL THEN\r\t\t\tIF base.conval.setval * {absAttr, empAttr, extAttr} = {} THEN err(182) END;\r\t\t\tIF (proc.link.mode # base.link.mode) OR (proc.link.vis # base.link.vis)\r\t\t\t\tOR ~DevCPT.Extends(proc.link.typ, base.link.typ) THEN err(115) END;\r\t\t\to := proc.link; bo := base.link;\r\t\t\tWHILE (o # NIL) & (bo # NIL) DO\r\t\t\t\tIF (bo.sysflag # 0) & (o.sysflag = 0) THEN\t(* propagate sysflags *)\r\t\t\t\t\to.sysflag := bo.sysflag\r\t\t\t\tEND;\r\t\t\t\to := o.link; bo := bo.link\r\t\t\tEND;\r\t\t\tDevCPB.CheckParameters(proc.link.link, base.link.link, FALSE);\r\t\t\tIF ~DevCPT.Extends(proc.typ, base.typ) THEN err(117) END;\r\t\t\tIF (base.vis # proc.vis) & ((proc.vis # internal) OR rec.exp) THEN err(183) END;\r\t\t\tINCL(proc.conval.setval, isRedef)\r\t\tEND;\r\tEND CheckOverwrite;\r\r\tPROCEDURE GetAttributes (proc, base: DevCPT.Object; owner: DevCPT.Struct);\t"
                    attr: 0
                  - text: "(* read method attributes *)"
                    attr: 1
                  - text: "\r\t\tVAR attr, battr: SET; o: DevCPT.Object;\r\tBEGIN\r\t\tattr := {};\r\t\tIF sym = comma THEN\t"
                    attr: 0
                  - text: "(* read attributes *)"
                    attr: 1
                  - text: "\r\t\t\tDevCPS.Get(sym);\r\t\t\tIF sym = ident THEN\r\t\t\t\tDevCPT.Find(DevCPS.name, o);\r\t\t\t\tIF (o # NIL) & (o.mode = SProc) & (o.adr = newfn) THEN\r\t\t\t\t\tIF ~(DevCPM.oberon IN DevCPM.options) THEN INCL(attr, newAttr) ELSE err(178) END;\r\t\t\t\t\tDevCPS.Get(sym);\r\t\t\t\t\tIF sym = comma THEN\r\t\t\t\t\t\tDevCPS.Get(sym);\r\t\t\t\t\t\tIF sym = ident THEN DevCPT.Find(DevCPS.name, o) ELSE o := NIL; err(ident) END\r\t\t\t\t\tELSE o := NIL\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tIF o # NIL THEN\r\t\t\t\t\tIF (o.mode # Attr) OR (o.adr = limAttr) OR (DevCPM.oberon IN DevCPM.options) THEN err(178)\r\t\t\t\t\tELSE INCL(attr, o.adr)\r\t\t\t\t\tEND;\r\t\t\t\t\tDevCPS.Get(sym)\r\t\t\t\tEND\r\t\t\tELSE err(ident)\r\t\t\tEND\r\t\tEND;\r\t\tIF (base = NIL) & ~(newAttr IN attr) THEN err(185); INCL(attr, newAttr)\r\t\tELSIF (base # NIL) & (newAttr IN attr) THEN err(186)\r\t\tEND;\r\t\tIF absAttr IN attr THEN\r\t\t\tIF owner.attribute # absAttr THEN err(190) END;\r\t\t\tIF (proc.vis = internal) & owner.exp THEN err(179) END\r\t\tEND;\r\t\tIF (owner.attribute = 0) OR (owner.attribute = limAttr) THEN\r\t\t\tIF (empAttr IN attr) & (newAttr IN attr) THEN err(187)\r(*\r\t\t\tELSIF extAttr IN attr THEN err(188)\r*)\r\t\t\tEND\r\t\tEND;\r\t\tIF base # NIL THEN\r\t\t\tbattr := base.conval.setval;\r\t\t\tIF empAttr IN battr THEN\r\t\t\t\tIF absAttr IN attr THEN err(189) END\r\t\t\tELSIF ~(absAttr IN battr) THEN\r\t\t\t\tIF (absAttr IN attr) OR (empAttr IN attr) THEN err(189) END\r\t\t\tEND\r\t\tEND;\r\t\tIF empAttr IN attr THEN\r\t\t\tIF proc.typ # DevCPT.notyp THEN err(195)\r\t\t\tELSE\r\t\t\t\to := proc.link; WHILE (o # NIL) & (o.vis # outPar) DO o := o.link END;\r\t\t\t\tIF o # NIL THEN err(195) END\r\t\t\tEND\r\t\tEND;\r\t\tIF (owner.sysflag = interface) & ~(absAttr IN attr) THEN err(162) END;\r\t\tproc.conval.setval := attr\r\tEND GetAttributes;\r\t\r\tPROCEDURE RecordType(VAR typ: DevCPT.Struct; attr: DevCPT.Object);\r\t\tVAR fld, first, last: DevCPT.Object; r: Elem; ftyp: DevCPT.Struct; name: DevCPT.String;\r\tBEGIN typ := DevCPT.NewStr(Comp, Record); typ.BaseTyp := NIL;\r\t\tCheckSysFlag(typ.sysflag, DevCPM.GetRecordSysFlag);\r\t\tIF attr # NIL THEN\r\t\t\tIF ~(DevCPM.oberon IN DevCPM.options) & (attr.adr # empAttr) THEN typ.attribute := SHORT(SHORT(attr.adr))\r\t\t\tELSE err(178)\r\t\t\tEND\r\t\tEND;\r\t\tIF typ.sysflag = interface THEN\r\t\t\tIF (DevCPS.str # NIL) & (DevCPS.str[0] = \"{\") THEN typ.ext := DevCPS.str END;\r\t\t\tIF typ.attribute # absAttr THEN err(163) END;\r\t\t\tIF sym # lparen THEN err(160) END\r\t\tEND;\r\t\tIF sym = lparen THEN\r\t\t\tDevCPS.Get(sym); (*record extension*)\r\t\t\tIF sym = ident THEN\r\t\t\t\tType(ftyp, name);\r\t\t\t\tIF ftyp.form = Pointer THEN ftyp := ftyp.BaseTyp END;\r\t\t\t\tSetType(typ, NIL, ftyp, name);\r\t\t\t\tIF (ftyp.comp = Record) & (ftyp # DevCPT.anytyp) THEN\r\t\t\t\t\tftyp.pvused := TRUE; typ.extlev := SHORT(SHORT(ftyp.extlev + 1));\r\t\t\t\t\tDevCPM.PropagateRecordSysFlag(ftyp.sysflag, typ.sysflag);\r\t\t\t\t\tIF (ftyp.attribute = 0) OR (ftyp.attribute = limAttr) & (ftyp.mno # 0) THEN err(181)\r\t\t\t\t\tELSIF (typ.attribute = absAttr) & (ftyp.attribute # absAttr) & ~(DevCPM.java IN DevCPM.options) THEN err(191)\r\t\t\t\t\tELSIF (ftyp.attribute = limAttr) & (typ.attribute # limAttr) THEN err(197)\r\t\t\t\t\tEND\r\t\t\t\tELSIF ftyp # DevCPT.undftyp THEN err(53)\r\t\t\t\tEND\r\t\t\tELSE err(ident)\r\t\t\tEND ;\r\t\t\tIF typ.attribute # absAttr THEN\t"
                    attr: 0
                  - text: "(* save typ for unimplemented method check *)"
                    attr: 1
                  - text: "\r\t\t\t\tNEW(r); r.struct := typ; r.pos := DevCPM.errpos; r.next := recList; recList := r\r\t\t\tEND;\r\t\t\tCheckSym(rparen)\r\t\tEND;\r(*\r\t\tDevCPT.OpenScope(0, NIL);\r*)\r\t\tfirst := NIL; last := NIL;\r\t\tLOOP\r\t\t\tIF sym = ident THEN\r\t\t\t\tLOOP\r\t\t\t\t\tIF sym = ident THEN\r\t\t\t\t\t\tIF (typ.BaseTyp # NIL) & (typ.BaseTyp # DevCPT.undftyp) THEN\r\t\t\t\t\t\t\tDevCPT.FindBaseField(DevCPS.name, typ, fld);\r\t\t\t\t\t\t\tIF fld # NIL THEN err(1) END\r\t\t\t\t\t\tEND ;\r\t\t\t\t\t\tDevCPT.InsertField(DevCPS.name, typ, fld);\r\t\t\t\t\t\tfld.mode := Fld; fld.link := NIL; fld.typ := DevCPT.undftyp;\r\t\t\t\t\t\tCheckMark(fld);\r\t\t\t\t\t\tIF first = NIL THEN first := fld END ;\r\t\t\t\t\t\tIF last = NIL THEN typ.link := fld ELSE last.link := fld END ;\r\t\t\t\t\t\tlast := fld\r\t\t\t\t\tELSE err(ident)\r\t\t\t\t\tEND ;\r\t\t\t\t\tIF sym = comma THEN DevCPS.Get(sym)\r\t\t\t\t\tELSIF sym = ident THEN err(comma)\r\t\t\t\t\tELSE EXIT\r\t\t\t\t\tEND\r\t\t\t\tEND ;\r\t\t\t\tCheckSym(colon); Type(ftyp, name);\r\t\t\t\tCheckAlloc(ftyp, FALSE, DevCPM.errpos);\r\t\t\t\tWHILE first # NIL DO\r\t\t\t\t\tSetType(typ, first, ftyp, name); first := first.link\r\t\t\t\tEND;\r\t\t\t\tIF typ.sysflag = interface THEN err(161) END\r\t\t\tEND;\r\t\t\tIF sym = semicolon THEN DevCPS.Get(sym)\r\t\t\tELSIF sym = ident THEN err(semicolon)\r\t\t\tELSE EXIT\r\t\t\tEND\r\t\tEND;\r(*\r\t"
                    attr: 0
                  - text: "\tIF typ.link # NIL THEN ASSERT(typ.link = DevCPT.topScope.right) END;"
                    attr: 3
                  - text: "\r\t\ttyp.link := DevCPT.topScope.right; DevCPT.CloseScope;\r*)\r\t\ttyp.untagged := typ.sysflag "
                    attr: 0
