                  - text: "\r\t\t\t\t\terr(178); DevCPS.Get(sym); name := NIL; RecordType(typ, NIL)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tqualident(id);\r\t\t\t\tIF id.mode = Typ THEN\r\t\t\t\t\tIF ~(DevCPM.oberon IN DevCPM.options)\r\t\t\t\t\t\t& ((id.typ = DevCPT.lreal64typ) OR (id.typ = DevCPT.lint64typ) OR (id.typ = DevCPT.lchar16typ)) THEN\r\t\t\t\t\t\terr(198)\r\t\t\t\t\tEND;\r\t\t\t\t\ttyp := id.typ\r\t\t\t\tELSIF id.mode = Attr THEN\r\t\t\t\t\tIF sym = record THEN\r\t\t\t\t\t\tDevCPS.Get(sym); RecordType(typ, id)\r\t\t\t\t\tELSE err(12)\r\t\t\t\t\tEND\r\t\t\t\tELSE err(52)\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSIF sym = array THEN\r\t\t\tDevCPS.Get(sym); ArrayType(typ)\r\t\tELSIF sym = record THEN\r\t\t\tDevCPS.Get(sym); RecordType(typ, NIL)\r\t\tELSIF sym = pointer THEN\r\t\t\tDevCPS.Get(sym); PointerType(typ)\r\t\tELSIF sym = procedure THEN\r\t\t\tDevCPS.Get(sym); typ := DevCPT.NewStr(ProcTyp, Basic);\r\t\t\tCheckSysFlag(typ.sysflag, DevCPM.GetProcTypSysFlag);\r\t\t\ttyp.untagged := typ.sysflag > 0;\r\t\t\tIF sym = lparen THEN\r\t\t\t\tDevCPS.Get(sym); DevCPT.OpenScope(level, NIL);\r\t\t\t\tFormalParameters(typ.link, typ.BaseTyp, tname); SetType(typ, NIL, typ.BaseTyp, tname); DevCPT.CloseScope\r\t\t\tELSE typ.BaseTyp := DevCPT.notyp; typ.link := NIL\r\t\t\tEND\r\t\tELSE err(12)\r\t\tEND ;\r\t\tLOOP\r\t\t\tIF (sym >= semicolon) & (sym <= else) OR (sym = rparen) OR (sym = eof)\r\t\t\t\tOR (sym = number) OR (sym = comma) OR (sym = string) THEN EXIT END;\r\t\t\terr(15); IF sym = ident THEN EXIT END;\r\t\t\tDevCPS.Get(sym)\r\t\tEND\r\tEND Type;\r\t\r\tPROCEDURE ActualParameters(VAR aparlist: DevCPT.Node; fpar: DevCPT.Object; VAR pre, lastp: DevCPT.Node);\r\t\tVAR apar, last, newPar, iidPar, n: DevCPT.Node;\r\tBEGIN\r\t\taparlist := NIL; last := NIL;\r\t\tIF sym # rparen THEN\r\t\t\tnewPar := NIL; iidPar := NIL;\r\t\t\tLOOP Expression(apar);\r\t\t\t\tIF fpar # NIL THEN\r\t\t\t\t\tIF (apar.typ.form = Pointer) & (fpar.typ.form = Comp) THEN DevCPB.DeRef(apar) END;\r\t\t\t\t\tDevCPB.Param(apar, fpar);\r\t\t\t\t\tIF (fpar.mode = Var) OR (fpar.vis = inPar) THEN DevCPB.CheckBuffering(apar, NIL, fpar, pre, lastp) END;\r\t\t\t\t\tDevCPB.Link(aparlist, last, apar);\r\t\t\t\t\tIF ODD(fpar.sysflag DIV newBit) THEN newPar := apar\r\t\t\t\t\tELSIF ODD(fpar.sysflag DIV iidBit) THEN iidPar := apar\r\t\t\t\t\tEND;\r\t\t\t\t\tIF (newPar # NIL) & (iidPar # NIL) THEN DevCPB.CheckNewParamPair(newPar, iidPar) END;\r\t\t\t\t\tIF anchorVarPar & (fpar.mode = VarPar) & ~(DevCPM.java IN DevCPM.options)\r\t\t\t\t\t\tOR (DevCPM.allSysVal IN DevCPM.options)\t"
                    attr: 0
                  - text: "(* source output: avoid double evaluation *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\t\t & ((fpar.mode = VarPar) & (fpar.typ.comp = Record) & ~fpar.typ.untagged\r\t\t\t\t\t\t\t\tOR (fpar.typ.comp = DynArr) & ~fpar.typ.untagged) THEN\r\t\t\t\t\t\tn := apar;\r\t\t\t\t\t\tWHILE n.class IN {Nfield, Nindex, Nguard} DO n := n.left END;\r\t\t\t\t\t\tIF (n.class = Nderef) & (n.subcl = 0) THEN\r\t\t\t\t\t\t\tIF n.left.class = Nguard THEN n := n.left END;\r\t\t\t\t\t\t\tDevCPB.CheckVarParBuffering(n.left, pre, lastp)\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND;\r\t\t\t\t\tfpar := fpar.link\r\t\t\t\tELSE err(64)\r\t\t\t\tEND;\r\t\t\t\tIF sym = comma THEN DevCPS.Get(sym)\r\t\t\t\tELSIF (lparen <= sym) & (sym <= ident) THEN err(comma)\r\t\t\t\tELSE EXIT\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND;\r\t\tIF fpar # NIL THEN err(65) END\r\tEND ActualParameters;\r\r\tPROCEDURE selector(VAR x: DevCPT.Node);\r\t\tVAR obj, proc, p, fpar: DevCPT.Object; y, apar, pre, lastp: DevCPT.Node; typ: DevCPT.Struct; name: DevCPT.Name;\r\tBEGIN\r\t\tLOOP\r\t\t\tIF sym = lbrak THEN DevCPS.Get(sym);\r\t\t\t\tLOOP\r\t\t\t\t\tIF (x.typ # NIL) & (x.typ.form = Pointer) THEN DevCPB.DeRef(x) END ;\r\t\t\t\t\tExpression(y); DevCPB.Index(x, y);\r\t\t\t\t\tIF sym = comma THEN DevCPS.Get(sym) ELSE EXIT END\r\t\t\t\tEND ;\r\t\t\t\tCheckSym(rbrak)\r\t\t\tELSIF sym = period THEN DevCPS.Get(sym);\r\t\t\t\tIF sym = ident THEN name := DevCPS.name; DevCPS.Get(sym);\r\t\t\t\t\tIF x.typ # NIL THEN\r\t\t\t\t\t\tIF x.typ.form = Pointer THEN DevCPB.DeRef(x) END ;\r\t\t\t\t\t\tIF x.typ.comp = Record THEN\r\t\t\t\t\t\t\ttyp := x.typ; DevCPT.FindField(name, typ, obj); DevCPB.Field(x, obj);\r\t\t\t\t\t\t\tIF (obj # NIL) & (obj.mode = TProc) THEN\r\t\t\t\t\t\t\t\tIF sym = arrow THEN  (* super call *) DevCPS.Get(sym);\r\t\t\t\t\t\t\t\t\ty := x.left;\r\t\t\t\t\t\t\t\t\tIF y.class = Nderef THEN y := y.left END ;\t(* y = record variable *)\r\t\t\t\t\t\t\t\t\tIF y.obj # NIL THEN\r\t\t\t\t\t\t\t\t\t\tproc := DevCPT.topScope;\t(* find innermost scope which owner is a TProc *)\r\t\t\t\t\t\t\t\t\t\tWHILE (proc.link # NIL) & (proc.link.mode # TProc) DO proc := proc.left END ;\r\t\t\t\t\t\t\t\t\t\tIF (proc.link = NIL) OR (proc.link.link # y.obj) (* OR (proc.link.name^ # name) *) THEN err(75)\r\t\t\t\t\t\t\t\t\t\tEND ;\r\t\t\t\t\t\t\t\t\t\ttyp := y.obj.typ;\r\t\t\t\t\t\t\t\t\t\tIF typ.form = Pointer THEN typ := typ.BaseTyp END ;\r\t\t\t\t\t\t\t\t\t\tDevCPT.FindBaseField(x.obj.name^, typ, p);\r\t\t\t\t\t\t\t\t\t\tIF p # NIL THEN\r\t\t\t\t\t\t\t\t\t\t\tx.subcl := super; "
                    attr: 0
