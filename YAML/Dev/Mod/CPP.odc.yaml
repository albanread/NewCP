                  - text: "\r\t\t\t\tIF typ.form = Pointer THEN typ := typ.BaseTyp END;\r\t\t\t\ttyp.pvused := TRUE; struct.extlev := SHORT(SHORT(typ.extlev + 1));\r\t\t\t\tDevCPM.PropagateRecordSysFlag(typ.sysflag, struct.sysflag);\r\t\t\t\tIF (typ.attribute = 0) OR (typ.attribute = limAttr) & (typ.mno # 0) THEN DevCPM.Mark(181, pos)\r\t\t\t\tELSIF (struct.attribute = absAttr) & (typ.attribute # absAttr) THEN DevCPM.Mark(191, pos)\r\t\t\t\tELSIF (typ.attribute = limAttr) & (struct.attribute # limAttr) THEN DevCPM.Mark(197, pos)\r\t\t\t\tEND;\r\t\t\t\tf := struct.link;\r\t\t\t\tWHILE f # NIL DO\t"
