                  - text: ": DevCPT.Node; \r\t\tBEGIN\r\t\t\tExpression(x);\r\t\t\tIF (x.class = Ntype) OR (x.class = Nproc) THEN err(126)\r\t\t\tELSIF x.typ.form = Int64 THEN err(260)\r\t\t\tELSIF ~(x.typ.form IN {Int8..Int32} + charSet) THEN err(125)\r\t\t\tEND ;\r\t\t\tCheckSym(of); cases := NIL; lastcase := NIL; "
                    attr: 0
                  - text: "root := NIL"
                    attr: 3
                  - text: ";\r"
                    attr: 0
                  - text: "\t\t\tlow := MAX(INTEGER); high := MIN(INTEGER);\r"
                    attr: 3
                  - text: "\t\t\tLOOP\r\t\t\t\tIF sym < bar THEN\r\t\t\t\t\tCaseLabelList(lab, "
