                  - text: "\r\t\tIF (sym # ident) & (sym # lparen) THEN\r"
                    attr: 0
                  - text: "\t\t\t"
                    attr: 3
                  - text: "CheckSysFlag(sys, DevCPM.GetProcSysFlag);\r\t\t\tIF sys # 0 THEN\r\t\t\t\tIF ODD(sys DIV DevCPM.CProcFlag) THEN mode := CProc END\r\t\t\tELSE\r\t\t\t\tIF sym = times THEN\t(* mode set later in DevCPB.CheckAssign *)\r\t\t\t\tELSIF sym = arrow THEN forward := TRUE\r\t\t\t\tELSE err(ident)\r\t\t\t\tEND;\r\t\t\t\tDevCPS.Get(sym)\r\t\t\tEND\r\t\tEND ;\r\t\tIF sym = lparen THEN TProcDecl\r\t\tELSIF sym = ident THEN DevCPT.Find(DevCPS.name, fwd);\r\t\t\tname := DevCPS.name;\r\t\t\tIF (fwd # NIL) & ((fwd.mnolev # level) OR (fwd.mode = SProc)) THEN fwd := NIL END ;\r\t\t\tIF (fwd # NIL) & (fwd.mode IN {LProc, XProc}) & ~(hasBody IN fwd.conval.setval) THEN\r\t\t\t\t(* there exists a corresponding forward declaration *)\r\t\t\t\tproc := DevCPT.NewObj(); proc.leaf := TRUE;\r\t\t\t\tproc.mode := mode; proc.conval := DevCPT.NewConst();\r\t\t\t\tCheckMark(proc);\r\t\t\t\tIF fwd.vis # proc.vis THEN err(118) END\r\t\t\tELSE\r\t\t\t\tIF fwd # NIL THEN err(1); fwd := NIL END ;\r\t\t\t\tDevCPT.Insert(name, proc);\r\t\t\t\tproc.mode := mode; proc.conval := DevCPT.NewConst();\r\t\t\t\tCheckMark(proc);\r\t\t\tEND ;\r\t\t\tIF (proc.vis # internal) & (mode = LProc) THEN mode := XProc END ;\r\t\t\tIF (mode # LProc) & (level > 0) THEN err(73) END ;\r\t\t\tINC(level); DevCPT.OpenScope(level, proc);\r\t\t\tproc.link := NIL; GetParams;\t"
