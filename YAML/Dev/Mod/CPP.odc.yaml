                  - text: "\r\t\t\t\tIF typ.comp = Record THEN DevCPM.PropagateRecPtrSysFlag(typ.sysflag, struct.sysflag)\r\t\t\t\tELSIF typ.comp IN {Array, DynArr} THEN DevCPM.PropagateArrPtrSysFlag(typ.sysflag, struct.sysflag)\r\t\t\t\tELSE typ := DevCPT.undftyp; DevCPM.Mark(57, pos)\r\t\t\t\tEND;\r\t\t\t\tstruct.untagged := struct.sysflag "
                    attr: 0
