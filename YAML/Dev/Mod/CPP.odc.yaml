                    attr: 3
                  - text: "\r\t\t\t\t\t\t\t\t\t\t\tIF p.conval.setval * {absAttr, empAttr} # {} THEN err(194) END;\r\t\t\t\t\t\t\t\t\t\t\tIF (p.vis = externalR) & (p.mnolev < 0) & (proc.link.name^ # name) THEN err(196) END;\r\t\t\t\t\t\t\t\t\t\tELSE err(74)\r\t\t\t\t\t\t\t\t\t\tEND\r\t\t\t\t\t\t\t\t\tELSE err(75)\r\t\t\t\t\t\t\t\t\tEND\r\t\t\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\t\t\tproc := obj;\r\t\t\t\t\t\t\t\t\tIF (x.left.readonly) & (proc.link.mode = VarPar) & (proc.link.vis = 0)  THEN err(76) END;\r"
