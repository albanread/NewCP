                  - text: "\t(* build binary tree of label ranges *)\t(* !!! *)\r"
                    attr: 0
                  - text: "\t\tBEGIN\r\t\t\tIF n = NIL THEN\r\t\t\t\tIF x.hint # 1 THEN n := x END\r\t\t\tELSIF yval < n.conval.intval THEN Insert(n.left)\r\t\t\tELSIF xval > n.conval.intval2 THEN Insert(n.right)\r\t\t\tELSE err(63)\r\t\t\tEND\r\t\tEND Insert;\r"
                    attr: 3
                  - text: "\t\t\r\tBEGIN lab := NIL;\r\t\tLOOP ConstExpression(x); f := x.typ.form;\r\t\t\tIF f IN {Int8..Int32} + charSet THEN  xval := x.conval.intval\r\t\t\tELSE err(61); xval := 1\r\t\t\tEND ;\r\t\t\tIF (f IN {Int8..Int32}) # (LabelForm IN {Int8..Int32}) THEN err(60) END;\r\t\t\tIF sym = upto THEN\r\t\t\t\tDevCPS.Get(sym); ConstExpression(y); yval := y.conval.intval;\r\t\t\t\tIF (y.typ.form IN {Int8..Int32}) # (LabelForm IN {Int8..Int32}) THEN err(60) END;\r\t\t\t\tIF yval < xval THEN err(63); yval := xval END\r\t\t\tELSE yval := xval\r\t\t\tEND ;\r\t\t\tx.conval.intval2 := yval;\r"
