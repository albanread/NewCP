                  - text: "\r\tIMPORT\r\t\tStrings, DevCPM, DevCPT, DevCPB, DevCPS;\r\t\t\r\tCONST\r\t\tanchorVarPar = TRUE;\r\t\r\t\t(* numtyp values *)\r\t\tchar = 1; integer = 2; real = 4; int64 = 5; real32 = 6; real64 = 7;\r\r\t\t(*symbol values*)\r\t\tnull = 0; times = 1; slash = 2; div = 3; mod = 4;\r\t\tand = 5; plus = 6; minus = 7; or = 8; eql = 9;\r\t\tneq = 10; lss = 11; leq = 12; gtr = 13; geq = 14;\r\t\tin = 15; is = 16; arrow = 17; dollar = 18; period = 19;\r\t\tcomma = 20; colon = 21; upto = 22; rparen = 23; rbrak = 24;\r\t\trbrace = 25; of = 26; then = 27; do = 28; to = 29;\r\t\tby = 30; not = 33;\r\t\tlparen = 40; lbrak = 41; lbrace = 42; becomes = 44;\r\t\tnumber = 45; nil = 46; string = 47; ident = 48; semicolon = 49;\r\t\tbar = 50; end = 51; else = 52; elsif = 53; until = 54;\r\t\tif = 55; case = 56; while = 57; repeat = 58; for = 59;\r\t\tloop = 60; with = 61; exit = 62; return = 63; array = 64;\r\t\trecord = 65; pointer = 66; begin = 67; const = 68; type = 69;\r\t\tvar = 70; out = 71; procedure = 72; close = 73; import = 74;\r\t\tmodule = 75; eof = 76;\r\r\t\t(* object modes *)\r\t\tVar = 1; VarPar = 2; Con = 3; Fld = 4; Typ = 5; LProc = 6; XProc = 7;\r\t\tSProc = 8; CProc = 9; IProc = 10; Mod = 11; Head = 12; TProc = 13; Attr = 20;\r\r\t\t(* Structure forms *)\r\t\tUndef = 0; Byte = 1; Bool = 2; Char8 = 3; Int8 = 4; Int16 = 5; Int32 = 6;\r\t\tReal32 = 7; Real64 = 8; Set = 9; String8 = 10; NilTyp = 11; NoTyp = 12;\r\t\tPointer = 13; ProcTyp = 14; Comp = 15;\r\t\tChar16 = 16; String16 = 17; Int64 = 18;\r\t\tintSet = {Int8..Int32, Int64}; charSet = {Char8, Char16};\r\t\t\r\t\t(* composite structure forms *)\r\t\tBasic = 1; Array = 2; DynArr = 3; Record = 4;\r\r\t\t(*function number*)\r\t\thaltfn = 0; newfn = 1; incfn = 13; sysnewfn = 30;\r\r\t\t(* nodes classes *)\r\t\tNvar = 0; Nvarpar = 1; Nfield = 2; Nderef = 3; Nindex = 4; Nguard = 5; Neguard = 6;\r\t\tNconst = 7; Ntype = 8; Nproc = 9; Nupto = 10; Nmop = 11; Ndop = 12; Ncall = 13;\r\t\tNinittd