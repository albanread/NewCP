                    attr: 0
                  - text: "low, high"
                    attr: 3
                  - text: ");\r\t\t\t\t\tCheckSym(colon); StatSeq(y);\r\t\t\t\t\tDevCPB.Construct(Ncasedo, lab, y); DevCPB.Link(cases, lastcase, lab)\r\t\t\t\tEND ;\r\t\t\t\tIF sym = bar THEN DevCPS.Get(sym) ELSE EXIT END\r\t\t\tEND;\r\t\t\te := sym = else;\r\t\t\tIF e THEN DevCPS.Get(sym); StatSeq(y) ELSE y := NIL END ;\r\t\t\tDevCPB.Construct(Ncaselse, cases, y); DevCPB.Construct(Ncase, x, cases);\r\t\t\tcases.conval := DevCPT.NewConst();\r\t\t\tcases.conval.intval := low; cases.conval.intval2 := high;\r\t\t\tIF e THEN cases.conval.setval := {1} ELSE cases.conval.setval := {} END;\r\t\t\tDevCPB.OptimizeCase(root); cases.link := root\t(* !!! *)\r\t\tEND CasePart;\r\t\t\r\t\tPROCEDURE SetPos(x: DevCPT.Node);\r\t\tBEGIN\r\t\t\tx.conval := DevCPT.NewConst(); x.conval.intval := pos\r\t\tEND SetPos;\r\r\t\tPROCEDURE CheckBool(VAR x: DevCPT.Node);\r\t\tBEGIN\r\t\t\tIF (x.class = Ntype) OR (x.class = Nproc) THEN err(126); x := DevCPB.NewBoolConst(FALSE)\r\t\t\tELSIF x.typ.form # Bool THEN err(120); x := DevCPB.NewBoolConst(FALSE)\r\t\t\tEND\r\t\tEND CheckBool;\r\r\tBEGIN stat := NIL; last := NIL;\r\t\tLOOP x := NIL;\r\t\t\tIF sym < ident THEN err(14);\r\t\t\t\tREPEAT DevCPS.Get(sym) UNTIL sym >= ident\r\t\t\tEND ;\r\t\t\tpos := DevCPM.startpos;\r\t\t\tIF sym = ident THEN\r\t\t\t\tqualident(id); x := DevCPB.NewLeaf(id); selector(x);\r\t\t\t\tIF sym = becomes THEN\r\t\t\t\t\tDevCPS.Get(sym); Expression(y);\r\t\t\t\t\tIF (y.typ.form = Pointer) & (x.typ.form = Comp) THEN DevCPB.DeRef(y) END;\r\t\t\t\t\tpre := NIL; lastp := NIL;\r\t\t\t\t\tDevCPB.CheckBuffering(y, x, NIL, pre, lastp);\r\t\t\t\t\tDevCPB.Assign(x, y);\r\t\t\t\t\tIF pre # NIL THEN SetPos(x); DevCPB.Construct(Ncomp, pre, x); x := pre END;\r\t\t\t\tELSIF sym = eql THEN\r\t\t\t\t\terr(becomes); DevCPS.Get(sym); Expression(y); DevCPB.Assign(x, y)\r\t\t\t\tELSIF (x.class = Nproc) & (x.obj.mode = SProc) THEN\r\t\t\t\t\tStandProcCall(x);\r\t\t\t\t\tIF (x # NIL) & (x.typ # DevCPT.notyp) THEN err(55) END;\r\t\t\t\t\tIF (x # NIL) & (x.class = Nifelse) THEN\t(* error pos for ASSERT *)\r\t\t\t\t\t\tSetPos(x.left); SetPos(x.left.right)\r\t\t\t\t\tEND\r\t\t\t\tELSIF x.class = Ncall THEN err(55)\r\t\t\t\tELSE\r\t\t\t\t\tpre := NIL; lastp := NIL;\r\t\t\t\t\tDevCPB.PrepCall(x, fpar);\r\t\t\t\t\tIF (x.obj # NIL) & (x.obj.mode = TProc) THEN DevCPB.CheckBuffering(x.left, NIL, x.obj.link, pre, lastp) END;\r\t\t\t\t\tIF sym = lparen THEN\r\t\t\t\t\t\tDevCPS.Get(sym); ActualParameters(apar, fpar, pre, lastp); CheckSym(rparen)\r\t\t\t\t\tELSE apar := NIL;\r\t\t\t\t\t\tIF fpar # NIL THEN err(65) END\r\t\t\t\t\tEND ;\r\t\t\t\t\tDevCPB.Call(x, apar, fpar);\r\t\t\t\t\tIF x.typ # DevCPT.notyp THEN err(55) END;\r\t\t\t\t\tIF pre # NIL THEN SetPos(x); DevCPB.Construct(Ncomp, pre, x); x := pre END;\r\t\t\t\t\tIF level > 0 THEN DevCPT.topScope.link.leaf := FALSE END\r\t\t\t\tEND\r\t\t\tELSIF sym = if THEN\r\t\t\t\tDevCPS.Get(sym); pos := DevCPM.startpos; Expression(x); CheckBool(x); CheckSym(then); StatSeq(y);\r\t\t\t\tDevCPB.Construct(Nif, x, y); SetPos(x); lastif := x;\r\t\t\t\tWHILE sym = elsif DO\r\t\t\t\t\tDevCPS.Get(sym); pos := DevCPM.startpos; Expression(y); CheckBool(y); CheckSym(then); StatSeq(z);\r\t\t\t\t\tDevCPB.Construct(Nif, y, z); SetPos(y); DevCPB.Link(x, lastif, y)\r\t\t\t\tEND ;\r\t\t\t\tpos := DevCPM.startpos;\r\t\t\t\tIF sym = else THEN DevCPS.Get(sym); StatSeq(y) ELSE y := NIL END ;\r\t\t\t\tDevCPB.Construct(Nifelse, x, y); CheckSym(end); DevCPB.OptIf(x);\r\t\t\tELSIF sym = case THEN\r\t\t\t\tDevCPS.Get(sym); pos := DevCPM.startpos; CasePart(x); CheckSym(end)\r\t\t\tELSIF sym = while THEN\r\t\t\t\tDevCPS.Get(sym); pos := DevCPM.startpos; Expression(x); CheckBool(x); CheckSym(do); StatSeq(y);\r\t\t\t\tDevCPB.Construct(Nwhile, x, y); CheckSym(end)\r\t\t\tELSIF sym = repeat THEN\r\t\t\t\tDevCPS.Get(sym); StatSeq(x);\r\t\t\t\tIF sym = until THEN DevCPS.Get(sym); pos := DevCPM.startpos; Expression(y); CheckBool(y)\r\t\t\t\tELSE err(43)\r\t\t\t\tEND ;\r\t\t\t\tDevCPB.Construct(Nrepeat, x, y)\r\t\t\tELSIF sym = for THEN\r\t\t\t\tDevCPS.Get(sym); pos := DevCPM.startpos;\r\t\t\t\tIF sym = ident THEN qualident(id);\r\t\t\t\t\tIF ~(id.typ.form IN intSet) THEN err(68) END ;\r\t\t\t\t\tCheckSym(becomes); Expression(y);\r\t\t\t\t\tx := DevCPB.NewLeaf(id); DevCPB.Assign(x, y); SetPos(x);\r\t\t\t\t\tCheckSym(to); pos := DevCPM.startpos; Expression(y);\r\t\t\t\t\tIF y.class # Nconst THEN\r\t\t\t\t\t\tDevCPB.GetTempVar(\"@for\", x.left.typ, t);\r\t\t\t\t\t\tz := DevCPB.NewLeaf(t); DevCPB.Assign(z, y); SetPos(z); DevCPB.Link(stat, last, z);\r\t\t\t\t\t\ty := DevCPB.NewLeaf(t)\r\t\t\t\t\tELSE\r\t\t\t\t\t\tDevCPB.CheckAssign(x.left.typ, y)\r\t\t\t\t\tEND ;\r\t\t\t\t\tDevCPB.Link(stat, last, x);\r\t\t\t\t\tp := DevCPM.startpos;\r\t\t\t\t\tIF sym = by THEN DevCPS.Get(sym); ConstExpression(z) ELSE z := DevCPB.NewIntConst(1) END ;\r\t\t\t\t\tx := DevCPB.NewLeaf(id);\r\t\t\t\t\tIF z.conval.intval > 0 THEN DevCPB.Op(leq, x, y)\r\t\t\t\t\tELSIF z.conval.intval < 0 THEN DevCPB.Op(geq, x, y)\r\t\t\t\t\tELSE err(63); DevCPB.Op(geq, x, y)\r\t\t\t\t\tEND ;\r\t\t\t\t\tCheckSym(do); StatSeq(s);\r\t\t\t\t\ty := DevCPB.NewLeaf(id); DevCPB.StPar1(y, z, incfn); pos := DevCPM.startpos; SetPos(y);\r\t\t\t\t\tIF s = NIL THEN s := y\r\t\t\t\t\tELSE z := s;\r\t\t\t\t\t\tWHILE z.link # NIL DO z := z.link END ;\r\t\t\t\t\t\tz.link := y\r\t\t\t\t\tEND ;\r\t\t\t\t\tCheckSym(end); DevCPB.Construct(Nwhile, x, s); pos := p\r\t\t\t\tELSE err(ident)\r\t\t\t\tEND\r\t\t\tELSIF sym = loop THEN\r\t\t\t\tDevCPS.Get(sym); INC(LoopLevel); StatSeq(x); DEC(LoopLevel);\r\t\t\t\tDevCPB.Construct(Nloop, x, NIL); CheckSym(end)\r\t\t\tELSIF sym = with THEN\r\t\t\t\tDevCPS.Get(sym); idtyp := NIL; x := NIL;\r\t\t\t\tLOOP\r\t\t\t\t\tIF sym < bar THEN\r\t\t\t\t\t\tpos := DevCPM.startpos;\r\t\t\t\t\t\tIF sym = ident THEN\r\t\t\t\t\t\t\tqualident(id); y := DevCPB.NewLeaf(id);\r\t\t\t\t\t\t\tIF (id # NIL) & (id.typ.form = Pointer) & ((id.mode = VarPar) OR ~id.leaf) THEN\r\t\t\t\t\t\t\t\terr(-302)\t(* warning 302 *)\r\t\t\t\t\t\t\tEND ;\r\t\t\t\t\t\t\tCheckSym(colon);\r\t\t\t\t\t\t\tIF sym = ident THEN qualident(t);\r\t\t\t\t\t\t\t\tIF t.mode = Typ THEN\r\t\t\t\t\t\t\t\t\tIF id # NIL THEN\r\t\t\t\t\t\t\t\t\t\tidtyp := id.typ; DevCPB.TypTest(y, t, FALSE); id.typ := t.typ;\r\t\t\t\t\t\t\t\t\t\tIF id.ptyp = NIL THEN id.ptyp := idtyp END\r\t\t\t\t\t\t\t\t\tELSE err(130)\r\t\t\t\t\t\t\t\t\tEND\r\t\t\t\t\t\t\t\tELSE err(52)\r\t\t\t\t\t\t\t\tEND\r\t\t\t\t\t\t\tELSE err(ident)\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tELSE err(ident)\r\t\t\t\t\t\tEND ;\r\t\t\t\t\t\tCheckSym(do); StatSeq(s); DevCPB.Construct(Nif, y, s); SetPos(y);\r\t\t\t\t\t\tIF idtyp # NIL THEN\r\t\t\t\t\t\t\tIF id.ptyp = idtyp THEN id.ptyp := NIL END;\r\t\t\t\t\t\t\tid.typ := idtyp; idtyp := NIL\r\t\t\t\t\t\tEND ;\r\t\t\t\t\t\tIF x = NIL THEN x := y; lastif := x ELSE DevCPB.Link(x, lastif, y) END\r\t\t\t\t\tEND;\r\t\t\t\t\tIF sym = bar THEN DevCPS.Get(sym) ELSE EXIT END\r\t\t\t\tEND;\r\t\t\t\te := sym = else; pos := DevCPM.startpos;\r\t\t\t\tIF e THEN DevCPS.Get(sym); StatSeq(s) ELSE s := NIL END ;\r\t\t\t\tDevCPB.Construct(Nwith, x, s); CheckSym(end);\r\t\t\t\tIF e THEN x.subcl := 1 END\r\t\t\tELSIF sym = exit THEN\r\t\t\t\tDevCPS.Get(sym);\r\t\t\t\tIF LoopLevel = 0 THEN err(46) END ;\r\t\t\t\tDevCPB.Construct(Nexit, x, NIL)\r\t\t\tELSIF sym = return THEN DevCPS.Get(sym);\r\t\t\t\tIF sym < semicolon THEN Expression(x) END ;\r\t\t\t\tIF level > 0 THEN DevCPB.Return(x, DevCPT.topScope.link)\r\t\t\t\tELSE (* not standard Oberon *) DevCPB.Return(x, NIL)\r\t\t\t\tEND;\r\t\t\t\thasReturn := TRUE\r\t\t\tEND ;\r\t\t\tIF x # NIL THEN SetPos(x); DevCPB.Link(stat, last, x) END ;\r\t\t\tIF sym = semicolon THEN DevCPS.Get(sym)\r\t\t\tELSIF (sym <= ident) OR (if <= sym) & (sym <= return) THEN err(semicolon)\r\t\t\tELSE EXIT\r\t\t\tEND\r\t\tEND\r\tEND StatSeq;\r\r\tPROCEDURE Block(VAR procdec, statseq: DevCPT.Node);\r\t\tVAR typ: DevCPT.Struct;\r\t\t\tobj, first, last, o: DevCPT.Object;\r\t\t\tx, lastdec: DevCPT.Node;\r\t\t\ti: SHORTINT;\r\t\t\trname: DevCPT.Name;\r\t\t\tname: DevCPT.String;\r\t\t\trec: Elem;\r\r\tBEGIN\r\t\tIF ((sym < begin) OR (sym > var)) & (sym # procedure) & (sym # end) & (sym # close) THEN err(36) END;\r\t\tfirst := NIL; last := NIL; userList := NIL; recList := NIL;\r\t\tLOOP\r\t\t\tIF sym = const THEN\r\t\t\t\tDevCPS.Get(sym);\r\t\t\t\tWHILE sym = ident DO\r\t\t\t\t\tDevCPT.Insert(DevCPS.name, obj);\r\t\t\t\t\tobj.mode := Con; CheckMark(obj);\r\t\t\t\t\tobj.typ := DevCPT.int8typ; obj.mode := Var;\t(* Var to avoid recursive definition *)\r\t\t\t\t\tIF sym = eql THEN\r\t\t\t\t\t\tDevCPS.Get(sym); ConstExpression(x)\r\t\t\t\t\tELSIF sym = becomes THEN\r\t\t\t\t\t\terr(eql); DevCPS.Get(sym); ConstExpression(x)\r\t\t\t\t\tELSE err(eql); x := DevCPB.NewIntConst(1)\r\t\t\t\t\tEND ;\r\t\t\t\t\tobj.mode := Con; obj.typ := x.typ; obj.conval := x.conval; (* ConstDesc is not copied *)\r\t\t\t\t\tCheckSym(semicolon)\r\t\t\t\tEND\r\t\t\tEND ;\r\t\t\tIF sym = type THEN\r\t\t\t\tDevCPS.Get(sym);\r\t\t\t\tWHILE sym = ident DO\r\t\t\t\t\tDevCPT.Insert(DevCPS.name, obj); obj.mode := Typ; obj.typ := DevCPT.undftyp;\r\t\t\t\t\tCheckMark(obj); obj.mode := -1;\r\t\t\t\t\tIF sym # eql THEN err(eql) END;\r\t\t\t\t\tIF (sym = eql) OR (sym = becomes) OR (sym = colon) THEN\r\t\t\t\t\t\tDevCPS.Get(sym); Type(obj.typ, name); SetType(NIL, obj, obj.typ, name);\r\t\t\t\t\tEND;\r\t\t\t\t\tobj.mode := Typ;\r\t\t\t\t\tIF obj.typ.form IN {Byte..Set, Char16, Int64} THEN\t(* make alias structure *)\r\t\t\t\t\t\ttyp := DevCPT.NewStr(obj.typ.form, Basic); i := typ.ref;\r\t\t\t\t\t\ttyp^ := obj.typ^; typ.ref := i; typ.strobj := NIL; "
                    attr: 0
                  - text: "typ.mno := 0; typ.txtpos := DevCPM.errpos;"
                    attr: 3
                  - text: "\r\t\t\t\t\t\ttyp.BaseTyp := obj.typ; obj.typ := typ;\r\t\t\t\t\tEND;\r\t\t\t\t\tIF obj.typ.strobj = NIL THEN obj.typ.strobj := obj END ;\r\t\t\t\t\tIF obj.typ.form = Pointer THEN"
                    attr: 0
                  - text: "\t(* !!! *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\ttyp := obj.typ.BaseTyp;\r\t\t\t\t\t\tIF (typ # NIL) & (typ.comp = Record) & (typ.strobj = NIL) THEN\r\t\t\t\t\t\t\t"
                    attr: 0
                  - text: "(* pointer to unnamed record: name record as \"pointerName^\" *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\t\trname := obj.name^$; i := 0;\r\t\t\t\t\t\t\tWHILE rname[i] # 0X DO INC(i) END;\r\t\t\t\t\t\t\trname[i] := \"^\"; rname[i+1] := 0X;\r\t\t\t\t\t\t\tDevCPT.Insert(rname, o); o.mode := Typ; o.typ := typ; typ.strobj := o\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND;\r\t\t\t\t\tIF obj.vis # internal THEN\r\t\t\t\t\t\ttyp := obj.typ;\r\t\t\t\t\t\tIF typ.form = Pointer THEN typ := typ.BaseTyp END;\r\t\t\t\t\t\tIF typ.comp = Record THEN typ.exp := TRUE END\r\t\t\t\t\tEND;\r\t\t\t\t\tCheckSym(semicolon)\r\t\t\t\tEND\r\t\t\tEND ;\r\t\t\tIF sym = var THEN\r\t\t\t\tDevCPS.Get(sym);\r\t\t\t\tWHILE sym = ident DO\r\t\t\t\t\tLOOP\r\t\t\t\t\t\tIF sym = ident THEN\r\t\t\t\t\t\t\tDevCPT.Insert(DevCPS.name, obj);\r\t\t\t\t\t\t\tobj.mode := Var; obj.link := NIL; obj.leaf := obj.vis = internal; obj.typ := DevCPT.undftyp;\r\t\t\t\t\t\t\tCheckMark(obj);\r\t\t\t\t\t\t\tIF first = NIL THEN first := obj END ;\r\t\t\t\t\t\t\tIF last = NIL THEN DevCPT.topScope.scope := obj ELSE last.link := obj END ;\r\t\t\t\t\t\t\tlast := obj\r\t\t\t\t\t\tELSE err(ident)\r\t\t\t\t\t\tEND ;\r\t\t\t\t\t\tIF sym = comma THEN DevCPS.Get(sym)\r\t\t\t\t\t\tELSIF sym = ident THEN err(comma)\r\t\t\t\t\t\tELSE EXIT\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND ;\r\t\t\t\t\tCheckSym(colon); Type(typ, name);\r\t\t\t\t\tCheckAlloc(typ, FALSE, DevCPM.errpos);\r\t\t\t\t\tWHILE first # NIL DO SetType(NIL, first, typ, name); first := first.link END ;\r\t\t\t\t\tCheckSym(semicolon)\r\t\t\t\tEND\r\t\t\tEND ;\r\t\t\tIF (sym < const) OR (sym > var) THEN EXIT END ;\r\t\tEND ;\r\t\tCheckForwardTypes;\r\t\tuserList := NIL; rec := recList; recList := NIL;\r\t\tDevCPT.topScope.adr := DevCPM.errpos;\r\t\tprocdec := NIL; lastdec := NIL;\r\t\tIF (sym # procedure) & (sym # begin) & (sym # end) & (sym # close) THEN err(37) END;\r\t\tWHILE sym = procedure DO\r\t\t\tDevCPS.Get(sym); ProcedureDeclaration(x);\r\t\t\tIF x # NIL THEN\r\t\t\t\tIF lastdec = NIL THEN procdec := x ELSE lastdec.link := x END ;\r\t\t\t\tlastdec := x\r\t\t\tEND ;\r\t\t\tCheckSym(semicolon)\r\t\tEND ;\r\t\tIF DevCPM.noerr & ~(DevCPM.oberon IN DevCPM.options) THEN CheckRecords(rec) END;\r\t\thasReturn := FALSE;\r\t\tIF (sym # begin) & (sym # end) & (sym # close) THEN err(38) END;\r\t\tIF sym = begin THEN DevCPS.Get(sym); StatSeq(statseq)\r\t\tELSE statseq := NIL\r\t\tEND ;\r\t\tIF (DevCPT.topScope.link # NIL) & (DevCPT.topScope.link.typ # DevCPT.notyp)\r\t\t\t& ~hasReturn & (DevCPT.topScope.link.sysflag = 0) THEN err(133) END;\r\t\tIF (level = 0) & (TDinit # NIL) THEN\r\t\t\tlastTDinit.link := statseq; statseq := TDinit\r\t\tEND\r\tEND Block;\r\r\tPROCEDURE Module*(VAR prog: DevCPT.Node);\r\t\tVAR impName, aliasName: DevCPT.Name;\r\t\t\t\tprocdec, statseq: DevCPT.Node;\r\t\t\t\tc, sf: INTEGER; done: BOOLEAN;\r\tBEGIN\r\t\tDevCPS.Init; LoopLevel := 0; level := 0; DevCPS.Get(sym);\r\t\tIF sym = module THEN DevCPS.Get(sym) ELSE err(16) END ;\r\t\tIF sym = ident THEN\r\t\t\t"
                    attr: 0
