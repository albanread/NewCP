                    attr: 1
                  - text: "\r\t\t\t\tIF typ.form = Comp THEN typ := DevCPT.undftyp; DevCPM.Mark(54, pos) END;\r\t\t\tELSE HALT(100)\r\t\t\tEND;\r\t\t\tstruct.BaseTyp := typ\r\t\tEND\r\tEND FixType;\r\r\tPROCEDURE CheckForwardTypes;\r\t\tVAR u, next: Elem; progress: BOOLEAN;\r\tBEGIN\r\t\tu := userList; userList := NIL;\r\t\tWHILE u # NIL DO\r\t\t\tnext := u.next; DevCPS.name := u.name^$; DevCPT.Find(DevCPS.name, u.base);\r\t\t\tIF u.base = NIL THEN DevCPM.Mark(0, u.pos)\r\t\t\tELSIF u.base.mode # Typ THEN DevCPM.Mark(72, u.pos)\r\t\t\tELSE u.next := userList; userList := u\t"
                    attr: 0
