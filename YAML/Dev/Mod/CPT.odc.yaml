                  - text: EqualType
                    attr: 3
                  - text: "* (x, y: Struct): BOOLEAN;\r\t\tVAR xp, yp: Object; n: INTEGER;\r\tBEGIN\r\t\tn := 0;\r\t\tWHILE (n < 100) & (x # y)\r\t\t\t& (((x.comp = DynArr) & (y.comp = DynArr) & (x.sysflag = y.sysflag))\r\t\t\t\tOR ((x.form = Pointer) & (y.form = Pointer))\r\t\t\t\tOR ((x.form = ProcTyp) & (y.form = ProcTyp))) DO\r\t\t\tIF x.form = ProcTyp THEN\r\t\t\t\tIF x.sysflag # y.sysflag THEN "
