                  - text: "\r\tBEGIN\r\t\tsymExtended := FALSE; symNew := FALSE; nofmod := nofGmod;\r\t\tImport(\"@self\", SelfName, done); nofGmod := nofmod;\r\t\t"
                    attr: 0
                  - text: "oldCSum := DevCPM.checksum;"
                    attr: 5
                  - text: "\r\t\tASSERT(GlbMod[0].name^ = SelfName);\r\t\tIF DevCPM.noerr THEN\t(* ~DevCPM.noerr => ~done *)\r\t\t\tDevCPM.NewSym(SelfName);\r\t\t\tIF DevCPM.noerr THEN\r\t\t\t\tDevCPM.SymWInt(0);\t(* portable symfile *)\r\t\t\t\t"
                    attr: 0
                  - text: "DevCPM.checksum := 0;\t"
