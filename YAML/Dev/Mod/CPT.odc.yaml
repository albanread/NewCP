                    attr: 5
                  - text: ";\r\t\t\t\tIF DevCPM.noerr & ~portable THEN\r\t\t\t\t\tDevCPM.SymReset;\r\t\t\t\t\tDevCPM.SymWInt(processor)\t(* nonportable symfile *)\r\t\t\t\tEND;\r\t\t\t\tIF DevCPM.noerr & sfpresent & (impCtxt.reffp # expCtxt.reffp) THEN\r\t\t\t\t\tnew := TRUE\r\t\t\t\tEND ;\r\t\t\t\tIF ~DevCPM.noerr THEN DevCPM.DeleteNewSym END\r\t\t\t\t(* DevCPM.RegisterNewSym is called in OP2 after writing the object file *)\r\t\t\tEND\r\t\tEND\r\tEND Export;\t(* no new symbol file if ~DevCPM.noerr *)\r\r\r\tPROCEDURE InitStruct(VAR typ: Struct; form: BYTE);\r\tBEGIN\r\t\ttyp := NewStr(form, Basic); typ.ref := form; typ.size := 1; typ.allocated := TRUE;\r\t\ttyp.strobj := NewObj(); typ.pbfp := form; typ.pvfp := form; typ.fpdone := TRUE;\r\t\ttyp.idfp := form; typ.idfpdone := TRUE\r\tEND InitStruct;\r\r\tPROCEDURE EnterBoolConst(IN name: Name; val: INTEGER);\r\t\tVAR obj: Object;\r\tBEGIN\r\t\tInsert(name, obj); obj.conval := NewConst();\r\t\tobj.mode := Con; obj.typ := booltyp; obj.conval.intval := val\r\tEND EnterBoolConst;\r\r\tPROCEDURE EnterRealConst(IN name: Name; val: REAL; VAR obj: Object);\r\tBEGIN\r\t\tInsert(name, obj); obj.conval := NewConst();\r\t\tobj.mode := Con; obj.typ := real32typ; obj.conval.realval := val\r\tEND EnterRealConst;\r\r\tPROCEDURE EnterTyp(IN name: Name; form: BYTE; size: SHORTINT; VAR res: Struct);\r\t\tVAR obj: Object; typ: Struct;\r\tBEGIN\r\t\tInsert(name, obj);\r\t\ttyp := NewStr(form, Basic); obj.mode := Typ; obj.typ := typ; obj.vis := external;\r\t\ttyp.strobj := obj; typ.size := size; typ.ref := form; typ.allocated := TRUE;\r\t\ttyp.pbfp := form; typ.pvfp := form; typ.fpdone := TRUE;\r\t\ttyp.idfp := form; typ.idfpdone := TRUE; res := typ\r\tEND EnterTyp;\r\r\tPROCEDURE EnterProc(IN name: Name; num: SHORTINT);\r\t\tVAR obj: Object;\r\tBEGIN Insert(name, obj);\r\t\tobj.mode := SProc; obj.typ := notyp; obj.adr := num\r\tEND EnterProc;\r\t\r\tPROCEDURE EnterAttr(IN name: Name; num: SHORTINT);\r\t\tVAR obj: Object;\r\tBEGIN Insert(name, obj);\r\t\tobj.mode := Attr; obj.adr := num\r\tEND EnterAttr;\r\r\tPROCEDURE EnterTProc(ptr, rec: Struct; IN name: Name; num, typ: SHORTINT);\r\t\tVAR obj, par: Object;\r\tBEGIN\r\t\tInsertField(name, rec, obj);\r\t\tobj.mnolev := -128;\t"
                    attr: 0
                  - text: "(* for correct implement only behaviour *)"
                    attr: 1
                  - text: "\r\t\tobj.mode := TProc; obj.num := num; obj.conval := NewConst();\r\t\tobj.conval.setval := obj.conval.setval + {newAttr};\r\t\tIF typ = 0 THEN\t(* FINALIZE, RELEASE *)\r\t\t\tobj.typ := notyp; obj.vis := externalR;\r\t\t\tINCL(obj.conval.setval, empAttr)\r\t\tELSIF typ = 1 THEN\t(* QueryInterface *)\r\t\t\tpar := NewObj(); par.name := NewName(\"int\"); par.mode := VarPar; par.vis := outPar;\r\t\t\tpar.sysflag := 8; par.adr := 16; par.typ := punktyp;\r\t\t\tpar.link := obj.link; obj.link := par;\r\t\t\tpar := NewObj(); par.name := NewName(\"iid\"); par.mode := VarPar; par.vis := inPar;\r\t\t\tpar.sysflag := 16; par.adr := 12; par.typ := guidtyp;\r\t\t\tpar.link := obj.link; obj.link := par;\r\t\t\tobj.typ := restyp; obj.vis := external;\r\t\t\tINCL(obj.conval.setval, extAttr)\r\t\tELSIF typ = 2 THEN\t(* AddRef, Release *)\r\t\t\tobj.typ := notyp; obj.vis := externalR;\r\t\t\tINCL(obj.conval.setval, isHidden);\r\t\t\tINCL(obj.conval.setval, extAttr)\r\t\tEND;\r\t\tpar := NewObj(); par.name := NewName(\"this\"); par.mode := Var;\r\t\tpar.adr := 8; par.typ := ptr;\r\t\tpar.link := obj.link; obj.link := par;\r\tEND EnterTProc;\r\r\tPROCEDURE EnterHdField(VAR root: Object; offs: SHORTINT);\r\t\tVAR obj: Object;\r\tBEGIN\r\t\tobj := NewObj(); obj.mode := Fld;\r\t\tobj.name := NewName(DevCPM.HdPtrName); obj.typ := undftyp; obj.adr := offs;\r\t\tobj.link := root; root := obj\r\tEND EnterHdField;\r\rBEGIN\r\tNEW(null, 1); null^ := \"\";\r\ttopScope := NIL; OpenScope(0, NIL); DevCPM.errpos := 0;\r\tInitStruct(undftyp, Undef); InitStruct(notyp, NoTyp);\r\tInitStruct(string8typ, String8); InitStruct(niltyp, NilTyp); niltyp.size := DevCPM.PointerSize;\r\tInitStruct(string16typ, String16);\r\tundftyp.BaseTyp := undftyp;\r\r\t(*initialization of module SYSTEM*)\r(*\r\tEnterTyp(\"BYTE\", Byte, 1, bytetyp);\r\tEnterProc(\"NEW\", sysnewfn);\r*)\r\tEnterTyp(\"PTR\", Pointer, DevCPM.PointerSize, sysptrtyp);\r\tEnterProc(\"ADR\", adrfn);\r\tEnterProc(\"TYP\", typfn);\r\tEnterProc(\"CC\", ccfn);\r\tEnterProc(\"LSH\", lshfn);\r\tEnterProc(\"ROT\", rotfn);\r\tEnterProc(\"GET\", getfn);\r\tEnterProc(\"PUT\", putfn);\r\tEnterProc(\"GETREG\", getrfn);\r\tEnterProc(\"PUTREG\", putrfn);\r\tEnterProc(\"BIT\", bitfn);\r\tEnterProc(\"VAL\", valfn);\r\tEnterProc(\"MOVE\", movefn);\r\tEnterProc(\"THISRECORD\", thisrecfn);\r\tEnterProc(\"THISARRAY\", thisarrfn);\r\tsyslink := topScope.right; topScope.right := NIL;\r\t\r\t"
