                  - text: " THEN portable := FALSE END\t(* hidden untagged pointer are portable *)"
                    attr: 0
                  - text: "\r"
                    attr: 3
                  - text: "\t\tELSIF DevCPM.ExpHdProcFld & ((typ.form = ProcTyp) OR (fld.name^ = DevCPM.HdProcName)) THEN\r\t\t\tDevCPM.SymWInt(Shdpro); DevCPM.SymWInt(adr); INC(nofhdfld)\r\t\tEND\r\tEND OutHdFld;\r\r\tPROCEDURE OutFlds(fld: Object; adr: INTEGER; visible: BOOLEAN);\r\tBEGIN\r\t\tWHILE (fld # NIL) & (fld.mode = Fld) DO\r\t\t\tIF (fld.vis # internal) & visible THEN\r\t\t\t\tIF fld.vis = externalR THEN DevCPM.SymWInt(Srfld) ELSE DevCPM.SymWInt(Sfld) END ;\r\t\t\t\tOutStr(fld.typ); OutName(fld.name^); DevCPM.SymWInt(fld.adr)\r\t\t\tELSE OutHdFld(fld.typ, fld, fld.adr + adr)\r\t\t\tEND ;\r\t\t\tfld := fld.link\r\t\tEND\r\tEND OutFlds;\r\r\tPROCEDURE OutSign(result: Struct; par: Object);\r\tBEGIN\r\t\tOutStr(result);\r\t\tWHILE par # NIL DO\r"
                    attr: 0
                  - text: "\t\t\tIF par.sysflag # 0 THEN DevCPM.SymWInt(Ssys); DevCPM.SymWInt(par.sysflag) END;\t\r"
                    attr: 3
                  - text: "\t\t\tIF par.mode = Var THEN DevCPM.SymWInt(Svalpar)\r\t\t\tELSIF par.vis = inPar THEN DevCPM.SymWInt(Sinpar)\r\t\t\tELSIF par.vis = outPar THEN DevCPM.SymWInt(Soutpar)\r\t\t\tELSE DevCPM.SymWInt(Svarpar)\r\t\t\tEND ;\r\t\t\tOutStr(par.typ);\r\t\t\tDevCPM.SymWInt(par.adr);\r\t\t\tOutName(par.name^); par := par.link\r\t\tEND ;\r\t\tDevCPM.SymWInt(Send)\r\tEND OutSign;\r\r\tPROCEDURE OutTProcs(typ: Struct; obj: Object);\r\t\tVAR bObj: Object;\r\tBEGIN\r\t\tIF obj # NIL THEN\r\t\t\tIF obj.mode = TProc THEN\r(*\r\t\t\t\tIF (typ.BaseTyp # NIL) & (obj.num < typ.BaseTyp.n) & (obj.vis = internal) & (obj.scope # NIL) THEN\r\t\t\t\t\tFindBaseField(obj.name^, typ, bObj);\r\t\t\t\t\tASSERT((bObj # NIL) & (bObj.num = obj.num));\r\t\t\t\t\tIF bObj.vis # internal THEN DevCPM.Mark(109, typ.txtpos) END\r\t\t\t\t\t(* hidden and overriding, not detected in OPP because record exported indirectly or via aliasing *)\r\t\t\t\tEND;\r*)\r\t\t\t\tIF obj.vis # internal THEN\r\t\t\t\t\tIF obj.vis = externalR THEN DevCPM.SymWInt(Simpo) END;\r\t\t\t\t\tIF obj.entry # NIL THEN\r\t\t\t\t\t\tDevCPM.SymWInt(Sentry); OutName(obj.entry^); portable := FALSE\r\t\t\t\t\tEND;\r\t\t\t\t\tIF limAttr IN obj.conval.setval THEN DevCPM.SymWInt(Slimpro)\r\t\t\t\t\tELSIF absAttr IN obj.conval.setval THEN DevCPM.SymWInt(Sabspro)\r\t\t\t\t\tELSIF empAttr IN obj.conval.setval THEN DevCPM.SymWInt(Semppro)\r\t\t\t\t\tELSIF extAttr IN obj.conval.setval THEN DevCPM.SymWInt(Sextpro)\r\t\t\t\t\tELSE DevCPM.SymWInt(Stpro)\r\t\t\t\t\tEND;\r\t\t\t\t\tOutSign(obj.typ, obj.link); OutName(obj.name^);\r\t\t\t\t\tDevCPM.SymWInt(obj.num)\r\t\t\t\tELSIF DevCPM.ExpHdTProc THEN\r\t\t\t\t\tDevCPM.SymWInt(Shdtpro);\r\t\t\t\t\tDevCPM.SymWInt(obj.num)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tOutTProcs(typ, obj.left);\r\t\t\tOutTProcs(typ, obj.right)\r\t\tEND\r\tEND OutTProcs;\r\r\tPROCEDURE OutStr(typ: Struct);\t(* OPV.TypeAlloc already applied *)\r\t\tVAR strobj: Object;\r\tBEGIN\r\t\tIF typ.ref < expCtxt.ref THEN DevCPM.SymWInt(-typ.ref)\r\t\tELSE\r\t\t\tDevCPM.SymWInt(Sstruct);\r\t\t\ttyp.ref := expCtxt.ref; INC(expCtxt.ref);\r\t\t\tIF expCtxt.ref >= maxStruct THEN err(228) END ;\r\t\t\tOutMod(typ.mno); strobj := typ.strobj;\r\t\t\tIF (strobj # NIL) & (strobj.name # null) THEN OutName(strobj.name^);\r\t\t\t\tCASE strobj.history OF\r\t\t\t\t| pbmodified: FPrintErr(strobj, 252)\r\t\t\t\t| pvmodified: FPrintErr(strobj, 251)\r\t\t\t\t| inconsistent: FPrintErr(strobj, 249)\r\t\t\t\tELSE (* checked in OutObj or correct indirect export *)\r\t\t\t\tEND\r\t\t\tELSE DevCPM.SymWCh(0X)\t(* anonymous => never inconsistent, pvfp influences the client fp *)\r\t\t\tEND;\r\t\t\tIF typ.sysflag # 0 THEN\t(* !!! *)\r\t\t\t\tDevCPM.SymWInt(Ssys); DevCPM.SymWInt(typ.sysflag);\r\t\t\t\tIF typ.sysflag > 0 THEN portable := FALSE END\r\t\t\tEND;\r\t\t\tIF strobj # NIL THEN\r\t\t\t\tIF strobj.library # NIL THEN\r\t\t\t\t\tDevCPM.SymWInt(Slib); OutName(strobj.library^); portable := FALSE\r\t\t\t\tEND;\r\t\t\t\tIF strobj.entry # NIL THEN\r\t\t\t\t\tDevCPM.SymWInt(Sentry); OutName(strobj.entry^); portable := FALSE\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF typ.ext # NIL THEN\r\t\t\t\tDevCPM.SymWInt(String8); OutName(typ.ext^); portable := FALSE\r\t\t\tEND;\r\t\t\tCASE typ.form OF\r\t\t\t| Pointer:\r\t\t\t\tDevCPM.SymWInt(Sptr); OutStr(typ.BaseTyp)\r\t\t\t| ProcTyp:\r\t\t\t\tDevCPM.SymWInt(Spro); OutSign(typ.BaseTyp, typ.link)\r\t\t\t| Comp:\r\t\t\t\tCASE typ.comp OF\r\t\t\t\t| Array:\r\t\t\t\t\tDevCPM.SymWInt(Sarr); OutStr(typ.BaseTyp); DevCPM.SymWInt(typ.n)\r\t\t\t\t| DynArr:\r\t\t\t\t\tDevCPM.SymWInt(Sdarr); OutStr(typ.BaseTyp)\r\t\t\t\t| Record:\r\t\t\t\t\tIF typ.attribute = limAttr THEN DevCPM.SymWInt(Slimrec)\r\t\t\t\t\tELSIF typ.attribute = absAttr THEN DevCPM.SymWInt(Sabsrec)\r\t\t\t\t\tELSIF typ.attribute = extAttr THEN DevCPM.SymWInt(Sextrec)\r\t\t\t\t\tELSE DevCPM.SymWInt(Srec)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF typ.BaseTyp = NIL THEN OutStr(notyp) ELSE OutStr(typ.BaseTyp) END ;\r\t\t\t\t\t(* BaseTyp should be Notyp, too late to change *)\r\t\t\t\t\tDevCPM.SymWInt(typ.size); DevCPM.SymWInt(typ.align); DevCPM.SymWInt(typ.n);\r\t\t\t\t\tnofhdfld := 0; OutFlds(typ.link, 0, TRUE);\r(*\r"
                    attr: 0
                  - text: "\t\t\t\t\tIF nofhdfld > DevCPM.MaxHdFld THEN DevCPM.Mark(223, typ.txtpos) END ;"
