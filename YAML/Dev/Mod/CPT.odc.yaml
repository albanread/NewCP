                  - text: "bh: checks usage of non Unicode WinApi functions and types"
                    attr: 1
                  - text: "\r\t\tIF (res # NIL) & (mod.scope.library # NIL)\r\t\t\t\t& ~(DevCPM.interface IN DevCPM.options)\r\t\t\t\t& (SelfName # \"Kernel\") & (SelfName # \"HostPorts\") THEN\r\t\t\tn := name + \"W\";\r\t\t\tFindImport(n, mod, obj);\r\t\t\tIF obj # NIL THEN\r\t\t\t\tDevCPM.err(733)\r\t\t\tELSE\r\t\t\t\ti := LEN(name$);\r\t\t\t\tIF name[i - 1] = \"A\" THEN\r\t\t\t\t\tn[i - 1] := \"W\"; n[i] := 0X;\r\t\t\t\t\tFindImport(n, mod, obj);\r\t\t\t\t\tIF obj # NIL THEN\r\t\t\t\t\t\tDevCPM.err(734)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND;\r*)\r\tEND FindImport;\r\r\tPROCEDURE Find*(IN name: Name; VAR res: Object);\r\t\tVAR obj, head: Object;\r\tBEGIN head := topScope;\r\t\tLOOP obj := head.right;\r\t\t\tLOOP\r\t\t\t\tIF obj = NIL THEN EXIT END ;\r\t\t\t\tIF name < obj.name^ THEN obj := obj.left\r\t\t\t\tELSIF name > obj.name^ THEN obj := obj.right\r\t\t\t\tELSE (* found, obj.used not set for local objects *) EXIT\r\t\t\t\tEND\r\t\t\tEND ;\r\t\t\tIF obj # NIL THEN EXIT END ;\r\t\t\thead := head.left;\r\t\t\tIF head = NIL THEN EXIT END\r\t\tEND ;\r\t\tres := obj\r\tEND Find;\r\r\tPROCEDURE FindFld (IN name: ARRAY OF SHORTCHAR; typ: Struct; VAR res: Object);\r\t\tVAR obj: Object;\r\tBEGIN \r\t\tWHILE (typ # NIL) & (typ # undftyp) DO obj := typ.link;\r\t\t\tWHILE obj # NIL DO\r\t\t\t\tIF name < obj.name^ THEN obj := obj.left\r\t\t\t\tELSIF name > obj.name^ THEN obj := obj.right\r\t\t\t\tELSE (*found*) res := obj; RETURN\r\t\t\t\tEND\r\t\t\tEND ;\r\t\t\ttyp := typ.BaseTyp\r\t\tEND;\r\t\tres := NIL\r\tEND FindFld;\r\t\r\tPROCEDURE FindField* (IN name: ARRAY OF SHORTCHAR; typ: Struct; VAR res: Object);\r\tBEGIN\r\t\tFindFld(name, typ, res);\r\t\tIF (res = NIL) & ~typ.untagged THEN FindFld(name, anytyp, res) END\r\tEND FindField;\r\t\r\tPROCEDURE FindBaseField* (IN name: ARRAY OF SHORTCHAR; typ: Struct; VAR res: Object);\r\tBEGIN\r\t\tFindFld(name, typ.BaseTyp, res);\r\t\tIF (res = NIL) & ~typ.untagged THEN FindFld(name, anytyp, res) END\r\tEND FindBaseField;\r\t\r(*\r\tPROCEDURE Rotated (y: Object; name: String): Object;\r\t\tVAR c, gc: Object;\r\tBEGIN\r\t\tIF name^ < y.name^ THEN\r\t\t\tc := y.left;\r\t\t\tIF name^ < c.name^ THEN gc := c.left; c.left := gc.right; gc.right := c\r\t\t\tELSE gc := c.right; c.right := gc.left; gc.left := c\r\t\t\tEND;\r\t\t\ty.left := gc\r\t\tELSE\r\t\t\tc := y.right;\r\t\t\tIF name^ < c.name^ THEN gc := c.left; c.left := gc.right; gc.right := c\r\t\t\tELSE gc := c.right; c.right := gc.left; gc.left := c\r\t\t\tEND;\r\t\t\ty.right := gc\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " gc\r\tEND Rotated;\r\t\r\tPROCEDURE InsertIn (obj, scope: Object; VAR old: Object);\r\t\tVAR gg, g, p, x: Object; name, sname: String;\r\tBEGIN\r\t\tsname := scope.name; scope.name := null;\r\t\tgg := scope; g := gg; p := g; x := p.right; name := obj.name;\r\t\tWHILE x # NIL DO\r\t\t\tIF (x.left # NIL) & (x.right # NIL) & x.left.red & x.right.red THEN\r\t\t\t\tx.red := TRUE; x.left.red := FALSE; x.right.red := FALSE;\r\t\t\t\tIF p.red THEN\r\t\t\t\t\tg.red := TRUE;\r\t\t\t\t\tIF (name^ < g.name^) # (name^ < p.name^) THEN p := Rotated(g, name) END;\r\t\t\t\t\tx := Rotated(gg, name); x.red := FALSE\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tgg := g; g := p; p := x;\r\t\t\tIF name^ < x.name^ THEN x := x.left\r\t\t\tELSIF name^ > x.name^ THEN x := x.right\r\t\t\tELSE old := x; scope.right.red := FALSE; scope.name := sname; "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: "\r\t\t\tEND\r\t\tEND;\r\t\tx := obj; old := NIL;\r\t\tIF name^ < p.name^ THEN p.left := x ELSE p.right := x END;\r\t\tx.red := TRUE;\r\t\tIF p.red THEN\r\t\t\tg.red := TRUE;\r\t\t\tIF (name^ < g.name^) # (name^ < p.name^) THEN p := Rotated(g, name) END;\r\t\t\tx := Rotated(gg, name);\r\t\t\tx.red := FALSE\r\t\tEND;\r\t\tscope.right.red := FALSE; scope.name := sname\r\tEND InsertIn;\r*)\t\r\tPROCEDURE InsertIn (obj, scope: Object; VAR old: Object);\r\t\tVAR ob0, ob1: Object; left: BOOLEAN; name: String;\r\tBEGIN\r\t\tASSERT((scope # NIL) & (scope.mode = Head), 100);\r\t\tob0 := scope; ob1 := scope.right; left := FALSE; name := obj.name;\r\t\tWHILE ob1 # NIL DO\r\t\t\tIF name^ < ob1.name^ THEN ob0 := ob1; ob1 := ob1.left; left := TRUE\r\t\t\tELSIF name^ > ob1.name^ THEN ob0 := ob1; ob1 := ob1.right; left := FALSE\r\t\t\tELSE old := ob1; "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: "\r\t\t\tEND\r\t\tEND;\r\t\tIF left THEN ob0.left := obj ELSE ob0.right := obj END ;\r\t\tobj.left := NIL; obj.right := NIL; old := NIL\r\tEND InsertIn;\r\r\tPROCEDURE Insert* (IN name: Name; VAR obj: Object);\r\t\tVAR old: Object;\r\tBEGIN\r\t\tobj := NewObj(); obj.leaf := TRUE;\r\t\tobj.name := NewName(name);\r\t\tobj.mnolev := topScope.mnolev;\r\t\tInsertIn(obj, topScope, old);\r\t\tIF old # NIL THEN err(1) END\t(*double def*)\r\tEND Insert;\r\t\r\tPROCEDURE InsertThisField (obj: Object; typ: Struct; VAR old: Object);\r\t\tVAR ob0, ob1: Object; left: BOOLEAN; name: String;\r\tBEGIN\r\t\tIF typ.link = NIL THEN typ.link := obj\r\t\tELSE\r\t\t\tob1 := typ.link; name := obj.name;\r\t\t\tREPEAT\r\t\t\t\tIF name^ < ob1.name^ THEN ob0 := ob1; ob1 := ob1.left; left := TRUE\r\t\t\t\tELSIF name^ > ob1.name^ THEN ob0 := ob1; ob1 := ob1.right; left := FALSE\r\t\t\t\tELSE old := ob1; "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: "\r\t\t\t\tEND\r\t\t\tUNTIL ob1 = NIL;\r\t\t\tIF left THEN ob0.left := obj ELSE ob0.right := obj END\r\t\tEND\r\tEND InsertThisField;\r\r\tPROCEDURE InsertField* (IN name: Name; typ: Struct; VAR obj: Object);\r\t\tVAR old: Object;\r\tBEGIN\r\t\tobj := NewObj(); obj.leaf := TRUE;\r\t\tobj.name := NewName(name);\r\t\tInsertThisField(obj, typ, old);\r\t\tIF old # NIL THEN err(1) END\t(*double def*)\r\tEND InsertField;\r\r\r(*-------------------------- Fingerprinting --------------------------*)\r\r\tPROCEDURE FPrintName(VAR fp: INTEGER; IN name: ARRAY OF SHORTCHAR);\r\t\tVAR i: INTEGER; ch: SHORTCHAR;\r\tBEGIN i := 0;\r\t\tREPEAT ch := name[i]; DevCPM.FPrint(fp, ORD(ch)); INC(i) UNTIL ch = 0X\r\tEND FPrintName;\r\r\tPROCEDURE ^IdFPrint*(typ: Struct);\r\r\tPROCEDURE FPrintSign*(VAR fp: INTEGER; result: Struct; par: Object);\r\t(* depends on assignment compatibility of params only *)\r\tBEGIN\r\t\tIdFPrint(result); DevCPM.FPrint(fp, result.idfp);\r\t\tWHILE par # NIL DO\r\t\t\tDevCPM.FPrint(fp, par.mode); IdFPrint(par.typ); DevCPM.FPrint(fp, par.typ.idfp);\r\t\t\tIF (par.mode = VarPar) & (par.vis # 0) THEN DevCPM.FPrint(fp, par.vis) END;\t(* IN / OUT *)\r\t\t\t"
                    attr: 0
                  - text: "IF par.sysflag # 0 THEN DevCPM.FPrint(fp, par.sysflag) END;"
                    attr: 3
                  - text: "\r\t\t\t(* par.name and par.adr not considered *)\r\t\t\tpar := par.link\r\t\tEND\r\tEND FPrintSign;\r\r\tPROCEDURE IdFPrint*(typ: Struct);\t(* idfp codifies assignment compatibility *)\r\t\tVAR btyp: Struct; strobj: Object; idfp: INTEGER; f, c: SHORTINT;\r\tBEGIN\r\t\tIF ~typ.idfpdone THEN\r\t\t\ttyp.idfpdone := TRUE;\t(* may be recursive, temporary idfp is 0 in that case *)\r\t\t\tidfp := 0; f := typ.form; c := typ.comp; DevCPM.FPrint(idfp, f); DevCPM.FPrint(idfp, c);\r\t\t\tbtyp := typ.BaseTyp; strobj := typ.strobj;\r\t\t\tIF (strobj # NIL) & (strobj.name # null) THEN\r\t\t\t\tFPrintName(idfp, GlbMod[typ.mno].name^); FPrintName(idfp, strobj.name^)\r\t\t\tEND ;\r\t\t\tIF (f = Pointer) OR (c = Record) & (btyp # NIL) OR (c = DynArr) THEN\r\t\t\t\tIdFPrint(btyp); DevCPM.FPrint(idfp, btyp.idfp)\r\t\t\tELSIF c = Array THEN IdFPrint(btyp); DevCPM.FPrint(idfp, btyp.idfp); DevCPM.FPrint(idfp, typ.n)\r\t\t\tELSIF f = ProcTyp THEN FPrintSign(idfp, btyp, typ.link)\r\t\t\tEND ;\r\t\t\tIF typ.sysflag # 0 THEN DevCPM.FPrint(idfp, typ.sysflag) END;\r\t\t\ttyp.idfp := idfp\r\t\tEND\r\tEND IdFPrint;\r\r\tPROCEDURE FPrintStr*(typ: Struct);\r\t\tVAR f, c: SHORTINT; btyp: Struct; strobj, bstrobj: Object; pbfp, pvfp: INTEGER;\r\r\t\tPROCEDURE ^FPrintFlds(fld: Object; adr: INTEGER; visible: BOOLEAN);\r\r\t\tPROCEDURE FPrintHdFld(typ: Struct; fld: Object; adr: INTEGER);\t(* modifies pvfp only *)\r\t\t\tVAR i, j, n: INTEGER; btyp: Struct;\r\t\tBEGIN\r\t\t\tIF typ.comp = Record THEN\r\t\t\t\tIF typ.BaseTyp # NIL THEN FPrintHdFld(typ.BaseTyp, fld, adr) END ;\r"
                    attr: 0
                  - text: "\t\t\t\t"
                    attr: 4
                  - text: "FPrintFlds(typ.link, adr, FALSE)"
                    attr: 0
                  - text: "\r"
                    attr: 4
                  - text: "\t\t\tELSIF typ.comp = Array THEN btyp := typ.BaseTyp; n := typ.n;\r\t\t\t\tWHILE btyp.comp = Array DO n := btyp.n * n; btyp := btyp.BaseTyp END ;\r\t\t\t\tIF (btyp.form = Pointer) OR (btyp.comp = Record) THEN\r\t\t\t\t\tj := nofhdfld; FPrintHdFld(btyp, fld, adr);\r\t\t\t\t\tIF j # nofhdfld THEN i := 1;\r\t\t\t\t\t\tWHILE (i < n) (*"
                    attr: 0
                  - text: " & (nofhdfld <= DevCPM.MaxHdFld) "
                    attr: 3
                  - text: "*) DO\t(* !!! *)\r\t\t\t\t\t\t\tINC(adr, btyp.size); FPrintHdFld(btyp, fld, adr); INC(i)\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tELSIF DevCPM.ExpHdPtrFld &\r\t\t\t\t((typ.form = Pointer) "
                    attr: 0
                  - text: "& ~typ.untagged"
                    attr: 3
                  - text: " OR (fld.name^ = DevCPM.HdPtrName)) THEN\t(* !!! *)\r\t\t\t\tDevCPM.FPrint(pvfp, Pointer); DevCPM.FPrint(pvfp, adr); INC(nofhdfld)\r"
                    attr: 0
                  - text: "\t\t\tELSIF DevCPM.ExpHdUtPtrFld &\r\t\t\t\t((typ.form = Pointer) & typ.untagged OR (fld.name^ = DevCPM.HdUtPtrName)) THEN\t"
                    attr: 3
                  - text: "(* !!! *)"
                    attr: 0
                  - text: "\r\t\t\t\tDevCPM.FPrint(pvfp, Pointer); DevCPM.FPrint(pvfp, adr); INC(nofhdfld);\r\t\t\t\t"
                    attr: 3
                  - text: "IF typ.form = Pointer THEN DevCPM.FPrint(pvfp, typ.sysflag) ELSE DevCPM.FPrint(pvfp, fld.sysflag) END"
                    attr: 0
                  - text: "\r"
                    attr: 3
                  - text: "\t\t\tELSIF DevCPM.ExpHdProcFld & ((typ.form = ProcTyp) OR (fld.name^ = DevCPM.HdProcName)) THEN\r\t\t\t\tDevCPM.FPrint(pvfp, ProcTyp); DevCPM.FPrint(pvfp, adr); INC(nofhdfld)\r\t\t\tEND\r\t\tEND FPrintHdFld;\r\r\t\tPROCEDURE FPrintFlds(fld: Object; adr: INTEGER; visible: BOOLEAN);\t(* modifies pbfp and pvfp *)\r\t\tBEGIN\r\t\t\tWHILE (fld # NIL) & (fld.mode = Fld) DO\r\t\t\t\tIF (fld.vis # internal) & visible THEN\r"
                    attr: 0
                  - text: "\t\t\t\t\tDevCPM.FPrint(pvfp, fld.vis); FPrintName(pvfp, fld.name^); DevCPM.FPrint(pvfp, fld.adr);\r"
                    attr: 5
                  - text: "\t\t\t\t\tDevCPM.FPrint(pbfp, fld.vis); FPrintName(pbfp, fld.name^); DevCPM.FPrint(pbfp, fld.adr);\r\t\t\t\t\tFPrintStr(fld.typ); DevCPM.FPrint(pbfp, fld.typ.pbfp); DevCPM.FPrint(pvfp, fld.typ.pvfp)\r\t\t\t\tELSE FPrintHdFld(fld.typ, fld, fld.adr + adr)\r\t\t\t\tEND ;\r\t\t\t\tfld := fld.link\r\t\t\tEND\r\t\tEND FPrintFlds;\r\r\t\tPROCEDURE FPrintTProcs(obj: Object);\t(* modifies pbfp and pvfp *)\r\t\t\tVAR fp: INTEGER;\r\t\tBEGIN\r\t\t\tIF obj # NIL THEN\r\t\t\t\tFPrintTProcs(obj.left);\r\t\t\t\tIF obj.mode = TProc THEN\r\t\t\t\t\tIF obj.vis # internal THEN\r\t\t\t\t\t"
                    attr: 0
                  - text: "\tfp := 0;"
                    attr: 5
                  - text: "\r\t\t\t\t\t\tIF obj.vis = externalR THEN DevCPM.FPrint("
                    attr: 0
                  - text: fp
                    attr: 5
                  - text: ", externalR) END;\r\t\t\t\t\t\tIF limAttr IN obj.conval.setval THEN DevCPM.FPrint("
                    attr: 0
                  - text: fp
                    attr: 5
                  - text: ", limAttr)\r\t\t\t\t\t\tELSIF absAttr IN obj.conval.setval THEN DevCPM.FPrint("
                    attr: 0
                  - text: fp
                    attr: 5
                  - text: ", absAttr)\r\t\t\t\t\t\tELSIF empAttr IN obj.conval.setval THEN DevCPM.FPrint("
                    attr: 0
                  - text: fp
                    attr: 5
                  - text: ", empAttr)\r\t\t\t\t\t\tELSIF extAttr IN obj.conval.setval THEN DevCPM.FPrint("
                    attr: 0
                  - text: fp
                    attr: 5
                  - text: ", extAttr)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tDevCPM.FPrint("
                    attr: 0
                  - text: fp
                    attr: 5
                  - text: ", TProc); DevCPM.FPrint("
                    attr: 0
                  - text: fp
                    attr: 5
                  - text: ", obj.num);\r\t\t\t\t\t\tFPrintSign("
                    attr: 0
                  - text: fp
                    attr: 5
                  - text: ", obj.typ, obj.link); FPrintName("
                    attr: 0
                  - text: fp
                    attr: 5
                  - text: ", obj.name^);\r\t\t\t\t\t\tIF obj.entry # NIL THEN FPrintName("
                    attr: 0
                  - text: fp
                    attr: 5
                  - text: ", obj.entry^) END;\r\t\t\t\t\t\t"
                    attr: 0
                  - text: "DevCPM.FPrint(pvfp, fp); DevCPM.FPrint(pbfp, fp)"
                    attr: 5
                  - text: "\r\t\t\t\t\tELSIF DevCPM.ExpHdTProc THEN\r\t\t\t\t\t\tDevCPM.FPrint(pvfp, TProc); DevCPM.FPrint(pvfp, obj.num)\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tFPrintTProcs(obj.right)\r\t\t\tEND\r\t\tEND FPrintTProcs;\r\r\tBEGIN\r\t\tIF ~typ.fpdone THEN\r\t\t\tIdFPrint(typ); pbfp := typ.idfp;\r\t\t\tIF typ.ext # NIL THEN FPrintName(pbfp, typ.ext^) END;\r\t\t\tIF typ.attribute # 0 THEN DevCPM.FPrint(pbfp, typ.attribute) END;\r\t\t\tpvfp := pbfp; typ.pbfp := pbfp; typ.pvfp := pvfp;\t(* initial fprints may be used recursively *)\r\t\t\ttyp.fpdone := TRUE;\r\t\t\tf := typ.form; c := typ.comp; btyp := typ.BaseTyp;\r\t\t\tIF f = Pointer THEN\r\t\t\t\tstrobj := typ.strobj; bstrobj := btyp.strobj;\r\t\t\t\tIF (strobj = NIL) OR (strobj.name = null) OR (bstrobj = NIL) OR (bstrobj.name = null) THEN\r\t\t\t\t\tFPrintStr(btyp); DevCPM.FPrint(pbfp, btyp.pbfp); pvfp := pbfp\r\t\t\t\t(* else use idfp as pbfp and as pvfp, do not call FPrintStr(btyp) here, else cycle not broken *)\r\t\t\t\tEND\r\t\t\tELSIF f = ProcTyp THEN (* use idfp as pbfp and as pvfp *)\r\t\t\tELSIF c IN {Array, DynArr} THEN FPrintStr(btyp); DevCPM.FPrint(pbfp, btyp.pvfp); pvfp := pbfp\r\t\t\tELSE (* c = Record *)\r\t\t\t\tIF btyp # NIL THEN FPrintStr(btyp); DevCPM.FPrint(pbfp, btyp.pbfp); DevCPM.FPrint(pvfp, btyp.pvfp) END ;\r\t\t\t\tDevCPM.FPrint(pvfp, typ.size); DevCPM.FPrint(pvfp, typ.align); DevCPM.FPrint(pvfp, typ.n);\r\t\t\t\tnofhdfld := 0; FPrintFlds(typ.link, 0, TRUE);\r\t\t\t\tFPrintTProcs(typ.link);"
                    attr: 0
                  - text: " (* DevCPM.FPrint(pvfp, pbfp); *)"
                    attr: 4
                  - text: " strobj := typ.strobj;\r\t\t\t\tIF (strobj = NIL) OR (strobj.name = null) THEN pbfp := pvfp END\r\t\t\tEND ;\r\t\t\ttyp.pbfp := pbfp; typ.pvfp := pvfp\r\t\tEND\r\tEND FPrintStr;\r\r\tPROCEDURE FPrintObj*(obj: Object);\r\t\tVAR fprint, f, m: INTEGER; rval: SHORTREAL; ext: ConstExt; mod: Object; r: REAL; x: INTEGER;\r\tBEGIN\r\t\tIF ~obj.fpdone THEN\r\t\t\tfprint := 0; obj.fpdone := TRUE;\r\t\t\tDevCPM.FPrint(fprint, obj.mode);\r\t\t\tIF obj.mode = Con THEN\r\t\t\t\tf := obj.typ.form; DevCPM.FPrint(fprint, f);\r\t\t\t\tCASE f OF\r\t\t\t\t| Bool, Char8, Char16, Int8, Int16, Int32:\r\t\t\t\t\tDevCPM.FPrint(fprint, obj.conval.intval)\r\t\t\t\t| Int64:\r\t\t\t\t\tx := SHORT(ENTIER((obj.conval.realval + obj.conval.intval) / 4294967296.0));\r\t\t\t\t\tr := obj.conval.realval + obj.conval.intval - x * 4294967296.0;\r\t\t\t\t\tIF r > MAX(INTEGER) THEN r := r - 4294967296.0 END;\r\t\t\t\t\tDevCPM.FPrint(fprint, SHORT(ENTIER(r)));\r\t\t\t\t\tDevCPM.FPrint(fprint, x)\r\t\t\t\t| Set:\r\t\t\t\t\tDevCPM.FPrintSet(fprint, obj.conval.setval)\r\t\t\t\t| Real32:\r\t\t\t\t\trval := SHORT(obj.conval.realval); DevCPM.FPrintReal(fprint, rval)\r\t\t\t\t| Real64:\r\t\t\t\t\tDevCPM.FPrintLReal(fprint, obj.conval.realval)\r\t\t\t\t| String8, String16:\r\t\t\t\t\tFPrintName(fprint, obj.conval.ext^)\r\t\t\t\t| NilTyp:\r\t\t\t\tELSE err(127)\r\t\t\t\tEND\r\t\t\tELSIF obj.mode = Var THEN\r\t\t\t\tDevCPM.FPrint(fprint, obj.vis); FPrintStr(obj.typ); DevCPM.FPrint(fprint, obj.typ.pbfp)\r\t\t\tELSIF obj.mode IN {XProc, IProc}  THEN\r\t\t\t\tFPrintSign(fprint, obj.typ, obj.link)\r\t\t\tELSIF obj.mode = CProc THEN\r\t\t\t\tFPrintSign(fprint, obj.typ, obj.link); ext := obj.conval.ext;\r\t\t\t\tIF ext # NIL THEN m := LEN(ext^); x := 0; DevCPM.FPrint(fprint, m);\r\t\t\t\t\tWHILE x < m DO DevCPM.FPrint(fprint, ORD(ext^[x])); INC(x) END\r\t\t\t\tELSE DevCPM.FPrint(fprint, 0);\r\t\t\t\tEND\r\t\t\tELSIF obj.mode = Typ THEN\r\t\t\t\tFPrintStr(obj.typ); DevCPM.FPrint(fprint, obj.typ.pbfp)\r\t\t\tEND ;\r\t\t\tIF obj.sysflag < 0 THEN DevCPM.FPrint(fprint, obj.sysflag) END;\r\t\t\tIF obj.mode IN {LProc, XProc, CProc, Var, Typ, Con} THEN\r\t\t\t\tIF obj.library # NIL THEN\r\t\t\t\t\tFPrintName(fprint, obj.library^)\r\t\t\t\tELSIF obj.mnolev < 0 THEN\r\t\t\t\t\tmod := GlbMod[-obj.mnolev];\r\t\t\t\t\tIF (mod.library # NIL) THEN\r\t\t\t\t\t\tFPrintName(fprint, mod.library^)\r\t\t\t\t\tEND\r\t\t\t\tELSIF obj.mnolev = 0 THEN\r\t\t\t\t\tIF libName # \"\" THEN FPrintName(fprint, libName) END\r\t\t\t\tEND;\r\t\t\t\tIF obj.entry # NIL THEN FPrintName(fprint, obj.entry^) END\r\t\t\tEND;\r\t\t\tobj.fprint := fprint\r\t\tEND\r\tEND FPrintObj;\r\r\tPROCEDURE FPrintErr* (obj: Object; errno: SHORTINT);\t"
                    attr: 0
                  - text: "(* !!! *)"
                    attr: 3
                  - text: "\r\t\tVAR res: INTEGER; n: ARRAY MaxIdLen OF CHAR;\r\tBEGIN\r\t\tIF errno = 249 THEN\r\t\t\tDevCPM.LogWLn; DevCPM.LogWStr(\"  \");\r\t\t\tStrings.Utf8ToString(GlbMod[-obj.mnolev].name^, n, res); DevCPM.LogWStr(n);\r\t\t\tStrings.Utf8ToString(obj.name^, n, res); DevCPM.LogW(\".\"); DevCPM.LogWStr(n);\r\t\t\tDevCPM.LogWStr(\" is not consistently imported\");\r\t\t\terr(249)\r\t\tELSIF obj = NIL THEN\t(* changed module sys flags *)\r\t\t\tIF ~symNew & sfpresent THEN\r\t\t\t\tDevCPM.LogWLn; DevCPM.LogWStr(\"  changed library flag\")\r\t\t\tEND\r\t\tELSIF obj.mnolev = 0 THEN\t(* don't report changes in imported modules *)\r\t\t\tIF sfpresent THEN\r\t\t\t\tIF symChanges < 20 THEN\r\t\t\t\t\tDevCPM.LogWLn; DevCPM.LogWStr(\"  \"); Strings.Utf8ToString(obj.name^, n, res); DevCPM.LogWStr("
                    attr: 0
                  - text: n
                    attr: 4
                  - text: ");\r\t\t\t\t\tIF errno = 250 THEN DevCPM.LogWStr(\" is no longer in symbol file\")\r\t\t\t\t\tELSIF errno = 251 THEN DevCPM.LogWStr(\" is redefined internally \")\r\t\t\t\t\tELSIF errno = 252 THEN DevCPM.LogWStr(\" is redefined\")\r\t\t\t\t\tELSIF errno = 253 THEN DevCPM.LogWStr(\" is new in symbol file\")\r\t\t\t\t\tEND\r\t\t\t\tELSIF symChanges = 20 THEN\r\t\t\t\t\tDevCPM.LogWLn; DevCPM.LogWStr(\"  ...\")\r\t\t\t\tEND;\r\t\t\t\tINC(symChanges)\r\t\t\tELSIF (errno = 253) & ~symExtended THEN\r\t\t\t\tDevCPM.LogWLn; \r\t\t\t\tDevCPM.LogWStr(\"  new symbol file\")\r\t\t\tEND\r\t\tEND;\r\t\tIF errno = 253 THEN symExtended := TRUE ELSE symNew := TRUE END\r\tEND FPrintErr;\r\r(*-------------------------- Import --------------------------*)\r\r\tPROCEDURE InName(OUT name: String);\r\t\tVAR i: INTEGER; ch: SHORTCHAR; n: Name;\r\tBEGIN i := 0;\r\t\tREPEAT\r\t\t\tDevCPM.SymRCh(ch); n[i] := ch; INC(i)\r\t\tUNTIL ch = 0X;\r\t\tIF i > 1 THEN NEW(name, i); name^ := n$ ELSE name := null END\r\tEND InName;\r\t\r\tPROCEDURE InMod(tag: INTEGER; OUT mno: BYTE);\t(* mno is global *)\r\t\tVAR head: Object; name: String; mn: INTEGER; i: BYTE; lib: String;\r\tBEGIN\r\t\tIF tag = 0 THEN mno := impCtxt.glbmno[0]\r\t\tELSIF tag > 0 THEN\r\t\t\tlib := NIL;\r\t\t\tIF tag = Slib THEN InName(lib); tag := DevCPM.SymRInt() END;\r\t\t\tASSERT(tag = Smname);\r\t\t\tInName(name);\r\t\t\tIF (name^ = SelfName) & ~impCtxt.self & ~(DevCPM.interface IN DevCPM.options) THEN err(154) END ;\r\t\t\ti := 0;\r\t\t\tWHILE (i < nofGmod) & (name^ # GlbMod[i].name^) DO INC(i) END ;\r\t\t\tIF i < nofGmod THEN mno := i\t(*module already present*)\r\t\t\tELSE\r\t\t\t\thead := NewObj(); head.mode := Head; head.name := name;\r\t\t\t\tmno := nofGmod; head.mnolev := SHORT(SHORT(-mno));\r\t\t\t\thead.library := lib;\r\t\t\t\tIF nofGmod < maxImps THEN\r\t\t\t\t\tGlbMod[mno] := head; INC(nofGmod)\r\t\t\t\tELSE err(227)\r\t\t\t\tEND\r\t\t\tEND ;\r\t\t\timpCtxt.glbmno[impCtxt.nofm] := mno; INC(impCtxt.nofm)\r\t\tELSE\r\t\t\tmno := impCtxt.glbmno[-tag]\r\t\tEND\r\tEND InMod;\r\r\tPROCEDURE InConstant(f: INTEGER; conval: Const);\r\t\tVAR ch, ch1: SHORTCHAR; ext, t: ConstExt; rval: SHORTREAL; r, s: REAL; i, x, y: INTEGER; str: Name;\r\tBEGIN\r\t\tCASE f OF\r\t\t| Byte, Char8, Bool:\r\t\t\tDevCPM.SymRCh(ch); conval.intval := ORD(ch)\r\t\t| Char16:\r\t\t\tDevCPM.SymRCh(ch); conval.intval := ORD(ch);\r\t\t\tDevCPM.SymRCh(ch); conval.intval := conval.intval + ORD(ch) * 256\r\t\t| Int8, Int16, Int32:\r\t\t\tconval.intval := DevCPM.SymRInt()\r\t\t| Int64:\r\t\t\tDevCPM.SymRCh(ch); x := 0; y := 1; r := 0; s := 268435456 (*2^28*);\r\t\t\tWHILE (y < 268435456 (*2^28*)) & (ch >= 80X) DO\r\t\t\t\tx := x + (ORD(ch) - 128) * y; y := y * 128; DevCPM.SymRCh(ch)\r\t\t\tEND;\r\t\t\tWHILE ch >= 80X DO r := r + (ORD(ch) - 128) * s; s := s * 128; DevCPM.SymRCh(ch) END;\r\t\t\tconval.realval := r + x + ((LONG(ORD(ch)) + 64) MOD 128 - 64) * s;\r\t\t\tconval.intval := SHORT(ENTIER(r + x + ((LONG(ORD(ch)) + 64) MOD 128 - 64) * s - conval.realval))\r\t\t| Set:\r\t\t\tDevCPM.SymRSet(conval.setval)\r\t\t| Real32:\r\t\t\tDevCPM.SymRReal(rval); conval.realval := rval;\r\t\t\tconval.intval := DevCPM.ConstNotAlloc\r\t\t| Real64:\r\t\t\tDevCPM.SymRLReal(conval.realval);\r\t\t\tconval.intval := DevCPM.ConstNotAlloc\r\t\t| String8, String16:\r\t\t\ti := 0;\r\t\t\tREPEAT\r\t\t\t\tDevCPM.SymRCh(ch);\r\t\t\t\tIF i < LEN(str) - 1 THEN str[i] := ch\r\t\t\t\tELSIF i = LEN(str) - 1 THEN str[i] := 0X; NEW(ext, 2 * LEN(str)); ext^ := str$; ext[i] := ch\r\t\t\t\tELSIF i < LEN(ext^) - 1 THEN ext[i] := ch\r\t\t\t\tELSE t := ext; t[i] := 0X; NEW(ext, 2 * LEN(t^)); ext^ := t^$; ext[i] := ch\r\t\t\t\tEND;\r\t\t\t\tINC(i)\r\t\t\tUNTIL ch = 0X;\r\t\t\tIF i < LEN(str) THEN NEW(ext, i); ext^ := str$ END;\r\t\t\tconval.ext := ext; conval.intval := DevCPM.ConstNotAlloc;\r\t\t\tIF f = String8 THEN conval.intval2 := i\r\t\t\tELSE\r\t\t\t\ti := 0; y := 0;\r\t\t\t\tREPEAT DevCPM.GetUtf8(ext^, x, i); INC(y) UNTIL x = 0;\r\t\t\t\tconval.intval2 := y\r\t\t\tEND\r(*\t\t\r\t\t\text := NewExt(); conval.ext := ext; i := 0;\r\t\t\tREPEAT\r\t\t\t\tDevCPM.SymRCh(ch); ext^[i] := ch; INC(i)\r\t\t\tUNTIL ch = 0X;\r\t\t\tconval.intval2 := i;\r\t\t\tconval.intval := DevCPM.ConstNotAlloc\r\t\t| String16:\r\t\t\text := NewExt(); conval.ext := ext; i := 0;\r\t\t\tREPEAT\r\t\t\t\tDevCPM.SymRCh(ch); ext^[i] := ch; INC(i);\r\t\t\t\tDevCPM.SymRCh(ch1); ext^[i] := ch1; INC(i)\r\t\t\tUNTIL (ch = 0X) & (ch1 = 0X);\r\t\t\tconval.intval2 := i;\r\t\t\tconval.intval := DevCPM.ConstNotAlloc\r*)\r\t\t| NilTyp:\r\t\t\tconval.intval := 0\r(*\r\t\t| Guid:\r\t\t\text := NewExt(); conval.ext := ext; i := 0;\r\t\t\tWHILE i < 16 DO\r\t\t\t\tDevCPM.SymRCh(ch); ext^[i] := ch; INC(i)\r\t\t\tEND;\r\t\t\text[16] := 0X;\r\t\t\tconval.intval2 := 16;\r\t\t\tconval.intval := DevCPM.ConstNotAlloc;\r*)\r\t\tEND\r\tEND InConstant;\r\r\tPROCEDURE ^InStruct(VAR typ: Struct);\r\r\tPROCEDURE InSign(mno: BYTE; VAR res: Struct; VAR par: Object);\r\t\tVAR last, new: Object; tag: INTEGER;\r\tBEGIN\r\t\tInStruct(res);\r\t\ttag := DevCPM.SymRInt(); last := NIL;\r\t\tWHILE tag # Send DO\r\t\t\tnew := NewObj(); new.mnolev := SHORT(SHORT(-mno));\r\t\t\tIF last = NIL THEN par := new ELSE last.link := new END ;\r"
                    attr: 0
                  - text: "\t\t\tIF tag = Ssys THEN\r\t\t\t\tnew.sysflag := SHORT(SHORT(DevCPM.SymRInt())); tag := DevCPM.SymRInt();\r\t\t\t\t"
                    attr: 3
                  - text: "IF ODD(new.sysflag DIV inBit) THEN new.vis := inPar\r\t\t\t\tELSIF ODD(new.sysflag DIV inBit) THEN new.vis := outPar\r\t\t\t\tEND"
                    attr: 0
                  - text: "\r\t\t\tEND;\r"
                    attr: 3
                  - text: "\t\t\tIF tag = Svalpar THEN new.mode := Var\r\t\t\tELSE new.mode := VarPar;\r\t\t\t\tIF tag = Sinpar THEN new.vis := inPar\r\t\t\t\tELSIF tag = Soutpar THEN new.vis := outPar\r\t\t\t\tEND\r\t\t\tEND ;\r\t\t\tInStruct(new.typ); new.adr := DevCPM.SymRInt(); InName(new.name);\r\t\t\tlast := new; tag := DevCPM.SymRInt()\r\t\tEND\r\tEND InSign;\r\r\tPROCEDURE InFld(): Object;\t(* first number in impCtxt.nextTag, mno set outside *)\r\t\tVAR tag: INTEGER; obj: Object;\r\tBEGIN\r\t\ttag := impCtxt.nextTag; obj := NewObj();\r\t\tIF tag <= Srfld THEN\r\t\t\tobj.mode := Fld;\r\t\t\tIF tag = Srfld THEN obj.vis := externalR ELSE obj.vis := external END ;\r\t\t\tInStruct(obj.typ); InName(obj.name);\r\t\t\tobj.adr := DevCPM.SymRInt()\r\t\tELSE\r\t\t\tobj.mode := Fld;\r\t\t\tIF tag = Shdptr THEN obj.name := NewName(DevCPM.HdPtrName)\r"
                    attr: 0
                  - text: "\t\t\tELSIF tag = Shdutptr THEN obj.name := "
                    attr: 3
                  - text: NewName(
                    attr: 0
                  - text: DevCPM.HdUtPtrName);
                    attr: 3
                  - text: "\t(* !!! *)"
                    attr: 0
                  - text: "\r"
                    attr: 3
                  - text: "\t\t\t\tobj.sysflag := 1\r\t\t\tELSIF tag = Ssys THEN\r\t\t\t\tobj.name := NewName(DevCPM.HdUtPtrName); obj.sysflag := SHORT(SHORT(DevCPM.SymRInt()))\r\t\t\tELSE obj.name := NewName(DevCPM.HdProcName)\r\t\t\tEND;\r\t\t\tobj.typ := undftyp; obj.vis := internal;\r\t\t\tobj.adr := DevCPM.SymRInt()\r\t\tEND;\r\t\tRETURN obj\r\tEND InFld;\r\r\tPROCEDURE InTProc(mno: BYTE): Object;\t(* first number in impCtxt.nextTag *)\r\t\tVAR tag: INTEGER; obj: Object;\r\tBEGIN\r\t\ttag := impCtxt.nextTag;\r\t\tobj := NewObj(); obj.mnolev := SHORT(SHORT(-mno));\r\t\tIF tag = Shdtpro THEN\r\t\t\tobj.mode := TProc; obj.name := NewName(DevCPM.HdTProcName);\r\t\t\tobj.link := NewObj();\t(* dummy, easier in Browser *)\r\t\t\tobj.typ := undftyp; obj.vis := internal;\r\t\t\tobj.num := DevCPM.SymRInt()\r\t\tELSE\r\t\t\tobj.vis := external;\r\t\t\tIF tag = Simpo THEN obj.vis := externalR; tag := DevCPM.SymRInt() END;\r\t\t\tobj.mode := TProc; obj.conval := NewConst(); obj.conval.intval := -1;\r\t\t\tIF tag = Sentry THEN InName(obj.entry); tag := DevCPM.SymRInt() END;\r\t\t\tInSign(mno, obj.typ, obj.link); InName(obj.name);\r\t\t\tobj.num := DevCPM.SymRInt();\r\t\t\tIF tag = Slimpro THEN INCL(obj.conval.setval, limAttr)\r\t\t\tELSIF tag = Sabspro THEN INCL(obj.conval.setval, absAttr)\r\t\t\tELSIF tag = Semppro THEN INCL(obj.conval.setval, empAttr)\r\t\t\tELSIF tag = Sextpro THEN INCL(obj.conval.setval, extAttr)\r\t\t\tEND\r\t\tEND ;\r\t\tRETURN obj\r\tEND InTProc;\r\r\tPROCEDURE InStruct(VAR typ: Struct);\r\t\tVAR mno: BYTE; ref: SHORTINT; tag: INTEGER; name: String;\r\t\t\tt: Struct; obj, last, fld, old, dummy: Object;\r\tBEGIN\r\t\ttag := DevCPM.SymRInt();\r\t\tIF tag # Sstruct THEN\r\t\t\ttag := -tag;\r\t\t\tIF (version = 0) & (tag >= FirstRef0) THEN tag := tag + FirstRef - FirstRef0 END;\t"
                    attr: 0
                  - text: "(* correction for new FirstRef *)"
                    attr: 1
                  - text: "\r\t\t\ttyp := impCtxt.ref[tag]\r\t\tELSE\r\t\t\tref := impCtxt.nofr; INC(impCtxt.nofr);\r\t\t\tIF ref < impCtxt.minr THEN impCtxt.minr := ref END ;\r\t\t\ttag := DevCPM.SymRInt();\r\t\t\tInMod(tag, mno); InName(name); obj := NewObj();\r\t\t\tIF name = null THEN\r\t\t\t\tIF impCtxt.self THEN old := NIL\t(* do not insert type desc anchor here, but in OPL *)\r\t\t\t\tELSE obj.name := NewName(\"@\"); InsertIn(obj, GlbMod[mno], old(*=NIL*)); obj.name := null\r\t\t\t\tEND ;\r\t\t\t\ttyp := NewStr(Undef, Basic)\r\t\t\tELSE obj.name := name; InsertIn(obj, GlbMod[mno], old);\r\t\t\t\tIF old # NIL THEN\t(* recalculate fprints to compare with old fprints *)\r\t\t\t\t\tFPrintObj(old); impCtxt.pvfp[ref] := old.typ.pvfp;\r\t\t\t\t\tIF impCtxt.self THEN\t(* do not overwrite old typ *)\r\t\t\t\t\t\ttyp := NewStr(Undef, Basic)\r\t\t\t\t\tELSE\t(* overwrite old typ for compatibility reason *)\r\t\t\t\t\t\ttyp := old.typ; typ.link := NIL; typ.sysflag := 0; typ.ext := NIL;\r\t\t\t\t\t\ttyp.fpdone := FALSE; typ.idfpdone := FALSE\r\t\t\t\t\tEND\r\t\t\t\tELSE typ := NewStr(Undef, Basic)\r\t\t\t\tEND\r\t\t\tEND ;\r\t\t\timpCtxt.ref[ref] := typ; impCtxt.old[ref] := old; typ.ref := SHORT(ref + maxStruct);\r\t\t\t(* ref >= maxStruct: not exported yet, ref used for err 155 *)\r\t\t\ttyp.mno := mno; typ.allocated := TRUE;\r\t\t\ttyp.strobj := obj; obj.mode := Typ; obj.typ := typ;\r\t\t\tobj.mnolev := SHORT(SHORT(-mno)); obj.vis := internal; (* name not visible here *)\r\t\t\ttag := DevCPM.SymRInt();\r\t\t\tIF tag = Ssys THEN\r\t\t\t\ttyp.sysflag := SHORT(DevCPM.SymRInt()); tag := DevCPM.SymRInt()\r\t\t\tEND;\r\t\t\ttyp.untagged := typ.sysflag "
                    attr: 0
                  - text: ">"
                    attr: 3
                  - text: " 0;\r\t\t\tIF tag = Slib THEN\r\t\t\t\tInName(obj.library); tag := DevCPM.SymRInt()\r\t\t\tEND;\r\t\t\tIF tag = Sentry THEN\r\t\t\t\tInName(obj.entry); tag := DevCPM.SymRInt()\r\t\t\tEND;\r\t\t\tIF tag = String8 THEN\r\t\t\t\tInName(typ.ext); tag := DevCPM.SymRInt()\r\t\t\tEND;\r\t\t\tCASE tag OF\r\t\t\t| Sptr:\r\t\t\t\ttyp.form := Pointer; typ.size := DevCPM.PointerSize; typ.n := 0; InStruct(typ.BaseTyp)\r\t\t\t| Sarr:\r\t\t\t\ttyp.form := Comp; typ.comp := Array; InStruct(typ.BaseTyp); typ.n := DevCPM.SymRInt();\r"
                    attr: 0
                  - text: "\t\t\t\ttyp.size := typ.n * typ.BaseTyp.size"
                    attr: 3
                  - text: "\t(* !!! *)"
                    attr: 0
                  - text: "\r"
                    attr: 3
                  - text: "\t\t\t| Sdarr:\r\t\t\t\ttyp.form := Comp; typ.comp := DynArr; InStruct(typ.BaseTyp);\r\t\t\t\tIF typ.BaseTyp.comp = DynArr THEN typ.n := typ.BaseTyp.n + 1\r\t\t\t\tELSE typ.n := 0\r\t\t\t\tEND ;\r"
                    attr: 0
                  - text: "\t\t\t\ttyp.size := DevCPM.DArrSizeA + DevCPM.DArrSizeB * typ.n;"
                    attr: 3
                  - text: "\t(* !!! *)\r\t\t\t\t"
                    attr: 0
                  - text: "IF typ.untagged THEN typ.size := DevCPM.PointerSize END\r"
                    attr: 3
                  - text: "\t\t\t| Srec, Sabsrec, Slimrec, Sextrec:\r\t\t\t\ttyp.form := Comp; typ.comp := Record; InStruct(typ.BaseTyp);\r\t\t\t\t(* correction by ETH 18.1.96 *)\r\t\t\t\tIF typ.BaseTyp = notyp THEN typ.BaseTyp := NIL END;\r\t\t\t\ttyp.extlev := 0; t := typ.BaseTyp;\r\t\t\t\tWHILE (t # NIL) & (t.comp = Record) DO INC(typ.extlev); t := t.BaseTyp END;\r\t\t\t\ttyp.size := DevCPM.SymRInt(); typ.align := DevCPM.SymRInt();\r\t\t\t\ttyp.n := DevCPM.SymRInt();\r\t\t\t\tIF tag = Sabsrec THEN typ.attribute := absAttr\r\t\t\t\tELSIF tag = Slimrec THEN typ.attribute := limAttr\r\t\t\t\tELSIF tag = Sextrec THEN typ.attribute := extAttr\r\t\t\t\tEND;\r\t\t\t\timpCtxt.nextTag := DevCPM.SymRInt(); last := NIL;\r\t\t\t\tWHILE (impCtxt.nextTag >= Sfld) & (impCtxt.nextTag <= Shdpro)\r\t\t\t\t\t\tOR (impCtxt.nextTag = Shdutptr) OR (impCtxt.nextTag = Ssys) DO\r\t\t\t\t\tfld := InFld(); fld.mnolev := SHORT(SHORT(-mno));\r\t\t\t\t\tIF last # NIL THEN last.link := fld END ;\r\t\t\t\t\tlast := fld;\r\t\t\t\t\tInsertThisField(fld, typ, dummy);\r\t\t\t\t\timpCtxt.nextTag := DevCPM.SymRInt()\r\t\t\t\tEND ;\r\t\t\t\tWHILE impCtxt.nextTag # Send DO fld := InTProc(mno);\r\t\t\t\t\tInsertThisField(fld, typ, dummy);\r\t\t\t\t\timpCtxt.nextTag := DevCPM.SymRInt()\r\t\t\t\tEND\r\t\t\t| Spro:\r\t\t\t\ttyp.form := ProcTyp; typ.size := DevCPM.ProcSize; InSign(mno, typ.BaseTyp, typ.link)\r\t\t\t| Salias:\r\t\t\t\tInStruct(t);\r\t\t\t\ttyp.form := t.form; typ.comp := Basic; typ.size := t.size;\r\t\t\t\ttyp.pbfp := t.pbfp; typ.pvfp := t.pvfp; typ.fpdone := TRUE;\r\t\t\t\ttyp.idfp := t.idfp; typ.idfpdone := TRUE; typ.BaseTyp := t\r\t\t\tEND ;\r\t\t\tIF ref = impCtxt.minr THEN\r\t\t\t\tWHILE ref < impCtxt.nofr DO\r\t\t\t\t\tt := impCtxt.ref[ref]; FPrintStr(t);\r\t\t\t\t\tobj := t.strobj;\t(* obj.typ.strobj = obj, else obj.fprint differs (alias) *)\r\t\t\t\t\tIF obj.name # null THEN FPrintObj(obj) END ;\r\t\t\t\t\told := impCtxt.old[ref];\r\t\t\t\t\tIF old # NIL THEN t.strobj := old;\t(* restore strobj *)\r\t\t\t\t\t\tIF impCtxt.self THEN\r\t\t\t\t\t\t\tIF old.mnolev < 0 THEN\r\t\t\t\t\t\t\t\tIF old.history # inconsistent THEN\r\t\t\t\t\t\t\t\t\tIF old.fprint # obj.fprint THEN old.history := pbmodified\r\t\t\t\t\t\t\t\t\tELSIF impCtxt.pvfp[ref] # t.pvfp THEN old.history := pvmodified\r\t\t\t\t\t\t\t\t\tEND\r\t\t\t\t\t\t\t\t(* ELSE remain inconsistent *)\r\t\t\t\t\t\t\t\tEND\r\t\t\t\t\t\t\tELSIF old.fprint # obj.fprint THEN old.history := pbmodified\r\t\t\t\t\t\t\tELSIF impCtxt.pvfp[ref] # t.pvfp THEN old.history := pvmodified\r\t\t\t\t\t\t\tELSIF old.vis = internal THEN old.history := same\t(* may be changed to \"removed\" in InObj *)\r\t\t\t\t\t\t\tELSE old.history := inserted\t(* may be changed to \"same\" in InObj *)\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\t(* check private part, delay error message until really used *)\r\t\t\t\t\t\t\tIF impCtxt.pvfp[ref] # t.pvfp THEN old.history := inconsistent END ;\r\t\t\t\t\t\t\tIF old.fprint # obj.fprint THEN FPrintErr(old, 249) END\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSIF impCtxt.self THEN obj.history := removed\r\t\t\t\t\tELSE obj.history := same\r\t\t\t\t\tEND ;\r\t\t\t\t\tINC(ref)\r\t\t\t\tEND ;\r\t\t\t\timpCtxt.minr := maxStruct\r\t\t\tEND\r\t\tEND\r\tEND InStruct;\r\r\tPROCEDURE InObj(mno: BYTE): Object;\t(* first number in impCtxt.nextTag *)\r\t\tVAR ch: SHORTCHAR; obj, old: Object; typ: Struct;\r\t\t\ttag, i, s: INTEGER; ext: ConstExt;\r\tBEGIN\r\t\ttag := impCtxt.nextTag;\r\t\tIF tag = Stype THEN\r\t\t\tInStruct(typ); obj := typ.strobj;\r\t\t\tIF ~impCtxt.self THEN obj.vis := external END\t(* type name visible now, obj.fprint already done *)\r\t\tELSE\r\t\t\tobj := NewObj(); obj.mnolev := SHORT(SHORT(-mno)); obj.vis := external;\r\t\t\tIF tag = Ssys THEN obj.sysflag := SHORT(SHORT(DevCPM.SymRInt())); tag := DevCPM.SymRInt() END;\r\t\t\tIF tag = Slib THEN\r\t\t\t\tInName(obj.library); tag := DevCPM.SymRInt()\r\t\t\tEND;\r\t\t\tIF tag = Sentry THEN\r\t\t\t\tInName(obj.entry); tag := DevCPM.SymRInt()\r\t\t\tEND;\r\t\t\tIF tag >= Sxpro THEN\r\t\t\t\tIF obj.conval = NIL THEN obj.conval := NewConst() END;\r\t\t\t\tobj.conval.intval := -1;\r\t\t\t\tInSign(mno, obj.typ, obj.link);\r\t\t\t\tCASE tag OF\r\t\t\t\t| Sxpro: obj.mode := XProc\r\t\t\t\t| Sipro: obj.mode := IProc\r\t\t\t\t| Scpro: obj.mode := CProc;\r\t\t\t\t\ts := DevCPM.SymRInt();\r\t\t\t\t\tIF s # 0 THEN NEW(ext, s); i := 0;\r\t\t\t\t\t\tWHILE i < s DO DevCPM.SymRCh(ext^[i]); INC(i) END\r\t\t\t\t\tELSE ext := NIL\r\t\t\t\t\tEND;\r"
                    attr: 0
                  - text: "\t\t\t\t\t"
                    attr: 5
                  - text: "obj.conval.ext := ext;"
                    attr: 0
                  - text: "\r"
                    attr: 5
                  - text: "\t\t\t\tEND\r\t\t\tELSIF tag = Salias THEN\r\t\t\t\tobj.mode := Typ; InStruct(obj.typ)\r\t\t\tELSIF (tag = Svar) OR (tag = Srvar) THEN\r\t\t\t\tobj.mode := Var;\r\t\t\t\tIF tag = Srvar THEN obj.vis := externalR END ;\r\t\t\t\tInStruct(obj.typ)\r\t\t\tELSE\t(* Constant *)\r\t\t\t\tobj.conval := NewConst(); InConstant(tag, obj.conval);\r\t\t\t\t"
                    attr: 0
                  - text: "IF (tag = Int8) OR (tag = Int16) THEN tag := Int32 END;"
                    attr: 3
                  - text: "\r\t\t\t\tobj.mode := Con; obj.typ := impCtxt.ref[tag]; \r\t\t\tEND ;\r\t\t\tInName(obj.name)\r\t\tEND ;\r\t\tFPrintObj(obj);\r\t\tIF (obj.mode = Var) & ((obj.typ.strobj = NIL) OR (obj.typ.strobj.name = null)) THEN\r\t\t\t(* compute a global fingerprint to avoid structural type equivalence for anonymous types *)\r\t\t\tDevCPM.FPrint(impCtxt.reffp, obj.typ.ref - maxStruct)\r\t\tEND ;\r\t\tIF tag # Stype THEN\r\t\t\tInsertIn(obj, GlbMod[mno], old);\r\t\t\tIF impCtxt.self THEN\r\t\t\t\tIF old # NIL THEN\r\t\t\t\t\t(* obj is from old symbol file, old is new declaration *)\r\t\t\t\t\tIF old.vis = internal THEN old.history := removed\r\t\t\t\t\tELSE FPrintObj(old); FPrintStr(old.typ);\t(* FPrint(obj) already called *)\r\t\t\t\t\t\tIF obj.fprint # old.fprint THEN old.history := pbmodified\r\t\t\t\t\t\tELSIF obj.typ.pvfp # old.typ.pvfp THEN old.history := pvmodified\r\t\t\t\t\t\tELSE old.history := same\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tELSE obj.history := removed\t(* OutObj not called if mnolev < 0 *)\r\t\t\t\tEND\r\t\t\t(* ELSE old = NIL, or file read twice, consistent, OutObj not called *)\r\t\t\tEND\r\t\tELSE\t(* obj already inserted in InStruct *)\r\t\t\tIF impCtxt.self THEN\t(* obj.mnolev = 0 *)\r\t\t\t\tIF obj.vis = internal THEN obj.history := removed\r\t\t\t\tELSIF obj.history = inserted THEN obj.history := same\r\t\t\t\tEND\r\t\t\t(* ELSE OutObj not called for obj with mnolev < 0 *)\r\t\t\tEND\r\t\tEND ;\r\t\tRETURN obj\r\tEND InObj;\r\r\tPROCEDURE Import*(IN aliasName, name: Name; VAR done: BOOLEAN);\r\t\tVAR obj, h: Object; mno: BYTE; tag, p: INTEGER; lib: String;\t(* done used in Browser *)\r\tBEGIN\r\t\tIF name = \"SYSTEM\" THEN\r\t\t\tSYSimported := TRUE;\r\t\t\tp := processor;\r\t\t\tIF (p < 10) OR (p > 30) THEN p := DevCPM.sysImp END;\r\t\t\tINCL(DevCPM.options, p);\t"
                    attr: 0
                  - text: "(* for sysflag handling *)"
                    attr: 1
                  - text: "\r\t\t\tInsert(aliasName, obj); obj.mode := Mod; obj.mnolev := 0; obj.scope := syslink; obj.typ := notyp;\r\t\t\th := NewObj(); h.mode := Head; h.right := syslink; obj.scope := h\r\t\tELSIF name = \"COM\" THEN\r\t\t\tIF DevCPM.comAware IN DevCPM.options THEN\r\t\t\t\tINCL(DevCPM.options, DevCPM.com);\t"
                    attr: 0
                  - text: "(* for sysflag handling *)"
                    attr: 1
                  - text: "\r\t\t\t\tInsert(aliasName, obj); obj.mode := Mod; obj.mnolev := 0; obj.scope := comlink; obj.typ := notyp;\r\t\t\t\th := NewObj(); h.mode := Head; h.right := comlink; obj.scope := h;\r\t\t\tELSE err(151)\r\t\t\tEND;\r\t\tELSIF name = \"JAVA\" THEN\r\t\t\tINCL(DevCPM.options, DevCPM.java)\r\t\tELSE\r\t\t\timpCtxt.nofr := FirstRef; impCtxt.minr := maxStruct; impCtxt.nofm := 0;\r\t\t\timpCtxt.self := aliasName = \"@self\"; impCtxt.reffp := 0;\r\t\t\tDevCPM.OldSym(name, done);\r\t\t\tIF done THEN\r\t\t\t\tlib := NIL;\r\t\t\t\timpProc := SHORT(DevCPM.SymRInt());\r\t\t\t\tIF (impProc # 0) & (processor # 0) & (impProc # processor) THEN err(151) END;\r\t\t\t\t"
                    attr: 0
                  - text: "DevCPM.checksum := 0;\t"
                    attr: 5
                  - text: "(* start checksum here to avoid problems with proc id fixup *)"
                    attr: 6
                  - text: "\r\t\t\t\ttag := DevCPM.SymRInt();\r\t\t\t\tIF tag < Smname THEN version := tag; tag := DevCPM.SymRInt()\r\t\t\t\tELSE version := 0\r\t\t\t\tEND;\r\t\t\t\tIF tag = Slib THEN InName(lib); tag := DevCPM.SymRInt() END;\r\t\t\t\tInMod(tag, mno);\r"
                    attr: 0
                  - text: "\t\t\t\tIF (name[0] # \"@\") & (GlbMod[mno].name^ # name) THEN\t"
                    attr: 3
                  - text: "(* symbol file name conflict *)"
                    attr: 0
                  - text: "\r\t\t\t\t\tGlbMod[mno] := NIL; nofGmod := mno; DEC(impCtxt.nofm);\r\t\t\t\t\tDevCPM.CloseOldSym; done := FALSE\r\t\t\t\tEND;\r\t\t\tEND;\r\t\t\tIF done THEN\r"
                    attr: 3
                  - text: "\t\t\t\tGlbMod[mno].library := lib;\r\t\t\t\timpCtxt.nextTag := DevCPM.SymRInt();\r\t\t\t\tWHILE ~DevCPM.eofSF() DO\r\t\t\t\t\tobj := InObj(mno); impCtxt.nextTag := DevCPM.SymRInt()\r\t\t\t\tEND ;\r\t\t\t\tInsert(aliasName, obj);\r\t\t\t\tobj.mode := Mod; obj.scope := GlbMod[mno](*.right*);\r\t\t\t\tGlbMod[mno].link := obj;\r\t\t\t\tobj.mnolev  := SHORT(SHORT(-mno)); obj.typ := notyp;\r\t\t\t\tDevCPM.CloseOldSym\r\t\t\tELSIF impCtxt.self THEN\r\t\t\t\tsfpresent := FALSE\r\t\t\tELSE err(152)\t(*sym file not found*)\r\t\t\tEND\r\t\tEND\r\tEND Import;\r\r(*-------------------------- Export --------------------------*)\r\r\tPROCEDURE OutName(IN name: ARRAY OF SHORTCHAR);\r\t\tVAR i: INTEGER; ch: SHORTCHAR;\r\tBEGIN i := 0;\r\t\tREPEAT ch := name[i]; DevCPM.SymWCh(ch); INC(i) UNTIL ch = 0X\r\tEND OutName;\r\t\r\tPROCEDURE OutMod(mno: SHORTINT);\r\t\tVAR mod: Object;\r\tBEGIN\r\t\tIF expCtxt.locmno[mno] < 0 THEN (* new mod *)\r\t\t\tmod := GlbMod[mno];\r\t\t\tIF mod.library # NIL THEN\r\t\t\t\tDevCPM.SymWInt(Slib); OutName(mod.library^)\r\t\t\tEND;\r\t\t\tDevCPM.SymWInt(Smname);\r\t\t\texpCtxt.locmno[mno] := expCtxt.nofm; INC(expCtxt.nofm);\r\t\t\tOutName(mod.name^)\r\t\tELSE DevCPM.SymWInt(-expCtxt.locmno[mno])\r\t\tEND\r\tEND OutMod;\r\r\tPROCEDURE ^OutStr(typ: Struct);\r\tPROCEDURE ^OutFlds(fld: Object; adr: INTEGER; visible: BOOLEAN);\r\r\tPROCEDURE OutHdFld(typ: Struct; fld: Object; adr: INTEGER);\r\t\tVAR i, j, n: INTEGER; btyp: Struct;\r\tBEGIN\r\t\tIF typ.comp = Record THEN\r\t\t"
                    attr: 0
                  - text: "\t"
                    attr: 4
                  - text: "IF typ.BaseTyp # NIL THEN OutHdFld(typ.BaseTyp, fld, adr) END ;\r\t\t\tOutFlds(typ.link, adr, FALSE)\r\t\tELSIF typ.comp = Array THEN btyp := typ.BaseTyp; n := typ.n;\r\t\t\tWHILE btyp.comp = Array DO n := btyp.n * n; btyp := btyp.BaseTyp END ;\r\t\t\tIF (btyp.form = Pointer) OR (btyp.comp = Record) THEN\r\t\t\t\tj := nofhdfld; OutHdFld(btyp, fld, adr);\r\t\t\t\tIF j # nofhdfld THEN i := 1;\r\t\t\t\t\tWHILE (i < n) (*"
                    attr: 0
                  - text: " & (nofhdfld <= DevCPM.MaxHdFld) "
                    attr: 3
                  - text: "*) DO\t(* !!! *)\r\t\t\t\t\t\tINC(adr, btyp.size); OutHdFld(btyp, fld, adr); INC(i)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSIF DevCPM.ExpHdPtrFld &\r\t\t\t((typ.form = Pointer) "
                    attr: 0
                  - text: "& ~typ.untagged"
                    attr: 3
                  - text: " OR (fld.name^ = DevCPM.HdPtrName)) THEN\t(* !!! *)\r\t\t\tDevCPM.SymWInt(Shdptr); DevCPM.SymWInt(adr); INC(nofhdfld)\r"
                    attr: 0
                  - text: "\t\tELSIF DevCPM.ExpHdUtPtrFld &\r\t\t\t((typ.form = Pointer) & typ.untagged OR (fld.name^ = DevCPM.HdUtPtrName)) THEN"
                    attr: 3
                  - text: "\t(* !!! *)\r\t\t\tDevCPM.SymWInt(Ssys);\t(* "
                    attr: 0
                  - text: "DevCPM.SymWInt(Shdutptr); "
                    attr: 3
                  - text: "*)\r\t\t\tIF typ.form = Pointer THEN n := typ.sysflag ELSE n := fld.sysflag END;\r\t\t\tDevCPM.SymWInt(n);"
                    attr: 0
                  - text: "\r"
                    attr: 3
                  - text: "\t\t\t"
                    attr: 0
                  - text: DevCPM.SymWInt(adr); INC(nofhdfld)
                    attr: 3
                  - text: ";\r\t\t\tIF "
                    attr: 0
                  - text: "n > 1"
