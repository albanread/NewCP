                  - text: "*)\r\t\t\t\t\tOutTProcs(typ, typ.link); DevCPM.SymWInt(Send)\r\t\t\t\tEND\r\t\t\tELSE\t(* alias structure *)\r\t\t\t\tDevCPM.SymWInt(Salias); OutStr(typ.BaseTyp)\r\t\t\tEND\r\t\tEND\r\tEND OutStr;\r\r\tPROCEDURE OutConstant(obj: Object);\r\t\tVAR f, i: SHORTINT; rval: SHORTREAL; a, b, c: INTEGER; r: REAL;\r\tBEGIN\r\t\tf := obj.typ.form;\r(*\r\t\tIF obj.typ = guidtyp THEN f := Guid END;\r*)\r\t\tIF f = Int32 THEN\r\t\t\tIF (obj.conval.intval >= -128) & (obj.conval.intval <= -127) THEN f := Int8\r\t\t\tELSIF (obj.conval.intval >= -32768) & (obj.conval.intval <= -32767) THEN f := Int16\r\t\t\tEND\r\t\tEND;\r\t\tDevCPM.SymWInt(f);\r\t\tCASE f OF\r\t\t| Bool, Char8:\r\t\t\tDevCPM.SymWCh(SHORT(CHR(obj.conval.intval)))\r\t\t| Char16:\r\t\t\tDevCPM.SymWCh(SHORT(CHR(obj.conval.intval MOD 256)));\r\t\t\tDevCPM.SymWCh(SHORT(CHR(obj.conval.intval DIV 256)))\r\t\t| Int8, Int16, Int32:\r\t\t\tDevCPM.SymWInt(obj.conval.intval)\r\t\t| Int64:\r\t\t\tIF ABS(obj.conval.realval + obj.conval.intval) <= MAX(INTEGER) THEN\r\t\t\t\ta := SHORT(ENTIER(obj.conval.realval + obj.conval.intval)); b := -1; c := -1\r\t\t\tELSIF ABS(obj.conval.realval + obj.conval.intval) <= 1125899906842624.0 (*2^50*) THEN\r\t\t\t\ta := SHORT(ENTIER((obj.conval.realval + obj.conval.intval) /  2097152.0 (*2^21*)));\r\t\t\t\tb := SHORT(ENTIER(obj.conval.realval + obj.conval.intval - a * 2097152.0 (*2^21*))); c := -1\r\t\t\tELSE\r\t\t\t\ta := SHORT(ENTIER((obj.conval.realval + obj.conval.intval) / 4398046511104.0 (*2^42*)));\r\t\t\t\tr := obj.conval.realval + obj.conval.intval - a * 4398046511104.0 (*2^42*);\r\t\t\t\tb := SHORT(ENTIER(r /  2097152.0 (*2^21*)));\r\t\t\t\tc := SHORT(ENTIER(r - b * 2097152.0 (*2^21*)))\r\t\t\tEND;\r\t\t\tIF c >= 0 THEN\r\t\t\t\tDevCPM.SymWCh(SHORT(CHR(c MOD 128 + 128))); c := c DIV 128;\r\t\t\t\tDevCPM.SymWCh(SHORT(CHR(c MOD 128 + 128))); c := c DIV 128;\r\t\t\t\tDevCPM.SymWCh(SHORT(CHR(c MOD 128 + 128)))\r\t\t\tEND;\r\t\t\tIF b >= 0 THEN\r\t\t\t\tDevCPM.SymWCh(SHORT(CHR(b MOD 128 + 128))); b := b DIV 128;\r\t\t\t\tDevCPM.SymWCh(SHORT(CHR(b MOD 128 + 128))); b := b DIV 128;\r\t\t\t\tDevCPM.SymWCh(SHORT(CHR(b MOD 128 + 128)))\r\t\t\tEND;\r\t\t\tDevCPM.SymWInt(a)\r\t\t| Set:\r\t\t\tDevCPM.SymWSet(obj.conval.setval)\r\t\t| Real32:\r\t\t\trval := SHORT(obj.conval.realval); DevCPM.SymWReal(rval)\r\t\t| Real64:\r\t\t\tDevCPM.SymWLReal(obj.conval.realval)\r\t\t| String8, String16:\r\t\t\tOutName(obj.conval.ext^)\r\t\t| NilTyp:\r(*\r\t\t| Guid:\r\t\t\ti := 0;\r\t\t\tWHILE i < 16 DO DevCPM.SymWCh(obj.conval.ext[i]); INC(i) END\r*)\r\t\tELSE err(127)\r\t\tEND\r\tEND OutConstant;\r\r\tPROCEDURE OutObj(obj: Object);\r\t\tVAR i, j: INTEGER; ext: ConstExt;\r\tBEGIN\r\t\tIF obj # NIL THEN\r\t\t\tOutObj(obj.left);\r\t\t\tIF obj.mode IN {Con, Typ, Var, LProc, XProc, CProc, IProc} THEN\r\t\t\t\tIF obj.history = removed THEN FPrintErr(obj, 250)\r\t\t\t\tELSIF obj.vis # internal THEN\r\t\t\t\t\tCASE obj.history OF\r\t\t\t\t\t| inserted: FPrintErr(obj, 253)\r\t\t\t\t\t| same:\t(* ok *)\r\t\t\t\t\t| pbmodified:\r\t\t\t\t\t\tIF (obj.mode # Typ) OR (obj.typ.strobj # obj) THEN FPrintErr(obj, 252) END\r\t\t\t\t\t| pvmodified:\r\t\t\t\t\t\tIF (obj.mode # Typ) OR (obj.typ.strobj # obj) THEN FPrintErr(obj, 251) END\r\t\t\t\t\tEND ;\r\t\t\t\t\tIF obj.sysflag < 0 THEN DevCPM.SymWInt(Ssys); DevCPM.SymWInt(obj.sysflag); portable := FALSE END;\r\t\t\t\t\tIF obj.mode IN {LProc, XProc, CProc, Var, Con} THEN\r\t\t\t\t\t\t"
                    attr: 0
                  - text: "(* name alias for types handled in OutStr *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\tIF obj.library # NIL THEN\r\t\t\t\t\t\t\tDevCPM.SymWInt(Slib); OutName(obj.library^); portable := FALSE\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF obj.entry # NIL THEN\r\t\t\t\t\t\t\tDevCPM.SymWInt(Sentry); OutName(obj.entry^); portable := FALSE\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND;\r\t\t\t\t\tCASE obj.mode OF\r\t\t\t\t\t| Con:\r\t\t\t\t\t\tOutConstant(obj); OutName(obj.name^)\r\t\t\t\t\t| Typ:\r\t\t\t\t\t\tIF obj.typ.strobj = obj THEN DevCPM.SymWInt(Stype); OutStr(obj.typ)\r\t\t\t\t\t\tELSE DevCPM.SymWInt(Salias); OutStr(obj.typ); OutName(obj.name^)\r\t\t\t\t\t\tEND\r\t\t\t\t\t| Var:\r\t\t\t\t\t\tIF obj.vis = externalR THEN DevCPM.SymWInt(Srvar) ELSE DevCPM.SymWInt(Svar) END ;\r\t\t\t\t\t\tOutStr(obj.typ); OutName(obj.name^);\r\t\t\t\t\t\tIF (obj.typ.strobj = NIL) OR (obj.typ.strobj.name = null) THEN\r\t\t\t\t\t\t\t(* compute fingerprint to avoid structural type equivalence *)\r\t\t\t\t\t\t\tDevCPM.FPrint(expCtxt.reffp, obj.typ.ref)\r\t\t\t\t\t\tEND\r\t\t\t\t\t| XProc:\r\t\t\t\t\t\tDevCPM.SymWInt(Sxpro); OutSign(obj.typ, obj.link); OutName(obj.name^)\r\t\t\t\t\t| IProc:\r\t\t\t\t\t\tDevCPM.SymWInt(Sipro); OutSign(obj.typ, obj.link); OutName(obj.name^)\r\t\t\t\t\t| CProc:\r\t\t\t\t\t\tDevCPM.SymWInt(Scpro); OutSign(obj.typ, obj.link); ext := obj.conval.ext;\r\t\t\t\t\t\tIF ext # NIL THEN j := LEN(ext^); i := 0; DevCPM.SymWInt(j);\r\t\t\t\t\t\t\tWHILE i < j DO DevCPM.SymWCh(ext[i]); INC(i) END\r\t\t\t\t\t\tELSE DevCPM.SymWInt(0)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tOutName(obj.name^); portable := FALSE\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND ;\r\t\t\tOutObj(obj.right)\r\t\tEND\r\tEND OutObj;\r\r\tPROCEDURE Export*(VAR ext, new: BOOLEAN);\r\t\t\tVAR i: INTEGER; nofmod: BYTE; done: BOOLEAN; old: Object;"
                    attr: 0
