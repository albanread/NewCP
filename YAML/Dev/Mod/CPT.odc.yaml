                  - text: "\r\tIMPORT Strings, DevCPM;\r\r\tCONST\r\t\tMaxIdLen = 256;\r\t\r\tTYPE\r\t\tName* = ARRAY MaxIdLen OF SHORTCHAR;\r\t\tString* = POINTER TO ARRAY OF SHORTCHAR;\r\t\tConst* = POINTER TO ConstDesc;\r\t\tObject* = POINTER TO ObjDesc;\r\t\tStruct* = POINTER TO StrDesc;\r\t\tNode* = POINTER TO NodeDesc;\r\t\tConstExt* = String;\r\t\tLinkList* = POINTER TO LinkDesc;\r\r\t\tConstDesc* = RECORD\r\t\t\text*: ConstExt;\t(* string or code for code proc (longstring in utf8) *)\r\t\t\tintval*: INTEGER;\t(* constant value or adr, proc par size, text position or least case label *)\r\t\t\tintval2*: INTEGER;\t(* string length (#char, incl 0X), proc var size or larger case label *)\r\t\t\tsetval*: SET;\t(* constant value, procedure body present or \"ELSE\" present in case *)\r\t\t\trealval*: REAL;\t(* real or longreal constant value *)\r\t\t\tlink*: Const\t(* chain of constants present in obj file *)\r\t\tEND ;\r\r\t\tLinkDesc* = RECORD\r\t\t\toffset*, linkadr*: INTEGER;\r\t\t\tnext*: LinkList;\r\t\tEND;\r\r\t\tObjDesc* = RECORD\r\t\t\tleft*, right*, link*, scope*: Object;\r\t\t\tname*: String;\t(* name = null OR name^ # \"\" *)\r\t\t\tleaf*: BOOLEAN;\r\t\t\tsysflag*: BYTE;\r\t\t\tmode*, mnolev*: BYTE;\t(* mnolev < 0 -> mno = -mnolev *)\r\t\t\tvis*: BYTE;\t(* internal, external, externalR, inPar, outPar *)\r\t\t\thistory*: BYTE;\t(* relevant if name # \"\" *)\r\t\t\tused*, fpdone*: BOOLEAN;\r\t\t\tfprint*: INTEGER;\r\t\t\ttyp*: Struct;\t(* actual type, changed in with statements *)\r\t\t\tptyp*: Struct;\t(* original type if typ is changed *)\r\t\t\tconval*: Const;\r\t\t\tadr*, num*: INTEGER;\t(* mthno *)\r\t\t\tlinks*: LinkList;\r\t\t\tnlink*: Object;\t(* link for name list, declaration order for methods, library link for imp obj *)\r\t\t\tlibrary*, entry*: String;\t(* library name, entry name *)\r\t\t\tmodifiers*: POINTER TO ARRAY OF String;\t(* additional interface strings *)\r\t\t\tlinkadr*: INTEGER;\t(* used in ofront *)\r\t\t\tred: BOOLEAN;\r\t\tEND ;\r\r\t\tStrDesc* = RECORD\r\t\t\tform*, comp*, mno*, extlev*: BYTE;\r\t\t\tref*, sysflag*: SHORTINT;\r\t\t\tn*, size*, align*, txtpos*: INTEGER;\t(* align is alignment for records and len offset for dynarrs *)\r\t\t\tuntagged*, allocated*, pbused*, pvused*, exp*, fpdone, idfpdone: BOOLEAN;\r\t\t\tattribute*: BYTE;\r\t\t\tidfp, pbfp*, pvfp*:INTEGER;\r\t\t\tBaseTyp*: Struct;\r\t\t\tlink*, strobj*: Object;\r\t\t\text*: ConstExt\t(* id string for interface records *)\r\t\tEND ;\r\t\t\r\t\tNodeDesc* = RECORD\r\t\t\tleft*, right*, link*: Node;\r\t\t\tclass*, subcl*, hint*: BYTE;\r\t\t\treadonly*: BOOLEAN;\r\t\t\ttyp*: Struct;\r\t\t\tobj*: Object;\r\t\t\tconval*: Const\r\t\tEND ;\r\t\r\tCONST\r\t\tmaxImps = 127;\t(* must be <= MAX(SHORTINT) *)\r\t\tmaxStruct = DevCPM.MaxStruct;\t(* must be < MAX(INTEGER) DIV 2 *)\r\t\tFirstRef = 32;\r\t\tFirstRef0 = 16;\t(* correction for version 0 *)\r\t\tactVersion = 1;\r\r\tVAR\r\t\ttopScope*: Object;\r\t\tundftyp*, bytetyp*, booltyp*, char8typ*, int8typ*, int16typ*, int32typ*,\r\t\treal32typ*, real64typ*, settyp*, string8typ*, niltyp*, notyp*, sysptrtyp*,\r\t\tanytyp*, anyptrtyp*, char16typ*, string16typ*, int64typ*,\r\t\trestyp*, iunktyp*, punktyp*, guidtyp*,\r\t\tintrealtyp*, lreal64typ*, lint64typ*, lchar16typ*: Struct;\r\t\tnofGmod*: BYTE;\t(*nof imports*)\r\t\tGlbMod*: ARRAY maxImps OF Object;\t(* .right = first object, .name = module import name (not alias) *)\r\t\tSelfName*: Name;\t(* name of module being compiled *)\r\t\tSYSimported*: BOOLEAN;\r\t\tprocessor*, impProc*: SHORTINT;\r\t\tlibName*: Name;\t(* library alias of module being compiled *)\r\t\tnull*: String;\t(* \"\" *)\r\t\t\r\tCONST\r\t\t(* object modes *)\r\t\tVar = 1; VarPar = 2; Con = 3; Fld = 4; Typ = 5; LProc = 6; XProc = 7;\r\t\tSProc = 8; CProc = 9; IProc = 10; Mod = 11; Head = 12; TProc = 13; Attr = 20;\r\r\t\t(* structure forms *)\r\t\tUndef = 0; Byte = 1; Bool = 2; Char8 = 3; Int8 = 4; Int16 = 5; Int32 = 6;\r\t\tReal32 = 7; Real64 = 8; Set = 9; String8 = 10; NilTyp = 11; NoTyp = 12;\r\t\tPointer = 13; ProcTyp = 14; Comp = 15;\r\t\tAnyPtr = 14; AnyRec = 15;\t(* sym file only *)\r\t\tChar16 = 16; String16 = 17; Int64 = 18;\r\t\tRes = 20; IUnk = 21; PUnk = 22; Guid = 23;\r\t\t\r\t\t(* composite structure forms *)\r\t\tBasic = 1; Array = 2; DynArr = 3; Record = 4;\r\r\t\t(*function number*)\r\t\tassign = 0;\r\t\thaltfn = 0; newfn = 1; absfn = 2; capfn = 3; ordfn = 4;\r\t\tentierfn = 5; oddfn = 6; minfn = 7; maxfn = 8; chrfn = 9;\r\t\tshortfn = 10; longfn = 11; sizefn = 12; incfn = 13; decfn = 14;\r\t\tinclfn = 15; exclfn = 16; lenfn = 17; copyfn = 18; ashfn = 19; assertfn = 32;\r\t\tlchrfn = 33; lentierfcn = 34; typfn = 36; bitsfn = 37; bytesfn = 38;\r\t\t\r\t\t(*SYSTEM function number*)\r\t\tadrfn = 20; ccfn = 21; lshfn = 22; rotfn = 23;\r\t\tgetfn = 24; putfn = 25; getrfn = 26; putrfn = 27;\r\t\tbitfn = 28; valfn = 29; sysnewfn = 30; movefn = 31;\r\t\tthisrecfn = 45; thisarrfn = 46;\r\t\t\r\t\t(* COM function number *)\r\t\tvalidfn = 40; iidfn = 41; queryfn = 42;\r\t\t\r\t\t(* attribute flags (attr.adr, struct.attribute, proc.conval.setval) *)\r\t\tnewAttr = 16; absAttr = 17; limAttr = 18; empAttr = 19; extAttr = 20;\r\t\t\r\t\t(* procedure flags (conval.setval) *)\r\t\tisHidden = 29;\r\r\t\t(* module visibility of objects *)\r\t\tinternal = 0; external = 1; externalR = 2; inPar = 3; outPar = 4;\r\r\t\t(* history of imported objects *)\r\t\tinserted = 0; same = 1; pbmodified = 2; pvmodified = 3; removed = 4; inconsistent = 5;\r\r\t\t(* sysflags *)\r\t\tinBit = 2; outBit = 4; interface = 10; \r\r\t\t(* symbol file items *)\r\t\tSmname = 16; Send = 18; Stype = 19; Salias = 20; Svar = 21; Srvar = 22;\r\t\tSvalpar = 23; Svarpar = 24; Sfld = 25; Srfld = 26; Shdptr = 27; Shdpro = 28; Stpro = 29; Shdtpro = 30;\r\t\tSxpro = 31; Sipro = 32; Scpro = 33; Sstruct = 34; Ssys = 35; Sptr = 36; Sarr = 37; Sdarr = 38; Srec = 39; Spro = 40;\r\t\tShdutptr = 41; Slib = 42; Sentry = 43; Sinpar = 25; Soutpar = 26;\r\t\tSlimrec = 25; Sabsrec = 26; Sextrec = 27; Slimpro = 31; Sabspro = 32; Semppro = 33; Sextpro = 34; Simpo = 22;\r\t\t\r\tTYPE\r\t\tImpCtxt = RECORD\r\t\t\tnextTag, reffp: INTEGER;\r\t\t\tnofr, minr, nofm: SHORTINT;\r\t\t\tself: BOOLEAN;\r\t\t\tref: ARRAY maxStruct OF Struct;\r\t\t\told: ARRAY maxStruct OF Object;\r\t\t\tpvfp: ARRAY maxStruct OF INTEGER;\t(* set only if old # NIL *)\r\t\t\tglbmno: ARRAY maxImps OF BYTE\t(* index is local mno *)\r\t\tEND ;\r\r\t\tExpCtxt = RECORD\r\t\t\treffp: INTEGER;\r\t\t\tref: SHORTINT;\r\t\t\tnofm: BYTE;\r\t\t\tlocmno: ARRAY maxImps OF BYTE\t(* index is global mno *)\r\t\tEND ;\r\r\tVAR\r\t\tuniverse, syslink, comlink, infinity: Object;\r\t\timpCtxt: ImpCtxt;\r\t\texpCtxt: ExpCtxt;\r\t\tnofhdfld: INTEGER;\r\t\tsfpresent, symExtended, symNew: BOOLEAN;\r\t\tversion: INTEGER;\r\t\tsymChanges: INTEGER;\r\t\tportable: BOOLEAN;\r\t\tdepth: INTEGER;\r\t\t\r\r\tPROCEDURE err(n: SHORTINT);\r\tBEGIN DevCPM.err(n)\r\tEND err;\r\t\r\tPROCEDURE NewConst*(): Const;\r\t\tVAR const: Const;\r\tBEGIN NEW(const); RETURN const\r\tEND NewConst;\r\t\r\tPROCEDURE NewObj*(): Object;\r\t\tVAR obj: Object;\r\tBEGIN NEW(obj); obj.name := null; RETURN obj\r\tEND NewObj;\r\t\r\tPROCEDURE NewStr*(form, comp: BYTE): Struct;\r\t\tVAR typ: Struct;\r\tBEGIN NEW(typ); typ.form := form; typ.comp := comp; typ.ref := maxStruct; (* ref >= maxStruct: not exported yet *)\r\t\ttyp.txtpos := DevCPM.errpos; typ.size := -1; typ.BaseTyp := undftyp; RETURN typ\r\tEND NewStr;\r\t\r\tPROCEDURE NewNode*(class: BYTE): Node;\r\t\tVAR node: Node;\r\tBEGIN\r\t\tNEW(node); node.class := class; RETURN node\r\tEND NewNode;\r(*\t\r\tPROCEDURE NewExt*(): ConstExt;\r\t\tVAR ext: ConstExt;\r\tBEGIN NEW(ext); RETURN ext\r\tEND NewExt;\r*)\t\r\tPROCEDURE NewName* (IN name: ARRAY OF SHORTCHAR): String;\r\t\tVAR i: INTEGER; p: String;\r\tBEGIN\r\t\ti := 0; WHILE name[i] # 0X DO INC(i) END;\r\t\tIF i > 0 THEN NEW(p, i + 1); p^ := name$; "
