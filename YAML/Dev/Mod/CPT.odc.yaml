                  - text: " null\r\t\tEND\r\tEND NewName;\r\r\tPROCEDURE OpenScope*(level: BYTE; owner: Object);\r\t\tVAR head: Object;\r\tBEGIN head := NewObj();\r\t\thead.mode := Head; head.mnolev := level; head.link := owner;\r\t\tIF owner # NIL THEN owner.scope := head END ;\r\t\thead.left := topScope; head.right := NIL; head.scope := NIL; topScope := head\r\tEND OpenScope;\r\r\tPROCEDURE CloseScope*;\r\tBEGIN topScope := topScope.left\r\tEND CloseScope;\r\r\tPROCEDURE Init*(opt: SET);\r\tBEGIN\r\t\ttopScope := universe; OpenScope(0, NIL); SYSimported := FALSE;\r\t\tGlbMod[0] := topScope; nofGmod := 1;\r\t\tsfpresent := TRUE;\t(* !!! *)\r\t\tsymChanges := 0;\r\t\tinfinity.conval.intval := DevCPM.ConstNotAlloc;\r\t\tdepth := 0\r\tEND Init;\r\t\r"
