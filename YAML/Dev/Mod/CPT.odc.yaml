                  - text: "(* start checksum here to avoid problems with proc id fixup *)"
                    attr: 6
                  - text: "\r\t\t\t\tDevCPM.SymWInt(actVersion);\r\t\t\t\told := GlbMod[0]; portable := TRUE;\r \t\t\t\tIF libName # \"\" THEN\r\t\t\t\t\tDevCPM.SymWInt(Slib); OutName(libName); portable := FALSE;\r\t\t\t\t\tIF done & ((old.library = NIL) OR (old.library^ # libName)) THEN\r\t\t\t\t\t\tFPrintErr(NIL, 252)\r\t\t\t\t\tEND\r\t\t\t\tELSIF done & (old.library # NIL) THEN FPrintErr(NIL, 252)\r\t\t\t\tEND;\r\t\t\t\tDevCPM.SymWInt(Smname); OutName(SelfName);\r\t\t\t\texpCtxt.reffp := 0; expCtxt.ref := FirstRef;\r\t\t\t\texpCtxt.nofm := 1; expCtxt.locmno[0] := 0;\r\t\t\t\ti := 1; WHILE i < maxImps DO expCtxt.locmno[i] := -1; INC(i) END ;\r\t\t\t\tOutObj(topScope.right);\r\t\t\t\text := sfpresent & symExtended;\r\t\t\t\tnew := ~sfpresent OR symNew"
                    attr: 0
