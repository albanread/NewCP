                  - text: "\r\tIMPORT SYSTEM, \r\t\tStrings, DevDebug, Dialog, Stores, Models, Views, Controllers, Properties, Kernel, \r\t\tPorts, TextModels, TextViews, TextMappers, StdDialog,\r\t\tFiles, Converters, FormViews, FormModels, Windows, Containers, Services;\r\r\tCONST\r\t\trefViewSize = 9 * Ports.point;\r\r\tTYPE\r\t\tView = POINTER TO RECORD (Views.View)\r\t\t\tinner: Views.View\r\t\tEND;\r\t\t\r\t\tRefView = POINTER TO RECORD (Views.View)\r\t\t\tmsg: ANYPTR\r\t\tEND;\r\r\t\tMsgs = POINTER TO RECORD\r\t\t\tleft, right: Msgs;\r\t\t\tmod, ident: Kernel.Name;\r\t\t\tindex: INTEGER;\r\t\tEND;\r\t\t\r\tVAR\r\t\t"
                    attr: 0
                  - text: para
                    attr: 3
                  - text: "* : RECORD\r\t\t\tsel*: Dialog.Selection;\r\t\t\tselectNewMessages*: BOOLEAN;\r\t\t\tshowMessages*: BOOLEAN\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: text
                    attr: 3
                  - text: "*: TextModels.Model;\r\t\t\r\t\tmsgs: Msgs;\r\t\tsize: INTEGER;\r\t\tpath: ARRAY 4 OF Ports.Point;\r\r"
                    attr: 0
                  - text: "\t(* -------------------  Selection  ------------------- *)\r\r"
                    attr: 1
                  - text: "\tPROCEDURE Find(mod, ident: Kernel.Name): Msgs;\r\t\tVAR m: Msgs;\r\tBEGIN m := msgs;\r\t\tWHILE m # NIL DO\r\t\t\tIF mod < m.mod THEN m := m.left\r\t\t\tELSIF mod > m.mod THEN m := m.right\r\t\t\tELSIF ident < m.ident THEN m := m.left\r\t\t\tELSIF ident > m.ident THEN m := m.right\r\t\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " m\r\t\t\tEND\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL\r\tEND Find;\r\t\r\tPROCEDURE Insert(mod, ident: Kernel.Name);\r\t\tPROCEDURE InsertTree(VAR m: Msgs);\r\t\t\tVAR name: ARRAY 64 OF CHAR;\r\t\tBEGIN\r\t\t\tIF m = NIL THEN\r\t\t\t\tNEW(m); m.mod := mod; m.ident := ident; m.index := size-1;\r\t\t\t\tname := m.mod + \".\" + m.ident;\r\t\t\t\tpara.sel.SetItem(m.index, name);\r\t\t\t\tIF para.selectNewMessages THEN para.sel.Incl(m.index, m.index) END\r\t\t\tELSE\r\t\t\t\tIF mod < m.mod THEN InsertTree(m.left)\r\t\t\t\tELSIF mod > m.mod THEN InsertTree(m.right)\r\t\t\t\tELSIF ident < m.ident THEN InsertTree(m.left)\r\t\t\t\tELSIF ident > m.ident THEN InsertTree(m.right)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND InsertTree;\r\tBEGIN\r\t\tINC(size); para.sel.SetLen(size);\t"
                    attr: 0
                  - text: "(* increase size and reset all items *)"
                    attr: 1
                  - text: "\r\t\tInsertTree(msgs);\t\t\t\t\t\t"
                    attr: 0
                  - text: "(* insert the new item *)"
                    attr: 1
                  - text: "\r\t\tDialog.UpdateList(para.sel)\r\tEND Insert;\r\r"
                    attr: 0
                  - text: "\t(* -------------------  RefView ------------------- *)\r"
                    attr: 1
                  - text: "\t\r\tPROCEDURE (v: RefView) Internalize (VAR rd: Stores.Reader);\r\t\tVAR thisVersion: INTEGER;\r\tBEGIN\r\t\tv.Internalize^(rd); IF rd.cancelled THEN RETURN END;\r\t\trd.ReadVersion(0, 0, thisVersion); IF rd.cancelled THEN RETURN END;\r\tEND Internalize;\r\r\tPROCEDURE (v: RefView) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\tv.Externalize^(wr);\r\t\twr.WriteVersion(0);\r\tEND Externalize;\r\r\tPROCEDURE (v: RefView) CopyFromSimpleView (source: Views.View);\r\tBEGIN\r\t\t(* v.CopyFrom^(source); *)\r\t\tv.msg := source(RefView).msg\r\tEND CopyFromSimpleView;\r\r\tPROCEDURE (v: RefView) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tf.DrawPath(path, 4, Ports.fill, Ports.blue, Ports.closedPoly)\r\tEND Restore;\r\t\r\tPROCEDURE (v: RefView) HandleCtrlMsg (\r\t\tf: Views.Frame; VAR msg: Controllers.Message; VAR focus: Views.View\r\t);\r\t\tTYPE ControllersMessage = POINTER TO Controllers.Message;\r\t\t\tViewsMessage = POINTER TO Views.Message;\r\t\t\tModelsMessage = POINTER TO Models.Message;\r\t\t\tPropMessage = POINTER TO Properties.Message;\r\t\tVAR x, y: INTEGER; isDown: BOOLEAN; mo: SET;name: ARRAY 32 OF CHAR;\r\tBEGIN\r\t\tWITH msg: Controllers.TrackMsg DO\r\t\t\tIF v.msg # NIL THEN\r\t\t\t\tREPEAT\r\t\t\t\t\tf.MarkRect(0, 0, refViewSize, refViewSize, Ports.fill, Ports.hilite, Ports.show);\r\t\t\t\t\tREPEAT\r\t\t\t\t\t\tf.Input(x, y, mo, isDown)\r\t\t\t\t\tUNTIL (x < 0) OR (x > refViewSize) OR (y < 0) OR (y > refViewSize) OR ~isDown;\r\t\t\t\t\tf.MarkRect(0, 0, refViewSize, refViewSize, Ports.fill, Ports.hilite, Ports.hide);\r\t\t\t\t\tWHILE isDown & ((x < 0) OR (x > refViewSize) OR (y < 0) OR (y > refViewSize)) DO\r\t\t\t\t\t\tf.Input(x, y, mo, isDown)\r\t\t\t\t\tEND\r\t\t\t\tUNTIL ~isDown;\r\t\t\t\tIF (x >= 0) & (x <= refViewSize) & (y >= 0) & (y <= refViewSize) THEN\r\t\t\t\t\tIF v.msg IS ControllersMessage THEN name := \"Controllers.Message\"\r\t\t\t\t\tELSIF v.msg IS PropMessage THEN name := \"Properties.Message\"\r\t\t\t\t\tELSIF v.msg IS ViewsMessage THEN name := \"Views.Message\"\r\t\t\t\t\tELSIF v.msg IS ModelsMessage THEN name := \"Models.Message\"\r\t\t\t\t\tELSE name := \"Message Record\"\r\t\t\t\t\tEND;\r\t\t\t\t\tDevDebug.ShowHeapObject(SYSTEM.ADR(v.msg^), name)\r\t\t\t\tEND\r\t\t\tEND\r\t\t| msg: Controllers.PollCursorMsg DO\r\t\t\tmsg.cursor := Ports.refCursor\r\t\tELSE\r\t\tEND\r\tEND HandleCtrlMsg;\r\t\r\tPROCEDURE (v: RefView) HandlePropMsg (VAR msg: Properties.Message);\r\tBEGIN\r\t\tWITH msg: Properties.Preference DO\r\t\t\tWITH msg: Properties.ResizePref DO msg.fixed := TRUE\r\t\t\t| msg: Properties.SizePref DO msg.w := refViewSize; msg.h := refViewSize\r\t\t\t| msg: Properties.FocusPref DO msg.hotFocus := TRUE\r\t\t\tELSE\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\t\r"
                    attr: 0
                  - text: "\t(* -------------------  Wrapper   ------------------- *)\r"
                    attr: 1
                  - text: "\t\r\tPROCEDURE (v: View) CopyFromModelView (source: Views.View; model: Models.Model);\r\tBEGIN\r\t\tWITH source: View DO\r\t\t\tIF model = NIL THEN v.inner := Views.CopyOf(source.inner, Views.shallow)\r\t\t\tELSE v.inner := Views.CopyWithNewModel(source.inner, model)\r\t\t\tEND;\r\t\t\tStores.Join(v, v.inner)\r\t\tEND\r\tEND CopyFromModelView;\r\t\r\tPROCEDURE (v: View) ThisModel (): Models.Model;\r\tBEGIN\r\t\tRETURN v.inner.ThisModel()\r\tEND ThisModel;\r\r\tPROCEDURE (v: View) InitContext (context: Models.Context);\r\tBEGIN\r\t\tv.InitContext^(context);\r\t\tv.inner.InitContext(context)\t(* wrapper and wrapped view share the same context *)\r\tEND InitContext;\r\t\r(*\r\tPROCEDURE (v: View) PropagateDomain;\r\tBEGIN\r\t\tStores.InitDomain(v.inner, v.domain)\r\tEND PropagateDomain;\r*)\r\r\tPROCEDURE (v: View) Neutralize;\r\tBEGIN\r\t\tv.inner.Neutralize\r\tEND Neutralize;\r\r\t(* NewFrame: wrapper uses standard frame *)\r\t(* Background: wrapper has no intrinsic background color *)\r\r\tPROCEDURE (v: View) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tViews.InstallFrame(f, v.inner, 0, 0, 0, TRUE)\r\tEND Restore;\r\r\t(* RestoreMarks: wrapper has no intrinsic marks, wrapped view's RestoreMarks is called by framework *)\r\t\r\tPROCEDURE DescOfMsg (VAR x: ANYREC): Kernel.Type;\r\t\tVAR desc: Kernel.Type;\r\tBEGIN\r\t\tdesc := SYSTEM.VAL(Kernel.Type, SYSTEM.TYP(x));\t(* tdesc of x *)\r\t\tRETURN desc\r\tEND DescOfMsg;\r\t\r\tPROCEDURE WriteLog(t: Kernel.Type; VAR msg: ANYREC; name: ARRAY OF CHAR);\r\t\tVAR link: RefView; p: ANYPTR; modName, name2 : Kernel.Name; f: TextMappers.Formatter;\r\tBEGIN\r\t\tKernel.NewObj(p, t);\r\t\tSYSTEM.MOVE(SYSTEM.ADR(msg), p, t.size);\r\t\tNEW(link); link.msg := p;\r\t\tKernel.GetModName(t.mod, modName); \r\t\tname2 := modName$ + \".\" + name$;"
                    attr: 0
                  - text: "\r"
                    attr: 4
                  - text: "\t\t\r\t\tf.ConnectTo(text);\r\t\tf.WriteString(name2 + \" \");\r\t\tf.WriteView(link);\r\t\tf.WriteLn;\r\t\tTextViews.ShowRange(text, text.Length(), text.Length(), ~TextViews.focusOnly)\r\tEND WriteLog;\r\t\r\tPROCEDURE (v: View) HandleCtrlMsg (f: Views.Frame; VAR msg: Controllers.Message; VAR focus: Views.View);\r\t\tVAR modName, name: Kernel.Name; t: Kernel.Type; m: Msgs;\r\tBEGIN\r\t\tt := DescOfMsg(msg);\r\t\tKernel.GetModName(t.mod, modName); \r\t\tKernel.GetTypeName (t, name);\r\t\tm := Find(modName, name);\r\t\tIF m = NIL THEN Insert(modName, name)\r\t\tELSIF para.sel.In(m.index) & para.showMessages THEN WriteLog(t, msg, name);\r\t\tEND;\r\t\tfocus := v.inner\t(* forward all controller messages to wrapped view *)\r\tEND HandleCtrlMsg;\r\t\r\tPROCEDURE (v: View) ExternalizeAs (VAR s: Stores.Store);\r\tBEGIN\r\t\ts := v.inner\r\tEND ExternalizeAs;\r\t\r\tPROCEDURE (v: View) HandlePropMsg (VAR msg: Properties.Message);\r\t\tVAR modName, name: Kernel.Name; t: Kernel.Type; m: Msgs; res: INTEGER; nn: Kernel.Utf8Name;\r\tBEGIN\r\t\tt := DescOfMsg(msg);\r\t\tKernel.GetModName(t.mod, modName); \r\t\tKernel.GetTypeName (t, name);\r\t\tm := Find(modName, name);\r\t\tIF m = NIL THEN Insert(modName, name)\r\t\tELSIF para.sel.In(m.index) & para.showMessages THEN WriteLog(t, msg, name);\r\t\tEND;\t\t\t\r\t\tViews.HandlePropMsg(v.inner, msg)\r\tEND HandlePropMsg;\r\t\r\tPROCEDURE (v: View) HandleViewMsg (f: Views.Frame; VAR msg: Views.Message);\r\t\tVAR modName, name: Kernel.Name; t: Kernel.Type; m: Msgs;\r\tBEGIN\r\t\tt := DescOfMsg(msg);\r\t\tKernel.GetModName(t.mod, modName); \r\t\tKernel.GetTypeName (t, name);\r\t\tm := Find(modName, name);\r\t\tIF m = NIL THEN Insert(modName, name)\r\t\tELSIF para.sel.In(m.index) & para.showMessages THEN WriteLog(t, msg, name);\r\t\tEND;\r\r\t\tWITH msg: Views.ScrollClassMsg DO\r\t\t\tmsg.allowBitmapScrolling := TRUE\r\t\tELSE\r\t\tEND\r\t\t(* framework performs message propagation *)\r\tEND HandleViewMsg;\r\r\tPROCEDURE (v: View) HandleModelMsg (VAR msg: Models.Message);\r\t\tVAR modName, name: Kernel.Name; t: Kernel.Type; m: Msgs;\r\tBEGIN\r\t\tt := DescOfMsg(msg);\r\t\tKernel.GetModName(t.mod, modName); \r\t\tKernel.GetTypeName (t, name);\r\t\tm := Find(modName, name);\r\t\tIF m = NIL THEN Insert(modName, name)\r\t\tELSIF para.sel.In(m.index) & para.showMessages THEN WriteLog(t, msg, name);\r\t\tEND;\r\t\t(* framework performs message propagation *)\r\tEND HandleModelMsg;\r\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Toggle
                    attr: 3
                  - text: "*;\r\t\tVAR v: Views.View; w: View; replace: Controllers.ReplaceViewMsg;\r\tBEGIN\r\t\tControllers.SetCurrentPath(Controllers.targetPath);\r\t\tv := Containers.FocusSingleton();\r\t\tControllers.ResetCurrentPath();\r\t\tIF v # NIL THEN\r\t\t\tWITH v: View DO\r\t\t\t\treplace.old := v; replace.new := v.inner;\r\t\t\tELSE\r\t\t\t\tNEW(w); w.inner := v;\r\t\t\t\treplace.old := v; replace.new := w;\r\t\t\tEND;\r\t\t\tControllers.Forward(replace)\r\t\tELSE Dialog.Beep\r\t\tEND\r\tEND Toggle;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ToggleGuard
                    attr: 3
                  - text: "* (VAR par: Dialog.Par);\r\t\tVAR v : Views.View;\r\tBEGIN\r\t\tControllers.SetCurrentPath(Controllers.targetPath);\r\t\tv := Containers.FocusSingleton();\r\t\tControllers.ResetCurrentPath();\r\t\tIF (v = NIL) OR ~(v IS View) THEN\r\t\t\tpar.label := \"#Dev:AddView\";\r\t\t\tpar.disabled := v = NIL\r\t\tELSE\r\t\t\tpar.label := \"#Dev:RemoveView\"\r\t\tEND\r\tEND ToggleGuard;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Reset
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\tmsgs := NIL; size := 0; para.sel.SetLen(size);\r\t\tDialog.UpdateList(para.sel)\r\tEND Reset;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Clear
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\ttext.Delete(0, text.Length())\r\tEND Clear;\r\t\r\tPROCEDURE PathToSpec (VAR path: ARRAY OF CHAR; VAR loc: Files.Locator; VAR name: Files.Name);\r\t\tVAR i, j: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ti := 0; j := 0; loc := Files.dir.This(\"\");\r\t\tWHILE (loc.res = 0) & (i < LEN(path) - 1) & (j < LEN(name) - 1) & (path[i] # 0X) DO\r\t\t\tch := path[i]; INC(i);\r\t\t\tIF (j > 0) & ((ch = \"/\") OR (ch = \"\\\")) THEN\r\t\t\t\tname[j] := 0X; j := 0; loc := loc.This(name)\r\t\t\tELSE\r\t\t\t\tname[j] := ch; INC(j)\r\t\t\tEND\r\t\tEND;\r\t\tIF path[i] = 0X THEN name[j] := 0X\r\t\tELSE loc.res := 1; name := \"\"\r\t\tEND\r\tEND PathToSpec;\r\r\tPROCEDURE "
                    attr: 0
                  - text: OpenDialog
                    attr: 3
                  - text: "*(file, title: ARRAY OF CHAR);\r\t\tVAR loc: Files.Locator; fname: Files.Name; conv: Converters.Converter; view, v, t: Views.View;\r\t\t\tr: FormModels.Reader; t0: Views.Title; done: BOOLEAN; c: Containers.Controller;\r\tBEGIN\r\t\tDialog.MapString(title, t0);\r\t\tWindows.SelectByTitle(NIL, {Windows.isTool}, t0, done);\r\t\tIF ~ done THEN\r\t\t\tPathToSpec(file, loc, fname);\r\t\t\tIF loc.res = 0 THEN\r\t\t\t\tconv := NIL;\r\t\t\t\tview := Views.Old(Views.dontAsk, loc, fname, conv);\r\t\t\t\tIF view IS FormViews.View THEN t := NIL;\r\t\t\t\t\tr := view(FormViews.View).ThisModel().NewReader(NIL);\r\t\t\t\t\tr.ReadView(v);\r\t\t\t\t\tWHILE (v # NIL) & (t = NIL) DO\r\t\t\t\t\t\tt := Properties.ThisType(v, \"TextViews.View\");\r\t\t\t\t\t\tr.ReadView(v)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF t # NIL THEN\r\t\t\t\t\t\ttext := t(TextViews.View).ThisModel();\r\t\t\t\t\t\ttext.Delete(0, text.Length())\r\t\t\t\t\tEND;\r\t\t\t\tEND;\r\t\t\t\tIF view # NIL THEN\r\t\t\t\t\tWITH view: Containers.View DO\r\t\t\t\t\t\tc := view.ThisController();\r\t\t\t\t\t\tIF c # NIL THEN\r\t\t\t\t\t\t\tc.SetOpts(c.opts - {Containers.noFocus} + {Containers.noCaret, Containers.noSelection})\r\t\t\t\t\t\tELSE Dialog.ShowMsg(\"#System:"
                    attr: 0
                  - text: NotEditable
                    attr: 3
                  - text: "\")\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE Dialog.ShowMsg(\"#System:"
                    attr: 0
                  - text: ContainerExpected
                    attr: 3
                  - text: "\")\r\t\t\t\t\tEND;\r\t\t\t\t\tIF text # NIL THEN\r\t\t\t\t\t\tStdDialog.Open(view, title, NIL, \"\", NIL, TRUE, FALSE, TRUE, FALSE, TRUE)\r\t\t\t\t\tELSE\r\t\t\t\t\t\tDialog.ShowMsg(\"#Dev:"
                    attr: 0
                  - text: TextInDialogExpected
                    attr: 3
                  - text: "\")\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tELSE Dialog.ShowParamMsg(\"#System:"
                    attr: 0
                  - text: FileNotFound
                    attr: 3
                  - text: "\", file, \"\", \"\")\r\t\t\tEND;\r\t\tEND\r\tEND OpenDialog;\r\rBEGIN\r(*  NEW(action); action.Do; *)\r\tpara.showMessages := TRUE;\r\tsize := 0;\r\tpath[0].x := refViewSize DIV 2; path[0].y := 0;\r\tpath[1].x := refViewSize; path[1].y := refViewSize DIV 2;\r\tpath[2].x := refViewSize DIV 2; path[2].y := refViewSize;\r\tpath[3].x := 0; path[3].y := refViewSize DIV 2;\rEND DevMsgSpy.\r\r"
                    attr: 0
