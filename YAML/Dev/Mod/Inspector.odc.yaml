                  - text: " v\r\tEND Singleton;\r\r\tPROCEDURE (a: Action) Do;\r\t\tVAR c: Containers.Controller; v: Views.View; fp: INTEGER;\r\tBEGIN\r\t\tControllers.SetCurrentPath(Controllers.targetPath);\r\t\tIF multiView THEN\r\t\t\tc := Containers.Focus(); fp := 0;\r\t\t\tIF c # NIL THEN\r\t\t\t\tc.GetFirstView(TRUE, v);\r\t\t\t\tWHILE v # NIL DO fp := fp + Services.AdrOf(v); c.GetNextView(TRUE, v) END\r\t\t\tEND\r\t\tELSE\r\t\t\tv := Singleton();\r\t\t\tIF v = NIL THEN fp := 0 ELSE fp := Services.AdrOf(v) END\r\t\tEND;\r\t\tIF fp # fingerprint THEN PollProp(v); fingerprint := fp END;\r\t\tControllers.ResetCurrentPath();\r\t\tServices.DoLater(action, Services.Ticks() + Services.resolution DIV 2)\r\tEND Do;\r\r\tPROCEDURE "
                    attr: 0
                  - text: InitDialog
