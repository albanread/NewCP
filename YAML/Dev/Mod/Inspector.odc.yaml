                  - text: "* (VAR par: Dialog.Par);\r\tBEGIN\r\t\tIF ~(Controls.label IN inspect.known) THEN par.disabled := TRUE\r\t\tELSIF ~(Controls.label IN inspect.valid) THEN par.undef := TRUE\r\t\tEND;\r\t\tIF inspect.type # \"\" THEN MapLabel(inspect.type, \"Field\", 2, par.label) END\r\tEND LabelGuard;\r\t\r\tPROCEDURE "
