                    attr: 3
                  - text: "*: RECORD\r\t\t\tcontrol-: Dialog.String;\r\t\t\tlabel*: Dialog.String; (* ARRAY 40 OF CHAR; *)\r\t\t\tlink*, guard*, notifier*: Dialog.String;\r\t\t\tlevel*: INTEGER;\r\t\t\topt0*, opt1*, opt2*, opt3*, opt4*: BOOLEAN;\r\t\t\tknown, valid: SET;\r\t\t\ttype: Stores.TypeName\r\t\tEND;\r\t\tfingerprint: INTEGER;\r\t\taction: Action;\r\t\r\tPROCEDURE GetTypeName (v: Views.View; VAR t, s: ARRAY OF CHAR);\r\t\tVAR c: Containers.Controller; w: Views.View; subs, cntr: Dialog.String;\r\tBEGIN\r\t\ts := \"\"; t := \"\";\r\t\tIF multiView THEN\r\t\t\tc := Containers.Focus();\r\t\t\tIF c # NIL THEN\r\t\t\t\tc.GetFirstView(Containers.selection, v); w := v;\r\t\t\t\tWHILE (w # NIL) & Services.SameType(w, v) DO c.GetNextView(Containers.selection, w) END;\r\t\t\t\tIF w # NIL THEN v := NIL END\r\t\t\tEND\r\t\tEND;\r\t\tIF v # NIL THEN\r\t\t\tServices.GetTypeName(v, t); Kernel.SplitName(t, subs, cntr);\r\t\t\tDialog.MapString(\"#\" + subs + \":\" + cntr, s);\r\t\t\tIF s = cntr THEN Dialog.MapString(\"#Dev:\" + t, s) END\r\t\tEND\r\tEND GetTypeName;\r\r\tPROCEDURE PollProp (v: Views.View);\r\t\tVAR msg: Properties.PollMsg; q: Properties.Property; p: Controls.Prop;\r\tBEGIN\r\t\tinspect.control := \"\"; inspect.link := \"\"; inspect.label := '';\r\t\tinspect.guard := \"\"; inspect.notifier := \"\"; inspect.level := 0;\r\t\tinspect.opt0 := FALSE; inspect.opt1 := FALSE;\r\t\tinspect.opt2 := FALSE; inspect.opt3 := FALSE; inspect.opt4 := FALSE;\r\t\tinspect.known := {}; inspect.valid := {};\r\t\tIF multiView OR (v # NIL) THEN\r\t\t\tGetTypeName(v, inspect.type, inspect.control);\r\t\t\tIF multiView THEN\r\t\t\t\tProperties.CollectProp(q)\r\t\t\tELSE\r\t\t\t\tmsg.prop := NIL; Views.HandlePropMsg(v, msg); q := msg.prop\r\t\t\tEND;\r\t\t\tWHILE (q # NIL) & ~(q IS Controls.Prop) DO q := q.next END;\r\t\t\tIF q # NIL THEN\r\t\t\t\tp := q(Controls.Prop);\r\t\t\t\tinspect.known := p.known; inspect.valid := p.valid;\r\t\t\t\tIF Controls.link IN p.valid THEN inspect.link"
