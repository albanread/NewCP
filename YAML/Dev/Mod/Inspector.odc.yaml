                  - text: "\r\tIMPORT Kernel, Services, Stores, Views, Controllers, Properties, Containers, Dialog, Controls;\r\t\r\tCONST\r\t\tmultiView = TRUE;\r\t\t\t\r\tTYPE\r\t\tAction = POINTER TO RECORD (Services.Action) END;\r\r\tVAR\r\t\t"
                    attr: 0
