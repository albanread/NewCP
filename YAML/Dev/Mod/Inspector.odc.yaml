                  - text: "*;\r\tBEGIN\r\t\tControllers.SetCurrentPath(Controllers.targetPath);\r\t\tPollProp(Singleton());\r\t\tControllers.ResetCurrentPath()\r\tEND InitDialog;\r\r\tPROCEDURE "
                    attr: 0
                  - text: GetNext
                    attr: 3
                  - text: "*;\r\t\tVAR c: Containers.Controller; v: Views.View;\r\tBEGIN\r\t\tControllers.SetCurrentPath(Controllers.targetPath);\r\t\tc := Containers.Focus();\r\t\tIF c # NIL THEN\r\t\t\tIF c.HasSelection() THEN v := c.Singleton() ELSE v := NIL END;\r\t\t\tIF v = NIL THEN\r\t\t\t\tc.GetFirstView(Containers.any, v)\r\t\t\tELSE\r\t\t\t\tc.GetNextView(Containers.any, v);\r\t\t\t\tIF v = NIL THEN c.GetFirstView(Containers.any, v) END\r\t\t\tEND;\r\t\t\tc.SelectAll(FALSE);\r\t\t\tIF v # NIL THEN c.SetSingleton(v); c.MakeViewVisible(v) END;\r\t\t\tPollProp(v)\r\t\tELSE Dialog.ShowMsg(\"#Dev:NoTargetFocusFound\")\r\t\tEND;\r\t\tControllers.ResetCurrentPath()\r\tEND GetNext;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Set
                    attr: 3
                  - text: "*;\r\t\tVAR v: Views.View;\r\tBEGIN\r\t\tControllers.SetCurrentPath(Controllers.targetPath);\r\t\tv := Singleton();\r\t\tIF multiView OR (v # NIL) THEN SetProp(v); PollProp(v) END;\r\t\tControllers.ResetCurrentPath()\r\tEND Set;\r\r\tPROCEDURE MapLabel (\r\t\tIN control: Stores.TypeName; IN type: Dialog.String; i: INTEGER; VAR label: Dialog.String\r\t);\r\t\tVAR l, k, subs, cntr: Dialog.String; si: ARRAY 2 OF CHAR;\r\tBEGIN\r\t\tKernel.SplitName(control, subs, cntr);\r\t\tsi[0] := CHR(i + ORD(\"0\")); si[1] := 0X;\r\t\tk := cntr + \".\" + type + si;\r\t\tDialog.MapString(\"#\" + subs + \":\" + k, l);\r\t\tIF l$ # k$ THEN label := l$ END\r\tEND MapLabel;\r\r\tPROCEDURE "
                    attr: 0
                  - text: OptGuard
                    attr: 3
                  - text: "* (opt: INTEGER; VAR par: Dialog.Par);\r\t\tVAR name: ARRAY 64 OF CHAR; num: ARRAY 2 OF CHAR;\r\tBEGIN\r\t\tASSERT((opt >= 0) & (opt <= 9), 20);\r\t\tIF ~(opt IN inspect.known) OR (inspect.type = \"\") THEN\r\t\t\tpar.disabled := TRUE\r\t\tELSE\r\t\t\tnum[0] := CHR(opt + ORD(\"0\")); num[1] := 0X;\r\t\t\tname := inspect.type + \".Opt\" + num;\r\t\t\tpar.label := \"#Dev:\" + name;\r\t\t\tDialog.MapString(par.label, par.label);\r\t\t\tIF par.label = name THEN par.label := \"\" END;\r\t\t\tIF ~(opt IN inspect.valid) THEN par.undef := TRUE END;\r\t\t\tMapLabel(inspect.type, \"Opt\", opt, par.label)\r\t\tEND\r\tEND OptGuard;\r\r\tPROCEDURE "
                    attr: 0
                  - text: LevelGuard
                    attr: 3
                  - text: "* (VAR par: Dialog.Par);\r\tBEGIN\r\t\tIF ~(Controls.level IN inspect.known) THEN par.disabled := TRUE\r\t\tELSIF ~(Controls.level IN inspect.valid) THEN par.undef := TRUE\r\t\tEND;\r\t\tIF inspect.type # \"\" THEN MapLabel(inspect.type, \"Field\", 5, par.label) END\r\tEND LevelGuard;\r\r\tPROCEDURE "
                    attr: 0
