                  - text: "*;\r\t\tVAR beg, end, start, res, i: INTEGER; done: BOOLEAN;\r\t\t\tc: TextControllers.Controller; s: TextMappers.Scanner; cmd: Dialog.String;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tc.GetSelection(beg, end);\r\t\t\ts.ConnectTo(c.text); s.SetPos(beg); s.Scan; TextMappers.ScanQualIdent(s, cmd, done);\r\t\t\tIF done THEN\r\t\t\t\tDialog.Call(cmd, \" \", res)\r\t\t\tELSIF s.type = TextMappers.string THEN\r\t\t\t\tDialog.Call(s.string, \" \", res)\r\t\t\tELSE\r\t\t\t\tDialog.ShowMsg(\"#Dev:StringExpected\")\r\t\t\tEND\r\t\tELSE Dialog.ShowMsg(\"#Dev:NoSelectionFound\")\r\t\tEND\r\tEND Execute;\r\r\tPROCEDURE ShowStack;\r\t\tVAR ref, end, i, j, x, a, b, c: INTEGER; m, f: SHORTCHAR; mod: Kernel.Module; modName, name, sel: Kernel.Name;\r\t\t\td: Kernel.Type; res: INTEGER; nn: Kernel.Utf8Name; \r\tBEGIN\r\t\ta := Kernel.pc; b := Kernel.fp; c := 100;\r\t\tREPEAT\r\t\t\tmod := Kernel.modList;\r\t\t\tWHILE (mod # NIL) & ((a < mod.code) OR (a >= mod.code + mod.csize)) DO mod := mod.next END;\r\t\t\tIF mod # NIL THEN\r\t\t\t\tDEC(a, mod.code);\r\t\t\t\tIF mod.refcnt >= 0 THEN\r\t\t\t\t\tKernel.GetModName(mod, modName); InsertRefView(module, open, 0, NIL, NIL, NIL, modName);\r\t\t\t\t\tout.WriteChar(\" \"); out.WriteString(modName); ref := mod.refs;\r\t\t\t\t\tREPEAT Kernel.GetRefProc(ref, end, nn) UNTIL (end = 0) OR (a < end);\r\t\t\t\t\tStrings.Utf8ToString(nn, name, res); \r\t\t\t\t\tIF a < end THEN\r\t\t\t\t\t\tout.WriteChar(\".\"); out.WriteString(name);\r\t\t\t\t\t\tsel := mod.name$; i := 0;\r\t\t\t\t\t\tWHILE sel[i] # 0X DO INC(i) END;\r\t\t\t\t\t\tsel[i] := \".\"; INC(i); j := 0;\r\t\t\t\t\t\tWHILE name[j] # 0X DO sel[i] := name[j]; INC(i); INC(j) END;\r\t\t\t\t\t\tsel[i] := \":\"; sel[i+1] := 0X;\r\t\t\t\t\t\tout.WriteString(\"   [\"); WriteHex(a);\r\t\t\t\t\t\tout.WriteString(\"] \");\r\t\t\t\t\t\ti := Kernel.SourcePos(mod, 0);\r\t\t\t\t\t\tIF i >= 0 THEN\r\t\t\t\t\t\t\tKernel.GetModName(mod, modName); InsertRefView(source, open, a, NIL, NIL, NIL, modName);\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF name # \"$$\" THEN\r\t\t\t\t\t\t\tKernel.GetRefVar(ref, m, f, d, x, nn); Strings.Utf8ToString(nn, name, res);\r\t\t\t\t\t\t\tWHILE m # 0X DO\r\t\t\t\t\t\t\t\tShowVar(b + x, 0, f, m, d, NIL, NIL, name, sel);\r\t\t\t\t\t\t\t\tKernel.GetRefVar(ref, m, f, d, x, nn); Strings.Utf8ToString(nn, name, res);\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tout.WriteLn\r\t\t\t\t\tELSE out.WriteString(\".???\"); out.WriteLn\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\t\tout.WriteChar(\"(\"); Kernel.GetModName(mod, modName); out.WriteString(modName);\r\t\t\t\t\tout.WriteString(\")   (pc=\"); WriteHex(a);\r\t\t\t\t\tout.WriteString(\",  fp=\"); WriteHex(b); out.WriteChar(\")\");\r\t\t\t\t\tout.WriteLn\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tout.WriteString(\"<system>   (pc=\"); WriteHex(a);\r\t\t\t\tout.WriteString(\",  fp=\"); WriteHex(b); out.WriteChar(\")\");\r\t\t\t\tout.WriteLn\r\t\t\tEND;\r\t\t\tIF (b >= Kernel.fp) & (b < Kernel.stack) THEN\r\t\t\t\tSYSTEM.GET(b+4, a);\t"
