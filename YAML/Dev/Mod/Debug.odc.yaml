                  - text: "\t\t\tShowArray(ptr.first, 1, SYSTEM.VAL(Kernel.Type, SYSTEM.ADR(desc)), ptr, NIL, empty);\r\t\t\tout.WriteLn\r\t\tELSE ShowRecord(adr, 1, eltyp, NIL, empty)\r\t\tEND;\r\tEND ShowObject;\r\t\r\tPROCEDURE ShowPtrDeref (ref: RefView);\r\t\tVAR b: RefView; res: INTEGER; name: Kernel.Name;\r\tBEGIN\r\t\tShowSelector(ref); b := ref.back;\r\t\tIF b # NIL THEN\r\t\t\tout.WriteChar(\" \");\r\t\t\tStrings.Utf8ToString(b.name, name, res); InsertRefView(b.type, undo, b.adr, b.back, b.desc, b.ptr, name)\r\t\tEND;\r\t\tout.WriteLn; out.WriteLn;\r\t\tout.WriteChar(\"[\"); WriteHex(ref.adr); out.WriteChar(\"]\"); out.WriteTab;\r\t\tIF ref.desc = NIL THEN\r\t\t\tShowObject(ref.adr)\r\t\tELSIF FormOf(ref.desc) = 12X THEN\r\t\t\tShowArray(ref.adr, 1, ref.desc, ref.ptr, ref, empty)\r\t\tELSE\r\t\t\tShowRecord(ref.adr, 1, Kernel.TypeOf(SYSTEM.VAL(ANYPTR, ref.ptr)), ref, empty)\r\t\tEND;\r\t\tout.WriteLn\r\tEND ShowPtrDeref;\r\t\r\tPROCEDURE RefCh (VAR ref: INTEGER; VAR ch: SHORTCHAR);\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: SYSTEM.GET
                    attr: 3
                  - text: "(ref, ch); INC(ref)\r\tEND RefCh;\r\t\r\tPROCEDURE RefNum (VAR ref: INTEGER; VAR x: INTEGER);\r\t\tVAR s, n: INTEGER; ch: SHORTCHAR;\r\tBEGIN\r\t\ts := 0; n := 0; RefCh(ref, ch);\r\t\tWHILE ORD(ch) >= 128 DO INC(n, ASH(ORD(ch) - 128, s) ); INC(s, 7); RefCh(ref, ch) END;\r\t\tx := n + ASH(ORD(ch) MOD 64 - ORD(ch) DIV 64 * 64, s)\r\tEND RefNum;\r\t\r\tPROCEDURE RefName (VAR ref: INTEGER; VAR n: Kernel.Utf8Name);\r\t\tVAR i: INTEGER; ch: SHORTCHAR;\r\tBEGIN\r\t\ti := 0; RefCh(ref, ch);\r\t\tWHILE ch # 0X DO n[i] := ch; INC(i); RefCh(ref, ch) END;\r\t\tn[i] := 0X\r\tEND RefName;\r"
                    attr: 0
                  - text: "\t\r"
                    attr: 1
                  - text: "\tPROCEDURE Scan (VAR s: TextMappers.Scanner);\r\tBEGIN\r\t\ts.Scan;\r\t\tIF s.type = TextMappers.string THEN\r\t\t\tIF s.string = \"IMPORT\" THEN s.type := import\r\t\t\tELSIF s.string = \"MODULE\" THEN s.type := smodule\r\t\t\tELSIF s.string = \"THEN\" THEN s.type := stop\r\t\t\tELSIF s.string = \"OF\" THEN s.type := stop\r\t\t\tELSIF s.string = \"DO\" THEN s.type := stop\r\t\t\tELSIF s.string = \"END\" THEN s.type := stop\r\t\t\tELSIF s.string = \"ELSE\" THEN s.type := stop\r\t\t\tELSIF s.string = \"ELSIF\" THEN s.type := stop\r\t\t\tELSIF s.string = \"UNTIL\" THEN s.type := stop\r\t\t\tELSIF s.string = \"TO\" THEN s.type := stop\r\t\t\tELSIF s.string = \"BY\" THEN s.type := stop\r\t\t\tEND\r\t\tELSIF s.type = TextMappers.char THEN\r\t\t\tIF s.char = \";\" THEN s.type := semicolon\r\t\t\tELSIF s.char = \"|\" THEN s.type := stop\r\t\t\tELSIF s.char = \":\" THEN\r\t\t\t\tIF s.rider.char = \"=\" THEN s.rider.Read; s.type := becomes END\r\t\t\tELSIF s.char = \"(\" THEN\r\t\t\t\tIF s.rider.char = \"*\" THEN\r\t\t\t\t\ts.rider.Read;\r\t\t\t\t\tREPEAT Scan(s) UNTIL (s.type = TextMappers.eot) OR (s.type = comEnd);\r\t\t\t\t\tScan(s)\r\t\t\t\tEND\r\t\t\tELSIF s.char = \"*\" THEN\r\t\t\t\tIF s.rider.char = \")\" THEN s.rider.Read; s.type := comEnd END\r\t\t\tEND\r\t\tEND\t\r\tEND Scan;\r\t\r\tPROCEDURE ShowSourcePos (name: Kernel.Utf8Name; adr: INTEGER);\r\t\tVAR loc: Files.Locator; fname: Files.Name; v: Views.View; m: Models.Model; conv: Converters.Converter;\r\t\t\tc: Containers.Controller; beg, end, p: INTEGER; s: TextMappers.Scanner; w: Windows.Window;\r"
                    attr: 0
                  - text: "\t"
                    attr: 4
                  - text: "\t\tres: INTEGER; n: Kernel.Name;"
                    attr: 0
                  - text: "\r"
                    attr: 4
                  - text: "\tBEGIN\r\t\t"
                    attr: 0
                  - text: "(* search source by name heuristic *)"
                    attr: 1
                  - text: "\r\t\tStrings.Utf8ToString(name, n, res); StdDialog.GetSubLoc(n, \"Mod\", loc, fname);\r\t\tv := Views.OldView(loc, fname); m := NIL;\r\t\tIF v # NIL THEN\r\t\t\tViews.Open(v, loc, fname, NIL);\r\t\t\tm := v.ThisModel();\r\t\t\tIF ~(m IS TextModels.Model) THEN m := NIL END\r\t\tEND;\r\t\tIF m = NIL THEN\r\t\t\t"
                    attr: 0
                  - text: "(* search in open windows *)"
                    attr: 1
                  - text: "\r\t\t\tw := Windows.dir.First();\r\t\t\tWHILE (w # NIL) & (m = NIL) DO\r\t\t\t\tv := w.doc.ThisView();\r\t\t\t\tm := v.ThisModel();\r\t\t\t\tIF m # NIL THEN\r\t\t\t\t\tWITH m: TextModels.Model DO\r\t\t\t\t\t\ts.ConnectTo(m); s.SetPos(0);\r\t\t\t\t\t\tREPEAT\r\t\t\t\t\t\t\tREPEAT s.Scan UNTIL s.rider.eot OR (s.type = TextMappers.string) & (s.string = \"MODULE\");\r\t\t\t\t\t\t\ts.Scan;\r\t\t\t\t\t\tUNTIL s.rider.eot OR (s.type = TextMappers.string) & (s.string = n);\r\t\t\t\t\t\tIF ~s.rider.eot THEN Windows.dir.Select(w, Windows.eager)\r\t\t\t\t\t\tELSE m := NIL\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE m := NIL\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tw := Windows.dir.Next(w)\r\t\t\tEND\r\t\tEND;\r\t\tIF m = NIL THEN\r\t\t\t"
                    attr: 0
                  - text: "(* ask user for source file *)"
                    attr: 1
                  - text: "\r\t\t\tconv := NIL; v := Views.Old(Views.ask, loc, fname, conv);\r\t\t\tIF v # NIL THEN\r\t\t\t\tViews.Open(v, loc, fname, conv);\r\t\t\t\tm := v.ThisModel();\r\t\t\t\tIF ~(m IS TextModels.Model) THEN m := NIL END\r\t\t\tEND\r\t\tEND;\r\t\tIF m # NIL THEN\r\t\t\t"
                    attr: 0
                  - text: "(* mark error position in text *)"
                    attr: 1
                  - text: "\r\t\t\tWITH m: TextModels.Model DO\r\t\t\t\tbeg := Kernel.SourcePos(Kernel.ThisMod(n), adr);\r\t\t\t\tIF beg >= 0 THEN\r\t\t\t\t\tIF beg > m.Length() THEN beg := m.Length() - 10 END;\r\t\t\t\t\ts.ConnectTo(m); s.SetPos(beg);\r\t\t\t\t\tScan(s); beg := s.start; end := beg + 3;\r\t\t\t\t\tIF s.type = stop THEN end := s.Pos() - 1\r\t\t\t\t\tELSE\r\t\t\t\t\t\tWHILE (s.type # TextMappers.eot) & (s.type # stop) & (s.type # semicolon) DO\r\t\t\t\t\t\t\tend := s.Pos() - 1; Scan(s)\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND;\r\t\t\t\t\tc := v(TextViews.View).ThisController();\r\t\t\t\t\tv(TextViews.View).ShowRange(beg, end, TextViews.any);\r\t\t\t\t\tc(TextControllers.Controller).SetSelection(beg, end)\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE Dialog.ShowParamMsg(\"#Dev:SourcefileNotFound\", n, \"\", \"\")\r\t\tEND\r\tEND ShowSourcePos;\r\t\t\t\r"
                    attr: 0
                  - text: "\t(* -------------------  RefView ------------------- *)\r"
                    attr: 1
                  - text: "\t\r\tPROCEDURE (v: RefView) Internalize (VAR rd: Stores.Reader);\r\t\tVAR thisVersion: INTEGER;\r\tBEGIN\r\t\tv.Internalize^(rd); IF rd.cancelled THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\trd.ReadVersion(0, 0, thisVersion); IF rd.cancelled THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\tv.command := open;\r\t\trd.ReadSInt(v.type);\r\t\tIF v.type = source THEN\r\t\t\trd.ReadInt(v.adr);\r\t\t\trd.ReadSString(v.name)\r\t\tELSIF v.type = module THEN\r\t\t\trd.ReadSString(v.name)\r\t\tELSIF v.type # modules THEN\r\t\t\tv.type := 0\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (v: RefView) Externalize (VAR wr: Stores.Writer);\r\t\tVAR t: SHORTINT;\r\tBEGIN\r\t\tv.Externalize^(wr);\r\t\twr.WriteVersion(0);\r\t\tt := v.type;\r\t\tIF v.command # open THEN t := 0 END;\r\t\twr.WriteSInt(t);\r\t\tIF t = source THEN\r\t\t\twr.WriteInt(v.adr);\r\t\t\twr.WriteSString(v.name)\r\t\tELSIF t = module THEN\r\t\t\twr.WriteSString(v.name)\r\t\tEND\r\tEND Externalize;\r\r\tPROCEDURE (v: RefView) CopyFromSimpleView (source: Views.View);\r\tBEGIN\r\t\t(* v.CopyFrom^(source); *)\r\t\tWITH source: RefView DO\r\t\t\tv.type := source.type; v.command := source.command; v.adr := source.adr; v.back := source.back;\r\t\t\tv.desc := source.desc; v.ptr := source.ptr; v.name := source.name$;\r\t\tEND\r\tEND CopyFromSimpleView;\r\r\tPROCEDURE (v: RefView) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tf.DrawPath(path, 4, Ports.fill, Ports.blue, Ports.closedPoly)\r\tEND Restore;\r\t\r\tPROCEDURE (v: RefView) GetBackground (VAR color: Ports.Color);\r\tBEGIN\r\t\tcolor := Ports.background\r\tEND GetBackground;\r\r\tPROCEDURE (v: RefView) HandleCtrlMsg (f: Views.Frame; VAR msg: Controllers.Message; VAR focus: Views.View);\r\t\tVAR t, t0: TextModels.Model; m: Models.Model; x, y: INTEGER;\r\t\t\tisDown, new: BOOLEAN; mo: SET; script: Stores.Operation;\r\t\t\tres: INTEGER; n: Kernel.Name;\r\tBEGIN\r\t\tWITH msg: Controllers.TrackMsg DO\r\t\t\tIF v.type > 0 THEN\r\t\t\t\tREPEAT\r\t\t\t\t\tf.MarkRect(0, 0, refViewSize, refViewSize, Ports.fill, Ports.hilite, Ports.show);\r\t\t\t\t\tIF v.command = undo THEN Dialog.ShowStatus(\"#Dev:ShowPrecedingObject\")\r\t\t\t\t\tELSIF v.command = update THEN Dialog.ShowStatus(\"#Dev:UpdateWindow\")\r\t\t\t\t\tELSIF v.type = module THEN Dialog.ShowStatus(\"#Dev:ShowGlobalVariables\")\r\t\t\t\t\tELSIF v.type = source THEN Dialog.ShowStatus(\"#Dev:ShowSourcePosition\")\r\t\t\t\t\tELSIF v.type = heap THEN Dialog.ShowStatus(\"#Dev:ShowReferencedObject\")\r\t\t\t\t\tEND;\r\t\t\t\t\tREPEAT\r\t\t\t\t\t\tf.Input(x, y, mo, isDown)\r\t\t\t\t\tUNTIL (x < 0) OR (x > refViewSize) OR (y < 0) OR (y > refViewSize) OR ~isDown;\r\t\t\t\t\tf.MarkRect(0, 0, refViewSize, refViewSize, Ports.fill, Ports.hilite, Ports.hide);\r\t\t\t\t\tDialog.ShowStatus(\"\");\r\t\t\t\t\tWHILE isDown & ((x < 0) OR (x > refViewSize) OR (y < 0) OR (y > refViewSize)) DO\r\t\t\t\t\t\tf.Input(x, y, mo, isDown)\r\t\t\t\t\tEND\r\t\t\t\tUNTIL ~isDown;\r\t\t\t\tIF (x >= 0) & (x <= refViewSize) & (y >= 0) & (y <= refViewSize) THEN\r\t\t\t\t\tIF v.type = source THEN ShowSourcePos(v.name, v.adr)\r\t\t\t\t\tELSE\r\t\t\t\t\t\tm := v.context.ThisModel();\r\t\t\t\t\t\tnew := (v.command = open) & (v.back = NIL)\r\t\t\t\t\t\t\tOR (Controllers.modify IN msg.modifiers) & (v.command # update)\r\t\t\t\t\t\t\tOR ~(m IS TextModels.Model) ;\r\t\t\t\t\t\tIF new THEN\r\t\t\t\t\t\t\tt := TextModels.CloneOf(StdLog.buf); t0 := NIL\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tt0 := m(TextModels.Model); t := TextModels.CloneOf(t0);\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tout.ConnectTo(t);\r\t\t\t\t\t\tIF v.type = heap THEN  ShowPtrDeref(v)\r\t\t\t\t\t\tELSIF v.type = module THEN Strings.Utf8ToString(v.name, n, res); ShowGlobals(Kernel.ThisLoadedMod(n))\r\t\t\t\t\t\tELSIF v.type = modules THEN ShowModules\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tout.ConnectTo(NIL);\r\t\t\t\t\t\tIF new THEN\r\t\t\t\t\t\t\tOpenViewer(t, \"#Dev:Variables\", NewRuler())\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tModels.BeginScript(t0, \"#Dev:Change\", script);\r\t\t\t\t\t\t\tt0.Delete(0, t0.Length()); t0.Insert(0, t, 0, t.Length());\r\t\t\t\t\t\t\tModels.EndScript(t0, script)\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\t| msg: Controllers.PollCursorMsg DO\r\t\t\tmsg.cursor := Ports.refCursor\r\t\tELSE\r\t\tEND\r\tEND HandleCtrlMsg;\r\t\r\tPROCEDURE (v: RefView) HandlePropMsg (VAR msg: Properties.Message);\r\tBEGIN\r\t\tWITH msg: Properties.Preference DO\r\t\t\tWITH msg: Properties.ResizePref DO msg.fixed := TRUE\r\t\t\t| msg: Properties.SizePref DO msg.w := refViewSize; msg.h := refViewSize\r\t\t\t| msg: Properties.FocusPref DO msg.hotFocus := TRUE\r\t\t\tELSE\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\t\r\tPROCEDURE NewRefView (type, command: SHORTINT; adr: INTEGER; back: RefView;\r\t\t\t\t\t\t\t\t\t\t\t\tdesc: Kernel.Type; ptr: ArrayPtr; name: Kernel.Name): RefView;\r\t\tVAR v: RefView; res: INTEGER;"
                    attr: 0
                  - text: "\r\t"
                    attr: 4
                  - text: "BEGIN\r\t\tNEW(v); v.type := type; v.command := command; v.adr := adr; v.back := back;\r\t\tv.desc := desc; v.ptr := ptr; Strings.StringToUtf8(name, v.name, res);\r\t\t"
