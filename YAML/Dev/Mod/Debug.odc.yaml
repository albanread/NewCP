                    attr: 0
                  - text: UpdateModules
                    attr: 3
                  - text: "*;\r\t\tVAR t, t0: TextModels.Model; script: Stores.Operation;\r\tBEGIN\r\t\tt0 := TextViews.FocusText();\r\t\tModels.BeginScript(t0, \"#Dev:Change\", script);\r\t\tt := TextModels.CloneOf(t0);\r\t\tout.ConnectTo(t);\r\t\tShowModules;\r\t\t(*Stores.InitDomain(t, t0.domain);*) Stores.Join(t, t0);\t"
                    attr: 0
