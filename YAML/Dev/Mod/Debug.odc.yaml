                    attr: 0
                  - text: ShowHeapObject
                    attr: 3
                  - text: "* (adr: INTEGER; title: ARRAY OF CHAR);\r\tBEGIN\r\t\tout.ConnectTo(TextModels.CloneOf(StdLog.buf));\r\t\tIF title # \"\" THEN\r\t\t\tout.WriteString(title); out.WriteLn; out.WriteLn\r\t\tEND;\r\t\tout.WriteChar(\"[\"); WriteHex(adr); out.WriteChar(\"]\"); out.WriteTab;\r\t\tShowObject(adr);\r\t\tout.WriteLn;\r\t\tOpenViewer(out.rider.Base(), \"#Dev:HeapObject\", NewRuler());\r\t\tout.ConnectTo(NIL)\r\tEND ShowHeapObject;"
                    attr: 0
