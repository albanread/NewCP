                  - text: "\r\t\t\t\tDEC(a); DEC(c)\r\t\t\tELSE c := 0\r\t\t\tEND\r\t\tUNTIL c = 0\r\tEND ShowStack;\r\r\tPROCEDURE (a: Action) Do;\t"
