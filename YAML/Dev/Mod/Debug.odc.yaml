                    attr: 1
                  - text: "IF ptr = NIL THEN ptr := SYSTEM.VAL(ArrayPtr, ad - 8) END;\r\t\t\tShowArray(a, ind + 1, desc, ptr, back, tsel)\r\t\tELSE\r\t\t\tIF desc = NIL THEN desc := SYSTEM.VAL(Kernel.Type, ORD(f)) END;\r\t\t\tWriteName(desc, NIL); out.WriteTab;\r\t\t\tCASE f OF\r\t\t\t| 0X: (* SYSTEM.GET(a, vli); WriteHex(vli) *)\r\t\t\t| 1X: SYSTEM.GET(a, vc); \r\t\t\t\tIF vc = 0X THEN out.WriteString(\"FALSE\")\r\t\t\t\tELSIF vc = 1X THEN out.WriteString(\"TRUE\")\r\t\t\t\tELSE OutString(\"#Dev:Undefined\"); out.WriteInt(ORD(vc))\r\t\t\t\tEND\r\t\t\t| 2X: WriteString(a, 1, 1, FALSE, FALSE)\r\t\t\t| 3X: WriteString(a, 1, 2, FALSE, TRUE);\r\t\t\t\t\tSYSTEM.GET(a, vi);\r\t\t\t\t\tIF vi DIV 256 # 0 THEN out.WriteString(\"  \"); WriteString(a, 1, 2, FALSE, FALSE) END\r\t\t\t| 4X: SYSTEM.GET(a, vsi); out.WriteInt(vsi)\r\t\t\t| 5X: SYSTEM.GET(a, vi); out.WriteInt(vi)\r\t\t\t| 6X: SYSTEM.GET(a, vli); out.WriteInt(vli)\r\t\t\t| 7X: SYSTEM.GET(a, vli);\r\t\t\t\t\tIF BITS(vli) * {23..30} = {23..30} THEN\r\t\t\t\t\t\tIF BITS(vli) = {23..30} THEN out.WriteString(\"inf\")\r\t\t\t\t\t\tELSIF BITS(vli) = {23..31} THEN out.WriteString(\"-inf\")\r\t\t\t\t\t\tELSE out.WriteString(\"nan  (\"); WriteHex(vli); out.WriteString(\")\")\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE\r\t\t\t\t\t\tSYSTEM.GET(a, vr); out.WriteReal(vr)\r\t\t\t\t\tEND\r\t\t\t| 8X: IF Kernel.littleEndian THEN SYSTEM.GET(a, vli); SYSTEM.GET(a + 4, i)\r\t\t\t\t\tELSE SYSTEM.GET(a + 4, vli); SYSTEM.GET(a, i)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF BITS(i) * {20..30} = {20..30} THEN\r\t\t\t\t\t\tIF (BITS(i) = {20..30}) & (vli = 0) THEN out.WriteString(\"inf\")\r\t\t\t\t\t\tELSIF (BITS(i) = {20..31}) & (vli = 0) THEN out.WriteString(\"-inf\")\r\t\t\t\t\t\tELSE out.WriteString(\"nan  (\"); out.WriteIntForm(i, TextMappers.hexadecimal, 8, \"0\", TextMappers.hideBase);\r\t\t\t\t\t\t\tWriteHex(vli); out.WriteString(\")\")\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE\r\t\t\t\t\t\tSYSTEM.GET(a, vlr); out.WriteReal(vlr)\r\t\t\t\t\tEND\r\t\t\t| 9X: SYSTEM.GET(a, vs); out.WriteSet(vs)\r\t\t\t| 0AX: IF Kernel.littleEndian THEN SYSTEM.GET(a, vli); SYSTEM.GET(a + 4, i)\r\t\t\t\t\tELSE SYSTEM.GET(a + 4, vli); SYSTEM.GET(a, i)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF (vli >= 0) & (i = 0) OR (vli < 0) & (i = -1) THEN out.WriteInt(vli)\r\t\t\t\t\tELSE out.WriteIntForm(i, TextMappers.hexadecimal, 8, \"0\", TextMappers.hideBase); WriteHex(vli)\r\t\t\t\t\tEND\r\t\t\t| 0CX, 0DX, 13X, 20X: ShowPointer(a, f, desc, back, tsel)\r\t\t\t| 0EX, 10X: ShowProcVar(a)\r\t\t\t| 0FX: WriteString(a, 256, 1, TRUE, FALSE)\r\t\t\t| 21X: WriteGuid(a)\r\t\t\t| 22X: SYSTEM.GET(a, vli); WriteHex(vli)\r\t\t\tELSE \r\t\t\tEND\r\t\tEND\r\tEND ShowVar;\r\t\r\tPROCEDURE WriteTimeStamp (ts: ARRAY OF SHORTINT);\r\t\tVAR d: Dates.Date; t: Dates.Time; str: ARRAY 64 OF CHAR;\r\tBEGIN\r\t\tIF ts[0] = 0 THEN\r\t\t\tout.WriteString(\"      \"); OutString(\"#Dev:Linked\")\r\t\tELSE\r\t\t\td.year := ts[0]; d.month := ts[1]; d.day := ts[2];\r\t\t\tt.hour := ts[3]; t.minute := ts[4]; t.second := ts[5];\r\t\t\tDates.DateToString(d, Dates.short, str);\r\t\t\tout.WriteString(str); out.WriteString(\"  \");\r\t\t\tDates.TimeToString(t, str);\r\t\t\tout.WriteString(str); \r\t\tEND\r\tEND WriteTimeStamp;\r\r\tPROCEDURE ShowModules;\r\t\tVAR m, m1: Kernel.Module; a0: TextModels.Attributes; n, h, t, h1: Kernel.Name; res: INTEGER;\r\tBEGIN\t\r\t\ta0 := out.rider.attr;\r\t\tout.rider.SetAttr(TextModels.NewStyle(a0, {Fonts.italic}));\r\t\tOutString(\"#Dev:ModuleName\"); out.WriteTab;\r\t\tOutString(\"#Dev:BytesUsed\"); out.WriteTab;\r\t\tOutString(\"#Dev:Clients\"); out.WriteTab;\r\t\tOutString(\"#Dev:Compiled\"); out.WriteTab;\r\t\tOutString(\"#Dev:Loaded\");\r\t\tout.rider.SetAttr(a0); out.WriteTab; out.WriteTab;\r\t\tout.rider.SetAttr(TextModels.NewStyle(out.rider.attr, {Fonts.underline}));\r\t\tout.rider.SetAttr(TextModels.NewColor(out.rider.attr, Ports.blue));\r\t\tout.WriteView(StdLinks.dir.NewLink(\"DevDebug.UpdateModules\"));\r\t\tOutString(\"#Dev:Update\");\r\t\tout.WriteView(StdLinks.dir.NewLink(\"\"));\r\t\tout.rider.SetAttr(a0); out.WriteLn;\r\t\tm := Kernel.modList;\r\t\tWHILE m # NIL DO\r\t\t\tIF m.refcnt >= 0 THEN\r\t\t\t\tStrings.Utf8ToString(m.name, n, res); Kernel.SplitName(n, h, t);\r\t\t\t\tm1 := Kernel.modList; h1 := \"*\";\r\t\t\t\tWHILE (m1 # m) & (h1 # h) DO\r\t\t\t\t\tIF m1.refcnt >= 0 THEN Strings.Utf8ToString(m1.name, n, res); Kernel.SplitName(n, h1, t) END;\r\t\t\t\t\tm1 := m1.next\r\t\t\t\tEND;\r\t\t\t\tIF h1 # h THEN\r\t\t\t\t\tout.WriteLn;\r\t\t\t\t\tm1 := m;\r\t\t\t\t\tWHILE m1 # NIL DO\r\t\t\t\t\t\tStrings.Utf8ToString(m1.name, n, res); Kernel.SplitName(n, h1, t);\r\t\t\t\t\t\tIF (h1 = h) & (m1.refcnt >= 0) THEN\r\t\t\t\t\t\t\tout.WriteString(n); out.WriteTab;\r\t\t\t\t\t\t\tout.WriteIntForm(m1.csize + m1.dsize + m1.rsize, 10, 6, TextModels.digitspace, TextMappers.hideBase);\r\t\t\t\t\t\t\tout.WriteTab;\r\t\t\t\t\t\t\tout.WriteIntForm(m1.refcnt, 10, 3, TextModels.digitspace, TextMappers.hideBase);\r\t\t\t\t\t\t\tout.WriteTab;\r\t\t\t\t\t\t\tWriteTimeStamp(m1.compTime);\r\t\t\t\t\t\t\tout.WriteTab;\r\t\t\t\t\t\t\tWriteTimeStamp(m1.loadTime);\r\t\t\t\t\t\t\tout.WriteLn\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tm1 := m1.next\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tm := m.next\r\t\tEND\r\tEND ShowModules;\r\t\r\tPROCEDURE ShowGlobals (mod: Kernel.Module);\r\t\tVAR ref, x: INTEGER; m, f: SHORTCHAR; name: ARRAY 256 OF CHAR; modName, mname: Kernel.Name; \r\t\t\td: Kernel.Type; v: RefView; a0: TextModels.Attributes; res: INTEGER; nn: Kernel.Utf8Name;\r\tBEGIN\r\t\tIF mod # NIL THEN\r\t\t\tKernel.GetModName(mod, modName); out.WriteString(modName);\r\t\t\tout.WriteTab; out.WriteTab; out.WriteTab;\r\t\t\ta0 := out.rider.attr;\r\t\t\tout.rider.SetAttr(TextModels.NewStyle(out.rider.attr, {Fonts.underline}));\r\t\t\tout.rider.SetAttr(TextModels.NewColor(out.rider.attr, Ports.blue));\r\t\t\tKernel.GetModName(mod, modName); name := \"DevDebug.UpdateGlobals('\" + modName + \"')\";\r\t\t\tout.WriteView(StdLinks.dir.NewLink(name));\r\t\t\tOutString(\"#Dev:Update\");\r\t\t\tout.WriteView(StdLinks.dir.NewLink(\"\"));\r\t\t\tout.rider.SetAttr(a0); out.WriteLn;\r\t\t\tref := mod.refs; Kernel.GetRefProc(ref, x, nn); Strings.Utf8ToString(nn, mname, res);\t"
