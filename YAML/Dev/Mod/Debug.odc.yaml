                  - text: "\tPROCEDURE "
                    attr: 0
                  - text: ShowViewState
                    attr: 3
                  - text: "*;\r\t\tVAR ops: Controllers.PollOpsMsg;\r\tBEGIN\r\t\tControllers.PollOps(ops);\r\t\tIF ops.singleton # NIL THEN\r\t\t\tShowHeapObject(SYSTEM.VAL(INTEGER, ops.singleton), \"\")\r\t\tEND\r\tEND ShowViewState;\r\t\r\t\r\tPROCEDURE UnloadMod (name: TextMappers.String; VAR ok: BOOLEAN);\r\t\tVAR mod: Kernel.Module; str: Dialog.String;\r\tBEGIN\r\t\tmod := Kernel.ThisLoadedMod(name);\r\t\tIF mod # NIL THEN\r\t\t\tDialog.ShowParamStatus(\"#Dev:Unloading\", name, \"\", \"\");\r\t\t\tKernel.UnloadMod(mod);\r\t\t\tIF mod.refcnt < 0 THEN\r\t\t\t\tDialog.MapParamString(\"#Dev:Unloaded\", name, \"\", \"\", str);\r\t\t\t\tStdLog.String(str); StdLog.Ln\r\t\t\tELSE\r\t\t\t\tDialog.ShowParamMsg(\"#Dev:UnloadingFailed\", name, \"\", \"\");\r\t\t\t\tok := FALSE\r\t\t\tEND\r\t\tELSE\r\t\t\tDialog.ShowParamMsg(\"#Dev:NotFound\", name, \"\", \"\");\r\t\t\tok := FALSE;\r\t\tEND\r\tEND UnloadMod;\r\t\r\tPROCEDURE "
                    attr: 0
