                    attr: 0
                  - text: UpdateGlobals
                    attr: 3
                  - text: "* (name: ARRAY OF CHAR);\r\t\tVAR t, t0: TextModels.Model; script: Stores.Operation; mod: Kernel.Module;\r\tBEGIN\r\t\tmod := Kernel.ThisLoadedMod(name);\r\t\tIF mod # NIL THEN\r\t\t\tt0 := TextViews.FocusText();\r\t\t\tModels.BeginScript(t0, \"#Dev:Change\", script);\r\t\t\tt := TextModels.CloneOf(t0);\r\t\t\tout.ConnectTo(t);\r\t\t\tShowGlobals(mod);\r\t\t\t(*Stores.InitDomain(t, t0.domain);*) Stores.Join(t, t0);\t"
