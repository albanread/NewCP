                  - text: "(* delayed trap window open *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tKernel.SetTrapGuard(TRUE);\r\t\tOpenViewer(a.text, \"#Dev:Trap\", NewRuler());\r\t\tKernel.SetTrapGuard(FALSE);\r\tEND Do;\r\t\r\tPROCEDURE GetTrapMsg(OUT msg: ARRAY OF CHAR);\r\t\tVAR ref, end, a: INTEGER; mod: Kernel.Module; modName, name: Kernel.Name; res: INTEGER; nn: Kernel.Utf8Name; \r\t\t\thead, tail, errstr: ARRAY 32 OF CHAR;\r\t\t\tkey: ARRAY 128 OF CHAR;\r\tBEGIN\r\t\ta := Kernel.pc; mod := Kernel.modList;\r\t\tWHILE (mod # NIL) & ((a < mod.code) OR (a >= mod.code + mod.csize)) DO mod := mod.next END;\r\t\tIF mod # NIL THEN\r\t\t\tDEC(a, mod.code); ref := mod.refs;\r\t\t\tREPEAT Kernel.GetRefProc(ref, end, nn) UNTIL (end = 0) OR (a < end);\r\t\t\tStrings.Utf8ToString(nn, name, res);\r\t\t\tIF a < end THEN\r\t\t\t\tKernel.GetModName(mod, modName); Kernel.SplitName (modName, head, tail);\r\t\t\t\tIF head = \"\" THEN head := \"System\" END;\r\t\t\t\tStrings.IntToString(Kernel.err, errstr);\r\t\t\t\tkey := tail + \".\" + name + \".\" + errstr;\r\t\t\t\tDialog.MapString(\"#\" + head + \":\" + key, msg);\r\t\t\t\t(* IF key # msg THEN out.WriteString(\" \" + msg) END; *)\r\t\t\t\tIF key = msg THEN msg := \"\" END;\r\t\t\tEND\r\t\tEND\r\tEND GetTrapMsg;\r\r\tPROCEDURE Trap;\r\t\tVAR a0: TextModels.Attributes; prop: Properties.StdProp; action: Action;\r\t\t \tmsg: ARRAY 512 OF CHAR;\r\tBEGIN\r\t\tout.ConnectTo(TextModels.CloneOf(StdLog.buf));\r\t\ta0 := out.rider.attr;\r\t\tout.rider.SetAttr(TextModels.NewWeight(a0, Fonts.bold));\r\t\tIF Kernel.err = 129 THEN out.WriteString(\"invalid WITH\")\r\t\tELSIF Kernel.err = 130 THEN out.WriteString(\"invalid CASE\")\r\t\tELSIF Kernel.err = 131 THEN out.WriteString(\"function without RETURN\")\r\t\tELSIF Kernel.err = 132 THEN out.WriteString(\"type guard\")\r\t\tELSIF Kernel.err = 133 THEN out.WriteString(\"implied type guard\")\r\t\tELSIF Kernel.err = 134 THEN out.WriteString(\"value out of range\")\r\t\tELSIF Kernel.err = 135 THEN out.WriteString(\"index out of range\")\r\t\tELSIF Kernel.err = 136 THEN out.WriteString(\"string too long\")\r\t\tELSIF Kernel.err = 137 THEN out.WriteString(\"stack overflow\")\r\t\tELSIF Kernel.err = 138 THEN out.WriteString(\"integer overflow\")\r\t\tELSIF Kernel.err = 139 THEN out.WriteString(\"division by zero\")\r\t\tELSIF Kernel.err = 140 THEN out.WriteString(\"infinite real result\")\r\t\tELSIF Kernel.err = 141 THEN out.WriteString(\"real underflow\")\r\t\tELSIF Kernel.err = 142 THEN out.WriteString(\"real overflow\")\r\t\tELSIF Kernel.err = 143 THEN\r\t\t\tout.WriteString(\"undefined real result  (\");\r\t\t\tout.WriteIntForm(Kernel.val MOD 10000H, TextMappers.hexadecimal, 4, \"0\", TextMappers.hideBase); out.WriteString(\", \");\r\t\t\tout.WriteIntForm(Kernel.val DIV 10000H, TextMappers.hexadecimal, 3, \"0\", TextMappers.hideBase); out.WriteChar(\")\")\r\t\tELSIF Kernel.err = 144 THEN out.WriteString(\"not a number\")\r\t\tELSIF Kernel.err = 200 THEN out.WriteString(\"keyboard interrupt\")\r\t\tELSIF Kernel.err = 201 THEN\r\t\t\tout.WriteString(\"NIL dereference\")\r\t\tELSIF Kernel.err = 202 THEN\r\t\t\tout.WriteString(\"illegal instruction: \");\r\t\t\tout.WriteIntForm(Kernel.val, TextMappers.hexadecimal, 5, \"0\", TextMappers.showBase)\r\t\tELSIF Kernel.err = 203 THEN\r\t\t\tIF (Kernel.val >= -4) & (Kernel.val < 65536) THEN out.WriteString(\"NIL dereference (read)\")\r\t\t\tELSE out.WriteString(\"illegal memory read (ad = \"); WriteHex(Kernel.val); out.WriteChar(\")\")\r\t\t\tEND\r\t\tELSIF Kernel.err = 204 THEN\r\t\t\tIF (Kernel.val >= -4) & (Kernel.val < 65536) THEN out.WriteString(\"NIL dereference (write)\")\r\t\t\tELSE out.WriteString(\"illegal memory write (ad = \"); WriteHex(Kernel.val); out.WriteChar(\")\")\r\t\t\tEND\r\t\tELSIF Kernel.err = 205 THEN\r\t\t\tIF (Kernel.val >= -4) & (Kernel.val < 65536) THEN out.WriteString(\"NIL procedure call\")\r\t\t\tELSE out.WriteString(\"illegal execution (ad = \"); WriteHex(Kernel.val); out.WriteChar(\")\")\r\t\t\tEND\r\t\tELSIF Kernel.err = 257 THEN out.WriteString(\"out of memory\")\r\t\tELSIF Kernel.err = 10001H THEN out.WriteString(\"bus error\")\r\t\tELSIF Kernel.err = 10002H THEN out.WriteString(\"address error\")\r\t\tELSIF Kernel.err = 10007H THEN out.WriteString(\"fpu error\")\r\t\tELSIF Kernel.err < 0 THEN\r\t\t\tout.WriteString(\"Exception \"); out.WriteIntForm(-Kernel.err, TextMappers.hexadecimal, 3, \"0\", TextMappers.showBase)\r\t\tELSE\r\t\t\tout.WriteString(\"TRAP \"); out.WriteInt(Kernel.err);\r\t\t\tIF Kernel.err = 126 THEN out.WriteString(\"  (not yet implemented)\")\r\t\t\tELSIF Kernel.err = 125 THEN out.WriteString(\"  (call of obsolete procedure)\")\r\t\t\tELSIF Kernel.err >= 100 THEN out.WriteString(\"  (invariant violated)\")\r\t\t\tELSIF Kernel.err >= 60 THEN out.WriteString(\"  (postcondition violated)\")\r\t\t\tELSIF Kernel.err >= 20 THEN out.WriteString(\"  (precondition violated)\")\r\t\t\tEND\r\t\tEND;\r\t\tGetTrapMsg(msg);\r\t\tIF msg # \"\" THEN out.WriteLn; out.WriteString(msg) END;\r\r\t\tout.WriteLn; out.rider.SetAttr(a0);\r\t\tout.WriteLn; ShowStack;\r\t\tNEW(action); action.text := out.rider.Base();\r\t\tServices.DoLater(action, Services.now);\r\t\tout.ConnectTo(NIL)\r\tEND Trap;\r\rBEGIN\r\tKernel.InstallTrapViewer(Trap);\r\tempty := \"\";\r\tpath[0].x := refViewSize DIV 2; path[0].y := 0;\r\tpath[1].x := refViewSize; path[1].y := refViewSize DIV 2;\r\tpath[2].x := refViewSize DIV 2; path[2].y := refViewSize;\r\tpath[3].x := 0; path[3].y := refViewSize DIV 2\rEND DevDebug.\r"
