                  - text: "\r\tPROCEDURE GetMod (VAR mod: Kernel.Module);\r\t\tVAR c: TextControllers.Controller; s: TextMappers.Scanner; beg, end: INTEGER; res: INTEGER; n: Kernel.Utf8Name;\r\tBEGIN\r\t\tmod := NIL;\r\t\tc := TextControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tc.GetSelection(beg, end);\r\t\t\ts.ConnectTo(c.text); s.SetPos(beg); s.Scan;\r\t\t\tIF s.type = TextMappers.string THEN\r"
                    attr: 0
                  - text: "\t\t\t\t"
                    attr: 4
                  - text: "Strings.StringToUtf8(s.string, n, res); mod := Kernel.ThisMod(n$);\r\t\t\t\tIF mod = NIL THEN\r\t\t\t\t\tDialog.ShowParamMsg(\"#Dev:ModuleNotFound\", s.string, \"\", \"\")\r\t\t\t\tEND\t\t\t\t\r\t\t\tELSE Dialog.ShowMsg(\"#Dev:NoModuleNameSelected\")\r\t\t\tEND\r\t\tELSE Dialog.ShowMsg(\"#Dev:NoSelectionFound\")\r\t\tEND\r\tEND GetMod;\r\r\tPROCEDURE "
                    attr: 0
