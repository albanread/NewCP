                  - text: "*;\r\t\tVAR t: TextModels.Model; s: TextMappers.Scanner; ok: BOOLEAN;\r\tBEGIN\r\t\tt := TextViews.FocusText();\r\t\tIF t # NIL THEN\r\t\t\ts.ConnectTo(t); s.SetPos(0);\r\t\t\tREPEAT Scan(s) UNTIL (s.type = smodule) OR s.rider.eot;\r\t\t\tIF (s.type = smodule) THEN\r\t\t\t\tScan(s);\r\t\t\t\tIF (s.type = TextMappers.string) & IsIdent(s.string) THEN\r\t\t\t\t\tok := TRUE; UnloadMod(s.string, ok);\r\t\t\t\t\tIF ok THEN Dialog.ShowStatus(\"#Dev:Ok\") END;\r\t\t\t\t\tControls.Relink\r\t\t\t\tELSE\r\t\t\t\t\tDialog.ShowMsg(\"#Dev:NoModNameFound\");\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tDialog.ShowMsg(\"#Dev:NoModNameFound\");\r\t\t\tEND\r\t\tEND\r\tEND Unload;\r\t\r\tPROCEDURE UnloadList(beg, end: INTEGER; text: TextModels.Model);\r\t\tVAR s: TextMappers.Scanner; res: INTEGER; ok, num: BOOLEAN; linked: ARRAY 16 OF CHAR;\r\tBEGIN\r\t\ts.ConnectTo(text); s.SetPos(beg); s.Scan; ok := TRUE; num := FALSE;\r\t\tWHILE (s.start < end) & (s.type # TextMappers.invalid) DO\r\t\t\tDialog.MapString(\"#Dev:Linked\", linked);\r\t\t\tIF (s.type = TextMappers.string) & (s.string # linked) THEN\r\t\t\t\tIF num & ((s.string = \"AM\") OR (s.string = \"PM\")) THEN s.Scan "
