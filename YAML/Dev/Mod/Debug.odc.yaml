                    attr: 3
                  - text: " v\r\tEND NewRefView;\r\r\tPROCEDURE InsertRefView (type, command: SHORTINT; adr: INTEGER; back: RefView;\r\t\t\t\t\t\t\t\t\t\t\t\tdesc: Kernel.Type; ptr: ArrayPtr; name: Kernel.Name);\r\t\tVAR v: RefView; a0: TextModels.Attributes;\r\tBEGIN\r\t\tv := NewRefView(type, command, adr, back, desc, ptr, name);\r\t\ta0 := out.rider.attr;\r\t\tout.rider.SetAttr(TextModels.NewOffset(a0, Ports.point));\r\t\tout.WriteView(v);\r\t\tout.rider.SetAttr(a0)\r\tEND InsertRefView;\r\t\r\tPROCEDURE "
