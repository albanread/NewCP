                  - text: "\r"
                    attr: 0
                  - text: "\t(* !!! HostPackedFiles depends on the way files are packed into the exe file by DevPacker. !!!! *)\r"
                    attr: 3
                  - text: "\r\tIMPORT\r\t"
                    attr: 0
                  - text: "\t"
                    attr: 3
                  - text: "Kernel, Services, Strings, Files, Dialog, Stores, Views, HostFiles, HostPackedFiles,\r\t\tTextModels, TextViews, TextMappers, StdLog, DevCommanders;\r\r\tCONST\r\t\tchunksize = 65536;\r\t\tversion = 1; (* "
                    attr: 0
                  - text: same as in HostPackedFiles
                    attr: 1
                  - text: " *)\r\r\tTYPE\r\t\tFileList = POINTER TO RECORD\r\t\t\tpath, name: Files.Name;\r\t\t\taliasPath, aliasName: Files.Name;\r\t\t\tadr, len: INTEGER;\r\t\t\tyear, month, day, hour, minute, second: INTEGER;\r\t\t\tnext: FileList\r\t\tEND;\r\r\tPROCEDURE Diff (VAR a, b: ARRAY OF CHAR; caseSens: BOOLEAN): INTEGER;\r\t\tVAR i: INTEGER; cha, chb: CHAR;\r\tBEGIN\r\t\ti := 0;\r\t\tREPEAT\r\t\t\tcha := a[i]; chb := b[i]; INC(i);\r\t\t\tIF cha # chb THEN\r\t\t\t\tIF ~caseSens THEN\r\t\t\t\t\tcha := Strings.Upper(cha);\r\t\t\t\t\tchb := Strings.Upper(chb);\r\t\t\t\tEND;\r\t\t\t\tIF cha = \"\\\" THEN cha := \"/\" END;\r\t\t\t\tIF chb = \"\\\" THEN chb := \"/\" END;\r\t\t\t\tIF cha # chb THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " ORD(cha) - ORD(chb) END\r\t\t\tEND\r\t\tUNTIL cha = 0X;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " 0\r\tEND Diff;\r\r\tPROCEDURE SplitName (IN name: Files.Name; OUT path, fname: Files.Name);\r\t\tVAR i, l, sp: INTEGER;\r\tBEGIN\r\t\tpath := \"\"; fname := \"\";\r\t\tl := LEN(name$);\r\t\ti := 0; sp := -1;\r\t\tWHILE i < l DO\r\t\t\tpath[i] := name[i];\r\t\t\tIF (name[i] = \"\\\") OR (name[i] = \"/\") THEN sp := i END;\r\t\t\tINC(i)\r\t\tEND;\r\t\tIF sp < 0 THEN\r\t\t\tfname := name; path := \"\"\r\t\tELSE\r\t\t\tpath[sp] := 0X;\r\t\t\ti := 0; INC(sp);\r\t\t\tWHILE name[sp] # 0X DO fname[i] := name[sp]; INC(sp); INC(i) END;\r\t\t\tfname[i] := 0X\r\t\tEND\r\tEND SplitName;\r\r\tPROCEDURE PackExe(files: FileList; exe: Files.File);\r\t\tVAR tableadr, tot, err, ok, i, dl: INTEGER; l: FileList;\r\t\t\twr: Files.Writer; sw: Stores.Writer;\r\t\t\tbytes: ARRAY chunksize OF BYTE;\r\t\t\tloc: Files.Locator; f: Files.File; r: Files.Reader; shared: BOOLEAN;\r\t\t\tnum: ARRAY 7 OF CHAR;\r\tBEGIN\r\t\ttot := 0; err := 0; ok := 0;\r\t\tl := files; wr := exe.NewWriter(NIL);\r\t\tDialog.ShowStatus('Packing...');\r\t\tWHILE l # NIL DO\r\t\t\tStdLog.String(\"Packing file: \" + l.path + '/' + l.name); StdLog.Ln;\r\t\t\tINC(tot);\r\t\t\tloc := Files.dir.This(l.path); shared := FALSE;\r\t\t\tf := Files.dir.Old(loc, l.name, shared);\r\t\t\tIF f = NIL THEN shared := TRUE; f := Files.dir.Old(loc, l.name, shared) END;\r\t\t\tIF f # NIL THEN\r\t\t\t\tl.len := f.Length();\r\t\t\t\tl.adr := exe.Length();\r\t\t\t\tIF Services.Is(f, \"HostFiles.File\") THEN\r\t\t\t\t\t(* "
                    attr: 0
                  - text: If HostFiles.File is exported this can be replaced by an explicit type guard
                    attr: 1
                  - text: "*)\r\t\t\t\t\tHostFiles.GetModDate(f, l.year, l.month, l.day, l.hour, l.minute, l.second)\r\t\t\t\tELSIF Services.Is(f, \"HostPackedFiles.File\") THEN\r\t\t\t\t\t(* "
                    attr: 0
                  - text: could also be replaced by an explicit type guard
                    attr: 1
                  - text: "*)\r\t\t\t\t\tHostPackedFiles.GetModDate(f, l.year, l.month, l.day, l.hour, l.minute, l.second)\r\t\t\t\tELSE\r\t\t\t\t\tl.year := 0; l.month := 0; l.day := 0; l.hour := 0; l.minute := 0; l.second := 0\r\t\t\t\tEND;\r\t\t\t\tr := f.NewReader(NIL); r.SetPos(0);\r\t\t\t\twr.SetPos(l.adr);\r\t\t\t\ti := 0; dl := MIN(chunksize, l.len);\r\t\t\t\tWHILE dl > 0 DO\r\t\t\t\t\tr.ReadBytes(bytes, 0, dl);\r\t\t\t\t\twr.WriteBytes(bytes, 0, dl); exe.Flush;\r\t\t\t\t\tINC(i); dl := MIN(chunksize, l.len - i * chunksize)\r\t\t\t\tEND;\r\t\t\t\tIF ~shared THEN f.Close END;\r\t\t\t\tINC(ok);\r\t\t\t\tKernel.Collect\r\t\t\tELSE\r\t\t\t\tStdLog.String(\"Could not read file: \" + l.path + '/' + l.name); StdLog.Ln; INC(err)\r\t\t\tEND;\r\t\t\tl := l.next\r\t\tEND;\r\t\tl := files; tableadr := exe.Length();\r\t\tsw.ConnectTo(exe); sw.SetPos(tableadr);\r\t\tsw.WriteInt(tot);\r\t\tWHILE l # NIL DO\r\t\t\tsw.WriteString(l.aliasPath); sw.WriteString(l.aliasName);\r\t\t\tsw.WriteInt(l.adr); sw.WriteInt(l.len);\r\t\t\tsw.WriteInt(l.year); sw.WriteInt(l.month); sw.WriteInt(l.day);\r\t\t\tsw.WriteInt(l.hour); sw.WriteInt(l.minute); sw.WriteInt(l.second);\r\t\t\tl := l.next\r\t\tEND;\r\t\tsw.WriteInt(HostPackedFiles.packTag);\r\t\tsw.WriteInt(version);\r\t\tsw.WriteInt(tableadr);\r\t\tIF err > 0 THEN\r\t\t\tStrings.IntToString(err, num);\r\t\t\tDialog.ShowMsg(\"Pack failed for: \" + num + \" files.\");\r\t\t\tDialog.ShowStatus(\"failed\")\r\t\tELSE\r\t\t\tStdLog.String(\"Packed files: \"); StdLog.Int(ok); StdLog.Ln;\r\t\t\tDialog.ShowStatus(\"ok\")\r\t\tEND\r\tEND PackExe;\r\r\tPROCEDURE RecAdd(path: Files.Name; VAR files: FileList; VAR tot: INTEGER);\r\t\tVAR loc: Files.Locator; fi: Files.FileInfo; li: Files.LocInfo; l: FileList;\r\tBEGIN\r\t\tloc := Files.dir.This(path); fi := Files.dir.FileList(loc);\r\t\tWHILE fi # NIL DO\r\t\t\tNEW(l); l.path := path$; l.name := fi.name;\r\t\t\tl.next := files; files := l; INC(tot);\r\t\t\tfi := fi.next\r\t\tEND;\r\t\tli := Files.dir.LocList(loc);\r\t\tWHILE li # NIL DO\r\t\t\tIF path = \"\" THEN RecAdd(li.name, files, tot) ELSE RecAdd(path + '/' + li.name, files, tot) END;\r\t\t\tli := li.next\r\t\tEND\r\tEND RecAdd;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ListFromSub
                    attr: 3
                  - text: "* (sdir: ARRAY OF CHAR);\r\t\tCONST colPerRow = 3;\r\t\tVAR tot, col: INTEGER; files: FileList; t: TextModels.Model; f: TextMappers.Formatter; tv: TextViews.View;\r\t\t\tname: Files.Name;\r\tBEGIN\r\t\tStdLog.String(\"Examining subdirectory: \" + sdir); StdLog.Ln;\r\t\tfiles := NIL; tot := 0;\r\t\tRecAdd(sdir$, files, tot);\r\t\tIF files # NIL THEN\r\t\t\tt := TextModels.dir.New(); f.ConnectTo(t); f.SetPos(0);\r\t\t\tf.WriteView(DevCommanders.dir.New()); f.WriteString(' DevPacker.PackThis exefilename.exe :='); f.WriteLn;\r\t\t\tcol := 0;\r\t\t\tWHILE files # NIL DO\r\t\t\t\tIF files.path # \"\" THEN name := '\"' + files.path + '/' ELSE name := '\"' END;\r\t\t\t\tname := name + files.name + '\"';\r\t\t\t\tIF files.next # NIL THEN name := name + ' ' END;\r\t\t\t\tf.WriteString(name);\r\t\t\t\tINC(col); IF col >= colPerRow THEN f.WriteLn; col := 0 END; (* To avoid long lines *)\r\t\t\t\tfiles := files.next\r\t\t\tEND;\r\t\t\tf.WriteView(DevCommanders.dir.NewEnd()); f.WriteLn;\r\t\t\ttv := TextViews.dir.New(t);\r\t\t\tViews.OpenView(tv)\r\t\tEND;\r\t\tStdLog.String(\"Found \"); StdLog.Int(tot); StdLog.String(\" files.\"); StdLog.Ln\r\tEND ListFromSub;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ListLoadedModules
                    attr: 3
                  - text: "*;\r\t\tVAR\r\t\t\tt: TextModels.Model; f: TextMappers.Formatter; tv: TextViews.View;\r\t\t\tpath, name: Files.Name; m: Kernel.Module; modName: Kernel.Name;\r\tBEGIN\r\t\tt := TextModels.dir.New(); f.ConnectTo(t); f.SetPos(0);\r\t\tf.WriteView(DevCommanders.dir.New()); f.WriteString(' DevPacker.PackThis exefilename.exe :='); f.WriteLn;\r\t\tm := Kernel.modList;\r\t\tWHILE m # NIL DO\r\t\t\tKernel.GetModName(m, modName); Kernel.SplitName(modName, path, name);\r\t\t\tIF path = \"\" THEN path := 'System' END;\r\t\t\tpath := path + '/Code/';\r\t\t\tf.WriteString(path + name + '.ocf ');\r\t\t\tm := m.next\r\t\tEND;\r\t\tf.WriteView(DevCommanders.dir.NewEnd()); f.WriteLn;\r\t\ttv := TextViews.dir.New(t);\r\t\tViews.OpenView(tv)\r\tEND ListLoadedModules;\r\r\tPROCEDURE FilesOk(files: FileList; exeloc: Files.Locator; IN exefile: Files.Name): BOOLEAN;\r\t\tVAR l: FileList; loc: Files.Locator; fi: Files.FileInfo; ret: BOOLEAN;\r\t\t\terr, tot: INTEGER;\r\tBEGIN\r\t\tStdLog.String(\"Validating files...\"); StdLog.Ln;\r\t\tIF files = NIL THEN StdLog.String(\"No files to pack.\"); StdLog.Ln; "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE END;\r\t\tl := files; ret := TRUE; err := 0; tot := 0;\r\t\tWHILE l # NIL DO\r\t\t\tloc := Files.dir.This(l.path);\r\t\t\tIF loc # NIL THEN\r\t\t\t\tfi := Files.dir.FileList(loc);\r\t\t\t\tWHILE (fi # NIL) & (Diff(l.name, fi.name, FALSE) # 0) DO fi := fi.next END\r\t\t\tEND;\r\t\t\tIF (loc = NIL) OR (fi = NIL) THEN\r\t\t\t\tIF l.path # \"\" THEN StdLog.String(l.path + \"/\") END;\r\t\t\t\tStdLog.String(l.name);\r\t\t\t\tStdLog.String(\" ...not found\"); ret := FALSE; INC(err);\r\t\t\t\tStdLog.Ln\r\t\t\tELSIF Files.dir.SameFile(exeloc, exefile, loc, fi.name) THEN\r\t\t\t\tStdLog.String(\r\t\t\t\t\t'Cannot pack a file into itself. (' + l.name + ' cannot be both the target exe and included in the list)');\r\t\t\t\tStdLog.Ln; ret := FALSE; INC(err)\r\t\t\tEND;\r\t\t\tINC(tot); l := l.next\r\t\tEND;\r\t\tIF err > 0 THEN\r\t\t\tStdLog.Int(err); StdLog.String(\" files of\"); StdLog.Int(tot); StdLog.String(\" not correct.\");\r\t\t\tDialog.ShowStatus(\"failed\")\r\t\tELSE\r\t\t\tStdLog.String(\"All\"); StdLog.Int(tot); StdLog.String(\" files found.\")\r\t\tEND;\r\t\tStdLog.Ln;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " ret\r\tEND FilesOk;\r\r\t(* "
                    attr: 0
                  - text: "Parse the file list "
                    attr: 1
                  - text: "*)\r\r\tPROCEDURE GetCh (rd: TextModels.Reader);\r\tBEGIN\r\t\tREPEAT rd.Read UNTIL rd.char # TextModels.viewcode\r\tEND GetCh;\r\r\tPROCEDURE RemoveWhiteSpaces (rd: TextModels.Reader; end: INTEGER);\r\tBEGIN\r\t\tWHILE ~rd.eot & (rd.Pos() <= end) & (rd.char <= 20X) DO GetCh(rd) END\r\tEND RemoveWhiteSpaces;\r\r\tPROCEDURE FileName (rd: TextModels.Reader; end: INTEGER;\r\t\tOUT name: ARRAY OF CHAR; OUT ok: BOOLEAN\r\t);\r\t\tVAR i: INTEGER; dquote, squote: BOOLEAN;\r\r\t\tPROCEDURE ValidChar(ch: CHAR): BOOLEAN;\r\t\tBEGIN\r\t\t\tIF dquote THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " ch # '\"'\r\t\t\tELSIF squote THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " ch # \"'\"\r\t\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " ch > 20X\r\t\t\tEND\r\t\tEND ValidChar;\r\r\tBEGIN\r\t\tok := TRUE;\r\t\tRemoveWhiteSpaces(rd, end);\r\t\ti := 0; dquote := FALSE; squote := FALSE;\r\t\tIF rd.char = '\"' THEN dquote := TRUE\r\t\tELSIF rd.char = \"'\" THEN squote := TRUE\r\t\tEND;\r\t\tIF dquote OR squote THEN GetCh(rd) END;\r\t\tWHILE (rd.Pos() <= end) & ValidChar(rd.char) DO\r\t\t\tname[i] := rd.char;\r\t\t\tINC(i);\r\t\t\tGetCh(rd)\r\t\tEND;\r\t\tname[i] := 0X;\r\t\tIF dquote THEN ok := rd.char = '\"'; rd.Read END;\r\t\tIF squote THEN ok := rd.char = \"'\"; rd.Read END\r\tEND FileName;\r\r\tPROCEDURE GetNextFileName (rd: TextModels.Reader; end: INTEGER; VAR file: FileList; OUT ok: BOOLEAN);\r\t\tVAR name: Files.Name;\r\tBEGIN\r\t\tFileName(rd, end, name, ok);\r\t\tSplitName(name, file.path, file.name);\r\t\tRemoveWhiteSpaces(rd, end);\r\t\tIF ok & (rd.char = \"=\") THEN\r\t\t\tGetCh(rd);\r\t\t\tIF rd.char = \">\" THEN\r\t\t\t\tGetCh(rd);\r\t\t\t\tFileName(rd, end, name, ok);\r\t\t\t\tIF name # \"\" THEN\r\t\t\t\t\tSplitName(name, file.aliasPath, file.aliasName)\r\t\t\t\tELSE\r\t\t\t\t\tok := FALSE\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tok := FALSE\r\t\t\tEND\r\t\tELSE\r\t\t\tfile.aliasPath := file.path; file.aliasName := file.name\r\t\tEND\r\tEND GetNextFileName;\r\r\tPROCEDURE ParseExe (rd: TextModels.Reader; end: INTEGER;\r\t\tOUT exepath, exefile: Files.Name; OUT ok: BOOLEAN\r\t);\r\t\tVAR name: Files.Name;\r\tBEGIN\r\t\tok := FALSE;\r\t\tGetCh(rd);\r\t\tFileName(rd, end, name, ok);\r\t\tIF ok THEN\r\t\t\tSplitName(name, exepath, exefile);\r\t\t\tRemoveWhiteSpaces(rd, end);\r\t\t\tIF ok & (rd.char = \":\") THEN\r\t\t\t\tGetCh(rd);\r\t\t\t\tIF rd.char = \"=\" THEN\r\t\t\t\t\tGetCh(rd);\r\t\t\t\t\tok := TRUE\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND ParseExe;\r\r\tPROCEDURE AlreadyPacked (f: Files.File): BOOLEAN;\r\t\tVAR rd: Stores.Reader; int: INTEGER;\r\tBEGIN\r\t\trd.ConnectTo(f);\r\t\trd.SetPos(f.Length() - 12);\r\t\trd.ReadInt(int);\r\t\trd.ConnectTo(NIL);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " int = HostPackedFiles.packTag\r\tEND AlreadyPacked;\r\r\tPROCEDURE "
                    attr: 0
                  - text: PackThis
                    attr: 3
                  - text: "*;\r\t\tVAR rd: TextModels.Reader; end, diff: INTEGER; exepath, exefile: Files.Name; ok: BOOLEAN;\r\t\t\tfiles, l, tf, last: FileList; f: Files.File; loc: Files.Locator;\r\tBEGIN\r\t\tStdLog.String(\"Sorting file list...\"); StdLog.Ln;\r\t\trd := DevCommanders.par.text.NewReader(NIL);\r\t\trd.SetPos(DevCommanders.par.beg);\r\t\tend := DevCommanders.par.end;\r\t\tParseExe(rd, end, exepath, exefile, ok);\r\t\tIF ~ok THEN\r\t\t\tStdLog.String(\"exe file not correctly specified\"); StdLog.Ln\r\t\tELSE\r\t\t\tfiles := NIL; NEW(l);\r\t\t\tGetNextFileName(rd, end, l, ok);\r\t\t\tWHILE ok & (l.name # \"\") DO\r\t\t\t\tIF files = NIL THEN\r\t\t\t\t\tfiles := l\r\t\t\t\tELSE\r\t\t\t\t\ttf := files; last := NIL;\r\t\t\t\t\tdiff := Diff(l.aliasPath, tf.aliasPath, FALSE);\r\t\t\t\t\tWHILE (tf # NIL) & (diff < 0) DO\r\t\t\t\t\t\tlast := tf; tf := tf.next;\r\t\t\t\t\t\tIF tf # NIL THEN diff := Diff(l.aliasPath, tf.aliasPath, FALSE) END\r\t\t\t\t\tEND;\r\t\t\t\t\tIF (tf = NIL) OR (diff > 0) THEN\r\t\t\t\t\t\tIF last = NIL THEN\r\t\t\t\t\t\t\tl.next := files; files := l\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tl.next := last.next; last.next := l\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE\r\t\t\t\t\t\tdiff := Diff(l.aliasName, tf.aliasName, FALSE);\r\t\t\t\t\t\tWHILE (tf # NIL) & (diff < 0) & (Diff(l.aliasPath, tf.aliasPath, FALSE) = 0) DO\r\t\t\t\t\t\t\tlast := tf; tf := tf.next;\r\t\t\t\t\t\t\tIF tf # NIL THEN diff := Diff(l.aliasName, tf.aliasName, FALSE) END\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF (diff = 0) & (Diff(l.aliasPath, tf.aliasPath, FALSE) = 0) THEN\r\t\t\t\t\t\t\tStdLog.String(\"File \" + l.path + \"/\" + l.name + \" appears more than once in the list.\"); StdLog.Ln\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tIF last = NIL THEN\r\t\t\t\t\t\t\t\tl.next := files; files := l\r\t\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\t\tl.next := last.next; last.next := l\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tNEW(l);\r\t\t\t\tGetNextFileName(rd, end, l, ok)\r\t\t\tEND;\r\t\t\tloc := Files.dir.This(exepath$)\r\t\tEND;\r\t\tIF ok & FilesOk(files, loc, exefile) THEN\r\t\t\tf := Files.dir.Old(loc, exefile$, Files.exclusive);\r\t\t\tIF f # NIL THEN\r\t\t\t\tIF ~AlreadyPacked(f) THEN\r\t\t\t\t\tStdLog.String(\"Packing files to exe...\"); StdLog.Ln;\r\t\t\t\t\tPackExe(files, f);\r\t\t\t\t\tf.Flush; f.Close;\r\t\t\t\t\tStdLog.String(\"Done.\"); StdLog.Ln\r\t\t\t\tELSE\r\t\t\t\t\tf.Flush; f.Close;\r\t\t\t\t\tIF exepath # \"\" THEN exepath := exepath + \"/\" END;\r\t\t\t\t\tStdLog.String(\r\t\t\t\t\t\t\"Executable (\" + exepath + exefile + \") already contains packed files. Link a new executable.\");\r\t\t\t\t\tStdLog.Ln;\r\t\t\t\t\tDialog.ShowMsg(\"failed\")\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tIF exepath # \"\" THEN exepath := exepath + \"/\" END;\r\t\t\t\tStdLog.String(\"Could not open exe file: \" + exepath + exefile); StdLog.Ln;\r\t\t\t\tDialog.ShowStatus(\"failed\")\r\t\t\tEND\r\t\tELSE\r\t\t\tStdLog.String(\"Packing canceled.\"); StdLog.Ln;\r\t\t\tDialog.ShowStatus(\"failed\")\r\t\tEND\r\tEND PackThis;\r\rEND DevPacker.\r\r"
