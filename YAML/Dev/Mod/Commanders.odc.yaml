                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT\r\t\tKernel, Strings, Fonts, Ports, Stores, Models, Views, Controllers, Properties, Dialog, Controls,\r\t\tTextModels, TextSetters, TextMappers, Services, StdLog;\r\r\tCONST\r\t\t"
                    attr: 0
                  - text: "(* additional Scan types *)"
                    attr: 1
                  - text: "\r\t\tident = 19; qualident = 20;"
                    attr: 0
                  - text: " "
                    attr: 1
                  - text: "execMark = 21;\r\r\t\tpoint = Ports.point;\r\r\t\tminVersion = 0; maxVersion = 0; maxStdVersion = 0;\r\r\r\tTYPE\r\t\t"
                    attr: 0
                  - text: View
                    attr: 3
                  - text: "* = POINTER TO ABSTRACT RECORD (Views.View)\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: EndView
                    attr: 3
                  - text: "* = POINTER TO ABSTRACT RECORD (Views.View)\r\t\tEND;\r\r\t\t"
                    attr: 0
                  - text: Par
                    attr: 3
                  - text: "* = POINTER TO RECORD\r\t\t\ttext*: TextModels.Model;\r\t\t\tbeg*, end*: INTEGER\r\t\tEND;\r\r\t\t"
                    attr: 0
                  - text: Directory
                    attr: 3
                  - text: "* = POINTER TO ABSTRACT RECORD END;\r\r\r\t\tStdView = POINTER TO RECORD (View) END;\r\t\tStdEndView = POINTER TO RECORD (EndView) END;\r\r\t\tStdDirectory = POINTER TO RECORD (Directory) END;\r\r\t\tScanner = RECORD\r\t\t\ts: TextMappers.Scanner;\r\t\t\tident: ARRAY LEN(Kernel.Name) OF CHAR;\r\t\t\tqualident: ARRAY LEN(Kernel.Name) * 2 - 1 OF CHAR\r\t\tEND;\r\t\t\r\t\tTrapCleaner = POINTER TO RECORD (Kernel.TrapCleaner) END;\r\r\tVAR\r\t\t"
                    attr: 0
                  - text: par
                    attr: 3
                  - text: "*: Par;\r\t\t"
                    attr: 0
                  - text: dir
                    attr: 3
                  - text: "-, "
                    attr: 0
                  - text: stdDir
                    attr: 3
                  - text: "-: Directory;\r\t\t\r\t\tcleaner: TrapCleaner;\r\t\tcleanerInstalled: BOOLEAN;\r\r\r\t"
                    attr: 0
                  - text: "(** Cleaner **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (c: TrapCleaner) Cleanup;\r\tBEGIN\r\t\tpar := NIL;\r\t\tcleanerInstalled := FALSE;\r\tEND Cleanup;\r\t\r\t"
                    attr: 0
                  - text: "(** View **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (v: View) "
                    attr: 0
                  - text: Externalize
                    attr: 3
                  - text: "- (VAR wr: Stores.Writer), EXTENSIBLE;\r\tBEGIN\r\t\tv.Externalize^(wr);\r\t\twr.WriteVersion(maxVersion);\r\t\twr.WriteXInt(execMark)\r\tEND Externalize;\r\r\tPROCEDURE (v: View) "
                    attr: 0
                  - text: Internalize
                    attr: 3
                  - text: "- (VAR rd: Stores.Reader), EXTENSIBLE;\r\t\tVAR thisVersion, type: INTEGER;\r\tBEGIN\r\t\tv.Internalize^(rd);\r\t\tIF rd.cancelled THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\trd.ReadVersion(minVersion, maxVersion, thisVersion);\r\t\tIF rd.cancelled THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\trd.ReadXInt(type)\r\tEND Internalize;\r\r\r\t"
                    attr: 0
                  - text: "(** Directory **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (d: Directory) "
                    attr: 0
                  - text: New
                    attr: 3
                  - text: "* (): View, NEW, ABSTRACT;\r\tPROCEDURE (d: Directory) "
                    attr: 0
                  - text: NewEnd
                    attr: 3
                  - text: "* (): EndView, NEW, ABSTRACT;\r\r\r\t"
                    attr: 0
                  - text: "(* auxilliary procedures *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE IsIdent (IN s: ARRAY OF CHAR): BOOLEAN;\r\t\tVAR i: INTEGER; ch: CHAR;\r\tBEGIN\r\t\tch := s[0]; i := 1;\r\t\tIF Strings.IsIdentStart(ch) THEN\r\t\t\tREPEAT\r\t\t\t\tch := s[i]; INC(i)\r\t\t\tUNTIL ~Strings.IsIdent(ch);\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " (ch = 0X) & (i <= LEN(Kernel.Name))\r\t\tELSE\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE\r\t\tEND\r\tEND IsIdent;\r\r\tPROCEDURE Scan (VAR s: Scanner);\r\t\tVAR done: BOOLEAN;\r\tBEGIN\r\t\ts.s.Scan;\r\t\tIF (s.s.type = TextMappers.view) THEN\r\t\t\tIF Properties.ThisType(s.s.view, \"DevCommanders.View\") # NIL THEN s.s.type := execMark END\r\t\tELSIF (s.s.type = TextMappers.string) & TextMappers.IsQualIdent(s.s.string) THEN\r\t\t\ts.s.type := qualident; s.qualident := s.s.string$\r\t\tELSIF (s.s.type = TextMappers.string) & IsIdent(s.s.string) THEN\r\t\t\ts.ident := s.s.string$;\r\t\t\tTextMappers.ScanQualIdent(s.s, s.qualident, done);\r\t\t\tIF done THEN s.s.type := qualident ELSE s.s.type := ident END\r\t\tEND\r\tEND Scan;\r\r\tPROCEDURE GetParExtend (r: TextModels.Reader; VAR end: INTEGER);\r\t\tVAR v: Views.View;\r\tBEGIN\r\t\tIF r.view # NIL THEN v := r.view ELSE r.ReadView(v) END;\r\t\tWHILE ~r.eot \r\t\t\t\t& (Properties.ThisType(v, \"DevCommanders.View\") = NIL) \r\t\t\t\t& (Properties.ThisType(v, \"DevCommanders.EndView\") = NIL)  DO\r\t\t\tr.ReadView(v)\r\t\tEND;\r\t\tend := r.Pos(); IF ~r.eot THEN DEC(end) END\r\tEND GetParExtend;\r\r\tPROCEDURE Unload (IN cmd: Dialog.String);\r\t\tVAR modname: Kernel.Name; str: Dialog.String; i: INTEGER; ch: CHAR; mod: Kernel.Module;\r\tBEGIN\r\t\ti := 0; ch := cmd[0];\r\t\tWHILE (ch # 0X) & (ch # \".\") DO modname[i] := ch; INC(i); ch := cmd[i] END;\r\t\tmodname[i] := 0X;\r\t\tmod := Kernel.ThisLoadedMod(modname);\r\t\tIF mod # NIL THEN\r\t\t\tKernel.UnloadMod(mod);\r\t\t\tIF mod.refcnt < 0 THEN\r\t\t\t\tDialog.MapParamString(\"#Dev:Unloaded\", modname, \"\", \"\", str);\r\t\t\t\tStdLog.String(str); StdLog.Ln;\r\t\t\t\tControls.Relink\r\t\t\tELSE\r\t\t\t\tDialog.ShowParamMsg(\"#Dev:UnloadingFailed\", modname, \"\", \"\")\r\t\t\tEND\r\t\tEND\r\tEND Unload;\r\r\tPROCEDURE Execute (t: TextModels.Model; pos: INTEGER; VAR end: INTEGER; unload: BOOLEAN);\r\t\tVAR s: Scanner; beg, res: INTEGER; cmd: Dialog.String;\r\tBEGIN\r\t\tend := t.Length();\r\t\ts.s.ConnectTo(t); s.s.SetPos(pos); s.s.SetOpts({TextMappers.returnViews});\r\t\tScan(s); ASSERT(s.s.type = execMark, 100);\r\t\tScan(s);\r\t\tIF s.s.type IN {qualident, TextMappers.string} THEN\r\t\t\tbeg := s.s.Pos(); IF ~s.s.rider.eot THEN DEC(beg) END; GetParExtend(s.s.rider, end);\r\t\t\tASSERT(~cleanerInstalled, 101);\r\t\t\tKernel.PushTrapCleaner(cleaner); cleanerInstalled := TRUE;\r\t\t\tNEW(par); par.text := t; par.beg := beg; par.end := end;\r\t\t\tIF s.s.type = qualident THEN cmd := s.qualident$ ELSE cmd := s.s.string$ END;\r\t\t\tIF unload THEN Unload(cmd) END;\r\t\t\tDialog.Call(cmd, \" \",  res);\r\t\t\tpar := NIL;\r\t\t\tKernel.PopTrapCleaner(cleaner); cleanerInstalled := FALSE;\r\t\tEND\r\tEND Execute;\r\r\tPROCEDURE Track (v: View; f: Views.Frame; x, y: INTEGER; buttons: SET);\r\t\tVAR c: Models.Context; w, h, end: INTEGER; isDown, in, in0: BOOLEAN; m: SET;\r\tBEGIN\r\t\tc := v.context; c.GetSize(w, h); in0 := FALSE; in := TRUE;\r\t\tREPEAT\r\t\t\tIF in # in0 THEN\r\t\t\t\tf.MarkRect(0, 0, w, h, Ports.fill, Ports.invert, Ports.show); in0 := in\r\t\t\tEND;\r\t\t\tf.Input(x, y, m, isDown);\r\t\t\tin := (0 <= x) & (x < w) & (0 <= y) & (y < h)\r\t\tUNTIL ~isDown;\r\t\tIF in0 THEN\r\t\t\tf.MarkRect(0, 0, w, h, Ports.fill, Ports.invert, Ports.hide);\r\t\t\tWITH c:TextModels.Context DO\r\t\t\t\tExecute(c.ThisModel(), c.Pos(), end,Controllers.modify IN buttons)\r\t\t\tELSE Dialog.Beep\r\t\t\tEND\r\t\tEND\r\tEND Track;\r\r\t"
                    attr: 0
                  - text: "(* StdView *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (v: StdView) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\tv.Externalize^(wr);\r\t\twr.WriteVersion(maxStdVersion)\r\tEND Externalize;\r\r\tPROCEDURE (v: StdView) Internalize (VAR rd: Stores.Reader);\r\t\tVAR thisVersion: INTEGER;\r\tBEGIN\r\t\tv.Internalize^(rd);\r\t\tIF rd.cancelled THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\trd.ReadVersion(minVersion, maxStdVersion, thisVersion)\r\tEND Internalize;\r\r\tPROCEDURE (v: StdView) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tCONST u = point;\r\t\tVAR c: Models.Context; a: TextModels.Attributes; font: Fonts.Font; color: Ports.Color;\r\t\t\tsize, d, w, asc, dsc, fw: INTEGER; s: ARRAY 2 OF CHAR;\r\tBEGIN\r\t\tASSERT(v.context # NIL, 20);\r\t\tc := v.context;\r\t\tWITH c: TextModels.Context DO a := c.Attr(); font := a.font; color := a.color\r\t\tELSE font := Fonts.dir.Default(); color := Ports.defaultColor\r\t\tEND;\r\t\tfont.GetBounds(asc, dsc, fw);\r\t\tsize := asc + dsc; d := size DIV 2;\r\t\tf.DrawOval(u, 0, u + size, size, Ports.fill, color);\r\t\ts := \"!\";\r\t\tw := font.StringWidth(s);\r\t\tf.DrawString(u + d - w DIV 2, size - dsc, Ports.background, s, font)\r\tEND Restore;\r\r\tPROCEDURE (v: StdView) HandleCtrlMsg (f: Views.Frame; VAR msg: Controllers.Message;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\tBEGIN\r\t\tWITH msg: Controllers.TrackMsg DO\r\t\t\tTrack(v, f, msg.x, msg.y, msg.modifiers)\r\t\t| msg: Controllers.PollCursorMsg DO\r\t\t\tmsg.cursor := Ports.refCursor\r\t\tELSE\r\t\tEND\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE (v: StdView) HandlePropMsg (VAR msg: Properties.Message);\r\t\tVAR c: Models.Context; a: TextModels.Attributes; font: Fonts.Font; asc, dsc, fw: INTEGER;\r\tBEGIN\r\t\tWITH msg: Properties.Preference DO\r\t\t\tWITH msg: Properties.SizePref DO\r\t\t\t\tc := v.context;\r\t\t\t\tIF (c # NIL) & (c IS TextModels.Context) THEN\r\t\t\t\t\ta := c(TextModels.Context).Attr(); font := a.font\r\t\t\t\tELSE font := Fonts.dir.Default()\r\t\t\t\tEND;\r\t\t\t\tfont.GetBounds(asc, dsc, fw);\r\t\t\t\tmsg.h := asc + dsc; msg.w := msg.h + 2 * point\r\t\t\t| msg: Properties.ResizePref DO\r\t\t\t\tmsg.fixed := TRUE\r\t\t\t| msg: Properties.FocusPref DO\r\t\t\t\tmsg.hotFocus := TRUE\r\t\t\t| msg: TextSetters.Pref DO\r\t\t\t\tc := v.context;\r\t\t\t\tIF (c # NIL) & (c IS TextModels.Context) THEN\r\t\t\t\t\ta := c(TextModels.Context).Attr(); font := a.font\r\t\t\t\tELSE font := Fonts.dir.Default()\r\t\t\t\tEND;\r\t\t\t\tfont.GetBounds(asc, msg.dsc, fw)\r\t\t\t| msg: Properties.TypePref DO\r\t\t\t\tIF Services.Is(v, msg.type) THEN msg.view := v END\r\t\t\tELSE\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\t\r\t\r"
                    attr: 0
                  - text: "\t(* StdEndView *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (v: StdEndView) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tCONST u = point;\r\t\tVAR c: Models.Context; a: TextModels.Attributes; font: Fonts.Font; color: Ports.Color;\r\t\t\tsize, asc, dsc, fw: INTEGER;\r\t\t\tpoints: ARRAY 3 OF Ports.Point;\r\tBEGIN\r\t\tASSERT(v.context # NIL, 20);\r\t\tc := v.context;\r\t\tWITH c: TextModels.Context DO a := c.Attr(); font := a.font; color := a.color\r\t\tELSE font := Fonts.dir.Default(); color := Ports.defaultColor\r\t\tEND;\r\t\tfont.GetBounds(asc, dsc, fw);\r\t\tsize := asc + dsc;\r\t\tpoints[0].x := 0; points[0].y := size;\r\t\tpoints[1].x := u + (size DIV 2); points[1].y := size DIV 2;\r\t\tpoints[2].x := u + (size DIV 2); points[2].y := size;     \r\t\tf.DrawPath(points, 3, Ports.fill, color, Ports.closedPoly)\r\tEND Restore;\r\t\r\tPROCEDURE (v: StdEndView) HandlePropMsg (VAR msg: Properties.Message);\r\t\tVAR c: Models.Context; a: TextModels.Attributes; font: Fonts.Font; asc, dsc, fw: INTEGER;\r\tBEGIN\r\t\tWITH msg: Properties.Preference DO\r\t\t\tWITH msg: Properties.SizePref DO\r\t\t\t\tc := v.context;\r\t\t\t\tIF (c # NIL) & (c IS TextModels.Context) THEN\r\t\t\t\t\ta := c(TextModels.Context).Attr(); font := a.font\r\t\t\t\tELSE font := Fonts.dir.Default()\r\t\t\t\tEND;\r\t\t\t\tfont.GetBounds(asc, dsc, fw);\r\t\t\t\tmsg.h := asc + dsc; msg.w := (msg.h + 2 * point) DIV 2\r\t\t\t| msg: Properties.ResizePref DO\r\t\t\t\tmsg.fixed := TRUE\r\t\t\t| msg: Properties.FocusPref DO\r\t\t\t\tmsg.hotFocus := TRUE\r\t\t\t| msg: TextSetters.Pref DO\r\t\t\t\tc := v.context;\r\t\t\t\tIF (c # NIL) & (c IS TextModels.Context) THEN\r\t\t\t\t\ta := c(TextModels.Context).Attr(); font := a.font\r\t\t\t\tELSE font := Fonts.dir.Default()\r\t\t\t\tEND;\r\t\t\t\tfont.GetBounds(asc, msg.dsc, fw)\r\t\t\t| msg: Properties.TypePref DO\r\t\t\t\tIF Services.Is(v, msg.type) THEN msg.view := v END\r\t\t\tELSE\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\r\t"
