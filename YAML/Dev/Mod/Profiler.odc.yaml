                  - text: "\r**)\r\r"
                    attr: 1
                  - text: "\tIMPORT\r\t\tWinApi, WinMM,\r\t\tKernel, Strings"
                    attr: 0
                  - text: ","
                    attr: 3
                  - text: " Dialog, Fonts, Ports, Views,\r\t\tTextModels, TextRulers, TextViews, TextControllers, TextMappers, StdLog;\r\t\r\tCONST\r\t\tmaxMod = 256;\r\t\t\r\tTYPE\r\t\tModule = RECORD\r\t\t\tstart, end: INTEGER;\t"
                    attr: 0
                  - text: "(* address range *)"
                    attr: 1
                  - text: "\r\t\t\tfirst, last: INTEGER;\t"
                    attr: 0
                  - text: "(* procedures *)"
                    attr: 1
                  - text: "\r\t\t\tmod: Kernel.Module;\r\t\t\tcount: INTEGER;\r\t\tEND;\r\t\t\r\t\tProc = POINTER TO RECORD\r\t\t\tname: Kernel.Utf8Name;\r\t\t\tp: INTEGER;\r\t\t\tnext: Proc\r\t\tEND;\r\t\t\r\tVAR\r\t\tmod: ARRAY maxMod OF Module;\r\t\tpEnd, pCount: POINTER TO ARRAY OF INTEGER;\r\t\tnumMod, numProc, listLen: INTEGER;\r\t\totherCount, totalCount: INTEGER;\r\t\tout: TextMappers.Formatter;\r\t\tstarted: BOOLEAN;\r\t\t\r"
                    attr: 0
                  - text: "\t(* ------------- non-portable part ------------ *)\r\t\r"
                    attr: 1
                  - text: "\tVAR id, periode: INTEGER;\r\t\r\tPROCEDURE^ Count (pc: INTEGER);\r\t\r\tPROCEDURE Recorder (id, msg, user, dw1, dw2: INTEGER);"
                    attr: 0
                  - text: "\r\t\t"
                    attr: 1
                  - text: "VAR res: INTEGER; context: WinApi.CONTEXT;\r\tBEGIN\r\t\tcontext.ContextFlags := WinApi.CONTEXT_CONTROL;\r\t\tres := WinApi.GetThreadContext(user, context);\r\t\tCount(context.Eip)\t"
                    attr: 0
                  - text: "(* current pc of main thread *)"
                    attr: 1
                  - text: "\r\tEND Recorder;\r\t\r\tPROCEDURE StartRecording;\r\t\t"
                    attr: 0
                  - text: "(* Start calling Count periodically by an interrupt handler *)"
                    attr: 1
                  - text: "\r\t\tVAR res: INTEGER; main: WinApi.HANDLE; tc: WinMM.TIMECAPS;\r\tBEGIN\r\t\tres := WinApi.DuplicateHandle(WinApi.GetCurrentProcess(), WinApi.GetCurrentThread(),\r\t\t\t\t\tWinApi.GetCurrentProcess(), main, {1, 3, 4, 16..19}, 0, {});\r\t\tres := WinMM.timeGetDevCaps(tc, SIZE(WinMM.TIMECAPS));\r\t\tperiode := tc.wPeriodMin * 3;\r\t\tres := WinMM.timeBeginPeriod(periode);\r\t\tid := WinMM.timeSetEvent(periode, 0, Recorder, main, WinMM.TIME_PERIODIC);\r\t\tASSERT(id # 0, 100)\r\tEND StartRecording;\r\t\r\tPROCEDURE StopRecording;\r"
                    attr: 0
                  - text: "\t\t(* stop calling Count *)\r\t\t"
                    attr: 1
                  - text: "VAR res: INTEGER;"
                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\tBEGIN\r\t\tres := WinMM.timeKillEvent(id);\r\t\tres := WinMM.timeEndPeriod(periode)\r\tEND StopRecording;\r\t\r\tPROCEDURE Init;\r\tBEGIN\r\tEND Init;\r\t\r"
                    attr: 0
                  - text: "\t(* ------------- portable part ------------- *)\r\r"
                    attr: 1
                  - text: "\tPROCEDURE Count (pc: INTEGER);\r\t\tVAR l, r, m: INTEGER;\r\tBEGIN\r\t\tl := 0; r := numMod;\r\t\tWHILE l < r DO\t"
                    attr: 0
                  - text: "(* binary search on modules *)\r\t\t"
                    attr: 1
                  - text: "\tm := (l + r) DIV 2;\r\t\t\tIF pc >= mod[m].end THEN l := m + 1 ELSE r := m END\r\t\tEND;\r\t\tIF (r < numMod) & (pc >= mod[r].start) & (pc < mod[r].end) THEN\r\t\t\tINC(mod[r].count); INC(totalCount);\r\t\t\tl := mod[r].first; r := mod[r].last + 1;\r\t\t\tWHILE l < r DO\t"
                    attr: 0
                  - text: "(* binary search on procedures *)\r\t\t"
                    attr: 1
                  - text: "\t\tm := (l + r) DIV 2;\r\t\t\t\tIF pc >= pEnd[m] THEN l := m + 1 ELSE r := m END\r\t\t\tEND;\r\t\t\tINC(pCount[r])\r\t\tELSE INC(otherCount)\r\t\tEND\r\tEND Count;\r\t\r\t\r\t"
                    attr: 0
                  - text: "(* ---------- programming interface ---------- *)\r\t\r"
                    attr: 1
                  - text: "\tPROCEDURE InsertModule (m: Kernel.Module; VAR done: BOOLEAN);\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\tIF (m # NIL) & (numMod < maxMod) THEN\r\t\t\ti := numMod; INC(numMod);\r\t\t\tWHILE (i > 0) & (m.code < mod[i-1].mod.code) DO mod[i] := mod[i-1]; DEC(i) END;\r\t\t\tmod[i].mod := m;\r\t\t\tdone := TRUE\r\t\tELSE\r\t\t\tdone := FALSE\r\t\tEND\r\tEND InsertModule;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Start
                    attr: 4
                  - text: "*;\r\t\tVAR ref, end, i, j: INTEGER; n: Kernel.Utf8Name; m: Kernel.Module; ok: BOOLEAN;\r\tBEGIN\r\t\tIF ~started THEN\r\t\t\tIF listLen = 0 THEN\t(* all modules *)\r\t\t\t\tm := Kernel.modList;\r\t\t\t\tWHILE m # NIL DO\r\t\t\t\t\tIF m.refcnt >= 0 THEN InsertModule(m, ok) END;\r\t\t\t\t\tm := m.next\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\totherCount := 0; totalCount := 0; numProc := 0; i := 0;\r\t\t\tWHILE i < numMod DO\r\t\t\t\tm := mod[i].mod;\r\t\t\t\tmod[i].start := m.code;\r\t\t\t\tmod[i].first := numProc;\r\t\t\t\tref := m.refs;\r\t\t\t\tKernel.GetRefProc(ref, end, n);\r\t\t\t\tWHILE end # 0 DO INC(numProc); Kernel.GetRefProc(ref, end, n) END;\r\t\t\t\tmod[i].last := numProc - 1;\r\t\t\t\tINC(i)\r\t\t\tEND;\r\t\t\tNEW(pEnd, numProc);\r\t\t\tNEW(pCount, numProc);\r\t\t\ti := 0; j := 0;\r\t\t\tWHILE i < numMod DO\r\t\t\t\tm := mod[i].mod; ref := m.refs;\r\t\t\t\tKernel.GetRefProc(ref, end, n);\r\t\t\t\tWHILE end # 0 DO\r\t\t\t\t\tpEnd[j] := m.code + end; pCount[j] := 0; INC(j);\r\t\t\t\t\tKernel.GetRefProc(ref, end, n)\r\t\t\t\tEND;\r\t\t\t\tmod[i].end := pEnd[mod[i].last];\r\t\t\t\tmod[i].count := 0;\r\t\t\t\tINC(i)\r\t\t\tEND;\r\t\t\tIF numMod > 0 THEN StartRecording END;\r\t\t\tstarted := TRUE\r\t\tEND\r\tEND Start;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Stop
                    attr: 4
                  - text: "*;\r\tBEGIN\r\t\tIF started THEN\r\t\t\tStopRecording;\r\t\t\tstarted := FALSE\r\t\tEND\r\tEND Stop;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Reset
                    attr: 4
                  - text: "*;\r\tBEGIN\r\t\tStop;\r\t\tnumMod := 0; numProc := 0; listLen := 0;\r\t\tpEnd := NIL; pCount := NIL\r\tEND Reset;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: SetModuleList
                    attr: 4
                  - text: "* (list: ARRAY OF CHAR);\r\t\tVAR i, j: INTEGER; name: ARRAY 256 OF CHAR; ch: CHAR; done: BOOLEAN;\r\tBEGIN\r\t\tStop;\r\t\tReset;\r\t\ti := 0;\r\t\tch := list[i];\r\t\tWHILE (i < LEN(list)) & (ch # 0X) DO\r\t\t\tWHILE (ch # 0X) & (ch < \"0\") OR (ch > \"9\") & (CAP(ch) < \"A\") OR (CAP(ch) > \"Z\") DO INC(i); ch := list[i] END;\r\t\t\tIF ch # 0X THEN\r\t\t\t\tj := 0;\r\t\t\t\tWHILE (ch >= \"0\") & (ch <= \"9\") OR (CAP(ch) >= \"A\") & (CAP(ch) <= \"Z\") DO\r\t\t\t\t\tname[j] := ch; INC(j); INC(i); ch := list[i]\r\t\t\t\tEND;\r\t\t\t\tname[j] := 0X;\r\t\t\t\tInsertModule(Kernel.ThisMod(name), done);\r\t\t\t\tIF done THEN INC(listLen) END\r\t\t\tEND\r\t\tEND\r\tEND SetModuleList;\r\t\r(*\r\tPROCEDURE "
                    attr: 0
                  - text: GetModuleCount
                    attr: 4
                  - text: "* (name: ARRAY OF CHAR; VAR count: LONGINT);\r\t\tVAR i: LONGINT;\r\tBEGIN\r\t\ti := 0;\r\t\tWHILE (i < numMod) & (mod[i].mod.name # name) DO INC(i) END;\r\t\tIF i < numMod THEN count := mod[i].count\r\t\tELSE count := -1\r\t\tEND\r\tEND GetModuleCount;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: GetProcedureCount
                    attr: 4
                  - text: "* (modName, procName: ARRAY OF CHAR; VAR count: LONGINT);\r\t\tVAR i, j, last, ref, end: LONGINT; name: Kernel.Utf8Name;\r\tBEGIN\r\t\ti := 0;\r\t\tWHILE (i < numMod) & (mod[i].mod.name # modName) DO INC(i) END;\r\t\tIF i < numMod THEN \r\t\t\tref := mod[i].mod.refs; j := mod[i].first - 1; last := mod[i].last;\r\t\t\tREPEAT INC(j); Kernel.GetRefProc(ref, end, name); UNTIL (j > last) OR (name = procName);\r\t\t\tIF j <= last THEN count := pCount[j]\r\t\t\tELSE count := -1\r\t\t\tEND\r\t\tELSE count := -1\r\t\tEND\r\tEND GetProcedureCount;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: GetTotalCount
                    attr: 4
                  - text: "* (VAR inModules, outside: LONGINT);\r\tBEGIN\r\t\tinModules := totalCount;\r\t\toutside := otherCount\r\tEND GetTotalCount;\r*)\t\r\t"
                    attr: 0
                  - text: "(* ---------- menu commands ---------- *)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Execute
                    attr: 4
                  - text: "*;\r\t\tVAR t0: LONGINT; res: INTEGER; str: Dialog.String;\r\tBEGIN\r\t\tt0 := Kernel.Time();\r\t\tDialog.Call(\"DevDebug.Execute\", \"\", res);\r\t\tStdLog.Int(SHORT((Kernel.Time() - t0) * 1000 DIV Kernel.timeResolution));\r\t\tDialog.MapString(\"#Dev:msec\", str);\r\t\tStdLog.Char(\" \"); StdLog.String(str);\r\t\tStdLog.Ln\r\tEND Execute;\r\t\r\tPROCEDURE NewRuler (): TextRulers.Ruler;\r\t\tCONST mm = Ports.mm; pt = Ports.point;\r\t\tVAR p: TextRulers.Prop;\r\tBEGIN\r\t\tNEW(p);\r\t\tp.valid := {TextRulers.right, TextRulers.tabs, TextRulers.opts};\r\t\tp.opts.val := {TextRulers.rightFixed}; p.opts.mask := p.opts.val;\r\t\tp.right := 130 * mm;\r\t\tp.tabs.len := 5;\r\t\tp.tabs.tab[0].stop := 4 * mm; p.tabs.tab[1].stop := 50 * mm;\r\t\tp.tabs.tab[2].stop := 54 * mm; p.tabs.tab[3].stop := 70 * mm; \r\t\tp.tabs.tab[4].stop := 74 * mm;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " TextRulers.dir.NewFromProp(p)\r\tEND NewRuler;\r\r\tPROCEDURE ShowModule (VAR m: Module);\r\t\tVAR i, p, ref, end: INTEGER; proc, list, a, b: Proc; modName, nn: Kernel.Name; res: INTEGER;\r\tBEGIN\r\t\tASSERT(totalCount > 0, 20);\r\t\tp := m.count * 100 DIV totalCount;\r\t\tIF p > 0 THEN\r\t\t\tKernel.GetModName(m.mod, modName); out.WriteString(modName); out.WriteTab; out.WriteTab;\r\t\t\tout.WriteIntForm(p, 10, 2, \"\", FALSE); out.WriteLn;\r\t\t\tNEW(proc); list := NIL;\r\t\t\tref := m.mod.refs; i := m.first;\r\t\t\tWHILE i <= m.last DO\r\t\t\t\tKernel.GetRefProc(ref, end, proc.name);\r\t\t\t\tproc.p := pCount[i] * 100 DIV totalCount;\r\t\t\t\tIF proc.p > 0 THEN proc.next := list; list := proc; NEW(proc) END;\r\t\t\t\tINC(i)\r\t\t\tEND;\r\t\t\t"
                    attr: 0
                  - text: "(* sort list *)\r\t\t"
                    attr: 1
                  - text: "\tWHILE list # NIL DO\r\t\t\t\ta := proc; b := proc.next;\r\t\t\t\tWHILE (b # NIL) & (list.p < b.p) DO a := b; b := b.next END;\r\t\t\t\ta.next := list; a := list.next; list.next := b; list := a\r\t\t\tEND;\r\t\t\tlist := proc.next;\r\t\t\tWHILE list # NIL DO\r\t\t\t\tStrings.Utf8ToString(list.name, nn, res); out.WriteTab; out.WriteString(nn); out.WriteTab; out.WriteTab;\r\t\t\t\tout.WriteIntForm(list.p, 10, 2, \"\", FALSE); out.WriteLn;\r\t\t\t\tlist := list.next\r\t\t\tEND;\r\t\t\tout.WriteLn;\r\t\tEND\r\tEND ShowModule;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ShowProfile
                    attr: 4
                  - text: "*;\r\t\tVAR max, limit, maxi, pos, c, n, i: INTEGER; v: TextViews.View; a0: TextModels.Attributes; str: Views.Title;\r\tBEGIN\r\t\tStop;\r\t\tout.ConnectTo(TextModels.dir.New());\r\t\ta0 := out.rider.attr;\r\t\tout.rider.SetAttr(TextModels.NewStyle(a0, {Fonts.italic}));\r\t\tDialog.MapString(\"#Dev:Module\", str); out.WriteString(str);\r\t\tout.WriteTab; out.WriteTab;\r\t\tDialog.MapString(\"#Dev:PercentPerModule\", str); out.WriteString(str);\r\t\tout.WriteLn; out.WriteTab;\r\t\tDialog.MapString(\"#Dev:Procedure\", str); out.WriteString(str);\r\t\tout.WriteTab; out.WriteTab;\r\t\tDialog.MapString(\"#Dev:PercentPerProc\", str); out.WriteString(str);\r\t\tout.WriteLn; out.WriteLn;\r\t\tout.rider.SetAttr(a0);\r\t\tIF totalCount > 0 THEN\r\t\t\tn := numMod; limit := MAX(INTEGER);\r\t\t\tWHILE n > 0 DO\r\t\t\t\ti := 0; max := -1;\r\t\t\t\tWHILE i < numMod DO\r\t\t\t\t\tc := mod[i].count;\r\t\t\t\t\tIF (c > max) & ((c < limit) OR (c = limit) & (i > pos)) THEN max := c; maxi := i END;\r\t\t\t\t\tINC(i)\r\t\t\t\tEND;\r\t\t\t\tShowModule(mod[maxi]);\r\t\t\t\tpos := maxi; limit := max;\r\t\t\t\tDEC(n)\r\t\t\tEND\r\t\tEND;\r\t\tDialog.MapString(\"#Dev:Samples\", str); out.WriteString(str);\r\t\tout.WriteTab; out.WriteTab; out.WriteInt(totalCount + otherCount);\r\t\tout.WriteTab; out.WriteTab; out.WriteString(\"100%\"); out.WriteLn;\r\t\tout.WriteTab;\r\t\tDialog.MapString(\"#Dev:InProfiledModules\", str); out.WriteString(str);\r\t\tout.WriteTab; out.WriteTab; \r\t\tout.WriteInt(totalCount); out.WriteTab; out.WriteTab;\r\t\tIF totalCount + otherCount > 0 THEN\r\t\t\tn := totalCount * 100 DIV (totalCount + otherCount)\r\t\tELSE\r\t\t\tn := 0\r\t\tEND;\r\t\tout.WriteInt(n); out.WriteChar(\"%\"); out.WriteLn;\r\t\tout.WriteTab;\r\t\tDialog.MapString(\"#Dev:Other\", str); out.WriteString(str);\r\t\tout.WriteTab; out.WriteTab; \r\t\tout.WriteInt(otherCount); out.WriteTab; out.WriteTab;\r\t\tout.WriteInt(100 - n); out.WriteChar(\"%\"); out.WriteLn;\r\t\tv := TextViews.dir.New(out.rider.Base());\r\t\tv.SetDefaults(NewRuler(), TextViews.dir.defAttr);\r\t\tDialog.MapString(\"#Dev:Profile\", str);\r\t\tViews.OpenAux(v, str);\r\t\tout.ConnectTo(NIL)\r\tEND ShowProfile;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: SetProfileList
                    attr: 4
                  - text: "*;\r\t\tVAR beg, end: INTEGER; s: TextMappers.Scanner;\r\t\t\tc: TextControllers.Controller; done: BOOLEAN;\r\tBEGIN\r\t\tIF ~started THEN\r\t\t\tReset;\r\t\t\tc := TextControllers.Focus();\r\t\t\tIF c # NIL THEN\r\t\t\t\ts.ConnectTo(c.text);\r\t\t\t\tIF c.HasSelection() THEN c.GetSelection(beg, end)\r\t\t\t\tELSE beg := 0; end := c.text.Length()\r\t\t\t\tEND;\r\t\t\t\tReset;\r\t\t\t\ts.SetPos(beg); s.Scan;\r\t\t\t\tWHILE (s.start < end) & (s.type # TextMappers.eot) DO\r\t\t\t\t\tIF s.type = TextMappers.string THEN\r\t\t\t\t\t\tIF numMod < maxMod THEN\r\t\t\t\t\t\t\tInsertModule(Kernel.ThisMod(s.string), done);\r\t\t\t\t\t\t\tIF done THEN INC(listLen)\r\t\t\t\t\t\t\tELSE Dialog.ShowParamMsg(\"module ^0 not found\", s.string, \"\", \"\")\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tDialog.ShowMsg(\"too many modules\");\r\t\t\t\t\t\t\t"
