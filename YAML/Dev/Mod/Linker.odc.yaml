                  - text: " f\r\tEND ThisResFile;\r\t\r\tPROCEDURE Read2 (VAR x: INTEGER);\r\t\tVAR b: BYTE;\r\tBEGIN\r\t\tR.ReadByte(b); x := b MOD 256;\r\t\tR.ReadByte(b); x := x + 100H * (b MOD 256)\r\tEND Read2;\r\t\r\tPROCEDURE Read4 (VAR x: INTEGER);\r\t\tVAR b: BYTE;\r\tBEGIN\r\t\tR.ReadByte(b); x := b MOD 256;\r\t\tR.ReadByte(b); x := x + 100H * (b MOD 256);\r\t\tR.ReadByte(b); x := x + 10000H * (b MOD 256);\r\t\tR.ReadByte(b); x := x + 1000000H * b\r\tEND Read4;\r\t\r\tPROCEDURE ReadName (VAR name: ARRAY OF SHORTCHAR);\r\t\tVAR i: INTEGER; b: BYTE;\r\tBEGIN i := 0;\r\t\tREPEAT\r\t\t\tR.ReadByte(b); name[i] := SHORT(CHR(b)); INC(i)\r\t\tUNTIL b = 0\r\tEND ReadName;\r\t\t\r\tPROCEDURE RNum (VAR i: INTEGER);\r\t\tVAR b: BYTE; s, y: INTEGER;\r\tBEGIN\r\t\ts := 0; y := 0; R.ReadByte(b);\r\t\tWHILE b < 0 DO INC(y, ASH(b + 128, s)); INC(s, 7); R.ReadByte(b) END;\r\t\ti := ASH((b + 64) MOD 128 - 64, s) + y\r\tEND RNum;\r\t\r\tPROCEDURE WriteCh (ch: SHORTCHAR);\r\tBEGIN\r\t\tRo.WriteByte(SHORT(ORD(ch)))\r\tEND WriteCh;\r\t\r\tPROCEDURE Write2 (x: INTEGER);\r\tBEGIN\r\t\tRo.WriteByte(SHORT(SHORT(x MOD 256))); x := x DIV 256;\r\t\tRo.WriteByte(SHORT(SHORT(x MOD 256)))\r\tEND Write2;\r\t\r\tPROCEDURE Write4 (x: INTEGER);\r\tBEGIN\r\t\tRo.WriteByte(SHORT(SHORT(x MOD 256))); x := x DIV 256;\r\t\tRo.WriteByte(SHORT(SHORT(x MOD 256))); x := x DIV 256;\r\t\tRo.WriteByte(SHORT(SHORT(x MOD 256))); x := x DIV 256;\r\t\tRo.WriteByte(SHORT(SHORT(x MOD 256)))\r\tEND Write4;\r\t\r\tPROCEDURE WriteName (s: ARRAY OF SHORTCHAR; len: SHORTINT);\r\t\tVAR i: SHORTINT;\r\tBEGIN i := 0;\r\t\tWHILE s[i] # 0X DO Ro.WriteByte(SHORT(ORD(s[i]))); INC(i) END;\r\t\tWHILE i < len DO Ro.WriteByte(0); INC(i) END\r\tEND WriteName;\r\t\r\tPROCEDURE WriteUtf8 (name: ARRAY OF SHORTCHAR);\r\t\tVAR res: INTEGER; s: ARRAY 256 OF CHAR;\r\tBEGIN\r\t\tStrings.Utf8ToString(name, s, res); ASSERT(res = 0); W.WriteString(s)\r\tEND WriteUtf8;\r\t\r\tPROCEDURE Reloc (a: INTEGER);\r\t\tVAR p: POINTER TO ARRAY OF INTEGER; i: INTEGER;\r\tBEGIN\r\t\tIF noffixup >= LEN(fixups) THEN\r\t\t\tNEW(p, 2 * LEN(fixups));\r\t\t\ti := 0; WHILE i < LEN(fixups) DO p[i] := fixups[i]; INC(i) END;\r\t\t\tfixups := p\r\t\tEND;\r\t\tfixups[noffixup] := a; INC(noffixup)\r(*\r\t\tELSE\r\t\t\tIF ~error THEN W.WriteString(\"  too many fixups\") END;\r\t\t\terror := TRUE\r\t\tEND\r*)\r\tEND Reloc;\r\t\r\tPROCEDURE Put (mod: Module; a, x: INTEGER);\r\tBEGIN\r\t\tmod.data[a] := SHORT(SHORT(x)); INC(a); x := x DIV 256;\r\t\tmod.data[a] := SHORT(SHORT(x)); INC(a); x := x DIV 256;\r\t\tmod.data[a] := SHORT(SHORT(x)); INC(a); x := x DIV 256;\r\t\tmod.data[a] := SHORT(SHORT(x))\r\tEND Put;\r\t\r\tPROCEDURE Get (mod: Module; a: INTEGER; VAR x: INTEGER);\r\tBEGIN\r\t\tx := ((mod.data[a + 3] * 256 +\r\t\t\t(mod.data[a + 2] MOD 256)) * 256 +\r\t\t\t(mod.data[a + 1] MOD 256)) * 256 +\r\t\t\t(mod.data[a] MOD 256)\r\tEND Get;\r\t\r\tPROCEDURE GenName (VAR from, to: ARRAY OF SHORTCHAR; ext: ARRAY OF SHORTCHAR);\r\t\tVAR i, j: INTEGER;\r\tBEGIN\r\t\ti := 0;\r\t\tWHILE from[i] # 0X DO to[i] := from[i]; INC(i) END;\r\t\tIF ext # \"\" THEN\r\t\t\tto[i] := \".\"; INC(i); j := 0;\r\t\t\tWHILE ext[j] # 0X DO to[i] := ext[j]; INC(i); INC(j) END\r\t\tEND;\r\t\tto[i] := 0X\r\tEND GenName;\r\t\r\tPROCEDURE Fixup0 (link, adr: INTEGER);\r\t\tVAR offset, linkadr, t, n, x: INTEGER;\r\tBEGIN\r\t\tWHILE link # 0 DO\r\t\t\tRNum(offset);\r\t\t\tWHILE link # 0 DO\r\t\t\t\tIF link > 0 THEN\r\t\t\t\t\tn := (code[link] MOD 256) + (code[link+1] MOD 256) * 256 + code[link+2] * 65536;\r\t\t\t\t\tt := code[link+3]; linkadr := CodeBase + impg.ca + link\r\t\t\t\tELSE\r\t\t\t\t\tn := (impg.data[-link] MOD 256) + (impg.data[-link+1] MOD 256) * 256 + impg.data[-link+2] * 65536;\r\t\t\t\t\tt := impg.data[-link+3]; linkadr := ConBase + impg.ma - link\r\t\t\t\tEND;\r\t\t\t\tIF t = absolute THEN x := adr + offset\r\t\t\t\tELSIF t = relative THEN x := adr + offset - linkadr - 4\r\t\t\t\tELSIF t = copy THEN Get(impd, adr + offset - ConBase - impd.ma, x)