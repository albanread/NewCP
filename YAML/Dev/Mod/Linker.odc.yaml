                    attr: 1
                  - text: "\r\t\t\t\t\t\tWHILE i < r.size DO Read4(x); Write4(x); INC(i, 4) END\r\t\t\t\t\tEND;\r\t\t\t\t\tr.file.Close; r.file := NIL\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tr := r.next\r\t\tEND\r\tEND WriteResource;\r\r\tPROCEDURE Insert(VAR name: ARRAY OF SHORTCHAR; VAR idx: INTEGER; hint: INTEGER);\r\t\tVAR i: INTEGER; ntabx: POINTER TO ARRAY OF SHORTCHAR;\r\tBEGIN\r\t\tIF idx + LEN(name) + (2 + 4) >= LEN(ntab) THEN (* expand ntab *)\r\t\t\tNEW(ntabx, (idx + LEN(name) + (2 + 4)) * 2);\r\t\t\tFOR i := 0 TO LEN(ntab) - 1 DO ntabx[i] := ntab[i] END ;\r\t\t\tntab := ntabx;\r\t\tEND ;\r\t\tIF hint >= 0 THEN\r\t\t\tntab[idx] := SHORT(CHR(hint)); INC(idx);\r\t\t\tntab[idx] := SHORT(CHR(hint DIV 256)); INC(idx);\r\t\tEND;\r\t\ti := 0;\r\t\tWHILE name[i] # 0X DO ntab[idx] := name[i]; INC(idx); INC(i) END;\r\t\tIF (hint = -1) \r\t\t& ((idx < 4) OR ((ntab[idx-4] # \".\") OR (CAP(ntab[idx-3]) # \"D\") OR (CAP(ntab[idx-2]) # \"L\") OR (CAP(ntab[idx-1]) # \"L\"))) THEN\r\t\t\tntab[idx] := \".\"; INC(idx);\r\t\t\tntab[idx] := \"d\"; INC(idx);\r\t\t\tntab[idx] := \"l\"; INC(idx);\r\t\t\tntab[idx] := \"l\"; INC(idx);\r\t\tEND;\r\t\tntab[idx] := 0X; INC(idx);\r\t\tIF ODD(idx) THEN ntab[idx] := 0X; INC(idx) END\r\tEND Insert;\r\r\tPROCEDURE WriteImport;\r\t\tVAR i, lt, at, nt, ai, ni: INTEGER; mod: Module; exp: Export; ss: ARRAY 256 OF SHORTCHAR;\r\tBEGIN\r\t\tIF numImp > 0 THEN NEW(atab, numImp) END;\r\t\tIF numExp > numImp THEN i := numExp ELSE i := numImp END;\r\t\tIF i > 0 THEN NEW(ntab, 40 * i) END;\r\t\tat := ImpRva + ImpHSize; ai := 0; ni := 0;\r\t\tlt := ImpRva + ImpSize; nt := lt + ImpSize - ImpHSize;\r\t\tmod := modList;\r\t\tWHILE mod # NIL DO\r\t\t\tIF mod.dll THEN\r\t\t\t\tWrite4(lt); (* lookup table rva *)\r\t\t\t\tWrite4(0); (* time/data (always 0) *)\r\t\t\t\tWrite4(0); (* version (always 0) *)\r\t\t\t\tWrite4(nt + ni); (* name rva *)\r\t\t\t\tss := SHORT(mod.name$); Insert(ss, ni, -1);\r\t\t\t\tWrite4(at); (* addr table rva *)\r\t\t\t\texp := mod.exp;\r\t\