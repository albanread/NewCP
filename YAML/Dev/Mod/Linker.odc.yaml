                  - text: "\r\t\tVAR a: INTEGER; t: Dates.Time; d, epoch: Dates.Date;\r\tBEGIN\r\t\tDates.GetUTCTime(t); Dates.GetUTCDate(d);\r\t\tepoch.year := 1970; epoch.month := 1; epoch.day := 1;\r\t\ta := Dates.Day(d) - Dates.Day(epoch);\r\t\t"
