                  - text: "\t\r\tIMPORT\r\t\tKernel, Files, Dates, Dialog, Strings,\r\t\tTextModels, TextViews, TextMappers,\r\t\tLog := StdLog, DevCommanders;\r\t\r\tCONST\r\t\tNewRecFP = 4E27A847H;\r\t\tNewArrFP = 76068C78H;\r\r\t\tImageBase = 00400000H;\r\t\tObjAlign = 1000H;\r\t\tFileAlign = 200H;\r\t\tHeaderSize = 400H;\r\r\t\tFixLen = 30000;\r\t\t\r\t\tOFdir = \"Code\";\r\t\tSYSdir = \"System\";\r\t\tRsrcDir = \"Rsrc\";\r\t\tWinDir = \"Win\";\r\r\t\t(* meta interface consts *)\r\t\tmConst = 1; mTyp = 2; mVar = 3; mProc = 4; mField = 5;\r\t\tmInternal = 1; mReadonly = 2; mExported = 4;\r\r\t\t(* fixup types *)\r\t\tabsolute = 100; relative = 101; copy = 102; table = 103; tableend = 104;\r\t\t\r\t\t(* mod desc fields *)\r\t\tmodOpts = 4; modRefcnt = 8; modTerm = 40; modNames = 84; modImports = 92; modExports = 96;\r\t\t\r\tTYPE\r\t\tName = Kernel.Utf8Name;\r\t\tExport = POINTER TO RECORD\r\t\t\tnext: Export;\r\t\t\tname: Name;\r\t\t\tadr: INTEGER\r\t\tEND;\r\t\tResource = POINTER TO RECORD\r\t\t\tnext, local: Resource;\r\t\t\ttyp, id, lid, size, pos, x, y: INTEGER;\r\t\t\topts: SET;\r\t\t\tfile: Files.File;\r\t\t\tname: Files.Name\r\t\tEND;\r\t\tModule = POINTER TO RECORD\r\t\t\tnext: Module;\r\t\t\tname: Files.Name;\r\t\t\tfile: Files.File;\r\t\t\ths, ms, ds, cs, vs, ni, ma, ca, va: INTEGER;\r\t\t\tdll, intf: BOOLEAN;\r\t\t\texp: Export;\r\t\t\timp: POINTER TO ARRAY OF Module;\r\t\t\tdata: POINTER TO ARRAY OF BYTE;\r\t\tEND;\r\t\t\r\tVAR\r\t\tW: TextMappers.Formatter;\r\t\tOut: Files.File;\r\t\tR: Files.Reader;\r\t\tRo: Files.Writer;\r\t\terror, isDll, isStatic, comLine: BOOLEAN;\r\t\tmodList, kernel, main, last, impg, impd: Module;\r\t\tnumMod, lastTerm: INTEGER;\r\t\tresList: Resource;\r\t\tnumType, resHSize: INTEGER;\r\t\tnumId: ARRAY 32 OF INTEGER;\r\t\trsrcName: ARRAY 16 OF CHAR;\t"
