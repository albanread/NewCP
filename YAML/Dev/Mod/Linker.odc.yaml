eExport;\r\r\tPROCEDURE Sort (l, r: INTEGER);\r\t\tVAR i, j, x, t: INTEGER;\r\tBEGIN\r\t\ti := l; j := r; x := fixups[(l + r) DIV 2];\r\t\tREPEAT\r\t\t\tWHILE fixups[i] < x DO INC(i) END;\r\t\t\tWHILE fixups[j] > x DO DEC(j) END;\r\t\t\tIF i <= j THEN t := fixups[i]; fixups[i] := fixups[j]; fixups[j] := t; INC(i); DEC(j) END\r\t\tUNTIL i > j;\r\t\tIF l < j THEN Sort(l, j) END;\r\t\tIF i < r THEN Sort(i, r) END\r\tEND Sort;\r\r\tPROCEDURE WriteReloc;\r\t\tVAR i, j, h, a, p: INTEGER;\r\tBEGIN\r\t\tSort(0, noffixup - 1); i := 0;\r\t\tWHILE i < noffixup DO\r\t\t\tp := fixups[i] DIV 4096 * 4096; j := i; a := p + 4096;\r\t\t\tWHILE (j < noffixup) & (fixups[j] < a) DO INC(j) END;\r\t\t\tWrite4(p - ImageBase); (* page rva *)\r\t\t\th := 8 + 2 * (j - i);\r\t\t\tWrite4(h + h MOD 4); (* block size *)\r\t\t\tINC(RelocSize, h);\r\t\t\tWHILE i < j DO Write2(fixups[i] - p + 3 * 4096); INC(i) END; (* long fix *)\r\t\t\tIF h MOD 4 # 0 THEN Write2(0); INC(RelocSize, 2) END\r\t\tEND;\r\t\tWrite4(0); Write4(0); INC(RelocSize, 8);\r\t\tImagesSize := RelocRva + (RelocSize + (ObjAlign - 1)) DIV ObjAlign * ObjAlign;\r\tEND WriteReloc;\r\t\r\tPROCEDURE Align(VAR pos: INTEGER);\r\tBEGIN\r\t\tWHILE Ro.Pos() MOD FileAlign # 0 DO WriteCh(0X) END;\r\t\tpos := Ro.Pos()\r\tEND Align;\r\t\r\tPROCEDURE WriteOut (VAR name: Files.Name);\r\t\tVAR res, codepos, conpos, rsrcpos, imppos, exppos, relpos, relend, end: INTEGER;\r\tBEGIN\r\t\tIF ~error THEN Align(codepos); WriteCode END;\r\t\tIF ~error THEN Align(conpos); WriteConst END;\r\t\tIF ~error THEN Align(rsrcpos); WriteResource END;\r\t\tIF ~error THEN Align(imppos); WriteImport END;\r\t\tIF ~error & isDll THEN Align(exppos); WriteExport(name) END;\r\t\tIF ~error THEN Align(relpos); WriteReloc END;\r\t\trelend := Ro.Pos() - 8; Align(end);\r\t\t\r\t\tIF ~error THEN\r\t\t\tRo.SetPos(entryPos); Write4(CodeRva);\r\t\t\tRo.SetPos(isPos); Write4(ImagesSize);\r\t\t\tIF isDll THEN\r\t\t\t\tRo.SetPos(hexpPos); Write4(ExpRva); Write4(ExpSize);\r\t\t\tEND;\r\t\t\tRo.SetPos(himpPos); Write4(ImpRva); Write4(ImpHSize);\r\t\t\tRo.SetPos(hrsrcPos); Write4(RsrcRva); Write4(RsrcSize);\r\t\t\tRo.SetPos(fixPos); Write4(RelocRva); Write4(relend - relpos);\r\t\r\t\t\tRo.SetPos(codePos); Write4(CodeRva); Write4(conpos - HeaderSize); Write4(HeaderSize);\r\t\t\tRo.SetPos(dataPos); Write4(DataRva); Write4((DataSize + (FileAlign-1)) DIV FileAlign * FileAlign);\r\t\t\tRo.SetPos(conPos); Write4(ConRva); Write4(rsrcpos - conpos); Write4(conpos);\r\t\t\tRo.SetPos(rsrcPos); Write4(RsrcRva); Write4(imppos - rsrcpos); Write4(rsrcpos);\r\t\t\tIF isDll THEN\r\t\t\t\tRo.SetPos(impPos); Write4(ImpRva); Write4(exppos - imppos); Write4(imppos);\r\t\t\t\tRo.SetPos(expPos); Write4(ExpRva); Write4(relpos - exppos); Write4(exppos)\r\t\t\tELSE\r\t\t\t\tRo.SetPos(impPos); Write4(ImpRva); Write4(relpos - imppos); Write4(imppos);\r\t\t\tEND;\r\t\t\tRo.SetPos(relPos); Write4(RelocRva); Write4(end - relpos); Write4(relpos);\r\t\t\tIF isStatic THEN\r\t\t\t\tRo.SetPos(termPos); WriteTermCode(modList, 0)\r\t\t\tELSIF isDll THEN\r\t\t\t\tRo.SetPos(termPos); WriteTermCode(main, 0)\r\t\t\tEND\r\t\tEND;\r\t\t\r\t\tIF ~error THEN\r\t\t\tOut.Register(name, \"exe\", Files.ask, res);\r\t\t\tIF res # 0 THEN error := TRUE END\r\t\tEND\r\tEND WriteOut;\r\t\r\tPROCEDURE ScanRes (VAR S: TextMappers.Scanner; end: INTEGER; VAR list: Resource);\r\t\tVAR res, tail: Resource; n: INTEGER;\r\tBEGIN\r\t\ttail := NIL;\r\t\tWHILE (S.start < end) & (S.type = TextMappers.int) DO\r\t\t\tNEW(res); res.id := S.int; S.Scan;\r\t\t\tIF (S.type = TextMappers.char) & (S.char = \"[\") THEN\r\t\t\t\tS.Scan;\r\t\t\t\tIF S.type = TextMappers.int THEN res.lid := S.int; S.Scan END;\r\t\t\t\tIF (S.type = TextMappers.char) & (S.char = \"]\") THEN S.Scan\r\t\t\t\tELSE W.WriteString(\"missing ']'\"); error := TRUE\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tWHILE S.type = TextMappers.char DO\r\t\t\t\tIF S.char = \"@\" THEN n := 0\r\t\t\t\tELSIF S.char = \"^\" THEN n := 16\r\t\t\t\tELSIF S.char = \"~\" THEN n := 17\r\