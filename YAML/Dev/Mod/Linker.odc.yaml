                  - text: " ((a * 24 + t.hour) * 60 + t.minute) * 60 + t.second;\r\tEND TimeStamp;\r\r\tPROCEDURE ThisFile (modname: ARRAY OF CHAR): Files.File;\r\t\tVAR dir, name: Files.Name; loc: Files.Locator; f: Files.File;\r\tBEGIN\r\t\tKernel.SplitName(modname, dir, name);\r\t\tKernel.MakeFileName(name, Kernel.objType);\r\t\tloc := Files.dir.This(dir); loc := loc.This(OFdir);\r\t\tf := Files.dir.Old(loc, name, TRUE);\r\t\tIF (f = NIL) & (dir = \"\") THEN\r\t\t\tloc := Files.dir.This(SYSdir); loc := loc.This(OFdir);\r\t\t\tf := Files.dir.Old(loc, name, TRUE)\r\t\tEND;\r\t\t"
