                  - text: ", Strings, DevCPM, DevCPT;\r\t\r\tCONST\r\t\tMaxIdLen = LEN(DevCPT.Name);\r\t\r\t(* name, str, numtyp, intval, realval, realval are implicit results of Get *)\r\r\tVAR\r\t\tname*: DevCPT.Name;\r\t\tstr*: DevCPT.String;\r\t\tlstr*: POINTER TO ARRAY OF CHAR;\r\t\tnumtyp*: SHORTINT; (* 1 = char, 2 = integer, 4 = real, 5 = int64, 6 = real32, 7 = real64 *)\r\t\tintval*: INTEGER;\t(* integer value or string length (incl. 0X) *)\r\t\trealval*: REAL;\r\r\r\tCONST\r\t\t(* numtyp values *)\r\t\tchar = 1; integer = 2; real = 4; int64 = 5; real32 = 6; real64 = 7;\r\r\t\t(*symbol values*)\r\t\tnull = 0; times = 1; slash = 2; div = 3; mod = 4;\r\t\tand = 5; plus = 6; minus = 7; or = 8; eql = 9;\r\t\tneq = 10; lss = 11; leq = 12; gtr = 13; geq = 14;\r\t\tin = 15; is = 16; arrow = 17; dollar = 18; period = 19;\r\t\tcomma = 20; colon = 21; upto = 22; rparen = 23; rbrak = 24;\r\t\trbrace = 25; of = 26; then = 27; do = 28; to = 29;\r\t\tby = 30; not = 33;\r\t\tlparen = 40; lbrak = 41; lbrace = 42; becomes = 44;\r\t\tnumber = 45; nil = 46; string = 47; ident = 48; semicolon = 49;\r\t\tbar = 50; end = 51; else = 52; elsif = 53; until = 54;\r\t\tif = 55; case = 56; while = 57; repeat = 58; for = 59;\r\t\tloop = 60; with = 61; exit = 62; return = 63; array = 64;\r\t\trecord = 65; pointer = 66; begin = 67; const = 68; type = 69;\r\t\tvar = 70; out = 71; procedure = 72; close = 73; import = 74;\r\t\tmodule = 75; eof = 76;\r\r\tVAR\r\t\tch: CHAR;     (*current character*)\r\r\tPROCEDURE err(n: SHORTINT);\r\tBEGIN DevCPM.err(n)\r\tEND err;\r\t\r\tPROCEDURE Str(VAR sym: BYTE);\r\t\tVAR i: INTEGER; och: CHAR; lch: CHAR; long: BOOLEAN;\r\t\t\ts: ARRAY 256 OF CHAR; t: POINTER TO ARRAY OF CHAR;\r\tBEGIN i := 0; och := ch; long := FALSE;\r\t\tLOOP DevCPM.Get(lch);\r\t\t\tIF lch = och THEN EXIT END ;\r\t\t\tIF (lch < \" \") & (lch # 9X) THEN err(3); EXIT END;\r\t\t\tIF lch > 0FFX THEN long := TRUE END;\r\t\t\tIF i < LEN(s) - 1 THEN s[i] := lch\r\t\t\tELSIF i = LEN(s) - 1 THEN s[i] := 0X; NEW(lstr, 2 * LEN(s)); lstr^ := s$; lstr[i] := lch\r\t\t\tELSIF i < LEN(lstr^) - 1 THEN lstr[i] := lch\r\t\t\tELSE t := lstr; t[i] := 0X; NEW(lstr, 2 * LEN(t^)); lstr^ := t^$; lstr[i] := lch\r\t\t\tEND;\r\t\t\tINC(i)\r\t\tEND ;\r\t\tIF i = 1 THEN sym := number; numtyp := 1; intval := ORD(s[0])\r\t\tELSE\r\t\t\tsym := string; numtyp := 0; intval := i + 1; NEW(str, intval);\r\t\t\tIF long THEN\r\t\t\t\tIF i < LEN(s) THEN s[i] := 0X; NEW(lstr, intval); lstr^ := s$\r\t\t\t\tELSE lstr[i] := 0X\r\t\t\t\tEND;\r\t\t\t\tstr^ := SHORT(lstr$)\r\t\t\tELSE\r\t\t\t\tIF i < LEN(s) THEN s[i] := 0X; str^ := SHORT(s$);\r\t\t\t\tELSE lstr[i] := 0X; str^ := SHORT(lstr$)\r\t\t\t\tEND;\r\t\t\t\tlstr := NIL\r\t\t\tEND\r\t\tEND;\r\t\tDevCPM.Get(ch)\r\tEND Str;\r\r\tPROCEDURE Identifier(VAR sym: BYTE);\r\t\tVAR i, res: INTEGER; n: ARRAY MaxIdLen OF CHAR;\r\tBEGIN i := 0;\r\t\tREPEAT\r\t\t\tn[i] := ch; INC(i); DevCPM.Get(ch)\r\t\tUNTIL ~Strings.IsIdent(ch) OR (i = MaxIdLen);\r\t\tIF i = MaxIdLen THEN err(240); DEC(i) END ;\r\t\tn[i] := 0X; Strings.StringToUtf8(n, name, res); sym := ident;\r\t\tIF res = 1 (*truncated*) THEN err(240) END\r\tEND Identifier;\r\r\tPROCEDURE Number;\r\t\tVAR i, j, m, n, d, e, a: INTEGER; f, g, x: REAL; expCh, tch: CHAR; neg: BOOLEAN; r: SHORTREAL;\r\t\t\tdig: ARRAY "
                    attr: 0
                  - text: 30
                    attr: 3
                  - text: " OF CHAR; arr: ARRAY 2 OF INTEGER;\r\r\t\tPROCEDURE Ord(ch: CHAR; hex: BOOLEAN): INTEGER;\r\t\tBEGIN (* (\"0\" <= ch) & (ch <= \"9\") OR (\"A\" <= ch) & (ch <= \"F\") *)\r\t\t\tIF ch <= \"9\" THEN RETURN ORD(ch) - ORD(\"0\")\r\t\t\tELSIF hex THEN RETURN ORD(ch) - ORD(\"A\") + 10\r\t\t\tELSE err(2); RETURN 0\r\t\t\tEND\r\t\tEND Ord;\r\t\t\r\tBEGIN (* (\"0\" <= ch) & (ch <= \"9\") *)\r\t\ti := 0; m := 0; n := 0; d := 0;\r\t\tLOOP (* read mantissa *)\r\t\t\tIF (\"0\" <= ch) & (ch <= \"9\") OR (d = 0) & (\"A\" <= ch) & (ch <= \"F\") THEN\r\t\t\t\tIF (m > 0) OR (ch # \"0\") THEN (* ignore leading zeros *)\r\t\t\t\t\tIF n < LEN(dig) THEN dig[n] := ch; INC(n) END;\r\t\t\t\t\tINC(m)\r\t\t\t\tEND;\r\t\t\t\tDevCPM.Get(ch); INC(i)\r\t\t\tELSIF ch = \".\" THEN DevCPM.Get(ch);\r\t\t\t\tIF ch = \".\" THEN (* ellipsis *) ch := 7FX; EXIT\r\t\t\t\tELSIF d = 0 THEN (* i > 0 *) d := i\r\t\t\t\tELSE err(2)\r\t\t\t\tEND\r\t\t\tELSE EXIT\r\t\t\tEND\r\t\tEND; (* 0 <= n <= m <= i, 0 <= d <= i *)\r\t\tIF d = 0 THEN (* integer *) realval := 0; numtyp := integer;\r\t\t\tIF n = m THEN intval := 0; i := 0;\r\t\t\t\tIF ch = \"X\" THEN (* character *) DevCPM.Get(ch); numtyp := char;\r\t\t\t\t\tIF n <= 4 THEN\r\t\t\t\t\t\tWHILE i < n DO intval := intval*10H + Ord(dig[i], TRUE); INC(i) END\r\t\t\t\t\tELSE err(203)\r\t\t\t\t\tEND\r\t\t\t\tELSIF (ch = \"H\") OR (ch = \"S\") THEN\t(* hex 32bit *)\r\t\t\t\t\ttch := ch; DevCPM.Get(ch);\r\t\t\t\t\tIF (ch = \"L\") & (DevCPM.oberon IN DevCPM.options) THEN\t(* old syntax: hex 64bit *)\r\t\t\t\t\t\tDevCPM.searchpos := DevCPM.curpos - 2; DevCPM.Get(ch);\r\t\t\t\t\t\tIF n <= 16 THEN\r\t\t\t\t\t\t\tIF (n = 16) & (dig[0] > \"7\") THEN realval := -1 END;\r\t\t\t\t\t\t\tWHILE (i < n) & (i < 10) DO realval := realval * 10H + Ord(dig[i], TRUE); INC(i) END;\r\t\t\t\t\t\t\tWHILE i < n DO realval := realval * 10H; intval := intval * 10H + Ord(dig[i], TRUE); INC(i) END;\r\t\t\t\t\t\t\tnumtyp := int64\r\t\t\t\t\t\tELSE err(203)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSIF n <= 8 THEN\r\t\t\t\t\t\tIF (n = 8) & (dig[0] > \"7\") THEN (* prevent overflow *) intval := -1 END;\r\t\t\t\t\t\tWHILE i < n DO intval := intval*10H + Ord(dig[i], TRUE); INC(i) END;\r\t\t\t\t\t\tIF tch = \"S\" THEN\t(* 32 bit hex float *)\r\t\t\t\t\t\t\tr := "
                    attr: 0
                  - text: SYSTEM.VAL
                    attr: 3
                  - text: "(SHORTREAL, intval);\r\t\t\t\t\t\t\trealval := r; intval := 0; numtyp := real32\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE err(203)\r\t\t\t\t\tEND\r\t\t\t\tELSIF ch = \"L\" THEN\t(* hex 64bit *)\r\t\t\t\t\tDevCPM.searchpos := DevCPM.curpos - 1; DevCPM.Get(ch);\r\t\t\t\t\tIF n <= 16 THEN\r\t\t\t\t\t\tIF (n = 16) & (dig[0] > \"7\") THEN realval := -1 END;\r\t\t\t\t\t\tWHILE (i < n) & (i < 10) DO realval := realval * 10H + Ord(dig[i], TRUE); INC(i) END;\r\t\t\t\t\t\tWHILE i < n DO realval := realval * 10H; intval := intval * 10H + Ord(dig[i], TRUE); INC(i) END;\r\t\t\t\t\t\tnumtyp := int64\r\t\t\t\t\tELSE err(203)\r\t\t\t\t\tEND\r\t\t\t\tELSIF ch = \"R\" THEN\t(* hex float 64bit *)\r\t\t\t\t\tDevCPM.searchpos := DevCPM.curpos - 1; DevCPM.Get(ch);\r\t\t\t\t\tIF n <= 16 THEN\r\t\t\t\t\t\ta := 0; IF (n = 16) & (dig[0] > \"7\") THEN (* prevent overflow *) a := -1 END;\r\t\t\t\t\t\tWHILE i < n-8 DO a := a*10H + Ord(dig[i], TRUE); INC(i) END;\r\t\t\t\t\t\tIF DevCPM.LEHost THEN arr[1] := a ELSE arr[0] := a END;\r\t\t\t\t\t\ta := 0; IF (n >= 8) & (dig[i] > \"7\") THEN (* prevent overflow *) a := -1 END;\r\t\t\t\t\t\tWHILE i < n DO a := a*10H + Ord(dig[i], TRUE); INC(i) END;\r\t\t\t\t\t\tIF DevCPM.LEHost THEN arr[0] := a ELSE arr[1] := a END;\r\t\t\t\t\t\trealval := "
                    attr: 0
                  - text: SYSTEM.VAL
                    attr: 3
                  - text: "(REAL, arr);\r\t\t\t\t\t\tintval := 0; numtyp := real64\r\t\t\t\t\tELSE err(203)\r\t\t\t\t\tEND\r\t\t\t\tELSE\t(* decimal *) \r\t\t\t\t\tWHILE i < n DO d := Ord(dig[i], FALSE); INC(i);\r\t\t\t\t\t\ta := (MAX(INTEGER) - d) DIV 10;\r\t\t\t\t\t\tIF intval > a THEN\r\t\t\t\t\t\t\ta := (intval - a + 65535) DIV 65536 * 65536;\r\t\t\t\t\t\t\trealval := realval + a; intval := intval - a\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\trealval := realval * 10; intval := intval * 10 + d\r\t\t\t\t\tEND;\r\t\t\t\t\tIF realval = 0 THEN numtyp := integer\r\t\t\t\t\tELSIF intval < 9223372036854775808.0E0 - realval THEN numtyp := int64\t(* 2^63 *)\r\t\t\t\t\tELSE intval := 0; err(203)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tELSE err(203)\r\t\t\tEND\r\t\tELSE (* fraction *)\r\t\t\tf := 0; g := 0; e := 0; j := 0; expCh := \"E\";\r\t\t\t"
                    attr: 0
                  - text: "WHILE (j < 15) & (j < n) DO g := g * 10 + Ord(dig[j], FALSE); INC(j) END;\t(* !!! *)\r\t\t\tWHILE n > j DO (* 0 <= f < 1 *) DEC(n); f := (Ord(dig[n], FALSE) + f)/10 END;"
                    attr: 3
                  - text: "\r\t\t\tIF (ch = \"E\") OR (ch = \"D\") & (DevCPM.oberon IN DevCPM.options) THEN\r\t\t\t\texpCh := ch; DevCPM.searchpos := DevCPM.curpos - 1; DevCPM.Get(ch); neg := FALSE;\r\t\t\t\tIF ch = \"-\" THEN neg := TRUE; DevCPM.Get(ch)\r\t\t\t\tELSIF ch = \"+\" THEN DevCPM.Get(ch)\r\t\t\t\tEND;\r\t\t\t\tIF (\"0\" <= ch) & (ch <= \"9\") THEN\r\t\t\t\t\tREPEAT n := Ord(ch, FALSE); DevCPM.Get(ch);\r\t\t\t\t\t\tIF e <= (MAX(SHORTINT) - n) DIV 10 THEN e := SHORT(e*10 + n)\r\t\t\t\t\t\tELSE err(203)\r\t\t\t\t\t\tEND\r\t\t\t\t\tUNTIL (ch < \"0\") OR (\"9\" < ch);\r\t\t\t\t\tIF neg THEN e := -e END\r\t\t\t\tELSE err(2)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tDEC(e, i-d-m); (* decimal point shift *)\r\t\t\t"
                    attr: 0
                  - text: "IF e < -308 - 16 THEN\r\t\t\t\trealval := 0.0\r\t\t\tELSIF e < -308 + 14 THEN\r\t\t\t\trealval := (f + g) / Math.IntPower(10, j-e-30) / 1.0E15 / 1.0E15\r\t\t\tELSIF e < j THEN\r\t\t\t\trealval := (f + g) / Math.IntPower(10, j-e)"
                    attr: 3
                  - text: "\t(* Ten(j-e) *)\r\t\t\t"
                    attr: 0
                  - text: "ELSIF e <= 308 THEN\r\t\t\t\trealval := (f + g)"
                    attr: 3
                  - text: " * "
                    attr: 0
                  - text: "Math.IntPower(10, e-j)"
                    attr: 3
                  - text: "\t(* Ten(e-j) *)\r"
                    attr: 0
                  - text: "\t\t\tELSIF e = 308 + 1 THEN\r\t\t\t\trealval := (f + g) * (Math.IntPower(10, e-j) / 16);\r\t\t\t\tIF realval <= DevCPM.MaxReal64 / 16 THEN realval := realval * 16\r\t\t\t\tELSE err(203)\r\t\t\t\tEND\r"
