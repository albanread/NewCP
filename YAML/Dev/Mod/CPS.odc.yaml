                  - text: "\t\t\tELSE err(203)\r\t\t\tEND;\r\t\t\tnumtyp := real\r\t\tEND\r\tEND Number;\r\r\tPROCEDURE Get*(VAR sym: BYTE);\r\t\tVAR s: BYTE; old: INTEGER;\r\r\t\tPROCEDURE Comment;\t(* do not read after end of file *)\r\t\tBEGIN DevCPM.Get(ch);\r\t\t\tLOOP\r\t\t\t\tLOOP\r\t\t\t\t\tWHILE ch = \"(\" DO DevCPM.Get(ch);\r\t\t\t\t\t\tIF ch = \"*\" THEN Comment END\r\t\t\t\t\tEND ;\r\t\t\t\t\tIF ch = \"*\" THEN DevCPM.Get(ch); EXIT END ;\r\t\t\t\t\tIF ch = DevCPM.Eot THEN EXIT END ;\r\t\t\t\t\tDevCPM.Get(ch)\r\t\t\t\tEND ;\r\t\t\t\tIF ch = \")\" THEN DevCPM.Get(ch); EXIT END ;\r\t\t\t\tIF ch = DevCPM.Eot THEN err(5); EXIT END\r\t\t\tEND\r\t\tEND Comment;\r\r\tBEGIN\r\t\tDevCPM.errpos := DevCPM.curpos-1;\r\t\tWHILE (ch <= \" \") OR (ch = 0A0X) DO (*ignore control characters*)\r\t\t\tIF ch = DevCPM.Eot THEN sym := eof; RETURN\r\t\t\tELSE DevCPM.Get(ch)\r\t\t\tEND\r\t\tEND ;\r\t\tDevCPM.startpos := DevCPM.curpos - 1;\r\t\tCASE ch OF   (* ch > \" \" *)\r\t\t\t| 22X, 27X  : Str(s)\r\t\t\t| \"#\"  : s := neq; DevCPM.Get(ch)\r\t\t\t| \"&\"  : s :=  and; DevCPM.Get(ch)\r\t\t\t| \"(\"  : DevCPM.Get(ch);\r\t\t\t\t\t IF ch = \"*\" THEN Comment; old := DevCPM.errpos; Get(s); DevCPM.errpos := old; \r\t\t\t\t\t ELSE s := lparen\r\t\t\t\t\t END\r\t\t\t| \")\"  : s := rparen; DevCPM.Get(ch)\r\t\t\t| \"*\"  : s :=  times; DevCPM.Get(ch)\r\t\t\t| \"+\"  : s :=  plus; DevCPM.Get(ch)\r\t\t\t| \",\"  : s := comma; DevCPM.Get(ch)\r\t\t\t| \"-\"  : s :=  minus; DevCPM.Get(ch)\r\t\t\t| \".\"  : DevCPM.Get(ch);\r\t\t\t\t\t\t\t IF ch = \".\" THEN DevCPM.Get(ch); s := upto ELSE s := period END\r\t\t\t| \"/\"  : s := slash;  DevCPM.Get(ch)\r\t\t\t| \"0\"..\"9\": Number; s := number\r\t\t\t| \":\"  : DevCPM.Get(ch);\r\t\t\t\t\t\t\t IF ch = \"=\" THEN DevCPM.Get(ch); s := becomes ELSE s := colon END\r\t\t\t| \";\"  : s := semicolon; DevCPM.Get(ch)\r\t\t\t| \"<\"  : DevCPM.Get(ch);\r\t\t\t\t\t\t\t IF ch = \"=\" THEN DevCPM.Get(ch); s := leq ELSE s := lss END\r\t\t\t| \"=\"  : s :=  eq