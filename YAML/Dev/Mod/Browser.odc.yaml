                  - text: "\r\t\t\t\ti := global.level - 1; WHILE i > 0 DO out.WriteTab; DEC(i) END;\r\t\t\t\tSection(out, s); out.WriteLn\r\t\t\tEND;\r\t\t\tdef.Append(buf);\r\t\t\tglobal.pos := 0;\r\t\t\tglobal.out.rider.SetPos(0)\r\t\tEND;\r\t\tglobal.gap := FALSE\r\tEND PutSection;\r\r\tPROCEDURE Scope (def: TextModels.Model; this: DevCPT.Name);\r\t\tVAR out: TextMappers.Formatter; i: INTEGER; a: TextModels.Attributes;\r\tBEGIN\r\t\tglobal.gap := FALSE; global.thisObj := this; global.singleton := (this # \"\");\r\t\tglobal.systemUsed := FALSE; global.comUsed := FALSE;\r\t\ti := 1; WHILE i < LEN(global.modUsed) DO global.modUsed[i] := FALSE; INC(i) END;\r\t\tout.ConnectTo(def);\r\t\tINC(global.level);\r\t\tIF ~(global.extensioninterface & global.singleton) THEN\r\t\t\tIF global.extensioninterface THEN\r\t\t\t\ta := global.out.rider.attr; global.out.rider.SetAttr(TextModels.NewColor(a, Ports.grey50))\r\t\t\tEND;\r\t\t\tObjects(DevCPT.GlbMod[1].right, {const});\r\t\t\tIF global.extensioninterface THEN global.out.rider.SetAttr(a) END;\r\t\t\tPutSection(out, \"CONST\")\r\t\tEND;\r\t\tObjects(DevCPT.GlbMod[1].right, {ptrType});\r\t\tObjects(DevCPT.GlbMod[1].right, {type}); PutSection(out, \"TYPE\");\r\t\tIF ~global.extensioninterface THEN\r\t\t\tObjects(DevCPT.GlbMod[1].right, {var}); PutSection(out, \"VAR\")\r\t\tEND;\r\t\tDEC(global.level);\r\t\tnum := 0; lev := 0; max := 0;\r\t\tObjects(DevCPT.GlbMod[1].right, {xProc, cProc}); PutSection(out, \"\")\r\tEND Scope;\r\r\tPROCEDURE Modules;\r\t\tVAR i, j, n: INTEGER;\r\tBEGIN\r\t\tn := 0; j := 2;\r\t\tIF global.systemUsed THEN INC(n) END;\r\t\tIF global.comUsed THEN INC(n) END;\r\t\tWHILE j < DevCPT.nofGmod DO\r\t\t\tIF global.modUsed[j] THEN INC(n) END;\r\t\t\tINC(j)\r\t\tEND;\r\t\tIF n > 0 THEN\r\t\t\tIndent; Section(global.out, \"IMPORT\"); INC(global.level);\r\t\t\tIF n < 10 THEN Char(\" \") ELSE Ln; Indent END;\r\t\t\ti := 0; j := 2;\r\t\t\tIF global.systemUsed THEN\r\t\t\t\tString(\"SYSTEM\"); INC(i);\r\t\t\t\tIF 