                  - text: "\r\r\tPROCEDURE PutSection (VAR out: TextMappers.Formatter; s: ARRAY OF CHAR);\r\t\tVAR buf, def: TextModels.Model; i: INTEGER;\r\tBEGIN\r\t\tbuf := global.out.rider.Base();\r\t\tIF buf.Length() > 0 THEN\r\t\t\tIF ~global.singleton THEN Ln END;\r\t\t\tdef := out.rider.Base(); out.SetPos(def.Length());\r\t\t\tIF s # \"\" THEN\t"
