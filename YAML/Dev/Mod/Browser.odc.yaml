                  - text: "\r\r\tPROCEDURE ^ Structure (typ: DevCPT.Struct);\r\r\tPROCEDURE Qualifier (mno: INTEGER);\r\tBEGIN\r\t\tIF (mno > 1) OR (mno = 1) & global.singleton THEN\r\t\t\tglobal.modUsed[mno] := TRUE;\r\t\t\tString(DevCPT.GlbMod[mno].name^); Char(\".\")\r\t\tEND\r\tEND Qualifier;\r\r\tPROCEDURE LocalName (obj: DevCPT.Object);\r\tBEGIN\r\t\tQualifier(0); String(obj.name^)\r\tEND LocalName;\r\r\tPROCEDURE TypName (typ: DevCPT.Struct; force: BOOLEAN);\r\tBEGIN\r\t\tIF force OR IsLegal(typ.strobj.name) THEN\r\t\t\tIF (typ.mno > 1) OR (typ.mno = 1)\r\t\t\t\t& ((typ.form >= pointer) OR (typ.BaseTyp # DevCPT.undftyp)) & global.singleton\r\t\t\tTHEN\r\t\t\t\tQualifier(typ.mno)\r\t\t\tELSIF typ = DevCPT.sysptrtyp THEN\t"
                    attr: 0
                  - text: "(* PTR is in SYSTEM *)"
                    attr: 1
                  - text: "\r\t\t\t\tString(\"SYSTEM.\");\r\t\t\t\tglobal.systemUsed := TRUE\r\t\t\tELSIF\r\t\t\t\t(typ = DevCPT.guidtyp) OR (typ = DevCPT.restyp) OR (typ = DevCPT.iunktyp) OR (typ = DevCPT.punktyp)\r\t\t\tTHEN\r\t\t\t\tString(\"COM.\");\r\t\t\t\tglobal.comUsed := TRUE\r\t\t\tEND;\r\t\t\tIF force THEN ProperString(typ.strobj.name^) ELSE String(typ.strobj.name^) END\r\t\tELSE\r\t\t\tStructure(typ)\r\t\tEND\r\tEND TypName;\r\r\tPROCEDURE ParList (VAR par: DevCPT.Object);\r\tBEGIN\r\t\tIF par.mode = varPar THEN\r\t\t\tIF par.vis = inPar THEN Keyword(\"IN\")\r\t\t\tELSIF par.vis = outPar THEN Keyword(\"OUT\")\r\t\t\tELSE Keyword(\"VAR\")\r\t\t\tEND;\r\t\t\tParSysFlag(par.sysflag); Char(\" \")\r\t\tEND;\r\t\tString(par.name^);\r\t\tWHILE (par.link # NIL) & (par.link.typ = par.typ) & (par.link.mode = par.mode)\r\t\t\t\t& (par.link.vis = par.vis) & (par.link.sysflag = par.sysflag) DO\n\r\t\t\tpar := par.link; String(\", \"); String(par.name^)\r\t\tEND;\r\t\tString(\": \"); TypName(par.typ, FALSE)\r\tEND ParList;\r\r\tPROCEDURE Signature (result: DevCPT.Struct; par: DevCPT.Object);\r\t\tVAR paren, res: BOOLEAN;\r\tBEGIN\r\t\tres := result # DevCPT.notyp; paren := res OR (par # NIL);\r\t\tIF paren THEN String(\" (\") END;\r\t\tIF par # NIL THEN\r\t\t\tParList(par); par := par.link;\r\t\t\tWHILE par # NIL DO String(\"; \"); ParList(par); par := par.link END\r\t\tEND;\r\t\tIF paren THEN Char(\")\") END;\r\t\tIF res THEN String(\": \"); TypName(result, FALSE) END\r\tEND Signature;\r\r\tPROCEDURE TProcs (rec: DevCPT.Struct; fld: DevCPT.Object; oldProcs: TProcList; VAR newProcs: TProcList);\r\t\tVAR old: DevCPT.Object; p, elem: TProcList;\r\tBEGIN\r\t\tIF fld # NIL THEN\r\t\t\tTProcs(rec, fld.left, oldProcs, newProcs);\r\t\t\tIF (fld.mode = tProc) & IsLegal(fld.name) THEN\r\t\t\t\tDevCPT.FindBaseField(fld.name^, rec, old);\r\t\t\t\tIF (old = NIL) OR (fld.typ # old.typ) OR (* (rec.attribute # 0) & *) (fld.conval.setval # old.conval.setval)\r\t\t\t\tTHEN\r\t\t\t\t\tIF global.extensioninterface OR global.clientinterface THEN\r\t\t\t\t\t\t(* do not show methods with equal name *)\r\t\t\t\t\t\tp := oldProcs;\r\t\t\t\t\t\tWHILE (p # NIL) & (p.fld.name^ # fld.name^) DO p := p.next END\r\t\t\t\t\tEND;\r\t\t\t\t\tIF p = NIL THEN\r\t\t\t\t\t\tNEW(elem); elem.next := newProcs; newProcs := elem;\r\t\t\t\t\t\telem.fld := fld;\r\t\t\t\t\t\tIF old = NIL THEN INCL(elem.attr, newAttr) END;\r\t\t\t\t\t\tIF absAttr IN fld.conval.setval THEN INCL(elem.attr, absAttr)\r\t\t\t\t\t\tELSIF empAttr IN fld.conval.setval THEN INCL(elem.attr, empAttr)\r\t\t\t\t\t\tELSIF extAttr IN fld.conval.setval THEN INCL(elem.attr, extAttr)\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tTProcs(rec, fld.right, oldProcs, newProcs)\r\t\tEND\r\tEND TProcs;\r\r(*\r\tPROCEDURE AdjustTProcs (typ: DevCPT.Struct; fld: DevCPT.Object);\r\t\tVAR receiver, old: DevCPT.Object; base: DevCPT.Struct;\r\tBEGIN\r\t\tIF fld # NIL THEN\r\t\t\tAdjustTProcs(typ, fld.left);\r\t\t\tIF (fld.mode = tProc) & IsLegal(fld.name) THEN\r\t\t\t\tDevCPT.FindBaseField(fld.name^, typ, old);\r\t\t\t\tIF old # NIL THEN\r\t\t\t\t\tIF fld.conval.setval * {absAttr, empAttr, extAttr} = {} THEN\r\t\t\t\t\t\told.conval.setval := old.conval.setval - {absAttr, empAttr, extAttr}\r\t\t\t\t\tELSIF (extAttr IN fld.conval.setval) & (empAttr IN old.conval.setval) THEN\r\t\t\t\t\t\t(* do not list methods which only change attribute from empty to extensible *)\r\t\t\t\t\t\told.conval.setval := old.conval.setval + {extAttr} - {empAttr}\r\t\t\t\t\tEND;\r\t\t\t\t\tIF fld.typ # old.typ THEN (* do not show base methods of covariant overwritten methods *)\r\t\t\t\t\t\told.typ := fld.typ; old.conval.setval := {}\r\t\t\t\t\tEND;\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tAdjustTProcs(typ, fld.right)\r\t\tEND;\r\t\tIF (typ.BaseTyp # NIL) & (typ.BaseTyp # DevCPT.iunktyp) THEN\r\t\t\tAdjustTProcs(typ.BaseTyp, typ.BaseTyp.link)\r\t\tEND\r\tEND AdjustTProcs;\r*)\r\r\tPROCEDURE TypeboundProcs (typ: DevCPT.Struct; VAR cont: BOOLEAN; top: BOOLEAN;\r\t\t\t\t\t\t\t\t\t\t\t\tVAR list: TProcList; recAttr: INTEGER);\r\t\tVAR receiver: DevCPT.Object; new, p, q: TProcList;\r\tBEGIN\r\t\tIF (typ # NIL) & (typ # DevCPT.iunktyp) THEN\r\t\t\tTProcs(typ, typ.link, list, new);\r\r\t\t\tp := list;\r\t\t\tWHILE new # NIL DO\r\t\t\t\tq := new.next; new.next := p; p := new; new := q\r\t\t\tEND;\r\t\t\tlist := p;\r\r\t\t\tIF global.flatten THEN\r\t\t\t\tTypeboundProcs(typ.BaseTyp, cont, FALSE, list, recAttr);\r\t\t\t\tIF (typ.BaseTyp = NIL) OR (typ.BaseTyp = DevCPT.iunktyp) THEN\r(*\r\t\t\t\t\tIF global.extensioninterface & (recAttr IN {absAttr, extAttr}) THEN\r\t\t\t\t\t\tIF cont THEN Char(\";\") END;\r\t\t\t\t\t\tLn; Indent;\r\t\t\t\t\t\tString(\"(a: ANYPTR) FINALIZE-, \"); Keyword(\"NEW\"); String(\", \"); Keyword(\"EMPTY\");\r\t\t\t\t\t\tcont := TRUE\r\t\t\t\t\tEND\r*)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF top THEN (* writeList *)\r\t\t\t\tWHILE list # NIL DO\r\t\t\t\t\tIF ~global.clientinterface & ~global.extensioninterface (* default *)\r\t\t\t\t\tOR global.clientinterface & (list.fld.vis = external)\r\t\t\t\t\tOR global.extensioninterface & (recAttr IN {absAttr, extAttr}) & (list.attr * {absAttr, empAttr, extAttr} # {})\r\t\t\t\t\tTHEN\r\r\t\t\t\t\t\tIF cont THEN Char(\";\") END;\r\t\t\t\t\t\tLn;\r\t\t\t\t\t\treceiver := list.fld.link;\r\t\t\t\t\t\tIndent; Hint(\"entry \", list.fld.num, TRUE);\r\t(*\r\t\t\t\t\t\tKeyword(\"PROCEDURE\"); String(\" (\");\r\t*)\r\t\t\t\t\t\tChar(\"(\");\r\t\t\t\t\t\tIF receiver.mode = varPar THEN\r\t\t\t\t\t\t\tIF receiver.vis = inPar THEN Keyword(\"IN\") ELSE Keyword(\"VAR\") END;\r\t\t\t\t\t\t\tChar(\" \")\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tString(receiver.name^); String(\": \");\r\t\t\t\t\t\tIF IsLegal(receiver.typ.strobj.name) & (receiver.typ.mno = 1) THEN\r\t\t\t\t\t\t\tString(receiver.typ.strobj.name^)\r\t\t\t\t\t\tELSE TypName(receiver.typ, FALSE)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tString(\") \"); String(list.fld.name^); Vis(list.fld.vis);\r\t\t\t\t\t\tSysStrings(list.fld);\r\t\t\t\t\t\tSignature(list.fld.typ, receiver.link);\r\t\t\t\t\t\tIF newAttr IN list.attr THEN String(\", \"); Keyword(\"NEW\") END;\r\t\t\t\t\t\tIF absAttr IN list.attr THEN String(\", \"); Keyword(\"ABSTRACT\")\r\t\t\t\t\t\tELSIF empAttr IN list.attr THEN String(\", \"); Keyword(\"EMPTY\")\r\t\t\t\t\t\tELSIF extAttr IN list.attr THEN String(\", \"); Keyword(\"EXTENSIBLE\")\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tcont := TRUE\r\t\t\t\t\tEND;\r\t\t\t\t\tlist := list.next\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND TypeboundProcs;\r\r\tPROCEDURE Flds (typ: DevCPT.Struct; VAR cont: BOOLEAN);\r\t\tVAR fld: DevCPT.Object;\r\tBEGIN\r\t\tfld := typ.link;\r\t\tWHILE (fld # NIL) & (fld.mode = field) DO\r\t\t\tIF IsLegal(fld.name) THEN\r\t\t\t\tIF cont THEN Char(\";\") END;\r\t\t\t\tLn;\r\t\t\t\tIndent; Hint(\"offset \", fld.adr, TRUE);\r\t\t\t\tIF typ.mno > 1 THEN String(\"(* \"); TypName(typ, TRUE); String(\" *) \") END;\r\t\t\t\tString(fld.name^);\r\t\t\t\tWHILE (fld.link # NIL) & (fld.link.typ = fld.typ) & (fld.link.name # NIL) DO\r\t\t\t\t\tVis(fld.vis); fld := fld.link; String(\", \"); String(fld.name^)\r\t\t\t\tEND;\r\t\t\t\tVis(fld.vis); String(\": \"); TypName(fld.typ, FALSE);\r\t\t\t\tcont := TRUE\r\t\t\tEND;\r\t\t\tfld := fld.link\r\t\tEND\r\tEND Flds;\r\r\tPROCEDURE Fields (typ: DevCPT.Struct; VAR cont: BOOLEAN);\r\tBEGIN\r\t\tIF typ # NIL THEN\r\t\t\tIF global.flatten THEN Fields(typ.BaseTyp, cont) END;\r\t\t\tFlds(typ, cont)\r\t\tEND\r\tEND Fields;\r\r\tPROCEDURE BaseTypes (typ: DevCPT.Struct);\r\tBEGIN\r\t\tIF typ.BaseTyp # NIL THEN\r\t\t\tChar(\"(\"); TypName(typ.BaseTyp, TRUE);\r\t\t\tIF global.flatten THEN BaseTypes(typ.BaseTyp) END;\r\t\t\tChar(\")\")\r\t\tEND\r\tEND BaseTypes;\r\r\tPROCEDURE Structure (typ: DevCPT.Struct);\r\t\tVAR cont: BOOLEAN; p: TProcList;\r\tBEGIN\r\t\tINC(global.level);\r\t\tCASE typ.form OF\r\t\t  pointer:\r\t\t\tKeyword(\"POINTER\"); StructSysFlag(typ); Char(\" \");\r\t\t\tKeyword(\"TO\"); Char(\" \"); DEC(global.level); TypName(typ.BaseTyp, FALSE); INC(global.level)\r\t\t| procTyp:\r\t\t\tKeyword(\"PROCEDURE\"); ProcSysFlag(typ.sysflag); Signature(typ.BaseTyp, typ.link)\r\t\t| comp:\r\t\t\tCASE typ.comp OF\r\t\t\t  array:\r\t\t\t\tKeyword(\"ARRAY\"); StructSysFlag(typ); Char(\" \"); Int(typ.n); Char(\" \");\r\t\t\t\tKeyword(\"OF\"); Char(\" \"); TypName(typ.BaseTyp, FALSE)\r\t\t\t| dynArray:\r\t\t\t\tKeyword(\"ARRAY\"); StructSysFlag(typ); Char(\" \");\r\t\t\t\tKeyword(\"OF\"); Char(\" \"); TypName(typ.BaseTyp, FALSE)\r\t\t\t| record:\r\t\t\t\tIF typ.attribute = absAttr THEN Keyword(\"ABSTRACT \")\r\t\t\t\tELSIF typ.attribute = limAttr THEN Keyword(\"LIMITED \")\r\t\t\t\tELSIF typ.attribute = extAttr THEN Keyword(\"EXTENSIBLE \")\r\t\t\t\tEND;\r\t\t\t\tKeyword(\"RECORD\"); StructSysFlag(typ);\r\t\t\t\tChar(\" \"); Hint3(\"tprocs \", \", size \", \", align \", typ.n, typ.size, typ.align);\r\t\t\t\tcont := FALSE;\r\t\t\t\tBaseTypes(typ); Fields(typ, cont); TypeboundProcs(typ, cont, TRUE, p, typ.attribute);\r\t\t\t\tIF cont THEN Ln; DEC(global.level); Indent; INC(global.level) ELSE Char (\" \") END;\r\t\t\t\tKeyword(\"END\")\r\t\t\tEND\r\t\tELSE\r\t\t\tIF (typ.BaseTyp # DevCPT.undftyp) THEN TypName(typ.BaseTyp, FALSE) END\t(* alias structures *)\r\t\tEND;\r\t\tDEC(global.level)\r\tEND Structure;\r\r\tPROCEDURE Const (obj: DevCPT.Object);\r\t\tVAR con: DevCPT.Const; s: SET; i, x, y: INTEGER; r: REAL;\r\tBEGIN\r\t\tIndent; LocalName(obj); SysStrings(obj); String(\" = \");\r\t\tcon := obj.conval;\r\t\tCASE obj.typ.form OF\r\t\t  bool:\r\t\t\tIF con.intval = 1 THEN String(\"TRUE\") ELSE String(\"FALSE\") END\r\t\t| sChar, char:\r\t\t\tIF con.intval >= 0A000H THEN\r\t\t\t\tHex(con.intval, 5); Char(\"X\")\r\t\t\tELSIF con.intval >= 0100H THEN\r\t\t\t\tHex(con.intval, 4); Char(\"X\")\r\t\t\tELSIF con.intval >= 0A0H THEN\r\t\t\t\tHex(con.intval, 3); Char(\"X\")\r\t\t\tELSIF (con.intval >= 32) & (con.intval <= 126) THEN\r\t\t\t\tChar(22X); Char(CHR(con.intval)); Char(22X)\r\t\t\tELSE\r\t\t\t\tHex(con.intval, 2); Char(\"X\")\r\t\t\tEND\r\t\t| byte, sInt, int:\r\t\t\tInt(con.intval)\r\t\t| lInt:\r\t\t\ty := SHORT(ENTIER((con.realval + con.intval) / 4294967296.0));\r\t\t\tr := con.realval + con.intval - y * 4294967296.0;\r\t\t\tIF r > MAX(INTEGER) THEN r := r - 4294967296.0 END;\r\t\t\tx := SHORT(ENTIER(r));\r\t\t\tHex(y, 8); Hex(x, 8); Char(\"L\")\r\t\t| set:\r\t\t\tChar(\"{\"); i := 0; s := con.setval;\r\t\t\tWHILE i <= MAX(SET) DO\r\t\t\t\tIF i IN s THEN Int(i); EXCL(s, i);\r\t\t\t\t\tIF s # {} THEN String(\", \") END\r\t\t\t\tEND;\r\t\t\t\tINC(i)\r\t\t\tEND;\r\t\t\tChar(\"}\")\r\t\t| sReal, real:\r\t\t\tglobal.out.WriteReal(con.realval)\r\t\t| sString:\r\t\t\tStringConst(con.ext^, FALSE)\r\t\t| string:\r\t\t\tStringConst(con.ext^, TRUE)\r\t\t| nilTyp:\r\t\t\tKeyword(\"NIL\")\r\t\t| comp:\t(* guid *)\r\t\t\tChar(\"{\"); Guid(con.ext); Char(\"}\")\r\t\tEND;\r\t\tChar(\";\"); Ln\r\tEND Const;\r\r\tPROCEDURE AliasType (typ: DevCPT.Struct);\r\tBEGIN\r\t\tIF global.singleton & IsLegal(typ.strobj.name) THEN\r\t\t\tWHILE typ.BaseTyp # DevCPT.undftyp DO\r\t\t\t\tChar(\";\"); Ln; Indent;\r\t\t\t\tString(typ.strobj.name^); SysStrings(typ.strobj); String(\" = \");\r\t\t\t\tIF typ.form >= pointer THEN\r\t\t\t\t\tStructure(typ); typ := DevCPT.int16typ\r\t\t\t\tELSE\r\t\t\t\t\ttyp := typ.BaseTyp;\r\t\t\t\t\tTypName(typ, FALSE)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND AliasType;\r\r\tPROCEDURE NotExtRec(typ: DevCPT.Struct): BOOLEAN;\r\tBEGIN\r\t\tRETURN (typ.form = comp) & ((typ.comp # record) OR ~(typ.attribute IN {absAttr, extAttr}))\r\t\t\tOR (typ.form = procTyp)\r\tEND NotExtRec;\r\r\tPROCEDURE Type (obj: DevCPT.Object);\r\tBEGIN\r\t\tIF global.hideHooks & IsHook(obj.typ) THEN "
