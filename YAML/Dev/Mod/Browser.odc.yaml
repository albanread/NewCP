                  - text: "\t\t\t\tview := Documents.dir.New(v, p.w, p.h)\r\t\t\tELSE\r\t\t\t\tKernel.Utf8ToString(mod$, str, res);\r\t\t\t\tKernel.Utf8ToString(ident$, str1, res);\r\t\t\t\ttitle := \"\";\r\t\t\t\tIF global.extensioninterface THEN\r\t\t\t\t\tDialog.ShowParamMsg(noSuchExtItemExportedKey, str, str1, \"\")\r\t\t\t\tELSE\r\t\t\t\t\tDialog.ShowParamMsg(noSuchItemExportedKey, str, str1, \"\")\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE\r\t\t\tglobal.level := 1; Scope(def, \"\");\r\t\t\tSection(global.out, \"END\"); Char(\" \"); String(mod); Char(\".\"); Ln;\r\t\t\tdef.Append(buf);\r\t\t\tSection(global.out, \"DEFINITION\"); Char(\" \"); String(mod);\r\t\t\tIF (DevCPT.GlbMod[1].library # NIL) THEN\r\t\t\t\tString(' [\"'); String(DevCPT.GlbMod[1].library^); String('\"]')\r\t\t\tELSIF DevCPT.impProc # 0 THEN\r\t\t\t\tglobal.out.WriteTab; String(\"(* nonportable\");\r\t\t\t\tIF DevCPT.impProc = 10 THEN String(\" (i386)\")\r\t\t\t\tELSIF DevCPT.impProc = 20 THEN String(\" (68k)\")\r\t\t\t\tEND;\r\t\t\t\tString(\" *)\")\r\t\t\tEND;\r\t\t\tChar(\";\"); Ln; Ln;\r\t\t\tModules;\r\t\t\tbuf.Append(def);\r\t\t\tv := TextViews.dir.New(buf);\r\t\t\tv.SetDefaults(NewRuler(), TextViews.dir.defAttr);\r"
