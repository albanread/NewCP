                  - text: "\r\t\timport = 100; module = 101; semicolon = 102; becomes = 103; comEnd = 104;\r\r\t\tmodNotFoundKey = \"#Dev:ModuleNotFound\";\r\t\tnoSuchItemExportedKey = \"#Dev:NoSuchItemExported\";\r\t\tnoSuchExtItemExportedKey = \"#Dev:NoSuchExtItemExported\";\r\t\tnoModuleNameSelectedKey = \"#Dev:NoModuleNameSelected\";\r\t\tnoItemNameSelectedKey = \"#Dev:NoItemNameSelected\";\r\r\t\tregKey = \"Dev\\Browser\\\";\r\r\tTYPE\r\t\tTProcList = POINTER TO RECORD\r\t\t\tfld: DevCPT.Object;\r\t\t\tattr: SET;\t(* newAttr *)\r\t\t\tnext: TProcList\r\t\tEND;\r\r\tVAR\r\t\tglobal: RECORD\r\t\t\thints: BOOLEAN;\t"
