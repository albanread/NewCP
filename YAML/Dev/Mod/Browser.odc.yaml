                  - text: "\r\t\t\tformatted*: BOOLEAN;\r\t\t\tshints, sflatten, sformatted: BOOLEAN\t(* saved values *)\r\t\tEND;\r\r\tPROCEDURE IsHook(typ: DevCPT.Struct): BOOLEAN;\r\tBEGIN\r\t\tWHILE ((typ.form = pointer) OR (typ.form = comp)) & (typ.BaseTyp # NIL) DO typ := typ.BaseTyp END;\r\t\tRETURN (DevCPT.GlbMod[typ.mno].name^ = \"Kernel\") & (typ.strobj.name^ = \"Hook^\")\r\tEND IsHook;\r\r\t"
                    attr: 0
                  - text: "(* auxilliary *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE GetSelection (VAR text: TextModels.Model; VAR beg, end: INTEGER);\r\t\tVAR c: TextControllers.Controller;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\ttext := c.text; c.GetSelection(beg, end)\r\t\tELSE\r\t\t\ttext := NIL\r\t\tEND\r\tEND GetSelection;\r\r\tPROCEDURE GetQualIdent (VAR mod, ident: DevCPT.Name; VAR t: TextModels.Model);\r\t\tVAR s: TextMappers.Scanner; beg, end, res: INTEGER;\r\tBEGIN\r\t\tGetSelection(t, beg, end);\r\t\tIF t # NIL THEN\r\t\t\ts.ConnectTo(t); s.SetOpts({7});\t"
                    attr: 0
                  - text: "(* acceptUnderscores *)"
                    attr: 1
                  - text: "\r\t\t\ts.SetPos(beg); s.Scan;\r\t\t\tIF (s.type = TextMappers.string) & (s.len < LEN(mod)) THEN\r\t\t\t\tKernel.StringToUtf8(s.string, mod, res); \r\t\t\t\ts.Scan;\r\t\t\t\tIF (s.type = TextMappers.char) & (s.char = \".\") & (s.Pos() "
                    attr: 0
                  - text: <=
                    attr: 3
                  - text: " end) THEN\r\t\t\t\t\ts.Scan;\r\t\t\t\t\tIF (s.type = TextMappers.string) & (s.len < LEN(ident)) THEN\r\t\t\t\t\t\tKernel.StringToUtf8(s.string, ident, res);\r\t\t\t\t\tELSE mod[0] := 0X; ident[0] := 0X\r\t\t\t\t\tEND\r\t\t\t\tELSE ident[0] := 0X\r\t\t\t\tEND\r\t\t\tELSE mod[0] := 0X; ident[0] := 0X\r\t\t\tEND\r\t\tELSE mod[0] := 0X; ident[0] := 0X\r\t\tEND\r\tEND GetQualIdent;\r\r\tPROCEDURE Scan (VAR s: TextMappers.Scanner);\r\tBEGIN\r\t\ts.Scan;\r\t\tIF s.type = TextMappers.string THEN\r\t\t\tIF s.string = \"IMPORT\" THEN s.type := import\r\t\t\tELSIF s.string = \"MODULE\" THEN s.type := module\r\t\t\tEND\r\t\tELSIF s.type = TextMappers.char THEN\r\t\t\tIF s.char = \";\" THEN s.type := semicolon\r\t\t\tELSIF s.char = \":\" THEN\r\t\t\t\tIF s.rider.char = \"=\" THEN s.rider.Read; s.type := becomes END\r\t\t\tELSIF s.char = \"(\" THEN\r\t\t\t\tIF s.rider.char = \"*\" THEN\r\t\t\t\t\ts.rider.Read;\r\t\t\t\t\tREPEAT Scan(s) UNTIL (s.type = TextMappers.eot) OR (s.type = comEnd);\r\t\t\t\t\tScan(s)\r\t\t\t\tEND\r\t\t\tELSIF s.char = \"*\" THEN\r\t\t\t\tIF s.rider.char = \")\" THEN s.rider.Read; s.type := comEnd END\r\t\t\tEND\r\t\tEND\r\tEND Scan;\r\r\tPROCEDURE CheckModName (VAR mod: DevCPT.Name; t: TextModels.Model);\r\t\tVAR s: TextMappers.Scanner; res: INTEGER;\r\tBEGIN\r\t\ts.ConnectTo(t); s.SetPos(0); Scan(s);\r\t\tIF s.type = module THEN\r\t\t\tScan(s);\r\t\t\tWHILE (s.type # TextMappers.eot) & (s.type # import) DO Scan(s) END;\r\t\t\tWHILE (s.type # TextMappers.eot) & (s.type # semicolon)\r\t\t\t\t\t& ((s.type # TextMappers.string) OR (s.string # mod)) DO Scan(s) END;\r\t\t\tIF s.type = TextMappers.string THEN\r\t\t\t\tScan(s);\r\t\t\t\tIF s.type = becomes THEN\r\t\t\t\t\tScan(s);\r\t\t\t\t\tIF s.type = TextMappers.string THEN\r\t\t\t\t\t\tKernel.StringToUtf8(s.string, mod, res); \r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND CheckModName;\r\r\r\tPROCEDURE NewRuler (): TextRulers.Ruler;\r\t\tVAR ra: TextRulers.Attributes; p: TextRulers.Prop;\r\tBEGIN\r\t\tNEW(p); p.valid := {TextRulers.right, TextRulers.opts};\r\t\tp.opts.val := {(*TextRulers.rightFixed*)}; p.opts.mask := p.opts.val;\r\t\tp.right := width;\r\t\tNEW(ra); ra.InitFromProp(p);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TextRulers.dir.New(TextRulers.dir.NewStyle(ra))\r\tEND NewRuler;\r\r\tPROCEDURE Append (VAR d: ARRAY OF CHAR; s: ARRAY OF SHORTCHAR);\r\t\tVAR l, ld, ls: INTEGER;\r\tBEGIN\r\t\tl := LEN(d); ld := LEN(d$); ls := LEN(s$);\r\t\tIF ld + ls >= l THEN\r\t\t\ts[l - ld - 1] := 0X; d := d + s;\r\t\t\td[l - 2] := \".\"; d[l - 3] := \".\"; d[l - 4] := \".\"\r\t\tELSE\r\t\t\td := d + s\r\t\tEND\r\tEND Append;\r\r\tPROCEDURE IsLegal (name: POINTER TO ARRAY OF SHORTCHAR): BOOLEAN;\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\tIF name^ = \"\" THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE END;\r\t\tIF name[0] = \"@\" THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " global.hints END;\r\t\ti := 0;\r\t\tWHILE name[i] # 0X DO INC(i) END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " name[i-1] # \"^\"\r\tEND IsLegal;\r\r\r\t"
                    attr: 0
                  - text: "(* output formatting *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE Char (ch: CHAR);\r\tBEGIN\r\t\tglobal.out.WriteChar(ch)\r\tEND Char;\r\r\tPROCEDURE String (IN s: ARRAY OF SHORTCHAR);\r\t\tVAR res: INTEGER; n: ARRAY 256 OF CHAR;\r\tBEGIN\r\t\tKernel.Utf8ToString(s, n, res); "
                    attr: 0
                  - text: "\r"
                    attr: 4
                  - text: "\t\tglobal.out.WriteString("
                    attr: 0
                  - text: n
                    attr: 5
                  - text: ")\r\tEND String;\r\r\tPROCEDURE StringConst (s: ARRAY OF SHORTCHAR; long: BOOLEAN);\r\t\tVAR i, x, y: INTEGER; quoted, first: BOOLEAN;\r\tBEGIN\r\t\tIF long THEN\r\t\t\ti := 0; REPEAT DevCPM.GetUtf8(s, y, i) UNTIL (y = 0) OR (y >= 100H);\r\t\t\tIF y = 0 THEN global.out.WriteString(\"LONG(\") END\r\t\tEND;\r\t\ti := 0; quoted := FALSE; first := TRUE;\r\t\tIF long THEN DevCPM.GetUtf8(s, x, i) ELSE x := ORD(s[i]); INC(i) END;\r\t\tWHILE x # 0 DO\r\t\t\tIF (x < ORD(\" \"))\r\t\t\t\t\tOR (x >= 7FH) & (x <= 9FH)\r\t\t\t\t\tOR (x >= 0D800H) & (x <= 0F8FFH)\r\t\t\t\t\tOR (x >= 0FFF0H) THEN\t"
                    attr: 0
                  - text: "(* nonprintable character *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF quoted THEN global.out.WriteChar('\"') END;\r\t\t\t\tIF ~first THEN global.out.WriteString(\" + \") END;\r\t\t\t\tIF x >= 0A00H THEN global.out.WriteIntForm(x, TextMappers.hexadecimal, 4, \"0\", FALSE)\r\t\t\t\tELSIF x >= 0A0H THEN global.out.WriteIntForm(x, TextMappers.hexadecimal, 3, \"0\", FALSE)\r\t\t\t\tELSE global.out.WriteIntForm(x, TextMappers.hexadecimal, 2, \"0\", FALSE)\r\t\t\t\tEND;\r\t\t\t\tglobal.out.WriteChar(\"X\");\r\t\t\t\tquoted := FALSE\r\t\t\tELSE\t"
                    attr: 0
                  - text: "(* printable character *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF ~quoted THEN\r\t\t\t\t\tIF ~first THEN global.out.WriteString(\" + \") END;\r\t\t\t\t\tglobal.out.WriteChar('\"')\r\t\t\t\tEND;\r\t\t\t\tglobal.out.WriteChar(CHR(x));\r\t\t\t\tquoted := TRUE\r\t\t\tEND;\r\t\t\tIF long THEN DevCPM.GetUtf8(s, x, i) ELSE x := ORD(s[i]); INC(i) END;\r\t\t\tfirst := FALSE\r\t\tEND;\r\t\tIF first THEN global.out.WriteString('\"\"') END;\r\t\tIF quoted THEN global.out.WriteChar('\"') END;\r\t\tIF long & (y = 0) THEN global.out.WriteChar(\")\") END\r\tEND StringConst;\r\r\tPROCEDURE ProperString (s: ARRAY OF SHORTCHAR);\r\t\tVAR i, res: INTEGER; str: ARRAY LEN(DevCPT.Name) OF CHAR;\r\tBEGIN\r\t\tIF s # \"\" THEN\r\t\t\tKernel.Utf8ToString(s, str, res);\r\t\t\ti := 0; WHILE (s[i] # 0X) & (s[i] # \"^\") DO global.out.WriteChar(str[i]); INC(i) END\r\t\tEND\r\tEND ProperString;\r\r\tPROCEDURE Keyword (s: ARRAY OF CHAR);\r\t\tVAR a: TextModels.Attributes;\r\tBEGIN\r\t\tIF global.keyAttr # NIL THEN a := global.out.rider.attr; global.out.rider.SetAttr(global.keyAttr) END;\r\t\tglobal.out.WriteString(s);\r\t\tIF global.keyAttr # NIL THEN global.out.rider.SetAttr(a) END\r\tEND Keyword;\r\r\tPROCEDURE Section (VAR out: TextMappers.Formatter; s: ARRAY OF CHAR);\r\t\tVAR a: TextModels.Attributes;\r\tBEGIN\r\t\tIF global.sectAttr # NIL THEN a := out.rider.attr; out.rider.SetAttr(global.sectAttr) END;\r\t\tout.WriteString(s);\r\t\tIF global.sectAttr # NIL THEN out.rider.SetAttr(a) END\r\tEND Section;\r\r\tPROCEDURE Int (i: INTEGER);\r\tBEGIN\r\t\tglobal.out.WriteInt(i)\r\tEND Int;\r\r\tPROCEDURE Hex (x, n: INTEGER);\r\tBEGIN\r\t\tIF n > 1 THEN Hex(x DIV 16, n - 1) END;\r\t\tx := x MOD 16;\r\t\tIF x >= 10 THEN global.out.WriteChar(CHR(x + ORD(\"A\") - 10))\r\t\tELSE global.out.WriteChar(CHR(x + ORD(\"0\")))\r\t\tEND\r\tEND Hex;\r\r\tPROCEDURE Ln;\r\tBEGIN\r\t\tglobal.out.WriteLn\r\tEND Ln;\r\r\tPROCEDURE Indent;\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\tIF global.gap THEN global.gap := FALSE; Ln END;\r\t\ti := global.level; WHILE i > 0 DO global.out.WriteTab; DEC(i) END\r\tEND Indent;\r\r\tPROCEDURE Guid (ext: DevCPT.ConstExt);\r\tBEGIN\r\t\tChar(\"{\");\r\t\tHex(ORD(ext[2]) + 256 * ORD(ext[3]), 4);\r\t\tHex(ORD(ext[0]) + 256 * ORD(ext[1]), 4);\r\t\tChar(\"-\");\r\t\tHex(ORD(ext[4]) + 256 * ORD(ext[5]), 4);\r\t\tChar(\"-\");\r\t\tHex(ORD(ext[6]) + 256 * ORD(ext[7]), 4);\r\t\tChar(\"-\");\r\t\tHex(ORD(ext[8]), 2);\r\t\tHex(ORD(ext[9]), 2);\r\t\tChar(\"-\");\r\t\tHex(ORD(ext[10]), 2);\r\t\tHex(ORD(ext[11]), 2);\r\t\tHex(ORD(ext[12]), 2);\r\t\tHex(ORD(ext[13]), 2);\r\t\tHex(ORD(ext[14]), 2);\r\t\tHex(ORD(ext[15]), 2);\r\t\tChar(\"}\")\r\tEND Guid;\r\r\r\t"
                    attr: 0
                  - text: "(* special marks *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE Hint (label: ARRAY OF SHORTCHAR; i: INTEGER; adj: BOOLEAN);\r\tBEGIN\r\t\tIF global.hints THEN\r\t\t\tChar(\"[\"); String(label);\r\t\t\tIF adj & (0 <= i) & (i < 10) THEN Char(TextModels.digitspace) END;\r\t\t\tInt(i);\r\t\t\tString(\"] \")\r\t\tEND\r\tEND Hint;\r\r\tPROCEDURE Hint3 (label1, label2, label3: ARRAY OF SHORTCHAR; i1, i2, i3: INTEGER);\r\tBEGIN\r\t\tIF global.hints THEN\r\t\t\tChar(\"[\"); String(label1); Int(i1); String(label2); Int(i2); String(label3); Int(i3); String(\"] \")\r\t\tEND\r\tEND Hint3;\r\r\tPROCEDURE Vis (i: INTEGER);\r\tBEGIN\r\t\tIF i # external THEN Char(\"-\") END\r\tEND Vis;\r\r\tPROCEDURE ProcSysFlag (flag: INTEGER);\r\tBEGIN\r\t\tIF flag # 0 THEN\r\t\t\tString(\" [\");\r\t\t\tIF flag = -10 THEN String(\"ccall\")\r\t\t\tELSE Int(flag)\r\t\t\tEND;\r\t\t\tChar(\"]\")\r\t\tEND\r\tEND ProcSysFlag;\r\r\tPROCEDURE ParSysFlag (flag: INTEGER);\r\t\tVAR pos: INTEGER;\r\tBEGIN\r\t\tIF flag # 0 THEN\r\t\t\tString(\" [\");\r\t\t\tpos := global.out.Pos();\r\t\t\tIF ODD(flag) THEN String(\"nil\") END;\r(*\r\t\t\tIF ODD(flag DIV 2) & (flag # 18) THEN\r\t\t\t\tIF global.out.Pos() # pos THEN String(\", \") END;\r\t\t\t\tString(\"in\")\r\t\t\tEND;\r\t\t\tIF ODD(flag DIV 4) & (flag # 12) THEN\r\t\t\t\tIF global.out.Pos() # pos THEN String(\", \") END;\r\t\t\t\tString(\"out\")\r\t\t\tEND;\r*)\r\t\t\tIF flag DIV 8 = 1 THEN\r\t\t\t\tIF global.out.Pos() # pos THEN String(\", \") END;\r\t\t\t\tString(\"new\")\r\t\t\tELSIF flag DIV 8 = 2 THEN\r\t\t\t\tIF global.out.Pos() # pos THEN String(\", \") END;\r\t\t\t\tString(\"iid\")\r\t\t\tELSIF flag DIV 8 # 0 THEN\r\t\t\t\tIF global.out.Pos() # pos THEN String(\", \") END;\r\t\t\t\tInt(flag DIV 8 * 8)\r\t\t\tEND;\r\t\t\tChar(\"]\")\r\t\tEND\r\tEND ParSysFlag;\r\r\tPROCEDURE StructSysFlag (typ: DevCPT.Struct);\r\t\tVAR flag: INTEGER;\r\tBEGIN\r\t\tflag := typ.sysflag;\r\t\tIF (flag # 0) & ((typ.form # pointer) OR (flag = 2)) THEN\r\t\t\tString(\" [\");\r\t\t\tIF flag = 1 THEN String(\"untagged\")\r\t\t\tELSIF flag = 2 THEN String(\"handle\")\r\t\t\tELSIF flag = 3 THEN String(\"noalign\")\r\t\t\tELSIF flag = 4 THEN String(\"align2\")\r\t\t\tELSIF flag = 5 THEN String(\"align4\")\r\t\t\tELSIF flag = 6 THEN String(\"align8\")\r\t\t\tELSIF flag = 7 THEN String(\"union\")\r\t\t\tELSIF flag = 10 THEN\r\t\t\t\tIF typ.ext # NIL THEN Char('\"'); String(typ.ext^); Char('\"')\r\t\t\t\tELSE String(\"interface\")\r\t\t\t\tEND\r\t\t\tELSIF flag = 20 THEN String(\"som\")\r\t\t\tELSE Int(flag)\r\t\t\tEND;\r\t\t\tChar(\"]\")\r\t\tEND\r\tEND StructSysFlag;\r\r\tPROCEDURE SysStrings (obj: DevCPT.Object);\r\tBEGIN\r\t\tIF global.hints & ((obj.entry # NIL) OR (obj.library # NIL)) THEN\r\t\t\tString(' [\"');\r\t\t\tIF obj.library # NIL THEN String(obj.library^); String('\", \"') END;\r\t\t\tIF obj.entry # NIL THEN String(obj.entry^) END;\r\t\t\tString('\"]')\r\t\tEND\r\tEND SysStrings;\r\r\r\t"
                    attr: 0
