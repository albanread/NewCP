                    attr: 0
                  - text: "\t(* codefile browser *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE RWord (VAR x: INTEGER);\r\t\tVAR b: BYTE; y: INTEGER;\r\tBEGIN\r\t\tinp.ReadByte(b); y := b MOD 256;\r\t\tinp.ReadByte(b); y := y + 100H * (b MOD 256);\r\t\tinp.ReadByte(b); y := y + 10000H * (b MOD 256);\r\t\tinp.ReadByte(b); x := y + 1000000H * b\r\tEND RWord;\r\r\tPROCEDURE RNum (VAR x: INTEGER);\r\t\tVAR b: BYTE; s, y: INTEGER;\r\tBEGIN\r\t\ts := 0; y := 0; inp.ReadByte(b);\r\t\tWHILE b < 0 DO INC(y, ASH(b + 128, s)); INC(s, 7); inp.ReadByte(b) END;\r\t\tx := ASH((b + 64) MOD 128 - 64, s) + y\r\tEND RNum;\r\r\tPROCEDURE RName (VAR name: ARRAY OF SHORTCHAR);\r\t\tVAR b: BYTE; i, n: INTEGER;\r\tBEGIN\r\t\ti := 0; n := LEN(name) - 1; inp.ReadByte(b);\r\t\tWHILE (i < n) & (b # 0) DO name[i] := SHORT(CHR(b)); INC(i); inp.ReadByte(b) END;\r\t\tWHILE b # 0 DO inp.ReadByte(b) END;\r\t\tname[i] := 0X\r\tEND RName;\r\r\tPROCEDURE RLink;\r\t\tVAR x: INTEGER;\r\tBEGIN\r\t\tRNum(x);\r\t\tWHILE x # 0 DO RNum(x); RNum(x) END\r\tEND RLink;\r\r\tPROCEDURE RShort (p: INTEGER; OUT x: INTEGER);\r\t\tVAR b0, b1: BYTE;\r\tBEGIN\r\t\tinp.ReadByte(b0); inp.ReadByte(b1);\r\t\tIF p = 10 THEN x := b0 MOD 256 + b1 * 256\t"
                    attr: 0
                  - text: "(* little endian *)"
                    attr: 1
                  - text: "\r\t\tELSE x := b1 MOD 256 + b0 * 256"
                    attr: 0
