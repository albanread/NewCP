                  - text: "\r\t\tEND\r\tEND RShort;\r\r\tPROCEDURE ReadHeader (file: Files.File; VAR view: Views.View; VAR title: Views.Title);\r\t\tVAR n, i, p, fp, hs, ms, ds, cs, vs, m, res: INTEGER; name: Kernel.Utf8Name; first: BOOLEAN;\r\t\t\ttext: TextModels.Model; v: TextViews.View; fold: StdFolds.Fold; d: Dates.Date; t: Dates.Time;\r\t\t\tstr: ARRAY 64 OF CHAR;\r\tBEGIN\r\t\ttext := TextModels.dir.New(); global.out.ConnectTo(text);\r\t\tinp := file.NewReader(NIL);\r\t\tinp.SetPos(0); RWord(n);\r\t\tIF n = 6F4F4346H THEN\r\t\t\tRWord(p); RWord(hs); RWord(ms); RWord(ds); RWord(cs); RWord(vs);\r\t\t\tRNum(n); RName(name); Kernel.Utf8ToString(name, title, res); i := 0;\r\t\t\tWHILE i < n DO RName(imp[i]); INC(i) END;\r\t\t\tString(\"MODULE \"); String(name); Ln;\r\t\t\tString(\"processor: \");\r\t\t\tIF p = 10 THEN String(\"80x86\")\r\t\t\tELSIF p = 20 THEN String(\"68000\")\r\t\t\tELSIF p = 30 THEN String(\"PPC\")\r\t\t\tELSIF p = 40 THEN String(\"SH3\")\r\t\t\tELSE Int(p)\r\t\t\tEND;\r\t\t\tLn;\r\t\t\tString(\"meta size: \"); Int(ms); Ln;\r\t\t\tString(\"desc size: \"); Int(ds); Ln;\r\t\t\tString(\"code size: \"); Int(cs); Ln;\r\t\t\tString(\"data size: \"); Int(vs); Ln;\r\t\t\tinp.SetPos(hs + ms + 12);\r\t\t\tRShort(p, d.year); RShort(p, d.month); RShort(p, d.day);\r\t\t\tRShort(p, t.hour); RShort(p, t.minute); RShort(p, t.second);\r\t\t\tString(\"compiled: \");\r\t\t\tDates.DateToString(d, Dates.short, str); global.out.WriteString(str); String(\"  \");\r\t\t\tDates.TimeToString(t, str); global.out.WriteString(str); Ln;\r\t\t\tInt(n); String(\" imports:\"); Ln;\r\t\t\tinp.SetPos(hs + ms + ds + cs);\r\t\t\tRLink; RLink; RLink; RLink; RLink; RLink; i := 0;\r\t\t\tWHILE i < n DO\r\t\t\t\tglobal.out.WriteTab; String(imp[i]); global.out.WriteTab;\r\t\t\t\tRNum(p);\r\t\t\t\tIF p # 0 THEN\r\t\t\t\t\tfold := StdFolds.dir.New(StdFolds.expanded, \"\", TextModels.dir.New());\r\t\t\t\t\tglobal.out.WriteView(fold); Char(\" \"); first := TRUE;\r\t\t\t\t\tWHILE p # 0 DO\r\t\t\t\t\t\tRName(name); RNum(fp);\r\t\t\t\t\t\tIF p = 2 THEN RNum(m) END;\r\t\t\t\t\t\tIF p # 1 THEN RLink END;\r\t\t\t\t\t\tIF name # \"\" THEN\r\t\t\t\t\t\t\tIF ~first THEN String(\", \") END;\r\t\t\t\t\t\t\tfirst := FALSE; String(name)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tRNum(p)\r\t\t\t\t\tEND;\r\t\t\t\t\tChar(\" \");\r\t\t\t\t\tfold := StdFolds.dir.New(StdFolds.expanded, \"\", NIL);\r\t\t\t\t\tglobal.out.WriteView(fold);\r\t\t\t\t\tfold.Flip(); global.out.SetPos(text.Length())\r\t\t\t\tEND;\r\t\t\t\tINC(i); Ln\r\t\t\tEND\r\t\tELSE String(\"wrong file tag: \"); Hex(n, 8)\r\t\tEND;\r\t\tv := TextViews.dir.New(text);\r\t\tv.SetDefaults(NewRuler(), TextViews.dir.defAttr);\r\t\tview := Documents.dir.New(v, width, height);\r\t\tglobal.out.ConnectTo(NIL);\r\t\tinp := NIL\r\tEND ReadHeader;\r\r\tPROCEDURE "
