                  - text: "(\r\t\tident: DevCPT.Name; opts: ARRAY OF CHAR; VAR view: Views.View; VAR title: Views.Title\r\t);\r\t\tVAR def, buf: TextModels.Model; v: TextViews.View; h: BOOLEAN;\r\t\t\tp: Properties.BoundsPref; mod: DevCPT.Name; i: INTEGER; \r\t\t\tstr, str1: ARRAY LEN(DevCPT.Name) OF CHAR;\r\t\t\tres: INTEGER; n: DevCPT.Name;\r\tBEGIN\r\t\tmod := DevCPT.GlbMod[1].name^$;\r\t\ti := 0;\r\t\tglobal.hints := FALSE; global.flatten := FALSE; global.hideHooks := TRUE;\r\t\tglobal.clientinterface := FALSE; global.extensioninterface := FALSE;\r\t\tglobal.keyAttr := NIL; global.sectAttr := NIL;\r\r\t\tIF opts[0] = '@' THEN\r\t\t\tIF options.hints THEN opts := opts + \"+\" END;\r\t\t\tIF options.flatten THEN opts := opts + \"!\" END;\r\t\t\tIF options.formatted THEN opts := opts + \"/\" END\r\t\tEND;\r\r\t\tWHILE opts[i] # 0X DO\r\t\t\tCASE opts[i] OF\r\t\t\t| '+': global.hints := TRUE\r\t\t\t| '!': global.flatten := TRUE\r\t\t\t| '&': global.hideHooks := FALSE\r\t\t\t| '/':\r\t\t\t\t(* global.keyAttr := TextModels.NewStyle(TextModels.dir.attr, {Fonts.underline}); *)\r\t\t\t\tglobal.keyAttr := TextModels.NewWeight(TextModels.dir.attr, Fonts.bold);\r\t\t\t\tglobal.sectAttr := TextModels.NewWeight(TextModels.dir.attr, Fonts.bold)\r\t\t\t| 'c': global.clientinterface := TRUE\r\t\t\t| 'e' : global.extensioninterface := TRUE\r\t\t\tELSE\r\t\t\tEND;\r\t\t\tINC(i)\r\t\tEND;\r\t\tIF global.clientinterface & global.extensioninterface THEN\r\t\t\tglobal.clientinterface := FALSE; global.extensioninterface := FALSE\r\t\tEND;\r\t\tIF global.extensioninterface THEN global.hideHooks := FALSE END;\r\t\tdef := TextModels.dir.New();\r\t\tbuf := TextModels.dir.New(); global.out.ConnectTo(buf);\r\t\tIF ident # \"\" THEN\r\t\t\th := global.hideHooks; global.hideHooks := FALSE;\r\t\t\tglobal.level := 0; Scope(def, ident);\r\t\t\tglobal.hideHooks := h;\r\t\t\tdef.Append(buf);\r\t\t\tIF def.Length() > 0 THEN\r\t\t\t\tv := TextViews.dir.New(def);\r\t\t\t\tv.SetDefaults(NewRuler(), TextViews.dir.defAttr);\r\t\t\t\tp.w := Views.undefined; p.h := Views.undefined; Views.HandlePropMsg(v, p);\r"
