                  - text: "\r\tIMPORT\r\t\tKernel, Files, Fonts, Dates, Ports, Stores, Views, Properties, Dialog, Documents,\r\t\tTextModels, TextMappers, TextRulers, TextViews, TextControllers, StdDialog, StdFolds,\r\t\tDevCPM, DevCPT, HostRegistry;\r\r\tCONST\r\t\twidth = 170 * Ports.mm;\t"
