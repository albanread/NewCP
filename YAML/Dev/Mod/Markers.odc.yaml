                  - text: "* (err: INTEGER), NEW, EXTENSIBLE;\r\tBEGIN\r\t\tASSERT(v.msg = NIL, 20);\r\t\tIF v.err # err THEN v.err := err; v.mode := mark END;\r\t\tIF v.mode = undefined THEN v.mode := mark END\r\tEND InitErr;\r\r\tPROCEDURE (v: View) "
                    attr: 0
