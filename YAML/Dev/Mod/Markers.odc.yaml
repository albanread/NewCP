                    attr: 0
                  - text: "(** Cleaner **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE Cleanup;\r\tBEGIN\r\t\tglobR := NIL; globW := NIL\r\tEND Cleanup;\r\t\r\r\t"
                    attr: 0
                  - text: "(** miscellaneous **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: Insert
                    attr: 3
                  - text: "* (text: TextModels.Model; pos: INTEGER; v: View);\r\t\tVAR w: TextModels.Writer; r: TextModels.Reader;\r\tBEGIN\r\t\tASSERT(v.era = 0, 20);\r\t\tModels.BeginModification(Models.clean, text);\r\t\tv.era := thisEra;\r\t\tIF pos > text.Length() THEN pos := text.Length() END;\r\t\tglobW := text.NewWriter(globW); w := globW; w.SetPos(pos);\r\t\tIF pos > 0 THEN DEC(pos) END;\r\t\tglobR := text.NewReader(globR); r := globR; r.SetPos(pos); r.Read;\r\t\tIF r.attr # NIL THEN w.SetAttr(r.attr) END;\r\t\tw.WriteView(v, Views.undefined, Views.undefined);\r\t\tModels.EndModification(Models.clean, text);\r\tEND Insert;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Unmark
                    attr: 3
                  - text: "* (text: TextModels.Model);\r\t\tVAR r: TextModels.Reader; v: Views.View; pos: INTEGER;\r\t\t\tscript: Stores.Operation;\r\tBEGIN\r\t\tModels.BeginModification(Models.clean, text);\r\t\tModels.BeginScript(text, \"#Dev:DeleteMarkers\", script);\r\t\tr := text.NewReader(NIL); r.ReadView(v);\r\t\tWHILE ~r.eot DO\r\t\t\tIF r.view IS View THEN\r\t\t\t\tpos := r.Pos() - 1; text.Delete(pos, pos + 1); r.SetPos(pos)\r\t\t\tEND;\r\t\t\tr.ReadView(v)\r\t\tEND;\r\t\tINC(thisEra);\r\t\tModels.EndScript(text, script);\r\t\tModels.EndModification(Models.clean, text);\r\tEND Unmark;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ShowFirstError
                    attr: 3
                  - text: "* (text: TextModels.Model; focusOnly: BOOLEAN);\r\t\tVAR v1: Views.View; pos: INTEGER;\r\tBEGIN\r\t\tglobR := text.NewReader(globR); globR.SetPos(0);\r\t\tREPEAT globR.ReadView(v1) UNTIL globR.eot OR (v1 IS View);\r\t\tIF ~globR.eot THEN\r\t\t\tpos := globR.Pos();\r\t\t\tTextViews.ShowRange(text, pos, pos, focusOnly);\r\t\t\tTextControllers.SetCaret(text, pos);\r\t\t\tv1(View).SetMode(v1(View).mode)\r\t\tEND\r\tEND ShowFirstError;\r\r\r\t"
                    attr: 0
