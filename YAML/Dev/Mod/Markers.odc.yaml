                  - text: "\r\tIMPORT\r\t\tKernel, Files, Stores, Fonts, Ports, Models, Views, Controllers, Properties, Dialog,\r\t\tTextModels, TextSetters, TextViews, TextControllers, TextMappers;\r\r\tCONST\r\t\t"
