                    attr: 3
                  - text: "* (msg: ARRAY OF CHAR): View, NEW, ABSTRACT;\r\r\r\t"
                    attr: 0
                  - text: "(* SetModeOp *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (op: SetModeOp) Do;\r\t\tVAR v: View; mode: INTEGER;\r\tBEGIN\r\t\tv := op.view;\r\t\tmode := v.mode; v.mode := op.mode; op.mode := mode;\r\t\tViews.Update(v, Views.keepFrames);\r\t\tIF v.context # NIL THEN v.context.SetSize(Views.undefined, Views.undefined) END\r\tEND Do;\r\r\tPROCEDURE ToggleMode (v: View);\r\t\tVAR mode: INTEGER;\r\tBEGIN\r\t\tIF ABS(v.err) # noCode THEN\r\t\t\tIF v.mode < lastMode THEN mode := v.mode + 1 ELSE mode := firstMode END\r\t\tELSE\r\t\t\tIF v.mode < message THEN mode := v.mode + 1 ELSE mode := firstMode END\r\t\tEND;\r\t\tv.SetMode(mode)\r\tEND ToggleMode;\r\r\r\t"
                    attr: 0
                  - text: "(* primitives for StdView *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE NumToStr (x: INTEGER; VAR s: ARRAY OF CHAR; VAR i: INTEGER);\r\t\tVAR j: INTEGER; m: ARRAY 32 OF CHAR;\r\tBEGIN\r\t\tASSERT(x >= 0, 20);\r\t\tj := 0; REPEAT m[j] := CHR(x MOD 10 + ORD(\"0\")); x := x DIV 10; INC(j) UNTIL x = 0;\r\t\ti := 0; REPEAT DEC(j); s[i] := m[j]; INC(i) UNTIL j = 0;\r\t\ts[i] := 0X\r\tEND NumToStr;\r\r\tPROCEDURE Load (v: StdView);\r\t\tVAR view: Views.View; t: TextModels.Model; s: TextMappers.Scanner;\r\t\t\terr: INTEGER; i: INTEGER; ch: CHAR; loc: Files.Locator;\r\t\t\tmsg: ARRAY 1024 OF CHAR;\r\tBEGIN\r\t\terr := ABS(v.err); NumToStr(err, msg, i);\r\t\tloc := Files.dir.This(\"Dev\"); IF loc = NIL THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\tloc := loc.This(\"Rsrc\"); IF loc = NIL THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\tview := Views.OldView(loc, errFile);\r\t\tIF (view # NIL) & (view IS TextViews.View) THEN\r\t\t\tt := view(TextViews.View).ThisModel();\r\t\t\tIF t # NIL THEN\r\t\t\t\ts.ConnectTo(t);\r\t\t\t\tREPEAT\r\t\t\t\t\ts.Scan\r\t\t\t\tUNTIL ((s.type = TextMappers.int) & (s.int = err)) OR (s.type = TextMappers.eot);\r\t\t\t\tIF s.type = TextMappers.int THEN\r\t\t\t\t\ts.Skip(ch); i := 0;\r\t\t\t\t\tWHILE (ch >= \" \") & (i < LEN(msg) - 1) DO\r\t\t\t\t\t\tmsg[i] := ch; INC(i); s.rider.ReadChar(ch)\r\t\t\t\t\tEND;\r\t\t\t\t\tmsg[i] := 0X\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND;\r\t\tNEW(v.msg, i + 1); v.msg^ := msg$\r\tEND Load;\r\r\tPROCEDURE DrawMsg (v: StdView; f: Views.Frame; font: Fonts.Font; color: Ports.Color);\r\t\tVAR w, h, asc, dsc: INTEGER;\r\tBEGIN\r\t\tCASE v.mode OF\r\t\t  mark:\r\t\t\tv.context.GetSize(w, h);\r\t\t\tf.DrawLine(point, 0, w - 2 * point, h, 0, color);\r\t\t\tf.DrawLine(w - 2 * point, 0, point, h, 0, color)\r\t\t| message:\r\t\t\tfont.GetBounds(asc, dsc, w);\r\t\t\tf.DrawString(2 * point, asc, color, v.msg^, font)\r\t\tEND\r\tEND DrawMsg;\r\t\r\tPROCEDURE ShowMsg (v: StdView);\r\tBEGIN\r\t\tIF v.msg = NIL THEN Load(v) END;\r\t\tDialog.ShowStatus(v.msg^)\r\tEND ShowMsg;\r\r\tPROCEDURE Track (v: StdView; f: Views.Frame; x, y: INTEGER; buttons: SET);\r\t\tVAR c: Models.Context; t: TextModels.Model; u, w, h: INTEGER; isDown, in, in0: BOOLEAN; m: SET;\r\tBEGIN\r\t\tv.context.GetSize(w, h); u := f.dot; in0 := FALSE;\r\t\tin := (0 <= x) & (x < w) & (0 <= y) & (y < h);\r\t\tREPEAT\r\t\t\tIF in # in0 THEN\r\t\t\t\tf.MarkRect(u, 0, w - u, h, Ports.fill, Ports.invert, Ports.show); in0 := in\r\t\t\tEND;\r\t\t\tf.Input(x, y, m, isDown);\r\t\t\tin := (0 <= x) & (x < w) & (0 <= y) & (y < h)\r\t\tUNTIL ~isDown;\r\t\tIF in0 THEN\r\t\t\tf.MarkRect(u, 0, w - u, h, Ports.fill, Ports.invert, Ports.hide);\r\t\t\tIF Dialog.showsStatus & ~(Controllers.modify IN buttons) & ~(Controllers.doubleClick IN buttons) THEN\r\t\t\t\tShowMsg(v)\r\t\t\tELSE\r\t\t\t\tToggleMode(v)\r\t\t\tEND;\r\t\t\tc := v.context;\r\t\t\tWITH c: TextModels.Context DO\r\t\t\t\tt := c.ThisModel();\r\t\t\t\tTextControllers.SetCaret(t, c.Pos() + 1)\r\t\t\tELSE\r\t\t\tEND\r\t\tEND\r\tEND Track;\r\r\tPROCEDURE SizePref (v: StdView; VAR p: Properties.SizePref);\r\t\tVAR c: Models.Context; a: TextModels.Attributes; font: Fonts.Font; asc, dsc, w: INTEGER;\r\tBEGIN\r\t\tc := v.context;\r\t\tIF (c # NIL) & (c IS TextModels.Context) THEN a := c(TextModels.Context).Attr(); font := a.font\r\t\tELSE font := Fonts.dir.Default()\r\t\tEND;\r\t\tfont.GetBounds(asc, dsc, w);\r\t\tp.h := asc + dsc;\r\t\tCASE v.mode OF\r\t\t  mark:\r\t\t\tp.w := p.h + 2 * point\r\t\t| message:\r\t\t\tIF v.msg = NIL THEN Load(v) END;\r\t\t\tp.w := font.StringWidth(v.msg^) + 4 * point\r\t\tEND\r\tEND SizePref;\r\r\r\t"
                    attr: 0
                  - text: "(* StdView *)"
                    attr: 1
                  - text: "\r\r"
                    attr: 0
                  - text: "\tPROCEDURE (v: StdView) ExternalizeAs (VAR s1: Stores.Store);\r\tBEGIN\r\t\ts1 := NIL\r\tEND ExternalizeAs;\r"
                    attr: 3
                  - text: "\r\tPROCEDURE (v: StdView) SetMode(mode: INTEGER);\r\tBEGIN v.SetMode^(mode); ShowMsg(v)\r\tEND SetMode;\r\r\tPROCEDURE (v: StdView) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR c: Models.Context; a: TextModels.Attributes; font: Fonts.Font; color: Ports.Color;\r\t\t\tw, h: INTEGER;\r\tBEGIN\r\t\tc := v.context; c.GetSize(w, h);\r\t\tWITH c: TextModels.Context DO a := c.Attr(); font := a.font ELSE font := Fonts.dir.Default() END;\r\t\tIF TRUE (*f.colors >= 4*) THEN color := Ports.grey50 ELSE color := Ports.defaultColor END;\r\t\tIF v.err >= 0 THEN\r\t\t\tf.DrawRect(point, 0, w - point, h, Ports.fill, color);\r\t\t\tDrawMsg(v, f, font, Ports.background)\r\t\tELSE\r\t\t\tf.DrawRect(point, 0, w - point, h, 0, color);\r\t\t\tDrawMsg(v, f, font, Ports.defaultColor)\r\t\tEND\r\tEND Restore;\r\r\tPROCEDURE (v: StdView) GetBackground (VAR color: Ports.Color);\r\tBEGIN\r\t\tcolor := Ports.background\r\tEND GetBackground;\r\r\tPROCEDURE (v: StdView) HandleCtrlMsg (f: Views.Frame; VAR msg: Controllers.Message;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\tBEGIN\r\t\tWITH msg: Controllers.TrackMsg DO\r\t\t\tTrack(v, f, msg.x, msg.y, msg.modifiers)\r\t\tELSE\r\t\tEND\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE (v: StdView) HandlePropMsg (VAR msg: Properties.Message);\r\t\tVAR c: Models.Context; a: TextModels.Attributes; font: Fonts.Font; asc, w: INTEGER;\r\tBEGIN\r\t\tWITH msg: Properties.Preference DO\r\t\t\tWITH msg: Properties.SizePref DO\r\t\t\t\tSizePref(v, msg)\r\t\t\t| msg: Properties.ResizePref DO\r\t\t\t\tmsg.fixed := TRUE\r\t\t\t| msg: Properties.FocusPref DO\r\t\t\t\tmsg.hotFocus := TRUE\r(*\r\t\t\t| msg: Properties.StorePref DO\r\t\t\t\tmsg.view := NIL\r*)\r\t\t\t| msg: TextSetters.Pref DO\r\t\t\t\tc := v.context;\r\t\t\t\tIF (c # NIL) & (c IS TextModels.Context) THEN\r\t\t\t\t\ta := c(TextModels.Context).Attr(); font := a.font\r\t\t\t\tELSE\r\t\t\t\t\tfont := Fonts.dir.Default()\r\t\t\t\tEND;\r\t\t\t\tfont.GetBounds(asc, msg.dsc, w)\r\t\t\tELSE\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\r\r\t"
                    attr: 0
                  - text: "(* StdDirectory *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (d: StdDirectory) New (err: INTEGER): View;\r\t\tVAR v: StdView;\r\tBEGIN\r\t\tNEW(v); v.InitErr(err); "
