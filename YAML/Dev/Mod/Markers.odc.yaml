                    attr: 3
                  - text: "* (mode: INTEGER), NEW, EXTENSIBLE;\r\t\tVAR op: SetModeOp;\r\tBEGIN\r\t\tASSERT((firstMode <= mode) & (mode <= lastMode), 20);\r\t\tIF v.mode # mode THEN\r\t\t\tNEW(op); op.view := v; op.mode := mode;\r\t\t\tViews.Do(v, \"#System:ViewSetting\", op)\r\t\tEND\r\tEND SetMode;\r\r\r\t"
                    attr: 0
