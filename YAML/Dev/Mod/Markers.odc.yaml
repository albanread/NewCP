                  - text: " v\r\tEND New;\r\r\tPROCEDURE (d: StdDirectory) NewMsg (msg: ARRAY OF CHAR): View;\r\t\tVAR v: StdView;\r\tBEGIN\r\t\tNEW(v); v.InitErr(noCode); v.InitMsg(msg); "
                    attr: 0
