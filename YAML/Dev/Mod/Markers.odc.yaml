                  - text: "* (msg: ARRAY OF CHAR), NEW, EXTENSIBLE;\r\t\tVAR i: INTEGER; str: ARRAY 1024 OF CHAR;\r\tBEGIN\r\t\tASSERT(v.msg = NIL, 20);\r\t\tDialog.MapString(msg, str);\r\t\ti := 0; WHILE str[i] # 0X DO INC(i) END;\r\t\tNEW(v.msg, i + 1); v.msg^ := str$;\r\t\tv.mode := mark\r\tEND InitMsg;\r\r\tPROCEDURE (v: View) "
