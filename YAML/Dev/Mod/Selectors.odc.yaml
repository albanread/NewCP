                    attr: 3
                  - text: "-: Directory;\r\r\r\t\tPROCEDURE (d: Directory) "
                    attr: 0
                  - text: New
                    attr: 3
                  - text: "* (position: INTEGER): Selector, NEW, ABSTRACT;\r\r\r\tPROCEDURE GetFirst (selector: Selector; OUT first: Selector; OUT pos: INTEGER);\r\t\tVAR c: Models.Context; rd: TextModels.Reader; v: Views.View; nest: INTEGER;\r\tBEGIN\r\t\tc := selector.context; first := NIL; pos := 0;\r\t\tWITH c: TextModels.Context DO\r\t\t\tIF selector.position = left THEN\r\t\t\t\tfirst := selector\r\t\t\tELSE\r\t\t\t\trd := c.ThisModel().NewReader(NIL); rd.SetPos(c.Pos());\r\t\t\t\tnest := 1; pos := 1; rd.ReadPrevView(v);\r\t\t\t\tWHILE (v # NIL) & (nest > 0) DO\r\t\t\t\t\tWITH v: Selector DO\r\t\t\t\t\t\tIF v.position = left THEN DEC(nest);\r\t\t\t\t\t\t\tIF nest = 0 THEN first := v END\r\t\t\t\t\t\tELSIF v.position = right THEN INC(nest)\r\t\t\t\t\t\tELSIF nest = 1 THEN INC(pos)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE\r\t\t\t\t\tEND;\r\t\t\t\t\trd.ReadPrevView(v)\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE "
                    attr: 0
                  - text: "(* selector not embedded in a text *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\t\tASSERT((first = NIL) OR (first.position = left), 100)\r\tEND GetFirst;\r\t\r\tPROCEDURE GetNext (rd: TextModels.Reader; OUT next: Selector);\r\t\tVAR nest: INTEGER; v: Views.View;\r\tBEGIN\r\t\tnest := 1; next := NIL; rd.ReadView(v);\r\t\tWHILE v # NIL DO\r\t\t\tWITH v: Selector DO\r\t\t\t\tIF v.position = left THEN INC(nest)\r\t\t\t\tELSIF nest = 1 THEN next := v; "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: "\r\t\t\t\tELSIF v.position = right THEN DEC(nest)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\tEND;\r\t\t\trd.ReadView(v)\r\t\tEND\r\tEND GetNext;\r\r\tPROCEDURE CalcSize (f: Selector; OUT w, h: INTEGER);\r\t\tVAR c: Models.Context; a: TextModels.Attributes; font: Fonts.Font; asc, dsc, fw: INTEGER;\r\tBEGIN\r\t\tc := f.context;\r\t\tIF (c # NIL) & (c IS TextModels.Context) THEN\r\t\t\ta := c(TextModels.Context).Attr();\r\t\t\tfont := a.font\r\t\tELSE font := Fonts.dir.Default();\r\t\tEND;\r\t\tfont.GetBounds(asc, dsc, fw);\r\t\th := asc + dsc; w := 3 * h DIV 4\r\tEND CalcSize;\r\r\tPROCEDURE GetSection (first: Selector; rd: TextModels.Reader; n: INTEGER; OUT name: ARRAY OF CHAR);\r\t\tVAR i, p0, p1: INTEGER; ch: CHAR; sel: Selector;\r\tBEGIN\r\t\tsel := first;\r\t\tIF first.leftHidden.Length() > 0 THEN\r\t\t\trd := first.leftHidden.NewReader(rd); rd.SetPos(0);\r\t\t\tREPEAT p0 := rd.Pos(); GetNext(rd, sel); DEC(n) UNTIL (n < 0) OR (sel = NIL);\r\t\t\tIF sel = NIL THEN INC(n) END;\r\t\t\tp1 := rd.Pos() - 1\r\t\tEND;\r\t\tIF n >= 0 THEN\r\t\t\trd := first.context(TextModels.Context).ThisModel().NewReader(rd);\r\t\t\trd.SetPos(first.context(TextModels.Context).Pos() + 1);\r\t\t\tREPEAT p0 := rd.Pos(); GetNext(rd, sel); DEC(n) UNTIL (n < 0) OR (sel = NIL) OR (sel.position = right);\r\t\t\tp1 := rd.Pos() - 1\r\t\tEND;\r\t\tIF (n >= 0) & (first.rightHidden.Length() > 0) THEN\r\t\t\trd := first.rightHidden.NewReader(rd); rd.SetPos(1);\r\t\t\tREPEAT p0 := rd.Pos(); GetNext(rd, sel); DEC(n) UNTIL (n < 0) OR (sel = NIL);\r\t\t\tp1 := rd.Pos() - 1;\r\t\t\tIF sel = NIL THEN p1 := first.rightHidden.Length() END\r\t\tEND;\r\t\tIF n < 0 THEN\r\t\t\trd.SetPos(p0); rd.ReadChar(ch); i := 0;\r\t\t\tWHILE (ch <= \" \") & (rd.Pos() <= p1) DO rd.ReadChar(ch) END;\r\t\t\tWHILE (i < LEN(name) - 1) & (rd.Pos() <= p1) & (ch # 0X) DO\r\t\t\t\tIF ch >= \" \" THEN name[i] := ch; INC(i) END;\r\t\t\t\trd.ReadChar(ch)\r\t\t\tEND;\r\t\t\tWHILE (i > 0) & (name[i - 1] = \" \") DO DEC(i) END;\r\t\t\tname[i] := 0X\r\t\tELSE\r\t\t\tname := 7FX + \"\"\r\t\tEND\r\tEND GetSection;\r\t\r\r\tPROCEDURE ChangeSelector (first: Selector; rd: TextModels.Reader; selection: INTEGER);\r\t\tVAR pos, p0, len, s: INTEGER; text: TextModels.Model; sel: Selector;\r\tBEGIN\r\t\ttext := rd.Base();\r\t\tpos := first.context(TextModels.Context).Pos() + 1;\r\t\t"
                    attr: 0
                  - text: "(* expand *)"
                    attr: 1
                  - text: "\r\t\trd.SetPos(pos);\r\t\tREPEAT GetNext(rd, sel) UNTIL (sel = NIL) OR (sel.position = right);\r\t\tIF sel # NIL THEN\r\t\t\tlen := first.rightHidden.Length();\r\t\t\tIF len > 0 THEN text.Insert(rd.Pos() - 1, first.rightHidden, 0, len) END;\r\t\t\tlen := first.leftHidden.Length();\r\t\t\tIF len > 0 THEN text.Insert(pos, first.leftHidden, 0, len) END;\r\t\t\tIF selection # 0 THEN\t"
                    attr: 0
                  - text: "(* collapse *)"
                    attr: 1
                  - text: "\r\t\t\t\trd.SetPos(pos); s := 0;\r\t\t\t\tREPEAT GetNext(rd, sel); INC(s) UNTIL (s = selection) OR (sel = NIL) OR (sel.position = right);\r\t\t\t\tIF (sel # NIL) & (sel.position = middle) THEN\r\t\t\t\t\tfirst.leftHidden.Insert(0, text, pos, rd.Pos());\r\t\t\t\t\trd.SetPos(pos); GetNext(rd, sel);\r\t\t\t\t\tp0 := rd.Pos() - 1;\r\t\t\t\t\tWHILE (sel # NIL) & (sel.position # right) DO GetNext(rd, sel) END;\r\t\t\t\t\tIF sel # NIL THEN\r\t\t\t\t\t\tfirst.rightHidden.Insert(0, text, p0, rd.Pos() - 1)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND;\r\t\trd.SetPos(pos)\r\tEND ChangeSelector;\r\t\r\tPROCEDURE ChangeThis (\r\t\ttext: TextModels.Model; rd, rd1: TextModels.Reader; title: ARRAY OF CHAR; selection: INTEGER\r\t);\r\t\tVAR v: Views.View; str: ARRAY 256 OF CHAR;\r\tBEGIN\r\t\trd := text.NewReader(rd);\r\t\trd.SetPos(0); rd.ReadView(v);\r\t\tWHILE v # NIL DO\r\t\t\tWITH v: Selector DO\r\t\t\t\tIF v.position = left THEN\r\t\t\t\t\tGetSection(v, rd1, 0, str);\r\t\t\t\t\tIF str = title THEN\r\t\t\t\t\t\tChangeSelector(v, rd, selection)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF v.leftHidden.Length() > 0 THEN ChangeThis(v.leftHidden, NIL, rd1, title, selection) END;\r\t\t\t\t\tIF v.rightHidden.Length() > 0 THEN ChangeThis(v.rightHidden, NIL, rd1, title, selection) END\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\tEND;\r\t\t\trd.ReadView(v)\r\t\tEND\r\tEND ChangeThis;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Change
                    attr: 3
                  - text: "* (text: TextModels.Model; title: ARRAY OF CHAR; selection: INTEGER);\r\t\tVAR rd, rd1: TextModels.Reader; script: Stores.Operation;\r\tBEGIN\r\t\trd := text.NewReader(NIL);\r\t\trd1 := text.NewReader(NIL);\r\t\tModels.BeginModification(Models.clean, text);\r\t\tModels.BeginScript(text, changeSelectorsKey, script);\r\t\tChangeThis(text, rd, rd1, title, selection);\r\t\tModels.EndScript(text, script);\r\t\tModels.EndModification(Models.clean, text);\r\tEND Change;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ChangeTo
                    attr: 3
                  - text: "* (text: TextModels.Model; title, entry: ARRAY OF CHAR);\r\t\tVAR rd, rd1: TextModels.Reader; str: ARRAY 256 OF CHAR; v: Views.View; sel: INTEGER;\r\tBEGIN\r\t\trd := text.NewReader(NIL);\r\t\trd1 := text.NewReader(NIL);\r\t\trd.SetPos(0); rd.ReadView(v);\r\t\tWHILE v # NIL DO\r\t\t\tWITH v: Selector DO\r\t\t\t\tIF v.position = left THEN\r\t\t\t\t\tGetSection(v, rd1, 0, str);\r\t\t\t\t\tIF title = str THEN\r\t\t\t\t\t\tsel := 0;\r\t\t\t\t\t\tREPEAT\r\t\t\t\t\t\t\tINC(sel); GetSection(v, rd1, sel, str)\r\t\t\t\t\t\tUNTIL (str[0] = 7FX) OR (str = entry);\r\t\t\t\t\t\tIF str[0] # 7FX THEN\r\t\t\t\t\t\t\tChange(text, title, sel);\r\t\t\t\t\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: "\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\tEND;\r\t\t\trd.ReadView(v)\r\t\tEND\r\tEND ChangeTo;\r\r\r\tPROCEDURE (selector: Selector) "
                    attr: 0
                  - text: HandlePropMsg
                    attr: 3
                  - text: "- (VAR msg: Properties.Message);\r\t\tVAR c: Models.Context; a: TextModels.Attributes; asc, w: INTEGER;\r\tBEGIN\r\t\tWITH msg: Properties.SizePref DO CalcSize(selector, msg.w, msg.h)\r\t\t| msg: Properties.ResizePref DO msg.fixed := TRUE;\r\t\t| msg: Properties.FocusPref DO msg.hotFocus := TRUE;\r\t\t| msg: TextSetters.Pref DO c := selector.context;\r\t\t\tIF (c # NIL) & (c IS TextModels.Context) THEN\r\t\t\t\ta := c(TextModels.Context).Attr();\r\t\t\t\ta.font.GetBounds(asc, msg.dsc, w)\r\t\t\tEND\r\t\tELSE (*selector.HandlePropMsg^(msg);*)\r\t\tEND\r\tEND HandlePropMsg;\r\r\tPROCEDURE Track (selector: Selector; f: Views.Frame; x, y: INTEGER; buttons: SET; VAR hit: BOOLEAN);\r\t\tVAR a: TextModels.Attributes; font: Fonts.Font; c: Models.Context;\r\t\t\tw, h, asc, dsc, fw: INTEGER; isDown, in, in0: BOOLEAN; modifiers: SET;\r\tBEGIN\r\t\tc := selector.context; hit := FALSE;\r\t\tWITH c: TextModels.Context DO\r\t\t\ta := c.Attr(); font := a.font;\r\t\t\tc.GetSize(w, h); in0 := FALSE;\r\t\t\tin := (0 <= x) & (x < w) & (0 <= y) & (y < h);\r\t\t\tREPEAT\r\t\t\t\tIF in # in0 THEN\r\t\t\t\t\tf.MarkRect(0, 0, w, h, Ports.fill, Ports.hilite, FALSE); in0 := in\r\t\t\t\tEND;\r\t\t\t\tf.Input(x, y, modifiers, isDown);\r\t\t\t\tin := (0 <= x) & (x < w) & (0 <= y) & (y < h)\r\t\t\tUNTIL ~isDown;\r\t\t\tIF in0 THEN hit := TRUE;\r\t\t\t\tfont.GetBounds(asc, dsc, fw);\r\t\t\t\tf.MarkRect(0, 0, w, asc + dsc, Ports.fill, Ports.hilite, FALSE);\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND Track;\r\r\tPROCEDURE (selector: Selector) "
                    attr: 0
                  - text: HandleCtrlMsg
                    attr: 3
                  - text: "* (\r\t\tf: Views.Frame; VAR msg: Views.CtrlMessage; VAR focus: Views.View\r\t);\r\t\tVAR hit: BOOLEAN; sel, pos: INTEGER; text: TextModels.Model; title: ARRAY 256 OF CHAR; first: Selector;\r\tBEGIN\r\t\tWITH msg: Controllers.TrackMsg DO\r\t\t\tIF selector.context IS TextModels.Context THEN\r\t\t\t\tTrack(selector, f, msg.x, msg.y, msg.modifiers, hit);\r\t\t\t\tIF hit THEN\r\t\t\t\t\ttext := selector.context(TextModels.Context).ThisModel();\r\t\t\t\t\tGetFirst(selector, first, pos);\r\t\t\t\t\tIF first # NIL THEN\r\t\t\t\t\t\tGetSection(first, NIL, 0, title);\r\t\t\t\t\t\tIF selector.position = middle THEN sel := pos ELSE sel := 0 END;\r\t\t\t\t\t\tChange(text, title, sel);\r\t\t\t\t\t\ttext := selector.context(TextModels.Context).ThisModel();\r\t\t\t\t\t\tIF TextViews.FocusText() = text THEN\r\t\t\t\t\t\t\tpos := selector.context(TextModels.Context).Pos();\r\t\t\t\t\t\t\tTextViews.ShowRange(text, pos, pos+1, TRUE)\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\t| msg: Controllers.PollCursorMsg DO\r\t\t\tmsg.cursor := Ports.refCursor;\r\t\tELSE\r\t\tEND\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE (selector: Selector) "
                    attr: 0
                  - text: Restore
                    attr: 3
                  - text: "* (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR w, h, d: INTEGER;\r\tBEGIN\r\t\tselector.context.GetSize(w, h);\r(*\r\t\tGetFirst(selector, first, pos);\r*)\r\t\tw := w - w MOD f.unit; d := 2 * f.dot;\r\t\tf.DrawLine(d, d, w - d, d, d, Ports.grey25);\r\t\tf.DrawLine(d, h - d, w - d, h - d, d, Ports.grey25);\r\t\tIF selector.position # right THEN f.DrawLine(d, d, d, h - d, d, Ports.grey25) END;\r\t\tIF selector.position # left THEN f.DrawLine(w - d, d, w - d, h - d, d, Ports.grey25) END\r\tEND Restore;\r\r\tPROCEDURE (selector: Selector) "
                    attr: 0
                  - text: CopyFromSimpleView
                    attr: 3
                  - text: "- (source: Views.View);\r\tBEGIN\r\t\t(* selector.CopyFrom^(source); *)\r\t\tWITH source: Selector DO\r\t\t\tselector.position := source.position;\r\t\t\tIF source.leftHidden # NIL THEN\r\t\t\t\tselector.leftHidden := TextModels.CloneOf(source.leftHidden);\r\t\t\t\tselector.leftHidden.InsertCopy(0, source.leftHidden, 0, source.leftHidden.Length());\r\t\t\t\tStores.Join(selector, selector.leftHidden)\r\t\t\tEND;\r\t\t\tIF source.rightHidden # NIL THEN\r\t\t\t\tselector.rightHidden := TextModels.CloneOf(source.rightHidden);\r\t\t\t\tselector.rightHidden.InsertCopy(0, source.rightHidden, 0, source.rightHidden.Length());\r\t\t\t\tStores.Join(selector, selector.rightHidden)\r\t\t\tEND\r\t\tEND\r\tEND CopyFromSimpleView;\r\r\tPROCEDURE (selector: Selector) "
                    attr: 0
                  - text: InitContext
                    attr: 3
                  - text: "* (context: Models.Context);\r\tBEGIN\r\t\tselector.InitContext^(context);\r\t\tIF selector.position = left THEN\r\t\t\tWITH context: TextModels.Context DO\r\t\t\t\tIF selector.leftHidden = NIL THEN \r\t\t\t\t\tselector.leftHidden := TextModels.CloneOf(context.ThisModel());\r\t\t\t\t\tStores.Join(selector, selector.leftHidden);\r\t\t\t\tEND;\r\t\t\t\tIF selector.rightHidden = NIL THEN\r\t\t\t\t\tselector.rightHidden := TextModels.CloneOf(context.ThisModel());\r\t\t\t\t\tStores.Join(selector, selector.rightHidden)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\tEND\r\t\tEND\r\tEND InitContext;\r\t\r\tPROCEDURE (selector: Selector) "
