                    attr: 0
                  - text: Directory
                    attr: 3
                  - text: "* = POINTER TO ABSTRACT RECORD END;\r\r\t\tStdDirectory = POINTER TO RECORD (Directory) END;\r\t\t\r\t\t\r\tVAR\r\t\t"
                    attr: 0
