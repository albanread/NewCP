                  - text: "); DevCPC486.Prepare(x, hint + stop, {})\t(* ??? *)\r\t\t\tEND\r\t\tEND;\r\t\tx.typ := n.typ;\r\t\tDevCPC486.Assert(x, hint, stop)\r\tEND expr;\r\t\r\tPROCEDURE AddCopy (n: DevCPT.Node; VAR dest, dadr, len: DevCPL486.Item; last: BOOLEAN);\r\t\tVAR adr, src: DevCPL486.Item; u: SET; s: INTEGER;\r\tBEGIN\r\t\tCheck(n, u, s);\r\t\tDevCPC486.Assert(dadr, wreg - {DI}, u + {SI, CX});\r\t\tIF len.mode # Con THEN DevCPC486.Assert(len, wreg - {CX}, u + {SI, DI}) END;\r\t\texpr(n, src, wreg - {SI}, {});\r\t\tadr := src; DevCPC486.GetAdr(adr, {}, wreg - {SI} + {con});\r\t\tIF len.mode # Con THEN DevCPC486.Load(len, {}, wreg - {CX} + {con}) END;\r\t\tDevCPC486.Load(dadr, {}, wreg - {DI} + {con});\r\t\tDevCPC486.AddCopy(dest, src, last)\r\tEND AddCopy;\r\t\r\tPROCEDURE StringCopy (left, right: DevCPT.Node);\r\t\tVAR x, y, ax, ay, len: DevCPL486.Item;\r\tBEGIN\r\t\tIF IsAllocDynArr(left) THEN expr(left, x, wreg - {CX}, {DI})\t(* keep len descriptor *)\r\t\tELSE expr(left, x, wreg - {DI}, {})\r\t\tEND;\r\t\tax := x; DevCPC486.GetAdr(ax, {}, wreg - {DI});\r\t\tDevCPC486.Free(x); DevCPC486.ArrayLen(x, len, wreg - {CX}, {});\r\t\tWHILE right.class = Ndop DO\r\t\t\tASSERT(right.subcl = plus);\r\t\t\tAddCopy(right.left, x, ax, len, FALSE);\r\t\t\tright := right.right\r\t\tEND;\r\t\tAddCopy(right, x, ax, len, TRUE);\r\t\tDevCPC486.Free(len)\r\tEND StringCopy;\r\t\r\tPROCEDURE Checkpc;\r\tBEGIN\r\t\t"
