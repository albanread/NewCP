                  - text: ")\t(* ??? *)\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t| val:\r\t\t\t\t\t\t\texpr(n.left, x, hint + stop, {high, con}); DevCPC486.Convert(x, f, n.typ.size, hint, stop)\t(* ??? *)\r\t\t\t\t\t| adr:\r\t\t\t\t\t\t\tIF n.left.class = Ntype THEN\r\t\t\t\t\t\t\t\tx.mode := Con; x.offset := 0; x.obj := n.left.obj; x.form := Int32; x.typ := n.left.typ;\r\t\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\t\tAdrExpr(n.left, x, hint + stop, {});\r\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\tDevCPC486.GetAdr(x, hint + stop, {})\r\t\t\t\t\t| typfn:\r\t\t\t\t\t\t\tIF n.left.class = Ntype THEN\r\t\t\t\t\t\t\t\tx.mode := Con; x.offset := 0; x.obj := n.left.obj; x.form := Int32; x.typ := n.left.typ;\r\t\t\t\t\t\t\t\tIF x.obj.typ.untagged THEN DevCPM.err(111) END\r\t\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\t\texpr(n.left, x, hint + stop, {});\r\t\t\t\t\t\t\t\tDevCPC486.Tag(x, y); DevCPC486.Free(x); x := y\r\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\tDevCPC486.Load(x, hint + stop, {})\r\t\t\t\t\t| minus, abs, cap:\r\t\t\t\t\t\t\texpr(n.left, x, hint + stop, {mem, stk});\r\t\t\t\t\t\t\tIF f = Int64 THEN DevCPM.err(260)\r\t\t\t\t\t\t\tELSIF f IN realSet THEN DevCPC486.FloatMOp(x, n.subcl)\r\t\t\t\t\t\t\tELSE DevCPC486.IntMOp(x, n.subcl)\r\t\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t| Ndop:\r\t\t\t\t\tIF (f IN realSet) & (n.subcl # lsh) & (n.subcl # rot) THEN\r\t\t\t\t\t\tIF (n.subcl = ash) & (n.right.class = Nconst) & (n.right.conval.realval >= 0) THEN\r\t\t\t\t\t\t\texpr(n.left, x, {}, {mem, stk});\r\t\t\t\t\t\t\tcval := n.right.conval; sy := SHORT(ENTIER(cval.realval)); cval.realval := 1;\r\t\t\t\t\t\t\tWHILE sy > 0 DO cval.realval := cval.realval * 2; DEC(sy) END;\r\t\t\t\t\t\t\tDevCPL486.AllocConst(y, cval, Real32);\r\t\t\t\t\t\t\tDevCPC486.FloatDOp(x, y, times, FALSE)\r\t\t\t\t\t\tELSE FloatDOp(n, x)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSIF (f = Int64) OR (n.typ = DevCPT.intrealtyp) THEN DevCPM.err(260); expr(n.left, x, {}, {})\r\t\t\t\t\tELSE\r\t\t\t\t\t\tCASE n.subcl OF\r\t\t\t\t\t\t   times:\r\t\t\t\t\t\t\t\tIF f = Int8 THEN\r\t\t\t\t\t\t\t\t\tDualExp(n.left, n.right, x, y, {}, {}, wreg - {AX} + {high, mem, stk, con}, {AX, con, stk});\r\t\t\t\t\t\t\t\t\tDevCPC486.IntDOp(x, y, times, FALSE)\r\t\t\t\t\t\t\t\tELSE IntDOp(n, x, hint + stop)\r\t\t\t\t\t\t\t\tEND\r\t\t\t\t\t\t| div, mod:\r\t\t\t\t\t\t\t\tDualExp(n.left, n.right, x, y, {}, {}, wreg - {AX} + {high, mem, stk, con}, {AX, DX, mem, stk});\r\t\t\t\t\t\t\t\tDevCPC486.DivMod(x, y, n.subcl = mod)\r\t\t\t\t\t\t| plus:\r\t\t\t\t\t\t\t\tIF n.typ.form IN {String8, String16} THEN DevCPM.err(265); expr(n.left, x, {}, {})\r\t\t\t\t\t\t\t\tELSE IntDOp(n, x, hint + stop)\r\t\t\t\t\t\t\t\tEND\r\t\t\t\t\t\t| slash, minus, msk, min, max:\r\t\t\t\t\t\t\t\tIntDOp(n, x, hint + stop)\r\t\t\t\t\t\t| ash, lsh, rot:\r\t\t\t\t\t\t\t\tuy := {}; IF n.right.class # Nconst THEN uy := {CX} END;\r\t\t\t\t\t\t\t\tDualExp(n^.right, n^.left, y, x, {}, hint + stop, wreg - {CX} + {high, mem, stk}, uy + {con, mem, stk});\r\t\t\t\t\t\t\t\tDevCPC486.Shift(x, y, n^.subcl)\r\t\t\t\t\t\t| len:\r\t\t\t\t\t\t\t\tIF n.left.typ.form IN {String8, String16} THEN\r\t\t\t\t\t\t\t\t\texpr(n.left, x, wreg - {DI} , {}); DevCPC486.GetAdr(x, {}, wreg - {DI} + {con});\r\t\t\t\t\t\t\t\t\tDevCPC486.StrLen(x, n.left.typ, FALSE)\r\t\t\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\t\t\tdesign(n.left, x, hint + stop, {}); expr(n.right, y, {}, {}); DevCPC486.Len(x, y)\r\t\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t| Ncall:\r\t\t\t\t\tCall(n, x)\r\t\t\t| Ncomp:\r\t\t\t\t\tCompStat(n.left); expr(n.right, x, hint, stop); CompRelease(n.left, x);\r\t\t\t\t\tIF x.mode = Stk THEN DevCPC486.Pop(x, x.form, hint, stop) END\r\t\t\tELSE\r\t\t\t\tdesign(n, x, hint + stop, "
