                  - text: "\r\tEND Checkpc;\r\r\tPROCEDURE^ stat (n: DevCPT.Node; VAR end: DevCPL486.Label);\r\t\r\tPROCEDURE CondStat (if, last: DevCPT.Node; VAR hint: INTEGER; VAR else, end: DevCPL486.Label);\r\t\tVAR local: DevCPL486.Label; x: DevCPL486.Item; cond, lcond: DevCPT.Node;\r\tBEGIN\r\t\tlocal := DevCPL486.NewLbl;\r\t\tDevCPM.errpos := if.conval.intval; Checkpc; cond := if.left;\r\t\tIF (last # NIL) & (cond.class = Ndop) & (cond.subcl >= eql) & (cond.subcl <= geq)\r\t\t\t\t& (last.class = Ndop) & (last.subcl >= eql) & (last.subcl <= geq)\r\t\t\t\t& SameExp(cond.left, last.left) & SameExp(cond.right, last.right) THEN\t(*  reuse comparison *)\r\t\t\tDevCPC486.setCC(x, cond.subcl, ODD(hint), hint >= 2)\r"
                    attr: 0
                  - text: "\t\tELSIF (last # NIL) & (cond.class = Nmop) & (cond.subcl = is) & (last.class = Nmop) & (last.subcl = is)\r\t\t\t\t& SameExp(cond.left, last.left) THEN\r\t\t\tDevCPC486.ShortTypTest(x, cond.obj.typ)\t(* !!! *)\r"
                    attr: 3
                  - text: "\t\tELSE condition(cond, x, else, local)\r\t\tEND;\r\t\thint := x.reg;\r\t\tDevCPC486.JumpF(x, else);\r\t\tIF local # DevCPL486.NewLbl THEN DevCPL486.SetLabel(local) END;\r\t\tstat(if.right, end);\r\tEND CondStat;\r\r\tPROCEDURE IfStat (n: DevCPT.Node; withtrap: BOOLEAN; VAR end: DevCPL486.Label);\r\t\tVAR else, local: DevCPL486.Label; if, last: DevCPT.Node; hint: INTEGER;\r\tBEGIN\t(* n.class = Nifelse *)\r\t\tif := n.left; last := NIL;\r\t\tWHILE (if # NIL) & ((if.link # NIL) OR (n.right # NIL) OR withtrap) DO\r\t\t\telse := DevCPL486.NewLbl; \r\t\t\tCondStat(if, last, hint, else, end);\r\t\t\tIF sequential THEN DevCPC486.Jump(end) END;\r\t\t\tDevCPL486.SetLabel(else); last := if.left; if := if.link\r\t\tEND;\r\t\tIF n.right # NIL THEN stat(n.right, end)\r\t\tELSIF withtrap THEN DevCPM.errpos := n.conval.intval; Checkpc; DevCPC486.Trap(withTrap); sequential := FALSE\r\t\tELSE CondStat(if, last, hint, end, end)\r\t\tEND\r\tEND IfStat;\r\t\r\tPROCEDURE CasePart (n: DevCPT.Node; VAR x: DevCPL486.Item; VAR else: DevCPL486.Label; last: BOOLEAN);\r\t\tVAR this, higher: DevCPL486.Label; m: DevCPT.Node; low, high: INTEGER;\r\tBEGIN\r\t\tIF n # NIL THEN\r\t\t\tthis := SHORT(ENTIER(n.conval.realval));\r\t\t\tIF useTree IN n.conval.setval THEN\r\t\t\t\tIF n.left # NIL THEN\r\t\t\t\t\tIF n.right # NIL THEN\r\t\t\t\t\t\thigher := DevCPL486.NewLbl;\r\t\t\t\t\t\tDevCPC486.CaseJump(x, n.conval.intval, n.conval.intval2, this, higher, TRUE, FALSE);\r\t\t\t\t\t\tCasePart(n.left, x, else, FALSE);\r\t\t\t\t\t\tDevCPL486.SetLabel(higher);\r\t\t\t\t\t\tCasePart(n.right, x, else, last)\r\t\t\t\t\tELSE\r\t\t\t\t\t\tDevCPC486.CaseJump(x, n.conval.intval, n.conval.intval2, this, else, FALSE, FALSE);\r\t\t\t\t\t\tCasePart(n.left, x, else, last);\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\t\tDevCPC486.CaseJump(x, n.conval.intval, n.conval.intval2, this, else, FALSE, TRUE);\r\t\t\t\t\tIF n.right # NIL THEN CasePart(n.right, x, else, last)\r\t\t\t\t\tELSIF ~last THEN DevCPC486.Jump(else)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tIF useTable IN n.conval.setval THEN\r\t\t\t\t\tm := n; WHILE m.left # NIL DO m := m.left END; low := m.conval.intval;\r\t\t\t\t\tm := n; WHILE m.right # NIL DO m := m.right END; high := m.conval.intval2;\r\t\t\t\t\tDevCPC486.CaseTableJump(x, low, high, else);\r\t\t\t\t\tactual := low; last := TRUE\r\t\t\t\tEND;\r\t\t\t\tCasePart(n.left, x, else, FALSE);\r\t\t\t\tWHILE actual < n.conval.intval DO\r\t\t\t\t\tDevCPL486.GenCaseEntry(else, FALSE); INC(actual)\r\t\t\t\tEND;\r\t\t\t\tWHILE actual < n.conval.intval2 DO\r\t\t\t\t\tDevCPL486.GenCaseEntry(this, FALSE); INC(actual)\r\t\t\t\tEND;\r\t\t\t\tDevCPL486.GenCaseEntry(this, last & (n.right = NIL)); INC(actual);\r\t\t\t\tCasePart(n.right, x, else, last)\r\t\t\tEND;\r\t\t\tn.conval.realval := this\r\t\tEND\r\tEND CasePart;\r\t\r\tPROCEDURE CaseStat (n: DevCPT.Node; VAR end: DevCPL486.Label);\r\t\tVAR x: DevCPL486.Item; case, lab: DevCPT.Node; low, high, tab: INTEGER; else, this: DevCPL486.Label;\r\tBEGIN\r\t\texpr(n.left, x, {}, {mem, con, short, float, stk}); else := DevCPL486.NewLbl;\r\t\tIF (n.right.right # NIL) & (n.right.right.class = Ngoto) THEN\t(* jump to goto optimization *)\r\t\t\tCasePart(n.right.link, x, else, FALSE); DevCPC486.Free(x);\r\t\t\tn.right.right.right.conval.intval2 := else; sequential := FALSE\r\t\tELSE\r\t\t\tCasePart(n.right.link, x, else, TRUE); DevCPC486.Free(x);\r\t\t\tDevCPL486.SetLabel(else);\r\t\t\tIF n.right.conval.setval # {} THEN stat(n.right.right, end)\r\t\t\tELSE DevCPC486.Trap(caseTrap); sequential := FALSE\r\t\t\tEND\r\t\tEND;\r\t\tcase := n.right.left;\r\t\tWHILE case # NIL DO\t(* case.class = Ncasedo *)\r\t\t\tIF sequential THEN DevCPC486.Jump(end) END;\r\t\t\tlab := case.left;\r\t\t\tIF (case.right # NIL) & (case.right.class = Ngoto) THEN\t(* jump to goto optimization *)\r\t\t\t\tcase.right.right.conval.intval2 := SHORT(ENTIER(lab.conval.realval));\r\t\t\t\tASSERT(lab.link = NIL); sequential := FALSE\r\t\t\tELSE\r\t\t\t\tWHILE lab # NIL DO\r\t\t\t\t\tthis := SHORT(ENTIER(lab.conval.realval)); DevCPL486.SetLabel(this); lab := lab.link\r\t\t\t\tEND;\r\t\t\t\tstat(case.right, end)\r\t\t\tEND;\r\t\t\tcase := case.link\r\t\tEND\r\tEND CaseStat;\r\r\tPROCEDURE Dim(n: DevCPT.Node; VAR x, nofel: DevCPL486.Item; VAR fact: INTEGER; dimtyp: DevCPT.Struct);\r\t\tVAR len: DevCPL486.Item; u: SET; s: INTEGER;\r\tBEGIN\r\t\tCheck(n, u, s);\r\t\tIF (nofel.mode = Reg) & (nofel.reg IN u) THEN DevCPC486.Push(nofel) END;\r\t\texpr(n, len, {}, {mem, short});\r\t\tIF nofel.mode = Stk THEN DevCPC486.Pop(nofel, Int32, {}, {}) END;\r\t\tIF len.mode = Stk THEN DevCPC486.Pop(len, Int32, {}, {}) END;\r\t\tDevCPC486.MulDim(len, nofel, fact, dimtyp);\r\t\tIF n.link # NIL THEN\r\t\t\tDim(n.link, x, nofel, fact, dimtyp.BaseTyp);\r\t\tELSE\r\t\t\tDevCPC486.New(x, nofel, fact)\r\t\tEND;\r\t\tDevCPC486.SetDim(x, len, dimtyp)\r\tEND Dim;\r\r\tPROCEDURE CompStat (n: DevCPT.Node);\r\t\tVAR x, y, sp, old, len, nofel: DevCPL486.Item; fact: INTEGER; typ: DevCPT.Struct;\r\tBEGIN\r\t\tCheckpc;\r\t\tWHILE (n # NIL) & DevCPM.noerr DO\r\t\t\tASSERT(n.class = Nassign);\r\t\t\tIF n.subcl = assign THEN\r\t\t\t\tIF n.right.typ.form IN {String8, String16} THEN\r\t\t\t\t\tStringCopy(n.left, n.right)\r\t\t\t\tELSE\r\t\t\t\t\tIF (n.left.typ.sysflag = interface) & ~CountedPtr(n.right) THEN\r\t\t\t\t\t\tIPAssign(NIL, n.right, x, y, {});\t"
                    attr: 0
                  - text: "(* no Release *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tELSE expr(n.right, y, {}, {})\r\t\t\t\t\tEND;\r\t\t\t\t\texpr(n.left, x, {}, {});\r\t\t\t\t\tDevCPC486.Assign(x, y)\r\t\t\t\tEND\r\t\t\tELSE ASSERT(n.subcl = newfn);\r\t\t\t\ttyp := n.left.typ.BaseTyp;\r\t\t\t\tASSERT(typ.comp = DynArr);\r\t\t\t\tASSERT(n.right.link = NIL);\r\t\t\t\texpr(n.right, y, {}, wreg - {CX} + {mem, stk});\r\t\t\t\tDevCPL486.MakeReg(sp, SP, Int32);\r\t\t\t\tDevCPC486.CopyReg(sp, old, {}, {CX});\r\t\t\t\tDevCPC486.CopyReg(y, len, {}, {CX});\r\t\t\t\tIF typ.BaseTyp.form = Char16 THEN\r\t\t\t\t\tDevCPL486.MakeConst(x, 2, Int32); DevCPL486.GenMul(x, y, FALSE)\r\t\t\t\tEND;\r\t\t\t\tDevCPC486.StackAlloc;\r\t\t\t\tDevCPC486.Free(y);\r\t\t\t\texpr(n.left, x, {}, {}); DevCPC486.Assign(x, sp);\r\t\t\t\tDevCPC486.Push(len);\r\t\t\t\tDevCPC486.Push(old);\r\t\t\t\ttyp.sysflag := stackArray\r\t\t\tEND;\r\t\t\tn := n.link\r\t\tEND\r\tEND CompStat;\r\t\r\tPROCEDURE CompRelease (n: DevCPT.Node; VAR res: DevCPL486.Item);\r\t\tVAR x, y, sp: DevCPL486.Item;\r\tBEGIN\r\t\tIF n.link # NIL THEN CompRelease(n.link, res) END;\r\t\tASSERT(n.class = Nassign);\r\t\tIF n.subcl = assign THEN\r\t\t\tIF (n.left.typ.form = Pointer) & (n.left.typ.sysflag = interface) THEN\r\t\t\t\tIF res.mode = Cond THEN\r\t\t\t\t\tDevCPL486.GenCode(9CH); (* push flags *)\r\t\t\t\t\tres.mode := Stk\r\t\t\t\tELSIF res.mode = Reg THEN\r\t\t\t\t\tIF res.form < Int16 THEN DevCPC486.Push(res)\r\t\t\t\t\tELSE DevCPC486.Assert(res, {}, {AX, CX, DX})\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\texpr(n.left, x, wreg - {DI}, {loaded});\r\t\t\t\tDevCPC486.IPRelease(x, 0, TRUE, TRUE);\r\t\t\t\tn.left.obj.used := FALSE\r\t\t\tEND\r\t\tELSE ASSERT(n.subcl = newfn);\r\t\t\tDevCPL486.MakeReg(sp, SP, Int32); DevCPL486.GenPop(sp);\r\t\t\tDevCPL486.MakeConst(y, 0, Pointer);\r\t\t\texpr(n.left, x, {}, {}); DevCPC486.Assign(x, y)\r\t\tEND\r\tEND CompRelease;\r\t\r\tPROCEDURE Assign(n: DevCPT.Node; ux: SET);\r\t\tVAR r: DevCPT.Node; f: BYTE; false, true: DevCPL486.Label; x, y, z: DevCPL486.Item; uf, uy: SET; s: INTEGER;\r\tBEGIN\r\t\tr := n.right; f := r.typ.form; uf := {};\r\t\tIF (r.class IN {Nmop, Ndop}) THEN\r\t\t\tIF (r.subcl = conv) & (f # Set) &\r(*\r\t\t\t\t(DevCPT.Includes(f, r.left.typ.form) OR DevCPT.Includes(f, n.left.typ.form)) THEN r := r.left;\r\t\t\t\tIF ~(f IN realSet) & (r.typ.form IN realSet) & (r.typ # DevCPT.intrealtyp) THEN uf := {AX} END (* entier *)\r*)\r\t\t\t\t(DevCPT.Includes(f, r.left.typ.form) OR DevCPT.Includes(f, n.left.typ.form)) &\r\t\t\t\t((f IN realSet) OR ~(r.left.typ.form IN realSet)) THEN r := r.left\r\t\t\tELSIF (f IN {Char8..Int32, Set, Char16, String8, String16}) & SameExp(n.left, r.left) THEN\r\t\t\t\tIF r.class = Ndop THEN\r\t\t\t\t\tIF (r.subcl IN {slash, plus, minus, msk}) OR (r.subcl = times) & (f = Set) THEN\r\t\t\t\t\t\texpr(r.right, y, {}, ux); expr(n.left, x, {}, {});\r\t\t\t\t\t\tDevCPC486.Load(y, {}, {}); DevCPC486.IntDOp(x, y, r.subcl, FALSE);\r\t\t\t\t\t\tRETURN\r\t\t\t\t\tELSIF r.subcl IN {ash, lsh, rot} THEN\r\t\t\t\t\t\texpr(r.right, y, wreg - {CX} + {high, mem}, ux); expr(n.left, x, {}, {});\r\t\t\t\t\t\tDevCPC486.Load(y, {}, wreg - {CX} + {high}); DevCPC486.Shift(x, y, r.subcl);\r\t\t\t\t\t\tRETURN\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\t\tIF r.subcl IN {minus, abs, cap} THEN\r\t\t\t\t\t\texpr(n.left, x, {}, {}); DevCPC486.IntMOp(x, r.subcl); RETURN\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tELSIF f = Bool THEN\r\t\t\t\tIF (r.subcl = not) & SameExp(n.left, r.left) THEN\r\t\t\t\t\texpr(n.left, x, {}, {}); DevCPC486.IntMOp(x, not); RETURN\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND;\r\t\tIF (n.left.typ.sysflag = interface) & (n.left.typ.form = Pointer) THEN IPAssign(n.left, r, x, y, ux)\r\t\tELSE expr(r, y, {high}, ux); expr(n.left, x, {}, uf + {"
