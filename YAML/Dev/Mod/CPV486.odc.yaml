                  - text: " THEN design(n.left, x, {}, {}) ELSE expr(n.left, x, {}, {}) END;\r\t\tDevCPC486.Call(x, tag)\r\tEND Call;\r\r\tPROCEDURE Mem (n: DevCPT.Node; VAR x: DevCPL486.Item; typ: DevCPT.Struct; hint, stop: SET);\r\t\tVAR offset: INTEGER;\r\tBEGIN\r\t\tIF (n.class = Ndop) & (n.subcl IN {plus, minus}) & (n.right.class = Nconst) THEN\r\t\t\texpr(n.left, x, hint, stop + {mem}); offset := n.right.conval.intval;\r\t\t\tIF n.subcl = minus THEN offset := -offset END\r\t\tELSE\r\t\t\texpr(n, x, hint, stop + {mem}); offset := 0\r\t\tEND;\r\t\tDevCPC486.Mem(x, offset, typ)\r\tEND Mem;\r\t\r\tPROCEDURE^ CompStat (n: DevCPT.Node);\r\tPROCEDURE^ CompRelease (n: DevCPT.Node; VAR res: DevCPL486.Item);\r\r\tPROCEDURE condition (n: DevCPT.Node; VAR x: DevCPL486.Item; VAR false, true: DevCPL486.Label);\r\t\tVAR local: DevCPL486.Label; y, z: DevCPL486.Item; ux: SET; sx, num: INTEGER; f: BYTE; typ: DevCPT.Struct;\r\tBEGIN\r\t\tIF n.class = Nmop THEN\r\t\t\tCASE n.subcl OF\r\t\t\t   not: condition(n.left, x, true, false); DevCPC486.Not(x)\r\t\t\t| is: IF n.left.typ.form = Pointer THEN expr(n.left, x, {}, {mem})\r\t\t\t\t\tELSE design(n.left, x, {}, {})\r\t\t\t\t\tEND;\r\t\t\t\t\tDevCPC486.TypTest(x, n.obj.typ, FALSE, FALSE)\r\t\t\t| odd: expr(n.left, x, {}, {}); DevCPC486.Odd(x)\r\t\t\t| cc: expr(n.left, x, {}, {}); x.mode := Cond; x.form := Bool\r\t\t\t| val: DevCPM.err(220)\r\t\t\tEND\r\t\tELSIF n.class = Ndop THEN\r\t\t\tCASE n.subcl OF\r\t\t\t   and: local := DevCPL486.NewLbl; condition(n.left, y, false, local);\r\t\t\t\t\tDevCPC486.JumpF(y, false);\r\t\t\t\t\tIF local # DevCPL486.NewLbl THEN DevCPL486.SetLabel(local) END;\r\t\t\t\t\tcondition(n.right, x, false, true)\r\t\t\t| or: local := DevCPL486.NewLbl; condition(n.left, y, local, true);\r\t\t\t\t\tDevCPC486.JumpT(y, true);\r\t\t\t\t\tIF local # DevCPL486.NewLbl THEN DevCPL486.SetLabel(local) END;\r\t\t\t\t\tcondition(n.right, x, false, true)\r\t\t\t| eql..geq:\r\t\t\t\t\tf := n.left.typ.form;\r\t\t\t\t\tIF f = Int64 THEN DevCPM.err(260)\r\t\t\t\t\tELSIF f IN {String8, String16, Comp} THEN\r\t\t\t\t\t\tIF (n.left.class = Nmop) & (n.left.subcl = conv) THEN\t(* converted must be source *)\r\t\t\t\t\t\t\tStringOp(n.right, n.left, x, y, FALSE); DevCPC486.CmpString(x, y, n.subcl, TRUE)\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tStringOp(n.left, n.right, x, y, FALSE); DevCPC486.CmpString(x, y, n.subcl, FALSE)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSIF f IN {Real32, Real64} THEN FloatDOp(n, x)\r\t\t\t\t\tELSE\r\t\t\t\t\t\tIF CountedPtr(n.left) OR CountedPtr(n.right) THEN DevCPM.err(270) END;\r\t\t\t\t\t\tDualExp(n.left, n.right, x, y, {}, {}, {stk}, {stk});\r\t\t\t\t\t\tIF (x.mode = Reg) OR (y.mode = Con) THEN DevCPC486.IntDOp(x, y, n.subcl, FALSE)\r\t\t\t\t\t\tELSIF (y.mode = Reg) OR (x.mode = Con) THEN DevCPC486.IntDOp(y, x, n.subcl, TRUE); x := y\r\t\t\t\t\t\tELSE DevCPC486.Load(x, {}, {}); DevCPC486.IntDOp(x, y, n.subcl, FALSE)\r\t\t\t\t\t\tEND \r\t\t\t\t\tEND\r\t\t\t| in: DualExp(n.left, n.right, x, y, {}, {}, {short, mem, stk}, {con, stk});\r\t\t\t\t\tDevCPC486.In(x, y)\r\t\t\t| bit: Check(n.left, ux, sx);\r\t\t\t\t\texpr(n.right, x, {}, ux + {short});\r\t\t\t\t\tMem(n.left, y, DevCPT.notyp, {}, {});\r\t\t\t\t\tDevCPC486.Load(x, {}, {short});\r\t\t\t\t\tDevCPC486.In(x, y)\r\t\t\t| queryfn:\r\t\t\t\t\tAdrExpr(n.right, x, {}, {CX, SI, DI});\r\t\t\t\t\tCompareIntTypes(n.left.typ, x, false, num);\r\t\t\t\t\tIF num > 0 THEN \r\t\t\t\t\t\tCheck(n.right.link, ux, sx); IPAssign(n.right.link, n.left, x, y, ux); DevCPC486.Assign(x, y);\r\t\t\t\t\t\tx.offset := 1\t(* true *)\r\t\t\t\t\tELSE x.offset := 0\t(* false *)\r\t\t\t\t\tEND;\r\t\t\t\t\tx.mode := Con; DevCPC486.MakeCond(x)\r\t\t\tEND\r\t\tELSIF n.class = Ncomp THEN\r\t\t\tCompStat(n.left); condition(n.right, x, false, true); CompRelease(n.left, x);\r\t\t\tIF x.mode = Stk THEN DevCPL486.GenCode(9DH); (* pop flags *) x.mode := Cond END\r\t\tELSE expr(n, x, {}, {}); DevCPC486.MakeCond(x)\t(* const, var, or call *)\r\t\tEND\r\tEND condition;\r\t\r\tPROCEDURE expr(n: DevCPT.Node; VAR x: DevCPL486.Item; hint, stop: SET);\r\t\tVAR y, z: DevCPL486.Item; f, g: BYTE; cval: DevCPT.Const; false, true: DevCPL486.Label;\r\t\t\tuy: SET; sy: INTEGER; r: REAL;\r\tBEGIN\r\t\tf := n.typ.form;\r\t\tIF (f = Bool) & (n.class IN {Ndop, Nmop}) THEN\r\t\t\tfalse := DevCPL486.NewLbl; true := DevCPL486.NewLbl;\r\t\t\tcondition(n, y, false, true);\r\t\t\tDevCPC486.LoadCond(x, y, false, true, hint, stop + {mem})\r\t\tELSE\r\t\t\tCASE n.class OF\r\t\t\t   Nconst:\r\t\t\t\t\tIF n.obj = NIL THEN cval := n.conval ELSE cval := n.obj.conval END;\r\t\t\t\t\tCASE f OF\r\t\t\t\t\t   Byte..Int32, NilTyp, Pointer, Char16: DevCPL486.MakeConst(x, cval.intval, f)\r\t\t\t\t\t| Int64:\r\t\t\t\t\t\tDevCPL486.MakeConst(x, cval.intval, f);\r\t\t\t\t\t\tDevCPE.GetLongWords(cval, x.scale, x.offset)\r\t\t\t\t\t| Set: DevCPL486.MakeConst(x, SYSTEM.VAL(INTEGER, cval.setval), Set)\r\t\t\t\t\t| String8, String16, Real32, Real64: DevCPL486.AllocConst(x, cval, f)\r\t\t\t\t\t| Comp: \r\t\t\t\t\t\tASSERT(n.typ = DevCPT.guidtyp);\r\t\t\t\t\t\tIF n.conval # NIL THEN DevCPC486.GuidFromString(n.conval.ext, x)\r\t\t\t\t\t\tELSE DevCPC486.GuidFromString(n.obj.typ.ext, x)\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t| Nupto:\t(* n.typ = DevCPT.settyp *)\r\t\t\t\t\tCheck(n.right, uy, sy);\r\t\t\t\t\texpr(n.left, x, {}, wreg - {CX} + {high, mem, stk});\r\t\t\t\t\tDevCPC486.MakeSet(x, TRUE, FALSE, hint + stop + uy, {});\r\t\t\t\t\tDevCPC486.Assert(x, {}, uy);\r\t\t\t\t\texpr(n.right, y, {}, wreg - {CX} + {high, mem, stk});\r\t\t\t\t\tDevCPC486.MakeSet(y, TRUE, TRUE, hint + stop, {});\r\t\t\t\t\tDevCPC486.Load(x, hint + stop, {});\r\t\t\t\t\tIF x.mode = Con THEN DevCPC486.IntDOp(y, x, msk, TRUE); x := y\r\t\t\t\t\tELSE DevCPC486.IntDOp(x, y, msk, FALSE)\r\t\t\t\t\tEND\r\t\t\t| Nmop:\r\t\t\t\t\tCASE n.subcl OF\r\t\t\t\t\t| bit:\r\t\t\t\t\t\t\texpr(n.left, x, {}, wreg - {CX} + {high, mem, stk});\r\t\t\t\t\t\t\tDevCPC486.MakeSet(x, FALSE, FALSE, hint + stop, {})\r\t\t\t\t\t| conv:\r\t\t\t\t\t\t\tIF f IN {String8, String16} THEN\r\t\t\t\t\t\t\t\texpr(n.left, x, hint, stop);\r\t\t\t\t\t\t\t\tIF f = String8 THEN x.form := VString16to8 END\t(* SHORT *)\r\t\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\t\tIF n.left.class = Nconst THEN\t(* largeint -> longreal *)\r\t\t\t\t\t\t\t\t\tASSERT((n.left.typ.form = Int64) & (f = Real64));\r\t\t\t\t\t\t\t\t\tDevCPL486.AllocConst(x, n.left.conval, n.left.typ.form);\r\t\t\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\t\t\texpr(n.left, x, hint + stop, {high});\r\t\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\t\tDevCPC486.Convert(x, f, -1,"
                    attr: 0
                  - text: " hint + stop, {}"
