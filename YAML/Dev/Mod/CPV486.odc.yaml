                    attr: 3
                  - text: ", DevCPM, DevCPT, DevCPE, DevCPH, DevCPL486, DevCPC486;\r\t\r\tCONST\r\t\tprocessor* = 10; (* for i386 *)\r\r\t\t(* object modes *)\r\t\tVar = 1; VarPar = 2; Con = 3; Fld = 4; Typ = 5; LProc = 6; XProc = 7;\r\t\tSProc = 8; CProc = 9; IProc = 10; Mod = 11; Head = 12; TProc = 13;\r\t\t\r\t\t(* item modes for i386 *)\r\t\tInd = 14; Abs = 15; Stk = 16; Cond = 17; Reg = 18; DInd = 19;\r\r\t\t(* symbol values and ops *)\r\t\ttimes = 1; slash = 2; div = 3; mod = 4;\r\t\tand = 5; plus = 6; minus = 7; or = 8; eql = 9;\r\t\tneq = 10; lss = 11; leq = 12; gtr = 13; geq = 14;\r\t\tin = 15; is = 16; ash = 17; msk = 18; len = 19;\r\t\tconv = 20; abs = 21; cap = 22; odd = 23; not = 33;\r\t\t(*SYSTEM*)\r\t\tadr = 24; cc = 25; bit = 26; lsh = 27; rot = 28; val = 29;\r\t\tmin = 34; max = 35; typfn = 36;\r\t\tthisrecfn = 45; thisarrfn = 46;\r\t\tshl = 50; shr = 51; lshr = 52; xor = 53;\r\r\t\t(* structure forms *)\r\t\tUndef = 0; Byte = 1; Bool = 2; Char8 = 3; Int8 = 4; Int16 = 5; Int32 = 6;\r\t\tReal32 = 7; Real64 = 8; Set = 9; String8 = 10; NilTyp = 11; NoTyp = 12;\r\t\tPointer = 13; ProcTyp = 14; Comp = 15;\r\t\tChar16 = 16; String16 = 17; Int64 = 18;\r\t\tVString16to8 = 29; VString8 = 30; VString16 = 31;\r\t\trealSet = {Real32, Real64};\r\r\t\t(* composite structure forms *)\r\t\tBasic = 1; Array = 2; DynArr = 3; Record = 4;\r\r\t\t(* nodes classes *)\r\t\tNvar = 0; Nvarpar = 1; Nfield = 2; Nderef = 3; Nindex = 4; Nguard = 5; Neguard = 6;\r\t\tNconst = 7; Ntype = 8; Nproc = 9; Nupto = 10; Nmop = 11; Ndop = 12; Ncall = 13;\r\t\tNinittd = 14; Nif = 15; Ncaselse = 16; Ncasedo = 17; Nenter = 18; Nassign = 19;\r\t\tNifelse =20; Ncase = 21; Nwhile = 22; Nrepeat = 23; Nloop = 24; Nexit = 25;\r\t\tNreturn = 26; Nwith = 27; Ntrap = 28; Ncomp = 30;\r\t\tNdrop = 50; Nlabel = 51; Ngoto = 52; Njsr = 53; Nret = 54; Ncmp = 55;\r\r\t\t(*function number*)\r\t\tassign = 0; newfn = 1; incfn = 13; decfn = 14;\r\t\tinclfn = 15; exclfn = 16; copyfn = 18; assertfn = 32;\r\r\t\t(*SYSTEM function number*)\r\t\tgetfn = 24; putfn = 25; getrfn = 26; putrfn = 27; sysnewfn = 30; movefn = 31;\r\t\t\r\t\t(* COM function number *)\r\t\tvalidfn = 40; queryfn = 42;\r\t\t\r\t\t(* procedure flags (conval.setval) *)\r\t\thasBody = 1; isRedef = 2; slNeeded = 3; imVar = 4; isHidden = 29; isGuarded = 30; isCallback = 31;\r\r\t\t(* attribute flags (attr.adr, struct.attribute, proc.conval.setval) *)\r\t\tnewAttr = 16; absAttr = 17; limAttr = 18; empAttr = 19; extAttr = 20;\r\t\t\r\t\t(* case statement flags (conval.setval) *)\r\t\tuseTable = 1; useTree = 2;\r\t\t\r\t\t(* registers *)\r\t\tAX = 0; CX = 1; DX = 2; BX = 3; SP = 4; BP = 5; SI = 6; DI = 7; AH = 4; CH = 5; DH = 6; BH = 7;\r\t\tstk = 31; mem = 30; con = 29; float = 28; high = 27; short = 26; "
