                  - text: "deref = 25; loaded = 24;\r\t\t"
                    attr: 3
                  - text: "wreg = {AX, BX, CX, DX, SI, DI};\r\r\t\t(* module visibility of objects *)\r\t\tinternal = 0; external = 1; externalR = 2; inPar = 3; outPar = 4;\r\r\t\t(* sysflag *)\r\t\tuntagged = 1; noAlign = 3; align2 = 4; align8 = 6; union = 7;\r\t\tinterface = 10; guarded = 8; noframe = 16;\r\t\tnilBit = 1; enumBits = 8; new = 1; iid = 2;\r\t\tstackArray = 120;\r\t\t\r\t\t(* system trap numbers *)\r\t\twithTrap = -1; caseTrap = -2; funcTrap = -3; typTrap = -4;\r\t\trecTrap = -5; ranTrap = -6; inxTrap = -7; copyTrap = -8;\r\t\t\r\t\tParOff = 8;\r\t\tinterfaceSize = 16;\t(* SIZE(Kernel.Interface) *)\r\t\taddRefFP = 4E27A847H;\t(* fingerprint of AddRef and Release procedures *)\r\t\tintHandlerFP = 24B0EAE3H;\t(* fingerprint of InterfaceTrapHandler *)\r\t\tnumPreIntProc = 2;\r\t\t\r\t\t\r\tVAR\r\t\tExit, Return: DevCPL486.Label;\r\t\tassert, sequential: BOOLEAN;\r\t\tnesting, actual: INTEGER;\r\t\tquery, addRef, release, release2: DevCPT.Object;\r\t\t\r\tPROCEDURE Init*(opt: SET);\r\t\tCONST ass = 2;\r\tBEGIN\r\t\tDevCPL486.Init(opt); DevCPC486.Init(opt);\r\t\tassert := ass IN opt;\r\t\tDevCPM.breakpc := MAX(INTEGER);\r\t\tquery := NIL; addRef := NIL; release := NIL; release2 := NIL; DevCPC486.intHandler := NIL;\r\tEND Init;\r\t\r\tPROCEDURE Close*;\r\tBEGIN\r\t\tDevCPL486.Close\r\tEND Close;\r\r\tPROCEDURE Align(VAR offset: INTEGER; align: INTEGER);\r\tBEGIN\r\t\tCASE align OF\r\t\t   1: (* ok *)\r\t\t| 2: INC(offset, offset MOD 2)\r\t\t| 4: INC(offset, (-offset) MOD 4)\r\t\t| 8: INC(offset, (-offset) MOD 8)\r\t\tEND\r\tEND Align;\r\t\r\tPROCEDURE NegAlign(VAR offset: INTEGER; align: INTEGER);\r\tBEGIN\r\t\tCASE align OF\r\t\t   1: (* ok *)\r\t\t| 2: DEC(offset, offset MOD 2)\r\t\t| 4: DEC(offset, offset MOD 4)\r\t\t| 8: DEC(offset, offset MOD 8)\r\t\tEND\r\tEND NegAlign;\r\t\r\tPROCEDURE Base(typ: DevCPT.Struct; limit: INTEGER): INTEGER;\t(* typ.comp # DynArr *)\r\t\tVAR align: INTEGER;\r\tBEGIN\r\t\tWHILE typ.comp = Array DO typ := typ.BaseTyp END ;\r\t\tIF typ.comp = Record THEN\r\t\t\talign := typ.align\r\t\tELSE\r\t\t\talign := typ.size;\r\t\tEND;\r\t\tIF align > limit THEN RETURN limit ELSE RETURN align END\r\tEND Base;\r\r(* -----------------------------------------------------\r\treference implementation of TypeSize for portable symbol files\r\tmandatory for all non-system structures\r\r\tPROCEDURE TypeSize (typ: DevCPT.Struct);\r\t\tVAR f, c: SHORTINT; offset: LONGINT; fld: DevCPT.Object; btyp: DevCPT.Struct;\r\tBEGIN\r\t\tIF typ.size = -1 THEN\r\t\t\tf := typ.form; c := typ.comp; btyp := typ.BaseTyp;\r\t\t\tIF c = Record THEN\r\t\t\t\tIF btyp = NIL THEN offset := 0 ELSE TypeSize(btyp); offset := btyp.size END;\r\t\t\t\tfld := typ.link;\r\t\t\t\tWHILE (fld # NIL) & (fld.mode = Fld) DO\r\t\t\t\t\tbtyp := fld.typ; TypeSize(btyp);\r\t\t\t\t\tIF btyp.size >= 4 THEN INC(offset, (-offset) MOD 4)\r\t\t\t\t\tELSIF btyp.size >= 2 THEN INC(offset, offset MOD 2)\r\t\t\t\t\tEND;\r\t\t\t\t\tfld.adr := offset; INC(offset, btyp.size);\r\t\t\t\t\tfld := fld.link\r\t\t\t\tEND;\r\t\t\t\tIF offset > 2 THEN INC(offset, (-offset) MOD 4) END;\r\t\t\t\ttyp.size := offset; typ.align := 4;\r\t\t\t\ttyp.n := -1  (* methods not counted yet *)\r\t\t\tELSIF c = Array THEN\r\t\t\t\tTypeSize(btyp);\r\t\t\t\ttyp.size := typ.n * btyp.size\r\t\t\tELSIF f = Pointer THEN\r\t\t\t\ttyp.size := DevCPM.PointerSize\r\t\t\tELSIF f = ProcTyp THEN\r\t\t\t\ttyp.size := DevCPM.ProcSize\r\t\t\tELSE (* c = DynArr *)\r\t\t\t\tTypeSize(btyp);\r\t\t\t\tIF btyp.comp = DynArr THEN typ.size := btyp.size + 4\r\t\t\t\tELSE typ.size := 8\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND TypeSize;\r\r----------------------------------------------------- *)\r\r\tPROCEDURE GTypeSize (typ: DevCPT.Struct; guarded: BOOLEAN);\r\t\tVAR f, c: BYTE; offset, align, falign, alignLimit: INTEGER;\r\t\t\tfld: DevCPT.Object; btyp: DevCPT.Struct; name: DevCPT.Name;\r\tBEGIN\r\t\tIF typ.untagged THEN guarded := TRUE END;\r\t\tIF typ = DevCPT.undftyp THEN DevCPM.err(58)\r\t\tELSIF typ.size = -1 THEN\r\t\t\tf := typ.form; c := typ.comp; btyp := typ.BaseTyp;\r\t\t\tIF c = Record THEN\r\t\t\t\tIF btyp = NIL THEN offset := 0; align := 1;\r\t\t\t\tELSE GTypeSize(btyp, guarded); offset := btyp.size; align := btyp.align\r\t\t\t\tEND ;\r\t\t\t\tIF typ.sysflag = noAlign THEN alignLimit := 1\r\t\t\t\tELSIF typ.sysflag = align2 THEN alignLimit := 2\r\t\t\t\tELSIF typ.sysflag = align8 THEN alignLimit := 8\r\t\t\t\tELSE alignLimit := 4\r\t\t\t\tEND;\r\t\t\t\tfld := typ.link;\r\t\t\t\tWHILE (fld # NIL) & (fld.mode = Fld) DO\r\t\t\t\t\tbtyp := fld.typ; GTypeSize(btyp, guarded);\r\t\t\t\t\tIF typ.sysflag > 0 THEN falign := Base(btyp, alignLimit)\r\t\t\t\t\tELSIF btyp.size >= 4 THEN falign := 4\r\t\t\t\t\tELSIF btyp.size >= 2 THEN falign := 2\r\t\t\t\t\tELSE falign := 1\r\t\t\t\t\tEND;\r\t\t\t\t\tIF typ.sysflag = union THEN\r\t\t\t\t\t\tfld.adr := 0;\r\t\t\t\t\t\tIF btyp.size > offset THEN offset := btyp.size END;\r\t\t\t\t\tELSE\r\t\t\t\t\t\tAlign(offset, falign);\r\t\t\t\t\t\tfld.adr := offset;\r\t\t\t\t\t\tIF offset <= MAX(INTEGER) - 4 - btyp.size THEN INC(offset, btyp.size)\r\t\t\t\t\t\tELSE offset := 4; DevCPM.Mark(214, typ.txtpos)\r\t\t\t\t\t\tEND\t\t\t\t\t\t\r\t\t\t\t\tEND;\r\t\t\t\t\tIF falign > align THEN align := falign END ;\r\t\t\t\t\tfld := fld.link\r\t\t\t\tEND;\r(*\r\t\t\t\tIF (typ.sysflag = interface) & (typ.BaseTyp = NIL) THEN\r\t\t\t\t\tfld := DevCPT.NewObj(); fld.name^ := DevCPM.HdPtrName; fld.mode := Fld;\r\t\t\t\t\tfld.typ := DevCPT.undftyp; fld.adr := 8;\r\t\t\t\t\tfld.right := typ.link; typ.link := fld;\r\t\t\t\t\tfld := DevCPT.NewObj(); fld.name^ := DevCPM.HdPtrName; fld.mode := Fld;\r\t\t\t\t\tfld.typ := DevCPT.undftyp; fld.adr := 12;\r\t\t\t\t\ttyp.link.link := fld; typ.link.left := fld;\r\t\t\t\t\toffset := interfaceSize; align := 4\r\t\t\t\tEND;\r*)\r\t\t\t\tIF typ.sysflag <= 0 THEN align := 4 END;\r\t\t\t\ttyp.align := align;\r\t\t\t\t"
                    attr: 0
                  - text: "IF (typ.sysflag > 0) OR (offset > 2) THEN"
                    attr: 3
                  - text: " Align(offset, align) END;\r\t\t\t\ttyp.size := offset;\r\t\t\t\ttyp.n := -1  (* methods not counted yet *)\r\t\t\tELSIF c = Array THEN\r\t\t\t\tGTypeSize(btyp, guarded);\r\t\t\t\tIF (btyp.size = 0) OR (typ.n <= MAX(INTEGER) DIV btyp.size) THEN typ.size := typ.n * btyp.size\r\t\t\t\tELSE typ.size := 4; DevCPM.Mark(214, typ.txtpos)\r\t\t\t\tEND\r\t\t\tELSIF f = Pointer THEN\r\t\t\t\ttyp.size := DevCPM.PointerSize;\r\t\t\t\tIF guarded & ~typ.untagged THEN DevCPM.Mark(143, typ.txtpos) END\r\t\t\tELSIF f = ProcTyp THEN\r\t\t\t\ttyp.size := DevCPM.ProcSize\r\t\t\tELSE (* c = DynArr *)\r\t\t\t\tGTypeSize(btyp, guarded);\r\t\t\t\tIF (typ.sysflag = untagged) OR typ.untagged THEN typ.size := 4\r\t\t\t\tELSE\r\t\t\t\t\tIF btyp.comp = DynArr THEN typ.size := btyp.size + 4\r\t\t\t\t\tELSE typ.size := 8\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND GTypeSize;\r\t\r\tPROCEDURE TypeSize*(typ: DevCPT.Struct);\t(* also called from DevCPT.InStruct for arrays *)\r\tBEGIN\r\t\tGTypeSize(typ, FALSE)\r\tEND TypeSize;\r\t\r\tPROCEDURE GetComKernel;\r\t\tVAR name: DevCPT.Name; mod: DevCPT.Object;\r\tBEGIN\r\t\tIF addRef = NIL THEN\r\t\t\tDevCPT.OpenScope(SHORT(SHORT(-DevCPT.nofGmod)), NIL);\r\t\t\tDevCPT.topScope.name := DevCPT.NewName(\"$$\");\r\t\t\tname := \"AddRef\"; DevCPT.Insert(name, addRef);\r\t\t\taddRef.mode := XProc;\r\t\t\taddRef.fprint := addRefFP;\r\t\t\taddRef.fpdone := TRUE;\r\t\t\tname := \"Release\"; DevCPT.Insert(name, release);\r\t\t\trelease.mode := XProc;\r\t\t\trelease.fprint := addRefFP;\r\t\t\trelease.fpdone := TRUE;\r\t\t\tname := \"Release2\"; DevCPT.Insert(name, release2);\r\t\t\trelease2.mode := XProc;\r\t\t\trelease2.fprint := addRefFP;\r\t\t\trelease2.fpdone := TRUE;\r\t\t\tname := \"InterfaceTrapHandler\"; DevCPT.Insert(name, DevCPC486.intHandler);\r\t\t\tDevCPC486.intHandler.mode := XProc;\r\t\t\tDevCPC486.intHandler.fprint := intHandlerFP;\r\t\t\tDevCPC486.intHandler.fpdone := TRUE;\r\t\t\tDevCPT.GlbMod[DevCPT.nofGmod] := DevCPT.topScope;\r\t\t\tINC(DevCPT.nofGmod);\r\t\t\tDevCPT.CloseScope;\r\t\tEND\r\tEND GetComKernel;\r\r\tPROCEDURE EnumTProcs(rec: DevCPT.Struct);\t"
                    attr: 0
                  - text: "(* method numbers in declaration order *)"
                    attr: 1
                  - text: "\r\t\tVAR btyp: DevCPT.Struct; obj, redef: DevCPT.Object;\r\tBEGIN\r\t\tIF rec.n = -1 THEN\r\t\t\trec.n := 0; btyp := rec.BaseTyp;\r\t\t\tIF btyp # NIL THEN\r\t\t\t\tEnumTProcs(btyp); rec.n := btyp.n;\r\t\t\tEND;\r\t\t\tobj := rec.strobj.link;\r\t\t\tWHILE obj # NIL DO\r\t\t\t\tDevCPT.FindBaseField(obj.name^, rec, redef);\r\t\t\t\tIF redef # NIL THEN obj.num := redef.num (*mthno*);\r\t\t\t\t\tIF ~(isRedef IN obj.conval.setval) OR (redef.conval.setval * {extAttr, absAttr, empAttr} = {}) THEN\r\t\t\t\t\t\tDevCPM.Mark(119, rec.txtpos)\r\t\t\t\t\tEND\r\t\t\t\tELSE obj.num := rec.n; INC(rec.n)\r\t\t\t\tEND ;\r\t\t\t\tIF obj.conval.setval * {hasBody, absAttr, empAttr} = {} THEN DevCPM.Mark(129, obj.adr) END;\r\t\t\t\tobj := obj.nlink\r\t\t\tEND\r\t\tEND\r\tEND EnumTProcs;\r\r\tPROCEDURE CountTProcs(rec: DevCPT.Struct);\r\t\tVAR btyp: DevCPT.Struct; comProc: INTEGER; m, rel: DevCPT.Object; name: DevCPT.Name;\r\r\t\tPROCEDURE TProcs(obj: DevCPT.Object);\t(* obj.mnolev = 0, TProcs of base type already counted *)\r\t\t\tVAR redef: DevCPT.Object;\r\t\tBEGIN\r\t\t\tIF obj # NIL THEN\r\t\t\t\tTProcs(obj.left);\r\t\t\t\tIF obj.mode = TProc THEN\r\t\t\t\t\tDevCPT.FindBaseField(obj.name^, rec, redef);\r\t\t\t\t\t(* obj.adr := 0 *)\r\t\t\t\t\tIF redef # NIL THEN\r\t\t\t\t\t\tobj.num := redef.num (*mthno*);\r\t\t\t\t\t\tIF (redef.link # NIL) & (redef.link.typ.sysflag = interface) THEN\r\t\t\t\t\t\t\tobj.num := numPreIntProc + comProc - 1 - obj.num\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF ~(isRedef IN obj.conval.setval) OR (redef.conval.setval * {extAttr, absAttr, empAttr} = {}) THEN\r\t\t\t\t\t\t\tDevCPM.Mark(119, rec.txtpos)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE obj.num := rec.n; INC(rec.n)\r\t\t\t\t\tEND ;\r\t\t\t\t\tIF obj.conval.setval * {hasBody, absAttr, empAttr} = {} THEN DevCPM.Mark(129, obj.adr) END\r\t\t\t\tEND ;\r\t\t\t\tTProcs(obj.right)\r\t\t\tEND\r\t\tEND TProcs;\r\r\tBEGIN\r\t\tIF rec.n = -1 THEN\r\t\t\tcomProc := 0;\r\t\t\tIF rec.untagged THEN rec.n := 0 ELSE rec.n := DevCPT.anytyp.n END;\r\t\t\tbtyp := rec.BaseTyp;\r\t\t\tIF btyp # NIL THEN\r\t\t\t\tIF btyp.sysflag = interface THEN\r\t\t\t\t\tEnumTProcs(btyp); rec.n := btyp.n + numPreIntProc; comProc := btyp.n;\r\t\t\t\tELSE\r\t\t\t\t\tCountTProcs(btyp); rec.n := btyp.n\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tWHILE (btyp # NIL) & (btyp # DevCPT.undftyp) & (btyp.sysflag # interface) DO btyp := btyp.BaseTyp END;\r\t\t\tIF (btyp # NIL) & (btyp.sysflag = interface) THEN\r\t\t\t\tIF comProc > 0 THEN\r\t\t\t\t\tname := \"QueryInterface\"; DevCPT.FindField(name, rec, m);\r\t\t\t\t\tIF m.link.typ.sysflag = interface THEN\r\t\t\t\t\t\tDevCPT.InsertField(name, rec, m); m.mode := TProc; m.typ := rec;\r\t\t\t\t\t\tm.conval := DevCPT.NewConst(); m.conval.setval := {isRedef, hasBody, isCallback, extAttr};\r\t\t\t\t\t\tm.nlink := query; query := m\r\t\t\t\t\tEND;\r\t\t\t\t\tname := \"AddRef\";\r\t\t\t\t\tDevCPT.InsertField(name, rec, m); m.mode := TProc; m.mnolev := 0;\r\t\t\t\t\tm.conval := DevCPT.NewConst(); m.conval.setval := {isRedef, hasBody, isCallback, isHidden, extAttr};\r\t\t\t\t\tGetComKernel; addRef.used := TRUE; m.adr := -1; m.nlink := addRef;\r\t\t\t\tEND;\r\t\t\t\tname := \"RELEASE\";\r\t\t\t\tDevCPT.FindField(name, rec, rel);\r\t\t\t\tIF (rel # NIL) & (rel.link.typ = DevCPT.anyptrtyp) THEN rel := NIL END;\r\t\t\t\tIF (comProc > 0) OR (rel # NIL) THEN\r\t\t\t\t\tname := \"Release\";\r\t\t\t\t\tDevCPT.InsertField(name, rec, m); m.mode := TProc; m.mnolev := 0;\r\t\t\t\t\tm.conval := DevCPT.NewConst(); m.conval.setval := {isRedef, hasBody, isCallback, isHidden, extAttr};\r\t\t\t\t\tGetComKernel; m.adr := -1;\r\t\t\t\t\tIF rel # NIL THEN release2.used := TRUE; m.nlink := release2\r\t\t\t\t\tELSE release.used := TRUE; m.nlink := release\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tTProcs(rec.link);\r\t\tEND\r\tEND CountTProcs;\r\t\r\tPROCEDURE ^Parameters(firstPar, proc: DevCPT.Object);\r\r\tPROCEDURE ^TProcedures(obj: DevCPT.Object);\r\r\tPROCEDURE TypeAlloc(typ: DevCPT.Struct);\r\t\tVAR f, c: SHORTINT; fld: DevCPT.Object; btyp: DevCPT.Struct;\r\tBEGIN\r\t\tIF ~typ.allocated THEN\t(* not imported, not predefined, not allocated yet *)\r\t\t\ttyp.allocated := TRUE;\r\t\t\tTypeSize(typ);\r\t\t\tf := typ.form; c := typ.comp; btyp := typ.BaseTyp;\r\t\t\tIF c = Record THEN\r\t\t\t\tIF typ.sysflag = interface THEN\r\t\t\t\t\tEnumTProcs(typ);\r\t\t\t\tELSE\r\t\t\t\t\tCountTProcs(typ)\r\t\t\t\tEND;\r\t\t\t\tIF typ.extlev > 14 THEN DevCPM.Mark(233, typ.txtpos) END;\r\t\t\t\tIF btyp # NIL THEN TypeAlloc(btyp) END;\r\t\t\t\tIF ~typ.untagged THEN DevCPE.AllocTypDesc(typ) END;\r\t\t\t\tfld := typ.link;\r\t\t\t\tWHILE (fld # NIL) & (fld.mode = Fld) DO\r\t\t\t\t\tTypeAlloc(fld.typ); fld := fld.link\r\t\t\t\tEND;\r\t\t\t\tTProcedures(typ.link)\r\t\t\tELSIF f = Pointer THEN\r\t\t\t\tIF btyp = DevCPT.undftyp THEN DevCPM.Mark(128, typ.txtpos)\r\t\t\t\tELSE TypeAlloc(btyp);\r\t\t\t\tEND\r\t\t\tELSIF f = ProcTyp THEN\r\t\t\t\tTypeAlloc(btyp);\r\t\t\t\tParameters(typ.link, NIL)\r\t\t\tELSE (* c IN {Array, DynArr} *) \r\t\t\t\tTypeAlloc(btyp);\r\t\t\t\tIF (btyp.comp = DynArr) & btyp.untagged & ~typ.untagged THEN DevCPM.Mark(225, typ.txtpos) END;\r\t\t\tEND\r\t\tEND\r\tEND TypeAlloc;\r\r\tPROCEDURE NumOfIntProc (typ: DevCPT.Struct): INTEGER;\r\tBEGIN\r\t\tWHILE (typ # NIL) & (typ.sysflag # interface) DO typ := typ.BaseTyp END;\r\t\tIF typ # NIL THEN RETURN typ.n\r\t\tELSE RETURN 0\r\t\tEND\r\tEND NumOfIntProc;\r\t\r\tPROCEDURE Parameters(firstPar, proc: DevCPT.Object);\r\t(* firstPar.mnolev = 0 *)\r\t\tVAR par: DevCPT.Object; typ: DevCPT.Struct; padr, vadr: INTEGER;\r\tBEGIN\r\t\tpadr := ParOff; par := firstPar;\r\t\tWHILE par # NIL DO\r\t\t\ttyp := par.typ; TypeAlloc(typ);\r\t\t\tpar.adr := padr;\r\t\t\tIF (par.mode = VarPar) & (typ.comp # DynArr) THEN\r\t\t\t\tIF (typ.comp = Record) & ~typ.untagged THEN INC(padr, 8)\r\t\t\t\tELSE INC(padr, 4)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tIF (par.mode = Var) & (typ.comp = DynArr) & typ.untagged THEN DevCPM.err(145) END;\r\t\t\t\tINC(padr, typ.size); Align(padr, 4)\r\t\t\tEND;\r\t\t\tpar := par.link\r\t\tEND;\r\t\tIF proc # NIL THEN\r\t\t\tIF proc.mode = XProc THEN\r\t\t\t\tINCL(proc.conval.setval, isCallback)\r\t\t\tELSIF (proc.mode = TProc)\r\t\t\t\t& (proc.num >= numPreIntProc)\r\t\t\t\t& (proc.num < numPreIntProc + NumOfIntProc(proc.link.typ))\r\t\t\tTHEN\r\t\t\t\tINCL(proc.conval.setval, isCallback);\r\t\t\t\tINCL(proc.conval.setval, isGuarded)\r\t\t\tEND;\r\t\t\tIF proc.sysflag = guarded THEN INCL(proc.conval.setval, isGuarded) END;\r\t\t\tIF isGuarded IN proc.conval.setval THEN\r\t\t\t\tGetComKernel; vadr := -24\r\t\t\tELSE\r\t\t\t\tvadr := 0;\r\t\t\t\tIF imVar IN proc.conval.setval THEN DEC(vadr, 4) END;\r\t\t\t\tIF isCallback IN proc.conval.setval THEN DEC(vadr, 8) END\r\t\t\tEND;\r\t\t\tproc.conval.intval := padr; proc.conval.intval2 := vadr;\r\t\tEND\r\tEND Parameters;\r\t\r\tPROCEDURE Variables(var: DevCPT.Object; VAR varSize: INTEGER);\r\t(* allocates only offsets, regs allocated in DevCPC486.Enter *)\r\t\tVAR adr: INTEGER; typ: DevCPT.Struct;\r\tBEGIN\r\t\tadr := varSize;\r\t\tWHILE var # NIL DO\r\t\t\ttyp := var.typ; TypeAlloc(typ);\r\t\t\tDEC(adr, typ.size); NegAlign(adr, Base(typ, 4));\r\t\t\tvar.adr := adr;\r\t\t\tvar := var.link\r\t\tEND;\r\t\tNegAlign(adr, 4); varSize := adr\r\tEND Variables;\r\t\r\tPROCEDURE ^Objects(obj: DevCPT.Object);\r\r\tPROCEDURE Procedure(obj: DevCPT.Object);\r\t(* obj.mnolev = 0 *)\r\t\tVAR oldPos: INTEGER;\r\tBEGIN\r\t\toldPos := DevCPM.errpos; DevCPM.errpos := obj.scope.adr;\r\t\tTypeAlloc(obj.typ);\r\t\tParameters(obj.link, obj);\r\t\tIF ~(hasBody IN obj.conval.setval) THEN DevCPM.Mark(129, obj.adr) END ;\r\t\tVariables(obj.scope.scope, obj.conval.intval2);\t(* local variables *)\r\t\tObjects(obj.scope.right);\r\t\tDevCPM.errpos := oldPos\r\tEND Procedure;\r\r\tPROCEDURE TProcedures(obj: DevCPT.Object);\r\t(* obj.mnolev = 0 *)\r\t\tVAR par: DevCPT.Object; psize: INTEGER;\r\tBEGIN\r\t\tIF obj # NIL THEN\r\t\t\tTProcedures(obj.left);\r\t\t\tIF (obj.mode = TProc) & (obj.scope # NIL) THEN\r\t\t\t\tTypeAlloc(obj.typ);\r\t\t\t\tParameters(obj.link, obj);\r\t\t\t\tVariables(obj.scope.scope, obj.conval.intval2);\t(* local variables *)\r\t\t\t\tObjects(obj.scope.right);\r\t\t\tEND ;\r\t\t\tTProcedures(obj.right)\r\t\tEND\r\tEND TProcedures;\r\r\tPROCEDURE Objects(obj: DevCPT.Object);\r\tBEGIN\r\t\tIF obj # NIL THEN\r\t\t\tObjects(obj.left);\r\t\t\tIF obj.mode IN {Con, Typ, LProc, XProc, CProc, IProc} THEN\r\t\t\t\tIF (obj.mode IN {Con, Typ}) THEN TypeAlloc(obj.typ);\r\t\t\t\tELSE Procedure(obj)\r\t\t\t\tEND\r\t\t\tEND ;\r\t\t\tObjects(obj.right)\r\t\tEND\r\tEND Objects;\r\r\tPROCEDURE Allocate*;\r\t\tVAR gvarSize: INTEGER; name: DevCPT.Name;\r\tBEGIN\r\t\tDevCPM.errpos := DevCPT.topScope.adr;\t(* text position of scope used if error *)\r\t\tgvarSize := 0;\r\t\tVariables(DevCPT.topScope.scope, gvarSize); DevCPE.dsize := -gvarSize;\r\t\tObjects(DevCPT.topScope.right)\r\tEND Allocate;\r\t\r\t(************************)\r\r\tPROCEDURE SameExp (n1, n2: DevCPT.Node): BOOLEAN;\r\tBEGIN\r\t\tWHILE (n1.class = n2.class) & (n1.typ = n2.typ) DO\r\t\t\tCASE n1.class OF\r\t\t\t| Nvar, Nvarpar, Nproc: "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " n1.obj = n2.obj\r\t\t\t| Nconst: "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " (n1.typ.form IN {Int8..Int32}) & (n1.conval.intval = n2.conval.intval)\r\t\t\t| Nfield: IF n1.obj # n2.obj THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE END\r\t\t\t| Nderef, Nguard:\r\t\t\t| Nindex: IF ~SameExp(n1.right, n2.right) THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE END\r\t\t\t| Nmop: IF (n1.subcl # n2.subcl) OR (n1.subcl = is) THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE END\r\t\t\t| Ndop: IF (n1.subcl # n2.subcl) OR ~SameExp(n1.right, n2.right) THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE END\r\t\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE\r\t\t\tEND ;\r\t\t\tn1 := n1.left; n2 := n2.left\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE\r\tEND SameExp;\r\t\r\tPROCEDURE Check (n: DevCPT.Node; VAR used: SET; VAR size: INTEGER);\r\t\tVAR ux, uy: SET; sx, sy, sf: INTEGER; f: BYTE;\r\tBEGIN\r\t\tused := {}; size := 0;\r\t\tWHILE n # NIL DO\r\t\t\tIF n.class # Ncomp THEN\r\t\t\t\tCheck(n.left, ux, sx);\r\t\t\t\tCheck(n.right, uy, sy)\r\t\t\tEND;\r\t\t\tux := ux + uy; sf := 0;\r\t\t\tCASE n.class OF\r\t\t\t| Nvar, Nvarpar:\r\t\t\t\t\tIF (n.class = Nvarpar) OR  (n.typ.comp = DynArr) OR\r\t\t\t\t\t\t(n.obj.mnolev > 0) &\r\t\t\t\t\t\t(DevCPC486.imLevel[n.obj.mnolev] < DevCPC486.imLevel[DevCPL486.level]) THEN sf := 1 END\r\t\t\t| Nguard: sf := 2\r\t\t\t| Neguard, Nderef: sf := 1\r\t\t\t| Nindex:\r\t\t\t\t\tIF (n.right.class # Nconst) OR (n.left.typ.comp = DynArr) THEN sf := 1 END;\r\t\t\t\t\tIF sx > 0 THEN INC(sy) END\r\t\t\t| Nmop:\r\t\t\t\t\tCASE n.subcl OF\r\t\t\t\t\t| is, adr, typfn, minus, abs, cap, val: sf := 1\r\t\t\t\t\t| bit: sf := 2; INCL(ux, CX)\r\t\t\t\t\t| conv:\r\t\t\t\t\t\t\tIF n.typ.form = Int64 THEN sf := 2\r\t\t\t\t\t\t\tELSIF ~(n.typ.form IN realSet) THEN sf := 1;\r\t\t\t\t\t\t\t\tIF n.left.typ.form IN realSet THEN INCL(ux, AX) END\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t| odd, cc, not:\r\t\t\t\t\tEND\r\t\t\t| Ndop:\r\t\t\t\t\tf := n.left.typ.form;\r\t\t\t\t\tIF f # Bool THEN\r\t\t\t\t\t\tCASE n.subcl OF\r\t\t\t\t\t\t| times:\r\t\t\t\t\t\t\t\tsf := 1;\r\t\t\t\t\t\t\t\tIF f = Int8 THEN INCL(ux, AX) END\r\t\t\t\t\t\t| div, mod:\r\t\t\t\t\t\t\t\tsf := 3; INCL(ux, AX);\r\t\t\t\t\t\t\t\tIF f > Int8 THEN INCL(ux, DX) END\r\t\t\t\t\t\t| eql..geq:\r\t\t\t\t\t\t\t\tIF f IN {String8, String16, Comp} THEN ux := ux + {AX, CX, SI, DI}; sf := 4\r\t\t\t\t\t\t\t\tELSIF f IN realSet THEN INCL(ux, AX); sf := 1\r\t\t\t\t\t\t\t\tELSE sf := 1\r\t\t\t\t\t\t\t\tEND\r\t\t\t\t\t\t| ash, lsh, rot:\r\t\t\t\t\t\t\t\tIF n.right.class = Nconst THEN sf := 1 ELSE sf := 2; INCL(ux, CX) END\r\t\t\t\t\t\t| slash, plus, minus, msk, in, bit:\r\t\t\t\t\t\t\t\tsf := 1\r\t\t\t\t\t\t| len:\r\t\t\t\t\t\t\t\tIF f IN {String8, String16} THEN ux := ux + {AX, CX, DI}; sf := 3\r\t\t\t\t\t\t\t\tELSE sf := 1\r\t\t\t\t\t\t\t\tEND\r\t\t\t\t\t\t| min, max:\r\t\t\t\t\t\t\t\tsf := 1;\r\t\t\t\t\t\t\t\tIF f IN realSet THEN INCL(ux, AX) END\r\t\t\t\t\t\t| queryfn:\r\t\t\t\t\t\t\t\tux := ux + {CX, SI, DI}; sf := 4\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF sy > sx THEN INC(sx) ELSE INC(sy) END\r\t\t\t\t\tEND\r\t\t\t| Nupto:\r\t\t\t\t\tIF (n.right.class = Nconst) OR (n.left.class = Nconst) THEN sf := 2\r\t\t\t\t\tELSE sf := 3\r\t\t\t\t\tEND;\r\t\t\t\t\tINCL(ux, CX); INC(sx)\r\t\t\t| Ncall, Ncomp:\r\t\t\t\t\tsf := 10; ux := wreg + {float}\r\t\t\t| Nfield, Nconst, Nproc, Ntype:\r\t\t\tEND;\r\t\t\tused := used + ux;\r\t\t\tIF sx > size THEN size := sx END;\r\t\t\tIF sy > size THEN size := sy END;\r\t\t\tIF sf > size THEN size := sf END;\r\t\t\tn := n.link\r\t\tEND;\r\t\tIF size > 10 THEN size := 10 END\r\tEND Check;\r\t\r\tPROCEDURE^ expr (n: DevCPT.Node; VAR x: DevCPL486.Item; hint, stop: SET);\r\t\r\tPROCEDURE DualExp (left, right: DevCPT.Node; VAR x, y: DevCPL486.Item; hx, hy, stpx, stpy: SET);\r\t\tVAR ux, uy: SET; sx, sy: INTEGER;\r\tBEGIN\r\t\tCheck(left, ux, sx); Check(right, uy, sy);\r\t\tIF sy > sx THEN\r\t\t\texpr(right, y, hy + stpy, ux + stpy * {AX, CX});\r\t\t\texpr(left, x, hx, stpx);\r\t\t\tDevCPC486.Assert(y, hy, stpy)\r\t\tELSE\r\t\t\texpr(left, x, hx + stpx, uy);\r\t\t\texpr(right, y, hy, stpy);\r\t\t\tDevCPC486.Assert(x, hx, stpx)\r\t\tEND;\r\tEND DualExp;\r\r\tPROCEDURE IntDOp (n: DevCPT.Node; VAR x: DevCPL486.Item; hint: SET);\r\t\tVAR y: DevCPL486.Item; rev: BOOLEAN;\r\tBEGIN\r\t\tDualExp(n.left, n.right, x, y, hint, hint, {stk}, {stk});\r\t\tIF (x.mode = Reg) & DevCPC486.Fits(x, hint) THEN\r\t\t\tDevCPC486.IntDOp(x, y, n.subcl, FALSE)\r\t\tELSIF (y.mode = Reg) & DevCPC486.Fits(y, hint) THEN\r\t\t\tDevCPC486.IntDOp(y, x, n.subcl, TRUE); x := y\r\t\tELSIF x.mode # Reg THEN\r\t\t\tDevCPC486.Load(x, hint, {con}); DevCPC486.IntDOp(x, y, n.subcl, FALSE)\r\t\tELSIF y.mode # Reg THEN\r\t\t\tDevCPC486.Load(y, hint, {con}); DevCPC486.IntDOp(y, x, n.subcl, TRUE); x := y\r\t\tELSE\r\t\t\tDevCPC486.IntDOp(x, y, n.subcl, FALSE)\r\t\tEND\r\tEND IntDOp;\r\t\r\tPROCEDURE FloatDOp (n: DevCPT.Node; VAR x: DevCPL486.Item);\r\t\tVAR y: DevCPL486.Item; ux, uy, uf: SET; sx, sy: INTEGER;\r\tBEGIN\r\t\tCheck(n.left, ux, sx); Check(n.right, uy, sy);\r\t\tIF (n.subcl = min) OR (n.subcl = max) THEN uf := {AX} ELSE uf := {} END;\r\t\tIF (sy > sx) OR (sy = sx) & ((n.subcl = mod) OR (n.subcl = ash)) THEN\r\t\t\texpr(n.right, x, {}, ux + {mem, stk});\r\t\t\texpr(n.left, y, {}, uf);\r\t\t\tDevCPC486.FloatDOp(x, y, n.subcl, TRUE)\r\t\tELSIF float IN uy THEN (* function calls in both operands *)\r\t\t\texpr(n.left, y, {}, uy + {mem});\r\t\t\texpr(n.right, x, {}, {mem, stk});\r\t\t\tDevCPC486.FloatDOp(x, y, n.subcl, TRUE)\r\t\tELSE\r\t\t\texpr(n.left, x, {}, uy + {mem, stk});\r\t\t\texpr(n.right, y, {}, uf);\r\t\t\tDevCPC486.FloatDOp(x, y, n.subcl, FALSE)\r\t\tEND\r\tEND FloatDOp;\r\t\r\tPROCEDURE design (n: DevCPT.Node; VAR x: DevCPL486.Item; hint, stop: SET);\r\t\tVAR obj: DevCPT.Object; y: DevCPL486.Item; ux, uy: SET; sx, sy: INTEGER;\r\tBEGIN\r\t\tCASE n.class OF\r\t\t  Nvar, Nvarpar:\r\t\t\t\tobj := n.obj; x.mode := obj.mode; x.obj := obj; x.scale := 0;\r\t\t\t\tIF obj.typ.comp = DynArr THEN x.mode := VarPar END;\r\t\t\t\tIF obj.mnolev < 0 THEN x.offset := 0; x.tmode := Con\r\t\t\t\tELSIF x.mode = Var THEN x.offset := obj.adr; x.tmode := Con\r\t\t\t\tELSE x.offset := 0; x.tmode := VarPar\r\t\t\t\tEND\r\t\t| Nfield:\r\t\t\t\tdesign(n.left, x, hint, stop); DevCPC486.Field(x, n.obj)\r\t\t| Nderef:\r\t\t\t\tIF n.subcl # 0 THEN\r\t\t\t\t\texpr(n.left, x, hint, stop);\r\t\t\t\t\tIF n.typ.form = String8 THEN x.form := VString8 ELSE x.form := VString16 END\r\t\t\t\tELSE\r\t\t\t\t\texpr(n.left, x, hint, stop + {mem} - {"
                    attr: 0
                  - text: loaded
                    attr: 3
                  - text: "}); DevCPC486.DeRef(x)\r\t\t\t\tEND\r\t\t| Nindex:\r\t\t\t\tCheck(n.left, ux, sx); Check(n.right, uy, sy);\r\t\t\t\tIF wreg - uy = {} THEN\r\t\t\t\t\texpr(n.right, y, hint + stop, ux);\r\t\t\t\t\tdesign(n.left, x, hint, stop);\r\t\t\t\t\tIF x.scale # 0 THEN DevCPC486.Index(x, y, {}, {}) ELSE DevCPC486.Index(x, y, hint, stop) END\r\t\t\t\tELSE\r\t\t\t\t\tdesign(n.left, x, hint, stop + uy);\r\t\t\t\t\tIF x.scale # 0 THEN expr(n.right, y, {}, {}); DevCPC486.Index(x, y, {}, {})\r\t\t\t\t\tELSE expr(n.right, y, hint, stop); DevCPC486.Index(x, y, hint, stop)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t| Nguard, Neguard:\r\t\t\t\tIF n.typ.form = Pointer THEN\r\t\t\t\t\t"
                    attr: 0
                  - text: "IF loaded IN stop THEN expr(n.left, x, hint, stop) ELSE expr(n.left, x, hint, stop + {mem}) END"
                    attr: 3
                  - text: "\r\t\t\t\tELSE design(n.left, x, hint, stop)\r\t\t\t\tEND;\r\t\t\t\tDevCPC486.TypTest(x, n.typ, TRUE, n.class = Neguard)\r\t\t| Nproc:\r\t\t\t\tobj := n.obj; x.mode := obj.mode; x.obj := obj;\r\t\t\t\tIF x.mode = TProc THEN x.offset := obj.num; (*mthno*) x.scale := n.subcl (* super *) END\r\t\tEND;\r\t\tx.typ := n.typ\r\tEND design;\r\t\r\tPROCEDURE IsAllocDynArr (x: DevCPT.Node): BOOLEAN;\r\tBEGIN\r\t\tIF (x.typ.comp = DynArr) & ~x.typ.untagged THEN\r\t\t\tWHILE x.class = Nindex DO x := x.left END;\r\t\t\tIF x.class = Nderef THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE END\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE\r\tEND IsAllocDynArr;\r\t\r\tPROCEDURE StringOp (left, right: DevCPT.Node; VAR x, y: DevCPL486.Item; useLen: BOOLEAN);\r\t\tVAR ax, ay: DevCPL486.Item; ux: SET; sx: INTEGER;\r\tBEGIN\r\t\tCheck(left, ux, sx);\r\t\texpr(right, y, wreg - {SI} + ux, {});\r\t\tay := y; DevCPC486.GetAdr(ay, wreg - {SI} + ux, {}); DevCPC486.Assert(ay, wreg - {SI}, ux);\r\t\tIF useLen & IsAllocDynArr(left) THEN\t(* keep len descriptor *)\r\t\t\tdesign(left, x, wreg - {CX}, {loaded});\r\t\t\tDevCPC486.Prepare(x, wreg - {CX} + {deref}, {DI})\r\t\tELSE\r\t\t\texpr(left, x, wreg - {DI}, {})\r\t\tEND;\r\t\tax := x; DevCPC486.GetAdr(ax, {}, wreg - {DI} + {stk, con});\r\t\tDevCPC486.Load(ay, {}, wreg - {SI} + {con});\r\t\tDevCPC486.Free(ax); DevCPC486.Free(ay)\r\tEND StringOp;\r\t\r\tPROCEDURE AdrExpr (n: DevCPT.Node; VAR x: DevCPL486.Item; hint, stop: SET);\r\tBEGIN\r\t\tIF n.class < Nconst THEN\r\t\t\tdesign(n, x, hint + stop, {loaded}); DevCPC486.Prepare(x, hint + {deref}, stop)\r\t\tELSE expr(n, x, hint, stop)\r\t\tEND\r\tEND AdrExpr;\r\t\r\t(* ---------- interface pointer reference counting ---------- *)\r\t\r\tPROCEDURE HandleIPtrs (typ: DevCPT.Struct; VAR x, y: DevCPL486.Item; add, rel, init: BOOLEAN);\r\t\r\t\tPROCEDURE FindPtrs (typ: DevCPT.Struct; adr: INTEGER);\r\t\t\tVAR fld: DevCPT.Object; btyp: DevCPT.Struct; i, n: INTEGER;\r\t\tBEGIN\r\t\t\tIF (typ.form = Pointer) & (typ.sysflag = interface) THEN\r\t\t\t\tIF add THEN DevCPC486.IPAddRef(y, adr, TRUE) END;\r\t\t\t\tIF rel THEN DevCPC486.IPRelease(x, adr, TRUE, init) END\r\t\t\tELSIF (typ.comp = Record) & (typ.sysflag # union) THEN\r\t\t\t\tbtyp := typ.BaseTyp;\r\t\t\t\tIF btyp # NIL THEN FindPtrs(btyp, adr) END ;\r\t\t\t\tfld := typ.link;\r\t\t\t\tWHILE (fld # NIL) & (fld.mode = Fld) DO\r\t\t\t\t\tIF (fld.sysflag = interface) & (fld.name^ = DevCPM.HdUtPtrName) THEN\r\t\t\t\t\t\tIF add THEN DevCPC486.IPAddRef(y, fld.adr + adr, TRUE) END;\r\t\t\t\t\t\tIF rel THEN DevCPC486.IPRelease(x, fld.adr + adr, TRUE, init) END\r\t\t\t\t\tELSE FindPtrs(fld.typ, fld.adr + adr)\r\t\t\t\t\tEND;\r\t\t\t\t\tfld := fld.link\r\t\t\t\tEND\r\t\t\tELSIF typ.comp = Array THEN\r\t\t\t\tbtyp := typ.BaseTyp; n := typ.n;\r\t\t\t\tWHILE btyp.comp = Array DO n := btyp.n * n; btyp := btyp.BaseTyp END ;\r\t\t\t\tIF DevCPC486.ContainsIPtrs(btyp) THEN\r\t\t\t\t\ti := 0;\r\t\t\t\t\tWHILE i < n DO FindPtrs(btyp, adr); INC(adr, btyp.size); INC(i) END\r\t\t\t\tEND\r\t\t\tELSIF typ.comp = DynArr THEN \r\t\t\t\tIF DevCPC486.ContainsIPtrs(typ) THEN DevCPM.err(221) END\r\t\t\tEND\r\t\tEND FindPtrs;\r\t\r\tBEGIN\r\t\tFindPtrs(typ, 0)\r\tEND HandleIPtrs;\r\t\r\tPROCEDURE CountedPtr (n: DevCPT.Node): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " (n.typ.form = Pointer) & (n.typ.sysflag = interface)\r\t\t\t& ((n.class = Ncall) OR (n.class = Ncomp) & (n.right.class = Ncall))\r\tEND CountedPtr;\r\t\r\tPROCEDURE IPAssign (nx, ny: DevCPT.Node; VAR x, y: DevCPL486.Item; ux: SET);\r\t\t(* nx.typ.form = Pointer & nx.typ.sysflag = interface *)\r\tBEGIN\r\t\texpr(ny, y, {}, wreg - {SI} + {mem, stk});\r\t\tIF (ny.class # Nconst) & ~CountedPtr(ny) THEN\r\t\t\tDevCPC486.IPAddRef(y, 0, TRUE)\r\t\tEND;\r\t\tIF nx # NIL THEN\r\t\t\tDevCPC486.Assert(y, {}, wreg - {SI} + ux);\r\t\t\texpr(nx, x, wreg - {DI}, {loaded});\r\t\t\tIF (x.mode = Ind) & (x.reg IN wreg - {SI, DI}) OR (x.scale # 0) THEN\r\t\t\t\tDevCPC486.GetAdr(x, {}, wreg - {DI} + {con});\r\t\t\t\tx.mode := Ind; x.offset := 0; x.scale := 0\r\t\t\tEND;\r\t\t\tDevCPC486.IPRelease(x, 0, TRUE, FALSE);\r\t\tEND\r\tEND IPAssign;\r\t\r\tPROCEDURE IPStructAssign (typ: DevCPT.Struct);\r\t\tVAR x, y: DevCPL486.Item;\r\tBEGIN\r\t\tIF typ.comp = DynArr THEN DevCPM.err(270) END;\r\t\t(* addresses in SI and DI *)\r\t\tx.mode := Ind; x.reg := DI; x.offset := 0; x.scale := 0;\r\t\ty.mode := Ind; y.reg := SI; y.offset := 0; y.scale := 0;\r\t\tHandleIPtrs(typ, x, y, TRUE, TRUE, FALSE)\r\tEND IPStructAssign;\r\r\tPROCEDURE IPFree (nx: DevCPT.Node; VAR x: DevCPL486.Item);\r\tBEGIN\r\t\texpr(nx, x, wreg - {DI}, {loaded}); DevCPC486.GetAdr(x, {}, wreg - {DI} + {con});\r\t\tx.mode := Ind; x.offset := 0; x.scale := 0;\r\t\tIF nx.typ.form = Comp THEN\r\t\t\tHandleIPtrs(nx.typ, x, x, FALSE, TRUE, TRUE)\r\t\tELSE\t(* nx.typ.form = Pointer & nx.typ.sysflag = interface *)\r\t\t\tDevCPC486.IPRelease(x, 0, TRUE, TRUE);\r\t\tEND\r\tEND IPFree;\r\t\r\t(* unchanged val parameters allways counted because of aliasing problems REMOVED! *)\r\t\r\tPROCEDURE InitializeIPVars (proc: DevCPT.Object);\r\t\tVAR x: DevCPL486.Item; obj: DevCPT.Object;\r\tBEGIN\r\t\tx.mode := Ind; x.reg := BP; x.scale := 0; x.form := Pointer;\r\t\tobj := proc.link;\r\t\tWHILE obj # NIL DO\r\t\t\tIF (obj.mode = Var) & obj.used THEN\t(* changed value parameters *)\r\t\t\t\tx.offset := obj.adr;\r\t\t\t\tHandleIPtrs(obj.typ, x, x, TRUE, FALSE, FALSE)\r\t\t\tEND;\r\t\t\tobj := obj.link\r\t\tEND\r\tEND InitializeIPVars;\r\t\r\tPROCEDURE ReleaseIPVars (proc: DevCPT.Object);\r\t\tVAR x, ax, dx, si, di: DevCPL486.Item; obj: DevCPT.Object;\r\tBEGIN\r\t\tobj := proc.link;\r\t\tWHILE (obj # NIL) & ((obj.mode # Var) OR ~obj.used OR ~DevCPC486.ContainsIPtrs(obj.typ)) DO\r\t\t\tobj := obj.link\r\t\tEND;\r\t\tIF obj = NIL THEN\r\t\t\tobj := proc.scope.scope;\r\t\t\tWHILE (obj # NIL) & ~DevCPC486.ContainsIPtrs(obj.typ) DO obj := obj.link END;\r\t\t\tIF obj = NIL THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END\r\t\tEND;\r\t\tDevCPL486.MakeReg(ax, AX, Int32); DevCPL486.MakeReg(si, SI, Int32);\r\t\tDevCPL486.MakeReg(dx, DX, Int32); DevCPL486.MakeReg(di, DI, Int32);\r\t\tIF ~(proc.typ.form IN {Real32, Real64, NoTyp}) THEN DevCPL486.GenMove(ax, si) END;\r\t\tIF proc.typ.form = Int64 THEN DevCPL486.GenMove(dx, di) END;\r\t\tx.mode := Ind; x.reg := BP; x.scale := 0; x.form := Pointer;\r\t\tobj := proc.link;\r\t\tWHILE obj # NIL DO\r\t\t\tIF (obj.mode = Var) & obj.used THEN\t(* value parameters *)\r\t\t\t\tx.offset := obj.adr;\r\t\t\t\tHandleIPtrs(obj.typ, x, x, FALSE, TRUE, FALSE)\r\t\t\tEND;\r\t\t\tobj := obj.link\r\t\tEND;\r\t\tobj := proc.scope.scope;\r\t\tWHILE obj # NIL DO\t(* local variables *)\r\t\t\tIF obj.used THEN\r\t\t\t\tx.offset := obj.adr;\r\t\t\t\tHandleIPtrs(obj.typ, x, x, FALSE, TRUE, FALSE);\r\t\t\tEND;\r\t\t\tobj := obj.link\r\t\tEND;\r\t\tIF ~(proc.typ.form IN {Real32, Real64, NoTyp}) THEN DevCPL486.GenMove(si, ax) END;\r\t\tIF proc.typ.form = Int64 THEN DevCPL486.GenMove(di, dx) END\r\tEND ReleaseIPVars;\r\t\r\tPROCEDURE CompareIntTypes (\r\t\ttyp: DevCPT.Struct; VAR id: DevCPL486.Item; VAR exit: DevCPL486.Label; VAR num: INTEGER\r\t);\r\t\tVAR x, y: DevCPL486.Item; local: DevCPL486.Label;\r\tBEGIN\r\t\tlocal := DevCPL486.NewLbl;\r\t\ttyp := typ.BaseTyp; num := 0;\r\t\tWHILE (typ # NIL) & (typ # DevCPT.undftyp) DO\r\t\t\tIF (typ.sysflag = interface) & (typ.ext # NIL) THEN\r\t\t\t\tIF num > 0 THEN DevCPC486.JumpT(x, local) END;\r\t\t\t\tDevCPC486.GuidFromString(typ.ext, y);\r\t\t\t\tx := id; DevCPC486.GetAdr(x, wreg - {SI}, {mem});\r\t\t\t\tx := y; DevCPC486.GetAdr(x, wreg - {DI}, {});\r\t\t\t\tx := id; DevCPC486.CmpString(x, y, eql, FALSE);\r\t\t\t\tINC(num)\r\t\t\tEND;\r\t\t\ttyp := typ.BaseTyp\r\t\tEND;\r\t\tIF num > 0 THEN DevCPC486.JumpF(x, exit) END;\r\t\tIF num > 1 THEN DevCPL486.SetLabel(local) END\r\tEND CompareIntTypes;\r\t\r\tPROCEDURE InstallQueryInterface (typ: DevCPT.Struct; proc: DevCPT.Object);\r\t\tVAR this, id, int, unk, c: DevCPL486.Item; nil, end: DevCPL486.Label; num: INTEGER;\r\tBEGIN\r\t\tnil := DevCPL486.NewLbl; end := DevCPL486.NewLbl;\r\t\tthis.mode := Ind; this.reg := BP; this.offset := 8; this.scale := 0; this.form := Pointer; this.typ := DevCPT.anyptrtyp;\r\t\tid.mode := DInd; id.reg := BP; id.offset := 12; id.scale := 0; id.form := Pointer;\r\t\tint.mode := DInd; int.reg := BP; int.offset := 16; int.scale := 0; int.form := Pointer;\r\t\tDevCPC486.GetAdr(int, {}, {AX, CX, SI, DI, mem}); int.mode := Ind; int.offset := 0;\r\t\tDevCPL486.MakeConst(c, 0, Pointer); DevCPC486.Assign(int, c);\r\t\tunk.mode := Ind; unk.reg := BP; unk.offset := 8; unk.scale := 0; unk.form := Pointer; unk.typ := DevCPT.punktyp;\r\t\tDevCPC486.Load(unk, {}, {});\r\t\tunk.mode := Ind; unk.offset := 8;\r\t\tDevCPC486.Load(unk, {}, {});\r\t\tDevCPL486.GenComp(c, unk);\r\t\tDevCPL486.GenJump(4, nil, TRUE);\r\t\tDevCPL486.MakeReg(c, int.reg, Pointer);\r\t\tDevCPL486.GenPush(c);\r\t\tc.mode := Ind; c.reg := BP; c.offset := 12; c.scale := 0; c.form := Pointer;\r\t\tDevCPL486.GenPush(c);\r\t\tDevCPL486.GenPush(unk);\r\t\tc.mode := Ind; c.reg := unk.reg; c.offset := 0; c.scale := 0; c.form := Pointer;\r\t\tDevCPL486.GenMove(c, unk);\r\t\tunk.mode := Ind; unk.offset := 0; unk.scale := 0; unk.form := Pointer;\r\t\tDevCPL486.GenCall(unk);\r\t\tDevCPC486.Free(unk);\r\t\tDevCPL486.GenJump(-1, end, FALSE);\r\t\tDevCPL486.SetLabel(nil);\r\t\tDevCPL486.MakeConst(c, 80004002H, Int32);\t(* E_NOINTERFACE *)\r\t\tDevCPC486.Result(proc, c);\r\t\tCompareIntTypes(typ, id, end, num);\r\t\tIF num > 0 THEN\r\t\t\tDevCPC486.Load(this, {}, {});\r\t\t\tDevCPC486.Assign(int, this);\r\t\t\tDevCPC486.IPAddRef(this, 0, FALSE);\r\t\t\tDevCPL486.MakeConst(c, 0, Int32);\t(* S_OK *)\r\t\t\tDevCPC486.Result(proc, c);\r\t\tEND;\r\t\tDevCPL486.SetLabel(end)\r\tEND InstallQueryInterface;\r\r\t(* -------------------- *)\r\r\tPROCEDURE ActualPar (n: DevCPT.Node; fp: DevCPT.Object; "
