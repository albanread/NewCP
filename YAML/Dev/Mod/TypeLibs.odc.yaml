                  - text: "\tPROCEDURE ShowInvoke (tinfo: WinOleAut.ITypeInfo; attr: WinOleAut.PtrTYPEATTR;\r\t\t\t\t\t\t\t\t\t\ttn: WinOle.BSTR; opts: SET; VAR out: TextMappers.Formatter);\r\t\tVAR func, pfunc: WinOleAut.PtrFUNCDESC; res: COM.RESULT; i, j, n: INTEGER;\r\t\t\tname: WinOle.BSTR; var: WinOleAut.PtrVARDESC; ifUsed: BOOLEAN;\r\tBEGIN\r\t\tout.WriteTab; out.WriteSString(\"PROCEDURE (this: \"); WriteBSTR(tn, out);\r\t\tout.WriteSString(\") Invoke* (id, n: INTEGER; VAR par: CtlT.ParList; VAR ret: CtlT.Variant);\");\r\t\tout.WriteLn; out.WriteTab; out.WriteSString(\"BEGIN\"); out.WriteLn;\r\t\tout.WriteTab; out.WriteTab; out.WriteSString(\"CASE id OF\"); out.WriteLn;\r\t\ti := 0;\r\t\tWHILE i < attr.cVars DO\t(* property access *)\r\t\t\tres := tinfo.GetVarDesc(i, var); ASSERT(res >= 0, 101);\r\t\t\tIF var.varkind # WinOleAut.VAR_CONST THEN\r\t\t\t\tres := tinfo.GetNames(var.memid, name, 1, n);\r\t\t\t\tout.WriteTab; out.WriteTab; out.WriteSString(\"| \"); out.WriteInt(var.memid);\r\t\t\t\tout.WriteSString(\": \");\r\t\t\t\tIF ~ODD(var.wVarFlags DIV WinOleAut.VARFLAG_FREADONLY) THEN\r\t\t\t\t\tout.WriteSString(\"IF n = -1 THEN this.PUT\");\r\t\t\t\t\tWriteBSTR(name, out); out.WriteChar(\"(\");\r\t\t\t\t\tWriteTypeConv(var.elemdescVar.tdesc, tinfo, par, 0, out);\r\t\t\t\t\tout.WriteChar(\")\"); out.WriteLn;\r\t\t\t\t\tout.WriteTab; out.WriteTab; out.WriteTab; out.WriteSString(\"ELSE \")\r\t\t\t\tEND;\r\t\t\t\tout.WriteSString(\"ASSERT(n = 0, 11); \");\r\t\t\t\tout.WriteSString(\"CtlC.\"); WriteShortType(var.elemdescVar.tdesc, tinfo, out);\r\t\t\t\tout.WriteSString(\"Var(this.\"); WriteBSTR(name, out);\r\t\t\t\tout.WriteSString(\"(), ret)\"); out.WriteLn;\r\t\t\t\tIF ~ODD(var.wVarFlags DIV WinOleAut.VARFLAG_FREADONLY) THEN\r\t\t\t\t\tout.WriteTab; out.WriteTab; out.WriteTab; out.WriteSString(\"END\"); out.WriteLn\r\t\t\t\tEND;\r\t\t\t\tWinOleAut.SysFreeString(name)\r\t\t\tEND;\r\t\t\ttinfo.ReleaseVarDesc(var);\r\t\t\tINC(i)\r\t\tEND;\r\t\ti := 0;\r\t\tWHILE i < attr.cFuncs DO\t(* method access *)\r\t\t\tres := tinfo.GetFuncDesc(i, func); ASSERT(res >= 0, 102);\r\t\t\tIF ~ODD(func.wFuncFlags DIV WinOleAut.FUNCFLAG_FRESTRICTED)\r\t\t\t\t\t& (func.invkind < WinOleAut.INVOKE_PROPERTYPUT) THEN\r\t\t\t\tout.WriteTab; out.WriteTab; out.WriteSString(\"| \"); out.WriteInt(func.memid);\r\t\t\t\tout.WriteSString(\": \"); ifUsed := FALSE;\r\t\t\t\tIF func.invkind = WinOleAut.INVOKE_PROPERTYGET THEN\r\t\t\t\t\tj := 0;\r\t\t\t\t\tWHILE j < attr.cFuncs DO\r\t\t\t\t\t\tres := tinfo.GetFuncDesc(j, pfunc); ASSERT(res >= 0, 103);\r\t\t\t\t\t\tIF (pfunc.memid = func.memid)\r\t\t\t\t\t\t\t\t& ~ODD(pfunc.wFuncFlags DIV WinOleAut.FUNCFLAG_FRESTRICTED)\r\t\t\t\t\t\t\t\t& (pfunc.invkind >= WinOleAut.INVOKE_PROPERTYPUT) THEN\r\t\t\t\t\t\t\tIF ifUsed THEN out.WriteTab; out.WriteTab; out.WriteTab; out.WriteSString(\"ELS\") END;\r\t\t\t\t\t\t\tout.WriteSString(\"IF n = -\");\r\t\t\t\t\t\t\tIF ODD(pfunc.invkind DIV WinOleAut.INVOKE_PROPERTYPUT) THEN\r\t\t\t\t\t\t\t\tout.WriteInt(pfunc.cParams)\r\t\t\t\t\t\t\tELSE out.WriteInt(pfunc.cParams + 100)\r\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\tout.WriteSString(\" THEN \");\r\t\t\t\t\t\t\tShowInvokeCall(pfunc, tinfo, opts, out); out.WriteLn;\r\t\t\t\t\t\t\tifUsed := TRUE\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\ttinfo.ReleaseFuncDesc(pfunc);\r\t\t\t\t\t\tINC(j)\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tIF ifUsed THEN out.WriteTab; out.WriteTab; out.WriteTab; out.WriteSString(\"ELSE \") END;\r\t\t\t\tout.WriteSString(\"ASSERT(n = \"); out.WriteInt(func.cParams); out.WriteSString(\", 11); \");\r\t\t\t\tShowInvokeCall(func, tinfo, opts, out); out.WriteLn;\r\t\t\t\tIF ifUsed THEN out.WriteTab; out.WriteTab; out.WriteTab; out.WriteSString(\"END\"); out.WriteLn END\r\t\t\tEND;\r\t\t\ttinfo.ReleaseFuncDesc(func);\r\t\t\tINC(i)\r\t\tEND;\r\t\tout.WriteTab; out.WriteTab; out.WriteSString(\"END\"); out.WriteLn;\r\t\tout.WriteTab; out.WriteSString(\"END Invoke;\"); out.WriteLn; out.WriteLn;\r\t\t(* GetIID *)\r\t\tout.WriteTab; out.WriteSS