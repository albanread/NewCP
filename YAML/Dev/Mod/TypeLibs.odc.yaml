                    attr: 1
                  - text: "\r\t\tIF (type.vt = WinOle.VT_PTR) & (type.u.lptdesc.vt = WinOle.VT_USERDEFINED) THEN\r\t\t\tres := tinfo.GetRefTypeInfo(type.u.lptdesc.u.hreftype, ti);\r\t\t\tIF res >= 0 THEN\r\t\t\t\tres := ti.GetDocumentation(-1, s, NIL, NIL, NIL);\r\t\t\t\tIF s # NIL THEN\r\t\t\t\t\tIF name^ = s^ THEN\r\t\t\t\t\t\tIF name[0] < \"a\" THEN name[0] := CHR(ORD(name[0]) + 32)\r\t\t\t\t\t\tELSE name[0] := CHR(ORD(name[0]) - 32)\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND;\r\t\t\t\t\tWinOleAut.SysFreeString(s)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND;\r*)\t\t\r\t\tWriteBSTR(name, out); out.WriteSString(\": \");\r\t\tIF (wrapper IN opts) & (type.vt = WinOle.VT_BSTR) & (kind = value) THEN "
                    attr: 0
