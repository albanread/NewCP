                    attr: 5
                  - text: "\r\t\tELSE WriteType(type, tinfo, opts, out)\r\t\tEND;\r(*\r\t\tIF ODD(param.u.paramdesc.wParamFlags DIV WinOleAut.PARAMFLAG_FHASDEFAULT) THEN\r\t\t\tout.WriteSString(\" (* := \");\r\t\t\tWriteVariant(param.u.paramdesc.pparamdescex.varDefaultValue, out);\r\t\t\tout.WriteSString(\" *)\")\r\t\tEND;\r*)\r\tEND ShowParam;\r\r"
                    attr: 0
                  - text: "\tPROCEDURE ShowWrapper (VAR [nil] param: ARRAY [untagged] OF WinOleAut.ELEMDESC;\r\t\t\t\t\t\t\t\t\t\tVAR retTyp: WinOleAut.TYPEDESC;\r\t\t\t\t\t\t\t\t\t\tVAR names: ARRAY OF WinOle.BSTR;\r\t\t\t\t\t\t\t\t\t\tpar, id, invoke: INTEGER; hasRet: BOOLEAN; opts: SET;\r\t\t\t\t\t\t\t\t\t\ttinfo: WinOleAut.ITypeInfo; VAR out: TextMappers.Formatter);\r\t\tVAR i: INTEGER; type: WinOleAut.TYPEDESC; kind: SHORTINT; hasVar: BOOLEAN;\r\tBEGIN\r\t\tIF (invoke = WinOleAut.INVOKE_PROPERTYPUT) & ~hasRet & (par = 1) THEN\r\t\t\tout.WriteTab; out.WriteSString(\"BEGIN\"); out.WriteLn;\r\t\t\tout.WriteTab; out.WriteTab; out.WriteSString(\"CtlC.Put\");\r\t\t\tWriteShortType(param[0].tdesc, tinfo, out); out.WriteSString(\"(this, \");\r\t\t\tout.WriteInt(id); out.WriteSString(\", \");\r\t\t\tWriteBSTR(names[1], out); out.WriteChar(\")\"); out.WriteLn\r\t\tELSIF (invoke = WinOleAut.INVOKE_PROPERTYGET) & hasRet & (par = 0) THEN\r\t\t\tout.WriteTab; out.WriteSString(\"BEGIN\"); out.WriteLn;\r\t\t\tout.WriteTab; out.WriteTab; out.WriteSString(\"RETURN \");\r\t\t\tWriteTypeConv(retTyp, tinfo, get, id, out); out.WriteLn\r\t\tELSE\r\t\t\thasVar := FALSE;\r\t\t\tIF par > 0 THEN\r\t\t\t\tIF ~hasVar THEN out.WriteTab; out.WriteTab; out.WriteSString(\"VAR\"); hasVar := TRUE END;\r\t\t\t\tout.WriteString(\" arg: ARRAY \"); out.WriteInt(par);\r\t\t\t\tout.WriteString(\" OF CtlT.Variant;\")\r\t\t\tEND;\r\t\t\tIF hasRet THEN\r\t\t\t\tIF ~hasVar THEN out.WriteTab; out.WriteTab; out.WriteSString(\"VAR\"); hasVar := TRUE END;\r\t\t\t\tout.WriteString(\" ret: CtlT.Variant;\")\r\t\t\tEND;\r\t\t\ti := 0;\r\t\t\tWHILE i < par DO\r\t\t\t\tGetParamType(param[i], tinfo, opts, type, kind);\r\t\t\t\tIF (kind # value) & IsSpecial(type, tinfo) THEN\r\t\t\t\t\tIF ~hasVar THEN out.WriteTab; out.WriteTab; out.WriteSString(\"VAR\"); hasVar := TRUE END;\r\t\t\t\t\tout.WriteChar(\" \"); WriteBSTR(names[i + 1], out); out.WriteString(\"_TEMP: CtlT.Variant;\")\r\t\t\t\tEND;\r\t\t\t\tINC(i)\r\t\t\tEND;\r\t\t\tIF hasVar THEN out.WriteLn END;\r\t\t\tout.WriteTab; out.WriteSString(\"BEGIN\"); out.WriteLn;\r\t\t\ti := 0;\r\t\t\tWHILE i < par DO\r\t\t\t\tGetParamType(param[i], tinfo, opts, type, kind);\r\t\t\t\tIF (kind IN {var, varin}) & IsSpecial(type, tinfo) THEN\r\t\t\t\t\tout.WriteTab; out.WriteTab; out.WriteSString(\"CtlC.\");\r\t\t\t\t\tWriteShortType(type, tinfo, out);\r\t\t\t\t\tout.WriteString(\"Var(\"); WriteBSTR(names[i + 1], out);\r\t\t\t\t\tout.WriteString(\", \"); WriteBSTR(names[i + 1], out);\r\t\t\t\t\tout.WriteString(\"_TEMP);\"); out.WriteLn\r\t\t\t\tEND;\r\t\t\t\tout.WriteTab; out.WriteTab; out.WriteSString(\"CtlC.\");\r\t\t\t\tIF kind # value THEN out.WriteSString(\"Ref\") END;\r\t\t\t\tWriteShortType(type, tinfo, out);\r\t\t\t\tout.WriteSString(\"Var(\"); WriteBSTR(names[i + 1], out);\r\t\t\t\tIF (kind # value) & IsSpecial(type, tinfo) THEN out.WriteString(\"_TEMP\") END;\r\t\t\t\tout.WriteSString(\", arg[\"); out.WriteInt(par - i - 1);\r\t\t\t\tout.WriteSString(\"]);\"); out.WriteLn;\r\t\t\t\tINC(i)\r\t\t\tEND;\r\t\t\tout.WriteTab; out.WriteTab;\r\t\t\tIF par = 0 THEN out.WriteSString(\"CtlC.CallMethod(this, \")\r\t\t\tELSIF ODD(invoke DIV WinOleAut.INVOKE_PROPERTYGET) THEN\r\t\t\t\tout.WriteSString(\"CtlC.CallGetMethod(this, \")\r\t\t\tELSIF ODD(invoke DIV WinOleAut.INVOKE_PROPERTYPUT) THEN\r\t\t\t\tout.WriteSString(\"CtlC.CallPutMethod(this, \")\r\t\t\tELSIF ODD(invoke DIV WinOleAut.INVOKE_PROPERTYPUTREF) THEN\r\t\t\t\tout.WriteSString(\"CtlC.CallPutRefMethod(this, \")\r\t\t\tELSE out.WriteSString(\"CtlC.CallParMethod(this, \")\r\t\t\tEND;\r\t\t\tout.WriteInt(id);\r\t\t\tIF par > 0 THEN out.WriteSString(\", arg\") END;\r\t\t\tIF hasRet THEN out.WriteSString(\", ret\") ELSE out.WriteSString(\", NIL\") END;\r\t\t\tout.WriteSString(\");\"); out.WriteLn;\r\t\t\ti := 0;\r\t\t\tWHILE i < par DO\r\t\t\t\tGetParamType(param[i], tinfo, opts, type, kind);\r\t\t\t\tIF (kind IN {var, varout}) & IsSpecial(type, tinfo) THEN\r\t\t\t\t\tout.WriteTab; out.WriteTab; WriteBSTR(names[i + 1], out);\r\t\t\t\t\tout.WriteSString(\" := \"); retName := names[i + 1]$ + \"_TEMP\";\r\t\t\t\t\tWriteTypeConv(type, tinfo, ret, 0, out);\r\t\t\t\t\tout.WriteChar(\";\"); out.WriteLn\r\t\t\t\tEND;\r\t\t\t\tINC(i)\r\t\t\tEND;\r\t\t\tIF hasRet THEN\r\t\t\t\tout.WriteTab; out.WriteTab; out.WriteSString(\"RETURN \");\r\t\t\t\tretName := \"ret\";\r\t\t\t\tWriteTypeConv(retTyp, tinfo, ret, 0, out); out.WriteLn\r\t\t\tEND\r\t\tEND \r\tEND ShowWrapper;"
                    attr: 5
                  - text: "\r\r"
                    attr: 0
                  - text: "\tPROCEDURE ShowGenerator (tinfo: WinOleAut.ITypeInfo; opts: SET; VAR out: TextMappers.Formatter);\r\t\tVAR res: COM.RESULT; attr: WinOleAut.PtrTYPEATTR; name: WinOle.BSTR;\r\tBEGIN\r\t\tres := tinfo.GetTypeAttr(attr);\r\t\tres := tinfo.GetDocumentation(-1, name, NIL, NIL, NIL);\r\t\t(* !!! *)\r\t\tout.WriteTab; out.WriteSString(\"PROCEDURE This\"); WriteBSTR(name, out);\r\t\tout.WriteSString(\"* (v: CtlT.Any): \");  WriteBSTR(name, out);\r\t\tout.WriteChar(\";\"); out.WriteLn;\r\t\tout.WriteTab; out.WriteTab; out.WriteSString(\"VAR new: \");\r\t\tWriteBSTR(name, out); out.WriteChar(\";\"); out.WriteLn;\r\t\tout.WriteTab; out.WriteSString(\"BEGIN\"); out.WriteLn;\r\t\tout.WriteTab; out.WriteTab; out.WriteSString(\"IF v # NIL THEN\"); out.WriteLn;\r\t\tout.WriteTab; out.WriteTab; out.WriteTab;\r\t\tout.WriteSString('NEW(new); CtlC.InitObj(new, v, \"');\r\t\tWriteGuid(attr.guid, out);\r\t\tout.WriteSString('\"); RETURN new'); out.WriteLn;\r\t\tout.WriteTab; out.WriteTab; out.WriteSString(\"ELSE RETURN NIL\"); out.WriteLn;\r\t\tout.WriteTab; out.WriteTab; out.WriteSString(\"END\"); out.WriteLn;\r\t\tout.WriteTab; out.WriteSString(\"END This\");\r\t\tWriteBSTR(name, out); out.WriteChar(\";\"); out.WriteLn; out.WriteLn;\r\t\tout.WriteTab; out.WriteSString(\"PROCEDURE Is\"); WriteBSTR(name, out);\r\t\tout.WriteSString(\"* (v: CtlT.Any): BOOLEAN;\"); out.WriteLn;\r\t\tout.WriteTab; out.WriteSString(\"BEGIN\"); out.WriteLn;\r\t\tout.WriteTab; out.WriteTab;\r\t\tout.WriteSString('RETURN CtlC.IsObj(v, \"');\r\t\tWriteGuid(attr.guid, out); out.WriteSString('\")');\r\t\tout.WriteLn; out.WriteTab; out.WriteSString(\"END Is\");\r\t\tWriteBSTR(name, out); out.WriteChar(\";\"); out.WriteLn; out.WriteLn;\r\t\tWinOleAut.SysFreeString(name)\r\tEND ShowGenerator;"
                    attr: 5
                  - text: "\r"
                    attr: 0
                  - text: "\r\tPROCEDURE ShowClassGenerator (tinfo: WinOleAut.ITypeInfo; opts: SET; VAR out: TextMappers.Formatter);\r\t\tVAR res: COM.RESULT; attr, iattr: WinOleAut.PtrTYPEATTR; sc, si: WinOle.BSTR; i: INTEGER;\r\t\t\tt: WinOleAut.HREFTYPE; iinfo: WinOleAut.ITypeInfo; flags: SET;\r\tBEGIN\r\t\tIF (inAll IN opts) OR (inAuto IN opts) THEN\r\t\t\tres := tinfo.GetTypeAttr(attr); ASSERT(res >= 0, 100); i := 0;\r\t\t\tWHILE i < attr.cImplTypes DO\r\t\t\t\tres := tinfo.GetImplTypeFlags(i, flags);\r\t\t\t\tIF WinOleAut.IMPLTYPEFLAG_FSOURCE * flags = {} THEN\r\t\t\t\t\tres := tinfo.GetRefTypeOfImplType(i, t); ASSERT(res >= 0, 101);\r\t\t\t\t\tres := tinfo.GetRefTypeInfo(t, iinfo); ASSERT(res >= 0, 102);\r\t\t\t\t\tres := iinfo.GetTypeAttr(iattr); ASSERT(res >= 0, 103);\r\t\t\t\t\tIF iattr.typekind = WinOleAut.TKIND_DISPATCH THEN\r\t\t\t\t\t\tres := tinfo.GetDocumentation(-1, sc, NIL, NIL, NIL); ASSERT(res >= 0, 104);\r\t\t\t\t\t\tres := iinfo.GetDocumentation(-1, si, NIL, NIL, NIL); ASSERT(res >= 0, 105);\r\t\t\t\t\t\t(* !!! *)\r\t\t\t\t\t\tIF si # NIL THEN\r\t\t\t\t\t\t\tout.WriteTab; out.WriteSString(\"PROCEDURE New\"); WriteBSTR(sc, out);\r\t\t\t\t\t\t\tIF WinOleAut.IMPLTYPEFLAG_FDEFAULT * flags = {}  THEN\r\t\t\t\t\t\t\t\tout.WriteChar(\"_\"); WriteBSTR(si, out)\r\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\tout.WriteSString(\"* (): \");  WriteBSTR(si, out); out.WriteChar(\";\"); out.WriteLn;\r\t\t\t\t\t\t\tout.WriteTab; out.WriteSString(\"BEGIN\"); out.WriteLn;\r\t\t\t\t\t\t\tout.WriteTab; out.WriteTab;\r\t\t\t\t\t\t\tout.WriteSString(\"RETURN This\"); WriteBSTR(si, out);\r\t\t\t\t\t\t\tout.WriteSString('(CtlC.NewObj(\"'); WriteGuid(attr.guid, out);\r\t\t\t\t\t\t\tout.WriteSString('\"))'); out.WriteLn;\r\t\t\t\t\t\t\tout.WriteTab; out.WriteSString(\"END New\"); WriteBSTR(sc, out);\r\t\t\t\t\t\t\tIF WinOleAut.IMPLTYPEFLAG_FDEFAULT * flags = {}  THEN\r\t\t\t\t\t\t\t\tout.WriteChar(\"_\"); WriteBSTR(si, out)\r\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\tout.WriteChar(\";\"); out.WriteLn; out.WriteLn;\r\t\t\t\t\t\t\tWinOleAut.SysFreeString(sc); WinOleAut.SysFreeString(si)\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND;\r\t\t\t\t\tiinfo.ReleaseTypeAttr(iattr)\r\t\t\t\tEND;\r\t\t\t\tINC(i)\r\t\t\tEND;\r\t\t\ttinfo.ReleaseTypeAttr(attr)\r\t\tEND\r\tEND ShowClassGenerator;"
                    attr: 5
                  - text: "\r\r"
                    attr: 0
                  - text: "\tPROCEDURE ShowProperty (VAR var: WinOleAut.PtrVARDESC; tinfo: WinOleAut.ITypeInfo; opts: SET;\r\t\t\t\t\t\t\t\t\t\tVAR attr: WinOleAut.PtrTYPEATTR; tn: WinOle.BSTR; VAR out: TextMappers.Formatter);\r\t\tVAR n, i: INTEGER; s, t: WinOle.BSTR; res: COM.RESULT; e: SHORTINT;\r\t\t\tnames: ARRAY 2 OF WinOle.BSTR; elem: ARRAY 1 OF WinOleAut.ELEMDESC;\r\tBEGIN\r\t\tres := tinfo.GetNames(var.memid, names[0], 1, n);\r\t\tout.WriteTab; out.WriteSString(\"PROCEDURE \");\r\t\tout.WriteSString(\"(this: \"); WriteBSTR(tn, out); out.WriteSString(\") \");\r\t\tWriteBSTR(names[0], out);\r\t\tout.WriteSString(\"* (): \"); WriteType(var.elemdescVar.tdesc, tinfo, opts, out);\r\t\tout.WriteString(\", NEW\");\r\t\tIF (inAll IN opts) OR (inAuto IN opts) & ~(source IN opts) THEN"
                    attr: 5
                  - text: "\r"
                    attr: 0
                  - text: "\t\t\t(* Something's wrong here, should choose ABSTRACT. *)\r"
                    attr: 3
                  - text: "\t\t\tIF (outAll IN opts) OR (outAuto IN opts) & (source IN opts) THEN out.WriteString(\", EXTENSIBLE\") END;\r\t\t\tout.WriteChar(\";\"); out.WriteLn;\r\t\t\tShowWrapper(elem, var.elemdescVar.tdesc, names, 0, var.memid,\r\t\t\t\t\t\t\t\tWinOleAut.INVOKE_PROPERTYGET, TRUE, opts, tinfo, out);\r\t\t\tout.WriteTab; out.WriteSString(\"END \");\r\t\t\tWriteBSTR(names[0], out);\r\t\tELSE\r\t\t\tout.WriteString(\", ABSTRACT\")\r\t\tEND;\r\t\tout.WriteChar(\";\"); out.WriteLn; out.WriteLn;\r\t\tIF ~ODD(var.wVarFlags DIV WinOleAut.VARFLAG_FREADONLY) THEN\r\t\t\tout.WriteTab; out.WriteSString(\"PROCEDURE \");\r\t\t\tout.WriteSString(\"(this: \"); WriteBSTR(tn, out); out.WriteSString(\") PUT\");\r\t\t\tWriteBSTR(names[0], out);\r\t\t\tout.WriteSString(\"* (val: \");\r\t\t\tIF var.elemdescVar.tdesc.vt = WinOle.VT_BSTR THEN out.WriteSString(\"ARRAY OF CHAR\")\r\t\t\tELSE WriteType(var.elemdescVar.tdesc, tinfo, opts, out)\r\t\t\tEND;\r\t\t\tout.WriteString(\"), NEW\");\r\t\t\tIF (inAll IN opts) OR (inAuto IN opts) & ~(source IN opts) THEN\r\t\t\t\tIF (outAll IN opts) OR (outAuto IN opts) & (source IN opts) THEN out.WriteString(\", EXTENSIBLE\") END;\r\t\t\t\tout.WriteChar(\";\"); out.WriteLn;\r\t\t\t\telem[0] := var.elemdescVar;\r\t\t\t\tnames[1] := WinOleAut.SysAllocString(\"val\");\r\t\t\t\tShowWrapper(elem, var.elemdescVar.tdesc, names, 1, var.memid,\r\t\t\t\t\t\t\t\t\tWinOleAut.INVOKE_PROPERTYPUT, FALSE, opts, tinfo, out);\r\t\t\t\tWinOleAut.SysFreeString(names[1]);\r\t\t\t\tout.WriteTab; out.WriteSString(\"END PUT\");\r\t\t\t\tWriteBSTR(names[0], out);\r\t\t\tELSE\r\t\t\t\tout.WriteString(\", ABSTRACT\")\r\t\t\tEND;\r\t\t\tout.WriteChar(\";\"); out.WriteLn; out.WriteLn;\r\t\tEND;\r\t\tWinOleAut.SysFreeString(names[0]);\r\tEND ShowProperty;\r"
                    attr: 5
                  - text: "\r\tPROCEDURE ShowFunc (VAR func: WinOleAut.PtrFUNCDESC; tinfo: WinOleAut.ITypeInfo; VAR attr: WinOleAut.PtrTYPEATTR;\r\t\t\t\t\t\t\t\t\ttn: WinOle.BSTR; opts: SET; VAR out: TextMappers.Formatter);\r\t\tVAR n, i: INTEGER; names: ARRAY 64 OF WinOle.BSTR; s, t: WinOle.BSTR; res: COM.RESULT; e: SHORTINT;\r\t\t\tretTyp: WinOleAut.TYPEDESC; ti: WinOleAut.ITypeInfo;\r\tBEGIN\r\t\tres := tinfo.GetNames(func.memid, names[0], LEN(names), n);\r\t\tIF (wrapper IN opts) & ((func.memid = WinOleAut.DISPID_NEWENUM)\r\t\t\t\tOR (names[0]^ = \"_NewEnum\") & (func.cParams = 0)\r\t\t\t\t\t& ((func.elemdescFunc.tdesc.vt = WinOle.VT_UNKNOWN)\r\t\t\t\t\t\tOR (func.elemdescFunc.tdesc.vt = WinOle.VT_VARIANT))) THEN\r(*\r\t\t\tIF names[0]^ = \"_NewEnum\" THEN names[0]^ := \"NewEnum\" END;\r*)\r\t\t\t"
                    attr: 0
                  - text: "retTyp.vt := enumerator"
                    attr: 5
                  - text: "\r\t\tELSE\r\t\t\tretTyp := func.elemdescFunc.tdesc\r\t\tEND;\r\t\tIF ~(wrapper IN opts) OR ~ODD(func.wFuncFlags DIV WinOleAut.FUNCFLAG_FRESTRICTED)\r\t\t\tOR (retTyp.vt = enumerator) THEN\r(*\r\t\tIF ~(wrapper IN opts) OR (names[0]^ # \"QueryInterface\") & (names[0]^ # \"AddRef\") & (names[0]^ # \"Release\")\r\t\t\t\t\t\t\t\t\t\t& (names[0]^ # \"GetTypeInfoCount\") & (names[0]^ # \"GetTypeInfo\")\r\t\t\t\t\t\t\t\t\t\t& (names[0]^ # \"GetIDsOfNames\") & (names[0]^ # \"Invoke\") THEN\r*)\r\t\t\tout.WriteTab; out.WriteSString(\"PROCEDURE \");\r\t\t\tIF ~(wrapper IN opts) & (func.callconv # WinOleAut.CC_STDCALL) THEN\r"
                    attr: 0
                  - text: "\t\t\t\tout.WriteChar(\"[\");\r\t\t\t\tIF func.callconv = WinOleAut.CC_CDECL THEN out.WriteSString(\"ccall\")\r\t\t\t\tELSIF func.callconv = WinOleAut.CC_PASCAL THEN out.WriteSString(\"pascal\")\r\t\t\t\tELSIF func.callconv = WinOleAut.CC_MACPASCAL THEN out.WriteSString(\"macpascal\")\r\t\t\t\tELSIF func.callconv = WinOleAut.CC_SYSCALL THEN out.WriteSString(\"syscall\")\r\t\t\t\tELSIF func.callconv = WinOleAut.CC_MPWCDECL THEN out.WriteSString(\"mpwccall\")\r\t\t\t\tELSIF func.callconv = WinOleAut.CC_MPWPASCAL THEN out.WriteSString(\"mpwpascal\")\r\t\t\t\tELSE HALT(100)\r\t\t\t\tEND;\r\t\t\t\tout.WriteSString(\"] \")"
                    attr: 7
                  - text: "\r\t\t\tEND;\r\t\t\tIF (func.funckind = WinOleAut.FUNC_VIRTUAL)\r\t\t\t\tOR (func.funckind = WinOleAut.FUNC_PUREVIRTUAL)\r\t\t\t\tOR (func.funckind = WinOleAut.FUNC_DISPATCH) THEN\r\t\t\t\tout.WriteSString(\"(this: \");\r\t\t\t\tWriteBSTR(tn, out); out.WriteSString(\") \")\r\t\t\tEND;\r\t\t\tIF func.invkind = WinOleAut.INVOKE_PROPERTYPUT THEN out.WriteSString(\"PUT\")\r\t\t\tELSIF func.invkind = WinOleAut.INVOKE_PROPERTYPUTREF THEN out.WriteSString(\"PUTREF\")\r\t\t\tEND;\r\t\t\tWriteBSTR(names[0], out); out.WriteChar(\"*\");\r\t\t\tIF func.funckind = WinOleAut.FUNC_STATIC THEN\r\t\t\t\tres := tinfo.GetDllEntry(func.memid, func.invkind, s, t, e);\r\t\t\t\tIF res >= 0 THEN\r\t\t\t\t\tout.WriteSString(\" [\");\r\t\t\t\t\tIF s # NIL THEN\r\t\t\t\t\t\tout.WriteChar('\"'); WriteBSTR(s, out); out.WriteSString('\", '); WinOleAut.SysFreeString(s)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF t # NIL THEN out.WriteChar('\"'); WriteBSTR(t, out); out.WriteChar('\"'); WinOleAut.SysFreeString(t)\r\t\t\t\t\tELSE out.WriteChar('\"'); out.WriteInt(e); out.WriteChar('\"')\r\t\t\t\t\tEND;\r\t\t\t\t\tout.WriteChar(\"]\")\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tout.WriteSString(\" (\");\r\t\t\tWHILE n <= func.cParams DO\r\t\t\t\tIF n <= 9 THEN\r\t\t\t\t\tnames[n] := WinOleAut.SysAllocString(\"p0\");\r\t\t\t\t\tnames[n][1] := SHORT(CHR(n + ORD(\"0\")))\r\t\t\t\tELSE\r\t\t\t\t\tnames[n] := WinOleAut.SysAllocString(\"p00\");\r\t\t\t\t\tnames[n][1] := SHORT(CHR(n DIV 10 + ORD(\"0\")));\r\t\t\t\t\tnames[n][2] := SHORT(CHR(n MOD 10 + ORD(\"0\")))\r\t\t\t\tEND;\r\t\t\t\tINC(n)\r\t\t\tEND;\r(*\t"
                    attr: 0
                  - text: "\t\r\t\t\t(* correct parameter name - return type conflict *)"
                    attr: 1
                  - text: "\r\t\t\tIF (n > 1) & (retTyp.vt = WinOle.VT_PTR) & (retTyp.u.lptdesc.vt = WinOle.VT_USERDEFINED) THEN\r\t\t\t\tres := tinfo.GetRefTypeInfo(retTyp.u.lptdesc.u.hreftype, ti);\r\t\t\t\tIF res >= 0 THEN\r\t\t\t\t\tres := ti.GetDocumentation(-1, s, NIL, NIL, NIL);\r\t\t\t\t\tIF s # NIL THEN\r\t\t\t\t\t\tIF names[1]^ = s^ THEN\r\t\t\t\t\t\t\tIF names[1, 0] < \"a\" THEN names[1, 0] := CHR(ORD(names[1, 0]) + 32)\r\t\t\t\t\t\t\tELSE names[1, 0] := CHR(ORD(names[1, 0]) - 32)\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tWinOleAut.SysFreeString(s)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND;\r*)\r\t\t\ti := 0;\r\t\t\tWHILE i < func.cParams DO\r\t\t\t\tIF i > 0 THEN out.WriteSString(\"; \") END;\r\t\t\t\tIF i = func.cParams - ABS(func.cParamsOpt) THEN out.WriteSString(\"(* optional *) \") END;\r\t\t\t\tShowParam(func.lprgelemdescParam[i], names[i + 1], tinfo, opts, out);\r\t\t\t\tINC(i)\r\t\t\tEND;\r\t\t\tout.WriteChar(\")\");\r\t\t\tIF retTyp.vt # WinOle.VT_VOID THEN\r\t\t\t\tout.WriteSString(\": \"); WriteType(retTyp, tinfo, opts, out)\r\t\t\tEND;\r\t\t\tIF (names[0]^ # \"Date\") & (names[0]^ # \"Cy\") & (names[0]^ # \"Int\") THEN\r\t\t\t\tout.WriteString(\", NEW\")\r\t\t\tEND;\r\t\t\tIF (inAll IN opts) OR (inAuto IN opts) & ~(source IN opts) THEN\r\t\t\t\tIF (outAll IN opts) OR (outAuto IN opts) & (source IN opts) THEN out.WriteString(\", EXTENSIBLE\") END\r\t\t\tELSE\r\t\t\t\tout.WriteString(\", ABSTRACT\")\r\t\t\tEND;\r\t\t\tout.WriteChar(\";\"); out.WriteLn;\r\t\t\tres := tinfo.GetDocumentation(func.memid, NIL, s, NIL, NIL);\r\t\t\tIF (s # NIL) OR (browse IN opts) THEN\r\t\t\t\tout.WriteTab; out.WriteTab; out.WriteSString(\"(* \");\r\t\t\t\tIF s # NIL THEN\r\t\t\t\t\tWriteBSTR(s, out);\r\t\t\t\t\tIF browse IN opts THEN "
                    attr: 0
                  - text: "out.WriteSString(\", \")"
                    attr: 7
                  - text: " END;\r\t\t\t\t\tWinOleAut.SysFreeString(s)\r\t\t\t\tEND;\r\t\t\t\tIF browse IN opts THEN\r"
                    attr: 0
                  - text: "\t\t\t\t\tout.WriteSString(\"id: \"); out.WriteIntForm(func.memid, TextMappers.hexadecimal, 8, \"0\", FALSE);\r\t\t\t\t\tIF func.memid = attr.memidConstructor THEN out.WriteSString(\", contructor\") END;\r\t\t\t\t\tIF func.memid = attr.memidDestructor THEN out.WriteSString(\", destructor\") END;\r\t\t\t\t\tIF func.funckind = WinOleAut.FUNC_DISPATCH THEN out.WriteSString(\", dispatch\") END;\r\t\t\t\t\tIF func.invkind = WinOleAut.INVOKE_PROPERTYGET THEN out.WriteSString(\", get\")\r\t\t\t\t\tELSIF func.invkind = WinOleAut.INVOKE_PROPERTYPUT THEN out.WriteSString(\", put\")\r\t\t\t\t\tELSIF func.invkind = WinOleAut.INVOKE_PROPERTYPUTREF THEN out.WriteSString(\", putref\")\r\t\t\t\t\tEND;\r\t\t\t\t\tIF ODD(func.wFuncFlags DIV WinOleAut.FUNCFLAG_FRESTRICTED) THEN\r\t\t\t\t\t\tout.WriteSString(\", restricted\")\r\t\t\t\t\tEND;\r\t\t\t\t\tIF ODD(func.wFuncFlags DIV WinOleAut.FUNCFLAG_FSOURCE) THEN\r\t\t\t\t\t\tout.WriteSString(\", source\")\r\t\t\t\t\tEND;\r\t\t\t\t\tIF ODD(func.wFuncFlags DIV WinOleAut.FUNCFLAG_FBINDABLE) THEN\r\t\t\t\t\t\tout.WriteSString(\", bindable\")\r\t\t\t\t\tEND;\r\t\t\t\t\tIF ODD(func.wFuncFlags DIV WinOleAut.FUNCFLAG_FREQUESTEDIT) THEN\r\t\t\t\t\t\tout.WriteSString(\", request\")\r\t\t\t\t\tEND;\r\t\t\t\t\tIF ODD(func.wFuncFlags DIV WinOleAut.FUNCFLAG_FDISPLAYBIND) THEN\r\t\t\t\t\t\tout.WriteSString(\", display\")\r\t\t\t\t\tEND;\r\t\t\t\t\tIF ODD(func.wFuncFlags DIV WinOleAut.FUNCFLAG_FDEFAULTBIND) THEN\r\t\t\t\t\t\tout.WriteSString(\", default\")\r\t\t\t\t\tEND;\r\t\t\t\t\tIF ODD(func.wFuncFlags DIV WinOleAut.FUNCFLAG_FHIDDEN) THEN\r\t\t\t\t\t\tout.WriteSString(\", hidden\")\r\t\t\t\t\tEND;\r\t\t\t\t\tIF (func.funckind = WinOleAut.FUNC_PUREVIRTUAL)\r\t\t\t\t\t\tOR (func.funckind = WinOleAut.FUNC_VIRTUAL)\r\t\t\t\t\tTHEN\r\t\t\t\t\t\tout.WriteSString(\", offset: \"); out.WriteInt(func.oVft)\r\t\t\t\t\tEND"
                    attr: 7
                  - text: "\r\t\t\t\tEND;\r\t\t\t\tout.WriteSString(\" *)\"); out.WriteLn\r\t\t\tEND;\r\t\t\tres := tinfo.GetMops(func.memid, s);\r\t\t\tIF s # NIL THEN\r\t\t\t\tout.WriteTab; out.WriteTab; out.WriteSString(\"(* mops: \"); WriteBSTR(s, out);\r\t\t\t\tout.WriteSString(\" *)\"); out.WriteLn; WinOleAut.SysFreeString(s)\r\t\t\tEND;\r\t\t\tIF func.cScodes > 0 THEN\r\t\t\t\tout.WriteTab; out.WriteTab; out.WriteSString(\"(* scodes:\"); i := 0;\r\t\t\t\tWHILE i < func.cScodes DO\r\t\t\t\t\tout.WriteChar(\" \"); out.WriteIntForm(func.lprgscode[i], TextMappers.hexadecimal, 9, \"0\", TRUE); INC(i)\r\t\t\t\tEND;\r\t\t\t\tout.WriteSString(\" *)\"); out.WriteLn\r\t\t\tEND;\r\t\t\tIF (inAll IN opts) OR (inAuto IN opts) & ~(source IN opts) THEN\r\t\t\t\tIF wrapper IN opts THEN\r"
                    attr: 0
