                  - text: "\tPROCEDURE ShowInvokeCall (func: WinOleAut.PtrFUNCDESC; tinfo: WinOleAut.ITypeInfo;\r\t\t\t\t\t\t\t\t\t\t\topts: SET; VAR out: TextMappers.Formatter);\r\t\tVAR p, n: INTEGER; res: COM.RESULT; name: WinOle.BSTR; type: WinOleAut.TYPEDESC; kind: SHORTINT;\r\tBEGIN\r\t\tres := tinfo.GetNames(func.memid, name, 1, n);\r\t\tIF func.elemdescFunc.tdesc.vt # WinOle.VT_VOID THEN\t(* function *)\r\t\t\tout.WriteSString(\"CtlC.\");\r\t\t\tIF (wrapper IN opts) & ((func.memid = WinOleAut.DISPID_NEWENUM)\r\t\t\t\tOR (name^ = \"_NewEnum\") & (func.cParams = 0)\r\t\t\t\t\t& ((func.elemdescFunc.tdesc.vt = WinOle.VT_UNKNOWN)\r\t\t\t\t\t\tOR (func.elemdescFunc.tdesc.vt = WinOle.VT_VARIANT))) THEN out.WriteString(\"Enum\")\r\t\t\tELSE WriteShortType(func.elemdescFunc.tdesc, tinfo, out)\r\t\t\tEND;\r\t\t\tout.WriteSString(\"Var(\")\r\t\tEND;\r\t\tout.WriteSString(\"this.\");\r\t\tIF ODD(func.invkind DIV WinOleAut.INVOKE_PROPERTYPUT) THEN out.WriteSString(\"PUT\")\r\t\tELSIF ODD(func.invkind DIV WinOleAut.INVOKE_PROPERTYPUTREF) THEN out.WriteSString(\"PUTREF\")\r\t\tEND;\r\t\tWriteBSTR(name, out); out.WriteChar(\"(\");\r\t\tWinOleAut.SysFreeString(name);\r\t\tp := 0;\r\t\tWHILE p < func.cParams DO\r\t\t\tIF p > 0 THEN out.WriteSString(\", \") END;\r\t\t\tGetParamType(func.lprgelemdescParam[p], tinfo, opts, type, kind);\r\t\t\tIF kind = value THEN WriteTypeConv(type, tinfo, par, func.cParams - 1 - p, out)\r\t\t\tELSE WriteTypeConv(type, tinfo, refpar, func.cParams - 1 - p, out)\r\t\t\tEND;\r\t\t\tINC(p)\r\t\tEND;\r\t\tout.WriteChar(\")\");\r\t\tIF func.elemdescFunc.tdesc.vt # WinOle.VT_VOID THEN out.WriteSString(\", ret)\") END;\r\t\tp := 0;\r\t\tWHILE p < func.cParams DO\r\t\t\tGetParamType(func.lprgelemdescParam[p], tinfo, opts, type, kind);\r\t\t\tIF (kind # value) & IsSpecial(type, tinfo) THEN\r\t\t\t\tout.WriteSString(\"; CtlC.Ret\");\r\t\t\t\tWriteShortType(type, tinfo, out);\r\t\t\t\tout.WriteString(\"(par[\"); out.WriteInt(func.cParams - 1 - p); out.Write