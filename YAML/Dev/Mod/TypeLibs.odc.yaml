                  - text: ". *)\r\t\t"
                    attr: 1
                  - text: "\r\tIMPORT COM, WinOle, WinOleAut, TextModels, TextMappers;\r\r\tCONST\r\t\t"
                    attr: 0
                  - text: "(* options *)"
                    attr: 1
                  - text: "\r\t\tbrowse = 1; interface = 2; wrapper = 3;\r\t\tinAuto = 12; inAll = 13;\r\t\toutAuto = 14; outAll = 15;\r\t\tsource = 31;\r\t\t"
                    attr: 0
                  - text: "(* kind *)"
                    attr: 1
                  - text: "\r\t\tvalue = 1; var = 2; varin = 3; varout = 4;\r\t\t"
                    attr: 0
                  - text: "(* conv type *)"
                    attr: 1
                  - text: "\r\t\tret = 1; get = 2; par = 3; refpar = 4;\r\t\t"
                    attr: 0
                  - text: "(* pseudo types *)"
                    attr: 1
                  - text: "\r\t\tenumerator = -1; record = -2; union = -3; module = -4; class = -5; ptrVoid = -6;\r\r\tVAR\r\t\tmodules: ARRAY 16, 64 OF CHAR;\r\t\tnoMod: INTEGER;\r\t\tretName: ARRAY 156 OF CHAR;\r\r\tPROCEDURE WriteBSTR (s: WinOle.BSTR; VAR out: TextMappers.Formatter);\r\tBEGIN\r\t\tIF s # NIL THEN out.WriteString(s$) END\r\tEND WriteBSTR;\r\r\tPROCEDURE WriteGuid (VAR guid: COM.GUID; VAR out: TextMappers.Formatter);\r\tBEGIN\r\t\tout.WriteChar(\"{\");\r\t\tout.WriteIntForm((guid[2] MOD 256 + 256 * guid[3]) MOD 65536, TextMappers.hexadecimal, 4, \"0\", FALSE);\r\t\tout.WriteIntForm((guid[0] MOD 256 + 256 * guid[1]) MOD 65536, TextMappers.hexadecimal, 4, \"0\", FALSE);\r\t\tout.WriteChar(\"-\");\r\t\tout.WriteIntForm((guid[4] MOD 256 + 256 * guid[5]) MOD 65536, TextMappers.hexadecimal, 4, \"0\", FALSE);\r\t\tout.WriteChar(\"-\");\r\t\tout.WriteIntForm((guid[6] MOD 256 + 256 * guid[7]) MOD 65536, TextMappers.hexadecimal, 4, \"0\", FALSE);\r\t\tout.WriteChar(\"-\");\r\t\tout.WriteIntForm((guid[8]) MOD 256, TextMappers.hexadecimal, 2, \"0\", FALSE);\r\t\tout.WriteIntForm((guid[9]) MOD 256, TextMappers.hexadecimal, 2, \"0\", FALSE);\r\t\tout.WriteChar(\"-\");\r\t\tout.WriteIntForm((guid[10]) MOD 256, TextMappers.hexadecimal, 2, \"0\", FALSE);\r\t\tout.WriteIntForm((guid[11]) MOD 256, TextMappers.hexadecimal, 2, \"0\", FALSE);\r\t\tout.WriteIntForm((guid[12]) MOD 256, TextMappers.hexadecimal, 2, \"0\", FALSE);\r\t\tout.WriteIntForm((guid[13]) MOD 256, TextMappers.hexadecimal, 2, \"0\", FALSE);\r\t\tout.WriteIntForm((guid[14]) MOD 256, TextMappers.hexadecimal, 2, \"0\", FALSE);\r\t\tout.WriteIntForm((guid[15]) MOD 256, TextMappers.hexadecimal, 2, \"0\", FALSE);\r\t\tout.WriteChar(\"}\")\r\tEND WriteGuid;\r\r\tPROCEDURE^ GetInfoType (tinfo: WinOleAut.ITypeInfo; OUT type: INTEGER; OUT info: WinOleAut.ITypeInfo);\r\t\r\tPROCEDURE GetDescType (IN desc: WinOleAut.TYPEDESC; tinfo: WinOleAut.ITypeInfo;\r\t\t\t\t\t\t\t\t\t\tOUT type: INTEGER; OUT info: WinOleAut.ITypeInfo);\r\t\tVAR res: COM.RESULT; t: INTEGER; i: WinOleAut.ITypeInfo;\r\tBEGIN\r\t\ttype := desc.vt;\r\t\tIF type = WinOle.VT_USERDEFINED THEN\r\t\t\tres := tinfo.GetRefTypeInfo(desc.u.hreftype, i);\r\t\t\tGetInfoType(i, type, info)\r\t\tELSIF type = WinOle.VT_PTR THEN\r\t\t\tGetDescType(desc.u.lptdesc, tinfo, t, i);\r\t\t\tIF (i # NIL) & ((t = WinOle.VT_DISPATCH) OR (t = WinOle.VT_UNKNOWN))\r\t\t\t\t\tOR (t = WinOle.VT_VARIANT) OR (t = WinOle.VT_SAFEARRAY) THEN type := t; info := i\r\t\t\tELSIF t = WinOle.VT_VOID THEN type := ptrVoid\r\t\t\tEND\r\t\tEND\r\tEND GetDescType;\r\r\tPROCEDURE GetInfoType (tinfo: WinOleAut.ITypeInfo; OUT type: INTEGER; OUT info: WinOleAut.ITypeInfo);\r\t\tVAR res: COM.RESULT; attr: WinOleAut.PtrTYPEATTR; i: INTEGER; flags: SET;\r\t\t\tti: WinOleAut.ITypeInfo; t: WinOleAut.HREFTYPE;\r\tBEGIN\r\t\tinfo := tinfo; res := tinfo.GetTypeAttr(attr);\r\t\tCASE attr.typekind OF\r\t\t| WinOleAut.TKIND_ENUM: type := WinOle.VT_I4\r\t\t| WinOleAut.TKIND_RECORD: type := record\r\t\t| WinOleAut.TKIND_UNION: type := union\r\t\t| WinOleAut.TKIND_MODULE: type := module\r\t\t| WinOleAut.TKIND_INTERFACE: type := WinOle.VT_UNKNOWN\r\t\t| WinOleAut.TKIND_DISPATCH: type := WinOle.VT_DISPATCH\r\t\t| WinOleAut.TKIND_ALIAS: GetDescType(attr.tdescAlias, tinfo, type, info)\r\t\t| WinOleAut.TKIND_COCLASS: \r\t\t\ttype := class; i := 0;\r\t\t\tWHILE (i < attr.cImplTypes) & (type = class) DO\r\t\t\t\tres := tinfo.GetImplTypeFlags(i, flags);\r\t\t\t\tIF (WinOleAut.IMPLTYPEFLAG_FDEFAULT * flags # {} )\r\t\t\t\t\t\t& (WinOleAut.IMPLTYPEFLAG_FSOURCE * flags = {} ) THEN\r\t\t\t\t\tres := tinfo.GetRefTypeOfImplType(i, t); ASSERT(res >= 0, 101);\r\t\t\t\t\tres := tinfo.GetRefTypeInfo(t, ti); ASSERT(res >= 0, 102);\r\t\t\t\t\tGetInfoType(ti, type, info)\r\t\t\t\tEND;\r\t\t\t\tINC(i)\r\t\t\tEND\r\t\tEND;\r\t\ttinfo.ReleaseTypeAttr(attr)\r\tEND GetInfoType;\r\r\tPROCEDURE WriteVariant (VAR v: WinOleAut.VARIANT; VAR out: TextMappers.Formatter);\r\tBEGIN\r\t\tIF ODD(v.vt DIV WinOle.VT_ARRAY) THEN\r\t\t\tout.WriteSString(\"array \");\r\t\t\t"
                    attr: 0
                  - text: "(* to be completed *)"
                    attr: 1
                  - text: "\r\t\tELSIF ODD(v.vt DIV WinOle.VT_BYREF) THEN\r\t\t\tout.WriteSString(\"ref \");\r\t\t\tCASE v.vt MOD 4096 OF\r\t\t\t| WinOle.VT_UI1: out.WriteInt(ORD(v.u.pbVal[0]))\r\t\t\t| WinOle.VT_I2: out.WriteInt(v.u.piVal[0])\r\t\t\t| WinOle.VT_I4:\r\t\t\t\tIF v.u.plVal[0] = 80000000H THEN out.WriteString(\"80000000H\")\r\t\t\t\tELSE out.WriteInt(v.u.plVal[0])\r\t\t\t\tEND\r\t\t\t| WinOle.VT_R4: out.WriteReal(v.u.pfltVal[0])\r\t\t\t| WinOle.VT_R8: out.WriteReal(v.u.pdblVal[0])\r\t\t\t| WinOle.VT_BOOL:\r\t\t\t\tIF v.u.pboolVal[0] = 0 THEN out.WriteSString(\"FALSE\") ELSE out.WriteSString(\"TRUE\") END\r\t\t\t| WinOle.VT_CY: out.WriteReal(v.u.pcyVal[0] / 10000)\r\t\t\t| WinOle.VT_DATE: out.WriteReal(v.u.pdate[0])\r\t\t\t| WinOle.VT_BSTR: out.WriteChar('\"'); WriteBSTR(v.u.pbstrVal[0], out); out.WriteChar('\"')\r\t\t\t| WinOle.VT_ERROR: out.WriteIntForm(v.u.pscode[0], TextMappers.hexadecimal, 9, \"0\", TRUE)\r\t\t\t| WinOle.VT_DISPATCH: out.WriteSString(\"IDispatch\")\r\t\t\t| WinOle.VT_UNKNOWN: out.WriteSString(\"IUnknown\")\r\t\t\tELSE out.WriteSString(\"undefined (\"); out.WriteInt(v.vt MOD 4096); out.WriteChar(\")\")\r\t\t\tEND\r\t\tELSE\r\t\t\tCASE v.vt MOD 4096 OF\r\t\t\t| WinOle.VT_NULL: out.WriteSString(\"NIL\")\r\t\t\t| WinOle.VT_UI1: out.WriteInt(ORD(v.u.bVal))\r\t\t\t| WinOle.VT_I2: out.WriteInt(v.u.iVal)\r\t\t\t| WinOle.VT_I4:\r\t\t\t\tIF v.u.lVal = 80000000H THEN out.WriteString(\"80000000H\")\r\t\t\t\tELSE out.WriteInt(v.u.lVal)\r\t\t\t\tEND\r\t\t\t| WinOle.VT_R4: out.WriteReal(v.u.fltVal)\r\t\t\t| WinOle.VT_R8: out.WriteReal(v.u.dblVal)\r\t\t\t| WinOle.VT_BOOL:\r\t\t\t\tIF v.u.boolVal = 0 THEN out.WriteSString(\"FALSE\") ELSE out.WriteSString(\"TRUE\") END\r\t\t\t| WinOle.VT_CY: out.WriteReal(v.u.cyVal / 10000)\r\t\t\t| WinOle.VT_DATE: out.WriteReal(v.u.date)\r\t\t\t| WinOle.VT_BSTR: out.WriteChar('\"'); WriteBSTR(v.u.bstrVal, out); out.WriteChar('\"')\r\t\t\t| WinOle.VT_ERROR: out.WriteIntForm(v.u.scode, TextMappers.hexadecimal, 9, \"0\", TRUE)\r\t\t\t| WinOle.VT_DISPATCH: out.WriteSString(\"IDispatch\")\r\t\t\t| WinOle.VT_UNKNOWN: out.WriteSString(\"IUnknown\")\r\t\t\tELSE out.WriteSString(\"undefined (\"); out.WriteInt(v.vt MOD 4096); out.WriteChar(\")\")\r\t\t\tEND\r\t\tEND\r\tEND WriteVariant;\r\r\tPROCEDURE WriteTypeName (\r\t\ttinfo: WinOleAut.ITypeInfo; convert, isThis: BOOLEAN; VAR out: TextMappers.Formatter\r\t);\r\t\tVAR ti: WinOleAut.ITypeInfo; lib: WinOleAut.ITypeLib; i, n, vt: INTEGER;\r\t\t\tres: COM.RESULT; s: WinOle.BSTR; mod, name: ARRAY 64 OF CHAR; flags: SET;\r\tBEGIN\r\t\tres := tinfo.GetContainingTypeLib(lib, i); ASSERT(res >= 0, 102);\r\t\tres := lib.GetDocumentation(-1, s, NIL, NIL, NIL); ASSERT(res >= 0, 105);\r\t\tmod := s$; WinOleAut.SysFreeString(s);\r\t\tres := tinfo.GetDocumentation(-1, s, NIL, NIL, NIL); ASSERT(res >= 0, 106);\r\t\t(* !!! *)\r\t\tname := s$; WinOleAut.SysFreeString(s);\r\t\tIF convert THEN\r"
                    attr: 0
                  - text: "\t\t\tIF mod = \"stdole\" THEN\r\t\t\t\tIF name = \"IDispatch\" THEN mod := \"CtlT\"; name := \"Object\"\r\t\t\t\tELSE mod := \"CtlStdType\"\r\t\t\t\tEND\r\t\t\tELSE"
                    attr: 5
                  - text: "\r\t\t\t\tGetInfoType(tinfo, vt, ti);\r\t\t\t\tIF vt = WinOle.VT_UNKNOWN THEN mod := \"CtlT\"; name := \"IUnknown\""
                    attr: 0
                  - text: "\r"
                    attr: 6
                  - text: "\t\t\t\tELSE "
                    attr: 0
                  - text: "mod := \"Ctl\" + mod"
                    attr: 5
                  - text: "\r"
                    attr: 6
                  - text: "\t\t\t\tEND\r\t\t\t"
                    attr: 0
                  - text: END;
                    attr: 5
                  - text: "\r\t\tEND;\r\t\ti := 0; WHILE (i < noMod) & (modules[i] # mod) DO INC(i) END;\r\t\tIF i = noMod THEN modules[i] := mod$; INC(noMod) END;\r\t\tIF i # 0 THEN out.WriteString(mod); out.WriteChar(\".\") END;\r\t\tIF isThis THEN out.WriteString(\"This\") END;\r\t\tout.WriteString(name)\r\tEND WriteTypeName;\r\r\tPROCEDURE WriteHandleName (\r\t\tt: WinOleAut.HREFTYPE; tinfo: WinOleAut.ITypeInfo; opts: SET; VAR out: TextMappers.Formatter\r\t);\r\t\tVAR res: COM.RESULT; type: WinOleAut.ITypeInfo;\r\tBEGIN\r\t\tres := tinfo.GetRefTypeInfo(t, type); (* ASSERT(res >= 0, 100); *)\r\t\tIF res >= 0 THEN\r\t\t\tWriteTypeName(type, wrapper IN opts, FALSE, out)\r\t\tELSE\r\t\t\tout.WriteSString(\"???(\"); out.WriteInt(res); out.WriteChar(\")\")\r\t\tEND\r\tEND WriteHandleName;\r\r\tPROCEDURE WriteType (\r\t\tVAR t: WinOleAut.TYPEDESC; tinfo: WinOleAut.ITypeInfo; opts: SET; VAR out: TextMappers.Formatter\r\t);\r\t\tVAR i, vt: INTEGER; ti: WinOleAut.ITypeInfo;\r\tBEGIN\r\t\tCASE t.vt OF\r\t\t| WinOle.VT_I2: out.WriteSString(\"SHORTINT\")\r\t\t| WinOle.VT_I4: out.WriteSString(\"INTEGER\")\r\t\t| WinOle.VT_R4: out.WriteSString(\"SHORTREAL\")\r\t\t| WinOle.VT_R8: out.WriteSString(\"REAL\")\r\t\t| WinOle.VT_CY:\r\t\t\tIF wrapper IN opts THEN "
                    attr: 0
                  - text: "out.WriteSString(\"CtlT.OleCy\")"
                    attr: 5
                  - text: " ELSE "
                    attr: 0
                  - text: "out.WriteSString(\"CURRENCY\")"
                    attr: 7
                  - text: " END\r\t\t| WinOle.VT_DATE:\r\t\t\tIF wrapper IN opts THEN "
                    attr: 0
                  - text: "out.WriteSString(\"CtlT.OleDate\")"
                    attr: 5
                  - text: " ELSE "
                    attr: 0
                  - text: "out.WriteSString(\"DATE\")"
                    attr: 7
                  - text: " END\r\t\t| WinOle.VT_BSTR:\r\t\t\tIF wrapper IN opts THEN "
                    attr: 0
                  - text: "out.WriteSString(\"CtlT.Strg\")"
                    attr: 5
                  - text: " ELSE "
                    attr: 0
                  - text: "out.WriteSString(\"WinOle.BSTR\")"
                    attr: 7
                  - text: " END\r\t\t| WinOle.VT_DISPATCH:\r\t\t\tIF wrapper IN opts THEN "
                    attr: 0
                  - text: "out.WriteSString(\"CtlT.Object\")"
                    attr: 5
                  - text: "\r\t\t\tELSE "
                    attr: 0
                  - text: "out.WriteSString(\"WinOleAut.IDispatch\")"
                    attr: 7
                  - text: "\r\t\t\tEND\r\t\t| WinOle.VT_ERROR: out.WriteSString(\"CtlT.RESULT\")\r\t\t| WinOle.VT_BOOL:\r\t\t\tIF wrapper IN opts THEN "
                    attr: 0
                  - text: "out.WriteSString(\"BOOLEAN\")\r\t\t\t"
                    attr: 5
                  - text: "ELSE "
                    attr: 0
                  - text: "out.WriteSString(\"WinOle.VARIANT_BOOL\")\r\t\t\t"
                    attr: 7
                  - text: "END\r\t\t| WinOle.VT_VARIANT:\r\t\t\tIF wrapper IN opts THEN "
                    attr: 0
                  - text: "out.WriteSString(\"CtlT.Any\")"
                    attr: 5
                  - text: " ELSE "
                    attr: 0
                  - text: "out.WriteSString(\"WinOleAut.VARIANT\")"
                    attr: 7
                  - text: " END\r\t\t| WinOle.VT_UNKNOWN: out.WriteSString(\"CtlT.IUnknown\")\r\t\t| WinOle.VT_DECIMAL: out.WriteSString(\"DECIMAL\")\r\t\t| WinOle.VT_I1: out.WriteSString(\"BYTE\")\r\t\t| WinOle.VT_UI1: out.WriteSString(\"BYTE\")\r\t\t| WinOle.VT_UI2: out.WriteSString(\"SHORTINT\")\r\t\t| WinOle.VT_UI4: out.WriteSString(\"INTEGER\")\r\t\t| WinOle.VT_I8: out.WriteSString(\"LONGINT\")\r\t\t| WinOle.VT_UI8: out.WriteSString(\"LONGINT\")\r\t\t| WinOle.VT_INT: out.WriteSString(\"INTEGER\")\r\t\t| WinOle.VT_UINT: out.WriteSString(\"INTEGER\")\r\t\t| WinOle.VT_VOID:\r\t\t\tIF browse IN opts THEN "
                    attr: 0
                  - text: "out.WriteSString(\"VOID\")"
                    attr: 7
                  - text: " ELSE out.WriteSString(\"RECORD END\") END\r\t\t| WinOle.VT_HRESULT: out.WriteSString(\"CtlT.RESULT\")\r\t\t| WinOle.VT_PTR:\r\t\t\tGetDescType(t, tinfo, vt, ti);\r\t\t\tIF vt = ptrVoid THEN out.WriteSString(\"CtlT.PtrVoid\")\r\t\t\tELSIF vt # WinOle.VT_PTR THEN WriteType(t.u.lptdesc, tinfo, opts, out)\r\t\t\tELSE out.WriteSString(\"POINTER TO \"); WriteType(t.u.lptdesc^, tinfo, opts, out)\r\t\t\tEND\r\t\t| WinOle.VT_SAFEARRAY:\r\t\t\tIF wrapper IN opts THEN "
                    attr: 0
                  - text: "out.WriteSString(\"CtlT.Any\")"
                    attr: 5
                  - text: "\r\t\t\tELSE "
                    attr: 0
                  - text: "out.WriteSString(\"ARRAY [safe] OF \"); WriteType(t.u.lptdesc^, tinfo, opts, out)"
                    attr: 7
                  - text: "\r\t\t\tEND\r\t\t| WinOle.VT_CARRAY: out.WriteSString(\"ARRAY \");\r\t\t\ti := 0;\r\t\t\tWHILE i < t.u.lpadesc.cDims DO\r\t\t\t\tout.WriteInt(t.u.lpadesc.rgbounds[i].cElements); out.WriteChar(\" \"); INC(i)\r\t\t\tEND;\r\t\t\tout.WriteSString(\"OF \"); WriteType(t.u.lpadesc.tdescElem, tinfo, opts, out)\r\t\t| WinOle.VT_USERDEFINED: WriteHandleName(t.u.hreftype, tinfo, opts, out)\r\t\t| WinOle.VT_LPSTR:\r\t\t\tIF wrapper IN opts THEN "
                    attr: 0
