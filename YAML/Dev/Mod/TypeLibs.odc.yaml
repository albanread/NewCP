                    attr: 7
                  - text: " END\r\t\t| enumerator: out.WriteSString(\"CtlT.Enumerator\")\r\t\tEND\r\tEND WriteType;\r\r\tPROCEDURE WriteShortType (VAR t: WinOleAut.TYPEDESC; tinfo: WinOleAut.ITypeInfo; VAR out: TextMappers.Formatter);\r\t\tVAR vt: INTEGER; ti: WinOleAut.ITypeInfo; res: COM.RESULT;\r\tBEGIN\r\t\tGetDescType(t, tinfo, vt, ti);\r\t\tCASE vt OF\r\t\t| WinOle.VT_I2: out.WriteSString(\"SInt\")\r\t\t| WinOle.VT_I4: out.WriteSString(\"Int\")\r\t\t| WinOle.VT_R4: out.WriteSString(\"SReal\")\r\t\t| WinOle.VT_R8: out.WriteSString(\"Real\")\r\t\t| WinOle.VT_CY: out.WriteSString(\"Cy\")\r\t\t| WinOle.VT_DATE: out.WriteSString(\"Date\")\r\t\t| WinOle.VT_BSTR: out.WriteSString(\"Str\")\r\t\t| WinOle.VT_DISPATCH: out.WriteSString(\"Obj\")\r\t\t| WinOle.VT_ERROR: out.WriteSString(\"Res\")\r\t\t| WinOle.VT_BOOL: out.WriteSString(\"Bool\")\r\t\t| WinOle.VT_VARIANT: out.WriteSString(\"Any\")\r\t\t| WinOle.VT_UNKNOWN: out.WriteSString(\"Intfce\")\r\t\t| WinOle.VT_DECIMAL: out.WriteSString(\"Decimal\")\r\t\t| WinOle.VT_I1: out.WriteSString(\"Byte\")\r\t\t| WinOle.VT_UI1: out.WriteSString(\"Byte\")\r\t\t| WinOle.VT_UI2: out.WriteSString(\"SInt\")\r\t\t| WinOle.VT_UI4: out.WriteSString(\"Int\")\r\t\t| WinOle.VT_I8: out.WriteSString(\"LInt\")\r\t\t| WinOle.VT_UI8: out.WriteSString(\"LInt\")\r\t\t| WinOle.VT_INT: out.WriteSString(\"Int\")\r\t\t| WinOle.VT_UINT: out.WriteSString(\"Int\")\r\t\t| WinOle.VT_VOID: out.WriteSString(\"Void\")\r\t\t| WinOle.VT_HRESULT: out.WriteSString(\"Res\")\r\t\t| WinOle.VT_PTR: out.WriteSString(\"Pointer\")\r\t\t| WinOle.VT_SAFEARRAY: out.WriteSString(\"Any\"); (* t.u.lptdesc *)\r\t\t| WinOle.VT_CARRAY: out.WriteSString(\"Array\");\r\t\t| WinOle.VT_USERDEFINED: HALT(100)\r\t\t| WinOle.VT_LPSTR: out.WriteSString(\"Str\")\r\t\t| WinOle.VT_LPWSTR: out.WriteSString(\"Str\")\r\t\t| enumerator: out.WriteSString(\"Enum\")\r\t\t| ptrVoid: out.WriteSString(\"Int\")\r\t\t| record: out.WriteSString(\"Record\")\r\t\t| union: out.WriteSString(\"Union\")\r\t\t| module: out.WriteSString(\"Module\")\r\t\t| class: out.WriteSString(\"Class\")\r\t\tEND\r\tEND WriteShortType;\r\r\tPROCEDURE WriteTypeFlags (flags: SHORTINT; VAR out: TextMappers.Formatter);\r\tBEGIN\r\t\tIF ODD(flags DIV WinOleAut.TYPEFLAG_FAPPOBJECT) THEN out.WriteSString(\", appObject\") END;\r\t\tIF ODD(flags DIV WinOleAut.TYPEFLAG_FCANCREATE) THEN out.WriteSString(\", createable\") END;\r\t\tIF ODD(flags DIV WinOleAut.TYPEFLAG_FLICENSED) THEN out.WriteSString(\", licensed\") END;\r\t\tIF ODD(flags DIV WinOleAut.TYPEFLAG_FPREDECLID) THEN out.WriteSString(\", predeclared\") END;\r\t\tIF ODD(flags DIV WinOleAut.TYPEFLAG_FHIDDEN) THEN out.WriteSString(\", hidden\") END;\r\t\tIF ODD(flags DIV WinOleAut.TYPEFLAG_FCONTROL) THEN out.WriteSString(\", control\") END;\r\t\tIF ODD(flags DIV WinOleAut.TYPEFLAG_FDUAL) THEN out.WriteSString(\", dual\") END;\r\t\tIF ODD(flags DIV WinOleAut.TYPEFLAG_FNONEXTENSIBLE) THEN out.WriteSString(\", nonextensible\") END;\r\t\tIF ODD(flags DIV WinOleAut.TYPEFLAG_FOLEAUTOMATION) THEN out.WriteSString(\", oleauto\") END\r\tEND WriteTypeFlags;\r\r"
                    attr: 0
                  - text: "\tPROCEDURE WriteTypeConv  (t: WinOleAut.TYPEDESC; tinfo: WinOleAut.ITypeInfo;\r\t\t\t\t\t\t\t\t\t\t\ttype, n: INTEGER; VAR out: TextMappers.Formatter);\r\t\tVAR ti: WinOleAut.ITypeInfo; vt: INTEGER;\r \tBEGIN\r\t\tGetDescType(t, tinfo, vt, ti);\r\t\tIF (vt = WinOle.VT_DISPATCH) & (ti # NIL) THEN\r\t\t\tWriteTypeName(ti, TRUE, TRUE, out);\r\t\t\tIF type = ret THEN out.WriteSString(\"(CtlC.VarAny(\"); out.WriteString(retName); out.WriteString(\"))\")\r\t\t\tELSIF type = get THEN out.WriteSString(\"(CtlC.GetAny(this, \"); out.WriteInt(n); out.WriteSString(\"))\")\r\t\t\tELSIF type = par THEN out.WriteSString(\"(CtlC.VarAny(par[\"); out.WriteInt(n); out.WriteSString(\"]))\")\r\t\t\tELSE (* type = refpar *) out.WriteSString(\"(CtlC.VarRefAny(par[\"); out.WriteInt(n); out.WriteSString(\"])[0])\")\r\t\t\tEND\r\t\tELSE\r\t\t\tIF type = ret THEN\r\t\t\t\tout.WriteSString(\"CtlC.Var\"); WriteShortType(t, tinfo, out);\r\t\t\t\tout.WriteChar(\"(\"); out.WriteString(retName); out.WriteChar(\")\")\r\t\t\tELSIF type = get THEN\r\t\t\t\tout.WriteSString(\"CtlC.Get\"); WriteShortType(t, tinfo, out);\r\t\t\t\tout.WriteSString(\"(this, \"); out.WriteInt(n); out.WriteChar(\")\")\r\t\t\tELSIF type = par THEN\r\t\t\t\tout.WriteSString(\"CtlC.Var\"); WriteShortType(t, tinfo, out);\r\t\t\t\tout.WriteSString(\"(par[\"); out.WriteInt(n); out.WriteSString(\"])\")\r\t\t\tELSE (* type = refpar *)\r\t\t\t\tout.WriteSString(\"CtlC.VarRef\"); WriteShortType(t, tinfo, out);\r\t\t\t\tout.WriteSString(\"(par[\"); out.WriteInt(n); out.WriteSString(\"])[0]\")\r\t\t\tEND\r\t\tEND\r\tEND WriteTypeConv;"
                    attr: 5
                  - text: "\r\r\tPROCEDURE IsSpecial (IN type: WinOleAut.TYPEDESC; tinfo: WinOleAut.ITypeInfo): BOOLEAN;\r\t\t"
                    attr: 0
                  - text: "(* special handling needed for bool, string, dispatch & variant passed by reference *)"
                    attr: 1
                  - text: "\r\t\tVAR ti: WinOleAut.ITypeInfo; vt: INTEGER;\r\tBEGIN\r\t\tGetDescType(type, tinfo, vt, ti);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 8
                  - text: " (vt = WinOle.VT_BOOL) OR (vt = WinOle.VT_BSTR) \r\t\t\tOR (vt = WinOle.VT_DISPATCH) OR (vt = WinOle.VT_VARIANT)\r\tEND IsSpecial;\r\r\tPROCEDURE GetParamType (IN param: WinOleAut.ELEMDESC; tinfo: WinOleAut.ITypeInfo; opts: SET;\r\t\t\t\t\t\t\t\t\t\tOUT type: WinOleAut.TYPEDESC; OUT kind: SHORTINT);\r\t\tVAR flags: SHORTINT; vt: INTEGER; ti: WinOleAut.ITypeInfo;\r\tBEGIN\r\t\ttype := param.tdesc; kind := value;\r\t\tGetDescType(param.tdesc, tinfo, vt, ti);\r\t\tIF (type.vt = WinOle.VT_PTR) & (vt = WinOle.VT_PTR) THEN\r\t\t\tflags := param.u.paramdesc.wParamFlags;\r\t\t\ttype := type.u.lptdesc^;\r\t\t\tIF ODD(flags DIV WinOleAut.PARAMFLAG_FIN) THEN\r\t\t\t\tIF ~ODD(flags DIV WinOleAut.PARAMFLAG_FOUT) THEN kind := varin;\r\t\t\t\t\t"
                    attr: 0
                  - text: "(* correction for wrong IN attributes *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tGetDescType(type, tinfo, vt, ti);\r\t\t\t\t\tIF (vt # record) & (vt # union) & (vt # WinOle.VT_CARRAY) THEN kind := var END\r\t\t\t\tELSE kind := var\r\t\t\t\tEND\r\t\t\tELSIF ODD(flags DIV WinOleAut.PARAMFLAG_FOUT) THEN kind := varout\r\t\t\tELSE kind := var\r\t\t\tEND\r\t\tEND\r\tEND GetParamType;\r\r\tPROCEDURE ShowVar (VAR var: WinOleAut.PtrVARDESC; tinfo: WinOleAut.ITypeInfo;\r\t\t\t\t\t\t\t\t\topts: SET; VAR out: TextMappers.Formatter);\r\t\tVAR n: INTEGER; name, s, t: WinOle.BSTR; res: COM.RESULT; e: SHORTINT;\r\tBEGIN\r\t\tres := tinfo.GetNames(var.memid, name, 1, n);\r\t\tout.WriteTab; out.WriteTab; out.WriteTab; WriteBSTR(name, out);\r\t\tWinOleAut.SysFreeString(name);\r\t\tIF var.varkind = WinOleAut.VAR_CONST THEN \r\t\t\tout.WriteSString(\"* = \"); WriteVariant(var.u.lpvarValue^, out)\r\t\tELSE\r\t\t\tIF ODD(var.wVarFlags DIV WinOleAut.VARFLAG_FREADONLY) THEN out.WriteChar(\"-\")\r\t\t\tELSE out.WriteChar(\"*\")\r\t\t\tEND;\r\t\t\tIF var.varkind = WinOleAut.VAR_STATIC THEN\r\t\t\t\tres := tinfo.GetDllEntry(var.memid, 0, s, t, e);\r\t\t\t\tIF res >= 0 THEN\r\t\t\t\t\tout.WriteSString(\" [\");\r\t\t\t\t\tIF s # NIL THEN\r\t\t\t\t\t\tout.WriteChar('\"'); WriteBSTR(s, out); out.WriteSString('\", '); WinOleAut.SysFreeString(s)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF t # NIL THEN out.WriteChar('\"'); WriteBSTR(s, out); out.WriteChar('\"'); WinOleAut.SysFreeString(t)\r\t\t\t\t\tELSE out.WriteChar('\"'); out.WriteInt(e); out.WriteChar('\"')\r\t\t\t\t\tEND;\r\t\t\t\t\tout.WriteChar(\"]\")\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tout.WriteSString(\": \"); WriteType(var.elemdescVar.tdesc, tinfo, opts + {browse}, out)\r\t\tEND;\r\t\tout.WriteChar(\";\");\r\t\tres := tinfo.GetDocumentation(var.memid, NIL, s, NIL, NIL);\r\t\tIF (s # NIL) OR (browse IN opts) THEN\r\t\t\tout.WriteSString(\" (* \");\r\t\t\tIF s # NIL THEN\r\t\t\t\tWriteBSTR(s, out);\r\t\t\t\tIF browse IN opts THEN "
                    attr: 0
                  - text: "out.WriteSString(\", \")"
                    attr: 7
                  - text: " END;\r\t\t\t\tWinOleAut.SysFreeString(s)\r\t\t\tEND;\r\t\t\tIF browse IN opts THEN\r"
                    attr: 0
                  - text: "\t\t\t\tout.WriteSString(\"id: \"); out.WriteIntForm(var.memid, TextMappers.hexadecimal, 8, \"0\", FALSE);\r\t\t\t\tIF var.varkind = WinOleAut.VAR_DISPATCH THEN out.WriteSString(\", property\") END;\r\t\t\t\tIF ODD(var.wVarFlags DIV WinOleAut.VARFLAG_FREADONLY) THEN out.WriteSString(\", readonly\")\r\t\t\t\tEND;\r\t\t\t\tIF ODD(var.wVarFlags DIV WinOleAut.VARFLAG_FSOURCE) THEN out.WriteSString(\", source\") END;\r\t\t\t\tIF ODD(var.wVarFlags DIV WinOleAut.VARFLAG_FBINDABLE) THEN out.WriteSString(\", bindable\")\r\t\t\t\tEND;\r\t\t\t\tIF ODD(var.wVarFlags DIV WinOleAut.VARFLAG_FDISPLAYBIND) THEN out.WriteSString(\", display\")\r\t\t\t\tEND;\r\t\t\t\tIF ODD(var.wVarFlags DIV WinOleAut.VARFLAG_FDEFAULTBIND) THEN out.WriteSString(\", default\")\r\t\t\t\tEND;\r\t\t\t\tIF ODD(var.wVarFlags DIV WinOleAut.VARFLAG_FHIDDEN) THEN out.WriteSString(\", hidden\") END;\r\t\t\t\tIF var.varkind = WinOleAut.VAR_PERINSTANCE THEN\r\t\t\t\t\tout.WriteSString(\", offset: \"); out.WriteInt(var.u.oInst)\r\t\t\t\tEND"
                    attr: 7
                  - text: "\r\t\t\tEND;\r\t\t\tout.WriteSString(\" *)\")\r\t\tEND;\r\t\tout.WriteLn\r\tEND ShowVar;\r\r\tPROCEDURE ShowParam (VAR param: WinOleAut.ELEMDESC; name: WinOle.BSTR;\r\t\t\t\t\t\t\t\t\t\ttinfo: WinOleAut.ITypeInfo; opts: SET; VAR out: TextMappers.Formatter);\r\t\tVAR type: WinOleAut.TYPEDESC; flags, kind: SHORTINT; ti: WinOleAut.ITypeInfo; s: WinOle.BSTR; res: COM.RESULT;\r\tBEGIN\r\t\tGetParamType(param, tinfo, opts, type, kind);\r\t\tIF kind = var THEN  out.WriteSString(\"VAR \")\r\t\tELSIF kind = varin THEN out.WriteSString(\"IN \")\r\t\tELSIF kind = varout THEN out.WriteSString(\"OUT \")\r\t\tEND;\r\t\tflags := param.u.paramdesc.wParamFlags;\r\t\tIF ODD(flags DIV WinOleAut.PARAMFLAG_FLCID) THEN out.WriteSString(\"(* lcid *) \") END;\r\t\tIF ODD(flags DIV WinOleAut.PARAMFLAG_FRETVAL) THEN out.WriteSString(\"(* retval *) \") END;\r"
                    attr: 0
                  - text: "(*\t\t"
