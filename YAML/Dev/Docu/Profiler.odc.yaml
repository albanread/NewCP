                            attr: 1
                    attr: 1
                    w: 4680000
                    h: 4876800
                  - text: "\r\rIn this example, about 37% of the measured time period has been spent in some procedures of module "
                    attr: 1
                  - text: DevCPT
                    attr: 2
                  - text: ". Procedure "
                    attr: 1
                  - text: InsertImport
                    attr: 2
                  - text: " alone has taken about 7% of the time. Note that procedures which used less than 1% of the time are not displayed, thus the sum over all "
                    attr: 1
                  - text: DevCPT
                    attr: 2
                  - text: " procedures doesn't add up to 37%.\rSome time may be spent in modules not measured, or not in Component Pascal modules at all, e.g., in the host operating system's file system implementation. For this reason, and because modules which used less than 1% of the time are not shown, the sum over all modules doesn't add up to 100%.\r\r\rPROCEDURE "
                    attr: 1
                  - text: SetProfileList
                    attr: 3
                  - text: "\rThis procedure takes the list of selected module names and registers it. This list of modules will be profiled when "
                    attr: 1
                  - text: Start
                    attr: 2
                  - text: " is called. If there is no selection, all listed modules will be profiled.\r\rPROCEDURE "
                    attr: 1
                  - text: SetModuleList
                    attr: 3
                  - text: " (list: ARRAY OF CHAR)\rSame as "
                    attr: 1
                  - text: SetProfileList
                    attr: 2
                  - text: " but with an explicit parameter instead of the selection as implicit parameter. This procedure is useful when the profiler is called from a program rather than interactively.\r\rPROCEDURE "
                    attr: 1
                  - text: Start
                    attr: 3
                  - text: "\rStarts profiling.\r\rPROCEDURE "
                    attr: 1
                  - text: Stop
                    attr: 3
                  - text: "\rStops profiling.\r\rPROCEDURE "
                    attr: 1
                  - text: ShowProfile
                    attr: 3
                  - text: "\rDisplays the most recently measured profile in a new window.\r\rPROCEDURE "
                    attr: 1
                  - text: Reset
                    attr: 3
                  - text: "\rReleases memory used for the profiler, including the most recently measured profile and the module list.\r\rPROCEDURE "
                    attr: 1
                  - text: Execute
                    attr: 3
                  - text: "\rSame as "
                    attr: 1
                  - text: DevDebug.Execute
                    attr: 2
                  - text: ". The execution time (in milliseconds) is written to the log.\r"
                    attr: 1
