                flow:
                  - text: DevProfiler
                    attr: 0
                  - text: "\r\rDEFINITION DevProfiler;\r\r PROCEDURE SetProfileList;\r PROCEDURE SetModuleList (list: ARRAY OF CHAR);\r PROCEDURE Start;\r PROCEDURE Stop;\r PROCEDURE ShowProfile;\r PROCEDURE Reset;\r \r PROCEDURE Execute;\r \r PROCEDURE StartGuard (VAR par: Dialog.Par);\r PROCEDURE StopGuard (VAR par: Dialog.Par);\r\rEND DevProfiler.\r\r\r"
                    attr: 1
                  - text: DevProfiler
                    attr: 2
                  - text: " is a statistical profiler for Component Pascal programs. A profiler measures how much processing time is spent in the individual procedures of a program. A statistical profiler determines at regular time intervals (interrupt-driven) in which procedure of which module the program currently executes. These measurements are stored, and can later be used to display the profile.\rProfiles can be taken over all modules, or over a selected list of particularly interesting modules. Profiling can be started and stopped interactively, or via a programming interface. The latter often allows a more precise measurement.\r\rPossible menus:\r\r"
                    attr: 1
                  - text: MENUS
                    attr: 3
                  - text: "\r\t \"Set Profile List\" \"\" \"DevProfiler.SetProfileList\" \"DevProfiler.StartGuard\"\r\t \"Start Profiler\" \"\" \"DevProfiler.Start\" \"DevProfiler.StartGuard\"\r\t \"Stop Profiler\" \"\" \"DevProfiler.Stop; DevProfiler.ShowProfile\" \"DevProfiler.StopGuard\"\r\t \"Execute\" \"\" \"DevProfiler.Execute\" \"TextCmds.SelectionGuard\"\r"
                    attr: 1
                  - text: END
                    attr: 3
                  - text: "\r\r"
                    attr: 1
                  - text: Programming Example
                    attr: 3
                  - text: "\rThe following example shows how the programming interface of the profiler can be used. It profiles the compilation of a module, i.e., of command "
                    attr: 1
                  - text: DevCompiler.Compile
                    attr: 2
                  - text: ".\r\r\t PROCEDURE "
                    attr: 1
                  - text: ProfiledCompile
                    attr: 3
                  - text: "*;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tDevProfiler.SetModuleList(\"DevCPM DevCPS DevCPT DevCPB DevCPP DevHostCPL \r\tDevHostCPC DevHostCPV\");\r\t\tDevProfiler.Start;\r\t\tDialog.Call(\"DevCompiler.Compile\", \"\", res);\r\t\tDevProfiler.Stop;\r\t\tDevProfiler.ShowProfile;\r\t\tDevProfiler.Reset\r\t END ProfiledCompile;\r\rThe above procedure produces something like the following output:\r\r\t"
                    attr: 1
