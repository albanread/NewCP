                  - text: used before set
                    attr: 4
                  - text: ". Furthermore, the first usage of such a variable is marked (except for records and arrays). Not all warnings are errors, though: A variable, which is set in one branch of an IF statement inside a loop and used before this assignment is marked by DevAnalyzer, although the code might be correct.\r\rIn the following example, variables "
                    attr: 1
