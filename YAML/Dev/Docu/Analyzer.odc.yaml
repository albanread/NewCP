                  - text: "Rec,"
                    attr: 4
                  - text: " "
                    attr: 1
                  - text: "SameRec, Dont, "
                    attr: 4
                  - text: "and "
                    attr: 1
                  - text: "j "
                    attr: 4
                  - text: "in procedure Dont.\r\r"
                    attr: 1
