                          attr: 5
                        - text: " Option)"
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 2
                  - text: "\rAs the evaluation sequence of parameters in a procedure call is not defined in Component Pascal, function calls in parameter lists are problematic, if the functions have side effects on the global state. Therefore (and for other reasons), functions with side effects should be avoided (at least calling them in parameter lists).\r\tE.g., a function call returning a value, which in turn is passed as a parameter to a procedure, and which might change the global state of which some variable is used again in the parameter list, depends heavily on the evaluation sequence. DevAnalyzer marks this problematic code with "
                    attr: 1
                  - text: "evaluation sequence of params..\r"
                    attr: 4
                  - text: "\tEnable the "
                    attr: 1
                  - text: Side Effects
                    attr: 4
                  - text: " option in the Analyze Options... dialog for this analysis.\r\rIn the example, function "
                    attr: 1
                  - text: F
                    attr: 4
                  - text: " changes the global variable "
                    attr: 1
                  - text: x
                    attr: 4
                  - text: ". The result of "
                    attr: 1
                  - text: F
                    attr: 4
                  - text: " and "
                    attr: 1
                  - text: x
                    attr: 4
                  - text: " are used in the procedure call writing out the values. Try this code on two different machine architectures or using two different Component Pascal compilers, and compare the results.\r\r"
                    attr: 1
