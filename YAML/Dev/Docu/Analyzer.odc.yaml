                  - text: "\r"
                    attr: 2
                  - text: "\rThis warning is for the programmer with aesthetic ambitions (or simply for picky people). It marks superfluous semicolons in the code, i.e. semicolons before END or other statement-ending symbols. These semicolons are marked with "
