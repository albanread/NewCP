                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 2
                  - text: "\rReusing names of items declared outside the current scope can lead to confusion, especially when looking at the code after some time. To mark these items, the warning "
                    attr: 1
                  - text: also declared in outer scope
                    attr: 4
                  - text: " "
                    attr: 2
                  - text: "is issued when encountering such an item.\r\tAlso, assigning to or using an item from a different scope can be erroneous, as one might think that a global item is changed or accessed. Therefore, such assignments or uses are marked as "
                    attr: 1
                  - text: "access/assignment to intermediate.\r"
                    attr: 4
                  - text: "\tThe "
                    attr: 1
                  - text: Intermediate items
                    attr: 4
                  - text: " option in the Analyze... dialog controls this feature.\r\rIn the following example, the local variable "
                    attr: 1
                  - text: i
                    attr: 4
                  - text: ", the local procedure "
                    attr: 1
                  - text: Local
                    attr: 4
                  - text: ", and the parameter "
                    attr: 1
                  - text: i
                    attr: 4
                  - text: " of "
                    attr: 1
                  - text: Local
                    attr: 4
                  - text: " are marked as "
                    attr: 1
                  - text: "also declared in outer scope. "
                    attr: 4
                  - text: "The assignment to "
                    attr: 1
                  - text: j
                    attr: 4
                  - text: " and the use of "
                    attr: 1
                  - text: k
                    attr: 4
                  - text: " in "
                    attr: 1
                  - text: Local
                    attr: 4
                  - text: " are marked as "
                    attr: 1
                  - text: access/assignment to intermediate
                    attr: 4
                  - text: ".\r\r"
                    attr: 1
