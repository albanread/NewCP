                  - text: Introduction
                    attr: 2
                  - text: "\r\rDuring the development of a program, many design iterations are made. The source text is changed repeatedly and enhanced, errors are corrected, output statements are inserted and removed again later. The programmer changes procedure bodies and thereby inserts variables that are later not needed anymore. Modules are imported  for temporary purposes  but later never used.\r\rTo clean up such modules, which have evolved over time, "
                    attr: 1
                  - text: DevAnalyzer
                    attr: 4
                  - text: " has been developed. It is a \"normal\" "
                    attr: 1
                  - text: Component Pascal
                    attr: 4
                  - text: " compiler, which does a full syntactic and semantic analysis with error checking of the program at hand, but does not generate a symbol file or object code. Instead, it examines the program and "
                    attr: 1
                  - text: reports problems in the code
                    attr: 4
                  - text: ". The analysis takes place "
                    attr: 1
                  - text: "per module. "
                    attr: 4
                  - text: "Inter-module dependencies are not taken into account.\r\tDevAnalyzer can be applied just like the normal Component Pascal compiler for checking a program's syntactic and semantic correctness (it even uses the base modules of the Component Pascal compiler). In the examples below you can, for instance, remove a semicolon somewhere and DevAnalyzer will report the resulting syntax error.\r\r\r"
                    attr: 1
                  - text: Tutorial
                    attr: 2
                  - text: "\r\rIn the following sections, the different warnings generated by DevAnalyzer are explained in detail. A short source code example is given for illustration. To try out an example, simply click inside the embedded text view containing the example and select "
                    attr: 1
                  - text: Analyze
                    attr: 4
                  - text: " "
                    attr: 1
                  - text: Module
                    attr: 4
                  - text: " from the "
                    attr: 1
                  - text: Info
                    attr: 4
                  - text: " menu. You may also use the "
                    attr: 1
                  - text: Analyzer Options... dialog
                    attr: 4
                  - text: ". The "
                    attr: 1
                  - text: Analyze
                    attr: 4
                  - text: " button in the dialog has the same effect as "
                    attr: 1
                  - text: "Info->Analyze Module"
                    attr: 4
                  - text: ", i.e., both operate on the focus view.\r\r"
                    attr: 1
                  - text: "\rDefinitions"
                    attr: 2
                  - text: "\r\rA "
                    attr: 1
                  - text: program item
                    attr: 4
                  - text: " (or "
                    attr: 1
                  - text: item
                    attr: 4
                  - text: " for short) denotes a construct of Component Pascal occurring in a declaration sequence. These are in particular: "
                    attr: 1
                  - text: "constants, types, variables, receivers, parameters, procedures, "
                    attr: 4
                  - text: and
                    attr: 1
                  - text: " modules. "
                    attr: 4
                  - text: "The terms "
                    attr: 1
                  - text: variable
                    attr: 4
                  - text: ","
                    attr: 1
                  - text: " field"
                    attr: 4
                  - text: ", and"
                    attr: 1
                  - text: " parameter"
                    attr: 4
                  - text: " are used with their normal meaning.\r\t\r"
                    attr: 1
                  - text: "\rDefault Warnings, Always Enabled\r\r"
                    attr: 2
                  - target:
                      name: never used
                      body:
                        - text: Never Used
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r\rAn item declared in the source code but never referenced again is flagged as "
                    attr: 1
                  - text: never used
                    attr: 4
                  - text: ". Frequent examples of such items are variables in declarations that were copied over from other declarations, or modules. Except for modules, the occurrence of such an item can be deleted.\r"
                    attr: 1
                  - text: "Caution:"
                    attr: 4
                  - text: " Some modules in BlackBox Component Builder are imported because of a side effect in the module body, but are never used in the code. Be careful when removing module names from an import list. Typical examples are modules installing a new directory object in some base module.\r\rWhen analyzing the next example, you will see that the following items are marked as "
                    attr: 1
                  - text: never used
                    attr: 4
                  - text: ": "
                    attr: 1
                  - text: "StdLog, Size, "
                    attr: 4
                  - text: "the "
                    attr: 1
