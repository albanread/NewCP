                  - text: DevInspector
                    attr: 1
                  - text: "\r\r"
                    attr: 2
                  - text: "DEFINITION DevInspector;\r\r\tIMPORT Dialog;\r\r\tVAR\r\t\tinspect: RECORD\r\t\t\tcontrol-: Dialog.String;\r\t\t\tlabel: ARRAY 40 OF CHAR;\r\t\t\tlink, guard, notifier: Dialog.String;\r\t\t\tlevel: INTEGER;\r\t\t\topt0, opt1, opt2, opt3, opt4: BOOLEAN\r\t\tEND;\r\r\tPROCEDURE GetNext;\r\tPROCEDURE Set;\r\tPROCEDURE InitDialog;\r\tPROCEDURE ControlGuard (VAR par: Dialog.Par);\r\tPROCEDURE GuardGuard (VAR par: Dialog.Par);\r\tPROCEDURE LabelGuard (VAR par: Dialog.Par);\r\tPROCEDURE LevelGuard (VAR par: Dialog.Par);\r\tPROCEDURE LinkGuard (VAR par: Dialog.Par);\r\tPROCEDURE OptGuard (opt: INTEGER; VAR par: Dialog.Par);\r\tPROCEDURE NotifierGuard (VAR par: Dialog.Par);\r\tPROCEDURE Notifier (idx, op, from, to: INTEGER);\r\rEND DevInspector."
                    attr: 3
                  - text: "\r\r\rThe inspector makes it possible to inspect and modify properties of a control. Currently, various types of controls are supported: command buttons, check boxes, radio buttons, edit fields, date fields, time fields, color fields, up/down-fields list boxes, selection boxes, combo boxes, and groups.\r\rThe inspector is opened with the "
                    attr: 2
                  - text: "Edit->Object Properties..."
                    attr: 4
                  - text: " command (Windows) / "
                    attr: 2
                  - text: "Edit->Part Info"
                    attr: 4
                  - text: " command (Mac OS). It takes a singleton control as input (-> Controls). Starting the inspector is done indirectly by the framework, using the "
                    attr: 2
                  - text: StdCmds.ShowProp
                    attr: 4
                  - text: " command.\r\r\rVAR "
                    attr: 2
                  - text: inspect
                    attr: 0
                  - text: ": RECORD\rInteractor for a control view property dialog.\r\r"
                    attr: 2
                  - text: control
                    attr: 0
                  - text: "-: Dialog.String\rThe control's name. This is the (possibly mapped) name of the control type.\r\r"
                    attr: 2
                  - text: label
                    attr: 0
                  - text: ": ARRAY 40 OF CHAR\rLabel string of the control.\r\r"
                    attr: 2
                  - text: link
                    attr: 0
                  - text: ": Dialog.String\rLink to the interactor field, in the form "
                    attr: 2
                  - text: module.variable.field
                    attr: 4
                  - text: ".\r\r"
                    attr: 2
                  - text: guard
                    attr: 0
                  - text: ": Dialog.String\rName of the control's guard command.\r\r"
                    attr: 2
                  - text: notifier
                    attr: 0
                  - text: ": Dialog.String\rName of the control's notifier command.\r\r"
                    attr: 2
                  - text: level
                    attr: 0
                  - text: ": INTEGER\rIff the value of a radio button is equal to level, the radio button is \"on\".\r\r"
                    attr: 2
                  - text: "opt0, opt1, opt2, opt3, opt3"
                    attr: 0
                  - text: ": BOOLEAN\rVarious options which depend on the currently selected control. For example, a command button uses "
                    attr: 2
                  - text: opt0
                    attr: 4
                  - text: " and "
                    attr: 2
                  - text: opt1
                    attr: 4
                  - text: " to indicate the \"default\" or \"cancel\" properties.\r\rPROCEDURE "
                    attr: 2
                  - text: GetNext
                    attr: 0
                  - text: "\rShow the next control in this container. After the last control, "
                    attr: 2
                  - text: GetNext
                    attr: 4
                  - text: " wraps around to the first control.\r\rPROCEDURE "
                    attr: 2
                  - text: Set
                    attr: 0
                  - text: "\rSet the control's properties to the currently displayed values.\r\rPROCEDURE "
                    attr: 2
                  - text: InitDialog
                    attr: 0
                  - text: "\rSets up the interactor according to the currently selected control.\r\rPROCEDURE "
                    attr: 2
                  - text: ControlGuard
                    attr: 0
                  - text: " (VAR par: Dialog.Par)\rPROCEDURE "
                    attr: 2
                  - text: GuardGuard
                    attr: 0
                  - text: " (VAR par: Dialog.Par)\rPROCEDURE "
                    attr: 2
                  - text: LabelGuard
                    attr: 0
                  - text: " (VAR par: Dialog.Par)\rPROCEDURE "
                    attr: 2
                  - text: LevelGuard
                    attr: 0
                  - text: " (VAR par: Dialog.Par)\rPROCEDURE "
                    attr: 2
                  - text: LinkGuard
                    attr: 0
                  - text: " (VAR par: Dialog.Par)\rPROCEDURE "
                    attr: 2
                  - text: OptGuard
                    attr: 0
                  - text: " (opt: INTEGER; VAR par: Dialog.Par)\rPROCEDURE "
                    attr: 2
                  - text: NotifierGuard
                    attr: 0
                  - text: " (VAR par: Dialog.Par)\rPROCEDURE "
                    attr: 2
                  - text: Notifier
                    attr: 0
                  - text: " (idx, op, from, to: INTEGER)\rVarious guards and notifiers used in the inspector dialog.\r"
