                flow:
                  - text: DevReferences
                    attr: 0
                  - text: "\r\rDEFINITION DevReferences;\r\r\tIMPORT TextMappers, Files;\r\r\tPROCEDURE  ShowDocu;\r\tPROCEDURE  ShowSource;\r\tPROCEDURE  ShowText (module, ident: TextMappers.String; category: Files.Name);\r\rEND DevReferences.\r\r\rThis module provides two commands which, given the name of a module or of a qualified identifier, look up the corresponding documentation or source text.\r\rTypical menu:\r\r"
                    attr: 1
                  - text: MENU
                    attr: 2
                  - text: "\r\t\"&Source\"\t\"\"\t\"DevReferences.ShowSource\"\t\"TextCmds.SelectionGuard\"\r\t\"&Documentation\"\t\"\"\t\"DevReferences.ShowDocu\"\t\"TextCmds.SelectionGuard\"\r"
                    attr: 1
                  - text: END
                    attr: 2
                  - text: "\r\r\rPROCEDURE "
                    attr: 1
                  - text: ShowDocu
                    attr: 2
                  - text: "\rGuard: TextCmds.SelectionGuard\rLooks up the documentation text of the module whose name is selected. If a qualified identifier is selected, i.e., \"module.ident\", the corresponding item is searched. It must be written in boldface and in a smaller than 14 point type. The document must be located in the "
                    attr: 1
                  - text: Docu
                    attr: 3
                  - text: " directory of the module's subsystem.\r\rPROCEDURE "
                    attr: 1
                  - text: ShowSource
                    attr: 2
                  - text: "\rGuard: TextCmds.SelectionGuard\rLooks up the source text of the module whose name is selected. If a qualified identifier is selected, i.e., \"module.ident\", the corresponding item is searched. It must be written in boldface and in a smaller than 14 point type. The document must be located in the "
                    attr: 1
                  - text: Mod
                    attr: 3
                  - text: " directory of the module's subsystem.\r\rPROCEDURE  "
                    attr: 1
                  - text: ShowText
                    attr: 2
                  - text: " (module, ident: TextMappers.String; category: Files.Name)\rUsed internally.\r"
                    attr: 1
