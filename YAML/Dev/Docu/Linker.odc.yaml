                  - text: DevLinker
                    attr: 0
                  - text: "\r\r"
                    attr: 1
                  - text: DevLinker
                    attr: 2
                  - text: " is the BlackBox linker. It is used to pack several BlackBox code files together into one executable file ("
                    attr: 1
                  - text: .dll
                    attr: 2
                  - text: " or "
                    attr: 1
                  - text: .exe
                    attr: 2
                  - text: "). It can be used to make independent versions of applications based on the BlackBox Component Framework. It can also be used to produce executables written in Component Pascal which don't relate to the BlackBox framework or use only a few BlackBox modules like the "
                    attr: 1
                  - text: Kernel
                    attr: 2
                  - text: ".\r\rThe linker can be started with one of the commands described below. Each of the commands needs a parameter text with the syntax:\r\r<destFile> := {<module> {option}} {idNumber <resourceFile>}.\r\r"
                    attr: 1
                  - text: destFile
                    attr: 2
                  - text: " is the name of the executable file to be created.\r"
                    attr: 1
                  - text: module
                    attr: 2
                  - text: " is a Component Pascal module, the code file is loaded from the corresponding directory.\r"
                    attr: 1
                  - text: option
                    attr: 2
                  - text: " is one of the following characters:\r\t$ main module: the body of this module is called when the program starts.\r\t+ identifies the kernel. A kernel must be present if the standard function "
                    attr: 1
                  - text: NEW
                    attr: 2
                  - text: " is used in some module. The kernel must export the procedures "
                    attr: 1
                  - text: NewRec
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: NewArr
                    attr: 2
                  - text: ".\r\t# interface module: the exported procedures of this module are added to the export list.\r\tSee the description of the individual commands for a list of the legal options.\r"
                    attr: 1
                  - text: resourceFile
                    attr: 2
                  - text: " is the name of a resource file. Currently icons ("
                    attr: 1
                  - text: .ico
                    attr: 2
                  - text: "), cursors ("
                    attr: 1
                  - text: .cur
                    attr: 2
                  - text: "), bitmaps (."
                    attr: 1
                  - text: bmp
                    attr: 2
                  - text: "), windows resource files (."
                    attr: 1
                  - text: res
                    attr: 2
                  - text: "), and type libraries (."
                    attr: 1
                  - text: tlb
                    attr: 2
                  - text: ") are supported. The resource files are loaded from the "
                    attr: 1
                  - text: Rsrc
                    attr: 2
                  - text: " or "
                    attr: 1
                  - text: Win/Rsrc
                    attr: 2
                  - text: " directory.\r"
                    attr: 1
                  - text: idNumber
                    attr: 2
                  - text: " is an integer used to reference the corresponding resource from the program.\r\rThe module list must be sorted such that an imported module textually precedes the module importing it. This rule also applies to the implicit kernel import when using "
                    attr: 1
                  - text: NEW
                    attr: 2
                  - text: ".\r\r\r"
                    attr: 1
                  - text: DevLinker.Link
                    attr: 3
                  - text: "\rLinks a module set containing a dynamic module loader to an exe file.\rAt startup, the body of the main module is called.\rInitialization and termination of the other modules is not done by the loader, it must be done by the runtime system (typically the loader).\rBlackBox itself is linked with this command.\rLegal options: $ +\r\r"
                    attr: 1
                  - text: DevLinker.LinkExe
                    attr: 3
                  - text: "\rLinks an unextensible module set to an exe file (i.e., no loader is included).\rAt startup, the bodies of all modules are called in the correct order.\rWhen the last body terminates, the terminators (CLOSE sections) of all modules are called in reverse order.\rNo runtime system is needed for initialization and termination.\rLegal options: +\r\r"
                    attr: 1
                  - text: DevLinker.LinkDll
                    attr: 3
                  - text: "\rLinks an unextensible module set to a dll file.\rWhen the dll is attached to a process, the bodies of all modules are called in the correct order.\rWhen the dll is released from the process, the terminators (CLOSE sections) of all modules are called in reverse order.\rNo runtime system is needed for initialization and termination.\rLegal options: + #\r\r"
                    attr: 1
                  - text: DevLinker.LinkDynDll
                    attr: 3
                  - text: "\r(rarely used, present for completeness)\rLinks a module set containing a dynamic module loader to a dll file.\rWhen the dll is attached to a process, the body of the main module is called.\rWhen the dll is released from the process, the terminator (CLOSE section) of the main module is called.\rInitialization and termination of the other modules must be done by the runtime system.\rLegal options: $ + #\r\rThe reason for the different commands for static and dynamic systems is that there is no statically defined initialization sequence in a system that includes a dynamic loader. In BlackBox the "
                    attr: 1
                  - text: Kernel
                    attr: 2
                  - text: " (which is the lowest module in the module hierarchy) is specified as the main module. The body of the kernel then calls the bodies of all linked modules dynamically in the correct sequence. If there are no calls to the dynamic loader (via "
                    attr: 1
                  - text: Dialog.Call
                    attr: 2
                  - text: ") in the module bodies, the modules are initialized in the order in which they appear in the parameter text.\r\r\r"
                    attr: 1
                  - text: Examples
                    attr: 3
                  - text: "\r\rStandard BlackBox:\r\r"
                    attr: 1
