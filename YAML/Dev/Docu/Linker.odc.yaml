                  - text: "DevLinker.LinkDll\rMydll.dll := Mydll# ~\r\r\rMODULE Simple;\r"
                    attr: 1
                  - text: "(* simple windows application *)"
                    attr: 2
                  - text: "\r"
                    attr: 1
                  - text: "\r"
                    attr: 2
                  - text: "\tIMPORT S := SYSTEM, WinApi;\r\r\tCONST\r\t\tmessage = \"Hello World\";\r\t\ticonId = 1;\r\r\tVAR\r\t\tinstance: WinApi.HINSTANCE;\r\t\tmainWnd: WinApi.HWND;\r\r\tPROCEDURE WndHandler (wnd, msg, wParam, lParam: INTEGER): INTEGER;\r\t\tVAR res: INTEGER; ps: WinApi.PAINTSTRUCT; dc: WinApi.HDC;\r\tBEGIN\r\t\tIF msg = WinApi.WM_DESTROY THEN\r\t\t\tWinApi.PostQuitMessage(0)\r\t\tELSIF msg = WinApi.WM_PAINT THEN\r\t\t\tdc := WinApi.BeginPaint(wnd, ps);\r\t\t\tres := WinApi.TextOut(dc, 50, 50, message, LEN(message));\r\t\t\tres := WinApi.EndPaint(wnd, ps)\r\t\tELSIF msg = WinApi.WM_CHAR THEN\r\t\t\tres := WinApi.Beep(800, 200)\r\t\tELSE\r\t\t\t"
                    attr: 1
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.DefWindowProc(wnd, msg, wParam, lParam)\r\t\tEND;\r\t\t"
                    attr: 1
                  - text: RETURN
                    attr: 3
                  - text: " 0\r\tEND WndHandler;\r\r\tPROCEDURE OpenWindow;\r\t\tVAR class: WinApi.WNDCLASS; res: INTEGER;\r\tBEGIN\r\t\tclass.hCursor := WinApi.LoadCursor(0, S.VAL(WinApi.PtrSTR,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWinApi.IDC_ARROW));\r\t\tclass.hIcon := WinApi.LoadIcon(instance, S.VAL(WinApi.PtrSTR, iconId));\r\t\tclass.lpszMenuName := NIL;\r\t\tclass.lpszClassName := \"Simple\";\r\t\tclass.hbrBackground := WinApi.GetStockObject(WinApi.WHITE_BRUSH);\r\t\tclass.style := WinApi.CS_VREDRAW + WinApi.CS_HREDRAW\r\t\t\t\t\t\t(* + WinApi.CS_OWNDC + WinApi.CS_PARENTDC *);\r\t\tclass.hInstance := instance;\r\t\tclass.lpfnWndProc := WndHandler;\r\t\tclass.cbClsExtra := 0;\r\t\tclass.cbWndExtra := 0;\r\t\tres := WinApi.RegisterClass(class);\r\t\tmainWnd := WinApi.CreateWindowEx({}, \"Simple\", \"Simple Application\",\r\t\t\t\t\t\t\t\t\t\t\t\t\t\tWinApi.WS_OVERLAPPEDWINDOW,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\tWinApi.CW_USEDEFAULT, WinApi.CW_USEDEFAULT,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\tWinApi.CW_USEDEFAULT, WinApi.CW_USEDEFAULT,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t0, 0, instance, 0);\r\t\tres := WinApi.ShowWindow(mainWnd, WinApi.SW_SHOWDEFAULT);\r\t\tres := WinApi.UpdateWindow(mainWnd);\r\tEND OpenWindow;\r\r\tPROCEDURE MainLoop;\r\t\tVAR msg: WinApi.MSG; res: INTEGER;\r\tBEGIN\r\t\tWHILE WinApi.GetMessage(msg, 0, 0, 0) # 0 DO\r\t\t\tres := WinApi.TranslateMessage(msg);\r\t\t\tres := WinApi.DispatchMessage(msg);\r\t\tEND;\r\t\tWinApi.ExitProcess(msg.wParam)\r\tEND MainLoop;\r\rBEGIN\r\tinstance := WinApi.GetModuleHandle(NIL);\r\tOpenWindow;\r\tMainLoop\rEND Simple.\r\r\rMODULE Mydll;\r"
                    attr: 1
                  - text: "(* sample module to be linked into a dll *)"
                    attr: 2
                  - text: "\r"
                    attr: 1
                  - text: "\r"
                    attr: 2
                  - text: "\tPROCEDURE "
                    attr: 1
                  - text: Gcd
                    attr: 3
                  - text: "* (a, b: INTEGER): INTEGER;\r\tBEGIN\r\t\tWHILE a # b DO\r\t\t\tIF a > b THEN a := a - b ELSE b := b - a END\r\t\tEND;\r\t\t"
                    attr: 1
                  - text: RETURN
                    attr: 3
                  - text: " a\r\tEND Gcd;\r\t\r\tPROCEDURE "
                    attr: 1
                  - text: Lcm
                    attr: 3
                  - text: "* (a, b: INTEGER): INTEGER;\r\tBEGIN\r\t\t"
                    attr: 1
                  - text: RETURN
                    attr: 3
                  - text: " a * b DIV Gcd(a, b)\r\tEND Lcm;\r\t\rEND Mydll.\r"
                    attr: 1
