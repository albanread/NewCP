                  - text: "DevLinker.Link MyBlackBox.exe :=\rKernel$+ Files HostFiles StdLoader Math Strings Dates Meta Dialog Services\rFonts Ports Stores Log Converters Sequencers Models Printers Views\rControllers Properties Printing Mechanisms Containers\rDocuments Windows StdCFrames Controls StdDialog StdApi StdCmds StdInterpreter\rHostRegistry HostFonts HostPorts OleData HostMechanisms HostWindows \rHostPrinters HostClipboard HostCFrames HostDialog HostCmds\rHostMenus HostPictures TextModels TextRulers TextSetters TextViews\rTextControllers TextMappers StdLog TextCmds\rFormModels FormViews FormControllers FormGen FormCmds\rStdFolds StdLinks StdDebug HostTextConv HostMail\rStdMenuTool StdClocks StdStamps StdLogos StdCoder StdScrollers\rOleStorage OleServer OleClient StdETHConv In Out XYplane Init\r1 applogo.Ico 2 doclogo.Ico 3 SFLogo.ico 4 CFLogo.ico 5 DtyLogo.ico\r1 Move.cur 2 Copy.cur 3 Link.cur 4 Pick.cur 5 Stop.cur 6 Hand.cur 7 Table.cur\r\rSimple independent application:\r\r"
                    attr: 1
