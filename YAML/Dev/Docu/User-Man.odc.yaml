                  - text: "\r\rIn the first line, the exception or trap number is given, e.g., \"Index out of range\" or \"TRAP 0\". Further below, a sequence of procedure activations is given, e.g., the last active procedure (where the trap occurred) was "
                    attr: 3
                  - text: ObxTrap.Do
