                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 2
                  - text: "Besides consuming stored text documents, the Component Pascal compiler can compile modules from anywhere in any displayed text document. If the beginning of a displayed text is also the beginning of a module, the command "
                    attr: 3
                  - text: "Dev->Compile"
                    attr: 5
                  - text: " is used to compile the module. If the module begins somewhere in the middle of a displayed text, its beginning can be selected, e.g., by doubleclicking on the keyword "
                    attr: 3
                  - text: MODULE
                    attr: 5
                  - text: ", and then the command "
                    attr: 3
                  - text: "Dev->Compile Selection"
                    attr: 5
                  - text: " is used.\r\rTo compile a list of modules at once, a list of module names needs to appear in some displayed text, e.g.,\r\r FormModels FormViews FormControllers FormCmds\r\rBy selecting the part of the list that should be considered by the compiler, and by invoking the command "
                    attr: 3
                  - text: "Dev->Compile Module List"
                    attr: 5
                  - text: ", the list of modules is compiled consecutively. The process stops as soon as an erroneous module has been encountered. The compiler reports on the success or failure of compilations by writing into the system log. The log is a special text displayed in an auxiliary window. It can be opened using "
                    attr: 3
                  - text: "Info->Open Log"
                    attr: 5
                  - text: " and cleared using "
                    attr: 3
                  - text: "Info->Clear Log"
                    attr: 5
                  - text: ".\r\rThe log is a development tool, i.e., it is mainly used for debugging purposes and for development tools. End-user applications are not expected to display a log. Whether or not a log window is opened upon startup of BlackBox is determined by the configuration's "
                    attr: 3
                  - text: Config
                    attr: 5
                  - text: " module (in directory System/Mod). This module can be changed by the programmer as desired; by default its "
                    attr: 3
                  - text: Setup
                    attr: 5
                  - text: " procedure only contains a statement which opens the log.\r\r"
                    attr: 3
                  - text: "Dev->Open Module List"
                    attr: 5
                  - text: " is a convenient command which opens the module sources of one or several modules: select a module name, e.g., "
                    attr: 3
                  - text: FormCmds
                    attr: 5
                  - text: ", and then execute "
                    attr: 3
                  - text: "Dev->Open Module List"
                    attr: 5
                  - text: ". This command can save you much time when you work with multiple subsystems (cf. "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('Docu/Tut-3.odc', 'BlackBox Design Practices');StdLinks.ShowTarget('subsystems')"
                      body:
                        - text: Modules and Subsystems
                          attr: 6
                      attr: 6
                      w: 121725
                      h: 133350
                  - text: ") at the same time.\r\rWhen compiling a newly created or a modified module, direct compilation of the displayed program text with "
                    attr: 3
                  - text: "Dev->Compile"
                    attr: 5
                  - text: " is recommended. In addition to writing to the system log, the compiler then also inserts "
                    attr: 3
                  - text: error markers
                    attr: 5
                  - text: " into the source text and places the caret after the first marker, if some syntax error was encountered. Each marker represents an error flagged by the compiler in the source text. Normally, a marker is displayed as a crossedout box. However, simply by clicking into it, a marker expands to display the corresponding error message. If the insertion point is directly behind a marker, it can be expanded via the command "
                    attr: 3
                  - text: "Dev->Toggle Error Mark"
                    attr: 5
                  - text: " (or more likely via its keyboard shortcut).\r\rWindows:\rAt the bottom of a window there is a status bar. If the user clicks into an error marker, the error message is written into the status bar instead of expanding the error marker. The error marker can be forced to expand by a "
                    attr: 3
                  - text: modifier
                    attr: 5
                  - text: "-click or a double-click on the marker.\r\rThe command "
                    attr: 3
                  - text: "Dev->Next Error"
                    attr: 5
                  - text: " can be used to skip forward to the next marker. "
                    attr: 3
                  - text: "Dev->Unmark Errors"
                    attr: 5
                  - text: " removes all remaining markers from a text. However, this command is rarely required: The compiler automatically removes all old markers when recompiling a text; and when storing a text, contained markers are filtered out, i.e., do not appear anymore when the text is opened again.\r\rIf a compiled module contains one or several errors, the text is scrolled to the first one. If this doesn't happen, the module was successfully compiled. In addition to this feedback, the compiler writes the number of errors found to the log, if there are errors. If the module interface has changed compared to a previous version, the changes are listed in the log as well.\r\rThe successful compilation of a module yields two files: a symbol file and a code file. A symbol file contains the information about a module's interface, and is used by the compiler to check imported modules for consistency. The code file represents the generated code (Intel 386 code on Windows, Motorola 68020 code on Macintosh). The contents of a code file is linked and loaded dynamically when needed, thus there is no need for a separate linker.\r\rSymbol files are only needed during development (used by the compiler and the interface browser), they are not needed to run modules. A symbol file is a special encoding of a module's interface, i.e. of its exported constants, variables, types, and procedures. If the interface of a module is changed and the module recompiled, a new symbol file is written to disk. When compiling a module, the compiler reads the symbol files of all imported modules. This information is used to generate code, but also to type-check the correct use of imported identifiers.\rAfter the interface of a module has been modified, all modules importing it (i.e., all its "
                    attr: 3
                  - text: clients
                    attr: 5
                  - text: ") must be recompiled. Only those modules need to be recompiled which actually use a feature that has been changed. A mere addition of features does not invalidate the clients of a module: if you export a further procedure, for example, no clients need to be recompiled. This also holds for constants, variables, and types, but not for methods. Addition of a method is not considered an extension, but rather a modification of an interface, and thus may invalidate clients.\r\rCode files are produced, but never read during compilation. They are necessary to run modules, i.e. the dynamic (linking) loader must be able to read them. They can be regarded as special very light-weight DLLs (dynamic link libraries).\r\rSee also modules "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('Dev/Docu/Compiler', 'DevCompiler Docu')"
                      body:
                        - text: DevCompiler
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: ", "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('Dev/Docu/Cmds', 'DevCmds Docu')"
                      body:
                        - text: DevCmds
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: ", and "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('Dev/Docu/Markers', 'DevMarkers Docu')"
                      body:
                        - text: DevMarkers
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: ".\r\r"
                    attr: 3
                  - target:
                      name: Browsing Tools
                      body:
                        - text: 2 Browsing tools
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 2
                  - text: "A common cause of compiletime errors is the wrong use of interfaces. To quickly retrieve the actual definitions of items exported by modules, the browser may be used. The interface of a whole module is displayed when selecting the name of a module and executing "
                    attr: 3
                  - text: "Info->Client Interface"
                    attr: 5
                  - text: ". To display the definition of an individual item, e.g., a type or procedure, the qualified name of that item, i.e., "
                    attr: 3
                  - text: module.item
                    attr: 5
                  - text: " should be selected with the same command. The browser displays its output in a form that can directly be used as input for further browsing actions. Command "
                    attr: 3
                  - text: "Info->Client Interface"
                    attr: 5
                  - text: " only shows the part of a module's interface which is relevant for clients, i.e., it leaves out implement-only methods and similar items that are only relevant for implementers of object types. For implementers, the command "
                    attr: 3
                  - text: "Info->Extension Interface"
                    attr: 5
                  - text: " shows the full interface.\r\rTwo related commands, "
                    attr: 3
                  - text: "Info->Source"
                    attr: 5
                  - text: " and "
                    attr: 3
                  - text: "Info->Documentation"
                    attr: 5
                  - text: ", allow to look up an item's definition in a source file, or in an on-line documentation, respectively. They both work on selected module names as well as on names in the form "
                    attr: 3
                  - text: module.item
                    attr: 5
                  - text: ", just as the "
                    attr: 3
                  - text: "Info->Interface"
                    attr: 5
                  - text: " command.\r\rThe general text search commands "
                    attr: 3
                  - text: "Info->Search in Sources"
                    attr: 5
                  - text: " and "
                    attr: 3
                  - text: "Info->Search in Docu"
                    attr: 5
                  - text: " search a selected string in the available source files, respectively documentation files. For source files, this means in the global "
                    attr: 3
                  - text: Mod
                    attr: 5
                  - text: " directory and in each subsystems' "
                    attr: 3
                  - text: Mod
                    attr: 5
                  - text: " directory. For documentation files, this means in the global "
                    attr: 3
                  - text: Docu
                    attr: 5
                  - text: " directory and in each subsystem's "
                    attr: 3
                  - text: Docu
                    attr: 5
                  - text: " directory. As a result of these commands, a new text is opened which contains a hyperlink for each file where the string occurs, and the count of how many times it occurs there. When the user clicks on the hyperlink, the corresponding file is opened and first instance of the string is selected. With "
                    attr: 3
                  - text: "Text->Find Again"
                    attr: 5
                  - text: ", the next instance can be found. Note that these commands may take up to several minutes to complete.\r\rSee also modules "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('Dev/Docu/Browser', 'DevBrowser Docu')"
                      body:
                        - text: DevBrowser
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: ", "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('Dev/Docu/References', 'DevReferences Docu')"
                      body:
                        - text: DevReferences
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: ", "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('Dev/Docu/Search', 'DevSearch Docu')"
                      body:
                        - text: DevSearch
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: ", and "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('Dev/Docu/Dependencies', 'DevDependencies Docu')"
                      body:
                        - text: DevDependencies
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: ".\r\r"
                    attr: 3
                  - target:
                      name: Loading and
                      body:
                        - text: 3 Loading and unloading modules
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 2
                  - text: "Once a module successfully passes the compiler it can be loaded to the system and used.\rThe BlackBox loader can dynamically link and load a module at run-time. A code file basically is a language-specific light-weight DLL (dynamic link library). The loader can be invoked from within a program by calling the procedure "
                    attr: 3
                  - text: Dialog.Call
                    attr: 5
                  - text: ". This procedure takes a command name as parameter. It loads the command's module, if it isn't loaded yet. Afterwards, it executes the command's procedure. For example,\r\r\tDialog.Call(\"DevDebug.ShowLoadedModules\", \"\", res)\r\rcauses the loading of module "
                    attr: 3
                  - text: DevDebug
                    attr: 5
                  - text: " (if necessary) and the execution of its "
                    attr: 3
                  - text: ShowLoadedModules
                    attr: 5
                  - text: " procedure.\rA loading attempt may cause the following errors:\r\r"
                    attr: 3
                  - text: Code file not found
                    attr: 5
                  - text: "\rThe code file of a module has not been found.\rFor example, loading of module "
                    attr: 3
                  - text: FormCmds
                    attr: 5
                  - text: " requires the code file "
                    attr: 3
                  - text: Form/Code/Cmds
                    attr: 5
                  - text: ".\r\r"
                    attr: 3
                  - text: Corrupted code file
                    attr: 5
                  - text: "\rThe module's code file exists, but its internal format is not correct.\r\r"
                    attr: 3
                  - text: Object not found
                    attr: 5
                  - text: "\rThe module imports some object (constant, type, variable, procedure) from another module, where this object is not exported.\r\r"
                    attr: 3
                  - text: Object inconsistently imported
                    attr: 5
                  - text: "\rThe module imports some object (constant, type, variable, procedure) from another module, where this object is exported, but with a different signature.\rSuch inconsistencies typically occur if a module's interface was changed (e.g., a procedure got an additional parameter), but not all client modules were recompiled afterwards. Another possibility is that the module whose interface was changed has not been reloaded after compilation. In this case, everything will work fine after it has been unloaded (e.g., after a restart of BlackBox).\r\r"
                    attr: 3
                  - text: Cyclic import
                    attr: 5
                  - text: "\rModules may not import each other cyclically. For example, it is not alllowed that module A imports module B, and module B imports module C, and module C imports module A.\r\r"
                    attr: 3
                  - text: Not enough memory
                    attr: 5
                  - text: "\rThere is not enough memory left for loading the module.\r\rOnce loaded, a module remains loaded if it isn't unloaded explicitly. The list of all currently loaded modules is displayed by "
                    attr: 3
                  - text: "Info->Loaded Modules"
                    attr: 5
                  - text: ".\r\r"
                    attr: 3
                  - text: "In order to use a new version of a module that is already loaded, the module needs to be unloaded first."
                    attr: 5
                  - text: "\r\rCommand "
                    attr: 3
                  - text: "Dev->Unload"
                    attr: 5
                  - text: " takes a focused module source as input and tries to unload the corresponding module. "
                    attr: 3
                  - text: "Dev->Unload"
                    attr: 5
                  - text: " fails if the module is still in use, i.e., if it is imported by at least one other module that is still loaded. (In general, modules can only be released top down.) The command "
                    attr: 3
                  - text: "Dev->Unload Module List"
                    attr: 5
                  - text: " takes a selection as input, which must consist of a sequence of module names. You may directly use a selection in the text produced by "
                    attr: 3
                  - text: "Info->Loaded Modules"
                    attr: 5
                  - text: " as input.\r\rSee also module "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('Dev/Docu/Debug', 'Debug Docu')"
                      body:
                        - text: DevDebug
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: ".\r\r"
                    attr: 3
                  - target:
                      name: Executing Commands
                      body:
                        - text: 4 Executing commands
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 2
                  - text: "There are several ways to execute commands (i.e., procedures exported by Component Pascal modules, intended for direct invocation by the user) within BlackBox. A command name can be written to a text, as a string of the form \"module.procedure\", selected, and executed using "
                    attr: 3
                  - text: "Dev->Execute"
                    attr: 5
                  - text: ". An easier way is to insert a "
                    attr: 3
                  - text: commander
                    attr: 5
                  - text: " in front of the command name, using "
                    attr: 3
                  - text: "Tools->Insert Commander"
                    attr: 5
                  - text: ". Clicking on a commander interprets the string following it as a sequence of commands, e.g.\r\r "
                    attr: 3
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 52
                      bodyPos: 4699
                      bodyLen: 6
                    attr: 3
                    w: 177800
                    h: 152400
                  - text: " \"Dialog.Beep; DevDebug.ShowLoadedModules\"\r\rIf the string consists of only one parameterless command, the string delimiters may be omitted, e.g.,\r\r "
                    attr: 3
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 53
                      bodyPos: 4745
                      bodyLen: 6
                    attr: 3
                    w: 177800
                    h: 152400
                  - text: " Dialog.Beep\r\rWith such simple commands, it is possible to combine the unloading of an old version with the execution of a new version of a command (resp. of its module): "
                    attr: 3
                  - text: modifier
                    attr: 5
                  - text: "-click on the commander causes the command's module to be unloaded, and then the new module version is loaded and the procedure executed. Note that this \"unload shortcut\" only works for top-level modules, i.e. for modules which are not imported by any other modules.\r\rThe allowed parameter lists for commands are documented with module "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('Std/Docu/Interpreter', 'StdInterpreter')"
                      body:
                        - text: StdInterpreter
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: ".\r\rThe BlackBox Component Framework tries to call the command "
                    attr: 3
                  - text: Config.Setup
                    attr: 5
                  - text: " when it is starting up. You can change "
                    attr: 3
                  - text: Config
                    attr: 5
                  - text: " in order to customize your configuration upon startup.\r\rSee also modules "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('Dev/Docu/Debug', 'Debug Docu')"
                      body:
                        - text: DevDebug
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: " and "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('System/Docu/Config', 'Config Docu')"
                      body:
                        - text: Config
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: ".\r\r"
                    attr: 3
                  - target:
                      name: Debugging
                      body:
                        - text: 5 Debugging
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 2
                  - text: "When a run-time error occurs, e.g., a division by zero or some assertion trap, a "
                    attr: 3
                  - text: trap window
                    attr: 5
                  - text: " is opened. Such a window contains a text which shows the stack contents at the time when the trap occurred. An extract of such a trap text is shown below:\r\r\t"
                    attr: 3
                  - view:
                      kind: TextViews.StdView
                      storeKind: store
                      typeChain:
                        - TextViews.StdViewDesc
                        - TextViews.ViewDesc
