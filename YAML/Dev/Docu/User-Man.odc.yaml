                    attr: 3
                  - text: StdInterpreter.Command
                    attr: 5
                  - text: ", etc. Each procedure is marked with a small diamond mark to the left of its name. Clicking on this diamond mark produces a new window which shows the global variables of the module in which this procedure is defined, e.g.,\r\r  "
