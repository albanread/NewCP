                    attr: 3
                    w: 5302125
                    h: 3273425
                  - text: "\r\rSuch a display is opened in another window. The fields of a record are indicated by the preceding \".\". On the first line, the path you have followed is indicated. If you have followed more than one dereferencing step, a diamond mark at the right end of this line lets you trace back again step by step.\r\rArray elements and record fields are wrapped into folds (-> "
                    attr: 3
                  - text: StdFolds
                    attr: 5
                  - text: "), which can be opened or closed by clicking on the fold views. Folding of structured data types makes it easier to get an overview in complex situations.\r\rNote that the debugger only finds source text files if they are located at their correct places and under their correct names, according to their subsystems. For example, for module \"FormViews\", the debugger looks for file "
                    attr: 3
                  - text: Form/Mod/Views
                    attr: 5
                  - text: ". If the file is stored somewhere else, or under another name, the debugger will look for an open window with the appropriate module source in it. It this also fails, it opens a dialog box so that the user can show the debugger where to find the correct file.\r\rWhen a trap occurs in a view implementation, e.g., in the view's "
                    attr: 3
                  - text: Restore
                    attr: 5
                  - text: " procedure, the error which caused it might later lead to another trap again, e.g., when the view becomes uncovered, its "
                    attr: 3
                  - text: Restore
                    attr: 5
                  - text: " procedure is called again. In the worst case, this may lead to a never-ending sequence of traps. BlackBox prevents this by partially disabling a trapped view. Such a view is overlaid with a light grey pattern; its contents won't be restored again. However, the view's remaining behavior is still intact, i.e., it may be saved to a file. If saving leads to a trap, the view is turned into an alien; this is indicated by a cross overlaid over the view. The rest of the container document could still be saved, however.\r\rBlackBox distinguishes three categories of view traps:\r"
                    attr: 3
                  - text: ꀢ
                    attr: 3
                    wide: true
                  - text: " refresh: a trap in the view's "
                    attr: 3
                  - text: Restore
                    attr: 5
                  - text: " or "
                    attr: 3
                  - text: RestoreMarks
                    attr: 5
                  - text: " procedures\r"
                    attr: 3
                  - text: ꀢ
                    attr: 3
                    wide: true
                  - text: " save: a trap in the view's "
                    attr: 3
                  - text: Internalize
                    attr: 5
                  - text: " or "
                    attr: 3
                  - text: Externalize
                    attr: 5
                  - text: " procedures\r"
                    attr: 3
                  - text: ꀢ
                    attr: 3
                    wide: true
                  - text: " other: a trap in any other of the view procedures\r\rIf a trap in one of those categories occurs, this behavior will be disabled (i.e., the system won't call the procedures in this category anymore), behavior of the other categories remains intact. In the worst case, a view can lead to three traps, one for each category.\r\rThis means that erroneous views \"degrade gracefully\", by freezing only those behaviors that already have led to traps. If for some reason a view should be \"unfrozen\" again, the command "
                    attr: 3
                  - text: Dev
                    attr: 5
                  - text: "->"
                    attr: 3
                  - text: Revalidate View
                    attr: 5
                  - text: " can be used.\r\rAn endless loop can be interrupted by pressing "
                    attr: 3
                  - text: ctrl-break
                    attr: 5
                  - text: " (Windows) / "
                    attr: 3
                  - text: command-option-.
                    attr: 5
                  - text: " (Mac OS).\r\rThe following standard traps may occur at run-time (depending on the platform, some of these errors don't occur):\r\r\tinvalid WITH\r\tinvalid CASE\r\tfunction without return\r\ttype guard\r\tvalue out of range\r\tindex out of range\r\tstring too long\r\tstack overflow\r\tinteger overflow\r\tdivision by zero\r\tinfinite real result\r\treal underflow\r\treal overflow\r\tundefined real result\r\tnot a number\r\tkeyboard interrupt\r\tNIL dereference\r\tillegal instruction\r\tNIL dereference (read)\r\tillegal memory read\r\tNIL dereference (write)\r\tillegal memory write\r\tNIL procedure call\r\tillegal execution\r\tout of memory\r\tbus error\r\taddress error\r\tfpu error\r\texception\r\rBesides these standard traps, there are custom traps. Each custom trap has a trap number associated with it. The following conventions are used:\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 0
                      lead: 11500
                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 2160000, kind: 0x00000002 }
                      version: 2
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "Free\t0 .. 19\rPreconditions\t20 .. 59\rPostconditions\t60 .. 99\rInvariants\t100 .. 120\rReserved\t121 .. 125\rNot Yet Implemented\t         126\rReserved\t         127\rSilent Trap\t         128\r\rSilent Trap is a special case. It terminates the execution of the current command without generating a trap window.\r\rYou can use trap codes 0..19 freely in your programs, typically as temporary breakpoints during debugging. By convention, the other trap codes are generated by various assertions, i.e., statements which check a certain condition, and terminate the command if the condition is violated. Conditions which must be fulfilled upon entry of a procedure are called "
                    attr: 3
                  - text: preconditions
                    attr: 5
                  - text: ", conditions which must be fulfilled upon exit of a procedure are called "
                    attr: 3
                  - text: postconditions
                    attr: 5
                  - text: ", and conditions which must be fulfilled in between are called "
                    attr: 3
                  - text: invariants
                    attr: 5
                  - text: ". Most procedures in the BlackBox Component Framework check some preconditions. Typically, trap numbers are kept unique inside of a procedure. Thus, if a trap occurs, consult the documentation (or source, if available) of the trapped procedure. There you should get more information about the cause of the trap.\rThe developer may even provide a plain-text description of the trap's cause, by providing suitable resources in the subsystem's string resource file: module name without subsystem prefix, followed by \".\", followed by the procedure name, followed by \".\", followed by the trap number. The following are examples:\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 0
                      lead: 11500
                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 2160000 }
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "Math.Power.23\tPre: x # 1.0  OR  ABS(y) # INF\r\rViews.View.CopyFrom.20\tViews.CopyFrom and Views.CopyFromModelView must not both\r\tbe overwritten\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 0
                      lead: 11500
                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 2160000, kind: 0x00000002 }
                      version: 2
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "If such a resource exists, the corresponding text is shown in the trap display.\r\rIt should be noted that at no time during debugging the normal BlackBox Component Builder environment is left, there is no special \"debugging mode\" or \"debugging environment\"; everything is integrated instead!\r\rExample: "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('Obx/Docu/Trap', 'ObxTrap Docu')"
                      body:
                        - text: ObxTrap  docu
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: "\r\rThe BlackBox debugger is a cross between a \"post-mortem\" debugger and a \"run-time\" debugger. It is invoked after a command has trapped (post-mortem), but it doesn't cause a termination of the BlackBox environment (run-time). Some features, such as the "
                    attr: 3
                  - text: "Info->View State"
                    attr: 5
                  - text: " command, which makes it possible to follow data structures starting from a selected view, are usually associated with run-time debuggers only.\r\rIt is typical for object-oriented programs that their control flows can become extremely convoluted and hard to follow. Thus following a program statement for statement (single step), by message sends, or by procedure calls in practice turns out to be unpractical for debugging large systems. Instead, BlackBox uses a more effective debugging strategy:\r\r"
                    attr: 3
                  - text: "Let errors become manifest as soon as possible.\r"
                    attr: 5
                  - text: "\rInstead of waiting for some error to occur, and then trying to find one's way backward to the cause of the error, it was attempted to flag errors as closely to their cause as possible. This is the only way to truly save debugging time. The language implementation follows the same strategy, by checking index overflows when accessing arrays, by checking "
                    attr: 3
                  - text: NIL
                    attr: 5
                  - text: " accesses when dereferencing a pointer, etc. In addition to these built-in checks, Component Pascal provides the standard procedure "
                    attr: 3
                  - text: ASSERT
                    attr: 5
                  - text: ", which allows to test for an arbitrary condition. If the condition is violated, a trap window is opened. Procedures of the BlackBox Component Framework consequently use assertions e.g. at the beginning of a procedure to check whether its input is valid. This prevents that a procedure with illegal input may perform any damage to the rest of the system.\r\rThis defensive programming strategy has proven itself again and again during the development of BlackBox, and is strongly recommended for serious development work.\r\rSee also module "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('Dev/Docu/Debug', 'Debug Docu')"
                      body:
                        - text: DevDebug
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: ".\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 0
                      lead: 11500
                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000009
                      attr: 3
                      w: 360000000
                      h: 444500
                  - target:
                      name: Distribution
                      body:
                        - text: 6 Deployment
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\rIf you develop add-on components (i.e., new subsystems) for BlackBox, deployment simply means to distribute copies of your subsystem directory. You may not want to distribute the source texts, in order to protect your intellectual property rights. In this case you should not put them into the distribution copies. You may not want to make one or several of your module interfaces public, or none at all if your application is not meant to be extensible. In this case, you should not put the corresponding symbol files into the distribution copies. However, for each public module you should put a documentation file into the subsystem's "
                    attr: 3
                  - text: Docu
                    attr: 5
                  - text: " directory. For example, for module "
                    attr: 3
                  - text: FormCmds
                    attr: 5
                  - text: " there is a docu file "
                    attr: 3
                  - text: Form/Docu/Cmds
                    attr: 5
                  - text: ".\rIt is customary to put a "
                    attr: 3
                  - text: Sys-Map
                    attr: 5
                  - text: " file in the "
                    attr: 3
                  - text: Docu
                    attr: 5
                  - text: " directory. This map text contains a list of all public modules; the elements of the list are hyperlinks.\rIf the subsystem implements user interface elements such as views or commands, a user manual should be made available. This document is called "
                    attr: 3
                  - text: User-Man
                    attr: 5
                  - text: " and also resides in the "
                    attr: 3
                  - text: Docu
                    attr: 5
                  - text: " directory.\rIf the subsystem is meant for use by programmers, and if the individual modules' documentation files are not sufficient, the "
                    attr: 3
                  - text: Docu
                    attr: 5
                  - text: " directory should contain an overview text called "
                    attr: 3
                  - text: Dev-Man
                    attr: 5
                  - text: ".\r\rThe previous paragraph has shown everything you need to do to distribute an add-on component, i.e., an extension in the form of a subystem. On the other hand, if you want to distribute a stand-alone application for some reason, you have three possibilities:\r\r1) This approach is suited for applications where updates and extensions are frequent: you provide the unlinked code files of your application and of BlackBox, together with a minimal linked application to boot the whole software system.\rTo make an unpacked and unlinked stand-alone version you need to copy some files and directories from the "
                    attr: 3
                  - text: BlackBox
                    attr: 5
                  - text: " directory to a new directory. "
                    attr: 3
                  - text: BlackBox.exe
                    attr: 5
                  - text: " may be renamed to the name of your new application.\r\r2) This approach is suitable for applications that are closed or where incremental updates and extensions are relatively rare: you pack the BlackBox directory's contents into one large executable file. In contrast to the linker (see below), the packer is not limited to code files; it can also pack resources and documentation and any other kind of files into the application. In contrast to approach 1), the end user cannot easily destroy the applications just by deleting some code or resource file. See the "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('Dev/Docu/Packer', 'DevPacker docu'"
                      body:
                        - text: packerdocumentation
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: " for details.\r\r3) This approach is most relevant for native applications (i.e., Component Pascal applications which don't use the BlackBox framework) and for linked libraries (DLLs under Windows): you use the linker tool to combine several code files into one application file.\rFor a linked version you need to use the linker to pack your code files together with the BlackBox code files into a single application. See the "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('Dev/Docu/P-S-I', 'Platform-Specific Issues')"
                      body:
                        - text: linker documentation
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: " for details. After linking, you need to copy the new application to a new directory. You also need to copy the "
                    attr: 3
                  - text: Rsrc
                    attr: 5
                  - text: " subdirectories of the "
                    attr: 3
                  - text: Form
                    attr: 5
                  - text: ", "
                    attr: 3
                  - text: Host
                    attr: 5
                  - text: ", "
                    attr: 3
                  - text: Std
                    attr: 5
                  - text: ", "
                    attr: 3
                  - text: System
                    attr: 5
                  - text: ", "
                    attr: 3
                  - text: Text
                    attr: 5
                  - text: ", and of your own subsystems. If the resource files are missing, the application would still operate (kind of), but lose all string mappings, all dialog box layouts, and all custom menus.\r\rAll approaches:\rIn addition, you need to create your own versions of the menu definition file and of the "
                    attr: 3
                  - text: About...
                    attr: 5
                  - text: " dialog box ("
                    attr: 3
                  - text: System/Rsrc/Menus
                    attr: 5
                  - text: " and "
                    attr: 3
                  - text: System/Rsrc/About
                    attr: 5
                  - text: "). If your application is meant to be extensible, you also need to copy the symbol files ("
                    attr: 3
                  - text: Sym/Xyz
                    attr: 5
                  - text: ") of all modules whose interfaces should be public. This may or may not encompass the standard BlackBox modules. Make sure the structure of your new directories matches the subdirectory structure in the original "
                    attr: 3
                  - text: BlackBox
                    attr: 5
                  - text: " directory!\r\rWindows:\rAdapt the "
                    attr: 3
                  - text: Help
                    attr: 5
                  - text: " menu command, and the corresponding help text in an appropriate way.\r\rMac OS:\rEdit the "
                    attr: 3
                  - text: Help
                    attr: 5
                  - text: " text in the "
                    attr: 3
                  - text: System/Rsrc
                    attr: 5
                  - text: " directory in an appropriate way.\r\rTo distribute software electronically over a medium which doesn't support binary distribution, e.g., over e-mail, a "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('Std/Docu/Coder', 'StdCoder Docu')"
                      body:
                        - text: standard ASCII encoder
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: " is available.\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 0
                      lead: 11500
                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000009
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\r"
                    attr: 3
                  - target:
                      name: Cross-Platform
                      body:
                        - text: 7 Cross-Platform issues
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\rIf you use BlackBox both on Mac OS and on Windows, you'll regularly transfer documents between the two platforms. Code files cannot be transferred, since their formats are non-portable. To simplify the transfer of documents, you should configure the available tools (e.g., Apple's "
                    attr: 3
                  - text: PC Exchange
                    attr: 5
                  - text: " software) such that they map the Mac OS file type (\"oODC\") and file creator (\"obnF\") to the Windows file name suffix \".odc\" and vice versa.\r\rFurthermore, you may want to use fonts which are available on both platforms, either TrueType fonts or PostScript fonts if you have Adobe's Type Manager available. If you don't have equivalent fonts on both platforms, you can still read the text, with another font substituted for the correct one. This will likely result in visually unsatisfactory results.\rUse the default font for cross-platform documents, if you have no preference for a specific font. Typically, the default font is used for on-line documentation. The default font automatically adapts to the reader's system configuration, so that he or she can select their preferred font.\r\rLike any other document, a dialog box can be transferred between the two platforms. However, for best results you may want to fine-tune a dialog box layout for the platform's controls before distributing it.\r\rIn order to minimize installation problems, it is recommended to limit module names to at most eight characters (not counting the subsystem prefix, which itself may be up to eight characters), and not to use module names which only differ in their use of small or capital letters.\r"
                    attr: 3
