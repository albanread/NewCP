                  - text: "\r\rThe diamond mark to the right of a procedure opens the source of the module in which this procedure is defined, selects the statement which has been interrupted, and scrolls to this selection. Of course, this is only possible for modules whose source code is available.\r\rBut now let us go back to the stack display. The lines below a procedure's name show the parameters and local variables of the procedure, sorted alphabetically. The following example\r\r\tstr\tDialog.String\t\"String\"\r\rmeans that a local variable "
                    attr: 3
                  - text: "str "
                    attr: 5
                  - text: "of type "
                    attr: 3
