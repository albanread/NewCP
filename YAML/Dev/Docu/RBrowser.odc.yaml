                flow:
                  - text: DevRBrowser
                    attr: 0
                  - text: "\r\rDEFINITION DevRBrowser;\r\r\tPROCEDURE ShowRepository;\r\tPROCEDURE Update;\r\tPROCEDURE OpenFile (path, name: ARRAY OF CHAR);\r\tPROCEDURE ShowFiles (path: ARRAY OF CHAR);\r\rEND DevRBrowser.\r\r\rThis tool module allows to list all subsystems as folds (-> StdFolds). A fold contains links to its subsystem's symbol, code, source, and documentation files. It makes it easier to get an overview over the elements of a large BlackBox application, or over BlackBox itself.\rFor the resources of a subsystem, a "
                    attr: 1
                  - text: Rsrc
                    attr: 2
                  - text: " link is generated. Clicking this link creates a list of all documents in the "
                    attr: 1
                  - text: Rsrc
                    attr: 2
                  - text: " subdirectory.\rFor the documentation files, those which contain one or several dashes (\"-\") in their names are not treated as module documentations, but rather as auxiliary documentation files which are listed at the beginning. In particular, files with name "
                    attr: 1
                  - text: Sys-Map
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: User-Man
                    attr: 2
                  - text: ", and "
                    attr: 1
                  - text: Dev-Man
                    attr: 2
                  - text: " are extracted this way. They are the standard names for a map document which contains hyperlinks to the relevant files of the subsystems; the user manual for the subsystem (user in this context means a programmer); and the programmer's reference.\r\rMenu command:\r\t\"Repository\"\t\"\"\t\"DevRBrowser.ShowRepository\"\t\"\"\r\r\rPROCEDURE "
                    attr: 1
                  - text: ShowRepository
                    attr: 3
                  - text: "\rCreate a report which lists all subsystems.\r\rPROCEDURE "
                    attr: 1
                  - text: Update
                    attr: 3
                  - text: "\rUpdate the report (used as command in the "
                    attr: 1
                  - text: update
                    attr: 2
                  - text: " link that is on top of the generated report).\r\rPROCEDURE "
                    attr: 1
                  - text: OpenFile
                    attr: 3
                  - text: " (path, name: ARRAY OF CHAR)\rUsed internally. Opens the file at location "
                    attr: 1
                  - text: path
                    attr: 2
                  - text: " and with name "
                    attr: 1
                  - text: name
                    attr: 2
                  - text: ".\r\rPROCEDURE "
                    attr: 1
                  - text: ShowFiles
                    attr: 3
                  - text: " (path: ARRAY OF CHAR)\rUsed internally. Lists all resource documents at location "
                    attr: 1
                  - text: path
                    attr: 2
                  - text: ".\r"
                    attr: 1
