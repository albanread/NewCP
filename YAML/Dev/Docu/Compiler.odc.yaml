                flow:
                  - text: DevCompiler
                    attr: 0
                  - text: "\r\rDEFINITION DevCompiler;\r\r\tPROCEDURE Compile;\r\tPROCEDURE CompileAndUnload;\r\tPROCEDURE CompileModuleList;\r\tPROCEDURE CompileSelection;\r\tPROCEDURE CompileThis;\r\t... plus some private commands ...\r\rEND DevCompiler.\r\r\rCommand package for the Component Pascal compiler. The compiler has no compiler options. Safety-critical runtime checks are always performed (type guards, array range checks, etc.), while non-critical runtime checks may not be generated (SHORT, integer overflows, testing of set membership). \"Critical\" means that non-local memory may be destroyed, with unknown global effects.\r\rTypical menu:\r\r"
                    attr: 1
                  - text: MENU
                    attr: 2
                  - text: "\r\t\"&Compile\"\t\"\"\t\"DevCompiler.Compile\"\t\"TextCmds.FocusGuard\"\r\t\"Compile and Unload\"\t\"\"\t\"DevCompiler.CompileAndUnload\"\t\"TextCmds.FocusGuard\"\r\t\"Compile &Selection\"\t\"\"\t\"DevCompiler.CompileSelection\"\t\"TextCmds.SelectionGuard\"\r\t\"Com&pile Module List\"\t\"\"\t\"DevCompiler.CompileModuleList\"\t\"TextCmds.SelectionGuard\"\r"
                    attr: 1
                  - text: END
                    attr: 2
                  - text: "\r\r\rPROCEDURE "
                    attr: 1
                  - text: Compile
                    attr: 2
                  - text: "\rGuard: TextCmds.FocusGuard\rCompile the Component Pascal module whose source is in the focus view.\r\rPROCEDURE "
                    attr: 1
                  - text: CompileAndUnload
                    attr: 2
                  - text: "\rGuard: TextCmds.FocusGuard\rCompile the module whose source is in the focus view. If compilation is successful, it is attempted to unload the old version of this module. "
                    attr: 1
                  - text: CompileAndUnload
                    attr: 3
                  - text: " is convenient when developing top-level modules, i.e., modules which are not imported by any other modules, and thus can be unloaded individually.\r"
                    attr: 1
                  - text: "\r"
                    attr: 2
                  - text: "PROCEDURE "
                    attr: 1
                  - text: CompileModuleList
                    attr: 2
                  - text: "\rGuard: TextCmds.SelectionGuard\rCompile the list of modules whose names are selected. When the first error is detected, the offending source is opened to show the error.\r"
                    attr: 1
                  - text: "\r"
                    attr: 2
                  - text: "PROCEDURE "
                    attr: 1
                  - text: CompileSelection
                    attr: 2
                  - text: "\rGuard: TextCmds.SelectionGuard\rCompile the module, whose beginning is selected.\r\rPROCEDURE "
                    attr: 1
                  - text: CompileThis
                    attr: 2
                  - text: "\rUsed in a text with a "
                    attr: 1
                  - text: DevCommanders.View
                    attr: 3
                  - text: ". This command takes the text following it and interprets it as a list of modules that should be compiled. Similar to "
                    attr: 1
                  - text: CompileModuleList
                    attr: 3
                  - text: " except that no selection is necessary.\r\r... plus some private commands ...\r"
