                  - text: "\r\tCONST\r\t\tresizeHCursor = 16;\t"
                    attr: 2
                  - text: "(* cursors used for window resizing *)"
                    attr: 4
                  - text: "\r\t\tresizeVCursor = 17;\r\t\tresizeLCursor = 18;\r\t\tresizeRCursor = 19;\r\t\tresizeCursor = 20;\r\t\tbusyCursor = 21;\t"
                    attr: 2
                  - text: "(* busy cursor *)"
                    attr: 4
                  - text: "\r\t\tstopCursor = 22;\t"
                    attr: 2
                  - text: "(* drag and drop cursors *)"
                    attr: 4
                  - text: "\r\t\tmoveCursor = 23;\r\t\tcopyCursor = 24;\r\t\tlinkCursor = 25;\r\t\tpickCursor = 26;\t"
                    attr: 2
