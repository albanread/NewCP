                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 0
                  - text: "\rModule "
                    attr: 2
                  - text: SYSTEM
                    attr: 4
                  - text: " contains certain procedures that are necessary to implement low-level operations. It is strongly recommended to restrict the use of these features to specific low-level modules, as such modules are inherently non-portable and usually unsafe. "
                    attr: 2
                  - text: SYSTEM
                    attr: 4
                  - text: " is not considered as part of the language Component Pascal proper.\r\rThe procedures contained in module "
                    attr: 2
                  - text: SYSTEM
                    attr: 4
                  - text: " are listed in the following table. "
                    attr: 2
                  - text: v
                    attr: 4
                  - text: " stands for a variable."
                    attr: 2
                  - text: " x"
                    attr: 4
                  - text: ", "
                    attr: 2
                  - text: y
                    attr: 4
                  - text: ", and "
                    attr: 2
                  - text: n
                    attr: 4
                  - text: " stands for expressions. "
                    attr: 2
                  - text: T
                    attr: 4
                  - text: " stands for a type. "
                    attr: 2
                  - text: P
                    attr: 4
                  - text: " stands for a procedure. "
                    attr: 2
                  - text: "M[a]"
                    attr: 4
                  - text: " stands for memory value at address "
                    attr: 2
                  - text: a
                    attr: 4
                  - text: ".\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 149225
                      dsc: 28575
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 72000 }
                        - { stop: 972000 }
                        - { stop: 2448000 }
                        - { stop: 3384000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\rFunction procedures\r"
                    attr: 2
                  - text: "\tName\tArgument types\tResult type\tDescription\r"
                    attr: 4
                  - text: "\tADR(v)\tany\tINTEGER\taddress of variable v\r\tADR(P)\tP: PROCEDURE\tINTEGER\taddress of Procedure P\r\tADR(T)\tT: a record type\tINTEGER\taddress of Descriptor of T\r\tLSH(x, n)\tx, n: integer type*\ttype of x\tlogical shift (n > 0: left, n < 0: right)\r\tROT(x, n)\tx, n: integer type*\ttype of x\trotation (n > 0: left, n < 0: right)\r\tTYP(v)\trecord type\tINTEGER\ttype tag of record variable v\r\tVAL(T, x)\tT, x: any type\tT\tx interpreted as of type T\r\t* integer types without LONGINT\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 149225
                      dsc: 28575
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 72000 }
                        - { stop: 1512000 }
                        - { stop: 4608000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "Proper procedures\r"
                    attr: 2
                  - text: "\tName\tArgument types\tDescription\r"
                    attr: 4
                  - text: "\tGET(a, v)\ta: INTEGER; v: any basic type,\tv := M[a]\r\t\tpointer type, procedure type\r\tPUT(a, x)\ta: INTEGER; x: any basic type,\tM[a] := x\r\t\tpointer type, procedure type\r\tGETREG(n, v)\tn: integer constant, v: any basic type,\tv := Register n\r\t\tpointer type, procedure type\r\tPUTREG(n, x)\tn: integer constant, x: any basic type,\tRegister n := x\r\t\tpointer type, procedure type\r\tMOVE(a0, a1, n)\ta0, a1: INTEGER; n: integer type\tM[a1..a1+n-1] :=\r\t\t\tM[a0..a0+n-1]\r\rThe register numbers for PUTREG and GETREG are:\r0: EAX, 1: ECX, 2: EDX, 3: EBX, 4: ESP, 5: EBP, 6: ESI, 7: EDI.\r\r"
                    attr: 2
                  - text: Warning
                    attr: 0
                  - text: "\r"
                    attr: 2
                  - text: VAL
                    attr: 4
                  - text: ", "
                    attr: 2
                  - text: PUT
                    attr: 4
                  - text: ", "
                    attr: 2
                  - text: PUTREG
                    attr: 4
                  - text: ", and "
                    attr: 2
                  - text: MOVE
                    attr: 4
                  - text: " may crash BlackBox and/or Windows when not used properly.\rNever use "
                    attr: 2
                  - text: VAL
                    attr: 4
                  - text: " (or "
                    attr: 2
                  - text: PUT
                    attr: 4
                  - text: " or "
                    attr: 2
                  - text: MOVE
                    attr: 4
                  - text: ") to assign a value to a BlackBox pointer. Doing this would corrupt the garbage collector, with fatal consequences.\r\r"
                    attr: 2
                  - text: System Flags
                    attr: 4
                  - text: "\r\rThe import of module "
                    attr: 2
                  - text: SYSTEM
                    attr: 4
                  - text: " allows to override some default behavior of the compiler by the usage of system flags. System flags are used to configure type- and procedure declarations. The extended syntax is given below.\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 149225
                      dsc: 28575
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 1028700 }
                        - { stop: 1208700 }
                        - { stop: 1415700 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\rType \t=\tQualident\r\t\t| ARRAY "
                    attr: 2
                  - text: "[\"[\" SysFlag \"]\"]"
                    attr: 0
                  - text: " [ConstExpr {\",\" ConstExpr}]\r\t\t\tOF Type \r\t\t| RECORD"
                    attr: 2
                  - text: " [\"[\" SysFlag \"]\"]"
                    attr: 0
                  - text: " [\"(\"Qualident\")\"] FieldList\r\t\t\t{\";\" FieldList} END\r\t\t| POINTER "
                    attr: 2
                  - text: "[\"[\" SysFlag \"]\"]"
                    attr: 0
                  - text: " TO Type\r\t\t| PROCEDURE [FormalPars].\rProcDecl\t=\tPROCEDURE"
                    attr: 2
                  - text: " [\"[\" SysFlag \"]\"]"
                    attr: 0
                  - text: " [Receiver] IdentDef\r\t\t\t[FormalPars] \";\"\r\t\tDeclSeq [BEGIN StatementSeq] END ident.\rFPSection\t=\t[VAR "
                    attr: 2
                  - text: "[\"[\" SysFlag \"]\"]"
                    attr: 0
                  - text: "] ident {\",\" ident} \":\" Type.\r"
                    attr: 2
                  - text: "SysFlag\t=\tConstExpr | ident.\r"
                    attr: 0
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 149225
                      dsc: 28575
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 972000 }
                        - { stop: 1728000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\rFor "
                    attr: 2
                  - text: SysFlags
                    attr: 4
                  - text: " either the name of the flag or the corresponding numeric value can be used.\r\rSystem flags for record types\r"
                    attr: 2
                  - text: "Name\tValue\tDescription\r"
                    attr: 4
                  - text: "untagged\t1\tNo type tag and no type descriptor is allocated.\r\t\tThe garbage collector ignores untagged variables.\r"
                    attr: 2
                  - text: "\t\tNEW"
                    attr: 4
                  - text: " is not allowed on pointers to untagged variables.\r\t\tNo type-bound procedures are allowed for the record.\r\t\tPointers to untagged record type or extensions of this\r\t\trecord type inherit the attribute of being untagged.\r\t\tThe offsets of the fields are aligned to\r\t\tMIN(4-byte, size), where size is the size of the field.\r\t\tThe size of the record and the offsets of the fields are\r\t\taligned to 32-bit boundaries.\rnoalign\t3\tSame as "
                    attr: 2
                  - text: "untagged "
                    attr: 4
                  - text: "but without alignment.\ralign2\t4\tSame as "
                    attr: 2
                  - text: "untagged "
                    attr: 4
                  - text: "but with\r\t\tMIN(2-byte, size) alignment. \ralign8\t6\tSame as "
                    attr: 2
                  - text: "untagged "
                    attr: 4
                  - text: "but with\r\t\tMIN(8-byte, size) alignment. \runion\t7\tUntagged record with all fields allocated at offset 0.\r\t\tThe size of the record is equal to the size of the\r\t\tlargest field.\r\t\tUsed to emulate C union types.\r\rSystem flags for array types\r"
                    attr: 2
                  - text: "Name\tValue\tDescription\r"
                    attr: 4
                  - text: "untagged\t1\tNo typetag and no type descriptor is allocated.\r\t\tThe garbage collector ignores untagged variables.\r"
                    attr: 2
                  - text: "\t\tNEW"
                    attr: 4
                  - text: " is not allowed on pointers to untagged variables.\r\t\tPointers to this array type inherit the attribute of\r\t\tbeing untagged.\r\t\tOnly one-dimensional untagged open arrays\r\t\tare allowed.\r\t\tFor open untagged arrays, index bounds are\r\t\tnot checked.\r\rSystem flags for pointer types\r"
                    attr: 2
                  - text: "Name\tValue\tDescription\r"
                    attr: 4
                  - text: "untagged\t1\tNot traced by the garbage collector.\r\t\tNo type-bound procedures are allowed for the pointer.\r\t\tMust point to an untagged record.\r\rSystem flags for "
                    attr: 2
                  - text: VAR
                    attr: 4
                  - text: " parameters\r"
                    attr: 2
                  - text: "Name\tValue\tDescription\r"
                    attr: 4
                  - text: "nil\t1\t"
                    attr: 2
                  - text: NIL
                    attr: 4
                  - text: " is accepted as formal parameter.\r\t\tUsed in interfaces to C\r\t\tfunctions with pointer type parameters.\r\rSystem flags for procedures\r"
                    attr: 2
                  - text: "Name\tValue\tDescription\r"
                    attr: 4
                  - text: "code\t1\tDefinition of a Code procedure (see below).\rccall\t-10\tProcedure uses CCall calling convention.\r\r"
                    attr: 2
                  - text: Code procedures
                    attr: 4
                  - text: "\r\rCode procedures make it possible to use special code sequences not generated by the compiler. They are declared using the following special syntax:\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 149225
                      dsc: 28575
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 648000 }
                        - { stop: 792000 }
                        - { stop: 1080000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\rProcDecl\t=\tPROCEDURE \"[\" SysFlag \"]\" IdentDef [FormalPars]\r\t\t\t[ConstExpr {\",\" ConstExpr}] \";\".\r\rThe list of constants declared with the procedure is interpreted as a byte string and directly inserted in the code (\"in-line\") whenever the procedure is called. If a parameter list is supplied, the actual parameters are pushed on the stack from right to left. The first parameter however is kept in a register. If the type of the first parameter is "
                    attr: 2
                  - text: REAL
                    attr: 4
                  - text: " or "
                    attr: 2
                  - text: SHORTREAL
                    attr: 4
                  - text: ", it is stored in the top floating-point register. Otherwise the parameter (or in the case of a "
                    attr: 2
                  - text: VAR/IN/OUT
                    attr: 4
                  - text: " parameter its address) is loaded into EAX. For function procedures the result is also expected to be either in the top floating-point register or in EAX, depending on its type. Be careful when using registers in code procedures. In general, the registers ECX, EDX, ESI, and EDI may be used. Parameters on the stack must be removed by the procedure.\r\r"
                    attr: 2
                  - text: Examples
                    attr: 4
                  - text: "\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 149225
                      dsc: 28575
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 216000 }
                        - { stop: 432000 }
                        - { stop: 648000 }
                        - { stop: 1800000 }
                        - { stop: 3240000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\r\tPROCEDURE [code] Sqrt (x: REAL): REAL\t\t(* Math.Sqrt *)\r\t\t0D9H, 0FAH;\t\t\t(* FSQRT *)\r\r\tPROCEDURE [code] Erase (adr, words: INTEGER)\t(* erase memory area *)\r\t\t089H, 0C7H,\t\t\t(* MOV EDI, EAX *)\r\t\t031H, 0C0H,\t\t\t(* XOR EAX, EAX *)\r\t\t059H,\t\t\t(* POP ECX *)\r\t\t0F2H, 0ABH;\t\t\t(* REP STOS *)\r\r"
                    attr: 2
                  - text: "\r"
                    attr: 0
                  - target:
                      name: 2
                      body:
                        - text: Using DLLs in BlackBox modules
                          attr: 0
                      attr: 0
                      w: 150300
                      h: 142875
                  - text: "\r\r"
                    attr: 0
                  - text: "Any 32-bit DLL can be imported in Component Pascal like a normal Component Pascal module. This holds for Windows system modules (kernel, user, gdi, ...) as well as for any custom DLL written in any programming language. Be aware that the safety qualities of Component Pascal (no dangling pointers, strict type-checking, etc.) are lost if you interface to a DLL written in another programming language.\r\r"
                    attr: 2
                  - text: Interface modules
                    attr: 4
                  - text: "\r\rType information about objects imported from a DLL must be present in a symbol file for the compiler to work properly. Such special symbol files can be generated through so-called "
                    attr: 2
                  - text: interface modules
                    attr: 4
                  - text: ". An interface module is a Component Pascal module marked by a system flag after the module name. The system flag consists of the name of the corresponding DLL enclosed in square brackets. An interface module can only contain declarations of constants, types, and procedures headings. No code file is generated when an interface module is compiled.\r\r"
                    attr: 2
                  - text: Name aliasing
                    attr: 4
                  - text: "\r\rThe Component Pascal name of an object imported from a DLL can be different from the corresponding name in the export table of the DLL. To achieve this the DLL name is appended to the Component Pascal name as a system flag. In addition, the system flag may specify a different DLL than the one declared in the module header. This allows to use a single interface module for a whole set of related DLLs. It is also possible to have multiple interface modules referring to the same DLL.  Interface procedures cannot have a body, nor an \"END identifier\" part, they are only signatures.\r\rThe extend syntax for interface modules is given below:\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 149225
                      dsc: 28575
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 1028700 }
                        - { stop: 1208700 }
                        - { stop: 1415700 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "Module \t=\tMODULE ident "
                    attr: 2
                  - text: "[\"[\" SysString \"]\"]"
                    attr: 0
                  - text: " \";\"\r\t\t[ImportList] DeclSeq  [BEGIN StatementSeq] END ident \".\".\rProcDecl\t=\tPROCEDURE"
                    attr: 2
                  - text: " "
                    attr: 0
                  - text: "[\"[\" SysFlag \"]\"] [Receiver]\r\t\tIdentDef "
                    attr: 2
                  - text: "[\"[\" [SysString \",\"] SysString \"]\"]"
                    attr: 0
                  - text: " [FormalPars] \";\"\r\t\tDeclSeq "
                    attr: 2
                  - text: "["
                    attr: 0
                  - text: "[BEGIN StatementSeq] END ident"
                    attr: 2
                  - text: "]"
                    attr: 0
                  - text: ".\r"
                    attr: 2
                  - text: "SysString\t=\tstring."
                    attr: 0
                  - text: "\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 149225
                      dsc: 28575
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 216000 }
                        - { stop: 432000 }
                        - { stop: 648000 }
                        - { stop: 1404000 }
                        - { stop: 3240000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\rThere is no aliasing for types and constants, because they are not present in export lists and thus may have arbitrary names.\rThe following example summarizes the aliasing capabilities:\r\rMODULE MyInterface [\"MyDll\"];\r\tPROCEDURE Proc1*;\t\t\t\t(* Proc1 from MyDll *)\r\tPROCEDURE Proc2* [\"BlaBla\"];\t\t\t\t(* BlaBla from MyDll *)\r\tPROCEDURE Proc3* [\"OtherDll\", \"\"];\t\t\t\t(* Proc3 from OtherDll *)\r\tPROCEDURE Proc4* [\"OtherDll\", \"DoIt\"];\t\t\t\t(* DoIt from OtherDll *)\rEND MyInterface.\r\rA SysString for a DLL may not contain an entire path name. It should be just the name of the DLL, without the \".dll\" suffix. The following search strategy is used:\r\r- BlackBox directory\r- Windows\\System directory\r- Windows directory\r\r"
                    attr: 2
                  - text: Data types in interface modules
                    attr: 4
                  - text: "\r\rAlways use untagged records as replacements for C structures, in order to avoid the allocation of a type tag for the garbage collector. The system flag [untagged] marks a type as untagged (no type information is available at run-time) with standard alignment rules for record fields (2-byte fields are aligned to 2-byte boundaries, 4-byte or larger fields to 4-byte boundaries). The system flags [noalign], [align2], and [align8] also identify untagged types but with different alignments for record fields.\rLike all system flags, \"untagged\" can only be used if module "
                    attr: 2
                  - text: SYSTEM
                    attr: 4
                  - text: " is imported.\r\rExample:\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 149225
                      dsc: 28575
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 216000 }
                        - { stop: 432000 }
                        - { stop: 648000 }
                        - { stop: 1800000 }
                        - { stop: 3240000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\tRECORD [noalign]\t"
                    attr: 2
                  - text: "(* untagged, size = 7 bytes *)"
                    attr: 4
                  - text: "\r\t\tc: SHORTCHAR;\t"
                    attr: 2
                  - text: "(* offset 0, size = 1 byte *)"
                    attr: 4
                  - text: "\r\t\tx: INTEGER;\t"
                    attr: 2
                  - text: "(* offset 1 , size = 4 bytes *)"
                    attr: 4
                  - text: "\r\t\ti: SHORTINT\t"
                    attr: 2
                  - text: "(* offset 5, size = 2 bytes *)"
                    attr: 4
                  - text: "\r\tEND\r\r"
                    attr: 2
                  - text: Procedures
                    attr: 4
                  - text: "\r\rComponent Pascal procedure calls conform to the StdCall calling convention (parameters pushed from right to left, removed by called procedure). If the CCall convention (parameters removed by caller) is needed for some DLL procedures, the corresponding procedure declaration in the interface module must be decorated with the [ccall] system flag.\rNo special handling is required for callback procedures.\r\rFor parameters of type "
                    attr: 2
                  - text: POINTER TO T
                    attr: 4
                  - text: " it is often better to use a variable parameter of type "
                    attr: 2
                  - text: T
                    attr: 4
                  - text: " rather than to declare a corresponding pointer type. Declare the "
                    attr: 2
                  - text: VAR
                    attr: 4
                  - text: " parameter with system flag [nil] if "
                    attr: 2
                  - text: NIL
                    attr: 4
                  - text: " must be accepted as legal actual parameter.\r\rExample:\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 149225
                      dsc: 28575
                      grid: 177800
