                    attr: 2
                  - text: Window and device context handles
                    attr: 4
                  - text: "\r\rMany of the functions in the Windows API refer either to a window or to a device context handle. In the Windows BlackBox implementation, both of them are stored in the "
                    attr: 2
                  - text: HostPorts.Port
                    attr: 4
                  - text: " record:\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 149225
                      dsc: 28575
                      grid: 177800
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\r\tTYPE\r\t\tPort = POINTER TO RECORD (Ports.PortDesc)\r\t\t\tdc: WinApi.Handle;\r\t\t\twnd: WinApi.Handle\r\t\tEND;\r\t\rIn the usual case where a frame ("
                    attr: 2
                  - text: Ports.Frame
                    attr: 4
                  - text: " or "
                    attr: 2
                  - text: Views.Frame
                    attr: 4
                  - text: ") is given, the handles can be obtained through one of the following selectors:\r\r\t\tframe.rider(HostPorts.Rider).port.dc\r\t\tor\r\t\tframe.rider(HostPorts.Rider).port.wnd\r\rIf the window handle is null, the port is a printer port.\r\t\t\r"
                    attr: 2
                  - text: Examples
                    attr: 4
                  - text: "\r\r"
                    attr: 0
                  - text: "The following simple DLL definition is a subset of the Windows standard library GDI32:\r\rMODULE GDI [\"GDI32\"];\r\r\tCONST\r\t\tWhiteBrush* = 0; BlackBrush* = 4; NullBrush* = 5;\r\t\tWhitePen* = 6; BlackPen* = 7; NullPen* = 8;\r\t\tPSSolid* = 0; PSDash* = 1; PSDot* = 2;\r\r\tTYPE\r\t\tBool* = INTEGER;\r\t\tHandle* = INTEGER;\r\t\tColorRef* = INTEGER;\r\t\tPoint* = RECORD [untagged] x*, y*: INTEGER END;\r\t\tRect* = RECORD [untagged] left*, top*, right*, bottom*: INTEGER END;\r\r\tPROCEDURE CreatePen* (style, width: INTEGER; color: ColorRef): Handle;\r\tPROCEDURE CreateSolidBrush* (color: ColorRef): Handle;\r\tPROCEDURE GetStockObject* (object: INTEGER): Handle;\r\tPROCEDURE SelectObject* (dc, obj: Handle): Handle;\r\tPROCEDURE DeleteObject* (obj: Handle): Bool;\r\tPROCEDURE Rectangle* (dc: Handle; left, top, right, bottom: INTEGER): Bool;\r\tPROCEDURE SelectClipRgn* (dc, rgn: Handle): INTEGER;\r\tPROCEDURE IntersectClipRect* (dc: Handle; left, top, right, bottom: INTEGER): INTEGER;\r\tPROCEDURE SaveDC* (dc: Handle): INTEGER;\r\tPROCEDURE RestoreDC* (dc: Handle; saved: INTEGER): Bool;\r\rEND GDI.\r\rThe following example is a simplified version of the BlackBox standard "
                    attr: 2
                  - text: DrawRect
                    attr: 4
                  - text: " routines implemented in "
                    attr: 2
                  - text: Ports
                    attr: 4
                  - text: " and "
                    attr: 2
                  - text: HostPorts
                    attr: 4
                  - text: ". It uses the GDI interface presented above.\r\rMODULE Ex;\r\r\tIMPORT Ports, HostPorts, GDI;\r\r\tPROCEDURE DrawRect (f: Ports.Frame; l, t, r, b, s: INTEGER; col: Ports.Color);\r\t\tVAR res, h, rl, rt, rr, rb: INTEGER; p: HostPorts.Port; dc, oldb, oldp: GDI.Handle;\r\tBEGIN\r\t\t"
                    attr: 2
                  - text: "(* change local universal coordinates to window pixel coordinates *)"
                    attr: 4
                  - text: "\r\t\tl := (f.gx + l) DIV f.unit; t := (f.gy + t) DIV f.unit;\r\t\tr := (f.gx + r) DIV f.unit; b := (f.gy + b) DIV f.unit;\r\t\ts := s DIV f.unit;\r\t\t"
                    attr: 2
                  - text: "(* get device context *)\r"
                    attr: 4
                  - text: "\t\tp := f.rider(HostPorts.Rider).port; dc := p.dc;\r\t\t"
                    attr: 2
                  - text: "(* set clip region *)"
                    attr: 4
                  - text: "\r\t\tIF p.wnd = 0 THEN res := GDI.SaveDC(dc)\r\t\tELSE res := GDI.SelectClipRgn(dc, 0)\r\t\tEND;\r\t\tf.rider.GetRect(rl, rt, rr, rb);\r\t\tres := GDI.IntersectClipRect(dc, rl, rt, rr, rb);\r"
                    attr: 2
                  - text: "\t\t(* use black as default color *)\r"
                    attr: 4
                  - text: "\t\tIF col = Ports.defaultColor THEN col := Ports.black END;\r\t\tIF s = 0 THEN s := 1 END;\r\t\tIF (s < 0) OR (r-l < 2*s) OR (b-t < 2*s) THEN\t"
                    attr: 2
                  - text: "(* filled rectangle *)"
                    attr: 4
                  - text: "\r\t\t\tINC(r); INC(b);\r\t\t\toldb := GDI.SelectObject(dc, GDI.CreateSolidBrush(col));\r\t\t\toldp := GDI.SelectObject(dc, GDI.GetStockObject(GDI.NullPen));\r\t\t\tres := GDI.Rectangle(dc, l, t, r, b);\r\t\t\tres := GDI.DeleteObject(GDI.SelectObject(dc, oldb));\r\t\t\tres := GDI.SelectObject(dc, oldp)\r\t\tELSE\t"
                    attr: 2
                  - text: "(* outline rectangle *)"
                    attr: 4
                  - text: "\r\t\t\th := s DIV 2; INC(l, h); INC(t, h); h := (s-1) DIV 2; DEC(r, h); DEC(b, h);\r\t\t\toldb := GDI.SelectObject(dc, GDI.GetStockObject(GDI.NullBrush));\r\t\t\toldp := GDI.SelectObject(dc, GDI.CreatePen(GDI.PSSolid, s, col));\r\t\t\tres := GDI.Rectangle(dc, l, t, r, b);\r\t\t\tres := GDI.SelectObject(dc, oldb);\r\t\t\tres := GDI.DeleteObject(GDI.SelectObject(dc, oldp))\r\t\tEND;\r\t\tIF p.wnd = 0 THEN res := GDI.RestoreDC(dc, -1) END\r\tEND DrawRect;\r\rEND Ex.\r\r"
                    attr: 2
                  - text: "\rRuntime type system"
                    attr: 0
                  - text: "\r\rAll dynamically allocated Component Pascal records contain a hidden field, which is called the type tag. The type tag points to the type descriptor that contains all type information needed at runtime. Calls of type-bound procedures, type tests and the garbage collector all use the information which is stored in the type descriptor. The type descriptor is allocated only once for every record type in the system.\rDynamically allocated arrays use a size descriptor to check the bounds of indexes. The size descriptor also contains the type tag of the element type. For every single dynamic array a size descriptor is needed.\r\r\r"
                    attr: 2
                  - target:
                      name: 4
                      body:
                        - text: Differences between different Windows versions
                          attr: 0
                      attr: 0
                      w: 150300
                      h: 142875
                  - text: "\rTree controls look different on Windows NT compared to other versions of Windows. There is a defect in the routine for drawing the background of a Tree control in Windows NT. Hence, BlackBox does not change the color of the background for a disabled or read only tree control under Windows NT, whereas with other windows versions the background is set to gray when the control is disabled or read only.\r\r\r"
                    attr: 2
                  - text: "The BlackBox linker\r\r"
                    attr: 0
                  - text: "See the "
                    attr: 2
                  - link:
                      target: "StdCmds.OpenBrowser('Dev/Docu/Linker', 'DevLinker')"
                      body:
                        - text: DevLinker
                          attr: 3
                      attr: 2
                      w: 131250
                      h: 142875
                  - text: " documentation.\r\r"
                    attr: 2
                  - target:
                      name: 6
                      body:
                        - text: Linking BlackBox applications
                          attr: 0
                      attr: 0
                      w: 150300
                      h: 142875
                  - text: "\r\rIf you want to distribute an application you have written in BlackBox, you may want to link all modules into a single file for distribution. In this case you need to link the framework to your application. To illustrate the necessary actions we will give an example. First duplicate the BlackBox application in the Explorer and rename it accordingly, in our case \"Patterns\". Adapt the module "
                    attr: 2
                  - text: Config
                    attr: 4
                  - text: " to your needs, e.g., delete the call which automatically opens the Log text. Then link the framework with your modules into the new application file. You may need to distribute some additional files with your application such as forms and the "
                    attr: 2
                  - text: Menu
                    attr: 4
                  - text: " text.\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 149225
                      dsc: 28575
                      grid: 177800
                      opts: 0x00000001
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "MODULE Config;\r\r\tIMPORT Dialog;\r\r\tPROCEDURE Setup*;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tDialog.Call(\"ObxPatterns.Deposit; StdCmds.Open\", \"\", res)\r\tEND Setup;\r\rEND Config.\r\r"
                    attr: 2
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 75
                      bodyPos: 6581
                      bodyLen: 6
                    attr: 2
                    w: 177800
                    h: 152400
                  - text: "DevLinker.Link Patterns.exe :=\rKernel$+ Files HostFiles StdLoader Math Sub Strings Dates Meta Dialog Services\rFonts Ports Stores Converters Sequencers Models Printers Views\rControllers Properties Printing Mechanisms Containers\rDocuments Windows StdCFrames Controls StdDialog StdCmds StdInterpreter\rHostRegistry HostFonts HostPorts OleData HostMechanisms HostWindows \rHostPrinters HostClipboard HostCFrames HostDialog HostCmds\rHostMenus HostPictures TextModels TextRulers TextSetters TextViews\rTextControllers TextMappers StdLog TextCmds\rFormModels FormViews FormControllers FormGen FormCmds\rStdFolds StdLinks StdDebug HostTextConv HostMail\rStdMenuTool StdClocks StdStamps StdLogos StdCoder StdScrollers\rOleStorage OleServer OleClient StdETHConv Init ObxPatterns Config\r1 applogo.Ico 2 doclogo.Ico 3 SFLogo.ico 4 CFLogo.ico 5 DtyLogo.ico\r1 Move.cur 2 Copy.cur 3 Link.cur 4 Pick.cur 5 Stop.cur 6 Hand.cur 7 Table.cur ~\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 149225
                      dsc: 28575
                      grid: 177800
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\r"
                    attr: 2
                  - target:
                      name: 7
                      body:
                        - text: Startup of BlackBox
                          attr: 0
                      attr: 0
                      w: 150300
                      h: 142875
                  - text: "\r\rThe startup of BlackBox happens in several steps.\r\r"
                    attr: 2
                  - text: "Step 1: The operating system starts the application"
                    attr: 4
                  - text: "\r\rBlackBox consists of a small linked application and many unlinked code files (one per module). The linked application consists of at least the BlackBox "
                    attr: 2
                  - text: Kernel
                    attr: 4
                  - text: " module. When the operating system starts up BlackBox, it gives control to the module body of "
                    attr: 2
                  - text: Kernel
                    attr: 4
                  - text: ".\r\r"
                    attr: 2
                  - text: "Step 2: The kernel loads all prelinked modules"
                    attr: 4
                  - text: "\r\rThe kernel initializes its data structures, in particular for memory management and exception handling. Then it executes the module bodies of the other modules which are linked in the application, in the correct order.\rUsually, the module "
                    attr: 2
                  - text: StdLoader
                    attr: 4
                  - text: " is among the prelinked modules, along with several modules that it needs, in particular "
                    attr: 2
                  - text: Files
                    attr: 4
                  - text: " and "
                    attr: 2
                  - text: HostFiles
                    attr: 4
                  - text: ". Module "
                    attr: 2
                  - text: StdLoader
                    attr: 4
                  - text: " implements the linking loader which can dynamically link and load a module's code file. \r\r"
                    attr: 2
                  - text: "Step 3: Init loads the BlackBox library and core framework"
                    attr: 4
                  - text: "\r\rThe standard implementation of module "
                    attr: 2
                  - text: StdLoader
                    attr: 4
                  - text: " performs a call to module "
                    attr: 2
                  - text: Init
                    attr: 4
                  - text: " in its body. If "
                    attr: 2
                  - text: Init
                    attr: 4
                  - text: " isn't linked, this causes the loader to attempt loading the code file "
                    attr: 2
                  - text: System/Code/Init
                    attr: 4
                  - text: ". If loading is possible, the modules imported by "
                    attr: 2
                  - text: Init
                    attr: 4
                  - text: " are loaded and initialized first, and then "
                    attr: 2
                  - text: Init
                    attr: 4
                  - text: " itself is initialized, i.e., its module body is executed.\rThe standard implementation of "
                    attr: 2
                  - text: Init
                    attr: 4
                  - text: " imports all core framework modules and their standard implementations, but not extension subsystems such as the "
                    attr: 2
                  - text: Text
                    attr: 4
                  - text: " or "
                    attr: 2
                  - text: Form
                    attr: 4
                  - text: " subsystem. These modules are loaded before the body of "
                    attr: 2
                  - text: Init
                    attr: 4
                  - text: " performs the following actions:\r\r"
                    attr: 2
                  - text: ꀢ
                    attr: 2
                    wide: true
                  - text: " It tries to call "
                    attr: 2
                  - text: Startup.Setup
                    attr: 4
                  - text: ".\rUsually, module "
                    attr: 2
                  - text: Startup
                    attr: 4
                  - text: " does not exist. It could be used to install some services before the main window is opened and before the text subsystem or other subsystems are loaded.\r\r"
                    attr: 2
                  - text: ꀢ
                    attr: 2
                    wide: true
                  - text: " It tries to load module "
                    attr: 2
                  - text: DevDebug
                    attr: 4
                  - text: ".\r"
                    attr: 2
                  - text: DevDebug
                    attr: 4
                  - text: " is expected to replace the kernel's rudimentary exception handling facilities by a more convenient tool. Note that the standard implementation of "
                    attr: 2
                  - text: DevDebug
                    attr: 4
                  - text: " uses the text subsystem, which thus is loaded also.\rIf loading of "
                    attr: 2
                  - text: DevDebug
                    attr: 4
                  - text: " is not successful, it is attempted to load module "
                    attr: 2
                  - text: StdDebug
                    attr: 4
                  - text: ". This is a reduced version of "
                    attr: 2
                  - text: DevDebug
                    attr: 4
                  - text: " which can be distributed along with an application.\r\r"
                    attr: 2
                  - text: ꀢ
                    attr: 2
                    wide: true
                  - text: " It registers the document file converter (importer/exporter).\rThis enables BlackBox to open and save standard BlackBox documents.\r\r"
                    attr: 2
                  - text: ꀢ
                    attr: 2
                    wide: true
                  - text: " It tries to call "
                    attr: 2
                  - text: StdMenuTool.UpdateAllMenus
                    attr: 4
                  - text: ".\rThis command reads and interprets the "
                    attr: 2
                  - text: System/Rsrc/Menus
                    attr: 4
                  - text: " text, and builds up the  menus accordingly. Note that the standard implementation of "
                    attr: 2
                  - text: StdMenuTool
                    attr: 4
                  - text: " uses the text subsystem.\r\r"
                    attr: 2
                  - text: ꀢ
                    attr: 2
                    wide: true
                  - text: " It tries to call "
                    attr: 2
                  - text: Config.Setup
                    attr: 4
                  - text: ".\rThis is the usual way to configure BlackBox. The standard implementation of "
                    attr: 2
                  - text: Config.Setup
                    attr: 4
                  - text: "  installs the standard file and OLE converters and opens the log text.\r\r"
                    attr: 2
                  - text: ꀢ
                    attr: 2
                    wide: true
                  - text: " It calls the main event loop ("
                    attr: 2
                  - text: HostMenus.Run
                    attr: 4
                  - text: ").\rAfter the event loop is left (because the user wants to quit the application), the kernel is called to clean up, before the application is left entirely.\r\r"
                    attr: 2
                  - text: "\rUsing NEW and garbage collection in your applications"
                    attr: 0
                  - text: "\r\rIf you are calling "
                    attr: 2
                  - text: NEW
                    attr: 4
                  - text: " in your application and thereby implicitly use the garbage collector, you must link the "
                    attr: 2
                  - text: Kernel
                    attr: 4
                  - text: " into the application. The "
                    attr: 2
                  - text: NEW
                    attr: 4
                  - text: "-procedure is implemented in the kernel, the compiler just generates the code to call this procedure. So every module using "
                    attr: 2
                  - text: NEW
                    attr: 4
                  - text: " has a hidden import of the kernel.\rDon't call "
                    attr: 2
                  - text: WinApi.ExitProcess
                    attr: 4
                  - text: " directly when \"importing\" the kernel, call "
                    attr: 2
                  - text: Kernel.Quit
                    attr: 4
                  - text: " with parameter 0 instead to assure that occupied system resources get properly released before the application is terminated.\r\rPrograms don't need to call the garbage collector explicitly. If the "
                    attr: 2
                  - text: NEW
                    attr: 4
                  - text: "-procedure cannot satisfy a request for heap space, it calls the garbage collector internally before allocating a new heap block from the Windows Memory Manager. The garbage collector marks pointers in stack frames and is able to run anytime.\r\rThe garbage collector reclaims all heap objects (dynamic record or array variables) that are not used anymore. \"Unused\" means that the object isn't directly reachable from some \"root\" pointer, or indirectly via a pointer chain starting from a root pointer. Any global variable which contains a pointer is such a root. If a root pointer isn't "
                    attr: 2
                  - text: NIL
                    attr: 4
                  - text: ", then it \"anchors\" a data structure. A heap object that isn't anchored anymore will eventually be collected by the garbage collector.\r\rTo allow the collector to follow pointer chains, there must be some information about the heap objects that are being traversed. In particular, it must be known where there are pointers in the object, if any. All objects of the same type share a common type descriptor, which is created when its defining module is loaded.\rAll dynamically allocated Component Pascal records contain a hidden field, which is called the type tag. The type tag points to the type descriptor that contains all type information needed at run-time. Method calls, type tests and the garbage collector all use the information which is stored in the type descriptor. The type descriptor is allocated only once for every record type in the system.\rDynamically allocated arrays use a size descriptor to check the bounds of indexes. The size descriptor also contains the type tag of the element type. For every single dynamic array a size descriptor is needed.\r\rThe additional storage required to \"tag\" objects makes their memory layout different from untagged records provided by the operating system or some procedural shared library. Type tags are critical; they must not be damaged, otherwise the garbage collector will crash the system at some point in time.\r"
                    attr: 2
