                    attr: 2
                  - text: Correspondence between Component Pascal and C data types
                    attr: 4
                  - text: "\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 149225
                      dsc: 28575
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 1800000 }
                        - { stop: 3600000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\runsigned char\t= SHORTCHAR\t(1 byte)\rWCHAR\t= CHAR\t(2 bytes)\rsigned char\t= BYTE\t(1 byte)\rshort\t= SHORTINT\t(2 bytes)\rint\t= INTEGER\t(4 bytes)\rlong\t= INTEGER\t(4 bytes)\rLARGE_INTEGER\t= LONGINT\t(8 bytes)\rfloat\t= SHORTREAL\t(4 bytes)\rdouble\t= REAL\t(8 bytes)\r\rNote that Bool is not a data type in C but is defined as int (= "
                    attr: 2
                  - text: INTEGER
                    attr: 4
                  - text: "). 0 and 1 must be used for assignments of "
                    attr: 2
                  - text: "FALSE"
                    attr: 4
                  - text: " and "
                    attr: 2
                  - text: "TRUE"
                    attr: 4
                  - text: " and comparisons with 0 have to be used in conditional statements ("
                    attr: 2
                  - text: "IF b # 0 THEN ... END"
                    attr: 4
                  - text: " instead of "
                    attr: 2
                  - text: IF b THEN ... END
                    attr: 4
                  - text: ").\r\rNote that it is not possible to unload a DLL from within BlackBox. To avoid having to exit and restart your development environment repeatedly, it is a good idea to test the DLL that you are developing from within another instance of the BlackBox application.\r\r\r"
                    attr: 2
                  - target:
                      name: Using COM
                      body:
                        - text: Using COM without special Direct-To-COM compiler
                          attr: 0
                      attr: 0
                      w: 150300
                      h: 142875
                  - text: "\r\rMicrosoft's Component Object Model (COM) is supported by a special Component Pascal compiler that is available as an add-on product to BlackBox. This compiler makes using COM safer and more convenient. However, for casual use of COM, the approach described in this chapter can be used. It doesn't require a special compiler version. It uses normal untagged records and procedure variables to create COM-style method tables (\"vtbl\") for objects. The following example shows how it works:\r\rMODULE Ddraw [\"DDRAW.DLL\"];\r\rTYPE\r  GUID = ARRAY 4 OF INTEGER;\r\r  PtrIUnknown = POINTER TO RECORD [untagged]\r    vtbl: POINTER TO RECORD [untagged]\r      QueryInterface: PROCEDURE (this: PtrIUnknown; IN iid: GUID; OUT obj: PtrIUnknown): INTEGER;\r      AddRef: PROCEDURE (this: PtrIUnknown): INTEGER;\r      Release: PROCEDURE (this: PtrIUnknown): INTEGER;\r    END\r  END;\r\r  PtrDirectDraw = POINTER TO RECORD [untagged]\r    vtbl: POINTER TO RECORD [untagged]\r      QueryInterface: PROCEDURE (this: PtrDirectDraw; IN iid: GUID; OUT obj: PtrIUnknown): INTEGER;\r      AddRef: PROCEDURE (this: PtrDirectDraw): INTEGER;\r      Release: PROCEDURE (this: PtrDirectDraw): INTEGER;\r      Compact: PROCEDURE (this: PtrDirectDraw): INTEGER;\r      ...\r      SetCooperativeLevel: PROCEDURE (this: PtrDirectDraw; w, x: INTEGER): INTEGER;\r      ...\r    END\r  END;\r\rPROCEDURE DirectDrawCreate* (IN guid: GUID; OUT PDD: PtrDirectDraw; outer: PtrIUnknown) : INTEGER;\r\rEND Ddraw.\r\r\rMODULE Directone;\r\rIMPORT Out, Ddraw, SYSTEM;\r\rCONST\r  DDSCL_EXCLUSIVE = 00000010H;\r  DDSCL_FULLSCREEN = 00000001H;\r\rPROCEDURE Initialize;\rVAR \r  Handle, Addr, Res: INTEGER;\r  PDD: Ddraw.PtrDirectDraw;\r  nul: Ddraw.GUID;\rBEGIN\r  PDD := NIL;\r  nul[0] := 0; nul[1] := 0; nul[2] := 0; nul[3] := 0;\r  Res := Ddraw.DirectDrawCreate(nul, PDD, NIL);\r  Out.String(\"Res\");  Out.Int(Res, 8);  Out.Ln();\r  Res := SYSTEM.VAL(INTEGER, PDD);\r  Out.String(\"Res\");  Out.Int(Res, 8);  Out.Ln();\r  Res := PDD.vtbl.SetCooperativeLevel(PDD, 0, DDSCL_EXCLUSIVE + DDSCL_FULLSCREEN);\r  Out.String(\"Res\");  Out.Int(Res, 8);  Out.Ln();\r  Res := PDD.vtbl.Release(PDD)\rEND Initialize;\r\rBEGIN\r  Initialize\rEND Directone.\r\r\rSome important points:\r"
                    attr: 2
                  - text: ꀢ
                    attr: 2
                    wide: true
                  - text: " COM GUIDs are 128 bit entities, not integers.\r"
                    attr: 2
                  - text: ꀢ
                    attr: 2
                    wide: true
                  - text: " DO NOT use ANYPTR or other BlackBox pointers for COM interface pointers. (BlackBox pointers are garbage collected, COM pointers are referenece counted.)\r"
                    attr: 2
                  - text: ꀢ
                    attr: 2
                    wide: true
                  - text: " Use pointers to [untagged] records or integers instead.\r\rBe careful to declare all methods in the method table in the correct order with the correct parameter list.\r\r"
                    attr: 2
                  - text: "\rWindows programming interfaces\r\r"
                    attr: 0
                  - text: "See the "
