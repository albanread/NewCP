                    attr: 4
                  - text: "\r\t\t\r"
                    attr: 2
                  - text: Windows-specific mouse and keyboard modifiers
                    attr: 4
                  - text: "\r\rModifier sets are used in "
                    attr: 2
                  - text: "Controllers.TrackMsg, Controllers.EditMsg, "
                    attr: 4
                  - text: and
                    attr: 2
                  - text: " Ports.Frame.Input. "
                    attr: 4
                  - text: "In addition to the platform independant modifiers "
                    attr: 2
                  - text: Controllers.doubleClick
                    attr: 4
                  - text: ", "
                    attr: 2
                  - text: Controllers.extend
                    attr: 4
                  - text: ", and "
                    attr: 2
                  - text: Controllers.modify
                    attr: 4
                  - text: " they contain platform-specific modifiers defined in "
                    attr: 2
                  - text: HostPorts
                    attr: 4
                  - text: ":\r\r\tCONST\r\t\tleft = 16;\t"
                    attr: 2
