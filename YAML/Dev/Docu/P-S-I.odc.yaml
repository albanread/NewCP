                  - text: Windows -specific cursors
                    attr: 4
                  - text: "\r\rThe module "
                    attr: 2
                  - text: HostPorts
                    attr: 4
                  - text: " exports constants for Windows-specific cursors which can be used like the standard cursors defined in module "
                    attr: 2
                  - text: Ports
                    attr: 4
                  - text: ":\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 149225
                      dsc: 28575
