                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\rDEFINITION DevComInterfaceGen;\r\r\tIMPORT Dialog;\r\r\tVAR\r\t\tdialog: RECORD \r\t\t\tlibrary: Dialog.List;\r\t\t\tfileName: ARRAY 256 OF CHAR;\r\t\t\tmodName: ARRAY 64 OF CHAR\r\t\tEND;\r\r\tPROCEDURE Browse;\r\tPROCEDURE GenAutomationInterface;\r\tPROCEDURE InitDialog;\r\tPROCEDURE ListBoxNotifier (op, from, to: INTEGER);\r\tPROCEDURE TextFieldNotifier (op, from, to: INTEGER);\r"
                    attr: 2
                  - text: "\t... plus some private items ..."
                    attr: 3
                  - text: "\t\r\rEND DevComInterfaceGen.\r\r\rModule "
                    attr: 2
                  - text: DevComInterfaceGen
                    attr: 4
                  - text: " provides services to automatically generate COM interface modules. Interface modules are used by BlackBox to access COM components in several different ways.\r\rOne of them is Automation. Any application (server) supporting Automation can be controlled from within another application (controller). The interface of a server application, i.e., the objects provided by the application and the operations on these objects, are described in a COM type library. In order to write a controller in BlackBox, an interface module is used which contains a Component Pascal object for each COM object in the type library. These objects can be accessed like other Component Pascal objects in a convenient and typesafe way. They hide the details of the Automation standard. The "
                    attr: 2
                  - text: Ctl
                    attr: 4
                  - text: " subsystem includes several such Automation interface modules. (Basically for MS Office Automation servers.)\r\rModule "
                    attr: 2
                  - text: DevComInterfaceGen
                    attr: 4
                  - text: " provides services to automatically generate Automation interfaces from the corresponding type libraries. In certain situations, however, the automatically generated interface module does not compile without errors. Here some minimal manual work is required. So far we have encountered three kinds of difficulties that may occur:\r\r1. Formal parameter name is equal to parameter type name. Solution: Change the formal parameter name in the parameter list and procedure body.\r\r2. Formal parameter name is equal to return type name. Solution: Change the formal parameter name in the parameter list and procedure body.\r\r3. Constant name is equal to some type name. Solution: Change constant name.\r\r\rA possible menu using commands from this module:\r\r"
                    attr: 2
                  - text: MENU
                    attr: 5
                  - text: " \"Automation\"\r\t\"Generate Automation Interface\"\t\"\"\t\"DevComInterfaceGen.InitDialog; StdCmds.OpenToolDialog('Dev/Rsrc/ComInterfaceGen', 'Generate Automation Interface')\"\t\"\"\r"
                    attr: 2
                  - text: "END\r\r\r"
                    attr: 5
                  - text: "VAR "
                    attr: 2
                  - text: dialog
                    attr: 5
                  - text: ": RECORD\rThe interactor for the "
                    attr: 2
                  - text: Generate Automation Interface
                    attr: 4
                  - text: " dialog.\r\r"
                    attr: 2
                  - text: library
                    attr: 5
                  - text: ": Dialog.List\rA list representing all type library entries that are registered in the system's registration database.\r\r"
                    attr: 2
                  - text: fileName
                    attr: 5
                  - text: ": ARRAY 256 OF CHAR\rComplete path name of the type library.\r\r"
                    attr: 2
                  - text: modName
                    attr: 5
                  - text: ": ARRAY 64 OF CHAR\rModule name of the Automation interface module to be generated from the corresponding type library.\r\r\rPROCEDURE "
                    attr: 2
                  - text: Browse
                    attr: 5
                  - text: "\rOpen a standard open file dialog box, to let the user choose a type library or DLL file.\r\rPROCEDURE "
                    attr: 2
                  - text: GenAutomationInterface
                    attr: 5
                  - text: "\rGenerate the interface module according to the parameters in "
                    attr: 2
                  - text: dialog
                    attr: 4
                  - text: ".\r\rPROCEDURE "
                    attr: 2
                  - text: InitDialog
                    attr: 5
                  - text: "\rCall this command before opening the "
                    attr: 2
                  - text: Generate Automation Interface
                    attr: 4
                  - text: " dialog. It initializes the "
                    attr: 2
                  - text: dialog
                    attr: 4
                  - text: " interactor.\r\rPROCEDURE "
                    attr: 2
                  - text: ListBoxNotifier
                    attr: 5
                  - text: " (op, from, to: INTEGER)\rPROCEDURE "
                    attr: 2
                  - text: TextFieldNotifier
                    attr: 5
                  - text: " (op, from, to: INTEGER)\rNotifiers used by the "
                    attr: 2
                  - text: Generate Automation Interface
                    attr: 4
                  - text: " dialog.\r"
                    attr: 2
