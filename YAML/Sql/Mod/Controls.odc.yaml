                  - text: "-: Directory;\r\r\r\t"
                    attr: 0
                  - text: "(* auxiliary procedures *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE CallGuard (c: Control; VAR disabled: BOOLEAN; VAR string: ARRAY OF CHAR);\r\t\tVAR ok: BOOLEAN; dpar: Dialog.Par; v: GuardProcVal; i: Meta.Item;\r\tBEGIN\r\t\tdpar.disabled := FALSE; dpar.undef := FALSE; dpar.readOnly := FALSE;\r\t\tdpar.checked := FALSE; dpar.label := \"\";\r\t\tMeta.LookupPath(c.prop.guard, i);\r\t\tIF (i.obj = Meta.procObj) OR (i.obj = Meta.varObj) & (i.typ = Meta.procTyp) THEN\r\t\t\ti.GetVal(v, ok);\r\t\t\tIF ok THEN v.p(dpar) END\r\t\tEND;\r\t\tdisabled := dpar.disabled; string := dpar.label$\r\tEND CallGuard;\r\r\tPROCEDURE CallLink (c: Navigator; pos: INTEGER; VAR newPos, count: INTEGER);\r\t\tVAR ok: BOOLEAN; v: NavProcVal;\r\tBEGIN\r\t\tnewPos := nil; count := nil; ok := FALSE;\r\t\tIF (c.item.obj = Meta.procObj) OR (c.item.obj = Meta.varObj) & (c.item.typ = Meta.procTyp) THEN\r\t\t\tc.item.GetVal(v, ok);\r\t\t\tIF ok THEN v.p(pos, newPos, count) END\r\t\tEND;\r\t\tIF ~ok & (pos # nil) & (c.prop.label # \"\") THEN\r\t\t\tDialog.ShowParamMsg(\"#Sql:HasWrongType\", c.prop.link, \"\", \"\")\r\t\tEND\r\tEND CallLink;\r\r\tPROCEDURE CallNotifier (c: Anchor);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF c.prop.notifier # \"\" THEN\r\t\t\tDialog.Call(c.prop.notifier, \" \", res)\r\t\tEND\r\tEND CallNotifier;\r\r\tPROCEDURE CallTableNotifier (t: Table; row, column: INTEGER; modifiers: SET );\r\t\tVAR item: Meta.Item; nv: NotifierValue; ok: BOOLEAN;\r\tBEGIN\r\t\tIF t.prop.notifier # \"\" THEN\r\t\t\tMeta.LookupPath(t.prop.notifier, item);\r\t\t\tIF item.Valid() THEN\r\t\t\t\titem.GetVal(nv, ok);\r\t\t\t\tIF ok THEN\r\t\t\t\t\tnv.p(t.table, row, column, modifiers)\r\t\t\t\tELSE\r\t\t\t\t\tDialog.ShowParamMsg(\"#Sql:HasWrongType\", t.prop.notifier, \"\", \"\")\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tDialog.ShowParamMsg(\"#Sql:NotFound\", t.prop.notifier, \"\", \"\")\r\t\t\tEND\r\t\tEND\r\tEND CallTableNotifier;\r\r\tPROCEDURE OpenLink (c: Control; p: Controls.Prop);\r\t\tVAR mod, type: Meta.Name; tv: TableValue; ok: BOOLEAN;\r\tBEGIN\r\t\tc.prop := Properties.CopyOf(p)(Controls.Prop);\r\t\tIF c.prop.link # \"\" THEN\r\t\t\tMeta.LookupPath(c.prop.link, c.item);\r\t\t\tIF c.item.Valid() & (c.item.obj = Meta.varObj) THEN\r\t\t\t\tWITH c: Anchor DO\r\t\t\t\t\tIF c.item.typ # Meta.ptrTyp THEN\r\t\t\t\t\t\tDialog.ShowParamMsg(\"#Sql:HasWrongType\", c.prop.link, \"\", \"\")\r\t\t\t\t\tEND\r\t\t\t\t| c: Table DO\r\t\t\t\t\tc.item.GetTypeName(mod, type); \r\t\t\t\t\tIF (mod = \"SqlDB\") & (type = \"Table\") THEN\r\t\t\t\t\t\tc.item.GetVal(tv, ok); ASSERT(ok, 100);\r\t\t\t\t\t\tc.table := tv.ptr\r\t\t\t\t\tELSE\r\t\t\t\t\t\tDialog.ShowParamMsg(\"#Sql:HasWrongType\", c.prop.link, \"\", \"\")\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tDialog.ShowParamMsg(\"#Sql:NotFound\", c.prop.link, \"\", \"\")\r\t\t\tEND\r\t\tEND\r\tEND OpenLink;\r\t\r\t\r\tPROCEDURE SetupTable (t: Table);\r\t\tVAR asc, dsc, w: INTEGER;\r\tBEGIN\r\t\tt.fldFont := Fonts.dir.This(t.sprop.typeface, t.sprop.size, t.sprop.style.val, Fonts.normal);\r\t\tt.titFont := Fonts.dir.This(t.sprop.typeface, t.sprop.size, t.sprop.style.val, Fonts.bold);\r\t\tt.rowH := 3 * t.sprop.size DIV 2;\r\t\tt.fldFont.GetBounds(asc, dsc, w);\r\t\tt.baseOff := (t.rowH -asc - dsc) DIV 2 + asc;\r\tEND SetupTable;\r\r\r\t"
                    attr: 0
