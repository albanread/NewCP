                  - text: "(** navigator pseudo position **)"
                    attr: 1
                  - text: "\r\t\tminVersion = 0; maxBaseVersion = 1;\r\t\tanchVersion = 0; navVersion = 0; tabVersion = 0;\r\t\tw = 24;\r\t\tdefColW = 30 * Ports.mm;\r\t\tleft = -1; right = -2; center = -3;\t"
