                    attr: 1
                  - text: "\r\t\t\tselected: BOOLEAN\r\t\tEND;\r\t\t\r\t\tStdDirectory = POINTER TO RECORD (Directory) END;\r\r\t\tSelMsg = RECORD (Views.Message)\r\t\t\tshow: BOOLEAN\r\t\tEND;\r\t\t\r\t\tOp = POINTER TO RECORD (Stores.Operation)\r\t\t\tctrl: Control;\r\t\t\tprop: Controls.Prop;\r\t\t\tsprop: Properties.StdProp\r\t\tEND;\r\t\t\r\t\tFormatOp = POINTER TO RECORD (Stores.Operation)\r\t\t\ttab: Table;\r\t\t\tcol, width, mode: INTEGER;\r\t\tEND;\r\r\t\tCloseNotifier = POINTER TO RECORD (Sequencers.Notifier)\r\t\t\tcontrol: Anchor\r\t\tEND;\r\r\t\tTableValue = RECORD (Meta.Value)\r\t\t\tptr: SqlDB.Table\r\t\tEND;\r\t\t\r\t\tTableNotifier = PROCEDURE (t: SqlDB.Table; row, column: INTEGER; modifiers: SET);\r\t\t\r\t\tNotifierValue = RECORD (Meta.Value)\r\t\t\tp: TableNotifier\r\t\tEND;\r\r\t\tNavProc = PROCEDURE (pos: INTEGER; VAR resPos, count: INTEGER);\r\t\tGuardProcVal = RECORD (Meta.Value) p*: Dialog.GuardProc END;\r\t\tNavProcVal = RECORD (Meta.Value) p*: NavProc END;\r\r\r\tVAR "
                    attr: 0
