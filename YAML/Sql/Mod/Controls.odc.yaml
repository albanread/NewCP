                  - text: "* (tab: SqlDB.Table): Views.View, NEW, ABSTRACT;\r\t\r\t\r\t"
                    attr: 0
                  - text: "(* Control *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (c: Control) Internalize (VAR rd: Stores.Reader), EXTENSIBLE;\r\t\tVAR thisVersion: INTEGER; x: BOOLEAN;\r\tBEGIN\r\t\tc.Internalize^(rd);\r\t\tIF rd.cancelled THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\trd.ReadVersion(minVersion, maxBaseVersion, thisVersion);\r\t\tIF rd.cancelled THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\tNEW(c.prop);\r\t\tIF thisVersion >= 1 THEN\r\t\t\trd.ReadString(c.prop.link);\r\t\t\trd.ReadString(c.prop.label);\r\t\t\trd.ReadString(c.prop.guard);\r\t\t\trd.ReadString(c.prop.notifier);\r\t\tELSE "
                    attr: 0
                  - text: "(* thisVersion = 0 *)"
                    attr: 1
                  - text: "\r\t\t\trd.ReadXString(c.prop.link);\r\t\t\trd.ReadXString(c.prop.label);\r\t\t\trd.ReadXString(c.prop.guard);\r\t\t\trd.ReadXString(c.prop.notifier);\r\t\tEND ;\r\t\trd.ReadBool(c.prop.opt[Controls.sorted]);\r\t\trd.ReadBool(c.prop.opt[Controls.default]); \r\t\trd.ReadBool(c.prop.opt[Controls.cancel]);\r\t\trd.ReadXInt(c.prop.level);\r\t\trd.ReadBool(x);\r\t\tOpenLink(c, c.prop)\r\tEND Internalize;\r\r\tPROCEDURE (c: Control) Externalize (VAR wr: Stores.Writer), EXTENSIBLE;\r\tBEGIN\r\t\tc.Externalize^(wr);\r\t\twr.WriteVersion(maxBaseVersion);\r\t\twr.WriteString(c.prop.link);\r\t\twr.WriteString(c.prop.label);\r\t\twr.WriteString(c.prop.guard);\r\t\twr.WriteString(c.prop.notifier);\r\t\twr.WriteBool(c.prop.opt[Controls.sorted]);\r\t\twr.WriteBool(c.prop.opt[Controls.default]);\r\t\twr.WriteBool(c.prop.opt[Controls.cancel]);\r\t\twr.WriteXInt(c.prop.level);\r\t\twr.WriteBool(FALSE)\r\tEND Externalize;\r\r\tPROCEDURE (c: Control) CopyFromSimpleView (source: Views.View), EXTENSIBLE;\r\tBEGIN\r\t\t(* c.CopyFrom^(source); *)\r\t\tWITH source: Control DO\r\t\t\tNEW(c.prop); c.prop^ := source.prop^;\r\t\t\tc.item := source.item\r\t\tEND\r\tEND CopyFromSimpleView;\r\r\r\t"
                    attr: 0
                  - text: "(* Op *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (op: Op) Do;\r\t\tVAR c: Control; prop: Controls.Prop; sprop: Properties.StdProp;\r\tBEGIN\r\t\tc := op.ctrl; \r\t\tIF op.prop # NIL THEN\r\t\t\tNEW(prop);\r\t\t\tprop^ := c.prop^; prop.valid := op.prop.valid;\r\t\t\tIF Controls.link IN op.prop.valid THEN c.prop.link := op.prop.link END;\r\t\t\tIF Controls.label IN op.prop.valid THEN c.prop.label := op.prop.label END;\r\t\t\tIF Controls.guard IN op.prop.valid THEN c.prop.guard := op.prop.guard END;\r\t\t\tIF Controls.notifier IN op.prop.valid THEN c.prop.notifier := op.prop.notifier END;\r\t\t\tIF Controls.default IN op.prop.valid THEN c.prop.opt[Controls.default] := op.prop.opt[Controls.default] END;\r\t\t\tIF Controls.cancel IN op.prop.valid THEN c.prop.opt[Controls.cancel] := op.prop.opt[Controls.cancel] END;\r\t\t\tIF Controls.level IN op.prop.valid THEN c.prop.level := op.prop.level END;\r\t\t\tIF Controls.sorted IN op.prop.valid THEN c.prop.opt[Controls.sorted] := op.prop.opt[Controls.sorted] END;\r\t\t\tIF c.prop.link # prop.link THEN OpenLink(c, c.prop) END;\r\t\t\top.prop := prop\r\t\tEND;\r\t\tWITH c: Table DO\r\t\t\tIF op.sprop # NIL THEN\r\t\t\t\tNEW(sprop);\r\t\t\t\tsprop^ := c.sprop^; sprop.valid := op.sprop.valid;\r\t\t\t\tIF Properties.typeface IN op.sprop.valid THEN c.sprop.typeface := op.sprop.typeface END;\r\t\t\t\tIF Properties.size IN op.sprop.valid THEN c.sprop.size := op.sprop.size END;\r\t\t\t\tIF Properties.style IN op.sprop.valid THEN c.sprop.style := op.sprop.style END;\r\t\t\t\tIF Properties.weight IN op.sprop.valid THEN c.sprop.weight := op.sprop.weight END;\r\t\t\t\tIF sprop.valid # {} THEN SetupTable(c) END;\r\t\t\t\top.sprop := sprop\r\t\t\tEND\r\t\tELSE\r\t\tEND;\r\t\tViews.Update(c, Views.rebuildFrames);\r\tEND Do;\r\t\r\tPROCEDURE FillArray(VAR a: ARRAY OF INTEGER; start, len, val: INTEGER);\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t \tFOR i := start TO start + len - 1 DO a[i] := val END\r\tEND FillArray;\r\t\r\tPROCEDURE CopyArray(VAR from, to: ARRAY OF INTEGER);\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t \tFOR i := 0 TO LEN(from) - 1 DO to[i] := from[i] END\r\tEND CopyArray;\r\t\r\tPROCEDURE Expand(t: Table; nofCols: INTEGER);\r\t\tVAR len: INTEGER; width, mode: POINTER TO ARRAY OF INTEGER;\r\tBEGIN\r\t\tlen := LEN(t.width);\r\t\tNEW(width, nofCols); CopyArray(t.width, width); FillArray(width, len, nofCols - len, defColW);\r\t\tNEW(mode, nofCols); CopyArray(t.mode, mode); FillArray(mode, len, nofCols - len, center);\r\t\tt.width := width; t.mode := mode\r\tEND Expand;\r\t\r\t"
                    attr: 0
                  - text: "(* FormatOp *)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE (op: FormatOp) Do;\r\t\tVAR t: Table; c, w, m: INTEGER;\r\tBEGIN\r\t\tt := op.tab; c := op.col; w := op.width; m := op.mode;\r\t\tIF c >= LEN(t.width) THEN Expand(t, c + 10) END;\r\t\top.width := t.width[c]; op.mode := t.mode[c];\r\t\tt.width[c] := w; t.mode[c] := m;\r\t\tIF c >= t.columns THEN t.columns := c + 1 END;\r\t\tViews.Update(t, Views.keepFrames);\r\tEND Do;\r\t\r\t\r\t"
                    attr: 0
                  - text: "(* properties *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE PollProp (c: Control; VAR list: Properties.Property);\r\t\tVAR p: Controls.Prop; sp: Properties.StdProp;\r\tBEGIN\r\t\tNEW(p); p^ := c.prop;\r\t\tWITH c: Anchor DO\r\t\t\tp.valid := {Controls.link, Controls.label, Controls.guard, Controls.notifier}\r\t\t| c: Navigator DO\r\t\t\tp.valid := {Controls.link}\r\t\t| c: Table DO\r\t\t\tp.valid := {Controls.link, Controls.notifier};\r\t\t\tNEW(sp); sp^ := c.sprop^;\r\t\t\tsp.valid := {Properties.typeface, Properties.size, Properties.style, Properties.weight};\r\t\t\tsp.known := sp.valid; sp.readOnly := {Properties.weight};\r\t\t\tProperties.Insert(list, sp)\r\t\tELSE\r\t\tEND;\r\t\tp.known := p.valid;\r\t\tProperties.Insert(list, p)\r\tEND PollProp;\r\r\tPROCEDURE SetProp (c: Control; p: Properties.Property);\r\t\tVAR op: Op; valid: SET;\r\tBEGIN\r\t\top := NIL;\r\t\tWHILE p # NIL DO\r\t\t\tWITH p: Controls.Prop DO\r\t\t\t\tWITH c: Anchor DO\r\t\t\t\t\tvalid := {Controls.link, Controls.label, Controls.guard, Controls.notifier}\r\t\t\t\t| c: Navigator DO\r\t\t\t\t\tvalid := {Controls.link}\r\t\t\t\t| c: Table DO\r\t\t\t\t\tvalid := {Controls.link, Controls.notifier}\r\t\t\t\tELSE\r\t\t\t\tEND;\r\t\t\t\tvalid := p.valid * valid;\r\t\t\t\tIF valid # {} THEN\r\t\t\t\t\tIF op = NIL THEN NEW(op); op.ctrl := c END;\r\t\t\t\t\tNEW(op.prop); op.prop^ := p^; op.prop.valid := valid\r\t\t\t\tEND\r\t\t\t| p: Properties.StdProp DO\r\t\t\t\tWITH c: Table DO\r\t\t\t\t\tvalid := p.valid * {Properties.typeface, Properties.size, Properties.style};\r\t\t\t\t\tIF valid # {} THEN\r\t\t\t\t\t\tIF op = NIL THEN NEW(op); op.ctrl := c END;\r\t\t\t\t\t\tNEW(op.sprop); op.sprop^ := p^; op.sprop.valid := valid\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\tEND;\r\t\t\tp := p.next\r\t\tEND;\r\t\tIF op # NIL THEN Views.Do(c, "
                    attr: 0
                  - text: "\"#System:SetProp\""
                    attr: 3
                  - text: ", op) END\r\tEND SetProp;\r\r\r\t"
                    attr: 0
                  - text: "(* CloseNotifier *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (n: CloseNotifier) Notify (VAR msg: Sequencers.Message);\r\t\tVAR disabled: BOOLEAN; string: Dialog.String; res: INTEGER;\r\tBEGIN\r\t\tWITH msg: Sequencers.CloseMsg DO\r\t\t\tIF ~msg.sticky & (~n.control.item.Valid() OR (n.control.item.PtrVal() # NIL)) THEN\r\t\t\t\tCallGuard(n.control, disabled, string);\r\t\t\t\tIF disabled THEN\r\t\t\t\t\tIF string = \"\" THEN string := n.control.prop.label$ END;\r\t\t\t\t\tIF string = \"\" THEN string := \"#Sql:IsCloseOk\" END;\r\t\t\t\t\tDialog.GetOK(string, \"\", \"\", \"\", {Dialog.yes, Dialog.no}, res);\r\t\t\t\t\tmsg.sticky := res = Dialog.no\r\t\t\t\tEND\r\t\t\tEND\r\t\t| msg: Sequencers.RemoveMsg DO\r\t\t\tIF n.control.item.Valid() THEN n.control.item.PutPtrVal(NIL) END;\r\t\t\tCallNotifier(n.control)\t"
                    attr: 0
                  - text: "(* Dialog.CheckGuards is called by HostWindows *)"
                    attr: 1
                  - text: "\r\t\tELSE\r\t\tEND\r\tEND Notify;\r\r\r\t"
                    attr: 0
                  - text: "(* Anchor *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (a: Anchor) Internalize (VAR rd: Stores.Reader);\r\t\tVAR thisVersion: INTEGER;\r\tBEGIN\r\t\ta.Internalize^(rd);\r\t\tIF ~rd.cancelled THEN\r\t\t\trd.ReadVersion(minVersion, anchVersion, thisVersion)\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (a: Anchor) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\ta.Externalize^(wr);\r\t\twr.WriteVersion(anchVersion)\r\tEND Externalize;\r\r\tPROCEDURE Visible (v: Views.View; f: Views.Frame): BOOLEAN;\r\t\tVAR visible: BOOLEAN; g: Views.Frame; ctrl: Containers.Controller;\r\tBEGIN\r\t\tg := Views.HostOf(f);\r\t\tIF (g = NIL) OR ~(g.view IS Containers.View) THEN\r\t\t\tvisible := TRUE\r\t\tELSE\r\t\t\tctrl := g.view(Containers.View).ThisController();\r\t\t\tvisible := Containers.mask * ctrl.opts # Containers.mask\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " visible\r\tEND Visible;\r\r\tPROCEDURE (a: Anchor) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR u: INTEGER; col: Ports.Color; n: CloseNotifier;\r\tBEGIN\r\t\tIF ~a.hasNotifier & (a.Domain() # NIL) & (a.Domain().GetSequencer() # NIL) THEN\r\t\t\tNEW(n); n.control := a;\r\t\t\ta.Domain().GetSequencer()(Sequencers.Sequencer).InstallNotifier(n);\r\t\t\ta.hasNotifier := TRUE\r\t\tEND;\r\t\tIF Visible(a, f) THEN\r\t\t\tu := Ports.point;\r\t\t\tf.DrawRect(0, 0, 20 * u, 16 * u, u, Ports.defaultColor);\r\t\t\tf.DrawLine(u, 3 * u, 19 * u, 3 * u, u, Ports.defaultColor);\r\t\t\tIF (a.prop.link # \"\") OR (a.prop.label # \"\") OR (a.prop.guard # \"\") THEN\r\t\t\t\tcol := Ports.red ELSE col := Ports.green\r\t\t\tEND;\r\t\t\tf.DrawLine(2 * u, 5 * u, 17 * u, 13 * u, u, col);\r\t\t\tf.DrawLine(2 * u, 13 * u, 17 * u, 5 * u, u, col)\r\t\tEND\r\tEND Restore;\r\r\tPROCEDURE (a: Anchor) HandlePropMsg (VAR msg: Properties.Message);\r\tBEGIN\r\t\tWITH msg: Properties.ResizePref DO\r\t\t\tmsg.fixed := TRUE\r\t\t| msg: Properties.PollMsg DO\r\t\t\tPollProp(a, msg.prop)\r\t\t| msg: Properties.SetMsg DO\r\t\t\tSetProp(a, msg.prop)\r\t\t| msg: Properties.SizePref DO\r\t\t\tIF msg.w = Views.undefined THEN msg.w := 20 * Ports.point END;\r\t\t\tIF msg.h = Views.undefined THEN msg.h := 16 * Ports.point END\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\r\r\t"
                    attr: 0
                  - text: "(* Navigator *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (n: Navigator) Internalize (VAR rd: Stores.Reader);\r\t\tVAR thisVersion: INTEGER;\r\tBEGIN\r\t\tn.Internalize^(rd);\r\t\tIF ~rd.cancelled THEN\r\t\t\trd.ReadVersion(minVersion, navVersion, thisVersion)\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (n: Navigator) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\tn.Externalize^(wr);\r\t\twr.WriteVersion(navVersion)\r\tEND Externalize;\r\r\tPROCEDURE DrawArrow (f: Views.Frame; VAR y: INTEGER; w, u: INTEGER; bar, up, guard: BOOLEAN);\r\t\tVAR d, y0, y1: INTEGER; col: Ports.Color;\r\tBEGIN\r\t\td := w DIV 2 - 2;\r\t\tIF guard THEN col := Ports.defaultColor ELSE col := Ports.grey50 END;\r\t\tIF bar  & up THEN f.DrawLine(2 * u, y * u, (w - 3) * u, y * u, u, col); INC(y) END;\r\t\tIF up THEN y0 := (y + d - 1) * u; y1 := y * u ELSE y0 := y * u; y1 := (y + d - 1) * u END;\r\t\tf.DrawLine(2 * u, y0, (w DIV 2 - 1) * u, y1, u, col);\t"
                    attr: 0
                  - text: "(* left diagonal *)"
                    attr: 1
                  - text: "\r\t\tf.DrawLine(w DIV 2 * u, y1, (w - 3) * u, y0, u, col);\t"
                    attr: 0
                  - text: "(* right diagonal *)"
                    attr: 1
                  - text: "\r\t\tINC(y, d);\r\t\tIF bar & ~up THEN f.DrawLine(2 * u, y * u, (w - 3) * u, y * u, u, col); INC(y) END\r\tEND DrawArrow;\r\r\tPROCEDURE (n: Navigator) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR newPos, count, u, y: INTEGER; col: Ports.Color;\r\tBEGIN\r\t\tCallLink(n, nil, newPos, count);\r\t\tu := f.dot; y := 2;\r\t\tDrawArrow(f, y, w, u, TRUE, TRUE, newPos > 0); INC(y, 2);\r\t\tDrawArrow(f, y, w, u, FALSE, TRUE, newPos > 0); INC(y, 2);\r\t\tDrawArrow(f, y, w, u, FALSE, FALSE, newPos < count - 1); INC(y, 2);\r\t\tDrawArrow(f, y, w, u, TRUE, FALSE, newPos < count - 1); INC(y, 2);\r\t\tIF n.prop.link # \"\" THEN col := Ports.defaultColor ELSE col := Ports.grey50 END;\r\t\tf.DrawRect(0, 0, w * u, y * u, u, col)\r\tEND Restore;\r\r\tPROCEDURE HitArrow (f: Views.Frame; VAR y: INTEGER; w, u, xm, ym: INTEGER; bar, up, guard: BOOLEAN;\r\t\t\t\t\t\t\t\t\t\tVAR hit: BOOLEAN);\r\t\tVAR d, y0, xd, yd: INTEGER; m: SET; isDown: BOOLEAN;\r\tBEGIN\r\t\thit := FALSE; xm := xm DIV u; ym := ym DIV u; y0 := y - 1;\r\t\tIF (xm >= 0) & (xm < w) & (ym >= y) THEN\r\t\t\td := w DIV 2 - 2;\r\t\t\tIF bar  & up THEN INC(y) END;\r\t\t\tINC(y, d);\r\t\t\tIF bar & ~up THEN INC(y) END;\r\t\t\tIF ym < y THEN\r\t\t\t\tIF guard THEN\r\t\t\t\t\tf.MarkRect(u, y0 * u, (w - 1) * u, (y + 1) * u, Ports.fill, Ports.hilite, Ports.show);\r\t\t\t\t\tREPEAT f.Input(xd, yd, m, isDown) UNTIL ~isDown;\r\t\t\t\t\tf.MarkRect(u, y0 * u, (w - 1) * u, (y + 1) * u, Ports.fill, Ports.hilite, Ports.hide);\r\t\t\t\t\thit := TRUE\r\t\t\t\tELSE Dialog.Beep\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND HitArrow;\r\r\tPROCEDURE TrackMsg (v: Navigator; f: Views.Frame; w, u, xm, ym: INTEGER);\r\t\tVAR newPos, count, y: INTEGER; hit: BOOLEAN;\r\tBEGIN\r\t\tCallLink(v, nil, newPos, count);\r\t\tu := f.dot; y := 2;\r\t\tHitArrow(f, y, w, u, xm, ym, TRUE, TRUE, newPos > 0, hit); INC(y, 2);\r\t\tIF hit THEN CallLink(v, 0, newPos, count) END;\r\t\tHitArrow(f, y, w, u, xm, ym, FALSE, TRUE, newPos > 0, hit); INC(y, 2);\r\t\tIF hit THEN CallLink(v, newPos - 1, newPos, count) END;\r\t\tHitArrow(f, y, w, u, xm, ym, FALSE, FALSE, newPos < count - 1, hit); INC(y, 2);\r\t\tIF hit THEN CallLink(v, newPos + 1, newPos, count) END;\r\t\tHitArrow(f, y, w, u, xm, ym, TRUE, FALSE, newPos < count - 1, hit);\r\t\tIF hit THEN CallLink(v, count - 1, newPos, count) END;\r\t\tViews.Update(v, Views.keepFrames)\r\tEND TrackMsg;\r\r\tPROCEDURE (n: Navigator) HandleCtrlMsg (f: Views.Frame; VAR msg: Controllers.Message;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\tBEGIN\r\t\tASSERT(focus = NIL, 23);\r\t\tWITH msg: Controllers.TrackMsg DO\r\t\t\tTrackMsg(n, f, w, f.dot, msg.x, msg.y)\r\t\tELSE"
                    attr: 0
                  - text: "\t(* ignore other messages *)"
                    attr: 1
                  - text: "\r\t\tEND\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE (n: Navigator) HandlePropMsg (VAR msg: Properties.Message);\r\tBEGIN\r\t\tWITH msg: Properties.FocusPref DO\r\t\t\tmsg.hotFocus := TRUE\r\t\t| msg: Properties.SizePref DO\r\t\t\tIF msg.w = Views.undefined THEN msg.w := w * Ports.point END;\r\t\t\tIF msg.h = Views.undefined THEN msg.h := (12 + 4 * (w DIV 2 - 2)) * Ports.point END\r\t\t| msg: Properties.PollMsg DO\r\t\t\tPollProp(n, msg.prop)\r\t\t| msg: Properties.SetMsg DO\r\t\t\tSetProp(n, msg.prop)\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\r\r\t"
                    attr: 0
                  - text: "(* Table *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE DrawField (f: Views.Frame; x, y, w, mode: INTEGER; VAR s: ARRAY OF CHAR; font: Fonts.Font);\r\t\tVAR i, sw, rw: INTEGER;\r\tBEGIN\r\t\tDEC(w, 4 * f.dot); INC(x, 2 * f.dot);\r\t\tsw := font.StringWidth(s);\r\t\tIF sw > w THEN\r\t\t\trw := w - font.StringWidth(\"...\");\r\t\t\tIF (rw >= 0) & (LEN(s) >= 4) THEN\r\t\t\t\ti := f.CharIndex(0, rw, s, font);\r\t\t\t\tIF i > 0 THEN DEC(i) END;\r\t\t\t\tIF i > LEN(s) - 4 THEN i := LEN(s) - 4 END;\r\t\t\t\ts[i] := \".\"; s[i+1] := \".\"; s[i+2] := \".\"; s[i+3] := 0X;\r\t\t\t\tsw := font.StringWidth(s)\r\t\t\tELSE sw := 0\r\t\t\tEND\r\t\tEND;\r\t\tIF sw > 0 THEN\r\t\t\tIF mode = center THEN INC(x, (w - sw) DIV 2)\r\t\t\tELSIF mode = right THEN INC(x, w - sw)\r\t\t\tEND;\r\t\t\tf.DrawString(x, y, Ports.defaultColor, s, font)\r\t\tEND\r\tEND DrawField;\r\t\r\tPROCEDURE DrawSelection (t: Table; f: Views.Frame; show: BOOLEAN);\r\t\tVAR c, x, y: INTEGER;\r\tBEGIN\r\t\tc := 0; x := 2 * f.dot - t.orgX;\r\t\tWHILE c < t.selCol DO INC(x, t.width[c]); INC(c) END;\r\t\tIF t.selRow >= t.orgRow THEN\r\t\t\ty := (t.selRow + 1 - t.orgRow) * t.rowH + 3 * f.dot;\r\t\t\tf.MarkRect(x + f.dot, y + f.dot, x + t.width[t.selCol] - 2 * f.dot, y + t.rowH - 2 * f.dot,\r\t\t\t\t\t\t\tPorts.fill, Ports.hilite, show)\r\t\tEND\r\tEND DrawSelection;\r\t\r\tPROCEDURE Select (t: Table; on: BOOLEAN);\r\t\tVAR msg: SelMsg;\r\tBEGIN\r\t\tIF on # t.selected THEN\r\t\t\tmsg.show := on; Views.Broadcast(t, msg); t.selected := on\r\t\tEND\r\tEND Select;\r\t\r\tPROCEDURE ViewFromSelection (t: Table): Views.View;\r\t\tVAR m: TextModels.Model; w: TextModels.Writer; data: SqlDB.Row; i: INTEGER;\r\tBEGIN\r\t\tIF t.selected THEN\r\t\t\tt.table.Read(t.selRow, data);\r\t\t\tm := TextModels.dir.New(); w := m.NewWriter(NIL); i := 0;\r\t\t\tWHILE data.fields[t.selCol][i] # 0X DO w.WriteChar(data.fields[t.selCol][i]); INC(i) END;\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TextViews.dir.New(m)\r\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL\r\t\tEND\r\tEND ViewFromSelection;\r\t\r\tPROCEDURE GetTableSize (t: Table; dot: INTEGER; VAR w, h: INTEGER);\r\t\tVAR c: INTEGER;\r\tBEGIN\r\t\tw := 0; h := 0;\r\t\tIF (t.table # NIL) & t.table.Available() & (t.table.columns > 0) THEN\r\t\t\tc := 0;\r\t\t\tWHILE c < t.table.columns DO INC(w, t.width[c]); INC(c) END;\r\t\t\tINC(w, 3 * dot);\r\t\t\tIF t.table.rows = MAX(INTEGER) THEN h := 10000 * Ports.mm\r\t\t\tELSE h := (t.table.rows + 1) * t.rowH + 4 * dot\r\t\t\tEND\r\t\tEND\r\tEND GetTableSize;\r\t\r\tPROCEDURE CheckPos (t: Table; x, y, dot: INTEGER; VAR col, type, p: INTEGER);\r\t\tVAR c, w, h, a: INTEGER;\r\tBEGIN\r\t\tGetTableSize(t, dot, w, h);\r\t\tINC(x, t.orgX);\r\t\tIF (x >= 0) & (x <= w) & (y >= 0) & (y <= h) THEN\r\t\t\tc := 0; w := 0; type := 0; INC(x, dot);\r\t\t\tWHILE (x >= w + t.width[c]) DO INC(w, t.width[c]); INC(c) END;\r\t\t\tIF (x <= w + 3 * dot) OR ((t.table # NIL) & (c = t.table.columns)) & (c > 0) THEN\r\t\t\t\tcol := c - 1; p := w + dot - t.orgX; type := move\r\t\t\tELSIF y - dot < t.rowH THEN\r\t\t\t\ttype := adjust;\r\t\t\t\tcol := c; a := t.width[c] DIV 3;\r\t\t\t\tIF x < w + a THEN p := left\r\t\t\t\tELSIF x > w + a * 2 THEN p := right\r\t\t\t\tELSE p := center\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tcol := c; p := (y - dot) DIV t.rowH + t.orgRow - 1; type := field\r\t\t\tEND\r\t\tELSE type := 0\r\t\tEND\r\tEND CheckPos;\r\t\r\tPROCEDURE MoveLine (t: Table; f: Views.Frame; col, x0: INTEGER);\r\t\tVAR w, h, x, y, x1, limit: INTEGER; m: SET; isDown: BOOLEAN; op: FormatOp;\r\tBEGIN\r\t\tGetTableSize(t, f.dot, w, h);\r\t\tx := x0; limit := x0 - t.width[col] + 2 * f.dot;\r\t\tREPEAT\r\t\t\tf.Input(x1, y, m, isDown);\r\t\t\tIF x1 < limit THEN x1 := limit END;\r\t\t\tIF x1 # x THEN\r\t\t\t\tf.MarkRect(x, 0, x + f.dot, h, Ports.fill, Ports.invert, FALSE);\r\t\t\t\tx := x1;\r\t\t\t\tf.MarkRect(x, 0, x + f.dot, h, Ports.fill, Ports.invert, TRUE)\r\t\t\tEND\r\t\tUNTIL ~isDown;\r\t\tNEW(op); op.tab := t; op.col := col;\r\t\top.width := t.width[col] + x - x0; op.mode := t.mode[col];\r\t\tViews.Do(t, \"#System:SetLayout\", op)\r\tEND MoveLine;\r\t\r\tPROCEDURE ChangeAdjust (t: Table; col, mode: INTEGER);\r\t\tVAR op: FormatOp;\r\tBEGIN\r\t\tNEW(op); op.tab := t; op.col := col;\r\t\top.width := t.width[col]; op.mode := mode;\r\t\tViews.Do(t, \"#System:SetLayout\", op)\r\tEND ChangeAdjust;\r\t\r\tPROCEDURE TableSections (t: Table; f: Views.Frame; vertical: BOOLEAN; VAR size, part, pos: INTEGER);\r\t\tVAR c, w, max: INTEGER;\r\tBEGIN\r\t\tsize := 0; part := 0; pos := 0;\r\t\tIF (t.table # NIL) & t.table.Available() & (t.table.columns > 0) THEN\r\t\t\tIF vertical THEN\r\t\t\t\tsize := t.table.rows;\r\t\t\t\tpart := (f.b - f.t) DIV t.rowH - 1;\r\t\t\t\tpos := t.orgRow\r\t\t\tELSE\r\t\t\t\tc := 0; w := 0; max := t.table.columns;\r\t\t\t\tWHILE (c < max) DO INC(w, t.width[c]); INC(c) END;\r\t\t\t\tsize := w + 3 * f.dot;\r\t\t\t\tpart := f.r - f.l;\r\t\t\t\tpos := t.orgX\r\t\t\tEND\r\t\tEND\r\tEND TableSections;\r\t\r\tPROCEDURE ScrollTable (t: Table; f: Views.Frame; op, pos: INTEGER; vertical: BOOLEAN);\r\t\tVAR size, part, p, delta, l, t0, r, b: INTEGER;\r\tBEGIN\r\t\tIF vertical THEN\r\t\t\tTableSections(t, f, TRUE, size, part, p);\r\t\t\tdelta := part - 1;\r\t\t\tIF delta < 1 THEN delta := 1 END;\r\t\t\tCASE op OF\r\t\t\t| Controllers.decLine: DEC(p)\r\t\t\t| Controllers.incLine: INC(p)\r\t\t\t| Controllers.decPage: DEC(p, delta)\r\t\t\t| Controllers.incPage: INC(p, delta)\r\t\t\t| Controllers.gotoPos: p := pos\r\t\t\tEND;\r\t\t\tIF p > size - part THEN p := size - part END;\r\t\t\tIF p < 0 THEN p := 0 END;\r\t\t\tdelta := (f.gx + t.rowH + 4 * f.dot) DIV f.unit;\r\t\t\tf.rider.GetRect(l, t0, r, b);\r\t\t\tIF b > delta THEN\r\t\t\t\tIF t0 < delta THEN f.rider.SetRect(l, delta, r, b) END;\r\t\t\t\tViews.Scroll(t, 0, (t.orgRow - p) * t.rowH);\r\t\t\t\tf.rider.SetRect(l, t0, r, b)\r\t\t\tEND;\r\t\t\tt.orgRow := p\r\t\tELSE\r\t\t\tTableSections(t, f, FALSE, size, part, p);\r\t\t\tdelta := part - defColW;\r\t\t\tIF delta < defColW THEN delta := defColW END;\r\t\t\tCASE op OF\r\t\t\t| Controllers.decLine: DEC(p, defColW)\r\t\t\t| Controllers.incLine: INC(p, defColW)\r\t\t\t| Controllers.decPage: DEC(p, delta)\r\t\t\t| Controllers.incPage: INC(p, delta)\r\t\t\t| Controllers.gotoPos: p := pos\r\t\t\tEND;\r\t\t\tIF p >= size - part THEN p := size - part END;\r\t\t\tIF p < 0 THEN p := 0 END;\r\t\t\tViews.Scroll(t, t.orgX - p, 0);\r\t\t\tt.orgX := p\r\t\tEND\r\tEND ScrollTable;\r\t\r\tPROCEDURE HandleChar (t: Table; f: Views.Frame; ch: CHAR);\r\tBEGIN\r\t\tCASE ch OF\r\t\t| 10X: ScrollTable(t, f, Controllers.decPage, 0, FALSE)\r\t\t| 11X: ScrollTable(t, f, Controllers.incPage, 0, FALSE)\r\t\t| 12X: ScrollTable(t, f, Controllers.decPage, 0, TRUE)\r\t\t| 13X: ScrollTable(t, f, Controllers.incPage, 0, TRUE)\r\t\t| 14X: ScrollTable(t, f, Controllers.gotoPos, 0, FALSE)\r\t\t| 15X: ScrollTable(t, f, Controllers.gotoPos, MAX(INTEGER), FALSE)\r\t\t| 16X: ScrollTable(t, f, Controllers.gotoPos, 0, TRUE)\r\t\t| 17X: ScrollTable(t, f, Controllers.gotoPos, MAX(INTEGER), TRUE)\r\t\t| 1CX: ScrollTable(t, f, Controllers.decLine, 0, FALSE)\r\t\t| 1DX: ScrollTable(t, f, Controllers.incLine, 0, FALSE)\r\t\t| 1EX: ScrollTable(t, f, Controllers.decLine, 0, TRUE)\r\t\t| 1FX: ScrollTable(t, f, Controllers.incLine, 0, TRUE)\r\t\t| 07X, 08X, 1BX: Select(t, FALSE)\r\t\tELSE\r\t\tEND\r\tEND HandleChar;\r\t\r\r\tPROCEDURE (t: Table) Internalize (VAR rd: Stores.Reader);\r\t\tVAR thisVersion: INTEGER; i: INTEGER;\r\tBEGIN\r\t\tt.Internalize^(rd);\r\t\tIF ~rd.cancelled THEN\r\t\t\trd.ReadVersion(minVersion, tabVersion, thisVersion);\r\t\t\tIF ~rd.cancelled THEN\r\t\t\t\tNEW(t.sprop);\r\t\t\t\trd.ReadXString(t.sprop.typeface);\r\t\t\t\trd.ReadInt(t.sprop.size);\r\t\t\t\trd.ReadSet(t.sprop.style.val);\r\t\t\t\tt.sprop.style.mask := {Fonts.italic, Fonts.underline, Fonts.strikeout};\r\t\t\t\tt.sprop.weight := Fonts.normal;\r\t\t\t\trd.ReadInt(t.columns);\r\t\t\t\tIF t.columns > 0 THEN\r\t\t\t\t\tNEW(t.width, t.columns);\r\t\t\t\t\tNEW(t.mode, t.columns);\r\t\t\t\t\tFOR i := 0 TO t.columns - 1 DO\r\t\t\t\t\t\trd.ReadInt(t.width[i]);\r\t\t\t\t\t\trd.ReadInt(t.mode[i]);\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\t\tNEW(t.width, 10); FillArray(t.width, 0, 10, defColW);\r\t\t\t\t\tNEW(t.mode, 10); FillArray(t.mode, 0, 10, center);\r\t\t\t\tEND;\r\t\t\t\tSetupTable(t)\r\t\t\tEND\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (t: Table) Externalize (VAR wr: Stores.Writer);\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\tt.Externalize^(wr);\r\t\twr.WriteVersion(tabVersion);\r\t\twr.WriteXString(t.sprop.typeface);\r\t\twr.WriteInt(t.sprop.size);\r\t\twr.WriteSet(t.sprop.style.val);\r\t\twr.WriteInt(t.columns); i := 0;\r\t\tWHILE i < t.columns DO\r\t\t\twr.WriteInt(t.width[i]);\r\t\t\twr.WriteInt(t.mode[i]);\r\t\t\tINC(i)\r\t\tEND\r\tEND Externalize;\r\r\tPROCEDURE (t: Table) CopyFromSimpleView (source: Views.View);\r\tBEGIN\r\t\tt.CopyFromSimpleView^(source);\r\t\tWITH source: Table DO\r\t\t\tNEW(t.sprop); t.sprop^ := source.sprop^;\r\t\t\tt.columns := source.columns;\r\t\t\tNEW(t.width, LEN(source.width)); CopyArray(source.width, t.width);\r\t\t\tNEW(t.mode, LEN(source.mode)); CopyArray(source.mode, t.mode);\r\t\t\tt.table := source.table;\r\t\t\tSetupTable(t)\r\t\tEND\r\tEND CopyFromSimpleView;\r\t\r\tPROCEDURE (t: Table) Neutralize;\r\tBEGIN\r\t\tSelect(t, FALSE)\r\tEND Neutralize;\r\t\r\tPROCEDURE (t: Table) GetBackground (VAR color: Ports.Color);\r\tBEGIN\r\t\tcolor := Ports.background\r\tEND GetBackground;\r\r\tPROCEDURE (t: Table) Restore (f: Views.Frame; l, t1, r, b: INTEGER);\r\t\tVAR row, col, x, y, w: INTEGER; data: SqlDB.Row; font: Fonts.Font;\r\tBEGIN\r\t\tIF (t.table # NIL) & t.table.Available() & (t.table.columns > 0) THEN\r\t\t\tIF t.table.columns > LEN(t.width) THEN Expand(t, t.table.columns + 10) END;\r\t\t\tDEC(t.rowH, t.rowH MOD f.unit);\r\t\t\trow := SqlDB.names; y := 2 * f.dot; font := t.titFont;\r\t\t\tWHILE (row < t.table.rows) & (y < b) DO\r\t\t\t\tIF ~Views.IsPrinterFrame(f) OR (y + t.rowH < b) THEN\r\t\t\t\t\tt.table.Read(row, data);\r\t\t\t\t\tIF t.table.res # SqlDB.noData THEN \r\t\t\t\t\t\tcol := 0; x := 2 * f.dot - t.orgX;\r\t\t\t\t\t\tWHILE (col < t.table.columns) & (x < r) DO\r\t\t\t\t\t\t\tw := t.width[col];\r\t\t\t\t\t\t\tIF x + w >= 0 THEN\r\t\t\t\t\t\t\t\tf.DrawRect(x - f.dot, y, x, y + t.rowH, Ports.fill, Ports.defaultColor);\r\t\t\t\t\t\t\t\t"
