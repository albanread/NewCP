                  - text: "(* SYSTEM.ADR only *)"
                    attr: 1
                  - text: "\r\t\tStores, Sequencers, Views, Properties, Dialog, Meta,\r\t\tFonts, Ports, Controllers, Containers, Controls, SqlDB, TextModels, TextViews;\r\r\tCONST\r\t\t"
                    attr: 0
