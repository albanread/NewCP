                  - text: "* = POINTER TO RECORD\r\t\t\tid-: INTEGER;\r\t\t\tname-, ceo-: ARRAY 32 OF CHAR;\r\t\t\temployees-: INTEGER;\r\t\t\townedBy-: Node;\t"
