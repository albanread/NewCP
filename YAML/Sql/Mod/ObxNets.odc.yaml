                    attr: 0
                  - text: "(* list of owned companies *)"
                    attr: 1
                  - text: "\r\t\t\ttime*: INTEGER;\t"
                    attr: 0
                  - text: "(* temporary data for layout algorithm *)"
                    attr: 1
                  - text: "\r\t\t\tx*, y*: INTEGER;\t"
                    attr: 0
                  - text: "(* temporary data for layout algorithm *)"
                    attr: 1
                  - text: "\r\t\t\tnext: Company\r\t\tEND;\r\r\t\t"
                    attr: 0
                  - text: NodeDesc
                    attr: 3
                  - text: "* = RECORD\r\t\t\tnext-: Node;\r\t\t\tpercent-: INTEGER;\r\t\t\tcompany-: Company\r\t\tEND;\r\r\t\t"
                    attr: 0
                  - text: NetDesc
                    attr: 3
                  - text: "* = RECORD\r\t\t\tfirst: Company\r\t\tEND;\r\r\tPROCEDURE "
                    attr: 0
                  - text: AddCompany
                    attr: 3
                  - text: "* (g: Net; id: INTEGER; name, ceo: ARRAY OF CHAR; employees: INTEGER);\r\t\tVAR c: Company;\r\tBEGIN\r\t\tASSERT(g # NIL, 20); ASSERT(id > 0, 21);\r\t\tc := g.first; WHILE (c # NIL) & (c.id # id) DO c := c.next END;\r\t\tIF c # NIL THEN\r\t\t\tIF c.name = \"\" THEN\r\t\t\t\tc.name := name$; c.ceo := ceo$; c.employees := employees;\r\t\t\tELSE\r\t\t\t\tASSERT((name = \"\") OR (c.name = name), 22)\r\t\t\tEND\r\t\tELSE\r\t\t\tNEW(c); c.id := id; c.name := name$; c.ceo := ceo$; c.employees := employees;\r\t\t\tc.next := g.first; g.first := c\r\t\tEND\r\tEND AddCompany;\r\r\tPROCEDURE AddNode (VAR h: Node; percent: INTEGER; company: Company);\r\t\tVAR n: Node;\r\tBEGIN\r\t\tNEW(n); n.percent := percent; n.company := company;\r\t\tIF h = NIL THEN\r\t\t\th := n\r\t\tELSE\r\t\t\tWHILE (h.percent >= percent) & (h.next # NIL) DO h := h.next END;\r\t\t\tn.next := h.next; h.next := n\r\t\tEND\r\tEND AddNode;\r\r\tPROCEDURE "
                    attr: 0
                  - text: AddOwnership
                    attr: 3
                  - text: "* (g: Net; owner, owned: INTEGER; percent: INTEGER);\r\t\tVAR h0, h1: Company;\r\tBEGIN\r\t\tASSERT(g # NIL, 20); ASSERT(owner > 0, 21); ASSERT(owned > 0, 22);\r\t\tASSERT(owned # owner, 23); ASSERT(percent > 0, 24); ASSERT(percent <= 100, 25);\r\t\th0 := g.first; WHILE (h0 # NIL) & (h0.id # owner) DO h0 := h0.next END;\r\t\tIF h0 = NIL THEN\r\t\t\tAddCompany(g, owner, \"\", \"\", 0);\r\t\t\th0 := g.first; WHILE (h0 # NIL) & (h0.id # owner) DO h0 := h0.next END; ASSERT(h0 # NIL, 100)\r\t\tEND;\r\t\th1 := g.first; WHILE (h1 # NIL) & (h1.id # owned) DO h1 := h1.next END;\r\t\tIF h1 = NIL THEN\r\t\t\tAddCompany(g, owned, \"\", \"\", 0);\r\t\t\th1 := g.first; WHILE (h1 # NIL) & (h1.id # owned) DO h1 := h1.next END; ASSERT(h1 # NIL, 100)\r\t\tEND;\r\t\tAddNode(h1.ownedBy, percent, h0);\r\t\tAddNode(h0.owns, percent, h1)\r\tEND AddOwnership;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ThisCompany
                    attr: 3
                  - text: "* (g: Net; id: INTEGER): Company;\r\t\tVAR h: Company;\r\tBEGIN\r\t\tASSERT(g # NIL, 20); ASSERT(id > 0, 21);\r\t\th := g.first; WHILE (h # NIL) & (h.id # id) DO h := h.next END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " h\r\tEND ThisCompany;\r\r\tPROCEDURE "
                    attr: 0
                  - text: CompanyAt
                    attr: 3
                  - text: "* (g: Net; x, y, w, h: INTEGER): Company;\r\t"
                    attr: 0
                  - text: "(* not a nice interface; could be improved *)"
                    attr: 1
                  - text: "\r\t\tVAR p: Company;\r\tBEGIN\r\t\tASSERT(g # NIL, 20);\r\t\tp := g.first; WHILE (p # NIL) & ((x < p.x) OR (y < p.y) OR (x >= p.x + w) OR (y >= p.y + h)) DO p := p.next END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " p\r\tEND CompanyAt;\r\r\tPROCEDURE "
                    attr: 0
                  - text: New
                    attr: 3
                  - text: "* (): Net;\r\t\tVAR g: Net;\r\tBEGIN\r\t\tNEW(g); "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " g\r\tEND New;\r\rEND SqlObxNets.\r"
