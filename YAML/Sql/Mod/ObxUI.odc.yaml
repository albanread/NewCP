                  - text: "\r\tIMPORT Dialog, SqlDB, SqlObxDB;\r\t\r\t"
                    attr: 0
                  - text: "(** generic **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: ROGuard
                    attr: 3
                  - text: "* (VAR par: Dialog.Par);\r\tBEGIN\r\t\tpar.readOnly := TRUE\r\tEND ROGuard;\r\r\r\t"
                    attr: 0
                  - text: "(** guards **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE Invalid (): BOOLEAN;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* check whether record is legal (must be a very efficient check) *)"
                    attr: 1
                  - text: "\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " SqlObxDB.company.name = \"\"\r\tEND Invalid;\r\r\tPROCEDURE "
                    attr: 0
                  - text: CloseGuard
                    attr: 3
                  - text: "* (VAR par: Dialog.Par);\r\tBEGIN\r\t\tIF SqlObxDB.dirty THEN par.disabled := TRUE END\r\tEND CloseGuard;\r\r\tPROCEDURE "
                    attr: 0
                  - text: InsertGuard
                    attr: 3
                  - text: "* (VAR par: Dialog.Par);\r\tBEGIN\r\t\tIF SqlObxDB.Closed() THEN par.disabled := TRUE END;\r\t\tIF ~SqlObxDB.dirty OR Invalid() THEN par.disabled := TRUE END\r\tEND InsertGuard;\r\r\tPROCEDURE "
                    attr: 0
                  - text: UpdateGuard
                    attr: 3
                  - text: "* (VAR par: Dialog.Par);\r\tBEGIN\r\t\tIF SqlObxDB.Closed() THEN par.disabled := TRUE END;\r\t\tIF ~SqlObxDB.dirty OR (SqlObxDB.company.id <= 0) OR Invalid() THEN par.disabled := TRUE END\r\tEND UpdateGuard;\r\r\tPROCEDURE "
                    attr: 0
                  - text: DeleteGuard
                    attr: 3
                  - text: "* (VAR par: Dialog.Par);\r\tBEGIN\r\t\tIF SqlObxDB.Closed() THEN par.disabled := TRUE END;\r\t\tIF SqlObxDB.dirty OR (SqlObxDB.company.id <= 0) THEN par.disabled := TRUE END\r\tEND DeleteGuard;\r\r\tPROCEDURE "
                    attr: 0
                  - text: RevertGuard
                    attr: 3
                  - text: "* (VAR par: Dialog.Par);\r\tBEGIN\r\t\tIF SqlObxDB.Closed() THEN par.disabled := TRUE END;\r\t\tIF ~SqlObxDB.dirty THEN par.disabled := TRUE END;\r\t\tIF SqlObxDB.company.id > 0 THEN par.label := \"Revert\" ELSE par.label := \"Clear\" END\r\tEND RevertGuard;\r\r\tPROCEDURE "
                    attr: 0
                  - text: FindGuard
                    attr: 3
                  - text: "* (VAR par: Dialog.Par);\r\tBEGIN\r\t\tIF SqlObxDB.Closed() THEN par.disabled := TRUE END;\r\t\tIF SqlObxDB.dirty OR (SqlObxDB.searchId <= 0) THEN par.disabled := TRUE END\r\tEND FindGuard;\r\r\r\t"
                    attr: 0
                  - text: "(** notifiers **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: TypingNotifier
                    attr: 3
                  - text: "* (op, from, to: INTEGER);\r\tBEGIN\r\t\tIF ~SqlObxDB.dirty & (op = Dialog.changed) & ~SqlObxDB.Closed() THEN\r\t\t\tSqlObxDB.dirty := TRUE; Dialog.Update(SqlObxDB.company)\r\t\tEND\r\tEND TypingNotifier;\r\rEND SqlObxUI.\r"
