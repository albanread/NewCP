                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Dialog, Views, TextModels, TextControllers, SqlDB, SqlControls;\r\t\r\t\r\tVAR\r\t\t"
                    attr: 0
                  - text: dlg
                    attr: 3
                  - text: "*: RECORD\r\t\t\tid*,\r\t\t\tpassword*,\r\t\t\tdatabase*,\r\t\t\tdriver*: ARRAY 32 OF CHAR;\r\t\t\tstatement*: ARRAY 1024 OF CHAR\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: table
                    attr: 3
                  - text: "*: SqlDB.Table;\t"
                    attr: 0
                  - text: "(* anchor for database *)"
                    attr: 1
                  - text: "\r\t\t\r\t\r\tPROCEDURE CheckResult (tab: SqlDB.Table; par: ANYPTR);\r\t\tVAR v: Views.View;\r\tBEGIN\r\t\tIF tab.res = 0 THEN\r\t\t\tIF tab.columns > 0 THEN\r\t\t\t\tv := SqlControls.dir.NewTableOn(tab);\r\t\t\t\tViews.OpenAux(v, \"#Sql:Result\")\r\t\t\tELSE Dialog.ShowMsg(\"#Sql:StatementExecuted\")\r\t\t\tEND\r\t\tELSE Dialog.ShowMsg(\"#Sql:ExecutionFailed\")\r\t\tEND\r\tEND CheckResult;\r\t\r\tPROCEDURE ExecuteThis (statement: ARRAY OF CHAR);\r\t\tVAR res: INTEGER; db: SqlDB.Database; tab: SqlDB.Table;\r\tBEGIN\r\t\tIF table = NIL THEN\r\t\t\tSqlDB.OpenDatabase(dlg.driver, dlg.id, dlg.password, dlg.database,\r\t\t\t\t\t\t\t\t\t\t\tSqlDB.async, SqlDB.showErrors, db, res);\r\t\t\tIF res = 0 THEN\r\t\t\t\ttable := db.NewTable()\r\t\t\tELSIF res <= 3 THEN\r\t\t\t\tDialog.ShowMsg(\"#Sql:CannotLoadDriver\")\r\t\t\tELSE\r\t\t\t\tDialog.ShowMsg(\"#Sql:ConnectionFailed\")\r\t\t\tEND\r\t\tEND;\r\t\tIF (statement # \"\") & (table # NIL) THEN\r\t\t\t"
                    attr: 0
                  - text: "(* allocate separate table to allow for multiple open tables *)"
                    attr: 1
                  - text: "\r\t\t\ttab := table.base.NewTable();\r\t\t\ttab.Exec(statement);\r\t\t\t"
                    attr: 0
                  - text: "(* separate result check from execution to allow for asynchronous operation *)"
                    attr: 1
                  - text: "\r\t\t\ttab.Call(CheckResult, NIL)\r\t\tEND\r\tEND ExecuteThis;\r\t\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Execute
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\tExecuteThis(dlg.statement)\r\tEND Execute;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ExecuteSel
                    attr: 3
                  - text: "*;\r\t\tVAR c: TextControllers.Controller; r: TextModels.Reader; beg, end, i: INTEGER; stat: ARRAY 1024 OF CHAR;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tc.GetSelection(beg, end);\r\t\t\tr := c.text.NewReader(NIL);\r\t\t\tr.SetPos(beg); i := 0;\r\t\t\tWHILE r.Pos() < end DO r.ReadChar(stat[i]); INC(i) END;\r\t\t\tstat[i] := 0X;\r\t\t\tExecuteThis(stat)\r\t\tEND\r\tEND ExecuteSel;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Commit
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\tIF table # NIL THEN\r\t\t\ttable.base.Commit\r\t\tEND\r\tEND Commit;\r\t\r\t\rBEGIN\r\tdlg.id := \"\"; dlg.password := \"\"; dlg.database := \"Test Database\"; dlg.driver := \"SqlOdbc\"\rEND SqlBrowser.\r"
                    attr: 0
