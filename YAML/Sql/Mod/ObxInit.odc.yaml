                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT "
                    attr: 0
                  - text: Kernel
                    attr: 3
                  - text: ", SqlDB;\r\t\r\tCONST\r\t\tprotocol = \"SqlOdbc\";\r\t\tid = \"\"; password = \"\";\r\t\tdatasource = \"Test Database\";\r\r\tPROCEDURE "
                    attr: 0
                  - text: Setup
                    attr: 3
                  - text: "*;\r\t\tVAR db: SqlDB.Database; res: INTEGER;\r\tBEGIN\r\t\tSqlDB.OpenDatabase(protocol, id, password, datasource, SqlDB.async, SqlDB.hideErrors, db, res);\r\t\tIF db # NIL THEN\r\t\t\tdb.Exec(\"CREATE TABLE Companies (id INTEGER, name VARCHAR(255), ceo VARCHAR(255), employees INTEGER)\");\r\t\t\tdb.Exec(\"CREATE TABLE Ownership (owner INTEGER, owned INTEGER, percent INTEGER)\");\r\t\t\t"
                    attr: 0
                  - text: "(* single company *)"
                    attr: 1
                  - text: "\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (11, 'Test', 'Bill', 234)\");\r\t\t\t"
                    attr: 0
                  - text: "(* two companies (tree) *)"
                    attr: 1
                  - text: "\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (12, 'Test', 'Bill', 234)\");\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (13, 'Test company AG', 'John', 45)\");\r\t\t\tdb.Exec(\"INSERT INTO Ownership VALUES (12, 13, 100)\");\r\t\t\t"
                    attr: 0
                  - text: "(* four companies (with ring) *)"
                    attr: 1
                  - text: "\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (14, 'Test', 'Bill', 234)\");\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (15, 'Test company AG', 'John', 45)\");\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (16, 'Test Services GmbH', 'Jim', 23000)\");\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (17, 'Test Commands & Co.', 'Mary', 523)\");\r\t\t\tdb.Exec(\"INSERT INTO Ownership VALUES (14, 15, 50)\");\r\t\t\tdb.Exec(\"INSERT INTO Ownership VALUES (15, 17, 100)\");\r\t\t\tdb.Exec(\"INSERT INTO Ownership VALUES (16, 15, 50)\");\r\t\t\tdb.Exec(\"INSERT INTO Ownership VALUES (15, 17, 100)\");\r\t\t\t"
                    attr: 0
                  - text: "(* four companies (tree) *)"
                    attr: 1
                  - text: "\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (18, 'Test', 'Bill', 234)\");\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (19, 'Test company AG', 'John', 45)\");\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (20, 'Test Services GmbH', 'Jim', 23000)\");\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (21, 'Test Commands & Co.', 'Mary', 523)\");\r\t\t\tdb.Exec(\"INSERT INTO Ownership VALUES (18, 19, 20)\");\r\t\t\tdb.Exec(\"INSERT INTO Ownership VALUES (18, 20, 30)\");\r\t\t\tdb.Exec(\"INSERT INTO Ownership VALUES (18, 21, 50)\");\r\t\t\t"
                    attr: 0
                  - text: "(* most complex example *)"
                    attr: 1
                  - text: "\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (1, 'Test', 'Bill', 234)\");\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (2, 'Test company AG', 'John', 45)\");\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (3, 'Test Services GmbH', 'Jim', 23000)\");\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (4, 'Test Commands & Co.', 'Mary', 523)\");\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (5, 'Test Views KG', 'Frank', 17)\");\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (6, 'Test Genossenschaft', 'Hans', 2109)\");\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (7, 'Test Mentoring, Inc.', 'Marlis', 128)\");\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (8, 'Test Training Plc.', 'Paul', 4)\");\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (9, 'Test Trainers SA', 'Jean', 87)\");\r\t\t\tdb.Exec(\"INSERT INTO Companies VALUES (10, 'Test Wrappers AB', 'Gordon', 912)\");\r\t\t\tdb.Exec(\"INSERT INTO Ownership VALUES (1, 2, 100)\");\r\t\t\tdb.Exec(\"INSERT INTO Ownership VALUES (1, 3, 100)\");\r\t\t\tdb.Exec(\"INSERT INTO Ownership VALUES (2, 4, 100)\");\r\t\t\tdb.Exec(\"INSERT INTO Ownership VALUES (2, 5, 100)\");\r\t\t\tdb.Exec(\"INSERT INTO Ownership VALUES (3, 6, 100)\");\r\t\t\tdb.Exec(\"INSERT INTO Ownership VALUES (3, 7, 100)\");\r\t\t\tdb.Exec(\"INSERT INTO Ownership VALUES (7, 8, 100)\");\r\t\t\tdb.Exec(\"INSERT INTO Ownership VALUES (5, 9, 49)\");\r\t\t\tdb.Exec(\"INSERT INTO Ownership VALUES (8, 9, 51)\");\r\t\t\tdb.Exec(\"INSERT INTO Ownership VALUES (9, 10, 100)\");\r\t\t\tdb.Commit\r\t\tEND;\r\t\tdb := NIL;\r\t\tKernel.Cleanup\t"
                    attr: 0
                  - text: "(* garbage collector closes database *)"
                    attr: 1
                  - text: "\r\tEND Setup;\r\t\rEND SqlObxInit."
