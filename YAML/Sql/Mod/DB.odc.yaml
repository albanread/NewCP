ND\r\t\t\tELSIF (mod = \"SqlDB\") & (typ = \"Blob\") THEN\r\t\t\t\titem.GetVal(bv, ok); ASSERT(ok, 101);\r\t\t\t\tAddStr(d.driver.blobStr, FALSE, LEN(d.driver.blobStr), s);\r\t\t\t\tNEW(blob); blob.len := bv.value.len; blob.data := bv.value.data;\r\t\t\t\tIF s.last = NIL THEN s.blobs := blob ELSE s.last.next := blob END;\r\t\t\t\ts.last := blob\r\t\t\tELSE\r\t\t\t\tsc.ConnectTo(item);\r\t\t\t\tsc.Scan; ASSERT(~sc.eos, 22);\r\t\t\t\tAddItem(d, sc.this, native, s); sc.Scan;\r\t\t\t\tWHILE ~sc.eos DO\r\t\t\t\t\tAddChar(\",\", s); AddChar(\" \", s);\r\t\t\t\t\tAddItem(d, sc.this, native, s); sc.Scan\r\t\t\t\tEND\r\t\t\tEND\r\t\t| Meta.ptrTyp:\r\t\t\titem.Deref(base); AddItem(d, base, native, s)\r\t\tELSE "
