                    attr: 0
                  - text: "(* serialization *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE Reset (d: StdDatabase);\r\t\tVAR e: Elem;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* trap cleanup *)"
                    attr: 1
                  - text: "\r\t\te := d.queue; d.queue := NIL; d.range := NIL; d.tail := NIL;\r\t\tWHILE e # NIL DO\r\t\t\tIF e.table # NIL THEN e.table.Clear END;\r\t\t\tIF e.item.Valid() THEN ClearItem(e.item) END;\r\t\t\te := e.next\r\t\tEND\r\tEND Reset;\r\r\tPROCEDURE Process (d: StdDatabase);\r\t\tVAR e: Elem; operations: INTEGER;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* this is the heart of the processing of asynchronous operations *)"
                    attr: 1
                  - text: "\r\t\tWriteString(\"start processing\");\r\t\toperations := 0;\r\t\tWHILE (d.queue # NIL) & (operations < maxOperations) & d.driver.Ready() DO\r\t\t\te := d.queue; d.queue := e.next; d.tail := d.queue; INC(operations);\r\t\t\tCASE e.op OF\r\t\t\t| openOp: DoEndOpen(d)\r\t\t\t| beginOp: DoBeginExec(d, e.table, e.statement^)\r\t\t\t| endOp: DoEndExec(d, e.table)\r\t\t\t| commitOp: DoCommit(d, TRUE)\r\t\t\t| rollbackOp: DoCommit(d, FALSE)\r\t\t\t| clearOp: DoClear(e.table)\r\t\t\t| callOp: INC(d.id); e.cmd(e.par)\r\t\t\t| tcallOp: INC(d.id); e.table.id := d.id; e.tcmd(e.table, e.par)\r\t\t\tELSE DoRead(e.table, e.op, e.item)\r\t\t\tEND;\r\t\t\td.tail := NIL\r\t\tEND;\r\t\tWriteString(\"stop processing\")\r\tEND Process;\r\r\tPROCEDURE (a: Action) Do;\r\t\tVAR d: StdDatabase;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* async operations are advanced by an action, which belongs to the database object *)"
                    attr: 1
                  - text: "\r\t\td := a.database;\r\t\tIF d.executing THEN\t"
                    attr: 0
                  - text: "(* trapped *)"
                    attr: 1
                  - text: "\r\t\t\tReset(d)\r\t\tELSIF (d.queue # NIL) OR (d.range # NIL) THEN\r\t\t\tServices.DoLater(a, Services.now);\r\t\t\td.executing := TRUE;\r\t\t\tProcess(d);\r\t\t\tUpdate(d)\r\t\tEND;\r\t\td.executing := FALSE\r\tEND Do;\r\r\tPROCEDURE Put (d: StdDatabase; op: INTEGER; t: StdTable; s: ARRAY OF CHAR;\r\t\t\t\t\t\t\t\tVAR i: Meta.Item; cmd: Command; tcmd: TableCommand; par: ANYPTR);\r\t\tVAR e, h, k: Elem;\r\tBEGIN\t"
