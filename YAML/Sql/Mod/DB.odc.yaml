                  - text: "\r\t\t"
                    attr: 0
                  - text: "(* TRUE if Put would insert at beginning of queue *)"
                    attr: 1
                  - text: "\r\t\tVAR h: Elem;\r\tBEGIN\r\t\th := d.queue;\r\t\tIF h = d.tail THEN\r\t\t\t"
                    attr: 0
