                  - text: "(* put a SQL statement into a queue for later async processing *)"
                    attr: 1
                  - text: "\r\t\tNEW(e); e.op := op; e.table := t; e.item := i; e.cmd := cmd; e.tcmd := tcmd; e.par := par;\r\t\tIF s # \"\" THEN NEW(e.statement, LEN(s)); e.statement^ := s$ END;\r\t\th := d.queue;\r\t\tIF h = NIL THEN Services.DoLater(d.action, Services.now) END;\t"
                    attr: 0
