                  - text: "* (): Table, NEW, ABSTRACT;\r\r\r\t"
                    attr: 0
                  - text: "(* statement expansion *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE ReadPath (IN s: ARRAY OF CHAR; OUT t: ARRAY OF CHAR; VAR i: INTEGER; VAR ch: CHAR);\r\t\tVAR j: INTEGER;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* extract the designator that describes a global variable *)"
                    attr: 1
                  - text: "\r\t\tj := 0;\r\t\tIF Strings.IsIdentStart(ch) THEN\r\t\t\tREPEAT\r\t\t\t\tt[j] := ch; INC(j);\r\t\t\t\tINC(i); ch := s[i]\r\t\t\tUNTIL ~Strings.IsIdent(ch) & (ch # \".\")\r\t\tEND;\r\t\tt[j] := 0X\r\tEND ReadPath;\r\r\tPROCEDURE AddStr (IN s: ARRAY OF CHAR; native: BOOLEAN; max: INTEGER; VAR t: Statement);\r\t\tVAR i, len: INTEGER; e: String; ch: CHAR;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* append a string to a statement *)"
                    attr: 1
                  - text: "\r\t\tIF (t.idx + max < LEN(t.buf)) & (t.ext = NIL) THEN\r\t\t\ti := 0; ch := s[0];\r\t\t\tWHILE (i < max) & (ch # 0X) DO\r\t\t\t\tt.buf[t.idx] := ch; INC(t.idx);\r\t\t\t\tIF (ch = \"'\") & ~native THEN t.buf[t.idx] := \"'\"; INC(t.idx) END;\r\t\t\t\tINC(i); ch := s[i]\r\t\t\tEND\r\t\tELSE\r\t\t\tIF t.ext = NIL THEN\r\t\t\t\tlen := LEN(t.buf); REPEAT len := len * 4 UNTIL t.idx + max < len;\r\t\t\t\tNEW(t.ext, len); t.buf[t.idx] := 0X; t.ext^ := t.buf$\r\t\t\tELSIF t.idx + max >= LEN(t.ext^) THEN\r\t\t\t\tlen := LEN(t.ext^); REPEAT len := len * 4 UNTIL t.idx + max < len;\r\t\t\t\tNEW(e, len); t.ext[t.idx] := 0X; e^ := t.ext^$; t.ext := e\r\t\t\tEND;\r\t\t\ti := 0; ch := s[0];\r\t\t\tWHILE (i < max) & (ch # 0X) DO\r\t\t\t\tt.ext[t.idx] := ch; INC(t.idx);\r\t\t\t\tIF (ch = \"'\") & ~native THEN t.ext[t.idx] := \"'\"; INC(t.idx) END;\r\t\t\t\tINC(i); ch := s[i]\r\t\t\tEND\r\t\tEND\r\tEND AddStr;\r\r\tPROCEDURE AddChar (ch: CHAR; VAR t: Statement);\r\t\tVAR e: String;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* append a character to a statement *)"
                    attr: 1
                  - text: "\r\t\tIF (t.idx < LEN(t.buf) - 1) & (t.ext = NIL) THEN\r\t\t\tt.buf[t.idx] := ch; INC(t.idx)\r\t\tELSE\r\t\t\tIF t.ext = NIL THEN\r\t\t\t\tNEW(t.ext, 4 * LEN(t.buf)); t.buf[t.idx] := 0X; t.ext^ := t.buf$\r\t\t\tELSIF t.idx = LEN(t.ext^) - 1 THEN\r\t\t\t\tNEW(e, 4 * LEN(t.ext^)); t.ext[t.idx] := 0X; e^ := t.ext^$; t.ext := e\r\t\t\tEND;\r\t\t\tt.ext[t.idx] := ch; INC(t.idx)\r\t\tEND\r\tEND AddChar;\r\r\tPROCEDURE RealToString (x: SHORTREAL; minPrec: SHORTINT; OUT s: ARRAY OF CHAR);\r\t\tVAR y: REAL; res: INTEGER;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: "(* find the shortest string that can represent the number as a string *)"
                    attr: 1
                  - text: "\r\t\t"
                    attr: 0
                  - text: "(* this is a hack to avoid conversion problems between binary and textual representations *)"
                    attr: 1
                  - text: "\r\t\tREPEAT\r\t\t\tStrings.RealToStringForm(x, minPrec, 0, 0, \" \", s);\r\t\t\tStrings.StringToReal(s, y, res);\r\t\t\tINC(minPrec)\r\t\tUNTIL x = SHORT(y)\r\tEND RealToString;\r\r\tPROCEDURE LongToString (x: LONGINT; scale: INTEGER; OUT s: ARRAY OF CHAR);\r\t\tVAR d: ARRAY 24 OF CHAR; i, j: INTEGER;\r\tBEGIN\r\t\ti := 0; j := 0;\r\t\tIF x < 0 THEN s[0] := \"-\"; i := 1; x := -x END;\r\t\tREPEAT d[j] := CHR(x MOD 10 + ORD(\"0\")); INC(j); x := x DIV 10 UNTIL x = 0;\r\t\tWHILE j <= scale DO d[j] := \"0\"; INC(j) END;\r\t\tWHILE j > scale DO DEC(j); s[i] := d[j]; INC(i) END;\r\t\tIF j > 0 THEN s[i] := \".\"; INC(i) END;\r\t\tWHILE j > 0 DO DEC(j); s[i] := d[j]; INC(i) END;\r\t\ts[i] := 0X\r\tEND LongToString;\r\r\tPROCEDURE AddItem (d: StdDatabase; item: Meta.Item; native: BOOLEAN; VAR s: Statement);\r\t\tTYPE Ptr = POINTER TO ARRAY [1] MAX(INTEGER) DIV 2 OF CHAR;\r\t\tVAR base: Meta.Item; ok: BOOLEAN; i, len, res: INTEGER; h: ARRAY 64 OF CHAR;\r\t\t\tmod, typ: Meta.Name; dc: CurrencyValue; dv: DateValue; dt: TimeValue; p: Ptr;\r\t\t\tsc: Meta.Scanner; x, y: REAL; z: SHORTREAL; prec: SHORTINT;\r\t\t\tbv: BlobValue; blob: SqlDrivers.Blob;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* read the value represented by an item, translate it into a string, and append this string to a statement *)"
                    attr: 1
                  - text: "\r\t\tCASE item.typ OF\r\t\t| Meta.byteTyp, Meta.sIntTyp, Meta.intTyp:\r\t\t\tStrings.IntToString(item.IntVal(), h); AddStr(h, FALSE, 12, s)\r\t\t| Meta.longTyp:\r\t\t\tStrings.IntToString(item.LongVal(), h); AddStr(h, FALSE, 24, s)\r\t\t| Meta.sRealTyp:\r\t\t\tz := SHORT(item.RealVal()); prec := 7;\r\t\t\t"
                    attr: 0
                  - text: "(* find the shortest string that can represent the number as a string *)"
                    attr: 1
                  - text: "\r\t\t\t"
                    attr: 0
                  - text: "(* this is a hack to avoid conversion problems between binary and textual representations *)"
                    attr: 1
                  - text: "\r\t\t\tREPEAT\r\t\t\t\tStrings.RealToStringForm(z, prec, 0, 0, \" \", h);\r\t\t\t\tStrings.StringToReal(h, y, res);\r\t\t\t\tINC(prec)\r\t\t\tUNTIL (z = SHORT(y)) OR (prec = 10);\r\t\t\tAddStr(h, FALSE, 20, s)\r\t\t| Meta.realTyp:\r\t\t\tx := item.RealVal(); prec := 16;\r\t\t\t"
                    attr: 0
                  - text: "(* find the shortest string that can represent the number as a string *)"
                    attr: 1
                  - text: "\r\t\t\t"
                    attr: 0
                  - text: "(* this is a hack to avoid conversion problems between binary and textual representations *)"
                    attr: 1
                  - text: "\r\t\t\tREPEAT\r\t\t\t\tStrings.RealToStringForm(x, prec, 0, 0, \" \", h);\r\t\t\t\tStrings.StringToReal(h, y, res);\r\t\t\t\tINC(prec)\r\t\t\tUNTIL (x = y) OR (prec = 19);\r\t\t\tAddStr(h, FALSE, 28, s)\r\t\t| Meta.boolTyp:\r\t\t\tIF item.BoolVal() THEN AddChar(\"1\", s) ELSE AddChar(\"0\", s) END\r\t\t| Meta.arrTyp:\r\t\t\tIF item.BaseTyp() = Meta.charTyp THEN\t"
                    attr: 0
                  - text: "(* string *)"
                    attr: 1
                  - text: "\r\t\t\t\tp := "
                    attr: 0
                  - text: SYSTEM.VAL
                    attr: 3
                  - text: "(Ptr, item.adr);\r\t\t\t\tIF ~native THEN AddChar(\"'\", s) END;\r\t\t\t\tAddStr(p^, native, item.Len(), s);\r\t\t\t\tIF ~native THEN AddChar(\"'\", s) END\r\t\t\tELSE\t"
                    attr: 0
                  - text: "(* array of basic type *)"
                    attr: 1
