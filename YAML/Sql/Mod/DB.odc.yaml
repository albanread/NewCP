                  - text: "* (protocol, id, password, datasource: ARRAY OF CHAR;\r\t\t\t\t\t\t\t\t\t\t\t\t\tasync, showErrors: BOOLEAN; OUT d: Database; OUT res: INTEGER);\r\t\tVAR driver: SqlDrivers.Driver; sd: StdDatabase;\r\tBEGIN\r\t\tWriteString(\"OpenDatabase\");\r\t\tASSERT(protocol # \"\", 20);\r\t\tSqlDrivers.Open(protocol, id, password, datasource, async, showErrors, driver, res);\r\t\tIF res = 0 THEN\r\t\t\tASSERT(driver # NIL, 100);\r\t\t\tNEW(sd); sd.driver := driver; sd.queue := NIL; sd.tail := NIL;\r\t\t\tsd.async := async; sd.showErrors := showErrors;\r\t\t\tNEW(sd.action); sd.action.database := sd;\r\t\t\tIF driver.Ready() THEN DoEndOpen(sd)\r\t\t\tELSE Put(sd, openOp, NIL, \"\", dummy, NIL, NIL, NIL)\r\t\t\tEND;\r\t\t\tsd.res := 0; d := sd\r\t\tELSE\r\t\t\td := NIL\r\t\tEND\r\tEND OpenDatabase;\r\rBEGIN\r\tNEW(ptr);\r\tnullStr := \"null\"\rEND SqlDB.\r"
