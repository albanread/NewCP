                  - text: "(* StdTable *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (t: StdTable) Exec (statement: ARRAY OF CHAR);\r\tBEGIN\r\t\tWriteString(\"Table Exec\");\r\t\tASSERT(t.db.driver # NIL, 100); ASSERT(statement # \"\", 20);\r\t\tASSERT(~t.db.executing OR (t.id >= t.db.id), 21);\r\t\tIF Synch(t.db, beginOp, t) THEN DoBeginExec(t.db, t, statement)\r\t\tELSE Put(t.db, beginOp, t, statement, dummy, NIL, NIL, NIL)\r\t\tEND;\r\t\tIF Synch(t.db, endOp, t) & t.db.driver.Ready() THEN DoEndExec(t.db, t)\r\t\tELSE Put(t.db, endOp, t, \"\", dummy, NIL, NIL, NIL)\r\t\tEND\r\tEND Exec;\r\r\tPROCEDURE (t: StdTable) Available (): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " Synch(t.db, readOp, t)\r\tEND Available;\r\r\tPROCEDURE (t: StdTable) Read (row: INTEGER; VAR data: ANYREC);\r\t\tVAR item: Meta.Item;\r\tBEGIN\r\t\tWriteString(\"Read\");\r\t\tASSERT((row >= 0) OR (data IS Row) & (row >= -2), 21);\r\t\tASSERT(~t.db.executing OR (t.id >= t.db.id), 25);\r\t\tIF Synch(t.db, readOp, t) THEN\r\t\t\tLookupItem(item, data, FALSE);\r\t\t\tDoRead(t, row, item)\r\t\tELSE\r\t\t\tLookupItem(item, data, TRUE);\r\t\t\tPut(t.db, row, t, \"\", item, NIL, NIL, NIL)\r\t\tEND\r\tEND Read;\r\r\tPROCEDURE (t: StdTable) Clear;\r\tBEGIN\r\t\tWriteString(\"Clear\");\r\t\tASSERT(~t.db.executing OR (t.id >= t.db.id), 20);\r\t\tIF Synch(t.db, clearOp, t) THEN DoClear(t)\r\t\tELSE Put(t.db, clearOp, t, \"\", dummy, NIL, NIL, NIL)\r\t\tEND\r\tEND Clear;\r\r\tPROCEDURE (t: StdTable) Call (command: TableCommand; par: ANYPTR);\r\tBEGIN\r\t\tWriteString(\"Table Call\");\r\t\tASSERT(command # NIL, 20);\r\t\tASSERT(~t.db.executing OR (t.id >= t.db.id), 21);\r\t\tIF Synch(t.db, tcallOp, t) THEN command(t, par)\r\t\tELSE Put(t.db, tcallOp, t, \"\", dummy, NIL, command, par)\r\t\tEND\r\tEND Call;\r\r\r\t"
                    attr: 0
                  - text: "(* StdDatabase *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (d: StdDatabase) Exec (statement: ARRAY OF CHAR);\r\tBEGIN\r\t\tWriteString(\"Exec\");\r\t\tASSERT(d.driver # NIL, 100); ASSERT(statement # \"\", 20);\r\t\tIF Synch(d, beginOp, NIL) THEN DoBeginExec(d, NIL, statement)\r\t\tELSE Put(d, beginOp, NIL, statement, dummy, NIL, NIL, NIL)\r\t\tEND;\r\t\tIF Synch(d, endOp, NIL) & d.driver.Ready() THEN DoEndExec(d, NIL)\r\t\tELSE Put(d, endOp, NIL, \"\", dummy, NIL, NIL, NIL)\r\t\tEND\r\tEND Exec;\r\r\tPROCEDURE (d: StdDatabase) Commit;\r\tBEGIN\r\t\tWriteString(\"Commit\");\r\t\tIF Synch(d, commitOp, NIL) THEN DoCommit(d, TRUE)\r\t\tELSE Put(d, commitOp, NIL, \"\", dummy, NIL, NIL, NIL)\r\t\tEND\r\tEND Commit;\r\r\tPROCEDURE (d: StdDatabase) Rollback;\r\tBEGIN\r\t\tWriteString(\"Rollback\");\r\t\tIF Synch(d, rollbackOp, NIL) THEN DoCommit(d, FALSE)\r\t\tELSE Put(d, rollbackOp, NIL, \"\", dummy, NIL, NIL, NIL)\r\t\tEND\r\tEND Rollback;\r\r\tPROCEDURE (d: StdDatabase) Call (command: Command; par: ANYPTR);\r\tBEGIN\r\t\tWriteString(\"Call\");\r\t\tASSERT(command # NIL, 20);\r\t\tIF Synch(d, callOp, NIL) THEN command(par)\r\t\tELSE Put(d, callOp, NIL, \"\", dummy, command, NIL, par)\r\t\tEND\r\tEND Call;\r\r\tPROCEDURE (d: StdDatabase) NewTable (): Table;\r\t\tVAR t: StdTable;\r\tBEGIN\r\t\tASSERT(d.driver # NIL, 100);\r\t\tNEW(t);\r\t\tt.res := 0; t.rows := 0; t.columns := 0; t.strictNotify := FALSE;\r\t\tt.table := NIL; t.srows := 0; t.id := d.id;\r\t\tt.InitBase(d); t.db := d;\r\t\td.res := 0;\r\t\t"
                    attr: 0
