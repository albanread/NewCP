                    attr: 0
                  - text: "\t(* delayed operations *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE DoRead (t: StdTable; row: INTEGER; VAR item: Meta.Item);\r\t\tVAR col: INTEGER;\r\tBEGIN\r\t\tWriteString(\"DoRead\");\r\t\tASSERT(t.columns > 0, 20);\r\t\tIF row < t.rows THEN\r\t\t\tcol := 0; t.res := 0;\r\t\t\tReadItem(item, t, row, col);\r\t\tELSE\r\t\t\tClearItem(item);\r\t\t\tt.res := noData\r\t\tEND;\r\t\tIF t.strictNotify THEN\r\t\t\tDialog.Notify(item.adr, item.adr + item.Size(), {update, guardCheck});\r\t\tELSE\r\t\t\tNotifyLater(t.db, item.adr, item.adr + item.Size())\r\t\tEND\r\tEND DoRead;\r\r\tPROCEDURE DoClear (t: StdTable);\r\tBEGIN\r\t\tWriteString(\"DoClear\");\r\t\tIF (t.table # NIL) & (t.db.driver # NIL) THEN\r\t\t\tt.table.Close; t.table := NIL\r\t\tEND;\r\t\tt.res := 0; t.rows := 0; t.columns := 0; t.srows := 0\r\tEND DoClear;\r\r\tPROCEDURE DoEndOpen (d: StdDatabase);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tWriteString(\"DoEndOpen\");\r\t\tASSERT(d.driver.Ready(), 100);\r\t\td.driver.EndOpen(res);\r\t\td.res := res\r\tEND DoEndOpen;\r\r\tPROCEDURE DoBeginExec (d: StdDatabase; t: StdTable; VAR statement: ARRAY OF CHAR);\r\t\tVAR res: INTEGER; s: Statement;\r\tBEGIN\r\t\tWriteString(\"DoBeginExec\");\r\t\tCompile(d, statement, s);\r\t\tIF debug THEN\t\t\r\t\t\tIF s.ext # NIL THEN\r\t\t\t\ts.ext[s.idx] := 0X; WriteString(s.ext^)\r\t\t\tELSE\r\t\t\t\ts.buf[s.idx] := 0X; WriteString(s.buf)\r\t\t\tEND\r\t\tEND;\r\t\tIF t # NIL THEN DoClear(t) END;\r\t\tExecute(d, s);\r\t\tIF t # NIL THEN t.res := d.res END\r\tEND DoBeginExec;\r\r\tPROCEDURE DoEndExec (d: StdDatabase; t: StdTable);\r\t\tVAR dt: SqlDrivers.Table; rows, columns: INTEGER;\r\tBEGIN\r\t\tIF d.res = 0 THEN\r\t\t\tWriteString(\"DoEndExec\");\r\t\t\tASSERT(d.driver.Ready(), 100);\r\t\t\td.driver.EndExec(dt, rows, columns, d.res);\r\t\t\tIF t # NIL THEN\r\t\t\t\tt.rows := rows; t.srows := rows; t.columns := columns;\r\t\t\t\tt.table := dt; t.res := d.res;\r\t\t\t\tIF t.strictNotify THEN\r\t\t\t\t\tDialog.Notify("
