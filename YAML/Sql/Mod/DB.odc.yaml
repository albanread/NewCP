                  - text: "\r\r\tPROCEDURE NotifyLater (d: StdDatabase; adr0, adr1: INTEGER);\r\t\tVAR r: Range;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* register an address range for later notification via an action *)"
                    attr: 1
                  - text: "\r\t\tr := d.range; \r\t\tIF r = NIL THEN\r\t\t\tServices.DoLater(d.action, Services.now)\r\t\tELSE\r\t\t\tIF (d.lastRange # NIL) & (d.lastRange.adr1 < adr0) THEN \r\t\t\t\tr := NIL\r\t\t\tELSE\r\t\t\t\tWHILE (r # NIL) & ((r.adr1 < adr0) OR (r.adr0 > adr1)) DO r := r.next END\r\t\t\tEND\r\t\tEND;\r\t\tIF r # NIL THEN\r\t\t\tr.adr0 := MIN(r.adr0, adr0); r.adr1 := MAX(r.adr1, adr1)\r\t\tELSE\r\t\t\tNEW(r); r.adr0 := adr0; r.adr1 := adr1;\r\t\t\tr.next := d.range; d.range := r;\r\t\t\td.lastRange := r\r\t\tEND\r\tEND NotifyLater;\r\r\tPROCEDURE Update (d: StdDatabase);\r\t\tVAR r: Range;\r\tBEGIN\t"
                    attr: 0
