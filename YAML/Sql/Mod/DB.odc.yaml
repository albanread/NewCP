                  - text: "\r\t\ttab := t.table; tab.res := 0;\r\t\tCASE item.typ OF\r\t\t| Meta.boolTyp:\r\t\t\ttab.ReadInteger(row, col, i);\r\t\t\tIF i = 0 THEN item.PutBoolVal(FALSE) ELSE item.PutBoolVal(TRUE) END;\r\t\t\tINC(col)\r\t\t| Meta.byteTyp, Meta.sIntTyp, Meta.intTyp:\r\t\t\ttab.ReadInteger(row, col, i);\r\t\t\tIF (item.typ = Meta.byteTyp) & ((i < MIN(BYTE)) OR (i > MAX(BYTE)))\r\t\t\t\tOR (item.typ = Meta.sIntTyp) & ((i < MIN(SHORTINT)) OR (i > MAX(SHORTINT))) THEN\r\t\t\t\ti := 0; tab.res := overflow\r\t\t\tEND;\r\t\t\titem.PutIntVal(i); INC(col)\r\t\t| Meta.sRealTyp, Meta.realTyp:\r\t\t\ttab.ReadReal(row, col, r);\r\t\t\tIF (item.typ = Meta.sRealTyp) & ((r < MIN(SHORTREAL)) OR (r > MAX(SHORTREAL))) THEN\r\t\t\t\tr := 0; tab.res := overflow\r\t\t\tEND;\r\t\t\titem.PutRealVal(r); INC(col)\r\t\t| Meta.arrTyp:\r\t\t\tIF item.BaseTyp() = Meta.charTyp THEN\r\t\t\t\ttab.ReadString(row, col, "
