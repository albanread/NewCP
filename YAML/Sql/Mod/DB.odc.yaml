                    attr: 1
                  - text: "\r\t\tIF h = d.tail THEN\r\t\t\te.next := h; d.queue := e\r\t\tELSIF op >= clearOp THEN\t"
                    attr: 0
                  - text: "(* clear, read: insert after last op on same table *)"
                    attr: 1
                  - text: "\r\t\t\tk := NIL;\r\t\t\tWHILE h # d.tail DO\r\t\t\t\tIF h.table = t THEN k := h END;\r\t\t\t\th := h.next\r\t\t\tEND;\r\t\t\tIF k = NIL THEN e.next := d.queue; d.queue := e\r\t\t\tELSE e.next := k.next; k.next := e\r\t\t\tEND\r\t\tELSE\r\t\t\tWHILE h.next # d.tail DO h := h.next END;\r\t\t\te.next := h.next; h.next := e\r\t\tEND\r\tEND Put;\r\r\tPROCEDURE Synch (d: StdDatabase; op: INTEGER; t: StdTable): BOOLEAN;\r\t\t"
