                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Dialog, Ports, Views, TextModels, TextViews, TextRulers, TextMappers, SqlDB;\r\t\t\r\t\r\tCONST\r\t\tprotocol = \"SqlOdbc3\";\r\t\tid = \"\"; password = \"\";\r\t\tdatasource = \"Test Database\";\r\t\t\r\t\tcolWidth = 30 * Ports.mm;\r\t\tminCol = 4;\r\t\t\r\t\t\r\tVAR\r\t\tname*: ARRAY 64 OF CHAR;\r\t\t\r\r\tPROCEDURE NewRuler (tabs: INTEGER): TextRulers.Ruler;\r\t\tVAR p: TextRulers.Prop; i, w: INTEGER;\r\tBEGIN\r\t\tNEW(p);\r\t\tIF tabs > LEN(p.tabs.tab) THEN tabs := LEN(p.tabs.tab)\r\t\tELSIF tabs < minCol THEN tabs := minCol\r\t\tEND;\r\t\tp.valid := {TextRulers.right, TextRulers.tabs, TextRulers.opts};\r\t\tp.opts.val := {TextRulers.rightFixed}; p.opts.mask := p.opts.val;\r\t\tp.tabs.len := tabs - 1; i := 0; w := 0;\r\t\tWHILE i < tabs - 1 DO\r\t\t\tINC(w, colWidth); p.tabs.tab[i].stop := w; INC(i)\r\t\tEND;\r\t\tINC(w, colWidth); p.right := w;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TextRulers.dir.NewFromProp(p)\r\tEND NewRuler;\r\r\tPROCEDURE OpenViewer (t: TextModels.Model; title: Views.Title; ruler:TextRulers.Ruler);\r\t\tVAR v: TextViews.View;\r\tBEGIN\r\t\tDialog.MapString(title, title);\r\t\tv := TextViews.dir.New(t);\r\t\tIF ruler # NIL THEN v.SetDefaults(ruler, TextViews.dir.defAttr) END;\r\t\tViews.OpenAux(v, title)\r\tEND OpenViewer;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ShowTables
                    attr: 3
                  - text: "*;\r\t\tVAR db: SqlDB.Database; t, tabs: SqlDB.Table; res, row, col, n, max: INTEGER;\r\t\t\ttext: TextModels.Model; out: TextMappers.Formatter; data: SqlDB.Row;\r\tBEGIN\r\t\ttext := TextModels.dir.New(); out.ConnectTo(text);\r\t\tSqlDB.OpenDatabase(protocol, id, password, datasource, SqlDB.async, SqlDB.showErrors, db, res);\r\t\ttabs := db.NewTable();\r\t\ttabs.Exec(\"Show Tables\");\r\t\tn := 0; max := 0;\r\t\tWHILE n < tabs.rows DO\r\t\t\ttabs.Read(n, data);\r\t\t\tname := data.fields[1]^$;\r\t\t\tout.WriteLn;\r\t\t\tout.WriteString(\"Table \"); out.WriteString(name); out.WriteLn;\r\t\t\tout.WriteLn;\r\t\t\tt := db.NewTable();\r\t\t\tt.Exec(\"select * from :!SqlObxTab.name\");\r\t\t\trow := SqlDB.names;\r\t\t\tWHILE row < t.rows DO\r\t\t\t\tt.Read(row, data); col := 0;\r\t\t\t\tWHILE col < t.columns DO\r\t\t\t\t\tout.WriteString(data.fields[col]^); out.WriteTab;\r\t\t\t\t\tINC(col)\r\t\t\t\tEND;\r\t\t\t\tout.WriteLn; INC(row)\r\t\t\tEND;\r\t\t\tIF t.columns > max THEN max := t.columns END;\r\t\t\tt.Clear; INC(n)\r\t\tEND;\r\t\tOpenViewer(text, \"Tables\", NewRuler(max))\r\tEND ShowTables;\r\t\rEND SqlObxTab.\r"
                    attr: 0
