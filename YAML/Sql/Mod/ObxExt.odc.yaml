                  - text: Open
                    attr: 3
                  - text: "*;\r\t\tVAR d: SqlDB.Database; res: INTEGER;\r\tBEGIN\r\t\tSqlDB.OpenDatabase(protocol, id, password, datasource, SqlDB.async, SqlDB.hideErrors, d, res);\r\t\tIF d # NIL THEN\r\t\t\ttable := d.NewTable()\r\t\tEND\r\tEND Open;\r\r\r\tPROCEDURE "
                    attr: 0
                  - text: FindOwner
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\ttable.Exec(\"SELECT * FROM Companies WHERE id = :SqlObxExt.company0.id\");\r\t\ttable.Read(0, company0);\r\t\ttable.Exec(\"SELECT * FROM Ownership WHERE owner = :SqlObxExt.company0.id AND owned = :SqlObxExt.company1.id\");\r\t\ttable.Read(0, ownership)\r\tEND FindOwner;\r\r\tPROCEDURE "
