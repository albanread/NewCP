                  - text: "*;\r\tBEGIN\r\t\ttable.Exec(\"SELECT * FROM Companies WHERE id = :SqlObxExt.company1.id\");\r\t\ttable.Read(0, company1);\r\t\ttable.Exec(\"SELECT * FROM Ownership WHERE owner = :SqlObxExt.company0.id AND owned = :SqlObxExt.company1.id\");\r\t\ttable.Read(0, ownership)\r\tEND FindOwned;\r\r\tPROCEDURE "
                    attr: 0
                  - text: UpdatePercent
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\townership.owner := company0.id; ownership.owned := company1.id;\r\t\ttable.base.Exec(\"DELETE FROM Ownership WHERE owner = :SqlObxExt.ownership.owner AND owned = :SqlObxExt.ownership.owned\");\r\t\ttable.base.Exec(\"INSERT INTO Ownership VALUES (:SqlObxExt.ownership)\");\r\t\ttable.base.Commit;\r\t\t"
