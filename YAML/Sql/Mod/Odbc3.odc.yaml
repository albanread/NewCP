                  - text: "* (id, password, datasource: ARRAY OF CHAR; async, showErr: BOOLEAN;\r\t\t\t\t\t\t\t\t\t\t\tOUT d: SqlDrivers.Driver; OUT res: INTEGER);\r\t\tVAR h: Driver; r: INTEGER; len: SHORTINT; str: ARRAY 26 OF CHAR;\r\tBEGIN\r\t\tNEW(h); d := NIL; h.showErr := showErr;\r\t\tres := WinSql.SQL_SUCCESS;\r\t\tIF numConnections = 0 THEN\r\t\t\tres := WinSql.SQLAllocHandle(WinSql.SQL_HANDLE_ENV, WinSql.SQL_NULL_HANDLE, environment); \r\t\t\t(* Set ODBC version to ODBC3 *)\r\t\t\tIF res = WinSql.SQL_SUCCESS THEN\r\t\t\t\tCheck(WinSql.SQLSetEnvAttr(environment, WinSql.SQL_ATTR_ODBC_VERSION,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWinSql.SQL_OV_ODBC3, 0), \r\t\t\t\t\t\th, 0, res)\r\t\t\tEND;\r\t\tEND;\r\t\tIF res = WinSql.SQL_SUCCESS THEN\r\t\t\tCheck(WinSql.SQLAllocHandle(WinSql.SQL_HANDLE_DBC, environment, h.dbc), h, 0, res);\r\t\t\tIF res = 0 THEN\r\t\t\t\tCheck(WinSql.SQLConnectW(h.dbc, datasource, WinSql.SQL_NTS,\r\t\t\t\t\t\t\t\t\t\t\t\t\tid, WinSql.SQL_NTS,\r\t\t\t\t\t\t\t\t\t\t\t\t\tpassword, WinSql.SQL_NTS), h, 0, res);\r\t\t\t\tIF res = 0 THEN\r\t\t\t\t\tIF showErr THEN\r\t\t\t\t\t\tCheck(WinSql.SQLSetConnectAttr(h.dbc, WinSql.SQL_QUIET_MODE, HostWindows.main, 0), h, 0, r)\r\t\t\t\t\tELSE\r\t\t\t\t\t\tr := WinSql.SQLSetConnectAttr(h.dbc, WinSql.SQL_QUIET_MODE, WinApi.NULL, 0)\r\t\t\t\t\tEND;\r\t\t\t\t\th.Init(\"?\");\r\t\t\t\t\tCheck(WinSql.SQLGetInfoW(h.dbc,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWinSql.SQL_FETCH_DIRECTION, SYSTEM.ADR(h.directions), 4, len),\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\th, 0, r);\r\t\t\t\t\t"
                    attr: 0
                  - text: "(* ODBC default is SQL_AUTOCOMMIT_ON *) "
                    attr: 1
                  - text: "\r\t\t\t\t\tIF ~autoCommit THEN\r\t\t\t\t\t\tCheck(WinSql.SQLSetConnectAttr(h.dbc, WinSql.SQL_AUTOCOMMIT,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWinSql.SQL_AUTOCOMMIT_OFF, 0), h, 0, r)\r\t\t\t\t\tEND;\r\t\t\t\t\tCheck(WinSql.SQLGetInfoW(h.dbc, WinSql.SQL_DBMS_NAME, SYSTEM.ADR(str), 255, len), h, 0, r);\r\t\t\t\t\tIF str = \"Microsoft SQL Server\" THEN"
                    attr: 0
                  - text: "\r\t\t\t\t\t\t(* If SQLServer is used Preserve Cursors must be set to ON.\r\t\t\t\t\t\tOther drivers probably don't support this. *)\r\t\t\t\t\t\t"
                    attr: 1
                  - text: "Check(WinSql.SQLSetConnectAttr(h.dbc, WinSql.SQL_PRESERVE_CURSORS,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWinSql.SQL_PC_ON,0), h, 0,r);\r\t\t\t\t\tEND;\r\t\t\t\t\th.showErr := showErr; h.state := connecting; d := h; INC(numConnections)\r\t\t\t\tELSE\r\t\t\t\t\tCheck(WinSql.SQLFreeHandle(WinSql.SQL_HANDLE_DBC, h.dbc), h, 0, r);\r\t\t\t\t\tIF numConnections = 0 THEN\r\t\t\t\t\t\tCheck(WinSql.SQLFreeHandle(WinSql.SQL_HANDLE_ENV, environment), NIL, 0, r)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF res # wrongIdentification THEN res := cannotOpenDB END\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tIF numConnections = 0 THEN\r\t\t\t\t\tCheck(WinSql.SQLFreeHandle(WinSql.SQL_HANDLE_ENV, environment), NIL, 0, r);\r\t\t\t\tEND;\r\t\t\t\tres := cannotOpenDB\r\t\t\tEND\r\t\tELSE res := cannotOpenDB\r\t\tEND;\r\tEND Open;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SetMode
                    attr: 3
                  - text: "* (d: SqlDrivers.Driver; autocommit: BOOLEAN; OUT res: INTEGER);\r\t"
                    attr: 0
                  - text: "(* implicit COMMIT *)"
                    attr: 1
                  - text: "\r\t\tVAR h: Driver;\r\tBEGIN\r\t\th := d(Driver);\r\t\tIF autocommit THEN\r\t\t\tCheck(WinSql.SQLSetConnectAttr(h.dbc, WinSql.SQL_AUTOCOMMIT, WinSql.SQL_AUTOCOMMIT_ON, 0),\r\t\t\t\t\t\th, 0, res)\r\t\tELSE\r\t\t\tCheck(WinSql.SQLSetConnectAttr(h.dbc, WinSql.SQL_AUTOCOMMIT, WinSql.SQL_AUTOCOMMIT_OFF, 0),\r\t\t\t\t\t\th, 0, res)\r\t\tEND\r\tEND SetMode;\r\rEND SqlOdbc3.\r"
                    attr: 0
