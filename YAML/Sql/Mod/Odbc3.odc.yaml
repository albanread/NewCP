                  - text: "\"\r\tissues\t= \""
                    attr: 1
                  - fold:
                      collapsed: true
                      hidden:
                        - text: "\r"
                          attr: 0
                        - text: "\t- Should rowcount and/or SetMode be lifted into the SqlDB interface?\r\t- If ODBC returns a string with undefined length, how should this be handled?\r\t- Can the import of HostWindows be eliminated?\r\t- What should be done if SQLExtendedFetch doesn't support the necessary options?\r\t- t.ReadName/ReadBlob/ReadType/ReadVarString have OUT parameters that prevent string recycling.\r\t  What's better: leave it as it is, and thus give the garbage collector more work to do; or use VAR\r\t  parameters for optimization, with the danger that a variable taken out of an interactor may change unexpectedly? *)\r\t- For async queries running in parallel, do we need a separate connection for every table,\r\t  to avoid reentrance problems?\r"
                          attr: 1
                        - text: "\t"
                          attr: 0
                      body: []
                      attr: 1
                      w: 123825
                      h: 133350
                  - text: "\"\r"
                    attr: 1
