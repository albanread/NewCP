                  - text: "\"\r\tchanges\t= \""
                    attr: 1
                  - fold:
                      collapsed: true
                      hidden:
                        - text: "\r\t- 20050714, mf, Check, case WinSql.SQL_ERROR:\r\t\t\tIF (d # NIL) & d.showErr THEN\r\t\tinstead of\r\t\t\tIF ((d # NIL) & d.showErr) & (state # \"01004\") THEN\r\t- 20150519, center #49, Unicode fixes and deadlock removal\r\t"
                          attr: 0
                      body: []
