                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT "
                    attr: 0
                  - text: SYSTEM
                    attr: 3
                  - text: ", WinApi, WinSql, Services, Dates, Dialog, Log, SqlDrivers, HostWindows;\r\r\t"
                    attr: 0
                  - text: "(* ODBC functions used:\r\t\tcore:\r\t\t\tSQLConnect\r\t\t\tSQLDescribeCol\r\t\t\tSQLDisconnect\r\t\t\tSQLExecute\r\t\t\tSQLNumResultCols\r\t\t\tSQLPrepare\r\t\t\tSQLRowCount\r\t\tlevel 1:\r\t\t\tSQLBindParameter\t(* for blobs *)\r\t\t\tSQLGetData\r\t\t\tSQLGetInfo\r\t\tlevel 2:\r\t\t\t-\r\t\tlevel 3:\r\t\t\tSQLAllocHandle\r\t\t\tSQLEndTran\r\t\t\tSQLFetchScroll\r\t\t\tSQLFreeHandle\r\t\t\tSQLGetDiagRec\r\t\t\tSQLGetStmtAttr\r\t\t\tSQLSetConnectAttr\r\t\t\tSQLSetEnvAttr\r\t\t\tSQLSetStmtAttr\r\t*)"
                    attr: 1
                  - text: "\r\r\t"
                    attr: 0
                  - text: "(* The major problem with ODBC is that many of its functions, or many uses of them, are optional.\r\t\tThis means that one can never rely on a function to be really implemented by the current ODBC driver.\r\t\tAs a result, one often has to try the best approach first, then back off if necessary to the next best, etc.\r\t\tThis is cumbersome and difficult to test exhaustively. *)"
                    attr: 1
                  - text: "\r\r\tCONST\r"
                    attr: 0
                  - text: "\t\t(* results for driver open and methods *)\r"
                    attr: 1
                  - text: "\t\toutOfTables = 5;\r\t\tnotExecutable = 6;\r\t\tcannotOpenDB = 7;\r\t\twrongIdentification = 8;\r\t\ttooManyBlobs = 9;\r\r"
                    attr: 0
                  - text: "\t\t(* results  as in SqlDB, 0 = ok *)"
                    attr: 1
                  - text: "\r\t\tconverted = 1;\r\t\ttruncated = 2;\r\t\toverflow = 3;\r\t\tincompatible = 4;\r\t\tnoData = 5;\r\t\t\r\t\t"
                    attr: 0
                  - text: "(* internal result codes *)"
                    attr: 1
                  - text: "\r\t\tinvalidTransaction = 10;\r\t\tmoreData = 11;"
                    attr: 0
                  - text: "\t(* like truncated but remaining data needs to be read in order to avoid a deadlock *)"
                    attr: 1
                  - text: "\r\r"
                    attr: 0
                  - text: "\t\t(* driver states *)\r"
                    attr: 1
                  - text: "\t\tconnecting = 1;\r\t\tconnected = 2;\r\t\tpreparing = 3;\r\t\texecuting = 4;\r\t\texecuted = 5;\r\t\tclosed = 6;\r\r\tTYPE\r\t\tDriver = POINTER TO RECORD (SqlDrivers.Driver)\r\t\t\tstate: INTEGER;"
                    attr: 0
                  - text: "\t(* IN {connecting, connected, executing, closed} *)"
                    attr: 1
                  - text: "\r\t\t\tshowErr: BOOLEAN;\r\t\t\tactStmt: WinSql.HSTMT;\r\t\t\tactRes: INTEGER;\t"
                    attr: 0
                  - text: "(* result of async operation *)"
                    attr: 1
                  - text: "\r\t\t\tdbc: WinSql.HDBC;\r\t\t\tdirections: SET\t"
                    attr: 0
                  - text: "(* supported Fetch directions *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\r\t\tTable = POINTER TO RECORD (SqlDrivers.Table)\r\t\t\trows, columns: INTEGER;\r\t\t\tactRow, actCol: INTEGER;\r\t\t\tstmt: WinSql.HSTMT;\r\t\t\tdriver: Driver\r\t\tEND;\r\r\r\tVAR\r\t\t"
                    attr: 0
                  - text: debug
                    attr: 3
                  - text: "*: BOOLEAN;\t"
                    attr: 0
                  - text: "(* if TRUE, show more information about what's happening *)"
                    attr: 1
                  - text: "\r\t\t"
                    attr: 0
                  - text: autoCommit
                    attr: 3
                  - text: "*: BOOLEAN;\t"
                    attr: 0
                  - text: "(* by default, automatic commit is disabled *)"
                    attr: 1
                  - text: "\r\t\t"
                    attr: 0
                  - text: rowcount
                    attr: 3
                  - text: "*: INTEGER;\t"
                    attr: 0
                  - text: "(* number of rows affected in last update, insert, delete *)"
                    attr: 1
                  - text: "\r\t\tenvironment: WinSql.HENV;\t"
                    attr: 0
                  - text: "(* ODBC environment, in which everything happens *)"
                    attr: 1
                  - text: "\r\t\tnumConnections: INTEGER;\t"
                    attr: 0
                  - text: "(* free the environment, if the number of connections goes to zero *)"
                    attr: 1
                  - text: "\r\r\r\t"
                    attr: 0
                  - text: "(* miscellaneous *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE Check (ret: INTEGER; d: Driver; stmt: WinSql.HSTMT; OUT res: INTEGER);\r\t\tVAR err: INTEGER; len: SHORTINT; state, msg: ARRAY 256 OF CHAR;\r\tBEGIN\r\t\tCASE ret OF\r\t\t| WinSql.SQL_SUCCESS:\r\t\t\tres := 0\r\t\t| WinSql.SQL_SUCCESS_WITH_INFO:\r\t\t\tres := WinSql.SQLGetDiagRecW(WinSql.SQL_HANDLE_STMT, stmt, 1, state, err, msg, LEN(msg), len);\r\t\t\tIF (res = WinSql.SQL_NO_DATA) OR (res = WinSql.SQL_INVALID_HANDLE) OR (msg = \"\") THEN\r\t\t\t\tIF d # NIL THEN \r\t\t\t\t\tres := WinSql.SQLGetDiagRecW(WinSql.SQL_HANDLE_DBC, d.dbc, 1, state, err, msg, LEN(msg), len);\r\t\t\t\t\tIF (res = WinSql.SQL_NO_DATA) OR (msg = \"\") THEN\r\t\t\t\t\t\tres := WinSql.SQLGetDiagRecW(WinSql.SQL_HANDLE_ENV, environment,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t1, state, err, msg, LEN(msg), len)\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\t\tres := WinSql.SQLGetDiagRecW(WinSql.SQL_HANDLE_ENV, environment,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t1, state, err, msg, LEN(msg), len)\r\t\t\t\tEND;\r\t\t\tEND;\r\t\t\tIF debug THEN Log.String(msg$); Log.Ln END;\r\t\t\tIF state = \"01004\" THEN res := moreData ELSE res := 0 END\r\t\t| WinSql.SQL_ERROR:\r\t\t\tres := WinSql.SQLGetDiagRecW(WinSql.SQL_HANDLE_STMT, stmt, 1, state, err, msg, LEN(msg), len);\r\t\t\tIF (res = WinSql.SQL_NO_DATA) OR (res = WinSql.SQL_INVALID_HANDLE) OR (msg = \"\") THEN\r\t\t\t\tIF d # NIL THEN \r\t\t\t\t\tres := WinSql.SQLGetDiagRecW(WinSql.SQL_HANDLE_DBC, d.dbc, 1, state, err, msg, LEN(msg), len);\r\t\t\t\t\tIF (res = WinSql.SQL_NO_DATA) OR (msg = \"\") THEN\r\t\t\t\t\t\tres := WinSql.SQLGetDiagRecW(WinSql.SQL_HANDLE_ENV, environment,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t1, state, err, msg, LEN(msg), len)\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\t\tres := WinSql.SQLGetDiagRecW(WinSql.SQL_HANDLE_ENV, environment,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t1, state, err, msg, LEN(msg), len)\r\t\t\t\tEND;\r\t\t\tEND;\r\t\t\tIF (d # NIL) & d.showErr THEN\r\t\t\t\tres := WinApi.MessageBoxW(0, msg, \"ODBC Error\", {})\r\t\t\tELSIF debug THEN Log.String(msg$); Log.Ln\r\t\t\tEND;\t\t\t\r\t\t\tIF state = \"01004\" THEN res := truncated\r\t\t\tELSIF state = \"28000\" THEN res := wrongIdentification\r\t\t\tELSIF state = \"07006\" THEN res := incompatible\r\t\t\tELSIF state = \"22003\" THEN res := overflow\r\t\t\tELSIF state = \"22005\" THEN res := overflow\r\t\t\tELSIF state = \"22008\" THEN res := overflow\r\t\t\tELSIF state = \"25000\" THEN res := invalidTransaction\r\t\t\tELSE res := noData\t"
                    attr: 0
                  - text: "(* default error *)"
                    attr: 1
                  - text: "\r\t\t\tEND\r\t\t| WinSql.SQL_NO_DATA:\r\t\t\tres := noData\r\t\t| WinSql.SQL_INVALID_HANDLE:\r\t\t\t"
                    attr: 0
                  - text: HALT
                    attr: 3
                  - text: "(100)\r\t\t| WinSql.SQL_STILL_EXECUTING:\r\t\t\t "
                    attr: 0
                  - text: HALT
                    attr: 3
                  - text: "(101)\r\t\t| WinSql.SQL_NEED_DATA:\r\t\t\t"
                    attr: 0
                  - text: HALT
                    attr: 3
                  - text: "(102)\r\t\tEND\r\tEND Check;\r\r\r\tPROCEDURE GetTableSize (t: Table; VAR n: INTEGER);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tres := -1;\r\t\tIF t.driver.directions * (WinSql.SQL_FD_FETCH_LAST + WinSql.SQL_FD_FETCH_ABSOLUTE) # {} THEN\r\t\t\tIF t.driver.directions * WinSql.SQL_FD_FETCH_LAST # {} THEN\r\t\t\t\tCheck(WinSql.SQLFetchScroll(t.stmt, WinSql.SQL_FETCH_LAST, 0), NIL, t.stmt, res);\r\t\t\tELSE\r\t\t\t\tCheck(WinSql.SQLFetchScroll(t.stmt, WinSql.SQL_FETCH_ABSOLUTE, -1), NIL, t.stmt, res);\r\t\t\tEND;\r\t\t\tIF res = noData THEN \r\t\t\t\tn := 0; res := 0;\r\t\t\tELSIF res = 0 THEN\r\t\t\t\tCheck(WinSql.SQLGetStmtAttr(t.stmt, WinSql.SQL_ROW_NUMBER, SYSTEM.ADR(n),  \r\t\t\t\t\t\t\t\t\t\t\t\t\t\tWinSql.SQL_IS_INTEGER, NIL), NIL, t.stmt, res) ;\r\t\t\t\t(* Double check the rowcount if it is said to be zero or one.  *)\t\t\t\t\t\t\t\t\t\t\t\t\t\t\r\t\t\t\tIF (n = 0) OR (n = 1) THEN\r\t\t\t\t\tn := 0;\r\t\t\t\t\tCheck(WinSql.SQLFetchScroll(t.stmt, WinSql.SQL_FETCH_FIRST, 0), NIL, t.stmt, res);\r\t\t\t\t\tWHILE res = 0 DO\r\t\t\t\t\t\tINC(n);\r\t\t\t\t\t\tCheck(WinSql.SQLFetchScroll(t.stmt, WinSql.SQL_FETCH_NEXT, 0), NIL, t.stmt, res);\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tres := 0;\r\t\t\tEND;\r\t\t\tt.actRow := -2"
                    attr: 0
                  - text: "\t(* undefined *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\t\tIF (res # 0) & (t.driver.directions * WinSql.SQL_FD_FETCH_FIRST # {}) THEN\r\t\t\tCheck(WinSql.SQLFetchScroll(t.stmt, WinSql.SQL_FETCH_FIRST, 0), NIL, t.stmt, res);\r\t\t\tn := 0;\r\t\t\tWHILE res = 0 DO\r\t\t\t\tINC(n);\r\t\t\t\tCheck(WinSql.SQLFetchScroll(t.stmt, WinSql.SQL_FETCH_NEXT, 0), NIL, t.stmt, res)\r\t\t\tEND;\r\t\t\tIF res = noData THEN res := 0 END;\r\t\t\tt.actRow := -2"
                    attr: 0
                  - text: "\t(* undefined *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\t\tIF res # 0 THEN\r\t\t\tCheck(WinSql.SQLRowCount(t.stmt, n), NIL, t.stmt, res);\r\t\t\tIF (res # 0) OR (n < 0) THEN n := MAX(INTEGER) END\t"
                    attr: 0
                  - text: "(* row count is not known *)"
                    attr: 1
                  - text: "\r\t\tEND\r\tEND GetTableSize;\r\r\tPROCEDURE SetPos (t: Table; row, col: INTEGER; OUT res: INTEGER);\r\tBEGIN\r\t\tres := 0;\r\t\tIF (row # t.actRow) OR (col <= t.actCol) THEN\r\t\t\tIF row = t.actRow + 1 THEN\r\t\t\t\tCheck(WinSql.SQLFetchScroll(t.stmt, WinSql.SQL_FETCH_NEXT, 0), NIL, t.stmt, res);\r\t\t\t\tIF res = 0 THEN INC(t.actRow) END\r\t\t\tELSIF (row = 0) & (t.driver.directions * WinSql.SQL_FD_FETCH_FIRST # {}) THEN\r\t\t\t\tCheck(WinSql.SQLFetchScroll(t.stmt, WinSql.SQL_FETCH_FIRST, 0), NIL, t.stmt, res);\r\t\t\t\tIF res = 0 THEN t.actRow := 0 END\r\t\t\tELSIF t.driver.directions * WinSql.SQL_FD_FETCH_ABSOLUTE # {} THEN\r\t\t\t\tCheck(WinSql.SQLFetchScroll(t.stmt, WinSql.SQL_FETCH_ABSOLUTE, row + 1), NIL, t.stmt, res);\r\t\t\t\tIF res = 0 THEN t.actRow := row END\r\t\t\tELSIF t.driver.directions * WinSql.SQL_FD_FETCH_RELATIVE # {} THEN\r\t\t\t\tCheck(WinSql.SQLFetchScroll(t.stmt, WinSql.SQL_FETCH_RELATIVE, row - t.actRow),\r\t\t\t\t\t\tNIL, t.stmt, res);\r\t\t\t\tIF res = 0 THEN t.actRow := row END\r\t\t\tELSIF row <= t.actRow THEN\r\t\t\t\tIF (row > t.actRow DIV 2) & (t.driver.directions * WinSql.SQL_FD_FETCH_PRIOR # {}) THEN\r\t\t\t\t\tREPEAT\r\t\t\t\t\t\tCheck(WinSql.SQLFetchScroll(t.stmt, WinSql.SQL_FETCH_PRIOR, 0), NIL, t.stmt, res);\r\t\t\t\t\t\tIF res = 0 THEN DEC(t.actRow) END\r\t\t\t\t\tUNTIL (t.actRow <= row) OR (res # 0)\r\t\t\t\tELSE\r\t\t\t\t\tCheck(WinSql.SQLFetchScroll(t.stmt, WinSql.SQL_FETCH_FIRST, 0), NIL, t.stmt, res);\r\t\t\t\t\tIF res = 0 THEN t.actRow := 0 END\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tWHILE (t.actRow < row) & (res = 0) DO\r\t\t\t\tCheck(WinSql.SQLFetchScroll(t.stmt, WinSql.SQL_FETCH_NEXT, 0), NIL, t.stmt, res);\r\t\t\t\tIF res = 0 THEN INC(t.actRow) END\r\t\t\tEND\r\t\tEND;"
                    attr: 0
                  - text: "\r"
                    attr: 3
                  - text: "\t\tIF res = 0 THEN t.actCol := col ELSE res := noData END\r\tEND SetPos;\r\r\t"
                    attr: 0
                  - text: "(* Driver *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (d: Driver) Ready (): BOOLEAN;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF d.state = preparing THEN\r\t\t\td.actRes := WinSql.SQLPrepareW(d.actStmt, \"\", WinSql.SQL_NTS);\r\t\t\tIF d.actRes = WinSql.SQL_SUCCESS THEN\r\t\t\t\td.actRes := WinSql.SQLExecute(d.actStmt); d.state := executing\r\t\t\tELSIF d.actRes = WinSql.SQL_SUCCESS_WITH_INFO THEN\r\t\t\t\tCheck(d.actRes, d, d.actStmt, res);\r\t\t\t\td.actRes := WinSql.SQLExecute(d.actStmt); d.state := executing\r\t\t\tEND;\r\t\t\tIF d.actRes # WinSql.SQL_STILL_EXECUTING THEN d.state := executed END\r\t\tELSIF d.state = executing THEN\r\t\t\td.actRes := WinSql.SQLExecute(d.actStmt);\r\t\t\tIF d.actRes # WinSql.SQL_STILL_EXECUTING THEN d.state := executed END\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " d.state IN {connecting, connected, executed}\r\tEND Ready;\r\r\tPROCEDURE (d: Driver) EndOpen (OUT res: INTEGER);\r\tBEGIN\r\t\td.state := connected; res := 0\r\tEND EndOpen;\r\r\tPROCEDURE (d: Driver) BeginExec (IN statement: ARRAY OF CHAR; data: SqlDrivers.Blob;\r\t\t\t\t\t\t\t\t\t\t\t\t\tasync, showErr: BOOLEAN; OUT res: INTEGER);\r\t"
                    attr: 0
                  - text: "(* Pre: statement # \"\"\t20 *)"
                    attr: 1
                  - text: "\r\t"
                    attr: 0
                  - text: "(* Post: res = 0 <=> execution has started and should be completed later with EndExec *)"
                    attr: 1
                  - text: "\r\t\tVAR stmt: WinSql.HSTMT; r: INTEGER; p: SHORTINT;\r\tBEGIN\r\t\tIF debug THEN Log.String(statement); Log.Ln END;\r\t\tASSERT(statement # \"\", 20); ASSERT(d.state = connected, 21);\r\t\td.showErr := showErr;\r\t\tres := WinSql.SQLAllocHandle(WinSql.SQL_HANDLE_STMT, d.dbc, stmt);\r\t\tIF res # WinSql.SQL_SUCCESS THEN\r\t\t\tServices.Collect; res := WinSql.SQLAllocHandle(WinSql.SQL_HANDLE_STMT, d.dbc, stmt)\r\t\tEND;\r\t\tCheck(res, d, 0, res);\r\t\tIF res = 0 THEN\r\t\t\tCheck(WinSql.SQLSetStmtAttr(stmt, WinSql.SQL_CURSOR_TYPE, WinSql.SQL_CURSOR_STATIC, 0),\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tNIL, stmt, res);\r\t\t\tp :=1;\r\t\t\tWHILE data # NIL DO\t"
                    attr: 0
