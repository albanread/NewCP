                      opts: 0x00000009
                      attr: 1
                      w: 360000000
                      h: 444500
                  - target:
                      name: Introduction
                      body:
                        - text: Introduction
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rOne of the most important applications of personal computers is as database frontends, i.e., as user interfaces to a database management system (DBMS). For small applications, the database resides on the same computer as the frontend, thus only one single user can access the database at any one time. For more demanding applications, the database is moved to a central server, to which several client PCs are connected, e.g. via a local area network. A client provides a graphical user interface and runs the application software; the server performs data storage. Typically, several clients may access the same database concurrently.\rToday, the most important DBMS systems are based on a relational data model and use the SQL language (Structured Query Language) as the means to define, retrieve, and manipulate data.\rThe Sql subsystem for BlackBox provides a simple, portable, extensible, and integrated access mechanism to SQL databases. It is extensible, i.e., different database implementations can be interfaced through suitable driver modules. Today, there exists one driver module: a generic one that uses Microsoft's ODBC (Open Database Connectivity) standard. The ODBC driver comes standard with BlackBox ("
                    attr: 2
                  - text: SqlOdbc
                    attr: 4
                  - text: " and "
                    attr: 2
                  - text: SqlOdbc3
                    attr: 4
                  - text: ", respectively).\r\rIt is assumed that the reader knows about database design, SQL, and BlackBox; in particular the latter's "
                    attr: 2
                  - text: Form
                    attr: 4
                  - text: " subsystem, controls, and module "
                    attr: 2
                  - text: Dialog
                    attr: 4
                  - text: ".\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000009
                      attr: 1
                      w: 360000000
                      h: 444500
                  - target:
                      name: Overview
                      body:
                        - text: Overview
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rThe following goals have been pursued in the design of the Sql subsystem:\r\r"
                    attr: 2
                  - text: Simplicity
                    attr: 4
                  - text: "\rExisting interfaces to SQL are often very complicated to use. Sql provides an interface that is easier to learn and to use than other interfaces with a similar level of flexibility. The central programming interface (module "
                    attr: 2
                  - text: SqlDB
                    attr: 4
                  - text: ") only exports two major and a few minor data types. The major datatypes are the interface types "
                    attr: 2
                  - text: SqlDB.Database
                    attr: 4
                  - text: " and "
                    attr: 2
                  - text: SqlDB.Table
                    attr: 4
                  - text: ". They provide object-oriented abstractions for SQL databases and SQL result tables, respectively. Elements of a result table can be read into Component Pascal records, i.e., into objects that represent one single row of a table.\r\r"
                    attr: 2
                  - text: Full access to SQL
                    attr: 4
                  - text: "\rIt has not been attempted to hide SQL. SQL is too powerful to be completely hidden behind \"magic\" database-aware controls, for example. Sql is oriented towards the professional developer, it is not attempted to provide \"end-user\" tools.\r\r"
                    attr: 2
                  - text: Integration
                    attr: 4
                  - text: "\rOften, SQL statements need to be constructed at run-time. In particular, actual parameters must be spliced into statements which contain symbolic place holders as formal parameters. In Sql, this need not be done manually by the programmer. Instead, BlackBox's built-in metaprogramming facilities are used to do it automatically. In fact, a dynamically interpreted kind of \"embedded\" SQL is realized, where Component Pascal variable names can be used directly in SQL statements.\r\r"
                    attr: 2
                  - text: Extensibility
                    attr: 4
                  - text: "\rApplication programs use the "
                    attr: 2
                  - text: SqlDB
                    attr: 4
                  - text: " programming interface. This interface is implemented on top of a lower-level driver interface ("
                    attr: 2
                  - text: SqlDrivers
                    attr: 4
                  - text: "). This driver interface is defined in a component-oriented style, i.e., different driver implementations can be used without invalidating application programs. In fact, several different drivers could be used in the same application concurrently.\r\r"
                    attr: 2
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 45
                      bodyPos: 3429
                      bodyLen: 2767
                    attr: 2
                    w: 2701770
                    h: 2321010
                  - text: "\r\rFigure a  Simple application interface, extensible driver interface\r\r"
                    attr: 2
                  - text: Separation of program logic and user interface
                    attr: 4
                  - text: "\rFor clarity, maintainability, and maximum platform independence, user interface and program logic (the latter including the so-called \"business logic\") are separated as far as possible. A graphical user interface is treated as a merely cosmetic addition to the program, and can be modified without touching the core application's source code. In fact, a command button or a text entry field need not even be \"database-aware\" in order to invoke database operations or to represent database contents.\rA program produces and consumes database contents via so-called interactor objects, i.e., Component Pascal records. Such record variables are used as sources and destinations of command parameters or result data.\r\r"
                    attr: 2
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 46
                      bodyPos: 6246
                      bodyLen: 868
                    attr: 2
                    w: 2425662
                    h: 2489162
                  - text: "\rFigure b  Interactors as switchboards for application program, DBMS, and user interface\r\r"
                    attr: 2
                  - text: "Framework-friendly, user-friendly"
                    attr: 4
                  - text: "\rA framework depends on the cooperation of the objects that it is composed of. An object cannot be considered cooperative if it blocks the others or the user for a long time. You shouldn't have to wait several minutes until you can continue with your work, just because a remote server machine takes so long to complete a database transaction.\rFor this reason, "
                    attr: 2
                  - text: SqlDB
                    attr: 4
                  - text: " supports a non-blocking asynchronous programming style in addition to the traditional blocking style. The programmer can decide which style is more appropriate for the given application. Non-blocking operation is especially important if an application may access a server database. Server queries sometimes take much longer than local queries. Blocking operations may be appropriate for simple local queries, or for batch processes that require no user interaction.\rThe non-blocking programming style is more involved than the straight-forward blocking style. It uses object-oriented programming principles to avoid an even more intricate and hard-to-debug programming style based on so-called threads (i.e., preemptive multitasking).\rEven an application which uses a blocking programming style is non-modal, meaning that several data query or entry masks (windows) can be open at the same time. This is in the general spirit of BlackBox, which avoids modal dialog boxes wherever feasible. Ultimately it is the user who benefits, by not being locked into a single task at any time.\r\rFor an overview over the files of "
                    attr: 2
                  - text: Sql
                    attr: 4
                  - text: ", see its "
                    attr: 2
                  - link:
                      target: "StdCmds.OpenBrowser('Sql/Docu/Sys-Map', 'Map to the Sql Subsystem')"
                      body:
                        - text: Map
                          attr: 3
                      attr: 2
                      w: 131250
                      h: 142875
                  - text: " text.\r\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000009
                      attr: 1
                      w: 360000000
                      h: 444500
                  - target:
                      name: Databases
                      body:
                        - text: "Databases, tables, and interactors"
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rFrom a program's perspective, a database is represented by a "
                    attr: 2
                  - text: SqlDB.Database
                    attr: 4
                  - text: " object. As long as a database object is available, SQL commands can be executed. Execution may be local, or remote on a server.\r\rThe following declaration describes the "
                    attr: 2
                  - text: SqlDB.Database
                    attr: 4
                  - text: " type:\r\r\tDatabase = POINTER TO ABSTRACT RECORD \r\t\tres: INTEGER;\r\t\tasync: BOOLEAN;\r\t\tshowErrors: BOOLEAN;\r\t\t(d: Database) Exec (statement: ARRAY OF CHAR), NEW, ABSTRACT;\r\t\t(d: Database) Commit, NEW, ABSTRACT;\r\t\t(d: Database) Abort, NEW, ABSTRACT;\r\t\t(d: Database) Call (command: Command; par: ANYPTR), NEW, ABSTRACT;\r\t\t(d: Database) NewTable (): Table, NEW, ABSTRACT\r\tEND;\r\rProcedure "
                    attr: 2
                  - text: Exec
                    attr: 4
                  - text: " is used to execute SQL statements which don't return result tables; e.g., DELETE or INSERT statements, such as:\r\rdatabase.Exec(\"DELETE FROM Companies WHERE id = 5\" )\r\rTransactions are started automatically when the first modifying SQL command is executed. A transaction is terminated either by calling "
                    attr: 2
                  - text: Commit
                    attr: 4
                  - text: " or "
                    attr: 2
                  - text: Abort
                    attr: 4
                  - text: ".\r\rWarning: don't use the database's SQL transaction statements, since they may interfere with "
                    attr: 2
                  - text: Commit
                    attr: 4
                  - text: " and "
                    attr: 2
                  - text: Abort
                    attr: 4
                  - text: ".\r\rA database object is obtained by calling "
                    attr: 2
                  - text: SqlDB.OpenDatabase
                    attr: 4
                  - text: ":\r\rPROCEDURE OpenDatabase (protocol, id, password,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tdatasource: ARRAY OF CHAR;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tasync: BOOLEAN;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tOUT d: SqlDB.Database;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tOUT res: INTEGER);\r\rThis procedure opens the database given by the pair ("
                    attr: 2
                  - text: "protocol, datasource"
                    attr: 4
                  - text: "). If that database is already open from a previous call to "
                    attr: 2
                  - text: OpenDatabase
                    attr: 4
                  - text: ", the same database connection may be used, without considering the "
                    attr: 2
                  - text: id
                    attr: 4
                  - text: " and "
                    attr: 2
                  - text: password
                    attr: 4
                  - text: " information again. The exact interpretation of the latter parameters depends on the database driver, whose name is given in "
                    attr: 2
                  - text: protocol
                    attr: 4
                  - text: " (e.g. "
                    attr: 2
                  - text: SqlOdbc3
                    attr: 4
                  - text: ").\r\rIf an application needs to fetch result tables from a database, typically generated by SELECT statements, it needs to provide table objects, which represent the returned result tables. The contents of a table is static, i.e., it represents a snapshot of the database contents at the time the statement is executed. Conceptually, a table is a local and independent copy of the database contents. Several tables can be used simultaneously.\r\rA table object is obtained by calling its database object's "
                    attr: 2
                  - text: NewTable
                    attr: 4
                  - text: " procedure.\r\rAn "
                    attr: 2
                  - text: SqlDB.Table
                    attr: 4
                  - text: " is declared as\r\r\tTable = POINTER TO ABSTRACT RECORD \r\t\tbase-: Database;\r\t\trows, columns, res: INTEGER;\r\t\tstrictNotify: BOOLEAN;\r\t\t(t: Table) Exec (statement: ARRAY OF CHAR), NEW, ABSTRACT;\r\t\t(t: Table) Available (): BOOLEAN, NEW, ABSTRACT;\r\t\t(t: Table) Read (row: INTEGER; VAR data: ANYREC), NEW, ABSTRACT;\r\t\t(t: Table) Clear, NEW, ABSTRACT;\r\t\t(t: Table) Call (command: TableCommand; par: ANYPTR), NEW, ABSTRACT\r\tEND;\r\rThe pair "
                    attr: 2
                  - text: "(rows, columns)"
                    attr: 4
                  - text: " denotes the number of rows and columns of the most recently computed result table. A result table is generated by calling the table's "
                    attr: 2
                  - text: Exec
                    attr: 4
                  - text: " procedure. It may only be used with row-returning SQL statements, i.e., statements which return a (possibly empty) table. Typically, this is a SELECT statement such as\r\rtable.Exec(\"SELECT * FROM Companies WHERE id = 17)\r\r"
                    attr: 2
                  - text: Read
                    attr: 4
                  - text: " can be used to read a row from the result table into an interactor (i.e. an exported record variable). The interactor can then be manipulated by the program or by its graphical user interface elements. For example, the following statement\r\rtable.Read(17, company);\r\rreads the contents of row 17 of "
                    attr: 2
                  - text: table
                    attr: 4
                  - text: " into the variable "
                    attr: 2
                  - text: company
                    attr: 4
                  - text: ", which might be declared as\r\rVAR\r\tcompany: RECORD\r\t\tid: INTEGER;\r\t\tname, ceo: ARRAY 32 OF CHAR;\r\t\temployees: INTEGER\r\tEND;\r\rNote that the field "
                    attr: 2
                  - text: table.rows
                    attr: 4
                  - text: " cannot be computed by all database drivers, some may return MAX(INTEGER) instead. To loop over all rows of a result table, it is therefore better to avoid using "
                    attr: 2
                  - text: table.rows
                    attr: 4
                  - text: " in the loop termination condition. Instead, looping can be done while "
                    attr: 2
                  - text: "table.res # SqlDB.noData"
                    attr: 4
                  - text: " holds.\r\rRecord fields and rows of a result table are matched in the order that they are defined in the record or in the database, respectively (SQL doesn't define an order, but every actual database product does). Record fields to be matched must be exported. If there are non-exported record fields, they are simply ignored.\r\rThe following Component Pascal types are interpreted by "
                    attr: 2
                  - text: SqlDB
                    attr: 4
                  - text: ":\r\tBOOLEAN\r\tBYTE, SHORTINT, INTEGER\r\tSHORTREAL, REAL\r\tARRAY OF CHAR\r\tDates.Date\r\tDates.Time\r\tDialog.Currency\r\tDialog.List\r\tDialog.Combo\r\tSqlDB.Blob\r\rHow these types are mapped to SQL data types depends on the actual SQL database product and the Sql driver. The following example table applies to Microsoft's Sql Server product which is accessed via ODBC:\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 2880000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "SQL\tComponent Pascal\r"
                    attr: 1
                  - text: "{bit, tinyint, smallint, integer, bigint}\t{BOOLEAN(1), BYTE, SHORTINT, INTEGER, Dialog.List}\r{real, float(p), double precision}\t{SHORTREAL, REAL}\r{char(n)(2), varchar(n)(3), long varchar}\t{ARRAY OF CHAR, Dialog.Combo}\r{decimal(p, s), numeric(p, s)}\tDialog.Currency\r{date, timestamp(4)}\tDates.Date\r{time, timestamp(4)}\tDates.Time\r{binary(n), varbinary(n), long varbinay)\tSqlDB.Blob\r\r(1)  0 = FALSE, 1 = TRUE\r(2)  character string of fixed string-length n\r(3)  variable-length character string with a maximum string length n\r(4) only the date or the time part is used, not both simultaneously\r\rNote:\rValues of any SQL data type can be read in a textual form, into an "
                    attr: 2
                  - text: ARRAY OF CHAR
                    attr: 4
                  - text: ".\rSQL datetime values can be mapped either to "
                    attr: 2
                  - text: Dates.Date
                    attr: 4
                  - text: " or to "
                    attr: 2
                  - text: Dates.Time
                    attr: 4
                  - text: ", but not to both simultaneously.\r\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000009
                      attr: 2
                      w: 360000000
                      h: 444500
                  - target:
                      name: Dynamic
                      body:
                        - text: Interpreted embedded SQL
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rConsider the following simple SQL statement:\r\r  SELECT * FROM Companies WHERE id = 249\r\rIt is easy to provide a programming interface which can execute this query, e.g., something like\r\r  table.Exec(\"SELECT * FROM Companies WHERE id = 249\")\r\rHowever, things get messy when the SQL statement should be parameterized with program variables, e.g.,\r\r  SELECT * FROM Companies WHERE id = searchId\r\rwhere "
                    attr: 2
                  - text: searchId
                    attr: 4
                  - text: " is a global variable. Note that it would not be correct to call\r\r  table.Exec(\"SELECT * FROM Companies WHERE id = searchId\")\r\rsince the DBMS has no idea that the application program has a variable called "
                    attr: 2
                  - text: searchId
                    attr: 4
                  - text: ".\r\rWhat could be done is something like the following:\r\r  ConvertIntegerToString(searchId, str);\r  str := \"SELECT * FROM Companies WHERE id = \" + str;\r  table.Exec(str);\r\rSome systems provide precompilers for so-called "
                    attr: 2
                  - text: embedded SQL
                    attr: 4
                  - text: ", where true statements of a programming language can be mixed with SQL statements, and these SQL statements may contain formal parameters. Syntactically, such formal parameters are preceeded by colons. In embedded SQL, the above example would look like this:\r\r  SELECT * FROM Companies WHERE id = :searchId\r\rEmbedded SQL has drawbacks in that the precompiler typically produces code for one particular combination of programming language/compiler and DBMS only. Precompilers are often static in that they prevent the dynamic composition of SQL strings. They slow down compilation because of the preprocessing they have to perform.\r\rBlackBox uses a novel approach which combines the convenience of embedded SQL with the flexibility of explicit SQL programming interfaces (\"call level interfaces\"). For this purpose, it uses its metaprogramming facilities (i.e., run-time type information) to access global variables, as they occur in an SQL string.\r\rFor example, if there is a global and exported integer variable "
                    attr: 2
                  - text: searchId
                    attr: 4
                  - text: " in module "
                    attr: 2
                  - text: Sample
                    attr: 4
                  - text: ", the following SQL statement can be used:\r\r  \"SELECT * FROM Companies WHERE id = :Sample.searchId\"\r\r"
                    attr: 2
                  - text: SqlDB
                    attr: 4
                  - text: " provides a procedure to execute such a string ("
                    attr: 2
                  - text: "SqlDB.Database.Exec, SqlDB.Table.Exec"
                    attr: 4
                  - text: "). These procedures replace all placeholders starting with a colon by the appropriate run-time values.\r\rFor additional convenience, whole record variables can be used in SQL strings. Their fields will be expanded suitably. For example, if there is a global and exported interactor "
                    attr: 2
                  - text: company
                    attr: 4
                  - text: " in module "
                    attr: 2
                  - text: Sample
                    attr: 4
                  - text: " with the fields "
                    attr: 2
                  - text: id
                    attr: 4
                  - text: ", "
                    attr: 2
                  - text: name
                    attr: 4
                  - text: ", "
                    attr: 2
                  - text: ceo
                    attr: 4
                  - text: ", "
                    attr: 2
                  - text: employees
                    attr: 4
                  - text: " then "
                    attr: 2
                  - text: SqlDB
                    attr: 4
                  - text: " will expand the following string\r\r  INSERT INTO Companies VALUES (:Sample.company)\r\rinto\r\r  INSERT INTO Companies VALUES (5, 'Macrosoft Corp.', 'Doors', 10000)\r\rassuming that "
                    attr: 2
                  - text: "company.id = 5, company.name = \"Macrosoft Corp.\""
                    attr: 4
                  - text: ", "
                    attr: 2
                  - text: "company.ceo "
                    attr: 4
                  - text: "= \"Doors\" and "
                    attr: 2
                  - text: "company.employees = "
                    attr: 4
                  - text: "10000.\r\rNote: A colon does not trigger string substitution if a Windows path name follows the colon (this is useful e.g. when using MS Access), as in \"SELECT * FROM C:\\directory\\databaseName.tableName\".\r\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000009
                      attr: 2
                      w: 360000000
                      h: 444500
                  - target:
                      name: Type
                      body:
                        - text: Type Row
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rNormally, a table's "
                    attr: 2
                  - text: Read
                    attr: 4
                  - text: " procedure is performed on an interactor that contains one record field per result table column. This is convenient, since it provides automatic mapping between relational data and Component Pascal objects, i.e., an object-oriented front-end for SQL databases.\rHowever, specialized tools such as database browsers don't know about the exact definition of the tables they will be accessing, and thus cannot define the necessary interactor types in advance. For those special cases, a more general dynamic mechanism is provided.\rInstead of passing a normal interactor to "
                    attr: 2
                  - text: Read
                    attr: 4
                  - text: ", a variable of the special type "
                    attr: 2
                  - text: SqlDB.Row
                    attr: 4
                  - text: " is passed for this purpose. As a result, it will contain an array of pointers to strings. Each string contains the textual representation of one table column of the row read. If "
                    attr: 2
                  - text: SqlDB.names
                    attr: 4
                  - text: " is passed as "
                    attr: 2
                  - text: row
                    attr: 4
                  - text: " parameter, the strings will contain the names of the table columns, instead of values.\r\r\tString = POINTER TO ARRAY OF CHAR;\r\r\tRow = RECORD\r\t\tfields: POINTER TO ARRAY OF String\r\tEND\r\r\r"
                    attr: 2
                  - target:
                      name: SqlBrowser
                      body:
                        - text: SqlBrowser
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rModule "
                    attr: 2
                  - text: SqlBrowser
                    attr: 4
                  - text: " implements a database browsing utility. The user can interactively enter the protocol, id, password, and datasource parameters in a dialog box. A further text entry field allows to enter arbitrary SQL statements. Clicking on the \"Execute\" button or pressing Enter executes the query. If the database is not already open, it is opened automatically and remains open until the Browser dialog box is closed. If the statement returns a result table, it is displayed in its own window. For statements not returning a result, the message \"statement executed\" is displayed. In case of an error, a suitable error message appears.\rThe source of "
                    attr: 2
                  - link:
                      target: "StdCmds.OpenDoc('Sql/Mod/Browser')"
                      body:
                        - text: SqlBrowser
                          attr: 3
                      attr: 2
                      w: 131250
                      h: 142875
                  - text: " is available. It demonstrates the use of "
                    attr: 2
                  - text: SqlDB.Row
                    attr: 4
                  - text: " to obtain data from tables that are not known at compile time, i.e., \"dynamically\".\r\r\r"
                    attr: 2
                  - target:
                      name: Blobs
                      body:
                        - text: Blobs
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rBinary Large Objects, or \"blobs\", allow to store unstructured data as large ARRAY OF BYTE variables. For example, large image bitmaps, serialized stores, or any other data may be stored in blobs. A blob is represented as a record\r\r\tBlob = RECORD\r\t\tlen: INTEGER;\r\t\tdata: POINTER TO ARRAY OF BYTE\r\tEND\r\rThe field "
                    attr: 2
                  - text: len
                    attr: 4
                  - text: " indicates the number of valid bytes in "
                    attr: 2
                  - text: data
                    attr: 4
                  - text: ". Data is a pointer to the byte array. A "
                    attr: 2
                  - text: Blob
                    attr: 4
                  - text: " that is used in several "
                    attr: 2
                  - text: Read
                    attr: 4
                  - text: " operations reuses the same "
                    attr: 2
                  - text: data
                    attr: 4
                  - text: " array if possible, i.e. if the new data takes at most as many bytes as the previous result's data.\r\r\r"
                    attr: 2
                  - target:
                      name: Asynchronous
                      body:
                        - text: Asynchronous operation
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rThere are different ways how a database can be accessed. In particular, access may occur to a local or to a remote server database. Access to remote databases may take considerably longer than access to local databases. If an operation takes long to complete, a user should not be blocked from other work during this time. This requires asynchronous operation, i.e., a query is started, but the user can immediately continue to work while the query is being completed.\rAsynchronous operation is usually associated with preemptive multitasking, so-called "
                    attr: 2
                  - text: threads
                    attr: 4
                  - text: ". However, threads incur considerable additional complexity, often also for programmers who don't even use this feature. "
                    attr: 2
                  - text: Sql
                    attr: 4
                  - text: " uses a more light-weight approach to the problem. It allows to open a database in an asynchronous mode, such that any "
                    attr: 2
                  - text: Exec
                    attr: 4
                  - text: " statement only starts a query. The procedure immediately returns; i.e., it doesn't block the rest of the framework, and thus the user, from further work. When the result of the query is ready, the program is notified and can continue its work, using the results of the query.\rConceptually, the procedures "
                    attr: 2
                  - text: "Exec, Clear, Read"
                    attr: 4
                  - text: " and "
                    attr: 2
                  - text: Call
                    attr: 4
                  - text: " for an asynchronously accessed database are not executed right away when the procedure is called. Instead, the operations are queued in "
                    attr: 2
                  - text: SqlDB
                    attr: 4
                  - text: ", with one queue for the database and one queue for each table on this database. These queues are processed in the background. The results can be accessed when they are ready (indicated by "
                    attr: 2
                  - text: Table.Available
                    attr: 4
                  - text: "). Polling a table whether a pending "
                    attr: 2
                  - text: Exec
                    attr: 4
                  - text: " has returned a result may be done with a "
                    attr: 2
                  - text: Services.Action
                    attr: 4
                  - text: ". However, "
                    attr: 2
                  - text: SqlDB
                    attr: 4
                  - text: " provides a more convenient means, namely a table's or a database's "
                    attr: 2
                  - text: Call
                    attr: 4
                  - text: " procedure. The idea is that one or several asynchronous operations are started, and then a "
                    attr: 2
                  - text: continuation procedure
                    attr: 4
                  - text: " is set up by calling "
                    attr: 2
                  - text: "Call(ContinuationProc, someData)"
                    attr: 4
                  - text: ". When the previous operations in the queue have terminated, the continuation procedure is called. In the continuation procedure, it can be assumed that the result of the most recent operation is now available. Thus, "
                    attr: 2
                  - text: Call
                    attr: 4
                  - text: " allows to chain several delayed operations, without having to deal explicitly with actions or with the synchronization problems of threads. "
                    attr: 2
                  - text: Call
                    attr: 4
                  - text: " must be used to break up a procedure into a chain of asynchronously executed procedures whenever the procedure needs to directly manipulate the results of an asynchronous query, i.e. before the next "
                    attr: 2
                  - text: Read
                    attr: 4
                  - text: " is performed. (Several successive "
                    attr: 2
                  - text: Read
                    attr: 4
                  - text: "s on the same result table need not be broken up by "
                    attr: 2
                  - text: Call
                    attr: 4
                  - text: ", since once the result table has become available, it remains available unless a new query is started.)\rThe following example shows a chain of procedures linked by "
                    attr: 2
                  - text: Call
                    attr: 4
                  - text: " statements:\r\r\tPROCEDURE Last (t: SqlDB.Table; p: SqlDB.Par);\r\t\tVAR i: INTEGER;\r\tBEGIN\t"
                    attr: 2
                  - text: "(* t.Available() can be assumed *)"
                    attr: 4
                  - text: "\r\t\ti := 0;\r\t\tWHILE t.res # SqlDB.noData DO\r\t\t\tt.Read(i, interactor);\t"
                    attr: 2
                  - text: "(* read "
                    attr: 4
                  - text: i
                    attr: 2
                  - text: "-th row into "
                    attr: 4
                  - text: interactor
                    attr: 2
                  - text: " *)"
                    attr: 4
                  - text: "\r\t\t\tOut.Int(interactor.amount); Out.Ln;\t"
                    attr: 2
                  - text: "(* use interactor somehow *)"
                    attr: 4
                  - text: "\r\t\t\tINC(i)\r\t\tEND;\r\t\tt.Clear\t"
                    attr: 2
                  - text: "(* release table resources *)"
                    attr: 4
                  - text: "\r\tEND Last;\r\r\tPROCEDURE Middle (t: SqlDB.Table; p: SqlDB.Par);\r\tBEGIN\t"
                    attr: 2
                  - text: "(* t.Available() can be assumed *)"
                    attr: 4
                  - text: "\r\t\tt.Read(0, interactor);\r\t\tinteractor.amount := interactor.amount + 30;\t"
                    attr: 2
                  - text: "(* do something with interactor *)"
                    attr: 4
                  - text: "\r\t\tt.Exec(\"SELECT * FROM SomeTable WHERE amount > 20\");\t"
                    attr: 2
                  - text: "(* start next query *)"
                    attr: 4
                  - text: "\r\t\tt.Call(Last, NIL)\t"
                    attr: 2
                  - text: "(* later continue with "
                    attr: 4
                  - text: Last
                    attr: 2
                  - text: " *)"
                    attr: 4
                  - text: "\r\tEND Middle;\r\r\tPROCEDURE First (t: SqlDB.Table; p: SqlDB.Par);\r\tBEGIN\r\t\tt.Exec(\"SELECT * FROM SomeTable WHERE someId = 42\");\t"
                    attr: 2
                  - text: "(* start a query *)"
                    attr: 4
                  - text: "\r\t\tt.Call(Middle, NIL)\t"
                    attr: 2
                  - text: "(* later continue with "
                    attr: 4
                  - text: Middle
                    attr: 2
                  - text: " *)"
                    attr: 4
                  - text: "\r\tEND First;\r\rNote that the three procedures are given in reverse order, to avoid forward declarations. Parameter "
                    attr: 2
                  - text: p
                    attr: 4
                  - text: " can be used to pass arbitrary data along the chain of procedure invocations. Here it is sufficient to pass "
                    attr: 2
                  - text: NIL
                    attr: 4
                  - text: ".\r\rThis asynchronous mechanism is implemented by queueing database operations, with one queue per database object. This queue handles all "
                    attr: 2
                  - text: Exec
                    attr: 4
                  - text: " and "
                    attr: 2
                  - text: Call
                    attr: 4
                  - text: " calls (indepent of whether called via database or table object) in the strict order that they have been called originally. Only "
                    attr: 2
                  - text: table.Read
                    attr: 4
                  - text: " and "
                    attr: 2
                  - text: table.Clear
                    attr: 4
                  - text: " are optimized such that they may swap their places with operations that don't affect the corresponding table. As a result of this sequencing strategy, e.g., a "
                    attr: 2
                  - text: database.Commit
                    attr: 4
                  - text: " after a "
                    attr: 2
                  - text: table.Exec
                    attr: 4
                  - text: " always works correctly.\r\rSometimes it can be useful to have two database objects for the same database. For example, one may be opened synchronously, and the other asynchronously, when migrating from one to the other programming model. But this requires careful consideration of a possible interference between the two, since their individual chains of continuation procedures are not synchronized and may thus execute in any order, possibly resulting in different outcomes. Wherever possible, simultaneously opening to database objects on the same database should thus be avoided.\r\rObviously, asynchronous programming is more involved than synchronous operation. But if the database access is interactive and the database operation may involve a remote server, it is strongly suggested to consider the non-blocking asynchronous programming style. Blocking is considered \"anti-social\".\rEven if a particular driver does not support true asynchronous operation, the asynchronous mode can still be used and will produce the same results, although possibly blocking sometimes. ("
                    attr: 2
                  - text: SqlOdbc
                    attr: 4
                  - text: " works this way.) But as soon as an asynchronous driver becomes available, the benefits will become apparent. For non-interactive applications, e.g., batch processing of a large database by night, there is no benefit in using asynchronous mode.\r\r\r"
                    attr: 2
                  - target:
                      name: SqlDrivers
                      body:
                        - text: SqlDrivers
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rFile "
                    attr: 2
                  - link:
                      target: "StdCmds.OpenDoc('Sql/Mod/ObxDriv')"
                      body:
                        - text: Sql/Mod/ObxDriv
                          attr: 3
                      attr: 2
                      w: 131250
                      h: 142875
                  - text: " contains a template of a new Sql driver. Its empty parts can be filled out to create a new driver for a database not yet supported by Sql, or to avoid the use of ODBC.\r\r\r"
                    attr: 2
                  - target:
                      name: ODBC
                      body:
                        - text: ODBC driver (Windows only)
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rMicrosoft's Open Database Connectivity (ODBC) is an interface standard for accessing relational SQL databases. There are ODBC drivers for most relational products, and even for some non-relational databases.\r\r"
                    attr: 2
                  - text: SqlOdbc
                    attr: 4
                  - text: " is an Sql driver which builds a bridge to the ODBC driver manager. Given a suitable 32-bit ODBC driver, this allows to use a database via ODBC and Sql.\r\r"
                    attr: 2
                  - text: SqlOdbc
                    attr: 4
                  - text: " supports all features of Sql, except asynchronous operation.\r\rTo use ODBC, the ODBC driver manager from Microsoft and a suitable ODBC driver is needed. The ODBC driver is installed along with the first driver installed on a system. Consult the documentation of your database on how to install an ODBC driver for it.\r\rDuring installation of BlackBox, it can be chosen whether the ODBC driver manager and one of Microsoft's \"desktop drivers\", the text driver, should be installed. The text driver uses plain ASCII text files as \"database\" files. It is very handy for testing purposes. It is not meant for productive use, and it is not permitted to distribute this Microsoft software along with applications.\r\rIn its software development kits, Microsoft also provides further desktop drivers, e.g., for Excel, Access,or dBase.\rWhen connecting to a desktop driver, empty strings can be passed to the "
                    attr: 2
                  - text: password
                    attr: 4
                  - text: " and "
                    attr: 2
                  - text: id
                    attr: 4
                  - text: " parameters of "
                    attr: 2
                  - text: SqlDB.OpenDatabase
                    attr: 4
                  - text: ". The "
                    attr: 2
                  - text: datasource
                    attr: 4
                  - text: " parameter must be a name shown in the \"User Data Sources\" list in the ODBC control panel application. The "
                    attr: 2
                  - text: protocol
                    attr: 4
                  - text: " name must be the module name \"SqlOdbc\" (case sensitive!). Note that it is not possible to connect to a 16-bit driver.\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 144000 }
                        - { stop: 1224000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\tprotocol\t\"SqlOdbc\"\r\tdatasource\tdata source name as presented in the ODBC control panel\r\tid\tuser id, if the ODBC driver supports user identification\r\tpassword\tpassword, if the ODBC driver supports user identification\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\rFor productive use, Microsoft's SQL Server product is a suitable choice, not least because it directly implements ODBC, so no inefficient translation occurs in its driver, which slows down some other ODBC-connected database products.\r\r"
                    attr: 2
                  - text: SqlOdbc
                    attr: 4
                  - text: " works with 32-bit ODBC drivers that support the ODBC core functions, ODBC Level 1, and the ODBC Level 2 procedure "
                    attr: 2
                  - text: SQLExtendedFetch
                    attr: 4
                  - text: ". It works with older ODBC managers. For ODBC 3, as it is distributed e.g. with Windows 2000, module "
                    attr: 2
                  - text: SqlOdbc3
                    attr: 4
                  - text: " must be used instead.\r\rFor further information on ODBC, please consult the Microsoft literature and software development kits.\r\r\r"
                    attr: 2
                  - target:
                      name: SqlDB
                      body:
                        - text: SqlDB
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rSee the "
                    attr: 2
                  - link:
                      target: "StdCmds.OpenBrowser('Sql/Docu/DB', 'SqlDB Docu')"
                      body:
                        - text: on-line documentation
                          attr: 3
                      attr: 2
                      w: 131250
                      h: 142875
                  - text: ".\r\r\r"
                    attr: 2
                  - target:
                      name: Clearing
                      body:
                        - text: Clearing Database and Table pointers
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rAn open database need and cannot be closed explicitly. BlackBox closes it automatically when there exist no more references to it. This is accomplished by the garbage collector. When the garbage collector detects that a database object isn't accessible anymore, it finalizes (i.e., closes) it.\rFor the programmer it is important to make sure that no global database or table pointers are left which anchor the database object, and thus would prevent garbage collection.\r\rFor mere \"batch\" commands, this is no problem. Such a command is started, opens a database and possibly some tables, does some processing, and then terminates. Database and table pointers are kept as local variables, and thus vanish after the command has terminated. This means that there is no need to set any pointers to "
                    attr: 2
                  - text: NIL
                    attr: 4
                  - text: ", since they just disappear.\r\rThings are different for interactive database applications, where the user interacts with a database via a dialog box. There the database should be opened when the (first) dialog box for it is opened, and closed after the (last) dialog box is closed. In between, there are references which keep the database from being collected.\r\rOpening is simple: the menu entry which opens the dialog box first invokes an initialization command before opening the dialog box window. This initialization command opens the database and stores the necessary table objects in global variables. Typically, it won't save the database pointer itself; since most of the time a database ought to be closed when there exist no more table objects. Furthermore, a table's database can be accessed via its "
                    attr: 2
                  - text: base
                    attr: 4
                  - text: " field.\r\rAfter the initialization command, other commands can use the database and table pointers to perform SQL queries and operations, until the user closes the last dialog box of the application.\rThe question is how the various global table pointers can be set to "
                    attr: 2
                  - text: NIL
                    attr: 4
                  - text: ", such that the garbage collector can perform its duty. For this purpose, module "
                    attr: 2
                  - text: SqlControls
                    attr: 4
                  - text: " provides so-called "
                    attr: 2
                  - text: anchor controls
                    attr: 4
                  - text: ". They are controls that can be linked to global table pointer variables. They have two main purposes: determining whether the window should be closed, and cleaning up if and when the window is closed.\rAn anchor control can be linked to a global table pointer variable. This is the actual \"anchor\" as far as the garbage collector is concerned. It can be \"cut\" (set to "
                    attr: 2
                  - text: NIL
                    attr: 4
                  - text: ") by the anchor control when the control's window is closed.\r\r"
                    attr: 2
                  - text: Determining whether the window should be closed
                    attr: 4
                  - text: "\rWhen the user attempts to close a dialog box containing one or several anchors, and if at least one of the anchors is linked to a non-NIL table variable (or has an empty link name), the user is asked whether the dialog box should really be closed. This is useful e.g. when the user has entered some data into a data entry mask, but hasn't performed an operation (e.g., a database insertion) with the data.\rAsking only happens if the control's optional guard sets "
                    attr: 2
                  - text: disabled
                    attr: 4
                  - text: " to "
                    attr: 2
                  - text: "TRUE"
                    attr: 4
                  - text: ", and thus indicates that it wants to prevent closing the dialog box for the table (e.g., because entered data has not been inserted). If there is no guard, or if it doesn't set "
                    attr: 2
                  - text: disabled
                    attr: 4
                  - text: " to "
                    attr: 2
                  - text: "TRUE"
                    attr: 4
                  - text: ", then the user is not given the opportunity to stop window closing. But if the user is asked, he or she has the last word; an anchor control cannot prevent the user from closing the window.\rThe message that is shown to the user when asking is determined by the guard setting the "
                    attr: 2
                  - text: label
                    attr: 4
                  - text: " field. If there is no guard or it doesn't set this field, then the control's label value is used. If this label value is empty, then  a standard message (with a mapping defined in "
                    attr: 2
                  - text: Sql/Rsrc/Strings
                    attr: 4
                  - text: " with the key "
                    attr: 2
                  - text: IsCloseOK
                    attr: 4
                  - text: ") is used.\r\rFor example, a dialog box may contain two anchor views with the following properties:\r\rlink\t\"SqlObxDB.c\"\rlabel\t\"Do you really want to close the window without saving your input?\"\r\rlink\t\"SqlObxDB.m\"\rlabel\t\"\"\r\r"
                    attr: 2
                  - text: Cleaning up when the window is closed
                    attr: 4
                  - text: "\rIf and when the dialog box is closed, all the anchors that it contains set their pointers to "
                    attr: 2
                  - text: NIL
                    attr: 4
                  - text: ". In other words: when the last anchor view vanishes, the table pointers are set to "
                    attr: 2
                  - text: NIL
                    attr: 4
                  - text: ". If there are no further references to the database object (directly or indirectly), then this means that it is not globally anchored anymore and can be garbage collected. Closing the window causes the garbage collector to run, so the database will be closed immediately.\rIf active notification about a closed database is desired, the control's notifier can be used for this purpose. This allows to perform arbitrary cleanup actions upon window closing, in addition to (or instead of) setting a table pointer to "
                    attr: 2
                  - text: NIL
                    attr: 4
                  - text: ".\rThe link may even be left empty, so that only the notifier is used and no pointer variable is needed.\r\r"
                    attr: 2
                  - text: Control properties
                    attr: 4
                  - text: "\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 144000 }
                        - { stop: 720000 }
                        - { stop: 1512000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\tlink\toptional\tlink to a global pointer variable\r\tlabel\toptional\tmessage that the user is asked before window closing\r\tguard\toptional\tdetermines whether to ask, and what message to show\r\tnotifier\toptional\tnotifies about window closing\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\rNote that actually the anchor controls can be used universally for any kind of pointers, they need not be table pointers. Whenever you need to clear global pointers when no document references (i.e., anchors) to them exist anymore, you can use these anchors.\r\r\r"
                    attr: 2
                  - target:
                      name: Displaying
                      body:
                        - text: Displaying tables
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rOften it is necessary to display result tables in tabular fashion. For this purpose, module "
                    attr: 2
                  - text: SqlControls
                    attr: 4
                  - text: " provides "
                    attr: 2
                  - text: table controls
                    attr: 4
                  - text: ". Tables cannot be edited, but its possible to select a field in a table.\rA table control needs to be linked to a global variable of type "
                    attr: 2
                  - text: SqlDB.Table
                    attr: 4
                  - text: ".\rA table control may also denote a notifier with the following signature:\r\r\t\tTableNotifier = PROCEDURE (t: SqlDB.Table; row, column: INTEGER; modifiers: SET)\r\rIt is called whenever the user has clicked into a field of the table, indicating the table, its row and column numbers, and the track message's modifier set (-> Controllers.TrackMsg).\r\rA table control is used in one of two ways: either it is opened in its own window, or it is embedded in some container, typically a form view. In the first case, the window provides scrollbars if necessary. In the second case, it is usually wrapped in a scroller view (Tools->Add Scroller) which provides the scrollbars.\r\rWhen a table control is generated by a program, it is not necessary to link it to a global table pointer variable. Instead, the table pointer can be directly passed as parameter in the call to "
                    attr: 2
                  - text: SqlControls.dir.NewTableOn(table)
                    attr: 4
                  - text: ".\r\r\r"
                    attr: 2
                  - target:
                      name: Design
                      body:
                        - text: Design rules
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rThis section gives some rules which should be followed when designing a database application. The reason for each rule is given after the rule.\r\rInteractors or at least their types must be exported if they should be used as place holders in SQL statements.\r(Non-exported types are not accessible through metaprogramming, and thus controls and the SQL string translation mechanism could not be used with them.)\r\rA globally anchored database and all its table pointers must be set to "
                    attr: 2
                  - text: NIL
                    attr: 4
                  - text: " if the database ought to be closed.\r(If a global pointer variable is not set to "
                    attr: 2
                  - text: NIL
                    attr: 4
                  - text: ", the garbage collector cannot reclaim the data structures anchored in it. Upon garbage collection of a database, the database is closed if there are no more pointers to it. Note that a table contains a pointer to its database object and thus anchors it.)\r\rA database pointer should not be declared as global variable.\r(Normally there are global table pointers, which contain references to their databases. A global database pointer would be one more pointer to set to "
                    attr: 2
                  - text: NIL
                    attr: 4
                  - text: " eventually; and anchor views can only set table pointers to "
                    attr: 2
                  - text: "NIL.)\r"
                    attr: 4
                  - text: "\r"
                    attr: 2
                  - text: Database.Exec
                    attr: 4
                  - text: " may only execute non-row-returning statements, e.g. "
                    attr: 2
                  - text: DELETE
                    attr: 4
                  - text: " or "
                    attr: 2
                  - text: INSERT.
                    attr: 4
                  - text: "\r(A result table must always be assigned to a table and via the table to an interactor, otherwise it cannot be accessed by the application.)\r\r"
                    attr: 2
                  - text: Table.Exec
                    attr: 4
                  - text: " should only execute row-returning statements, e.g., "
                    attr: 2
                  - text: SELECT.
                    attr: 4
                  - text: "\r\rThe order and types (but not necessarily the names) of fields in an interactor variable must match those defined in the SQL database. The number of fields must be the same as the number of columns.\rOnly complete tables may be assigned to an interactor by "
                    attr: 2
                  - text: Table.Read
                    attr: 4
                  - text: ", no partial assignment is allowed. The correspondence of result table columns and interactor fields is given by their respective declaration order. Nested arrays, records and pointers are handled recursively.\rPointers must not be "
                    attr: 2
                  - text: NIL
                    attr: 4
                  - text: " except for POINTER TO ARRAY OF CHAR which are allocated automatically if the pointer is "
                    attr: 2
                  - text: NIL
                    attr: 4
                  - text: " or if the bound array is too small to receive the corresponding string.\rScalar result variables are treated as tables with "
                    attr: 2
                  - text: table.rows = 1
                    attr: 4
                  - text: " and "
                    attr: 2
                  - text: table.columns = 1
                    attr: 4
                  - text: ".\r\rAfter an SQL statement which may render a row inconsistent with the database, use a "
                    attr: 2
                  - text: SELECT
                    attr: 4
                  - text: " statement to re-establish consistency.\r(For example, an interactor may still contain the value of a row which has just been deleted through a "
                    attr: 2
                  - text: DELETE
                    attr: 4
                  - text: " statement. "
                    attr: 2
                  - text: Exec
                    attr: 4
                  - text: " on the table will flush the old result table and possibly assign a new one.)\r\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000009
                      attr: 1
                      w: 360000000
                      h: 444500
                  - target:
                      name: Example
                      body:
                        - text: Example
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rThis very simple example allows to insert, update, delete, and find rows in a database. A row consists of an integer "
                    attr: 2
                  - text: id
                    attr: 4
                  - text: ", two strings "
                    attr: 2
                  - text: "name "
                    attr: 4
                  - text: "and "
                    attr: 2
                  - text: ceo
                    attr: 4
                  - text: ", and an integer "
                    attr: 2
                  - text: employees
                    attr: 4
                  - text: . The application consists of a core logic module (
                    attr: 2
                  - text: SqlObxDB
                    attr: 4
                  - text: ) and a user interface module with guards and notifiers (
                    attr: 2
                  - text: SqlObxUI
                    attr: 4
                  - text: ").\r\r"
                    attr: 2
                  - link:
                      target: "StdCmds.OpenDoc('Sql/Mod/ObxDB')"
                      body:
                        - text: SqlObxDB
                          attr: 3
                      attr: 2
                      w: 131250
                      h: 142875
                  - text: "\t\t\t"
                    attr: 2
                  - link:
                      target: "StdCmds.OpenDoc('Sql/Mod/ObxUI')"
                      body:
                        - text: SqlObxUI
                          attr: 3
                      attr: 2
                      w: 131250
                      h: 142875
                  - text: "\r\rUse the following menu entry to open the data entry mask (it may already be installed in the standard configuration of your software):\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 144000 }
                        - { stop: 1116000 }
                        - { stop: 1332000 }
                        - { stop: 4464000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\r"
                    attr: 2
                  - text: MENU
                    attr: 1
                  - text: " \"Sql\"\r\t\"Insert Anchor\"\t\"\"\t\"SqlControls.DepositAnchor; StdCmds.PasteView\"\t\"StdCmds.PasteViewGuard\"\r\t\"Insert Table\"\t\"\"\t\"SqlControls.DepositTable; StdCmds.PasteView\"\t\"StdCmds.PasteViewGuard\"\r\t"
                    attr: 2
                  - text: SEPARATOR
                    attr: 1
                  - text: "\r\t\"Browser...\"\t\"\"\t\"StdCmds.OpenAuxDialog('Sql/Rsrc/Browser', 'Browser')\"\t\"\"\r\t\"Execute\"\t\"\"\t\"SqlBrowser.ExecuteSel\"\t\"TextCmds.SelectionGuard\"\r\t"
                    attr: 2
                  - text: SEPARATOR
                    attr: 1
                  - text: "\r\t\"Company...\"\t\"\"\t\"SqlObxDB.Open; StdCmds.OpenAuxDialog('Sql/Rsrc/Company', 'Company')\"\t\"\"\r\t\"Ownership...\"\t\"\"\t\"SqlObxExt.Open; StdCmds.OpenAuxDialog('Sql/Rsrc/Owner', 'Ownership')\"\t\"\"\r\t\"Set Test Data\"\t\"\"\t\"SqlObxDB.SetTestData\"\t\"\"\r\t"
                    attr: 2
                  - text: SEPARATOR
                    attr: 1
                  - text: "\r\t\"Help\"\t\"\"\t\"StdCmds.OpenBrowser('Sql/Docu/Dev-Man', 'Sql Docu')\"\t\"\"\r"
                    attr: 2
                  - text: END
                    attr: 1
                  - text: "\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\rThe following form is opened when "
                    attr: 2
                  - text: "Sql->Company..."
                    attr: 4
                  - text: " is invoked:\r\r"
                    attr: 2
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 107
                      bodyPos: 12476
                      bodyLen: 6
                    attr: 2
                    w: 177800
                    h: 152400
                  - text: " \"StdCmds.OpenDoc('Sql/Rsrc/Company')\"\r\rOn-line, there are some extensions to the above example. The module "
                    attr: 2
                  - text: SqlObxExt
                    attr: 4
                  - text: " demonstrates an extension of "
                    attr: 2
                  - text: SqlObxDB
                    attr: 4
                  - text: " and "
                    attr: 2
                  - text: SqlObxUI
                    attr: 4
                  - text: ". It handles the ownership dialog box, i.e., it allows to enter ownerships between companies. A suitable command to open the ownership dialog box is given in the menu definition above ("
                    attr: 2
                  - text: "Sql->Ownership..."
                    attr: 4
                  - text: ").\rThe modules "
                    attr: 2
                  - text: "SqlObxGen, SqlObxViews, SqlObxNets"
                    attr: 4
                  - text: " implement an algorithm which generates a graphical representation out of the companies in the sample database, showing the ownership relations of the companies. It is interesting insofar as this is a graph algorithm (known as Lee algorithm or Dijkstra's algorithm) which requires the creation of an intermediate data structure; fetching the necessary data cannot be formulated as a single SQL query.\rTo try this example out, find an existing company in the "
                    attr: 2
                  - text: Company
                    attr: 4
                  - text: " dialog box, e.g. company with id = 1 of the test data generated by "
                    attr: 2
                  - text: SqlObxDB.SetTestData
                    attr: 4
                  - text: ". Then click on the "
                    attr: 2
                  - text: Graph
                    attr: 4
                  - text: " button in the dialog box. This will cause "
                    attr: 2
                  - text: SqlObxGen.GenNet
                    attr: 4
                  - text: " to be called. This command implements a layout algorithm, which first finds all the companies which are related to the selected company by ownership, then converts the company and ownership information into a Component Pascal data structure (module "
                    attr: 2
                  - text: SqlObxNets
                    attr: 4
                  - text: "), then performs a layout algorithm to place the companies graphically, and then generates a view which displays the graph.\r\rIn order to run the examples provided by the Sql subsystem, some sample tables have to be created first. This can be done with the command "
                    attr: 2
                  - text: SqlObxInit.Setup
                    attr: 4
                  - text: ". The following two tables are created:\r\r\tCREATE TABLE Companies\r\t\t(id\tINTEGER,\r\t\tname\tCHAR(255)\r\t\tceo\tCHAR(255)\r\t\temployees\tINTEGER)\r\r\tCREATE TABLE Ownership\r\t\t(owner\tINTEGER,\r\t\towned\tINTEGER,\r\t\tpercent\tINTEGER)\r\rWindows:\rBy default, the ODBC Text drivers are installed, for which the example database has already been created, so you don't need to perform the above CREATE TABLE statements anymore.\r\rThe modules "
                    attr: 2
                  - text: SqlObxDB
                    attr: 4
                  - text: ", "
                    attr: 2
                  - text: SqlObxExt
                    attr: 4
                  - text: ", "
                    attr: 2
                  - text: SqlObxGen
                    attr: 4
                  - text: ", and "
                    attr: 2
                  - text: SqlObxInit
                    attr: 4
                  - text: " contain ODBC-specific references (protocol, datasource, id, password) which have to be adapted before using them if another database driver is used instead of the "
                    attr: 2
                  - text: SqlOdbc
                    attr: 4
                  - text: " driver. It is sufficient to change the constant declarations appropriately.\r\rThe tables can be inspected and modified using the database browser "
                    attr: 2
                  - text: SqlBrowser
                    attr: 4
                  - text: ". Just type an SQL query in the "
                    attr: 2
                  - text: Statement
                    attr: 4
                  - text: " field of the browser window and press return.\r"
                    attr: 2
