                flow:
                  - text: "BlackBox Contributors\r"
                    attr: 0
                  - text: "\rBlackBox is based on the foundation laid at ETH Zürich by the professors Niklaus Wirth and Jürg Gutknecht (Oberon language and system), Hanspeter Mössenböck (Oberon-2 extensions) and several former research assistants, e.g., Régis Crelier, Josef Templ and Stefan Ludwig. At Oberon microsystems, the following (current or former) employees have contributed to BlackBox:\r\r - Beat Heeb\r - Cuno Pfister\r - Clemens Szyperski\r - Thomas Amberg\r - Daniel Diez\r - Christian Di Giorgio\r - Marc Frei\r - Dominik Gruntz\r - Matthias Hausner\r - Stephan Koch\r - Ivan Posva\r - Bengt Rutisson\r - Wolfgang Weck\r - Jürg Wullschleger\r\rThe following members of the BlackBox community have contributed to BlackBox:\r\r- Werner Bossert\r- Werner Braun\r- Chris Burrows\r- Robert D. Campbell\r- Oleg N. Cher\r- Marco Ciot\r- Doug Danforth\r- Ivan Denisov\r- Koen Desaeger\r- Ilya Ermakov\r- Ivan Goryachev\r- Alexander Iljin\r- Boris Ilov\r- Ivan Kuzmitski\r- Wenying Luo (Luowy)\r- Gerhard Marent\r- Gérard Meunier\r- Rainer Neubauer\r- Katarzyna Regent Nguyen \r- Roman Miro (Romiras)\r- Manuel Martín Sánchez\r- Wojtek Skulski\r- Dmitry Solomennikov\r- Eugene Temirgaleev\r- Josef Templ\r- Andrew Thomas\r- Fyodor Tkachov\r- Bernhard Treutwein\r- Igor Dehtyarenko (Trurl)\r- Eric Wehrli\r- Mathieu Westerweele\r- Helmut Zinn\r\r"
                    attr: 1
                  - text: "(We hope that this list is reasonably complete at least for the more recent releases of BlackBox, otherwise we apologize.)"
