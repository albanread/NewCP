                  - text: "\r\rThe following control codes are used in the BlackBox Component Framework:\r\r00X\tnul\tstring terminator\r01X\tunicode\tunicode mask character\r02X\tviewcode\tview mask character\r07X\trdel\tright delete key\r08X\tdel\tleft delete key\r"
