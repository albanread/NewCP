                    attr: 1
                  - text: "0EX\tpara"
                    attr: 2
                  - text: "\tparagraph separator\t(Unicode 2029, PARAGRAPH SEPARATOR)\r10X\tpL\tpage left\r11X\tpR\tpage right\r12X\tpU\tpage up\r13X\tpD\tpage down\r14X\tdL\tdocument left\r15X\tdR\tdocument right\r16X\tdU\tdocument up\r17X\tdD\tdocument down\r1BX\tesc\tescape key\r1CX\taL\tarrow left key\r1DX\taR\tarrow right key\r1EX\taU\tarrow up key\r1FX\taD\tarrow down key\r\rOf these codes, only "
