                  - text: "\r\r\rThe character set for the Component Pascal "
                    attr: 1
                  - text: SHORTCHAR
                    attr: 4
                  - text: " data type is an 8-bit character set based on the ISO 8859-1 standard. It includes the ASCII (American Standard Code for Information Interchange) and the so-called Latin-1 extension to ASCII. Latin-1 includes most characters necessary for writing in languages which are based on Latin.\rThe character set for the Component Pascal "
                    attr: 1
                  - text: CHAR
                    attr: 4
                  - text: " data type is Unicode.\r\rBoth ASCII and Latin-1 contain slots for control characters, which are character codes used for various purposes, but which do not correspond to any glyph, i.e. visual representation of a character.\r\rFor BlackBox, several punctuation marks from the 16-bit Unicode standard have been mapped into the unused upper control code portion of Latin-1.\r\r\r"
                    attr: 1
                  - target:
                      name: Character
                      body:
                        - text: Character set listing
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
