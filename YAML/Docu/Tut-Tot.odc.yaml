                  - text: "Part I: Design Patterns"
                    attr: 5
                  - text: "\r\rPart I of the BlackBox tutorial gives an introduction to the design patterns that are used throughout BlackBox. To know these patterns makes it easier to understand and remember the more detailed design decisions in the various BlackBox modules.\r\rPart II of the BlackBox tutorial demonstrates how the most important library components can be used: control, form, and text components.\r\rPart III of the BlackBox tutorial demonstrates how new views can be developed, by giving a series of examples that gradually become more sophisticated.\r\r"
                    attr: 3
                  - text: 1 User Interaction
                    attr: 1
                  - text: "\r\rIn this section, we will discuss how a user interface can be made user-friendly. Graphical user interfaces are part of the answer. Unfortunately, this answer leads to another problem: how can such a user interface be implemented at reasonable cost? The design approach which solves this problem is surprisingly fundamental, and has deep consequences on the way we construct modern software. It is called object-oriented programming.\r\r\r"
                    attr: 3
                  - text: 1.1 User-friendliness
                    attr: 6
                  - text: "\r\rThere are at least 100 million personal computers in use today. With so many users who are not computer specialists, it is important that computers be easy to use. This implies that operating systems and applications must be user-friendly. What does this mean? There are several aspects.\rFirst, the various applications should be consistent with one another: a function that is available in several programs should have the same user interface in all of them, so that the user does not have to learn different ways to do one and the same thing. One way to achieve this is to publish user interface guidelines that all software developers should adhere to. This approach was championed by Apple when they introduced the Macintosh. A second approach is to implement a function only once, so that it can be reused across different applications. This is the idea of component software. Apple didn't go that far, but they at least provided a number of so-called \"toolbox\" routines. The toolbox is a comprehensive library built into the Mac OS.\r\rSecond, the idea of the desktop metaphor, where icons graphically represent files, directories, programs, and other items, made it possible to replace arcane commands that have to be remembered and typed in by more intuitive direct manipulation: for example, an icon can be dragged with the mouse and dropped into a waste basket, instead of typing in \"erase myfile\" or something similar. Such a rich user interface requires a vast set of services. Not surprisingly, the Mac OS toolbox included services for windows, menus, mouse, dialog boxes, graphics, and so on. The toolbox made it possible to build applications that really adhered to the user interface guidelines. Unfortunately, programming for such an environment implied a tremendous leap in complexity. As a result, the Macintosh was much easier to use than earlier computers, but it was also much more difficult to program.\rToday, the browser metaphor is an increasingly popular addition to traditional graphical user interfaces. Combined with Internet access, it opens a huge universe of documents to a computer user  and makes the job of a developer even more complicated.\r\rFinally, one of the most general and most important aspects of user-friendliness is the avoidance of modes. A modal user interface separates user interactions into different classes, and gives a separate environment to each class. Switching between environments is cumbersome. For example, in a database application, a user may open a window (or \"screen\", \"mask\") for data entry. In this window, no records may be deleted, no records may be searched, no notes taken, no email read, etc. For each of these other tasks, the data entry environment would have to be left first. This is cumbersome, and reminds us of the application- rather than the document-centric way of computing discussed in the first part of this book. In complex applications, it is often difficult to remember where you currently are, what commands are available, and where you may go next. Figure 1-1 shows an example of the states and possible state transitions of a hypothetical modal application.\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 30
                      bodyPos: 2636
                      bodyLen: 1741
                    attr: 3
                    w: 3276600
                    h: 2019300
                  - text: "\r\rFigure 1-1. Navigation possibilities in a modal user interface\r\rNon-modal user interfaces have no separate working environments, or at least let you switch between environments without losing the state of others. For example, if during data entry you want to look up something with a library browser or text searching tool, you don't lose the partial data that you have already entered. If there are separate working environments,  navigation is made simple and obvious by giving explicit feedback about the environment and its capabilities.\rA modern graphical user interface is a prime example of a mostly non-modal user interface. There may be several windows (environments) open at the same time, but it is clearly visible with which window you are currently interacting (usually the \"top\" window). You can work in one window, temporarily work in another one (thereby bringing it to the top), and later switch back to resume your work in the first window.\r\rThese user interfaces are a huge improvement over old-style modal interfaces. Users feel more comfortable because they have a better idea of where they are and what they can do. However, even modern GUIs are far from perfect. Most of them still use modal dialog boxes, i.e., windows that you can't put aside to work with another one for a while. For example, a typical modal file dialog box lets you open a file, but doesn't allow you to quickly switch to a file searching tool and back again. The dialog box \"modes you in\". Even the fact that you have to bring a window to the top before manipulating it constitutes an inconvenient and unnecessary mode, at least if you have a screen large enough that you can lay out all needed windows in a non-overlapping fashion. And many database products don't allow you to have several data entry or data manipulation forms open at the same time. A Web browser is the closest thing to a truly non-modal user interface today: if you have entered some incomplete data into an HTML form, and then switch to another Web page, the browser won't prevent you from doing it.\r\rThe BlackBox Component Builder is more radical than other tools in that it simply doesn't support modal dialog boxes. Every dialog box is non-modal, except for a very few built-in operating system dialog boxes such as the standard file dialog boxes. In general, you can always put dialog boxes aside and get back to them later.\r\r\r"
                    attr: 3
                  - text: 1.2 Event loops
                    attr: 6
                  - text: "\r\rImplementing a non-modal application looks deceptively simple: the program waits for a user event, such as a mouse click or a key press; reacts in an appropriate way; waits for the next event; and so on. This programming style, with a central loop that polls the operating system for events and then calls the appropriate handlers for them, is called event-driven programming.\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 31
                      bodyPos: 4427
                      bodyLen: 1361
                    attr: 3
                    w: 3822658
                    h: 3263864
                  - text: "\r\rFigure 1-2. Event loop of a non-modal program\r\rThe event-polling loop of a typical event-driven program looks similar to the following program fragment:\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\tPROCEDURE Main;\r\t\tVAR event: OS.Event;\r\tBEGIN\r\t\tLOOP\r\t\t\tevent := OS.NextEvent();\t"
                    attr: 3
                  - text: "(* poll the operating system for the next event *)"
                    attr: 7
                  - text: "\r\t\t\tIF event IS KeyDownEvent THEN\r\t\t\t\tHandleKeyDown(event)\r\t\t\tELSIF event IS MouseDownEvent THEN\r\t\t\t\tIF MouseInMenu(event) THEN\r\t\t\t\t\tHandleMenuEvent(event)\r\t\t\t\tELSIF MouseInWindowTitle(event) THEN\r\t\t\t\t\tHandleTitleEvent(event)\r\t\t\t\tELSIF MouseInWindowBorder(event) THEN\r\t\t\t\t\tHandleBorderEvent(event)\r\t\t\t\tELSIF MouseInWindowContents(event) THEN\r\t\t\t\t\tHandleContentsEvent(event)\r\t\t\t\tELSIF...\r\t\t\t\t\t...\r\t\t\t\tEND\r\t\t\tELSIF ...\r\t\t\t\t...\r\t\t\tEND\r\t\tEND Main;\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\rListing 1-3. Event loop with cascaded selection of event handlers\r\rIn realistic programs, these cascaded IF-statements can easily span several pages of code, and are always similar. Thus it suggests itself to put this code into a library (or even better, into the operating system).\rSuch a library would implement the standard user interface guidelines. For example, the "
                    attr: 3
                  - text: HandleTitleEvent
                    attr: 7
                  - text: " would further distinguish where in the window's title bar the mouse has been clicked. Depending on the exact location, the window will be dragged to another place, zoomed, closed, etc. This is a generic behavior that can, and for consistency reasons should, only be implemented once. A procedure like "
                    attr: 3
                  - text: HandleContentsEvent
                    attr: 7
                  - text: " is different, though. A standard library cannot know what should happen when the user has clicked into the interior (contents) area of a window.\rIf we require that the library itself must never need adaptation to a particular application, then there results a peculiar kind of system structure, where a library sometimes calls the application. Such a call is called a \"call-back\". When we visualize an application as sitting on top of the library, it becomes obvious why such calls are also called \"up-calls\" and the resulting programming style as \"inverted programming\":\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 37
                      bodyPos: 6168
                      bodyLen: 681
                    attr: 3
                    w: 3733800
                    h: 2120900
                  - text: "\r\rFigure 1-4. Inverted programming design pattern\r\rA library which strongly relies on inverted programming is called a "
                    attr: 3
                  - text: framework
                    attr: 7
                  - text: ". It is a semi-finished product that must be customized by plugging in procedures at run-time. For some of the procedures, this can be optional: for procedure "
                    attr: 3
                  - text: HandleTitleEvent
                    attr: 7
                  - text: " there can be a default implementation that implements the standard user interface guidlines. Such procedures will only be replaced if unconventional behavior is desired.\r\rExperience shows that a procedure plugged into a framework frequently refers to the same data. For example, the procedure "
                    attr: 3
                  - text: HandleTitleEvent
                    attr: 7
                  - text: " will often access the window in which the user has clicked. This makes it convenient to bundle the procedure and its state into a capsule. Such a capsule is called an "
                    attr: 3
                  - text: object
                    attr: 7
                  - text: ", and it lifts inverted programming to "
                    attr: 3
                  - text: object-oriented programming
                    attr: 7
                  - text: ".\r\rThinking about user-friendly software led us to the problem of how to reduce the amount of repetitive and complex coding of event loops, which led us straight to the inverted programming design style; to frameworks as a way of casting such a design style into code; and to object-oriented programming as a means to implement frameworks in a convenient way.\r\rThe BlackBox Component Framework hides the event loop from application programmers. It goes even further than older frameworks in that it also hides platform-specific user-interface features such as windows and menus. This was achieved by focusing on the abstraction that represents the contents of a window: the so-called "
                    attr: 3
                  - text: View
                    attr: 7
                  - text: " type. We will come back to this topic in Chapter 2 in more detail.\r\r\r"
                    attr: 3
                  - text: 1.3 Access by multiple users
                    attr: 6
                  - text: "\r\rPersonal computers have made computer users independent from central IT (information technology) departments, their bureaucracies, and their overloaded time-sharing servers. This independence is a good thing, if it can be combined with integration where this is useful and cost-effective. Local area networks, wide area networks, and then the Internet have made integration possible. When two computers cooperate over a network, one of them asks the other to provide a service, for example to deliver a file over the network. The computer which issues the request is called the "
                    attr: 3
                  - text: client
                    attr: 7
                  - text: ", the other one is called the "
                    attr: 3
                  - text: server
                    attr: 7
                  - text: ". The same machine may act both as a client and as a server, but often these roles are assigned in a fixed manner: the clerk at the counter of a bank's branch office always uses a client machine, and the large box in the air-conditioned vault of the bank's headquarters is always used as a server. A bank's internal network may connect thousands of clients to dozens of servers. But even the smallest network obviously requires that applications are split into two parts: a client and a server part. Consequently, this kind of architecture is called "
                    attr: 3
                  - text: client/server
                    attr: 7
                  - text: " computing. It allows to assign processing tasks to the machines which are most suitable. In enterprise environments, the most popular assignment is to put a centralized database on a "
                    attr: 3
                  - text: database server
                    attr: 7
                  - text: ", and the remaining functionality on the client machines. This is called a "
                    attr: 3
                  - text: 2-tier
                    attr: 7
                  - text: " architecture. It requires "
                    attr: 3
                  - text: fat clients
                    attr: 7
                  - text: ", i.e., client machines have to perform everything but the actual database accesses. To reduce this burden, high-end database management systems allow to execute some code on the server itself, as an interpreted "
                    attr: 3
                  - text: stored procedure
                    attr: 7
                  - text: ". This can greatly increase performance, because it can prevent large amounts of data being shuffled back and forth over the network.\rIf large numbers of clients are involved, it can become hard to keep all client installations up-to-date and consistent. This problem can be reduced using a "
                    attr: 3
                  - text: 3-tier
                    attr: 7
                  - text: " architecture, where special application servers are interposed between clients and servers. The \"thin\" clients are reduced to implementing user interfaces, the database servers handle the databases, while the application servers contain all application-specific knowledge (\"business logic\").\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 38
                      bodyPos: 7039
                      bodyLen: 918
                    attr: 3
                    w: 4267200
                    h: 2197100
                  - text: "\r\rFigure 1-5. 3-tier client/server architecture pattern\r\rA 3-tier architecture is reasonably manageable and scalable in terms of size. Note that a software system separated in this way can be scaled down, in the extreme case by putting the client, application server, and database server on a single machine. The other way around does not work: a monolithic application cannot be easily partitioned to fit a client/server architecture.\rClients and servers are coupled over a network. Communication either operates at the low abstraction level of untyped byte streams (e.g., using a sockets interface for TCP/IP communication) or at the high abstraction level of typed data. In the latter case, either distributed objects (for immediate point-to-point communication) or message objects (for multicast or delayed communication) are used.\r\rThe "
                    attr: 3
                  - text: Comm
                    attr: 7
                  - text: " subsystem of the BlackBox Component Framework provides a simple byte stream communication abstraction, on top of which messaging services can be built. Among other things, this has been used to implement remote controls, i.e., controls which visualize and manipulate data on a remote machine. For example, the internal state of an embedded system can be monitored in this way.\rThe "
                    attr: 3
                  - text: Sql
                    attr: 7
                  - text: " subsystem of the BlackBox Component Framework provides a simple distributed object interface specialized for accessing SQL databases. More general DCOM-based [COM] distributed objects can be accessed and implemented with the optional Direct-To-COM Component Pascal compiler.\r\r\r"
                    attr: 3
                  - text: 1.4 Language-specific parameters
                    attr: 6
                  - text: "\r\rThe global nature of today's software business often makes it necessary to produce \"localized\" versions of a software package. At the least, this requires translation of all string constants in the program that the user may see. For example, in a country like Switzerland, where four official languages are spoken, it is often required that the same application is available in German, French, and Italian language versions. This can even mean that the layouts of dialog boxes need to be adapted to the different languages, since the captions and control labels have different lengths in different languages.\rIf such language-specific aspects are hard-coded into the program sources, language-specific versions require editing and compiling the source code. This is always a sensitive point, since errors and inconsistencies can easily be introduced. It is also very inconvenient: hard-coded layouts of dialog boxes are very unintuitive to modify, and the edit-compile-run cycle is cumbersome if you only want to move or resize a control.\rMany tools have been developed which provide more convenient special-purpose editors, in particular layout editors for dialog boxes. One type of tool produces source code out of the interactively produced layout, which then has to be compiled. Since a programmer have to edit the generated source code, it is easy to introduce inconsistencies between the layout and the source code.\rFortunately, there is a much better way to solve this problem, by avoiding the intermediate source-code generator and directly use the editor's output in the program. The editor saves the dialog box layout in a file, a so-called "
                    attr: 3
                  - text: resource
                    attr: 7
                  - text: " file. The program then reads these resources when it needs them, e.g., when it opens a dialog box. Resources can be regarded as persistent objects which are only modified if the configuration is changed.\r\rWe have seen that the problem of convenient adaptation of a program to different languages can be solved by separating language- or location-specific parameters from the source code. They are put into resource files, which can be modified by convenient special-purpose editors.\rMoving user-interface aspects away from the proper application logic is a way to make client software more modular and better adaptable. If taken to the extreme, resources almost "
                    attr: 3
                  - text: become
                    attr: 7
                  - text: " the client software: a Web browser on a client is all that is needed to present a user interface; the resources (HTML texts) are downloaded from a server whenever needed. (However, this approach with \"ultra-thin\" clients becomes less credible the fatter the Web browsers themselves become.)\r\rThe BlackBox Component Framework uses its standard document format to store resources. For example, a dialog box and its controls are simply parts of a compound document stored in a file. The same view is used for layouting and for actually using a dialog box  no separate layout editor progam is needed. Resources can be available in several language versions simultaneously, and languages can even be switched at run-time. This is useful for customs applications or other programs used in regions where several languages are spoken.\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000009
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: 2 Compound Documents
                    attr: 1
                  - text: "\r\rIn the previous sections, we have discussed a variety of problems that occur with interactive systems, and we have seen various architecture and design approaches that help to solve them.\rIn the following sections we focus specifically on the programming problems posed by compound documents, and the design patterns that help to solve them.\r\r\r"
                    attr: 3
                  - text: 2.1 Persistence
                    attr: 6
                  - text: "\r\rWe call the object that is contained in a window a "
                    attr: 3
                  - text: view
                    attr: 7
                  - text: ". A view displays itself in the window, and it may interpret user input in this area, such as mouse clicks. In the most general case, a view can be opened and saved as a document. Other views may be created at run-time or are loaded from resource files. The contents of a \"Find & Replace\" dialog box is an example of the latter case.\r\rIn general, a view is a persistent object. This presumes a mechanism for the externalization (saving) and the internalization (opening) of a view. Using object-oriented programming, we can model a view as a specialization of a generic persistent object, which we call a "
                    attr: 3
                  - text: store
                    attr: 7
                  - text: ". A store can externalize and internalize its persistent state. A view is a specialized store, i.e., a subtype. In addition to externalizing and internalizing themselves, views can display themselves and can handle user input. These generic views can be further specialized, for example to text views, picture views, and so on (see Figure 2-1).\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 41
                      bodyPos: 8211
                      bodyLen: 719
                    attr: 3
                    w: 4038600
                    h: 2514600
                  - text: "\r\rFigure 2-1. Subtype relations between views and stores\r\rIn the BlackBox Component Framework, stores are represented as type "
                    attr: 3
                  - text: Store
                    attr: 7
                  - text: " in module "
                    attr: 3
                  - text: Stores
                    attr: 7
                  - text: "; views are represented as type "
                    attr: 3
                  - text: View
                    attr: 7
                  - text: " in module "
                    attr: 3
                  - text: Views
                    attr: 7
                  - text: "; and there are various specific views such as type "
                    attr: 3
                  - text: View
                    attr: 7
                  - text: " in module "
                    attr: 3
                  - text: TextViews
                    attr: 7
                  - text: " or type "
                    attr: 3
                  - text: View
                    attr: 7
                  - text: " in module "
                    attr: 3
                  - text: FormViews
                    attr: 7
                  - text: " or type "
                    attr: 3
                  - text: Control
                    attr: 7
                  - text: " in module "
                    attr: 3
                  - text: Controls
                    attr: 7
                  - text: " (see Figure 2-2). This is only a small selection, actually there are many more view types. The store mechanism's file format is platform-independent, i.e., differences in byte ordering are compensated for.\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 42
                      bodyPos: 9070
                      bodyLen: 671
                    attr: 3
                    w: 4064000
                    h: 2514600
                  - text: "\r\rFigure 2-2. Subtype relations between views and stores in BlackBox\r\rOften, copying of a store is equivalent to writing it to a temporary file, and then reading it in again (externalize old object to file, then allocate and internalize new object from file). This makes it convenient to combine persistence and copying support in the same store abstraction. However, BlackBox stores are able to change their identities or to \"dissolve\" upon externalization to a file, in which case copying is not equivalent to externalize/internalize anymore. For example, error marker views which indicate syntax errors remove themselves upon externalization  yet a visible error marker can be copied with drag & drop like any other view. To allow for such flexibility, BlackBox doesn't automatically treat copying as an externalize/internalize pair. Stores have explicit "
                    attr: 3
                  - text: Externalize
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: Internalize
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: CopyFrom
                    attr: 7
                  - text: " methods. Upon externalization, a store gets the opportunity to substitute another store for itself, possibly "
                    attr: 3
                  - text: NIL
                    attr: 7
                  - text: ". This is the mechanism which allows to change its identity to another one, a so-called "
                    attr: 3
                  - text: proxy
                    attr: 7
                  - text: ".\r\r\r"
                    attr: 3
                  - text: 2.2 Display independence
                    attr: 6
                  - text: "\r\rThe computing world is heterogeneous, with different hardware and operating system platforms on the market. The Internet, with its millions of platforms of all flavors, has finally made it clear how important platform-independence of code and data is. This is not easy to achieve, because software and hardware can vary widely between platforms. Display devices, such as monitors and printers, are a good example. Their spatial and color resolutions can differ enormously.\rTo achieve platform-independent code, views and their persistent state must not refer to specific devices. Instead, the "
                    attr: 3
                  - text: document space
                    attr: 7
                  - text: " and the "
                    attr: 3
                  - text: display space
                    attr: 7
                  - text: " must be clearly separated and a suitable mapping between the two must be provided by a framework. For example, in the document space, distances are measured in well-defined units such as inches or millimeters, while in the display space, distances are measured in pixels, whatever their actual sizes may be.\r\rTo model the separation between display and document space, where the document space is populated by persistent views, we need an abstraction of a display device. We call such an object a "
                    attr: 3
                  - text: frame
                    attr: 7
                  - text: ". A frame is a rectangular drawing surface which provides a set of drawing operations. When it is made visible, a view obtains a frame, and via this frame it can draw on the screen (or printer). The frame performs the mapping between the document space units and the pixels of the display device, so that views never need to deal with pixel sizes directly.\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 43
                      bodyPos: 9871
                      bodyLen: 1919
                    attr: 3
                    w: 4495800
                    h: 3048000
                  - text: "\r\rFigure 2-3. Separation of display and document space\r\rIn the BlackBox Component Framework, document space units are measured in 1/36000 millimeters. This value is chosen such that it minimizes rounding errors for typical display resolutions. A BlackBox frame provides a local coordinate system for its view. For the time being, you can regard a frame as a window and a view as a document. A view which isn't displayed has no frame. Frames are light-weight objects that come and go as needed. They are created and destroyed by the framework, and need not be implemented or extended by the view programmer.\rThe only case where it is necessary to extend frames is when platform-specific controls or OLE objects need to be wrapped as BlackBox views. Since writing such wrappers is a messy business, the framework provides standard OLE wrappers (Windows version) and wrappers for the important (pre-OLE) standard controls.\r\r\r"
                    attr: 3
                  - text: 2.3 Multi-view editing
                    attr: 6
                  - text: "\r\rSimple views work fine if they are small enough to fit on a screen. However, texts, tables, or graphics can easily become larger than a screen or printed page. In this case, a frame (which lies strictly within the boundaries of its display device) can only display part of the view. To see the other parts, the user must "
                    attr: 3
                  - text: scroll
                    attr: 7
                  - text: " the view, i.e., change the way in which it translates its data to its local coordinate system. For example, a text view's first line (its origin) may be changed from the topmost line to another one further below, thus displaying a text part further below (see Figure 2-4).\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 44
                      bodyPos: 11850
                      bodyLen: 1123
                    attr: 3
                    w: 4902200
                    h: 2971800
                  - text: "\r\rFigure 2-4. Scrolling a text view\r\rThe need for scrolling can become very inconvenient when working with two parts of a view that are far apart, because it means that the user often must scroll back and forth. This problem can be solved by "
                    attr: 3
                  - text: multi-view editing
                    attr: 7
                  - text: ": the same data is presented in more than one view. The views may differ in their origins only, or they may differ more thoroughly. For example, one view may present a list of number values as a table of numbers, while another view may present the same data as a pie chart (see Figure 2-5).\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 45
                      bodyPos: 13023
                      bodyLen: 1105
                    attr: 3
                    w: 4178300
                    h: 2438400
                  - text: "\r\rFigure 2-5. Different kinds of views presenting the same data\r\rAn object which represents data that may be presented by several views is called a "
                    attr: 3
                  - text: model
                    attr: 7
                  - text: ". The separation into view and model go back to the Smalltalk project at Xerox PARC. In the patterns terminology, the view is an "
                    attr: 3
                  - text: observer
                    attr: 7
                  - text: " of the model.\r\rIn the BlackBox Component Framework, the model/view separation is optional. Small fixed-size views that easily fit in a window usually don't need separate models, while larger or more refined views do. This can result in a situation like the following one, where a view has a separate model, and both together form the document which is displayed in a window:\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 46
                      bodyPos: 14188
                      bodyLen: 1923
                    attr: 3
                    w: 5029200
                    h: 3213100
                  - text: "\r\rFigure 2-6. Separation of models and views in BlackBox\r\rThe user can open a second window, which displays its own view, but for the same model. This results in the following situation:\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 47
                      bodyPos: 16151
                      bodyLen: 2237
                    attr: 3
                    w: 5029200
                    h: 3213100
                  - text: "\r\rFigure 2-7: Multiple views for the same model\r\rOnly one of the two views is externalized when the document is saved in a file. To avoid schizophreny, one window is clearly distinguished as the main window, while all others are so-called "
                    attr: 3
                  - text: subwindows
                    attr: 7
                  - text: ". If you close a subwindow, only this window is closed. But if you close the main window, it and all its subwindows are closed simultaneously.\r\r\r"
                    attr: 3
                  - text: 2.4 Change propagation
                    attr: 6
                  - text: "\r\rMulti-view editing creates a consistency problem. Editing a view means that the view causes its model to change. As a result, "
                    attr: 3
                  - text: all
                    attr: 7
                  - text: " views presenting this model must be updated if necessary, not only the view in which the user currently works. For example, if the user changes a value in the table view of Figure 2-5, then the pie chart in the other view must be updated accordingly, because their common model has changed.\rSuch a change propagation is easy to implement. After the model has performed an operation on the data that it represents, it notifies all views which present it, by sending them an "
                    attr: 3
                  - text: update message
                    attr: 7
                  - text: " describing the operation that has been performed.\rNotification could be easily done by iterating over a linear list of views anchored in the model. Such a functionality can be provided once and for all, by properly encapsulating it in a class. This change propagation class provides an interface consisting of two parts. The first part allows to register new views that want to listen to update messages (\"subscribe\"). The second part allows to send update messages (\"publish\"):\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 48
                      bodyPos: 18468
                      bodyLen: 1495
                    attr: 3
                    w: 4241800
                    h: 2514600
                  - text: "\r\rFigure 2-8. Change propagation mechanism\r\rThis mechanism has an important advantage: it decouples model and views such that the model itself need not be aware of its views, and the list of views can be encapsulated in the change propagation mechanism. Such a reduced coupling between model and views is desirable because it reduces complexity. It makes the model unaware, and thus independent, of its views. This is important in an extensible system, because it allows to add new view types without modifying the model. This would not be possible if the model had to know too much about its views.\r\rSometimes the mechanism described above does too much. It sends update messages to all views, independent of whether they need updating or not. For example, when a word was deleted in a text model, then some text view may display a part of the text which is not affected by the deletion at all. This view need not do anything. Of course, all the views that "
                    attr: 3
                  - text: do
                    attr: 7
                  - text: " display the affected text stretch must be updated accordingly.\r\rFor this reason, the BlackBox Component Framework sends update messages only to those views which have frames. Since every frame knows its view, the change propagation mechanism actually registers the frames, not the views. Even better, the framework already has a list of frames for window management, so it can reuse this list. Thus, instead of having one change propagation object per model, BlackBox uses one global change propagation service integrated into the window manager. Messages are represented as static message records. This is an unconventional but robust, efficient, and light-weight implementation of the observer pattern.\r\r\r"
                    attr: 3
                  - text: 2.5 Nested views
                    attr: 6
                  - text: "\r\rSo far, we have assumed that a view (possibly with a model) is a document, and a frame is a window. Actually, things are a bit more difficult. The reason is that views may be nested. Some views are able to contain (\"embed\") other views; for this reason they are called container views. Some containers are very general, and allow to embed arbitrary numbers and types of other views. For example, a text view may embed table views, bitmap views, and so on. It may even embed another text view, meaning that arbitrarily deep nesting hierarchies can be created.\rHow does this affect what we have said so far? Obviously, we need to generalize our notion of views and frames. A view can contain other views, which can contain still other views, etc.; i.e., views become hierarchical. In principle, those hierarchies need not even be trees, they can be arbitrary directed acyclic graphs (DAGs). This means that several views in a document may refer to the same model, but no references may go \"upwards\" in the document hierarchy, because this would lead to an endless recursion when drawing the document, like a TV which displays itself.\rThe frames represent a subset of the view hierarchy. Since a frame is always completely contained within its parent frame, the frame hierarchy is strictly a tree.\rA document can now be regarded as the root of a view DAG, and a window can be regarded as the root of a frame tree.\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 49
                      bodyPos: 20023
                      bodyLen: 2489
                    attr: 3
                    w: 5029200
                    h: 3695700
                  - text: "\r\rFigure 2-9. Nested views and frames\r\rThis is a straight-forward generalization which doesn't add unexpected complexity. It is a simplified implementation of the "
                    attr: 3
                  - text: composite
                    attr: 7
                  - text: " design pattern. It was simplified because the type safety of Component Pascal makes it unnecessary to burden the abstract view type with container-specific operations that are meaningless for non-containers.\rUnfortunately, more complexity comes in when we consider the combination of nested views and multi-view editing. First of all, multi-view editing means the separation of views and models. An embedded view belongs to the model, since it is part of the data that the container view presents. For example, a user who edits a text view may delete embedded views just like she may delete embedded characters. Figure 2-10 illustrates the situation of two container views with a container model in which some other view is embedded:\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 50
                      bodyPos: 22562
                      bodyLen: 909
                    attr: 3
                    w: 2603500
                    h: 3632200
                  - text: "\r\rFigure 2-10. Container views with model, context, and embedded view\r\rNote the interesting link between a model and an embedded view: the "
                    attr: 3
                  - text: context
                    attr: 7
                  - text: " object. It describes the location and possibly other attributes of one embedded view. The context's type is defined by the container. A context is created by the container when the view is being embedded. The embedded view can ask its context about its own location in the container, and may even obtain further information. For example, text container contexts may provide information about the embedded view's position in the text (character index), about its current font and color, and so on.\rAn embedded view may use its context object not only for getting information about its container, it may also cause the container to perform some action. For example, the embedded view may ask the container, via the context object, to make it smaller or larger. Containers are free to fulfill such requests, or to ignore them. In negotiations between a container and one of its embedded views, the container always wins. For example, a container doesn't allow an embedded view to become wider than the container itself.\rA context object can be regarded as a call-back interface which the container installs in the embedded view as a plug-in, so the view can call back the container and obtain services from it. A context is part of a notification mechanism that allows the container to observe messages from the contained views.\rIn subsequent figures, context objects are not drawn expliclity in order to make the figures easier to understand. Just remember that every view carries a context that it can use when necessary.\r\rNow that nested views and the separation of model and view are supported, it becomes possible to allow subwindows on embedded views, not only on root views. This can be quite helpful, if a small view must be edited. Just open a subwindow for it, enlarge the window, and editing becomes much easier.\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 51
                      bodyPos: 23521
                      bodyLen: 2913
                    attr: 3
                    w: 5029200
                    h: 3657600
                  - text: "\r\rFigure 2-11. Subwindow on embedded view\r\rCompound documents introduce a further complication. For root views, scrolling state is not retained when the document is saved to disk. At least most users seem to prefer that the scrolling state of a view not be persistent. This is different for embedded views, though. Setting the origin of an embedded view is not so much for convenience (subwindows are better for that) as for publishing: the user chooses which part of the view should be visible in the container.\rThe same holds for an undo/redo mechanism: scrolling in a root view is not a true document editing manipulation, and thus undo/redo would add inconvenience rather than usefulness. However, the scrolling of an embedded view must be treated as a genuine editing operation, and thus should be undoable/redoable.\rIn summary, this means that the implementor of a view must treat non-persistent view state differently, depending whether the view is a root view or an embedded view.\r\rCombining nested views with multi-view editing also destroys the one-to-one relationship between frames and views. As we will see shortly, this is the most far-reaching additional burden that a view implementor must handle.\rTo see why a view may be displayed in several frames, consider the situation in Figure 2-12:\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 52
                      bodyPos: 26474
                      bodyLen: 3112
                    attr: 3
                    w: 5029200
                    h: 4406900
                  - text: "\r\rFigure 2-12. Several frames displaying the same view\r\rSuch a situation cannot occur without nested views, because the outermost view is always copied (to allow independent scrolling, or other view-specific operations). But whenever a view is embedded in a container displayed in two different windows, then this view is displayed in two different frames. This makes the management of links between frames and views more complicated; but more importantly, it makes change propagation and screen updates more complicated.\rWhy? Let us assume that there are n frames which display the same view. Now the view's model is changed, and this change is propagated to all views which display the model. Since there is only "
                    attr: 3
                  - text: one
                    attr: 7
                  - text: " view for the model, the change propagation mechanism as we have discussed earlier will send the view an update message exactly once. However, there are n places on the screen which need updating. As a result, the view must perform n updates, by iterating over all frames that display it.\r\rFor a view, correctly maintaining the list of frames in which it is displayed is a complicated endeavour. Therefore, the BlackBox Component Framework relieves the view implementor of this error-prone task. A BlackBox view doesn't contain a frame list. Instead, the framework maintains the frame trees automatically. This was the reason that in the above figures, the arrows from frames to views only pointed in one direction, because in BlackBox the view doesn't know its frame(s). The correct frames are passed to a view whenever the framework asks the view to do something that may involve drawing. (This approach is related to the "
                    attr: 3
                  - text: flyweight
                    attr: 7
                  - text: " pattern.)\rWhen the view receives an update message and decides that it needs to update its frame(s), it simply asks the framework to send another update message to all its frames. Each of these frames will then ask the view to update the frame where this is necessary. This mechanism will be discussed in more detail in the chapters on view construction.\r\rSince there is no more one-to-one relationship between views and frames anymore, it is helpful to summarize the differences between frames and view:\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 2952000 }
                        - { stop: 4284000 }
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "aspect\tframe\tview"
                    attr: 6
                  - text: "\rlives in\tdisplay space\tdocument space\rpersistent\tno\tyes\rextended by view implementor\tusually not\tyes\rmay contain device-specific data\tyes\tno\rhierarchy\ttree\tDAG\rassociated with\tone view\t0..n frames\rupdate caused by\tits view\tits model (if any)\rcompletely enclosed by container\tyes\tnot necessarily\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\rTable 2-13. Differences between frames and views\r\r\r"
                    attr: 3
                  - text: 2.6 Delayed updates
                    attr: 6
                  - text: "\r\rIn the previous section we have seen how updates are performed in two steps: a model notifies its views of a change, and the views notify their frames of the region which needs updating.\rNow consider a complex model change. For example, a selection of graphical objects, which are part of a graphics model, are moved by some distance. It would be possible to perform an update in three phases: in the first phase, the selected objects would be removed (requiring an update); then the selected objects would be moved; and finally, the selected objects would be inserted again at their destination (requiring another update).\rThis approach is not very efficient, since it requires two notifications and partial updates. Furthermore, it needs careful sequencing of the actions, since some of them need the model's state prior to movement, and others need the model's state after movement.\r\rThere is a much simpler and more efficient approach. The idea is to delay the second phase of the updates, i.e., the phase where the frames for a view are redrawn. Instead of updating the frames immediately, the view only remembers the geometrical region which needs updating. In the above example, it could add the areas of the graphical objects prior to movement and their areas after movement (see Figure 2-14).\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 57
                      bodyPos: 29927
                      bodyLen: 738
                    attr: 3
                    w: 4737100
                    h: 1955800
                  - text: "\r\rFigure 2-14. Update region of a selection which was moved\r\rThe accumulated update region is then updated in one single step after the translation of the graphical objects has been performed. In the figure above, the update region is the total hatched area, consisting of the area occupied by the selection before the movement and the area occupied by it after the movement.\rThe framework must support this approach by providing some mechanism to add up geometrical regions, and to redraw a frame in exactly this region (\"clipping\" away all unnecessary drawing, to increase performance and to minimize flicker).\rThis delayed or "
                    attr: 3
                  - text: lazy updating
                    attr: 7
                  - text: " approach is used by the BlackBox Component Framework and all major windowing systems that exist today. Its only drawback is that for long-running commands, it may be necessary to force intermediate updates in order to inform the user of the command's progress. For this reason, forced updates are also supported by the BlackBox framework.\r\r\r"
                    attr: 3
                  - text: 2.7 Container modes
                    attr: 6
                  - text: "\r\rTo create graphical user interfaces, it is convenient to create form layouts interactively, rather than burning in the coordinates of controls in the source code of a program. A visual designer, i.e., a special-purpose graphics editor can be used for interactive manipulation of form layouts. This suggests two different modes in which a form, and its controls, can be used: design-time and run-time. When a form layout is edited in a visual designer, it is "
                    attr: 3
                  - text: design-time
                    attr: 7
                  - text: ": the form is designed, but not yet used. The completed form can be saved and later opened for use by the end user. This is called "
                    attr: 3
                  - text: run-time
                    attr: 7
                  - text: ".\rThere are two different approaches to handling layouts at run-time: either the framework allows to open the data that has been saved by the visual designer, or it runs code that has been generated out of this saved data. The first approach requires an interpreter for the visual designer's data, the second approach requires a generator between the visual designer and actual use of a form. Typically, the generator generates source code, which is possibly completed by the programmer, and then compiled into machine code using a standard programming language compiler.\rToday, the latter approach should be considered obsolete, although it is still used by many tools: it is merely an inconvenient detour. Moreover, when it forces programmers to edit the generated source code, it makes iterative changes to a layout problematic: the source code has to be regenerated without losing the changes that have been made by the programmer. This is a needless source of inconsistencies, complexity, and it slows down development.\rThe former approach is much simpler. The visual designer's output data is treated as a resource that can be utilized "
                    attr: 3
                  - text: as is
                    attr: 7
                  - text: " at run-time. This requires an interpreter for the visual designer's file format.\rThe most elegant approach is to use the same editor (i.e., view implementation) and thus the same file format both for design-time and run-time. As file format, the standard format of a compound document can be reused. This means that a form layout at design-time is a completely ordinary compound document. At run-time, it is still the same document, albeit its interaction with the user is different.\rAt design-time, a control is a passive box which can be moved around, copied or deleted, but which has no interactive behavior of its own. At run-time, a control may be focused and the control's "
                    attr: 3
                  - text: contents
                    attr: 7
                  - text: " may be edited. For example, the string contained in a text field control may be edited, or a button may be pressed and released again.\rThe direct use of compound documents as user interfaces is called "
                    attr: 3
                  - text: compound user interfaces
                    attr: 7
                  - text: ". Note that this generalization of compound documents renders the term \"document\" rather misleading, because an application may contain many forms (and thus compound user interface documents) even if it does not manipulate any documents in the traditional sense (i.e., as seen by an end-user).\r\rThe BlackBox Component Framework utilizes its support for multi-view editing to go one step further. Since a document can be opened in several views simultaneosly, it is possible to open a form layout in two windows. BlackBox allows to use form views in different modes: layout and mask mode. These modes correspond to design-time and run-time, with one major improvement: they can be used simultaneously. For example, one window may display a form in layout mode, and another window may display it in mask mode (see Figure 2-15). When the developer edits the layout in the layout mode window, any layout change is immediately reflected in the mask mode window. Vice versa, user input in the mask mode window immediately becomes visible in the layout window. This is a result of the standard change propagation mechanism of BlackBox.\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 58
                      bodyPos: 30775
                      bodyLen: 103645
                    attr: 3
                    w: 4076640
                    h: 2324190
                  - text: "\r\rFigure 2-15. Data entry form in a layout-mode view (behind) and in a mask-mode view (front)\r\rIn fact, BlackBox is even more general. In addition to layout and mask mode, it supports a few further modes. The "
                    attr: 3
                  - text: edit
                    attr: 7
                  - text: " mode allows to modify the layout and the contents of controls simultaneously, and a "
                    attr: 3
                  - text: browser
                    attr: 7
                  - text: " mode makes the form read-only except for allowing to select and copy out parts of the document.\rThese general modes are not only available for graphical forms. They are a capability shared by "
                    attr: 3
                  - text: all
                    attr: 7
                  - text: " general container views, including text views. This means that it is possible (and sometimes more convenient for the developer) to use a text view instead of a form view when assembling a dialog box. The user won't notice the difference. To simplify the construction of such powerful containers, the framework provides a comprehensive container abstraction, with an abstract container model class, an abstract container view class, and an abstract container controller class. A controller can be regarded as a split-off part of a view. It performs all user interaction, including handling of keyboard input and mouse manipulations, and it also manages selections. There is a 1:1 relation between view and controller at run-time. Separating part of a view into a controller object improves extensibility (different controllers could be implemented for the same view, and the same controller works with all concrete view implementations) and it also allows to reduce complexity: the controller of a complex view, such as a container view, can become large, which makes the separation of concerns into different types (and typically into different modules) a good idea. In terms of design patterns, a controller is a "
                    attr: 3
                  - text: strategy
                    attr: 7
                  - text: " object.\rThe container abstractions of BlackBox have been designed to abstract from specific container user interfaces. This means that details of the container look-and-feel (such as the hatched focus marks of an OLE object) are hidden from the developer. In turn, this makes it possible to implement containers in different ways for different platforms, without affecting the developer of containers. In particular, the OLE and Apple OpenDoc container look-and-feel have been implemented. While OpenDoc isn't relevant anymore, some of the human interface guidelines developed for it are still useful today.\r\r\r"
                    attr: 3
                  - text: 2.8 Event handling
                    attr: 6
                  - text: "\r\rWhen a user interacts with a compound document, this interaction always occurs in one view at a time. This view is called the current "
                    attr: 3
                  - text: focus
                    attr: 7
                  - text: ". By clicking around, the user can change the current focus. Among other events, the focus handles keyboard events, i.e., a keypress is interpreted by the focused view. The focus view and its containing views are called the "
                    attr: 3
                  - text: focus path
                    attr: 7
                  - text: ", with the innermost view being the focus.\rIt is possible to let a user interface framework manage the current focus. This requires a central manager for the focus. A more light-weight approach is to make focus management a decentral activity: leave focus management to the individual container views, which have to deal with focus changes and focus rendering anyway. Every container simply remembers which of its embedded views is the current focus, if any. The container is oblivious whether this view is on the current focus path or not.\r\rIn BlackBox, user events are sent along the focus path as message records, starting at the outermost view. Messages records are static (stack-allocated) variables of some subtype of "
                    attr: 3
                  - text: Controllers.Message
                    attr: 7
                  - text: ". There are controller messages for keyboard input, mouse tracking, drag & drop, and so on. A controller message is forwarded along the focus path until one of the views either interprets it or discards it. This view by definition is the focus.\rIn terms of design patterns, the focus path is a "
                    attr: 3
                  - text: chain of responsibility
                    attr: 7
                  - text: ".\r\rWhat happens when the focus view receives and interprets a controller message? The view (or its model, if it has one) performs some operation on its own state. If this operation affects persistent state of the view or model, it should be reversible (\"undoable\"). How is an undo/redo mechanism implemented?\rThe main idea is that upon receipt of a controller message, the view / model doesn't perform a state modification directly. Instead, it creates a special "
                    attr: 3
                  - text: operation object
                    attr: 7
                  - text: " and registers it in the framework. The framework then can call the operation's appropriate procedure for performing the actual do/undo/redo functionality.\rOperations are managed per document. Every document contains two operation stacks; one is the undo stack, the other is the redo stack. Executing an operation for the first time pushes the object on the undo stack and clears the redo stack. When the user performs an undo, the operation on top of the undo stack is undone, removed from the undo stack, and pushed onto the redo stack. When the user performs a redo, the operation on top of the redo stack is redone, removed from the redo stack, and pushed onto the undo stack. \rA document's undo and redo stacks are cleared when the document is saved (check point). Furthermore, they may be cleared or made shallower when the framework runs out of memory. For this purpose, the garbage collector informs the framework about low-memory conditions, so old operation objects can be thrown away.\r\rSome operations, such as a moving drag & drop (in contrast to the normal copying drag & drop), modify two documents simultaneously. In these rare cases, two operations are created: one for the source document (e.g., a delete operation) and one for the destination document (e.g., an insert operation).\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 59
                      bodyPos: 134560
                      bodyLen: 3641
                    attr: 3
                    w: 5918200
                    h: 3924300
                  - text: "\r\rFigure 2-16. Sequence of operations and resulting modifications of undo and redo stacks.\r\rIn Figure 2-16, a sequence of operations is shown, from 1) to 8). For the last five situations, the resulting undo and redo stacks are shown. For example, after operation 5), the undo stack contains the operations Inserting, Set Properties, and Inserting (from top to bottom of stack), while the redo stack contains Deleting.\r\rThe undo/redo mechanism is only concerned with the persistent state of a document. This is the state which can be saved in a file. Modifications of temporary state, such as a view's scroll position, are not recorded as operations, and thus cannot be undone (at least for root views).\rUndoable operations either modify the persistent state of a view, or of its model (controller state is mostly temporary). The framework knows to which document a persistent object belongs, because all persistent objects of a document share the same domain. Domains will be discussed in Part III where the store mechanism is discussed in more detail.\r\rThe BlackBox Component Framework is unique in that its undo/redo mechanism is component-oriented: it allows to compose undoable operations into "
                    attr: 3
                  - text: compound operations
                    attr: 7
                  - text: ", which are undoable as a whole. Without this capability, nested operations would be recorded as a flat sequence of atomic operations.\rConsider what this would mean for the end user. It would mean that the user could execute a menu command, which causes the execution of a hierarchy of operations. So far so good. But when the user wanted to undo this command, he or she would have to execute Edit->Undo individually for every single operation of the command, instead of only once.\rFor this reason, BlackBox provides support for arbitrarily nested operations: modules "
                    attr: 3
                  - text: Models
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: Views
                    attr: 7
                  - text: " both export a pair of "
                    attr: 3
                  - text: BeginScript
                    attr: 7
                  - text: " / "
                    attr: 3
                  - text: EndScript
                    attr: 7
                  - text: " procedures. In this context, \"script\" means a sequence or hierarchy of atomic operations which is undoable as a whole. Model and view operations can be freely mixed in a script.\rAbstract operations are very light-weight. They only provide one single parameterless procedure, called "
                    attr: 3
                  - text: Do
                    attr: 7
                  - text: ". This procedure must be implemented in a reversible way, so that if it is executed an even number of times, it has no effect. If it is executed an odd number of times, it has the same effect as when it is executed once.\rIn the design patterns terminology, an operation is called a "
                    attr: 3
                  - text: command
                    attr: 7
                  - text: ".\r\r\r"
                    attr: 3
                  - text: 2.9 Controls
                    attr: 6
                  - text: "\r\rControls are light-weight views that only provide very specific functionality, which only makes sense in concert with other controls and a container. Typical controls are command buttons and text entry fields. They are used in dialog boxes or date entry forms. The parameters or other data being represented by a control must somehow be manipulated by a corresponding program. For example, a "
                    attr: 3
                  - text: Find
                    attr: 7
                  - text: " command takes a search string as input, or the data entered into a form must be sent to an SQL database. There may even be complicated interactions between the controls of a form. For example, when a search string is empty, the "
                    attr: 3
                  - text: Find
                    attr: 7
                  - text: " button may be disabled. If something is typed in, the button is enabled. Such interactions can become very involved.\rIn principle, a control is simply an observer view on its data. This means that it would be most straight-forward to implement the data (e.g., the search string) as a model.\r\rFor BlackBox, it was felt that this approach is too heavy-weight and unconvenient. Instead, a special implementation of the observer pattern was realized, where typical applications never need to access control objects directly. They are completely \"abstracted away\". The programmer only deals with the observed data. In order to make the definition and manipulation of this data as convenient as possible, it is simply a global Component Pascal variable, called an "
                    attr: 3
                  - text: interactor
                    attr: 7
                  - text: ". A control has a symbolic name (e.g. \"TextCmds.find.ignoreCase\") which enables it to find its variable, using built-in metaprogramming facilities of BlackBox. In the interactor's module itself, there is no object reference to a control.\rWhen a control is being edited, it transparently uses the standard change propagation mechanism of BlackBox, i.e., it broadcasts view messages that notify other controls which may display the same variable.\rAlthough the interactor's module doesn't have access to its controls, it can still influence the way controls are displayed (e.g., enabled or disabled) and the way they interact with each other. This is done by exporting suitable "
                    attr: 3
                  - text: guard
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: notifier
                    attr: 7
                  - text: " procedures. They are attached to a control in the same way as its interactor link, using a suitable control property editor. The important thing is that the program need not access the controls directly, and no direct control-to-control interactions need to be programmed. This greatly simplifies the implementation and maintenance of complex user interface behaviors. The mechanism is described in more detail in Chapter 4.\rIn principle, the framework accesses the interactor's module (via metaprogramming) as a "
                    attr: 3
                  - text: singleton mediator
                    attr: 7
                  - text: ".\r"
                    attr: 3
