                  - text: "\rA simple example of a BlackBox module which follows this design is "
                    attr: 3
                  - text: DevMarkers
                    attr: 7
                  - text: ". The marker views are simple views without a model, therefore only a directory object to generate new views is offered. The second directory object "
                    attr: 3
                  - text: DevMarkers.stdDir
                    attr: 7
                  - text: " keeps the standard implementation provided by this module. It might be used to install back the default implementation or to reuse the default implementation (as an instance) in another component.\r\rThe separation of a type's definition from its implementation is recommended in the design of new BlackBox subsystems. However, simple view types which won't become publicly available or which are not meant to be extended can certainly dispense with this additional effort.\r\rNote that the subsystem wizard (menu item Tools->Create Subsystem...) helps to generate templates for the different kinds of view. In particular, it is possible to generate separate model and view modules. The tool uses the template texts stored in "
                    attr: 3
                  - text: Dev/Rsrc/New
                    attr: 7
                  - text: ". You may want to study the files "
                    attr: 3
                  - text: Models5
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: Views5
                    attr: 7
                  - text: ", and "
                    attr: 3
                  - text: Cmds5
                    attr: 7
                  - text: " in this directory.\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000009
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "Appendix A: A Brief History of Pascal"
                    attr: 1
                  - text: "\r\r\r"
                    attr: 3
                  - text: Algol
                    attr: 6
                  - text: "\r\rThe language Component Pascal is the culmination of several decades of research. It is the youngest member of the Algol family of languages. Algol, defined in 1960, was the first high-level language with a readable, "
                    attr: 3
                  - text: structured
                    attr: 7
                  - text: ", and systematically defined syntax. While successful as a notation for mathematical algorithms, it lacked important data types, such as pointers or characters.\r\r\r"
                    attr: 3
                  - text: Pascal
                    attr: 6
                  - text: "\r\rIn the late sixties, several proposals for an evolutionary successor to Algol were developed. The most successful one was Pascal, defined in 1970 by Prof. Niklaus Wirth at ETH Zürich, the Swiss Federal Institute of Technology. Besides cleaning up or leaving out some of Algol's more obscure features, Pascal added the capability to define new data types out of simpler existing ones. Pascal also supported "
                    attr: 3
                  - text: dynamic data structures
                    attr: 7
                  - text: "; i.e., data structures which can grow and shrink while a program is running. Pascal received a big boost when ETH released a Pascal compiler that produced a simple intermediate code for a virtual  machine (P-code), instead of true native code for a particular machine. This simplified porting Pascal to other processor architectures considerably, because only a new P-code interpreter needed be written for this purpose, not a whole new compiler. One of these projects had been undertaken at the University of California, San Diego. Remarkably, this implementation (UCSD Pascal) didn't require a large and expensive mainframe computer, it ran on the then new Apple II personal computers. This gave Pascal a second important boost. The third one came when Borland released TurboPascal, a fast and inexpensive compiler, and integrated development environment for the IBM PC. Later, Borland revived its version of Pascal when it introduced the rapid application development environment Delphi.\rPascal has greatly influenced the design and evolution of many other languages, from Ada to Visual Basic.\r\r\r"
                    attr: 3
                  - text: Modula-2
                    attr: 6
                  - text: "\r\rIn the mid-seventies, inspired by a sabbatical at the Xerox Palo Alto Research Center "
                    attr: 3
                  - text: PARC
                    attr: 7
                  - text: ", Wirth started a project to develop a new workstation computer. This workstation should be completely programmable in a high-level language, thus the language had to provide direct access to the underlying hardware. Furthermore, it had to support "
                    attr: 3
                  - text: team programming
                    attr: 7
                  - text: " and modern software engineering principles, such as "
                    attr: 3
                  - text: abstract data types
                    attr: 7
                  - text: ". These requirements led to the programming language Modula-2 (1979). Modula-2 retained the successful features of Pascal, and added a module system as well as a controlled way to circumvent the language's type system when doing "
                    attr: 3
                  - text: low-level programming
                    attr: 7
                  - text: "; e.g., when implementing device drivers. Modules could be added to the operating system at run-time. In fact, the whole operating system consisted of a collection of modules, without a distinguished kernel or similar artefact. Modules could be compiled and loaded separately, with complete "
                    attr: 3
                  - text: type and version checking of their interfaces
                    attr: 7
                  - text: ".\rModula-2 has made inroads in particular into safety-critical areas, such as traffic control systems.\r\r\r"
                    attr: 3
                  - text: "Simula, Smalltalk, and Cedar"
                    attr: 6
                  - text: "\r\rWirth's interest remained with desktop computers, however, and again an important impulse came from Xerox PARC. PARC was the place where the workstation, the laser printer, the local area network, the bitmap display, and many other enabling technologies have been invented. Also, PARC adopted and made popular several older and barely known technologies, like the mouse, interactive graphics, and "
                    attr: 3
                  - text: object-oriented programming
                    attr: 7
                  - text: ". The latter concept, if not the term, was first applied to a high-level language in Simula (1966), another member of the Algol language family. As its name suggests, Simula used object-orientation primarily for simulation purposes. Xerox PARC's Smalltalk language (1983), however, used it for about "
                    attr: 3
                  - text: anything
                    attr: 7
                  - text: ". The Smalltalk project broke new ground also in user interface design: the graphical user interface (GUI) as we know it today was developed for the Smalltalk system.\rAt PARC, these ideas influenced other projects, e.g., the Cedar language, a Pascal-style language. Like Smalltalk and later Oberon, Cedar was not only the name of a language but also of an operating system. The Cedar operating system was impressive and powerful, but also complex and unstable.\r\r\r"
                    attr: 3
                  - text: Oberon
                    attr: 6
                  - text: "\r\rThe Oberon project was initiated in 1985 at ETH by Wirth and his colleague Jürg Gutknecht. It was an attempt to distill the essence of Cedar into a comprehensive, but still comprehensible, workstation operating system. The resulting system became very small and efficient, working well with only 2 MB of RAM and 10 MB of disk space. An important reason for the small size of the Oberon system was its component-oriented design: instead of integrating all desirable features into one monolithic software colossus, the less frequently used software components (modules) could be implemented as extensions of the core system. Such components were only loaded when they were actually needed, and they could be shared by all applications.\r\rWirth realized that component-oriented programming required some features of object-oriented programming, such as "
                    attr: 3
                  - text: information hiding
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: late binding
                    attr: 7
                  - text: ", and "
                    attr: 3
                  - text: polymorphism
                    attr: 7
                  - text: ".\rInformation hiding was the great strength of Modula-2. Late binding was supported by Modula-2 in the form of procedure variables. However, polymorphism was lacking. For this reason, Wirth added "
                    attr: 3
                  - text: type extension
                    attr: 7
                  - text: ": a record type could be declared as an extension of another record type. An extended type could be used wherever one of its base types might be used.\r\rBut component-oriented programming is more than object-oriented programming. In a component-based system, a component may share its data structures with arbitrary other components, about which it doesn't know anything. These components usually don't know about each other's existence either. Such mutual ignorance makes the management of dynamic data structures, in particular the correct deallocation of unused memory, a "
                    attr: 3
                  - text: fundamentally
                    attr: 7
                  - text: " more difficult problem than in closed software systems. Consequently, it must be left to the language implementation to find out when memory is not used anymore, in order to safely reclaim it for later use. A system service which performs such an automatic storage reclamation is called a "
                    attr: 3
                  - text: garbage collector
                    attr: 7
                  - text: ". Garbage collection prevents two of the most evasive and downright dangerous programming errors: "
                    attr: 3
                  - text: memory leaks
                    attr: 7
                  - text: " (not giving free unused memory) and "
                    attr: 3
                  - text: dangling pointers
                    attr: 7
                  - text: " (releasing memory too early). Dangling pointers let one component destroy data structures that belong to other components. Such a violation of "
                    attr: 3
                  - text: type safety
                    attr: 7
                  - text: " must be prevented, because component-based systems may contain many third-party components of unknown quality (e.g., downloaded from the  Internet).\rWhile Algol-family languages always had a reputation of being safe, complete type safety (and thus garbage collection) still was a quantum leap forward. It also was the reason why complete compatibility with Modula-2 was not possible. The resulting revision of Modula-2 was called the same way as the system: Oberon.\rOberon's module system, like the one of Modula-2, provided information hiding for entire collections of types, not only for individual objects. This allowed to define and guarantee invariants spanning several cooperating objects. In other words: it allowed developers to invent higher-level safety mechanisms, by building on the basic "
                    attr: 3
                  - text: module safety
                    attr: 7
                  - text: " and type safety provided by a good Oberon implementation.\r\rOrthodox object-oriented programming languages such as Smalltalk had neglected both typing (by not supporting types) and information hiding (by restricting it to objects and classes), which was a major step backwards as far as software engineering is concerned. Oberon reconciled the worlds of object-oriented and modular programming.\r\rAs a final requirement of component-oriented programming, it had to be possible to "
                    attr: 3
                  - text: dynamically load
                    attr: 7
                  - text: " new components. In Oberon, the unit of loading was the same as the unit of compilation: a module.\r\r\r"
                    attr: 3
                  - text: Component Pascal
                    attr: 6
                  - text: "\r\rIn 1992, a cooperation with Prof. H. P. Mössenböck led to a few additions to the original Oberon language (\"Oberon-2\"). It became the de-facto standard of the language.\rIn 1997, the ETH spin-off Oberon microsystems, Inc. (with Wirth on its board of directors) made some small extensions to Oberon-2 and called it Component Pascal, to better express its focus (component-oriented programming) and its origin (Pascal). It is the industrial-strength version of Oberon, so to say.\rThe main thrust of the enhancements compared to Oberon-2 was to give the designer of a framework (i.e., of module interfaces that define abstract classes for a particular problem domain) more control over the framework's custom safety properties. The benefit is that it becomes easier to ascertain the integrity of a large component-based system, which is particularly important during iterative design cycles when the framework is being developed, and later when the system architecture must be refactored to enable further evolution and maintenance.\r\r\r"
                    attr: 3
                  - text: BlackBox
                    attr: 6
                  - text: "\r\rOberon microsystems developed the "
                    attr: 3
                  - text: BlackBox Component Framework
                    attr: 7
                  - text: " starting in 1992 (originally it was called Oberon/F). This component-oriented framework is written in Component Pascal, and simplifies the development of graphical user interface components. It comes bundled with several BlackBox extension components, including a word processor, a visual designer, an SQL database access facility, an integrated development environment, and the Component Pascal run-time system. The complete package is an advanced yet light-weight rapid application development (RAD) tool for components, called "
                    attr: 3
                  - text: BlackBox Component Builder
                    attr: 7
                  - text: ". It is light-weight because it is completely built out of Component Pascal modules  including the kernel with the garbage collector, and the Component Pascal compiler itself.\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000009
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "Appendix B: Differences between Pascal and Component Pascal"
                    attr: 1
                  - text: "\r\r"
                    attr: 3
                  - text: Eliminated Features
                    attr: 6
                  - text: "\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Subrange types"
                    attr: 6
                  - text: "\rUse a standard integer type instead.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Enumeration types"
                    attr: 6
                  - text: " \rUse integer constants instead.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Arbitrary array ranges"
                    attr: 6
                  - text: "\rArrays are always defined over the integer range 0..max-1.\r\rExample\r\tA = ARRAY 16 OF INTEGER\t(* legal indices are in the range 0..15 *)\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " No general sets"
                    attr: 6
                  - text: "\rType SET denotes the integer set which may include the elements 0..31.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " No explicit DISPOSE"
                    attr: 6
                  - text: "\rMemory is reclaimed automatically by the garbage collector. Instead of calling DISPOSE, simply set the variable to NIL.\r\t\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " No variant records"
                    attr: 6
                  - text: "\rUse record extension instead.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " No packed structures"
                    attr: 6
                  - text: "\r Use SHORTCHAR or BYTE types for byte-sized values.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " No GOTO"
                    attr: 6
                  - text: "\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " No PRED and SUCC standard functions"
                    attr: 6
                  - text: "\rUse DEC or INC on integer values instead.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " No built-in input/output facilities"
                    attr: 6
                  - text: "\rNo file types. I/O is provided by library routines.\r\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000009
                      attr: 6
                      w: 360000000
                      h: 444500
                  - text: Changed Features
                    attr: 6
                  - text: "\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Standard procedure ENTIER instead of ROUND"
                    attr: 6
                  - text: "\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Syntax for REAL constants"
                    attr: 6
                  - text: "\r3.0E+4 but not 3.0e+4\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Syntax for pointer type declarations"
                    attr: 6
                  - text: "\rP = POINTER TO R\rinstead of\rP = ^R\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Syntax for case statement"
                    attr: 6
                  - text: "\r\"|\" instead of \";\" as case separator.\rELSE clause.\r\rExample\r\tCASE i * 3 - 1 OF\r\t  0: StdLog.String(\"zero\")\r\t| 1..9: StdLog.String(\"one to nine\")\r\t| 10, 20: StdLog.String(\"ten or twenty\")\r\tELSE StdLog.String(\"something else\")\r\tEND\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Procedure name must be repeated"
                    attr: 6
                  - text: "\r\rExample\r\tPROCEDURE DrawDot (x, y: INTEGER);\r\tBEGIN\r\tEND DrawDot;\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Case is significant"
                    attr: 6
                  - text: "\rSmall letters are distinguished from capital letters.\r\rExample\t\"proc\" is not the same as \"Proc\".\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " String syntax"
                    attr: 6
                  - text: "\rString literals are either enclosed between \" or between '. There cannot be both single and double quotes in one string. String literals of length one are assignment-compatible to character variables.\r\rExamples\r\t\"That's great\"\t'Write \"hello world\" to the screen'\r\tch := \"x\"\r\tch := 'x'\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Comments"
                    attr: 6
                  - text: "\rComments are enclosed between (* and *) and may be nested.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Set brackets"
                    attr: 6
                  - text: "\rSet constants are given between { and } instead of [ and ].\r\rExample\t{0..2, 4, j..2 * k}\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Function syntax"
                    attr: 6
                  - text: "\rUse keyword PROCEDURE for functions also, instead of FUNCTION.\rProcedures with a return value always have a (possibly empty) parameter list in their declarations and in calls to them.\rThe function result is returned explicitly by a RETURN statement, instead of an assignment to the function name.\r\rExample\r\r\tPROCEDURE Fun (): INTEGER;\r\tBEGIN\r\t\tRETURN 5\r\tEND Fun;\r\r\t instead of\r\r\tFUNCTION Fun: INTEGER;\r\tBEGIN\r\t\tFun := 5\r\tEND;\r\r\tn := Fun()   instead of   n := Fun\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Declarations"
                    attr: 6
                  - text: "\rThe sequence of declarations is\r{ ConstDecl | TypeDecl | VarDecl} {ProcDecl | ForwardDecl}\rinstead of\r[ConstDecl] [TypeDecl] [VarDecl] {ProcDecl}.\r\rForward declarations are necessary if a procedure is used before it is defined.\r\rExample\r\tPROCEDURE ^ Proc;\r\tinstead of\r\tPROCEDURE Proc; FORWARD;\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Procedure types"
                    attr: 6
                  - text: "\rProcedures may not only be passed to parameters, but also to procedure-typed variables.\r\rExample\r\tTYPE P = PROCEDURE (x, y: INTEGER);\r\tVAR v: P;\r\tv := DrawDot;\t(* assign *)\r\tv(3, 5);\t(* call DrawDot(3, 5) *)\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Explicit END instead of compound statement"
                    attr: 6
                  - text: "\rBEGIN can only occur before a statement sequence, but not in it. IF, WHILE, and LOOP are always terminated by END.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " WITH statement"
                    attr: 6
                  - text: "\rA WITH statement is a regional type guard, it does not imply a hidden variable and does not open a new scope.\rSee language reference for more details.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " ELSIF"
                    attr: 6
                  - text: "\rIF statements can have several branches.\r\rExample\r\tIF name = \"top\" THEN\r\t\tStdLog.Int(0)\r\tELSIF name = \"bottom\" THEN\r\t\tStdLog.Int(1)\r\tELSIF name = \" charm\" THEN\r\t\tStdLog.Int(2)\r\tELSIF name = \"beauty\" THEN\r\t\tStdLog.Int(3)\r\tELSE\r\t\tStdLog.String(\"strange\")\r\tEND\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " BY instead of only DOWNTO in FOR"
                    attr: 6
                  - text: "\rFOR loops may use any constant value as increment or decrement.\r\rExample\r\tFOR i := 15 TO 0 BY -1 DO StdLog.Int(i, 0) END\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Boolean expressions use short-circuit evaluation"
                    attr: 6
                  - text: "\rA Boolean expression terminates as soon as its result can be determined.\r\rExample\r\tThe following expression does not cause a run-time error when p = NIL:\r\tIF (p # NIL) & (p.name = \"quark\") THEN\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Constant expressions"
                    attr: 6
                  - text: "\rIn constant declarations, not only literals, but also constant expressions are allowed.\r\r\tExample\r\t\tCONST\r\t\t\tzero = ORD(\"0\");\r\t\t\tone = zero + 1;\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Different operators"
                    attr: 6
                  - text: "\r# is used instead of <> for inequality test.\r& is used instead of AND for logical conjunctions.\r~ is used instead of NOT for logical negation.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Explicit conversion to included type with SHORT"
                    attr: 6
                  - text: "\rType inclusion for numeric types allows to assign values of an included type to an including type. To assign in the other direction, the standard procedure SHORT must be used.\r\rExample\r\tint := shortint;\r\tshortint := SHORT(int)\r\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000009
                      attr: 6
                      w: 360000000
                      h: 444500
                  - text: New Features
                    attr: 6
                  - text: "\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Hexadecimal numbers and characters"
                    attr: 6
                  - text: "\r\rExample\r\t100H\t(* decimal 256 *)\r\t0DX\t(* carriage return *)\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Additional numeric types"
                    attr: 6
                  - text: "\rLONGINT, SHORTINT, BYTE, SHORTREAL have been added.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Symmetric set difference"
                    attr: 6
                  - text: "\rSets can be subtracted.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " New standard procedures"
                    attr: 6
                  - text: "\rThe new standard procedures INC, DEC, INCL, EXCL, SIZE, ASH, HALT, ASSERT, LEN, LSH, MAX, MIN, BITS, CAP, ENTIER, LONG and SHORT have been added.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " LOOP with EXIT"
                    attr: 6
                  - text: "\rThere is a new loop statement with an explicit exit statement. See language report for more details.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " ARRAY OF CHAR can be compared"
                    attr: 6
                  - text: "\rCharacter arrays can be compared with the =, #, <, >, <=, and >= operators.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Open arrays, multidimensional arrays"
                    attr: 6
                  - text: "\rArrays without predefined sizes can be defined, possibly with several dimensions.\r\rExamples\r\tVAR a: POINTER TO ARRAY OF CHAR;\r\tNEW(a, 16)\r\r\tPROCEDURE ScalarProduct (a, b: ARRAY OF REAL; VAR c: ARRAY OF REAL);\r\r\tTYPE Matrix = ARRAY OF ARRAY OF REAL;\r\tPROCEDURE VectorProduct (a, b: ARRAY OF REAL; VAR c: Matrix);\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Pointer dereferencing is optional"
                    attr: 6
                  - text: "\rThe dereferencing operator ^ can be omitted.\r\rExample\r\troot.next.value := 5\r\tinstead of\r\troot^.next^.value := 5\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Modules"
                    attr: 6
                  - text: "\rModules are the units of compilation, of information hiding, and of loading. Information hiding is one of the main features of object-oriented programming. Various levels of information hiding are possible: complete hiding, read-only / implement-only export, full export.\rSee language report for more details.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Type extension"
                    attr: 6
                  - text: "\rRecord types (pointer types) can be extended, thus providing for polymorphism. Polymorphism is one of the main features of object-oriented programming.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Methods"
                    attr: 6
                  - text: "\rProcedures can be bound to record types (pointer types), thus providing late binding. Late binding is one of the main features of object-oriented programming. Such procedures are also called "
                    attr: 3
                  - text: methods
                    attr: 7
                  - text: ".\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " String operator"
                    attr: 6
                  - text: "\rThe string (sequence of characters) that is contained in an array of character can be selected by using the $-selector.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Record attributes"
                    attr: 6
                  - text: "\rRecords are non-extensible by default, but may be marked as EXTENSIBLE, ABSTRACT, or LIMITED.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 6
                    wide: true
                  - text: " Method attributes"
                    attr: 6
                  - text: "\rMethods are non-extensible by default, but may be marked as EXTENSIBLE, ABSTRACT, or EMTPY. Newly introduced methods must be marked as NEW.\r"
                    attr: 3
