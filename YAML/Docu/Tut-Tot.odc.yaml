                  - text: "\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 0
                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000003
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\rNext we discuss how a view can react on actual edit messages. In particular, these are the "
                    attr: 3
                  - text: Controllers.EditMsg
                    attr: 7
                  - text: " for edit operations such as cut, copy, or paste, and the "
                    attr: 3
                  - text: Controllers.TrackMsg
                    attr: 7
                  - text: " for mouse clicks.\r\rWhenever a key is pressed in a view or when a cut, copy or paste operation is invoked, a "
                    attr: 3
                  - text: Controllers.EditMsg
                    attr: 7
                  - text: " is sent to the focus view. The cut, copy and paste operations can only be generated through the environment (menu) if they have been announced with the "
                    attr: 3
                  - text: Controllers.PollOpsMsg
                    attr: 7
                  - text: ".\r\r\tTYPE\r\t\tEditMsg = RECORD (Controllers.RequestMessage)\r\t\t\top: INTEGER;   (* IN *)\r\t\t\tmodifiers: SET;   (* IN *)\r\t\t\tchar: CHAR;   (* IN *)\r\t\t\tview: Views.View;   (* IN for paste, OUT for cut and copy *)\r\t\t\tw, h: INTEGER;   (* IN for paste, OUT for cut and copy *)\r\t\t\tisSingle: BOOLEAN;   (* IN for paste, OUT for cut and copy *)\r\t\t\tclipboard: BOOLEAN   (* IN *)\r\t\tEND;\r\rThe "
                    attr: 3
                  - text: op
                    attr: 7
                  - text: " field specifies which kind of operation has to be performed. If "
                    attr: 3
                  - text: "op = Controllers.cut "
                    attr: 7
                  - text: "then a copy of the focus view has to be generated. The contents of the new view is a copy of the focus view's selection. The new view is assigned to the "
                    attr: 3
                  - text: view
                    attr: 7
                  - text: " field. In addition, the selection is deleted in the focus view.\rThere is one special case: if the selection consists of exactly one view (a singleton), then a copy of the singleton should be copied to the "
                    attr: 3
                  - text: view
                    attr: 7
                  - text: " field, not a copy of the singleton's container. In this case, "
                    attr: 3
                  - text: isSingle
                    attr: 7
                  - text: " must be set to "
                    attr: 3
                  - text: "TRUE"
                    attr: 7
                  - text: ".\r\rExcept for the deletion of the selection, the same operations have to be performed if "
                    attr: 3
                  - text: "op = Controllers.copy.\r"
                    attr: 7
                  - text: "\rIf a key is pressed, then the "
                    attr: 3
                  - text: op
                    attr: 7
                  - text: " field has the value "
                    attr: 3
                  - text: "Controllers.pasteChar. "
                    attr: 7
                  - text: "The character to be pasted is stored in the "
                    attr: 3
                  - text: char
                    attr: 7
                  - text: " field. The "
                    attr: 3
                  - text: "modifiers "
                    attr: 7
                  - text: "set indicates whether a modifier or control key has been pressed. In the latter case, the "
                    attr: 3
                  - text: "char "
                    attr: 7
                  - text: "field has to be interpreted as a control character.\r\rThe paste operation is the inverse of the copy operation: a copy of the contents of the view stored in the "
                    attr: 3
                  - text: view
                    attr: 7
                  - text: " field has to be copied into the focus view's contents. This operation is indicated by "
                    attr: 3
                  - text: op
                    attr: 7
                  - text: " = "
                    attr: 3
                  - text: Controllers.paste
                    attr: 7
                  - text: ". The view must know the type of the view whose contents is to be pasted and must decide how to insert the pasted view's contents into its own view. For example, a text field view should support copying from a text view only.\rIf "
                    attr: 3
                  - text: isSingle
                    attr: 7
                  - text: " is "
                    attr: 3
                  - text: "TRUE"
                    attr: 7
                  - text: ", or if the contents of "
                    attr: 3
                  - text: view
                    attr: 7
                  - text: " cannot be pasted because it has an unknown or incompatible type, a copy of "
                    attr: 3
                  - text: view
                    attr: 7
                  - text: " must be pasted. Of course, this is only possible in general containers, which allow the embedding of other views.\rWhen pasting a complete view, the desired width and height of the pasted view are given in the fields "
                    attr: 3
                  - text: w
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: h
                    attr: 7
                  - text: ". These values can be treated as hints by the receiving view. If they are not suitable, others can be used.\r\rWhenever the mouse button is pressed in the focus view, a "
                    attr: 3
                  - text: "Controllers.TrackMsg "
                    attr: 7
                  - text: "is sent to the view. The coordinates are specified in the "
                    attr: 3
                  - text: x
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: y
                    attr: 7
                  - text: " fields (of the base type "
                    attr: 3
                  - text: Controllers.CursorMessage).
                    attr: 7
                  - text: " The "
                    attr: 3
                  - text: modifiers
                    attr: 7
                  - text: " set indicates whether modifier keys have been pressed, or whether a double click has been performed. "
                    attr: 3
                  - text: "modifiers IN  {Controllers.doubleClick, Controllers.extend, Controllers.modify"
                    attr: 7
                  - text: "}. If the view wants to show a feedback while tracking the mouse, it needs to poll the mouse position in a loop, by calling the "
                    attr: 3
                  - text: Input
                    attr: 7
                  - text: " procedure of the passed frame. "
                    attr: 3
                  - text: Input
                    attr: 7
                  - text: " also returns information on whether the mouse has been released. Any feedback should directly be drawn into the frame in which the mouse button was pressed.\r\rAfter the feedback loop, a possible modification of the view's contents need to be broadcast to all the frames that display the same view. Remember that the same document, and consequently all its embedded views, may be displayed in several windows (see Chapter 2). If an embedded view is visible in three windows, there exist three frames displaying the same view. Procedure "
                    attr: 3
                  - text: Views.Update
                    attr: 7
                  - text: " causes a restore of the view once in each of its visible frames.\r\rAs an example, we extend our view with a cross-hair marker that can be moved around. The coordinates of this marker are stored as additional fields in the view object. Note that if a view contains instance variables, it should implement the "
                    attr: 3
                  - text: "CopyFromSimpleView,"
                    attr: 7
                  - text: " "
                    attr: 3
                  - text: "Internalize "
                    attr: 7
                  - text: "and "
                    attr: 3
                  - text: "Externalize "
                    attr: 7
                  - text: "procedures in order to work properly. We refer to the next section of this view tutorial, which describes the purpose of these messages. In our example view, the marker can be moved around with the mouse, or through the cursor keys. When a cursor key is pressed, the focus view is informed by sending it an "
                    attr: 3
                  - text: EditMsg
                    attr: 7
                  - text: " with "
                    attr: 3
                  - text: op = pasteChar
                    attr: 7
                  - text: ".\r\rFrom time to time a "
                    attr: 3
                  - text: Controllers.PollCursorMsg
                    attr: 7
                  - text: " is sent to the focus view. The view may set the form of the cursor depending on the coordinates of the mouse. The "
                    attr: 3
                  - text: cursor
                    attr: 7
                  - text: " field can be assigned a cursor out of {"
                    attr: 3
                  - text: "Ports.arrowCursor, Ports.textCursor, Ports.graphicsCursor, Ports.tableCursor, Ports.bitmapCursor"
                    attr: 7
                  - text: "}. The particular form of the cursor depends on the underlying operating system. In our example view, we set the cursor to a graphics cursor.\r\r"
                    attr: 3
                  - ruler:
                      first: 180000
                      left: 180000
                      right: 180000
                      lead: 8100
