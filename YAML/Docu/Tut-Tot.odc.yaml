                    attr: 7
                  - text: " in the command string above removes a view from this queue, and opens it in a new window. Note that whole sequences of commands must be enclosed between quotes, while for single commands the quotes may be omitted.\r\rInstead of opening the view in a window, it could be pasted into the focus container (e.g., a text or a form):\r"
