                  - text: 3 BlackBox Design Practices
                    attr: 1
                  - text: "\r\rIn the previous chapters, various patterns and design approaches have been described. They help to solve problems that occur in interactive compound document applications. In this chapter, more general aspects are discussed which help to make a framework component-oriented, i.e., extensible through dynamically loaded black-box components.\rWe don't attempt to create a full design method that gives step-by-step recipes for how to design a new framework. This would not be realistic. But we want to demonstrate and motivate the practices, approaches, and patterns that have been followed in the design of the BlackBox Component Framework. Some of the design practices have even led to the incorporation of specific framework-related features into the language Component Pascal. Language support for framework design is discussed first, followed by the way Component Pascal components are managed, and the rules which govern many component collaborations in BlackBox.\r\r\r"
                    attr: 3
                  - text: 3.1 Language support
                    attr: 6
                  - text: "\r\rA framework embodies a collection of design patterns, cast into the notation of a particular programming language. Thus the expressiveness of the language, in particular of its interface definition subset, has a major impact on how much of the framework's design can be captured directly in code. Capturing architectural decisions and design patterns explicitly in the language is important for making refactoring of a framework less risky. Refactoring of a framework and its extension components allows to prevent that old architectures grow into brittle structures that threaten to collapse under their own weight. Preventing architecture degradation is the key to keeping software systems productive over a longer period of time, especially if the software consists of components that are replaced, added, or removed incrementally over time.\r\rA framework represents an architecture for solving a certain class of problems. A good architecture uses a minimal number of design patterns wherever they are applicable. Consistent use of design patterns make the framework easier to document and easier to comprehend.\rDesign patterns are abstract solutions to a problem. For a framework, they need to be formulated in terms of a concrete programming language. The programming language has a large influence on how well the design pattern can be represented and how well consistency with the pattern can be maintained.\r\rThere are two major \"philosophies\" of programming language design. One of them is exemplified by the language C. C is a terse systems programming language which allows to easily and efficiently manipulate memory data structures. The other approach is exemplified by Pascal. Pascal is a readable application programming language which provides a high degree of safety.\rThe C approach is particularly adequate for writing low-level code such as device drivers. When C was increasingly being used for applications as well, a "
                    attr: 3
                  - text: zero errors ideology
                    attr: 7
                  - text: " formed, which says that because programming errors must not occur, they will not occur. A \"real programmer\" doesn't make mistakes, and therefore doesn't need any kind of protection facilities forced upon him by the language. Safety features such as index overflow checks are for beginners only; for professionals they are merely a handicap.\r\rHowever, modern psychological research has clearly shown that humans make mistakes all the time, whether they write programs, develop mathematical proofs, fly airplanes, or perform operations on a patient. Mistakes are made whether or not they are admitted. The important insight is that most mistakes can be corrected easily if they are detected early on. Detection works best in an openly communicating team, where a team member is not afraid of others double-checking his or her work (and thereby exposing the mistakes). Good airlines let their pilots train such cooperative behavior under stress. Some very forward-thinking clinics use a similar training for surgeons and their aides. They have overcome the zero errors ideology in their fields.\r\rIn the world of programming, a reverse trend has shaped the industry in the last ten years, by making C the language of choice for all kinds of programs. In terms of software engineering and safety consciousness, this was a huge step backwards behind the state-of-the-art. Large companies tried to limit the damage by imposing the use of tools that reintroduce at least a modest level of safety  instead of solving the problems where it costs least, namely at the language level.\rBut while it is difficult for a programmer to admit that he makes mistakes, it is much easier for him to acknowledge that "
                    attr: 3
                  - text: other
                    attr: 7
                  - text: " programmers make mistakes. This became relevant with the Internet. The Internet makes it easy and sometimes even automatic to download and execute small programs (\"applets\") from unknown sites. This code clearly cannot be trusted in general. Foor good reason, this has scared large corporations enough to look at safer languages again. In fact, safety concerns were the reason why the language Java was created in the first place. Superficially, Java looks similar to C++; but unlike C and C++, it is completely typesafe, like Component Pascal.\r\rIn Component Pascal, objects and their classes (record types) may be hidden completely in a module, or they may be wholly exported, i.e., they and their parts (record fields / instance variables) may be made completely visible outside of the defining module. In practice, it is useful to have even more control. For this reason, Component Pascal allows to determine for each record field whether it is fully exported, read-only exported, or hidden. The following example (Figure 3-1) shows how the asterisk (\"*\") is used for export, and the dash (\"-\") is used for the more restricted read-only export:\r\rMODULE ObxSample;\r\r\tTYPE\r\t\tFile* = POINTER TO RECORD\r\t\t\tlen: INTEGER\t"
                    attr: 3
                  - text: "(* hidden instance variable *)"
                    attr: 7
                  - text: "\r\t\tEND;\r\r\t\tRider* = POINTER TO RECORD\r\t\t\t"
                    attr: 3
                  - text: "(* there may be several riders on one file *)"
                    attr: 7
                  - text: "\r\t\t\tfile-: File;\t"
                    attr: 3
                  - text: "(* read-only instance variable *)"
                    attr: 7
                  - text: "\r\t\t\teof*: BOOLEAN;\t"
                    attr: 3
                  - text: "(* fully exported instance variable *)"
                    attr: 7
                  - text: "\r\t\t\tpos: INTEGER\t"
                    attr: 3
                  - text: "(* hidden instance variable *)"
                    attr: 7
                  - text: "\r\t\t\t\t"
                    attr: 3
                  - text: "(* Invariant: (pos >= 0) & (pos < file.len) *)"
                    attr: 7
                  - text: "\r\t\tEND;\r\r\tPROCEDURE (f: File) GetLength* (OUT length: INTEGER), NEW;\r\tBEGIN\r\t\tlength := f.len\r\tEND GetLength;\r\r\tPROCEDURE (rd: Rider) SetPos* (pos: INTEGER), NEW;\r\tBEGIN\r\t\t"
                    attr: 3
                  - text: "(* assert invariants, so that errors may not be propagated across components *)\r\t\t"
                    attr: 7
                  - text: "ASSERT(pos >= 0); ASSERT(pos < rd.file.len);\r\t\trd.pos := pos\r\tEND SetPos;\r\r\t...\r\rEND ObxSample.\r\rListing 3-1. Sample module in Component Pascal\r\rJava does not support read-only export, but it does support protected fields, which are fields that are only visible to extensions of a class, but not to normal clients. This feature is only relevant if implementation inheritance is used across module boundaries. For reasons that go beyond the scope of this text, implementation inheritance is not a good idea across black-box abstractions, such as components, and thus should not normally be used across component boundaries or in component framework interfaces. Protected export is thus not supported by Component Pascal.\r\rSafety means different things to different people. On the one hand, C++ can be considered safer than plain C. On the other hand, the Internet also raises concerns that go beyond mere safety; security has to be considered as well (i.e., unauthorized access, criminal attacks, and so on). Security issues are a matter of authorization and authorization checking and are generally dealt with at the operating system or hardware level. Higher-level security features are a matter of library definition and implementation. However, overheads incurred by the excessive crossing of hardware protection boundaries can be avoided if it is possible to build on strong safety properties of the used language(s), which leads us back to the question of safety. But what exactly is \"safety\"?\rIn short, \"safety\" of a programming language means that its definition allows to specify invariants, and that its implementation guarantees that these invariants are kept. (The availability of a trusted implementation must be assumed; this trust is usually earned by successfully surviving attacks.) In short: "
                    attr: 3
                  - text: "safety is \"invariants taken seriously\""
                    attr: 7
                  - text: ".\r\rWhat kinds of invariants are we talking about? The most fundamental invariants are the memory invariants: memory occupied by a variable is only used in the way that the language (e.g., a type declaration) allows. In practice, this means that arbitrary type casting must be ruled out and that manual deallocation of dynamic data structures is not permitted anymore, because deallocation could happen too early, and some still used memory could be reallocated and thus being used simultaneously by two unrelated variables. These dangling pointers are usually desastrous, but can be avoided completely if garbage collection is used instead of manual deallocation. Consequently, Java and Component Pascal are garbage-collected.\r\rMemory invariants are fundamental. More application-specific invariants are typically established over several cooperating objects. For example, an object which represents a file access path must always have a current position which lies within the length of the file, where the file is represented by a second object. This invariant spans two objects (and thus classes). It can only be guaranteed if the programming language allows to define interactions between the two objects that are private to them, so that no outside code may interfere.\rNote that this is different from the \"protected\" relation discussed above. Rather than covering the relation between a base class and its yet unknown subclasses, the issue here is classes that have been co-designed and will always be used in conjunction. A module or package construct is a suitable structured means to allow the definition of such higher-order safety properties. Java packages are not ideal in this respect. Since Java packages are "
                    attr: 3
                  - text: open modules
                    attr: 7
                  - text: ", new classes can be added to a package at run-time, and may well violate the invariants that have been established earlier. Such addition of \"foreign\" classes to a package thus needs to be prevented by run-time management facilities that are beyond the control of the language definition. In Java, this is related to the concept of unique ownership: every package is conceptually owned by its source and only that single source should have authority to add new classes to a package. In any case, the Java package construct is an improvement over most other object-oriented languages, for example the entirely unstructured approach of C++'s friend classes, or the complete absence of a suitable construct in standard Smalltalk.\rIn contrast to Java packages, Component Pascal supports "
                    attr: 3
                  - text: closed modules
                    attr: 7
                  - text: ", or modules for short. In Component Pascal, a module is the appropriate unit of compilation, loading, and information hiding.\r\rApplying strong typing and information hiding makes it easier to catch mistakes as early as possible, when they are still easy and inexpensive to correct. This is valuable because it helps increase the program's robustness.\rBut the benefits of type and module safety go even further. They also provide more "
                    attr: 3
                  - text: flexibility
                    attr: 7
                  - text: ". This is surprising at first sight. Why should restrictions such as types (which restrict the operations on variables) and modules (which restrict visibility) create anything else than "
                    attr: 3
                  - text: reduced
                    attr: 7
                  - text: " flexibility? The reason for this so-called "
                    attr: 3
                  - text: refactoring paradoxon
                    attr: 7
                  - text: " is two-fold. On the one hand, everything that is completely hidden in a module may be changed only by considering this one module. Local changes in the hidden part of the module don't reverberate beyond the module itself. Not even recompilation of other client modules is necessary. On the other hand, when a well-typed interface for some reason "
                    attr: 3
                  - text: is
                    attr: 7
                  - text: " changed, then mere recompilation of the clients will detect the interface usages that have become inconsistent, e.g., after a parameter's type or a method name was changed. A compiler thus can actually increase the confidence in a software system which has been \"refactored\" due to some interface changes.\rBy checking typed interfaces at a carefully chosen level of granularity, a balance can be struck between release-to-release binary compatibility and detection of definite inconsistencies. Component Pascal supports an expressive type system to allow the detection of such inconsistencies. For example, newly introduced methods must be marked as "
                    attr: 3
                  - text: NEW
                    attr: 7
                  - text: ", and "
                    attr: 3
                  - text: VAR
                    attr: 7
                  - text: " parameters can be specialized to "
                    attr: 3
                  - text: IN
                    attr: 7
                  - text: " or "
                    attr: 3
                  - text: OUT
                    attr: 7
                  - text: " parameters. In Java, for example, it is not possible to distinguish between a new method, an overloading attempt, and an overriding attempt. By misspelling a method name, by changing a base or a subclass, or by combining incompatible versions, this ambiguity can lead to errors that are hard to track.\r\rA framework typically predefines interfaces for extensions of the framework. The framework may even contain code that uses these interfaces, although no implementation exists yet. The calling of code that resides \"higher up\" in the module hierarchy is typical for object-oriented frameworks. A language can support this typical framework control flow pattern by providing some form of interfaces, which are abstract classes to be implemented elsewhere. Component Pascal supports abstract record types with single inheritance, in a way that a complete spectrum between fully abstract and fully concrete types are possible. Java is similar to Component Pascal in this respect, except that it additionally supports a separate interface construct. A Java interface is the same thing as a fully abstract class, except that it allows multiple (interface) inheritance.\r\rMODULE TestViews;\r\r\tTYPE\r\t\tView* = POINTER TO ABSTRACT RECORD\r\t\t\t(* partially abstract type *)\r\t\t\tcontext-: Context;\r\t\t\t... some hidden fields ...\r\t\tEND;\r\r\t\tContext* = POINTER TO ABSTRACT RECORD END;\r\t\t(* fully abstract type *)\r\r\t\tPROCEDURE (v: View) Restore* (l, t, r, b: INTEGER), NEW, ABSTRACT;\r\r\t\t...\r\rEND TestViews.\r\rListing 3-2. Semi-abstract and abstract record types in Component Pascal\r\rInvariants are properties that supposedly stay invariant. Thus it is questionable whether even a subtype (subclass / extended type) should be allowed to arbitrarily modify the behavior of its basetype. In object-oriented languages, such modifications can be achieved by overriding inherited methods. Java allows to make classes or methods "
                    attr: 3
                  - text: final
                    attr: 7
                  - text: ", to give the framework designer the possibility to prevent any kind of invariant violation through the back door of overriding. Component Pascal record types and methods are final by default, they can be marked as extensible explicitly.\r\rComponent Pascal goes beyond Java with several other language constructs. One are "
                    attr: 3
                  - text: limited
                    attr: 7
                  - text: " records. Those are records that may be extended and allocated only within their defining module. From the perspective of importing modules, limited types are final and not even allocatable. This makes it possible to guarantee that all allocation occurs centrally in the defining (framework) module, which gives this module full control over initialization. For example, it may provide factory functions that allocate an object and initialize it in different ways, establishing invariants before the objects are passed to client modules. This is more flexible and simpler than constructors as used in Java.\rImplement-only export is a prime example of a feature motivated by typical framework design patterns. A record type's methods may be exported as implement-only, by using a dash instead of an asterisk. An implement-only method can only be called inside the defining module. But it can be "
                    attr: 3
                  - text: implemented
                    attr: 7
                  - text: " outside the defining module, in an implementation component of the framework. For example, the BlackBox Component Framework's store mechanism uses this feature to protect a store's "
                    attr: 3
                  - text: Internalize
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: Externalize
                    attr: 7
                  - text: " methods from being called out of their correct context. Basically, the framework (in this case the "
                    attr: 3
                  - text: Stores
                    attr: 7
                  - text: " module) uses the implement-only methods in all possible legal ways (i.e., implements all legal kinds of use-cases), and only exports them for implementation purposes.\rFor methods that represent optional interfaces, the method attribute "
                    attr: 3
                  - text: EMPTY
                    attr: 7
                  - text: " is supported. An empty method is a fully abstract hook that can be implemented in an extension, but unlike abstract methods it need not be implemented. For example, a view has an empty "
                    attr: 3
                  - text: HandleCtrlMsg
                    attr: 7
                  - text: " method which need only be implemented by views that react on user input, e.g., via mouse or keyboard.\r\rIn the "
                    attr: 3
                  - text: Design Patterns
                    attr: 7
                  - text: " book of Gamma et. al. [\"Design Patterns, Elements of Reusable Object-Oriented Software\"; Erich Gamma, Richard Helm, Ralph Johnson, John Vlissides; Addison-Wesley, 1994; ISBN 0-201-63361-2], a list of common design problems is identified. These problems often lead to unnecessary redesigns, because the software doesn't allow for a sufficient degree of change. Several of these problems are addressed by Component Pascal:\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 3
                    wide: true
                  - text: " Creating an object by specifying a class explicity\rModules allow to hide classes. A hidden class cannot be instantiated directly by a client module, since it is not visible there. This makes it possible to enfore a variety of indirect allocation mechanisms.\rAbstract record types allow to separate interfaces from implementations, so that abstract record types can be exported, without risking direct allocation by clients.\rLike abstract types, limited record types cannot be directly allocated by clients.\rImplement-only export allows to restrict the execution of allocation and initialization sequences to the defining module, which also prevents clients from binding themselves to concrete classes by instantiating them directly.\rThese features can be combined to develop safe implementations of all creational patterns described in "
                    attr: 3
                  - text: Design
                    attr: 7
                  - text: " "
                    attr: 3
                  - text: Patterns
                    attr: 7
                  - text: ": abstract factories, builders, factory methods, prototypes, and singletons.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 3
                    wide: true
                  - text: " Dependence on specific operations\rStatic record variables can be used as light-weight (stack-allocated) message objects, instead of using hard-coded method signatures or heavy-weight (heap-allocated) message objects. Message records can be forwarded, filtered, broadcast, and so on. Yet they don't violate type safety, since addresses of static records cannot be manipulated in unsafe ways.\rMessage records can be used to implement the chain of responsibility and observer patterns, which decouple a message sender and its receiver(s).\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 3
                    wide: true
                  - text: " Dependence on hardware and software platforms\r"
                    attr: 3
                  - text: ꀢ
                    attr: 3
                    wide: true
                  - text: " Dependence on object representations or implementations\rPortability is one of the main advantages of using a true high-level language. Component Pascal abstracts from the underlying hardware, yet its semantic gap is small enough that very efficient machine code can be generated. As in Java, type sizes are defined so that data transfer between machines doesn't create problems.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 3
                    wide: true
                  - text: " Algorithmic dependencies\rParts of an algorithm can be made replaceable by using abstract methods, empty (hook) methods, or auxiliary objects. Implement-only export makes it possible to safely assign responsibilities: correct method calling sequences must be implemented by the defining module, implementing the methods must be done by the extension programmer. This feature allows to develop safe implementations of all behavioral patterns (builder, internal iterator, strategy, template method, and so on).\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 3
                    wide: true
                  - text: " Tight coupling\rModules act as visibility boundaries. Thus tight coupling is possible where it is necessary (within a module's implementation), while loose coupling is possible across module boundaries. This simplifies safe implementation of virtually all design patterns.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 3
                    wide: true
                  - text: " Extending functionality by subclassing\rClasses can be hidden in modules. Final or limited classes, and final methods can be exported without risk that they may be subclassed or overridden.\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 3
                    wide: true
                  - text: " Inability to alter classes conveniently\rStrong typing, record and method attributes such as "
                    attr: 3
                  - text: NEW
                    attr: 7
                  - text: ", and run-time assertions increase the confidence that an interface can be changed in a way that all clients can be made consistent again easily and reliably. This is basic software engineering, and thus important for all kinds of designs.\r\rAll these problems have one common theme: a local change may cause ripple effects that affect the entire software system. Good languages and design practices help to design for change:\r\r"
                    attr: 3
                  - text: "Ensure that possible design changes have local effects only.\rWhere this is not possible, ensure that the effects are detected by the compiler.\rWhere this is not possible, ensure that the effects are detected at run-time as early as possible."
                    attr: 7
                  - text: "\r\rIt is clear that there still remains a considerable gap between current state-or-the-art languages like Component Pascal, and complete specification languages that also allow to specify the semantics of a program. In the future, it will be the challenge to close those parts of the gap which have a good enough cost/benefit ratio, i.e., which help to change a component's behavior in a controlled manner, without making programs unreadable and unwriteable for average programmers.\r\r\r"
                    attr: 3
                  - text: 3.2 Modules and subsystems
                    attr: 6
                  - text: "\r\rIn this section, we give a more concrete idea of how Component Pascal code looks like and how it is managed by the BlackBox Component Builder environment. For this purpose, we have to go into more BlackBox-specific details than in the other sections of this part of the book.\r\rAll Component Pascal code lives in modules. A module is the compilation unit of Component Pascal. A module has an interface and a hidden implementation. Syntactically this is achieved by marking some items in a module, e.g., some types and procedures, as "
                    attr: 3
                  - text: exported
                    attr: 7
                  - text: ". Everything not exported is invisible and thus not directly accessible from outside of the module. If a module needs services of one or several other modules, it "
                    attr: 3
                  - text: imports
                    attr: 7
                  - text: " them. Thereby the module declares that it requires descriptions of the interfaces of the imported modules at compile-time, and suitable implementations of these modules at run-time. Listing 3-3 shows a possible implementation of a module called "
                    attr: 3
                  - text: ObxPhoneDB
                    attr: 7
                  - text: ". It exports three procedures for looking up phone book entries: by index, by name, and by number. Please note the asterisks which denote items as exported, in this case the type "
                    attr: 3
                  - text: String
                    attr: 7
                  - text: " and the three lookup procedures:\r\rMODULE ObxPhoneDB;\r\r\tCONST\r\t\tmaxLen = 32;\t"
                    attr: 3
                  - text: "(* maximum length of name/number strings *)"
                    attr: 7
                  - text: "\r\t\tmaxEntries = 5;\t"
                    attr: 3
                  - text: "(* maximum number of entries in the database *)"
                    attr: 7
                  - text: "\r\r\tTYPE\r\t\t"
                    attr: 3
                  - text: String
                    attr: 6
                  - text: "* = ARRAY maxLen OF CHAR;\r\r\t\tEntry = RECORD\r\t\t\tname, number: String\r\t\tEND;\r\r\tVAR db: ARRAY maxEntries OF Entry;\r\r\tPROCEDURE "
                    attr: 3
                  - text: LookupByIndex
                    attr: 6
                  - text: "* (index: INTEGER; OUT name, number: String);\r\tBEGIN\t"
                    attr: 3
                  - text: "(* given an index, return the corresponding <name, number> pair *)"
                    attr: 7
                  - text: "\r\t\tASSERT(index >= 0);\r\t\tIF index < maxEntries THEN\r\t\t\tname := db[index].name; number := db[index].number\r\t\tELSE\r\t\t\tname := \"\"; number := \"\"\r\t\tEND\r\tEND LookupByIndex;\r\r\tPROCEDURE "
                    attr: 3
                  - text: LookupByName
                    attr: 6
                  - text: "* (name: String; OUT number: String);\r\t\tVAR i: INTEGER;\r\tBEGIN\t"
                    attr: 3
                  - text: "(* given a name, find the corresponding phone number *)"
                    attr: 7
                  - text: "\r\t\ti := 0; WHILE (i # maxEntries) & (db[i].name # name) DO INC(i) END;\r\t\tIF i # maxEntries THEN\t"
                    attr: 3
                  - text: "(* name found in db[i] *)"
                    attr: 7
                  - text: "\r\t\t\tnumber := db[i].number\r\t\tELSE\t"
                    attr: 3
                  - text: "(* name not found in db[0..maxEntries-1] *)"
                    attr: 7
                  - text: "\r\t\t\tnumber := \"\"\r\t\tEND\r\tEND LookupByName;\r\r\tPROCEDURE "
                    attr: 3
                  - text: LookupByNumber
                    attr: 6
                  - text: "* (number: String; OUT name: String);\r\t\tVAR i: INTEGER;\r\tBEGIN\t"
                    attr: 3
                  - text: "(* given a phone number, find the corresponding name *)"
                    attr: 7
                  - text: "\r\t\ti := 0; WHILE (i # maxEntries) & (db[i].number # number) DO INC(i) END;\r\t\tIF i # maxEntries THEN\t"
                    attr: 3
                  - text: "(* number found in db[i] *)"
                    attr: 7
                  - text: "\r\t\t\tname := db[i].name\r\t\tELSE\t"
                    attr: 3
                  - text: "(* number not found in db[0..maxEntries-1] *)"
                    attr: 7
                  - text: "\r\t\t\tname := \"\"\r\t\tEND\r\tEND LookupByNumber;\r\rBEGIN\t"
                    attr: 3
                  - text: "(* initialization of database contents *)"
                    attr: 7
                  - text: "\r\tdb[0].name := \"Daffy Duck\"; db[0].number := \"310-555-1212\";\r\tdb[1].name := \"Wile E. Coyote\"; db[1].number := \"408-555-1212\";\r\tdb[2].name := \"Scrooge McDuck\"; db[2].number := \"206-555-1212\";\r\tdb[3].name := \"Huey Lewis\"; db[3].number := \"415-555-1212\";\r\tdb[4].name := \"Thomas Dewey\"; db[4].number := \"617-555-1212\"\rEND ObxPhoneDB.\r\rListing 3-3. Implementation of ObxPhoneDB\r\rBefore a module can be used, it must be loaded from disk into memory. But before it can be loaded, it must be compiled (command "
                    attr: 3
                  - text: "Dev->Compile"
                    attr: 7
                  - text: "). When compiling a module, the compiler produces a code file and a symbol file. The code file contains the executable code, which can be loaded into memory. The code file is a kind of super-lightweight DLL. The compiler also produces a symbol file, which contains a binary representation of the module's interface. If a module imports other modules, the compiler reads the symbol files of all these modules, in order to check that their interfaces are used correctly. The compilation process can be visualized in the following way:\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 62
                      bodyPos: 139135
                      bodyLen: 1551
                    attr: 3
                    w: 3632200
                    h: 2324100
                  - text: "\r\rFigure 3-4. Compilation process\r\rWhen you compile a module for the first time, a new symbol file is generated. In the log window, the compiler writes a message similar to the following one:\r\rcompiling \"ObxPhoneDB\"\r  new symbol file   964   640\r\rThe first of the two numbers indicates that the machine code in the new code file is 964 bytes long. The second number indicates that the module contains 320 bytes global variables (five entries in the db variable; each entry consisting of two strings with 32 elements each; each element is a 2-byte Unicode character). If a symbol file for exactly the same interface already exists, the compiler writes a shorter message:\r\rcompiling \"ObxPhoneDB\"   964   640\r\rIf the interface has changed, the compiler writes a new symbol file and indicates the changes compared to the old version in the log. For example, if you just have introduced procedure "
                    attr: 3
                  - text: LookupByNumber
                    attr: 7
                  - text: " in the most recent version, the compiler writes:\r\rcompiling \"ObxPhoneDB\"\r  LookupByNumber is new in symbol file   964   640\r\rSymbol files are only used at compile-time, they have no meaning at run-time. In order to load a module, only its code file is needed. Modules are loaded dynamically, i.e., there is no separate linking step as required by more static languages. To see a list of currently loaded modules, call command "
                    attr: 3
                  - text: "Info->Loaded Modules"
                    attr: 7
                  - text: ". As result, a window will be opened with a contents similar to the following one:\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5400000
                      asc: 114300
                      dsc: 25400
                      grid: 1
                      opts: 0x00000001
                      tabs:
                        - { stop: 1296000 }
                        - { stop: 2088000 }
                        - { stop: 2736000 }
                        - { stop: 4140000 }
                      attr: 7
                      w: 360000000
                      h: 444500
                  - text: "module name\tbytes used\tclients\tcompiled\tloaded"
                    attr: 7
                  - text: "\t\t"
                    attr: 3
                  - text: Update
                    attr: 8
                  - text: "\r\rStdLinks\t20639\t1\t  2.7.1996  18:42:15 \t29.8.1996  14:31:14 \rStdFolds\t20425\t1\t  2.7.1996  18:41:33 \t29.8.1996  14:31:12 \rStdCmds\t25066\t7\t  2.7.1996  18:39:12 \t29.8.1996  14:31:00 \r\rConfig\t125\t0\t  2.7.1996  18:38:21 \t29.8.1996  14:31:20 \rInit\t682\t0\t  2.7.1996  18:40:21 \t29.8.1996  14:31:05 \rControls\t78876\t5\t  7.7.1996  14:14:58 \t29.8.1996  14:31:00 \rServices\t1472\t5\t  2.7.1996  18:37:14 \t29.8.1996  14:30:54 \rContainers\t37348\t40\t  2.7.1996  18:37:51 \t29.8.1996  14:30:52 \rProperties\t8337\t42\t  2.7.1996  18:37:40 \t29.8.1996  14:30:49 \rControllers\t6037\t42\t  2.7.1996  18:37:36 \t29.8.1996  14:30:49 \rViews\t31589\t49\t  2.7.1996  18:37:33 \t29.8.1996  14:30:49 \rModels\t4267\t50\t  2.7.1996  18:37:27 \t29.8.1996  14:30:48 \rConverters\t2189\t51\t14.7.1996  22:45:12 \t29.8.1996  14:30:48 \rDialog\t8979\t54\t  2.7.1996  18:37:13 \t29.8.1996  14:30:48 \rDates\t3848\t45\t  2.7.1996  18:37:07 \t29.8.1996  14:30:48 \rMeta\t19275\t11\t  2.7.1996  18:37:10 \t29.8.1996  14:30:48 \rStores\t22302\t53\t  2.7.1996  18:37:22 \t29.8.1996  14:30:47 \rStrings\t17547\t15\t  2.7.1996  18:37:05 \t29.8.1996  14:30:47 \rMath\t15408\t2\t  3.7.1996    1:45:05 \t29.8.1996  14:30:47 \rPorts\t10631\t56\t  2.7.1996  18:37:17 \t29.8.1996  14:30:46 \rFonts\t1589\t58\t  2.7.1996  18:37:15 \t29.8.1996  14:30:46 \rFiles\t3814\t62\t  2.7.1996  18:36:28 \t      linked\r...\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "Table 3-5. List of loaded modules\r\rThe list shows all loaded modules. For each module, it shows its code size in bytes, how many other modules import it, when it has been compiled, and when it has been loaded.\r\rIt is easy to get an overview over the already loaded modules, but what about modules not yet loaded? The idea of having access to a wealth of prebuilt components raises some organizational issues. How do you find out exactly which components are available? How do you find out which of the available components provide the services that you need?\rThis is a matter of conventions, documentation, and supporting tools. For the BlackBox Component Builder, it is a convention that collections of related components, called "
                    attr: 3
                  - text: subsystems
                    attr: 7
                  - text: ", are placed into separate directories; all of which are located directly in the BlackBox directory. There are subsystems like System, Std, Host, Mac, Win, Text, Form, Dev, or Obx. The whole collection of subsystems is called the BlackBox "
                    attr: 3
                  - text: repository
                    attr: 7
                  - text: ". The basic idea behind the repository's structure is that everything that belongs to a component (code files, symbol files, documentation, resources) are stored together in a systematic and simple directory structure, according to the rule\r\r"
                    attr: 3
                  - text: Keep all constituents of a component in one place.
                    attr: 7
                  - text: "\r\rIt is only appropriate for component-oriented software that addition and removal of a component can be performed incrementally, by adding or removing a directory. All kinds of central installation or registration mechanisms which distribute the constituents of a component should be avoided, since they inevitably lead to (unnecessary) management problems.\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 68
                      bodyPos: 141117
                      bodyLen: 852
                    attr: 3
                    w: 5397421
                    h: 2197068
                  - text: "\r\rFigure 3-6. Standard subsystems of the BlackBox Component Builder\r\rEach subsystem directory, e.g. Obx, may contain the following subdirectories:\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 69
                      bodyPos: 142009
                      bodyLen: 600
                    attr: 3
                    w: 3365434
                    h: 2197057
                  - text: "\r\rFigure 3-7. Structure of a typical subsystem directory\r\rThe module source is saved in a subsystem's Mod directory. The file name corresponds to the module name without its subsystem prefix; e.g., the modules "
                    attr: 3
                  - text: ObxPhoneDB
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: ObxPhoneUI
                    attr: 7
                  - text: " are stored as Obx/Mod/PhoneDB and Obx/Mod/PhoneUI, respectively. For each source file, there may be a corresponding symbol file, e.g., Obx/Sym/PhoneDB; a corresponding code file, e.g., Obx/Code/PhoneDB; and a corresponding documentation file, e.g., Obx/Docu/PhoneDB. There may be zero or more resource documents in a subsystem, e.g., Obx/Rsrc/PhoneUI. There is not necessarily a 1:1 relationship between modules and resources, although it is generally recommended to use a module name as part of a resource name, in order to simplify maintenance.\rModules whose names have the form SubMod, e.g., "
                    attr: 3
                  - text: TextModels
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: FormViews
                    attr: 7
                  - text: ", or "
                    attr: 3
                  - text: StdCmds
                    attr: 7
                  - text: ", are stored in their respective subsystems given by their name prefixes, e.g., "
                    attr: 3
                  - text: Text
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: Form
                    attr: 7
                  - text: ", or "
                    attr: 3
                  - text: Std
                    attr: 7
                  - text: ". The subsystem prefix ends at the left-most transition from a non-uppercase character to an uppercase character. It is recommended that the subsystem prefix starts with an uppercase character.\rModules which belong to no subsystem, i.e., modules whose names are not in the form of SubMod, are stored in a special subsystem called "
                    attr: 3
                  - text: System
                    attr: 7
                  - text: ". The whole BlackBox library and framework core belongs to this category, e.g., the modules "
                    attr: 3
                  - text: Math
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: Files
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: Stores
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: Models
                    attr: 7
                  - text: ", etc.\r\r"
                    attr: 3
                  - ruler:
                      left: 648000
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 72000 }
                        - { stop: 648000 }
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "Each subsystem directory may contain the following subdirectories:\r\x0e\tCode\tDirectory with the executable code files, i.e., lightweight DLLs.\rFor example, for module \"FormCmds\" there is file \"Form/Code/Cmds\".\rA module for interfacing native DLLs (Windows DLLs or Mac OS code fragments) has no code file. \x0e\tDocu\tDirectory with the fully documented interfaces and other docu.\rFor example, for module \"FormCmds\" there is file \"Form/Docu/Cmds\".\rFor a module that is only used internally, its docu file is not distributed to the customer.\rOften, there are further documentation files which are not specific to a particular module of the subsystem. Such files contain one or more dashes as parts of their names, e.g., \"Dev/Docu/P-S-I\".\rTypical files are\r\"Sys-Map\" (overview with hyperlinks to other documents of this subsystem)\r\"User-Man\" (user manual)\r\"Dev-Man\" (developer manual)\r\x0e\tMod\tDirectory with module sources.\rFor example, for module \"FormCmds\" there is file \"Form/Mod/Cmds\".\rFor a module that is not published in source code (\"white box\"), its source file is not distributed to the customer.\r\x0e\tRsrc\tDirectory with the subsystem's resource documents.\rFor example, for module \"FormCmds\" there is file \"Form/Rsrc/Cmds\".\rThere may be zero, one, or more resource files for one module. If there are several files, the second gets a suffix \"1\", the third a suffix \"2\", and so on. For example, \"Form/Rsrc/Cmds\", \"Form/Rsrc/Cmds1\", \"Form/Rsrc/Cmds2\", etc.\rOften, there are further resource files which are not specific to a particular module of the subsystem.\rTypical files are\r\"Strings\" (string resources of this subsystem)\r\"Menus\" (menus of this subsystem)\r\x0e\tSym\tDirectory with the symbol files.\rFor example, for module \"FormCmds\" there is file \"Form/Sym/Cmds\".\rFor a module that is only used internally, its symbol file is not distributed to the customer.\r\rTable 3-8. Contents of the standard subsystem subdirectories\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\rIf you want to find out about the repository, its subsystems and their subdirectories, you can invoke the command "
                    attr: 3
                  - text: "Info->Repository"
                    attr: 7
                  - text: ". If you want to find out more about a module, you can select the module name in a text and then execute "
                    attr: 3
                  - text: "Info->Source"
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: "Info->Interface"
                    attr: 7
                  - text: " or "
                    attr: 3
                  - text: "Info->Documentation"
                    attr: 7
                  - text: ". These commands open the module's Mod, Sym or Docu files. For this purpose, "
                    attr: 3
                  - text: "Info->Interface"
                    attr: 7
                  - text: " converts the binary representation of the symbol file into a readable textual description. For example, type the string \"ObxPhoneDB\" into the log window, select the string, and then execute the "
                    attr: 3
                  - text: "Info->Interface"
                    attr: 7
                  - text: " browser command. As a result, the following text will be opened in a new window:\r\rDEFINITION ObxPhoneDB;\r\r\tTYPE\r\t\tString = ARRAY 32 OF CHAR;\r\r\tPROCEDURE LookupByIndex (index: INTEGER; OUT name, number: String);\r\tPROCEDURE LookupByName (name: String; OUT number: String);\r\tPROCEDURE LookupByNumber (number: String; OUT name: String);\r\rEND ObxPhoneDB.\r\rListing 3-9. Definition of ObxPhoneDB\r\rA module definition as generated by the browser syntactically is a subset of the module implementation, except for the keyword "
                    attr: 3
                  - text: MODULE
                    attr: 7
                  - text: " which is replaced by "
                    attr: 3
                  - text: DEFINITION
                    attr: 7
                  - text: ". This syntax can be regarded as the interface description language (IDL) of Component Pascal. Texts in this language are usually created out of complete module sources by the browser or similar tools, and thus need not be written manually and cannot be compiled.\r\rSince the browser command operates on the symbol file of a module, it can be used even if there is neither a true documentation nor a code file available. During prototyping, where documentation is rarely available, the symbol file browser is very convenient for quickly looking up details like the signature of a procedure, or to get an overview over the interface of an entire module. When a full documentation is available, the command "
                    attr: 3
                  - text: "Info->Documentation"
                    attr: 7
                  - text: " can be used. It opens the module's documentation file, which starts with the definition of the module's interface just like above, but then continues with an explanation of the module's purpose and a detailed description of the various items exported by the module, for example:\r\r"
                    attr: 3
                  - ruler:
                      first: 216000
                      left: 216000
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "Module ObxPhoneDB provides access to a phone database. Access may happen by index, by name, or by number. An entry consists of a name and a phone number string. Neither may be empty. The smallest index is 0, and all entries are contiguous.\r\rPROCEDURE "
                    attr: 3
                  - text: LookupByIndex
                    attr: 6
                  - text: " (index: INTEGER; OUT name, number: ARRAY OF CHAR)\rReturn the <name, number> pair of entry "
                    attr: 3
                  - text: index
                    attr: 7
                  - text: ". If the index is too large, <\"\", \"\"> is returned.\rThe procedure operates in constant time.\r\rPre\rindex >= 0\t20\r\rPost\rindex is legal\r\tname # \"\"  &  number # \"\"\rindex is not legal\r\tname = \"\"  &  number = \"\"\r\rPROCEDURE "
                    attr: 3
                  - text: LookupByName
                    attr: 6
                  - text: " (name: ARRAY OF CHAR; OUT number: ARRAY OF CHAR)\rReturns a phone number associated with "
                    attr: 3
                  - text: name
                    attr: 7
                  - text: ", or \"\" if no entry for "
                    attr: 3
                  - text: name
                    attr: 7
                  - text: " is found.\rThe procedure operates in linear time, depending on the size of the database.\r\rPost\rname found\r\tnumber # \"\"\rname not found\r\tnumber = \"\"\r\rPROCEDURE "
                    attr: 3
                  - text: LookupByNumber
                    attr: 6
                  - text: " (number: ARRAY OF CHAR; OUT name: ARRAY OF CHAR)\rReturns the name associated with "
                    attr: 3
                  - text: number
                    attr: 7
                  - text: ", or \"\" if no entry for "
                    attr: 3
                  - text: number
                    attr: 7
                  - text: " is found.\rThe procedure operates in linear time, depending on the size of the database.\r\rPost\rnumber found\r\tname # \"\"\rnumber not found\r\tname = \"\"\r\t\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "Listing 3-10. Documentation of ObxPhoneDB\r\rNote that preconditions and postconditions are documented in a semi-formal notation. Their goal is not to give a complete formal specification, but rather to help making the plain text description less ambiguous, where this is possible without using overly complex (and thus unreadable) formal conditions. The following assertion numbers are used for run-time checking in BlackBox:\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 2160000, kind: 0x00000002 }
                      version: 2
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "Free\t0 .. 19\rPreconditions\t20 .. 59\rPostconditions\t60 .. 99\rInvariants\t100 .. 120\rReserved\t121 .. 125\rNot Yet Implemented\t         126\rReserved\t         127\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\rListing 3-11. Assertion numbers in BlackBox\r\rIt is well known that the detection of an error is more difficult and more expensive the later it occurs, i.e., the farther apart the cause and its effects are. This motivates the following design rule:\r\r"
                    attr: 3
                  - text: Let errors become manifest as early as possible.
                    attr: 7
                  - text: "\r\rIn a component-oriented system, defects should always be contained within their components, and not be allowed to propagate into other components. The other components may even be black-boxes for which no source code is available, which makes source-level debugging impossible. Furthermore, the control flow of a large object-oriented software system is so convoluted that it is unrealistic, and thus a waste of time, to trace it beyond component boundaries for debugging purposes.\rThe only viable debugging approach is to design everything, from programming language to libraries to components and applications using a defensive programming style. In particular, entry points into components (procedure/method calls) should refuse to execute if their preconditions are not met:\r\r"
                    attr: 3
                  - text: Never let errors propagate beyond component boundaries.
                    attr: 7
                  - text: "\r\rFortunately, most precondition checks are inexpensive and thus their run-time overhead is negligible. This is important because in a component-oriented system, run-time checks cannot be switched off in a production system, because there "
                    attr: 3
                  - text: are
                    attr: 7
                  - text: " no separate development and production systems. In practice, most components during development are already debugged (\"production\") black-boxes, and the others are currently being debugged white-boxes. The production components must cooperate in order to make adherence to the above rule possible, which means never switching off run-time checks.\r\r\r"
                    attr: 3
                  - text: 3.3 Bottleneck interfaces
                    attr: 6
                  - text: "\r\rOne particular pattern that we would like to discuss here is the Carrier-Rider-Mapper pattern. This pattern is used in several ways in the BlackBox Component Framework: in the text subsystem, in the file abstraction, in the frame abstraction, in the container/context abstraction, and others. Let us consider texts as an example.\rWe regard a text as a so-called "
                    attr: 3
                  - text: carrier
                    attr: 7
                  - text: ". A carrier is an object that carries (contains) data, in this case textual data. Basically, a text can be regarded as a linear stream of elements, where elements have attributes such as font, color, style and vertical offset (for subscript and superscript characters). Elements are characters or views. For all practical purposes, a view in a text can simply be regarded as a special character.\rWhen reading a text, it is convenient not to require the specification of a text position for each and every character read. This convenience can be achieved by supporting a "
                    attr: 3
                  - text: current position
                    attr: 7
                  - text: ", i.e., the text itself knows where to read the next character. Each read operation automatically increments the current position.\rSeveral client objects may use a text carrier independently. For example, a text view needs to read its text when it redraws the text on screen, and a menu command may need to read the same text as its input. These clients are independent of each other; they don't need to know about each other. For this reason, the current read position cannot be stored in the text carrier itself, since this would mean that clients could interfere with each other and lose their independence.\rTo avoid such interference, a carrier provides allocation functions that return so-called "
                    attr: 3
                  - text: rider
                    attr: 7
                  - text: " objects. A rider is an independent access path to a carrier's data. Every text rider has its own current position, and possibly further state such as the current attributes.\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 82
                      bodyPos: 143809
                      bodyLen: 838
                    attr: 3
                    w: 3098800
                    h: 2197100
                  - text: "\r\rFigure 3-12. Carrier-Rider separation\r\rThe reason why carrier and rider are separated into different data types is the one-to-many relationship between the two: for one carrier there may be an arbitrary number (including zero) riders.\r\rTypically, carrier and rider need to be implemented by the same component, since a rider must have intimate knowledge about the internals of its carrier. For example, text riders and text carriers are both implemented in module "
                    attr: 3
                  - text: TextModels
                    attr: 7
                  - text: ". A text rider contains hidden pointers to the internal data structure of a text carrier. Since this information is completely hidden by the module boundary of "
                    attr: 3
                  - text: TextModels
                    attr: 7
                  - text: ", no outside client can make a rider inconsistent with its carrier. This kind of invariant, guaranteed by Component Pascal's module system, is an example why information hiding beyond single classes is important for safety reasons.\r\rIn the design patterns terminology, a text rider is an "
                    attr: 3
                  - text: external iterator
                    attr: 7
                  - text: ". However, not all riders are necessarily iterators. For example, a context object managed by a container is not an iterator.\r\rText riders come in two flavors: readers and writers. Readers support the reading of characters and views, while writers support the writing of characters and views. For example, the following calls may be made:\r\r\treader.ReadView(view)\r\t\r\tor\r\t\r\twriter.WriteChar(\"X\")\r\rOften, a programmer needs to read or write complex character sequences, so that working at the level of individual characters is too cumbersome. A higher-level abstraction for reading and writing is clearly desirable. This is the purpose of the "
                    attr: 3
                  - text: mappers
                    attr: 7
                  - text: ". A mapper contains a rider that it uses to provide more problem-oriented operations for reading or for writing. Since there exist very different programming problems, different applications may use different mappers, possibly even while working with the same carrier.\rFor text manipulation, BlackBox provides module "
                    attr: 3
                  - text: TextMappers
                    attr: 7
                  - text: ", which defines and implements two text mappers: "
                    attr: 3
                  - text: formatters
                    attr: 7
                  - text: " for writing, and "
                    attr: 3
                  - text: scanners
                    attr: 7
                  - text: " for reading.\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 83
                      bodyPos: 144757
                      bodyLen: 878
                    attr: 3
                    w: 2463751
                    h: 3009841
                  - text: "\r\rFigure 3-13. Carrier-Rider-Mapper separation\r\rBoth scanner and formatter work on the level of Component Pascal symbols: with integer numbers, real numbers, strings, and so on. For example, the following calls may be made:\r\r\tscanner.ReadInt(int)\r\t\r\tor\r\t\r\tformatter.WriteReal(3.14)\r\rIf there are different mappers for the same kind of carrier, they all have to be implemented in terms of the rider interface. For this reason, the rider/carrier interface is sometimes called a "
                    attr: 3
                  - text: bottleneck interface
                    attr: 7
                  - text: ". The reason why riders and mappers are separated is not a one-to-many relation as with carrier and rider  there is a one-to-one relation between mapper and rider   but independent extensibility: special circumstances may require special mappers. If carriers and mappers adhere to a well-defined rider (bottleneck) interface, it is possible to add new mappers anytime, and to use them with the same carrier.\rEven better: the carrier/rider interface can be an abstract interface, such that different "
                    attr: 3
                  - text: implementations
                    attr: 7
                  - text: " of it may exist. For example, a file carrier may be implemented differently for floppy disk files, hard disk files, CD-ROM files, and network files. But if they all implement the same bottleneck interface, then "
                    attr: 3
                  - text: all
                    attr: 7
                  - text: " file mappers can operate on "
                    attr: 3
                  - text: all
                    attr: 7
                  - text: " file implementations! Compare this with a situation where you would have to re-implement all mappers for all carriers: instead of implementing n carriers plus m mappers, you would have to implement n carriers plus n * m mappers! Wherever such an extensibility in two dimensions occurs (carrier/rider and mapper), a bottleneck interface is needed to avoid the so-called "
                    attr: 3
                  - text: cartesian product problem
                    attr: 7
                  - text: ", i.e., an explosion of implementations.\r\rNote that a bottleneck interface is not extensible itself, because every extension that cannot be implemented in terms of the bottleneck interface invalidates all its existing implementations. For example, if you extend the interface of a device driver for black-and-white bitmap displays by a color extension, then all existing device driver implementations will have to be updated. Since they probably have been implemented by different companies, this can become a major problem.\rThe problem can be defused if the new interface extension is specified as optional: then clients must test whether the option is supported. If not, a client either has to signal that it cannot operate in this environment, or it must gracefully degrade by providing a more limited functionality. If the optional interface is supported and used, it acts as a kind of \"conspiracy\" between the interface implementation and its client. This is admissible, but it clearly reduces the combinations of clients and implementations that are fully functional. This underlines how crucial good bottleneck designs are, in order to avoid the need for later extensions.\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 84
                      bodyPos: 145725
                      bodyLen: 737
                    attr: 3
                    w: 2311400
                    h: 1308100
                  - text: "\r\rFigure 3-14. Extensibility in two dimensions\r\rIn terms of design patterns, the Carrier-Rider-Mapper pattern solves the problem of flexible and convenient access to a data carrier, however it is implemented. It can be regarded to consist of two simpler and very basic design patterns: the separation of one object into several objects to allow many-to-one relations; and the separation of one object into two objects to allow for independent extensibility:\r\r"
                    attr: 3
                  - text: "Split an abstraction into two interfaces if several clients may access an instance simultaneously, and if independent state may have to be managed for every client."
                    attr: 7
                  - text: "\r\r"
                    attr: 3
                  - text: "Split an abstraction into two interfaces, if it needs to be extended independently in two different dimensions."
                    attr: 7
                  - text: "\r\rThe Carrier-Rider-Mapper separation goes back to a research project [\"Insight ETHOS: On Object-Orientation in Operating Systems\"; Clemens Szyperski; vdf, Zürich, 1992, ISBN 3 7281 1948 2] predating BlackBox. This project used several design patterns and design rules (e.g., avoidance of implementation inheritance) that are also described in "
                    attr: 3
                  - text: Design Patterns
                    attr: 7
                  - text: ". In the "
                    attr: 3
                  - text: Design Patterns
                    attr: 7
                  - text: " terminology, a Rider-Mapper combination (or Carrier-Mapper combination if there is no rider) forms a "
                    attr: 3
                  - text: bridge
                    attr: 7
                  - text: " pattern.\r\rIn BlackBox, riders are often created and managed in a particular way. A rider is typically under exclusive control of one client object, because after all, the reason why there can be multiple riders on one carrier (and thus why the two are distinguished) is precisely to allow several clients access to the carrier's data via their private access paths. Since riders are used in such controlled environments, BlackBox usually creates riders in the following way:\r\r\trider := carrier.NewRider(rider);\r\rThe idea is that if there already exists an old rider that isn't used anymore, it can be recycled. Recycling is done by the "
                    attr: 3
                  - text: NewRider
                    attr: 7
                  - text: " factory method (see next section) if possible. Of course, recycling is only legal if the old rider isn't used anymore for something else (possibly by someone else); that's why it is important that the rider is maintained in a controlled environment.\rTypically, a "
                    attr: 3
                  - text: NewRider
                    attr: 7
                  - text: " procedure is implemented in the following way:\r\r\tPROCEDURE (o: Obj) NewRider (old: Rider): Rider;\r\t\tVAR r: RiderImplementation;\r\tBEGIN\r\t\tIF (old # NIL) & (old IS RiderImplementation) THEN\t"
                    attr: 3
                  - text: "(* recycle old rider *)"
                    attr: 7
                  - text: "\r\t\t\tr := old(RiderImplementation)\r\t\tELSE\t"
                    attr: 3
                  - text: "(* allocate new rider *)"
                    attr: 7
                  - text: "\r\t\t\tNEW(r)\r\t\tEND;\r\t\t... initialize r ...\r\t\t"
                    attr: 3
                  - text: RETURN
                    attr: 6
                  - text: " r\r\tEND NewRider;\r\rListing 3-15. Rider recycling\r\rThis approach is used in BlackBox for files, texts, and forms. It can make a considerable difference in efficiency, depending on the kind of application. However, where efficiency is not a concern, it is probably a good idea to omit this mechanism, thereby avoiding any possibility for inadvertant reuse of riders in different contexts simultaneously.\r\r\r"
                    attr: 3
                  - text: 3.4 Object creation
                    attr: 6
                  - text: "\r\rThe BlackBox Component Framework is mostly a black-box design. It strictly separates interface from implementation. A client can only import, and thus directly use or manipulate, interfaces of objects. The implementations are hidden within the modules. This enforces that module clients adhere to the following design rule (Gamma et.al.):\r\r"
                    attr: 3
                  - text: "Program to an interface, not to an implementation"
                    attr: 7
                  - text: ".\r\rIn Component Pascal, object interfaces are represented as abstract record types. An implementation of an abstract record type is a concrete extension of it. Typically, implementations are not exported and thus cannot be extended (\"subclassed\") in other modules, meaning that implementation inheritance cannot be used. Thus it is also enforced that extension programmers adhere to the following design rule (Gamma et.al.):\r\r"
                    attr: 3
                  - text: Favor object composition over class inheritance.
                    attr: 7
                  - text: "\r\rConcrete record types cannot even be instantianted directly: because a client cannot import an object implementation whose type is not exported, it cannot allocate an instance by calling "
                    attr: 3
                  - text: NEW
                    attr: 7
                  - text: ". This is desirable, because "
                    attr: 3
                  - text: NEW
                    attr: 7
                  - text: " would couple the client code forever to one particular object implementation; reuse of the code for other implementations wouldn't be possible anymore. But how can client code solve the "
                    attr: 3
                  - text: black-box allocation problem
                    attr: 7
                  - text: "; i.e., obtain an object implementation without specific knowledge of it?\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 85
                      bodyPos: 146662
                      bodyLen: 1465
                    attr: 3
                    w: 5588000
                    h: 3327400
                  - text: "\r\rFigure 3-16. Exported interface records and hidden implementation records\r\rInstead of calling "
                    attr: 3
                  - text: NEW
                    attr: 7
                  - text: " it might be possible to call an allocation function instead, a so-called "
                    attr: 3
                  - text: factory function
                    attr: 7
                  - text: ". For example, module "
                    attr: 3
                  - text: TextModels
                    attr: 7
                  - text: " might export a function "
                    attr: 3
                  - text: New
                    attr: 7
                  - text: " that allocates and returns a text model. Internally, it would execute a "
                    attr: 3
                  - text: NEW
                    attr: 7
                  - text: " on the non-exported implementation type and possibly perform some initialization. This would be better than clients directly calling "
                    attr: 3
                  - text: NEW
                    attr: 7
                  - text: ", because the allocating module can guarantee correct initialization, and a new release of the module could perform allocation or initialization in some different way without affecting clients. However, static factory functions are still too inflexible. A proper solution of the black-box allocation problem requires a level of indirection. There are several approaches to achieve this. They are called creational patterns. BlackBox uses four major creational patterns: prototypes, factory methods, directory objects, and factory managers. They are discussed one by one.\r\rSometimes it is necessary to create an object of the same type as some other already existing object. In this case, the existing object is called a "
                    attr: 3
                  - text: prototype
                    attr: 7
                  - text: ", which provides a factory function or initialization method. BlackBox models can act as prototypes. For example, it is possible to clone a prototype and to let the prototype initialize its clone. This makes sure that the newly created object has exactly the same concrete type as the prototype, and it allows the prototype and its clone(s) to share caches for performance reasons. For example, a BlackBox text model and its clones share the same spill file that they use for buffering temporary data. Sharing avoids the proliferation of open files.\r\rSometimes there exists an object that can be used to create an object of "
                    attr: 3
                  - text: another
                    attr: 7
                  - text: " type. For this purpose, the existing object provides a factory function, a "
                    attr: 3
                  - text: factory method
                    attr: 7
                  - text: ". Possibly, the object may provide different factory methods which support different initialization strategies or which create different types of concrete objects.\rIn BlackBox, a text model provides the procedures "
                    attr: 3
                  - text: NewReader
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: NewWriter
                    attr: 7
                  - text: ", which generate new readers and writers. They are rider objects that represent access paths to a text.\rFactory methods are appropriate for objects that are implemented simultaneously (\""
                    attr: 3
                  - text: implementation covariance
                    attr: 7
                  - text: "\"). This is always the case for riders and their carriers.\r\rBut this approach is not sufficient for allocating the text models themselves. Where does the first text model come from? BlackBox uses special objects with factory methods, so-called "
                    attr: 3
                  - text: factory objects
                    attr: 7
                  - text: ". In BlackBox, factory objects are used in a particular way: they are installed in global variables and may be replaced at run-time, without affecting client code. For historical reasons, we call factory objects which are used for configuration purposes "
                    attr: 3
                  - text: directory objects
                    attr: 7
                  - text: ".\rFor example, module "
                    attr: 3
                  - text: TextModels
                    attr: 7
                  - text: " exports the type "
                    attr: 3
                  - text: Directory
                    attr: 7
                  - text: " which contains a "
                    attr: 3
                  - text: New
                    attr: 7
                  - text: " function, furthermore it exports the two variables "
                    attr: 3
                  - text: dir
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: stdDir
                    attr: 7
                  - text: " and the procedure "
                    attr: 3
                  - text: SetDir
                    attr: 7
                  - text: ". By default, "
                    attr: 3
                  - text: TextModels.dir
                    attr: 7
                  - text: " is used by client code to allocate new empty text models. "
                    attr: 3
                  - text: TextModels.stdDir
                    attr: 7
                  - text: " contains the default implementation of a text model, which is mostly useful during the debugging of a new text model implementation. For example, you could use the old directory while developing a new text model implementation. When the new one is ready you install its directory object by calling "
                    attr: 3
                  - text: SetDir
                    attr: 7
                  - text: ", thereby upgrading the text subsystem to the new implementation on the fly. From this time, newly created texts will have the new implementation. Texts with the old implementation won't be affected. If the new implementation has errors, the default implementation can be reinstalled by calling "
                    attr: 3
                  - text: TextModels.SetDir(TextModels.stdDir)
                    attr: 7
                  - text: ". The text subsystem uses directory objects in this typical way; the same design pattern can be found in other container model abstractions; e.g., for forms models. In BlackBox, it is even used for much simpler models and views; e.g., for "
                    attr: 3
                  - text: DevMarkers.
                    attr: 7
                  - text: "\rNote that objects allocated via directories are often persistent and their implementation thus long-lived. For this reason, several different implementations appear over time which have to be used simultaneously.\rTypically, the normal default directory objects of a subsystem are installed automatically when the subsystem is loaded. If other directory objects should be installed, a "
                    attr: 3
                  - text: Config
                    attr: 7
                  - text: " module is used to set up the desired directory object configuration upon startup.\rThe name \"directory object\" comes from another use of the directory design pattern: in module "
                    attr: 3
                  - text: Files
                    attr: 7
                  - text: ", a file can be created by using the directory object "
                    attr: 3
                  - text: Files.dir
                    attr: 7
                  - text: ". But a "
                    attr: 3
                  - text: Files.Directory
                    attr: 7
                  - text: " also provides means to find out more about the current configuration of the file system (e.g., procedure "
                    attr: 3
                  - text: Files.Directory.FileList
                    attr: 7
                  - text: ").\rFile directories are interesting also because they show that a replacement directory may sometimes need to forward to the replaced directory object. For example, if the new directory implements special memory files, which are distinguished by names that begin with \"M:\\\", then the new directory must check at each file lookup whether the name begins with the above pattern. If so, it is a memory file. If not, it is a normal file and must be handled by the old directory object.\rThere may exist several directory objects simultaneously. For example, if a service uses files in a particular way, it may provide its own file directory object which by default forwards to the file system's standard directory object.\rMultiple directory objects and chaining of directory objects are part of the directory design pattern. This chaining part of the pattern is cascadable, if a new directory object accesses the most recent old one, instead of "
                    attr: 3
                  - text: stdDir
                    attr: 7
                  - text: ".\rNote that unlike typical factory classes, directories are rarely extended.\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 86
                      bodyPos: 148477
                      bodyLen: 688
                    attr: 3
                    w: 3797300
                    h: 2552700
                  - text: "\r\rFigure 3-17. Forwarding between two directory objects\r\rDirectory objects are a particularly appropriate solution when the existence of one dominating implementation of an extensible black-box type can be expected, without excluding the existence of other implementations.\rOn the other hand, there could also be several special directory objects for the same implementation but for different purposes. For example, there may be a special text directory object for texts that have a special default ruler useful for program texts. A program editor would then create new program text via this directory object rather than via the standard directory of the text subsystem.\r\rA "
                    attr: 3
                  - text: registry
                    attr: 7
                  - text: " would be a valuable addition to directory objects. A registry is a persistent central database which stores configuration information, such as the particular directory objects to install upon startup. The problem with registries is that they contradict the decentral nature of software components, which leads to management problems such as finding registry entries that are no longer valid.\r\rWe have seen that allocation via one level of indirection is key to solving the black-box allocation problem. Directory objects are a solution involving global state. This is only desirable if this state changes rarely, and if no parallel activities occur (threads). For example, in server environments a state-free solution is often preferable. This can be achieved by parameterizing the client: the client must be passed a factory object as parameter. This makes it possible to determine the exact nature of an implementation at the \"top\" of a hierarchy of procedure calls, always passing the factory object \"downward\". This is useful since the top-level is typically much less reusable than lower-level code.\rAs an example, a file transfer dialog box may allow to specify the file transfer protocol along with information such as remote address, communication speed, and so on. The file transfer protocol, which indicates the implementation of a communication object, can be passed from the dialog box down to the communication software, where it is used to allocate a suitable communication object (e.g., a TCP stream object).\rInstead of passing a factory object, its symbolic name may be passed. At the \"bottom\", a service interprets this name; if necessary loads the module which implements the corresponding factory function; and then creates an object using the factory function. In this way, the service acts as a "
                    attr: 3
                  - text: factory manager
                    attr: 7
                  - text: ".\rThis approach is used for some BlackBox services, in particular for the "
                    attr: 3
                  - text: Sql
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: Comm
                    attr: 7
                  - text: " subsystems. In both cases, the name of a module can be passed when allocating a new object. This module is expected to provide suitable factory functions. For "
                    attr: 3
                  - text: Sql
                    attr: 7
                  - text: ", the modules "
                    attr: 3
                  - text: SqlOdbc
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: SqlOdbc3
                    attr: 7
                  - text: " provide appropriate object implementations and factory functions. For "
                    attr: 3
                  - text: Comm
                    attr: 7
                  - text: ", the module "
                    attr: 3
                  - text: CommTCP
                    attr: 7
                  - text: " provides a suitable object implementation.\rFactory managers are often more suitable for creating non-persistent objects, while directory objects are often more suitable for creating persistent objects.\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000009
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "Part II: Library"
                    attr: 5
                  - text: "\r\rPart I of the BlackBox tutorial gives an introduction to the design patterns that are used throughout BlackBox. To know these patterns makes it easier to understand and remember the more detailed design decisions in the various BlackBox modules.\r\rPart II of the BlackBox tutorial demonstrates how the most important library components can be used: control, form, and text components.\r\rPart III of the BlackBox tutorial demonstrates how new views can be developed, by giving a series of examples that gradually become more sophisticated.\r\r"
                    attr: 3
                  - text: "\r"
                    attr: 6
                  - text: 4 Forms
                    attr: 1
                  - text: "\r\rIn the first chapter of this part, we concentrate on the forms-based composition of controls. \"Forms-based\" means that there exists a graphical layout editor, sometimes called a visual designer or screen painter, that allows to insert, move, resize, and delete controls. Controls can be made active by linking them to code pieces. For example, it can be defined what action should happen when a command button is clicked.\r\rControls can have different visible states, e.g., they can be enabled or disabled. This is a way to inform a user about which actions currently make sense. Setting up control states in a sensible way can make a large difference in the user-friendliness of an application. Unfortunately, these user interface features often require more programming effort than the actual application logic itself does. However, there are only a few concepts necessary to understand in order to build such user interfaces. These concepts will be explained by means of simple examples.\r\r\r"
                    attr: 3
                  - text: 4.1 Preliminaries
                    attr: 6
                  - text: "\r\rWe want to start as quickly as possible with a concrete example, but a few preliminary remarks are still in order. The reader is expected to have some basic knowledge of programming, preferably in some dialect of Pascal. Furthermore, he of she is expected to know how to use the platform (Windows or Macintosh), and the general user interface guidelines for the platform.\rThe BlackBox Component Builder is used as the tool to expose the various characteristics of component software in an exemplary way. The contents of the book applies both to the Windows and the Macintosh version of the BlackBox Component Builder; except for screendumps, which mostly use Windows. In order to minimize platform-specific remarks in the text, a few notational conventions are followed:\r\r"
                    attr: 3
                  - text: ꀢ
                    attr: 3
                    wide: true
                  - text: " Mac OS folders are called directories\r"
                    attr: 3
                  - text: ꀢ
                    attr: 3
                    wide: true
                  - text: " Path names contain \"/\" as directory separators, as in Unix and the World-Wide Web\r"
                    attr: 3
                  - text: ꀢ
                    attr: 3
                    wide: true
                  - text: " File and directory names may contain both capital and small letters\r"
                    attr: 3
                  - text: ꀢ
                    attr: 3
                    wide: true
                  - text: " Document file names are given without the \".odc\" suffix used in Windows. Thus the file name Text/Rsrc/Find under Windows corresponds to Text\\Rsrc\\Find.odc on Windows, and to Text:Rsrc:Find under Mac OS.\r"
                    attr: 3
                  - text: ꀢ
                    attr: 3
                    wide: true
                  - text: " Modifier key: on Windows this is the Ctrl key, on Mac OS it is the Option key\r"
                    attr: 3
                  - text: ꀢ
                    attr: 3
                    wide: true
                  - text: " Menu commands: "
                    attr: 3
                  - text: "M->I"
                    attr: 7
                  - text: " is a shorthand notation for menu item I in menu M, e.g., "
                    attr: 3
                  - text: "File->New"
                    attr: 7
                  - text: "\r\rWhen working in the BlackBox environment for the first time, the following may be helpful to remember: almost all modifications to BlackBox documents are undoable, making it quite safe to try out a feature. In general, multi-level undo is available; i.e., not only one, but several commands can be undone; as many as memory permits.\rThis book is not a replacement for the BlackBox user manual. It minimizes the use of specific BlackBox Component Builder tool features, and therefore the need for tool-specific descriptions. The text is intended to concentrate on programming, rather than on the tool. Where unavoidable, tool-specific explanations are given where they are first needed.\rMost examples are also available on-line in the Obx/Mod directory of BlackBox. They can be opened and compiled immediately. At the end of every section, references to further Obx on-line examples for the same topic are given.\rFor readers who are not yet fluent in Component Pascal, Appendix B describes the differences beween Pascal and Component Pascal.\rThe Help screen of the BlackBox Component Builder gives direct or indirect access to the complete and extensive on-line documentation, e.g., to the user manual, to all the Obx (\""
                    attr: 3
                  - text: O
                    attr: 6
                  - text: "verview "
                    attr: 3
                  - text: b
                    attr: 6
                  - text: y e
                    attr: 3
                  - text: x
                    attr: 6
                  - text: "ample\") examples, and so on. On the Web, additional resources may be found at http://www.oberon.ch.\r\r\r"
                    attr: 3
                  - text: 4.2 Phone book example
                    attr: 6
                  - text: "\r\rThroughout this part of the book, we will meet variations of and additions to a specific example. The example is an exceedingly simple address database. The idea is not to present a full-fledged application with all possible bells and whistles, but rather a minimal example which doesn't hide the concepts to be explained behind large amounts of code. Nevertheless, the idea of how bells and whistles can be added, component by component, should become obvious over time.\rOur phone book database contains the following fixed entries:\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 180000 }
                        - { stop: 1800000 }
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\tDaffy Duck\t310-555-1212\r\tWile E. Coyote\t408-555-1212\r\tScrooge McDuck\t206-555-1212\r\tHuey Lewis\t415-555-1212\r\tThomas Dewey\t617-555-1212\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\rTable 4-1. Entries in phone book database\r\rThe database can be searched for a phone number, given a name. Alternatively, the database can be searched for a name, given a phone number; or its contents can be accessed by index. We have met a possible implementation of this database in section 3.2.\rOur goal is to create a user interface for the database. The user interface is a dialog box that contains two edit fields; one for the name, and the other for the phone number. For each text field, there is a caption that indicates its purpose. Furthermore, the dialog box contains a check box which allows to specify whether the name or the phone number should be looked up, and finally there is a command button which invokes the lookup command. The following screendump shows how the dialog box will look like eventually:\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 93
                      bodyPos: 149840
                      bodyLen: 33445
                    attr: 3
                    w: 2104920
                    h: 1324080
                  - text: "\r\rFigure 4-2. Phone book database mask\r\rTo construct this mask, we start by creating a new empty form for the dialog box, using command "
                    attr: 3
                  - text: "Controls->New Form"
                    attr: 7
                  - text: ". This results in the following dialog box:\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 94
                      bodyPos: 183335
                      bodyLen: 32549
                    attr: 3
                    w: 2676375
                    h: 1028880
                  - text: "\r\rFigure 4-3. New Form dialog box\r\rClicking on the "
                    attr: 3
                  - text: Empty
                    attr: 7
                  - text: " command button opens an empty form:\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 95
                      bodyPos: 215934
                      bodyLen: 130013
                    attr: 3
                    w: 3876645
                    h: 2981160
                  - text: "\r\rFigure 4-4. Empty form\r\rUsing the commands of menu "
                    attr: 3
                  - text: Controls
                    attr: 7
                  - text: " , we insert the various controls we need, i.e., two captions, two edit fields, a check box, and a command button. The controls we've inserted still have generic labels such as \"untitled\" or \"Caption\". To change these visual properties, a control property inspector is used. It is opened by selecting a control and then issuing "
                    attr: 3
                  - text: "Edit->Object Properties..."
                    attr: 7
                  - text: " (Windows) or "
                    attr: 3
                  - text: "Edit->Part Info"
                    attr: 7
                  - text: " (Mac OS), respectively. Edit the \"label\" field in order to change the selected control's label, and click on the default button to make the change permanent.\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 96
                      bodyPos: 346017
                      bodyLen: 197309
                    attr: 3
                    w: 4924440
                    h: 3571920
                  - text: "\r\rFigure 4-5. Control property editor\r\rChange the \"label\" field of each control so that you end up with a layout similar to the one of Figure 4-2. Listed in a tabular way, the labels are the following ones (from left to right, top to bottom):\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 180000 }
                        - { stop: 1620000 }
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\tControl type\tLabel\r"
                    attr: 7
                  - text: "\tCaption\tName\r\tText Field\r\tCaption\tNumber\r\tText Field\r\tCheck Box\tLookup by Name\r\tCommand Button\tLookup\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\rTable 4-6. List of controls in phone book dialog box\r\rThe controls can be rearranged by using the mouse or by using the layout commands in menu "
                    attr: 3
                  - text: Layout
                    attr: 7
                  - text: ". After having edited the layout, make sure to call "
                    attr: 3
                  - text: "Layout->Sort Views"
                    attr: 7
                  - text: "; this command sorts the controls in such a way that when being pressed, the tabulator key moves the cursor between them in the order you would expect, i.e., from left to right and from top to bottom.\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 101
                      bodyPos: 543657
                      bodyLen: 53229
                    attr: 3
                    w: 2552760
                    h: 1809720
                  - text: "\r\rFigure 4-7. Completed layout of phone book dialog box\r\rWhen you are happy with the layout, you can save the dialog box just like any other document, by using "
                    attr: 3
                  - text: "File->Save"
                    attr: 7
                  - text: ". As a convention, the dialog box layouts of all examples are saved in directory Obx/Rsrc. In this case, we save the new dialog box as Obx/Rsrc/PhoneUI.\r\rThe directory name "
                    attr: 3
                  - text: Rsrc
                    attr: 7
                  - text: " stands for \"Resources\". Resources are documents that are necessary for a program to work. In particular, they are dialog box layouts and string resources. String resources allow to move strings out of a program's source code into a separately editable document.\rResources can be edited without recompiling anything. For example, you could change all labels in the above dialog box from English to German, without having access to any source code or development tool.\r\r\r"
                    attr: 3
                  - text: 4.3 Interactors
                    attr: 6
                  - text: "\r\rCreating a dialog box layout is fine, but there also must be a way to add behavior to the dialog box. In our example, user interactions with the dialog box should lead to lookup operations in the phone book database. To achieve this, we need an actual implementation of the database. We mentioned earlier that a suitable implementation already exists. This is not surprising, since in this part of the book we talk about component object assembly, which means taking existing components and suitably integrating persistent objects that they implement.\rIn our example, the phone book database is a Component Pascal module called "
                    attr: 3
                  - text: ObxPhoneDB.
                    attr: 7
                  - text: " We have already met this module in Chapter 3. Now we want to write our first new module, whose purpose is to build a bridge between the database module "
                    attr: 3
                  - text: ObxPhoneDB
                    attr: 7
                  - text: " and the dialog box we've built earlier. The new module is called "
                    attr: 3
                  - text: ObxPhoneUI
                    attr: 7
                  - text: ", where \"UI\" stands for \"user interface\". It is a typical script module whose only purpose is to add behavior to a compound document, such that it can be used as a front-end for the application logic, which in our case is simply the phone book database.\rThe new module uses, i.e., imports, two existing modules. On the one hand, it is the "
                    attr: 3
                  - text: ObxPhoneDB
                    attr: 7
                  - text: " module. On the other hand, module "
                    attr: 3
                  - text: Dialog
                    attr: 7
                  - text: ":\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 102
                      bodyPos: 597006
                      bodyLen: 711
                    attr: 3
                    w: 2235200
                    h: 3543300
                  - text: "\r\rFigure 4-8. Import relation between ObxPhoneUI and ObxPhoneDB\r\r"
                    attr: 3
                  - text: Dialog
                    attr: 7
                  - text: " is part of a fundamental framework coming with the BlackBox Component Builder. The module provides various services that support user interaction. We'll meet the most important ones in this chapter.\r\rMODULE ObxPhoneUI;\r\r\tIMPORT Dialog, ObxPhoneDB;\r\r\tVAR\r\t\t"
                    attr: 3
                  - text: phone
                    attr: 6
                  - text: "*: RECORD\r\t\t\tname*, number*: ObxPhoneDB.String;\r\t\t\tlookupByName*: BOOLEAN\r\t\tEND;\r\r\tPROCEDURE "
                    attr: 3
                  - text: Lookup
                    attr: 6
                  - text: "*;\r\tBEGIN\r\t\tIF phone.lookupByName THEN\r\t\t\tObxPhoneDB.LookupByName(phone.name, phone.number);\r\t\t\tIF phone.number = \"\" THEN phone.number := \"not found\" END\r\t\tELSE\r\t\t\tObxPhoneDB.LookupByNumber(phone.number, phone.name);\r\t\t\tIF phone.name = \"\" THEN phone.name := \"not found\" END\r\t\tEND;\r\t\tDialog.Update(phone)\r\tEND Lookup;\r\rEND ObxPhoneUI.\r\rListing 4-9. First version of ObxPhoneUI\r\r"
                    attr: 3
                  - text: ObxPhoneUI
                    attr: 7
                  - text: " exports a global record variable "
                    attr: 3
                  - text: phone
                    attr: 7
                  - text: ", which contains two string fields and a Boolean field. Depending on the current value of the Boolean field, the "
                    attr: 3
                  - text: Lookup
                    attr: 7
                  - text: " procedure either takes "
                    attr: 3
                  - text: phone.name
                    attr: 7
                  - text: " to look up the corresponding number, or "
                    attr: 3
                  - text: phone.number
                    attr: 7
                  - text: " to look up the corresponding name. If the lookup fails, i.e., returns the empty string, the result is turned into \"not found\". Either result is put into "
                    attr: 3
                  - text: phone
                    attr: 7
                  - text: ", i.e., "
                    attr: 3
                  - text: phone
                    attr: 7
                  - text: " carries both input and output parameters for the database lookup.\r\rSince the user could change the contents of "
                    attr: 3
                  - text: phone
                    attr: 7
                  - text: " by interactively manipulating a control, e.g., by typing into a text entry field, a global variable like "
                    attr: 3
                  - text: phone
                    attr: 7
                  - text: " is called an "
                    attr: 3
                  - text: interactor
                    attr: 7
                  - text: ". Controls display the contents of their interactor fields and possibly let them be modified interactively. To do this, every control must first be linked to its corresponding interactor field. This is done with the control property editor that we have seen earlier. Its \"Link\" field should contain the field name, e.g., "
                    attr: 3
                  - text: ObxPhoneDB.phone.name
                    attr: 7
                  - text: " or a procedure name such as "
                    attr: 3
                  - text: ObxPhoneDB.Lookup
                    attr: 7
                  - text: ". Use the control property inspector to set up the link fields according to Table 4-10:\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 180000 }
                        - { stop: 1620000 }
                        - { stop: 3060000 }
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\tControl type\tLabel\tLink\r"
                    attr: 7
                  - text: "\tCaption\tName\r\tText Field\t\tObxPhoneUI.phone.name\r\tCaption\tNumber\r\tText Field\t\tObxPhoneUI.phone.number\r\tCheck Box\tLookup by Name\tObxPhoneUI.phone.lookupByName\r\tCommand Button\tLookup\tObxPhoneUI.Lookup\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\rTable 4-10. Links of phone book dialog box\r\rNote that the previously disabled controls now have become enabled. What does this mean? When a control is linked, which normally happens when it is being read from a file, or in our case when the link is changed by the inspector, then the module to which the control should be linked must be loaded. If it is already loaded, nothing needs to be done. If it isn't loaded yet (remember that you can check with "
                    attr: 3
                  - text: "Info->Loaded Modules"
                    attr: 7
                  - text: "), loading is done now. If loading fails, e.g., because the module's code file doesn't yet exist, then control linking fails and the control remains disabled. Linking also fails if the control and field types don't match, e.g., if a check box is linked to a string field.\r\rTo achieve this level of functionality (and safety against incorrect use), BlackBox provides several advanced \"metaprogramming\" services, in particular dynamic module loading on demand and typesafe lookup of variables. The latter requires extensive run-time type information (RTTI) that is relatively uncommon in fully compiled languages.\rThe links of all controls are reevaluated whenever a module has been unloaded. This ensures that controls are never linked to unloaded modules.\r\rIt was one of the design goals for BlackBox to separate user interface details from program logic. For this reason, module "
                    attr: 3
                  - text: ObxPhoneUI
                    attr: 7
                  - text: " doesn't know about controls and forms and the like. Instead, the controls of our form have links, which tell them the interactor fields with which they should interact. For example, the command button's \"ObxPhoneUI.Lookup\" link tells it to activate the "
                    attr: 3
                  - text: ObxPhoneUI.Lookup
                    attr: 7
                  - text: " procedure when the button is pressed. This procedure in turn doesn't know about the command button (there even may be several of them), the only thing it does to acknowledge the possible existence of controls is to call\r\r\tDialog.Update(phone)\r\rat the end of the command procedure. "
                    attr: 3
                  - text: Dialog.Update
                    attr: 7
                  - text: " causes an update of all controls that need updating. For example, if "
                    attr: 3
                  - text: Lookup
                    attr: 7
                  - text: " has assigned \"not found\" to "
                    attr: 3
                  - text: phone.number
                    attr: 7
                  - text: ", the corresponding text field(s) or similar controls need to be redrawn accordingly.\rAs parameter of "
                    attr: 3
                  - text: Dialog.Update
                    attr: 7
                  - text: ", an interactor must be passed. Calling "
                    attr: 3
                  - text: Dialog.Update
                    attr: 7
                  - text: " is necessary after one or several fields of this interactor have been modified by a program. If several fields have been modified, "
                    attr: 3
                  - text: Dialog.Update
                    attr: 7
                  - text: " should only be called once, for efficiency reasons. Note that a control calls "
                    attr: 3
                  - text: Dialog.Update
                    attr: 7
                  - text: " itself when the user has modified an interactor field; you only need to call it after your own code has modified the interactor.\r\rThis strong separation of user interface from program logic is uncommon. Its advantage is simplicity: as soon as you know how to define procedures and how to declare record types and global variables, you can already construct graphical user interfaces for modules. This is possible even for someone who is just beginning to learn programming. Another advantage is that you have to write no code for simple user interfaces. User interface construction happens in the forms editor (e.g., setting the position and size of a control) and with the inspector (e.g., setting the alignment of text in a text field). This makes it easier to adapt an application to different user interface requirements, without touching the application logic itself. Only if you want to exercise more control over the user interface, e.g., disabling controls or reacting on special events such as the user's typing, then you need to write small amounts of code, which can be very cleanly separated from the application logic itself. The necessary concepts, so-called guards and notifiers, will be discussed in the next two sections. If you need still more control, then you can access controls individually, as described in section 4.9.\r\rCurrently, a disavantage of the BlackBox Component Builder's approach is that all controls have to be linked to global interactor variables. If there are several controls for the same interactor field, all of them display the same value. The controls cannot have independent state of their own.\r\rNote an interesting feature of BlackBox: if you have written a module like "
                    attr: 3
                  - text: ObxPhoneUI
                    attr: 7
                  - text: " in Listing 4-9, you can automatically generate a form with suitable controls in a default layout. This is done by clicking \"Create\" in the \"New Form\" dialog box instead of \"Empty\". This feature is useful to create temporary testing and debugging user interfaces during development, where it isn't useful to spend time with manual form construction.\r\rWe now have a dialog box layout with controls linked to module "
                    attr: 3
                  - text: ObxPhoneUI
                    attr: 7
                  - text: ", and this module imports the database engine "
                    attr: 3
                  - text: ObxPhoneDB
                    attr: 7
                  - text: ". What is still missing is a way to "
                    attr: 3
                  - text: use
                    attr: 7
                  - text: " the dialog box, rather than to merely edit its layout. During editing, it can be useful to immediately try out the dialog box, even before its layout is perfect. To try this out, make sure that the layout window is on top and then execute "
                    attr: 3
                  - text: "Controls->Open As Aux Dialog"
                    attr: 7
                  - text: ". A new window is opened which contains the same dialog box, but in a way that its "
                    attr: 3
                  - text: controls
                    attr: 7
                  - text: " can be edited, rather than its "
                    attr: 3
                  - text: layout
                    attr: 7
                  - text: ". The window acts as a data entry mask. Now you can type, for example, \"Huey Lewis\" into the name string, click on the \"Lookup by Name\" check box, and then click on the \"Lookup\" button. You'll see that the appropriate phone number appears in the \"Number\" field.\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 107
                      bodyPos: 598352
                      bodyLen: 80069
                    attr: 3
                    w: 4572000
                    h: 1542960
                  - text: "\r\rFigure 4-11. Layout view (left) and mask view (right) displaying the same form model\r\rNote that the same name and number also appeared in the layout window. Even better, if you change the layout in the layout window, e.g., by moving the check box somewhat, you'll note that the layout change is immediately reflected in the other window. This is a result of the so-called Model-View-Controller implementation of BlackBox. In Part II of the book, we have discussed this design pattern in more detail. Here it is sufficient to note that several views can share the same data, e.g., a layout view and a mask view can display the same form; and that both layout and mask views are basically the same kind of view albeit in different modes. You can switch between these modes by applying the "
                    attr: 3
                  - text: "Dev->Layout Mode"
                    attr: 7
                  - text: " or "
                    attr: 3
                  - text: "Dev->Mask Mode"
                    attr: 7
                  - text: " commands.\r\rThe two modes differ in the ways they treat selection and focus. In layout mode, you can select the embedded views and edit the selection, but you cannot focus the embedded views. In mask mode, you can focus the embedded views, but you cannot select them (only their contents) and thus cannot edit their layout, i.e., their sizes, positions, etc. In other words: layout mode prevents focusing, while mask mode prevents selection.\r\rOpening a second view in mask mode for our form layout is convenient during layout editing, but you wouldn't want any layout view open when your program should actually be "
                    attr: 3
                  - text: used
                    attr: 7
                  - text: ". In this case, you want to open the dialog box in mask mode by invoking a suitable menu command.\r\rA new menu command can be introduced by editing a menu configuration text. You can open this text (which resides in System/Rsrc/Menus) by calling "
                    attr: 3
                  - text: "Info->Menus"
                    attr: 7
                  - text: ". Append the following text to its end:\r\r\tMENU \"Priv\"\r\t\t\"Open...\"\t\"\"\t\"StdCmds.OpenAuxDialog('Obx/Rsrc/PhoneUI', 'Phonebook')\"\t\"\"\r\tEND\r\rHaving done this, execute "
                    attr: 3
                  - text: "Info->Update Menus"
                    attr: 7
                  - text: ". You'll notice that the new menu \"Priv\" has appeared. Execute its menu item \"Open...\". As a result, the command\r\r\tStdCmds.OpenAuxDialog('Obx/Rsrc/PhoneUI', 'Phonebook')\r\rwill be executed. It opens the Obx/Rsrc/PhoneUI layout document, turns it into mask mode, and opens it in a window with title \"Phonebook\". If you want the modification of your menu text to become permanent, save the \"Menus\" text before closing it.\r\rNote that the form has not been saved in mask mode (this would be inconvenient for later editing), it is only temporarily turned into mask mode by the "
                    attr: 3
                  - text: StdCmds.OpenAuxDialog
                    attr: 7
                  - text: " command.\r\r\r"
                    attr: 3
                  - text: 4.4 Guards
                    attr: 6
                  - text: "\r\rIn terms of genuine functionality, we have seen everything that is important about the standard set of controls. We will look at the palette of standard controls in more detail later. However, we first need to discuss important aspects of standard controls which, strictly speaking, do not increase the functionality of an application, but rather its useability, i.e., its user-friendliness.\r\rIn section 1.2 we have already discussed what user-friendliness means. For example, it means avoiding modes wherever possible. For this reason, BlackBox doesn't support modal dialog boxes.\rModes are unavoidable if a user action sometimes makes sense, and sometimes doesn't. For example, if the clipboard is empty, its contents cannot be pasted into a text. If it is not empty and contains text, pasting is possible. This cannot be helped, and is harmless if the current state is clearly visible or can easily be inquired by the user. For example, if the clipboard is empty, the "
                    attr: 3
                  - text: Paste
                    attr: 7
                  - text: " menu command can be visibly marked as disabled. The visual distinction gives the user early feedback that this command is currently not meaningful. This is usually much better than to let the user try out a command and then give an error message afterwards.\rThe following example shows a dialog box with two buttons. The "
                    attr: 3
                  - text: Empty
                    attr: 7
                  - text: " button is enabled, while the "
                    attr: 3
                  - text: OK
                    attr: 7
                  - text: " button is disabled. The "
                    attr: 3
                  - text: OK
                    attr: 7
                  - text: " button only becomes enabled if something has been typed into the dialog box's text field:\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 108
                      bodyPos: 678571
                      bodyLen: 32549
                    attr: 3
                    w: 2666850
                    h: 1028880
                  - text: "\r\rFigure 4-12. Enabled and disabled buttons\r\rIn summary, a good user interface always lets the user perform every meaningful action, and gives visual cues about actions that are not meaningful.\r\rFor the BlackBox, we thus need a way to provide feedback about the current state of the system, especially about which commands are currently possible and which aren't.\rFor this purpose, it must be possible to enable and disable controls and menu items. For example, looking up a phone number is only possible if some name has been entered, i.e., if the name field is not empty. To determine whether a command procedure, in our case the "
                    attr: 3
                  - text: Lookup
                    attr: 7
                  - text: " procedure, may be called, i.e., whether a corresponding control or menu item may be enabled, a suitable "
                    attr: 3
                  - text: guard
                    attr: 7
                  - text: " must be provided. A guard is a procedure called by the framework, whenever it might be necessary to change the state of a control or menu item. The guard inspects some global state of the system, uses this state to determine whether the guarded command currently makes sense, and then sets up an output parameter accordingly. A guard has the following form:\r\r\tPROCEDURE XyzGuard* (VAR par: Dialog.Par);\r\tBEGIN\r\t\tpar.disabled := "
                    attr: 3
                  - text: ...some Boolean expression...
                    attr: 7
                  - text: "\r\tEND XyzGuard;\r\rA guard has the following type:\r\r\tGuardProc = PROCEDURE (VAR par: Dialog.Par);\r\rTo guard procedure "
                    attr: 3
                  - text: Lookup
                    attr: 7
                  - text: " in our example, we extend module "
                    attr: 3
                  - text: ObxPhoneUI
                    attr: 7
                  - text: " in the following way:\r\rMODULE ObxPhoneUI;\r\r\tIMPORT Dialog, ObxPhoneDB;\r\r\tVAR\r\t\t"
                    attr: 3
                  - text: phone
                    attr: 6
                  - text: "*: RECORD\r\t\t\tname*, number*: ObxPhoneDB.String;\r\t\t\tlookupByName*: BOOLEAN\r\t\tEND;\r\r\tPROCEDURE "
                    attr: 3
                  - text: Lookup
                    attr: 6
                  - text: "*;\r\tBEGIN\r\t\tIF phone.lookupByName THEN\r\t\t\tObxPhoneDB.LookupByName(phone.name, phone.number);\r\t\t\tIF phone.number = \"\" THEN phone.number := \"not found\" END\r\t\tELSE\r\t\t\tObxPhoneDB.LookupByNumber(phone.number, phone.name);\r\t\t\tIF phone.name = \"\" THEN phone.name := \"not found\" END\r\t\tEND;\r\t\tDialog.Update(phone)\r\tEND Lookup;\r\r\tPROCEDURE "
                    attr: 3
                  - text: LookupGuard
                    attr: 6
                  - text: "* (VAR par: Dialog.Par);\r\tBEGIN\t"
                    attr: 3
                  - text: "(* disable if input string is empty *)"
                    attr: 7
                  - text: "\r\t\tpar.disabled := phone.lookupByName & (phone.name = \"\") OR\r\t\t\t\t\t\t\t\t\t~phone.lookupByName & (phone.number = \"\")\r\tEND LookupGuard;\r\rEND ObxPhoneUI.\r\rListing 4-13. ObxPhoneUI with LookupGuard\r\rWhat happens if we compile the above module? Its symbol file on disk is replaced by a new version, because the module interface has been changed from the previous version. Because the change is merely an addition of a global procedure (i.e., the new version is compatible with the old version) possible client modules importing "
                    attr: 3
                  - text: ObxPhoneUI
                    attr: 7
                  - text: " are not invalidated and need not be recompiled.\r\rCompilation also produced a new code file on disk. However, the old version of "
                    attr: 3
                  - text: ObxPhoneUI
                    attr: 7
                  - text: " is still loaded in memory! In other words: once loaded, a module remains loaded (\"terminate-and-stay-resident\"). This is not a problem, since modules are extremely light-weight and consume little memory. However, a programmer of course must be able to unload modules without leaving the BlackBox Component Builder entirely, in order to try out a new version of a module. For this purpose, the command "
                    attr: 3
                  - text: "Dev->Unload"
                    attr: 7
                  - text: " is provided which unloads the module whose source code is currently focused.\rNote that compilation does not automatically unload a module, since this is often undesirable. In particular, as soon as you work on several related modules concurrently, unloading one of them before the others are correctly updated would render this whole set of modules inconsistent.\rFor those cases where immediate unloading after compilation "
                    attr: 3
                  - text: does
                    attr: 7
                  - text: " make sense, like in the simple examples that we are currently discussing, the command "
                    attr: 3
                  - text: "Dev->Compile And Unload"
                    attr: 7
                  - text: " is provided.\rYou may use this command to try out our new version of "
                    attr: 3
                  - text: ObxPhoneUI
                    attr: 7
                  - text: ". Notice how the "
                    attr: 3
                  - text: Lookup
                    attr: 7
                  - text: " button is disabled when the "
                    attr: 3
                  - text: Name
                    attr: 7
                  - text: " field is empty (if "
                    attr: 3
                  - text: Lookup by Name
                    attr: 7
                  - text: " is chosen) or when the "
                    attr: 3
                  - text: Number
                    attr: 7
                  - text: " field is empty (if "
                    attr: 3
                  - text: Lookup by Number
                    attr: 7
                  - text: " is chosen). Typing something into the field makes "
                    attr: 3
                  - text: Lookup
                    attr: 7
                  - text: " enabled again; deleting all characters in the field disables it again. At the end of this section we will explain more precisely when guards are evaluated; for now it is sufficient to know that they are evaluated after every character typed into a text field control.\r\rGuards are mostly used to enable and disable user interface elements such as controls or menu items. However, they sometimes play a more general role as well. For example, controls may not only be disabled, but they also may be made read-only or undefined.\r\r"
                    attr: 3
                  - text: Read-only
                    attr: 7
                  - text: " means that a control currently cannot be modified interactively. For example, the following guards set up the output parameter's "
                    attr: 3
                  - text: readOnly
                    attr: 7
                  - text: " field. The first guard sets read-only if lookup is not by name, i.e., by number. Obviously, in this case a number is input and a name is output. Pure outputs should be read-only. Thus the first guard can be used as guard for the "
                    attr: 3
                  - text: Name
                    attr: 7
                  - text: " field. The second guard can be used for the "
                    attr: 3
                  - text: Number
                    attr: 7
                  - text: " field, since it sets read-only if lookup returns a number.\r\r\tPROCEDURE "
                    attr: 3
                  - text: NameGuard
                    attr: 6
                  - text: "* (VAR par: Dialog.Par);\r\tBEGIN\t"
                    attr: 3
                  - text: "(* make read-only if lookup is by number *)"
                    attr: 7
                  - text: "\r\t\tpar.readOnly := ~phone.lookupByName\r\tEND NameGuard;\r\r\tPROCEDURE "
                    attr: 3
                  - text: NumberGuard
                    attr: 6
                  - text: "* (VAR par: Dialog.Par);\r\tBEGIN\t"
                    attr: 3
                  - text: "(* make read-only if lookup is by name *)"
                    attr: 7
                  - text: "\r\t\tpar.readOnly := phone.lookupByName\r\tEND NumberGuard;\r\rListing 4-14. Read-only guards for ObxPhoneUI\r\rInteractor fields which are exported read-only, i.e., with the \"-\" export mark instead of the \"*\" export mark, are always in read-only state regardless of what a guard specifies (otherwise this would violate module safety, i.e., the invariant that a read-only exported item can only be modified within its defining module).\r\rThe "
                    attr: 3
                  - text: undefined
                    attr: 7
                  - text: " state of a control means that the control currently has no meaning at all. This happens if a control displays the state of a heterogeneous selection. For example, a check box may indicate whether the text selection is all caps or all small letters. If part of the selection is capital letters and the rest small letters, then the control has no defined value. However, by clicking on the check box, the selection is made all caps and then has a defined state again. The undefined state can be set by a guard with the statement\r\r\tpar.undef := TRUE\r\rThe undefined state can be regarded as \"write-only\", i.e., the control's state cannot be read by the user because it currently has no defined value, but it can be modified and thus set to a defined value.\r\rOf the fields "
                    attr: 3
                  - text: disabled
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: readOnly
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: undef
                    attr: 7
                  - text: ", at most one may be set to "
                    attr: 3
                  - text: "TRUE"
                    attr: 7
                  - text: " by a guard. This leads to four possible temporary states of the control: it is in none or in exactly one of the three special states. When a guard is called by the framework, all three Boolean fields are preset to "
                    attr: 3
                  - text: "FALSE"
                    attr: 7
                  - text: ". This is a general rule in BlackBox: Boolean values default to "
                    attr: 3
                  - text: "FALSE"
                    attr: 7
                  - text: ".\r\rIn Table 4-15, suitable guards for the layout of Figure 4-2 are listed:\r"
                    attr: 3
                  - text: "\r"
                    attr: 9
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 180000 }
                        - { stop: 1512000 }
                        - { stop: 4140000 }
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\tControl type\tLink\tGuard\r"
                    attr: 7
                  - text: "\tCaption\r\tText Field\tObxPhoneUI.phone.name\tObxPhoneUI.NameGuard\r\tCaption\r\tText Field\tObxPhoneUI.phone.number\tObxPhoneUI.NumberGuard\r\tCheck Box\tObxPhoneUI.phone.lookupByName\r\tCommand Button\tObxPhoneUI.Lookup\tObxPhoneUI.LookupGuard\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\rTable 4-15. Guards in phone book dialog box\r\rA guard applies to a procedure, to an interactor field, or to several procedures or interactor fields. If it applies to mainly one procedure or field, the guard's name is constructed by appending \"Guard\" to the (capitalized) name of the procedure/field. For example, the guard for procedure "
                    attr: 3
                  - text: Lookup
                    attr: 7
                  - text: " is called "
                    attr: 3
                  - text: LookupGuard
                    attr: 7
                  - text: ", the guard for field "
                    attr: 3
                  - text: phone.name
                    attr: 7
                  - text: " is called "
                    attr: 3
                  - text: NameGuard
                    attr: 7
                  - text: ", etc. This is a simple naming convention which makes it easier to recognize the relation between guard and guarded item. The naming convention is \"soft\", i.e., it is not enforced by the framework; in fact the framework doesn't know about it at all.\r\rIt is not a convention, but a necessity, to export guards. Guards are accessed by the so-called metaprogramming mechanism of BlackBox which, for safety reasons, only operates on exported items. This is consistent with the treatment of a module as a black-box, of which only the set of exported items, i.e., its interface, is accessible from the outside. If a guard isn't exported, a control cannot call it. This is similar to the fields of an interactor, which also must be exported if an interactor should be able to link to it.\r\rIf we look at the declaration of type "
                    attr: 3
                  - text: Dialog.Par
                    attr: 7
                  - text: " (use "
                    attr: 3
                  - text: "Info->Interface"
                    attr: 7
                  - text: "!), we see that two fields have not yet been discussed: "
                    attr: 3
                  - text: label
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: checked
                    attr: 7
                  - text: ":\r\r\tPar = RECORD \r\t\tdisabled, checked, undef, readOnly: BOOLEAN;\r\t\tlabel: Dialog.String\r\tEND\r\rField "
                    attr: 3
                  - text: label
                    attr: 7
                  - text: " allows to change the label of a control. For example, instead of using the label \"Toggle\" for a button it may be more telling to use the labels \"Switch On\" and \"Switch Off\" depending on the current state of the system. This can be done by a procedure like this:\r\r\tPROCEDURE "
                    attr: 3
                  - text: ToggleGuard
                    attr: 6
                  - text: "* (VAR par: Dialog.Par);\r\tBEGIN\r\t\tIF someInteractor.isOn THEN\r\t\t\tpar.label := \"Switch Off\"\r\t\tELSE\r\t\t\tpar.label := \"Switch On\"\r\t\tEND\r\tEND ToggleGuard;\r\rListing 4-16. Label guard example\r\rNote that the guard overrides whatever label was set up in the control property inspector. This is true for all controls (and for menu items as well, see below).\r\rIt is strongly recommended not to place string literals in the source code like in the above example, because this would force a recompilation of the code if the language were changed, e.g., from English to German (see also section 1.4). In BlackBox, user interface strings such as labels or messages are generally packed into separate parameter files, so-called string resources. For each subsystem there can be one string resource file, e.g., Text/Rsrc/Strings or Form/Rsrc/Strings. A string resource file is a BlackBox text document starting with the keyword "
                    attr: 3
                  - text: STRINGS
                    attr: 7
                  - text: " and followed by an arbitrary number of "
                    attr: 3
                  - text: "<key, string>"
                    attr: 7
                  - text: " pairs. The key is a string, separated by a tab character from the actual string into which it will be mapped. Every "
                    attr: 3
                  - text: "<key, string>"
                    attr: 7
                  - text: " pair must be terminated by a carriage return. The pairs need not be arranged in any particular order, although it is helpful to sort them alphabetically by key, because this makes it easier to find a particular key when editing the string resources.\rFor example, System/Rsrc/Strings starts the following way:\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 2160000 }
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "STRINGS\rAbout\tAbout BlackBox\rAlienAttributes\talien attributes\rAlienCause\talien cause\rAlienComponent\talien component\rAlienControllerWarning\talien controller (warning)\r...\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\rTable 4-17. String resources of System/Rsrc/Strings\r\rTo use string resources in our guard example, a special syntax must be used to indicate that the string is actually a key that first must be mapped using the appropriate subsystem's string resources. Assuming that in the "
                    attr: 3
                  - text: Obx
                    attr: 7
                  - text: " subsystem's string resources there exist \"On\" and \"Off\" keys, the following code emerges:\r\r\tPROCEDURE "
                    attr: 3
                  - text: ToggleGuard
                    attr: 6
                  - text: "* (VAR par: Dialog.Par);\r\tBEGIN\r\t\tIF someInteractor.isOn THEN\r\t\t\tpar.label := \"#Obx:Off\"\r\t\tELSE\r\t\t\tpar.label := \"#Obx:On\"\r\t\tEND\r\tEND ToggleGuard;\r\rListing 4-18. Label guard example with string mapping\r\rThe leading \"#\" indicates that a string mapping is desired. It is followed by the subsystem name, in this case \"Obx\". Then comes a colon, followed by the key to be mapped. A command button with this guard would either display the label \"Switch Off\" or \"Switch On\" in an English version of BlackBox, \"Ausschalten\" or \"Einschalten\" in a German version, and so on.\rIf there is no suitable string resource, the key is mapped to itself. For example, if there is no \"Off\" key in Obx/Rsrc/Strings, then \"#Obx:Off\" will be mapped to \"Off\".\r\rThe remaining field of "
                    attr: 3
                  - text: Dialog.Par
                    attr: 7
                  - text: " that we have not yet discussed is called "
                    attr: 3
                  - text: checked
                    attr: 7
                  - text: ". Actually, so far it has never been used for controls in BlackBox. It is used for menu items. Menu items are similar to controls: they can invoke actions, they may be enabled or disabled, and they have labels. For this reason it makes sense to use the same guard mechanism for them also. A menu guard is specified in the "
                    attr: 3
                  - text: Menus
                    attr: 7
                  - text: " text as a string after the menu label and the keyboard equivalent of the menu item. For example, the following entry for the "
                    attr: 3
                  - text: Dev
                    attr: 7
                  - text: " menu specifies the guard "
                    attr: 3
                  - text: StdCmds.SetEditModeGuard
                    attr: 7
                  - text: ":\r\r\t\"Edit Mode\"\t\"\"\t\"StdCmds.SetEditMode\"\t\"StdCmds.SetEditModeGuard\"\r\rA unique feature of menu items is that they may be checked. For example, in the following menu, menu item "
                    attr: 3
                  - text: Edit Mode
                    attr: 7
                  - text: " is checked:\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 118
                      bodyPos: 712324
                      bodyLen: 20525
                    attr: 3
                    w: 1724040
                    h: 961890
                  - text: "\r\rFigure 4-19. Menu item with check mark\r\rThe check mark indicates which of the items has been selected most recently, and the state that has been established by the selection. The state can be changed by invoking one of the other menu items, e.g., "
                    attr: 3
                  - text: Mask Mode
                    attr: 7
                  - text: " as in the figure above. Basically, the four menu items form a group of possibilities from which one can be selected.\rGuard procedures for menu items may set up the "
                    attr: 3
                  - text: disabled
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: checked
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: label
                    attr: 7
                  - text: " fields of "
                    attr: 3
                  - text: Dialog.Par
                    attr: 7
                  - text: ". The other fields are ignored for menus.\r\rA guard procedure may set up several fields of its "
                    attr: 3
                  - text: par
                    attr: 7
                  - text: " output parameter simultaneously, e.g., it may assign the "
                    attr: 3
                  - text: disabled
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: label
                    attr: 7
                  - text: " fields for a command button. However, a guard may set at most one of the Boolean fields of "
                    attr: 3
                  - text: par
                    attr: 7
                  - text: " and must "
                    attr: 3
                  - text: never
                    attr: 7
                  - text: " modify any state outside of "
                    attr: 3
                  - text: par
                    attr: 7
                  - text: ", e.g., a field of an interactor or something else; i.e., it must have no side effects. It may not call any procedures which may have side effects either. The reason is that a program cannot assume much about when (and especially when not) a guard is being called by the framework.\rA guard may use any interactor or set of interactors as its input, or the state of the current focus or selection. The latter is often used for menu guards. The current focus or selection is only used in control guards if the controls are in so-called tool dialog boxes, i.e., dialog boxes that operate on some document underneath. A "
                    attr: 3
                  - text: "Find & Replace"
                    attr: 7
                  - text: " dialog box operating on a focused text is a typical example of a tool dialog box. The other dialog boxes are self-contained and called auxiliary dialog boxes. Data entry masks are typical examples of auxiliary dialog boxes.\r\rWhen is a guard evaluated? There are four reasons why a guard may be called: when the control's link is established, when the contents of an interactor is being edited, when the window hierarchy has changed, or when the user has clicked into the menu bar.\rA control's link is established after it is newly inserted into a container, after it has been loaded from a file, after a module was unloaded, or after its link has been modified through the control property inspector or other tool.\rWhen some piece of code modifies the contents of an interactor, it is required to call "
                    attr: 3
                  - text: Dialog.Update
                    attr: 7
                  - text: " for this interactor. As a result, every currently visible control is notified (see section 2.9). In turn, the control compares its actual state with the interactor field to which it is linked. If the interactor field has changed, the control redraws itself accordingly. After all controls have updated themselves, the guards of "
                    attr: 3
                  - text: all
                    attr: 7
                  - text: " visible controls are evaluated. For this reason, guards should be efficient and not perform too much processing.\rGuards are also evaluated when the window hierarchy is changed, e.g., when a bottom window is brought to the top. This is necessary because many commands depend on the current focus or selection, which vanishes if another window comes to the top.\rMenus are another reason why a guard may be called. When the user clicks in a menu bar, all guards of this menu, or even the guards of the whole menu bar, are evaluated.\r\rUsually, a guard has the form\r\r\tPROCEDURE SomeGuard* (VAR par: Dialog.Par)\r\rAlternatively, the form\r\r\tPROCEDURE SomeGuard* (n: INTEGER; VAR par: Dialog.Par)\r\rmay be used, which allows to parameterize a single guard procedure for several related commands. For example, the commands to set a selection to the colors red, green or blue are the following:\r\r\tStdCmds.Color(00000FFH)\r\tStdCmds.Color(000FF00H)\r\tStdCmds.Color(0FF0000H)\r\rFor these commands, the following guards can be used:\r\r\tStdCmds.ColorGuard(00000FFH)\r\tStdCmds.ColorGuard(000FF00H)\r\tStdCmds.ColorGuard(0FF0000H)\r\rThe actual signature of "
                    attr: 3
                  - text: StdCmds.ColorGuard
                    attr: 7
                  - text: " is\r\r\tPROCEDURE ColorGuard (color: INTEGER; VAR par: Dialog.Par)\r\r\r"
                    attr: 3
                  - text: 4.5 Notifiers
                    attr: 6
                  - text: "\r\rA control guard sets up the temporary state of a control, such as whether it is disabled or not. It has no other effect. It doesn't modify any interactor state. It doesn't add any functionality. It only lets the control give feedback about the currently available functionality, or its lack thereof. A guard is evaluated ,e.g., when the user changes the state of a control interactively. It can be regarded as a merely \"cosmetic\" feature whose sole purpose is to increase user-friendliness.\rHowever, sometimes a user interaction should trigger more than the evaluation of guards only. In particular, it may sometimes be necessary to change some interactor state as a response to user interaction. For example, changing the selection in a selection box may cause the update of a corresponding counter, which counts the number of currently selected items in the selection box. Or some postprocessing of user input may be implemented, as we will see in the following example. It is an alternate implementation of our "
                    attr: 3
                  - text: ObxPhoneUI
                    attr: 7
                  - text: " example. Instead of having a "
                    attr: 3
                  - text: Lookup
                    attr: 7
                  - text: " button, this version just has two edit fields. After any character typed in, a database lookup is executed to test whether now a correct key is entered. Note that unsuccessful lookup in "
                    attr: 3
                  - text: ObxPhoneDB
                    attr: 7
                  - text: " results in returning an empty string.\r\rMODULE ObxPhoneUI1;\r\r\tIMPORT Dialog, ObxPhoneDB;\r\r\tVAR\r\t\t"
                    attr: 3
                  - text: phone
                    attr: 6
                  - text: "*: RECORD\r\t\t\tname*, number*: ObxPhoneDB.String\r\t\tEND;\r\r\tPROCEDURE "
                    attr: 3
                  - text: NameNotifier
                    attr: 6
                  - text: "* (op, from, to: INTEGER);\r\tBEGIN\r\t\tObxPhoneDB.LookupByName(phone.name, phone.number);\r\t\tDialog.Update(phone)\r\tEND NameNotifier;\r\r\tPROCEDURE "
                    attr: 3
                  - text: NumberNotifier
                    attr: 6
                  - text: "* (op, from, to: INTEGER);\r\tBEGIN\r\t\tObxPhoneDB.LookupByNumber(phone.number, phone.name);\r\t\tDialog.Update(phone)\r\tEND NumberNotifier;\r\rEND ObxPhoneUI1.\r\rListing 4-20. ObxPhoneUI1 with notifiers\r\rThese "
                    attr: 3
                  - text: notifiers
                    attr: 7
                  - text: " create dependencies between two fields of an interactor: a modification of one text field may lead to a modification of the other text field, i.e., a dependency between interactor fields is defined.\r\rNotifiers are called right after an interaction happens, but before the guards are evaluated. A notifier has the following form:\r\r\tPROCEDURE XyzNotifier* (op, from, to: INTEGER);\r\tBEGIN\r\t\t...\r\tEND XyzNotifier;\r\rA notifier's type is\r\r\tNotifierProc = PROCEDURE (op, from, to: INTEGER);\r\rFor simple notifiers, the parameters can be ignored. They give a more precise indication of what kind of modification actually took place. Which of the parameters are valid and what their meaning exactly is is defined separately for every kind of control. See the  next section for details.\r\r\r"
                    attr: 3
                  - text: 4.6 Standard controls
                    attr: 6
                  - text: "\r\rIn this section, the various controls that come standard with the BlackBox Component Builder are presented. For each control, a list of data types to which it may be linked is given, and the meaning of the notifier parameters is indicated.\rA control may have various properties, e.g., its label, or whether the label should be displayed in the normal system font or in a lighter, less flashy font. However, such cosmetic properties may not be implemented the same way on every platform, sometimes they may even be ignored.\r\rA label may specify a keyboard shortcut, which on some platforms is used to navigate between controls without using the mouse. The shortcut character is indicated by preceding it with a \"&\" sign. Two successive \"&\" signs indicate a normal \"&\", without interpreting the following character as shortcut. Only one shortcut per label is allowed. For example, \"Clear Text &Field\" defines \"F\" as a keyboard shortcut, while \"Find && &Replace\" defines \"R\" as keyboard shortcut. The same syntax for keyboard shortcuts is used in menu commands.\r\rThe label property of every control can be modified at run-time, by using a guard procedure as demonstrated in Listing 4-16. For controls without visible label, this has no visible effect.\r\rTwo of the most important control properties, the guard and notifier names, are optional. If there is no guard for the control, it will use its default states (enabled, read-write, defined). If there is no notifier for the control, none will be called.\rBlackBox attempts to minimize the number of different properties, in order to make it easier to use. This is consistent with the general trend, both under Windows and the Mac OS, towards globally controlled appearances. This means that a control should not define its colors, font, and so on individually. Instead, the user should be able to define a system-wide and consistent configuration of these properties.\r\rHowever, if for some special reason this is still deemed important, specific fonts can be assigned to controls, simply by selecting the control(s) and applying the commands of the "
                    attr: 3
                  - text: Font
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: Attributes
                    attr: 7
                  - text: " or "
                    attr: 3
                  - text: Characters
                    attr: 7
                  - text: " menus. If the default font is set, then the system preferences will be used. This is the normal case. Note that other font attributes, such as styles, weight, or size, may be restricted on certain platforms. For example, on Mac OS the font size is always 12 points.\r\rIn the following text, all standard controls of BlackBox are described in turn: command buttons, edit fields, check boxes, radio buttons, date fields, time fields, color fields, captions, groups, list boxes, selection boxes and combo boxes. For each control, its valid properties are given, the variable types to which it may be linked, and the meaning of the "
                    attr: 3
                  - text: op
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: from
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: to
                    attr: 7
                  - text: " parameters of the notifier.\r\rNote that there is no special control for currency values, you can use edit fields bound to variables of type "
                    attr: 3
                  - text: Dialog.Currency
                    attr: 7
                  - text: " instead.\r\rIn the following descriptions, some abbreviations are used:\r"
                    attr: 3
                  - text: pressed
                    attr: 7
                  - text: " stands for "
                    attr: 3
                  - text: Dialog.pressed
                    attr: 7
                  - text: "\r"
                    attr: 3
                  - text: released
                    attr: 7
                  - text: " stands for "
                    attr: 3
                  - text: Dialog.released
                    attr: 7
                  - text: "\r"
                    attr: 3
                  - text: changed
                    attr: 7
                  - text: " stands for "
                    attr: 3
                  - text: Dialog.changed
                    attr: 7
                  - text: "\r"
                    attr: 3
                  - text: included
                    attr: 7
                  - text: " stands for "
                    attr: 3
                  - text: Dialog.included
                    attr: 7
                  - text: "\r"
                    attr: 3
                  - text: excluded
                    attr: 7
                  - text: " stands for "
                    attr: 3
                  - text: Dialog.excluded
                    attr: 7
                  - text: "\r"
                    attr: 3
                  - text: undefined
                    attr: 7
                  - text: " means that the "
                    attr: 3
                  - text: from
                    attr: 7
                  - text: " or "
                    attr: 3
                  - text: to
                    attr: 7
                  - text: " parameter of a notifier has no defined value that can be relied upon\r"
                    attr: 3
                  - text: modifier
                    attr: 7
                  - text: " means a 0 for single-clicks and a 1 for double-clicks\r"
                    attr: 3
                  - text: link
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: label
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: guard
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: notifier
                    attr: 7
                  - text: ", and"
                    attr: 3
                  - text: " level"
                    attr: 7
                  - text: " stand for their respective control properties as defined in module "
                    attr: 3
                  - text: Controls
                    attr: 7
                  - text: ". There are up to five optional Boolean properties. Depending on the control, they are called differently, e.g. "
                    attr: 3
                  - text: default font
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: default
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: cancel
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: sorted
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: left
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: right
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: multiLine
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: password
                    attr: 7
                  - text: ".\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 1080000 }
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: Command Button
                    attr: 6
                  - text: "\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 121
                      bodyPos: 733617
                      bodyLen: 4829
                    attr: 3
                    w: 781005
                    h: 285840
                  - text: "\r\rFigure 4-21. Command button\r\rA command button is used to execute a parameterless Component Pascal command, or a whole command sequence. A button with the default property looks different than normal buttons; input of a carriage return corresponds to a mouse click in the default button. For a button with the cancel property, input of an escape character corresponds to a mouse click in it. A button should not be default and cancel button simultaneously. Note that the default and cancel properties are set and cleared individually per control, i.e., making one button a default button doesn't automatically make an existing default button a normal button again. There should be at most one default and at most one cancel button per dialog box.\rA cancel button or another button that should close the dialog box in which it is contained can use the command "
                    attr: 3
                  - text: StdCmds.CloseDialog
                    attr: 7
                  - text: ".\r\rproperties:\tlink, label, guard, notifier, font, default, cancel\rlinkable to:\tparameterless procedure, command sequence\rop:\tpressed, released\rfrom:\tundefined, modifier\rto:\tundefined\r\r"
                    attr: 3
                  - text: Text Field
                    attr: 6
                  - text: "\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 122
                      bodyPos: 738506
                      bodyLen: 6773
                    attr: 3
                    w: 1352520
                    h: 304725
                  - text: "\r\rFigure 4-22. Text field\r\rA text field displays the value of a global variable which may be a string, an integer, a floating-point number, or a variable of type "
                    attr: 3
                  - text: Dialog.Currency
                    attr: 7
                  - text: " or "
                    attr: 3
                  - text: Dialog.Combo
                    attr: 7
                  - text: ".  The value of the variable can be changed by editing the field.\rWhenever the contents of the linked interactor field is changed, the notifier is called. Key presses that do not change the interactor state, such as pressing arrow keys or entering leading zeroes in number fields, cause no notifier call. Changing the selection contained in the field causes no notification either.\rIf a modification occurs in a field that is linked to a string, real, currency, or combo variable, the notifier with "
                    attr: 3
                  - text: "(change, undefined, undefined)"
                    attr: 7
                  - text: " is called. If the field is linked to an integer value, the notifier with "
                    attr: 3
                  - text: "(change, oldvalue, newvalue)"
                    attr: 7
                  - text: " is called.\rIllegal characters, e.g., characters in a field linked to an integer, are not accepted.\rA text field may have a label, even though it doesn't display it. The reason for this is that keyboard shortcuts may be defined in labels, which is useful even for edit fields.\rIf the "
                    attr: 3
                  - text: level
                    attr: 7
                  - text: " property is 0 (the default), or the control is not linked to a number type, or it is linked to "
                    attr: 3
                  - text: Dialog.Currency
                    attr: 7
                  - text: ", then "
                    attr: 3
                  - text: level
                    attr: 7
                  - text: " has no effect. When linked to an integer variable the "
                    attr: 3
                  - text: level
                    attr: 7
                  - text: " defines the scale factor used for displaying the number, i.e., the displayed number is the linked value divided by 10"
                    attr: 3
                  - text: level
                    attr: 10
                  - text: ". For example, if the current value is 42 and level is 2, then 0.42 is displayed. For variable of real type, "
                    attr: 3
                  - text: level
                    attr: 7
                  - text: " indicates the format in the following way:\r\r"
                    attr: 3
                  - text: level
                    attr: 7
                  - text: " > 0: exponential format (scientific) with at least "
                    attr: 3
                  - text: level
                    attr: 7
                  - text: " digits in the exponent.\r"
                    attr: 3
                  - text: level
                    attr: 7
                  - text: " = 0: fixpoint or floatingpoint format, depending on "
                    attr: 3
                  - text: x
                    attr: 7
                  - text: ".\r"
                    attr: 3
                  - text: level
                    attr: 7
                  - text: " < 0: fixpoint format with "
                    attr: 3
                  - text: -level
                    attr: 7
                  - text: " digits after the decimal point.\r\rThe "
                    attr: 3
                  - text: left
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: right
                    attr: 7
                  - text: " properties define the adjustment mode of the field. The following combinations are possible:\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 1440000 }
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\r    left & ~right\tleft adjust\r    left &   right\tfully adjusted (may have no effect on some platforms)\r  ~left & ~right\tcentered\r  ~left &   right\tright adjust\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 1080000 }
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\rThe default is "
                    attr: 3
                  - text: "left & ~right"
                    attr: 7
                  - text: " (left adjust).\rProperty "
                    attr: 3
                  - text: multiLine
                    attr: 7
                  - text: " defines whether a carriage return, with its resulting line break, may be accepted by the field, which then must be linked to a string variable.\rProperty "
                    attr: 3
                  - text: password
                    attr: 7
                  - text: " causes the text field to display only asterisks instead of the characters typed in. This makes it possible to use such a field for password entry.\r\rproperties:\tlink, label, guard, notifier, level, font, left, right, multiLine,\r\tpassword\rlinkable to:\tARRAY const OF CHAR,\r\tBYTE, SHORTINT, INTEGER, LONGINT, SHORTREAL, REAL,\r\tDialog.Currency, Dialog.Combo\rop:\tpressed, released, changed\rfrom:\tundefined, old value, modifier\rto:\tundefined, new value\r\r"
                    attr: 3
                  - text: Check Box
                    attr: 6
                  - text: "\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 128
                      bodyPos: 745857
                      bodyLen: 3909
                    attr: 3
                    w: 590565
                    h: 257010
                  - text: "\r\rFigure 4-23. Check box\r\rA check box displays the value of a global variable which may be a Boolean or an element of a set. Clicking on the control toggles its state.\rWhen the control's state is changed, the notifier with "
                    attr: 3
                  - text: "(changed, undefined, undefined)"
                    attr: 7
                  - text: " is called if the control is linked to a Boolean variable. If it is linked to an element of a set variable, "
                    attr: 3
                  - text: "(included, level, undefined)"
                    attr: 7
                  - text: " or "
                    attr: 3
                  - text: "(excluded, level, undefined)"
                    attr: 7
                  - text: " is called, depending on whether the bit is set or cleared. The value "
                    attr: 3
                  - text: level
                    attr: 7
                  - text: " corresponds to the element of the set to which the control is linked. It can be defined using the control property inspector. It may lie in the range 0..31.\rOnly the last and final state change of the control leads to a notifier call, possible intermediate state changes (by dragging the mouse outside of the control's bounding box or back inside) have no effect.\r\rproperties:\tlink, label, guard, notifier, font, level\rlinkable to:\tBOOLEAN, SET\rop:\tpressed, released, changed, included, excluded\rfrom:\tundefined, level value, modifier\rto:\tundefined\r\r"
                    attr: 3
                  - text: Radio Button
                    attr: 6
                  - text: "\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 129
                      bodyPos: 749856
                      bodyLen: 3557
                    attr: 3
                    w: 485640
                    h: 228600
                  - text: "\r\rFigure 4-24. Radio button\r\rA radio button is active at a particular value of a global integer or Boolean variable. Typically, several radio buttons are linked to the same variable. Each radio button is \"on\" at another value, which is defined by the level property; i.e., the button is \"on\" if its level value is equal to the value of the variable it is linked to. For Boolean types, \"on\" corresponds to "
                    attr: 3
                  - text: "TRUE"
                    attr: 7
                  - text: " and \"off\" corresponds to "
                    attr: 3
                  - text: "FALSE"
                    attr: 7
                  - text: ".\rOnly the last and final state change of the control leads to  a notifier call, possible intermediate state changes (by dragging the mouse outside of the control's bounding box or back inside) have no effect.\r\rproperties:\tlink, label, guard, notifier, font, level\rlinkable to:\tBYTE, SHORTINT, INTEGER, LONGINT, BOOLEAN\rop:\tpressed, released, changed\rfrom:\tundefined, old value, modifier\rto:\tundefined, new value = level value\r\r"
                    attr: 3
                  - text: Date Field
                    attr: 6
                  - text: "\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 130
                      bodyPos: 753483
                      bodyLen: 5873
                    attr: 3
                    w: 1028880
                    h: 323805
                  - text: "\r\rFigure 4-25. Date field\r\rA date field displays the date specified in a global variable of type "
                    attr: 3
                  - text: Dates.Date
                    attr: 7
                  - text: ".\rWhenever the contents of the linked interactor field is changed, the notifier is called with "
                    attr: 3
                  - text: "(change, undefined, undefined)"
                    attr: 7
                  - text: ". Key presses that do not change the interactor state, such as pressing left/right arrow keys, cause no notifier call. The up/down arrow keys change the date. Changing the selection in the field has no effect.\rIllegal date values cannot be entered.\r\rproperties:\tlink, label, guard, notifier, font\rlinkable to:\tDates.Date\rop:\tpressed, released, changed\rfrom:\tundefined, modifier\rto:\tundefined\r\r"
                    attr: 3
                  - text: Time Field
                    attr: 6
                  - text: "\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 131
                      bodyPos: 759426
                      bodyLen: 6149
                    attr: 3
                    w: 1114560
                    h: 304920
                  - text: "\r\rFigure 4-26. Time field\r\rA time field displays the time specified in a global variable of type "
                    attr: 3
                  - text: Dates.Time
                    attr: 7
                  - text: ".\rWhenever the contents of the linked interactor field is changed, the notifier is called with "
                    attr: 3
                  - text: "(change, undefined, undefined)"
                    attr: 7
                  - text: ". Key presses that do not change the interactor state, such as pressing left/right arrow keys, cause no notifier call. The up/down arrow keys change the time. Changing the selection in the field has no effect.\rIllegal time values cannot be entered.\r\rproperties:\tlink, label, guard, notifier, font\rlinkable to:\tDates.Time\rop:\tpressed, released, changed\rfrom:\tundefined, modifier\rto:\tundefined\r\r"
                    attr: 3
                  - text: Color Field
                    attr: 6
                  - text: "\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 132
                      bodyPos: 765645
                      bodyLen: 4621
                    attr: 3
                    w: 628560
                    h: 324000
                  - text: "\r\rFigure 4-27. Color field\r\rA color field displays a color. It can be linked to variables of type "
                    attr: 3
                  - text: INTEGER
                    attr: 7
                  - text: " or "
                    attr: 3
                  - text: Dialog.Color
                    attr: 7
                  - text: ". "
                    attr: 3
                  - text: Ports.Color
                    attr: 7
                  - text: " is an alias of "
                    attr: 3
                  - text: INTEGER
                    attr: 7
                  - text: " and thus can be used also.\rWhenever another color is selected, the notifier is called with "
                    attr: 3
                  - text: "(change, oldval, newval)"
                    attr: 7
                  - text: ". The old and new values are integer values; for "
                    attr: 3
                  - text: Dialog.Color
                    attr: 7
                  - text: " type variables the "
                    attr: 3
                  - text: val
                    attr: 7
                  - text: " field's value is taken.\r\rproperties:\tlink, label, guard, notifier, font\rlinkable to:\tDialog.Color, Ports.Color = INTEGER\rop:\tpressed, released, changed\rfrom:\tundefined, old value, modifier\rto:\tundefined, new value\r\r"
                    attr: 3
                  - text: Up/Down Field
                    attr: 6
                  - text: "\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 133
                      bodyPos: 770386
                      bodyLen: 5125
                    attr: 3
                    w: 828720
                    h: 304920
                  - text: "\r\rFigure 4-28. Up/down field\r\rThis is a field linked to an integer variable. The value can also be changed through arrow keys.\rWhenever the contents of the linked interactor field is changed, the notifier is called with "
                    attr: 3
                  - text: "(change, oldvalue, newvalue)"
                    attr: 7
                  - text: ".\r\rproperties:\tlink, label, guard, notifier, font\rlinkable to:\tBYTE, SHORTINT, INTEGER, LONGINT\rop:\tpressed, released\rfrom:\tundefined, old value, modifier\rto:\tundefined, new value\r\r"
                    attr: 3
                  - text: Caption
                    attr: 6
                  - text: "\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 134
                      bodyPos: 775571
                      bodyLen: 3933
                    attr: 3
                    w: 533520
                    h: 285645
                  - text: "\r\rFigure 4-29. Caption\r\rA caption is typically used in conjunction with a text field, to indicate the nature of its contents. A caption is passive, i.e., it cannot be edited and thus cannot have a notifier.\rA caption is linkable to the same types as a text field is, and it may have a guard. This is useful since  depending on the platform  a caption may have a distinct visual appearance if it (or rather its corresponding text field) is disabled, read-only, etc. This means that a caption may be disabled along with its corresponding text field, by linking both to the same interactor field. A caption's guard may modify the control's label, as is true for all controls with a visible label.\r\rproperties:\tlink, label, guard, font, right, left\rlinkable to:\tARRAY const OF CHAR,\r\tBYTE, SHORTINT, INTEGER, LONGINT, SHORTREAL, REAL,\r\tDialog.Currency, Dialog.Combo\r\rThe "
                    attr: 3
                  - text: left
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: right
                    attr: 7
                  - text: " properties define the adjustment mode of the caption. The following combinations are possible:\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 1440000 }
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\r    left & ~right\tleft adjust\r    left &   right\tfully adjusted (may have no effect on some platforms)\r  ~left & ~right\tcentered\r  ~left &   right\tright adjust\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 1080000 }
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\rThe default is "
                    attr: 3
                  - text: "left & ~right"
                    attr: 7
                  - text: " (left adjust).\r\r"
                    attr: 3
                  - text: Group
                    attr: 6
                  - text: "\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 139
                      bodyPos: 779850
                      bodyLen: 8693
                    attr: 3
                    w: 1066680
                    h: 542880
                  - text: "\r\rFigure 4-30. Group\r\rA group is used to visually group related controls, e.g., radio buttons that belong together. A group is passive, i.e., it cannot be edited and thus cannot have a notifier.\rA group may not be linked, but it may have a guard which allows to disable or enable it. A group's guard may modify the control's label, as is true for all controls with a visible label.\r\rproperties:\tlabel, guard, font\r\r"
                    attr: 3
                  - text: List Box
                    attr: 6
                  - text: "\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 140
                      bodyPos: 788593
                      bodyLen: 13229
                    attr: 3
                    w: 1143000
                    h: 866880
                  - text: "\r\rFigure 4-31. List box (expanded and collapsed shapes)\r\rA list box allows to select one value out of a list of choices. It is linked to a variable of type "
                    attr: 3
                  - text: Dialog.List
                    attr: 7
                  - text: " (see next section). If the height of the list box is large enough, a scrollable list is displayed. If it is not large enough, the box collapses into a pop-up menu.\rInteractively, the selection can be changed. It is either empty or it consists of one selected item. When the user modifies the selection, the notifier is called with "
                    attr: 3
                  - text: "(changed, oldvalue, newvalue)"
                    attr: 7
                  - text: ". The old/new value corresponds to the selected item's index. The top-most item corresponds to value 0, the next one below to value 1, etc. The empty selection corresponds to value -1.\rThe "
                    attr: 3
                  - text: sorted
                    attr: 7
                  - text: " property determines whether the string items will be sorted lexically (no effect on Mac OS).\r\r\rproperties:\tlink, label, guard, notifier, font, sorted\rlinkable to:\tDialog.List\rop:\tpressed, released, changed\rfrom:\tundefined, old value, modifier\rto:\tundefined, new value\r\r"
                    attr: 3
                  - text: Selection Box
                    attr: 6
                  - text: "\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 141
                      bodyPos: 801902
                      bodyLen: 13189
                    attr: 3
                    w: 1209600
                    h: 809640
                  - text: "\r\rFigure 4-32. Selection box\r\rA selection box allows to select a subset out of a set of choices. It is linked to a variable of type "
                    attr: 3
                  - text: Dialog.Selection
                    attr: 7
                  - text: " (see next section).\rInteractively, the selection can be changed. Each item may be selected individually. When the user modifies the selection, the notifier is called in one of three ways:\r"
                    attr: 3
                  - text: "(included, from, to)"
                    attr: 7
                  - text: ": range "
                    attr: 3
                  - text: from..to
                    attr: 7
                  - text: " is now selected; it wasn't selected before\r"
                    attr: 3
                  - text: "(excluded, from, to)"
                    attr: 7
                  - text: ": range "
                    attr: 3
                  - text: from..to
                    attr: 7
                  - text: " is not selected now; it was selected before\r"
                    attr: 3
                  - text: "(set, from, to)"
                    attr: 7
                  - text: ": range "
                    attr: 3
                  - text: from..to
                    attr: 7
                  - text: " is now selected; any previous selection was cleared before\rThe three codes "
                    attr: 3
                  - text: included
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: excluded
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: set
                    attr: 7
                  - text: " take the place of "
                    attr: 3
                  - text: changed
                    attr: 7
                  - text: " used for most other controls. The notifier is called as often as necessary to include and/or exclude all necessary ranges of items.\rThe from/to value corresponds to the selected item's index. The topmost item corresponds to value 0, the next one below to value 1, and so on.\rThe "
                    attr: 3
                  - text: sorted
                    attr: 7
                  - text: " property determines whether the string items will be sorted lexically (no effect on Mac OS).\r\rproperties:\tlink, label, guard, notifier, font, sorted\rlinkable to:\tDialog.Selection\rop:\tpressed, released, included, excluded, set\rfrom:\tundefined, lowest element of range, modifier\rto:\tundefined, highest element of range\r\r"
                    attr: 3
                  - text: Combo Box
                    attr: 6
                  - text: "\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 142
                      bodyPos: 815261
                      bodyLen: 11773
                    attr: 3
                    w: 990720
                    h: 866880
                  - text: "\r\rFigure 4-33. Combo box\r\rA combo box is a text field whose contents can also be set via a pop-up menu. Unlike pure pop-up menus/selection boxes, a value may be entered which does not occur in the pop-up menu. The control is linked to a variable of type "
                    attr: 3
                  - text: Dialog.Combo
                    attr: 7
                  - text: " (see next section).\rWhen the contents of the combo is changed, the notifier is called with "
                    attr: 3
                  - text: "(changed, undefined, undefined)"
                    attr: 7
                  - text: ".\rThe "
                    attr: 3
                  - text: sorted
                    attr: 7
                  - text: " property determines whether the string items will be sorted lexically (no effect on Mac OS).\r\rproperties:\tlink, label, guard, notifier, font, sorted\rlinkable to:\tDialog.Combo\rop:\tpressed, released, changed\rfrom:\tundefined, modifier\rto:\tundefined\r\rEach interactive control (i.e., not a caption or a group) calls its notifier  if there is one  when the user first clicks in the control with parameter "
                    attr: 3
                  - text: op = Dialog.pressed
                    attr: 7
                  - text: ", and later with "
                    attr: 3
                  - text: op = Dialog.released
                    attr: 7
                  - text: " when the mouse button is released again. This feature is used mostly to display some string in the dialog box window's status area. This is done with the calls "
                    attr: 3
                  - text: Dialog.ShowStatus
                    attr: 7
                  - text: " or "
                    attr: 3
                  - text: Dialog.ShowParamStatus
                    attr: 7
                  - text: ". For example, the following notifier indicates a command button's function to the user:\r\r  PROCEDURE ButtonNotifier* (op, from, to: LONGINT);\r  BEGIN\r    IF op = Dialog.pressed THEN\r      Dialog.ShowStatus(\"This button causes the disk to spin down\")\r    ELSIF op = Dialog.released THEN\r      Dialog.ShowStatus(\"\")\t"
                    attr: 3
                  - text: "(* clear the status message again *)"
                    attr: 7
                  - text: "\r    END\r  END ButtonNotifier;\r\rListing 4-34. Notifier displaying status messages\r\rOn some platforms, e.g., on Mac OS, there is no status area and the above code has no effect.\rSometimes it is useful to detect double-clicks, e.g., a double-click in a list box may select the item and invoke the default button. A double-click can be detected in a notifier with the test\r\r  IF (op = Dialog.pressed) & (from = 1) THEN ...\t"
                    attr: 3
                  - text: "(* double-click *)"
                    attr: 7
                  - text: "\r\rFor the above-mentioned case, where the reaction on a double-click should merely be the invocation of the default button, a suitable standard notifier is available:\r\r  StdCmds.DefaultOnDoubleClick\r\rWe have seen earlier that the BlackBox Component Builder provides a string mapping facility which maps keys to actual strings, by using resource files. This feature is also supported by "
                    attr: 3
                  - text: Dialog.ShowStatus
                    attr: 7
                  - text: ". In fact, string mapping even allows to use place holders. For example, calling\r\r  Dialog.ShowParamStatus(\"This ^0 causes the ^1 to ^2\", control, object, verb)\r\rallows to supply different strings for the place holders ^0, ^1 and ^2. The strings actually used are the three additional parameters "
                    attr: 3
                  - text: "control, object"
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: verb
                    attr: 7
                  - text: ". Note that these strings are mapped themselves before being spliced into the first string. String mapping is a feature that you can use explicitly by calling the procedure "
                    attr: 3
                  - text: Dialog.MapParamString
                    attr: 7
                  - text: ".\r\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: 4.7 Complex controls and interactors
                    attr: 6
                  - text: "\r\rA list box has two kinds of contents: the string items which make up the list, and the current selection. Typically, the item list is more persistent than the selection, but it too may be changed while the control is being used. For list and selection boxes, the application is not so much interested in the item list, since this list is only a hint for the user. The application is interested in the selection that the user creates. For a list box, the selection is defined by the index of the selected item. For a selection box, the selection is defined by the set of indices of selected items. For combo boxes, the relevant state is not a selection, but the string that was entered.\rFor all three box controls, the item list must be built up somehow. For this purpose, module "
                    attr: 3
                  - text: Dialog
                    attr: 7
                  - text: " defines suitable interactor types: "
                    attr: 3
                  - text: Dialog.List
                    attr: 7
                  - text: " for list boxes, "
                    attr: 3
                  - text: Dialog.Selection
                    attr: 7
                  - text: " for selection boxes, and "
                    attr: 3
                  - text: Dialog.Combo
                    attr: 7
                  - text: " for combo boxes. These types are defined the following way:\r\r\tList = RECORD\r\t\tindex: INTEGER;\t"
                    attr: 3
                  - text: "(* index of currently selected item *)"
                    attr: 7
                  - text: "\r\t\tlen-: INTEGER;\t"
                    attr: 3
                  - text: "(* number of list elements *)"
                    attr: 7
                  - text: "\r\t\tPROCEDURE (VAR l: List) SetLen (len: INTEGER), NEW;\r\t\tPROCEDURE (VAR l: List) SetItem (index: INTEGER; IN item: ARRAY OF CHAR), NEW;\r\t\tPROCEDURE (VAR l: List) GetItem (index: INTEGER; OUT item: String), NEW;\r\t\tPROCEDURE (VAR l: List) SetResources (IN key: ARRAY OF CHAR), NEW\r\tEND;\r\r\tSelection = RECORD\r\t\tlen-: INTEGER;\t"
                    attr: 3
                  - text: "(* number of selection elements *)"
                    attr: 7
                  - text: "\r\t\tPROCEDURE (VAR s: Selection) SetLen (len: INTEGER), NEW;\r\t\tPROCEDURE (VAR s: Selection) SetItem (index: INTEGER; IN item: ARRAY OF CHAR), NEW;\r\t\tPROCEDURE (VAR s: Selection) GetItem (index: INTEGER; OUT item: String), NEW;\r\t\tPROCEDURE (VAR s: Selection) SetResources (IN key: ARRAY OF CHAR), NEW;\r\t\tPROCEDURE (VAR s: Selection) Incl (from, to: INTEGER), NEW;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t"
                    attr: 3
                  - text: "(* select range [from..to] *)"
                    attr: 7
                  - text: "\r\t\tPROCEDURE (VAR s: Selection) Excl (from, to: INTEGER), NEW;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t"
                    attr: 3
                  - text: "(* deselect range [from..to] *)"
                    attr: 7
                  - text: "\r\t\tPROCEDURE (VAR s: Selection) In (index: INTEGER): BOOLEAN, NEW\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t"
                    attr: 3
                  - text: "(* test whether index-th item is selected *)"
                    attr: 7
                  - text: "\r\tEND;\r\r\tCombo = RECORD\r\t\titem: String;\t"
                    attr: 3
                  - text: "(* currently entered or selected string *)"
                    attr: 7
                  - text: "\r\t\tlen-: INTEGER;\t"
                    attr: 3
                  - text: "(* number of combo elements *)"
                    attr: 7
                  - text: "\r\t\tPROCEDURE (VAR c: Combo) SetLen (len: INTEGER), NEW;\r\t\tPROCEDURE (VAR c: Combo) SetItem (index: INTEGER; IN item: ARRAY OF CHAR), NEW;\r\t\tPROCEDURE (VAR c: Combo) GetItem (index: INTEGER; OUT item: String), NEW;\r\t\tPROCEDURE (VAR c: Combo) SetResources (IN key: ARRAY OF CHAR), NEW\r\tEND;\r\rListing 4-35. Definitions of List, Selection and Combo\r\rBefore a variable of one of these types can be used, it must be initialized by first defining the individual items. During use, items can be changed. For example, the following code fragment builds up a list:\r\r\tlist.SetLen(5);\t"
                    attr: 3
                  - text: "(* define length of list *)"
                    attr: 7
                  - text: "\r\tlist.SetItem(0, \"Daffy Duck\");\r\tlist.SetItem(1, \"Wile E. Coyote\");\r\tlist.SetItem(2, \"Scrooge Mc Duck\");\r\tlist.SetItem(3, \"Huey Lewis\");\r\tlist.SetItem(4, \"Thomas Dewey\");\r\tDialog.UpdateList(list);\t"
                    attr: 3
                  - text: "(* must be called after any change(s) to the item list *)"
                    attr: 7
                  - text: "\r\rListing 4-36. Setting up a list explicitly\r\rWhen used with list-structured controls (list, selection, or combo boxes), "
                    attr: 3
                  - text: Dialog.Update
                    attr: 7
                  - text: " only updates the selection or text entry state of these controls, but not the list structure. If the list structure, i.e., the elements of the control's list, is changed, then the procedure "
                    attr: 3
                  - text: Dialog.UpdateList
                    attr: 7
                  - text: " must be called instead of "
                    attr: 3
                  - text: Dialog.Update
                    attr: 7
                  - text: ".\r\rFor fixed item lists, the individual strings should be stored in resources. This is simplified by the "
                    attr: 3
                  - text: SetResources
                    attr: 7
                  - text: " procedures. They look up the strings in a resource file. For example, the above statements can be replaced completely by the statement\r\r\tlist.SetResources(\"#Obx:list\")\r\rwhich will read the Obx/Rsrc/Strings file and look for strings with keys of the kind \"list[index]\", e.g., for\r\r\tlist[0]\tDaffy Duck\r\tlist[1]\tWile E. Coyote\r\tlist[2]\tScrooge Mc Duck\r\tlist[3]\tHuey Lewis\r\tlist[4]\tThomas Dewey\r\rTable 4-37. Resources for a list\r\rThe indices must start from 0 and be consecutive (no holes allowed).\rProcedure "
                    attr: 3
                  - text: SetLen
                    attr: 7
                  - text: " is optional. Its use is recommended wherever the number of list items is known in advance. If this is not the case, it may be omitted. The list will become as large as the largest index requires.\r"
                    attr: 3
                  - text: SetLen
                    attr: 7
                  - text: " is necessary if an existing item list should be shortened, or if it should be cleared completely.\r\r\r"
                    attr: 3
                  - text: 4.8 Input validation
                    attr: 6
                  - text: "\r\rValidity checks are an important, and for the uninitiated sometimes a surprising, aspect of non-modal user interfaces. Among other things, non-modality also means that the user must not be forced into a mode depending on where the caret currently is and whether or not the entered data is currently valid. In particular, a user must not be forced to correctly enter some data into a field before permitting him or her to do something else.\rThis basically leaves two strategies for checking the validity of entered data: early or late. Early checks are performed whenever the user has manipulated a control. Late checks are performed when the user has completed input and wants to perform some action, e.g., entering the new data into a database.\rLate checks are most suitable for checking global invariants, e.g., whether all necessary fields in the input mask contain some input. Early checks are most suitable for local, control-specific invariants, e.g., the correct syntax of an entered string.\r\rWe give examples of both early and late checks for our module "
                    attr: 3
                  - text: ObxPhoneUI
                    attr: 7
                  - text: ". Let us assume that a phone number always has the following form: 310-555-1212. For a late check, we extend the "
                    attr: 3
                  - text: Lookup
                    attr: 7
                  - text: " procedure (boldface text) and add a few auxiliary procedures. Note the use of the \"$\" operator, which makes sure the "
                    attr: 3
                  - text: LEN
                    attr: 7
                  - text: " function returns the length of the string, not of the array containing the string.\r\r\tPROCEDURE Valid (IN s: ARRAY OF CHAR): BOOLEAN;\r\r\t\tPROCEDURE Digits (IN s: ARRAY OF CHAR; from, to: INTEGER): BOOLEAN;\r\t\tBEGIN\t"
                    attr: 3
                  - text: "(* check whether range [from..to] in s consists of digits only *)"
                    attr: 7
                  - text: "\r\t\t\tWHILE (from <= to) & (s[from] >= \"0\") & (s[from] <= \"9\") DO INC(from) END;\r\t\t\tRETURN from > to\t"
                    attr: 3
                  - text: "(* no non-digit found in checked range *)"
                    attr: 7
                  - text: "\r\t\tEND Digits;\r\r\tBEGIN\t"
                    attr: 3
                  - text: "(* check syntax of phone number *)"
                    attr: 7
                  - text: "\r\t\tRETURN (LEN(s$) = 12) & Digits(s, 0, 2) & (s[3] = \"-\") & Digits(s, 4, 6) &\r\t\t\t\t\t\t\t(s[7] = \"-\") & Digits(s, 8, 11)\r\tEND Valid;\r\r\tPROCEDURE ShowErrorMessage;\r\tBEGIN\r\t\tphone.name := \"illegal syntax of number\"\r\tEND ShowErrorMessage;\r\r\tPROCEDURE Lookup*;\r\tBEGIN\r\t\tIF phone.lookupByName THEN\r\t\t\tObxPhoneDB.LookupByName(phone.name, phone.number);\r\t\t\tIF phone.number = \"\" THEN phone.number := \"not found\" END\r\t\tELSE\r\t\t\t"
                    attr: 3
                  - text: "IF Valid(phone.number) THEN\r"
                    attr: 6
                  - text: "\t\t\t\tObxPhoneDB.LookupByNumber(phone.number, phone.name);\r\t\t\t\tIF phone.name = \"\" THEN phone.name := \"not found\" END\r"
                    attr: 3
                  - text: "\t\t\tELSE"
                    attr: 6
                  - text: "\r"
                    attr: 3
                  - text: "\t\t\t\tShowErrorMessage\r"
                    attr: 6
                  - text: "\t\t\t"
                    attr: 3
                  - text: END
                    attr: 6
                  - text: "\r\t\tEND;\r\t\tDialog.Update(phone)\r\tEND Lookup;\r\rListing 4-38. Late check for input validation\r\rA more rude reminder would be to display an error message. If the BlackBox Component Builder's log window is open, the message is written to the log and the window is brought to the top if necessary. If no log is used, a dialog box is displayed. This behavior can be achieved by replacing the statement in procedure "
                    attr: 3
                  - text: ShowErrorMessage
                    attr: 7
                  - text: " by the following statement:\r\r\tDialog.ShowMsg(\"Please correct the phone number\")\r\rNow we look at an early checked alternative to the above solution to input checking. It uses a notifier to check after each character typed into the phone number field whether the number is legal so far. In contrast to the late check, it must be able to deal with partially entered phone numbers. Whenever an illegal suffix is detected, the string is simply clipped to the legal prefix.\r\r\tPROCEDURE Correct (VAR s: ObxPhoneDB.String);\r\r\t\tPROCEDURE CheckMinus (VAR s: ObxPhoneDB.String; at: INTEGER);\r\t\tBEGIN\r\t\t\tIF s[at] # \"-\" THEN s[at] := 0X END\t"
                    attr: 3
                  - text: "(* clip string *)"
                    attr: 7
                  - text: "\r\t\tEND CheckMinus;\r\r\t\tPROCEDURE CheckDigits (VAR s: ARRAY OF CHAR; from, to: INTEGER);\r\t\tBEGIN\r\t\t\tWHILE from <= to DO\r\t\t\t\tIF (s[from] < \"0\") OR (s[from] > \"9\") THEN\r\t\t\t\t\ts[from] := 0X; from := to\t"
                    attr: 3
                  - text: "(* clip string and terminate loop *)"
                    attr: 7
                  - text: "\r\t\t\t\tEND;\r\t\t\t\tINC(from)\r\t\t\tEND\r\t\tEND CheckDigits;\r\r\tBEGIN\t"
                    attr: 3
                  - text: "(* clip string to a legal prefix if necessary *)"
                    attr: 7
                  - text: "\r\t\tCheckDigits(s, 0, 2);\r\t\tCheckMinus(s, 3);\r\t\tCheckDigits(s, 4, 6);\r\t\tCheckMinus(s, 7);\r\t\tCheckDigits(s, 8, 11)\r\tEND Correct;\r\r\tPROCEDURE NumberNotifier (op, from, to: INTEGER);\r\tBEGIN\r\t\tCorrect(phone.number)\r\t\t"
                    attr: 3
                  - text: "(* "
                    attr: 7
                  - text: Dialog.Update
                    attr: 3
                  - text: " is not called, because it will be called afterwards by the notifying control *)"
                    attr: 7
                  - text: "\r\tEND NumberNotifier;\r\rListing 4-39. Early check for input validation\r\rNote that a focused view, e.g. a control, has no means to prevent the user from focusing another view. A view may merely change the way that it displays itself, its contents, or its marks (selection, caret). For this purpose, a view receives a "
                    attr: 3
                  - text: Controllers.MarkMsg
                    attr: 7
                  - text: " when the focus changes.\r\r\r"
                    attr: 3
                  - text: 4.9 Accessing controls explicitly
                    attr: 6
                  - text: "\r\rIn most circumstances, guards and notifiers allow sufficient control over a control's specific look & feel. However, sometimes you may want to exercise direct control over a control in a form. How to do this is described in this section. For example, assume that you want to write your own special alignment command, and add it to the commands of the "
                    attr: 3
                  - text: Layout
                    attr: 7
                  - text: " menu. To do this, you need to get access to the form view in the window that is currently being edited. The form view is a container that contains the controls that you want to manipulate. The function "
                    attr: 3
                  - text: FormControllers.Focus
                    attr: 7
                  - text: " delivers a handle on the currently focused form editor. This leads to the typical code pattern for accessing a form (Listing 4-40):\r\r\t\tVAR c: FormControllers.Controller;\r\tBEGIN\r\t\tc := FormControllers.Focus();\r\t\tIF c # NIL THEN\r\t\t\t...\r\rListing 4-40. Accessing a form's controller\r\rA form contains controls and possibly some other types of views. The views can be edited if the enclosing form view is in layout mode. Typically, some views are selected first, and then a command is executed that operates on the selected views. The following example shifts every selected view to the right by one centimeter (Listing 4-41):\r\rMODULE ObxControlShifter;\r\r\tIMPORT Ports, Views, FormModels, FormControllers;\r\r\tPROCEDURE "
                    attr: 3
                  - text: Shift
                    attr: 6
                  - text: "*;\r\t\tVAR c: FormControllers.Controller; sel: FormControllers.List;\r\tBEGIN\r\t\tc := FormControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tsel := c.GetSelection();\t"
                    attr: 3
                  - text: "(* generates a list with references to the selected views *)"
                    attr: 7
                  - text: "\r\t\t\tWHILE sel # NIL DO\r\t\t\t\tc.form.Move(sel.view, 10 * Ports.mm, 0);\t"
                    attr: 3
                  - text: "(* move to the right *)"
                    attr: 7
                  - text: "\r\t\t\t\tsel := sel.next\r\t\t\tEND\r\t\tEND\r\tEND Shift;\r\rEND ObxControlShifter.\r\rListing 4-41. Shift all selected views to the right\r\rThis code works on selected views (whether they are controls or not). Sometimes you may want to manipulate views that are not selected. In this case, you need a form reader ("
                    attr: 3
                  - text: FormModels.Reader
                    attr: 7
                  - text: ") to iterate over the views in the currently focused form. The following code pattern shows how a command can iterate over the views of a form (Listing 4-42):\r\r\t\tVAR c: FormControllers.Controller; rd: FormModels.Reader;\r\tBEGIN\r\t\tc := FormControllers.Focus();\r\t\tIF c # NIL THEN\r\t\t\trd := c.form.NewReader(NIL);\r\t\t\trd.ReadView(v);\t"
                    attr: 3
                  - text: "(* read first view *)"
                    attr: 7
                  - text: "\r\t\t\tWHILE v # NIL DO\r\t\t\t\t...\r\t\t\t\trd.ReadView(v)\t"
                    attr: 3
                  - text: "(* read next view *)"
                    attr: 7
                  - text: "\r\t\t\tEND;\r\t\t\t...\r\rListing 4-42. Iterating over the selected views in a form\r\rControls are special views (of type "
                    attr: 3
                  - text: Controls.Control
                    attr: 7
                  - text: "). Controls can be linked to global variables. The following example shows how the labels of all controls in a form can be listed (Listing 4-43):\r\rMODULE ObxLabelLister;\r\r\tIMPORT Views, Controls, FormModels, FormControllers, StdLog;\r\r\tPROCEDURE "
                    attr: 3
                  - text: List
                    attr: 6
                  - text: "*;\r\t\tVAR c: FormControllers.Controller; rd: FormModels.Reader; v: Views.View;\r\tBEGIN\r\t\tc := FormControllers.Focus();\r\t\tIF c # NIL THEN\r\t\t\trd := c.form.NewReader(NIL);\r\t\t\trd.ReadView(v);\t"
                    attr: 3
                  - text: "(* read first view *)"
                    attr: 7
                  - text: "\r\t\t\tWHILE v # NIL DO\r\t\t\t\tIF v IS Controls.Control THEN\r\t\t\t\t\tStdLog.String(v(Controls.Control).label); StdLog.Ln\r\t\t\t\tEND;\r\t\t\t\trd.ReadView(v)\t"
                    attr: 3
                  - text: "(* read next view *)"
                    attr: 7
                  - text: "\r\t\t\tEND\r\t\tEND\r\tEND List;\r\rEND ObxLabelLister.\r\rListing 4-43. Listing the labels of all controls in a form\r\rWith the same kind of iteration, any other type of view could be found in forms as well, not only controls. For example, consider that you have a form with a \"Clear\" command button that causes a plotter view in the same form to be cleared. The command button is a standard control, the plotter view is your special view type. The command associated with the command button first needs to search for its plotter view, in the same form where the button is placed. The code pattern shown below demonstrates how such a command can be implemented (Listing 4-44):\r\r\t\tVAR c: FormControllers.Controller; rd: FormModels.Reader; v: Views.View;\r\tBEGIN\r\t\tc := FormControllers.Focus();\r\t\tIF c # NIL THEN\r\t\t\trd := c.form.NewReader(NIL);\r\t\t\trd.ReadView(v);\t"
                    attr: 3
                  - text: "(* read first view *)"
                    attr: 7
                  - text: "\r\t\t\tWHILE v # NIL DO\r\t\t\t\tIF v IS MyPlotterView THEN\r\t\t\t\t\t"
                    attr: 3
                  - text: "(* clear v(MyPlotterView) *)"
                    attr: 7
                  - text: "\r\t\t\t\tEND;\r\t\t\t\trd.ReadView(v)\t"
                    attr: 3
                  - text: "(* read next view *)"
                    attr: 7
                  - text: "\r\t\t\tEND\r\t\tEND\r\rListing 4-44. Finding a particular view in a form\r\rThere is one potential problem with the above code pattern. Let us assume that we have a dialog box containing a command button with "
                    attr: 3
                  - text: ObxLabelLister.List
                    attr: 7
                  - text: " as associated command. Beneath the dialog box, we have a window with a focused form layout. Now, if you click on the dialog box' command button, which labels are listed? The ones in the form of the dialog box itself, or the ones in the focused form layout underneath? In other words: does "
                    attr: 3
                  - text: FormControllers.Focus
                    attr: 7
                  - text: " yield the form that contains the button you clicked on, or the form focused for editing? Depending on what the button's command does, both versions could make sense. For a form editing command like "
                    attr: 3
                  - text: ObxControlShifter.Shift
                    attr: 7
                  - text: ", the focused layout editor should be returned. This is the top-most document window, but it is overlaid by the dialog box window. In contrast, if you want to find your plotter view, the form of the dialog box should be returned instead. In this case, you want to search the direct \"neighborhood\" of the button.\r\rOne solution for the plotter view search would be to start searching in the context of the button that is currently being pressed. This can be done using the following code pattern (Listing 4-45):\r\r\t\tVAR button: Controls.Control; m: Models.Model; rd: FormModels.Reader; v: Views.View;\r\tBEGIN\r\t\tbutton := Controls.par;\t"
                    attr: 3
                  - text: "(* during the button click, this variable contains a reference to the button *)"
                    attr: 7
                  - text: "\r\t\tm := button.context.ThisModel();\t"
                    attr: 3
                  - text: "(* get the model of the container view that contains the button *)"
                    attr: 7
                  - text: "\r\t\tIF m IS FormModels.Model THEN\t"
                    attr: 3
                  - text: "(* the container is a form *)"
                    attr: 7
                  - text: "\r\t\t\trd := m(FormModels.Model).NewReader(NIL);\r\t\t\trd.ReadView(v);\t"
                    attr: 3
                  - text: "(* read first view *)"
                    attr: 7
                  - text: "\r\t\t\tWHILE v # NIL DO\r\t\t\t\tIF v IS MyPlotterView THEN\r\t\t\t\t\t"
                    attr: 3
                  - text: "(* clear v(MyPlotterView) *)"
                    attr: 7
                  - text: "\r\t\t\t\tEND;\r\t\t\t\trd.ReadView(v)\t"
                    attr: 3
                  - text: "(* read next view *)"
                    attr: 7
                  - text: "\r\t\t\tEND\r\t\tEND\r\rListing 4-45. Finding a particular view in the same form as a button\r\rThis code assumes that the command is executed from a command button. It doesn't work if placed in a menu. In order to better decouple the user interface and the application logic, this assumption should be eliminated. BlackBox solves the problem by giving the programmer explicit control over the behavior of "
                    attr: 3
                  - text: FormControllers.Focus
                    attr: 7
                  - text: ". The trick is that BlackBox supports two kind of windows for dialog boxes: "
                    attr: 3
                  - text: tool windows
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: "auxiliary windows, "
                    attr: 7
                  - text: "in addition to the normal document windows. If the command button is in a tool window dialog box, then "
                    attr: 3
                  - text: FormControllers.Focus
                    attr: 7
                  - text: " yields the form in the top-most "
                    attr: 3
                  - text: document
                    attr: 7
                  - text: " window, or "
                    attr: 3
                  - text: NIL
                    attr: 7
                  - text: " if there is no such document window or if the focus of the top-most document window is not a form view. If the command button is in an auxiliary window, then "
                    attr: 3
                  - text: FormControllers.Focus
                    attr: 7
                  - text: " yields the dialog box' form whose command button you have clicked. The following paragraphs further explain the differences between these two kinds of windows.\r\rDialog boxes in tool windows are not self-contained, they provide the parameters and the control panel for an operation on a document underneath. A typical example is the \"Find / Replace\" dialog box that operates on a text document underneath. The command buttons in a tool dialog box invoke a command, and this command fetches the view on which it operates. In the \"Find / Replace\" example, this is the focused text view. Under Windows, tool windows always lie above the topmost document window; i.e., they can never be overlapped by document windows or auxiliary windows, only by other tool windows. Unlike other windows, tool windows cannot be resized or iconized, but can me moved outside of the application window. On Mac OS, tool windows look and behave like document windows, except that they have no scroll bars and cannot be resized or zoomed.\r\rAn auxiliary window on the other hand is self-contained. It contains, and operates on, its own data. At least, it knows where to find the data on which to operate (e.g., in a database). The \"Phone Database\" dialog box is a typical auxiliary window, like most data-entry forms. Auxiliary windows can be manipulated like normal document windows; in particular, the may be overlapped by other document or auxiliary windows.\r\rBoth kinds of dialog boxes are stored as documents in their appropriate "
                    attr: 3
                  - text: RSRC
                    attr: 7
                  - text: " directories. But to open them, module "
                    attr: 3
                  - text: StdCmds
                    attr: 7
                  - text: " provides two separate commands: "
                    attr: 3
                  - text: OpenToolDialog
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: OpenAuxDialog
                    attr: 7
                  - text: ". Both of them take a portable path name of the resource document as first parameter, and the title of the dialog box window as a second parameter. For example, the following menu commands may be used:\r\r\t\"Find / Replace...\"\t\"\"\t\"StdCmds.OpenToolDialog('Text/Rsrc/Cmds', 'Find / Replace')\"\t\"\"\r\r\t\"Phone Database...\"\t\"\"\t\"StdCmds.OpenAuxDialog('Obx/Rsrc/PhoneUI', 'Phone Database')\"\t\"\"\r\rThe function "
                    attr: 3
                  - text: FormControllers.Focus
                    attr: 7
                  - text: " returns different results, depending on whether the form is in a tool or in an auxiliary window.\r\rFor more examples on how forms can be manipulated, see also module "
                    attr: 3
                  - text: FormCmds
                    attr: 7
                  - text: ". It is available in source form, like the rest of the "
                    attr: 3
                  - text: Form
                    attr: 7
                  - text: " subsystem.\r\r\r"
                    attr: 3
                  - text: 4.10 Summary
                    attr: 6
                  - text: "\r\rIn this chapter, we have discussed the important aspects of how a graphical user interface and its supporting code is implemented in the BlackBox Component Builder. There are three parts of an application: application logic, user interface logic, and user interface resources, i.e., documents. A clean separation of these parts makes a program easier to understand, maintain, and extend.\r\rFor more examples of how the form system and controls can be used, see the on-line examples "
                    attr: 3
                  - text: ObxAddress0
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: ObxAddress1
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: ObxAddress2
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: ObxOrders
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: ObxControls
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: "ObxDialog, "
                    attr: 7
                  - text: "and "
                    attr: 3
                  - text: ObxUnitConv
                    attr: 7
                  - text: ". For advanced programmers, the sources of the complete "
                    attr: 3
                  - text: Form
                    attr: 7
                  - text: " subsystem may be interesting.\r\rFor more information on how to use the BlackBox development environment, consult the documentation of the following modules:\r\r\tDevCompiler, DevDebug, DevBrowser, DevInspector, DevReferences,\r\tDevMarkers, DevCmds, StdCmds, StdMenuTool, StdLog, FormCmds, TextCmds\r\rTo obtain more information on a module, select a module name and then invoke "
                    attr: 3
                  - text: "Info->Documentation"
                    attr: 7
                  - text: ".\rIn order to provide a straight-forward description, we only used the most important commands in this book. However, there are other useful commands in the menus "
                    attr: 3
                  - text: Info
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: Dev
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: Controls
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: Tools
                    attr: 7
                  - text: ", and "
                    attr: 3
                  - text: Layout
                    attr: 7
                  - text: ". For example, there are several \"wizards\" for the creation of new source code skeletons. Consult the files "
                    attr: 3
                  - text: System/Docu/User-Man
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: Text/Docu/User-Man
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: Form/Docu/User-Man
                    attr: 7
                  - text: ", and "
                    attr: 3
                  - text: Dev/Docu/User-Man
                    attr: 7
                  - text: " for a comprehensive user manual on how to use the framework, the editor ("
                    attr: 3
                  - text: Text
                    attr: 7
                  - text: " subsystem), the visual designer ("
                    attr: 3
                  - text: Form
                    attr: 7
                  - text: " subsystem), and the development tools ("
                    attr: 3
                  - text: Dev
                    attr: 7
                  - text: " subsystem).\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000009
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: 5 Texts
                    attr: 1
                  - text: "\r\rGraphical user interfaces have introduced graphical elements into everyday computing. While this was a very positive step towards overcoming the old-style modal textual user interfaces, texts have by no means become obsolete. Even in reports containing many illustrations, texts serve as indispensible glue.\rIn typical database applications, no graphical contents is manipulated. The data entered and retrieved are mostly textual, and reports to be printed usually are texts arranged in a tabular fashion.\rBecause of the importance of texts, this chapter demonstrates how the BlackBox Component Builder's text abstraction can be used in various ways. In several examples, we will reuse the simple database module introduced in the previous chapter.\rWe will work \"bottom-up\" by providing examples first for writing new texts, then for reading existing text, and finally for modifying existing texts. When discussing these examples, we will meet text models/carriers and riders, mappers, and auxiliary abstractions such as fonts, attributes, rulers, and others.\r\r\r"
                    attr: 3
                  - text: 5.1 Writing text
                    attr: 6
                  - text: "\r\rIn the BlackBox Component Builder, texts use the Carrier-Rider-Mapper design pattern (see Chapter 3). They provide text models as carriers for texts, and text writers and text readers as riders on text models. Both types are defined in the Text subsystem's core module "
                    attr: 3
                  - text: TextModels
                    attr: 7
                  - text: ". A text writer maintains a current position and current attributes, which will be used when writing the next element into the text. The full definition of a writer looks as follows:\r\r\tWriter = POINTER TO ABSTRACT RECORD\r\t\tattr-: TextModels.Attributes;\r\t\t(wr: Writer) Base (): TextModels.Model, NEW, ABSTRACT;\r\t\t(wr: Writer) Pos (): INTEGER, NEW, ABSTRACT;\r\t\t(wr: Writer) SetPos (pos: INTEGER), NEW, ABSTRACT;\r\t\t(wr: Writer) SetAttr (attr: TextModels.Attributes), NEW;\r\t\t(wr: Writer) WriteChar (ch: CHAR), NEW, ABSTRACT;\r\t\t(wr: Writer) WriteView (view: Views.View; w, h: INTEGER), NEW, ABSTRACT\r\tEND;\r\rListing 5-1. Definition of TextModels.Writer\r\rThe most important procedure of a writer is "
                    attr: 3
                  - text: WriteChar
                    attr: 7
                  - text: ", it allows to write a new character at the current position. If the character position lies within an existing text (i.e., in 0 .. text.Length() - 1), the character at this text position is inserted. (This is a difference to the BlackBox files abstraction, where old data would be overwritten by the writer in this case. With texts, writers "
                    attr: 3
                  - text: always
                    attr: 7
                  - text: " insert and never overwrite.) If the writer's position is at the end of the text (i.e., at text.Length()), the character is appended to the text and thus makes the text one element longer. After "
                    attr: 3
                  - text: WriteChar
                    attr: 7
                  - text: ", the writer's text position is increased by one. The current position can be inquired by calling the writer's "
                    attr: 3
                  - text: Pos
                    attr: 7
                  - text: " function, and it can be modified by calling the "
                    attr: 3
                  - text: SetPos
                    attr: 7
                  - text: " procedure.\r\rSince text models are capable of containing views as well as normal characters, there exists a procedure "
                    attr: 3
                  - text: WriteView
                    attr: 7
                  - text: " which allows to write a view, given an appropriate size ("
                    attr: 3
                  - text: w
                    attr: 7
                  - text: " for the width, "
                    attr: 3
                  - text: h
                    attr: 7
                  - text: " for the height).\rLike most geometrical distances in BlackBox, a view's width and height are specified in so-called "
                    attr: 3
                  - text: universal units
                    attr: 7
                  - text: " of 1/36000 millimeters. This value was chosen to eliminate rounding errors for many common screen and printer resolutions. For example, an inch, a 1/300-th of an inch, a millimeter, and a desktop publishing point can be represented in units without rounding errors. Where not specified otherwise, distances can be assumed to be represented in universal units.\rIf no specific size for the view is desired, passing the value "
                    attr: 3
                  - text: Views.undefined
                    attr: 7
                  - text: " for the width and/or height allows the text to choose a suitable default size for the written view.\r\rHow is a writer created? Like all riders, a writer is created by a factory function of its carrier. For this purpose, a text model provides the procedure "
                    attr: 3
                  - text: NewWriter
                    attr: 7
                  - text: ", which creates a writer and connects it to the text. A writer can return its text through the "
                    attr: 3
                  - text: Base
                    attr: 7
                  - text: " function. A newly created writer is positioned at the end of the text.\r\rText elements don't have character codes only, they also have attributes. A writer's "
                    attr: 3
                  - text: attr
                    attr: 7
                  - text: " field contains the attributes to be used when the next character or view is written. The current attributes can be changed by calling the writer's "
                    attr: 3
                  - text: SetAttr
                    attr: 7
                  - text: " procedure.\r\rIn terms of attributes, the text subsystem of the BlackBox Component Builder supports "
                    attr: 3
                  - text: colors
                    attr: 11
                  - text: " and "
                    attr: 3
                  - text: vertical
                    attr: 12
                  - text: " "
                    attr: 3
                  - text: offsets
                    attr: 13
                  - text: . Colors are encoded as integers (
                    attr: 3
                  - text: Ports.Color
                    attr: 7
                  - text: "). Module "
                    attr: 3
                  - text: Ports
                    attr: 7
                  - text: " predefines the constants "
                    attr: 3
                  - text: black
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: grey6
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: grey12
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: grey25
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: grey50
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: grey75
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: white
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: red
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: green
                    attr: 7
                  - text: ", and "
                    attr: 3
                  - text: blue
                    attr: 7
                  - text: ". \"grey6\" means a mixture of 6% white and 94% black, which is almost black. The other grey values are increasingly lighter. Vertical offsets are measured in universal units.\r\rBesides colors and vertical offset, a text element also has a font attribute. A font is a collection of glyphs. A glyph is a visual rendering of a character code. Different fonts may contain different glyphs for the same characters. For example, Helvetica looks different from Times and Frutiger. A font may not provide glyphs for all character codes that can be represented in Component Pascal. This is not surprising, since the "
                    attr: 3
                  - text: CHAR
                    attr: 7
                  - text: " datatype of Component Pascal conforms to the Unicode standard. Unicode is a 16-bit standard, and thus can represent over 65000 different characters. The first 256 characters are the Latin-1 characters. The first 128 characters of Latin-1 are the venerable ASCII characers.\rIf a font doesn't contain a particular glyph, BlackBox's font framework either returns a glyph from some other font for the same character, or it yields a generic \"missing glyph\" symbol; e.g., a small empty rectangle.\rFont objects are defined in module "
                    attr: 3
                  - text: Fonts.Font
                    attr: 7
                  - text: ". It won't be necessary to take a closer look at this module here; it is sufficient to interpret a pointer of type "
                    attr: 3
                  - text: Fonts.Font
                    attr: 7
                  - text: " as the identification of a font with its particular typeface, style, weight, and size:\r\r"
                    attr: 3
                  - text: Typeface
                    attr: 6
                  - text: "\rThis is the font family to which a font belongs; it defines a common \"look and feel\" for the whole family. Examples of typefaces are Helvetica, Times, or Courier. Typeface names are represented as character arrays of type "
                    attr: 3
                  - text: Fonts.Typeface
                    attr: 7
                  - text: ".\r\r"
                    attr: 3
                  - text: Style
                    attr: 6
                  - text: "\rA font may optionally be "
                    attr: 3
                  - text: italicized
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: underlined
                    attr: 8
                  - text: ", "
                    attr: 3
                  - text: struck out
                    attr: 14
                  - text: " or "
                    attr: 3
                  - text: a combination thereof
                    attr: 15
                  - text: ". Styles are represented as sets. Currently, the set elements "
                    attr: 3
                  - text: Fonts.italic
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: Fonts.underline
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: Fonts.strikeout
                    attr: 7
                  - text: " are defined.\r\r"
                    attr: 3
                  - text: Weight
                    attr: 6
                  - text: "\rA font might exist in several weights, e.g., ranging from light to normal to "
                    attr: 3
                  - text: bold
                    attr: 6
                  - text: " to black to "
                    attr: 3
                  - text: ultra black
                    attr: 6
                  - text: ". Usually, a font is either normal or bold. Weights are represented as integers. The values "
                    attr: 3
                  - text: Fonts.normal
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: Fonts.bold
                    attr: 7
                  - text: " are predefined.\r\r"
                    attr: 3
                  - text: Size
                    attr: 6
                  - text: "\rA font may be rendered in different sizes, taking into account the resolution of the used output device. Often, sizes are given in points. A point is 1/72-th of an inch. In BlackBox, font sizes are measured in universal units, which are chosen such that points ("
                    attr: 3
                  - text: Ports.point
                    attr: 7
                  - text: ") and other typographical units can be represented without round-off errors. Typical font sizes are "
                    attr: 3
                  - text: "10 * Ports.point"
                    attr: 7
                  - text: " or "
                    attr: 3
                  - text: "12 * Ports.point"
                    attr: 16
                  - text: ".\r\rIn principle, typeface, style, weight and size are independent of each other. This means that a given typeface can be combined with arbitrary styles, weights and sizes. However, from a typographical point of view, some combinations are more desirable than others, and may be optimized by the font designer and the underlying operating system's font machinery.\r\rThe text attributes font, color and vertical offset are packaged into objects of type "
                    attr: 3
                  - text: TextModels.Attributes
                    attr: 7
                  - text: ". Slightly simplified, this type looks as follows:\r\r\tAttributes = POINTER TO RECORD (Stores.Store)\r\t\tcolor-: Ports.Color;\r\t\tfont-: Fonts.Font;\r\t\toffset-: INTEGER\r\tEND;\r\rListing 5-2. Simplified definition of TextModels.Attributes\r\rThis is the type of the writer's "
                    attr: 3
                  - text: attr
                    attr: 7
                  - text: " field. It is an extension of "
                    attr: 3
                  - text: Stores.Store
                    attr: 7
                  - text: ". This means that such an object can be stored persistently in a file. Other examples of stores are "
                    attr: 3
                  - text: TextModels.Model
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: TextViews.View
                    attr: 7
                  - text: ", but not "
                    attr: 3
                  - text: TextModels.Writer
                    attr: 7
                  - text: ". A more detailed description of stores is given in Part III.\r\rWe have now seen the capabilities of a text writer, including the text attributes that it supports. The typical use of text writers is shown in the code pattern below. A code pattern is an excerpt of a procedure which shows one or a few important aspects of the objects currently discussed. Such a code fragment constitutes a recipe that should be known by a programmer \"fluent\" in this topic.\r\r\t\tVAR t: TextModels.Model; wr: TextModels.Writer; ch: CHAR;\r\tBEGIN\r\t\tt := TextModels.dir.New();\t"
                    attr: 3
                  - text: "(* allocate new empty text model *)"
                    attr: 7
                  - text: "\r\t\twr := t.NewWriter(NIL);\r\t\t"
                    attr: 3
                  - text: ... produce ch ...
                    attr: 7
                  - text: "\r\t\tWHILE "
                    attr: 3
                  - text: condition
                    attr: 7
                  - text: " DO\r\t\t\twr.WriteChar(ch);\r\t\t\t"
                    attr: 3
                  - text: ... produce ch ...
                    attr: 7
                  - text: "\r\t\tEND;\r\rListing 5-3. Code pattern for TextModels.Writer\r\rThe code pattern is not very interesting since it doesn't show how the generated text can be displayed. A text object only represents a text with its attributes. It doesn't know about how to draw this text, not even how to do text setting; i.e., how to break lines and pages such that they fit a given rectangle (view, paper size, etc.). When it is desired to make a text visible, it is necessary to provide a text view for the text object. Data objects that may be displayed in several views are generally called models. The separation of model and view is an important design pattern that was discussed in Chapter 2.\r\rModule "
                    attr: 3
                  - text: TextModels
                    attr: 7
                  - text: " only exports an abstract record type for text models, no concrete implementation. Instead, it exports a directory object ("
                    attr: 3
                  - text: TextModels.dir
                    attr: 7
                  - text: ) which provides the necessary factory function (
                    attr: 3
                  - text: TextModels.dir.New
                    attr: 7
                  - text: "). This indirection pattern for object creation was motivated in Chapter 2.\r\rWorking directly with text writers is inconvenient, they don't even support the writing of strings. For this reason, the following examples will use "
                    attr: 3
                  - text: formatters
                    attr: 7
                  - text: " when writing text. A formatter is a mapper (see Chapter 3) that contains a text writer and performs the mapping of higher-level symbols, such as the Component Pascal symbols, to a stream of characters that can be fed to the writer. In the next example, we we will use a formatter to write a text; a very simple \"report\". The text consists of the phone database contents, one line per entry. This first version of a phone database report is implemented in module "
                    attr: 3
                  - text: ObxPDBRep0
                    attr: 7
                  - text: ":\r\rMODULE ObxPDBRep0;\r\r\tIMPORT Views, TextModels, TextMappers, TextViews, ObxPhoneDB;\r\r\tPROCEDURE "
                    attr: 3
                  - text: GenReport
                    attr: 6
                  - text: "*;\r\t\tVAR t: TextModels.Model; f: TextMappers.Formatter; v: TextViews.View;\r\t\t\ti: INTEGER; name, number: ObxPhoneDB.String;\r\tBEGIN\r\t\tt := TextModels.dir.New();\t"
                    attr: 3
                  - text: "(* create empty text carrier *)"
                    attr: 7
                  - text: "\r\t\tf.ConnectTo(t);\t\t\t\t\t"
                    attr: 3
                  - text: "(* connect a formatter to the text *)"
                    attr: 7
                  - text: "\r\t\ti := 0;\r\t\tObxPhoneDB.LookupByIndex(i, name, number);\r\t\tWHILE name # \"\" DO\r\t\t\tf.WriteString(name);\t\t"
                    attr: 3
                  - text: "(* first string *)"
                    attr: 7
                  - text: "\r\t\t\tf.WriteTab;\t"
                    attr: 3
                  - text: "\t\t\t\t(* tab character *)"
                    attr: 7
                  - text: "\r\t\t\tf.WriteString(number);\t"
                    attr: 3
                  - text: "(* second string *)"
                    attr: 7
                  - text: "\r\t\t\tf.WriteLn;\t\t\t\t\t\t"
                    attr: 3
                  - text: "(* carriage return *)"
                    attr: 7
                  - text: "\r\t\t\tINC(i);\r\t\t\tObxPhoneDB.LookupByIndex(i, name, number)\r\t\tEND;\r\t\tv := TextViews.dir.New(t);\t"
                    attr: 3
                  - text: "(* create a text view for the text generated above *)"
                    attr: 7
                  - text: "\r\t\tViews.OpenView(v)\t\t\t"
                    attr: 3
                  - text: "(* open the text view in its own window *)"
                    attr: 7
                  - text: "\r\tEND GenReport;\r\rEND ObxPDBRep0.\r\rListing 5-4. Writing the phone database using a formatter\r\rNote that name and number are separated by a tab character (09X). Since no tab stops are defined for this text, a tab will be treated as a wide fixed-width space (whose width is a multiple of the normal space character glyph). We will later see how tab stops can be defined.\r\rExecution of the "
                    attr: 3
                  - text: ObxPDBRep0.GenReport
                    attr: 7
                  - text: " command results in the following window:\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 153
                      bodyPos: 829554
                      bodyLen: 56269
                    attr: 3
                    w: 2695680
                    h: 1809720
                  - text: "\r\rFigure  5-5. Text editor window containing the phone database\r\rThe text in the newly opened window is a fully editable text view. It can be edited; stored as a BlackBox document; printed; and so on. If you look at the source code, you can recognize the following code pattern:\r\r\t\tVAR t: TextModels.Model; f: TextMappers.Formatter; v: Views.View;\r\tBEGIN\r\t\tt := TextModels.dir.New();\r\t\tf.ConnectTo(t);\r\t\t"
                    attr: 3
                  - text: ... use formatter procedures to construct the text ...
                    attr: 7
                  - text: "\r\t\tv := TextViews.dir.New(t);\r\t\tViews.OpenView(v)\r\rListing 5-6. Code pattern for TextMappers.Formatter and for open a text view\r\rThis code pattern occurs in many BlackBox commands, e.g., in "
                    attr: 3
                  - text: DevDebug.ShowLoadedModules
                    attr: 7
                  - text: ". It is useful whenever you need to write tabular reports of varying length, possibly spanning several printed pages.\rIt also clearly shows that texts embody several design patterns simultaneously: a text object is a model which can be observed by a view (Observer pattern), it is a carrier (Carrier-Rider-Mapper pattern), and it is a container (Composite pattern).\r\rAn interesting aspect of the above code pattern is that the text carrier "
                    attr: 3
                  - text: t
                    attr: 7
                  - text: " is created first, then its contents is constructed using a formatter, and only then is a view "
                    attr: 3
                  - text: v
                    attr: 7
                  - text: " on the text carrier created. Finally, the view is opened in its own document window.\rIn BlackBox it is important that a model can be manipulated before there exists any view for it. In fact, it is far more efficient to create a text before a view on it is opened, because screen updates and some internal housekeeping of the undo mechanism are avoided this way, which can cause a dramatic speed difference.\r\rBlackBox text models represent sequences of text elements. A text element is either a Latin-1 character ("
                    attr: 3
                  - text: SHORTCHAR
                    attr: 7
                  - text: "), a Unicode character (a "
                    attr: 3
                  - text: CHAR
                    attr: 7
                  - text: " "
                    attr: 3
                  - text: "> 0FFX"
                    attr: 7
                  - text: ") or a view (an extension of type "
                    attr: 3
                  - text: Views.View
                    attr: 7
                  - text: "). Text stretches may be attributed with font information, color and vertical offset. Since a text model may contain views, it is a "
                    attr: 3
                  - text: container
                    attr: 7
                  - text: ". In the following examples, we will see how these text facilities can be used when creating new texts. Our phone book database is used as source of the material that we want to put into texts, applying different textual representations in the various examples.\r\rThe following example demonstrates how a text can be generated out of our example database. In this text, names are written in green color. The differences to module "
                    attr: 3
                  - text: ObxPDBRep0
                    attr: 7
                  - text: " are marked with "
                    attr: 3
                  - text: underlined
                    attr: 8
                  - text: " text.\r\rMODULE ObxPDBRep1;\r\r\tIMPORT "
                    attr: 3
                  - text: "Ports,"
                    attr: 8
                  - text: " Views, TextModels, TextMappers, TextViews, ObxPhoneDB;\r\r\tPROCEDURE "
                    attr: 3
                  - text: GenReport
                    attr: 6
                  - text: "*;\r\t\tVAR t: TextModels.Model; f: TextMappers.Formatter; v: TextViews.View;\r\t\t\ti: INTEGER; name, number: ObxPhoneDB.String;\r\t\t\t"
                    attr: 3
                  - text: "default, green: TextModels.Attributes;"
                    attr: 8
                  - text: "\r\tBEGIN\r\t\tt := TextModels.dir.New();\t"
                    attr: 3
                  - text: "(* create empty text carrier *)"
                    attr: 7
                  - text: "\r\t\tf.ConnectTo(t);\t\t\t\t\t"
                    attr: 3
                  - text: "(* connect a formatter to the text *)"
                    attr: 7
                  - text: "\r\t\t"
                    attr: 3
                  - text: "default := f.rider.attr;"
                    attr: 8
                  - text: "\t"
                    attr: 3
                  - text: "(* save old text attributes for later use *)"
                    attr: 7
                  - text: "\r\t\t"
                    attr: 3
                  - text: "green := TextModels.NewColor(default, Ports.green);"
                    attr: 8
                  - text: "\t"
                    attr: 3
                  - text: "(* use green color *)"
                    attr: 7
                  - text: "\r\t\ti := 0;\r\t\tObxPhoneDB.LookupByIndex(i, name, number);\r\t\tWHILE name # \"\" DO\r\t\t\t"
                    attr: 3
                  - text: f.rider.SetAttr(green);
                    attr: 8
                  - text: "\t"
                    attr: 3
                  - text: "(* change current attributes of formatter's rider *)"
                    attr: 7
                  - text: "\r\t\t\tf.WriteString(name);\t\t"
                    attr: 3
                  - text: "(* first string *)"
                    attr: 7
                  - text: "\r\t\t\t"
                    attr: 3
                  - text: f.rider.SetAttr(default);
                    attr: 8
                  - text: "\t"
                    attr: 3
                  - text: "(* change current attributes of formatter's rider *)"
                    attr: 7
                  - text: "\r\t\t\tf.WriteTab;\t"
                    attr: 3
                  - text: "\t\t\t\t(* tab character *)"
                    attr: 7
                  - text: "\r\t\t\tf.WriteString(number);\t"
                    attr: 3
                  - text: "(* second string *)"
                    attr: 7
                  - text: "\r\t\t\tf.WriteLn;\t\t\t\t\t\t"
                    attr: 3
                  - text: "(* carriage return *)"
                    attr: 7
                  - text: "\r\t\t\tINC(i);\r\t\t\tObxPhoneDB.LookupByIndex(i, name, number)\r\t\tEND;\r\t\tv := TextViews.dir.New(t);\t"
                    attr: 3
                  - text: "(* create a text view for the text generated above *)"
                    attr: 7
                  - text: "\r\t\tViews.OpenView(v)\t\t\t"
                    attr: 3
                  - text: "(* open the text view in its own window *)"
                    attr: 7
                  - text: "\r\tEND GenReport;\r\rEND ObxPDBRep1.\r\rListing 5-7. Writing the phone database using green color\r\rNote that a formatter's rider contains a set of current attributes ("
                    attr: 3
                  - text: TextModels.Writer.attr
                    attr: 7
                  - text: "). This value includes the current color and is read-only; it can be set with the writer's "
                    attr: 3
                  - text: SetAttr
                    attr: 7
                  - text: " procedure.\r\rOur first text examples, "
                    attr: 3
                  - text: ObxPDBRep0
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: ObxPDBRep1
                    attr: 7
                  - text: ", don't produce nice-looking output, because the phone numbers are not aligned below each other in a tabular fashion.\r"
                    attr: 3
                  - text: ObxPDBRep1
                    attr: 7
                  - text: " remedies this defect by inserting a ruler at the beginning of the text. This ruler defines a tab stop, which causes all phone numbers  separated from their phone names by tabs  to line up nicely. The differences to module "
                    attr: 3
                  - text: ObxPDBRep0
                    attr: 7
                  - text: " are marked with "
                    attr: 3
                  - text: underlined
                    attr: 8
                  - text: " text.\r\rMODULE ObxPDBRep2;\r\r\tIMPORT Ports, Views, TextModels, TextMappers, TextViews, "
                    attr: 3
                  - text: TextRulers
                    attr: 8
                  - text: ", ObxPhoneDB;\r\r\t"
                    attr: 3
                  - text: "PROCEDURE WriteRuler (VAR f: TextMappers.Formatter);"
                    attr: 8
                  - text: "\r\t\tCONST cm = 10 * Ports.mm;\t"
                    attr: 3
                  - text: "(* universal units *)"
                    attr: 7
                  - text: "\r\t\tVAR ruler: TextRulers.Ruler;\r\tBEGIN\r\t\truler := TextRulers.dir.New(NIL);\r\t\tTextRulers.AddTab(ruler, 4 * cm);\t"
                    attr: 3
                  - text: "(* define a tab stop, 4 cm from the left margin *)"
                    attr: 7
                  - text: "\r\t\tTextRulers.SetRight(ruler, 12 * cm);"
                    attr: 3
                  - text: "\t"
                    attr: 9
                  - text: "(* set right margin *)"
                    attr: 7
                  - text: "\r\t\tf.WriteView(ruler)\t\t\t\t\t\t\t"
                    attr: 3
                  - text: "(* a ruler is a view, thus can be written to the text *)"
                    attr: 7
                  - text: "\r\tEND WriteRuler;\r\r\tPROCEDURE "
                    attr: 3
                  - text: GenReport
                    attr: 6
                  - text: "*;\r\t\tVAR t: TextModels.Model; f: TextMappers.Formatter; v: TextViews.View;\r\t\t\ti: INTEGER; name, number: ObxPhoneDB.String;\r\tBEGIN\r\t\tt := TextModels.dir.New();\t"
                    attr: 3
                  - text: "(* create empty text carrier *)"
                    attr: 7
                  - text: "\r\t\tf.ConnectTo(t);\t\t\t\t\t"
                    attr: 3
                  - text: "(* connect a formatter to the text *)"
                    attr: 7
                  - text: "\r\t\t"
                    attr: 3
                  - text: WriteRuler(f);
                    attr: 8
                  - text: "\r\t\ti := 0;\r\t\tObxPhoneDB.LookupByIndex(i, name, number);\r\t\tWHILE name # \"\" DO\r\t\t\tf.WriteString(name);\t\t"
                    attr: 3
                  - text: "(* first string *)"
                    attr: 7
                  - text: "\r\t\t\tf.WriteTab;\t"
                    attr: 3
                  - text: "\t\t\t\t(* tab character *)"
                    attr: 7
                  - text: "\r\t\t\tf.WriteString(number);\t"
                    attr: 3
                  - text: "(* second string *)"
                    attr: 7
                  - text: "\r\t\t\tf.WriteLn;\t\t\t\t\t\t"
                    attr: 3
                  - text: "(* carriage return *)"
                    attr: 7
                  - text: "\r\t\t\tINC(i);\r\t\t\tObxPhoneDB.LookupByIndex(i, name, number)\r\t\tEND;\r\t\tv := TextViews.dir.New(t);\t"
                    attr: 3
                  - text: "(* create a text view for the text generated above *)"
                    attr: 7
                  - text: "\r\t\tViews.OpenView(v)\t\t\t"
                    attr: 3
                  - text: "(* open the text view in its own window *)"
                    attr: 7
                  - text: "\r\tEND GenReport;\r\rEND ObxPDBRep2.\r\rListing 5-8. Writing the phone database using a formatter and a ruler\r\rExecution of the "
                    attr: 3
                  - text: ObxPDBRep2.GenReport
                    attr: 7
                  - text: " command results in a window with the improved presentation of the phone database. Executing Text->Show Marks causes the ruler to be displayed:\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 154
                      bodyPos: 886408
                      bodyLen: 64409
                    attr: 3
                    w: 2838600
                    h: 1971720
                  - text: "\r\rFigure  5-9. Text editor window containing the tabular phone database\r\rA ruler is a view. A ruler on its own doesn't make sense. Like all controls, a ruler makes only sense in a container. Unlike many other controls, a ruler is an example of a control that can only function properly in a particular container; in this case the container must be a text model. You may copy a ruler into a form or other container, but it will just be passive and have no useful effect there. If it is embedded in a text model that is displayed in a text view, a ruler can influence the way in which the subsequent text is set. For example, a ruler can define tab stops, margins, and adjustment modes.\r\rThe attributes of a ruler are valid in the ruler's "
                    attr: 3
                  - text: scope
                    attr: 7
                  - text: ". The scope starts with the ruler itself and ends right before the next ruler, or at the end of the text if there follows no ruler anymore. A ruler introduces a new paragraph, possibly with its own distinct set of paragraph attributes. Inserting a paragraph character (0EX) instead of a ruler also starts a new paragraph, which inherits all paragraph attributes from the preceding ruler. Paragraph characters are the normal way to start a new paragraph; rulers are only used if particular paragraph attributes should be enforced. Note that a carriage return (0DX) doesn't start a new paragraph.\r\rA text view contains an invisible default ruler that defines the text setting of the text before the first ruler in the text, or of all text if no ruler has been written to the text at all. Interactively, this default ruler, and default attributes, can be set with the menu commands "
                    attr: 3
                  - text: "Text->Make Default Ruler"
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: "Text->Make Default Attributes"
                    attr: 7
                  - text: ".\r\rA ruler has many attributes that can be set. Unlike character attributes, which can be applied to arbitrary text stretches, these attributes apply to the ruler or the whole paragraph(s) in its scope.\rWe will discuss these attributes so that you know about ruler functionality when you need it. We won't discuss rulers in more detail though, since you can learn about the necessary details on demand if and when you need the more advanced ruler capabilities (see on-line documentation of module "
                    attr: 3
                  - text: TextRulers
                    attr: 7
                  - text: ").\r\r"
                    attr: 3
                  - text: Styles
                    attr: 6
                  - text: "\rA ruler's attributes are not directly stored in the ruler view itself. Instead, they are bundled into a separate object of type "
                    attr: 3
                  - text: TextRulers.Attributes
                    attr: 7
                  - text: ", which in turn is contained in an object of type "
                    attr: 3
                  - text: TextRulers.Style
                    attr: 7
                  - text: ".\rA style is the model of one or several ruler views. If several views share the same model, the user can change the attributes of all the rulers simultaneously. For example, changing the left margin will affect all rulers bound to the same style. However, models cannot be shared across documents, which means that all rulers bound to the same style must be embedded in the same document.\r"
                    attr: 3
                  - text: TextRulers.Attributes
                    attr: 7
                  - text: " are persistent collections of ruler attributes, much in the same way as "
                    attr: 3
                  - text: TextModels.Attributes
                    attr: 7
                  - text: " are persistent collections of character attributes.\r\r\tAttributes = POINTER TO EXTENSIBLE RECORD (Stores.Store)\r\t\tfirst-, left-, right-, lead-, asc-, dsc-, grid-: INTEGER;\r\t\topts-: SET;\r\t\ttabs-: TextRulers.TabArray\r\tEND;\r\rListing 5-10. Simplified definition of TextRulers.Attributes\r\rIn the following paragraphs, we discuss the individual attributes. For these attributes, there exist auxiliary procedures in module "
                    attr: 3
                  - text: TextRulers
                    attr: 7
                  - text: " which make it simple to set up a text ruler in the desired way: just create a new ruler with "
                    attr: 3
                  - text: TextRulers.dir.New(NIL)
                    attr: 7
                  - text: ", and then apply the auxiliary procedures that you need to obtain the correct attribute settings. An example was given above in the procedure "
                    attr: 3
                  - text: WriteRuler
                    attr: 7
                  - text: " of module "
                    attr: 3
                  - text: ObxPDBRep2
                    attr: 7
                  - text: ".\rThese auxiliary procedures greatly simplify setting up text rulers. For example, they hide that the attributes are actually not contained in the ruler itself, but rather in attributes objects which are used by style objects which are used by the rulers. Providing such simplified access to a complex feature is called a "
                    attr: 3
                  - text: facade
                    attr: 7
                  - text: " in the design patterns terminology [GHJV94]. Here the mechanism is particularly simple because the facade merely consists of simple procedures, there is not even a facade object that would have to be created and managed.\r\r"
                    attr: 3
                  - text: Tab stops
                    attr: 6
                  - text: "\rThe "
                    attr: 3
                  - text: tabs
                    attr: 7
                  - text: " field of type "
                    attr: 3
                  - text: TextRulers.TabArray
                    attr: 7
                  - text: " contains information about tab stops. The number of tab stops is given in "
                    attr: 3
                  - text: tabs.len
                    attr: 7
                  - text: ", and must not be larger than "
                    attr: 3
                  - text: TextRulers.maxTabs
                    attr: 7
                  - text: " (which is currently 32). If the user enters more than "
                    attr: 3
                  - text: maxTabs
                    attr: 7
                  - text: " tabs, or more tabs than given in "
                    attr: 3
                  - text: len
                    attr: 7
                  - text: ", then the superfluous tabs will be treated as fixed size space characters. The fixed size used is an integer multiple of the width of a space in the used font, approximately 4 mm in total.\r\r\tTab = RECORD \r\t\tstop: INTEGER;\t"
                    attr: 3
                  - text: "(* stop >= 0 *)"
                    attr: 7
                  - text: "\r\t\ttype: SET\t"
                    attr: 3
                  - text: "(* type IN {TextRulers.centerTab, TextRulers.rightTab, TextRulers.barTab} *)"
                    attr: 7
                  - text: "\r\tEND;\r\r\tTabArray = RECORD \r\t\tlen: INTEGER;\t"
                    attr: 3
                  - text: "(* 0 <= len <= TextRulers.maxTabs *)"
                    attr: 7
                  - text: "\r\t\ttab: ARRAY TextRulers.maxTabs OF TextRulers.Tab\r\t\t"
                    attr: 3
                  - text: "\t(* tab[0 .. len-1] sorted in ascending order without duplicates *)"
                    attr: 7
                  - text: "\r\tEND\r\rListing 5-11. Definition of TextRulers.Tab and TabArray\r\rIn "
                    attr: 3
                  - text: tabs.tab.stop
                    attr: 7
                  - text: ", the tab's distance from the left border of the text view is specified (in universal units of course). The tab stops in the "
                    attr: 3
                  - text: tabs.tab
                    attr: 7
                  - text: " array must be sorted in ascending order, and there must be no duplicate values.\rIn addition to the stop position kept in field "
                    attr: 3
                  - text: stop
                    attr: 7
                  - text: ", a tab stop can be modified using a set of possible options kept in field type. In particular, these options allow to center text under a tab stop or to right-align text under a tab stop (the default is left alignment):\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 1440000 }
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "tab type\ttabs.tab[i].type"
                    attr: 6
                  - text: "\rleft adjusted\t{}\rright adjusted\t{TextRulers.rightTab}\rcentered\t{TextRulers.centerTab}\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\rFor all of the above tab types, it can optionally be specified whether the tab itself is drawn as a vertical bar. Bar tabs are specified by including the value "
                    attr: 3
                  - text: TextRulers.barTab
                    attr: 7
                  - text: " in the tab type set. Since the bars occupy the whole line height, they are useful to to format simple tables.\r\rWhen created with "
                    attr: 3
                  - text: TextRulers.dir.New(NIL)
                    attr: 7
                  - text: ", a ruler has no tabs.\rThe following auxiliary procedures are provided to modify a ruler:\r\r\tPROCEDURE AddTab (r: Ruler; x: INTEGER)\r\tPROCEDURE MakeRightTab (r: Ruler)\r\tPROCEDURE MakeCenterTab (r: Ruler)\r\tPROCEDURE MakeLineTab (r: Ruler)\r\r"
                    attr: 3
                  - text: AddTab
                    attr: 7
                  - text: " adds a new left-adjusted normal tab. It can be changed into a right-adjusted or centered tab by calling "
                    attr: 3
                  - text: MakeRightTab
                    attr: 7
                  - text: " or "
                    attr: 3
                  - text: MakeCenterTab
                    attr: 7
                  - text: ". Independently of the adjustment mode, the tab can be turned into a bar tab by calling "
                    attr: 3
                  - text: MakeLineTab
                    attr: 7
                  - text: ".\r\r"
                    attr: 3
                  - text: Margins
                    attr: 6
                  - text: "\rText is set within a left and a right margin. These margins can be specified as distances from the left border of the text view. The left margin must be smaller than the right margin.\r\r\tleft-, right-: INTEGER\t"
                    attr: 3
                  - text: "(* (left >= 0)  &  (right >= left) *)"
                    attr: 7
                  - text: "\r\rIt is possible to signal to the text setter that it should ignore the right margin and use the text view for line breaking instead. In fact, this is the default behavior. It means that when the view size is changed, the text's line breaking will probably change also. Even if the right margins is ignored for text setting, it is still useful: a text view uses it as a hint for how wide the view should be when it is opened.\rLine breaking at a fixed right margin is only needed in rare circumstances, for example when this particular paragraph should be narrower than the others. If you want line breaking to be controlled by the right margin, then you have to include "
                    attr: 3
                  - text: TextRulers.rightFixed
                    attr: 7
                  - text: " in the "
                    attr: 3
                  - text: opts
                    attr: 7
                  - text: " set (see further below).\r\rNote that the "
                    attr: 3
                  - text: "Tools->Document Size..."
                    attr: 7
                  - text: " command allows to flexibly specify the width (and height) of a document's outermost view, the so-called "
                    attr: 3
                  - text: root view
                    attr: 7
                  - text: ". The width can be set to a fixed size, which is useful for page layout types of application.\rUsually however, the width is defined by the page setup, which derives the view's width from the currently selected paper size, reduced by the user-specified print margins. This is adequate for letters, program sources, and similar kinds of documents.\rAs a third possibility, the root view's width can be bound to the window size (this is the case mentioned above, when the view uses the first ruler's right margin as a hint, whether the right margin is fixed or not). Whenever the user resizes the window, the root view is resized accordingly, such that it is kept always as large as the window allows. This is desirable in particular for on-line documentation, where the documentation should use as much screen space as granted by the user, adapting the text flow to the available width whenever the window is resized. An example for this style is the default formatting of Web pages.\rNote that these features are independent of the root view's type. They work the same way for all resizable views, such as text views, form views, and most other kinds of editor view.\r\rWhen created with "
                    attr: 3
                  - text: TextRulers.dir.New(NIL)
                    attr: 7
                  - text: ", a ruler has a left margin of 0 and an implementation-specific non-fixed right margin > 0.\rThe following auxiliary procedures are provided to modify a ruler:\r\r\tPROCEDURE SetLeft (r: Ruler; x: INTEGER)\r\tPROCEDURE SetRight (r: Ruler; x: INTEGER)\r\tPROCEDURE SetFixedRight (r: Ruler; x: INTEGER)\r\r"
                    attr: 3
                  - text: SetLeft
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: SetRight
                    attr: 7
                  - text: " set the left or right margin. "
                    attr: 3
                  - text: SetFixedRight
                    attr: 7
                  - text: " sets the right margin and marks it as fixed.\r\r"
                    attr: 3
                  - text: First line indentation
                    attr: 6
                  - text: "\rA ruler defines the "
                    attr: 3
                  - text: first line indentation
                    attr: 7
                  - text: ", i.e., how much the first line after the ruler is indented from the left border of the text view. Note that it is possible to define a first line indentation that is smaller than the left margin (first < left). This is the only case where a text view draws text to the left of the specified left margin.\r\r\tfirst-: INTEGER;\t"
                    attr: 3
                  - text: "(* first >= 0 *)"
                    attr: 7
                  - text: "\r\rFirst line indentation is applied to the first line of each paragraph in the ruler's scope.\r\rWhen created with "
                    attr: 3
                  - text: TextRulers.dir.New(NIL)
                    attr: 7
                  - text: ", a ruler has no first line indentation (first = 0).\rThe following auxiliary procedure is provided to modify a ruler:\r\r\tPROCEDURE SetFirst (r: Ruler; x: INTEGER)\r\r"
                    attr: 3
                  - text: Ascender and descender
                    attr: 6
                  - text: "\rWhen a character is drawn, its rendering depends on its font attributes, such as typeface (Helvetica or Times?), style (straight or slanted?), weight (normal or bold?) and size. When a whole string is drawn, all characters are placed on a common base line. The ascender is the largest extent to which any character of a line extends above the base line. Some characters extend below the base line, such as \"g\" and \"y\". The descender is the largest extent to which any character of a line extends below the base line (see Figure 5-12).\rA text setter should calculate base line distances in a way that one line's descender doesn't overlap the next line's ascender, in order to avoid overlapping characters. In order to avoid degenerate cases, such as empty lines or lines that only contain tiny font sizes, a ruler can specify minimal values for ascender (asc) and descender (dsc).\r\r\tasc-, dsc-: INTEGER;\t"
                    attr: 3
                  - text: "(* (asc >= 0)  &  (dsc >= 0) *)"
                    attr: 7
                  - text: "\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 159
                      bodyPos: 951624
                      bodyLen: 1383
                    attr: 3
                    w: 1866900
                    h: 1422400
                  - text: "\r\rFigure 5-12. Ascender, descender, and base line\r\rWhen created with "
                    attr: 3
                  - text: TextRulers.dir.New(NIL)
                    attr: 7
                  - text: ", a ruler uses the current default font's ("
                    attr: 3
                  - text: Fonts.dir.Default()
                    attr: 7
                  - text: ") ascender and descender as initial values.\rThe following auxiliary procedures are provided to modify a ruler:\r\r\tPROCEDURE SetAsc (r: Ruler; h: INTEGER)\r\tPROCEDURE SetDsc (r: Ruler; h: INTEGER)\r\r"
                    attr: 3
                  - text: Paragraph lead
                    attr: 6
                  - text: "\r\rThe paragraph lead defines the additional vertical space to be inserted between the first line of a paragraph and the previous paragraph's last line. Where the ruler's grid attribute (see below) is used to define a line grid, it is normally considered good style to choose a lead that is a multiple of the grid spacing, or sometimes half of the grid spacing. It allows to visually distinguish new paragraphs from mere carriage returns.\r\r\tlead-: INTEGER;\t"
                    attr: 3
                  - text: "(* lead >= 0 *)"
                    attr: 7
                  - text: "\r\rWhen created with "
                    attr: 3
                  - text: TextRulers.dir.New(NIL)
                    attr: 7
                  - text: ", a ruler has a lead of 0.\rThe following auxiliary procedure is provided to modify a ruler:\r\r\tPROCEDURE SetLead (r: Ruler; h: INTEGER)\r\r"
                    attr: 3
                  - text: Line grid
                    attr: 6
                  - text: "\rIf "
                    attr: 3
                  - text: grid
                    attr: 7
                  - text: " is zero, then lines are packed as closely as possible, so that there remains no free room between one line's descender and the next line's ascender. Different lines may have different ascenders and descenders, depending on the text and fonts that they contain. For this reason, distances between base lines need not be regular. For typographical reasons, irregular line spacing is often undesirable.\rTo ensure a more regular spacing of grid lines, it is possible to switch on a line grid, by setting "
                    attr: 3
                  - text: grid
                    attr: 7
                  - text: " to a value larger than zero. This value defines a vertical grid, onto which all base lines are forced. If a line is too high to fit on the next grid line, it is placed one or more grid distances further below (see Figure 5-14).\r\r\tgrid-: INTEGER;\t"
                    attr: 3
                  - text: "(* grid >= 0 *)"
                    attr: 7
                  - text: "\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 160
                      bodyPos: 953137
                      bodyLen: 1333
                    attr: 9
                    w: 1790700
                    h: 1778000
                  - text: "\r\rFigure 5-13. Line grid\r\rWhen created with "
                    attr: 3
                  - text: TextRulers.dir.New(NIL)
                    attr: 7
                  - text: ", a ruler has a line grid of 1.\rThe following auxiliary procedure is provided to modify a ruler:\r\r\tPROCEDURE SetGrid (r: Ruler; h: INTEGER)\r\r"
                    attr: 3
                  - text: Adjustment modes
                    attr: 6
                  - text: "\rFor longer text stretches, it becomes necessary to break lines that don't fit between the text view's margins. This text setting may occur in several different ways. Text may be left adjusted (left flush), right adjusted (right flush), centered, or aligned to both left and right margins (full justification). These four adjustment modes can be controlled by two option flags: "
                    attr: 3
                  - text: TextRulers.leftAdjust
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: TextRulers.rightAdjust
                    attr: 7
                  - text: ".\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 144000 }
                        - { stop: 792000 }
                        - { stop: 1800000 }
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\t"
                    attr: 3
                  - text: "leftAdjust\trightAdjust\tadjustment mode"
                    attr: 6
                  - text: "\r\tFALSE\tFALSE\tcentered\r\tFALSE\tTRUE\tright adjusted\r\tTRUE\tFALSE\tleft adjusted (default)\r\tTRUE\tTRUE\tfully adjusted\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "Table 5-14. Adjustment modes\r\rThese adjustment modes can be included in or excluded from a more comprehensive option set, which is represented as a "
                    attr: 3
                  - text: SET
                    attr: 7
                  - text: ":\r\r\topts-: SET\t"
                    attr: 3
                  - text: "(* opts is subset of {leftAdjust, rightAdjust, pageBreak, rightFixed, noBreakInside, parJoin; the other set elements are reserved *)"
                    attr: 7
                  - text: "\r\rWhen created with "
                    attr: 3
                  - text: TextRulers.dir.New(NIL)
                    attr: 7
                  - text: ", a ruler's option set is "
                    attr: 3
                  - text: "{leftAdjust}"
                    attr: 7
                  - text: ".\rThe following auxiliary procedures are provided to modify a ruler:\r\r\tPROCEDURE SetLeftFlush (r: Ruler)\r\tPROCEDURE SetCentered (r: Ruler)\r\tPROCEDURE SetRightFlush (r: Ruler)\r\tPROCEDURE SetJustified (r: Ruler)\r\r"
                    attr: 3
                  - text: Page breaks
                    attr: 6
                  - text: "\rA ruler can force a page break, by including the "
                    attr: 3
                  - text: TextRulers.pageBreak
                    attr: 7
                  - text: " option element in the "
                    attr: 3
                  - text: opts
                    attr: 7
                  - text: " set.\rThe element "
                    attr: 3
                  - text: TextRulers.noBreakInside
                    attr: 7
                  - text: " is valid for the entire scope of a paragraph. As the name indicates, it forces the beginning of the paragraph to start on a new page, if this isn't the case anyway and if the page would be broken before the next paragraph.\rThe element "
                    attr: 3
                  - text: TextRulers.parJoin
                    attr: 7
                  - text: " is similar to "
                    attr: 3
                  - text: noBreakInside
                    attr: 7
                  - text: ", except that it additionally forces at least the first line of the next paragraph onto the same page.\r\rWhen created with "
                    attr: 3
                  - text: TextRulers.dir.New(NIL)
                    attr: 7
                  - text: ", a ruler has none of the above special attributes.\rThe following auxiliary proceduresare provided to modify a ruler:\r\r\tPROCEDURE SetPageBreak (r: Ruler)\r\tPROCEDURE SetNoBreakInside (r: Ruler)\r\tPROCEDURE SetParJoin (r: Ruler)\r\rThis concludes our discussion of ruler attributes. Ruler attributes apply to the ruler, or to all the paragraphs in the ruler's scope. In contrast, "
                    attr: 3
                  - text: character attributes
                    attr: 7
                  - text: " apply to arbitrary stretches of characters. The BlackBox text model supports all font attributes plus color and vertical offsets.\r\rRulers are views that can be inserted into a text, since texts are containers. Rulers are special in that they are known to the text system, since a text view needs to know about a ruler's paragraph attributes when setting the text. However, arbitrary other views, which are not known to the text system, may be inserted into a text. Particularly interesting effects can be achieved when these views know about texts. Fold views and link views are examples of such text-aware views.\r\rThe following example shows how fold views can be generated. Fold views are standard objects of the BlackBox Component Builder; they are implemented in the "
                    attr: 3
                  - text: StdFolds
                    attr: 7
                  - text: " module, only using BlackBox and its Text subsystem. Fold views come in pairs: a left fold and a right fold. The left fold contains a hidden text. When the user clicks on one of the fold views, the text between the two views is swapped with the hidden text. Typically, fold views are used to hide a large text behind a short one; e.g., a book chapter may be hidden, while the chapter's name is visible. This is a way to achieve abstraction of document parts, by hiding details. For this reason, one state of a fold view is called its "
                    attr: 3
                  - text: collapsed
                    attr: 7
                  - text: " state, and the other is called its expanded "
                    attr: 3
                  - text: state
                    attr: 7
                  - text: ". Technically there is no reason why the hidden text should be longer than the visible one; the naming is more a reflection of the typical use of folds.\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 165
                      bodyPos: 954980
                      bodyLen: 41777
                    attr: 3
                    w: 2600280
                    h: 1362240
                  - text: "\r\rFigure 5-15. Fold views in collapsed and expanded states\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 166
                      bodyPos: 996797
                      bodyLen: 883
                    attr: 3
                    w: 4762378
                    h: 1257268
                  - text: "\r\rFigure 5-16. Structure of text folds\r\rMODULE ObxPDBRep3;\r\r\tIMPORT Views, TextModels, TextMappers, TextViews, "
                    attr: 3
                  - text: StdFolds
                    attr: 8
                  - text: ", ObxPhoneDB;\t"
                    attr: 3
                  - text: "\t\t\t\t\r\tPROCEDURE WriteOpenFold (VAR f: TextMappers.Formatter;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tIN shortForm: ARRAY OF CHAR);"
                    attr: 8
                  - text: "\r\t\tVAR fold: StdFolds.Fold; t: TextModels.Model;\r\tBEGIN\r\t\tt := TextModels.dir.NewFromString(shortForm);\t"
                    attr: 3
                  - text: "(* convert a string into a text model *)"
                    attr: 7
                  - text: "\r\t\tfold := StdFolds.dir.New(StdFolds.expanded, \"\", t);\r\t\tf.WriteView(fold)\r\tEND WriteOpenFold;\r\r\t"
                    attr: 3
                  - text: "PROCEDURE WriteCloseFold (VAR f: TextMappers.Formatter);"
                    attr: 8
                  - text: "\r\t\tVAR fold: StdFolds.Fold; len: INTEGER;\r\tBEGIN\r\t\tfold := StdFolds.dir.New(StdFolds.expanded, \"\", NIL);\r\t\tf.WriteView(fold);\r\t\tfold.Flip;\t"
                    attr: 3
                  - text: "(* swap long-form text, now between the two fold views, with hidden short-form text *)"
                    attr: 7
                  - text: "\r\t\tlen := f.rider.Base().Length();\t"
                    attr: 3
                  - text: "(* determine the text carrier's new length *)"
                    attr: 7
                  - text: "\r\t\tf.SetPos(len)\t"
                    attr: 3
                  - text: "(* position the formatter to the end of the text *)"
                    attr: 7
                  - text: "\r\tEND WriteCloseFold;\r\r\tPROCEDURE "
                    attr: 3
                  - text: GenReport
                    attr: 6
                  - text: "*;\r\t\tVAR t: TextModels.Model; f: TextMappers.Formatter; v: TextViews.View;\r\t\t\ti: INTEGER; name, number: ObxPhoneDB.String;\r\tBEGIN\r\t\tt := TextModels.dir.New();\t"
                    attr: 3
                  - text: "(* create empty text carrier *)"
                    attr: 7
                  - text: "\r\t\tf.ConnectTo(t);\t\t\t\t\t"
                    attr: 3
                  - text: "(* connect a formatter to the text *)"
                    attr: 7
                  - text: "\r\t\ti := 0;\r\t\tObxPhoneDB.LookupByIndex(i, name, number);\r\t\tWHILE name # \"\" DO\r\t\t\t"
                    attr: 3
                  - text: "WriteOpenFold(f, name$);"
                    attr: 8
                  - text: "\t"
                    attr: 3
                  - text: "(* write left fold view into text, with "
                    attr: 7
                  - text: name
                    attr: 3
                  - text: " as its short-form text *)"
                    attr: 7
                  - text: "\r\t\t\t"
                    attr: 3
                  - text: "(* now write the long-form text *)"
                    attr: 7
                  - text: "\r\t\t\tf.WriteString(name);\t\t"
                    attr: 3
                  - text: "(* first string *)"
                    attr: 7
                  - text: "\r\t\t\tf.WriteTab;\t"
                    attr: 3
                  - text: "\t\t\t\t(* tab character *)"
                    attr: 7
                  - text: "\r\t\t\tf.WriteString(number);\t"
                    attr: 3
                  - text: "(* second string *)"
                    attr: 7
                  - text: "\r\t\t\t"
                    attr: 3
                  - text: WriteCloseFold(f);
                    attr: 8
                  - text: "\t\t\t"
                    attr: 3
                  - text: "(* write closing fold, and swap short- and long-form texts *)"
                    attr: 7
                  - text: "\r\t\t\tf.WriteLn;\t\t\t\t\t\t"
                    attr: 3
                  - text: "(* carriage return *)"
                    attr: 7
                  - text: "\r\t\t\tINC(i);\r\t\t\tObxPhoneDB.LookupByIndex(i, name, number)\r\t\tEND;\r\t\tv := TextViews.dir.New(t);\t"
                    attr: 3
                  - text: "(* create a text view for the text generated above *)"
                    attr: 7
                  - text: "\r\t\tViews.OpenView(v)\t\t\t"
                    attr: 3
                  - text: "(* open the text view in its own window *)"
                    attr: 7
                  - text: "\r\tEND GenReport;\r\rEND ObxPDBRep3.\r\rListing 5-17. Writing the phone database using folds\r\rProcedure "
                    attr: 3
                  - text: WriteCloseFold
                    attr: 7
                  - text: " has two interesting properties. First, the fold is written in its expanded form. This is reasonable, since the expanded form is often more complex than the collapsed form, which thus can be used conveniently in "
                    attr: 3
                  - text: WriteOpenFold
                    attr: 7
                  - text: " (note the useful text directory procedure "
                    attr: 3
                  - text: TextModels.dir.NewFromString
                    attr: 7
                  - text: "). The collapsed version is more complex, and thus it is convenient to use the already existing text formatter. After the left fold view, the expanded text, and the right fold view have been written, the text is collapsed using the "
                    attr: 3
                  - text: StdFolds.Flip
                    attr: 7
                  - text: " procedure.\rThis leads us to the second interesting point. Collapsing the text modifies the text model. This invalidates all riders, and consequently all formatters, that operate on the text. For example, formatter "
                    attr: 3
                  - text: f
                    attr: 7
                  - text: " has always been at the end of the created text, but now that the text is collapsed, its position is beyond the end of the text and thus illegal. For this reason, the correct position is set up again.\r\rThis is a general observation when working with mutable carriers: whenever you modify a carrier's state (or whenever someone else may do so!) you possibly have to update some state of your riders. In this example, the text's length was modified, which made it necessary to update the formatter's position.\r\rThe last example in our series of demonstrations on how to generate texts uses link views. Link views are standard objects of the BlackBox Component Builder; they are implemented in the "
                    attr: 3
                  - text: StdLinks
                    attr: 7
                  - text: " module, only using BlackBox and its Text subsystem. Like fold views, link views are used in pairs. Their implementation uses a special interface of the text subsystem ("
                    attr: 3
                  - text: TextControllers.FilterPollCursorMsg
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: TextControllers.FilterTrackMsg
                    attr: 7
                  - text: ") to cause the cursor to turn into a hand cursor when it lies above the text stretch between the pair of link views. This behavior is known from typical hypertext systems, such as Web browsers, when the mouse is moved over a text stretch that symbolizes a hyperlink. This use of link views is what gave them their name. However, they are much more general than simple hyperlink delimiters. A hyperlink contains a passive reference to another document or to another location in the same document. For example, a document reference may be stored as a string, such as \"http://www.oberon.ch\" or \"BlackBox/System/Rsrc/About\".\rLink views in contrast store a Component Pascal command, optionally with one or two string literals as parameters. The command is executed when the user clicks the mouse button when the mouse is between the two link views.\rThe command is stored in the left link view of a pair. Typical commands are:\r\r\tDevDebug.ShowLoadedModules\r\r\tStdCmds.OpenDoc('System/Rsrc/Menus')\r\r\tStdCmds.OpenAux('System/Rsrc/About', 'About BlackBox')\r\rIn our example, we will create link views with commands similar to the following one:\r\r\tObxPDBRep4.Log('Daffy Duck    310-555-1212')\r\rNote: consult the documentation of module "
                    attr: 3
                  - text: StdInterpreter
                    attr: 7
                  - text: ", since there may be some restrictions on the possible parameter lists supported for such commands.\r\rThe "
                    attr: 3
                  - text: Log
                    attr: 7
                  - text: " procedure of our example module simply writes the parameter string to the log. In a more realistic example, the parameter string could be used to dial the respective number.\r\rMODULE ObxPDBRep4;\r\r\tIMPORT Views, TextModels, TextMappers, TextViews, "
                    attr: 3
                  - text: StdLinks
                    attr: 8
                  - text: ", "
                    attr: 3
                  - text: "StdLog,"
                    attr: 8
                  - text: " ObxPhoneDB;\r\r\tCONST cmdStart = \"ObxPDBRep4.Log('\"; cmdEnd = \"')\";\r\r\tPROCEDURE "
                    attr: 3
                  - text: GenReport
                    attr: 6
                  - text: "*;\r\t\tVAR t: TextModels.Model; f: TextMappers.Formatter; v: TextViews.View;\r\t\t\ti: INTEGER; name, number: ObxPhoneDB.String; "
                    attr: 3
                  - text: "link: StdLinks.Link;"
                    attr: 8
                  - text: "\r\tBEGIN\r\t\tt := TextModels.dir.New();\t"
                    attr: 3
                  - text: "(* create empty text carrier *)"
                    attr: 7
                  - text: "\r\t\tf.ConnectTo(t);\t\t\t\t\t"
                    attr: 3
                  - text: "(* connect a formatter to the text *)"
                    attr: 7
                  - text: "\r\t\ti := 0;\r\t\tObxPhoneDB.LookupByIndex(i, name, number);\r\t\tWHILE name # \"\" DO\r\t\t\t"
                    attr: 3
                  - text: "link := StdLinks.dir.NewLink(cmdStart + name + \"    \" + number + cmdEnd);"
                    attr: 8
                  - text: "\r\t\t\t"
                    attr: 3
                  - text: f.WriteView(link);
                    attr: 8
                  - text: "\r\t\t\tf.WriteString(name);\t\t"
                    attr: 3
                  - text: "(* the string shown between the pair of link views *)"
                    attr: 7
                  - text: "\r\t\t\t"
                    attr: 3
                  - text: "link := StdLinks.dir.NewLink(\"\");\r\t\t\tf.WriteView(link);"
                    attr: 8
                  - text: "\r\t\t\tf.WriteLn;\t\t\t\t\t\t"
                    attr: 3
                  - text: "(* carriage return *)"
                    attr: 7
                  - text: "\r\t\t\tINC(i);\r\t\t\tObxPhoneDB.LookupByIndex(i, name, number)\r\t\tEND;\r\t\tv := TextViews.dir.New(t);\t"
                    attr: 3
                  - text: "(* create a text view for the text generated above *)"
                    attr: 7
                  - text: "\r\t\tViews.OpenView(v)\t\t\t"
                    attr: 3
                  - text: "(* open the text view in its own window *)"
                    attr: 7
                  - text: "\r\tEND GenReport;\r\r\t"
                    attr: 3
                  - text: PROCEDURE 
                    attr: 8
                  - text: Log
                    attr: 17
                  - text: "* (param: ARRAY OF CHAR);"
                    attr: 8
                  - text: "\r\tBEGIN\r\t\tStdLog.String(param); StdLog.Ln\r\tEND Log;\r\rEND ObxPDBRep4.\r\rListing 5-18. Writing the phone database using links\r\rNote that commands are normal procedure calls; like all procedure calls from outside of a module, they can only call those procedures of the module that are exported. Thus procedure "
                    attr: 3
                  - text: Log
                    attr: 7
                  - text: " of the above module must be exported, otherwise the program wouldn't work.\r\rAnother interesting property of link views is that they display themselves in different ways depending on whether the text view via which the user interacts with them displays or hides marks. If there are several text views on the same model, the user can independently switch marks on or off, such as inactive soft hyphens, ruler views or link views. The text subsystem provides an interface which allows views to distinguish between the two states ("
                    attr: 3
                  - text: TextSetters.Pref
                    attr: 7
                  - text: "). In particular, a view may decide to hide itself when no marks are shown, by setting its width to zero in this case. This is what link views do: when text marks are switched off, they are invisible, so that only the text between them is visible. Typically, this text is blue and underlined, to indicate that it represents a link. A ruler in contrast always occupies the whole width between its paragraph's left and right margin, but it sets its height to zero when the text marks are turned off. We will learn more about how containers and embedded views can cooperate to achieve such effects in Part III of this tutorial.\r\rThe above example demonstrates that link views can cause arbitrary behavior when the user clicks between them. This generality is powerful, but it should be used with caution. A command in a document is a kind of \"implicit import\" relation between the document and the command's module, and thus constitutes a dependency. This is not fundamentally different from the dependencies that are caused by views embedded in the document, they also function correctly only when their implementing component(s) are available. Like all dependencies, those caused by links, buttons embedded in a control, editors embedded in documents, and so on also need to be tracked and updated when necessary.\r\r\r"
                    attr: 3
                  - text: 5.2 The Model-View-Controller pattern applied to texts
                    attr: 6
                  - text: "\r\rThe next major examples demonstrate how existing text can be read. It is assumed that the text to be processed is visible, in the topmost window. On how to access texts that are stored in files, please refer to the on-line Obx examples "
                    attr: 3
                  - text: ObxOpen0
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: ObxOpen1
                    attr: 7
                  - text: ", and "
                    attr: 3
                  - text: ObxAscii
                    attr: 7
                  - text: ". Before starting with the specifics of text reading, we need to discuss how the topmost window's contents can be accessed from within a Component Pascal command.\rBasically, this is done by calling "
                    attr: 3
                  - text: Controllers.FocusView()
                    attr: 7
                  - text: ". This function returns "
                    attr: 3
                  - text: NIL
                    attr: 7
                  - text: " if no document is open. Otherwise it returns the topmost window's contents, which is a view.\rWe have learned earlier that views, whose common base type is "
                    attr: 3
                  - text: Views.View
                    attr: 7
                  - text: ", are "
                    attr: 3
                  - text: the
                    attr: 7
                  - text: " pivotal BlackBox abstractions for interactive components, such as editors and controls. Everything revolves around views. In simple cases, such as controls, a view implementation only implements an extension to "
                    attr: 3
                  - text: Views.View
                    attr: 7
                  - text: ", and that's all. In more complex cases, the data that are visualized by a view are split off into a separate model. This was discussed in detail in Chapter 2.\r\rSince container implementations are among the most complex programming tasks for which the BlackBox Component Builder was designed, the framework provides some help in how a container should be constructed. The abstract design of a container is given in module "
                    attr: 3
                  - text: Containers
                    attr: 7
                  - text: ". This module declares extensions of the types "
                    attr: 3
                  - text: Views.View
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: Models.Model
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: Controllers.Controller
                    attr: 7
                  - text: "; these types constitute a mini-framework for container construction.\rTypical containers are implemented in at least four modules: one for the model, one for the view, one for the controller, and one for standard commands. For example, the text subsystem contains the modules "
                    attr: 3
                  - text: TextModels
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: TextViews
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: TextControllers
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: TextCmds
                    attr: 7
                  - text: "; plus the auxiliary modules "
                    attr: 3
                  - text: TextMappers
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: TextRulers
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: TextSetters
                    attr: 7
                  - text: ". The form subsystem consists of "
                    attr: 3
                  - text: FormModels
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: FormViews
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: FormControllers
                    attr: 7
                  - text: ", and "
                    attr: 3
                  - text: FormCmds
                    attr: 7
                  - text: ".\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 168
                      bodyPos: 998502
                      bodyLen: 864
                    attr: 9
                    w: 4368800
                    h: 2933700
                  - text: "\r\rFigure 5-19. Variations of the generic container module decomposition\r\rWe won't look at all the details of these types; but it is important to know that a container object is not only split into a model and one or several views, but that a view is further split into a view and a so-called controller. For the time being, we can regard the management of selections and carets as the main functionality that a controller encapsulates. This is why we now look at controllers, because some of the following examples will operate on the current selection.\rOnce you have a controller, you can obtain its view by calling its "
                    attr: 3
                  - text: ThisView
                    attr: 7
                  - text: " procedure. Other procedures allow to get or set the current selection.\rThere may be several views displaying the same model (many-to-one relationship), but there is exactly one controller per view (one-to-one relationship). (This holds for views derived from "
                    attr: 3
                  - text: Containers.View
                    attr: 7
                  - text: "; other views may or may not have a separate controller.)You can get a controller's view by calling its "
                    attr: 3
                  - text: ThisView
                    attr: 7
                  - text: " procedure, and you can get a container view's controller by calling its "
                    attr: 3
                  - text: ThisController
                    attr: 7
                  - text: " procedure.\r\r"
                    attr: 3
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 169
                      bodyPos: 999446
                      bodyLen: 1391
                    attr: 9
                    w: 5283200
                    h: 3619500
                  - text: "\r\rFigure 5-20. Model-View-Controller separation\r\rMore specific container abstractions typically provide a suitable "
                    attr: 3
                  - text: Focus
                    attr: 7
                  - text: " function which yields the controller of the currently focused view, if there is one and if it has the desired type.\r\rWe now know enough about the container scenario that we can tell how to access focus view, model, or controller:\r\r\tThe following declarations are assumed:\r\t\tVAR v: Views.View; m: Models.Model; c: Controllers.Controller;\r\r\tSimple view:\r\t\tv := Controllers.FocusView();\r\r\tView with a model:\r\t\tv := Controllers.FocusView();\r\t\tIF v # NIL THEN m := v.ThisModel() ELSE m := NIL END;\r\r\tExtension of a "
                    attr: 3
                  - text: Containers.View
                    attr: 7
                  - text: ":\r\t\tv := Controllers.FocusView();\r\t\tIF v # NIL THEN m := v.ThisModel() ELSE m := NIL END;\r\t\tIF (v # NIL) & (v IS Containers.View) THEN\r\t\t\tc := v(Containers.View).ThisController()\r\t\tELSE\r\t\t\tc := NIL\r\t\tEND\r\rListing 5-21. Accessing focus view, model, and controller\r\rTypical container abstractions, such as the Text and Form subsystems, use the above mechanisms to provide more convenient access functions tailored to the specific container type. For example, module "
                    attr: 3
                  - text: TextControllers
                    attr: 7
                  - text: " exports the function "
                    attr: 3
                  - text: Focus
                    attr: 7
                  - text: ", which returns the focus view's controller "
                    attr: 3
                  - text: if and only if
                    attr: 7
                  - text: " the focus view is a text view. Otherwise it returns "
                    attr: 3
                  - text: NIL
                    attr: 7
                  - text: ". This approach is appropriate, since once you have a container controller, you can easily access its view, its model, information about its selection or caret, and so on. The typical code pattern that arises is some subset of the following one, depending on the controller's parts that you need:\r\r\tPROCEDURE "
                    attr: 3
                  - text: SomeCommand
                    attr: 6
                  - text: "*;\r\t\tVAR c: TextControllers.Controller;\r\t\t\tv: TextViews.View; t: TextModels.Model; from, to, pos: INTEGER;\r\t\t\t...\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF c # NIL THEN\r\t\t\t...\r\t\t\tv := c.ThisView();\t"
                    attr: 3
                  - text: "(* if you need the text view... *)"
                    attr: 7
                  - text: "\r\t\t\t...\r\t\t\tt := v.ThisModel();\t"
                    attr: 3
                  - text: "(* or if you need the text model... *)"
                    attr: 7
                  - text: "\r\t\t\t...\r\t\t\tIF c.HasSelection() THEN\t"
                    attr: 3
                  - text: "(* or if you need the selection range... *)"
                    attr: 7
                  - text: "\r\t\t\t\tc.GetSelection(from, to);\r\t\t\t\t...\r\t\t\tEND;\r\t\t\t...\r\t\t\tIF c.HasCaret() THEN\t"
                    attr: 3
                  - text: "(* or if you need the caret position... *)"
                    attr: 7
                  - text: "\r\t\t\t\tpos := c.CaretPos();\r\t\t\t\t...\r\t\t\tEND;\r\t\t\t...\r\t\tELSE\t"
                    attr: 3
                  - text: "(* no open document window, or focus has wrong type *)\r\t\t\t(* no error handling is necessary if this command is guarded by appropriate guard command *)"
                    attr: 7
                  - text: "\r\t\tEND\r\tEND SomeCommand;\r\rListing 5-22. Code pattern for TextControllers.Controller\r\rA menu command can use the guard "
                    attr: 3
                  - text: TextCmds.FocusGuard
                    attr: 7
                  - text: " to make sure that the command is only executed when a text view is focus. "
                    attr: 3
                  - text: TextCmds.SelectionGuard
                    attr: 7
                  - text: " additionally checks whether there exists some (non-empty) text selection.\r\r\r"
                    attr: 3
                  - text: 5.3 Reading text
                    attr: 6
                  - text: "\rNow that we have seen how to access the focus views' controller, we can write our first command that reads the focus view's text. The command counts the number of Latin-1 characters (1 byte), Unicode characters above Latin-1 (2 byte), and embedded views.\r\rMODULE ObxCount0;\r\r\tIMPORT TextModels, TextControllers, StdLog;\r\r\tPROCEDURE "
                    attr: 3
                  - text: Do
                    attr: 6
                  - text: "*;\r\t"
                    attr: 3
                  - text: "(** use TextCmds.SelectionGuard as guard for this command **)"
                    attr: 7
                  - text: "\r\t\tVAR c: TextControllers.Controller; from, to, schars, chars, views: INTEGER;\r\t\t\trd: TextModels.Reader;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tc.GetSelection(from, to);\t"
                    attr: 3
                  - text: "(* get selection range; from < to *)"
                    attr: 7
                  - text: "\r\t\t\trd := c.text.NewReader(NIL);\t"
                    attr: 3
                  - text: "(* create a new reader for this text model *)"
                    attr: 7
                  - text: "\r\t\t\trd.SetPos(from);\t"
                    attr: 3
                  - text: "(* set the reader to beginning of selection *)"
                    attr: 7
                  - text: "\r\t\t\trd.Read;\t\t\t\t"
                    attr: 3
                  - text: "(* read the first element of the text selection *)"
                    attr: 7
                  - text: "\r\t\t\tschars := 0; chars := 0; views := 0;\t"
                    attr: 3
                  - text: "(* counter variables *)"
                    attr: 7
                  - text: "\r\t\t\tWHILE rd.Pos() # to DO\t"
                    attr: 3
                  - text: "(* read all elements of the text selection *)"
                    attr: 7
                  - text: "\r\t\t\t\tIF rd.view # NIL THEN\t"
                    attr: 3
                  - text: "(* element is a view *)"
                    attr: 7
                  - text: "\r\t\t\t\t\tINC(views)\r\t\t\t\tELSIF rd.char < 100X THEN\t"
                    attr: 3
                  - text: "(* element is a Latin-1 character *)"
                    attr: 7
                  - text: "\r\t\t\t\t\tINC(schars)\r\t\t\t\tELSE\t"
                    attr: 3
                  - text: "(* element is Unicode character *)"
                    attr: 7
                  - text: "\r\t\t\t\t\tINC(chars)\r\t\t\t\tEND;\r\t\t\t\trd.Read\t\t"
                    attr: 3
                  - text: "(* read next element of the text selection *)"
                    attr: 7
                  - text: "\r\t\t\tEND;\r\t\t\tStdLog.String(\"Latin-1 characters: \"); StdLog.Int(schars); StdLog.Ln;\r\t\t\tStdLog.String(\"Unicode characters: \"); StdLog.Int(chars); StdLog.Ln;\r\t\t\tStdLog.String(\"Views: \"); StdLog.Int(views); StdLog.Ln;\r\t\t\tStdLog.Ln\r\t\tEND\r\tEND Do;\r\rEND ObxCount0.\r\rListing 5-23. Counting Latin-1 characters, Unicode characters, and views in a text\r\rThe above example uses a "
                    attr: 3
                  - text: TextModels.Reader
                    attr: 7
                  - text: ", which is the text rider type for reading. Each reader maintains a current position on its base text; there can be several independent readers on the same text simultaneously. A text reader has the following definition:\r\rTYPE\r\tReader = POINTER TO ABSTRACT RECORD \r\t\teot: BOOLEAN;\r\t\tattr: TextModels.Attributes;\r\t\tchar: CHAR;\r\t\tview: Views.View;\r\t\tw, h: INTEGER;\r\t\t(rd: Reader) Base (): TextModels.Model, NEW, ABSTRACT;\r\t\t(rd: Reader) Pos (): INTEGER, NEW, ABSTRACT;\r\t\t(rd: Reader) SetPos (pos: INTEGER), NEW, ABSTRACT;\r\t\t(rd: Reader) Read, NEW, ABSTRACT;\r\t\t(rd: Reader) ReadChar (OUT ch: CHAR), NEW, ABSTRACT;\r\t\t(rd: Reader) ReadView (OUT v: Views.View), NEW, ABSTRACT;\r\t\t(rd: Reader) ReadRun (OUT attr: TextModels.Attributes), NEW, ABSTRACT;\r\t\t(rd: Reader) ReadPrev, NEW, ABSTRACT;\r\t\t(rd: Reader) ReadPrevChar (OUT ch: CHAR), NEW, ABSTRACT;\r\t\t(rd: Reader) ReadPrevView (OUT v: Views.View), NEW, ABSTRACT;\r\t\t(rd: Reader) ReadPrevRun (OUT attr: TextModels.Attributes), NEW, ABSTRACT\r\tEND;\r\rListing 5-24. Definition of TextModels.Reader\r\rGiven a text model "
                    attr: 3
                  - text: text
                    attr: 7
                  - text: ", a reader can be created by calling "
                    attr: 3
                  - text: "rd := text.NewReader(NIL)"
                    attr: 7
                  - text: ". Such a newly allocated reader will be positioned at the beginning of the text; i.e., at "
                    attr: 3
                  - text: rd.Pos() = 0
                    attr: 7
                  - text: ". The position can be changed whenever necessary by calling "
                    attr: 3
                  - text: rd.SetPos(pos)
                    attr: 7
                  - text: ", with "
                    attr: 3
                  - text: pos
                    attr: 7
                  - text: " in the range of "
                    attr: 3
                  - text: 0..text.Length()
                    attr: 7
                  - text: ". The reader's text model can be obtained by calling its "
                    attr: 3
                  - text: Base
                    attr: 7
                  - text: " procedure.\r\rReading of the next text element is done by calling the reader's "
                    attr: 3
                  - text: Read
                    attr: 7
                  - text: " procedure, which increases the reader's current position unless the end of text has been reached, in which case the reader's "
                    attr: 3
                  - text: eot
                    attr: 7
                  - text: " field is set. After "
                    attr: 3
                  - text: Read
                    attr: 7
                  - text: " is called, the character code of the read element can be found in the reader's "
                    attr: 3
                  - text: char
                    attr: 7
                  - text: " field. If the character value is less than "
                    attr: 3
                  - text: 100X
                    attr: 7
                  - text: ", the character fits in the Latin-1 range (1-byte character), otherwise it's a 2-byte Unicode character. For convenience, the auxiliary reader procedure "
                    attr: 3
                  - text: ReadChar
                    attr: 7
                  - text: " is provided, which performs a "
                    attr: 3
                  - text: Read
                    attr: 7
                  - text: " and returns the contents of "
                    attr: 3
                  - text: char.
                    attr: 7
                  - text: "\r\rWhat happens if a view is read? In most cases, "
                    attr: 3
                  - text: char
                    attr: 7
                  - text: " is set to the reserved value "
                    attr: 3
                  - text: TextModels.viewcode
                    attr: 7
                  - text: " (2X). However, this is not necessarily the case. A text-aware view may choose to represent an arbitrary character code by using a special preference message ("
                    attr: 3
                  - text: TextModels.Pref
                    attr: 7
                  - text: "). In order to find out whether a view has been read, the field "
                    attr: 3
                  - text: view
                    attr: 7
                  - text: " should be tested. It returns the view just read, or "
                    attr: 3
                  - text: NIL
                    attr: 7
                  - text: " if it wasn't a view.\rWhen a view has been read, the fields "
                    attr: 3
                  - text: w
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: h
                    attr: 7
                  - text: " indicate the size of the view in universal units. Otherwise, these fields are undefined.\rIt is expected that the implementation of a text model optimizes access to views. For this purpose, the auxiliary reader procedure "
                    attr: 3
                  - text: ReadView
                    attr: 7
                  - text: " is provided, which reads the next view after the current position, skipping as many non-view elements as necessary.\r\rAfter an element (character or view) has been read, its text attributes are returned in the reader's "
                    attr: 3
                  - text: attr
                    attr: 7
                  - text: " field. The text attributes consist of font attributes, color and vertical offset; as described earlier. For efficiency and convenience reasons, the auxiliary reader procedure "
                    attr: 3
                  - text: ReadRun
                    attr: 7
                  - text: " is provided, which advances the reader position until the attributes change from their current setting. Text runs that have the same attributes can be drawn on the screen with one port procedure ("
                    attr: 3
                  - text: Ports.Frame.DrawString
                    attr: 7
                  - text: "), which is considerably faster than drawing them character by character.\r\rNormally, text is read forward; from lower positions to higher positions. The reader procedures "
                    attr: 3
                  - text: ReadPrev
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: ReadPrevView
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: ReadPrevRun
                    attr: 7
                  - text: " are symmetrical to their "
                    attr: 3
                  - text: Read
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: ReadView
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: ReadRun
                    attr: 7
                  - text: " counterparts, but they read backwards. In particular, "
                    attr: 3
                  - text: ReadPrevView
                    attr: 7
                  - text: " is used by a text view's so-called text setter to find the most recent ruler view, which defines how the text must be set (The auxiliary procedure "
                    attr: 3
                  - text: TextRulers.GetValidRuler
                    attr: 7
                  - text: " implements this search.)\rWhen one of the reading procedures has been called (whether one of the forward or one of the backward reading procedures), the reader's "
                    attr: 3
                  - text: eot
                    attr: 7
                  - text: " field is set. If an element could be read, "
                    attr: 3
                  - text: eot
                    attr: 7
                  - text: " is set to "
                    attr: 3
                  - text: "FALSE"
                    attr: 7
                  - text: ". If no element could be read (reading forward at the end of the text, or reading backward at the beginning of the text), "
                    attr: 3
                  - text: eot
                    attr: 7
                  - text: " is set to "
                    attr: 3
                  - text: "TRUE"
                    attr: 7
                  - text: ".\r\rTypically, the following code pattern arises when working with a text reader. "
                    attr: 3
                  - text: condition
                    attr: 7
                  - text: " may be something like "
                    attr: 3
                  - text: "rd.Pos() # end"
                    attr: 7
                  - text: " or "
                    attr: 3
                  - text: ~rd.eot
                    attr: 7
                  - text: ".\r\r\t\tVAR rd: TextModels.Reader; start: INTEGER;\r\tBEGIN\r\t\t"
                    attr: 3
                  - text: "... define "
                    attr: 7
                  - text: start
                    attr: 3
                  - text: " ..."
                    attr: 7
                  - text: "\r\t\trd := text.NewReader(NIL);\r\t\trd.SetPos(start);\t"
                    attr: 3
                  - text: "(* only necessary if "
                    attr: 7
                  - text: "start # 0"
                    attr: 3
                  - text: " *)"
                    attr: 7
                  - text: "\r\t\trd.Read;\r\t\tWHILE "
                    attr: 3
                  - text: condition
                    attr: 7
                  - text: " DO\r\t\t\t"
                    attr: 3
                  - text: ... consume text element denoted by rd ...
                    attr: 7
                  - text: "\r\t\t\trd.Read\r\t\tEND;\r\rListing 5-25. Code pattern for TextModels.Reader\r\rThe next example uses a text scanner. Scanners are reading text mappers; like formatters, they are defined in module "
                    attr: 3
                  - text: TextMappers
                    attr: 7
                  - text: ". Text scanners are similar to text readers, except that they operate on whole symbols rather than characters. Strings and numbers are examples of Component Pascal symbols that are supported by text scanners.\rWhen you compare the definition of a "
                    attr: 3
                  - text: TextMappers.Scanner
                    attr: 7
                  - text: " with the one of "
                    attr: 3
                  - text: TextModels.Reader
                    attr: 7
                  - text: ", you'll note that a scanner can also return characters (field "
                    attr: 3
                  - text: char
                    attr: 7
                  - text: ") and views with their sizes (fields "
                    attr: 3
                  - text: view
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: w
                    attr: 7
                  - text: ", and "
                    attr: 3
                  - text: h
                    attr: 7
                  - text: ); that a scanner has a position (
                    attr: 3
                  - text: Pos
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: SetPos
                    attr: 7
                  - text: "), but that a scanner cannot read backwards. "
                    attr: 3
                  - text: Scan
                    attr: 7
                  - text: " corresponds to a reader's "
                    attr: 3
                  - text: Read
                    attr: 7
                  - text: " procedure. It skips white space (blanks, carriage returns) until it either reaches the end of the text, which is signaled by setting "
                    attr: 3
                  - text: type
                    attr: 7
                  - text: " to "
                    attr: 3
                  - text: TextMappers.eot
                    attr: 7
                  - text: ", or until it has read a symbol. The type of symbol that was read is returned in "
                    attr: 3
                  - text: type
                    attr: 7
                  - text: ". It may be one of the "
                    attr: 3
                  - text: TextMappers
                    attr: 7
                  - text: " constants\r\r\t"
                    attr: 3
                  - text: "char, string, int, real, bool, set, view, tab, line, para, eot, invalid. "
                    attr: 7
                  - text: "\r\rBy default, views and control characters are treated as white space and thus ignored. Using an option set ("
                    attr: 3
                  - text: opts
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: SetOpts
                    attr: 7
                  - text: ") it is possible to treat them as valid symbols, too. The set element "
                    attr: 3
                  - text: TextMappers.returnViews
                    attr: 7
                  - text: " indicates that views should be recognized, while "
                    attr: 3
                  - text: TextMappers.returnCtrlChars
                    attr: 7
                  - text: " indicates that the three control characters for tabulators ("
                    attr: 3
                  - text: tab
                    attr: 7
                  - text: "), carriage returns ("
                    attr: 3
                  - text: line
                    attr: 7
                  - text: ) and paragraphs (
                    attr: 3
                  - text: para
                    attr: 7
                  - text: ") should be recognized.\rWhen a symbol starts like a Component Pascal string or identifier, the scanner attempts to read a string. When successful, "
                    attr: 3
                  - text: type
                    attr: 7
                  - text: " is set to "
                    attr: 3
                  - text: string
                    attr: 7
                  - text: "; which may also be a short string, i.e., only containing Latin-1 characters. The option "
                    attr: 3
                  - text: TextMappers.returnQualIdents
                    attr: 7
                  - text: " lets the scanner recognize complete qualified identifiers as single symbols; e.g., the string  "
                    attr: 3
                  - text: ThisMod.ThatObj
                    attr: 7
                  - text: "  . The length of the string is returned in "
                    attr: 3
                  - text: len
                    attr: 7
                  - text: ".\rIf it is possible to interpret the symbol as an integer or real number, "
                    attr: 3
                  - text: type
                    attr: 7
                  - text: " is set accordingly, as are the fields "
                    attr: 3
                  - text: int
                    attr: 7
                  - text: " or "
                    attr: 3
                  - text: real
                    attr: 7
                  - text: ". Integer numbers are recognized in different number bases, the base that was recognized is returned in "
                    attr: 3
                  - text: base
                    attr: 7
                  - text: " (10 for decimal numbers).\rSpecial characters such as  "
                    attr: 3
                  - text: "!@#$"
                    attr: 7
                  - text: "  are interpreted as "
                    attr: 3
                  - text: type = TextMappers.char
                    attr: 7
                  - text: ", which may also be a short character, i.e., a Latin-1 character.\rBy default, Boolean values and sets are not interpreted, except if the option elements "
                    attr: 3
                  - text: TextMappers.interpretBool
                    attr: 7
                  - text: " or "
                    attr: 3
                  - text: TextMappers.interpretSets
                    attr: 7
                  - text: " are set. Sets use the normal Component Pascal syntax, while Booleans are represented as "
                    attr: 3
                  - text: $TRUE
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: $FALSE
                    attr: 7
                  - text: ".\rThe scanner field "
                    attr: 3
                  - text: start
                    attr: 7
                  - text: " is the position of the first character of the most recently read symbol. The fields "
                    attr: 3
                  - text: lines
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: paras
                    attr: 7
                  - text: " count the number of carriage return and paragraph characters since the last "
                    attr: 3
                  - text: SetPos
                    attr: 7
                  - text: " (see below).\rThe scanner's "
                    attr: 3
                  - text: Skip
                    attr: 7
                  - text: " procedure is an auxiliary procedure that advances the scanner position until all white space characters  as specified in the "
                    attr: 3
                  - text: opts
                    attr: 7
                  - text: " set  are skipped and the first character of the symbol has been read. This character is returned in "
                    attr: 3
                  - text: Skip
                    attr: 7
                  - text: "'s "
                    attr: 3
                  - text: ch
                    attr: 7
                  - text: " parameter.\rSince there may be an arbitrary number of specialized text mappers, in addition to the ones provided by "
                    attr: 3
                  - text: TextMappers
                    attr: 7
                  - text: ", the text model cannot create text mapper objects, like it creates text readers and writers. Instead, scanners (and formatters likewise) are connected to their texts explicitly, by calling their "
                    attr: 3
                  - text: ConnectTo
                    attr: 7
                  - text: " procedures. They may be called repeatedly to connect the same scanner to different models.\r\r\tScanner = RECORD\r\t\trider-: TextModels.Reader;\r\t\topts-: SET;\r\t\ttype: INTEGER;\r\t\tstart, lines, paras: INTEGER;\r\t\tchar: CHAR;\r\t\tint, base: INTEGER;\r\t\treal: REAL;\r\t\tbool: BOOLEAN;\r\t\tset: SET;\r\t\tlen: INTEGER;\r\t\tstring: TextMappers.String;\r\t\tview: Views.View;\r\t\tw, h: INTEGER;\r\t\t(VAR s: Scanner) ConnectTo (text: TextModels.Model), NEW;\r\t\t(VAR s: Scanner) Pos (): INTEGER, NEW;\r\t\t(VAR s: Scanner) SetPos (pos: INTEGER), NEW;\r\t\t(VAR s: Scanner) SetOpts (opts: SET), NEW;\r\t\t(VAR s: Scanner) Scan, NEW;\r\t\t(VAR s: Scanner) Skip (OUT ch: CHAR), NEW\r\tEND;\r\rListing 5-26. Definition of TextModels.Scanner\r\rThe following example uses a text scanner to count the number of integer numbers, real numbers, and strings found in a text.\r\rMODULE ObxCount1;\r\r\tIMPORT TextModels, TextMappers, TextControllers, StdLog;\r\r\tPROCEDURE "
                    attr: 3
                  - text: Do
                    attr: 6
                  - text: "*;\r\t"
                    attr: 3
                  - text: "(** use TextCmds.SelectionGuard as guard for this command **)"
                    attr: 7
                  - text: "\r\t\tVAR c: TextControllers.Controller; from, to, ints, reals, strings: INTEGER;\r\t\t\ts: TextMappers.Scanner;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tc.GetSelection(from, to);\t"
                    attr: 3
                  - text: "(* get selection range; from < to *)"
                    attr: 7
                  - text: "\r\t\t\ts.ConnectTo(c.text);\t"
                    attr: 3
                  - text: "(* connect scanner to this text model *)"
                    attr: 7
                  - text: "\r\t\t\ts.SetPos(from);\t"
                    attr: 3
                  - text: "(* set the reader to beginning of selection *)"
                    attr: 7
                  - text: "\r\t\t\ts.Scan;\t\t\t\t"
                    attr: 3
                  - text: "(* read the first symbol of the text selection *)"
                    attr: 7
                  - text: "\r\t\t\tints := 0; reals := 0; strings := 0;\t"
                    attr: 3
                  - text: "(* counter variables *)"
                    attr: 7
                  - text: "\r\t\t\tWHILE s.Pos() < to DO\t"
                    attr: 3
                  - text: "(* read all symbols starting in the text selection *)"
                    attr: 7
                  - text: "\r\t\t\t\tIF s.type = TextMappers.int THEN\t"
                    attr: 3
                  - text: "(* symbol is an integer number *)"
                    attr: 7
                  - text: "\r\t\t\t\t\tINC(ints)\r\t\t\t\tELSIF s.type = TextMappers.real THEN\t"
                    attr: 3
                  - text: "(* symbol is a real number *)"
                    attr: 7
                  - text: "\r\t\t\t\t\tINC(reals)\r\t\t\t\tELSIF s.type = TextMappers.string THEN\t"
                    attr: 3
                  - text: "(* symbol is a string/identifier *)"
                    attr: 7
                  - text: "\r\t\t\t\t\tINC(strings)\r\t\t\t\tEND;\r\t\t\t\ts.Scan\t\t"
                    attr: 3
                  - text: "(* read next symbol of the text selection *)"
                    attr: 7
                  - text: "\r\t\t\tEND;\r\t\t\tStdLog.String(\"Integers: \"); StdLog.Int(ints); StdLog.Ln;\r\t\t\tStdLog.String(\"Reals: \"); StdLog.Int(reals); StdLog.Ln;\r\t\t\tStdLog.String(\"Strings: \"); StdLog.Int(strings); StdLog.Ln;\r\t\t\tStdLog.Ln\r\t\tEND\r\tEND Do;\r\rEND ObxCount1.\r\rListing 5-27. Counting integers, reals, and strings in a text\r\rThe most typical code pattern for a scanner looks similar to the code pattern for a reader. "
                    attr: 3
                  - text: condition
                    attr: 7
                  - text: " may be something like "
                    attr: 3
                  - text: s.Pos() < end
                    attr: 7
                  - text: " or "
                    attr: 3
                  - text: "s.type # TextMappers.eot"
                    attr: 7
                  - text: ".\r\r\t\tVAR s: TextMappers.Scanner; start: INTEGER;\r\tBEGIN\r\t\t"
                    attr: 3
                  - text: "... define "
                    attr: 7
                  - text: start
                    attr: 3
                  - text: " ..."
                    attr: 7
                  - text: "\r\t\ts.ConnectTo(text);\r\t\ts.SetPos(start);\t"
                    attr: 3
                  - text: "(* only necessary if "
                    attr: 7
                  - text: "start # 0"
                    attr: 3
                  - text: " *)"
                    attr: 7
                  - text: "\r\t\ts.Scan;\r\t\tWHILE "
                    attr: 3
                  - text: condition
                    attr: 7
                  - text: " DO\r\t\t\tIF s.type = TextMappers.int THEN\r\t\t\t\t"
                    attr: 3
                  - text: ... consume s.int ...
                    attr: 7
                  - text: "\r\t\t\tELSIF s.type = TextMappers.real THEN\r\t\t\t\t"
                    attr: 3
                  - text: ... consume s.real ...
                    attr: 7
                  - text: "\r\t\t\tELSIF ...\r\t\t\t\t...\r\t\t\tEND;\r\t\t\ts.Scan\r\t\tEND;\r\rListing 5-28. Code pattern for TextMappers.Scanner\r\r\r"
                    attr: 3
                  - text: 5.4 Modifying text
                    attr: 6
                  - text: "\r\rIn the previous sections, we have seen how new texts can be created using writers or formatters, and how existing texts can be read using readers or scanners. Many text commands first read a text stretch, perform some computation on it, and then replace it by the result of the computation. Examples are commands that set the font of a selection, set the color of a selection, or turn all small letters into capital letters.\rThe following example command reads the text selection and checks whether it is a string. If so, it interprets the string as a name and looks the name up in our example phone database. Then it replaces the name by the phone number.\r\rMODULE ObxLookup0;\r\r\tIMPORT TextModels, TextMappers, TextControllers, ObxPhoneDB;\r\r\tPROCEDURE "
                    attr: 3
                  - text: Do
                    attr: 6
                  - text: "*;\r\t"
                    attr: 3
                  - text: "(** use TextCmds.SelectionGuard as guard command **)"
                    attr: 7
                  - text: "\r\t\tVAR c: TextControllers.Controller; buf: TextModels.Model; from, to: INTEGER;\r\t\t\ts: TextMappers.Scanner; f: TextMappers.Formatter; number: ObxPhoneDB.String;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tc.GetSelection(from, to);\r\t\t\ts.ConnectTo(c.text);\r\t\t\ts.SetPos(from);\r\t\t\ts.Scan;\r\t\t\tIF s.type = TextMappers.string THEN\r\t\t\t\tbuf := TextModels.CloneOf(c.text);\r\t\t\t\tf.ConnectTo(buf);\r\t\t\t\tObxPhoneDB.LookupByName(s.string$, number);\r\t\t\t\tf.WriteString(number);\r\t\t\t\tfrom := s.start; to := s.Pos() - 1;\t"
                    attr: 3
                  - text: "(* scanner has already read on character beyond string! *)"
                    attr: 7
                  - text: "\r\t\t\t\tc.text.Delete(from, to);\t\t\t\t\t\t\t"
                    attr: 3
                  - text: "(* delete name *)"
                    attr: 7
                  - text: "\r\t\t\t\tc.text.Insert(from, buf, 0, buf.Length());\t"
                    attr: 3
                  - text: "(* move phone number from buffer into text *)"
                    attr: 7
                  - text: "\r\t\t\t\tc.SetSelection(from, from + LEN(number$))\t"
                    attr: 3
                  - text: "(* select the phone number *)"
                    attr: 7
                  - text: "\r\t\t\tEND\r\t\tEND\r\tEND Do;\r\rEND ObxLookup0.\r\rListing 5-29. Replacing a phone name by a phone number\r\rThe basic idea of the above command is that an auxiliary text object is used which acts as a buffer. The text selection is scanned, the scanned string is used as key to make a lookup in the phone database, the returned phone number is written into the buffer text, the original name is deleted from the text, and then the buffer contents is moved to where the name was. As a final step, the newly inserted text stretch is selected.\rNote that the text model's "
                    attr: 3
                  - text: Delete
                    attr: 7
                  - text: " procedure shortens the text, while the "
                    attr: 3
                  - text: Insert
                    attr: 7
                  - text: " procedure makes the text longer. In particular, "
                    attr: 3
                  - text: Insert
                    attr: 7
                  - text: " doesn't overwrite existing text. "
                    attr: 3
                  - text: Insert
                    attr: 7
                  - text: " moves text, i.e., it removes them at the source and inserts them at the destination.\r\rOne way to make the above command more useful would be to accept a caret as input, instead of a selection. Then you could write a name and hit a keyboard shortcut for the command. The command then reads backwards from the caret position, until it finds the beginning of the name, and then substitutes the appropriate phone number for the name. This would be a simple way to implement keyboard macros.\r\rBuffer texts, as used above, are particularly useful in helping to avoid screen flicker: since a buffer text is not displayed, it can be built up piecemeal, without causing any screen updates. When the buffer has been completed, its contents can be moved over to the visible destination text. This only causes one single screen update, which is fast and creates minimal flicker.\r\rMoving text stretches from one text model to another one may be optimized if both text models have the same implementation. This is not necessarily the case, since different implementations of type "
                    attr: 3
                  - text: TextModels.Model
                    attr: 7
                  - text: " may coexist with each other. Two calls to "
                    attr: 3
                  - text: TextModels.dir.New()
                    attr: 7
                  - text: " may well return two text models that have different implementations.\rFor this reason, module "
                    attr: 3
                  - text: TextModels
                    attr: 7
                  - text: " exports the procedure "
                    attr: 3
                  - text: Clone
                    attr: 7
                  - text: ", which returns an empty text model of exactly the same type as its parameter. In fact, the standard text implementation even performs some further optimizations when a text model is cloned from another one, rather than allocated via "
                    attr: 3
                  - text: TextModels.dir.New()
                    attr: 7
                  - text: ".\r\rWe can now give a (slightly simplified) definition of "
                    attr: 3
                  - text: TextModels.Model
                    attr: 7
                  - text: ":\r\rTYPE\r\tModel = POINTER TO ABSTRACT RECORD (Containers.Model)\r\t\t(m: Model) NewWriter (old: TextModels.Writer): TextModels.Writer, NEW, ABSTRACT;\r\t\t(m: Model) NewReader (old: TextModels.Reader): TextModels.Reader, NEW, ABSTRACT;\r\t\t(m: Model) Length (): INTEGER, NEW, ABSTRACT;\r\t\t(m: Model) Insert (pos: INTEGER; m0: TextModels.Model;\r\t\t\t\t\t\t\t\t\t\t\t\t\tbeg0, end0: INTEGER), NEW, ABSTRACT;\r\t\t(m: Model) InsertCopy (pos: INTEGER; m0: TextModels.Model;\r\t\t\t\t\t\t\t\t\t\t\t\t\tbeg0, end0: INTEGER), NEW, ABSTRACT;\r\t\t(m: Model) Delete (beg, end: INTEGER), NEW, ABSTRACT;\r\t\t(m: Model) Append (m0: TextModels.Model), NEW, ABSTRACT;\r\t\t(m: Model) Replace (beg, end: INTEGER; m0: TextModels.Model;\r\t\t\t\t\t\t\t\t\t\t\t\t\tbeg0, end0: INTEGER), NEW, ABSTRACT;\r\t\t(m: Model) SetAttr (beg, end: INTEGER; attr: TextModels.Attributes), NEW, ABSTRACT;\r\tEND;\r\rListing 5-30. Definition of TextModels.Model\r\rWe have already met most of its procedures. "
                    attr: 3
                  - text: InsertCopy
                    attr: 7
                  - text: " is similar to "
                    attr: 3
                  - text: Insert
                    attr: 7
                  - text: ", but instead of moving, it copies a text stretch, without modifying the source. "
                    attr: 3
                  - text: Delete
                    attr: 7
                  - text: " removes a text stretch.\r"
                    attr: 3
                  - text: Insert
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: InsertCopy
                    attr: 7
                  - text: ", and "
                    attr: 3
                  - text: Delete
                    attr: 7
                  - text: " are the elementary text operations. "
                    attr: 3
                  - text: Append
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: Replace
                    attr: 7
                  - text: " are provided for convenience and efficiency; they can be expressed in terms of the elementary operations:\r\r\tdst.Append(src)  "
                    attr: 3
                  - text: ꉈ
                    attr: 3
                    wide: true
                  - text: "  dst.Insert(dst.Length(), src, 0, src.Length())\r\ri.e., it moves the whole contents of the source text to the end of the destination text, thereby leaving an empty source text.\r\r\tt.Replace(b, e, t1, b1, e1)  "
                    attr: 3
                  - text: ꉈ
                    attr: 3
                    wide: true
                  - text: "  t.Delete(b, e); t.Insert(b, t1, b1, e1)\r\ri.e., it overwrites some part of the destination text by some part of the source text (which is thereby removed). Note that source and destination texts must be different.\r\r"
                    attr: 3
                  - text: SetAttr
                    attr: 7
                  - text: " allows to set the text attributes of a whole text stretch.\r\r\r"
                    attr: 3
                  - text: 5.5 Text scripts
                    attr: 6
                  - text: "\r\rWhen you have successfully applied the command "
                    attr: 3
                  - text: ObxLookup0.Do
                    attr: 7
                  - text: " to a text stretch, you can try out something that may surprise you: you can reverse (\"undo\") the operation by executing the "
                    attr: 3
                  - text: "Edit->Undo"
                    attr: 7
                  - text: " command! With "
                    attr: 3
                  - text: "Edit->Redo"
                    attr: 7
                  - text: " you can reverse the operation's reversal.\rThis capability is surprising because we have only implemented the plain "
                    attr: 3
                  - text: Do
                    attr: 7
                  - text: " procedure, but no code for undoing or redoing it. How come that the framework is able to undo/redo the operation anyway?\r\rIt is possible because the text model procedures which modify their model's state, such as "
                    attr: 3
                  - text: Model.Delete
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: Model.Insert
                    attr: 7
                  - text: ", are implemented in a particular way. They don't execute the modification directly. Instead, they create special operation objects and register them in the framework. The framework then can call the operation's appropriate procedure for performing the actual do/undo/redo functionality. This mechanism has been described in Chapter 3.\r\rThe following example shows how a sequence of text-modifying procedures is bracketed by "
                    attr: 3
                  - text: BeginScript
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: EndScript
                    attr: 7
                  - text: " to make the whole sequence undoable. "
                    attr: 3
                  - text: BeginScript
                    attr: 7
                  - text: " returns a script object, it gets the name of the compound operation as input.\r\rMODULE ObxLookup1;\r\r\tIMPORT "
                    attr: 3
                  - text: "Stores,"
                    attr: 8
                  - text: " Models, TextModels, TextMappers, TextControllers, ObxPhoneDB;\r\r\tPROCEDURE "
                    attr: 3
                  - text: Do
                    attr: 6
                  - text: "*;\r\t"
                    attr: 3
                  - text: "(** use TextCmds.SelectionGuard as guard command **)"
                    attr: 7
                  - text: "\r\t\tVAR c: TextControllers.Controller; buf: TextModels.Model; from, to: INTEGER;\r\t\t\ts: TextMappers.Scanner; f: TextMappers.Formatter; number: ObxPhoneDB.String;\r\t\t\t"
                    attr: 3
                  - text: "script: Stores.Operation;"
                    attr: 8
                  - text: "\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tc.GetSelection(from, to);\r\t\t\ts.ConnectTo(c.text);\r\t\t\ts.SetPos(from);\r\t\t\ts.Scan;\r\t\t\tIF s.type = TextMappers.string THEN\r\t\t\t\tbuf := TextModels.CloneOf(c.text);\r\t\t\t\tf.ConnectTo(buf);\r\t\t\t\tObxPhoneDB.LookupByName(s.string$, number);\r\t\t\t\tf.WriteString(number);\r\t\t\t\tfrom := s.start; to := s.Pos() - 1;\t"
                    attr: 3
                  - text: "(* scanner has already read on character beyond string! *)"
                    attr: 7
                  - text: "\r\t\t\t\t"
                    attr: 3
                  - text: "Models.BeginScript(c.text, \"#Obx:Lookup\", script);"
                    attr: 8
                  - text: "\r\t\t\t\tc.text.Delete(from, to);\t\t\t\t\t\t\t"
                    attr: 3
                  - text: "(* delete name *)"
                    attr: 7
                  - text: "\r\t\t\t\tc.text.Insert(from, buf, 0, buf.Length());\t"
                    attr: 3
                  - text: "(* move phone number from buffer into text *)"
                    attr: 7
                  - text: "\r\t\t\t\t"
                    attr: 3
                  - text: "Models.EndScript(c.text, script);"
                    attr: 8
                  - text: "\r\t\t\t\tc.SetSelection(from, from + LEN(number$))\t"
                    attr: 3
                  - text: "(* select the phone number *)"
                    attr: 7
                  - text: "\r\t\t\tEND\r\t\tEND\r\tEND Do;\r\rEND ObxLookup1.\r\rListing 5-31. Example of a script (compound operation)\r\rIn "
                    attr: 3
                  - text: Models.BeginScript
                    attr: 7
                  - text: ", the name of the compound operation is given. It is mapped by the string mapping facility of BlackBox, because this name may be displayed to the user (in the undo/redo menu item).\r\rIn modules "
                    attr: 3
                  - text: ObxLookup0
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: ObxLookup1
                    attr: 7
                  - text: " use the following statement sequence to replace the name with the number:\r\r\tc.text.Delete(from, to);\r\tc.text.Insert(from, buf, 0, buf.Length());\r\rTo combine these two operations into a single compound operation (as experienced by the user), it was necessary to bracket the two calls with the "
                    attr: 3
                  - text: BeginScript / EndScript
                    attr: 7
                  - text: " pair. In this special case here, there actually would be a better solution:\r\r\tc.text.Replace(from, to, buf, 0, buf.Length());\r\r"
                    attr: 3
                  - text: TextModels.Model.Replace
                    attr: 7
                  - text: " is a powerful procedure of which "
                    attr: 3
                  - text: Insert
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: Delete
                    attr: 7
                  - text: ",  and "
                    attr: 3
                  - text: Append
                    attr: 7
                  - text: " are special cases (provided for convenience):\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 180000 }
                        - { stop: 2376000 }
                        - { stop: 2664000 }
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\tt.Delete(beg, end)\t=\tt.Replace(beg, end, t, 0, 0)\r\tt.Insert(pos, t0, beg, end)\t=\tt.Replace(pos, pos, t0, beg, end)\r\tt.Append(t0)\t=\tt.Replace(t.Length(), t.Length(), t0, 0, t0.Length())\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\rNote that "
                    attr: 3
                  - text: InsertCopy
                    attr: 7
                  - text: " cannot be expressed in terms of "
                    attr: 3
                  - text: Replace
                    attr: 7
                  - text: ":\r\r\tt.InsertCopy(pos, t0, beg, end)\t#\tt.Replace(pos, pos, t0, beg, end)\r\rThe reason is that "
                    attr: 3
                  - text: Replace
                    attr: 7
                  - text: ", like "
                    attr: 3
                  - text: Insert
                    attr: 7
                  - text: ", deletes the source text. "
                    attr: 3
                  - text: InsertCopy
                    attr: 7
                  - text: " on the other hand is a pure copying operation which doesn't modify the source text (unless source and destination texts are identical and the destination position lies within the source text range).\r\r\r"
                    attr: 3
                  - text: 5.6 Summary
                    attr: 6
                  - text: "\r\rWe now conclude the discussion of the BlackBox Component Builder's Text subsystem. The goal of this tutorial was to give an overview over a relatively complex extension subsystem; to show the use of the previous part's design patterns; and to show the typical Text code patterns.\rThe treatment of the text subsystem cannot be complete, there are still many details for which the reference documentation of the various modules must be consulted. However, the general scope and typical applications should have become clearer. While we started with as little theory as possible and used simple examples only, the basic structure of a complex container subsystem will have become clearer by now.\r\rBefore we give a list of further on-line examples that you may want to study, here is a list of all standard modules of the Text subsystem (lowest module in the hierarchy first), with the most important types that they export:\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 144000 }
                        - { stop: 432000 }
                        - { stop: 1440000 }
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\tmodule / type\tdescription\r"
                    attr: 6
                  - text: "\r\tTextModels\tabstraction and default implementation of text models\r\t\tAttributes\t\tattributes of a text elem (font, color, vertical offset)\r\t\tContext\t\tlink between a text model and a view embedded in it\r\t\tDirectory\t\tfactory for text models\r\t\tModel\t\ttext carrier, factory for readers and writers\r\t\tReader\t\trider for element-wise text reading\r\t\tWriter\t\trider for element-wise text writing\r\r\tTextMappers\tabstraction and implementation of text mappers for Component Pascal symbols\r\t\tFormatter\t\tmapper for symbol-wise text writing\r\t\tScanner\t\tmapper for symbol-wise text reading\r\r\tTextRulers\tabstraction and default implementation for ruler views, which embody paragraph attributes\r\t\tAttributes\t\tattributes of text ruler (tabs, margins, grid, etc.)\r\t\tDirectory\t\tfactory for text rulers\r\t\tRuler\t\tview for rulers\r\t\tStyle\t\tmodel for rulers\r\r\tTextSetters\tabstraction and default implementation for text setters, which perform line / page breaking\r\t\tDirectory\t\tfactory for text setters\r\t\tReader\t\ttext mapper which collects text into units of text setting\r\t\t\t\t(non-breakable sequences) and determines their size\r\t\tSetter\t\tobject which implements a text setting algorithm\r\r\tTextViews\tabstraction and default implementation of text views\r\t\tDirectory\t\tfactory for text views\r\t\tView\t\tview for text models\r\r\tTextControllers\tabstraction and default implementation of text controllers\r\t\tController\t\tcontroller for text views\r\t\tDirectory\t\tfactory for text controllers\r\r\tTextCmds\tcommand package with most important text commands\r\rTable 5-32. Table of Text system modules and most important types\r\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 144000 }
                        - { stop: 1080000 }
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\tObxHello0\twrite \"Hello World\" to log\r\tObxHello1\twrite \"Hello World\" to new text\r\tObxOpen0\topen text document from a file, using standard file open dialog\r\tObxOpen1\tmodify a text document on a file, using standard file open and save dialogs\r\tObxCaps\tchange string to uppercase, using compound operation\r\tObxDb\tmanage sorted list of records\r\tObxTabs\ttransform some tabs into blanks\r\tObxMMerge\tmail merge of template and database\r\tObxParCmd\tinterpret text which follows a command button\r\tObxLinks\tcreate a directory text with hyperlinks\r\tObxAscii\ttraditional text file I/O\r\rTable 5-33. Additional Obx on-line examples of Text subsystem\r"
                    attr: 3
                  - ruler:
                      left: 0
