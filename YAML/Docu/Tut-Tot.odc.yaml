                    attr: 3
                  - text: "(* Directory *)"
                    attr: 7
                  - text: "\r\r\t"
                    attr: 3
                  - text: "PROCEDURE (d: Directory) New* (m: Model): View, NEW, ABSTRACT;\r\r"
                    attr: 6
                  - text: "\r\t"
                    attr: 3
                  - text: "(* StdView *)"
                    attr: 7
                  - text: "\r\r\tPROCEDURE (v: "
                    attr: 3
                  - text: Std
                    attr: 6
                  - text: "View) Internalize (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER; st: Stores.Store;\r\tBEGIN\r\t\trd.ReadVersion(0, 0, version);\r\t\tIF ~rd.cancelled THEN\r"
                    attr: 3
                  - text: "\t\t\trd.ReadStore(st);\r\t\t\tIF st IS Model THEN\r\t\t\t\tv.model := st(Model)\r\t\t\tELSE\r\t\t\t\t(* concrete model implementation couldn't be loaded->\r\t\t\t\t\tan alien store was created *)\r\t\t\t\trd.TurnIntoAlien(Stores.alienComponent)\r\t\t\t\t(* internalization of v is cancelled *)\r\t\t\tEND\r"
                    attr: 6
                  - text: "\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (v: "
                    attr: 3
                  - text: Std
                    attr: 6
                  - text: "View) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteVersion(0);\r\t\twr.WriteStore(v.model)\r\tEND Externalize;\r\r\tPROCEDURE (v: "
                    attr: 3
                  - text: Std
                    attr: 6
                  - text: "View) CopyFromModelView (source: Views.View; model: Models.Model);\r\tBEGIN\r\t\tWITH source: "
                    attr: 3
                  - text: Std
                    attr: 6
                  - text: "View DO\r\t\t\tv.model := model(Model)\r\t\tEND\r\tEND CopyFromModelView;\r\r\tPROCEDURE (v: "
                    attr: 3
                  - text: Std
                    attr: 6
                  - text: "View) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\t"
                    attr: 3
                  - text: "VAR s: ARRAY 256 OF CHAR;"
                    attr: 6
                  - text: "\r\tBEGIN\r\t\t"
                    attr: 3
