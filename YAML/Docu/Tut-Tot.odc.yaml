                  - text: f
                    attr: 7
                  - text: " to draw a rectangle. A frame can be regarded as a mapper object, in this case for both input and output simultaneously (here we need not be interested in the rider and carrier for this mapper, which are both defined in module "
                    attr: 3
                  - text: Ports
                    attr: 7
                  - text: "). A frame embodies coordinate transformations and clipping facilities.\rIf the view is displayed on the screen, the frame is a mapper on a screen port. If the view is printed, the frame is a mapper on a printer port. From the view's perspective, this difference is not relevant. Thus no special code is necessary to support printing.\r\rThe view may be copied and pasted into "
                    attr: 3
                  - text: containers
                    attr: 7
                  - text: " such as text views or form views. Additionally, the size of the view can be changed by selecting it and then manipulating the resize handles. All this functionality is offered by the BlackBox Component Framework and requires no further coding.  If this default behavior is not convenient, it can be modified. In the following we will show how this is done.\r\r\r"
                    attr: 3
                  - text: "6.3 Preference messages\r"
                    attr: 6
                  - text: "\rYou might have noticed that the size of a newly opened view is rather arbitrary. However, before opening the view, the framework sends the view a message with a proposed size. The view may adapt this proposal to its own needs. To do that, the message of type "
                    attr: 3
                  - text: Properties.SizePref
                    attr: 7
                  - text: " must be answered in the view's "
                    attr: 3
                  - text: "HandlePropMsg "
                    attr: 7
                  - text: procedure
                    attr: 3
                  - text: ". "
                    attr: 7
                  - text: "Before a view is displayed for the first time, the proposed size for the width and the height of the view is "
                    attr: 3
                  - text: "Views.undefined. "
                    attr: 7
                  - text: The following version of our sample view draws a rectangle with a width of 2 cm and a height of 1 cm. Changes compared to the previous version are written in bold face.
                    attr: 3
                  - text: "\r\r"
                    attr: 7
                  - ruler:
                      first: 180000
                      left: 180000
                      right: 180000
                      lead: 8100
                      asc: 145400
                      dsc: 32400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 360000 }
                        - { stop: 540000 }
                        - { stop: 720000 }
                        - { stop: 900000 }
                        - { stop: 1080000 }
                        - { stop: 1260000 }
                        - { stop: 1440000 }
                        - { stop: 1620000 }
                        - { stop: 1800000 }
                        - { stop: 3780000 }
                      attr: 7
                      w: 360000000
                      h: 444500
                  - text: "MODULE ObxViews1;\r\r\tIMPORT Views, Ports, "
                    attr: 3
                  - text: Properties
                    attr: 6
                  - text: ";\r\r\tTYPE View = POINTER TO RECORD (Views.View) END;\r\r\tPROCEDURE (v: View)  Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tf.DrawRect(l, t, r, b, Ports.fill, Ports.red)\r\tEND Restore;\r\r"
                    attr: 3
                  - text: "\tPROCEDURE (v: View) HandlePropMsg (VAR msg: Properties.Message);\r\tBEGIN\r\t\tWITH msg: Properties.SizePref DO\r\t\t\tIF (msg.w = Views.undefined) OR (msg.h = Views.undefined) THEN\r\t\t\t\t msg.w := 20 * Ports.mm; msg.h := 10 * Ports.mm\r\t\t\tEND\r\t\tELSE\t(* ignore other messages *)\r\t\tEND\r\tEND HandlePropMsg;\r\r"
                    attr: 6
                  - text: "\tPROCEDURE Deposit*;\r\t\tVAR v: View;\r\tBEGIN\r\t\tNEW(v); Views.Deposit(v)\r\tEND Deposit;\r\rEND ObxViews1.\r\r"
                    attr: 3
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 198
                      bodyPos: 1005333
                      bodyLen: 6
                    attr: 3
                    w: 177800
                    h: 152400
                  - text: " \"ObxViews1.Deposit; StdCmds.Open\"\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 0
                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000003
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\rEvery newly generated view now assumes the desired predefined size. This is only possible because the view and its container cooperate, in this case via the "
                    attr: 3
                  - text: Properties.SizePref
                    attr: 7
                  - text: " message. A container is expected to send this message whenever it wants to change a view's size, and then adhere to the returned data. However, for the understanding of the BlackBox Component Framework it is essential to know that while a well-behaved container "
                    attr: 3
                  - text: should
                    attr: 7
                  - text: " follow this protocol, it is not "
                    attr: 3
                  - text: required
                    attr: 7
                  - text: " to do so. That's why such a message is called a "
                    attr: 3
                  - text: preference
                    attr: 7
                  - text: ". It describes merely a view's preference, so that the surrounding container can make allowances for the special needs of the view. But it is always the container which has the last word in such negotiations. For example, the container will not let embedded views become larger than itself. The standard document, text, and form containers are well-behaved in that they support all preferences defined in module "
                    attr: 3
                  - text: Properties
                    attr: 7
                  - text: ". Special containers, e.g. texts, may define additional preferences specific to their type of contents. It is important to note that a view can ignore all preferences it doesn't know or doesn't care about.\rThe "
                    attr: 3
                  - text: Properties.SizePref
                    attr: 7
                  - text: " allows us to restrict the possible values for the width and the height of a view. For example, we can enforce a minimal and a maximal size, or fix the height or width of the view, or specify a constraint between its width and height. The procedures "
                    attr: 3
                  - text: Properties.ProportionalConstraint
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: Properties.GridConstraint
                    attr: 7
                  - text: " are useful standard implementations to specify constraints. The next version of our view implementation specifies that the rectangle is always twice as wide as it is high. In addition, minimal and maximal values for the height (and thus also for the width) are specified. If the view is resized using the resize handles, the constraints are not violated. Try it out!\r\r"
                    attr: 3
                  - ruler:
                      first: 180000
                      left: 180000
                      right: 180000
                      lead: 8100
                      asc: 145400
                      dsc: 32400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 360000 }
                        - { stop: 540000 }
                        - { stop: 720000 }
                        - { stop: 900000 }
                        - { stop: 1080000 }
                        - { stop: 1260000 }
                        - { stop: 1440000 }
                        - { stop: 1620000 }
                        - { stop: 1800000 }
                        - { stop: 3780000 }
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "MODULE ObxViews2;\r\r\tIMPORT Views, Ports, Properties;\r\r\tTYPE View = POINTER TO RECORD (Views.View) END;\r\r\tPROCEDURE (v: View)  Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tf.DrawRect(l, t, r, b, Ports.fill, Ports.red)\r\tEND Restore;\r\r\tPROCEDURE (v: View) HandlePropMsg (VAR msg: Properties.Message);\r"
                    attr: 3
                  - text: "\t\tCONST min = 5 * Ports.mm; max = 50 * Ports.mm;\r"
                    attr: 6
                  - text: "\tBEGIN\r\t\tWITH msg: Properties.SizePref DO\r\t\t\tIF (msg.w = Views.undefined) OR (msg.h = Views.undefined) THEN\r\t\t\t\t msg.w := 20 * Ports.mm; msg.h := 10 * Ports.mm\r"
                    attr: 3
                  - text: "\t\t\tELSE\r\t\t\t\tProperties.ProportionalConstraint(2, 1, msg.fixedW, msg.fixedH,\r\t\t\t\t\t\t\t\t\t\tmsg.w, msg.h);\r\t\t\t\tIF msg.h < min THEN\r\t\t\t\t\tmsg.h := min; msg.w := 2 * min\r\t\t\t\tELSIF msg.h > max THEN\r\t\t\t\t\tmsg.h := max; msg.w := 2 * max\r\t\t\t\tEND\r"
                    attr: 6
                  - text: "\t\t\tEND\r\t\tELSE\t(* ignore other messages *)\r\t\tEND\r\tEND HandlePropMsg;\r\r\tPROCEDURE Deposit*;\r\t\tVAR v: View;\r\tBEGIN\r\t\tNEW(v); Views.Deposit(v)\r\tEND Deposit;\r\rEND ObxViews2.\r\t\r"
                    attr: 3
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 203
                      bodyPos: 1005777
                      bodyLen: 6
                    attr: 3
                    w: 177800
                    h: 152400
                  - text: " \"ObxViews2.Deposit; StdCmds.Open\"\r"
                    attr: 3
                  - ruler:
                      left: 0
                      right: 0
                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000003
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\rWe will look at two other preferences in this tutorial. The first one is "
                    attr: 3
                  - text: "Properties.ResizePref.\r\r"
                    attr: 7
                  - text: "\tTYPE\r\t\tResizePref = RECORD (Properties.Preference)\r\t\t\tfixed,\r\t\t\thorFitToPage, verFitToPage,\r\t\t\thorFitToWin, verFitToWin: BOOLEAN   (* OUT *)\r\t\tEND;\r\rThe receiver of this message may indicate that it doesn't wish to be resized, by setting "
                    attr: 3
                  - text: fixed
                    attr: 7
                  - text: " to "
                    attr: 3
                  - text: "TRUE"
                    attr: 7
                  - text: .
                    attr: 3
                  - text: " "
                    attr: 7
                  - text: "As a consequence, the view will not display resize handles when it is selected, i.e., it cannot be resized interactively. However, the "
                    attr: 3
                  - text: "Properties.SizePref "
                    attr: 7
                  - text: "message is still sent to the view, as the initial size still needs to be determined.\rIf a view is a "
                    attr: 3
                  - text: root view
                    attr: 7
                  - text: ", i.e., the outermost view in a document or window (e.g., if opened with "
                    attr: 3
                  - text: StdCmds.Open
                    attr: 7
                  - text: "), then the size of the window, the size of the view, or both might be changed.\r\rHowever, sometimes it is convenient if the view size is automatically adapted whenever the window is resized, e.g., for help texts which should use as much screen estate as possible. For other views, it may be preferable that their size is not determined by the window, but rather by their contents, or by the page setup of the document in which they are embedded. A view can indicate such preferences by setting the "
                    attr: 3
                  - text: horFitToWin
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: verFitToWin
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: horFitToPage
                    attr: 7
                  - text: ", and "
                    attr: 3
                  - text: verFitToPage
                    attr: 7
                  - text: " flags in the "
                    attr: 3
                  - text: Properties.SizePref
                    attr: 7
                  - text: " message. These flags have no effect if the view is not a root view, i.e., if it is embedded deeper inside a document.\rAn automatic adaptation of the view size to the actual window size can be achieved by setting the fields "
                    attr: 3
                  - text: horFitToWin
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: verFitToWin
                    attr: 7
                  - text: ". The size of the view is then bound to the window, i.e., the user can change it directly by resizing the window.\rNote that if the size of the view is bound to the size of the window (either by setting "
                    attr: 3
                  - text: horFitToWin
                    attr: 7
                  - text: " or "
                    attr: 3
                  - text: verFitToWin
                    attr: 7
                  - text: "), then no "
                    attr: 3
                  - text: Properties.SizePref
                    attr: 7
                  - text: " messages are sent to the view, i.e., the constraints specified through "
                    attr: 3
                  - text: "Properties.SizePref "
                    attr: 7
                  - text: "are no longer enforced. Additionally, the view does not display resize handles, regardless of the "
                    attr: 3
                  - text: fixed
                    attr: 7
                  - text: " flag.\r\rBy setting the fields "
                    attr: 3
                  - text: horFitToPage
                    attr: 7
                  - text: " or "
                    attr: 3
                  - text: verFitToPage
                    attr: 7
                  - text: ", the width or the height of the view can be bound to the actual printer page size. The width of a text view is usually bound to the width of the page size, and can be changed via the page setup mechanism of the underlying operating system. The following example enforces that the size of a root view is bound to the size of the window:\r\r"
                    attr: 3
                  - ruler:
                      first: 180000
                      left: 180000
                      right: 180000
                      lead: 8100
                      asc: 145400
                      dsc: 32400
                      grid: 177800
                      opts: 0x00000001
