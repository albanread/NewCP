                  - text: Std
                    attr: 6
                  - text: "View) HandleCtrlMsg (f: Views.Frame;\r\t\t\t\t\t\t\t\t\t\tVAR msg: Controllers.Message;\r\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\tBEGIN\r\t\tWITH msg: Controllers.EditMsg DO\r\t\t\tIF msg.op = Controllers.pasteChar THEN\r\t\t\t\t"
                    attr: 3
                  - text: v.model.Insert(msg.char)
                    attr: 6
                  - text: "\t"
                    attr: 3
                  - text: "(*  undoable insertion *)"
                    attr: 7
                  - text: "\r\t\t\tEND\r\t\tELSE\t\t\t\t\t\t"
                    attr: 3
                  - text: "(* ignore other messages *)"
                    attr: 7
                  - text: "\r\t\tEND\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE (v:"
                    attr: 3
                  - text: Std
                    attr: 6
                  - text: "View) HandlePropMsg (VAR msg: Properties.Message);\r\tBEGIN\r\t\tWITH msg: Properties.SizePref DO\r\t\t\tIF (msg.w = Views.undefined) OR (msg.h = Views.undefined) THEN\r\t\t\t\tmsg.w := 10 * d; msg.h := 2 *d \r\t\t\tEND\r\t\t| msg: Properties.FocusPref DO\r\t\t\tmsg.setFocus := TRUE\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\r\r\t"
                    attr: 3
                  - text: "(* StdDirectory *)"
                    attr: 7
                  - text: "\r\r\t"
                    attr: 3
                  - text: "PROCEDURE (d: StdDirectory) New* (m: Model): View;\r\t\tVAR v: StdView;\r\tBEGIN\r\t\tASSERT(m # NIL, 20);\r\t\tNEW(v); v.model := m; Stores.Join(v, m);\r\t\tRETURN v"
                    attr: 6
