                    attr: 3
                  - text: "\tPROCEDURE SetModelDir* (d: ModelDirectory);\r\tBEGIN\r\t\tASSERT(d # NIL, 20);\r\t\tmdir := d\r\tEND SetModelDir;\r\r"
                    attr: 6
