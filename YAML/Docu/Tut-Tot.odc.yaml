                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000009
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "Part III: View Construction"
                    attr: 5
                  - text: "\r\rPart I of the BlackBox tutorial gives an introduction to the design patterns that are used throughout BlackBox. To know these patterns makes it easier to understand and remember the more detailed design decisions in the various BlackBox modules.\r\rPart II of the BlackBox tutorial demonstrates how the most important library components can be used: control, form, and text components.\r\rPart III of the BlackBox tutorial demonstrates how new views can be developed, by giving a series of examples that gradually become more sophisticated.\r\r"
                    attr: 3
                  - text: "\r"
                    attr: 6
                  - text: 6 View Construction
                    attr: 1
                  - text: "\r\rViews are the central abstraction in the BlackBox Component Builder. Everything revolves around views: most commands operate on views, windows display views, views can be internalized and externalized, views perform interaction with the user, and views may be embedded into other views. \r\r\r"
                    attr: 3
                  - text: "6. 1 Introduction\r"
                    attr: 6
                  - text: "\rThis view programming tutorial consists of four sections, each of which introduces a special aspect of view programming. The section \"message handling\" (chapters 6.2 to 6.5) explains how the behavior of a view is defined through the view's message handlers, i.e., how the answering of preferences, controller messages and properties influences the view's relation to its environment and the view's reaction on user input. The second section explains the aspect of the model-view separation which allows multi view editing (6.6). The next section shows how the undo/redo facility of the BlackBox Component Framework can be used if the content of a view is changed with the help of operation objects (6.7). In the last section the special structure of all extensible BlackBox Component Framework modules is explained, namely the separation of the interface and the implementation of a view (6.8). Directory objects are the key to this design pattern.\r\r\r"
                    attr: 3
                  - text: 6.2 Message handling
                    attr: 6
                  - text: "\r\rIn this section, we present a sequence of increasingly more versatile implementations of a view object which displays a rectangular colored area. In particular, this view will handle "
                    attr: 3
                  - text: Preferences
                    attr: 7
                  - text: ", "
                    attr: 3
                  - text: Controller messages
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: Properties
                    attr: 7
                  - text: ".\r\rEvery view is a subtype of the abstract type "
                    attr: 3
                  - text: Views.View
                    attr: 7
                  - text: ". The concrete extension must at least implement the abstract procedure "
                    attr: 3
                  - text: Views.Restore
                    attr: 7
                  - text: " that draws the view's contents. The first example of our view simply draws a red rectangle. This version is about the simplest possible view implementation. Its major components are the declaration of a "
                    attr: 3
                  - text: Views.View
                    attr: 7
                  - text: " extension, the implementation of a "
                    attr: 3
                  - text: Views.Restore
                    attr: 7
                  - text: " procedure which draws the contents of the view, and a command procedure which allocates and initializes the view:\r\r"
                    attr: 3
                  - ruler:
                      first: 180000
                      left: 180000
                      right: 180000
                      lead: 8100
