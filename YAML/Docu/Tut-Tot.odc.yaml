                  - text: ", Fonts.dir.Default())\r\tEND Restore;\r\r\tPROCEDURE (v: "
                    attr: 3
                  - text: Std
                    attr: 6
                  - text: "View) ThisModel (): Models.Model;\r\tBEGIN\r\t\tRETURN v.model\r\tEND ThisModel;\r\r\tPROCEDURE (v: "
                    attr: 3
                  - text: Std
                    attr: 6
                  - text: "View) HandleModelMsg (VAR msg: Models.Message);\r\tBEGIN\r\t\tViews.Update(v, Views.keepFrames)\t"
                    attr: 3
                  - text: "(* restore "
                    attr: 7
                  - text: v
                    attr: 3
                  - text: " in any frame that displays it *)"
                    attr: 7
                  - text: "\r"
