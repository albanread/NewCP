                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000003
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\rThe next preference we look at is "
                    attr: 3
                  - text: Properties.FocusPref
                    attr: 7
                  - text: .
                    attr: 3
                  - text: "\r\r"
                    attr: 6
                  - text: "\tTYPE\r\t\tFocusPref = RECORD (Properties.Preference)\r\t\t\tatLocation: BOOLEAN;   (* IN *)\r\t\t\tx, y: INTEGER;   (* IN *)\r\t\t\thotFocus, setFocus, selectOnFocus: BOOLEAN   (* OUT *)\r\t\tEND;\r\rWhen an attempt is made to activate an embedded view, by clicking in it, then the "
                    attr: 3
                  - text: Properties.FocusPref
                    attr: 7
                  - text: " message is sent to the view. If this message is not answered the view is selected as a whole (a so-called "
                    attr: 3
                  - text: singleton
                    attr: 7
                  - text: "). This is the behavior of the views implemented in the examples above. To see this, place the caret on the next line and click on the commander below, then on the pasted view:\r"
                    attr: 3
                  - view:
                      kind: TextViews.StdView
                      storeKind: store
                      typeChain:
                        - TextViews.StdViewDesc
                        - TextViews.ViewDesc
