                    attr: 3
                    w: 7119800
                    h: 459400
                  - text: "\rThis behavior is adequate if a view is passive. However, if the view contains editable contents, or if there are menu commands that operate on the view, the user should be able to "
                    attr: 3
                  - text: focus
                    attr: 7
                  - text: " the view. The focus is where keyboard input is sent to, where the current selection or caret are displayed (if there are any such marks), and where upon some menu commands operate. In fact, menus can be made to appear whenever a view is focused, and disappear as soon as the view loses focus (more on this below). A root view is always focused when its document window is focus (i.e., is the top window).\rIf an embedded view wants to become focus, it must answer the "
                    attr: 3
                  - text: "Properties.FocusPref "
                    attr: 7
                  - text: "message. The view can choose whether it wants to become focus permanently or if it wants only be focus as long as the mouse button is pressed. The latter is called a "
                    attr: 3
                  - text: hot focus
                    attr: 7
                  - text: ". A typical example of a hot focus is a command button. If a view wants to be a hot focus, it must set the flag "
                    attr: 3
                  - text: hotFocus
                    attr: 7
                  - text: ". The focus is then released immediately after the mouse is released. If a view wants to become focus permanently, then the flag "
                    attr: 3
                  - text: "setFocus "
                    attr: 7
                  - text: "must be set instead. "
                    attr: 3
                  - text: setFocus
                    attr: 7
                  - text: " should be set for all genuine editors, such that context-sensitive menu commands can be attached to the view. In addition to the "
                    attr: 3
                  - text: "setFocus "
                    attr: 7
                  - text: "flag, a view may set the "
                    attr: 3
                  - text: selectOnFocus
                    attr: 7
                  - text: " flag to indicate that upon focusing by keyboard, the view's contents should be selected. Text entry fields are prime examples for this behavior: the contents of a newly focused text entry field is selected, if the user focused it not by clicking in it, but by using the tabulator key.\rIf the user clicks in an unfocused view, then the "
                    attr: 3
                  - text: atLocation
                    attr: 7
                  - text: " flag is set by the framework before sending the message. The receiving view may decide whether to become focused depending on where the user clicked. The mouse position is passed to the view in the focus preference's "
                    attr: 3
                  - text: x
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: y
                    attr: 7
                  - text: " fields."
                    attr: 3
                  - text: " "
                    attr: 6
                  - text: "Text rulers are examples of views which become focused depending on the mouse location. If you click in the icons or in the area below the scale of a ruler, the ruler is not focused. Otherwise it is focused. Try this out with the ruler below. If you don't see a ruler, execute the "
                    attr: 3
                  - text: Show Marks
                    attr: 7
                  - text: " command in the "
                    attr: 3
                  - text: Text
                    attr: 7
                  - text: " menu.\rA view is not necessarily focused through a mouse click. In forms for example, the views can be selected using the tabulator key. There, the views do not become focused through a mouse click, and the "
                    attr: 3
                  - text: atLocation
                    attr: 7
                  - text: " field is accordingly set to "
                    attr: 3
                  - text: "FALSE"
                    attr: 7
                  - text: " by the framework.\r\rThe next version of our example will answer the "
                    attr: 3
                  - text: "FocusPref "
                    attr: 7
                  - text: "message and set the "
                    attr: 3
                  - text: setFocus
                    attr: 7
                  - text: " flag"
                    attr: 3
                  - text: .
                    attr: 7
                  - text: " This is done by adding the following statements to the previous example's "
                    attr: 3
                  - text: HandlePropMsg
                    attr: 7
                  - text: " procedure:\r\r\t\t| msg: Properties.FocusPref DO\r\t\t\tmsg.setFocus := TRUE\r\rIf an embedded view is focused, the frame of the view is marked with a suitable focus border mark, and view-specific menus may appear while others disappear.\r\r\r"
                    attr: 3
                  - text: 6.4 Controller messages
                    attr: 6
                  - text: "\r\rOther messages that may be interpreted by "
                    attr: 3
                  - text: HandlePropMsg
                    attr: 7
                  - text: " will be discussed later. Next we will see how a view can react on user input, e.g., on mouse clicks in the view or on commands called through a menu. For simple views this behavior is implemented in the procedure "
                    attr: 3
                  - text: Views.HandleCtrlMsg
                    attr: 7
                  - text: ". It is also possible to define a separate object, a so-called controller, that implements the interactive behavior of a view. Programming of controller objects is not described in this document, since controllers are only recommended for the most complex views.\r\rThe"
                    attr: 3
                  - text: Views.HandleCtrlMsg
                    attr: 7
                  - text: " handler answers the "
                    attr: 3
                  - text: "controller messages "
                    attr: 7
                  - text: "sent to the view. A controller message is a message that is sent along exactly one path in a view hierarchy, the "
                    attr: 3
                  - text: focus path
                    attr: 7
                  - text: ". Every view on the focus path decides for itself whether it is the terminal of this path, i.e., whether it is the current focus, or whether the message should be forwarded to one of its embedded views. It is important to note that all controller messages which are not relevant for a particular view type can simply be ignored.\r\rIn order to be able to perform edit operations on the focus view, the framework must allow to somehow perform these operations. Mouse clicks and key strokes can always be issued. However, how the menus should look like may be decided by the view itself. For that purpose, the message "
                    attr: 3
                  - text: Controllers.PollOpsMsg
                    attr: 7
                  - text: " is sent to the view. Depending on its current state (e.g., its current selection) and depending on the contents of the clipboard, the focus view can inform the framework of which editing operations it currently supports. The valid operations are elements of the {Controllers.cut, Controllers.copy, Controllers.paste, Controllers.pasteView} set.\r\r\tTYPE\r\t\tPollOpsMsg = RECORD (Controllers.Message)\r\t\t\ttype: Stores.TypeName;   (* OUT *)\r\t\t\tpasteType: Stores.TypeName;   (* IN *)\r\t\t\tsingleton: Views.View;   (* OUT *)\r\t\t\tselectable: BOOLEAN;   (* OUT *)\r\t\t\tvalid: SET   (* OUT *)\r\t\tEND;\r\rThe set of valid edit operations is returned in the "
                    attr: 3
                  - text: valid
                    attr: 7
                  - text: " field, where "
                    attr: 3
                  - text: "valid IN {Controllers.cut, Controllers.copy, Controllers.paste"
                    attr: 7
                  - text: "}. According to the set of valid operations, the corresponding menu entries in the "
                    attr: 3
                  - text: "Edit "
                    attr: 7
                  - text: "menu are enabled or disabled, e.g., "
                    attr: 3
                  - text: "Cut, Copy, Paste "
                    attr: 7
                  - text: "and "
                    attr: 3
                  - text: Paste Object...
                    attr: 7
                  - text: " (Windows) / "
                    attr: 3
                  - text: Paste as Part
                    attr: 7
                  - text: " (Mac OS). The field "
                    attr: 3
                  - text: pasteType
                    attr: 7
                  - text: " contains the concrete type of the view from which a copy would be pasted, if a paste operation occurred. Depending on this field, the view could decide whether it wants to support the paste operation or not. "
                    attr: 3
                  - text: PollOpsMsg
                    attr: 7
                  - text: " is sent when the user clicks in the menu bar. Its sole purpose is to enable or disable menu items, i.e., to provide user feedback.\rIf a view supports a selection of its contents, then "
                    attr: 3
                  - text: selectable
                    attr: 7
                  - text: " must be set to "
                    attr: 3
                  - text: "TRUE"
                    attr: 7
                  - text: ". As a consequence, the menu entry "
                    attr: 3
                  - text: Select All
                    attr: 7
                  - text: " will be enabled. The flag should be set regardless of whether a selection currently exists or not.\rIn the "
                    attr: 3
                  - text: type
                    attr: 7
                  - text: " field a type name may be passed. This name denotes a context for the focus view. This context is used to determine which menus are relevant for the focus view. As a convention, a view assigns the type name of its interface base type to "
                    attr: 3
                  - text: type
                    attr: 7
                  - text: ", e.g. \"ObxViews4.View\". A menu which indicates to be active on \"ObxViews4.View\" will be displayed if such a view is focus. The type name is used because it is easy to make unique, so that name collisions are avoided. The framework doesn't interpret the name.\rThe "
                    attr: 3
                  - text: "singleton "
                    attr: 7
                  - text: "field is only meaningful for container views. It denotes a container's currently selected view, if the selection consists of exactly one embedded view.\r\rThe following example view can become focus, supports the paste operation, and informs the framework that its contents is selectable. As a consequence, the menu entries "
                    attr: 3
                  - text: "Paste "
                    attr: 7
                  - text: " and "
                    attr: 3
                  - text: Select All
                    attr: 7
                  - text: "  in the "
                    attr: 3
                  - text: Edit
                    attr: 7
                  - text: " menu are enabled. Additionally, it defines the context \"Obx.Tutorial\". Therefore the following menu appears whenever the view is focused; provided that the menu has been installed.\rNote that the name of the context, in this case \"Obx.Tutorial\", by convention starts with the subsystem or a module name followed by a dot, in this case \"Obx.\". This is highly recommended, in order to make context names globally unique. Often, the name is simply the name of a view type, e.g., \"TextViews.View\".\rA menu can either be defined in the global menu text System/Rsrc/Menus, or more appropriately in its own subsystem's menu text, in this case in Obx/Rsrc/Menus . The global menu text then only needs an "
                    attr: 3
                  - text: "INCLUDE \"Obx\""
                    attr: 7
                  - text: " statement to make the Obx menus known.\r\r\t\t"
                    attr: 3
                  - text: MENU
                    attr: 6
                  - text: " \"New\" (\"Obx.Tutorial\")\r\t\t\t\"Beep\"\t\"\"\t\"Dialog.Beep\"\t\"\"\r\t\t"
                    attr: 3
                  - text: "END\r\t\t"
                    attr: 6
                  - text: "\r"
                    attr: 3
