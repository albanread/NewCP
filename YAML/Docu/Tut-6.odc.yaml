                  - text: "\r6.6 Model-View separation\r"
                    attr: 2
                  - text: "\rIn this section, we present a sequence of five increasingly more versatile versions of a view object which displays a string that may be typed in by the user. This string represents the view-specific data which it displays. We will see that multi-view editing is possible if this string is represented by a separate model object.\r\rLet us start with a first version of this view, where the string is stored in the view itself. Every view displays its own string. A string's length is limited to 255 characters, but no error handling is performed in the following demonstration programs.\r\t"
                    attr: 1
                  - ruler:
                      first: 180000
                      left: 180000
                      right: 180000
                      lead: 8100
                      asc: 145400
                      dsc: 32400
