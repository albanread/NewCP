                  - text: ".\r\r\r"
                    attr: 1
                  - text: "6.8 Separation of interface and implementation\r"
                    attr: 2
                  - text: "\rAs a last version of our sample view, we modify the previous variant by exporting the "
                    attr: 1
                  - text: Model
                    attr: 4
                  - text: " and "
                    attr: 1
                  - text: View
                    attr: 4
                  - text: " types, and by separating interface and implementation of these two types. In order to do the latter, so-called "
                    attr: 1
                  - text: directory
                    attr: 4
                  - text: " objects are introduced, which generate (hidden) default implementations of abstract data types. A user now might implement its own version of the abstract type and offer it through its own directory object, however he can not inherit from the default implementation and thus avoids the "
                    attr: 1
                  - text: fragile base class problem
                    attr: 4
                  - text: ".\r\rReal BlackBox subsystems would additionally split the module into two modules, one for the model and one for the view. A third module with commands might be introduced, if the number and complexity of commands warrant it (e.g., "
                    attr: 1
                  - text: TextModels
                    attr: 4
                  - text: ", "
                    attr: 1
                  - text: TextViews
                    attr: 4
                  - text: ", and "
                    attr: 1
                  - text: TextCmds
                    attr: 4
                  - text: "). Even more complicated views would further split views into views and controllers, each in its own module.\r\r"
                    attr: 1
                  - ruler:
                      first: 180000
                      left: 180000
                      right: 180000
                      lead: 8100
                      asc: 145400
                      dsc: 32400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 360000 }
                        - { stop: 540000 }
                        - { stop: 720000 }
