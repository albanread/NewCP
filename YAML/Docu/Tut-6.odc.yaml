                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "MODULE ObxViews10;\r\r\tIMPORT Fonts, Ports, Views, Controllers, Properties;\r\r\tCONST d = 20 * Ports.point;\r\r\tTYPE\r\t\tView = POINTER TO RECORD (Views.View)\r\t\t\ti: INTEGER;\t\t\t\t"
                    attr: 1
                  - text: "(* position of next free slot in string *)"
                    attr: 4
                  - text: "\r\t\t\ts: ARRAY 256 OF CHAR\t"
                    attr: 1
                  - text: "(* string *)"
                    attr: 4
                  - text: "\r\t\tEND;\r\r\tPROCEDURE (v: View) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tf.DrawString(d, d, Ports.black, v.s, Fonts.dir.Default())\r\tEND Restore;\r\r\tPROCEDURE (v: View) HandleCtrlMsg (f: Views.Frame;\r\t\t\t\t\t\t\t\t\t\tVAR msg: Controllers.Message; \r\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\tBEGIN\r\t\tWITH msg: Controllers.EditMsg DO\r\t\t\tIF msg.op = Controllers.pasteChar THEN\t"
                    attr: 1
                  - text: "(* accept typing *)"
                    attr: 4
                  - text: "\r\t\t\t\tv.s[v.i] := msg.char; INC(v.i); v.s[v.i] := 0X;\t"
                    attr: 1
                  - text: "(* append character to string *)"
                    attr: 4
                  - text: "\r\t\t\t\tViews.Update(v, Views.keepFrames)\t"
                    attr: 1
                  - text: "(* restore v in any frame that displays it *)"
                    attr: 4
                  - text: "\r\t\t\tEND\r\t\tELSE\t\t\t\t\t\t"
                    attr: 1
                  - text: "(* ignore other messages *)"
                    attr: 4
                  - text: "\r\t\tEND\r\tEND HandleCtrlMsg;\r\t\r\tPROCEDURE (v:View) HandlePropMsg (VAR msg: Properties.Message);\r\tBEGIN\r\t\tWITH msg: Properties.SizePref DO\r\t\t\tIF (msg.w = Views.undefined) OR (msg.h = Views.undefined) THEN \r\t\t\t\tmsg.w := 10 * d; msg.h := 2 * d\r\t\t\tEND\r\t\t| msg: Properties.FocusPref DO\r\t\t\tmsg.setFocus := TRUE\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\r\tPROCEDURE Deposit*;\r\t\tVAR v: View;\r\tBEGIN\r\t\tNEW(v); v.s := \"\"; v.i := 0;\r\t\tViews.Deposit(v)\r\tEND Deposit;\r\rEND ObxViews10.\r\r"
                    attr: 1
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 83
                      bodyPos: 8074
                      bodyLen: 6
                    attr: 1
                    w: 177800
                    h: 152400
                  - text: " \"ObxViews10.Deposit; StdCmds.Open\"\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 0
                      lead: 11500
                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000003
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "\rAs described in the last section, a character typed in is sent to the view in the form of a controller message record ("
                    attr: 1
                  - text: Controllers.Message
                    attr: 4
                  - text: "), to be handled by the view's "
                    attr: 1
                  - text: HandleCtrlMsg
                    attr: 4
                  - text: " procedure. This procedure is called with a "
                    attr: 1
                  - text: Controllers.EditMsg
                    attr: 4
                  - text: " as actual parameter when a character was typed in, and it reacts by inserting the character contained in the message into its field "
                    attr: 1
                  - text: s
                    attr: 4
                  - text: ". Afterwards, it causes the view to be restored; i.e., wherever the view is visible on the display it is redrawn in its new state, displaying the string that has become one character longer.\r\rIn the above example, a view contains a variable state (the view's string field "
                    attr: 1
                  - text: s
                    attr: 4
                  - text: "). This state should be saved when the window's contents are saved to disk. For this purpose, a view provides two procedures, called "
                    attr: 1
                  - text: Internalize
                    attr: 4
                  - text: " and "
                    attr: 1
                  - text: Externalize
                    attr: 4
                  - text: ", whose uses are shown in the next iteration of our example program:\r\r"
                    attr: 1
                  - ruler:
                      first: 180000
                      left: 180000
                      right: 180000
                      lead: 8100
                      asc: 145400
                      dsc: 32400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 360000 }
                        - { stop: 540000 }
                        - { stop: 720000 }
                        - { stop: 900000 }
                        - { stop: 1080000 }
                        - { stop: 1260000 }
                        - { stop: 1440000 }
                        - { stop: 1620000 }
                        - { stop: 1800000 }
                        - { stop: 2700000 }
                        - { stop: 3780000 }
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "MODULE ObxViews11;\r"
                    attr: 1
                  - text: "(* Same as ObxViews10, but the view's string can be stored and copied *)"
                    attr: 4
                  - text: "\r\r\tIMPORT Fonts, Ports, "
                    attr: 1
                  - text: "Stores,"
                    attr: 2
                  - text: " Views, Controllers, Properties;\r\r\tCONST d = 20 * Ports.point;\r\r\tTYPE\r\t\tView = POINTER TO RECORD (Views.View)\r\t\t\ti: INTEGER;\t\t\t\t"
                    attr: 1
                  - text: "\t(* position of next free slot in string *)"
                    attr: 4
                  - text: "\r\t\t\ts: ARRAY 256 OF CHAR\t\t"
                    attr: 1
                  - text: "(* string *)"
                    attr: 4
                  - text: "\r\t\tEND;\r\r\t"
                    attr: 1
                  - text: "PROCEDURE (v: View) Internalize (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER;\r\tBEGIN\r\t\trd.ReadVersion(0, 0, version);\r\t\tIF ~rd.cancelled THEN\r\t\t\trd.ReadInt(v.i); rd.ReadString(v.s)\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (v: View) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteVersion(0);\r\t\twr.WriteInt(v.i); wr.WriteString(v.s)\r\tEND Externalize;"
                    attr: 2
                  - text: "\r\r\t"
                    attr: 1
                  - text: "PROCEDURE (v: View) CopyFromSimpleView (source: Views.View);\r\tBEGIN\r\t\tWITH source: View DO\r\t\t\tv.i := source.i; v.s := source.s\r\t\tEND\r\tEND CopyFromSimpleView;"
                    attr: 2
                  - text: "\r\r\tPROCEDURE (v: View) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tf.DrawString(d, d, Ports.black, v.s, Fonts.dir.Default())\r\tEND Restore;\r\r\tPROCEDURE (v: View) HandleCtrlMsg (f: Views.Frame;\r\t\t\t\t\t\t\t\t\t\t\tVAR msg: Controllers.Message;\r\t\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\tBEGIN\r\t\tWITH msg: Controllers.EditMsg DO\r\t\t\tIF msg.op = Controllers.pasteChar THEN\t"
                    attr: 1
                  - text: "(* accept typing *)"
                    attr: 4
                  - text: "\r\t\t\t\tv.s[v.i] := msg.char; INC(v.i); v.s[v.i] := 0X;\t"
                    attr: 1
                  - text: "(* append character to string *)"
                    attr: 4
                  - text: "\r\t\t\t\t"
                    attr: 1
                  - text: Views.SetDirty(v);
                    attr: 2
                  - text: "\t(* mark view's document as dirty *)"
                    attr: 4
                  - text: "\r\t\t\t\tViews.Update(v, Views.keepFrames)\t"
                    attr: 1
                  - text: "(* restore "
                    attr: 4
                  - text: v
                    attr: 1
                  - text: " in any frame that displays it *)"
                    attr: 4
                  - text: "\r\t\t\tEND\r\t\tELSE\t\t\t\t\t\t"
                    attr: 1
                  - text: "\t(* ignore other messages *)"
                    attr: 4
                  - text: "\r\t\tEND\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE (v:View) HandlePropMsg (VAR msg: Properties.Message);\r\tBEGIN\r\t\tWITH msg: Properties.SizePref DO\r\t\t\tIF (msg.w = Views.undefined) OR (msg.h = Views.undefined) THEN\r\t\t\t\tmsg.w := 10 * d; msg.h := 2 * d\r\t\t\tEND\r\t\t| msg: Properties.FocusPref DO\r\t\t\tmsg.setFocus := TRUE\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\r\tPROCEDURE Deposit*;\r\t\tVAR v: View;\r\tBEGIN\r\t\tNEW(v); v.s := \"\"; v.i := 0;\r\t\tViews.Deposit(v)\r\tEND Deposit;\r\rEND ObxViews11.\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 0
                      lead: 11500
                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000003
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "\rA few comments about "
                    attr: 1
                  - text: View.Internalize
                    attr: 4
                  - text: " and "
                    attr: 1
                  - text: View.Externalize
                    attr: 4
                  - text: " are in order here: First, the two procedures have a reader, respectively a writer, as variable parameters. These file mappers are set up by BlackBox itself; a view simply uses them.\r\rSecond, "
                    attr: 1
                  - text: View.Internalize
                    attr: 4
                  - text: " must read exactly the same (amount of) data that "
                    attr: 1
                  - text: View.Externalize
                    attr: 4
                  - text: " has written.\r\rThird, a user interface typically defines some visual distinction for documents that contain modified views, i.e., for \"dirty\" documents. Or it may require that when the user closes a dirty document, he or she should be asked whether to save it or not. In order to make this possible, a view must tell when its contents has been modified. This is done by the "
                    attr: 1
                  - text: Views.BeginModification
                    attr: 4
                  - text: " /"
                    attr: 1
                  - text: Views.EndModification
                    attr: 4
                  - text: " calls.\r\rIn addition to "
                    attr: 1
                  - text: View.Internalize
                    attr: 4
                  - text: " and "
                    attr: 1
                  - text: View.Externalize
                    attr: 4
                  - text: ", the above view implementation also implements a "
                    attr: 1
                  - text: CopyFromSimpleView
                    attr: 4
                  - text: " procedure. Such a procedure should copy the view's contents, given a source view of the same type. "
                    attr: 1
                  - text: CopyFromSimpleView
                    attr: 4
                  - text: " should usually have the same effect as if the source's contents were externalized on a temporary file, and then internalized again by the destination view. There can be exceptions, though. For example, a text copies even temporary embedded views such as error markers, but it doesn't externalize them.\r\rA view that contains (mutable) state should implement "
                    attr: 1
                  - text: CopyFromSimpleView
                    attr: 4
                  - text: ", so that it can be printed. The reason that this is necessary is that the framework makes a shallow copy of a view that is being printed, in order to avoid the original view to be changed by pagination, scrolling, or similar modifications that may be performed during printing.\r\rBasically, "
                    attr: 1
                  - text: ObxViews11
                    attr: 4
                  - text: " has shown most of what is involved in implementing a simple view class. Such simple views are often sufficient; thus it is important that they are easy to implement. However, there are cases where a more advanced view design is in order. In particular, if a window normally can only display a small part of a view's contents, "
                    attr: 1
                  - text: multi-view editing
                    attr: 4
                  - text: " should be supported.\r\rMulti-view editing means that there may be several views showing the same data. The typical application of this feature is to have two or more windows displaying the same document, each of these windows showing a different part of it in its own view. Thus, if a view's data has been changed, it and all the other affected views must be notified of the change, such that they can update the display accordingly.\r\rThe following sample program, which is the same as the previous one except that it supports multi-view editing, is roughly twice as long. This indicates that the design and implementation of such views is quite a bit more involved than that of simple views. It is a major design decision whether this additional complexity is warranted by its increased convenience.\r\r"
                    attr: 1
                  - ruler:
                      first: 180000
                      left: 180000
                      right: 180000
                      lead: 8100
                      asc: 145400
                      dsc: 32400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 360000 }
                        - { stop: 540000 }
                        - { stop: 720000 }
                        - { stop: 900000 }
                        - { stop: 1080000 }
                        - { stop: 1260000 }
                        - { stop: 1440000 }
                        - { stop: 1620000 }
                        - { stop: 1800000 }
                        - { stop: 3780000 }
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "MODULE ObxViews12;\r"
                    attr: 1
                  - text: "(* Same as ObxViews11, but uses a separate model for the string *)"
                    attr: 4
                  - text: "\r\r\tIMPORT Fonts, Ports, Stores, "
                    attr: 1
                  - text: "Models,"
                    attr: 2
                  - text: " Views, Controllers, Properties;\r\r\tCONST d = 20 * Ports.point;\r\r\tTYPE\r\t\t"
                    attr: 1
                  - text: "Model = POINTER TO RECORD (Models.Model)\r\t\t\ti: INTEGER;\t\t\t"
                    attr: 2
                  - text: "(* position of next free slot in string *)"
                    attr: 4
                  - text: "\r\t\t\t"
                    attr: 1
                  - text: "s: ARRAY 256 OF CHAR\t"
                    attr: 2
                  - text: "(* string *)"
                    attr: 4
                  - text: "\r\t\tEND;\r\r\t\tView = POINTER TO RECORD (Views.View)\r\t\t\t"
                    attr: 1
                  - text: "model: Model"
                    attr: 2
                  - text: "\r\t\tEND;\r\r\r\t"
                    attr: 1
                  - text: "(* Model *)"
                    attr: 4
                  - text: "\r\r\t"
                    attr: 1
                  - text: "PROCEDURE (m: Model) Internalize (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER;\r\tBEGIN\r\t\trd.ReadVersion(0, 0, version);\r\t\tIF ~rd.cancelled THEN\r\t\t\trd.ReadInt(m.i); rd.ReadString(m.s)\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (m: Model) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteVersion(0);\r\t\twr.WriteInt(m.i); wr.WriteString(m.s)\r\tEND Externalize;\r\r\tPROCEDURE (m: Model) CopyFrom (source: Stores.Store);\r\tBEGIN\r\t\tWITH source: Model DO\r\t\t\tm.i := source.i; m.s := source.s\r\t\tEND\r\tEND CopyFrom;\r"
                    attr: 2
                  - text: "\r\r\t"
                    attr: 1
                  - text: "(* View *)"
                    attr: 4
                  - text: "\r\r\tPROCEDURE (v: View) Internalize (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER; st: Stores.Store;\r\tBEGIN\r\t\trd.ReadVersion(0, 0, version);\r\t\tIF ~rd.cancelled THEN\r\t\t\t"
                    attr: 1
                  - text: "rd.ReadStore(st);\r\t\t\tv.model := st(Model)\r\t\tEND"
                    attr: 2
                  - text: "\r\tEND Internalize;\r\r\tPROCEDURE (v: View) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteVersion(0);\r\t\t"
                    attr: 1
                  - text: wr.WriteStore(v.model)
                    attr: 2
                  - text: "\r\tEND Externalize;\r\r"
                    attr: 1
                  - text: "\tPROCEDURE (v: View) CopyFromModelView (source: Views.View;\r\t\t\t\t\t\t\t\t\t\tmodel: Models.Model);\r\tBEGIN\r\t\tv.model := model(Model)\r\tEND CopyFromModelView;\r"
                    attr: 2
                  - text: "\r\tPROCEDURE (v: View) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tf.DrawString(d, d, Ports.black, "
                    attr: 1
                  - text: v.model.s
                    attr: 2
                  - text: ", Fonts.dir.Default())\r\tEND Restore;\r\r\t"
                    attr: 1
                  - text: "PROCEDURE (v: View) ThisModel (): Models.Model;\r\tBEGIN\r\t\tRETURN v.model\r\tEND ThisModel;"
                    attr: 2
                  - text: "\r\r\t"
                    attr: 1
                  - text: "PROCEDURE (v: View) HandleModelMsg (VAR msg: Models.Message);\r\tBEGIN\r\t\tViews.Update(v, Views.keepFrames)"
                    attr: 2
                  - text: "\t"
                    attr: 1
                  - text: "(* restore "
                    attr: 4
                  - text: v
                    attr: 1
                  - text: " in any frame that displays it *)"
                    attr: 4
                  - text: "\r"
                    attr: 1
                  - text: "\tEND HandleModelMsg;"
                    attr: 2
                  - text: "\r\r\tPROCEDURE (v: View) HandleCtrlMsg (f: Views.Frame;\r\t\t\t\t\t\t\t\t\t\tVAR msg: Controllers.Message;\r\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\t\t"
                    attr: 1
                  - text: "VAR m: Model; umsg: Models.UpdateMsg;"
                    attr: 2
                  - text: "\r\tBEGIN\r\t\tWITH msg: Controllers.EditMsg DO\r\t\t\tIF msg.op = Controllers.pasteChar THEN\r\t\t\t\t"
                    attr: 1
                  - text: "m := v.model;"
                    attr: 2
                  - text: "\r\t\t\t\t"
                    attr: 1
                  - text: "m.s[m.i] := msg.char; INC(m.i);\r\t\t\t\tm.s[m.i] := 0X;"
                    attr: 2
                  - text: "\t"
                    attr: 1
                  - text: "(* append character to string *)"
                    attr: 4
                  - text: "\r\t\t\t\t"
                    attr: 1
                  - text: Views.SetDirty(v);
                    attr: 2
                  - text: "\t"
                    attr: 1
                  - text: "(* mark view's document as dirty *)"
                    attr: 4
                  - text: "\r\t\t\t\t"
                    attr: 1
                  - text: "Models.Broadcast(m, umsg)"
                    attr: 2
                  - text: "\t"
                    attr: 1
                  - text: "(* update all views on this model *)"
                    attr: 4
                  - text: "\r\t\t\tEND\r\t\tELSE\t\t\t\t\t\t"
                    attr: 1
                  - text: "(* ignore other messages *)"
                    attr: 4
                  - text: "\r\t\tEND\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE (v:View) HandlePropMsg (VAR msg: Properties.Message);\r\tBEGIN\r\t\tWITH msg: Properties.SizePref DO\r\t\t\tIF (msg.w = Views.undefined) OR (msg.h = Views.undefined) THEN\r\t\t\t\tmsg.w := 10 * d; msg.h := 2 * d\r\t\t\tEND\r\t\t| msg: Properties.FocusPref DO\r\t\t\tmsg.setFocus := TRUE\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\r\tPROCEDURE Deposit*;\r\t\tVAR v: View;"
                    attr: 1
                  - text: " m: Model;"
                    attr: 2
                  - text: "\r\tBEGIN\r\t\t"
                    attr: 1
                  - text: "NEW(m); m.i := 0; m.s := \"\";\r\t\t"
                    attr: 2
                  - text: NEW(v);
                    attr: 1
                  - text: " v.model := m; Stores.Join(v, m);"
                    attr: 2
                  - text: "\r\t\tViews.Deposit(v)\r\tEND Deposit;\r\rEND ObxViews12.\r\t\r"
                    attr: 1
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 92
                      bodyPos: 9345
                      bodyLen: 6
                    attr: 1
                    w: 177800
                    h: 152400
                  - text: " \"ObxViews12.Deposit; StdCmds.Open\"\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 0
                      lead: 11500
                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000003
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "\rMulti-view editing is realized by factoring out the view's data into a separate data structure, called a "
                    attr: 1
                  - text: model
                    attr: 4
                  - text: ". This model is shared between all its views, i.e., each such view contains a pointer to the model:\r\r\r"
                    attr: 1
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 95
                      bodyPos: 9556
                      bodyLen: 1179
                    attr: 1
                    w: 5003688
                    h: 1777960
                  - text: "\r\rFigure 6.2:  Two Views on one Model\r\rA model is, like a view, an extension of a "
                    attr: 1
                  - text: Stores.Store
                    attr: 4
                  - text: ", which is the base type for all persistent objects. Stores define the "
                    attr: 1
                  - text: Internalize
                    attr: 4
                  - text: " and "
                    attr: 1
                  - text: Externalize
                    attr: 4
                  - text: " procedures we've already met for a view. In "
                    attr: 1
                  - text: ObxViews12
                    attr: 4
                  - text: ", the model stores the string and its length, while the view stores the whole model! For this purpose, a "
                    attr: 1
                  - text: Stores.Writer
                    attr: 4
                  - text: " provides a "
                    attr: 1
                  - text: WriteStore
                    attr: 4
                  - text: " and a "
                    attr: 1
                  - text: Stores.Reader
                    attr: 4
                  - text: " provides a "
                    attr: 1
                  - text: ReadStore
                    attr: 4
                  - text: " procedure.\r\rStores may form arbitrary graphs. For example, one or several views may refer to the same model, both models and views are store extensions. A graph of stores that may be saved in a file is called a "
                    attr: 1
                  - text: document
                    attr: 4
                  - text: ". In order to recognize the boundary of a document upon externalization, stores are bound to a "
                    attr: 1
                  - text: domain
                    attr: 4
                  - text: . All stores of a document refer to the same domain object (
                    attr: 1
                  - text: Stores.Domain
                    attr: 4
                  - text: ").\r\rDomains are also used as containers for operations, i.e., commands performed on some store which can be undone and redone (see next chapter). The operation history is associated with a domain. Furthermore, domains define the set of objects which get notified in a broadcast (either "
                    attr: 1
                  - text: Views.Broadcast
                    attr: 4
                  - text: ", "
                    attr: 1
                  - text: Views.Domaincast
                    attr: 4
                  - text: " or "
                    attr: 1
                  - text: Models.Broadcast
                    attr: 4
                  - text: ").\r\rFor more information on stores and domains, see the on-line documentation of module "
                    attr: 1
                  - text: Stores
                    attr: 4
                  - text: ".\r\rNow that the model is separated from the view, copying is done by the model, not by the view anymore.\r\r"
                    attr: 1
                  - text: View.ThisModel
                    attr: 4
                  - text: " returns the model of the view. Its default implementation returns "
                    attr: 1
                  - text: NIL
                    attr: 4
                  - text: ", which should be overridden in views that contain models. This procedure is used by the framework to find all views that display a given model, in order to implement model broadcasts, as described in the next paragraph.\r\rViews with a model implement the procedure "
                    attr: 1
                  - text: View.CopyFromModelView
                    attr: 4
                  - text: " instead of "
                    attr: 1
                  - text: View.CopyFromSimpleView
                    attr: 4
                  - text: ". Like "
                    attr: 1
                  - text: Internalize
                    attr: 4
                  - text: " and "
                    attr: 1
                  - text: Externalize
                    attr: 4
                  - text: ", "
                    attr: 1
                  - text: CopyFromSimpleView
                    attr: 4
                  - text: " and "
                    attr: 1
                  - text: CopyFromModelView
                    attr: 4
                  - text: " are exported as implement-only procedures, i.e., they can only be implemented, but not called. They are called internally in module "
                    attr: 1
                  - text: Views
                    attr: 4
                  - text: ", in its "
                    attr: 1
                  - text: CopyOf
                    attr: 4
                  - text: " and "
                    attr: 1
                  - text: CopyWithNewModel
                    attr: 4
                  - text: " functions.\r\rWhen a model changes, all views displaying it must be updated. For this purpose, a "
                    attr: 1
                  - text: model broadcast
                    attr: 4
                  - text: " is generated: A model broadcast notifies all views which display a particular model about a model modification that has happened. This gives each view the opportunity to restore its contents on the screen. A model broadcast is generated in the "
                    attr: 1
                  - text: View.HandleCtrlMsg
                    attr: 4
                  - text: " procedure by calling "
                    attr: 1
                  - text: Models.Broadcast
                    attr: 4
                  - text: ". The message is received by every view which contains the correct model, via its "
                    attr: 1
                  - text: View.HandleModelMsg
                    attr: 4
                  - text: " procedure.\r\rThis indirection becomes important if different types of views display the same model, e.g., a tabular view and a graphical view on a spreadsheet model; and if instead of restoring the whole view  as has been done in our examples  only the necessary parts of the views are restored. These necessary parts may be completely different for different types of views.\r\rA very sophisticated model may be able to contain (\"embed\") arbitrary views as part of its contents. For example, a text view may display a text model which contains not only characters (its "
                    attr: 1
                  - text: intrinsic contents
                    attr: 4
                  - text: "), but also graphical or other views flowing along in the text stream.\r\rThe combination of multi-view editing and hierarchical view embedding can lead to the following situation, where two text views show the same text model, which in turn contains a graphics view. Each text view lives in its own window and thus has its own frame. The graphics view is unique however, since it is embedded in the text model, which is shared by both views. Nevertheless the graphics can be visible in both text views simultaneously, and thus there can be two frames for this one view:\r\r\r"
                    attr: 1
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 96
                      bodyPos: 11085
                      bodyLen: 1974
                    attr: 1
                    w: 5003695
                    h: 2819340
                  - text: "\r\rFigure 6-3:  Two Frames on one View\r\rAs a consequence, one and the same view may be visible in several places on the screen simultaneously. In this case, this means that when the view has changed, several places must be updated: the view must restore the necessary area once for every frame on this view. As a consequence, a notification mechanism must exist which lets the view update each of its frames. This is done in a similar way as the notification mechanism for model changes: with a "
                    attr: 1
                  - text: view broadcast
                    attr: 4
                  - text: ". Fortunately, there is a standard update mechanism in the framework which automatically handles this second broadcast level (see below).\r\rWe now can summarize the typical events that occur when a user interacts with a view:\r\rController message handling:\r\r1) Some controller message is sent to the focus view.\r2) The focus view interprets the message and changes its model accordingly.\r3) The model broadcasts a model message, describing the change that has been performed.\r\rModel message handling:\r\r4) Every view on this model receives the model message.\r5) It determines how its display should change because of this model modification.\r6) It broadcasts a view message, describing how its display should change.\r\rView message handling:\r\r7) The view receives the view notification message once for every frame on this view.\r8) Every time, the view redraws the frame contents according to the view message.\r\rThis mechanism is fundamental to the BlackBox Component Framework. If you have understood it, you have mastered the most complicated part of a view implementation. Interpreting the various controller messages, which are defined in module "
                    attr: 1
                  - text: Controllers
                    attr: 4
                  - text: ", is more a matter of diligence than of understanding difficult new concepts. Moreover, you only need to interpret the controller messages in which you are interested, because messages that are not relevant can simply be ignored.\r\rUsually, steps 6, 7, and 8 are handled automatically by the framework: the view merely calls "
                    attr: 1
                  - text: Views.Update
                    attr: 4
                  - text: " if a whole view should be updated, or "
                    attr: 1
                  - text: Views.UpdateIn
                    attr: 4
                  - text: " if some rectangular part of the view should be updated. Calls of these update procedures cause a "
                    attr: 1
                  - text: lazy update
                    attr: 4
                  - text: ", i.e., the framework adds up the region to be updated, but does "
                    attr: 1
                  - text: not
                    attr: 4
                  - text: " immediately cause any redrawing. Instead, the command first runs to completion, so that all data structures of the modified views are consistent again. Only the display of the views is still the same as before the command. But then the framework restores all views that have been marked for update. This means that for every frame that displays a view, the view's "
                    attr: 1
                  - text: Restore
                    attr: 4
                  - text: " method is called with this frame as argument. If the view is displayed in two (or more) frames in different windows, it is restored two (or more) times; once for every frame. When the framework starts restoring frames of a window, it temporarily redirects the drawing operations of a port into a background pixelmap buffer. When all frames of this window that need updating have been restored, the framework copies the pixelmap buffer to the screen pixelmap, and turns off the redirection of drawing operations.\r\rThe effect of this buffering mechanism and of the lazy update mechanism is that minimal flickering occurs. The lazy update mechanism (also used by Apple for the Mac OS, and by Microsoft for Windows) means that even for complex editing operations, a given screen region is only restored once. This can reduce flickering, since flickering can occur when the same area is drawn several times in rapid succession. The buffering mechanism reduces flickering if drawing occurs in layers, from \"bottom\" to \"top\" (because this also means drawing several time in rapid succession). For example, you may first draw the background in one color, and then the a filled rectangle on top of it in another color. Thanks to the buffering mechanism, the user never sees the situation after the background is drawn, but before the rectangle is drawn.\r\rThe lazy update mechanism also has another advantage: it completely decouples the modification of a model from its drawing. Without this mechanism, it can become rather difficult to correctly perform screen updates for complex editing operations. For example, consider moving a selection of graphics objects in a graphics editor. The selected objects first must be deleted at their old position, this may mean that other objects that have been obscured by the selection now need to be drawn (but not the selected objects themselves!). Then the objects' positions are changed, and then they are redrawn at their new positions (if the source and target positions overlap, drawing has now happened twice). Drawing may have to be done several times, if there are several windows displaying the same data. But of course the change of object positions must only occur once. It is much less tricky to simply call "
                    attr: 1
                  - text: Views.UpdateIn
                    attr: 4
                  - text: " for all rectangles that (may) need updating, and to let the framework call the necessary "
                    attr: 1
                  - text: Restore
                    attr: 4
                  - text: " methods later!\r\rNormally, the lazy update mechanism is sufficient. Thus a view programmer needs to use explicit view messages only if no complete restore in all frames of a view is desired. This is the case only for marks like selection, focus, or carets, or for rubberbanding or similar feedback effects during mouse tracking. Such marks can sometimes be handled more efficiently because they are involutory: applied twice, they have no effect. Thus marks are often switched on and off through custom view messages "
                    attr: 1
                  - text: during
                    attr: 4
                  - text: " a command, not through the delaying lazy update mechanism. But except for such light-weight marks, you should always use the lazy update mechanism described above. Note that there exists a method "
                    attr: 1
                  - text: Ports.Frame.MarkRect
                    attr: 4
                  - text: " explicitly for drawing such marks.\r\r\r"
                    attr: 1
                  - text: 6.7 Operations
                    attr: 2
                  - text: "\r\rNow that we have seen the crucial ingredients of a view implementation, a less central feature can be presented. The next program is a variation of the above one, in which a controller message is not interpreted directly. Instead, an "
                    attr: 1
                  - text: operation
                    attr: 4
                  - text: " object is created and then executed. An operation provides a "
                    attr: 1
                  - text: do / undo / redo
                    attr: 4
                  - text: " capability, as shown in the program below.\r\rThe operation we define in this example is the "
                    attr: 1
                  - text: PasteCharOp
                    attr: 4
                  - text: ". The operation's "
                    attr: 1
                  - text: Do
                    attr: 4
                  - text: " procedure performs the desired modification, and must be involutory, i.e. when called twice, its effect must have been neutralized again. We use the flag "
                    attr: 1
                  - text: PasteCharOp.do
                    attr: 4
                  - text: " to specify whether the character"
                    attr: 1
                  - text: " PasteCharOp.char"
                    attr: 4
                  - text: " has to be inserted into or removed from the model "
                    attr: 1
                  - text: PasteCharOp.m
                    attr: 4
                  - text: ". In any case, the "
                    attr: 1
                  - text: Do
                    attr: 4
                  - text: " procedure has to update all views on the model "
                    attr: 1
                  - text: "PasteCharOp.m "
                    attr: 4
                  - text: "with a model broadcast.\r\rThe procedure "
                    attr: 1
                  - text: NewPasteCharOp
                    attr: 4
                  - text: " generates a new operation and the procedure "
                    attr: 1
                  - text: Models.Do
                    attr: 4
                  - text: " executes this operation, i.e., the operation's "
                    attr: 1
                  - text: Do
                    attr: 4
                  - text: " procedure is called and the operation is recorded for a later undo. The name of the operation as specified in the "
                    attr: 1
                  - text: Models.Do
                    attr: 4
                  - text: " command will appear in the "
                    attr: 1
                  - text: Edit
                    attr: 4
                  - text: " menu after the "
                    attr: 1
                  - text: Undo
                    attr: 4
                  - text: " or "
                    attr: 1
                  - text: Redo
                    attr: 4
                  - text: " entry respectively.\r\r"
                    attr: 1
