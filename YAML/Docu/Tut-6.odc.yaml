                  - text: "\rA simple example of a BlackBox module which follows this design is "
                    attr: 1
                  - text: DevMarkers
                    attr: 4
                  - text: ". The marker views are simple views without a model, therefore only a directory object to generate new views is offered. The second directory object "
                    attr: 1
                  - text: DevMarkers.stdDir
                    attr: 4
                  - text: " keeps the standard implementation provided by this module. It might be used to install back the default implementation or to reuse the default implementation (as an instance) in another component.\r\rThe separation of a type's definition from its implementation is recommended in the design of new BlackBox subsystems. However, simple view types which won't become publicly available or which are not meant to be extended can certainly dispense with this additional effort.\r\rNote that the subsystem wizard (menu item Tools->Create Subsystem...) helps to generate templates for the different kinds of view. In particular, it is possible to generate separate model and view modules. The tool uses the template texts stored in "
                    attr: 1
                  - text: Dev/Rsrc/New
                    attr: 4
                  - text: ". You may want to study the files "
                    attr: 1
                  - text: Models5
                    attr: 4
                  - text: ", "
                    attr: 1
                  - text: Views5
                    attr: 4
                  - text: ", and "
                    attr: 1
                  - text: Cmds5
                    attr: 4
                  - text: " in this directory.\r"
                    attr: 1
