                        - { stop: 1080000 }
                        - { stop: 1260000 }
                        - { stop: 1440000 }
                        - { stop: 1620000 }
                        - { stop: 1800000 }
                        - { stop: 3780000 }
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "MODULE ObxViews14;\r"
                    attr: 1
                  - text: "(* Same as ObxViews13, but interfaces and implementations separated, and operation directly in Insert procedure *)"
                    attr: 4
                  - text: "\r\r\tIMPORT Fonts, Ports, Stores, Models, Views, Controllers, Properties;\r\r\tCONST d = 20 * Ports.point;\r\r\tTYPE\r\t\t"
                    attr: 1
                  - text: "Model* = POINTER TO ABSTRACT RECORD (Models.Model) END;\r\r\t\tModelDirectory* = POINTER TO ABSTRACT RECORD END;\r"
                    attr: 2
                  - text: "\r\t\t"
                    attr: 1
                  - text: "View* = POINTER TO ABSTRACT RECORD (Views.View) END;\r"
                    attr: 2
                  - text: "\r\t\t"
                    attr: 1
                  - text: "Directory* = POINTER TO ABSTRACT RECORD END;"
                    attr: 2
                  - text: "\r\r\r\t\t"
                    attr: 1
                  - text: "StdModel = POINTER TO RECORD (Model)\r"
                    attr: 2
                  - text: "\t\t"
                    attr: 1
                  - text: "\ti: INTEGER;\t\t\t"
                    attr: 2
                  - text: "(* position of next free slot in string *)"
                    attr: 4
                  - text: "\r"
                    attr: 1
                  - text: "\t\t\ts: ARRAY 256 OF CHAR\t"
                    attr: 2
                  - text: "(* string *)"
                    attr: 4
                  - text: "\r\t\t"
                    attr: 1
                  - text: END;
                    attr: 2
                  - text: "\r\r\t\t"
                    attr: 1
                  - text: StdModelDirectory = POINTER TO RECORD (ModelDirectory) END;
                    attr: 2
                  - text: "\r\r\t\t"
                    attr: 1
                  - text: StdView = POINTER TO RECORD (View)
                    attr: 2
                  - text: "\r"
                    attr: 1
                  - text: "\t\t\tmodel: Model\r"
                    attr: 2
                  - text: "\t\t"
                    attr: 1
                  - text: END;
                    attr: 2
                  - text: "\r\r\t\t"
                    attr: 1
                  - text: StdDirectory = POINTER TO RECORD (Directory) END;
                    attr: 2
                  - text: "\r\r\t\tPasteCharOp = POINTER TO RECORD (Stores.Operation)\r\t\t\tmodel: StdModel;\r\t\t\tchar: CHAR;\r\t\t\tdo: BOOLEAN\r\t\tEND;\r\r\r\t"
                    attr: 1
                  - text: "VAR\r\t\tmdir-: ModelDirectory;\r\t\tdir-: Directory;"
                    attr: 2
                  - text: "\r\r\r\t"
                    attr: 1
                  - text: "(* Model *)"
                    attr: 4
                  - text: "\r\r\t"
                    attr: 1
                  - text: "PROCEDURE (m: Model) Insert* (char: CHAR), NEW, ABSTRACT;\r"
                    attr: 2
                  - text: "\t"
                    attr: 1
                  - text: "PROCEDURE (m: Model) Remove*, NEW, ABSTRACT;\r"
                    attr: 2
                  - text: "\t"
                    attr: 1
                  - text: "PROCEDURE (m: Model) GetString* (OUT s: ARRAY OF CHAR), NEW, ABSTRACT;\r"
                    attr: 2
                  - text: "\r\t"
                    attr: 1
                  - text: "(* ModelDirectory *)"
                    attr: 4
                  - text: "\r\r\t"
                    attr: 1
                  - text: "PROCEDURE (d: ModelDirectory) New* (): Model, NEW, ABSTRACT;\r"
                    attr: 2
                  - text: "\r\t"
                    attr: 1
                  - text: "(* PasteCharOp *)"
                    attr: 4
                  - text: "\r\r\tPROCEDURE (op: PasteCharOp) Do;\r\t\tVAR m: StdModel; msg: Models.UpdateMsg;\r\tBEGIN\r\t\tm := op.model;\r\t\tIF op.do THEN\t\t\t\t"
                    attr: 1
                  - text: "(* do operation's transformation *)"
                    attr: 4
                  - text: "\r"
                    attr: 2
                  - text: "\t\t\tm.s[m.i] := op.char; INC(m.i);\r\t\tELSE\t\t\t\t\t\t"
                    attr: 1
                  - text: "(* undo operation's transformation *)"
                    attr: 4
                  - text: "\r"
                    attr: 2
                  - text: "\t\t\tDEC(m.i)\t\t\t\t"
                    attr: 1
                  - text: "(* remove character from string *)"
                    attr: 4
                  - text: "\r\t\tEND;\r\t\tm.s[m.i] := 0X;\r\t\top.do := ~op.do;\t"
                    attr: 1
                  - text: "\t\t(* toggle between \"do\" and \"undo\" *)"
                    attr: 4
                  - text: "\r"
                    attr: 2
                  - text: "\t\tModels.Broadcast(m, msg)"
                    attr: 1
                  - text: "\t"
                    attr: 2
                  - text: "(* update all views on this model *)"
                    attr: 4
                  - text: "\r\tEND Do;"
                    attr: 1
                  - text: "\r"
                    attr: 2
                  - text: "\r\r\t"
                    attr: 1
                  - text: "(* StdModel *)"
                    attr: 4
                  - text: "\r\r\tPROCEDURE (m: "
                    attr: 1
                  - text: Std
                    attr: 2
                  - text: "Model) Internalize (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER;\r\tBEGIN\r\t\trd.ReadVersion(0, 0, version);\r\t\tIF ~rd.cancelled THEN\r\t\t\trd.ReadInt(m.i); rd.ReadString(m.s)\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (m: "
                    attr: 1
                  - text: Std
                    attr: 2
                  - text: "Model) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteVersion(0);\r\t\twr.WriteInt(m.i); wr.WriteString(m.s)\r\tEND Externalize;\r\r\tPROCEDURE (m: "
                    attr: 1
                  - text: Std
                    attr: 2
                  - text: "Model) CopyFrom (source: Stores.Store);\r\tBEGIN\r\t\tWITH source: "
                    attr: 1
                  - text: Std
                    attr: 2
                  - text: "Model DO\r\t\t\tm.i := source.i; m.s := source.s\r\t\tEND\r\tEND CopyFrom;\r\r\r\t"
                    attr: 1
                  - text: "PROCEDURE (m: StdModel) Insert (char: CHAR);\r\t\tVAR op: PasteCharOp;\r\tBEGIN\r\t\tNEW(op); op.model := m; op.char := char; op.do := TRUE;\r\t\tModels.Do(m, \"insertion\", op)\r\tEND Insert;"
                    attr: 2
                  - text: "\r\r\t"
                    attr: 1
                  - text: "PROCEDURE (m: StdModel) Remove;\r\t\tVAR msg: Models.UpdateMsg;\r\tBEGIN\r\t\tDEC(m.i); m.s[m.i] := 0X;"
                    attr: 2
                  - text: "\r"
                    attr: 1
                  - text: "\t\tModels.Broadcast(m, msg)\t"
                    attr: 2
                  - text: "(* update all views on this model *)"
                    attr: 4
