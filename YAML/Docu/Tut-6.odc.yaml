                  - text: "MODULE ObxViews3;\r\r\tIMPORT Views, Ports, Properties;\r\r\tTYPE View = POINTER TO RECORD (Views.View) END;\r\r\tPROCEDURE (v: View)  Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tf.DrawRect(l, t, r, b, Ports.fill, Ports.red)\r\tEND Restore;\r\r\tPROCEDURE (v: View) HandlePropMsg (VAR msg: Properties.Message);\r\t\tCONST min = 5 * Ports.mm; max = 50 * Ports.mm;\r\tBEGIN\r\t\tWITH msg: Properties.SizePref DO\r\t\t\tIF (msg.w = Views.undefined) OR (msg.h = Views.undefined) THEN\r\t\t\t\t msg.w := 20 * Ports.mm; msg.h := 10 * Ports.mm\r\t\t\tELSE\r\t\t\t\tProperties.ProportionalConstraint(2, 1, msg.fixedW, msg.fixedH,\r\t\t\t\t\t\t\t\t\t\tmsg.w, msg.h);\r\t\t\t\tIF msg.h < min THEN\r\t\t\t\t\tmsg.h := min; msg.w := 2 * min\r\t\t\t\tELSIF msg.h > max THEN\r\t\t\t\t\tmsg.h := max; msg.w := 2 * max\r\t\t\t\tEND\r\t\t\tEND\r"
