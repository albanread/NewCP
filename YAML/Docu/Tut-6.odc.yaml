                      h: 444500
                  - text: "MODULE ObxViews6;\r\r\tIMPORT Views, Ports, Properties, Controllers;\r\r\tTYPE\r\t\tView = POINTER TO RECORD (Views.View)\r\t\t\tx, y: INTEGER"
                    attr: 1
                  - text: ";\r\t\t\tc: Ports.Color"
                    attr: 2
                  - text: "\r\t\tEND;\r\r\tPROCEDURE (v: View)  Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tf.DrawRect(l, t, r, b, Ports.fill, "
                    attr: 1
                  - text: v.c
                    attr: 2
                  - text: ");\r\t\tf.DrawLine(v.x, t, v.x, b, 0, Ports.white); f.DrawLine(l, v.y, r, v.y, 0, Ports.white)\r\tEND Restore;\r\t\r\tPROCEDURE (v: View) HandlePropMsg (VAR msg: Properties.Message);\r\t\tCONST min = 5 * Ports.mm; max = 50 * Ports.mm;\r\t\t"
                    attr: 1
                  - text: "VAR stdProp: Properties.StdProp; prop: Properties.Property;"
                    attr: 2
                  - text: "\r\tBEGIN\r\t\tWITH msg: Properties.SizePref DO\r\t\t\tIF (msg.w = Views.undefined) OR (msg.h = Views.undefined) THEN\r\t\t\t\t msg.w := 20 * Ports.mm; msg.h := 10 * Ports.mm\r\t\t\tELSE\r\t\t\t\tProperties.ProportionalConstraint(2, 1, msg.fixedW, msg.fixedH,\r\t\t\t\t\t\t\t\t\t\tmsg.w, msg.h);\r\t\t\t\tIF msg.h < min THEN msg.h := min; msg.w := 2 * min\r\t\t\t\tELSIF msg.h > max THEN msg.h := max; msg.w := 2 * max\r\t\t\t\tEND\r\t\t\tEND\r\t\t| msg: Properties.ResizePref DO\r\t\t\tmsg.horFitToWin := TRUE; msg.verFitToWin := TRUE\r\t\t| msg: Properties.FocusPref DO\r\t\t\tmsg.setFocus := TRUE\r"
                    attr: 1
                  - text: "\t\t| msg: Properties.PollMsg DO\r\t\t\tNEW(stdProp);\r\t\t\tstdProp.color.val := v.c;\r\t\t\tstdProp.valid := {Properties.color};\r\t\t\tstdProp.known := {Properties.color};\r\t\t\tProperties.Insert(msg.prop, stdProp)\r\t\t| msg: Properties.SetMsg DO\r\t\t\tprop := msg.prop;\r\t\t\tWHILE prop # NIL DO\r\t\t\t\tWITH prop: Properties.StdProp DO\r\t\t\t\t\tIF Properties.color IN prop.valid THEN v.c := prop.color.val END\r\t\t\t\tELSE\r\t\t\t\tEND;\r\t\t\t\tprop := prop.next\r\t\t\tEND;\r\t\t\tViews.Update(v, Views.keepFrames)\r"
                    attr: 2
                  - text: "\t\tELSE\t(* ignore other messages *)\r\t\tEND\r\tEND HandlePropMsg;\r\r\tPROCEDURE (v: View) HandleCtrlMsg (f: Views.Frame; VAR msg: Controllers.Message;\r\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\t\tVAR x, y, w, h: INTEGER; m: SET; isDown: BOOLEAN;\r\tBEGIN\r\t\tWITH msg: Controllers.PollOpsMsg DO\r\t\t\tmsg.valid := {Controllers.paste}; msg.selectable := TRUE;\r\t\t\tmsg.type := \"Obx.Tutorial\"\r\t\t| msg: Controllers.EditMsg DO\r\t\t\tIF msg.op = Controllers.pasteChar THEN\r\t\t\t\tIF msg.char = 1DX THEN INC(v.x, Ports.mm)\r\t\t\t\tELSIF msg.char = 1CX THEN DEC(v.x, Ports.mm)\r\t\t\t\tELSIF msg.char  = 1EX THEN DEC(v.y, Ports.mm)\r\t\t\t\tELSIF msg.char  = 1FX THEN INC(v.y, Ports.mm)\r\t\t\t\tEND;\r\t\t\t\tViews.Update(v, Views.keepFrames)\r\t\t\tEND\r\t\t| msg: Controllers.TrackMsg DO\r\t\t\tv.x := msg.x; v.y := msg.y; v.context.GetSize(w, h); v.Restore(f, 0, 0, w, h);\r\t\t\tREPEAT\r\t\t\t\tf.Input(x, y, m, isDown);\r\t\t\t\tIF (x # v.x) OR (y # v.y) THEN\r\t\t\t\t\tv.x := x; v.y := y; v.Restore(f, 0, 0, w, h)\r\t\t\t\tEND\r\t\t\tUNTIL ~isDown;\r\t\t\tViews.Update(v, Views.keepFrames)\r\t\t| msg: Controllers.PollCursorMsg DO\r\t\t\tmsg.cursor := Ports.graphicsCursor\r\t\tELSE\t(* ignore other messages *)\r\t\tEND\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE Deposit*;\r\t\tVAR v: View;\r\tBEGIN\r\t\tNEW(v); v.x := 0; v.y := 0; "
                    attr: 1
                  - text: "v.c := Ports.black; "
                    attr: 2
                  - text: "Views.Deposit(v)\r\tEND Deposit;\r\rEND ObxViews6.\r"
