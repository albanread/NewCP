                  - text: "\rFurther examples which use the undo/redo mechanism through operations can be found e.g. in "
                    attr: 1
                  - link:
                      target: "StdCmds.OpenDoc('Obx/Mod/Omosi')"
                      body:
                        - text: ObxOmosi
                          attr: 5
                      attr: 1
                      w: 131250
                      h: 142875
                  - text: " or "
                    attr: 1
                  - link:
