                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "MODULE ObxViews5;\r\r\tIMPORT Views, Ports, Properties, Controllers;\r\r\tTYPE\r\t\tView = POINTER TO RECORD (Views.View)\r\t"
                    attr: 1
                  - text: "\t\tx, y: INTEGER"
                    attr: 2
                  - text: "\r\t\tEND;\r\r\tPROCEDURE (v: View)  Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tf.DrawRect(l, t, r, b, Ports.fill, Ports.red);\r\t\t"
                    attr: 1
                  - text: "f.DrawLine(v.x, t, v.x, b, 0, Ports.white); f.DrawLine(l, v.y, r, v.y,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t0, Ports.white)"
                    attr: 2
                  - text: "\r\tEND Restore;\r\r\tPROCEDURE (v: View) HandlePropMsg (VAR msg: Properties.Message);\r\t\tCONST min = 5 * Ports.mm; max = 50 * Ports.mm;\r\tBEGIN\r\t\tWITH msg: Properties.SizePref DO\r\t\t\tIF (msg.w = Views.undefined) OR (msg.h = Views.undefined) THEN\r\t\t\t\t msg.w := 20 * Ports.mm; msg.h := 10 * Ports.mm\r\t\t\tELSE\r\t\t\t\tProperties.ProportionalConstraint(2, 1, msg.fixedW, msg.fixedH,\r\t\t\t\t\t\t\t\t\t\tmsg.w, msg.h);\r\t\t\t\tIF msg.h < min THEN msg.h := min; msg.w := 2 * min\r\t\t\t\tELSIF msg.h > max THEN msg.h := max; msg.w := 2 * max\r\t\t\t\tEND\r\t\t\tEND\r\t\t| msg: Properties.ResizePref DO\r\t\t\tmsg.horFitToWin := TRUE; msg.verFitToWin := TRUE\r\t\t| msg: Properties.FocusPref DO\r\t\t\tmsg.setFocus := TRUE\r\t\tELSE\t(* ignore other messages *)\r\t\tEND\r\tEND HandlePropMsg;\r\r\tPROCEDURE (v: View) HandleCtrlMsg (f: Views.Frame;\r\t\t\t\t\t\t\t\t\t\tVAR msg: Controllers.Message; \r\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\t\tVAR x, y, w, h: INTEGER; m: SET; isDown: BOOLEAN;\r\tBEGIN\r\t\tWITH msg: Controllers.PollOpsMsg DO\r\t\t\tmsg.valid := {Controllers.paste}; msg.selectable := TRUE;\r\t\t\tmsg.type := \"Obx.Tutorial\"\r\t"
                    attr: 1
                  - text: "\t| msg: Controllers.EditMsg DO\r\t\t\tIF msg.op = Controllers.pasteChar THEN\t(* cursor keys *)\r\t\t\t\tIF msg.char = 1DX THEN INC(v.x, Ports.mm)\r\t\t\t\tELSIF msg.char = 1CX THEN DEC(v.x, Ports.mm)\r\t\t\t\tELSIF msg.char  = 1EX THEN DEC(v.y, Ports.mm)\r\t\t\t\tELSIF msg.char  = 1FX THEN INC(v.y, Ports.mm)\r\t\t\t\tEND;\r\t\t\t\tViews.Update(v, Views.keepFrames)\r\t\t\tEND\r\t\t| msg: Controllers.TrackMsg DO\r\t\t\tv.x := msg.x; v.y := msg.y;\r\t\t\tv.context.GetSize(w, h); v.Restore(f, 0, 0, w, h);\r\t\t\tREPEAT\r\t\t\t\tf.Input(x, y, m, isDown);\r\t\t\t\tIF (x # v.x) OR (y # v.y) THEN\r\t\t\t\t\tv.x := x; v.y := y; v.Restore(f, 0, 0, w, h)\r\t\t\t\tEND\r\t\t\tUNTIL ~isDown;\r\t\t\tViews.Update(v, Views.keepFrames)\r\t\t| msg: Controllers.PollCursorMsg DO\r\t\t\tmsg.cursor := Ports.graphicsCursor\r\t\tELSE\t(* ignore other messages *)\r\t\tEND\r"
                    attr: 2
                  - text: "\tEND HandleCtrlMsg;\r\r\tPROCEDURE Deposit*;\r\t\tVAR v: View;\r\tBEGIN\r\t\tNEW(v); "
                    attr: 1
                  - text: "v.x := 0; v.y := 0; "
                    attr: 2
                  - text: "Views.Deposit(v)\r\tEND Deposit;\r\rEND ObxViews5.\r\r"
                    attr: 1
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 64
                      bodyPos: 6471
                      bodyLen: 6
                    attr: 1
                    w: 177800
                    h: 152400
                  - text: " \"ObxViews5.Deposit; StdCmds.Open\"  \r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 0
                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000003
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "\rThere exist many other controller messages which may be sent to a view, but which are beyond the scope of this tutorial. There are messages for the generic scrolling mechanism of the BlackBox Component Framework ("
                    attr: 1
                  - text: "Controllers.PollSectionMsg, Controllers.ScrollMsg, Controllers.PageMsg"
                    attr: 4
                  - text: "),  messages which implement drag & drop ("
                    attr: 1
                  - text: "Controllers.PollDropMsg, Controllers.DropMsg, Controllers.TransferMessage"
                    attr: 4
                  - text: ) and messages which control the selection (
                    attr: 1
                  - text: Controllers.SelectMsg
                    attr: 4
                  - text: "). For these and other controller messages we refer to the documentation of the "
                    attr: 1
                  - text: Controllers
                    attr: 4
                  - text: " module.\r\r\r"
                    attr: 1
                  - text: "6.5 Properties\r"
                    attr: 2
                  - text: "\rWe want to close this section with a final extension of our view: the color of the view should be changeable through the "
                    attr: 1
                  - text: Attributes
                    attr: 4
                  - text: " menu. The general mechanism to get and set attributes of a view from its environment are "
                    attr: 1
                  - text: properties
                    attr: 4
                  - text: ". A view may know about attributes such as font, color, size, but it may also know about arbitrary other attributes. Properties are set with the "
                    attr: 1
                  - text: Properties.SetMsg
                    attr: 4
                  - text: " and inspected with the "
                    attr: 1
                  - text: Properties.PollMsg
                    attr: 4
                  - text: ". Properties in one of these messages are stored in a linked list. If a view gets a "
                    attr: 1
                  - text: Properties.SetMsg
                    attr: 4
                  - text: " it should traverse its property list and adjust those properties it knows about. A "
                    attr: 1
                  - text: "Properties.PollMsg "
                    attr: 4
                  - text: "is sent to the view to get its properties. The view should return all properties it knows about. Properties can be inserted into a message's property list with the "
                    attr: 1
                  - text: "Properties.Insert "
                    attr: 4
                  - text: "procedure.\rEvery property describes up to 32 attributes. The "
                    attr: 1
                  - text: known
                    attr: 4
                  - text: " set defines which attributes are known to the view. The view may also specify which attributes are read-only in the "
                    attr: 1
                  - text: readOnly
                    attr: 4
                  - text: " set. The "
                    attr: 1
                  - text: valid
                    attr: 4
                  - text: " set finally defines which attributes currently have a defined value. For example, if in a text several characters with different sizes are selected, then the attribute size is known to the view, but currently does not have a valid value. The selection is not homogeneous, and thus there is no single valid value.\r\r\tTYPE\r\t\tProperty = POINTER TO ABSTRACT RECORD \r\t\t\tnext-: Properties.Property;\r\t\t\tknown, readOnly, valid: SET;\t(* valid and readOnly are subsets of known *)\r\t\t\t(p: Property) IntersectWith (q: Properties.Property; OUT equal: BOOLEAN), NEW, ABSTRACT\r\t\tEND;\r\rA special property is "
                    attr: 1
                  - text: "Properties.StdProp. "
                    attr: 4
                  - text: "This property encompasses font attributes as well as color, and it is known to the BlackBox environment. The supported attributes are "
                    attr: 1
                  - text: "Properties.color, Properties.typeface, Properties.size, Properties.style, Properites.weight."
                    attr: 4
                  - text: " The fields in the property record hold the corresponding values.\r\r\tTYPE\r\t\tStdProp = POINTER TO RECORD (Properties.Property)\r\t\t\tcolor: Dialog.Color;\r\t\t\ttypeface: Fonts.Typeface;\r\t\t\tsize: INTEGER;\r\t\t\tstyle: RECORD\r\t\t\t\tval, mask: SET\r\t\t\tEND;\r\t\t\tweight: INTEGER\r\t\tEND;\r\rThe last version of our view only support the color attribute of the standard property. If it receives a "
                    attr: 1
                  - text: Properties.PollMsg
                    attr: 4
                  - text: " message, it returns a "
                    attr: 1
                  - text: "Properties.StdProp "
                    attr: 4
                  - text: "object where only the color field is set, and where only the color attribute is defined as known and valid. On a "
                    attr: 1
                  - text: Properties.SetMsg
                    attr: 4
                  - text: ", the property list must be searched for a standard property whose color field is valid. When the color has been changed, the view must be updated in all its frames.\r\t"
                    attr: 1
                  - ruler:
                      first: 180000
                      left: 180000
