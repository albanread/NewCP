                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "MODULE ObxViews0;\r\r\tIMPORT Views, Ports;\r\r\tTYPE View = POINTER TO RECORD (Views.View) END;\r\r\tPROCEDURE (v: View)  Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tf.DrawRect(l, t, r, b, Ports.fill, Ports.red)\r\tEND Restore;\r\r\tPROCEDURE Deposit*;\r\t\tVAR v: View;\r\tBEGIN\r\t\tNEW(v); Views.Deposit(v)\r\tEND Deposit;\r\rEND ObxViews0.\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 0
                      lead: 11500
                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000003
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "\rTo execute this program, invoke the following command:\r\r\t"
                    attr: 1
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 11
                      bodyPos: 1293
                      bodyLen: 6
                    attr: 1
                    w: 177800
                    h: 152400
                  - text: " \"ObxViews0.Deposit; StdCmds.Open\"\r\rThe result of this command is shown in Figure 6-1.\r\r"
                    attr: 1
                  - view:
                      kind: ObxViews0.View
                      storeKind: store
                      typeChain:
                        - ObxViews0.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 12
                      bodyPos: 1359
                      bodyLen: 2
                    attr: 1
                    w: 2302944
                    h: 1429184
                  - text: "\r\rFigure 6-1: Result of \"ObxViews0.Deposit; StdCmds.Open\"\r\rThis simple program is completely functional already. The procedure "
                    attr: 1
                  - text: ObxViews0.Deposit
                    attr: 4
                  - text: " puts a newly allocated view into a system queue. The command "
                    attr: 1
                  - text: StdCmds.Open
                    attr: 4
                  - text: " in the command string above removes a view from this queue, and opens it in a new window. Note that whole sequences of commands must be enclosed between quotes, while for single commands the quotes may be omitted.\r\rInstead of opening the view in a window, it could be pasted into the focus container (e.g., a text or a form):\r"
                    attr: 1
                  - view:
                      kind: TextViews.StdView
                      storeKind: store
                      typeChain:
                        - TextViews.StdViewDesc
                        - TextViews.ViewDesc
                        - Containers.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 13
                      bodyPos: 1421
                      bodyLen: 723
                      hideMarks: true
                      defaultRuler:
                        left: 0
                        right: 0
                        asc: 134600
                        dsc: 43200
                        grid: 177800
                        opts: 0x00000003
                      defaultAttr:
                        font: Arial
                        size: 114300
                        color: 0x01000000
                        weight: 400
                        style: 0x00000000
                      controller:
                        kind: TextControllers.StdCtrl
                        storeKind: store
                        typeChain:
                          - TextControllers.StdCtrlDesc
                          - TextControllers.ControllerDesc
                          - Containers.ControllerDesc
                          - Controllers.ControllerDesc
                          - Stores.StoreDesc
                        id: 19
