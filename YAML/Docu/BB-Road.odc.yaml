                      w: 131250
                      h: 142875
                  - text: " deals with view programming.\r\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: "  "
                    attr: 1
                  - link:
                      target: "StdCmds.OpenBrowser('Obx/Docu/Sys-Map', 'Map to the Obx Subsystem')"
                      body:
                        - text: Overview by Example
                          attr: 3
                      attr: 1
                      w: 131250
                      h: 142875
                  - text: " is a rich source of examples, ordered by category and difficulty.\r\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " The programmer's reference consists of one documentation file per module. Each subsystem has a "
                    attr: 1
                  - link:
                      target: "StdCmds.OpenBrowser('System/Docu/Sys-Map', 'Map to the BlackBox Component Framework')"
                      body:
                        - text: Sys-Map
                          attr: 3
                      attr: 1
                      w: 131250
                      h: 142875
                  - text: " text which contains links to the individual texts.\r\rApart from the "
                    attr: 1
                  - text: Obx
                    attr: 4
                  - text: " samples and the tutorial examples, another documentation for the most important kinds of BlackBox programs is available in "
                    attr: 1
                  - text: Dev/Rsrc/New
                    attr: 4
                  - text: ". These are template documents that you can use as basis for your own programs. The template documents' module names are renamed automatically by the "
                    attr: 1
                  - text: "Tools->Create Subsystem..."
                    attr: 4
                  - text: " command. This command also creates a suitable new subsystem directory structure (see "
                    attr: 1
                  - text: DevSubTool
                    attr: 4
                  - text: ").\r\rProgrammers who need to interface with non-BlackBox software should consult the text "
                    attr: 1
                  - link:
                      target: "StdCmds.OpenBrowser('Dev/Docu/P-S-I', 'Platform-Specific Issues')"
                      body:
                        - text: Platform-Specific Issues
                          attr: 3
                      attr: 1
                      w: 131250
                      h: 142875
                  - text: ".\r\rNote that you can reach the entire on-line documentation via the help menu, or from the table of contents below.\r\r\r"
