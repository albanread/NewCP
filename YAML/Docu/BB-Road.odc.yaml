                        - text: Guided Tour
                          attr: 3
                      attr: 1
                      w: 131250
                      h: 142875
                  - text: ".\r\rThe rest of the documentation consists of four major parts:\r\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " A "
                    attr: 1
                  - link:
