                  - text: "\r\r\r"
                    attr: 1
                  - target:
                      name: Two
                      body:
                        - text: 1 Two kinds of components
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r\rBlackBox contains a component framework, which is a new concept for most programmers. This document gives a quick overview over which kinds of BlackBox components there are, when you need which, and where the documentation is.\r\rGenerally, BlackBox distinguishes two major categories of components: commands and views. Commands are comparable to traditional scripts or macros, except that they are implemented in a \"real\" programming language, rather than in a limited or inefficient special purpose scripting language. This means that if a problem grows, its programmatic solution can grow along; you'll not suddenly need to switch to another language. Thus commands range from simple automation tasks to complex programs such as compilers. The main purpose of commands is to assemble visual objects, i.e., to make them work together. Views are the visual objects of the BlackBox Component Framework.\r\r\r"
                    attr: 1
                  - target:
                      name: Commands
                      body:
                        - text: 2 Commands
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r\rOften, programs are built around data entry masks; these are "
                    attr: 1
                  - text: forms
                    attr: 4
                  - text: " in BlackBox. Module "
                    attr: 1
                  - text: Controls
                    attr: 4
                  - text: " and the form subsystem provide the necessary support to build form-based user interfaces.\rOften, you'll also want to generate texts, e.g., for reporting purposes. You can use all capabilities of the BlackBox text subsystem, including fonts, type sizes, color, embedded components such as stamp views or link views, and so on. An example command which uses both the form and text subsystems is "
                    attr: 1
                  - text: ObxOrders
                    attr: 4
                  - text: ".\r\rBefore looking at this advanced example, you may want to have a look at simpler text and form sample programs. The "
                    attr: 1
                  - link:
                      target: "StdCmds.OpenBrowser('Obx/Docu/Sys-Map', 'Map to the Obx subsystem')"
                      body:
                        - text: Obx
                          attr: 3
                      attr: 1
                      w: 131250
                      h: 142875
                  - text: " subsystem (\"Overview by Example\") provides a variety of such examples.\r\rBlackBox programs are document-centric. This means that you typically work with documents and document parts; and not directly with files or windows. Files are used only for simple databases or for manipulating legacy data. Sometimes it's possible to convert legacy data to a BlackBox data type by writing a new converter. "
                    attr: 1
                  - text: Obx
                    attr: 4
                  - text: " also contains an example of such a converter.\r\r\r"
                    attr: 1
                  - target:
                      name: Views
                      body:
                        - text: 3 Views
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r\rIf the built-in subsystems are not sufficient for your purposes, you need to develop a new BlackBox component. Usually this is a document component, a so-called "
                    attr: 1
                  - text: view
                    attr: 4
                  - text: " implementation. In contrast to old-style programs, a view only owns a part of a document, and not the whole screen or even a whole window. If the view is the outermost view (root view), the result cannot be distinguished from a traditional application. However, a view is always able to be embedded in texts, forms, and so on. \r\rExamples of views are text views; form views; link views (hypertext); stamp views (time stamps); clock views; Oberon microsystems logo views; bitmap (picture) views; commander views (buttons which execute a command); fold views; error views generated by the compiler; various controls (command buttons, check boxes, edit fields, ...) and so on. Before implementing your own view type, take a look at these views to get an idea of the variety of ways in which views can be used. Sometimes it's not necessary to implement a whole new complex subsystem in order to solve a problem, but rather some additional view which extends the functionality of the existing text subsystem, for example.\r\rViews may or may not have a "
                    attr: 1
                  - text: model
                    attr: 4
                  - text: ". A model is the datastructure which is visually represented by the view. In simple cases where the view needs no editable persistent state, no model is needed. Examples are logo views, controls, etc. Full-fledged editors on the other hand should contain a separate model. Such more complex views are typically implemented in several modules, while simple views without separate modules are usually implemented in a single module.\r\rAdvanced views may contain other views. Such advanced views are called "
                    attr: 1
                  - text: containers
                    attr: 4
                  - text: ". There are three useful categories of containers:\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " A "
                    attr: 1
                  - text: Wrapper
                    attr: 4
                  - text: " contains another view and modifies or extends its behavior. Typically, a wrapper has the same size as the wrapped view. For example, a terminal view may wrap a standard text view; it adds the communication facilities, while the text view provides the echoing of communicated text.\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " A "
                    attr: 1
                  - text: Special Container
                    attr: 4
                  - text: " contains one or several embedded views. The container knows about the types of the embedded views and their layout. Views cannot be inserted or deleted. For example, such a special container could have a query view at the top where database queries can be typed in, and a larger text view at the bottom where the results of the query appear. Another example is given in "
                    attr: 1
                  - text: ObxTwins
                    attr: 4
                  - text: ".\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " A "
                    attr: 1
                  - text: General Container
                    attr: 4
                  - text: " may contain an arbitrary number of embedded views, and they may change over time. This is the most general and most complex kind of view, e.g., the built-in text and form subsystems. The form subsystem is available in source form. Examples for the other kinds of view are available as "
                    attr: 1
                  - text: Obx
                    attr: 4
                  - text: " examples.\r\rViews may have no programming interface, a simple procedural interface (typically based on properties, see "
                    attr: 1
                  - text: Controls
                    attr: 4
                  - text: "), or a full-fledged extensible interface. For the latter, it is recommended that the exported interface is separated from the hidden default implementation; in order to achieve maximum extensibility.\r\r\r"
                    attr: 1
                  - target:
                      name: Overview
                      body:
                        - text: 4 Overview
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r\rHow should you start to get acquainted with BlackBox? We suggest that you start with the introduction texts "
                    attr: 1
