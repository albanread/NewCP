                      w: 131250
                      h: 142875
                  - text: " which describes the user interface and most important commands of the BlackBox Component Builder.\r\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " A "
                    attr: 1
                  - link:
                      target: "StdCmds.OpenBrowser('Docu/Tut-TOC', 'Tutorial Table of Contents')"
                      body:
                        - text: tutorial
                          attr: 3
                      attr: 1
                      w: 131250
                      h: 142875
                  - text: " which discusses general design patterns (chapters 1 to 3) in BlackBox. Then graphical user interfaces, forms, and controls are discussed in "
                    attr: 1
                  - link:
                      target: "StdCmds.OpenBrowser('Docu/Tut-4', 'Chapter 4')"
                      body:
                        - text: chapter 4
                          attr: 3
                      attr: 1
                      w: 131250
                      h: 142875
                  - text: ", the text subsystem is discussed in "
                    attr: 1
