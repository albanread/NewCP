                      attr: 1
                      w: 83625
                      h: 104775
                  - text: "\r\r\rThis text describes the programming guidelines and source code formatting conventions which have been used for the BlackBox Component Framework. For the documentation there exist similar "
                    attr: 1
                  - link:
                      target: "StdCmds.OpenBrowser('Docu/BB-Docu', 'Documentation Conventions')"
                      body:
                        - text: conventions
                          attr: 3
                      attr: 1
                      w: 83625
                      h: 104775
                  - text: ".\r\rSome programming guidelines are more important than others. In the first section, the more important ones are described. The remaining sections contain more cosmetic rules which describe the look-and-feel of programs published by Oberon microsystems. If you like them, feel free to use them for your programs as well. It may make your programs easier to understand for someone who is used to the design, documentation, and coding patterns of the BlackBox Component Framework.\r\r\r"
                    attr: 1
                  - target:
                      name: Essentials
                      body:
                        - text: 1 Essentials
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 104775
                  - text: "\r\rThe most important programming conventions all center around the aspect of "
                    attr: 1
                  - text: evolvability
                    attr: 4
                  - text: ". It should be made as easy as possible to change existing programs in a reliable way, even if the program has been written a long time ago or by someone else. Evolvability can often be improved by increasing the locality of program pieces: if a piece of program may only have an effect on a clearly locatable stretch of program text, it is easier to know where a program modification may necessitate further changes. Basically, it's all a matter of keeping \"ripple effects\" under control.\r"
                    attr: 1
                  - text: Preconditions
                    attr: 4
                  - text: " are one of the most useful tools to detect unaccounted ripple effects. Precondition checks allow to pinpoint semantic errors as early as possible, i.e. as closely to their true source as possible. After larger design changes, properly used assertions can help to dramatically reduce debugging time.\rWhenever possible, use static means to express what you know about a program's design. In particular, use the type and module systems of Component Pascal for this purpose; so the compiler can help you to find inconsistencies, and thus can become an effective "
                    attr: 1
                  - text: refactoring
                    attr: 4
                  - text: " tool.\r\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " Precondition assertions should be used consequently. Don't allow client code to \"enter\" your module if it doesn't fulfill the preconditions of your module's entry points (procedures, methods). In this way, you avoid propagation of foreign errors into your own code.\rUse the following numbers to be consistent with the rest of the BlackBox Component Builder:\r\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 1800000 }
                        - { stop: 2880000 }
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "Free\t0 .. 19\tuse for temporary breakpoints\rPreconditions\t20 .. 59\tvalidate parameters at procedure entry\rPostconditions\t60 .. 99\tvalidate results at procedure end\rInvariants\t100 .. 120\tvalidate intermediate states\r\t\t(detect local error)\rReserved\t121 .. 125\treserved for future use\rNot Yet Implemented\t         126\tprocedure is not yet implemented\rReserved\t         127\treserved for future use\rSilent Trap\t         128\ttermination without trap window\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " There should be as few global variables as possible.\rGlobal variables can be accessed from many places in a program, at different times. This makes it difficult to keep track of all possible interactions (\"side effects\") with such variables. This in turn increases the likelihood of introducing errors when changing the use of them.\r\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " Function procedures, i.e., procedures which return a result, should not modify global variables or VAR parameters as side effects. It is easier to deal with function procedures if they are true functions in the mathematical sense, i.e., if the don't have side effects. Returning function results and assigning OUT parameters is ok.\r\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " Only use ELSE in CASE or WITH if input data is extensible.\rELSE clauses in CASE x OF or WITH x DO statements should only be used if x is genuinely extensible. If x is not extensible, all cases that can occur should be statically known, and can be listed in the statement.\r\r\r"
                    attr: 1
                  - target:
                      name: Oberon
                      body:
                        - text: 2 Oberon
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 104775
                  - text: "\r\rFor new software, don't use the special Oberon features that are not part of Component Pascal. In particular, this is the LONGREAL type and the COPY procedure. Try to avoid super calls (use composition instead of inheritance) and procedure types (use objects and methods instead).\r\r\r"
                    attr: 1
                  - target:
                      name: Basic
                      body:
                        - text: 3 Basic types
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 104775
                  - text: "\r\rUse the types INTEGER, REAL and CHAR as defaults. BYTE, SHORTINT, LONGINT, SHORTREAL and SHORTCHAR should only be used if there is a strong particular reason to justify this choice. The auxiliary types are there mainly for interfacing purposes, for packing of very large structures, or for computation of extremely large integers. This rule is more important for exported interfaces than for hidden implementations, of course.\r\r\r"
                    attr: 1
                  - target:
                      name: Font
                      body:
                        - text: 4 Font attributes
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 104775
                  - text: "\r\rPrograms are written in plain text, in the default color, with the following exceptions:\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " Comments are written in italics, e.g.  "
                    attr: 1
                  - text: "(* this is a comment *)"
                    attr: 4
                  - text: "\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " Exported items, except for record fields and method signatures in record declarations, are written in bold, e.g.  PROCEDURE "
                    attr: 1
                  - text: Do
                    attr: 2
                  - text: "*;\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " Keywords which indicate non-local control flow are written in bold, i.e. "
                    attr: 1
                  - text: RETURN
                    attr: 2
                  - text: ", "
                    attr: 1
                  - text: EXIT
                    attr: 2
                  - text: ", and "
                    attr: 1
                  - text: HALT
                    attr: 2
                  - text: "\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " Text parts which are currently being changed and tested may temporarily be written in a different color\r\r\r"
                    attr: 1
                  - target:
                      name: Comments
                      body:
                        - text: 5 Comments
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 104775
                  - text: "\r\rComments which are part of an interface description (rather than a mere implementation description) have additional asterisks, a kind of \"export mark\" for comments, e.g.  "
                    attr: 1
                  - text: "(** guard for xyz command **)"
                    attr: 4
                  - text: "\r\r\r"
                    attr: 1
                  - target:
                      name: Semicolons
                      body:
                        - text: 6 Semicolons
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 104775
                  - text: "\r\rSemicolons are used to separate statements, not to terminate statements. This means that there should be no superfluous semicolons.\r\rGood\r\tIF done THEN\r\t\tPrint(result)\r\tEND\r\rBad\r\tIF done THEN\r\t\tPrint(result);\r\tEND\r\r\r"
                    attr: 1
                  - target:
                      name: Dereferencing
                      body:
                        - text: 7 Dereferencing
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 104775
                  - text: "\r\rThe dereferencing operator ^ should be left out wherever possible.\r\rGood\r\th.next := p.prev.next\r\rBad\r\th^.next := p^.prev^.next\r\r\r"
                    attr: 1
                  - target:
                      name: Case
                      body:
                        - text: 8 Case
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 104775
                  - text: "\r\rIn general, each identifier starts with a small letter, except\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " A module name always starts with a capital letter\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " A type name always starts with a capital letter\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " A procedure always starts with a capital letter, this is true for procedure constants, types, variables, parameters, and record fields.\r\rGood\r\t"
                    attr: 1
                  - text: n
                    attr: 5
                  - text: "ull = 0X;\r\t"
                    attr: 1
                  - text: D
                    attr: 5
                  - text: "rawDot = PROCEDURE (x, y: INTEGER);\r\tPROCEDURE "
                    attr: 1
                  - text: P
                    attr: 5
                  - text: "roc (i, j: INTEGER; "
                    attr: 1
                  - text: D
                    attr: 5
                  - text: "raw: DrawDot);\r\rBad\r\t"
                    attr: 1
                  - text: N
                    attr: 6
                  - text: "ULL = 0X;\r\tPROCEDURE "
                    attr: 1
                  - text: i
                    attr: 6
                  - text: "sEmpty (q: Queue): BOOLEAN;\r\tR = RECORD\r\t\t"
                    attr: 1
                  - text: d
                    attr: 6
                  - text: "raw: DrawDot\r\tEND;\r\rDon't use all-caps identifiers with more than one character. They should be reserved for the language.\r\r\r"
                    attr: 1
                  - target:
                      name: Names
                      body:
                        - text: 9 Names
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 104775
                  - text: "\r\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " A proper procedure has a verb as name, e.g. DrawDot\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " A function procedure has a noun or a predicate as name, e.g. NewObject(), IsEmpty(q)\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " Only declare a record type if necessary (FooDesc for each Foo are normally not needed anymore)\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " Procedure names which start with the prefix "
                    attr: 1
                  - text: Init
                    attr: 4
                  - text: " are snappy, i.e., they have an effect only when called for the first time. If called a second time, a snappy procedure either does nothing, or it halts. In contrast, a procedure which sets some state and may be called several times starts with the prefix "
                    attr: 1
                  - text: Set
                    attr: 4
                  - text: ".\r\rExamples\r\tPROCEDURE InitDir (dir: Directory);\r\tPROCEDURE (p: Port) Init (unit, colors: LONGINT);\r\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " Guard procedures have the same name as the guarded command, except that they have a Guard suffix appended.\r\rExample\r\tPROCEDURE PasteChar;\r\tPROCEDURE PasteCharGuard (VAR par: Dialog.Par);\r\r\r"
                    attr: 1
                  - target:
                      name: White
                      body:
                        - text: 10 White space
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 104775
                  - text: "\r\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " A new indentation level is realized by adding one further tabulator character\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " Between lists of symbols, between actual parameters, and between operators a single space is inserted\r\rGood\r\tVAR a, b, c: INTEGER;\r\tDrawRect(l, t, r, b);\r\ta := i * 8 + j - m[i, j];\r\rBad\r\tVAR a,b,c: INTEGER;\r\tDrawRect(l,t,r,b);\r\ta:=b;\r\ta := i*8 + j - m[i,j];\r\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " There is a space between a procedure name (or its export mark) and the parameter list in a declaration, but not in a call\r\rGood\r\tPROCEDURE DrawDot* (x, y: INTEGER);\r\tDrawDot(3, 5);\r\rBad\r\tPROCEDURE DrawDot*(x, y: INTEGER);\r\tDrawDot (3, 5);\r\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " Opening and closing keywords are either aligned or on the same line\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " IMPORT, CONST, TYPE, VAR, PROCEDURE sections are one level further indented than the outer level.\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " LOOP statements are never on one line\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " PROCEDURE X and END X are always aligned\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " If the whole construct does not fit on one line, there is never a statement or a type declaration after a keyword\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " The contents of IF, WHILE, REPEAT, LOOP, FOR, CASE constructs is one level further indented if it does not fit on one line.\r\rGood\r\tIF expr THEN S0 ELSE S1 END;\r\tREPEAT S0 UNTIL expr;\r\tWHILE expr DO S0 END;\r\r\tIF expr THEN\r\t\tS0\r\tELSE\r\t\tS1\r\tEND;\r\r\tREPEAT\r\t\tS0\r\tUNTIL expr;\r\r\tLOOP\r\t\tS0;\r\t\tIF expr THEN "
                    attr: 1
                  - text: EXIT
                    attr: 2
                  - text: " END;\r\t\tS1\r\tEND;\r\r\ti := 0; WHILE i # 15 DO DrawDot(a, i); INC(i) END;\r\r\tTYPE View = POINTER TO RECORD (Views.ViewDesc) END;\r\r\tIMPORT Views, Containers,\r\t\tTextModels, TextViews;\r\r\tVAR a, b: INTEGER;\r\t\ts: TextMappers.Scanner;\r\rBad\r\tIF expr THEN S0\r\tELSE S1 END;\r\r\tPROCEDURE P;\r\tBEGIN ... END P;\r\r\tBEGIN i := 0;\r\t\tj := a + 2;\r\t\t...\r\r\tREPEAT i := 0;\r\t\tj := a + 2;\r\t\t...\r\r\r"
                    attr: 1
                  - target:
                      name: Example
                      body:
                        - text: 11 Example
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 104775
                  - text: "\r\rMODULE StdExample;\r\r\tIMPORT Models, Views, Controllers;\r\r\tCONST null = 0X;\r\r\tTYPE\r\t\t"
                    attr: 1
                  - text: View
                    attr: 2
                  - text: "* = POINTER TO RECORD (Views.View)\r\t\t\ta*, b*: INTEGER\r\t\tEND;\r\r\tVAR "
                    attr: 1
                  - text: view
                    attr: 2
                  - text: "-: View;\r\r\tPROCEDURE "
                    attr: 1
                  - text: Calculate
                    attr: 2
                  - text: "* (x, y: INTEGER);\r\t\tVAR area: LONGINT;\r\r\t\tPROCEDURE IsOdd (x: INTEGER): BOOLEAN;\r\t\tBEGIN\r\t\t\t"
                    attr: 1
                  - text: RETURN
                    attr: 2
                  - text: " ODD(x)\r\t\tEND IsOdd;\r\r\tBEGIN\r\t\tarea := x * y;\r\t\tIF IsOdd(area) THEN area := 1000 END\r\tEND Calculate;\r\rBEGIN\r\tCalculate(7, 9)\rEND StdExample.\r\r\r"
                    attr: 1
                  - target:
                      name: Open Source Header
                      body:
                        - text: 12 Open Source Header
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 104775
                  - text: "\r\r"
                    attr: 2
                  - text: "Modules published under the "
