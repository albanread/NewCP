                      w: 360000000
                      h: 444500
                  - text: "\r"
                    attr: 3
                  - text: "Besides the compiler (which is described in COM Compiler Extension documentation), the DTC development environment offers some special facilities. Most of them are accessible through the COM menu.\r\r\r"
                    attr: 2
                  - target:
                      name: 5.1
                      body:
                        - text: Linker
                          attr: 4
                      attr: 4
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 4
                  - text: "With the linker Component Pascal modules can be linked to DLL (in process servers) or to EXE (out of process servers) files. Furthermore it can be decided whether a dynamic module loader should be added or not. This leads to the following four link commands:\r\r"
                    attr: 2
                  - ruler:
                      first: 360000
                      left: 360000
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 2160000 }
                        - { stop: 3960000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\tEXE\tDLL\r\t\runextensible\tDevLinker.LinkExe\tDevLinker.LinkDll\rextensible\tDevLinker.Link\tDevLinker.LinkDynDll\r\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: For further information about the linker we also refer to the
                    attr: 2
                  - text: " "
                    attr: 8
                  - link:
                      target: "StdCmds.OpenBrowser('Dev/Docu/Linker', 'DevLinker')"
                      body:
                        - text: DevLinker
                          attr: 9
                      attr: 6
                      w: 131250
                      h: 142875
                  - text: " "
                    attr: 6
                  - text: "Documentation.\r\r"
                    attr: 2
                  - text: "DevLinker.Link\r"
                    attr: 10
                  - text: "\rThis command links a module set containing a dynamic module loader to an "
                    attr: 2
                  - text: "EXE "
                    attr: 11
                  - text: "file.\rAt startup the body of the main module is called.\rInitialization and termination of the dynamically loaded modules must be done by the runtime system.\r"
                    attr: 2
                  - text: "\r"
                    attr: 12
                  - text: "\r"
                    attr: 2
                  - text: "DevLinker.LinkExe\r"
                    attr: 10
                  - text: "\rThis command links an nonextensible module set to an "
                    attr: 2
                  - text: "EXE "
                    attr: 11
                  - text: "file.\rAt startup the bodies of all modules are called in the correct order.\rIf the last body terminates, the terminators of all modules are called in reverse order.\rNo runtime system is needed for initialization and termination.\rFor an example see "
                    attr: 2
                  - link:
                      target: "StdCmds.OpenBrowser('Com/Docu/KoalaExe', 'ComKoalaExe Docu')"
                      body:
                        - text: ComKoalaExe
                          attr: 9
                      attr: 2
                      w: 131250
                      h: 142875
                  - text: ".\r\r"
                    attr: 2
                  - text: "DevLinker.LinkDll\r"
                    attr: 10
                  - text: "\rThis command links a non-extensible module set to a DLL file.\rWhen the "
                    attr: 2
                  - text: DLL
                    attr: 11
                  - text: " is attached to a process, the bodies of all modules are called in the correct order.\rWhen the "
                    attr: 2
                  - text: DLL
                    attr: 11
                  - text: " is released from the process, the terminators of all modules are called in reverse order.\rNo runtime system is needed for initialization and termination.\rFor an example see "
                    attr: 2
                  - link:
                      target: "StdCmds.OpenBrowser('Com/Docu/KoalaDll', 'ComKoalaDllL Docu')"
                      body:
                        - text: ComKoalaDll
                          attr: 9
                      attr: 2
                      w: 131250
                      h: 142875
                  - text: ".\r\r"
                    attr: 2
                  - text: "DevLinker.LinkDynDll\r"
                    attr: 10
                  - text: "\r(rarely used, present for completeness)\rLinks a module set containing a dynamic module loader to a "
                    attr: 2
                  - text: DLL
                    attr: 11
                  - text: " file.\rWhen the "
                    attr: 2
                  - text: DLL
                    attr: 11
                  - text: " is attached to a process, the body of the main module is called.\rWhen the "
                    attr: 2
                  - text: DLL
                    attr: 11
                  - text: " is released from the process, the terminator of the main module is called.\rInitialization and termination of the dynamically loaded modules must be done by the runtime system.\r\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x0000000b
                      attr: 4
                      w: 360000000
                      h: 444500
                  - target:
                      name: 5.2
                      body:
                        - text: Interface Browser
                          attr: 4
                      attr: 4
                      w: 150300
                      h: 142875
                  - text: "\r\r"
                    attr: 4
                  - text: "To quickly retrieve the actual definition of an interface, a special interface browser is available under the menu command COM->Interface Info. In contrast to the BlackBox browser, the COM interface browser displays additional information such as the number of the functions in the interface. Note that the first three entries of every interface are used by the functions of the IUnknown interface.\r\rIf you select WinOle.IEnumUnknown and execute COM->Interface Info the following window is opened:\r"
                    attr: 2
                  - text: "\r"
                    attr: 4
                  - ruler:
                      left: 0
                      right: 0
                      dsc: 25400
                      grid: 1
                      attr: 4
                      w: 360000000
                      h: 444500
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 52
                      bodyPos: 3773
                      bodyLen: 115205
                    attr: 4
                    w: 5457885
                    h: 1857360
                  - text: "\r\r"
                    attr: 4
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      attr: 4
                      w: 360000000
                      h: 444500
                  - target:
                      name: 5.3
                      body:
                        - text: COM Interface Inspector
                          attr: 4
                      attr: 4
                      w: 150300
                      h: 142875
                  - text: "\r\r"
                    attr: 4
                  - text: "The COM interface inspector is the most important tool for the development of COM objects. It allows to inspect all currently allocated interface records. The browser is opened with the command COM->Show Interfaces.\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      dsc: 25400
                      grid: 1
                      attr: 2
                      w: 360000000
                      h: 444500
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 59
                      bodyPos: 119371
                      bodyLen: 91333
                    attr: 2
                    w: 4086060
                    h: 1981365
                  - text: "\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "For every interface the actual value of its reference count is displayed. After the name and the address of an interface, a diamond mark allows to follow the pointer to the record to which it points (by clicking on the diamond mark). If the interface is anchored globally through a Component Pascal reference, the global anchor is also shown.\rWith the "
                    attr: 2
                  - text: Update
                    attr: 13
                  - text: " link the interface inspector can be updated, and the "
                    attr: 2
                  - text: All
                    attr: 13
                  - text: " link allows to toggle between the display of all interfaces and of only the non-BlackBox-internal ones.\rInterfaces with reference count zero are no longer referenced through an interface pointer, however they might still be referenced by a Component Pascal pointer. Interfaces which are neither referenced through an interface pointer nor through a Component Pascal pointer are garbage collected upon the next run of the garbage collector. The run of the garbage collector can be enforced through the menu command COM->Collect. The collected interfaces disappear when the interface inspector is updated.\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 127000
                      dsc: 25400
                      grid: 152400
                      opts: 0x00000003
                      attr: 11
                      w: 360000000
                      h: 444500
                  - text: "Note: If you look at the ComObject example, you will see that every ComObject.Object interface contains Component Pascal pointers to the three interfaces ComObject.IOleObject, ComObject.IDataObject and ComObject.IPersistStorage, i.e. they are not removed by the garbage collector as long as interface pointers refer to a ComObject.Object."
                    attr: 11
                  - text: "\r"
                    attr: 14
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      attr: 3
                      w: 360000000
                      h: 444500
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x0000000b
                      attr: 4
                      w: 360000000
                      h: 444500
                  - target:
                      name: 5.4
                      body:
                        - text: Other COM Commands
                          attr: 4
                      attr: 4
                      w: 150300
                      h: 142875
                  - text: "\r\r"
                    attr: 4
                  - text: Show Error
                    attr: 10
                  - text: "\r\r"
                    attr: 4
                  - text: "Almost all COM and OLE API functions and nearly every interface method returns a value of type COM.RESULT. COM.RESULT is an alias type to INTEGER. A result code consists of a severity bit (success or error), a facility code and an error code. If result >= 0, then it is a success code, otherwise it is an error code.\r\rThe menu command COM->Show Error can be used to obtain a full text description of the selected result. As input a selected integer is taken. The integer may be given in decimal or hexadecimal notation. E.g. if you select 1236 and execute COM->Show Error, the following window is opened:\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      dsc: 25400
                      grid: 1
                      attr: 2
                      w: 360000000
                      h: 444500
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 74
                      bodyPos: 211610
                      bodyLen: 35033
                    attr: 2
                    w: 3114780
                    h: 962205
                  - text: "\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      attr: 4
                      w: 360000000
                      h: 444500
                  - text: "For the use in programs the most common error codes are defined in module WinApi.\r\r"
                    attr: 2
                  - text: "\rNew GUID\r"
                    attr: 10
                  - text: "\rThe command COM->New GUID generates a text which contains 10 interface GUIDs. It calls the OLE procedure "
                    attr: 2
                  - text: CoCreateGuid
                    attr: 10
                  - text: ".\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      dsc: 25400
                      grid: 1
                      attr: 2
                      w: 360000000
                      h: 444500
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 79
                      bodyPos: 246956
                      bodyLen: 52693
                    attr: 2
                    w: 2552685
                    h: 1800090
                  - text: "\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\r"
                    attr: 2
                  - text: "Collect\r"
                    attr: 10
                  - text: "\rThe command COM->Collect explicitly calls the garbage collector.\r\r"
                    attr: 2
