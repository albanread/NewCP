                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "Table 3-5. List of loaded modules\r\rThe list shows all loaded modules. For each module, it shows its code size in bytes, how many other modules import it, when it has been compiled, and when it has been loaded.\r\rIt is easy to get an overview over the already loaded modules, but what about modules not yet loaded? The idea of having access to a wealth of prebuilt components raises some organizational issues. How do you find out exactly which components are available? How do you find out which of the available components provide the services that you need?\rThis is a matter of conventions, documentation, and supporting tools. For the BlackBox Component Builder, it is a convention that collections of related components, called "
                    attr: 1
                  - text: subsystems
                    attr: 3
                  - text: ", are placed into separate directories; all of which are located directly in the BlackBox directory. There are subsystems like System, Std, Host, Mac, Win, Text, Form, Dev, or Obx. The whole collection of subsystems is called the BlackBox "
                    attr: 1
                  - text: repository
                    attr: 3
                  - text: ". The basic idea behind the repository's structure is that everything that belongs to a component (code files, symbol files, documentation, resources) are stored together in a systematic and simple directory structure, according to the rule\r\r"
                    attr: 1
                  - text: Keep all constituents of a component in one place.
                    attr: 3
                  - text: "\r\rIt is only appropriate for component-oriented software that addition and removal of a component can be performed incrementally, by adding or removing a directory. All kinds of central installation or registration mechanisms which distribute the constituents of a component should be avoided, since they inevitably lead to (unnecessary) management problems.\r\r"
                    attr: 1
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 14
                      bodyPos: 3533
                      bodyLen: 852
                    attr: 1
                    w: 5397428
                    h: 2197070
                  - text: "\r\rFigure 3-6. Standard subsystems of the BlackBox Component Builder\r\rEach subsystem directory, e.g. Obx, may contain the following subdirectories:\r\r"
                    attr: 1
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 15
                      bodyPos: 4425
                      bodyLen: 600
                    attr: 1
                    w: 3365439
                    h: 2197060
                  - text: "\r\rFigure 3-7. Structure of a typical subsystem directory\r\rThe module source is saved in a subsystem's Mod directory. The file name corresponds to the module name without its subsystem prefix; e.g., the modules "
                    attr: 1
                  - text: ObxPhoneDB
                    attr: 3
                  - text: " and "
                    attr: 1
                  - text: ObxPhoneUI
                    attr: 3
                  - text: " are stored as Obx/Mod/PhoneDB and Obx/Mod/PhoneUI, respectively. For each source file, there may be a corresponding symbol file, e.g., Obx/Sym/PhoneDB; a corresponding code file, e.g., Obx/Code/PhoneDB; and a corresponding documentation file, e.g., Obx/Docu/PhoneDB. There may be zero or more resource documents in a subsystem, e.g., Obx/Rsrc/PhoneUI. There is not necessarily a 1:1 relationship between modules and resources, although it is generally recommended to use a module name as part of a resource name, in order to simplify maintenance.\rModules whose names have the form SubMod, e.g., "
                    attr: 1
                  - text: TextModels
                    attr: 3
                  - text: ", "
                    attr: 1
                  - text: FormViews
                    attr: 3
                  - text: ", or "
                    attr: 1
                  - text: StdCmds
                    attr: 3
                  - text: ", are stored in their respective subsystems given by their name prefixes, e.g., "
                    attr: 1
                  - text: Text
                    attr: 3
                  - text: ", "
                    attr: 1
                  - text: Form
                    attr: 3
                  - text: ", or "
                    attr: 1
                  - text: Std
                    attr: 3
                  - text: ". The subsystem prefix ends at the left-most transition from a non-uppercase character to an uppercase character. It is recommended that the subsystem prefix starts with an uppercase character.\rModules which belong to no subsystem, i.e., modules whose names are not in the form of SubMod, are stored in a special subsystem called "
                    attr: 1
                  - text: System
                    attr: 3
                  - text: ". The whole BlackBox library and framework core belongs to this category, e.g., the modules "
                    attr: 1
                  - text: Math
                    attr: 3
                  - text: ", "
                    attr: 1
                  - text: Files
                    attr: 3
                  - text: ", "
                    attr: 1
                  - text: Stores
                    attr: 3
                  - text: ", "
                    attr: 1
                  - text: Models
                    attr: 3
                  - text: ", etc.\r\r"
                    attr: 1
                  - ruler:
                      left: 648000
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 72000 }
                        - { stop: 648000 }
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "Each subsystem directory may contain the following subdirectories:\r\x0e\tCode\tDirectory with the executable code files, i.e., lightweight DLLs.\rFor example, for module \"FormCmds\" there is file \"Form/Code/Cmds\".\rA module for interfacing native DLLs (Windows DLLs or Mac OS code fragments) has no code file. \x0e\tDocu\tDirectory with the fully documented interfaces and other docu.\rFor example, for module \"FormCmds\" there is file \"Form/Docu/Cmds\".\rFor a module that is only used internally, its docu file is not distributed to the customer.\rOften, there are further documentation files which are not specific to a particular module of the subsystem. Such files contain one or more dashes as parts of their names, e.g., \"Dev/Docu/P-S-I\".\rTypical files are\r\"Sys-Map\" (overview with hyperlinks to other documents of this subsystem)\r\"User-Man\" (user manual)\r\"Dev-Man\" (developer manual)\r\x0e\tMod\tDirectory with module sources.\rFor example, for module \"FormCmds\" there is file \"Form/Mod/Cmds\".\rFor a module that is not published in source code (\"white box\"), its source file is not distributed to the customer.\r\x0e\tRsrc\tDirectory with the subsystem's resource documents.\rFor example, for module \"FormCmds\" there is file \"Form/Rsrc/Cmds\".\rThere may be zero, one, or more resource files for one module. If there are several files, the second gets a suffix \"1\", the third a suffix \"2\", and so on. For example, \"Form/Rsrc/Cmds\", \"Form/Rsrc/Cmds1\", \"Form/Rsrc/Cmds2\", etc.\rOften, there are further resource files which are not specific to a particular module of the subsystem.\rTypical files are\r\"Strings\" (string resources of this subsystem)\r\"Menus\" (menus of this subsystem)\r\x0e\tSym\tDirectory with the symbol files.\rFor example, for module \"FormCmds\" there is file \"Form/Sym/Cmds\".\rFor a module that is only used internally, its symbol file is not distributed to the customer.\r\rTable 3-8. Contents of the standard subsystem subdirectories\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "\rIf you want to find out about the repository, its subsystems and their subdirectories, you can invoke the command "
                    attr: 1
                  - text: "Info->Repository"
                    attr: 3
                  - text: ". If you want to find out more about a module, you can select the module name in a text and then execute "
                    attr: 1
                  - text: "Info->Source"
                    attr: 3
                  - text: ", "
                    attr: 1
                  - text: "Info->Interface"
                    attr: 3
                  - text: " or "
                    attr: 1
                  - text: "Info->Documentation"
                    attr: 3
                  - text: ". These commands open the module's Mod, Sym or Docu files. For this purpose, "
                    attr: 1
                  - text: "Info->Interface"
                    attr: 3
                  - text: " converts the binary representation of the symbol file into a readable textual description. For example, type the string \"ObxPhoneDB\" into the log window, select the string, and then execute the "
                    attr: 1
                  - text: "Info->Interface"
                    attr: 3
                  - text: " browser command. As a result, the following text will be opened in a new window:\r\rDEFINITION ObxPhoneDB;\r\r\tTYPE\r\t\tString = ARRAY 32 OF CHAR;\r\r\tPROCEDURE LookupByIndex (index: INTEGER; OUT name, number: String);\r\tPROCEDURE LookupByName (name: String; OUT number: String);\r\tPROCEDURE LookupByNumber (number: String; OUT name: String);\r\rEND ObxPhoneDB.\r\rListing 3-9. Definition of ObxPhoneDB\r\rA module definition as generated by the browser syntactically is a subset of the module implementation, except for the keyword "
                    attr: 1
                  - text: MODULE
                    attr: 3
                  - text: " which is replaced by "
                    attr: 1
                  - text: DEFINITION
                    attr: 3
                  - text: ". This syntax can be regarded as the interface description language (IDL) of Component Pascal. Texts in this language are usually created out of complete module sources by the browser or similar tools, and thus need not be written manually and cannot be compiled.\r\rSince the browser command operates on the symbol file of a module, it can be used even if there is neither a true documentation nor a code file available. During prototyping, where documentation is rarely available, the symbol file browser is very convenient for quickly looking up details like the signature of a procedure, or to get an overview over the interface of an entire module. When a full documentation is available, the command "
                    attr: 1
                  - text: "Info->Documentation"
                    attr: 3
                  - text: " can be used. It opens the module's documentation file, which starts with the definition of the module's interface just like above, but then continues with an explanation of the module's purpose and a detailed description of the various items exported by the module, for example:\r\r"
                    attr: 1
                  - ruler:
                      first: 216000
                      left: 216000
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "Module ObxPhoneDB provides access to a phone database. Access may happen by index, by name, or by number. An entry consists of a name and a phone number string. Neither may be empty. The smallest index is 0, and all entries are contiguous.\r\rPROCEDURE "
                    attr: 1
                  - text: LookupByIndex
                    attr: 2
                  - text: " (index: INTEGER; OUT name, number: ARRAY OF CHAR)\rReturn the <name, number> pair of entry "
                    attr: 1
                  - text: index
                    attr: 3
                  - text: ". If the index is too large, <\"\", \"\"> is returned.\rThe procedure operates in constant time.\r\rPre\rindex >= 0\t20\r\rPost\rindex is legal\r\tname # \"\"  &  number # \"\"\rindex is not legal\r\tname = \"\"  &  number = \"\"\r\rPROCEDURE "
                    attr: 1
                  - text: LookupByName
                    attr: 2
                  - text: " (name: ARRAY OF CHAR; OUT number: ARRAY OF CHAR)\rReturns a phone number associated with "
                    attr: 1
                  - text: name
                    attr: 3
                  - text: ", or \"\" if no entry for "
                    attr: 1
                  - text: name
                    attr: 3
                  - text: " is found.\rThe procedure operates in linear time, depending on the size of the database.\r\rPost\rname found\r\tnumber # \"\"\rname not found\r\tnumber = \"\"\r\rPROCEDURE "
                    attr: 1
                  - text: LookupByNumber
                    attr: 2
                  - text: " (number: ARRAY OF CHAR; OUT name: ARRAY OF CHAR)\rReturns the name associated with "
                    attr: 1
                  - text: number
                    attr: 3
                  - text: ", or \"\" if no entry for "
                    attr: 1
                  - text: number
                    attr: 3
                  - text: " is found.\rThe procedure operates in linear time, depending on the size of the database.\r\rPost\rnumber found\r\tname # \"\"\rnumber not found\r\tname = \"\"\r\t\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "Listing 3-10. Documentation of ObxPhoneDB\r\rNote that preconditions and postconditions are documented in a semi-formal notation. Their goal is not to give a complete formal specification, but rather to help making the plain text description less ambiguous, where this is possible without using overly complex (and thus unreadable) formal conditions. The following assertion numbers are used for run-time checking in BlackBox:\r\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 2160000, kind: 0x00000002 }
                      version: 2
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "Free\t0 .. 19\rPreconditions\t20 .. 59\rPostconditions\t60 .. 99\rInvariants\t100 .. 120\rReserved\t121 .. 125\rNot Yet Implemented\t         126\rReserved\t         127\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "\rListing 3-11. Assertion numbers in BlackBox\r\rIt is well known that the detection of an error is more difficult and more expensive the later it occurs, i.e., the farther apart the cause and its effects are. This motivates the following design rule:\r\r"
                    attr: 1
                  - text: Let errors become manifest as early as possible.
                    attr: 3
                  - text: "\r\rIn a component-oriented system, defects should always be contained within their components, and not be allowed to propagate into other components. The other components may even be black-boxes for which no source code is available, which makes source-level debugging impossible. Furthermore, the control flow of a large object-oriented software system is so convoluted that it is unrealistic, and thus a waste of time, to trace it beyond component boundaries for debugging purposes.\rThe only viable debugging approach is to design everything, from programming language to libraries to components and applications using a defensive programming style. In particular, entry points into components (procedure/method calls) should refuse to execute if their preconditions are not met:\r\r"
                    attr: 1
                  - text: Never let errors propagate beyond component boundaries.
                    attr: 3
                  - text: "\r\rFortunately, most precondition checks are inexpensive and thus their run-time overhead is negligible. This is important because in a component-oriented system, run-time checks cannot be switched off in a production system, because there "
                    attr: 1
                  - text: are
                    attr: 3
                  - text: " no separate development and production systems. In practice, most components during development are already debugged (\"production\") black-boxes, and the others are currently being debugged white-boxes. The production components must cooperate in order to make adherence to the above rule possible, which means never switching off run-time checks.\r\r\r"
                    attr: 1
                  - text: 3.3 Bottleneck interfaces
                    attr: 2
                  - text: "\r\rOne particular pattern that we would like to discuss here is the Carrier-Rider-Mapper pattern. This pattern is used in several ways in the BlackBox Component Framework: in the text subsystem, in the file abstraction, in the frame abstraction, in the container/context abstraction, and others. Let us consider texts as an example.\rWe regard a text as a so-called "
                    attr: 1
                  - text: carrier
                    attr: 3
                  - text: ". A carrier is an object that carries (contains) data, in this case textual data. Basically, a text can be regarded as a linear stream of elements, where elements have attributes such as font, color, style and vertical offset (for subscript and superscript characters). Elements are characters or views. For all practical purposes, a view in a text can simply be regarded as a special character.\rWhen reading a text, it is convenient not to require the specification of a text position for each and every character read. This convenience can be achieved by supporting a "
                    attr: 1
                  - text: current position
                    attr: 3
                  - text: ", i.e., the text itself knows where to read the next character. Each read operation automatically increments the current position.\rSeveral client objects may use a text carrier independently. For example, a text view needs to read its text when it redraws the text on screen, and a menu command may need to read the same text as its input. These clients are independent of each other; they don't need to know about each other. For this reason, the current read position cannot be stored in the text carrier itself, since this would mean that clients could interfere with each other and lose their independence.\rTo avoid such interference, a carrier provides allocation functions that return so-called "
                    attr: 1
                  - text: rider
                    attr: 3
                  - text: " objects. A rider is an independent access path to a carrier's data. Every text rider has its own current position, and possibly further state such as the current attributes.\r\r"
                    attr: 1
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 28
                      bodyPos: 6225
                      bodyLen: 838
                    attr: 1
                    w: 3098800
                    h: 2197100
                  - text: "\r\rFigure 3-12. Carrier-Rider separation\r\rThe reason why carrier and rider are separated into different data types is the one-to-many relationship between the two: for one carrier there may be an arbitrary number (including zero) riders.\r\rTypically, carrier and rider need to be implemented by the same component, since a rider must have intimate knowledge about the internals of its carrier. For example, text riders and text carriers are both implemented in module "
                    attr: 1
                  - text: TextModels
                    attr: 3
                  - text: ". A text rider contains hidden pointers to the internal data structure of a text carrier. Since this information is completely hidden by the module boundary of "
                    attr: 1
                  - text: TextModels
                    attr: 3
                  - text: ", no outside client can make a rider inconsistent with its carrier. This kind of invariant, guaranteed by Component Pascal's module system, is an example why information hiding beyond single classes is important for safety reasons.\r\rIn the design patterns terminology, a text rider is an "
                    attr: 1
                  - text: external iterator
                    attr: 3
                  - text: ". However, not all riders are necessarily iterators. For example, a context object managed by a container is not an iterator.\r\rText riders come in two flavors: readers and writers. Readers support the reading of characters and views, while writers support the writing of characters and views. For example, the following calls may be made:\r\r\treader.ReadView(view)\r\t\r\tor\r\t\r\twriter.WriteChar(\"X\")\r\rOften, a programmer needs to read or write complex character sequences, so that working at the level of individual characters is too cumbersome. A higher-level abstraction for reading and writing is clearly desirable. This is the purpose of the "
                    attr: 1
                  - text: mappers
                    attr: 3
                  - text: ". A mapper contains a rider that it uses to provide more problem-oriented operations for reading or for writing. Since there exist very different programming problems, different applications may use different mappers, possibly even while working with the same carrier.\rFor text manipulation, BlackBox provides module "
                    attr: 1
                  - text: TextMappers
                    attr: 3
                  - text: ", which defines and implements two text mappers: "
                    attr: 1
                  - text: formatters
                    attr: 3
                  - text: " for writing, and "
                    attr: 1
                  - text: scanners
                    attr: 3
                  - text: " for reading.\r\r"
                    attr: 1
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 29
                      bodyPos: 7173
                      bodyLen: 878
                    attr: 1
                    w: 2463755
                    h: 3009845
                  - text: "\r\rFigure 3-13. Carrier-Rider-Mapper separation\r\rBoth scanner and formatter work on the level of Component Pascal symbols: with integer numbers, real numbers, strings, and so on. For example, the following calls may be made:\r\r\tscanner.ReadInt(int)\r\t\r\tor\r\t\r\tformatter.WriteReal(3.14)\r\rIf there are different mappers for the same kind of carrier, they all have to be implemented in terms of the rider interface. For this reason, the rider/carrier interface is sometimes called a "
                    attr: 1
                  - text: bottleneck interface
                    attr: 3
                  - text: ". The reason why riders and mappers are separated is not a one-to-many relation as with carrier and rider  there is a one-to-one relation between mapper and rider   but independent extensibility: special circumstances may require special mappers. If carriers and mappers adhere to a well-defined rider (bottleneck) interface, it is possible to add new mappers anytime, and to use them with the same carrier.\rEven better: the carrier/rider interface can be an abstract interface, such that different "
                    attr: 1
                  - text: implementations
                    attr: 3
                  - text: " of it may exist. For example, a file carrier may be implemented differently for floppy disk files, hard disk files, CD-ROM files, and network files. But if they all implement the same bottleneck interface, then "
                    attr: 1
                  - text: all
                    attr: 3
                  - text: " file mappers can operate on "
                    attr: 1
                  - text: all
                    attr: 3
                  - text: " file implementations! Compare this with a situation where you would have to re-implement all mappers for all carriers: instead of implementing n carriers plus m mappers, you would have to implement n carriers plus n * m mappers! Wherever such an extensibility in two dimensions occurs (carrier/rider and mapper), a bottleneck interface is needed to avoid the so-called "
                    attr: 1
                  - text: cartesian product problem
                    attr: 3
                  - text: ", i.e., an explosion of implementations.\r\rNote that a bottleneck interface is not extensible itself, because every extension that cannot be implemented in terms of the bottleneck interface invalidates all its existing implementations. For example, if you extend the interface of a device driver for black-and-white bitmap displays by a color extension, then all existing device driver implementations will have to be updated. Since they probably have been implemented by different companies, this can become a major problem.\rThe problem can be defused if the new interface extension is specified as optional: then clients must test whether the option is supported. If not, a client either has to signal that it cannot operate in this environment, or it must gracefully degrade by providing a more limited functionality. If the optional interface is supported and used, it acts as a kind of \"conspiracy\" between the interface implementation and its client. This is admissible, but it clearly reduces the combinations of clients and implementations that are fully functional. This underlines how crucial good bottleneck designs are, in order to avoid the need for later extensions.\r\r"
                    attr: 1
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 30
                      bodyPos: 8141
                      bodyLen: 737
                    attr: 1
                    w: 2311400
                    h: 1308100
                  - text: "\r\rFigure 3-14. Extensibility in two dimensions\r\rIn terms of design patterns, the Carrier-Rider-Mapper pattern solves the problem of flexible and convenient access to a data carrier, however it is implemented. It can be regarded to consist of two simpler and very basic design patterns: the separation of one object into several objects to allow many-to-one relations; and the separation of one object into two objects to allow for independent extensibility:\r\r"
                    attr: 1
                  - text: "Split an abstraction into two interfaces if several clients may access an instance simultaneously, and if independent state may have to be managed for every client."
                    attr: 3
                  - text: "\r\r"
                    attr: 1
                  - text: "Split an abstraction into two interfaces, if it needs to be extended independently in two different dimensions."
                    attr: 3
                  - text: "\r\rThe Carrier-Rider-Mapper separation goes back to a research project [\"Insight ETHOS: On Object-Orientation in Operating Systems\"; Clemens Szyperski; vdf, Zürich, 1992, ISBN 3 7281 1948 2] predating BlackBox. This project used several design patterns and design rules (e.g., avoidance of implementation inheritance) that are also described in "
                    attr: 1
                  - text: Design Patterns
                    attr: 3
                  - text: ". In the "
                    attr: 1
                  - text: Design Patterns
                    attr: 3
                  - text: " terminology, a Rider-Mapper combination (or Carrier-Mapper combination if there is no rider) forms a "
                    attr: 1
                  - text: bridge
                    attr: 3
                  - text: " pattern.\r\rIn BlackBox, riders are often created and managed in a particular way. A rider is typically under exclusive control of one client object, because after all, the reason why there can be multiple riders on one carrier (and thus why the two are distinguished) is precisely to allow several clients access to the carrier's data via their private access paths. Since riders are used in such controlled environments, BlackBox usually creates riders in the following way:\r\r\trider := carrier.NewRider(rider);\r\rThe idea is that if there already exists an old rider that isn't used anymore, it can be recycled. Recycling is done by the "
                    attr: 1
                  - text: NewRider
                    attr: 3
                  - text: " factory method (see next section) if possible. Of course, recycling is only legal if the old rider isn't used anymore for something else (possibly by someone else); that's why it is important that the rider is maintained in a controlled environment.\rTypically, a "
                    attr: 1
                  - text: NewRider
                    attr: 3
                  - text: " procedure is implemented in the following way:\r\r\tPROCEDURE (o: Obj) NewRider (old: Rider): Rider;\r\t\tVAR r: RiderImplementation;\r\tBEGIN\r\t\tIF (old # NIL) & (old IS RiderImplementation) THEN\t"
                    attr: 1
                  - text: "(* recycle old rider *)"
                    attr: 3
                  - text: "\r\t\t\tr := old(RiderImplementation)\r\t\tELSE\t"
                    attr: 1
                  - text: "(* allocate new rider *)"
                    attr: 3
                  - text: "\r\t\t\tNEW(r)\r\t\tEND;\r\t\t... initialize r ...\r\t\t"
                    attr: 1
                  - text: RETURN
                    attr: 2
                  - text: " r\r\tEND NewRider;\r\rListing 3-15. Rider recycling\r\rThis approach is used in BlackBox for files, texts, and forms. It can make a considerable difference in efficiency, depending on the kind of application. However, where efficiency is not a concern, it is probably a good idea to omit this mechanism, thereby avoiding any possibility for inadvertant reuse of riders in different contexts simultaneously.\r\r\r"
                    attr: 1
                  - text: 3.4 Object creation
                    attr: 2
                  - text: "\r\rThe BlackBox Component Framework is mostly a black-box design. It strictly separates interface from implementation. A client can only import, and thus directly use or manipulate, interfaces of objects. The implementations are hidden within the modules. This enforces that module clients adhere to the following design rule (Gamma et.al.):\r\r"
                    attr: 1
                  - text: "Program to an interface, not to an implementation"
                    attr: 3
                  - text: ".\r\rIn Component Pascal, object interfaces are represented as abstract record types. An implementation of an abstract record type is a concrete extension of it. Typically, implementations are not exported and thus cannot be extended (\"subclassed\") in other modules, meaning that implementation inheritance cannot be used. Thus it is also enforced that extension programmers adhere to the following design rule (Gamma et.al.):\r\r"
                    attr: 1
                  - text: Favor object composition over class inheritance.
                    attr: 3
                  - text: "\r\rConcrete record types cannot even be instantianted directly: because a client cannot import an object implementation whose type is not exported, it cannot allocate an instance by calling "
                    attr: 1
                  - text: NEW
                    attr: 3
                  - text: ". This is desirable, because "
                    attr: 1
                  - text: NEW
                    attr: 3
                  - text: " would couple the client code forever to one particular object implementation; reuse of the code for other implementations wouldn't be possible anymore. But how can client code solve the "
                    attr: 1
                  - text: black-box allocation problem
                    attr: 3
                  - text: "; i.e., obtain an object implementation without specific knowledge of it?\r\r"
                    attr: 1
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 31
                      bodyPos: 9078
                      bodyLen: 1465
                    attr: 1
                    w: 5588000
                    h: 3327400
                  - text: "\r\rFigure 3-16. Exported interface records and hidden implementation records\r\rInstead of calling "
                    attr: 1
                  - text: NEW
                    attr: 3
                  - text: " it might be possible to call an allocation function instead, a so-called "
                    attr: 1
                  - text: factory function
                    attr: 3
                  - text: ". For example, module "
                    attr: 1
                  - text: TextModels
                    attr: 3
                  - text: " might export a function "
                    attr: 1
                  - text: New
                    attr: 3
                  - text: " that allocates and returns a text model. Internally, it would execute a "
                    attr: 1
                  - text: NEW
                    attr: 3
                  - text: " on the non-exported implementation type and possibly perform some initialization. This would be better than clients directly calling "
                    attr: 1
                  - text: NEW
                    attr: 3
                  - text: ", because the allocating module can guarantee correct initialization, and a new release of the module could perform allocation or initialization in some different way without affecting clients. However, static factory functions are still too inflexible. A proper solution of the black-box allocation problem requires a level of indirection. There are several approaches to achieve this. They are called creational patterns. BlackBox uses four major creational patterns: prototypes, factory methods, directory objects, and factory managers. They are discussed one by one.\r\rSometimes it is necessary to create an object of the same type as some other already existing object. In this case, the existing object is called a "
                    attr: 1
                  - text: prototype
                    attr: 3
                  - text: ", which provides a factory function or initialization method. BlackBox models can act as prototypes. For example, it is possible to clone a prototype and to let the prototype initialize its clone. This makes sure that the newly created object has exactly the same concrete type as the prototype, and it allows the prototype and its clone(s) to share caches for performance reasons. For example, a BlackBox text model and its clones share the same spill file that they use for buffering temporary data. Sharing avoids the proliferation of open files.\r\rSometimes there exists an object that can be used to create an object of "
                    attr: 1
                  - text: another
                    attr: 3
                  - text: " type. For this purpose, the existing object provides a factory function, a "
                    attr: 1
                  - text: factory method
                    attr: 3
                  - text: ". Possibly, the object may provide different factory methods which support different initialization strategies or which create different types of concrete objects.\rIn BlackBox, a text model provides the procedures "
                    attr: 1
                  - text: NewReader
                    attr: 3
                  - text: " and "
                    attr: 1
                  - text: NewWriter
                    attr: 3
                  - text: ", which generate new readers and writers. They are rider objects that represent access paths to a text.\rFactory methods are appropriate for objects that are implemented simultaneously (\""
                    attr: 1
                  - text: implementation covariance
                    attr: 3
                  - text: "\"). This is always the case for riders and their carriers.\r\rBut this approach is not sufficient for allocating the text models themselves. Where does the first text model come from? BlackBox uses special objects with factory methods, so-called "
                    attr: 1
                  - text: factory objects
                    attr: 3
                  - text: ". In BlackBox, factory objects are used in a particular way: they are installed in global variables and may be replaced at run-time, without affecting client code. For historical reasons, we call factory objects which are used for configuration purposes "
                    attr: 1
                  - text: directory objects
                    attr: 3
                  - text: ".\rFor example, module "
                    attr: 1
                  - text: TextModels
                    attr: 3
                  - text: " exports the type "
                    attr: 1
                  - text: Directory
                    attr: 3
                  - text: " which contains a "
                    attr: 1
                  - text: New
                    attr: 3
                  - text: " function, furthermore it exports the two variables "
                    attr: 1
                  - text: dir
                    attr: 3
                  - text: " and "
                    attr: 1
                  - text: stdDir
                    attr: 3
                  - text: " and the procedure "
                    attr: 1
                  - text: SetDir
                    attr: 3
                  - text: ". By default, "
                    attr: 1
                  - text: TextModels.dir
                    attr: 3
                  - text: " is used by client code to allocate new empty text models. "
                    attr: 1
                  - text: TextModels.stdDir
                    attr: 3
                  - text: " contains the default implementation of a text model, which is mostly useful during the debugging of a new text model implementation. For example, you could use the old directory while developing a new text model implementation. When the new one is ready you install its directory object by calling "
                    attr: 1
                  - text: SetDir
                    attr: 3
                  - text: ", thereby upgrading the text subsystem to the new implementation on the fly. From this time, newly created texts will have the new implementation. Texts with the old implementation won't be affected. If the new implementation has errors, the default implementation can be reinstalled by calling "
                    attr: 1
                  - text: TextModels.SetDir(TextModels.stdDir)
                    attr: 3
                  - text: ". The text subsystem uses directory objects in this typical way; the same design pattern can be found in other container model abstractions; e.g., for forms models. In BlackBox, it is even used for much simpler models and views; e.g., for "
                    attr: 1
                  - text: DevMarkers.
                    attr: 3
                  - text: "\rNote that objects allocated via directories are often persistent and their implementation thus long-lived. For this reason, several different implementations appear over time which have to be used simultaneously.\rTypically, the normal default directory objects of a subsystem are installed automatically when the subsystem is loaded. If other directory objects should be installed, a "
                    attr: 1
                  - text: Config
                    attr: 3
                  - text: " module is used to set up the desired directory object configuration upon startup.\rThe name \"directory object\" comes from another use of the directory design pattern: in module "
                    attr: 1
                  - text: Files
                    attr: 3
                  - text: ", a file can be created by using the directory object "
                    attr: 1
                  - text: Files.dir
                    attr: 3
                  - text: ". But a "
                    attr: 1
                  - text: Files.Directory
                    attr: 3
                  - text: " also provides means to find out more about the current configuration of the file system (e.g., procedure "
                    attr: 1
                  - text: Files.Directory.FileList
                    attr: 3
                  - text: ").\rFile directories are interesting also because they show that a replacement directory may sometimes need to forward to the replaced directory object. For example, if the new directory implements special memory files, which are distinguished by names that begin with \"M:\\\", then the new directory must check at each file lookup whether the name begins with the above pattern. If so, it is a memory file. If not, it is a normal file and must be handled by the old directory object.\rThere may exist several directory objects simultaneously. For example, if a service uses files in a particular way, it may provide its own file directory object which by default forwards to the file system's standard directory object.\rMultiple directory objects and chaining of directory objects are part of the directory design pattern. This chaining part of the pattern is cascadable, if a new directory object accesses the most recent old one, instead of "
                    attr: 1
                  - text: stdDir
                    attr: 3
                  - text: ".\rNote that unlike typical factory classes, directories are rarely extended.\r\r"
                    attr: 1
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 32
                      bodyPos: 10893
                      bodyLen: 688
                    attr: 1
                    w: 3797300
                    h: 2552700
                  - text: "\r\rFigure 3-17. Forwarding between two directory objects\r\rDirectory objects are a particularly appropriate solution when the existence of one dominating implementation of an extensible black-box type can be expected, without excluding the existence of other implementations.\rOn the other hand, there could also be several special directory objects for the same implementation but for different purposes. For example, there may be a special text directory object for texts that have a special default ruler useful for program texts. A program editor would then create new program text via this directory object rather than via the standard directory of the text subsystem.\r\rA "
                    attr: 1
                  - text: registry
                    attr: 3
                  - text: " would be a valuable addition to directory objects. A registry is a persistent central database which stores configuration information, such as the particular directory objects to install upon startup. The problem with registries is that they contradict the decentral nature of software components, which leads to management problems such as finding registry entries that are no longer valid.\r\rWe have seen that allocation via one level of indirection is key to solving the black-box allocation problem. Directory objects are a solution involving global state. This is only desirable if this state changes rarely, and if no parallel activities occur (threads). For example, in server environments a state-free solution is often preferable. This can be achieved by parameterizing the client: the client must be passed a factory object as parameter. This makes it possible to determine the exact nature of an implementation at the \"top\" of a hierarchy of procedure calls, always passing the factory object \"downward\". This is useful since the top-level is typically much less reusable than lower-level code.\rAs an example, a file transfer dialog box may allow to specify the file transfer protocol along with information such as remote address, communication speed, and so on. The file transfer protocol, which indicates the implementation of a communication object, can be passed from the dialog box down to the communication software, where it is used to allocate a suitable communication object (e.g., a TCP stream object).\rInstead of passing a factory object, its symbolic name may be passed. At the \"bottom\", a service interprets this name; if necessary loads the module which implements the corresponding factory function; and then creates an object using the factory function. In this way, the service acts as a "
                    attr: 1
                  - text: factory manager
                    attr: 3
                  - text: ".\rThis approach is used for some BlackBox services, in particular for the "
                    attr: 1
                  - text: Sql
                    attr: 3
                  - text: " and "
                    attr: 1
                  - text: Comm
                    attr: 3
                  - text: " subsystems. In both cases, the name of a module can be passed when allocating a new object. This module is expected to provide suitable factory functions. For "
                    attr: 1
                  - text: Sql
                    attr: 3
                  - text: ", the modules "
                    attr: 1
                  - text: SqlOdbc
                    attr: 3
                  - text: " and "
                    attr: 1
                  - text: SqlOdbc3
                    attr: 3
                  - text: " provide appropriate object implementations and factory functions. For "
                    attr: 1
                  - text: Comm
                    attr: 3
                  - text: ", the module "
                    attr: 1
                  - text: CommTCP
                    attr: 3
                  - text: " provides a suitable object implementation.\rFactory managers are often more suitable for creating non-persistent objects, while directory objects are often more suitable for creating persistent objects.\r"
                    attr: 1
