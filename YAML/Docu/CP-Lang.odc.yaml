                    attr: 6
                  - text: ". This allows short alias names in qualified identifiers. A module must not import itself. Identifiers that are to be exported (i.e., that are to be visible in client modules) must be marked by an export mark in their declaration (see Chapter 4).\r\tThe statement sequence following the symbol BEGIN is executed when the module is added to a system (loaded), which is done after the imported modules have been loaded. It follows that cyclic import of modules is illegal. Individual exported procedures can be activated from the system, and these procedures serve as "
                    attr: 1
                  - text: commands
                    attr: 6
                  - text: " .\r\tVariables declared in a module are cleared prior to the execution of the module body. This implies that all pointer or procedure typed variables are initialized to NIL.\r\tThe statement sequence following the symbol CLOSE is executed when the module is removed from the system.\r\rExample:\r\rMODULE Trees; \t(* exports: Tree, Node, Insert, Search, Write, Init *)\r\r\tIMPORT StdLog;\r\r\tTYPE\r\t\tTree* = POINTER TO Node;\r\t\tNode* = RECORD\t(* exports read-only: Node.name *)\r\t\t\tname-: POINTER TO ARRAY OF CHAR;\r\t\t\tleft, right: Tree\r\t\tEND;\r\r\tPROCEDURE (t: Tree) Insert* (name: ARRAY OF CHAR), NEW;\r\t\tVAR p, father: Tree;\r\tBEGIN\r\t\tp := t;\r\t\tREPEAT father := p;\r\t\t\tIF name = p.name^ THEN RETURN END;\r\t\t\tIF name < p.name^ THEN p := p.left ELSE p := p.right END\r\t\tUNTIL p = NIL;\r\t\tNEW(p); p.left := NIL; p.right := NIL;\r\t\tNEW(p.name, LEN(name$) + 1); p.name^ := name$;\r\t\tIF name < father.name^ THEN father.left := p ELSE father.right := p END\r\tEND Insert;\r\r\tPROCEDURE (t: Tree) Search* (name: ARRAY OF CHAR): Tree, NEW;\r\t\tVAR p: Tree;\r\tBEGIN\r\t\tp := t;\r\t\tWHILE (p # NIL) & (name # p.name^) DO\r\t\t\tIF name < p.name^ THEN p := p.left ELSE p := p.right END\r\t\tEND;\r\t\tRETURN p\r\tEND Search;\r\r\tPROCEDURE (t: Tree) Write*, NEW;\r\tBEGIN\r\t\tIF t.left # NIL THEN t.left.Write END;\r\t\tStdLog.String(t.name); StdLog.Ln;\r\t\tIF t.right # NIL THEN t.right.Write END\r\tEND Write;\r\r\tPROCEDURE Init* (t: Tree);\r\tBEGIN\r\t\tNEW(t.name, 1); t.name[0] := 0X; t.left := NIL; t.right := NIL\r\tEND Init;\r\rBEGIN\r\tStdLog.String(\"Trees loaded\"); StdLog.Ln\rCLOSE\r\tStdLog.String(\"Trees removed\"); StdLog.Ln\rEND Trees.\r\r\r"
