                  - text: "The Component Pascal definition implicitly relies on four fundamental assumptions.\r\r1) There exists some run-time type information that allows to check the dynamic type of an object. This is necessary to implement type tests and type guards.\r\r2) There is no DISPOSE procedure. Memory cannot be deallocated manually, since this would introduce the safety problem of memory leaks and of dangling pointers, i.e., premature deallocation. Except for those embedded systems where no dynamic memory is used, or where it can be allocated once and never needs to be released, an automatic garbage collector is required.\r\r3) Modules and at least their exported procedures (commands) and exported types must be retrievable dynamically. If necessary, this may cause modules to be loaded. The programming interface used to load modules or to access the mentioned meta information is not defined by the language, but the language compiler needs to preserve this information when generating code.\rExcept for fully linked applications where no modules will ever be added at run-time, a linking loader for modules is required. Embedded systems are important examples of applications that can be fully linked.\r\r4) The environment must provide the ability to display Unicode characters, except for \"headless\" embedded applications that need no display.\r\rAn implementation that doesn't fulfill these compiler and environment requirements is not compliant with Component Pascal.\r"
