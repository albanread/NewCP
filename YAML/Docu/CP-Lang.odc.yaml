                  - text: "Module \t=\tMODULE ident \";\" [ImportList] DeclSeq\r\t\t[BEGIN StatementSeq]\r\t\t[CLOSE StatementSeq] END ident \".\".\rImportList \t=\tIMPORT [ident \":=\"] ident {\",\" [ident \":=\"] ident} \";\".\rDeclSeq \t=\t{ CONST {ConstDecl \";\" } | TYPE {TypeDecl \";\"} |\r\t\tVAR {VarDecl \";\"}} {ProcDecl \";\" | ForwardDecl \";\"}.\rConstDecl\t=\tIdentDef \"=\" ConstExpr.\rTypeDecl\t=\tIdentDef \"=\" Type.\rVarDecl\t=\tIdentList \":\" Type.\rProcDecl \t=\tPROCEDURE [Receiver] IdentDef [FormalPars] MethAttributes\r\t\t[\";\" DeclSeq [BEGIN StatementSeq] END ident].\rMethAttributes\t=\t[\",\" NEW] [\",\" (ABSTRACT | EMPTY | EXTENSIBLE)].\rForwardDecl \t=\tPROCEDURE \" ^ \" [Receiver] IdentDef [FormalPars] MethAttributes.\rFormalPars \t=\t\"(\" [FPSection {\";\" FPSection}] \")\" [\":\" Type].\rFPSection \t=\t[VAR | IN | OUT] ident {\",\" ident} \":\" Type.\rReceiver\t=\t\"(\" [VAR | IN] ident \":\" ident \")\".\rType \t=\tQualident\r\t\t|  ARRAY [ConstExpr {\",\" ConstExpr}] OF Type \r\t\t| [ABSTRACT | EXTENSIBLE | LIMITED]\r\t\t\tRECORD [\"(\"Qualident\")\"] FieldList {\";\" FieldList} END\r\t\t| POINTER TO Type\r\t\t| PROCEDURE [FormalPars].\rFieldList \t=\t[IdentList \":\" Type].\rStatementSeq\t=\tStatement {\";\" Statement}.\rStatement \t=\t[ Designator \":=\" Expr \r\t\t| Designator [\"(\" [ExprList] \")\"] \r\t\t| IF Expr THEN StatementSeq\r\t\t\t{ELSIF Expr THEN StatementSeq}\r\t\t\t[ELSE StatementSeq] END \r\t\t| CASE Expr OF Case {\"|\" Case}\r\t\t\t[ELSE StatementSeq] END \r\t\t| WHILE Expr DO StatementSeq END \r\t\t| REPEAT StatementSeq UNTIL Expr \r\t\t| FOR ident \":=\" Expr TO Expr [BY ConstExpr]\r\t\t\tDO StatementSeq END \r\t\t| LOOP StatementSeq END\r\t\t| WITH [ Guard DO StatementSeq ]\r\t\t\t{\"|\" [ Guard DO StatementSeq ] }\r\t\t\t[ELSE StatementSeq] END\r\t\t| EXIT \r\t\t| RETURN [Expr]\r\t\t].\rCase \t=\t[CaseLabels {\",\" CaseLabels} \":\" StatementSeq].\rCaseLabels \t=\tConstExpr [\"..\" ConstExpr].\rGuard\t=\tQualident \":\" Qualident.\rConstExpr\t=\tExpr.\rExpr \t=\tSimpleExpr [Relation SimpleExpr].\rSimpleExpr\t=\t[\"+\" | \"-\"] Term {AddOp Term}.\rTerm \t=\tFactor {MulOp Factor}.\rFactor \t=\tDesignator | number | character | string | NIL | Set |\r\t\t\"(\" Expr \")\" | \" ~ \" Factor.\rSet\t=\t\"{\" [Element {\",\" Element}] \"}\".\rElement \t=\tExpr [\"..\" Expr].\rRelation \t=\t\"=\" | \"#\" | \"<\" | \"<=\" | \">\" | \">=\" | IN | IS.\rAddOp \t=\t\"+\" | \"-\" | OR.\rMulOp \t=\t\" * \" | \"/\" | DIV | MOD | \"&\".\rDesignator \t=\tQualident {\".\" ident | \"[\" ExprList \"]\" | \" ^ \" | \"(\" Qualident \")\"\r\t\t| \"(\" [ExprList] \")\"} [ \"$\" ].\rExprList \t=\tExpr {\",\" Expr}.\rIdentList \t=\tIdentDef {\",\" IdentDef}.\rQualident \t=\t[ident \".\"] ident.\rIdentDef \t=\tident [\" * \" | \"-\"].\r\r\r"
