                      attr: 7
                      w: 360000000
                      h: 444500
                  - text: "\r"
                    attr: 7
                  - text: "The Direct-To-COM (DTC) compiler is a Component Pascal compiler that supports Microsoft's Component Object Model (COM) binary interface standard. In DTC Component Pascal, COM objects are declared and implemented in a superset of the Component Pascal language. They can be used from any other language, and COM objects implemented in any language can be used from Component Pascal.\r\rIn Component Pascal, COM interfaces are mapped to special Component Pascal records. Interface pointers are pointers to such records. The virtual function table is the method table of the Component Pascal type descriptor. It is hidden from the programmer. A COM interface can be defined in the following way:\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      dsc: 25400
                      grid: 1
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\t\t"
                    attr: 2
                  - text: ILookup
                    attr: 4
                  - text: "* = POINTER TO ABSTRACT RECORD \r\t\t\t\t\t\t\t\t[\"{C4910D71-BA7D-11CD-94E8-08001701A8A3}\"] (COM.IUnknown) END;\r\r\t\tPROCEDURE (this: ILookup) "
                    attr: 2
                  - text: LookupByName
                    attr: 4
                  - text: "*(\r\t\t\tname: WinApi.PtrWSTR; OUT number: WinApi.PtrWSTR): COM.RESULT, NEW, ABSTRACT;\r\t\t\r\t\tPROCEDURE (this: ILookup) "
                    attr: 2
                  - text: LookupByNumber
                    attr: 4
                  - text: "*(\r\t\t\tnumber: WinApi.PtrWSTR; OUT name: WinApi.PtrWSTR): COM.RESULT, NEW, ABSTRACT;\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "Interface definitions can be derived from one another using Component Pascal subtyping. The above interface is a subtype of the interface "
                    attr: 2
                  - text: COM.IUnknown
                    attr: 8
                  - text: ". The interface identifier (IID) is specified in the declaration of the interface. The interface is declared to be abstract and cannot be instantiated. Concrete implementations of interface objects are extensions of interface records. In contrast to the interface records which are referenced through (reference-counted) interface pointers, the implementation records are referenced through regular Component Pascal pointers.\r\rThe COM standard uses reference counting as its memory management strategy. Reference counting errors, however, are the most difficult and dangerous errors when programming to the OLE interfaces. The \"Safer OLE\" technology of the DTC compiler adds automatic memory management to COM objects. In contrast to C and C++, programmers using the DTC Component Pascal compiler do not need to worry about reference counting. The compiler automatically generates calls of an object's "
                    attr: 2
                  - text: AddRef
                    attr: 8
                  - text: " and "
                    attr: 2
                  - text: Release
                    attr: 8
                  - text: " methods where necessary, and the compiler also automatically implements the "
                    attr: 2
                  - text: AddRef
                    attr: 8
                  - text: " and "
                    attr: 2
                  - text: Release
                    attr: 8
                  - text: " methods for interfaces implemented in Component Pascal. When a COM object is no longer used, it is automatically removed from memory. Components written in DTC Component Pascal become more reliable and maintainable.\rIn Component Pascal, the above example looks as follows:\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      dsc: 25400
                      grid: 1
                      opts: 0x00000003
                      tabs:
                        - { stop: 144000 }
                        - { stop: 288000 }
                        - { stop: 432000 }
                        - { stop: 576000 }
                        - { stop: 720000 }
                        - { stop: 1980000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\tVAR\r\t\tfactory: IFactory;\r\t\tanimal1, animal2: IAnimal;\r\t\thr: COM.RESULT;\r\t\t\r\tBEGIN\t\t\r\t\thr := GetFactory(COM.ID(IFactory), factory);\r\t\tIF hr >= 0 THEN\r\t\t\thr := factory.CreateInstance(NIL, COM.ID(animal1), animal1);\r\t\t\tIF hr >= 0 THEN\r\t\t\t\tanimal2 := animal1;\r\t\t\t\tanimal2.Sleep();\r\t\t\t\thr := factory.CreateInstance(NIL, COM.ID(animal1), animal1);\r\t\t\t\tIF hr >= 0 THEN\r\t\t\t\t\tanimal1.Eat()\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\rCalls to the reference counting methods are generated for assignments to interface pointer variables. The garbage collector recognizes COM interface implementations and does not remove such objects with a reference count greater than zero. If the garbage collector finds a COM interface object with reference count zero, then all interface pointers stored in this object are released before the object is collected. The same holds for local variables if the scope is left and for global variables that are stored in a component to be unloaded. This automatic garbage collection mechanism just generates code that would have to be written manually in any case. Thus it does not require any extra run time and is fully compatible with other components, created with other tools.\r\r\rThe DTC compiler is integrated in the development environment BlackBox. The debugger allows to inspect components and objects on a symbolic level. In order to browse through dynamic memory, you use hyper­text links to follow pointers.\r"
                    attr: 2
                  - text: "\r"
                    attr: 4
                  - text: "\rEffective support for COM in Component Pascal requires special language constructs, e.g. to specify the unique id of a COM interface. We clearly separate these language extensions from the core language. The reason is that such interfacing features should and need not be used in normal Component Pascal modules, and moreover, COM is only one of an increasing number of object models which could be supported. Modules using the special language constructs must flag this fact in the module header. If you look at the beginning of a module source, it should immediately be clear whether this is an (unportable) module and whether it is unsafe or not. We already have followed this principle in earlier products: system flags and other similar features are only allowed in modules which import the pseudo-module "
                    attr: 2
                  - text: SYSTEM
                    attr: 8
                  - text: ". This module and the necessary compiler extensions are not considered part of the language definition proper. In a similar vein, a pseudo-module COM needs to be imported in order to make the special COM features available in a module. This module is not considered a part of Component Pascal itself.\r\rTo quote Prof. N. Wirth from the ETH technical report #82 (From Modula to Oberon):\r\"It appears preferrable to drop the pretense of portability of programs that import a \"standard\", yet system-specific module. Both, the module SYSTEM and the type transfer functions are therefore eliminated, and with them also the types ADDRESS and WORD. Individual implementations are free to provide system-dependent modules, but they do not belong to the general language definition. Their use then declares a program to be patently implementation-specific, and thereby non-portable.\"\r\rIn this spirit, procedural DLLs and COM DLLs are system-specific. A software system should minimize the number and size of modules directly using them, and encapsulate the latter such that their module interfaces only use the core Component Pascal features wherever possible (abstraction!).\rFor this reason it is considered good software engineering practice to structure the implementation of a complex COM object such that the number of objects (and their modules) that contain references to interfaces are minimized and they are concentrated at the \"top\" and \"bottom\" of the module hierarchy, so that the intermediate layer consists of pure Component Pascal modules which don't use any special COM features:\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      attr: 2
                      w: 360000000
                      h: 444500
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 48
                      bodyPos: 3495
                      bodyLen: 5883
                    attr: 2
                    w: 4724342
                    h: 3098762
                  - text: "\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "This leads to a module structure such as the following, where the top-level module implements the COM interfaces (export), the bottom-level modules implement access to existing COM interfaces (import), while the intermediate modules are implemented in portable, safe, and non-COM-specific modules:\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      attr: 2
                      w: 360000000
                      h: 444500
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 53
                      bodyPos: 9671
                      bodyLen: 1175
                    attr: 2
                    w: 4724400
                    h: 1854200
                  - text: "\r\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - target:
                      name: 3.1
                      body:
                        - text: COM Compiler Extensions
                          attr: 4
                      attr: 4
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 7
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      attr: 7
                      w: 360000000
                      h: 444500
                  - text: "\r"
                    attr: 7
                  - text: "The compiler features added in order to support COM are modest. In particular, new sysflags for interface records and VAR parameters have been defined and union records are provided. Some additional types and functions are defined in the pseudo module COM.\r\rIn order to access these extended facilities, the pseudo module COM must be imported. In the following, the special COM extensions are explained.\r\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x0000000b
                      attr: 4
                      w: 360000000
                      h: 444500
                  - target:
                      name: 3.2
                      body:
                        - text: COM Sysflags for Interface Structures
                          attr: 4
                      attr: 4
                      w: 150300
                      h: 142875
                  - text: "\r\r"
                    attr: 4
                  - text: "Interface records are marked by the "
                    attr: 2
                  - text: "interface "
                    attr: 8
                  - text: sysflag
                    attr: 2
                  - text: " "
                    attr: 8
                  - text: "or by a GUID (globally unique identifier) flag. The GUID string must be a valid GUID constant spelled out in hex and wrapped in braces.\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      dsc: 25400
                      grid: 1
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\t\tTYPE\r\t\t\tIExample = POINTER TO ABSTRACT RECORD\r\t\t\t\t[\"{91C074A1-C2D7-11CF-A4A1-444553540000}\"] (COM.IUnknown) END;\r\t\t\t\r\t\tPROCEDURE (e: IExample) MethodA(): COM.RESULT, NEW, ABSTRACT;\r\t\t\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "Instead of an explicit GUID, an interface record can also be marked with the interface sysflag. Such interfaces however cannot be requested through a QueryInterfacecall as they have no identifier. They can be used to implement outgoing interfaces which are not explicitely requested.\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      dsc: 25400
                      grid: 1
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\t\tTYPE\r\t\t\tIExample = POINTER TO ABSTRACT RECORD [interface] (COM.IUnknown) END;\r\t\t\t\r\t\tPROCEDURE (e: IExample) MethodA(): COM.RESULT, NEW, ABSTRACT\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "Interface records and interface pointers must be (direct or indirect) extensions of COM.IUnknown. Interface records must be abstract and therefore must not contain any fields. Procedures bound to interface records must also be abstract. Abstract records cannot be allocated. The only legal usage of an interface record is as a record or pointer base type or as type of an interface pointer variable.\r\rAn implementation extension of an interface must overwrite all abstract procedures bound to the interface record. Exceptions are the procedures defined by COM.IUnknown:\r\rThe following example defines an implementation of the "
                    attr: 2
                  - text: IExample
                    attr: 8
                  - text: " interface. By convention, type names of interface pointers start with an I, and type names of (implementing) classes with a C.\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      dsc: 25400
                      grid: 1
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\t\tTYPE\r\t\t\tCExample = POINTER TO RECORD (IExample) END;\r\t\t\t\r\t\tPROCEDURE (e: CExample) MethodA(): COM.RESULT;\r\t\tBEGIN RETURN WinApi.E_NOTIMPL\r\t\tEND MethodA;\r\t\t\r\t\t\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x0000000b
                      attr: 4
                      w: 360000000
                      h: 444500
                  - target:
                      name: 3.3
                      body:
                        - text: COM Sysflags for VAR Parameters
                          attr: 4
                      attr: 4
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 4
                  - text: "\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 720000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "[nil]\tThe "
                    attr: 2
                  - text: nil
                    attr: 8
                  - text: " flag for VAR parameters indicates that NIL may also be used as an actual parameter.\r\rWith the function VALID (see below) it can be tested whether an actual VAR parameter is valid, i.e. is not NIL. If the actual parameter is not valid (i.e. is NIL), then it must neither be read nor written. It may only be passed as actual parameter for another nil-parameter. Attempts to read or write an invalid nil parameter leads to a NIL dereference trap.\r\r\r"
                    attr: 2
                  - ruler:
                      left: 720000
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 720000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "[new] [iid]\tThe iid and new VAR parameter flags allow to specify polymorphic out parameters. They allow to implement "
                    attr: 2
                  - text: QueryInterface-
                    attr: 8
                  - text: "like operations.\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "The "
                    attr: 2
                  - text: new
                    attr: 8
                  - text: " and "
                    attr: 2
                  - text: iid
                    attr: 8
                  - text: " parameters must always be paired in a parameter list. A "
                    attr: 2
                  - text: new
                    attr: 8
                  - text: " parameter must be followed by a corresponding "
                    attr: 2
                  - text: iid
                    attr: 8
                  - text: " parameter or vice versa. A parameter list may contain only one "
                    attr: 2
                  - text: new-iid
                    attr: 8
                  - text: " pair"
                    attr: 2
                  - text: ".\r\r"
                    attr: 4
                  - text: "The "
                    attr: 2
                  - text: iid
                    attr: 8
                  - text: " parameter must be an IN parameter of type GUID, and the "
                    attr: 2
                  - text: new
                    attr: 8
                  - text: " parameter must be an OUT parameter of an interface type.\r\rThe type passed as "
                    attr: 2
                  - text: iid
                    attr: 8
                  - text: " parameter defines the static type of the polymorphic out parameter. The dynamic type of the out parameter can be a subtype of the asserted static type. The actual parameter passed for the interface parameter may be a base type of the asserted static type and may be an extension of the formal parameter. In other words, the following relation must be satisfied for the actual parameters of a polymorphic out parameter (<= refers to the subtype relation)\r\r\t\t\ttype of formal "
                    attr: 2
                  - text: new
                    attr: 8
                  - text: " parameter \r\t\t\t<= static type of actual "
                    attr: 2
                  - text: new
                    attr: 8
                  - text: " parameter \r\t\t\t<= type specified through"
                    attr: 2
                  - text: " iid"
                    attr: 8
                  - text: " parameter \r\t\t\t<= dynamic type of actual "
                    attr: 2
                  - text: new
                    attr: 8
                  - text: " parameter (on return)\r\t\rThe following program fragment shows some examples of the use of polymorphic out parameters.\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      dsc: 25400
                      grid: 1
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\t\tTYPE\r\t\t\tIExample = POINTER TO ABSTRACT RECORD\r\t\t\t\t[\"{91C074A1-C2D7-11CF-A4A1-444553540000}\"] (COM.IUnknown) END;\r\t\t\t\r\t\t\tIExample2 = POINTER TO ABSTRACT RECORD\r\t\t\t\t[\"{91C074A2-C2D7-11CF-A4A1-444553540000}\"] (IExample) END;\r\t\t\t\r\t\tPROCEDURE GetInterface(IN [iid] id: COM.GUID; OUT [new] int: COM.IUnknown);\r\t\tEND GetInterface;\r\t\t\r\t\tPROCEDURE Test;\r\t\t\tVAR i0: COM.IUnknown; i1: IExample; i2: IExample2;\r\t\tBEGIN\r\t\t\tGetInterface(COM.ID(i1), i0); (* valid *)\r\t\t\tGetInterface(COM.ID(i1), i1); (* valid *)\r\t\t\tGetInterface(COM.ID(i1), i2); (* compiler error: wrong [iid] - [new] pair *)\r\t\tEND Test;\r\r\t\t\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x0000000b
                      tabs:
                        - { stop: 468000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "A procedure like\r\r\tPROCEDURE QueryInterface (IN [iid] id: COM.GUID; OUT [new] int: COM.IUnknown);\r\rcan be called in four different ways:\r"
                    attr: 2
                  - ruler:
                      left: 144000
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 144000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "- \tQueryInterface(COM.ID(p1), p0) where p0 is an extension of COM.IUnknown and p1 is an extension of p0.\r\t\t\tVAR i1: IExample; i2: IExample2;\r\t\t\tQueryInterface(COM.ID(i2), i1);\r\x0e-\tQueryInterface(COM.ID(T), p) where p is an extension of COM.IUnknown and T is a subtype of the type of p.\r\t\t\tVAR i1: IExample;\r\t\t\tQueryInterface(COM.ID(IExample2), i1);\r\x0e-\tQueryInterface(id, p) where id is an arbitrary GUID and p is of type COM.IUnknown.\r\t\t\tVAR p: COM.IUnknown;\r\t\t\tQueryInterface(\"{91C074A1-C2D7-11CF-A4A1-444553540000}\", p);\r\x0e-\tQueryInterface(id, int) where id and int are another [iid], [new] pair.\r\t\t\tPROCEDURE P (IN [iid] id: COM.GUID; OUT [new] int: COM.IUnknown);\r\t\t\tBEGIN QueryInterface(id, int)\r\t\t\tEND P;\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 144000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "In a procedure with an "
                    attr: 2
                  - text: iid-new
                    attr: 8
                  - text: " parameter pair, the interface parameter cannot be assigned directly, but "
                    attr: 2
                  - text: id
                    attr: 8
                  - text: " and "
                    attr: 2
                  - text: int
                    attr: 8
                  - text: " can be used as formal parameters to another [new], [iid] pair or to COM.QUERY (see below).\r\r\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x0000000b
                      attr: 4
                      w: 360000000
                      h: 444500
                  - target:
                      name: 3.4
                      body:
                        - text: The Module COM
                          attr: 4
                      attr: 4
                      w: 150300
                      h: 142875
                  - text: "\r\r"
                    attr: 4
                  - text: "The module "
                    attr: 2
                  - text: COM
                    attr: 8
                  - text: " contains certain types and procedures that are necessary to implement COM components. As module SYSTEM, module COM is a pseudo module, i.e., no symbol file exists for module COM. If module COM is imported, this is only a declaration for the compiler. A pseudo description of the interface is shown below:"
                    attr: 2
                  - text: "\r"
                    attr: 9
                  - text: "\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      dsc: 25400
                      grid: 1
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\tDEFINITION COM;\r\r\t\tTYPE\r\t\t\tRESULT = INTEGER;\r\t\t\tGUID = ARRAY 16 OF BYTE;\t"
                    attr: 2
                  - text: "(* modified compare semantics *)"
                    attr: 8
                  - text: "\r\t\t\t\r\t\t\tIUnknown = POINTER TO ABSTRACT RECORD [\"{00000000-0000-0000-C000-000000000046}\"]\r\t\t\t\t(this: IUnknown) QueryInterface (IN [iid] iid: GUID; OUT [new] int: IUnknown): RESULT,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t NEW, ABSTRACT;\r\t\t\t\t(this: IUnknown) AddRef, NEW, ABSTRACT;\t"
                    attr: 2
                  - text: "(* hidden, can neither be called nor overwritten *)"
                    attr: 8
                  - text: "\r\t\t\t\t(this: IUnknown) Release, NEW, ABSTRACT;\t"
                    attr: 2
                  - text: "(* hidden, can neither be caled nor overwritten *)\r"
                    attr: 8
                  - text: "\t"
                    attr: 10
                  - text: "\t\t\t(this: IUnknown) RELEASE-, NEW, EXTENSIBLE;\r\t\t\tEND;\r\t\t\t\r\r\t\tPROCEDURE QUERY (p: IUnknown; IN [iid] id: GUID; OUT [new] ip: IUnknown): BOOLEAN;\r\t\t\r\t\tPROCEDURE ID (t: "
                    attr: 2
                  - text: INTERFACETYPE
                    attr: 8
                  - text: "): GUID;\r\t\tPROCEDURE ID (p: IUnknown): GUID;\r\t\tPROCEDURE ID (s: ARRAY OF CHAR): GUID;\r\t\t\r\tEND COM.\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\rTYPE "
                    attr: 2
                  - text: RESULT
                    attr: 4
                  - text: "\rResult type of most COM operations (alias of INTEGER). The error translator of the Direct-To-COM development environment can be used to obtain a meaningful description from such a result.\r\rTYPE"
                    attr: 2
                  - text: " GUID\r"
                    attr: 4
                  - text: "Type for globally unique identifiers (GUIDs). A GUID is a 128 bit identifier. String constant expressions representing a valid GUID can be assigned to a GUID variable.\r\r\tVAR id: COM.GUID;\r\t\tid := \"{12345678-1000-11cf-adf0-444553540000}\";\r\r\rTYPE "
                    attr: 2
                  - text: IUnknown
                    attr: 4
                  - text: "\rCOM Interface, ABSTRACT\rThe type IUnknown is the base type of all COM interfaces. IUnknown is a pointer to an abstract record.\r\rPROCEDURE (this: IUnknown) "
                    attr: 2
                  - text: AddRef
                    attr: 4
                  - text: ";\rNEW, HIDDEN\rPROCEDURE (this: IUnknown) "
                    attr: 2
                  - text: Release
                    attr: 4
                  - text: ";\rNEW, HIDDEN\rThe AddRef and Release methods are necessary to control the reference count of a COM object. AddRef and Release are always handled implicitly, they can neither be overwritten nor called.\r\rPROCEDURE (this: IUnknown) "
                    attr: 2
                  - text: QueryInterface
                    attr: 4
                  - text: " (IN [iid] iid: GUID; OUT [new] int: IUnknown): RESULT;\rNEW, DEFAULT\rQueryInterface is used to ask for interfaces a COM object supports. It is implemented by default but may be overwritten if special behaviour is needed (e.g. for objects which support several interfaces). For an example see module "
                    attr: 2
                  - text: ComObject
                    attr: 8
                  - text: ".\r\rThe default implementation of QueryInterface has the following form. The pointer this.outer is a hidden reference to another COM object which can be specified with the two-argument NEW procedure (see below).\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      dsc: 25400
                      grid: 1
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\tPROCEDURE (this: IUnknown) QueryInterface (\r\t\t\t\t\t\tIN [iid] iid: COM.GUID; OUT [new] int: COM.IUnknown): COM.RESULT;\r\tBEGIN\r\t\tIF this.outer # NIL THEN\r\t\t\t"
                    attr: 2
                  - text: "RETURN "
                    attr: 4
                  - text: "this.outer.QueryInterface(iid, int)\r\t\tELSE\r\t\t\tIF COM.QUERY(this, iid, int) THEN "
                    attr: 2
                  - text: RETURN
                    attr: 4
                  - text: " WinApi.S_OK\r\t\t\tELSE "
                    attr: 2
                  - text: RETURN
                    attr: 4
                  - text: " WinApi.E_NOINTERFACE\r\t\t\tEND\r\t\tEND\r\tEND QueryInterface;\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\rPROCEDURE (this: IUnknown) "
                    attr: 2
                  - text: "RELEASE-;\r"
                    attr: 4
                  - text: "NEW, EMPTY\rThe RELEASE method is called whenever the reference cout drops from one to zero. Note that if the system calls the RELEASE method, the interface is not necessarily removed by the garbage collector as Component Pascal pointer references to the object may still exist. \rRELEASE gives additional control over COM objects besides the FINALIZE method which is provided for all (tagged) Component Pascal records. In contrast to the FINALIZE method, the RELEASE method may be called several times.\r\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "PROCEDURE "
                    attr: 2
                  - text: ID
                    attr: 4
                  - text: " (t: "
                    attr: 2
                  - text: INTERFACETYPE
                    attr: 8
                  - text: "): GUID\rThe actual parameter must be the name of a type.\rReturns the GUID associated with interface type t (pointer or record).\r\rPROCEDURE "
                    attr: 2
                  - text: ID
                    attr: 4
                  - text: " (p: IUnknown): GUID\rReturns the GUID associated with the static type of the actual parameter passed for p.\r\rPROCEDURE "
                    attr: 2
                  - text: ID
                    attr: 4
                  - text: " (s: ARRAY OF CHAR): GUID\rReturns the GUID from a textual representation (string constant).\r\r\rPROCEDURE "
                    attr: 2
                  - text: QUERY
                    attr: 4
                  - text: " (p: COM.IUnknown; \r\t\t\t\t\t\t\t\t\tIN [iid] id: COM.GUID, OUT [new] ip: COM.IUnknown): BOOLEAN;\rQUERY allows safe assignments to polymorphic out parameters.\rIf there exists a type t with the following properties:\r\t- t is an interface type\r\t- p points to an extension of t\r\t- ID(t) = id\rthen p is assigned to ip and the function returns TRUE. Otherwise ip remains unchanged and the function returns FALSE. COM.QUERY allows safe and simple implementations of QueryInterface without any restrictions.\r\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x0000000b
                      attr: 4
                      w: 360000000
                      h: 444500
                  - target:
                      name: 3.5
                      body:
                        - text: New Predefined Procedures
                          attr: 4
                      attr: 4
                      w: 150300
                      h: 142875
                  - text: "\r\r"
                    attr: 4
                  - text: "In the Direct-To-COM compiler the following additional predefined procedures are available.\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 144000 }
                        - { stop: 4032000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "Function procedures\r\tVALID (v: VARPAR): BOOLEAN;\tv (a VAR [nil] parameter) is not nil \r\t\rProper procedures\r\tNEW(VAR p: COM.IUnknown);\tallocates p^\r\tNEW(VAR p: COM.IUnknown; outer: COM.IUnknown);\tallocates p^ as subobject of outer\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: The two-argument version of NEW is used when implementing aggregation (
                    attr: 2
                  - text: "see "
                    attr: 11
                  - text: "example "
                    attr: 2
                  - text: ComAggregate
                    attr: 8
                  - text: ") or to implement COM objects supporting several interfaces (see example "
                    attr: 2
                  - text: ComObject
                    attr: 8
                  - text: "). "
                    attr: 2
                  - text: AddRef
                    attr: 8
                  - text: ", "
                    attr: 2
                  - text: Release
                    attr: 8
                  - text: ", and "
                    attr: 2
                  - text: QueryInterface
                    attr: 8
                  - text: " calls are forwarded to the outer object. If "
                    attr: 2
                  - text: AddRef
                    attr: 8
                  - text: " or "
                    attr: 2
                  - text: Release
                    attr: 8
                  - text: " of "
                    attr: 2
                  - text: p
                    attr: 8
                  - text: " is called, then both the reference count of "
                    attr: 2
                  - text: p
                    attr: 8
                  - text: " and of the outer interface are incremented or decremented respectively.\r\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      attr: 4
                      w: 360000000
                      h: 444500
                  - target:
                      name: 3.6
                      body:
                        - text: Unions
                          attr: 4
                      attr: 4
                      w: 150300
                      h: 142875
                  - text: "\r\r"
                    attr: 4
                  - text: "In order to simplify the mapping of C data structures, the Direct-To-COM compiler supports union records. In a union record all fields are aligned at offset 0. The size of a union record is the maximal size of its fields. The semantics of union records are the one of C union structures and not the one of Pascal-like variant records. With nested records and union records, Pascal-like variant records can be simulated also. A union record is marked with the "
                    attr: 2
                  - text: union
                    attr: 8
                  - text: " sysflag."
                    attr: 2
                  - text: "\r\r"
                    attr: 4
                  - text: "Example:\r\r\tTYPE\r\t\tComplex = RECORD\r\t\t\ttype: SHORTINT;\r\t\t\tu: RECORD [union]\r\t\t\t\tcart: RECORD x, y: LONGREAL END;\r\t\t\t\tpolar: RECORD phi, rho: LONGREAL END\r\t\t\tEND\r\t\tEND\r\rWarning: pointers in union records are unsafe and are ignored by the garbage collector!\r\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x0000000b
                      attr: 4
                      w: 360000000
                      h: 444500
                  - target:
                      name: 3.7
                      body:
                        - text: COM Programming Hints
                          attr: 4
                      attr: 4
                      w: 150300
                      h: 142875
                  - text: "\r\rIf you want to free an interface explicitly for some reason, just assign NIL to the interface pointer. This will call Release() on the pointer and additionally prevents you from using the (no longer valid) pointer accidentally.\r\rThe golden rule of COM programming in Component Pascal:\r\r"
                    attr: 2
                  - text: "\tNever use an interface pointer if you can use a Component Pascal pointer instead.\r"
                    attr: 8
                  - text: "\rAlthough interface pointers are safely handled by the compiler, there are still unsafe constructs which must be handled carefully. This specifically applies to C pointers which are not interface pointers, like pointers to strings. The lifecycle of such pointers must be controlled by explicit "
                    attr: 2
                  - text: Allocate
                    attr: 8
                  - text: " and "
                    attr: 2
                  - text: Deallocate
                    attr: 8
                  - text: " calls. It also applies to structures containing C-style unions. Pointers in such structures (including interface pointers) must be handled manually. See the "
                    attr: 2
                  - text: ComTools
                    attr: 8
                  - text: " documentation for an example of how such a structure can be used safely.\r"
                    attr: 2
                  - text: "\r\r"
                    attr: 4
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x0000000b
                      attr: 4
                      w: 360000000
                      h: 444500
                  - target:
                      name: 3.8
                      body:
                        - text: Compiler Implementation Restrictions
                          attr: 4
                      attr: 4
                      w: 150300
                      h: 142875
                  - text: "\r\r"
                    attr: 4
                  - ruler:
                      left: 144000
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 144000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "-\tUntagged open arrays (arrays with unspecified length) containing interface pointers may not be assigned as a whole.\rWorkaround: Assign the individual elements.\r\x0e-\tThe array supplied for an out parameter of type \"untagged array of interface pointer\" may not be open.\rWorkaround: Use an array with defined length.\r\x0e-\tOut parameters of type \"untagged open array of pointer\" are not initialized to NIL.\rWorkaround: Initialize them manually.\r"
                    attr: 2
