                  - text: "Overview by Example: ObxExcel"
                    attr: 0
                  - text: "\r\rThis example how the OLE Automation controller subsystem can be used to program Microsoft Excel. Use the following menu entries to run the examples:\r\r\t\"Show Excel\"\t\"\"\t\"ObxExcel.ShowExcel\"\t\"\"\r\t\"Read Excel\"\t\"\"\t\"ObxExcel.ReadExcel\"\t\"StdCmds.SingletonGuard\"\r\t\"Open Chart\"\t\"\"\t\"ObxExcel.OpenChart\"\t\"StdCmds.SingletonGuard\"\r\rShowExcel adds different values to a new worksheet and opens the worksheet as an OLE object in a BlackBox text.\rReadExcel reads a selected worksheet object and writes the contents of the cells into the log.\rOpenChart uses the values in a selected worksheet object and opens a corresponding chart in a separate Excel window.\r\rSee also the "
