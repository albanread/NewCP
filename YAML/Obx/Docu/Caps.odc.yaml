                flow:
                  - text: "Overview by Example: ObxCaps"
                    attr: 0
                  - text: "\r\rThis example shows how the built-in text subsystem of the BlackBox Component Builder can be extended by new commands. To demonstrate this possibility, a command is shown which fetches the selection in the focus view (assuming the focus view is a text view), creates a new empty text, copies the selection into this new text (but with all small letters turned into capital letters), and then replaces the selection by the newly created text. In short, this command turns the selected text stretch into all capital letters.\r\r\t"
                    attr: 1
                  - view:
                      kind: TextViews.StdView
                      storeKind: store
                      typeChain:
                        - TextViews.StdViewDesc
                        - TextViews.ViewDesc
                        - Containers.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 4
                      bodyPos: 562
                      bodyLen: 1525
