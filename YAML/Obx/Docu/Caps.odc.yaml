                    attr: 1
                    w: 177800
                    h: 152400
                  - text: " ObxCaps.Do\r\rteSTstring834 .-st\r\rYou'll note that the selection has turned into all caps.\r\rBut now comes the surprise: execute "
                    attr: 1
                  - text: Undo Caps
                    attr: 2
                  - text: " in the "
                    attr: 1
                  - text: Edit
                    attr: 2
                  - text: " menu. As a result, the effect of the uppercase operation is undone! In the BlackBox Component Builder, most operations are undoable; this also holds for the "
                    attr: 1
                  - text: Delete
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: Insert
                    attr: 2
                  - text: " text procedures in the above example. Thus, you need to do nothing special in order to render such a command undoable!\r\rHowever, you may have noticed that there "
                    attr: 1
                  - text: is
                    attr: 2
                  - text: " something special in the sample program: there is a "
                    attr: 1
                  - text: BeginScript
                    attr: 2
                  - text: " / "
                    attr: 1
                  - text: EndScript
                    attr: 2
                  - text: " pair of procedure calls before resp. after the calls to "
                    attr: 1
                  - text: Delete
                    attr: 2
                  - text: " / "
                    attr: 1
                  - text: Insert
                    attr: 2
                  - text: ". They bundle the sequence of a "
                    attr: 1
                  - text: Delete
                    attr: 2
                  - text: " followed by a "
                    attr: 1
                  - text: Insert
                    attr: 2
                  - text: " into one single "
                    attr: 1
                  - text: compound command
                    attr: 2
                  - text: ", meaning that the user need not undo both of these operations individually, but rather in one single step.\r\rIn this example we have seen how an existing displayed text and its selection are accessed, how a buffer text is created, and how the selected text stretch is replaced by the buffer's contents.\r"
                    attr: 1
