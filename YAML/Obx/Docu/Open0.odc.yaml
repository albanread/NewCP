                  - text: " ObxOpen0.Do\r\rWith this example, we have seen how the contents of a document's root view can be accessed, and how this view can be opened in a window after its contents have been modified. In contrast to "
                    attr: 1
                  - text: ObxHello1
                    attr: 2
                  - text: ", an existing text has been modified; by first setting the formatter to its end, and then appending some new text.\r\rNote that similar to the previous examples, views play a central role.\r\rIn contrast to traditional development systems and frameworks, files, windows, and applications play only a minor role in the BlackBox Component Framework, or have completely disappeared as abstractions of their own. On the other hand, the "
                    attr: 1
                  - text: view
                    attr: 2
                  - text: " has become a pivotal abstraction. It is an essential property of views that they may be nested, to form hierarchical documents.\r\rThese aspects of the BlackBox Component Framework constitute a fundamental shift\r  from monolithic applications to software components\r  from interoperable programs to integrated components\r  from automation islands to open environments\r  from application-centered design to document-centered design\r"
                    attr: 1
