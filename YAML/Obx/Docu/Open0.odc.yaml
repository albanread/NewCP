                          - text: "MODULE ObxOpen0;\r\r\tIMPORT Files, Converters, Views, TextModels, TextMappers, TextViews;\r\r\tPROCEDURE "
                            attr: 0
                          - text: Do
                            attr: 1
                          - text: "*;\r\t\tVAR loc: Files.Locator; name: Files.Name; conv: Converters.Converter;\r\t\t\tv: Views.View; t: TextModels.Model; f: TextMappers.Formatter;\r\tBEGIN\r\t\tloc := NIL; name := \"\"; conv := NIL;\t"
                            attr: 0
                          - text: "(* no defaults for Views.Old *)"
                            attr: 2
                          - text: "\r\t\tv := Views.Old(Views.ask, loc, name, conv);\t"
                            attr: 0
                          - text: "(* ask user for a file and open it as a view *)"
                            attr: 2
                          - text: "\r\t\tIF (v # NIL) & (v IS TextViews.View) THEN\t"
                            attr: 0
                          - text: "\t(* make sure it is a text view *)"
                            attr: 2
                          - text: "\r\t\t\tt := v(TextViews.View).ThisModel();\t"
                            attr: 0
                          - text: "(* get the text view's model  *)"
                            attr: 2
                          - text: "\r\t\t\tf.ConnectTo(t);\r\t\t\tf.SetPos(t.Length());\t"
                            attr: 0
                          - text: "(* set the formatter to the end of the text *)"
                            attr: 2
                          - text: "\r\t\t\tf.WriteString(\"appendix\");\t"
                            attr: 0
                          - text: "(* append a string *)"
                            attr: 2
                          - text: "\r\t\t\tViews.OpenView(v)\t"
                            attr: 0
                          - text: "(* open the text view in a window *)"
                            attr: 2
                          - text: "\r\t\tEND\r\tEND Do;\r\rEND ObxOpen0."
                            attr: 0
