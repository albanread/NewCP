                flow:
                  - text: "Overview by Example: ObxCalc"
                    attr: 0
                  - text: "\r\rThis example implements a simple pocket calculator view for integer numbers. The calculator can be used either with the keyboard or with the mouse. It is implemented as a stack calculator. The topmost entry of the stack is displayed. With the "
                    attr: 1
                  - text: ^
                    attr: 2
                  - text: " key (or "
                    attr: 1
                  - text: ENTER
                    attr: 2
                  - text: " key on the keyboard) this value is duplicated and pushed onto the stack. The "
                    attr: 1
                  - text: p
                    attr: 2
                  - text: "-key performs a pop operation, that is the topmost entry gets replaced by the second one. With the "
                    attr: 1
                  - text: s
                    attr: 2
                  - text: "-key the two topmost entries of the stack can be swapped. Expressions must be evaluated using the reverse polish notation. The arithmetic operations replace the two topmost entries by the result. / stands for the quotient and ÷ for the remainder. For example, to add 12 and 25, the keys 12^25+ must be pressed. At the beginning, the stack is filled with zeroes.\r\rThe implementation is rather simple. The "
                    attr: 1
                  - text: ObxCalc
                    attr: 2
                  - text: " views are views which do not contain a model. Every view keeps its own stack. When a calculator is copied, the state of the copy gets initialized.\rThe state of a view is not externalized. This implies that any calculator loaded from a file is always in a cleared state.\r\rFrom a view-programming point of view the following type-bound procedures are of interest:\r\r"
                    attr: 1
                  - ruler:
                      left: 1548000
                      right: 1548000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 144000 }
                        - { stop: 1548000 }
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "\tRestore\tdraws the view's contents.\r\t\x0e\tHandleCtrlMsg\thandles all controller messages which are sent to the view, in particular when the mouse button ("
                    attr: 1
                  - text: Controllers.TrackMsg
                    attr: 2
                  - text: ) or when a key (
                    attr: 1
                  - text: Controllers.EditMsg
                    attr: 2
                  - text: ") is pressed within the view.\r\t\x0e\tHandlePropMsg\thandles the property messages which are sent to the view by its container. The container asks the view about its (preferred) size ("
                    attr: 1
                  - text: Properties.SizePref
                    attr: 2
                  - text: "), whether it is resizable ("
                    attr: 1
                  - text: Properties.ResizePref
                    attr: 2
                  - text: ) and whether it wants to become focus or not (
                    attr: 1
                  - text: Properties.FocusPref
                    attr: 2
                  - text: ").\r\t\x0e\tExternalize\texternalizes a version byte\r\t\x0e\tInternalize\treads the version byte and initializes a new view\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 0
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "\rWith only these five procedures we get a fully working interactive view. The view can be saved to a file (without its internal state) and copied using Drag & Drop or Copy & Paste, it can be printed, and under Windows, it can be exported as ActiveX object into any ActiveX container.\r\r"
                    attr: 1
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 9
                      bodyPos: 1152
                      bodyLen: 6
                    attr: 1
                    w: 177800
                    h: 152400
