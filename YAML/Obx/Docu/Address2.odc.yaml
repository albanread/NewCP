                          - text: "MODULE ObxAddress2;\r\r\tIMPORT Files, Converters, Views, Dialog, TextModels, TextMappers, TextViews;\r\r\tVAR\r\t\t"
                            attr: 0
                          - text: adr
                            attr: 1
                          - text: "*: RECORD\r\t\t\tname*:\tARRAY 64 OF CHAR;\r\t\t\tcity*:\t\tARRAY 24 OF CHAR;\r\t\t\tcountry*:\tARRAY 16 OF CHAR;\r\t\t\tcustomer:\tINTEGER;\r\t\t\tupdate*:\tBOOLEAN\r\t\tEND;\r\r\tPROCEDURE "
                            attr: 0
                          - text: OpenText
                            attr: 1
                          - text: "*;\r\t\tVAR loc: Files.Locator; name: Files.Name; conv: Converters.Converter;\r\t\t\tv: Views.View; t: TextModels.Model; f: TextMappers.Formatter;\r\tBEGIN\r\t\tloc := NIL; name := \"\"; conv := NIL;\r\t\tv := Views.Old(Views.ask, loc, name, conv);\r\t\tIF (v # NIL) & (v IS TextViews.View) THEN\r\t\t\tt := v(TextViews.View).ThisModel();\r\t\t\tf.ConnectTo(t);\r\t\t\tf.SetPos(t.Length());\r\t\t\tf.WriteString(adr.name); f.WriteTab;\r\t\t\tf.WriteString(adr.city); f.WriteTab;\r\t\t\tf.WriteString(adr.country); f.WriteTab;\r\t\t\tf.WriteInt(adr.customer); f.WriteTab;\r\t\t\tf.WriteBool(adr.update); f.WriteLn;\r\t\t\tViews.OpenView(v);\r\t\t\tadr.name := \"\"; adr.city := \"\"; adr.country := \"\"; adr.customer := 0; adr.update := FALSE;\r\t\t\tDialog.Update(adr)\t"
                            attr: 0
                          - text: "(* update all controls for adr *)"
                            attr: 2
