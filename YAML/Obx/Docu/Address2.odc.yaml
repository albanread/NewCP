                flow:
                  - text: "Overview by Example: ObxAddress2"
                    attr: 0
                  - text: "\r\rThis example combines features of earlier examples: it allows to enter an address via a mask, and a push button causes the entered data to be appended to a text in a file. Afterwards, the entered data is cleared again. Controls must be notified when a program modifies an interactor. For this purpose, there is the "
