                flow:
                  - text: "Overview by Example: ObxWrappers"
                    attr: 0
                  - text: "\r\rThis example implements a wrapper. Wrappers are views which contain other views. In particular, a wrapper may have the same size as the view(s) that it wraps. In this way, it can combine its own functionality with that of the wrapped view(s).\r\rFor example\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " a debugging wrapper lists the messages received by the wrapped view into the log\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " a background wrapper adds a background color, over which its wrapped view is drawn (which typically has no background color, i.e., which has a transparent background)\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " a layer wrapper contains several layered views, e.g., a graph view overlaid by a caption view\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " a terminal wrapper contains a terminal session and wraps a standard text view displaying the log of the session\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " a bundling wrapper filters out controller messages, such that the wrapped view becomes read-only etc., the sky's the limit! Wrappers demonstrate the power of composition, i.e., how functionality of different objects can be combined in a very simple manner, without having to use complex language mechanisms such as inheritance.\r\rOur example wrapper simply echoes every key typed into the log.\r\rThe wrapper implementation is noteworthy in three respects. First, a wrapper reuses the context of the view which it wraps, it has no context of its own. This is only possible because the wrapper is exactly as large as the wrapped view, because a shared context cannot return different sizes in its "
                    attr: 1
                  - text: GetSize
                    attr: 2
                  - text: " method.\rSecond, it uses the wrapped view's model (if it has one!) as its own, this means that its "
                    attr: 1
                  - text: ThisModel
                    attr: 2
                  - text: " method returns the wrapped view's model, and that "
                    attr: 1
                  - text: CopyFromModelView
                    attr: 2
                  - text: " propagates the new model to the wrapped view.\rThird, the wrapper is implemented in a flexible way which allows it to wrap both views with or without models. This flexibility is concentrated in procedure "
                    attr: 1
                  - text: "CopyFromModelView "
                    attr: 2
                  - text: "(which admittedly is a bad name in those special cases where the wrapped views don't have models).\r\r\t"
                    attr: 1
