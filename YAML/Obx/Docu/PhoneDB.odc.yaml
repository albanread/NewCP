                flow:
                  - text: "Overview by Example: ObxPhoneDB"
                    attr: 0
                  - text: "\r\rThis example is described in "
                    attr: 1
                  - link:
                      target: "StdCmds.OpenBrowser('Docu/Tut-3', 'Chapter 3')"
                      body:
                        - text: chapter 3
                          attr: 2
                      attr: 1
                      w: 131250
                      h: 142875
                  - text: " of the BlackBox tutorial.\r\r\rDEFINITION ObxPhoneDB;\r\r\tTYPE String = ARRAY 32 OF CHAR;\r\r\tPROCEDURE LookupByIndex (index: INTEGER; OUT name, number: String);\r\tPROCEDURE LookupByName (name: String; OUT number: String);\r\tPROCEDURE LookupByNumber (number: String; OUT name: String);\r\rEND ObxPhoneDB.\r\r\rModule ObxPhoneDB provides access to a phone database. Access may happen by index, by name, or by number. An entry consists of a name and a phone number string. Neither may be empty. The smallest index is 0, and all entries are contiguous.\r\r\rPROCEDURE "
                    attr: 1
                  - text: LookupByIndex
                    attr: 3
                  - text: " (index: INTEGER; OUT name, number: ARRAY OF CHAR)\rReturn the <name, number> pair of entry "
                    attr: 1
                  - text: index
                    attr: 4
                  - text: ". If the index is too large, <\"\", \"\"> is returned.\rThe procedure operates in constant time.\r\rPre\rindex >= 0\t20\r\rPost\rindex is legal\r\tname # \"\"  &  number # \"\"\rindex is not legal\r\tname = \"\"  &  number = \"\"\r\rPROCEDURE "
                    attr: 1
                  - text: LookupByName
                    attr: 3
                  - text: " (name: ARRAY OF CHAR; OUT number: ARRAY OF CHAR)\rReturns a phone number associated with "
                    attr: 1
                  - text: name
                    attr: 4
                  - text: ", or \"\" if no entry for "
                    attr: 1
                  - text: name
                    attr: 4
                  - text: " is found.\rThe procedure operates in linear time, depending on the size of the database.\r\rPost\rname found\r\tnumber # \"\"\rname not found\r\tnumber = \"\"\r\rPROCEDURE "
                    attr: 1
                  - text: LookupByNumber
                    attr: 3
                  - text: " (number: ARRAY OF CHAR; OUT name: ARRAY OF CHAR)\rReturns the name associated with "
                    attr: 1
                  - text: number
                    attr: 4
                  - text: ", or \"\" if no entry for "
                    attr: 1
                  - text: number
                    attr: 4
                  - text: " is found.\rThe procedure operates in linear time, depending on the size of the database.\r\rPost\rnumber found\r\tname # \"\"\rnumber not found\r\tname = \"\"\r"
