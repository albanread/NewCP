                          - text: "MODULE ObxAddress1;\r\r\tIMPORT Views, TextModels, TextMappers, TextViews;\r\r\tVAR\r\t\t"
                            attr: 0
                          - text: adr
                            attr: 1
                          - text: "*: RECORD\r\t\t\tname*:\tARRAY 64 OF CHAR;\r\t\t\tcity*:\t\tARRAY 24 OF CHAR;\r\t\t\tcountry*:\tARRAY 16 OF CHAR;\r\t\t\tcustomer*:\tINTEGER;\r\t\t\tupdate*:\tBOOLEAN\r\t\tEND;\r\r\tPROCEDURE "
                            attr: 0
                          - text: OpenText
                            attr: 1
                          - text: "*;\r\t\tVAR t: TextModels.Model; f: TextMappers.Formatter; v: Views.View;\r\tBEGIN\r\t\tt := TextModels.dir.New();\r\t\tf.ConnectTo(t);\r\t\tf.WriteString(adr.name); f.WriteTab;\r\t\tf.WriteString(adr.city); f.WriteTab;\r\t\tf.WriteString(adr.country); f.WriteTab;\r\t\tf.WriteInt(adr.customer); f.WriteTab;\r\t\tf.WriteBool(adr.update); f.WriteLn;\r\t\tv := TextViews.dir.New(t);\r\t\tViews.OpenView(v)\r\tEND OpenText;\r\rEND ObxAddress1."
                            attr: 0
                    attr: 1
                    w: 5507700
                    h: 4457700
                  - text: "\r\rAfter the example has been compiled, and after a form has been created for it and turned into a dialog, you can enter something into the fields (note that "
                    attr: 3
                  - text: customer
                    attr: 4
                  - text: " only accepts numeric values). Then click on the "
                    attr: 3
                  - text: OpenText
                    attr: 4
                  - text: " button. A window will be opened with a contents similar to the following:\r\rOberon microsystems\tTechnoparkstrasse 1\tZürich\tZH\t8005\tSwitzerland\t1\t$TRUE\r\rIn this example, we have seen how behavior can be added to interactors, by assigning global procedures to their procedure-typed fields.\r"
                    attr: 3
