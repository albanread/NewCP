                flow:
                  - text: "Overview by Example: ObxAddress1"
                    attr: 0
                  - text: "\r\rThis example combines some features of the previous examples: it takes the address record of "
                    attr: 1
                  - text: ObxAddress1
                    attr: 2
                  - text: "  and adds behavior to it. Such a record, whose fields are displayed by controls, is called an "
                    attr: 1
                  - text: interactor
                    attr: 2
                  - text: ".\r\rThe behavior for our example interactor is defined by the global "
                    attr: 1
                  - text: OpenText
                    attr: 2
                  - text: " procedure. It creates a new text, into which it writes all the fields of the address record. The fields are written as one line of text, separated by tabulators and terminated by a carriage return. A new text view on this text is then opened in a window.\r\r\t"
                    attr: 1
