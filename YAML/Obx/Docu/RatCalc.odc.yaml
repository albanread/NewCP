                flow:
                  - text: "Oberon by Example: ObxRatCalc"
                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\rThis example implements a simplifier for rational numbers of arbitrary precision. Expressions to be simplified are built up from integer numbers, the operators \"+\", \"-\", \"*\", \"/\", \"^\", and parentheses. Exponents (\"^\") must be integer numbers and their absolute value must not exceed MAX(INTEGER).\rThe result is either an integer or a rational number (command "
                    attr: 2
                  - text: ObxRatCalc.Simplify
                    attr: 3
                  - text: "), or a floating point number ("
                    attr: 2
                  - text: ObxRatCalc.Approximate
                    attr: 3
                  - text: ").\rThe implementation of "
                    attr: 2
                  - text: ObxRatCalc
                    attr: 3
                  - text: " uses the "
                    attr: 2
                  - link:
                      target: "StdCmds.OpenDoc('System/Docu/Integers')"
                      body:
                        - text: Integers 
                          attr: 4
                        - text: module
                          attr: 5
                      attr: 2
                      w: 131250
                      h: 142875
                  - text: ", which provides a data type for arbitrary precision integers and operations on them. The calculator works on arithmetic expressions, such as the following:\r\r"
                    attr: 2
                  - ruler:
                      first: 36000
                      left: 36000
                      right: 180000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 2016000 }
                        - { stop: 2160000 }
                        - { stop: 3960000 }
                        - { stop: 4104000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "Source Expression\t\tObxRatCalc.Simplify\t\tObxRatCalc.Approximate\r\r((100 + 27 - 2) / (-5 * (2 + 3))) ^ (-3)\t=\t-1 / 125\t=\t-8*10^-3\r999999999 * 999999999 / 81\t=\t12345678987654321\r1234567890 / 987654321\t=\t137174210 /  109739369\t= 1.2499999886093750001423828...\r30.2 + 60.5\t=\t907 / 10\t=\t90.7\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 152400
                      dsc: 25400
                      grid: 177800
                      opts: 0x00000001
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "\rNote that the undo/redo mechanism can be used after an evaluation.\r\rSyntax of input:\r\r\texpression := [\"-\"] {term addop} term.\r\tterm := {factor mulop} factor.\r\tfactor := (\"(\" expression \")\" | integer) [\"^\" factor].\r\tinteger := digit {digit} [ \".\" digit {digit} ].\r\taddop := \"+\".\r\tmulop := \"*\" | \"/\".\r\rMenu entries in \"Obx\" menu:\r\t\"Simplify\"\t\"\"\t\"ObxRatCalc.Simplify\"\t\"TextCmds.SelectionGuard\"\r\t\"Approximate\"\t\"\"\t\"ObxRatCalc.Approximate\"\t\"TextCmds.SelectionGuard\"\r\r"
                    attr: 2
