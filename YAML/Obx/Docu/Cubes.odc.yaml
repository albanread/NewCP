                flow:
                  - text: "Overview by Example: ObxCubes"
                    attr: 0
                  - text: "\r\rThis example implements a simple rotating cube view. The cube rotates around two axes. It performs 10 state transformations per second and after 25.6 seconds it is back in its starting position. The example below shows a large cube rotating in front of a smaller one. Both cubes are embedded in a form view, which is embedded in the text view that you are currently reading:\r\t\t\t"
