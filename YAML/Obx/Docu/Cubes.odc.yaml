                  - text: "\rWhat this example shows is the use of actions. "
                    attr: 1
                  - text: Services.Actions
                    attr: 3
                  - text: "  are objects whose"
                    attr: 1
                  - text: " Do"
                    attr: 3
                  - text: "  procedures are executed in a delayed fashion, when the system is idle. An action which re-installs itself whenever it is invoked as in this example operates as a non-preemptive background task.\r\rThis example also demonstrates a simple property editor through which the colors of the sides of a cube can be changed. To open the property editor click into the cube while holding down the modifier key (or execute the command below to open the dialog). The property editor always shows the colors of the selected cube. The synchronization between the color fields in the dialog and the selected cube is also performed through the installed action. The colors of the sides are actually changed by a notifier which is attached to each color control in the property dialog. The color "
                    attr: 1
