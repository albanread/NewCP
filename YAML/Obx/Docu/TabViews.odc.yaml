                flow:
                  - text: "Overview by Example: ObxTabViews"
                    attr: 0
                  - text: "\r\rThe property inspector for "
                    attr: 1
                  - text: StdTabViews
                    attr: 2
                  - text: " supplies a graphical user interface for creating and editing "
                    attr: 1
                  - text: StdTabViews
                    attr: 2
                  - text: ". This user interface is sufficient for most applications. However, if tabs need to be added and removed dynamically during runtime, the programming interface of "
                    attr: 1
                  - text: StdTabViews
                    attr: 2
                  - text: " needs to be used.\r\rThis example creates a "
                    attr: 1
                  - text: StdTabViews.View
                    attr: 2
                  - text: " with three tabs to start with. Then new tabs can be added or the selected tab can be deleted in runtime. Any kind of views can be added to a "
                    attr: 1
                  - text: StdTabViews.View
                    attr: 2
                  - text: ". In this example one "
                    attr: 1
                  - text: ObxCube
                    attr: 2
                  - text: "-view is added and the same "
                    attr: 1
                  - text: ObxCalc
                    attr: 2
                  - text: "-view is added several times. This shows another charactaristic of "
                    attr: 1
                  - text: StdTabViews
                    attr: 2
                  - text: "; when a view is added it is copied. Eventhough the same view is used to create several tabs, they all have their own view internally. You can easily try this by typing a number into a calculator view, then changing tab to another calculator view and type in another number. When you switch back to the first calculator it still displays the first number.\r\rThe example also installs a simple notifier which simply displays the notify message in the log.\r\rHere you can try the example:"
                    attr: 1
                  - text: "\r"
                    attr: 3
