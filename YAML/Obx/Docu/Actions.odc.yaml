                flow:
                  - text: "Overview by Example: ObxActions"
                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\rThis example demonstrates how background tasks can be implemented using "
                    attr: 2
                  - text: actions
                    attr: 3
                  - text: ". An action is an object which performs some action later when the system is idle, i.e., between user interactions. An action can be scheduled to execute as soon as possible, or after some time has passed. Upon execution, an action may re-schedule itself for a later point in time. In this way, an action can operate as a background task, getting computation time whenever the system is idle. This strategy is called "
                    attr: 2
                  - text: cooperative multitasking
                    attr: 3
                  - text: ". For this to work, an action must not do massive computations, because this would reduce the responsiveness of the system. Longer calculations need to be broken down into less time consuming pieces. This is demonstrated by an algorithm which calculates prime numbers up to a given maximum, as a background task. An action is used to perform the stepwise calculation. Every newly found prime number is written into a text. This text is opened when the calculation is started and shows the progression of the background task. The action checks whether it has reached the "
                    attr: 2
                  - text: Upper Bound
                    attr: 3
                  - text: " set by the user. If this is not yet the case, it re-schedules itself for further execution.\r\tIn order to speed up the calculation the parameter "
                    attr: 2
                  - text: Step Size
                    attr: 3
                  - text: " can be set to a larger value. This increases the CPU workload and decreases the total response time on the one side but also decreases the responsiveness of the system on the other side. The particular values required for making this effect perceptible depend on the underlying platform's processing power.\r\r"
                    attr: 2
