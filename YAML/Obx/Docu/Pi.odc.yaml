                flow:
                  - text: "Oberon by Example: ObxPi"
                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\rThis example demonstrates the use of module "
                    attr: 2
                  - text: Integers
                    attr: 3
                  - text: " for computing with arbitrary precision decimals. The example implements the command "
                    attr: 2
                  - text: ObxPi.WritePi
                    attr: 3
                  - text: ", which computes n decimal digits of the constant Pi and writes the result into the log. The command "
                    attr: 2
                  - text: "ObxPi.Pi "
                    attr: 3
                  - text: "only computes Pi, without printing the result. It can be used to measure the efficiency of the arbitrary precision integer package.\r\rFor computation, the rule\r\r\t Pi = 16 * atan(1/5) - 4 * atan(1/239)\r\ris used where atan is approximated with its Taylor series expansion at x = 0:\r\r\t\tatan(x) = x - x^3/3 + x^5/5 - x^7/7 + ... \r\rThe computation is performed with integers only. Each decimal x is represented as integer x * 10^d where d is the number of decimal digits to the right of the decimal point. Arithmetic operations on decimals are performed using integer arithmetic. This way, the results are chopped, not rounded. For each operation, an error of at most one ulp may be introduced. Therefore, the computation of Pi is performed with some guard digits. The final result is chopped to the desired number of decimal digits. If you want to compute more digits of Pi you have to increase the number of guard digits. Use Ceiling(Log10(1.43*n)) guard digits in order to compute n digits of Pi.\r\rExample:\r"
                    attr: 2
