                    attr: 1
                  - text: Dev
                    attr: 2
                  - text: " menu. After the compilation, a message like\r\rcompiling \"ObxHello0\"   104   0\r\rappears in the "
                    attr: 1
                  - text: Log
                    attr: 2
                  - text: " window. It means that module "
                    attr: 1
                  - text: ObxHello0
                    attr: 2
                  - text: " has been compiled successfully, that a code file has been written to disk containing the compiled code, that this module has a code size of 104 bytes and global variables of 0 bytes size, and that information about the module's interface has been written to disk in a symbol file. New symbol files are created whenever a module is compiled for the first time, or when its interface has changed.\r\rThe interface of the above module consists of one exported procedure: "
