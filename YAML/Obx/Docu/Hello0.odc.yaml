                  - text: "\r\rOut\t혻혻혻532\t혻혻0\t24.10.1994  13:53:49\t25.10.1994  20:08:42\rConfig\t혻혻혻159\t혻혻0\t24.10.1994  13:53:47\t25.10.1994  18:31:52\r"
