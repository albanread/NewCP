                  - text: " ObxHello0.Do\r\rClick on this button to cause the following actions to occur: the code for "
                    attr: 1
                  - text: ObxHello0
                    attr: 2
                  - text: " is loaded into memory, and then its procedure "
                    attr: 1
                  - text: Do
                    attr: 2
                  - text: " is executed. You see the result in the log window:\r\rHello World\r\rWhen you click on the button again, BlackBox executes the command immediately, without loading the module's code again: once loaded, modules remain loaded unless they are removed explicitly.\r\rWhen clicked, a commander takes the string which follows it, and tries to interpret it as a Component Pascal command, i.e., as a module name followed by a dot, followed by the name of an exported, parameterless procedure.\r\rTry out the following examples:\r\r  "
