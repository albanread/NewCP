                  - text: " ObxHello1.Do\r\rThe embedded text view above contains a slightly more advanced hello world program than "
                    attr: 1
                  - text: ObxHello0
                    attr: 2
                  - text: ". It doesn't use module "
                    attr: 1
                  - text: StdLog
                    attr: 2
                  - text: " to write into the log window. Instead, it creates a new empty text, to which it connects a text formatter. A text formatter is an object which provides procedures to write variables of all basic Component Pascal types into a text. In the above example, a string and a carriage return are written to the text, which means that they are appended to the existing text. Since a newly created text is empty, "
                    attr: 1
                  - text: t
                    attr: 2
                  - text: " now contains exactly what the formatter has written into it.\r\rA text is an object which carries text and text attributes; i.e., a sequence of characters and information about font, color, and vertical offset of each character. However, a text does not know how to draw itself; this is the purpose of a text view. (Yes, what you are currently looking at is the rendering of such a view.) When a text view is created, it receives the text to be displayed as a parameter. Several views can be open on the same text simultaneously. When you edit in one view, the changes are propagated to all other views on the same text.\r\rWhen you create a text, you perform the steps outlined below:\r\r1) create a text model\r2) connect a text formatter to it\r3) write the text's contents via the formatter\r4) create a text view for the model\r5) open the text view in a window\r\rIn this example, we have seen how to use the text subsystem in order to create a new text.\r"
                    attr: 1
