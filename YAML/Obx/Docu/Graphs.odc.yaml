                flow:
                  - text: "Overview by Example: ObxGraphs"
                    attr: 0
                  - text: "\r\rThis example is a view which implements simple bar charts. The implementation consists of a view and a model. The view contains the model, and the model contains a linear list of values. For each of these values, a bar is drawn when the view is restored in a frame. The current list of values can be inspected by clicking with the mouse into the view: as a result, an auxiliary window is opened containing a textual representation of the values. This list of numbers can be edited, selected, and then dropped into the graph view again, to change its current list of values. A model's data (the value list) is always replaced as a whole and never modified incrementally. For this reason, not only shallow but also deep copying of a model can be implemented by copying the model reference (the pointer value), rather than by cloning the model and its contents. The same immutability property has been used in example "
                    attr: 1
                  - text: ObxLines
                    attr: 2
                  - text: " already.\r\rThe most interesting part of this view implementation is the handling of drag & drop messages. In order to let the BlackBox Component Builder provide drop feedback (i.e., the temporary outline denoting a graph view as a possible target for dropping a piece of text) the "
                    attr: 1
                  - text: Controllers.PollDropMsg
                    attr: 2
                  - text: " must be handled. In order to actually execute a drop operation (i.e., to let the graph view consume the dropped piece of text), the "
                    attr: 1
                  - text: Controllers.DropMsg
                    attr: 2
                  - text: " must be handled. In our example, the dropped view isn't "
                    attr: 1
                  - text: inserted
                    attr: 2
                  - text: " into the drop target, but rather "
                    attr: 1
                  - text: interpreted
                    attr: 2
                  - text: " as a specification for its new contents.\r\rThe handling of the "
                    attr: 1
                  - text: Properties.FocusPref
                    attr: 2
                  - text: " preference is also noteworthy. By setting up this preference, a view can inform its container how it would like to be treated concerning focusing. If this message is not handled, a view is never permanently focused, except if it is the root view. This means that upon clicking into the view, the view gets selection handles, but not a focus border. The focus preference allows to modify this behavior.\r\rGraph views are not meant to be targets of menu commands, i.e., it is not necessary to denote them as focusable. Since they should react on mouse clicks into their interior, they shouldn't be selected either. A view which normally is neither focused nor selected, but still should receive mouse clicks in it, is called a "
                    attr: 1
                  - text: hot focus
                    attr: 2
                  - text: ". A command button is a more typical example of a hot focus. A view can denote itself as a hot focus by setting the "
                    attr: 1
                  - text: hotFocus
                    attr: 2
                  - text: " field of the "
                    attr: 1
                  - text: Properties.FocusPref
                    attr: 2
                  - text: " preference to "
                    attr: 1
                  - text: "TRUE"
                    attr: 2
                  - text: ".\rTruly editable views should set the "
                    attr: 1
                  - text: setFocus
                    attr: 2
                  - text: " field instead of the "
                    attr: 1
                  - text: hotFocus
                    attr: 2
                  - text: " field, so the focus is not lost when the user releases the mouse button.\r\r"
                    attr: 1
                  - link:
                      target: "StdCmds.OpenDoc('Obx/Mod/Graphs')"
                      body:
                        - text: ObxGraphs  sources
