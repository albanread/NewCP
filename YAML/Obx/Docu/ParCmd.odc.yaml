                  - text: "Overview by Example: ObxParCmd"
                    attr: 0
                  - text: "\r\rThis example shows how a command button's context can be accessed. For example, a button in a text may invoke a command, which reads the text immediately following the command. This text can be used as an input parameter to the command.\r\r"
                    attr: 1
                  - text: ObxParCmd
                    attr: 2
                  - text: " implements two commands which scan the text behind a command button for a string. In the first command, the string is written to the log:\r\r"
