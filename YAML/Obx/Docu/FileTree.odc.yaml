                flow:
                  - text: "Overview by Example: ObxFileTree"
                    attr: 0
                  - text: "\r\rThis example illustrates the use of the "
                    attr: 1
                  - text: TreeControl
                    attr: 2
                  - text: ". The aim is to create a file browser similar to the Windows Explorer. To keep it simple, the user interface will consist of a text field, three buttons, and a "
                    attr: 1
                  - text: TreeControl
                    attr: 2
                  - text: ". When the user types a path to a directory in the text field and clicks on the "
                    attr: 1
                  - text: Display
                    attr: 2
                  - text: " button the files and folders in the given directory are shown in the tree. The user can browse the files and folders in the tree, and a double click on a file opens the file in BlackBox.\r\r"
                    attr: 1
                  - text: The Interactors
                    attr: 3
                  - text: "\rTo achieve this user interface we need a "
                    attr: 1
                  - text: Dialog.String
                    attr: 2
                  - text: " variable to connect to the text field, we need two procedures to connect to the "
                    attr: 1
                  - text: Display
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: Open
                    attr: 2
                  - text: " buttons respectively, and we need a "
                    attr: 1
                  - text: Dialog.Tree
                    attr: 2
                  - text: " variable to connect to the "
                    attr: 1
                  - text: TreeControl
                    attr: 2
                  - text: ". We also need a notifier to connect to "
                    attr: 1
                  - text: TreeControl
                    attr: 2
                  - text: ". This notifier should detect a double click on a leaf in the tree and open the corresponding file.\r\rThe "
                    attr: 1
                  - text: TreeControl
                    attr: 2
                  - text: " has several properties which can be modified with the property inspector. For this example the default properties are sufficient. In particular the option \"Folder icons\" should be switched on. This option makes the "
                    attr: 1
                  - text: TreeControl
                    attr: 2
                  - text: " show icons in front of each node in the tree. The leaf nodes get a \"file\" icon and the nodes that have subnodes get a \"folder\" icon. This option gives our program the same look and feel as the Windows Explorer.\r\rThe only problem is that if a file directory does not contain any files it will be a leaf node and thus look like a file and not a folder. For this purpose the "
                    attr: 1
                  - text: Dialog.TreeNode
                    attr: 2
                  - text: " offers a method called "
                    attr: 1
                  - text: ViewAsFolder
                    attr: 2
                  - text: ", which makes a node in a tree display a folder icon even if it doesn't have any subnodes.\r\r"
                    attr: 1
                  - text: The Implemantation
                    attr: 3
                  - text: "\rTo implement this, this example uses four procedures:\r\rPROCEDURE BuildDirTree (loc: Files.Locator; parent: Dialog.TreeNode);\rPROCEDURE "
                    attr: 1
                  - text: Update
                    attr: 3
                  - text: "*;\rPROCEDURE "
                    attr: 1
                  - text: Open
                    attr: 3
                  - text: "*;\rPROCEDURE "
                    attr: 1
                  - text: OpenGuard
                    attr: 3
                  - text: "* (VAR par: Dialog.Par);\r\r"
                    attr: 1
                  - text: BuildDirTree
                    attr: 2
                  - text: " recursively adds files and folders to the tree, and also makes sure that the "
                    attr: 1
                  - text: ViewAsFolder
                    attr: 2
                  - text: " attribute is set for nodes that are folders. "
                    attr: 1
                  - text: Update
                    attr: 2
                  - text: " is the procedure that is connected to the "
                    attr: 1
                  - text: Display
                    attr: 2
                  - text: " command button in the user interface. This procedure clears the tree and then calls "
                    attr: 1
                  - text: BuildDirTree
                    attr: 2
                  - text: ". The procedure "
                    attr: 1
                  - text: "Open "
                    attr: 2
                  - text: "opens the selected folder or file. StdCmds.DefaultOnDoubleClick, which is set as the "
                    attr: 1
                  - text: TreeControl
                    attr: 2
                  - text: "'s notifier procedure, executes the default command "
                    attr: 1
                  - text: Open
                    attr: 2
                  - text: " when the "
                    attr: 1
                  - text: TreeControl
                    attr: 2
                  - text: " is double-clicked."
                    attr: 1
                  - text: "\r"
                    attr: 4
                  - text: "\r"
                    attr: 1
