                          - text: "MODULE ObxAddress0;\r\r\tVAR\r\t\t"
                            attr: 0
                          - text: adr
                            attr: 1
                          - text: "*: RECORD\r\t\t\tname*:\tARRAY 64 OF CHAR;\r\t\t\tcity*:\tARRAY 24 OF CHAR;\r\t\t\tcountry*:\tARRAY 16 OF CHAR;\r\t\t\tcustomer*:\tINTEGER;\r\t\t\tupdate*:\tBOOLEAN\r\t\tEND;\r\r\tPROCEDURE "
                            attr: 0
                          - text: OpenText
                            attr: 1
                          - text: "*;\r\tBEGIN\r\t\t\r\tEND OpenText;\r\t\rEND ObxAddress0.\r"
                            attr: 0
                    attr: 1
                    w: 4593300
                    h: 2730500
                  - text: "\r\rCompile this module and then execute "
                    attr: 1
                  - text: New Form...
                    attr: 2
                  - text: " in the "
                    attr: 1
                  - text: Controls
                    attr: 2
                  - text: " menu. A dialog will be opened. Now type \"ObxAddress0\" into its "
                    attr: 1
                  - text: Link
                    attr: 2
                  - text: " field, and then click on the default button. A new window with the form will be opened. This form layout can be edited, e.g., by moving the "
                    attr: 1
                  - text: update
                    attr: 2
                  - text: " checkbox somewhat to the right. (Note that you have modified the document by doing that, thus you will be asked whether to save it when you try to close it. Don't save this one.\r\rNow execute the "
                    attr: 1
                  - text: Open as Aux Dialog
                    attr: 2
                  - text: " command in the "
                    attr: 1
                  - text: Controls
                    attr: 2
                  - text: " menu. As a result, you get a fully functional dialog with the current layout. This mask can be used right away, i.e., when you click into the update check box, the variable "
                    attr: 1
                  - text: ObxAddress0.adr.update
                    attr: 2
                  - text: " will be toggled!\r\rIf you have several views on the same variable (e.g., both the layout and the mask window), all of them will reflect the changes that the user makes.\r\rA form's controls are linked to a program variable in a similar way as a text view is linked to its text model. Both text views and controls are implementations of the interface type "
                    attr: 1
                  - text: Views.View
                    attr: 2
                  - text: ". The container of the above controls is a form view, itself also an implementation of "
                    attr: 1
                  - text: Views.View
                    attr: 2
                  - text: ". Form views, just as text views, are examples of container views: container views may contain some intrinsic contents (e.g., text pieces) as well as arbitrary other views. Form views are degenerated in that they have no intrinsic contents; they may only contain other views.\r\rInstead of starting with a record declaration as in the above example, you may prefer to start with the interactive design of a dialog, and only later turn to the programming aspects. This is perfectly possible as well: click on the "
                    attr: 1
                  - text: Empty
                    attr: 2
                  - text: " command button to create a new empty form. It will be opened in a new window, and the "
                    attr: 1
                  - text: Layout
                    attr: 2
                  - text: " menu will appear. Using the commands in the "
                    attr: 1
                  - text: Controls
                    attr: 2
                  - text: " menu, new controls can be inserted into the form. The form can be saved in a file, and its controls may later be connected to program variables using a tool called the control property editor (see the description of the "
                    attr: 1
                  - text: Edit
                    attr: 2
                  - text: " menu in the User's Manual).\r\rBlackBox Component Builder only supports modeless forms, whether used as data entry masks or as dialogs. Modal forms would force the user to complete a certain task before doing anything else, e.g., looking up additional information on his task. BlackBox follows the philosophy that the user should be in control, not the computer.\r\rIn this example we have seen how a form is used, from the perspective of a programmer as well as from the perspective of a user interface designer. Furthermore we have seen how an initial form layout can be generated automatically; how a form can be viewed (even simultaneously) both as a layout and as a dialog mask; and how a control, like any other view, may live in an arbitrary container view, not just in a form view.\r"
                    attr: 1
