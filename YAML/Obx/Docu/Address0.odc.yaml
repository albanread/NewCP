                flow:
                  - text: "Overview by Example: ObxAddress0"
                    attr: 0
                  - text: "\r\rOne of the hallmarks of modern user interfaces are modeless dialog boxes and data entry forms. They feature text entry fields, push buttons, check boxes, and a variety of other so-called "
                    attr: 1
                  - text: controls
                    attr: 2
                  - text: ". The BlackBox Component Builder addresses this issue in a unique way:\r\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " new controls can be implemented in Component Pascal; they are nothing more than specialized views, there is no artifical distinction between control objects and document objects\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " every view which may contain other views (i.e., a container view) may thus contain controls, there is no artifical distinction between control containers and document containers\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " every general container view can be turned into an input mask when desired\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " some controls can be directly linked to variables of a program\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " linking is done automatically, taking into account type information about the variables in order to guarantee consistency\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " initial form layouts can be generated automatically out of a record declaration\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " forms can be edited interactively and stored as documents, no intermediate code generation is required\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " forms can be used \"live\" while they are being edited\r"
                    attr: 1
                  - text: ꀢ
                    attr: 1
                    wide: true
                  - text: " form layouts may be created or manipulated by a Component Pascal program, if this is desired.\r\rSome of these aspects can be demonstrated with the example below:\r\r\t"
                    attr: 1
                  - view:
                      kind: TextViews.StdView
                      storeKind: store
                      typeChain:
                        - TextViews.StdViewDesc
                        - TextViews.ViewDesc
                        - Containers.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
