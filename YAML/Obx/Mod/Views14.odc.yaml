                    attr: 3
                  - text: "\r\r\t\tPasteCharOp = POINTER TO RECORD (Stores.Operation)\r\t\t\tmodel: StdModel;\r\t\t\tchar: CHAR;\r\t\t\tdo: BOOLEAN\r\t\tEND;\r\r\r\t"
                    attr: 0
                  - text: "VAR\r\t\tmdir-: ModelDirectory;\r\t\tdir-: Directory;"
                    attr: 3
                  - text: "\r\r\r\t"
                    attr: 0
                  - text: "(* Model *)"
                    attr: 1
                  - text: "\r\r\t"
                    attr: 0
                  - text: "PROCEDURE (m: Model) Insert* (char: CHAR), NEW, ABSTRACT;\r"
                    attr: 3
                  - text: "\t"
                    attr: 0
                  - text: "PROCEDURE (m: Model) Remove*, NEW, ABSTRACT;\r"
                    attr: 3
                  - text: "\t"
                    attr: 0
                  - text: "PROCEDURE (m: Model) GetString* (OUT s: ARRAY OF CHAR), NEW, ABSTRACT;\r"
                    attr: 3
                  - text: "\r\t"
                    attr: 0
                  - text: "(* ModelDirectory *)"
                    attr: 1
                  - text: "\r\r\t"
                    attr: 0
                  - text: "PROCEDURE (d: ModelDirectory) New* (): Model, NEW, ABSTRACT;\r"
                    attr: 3
                  - text: "\r\t"
                    attr: 0
                  - text: "(* PasteCharOp *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (op: PasteCharOp) Do;\r\t\tVAR m: StdModel; msg: Models.UpdateMsg;\r\tBEGIN\r\t\tm := op.model;\r\t\tIF op.do THEN\t\t\t\t"
                    attr: 0
                  - text: "(* do operation's transformation *)"
                    attr: 1
                  - text: "\r"
                    attr: 3
                  - text: "\t\t\tm.s[m.i] := op.char; INC(m.i);\r\t\tELSE\t\t\t\t\t\t"
                    attr: 0
                  - text: "(* undo operation's transformation *)"
                    attr: 1
                  - text: "\r"
                    attr: 3
                  - text: "\t\t\tDEC(m.i)\t\t\t\t"
                    attr: 0
                  - text: "(* remove character from string *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\t\tm.s[m.i] := 0X;\r\t\top.do := ~op.do;\t"
                    attr: 0
                  - text: "\t\t(* toggle between \"do\" and \"undo\" *)"
                    attr: 1
                  - text: "\r"
                    attr: 3
                  - text: "\t\tModels.Broadcast(m, msg)"
                    attr: 0
                  - text: "\t"
                    attr: 3
                  - text: "(* update all views on this model *)"
                    attr: 1
                  - text: "\r\tEND Do;"
                    attr: 0
                  - text: "\r"
                    attr: 3
                  - text: "\r\r\t"
                    attr: 0
                  - text: "(* StdModel *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (m: "
                    attr: 0
                  - text: Std
                    attr: 3
                  - text: "Model) Internalize (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER;\r\tBEGIN\r\t\trd.ReadVersion(0, 0, version);\r\t\tIF ~rd.cancelled THEN\r\t\t\trd.ReadInt(m.i); rd.ReadString(m.s)\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (m: "
                    attr: 0
                  - text: Std
                    attr: 3
                  - text: "Model) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteVersion(0);\r\t\twr.WriteInt(m.i); wr.WriteString(m.s)\r\tEND Externalize;\r\r\tPROCEDURE (m: "
                    attr: 0
                  - text: Std
                    attr: 3
                  - text: "Model) CopyFrom (source: Stores.Store);\r\tBEGIN\r\t\tWITH source: "
                    attr: 0
                  - text: Std
                    attr: 3
                  - text: "Model DO\r\t\t\tm.i := source.i; m.s := source.s\r\t\tEND\r\tEND CopyFrom;\r\r\r\t"
                    attr: 0
                  - text: "PROCEDURE (m: StdModel) Insert (char: CHAR);\r\t\tVAR op: PasteCharOp;\r\tBEGIN\r\t\tNEW(op); op.model := m; op.char := char; op.do := TRUE;\r\t\tModels.Do(m, \"insertion\", op)\r\tEND Insert;"
                    attr: 3
                  - text: "\r\r\t"
                    attr: 0
                  - text: "PROCEDURE (m: StdModel) Remove;\r\t\tVAR msg: Models.UpdateMsg;\r\tBEGIN\r\t\tDEC(m.i); m.s[m.i] := 0X;"
                    attr: 3
                  - text: "\r"
                    attr: 0
                  - text: "\t\tModels.Broadcast(m, msg)\t"
                    attr: 3
                  - text: "(* update all views on this model *)"
                    attr: 1
                  - text: "\r"
                    attr: 0
                  - text: "\tEND Remove;"
                    attr: 3
                  - text: "\r\r\t"
                    attr: 0
                  - text: "PROCEDURE (m: StdModel) GetString (OUT s: ARRAY OF CHAR);\r\tBEGIN\r\t\ts := m.s$\r\tEND GetString;"
                    attr: 3
                  - text: "\r\r\r\t"
                    attr: 0
                  - text: "(* StdModelDirectory *)"
                    attr: 1
                  - text: "\r\r\t"
                    attr: 0
                  - text: "PROCEDURE (d: StdModelDirectory) New (): Model;\r\t\tVAR m: StdModel;\r\tBEGIN\r\t\tNEW(m); m.s := \"\";  m.i := 0; RETURN m\r\tEND New;"
                    attr: 3
                  - text: "\r\r\r\r\t"
                    attr: 0
                  - text: "(* Directory *)"
                    attr: 1
                  - text: "\r\r\t"
                    attr: 0
                  - text: "PROCEDURE (d: Directory) New* (m: Model): View, NEW, ABSTRACT;\r\r"
                    attr: 3
                  - text: "\r\t"
                    attr: 0
                  - text: "(* StdView *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (v: "
                    attr: 0
                  - text: Std
                    attr: 3
                  - text: "View) Internalize (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER; st: Stores.Store;\r\tBEGIN\r\t\trd.ReadVersion(0, 0, version);\r\t\tIF ~rd.cancelled THEN\r"
                    attr: 0
                  - text: "\t\t\trd.ReadStore(st);\r\t\t\tIF st IS Model THEN\r\t\t\t\tv.model := st(Model)\r\t\t\tELSE\r\t\t\t\t(* concrete model implementation couldn't be loaded->\r\t\t\t\t\tan alien store was created *)\r\t\t\t\trd.TurnIntoAlien(Stores.alienComponent)\r\t\t\t\t(* internalization of v is cancelled *)\r\t\t\tEND\r"
                    attr: 3
                  - text: "\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (v: "
                    attr: 0
                  - text: Std
                    attr: 3
                  - text: "View) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteVersion(0);\r\t\twr.WriteStore(v.model)\r\tEND Externalize;\r\r\tPROCEDURE (v: "
                    attr: 0
                  - text: Std
                    attr: 3
                  - text: "View) CopyFromModelView (source: Views.View; model: Models.Model);\r\tBEGIN\r\t\tWITH source: "
                    attr: 0
                  - text: Std
                    attr: 3
                  - text: "View DO\r\t\t\tv.model := model(Model)\r\t\tEND\r\tEND CopyFromModelView;\r\r\tPROCEDURE (v: "
                    attr: 0
                  - text: Std
                    attr: 3
                  - text: "View) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\t"
                    attr: 0
                  - text: "VAR s: ARRAY 256 OF CHAR;"
                    attr: 3
                  - text: "\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: v.model.GetString(s);
                    attr: 3
                  - text: "\r\t\tf.DrawString(d, d, Ports.black, "
                    attr: 0
                  - text: s
                    attr: 3
                  - text: ", Fonts.dir.Default())\r\tEND Restore;\r\r\tPROCEDURE (v: "
                    attr: 0
                  - text: Std
                    attr: 3
                  - text: "View) ThisModel (): Models.Model;\r\tBEGIN\r\t\tRETURN v.model\r\tEND ThisModel;\r\r\tPROCEDURE (v: "
                    attr: 0
                  - text: Std
                    attr: 3
                  - text: "View) HandleModelMsg (VAR msg: Models.Message);\r\tBEGIN\r\t\tViews.Update(v, Views.keepFrames)\t"
                    attr: 0
                  - text: "(* restore "
                    attr: 1
                  - text: v
                    attr: 0
                  - text: " in any frame that displays it *)"
                    attr: 1
                  - text: "\r"
                    attr: 3
                  - text: "\tEND HandleModelMsg;\r\r\tPROCEDURE (v: "
                    attr: 0
                  - text: Std
                    attr: 3
                  - text: "View) HandleCtrlMsg (f: Views.Frame;\r\t\t\t\t\t\t\t\t\t\tVAR msg: Controllers.Message;\r\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\tBEGIN\r\t\tWITH msg: Controllers.EditMsg DO\r\t\t\tIF msg.op = Controllers.pasteChar THEN\r"
                    attr: 0
                  - text: "\t\t\t\t"
                    attr: 1
                  - text: v.model.Insert(msg.char)
                    attr: 3
                  - text: "\r\t\t\tEND\r\t\tELSE\t\t\t\t\t\t"
                    attr: 0
                  - text: "(* ignore other messages *)"
                    attr: 1
                  - text: "\r\t\tEND\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE (v:"
                    attr: 0
                  - text: Std
                    attr: 3
                  - text: "View) HandlePropMsg (VAR msg: Properties.Message);\r\tBEGIN\r\t\tWITH msg: Properties.SizePref DO\r\t\t\tIF (msg.w = Views.undefined) OR (msg.h = Views.undefined) THEN\r\t\t\t\tmsg.w := 10 * d; msg.h := 2 *d \r\t\t\tEND\r\t\t| msg: Properties.FocusPref DO\r\t\t\tmsg.setFocus := TRUE\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\r\r\t"
                    attr: 0
                  - text: "(* StdDirectory *)"
                    attr: 1
                  - text: "\r\r\t"
                    attr: 0
                  - text: "PROCEDURE (d: StdDirectory) New* (m: Model): View;\r\t\tVAR v: StdView;\r\tBEGIN\r\t\tASSERT(m # NIL, 20);\r\t\tNEW(v); v.model := m; Stores.Join(v, m);\r\t\tRETURN v"
                    attr: 3
                  - text: "\r"
                    attr: 0
                  - text: "\tEND New;"
                    attr: 3
                  - text: "\r\r\r\tPROCEDURE Deposit*;\r\t\tVAR v: View;\r\tBEGIN\r"
                    attr: 0
                  - text: "\t\tv := dir.New(mdir.New());"
                    attr: 3
                  - text: "\r\t\tViews.Deposit(v)\r\tEND Deposit;\r\r"
                    attr: 0
                  - text: "\tPROCEDURE SetModelDir* (d: ModelDirectory);\r\tBEGIN\r\t\tASSERT(d # NIL, 20);\r\t\tmdir := d\r\tEND SetModelDir;\r\r"
                    attr: 3
                  - text: "\t"
                    attr: 0
                  - text: "PROCEDURE SetDir* (d: Directory);\r\tBEGIN\r\t\tASSERT(d # NIL, 20);\r\t\tdir := d\r\tEND SetDir;"
                    attr: 3
                  - text: "\r\r\t"
                    attr: 0
                  - text: "PROCEDURE Init;\r\t\tVAR md: StdModelDirectory; d: StdDirectory;\r\tBEGIN\r\t\tNEW(md); mdir := md;\r\t\tNEW(d); dir := d\r\tEND Init;"
                    attr: 3
