                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Fonts, Ports, Stores, Models, Views, Controllers, Properties;\r\r\tCONST d = 20 * Ports.point;\r\r\tTYPE\r\t\t"
