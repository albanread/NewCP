                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT ObxRandom, In, Out, XYplane;\r\r\tVAR\r\t\ta1, b1, c1, d1, e1, f1, p1: REAL;\r\t\ta2, b2, c2, d2, e2, f2, p2: REAL;\r\t\ta3, b3, c3, d3, e3, f3, p3: REAL;\r\t\ta4, b4, c4, d4, e4, f4, p4: REAL;\r\t\tX, Y: REAL;\r\t\tx0: INTEGER;\r\t\ty0: INTEGER;\r\t\te: INTEGER;\r\t\tinitialized: BOOLEAN;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Draw
                    attr: 3
                  - text: "*;\r\t\tVAR x, y: REAL; xi, eta: INTEGER; rn: REAL;\r\tBEGIN\r\t\tIF initialized THEN\r\t\t\tREPEAT\r\t\t\t\trn := ObxRandom.Uniform();\r\t\t\t\tIF rn < p1 THEN\r\t\t\t\t\tx := a1 * X + b1 * Y + e1; y := c1 * X + d1 * Y + f1\r\t\t\t\tELSIF rn < (p1 + p2) THEN\r\t\t\t\t\tx := a2 *X + b2 * Y + e2; y := c2 * X + d2 * Y + f2\r\t\t\t\tELSIF rn < (p1 + p2 + p3) THEN\r\t\t\t\t\tx := a3 * X + b3 * Y + e3; y := c3 * X + d3 * Y + f3\r\t\t\t\tELSE\r\t\t\t\t\tx := a4 * X + b4 * Y + e4; y := c4 * X + d4 * Y + f4\r\t\t\t\tEND;\r\t\t\t\tX := x; xi := x0 + SHORT(ENTIER(X * e));\r\t\t\t\tY := y; eta := y0 + SHORT(ENTIER(Y * e));\r\t\t\t\tXYplane.Dot(xi, eta, XYplane.draw)\r\t\t\tUNTIL \"s\" = XYplane.ReadKey()\r\t\tEND\r\tEND Draw;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Init
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\tX := 0; Y := 0;\r\t\tinitialized := FALSE;\r\t\tIn.Open;\r\t\tIn.Int(x0); In.Int(y0); In.Int(e);\r\t\tIn.Real(a1); In.Real(a2); In.Real(a3); In.Real(a4);\r\t\tIn.Real(b1); In.Real(b2); In.Real(b3); In.Real(b4);\r\t\tIn.Real(c1); In.Real(c2); In.Real(c3); In.Real(c4);\r\t\tIn.Real(d1); In.Real(d2); In.Real(d3); In.Real(d4);\r\t\tIn.Real(e1); In.Real(e2); In.Real(e3); In.Real(e4);\r\t\tIn.Real(f1); In.Real(f2); In.Real(f3); In.Real(f4);\r\t\tIn.Real(p1); In.Real(p2); In.Real(p3); In.Real(p4);\r\t\tIF In.Done THEN XYplane.Open; initialized := TRUE\r\t\tELSE Out.String(\"Parameter error: select a list of 31 numbers\"); Out.Ln\r\t\tEND\r\tEND Init;\r\rBEGIN\r\tinitialized := FALSE\rEND ObxFern.\r"
                    attr: 0
