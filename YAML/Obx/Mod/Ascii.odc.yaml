                    attr: 0
                  - text: Open
                    attr: 3
                  - text: "* (loc: Files.Locator; IN name: ARRAY OF CHAR): Text;\r\t\tVAR s: Stores.Store; fname: Files.Name; text: Text;\r\tBEGIN\r\t\tIF loc = NIL THEN PathToFileSpec(name, loc, fname) ELSE fname := name$ END;\r\t\tIF loc.res = 0 THEN\r\t\t\tConverters.Import(loc, fname, conv, s);\r\t\t\tIF (s # NIL) & (s IS TextViews.View) THEN\r\t\t\t\tNEW(text); text.reading := TRUE; text.scan.ConnectTo(s(TextViews.View).ThisModel());\r\t\t\t\t"
