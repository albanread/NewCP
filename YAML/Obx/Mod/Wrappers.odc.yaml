                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Dialog, Stores, Models, Views, Controllers, Properties, StdLog;\r\r\tCONST minVersion = 2; maxVersion = 2;\r\r\tTYPE\r\t\tView = POINTER TO RECORD (Views.View)\r\t\t\tinner: Views.View\t"
                    attr: 0
                  - text: "(* v # NIL *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\r\tPROCEDURE (v: View) Internalize (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER;\r\tBEGIN\r\t\trd.ReadVersion(minVersion, maxVersion, version);\r\t\tIF ~rd.cancelled THEN\r\t\t\tViews.ReadView(rd, v.inner)\t"
                    attr: 0
                  - text: "(* generate Views.Alien if necessary *)"
                    attr: 1
                  - text: "\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (v: View) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteVersion(maxVersion);\r\t\tViews.WriteView(wr, v.inner)\t"
                    attr: 0
                  - text: "(* handle Views.Alien if necessary *)"
                    attr: 1
                  - text: "\r\tEND Externalize;\r\r\tPROCEDURE (v: View) CopyFromModelView (source: Views.View; model: Models.Model);\r\tBEGIN\r\t\tWITH source: View DO\r\t\t\tIF model = NIL THEN\r\t\t\t\tv.inner := Views.CopyOf(source.inner, Views.deep)\r\t\t\tELSE\r\t\t\t\tv.inner := Views.CopyWithNewModel(source.inner, model)\r\t\t\tEND\r\t\tEND\r\tEND CopyFromModelView;\r\r\tPROCEDURE (v: View) ThisModel (): Models.Model;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " v.inner.ThisModel()\r\tEND ThisModel;\r\r\tPROCEDURE (v: View) InitContext (context: Models.Context);\r\tBEGIN\r\t\tv.InitContext^(context);\r\t\tv.inner.InitContext(context)\t"
                    attr: 0
                  - text: "(* wrapper and wrapped view share the same context *)"
                    attr: 1
                  - text: "\r\tEND InitContext;\r\r\tPROCEDURE (v: View) Neutralize;\r\tBEGIN\r\t\tv.inner.Neutralize\r\tEND Neutralize;\r\r\t"
                    attr: 0
                  - text: "(* GetNewFrame: wrapper uses standard frame *)"
                    attr: 1
                  - text: "\r\t"
                    attr: 0
                  - text: "(* GetBackground: wrapper has no intrinsic background color *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (v: View) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tViews.InstallFrame(f, v.inner, 0, 0, 0, TRUE)\t"
                    attr: 0
                  - text: "(* create and install wrapped view's frame *)"
                    attr: 1
                  - text: "\r\tEND Restore;\r\r\t"
                    attr: 0
                  - text: "(* RestoreMarks: wrapper has no intrinsic marks, wrapped view's RestoreMarks is called by framework *)"
                    attr: 1
                  - text: "\r\t"
                    attr: 0
                  - text: "(* HandleModelMsg: framework performs message propagation *)"
                    attr: 1
                  - text: "\r\t"
                    attr: 0
                  - text: "(* HandleViewMsg: framework performs message propagation *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (v: View) HandleCtrlMsg (f: Views.Frame; VAR msg: Controllers.Message; VAR focus: Views.View);\r\tBEGIN\r"
                    attr: 0
                  - text: "\t\t"
                    attr: 3
                  - text: "(* here comes the behavior which is specific to this wrapper -\r\t\t\tit modifies the wrapped view's behavior *)"
                    attr: 4
                  - text: "\r\t\tWITH msg: Controllers.EditMsg DO\r\t\t\t"
                    attr: 3
                  - text: "(* sample special behavior: copy typing into log *)"
                    attr: 4
                  - text: "\r\t\t\tIF msg.op = Controllers.pasteChar THEN StdLog.Char(msg.char); StdLog.Ln END\t\r\t\tELSE\r\t\tEND;\r"
                    attr: 3
                  - text: "\t\tfocus := v.inner\t"
                    attr: 0
                  - text: "(* forward all controller messages to wrapped view *)"
                    attr: 1
                  - text: "\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE (v: View) HandlePropMsg (VAR msg: Properties.Message);\r\tBEGIN\r\t\tViews.HandlePropMsg(v.inner, msg)\t"
                    attr: 0
                  - text: "(* forward all property messages to wrapped view *)"
                    attr: 1
                  - text: "\r\tEND HandlePropMsg;\r\r\r\tPROCEDURE "
                    attr: 0
                  - text: Wrap
                    attr: 3
                  - text: "*;\r\t\tVAR poll: Controllers.PollOpsMsg; w: View; replace: Controllers.ReplaceViewMsg;\r\tBEGIN\r\t\tControllers.PollOps(poll);\r\t\tIF (poll.singleton # NIL) & ~(poll.singleton IS View) THEN\r\t\t\tNEW(w); w.inner := poll.singleton; Stores.Join(w, w.inner);\r\t\t\treplace.old := poll.singleton; replace.new := w;\r\t\t\tControllers.Forward(replace)\r\t\tELSE Dialog.Beep\r\t\tEND\r\tEND Wrap;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Unwrap
                    attr: 3
                  - text: "*;\r\t\tVAR poll: Controllers.PollOpsMsg; replace: Controllers.ReplaceViewMsg;\r\tBEGIN\r\t\tControllers.PollOps(poll);\r\t\tIF (poll.singleton # NIL) & (poll.singleton IS View) THEN\r\t\t\treplace.old := poll.singleton; replace.new := poll.singleton(View).inner;\r\t\t\tControllers.Forward(replace)\r\t\tELSE Dialog.Beep\r\t\tEND\r\tEND Unwrap;\r\rEND ObxWrappers.\r"
                    attr: 0
