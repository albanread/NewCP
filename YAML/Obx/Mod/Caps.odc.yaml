                  - text: "\r\tIMPORT Stores, Models, TextModels, TextControllers;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Do
                    attr: 3
                  - text: "*;\r\t\tVAR c: TextControllers.Controller; beg, end: INTEGER;\r\t\t\tr: TextModels.Reader; ch: CHAR;\r\t\t\tbuf: TextModels.Model; w: TextModels.Writer; script: Stores.Operation;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tc.GetSelection(beg, end);\r\t\t\t"
                    attr: 0
                  - text: "(* upper case text will be copied into this buffer *)"
                    attr: 1
                  - text: "\r\t\t\tbuf := TextModels.CloneOf(c.text); w := buf.NewWriter(NIL);\r\t\t\tr := c.text.NewReader(NIL); r.SetPos(beg);\r\t\t\tr.ReadChar(ch);\r\t\t\tWHILE (r.Pos() <= end) & ~r.eot DO\r\t\t\t\tIF (ch >= \"a\") & (ch <= \"z\") THEN ch := CAP(ch) END;\r\t\t\t\tw.WriteChar(ch);\r\t\t\t\tr.ReadChar(ch)\r\t\t\tEND;\r\t\t\tModels.BeginScript(c.text, \"Caps\", script);\r\t\t\tc.text.Delete(beg, end); c.text.Insert(beg, buf, 0, end - beg);\r\t\t\tModels.EndScript(c.text, script)\r\t\tEND\r\tEND Do;\r\rEND ObxCaps.\r"
