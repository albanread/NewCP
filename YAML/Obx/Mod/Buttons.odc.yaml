                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Dialog, Stores, Fonts, Ports, Views, Controllers, Properties, Controls;\r\r\tCONST minVersion = 0; maxVersion = 0;\r\r\tTYPE\r\t\tView = POINTER TO RECORD (Views.View)\r\t\t\tfont: Fonts.Font;\r\t\t\tcolor: INTEGER;\r\t\t\tlink: Dialog.String;\r\t\t\tlabel: ARRAY 256 OF CHAR\r\t\tEND;\r\r\r\tPROCEDURE (v: View) Internalize (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER;\r\tBEGIN\r\t\trd.ReadVersion(minVersion, maxVersion, version);\r\t\tIF ~rd.cancelled THEN\r\t\t\tViews.ReadFont(rd, v.font); rd.ReadInt(v.color); rd.ReadString(v.link); rd.ReadString(v.label)\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (v: View) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteVersion(maxVersion);\r\t\tViews.WriteFont(wr, v.font); wr.WriteInt(v.color); wr.WriteString(v.link); wr.WriteString(v.label)\r\tEND Externalize;\r\r\tPROCEDURE (v: View) CopyFromSimpleView (source: Views.View);\r\tBEGIN\r\t\tWITH source: View DO\r\t\t\tv.font := source.font; v.color := source.color; v.link := source.link; v.label := source.label\r\t\tEND\r\tEND CopyFromSimpleView;\r\r\tPROCEDURE (v: View) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR w, h, x, y, asc, dsc, fw: INTEGER;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* restore view at least in rectangle (l, t, r, b) *)"
                    attr: 1
                  - text: "\r\t\tv.context.GetSize(w, h);\t"
                    attr: 0
                  - text: "(* the container context maintains the view's size *)"
                    attr: 1
                  - text: "\r\t\tf.DrawRect(0, 0, w, h, f.dot, v.color);\t"
                    attr: 0
                  - text: "(* f.dot is close to one point, i.e. 1/72 inch *)"
                    attr: 1
                  - text: "\r\t\tx := (w - v.font.StringWidth(v.label)) DIV 2;\r\t\tv.font.GetBounds(asc, dsc, fw);\r\t\ty := h DIV 2 + (asc + dsc) DIV 3;\r\t\tf.DrawString(x, y, v.color, v.label, v.font)\r\tEND Restore;\r\r\tPROCEDURE (v: View) HandleCtrlMsg (\r\t\tf: Views.Frame; VAR msg: Controllers.Message; VAR focus: Views.View\r\t);\r\t\tVAR x, y, w, h, res: INTEGER; modifiers: SET; inside, isDown: BOOLEAN;\r\tBEGIN\r\t\tWITH msg: Controllers.TrackMsg DO\t"
                    attr: 0
                  - text: "(* mouse button was pressed *)"
                    attr: 1
                  - text: "\r\t\t\tv.context.GetSize(w, h);\r\t\t\tf.MarkRect(0, 0, w, h, Ports.fill, Ports.invert, Ports.show); inside := TRUE;\r\t\t\tREPEAT\t"
                    attr: 0
                  - text: "(* mouse tracking loop *)"
                    attr: 1
                  - text: "\r\t\t\t\tf.Input(x, y, modifiers, isDown);\r\t\t\t\tIF inside # (x >= 0) & (y >= 0) & (x < w) & (y < h) THEN\t"
                    attr: 0
                  - text: "(* toggle state *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tinside := ~inside; f.MarkRect(0, 0, w, h, Ports.fill, Ports.invert, inside)\r\t\t\t\tEND\r\t\t\tUNTIL ~isDown;\r\t\t\tIF inside THEN\t"
                    attr: 0
                  - text: "(* mouse was released inside the control *)"
                    attr: 1
                  - text: "\r\t\t\t\tf.MarkRect(0, 0, w, h, Ports.fill, Ports.invert, Ports.hide);\r\t\t\t\tIF v.link # \"\" THEN\r\t\t\t\t\tDialog.Call(v.link, \"\", res)\t"
                    attr: 0
                  - text: "(* interpret and execute the string in v.link *)"
                    attr: 1
                  - text: "\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE"
                    attr: 0
                  - text: "\t(* ignore other messages *)"
                    attr: 1
                  - text: "\r\t\tEND\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE GetStdProp (v: View): Properties.Property;\r\t\tVAR prop: Properties.StdProp;\r\tBEGIN\r\t\tNEW(prop);\r\t\tprop.color.val := v.color;\r\t\tprop.typeface := v.font.typeface;\r\t\tprop.size := v.font.size;\r\t\tprop.style.val := v.font.style;\r\t\tprop.weight := v.font.weight;\r\t\tprop.valid := {Properties.color..Properties.weight}; prop.known := prop.valid;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " prop\r\tEND GetStdProp;\r\r\tPROCEDURE SetStdProp (v: View; prop: Properties.StdProp);\r\t\tVAR typeface: Fonts.Typeface; size: INTEGER; style: SET; weight: INTEGER;\r\tBEGIN\r\t\tIF Properties.color IN prop.valid THEN v.color := prop.color.val END;\r\t\ttypeface := v.font.typeface; size := v.font.size; style := v.font.style; weight := v.font.weight;\r\t\tIF Properties.typeface IN prop.valid THEN typeface := prop.typeface END;\r\t\tIF Properties.size IN prop.valid THEN size := prop.size END;\r\t\tIF Properties.style IN prop.valid THEN style := prop.style.val END;\r\t\tIF Properties.weight IN prop.valid THEN weight := prop.weight END;\r\t\tv.font := Fonts.dir.This(typeface, size, style, weight);\t\t\r\tEND SetStdProp;\r\r\tPROCEDURE (v: View) HandlePropMsg (VAR msg: Properties.Message);\r\t\tCONST defaultWidth = 20 * Ports.mm; defaultHeight = 7 * Ports.mm;\r\t\tVAR p: Controls.Prop; prop: Properties.Property;\r\tBEGIN\r\t\tWITH msg: Properties.FocusPref DO\t"
                    attr: 0
                  - text: "(* a button is a \"hot focus\", i.e. does not remain focused *)"
                    attr: 1
                  - text: "\r\t\t\tmsg.hotFocus := TRUE\r\t\t| msg: Properties.SizePref DO\t"
                    attr: 0
                  - text: "(* return the default size of a button *)"
                    attr: 1
                  - text: "\r\t\t\tIF msg.w = Views.undefined THEN msg.w := defaultWidth END;\r\t\t\tIF msg.h = Views.undefined THEN msg.h := defaultHeight END\r\t\t| msg: Properties.PollMsg DO\t"
                    attr: 0
                  - text: "(* return the standard font, color, and control properties *)"
                    attr: 1
                  - text: "\r\t\t\tNEW(p);\r\t\t\tp.link := v.link; p.label := v.label$;\r\t\t\tp.valid := {Controls.link, Controls.label}; p.known := p.valid;\r\t\t\tProperties.Insert(msg.prop, p);\r\t\t\tProperties.Insert(msg.prop, GetStdProp(v))\r\t\t| msg: Properties.SetMsg DO\t"
                    attr: 0
                  - text: "(* set the standard font, color, or control properties *)"
                    attr: 1
                  - text: "\r\t\t\tprop := msg.prop;\r\t\t\tWHILE prop # NIL DO\r\t\t\t\tWITH prop: Controls.Prop DO\t"
                    attr: 0
                  - text: "(* standard control properties *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tViews.BeginModification(Views.notUndoable, v);\r\t\t\t\t\tIF Controls.link IN prop.valid THEN v.link := prop.link; END;\r\t\t\t\t\tIF Controls.label IN prop.valid THEN v.label := prop.label$ END;\r\t\t\t\t\tViews.EndModification(Views.notUndoable, v);\r\t\t\t\t\tViews.Update(v, Views.keepFrames)\t"
                    attr: 0
                  - text: "(* causes a delayed redrawing of the view *)"
                    attr: 1
                  - text: "\r\t\t\t\t| prop: Properties.StdProp DO\t"
                    attr: 0
                  - text: "(* standard font and color properties *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tViews.BeginModification(Views.notUndoable, v);\r\t\t\t\t\tSetStdProp(v, prop);\r\t\t\t\t\tViews.EndModification(Views.notUndoable, v);\r\t\t\t\t\tViews.Update(v, Views.keepFrames)\t"
                    attr: 0
                  - text: "(* causes a delayed redrawing of the view *)"
                    attr: 1
                  - text: "\r\t\t\t\tELSE\r\t\t\t\tEND;\r\t\t\t\tprop := prop.next\r\t\t\tEND\r\t\tELSE\t"
                    attr: 0
                  - text: "(* ignore other messages *)"
                    attr: 1
                  - text: "\r\t\tEND\r\tEND HandlePropMsg;\r\r\r\tPROCEDURE "
                    attr: 0
                  - text: New
                    attr: 3
                  - text: "* (): Views.View;\r\t\tVAR v: View;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* create a new button *)"
                    attr: 1
                  - text: "\r\t\tNEW(v); v.color := Ports.defaultColor; v.font := Fonts.dir.Default(); v.link := \"\"; v.label := \"\"; "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " v\r\tEND New;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Deposit
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\tViews.Deposit(New())\r\tEND Deposit;\r\rEND ObxButtons.\r"
                    attr: 0
