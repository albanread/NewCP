                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Displays the name of the font of the 2nd paragraph of the active document, if it is defined. *)"
                    attr: 1
                  - text: "\r\t\tVAR doc: CtlWord9.Document; fontName: ARRAY 100 OF CHAR;\r\tBEGIN\r\t\tdoc := GetApplication().ActiveDocument();\r\t\tfontName := doc.Paragraphs().Item(2).Range().Font().Name()$;\r\t\tIF fontName[0] = 0X THEN\r\t\t\tStdLog.String('2nd Paragraph Font Name is not defined (result = empty string)')\r\t\tELSE\r\t\t\tStdLog.String('2nd Paragraph Font Name = '); StdLog.String(fontName)\r\t\tEND;\r\t\tStdLog.Ln\r\tEND Disp2ndParagraphFontName;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Is1stParagraphBold
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Displays whether the 1st paragraph of the active document is bold or not, if it is defined. *)"
                    attr: 1
                  - text: "\r\t\tVAR bold: INTEGER; doc: CtlWord9.Document;\r\tBEGIN\r\t\tdoc := GetApplication().ActiveDocument();\r\t\tbold := doc.Paragraphs().Item(1).Range().Bold();\r\t\tStdLog.String('The first paragraph ');\r\t\tIF bold = 0 THEN\r\t\t\tStdLog.String('is Not Bold')\r\t\tELSIF bold = -1 THEN\r\t\t\tStdLog.String('is Bold')\r\t\tELSE\r\t\t\tStdLog.String('is neither Bold nor Not Bold')\r\t\tEND;\r\t\tStdLog.String(' (result = '); StdLog.Int(bold); StdLog.String(')'); StdLog.Ln\r\tEND Is1stParagraphBold;\r\r\tPROCEDURE "
