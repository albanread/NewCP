                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Overwrites the last character, which is always a 0DX, with \"A\". Word then inserts a new 0DX at the end. *)"
                    attr: 1
                  - text: "\r\t\tVAR count: INTEGER; doc: CtlWord9.Document;\r\tBEGIN\r\t\tdoc := GetApplication().ActiveDocument();\r\t\tcount := doc.Characters().Count();\r\t\tdoc.Range(CtlT.Int(count-1), CtlT.Int(count)).PUTText('A');\r\t\tStdLog.String('Last Character overwritten.'); StdLog.Ln\r\tEND OverwriteLastCharWithA;\r\r\tPROCEDURE "
