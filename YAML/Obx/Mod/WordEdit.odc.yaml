                  - text: "\r\t\tVAR size: SHORTREAL; doc: CtlWord9.Document;\r\tBEGIN\r\t\tdoc := GetApplication().ActiveDocument();\r\t\tStdLog.String('The first paragraph: size =');\r\t\tsize := doc.Paragraphs().Item(1).Range().Font().Size();\r\t\tIF size # CtlWord9.wdUndefined THEN\r\t\t\tStdLog.Real(size)\r\t\tELSE\r\t\t\tStdLog.String('undefined (result = '); StdLog.Real(size); StdLog.String(' )')\r\t\tEND;\r\t\tStdLog.Ln\r\tEND Disp1stParagraphFontSize;\r\r\t"
                    attr: 0
                  - text: "(* Performance *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: Performance
                    attr: 3
                  - text: "*;\r\t\tCONST\r\t\t\twordTries = 1000;\r\t\t\tbbTries = 100000000;\r\t\tVAR start, counterTime, wordTime, bbTime : LONGINT; i : INTEGER; opt: CtlWord9.Options;\r\r\t\tPROCEDURE Put (newValue: BOOLEAN);\r\t\t\tVAR value: BOOLEAN;\r\t\tBEGIN\r\t\t\tvalue := newValue\r\t\tEND Put;\r\r\tBEGIN\r\t\tIF app = NIL THEN Start END;\r\t\topt := GetApplication().Options();\r\r\t\tstart:= Services.Ticks();\r\t\tFOR i := 1 TO wordTries DO END;\r\t\tcounterTime := Services.Ticks() - start;\r\r\t\tstart:= Services.Ticks();\r\t\tFOR i := 1 TO wordTries DO opt.PUTSmartCutPaste(TRUE) END;\r\t\twordTime := Services.Ticks() - start - counterTime;\r\t\tStdLog.Int(wordTries);\r\t\tStdLog.String(\" PUTSmartCutPaste took \");\r\t\tStdLog.Real(wordTime / Services.resolution);\r\t\tStdLog.String(\" sec.\"); StdLog.Ln;\r\r\t\tstart:= Services.Ticks();\r\t\tFOR i := 1 TO bbTries DO END;\r\t\tcounterTime := Services.Ticks() - start;\r\r\t\tstart := Services.Ticks();\r\t\tFOR i := 1 TO bbTries DO Put(TRUE) END;\r\t\tbbTime := Services.Ticks() - start - counterTime;\r\t\tStdLog.Int(bbTries);\r\t\tStdLog.String(\" BlackBox procedure calls took \");\r\t\tStdLog.Real(bbTime / Services.resolution);\r\t\tStdLog.String(\" sec.\"); StdLog.Ln;\r\r\t\tStdLog.String(\"Properties are \");\r\t\tStdLog.Int( (wordTime * bbTries) DIV (bbTime * wordTries));\r\t\tStdLog.String(\" times slower.\"); StdLog.Ln\r\tEND Performance;\r\rEND ObxWordEdit.\r"
                    attr: 0
