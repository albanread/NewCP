                  - text: "\r\t\tVAR doc: CtlWord9.Document;\r\tBEGIN\r\t\tdoc := GetApplication().ActiveDocument();\r\t\tdoc.Content().InsertAfter('This Text');\r\t\tStdLog.String('This Text appended.'); StdLog.Ln\r\tEND AppendThisText;\r\r\tPROCEDURE "
