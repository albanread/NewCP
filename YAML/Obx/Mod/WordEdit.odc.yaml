                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT CtlWord9, CtlT, StdLog, Fonts, Services;\r\r\tVAR\r\t\tapp: CtlWord9.Application;\r\t\tconnectDoc: CtlWord9.Document;\r\r\tPROCEDURE GetApplication (): CtlWord9.Application;\r\tBEGIN\r\t\tRETURN app\r\tEND GetApplication;\r\r\t"
                    attr: 0
                  - text: "(* Connecting / Disconnecting *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: Connect
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Connects to a Word application. If Word is not running, it is started. *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tconnectDoc := CtlWord9.NewDocument();\r\t\tconnectDoc.Windows().Item(CtlT.Int(1)).PUTVisible(FALSE);\r\t\tapp := connectDoc.Application();\r\t\tStdLog.String(' Connected to Word.'); StdLog.Ln()\r\tEND Connect;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Disconnect
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Disconnects from Word. If nobody else is using the application, it is terminated. *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tconnectDoc.Close(NIL, NIL, NIL);\r\t\tapp := NIL;\r\t\tStdLog.String(' Disconnected to Word.'); StdLog.Ln()\r\tEND Disconnect;\r\r\t"
                    attr: 0
                  - text: "(* Starting / Quitting *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: Start
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Starts a new Word application. *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tapp := CtlWord9.NewApplication();\r\t\tapp.Options().PUTSmartCutPaste(FALSE);\r\t\tapp.PUTVisible(TRUE);\r\t\tStdLog.String(' Word started.'); StdLog.Ln()\r\tEND Start;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Quit
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Quits Word. *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tapp.Quit(CtlT.Bool(FALSE),NIL,NIL); app := NIL;\r\t\tStdLog.String(' Word quited.'); StdLog.Ln()\r\tEND Quit;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Restart
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Restarts Word. *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tQuit; Start\r\tEND Restart;\r\r\t"
                    attr: 0
                  - text: "(* File *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: NewDoc
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Creates a new document using CtlWord9.NewDocument() and makes it visible. *)"
                    attr: 1
                  - text: "\r\t"
                    attr: 0
                  - text: "(* The document is created in the oldest running Word. If there is no Word running, it is started. *)"
                    attr: 1
                  - text: "\r\t\tVAR doc: CtlWord9.Document;\r\tBEGIN\r\t\tdoc := CtlWord9.NewDocument();\r\t\tdoc.Windows().Item(CtlT.Int(1)).PUTVisible(TRUE);\r\t\tStdLog.String(\"New Document created. \"); StdLog.Ln\r\tEND NewDoc;\r\r\tPROCEDURE "
                    attr: 0
                  - text: CreateDoc
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Creates a new, visible document using CtlWord9.Application.Documents().Add. *)"
                    attr: 1
                  - text: "\r\t"
                    attr: 0
                  - text: "(* It is only visible, if the application is visible. *)"
                    attr: 1
                  - text: "\r\t\tVAR doc: CtlWord9.Document;\r\tBEGIN\r\t\tdoc := GetApplication().Documents().Add(NIL, NIL, NIL, CtlT.Bool(TRUE));\r\t\tStdLog.String(' Document '); StdLog.String(doc.FullName());\r\t\tStdLog.String(' created.'); StdLog.Ln\r\tEND CreateDoc;\r\r\tPROCEDURE "
                    attr: 0
                  - text: CreateInvisibleDoc
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Creates a new, invisible document. It is also invisible, if the application is visible. *)"
                    attr: 1
                  - text: "\r\t\tVAR doc: CtlWord9.Document;\r\tBEGIN\r\t\tdoc := GetApplication().Documents().Add(NIL, NIL, NIL, CtlT.Bool(FALSE));\r\t\tStdLog.String(' Document '); StdLog.String(doc.FullName());\r\t\tStdLog.String(' created invisible.'); StdLog.Ln\r\tEND CreateInvisibleDoc;\r\r\tPROCEDURE OpenDoc (filename: ARRAY OF CHAR);\r\t"
                    attr: 0
                  - text: "(* Opens the file filename. *)"
                    attr: 1
                  - text: "\r\t\tVAR doc: CtlWord9.Document;\r\tBEGIN\r\t\tdoc := GetApplication().Documents().Open(CtlT.Str(filename),NIL,NIL,NIL,NIL,NIL,NIL,NIL,NIL,NIL,NIL,NIL);\r\t\tStdLog.String(' Document '); StdLog.String(doc.FullName());\r\t\tStdLog.String(' opened.'); StdLog.Ln\r\tEND OpenDoc;\r\r\tPROCEDURE "
                    attr: 0
                  - text: OpenDocTest
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Opens a test file. *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tOpenDoc('D:\\Users\\Juerg\\test.doc')\r\tEND OpenDocTest;\r\r\tPROCEDURE "
                    attr: 0
                  - text: CloseDoc
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Closes the active document without saving. *)"
                    attr: 1
                  - text: "\r\t\tVAR doc: CtlWord9.Document; name: CtlT.Strg;\r\tBEGIN\r\t\tdoc := GetApplication().ActiveDocument();\r\t\tname := doc.FullName();\r\t\tdoc.Close(CtlT.Int(CtlWord9.wdDoNotSaveChanges),NIL,NIL);\r\t\tStdLog.String(' Document '); StdLog.String(name);\r\t\tStdLog.String(' closed.'); StdLog.Ln\r\tEND CloseDoc;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SaveAndCloseDoc
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Saves the active document and closes it. *)"
                    attr: 1
                  - text: "\r\t\tVAR doc: CtlWord9.Document; name: CtlT.Strg;\r\tBEGIN\r\t\tdoc := GetApplication().ActiveDocument();\r\t\tname := doc.FullName();\r\t\tdoc.Close(CtlT.Int(CtlWord9.wdSaveChanges),NIL,NIL);\r\t\tStdLog.String(' Document '); StdLog.String(name);\r\t\tStdLog.String(' saved and closed.'); StdLog.Ln\r\tEND SaveAndCloseDoc;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SaveDoc
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Saves the active document. *)"
                    attr: 1
                  - text: "\r\t\tVAR doc: CtlWord9.Document;\r\tBEGIN\r\t\tdoc := GetApplication().ActiveDocument();\r\t\tdoc.Save;\r\t\tStdLog.String(' Document '); StdLog.String(doc.FullName());\r\t\tStdLog.String(' saved.'); StdLog.Ln\r\tEND SaveDoc;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Print
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Prints the active document. *)"
                    attr: 1
                  - text: "\r\t\tVAR doc: CtlWord9.Document;\r\tBEGIN\r\t\tdoc := GetApplication().ActiveDocument();\r\t\tdoc.PrintOut(NIL,NIL,NIL,NIL,NIL,NIL,NIL,NIL,NIL,NIL,NIL,NIL,NIL,NIL,NIL,NIL,NIL,NIL);\r\t\tStdLog.String(' Document '); StdLog.String(doc.FullName());\r\t\tStdLog.String(' printed.'); StdLog.Ln\r\tEND Print;\r\r\t(* Application *)\r\r\tPROCEDURE "
                    attr: 0
                  - text: DispDocs
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Displays the full names of all the open documents. *)"
                    attr: 1
                  - text: "\r\t\tVAR count, i: INTEGER; docs: CtlWord9.Documents;\r\tBEGIN\r\t\tdocs := GetApplication().Documents();\r\t\tcount := docs.Count();\r\t\tStdLog.Int(count); StdLog.String(' Documents available.'); StdLog.Ln;\r\t\tFOR i := 1 TO count DO\r\t\t\tStdLog.String(docs.Item(CtlT.Int(i)).FullName()); StdLog.Ln\r\t\tEND\r\tEND DispDocs;\r\r\tPROCEDURE "
                    attr: 0
                  - text: DispFontNames
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Displays the names of the available fonts in Word. *)"
                    attr: 1
                  - text: "\r\t\tVAR fontNames : CtlWord9.FontNames; count, i: INTEGER;\r\tBEGIN\r\t\tfontNames := GetApplication().FontNames();\r\t\tcount := fontNames.Count();\r\t\tStdLog.Int(count);\r\t\tStdLog.String(' FontNames available.');\r\t\tStdLog.Ln;\r\t\tFOR i := 1 TO count DO\r\t\t\tStdLog.String(fontNames.Item(i)); StdLog.Ln\r\t\tEND\r\tEND DispFontNames;\r\r\tPROCEDURE "
                    attr: 0
                  - text: DispBBFontNames
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Displays the names of the available fonts in BlackBox. There are more than in Word. *)"
                    attr: 1
                  - text: "\r\t\tVAR t: Fonts.TypefaceInfo;\r\tBEGIN\r\t\tStdLog.String(' BB FontNames:');\r\t\tt := Fonts.dir.TypefaceList();\r\t\tWHILE t # NIL DO\r\t\t\tStdLog.String(t.typeface); StdLog.Ln;\r\t\t\tt := t.next\r\t\tEND\r\tEND DispBBFontNames;\r\r\tPROCEDURE "
                    attr: 0
                  - text: DispLanguages
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Displays the languages available in Word. *)"
                    attr: 1
                  - text: "\r\t\tVAR count: INTEGER; languages: CtlWord9.Languages; lang: CtlWord9.Language; enum: CtlT.Enumerator;\r\tBEGIN\r\t\tlanguages := GetApplication().Languages();\r\t\tcount := languages.Count();\r\t\tStdLog.Int(count); StdLog.String(' Languages available.'); StdLog.Ln;\r\t\tenum:= languages._NewEnum();\r\t\tlang := CtlWord9.ThisLanguage(enum.First());\r\t\tWHILE lang # NIL DO\r\t\t\tStdLog.String(lang.NameLocal());\r\t\t\tStdLog.Ln;\r\t\t\tlang := CtlWord9.ThisLanguage(enum.Next())\r\t\tEND\r\tEND DispLanguages;\r\r\tPROCEDURE "
                    attr: 0
                  - text: DispLanguagesAndDictionaries
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Displays the languages available in Word and whether they have a dictionary. *)"
                    attr: 1
                  - text: "\r\t"
                    attr: 0
                  - text: "(* Attention: ActiveSpellingDictionary traps if there is no dictionary available... *)"
                    attr: 1
                  - text: "\r\t\tVAR count: INTEGER; languages : CtlWord9.Languages; lang: CtlWord9.Language; enum:CtlT.Enumerator;\r\tBEGIN\r\t\tlanguages := GetApplication().Languages();\r\t\tcount := languages.Count();\r\t\tStdLog.Int(count); StdLog.String(' Languages available.'); StdLog.Ln;\r\t\tenum:= languages._NewEnum();\r\t\tlang := CtlWord9.ThisLanguage(enum.First());\r\t\tWHILE lang # NIL DO\r\t\t\tStdLog.String(lang.NameLocal());\r\t\t\tIF lang.ActiveSpellingDictionary() # NIL THEN\r\t\t\t\tStdLog.String(' (Dict)')\r\t\t\tEND;\r\t\t\tStdLog.Ln;\r\t\t\tlang := CtlWord9.ThisLanguage(enum.Next())\r\t\tEND\r\tEND DispLanguagesAndDictionaries;\r\r\tPROCEDURE "
                    attr: 0
                  - text: UseSmartCutPaste
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Sets the option SmartCutPaste. *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tGetApplication().Options().PUTSmartCutPaste(TRUE);\r\t\tStdLog.String(' SmartCutPaste turned on.'); StdLog.Ln\r\tEND UseSmartCutPaste;\r\r\t"
                    attr: 0
                  - text: "(* Visibility *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: MakeWordVisible
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Makes all documents visible, also the ones that were created invisible. *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tGetApplication().PUTVisible(TRUE);\r\t\tStdLog.String(' Word made visible.'); StdLog.Ln\r\tEND MakeWordVisible;\r\r\tPROCEDURE "
                    attr: 0
                  - text: MakeWordInvisible
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Makes all documents invisible. *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tGetApplication().PUTVisible(FALSE);\r\t\tStdLog.String(' Word made invisible.'); StdLog.Ln\r\tEND MakeWordInvisible;\r\r\tPROCEDURE "
                    attr: 0
                  - text: MakeWinVisible
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Makes the first window of the active document visible. *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tGetApplication().ActiveDocument().Windows().Item(CtlT.Int(1)).PUTVisible(TRUE);\r\t\tStdLog.String(' Window made visible.'); StdLog.Ln\r\tEND MakeWinVisible;\r\r\tPROCEDURE "
                    attr: 0
                  - text: MakeWinInvisible
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Makes the first window of the active document invisible. *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tGetApplication().ActiveDocument().Windows().Item(CtlT.Int(1)).PUTVisible(FALSE);\r\t\tStdLog.String(' Window made invisible.'); StdLog.Ln\r\tEND MakeWinInvisible;\r\r\tPROCEDURE "
                    attr: 0
                  - text: IsWinVisible
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Displays whether the first window of the active document is visible. *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tStdLog.Bool(GetApplication().ActiveDocument().Windows().Item(CtlT.Int(1)).Visible()); StdLog.Ln\r\tEND IsWinVisible;\r\r\t"
                    attr: 0
                  - text: "(* Document *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: Undo
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Undoes the last action. Actions, such a typing characters, can be merged to one action by Word. *)"
                    attr: 1
                  - text: "\r\t\tVAR doc: CtlWord9.Document;\r\tBEGIN\r\t\tdoc := GetApplication().ActiveDocument();\r\t\tIF doc.Undo(CtlT.Int(1)) THEN\r\t\t\tStdLog.String(' Undone.')\r\t\tELSE\r\t\t\tStdLog.String(' Undo not possible.')\r\t\tEND;\r\t\tStdLog.Ln\r\tEND Undo;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Redo
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Redoes the last undone action. *)"
                    attr: 1
                  - text: "\r\t\tVAR doc: CtlWord9.Document;\r\tBEGIN\r\t\tdoc := GetApplication().ActiveDocument();\r\t\tIF doc.Redo(CtlT.Int(1)) THEN\r\t\t\tStdLog.String(' Redone.')\r\t\tELSE\r\t\t\tStdLog.String(' Redo not possible.')\r\t\tEND;\r\t\tStdLog.Ln\r\tEND Redo;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Protect
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Protects the active document. *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tGetApplication().ActiveDocument().Protect(CtlWord9.wdAllowOnlyFormFields, NIL, NIL);\r\t\tStdLog.String('Document locked.'); StdLog.Ln\r\tEND Protect;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Unprotect
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Unprotects the active document. *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tGetApplication().ActiveDocument().Unprotect(NIL);\r\t\tStdLog.String('Document unlocked.'); StdLog.Ln\r\tEND Unprotect;\r\r\t"
                    attr: 0
                  - text: "(* Accessing the Content of a Document *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: DispContent
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Displays the content of the active document. *)"
                    attr: 1
                  - text: "\r\t\tVAR doc: CtlWord9.Document;\r\tBEGIN\r\t\tdoc := GetApplication().ActiveDocument();\r\t\tStdLog.String('Document content: ');\r\t\tStdLog.String(doc.Content().Text()); StdLog.Ln\r\tEND DispContent;\r\r\tPROCEDURE "
                    attr: 0
                  - text: DispParagraphs
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Displays the paragraphs of the active document. *)"
                    attr: 1
                  - text: "\r\t\tVAR count, i: INTEGER; doc: CtlWord9.Document; paras: CtlWord9.Paragraphs;\r\tBEGIN\r\t\tdoc := GetApplication().ActiveDocument();\r\t\tparas := doc.Paragraphs();\r\t\tcount := paras.Count();\r\t\tStdLog.Int(count); StdLog.String(' Paragraphs available.'); StdLog.Ln;\r\t\tFOR i := 1 TO count DO\r\t\t\tStdLog.String(paras.Item(i).Range().Text());\r\t\t\tStdLog.Ln; StdLog.Ln\r\t\tEND\r\tEND DispParagraphs;\r\r\tPROCEDURE "
                    attr: 0
                  - text: DispListParagraphs
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Displays the ListParagraphs of the active document. *)"
                    attr: 1
                  - text: "\r\t\tVAR count, i: INTEGER; doc: CtlWord9.Document; paras: CtlWord9.ListParagraphs;\r\tBEGIN\r\t\tdoc := GetApplication().ActiveDocument();\r\t\tparas := doc.ListParagraphs();\r\t\tcount := paras.Count();\r\t\tStdLog.Int(count); StdLog.String(' ListParagraphs available.'); StdLog.Ln;\r\t\tFOR i := 1 TO count DO\r\t\t\tStdLog.String(paras.Item(i).Range().Text());\r\t\t\tStdLog.Ln; StdLog.Ln\r\t\tEND\r\tEND DispListParagraphs;\r\r\tPROCEDURE "
                    attr: 0
                  - text: DispLists
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(* Displays the Lists of the active document. *)"
