                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Int := Integers, StdLog;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Pi
                    attr: 3
                  - text: "* (digits: INTEGER): Int.Integer;\t"
                    attr: 0
                  - text: "(* entier(pi * 10^digits) *)"
                    attr: 1
                  - text: "\r\t\tVAR p1, p2, inc, sum: Int.Integer; guard, div: INTEGER;\r\tBEGIN\r"
                    attr: 0
                  - text: "\t\t(* pi = 16 * atan(1/5) - 4 * atan(1/239) *)\r\t\t(* atan(x) = x - x^3/3 + x^5/5 - x^7/7 + ... *)\r\t\t"
                    attr: 1
                  - text: "guard := 8;"
                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\t\tp1 := Int.Quotient(Int.Product(Int.Power(Int.Long(10), digits + guard), Int.Long(16)), Int.Long(5));\r\t\tp2 := Int.Quotient(Int.Product(Int.Power(Int.Long(10), digits + guard), Int.Long(-4)), Int.Long(239));\r\t\tsum := Int.Sum(p1, p2);\r\t\tdiv := 1;\r\t\tREPEAT\r\t\t\tp1 := Int.Quotient(p1, Int.Long(-5 * 5));\r\t\t\tp2 := Int.Quotient(p2, Int.Long(-239 * 239));\r\t\t\tINC(div, 2);\r\t\t\tinc := Int.Quotient(Int.Sum(p1, p2), Int.Long(div));\r\t\t\tsum := Int.Sum(sum, inc)\r\t\tUNTIL Int.Sign(inc) = 0;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " Int.Quotient(sum, Int.Power(Int.Long(10), guard))\r\tEND Pi;\r\r\tPROCEDURE "
                    attr: 0
                  - text: WritePi
                    attr: 3
                  - text: "* (digits: INTEGER);\r\t\tVAR i: Int.Integer; s: ARRAY 10000 OF CHAR;\r\tBEGIN\r\t\ti := Pi(digits);\r\t\tInt.ConvertToString(i, s);\r\t\tStdLog.String(s); StdLog.Ln\r\tEND WritePi;\r\rEND ObxPi.\r"
                    attr: 0
