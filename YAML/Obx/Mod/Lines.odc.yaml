                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Stores, Ports, Models, Views, Controllers, Properties;\r\r\tCONST minVersion = 0; maxVersion = 0;\r\r\tTYPE\r\t\tLine = POINTER TO RECORD\r\t\t\tnext: Line;\r\t\t\tx0, y0, x1, y1: INTEGER\r\t\tEND;\r\r\t\tModel = POINTER TO RECORD (Models.Model)\r\t\t\tlines: Line\r\t\tEND;\r\r\t\tView = POINTER TO RECORD (Views.View)\r\t\t\tcolor: Ports.Color;\r\t\t\tmodel: Model\r\t\tEND;\r\r\t\tUpdateMsg = RECORD (Models.UpdateMsg)\r\t\t\tl, t, r, b: INTEGER\r\t\tEND;\r\r\t\tLineOp = POINTER TO RECORD (Stores.Operation)\r\t\t\tmodel: Model;\r\t\t\tline: Line\r\t\tEND;\r\r\t\tColorOp = POINTER TO RECORD (Stores.Operation)\r\t\t\tview: View;\r\t\t\tcolor: Ports.Color\r\t\tEND;\r\r\r\tPROCEDURE GetBox (x0, y0, x1, y1: INTEGER; VAR l, t, r, b: INTEGER);\r\tBEGIN\r\t\tIF x0 > x1 THEN l := x1; r := x0 ELSE l := x0; r := x1 END;\r\t\tIF y0 > y1 THEN t := y1; b := y0 ELSE t := y0; b := y1 END;\r\t\tINC(r, Ports.point); INC(b, Ports.point)\r\tEND GetBox;\r\r\r\tPROCEDURE (op: LineOp) Do;\r\t\tVAR l: Line; msg: UpdateMsg;\r\tBEGIN\r\t\tl := op.line;\r\t\tIF l # op.model.lines THEN\t"
                    attr: 0
                  - text: "(* insert op.line *)"
                    attr: 1
                  - text: "\r\t\t\tASSERT(l # NIL, 100); ASSERT(l.next = op.model.lines, 101);\r\t\t\top.model.lines := l\r\t\tELSE\t"
                    attr: 0
                  - text: "(* delete op.line *)"
                    attr: 1
                  - text: "\r\t\t\tASSERT(l = op.model.lines, 102);\r\t\t\top.model.lines := l.next\r\t\tEND;\r\t\tGetBox(l.x0, l.y0, l.x1, l.y1, msg.l, msg.t, msg.r, msg.b); Models.Broadcast(op.model, msg)\r\tEND Do;\r\r\tPROCEDURE (m: Model) Internalize (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER; x0: INTEGER; p: Line;\r\tBEGIN\r\t\trd.ReadVersion(minVersion, maxVersion, version);\r\t\tIF ~rd.cancelled THEN\r\t\t\trd.ReadInt(x0); m.lines := NIL;\r\t\t\tWHILE x0 # MIN(INTEGER) DO\r\t\t\t\tNEW(p); p.next := m.lines; m.lines := p;\r\t\t\t\tp.x0 := x0; rd.ReadInt(p.y0); rd.ReadInt(p.x1); rd.ReadInt(p.y1);\r\t\t\t\trd.ReadInt(x0)\r\t\t\tEND\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (m: Model) Externalize (VAR wr: Stores.Writer);\r\t\tVAR p: Line;\r\tBEGIN\r\t\twr.WriteVersion(maxVersion);\r\t\tp := m.lines;\r\t\tWHILE p # NIL DO\r\t\t\twr.WriteInt(p.x0); wr.WriteInt(p.y0); wr.WriteInt(p.x1); wr.WriteInt(p.y1);\r\t\t\tp := p.next\r\t\tEND;\r\t\twr.WriteInt(MIN(INTEGER))\r\tEND Externalize;\r\r\tPROCEDURE (m: Model) CopyFrom (source: Stores.Store);\r\tBEGIN\r\t\tm.lines := source(Model).lines\t"
                    attr: 0
                  - text: "(* lines are immutable and thus can be shared *)"
                    attr: 1
                  - text: "\r\tEND CopyFrom;\r\r\tPROCEDURE (m: Model) Insert (x0, y0, x1, y1: INTEGER), NEW;\r\t\tVAR op: LineOp; p: Line;\r\tBEGIN\r\t\tNEW(op); op.model := m;\r\t\tNEW(p); p.next := m.lines; op.line := p;\r\t\tp.x0 := x0; p.y0 := y0; p.x1 := x1; p.y1 := y1;\r\t\tModels.Do(m, \"Insert Line\", op)\r\tEND Insert;\r\r\r\tPROCEDURE (op: ColorOp) Do;\r\t\tVAR color: Ports.Color;\r\tBEGIN\r\t\tcolor := op.view.color;\t"
                    attr: 0
                  - text: "(* save old state *)"
                    attr: 1
                  - text: "\r\t\top.view.color := op.color;\t"
                    attr: 0
                  - text: "(* set new state *)"
                    attr: 1
                  - text: "\r\t\tViews.Update(op.view, Views.keepFrames);\t"
                    attr: 0
                  - text: "(* restore everything *)"
                    attr: 1
                  - text: "\r\t\top.color := color\t"
                    attr: 0
                  - text: "(* old state becomes new state for undo *)"
                    attr: 1
                  - text: "\r\tEND Do;\r\r\r\tPROCEDURE (v: View) Internalize (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER; st: Stores.Store;\r\tBEGIN\r\t\trd.ReadVersion(minVersion, maxVersion, version);\r\t\tIF ~rd.cancelled THEN\r\t\t\trd.ReadInt(v.color);\r\t\t\trd.ReadStore(st);\r\t\t\tv.model := st(Model)\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (v: View) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteVersion(maxVersion);\r\t\twr.WriteInt(v.color);\r\t\twr.WriteStore(v.model)\r\tEND Externalize;\r\r\tPROCEDURE (v: View) CopyFromModelView (source: Views.View; model: Models.Model);\r\tBEGIN\r\t\tASSERT(model IS Model, 20);\r\t\tWITH source: View DO\r\t\t\tv.model := model(Model);\r\t\t\tv.color := source.color\r\t\tEND\r\tEND CopyFromModelView;\r\r\tPROCEDURE (v: View) ThisModel (): Models.Model;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " v.model\r\tEND ThisModel;\r\r\tPROCEDURE (v: View) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR p: Line;\r\tBEGIN\r\t\tp := v.model.lines;\r\t\tWHILE p # NIL DO\r\t\t\tf.DrawLine(p.x0, p.y0, p.x1, p.y1, f.dot, v.color);\r\t\t\tp := p.next\r\t\tEND\r\tEND Restore;\r\r\tPROCEDURE (v: View) HandleModelMsg (VAR msg: Models.Message);\r\tBEGIN\r\t\tWITH msg: UpdateMsg DO\r\t\t\tViews.UpdateIn(v, msg.l, msg.t, msg.r, msg.b, Views.keepFrames)\r\t\tELSE\r\t\tEND\r\tEND HandleModelMsg;\r\r\tPROCEDURE (v: View) SetColor (color: Ports.Color), NEW;\r\t\tVAR op: ColorOp;\r\tBEGIN\r\t\tNEW(op); op.view := v; op.color := color; Views.Do(v, \"Set Color\", op)\r\tEND SetColor;\r\r\tPROCEDURE (v: View) HandleCtrlMsg (f: Views.Frame; VAR msg: Controllers.Message;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\t\tVAR x0, y0, x1, y1, x, y, res, l, t, r, b: INTEGER; modifiers: SET; isDown: BOOLEAN;\r\tBEGIN\r\t\tWITH msg: Controllers.TrackMsg DO\r\t\t\tx0 := msg.x; y0 := msg.y; x1 := x0; y1 := y0;\r\t\t\tf.SaveRect(f.l, f.t, f.r, f.b, res);\t"
                    attr: 0
                  - text: "(* operation was successful if res = 0 *)"
                    attr: 1
                  - text: "\r\t\t\tIF res = 0 THEN f.DrawLine(x0, y0, x1, y1, Ports.point, v.color) END;\r\t\t\tREPEAT\r\t\t\t\tf.Input(x, y, modifiers, isDown);\r\t\t\t\tIF (x # x1) OR (y # y1) THEN\r\t\t\t\t\tGetBox(x0, y0, x1, y1, l, t, r, b); f.RestoreRect(l, t, r, b, Ports.keepBuffer);\r\t\t\t\t\tx1 := x; y1 := y;\r\t\t\t\t\tIF res = 0 THEN f.DrawLine(x0, y0, x1, y1, Ports.point, v.color) END\r\t\t\t\tEND\r\t\t\tUNTIL ~isDown;\r\t\t\tGetBox(x0, y0, x1, y1, l, t, r, b); f.RestoreRect(l, t, r, b, Ports.disposeBuffer);\r\t\t\tv.model.Insert(x0, y0, x1, y1)\r\t\t| msg: Controllers.EditMsg DO\r\t\t\tIF msg.op = Controllers.pasteChar THEN\r\t\t\t\tCASE msg.char OF\r\t\t\t\t| \"B\": v.SetColor(Ports.black)\r\t\t\t\t| \"r\": v.SetColor(Ports.red)\r\t\t\t\t| \"g\": v.SetColor(Ports.green)\r\t\t\t\t| \"b\": v.SetColor(Ports.blue)\r\t\t\t\tELSE\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE (v: View) HandlePropMsg (VAR msg: Properties.Message);\r\tBEGIN\r\t\tWITH msg: Properties.FocusPref DO\r\t\t\tmsg.setFocus := TRUE\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\r\r\tPROCEDURE "
                    attr: 0
                  - text: Deposit
                    attr: 3
                  - text: "*;\r\t\tVAR m: Model; v: View;\r\tBEGIN\r\t\tNEW(m);\r\t\tNEW(v); v.model := m; Stores.Join(v, m);\r\t\tViews.Deposit(v)\r\tEND Deposit;\r\rEND ObxLines."
                    attr: 0
