                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Services, Views, TextModels, TextMappers, TextViews, Math, Dialog;\r\r\tTYPE\r\t\tPrimeAction = POINTER TO RECORD (Services.Action)\r\t\t\tto, stepSize, current, divisor: INTEGER;\r\t\t\tf: TextMappers.Formatter\r\t\tEND;\r\r\tVAR\r\t\t"
                    attr: 0
                  - text: primeDlg
                    attr: 3
                  - text: "*: RECORD\r\t\t\tto*, stepSize*: INTEGER;\r\t\tEND;\r\r\tPROCEDURE Step (stepSize, to: INTEGER; VAR cur, divisor: INTEGER; f: TextMappers.Formatter);\r\t\tVAR end, sqrtCur: INTEGER;\r\tBEGIN\r\t\tWHILE (stepSize > 0) & (cur <= to) DO\r\t\t\tend := divisor + stepSize;\r\t\t\tsqrtCur := SHORT(ENTIER(Math.Sqrt(cur)));\r\t\t\tWHILE (divisor <= sqrtCur) & (divisor < end) & (cur MOD divisor # 0) DO divisor := divisor + 2 END;\r\t\t\tstepSize := end - divisor;\r\t\t\tIF divisor > sqrtCur THEN\t"
                    attr: 0
                  - text: "(* cur is a prime *)"
                    attr: 1
                  - text: "\r\t\t\t\tf.WriteInt(cur); f.WriteLn;\r\t\t\t\tdivisor := 3; cur := cur + 2\r\t\t\tELSIF divisor < end THEN\t"
                    attr: 0
                  - text: "(* cur is not a prime, test next one *)"
                    attr: 1
                  - text: "\r\t\t\t\tdivisor := 3; cur := cur + 2\r\t\t\tELSE\t"
                    attr: 0
                  - text: "(* time exhausted, continue test next time *)"
                    attr: 1
                  - text: "\r\t\t\tEND\r\t\tEND\r\tEND Step;\r\r\tPROCEDURE (a: PrimeAction) Do;\r\tBEGIN\r\t\tStep(a.stepSize, a.to, a.current, a.divisor, a.f);\r\t\tIF a.current <= a.to THEN\r\t\t\tServices.DoLater(a, Services.now)\r\t\tELSE\r\t\t\tDialog.ShowMsg(\"prime number calculation finished\")\r\t\tEND ;\r\tEND Do;\r\r\tPROCEDURE "
                    attr: 0
                  - text: StartPrimes
                    attr: 3
                  - text: "*;\r\t\tVAR a: PrimeAction;\r\tBEGIN\r\t\tNEW(a);\r\t\ta.to := primeDlg.to; a.stepSize := primeDlg.stepSize; a.current := 3; a.divisor := 3;\r\t\tIF a.stepSize < 1 THEN a.stepSize := 1 END ;\r\t\ta.f.ConnectTo(TextModels.dir.New());\r\t\ta.f.WriteInt(2); a.f.WriteLn;\r\t\tViews.OpenAux(TextViews.dir.New(a.f.rider.Base()), \"\");\r\t\tServices.DoLater(a, Services.now);\r\t\tDialog.ShowMsg(\"prime number calculation started\")\r\tEND StartPrimes;\r\rBEGIN\r\tprimeDlg.to := 1000; primeDlg.stepSize := 10\rEND ObxActions.\r"
                    attr: 0
