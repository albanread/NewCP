                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Meta, Dialog, Ports, Stores, Views, Controllers, Properties, Controls;\r\r\tCONST\r\t\tminVersion = 0; maxVersion = 0;\r\t\tarrowUp = 1EX; arrowDown = 1FX;\r\r\tTYPE Control = POINTER TO RECORD (Controls.Control) END;\r\r\tVAR "
                    attr: 0
                  - text: x
                    attr: 3
                  - text: "*: INTEGER;\r\r\tPROCEDURE Paint (c: Control; f: Views.Frame);\r\t\tVAR w, h, y, val: INTEGER;\r\tBEGIN\r\t\tc.context.GetSize(w, h);\r\t\tIF ~c.disabled & c.item.Valid() THEN\r\t\t\tval := c.item.IntVal();\r\t\t\tIF val < 0 THEN val := 0 ELSIF val > 100 THEN val := 100 END;\r\t\t\ty := f.dot + (h - 2 * f.dot) * (100 - val) DIV 100;\r\t\t\tIF val > 0 THEN f.DrawRect(f.dot, y, w - f.dot, h - f.dot, Ports.fill, Ports.blue) END;\r\t\t\tIF val < 100 THEN f.DrawRect(f.dot, f.dot, w - f.dot, y, Ports.fill, Ports.background) END\r\t\tELSE\r\t\t\tf.DrawRect(f.dot, f.dot, w - f.dot, h - f.dot, Ports.fill, Ports.grey25)\r\t\tEND;\r\t\tf.DrawRect(0, 0, w, h, f.dot, Ports.defaultColor)\r\tEND Paint;\r\r\tPROCEDURE ChangeValue (c: Control; f: Views.Frame; new: INTEGER);\r\t\tVAR old: INTEGER;\r\tBEGIN\r\t\told := c.item.IntVal();\r\t\tIF new < 0 THEN new := 0 ELSIF new > 100 THEN new := 100 END;\r\t\tIF new # old THEN\r\t\t\tc.item.PutIntVal(new);\r\t\t\tPaint(c, f);\r\t\t\tControls.Notify(c, f, Dialog.changed, old, new)\r\t\tEND\r\tEND ChangeValue;\r\r\tPROCEDURE Track (c: Control; f: Views.Frame; VAR msg: Controllers.TrackMsg);\r\t\tVAR x, y, y0, w, h: INTEGER; m: SET; isDown: BOOLEAN;\r\tBEGIN\r\t\tc.context.GetSize(w, h); DEC(h, 2 * f.dot); y0 := -1;\r\t\tREPEAT\r\t\t\tf.Input(x, y, m, isDown);\r\t\t\tIF y # y0 THEN\r\t\t\t\tChangeValue(c, f, 100 - y * 100 DIV h);\r\t\t\t\ty0 := y\r\t\t\tEND\r\t\tUNTIL ~isDown;\r\tEND Track;\r\r\tPROCEDURE Edit (c: Control; f: Views.Frame; VAR msg: Controllers.EditMsg);\r\t\tVAR val: INTEGER;\r\tBEGIN\r\t\tIF msg.op = Controllers.pasteChar THEN\r\t\t\tval := c.item.IntVal();\r\t\t\tIF msg.char = arrowUp THEN ChangeValue(c, f, val + 1)\r\t\t\tELSIF msg.char = arrowDown THEN ChangeValue(c, f, val - 1)\r\t\t\tELSE Dialog.Beep\r\t\t\tEND\r\t\tEND\r\tEND Edit;\r\r\r\t"
                    attr: 0
                  - text: "(* Control *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (c: Control) Internalize2 (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER;\r\tBEGIN\r\t\trd.ReadVersion(minVersion, maxVersion, version)\r\tEND Internalize2;\r\r\tPROCEDURE (c: Control) Externalize2 (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteVersion(maxVersion)\r\tEND Externalize2;\r\r\tPROCEDURE (c: Control) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tPaint(c, f)\r\tEND Restore;\r\r\tPROCEDURE (c: Control) HandleCtrlMsg2 (f: Views.Frame; VAR msg: Controllers.Message;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\tBEGIN\r\t\tIF ~c.disabled & ~c.readOnly & c.item.Valid() THEN\r\t\t\tWITH msg: Controllers.PollCursorMsg DO\r\t\t\t\tmsg.cursor := Ports.graphicsCursor\r\t\t\t| msg: Controllers.TrackMsg DO\r\t\t\t\tTrack(c, f, msg)\r\t\t\t| msg: Controllers.EditMsg DO\r\t\t\t\tEdit(c, f, msg)\r\t\t\tELSE\r\t\t\tEND\r\t\tEND\r\tEND HandleCtrlMsg2;\r\r\tPROCEDURE (c: Control) HandlePropMsg2 (VAR msg: Properties.Message);\r\tBEGIN\r\t\tWITH msg: Properties.FocusPref DO\r\t\t\tIF ~c.disabled & ~c.readOnly THEN msg.setFocus := TRUE END\r\t\t| msg: Properties.SizePref DO\r\t\t\tmsg.w := 10 * Ports.mm; msg.h := 50 * Ports.mm\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg2;\r\r\tPROCEDURE (c: Control) CheckLink (VAR ok: BOOLEAN);\r\tBEGIN\r\t\tIF c.item.typ # Meta.intTyp THEN ok := FALSE END\r\tEND CheckLink;\r\r\tPROCEDURE (c: Control) Update (f: Views.Frame; op, from, to: INTEGER);\r\tBEGIN\r\t\tPaint(c, f)\r\tEND Update;\r\r\r\tPROCEDURE "
                    attr: 0
