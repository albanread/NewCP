                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Dialog;\r\r\tVAR\r\t\t"
                    attr: 0
                  - text: dialog
                    attr: 3
                  - text: "*: RECORD\r\t\t\tlist*: Dialog.List;\r\t\t\tcombo*: Dialog.Combo;\r\t\t\tsum-: INTEGER;\r\t\t\tdisable*: BOOLEAN;\r\t\t\telems*: INTEGER\r\t\tEND;\r\t\tsel*: Dialog.Selection; (* hadled separately to avoid race condition in notifier *)\r\r\tPROCEDURE SetList (VAR l: Dialog.List; n: INTEGER);\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\tl.SetLen(n);\r\t\ti := 0;\r\t\tWHILE i # n DO\r\t\t\tCASE i OF\r\t\t\t| 0: l.SetItem(i, \"zero\")\r\t\t\t| 1: l.SetItem(i, \"one\")\r\t\t\t| 2: l.SetItem(i, \"two\")\r\t\t\t| 3: l.SetItem(i, \"three\")\r\t\t\t| 4: l.SetItem(i, \"four\")\r\t\t\t| 5: l.SetItem(i, \"five\")\r\t\t\t| 6: l.SetItem(i, \"six\")\r\t\t\t| 7: l.SetItem(i, \"seven\")\r\t\t\t| 8: l.SetItem(i, \"eight\")\r\t\t\t| 9: l.SetItem(i, \"nine\")\r\t\t\t| 10: l.SetItem(i, \"ten\")\r\t\t\t| 11: l.SetItem(i, \"eleven\")\r\t\t\tEND;\r\t\t\tINC(i)\r\t\tEND\r\tEND SetList;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SelNotifier
                    attr: 3
                  - text: "* (op, from, to: INTEGER);\r\tBEGIN\r\t\tIF op = Dialog.set THEN\t"
                    attr: 0
                  - text: "(* recalculate sum of selected numbers *)"
                    attr: 1
                  - text: "\r\t\t\tdialog.sum := (to - from + 1) * (to + from) DIV 2\r\t\tELSIF op = Dialog.excluded THEN\t"
                    attr: 0
                  - text: "(* correct sum after deselection of some numbers *)"
                    attr: 1
                  - text: "\r\t\t\tWHILE from <= to DO DEC(dialog.sum, from); INC(from) END\r\t\tELSIF op = Dialog.included THEN\t"
                    attr: 0
                  - text: "(* correct sum after selection of some numbers *)"
                    attr: 1
                  - text: "\r\t\t\tWHILE from <= to DO INC(dialog.sum, from); INC(from) END\r\t\tEND;\r\t\tDialog.Update(dialog)\t"
                    attr: 0
                  - text: "(* show new dialog.sum *)"
                    attr: 1
                  - text: "\r\tEND SelNotifier;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ElemsNotifier
                    attr: 3
                  - text: "* (op, from, to: INTEGER);\r\tBEGIN\r\t\tIF op = Dialog.changed THEN\r\t\t\tIF dialog.elems < 0 THEN\r\t\t\t\tdialog.elems := 0; Dialog.Update(dialog)\r\t\t\tELSIF dialog.elems > 12 THEN\r\t\t\t\tdialog.elems := 12; Dialog.Update(dialog)\r\t\t\tEND;\r\t\t\tSetList(dialog.list, dialog.elems);\t"
                    attr: 0
                  - text: "(* rebuild list *)"
                    attr: 1
                  - text: "\r\t\t\tDialog.UpdateList(dialog.list)\t"
                    attr: 0
                  - text: "(* update list  *)"
                    attr: 1
                  - text: "\r\t\tEND\r\tEND ElemsNotifier;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ListGuard
                    attr: 3
                  - text: "* (VAR par: Dialog.Par);\r\tBEGIN\r\t\tpar.disabled := dialog.disable\r\tEND ListGuard;\r\rBEGIN\r\tdialog.elems := 2; SetList(dialog.list, dialog.elems);\r\tsel.SetLen(12);\r\tsel.SetItem(0, \"zero\"); sel.SetItem(1, \"one\"); sel.SetItem(2, \"two\");\r\tsel.SetItem(3, \"three\"); sel.SetItem(4, \"four\"); sel.SetItem(5, \"five\");\r\tsel.SetItem(6, \"six\"); sel.SetItem(7, \"seven\"); sel.SetItem(8, \"eight\");\r\tsel.SetItem(9, \"nine\"); sel.SetItem(10, \"ten\"); sel.SetItem(11, \"eleven\");\r\tdialog.combo.SetLen(12);\r\tdialog.combo.SetItem(0, \"zero\"); dialog.combo.SetItem(1, \"one\"); dialog.combo.SetItem(2, \"two\");\r\tdialog.combo.SetItem(3, \"three\"); dialog.combo.SetItem(4, \"four\"); dialog.combo.SetItem(5, \"five\");\r\tdialog.combo.SetItem(6, \"six\"); dialog.combo.SetItem(7, \"seven\"); dialog.combo.SetItem(8, \"eight\");\r\tdialog.combo.SetItem(9, \"nine\"); dialog.combo.SetItem(10, \"ten\"); dialog.combo.SetItem(11, \"eleven\")\rEND ObxDialog.\r"
                    attr: 0
