                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Views, TextModels, TextMappers, TextViews, StdLinks, StdLog, ObxPhoneDB;\r\r\tCONST cmdStart = \"ObxPDBRep4.Log('\"; cmdEnd = \"')\";\r\r\tPROCEDURE "
                    attr: 0
                  - text: GenReport
                    attr: 3
                  - text: "*;\r\t\tVAR t: TextModels.Model; f: TextMappers.Formatter; v: TextViews.View;\r\t\t\ti: INTEGER; name, number: ObxPhoneDB.String; link: StdLinks.Link;\r\t\t\tcmd: ARRAY 128 OF CHAR;\r\tBEGIN\r\t\tt := TextModels.dir.New();\t"
                    attr: 0
                  - text: "(* create empty text carrier *)"
                    attr: 1
                  - text: "\r\t\tf.ConnectTo(t);\t\t\t\t\t"
                    attr: 0
                  - text: "(* connect a formatter to the text *)"
                    attr: 1
                  - text: "\r\t\ti := 0;\r\t\tObxPhoneDB.LookupByIndex(i, name, number);\r\t\tWHILE name # \"\" DO\r\t\t\tcmd := cmdStart + name + \"    \" + number + cmdEnd;\r\t\t\tlink := StdLinks.dir.NewLink(cmd);\r\t\t\tf.WriteView(link);\r\t\t\tf.WriteString(name);\t\t"
                    attr: 0
                  - text: "(* the string shown between the pair of link views *)"
                    attr: 1
                  - text: "\r\t\t\tlink := StdLinks.dir.NewLink(\"\");\r\t\t\tf.WriteView(link);\r\t\t\tf.WriteLn;\t\t\t\t\t\t"
                    attr: 0
                  - text: "(* carriage return *)"
                    attr: 1
                  - text: "\r\t\t\tINC(i);\r\t\t\tObxPhoneDB.LookupByIndex(i, name, number)\r\t\tEND;\r\t\tv := TextViews.dir.New(t);\t"
                    attr: 0
                  - text: "(* create a text view for the text generated above *)"
                    attr: 1
                  - text: "\r\t\tViews.OpenView(v)\t\t\t"
                    attr: 0
                  - text: "(* open the text view in its own window *)"
                    attr: 1
                  - text: "\r\tEND GenReport;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Log
                    attr: 3
                  - text: "* (param: ARRAY OF CHAR);\r\tBEGIN\r\t\tStdLog.String(param); StdLog.Ln\r\tEND Log;\r\rEND ObxPDBRep4.\r"
