                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT TextMappers, TextControllers, StdLog;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Do
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** use TextCmds.SelectionGuard as guard for this command **)"
                    attr: 1
                  - text: "\r\t\tVAR c: TextControllers.Controller; from, to, ints, reals, strings: INTEGER;\r\t\t\ts: TextMappers.Scanner;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tc.GetSelection(from, to);\t"
                    attr: 0
                  - text: "(* get selection range; from < to *)"
                    attr: 1
                  - text: "\r\t\t\ts.ConnectTo(c.text);\t"
                    attr: 0
                  - text: "(* connect scanner to this text model *)"
                    attr: 1
                  - text: "\r\t\t\ts.SetPos(from);\t"
                    attr: 0
                  - text: "(* set the reader to beginning of selection *)"
                    attr: 1
                  - text: "\r\t\t\ts.Scan;\t\t\t\t"
                    attr: 0
                  - text: "(* read the first symbol of the text selection *)"
                    attr: 1
                  - text: "\r\t\t\tints := 0; reals := 0; strings := 0;\t"
                    attr: 0
                  - text: "(* counter variables *)"
                    attr: 1
                  - text: "\r\t\t\tWHILE s.start < to DO\t"
                    attr: 0
                  - text: "(* read all symbols starting in the text selection *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF s.type = TextMappers.int THEN\t"
                    attr: 0
                  - text: "(* symbol is an integer number *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tINC(ints)\r\t\t\t\tELSIF s.type = TextMappers.real THEN\t"
                    attr: 0
                  - text: "(* symbol is a real number *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tINC(reals)\r\t\t\t\tELSIF s.type = TextMappers.string THEN\t"
                    attr: 0
                  - text: "(* symbol is a string/identifier *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tINC(strings)\r\t\t\t\tEND;\r\t\t\t\ts.Scan\t\t"
                    attr: 0
                  - text: "(* read next symbol of the text selection *)"
                    attr: 1
                  - text: "\r\t\t\tEND;\r\t\t\tStdLog.String(\"Integers: \"); StdLog.Int(ints); StdLog.Ln;\r\t\t\tStdLog.String(\"Reals: \"); StdLog.Int(reals); StdLog.Ln;\r\t\t\tStdLog.String(\"Strings: \"); StdLog.Int(strings); StdLog.Ln;\r\t\t\tStdLog.Ln\r\t\tEND\r\tEND Do;\r\rEND ObxCount1.\r"
