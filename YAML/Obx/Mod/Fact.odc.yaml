                  - text: "\r\tIMPORT\r\t\tStores, Models, TextModels, TextControllers, Integers;\r\r\tPROCEDURE Read(r: TextModels.Reader; VAR x: Integers.Integer);\r\t\tVAR i, len, beg: INTEGER; ch: CHAR; buf: POINTER TO ARRAY OF CHAR;\r\tBEGIN\r\t\tr.ReadChar(ch);\r\t\tWHILE ~r.eot & (ch <= \" \") DO r.ReadChar(ch) END;\r\t\tASSERT(~r.eot & (((ch >= \"0\") & (ch <= \"9\")) OR (ch = \"-\")));\r\t\tbeg := r.Pos() - 1; len := 0;\r\t\tREPEAT INC(len); r.ReadChar(ch) UNTIL r.eot OR (ch < \"0\") OR (ch > \"9\");\r\t\tNEW(buf, len + 1);\r\t\ti := 0; r.SetPos(beg);\r\t\tREPEAT r.ReadChar(buf[i]); INC(i) UNTIL i = len;\r\t\tbuf[i] := 0X;\r\t\tIntegers.ConvertFromString(buf^, x)\r\tEND Read;\r\r\tPROCEDURE Write(w: TextModels.Writer; x: Integers.Integer);\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\tIF Integers.Sign(x) < 0 THEN w.WriteChar(\"-\") END;\r\t\ti := Integers.Digits10Of(x);\r\t\tIF i # 0 THEN\r\t\t\tREPEAT DEC(i); w.WriteChar(Integers.ThisDigit10(x, i)) UNTIL i = 0\r\t\tELSE w.WriteChar(\"0\")\r\t\tEND\r\tEND Write;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Compute
                    attr: 3
                  - text: "*;\r\t\tVAR beg, end, i, n: INTEGER; ch: CHAR;\r\t\t\ts: Stores.Operation;\r\t\t\tr: TextModels.Reader; w: TextModels.Writer; attr: TextModels.Attributes;\r\t\t\tc: TextControllers.Controller;\r\t\t\tx: Integers.Integer;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tc.GetSelection(beg, end);\r\t\t\tr := c.text.NewReader(NIL); r.SetPos(beg); r.ReadChar(ch);\r\t\t\tWHILE ~r.eot & (beg < end) & (ch <= \" \") DO r.ReadChar(ch); INC(beg) END;\r\t\t\tIF ~r.eot & (beg < end) THEN\r\t\t\t\tr.ReadPrev; Read(r, x);\r\t\t\t\tend := r.Pos(); r.ReadPrev; attr :=r.attr;\r\t\t\t\tIF (Integers.Sign(x) > 0) & (Integers.Compare(x, Integers.Long(MAX(LONGINT))) <= 0) THEN\r\t\t\t\t\tn := SHORT(Integers.Short(x)); i := 2; x := Integers.Long(1);\r\t\t\t\t\tWHILE i <= n DO x := Integers.Product(x, Integers.Long(i)); INC(i) END;\r\t\t\t\t\tModels.BeginScript(c.text, \"computation\", s);\r\t\t\t\t\tc.text.Delete(beg, end);\r\t\t\t\t\tw := c.text.NewWriter(NIL); w.SetPos(beg); w.SetAttr(attr);\r\t\t\t\t\tWrite(w, x);\r\t\t\t\t\tModels.EndScript(c.text, s)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND Compute;\r\rEND ObxFact.\r\rMenu entry:\r\r\t\"Compute Factorial\"\t\"\"\t\"ObxFact.Compute\"\t\"TextCmds.SelectionGuard\"\r"
