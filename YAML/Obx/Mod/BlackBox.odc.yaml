                  - text: "*;\r\t\tVAR v : Views.View; msg: UpdateMsg; i, j: INTEGER;\r\tBEGIN\r\t\tv := Controllers.FocusView();\r\t\tIF v # NIL THEN\r\t\t\tWITH v: View DO\r\t\t\t\tv.model.p := 0;\r\t\t\t\tFOR i := 0 TO v.model.m + 1 DO\r\t\t\t\t\tFOR j := 0 TO v.model.m + 1 DO\r\t\t\t\t\t\tIF Marked(v.model, i, j) THEN INC(v.model.p); v.model.board[i,j] := minded\r\t\t\t\t\t\tELSE v.model.board[i,j] := 0\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tv.model.n := 0; v.model.score := 0; v.model.showsol := FALSE;\r\t\t\t\tv.i := 0; v.j := 0;\r\t\t\t\tModels.Broadcast(v.model, msg)\r\t\t\tEND\r\t\tEND\t\t\r\tEND Set;\r\rBEGIN\r\tseed := SHORT(Services.Ticks()); para.boardSize := 8; para.nrOfAtoms := 4\rEND ObxBlackBox.\r"
