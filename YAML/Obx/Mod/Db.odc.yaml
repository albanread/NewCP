                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Views, TextModels, TextMappers, TextViews, TextControllers;\r\r\tCONST\r\t\tint = TextMappers.int; string = TextMappers.string; real = TextMappers.real; invalid = TextMappers.invalid;\r\r\tTYPE\r\t\tNode = POINTER TO RECORD\r\t\t\tnext: Node;\r\t\t\tid: INTEGER;\r\t\t\tname: TextMappers.String;\r\t\t\tvalue: REAL\r\t\tEND;\r\r\tVAR list: Node;\r\r\tPROCEDURE Enter (id: INTEGER; name: TextMappers.String; value: REAL);\r\t\tVAR n, h, p: Node;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* insert a new tuple into the list at its correct position *)"
                    attr: 1
                  - text: "\r\t\tNEW(n); n.id := id; n.name := name; n.value := value;\r\t\th := list; p := NIL; WHILE (h # NIL) & (h.id <= id) DO p := h; h := h.next END;\r\t\tIF p # NIL THEN\t"
                    attr: 0
                  - text: "(* insert between p and h *)"
                    attr: 1
                  - text: "\r\t\t\tp.next := n\r\t\tELSE\t"
                    attr: 0
                  - text: "(* insert at beginning *)"
                    attr: 1
                  - text: "\r\t\t\tlist := n\r\t\tEND;\r\t\tn.next := h\r\tEND Enter;\r\r\tPROCEDURE "
                    attr: 0
                  - text: EnterData
                    attr: 3
                  - text: "*;\r\t\tVAR c: TextControllers.Controller; beg, end: INTEGER;\r\t\t\ts: TextMappers.Scanner; id: INTEGER;\r\t\t\tname: TextMappers.String; value: REAL;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* read a text selection and split it into an integer, string, and real field *)"
                    attr: 1
                  - text: "\r\t\tc := TextControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tc.GetSelection(beg, end);\r\t\t\ts.ConnectTo(c.text); s.SetPos(beg);\r\t\t\ts.Scan;\r\t\t\tWHILE (s.type = TextMappers.int) & (s.Pos() <= end) DO\r\t\t\t\tIF s.type = int THEN id := s.int; s.Scan ELSE s.type := TextMappers.invalid END;\r\t\t\t\tIF s.type = string THEN name := s.string; s.Scan ELSE s.type := invalid END;\r\t\t\t\tIF s.type = real THEN value := SHORT(s.real); s.Scan ELSE s.type := invalid END;\r\t\t\t\tEnter(id, name, value)\t"
                    attr: 0
                  - text: "(* enter the new tuple into a global list *)"
                    attr: 1
                  - text: "\r\t\t\tEND;\r\t\t\tc.SelectAll(FALSE)\r\t\tEND\r\tEND EnterData;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ListData
                    attr: 3
                  - text: "*;\r\t\tVAR t: TextModels.Model; n: Node; f: TextMappers.Formatter;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* write all entered tuples into a new text *)"
                    attr: 1
                  - text: "\r\t\tt := TextModels.dir.New();\r\t\tf.ConnectTo(t); f.SetPos(0);\r\t\tn := list;\r\t\tWHILE n # NIL DO\r\t\t\tf.WriteInt(n.id); f.WriteTab; f.WriteString(n.name); f.WriteTab;\r\t\t\t"
                    attr: 0
                  - text: "(* "
                    attr: 1
                  - text: WriteRealForm
                    attr: 0
                  - text: " allows to format real numbers in a flexible way, here rounding to two digits after the comma *)"
                    attr: 1
                  - text: "\r\t\t\tf.WriteRealForm(n.value, 7, 0, -2, TextModels.digitspace);\t"
                    attr: 0
                  - text: "(* \"-2\" indicates 2 digits after comma *)"
                    attr: 1
                  - text: "\r\t\t\tf.WriteLn;\r\t\t\tn := n.next\r\t\tEND;\r\t\tViews.OpenView(TextViews.dir.New(t))\r\tEND ListData;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Reset
                    attr: 3
                  - text: "*;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* release data structure so that garbage collector can reclaim memory *)"
                    attr: 1
                  - text: "\r\t\tlist := NIL\r\tEND Reset;\r\rEND ObxDb.\r"
                    attr: 0
