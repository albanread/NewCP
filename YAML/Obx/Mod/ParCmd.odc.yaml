                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Dialog, Models, Controls, TextModels, TextMappers, StdLog;\r\r\tPROCEDURE Connect (VAR s: TextMappers.Scanner; OUT done: BOOLEAN);\r\t\tVAR c: Models.Context;\r\tBEGIN\r\t\tdone := FALSE;\r\t\tIF Controls.par # NIL THEN\r\t\t\tc := Controls.par.context;\t"
                    attr: 0
                  - text: "(* the context of an open view is never NIL *)"
                    attr: 1
                  - text: "\r\t\t\tWITH c: TextModels.Context DO\r\t\t\t\ts.ConnectTo(c.ThisModel()); s.SetPos(c.Pos() + 1); s.Scan;\r\t\t\t\tdone := TRUE\r\t\t\tELSE\r\t\t\tEND\r\t\tEND\r\tEND Connect;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Do0
                    attr: 3
                  - text: "*;\r\t\tVAR s: TextMappers.Scanner; done: BOOLEAN;\r\tBEGIN\r\t\tConnect(s, done);\r\t\tIF done THEN\r\t\t\tIF s.type = TextMappers.string THEN\r\t\t\t\tStdLog.String(s.string); StdLog.Ln\t"
                    attr: 0
                  - text: "(* write string after button to log *)"
                    attr: 1
                  - text: "\r\t\t\tEND\r\t\tEND\r\tEND Do0;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Do1
                    attr: 3
                  - text: "*;\r\t\tVAR s: TextMappers.Scanner; done: BOOLEAN; res: INTEGER;\r\tBEGIN\r\t\tConnect(s, done);\r\t\tIF done THEN\r\t\t\tIF s.type = TextMappers.string THEN\r\t\t\t\tDialog.Call(s.string, \" \", res)\t"
                    attr: 0
                  - text: "(* execute string after button as a command sequence *)"
                    attr: 1
                  - text: "\r\t\t\tEND\r\t\tEND\r\tEND Do1;\r\rEND ObxParCmd.\r"
                    attr: 0
