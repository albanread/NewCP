                  - text: "\r\tIMPORT Views, TextModels, TextViews, TextControllers;\r\r\tCONST tab = 09X; line = 0DX;\r\r\tVAR field: ARRAY 256 OF CHAR;\r\r\tPROCEDURE ReadField (r: TextModels.Reader);\r\t\tVAR i: INTEGER; ch: CHAR;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* read a field, which is a sequence of characters terminated by the end of text, or a tab or line character *)"
                    attr: 1
                  - text: "\r\t\ti := 0; r.ReadChar(ch);\r\t\tWHILE ~r.eot & (ch # tab) & (ch # line) DO\r\t\t\tfield[i] := ch; INC(i); r.ReadChar(ch)\r\t\tEND;\r\t\tfield[i] := 0X\r\tEND ReadField;\r\r\tPROCEDURE WriteField (w: TextModels.Writer);\r\t\tVAR i: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ti := 0; ch := field[0];\r\t\tWHILE ch # 0X DO\r\t\t\tw.WriteChar(ch); INC(i); ch := field[i]\r\t\tEND\r\tEND WriteField;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Convert
                    attr: 3
                  - text: "*;\r\t\tVAR c: TextControllers.Controller; t: TextModels.Model; r: TextModels.Reader;\r\t\t\tw: TextModels.Writer; beg, end: INTEGER;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tc.GetSelection(beg, end);\r\t\t\tr := c.text.NewReader(NIL); r.SetPos(beg);\r\t\t\tt := TextModels.CloneOf(c.text);\r\t\t\tw := t.NewWriter(NIL);\r\t\t\tReadField(r);\t"
                    attr: 0
                  - text: "(* title *)"
                    attr: 1
                  - text: "\r\t\t\tWHILE ~r.eot DO\r\t\t\t\tWriteField(w); w.WriteChar(\" \");\r\t\t\t\tReadField(r); WriteField(w); w.WriteChar(\" \");\t"
                    attr: 0
                  - text: "(* first name *)"
                    attr: 1
                  - text: "\r\t\t\t\tReadField(r); WriteField(w); w.WriteChar(tab);\t"
                    attr: 0
