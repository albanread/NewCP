                      attr: 1
                      w: 121725
                      h: 133350
                  - text: "\"\r\treferences\t= \"Adopted from a program written in C in 1986 by Roland Karlsson,\r\t\t    Swedish Institute for Computer Science (SICS), roland@sics.se\"\r\tchanges\t= \""
                    attr: 1
