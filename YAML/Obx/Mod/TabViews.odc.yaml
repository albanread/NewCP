                  - text: "\r\tIMPORT StdTabViews, Views, Strings, Dialog, StdLog,\r\t\t\t\tObxCalc, ObxCubes;\r\t\r\tVAR \r\t\tst: StdTabViews.View;\r\t\tcalc: Views.View;\r\r\tPROCEDURE "
                    attr: 0
                  - text: New
                    attr: 3
                  - text: "* (): StdTabViews.View;\r\t\tVAR v: Views.View;\r\tBEGIN\r\t\tst := StdTabViews.dir.New();\r\t\tcalc := ObxCalc.New(); v := ObxCubes.New();\r\t\tst.SetItem(0, 'Cube', v);\r\t\tst.SetItem(1, 'Calc 1', calc);\r\t\tst.SetItem(2, 'Calc 2', calc);\r\t\tst.SetNotifier(\"ObxTabViews.Notify\");\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " st\r\tEND New;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Deposit
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\tViews.Deposit(New())\r\tEND Deposit;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: AddNewCalc
                    attr: 3
                  - text: "*;\r\t\tVAR s: ARRAY 4 OF CHAR;\r\tBEGIN\r\t\tStrings.IntToString(st.NofTabs(), s);\r\t\tst.SetItem(st.NofTabs(), 'Calc ' + s, calc)\r\tEND AddNewCalc;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: DeleteTab
                    attr: 3
                  - text: "*;\r\t\tVAR i: INTEGER; s: Dialog.String; v: Views.View;\r\tBEGIN\r\t\tIF st.NofTabs() > 0 THEN\r\t\t\tFOR i := st.Index() TO st.NofTabs() - 2 DO\r\t\t\t\tst.GetItem(i + 1, s, v); st.SetItem(i, s, v)\r\t\t\tEND;\r\t\t\tst.SetNofTabs(st.NofTabs() - 1)\r\t\tEND\r\tEND DeleteTab;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Notify
                    attr: 3
                  - text: "* (v: StdTabViews.View; from, to: INTEGER);\r\tBEGIN\r\t\tStdLog.String(\"Notify: \"); StdLog.Int(from); StdLog.Int(to); StdLog.Ln\r\tEND Notify;\r\t\rEND ObxTabViews.\r"
