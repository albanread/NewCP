                  - text: "\r**)\r\r\t(* note that as in the other sample programs, no error handling is performed *)"
                    attr: 1
                  - text: "\r\r\tIMPORT Files, Dialog, Views, TextModels, TextViews, TextControllers;\r\r\tCONST tab = 09X;\r\r\tTYPE\r\t\tField = POINTER TO RECORD\r\t\t\tprev: Field;\t\t\t\t\t\t\t"
                    attr: 0
                  - text: "(* field list is sorted in reverse order *)"
                    attr: 1
                  - text: "\r\t\t\tname: ARRAY 24 OF CHAR;\t"
                    attr: 0
                  - text: "(* name of placeholder *)"
                    attr: 1
                  - text: "\r\t\t\ttmplFrom, tmplTo: INTEGER;\t"
                    attr: 0
                  - text: "(* character range used by placeholder in template *)"
                    attr: 1
                  - text: "\r\t\t\tindex: INTEGER;\t"
                    attr: 0
                  - text: "(* column index of this field *)"
                    attr: 1
                  - text: "\r\t\t\tdataFrom, dataTo: INTEGER\t"
                    attr: 0
                  - text: "(* character range used by actual data in database *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\r\tPROCEDURE TmplFields (t: TextModels.Model): Field;\r\t"
                    attr: 0
                  - text: "(* returns a list of placeholder fields, in reverse order *)"
                    attr: 1
                  - text: "\r\t"
                    attr: 0
                  - text: "(* each field defines a text range and name of a placeholder *)"
                    attr: 1
                  - text: "\r\t"
                    attr: 0
                  - text: "(* the placeholder has the form \"...<NameOfPlaceholder>...\" *)"
                    attr: 1
                  - text: "\r\t\tVAR l, f: Field; r: TextModels.Reader; ch: CHAR; i: INTEGER;\r\tBEGIN\r\t\tl := NIL; r := t.NewReader(NIL); r.ReadChar(ch);\r\t\tWHILE ~r.eot DO\r\t\t\tIF ch = \"<\" THEN\r\t\t\t\tNEW(f); f.tmplFrom := r.Pos() - 1;\r\t\t\t\tr.ReadChar(ch); i := 0;\r\t\t\t\tWHILE ch # \">\" DO\r\t\t\t\t\tf.name[i] := ch; INC(i);\r\t\t\t\t\tr.ReadChar(ch)\r\t\t\t\tEND;\r\t\t\t\tf.name[i] := 0X; f.tmplTo := r.Pos();\r\t\t\t\tf.dataFrom := -1; f.dataTo := -1;\r\t\t\t\tf.prev := l; l := f\r\t\t\tEND;\r\t\t\tr.ReadChar(ch)\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " l\r\tEND TmplFields;\r\r\tPROCEDURE ThisDatabase (): TextModels.Model;\r\t\tVAR loc: Files.Locator; name: Files.Name; v: Views.View;\r\t\t\tt: TextModels.Model;\r\tBEGIN\r\t\tt := NIL; loc := NIL; name := \"\";\r\t\tDialog.GetIntSpec(\"\", loc, name);\r\t\tIF loc # NIL THEN\r\t\t\tv := Views.OldView(loc, name);\r\t\t\tIF (v # NIL) & (v IS TextViews.View) THEN\r\t\t\t\tt := v(TextViews.View).ThisModel()\r\t\t\tEND\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " t\r\tEND ThisDatabase;\r\r\tPROCEDURE MergeFields (f: Field; t: TextModels.Model);\r\t"
                    attr: 0
                  - text: "(* determine every template field's index in the data text's row of fields *)"
                    attr: 1
                  - text: "\r\t\tVAR r: TextModels.Reader; index, i: INTEGER; ch: CHAR;\r\tBEGIN\r\t\tr := t.NewReader(NIL);\r\t\tWHILE f # NIL DO\t"
                    attr: 0
                  - text: "(* iterate over all fields in the template *)"
                    attr: 1
                  - text: "\r\t\t\tf.index := -1;\r\t\t\tr.SetPos(0); index := 0; ch := tab;\r\t\t\tWHILE (ch = tab) & (f.index = -1) DO\t"
                    attr: 0
                  - text: "(* compare names of the fields *)"
                    attr: 1
                  - text: "\r\t\t\t\tREPEAT r.ReadChar(ch) UNTIL ch >= \" \";\r\t\t\t\ti := 0; WHILE ch = f.name[i] DO r.ReadChar(ch); INC(i) END;\r\t\t\t\tIF (ch < \" \") & (f.name[i] = 0X) THEN\t"
                    attr: 0
                  - text: "(* names match *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tf.index := index\r\t\t\t\tELSE\t"
                    attr: 0
                  - text: "(* no match; proceed to next data field *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tWHILE ch >= \" \" DO r.ReadChar(ch) END\r\t\t\t\tEND;\r\t\t\t\tINC(index)\r\t\t\tEND;\r\t\t\tf := f.prev\r\t\tEND\r\tEND MergeFields;\r\r\tPROCEDURE ReadTuple (f: Field; r: TextModels.Reader);\r\t"
                    attr: 0
                  - text: "(* read tuple in data, and assign ranges to corresponding fields *)"
                    attr: 1
                  - text: "\r\t\tVAR index: INTEGER; from, to: INTEGER; ch: CHAR; g: Field;\r\tBEGIN\r\t\tindex := 0; ch := tab;\r\t\tWHILE ch = tab DO\r\t\t\tREPEAT r.ReadChar(ch) UNTIL (ch = 0X) OR (ch >= \" \") OR (ch = tab) OR (ch = 0DX);\r\t\t\tfrom := r.Pos() - 1;\r\t\t\tWHILE ch >= \" \" DO r.ReadChar(ch) END;\r\t\t\tto := r.Pos(); IF ~r.eot THEN DEC(to) END;\r\t\t\tg := f;\r\t\t\tWHILE g # NIL DO\r\t\t\t\tIF g.index = index THEN g.dataFrom := from; g.dataTo := to END;\r\t\t\t\tg := g.prev\r\t\t\tEND;\r\t\t\tINC(index)\r\t\tEND\r\tEND ReadTuple;\r\r\tPROCEDURE AppendInstance (f: Field; data, tmpl, out: TextModels.Model);\r\t\tVAR start, from: INTEGER; r: TextModels.Reader; attr: TextModels.Attributes;\r\tBEGIN\r\t\tstart := out.Length();\r\t\tr := out.NewReader(NIL);\r\t\tout.InsertCopy(start, tmpl, 0, tmpl.Length());\t"
                    attr: 0
                  - text: "(* append new copy of template *)"
                    attr: 1
                  - text: "\r\t\tWHILE f # NIL DO\t"
                    attr: 0
                  - text: "(* substitute placeholders, from end to beginning of template *)"
                    attr: 1
                  - text: "\r\t\t\tfrom := start + f.tmplFrom;\r\t\t\tr.SetPos(from); r.ReadRun(attr);\t"
                    attr: 0
                  - text: "(* save attributes *)"
                    attr: 1
                  - text: "\r\t\t\tout.Delete(from, from + f.tmplTo - f.tmplFrom);\t"
                    attr: 0
                  - text: "(* delete placeholder *)"
                    attr: 1
                  - text: "\r\t\t\tout.InsertCopy(from, data, f.dataFrom, f.dataTo);\t"
                    attr: 0
                  - text: "(* insert actual data *)"
                    attr: 1
                  - text: "\r\t\t\tout.SetAttr(from, from + f.dataTo - f.dataFrom, attr);\t"
                    attr: 0
                  - text: "(* set attributes *)"
                    attr: 1
                  - text: "\r\t\t\tf := f.prev\r\t\tEND\r\tEND AppendInstance;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Merge
                    attr: 3
                  - text: "*;\r\t\tVAR c: TextControllers.Controller; tmpl, data, out: TextModels.Model;\r\t\t\ttmplFields: Field; r: TextModels.Reader; v: TextViews.View;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF c # NIL THEN\r\t\t\ttmpl := c.text;\t"
                    attr: 0
                  - text: "(* text template used for mail merge *)"
                    attr: 1
                  - text: "\r\t\t\ttmplFields := TmplFields(tmpl);\t"
                    attr: 0
                  - text: "(* determine fields in template *)"
                    attr: 1
                  - text: "\r\t\t\tdata := ThisDatabase();\t"
                    attr: 0
                  - text: "(* get text database for mail merge *)"
                    attr: 1
                  - text: "\r\t\t\tIF data # NIL THEN\r\t\t\t\tMergeFields(tmplFields, data);\t"
                    attr: 0
                  - text: "(* determine every template field's column in database *)"
                    attr: 1
                  - text: "\r\t\t\t\tout := TextModels.dir.New();\t"
                    attr: 0
                  - text: "(* create output text *)"
                    attr: 1
                  - text: "\r\t\t\t\tr := data.NewReader(NIL); r.SetPos(0);\r\t\t\t\tReadTuple(tmplFields, r);\t"
                    attr: 0
                  - text: "(* skip meta data *)"
                    attr: 1
                  - text: "\r\t\t\t\tREPEAT\r\t\t\t\t\tReadTuple(tmplFields, r);\t"
                    attr: 0
                  - text: "(* read next data row *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tAppendInstance(tmplFields, data, tmpl, out)\t"
                    attr: 0
                  - text: "(* append new instance of template *)"
                    attr: 1
                  - text: "\r\t\t\t\tUNTIL r.eot;\r\t\t\t\tv := TextViews.dir.New(out);\r\t\t\t\tViews.OpenView(v)\t"
                    attr: 0
                  - text: "(* open text view in window *)"
                    attr: 1
                  - text: "\r\t\t\tEND\r\t\tEND\r\tEND Merge;\r\rEND ObxMMerge.\r"
                    attr: 0
