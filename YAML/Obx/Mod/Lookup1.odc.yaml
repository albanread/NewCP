                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Stores, Models, TextModels, TextMappers, TextControllers, ObxPhoneDB;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Do
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** use TextCmds.SelectionGuard as guard command **)"
                    attr: 1
                  - text: "\r\t\tVAR c: TextControllers.Controller; buf: TextModels.Model; from, to: INTEGER;\r\t\t\ts: TextMappers.Scanner; f: TextMappers.Formatter; number: ObxPhoneDB.String;\r\t\t\tscript: Stores.Operation;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tc.GetSelection(from, to);\r\t\t\ts.ConnectTo(c.text);\r\t\t\ts.SetPos(from);\r\t\t\ts.Scan;\r\t\t\tIF s.type = TextMappers.string THEN\r\t\t\t\tbuf := TextModels.CloneOf(c.text);\r\t\t\t\tf.ConnectTo(buf);\r\t\t\t\tObxPhoneDB.LookupByName(s.string$, number);\r\t\t\t\tf.WriteString(number);\r\t\t\t\tfrom := s.start; to := s.Pos() - 1;\t"
                    attr: 0
                  - text: "(* scanner has already read on character beyond string! *)"
                    attr: 1
                  - text: "\r\t\t\t\tModels.BeginScript(c.text, \"#Obx:Lookup\", script);\r\t\t\t\tc.text.Delete(from, to);\t\t\t\t\t\t\t"
                    attr: 0
                  - text: "(* delete name *)"
                    attr: 1
                  - text: "\r\t\t\t\tc.text.Insert(from, buf, 0, buf.Length());\t"
                    attr: 0
                  - text: "(* move phone number from buffer into text *)"
                    attr: 1
                  - text: "\r\t\t\t\tModels.EndScript(c.text, script);\r\t\t\t\tc.SetSelection(from, from + LEN(number$))\t"
                    attr: 0
                  - text: "(* select the phone number *)"
                    attr: 1
                  - text: "\r\t\t\tEND\r\t\tEND\r\tEND Do;\r\rEND ObxLookup1.\r"
                    attr: 0
