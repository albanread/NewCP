                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Ports, Services, Stores, Models, Views, Controllers, Properties, TextViews;\r\r\tCONST\r\t\tminVersion = 3; maxVersion = 3;\t"
                    attr: 0
                  - text: "(* old versions 0 .. 2 of ObxTwin views cannot be read anymore *)"
                    attr: 1
                  - text: "\r\t\tborder = Ports.mm;\r\r\tTYPE\r\t\tIdentity = POINTER TO RECORD (Models.Model) END;\t"
                    attr: 0
                  - text: "(* dummy model *)"
                    attr: 1
                  - text: "\r\r\t\tContext = POINTER TO RECORD (Models.Context)\r\t\t\tbase: View;\t\t\t"
                    attr: 0
                  - text: "(* container view *)"
                    attr: 1
                  - text: "\r\t\t\tview: Views.View;\t"
                    attr: 0
                  - text: "(* contained view *)"
                    attr: 1
                  - text: "\r\t\t\tl, t, r, b: INTEGER\t"
                    attr: 0
                  - text: "(* cached bounding box of contained view *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\r\t\tView = POINTER TO RECORD (Views.View)\r\t\t\ttop, bottom: Context;\r\t\t\tident: Identity;\t"
                    attr: 0
                  - text: "(* temporary dummy model *)"
                    attr: 1
                  - text: "\r\t\t\tfocus: Context\t"
                    attr: 0
                  - text: "(* current focus; either "
                    attr: 1
                  - text: top
                    attr: 0
                  - text: " or "
                    attr: 1
                  - text: bottom
                    attr: 0
                  - text: " *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\r\r\t"
                    attr: 0
                  - text: "(* Context *)"
                    attr: 1
                  - text: "\r\r"
                    attr: 0
                  - text: "\t"
                    attr: 3
                  - text: "PROCEDURE (c: Context) ThisModel (): Models.Model;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " NIL\t"
                    attr: 0
                  - text: "(* don't give the embedded views information about the dummy twin model *)"
                    attr: 1
                  - text: "\r\tEND ThisModel;\r\r\tPROCEDURE (c: Context) GetSize (OUT w, h: INTEGER);\r\tBEGIN\r\t\tw := c.r - c.l;\r\t\th := c.b - c.t\r\tEND GetSize;\r\r\tPROCEDURE (c: Context) MakeVisible (l, t, r, b: INTEGER);\r\t\tVAR w, h, sep: INTEGER;\r\tBEGIN\r\t\tIF c.base.top = c THEN"
                    attr: 0
                  - text: "\t(* top view *)"
                    attr: 1
                  - text: "\r\t\t\tc.base.context.MakeVisible(l + border, t + border, r + border, b + border)\r\t\tELSE"
                    attr: 0
                  - text: "\t(* bottom view *)"
                    attr: 1
                  - text: "\r\t\t\tc.base.context.GetSize(w, h); sep := h DIV 3;\r\t\t\tc.base.context.MakeVisible(l + border, t + sep + border, r + border, b + sep + border)\r\t\tEND\r\tEND MakeVisible;\r\r\tPROCEDURE (c: Context) Consider (VAR p: Models.Proposal);\r\tBEGIN\r\t\tc.base.context.Consider(p)\r\tEND Consider;\r\r\tPROCEDURE (c: Context) Normalize (): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " c.base.context.Normalize()\r\tEND Normalize;\r\r\tPROCEDURE NewContext (v: Views.View; base: View): Context;\r\t\tVAR c: Context;\r\tBEGIN\r\t\tNEW(c);\r\t\tc.view := v; c.base := base;\r\t\tv.InitContext(c); Stores.Join(v, base);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " c\r\tEND NewContext;\r\r\tPROCEDURE CopyOf (source: Context; shallow: BOOLEAN; base: View): Context;\r\t\tVAR v: Views.View;\r\tBEGIN\r\t\tv := Views.CopyOf(source.view,  shallow );\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " NewContext(v, base)\r\tEND CopyOf;\r\r\r\t"
                    attr: 0
                  - text: "(* View *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE RecalcLayout (v: View);\r\t\tVAR w, h, sep: INTEGER; c: Context;\r\tBEGIN\r\t\tv.context.GetSize(w, h);\r\t\tsep := h DIV 3;\t"
                    attr: 0
                  - text: "(* separate the two views at 1/3 of the container's height *)"
                    attr: 1
                  - text: "\r\t\tc := v.top; c.l := border; c.t := border; c.r := w - border; c.b := sep - border;\r\t\tc := v.bottom; c.l := border; c.t := sep + border; c.r := w - border; c.b := h - border\r\tEND RecalcLayout;\r\r\tPROCEDURE SetFocus (v: Views.View; x, y: INTEGER): BOOLEAN;\r\t\tVAR p: Properties.FocusPref;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* determine whether "
                    attr: 1
                  - text: "v "
                    attr: 0
                  - text: "should be focused when the mouse is clicked at "
                    attr: 1
                  - text: "(x, y) "
                    attr: 0
                  - text: "in "
                    attr: 1
                  - text: v
                    attr: 0
                  - text: " *)"
                    attr: 1
                  - text: "\r\t\tp.hotFocus := FALSE;\r\t\tp.atLocation := TRUE; p.x := x; p.y := y;\r\t\tp.setFocus := FALSE;\r\t\tViews.HandlePropMsg(v, p);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " p.setFocus\r\tEND SetFocus;\r\r\tPROCEDURE (v: View) CopyFromModelView (source: Views.View; model: Models.Model);\r\t\tVAR shallow: BOOLEAN;\r\tBEGIN\r\t\tWITH source: View DO\r\t\t\tshallow := model = source.ident;\t"
                    attr: 0
                  - text: "(* shallow copy if both views share the same model *)"
                    attr: 1
                  - text: "\r\t\t\tStores.Join(v, model);\r\t\t\tv.top := CopyOf(source.top, shallow, v);\r\t\t\tv.bottom := CopyOf(source.bottom, shallow, v);\r\t\t\tv.ident := model(Identity);\r\t\t\tv.focus := v.bottom\r\t\tEND\r\tEND CopyFromModelView;\r\r\tPROCEDURE (v: View) Internalize (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER; h: Views.View;\r\tBEGIN\r\t\trd.ReadVersion(minVersion, maxVersion, version);\r\t\tIF ~rd.cancelled THEN\r\t\t\tViews.ReadView(rd, h); v.top := NewContext(h, v);\r\t\t\tViews.ReadView(rd, h); v.bottom := NewContext(h, v);\r\t\t\tNEW(v.ident); Stores.Join(v, v.ident);\r\t\t\tv.focus := v.bottom\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (v: View) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteVersion(maxVersion);\r\t\tViews.WriteView(wr, v.top.view);\r\t\tViews.WriteView(wr, v.bottom.view)\r\tEND Externalize;\r\r\tPROCEDURE (v: View) Neutralize;\r\tBEGIN\r\t\tv.focus.view.Neutralize\r\tEND Neutralize;\r\r\tPROCEDURE (v: View) ThisModel (): Models.Model;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " v.ident\r\tEND ThisModel;\r\r\tPROCEDURE (v: View) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR d: INTEGER; c: Context;\r\tBEGIN\r\t\tRecalcLayout(v);\r\t\t"
                    attr: 0
                  - text: "(* install the subframes for the subviews *)"
                    attr: 1
                  - text: "\r\t\tc := v.top; Views.InstallFrame(f, c.view, c.l, c.t, 0, v.focus = c);\r\t\tc := v.bottom; Views.InstallFrame(f, c.view, c.l, c.t, 1, v.focus = c);\r\t\t"
                    attr: 0
                  - text: "(* draw frame around the subviews *)"
                    attr: 1
                  - text: "\r\t\td := 2 * f.dot;\r\t\tc := v.top;\r\t\tIF (c.t - d < c.b + d) & (c.l - d < c.r + d) THEN f.DrawRect(c.l - d, c.t - d, c.r + d, c.b + d, f.dot, Ports.black) END;\r\t\tc := v.bottom; \r\t\tIF (c.t - d < c.b + d) & (c.l - d < c.r + d) THEN f.DrawRect(c.l - d, c.t - d, c.r + d, c.b + d, f.dot, Ports.black) END\r\tEND Restore;\r\r\tPROCEDURE (v: View) HandleCtrlMsg (f: Views.Frame; VAR msg: Views.CtrlMessage;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\t\tVAR g: Views.Frame; newFocus: Context; mMsg: Controllers.MarkMsg;\r\t\t\tw, h, sep: INTEGER;\r\tBEGIN\r\t\tWITH msg: Controllers.CursorMessage DO\r\t\t\tv.context.GetSize(w, h);\r\t\t\tsep := h DIV 3;\r\t\t\tIF msg.y >= sep THEN newFocus := v.bottom ELSE newFocus := v.top END;\r\t\t\tfocus := newFocus.view;\r\t\t\tIF (newFocus # v.focus) & ((msg IS Controllers.TrackMsg) OR (msg IS Controllers.DropMsg)) &\r\t\t\t\tSetFocus(focus, msg.x, msg.y) THEN\r\t\t\t\t"
                    attr: 0
                  - text: "(* remove marks in old focus *)"
                    attr: 1
                  - text: "\r\t\t\t\tmMsg.show := FALSE; mMsg.focus := TRUE;\r\t\t\t\tg := Views.ThisFrame(f, v.focus.view); IF g # NIL THEN Views.ForwardCtrlMsg(g, mMsg) END;\r\t\t\t\tv.focus := newFocus;\t"
                    attr: 0
                  - text: "(* set new focus *)"
                    attr: 1
                  - text: "\r\t\t\t\t"
                    attr: 0
                  - text: "(* set marks in new focus *)"
                    attr: 1
                  - text: "\r\t\t\t\tmMsg.show := TRUE; mMsg.focus := TRUE;\r\t\t\t\tg := Views.ThisFrame(f, v.focus.view); IF g # NIL THEN Views.ForwardCtrlMsg(g, mMsg) END\r\t\t\tEND\r\t\t"
                    attr: 0
                  - text: "(* the following scrolling-oriented messages are always sent to bottom view, independent of focus *)"
                    attr: 1
                  - text: "\r\t\t| msg: Controllers.PollSectionMsg DO\r\t\t\tg := Views.ThisFrame(f, v.bottom.view); IF g # NIL THEN Views.ForwardCtrlMsg(g, msg) END;\r\t\t\tIF msg.vertical & ~msg.done THEN\r\t\t\t\tmsg.valid := FALSE; msg.done := TRUE\t"
                    attr: 0
                  - text: "(* disable default-scrolling *)"
                    attr: 1
                  - text: "\r\t\t\tEND\r\t\t| msg: Controllers.ScrollMsg DO\r\t\t\tg := Views.ThisFrame(f, v.bottom.view); IF g # NIL THEN Views.ForwardCtrlMsg(g, msg) END;\r\t\t\tIF msg.vertical THEN msg.done := TRUE END\r\t\t| msg: Controllers.PageMsg DO\r\t\t\tfocus := v.bottom.view\r\t\tELSE\t"
                    attr: 0
                  - text: "(* all other messages are sent to the focus, however *)"
                    attr: 1
                  - text: "\r\t\t\tfocus := v.focus.view\r\t\tEND\r\t\t"
                    attr: 0
                  - text: "(* the assignment to "
                    attr: 1
                  - text: focus
                    attr: 0
                  - text: " signals that the view "
                    attr: 1
                  - text: v
                    attr: 0
                  - text: " wants to forward the message to the\r\t\tcorresponding embedded view *)"
                    attr: 1
                  - text: "\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE (v: View) HandlePropMsg (VAR msg: Views.PropMessage);\r\t\tCONST defW = 80 * Ports.mm; defH = 60 * Ports.mm;\r\tBEGIN\r\t\tWITH msg: Properties.SizePref DO\r\t\t\tIF msg.w = Views.undefined THEN msg.w := defW END;\r\t\t\tIF msg.h = Views.undefined THEN msg.h := defH END\r\t\t| msg: Properties.ResizePref DO\r\t\t\tmsg.verFitToWin := TRUE\t"
                    attr: 0
                  - text: "(* make view always as high as window *)"
                    attr: 1
                  - text: "\r\t\tELSE\r\t\t\tViews.HandlePropMsg(v.bottom.view, msg)\r\t\tEND\r\tEND HandlePropMsg;\r\r\tPROCEDURE (v: View) ConsiderFocusRequestBy (view: Views.View);\r\tBEGIN\r\t\tIF view = v.top.view THEN\r\t\t\tv.focus := v.top\r\t\tELSIF view = v.bottom.view THEN\r\t\t\tv.focus := v.bottom\r\t\tELSE\r\t\t\t"
                    attr: 0
                  - text: HALT
                    attr: 4
                  - text: "(20)\r\t\tEND\r\tEND ConsiderFocusRequestBy;\r\r\tPROCEDURE "
                    attr: 0
                  - text: NewTwin
                    attr: 4
                  - text: "* (top, bottom: Views.View): Views.View;\r\t\tVAR v: View;\r\tBEGIN\r\t\tNEW(v);\r\t\tv.top := NewContext(top, v); v.bottom := NewContext(bottom, v);\r\t\tNEW(v.ident); Stores.Join(v, v.ident); v.focus := v.bottom;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " v\r\tEND NewTwin;\r\r\t"
                    attr: 0
                  - text: "(* example twin view with two embedded text views *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: New
                    attr: 4
                  - text: "* (): Views.View;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " NewTwin(TextViews.dir.New(NIL), TextViews.dir.New(NIL))\r\tEND New;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Deposit
                    attr: 4
                  - text: "*;\r\tBEGIN\r\t\tViews.Deposit(New())\r\tEND Deposit;\r\rEND ObxTwins.\r"
                    attr: 0
        - kind: Documents.Controller
