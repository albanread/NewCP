                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Strings, Meta, Dialog, Stores, Views, Controllers, Properties, Controls, StdCFrames;\r\r\tCONST\r\t\tminVersion = 0; maxVersion = 0;\r\t\trdel = 07X; ldel = 08X;  tab = 09X; ltab = 0AX; lineChar = 0DX; esc = 01BX;\r\t\tarrowLeft = 1CX; arrowRight = 1DX; arrowUp = 1EX; arrowDown = 1FX;\r\t\tmaxLen = 13;\r\r\tTYPE\r\t\t"
                    attr: 0
                  - text: Vector
                    attr: 3
                  - text: "* = RECORD x*, y*: INTEGER END;\r\r\t\tVectorField = POINTER TO RECORD (Controls.Control)\r\t\t\tselection: INTEGER\t"
                    attr: 0
                  - text: "(* 0: no selection; 1: first part selected; 2: selection or caret in second part *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\r\tVAR "
                    attr: 0
                  - text: test
                    attr: 3
                  - text: "*: Vector;\r\r\tPROCEDURE GetVectorField (f: StdCFrames.Field; OUT str: ARRAY OF CHAR);\r\t\tVAR c: VectorField; v: Meta.Item; x, y: INTEGER; s1, s2: ARRAY 16 OF CHAR;\r\tBEGIN\r\t\tc := f.view(VectorField);\r\t\tIF c.item.Valid() THEN\r\t\t\tc.item.Lookup(\"x\", v); x := v.IntVal();\r\t\t\tc.item.Lookup(\"y\", v); y := v.IntVal()\r\t\tELSE x := 0; y := 0\r\t\tEND;\r\t\ts1[0] := CHR(x DIV 10 MOD 10 + ORD(\"0\"));\r\t\ts1[1] := CHR(x MOD 10 + ORD(\"0\"));\r\t\ts1[2] := 0X;\r\t\tIF y < 0 THEN y := 0 END;\r\t\tStrings.IntToString(y, s2);\r\t\tstr := s1 + \"/\" + s2\r\tEND GetVectorField;\r\r\tPROCEDURE SetVectorField(f: StdCFrames.Field; IN str: ARRAY OF CHAR);\r\t\tVAR c: VectorField; v: Meta.Item; x, y, res: INTEGER; s: ARRAY 16 OF CHAR;\r\tBEGIN\r\t\tc := f.view(VectorField);\r\t\tx := (ORD(str[0]) - ORD(\"0\")) * 10 + (ORD(str[1]) - ORD(\"0\"));\r\t\ts := str$; s[0] := \" \"; s[1] := \" \"; s[2] := \" \";\r\t\tStrings.StringToInt(s, y, res);\r\t\tIF (res = 0) & c.item.Valid() & ~c.readOnly THEN\r\t\t\tc.item.Lookup(\"x\", v); v.PutIntVal(x);\r\t\t\tc.item.Lookup(\"y\", v); v.PutIntVal(y);\r\t\t\tControls.Notify(c, f, Dialog.changed, 0, 0)\r\t\tEND\r\tEND SetVectorField;\r\r\tPROCEDURE EqualVectorField (f: StdCFrames.Field; IN s1, s2: ARRAY OF CHAR): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " s1 = s2\r\tEND EqualVectorField;\r\r\tPROCEDURE (c: VectorField) CopyFromSimpleView2 (source: Controls.Control);\r\tBEGIN\r\t\tc.selection := 0\r\tEND CopyFromSimpleView2;\r\r\tPROCEDURE (c: VectorField) Internalize2 (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER;\r\tBEGIN\r\t\trd.ReadVersion(minVersion, maxVersion, version);\r\t\tc.selection := 0\r\tEND Internalize2;\r\r\tPROCEDURE (c: VectorField) Externalize2 (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteVersion(maxVersion)\r\tEND Externalize2;\r\r\tPROCEDURE (c: VectorField) GetNewFrame (VAR frame: Views.Frame);\r\t\tVAR f: StdCFrames.Field;\r\tBEGIN\r\t\tf := StdCFrames.dir.NewField();\r\t\tf.disabled := c.disabled;\r\t\tf.undef := c.undef;\r\t\tf.readOnly := c.readOnly;\r\t\tf.font := c.font;\r\t\tf.maxLen := maxLen;\r\t\tf.left := c.prop.opt[Controls.left];\r\t\tf.right := c.prop.opt[Controls.right];\r\t\tf.Get := GetVectorField;\r\t\tf.Set := SetVectorField;\r\t\tf.Equal := EqualVectorField;\r\t\tframe := f\r\tEND GetNewFrame;\r\r\tPROCEDURE (c: VectorField) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tWITH f: StdCFrames.Frame DO f.Restore(l, t, r, b) END\r\tEND Restore;\r\r\tPROCEDURE (c: VectorField) HandleCtrlMsg2 (f: Views.Frame; VAR msg: Controllers.Message;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\t\tVAR ch: CHAR; a, b, x, x0: INTEGER; v: Meta.Item;\r\tBEGIN\r\t\tIF ~c.disabled & ~c.readOnly THEN\r\t\t\tWITH f: StdCFrames.Field DO\r\t\t\t\tWITH msg: Controllers.PollOpsMsg DO\r\t\t\t\t\tmsg.valid := {Controllers.copy}\r\t\t\t\t| msg: Controllers.EditMsg DO\r\t\t\t\t\tIF msg.op = Controllers.pasteChar THEN\r\t\t\t\t\t\tch := msg.char;\r\t\t\t\t\t\tIF c.selection = 2 THEN\r\t\t\t\t\t\t\tIF ch = arrowLeft THEN\r\t\t\t\t\t\t\t\tc.selection := 1; f.Select(0, 2)\r\t\t\t\t\t\t\tELSIF (ch = ldel) OR (ch = rdel) OR (ch = arrowRight) OR (\"0\" <= ch) & (ch <= \"9\") THEN\r\t\t\t\t\t\t\t\tf.KeyDown(ch); f.Update\r\t\t\t\t\t\t\tELSE Dialog.Beep\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tELSIF c.item.Valid() THEN\r\t\t\t\t\t\t\tc.item.Lookup(\"x\", v); x := v.IntVal(); x0 := x;\r\t\t\t\t\t\t\tIF ch = arrowRight THEN\r\t\t\t\t\t\t\t\tc.selection := 2; f.Select(3, MAX(INTEGER))\r\t\t\t\t\t\t\tELSIF ch = arrowUp THEN\r\t\t\t\t\t\t\t\tx := (x + 1) MOD 100\r\t\t\t\t\t\t\tELSIF ch = arrowDown THEN\r\t\t\t\t\t\t\t\tx := (x - 1) MOD 100\r\t\t\t\t\t\t\tELSIF (\"0\" <= ch) & (ch <= \"9\") THEN\r\t\t\t\t\t\t\t\tx := x * 10 MOD 100 + ORD(ch) - ORD(\"0\")\r\t\t\t\t\t\t\tELSE Dialog.Beep\r\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\tIF x # x0 THEN\r\t\t\t\t\t\t\t\tv.PutIntVal(x); Controls.Notify(c, f, Dialog.changed, 0, 0);\r\t\t\t\t\t\t\t\tf.Update; f.Select(0, 2)\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE\r\t\t\t\t\t\tf.Edit(msg.op, msg.view, msg.w, msg.h, msg.isSingle, msg.clipboard)\r\t\t\t\t\tEND\r\t\t\t\t| msg: Controllers.PollCursorMsg DO\r\t\t\t\t\tf.GetCursor(msg.x, msg.y, msg.modifiers, msg.cursor)\r\t\t\t\t| msg: Controllers.TrackMsg DO\r\t\t\t\t\tf.MouseDown(msg.x, msg.y, msg.modifiers);\r\t\t\t\t\tf.GetSelection(a, b);\r\t\t\t\t\tIF a >= 3 THEN c.selection := 2\r\t\t\t\t\tELSIF a >= 0 THEN c.selection := 1; f.Select(0, 2)\r\t\t\t\t\tEND\r\t\t\t\t| msg: Controllers.MarkMsg DO\r\t\t\t\t\tf.Mark(msg.show, msg.focus);\r\t\t\t\t\tIF msg.focus THEN\r\t\t\t\t\t\tIF msg.show THEN\t"
                    attr: 0
                  - text: "(* set selection on focus *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\t\tc.selection := 1; f.Select(0, 2)\r\t\t\t\t\t\tELSE\t"
                    attr: 0
                  - text: "(* remove selection on defocus *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\t\tc.selection := 0; f.Select(-1, -1)\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND HandleCtrlMsg2;\r\r\tPROCEDURE (c: VectorField) HandlePropMsg2 (VAR msg: Properties.Message);\r\tBEGIN\r\t\tWITH msg: Properties.FocusPref DO\r\t\t\tIF ~c.disabled & ~c.readOnly THEN msg.setFocus := TRUE END\r\t\t| msg: Properties.SizePref DO\r\t\t\tStdCFrames.dir.GetFieldSize(maxLen, msg.w, msg.h)\r\t\t| msg: Controls.PropPref DO\r\t\t\tmsg.valid := msg.valid + {Controls.left, Controls.right}\r\t\t\t"
                    attr: 0
                  - text: "(* to enable the property editor to correctly label these options, insert the following three lines\r\t\t\t\tinto Dev/Rsrc/Strings (no leading tab characters, however!):\r\t\t\t\tObxFldCtrls.VectorField\tVector Field\r\t\t\t\tObxFldCtrls.VectorField.Opt0\tLeft aligned\r\t\t\t\tObxFldCtrls.VectorField.Opt1\tRight aligned\r\t\t\t*)"
                    attr: 1
                  - text: "\r\t\t\t"
                    attr: 0
                  - text: "(* to handle font and color properties: handle type "
                    attr: 1
                  - text: Properties.StdProp
                    attr: 0
                  - text: " also *)"
                    attr: 1
                  - text: "\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg2;\r\r\tPROCEDURE (c: VectorField) CheckLink (VAR ok: BOOLEAN);\r\t\tVAR mod, name: Meta.Name;\r\tBEGIN\r\t\tIF (c.item.typ = Meta.recTyp) THEN\r\t\t\tc.item.GetTypeName(mod, name);\r\t\t\tok := (mod = \"ObxFldCtrls\") & (name = \"Vector\")\r\t\tELSE ok := FALSE\r\t\tEND\r\tEND CheckLink;\r\r\tPROCEDURE (c: VectorField) Update (f: Views.Frame; op, from, to: INTEGER);\r\tBEGIN\r\t\tf(StdCFrames.Frame).Update;\r\t\tIF f.front & ~c.disabled THEN\r\t\t\tIF c.selection = 1 THEN f(StdCFrames.Field).Select(0, 1)\r\t\t\tELSIF c.selection = 2 THEN f(StdCFrames.Field).Select(2, MAX(INTEGER))\r\t\t\tEND\r\t\tEND\r\tEND Update;\r\r\r\tPROCEDURE "
                    attr: 0
                  - text: New
                    attr: 3
                  - text: "* (p: Controls.Prop): Views.View;\r\t\tVAR c: VectorField;\r\tBEGIN\r\t\tNEW(c); Controls.OpenLink(c, p); "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " c\r\tEND New;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Deposit
                    attr: 3
                  - text: "*;\r\t\tVAR p: Controls.Prop;\r\tBEGIN\r\t\tNEW(p);\r\t\tp.link := \"ObxFldCtrls.test\";\r\t\tp.label := \"\"; p.guard := \"\"; p.notifier := \"\";\r\t\tp.opt[Controls.left] := TRUE;\r\t\tViews.Deposit(New(p))\r\tEND Deposit;\r\rEND ObxFldCtrls.\r\r"
                    attr: 0
