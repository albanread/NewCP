                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\t(*\r"
                    attr: 0
                  - text: "\tThis example illustrates the persistency service implemented by Stores. It is shown how a graph\r\tof linked nodes can be externalized and internalized, maintaining invariants like objects refered to\r\tthrough multiple pointers and cycles. Stores also offeres a mechanism to just copy such a graph.\r\t\t\t\r\tTo run the example, click on the commanders below:\r\t\t"
                    attr: 1
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 22
                      bodyPos: 2124
                      bodyLen: 6
                    attr: 1
                    w: 168275
                    h: 142875
                  - text: " ObxStores.WriteRead\t\t"
                    attr: 1
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 23
                      bodyPos: 2170
                      bodyLen: 6
                    attr: 1
                    w: 168275
                    h: 142875
                  - text: " ObxStores.Copy\r"
                    attr: 1
                  - text: "\t*)\r\r\tIMPORT Dialog, Files, Stores;\r\r\tTYPE\r\t\tNode = POINTER TO RECORD (Stores.Store)\r\t\t\ta, b: Node\r\t\tEND;\r\r\t(* "
                    attr: 0
                  - text: Methods of Node
                    attr: 1
                  - text: " *)\r\r\tPROCEDURE (n: Node) Externalize (VAR w: Stores.Writer);\r\tBEGIN\r\t\tw.WriteStore(n.a); w.WriteStore(n.b)\r\tEND Externalize;\r\r\tPROCEDURE (n: Node) Internalize (VAR r: Stores.Reader);\r\t\tVAR s: Stores.Store;\r\tBEGIN\r\t\tr.ReadStore(s);\r\t\tIF (s # NIL) & (s IS Node) THEN n.a := s(Node) ELSE n.a := NIL END;\r\t\tr.ReadStore(s);\r\t\tIF (s # NIL) & (s IS Node) THEN n.b := s(Node) ELSE n.b := NIL END\r\tEND Internalize;\r\r\tPROCEDURE (n: Node) CopyFrom (source: Stores.Store);\r\tBEGIN\r\t\tWITH source: Node DO\r\t\t\tIF source.a # NIL THEN n.a := Stores.CopyOf(source.a)(Node) ELSE n.a := NIL END;\r\t\t\tIF source.b # NIL THEN n.b := Stores.CopyOf(source.b)(Node) ELSE n.b := NIL END\r\t\tEND\r\tEND CopyFrom;\r\r\t(* "
                    attr: 0
                  - text: Build and check a graph of Nodes
                    attr: 1
                  - text: " *)\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t"
                    attr: 0
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 24
                      bodyPos: 2267
                      bodyLen: 11003
                    attr: 0
                    w: 1440000
                    h: 1147392
                  - text: "\r\tPROCEDURE NewGraph (): Node;\r\t\tVAR n: Node;\r\tBEGIN\r\t\tNEW(n);\r\t\tNEW(n.a); Stores.Join(n, n.a);\r\t\tNEW(n.b); Stores.Join(n, n.b);\r\t\tn.a.a := n.b; n.a.b := NIL; n.b.a := n.a; n.b.b := n.b;\r\t\tRETURN n\r\tEND NewGraph;\r\r\tPROCEDURE GraphOk (n: Node): BOOLEAN;\r\tBEGIN\r\t\tRETURN (n # n.a) & (n # n.b) & (n.a # n.b) & (n.a.a = n.b) & (n.a.b = NIL) & (n.b.a = n.a) & (n.b.b = n.b)\r\t\t\t& Stores.Joined(n, n.a) & Stores.Joined(n, n.b)\r\tEND GraphOk;\r\r\r\t(* "
                    attr: 0
                  - text: Demonstrate Ex- and Internalization
                    attr: 1
                  - text: " *)\r\r\tPROCEDURE "
                    attr: 0
                  - text: WriteRead
                    attr: 3
                  - text: "*;\r\t\tVAR n, m: Node; f: Files.File; w: Stores.Writer; r: Stores.Reader; s: Stores.Store;\r\tBEGIN\r\t\t(* "
                    attr: 0
                  - text: allocate and check new graph
                    attr: 1
                  - text: " *)\r\t\tn := NewGraph(); ASSERT(GraphOk(n), 1);\r\r\t\t(* "
                    attr: 0
                  - text: externalize graph to a temporary file
                    attr: 1
                  - text: " *)\r\t\tf := Files.dir.Temp();\r\t\tw.ConnectTo(f); w.WriteStore(n);\r\r\t\t(* "
                    attr: 0
                  - text: read graph back from file
                    attr: 1
                  - text: " *)\r\t\tr.ConnectTo(f); r.ReadStore(s); m := s(Node);\r\r\t\t(* "
                    attr: 0
                  - text: check graph to be internalized with nodes correctly linked and joined
                    attr: 1
                  - text: " *)\r\t\tASSERT(GraphOk(m), 2);\r\t\tDialog.ShowMsg(\"WriteRead test ok.\")\r\tEND WriteRead;\r\r\r\t(* "
                    attr: 0
                  - text: Demonstrate Copying
                    attr: 1
                  - text: " *)\r\r\tPROCEDURE "
                    attr: 0
                  - text: Copy
                    attr: 3
                  - text: "*;\r\t\tVAR n, m: Node;\r\tBEGIN\r\t\t(* "
                    attr: 0
                  - text: allocate and check new graph
                    attr: 1
                  - text: " *)\r\t\tn := NewGraph(); ASSERT(GraphOk(n), 1);\r\r\t\t(* "
                    attr: 0
                  - text: copy entire graph
                    attr: 1
                  - text: " *)\r\t\tm := Stores.CopyOf(n)(Node);\r\r\t\t(* "
                    attr: 0
                  - text: check graph to be internalized with nodes correctly linked and joined
                    attr: 1
                  - text: " *)\r\t\tASSERT(GraphOk(m), 2);\r\t\tDialog.ShowMsg(\"Copy test ok.\")\r\tEND Copy;\r\rEND ObxStores.\r"
                    attr: 0
