                  - text: "\r\tIMPORT Ports, Stores, Views, Properties;\r\r\tCONST minVersion = 0; maxVersion = 0;\r\r\tTYPE View = POINTER TO RECORD (Views.View) END;\r\r\tPROCEDURE (v: View) Internalize (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER;\r\tBEGIN\r\t\trd.ReadVersion(minVersion, maxVersion, version)\r\tEND Internalize;\r\r\tPROCEDURE (v: View) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteVersion(maxVersion)\r\tEND Externalize;\r\r\tPROCEDURE (v: View) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR w, h, d: INTEGER; col: INTEGER; colors: ARRAY 3 OF Ports.Color;\r\tBEGIN\r\t\tcolors[0] := Ports.red; colors[1] := Ports.green; colors[2] := Ports.blue;\r\t\tv.context.GetSize(w, h);\r\t\td := 4 * f.dot; col := 0;\r\t\tl := 0; t := 0; r := w; b := h;\r\t\tWHILE (r> l) & (b > t) DO\r\t\t\tf.DrawRect(l, t, r, b, f.dot, colors[col]);\r\t\t\tINC(l, d); INC(t, d); DEC(r, d); DEC(b, d); col := (col + 1) MOD 3\r\t\tEND\r\tEND Restore;\r\r\tPROCEDURE (v: View) HandlePropMsg (VAR p: Properties.Message);\r\t\tCONST min = 10 * Ports.mm; max = 160 * Ports.mm; pref = 90 * Ports.mm;\r\tBEGIN\r\t\tWITH p: Properties.SizePref DO\t"
                    attr: 0
                  - text: "(* prevent illegal sizes *)"
                    attr: 1
                  - text: "\r\t\t\tIF p.w = Views.undefined THEN\t"
                    attr: 0
                  - text: "(* no preference for width -> skip *)"
                    attr: 1
                  - text: "\r\t\t\tELSIF p.w < min THEN p.w := min\r\t\t\tELSIF p.w > max THEN p.w := max\r\t\t\tEND;\r\t\t\tIF p.h = Views.undefined THEN p.h := pref\r\t\t\tELSIF p.h < min THEN p.h := min\r\t\t\tELSIF p.h > max THEN p.h := max\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\r\tPROCEDURE "
