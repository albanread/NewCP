                  - text: ", WinApi, Views, HostPorts;\r\r\tTYPE\r\t\tView = POINTER TO RECORD (Views.View)\r\t\t\tbmp: WinApi.HBITMAP;\t"
                    attr: 0
                  - text: "(* handle of bitmap *)"
                    attr: 1
                  - text: "\r\t\t\tw, h: INTEGER\t"
                    attr: 0
                  - text: "(* size of bitmap *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\r\tPROCEDURE (v: View) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR dc, bdc: WinApi.HDC; x, y, res: INTEGER;\r\tBEGIN\r\t\tdc := f.rider(HostPorts.Rider).port.dc;\t"
                    attr: 0
                  - text: "(* get actual dc *)"
                    attr: 1
                  - text: "\r\t\tx := f.gx DIV f.unit;\t"
                    attr: 0
                  - text: "(* get origin of view in dc *)"
                    attr: 1
                  - text: "\r\t\ty := f.gy DIV f.unit;\r\t\tbdc := WinApi.CreateCompatibleDC(dc);\t"
                    attr: 0
                  - text: "(* create dc for bitmap *)"
                    attr: 1
                  - text: "\r\t\tres := WinApi.SelectObject(bdc, v.bmp);\r\t\tres := WinApi.BitBlt(dc, x, y, v.w, v.h, bdc, 0, 0, WinApi.SRCCOPY);\t"
                    attr: 0
                  - text: "(* copy bitmap to screen *)"
                    attr: 1
                  - text: "\r\t\tres := WinApi.DeleteDC(bdc)\r\tEND Restore;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Deposit
                    attr: 3
                  - text: "*;\r\t\tVAR v: View; pat: ARRAY 32 OF INTEGER;\r\tBEGIN\r\t\tNEW(v);\r\t\tpat[0] := 000000000H; pat[1] := 0DCDDDD5DH; pat[2] := 0BABBBB3BH; pat[3] := 076777777H;\r\t\tpat[4] := 0EEEEEE6EH; pat[5] := 0DCDDDD5DH; pat[6] := 0BABBBB3BH; pat[7] := 076777777H;\r\t\tpat[8] := 0EEEEEE6EH; pat[9] := 0DCDDDD5DH; pat[10] := 0BABBBB3BH; pat[11] := 076777777H;\r\t\tpat[12] := 0EEEEEE6EH; pat[13] := 0DCDDDD5DH; pat[14] := 0BABBBB3BH; pat[15] := 076777777H;\r\t\tpat[16] := 0EEEEEE6EH; pat[17] := 0DCDDDD5DH; pat[18] := 0BABBBB3BH; pat[19] := 076777777H;\r\t\tpat[20] := 0EEEEEE6EH; pat[21] := 0DCDDDD5DH; pat[22] := 0BABBBB3BH; pat[23] := 076777777H;\r\t\tpat[24] := 0EEEEEE6EH; pat[25] := 0DCDDDD5DH; pat[26] := 0BABBBB3BH; pat[27] := 076777777H;\r\t\tpat[28] := 0EEEEEE6EH; pat[29] := 0DCDDDD5DH; pat[30] := 0BABBBB3BH; pat[31] := 000000000H;\r\t\tv.bmp := WinApi.CreateBitmap(32, 32, 1, 1, SYSTEM.ADR(pat));\r\t\tv.w := 32; v.h := 32;\r\t\tViews.Deposit(v)\r\tEND Deposit;\r\rEND ObxBitmap.\r"
