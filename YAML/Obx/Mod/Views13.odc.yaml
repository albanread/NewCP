                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Fonts, Ports, Stores, Models, Views, Controllers, Properties;\r\r\tCONST d = 20 * Ports.point;\r\r\tTYPE\r\t\tModel = POINTER TO RECORD (Models.Model)\r\t\t\ti: INTEGER;\t\t\t"
                    attr: 0
                  - text: "(* position of next free slot in string *)"
                    attr: 1
                  - text: "\r\t\t\ts: ARRAY 256 OF CHAR\t"
                    attr: 0
                  - text: "(* string *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\r\t\tView = POINTER TO RECORD (Views.View)\r\t\t\tmodel: Model\r\t\tEND;\r\r\t\t"
                    attr: 0
                  - text: "PasteCharOp = POINTER TO RECORD (Stores.Operation)\r\t\t\tmodel: Model;\r\t\t\tchar: CHAR;\r\t\t\tdo: BOOLEAN\r\t\tEND;"
                    attr: 3
                  - text: "\r\r\r\t"
                    attr: 0
                  - text: "(* PasteCharOp *)"
                    attr: 1
                  - text: "\r\r\t"
                    attr: 0
                  - text: "PROCEDURE (op: PasteCharOp) Do;\r\t\tVAR m: Model; msg: Models.UpdateMsg;\r\tBEGIN\r\t\tm := op.model;\r\t\tIF op.do THEN\t\t\t"
                    attr: 3
                  - text: "(* do operation's transformation *)"
                    attr: 1
                  - text: "\r\t\t\tm.s[m.i] := op.char; INC(m.i)\t"
                    attr: 3
                  - text: "(* insert character into string *)"
                    attr: 1
                  - text: "\r\t\tELSE\t"
                    attr: 3
                  - text: "\t\t\t\t\t"
                    attr: 0
                  - text: "(* undo operation's transformation *)"
                    attr: 1
                  - text: "\r"
                    attr: 3
                  - text: "\t"
                    attr: 0
                  - text: "\t\tDEC(m.i)\t\t\t\t"
                    attr: 3
                  - text: "(* remove character from string *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\t\tm.s[m.i] := 0X;"
                    attr: 3
                  - text: "\r"
                    attr: 0
                  - text: "\t\top.do := ~op.do;"
                    attr: 3
                  - text: "\t\t(* toggle between \"do\" and \"undo\" *)"
                    attr: 1
                  - text: "\r\t\tModels.Broadcast(m, msg)\t"
                    attr: 3
                  - text: "(* update all views on this model *)"
                    attr: 1
                  - text: "\r"
                    attr: 0
                  - text: "\tEND Do;\r\r\tPROCEDURE NewPasteCharOp (m: Model; char: CHAR): PasteCharOp;\r\t\tVAR op: PasteCharOp;\r\tBEGIN\r\t\tNEW(op); op.model := m; op.char := char; op.do := TRUE;\r\t\tRETURN op\r\tEND NewPasteCharOp;"
                    attr: 3
                  - text: "\r\r\r\t"
                    attr: 0
                  - text: "(* Model *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (m: Model) Internalize (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER;\r\tBEGIN\r\t\trd.ReadVersion(0, 0, version);\r\t\tIF ~rd.cancelled THEN\r\t\t\trd.ReadInt(m.i); rd.ReadString(m.s)\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (m: Model) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteVersion(0);\r\t\twr.WriteInt(m.i); wr.WriteString(m.s)\r\tEND Externalize;\r\r\tPROCEDURE (m: Model) CopyFrom (source: Stores.Store);\r\tBEGIN\r\t\tWITH source: Model DO\r\t\t\tm.i := source.i; m.s := source.s\r\t\tEND\r\tEND CopyFrom;\r\r\r\t"
                    attr: 0
                  - text: "(* View *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (v: View) Internalize (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER; st: Stores.Store;\r\tBEGIN\r\t\trd.ReadVersion(0, 0, version);\r\t\tIF ~rd.cancelled THEN\r\t\t\trd.ReadStore(st);\r\t\t\tv.model := st(Model)\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (v: View) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\twr.WriteVersion(0);\r\t\twr.WriteStore(v.model)\r\tEND Externalize;\r\r\tPROCEDURE (v: View) CopyFromModelView (source: Views.View; model: Models.Model);\r\tBEGIN\r\t\tv.model := model(Model)\r\tEND CopyFromModelView;\r\r\tPROCEDURE (v: View) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tf.DrawString(d, d, Ports.black, v.model.s, Fonts.dir.Default())\r\tEND Restore;\r\r\tPROCEDURE (v: View) ThisModel (): Models.Model;\r\tBEGIN\r\t\tRETURN v.model\r\tEND ThisModel;\r\r\tPROCEDURE (v: View) HandleModelMsg (VAR msg: Models.Message);\r\tBEGIN\r\t\tViews.Update(v, Views.keepFrames) "
                    attr: 0
                  - text: " (* restore "
                    attr: 1
                  - text: v
                    attr: 0
                  - text: " in any frame that displays it *)"
                    attr: 1
                  - text: "\r"
                    attr: 3
                  - text: "\tEND HandleModelMsg;\r\r\tPROCEDURE (v: View) HandleCtrlMsg (f: Views.Frame;\r\t\t\t\t\t\t\t\t\t\tVAR msg: Controllers.Message;\r\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\t\tVAR op: Stores.Operation;\r\tBEGIN\r\t\tWITH msg: Controllers.EditMsg DO\r\t\t\tIF msg.op = Controllers.pasteChar THEN\r\t\t\t\t"
                    attr: 0
                  - text: "op := NewPasteCharOp(v.model, msg.char);\t"
                    attr: 3
                  - text: "(* generate operation *)"
                    attr: 1
                  - text: "\r\t\t\t\t"
                    attr: 0
                  - text: "Models.Do(v.model, \"Typing\", op)"
                    attr: 3
                  - text: "\t(* execute operation *)"
                    attr: 1
                  - text: "\r\t\t\tEND\r\t\tELSE\t\t\t\t\t\t"
                    attr: 0
                  - text: "(* ignore other messages *)"
                    attr: 1
                  - text: "\r\t\tEND\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE (v:View) HandlePropMsg (VAR msg: Properties.Message);\r\tBEGIN\r\t\tWITH msg: Properties.SizePref DO\r\t\t\tIF (msg.w = Views.undefined) OR (msg.h = Views.undefined) THEN\r\t\t\t\tmsg.w := 10 * d; msg.h := 2 * d\r\t\t\tEND\r\t\t| msg: Properties.FocusPref DO\r\t\t\tmsg.setFocus := TRUE\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\r\tPROCEDURE Deposit*;\r\t\tVAR v: View; m: Model;\r\tBEGIN\r\t\tNEW(m); m.i := 0; m.s := \"\";\r\t\tNEW(v); v.model := m; Stores.Join(v, m);\r\t\tViews.Deposit(v)\r\tEND Deposit;\r\rEND ObxViews13.\r"
                    attr: 0
