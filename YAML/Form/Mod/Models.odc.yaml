                  - text: "\r\r\tPROCEDURE ThisContext (f: StdModel; view: Views.View): StdContext;\r\t\tVAR c: StdContext;\r\tBEGIN\r\t\tc := f.contexts; WHILE (c # NIL) & (c.view # view) DO c := c.next END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " c\r\tEND ThisContext;\r\r\tPROCEDURE NewContext (form: StdModel; view: Views.View; l, t, r, b: INTEGER): StdContext;\r\t\tVAR c: StdContext;\r\tBEGIN\r\t\tASSERT(form # NIL, 100); ASSERT(view.context = NIL, 101);\r\t\tIF r - l < minViewSize THEN r := l + minViewSize END;\r\t\tIF b - t < minViewSize THEN b := t + minViewSize END;\r\t\tNEW(c); c.form := form; c.view := view; c.l := l; c.t := t; c.r := r; c.b := b;\r\t\tStores.Join(form, view);\r\t\tview.InitContext(c);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " c\r\tEND NewContext;\r\r\tPROCEDURE InsertAbove (c, pos: StdContext);\r\tBEGIN\r\t\tIF pos = NIL THEN\r\t\t\tc.next := NIL; c.form.contexts := c\r\t\tELSE\r\t\t\tc.next := pos.next; pos.next := c\r\t\tEND\r\tEND InsertAbove;\r\r\tPROCEDURE (f: StdModel) Internalize (VAR rd: Stores.Reader);\r\t\tVAR thisVersion, l, t, r, b, x: INTEGER; top, h: StdContext; v: Views.View;\r\tBEGIN\r\t\trd.ReadVersion(minVersion, maxStdVersion, thisVersion);\r\t\tIF ~rd.cancelled THEN\r\t\t\trd.ReadVersion(0, 0, thisVersion); rd.ReadInt(x);\t"
                    attr: 0
                  - text: "(* backward compatibility with Rel. 1.3 *)"
                    attr: 1
                  - text: "\r\t\t\tViews.ReadView(rd, v); top := NIL;\r\t\t\tWHILE v # NIL DO\r\t\t\t\trd.ReadInt(l); rd.ReadInt(t); rd.ReadInt(r); rd.ReadInt(b);\r\t\t\t\th := NewContext(f, v, l, t, r, b);\r\t\t\t\tInsertAbove(h, top); top := h;\r\t\t\t\tViews.ReadView(rd, v)\r\t\t\tEND\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (f: StdModel) Externalize (VAR wr: Stores.Writer);\r\t\tVAR c: StdContext;\r\tBEGIN\r\t\twr.WriteVersion(maxStdVersion);\r\t\twr.WriteVersion(0); wr.WriteInt(0);\t"
                    attr: 0
                  - text: "(* backward compatibility with Rel. 1.3 *)"
                    attr: 1
                  - text: "\r\t\tc := f.contexts;\r\t\tWHILE c # NIL DO\r\t\t\tIF Stores.ExternalizeProxy(c.view) # NIL THEN\r\t\t\t\tViews.WriteView(wr, c.view);\r\t\t\t\twr.WriteInt(c.l); wr.WriteInt(c.t);\r\t\t\t\twr.WriteInt(c.r); wr.WriteInt(c.b)\r\t\t\tEND;\r\t\t\tc := c.next\r\t\tEND;\r\t\twr.WriteStore(NIL)\r\tEND Externalize;\r\r\tPROCEDURE (f: StdModel) CopyFrom (source: Stores.Store);\r\t\tVAR c, top, h: StdContext;\r\tBEGIN\r\t\tWITH source: StdModel DO\r\t\t\tc := source.contexts; top := NIL;\r\t\t\tWHILE c # NIL DO\r\t\t\t\th := NewContext(f, Views.CopyOf(c.view, Views.deep), c.l, c.t, c.r, c.b);\r\t\t\t\tInsertAbove(h, top); top := h;\r\t\t\t\tc := c.next\r\t\t\tEND\r\t\tEND\r\tEND CopyFrom;\r\r\tPROCEDURE (f: StdModel) InitFrom (source: Containers.Model);\r\tBEGIN\r\t\tf.contexts := NIL\r\tEND InitFrom;\r\r\tPROCEDURE (f: StdModel) ReplaceView (old, new: Views.View);\r\t\tVAR op: ReplaceViewOp; c: StdContext;\r\tBEGIN\r\t\tc := ThisContext(f, old); ASSERT(c # NIL, 20);\r\t\tASSERT(new # NIL, 21); ASSERT((new.context = NIL) OR (new.context = c), 23);\r\t\tIF old # new THEN\r\t\t\t(* Stores.InitDomain(new, f.domain); *) Stores.Join(f, new);\r\t\t\tnew.InitContext(c);\t"
                    attr: 0
                  - text: "(* both views share same context *)"
                    attr: 1
                  - text: "\r\t\t\tNEW(op); op.context := c; op.view := new;\r\t\t\tModels.Do(f, \"#System:ReplaceView\", op)\r\t\tEND\r\tEND ReplaceView;\r\r\tPROCEDURE (f: StdModel) Insert (v: Views.View; l, t, r, b: INTEGER);\r\t\tVAR op: FormOp; c, h, top: StdContext;\r\tBEGIN\r\t\tASSERT(v # NIL, 20); ASSERT(v.context = NIL, 22);\r\t\tASSERT(l <= r, 23); ASSERT(t <= b, 24);\r\t\th := f.contexts; top := NIL; WHILE h # NIL DO top := h; h := h.next END;\r\t\tc := NewContext(f, v, l, t, r, b);\r\t\tNEW(op); op.del := NIL; op.ins := c; op.pos := top;\r\t\tModels.Do(f, \"#System:Insertion\", op)\r\tEND Insert;\r\r\tPROCEDURE (f: StdModel) Delete (v: Views.View);\r\t\tVAR op: FormOp; c: StdContext;\r\tBEGIN\r\t\tc := ThisContext(f, v); ASSERT(c # NIL, 20);\r\t\tNEW(op); op.del := c; op.ins := NIL; op.pos := NIL;\r\t\tModels.Do(f, \"#System:Deletion\", op)\r\tEND Delete;\r\r\tPROCEDURE (f: StdModel) Resize (v: Views.View; l, t, r, b: INTEGER);\r\t\tVAR op: ResizeOp; c: StdContext;\r\tBEGIN\r\t\tc := ThisContext(f, v); ASSERT(c # NIL, 20);\r\t\tASSERT(r >= l, 21); ASSERT(b >= t, 22);\r\t\tIF r - l < minViewSize THEN r := l + minViewSize END;\r\t\tIF b - t < minViewSize THEN b := t + minViewSize END;\r\t\tNEW(op); op.context := c; op.l := l; op.t := t; op.r := r; op.b := b;\r\t\tModels.Do(f, \"#System:Resizing\", op)\r\tEND Resize;\r\r\tPROCEDURE (f: StdModel) Top (): Views.View;\r\t\tVAR h, top: StdContext;\r\tBEGIN\r\t\ttop := NIL; h := f.contexts;\r\t\tWHILE h # NIL DO top := h; h := h.next END;\r\t\tIF top # NIL THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " top.view ELSE "
                    attr: 0
