                  - text: "\t(** Guard: StdCmds.ContainerGuard **)\r"
                    attr: 1
                  - text: "\t\tVAR c: Containers.Controller; v: Views.View;\r\t\t\tmsg: Properties.PollMsg; p, q: Properties.Property;\r\t\t\tsetMsg: Properties.SetMsg;\r\r\t\tPROCEDURE Replace(VAR s: ARRAY OF CHAR; IN from, to: ARRAY OF CHAR);\r\t\t\tVAR pos: INTEGER;\r\t\tBEGIN\r\t\t\tStrings.Find(s, from, 0, pos);\r\t\t\tWHILE pos >= 0 DO\r\t\t\t\tStrings.Replace(s, pos, LEN(from$), to);\r\t\t\t\tStrings.Find(s, from, pos + LEN(to$), pos);\r\t\t\tEND\r\t\tEND Replace;\r\r\tBEGIN\r\t\tc := Containers.Focus();\r\t\tIF c # NIL THEN\r\t\t\tc.GetFirstView(Containers.any, v);\r\t\t\tWHILE v # NIL DO\r\t\t\t\tmsg.prop := NIL; Views.HandlePropMsg(v, msg);\r\t\t\t\tp := msg.prop; WHILE (p # NIL) & ~(p IS Controls.Prop) DO p := p.next END;\r\t\t\t\tIF p # NIL THEN\r\t\t\t\t\tq := Properties.CopyOf(p);\r\t\t\t\t\tWITH q: Controls.Prop DO\r\t\t\t\t\t\tIF find.label & (Controls.label IN q.valid) THEN Replace(q.label, find.from, find.to) END;\r\t\t\t\t\t\tIF find.link & (Controls.link IN q.valid) THEN Replace(q.link, find.from, find.to) END;\r\t\t\t\t\t\tIF find.guard & (Controls.guard IN q.valid) THEN Replace(q.guard, find.from, find.to) END;\r\t\t\t\t\t\tIF find.notifier & (Controls.notifier IN q.valid) THEN Replace(q.notifier, find.from, find.to) END\r\t\t\t\t\tEND;\r\t\t\t\t\tsetMsg.prop := q;\r\t\t\t\t\tViews.HandlePropMsg(v, setMsg);\r\t\t\t\tEND;\r\t\t\t\tc.GetNextView(Containers.any, v)\r\t\t\tEND\r\t\tEND\r\tEND Rename;\r\r\r\t"
                    attr: 0
