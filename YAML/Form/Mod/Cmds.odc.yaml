                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT\r\t\tStrings, Dialog, Ports, Stores, Models, Views, Properties, Controls, Containers,\r\t\tFormModels, FormViews, FormControllers, StdCmds; \r\r\tCONST\r\t\tmm = Ports.mm; inch16th = Ports.inch DIV 16;\r\t\tleft = 0; top = 1; right = 2; bottom = 3; row = 4; column = 5;\r\r\tVAR\r\t\t"
                    attr: 0
                  - text: grid
                    attr: 3
                  - text: "*: RECORD\r\t\t\tresolution*: INTEGER;\t"
                    attr: 0
                  - text: "(* resolution > 0 *)"
                    attr: 1
                  - text: "\r\t\t\tmetricSystem*: BOOLEAN\r\t\tEND;\r\r\t\t"
                    attr: 0
                  - text: find
                    attr: 3
                  - text: "*: RECORD\r\t\t\tfrom*, to*: ARRAY 256 OF CHAR;\r\t\t\tlink*, label*, guard*, notifier*: BOOLEAN;\r\t\tEND;\r\r\r\tPROCEDURE FindExtrema (c: FormControllers.Controller; OUT l, t, r, b, h, v: INTEGER;\r\t\t\t\t\t\t\t\t\t\t\tOUT s: FormControllers.List);\r\t\tVAR n: INTEGER; p: FormControllers. List; q: FormModels.Reader; w: Views.View;\r\tBEGIN\t"
                    attr: 0
                  - text: "(* there is at least one view selected *)"
                    attr: 1
                  - text: "\r\t\tl := MAX(INTEGER); t := MAX(INTEGER); r := MIN(INTEGER); b := MIN(INTEGER);\r\t\th := 0; v := 0; n := 0; s := NIL;\r\t\tq := c.form.NewReader(NIL); q.Set(NIL); q.ReadView(w);\r\t\tWHILE w # NIL DO\r\t\t\tIF c.IsSelected(w) THEN\r\t\t\t\tINC(h, q.l); INC(h, q.r); INC(v, q.t); INC(v, q.b); INC(n, 2);\r\t\t\t\tNEW(p); p.next := s; s := p; p.view := w;\r\t\t\t\tIF q.l < l THEN l := q.l END;\r\t\t\t\tIF q.t < t THEN t := q.t END;\r\t\t\t\tIF q.r > r THEN r := q.r END;\r\t\t\t\tIF q.b > b THEN b := q.b END\r\t\t\tEND;\r\t\t\tq.ReadView(w)\r\t\tEND;\r\t\th := h DIV n; v := v DIV n\r\tEND FindExtrema;\r\r\tPROCEDURE Move (c: FormControllers.Controller; s: FormControllers. List; p, side: INTEGER;\r\t\t\t\t\t\t\t\t\tname: Stores.OpName);\r\t\tVAR script: Stores.Operation; w, h: INTEGER; l, t, r, b: INTEGER; s0: FormControllers.List;\r\tBEGIN\r\t\ts0 := s;\r\t\tModels.BeginScript(c.form, name, script);\r\t\tWHILE s # NIL DO\r\t\t\ts.view.context(FormModels.Context).GetRect(l, t, r, b); w := r - l; h := b - t;\r\t\t\tIF side = left THEN\r\t\t\t\tl := p; r := l + w\r\t\t\tELSIF side = top THEN\r\t\t\t\tt := p; b := t + h\r\t\t\tELSIF side = right THEN\r\t\t\t\tr := p; l := r - w\r\t\t\tELSIF side = bottom THEN\r\t\t\t\tb := p; t := b - h\r\t\t\tELSIF side = row THEN\r\t\t\t\tt := p - h DIV 2; b := t + h\r\t\t\tELSIF side = column THEN\r\t\t\t\tl := p - w DIV 2; r := l + w\r\t\t\tEND;\r\t\t\tc.form.Resize(s.view, l, t, r, b);\r\t\t\ts := s.next\r\t\tEND;\r\t\tModels.EndScript(c.form, script);\r\t\tWHILE s0 # NIL DO c.Select(s0.view); s0 := s0.next END\r\tEND Move;\r\r\tPROCEDURE "
                    attr: 0
                  - text: AlignLeft
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** Guard: SelectionGuard **)"
                    attr: 1
                  - text: "\r\t\tVAR c: FormControllers.Controller; l, t, r, b, h, v: INTEGER; s: FormControllers.List;\r\tBEGIN\r\t\tc := FormControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tFindExtrema(c, l, t, r, b, h, v, s); Move(c, s, l, left, \"#Form:AlignLeft\")\r\t\tEND\r\tEND AlignLeft;\r\r\tPROCEDURE "
                    attr: 0
                  - text: AlignRight
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** Guard: SelectionGuard **)"
                    attr: 1
                  - text: "\r\t\tVAR c: FormControllers.Controller; l, t, r, b, h, v: INTEGER; s: FormControllers.List;\r\tBEGIN\r\t\tc := FormControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tFindExtrema(c, l, t, r, b, h, v, s); Move(c, s, r, right, \"#Form:AlignRight\")\r\t\tEND\r\tEND AlignRight;\r\r\tPROCEDURE "
                    attr: 0
                  - text: AlignTop
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** Guard: SelectionGuard **)"
                    attr: 1
                  - text: "\r\t\tVAR c: FormControllers.Controller; l, t, r, b, h, v: INTEGER; s: FormControllers.List;\r\tBEGIN\r\t\tc := FormControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tFindExtrema(c, l, t, r, b, h, v, s); Move(c, s, t, top, \"#Form:AlignTop\")\r\t\tEND\r\tEND AlignTop;\r\r\tPROCEDURE "
                    attr: 0
