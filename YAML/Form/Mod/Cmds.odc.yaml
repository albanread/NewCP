                    attr: 1
                  - text: "\r\t\tVAR c: FormControllers.Controller;\r\tBEGIN\r\t\tc := FormControllers.Focus();\r\t\tpar.disabled := (c = NIL) OR (c.Singleton() = NIL)\r\tEND SingletonGuard;\r\rBEGIN\r\tfind.link := TRUE; find.label := TRUE; find.guard := TRUE; find.notifier := TRUE\rEND FormCmds.\r"
                    attr: 0
