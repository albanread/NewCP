                  - text: "\r\t\tVAR c: FormControllers.Controller;\r\tBEGIN\r\t\tc := FormControllers.Focus();\r\t\tpar.disabled := (c = NIL) OR ~c.HasSelection()\r\tEND SelectionGuard;\r\r\tPROCEDURE "
                    attr: 0
