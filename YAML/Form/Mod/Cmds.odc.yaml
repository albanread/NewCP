                  - text: "(** Guard: SelectionGuard **)"
                    attr: 1
                  - text: "\r\t\tVAR c: FormControllers.Controller; l, t, r, b, h, v: INTEGER; s: FormControllers.List;\r\tBEGIN\r\t\tc := FormControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tFindExtrema(c, l, t, r, b, h, v, s); Move(c, s, b, bottom, \"#Form:AlignBottom\")\r\t\tEND\r\tEND AlignBottom;\r\r\tPROCEDURE "
                    attr: 0
                  - text: AlignToRow
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** Guard: SelectionGuard **)"
                    attr: 1
                  - text: "\r\t\tVAR c: FormControllers.Controller; l, t, r, b, h, v: INTEGER; s: FormControllers.List;\r\tBEGIN\r\t\tc := FormControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tFindExtrema(c, l, t, r, b, h, v, s); Move(c, s, v, row, \"#Form:AlignHorizontal\")\r\t\tEND\r\tEND AlignToRow;\r\r\tPROCEDURE "
                    attr: 0
                  - text: AlignToColumn
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** Guard: SelectionGuard **)"
                    attr: 1
                  - text: "\r\t\tVAR c: FormControllers.Controller; l, t, r, b, h, v: INTEGER; s: FormControllers.List;\r\tBEGIN\r\t\tc := FormControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tFindExtrema(c, l, t, r, b, h, v, s); Move(c, s, h, column, \"#Form:AlignVertical\")\r\t\tEND\r\tEND AlignToColumn;\r\r\r\tPROCEDURE "
                    attr: 0
                  - text: SelectOffGridViews
                    attr: 3
                  - text: "*;\r\t\tVAR c: FormControllers.Controller; v: Views.View; h: FormModels.Reader;\r\t\t\tl, t, r, b, l0, t0, r0, b0: INTEGER;\r\tBEGIN\r\t\tc := FormControllers.Focus();\r\t\tIF c # NIL THEN\r\t\t\tc.SelectAll(FALSE);\r\t\t\th := c.form.NewReader(NIL);\r\t\t\th.ReadView(v);\r\t\t\tWHILE v # NIL DO\r\t\t\t\tv.context(FormModels.Context).GetRect(l, t, r, b);\r\t\t\t\tl0 := l; t0 := t; r0 := r; b0 := b;\r\t\t\t\tFormViews.RoundToGrid(c.view, l0, t0);\r\t\t\t\tFormViews.RoundToGrid(c.view, r0, b0);\r\t\t\t\tIF (l0 # l) OR (t0 # t) OR (r0 # r) OR (b0 # b) THEN c.Select(v) END;\r\t\t\t\th.ReadView(v)\r\t\t\tEND\r\t\tEND\r\tEND SelectOffGridViews;\r\r\r\tPROCEDURE Selection (c: FormControllers.Controller): FormControllers.List;\r\t\tVAR p, q: FormControllers. List; h: FormModels.Reader; v: Views.View;\r\tBEGIN\r\t\tp := NIL;\r\t\th := c.form.NewReader(NIL); h.Set(NIL); h.ReadView(v);\r\t\tWHILE v # NIL DO\r\t\t\tIF c.IsSelected(v) THEN NEW(q); q.next := p; p := q; q.view := v END;\r\t\t\th.ReadView(v)\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " p\r\tEND Selection;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ForceToGrid
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** Guard: SelectionGuard **)"
                    attr: 1
                  - text: "\r\t\tVAR c: FormControllers.Controller;\r\t\t\tl, t, r, b: INTEGER; sel, sel0: FormControllers.List; s: Stores.Operation;\r\tBEGIN\r\t\tc := FormControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tModels.BeginScript(c.form, \"#Form:ForceToGrid\", s);\r\t\t\tsel := Selection(c); sel0 := sel;\r\t\t\tWHILE sel # NIL DO\r\t\t\t\tsel.view.context(FormModels.Context).GetRect(l, t, r, b);\r\t\t\t\tFormViews.RoundToGrid(c.view, l, t);\r\t\t\t\tFormViews.RoundToGrid(c.view, r, b);\r\t\t\t\tc.form.Resize(sel.view, l, t, r, b);\r\t\t\t\tsel := sel.next\r\t\t\tEND;\r\t\t\tModels.EndScript(c.form, s);\r\t\t\tWHILE sel0 # NIL DO c.Select(sel0.view); sel0 := sel0.next END\r\t\tEND\r\tEND ForceToGrid;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SortViews
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** Guard: FocusGuard **)"
                    attr: 1
                  - text: "\r\t\tVAR c: FormControllers.Controller; script: Stores.Operation;\r\t\t\tr: FormModels.Reader; p, q: Views.View;\r\r\t\tPROCEDURE IsAbove (p, q: Views.View): BOOLEAN;\r\t\t\tVAR l0, l1, t0, t1, r, b: INTEGER;\r\t\tBEGIN\r\t\t\tp.context(FormModels.Context).GetRect(l0, t0, r, b);\r\t\t\tq.context(FormModels.Context).GetRect(l1, t1, r, b);\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " (t0 < t1) OR (t0 = t1) & (l0 <= l1)\r\t\tEND IsAbove;\r\r\tBEGIN\r\t\tc := FormControllers.Focus();\r\t\tIF (c # NIL) & (c.form.NofViews() > 1) THEN\r\t\t\tc.SelectAll(FALSE);\r\t\t\tModels.BeginScript(c.form, \"#Form:ChangeZOrder\", script);\r\t\t\tr := c.form.NewReader(NIL);\r\t\t\tREPEAT\t"
                    attr: 0
                  - text: "(* bubble sort *)"
                    attr: 1
                  - text: "\r\t\t\t\tr.Set(NIL); r.ReadView(p); r.ReadView(q);\r\t\t\t\tWHILE (q # NIL) & IsAbove(p, q) DO p := q; r.ReadView(q) END;\r\t\t\t\tIF q # NIL THEN c.form.PutAbove(p, q) END\r\t\t\tUNTIL q = NIL;\r\t\t\tModels.EndScript(c.form, script);\r\t\t\tc.SelectAll(TRUE)\r\t\tEND\r\tEND SortViews;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SetAsFirst
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** Guard: SingletonGuard **)"
                    attr: 1
                  - text: "\r\t"
                    attr: 0
                  - text: "(** send to back **)"
                    attr: 1
                  - text: "\r\t\tVAR c: FormControllers.Controller; v: Views.View;\r\tBEGIN\r\t\tc := FormControllers.Focus();\r\t\tIF c # NIL THEN\r\t\t\tv := c.Singleton();\r\t\t\tIF v # NIL THEN\r\t\t\t\tc.form.PutAbove(v, NIL);\r\t\t\t\tc.SetSingleton(v)\r\t\t\tEND\r\t\tEND\r\tEND SetAsFirst;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SetAsLast
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** Guard: SingletonGuard **)"
                    attr: 1
                  - text: "\r\t"
                    attr: 0
                  - text: "(** bring to front **)"
                    attr: 1
                  - text: "\r\t\tVAR c: FormControllers.Controller; v, p, q: Views.View; r: FormModels.Reader;\r\tBEGIN\r\t\tc := FormControllers.Focus();\r\t\tIF c # NIL THEN\r\t\t\tv := c.Singleton();\r\t\t\tIF v # NIL THEN\r\t\t\t\tr := c.form.NewReader(NIL); r.Set(v); p := v;\r\t\t\t\tREPEAT q := p; r.ReadView(p) UNTIL p = NIL;\r\t\t\t\tc.form.PutAbove(v, q);\r\t\t\t\tc.SetSingleton(v)\r\t\t\tEND\r\t\tEND\r\tEND SetAsLast;\r\r\tPROCEDURE "
                    attr: 0
                  - text: InsertAround
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** Guard: SelectionGuard **)"
                    attr: 1
                  - text: "\r\t\tCONST d = 3 * Ports.mm;\r\t\tVAR c: FormControllers.Controller; v: Views.View; rd: FormModels.Reader; l, t, r, b: INTEGER;\r\t\t\ts: Stores.Operation;\r\tBEGIN\r\t\tASSERT(Views.Available() = 1, 20);\r\t\tc := FormControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tl := MAX(INTEGER); t := MAX(INTEGER); r := MIN(INTEGER); b := MIN(INTEGER);\r\t\t\trd := c.form.NewReader(NIL); rd.ReadView(v);\r\t\t\tWHILE v # NIL DO\r\t\t\t\tIF c.IsSelected(v) THEN\r\t\t\t\t\tIF rd.l < l THEN l := rd.l END;\r\t\t\t\t\tIF rd.t < t THEN t := rd.t END;\r\t\t\t\t\tIF rd.r > r THEN r := rd.r END;\r\t\t\t\t\tIF rd.b > b THEN b := rd.b END\r\t\t\t\tEND;\r\t\t\t\trd.ReadView(v)\r\t\t\tEND;\r\t\t\tASSERT(l < r, 100);\r\t\t\tDEC(l, d); DEC(t, 3 * d); INC(r, d); INC(b, d);\r\t\t\tFormViews.RoundToGrid(c.view, l, t);\r\t\t\tFormViews.RoundToGrid(c.view, r, b);\r\t\t\tViews.Fetch(v);\r\t\t\tModels.BeginScript(c.form, \"#Form:InsertAround\", s);\r\t\t\tc.form.Insert(v, l, t, r, b);\r\t\t\tc.form.PutAbove(v, NIL);\r\t\t\tModels.EndScript(c.form, s);\r\t\t\tc.SetSingleton(v)\r\t\tELSE\r\t\t\tStdCmds.PasteView\r\t\tEND\r\tEND InsertAround;\r\r\tPROCEDURE "
                    attr: 0
                  - text: InitGridDialog
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** Guard: FocusGuard **)"
                    attr: 1
                  - text: "\r\t\tVAR c: FormControllers.Controller; g: INTEGER;\r\tBEGIN\r\t\tc := FormControllers.Focus();\r\t\tIF c # NIL THEN\r\t\t\tg := c.view.Grid();\r\t\t\tIF g MOD mm = 0 THEN\r\t\t\t\tgrid.resolution := g DIV mm;\r\t\t\t\tgrid.metricSystem := TRUE\r\t\t\tELSIF g MOD inch16th = 0 THEN\r\t\t\t\tgrid.resolution := g DIV inch16th;\r\t\t\t\tgrid.metricSystem := FALSE\r\t\t\tELSIF Dialog.metricSystem THEN\r\t\t\t\tgrid.resolution := g DIV mm;\r\t\t\t\tgrid.metricSystem := TRUE\r\t\t\tELSE\r\t\t\t\tgrid.resolution := g  DIV inch16th;\r\t\t\t\tgrid.metricSystem := FALSE\r\t\t\tEND;\r\t\t\tDialog.Update(grid)\r\t\tEND\r\tEND InitGridDialog;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SetGrid
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** Guard: FocusGuard **)"
                    attr: 1
                  - text: "\r\t\tVAR c: FormControllers.Controller; n: INTEGER;\r\tBEGIN\r\t\tc := FormControllers.Focus();\r\t\tIF (c # NIL) & (grid.resolution > 0) THEN\r\t\t\tIF grid.metricSystem THEN\r\t\t\t\tn := 10 DIV grid.resolution;\r\t\t\t\tIF n < 1 THEN n := 1 END;\r\t\t\t\tc.view.SetGrid(grid.resolution * mm, n)\r\t\t\tELSE\r\t\t\t\tn := 8 DIV grid.resolution;\r\t\t\t\tIF n < 1 THEN n := 1 END;\r\t\t\t\tc.view.SetGrid(grid.resolution * inch16th, n)\r\t\t\tEND\r\t\tEND\r\tEND SetGrid;\r\r"
                    attr: 0
                  - text: "\t(** renaming of controls **)\r"
                    attr: 1
                  - text: "\r\tPROCEDURE "
                    attr: 0
                  - text: Rename
                    attr: 3
