                    attr: 1
                  - text: "\r\t\t\tborder: INTEGER;\t"
                    attr: 0
                  - text: "(* border >= minBorder *)"
                    attr: 1
                  - text: "\r\t\t\tgrid: INTEGER;\t"
                    attr: 0
                  - text: "(* grid > 0 *)"
                    attr: 1
                  - text: "\r\t\t\tgridFactor: INTEGER;\t"
                    attr: 0
                  - text: "(* gridFactor > 0 *)"
                    attr: 1
                  - text: "\r\t\t\tbackground: Ports.Color\r\t\tEND;\r\r\r\tVAR\r\t\t"
                    attr: 0
                  - text: dir
                    attr: 3
                  - text: "-, "
                    attr: 0
                  - text: stdDir
                    attr: 3
                  - text: "-: Directory;\r\t\t"
                    attr: 0
                  - text: ctrldir
                    attr: 3
                  - text: "-: Containers.Directory;\r\r\r\t"
                    attr: 0
                  - text: "(** View **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (v: View) "
                    attr: 0
                  - text: Internalize2
                    attr: 3
                  - text: "- (VAR rd: Stores.Reader), EXTENSIBLE;\r\t\tVAR thisVersion: INTEGER;\r\tBEGIN\r\t\tIF ~rd.cancelled THEN\r\t\t\trd.ReadVersion(minVersion, maxBaseVersion, thisVersion);\r\t\t\tIF~ rd.cancelled THEN\r\t\t\t\tIF thisVersion IN {0, 1} THEN\r\t\t\t\t\tWITH v: StdView DO\t"
                    attr: 0
                  - text: "(* backward compatibility with Rel. 1.3 *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\trd.ReadInt(v.border);\r\t\t\t\t\t\trd.ReadInt(v.grid);\r\t\t\t\t\t\trd.ReadXInt(v.gridFactor);\r\t\t\t\t\t\tIF thisVersion = 1 THEN\r\t\t\t\t\t\t\trd.ReadInt(v.background)\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tv.background := Ports.defaultColor\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND Internalize2;\r\r\tPROCEDURE (v: View) "
                    attr: 0
                  - text: Externalize2
                    attr: 3
