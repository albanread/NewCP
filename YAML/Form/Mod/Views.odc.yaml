                  - text: "(* grid > 0 *)"
                    attr: 1
                  - text: "\r\t\t\tgridFactor: INTEGER;\t"
                    attr: 0
                  - text: "(* gridFactor > 0 *)"
                    attr: 1
                  - text: "\r\t\t\tbackground: Ports.Color;\r\t\t\tcache: FormModels.Reader\t"
                    attr: 0
                  - text: "(* reuse form reader *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\r\t\tStdDirectory = POINTER TO RECORD (Directory) END;\r\r\r\t\tViewOp = POINTER TO RECORD (Stores.Operation)\r\t\t\tview: StdView;\t"
                    attr: 0
