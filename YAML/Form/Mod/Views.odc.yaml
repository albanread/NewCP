                  - text: "\r\tIMPORT Dialog, Ports, Stores, Models, Views, Controllers, Properties, Containers, FormModels;\r\r\tCONST\r\t\t"
                    attr: 0
                  - text: "(** minimal border between form view and any embedded view: **)"
                    attr: 1
                  - text: "\r\t\t"
                    attr: 0
                  - text: minBorder
                    attr: 3
                  - text: "* = 4 * Ports.point; "
                    attr: 0
                  - text: maxBorder
                    attr: 3
                  - text: "* = 100 * Ports.mm;\r\t\tmaxSize = 600 * Ports.mm;\r\t\t"
                    attr: 0
                  - text: "(* range of currently supported versions *)"
                    attr: 1
                  - text: "\r\t\tminVersion = 0; maxBaseVersion = 2; maxStdVersion = 1;\r\r\tTYPE\r\t\t"
                    attr: 0
                  - text: View
                    attr: 3
                  - text: "* = POINTER TO ABSTRACT RECORD (Containers.View) END;\r\r\t\t"
                    attr: 0
                  - text: Directory
                    attr: 3
                  - text: "* = POINTER TO ABSTRACT RECORD END;\r\r\r\t\tStdView = POINTER TO RECORD (View)\r\t\t\tborder: INTEGER;\r\t\t\tgrid: INTEGER;\t"
