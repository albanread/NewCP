                    attr: 3
                  - text: "* (): FormModels.Model, EXTENSIBLE;\r\t\tVAR m: Containers.Model;\r\tBEGIN\r\t\tm := v.ThisModel^();\r\t\tIF m = NIL THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL ELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " m(FormModels.Model) END\r\tEND ThisModel;\r\r\tPROCEDURE (v: View) "
