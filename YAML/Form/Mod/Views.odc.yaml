                    attr: 0
                  - text: SetGrid
                    attr: 3
                  - text: "* (grid, gridFactor: INTEGER), NEW, ABSTRACT;\r\t"
                    attr: 0
                  - text: "(**\r\t\tgrid > 0\t20\r\t\tgridFactor > 0\t21\r\t**)"
                    attr: 1
