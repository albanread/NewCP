                  - text: "\r\t\tELSIF c.sel.next = NIL THEN\r\t\t\tContainers.MarkSingleton(c, f, show)\r\t\tELSE\r\t\t\tMarkList(c, f, c.sel, show)\r\t\tEND\r\tEND MarkSelection;\r\r\r\t"
                    attr: 0
