                    attr: 0
                  - text: "\r\t"
                    attr: 1
                  - text: "\tIF ~isSingle & (v IS FormViews.View) THEN\r\t\t\tm := v(FormViews.View).ThisModel();\r\t\t\trd := m.NewReader(NIL); wr := c.form.NewWriter(NIL);\r\t\t\trd.ReadView(s); p := NIL;\r\t\t\tWHILE s # NIL DO\r\t\t\t\tl := rd.l + dx; t := rd.t + dy; sw := rd.r - rd.l; sh := rd.b - rd.t;\r\t\t\t\tFormViews.RoundToGrid(c.view, l, t);\r\t\t\t\ts := Views.CopyOf(s, Views.shallow);\r\t\t\t\twr.WriteView(s, l, t, l + sw, t + sh);\r\t\t\t\tNEW(q); q.next := p; p := q; q.view := s;\r\t\t\t\trd.ReadView(s)\r\t\t\tEND;\r\t\t\tc.SetSelection(p)\r\t\tELSE\r\t\t\tFormViews.RoundToGrid(c.view, dx, dy);\r\t\t\tc.form.GetEmbeddingLimits(minW, maxW, minH, maxH);\r\t\t\tProperties.PreferredSize(v, minW, maxW, minH, maxH, minW, minH, w, h);\r\t\t\tc.form.Insert(v, dx, dy, dx + w, dy + h); c.Select(v)\r\t\tEND\r\tEND Drop;\r\r\r\t"
