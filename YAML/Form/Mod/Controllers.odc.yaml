                  - text: "\r\t\t\t\t\tview := c.sel.view;\r\t\t\t\t\tmsg.list := c.sel; c.sel := NIL; \r\t\t\t\t\tmsg.show := TRUE; Views.Broadcast(c.view, msg);\r\t\t\t\t\tc.SetSingleton(view)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND Deselect;\r\r\tPROCEDURE (c: StdController) IsSelected (view: Views.View): BOOLEAN;\r\t\tVAR l: List;\r\tBEGIN\r\t\tIF view # NIL THEN\r\t\t\tASSERT(view.context.ThisModel() = c.form, 20);\r\t\t\tl := c.sel; WHILE (l # NIL) & (l.view # view) DO l := l.next END;\r\t\t\t"
                    attr: 0
