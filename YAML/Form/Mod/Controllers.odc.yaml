                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE\r\t\tEND\r\tEND IsSelected;\r\r\tPROCEDURE (c: StdController) GetSelection (): List;\r\t\tVAR l, h, s: List;\r\tBEGIN\r\t\tl := NIL; s := c.sel;\r\t\tWHILE s # NIL DO NEW(h); h.next := l; l := h; h.view := s.view; s := s.next END;\r\t\t"
                    attr: 0
