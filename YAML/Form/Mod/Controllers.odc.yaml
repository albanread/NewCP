                  - text: " TRUE\r\tEND HasCaret;\r\r\tPROCEDURE (c: StdController) MarkCaret (f: Views.Frame; show: BOOLEAN);\r\tEND MarkCaret;\r\r\r\t"
                    attr: 0
                  - text: "(* FormController protocol *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (c: StdController) Select (view: Views.View);\r\t\tVAR l, h, sel: List; msg: MarkMsg;\r\tBEGIN\r\t\tASSERT(view # NIL, 20); ASSERT(view.context.ThisModel() = c.form, 21);\r\t\tASSERT(~(Containers.noSelection IN c.opts), 22);\r\t\tl := c.sel; WHILE (l # NIL) & (l.view # view) DO l := l.next END;\r\t\tIF l = NIL THEN\t"
                    attr: 0
                  - text: "(* view is not yet selected *)"
                    attr: 1
                  - text: "\r\t\t\tsel := c.sel;\r\t\t\tIF sel = NIL THEN\r\t\t\t\tc.SetSingleton(view)\r\t\t\tELSE\r\t\t\t\tNEW(l); l.view := view;\r\t\t\t\tIF sel.next = NIL THEN\r\t\t\t\t\tc.SetSingleton(NIL); ASSERT(c.sel = NIL, 100);\r\t\t\t\t\tl.next := sel; c.sel := l;\r\t\t\t\t\tmsg.list := l\r\t\t\t\tELSE\r\t\t\t\t\tl.next := sel; c.sel := l;\r\t\t\t\t\tNEW(h); h.view := view;\r\t\t\t\t\tmsg.list := h\r\t\t\t\tEND;\r\t\t\t\tmsg.show := TRUE; Views.Broadcast(c.view, msg)\r\t\t\tEND\r\t\tEND\r\tEND Select;\r\r\tPROCEDURE (c: StdController) Deselect (view: Views.View);\r\t\tVAR l, h: List; msg: MarkMsg;\r\tBEGIN\r\t\tASSERT(view # NIL, 20); ASSERT(view.context.ThisModel() = c.form, 21);\r\t\tl := c.sel; h := NIL; WHILE (l # NIL) & (l.view # view) DO h := l; l := l.next END;\r\t\tIF l # NIL THEN\t"
                    attr: 0
                  - text: "(* l is selection node of view, h its predecessor *)"
                    attr: 1
                  - text: "\r\t\t\tIF (h = NIL) & (l.next = NIL) THEN\t"
                    attr: 0
                  - text: "(* singleton *)"
                    attr: 1
                  - text: "\r\t\t\t\tc.SetSingleton(NIL)\r\t\t\tELSE\r\t\t\t\tIF h = NIL THEN c.sel := l.next ELSE h.next := l.next END;\r\t\t\t\tmsg.list:= l; l.next := NIL; msg.show := FALSE; Views.Broadcast(c.view, msg);\r\t\t\t\tIF (c.sel # NIL) & (c.sel.next = NIL) THEN\t"
                    attr: 0
                  - text: "(* singleton *)"
