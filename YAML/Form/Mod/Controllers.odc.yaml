                  - text: "\r\t\t\t\tc.SetSingleton(NIL)\r\t\t\tELSE\r\t\t\t\tmsg.list := c.sel; c.sel := NIL; \r\t\t\t\tmsg.show := FALSE; Views.Broadcast(c.view, msg)\r\t\t\tEND\r\t\tEND\r\tEND SelectAll;\r\r\tPROCEDURE (c: StdController) InSelection (f: Views.Frame; x, y: INTEGER): BOOLEAN;\r\t\tVAR g: Views.Frame;\r\tBEGIN\r\t\tg := Views.FrameAt(f, x, y);\r\t\tIF g # NIL THEN\r\t\t\t"
