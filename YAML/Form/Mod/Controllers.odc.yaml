                    attr: 3
                  - text: " c.sel # NIL\r\tEND HasSelection;\r\r\tPROCEDURE (c: StdController) Selectable (): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " c.form.NofViews() # 0\r\tEND Selectable;\r\r\tPROCEDURE (c: StdController) SetSingleton (s: Views.View);\r\t\tVAR l: List;\r\tBEGIN\r\t\tc.SetSingleton^(s);\r\t\tIF s # NIL THEN NEW(l); l.view := s; c.sel := l ELSE c.sel := NIL END\r\tEND SetSingleton;\r\r\tPROCEDURE (c: StdController) SelectAll (select: BOOLEAN);\r\t\tVAR s: FormModels.Reader; v: Views.View; l, h: List; msg: MarkMsg;\r\tBEGIN\r\t\tIF select THEN\r\t\t\tASSERT(~(Containers.noSelection IN c.opts), 20);\r\t\t\tc.SetFocus(NIL);\r\t\t\ts := c.form.NewReader(c.reader); c.reader := s;\r\t\t\ts.Set(NIL); s.ReadView(v);\r\t\t\tIF c.form.NofViews() = 1 THEN\r\t\t\t\tASSERT(v # NIL, 100);\r\t\t\t\tc.SetSingleton(v)\r\t\t\tELSE\r\t\t\t\tIF (c.sel # NIL) & (c.sel.next = NIL) THEN c.SetSingleton(NIL) END;\r\t\t\t\tl := NIL;\r\t\t\t\tWHILE v # NIL DO\r\t\t\t\t\tIF ~c.IsSelected(v) THEN NEW(h); h.next := l; l := h; h.view := v END;\r\t\t\t\t\ts.ReadView(v)\r\t\t\t\tEND;\r\t\t\t\tmsg.list := l;\r\t\t\t\th := c.sel; WHILE (h # NIL) & (h.next # NIL) DO h := h.next END;\r\t\t\t\tIF h = NIL THEN c.sel := l ELSE h.next := l END;\r\t\t\t\tIF msg.list # NIL THEN msg.show := TRUE; Views.Broadcast(c.view, msg) END\r\t\t\tEND\r\t\tELSIF c.sel # NIL THEN\r\t\t\tIF c.sel.next = NIL THEN\t"
                    attr: 0
