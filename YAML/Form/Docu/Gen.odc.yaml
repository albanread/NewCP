                  - text: "\r\rDEFINITION FormGen;\r\r\tIMPORT Dialog;\r\r\tVAR\r\t\tnew: RECORD \r\t\t\tlink: Dialog.String\r\t\tEND;\r\r\tPROCEDURE Create;\r\tPROCEDURE Empty;\r\tPROCEDURE CreateGuard (VAR par: Dialog.Par);\r\rEND FormGen.\r\r\r"
                    attr: 1
                  - text: FormGen
                    attr: 2
                  - text: " is a generator for a form layout. It takes the name of an interactor variable (any exported record) as input and creates a default layout for the fields of the interactor. The following list describes the mapping from field types to controls.\r\r"
                    attr: 1
                  - ruler:
