                      right: 216000
                      lead: 11500
                      asc: 121900
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000003
                      tabs:
                        - { stop: 2520000 }
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "BYTE, SHORTINT, INTEGER\tField\rSHORTREAL, REAL\tField\rARRAY OF CHAR\tField\rBOOLEAN\tCheckBox\rDates.Date\tDateField\rDates.Time\tTimeField\rDialog.Color\tColorField\rDialog.Currency\tField\rDialog.List\tListBox\rDialog.Selection\tSelectionBox\rDialog.Combo\tComboBox\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 0
                      lead: 11500
                      asc: 121900
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000003
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "\rAlternatively, a dialog for all interactors of a module can be generated, by entering the module name into the dialog box field. In this case, a group box is generated for every exported record variable, and a command button for every exported parameterless procedure.\r\rA possible menu using the above commands:\r\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 0
                      lead: 11500
                      asc: 121900
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 144000 }
                        - { stop: 1656000 }
                        - { stop: 1872000 }
                        - { stop: 4140000 }
                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: MENU
                    attr: 3
                  - text: " \"Form\"\r\t\"&New Form...\"\t\"\"\t\"StdCmds.OpenAuxDialog('Form/Rsrc/Gen', 'New Form')\"\t\"\"\rEND\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 0
                      lead: 11500
                      asc: 121900
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000001
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "\r\rVAR "
                    attr: 1
                  - text: new
                    attr: 3
                  - text: "\rInteractor for the form generator dialog.\r\r"
                    attr: 1
                  - text: link
                    attr: 3
                  - text: ": Dialog.String\rThe name of the interactor for which a default layout should be generated. The name must be an identifier qualified with the module name, e.g., \"FormGen.new\", or only a module name, e.g., \"FormGen\".\r\rPROCEDURE "
                    attr: 1
                  - text: Create
                    attr: 3
                  - text: "\rGuard: CreateGuard\rCreate a default layout for the interactor specified in "
                    attr: 1
                  - text: link
                    attr: 2
                  - text: ".\r\rPROCEDURE "
                    attr: 1
                  - text: Empty
                    attr: 3
                  - text: "\rCreate an empty form layout.\r\rPROCEDURE "
                    attr: 1
                  - text: CreateGuard
                    attr: 3
                  - text: "\rGuard for "
                    attr: 1
                  - text: Create
                    attr: 2
                  - text: ".\r"
