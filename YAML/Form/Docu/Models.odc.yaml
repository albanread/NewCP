                  - text: ".\r\rPre\rpos in Base(r)  OR  pos = NIL\t20\r\rPROCEDURE (r: Reader) "
                    attr: 1
                  - text: ReadView
                    attr: 3
                  - text: " (OUT v: Views.View)\rNEW, ABSTRACT\rReads the next view, in ascending order. If there is none, "
                    attr: 1
                  - text: v
                    attr: 2
                  - text: " is set to "
                    attr: 1
                  - text: NIL
                    attr: 2
                  - text: ". The reader's "
                    attr: 1
                  - text: view
                    attr: 2
                  - text: " and "
                    attr: 1
                  - text: "l, t, r, b"
                    attr: 2
                  - text: " fields will be set accordingly ("
                    attr: 1
                  - text: "l, t, r, b"
                    attr: 2
                  - text: " are undefined if view is"
                    attr: 1
                  - text: " NIL"
                    attr: 2
                  - text: ").\r\rPost\rv = r.view\r\r\rTYPE "
                    attr: 1
                  - text: Writer
                    attr: 3
                  - text: "\rABSTRACT\rOutput rider on a form.\r\rPROCEDURE (w: Writer) "
                    attr: 1
                  - text: Set
                    attr: 3
                  - text: " (pos: Views.View)\rInterface\rSet position of writer "
                    attr: 1
                  - text: w
                    attr: 2
                  - text: " to the view above "
                    attr: 1
                  - text: "pos "
                    attr: 2
                  - text: "(i.e., the next view to be written will be inserted directly above "
                    attr: 1
                  - text: pos
                    attr: 2
                  - text: ") or to the bottom if "
                    attr: 1
                  - text: pos = NIL
                    attr: 2
                  - text: ".\r\rPre\rpos in Base(r)  OR  pos = NIL\t20\r\rPROCEDURE (w: Writer) "
                    attr: 1
                  - text: WriteView
                    attr: 3
                  - text: " (v: Views.View; l, t, r, b: INTEGER)\rNEW, ABSTRACT\rInsert view "
                    attr: 1
                  - text: v
                    attr: 2
                  - text: " at the current position in "
                    attr: 1
                  - text: w
                    attr: 2
                  - text: "'s form.\r\rPre\rv # NIL\t20\rv.context = NIL\t22\rl <= r\t23\rt <= b\t24\r\rPost\rv.context # NIL\r\r\rTYPE "
                    attr: 1
                  - text: UpdateMsg
                    attr: 3
                  - text: "\rThis message indicates that a rectangular part of a form needs to be updated on the screen.\rThe receiver must not switch on any marks as a reaction to having received this message.\rUpdateMsgs are sent by concrete form model implementations after any view modifications.\rUpdateMsgs are not extended.\r\r\rVAR "
                    attr: 1
                  - text: dir
                    attr: 3
                  - text: "-, "
                    attr: 1
                  - text: stdDir
                    attr: 3
                  - text: "-: Directory;\tdir # NIL  &  stdDir # NIL\rForm model directories.\r\r\rPROCEDURE "
                    attr: 1
                  - text: New
                    attr: 3
                  - text: " (): Model\rReturns a new model. Equivalent to "
                    attr: 1
