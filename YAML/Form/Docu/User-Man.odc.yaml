                  - text: "\rThe form subsystem implements a simple form editor, which can be used to create dialog boxes or data entry  masks.\r\r\r"
                    attr: 2
                  - target:
                      name: Form Creation
                      body:
                        - text: 1 Creating and Saving Forms
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 1
                  - text: "The command "
                    attr: 2
                  - text: "Controls->New Form..."
                    attr: 4
                  - text: " creates dialog boxes and other forms that match exported global variables. All such forms are "
                    attr: 2
                  - text: nonmodal
                    attr: 4
                  - text: ". Almost all dialog boxes in BlackBox are nonmodal, as long as the conventions for the underlying platform permit.\r\rTo get started, enter \"TextCmds.find\" into the "
                    attr: 2
                  - text: Link
                    attr: 4
                  - text: " field of the "
                    attr: 2
                  - text: "Controls->New Form..."
                    attr: 4
                  - text: " dialog box. By clicking the default button, a dialog box is automatically created which has fields "
                    attr: 2
                  - text: Find
                    attr: 4
                  - text: " and "
                    attr: 2
                  - text: Replace
                    attr: 4
                  - text: ", and buttons like "
                    attr: 2
                  - text: Find Next
                    attr: 4
                  - text: " and "
                    attr: 2
                  - text: Replace All
                    attr: 4
                  - text: ". These fields and buttons directly match the record fields of variable "
                    attr: 2
                  - text: find
                    attr: 4
                  - text: " in module "
                    attr: 2
                  - text: TextCmds
                    attr: 4
                  - text: ". To verify this, select the string \"TextCmds.find\", and execute command "
                    attr: 2
                  - text: "Info->Interface"
                    attr: 4
                  - text: ". The browser will display the definition of the record type.\r\rThe size of a form view can be adjusted by selecting the whole document ("
                    attr: 2
                  - text: "Edit->Select Document"
                    attr: 4
                  - text: ") and then dragging the graphical handles.\r\rThe dialog box created by "
                    attr: 2
                  - text: "Controls->New Form..."
                    attr: 4
                  - text: " exhibits a simple default arrangement of controls (e.g., buttons, edit fields), shown as an editable layout. The controls may be re-arranged, renamed, or otherwise modified using the menus "
                    attr: 2
                  - text: Layout
                    attr: 4
                  - text: " and "
                    attr: 2
                  - text: Controls
                    attr: 4
                  - text: ". The former menu appears automatically whenever a form becomes focused.\r\rInstead of creating an initial layout out of an existing global variable, form creation may start with an empty form (click on the "
                    attr: 2
                  - text: New Form
                    attr: 4
                  - text: " dialog box's "
                    attr: 2
                  - text: Empty
                    attr: 4
                  - text: " button), and then successively insert new controls via the "
                    attr: 2
                  - text: Controls
                    attr: 4
                  - text: " menu. Later, such controls may be linked to suitable global variables.\r\rAn edited dialog box can be saved by saving the window of the form layout. The BlackBox Component Framework saves dialog boxes in the standard document format. By convention, BlackBox forms are saved in the appropriate "
                    attr: 2
                  - text: Rsrc
                    attr: 4
                  - text: " directory (-> Subsystems and Global Modules). For example, the standard "
                    attr: 2
                  - text: "Text->Find & Replace"
                    attr: 4
                  - text: " dialog box is stored in "
                    attr: 2
                  - text: Text/Rsrc/Find
                    attr: 4
                  - text: ".\r\r"
                    attr: 2
                  - target:
                      name: Basic Editing
                      body:
                        - text: 2 Basic Editing
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rA view can be inserted into a form layout by invoking one of the "
                    attr: 2
                  - text: Insert Xyz
                    attr: 4
                  - text: " commands of menu "
                    attr: 2
                  - text: Controls
                    attr: 4
                  - text: ", e.g., the command "
                    attr: 2
                  - text: "Controls->Insert Command Button"
                    attr: 4
                  - text: ". Arbitrary other views could also be inserted, or copied from the clipboard or via drag & drop.\r\rViews in a form can be selected. If one single view is selected ( a \"singleton\"), it shows resize handles that can be manipulated to change the view's size. If several views are selected, they show a selection mark like singletons do, but no resize handles.\rA view can be selected either by clicking in it, or by dragging over an area which intersects the view(s). If the shift key is pressed during selection, the newly touched view(s) are toggled, i.e., a selected view is deselected and vice versa. If the shift key is not pressed during selection, any existing selection is removed prior to creating the new selection. Consequently, a simple click outside of any view removes the existing selection and does not create a new one. Pressing "
                    attr: 2
                  - text: esc
                    attr: 4
                  - text: " achieves the same effect.\r\rSome attributes of selected views can be modified using the "
                    attr: 2
                  - text: Attributes
                    attr: 4
                  - text: " menu (and the "
                    attr: 2
                  - text: Fonts
                    attr: 4
                  - text: " menu under the Mac OS). In this way, the typeface, style, and size of the labels of many controls can be changed.\r\rThe command "
                    attr: 2
                  - text: "Controls->Insert Group Box"
                    attr: 4
                  - text: " works like the other insert commands, with one exception: if there is a selection, the group box is placed and sized such that it forms a bounding box around the selected views.\r\rMac OS:\rChanging the size of a control's label has no effect, it always remains 12 point.\r\rA selection can be cut, copied, and pasted using the clipboard. It can be deleted with the "
                    attr: 2
                  - text: backspace
                    attr: 4
                  - text: " or "
                    attr: 2
                  - text: delete
                    attr: 4
                  - text: " keys.\r\rMenu "
                    attr: 2
                  - text: Layout
                    attr: 4
                  - text: " contains a variety of commands which are useful for editing a form layout. The "
                    attr: 2
                  - text: Align Left
                    attr: 4
                  - text: ", "
                    attr: 2
                  - text: Align Right
                    attr: 4
                  - text: ", "
                    attr: 2
                  - text: Align Top
                    attr: 4
                  - text: ", and "
                    attr: 2
                  - text: Align Bottom
                    attr: 4
                  - text: " commands align the left, right, top, or bottom borders of all selected views. Alignment occurs to the view which lies furthest in the alignment direction. For example, "
                    attr: 2
                  - text: Align Left
                    attr: 4
                  - text: " finds the selected view whose left border lies furthest left, and then moves all other views (without resizing them) so that their left borders are aligned to the same x-coordinate.\r"
                    attr: 2
                  - text: Align To Row
                    attr: 4
                  - text: " aligns all selected views in vertical direction, so that all their vertical centers come to lie on the same y-coordinate, which is the average of the old y-coordinates. Similarly, "
                    attr: 2
                  - text: Align To Column
                    attr: 4
                  - text: " aligns all selected view in the horizontal direction, so that they form a single column.\r\rThe dialog box "
                    attr: 2
                  - text: Set Grid...
                    attr: 4
                  - text: " allows to set the grid. Most commands which move or resize a view round the view's borders to this grid. The dialog box allows you to choose between a grid based on millimeters or on 1/16 inches. The grid resolution allows you to specify how many grid values exist for these units (for one millimeter, or for one sixteenth of an inch). A higher value means preciser placement is possible. Roughly every centimeter or half an inch, dotted lines are drawn on the grid, as visual aids for editing.\r"
                    attr: 2
                  - text: Select Off-Grid Views
                    attr: 4
                  - text: " selects all views of which at least one of its four borders is not aligned to the form's grid. "
                    attr: 2
                  - text: Force To Grid
                    attr: 4
                  - text: " shifts and resizes them by a minimal distance so that they are aligned again.\r\rConceptually the views are arranged in z-order, i.e., each view is either \"above\" or \"below\" another view. Normally, views in a form should not overlap, and thus this z-ordering has no immediate effect. But the same ordering is used for moving the focus between controls, by using the "
                    attr: 2
                  - text: tab
                    attr: 4
                  - text: " key. The focus is moved from the bottom-most towards the top-most view when tabbing through a dialog box. The commands "
                    attr: 2
                  - text: Set First/Back
                    attr: 4
                  - text: " and "
                    attr: 2
                  - text: Set Last/Front
                    attr: 4
                  - text: " allow to change the z-order of a selected singleton. "
                    attr: 2
                  - text: Sort Views
                    attr: 4
                  - text: " sorts the z-orders of all views in a form such that a view further to the left and top is reached before another view (which is further \"up\" in the hierarchy). This command can be applied after a layout has been edited, to update the z-order to make it intuitive again.\r\r"
                    attr: 2
                  - text: Recalc Focus Size
                    attr: 4
                  - text: " operates on a focused form layout view. It calculates the bounding box of the views which are contained in the form, offsets this bounding box by a small margin, and then sets the form view's width and height to this size. This is more convenient than using "
                    attr: 2
                  - text: "Edit->Select Document"
                    attr: 4
                  - text: " and then resizing the view manually.\r\rThe commands "
                    attr: 2
                  - text: Set Default Button
                    attr: 4
                  - text: " and "
                    attr: 2
                  - text: Set Cancel Button
                    attr: 4
                  - text: " make a selected button into a default or a cancel button. A default button reacts to the input of a "
                    attr: 2
                  - text: return
                    attr: 4
                  - text: " or "
                    attr: 2
                  - text: enter
                    attr: 4
                  - text: " key as if the mouse had been pressed inside; a cancel button reacts to the input of an "
                    attr: 2
                  - text: esc
                    attr: 4
                  - text: " key as if the mouse had been pressed inside.\r\rLike other views that have separate models, a form view can be opened in several windows simultaneously.\r\r"
                    attr: 2
                  - target:
                      name: Navigation Keys
                      body:
                        - text: 3 Navigation Keys
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rArrow keys can be used to move a selection to the left, right, upwards, or downwards by one point. If the "
                    attr: 2
                  - text: modifier
                    attr: 4
                  - text: " key is pressed before the arrow key, the selection moves by a larger distance.\r\r"
                    attr: 2
                  - target:
                      name: "Drag & Drop"
                      body:
                        - text: "4 Drag & Drop"
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rWhen clicking into a selection, and moving the cursor around, the selected views can be moved around accordingly. Moving occurs on a grid, the minimal distance is the same as when using the "
                    attr: 2
                  - text: modifier
                    attr: 4
                  - text: " key together with an arrow key.\r\rBy holding down the "
                    attr: 2
                  - text: modifier
                    attr: 4
                  - text: " key when the mouse button is released at the end of dragging, copies of the selected views are dropped, and become selected.\r\rDrag & Drop also works across windows, and even between different containers. If a singleton is dragged & dropped into another kind of container (e.g., a text container), then a copy of this view is dropped. If a whole selection is dropped, the selected views are wrapped into a form view and this form view is dropped to the other container.\r\r"
                    attr: 2
                  - target:
                      name: "Drag & Pick"
                      body:
                        - text: "5 Drag & Pick"
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rDrag & Pick is also supported in forms. In forms, another view's size can be picked up. This is very convenient for layout editing. For example, select several controls which have different sizes, hold down the "
                    attr: 2
                  - text: alt
                    attr: 4
                  - text: " key (Windows) / "
                    attr: 2
                  - text: command
                    attr: 4
                  - text: " key (Mac OS), and then drag to another view. When you release the mouse over this view, all selected views will be made the same size as this one.\r\r"
                    attr: 2
                  - target:
                      name: Layout and
                      body:
                        - text: 6 Layout and Mask Modes
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\rForms can be used in two different modes. Normally, a form is used in "
                    attr: 2
                  - text: layout mode
                    attr: 4
                  - text: ", i.e. its layout can be freely edited. The views (typically controls) embedded in a form however, "
                    attr: 2
                  - text: cannot
                    attr: 4
                  - text: " be edited directly, because they can only be selected, but not focused. For layout editing, it would be very inconvenient if a click in one of the form's controls would focus it, instead of only selecting it. Forms are saved in layout mode, and opened in document windows.\r\rFor using a form as a dialog box or data entry mask, a form can be opened in "
                    attr: 2
                  - text: mask mode
                    attr: 4
                  - text: " instead, in an auxiliary window (data entry mask) or in a tool window (dialog box for the manipulation of a document beneath the dialog box). A form in mask mode cannot be modified. However, its embedded views may be focused, e.g. a text entry field may be focused, or a button may be clicked. In contrast to layout mode, embedded views cannot be selected, resized, or moved around.\r\rIn mask mode, no focus border is shown around the currently focused view. In layout mode, a grid is shown.\r\rWhen a form in layout mode is focus, another window can be opened in mask mode, by using either "
                    attr: 2
                  - text: "Controls->Open As Tool Dialog"
                    attr: 4
                  - text: " or "
                    attr: 2
                  - text: "Controls->Open As Aux Dialog"
                    attr: 4
                  - text: ". In this way, a form can be tried out while it is still being edited. Layout changes in the layout mode form are immediately reflected in the other window, and input in the other window is immediately reflected in the layout.\r\rForms need not be saved in mask mode. They are saved in layout mode, and thus can be opened, edited, and saved again via the normal "
                    attr: 2
                  - text: File
                    attr: 4
                  - text: " menu commands. A data entry mask is opened via the "
                    attr: 2
                  - text: StdCmds.OpenAuxDialog
                    attr: 4
                  - text: " command; and a dialog box is opened via the "
                    attr: 2
                  - text: StdCmds.OpenToolDialog
                    attr: 4
                  - text: " command. These commands open a form document into an auxiliary/tool window and force it into mask mode. For example, the following commands show the difference between the two modes by opening the same (layout mode) form in the two possible ways:\r\r"
                    attr: 2
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 38
                      bodyPos: 3593
                      bodyLen: 6
                    attr: 2
                    w: 177800
                    h: 152400
                  - text: " \"StdCmds.OpenAuxDialog('Form/Rsrc/Gen', 'New Form')\"\r"
                    attr: 2
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 39
                      bodyPos: 3639
                      bodyLen: 6
                    attr: 2
                    w: 177800
                    h: 152400
                  - text: " \"StdCmds.OpenToolDialog('Text/Rsrc/Cmds', 'Find & Replace')\"\r"
                    attr: 2
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 40
                      bodyPos: 3685
                      bodyLen: 6
                    attr: 2
                    w: 177800
                    h: 152400
                  - text: " \"StdCmds.OpenDoc('Form/Rsrc/Gen')\"\r"
                    attr: 2
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 41
                      bodyPos: 3731
                      bodyLen: 6
                    attr: 2
                    w: 177800
                    h: 152400
                  - text: " \"StdCmds.OpenDoc('Text/Rsrc/Cmds')\"\r\rThe latter two commands correspond to the "
                    attr: 2
                  - text: "File->Open"
                    attr: 4
                  - text: " command and allow editing.\r\rThe difference between auxiliary and tool dialog boxes is that auxiliary dialog boxes are self-contained, e.g. dialog boxes to set up configuration parameters or data entry masks. Tool dialog boxes on the other hand operate on windows below them, e.g. the "
                    attr: 2
                  - text: "Find & Replace"
                    attr: 4
                  - text: " dialog box operates on the text beneath the dialog box.\r\rThese "
                    attr: 2
                  - text: OpenAuxDialog/OpenToolDialog
                    attr: 4
                  - text: " commands accept "
                    attr: 2
                  - text: portable path names
                    attr: 4
                  - text: " as input. A portable path name is a string which denotes a file in a machine-independent way. It uses the \"/\" character as separator, i.e. like in Unix or the World-Wide Web.\r\rThese commands are usually applied in menu items, for example the following command sequence:\r\r\t\"TextCmds.InitFindDialog; StdCmds.OpenToolDialog('Text/Rsrc/Find', 'Find & Replace')\"\r\rIn this command sequence, the first command initializes the "
                    attr: 2
                  - text: TextCmds.find
                    attr: 4
                  - text: " interactor with the currently selected text stretch. The second command opens a dialog box with the "
                    attr: 2
                  - text: Text/Rsrc/Find
                    attr: 4
                  - text: " file's form, whose controls are linked to the interactor's fields upon opening of the dialog box.\r\rSee also modules "
                    attr: 2
                  - link:
                      target: "StdCmds.OpenBrowser('Form/Docu/Gen', 'FormGen Docu')"
                      body:
                        - text: FormGen
                          attr: 3
                      attr: 2
                      w: 131250
                      h: 142875
                  - text: ", "
                    attr: 2
                  - link:
                      target: "StdCmds.OpenBrowser('Text/Docu/Cmds', 'TextCmds Docu')"
                      body:
                        - text: TextCmds
                          attr: 3
                      attr: 2
                      w: 131250
                      h: 142875
                  - text: ", and "
                    attr: 2
                  - link:
                      target: "StdCmds.OpenBrowser('Std/Docu/Cmds', 'StdCmds Docu')"
                      body:
                        - text: StdCmds
                          attr: 3
                      attr: 2
                      w: 131250
                      h: 142875
                  - text: ".\r\r"
                    attr: 2
                  - target:
                      name: Controls and
                      body:
                        - text: 7 Controls and Interactors
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 1
                  - text: "Controls are specialized views. Like every view, any control can be inserted into any general container, be it a text, a spreadsheet, or whatever other container is available. However, most controls are put into forms.\r\rEach control can be linked to a variable, more exactly to the field of a globally declared record variable, a so-called "
                    attr: 2
                  - text: interactor
                    attr: 4
                  - text: ". When the control is allocated (newly created or read from a document), BlackBox tries to link the control to its variable, using the advanced meta­programming capabilities of the BlackBox Component Framework core. In this way, the link between control and variable can be built up automatically when a dialog box is created or loaded, and correct linking (which includes correct typing) can be guaranteed even after a dialog box layout had been edited. The separation of interactor from controls makes it possible to hide many user-interface details from a program, e.g. the layout of a dialog box or other \"cosmetic\" properties of controls.\r\rThe BlackBox Component Framework provides "
                    attr: 2
                  - text: command buttons
                    attr: 4
                  - text: ", "
                    attr: 2
                  - text: check boxes
                    attr: 4
                  - text: ", "
                    attr: 2
                  - text: radio buttons
                    attr: 4
                  - text: ", "
                    attr: 2
                  - text: fields
                    attr: 4
                  - text: ", "
                    attr: 2
                  - text: "captions, list boxes"
                    attr: 4
                  - text: ", "
                    attr: 2
                  - text: selection boxes
                    attr: 4
                  - text: ", "
                    attr: 2
                  - text: "combo boxes, date, time, color, up/down fields"
                    attr: 4
                  - text: ", and "
                    attr: 2
                  - text: groups
                    attr: 4
                  - text: " as standard controls.\r"
                    attr: 2
                  - text: "\r"
                    attr: 1
                  - target:
                      name: Control Properties
                      body:
                        - text: 8 Control Properties
                          attr: 1
                      attr: 1
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 1
                  - text: "Controls have various "
