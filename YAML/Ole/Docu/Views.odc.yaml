                  - text: "\r\rDEFINITION OleViews;\r\r\tIMPORT CtlT, Views;\r\r\tPROCEDURE NewObjectView (name: ARRAY OF CHAR): Views.View;\r\tPROCEDURE NewObjectViewFromClipboard (): Views.View;\r\tPROCEDURE Deposit (name: ARRAY OF CHAR);\r\tPROCEDURE IsObjectView (v: Views.View): BOOLEAN;\r\tPROCEDURE IsAutoView (v: Views.View): BOOLEAN;\r\tPROCEDURE OleObject (v: Views.View): CtlT.Interface;\r\tPROCEDURE AutoObject (v: Views.View): CtlT.Object;\r\tPROCEDURE Connect (sink: CtlT.OutObject; source: Views.View);\r\rEND OleViews.\r\r\r"
                    attr: 1
                  - text: OleViews
                    attr: 2
                  - text: " provides a programming interface for OLE objects used as views in BlackBox.\r\r\rPROCEDURE "
                    attr: 1
                  - text: NewObjectView
                    attr: 3
                  - text: " (name: ARRAY OF CHAR): Views.View\rInstantiates an OLE object of a given type. "
                    attr: 1
                  - text: name
                    attr: 2
                  - text: " can either be a valid OLE class name (e.g., \"Excel.Sheet\") or a GUID (global unique identifier) in string form, provided it is a valid class identifier (e.g., \"{00020820-0000-0000-C000-000000000046}\"). If instatiantion failed, the return value is "
                    attr: 1
                  - text: NIL
                    attr: 2
                  - text: ".\r\rPROCEDURE "
                    attr: 1
                  - text: NewObjectViewFromClipboard
                    attr: 3
                  - text: " (): Views.View\rInstantiates the OLE object currently contained in the clipboard. Returns NIL if there is no OLE object on the clipboard.\r\rPROCEDURE "
                    attr: 1
                  - text: Deposit
                    attr: 3
                  - text: " (name: ARRAY OF CHAR)\rDeposit command for new OLE objects of a given type. "
                    attr: 1
                  - text: name
                    attr: 2
                  - text: " can either be a valid OLE class name (e.g., \"Excel.Sheet\") or a GUID (global unique identifier) in string form, provided it is a valid class identifier (e.g., \"{00020820-0000-0000-C000-000000000046}\").\r\rPROCEDURE "
                    attr: 1
                  - text: IsObjectView
                    attr: 3
                  - text: " (v: Views.View): BOOLEAN\rReturn "
                    attr: 1
                  - text: "TRUE"
                    attr: 2
                  - text: " if the given View is an OLE object, "
                    attr: 1
