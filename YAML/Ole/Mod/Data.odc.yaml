                  - text: "* (imp, exp, format: Dialog.String; type: Stores.TypeName; opts: SET);\r\t\tVAR c, f: Converter; tymed: SET; cbf: SHORTINT;\r\tBEGIN\r\t\ttymed := WinOle.TYMED_HGLOBAL;\r\t\tIF format = \"TEXT\" THEN cbf := WinApi.CF_TEXT\r\t\tELSIF format = \"BITMAP\" THEN cbf := WinApi.CF_BITMAP; tymed := WinOle.TYMED_GDI\r\t\tELSIF format = \"METAFILEPICT\" THEN cbf := WinApi.CF_METAFILEPICT; tymed := WinOle.TYMED_MFPICT\r\t\tELSIF format = \"SYLK\" THEN cbf := WinApi.CF_SYLK\r\t\tELSIF format = \"DIF\" THEN cbf := WinApi.CF_DIF\r\t\tELSIF format = \"TIFF\" THEN cbf := WinApi.CF_TIFF\r\t\tELSIF format = \"OEMTEXT\" THEN cbf := WinApi.CF_OEMTEXT\r\t\tELSIF format = \"DIB\" THEN cbf := WinApi.CF_DIB; tymed := WinOle.TYMED_GDI\r\t\tELSIF format = \"PALETTE\" THEN cbf := WinApi.CF_PALETTE\r\t\tELSIF format = \"PENDATA\" THEN cbf := WinApi.CF_PENDATA\r\t\tELSIF format = \"RIFF\" THEN cbf := WinApi.CF_RIFF\r\t\tELSIF format = \"WAVE\" THEN cbf := WinApi.CF_WAVE\r\t\tELSIF format = \"UNICODETEXT\" THEN cbf := WinApi.CF_UNICODETEXT\r\t\tELSIF format = \"ENHMETAFILE\" THEN cbf := WinApi.CF_ENHMETAFILE; tymed := WinOle.TYMED_ENHMF\r\t\tELSIF format = \"HDROP\" THEN cbf := WinApi.CF_HDROP\r\t\tELSIF format = \"LOCALE\" THEN cbf := WinApi.CF_LOCALE\r\t\tELSE cbf := SHORT(WinApi.RegisterClipboardFormatW(format))\r\t\tEND;\r\t\tIF stream IN opts THEN tymed := WinOle.TYMED_ISTREAM\r\t\tELSIF storage IN opts THEN tymed := WinOle.TYMED_ISTORAGE\r\t\tELSIF file IN opts THEN tymed := WinOle.TYMED_FILE\r\t\tEND;\r\t\tNEW(c); c.imp := imp; c.exp := exp; c.type := type; c.opts := opts;\r\t\tGenFormatEtc(cbf, WinOle.DVASPECT_CONTENT, tymed, c.format);\r\t\tIF convList = NIL THEN convList := c\r\t\tELSE f := convList;\r\t\t\tWHILE f.next # NIL DO f := f.next END;\r\t\t\tf.next := c\r\t\tEND\r\tEND Register;\r\r\r"
