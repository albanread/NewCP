                  - text: "\", model.link, \"\", \"\")\r\t\t\tEND\r\t\tEND\r\tEND OpenLink;\r(*\r\tPROCEDURE OpenLinks (model: Model);\r\t\tVAR item: Meta.Item; ov: ObjectValue; ok: BOOLEAN; iid: COM.GUID; res: COM.RESULT;\r\t\t\tcont: WinOle.IConnectionPointContainer; disp: WinOleAut.IDispatch; point: WinOle.IConnectionPoint;\r\t\t\ti, j: INTEGER; name: ARRAY 256 OF CHAR; sink: Sink;\r\tBEGIN\r\t\ti := 0;\r\t\tWHILE model.link[i] # 0X DO\r\t\t\tWHILE (model.link[i] # 0X) & (model.link[i] <= \",\") DO INC(i) END;\r\t\t\tj := 0;\r\t\t\tWHILE model.link[i] > \",\" DO name[j] := model.link[i]; INC(j); INC(i) END;\r\t\t\tname[j] := 0X;\r\t\t\tIF name # \"\" THEN\r\t\t\t\tMeta.LookupPath(name, item);\r\t\t\t\tIF item.obj # Meta.undef THEN\r\t\t\t\t\tIF (item.obj = Meta.typObj) & (item.typ = Meta.ptrTyp) THEN item.GetBaseType(item) END;\r\t\t\t\t\tIF (item.obj = Meta.typObj) & (item.typ = Meta.recTyp) & item.Is(ov) THEN\r\t\t\t\t\t\t(* item.Allocate(ov); *) ov.obj := item.New()(CtlT.OutObject);\r\t\t\t\t\t\tres := model.objUnk.QueryInterface(COM.ID(cont), cont);\r\t\t\t\t\t\tIF res >= 0 THEN\r\t\t\t\t\t\t\tov.obj.GetIID(iid);\r\t\t\t\t\t\t\tres := cont.FindConnectionPoint(iid, point);\r\t\t\t\t\t\t\tIF res >= 0 THEN\r\t\t\t\t\t\t\t\tdisp := CtlT.Disp(ov.obj); ASSERT(disp # NIL);\r\t\t\t\t\t\t\t\tNEW(sink); sink.obj := ov.obj; sink.point := point;\r\t\t\t\t\t\t\t\tres := point.Advise(disp, sink.cookie);\r\t\t\t\t\t\t\t\tIF res >= 0 THEN\r\t\t\t\t\t\t\t\t\tsink.next := model.sinks; model.sinks := sink;\r\t\t\t\t\t\t\t\t\tres := model.objUnk.QueryInterface(COM.ID(disp), disp);\r\t\t\t\t\t\t\t\t\tIF res >= 0 THEN sink.obj.source := CtlT.Obj(disp) END\r\t\t\t\t\t\t\t\tEND\r\t\t\t\t\t\t\tELSE Dialog.ShowParamMsg(\"#System:"
                    attr: 0
