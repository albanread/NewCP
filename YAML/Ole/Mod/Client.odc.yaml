                  - text: "\r\t\tres := model.objObj.SetHostNames(a, b);\r\t\tIF debug & (res < 0) THEN Log.String(\"set host names\"); Log.Int(res); Log.Ln END;\r\t\tmodel.open := FALSE;\r\t\tres := model.objObj.GetMiscStatus(WinOle.DVASPECT_CONTENT, model.flags);\r\t\tres := model.objView.GetExtent(WinOle.DVASPECT_CONTENT, -1, NIL, size);\r\t\tIF debug THEN Log.String(\"get size (setup)\"); Log.Int(size.cx); Log.Int(size.cy); Log.Ln END;\r\t\tmodel.w := size.cx * oleUnit; model.h := size.cy * oleUnit;\r(*\r\t\tOpenLinks(model)\r*)\r\tEND Setup;\r\r\tPROCEDURE (n: Notifier) Notify (VAR msg: Sequencers.Message);\r\t\tVAR model: Model; res: COM.RESULT;\r\tBEGIN\r\t\tIF msg IS Sequencers.RemoveMsg THEN\r\t\t\tmodel := n.model;\r\t\t\tDisconnect(model);\r\t\t\tIF debug THEN Log.String(\"release \"); Log.Int(model.advConn); Log.Ln END;\r\t\t\tIF model.objView # NIL THEN\r\t\t\t\tres := model.objView.SetAdvise(WinOle.DVASPECT_CONTENT, {}, NIL);\r\t\t\t\tmodel.objView := NIL\r\t\t\tEND;\r\t\t\tIF model.objObj # NIL THEN\r\t\t\t\tres := model.objObj.Close(WinOle.OLECLOSE_SAVEIFDIRTY);\r\t\t\t\tres := model.objObj.SetClientSite(NIL);\r\t\t\t\tres := model.objObj.Unadvise(model.advConn);\r\t\t\t\tmodel.objObj := NIL\r\t\t\tEND;\r\t\t\tmodel.objUnk := NIL\r\t\tEND\r\tEND Notify;\r\r(*\r\tPROCEDURE (model: Model) PropagateDomain;\r\t\tVAR n: Notifier; d: Stores.Domain;\r\tBEGIN\r\t\tOpenLink(model);\r\t\tNEW(n); n.model := model; d := model.Domain();\r\t\tWITH d: Sequencers.Sequencer DO d.InstallNotifier(n) ELSE END\r\tEND PropagateDomain;\r*)\r\r\tPROCEDURE (model: Model) Internalize (VAR rd: Stores.Reader);\r\t\tVAR thisVersion: INTEGER; stg: WinOle.IStorage; ilb: WinOle.ILockBytes;\r\t\t\tres: COM.RESULT; object: COM.IUnknown; utf8: Kernel.Utf8Name;\r\tBEGIN\r\t\tmodel.Internalize^(rd); IF rd.cancelled THEN "
