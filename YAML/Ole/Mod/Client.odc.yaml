                  - text: "\r\t\t\t\t\tIF debug THEN Log.String(\"defocus\"); Log.Ln END;\r\t\t\t\t\tIF v.model.objIPObj # NIL THEN\r\t\t\t\t\t\tres := v.model.objIPObj.InPlaceDeactivate()\r\t\t\t\t\tEND;\r(*\r\t\t\t\tELSIF msg.show & (v.model.flags * WinOle.OLEMISC_INSIDEOUT # {}) THEN\r\t\t\t\t\tDoVerb(v.model, f, WinOle.OLEIVERB_SHOW)\r*)\r\t\t\t\tEND;\r\t\t\t\tv.model.guard := g\r\t\t\tEND\r\t\t| msg: Controllers.TrackMsg DO\r\t\t\tIF v.model.flags * WinOle.OLEMISC_INSIDEOUT # {} THEN\r\t\t\t\tDoVerb(v.model, f, WinOle.OLEIVERB_SHOW)\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE (v: View) HandlePropMsg (VAR msg: Properties.Message);\r\t\tVAR size: WinApi.SIZE; res: COM.RESULT; i: INTEGER;\r\t\t\tiev: WinOle.IEnumOLEVERB; ov: ARRAY 1 OF WinOle.OLEVERB; pstr: WinApi.PtrWSTR;\r\tBEGIN\r\t\tWITH msg: Properties.SizePref DO\r\t\t\tIF (msg.w = Views.undefined) OR (msg.h = Views.undefined) THEN\r\t\t\t\tres := v.model.objView.GetExtent(WinOle.DVASPECT_CONTENT, -1, NIL, size);\r\t\t\t\tIF res >= 0 THEN\r\t\t\t\t\tIF debug THEN Log.String(\"get size (prefs)\"); Log.Int(size.cx); Log.Int(size.cy); Log.Ln END;\r\t\t\t\t\tmsg.w := size.cx * (Ports.mm DIV 100);\r\t\t\t\t\tmsg.h := size.cy * (Ports.mm DIV 100)\r\t\t\t\tELSE\r\t\t\t\t\tIF debug THEN Log.String(\"get size (prefs) (no size)\"); Log.Ln END;\r\t\t\t\t\tmsg.w := 60 * Ports.mm;\r\t\t\t\t\tmsg.h := 60 * Ports.mm\r\t\t\t\tEND\r\t\t\tEND\r\t\t| msg: Properties.FocusPref DO\r\t\t\tIF v.model.flags * WinOle.OLEMISC_INSIDEOUT # {} THEN\r\t\t\t\tmsg.hotFocus := TRUE\r\t\t\tEND\r\t\t| msg: Properties.PollMsg DO\r\t\t\tPollProp(v.model, msg.prop)\r\t\t| msg: Properties.SetMsg DO\r\t\t\tSetProp(v.model, msg.prop)\r\t\t| msg: Properties.PollVerbMsg DO\r\t\t\tres := v.model.objObj.EnumVerbs(iev);\r\t\t\tIF res >= 0 THEN\r\t\t\t\tREPEAT\r\t\t\t\t\tres := iev.Next(1, ov, NIL)\r\t\t\t\tUNTIL (res # WinApi.S_OK) OR (ov[0].lVerb = msg.verb);\r\t\t\t\tIF res = WinApi.S_OK THEN\r\t\t\t\t\ti := 0;\r\t\t\t\t\tIF ov[