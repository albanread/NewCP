                  - text: "\r\tIMPORT\r\t\tSYSTEM, COM, WinApi, WinOle, WinOleCtl, WinOleAut, WinOleDlg, Kernel,\r\t\tOleStorage, OleData, OleServer,\r\t\tMeta, Dialog, Services, Ports, Stores, Sequencers, Models, Views, Controllers,\r\t\tProperties, Containers, Controls,\r\t\tStdDialog, Log, HostPorts, HostWindows, HostMenus;\r\r\tCONST\r\t\tdebug = FALSE;\r\t\tminModelVersion = 0; maxModelVersion = 1;\r\t\tminViewVersion = 0; maxViewVersion = 0;\r\t\tObjectID = \"{00000001-1000-11cf-adf0-444553540000}\";\t"
                    attr: 0
                  - text: "(* BlackBox views *)"
                    attr: 1
                  - text: "\r\t\tmiscStatus = WinOle.OLEMISC_RECOMPOSEONRESIZE\r\t\t\t+ WinOle.OLEMISC_CANTLINKINSIDE\r\t\t\t+ WinOle.OLEMISC_RENDERINGISDEVICEINDEPENDENT;\r\t\toleUnit = Ports.mm DIV 100;\r\r\tTYPE\r\t\tIOleClientSite = POINTER TO RECORD (WinOle.IOleClientSite)\r\t\t\tias: IAdviseSink;\r\t\t\tiips: IOleInPlaceSite;\r\t\t\tobj: Model;\r\t\t\tframe: Views.Frame;\r\t\t\twnd: WinApi.HWND\r\t\tEND;\r\t\tIAdviseSink = POINTER TO RECORD (WinOle.IAdviseSink)\r\t\t\tsite: IOleClientSite;\r\t\t\tobj: Model\r\t\tEND;\r\t\tIOleInPlaceSite = POINTER TO RECORD (WinOle.IOleInPlaceSite)\r\t\t\tsite: IOleClientSite;\r\t\t\tobj: Model\r\t\tEND;\r\r\t\tIOleInPlaceUIWindow = POINTER TO RECORD (WinOle.IOleInPlaceUIWindow)\r\t\t\twnd: WinApi.HWND;\r\t\t\tiipao: WinOle.IOleInPlaceActiveObject\r\t\tEND;\r\t\tWinHook = POINTER TO RECORD (HostWindows.Hook)\r\t\t\tiipw: IOleInPlaceUIWindow\r\t\tEND;\r\r\t\tIOleInPlaceFrame = POINTER TO RECORD (WinOle.IOleInPlaceFrame)\r\t\t\tobjWnd: WinApi.HWND;\t"
