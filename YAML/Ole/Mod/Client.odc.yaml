                  - text: "* (v: Views.View; iid: COM.GUID; disp: WinOleAut.IDispatch);\r\t\tVAR res: COM.RESULT; cont: WinOle.IConnectionPointContainer; point: WinOle.IConnectionPoint; sink: Sink;\r\tBEGIN\r\t\tWITH v: View DO\r\t\t\tres := v.model.objUnk.QueryInterface(COM.ID(cont), cont);\r\t\t\tIF res >= 0 THEN\r\t\t\t\tres := cont.FindConnectionPoint(iid, point);\r\t\t\t\tIF res >= 0 THEN\r\t\t\t\t\tNEW(sink); sink.point := point;\r\t\t\t\t\tres := point.Advise(disp, sink.cookie);\r\t\t\t\t\tIF res >= 0 THEN\r\t\t\t\t\t\tsink.next := v.model.sinks; v.model.sinks := sink\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND Connect;\r\r\tPROCEDURE Disconnect (model: Model);\r\t\tVAR res: COM.RESULT; sink: Sink;\r\tBEGIN\r\t\tsink := model.sinks;\r\t\tWHILE sink # NIL DO\r\t\t\tres := sink.point.Unadvise(sink.cookie);\r\t\t\tsink := sink.next\r\t\tEND;\r\t\tmodel.sinks := NIL\r\tEND Disconnect;\r\r\tPROCEDURE OpenLink (model: Model);\r\t\tVAR item: Meta.Item; pv: ProcValue; ok: BOOLEAN;\r\tBEGIN\r\t\tIF model.link # \"\" THEN\r\t\t\tMeta.LookupPath(model.link, item);\r\t\t\tIF item.obj = Meta.procObj THEN\r\t\t\t\titem.GetVal(pv, ok);\r\t\t\t\tIF ok THEN pv.open(model.view)\r\t\t\t\tELSE Dialog.ShowParamMsg(\"#System:"
