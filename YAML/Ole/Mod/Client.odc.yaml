                    attr: 3
                  - text: " Containers.mask * ctrl.opts # Containers.mask\r\t\t\tEND\r\t\tEND\r\tEND Visible;\r\r\tPROCEDURE GenGlobalMedium (hg: WinApi.HGLOBAL; unk: COM.IUnknown; VAR sm: WinOle.STGMEDIUM);\r\tBEGIN\r\t\tsm.tymed := WinOle.TYMED_HGLOBAL;\r\t\tsm.u.hGlobal := hg;\r\t\tsm.pUnkForRelease := unk\r\tEND GenGlobalMedium;\r\r\tPROCEDURE MediumGlobal (VAR sm: WinOle.STGMEDIUM): WinApi.HGLOBAL;\r\tBEGIN\r\t\tASSERT(sm.tymed = WinOle.TYMED_HGLOBAL, 20);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " sm.u.hGlobal\r\tEND MediumGlobal;\r\r\tPROCEDURE GenStorageMedium (stg: WinOle.IStorage; unk: COM.IUnknown; VAR sm: WinOle.STGMEDIUM);\r\tBEGIN\r\t\tsm.u.hGlobal := 0;\r\t\tsm.tymed := WinOle.TYMED_ISTORAGE;\r\t\tsm.u.pstg := stg;\r\t\tsm.pUnkForRelease := unk\r\tEND GenStorageMedium;\r\r\tPROCEDURE MediumStorage (VAR sm: WinOle.STGMEDIUM): WinOle.IStorage;\r\tBEGIN\r\t\tASSERT(sm.tymed = WinOle.TYMED_ISTORAGE, 20);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " sm.u.pstg\r\tEND MediumStorage;\r\r\tPROCEDURE DoVerb (obj: Model; f: Views.Frame; verb: INTEGER);\r\t\tVAR res: COM.RESULT; w, h: INTEGER; rect: WinApi.RECT;\r\tBEGIN\r\t\tobj.site.frame := f;\r\t\tIF f # NIL THEN\r\t\t\tf.view.context.GetSize(w, h);\r\t\t\trect.left := f.gx DIV f.unit;\r\t\t\trect.top := f.gy DIV f.unit;\r\t\t\trect.right := (f.gx + w) DIV f.unit;\r\t\t\trect.bottom := (f.gy + h) DIV f.unit;\r\t\t\tobj.rw := w DIV f.unit;\r\t\t\tobj.rh := h DIV f.unit;\r\t\t\tIF debug THEN Log.Int(rect.left); Log.Int(rect.top); Log.Int(rect.right); Log.Int(rect.bottom); Log.Ln END;\r\t\t\tres := obj.objObj.DoVerb(verb, NIL, obj.site, 0, f.rider(HostPorts.Rider).port.wnd, rect)\r\t\tELSE\r\t\t\trect.left := 0; rect.top := 0; rect.right := 0; rect.bottom := 0;\r\t\t\tres := obj.objObj.DoVerb(verb, NIL, obj.site, 0, 0, rect)\r\t\tEND\r\tEND DoVerb;\r\r\tPROCEDURE UpdateSizes (v: View; checkSize, setRect: BOOLEAN);\r\t\tVAR obj: Model; f: Views.Frame; host: Views.Frame; p: HostPorts.Port; res: COM.RESULT;\r\t\t\tpos, clip: WinApi.RECT; size: WinApi.SIZE; w, h, ow, oh: INTEGER;\r\t\t\tc: Containers.Controller; s: Views.View; g: BOOLEAN;\r\tBEGIN\r\t\tobj := v.model; f := obj.site.frame;\r\t\tIF (f # NIL) & ((f.rider = NIL) OR (obj.objIPObj = NIL) OR (f.view # v)) THEN f := NIL END;\r\t\tIF checkSize THEN\r\t\t\tIF debug THEN Log.String(\"check sizes\"); Log.Ln END;\r\t\t\tres := obj.objObj.GetExtent(WinOle.DVASPECT_CONTENT, size);\r\t\t\tIF res = WinApi.S_OK THEN\r\t\t\t\tow := size.cx * oleUnit; oh := size.cy * oleUnit;\r\t\t\t\tv.context.GetSize(w, h);\r\t\t\t\tIF (w # ow) OR (h # oh) THEN\r\t\t\t\t\tIF debug THEN Log.String(\"  set size\"); Log.Int(ow); Log.Int(oh); Log.Ln END;\r\t\t\t\t\tControllers.SetCurrentPath(Controllers.targetPath);\r\t\t\t\t\tc := Containers.Focus();\r\t\t\t\t\tControllers.ResetCurrentPath();\r\t\t\t\t\ts := c.Singleton();\r\t\t\t\t\tIF f # NIL THEN host := Views.HostOf(f) END;\r\t\t\t\t\tg := obj.focusGuard; obj.focusGuard := TRUE;\r\t\t\t\t\tv.context.SetSize(ow, oh);\r\t\t\t\t\tv.model.w := ow; v.model.h := oh;\r\t\t\t\t\tIF f # NIL THEN\r\t\t\t\t\t\tIF host # NIL THEN\t"
                    attr: 0
