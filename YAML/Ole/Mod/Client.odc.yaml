                  - text: "\r\t\t\tViews.Update(v, Views.keepFrames)\r\t\tELSE\r\t\tEND\r\tEND HandleModelMsg;\r\r\tPROCEDURE (v: View) HandleCtrlMsg (f: Views.Frame; VAR msg: Controllers.Message; VAR focus: Views.View);\r\t\tVAR res: COM.RESULT; g: BOOLEAN;\r\tBEGIN\r\t\tWITH msg: Controllers.MarkMsg DO\r\t\t\tIF msg.focus & ~v.model.focusGuard THEN\r\t\t\t\tg := v.model.guard; v.model.guard := TRUE;\r\t\t\t\tIF ~msg.show THEN\t"
                    attr: 0
