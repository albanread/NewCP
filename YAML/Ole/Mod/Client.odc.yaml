                  - text: "\", name, \"\", \"\")\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tELSE HALT(100)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE Dialog.ShowParamMsg(\"#System:"
