                  - text: "\r\t\t\tiipao: WinOle.IOleInPlaceActiveObject\r\t\tEND;\r\t\tFrameHook = POINTER TO RECORD (HostWindows.Hook) END;\r\r\t\tSink = POINTER TO RECORD\r\t\t\tnext: Sink;\r(*\r\t\t\tobj: CtlT.OutObject;\r*)\r\t\t\tpoint: WinOle.IConnectionPoint;\r\t\t\tcookie: INTEGER\r\t\tEND;\r\r\t\tView = POINTER TO RECORD (Views.View)\r\t\t\tmodel: Model;\r\t\t\thasNotifier: BOOLEAN\r\t\tEND;\r\t\tModel = POINTER TO RECORD (Models.Model)\r\t\t\tsite: IOleClientSite;\r\t\t\tadvConn: INTEGER;\r\t\t\topen: BOOLEAN;\r\t\t\tobjUnk: COM.IUnknown;\r\t\t\tobjView: WinOle.IViewObject2;\r\t\t\tobjObj: WinOle.IOleObject;\r\t\t\tobjIPObj: WinOle.IOleInPlaceObject;\t"
