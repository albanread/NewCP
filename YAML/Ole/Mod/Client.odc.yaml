                  - text: "\r\t\t\t\t\t\t\tIF debug THEN Log.String(\"  restore frame\"); Log.Ln END;\r\t\t\t\t\t\t\tViews.ValidateRoot(Views.RootOf(host));\r\t\t\t\t\t\t\tf := Views.ThisFrame(host, v);\r\t\t\t\t\t\t\tobj.site.frame := f\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tc.SetFocus(v)\t"
