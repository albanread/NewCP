                    attr: 3
                  - text: "\", name, \"\", \"\")\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND OpenLinks;\r\r\tPROCEDURE CloseLinks (model: Model);\r\t\tVAR res: COM.RESULT; sink: Sink; iid: COM.GUID;\r\tBEGIN\r\t\tsink := model.sinks;\r\t\tWHILE sink # NIL DO\r\t\t\tres := sink.point.Unadvise(sink.cookie);\r\t\t\tsink.obj.source := NIL;\r\t\t\tsink := sink.next\r\t\tEND;\r\t\tmodel.sinks := NIL\r\tEND CloseLinks;\r*)\r\tPROCEDURE PollProp (model: Model; VAR list: Properties.Property);\r\t\tVAR p: Controls.Prop; res: COM.RESULT; cont: WinOle.IConnectionPointContainer;\r\tBEGIN\r\t\tres := model.objUnk.QueryInterface(COM.ID(cont), cont);\r\t\tIF res >= 0 THEN\r\t\t\tNEW(p);\r\t\t\tp.valid := {Controls.link}; p.known := p.valid;\r\t\t\tp.link := model.link$;\r\t\t\tProperties.Insert(list, p)\r\t\tEND\r\tEND PollProp;\r\r\tPROCEDURE SetProp (model: Model; p: Properties.Property);\r\t\tVAR res: COM.RESULT; cont: WinOle.IConnectionPointContainer; op: Op;\r\tBEGIN\r\t\tres := model.objUnk.QueryInterface(COM.ID(cont), cont);\r\t\tIF res >= 0 THEN\r\t\t\tWHILE p # NIL DO\r\t\t\t\tWITH p: Controls.Prop DO\r\t\t\t\t\tIF Controls.link IN p.valid THEN\r\t\t\t\t\t\tNEW(op); op.model := model; op.link := p.link$;\r\t\t\t\t\t\tModels.Do(model, \"#System:"
