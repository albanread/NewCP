                  - text: " v.model\r\tEND ThisModel;\r\r\tPROCEDURE (v: View) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR res: COM.RESULT; dc: WinApi.HDC; rect, wrect: WinApi.RECT; w, h: INTEGER;\r\t\t\tsize: WinApi.SIZE; g: BOOLEAN; p: HostPorts.Port; s: SET; fl, ft, fr, fb: INTEGER;\r\t\t\tn: Notifier;\r\tBEGIN\r\t\tIF ~v.hasNotifier & (v.Domain() # NIL)\r\t\t\t& (v.Domain().GetSequencer() # NIL) & (v.Domain().GetSequencer() IS Sequencers.Sequencer) THEN\r\t\t\tNEW(n); n.model := v.model;\r\t\t\tv.Domain().GetSequencer()(Sequencers.Sequencer).InstallNotifier(n);\r\t\t\tv.hasNotifier := TRUE\r\t\tEND;\r\t\tIF (v.model.objObj # NIL) & (v.model.objView # NIL) & Visible(v.model, f) THEN\r\t\t\tv.context.GetSize(w, h);\r\t\t\tIF (w # v.model.w) OR (h # v.model.h) THEN\r\t\t\t\tsize.cx := w DIV oleUnit; size.cy := h DIV oleUnit;\r\t\t\t\tg := v.model.guard; v.model.guard := TRUE;\r\t\t\t\tIF WinOle.OleIsRunning(v.model.objObj) # 0 THEN\r\t\t\t\t\tIF debug THEN Log.String(\"set size (running)\"); Log.Int(size.cx); Log.Int(size.cy); Log.Ln END;\r\t\t\t\t\tres := v.model.objObj.SetExtent(WinOle.DVASPECT_CONTENT, size)\r\t\t\t\tELSIF v.model.flags * WinOle.OLEMISC_RECOMPOSEONRESIZE # {} THEN\r\t\t\t\t\tres := WinOle.OleRun(v.model.objUnk);\r\t\t\t\t\tIF debug THEN Log.String(\"set size (recomp)\"); Log.Int(size.cx); Log.Int(size.cy); Log.Ln END;\r\t\t\t\t\tres := v.model.objObj.SetExtent(WinOle.DVASPECT_CONTENT, size);\r\t\t\t\t\tres := v.model.objObj.Update();\r\t\t\t\t\tres := v.model.objObj.Close(WinOle.OLECLOSE_SAVEIFDIRTY)\r\t\t\t\tEND;\r\t\t\t\tv.model.w := w; v.model.h := h;\r\t\t\t\tv.model.guard := g\r\t\t\tEND;\r\t\t\tp := f.rider(HostPorts.Rider).port; dc := p.dc;\r\t\t\trect.left := f.gx DIV f.unit;\r\t\t\trect.top := f.gy DIV f.unit;\r\t\t\trect.right := (f.gx + w) DIV f.unit;\r\t\t\trect.bottom := (f.gy + h) DIV f.unit;\r\t\t\twrect.left := 0;\r\t\t\twrect.top := 0;\r\t\t\twrect.right := p.w;\r\t\t\twrect.bottom := p.h;\r\t\t\tres := WinApi.SaveDC(dc);\r\t\t\tIF p.wnd # 0 THEN res := WinApi.SelectClipRgn(dc, 0) END;\r\t\t\tf.rider.GetRect(fl, ft, fr, fb);\r\t\t\tres := WinApi.IntersectClipRect(dc, fl, ft, fr, fb);\r\t\t\ts := WinApi.SetTextAlign(dc, {});\r\t\t\tres := v.model.objView.Draw(WinOle.DVASPECT_CONTENT, -1, 0, NIL, 0, dc, rect, wrect, NIL, 0);\r\t\t\th := WinApi.RestoreDC(dc, -1);\r\t\t\tIF debug THEN\r\t\t\t\tIF p.wnd # 0 THEN\r\t\t\t\t\tLog.String(\"draw\"); Log.Int(res);\r\t\t\t\t\tLog.Int(SYSTEM.VAL(INTEGER, p));\r\t\t\t\t\tLog.Int(p.wnd); Log.Int(dc);\r\t\t\t\t\tLog.Int(rect.left); Log.Int(rect.top); Log.Int(rect.right); Log.Int(rect.bottom);\r\t\t\t\t\tLog.Int(wrect.left); Log.Int(wrect.top); Log.Int(wrect.right); Log.Int(wrect.bottom);\r\t\t\t\t\tLog.Ln\r\t\t\t\tELSE\r\t\t\t\t\tLog.String(\"draw (p)\"); Log.Int(res);\r\t\t\t\t\tLog.Int(SYSTEM.VAL(INTEGER, p));\r\t\t\t\t\tLog.Int(p.wnd); Log.Int(dc);\r\t\t\t\t\tLog.Int(rect.left); Log.Int(rect.top); Log.Int(rect.right); Log.Int(rect.bottom);\r\t\t\t\t\tLog.Int(wrect.left); Log.Int(wrect.top); Log.Int(wrect.right); Log.Int(wrect.bottom);\r\t\t\t\t\tLog.Ln\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND Restore;\r\r\tPROCEDURE (v: View) RestoreMarks (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tIF v.model.open & ((v.model.objIPObj = NIL) OR (v.model.site.frame # f))\r\t\t\t\t& ~v.model.focusGuard & ~Views.IsPrinterFrame(f) THEN\r\t\t\tf.MarkRect(l, t, r, b, Ports.fill, HostPorts.focusPat, TRUE)\r\t\tEND\r\tEND RestoreMarks;\r\r\tPROCEDURE (v: View) HandleModelMsg (VAR msg: Models.Message);\r\t\tVAR res: COM.RESULT; size: WinApi.SIZE; ow, oh, w, h: INTEGER;\r\t\t\tc: Containers.Controller; s: Views.View; path: BOOLEAN;\r\tBEGIN\r\t\tWITH msg: UpdateMsg DO\r\t\t\tIF debug THEN Log.String(\"update\"); Log.Ln END;\r\t\t\tUpdateSizes(v, msg.checkSize, FALSE);\r"
