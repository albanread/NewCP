                    attr: 0
                  - text: "(* separate component *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF (new.ioo # NIL) & (new.ido # NIL) & (new.ips # NIL) & (new.iipo # NIL) & (new.iipao # NIL) THEN\r\t\t\t\t\tnew.ioo.obj := new;\r\t\t\t\t\tnew.ido.obj := new;\r\t\t\t\t\tnew.ido.data := OleData.ViewData(NIL, 0, 0, TRUE);\r\t\t\t\t\tnew.ips.obj := new;\r\t\t\t\t\tnew.iipo.obj := new;\r\t\t\t\t\tnew.iipao.obj := new;\r\t\t\t\t\tnew.embedded := FALSE;\r\t\t\t\t\tres := new.QueryInterface(iid, int);\r\t\t\t\t\tIF res >= 0 THEN HostMenus.Lock END;\r\t\t\t\t\tIF debug THEN Log.String(\"c lock \"); Log.Int(HostMenus.locks); Log.Ln END;\r\t\t\t\tELSE res := WinApi.E_OUTOFMEMORY\r\t\t\t\tEND\r\t\t\tELSE res := WinApi.E_OUTOFMEMORY\r\t\t\tEND\r\t\tELSE res := WinApi.CLASS_E_NOAGGREGATION\r\t\tEND;\r\t\t"
