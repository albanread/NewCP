                    attr: 3
                  - text: "\r\t\r\tPROCEDURE^ (this: Object) InPlaceDeactivate ();\r\t\r\tPROCEDURE ObjectRelease (this: Object): LONGINT;\r\t\tVAR n: LONGINT; msg: Sequencers.RemoveMsg;\r\tBEGIN\r\t\tn := Kernel.Release(SYSTEM.VAL(LONGINT, this));\r\t\tIF debug THEN Log.String(\"release \"); Log.Int(n); Log.Ln END;\r\t\tIF n = 0 THEN\r\t\t\tIF this.iips # NIL THEN this.InPlaceDeactivate END;\r\t\t\tthis.ics := NIL; this.idah := NIL; this.ioah := NIL;\r\t\t\tIF this.seq # NIL THEN this.seq.Notify(msg) END;\r\t\t\tHostMenus.Unlock;\r\t\t\tIF debug THEN Log.String(\"r unlock \"); Log.Int(HostMenus.locks); Log.Ln END;\r\t\t\tKernel.Cleanup\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " n\r\tEND ObjectRelease;\r\t\r\tPROCEDURE PatchObjectRelease;\r\t\tCONST releaseMethOff = -4;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: "SYSTEM.PUT(SYSTEM.ADR(Object) + releaseMethOff, SYSTEM.ADR(ObjectRelease))"
                    attr: 3
                  - text: "\r\tEND PatchObjectRelease;\r"
                    attr: 0
                  - text: "*)"
                    attr: 3
