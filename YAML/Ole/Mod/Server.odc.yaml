                    attr: 0
                  - text: ResetUI
                    attr: 3
                  - text: "* (w: Windows.Window; VAR done: BOOLEAN);\r\t\tVAR res: COM.RESULT; rect: WinApi.RECT;\r\tBEGIN\r\t\tdone := FALSE;\r\t\tWITH w: Window DO\r\t\t\tIF (w.obj # NIL) & (w.obj.iips # NIL) & w.obj.uiActive THEN\r\t\t\t\tIF debug THEN Log.String(\"reset ui\"); Log.Ln END;\r\t\t\t\tIF w.obj.iipf # NIL THEN res := w.obj.iipf.SetActiveObject(w.obj.iipao, \"\") END;\r\t\t\t\tIF w.obj.iipw # NIL THEN res := w.obj.iipw.SetActiveObject(w.obj.iipao, \"\") END;\r\t\t\t\tIF (w.obj.iipf # NIL) & (w.obj.menu # 0) THEN\r\t\t\t\t\tres := w.obj.iipf.SetMenu(w.obj.menu, w.obj.oleMenu, HostWindows.main);\r\t\t\t\t\tw.obj.useMenu := TRUE\r\t\t\t\tEND;\r\t\t\t\trect.left := 0; rect.top := 0; rect.right := 0; rect.bottom := 0;\r\t\t\t\tIF w.obj.iipf # NIL THEN res := w.obj.iipf.SetBorderSpace(rect) END;\r\t\t\t\tIF w.obj.iipw # NIL THEN res := w.obj.iipw.SetBorderSpace(rect) END;\r(*\r\t\t\t\tHostWindows.ActivateWindow(w, TRUE);\r*)\r\t\t\t\tdone := TRUE\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND ResetUI;\r\t\r\tPROCEDURE ShowOleStatus (w: Windows.Window; s: ARRAY OF CHAR);\r\t\tVAR res: COM.RESULT;\r\tBEGIN\r\t\tWITH w: Window DO\r\t\t\tIF w.obj.iipf # NIL THEN\r\t\t\t\tres := w.obj.iipf.SetStatusText(s)\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND ShowOleStatus;\r\t\r\tPROCEDURE UpdateOleMenus ();\r\t\tVAR w: Windows.Window; res: COM.RESULT;\r\tBEGIN\r\t\tw := Windows.dir.First();\r\t\tWHILE w # NIL DO\r\t\t\tWITH w: Window DO\r\t\t\t\tIF (w.obj.iipf # NIL) & (w.obj.menu # 0) THEN\r\t\t\t\t\tw.obj.InPlaceMenuDestroy(); w.obj.InPlaceMenuCreate();\r\t\t\t\t\tIF w.obj.useMenu THEN\r\t\t\t\t\t\tres := w.obj.iipf.SetMenu(w.obj.menu, w.obj.oleMenu, HostWindows.main)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\tEND;\r\t\t\tw := Windows.dir.Next(w)\r\t\tEND\r\tEND UpdateOleMenus;\r\t\r\tPROCEDURE TranslateOleKeys (VAR msg: WinApi.MSG; VAR done: BOOLEAN);\r\t\tVAR w: Windows.Window; res: COM.RESULT;\r\tBEGIN\r\t\tw := Windows.dir.First(); done := FALSE;\r\t\tIF w # NIL THEN\r\t\t\tWITH w: Window DO\r\t\t\t\tIF w.obj.iipf # NIL THEN\r\t\t\t\t\tres := WinOle.OleTranslateAccelerator(w.obj.iipf, w.obj.fInfo, msg);\r\t\t\t\t\tIF res = WinApi.S_OK THEN done := TRUE END\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\tEND\r\t\tEND\r\tEND TranslateOleKeys;\r\t\r\tPROCEDURE Register;\r\t\tVAR res: COM.RESULT;\r\tBEGIN\r\t\tNEW(factory);\r\t\tres := WinOle.CoRegisterClassObject(ObjectID, factory,\r\t\t\t\t\t\t\t\t\t\t\t\tWinOle.CLSCTX_LOCAL_SERVER, WinOle.REGCLS_MULTIPLEUSE, token);\r\tEND Register;\r\t\r\tPROCEDURE Unregister;\r\t\tVAR res: COM.RESULT; n: INTEGER; p: Object;\r\tBEGIN\r\t\tIF token # 0 THEN\r\t\t\tres := WinOle.CoRevokeClassObject(token)\r\t\tEND\r\tEND Unregister;\r\rBEGIN\r\tNEW(winDir);\r\tHostDialog.ShowOleStatus := ShowOleStatus;\r\tHostMenus.UpdateOleMenus := UpdateOleMenus;\r\tHostMenus.TranslateOleKeys2 := TranslateOleKeys;\r\tRegister\rCLOSE\r\tUnregister\rEND OleServer.\r\r"
