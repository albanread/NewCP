                    attr: 1
                  - text: "\r\t\t\tWITH w: Window DO\r\t\t\t\tIF debug THEN Log.String(\"open window in place\"); Log.Ln END;\r\t\t\t\tflags := flags + {Windows.noHScroll, Windows.noVScroll, Windows.noResize, HostWindows.inPlace};\r\t\t\t\tu := d.obj.w DIV (d.pos.right - d.pos.left);\r\t\t\t\tu1 := d.obj.h DIV (d.pos.bottom - d.pos.top);\r\t\t\t\tIF u1 > u THEN u := u1 END;\r\t\t\t\td.unit := u;\r\t\t\t\td.Open^(w, doc, flags, name, loc, fname, conv);\r(*\r\t\t\t\tu := HostWindows.unit;\r*)\r\t\t\t\tbw := borderW DIV HostWindows.unit;\r\t\t\t\tl := Max(d.pos.left - bw, d.clip.left);\r\t\t\t\tt := Max(d.pos.top - bw, d.clip.top);\r\t\t\t\tr := Min(d.pos.right + bw, d.clip.right);\r\t\t\t\tb := Min(d.pos.bottom + bw, d.clip.bottom);\r\t\t\t\tstyle := {30};\t"
