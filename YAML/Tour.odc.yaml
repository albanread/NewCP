                    attr: 6
                  - text: " from menu "
                    attr: 5
                  - text: Info
                    attr: 6
                  - text: ". For example, you may find out the interface of the following module:\r\r\t Math\r\r"
                    attr: 5
                  - text: "A module remains loaded until it is explicitly unloaded, or until the BlackBox Component Builder is restarted."
                    attr: 6
                  - text: " To explicitly unload a module, select the module name and execute "
                    attr: 5
                  - text: Unload Module List
                    attr: 6
                  - text: " from menu "
                    attr: 5
                  - text: Dev
                    attr: 6
                  - text: ". For example, unload "
                    attr: 5
                  - text: ObxHello0
                    attr: 6
                  - text: ", modify the string \"Hello world\", recompile "
                    attr: 5
                  - text: ObxHello0
                    attr: 6
                  - text: ", and execute "
                    attr: 5
                  - text: ObxHello0.Do
                    attr: 6
                  - text: " again. Note that your changes do not affect the running system until after you have unloaded the old module. Such an explicit unloading is a very useful mechanism to allow major changes in multiple modules, while still using and working with the previous version. For simple top-level modules, (modules that are not imported by other modules), the command "
                    attr: 5
                  - text: Compile And Unload
                    attr: 6
                  - text: " provides a convenient shortcut.\r\r\x0e"
                    attr: 5
                  - text: Linking programs to form documents
                    attr: 7
