                  - text: " is written to this text; a new text view is created; and the view is opened in a window, displaying the report.\r\rText entry fields, checkboxes, and other so-called "
                    attr: 5
                  - text: controls
                    attr: 6
                  - text: " may have properties that could be inspected and modified by a suitable control property inspector. Instead of first writing a module and then creating an initial layout, as we have done above, the form can be constructed first, and the corresponding module written later. A BlackBox Component Builder dialog does not necessarily correspond to exactly one record variable. The individual controls of a dialog box may be linked to records in different modules, and a dialog box may also contain other views which are not controls, such as pictures.\r\rA form can be saved from within the visual editor; thereafter it can be attached to a menu entry, or another dialog's button. Dialog boxes are saved in the standard document format, in a platformindependent way. This approach eliminates the need for an intermediate source code generator and allows to later modify the dialog boxes without having to recompile anything.\r\r\x0e"
                    attr: 5
                  - text: And more ...
                    attr: 7
