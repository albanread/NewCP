                  - text: "\r\rBy clicking on an error marker, a short error message is displayed in the status bar. Correct the mistake (replace the \"k\" in "
                    attr: 5
                  - text: IMPORT StdLok
                    attr: 6
                  - text: " by a \"g\"), and compile again. The marker disappears, and the module is compiled successfully.\r\r"
                    attr: 5
                  - text: "The set of currently loaded modules can be inspected by clicking on the "
                    attr: 8
                  - text: Loaded Modules
                    attr: 11
