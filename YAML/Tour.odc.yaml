                  - text: "\r\r"
                    attr: 5
                  - text: ObxHello0
                    attr: 6
                  - text: " is a minimal \"hello world\" program in Component Pascal. It writes a single line to the system log text. Execute "
                    attr: 5
                  - text: Open Log
                    attr: 6
                  - text: " from menu "
                    attr: 5
                  - text: Info
                    attr: 6
                  - text: " to display the system log, if it is not open already.\r\r"
                    attr: 5
                  - text: "Exported items in Component Pascal modules are marked by a trailing asterisk; there are no separate header files, definition modules, or the like. Consistency of interfaces and implementations is fully checked by the compiler; version integrity is checked by the dynamic linker."
                    attr: 4
                  - text: "\r\r"
                    attr: 5
                  - text: "Module "
                    attr: 4
                  - text: ObxHello0
                    attr: 9
                  - text: " exports a single command "
                    attr: 4
                  - text: Do
                    attr: 9
                  - text: ". Commands are exported Component Pascal procedures that can be called by the user; i.e., they can be executed directly from the user interface. There is no need for a central \"main\" procedure or top-level module. A command can be added to a menu, attached to a button, or executed directly from within a text. Select the string \"ObxHello0.Do\" below, and then execute command "
                    attr: 4
                  - text: Execute
                    attr: 9
                  - text: " in menu "
                    attr: 4
                  - text: Dev
                    attr: 9
                  - text: ":\r"
                    attr: 4
                  - text: "\r"
                    attr: 5
                  - text: "\tObxHello0.Do"
                    attr: 10
                  - text: "\r\r"
                    attr: 5
                  - text: "When the compiler finds syntax errors, "
                    attr: 8
                  - text: "it flags them directly in the text. For example, the following module version erroneously imports the (nonexisting) module "
                    attr: 5
                  - text: StdLok
                    attr: 6
                  - text: ", instead of "
                    attr: 5
                  - text: StdLog
                    attr: 6
                  - text: ". Try to compile the module - the compiler inserts special embedded objects (error markers) flagging the errors that it found. The compiler also writes a report to the system log.\r\r\t"
