                  - text: About this tour
                    attr: 7
                  - text: "\r"
                    attr: 5
                  - text: "This text is a quick introduction to the BlackBox Component Builder. Read it and follow the small handson examples to get a feeling for the way how BlackBox works.\r"
                    attr: 8
                  - text: "\r"
                    attr: 5
                  - ruler:
                      left: 0
                      right: 0
                      asc: 165100
                      dsc: 25400
                      grid: 190500
                      opts: 0x00000003
                      attr: 7
                      w: 360000000
                      h: 444500
                  - text: Overview over the BlackBox Component Builder
                    attr: 7
                  - text: "\rThe BlackBox Component Builder is an integrated development environment optimized for component-based software development. It consists of development tools, a library of reusable components, a framework that simplifies the development of robust custom components and applications, and a run-time environment for components.\r\rIn BlackBox, the development of applications and their components is done in Component Pascal. This language is a descendant of Pascal, Modula-2, and Oberon. It provides modern features such as objects, full type safety, components (in the form of modules), dynamic linking of components, and garbage collection. The "
                    attr: 5
                  - text: entire
                    attr: 6
                  - text: " BlackBox Component Builder is written in Component Pascal: all library components, all development tools including the Component Pascal compiler, and even the low-level run-time system with its garbage collector. In spite of its power, Component Pascal is a small language that is easy to learn and easy to teach.\r\rThe component library that comes with BlackBox contains components for user interface elements such as command buttons or check boxes; various components that provide word processing functionality ("
                    attr: 5
                  - text: Text
                    attr: 6
                  - text: " subsystem); various components that provide layout management functionality for graphical user interfaces ("
                    attr: 5
                  - text: Form
                    attr: 6
                  - text: " subsystem); database access components ("
                    attr: 5
                  - text: Sql
                    attr: 6
                  - text: " subsystem); communication components ("
                    attr: 5
                  - text: Comm
                    attr: 6
                  - text: " subsystem); and a number of development tool components such as compiler, interface browser, debugger, and so on ("
                    attr: 5
                  - text: Dev
                    attr: 6
                  - text: " subsystem).\r\rComponent interactions are governed by the "
                    attr: 5
                  - text: "BlackBox Component Builder's Frameworks"
                    attr: 6
                  - text: ". These consist of a number of complementary programming interfaces. These interfaces are much simpler and safer, and platform-independent moreover, than basic APIs, such as the Windows APIs. For interactive applications, they define a quite unique compound document architecture. This architecture enables rapid application development (RAD), including the rapid development of new user interface components. The framework design strongly emphasizes robust component interaction. This is important for large-scale software projects that involve components from different sources and evolution of the software over long periods of time. To combine the productivity of a RAD environment with a high degree of architectural robustness was a major design goal for the BlackBox Component Builder. It was attempted to create an environment that is light-weight and flexible, yet doesn't sacrifice robustness and long-term maintainability of software produced with it. This was made possible by an architecture that decomposes the system into components with well-defined interfaces. Software is evolved incrementally, by adding, updating, or removing entire components.\r\rThe BlackBox run-time environment supports dynamic linking and loading (and unloading) of components. In this way, a system can be extended at run-time, without recompiling, relinking, or restarting existing code. Component objects (i.e., instances of classes contained in components) are automatically removed when they are not referenced anymore. This garbage collection service is a crucial safety feature of the run-time system, since it allows to prevent errors like memory leaks and danging pointers, which are almost impossible to avoid in a heavily component-oriented system like BlackBox.\r\r"
                    attr: 5
                  - text: Views
                    attr: 7
                  - text: "\rNow let's have a look at some standard BlackBox components. "
                    attr: 5
                  - text: Views
                    attr: 6
                  - text: " are the most interesting objects implemented by BlackBox components; they can be embedded into documents or other views. Views can be edited and resized in place. This tour text contains several embedded views. Here is a first one: a picture view without editing capabilities; it can be resized by first clicking into the picture and then dragging the displayed resize handles.\r\r"
                    attr: 5
                  - ruler:
                      left: 0
                      right: 0
                      asc: 165100
                      dsc: 25400
                      grid: 190500
                      attr: 5
                      w: 360000000
                      h: 444500
                  - text: "\t"
                    attr: 5
                  - view:
                      kind: HostPictures.StdView
                      storeKind: store
                      typeChain:
                        - HostPictures.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 24
                      bodyPos: 2045
                      bodyLen: 30631
                    attr: 5
                    w: 1514520
                    h: 1695600
                  - text: "\r\t\r"
                    attr: 5
                  - text: "\tA picture view as an "
                    attr: 4
                  - text: "example of a component object embedded in a compound document.\r\r"
                    attr: 5
                  - ruler:
                      left: 0
                      right: 0
                      asc: 165100
                      dsc: 25400
                      grid: 190500
                      opts: 0x00000003
                      attr: 5
                      w: 360000000
                      h: 444500
                  - text: "Other examples of views are controls such as command buttons, check boxes, alarm indicators, oil level meters, and so on. More complex views can implement full-fledged editors such as spreadsheets or graphics editors. The most complex views in BlackBox are container views, i.e., views that may contain other views. Text views are an important example of BlackBox container views. You are now looking at such a text view. Further below, there is an embedded text view containing a small program. The following sections demonstrate how simple programs can be written and tested, and how a graphical user interface can be constructed.\r\r"
                    attr: 5
                  - text: Software development
                    attr: 7
                  - text: "\rThe source code below is a fully editable text, showing the complete implementation of a small Component Pascal module. To compile the module, focus the embedded view by clicking into it (e.g., click on the keyword "
                    attr: 5
                  - text: PROCEDURE
                    attr: 6
                  - text: "), and then execute "
                    attr: 5
                  - text: Compile
                    attr: 6
                  - text: " from menu "
                    attr: 5
                  - text: Dev
                    attr: 6
                  - text: ". As a result, the module is compiled into fast native machine which is written to disk (the file "
                    attr: 5
                  - text: Obx/Code/Hello0
                    attr: 6
                  - text: ").\r\t"
                    attr: 5
