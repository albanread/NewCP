                  - text: "(* 01 F0 *)"
                    attr: 1
                  - text: "\r\t\tV4Tag = 496; "
                    attr: 0
                  - text: "(* F0 01 *)"
                    attr: 1
                  - text: "\r\r\tTYPE\r\t\tFontDesc = RECORD\r\t\t\ttypeface: Fonts.Typeface;\r\t\t\tsize: INTEGER;\r\t\t\tstyle: SET;\r\t\t\tweight: INTEGER\r\t\tEND;\r\r\tVAR default: Fonts.Font;\r\r\tPROCEDURE Split (name: ARRAY OF CHAR; VAR d: FontDesc);\r\t\tVAR i: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ti := 0; ch := name[0];\r\t\tWHILE (ch < \"0\") OR (ch >\"9\") DO\r\t\t\td.typeface[i] := ch; INC(i); ch := name[i]\r\t\tEND;\r\t\td.typeface[i] := 0X;\r\t\td.size := 0;\r\t\tWHILE (\"0\" <= ch) & (ch <= \"9\") DO\r\t\t\td.size := d.size * 10 + (ORD(ch) - 30H); INC(i); ch := name[i]\r\t\tEND;\r\t\tCASE ch OF\r\t\t  \"b\": d.style := {}; d.weight := Fonts.bold\r\t\t| \"i\": d.style := {Fonts.italic}; d.weight := Fonts.normal\r\t\t| \"j\": d.style := {Fonts.italic}; d.weight := Fonts.bold\r\t\t| \"m\": d.style := {}; d.weight := Fonts.bold\r\t\tELSE d.style := {}; d.weight := Fonts.normal\t"
                    attr: 0
                  - text: "(* unknown style *)"
                    attr: 1
                  - text: "\r\t\tEND\r\tEND Split;\r\r\tPROCEDURE ThisFont (name: ARRAY OF CHAR): Fonts.Font; \r\t\tVAR d: FontDesc;\r\tBEGIN\r\t\tSplit(name, d);\r\t\tIF d.typeface = \"Syntax\" THEN d.typeface := default.typeface END;\r\t\tIF d.size = 10 THEN d.size := default.size\r\t\tELSE d.size := (d.size - 2) * Ports.point\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " Fonts.dir.This(d.typeface, d.size, d.style, d.weight)\r\tEND ThisFont;\r\r\tPROCEDURE ThisChar (ch: CHAR): CHAR;\r\tBEGIN\r\t\tCASE ORD(ch) OF\r\t\t  80H: ch := 0C4X | 81H: ch := 0D6X | 82H: ch := 0DCX\r\t\t| 83H: ch := 0E4X | 84H: ch := 0F6X | 85H: ch := 0FCX\r\t\t| 86H: ch := 0E2X | 87H: ch := 0EAX | 88H: ch := 0EEX | 89H: ch := 0F4X | 8AH: ch := 0FBX\r\t\t| 8BH: ch := 0E0X | 8CH: ch := 0E8X | 8DH: ch := 0ECX | 8EH: ch := 0F2X | 8FH: ch := 0F9X\r\t\t| 90H: ch := 0E9X\r\t\t| 91H: ch := 0EBX | 92H: ch := 0EFX\r\t\t| 93H: ch := 0E7X\r\t\t| 94H: ch := 0E1X\r\t\t| 95H: ch := 0F1X\r\t\t| 9BH: ch := TextModels.hyphen\r\t\t| 9FH: ch := TextModels.nbspace\r\t\t| 0ABH: ch := 0DFX\r\t\tELSE\r\t\t\tch := 0BFX\t"
                    attr: 0
                  - text: "(* use inverted question mark for unknown character codes *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " ch\r\tEND ThisChar;\r\t\r\tPROCEDURE ^ LoadTextBlock (r: Stores.Reader; t: TextModels.Model);\r\t\r\tPROCEDURE StdFold (VAR r: Stores.Reader): Views.View;\r\t\tCONST colLeft = 0; colRight = 1; expRight = 2; expLeft = 3;\r\t\tVAR k: BYTE; state: BOOLEAN; hidden: TextModels.Model; fold: StdFolds.Fold;\r\tBEGIN\r\t\tr.ReadByte(k);\r\t\tCASE k MOD 4 OF\r\t\t\t| colLeft: state := StdFolds.collapsed\r\t\t\t| colRight: state := StdFolds.collapsed\r\t\t\t| expRight: state := StdFolds.expanded\r\t\t\t| expLeft: state := StdFolds.expanded\r\t\tEND;\r\t\tIF (k MOD 4 IN {colLeft, expLeft}) & (k < 4) THEN\r\t\t\thidden := TextModels.dir.New(); LoadTextBlock(r, hidden);\r\t\tELSE hidden := NIL;\r\t\tEND;\r\t\tfold := StdFolds.dir.New(state, \"\", hidden);\r\t\tRETURN fold;\r\tEND StdFold;\r\t\r\tPROCEDURE LoadTextBlock (r: Stores.Reader; t: TextModels.Model);\r\t\tVAR r0: Stores.Reader; wr: TextModels.Writer;\r\t\t\torg, len: INTEGER; en, ano, i, n: BYTE; col, voff, ch: CHAR; tag: INTEGER;\r\t\t\tfname: ARRAY 32 OF CHAR;\r\t\t\tattr: ARRAY 32 OF TextModels.Attributes;\r\t\t\tmod, proc: ARRAY 32 OF ARRAY 32 OF CHAR;\r\r\t\tPROCEDURE ReadNum (VAR n: INTEGER);\r\t\t\tVAR s: BYTE; ch: CHAR; y: INTEGER;\r\t\tBEGIN\r\t\t\ts := 0; y := 0; r.ReadXChar(ch);\r\t\t\tWHILE ch >= 80X DO\r\t\t\t\tINC(y, ASH(ORD(ch)-128, s)); INC(s, 7); r.ReadXChar(ch)\r\t\t\tEND;\r\t\t\tn := ASH((ORD(ch) + 64) MOD 128 - 64, s) + y\r\t\tEND ReadNum;\r\r\t\tPROCEDURE ReadSet (VAR s: SET);\r\t\t\tVAR x: INTEGER;\r\t\tBEGIN\r\t\t\tReadNum(x); s := BITS(x)\r\t\tEND ReadSet;\r\r\t\tPROCEDURE Elem (VAR r: Stores.Reader; span: INTEGER);\r\t\t\tVAR v: Views.View; end, ew, eh, n, indent: INTEGER; eno, version: BYTE;\r\t\t\t\tp: TextRulers.Prop; opts: SET;\r\t\tBEGIN\r\t\t\tr.ReadInt(ew); r.ReadInt(eh); r.ReadByte(eno);\r\t\t\tIF eno > en THEN en := eno; r.ReadXString(mod[eno]); r.ReadXString(proc[eno]) END;\r\t\t\tend := r.Pos() + span;\r\t\t\tIF (mod[eno] = \"ParcElems\") OR (mod[eno] = \"StyleElems\") THEN\r\t\t\t\tr.ReadByte(version);\r\t\t\t\tNEW(p);\r\t\t\t\tp.valid := {TextRulers.first .. TextRulers.tabs};\r\t\t\t\tReadNum(indent); ReadNum(p.left);\r\t\t\t\tp.first := p.left + indent;\r\t\t\t\tReadNum(n); p.right := p.left + n;\r\t\t\t\tReadNum(p.lead);\r\t\t\t\tReadNum(p.grid);\r\t\t\t\tReadNum(p.dsc); p.asc := p.grid - p.dsc;\r\t\t\t\tReadSet(opts); p.opts.val := {};\r\t\t\t\tIF ~(0 IN opts) THEN p.grid := 1 END;\r\t\t\t\tIF 1 IN opts THEN INCL(p.opts.val, TextRulers.leftAdjust) END;\r\t\t\t\tIF 2 IN opts THEN INCL(p.opts.val, TextRulers.rightAdjust) END;\r\t\t\t\tIF 3 IN opts THEN INCL(p.opts.val, TextRulers.pageBreak) END;\r\t\t\t\tINCL(p.opts.val, TextRulers.rightFixed);\r\t\t\t\tp.opts.mask := {TextRulers.leftAdjust .. TextRulers.pageBreak, TextRulers.rightFixed};\r\t\t\t\tReadNum(n); p.tabs.len := n;\r\t\t\t\ti := 0; WHILE i < p.tabs.len DO ReadNum(p.tabs.tab[i].stop); INC(i) END;\r\t\t\t\tv := TextRulers.dir.NewFromProp(p);\r\t\t\t\twr.WriteView(v, ew, eh)\r\t\t\tELSIF mod[eno] = \"StampElems\" THEN\r\t\t\t\tv := Stamps.New();\r\t\t\t\twr.WriteView(v, ew, eh)\r\t\t\tELSIF mod[eno] = \"ClockElems\" THEN\r\t\t\t\tv := Clocks.New();\r\t\t\t\twr.WriteView(v, ew, eh)\r\t\t\tELSIF mod[eno] = \"FoldElems\" THEN\r\t\t\t\tv := StdFold(r);\r\t\t\t\twr.WriteView(v, ew, eh);\r\t\t\tEND;\r\t\t\tr.SetPos(end)\r\t\tEND Elem;\r\r\tBEGIN\r\t\t(* "
                    attr: 0
                  - text: skip inner text tags (legacy from V2)
                    attr: 1
                  - text: " *)\r\t\tr.ReadXInt(tag);\r\t\tIF tag # V2Tag THEN r.SetPos(r.Pos()-2) END;\r\t\t(* "
                    attr: 0
                  - text: load text block
                    attr: 1
                  - text: " *)\r\t\torg := r.Pos(); r.ReadInt(len); INC(org, len - 2);\r\t\tr0.ConnectTo(r.rider.Base()); r0.SetPos(org);\r\t\twr := t.NewWriter(NIL); wr.SetPos(0);\r\t\tn := 0; en := 0; r.ReadByte(ano);\r\t\tWHILE ano # 0 DO\r\t\t\tIF ano > n THEN\r\t\t\t\tn := ano; r.ReadXString(fname);\r\t\t\t\tattr[n] := TextModels.NewFont(wr.attr, ThisFont(fname))\r\t\t\tEND;\r\t\t\tr.ReadXChar(col); r.ReadXChar(voff); r.ReadInt(len);\r\t\t\twr.SetAttr(attr[ano]);\r\t\t\tIF len > 0 THEN\r\t\t\t\tWHILE len # 0 DO\r\t\t\t\t\tr0.ReadXChar(ch);\r\t\t\t\t\tIF ch >= 80X THEN ch := ThisChar(ch) END;\r\t\t\t\t\tIF (ch >= \" \") OR (ch = TextModels.tab) OR (ch = TextModels.line) THEN\r\t\t\t\t\t\twr.WriteChar(ch)\r\t\t\t\t\tEND;\r\t\t\t\t\tDEC(len)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tElem(r, -len); r0.ReadXChar(ch)\r\t\t\tEND;\r\t\t\tr.ReadByte(ano)\r\t\tEND;\r\t\tr.ReadInt(len);\r\t\tr.SetPos(r.Pos() + len);\r\tEND LoadTextBlock;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ImportOberon
                    attr: 3
                  - text: "* (f: Files.File): TextModels.Model;\r\t\tVAR r: Stores.Reader; t: TextModels.Model; tag: INTEGER;\r\tBEGIN\r\t\tr.ConnectTo(f); r.SetPos(0);\r\t\tr.ReadXInt(tag);\r\t\tIF tag = ORD(\"o\") + 256 * ORD(\"B\") THEN\r\t\t\t(* "
                    attr: 0
                  - text: "ignore file header of "
                    attr: 1
                  - text: Oberon for Windows
                    attr: 0
                  - text: " and "
