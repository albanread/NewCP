                    attr: 0
                  - text: " files"
                    attr: 1
                  - text: " *)\r\t\t\tr.SetPos(34); r.ReadXInt(tag)\r\t\tEND;\r\t\tASSERT((tag = V2Tag) OR (tag = V4Tag), 100);\r\t\tt := TextModels.dir.New();\r\t\tLoadTextBlock(r, t);\r\t\tRETURN t;\r\tEND ImportOberon;\r\t\r\r\tPROCEDURE "
                    attr: 0
                  - text: ImportETHDoc
