                  - text: "\r\tIMPORT\r\t\tFonts, Files, Stores, Ports, Views,\r\t\tTextModels, TextRulers, TextViews,\r\t\tStamps := StdStamps, Clocks := StdClocks, StdFolds;\r\r\tCONST\r\t\tV2Tag = -4095; "
