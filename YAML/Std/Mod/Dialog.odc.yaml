                  - text: "\r\tIMPORT\r\t\t"
                    attr: 0
                  - text: Kernel
                    attr: 3
                  - text: ", Meta, Strings, Files, Stores, Models, Sequencers, Views,\r\t\tContainers, Dialog, Properties, Documents, Converters, Windows;\r\r\r\tTYPE\r\t\t"
                    attr: 0
                  - text: Item
                    attr: 3
                  - text: "* = POINTER TO EXTENSIBLE RECORD\r\t\t\tnext*: Item;\r\t\t\titem-, string-, filter-: POINTER TO ARRAY OF CHAR;\r\t\t\tshortcut-: ARRAY 8 OF CHAR;\r\t\t\tprivateFilter-, failed, trapped: BOOLEAN;\t"
                    attr: 0
                  - text: "(* filter call failed, caused a trap *)"
                    attr: 1
                  - text: "\r\t\t\tres: INTEGER\t"
                    attr: 0
                  - text: "(* result code of failed filter *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\t\t\r\t\tFilterProcVal = RECORD (Meta.Value) p: Dialog.GuardProc END;\r\t\tFilterProcPVal = RECORD (Meta.Value) p: PROCEDURE(n: INTEGER; VAR p: Dialog.Par) END;\r\r\t\tViewHook = POINTER TO RECORD (Views.ViewHook) END;\r\r\r\tVAR "
                    attr: 0
                  - text: curItem
                    attr: 3
                  - text: "-: Item;\t"
                    attr: 0
                  - text: "(** IN parameter for item filters **)"
                    attr: 1
                  - text: "\r\r\r\tPROCEDURE "
                    attr: 0
                  - text: GetSubLoc
                    attr: 3
                  - text: "* (mod: ARRAY OF CHAR; cat: Files.Name;\r\t\t\t\t\t\t\t\t\t\t\tOUT loc: Files.Locator; OUT name: Files.Name);\r\t\tVAR sub: Files.Name; file: Files.File; type: Files.Type;\r\tBEGIN\r\t\tIF (cat[0] = \"S\") & (cat[1] = \"y\") & (cat[2] = \"m\") THEN type := Kernel.symType\r\t\tELSIF (cat[0] = \"C\") & (cat[1] = \"o\") & (cat[2] = \"d\") & (cat[3] = \"e\") THEN type := Kernel.objType\r\t\tELSE type := \"\"\r\t\tEND;\r\t\tKernel.SplitName(mod, sub, name); Kernel.MakeFileName(name, type);\r\t\tloc := Files.dir.This(sub); file := NIL;\r\t\tIF loc # NIL THEN\r\t\t\tloc := loc.This(cat);\r\t\t\tIF sub = \"\" THEN\r\t\t\t\tIF loc # NIL THEN\r\t\t\t\t\tfile := Files.dir.Old(loc, name, Files.shared);\r\t\t\t\t\tIF file = NIL THEN loc := NIL END\r\t\t\t\tEND;\r\t\t\t\tIF loc = NIL THEN\r\t\t\t\t\tloc := Files.dir.This(\"System\");\r\t\t\t\t\tIF loc # NIL THEN loc := loc.This(cat) END\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND GetSubLoc;\r\r\r\tPROCEDURE Len (VAR str: ARRAY OF CHAR): INTEGER;\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\ti := 0; WHILE str[i] # 0X DO INC(i) END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " i\r\tEND Len;\r\r\tPROCEDURE "
                    attr: 0
                  - text: AddItem
                    attr: 3
                  - text: "* (i: Item; item, string, filter, shortcut: ARRAY OF CHAR);\r\t\tVAR j: INTEGER; ch: CHAR;\r\tBEGIN\r\t\tASSERT(i # NIL, 20);\r\t\tNEW(i.item, Len(item) + 1);\r\t\tNEW(i.string, Len(string) + 1);\r\t\tNEW(i.filter, Len(filter) + 1);\r\t\tASSERT((i.item # NIL) & (i.string # NIL) & (i.filter # NIL), 100);\r\t\ti.item^ := item$;\r\t\ti.string^ := string$;\r\t\ti.filter^ := filter$;\r\t\ti.shortcut := shortcut$;\r\t\tj := 0; ch := filter[0]; WHILE (ch # \".\") & (ch # 0X) DO INC(j); ch := filter[j] END;\r\t\ti.privateFilter := (j > 0) & (ch = 0X);\r\t\ti.failed := FALSE; i.trapped := FALSE\r\tEND AddItem;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ClearGuards
                    attr: 3
                  - text: "* (i: Item);\r\tBEGIN\r\t\ti.failed := FALSE; i.trapped := FALSE\r\tEND ClearGuards;\r\r\tPROCEDURE GetGuardProc (name: ARRAY OF CHAR; VAR i: Meta.Item;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR par: BOOLEAN; VAR n: INTEGER);\r\t\tVAR j, k: INTEGER; num: ARRAY 32 OF CHAR;\r\tBEGIN\r\t\tj := 0;\r\t\tWHILE (name[j] # 0X) & (name[j] # \"(\") DO INC(j) END;\r\t\tIF name[j] = \"(\" THEN\r\t\t\tname[j] := 0X; INC(j); k := 0;\r\t\t\tWHILE (name[j] # 0X) & (name[j] # \")\") DO num[k] := name[j]; INC(j); INC(k) END;\r\t\t\tIF (name[j] = \")\") & (name[j+1] = 0X) THEN\r\t\t\t\tnum[k] := 0X; Strings.StringToInt(num, n, k);\r\t\t\t\tIF k = 0 THEN Meta.LookupPath(name, i); par := TRUE\r\t\t\t\tELSE Meta.Lookup(\"\", i)\r\t\t\t\tEND\r\t\t\tELSE Meta.Lookup(\"\", i)\r\t\t\tEND\r\t\tELSE\r\t\t\tMeta.LookupPath(name, i); par := FALSE\r\t\tEND\r\tEND GetGuardProc;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: CheckFilter
                    attr: 3
                  - text: "* (i: Item; VAR failed, ok: BOOLEAN; VAR par: Dialog.Par);\r\t\tVAR x: Meta.Item; v: FilterProcVal; vp: FilterProcPVal; p: BOOLEAN; n: INTEGER;\r\tBEGIN\r\t\tIF ~i.failed THEN\r\t\t\tcurItem := i;\r\t\t\tpar.disabled := FALSE; par.checked := FALSE; par.label := i.item$;\r\t\t\tpar.undef := FALSE; par.readOnly := FALSE;\r\t\t\ti.failed := TRUE; i.trapped := TRUE;\r\t\t\tGetGuardProc(i.filter^, x, p, n);\r\t\t\tIF (x.obj = Meta.procObj) OR (x.obj = Meta.varObj) & (x.typ = Meta.procTyp) THEN\r\t\t\t\tIF p THEN\r\t\t\t\t\tx.GetVal(vp, ok);\r\t\t\t\t\tIF ok THEN vp.p(n, par) END\r\t\t\t\tELSE\r\t\t\t\t\tx.GetVal(v, ok);\r\t\t\t\t\tIF ok THEN v.p(par) END\r\t\t\t\tEND\r\t\t\tELSE ok := FALSE\r\t\t\tEND;\r\t\t\tIF ok THEN i.res := 0 ELSE i.res := 1 END;\r\t\t\ti.trapped := FALSE; i.failed := ~ok\r\t\tEND;\r\t\tfailed := i.failed\r\tEND CheckFilter;\r\r\tPROCEDURE "
                    attr: 0
                  - text: HandleItem
                    attr: 3
                  - text: "* (i: Item);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF ~i.failed THEN\r\t\t\tViews.ClearQueue; res := 0;\r\t\t\tDialog.Call(i.string^, \" \", res)\r\t\tELSIF (i # NIL) & i.failed THEN\r\t\t\tIF i.trapped THEN\r\t\t\t\tDialog.ShowParamMsg(\"#System:ItemFilterTrapped\", i.string^, i.filter^, \"\")\r\t\t\tELSE\r\t\t\t\tDialog.ShowParamMsg(\"#System:ItemFilterNotFound\", i.string^, i.filter^, \"\")\r\t\t\tEND\r\t\tEND\r\tEND HandleItem;\r\r\tPROCEDURE "
                    attr: 0
                  - text: RecalcView
                    attr: 3
                  - text: "* (v: Views.View);\r\t"
                    attr: 0
                  - text: "(* recalc size of all subviews of v, then v itself *)"
                    attr: 1
                  - text: "\r\tVAR m: Models.Model; v1: Views.View; c: Containers.Controller;\r\t\tminW, maxW, minH, maxH, w, h, w0, h0: INTEGER;\r\tBEGIN\r\t\tIF v IS Containers.View THEN\r\t\t\tc := v(Containers.View).ThisController();\r\t\t\tIF c # NIL THEN\r\t\t\t\tv1 := NIL; c.GetFirstView(Containers.any, v1);\r\t\t\t\tWHILE v1 # NIL DO\r\t\t\t\t\tRecalcView(v1);\r\t\t\t\t\tc.GetNextView(Containers.any, v1)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND;\r\t\tIF v.context # NIL THEN\r\t\t\tm := v.context.ThisModel();\r\t\t\tIF (m # NIL) & (m IS Containers.Model) THEN\r\t\t\t\tm(Containers.Model).GetEmbeddingLimits(minW, maxW, minH, maxH);\r\t\t\t\tv.context.GetSize(w0, h0); w := w0; h := h0;\r\t\t\t\tProperties.PreferredSize(v, minW, maxW, minH, maxH, w, h, w, h);\r\t\t\t\tIF (w # w0) OR (h # h0) THEN v.context.SetSize(w, h) END\r\t\t\tEND\r\t\tEND\r\tEND RecalcView;\r\r\r\tPROCEDURE "
                    attr: 0
                  - text: Open
                    attr: 3
                  - text: "* (v: Views.View; title: ARRAY OF CHAR;\r\t\t\t\t\t\t\t\t\tloc: Files.Locator; name: Files.Name; conv: Converters.Converter;\r\t\t\t\t\t\t\t\t\tasTool, asAux, noResize, allowDuplicates, neverDirty: BOOLEAN);\r\t\tVAR t: Views.Title; flags, opts: SET; done: BOOLEAN; d: Documents.Document; i: INTEGER;\r\t\t\twin: Windows.Window; c: Containers.Controller; seq: ANYPTR;\r\tBEGIN\r\t\tIF conv = NIL THEN conv := Converters.list END;\t"
                    attr: 0
                  - text: "(* use document converter *)"
                    attr: 1
                  - text: "\r\t\tASSERT(v # NIL, 20);\r\t\tflags := {}; done := FALSE;\r\t\tIF noResize THEN\r\t\t\tflags := flags + {Windows.noResize, Windows.noHScroll, Windows.noVScroll}\r\t\tEND;\r\t\tIF asTool THEN INCL(flags, Windows.isTool) END;\r\t\tIF asAux THEN INCL(flags, Windows.isAux) END;\r\t\tIF neverDirty THEN INCL(flags, Windows.neverDirty) END;\r\t\ti := 0;\r\t\tWHILE (i < LEN(t) - 1) & (title[i] # 0X) DO t[i] := title[i]; INC(i) END;\r\t\tt[i] := 0X;\r\t\tIF ~allowDuplicates THEN\r\t\t\tWindows.SelectBySpec(loc, name, conv, flags, done);\r\t\t\tIF ~done & (title # \"\") & (loc = NIL) & (name = \"\") THEN\r\t\t\t\tWindows.SelectByTitle(v, flags, t, done)\r\t\t\tEND\r\t\tELSE\r\t\t\tINCL(flags, Windows.allowDuplicates)\r\t\tEND;\r\t\tIF ~done THEN\r\t\t\tIF v IS Documents.Document THEN\r\t\t\t\tIF v.context # NIL THEN\r\t\t\t\t\td := Documents.dir.New(\r\t\t\t\t\t\t\t\tViews.CopyOf(v(Documents.Document).ThisView(), Views.shallow), \r\t\t\t\t\t\t\t\tViews.undefined, Views.undefined)\r\t\t\t\tELSE\r\t\t\t\t\td := v(Documents.Document)\r\t\t\t\tEND;\r\t\t\t\tASSERT(d.context = NIL, 22);\r\t\t\t\tv := d.ThisView(); ASSERT(v # NIL, 23)\r\t\t\tELSIF v.context # NIL THEN\r\t\t\t\tASSERT(v.context IS Documents.Context, 24);\r\t\t\t\td := v.context(Documents.Context).ThisDoc();\r\t\t\t\tIF d.context # NIL THEN\r\t\t\t\t\td := Documents.dir.New(Views.CopyOf(v, Views.shallow), Views.undefined, Views.undefined)\r\t\t\t\tEND;\r\t\t\t\tASSERT(d.context = NIL, 25)\r\t\t\t\t(*IF d.Domain() = NIL THEN Stores.InitDomain(d, v.Domain()) END (for views opened via Views.Old *)\r\t\t\tELSE\r\t\t\t\td := Documents.dir.New(v, Views.undefined, Views.undefined)\r\t\t\tEND;\r\t\t\tIF asTool OR asAux THEN\r\t\t\t\tc := d.ThisController();\r\t\t\t\tc.SetOpts(c.opts + {Containers.noSelection})\r\t\t\tEND;\r\t\t\tASSERT(d.Domain() = v.Domain(), 100);\r\t\t\tASSERT(d.Domain() # NIL, 101);\r\t\t\tseq := d.Domain().GetSequencer();\r\t\t\tIF neverDirty & (seq # NIL) THEN\r\t\t\t\tASSERT(seq IS Sequencers.Sequencer, 26);\r\t\t\t\tseq(Sequencers.Sequencer).SetDirty(FALSE)\r\t\t\tEND;\r\t\t\tIF neverDirty THEN\r\t\t\t\t"
                    attr: 0
                  - text: "(* change \"fit to page\" to \"fit to window\" in secondary windows *)"
                    attr: 1
                  - text: "\r\t\t\t\tc := d.ThisController(); opts := c.opts;\r\t\t\t\tIF Documents.pageWidth IN opts THEN\r\t\t\t\t\topts := opts - {Documents.pageWidth} + {Documents.winWidth}\r\t\t\t\tEND;\r\t\t\t\tIF Documents.pageHeight IN opts THEN\r\t\t\t\t\topts := opts - {Documents.pageHeight} + {Documents.winHeight}\r\t\t\t\tEND;\r\t\t\t\tc.SetOpts(opts)\r\t\t\tEND;\r\t\t\twin := Windows.dir.New();\r\t\t\tIF seq # NIL THEN\r\t\t\t\tWindows.dir.OpenSubWindow(win, d, flags, t)\r\t\t\tELSE\r\t\t\t\tWindows.dir.Open(win, d, flags, t, loc, name, conv)\r\t\t\tEND\r\t\tEND\r\tEND Open;\r\t\r\tPROCEDURE (h: ViewHook) Open (v: Views.View; title: ARRAY OF CHAR;\r\t\t\t\t\t\t\t\tloc: Files.Locator; name: Files.Name; conv: Converters.Converter;\r\t\t\t\t\t\t\t\tasTool, asAux, noResize, allowDuplicates, neverDirty: BOOLEAN);\r\tBEGIN\r\t\tOpen(v, title, loc, name, conv, asTool, asAux, noResize, allowDuplicates, neverDirty)\r\tEND Open;\r\r\tPROCEDURE (h: ViewHook) OldView (loc: Files.Locator; name: Files.Name;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR conv: Converters.Converter): Views.View;\r\t\tVAR w: Windows.Window; s: Stores.Store; c: Converters.Converter;\r\tBEGIN\r\t\tASSERT(loc # NIL, 20); ASSERT(name # \"\", 21);\r\t\tKernel.MakeFileName(name, \"\"); s := NIL;\r\t\tc := conv;\r\t\tIF c = NIL THEN c := Converters.list END;\t"
                    attr: 0
                  - text: "(* use document converter *)"
                    attr: 1
                  - text: "\r\t\tw := Windows.GetBySpec(loc, name, c, {});"
                    attr: 0
                  - text: "\r\t\t"
                    attr: 4
                  - text: "IF w # NIL THEN s := w.doc.ThisView() END;\r\t\tIF s = NIL THEN\r\t\t\tConverters.Import(loc, name, conv, s);\r\t\t\tIF s # NIL THEN RecalcView(s(Views.View)) END\r\t\tEND;\r\t\tIF s # NIL THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " s(Views.View) ELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL END\r\tEND OldView;\r\r\tPROCEDURE (h: ViewHook) RegisterView (v: Views.View; \r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tloc: Files.Locator; name: Files.Name; conv: Converters.Converter);\r\tBEGIN\r\t\tASSERT(v # NIL, 20); ASSERT(loc # NIL, 21); ASSERT(name # \"\", 22);\r\t\tKernel.MakeFileName(name, \"\");\r\t\tConverters.Export(loc, name, conv, v)\r\tEND RegisterView;\r\r\tPROCEDURE Init;\r\t\tVAR h: ViewHook;\r\tBEGIN\r\t\tNEW(h); Views.SetViewHook(h)\r\tEND Init;\r\rBEGIN\r\tInit\rEND StdDialog.\r"
                    attr: 0
