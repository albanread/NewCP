                    attr: 3
                  - text: " c.base.context.Normalize()\r\tEND Normalize;\r\r\tPROCEDURE (c: Context) Consider (VAR p: Models.Proposal);\r\tBEGIN\r\t\tc.base.context.Consider(p)\r\tEND Consider;\r\r\tPROCEDURE (c: Context) ThisModel (): Models.Model;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL\r\tEND ThisModel;\r\r\tPROCEDURE NewField(t: Control; col, w, h: INTEGER): Views.View;\r\t\tVAR c: Context; p: Controls.Prop; v: Views.View; prop: Properties.StdProp; setMsg: Properties.SetMsg;\r\tBEGIN\r\t\tNEW(p); p.link := \"StdTables.text\";\r\t\tIF t.mode[col] = left THEN p.opt[Controls.left] := TRUE\r\t\tELSIF t.mode[col] = right THEN p.opt[Controls.right] := TRUE\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: "(* bug in controls, thus adjusting has to be set to left mode *)"
                    attr: 1
                  - text: "\r\t\tp.opt[Controls.left] := TRUE;\r\t\tp.opt[Controls.right] := FALSE;\r\t\tv := Controls.dir.NewField(p);\r\r\t\tNEW(c); c.w := w; c.h := h; c.base := t;\r\t\tv.InitContext(c);\r\r\t\tNEW(prop);\r\t\tprop.typeface := t.fldFont.typeface;\r\t\tprop.size := t.fldFont.size - Fonts.point;\r\t\tprop.style.val := t.fldFont.style;\r\t\tprop.style.mask := t.fldFont.style;\r\t\tprop.weight := t.fldFont.weight;\r\t\tprop.valid := {Properties.typeface..Properties.weight};\r\t\tprop.known := prop.valid;\r\t\tsetMsg.prop := prop;\r\t\tViews.HandlePropMsg(v, setMsg);\r\t\tRETURN v\r\tEND NewField;\r\r\tPROCEDURE SendNotifyMsg (c: Control);\r\t\tVAR msg: Views.NotifyMsg;\r\tBEGIN\r\t\tmsg.id0 := c.item.adr; msg.id1 := msg.id0 + c.item.Size();\r\t\tmsg.opts := {2, 4}; (* update, guardcheck *)\r\t\tViews.Omnicast(msg)\r\tEND SendNotifyMsg;\r\r\tPROCEDURE GetSize(c: Control; OUT rows, cols: INTEGER);\r\t\tVAR item: Meta.Item;\r\tBEGIN\r\t\tIF c.item.Valid() THEN\r\t\t\titem := c.item;\r\t\t\tc.item.Lookup(\"rows\", item); rows := item.IntVal();\r\t\t\tc.item.Lookup(\"cols\", item); cols := item.IntVal()\r\t\tELSE\r\t\t\trows := 0; cols := 0\r\t\tEND\r\tEND GetSize;\r\r\tPROCEDURE GetLabel(c: Control; col: INTEGER; OUT val: Dialog.String; OUT ok: BOOLEAN);\r\t\tVAR t: TableValue;\r\tBEGIN\r\t\tASSERT(c.item.Valid(), 20);\r\t\tc.item.GetVal(t, ok); t.t.GetLabel(col, val)\r\tEND GetLabel;\r\r\tPROCEDURE GetAttr(c: Control; row, col: INTEGER; \r\t\t\t\t\t\t\t\tOUT style: SET; OUT weight: INTEGER; OUT color: Ports.Color; OUT ok: BOOLEAN);\r\t\tVAR t: TableValue;\r\tBEGIN\r\t\tASSERT(c.item.Valid(), 20);\r\t\tc.item.GetVal(t, ok); t.t.GetAttr(row, col, style, weight, color)\r\tEND GetAttr;\r\r\tPROCEDURE GetText(c: Control; row, col: INTEGER; OUT val: Dialog.String; OUT ok: BOOLEAN);\r\t\tVAR t: TableValue;\r\tBEGIN\r\t\tASSERT(c.item.Valid(), 20);\r\t\tc.item.GetVal(t, ok); t.t.GetItem(row, col, val)\r\tEND GetText;\r\r\tPROCEDURE SetText(c: Control; f: Views.Frame; row, col: INTEGER; IN val: Dialog.String; OUT ok: BOOLEAN);\r\t\tVAR t: TableValue;\r\tBEGIN\r\t\tASSERT(c.item.Valid(), 20);\r\t\tc.item.GetVal(t, ok);\r\t\tIF ok THEN\r\t\t\tt.t.SetItem(row, col, val);\r\t\t\t(* Notify(c, row, col, {}, changed); *)\r\t\t\tSendNotifyMsg(c);\r\t\t\tControls.Notify(c, f, changed, row, col)\r\t\tEND\r\tEND SetText;\r\r\tPROCEDURE GetSelection(c: Control; OUT on: BOOLEAN; OUT row, col: INTEGER; OUT ok: BOOLEAN);\r\t\tVAR t: TableValue;\r\tBEGIN\r\t\tASSERT(c.item.Valid(), 20);\r\t\tc.item.GetVal(t, ok);\r\t\tIF ok THEN\r\t\t\ton := t.t.HasSelection();\r\t\t\tIF on THEN t.t.GetSelection(row, col) ELSE row := -1; col := -1 END\r\t\tEND\r\tEND GetSelection;\r\r\tPROCEDURE SetSelection(c: Control; f: Views.Frame; on: BOOLEAN; row, col: INTEGER; OUT ok: BOOLEAN);\r\t\tVAR t: TableValue;\r\tBEGIN\r\t\tASSERT(c.item.Valid(), 20);\r\t\tc.item.GetVal(t, ok);\r\t\tIF ok THEN\r\t\t\tIF on THEN t.t.Select(row, col); Controls.Notify(c, f, select, row, col)\r\t\t\tELSE t.t.Deselect; Controls.Notify(c, f, deselect, row, col)\r\t\t\tEND;\r\t\t\tSendNotifyMsg(c)\r\t\tEND\r\tEND SetSelection;\r\r\r\tPROCEDURE SetupControl (t: Control);\r\t\tVAR i, asc, dsc, w: INTEGER;\r\tBEGIN\r\t\tt.fldFont := Fonts.dir.This(t.sprop.typeface, t.sprop.size, t.sprop.style.val, Fonts.normal);\r\t\tt.titFont := Fonts.dir.This(t.sprop.typeface, t.sprop.size, t.sprop.style.val, Fonts.bold);\r\t\tt.rowHeight := 3 * t.sprop.size DIV 2;\r\t\tt.fldFont.GetBounds(asc, dsc, w);\r\t\tt.rowHeight := asc + dsc + 4 * Ports.point;\r\t\tt.baseOff := (t.rowHeight - asc - dsc) DIV 2 + asc;\r\t\ti := t.columns;\r\t\tWHILE i < maxCol DO t.width[i] := defColW; t.mode[i] := center; INC(i) END;\r\t\tIF t.field # NIL THEN\r\t\t\tt.field.context(Context).h := t.rowHeight\r\t\tEND;\r\t\tt.labelHeight := t.rowHeight \r\tEND SetupControl;\r\r\r\t"
                    attr: 0
                  - text: "(** Directory **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (d: Directory) "
                    attr: 0
                  - text: NewControl
                    attr: 3
                  - text: "* (p: Controls.Prop): Views.View, NEW, ABSTRACT;\r\r\r\t"
                    attr: 0
                  - text: "(* PropOp *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (op: PropOp) Do;\r\t\tVAR c: Control; sprop: Properties.StdProp; tprop: Prop;\r\tBEGIN\r\t\tASSERT((op.sprop # NIL) OR (op.tprop # NIL), 20);\r\t\tc := op.tab;\r\t\tIF op.sprop # NIL THEN\r\t\t\tsprop := Properties.CopyOf(c.sprop)(Properties.StdProp);\r\t\t\tsprop.valid := op.sprop.valid;\t"
                    attr: 0
                  - text: "(* fields to be restored *)"
                    attr: 1
                  - text: "\r\t\t\tIF Properties.typeface IN sprop.valid THEN c.sprop.typeface := op.sprop.typeface END;\r\t\t\tIF Properties.size IN sprop.valid THEN c.sprop.size := op.sprop.size END;\r\t\t\tIF Properties.style IN sprop.valid THEN\r\t\t\t\tc.sprop.style.mask := c.sprop.style.mask + op.sprop.style.mask;\r\t\t\t\tc.sprop.style.val := c.sprop.style.val - op.sprop.style.mask + op.sprop.style.val\r\t\t\tEND;\r\t\t\tIF sprop.valid # {} THEN SetupControl(c) END;\r\t\t\top.sprop := sprop\r\t\tEND;\r\t\tIF op.tprop # NIL THEN\r\t\t\ttprop := Properties.CopyOf(c.tprop)(Prop);\r\t\t\ttprop.valid := op.tprop.valid;\t"
                    attr: 0
                  - text: "(* fields to be restored *)"
                    attr: 1
                  - text: "\r\t\t\tIF layoutEditable IN tprop.valid THEN c.tprop.layoutEditable := op.tprop.layoutEditable END;\r\t\t\tIF dataEditable IN tprop.valid THEN c.tprop.dataEditable := op.tprop.dataEditable END;\r\t\t\tIF selectionStyle IN tprop.valid THEN c.tprop.selectionStyle := op.tprop.selectionStyle END;\r\t\t\top.tprop := tprop\r\t\tEND;\r\t\tViews.Update(c, Views.rebuildFrames)\r\tEND Do;\r\r\r\t"
                    attr: 0
                  - text: "(* FormatOp *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (op: FormatOp) Do;\r\t\tVAR t: Control; c, w, m: INTEGER;\r\tBEGIN\r\t\tt := op.tab; c := op.col; w := op.width; m := op.mode;\r\t\top.width := t.width[c]; op.mode := t.mode[c];\r\t\tt.width[c] := w; t.mode[c] := m;\r\t\tIF c >= t.columns THEN t.columns := c + 1 END;\r\t\tViews.Update(t, Views.keepFrames)\r\tEND Do;\r\r\r\t"
                    attr: 0
                  - text: "(* properties *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE PollProp (c: Control; VAR list: Properties.Property);\r\t\tVAR p: Properties.Property;\r\tBEGIN\r\t\tp := Properties.CopyOf(c.sprop);\r\t\tp.valid := {Properties.typeface, Properties.size, Properties.style, Properties.weight};\r\t\tp.known := p.valid; p.readOnly := {Properties.weight};\r\t\tProperties.Insert(list, p);\r\t\tp := Properties.CopyOf(c.tprop);\r\t\tp.valid := {layoutEditable, dataEditable, selectionStyle}; p.known := p.valid; p.readOnly := {};\r\t\tProperties.Insert(list, p)\r\tEND PollProp;\r\r\tPROCEDURE SetProp (c: Control; p: Properties.Property);\r\t\tVAR op: PropOp; valid: SET;\r\tBEGIN\r\t\top := NIL;\r\t\tWHILE p # NIL DO\r\t\t\tWITH p: Properties.StdProp DO\r\t\t\t\tvalid := p.valid * {Properties.typeface, Properties.size, Properties.style};\r\t\t\t\tIF valid # {} THEN\r\t\t\t\t\tIF op = NIL THEN NEW(op); op.tab := c END;\r\t\t\t\t\top.sprop := Properties.CopyOf(p)(Properties.StdProp);\r\t\t\t\t\top.sprop.valid := valid\r\t\t\t\tEND\r\t\t\t| p: Prop DO\r\t\t\t\tvalid := p.valid * {layoutEditable, dataEditable, selectionStyle};\r\t\t\t\tIF valid # {} THEN\r\t\t\t\t\tIF op = NIL THEN NEW(op); op.tab := c END;\r\t\t\t\t\top.tprop := Properties.CopyOf(p)(Prop);\r\t\t\t\t\top.tprop.valid := valid\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\tEND;\r\t\t\tp := p.next\r\t\tEND;\r\t\tIF op # NIL THEN Views.Do(c, "
                    attr: 0
                  - text: "\"#System:SetProp\""
                    attr: 3
                  - text: ", op) END\r\tEND SetProp;\r\r\r\t"
                    attr: 0
                  - text: "(* Control *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE DrawBorder (f: Views.Frame; x, y, w, h: INTEGER);\r\tBEGIN\r"
                    attr: 0
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 104775
                      dsc: 28575
                      grid: 1
                      opts: 0x00000001
                      tabs:
                        - { stop: 144000 }
