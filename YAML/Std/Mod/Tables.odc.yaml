                  - text: "*;\r\tBEGIN\r\t\tIF action = NIL THEN NEW(action); Services.DoLater(action, Services.now) END;\r\t\tControllers.SetCurrentPath(Controllers.targetPath);\r\t\tPollPropForDlg;\r\t\tControllers.ResetCurrentPath()\r\tEND InitDialog;\r\r\tPROCEDURE "
