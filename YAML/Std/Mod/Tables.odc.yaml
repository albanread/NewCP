                    attr: 3
                  - text: "t.showSelection := TRUE\r\t\tEND\r\tEND DisableEditField;\r\r\tPROCEDURE MoveEditField (t: Control; f: Views.Frame; right: BOOLEAN);\r\t\tVAR rows, cols: INTEGER; ok: BOOLEAN;\r\tBEGIN\r\t\tDisableEditField(t, f, TRUE);\r\t\tGetSize(t, rows, cols);\r\t\tSelect(t, f, FALSE);\r\t\tIF right THEN\r\t\t\tt.selCol := (t.selCol + 1) MOD cols;\r\t\t\tIF t.selCol = 0 THEN t.selRow := (t.selRow + 1) MOD rows END\r\t\tELSE\r\t\t\tt.selCol := (t.selCol - 1) MOD cols;\r\t\t\tIF t.selCol = cols - 1 THEN t.selRow := (t.selRow - 1) MOD rows END\r\t\tEND;\r\t\tt.hasSelection := TRUE; t.showSelection := FALSE;\r\t\tSetSelection(t, f, TRUE, t.selRow, t.selCol, ok);\r\t\tAddEditField(t, f, t.selRow, t.selCol)\r\tEND MoveEditField;\r\r\tPROCEDURE TrackMouse (t: Control; f: Views.Frame; VAR r, c, type: INTEGER);\r\t\tVAR x, y, selr, selc: INTEGER; m: SET; isDown, sel: BOOLEAN;\r\tBEGIN\r\t\tselr := t.selRow; selc := t.selCol; sel := t.hasSelection;\r\t\tREPEAT\r\t\t\tf.Input(x, y, m, isDown);\r\t\t\tCheckPos(t, x, y, f.dot, c, type, r);\r\t\t\tIF sel & ((type # field) OR (selr # r) OR (selc # c)) THEN\r\t\t\t\tDrawSelection(t, f, selr, selc, FALSE)\r\t\t\tEND;\r\t\t\tIF (type = field) & (~sel OR (selr # r) OR (selc # c)) THEN\r\t\t\t\tDrawSelection(t, f, r, c, TRUE)\r\t\t\tEND;\r\t\t\tsel := type = field; selr := r; selc := c\r\t\tUNTIL ~isDown;\r\t\tIF ~sel & t.hasSelection THEN\r\t\t\tDrawSelection(t, f, t.selRow, t.selCol, TRUE)\r\t\tEND\r\tEND TrackMouse;\r\r\tPROCEDURE (t: Control) HandleCtrlMsg2 (f: Views.Frame; VAR msg: Controllers.Message;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\t\tVAR p, col, type: INTEGER; x, y: INTEGER; m: SET; isDown: BOOLEAN;\r\t\t\tok, rebuild: BOOLEAN; c, w, size, part, pos: INTEGER;\r\tBEGIN\r\t\tIF ~t.disabled & t.item.Valid() THEN\r\t\t\tWITH msg: Controllers.PollOpsMsg DO\r\t\t\t\tIF t.field # NIL THEN focus := t.field\r\t\t\t\tELSIF t.hasSelection THEN msg.valid := {Controllers.copy}\r\t\t\t\tEND\r\t\t\t| msg: Controllers.PollCursorMsg DO\r\t\t\t\tIF (t.field # NIL) & (msg.x >= t.x) & (msg.x <= t.x + t.w) & (msg.y >= t.y) & (msg.y <= t.y + t.h) THEN\r\t\t\t\t\tfocus := t.field\r\t\t\t\tELSE\r\t\t\t\t\tCheckPos(t, msg.x, msg.y, f.dot, col, type, p);\r\t\t\t\t\tIF (type = move) & t.tprop.layoutEditable THEN msg.cursor := HostPorts.resizeHCursor\r\t\t\t\t\tELSIF (type = adjust) & t.tprop.layoutEditable THEN msg.cursor := Ports.refCursor\r\t\t\t\t\tELSIF  ~t.readOnly & (type = field) THEN msg.cursor := Ports.tableCursor\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\t| msg: Controllers.MarkMsg DO\r\t\t\t\tIF t.field # NIL THEN DisableEditField(t, f, TRUE); Views.Update(t, Views.rebuildFrames) END\r\t\t\t| msg: Controllers.SelectMsg DO\r\t\t\t\tIF t.field # NIL THEN focus := t.field\r\t\t\t\tELSIF ~msg.set THEN Select(t, f, FALSE)\r\t\t\t\tEND\r\t\t\t| msg: Controllers.EditMsg DO\r\t\t\t\tIF t.field # NIL THEN\r\t\t\t\t\tIF msg.op = Controllers.pasteChar THEN\r\t\t\t\t\t\tIF (msg.char = lineChar) OR (msg.char = esc) THEN\r\t\t\t\t\t\t\tDisableEditField(t, f, msg.char # esc); Views.Update(t, Views.rebuildFrames)\r\t\t\t\t\t\tELSIF (msg.char = tab) OR (msg.char = ltab) THEN\r\t\t\t\t\t\t\tMoveEditField(t, f, msg.char = tab); Views.Update(t, Views.rebuildFrames)\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tfocus := t.field\r\t\t\t\t\t\tEND\t\r\t\t\t\t\tELSE\r\t\t\t\t\t\tfocus := t.field\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\t\tIF (msg.op = Controllers.pasteChar) & (msg.char = lineChar) &\r\t\t\t\t\t\t(t.tprop.selectionStyle = cellSelect) & t.hasSelection THEN\r\t\t\t\t\t\tt.showSelection := FALSE;\r\t\t\t\t\t\tSetSelection(t, f, TRUE, t.selRow, t.selCol, ok);\r\t\t\t\t\t\tAddEditField(t, f, t.selRow, t.selCol); Views.Update(t, Views.keepFrames)\r\t\t\t\t\tELSIF msg.op = Controllers.pasteChar THEN\r\t\t\t\t\t\tHandleChar(t, f, msg.char)\r\t\t\t\t\tELSIF msg.op = Controllers.copy THEN\r\t\t\t\t\t\tmsg.view := ViewFromSelection(t);\r\t\t\t\t\t\tmsg.w := 0; msg.h := 0; msg.isSingle := FALSE\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\t| msg: Controllers.TrackMsg DO\r\t\t\t\tIF (t.field # NIL) & (msg.x >= t.x) & (msg.x <= t.x + t.w) & (msg.y >= t.y) & (msg.y <= t.y + t.h) THEN\r\t\t\t\t\t\tfocus := t.field\r\t\t\t\tELSE\r\t\t\t\t\trebuild := t.field # NIL; DisableEditField(t, f, TRUE);\t"
                    attr: 0
                  - text: "(* update below after notifications *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tCheckPos(t, msg.x, msg.y, f.dot, col, type, p);\r\t\t\t\t\tIF type = move THEN\r\t\t\t\t\t\tIF t.tprop.layoutEditable THEN\r\t\t\t\t\t\t\tMoveLine(t, f, col, p)\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSIF type = adjust THEN\r\t\t\t\t\t\tIF t.tprop.layoutEditable THEN\r\t\t\t\t\t\t\tChangeAdjust(t, col, p);\r\t\t\t\t\t\t\tREPEAT f.Input(x, y, m, isDown) UNTIL ~isDown\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSIF ~t.readOnly & (type = field) THEN\r\t\t\t\t\t\tTrackMouse(t, f, p, col, type);\r\t\t\t\t\t\tIF type = field THEN\r\t\t\t\t\t\t\tIF ~t.readOnly & t.tprop.dataEditable\r\t\t\t\t\t\t\t\t& ((Controllers.doubleClick IN msg.modifiers) OR (t.tprop.selectionStyle = noSelect))\r\t\t\t\t\t\t\tTHEN\r\t\t\t\t\t\t\t\tSelect(t, f, FALSE);\r\t\t\t\t\t\t\t\tt.selRow := p; t.selCol := col; t.hasSelection := TRUE; t.showSelection := FALSE;\r\t\t\t\t\t\t\t\tSetSelection(t, f, TRUE, t.selRow, t.selCol, ok);\r\t\t\t\t\t\t\t\tAddEditField(t, f, p, col); Views.Update(t, Views.keepFrames)\r\t\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\t\tIF (t.selRow # p) OR (t.selCol # col) OR ~t.hasSelection THEN\r\t\t\t\t\t\t\t\t\tSelect(t, f, FALSE);\r\t\t\t\t\t\t\t\t\tt.selRow := p; t.selCol := col;\r\t\t\t\t\t\t\t\t\tSelect(t, f, TRUE)\r\t\t\t\t\t\t\t\tELSIF t.tprop.selectionStyle = cellSelect THEN Select(t, f, FALSE)\r\t\t\t\t\t\t\t\tEND\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND;\r\t\t\t\t\tIF rebuild THEN Views.Update(t, Views.rebuildFrames) END\r\t\t\t\tEND\r\t\t\t| msg: Controllers.PollSectionMsg DO\r\t\t\t\tControlSections(t, f, msg.vertical, msg.wholeSize, msg.partSize, msg.partPos);\r\t\t\t\tIF (msg.partPos > 0) & (msg.partPos > msg.wholeSize - msg.partSize) THEN\r\t\t\t\t\tScrollControl(t, f, Controllers.gotoPos, msg.wholeSize - msg.partSize, msg.vertical);\r\t\t\t\t\tControlSections(t, f, msg.vertical, msg.wholeSize, msg.partSize, msg.partPos)\r\t\t\t\tEND;\r\t\t\t\tmsg.valid := msg.partSize < msg.wholeSize;\r\t\t\t\tmsg.done := TRUE\r\t\t\t| msg: Controllers.ScrollMsg DO\r\t\t\t\tScrollControl(t, f, msg.op, msg.pos, msg.vertical);\r\t\t\t\tmsg.done := TRUE\r\t\t\t| msg: Controllers.PageMsg DO\r\t\t\t\tIF msg.op IN {Controllers.nextPageY, Controllers.gotoPageY} THEN\t"
                    attr: 0
                  - text: "(* vertical *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tControlSections(t, f, TRUE, size, part, pos);\r\t\t\t\t\tIF msg.op = Controllers.nextPageY THEN\r\t\t\t\t\t\tt.orgRow := pos + part\r\t\t\t\t\tELSE\r\t\t\t\t\t\tt.orgRow := msg.pageY * part\r\t\t\t\t\tEND;\r\t\t\t\t\tmsg.done := TRUE;\r\t\t\t\t\tmsg.eoy :=t.orgRow >= size\r\t\t\t\tELSE (* horizontal *)\r\t\t\t\t\tControlSections(t, f, FALSE, size, part, pos);\r\t\t\t\t\tIF msg.op = Controllers.nextPageX THEN\r\t\t\t\t\t\tt.orgX := pos + part\r\t\t\t\t\tELSE\r\t\t\t\t\t\tt.orgX := msg.pageX * part\r\t\t\t\t\tEND;\r\t\t\t\t\tIF (t.orgX > 0) & (t.orgX < size) THEN\r\t\t\t\t\t\tc := 0; w := 0;\r\t\t\t\t\t\tWHILE w < t.orgX DO INC(w, t.width[c]); INC(c) END;\r\t\t\t\t\t\tt.orgX := w - t.width[c-1] + 1*f.dot\r\t\t\t\t\tEND;\r\t\t\t\t\tmsg.done := TRUE;\r\t\t\t\t\tmsg.eox :=t.orgX >= size\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\tEND\r\t\tEND\r\tEND HandleCtrlMsg2;\r\r\tPROCEDURE (t: Control) HandlePropMsg2 (VAR msg: Properties.Message);\r\t\tVAR w, h: LONGINT;\r\tBEGIN\r\t\tWITH msg: Properties.FocusPref DO\r\t\t\tIF ~t.disabled THEN msg.setFocus := TRUE END\r\t\t| msg: Properties.SizePref DO\r\t\t\tIF (msg.w = Views.undefined) & (msg.h = Views.undefined) THEN\r\t\t\t\tGetControlSize(t, Ports.point, w, h);\r\t\t\t\tmsg.w := SHORT(MIN(w, MAX(INTEGER)));\r\t\t\t\tmsg.h := SHORT(MIN(h, MAX(INTEGER)))\r\t\t\tEND;\r\t\t\tIF msg.w = Views.undefined THEN msg.w := 80 * Ports.mm END;\r\t\t\tIF msg.h = Views.undefined THEN msg.h := 30 * Ports.mm END\r\t\t| msg: Properties.ResizePref DO\r\t\t\tmsg.horFitToWin := TRUE;\r\t\t\tmsg.verFitToWin := TRUE\r\t\t| msg: Controls.PropPref DO\r\t\t\tmsg.valid := {Controls.link, Controls.label, Controls.guard, Controls.notifier}\r\t\t| msg: Properties.PollMsg DO\r\t\t\tPollProp(t, msg.prop)\r\t\t| msg: Properties.SetMsg DO\r\t\t\tSetProp(t, msg.prop)\r\t\t| msg: Properties.ControlPref DO\r\t\t\tIF (t.field # NIL) & ((msg.char = lineChar) OR (msg.char = esc) OR (msg.char = tab) OR (msg.char = ltab))\r\t\t\t\tOR (t.field = NIL) & (t.tprop.selectionStyle = cellSelect) & t.hasSelection & (msg.char = lineChar)\r\t\t\tTHEN\r\t\t\t\tmsg.accepts := TRUE\r\t\t\tEND\r\t\tELSE\r\t\t\tIF t.field # NIL THEN Views.HandlePropMsg(t.field, msg) END\r\t\tEND\r\tEND HandlePropMsg2;\r\r\tPROCEDURE (c: Control) CheckLink (VAR ok: BOOLEAN);\r\t\tVAR item: Meta.Item; mod: Meta.Name; name: Meta.Name;\r\tBEGIN\r\t\titem := c.item;\r\t\tIF (item.typ = Meta.recTyp) THEN\r\t\t\titem.GetTypeName(mod, name);\r\t\t\tIF (mod = \"StdTables\") & (name = \"Table\") THEN\r\t\t\t\tok := TRUE\r\t\t\tELSE\r\t\t\t\tok := FALSE\r\t\t\tEND\r\t\tELSE ok := FALSE\r\t\tEND\r\tEND CheckLink;\r\r\r\t"
                    attr: 0
                  - text: "(* Property Dialog *)"
                    attr: 1
                  - text: "\r\r\r\tPROCEDURE PollPropForDlg;\r\t\tVAR q: Properties.Property; p: Prop;\r\tBEGIN\r\t\tdlg.layoutEditable := TRUE; dlg.dataEditable := TRUE; dlg.selectionStyle.index := cellSelect;\r\t\tdlg.known := {}; dlg.valid := {};\r\t\tProperties.CollectProp(q);\r\t\tWHILE (q # NIL) & ~(q IS Prop) DO q := q.next END;\r\t\tIF q # NIL THEN\r\t\t\tp := q(Prop);\r\t\t\tdlg.known := p.known; dlg.valid := p.valid;\r\t\t\tIF layoutEditable IN p.valid THEN dlg.layoutEditable := p.layoutEditable END;\r\t\t\tIF dataEditable IN p.valid THEN dlg.dataEditable := p.dataEditable END;\r\t\t\tIF selectionStyle IN p.valid THEN dlg.selectionStyle.index := p.selectionStyle END\r\t\tEND;\r\t\tDialog.Update(dlg)\r\tEND PollPropForDlg;\r\r\tPROCEDURE SetPropFromDlg;\r\t\tVAR p: Prop;\r\tBEGIN\r\t\tNEW(p);\r\t\tp.known := dlg.known;\r\t\tp.valid := dlg.valid;\r\t\tp.layoutEditable := dlg.layoutEditable;\r\t\tp.dataEditable := dlg.dataEditable;\r\t\tp.selectionStyle := dlg.selectionStyle.index;\r\t\tProperties.EmitProp(NIL, p)\r\tEND SetPropFromDlg;\r\r\tPROCEDURE (a: Action) Do;\r\t\tVAR c: Containers.Controller; v: Views.View; fp: INTEGER;\r\tBEGIN\r\t\tControllers.SetCurrentPath(Controllers.targetPath);\r\t\tc := Containers.Focus(); fp := 0;\r\t\tIF c # NIL THEN\r\t\t\tc.GetFirstView(Containers.selection, v);\r\t\t\tWHILE v # NIL DO fp := fp + Services.AdrOf(v); c.GetNextView(Containers.selection, v) END\r\t\tEND;\r\t\tIF fp # dlg.fingerprint THEN PollPropForDlg; dlg.fingerprint := fp END;\r\t\tControllers.ResetCurrentPath();\r\t\tServices.DoLater(a, Services.Ticks() + Services.resolution DIV 2)\r\tEND Do;\r\r\tPROCEDURE "
                    attr: 0
