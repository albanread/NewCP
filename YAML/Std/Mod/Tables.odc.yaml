                  - text: " *)\r\t\t\t\tt.tprop.layoutEditable := TRUE; t.tprop.dataEditable := TRUE; t.tprop.selectionStyle := cellSelect\r\t\t\tEND;\r\t\t\tNEW(t.sprop);\r\t\t\trd.ReadString(t.sprop.typeface);\r\t\t\trd.ReadInt(t.sprop.size);\r\t\t\trd.ReadSet(t.sprop.style.val);\r\t\t\tt.sprop.style.mask := {Fonts.italic, Fonts.underline, Fonts.strikeout};\r\t\t\tt.sprop.weight := Fonts.normal;\r\t\t\trd.ReadInt(t.columns); i := 0;\r\t\t\tWHILE i < t.columns DO\r\t\t\t\trd.ReadInt(t.width[i]);\r\t\t\t\trd.ReadInt(t.mode[i]);\r\t\t\t\tINC(i)\r\t\t\tEND;\r\t\t\tSetupControl(t)\r\t\tEND\r\tEND Internalize2;\r\r\tPROCEDURE (t: Control) Externalize2 (VAR wr: Stores.Writer);\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\twr.WriteVersion(tabVersion);\r\t\twr.WriteBool(t.tprop.layoutEditable);\r\t\twr.WriteBool(t.tprop.dataEditable);\r\t\twr.WriteInt(t.tprop.selectionStyle);\r\t\twr.WriteString(t.sprop.typeface);\r\t\twr.WriteInt(t.sprop.size);\r\t\twr.WriteSet(t.sprop.style.val);\r\t\twr.WriteInt(t.columns); i := 0;\r\t\tWHILE i < t.columns DO\r\t\t\twr.WriteInt(t.width[i]);\r\t\t\twr.WriteInt(t.mode[i]);\r\t\t\tINC(i)\r\t\tEND\r\tEND Externalize2;\r\r\tPROCEDURE (t: Control) CopyFromSimpleView2 (source: Controls.Control);\r\tBEGIN\r\t\tWITH source: Control DO\r\t\t\tt.sprop := Properties.CopyOf(source.sprop)(Properties.StdProp);\r\t\t\tt.tprop := Properties.CopyOf(source.tprop)(Prop);\r\t\t\tt.columns := source.columns;\r\t\t\tt.width := source.width;\r\t\t\tt.mode := source.mode;\r\t\t\tSetupControl(t)\r\t\tEND\r\tEND CopyFromSimpleView2;\r\r\tPROCEDURE (t: Control) GetBackground (VAR color: Ports.Color);\r\tBEGIN\r\t\tcolor := Ports.background\r\tEND GetBackground;\r\r\tPROCEDURE Paint (c: Control; f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR width, w, h, rows, cols, row, col, x, y, rowHeight, dl, weight: INTEGER; font: Fonts.Font;\r\t\t\tstr: Dialog.String; ok: BOOLEAN;style: SET; color: Ports.Color;\r\tBEGIN\r\t\tc.context.GetSize(w, h);\r\t\tIF ~c.disabled & c.item.Valid() 