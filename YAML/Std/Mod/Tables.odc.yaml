                    attr: 3
                  - text: "*;\r\t\tVAR p: Controls.Prop;\r\tBEGIN\r\t\tNEW(p);\r\t\tp.link := \"\"; p.label := \"\"; p.guard := \"\"; p.notifier := \"\";\r\t\tp.level := 0; p.opt[Controls.sorted] := FALSE;\r\t\tViews.Deposit(dir.NewControl(p))\r\tEND DepositControl;\r\r\tPROCEDURE SetupSelectionStyleList (VAR l: Dialog.List);\r\tBEGIN\r\t\tl.SetLen(5);\r\t\tl.SetItem(noSelect, \"No Selection\");\r\t\tl.SetItem(cellSelect, \"Select Cell\");\r\t\tl.SetItem(rowSelect, \"Select Row\");\r\t\tl.SetItem(colSelect, \"Select Column\");\r\t\tl.SetItem(crossSelect, \"Select Row & Column\")\r\tEND SetupSelectionStyleList;\r\r\tPROCEDURE Init;\r\t\tVAR d: StdDirectory;\r\tBEGIN\r\t\tNEW(d); stdDir := d; dir := d;\r\t\tSetupSelectionStyleList(dlg.selectionStyle)\r\tEND Init;\r\rBEGIN\r\tInit\rCLOSE\r\tServices.RemoveAction(action)\rEND StdTables.\r"
