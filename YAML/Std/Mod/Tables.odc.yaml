                  - text: "* (rows, cols: INTEGER), NEW;\r\t\tVAR i, j, fr, fc: INTEGER;\r\t\t\tlabels: POINTER TO ARRAY OF Dialog.String;\r\t\t\tdata: POINTER TO ARRAY OF ARRAY OF Dialog.String;\r\t\t\tweights: POINTER TO ARRAY OF ARRAY OF INTEGER;\r\t\t\tstyles: POINTER TO ARRAY OF ARRAY OF SET;\r\t\t\tcolors: POINTER TO ARRAY OF ARRAY OF Ports.Color;\r\tBEGIN\r\t\tASSERT((rows >= 0) & (cols >= 0), 20); \r\t\tASSERT((cols > 0) OR ((cols = 0) & (rows = 0)), 21); \r\t\ttab.rows := rows; tab.cols := cols;\r\t\tIF rows > 0 THEN\r\t\t\tdata := tab.data; NEW(tab.data, rows, cols); weights := tab.weights; NEW(tab.weights, rows, cols);\r\t\t\tstyles := tab.styles; NEW(tab.styles, rows, cols); colors := tab.colors; NEW(tab.colors, rows, cols);\r\t\t\tIF data # NIL THEN\r\t\t\t\tFOR i := 0 TO MIN(rows, LEN(data, 0)) - 1 DO\r\t\t\t\t\tFOR j := 0 TO MIN(cols, LEN(data, 1)) - 1 DO\r\t\t\t\t\t\ttab.data[i, j] := data[i, j]; tab.weights[i, j] := weights[i, j]; tab.styles[i, j] := styles[i, j];\r\t\t\t\t\t\ttab.colors[i, j] := colors[i, j]\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\t(* set defaults *)\r\t\t\tIF data = NIL THEN fr := 0; fc := 0 ELSE fr := LEN(data, 0); fc := LEN(data, 1) END; \r\t\t\tFOR i := fr TO LEN(tab.data, 0) - 1 DO\r\t\t\t\tFOR j := fc TO LEN(tab.data, 1) - 1 DO\r\t\t\t\t\ttab.weights[i, j] := Fonts.normal; tab.styles[i, j] := {}; tab.colors[i, j] := Ports.black \r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE\r\t\t\ttab.data := NIL\r\t\tEND;\r\t\tIF cols > 0 THEN\r\t\t\tlabels := tab.labels; NEW(tab.labels, cols);\r\t\t\tIF labels # NIL THEN\r\t\t\t\tFOR i := 0 TO MIN(cols, LEN(labels)) - 1 DO\r\t\t\t\t\ttab.labels[i] := labels[i]\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE\r\t\t\ttab.labels := NIL\r\t\tEND;\r\t\tIF tab.selection = NIL THEN\r\t\t\tNEW(tab.selection)\r\t\tELSE\r\t\t\ttab.selection.on := FALSE\r\t\tEND\r\tEND SetSize;\r\r\tPROCEDURE (VAR tab: Table) "
