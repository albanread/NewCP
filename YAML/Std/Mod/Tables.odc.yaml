                    attr: 0
                  - text: "(* StdDirectory *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE InitStdProp (OUT p: Properties.StdProp);\r\t\tVAR f: Fonts.Font;\r\tBEGIN\r\t\tNEW(p);\r\t\tf := Fonts.dir.Default();\r\t\tp.typeface := f.typeface;\r\t\tp.size := f.size;\r\t\tp.style.val := f.style;\r\t\tp.style.mask := {Fonts.italic, Fonts.underline, Fonts.strikeout};\r\t\tp.weight := Fonts.normal\r\tEND InitStdProp;\r\r\tPROCEDURE InitTableProp (OUT p: Prop);\r\tBEGIN\r\t\tNEW(p);\r\t\tp.layoutEditable := TRUE; p.dataEditable := TRUE; p.selectionStyle := cellSelect\r\tEND InitTableProp;\r\r\tPROCEDURE (d: StdDirectory) NewControl (p: Controls.Prop): Views.View;\r\t\tVAR c: Control;\r\tBEGIN\r\t\tNEW(c); Controls.OpenLink(c, p); InitStdProp(c.sprop); InitTableProp(c.tprop); SetupControl(c);"
                    attr: 0
                  - text: " RETURN"
                    attr: 3
                  - text: " c\r\tEND NewControl;\r\r\r\tPROCEDURE "
