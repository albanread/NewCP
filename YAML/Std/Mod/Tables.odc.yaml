                      attr: 0
                      w: 360000000
                      h: 444500
                  - text: "\t\tf.DrawRect(x, \ty, \tx+f.dot, \ty+h, Ports.fill, Ports.white);\r\t\tf.DrawRect(x+f.dot, \ty+0, \tx+2 * f.dot,\ty+ h, Ports.fill, Ports.grey25);\r\t\tf.DrawRect(x+0, \ty+0, \tx+w, \ty+f.dot, Ports.fill, Ports.white);\r\t\tf.DrawRect(x+f.dot, \ty+f.dot, \tx+w, \ty+2 * f.dot, Ports.fill, Ports.grey25);\r\t\tf.DrawRect(x+w - f.dot, \ty+0, \tx+w, \ty+h, Ports.fill, Ports.grey50);\r\t\tf.DrawRect(x+w - 2 * f.dot, \ty+f.dot, \tx+w - f.dot, \ty+h - f.dot, Ports.fill, Ports.black);\r\t\tf.DrawRect(x+0, \ty+h - f.dot, \tx+w, \ty+h, Ports.fill, Ports.grey50);\r\t\tf.DrawRect(x+f.dot, \ty+h - 2 * f.dot, \tx+w - f.dot, \ty+h - f.dot, Ports.fill, Ports.black)\r"
                    attr: 0
                  - ruler:
                      left: 0
                      right: 5940000
                      asc: 104775
                      dsc: 28575
                      grid: 1
                      opts: 0x00000001
                      attr: 0
                      w: 360000000
                      h: 444500
                  - text: "\tEND DrawBorder;\r\r\tPROCEDURE DrawLabel (f: Views.Frame; x, y, w, x0, y0, w0, h0, mode: INTEGER; \r\t\t\t\t\t\t\t\t\tVAR is: ARRAY OF CHAR; font: Fonts.Font; rowHeight: INTEGER);\r\t\tVAR dx, i, j, si, sw, rw: INTEGER; s: Dialog.String;\r\tBEGIN\r\t\tDEC(w, 4 * f.dot); INC(x, 2 * f.dot);\r\t\tj := 0; y := y - rowHeight;\r\t\tWHILE is[j] # 0X DO\r\t\t\tsi := 0;\r\t\t\tWHILE (is[j] # 0X) & (is[j] # line) DO s[si] := is[j]; INC(si); INC(j) END;\r\t\t\tIF is[j] = line THEN INC(j) END;\r\t\t\ts[si] := 0X; y := y + rowHeight;\r\t\t\tsw := font.StringWidth(s);\r\t\t\tIF sw > w THEN\r\t\t\t\trw := w - font.StringWidth(\"...\");\r\t\t\t\tIF (rw >= 0) & (LEN(s) >= 4) THEN\r\t\t\t\t\ti := f.CharIndex(0, rw, s, font);\r\t\t\t\t\tIF i > 0 THEN DEC(i) END;\r\t\t\t\t\tIF i > LEN(s) - 4 THEN i := LEN(s) - 4 END;\r\t\t\t\t\ts[i] := \".\"; s[i+1] := \".\"; s[i+2] := \".\"; s[i+3] := 0X;\r\t\t\t\t\tsw := font.StringWidth(s)\r\t\t\t\tELSE sw := 0\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF sw > 0 THEN\r\t\t\t\tdx := x;\r\t\t\t\tIF mode = center THEN dx := x +  (w - sw) DIV 2\r\t\t\t\tELSIF mode = right THEN dx := x + w - sw\r\t\t\t\tEND;\r\t\t\t\tf.DrawString(dx, y, Ports.black, s, font)\r\t\t\tEND\r\t\tEND;\r\t\tDrawBorder(f, x0, y0, w0, h0)\r\tEND DrawLabel;\r\r\tPROCEDURE DrawField (f: Views.Frame; x, y, w, mode: INTEGER; VAR s: ARRAY OF CHAR; font: Fonts.Font;\r\t\t\t\t\t\t\t\t\t\t\tcolor: Ports.Color);\r\t\tVAR i, sw, rw: INTEGER;\r\tBEGIN\r\t\tDEC(w, 4 * f.dot); INC(x, 2 * f.dot);\r\t\tsw := font.StringWidth(s);\r\t\tIF sw > w THEN\r\t\t\trw := w - font.StringWidth(\"...\");\r\t\t\tIF (rw >= 0) & (LEN(s) >= 4) THEN\r\t\t\t\ti := f.CharIndex(0, rw, s, font);\r\t\t\t\tIF i > 0 THEN DEC(i) END;\r\t\t\t\tIF i > LEN(s) - 4 THEN i := LEN(s) - 4 END;\r\t\t\t\ts[i] := \".\"; s[i+1] := \".\"; s[i+2] := \".\"; s[i+3] := 0X;\r\t\t\t\tsw := font.StringWidth(s)\r\t\t\tELSE sw := 0\r\t\t\tEND\r\t\tEND;\r\t\tIF sw > 0 THEN\r\t\t\tIF mode = center THEN INC(x, (w - sw) DIV 2)\r\t\t\tELSIF mode = right THEN INC(x, w - sw)\r\t\t\tEND;\r\t\t\tf.DrawString(x, y, color, s, font)\r\t\tEND\r\tEND DrawField;\r\r\tPROCEDURE GetRect(t: Control; f: Views.Frame; row, col: INTEGER; OUT x, y, w, h: INTEGER;\r\t\t\t\t\t\t\t\t\t\tOUT visible: BOOLEAN);\r\t\tVAR c: INTEGER;\r\tBEGIN\r\t\tc := 0; x := 2 * f.dot - t.orgX;\r\t\tWHILE c < col DO INC(x, t.width[c]); INC(c) END;\r\t\tIF row >= t.orgRow THEN\r\t\t\tvisible := TRUE;\r\t\t\tIF row = -1 THEN\r\t\t\t\th := t.labelHeight\r\t\t\tELSE\r\t\t\t\th := t.rowHeight\r\t\t\tEND;\r\t\t\ty := (row - t.orgRow) * t.rowHeight + t.labelHeight + 3 * f.dot;\r\t\t\tw := t.width[col] \r\t\tELSE\r\t\t\tvisible := FALSE\r\t\tEND\r\tEND GetRect;\r\r\r\tPROCEDURE DrawSelection (tab: Control; f: Views.Frame; selRow, selCol: INTEGER; show: BOOLEAN);\r\t\tVAR c, l, t, r, b, cols, rows: INTEGER;\r\tBEGIN\r\t\tIF (selRow >= tab.orgRow) OR (tab.tprop.selectionStyle IN {colSelect, crossSelect}) THEN\r\t\t\tGetSize(tab, rows, cols);\r\t\t\tIF (0 <= selRow) & (selRow < rows) & (0 <= selCol) & (selCol < cols) THEN\r\t\t\t\tIF tab.tprop.selectionStyle = cellSelect THEN\t(* "
                    attr: 0
                  - text: mark selected cell
                    attr: 1
                  - text: " *)\r\t\t\t\t\tl := 2 * f.dot - tab.orgX; c := 0;\r\t\t\t\t\tWHILE c < selCol DO INC(l, tab.width[c]); INC(c) END;\r\t\t\t\t\tr := l + tab.width[selCol];\t\t\t\t\t\r\t\t\t\t\tt := (selRow - tab.orgRow) * tab.rowHeight + tab.labelHeight + 3 * f.dot;\r\t\t\t\t\tb := t + tab.rowHeight;\r\t\t\t\t\tf.MarkRect(l + f.dot, t + f.dot, r - 2 * f.dot, b - 2 * f.dot, Ports.fill, Ports.hilite, show)\r\t\t\t\tELSIF tab.tprop.selectionStyle = rowSelect THEN\t(* "
                    attr: 0
                  - text: mark selected row
                    attr: 1
                  - text: " *)\r\t\t\t\t\tl := 2 * f.dot - tab.orgX; r := l; c := 0;\r\t\t\t\t\tWHILE c < cols DO INC(r, tab.width[c]); INC(c) END;\r\t\t\t\t\tt := (selRow - tab.orgRow) * tab.rowHeight + tab.labelHeight + 3 * f.dot;\r\t\t\t\t\tb := t + tab.rowHeight;\r\t\t\t\t\tf.MarkRect(l + f.dot, t + f.dot, r - 2 * f.dot, b - 2 * f.dot, Ports.fill, Ports.hilite, show)\r\t\t\t\tELSIF tab.tprop.selectionStyle = colSelect THEN\t(* "
                    attr: 0
                  - text: mark selected column
                    attr: 1
                  - text: " *)\r\t\t\t\t\tl := 2 * f.dot - tab.orgX; c := 0;\r\t\t\t\t\tWHILE c < selCol DO INC(l, tab.width[c]); INC(c) END;\r\t\t\t\t\tr := l + tab.width[selCol];\r\t\t\t\t\tt := tab.labelHeight + 3 * f.dot;\r\t\t\t\t\tb := t + tab.rowHeight * (rows - tab.orgRow);\r\t\t\t\t\tf.MarkRect(l + f.dot, t + f.dot, r - 2 * f.dot, b - 2 * f.dot, Ports.fill, Ports.hilite, show)\r\t\t\t\tELSIF tab.tprop.selectionStyle = crossSelect THEN\t(* "
                    attr: 0
                  - text: mark both the row and column
                    attr: 1
                  - text: " *)\r\t\t\t\t\tIF selRow >= tab.orgRow THEN\r\t\t\t\t\t\tl := 2 * f.dot - tab.orgX; r := l; c := 0;\r\t\t\t\t\t\tt := (selRow - tab.orgRow) * tab.rowHeight + tab.labelHeight + 3 * f.dot;\r\t\t\t\t\t\tb := t + tab.rowHeight;\r\t\t\t\t\t\tIF selCol > 0 THEN\r\t\t\t\t\t\t\tWHILE c < selCol DO INC(r, tab.width[c]); INC(c) END;\r\t\t\t\t\t\t\tf.MarkRect(l + f.dot, t + f.dot, r - 2 * f.dot, b - 2 * f.dot, Ports.fill, Ports.hilite, show)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF selCol + 1 < cols THEN\r\t\t\t\t\t\t\tr := r + tab.width[selCol]; l := r; c := selCol + 1;\r\t\t\t\t\t\t\tWHILE c < cols DO INC(r, tab.width[c]); INC(c) END;\r\t\t\t\t\t\t\tf.MarkRect(l + f.dot, t + f.dot, r - 2 * f.dot, b - 2 * f.dot, Ports.fill, Ports.hilite, show)\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND;\r\t\t\t\t\tl := 2 * f.dot - tab.orgX; c := 0;\r\t\t\t\t\tWHILE c < selCol DO INC(l, tab.width[c]); INC(c) END;\r\t\t\t\t\tr := l + tab.width[selCol];\r\t\t\t\t\tt := tab.labelHeight + 3 * f.dot;\r\t\t\t\t\tb := t + tab.rowHeight * (rows - tab.orgRow);\r\t\t\t\t\tf.MarkRect(l + f.dot, t + f.dot, r - 2 * f.dot, b - 2 * f.dot, Ports.fill, Ports.hilite, show)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND DrawSelection;\r\r\tPROCEDURE Select (c: Control; f: Views.Frame; on: BOOLEAN);\r\t\tVAR ok: BOOLEAN;\r\tBEGIN\r\t\tIF on # c.hasSelection THEN\r\t\t\tc.hasSelection := on; c.showSelection := on;\r\t\t\tSetSelection(c, f, on, c.selRow, c.selCol, ok)\r\t\tEND\r\tEND Select;\r\r\tPROCEDURE ViewFromSelection (t: Control): Views.View;\r\t\tVAR str: Dialog.String; ok: BOOLEAN;\r\tBEGIN\r\t\tIF t.hasSelection & t.showSelection THEN\r\t\t\tGetText(t, t.selRow, t.selCol, str, ok);\r\t\t\tIF ok THEN\r\t\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TextViews.dir.New(TextModels.dir.NewFromString(str))\r\t\t\tELSE\r\t\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL\r\t\t\tEND\r\t\tELSE "
                    attr: 0
