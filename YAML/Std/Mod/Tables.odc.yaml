                    attr: 3
                  - text: " NIL\r\t\tEND\r\tEND ViewFromSelection;\r\r\tPROCEDURE GetControlSize (t: Control; dot: INTEGER; OUT w, h: LONGINT);\r\t\tVAR r, c, i: INTEGER;\r\tBEGIN\r\t\tIF ~t.disabled & t.item.Valid() THEN\r\t\t\tw := 0; h := 0;\r\t\t\tGetSize(t, r, c);\r\t\t\ti := 0;\r\t\t\tWHILE (i < c) & (i < maxCol) DO INC(w, t.width[i]); INC(i) END;\r\t\t\tINC(w, 3 * dot);\r\t\t\th := LONG(r - t.orgRow) * t.rowHeight + t.labelHeight\r\t\tELSE\r\t\t\tw := Views.undefined; h := Views.undefined\r\t\tEND\r\tEND GetControlSize;\r\r\tPROCEDURE CheckPos (t: Control; x, y, dot: INTEGER; VAR col, type, p: INTEGER);\r\t\tVAR c, a: INTEGER; w, h: LONGINT;\r\tBEGIN\r\t\tGetControlSize(t, dot, w, h);\r\t\tINC(x, t.orgX);\r\t\tIF (x >= 0) & (x <= w) & (y >= 0) & (y <= h) THEN\r\t\t\tc := 0; w := 0; type := 0; INC(x, dot);\r\t\t\tWHILE (c < maxCol) & (x >= w + t.width[c]) DO INC(w, t.width[c]); INC(c) END;\r\t\t\tIF (x <= w + 3 * dot) & (c > 0) THEN\r\t\t\t\tcol := c - 1; p := SHORT(w) + dot - t.orgX; type := move\r\t\t\tELSIF y - dot < t.labelHeight THEN\r\t\t\t\ttype := adjust;\r\t\t\t\tcol := c; a := t.width[c] DIV 3;\r\t\t\t\tIF x < w + a THEN p := left\r\t\t\t\tELSIF x > w + a * 2 THEN p := right\r\t\t\t\tELSE p := center\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tcol := c; p := (y - t.labelHeight - dot) DIV t.rowHeight + t.orgRow - 1 + 1; type := field\r\t\t\tEND\r\t\tELSE type := 0\r\t\tEND\r\tEND CheckPos;\r\r\tPROCEDURE MoveLine (t: Control; f: Views.Frame; col, x0: INTEGER);\r\t\tVAR w, h, x, y, x1, limit: INTEGER; m: SET; isDown: BOOLEAN; op: FormatOp;\r\tBEGIN\r\t\tt.context.GetSize(w, h);\r\t\tx := x0; limit := x0 - t.width[col] + 2 * f.dot;\r\t\tREPEAT\r\t\t\tf.Input(x1, y, m, isDown);\r\t\t\tIF x1 < limit THEN x1 := limit END;\r\t\t\tIF x1 # x THEN\r\t\t\t\tf.MarkRect(x, 0, x + f.dot, h, Ports.fill, Ports.invert, FALSE);\r\t\t\t\tx := x1;\r\t\t\t\tf.MarkRect(x, 0, x + f.dot, h, Ports.fill, Ports.invert, TRUE)\r\t\t\tEND\r\t\tUNTIL ~isDown;\r\t\tNEW(op); op.tab := t; op.col := col;\r\t\top.width := t.width[col] + x - x0; op.mode := t.mode[col];\r\t\tViews.Do(t, \"#System:SetLayout\", op)\r\tEND MoveLine;\r\r\tPROCEDURE ChangeAdjust (t: Control; col, mode: INTEGER);\r\t\tVAR op: FormatOp;\r\tBEGIN\r\t\tNEW(op); op.tab := t; op.col := col;\r\t\top.width := t.width[col]; op.mode := mode;\r\t\tViews.Do(t, \"#System:SetLayout\", op)\r\tEND ChangeAdjust;\r\r\tPROCEDURE ControlSections (t: Control; f: Views.Frame; vertical: BOOLEAN; OUT size, part, pos: INTEGER);\r\t\tVAR r, c, w, max: INTEGER;\r\tBEGIN\r\t\tsize := 0; part := 0; pos := 0; GetSize(t, r, c);\r\t\tIF vertical THEN\r\t\t\tsize := r;\r\t\t\tpart := (f.b - (f.t + t.labelHeight + 3*f.dot)) DIV t.rowHeight;\r\t\t\tpos := t.orgRow\r\t\tELSE\r\t\t\tw := 0; max := MIN(c, maxCol);\r\t\t\tc := 0;\r\t\t\tWHILE (c < max) DO INC(w, t.width[c]); INC(c) END;\r\t\t\tsize := w + 3 * f.dot;\r\t\t\tpart := f.r - f.l;\r\t\t\tpos := t.orgX\r\t\tEND\r\tEND ControlSections;\r\r\tPROCEDURE ScrollControl (t: Control; f: Views.Frame; op, pos: INTEGER; vertical: BOOLEAN);\r\t\tVAR size, part, p, delta, l, t0, r, b: INTEGER;\r\tBEGIN\r\t\tIF vertical THEN\r\t\t\tControlSections(t, f, TRUE, size, part, p);\r\t\t\tdelta := part - 1;\r\t\t\tIF delta < 1 THEN delta := 1 END;\r\t\t\tCASE op OF\r\t\t\t| Controllers.decLine: DEC(p)\r\t\t\t| Controllers.incLine: INC(p)\r\t\t\t| Controllers.decPage: DEC(p, delta)\r\t\t\t| Controllers.incPage: INC(p, delta)\r\t\t\t| Controllers.gotoPos: p := pos\r\t\t\tEND;\r\t\t\tIF p > size - part THEN p := size - part END;\r\t\t\tIF p < 0 THEN p := 0 END;\r\t\t\tdelta := (f.gy + t.labelHeight + 3 * f.dot) DIV f.unit;\r\t\t\tf.rider.GetRect(l, t0, r, b);\r\t\t\tIF b > delta THEN\r\t\t\t\tIF t0 < delta THEN f.rider.SetRect(l, delta, r, b) END;\r\t\t\t\tViews.Scroll(t, 0, (t.orgRow - p) * t.rowHeight);\r\t\t\t\tIF f.rider # NIL THEN\r\t\t\t\t\tf.rider.SetRect(l, t0, r, b)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tt.orgRow := p\r\t\tELSE\r\t\t\tControlSections(t, f, FALSE, size, part, p);\r\t\t\tdelta := part - defColW;\r\t\t\tIF delta < defColW THEN delta := defColW END;\r\t\t\tCASE op OF\r\t\t\t| Controllers.decLine: DEC(p, defColW)\r\t\t\t| Controllers.incLine: INC(p, defColW)\r\t\t\t| Controllers.decPage: DEC(p, delta)\r\t\t\t| Controllers.incPage: INC(p, delta)\r\t\t\t| Controllers.gotoPos: p := pos\r\t\t\tEND;\r\t\t\tIF p >= size - part THEN p := size - part END;\r\t\t\tIF p < 0 THEN p := 0 END;\r\t\t\tViews.Scroll(t, t.orgX - p, 0);\r\t\t\tt.orgX := p\r\t\tEND\r\tEND ScrollControl;\r\r\tPROCEDURE HandleChar (t: Control; f: Views.Frame; ch: CHAR);\r\tBEGIN\r\t\tCASE ch OF\r\t\t| 10X: ScrollControl(t, f, Controllers.decPage, 0, FALSE)\r\t\t| 11X: ScrollControl(t, f, Controllers.incPage, 0, FALSE)\r\t\t| 12X: ScrollControl(t, f, Controllers.decPage, 0, TRUE)\r\t\t| 13X: ScrollControl(t, f, Controllers.incPage, 0, TRUE)\r\t\t| 14X: ScrollControl(t, f, Controllers.gotoPos, 0, FALSE)\r\t\t| 15X: ScrollControl(t, f, Controllers.gotoPos, MAX(INTEGER), FALSE)\r\t\t| 16X: ScrollControl(t, f, Controllers.gotoPos, 0, TRUE)\r\t\t| 17X: ScrollControl(t, f, Controllers.gotoPos, MAX(INTEGER), TRUE)\r\t\t| 1CX: ScrollControl(t, f, Controllers.decLine, 0, FALSE)\r\t\t| 1DX: ScrollControl(t, f, Controllers.incLine, 0, FALSE)\r\t\t| 1EX: ScrollControl(t, f, Controllers.decLine, 0, TRUE)\r\t\t| 1FX: ScrollControl(t, f, Controllers.incLine, 0, TRUE)\r\t\t| 07X, 08X, 1BX: Select(t, f, FALSE)\t"
