                  - text: "\r\tBEGIN\r\t\tKernel.SetTrapGuard(TRUE);\r\t\tOpenViewer(a.text, \"#Dev:Trap\", NewRuler());\r\t\tKernel.SetTrapGuard(FALSE);\r\tEND Do;\r\r\tPROCEDURE GetTrapMsg(OUT msg: ARRAY OF CHAR);\r\t\tVAR ref, end, a: INTEGER; mod: Kernel.Module; modName, name: Kernel.Name; res: INTEGER; nn: Kernel.Utf8Name; \r\t\t\thead, tail, errstr: ARRAY 32 OF CHAR;\r\t\t\tkey: ARRAY 128 OF CHAR;\r\tBEGIN\r\t\ta := Kernel.pc; mod := Kernel.modList;\r\t\tWHILE (mod # NIL) & ((a < mod.code) OR (a >= mod.code + mod.csize)) DO mod := mod.next END;\r\t\tIF mod # NIL THEN\r\t\t\tDEC(a, mod.code); ref := mod.refs;\r\t\t\tREPEAT Kernel.GetRefProc(ref, end, nn) UNTIL (end = 0) OR (a < end);\r\t\t\tKernel.Utf8ToString(nn, name, res);\r\t\t\tIF a < end THEN\r\t\t\t\tKernel.GetModName(mod, modName); Kernel.SplitName(modName, head, tail);\r\t\t\t\tIF head = \"\" THEN head := \"System\" END;\r\t\t\t\tStrings.IntToString(Kernel.err, errstr);\r\t\t\t\tkey := tail + \".\" + name + \".\" + errstr;\r\t\t\t\tDialog.MapString(\"#\" + head + \":\" + key, msg);\r\t\t\t\t(* IF key # msg THEN out.WriteString(\" \" + msg) END; *)\r\t\t\t\tIF key = msg THEN msg := \"\" END;\r\t\t\tEND\r\t\tEND\r\tEND GetTrapMsg;\r\r\tPROCEDURE Trap;\r\t\tVAR a0: TextModels.Attributes; action: Action; msg: ARRAY 512 OF CHAR;\r\tBEGIN\r\t\tout.ConnectTo(TextModels.dir.New());\r\t\ta0 := out.rider.attr;\r\t\tout.rider.SetAttr(TextModels.NewWeight(a0, Fonts.bold));\r\t\tIF Kernel.err = 129 THEN out.WriteString(\"invalid WITH\")\r\t\tELSIF Kernel.err = 130 THEN out.WriteString(\"invalid CASE\")\r\t\tELSIF Kernel.err = 131 THEN out.WriteString(\"function without RETURN\")\r\t\tELSIF Kernel.err = 132 THEN out.WriteString(\"type guard\")\r\t\tELSIF Kernel.err = 133 THEN out.WriteString(\"implied type guard\")\r\t\tELSIF Kernel.err = 134 THEN out.WriteString(\"value out of range\")\r\t\tELSIF Kernel.err = 135 THEN out.WriteString(\"index out of range\")\r\t\tELSIF Kernel.err = 136 THEN out.WriteString(\"string too long\")\r\t\tELSIF Kernel.err = 137 THEN out.WriteString(\"stack overflow\")\r\t\tELSIF Kernel.err = 138 THEN out.WriteString(\"integer overflow\")\r\t\tELSIF Kernel.err = 139 THEN out.WriteString(\"division by zero\")\r\t\tELSIF Kernel.err = 140 THEN out.WriteString(\"infinite real result\")\r\t\tELSIF Kernel.err = 141 THEN out.WriteString(\"real underflow\")\r\t\tELSIF Kernel.err = 142 THEN out.WriteString(\"real overflow\")\r\t\tELSIF Kernel.err = 143 THEN out.WriteString(\"undefined real result\")\r\t\tELSIF Kernel.err = 144 THEN out.WriteString(\"not a number\")\r\t\tELSIF Kernel.err = 200 THEN out.WriteString(\"keyboard interrupt\")\r\t\tELSIF Kernel.err = 201 THEN\r\t\t\tout.WriteString(\"NIL dereference\")\r\t\tELSIF Kernel.err = 202 THEN\r\t\t\tout.WriteString(\"illegal instruction: \");\r\t\t\tout.WriteIntForm(Kernel.val, TextMappers.hexadecimal, 5, \"0\", TextMappers.showBase)\r\t\tELSIF Kernel.err = 203 THEN\r\t\t\tIF (Kernel.val >= -4) & (Kernel.val < 65536) THEN out.WriteString(\"NIL dereference (read)\")\r\t\t\tELSE out.WriteString(\"illegal memory read (ad = \"); WriteHex(Kernel.val); out.WriteChar(\")\")\r\t\t\tEND\r\t\tELSIF Kernel.err = 204 THEN\r\t\t\tIF (Kernel.val >= -4) & (Kernel.val < 65536) THEN out.WriteString(\"NIL dereference (write)\")\r\t\t\tELSE out.WriteString(\"illegal memory write (ad = \"); WriteHex(Kernel.val); out.WriteChar(\")\")\r\t\t\tEND\r\t\tELSIF Kernel.err = 205 THEN\r\t\t\tIF (Kernel.val >= -4) & (Kernel.val < 65536) THEN out.WriteString(\"NIL procedure call\")\r\t\t\tELSE out.WriteString(\"illegal execution (ad = \"); WriteHex(Kernel.val); out.WriteChar(\")\")\r\t\t\tEND\r\t\tELSIF Kernel.err = 257 THEN out.WriteString(\"out of memory\")\r\t\tELSIF Kernel.err = 10001H THEN out.WriteString(\"bus error\")\r\t\tELSIF Kernel.err = 10002H THEN out.WriteString(\"address error\")\r\t\tELSIF Kernel.err = 10007H THEN out.WriteString(\"fpu error\")\r\t\tELSIF Kernel.err < 0 THEN\r\t\t\tout.WriteString(\"Exception \"); out.Writ