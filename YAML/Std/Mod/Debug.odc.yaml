                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT SYSTEM,\r\t\t"
                    attr: 0
                  - text: Kernel
                    attr: 3
                  - text: ", Strings, Fonts, Services, Ports, Views, Properties, Dialog, Containers, StdFolds,\r\t\tTextModels, TextMappers, TextViews, TextRulers;\r\t\r\tCONST\r\t\trefViewSize = 9 * Ports.point;\r\t\t\r\t\theap = 1; source = 2; module = 3; modules = 4;\t"
                    attr: 0
                  - text: "(* RefView types *)"
                    attr: 1
                  - text: "\r"
                    attr: 0
                  - text: "\t\t"
                    attr: 1
                  - text: "\r\tTYPE\r\t\tArrayPtr = POINTER TO RECORD\r\t\t\tlast, t, first: INTEGER;\t"
                    attr: 0
                  - text: "(* gc header *)\r"
                    attr: 1
                  - text: "\t\t\tlen: ARRAY 16 OF INTEGER\t"
                    attr: 0
                  - text: "(* dynamic array length table *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\r\t\tRefView = POINTER TO RefViewDesc;\r\r\t\tRefViewDesc = RECORD\r\t\t\ttype: SHORTINT;\r\t\t\tcommand: SHORTINT;\r\t\t\tback: RefView;\r\t\t\tadr: INTEGER;\r\t\t\tdesc: Kernel.Type;\r\t\t\tptr: ArrayPtr;\r\t\t\tname: Kernel.Utf8Name\r\t\tEND;\r\t\t\r\t\tAction = POINTER TO RECORD (Services.Action)\r\t\t\ttext: TextModels.Model\r\t\tEND;\r\t\t\r\t\tCluster = POINTER TO RECORD [untagged]\t"
                    attr: 0
                  - text: "(* must correspond to Kernel.Cluster *)"
                    attr: 1
                  - text: "\r\t\t\tsize: INTEGER;\r\t\t\tnext: Cluster\r\t\tEND;\r\t\t\r\t\r\tVAR\r\t\tout: TextMappers.Formatter;\r\t\tpath: ARRAY 4 OF Ports.Point;\r\t\tempty: Kernel.Name;\r\r\r\tPROCEDURE NewRuler (): TextRulers.Ruler;\r\t\tCONST mm = Ports.mm;\r\t\tVAR r: TextRulers.Ruler;\r\tBEGIN\r\t\tr := TextRulers.dir.New(NIL);\r\t\tTextRulers.SetRight(r, 140 * mm);\r\t\tTextRulers.AddTab(r, 4 * mm); TextRulers.AddTab(r, 34 * mm); TextRulers.AddTab(r, 80 * mm);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " r\r\tEND NewRuler;\r\r\tPROCEDURE OpenViewer (t: TextModels.Model; title: Views.Title; ruler:TextRulers.Ruler);\r\t\tVAR v: TextViews.View; c: Containers.Controller;\r\tBEGIN\r\t\tDialog.MapString(title, title);\r\t\tv := TextViews.dir.New(t);\r\t\tv.SetDefaults(ruler, TextViews.dir.defAttr);\r\t\tc := v.ThisController();\r\t\tIF c # NIL THEN\r\t\t\tc.SetOpts(c.opts - {Containers.noFocus, Containers.noSelection} + {Containers.noCaret})\r\t\tEND;\r\t\tViews.OpenAux(v, title)\r\tEND OpenViewer;\r\t\r\tPROCEDURE OpenFold (hidden: ARRAY OF CHAR);\r\t\tVAR fold: StdFolds.Fold; t: TextModels.Model; w: TextMappers.Formatter;\r\tBEGIN\r\t\tDialog.MapString(hidden, hidden);\r\t\tt := TextModels.dir.New();\r\t\tw.ConnectTo(t); w.WriteString(hidden);\r\t\tfold := StdFolds.dir.New(StdFolds.expanded, \"\", t);\r\t\tout.WriteView(fold)\r\tEND OpenFold;\r\t\r\tPROCEDURE CloseFold (collaps: BOOLEAN);\r\t\tVAR fold: StdFolds.Fold; m: TextModels.Model;\r\tBEGIN\r\t\tfold := StdFolds.dir.New(StdFolds.expanded, \"\", NIL);\r\t\tout.WriteView(fold);\r\t\tIF collaps THEN fold.Flip(); m := out.rider.Base(); out.SetPos(m.Length()) END\r\tEND CloseFold;\r\t\r\tPROCEDURE WriteHex (n: INTEGER);\r\tBEGIN\r\t\tout.WriteIntForm(n, TextMappers.hexadecimal, 9, \"0\", TextMappers.showBase)\r\tEND WriteHex;\r\t\r\tPROCEDURE WriteString (adr, len, base: INTEGER; zterm, unicode: BOOLEAN);\r\t\tCONST beg = 0; char = 1; code = 2;\r\t\tVAR ch: CHAR; sc: SHORTCHAR; val, mode: INTEGER; str: ARRAY 16 OF CHAR;\r\tBEGIN\r\t\tmode := beg;\r\t\tIF base = 2 THEN SYSTEM.GET(adr, ch); val := ORD(ch) ELSE SYSTEM.GET(adr, sc); val := ORD(sc) END;\r\t\tIF zterm & (val = 0) THEN out.WriteString('\"\"')\r\t\tELSE\r\t\t\tREPEAT\r\t\t\t\tIF (val >= ORD(\" \")) & (val < 7FH) OR (val > 0A0H) & (val < 100H) OR unicode & (val >= 100H) THEN\r\t\t\t\t\tIF mode # char THEN\r\t\t\t\t\t\tIF mode = code THEN out.WriteString(\", \") END;\r\t\t\t\t\t\tout.WriteChar(22X); mode := char\r\t\t\t\t\tEND;\r\t\t\t\t\tout.WriteChar(CHR(val))\r\t\t\t\tELSE\r\t\t\t\t\tIF mode = char THEN out.WriteChar(22X) END;\r\t\t\t\t\tIF mode # beg THEN out.WriteString(\", \") END;\r\t\t\t\t\tmode := code; Strings.IntToStringForm(val, Strings.hexadecimal, 1, \"0\", FALSE, str);\r\t\t\t\t\tIF str[0] > \"9\" THEN out.WriteChar(\"0\") END;\r\t\t\t\t\tout.WriteString(str); out.WriteChar(\"X\")\r\t\t\t\tEND;\r\t\t\t\tINC(adr, base); DEC(len);\r\t\t\t\tIF base = 2 THEN SYSTEM.GET(adr, ch); val := ORD(ch) ELSE SYSTEM.GET(adr, sc); val := ORD(sc) END\r\t\t\tUNTIL (len = 0) OR zterm & (val = 0)\r\t\tEND;\r\t\tIF mode = char THEN out.WriteChar(22X) END\r\tEND WriteString;\r\t\r\tPROCEDURE OutString (s: ARRAY OF CHAR);\r\t\tVAR str: Dialog.String;\r\tBEGIN\r\t\tDialog.MapString(s, str);\r\t\tout.WriteString(str)\r\tEND OutString;\r\r"
                    attr: 0
                  - text: "\t(* -------------------  variable display ------------------- *)\r"
                    attr: 1
                  - text: "\t\r\tPROCEDURE FormOf (t: Kernel.Type): SHORTCHAR;\r\tBEGIN\r\t\tIF SYSTEM.VAL(INTEGER, t) DIV 256 = 0 THEN\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " SHORT(CHR(SYSTEM.VAL(INTEGER, t)))\r\t\tELSE\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " SHORT(CHR(16 + t.id MOD 4))\r\t\tEND\r\tEND FormOf;\r\t\r\tPROCEDURE LenOf (t: Kernel.Type; ptr: ArrayPtr): INTEGER;\r\tBEGIN\r\t\tIF t.size # 0 THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " t.size\r\t\tELSIF ptr # NIL THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " ptr.len[t.id DIV 16 MOD 16 - 1]\r\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " 0\r\t\tEND\r\tEND LenOf;\r\t\r\tPROCEDURE SizeOf (t: Kernel.Type; ptr: ArrayPtr): INTEGER;\r\tBEGIN\r\t\tCASE FormOf(t) OF\r\t\t| 0BX: "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " 0\r\t\t| 1X, 2X, 4X: "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " 1\r\t\t| 3X, 5X: "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " 2\r\t\t| 8X, 0AX: "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " 8\r\t\t| 11X: "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " t.size\r\t\t| 12X: "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " LenOf(t, ptr) * SizeOf(t.base[0], ptr)\r\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " 4\r\t\tEND\r\tEND SizeOf;\r\r\tPROCEDURE WriteName (t: Kernel.Type; ptr: ArrayPtr);\r\t\tVAR modName, name: Kernel.Name; f: SHORTCHAR;\r\tBEGIN\r\t\tf := FormOf(t);\r\t\tCASE f OF\r\t\t| 0X: OutString(\"#Dev:Unknown\")\r\t\t| 1X: out.WriteString(\"BOOLEAN\")\r\t\t| 2X: out.WriteString(\"SHORTCHAR\")\r\t\t| 3X: out.WriteString(\"CHAR\")\r\t\t| 4X: out.WriteString(\"BYTE\")\r\t\t| 5X: out.WriteString(\"SHORTINT\")\r\t\t| 6X: out.WriteString(\"INTEGER\")\r\t\t| 7X: out.WriteString(\"SHORTREAL\")\r\t\t| 8X: out.WriteString(\"REAL\")\r\t\t| 9X: out.WriteString(\"SET\")\r\t\t| 0AX: out.WriteString(\"LONGINT\")\r\t\t| 0BX: out.WriteString(\"ANYREC\")\r\t\t| 0CX: out.WriteString(\"ANYPTR\")\r\t\t| 0DX: out.WriteString(\"POINTER\")\r\t\t| 0EX: out.WriteString(\"PROCEDURE\")\r\t\t| 0FX: out.WriteString(\"STRING\")\r\t\t| 10X..13X:\r\t\t\tKernel.GetTypeName(t,"
                    attr: 0
                  - text: " "
                    attr: 4
                  - text: "name);\r\t\t\tIF name = \"!\" THEN\r\t\t\t\tIF f = 11X THEN out.WriteString(\"RECORD\")\r\t\t\t\tELSIF f = 12X THEN out.WriteString(\"ARRAY\")\r\t\t\t\tELSE OutString(\"#Dev:Unknown\")\r\t\t\t\tEND\r\t\t\tELSIF (t.id DIV 256 # 0) & (t.mod.refcnt >= 0) THEN\r\t\t\t\tKernel.GetModName(t.mod, modName); out.WriteString(modName); out.WriteChar(\".\"); out.WriteString(name)\r\t\t\tELSIF f = 11X THEN\r\t\t\t\tKernel.GetModName(t.mod, modName); out.WriteString(modName); out.WriteString(\".RECORD\") \r\t\t\tELSIF f = 12X THEN\r\t\t\t\tout.WriteString(\"ARRAY \"); out.WriteInt(LenOf(t, ptr)); t := t.base[0];\r\t\t\t\tWHILE (FormOf(t) = 12X) & ((t.id DIV 256 = 0) OR (t.mod.refcnt < 0)) DO\r\t\t\t\t\tout.WriteString(\", \"); out.WriteInt(LenOf(t, ptr)); t := t.base[0]\r\t\t\t\tEND;\r\t\t\t\tout.WriteString(\" OF \"); WriteName(t, ptr)\r\t\t\tELSIF f = 13X THEN\r\t\t\t\tout.WriteString(\"POINTER\")\r\t\t\tELSE\r\t\t\t\tout.WriteString(\"PROCEDURE\")\r\t\t\tEND\r\t\t| 20X: out.WriteString(\"COM.IUnknown\")\r\t\t| 21X: out.WriteString(\"COM.GUID\")\r\t\t| 22X: out.WriteString(\"COM.RESULT\")\r\t\tELSE OutString(\"#Dev:UnknownFormat\"); out.WriteInt(ORD(f))\r\t\tEND\r\tEND WriteName;\r\t\r\tPROCEDURE WriteGuid (a: INTEGER);\r\r\t\tPROCEDURE Hex (a: INTEGER);\r\t\t\tVAR x: SHORTCHAR;\r\t\tBEGIN\r\t\t\tSYSTEM.GET(a, x);\r\t\t\tout.WriteIntForm(ORD(x), TextMappers.hexadecimal, 2, \"0\", FALSE)\r\t\tEND Hex;\r\r\tBEGIN\r\t\tout.WriteChar(\"{\");\r\t\tHex(a + 3); Hex(a + 2); Hex(a + 1); Hex(a);\r\t\tout.WriteChar(\"-\");\r\t\tHex(a + 5); Hex(a + 4);\r\t\tout.WriteChar(\"-\");\r\t\tHex(a + 7); Hex(a + 6);\r\t\tout.WriteChar(\"-\");\r\t\tHex(a + 8);\r\t\tHex(a + 9);\r\t\tout.WriteChar(\"-\");\r\t\tHex(a + 10);\r\t\tHex(a + 11);\r\t\tHex(a + 12);\r\t\tHex(a + 13);\r\t\tHex(a + 14);\r\t\tHex(a + 15);\r\t\tout.WriteChar(\"}\")\r\tEND WriteGuid;\r\t\r\tPROCEDURE^ ShowVar (ad, ind: INTEGER; f, c: SHORTCHAR; desc: Kernel.Type; ptr: ArrayPtr;\r\t\t\t\t\t\t\t\t\t\t\tback: RefView; VAR name, sel: Kernel.Name);\r\t\r\tPROCEDURE ShowRecord (a, ind: INTEGER; desc: Kernel.Type; back: RefView; VAR sel: Kernel.Name);\r\t\tVAR dir: Kernel.Directory; obj: Kernel.Object; name: Kernel.Name; i, j, n: INTEGER; base: Kernel.Type;\r\tBEGIN\r\t\tWriteName(desc, NIL); out.WriteTab;\r\t\tIF desc.mod.refcnt >= 0 THEN\r\t\t\tOpenFold(\"#Dev:Fields\");\r\t\t\tn := desc.id DIV 16 MOD 16; j := 0;\r\t\t\tWHILE j <= n DO\r\t\t\t\tbase := desc.base[j];\r\t\t\t\tIF base # NIL THEN\r\t\t\t\t\tdir := base.fields; i := 0;\r\t\t\t\t\tWHILE i < dir.num DO\r\t\t\t\t\t\tobj := SYSTEM.VAL(Kernel.Object, SYSTEM.ADR(dir.obj[i]));\r\t\t\t\t\t\tKernel.GetObjName(base.mod, obj,"
                    attr: 0
                  - text: " "
                    attr: 4
                  - text: "name);\r\t\t\t\t\t\tShowVar(a + obj.offs, ind, FormOf(obj.struct), 1X, obj.struct, NIL, back, name, sel);\r\t\t\t\t\t\tINC(i)\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tINC(j)\r\t\t\tEND;\r\t\t\tout.WriteString(\"   \"); CloseFold((ind > 1) OR (sel # \"\"))\r\t\tELSE\r\t\t\tOutString(\"#Dev:Unloaded\")\r\t\tEND\r\tEND ShowRecord;\r\t\r\tPROCEDURE ShowArray (a, ind: INTEGER; desc: Kernel.Type; ptr: ArrayPtr; back: RefView; VAR sel: Kernel.Name);\r\t\tVAR f: SHORTCHAR; i, n, m, size, len: INTEGER; name: Kernel.Name; eltyp, t: Kernel.Type;\r\t\t\tvi: SHORTINT; vs: BYTE; str: Dialog.String; high: BOOLEAN;\r\tBEGIN\r\t\tWriteName(desc, ptr); out.WriteTab;\r\t\tlen := LenOf(desc, ptr); eltyp := desc.base[0]; f := FormOf(eltyp); size := SizeOf(eltyp, ptr);\r\t\tIF (f = 2X) OR (f = 3X) THEN\t"
                    attr: 0
                  - text: "(* string *)"
                    attr: 1
                  - text: "\r\t\t\tn := 0; m := len; high := FALSE;\r\t\t\tIF f = 2X THEN\r\t\t\t\tREPEAT SYSTEM.GET(a + n, vs); INC(n) UNTIL (n = 32) OR (n = len) OR (vs = 0);\r\t\t\t\tREPEAT DEC(m); SYSTEM.GET(a + m, vs) UNTIL (m = 0) OR (vs # 0)\r\t\t\tELSE\r\t\t\t\tREPEAT\r\t\t\t\t\tSYSTEM.GET(a + n * 2, vi); INC(n);\r\t\t\t\t\tIF vi DIV 256 # 0 THEN high := TRUE END\r\t\t\t\tUNTIL (n = len) OR (vi = 0);\r\t\t\t\tn := MIN(n, 32);\r\t\t\t\tREPEAT DEC(m); SYSTEM.GET(a + m * 2, vi) UNTIL (m = 0) OR (vi # 0)\r\t\t\tEND;\r\t\t\tWriteString(a, n, size, TRUE, TRUE);\r\t\t\tINC(m, 2);\r\t\t\tIF m > len THEN m := len END;\r\t\t\tIF high OR (m > n) THEN\r\t\t\t\tout.WriteString(\"   \"); OpenFold(\"...\");\r\t\t\t\tout.WriteLn;\r\t\t\t\tIF high & (n = 32) THEN\r\t\t\t\t\tWriteString(a, m, size, TRUE, TRUE);\r\t\t\t\t\tout.WriteLn; out.WriteLn\r\t\t\t\tEND;\r\t\t\t\tWriteString(a, m, size, FALSE, FALSE);\r\t\t\t\tIF m < len THEN out.WriteString(\", ..., 0X\") END;\r\t\t\t\tout.WriteString(\"   \"); CloseFold(TRUE)\r\t\t\tEND\r\t\tELSE\r\t\t\tt := eltyp;\r\t\t\tWHILE FormOf(t) = 12X DO t := t.base[0] END;\r\t\t\tIF FormOf(t) # 0X THEN\r\t\t\t\tOpenFold(\"#Dev:Elements\");\r\t\t\t\ti := 0;\r\t\t\t\tWHILE i < len DO\r\t\t\t\t\tStrings.IntToString(i, str);\r\t\t\t\t\tname := \"[\" + SHORT(str$) + \"]\";\r\t\t\t\t\tShowVar(a, ind, f, 1X, eltyp, ptr, back, name, sel);\r\t\t\t\t\tINC(i); INC(a, size)\r\t\t\t\tEND;\r\t\t\t\tout.WriteString(\"   \"); CloseFold(TRUE)\r\t\t\tEND\r\t\tEND\r\tEND ShowArray;\r\t\r\tPROCEDURE ShowProcVar (a: INTEGER);\r\t\tVAR vli, n, ref: INTEGER; m: Kernel.Module; modName, name: Kernel.Name; res: INTEGER; nn: Kernel.Utf8Name;\r\tBEGIN\r\t\tSYSTEM.GET(a, vli);\r\t\tKernel.SearchProcVar(vli, m, vli);\r\t\tIF m = NIL THEN\r\t\t\tIF vli = 0 THEN out.WriteString(\"NIL\")\r\t\t\tELSE WriteHex(vli)\r\t\t\tEND\r\t\tELSE\r\t\t\tIF m.refcnt >= 0 THEN\r\t\t\t\tKernel.GetModName(m, modName); out.WriteString(modName); ref := m.refs;\r\t\t\t\tREPEAT Kernel.GetRefPro