                  - text: Kernel
                    attr: 3
                  - text: ", Files;\r\t\r\tCONST\r\t\tdone = Kernel.done;\r\t\tfileNotFound = Kernel.fileNotFound;\r\t\tsyntaxError = Kernel.syntaxError;\r\t\tobjNotFound = Kernel.objNotFound;\r\t\tillegalFPrint = Kernel.illegalFPrint;\r\t\tcyclicImport = Kernel.cyclicImport;\r\t\tnoMem = Kernel.noMem;\r\t\tdescNotFound = -1;\r\r\t\tOFdir = \"Code\";\r\t\tSYSdir = \"System\";\r\t\tinitMod = \"Init\";\r\t\tOFtag = 6F4F4346H;\r\t\t\r"
                    attr: 0
                  - text: "\t\t(* meta interface consts *)\r"
                    attr: 1
                  - text: "\t\tmConst = 1; mTyp = 2; mVar = 3; mProc = 4; mField = 5;\r\t\tmBool = 1; mChar = 2; mLChar = 3; mSInt = 4; mInt = 5; mLInt = 6;\r\t\tmReal = 7; mLReal = 8; mSet = 9; mString = 10; mLString = 11;\r\t\tmRecord = 1; mArray = 2; mPointer = 3; mProctyp = 4;\r\t\tmInternal = 1; mReadonly = 2; mPrivate = 3; mExported = 4;\r\t\t"
                    attr: 0
                  - text: "\r\t\t(* fixup types *)\r"
                    attr: 1
                  - text: "\t\tabsolute = 100; relative = 101; copy = 102; table = 103; tableend = 104; deref = 105; halfword = 106;\r\t\t\r\tTYPE\r\t\tName = Kernel.Name;\r\t\tModSpec = POINTER TO RECORD\r\t\t\tnext, link, imp: ModSpec;\r\t\t\tname: Name;\r\t\t\tfile: Files.File;\r\t\t\tmod: Kernel.Module;\r\t\t\ths, ms, ds, cs, vs: INTEGER; (* headSize, metaSize, descSize, codeSize, dataSize *)\r\t\t\tmad, dad: INTEGER (* modAdr, descAdr *)\r\t\tEND;\r\t\t\r\t\tHook = POINTER TO RECORD (Kernel.LoaderHook) END;\r\r\tVAR\r\t\t"
                    attr: 0
                  - text: res-
                    attr: 3
                  - text: ": INTEGER;\r\t\t"
                    attr: 0
                  - text: importing-
                    attr: 3
                  - text: ", "
                    attr: 0
                  - text: "imported-, object-"
                    attr: 3
                  - text: ": Name;\r\t\tinp: Files.Reader;\r\t\tm: Kernel.Module;\r\t\r\tPROCEDURE Error (r: INTEGER; impd, impg: ModSpec);\r\tBEGIN\r\t\tres := r; imported := impd.name$;\r\t\tIF impg # NIL THEN importing := impg.name$ END;\r\tEND Error;\r\t\r\tPROCEDURE Append (VAR s: ARRAY OF CHAR; t: ARRAY OF CHAR);\r\t\tVAR len, i, j: INTEGER; ch: CHAR;\r\tBEGIN\r\t\tlen := LEN(s);\r\t\ti := 0; WHILE s[i] # 0X DO INC(i) END;\r\t\tj := 0; REPEAT ch := t[j]; s[i] := ch; INC(j); INC(i) UNTIL (ch = 0X) OR (i = len);\r\t\ts[len - 1] := 0X\r\tEND Append;\r\r\tPROCEDURE ThisObjFile (VAR name: ARRAY OF CHAR): Files.File;\r\t\tVAR f: Files.File; loc: Files.Locator; dir, fname: Files.Name;\r\tBEGIN\r\t\tKernel.SplitName(name, dir, fname);\r\t\tKernel.MakeFileName(fname, Kernel.objType);\r\t\tloc := Files.dir.This(dir); loc := loc.This(OFdir);\r\t\tf := Files.dir.Old(loc, fname, TRUE);\r\t\tIF (f = NIL) & (dir = \"\") THEN\r\t\t\tloc := Files.dir.This(SYSdir); loc := loc.This(OFdir);\r\t\t\tf := Files.dir.Old(loc, fname, TRUE)\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " f\r\tEND ThisObjFile;\r\t\r\tPROCEDURE RWord (VAR x: INTEGER);\r\t\tVAR b: BYTE; y: INTEGER;\r\tBEGIN\r\t\tinp.ReadByte(b); y := b MOD 256;\r\t\tinp.ReadByte(b); y := y + 100H * (b MOD 256);\r\t\tinp.ReadByte(b); y := y + 10000H * (b MOD 256);\r\t\tinp.ReadByte(b); x := y + 1000000H * b\r\tEND RWord;\r\t\r\tPROCEDURE RNum (VAR x: INTEGER);\r\t\tVAR b: BYTE; s, y: INTEGER;\r\tBEGIN\r\t\ts := 0; y := 0; inp.ReadByte(b);\r\t\tWHILE b < 0 DO INC(y, ASH(b + 128, s)); INC(s, 7); inp.ReadByte(b) END;\r\t\tx := ASH((b + 64) MOD 128 - 64, s) + y\r\tEND RNum;\r\t\r\tPROCEDURE RName (VAR name: ARRAY OF CHAR);\r\t\tVAR b: BYTE; i, n, res: INTEGER; s: Kernel.Utf8Name;\r\tBEGIN\r\t\ti := 0; n := LEN(name) - 1; inp.ReadByte(b);\r\t\tWHILE (i < n) & (b # 0) DO s[i] := SHORT(CHR(b MOD 256)); INC(i); inp.ReadByte(b) END;\r\t\tWHILE b # 0 DO inp.ReadByte(b) END;\r\t\ts[i] := 0X;\r\t\tKernel.Utf8ToString(s, name, res); ASSERT(res = 0)\r\tEND RName;\r\r\tPROCEDURE Fixup (adr: INTEGER; mod: ModSpec);\r\t\tVAR link, offset, linkadr, t, n, x, low, hi: INTEGER;\r\tBEGIN\r\t\tRNum(link);\r\t\tWHILE link # 0 DO\r\t\t\tRNum(offset);\r\t\t\tWHILE link # 0 DO\r\t\t\t\tIF link > 0 THEN linkadr := mod.mad + mod.ms + link\r\t\t\t\tELSE link := -link;\r\t\t\t\t\tIF link < mod.ms THEN linkadr := mod.mad + link\r\t\t\t\t\tELSE linkadr := mod.dad + link - mod.ms\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tS.GET(linkadr, x); t := x DIV 1000000H;\r\t\t\t\tn := (x + 800000H) MOD 1000000H - 800000H;\r\t\t\t\tIF t = absolute THEN x := adr + offset\r\t\t\t\tELSIF t = relative THEN x := adr + offset - linkadr - 4\r\t\t\t\tELSIF t = copy THEN S.GET(adr + offset, x)\r\t\t\t\tELSIF t = table THEN x := adr + n; n := link + 4\r\t\t\t\tELSIF t = tableend THEN x := adr + n; n := 0\r\t\t\t\tELSIF t = deref THEN S.GET(adr+2, x); INC(x, offset);\r\t\t\t\tELSIF t = halfword THEN\r\t\t\t\t\tx := adr + offset;\r\t\t\t\t\tlow := (x + 8000H) MOD 10000H - 8000H;\r\t\t\t\t\thi := (x - low) DIV 10000H;\r\t\t\t\t\tS.GET(linkadr + 4, x);\r\t\t\t\t\tS.PUT(linkadr + 4, x DIV 10000H * 10000H + low MOD 10000H);\r\t\t\t\t\tx := x * 10000H + hi MOD 10000H"
                    attr: 0
                  - text: "\r"
                    attr: 3
                  - text: "\t\t\t\tELSE Error(syntaxError, mod, NIL)\r\t\t\t\tEND;\r\t\t\t\tS.PUT(linkadr, x); link := n\r\t\t\tEND;\r\t\t\tRNum(link)\r\t\tEND\r\tEND Fixup;\r\t\r\tPROCEDURE ReadHeader (mod: ModSpec);\r\t\tVAR n, p: INTEGER; name: Name; imp, last: ModSpec;\r\tBEGIN\r\t\tmod.file := ThisObjFile(mod.name);\r\t\tIF (mod.file = NIL) & (mod.link # NIL) THEN\t"
                    attr: 0
                  - text: "(* try closing importing obj file *)"
                    attr: 1
                  - text: "\r\t\t\tmod.link.file.Close; mod.link.file := NIL;\r\t\t\tmod.file := ThisObjFile(mod.name)\r\t\tEND;\r\t\tIF mod.file # NIL THEN\r\t\t\tinp := mod.file.NewReader(inp);\r\t\t\tIF inp # NIL THEN\r\t\t\t\tinp.SetPos(0); RWord(n); RWord(p);\r\t\t\t\tIF (n = OFtag) & (p = Kernel.processor) THEN\r\t\t\t\t\tRWord(mod.hs); RWord(mod.ms); RWord(mod.ds); RWord(mod.cs); RWord(mod.vs); \r\t\t\t\t\tRNum(n); RName(name);\r\t\t\t\t\tIF name = mod.name THEN\r\t\t\t\t\t\tmod.imp := NIL; last := NIL;\r\t\t\t\t\t\tWHILE n > 0 DO\r\t\t\t\t\t\t\tNEW(imp); RName(imp.name);\r\t\t\t\t\t\t\tIF last = NIL THEN mod.imp := imp ELSE last.next := imp END;\r\t\t\t\t\t\t\tlast := imp; imp.next := NIL; DEC(n) \r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE Error(fileNotFound, mod, NIL)\r\t\t\t\t\tEND\r\t\t\t\tELSE Error(syntaxError, mod, NIL)\r\t\t\t\tEND\r\t\t\tELSE Error(noMem, mod, NIL)\r\t\t\tEND\r\t\tELSE Error(fileNotFound, mod, NIL)\r\t\tEND\r\tEND ReadHeader;\r\t\r\tPROCEDURE ReadModule (mod: ModSpec);\r\t\tTYPE BlockPtr = POINTER TO ARRAY [untagged] 1000000H OF BYTE;\r\t\tVAR imptab, x, fp, ofp, opt, a: INTEGER;\r\t\t\tname: Name; dp, mp: BlockPtr; imp: ModSpec; obj: Kernel.Object;\r\tBEGIN\r\t\tIF mod.file = NIL THEN mod.file := ThisObjFile(mod.name) END;\r\t\tinp := mod.file.NewReader(inp);\r\t\tIF inp # NIL THEN\r\t\t\tinp.SetPos(mod.hs);\r\t\t\tKernel.AllocModMem(mod.ds, mod.ms + mod.cs + mod.vs, mod.dad, mod.mad);\r\t\t\tIF (mod.dad # 0) & (mod.mad # 0) THEN\r\t\t\t\tdp := S.VAL(BlockPtr, mod.dad); mp := S.VAL(BlockPtr, mod.mad);\r\t\t\t\tinp.ReadBytes(mp^, 0, mod.ms);\r\t\t\t\tinp.ReadBytes(dp^, 0, mod.ds);\r\t\t\t\tinp.ReadBytes(mp^, mod.ms, mod.cs);\r\t\t\t\tmod.mod := S.VAL(Kernel.Module, mod.dad);\r\t\t\t\tFixup(S.ADR(Kernel.NewRec), mod);\r\t\t\t\tFixup(S.ADR(Kernel.NewArr), mod);\r\t\t\t\tFixup(mod.mad, mod);\r\t\t\t\tFixup(mod.dad, mod);\r\t\t\t\tFixup(mod.mad + mod.ms, mod);\r\t\t\t\tFixup(mod.mad + mod.ms + mod.cs, mod);\r\t\t\t\timp := mod.imp; imptab := S.VAL(INTEGER, mod.mod.imports);\r\t\t\t\tWHILE (res = done) & (imp # NIL) DO\r\t\t\t\t\tRNum(x);\r\t\t\t\t\tWHILE (res <= done) & (x # 0) DO\r\t\t\t\t\t\tRName(name); RNum(fp); opt := 0;\r\t\t\t\t\t\tIF imp.mod # NIL THEN\r\t\t\t\t\t\t\tIF name = \"\" THEN obj := Kernel.ThisDesc(imp.mod, fp)\r\t\t\t\t\t\t\tELSE\r"
                    attr: 0
                  - text: "\t\t\t\t\t\t\t\t"
                    attr: 4
                  - text: "obj := Kernel.ThisObject(imp.mod, name)\r\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\tIF (obj # NIL) & (obj.id MOD 16 = x) THEN\r\t\t\t\t\t\t\t\tofp := obj.fprint;\r\t\t\t\t\t\t\t\tIF x = mTyp THEN\r\t\t\t\t\t\t\t\t\tRNum(opt);\r\t\t\t\t\t\t\t\t\tIF ODD(opt) THEN ofp := obj.offs END;\r\t\t\t\t\t\t\t\t\tIF (opt > 1) & (obj.id DIV 16 MOD 16 # mExported) THEN\r\t\t\t\t\t\t\t\t\t\tError(objNotFound, imp, mod); object := name$\r\t\t\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\t\t\tFixup(S.VAL(INTEGER, obj.struct), mod)\r\t\t\t\t\t\t\t\tELSIF x = mVar THEN\r\t\t\t\t\t\t\t\t\tFixup(imp.mod.varBase + obj.offs, mod)\r\t\t\t\t\t\t\t\tELSIF x = mProc THEN\r\t\t\t\t\t\t\t\t\tFixup(imp.mod.procBase + obj.offs, mod)\r\t\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\t\tIF ofp # fp THEN Error(illegalFPrint, imp, mod); object := name$ END\r\t\t\t\t\t\t\tELSIF name # \"\" THEN\r\t\t\t\t\t\t\t\tError(objNotFound, imp, mod); object := name$\r\t\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\t\tError(descNotFound, imp, mod);\t"
                    attr: 0
                  - text: "(* proceed to find failing named object *)\r\t\t\t\t\t\t\t\t"
                    attr: 1
                  - text: "RNum(opt); Fixup(0, mod)\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tELSE\t"
                    attr: 0
                  - text: "(* imp is dll *)\r"
                    attr: 1
                  - text: "\t\t\t\t\t\t\tIF x IN {mVar, mProc} THEN\r\t\t\t\t\t\t\t\ta := Kernel.ThisDllObj(x, fp, imp.name, name);\r\t\t\t\t\t\t\t\tIF a # 0 THEN Fixup(a, mod)\r\t\t\t\t\t\t\t\tELSE Error(objNotFound, imp, mod); object := name$\r\t\t\t\t\t\t\t\tEND\r\t\t\t\t\t\t\tELSIF x = mTyp THEN\r\t\t\t\t\t\t\t\tRNum(opt); RNum(x);\r\t\t\t\t\t\t\t\tIF x # 0 THEN Error(objNotFound, imp, mod); object := name$ END\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tRNum(x)\r\t\t\t\t\tEND;\r\t\t\t\t\tS.PUT(imptab, imp.mod); INC(imptab, 4); imp := imp.next\r\t\t\t\tEND;\r\t\t\t\tIF res # done THEN\r\t\t\t\t\tKernel.DeallocModMem(mod.ds, mod.ms + mod.cs + mod.vs, mod.dad, mod.mad); mod.mod := NIL\r\t\t\t\tEND\r\t\t\tELSE Error(noMem, mod, NIL)\r\t\t\tEND\r\t\tELSE Error(noMem, mod, NIL)\r\t\tEND;\r\t\tmod.file.Close; mod.file := NIL\r\tEND ReadModule;\r\t\r\tPROCEDURE LoadMod (mod: ModSpec);\r\t\tVAR i: ModSpec; ok: BOOLEAN; j: INTEGER;\r\tBEGIN\r\t\timporting := \"\"; imported := \"\"; object := \"\"; i := mod;\r\t\tWHILE (i.link # NIL) & (i.link.name # mod.name) DO i := i.link END;\r\t\tIF i.link = NIL THEN ReadHeader(mod)\r\t\tELSE Error(cyclicImport, i, i.link)\r\t\tEND;\r\t\ti := mod.imp;\r\t\tWHILE (res = done) & (i # NIL) DO\t"
                    attr: 0
                  - text: "(* get imported module *)"
                    attr: 1
                  - text: "\r\t\t\tIF i.name = \"$$\" THEN i.name := \"Kernel\" END;\r\t\t\tIF i.name[0] = \"$\" THEN\t"
                    attr: 0
                  - text: "(* dll *)"
                    attr: 1
                  - text: "\r\t\t\t\tj := 1;\r\t\t\t\tWHILE i.name[j] # 0X DO i.name[j - 1] := i.name[j]; INC(j) END;\r\t\t\t\ti.name[j - 1] := 0X;\r\t\t\t\tKernel.LoadDll(i.name, ok);\r\t\t\t\tIF ~ok THEN Error(fileNotFound, i, NIL) END\r\t\t\tELSE\r"
                    attr: 0
                  - text: "\t\t\t\t"
                    attr: 4
                  - text: "i.mod := Kernel.ThisLoadedMod(i.name);\t"
                    attr: 0
                  - text: "(* loaded module *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF i.mod = NIL THEN i.link := mod; LoadMod(i) END\t"
                    attr: 0
                  - text: "(* new module *)"
                    attr: 1
                  - text: "\r\t\t\tEND;\r\t\t\ti := i.next\r\t\tEND;\r\t\tIF res = done THEN\r"
                    attr: 0
                  - text: "\t\t\t"
                    attr: 4
                  - text: "mod.mod := Kernel.ThisLoadedMod(mod.name); "
                    attr: 0
                  - text: "(* guaranties uniqueness *)"
                    attr: 1
                  - text: "\r\t\t\tIF mod.mod = NIL THEN\r\t\t\t\tReadModule(mod);\r\t\t\t\tIF res = done THEN\r\t\t\t\t\tKernel.RegisterMod(mod.mod);\r\t\t\t\t\tres := done\r\t\t\t\tEND"
                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\t\t\tEND\r\t\tEND;\r\t\tIF res = descNotFound THEN res := objNotFound; object := \"<TypeDesc>\" END;\r\t\tIF object # \"\" THEN Append(imported, \".\"); Append(imported, object); object := \"\" END\r\tEND LoadMod;\r\r\tPROCEDURE (h: Hook) ThisMod (IN name: ARRAY OF CHAR): Kernel.Module;\r\t\tVAR m: Kernel.Module; ms: ModSpec;\r\tBEGIN\r\t\tres := done;\r\t\tm := Kernel.ThisLoadedMod(name);\r\t\tIF m = NIL THEN\r\t\t\tNEW(ms); ms.link := NIL; ms.name := name$;\r\t\t\tLoadMod(ms);\r\t\t\tm := ms.mod;\r\t\t\tinp := NIL\t(* free last file *)\r\t\tEND;\r\t\th.res := res;\r\t\th.importing := importing$;\r\t\th.imported := imported$;\r\t\th.object := object$;\r\t\t"
                    attr: 0
