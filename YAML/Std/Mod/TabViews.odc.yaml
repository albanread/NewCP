                  - text: "*;\r\t\tVAR label1, label2: Dialog.String; v1, v2: Views.View; iv: View; script: Stores.Operation;\r\tBEGIN\r\t\tiv := SingleView();\r\t\tIF (iv # NIL) & (iv.Index() < (iv.NofTabs() - 1)) THEN\r\t\t\tViews.BeginScript(iv, \"Shift tab right\", script);\r\t\t\tiv.GetItem(iv.Index() , label1, v1);\r\t\t\tiv.GetItem(iv.Index() + 1 , label2, v2);\r\t\t\tiv.SetItem(iv.Index(), label2, v2);\r\t\t\tiv.SetItem(iv.Index() + 1, label1, v1);\r\t\t\tViews.EndScript(iv, script);\r\t\t\tiv.SetIndex(iv.Index() + 1);\r\t\t\tDialog.Update(iv)\r\t\tEND\r\tEND Right;\r\r\tPROCEDURE "
