                  - text: "\r\r\tPROCEDURE SingleView() : View;\r\t\tVAR v: Views.View;\r\tBEGIN\r\t\tv := Containers.FocusSingleton();\r\t\tIF v = NIL THEN v := Focus() END;\r\t\tIF (v # NIL) & (v IS View) THEN "
