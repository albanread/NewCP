                  - text: " (f: Views.Frame; VAR msg: Controllers.Message;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\t\tVAR sp: Properties.SizeProp;\r\tBEGIN\r\t\tWITH f: Frame DO\r\t\t\tWITH msg: Controllers.TrackMsg DO\r\t\t\t\tIF (tv.NofTabs() > 0) & (f.InDispArea(msg.x, msg.y)) THEN\r\t\t\t\t\tfocus := tv.View(tv.Index())\r\t\t\t\tELSE\r\t\t\t\t\tf.MouseDown(msg.x, msg.y, msg.modifiers)\r\t\t\t\tEND\r\t\t\t| msg: FocusMsg DO\r\t\t\t\tmsg.view := tv\r\t\t\t| msg: Properties.PollPickMsg DO\r\t\t\t\tmsg.dest := f;\r\t\t\t\tIF (tv.NofTabs() > 0) & (f.InDispArea(msg.x, msg.y)) THEN\r\t\t\t\t\tfocus :=  tv.View(tv.Index())\r\t\t\t\tEND\r\t\t\t| msg: Properties.PickMsg DO\r\t\t\t\tNEW(sp); sp.known := {Properties.width, Properties.height}; sp.valid := sp.known;\r\t\t\t\ttv.context.GetSize(sp.width, sp.height);\r\t\t\t\tProperties.Insert(msg.prop, sp);\r\t\t\t\tIF (tv.NofTabs() > 0) & (f.InDispArea(msg.x, msg.y)) THEN\r\t\t\t\t\tfocus :=  tv.View(tv.Index())\r\t\t\t\tEND\r\t\t\t|msg: Controllers.PollCursorMsg DO\r\t\t\t\tIF (tv.NofTabs() > 0) & (f.InDispArea(msg.x, msg.y)) THEN\r\t\t\t\t\tfocus := tv.View(tv.Index())\r\t\t\t\tELSE\r\t\t\t\t\tf.GetCursor(msg.x, msg.y, msg.modifiers, msg.cursor)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tIF tv.NofTabs() > 0 THEN\r\t\t\t\t\tfocus := tv.View(tv.Index())\r\t\t\t\tELSE\r\t\t\t\t\tWITH msg: Controllers.PollOpsMsg DO\r\t\t\t\t\t\tmsg.valid := {Controllers.pasteChar}\r\t\t\t\t\t| msg: Controllers.MarkMsg DO\r\t\t\t\t\t\tf.Mark(msg.show, msg.focus)\r\t\t\t\t\tELSE\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE "
