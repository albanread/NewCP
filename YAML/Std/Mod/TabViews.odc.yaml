                    attr: 0
                  - text: HALT(100)
                    attr: 3
                  - text: " (* "
                    attr: 0
                  - text: Unbalanced call to BeginChanges/EndChanges
                    attr: 1
                  - text: " *)\r\tEND Do;\r\r\tPROCEDURE (o: SetNotifierOp) Do;\r\t\tVAR old: Dialog.String;\r\tBEGIN\r\t\told := o.v.notifier;\r\t\to.v.notifier := o.notifier;\r\t\to.notifier := old\r\tEND Do;\r\r\tPROCEDURE (o: FontOp) Do;\r\t\tVAR f: Fonts.Font;\r\tBEGIN\r\t\tf := o.v.font; o.v.font := o.font; o.font := f;\r\t\to.v.Update\r\tEND Do;\r\r\tPROCEDURE (o: SetItemOp) Do;\r\t\tVAR tc: TabContext; label: Dialog.String; view: Views.View;\r"
                    attr: 0
                  - text: "\t"
                    attr: 1
                  - text: "BEGIN\r\t\tIF o.set THEN\r\t\t\to.set := FALSE; o.oldLen := o.tv.NofTabs();\r\t\t\tview := Views.CopyOf(o.v, Views.deep); Stores.Join(o.tv, view);\r\t\t\tlabel := o.label;\r\t\t\tIF o.i >= o.oldLen THEN\r\t\t\t\to.tv.SetNofTabs(o.i + 1)\r\t\t\tELSE\r\t\t\t\to.tv.GetItem(o.i, o.label, o.v)\r\t\t\tEND;\r\t\t\tNEW(tc); view.InitContext(tc);\r\t\t\to.tv.tabs[o.i].label := label; o.tv.tabs[o.i].view := view\r\t\tELSE\r\t\t\to.set := TRUE;\r\t\t\tIF o.i >= o.oldLen THEN\r\t\t\t\to.tv.SetNofTabs(o.oldLen)\r\t\t\tELSE\r\t\t\t\tview := o.v; label := o.label;\r\t\t\t\to.tv.GetItem(o.i, o.label, o.v);\r\t\t\t\to.tv.tabs[o.i].label := label; o.tv.tabs[o.i].view := view\r\t\t\tEND\r\t\tEND;\r\t\to.tv.Update\r\tEND Do;\r\r\tPROCEDURE (o: DeleteOp) Do;\r\t\tVAR j: INTEGER;\r"
                    attr: 0
                  - text: "\t"
                    attr: 1
                  - text: "BEGIN\r\t\tIF o.set THEN\r\t\t\tASSERT(o.i < o.tv.NofTabs(), 20);\r\t\t\to.set := FALSE;\r\t\t\to.tv.GetItem(o.i, o.label, o.v);\r\t\t\tFOR j := o.i TO o.tv.NofTabs() - 2 DO\r\t\t\t\to.tv.tabs[j].label := o.tv.tabs[j + 1].label;\r\t\t\t\to.tv.tabs[j].view := o.tv.tabs[j + 1].view\r\t\t\tEND;\r\t\t\to.tv.SetNofTabs(o.tv.NofTabs() - 1)\r\t\tELSE\r\t\t\tASSERT(o.i <= o.tv.NofTabs(), 21);\r\t\t\to.set := TRUE;\r\t\t\to.tv.SetNofTabs(o.tv.NofTabs() + 1);\r\t\t\tFOR j := o.tv.NofTabs() - 1 TO o.i + 1 BY - 1 DO\r\t\t\t\to.tv.tabs[j].label := o.tv.tabs[j - 1].label;\r\t\t\t\to.tv.tabs[j].view := o.tv.tabs[j - 1].view\r\t\t\tEND;\r\t\t\to.tv.tabs[o.i].label := o.label;\r\t\t\to.tv.tabs[o.i].view := o.v\r\t\tEND;\r\t\to.tv.Update\r\tEND Do;\r\r\tPROCEDURE (tv: View) "
                    attr: 0
                  - text: HandlePropMsg
                    attr: 3
                  - text: "- (VAR msg: Properties.Message);\r\t\tVAR stp: Properties.StdProp; p: Properties.Property;\r\t\t\tface: Fonts.Typeface; size, weight, i, w, h, asc, dsc: INTEGER; style: SET;\r\t\t\tsmsg: Properties.SizePref; fo: FontOp;\r\tBEGIN\r\t\tWITH msg: Properties.ControlPref DO\r\t\t\tIF tv.NofTabs() = 0 THEN\r\t\t\t\tIF msg.getFocus THEN msg.getFocus := StdCFrames.setFocus END\r\t\t\tELSE\r\t\t\t\tmsg.focus := tv.View(tv.Index());\r\t\t\t\tViews.HandlePropMsg(msg.focus, msg)\r\t\t\tEND\r\t\t| msg: Properties.FocusPref DO\r\t\t\tIF (tv.NofTabs() = 0) OR (msg.atLocation & (msg.y < tv.dispY)) THEN\r\t\t\t\tmsg.hotFocus := TRUE\r\t\t\tELSE\r\t\t\t\tIF msg.atLocation THEN msg.x := msg.x - tv.dispX; msg.y := msg.y - tv.dispY END;\r\t\t\t\tViews.HandlePropMsg(tv.View(tv.Index()), msg)\r\t\t\tEND\r\t\t| msg: Properties.SizePref DO\r\t\t\tIF (msg.w = Views.undefined) OR (msg.h = Views.undefined) THEN\r\t\t\t\tIF tv.deposited OR (tv.NofTabs() = 0) THEN\r\t\t\t\t\tframeDir.GetTabSize(msg.w, msg.h)\r\t\t\t\tELSE\r\t\t\t\t\tw := 0; h:= 0;\r\t\t\t\t\tFOR i := 0 TO tv.NofTabs() - 1 DO\r\t\t\t\t\t\tsmsg.w := Views.undefined; smsg.h := Views.undefined;\r\t\t\t\t\t\tViews.HandlePropMsg(tv.View(i), smsg); w := MAX(smsg.w, w); h := MAX(smsg.h, h)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF (w = 0) OR (h = 0) THEN\r\t\t\t\t\t\tframeDir.GetTabSize(msg.w, msg.h)\r\t\t\t\t\tELSE\r\t\t\t\t\t\t(* add some constants to compensate for the tab view itself. *)\r\t\t\t\t\t\tmsg.w := w + 2 * Ports.mm;\r\t\t\t\t\t\ttv.font.GetBounds(asc, dsc, w); msg.h := h + asc + dsc + 4 * Ports.mm\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\t| msg: Properties.ResizePref DO\r\t\t\tmsg.horFitToWin := TRUE; msg.verFitToWin := TRUE\r\t\t| msg: Properties.PollMsg DO\r\t\t\tNEW(stp);\r\t\t\tstp.valid := {Properties.typeface..Properties.weight};\r\t\t\tstp.known := stp.valid;\r\t\t\tstp.typeface := tv.font.typeface;\r\t\t\tstp.size := tv.font.size; stp.style.val := tv.font.style;\r\t\t\tstp.weight := tv.font.weight;\r\t\t\tstp.style.mask := {Fonts.italic, Fonts.strikeout, Fonts.underline};\r\t\t\tProperties.Insert(msg.prop, stp)\r\t\t| msg: Properties.SetMsg DO\r\t\t\tp := msg.prop;\r\t\t\tWHILE (p # NIL) DO\r\t\t\t\tWITH p: Properties.StdProp DO\r\t\t\t\t\tIF (p.valid * {Properties.typeface..Properties.weight}) # {} THEN\r\t\t\t\t\t\tface := tv.font.typeface$; size := tv.font.size;\r\t\t\t\t\t\tstyle := tv.font.style; weight := tv.font.weight;\r\t\t\t\t\t\tIF Properties.typeface IN p.valid THEN face := p.typeface$;\r\t\t\t\t\t\t\tIF face = Fonts.default THEN face := StdCFrames.defaultFont.typeface END\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF Properties.size IN p.valid THEN size := p.size END;\r\t\t\t\t\t\tIF Properties.style IN p.valid THEN\r\t\t\t\t\t\t\tstyle := (p.style.val * p.style.mask) + (style - p.style.mask)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tIF Properties.weight IN p.valid THEN weight := p.weight END;\r\t\t\t\t\t\tNEW(fo); fo.v := tv; fo.font := Fonts.dir.This(face, size, style, weight);\r\t\t\t\t\t\tViews.Do(tv, \"#System:"
                    attr: 0
