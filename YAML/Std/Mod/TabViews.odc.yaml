                  - text: "\", fo)\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\tEND;\r\t\t\t\tp := p.next\r\t\t\tEND\r\t\t| msg: Containers.DropPref DO\r\t\t\tmsg.okToDrop := TRUE\r\t\tELSE\r\t\t\tIF tv.NofTabs() > 0 THEN\r\t\t\t\tViews.HandlePropMsg(tv.View(tv.Index()), msg)\r\t\t\tEND\r\t\tEND\r\tEND HandlePropMsg;\r\r\tPROCEDURE (tv: View) "
