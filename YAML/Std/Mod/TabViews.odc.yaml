                  - text: "BEGIN\r\t\tASSERT(nofTabs >= 0, 20);\r\t\tIF nofTabs = 0 THEN\r\t\t\ttv.nofTabs := 0; tv.tabs := NIL; tv.index := 0\r\t\tELSE\r\t\t\tNEW(nt, nofTabs);\r\t\t\tIF tv.tabs # NIL THEN\r\t\t\t\tFOR i := 0 TO MIN(nofTabs, tv.nofTabs) - 1 DO\r\t\t\t\t\tnt[i].label := tv.tabs[i].label; nt[i].view := tv.tabs[i].view\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\ttv.tabs := nt; tv.nofTabs := nofTabs; tv.index := MIN(tv.index, tv.nofTabs - 1)\r\t\tEND;\r\t\ttv.Update\r\tEND SetNofTabs;\r\r\tPROCEDURE (tv: View) "
