                  - text: " v(View)\r\t\tELSIF v IS Containers.View THEN\r\t\t\tc := v(Containers.View).ThisController();\r\t\t\tASSERT(c # NIL, 100);\r\t\t\tc.GetFirstView(Containers.any, v0);\r\t\t\tIF v0 # NIL THEN v1 := This(v0) END;\r\t\t\tWHILE (v0 # NIL) & (v1 = NIL) DO\r\t\t\t\tc.GetNextView(Containers.any, v0);\r\t\t\t\tIF v0 # NIL THEN v1 := This(v0) END\r\t\t\tEND;\r\t\t\t"
