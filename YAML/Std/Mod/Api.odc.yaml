                  - text: "\r**)\r"
                    attr: 1
                  - text: "\t\r\tIMPORT\r\t\t"
                    attr: 0
                  - text: Kernel
                    attr: 3
                  - text: ", Views, Files, Dialog, Converters, Windows, Sequencers, Stores, Meta,\r\t\tContainers, StdDialog, Documents, Strings;\r\r\t"
                    attr: 0
                  - text: "(* Auxiliary procedures *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE CheckQualident (VAR str, mod, name: ARRAY OF CHAR);\r\t\tVAR i, j: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ti := 0; \r\t\tREPEAT\r\t\t\tch := str[i]; mod[i] := ch; INC(i)\r\t\tUNTIL (i = LEN(str)) OR (i = LEN(mod)) OR ~Strings.IsIdent(ch);\r\t\tIF ch = \".\" THEN\r\t\t\tmod[i - 1] := 0X; j := 0;\r\t\t\tREPEAT\r\t\t\t\tch := str[i]; name[j] := ch; INC(i); INC(j)\r\t\t\tUNTIL (i = LEN(str)) OR (j = LEN(name)) OR ~Strings.IsIdent(ch);\r\t\t\tIF ch # 0X THEN mod[0] := 0X; name[0] := 0X END\r\t\tELSE mod[0] := 0X; name[0] := 0X\r\t\tEND\r\tEND CheckQualident;\r\t\r\tPROCEDURE PathToSpec (VAR path: ARRAY OF CHAR; VAR loc: Files.Locator; VAR name: Files.Name);\r\t\tVAR i, j: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ti := 0; j := 0; loc := Files.dir.This(\"\");\r\t\tWHILE (loc.res = 0) & (i < LEN(path) - 1) & (j < LEN(name) - 1) & (path[i] # 0X) DO\r\t\t\tch := path[i]; INC(i);\r\t\t\tIF (j > 0) & ((ch = \"/\") OR (ch = \"\\\")) THEN\r\t\t\t\tname[j] := 0X; j := 0;\r\t\t\t\tIF name = \"*\" THEN\r\t\t\t\t\tIF Dialog.language # \"\" THEN loc := loc.This(Dialog.language) END\r\t\t\t\tELSE loc := loc.This(name)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tname[j] := ch; INC(j)\r\t\t\tEND\r\t\tEND;\r\t\tIF path[i] = 0X THEN name[j] := 0X\r\t\tELSE loc.res := 1; name := \"\"\r\t\tEND\r\tEND PathToSpec;\r\t\r\tPROCEDURE ThisDialog (dialog: ARRAY OF CHAR): Views.View;\r\t\tVAR fname, submod, sub, mod: Files.Name; canCreate: BOOLEAN; conv: Converters.Converter;\r\t\t\tloc: Files.Locator; file: Files.File; v: Views.View; s: Stores.Store; var: Meta.Item;\r\tBEGIN\r\t\tASSERT(dialog # \"\", 20);\r\t\tv := NIL; file := NIL; canCreate := FALSE;\r\t\tCheckQualident(dialog, submod, fname);\r\t\tIF submod # \"\" THEN\t"
                    attr: 0
                  - text: "(* is qualident *)"
                    attr: 1
                  - text: "\r\t\t\tMeta.LookupPath(dialog, var);\r\t\t\tIF var.obj = Meta.varObj THEN\t"
                    attr: 0
                  - text: "(* variable exists *)"
                    attr: 1
                  - text: "\r\t\t\t\tcanCreate := TRUE;\r\t\t\t\tKernel.SplitName(submod, sub, mod);\r\t\t\t\tloc := Files.dir.This(sub);\r\t\t\t\tIF loc # NIL THEN\r\t\t\t\t\tKernel.MakeFileName(fname, \"\");\r\t\t\t\t\tloc := loc.This(\"Rsrc\");\r\t\t\t\t\tIF loc # NIL THEN file := Files.dir.Old(loc, fname, Files.shared) END;\r\t\t\t\t\tIF (file = NIL) & (sub = \"\") THEN\r\t\t\t\t\t\tloc := Files.dir.This(\"System\"); ASSERT(loc # NIL, 100);\r\t\t\t\t\t\tIF loc # NIL THEN\r\t\t\t\t\t\t\tloc := loc.This(\"Rsrc\");\r\t\t\t\t\t\t\tIF loc # NIL THEN file := Files.dir.Old(loc, fname, Files.shared) END\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND;\r\t\tIF (file = NIL) & ~canCreate THEN\t"
                    attr: 0
                  - text: "(* try file name *)"
                    attr: 1
                  - text: "\r\t\t\tPathToSpec(dialog, loc, fname);\r\t\t\tIF loc.res = 0 THEN\r\t\t\t\tKernel.MakeFileName(fname, \"\");\r\t\t\t\tfile := Files.dir.Old(loc, fname, Files.shared)\r\t\t\tEND\r\t\tEND;\r\t\tIF file # NIL THEN\r\t\t\tKernel.MakeFileName(fname, \"\");\r\t\t\tconv := NIL; Converters.Import(loc, fname, conv, s);\r\t\t\tIF s # NIL THEN\r\t\t\t\tv := s(Views.View)\r\t\t\tEND\r\t\tELSE Dialog.ShowParamMsg(\"#System:FileNotFound\", dialog, \"\", \"\")\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " v\r\tEND ThisDialog;\r\r\tPROCEDURE ThisMask (param: ARRAY OF CHAR): Views.View;\r\t\tVAR v: Views.View; c: Containers.Controller;\r\tBEGIN\r\t\tv := ThisDialog(param);\r\t\tIF v # NIL THEN\r\t\t\tWITH v: Containers.View DO\r\t\t\t\tc := v.ThisController();\r\t\t\t\tIF c # NIL THEN\r\t\t\t\t\tc.SetOpts(c.opts - {Containers.noFocus} + {Containers.noCaret, Containers.noSelection})\r\t\t\t\tELSE Dialog.ShowMsg(\"#System:NotEditable\")\r\t\t\t\tEND\r\t\t\tELSE Dialog.ShowMsg(\"#System:ContainerExpected\")\r\t\t\tEND\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " v\r\tEND ThisMask;\r\t\r\t"
                    attr: 0
                  - text: "(* Interface procedures *)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: CloseDialog
                    attr: 3
                  - text: "* (OUT closedView: Views.View);\r\t\tCONST canClose = {Windows.neverDirty, Windows.isTool, Windows.isAux};\r\t\tVAR w: Windows.Window; msg: Sequencers.CloseMsg;\r\tBEGIN\r\t\tclosedView := NIL;\r\t\tw := Windows.dir.First();\r\t\tIF w # NIL THEN\r\t\t\tIF w.sub THEN\r\t\t\t\tclosedView := w.frame.view;\r\t\t\t\tWindows.dir.Close(w);\r\t\t\tELSIF (w.flags * canClose = {}) & w.seq.Dirty() THEN\r\t\t\t\tDialog.ShowMsg(\"#System:CannotCloseDirtyWindow\")\r\t\t\tELSE\r\t\t\t\tmsg.sticky := FALSE; w.seq.Notify(msg);\r\t\t\t\tIF ~msg.sticky THEN closedView := w.frame.view; Windows.dir.Close(w) END\r\t\t\tEND\r\t\tEND\r\tEND CloseDialog;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: OpenAux
                    attr: 3
                  - text: "* (file, title: ARRAY OF CHAR; OUT v: Views.View);\r\t\tVAR loc: Files.Locator; name: Files.Name; t: Views.Title;\r\tBEGIN\r\t\tPathToSpec(file, loc, name);\r\t\tIF loc.res = 0 THEN\r\t\t\tloc.res := 77; v := Views.OldView(loc, name); loc.res := 0;\r\t\t\tIF v # NIL THEN t := title$; Views.OpenAux(v, t)\r\t\t\tELSE Dialog.ShowParamMsg(\"#System:FileNotFound\", file, \"\", \"\")\r\t\t\tEND\r\t\tELSE Dialog.ShowParamMsg(\"#System:FileNotFound\", file, \"\", \"\")\r\t\tEND\r\tEND OpenAux;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: OpenAuxDialog
                    attr: 3
                  - text: "* (file, title: ARRAY OF CHAR; OUT v: Views.View);\r\t\tVAR t0: Views.Title; done: BOOLEAN;\r\tBEGIN\r\t\tDialog.MapString(title, t0);\r\t\tWindows.SelectByTitle(NIL, {Windows.isAux}, t0, done);\r\t\tIF ~done THEN\r\t\t\tv := ThisMask(file);\r\t\t\tIF v # NIL THEN\r\t\t\t\tStdDialog.Open(v, title, NIL, \"\", NIL, FALSE, TRUE, TRUE, FALSE, TRUE)\r\t\t\tEND\r\t\tEND\r\tEND OpenAuxDialog;\r\t\r\t"
                    attr: 0
                  - text: "(* Opening a file in 'Browser' mode is used mainly for online help files. \r\tIn that case, but also in others, it is convenient to bring an existing window to the front in case the \r\tsame file is browsed again. This behavior is the same as with opening a file as a normal window.\r\tIn order to be able to browse and edit at the same time, i.e. in two different domains, the \r\tisAux flag is used to distinguish between both.\r\t*)"
                    attr: 1
                  - text: "\r\tPROCEDURE "
                    attr: 0
                  - text: OpenBrowser
                    attr: 3
                  - text: "* (file, title: ARRAY OF CHAR; OUT v: Views.View);\r\t\tVAR loc: Files.Locator; name: Files.Name; t: Views.Title;\r\t\t\tc: Containers.Controller; w: Windows.Window;\r\tBEGIN\r\t\tPathToSpec(file, loc, name);\r\t\tIF loc.res = 0 THEN\r\t\t\tw := Windows.GetBySpec(loc, name, Converters.list, {Windows.isAux});\r\t\t\tIF w # NIL THEN "
                    attr: 0
                  - text: "(* bring to front; avoid re-loading the document *)"
                    attr: 1
                  - text: "\r\t\t\t\tWindows.dir.Select(w, Windows.lazy);\r\t\t\t\tv := w.doc.ThisView();\r\t\t\tELSE "
                    attr: 0
                  - text: "(* load document and open reusable aux window in Browser mode *)"
                    attr: 1
                  - text: "\r\t\t\t\tloc.res := 77; v := Views.OldView(loc, name); loc.res := 0;\r\t\t\t\tIF v # NIL THEN\r\t\t\t\t\tWITH v: Containers.View DO\r\t\t\t\t\t\tc := v.ThisController();\r\t\t\t\t\t\tIF c # NIL THEN\r\t\t\t\t\t\t\tc.SetOpts(c.opts - {Containers.noFocus, Containers.noSelection} + {Containers.noCaret})\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE\r\t\t\t\t\tEND;\r\t\t\t\t\tt := title$;\r\t\t\t\t\tStdDialog.Open(v, t, loc, name, NIL, FALSE, TRUE, FALSE, FALSE, FALSE)\r\t\t\t\tELSE Dialog.ShowParamMsg(\"#System:FileNotFound\", file, \"\", \"\")\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE Dialog.ShowParamMsg(\"#System:FileNotFound\", file, \"\", \"\")\r\t\tEND\r\tEND OpenBrowser;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: OpenDoc
                    attr: 3
                  - text: "* (file: ARRAY OF CHAR; OUT v: Views.View);\r\t\tVAR loc: Files.Locator; name: Files.Name; conv: Converters.Converter;\r\tBEGIN\r\t\tPathToSpec(file, loc, name);\r\t\tIF loc.res = 0 THEN\r\t\t\tconv := NIL; v := Views.Old(Views.dontAsk, loc, name, conv);\r\t\t\tIF loc.res = 78 THEN loc := NIL; name := \"\" END;\t"
                    attr: 0
                  - text: "(* stationery *)"
                    attr: 1
                  - text: "\r\t\t\tIF v # NIL THEN Views.Open(v, loc, name, conv)\r\t\t\tELSE Dialog.ShowParamMsg(\"#System:FileNotFound\", file, \"\", \"\")\r\t\t\tEND\r\t\tELSE Dialog.ShowParamMsg(\"#System:FileNotFound\", file, \"\", \"\")\r\t\tEND\r\tEND OpenDoc;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: OpenCopyOf
                    attr: 3
                  - text: "* (file: ARRAY OF CHAR; OUT v: Views.View);\r\t\tVAR loc: Files.Locator; name: Files.Name; conv: Converters.Converter;\r\tBEGIN\r\t\tPathToSpec(file, loc, name);\r\t\tIF loc.res = 0 THEN\r\t\t\tconv := NIL; v := Views.Old(Views.dontAsk, loc, name, conv);\r\t\t\tIF loc.res = 78 THEN loc := NIL; name := \"\" END;\t(* stationary *)\r\t\t\tIF v # NIL THEN \r\t\t\t\tIF v.context # NIL THEN\r\t\t\t\t\tv := Views.CopyOf(v.context(Documents.Context).ThisDoc(), Views.deep);\r\t\t\t\t\tStores.InitDomain(v)\r\t\t\t\tELSE v := Views.CopyOf(v, Views.deep)\r\t\t\t\tEND;\r\t\t\t\tViews.Open(v, NIL, \"\", conv)\r\t\t\tELSE Dialog.ShowParamMsg(\"#System:FileNotFound\", file, \"\", \"\")\r\t\t\tEND\r\t\tELSE Dialog.ShowParamMsg(\"#System:FileNotFound\", file, \"\", \"\")\r\t\tEND\r\tEND OpenCopyOf;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: OpenToolDialog
                    attr: 3
                  - text: "* (file, title: ARRAY OF CHAR; OUT v: Views.View);\r\t\tVAR t0: Views.Title; done: BOOLEAN;\r\tBEGIN\r\t\tDialog.MapString(title, t0);\r\t\tWindows.SelectByTitle(NIL, {Windows.isTool}, t0, done);\r\t\tIF ~done THEN\r\t\t\tv := ThisMask(file);\r\t\t\tIF v # NIL THEN\r\t\t\t\tStdDialog.Open(v, title, NIL, \"\", NIL, TRUE, FALSE, TRUE, FALSE, TRUE)\r\t\t\tEND\r\t\tEND\r\tEND OpenToolDialog;\r\t\rEND StdApi.\r"
                    attr: 0
