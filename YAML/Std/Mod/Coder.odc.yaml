                  - text: "*(VAR p: Dialog.Par);\r\tBEGIN\r\t\tp.disabled := NofSelections(par.list) # 1\r\tEND StoreSingleGuard;\r\r\tPROCEDURE StoreAllFiles(files: FileList);\r\t\tVAR loc: Files.Locator; name: Files.Name;\r\tBEGIN\r\t\tWHILE files # NIL DO\r\t\t\tGetFile(files.name, loc, name); CopyFile(files.file, loc, name, files.type); files := files.next\r\t\tEND\r\tEND StoreAllFiles;\r\r\tPROCEDURE "
