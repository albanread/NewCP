                  - text: "*;\r\t\tVAR beg, end: INTEGER; c: TextControllers.Controller;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF c # NIL THEN\r\t\t\tIF c.HasSelection() THEN c.GetSelection(beg, end) ELSE beg := 0 END;\r\t\t\tViews.OpenView(TextViews.dir.New(EncodedInText(c.text, beg)))\r\t\tEND\r\tEND ListEncodedMaterial;\r\r\tPROCEDURE InitCodes;\r\t\tVAR i: BYTE; j: INTEGER;\r\tBEGIN\r\t\tj := 0;\r\t\tWHILE j # 256 DO revCode[j] := -1; INC(j) END;\r\t\tcode[0] := \".\"; revCode[ORD(\".\")] := 0; code[1] := \",\"; revCode[ORD(\",\")] := 1;\r\t\ti := 2; j := ORD(\"0\");\r\t\tWHILE j <= ORD(\"9\") DO code[i] := CHR(j); revCode[j] := i; INC(i); INC(j) END;\r\t\tj := ORD(\"A\");\r\t\tWHILE j <= ORD(\"Z\") DO code[i] := CHR(j); revCode[j] := i; INC(i); INC(j) END;\r\t\tj := ORD(\"a\");\r\t\tWHILE j <= ORD(\"z\") DO code[i] := CHR(j); revCode[j] := i; INC(i); INC(j) END;\r\t\tASSERT(i = 64, 60)\r\tEND InitCodes;\r\rBEGIN\r\tInitCodes;\r\tstdDocuType[0] := 3X; stdDocuType[1] := 3X; stdDocuType[2] := 3X; stdDocuType[3] := 0X\rEND StdCoder.\r"
