                  - text: "\r\tIMPORT\r\t\t"
                    attr: 0
                  - text: Kernel
                    attr: 3
                  - text: ", Files, Converters, Stores, Views, Controllers, Dialog, Documents, Windows,\r\t\tTextModels, TextViews, TextControllers, TextMappers,\r\t\tStdCmds;\r\r\tCONST\r\t\tN = 16384;\r\t\tLineLength = 74;\r\t\tOldVersion = 0; ThisVersion = 1;\r\t\tTag = \"StdCoder.Decode\";\t(* "
                    attr: 0
                  - text: first letter of Tag must not to appear within Tag again
                    attr: 1
                  - text: " *)\r\t\tSeparator = \"/\";\r\t\tView = 1; File = 2; List = 3;\r\r\tTYPE\r\t\tFileList = POINTER TO RECORD\r\t\t\tnext: FileList;\r\t\t\tfile: Files.File;\r\t\t\ttype: Files.Type;\r\t\t\tname:Dialog.String\r\t\tEND;\r\r\t\t"
                    attr: 0
                  - text: ParList
                    attr: 3
                  - text: "* = RECORD\r\t\t\tlist*: Dialog.Selection;\r\t\t\tstoreAs*: Dialog.String;\r\t\t\tfiles: FileList\r\t\tEND;\r\r\tVAR\r\t\t"
                    attr: 0
                  - text: par
                    attr: 3
                  - text: "*: ParList;\r\t\tcode: ARRAY 64 OF CHAR;\r\t\trevCode: ARRAY 256 OF BYTE;\r\t\ttable: ARRAY N OF BYTE;\r\t\tstdDocuType: Files.Type;\r\r\tPROCEDURE NofSelections(VAR list: Dialog.Selection): INTEGER;\r\t\tVAR i, n: INTEGER;\r\tBEGIN\r\t\ti := 0; n := 0;\r\t\tWHILE i # list.len DO\r\t\t\tIF list.In(i) THEN INC(n) END;\r\t\t\tINC(i)\r\t\tEND;\r\t\tRETURN n\r\tEND NofSelections;\r\r\tPROCEDURE ShowError(n: INTEGER; par: ARRAY OF CHAR);\r\tBEGIN\r\t\tDialog.Beep;\r\t\tCASE n OF\r\t\t 1: Dialog.ShowParamMsg(\"#Std:bad characters\", par, \"\", \"\")\r\t\t| 2: Dialog.ShowParamMsg(\"#Std:checksum error\", par, \"\", \"\")\r\t\t| 3: Dialog.ShowParamMsg(\"#Std:incompatible version\", par, \"\", \"\")\r\t\t| 4: Dialog.ShowParamMsg(\"#Std:filing error\", par, \"\", \"\")\r\t\t| 5: Dialog.ShowParamMsg(\"#Std:directory ^0 not found\", par, \"\", \"\")\r\t\t| 6: Dialog.ShowParamMsg(\"#Std:file ^0 not found\", par, \"\", \"\")\r\t\t| 7: Dialog.ShowParamMsg(\"#Std:illegal path\", par, \"\", \"\")\r\t\t| 8: Dialog.ShowParamMsg(\"#Std:no tag\", par, \"\", \"\")\r\t\t| 9: Dialog.ShowParamMsg(\"#Std:disk write protected\", par, \"\", \"\")\r\t\t| 10: Dialog.ShowParamMsg(\"#Std:io error\", par, \"\", \"\")\r\t\tEND\r\tEND ShowError;\r\r\tPROCEDURE ShowSizeMsg(x: INTEGER);\r\t\tVAR i, j: INTEGER; ch: CHAR; s: ARRAY 20 OF CHAR;\r\tBEGIN\r\t\tASSERT(x >= 0, 20);\r\t\ti := 0;\r\t\tREPEAT s[i] := CHR(ORD(\"0\") + x MOD 10); INC(i); x := x DIV 10 UNTIL x = 0;\r\t\ts[i] := 0X;\r\t\tDEC(i); j := 0;\r\t\tWHILE j < i DO ch := s[j]; s[j] := s[i]; s[i] := ch; INC(j); DEC(i) END;\r\t\tDialog.ShowParamStatus(\"#Std:^0 characters coded\", s, \"\", \"\")\r\tEND ShowSizeMsg;\r\r\tPROCEDURE Write(dest: TextModels.Writer; x: INTEGER; VAR n: INTEGER);\r\tBEGIN\r\t\tdest.WriteChar(code[x]); INC(n);\r\t\tIF n = LineLength THEN dest.WriteChar(0DX); dest.WriteChar(\" \"); n := 0 END\r\tEND Write;\r\r\tPROCEDURE WriteHeader(dest: TextModels.Writer; VAR n: INTEGER;\r\t\tname: ARRAY OF CHAR; type: BYTE\r\t);\r\t\tVAR byte, bit, i: INTEGER; ch: CHAR; tag: ARRAY 16 OF CHAR;\r\tBEGIN\r\t\ttag := Tag; i := 0; ch := tag[0];\r\t\tWHILE ch # 0X DO dest.WriteChar(ch); INC(n); INC(i); ch := tag[i] END;\r\t\tdest.WriteChar(\" \"); INC(n);\r\t\tbit := 0; byte := 0; i := 0;\r\t\tREPEAT\r\t\t\tch := name[i]; INC(byte, ASH(ORD(ch), bit)); INC(bit, 8);\r\t\t\tWHILE bit >= 6 DO Write(dest, byte MOD 64, n); byte := byte DIV 64; DEC(bit, 6) END;\r\t\t\tINC(i)\r\t\tUNTIL ch = 0X;\r\t\tIF bit # 0 THEN Write(dest, byte, n) END;\r\t\tWrite(dest, ThisVersion, n); Write(dest, type, n)\r\tEND WriteHeader;\r\r\tPROCEDURE WriteFileType(dest: TextModels.Writer; VAR n: INTEGER; t: Files.Type);\r\t\tVAR byte, bit, i: INTEGER; ch: CHAR;\r\tBEGIN\r\t\tIF t = Kernel.docType THEN t := stdDocuType END;\r\t\tbit := 0; byte := 0; i := 0; dest.WriteChar(\" \");\r\t\tREPEAT\r\t\t\tch := t[i]; INC(byte, ASH(ORD(ch), bit)); INC(bit, 8);\r\t\t\tWHILE bit >= 6 DO Write(dest, byte MOD 64, n); byte := byte DIV 64; DEC(bit, 6) END;\r\t\t\tINC(i)\r\t\tUNTIL ch = 0X;\r\t\tIF bit # 0 THEN Write(dest, byte, n) END\r\tEND WriteFileType;\r\r\tPROCEDURE WriteFile(dest: TextModels.Writer; VAR n: INTEGER; f: Files.File);\r\t\tVAR hash, byte, bit, i, j, sum, len: INTEGER; src: Files.Reader; b: BYTE;\r\tBEGIN\r\t\tlen := f.Length(); j := len; i := 6;\r\t\tWHILE i # 0 DO Write(dest, j MOD 64, n); j := j DIV 64; DEC(i) END;\r\t\ti := 0;\r\t\tREPEAT table[i] := 0; INC(i) UNTIL i = N;\r\t\thash := 0; bit := 0; byte := 0; sum := 0; src := f.NewReader(NIL);\r\t\tWHILE len # 0 DO\r\t\t\tsrc.ReadByte(b); DEC(len);\r\t\t\tsum := (sum + b MOD 256) MOD (16 * 1024);\r\t\t\tIF table[hash] = b THEN INC(bit)\t(* "
                    attr: 0
                  - text: 0 bit for correct prediction
                    attr: 1
                  - text: " *)\r\t\t\tELSE\t(* "
                    attr: 0
                  - text: "Incorrect prediction -> 1'xxxx'xxxx bits"
                    attr: 1
                  - text: " *)\r\t\t\t\ttable[hash] := b; INC(byte, ASH(1, bit)); INC(bit);\r\t\t\t\tINC(byte, ASH(b MOD 256, bit)); INC(bit, 8)\r\t\t\tEND;\r\t\t\tWHILE bit >= 6 DO Write(dest, byte MOD 64, n); byte := byte DIV 64; DEC(bit, 6) END;\r\t\t\thash := (16 * hash + b MOD 256) MOD N\r\t\tEND;\r\t\tIF bit # 0 THEN Write(dest, byte, n) END;\r\t\ti := 6;\r\t\tWHILE i # 0 DO Write(dest, sum MOD 64, n); sum := sum DIV 64; DEC(i) END;\r\t\tIF n # 0 THEN dest.WriteChar(0DX); n := 0 END\r\tEND WriteFile;\r\r\tPROCEDURE Read(src: TextModels.Reader; VAR x: INTEGER; VAR res: INTEGER);\r\t\tVAR ch: CHAR;\r\tBEGIN\r\t\tIF res = 0 THEN\r\t\t\tREPEAT src.ReadChar(ch); x := revCode[ORD(ch)] UNTIL (x >= 0) OR src.eot;\r\t\t\tIF src.eot THEN res := 1 END\r\t\tEND;\r\t\tIF res # 0 THEN x := 0 END\r\tEND Read;\r\r\tPROCEDURE ReadHeader(src: TextModels.Reader; VAR res: INTEGER;\r\t\tVAR name: ARRAY OF CHAR; VAR type: BYTE\r\t);\r\t\tVAR x, bit, i, j: INTEGER; ch: CHAR; tag: ARRAY 16 OF CHAR;\r\tBEGIN\r\t\ttag := Tag; i := 0;\r\t\tWHILE ~src.eot & (tag[i] # 0X) DO\r\t\t\tsrc.ReadChar(ch);\r\t\t\tIF ch = tag[i] THEN INC(i) ELSIF ch = tag[0] THEN i := 1 ELSE i := 0 END\r\t\tEND;\r\t\tIF ~src.eot THEN\r\t\t\tres := 0; i := 0; bit := 0; x := 0;\r\t\t\tREPEAT\r\t\t\t\tWHILE (res = 0) & (bit < 8) DO Read(src, j, res); INC(x, ASH(j, bit)); INC(bit, 6) END;\r\t\t\t\tIF res = 0 THEN\r\t\t\t\t\tch := CHR(x MOD 256); x := x DIV 256; DEC(bit, 8); name[i] := ch; INC(i)\r\t\t\t\tEND\r\t\t\tUNTIL (res # 0) OR (ch = 0X);\r\t\t\tRead(src, j, res);\r\t\t\tIF res = 0 THEN\r\t\t\t\tIF (j = ThisVersion) OR (j = OldVersion) THEN\r\t\t\t\t\tRead(src, j, res); type := SHORT(SHORT(j))\r\t\t\t\tELSE res := 3\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE res := 8\r\t\tEND\r\tEND ReadHeader;\r\r\tPROCEDURE ReadFileType(src: TextModels.Reader; VAR res: INTEGER; VAR ftype: Files.Type);\r\t\tVAR x, bit, i, j: INTEGER; ch: CHAR;\r\tBEGIN\r\t\tres := 0; i := 0; bit := 0; x := 0;\r\t\tREPEAT\r\t\t\tWHILE (res = 0) & (bit < 8) DO Read(src, j, res); INC(x, ASH(j, bit)); INC(bit, 6) END;\r\t\t\tIF res = 0 THEN ch := CHR(x MOD 256); x := x DIV 256; DEC(bit, 8); ftype[i] := ch; INC(i) END\r\t\tUNTIL (res # 0) OR (ch = 0X);\r\t\tIF ftype = stdDocuType THEN ftype := Kernel.docType END\r\tEND ReadFileType;\r\r\tPROCEDURE ReadFile(src: TextModels.Reader; VAR res: INTEGER; f: Files.File);\r\t\tVAR hash, x, bit, i, j, len, sum, s: INTEGER; byte: BYTE; dest: Files.Writer;\r\tBEGIN\r\t\tres := 0; i := 0; len := 0;\r\t\tREPEAT Read(src, x, res); len := len + ASH(x, 6 * i); INC(i) UNTIL (res # 0) OR (i = 6);\r\t\ti := 0;\r\t\tREPEAT table[i] := 0; INC(i) UNTIL i = N;\r\t\tbit := 0; hash := 0; sum := 0; dest := f.NewWriter(NIL);\r\t\tWHILE (res = 0) & (len # 0) DO\r\t\t\tIF bit = 0 THEN Read(src, x, res); bit := 6 END;\r\t\t\tIF ODD(x) THEN\t(* "
                    attr: 0
                  - text: "Incorrect prediction -> 1'xxxx'xxxx"
                    attr: 1
                  - text: " *)\r\t\t\t\tx := x DIV 2; DEC(bit);\r\t\t\t\tWHILE (res = 0) & (bit < 8) DO Read(src, j, res); INC(x, ASH(j, bit)); INC(bit, 6) END;\r\t\t\t\ti := x MOD 256;\r\t\t\t\tIF i > MAX(BYTE) THEN i := i - 256 END;\r\t\t\t\tbyte := SHORT(SHORT(i)); x := x DIV 256; DEC(bit, 8);\r\t\t\t\ttable[hash] := byte\r\t\t\tELSE byte := table[hash]; x := x DIV 2; DEC(bit)\t(* "
                    attr: 0
                  - text: correct prediction
                    attr: 1
                  - text: " *)\r\t\t\tEND;\r\t\t\thash := (16 * hash + byte MOD 256) MOD N;\r\t\t\tdest.WriteByte(byte); sum := (sum + byte MOD 256) MOD (16 * 1024); DEC(len)\r\t\tEND;\r\t\tIF res = 0 THEN\r\t\t\ti := 0; s := 0;\r\t\t\tREPEAT Read(src, x, res); s := s + ASH(x, 6 * i); INC(i) UNTIL (res # 0) OR (i = 6);\r\t\t\tIF (res = 0) & (s # sum) THEN res := 2 END\r\t\tEND\r\tEND ReadFile;\r\r\tPROCEDURE ShowText (t: TextModels.Model);\r\t\tVAR l: INTEGER; v: Views.View; wr: TextMappers.Formatter; conv: Converters.Converter;\r\tBEGIN\r\t\tl := t.Length();\r\t\twr.ConnectTo(t); wr.SetPos(l); wr.WriteString(\" --- end of encoding ---\");\r\t\tShowSizeMsg(l);\r\t\tv := TextViews.dir.New(t);\r\t\tconv := Converters.list;\r\t\tWHILE (conv # NIL) & (conv.imp # \"HostTextConv.ImportText\") DO conv := conv.next END;\r\t\tViews.Open(v, NIL, \"\", conv);\r\t\tViews.SetDirty(v)\r\tEND ShowText;\r\r\tPROCEDURE "
                    attr: 0
                  - text: EncodedView
                    attr: 3
                  - text: "*(v: Views.View): TextModels.Model;\r\t\tVAR n: INTEGER; f: Files.File; wrs: Stores.Writer; t: TextModels.Model; wr: TextModels.Writer;\r\tBEGIN\r\t\tf := Files.dir.Temp(); wrs.ConnectTo(f); Views.WriteView(wrs, v);\r\t\tt := TextModels.dir.New(); wr := t.NewWriter(NIL);\r\t\tn := 0; WriteHeader(wr, n, \"\", View); WriteFileType(wr, n, f.type); WriteFile(wr, n, f);\r\t\tRETURN t\r\tEND EncodedView;\r\r\tPROCEDURE "
                    attr: 0
                  - text: EncodeDocument
                    attr: 3
                  - text: "*;\r\t\tVAR v: Views.View; w: Windows.Window;\r\tBEGIN\r\t\tw := Windows.dir.First();\r\t\tIF w # NIL THEN\r\t\t\tv := w.doc.OriginalView();\r\t\t\tIF (v.context # NIL) & (v.context IS Documents.Context) THEN\r\t\t\t\tv := v.context(Documents.Context).ThisDoc()\r\t\t\tEND;\r\t\t\tIF v # NIL THEN ShowText(EncodedView(v)) END\r\t\tEND\r\tEND EncodeDocument;\r\r\tPROCEDURE "
                    attr: 0
                  - text: EncodeFocus
                    attr: 3
                  - text: "*;\r\t\tVAR v: Views.View;\r\tBEGIN\r\t\tv := Controllers.FocusView();\r\t\tIF v # NIL THEN ShowText(EncodedView(v)) END\r\tEND EncodeFocus;\r\r\tPROCEDURE "
                    attr: 0
                  - text: EncodeSelection
                    attr: 3
                  - text: "*;\r\t\tVAR beg, end: INTEGER; t: TextModels.Model; c: TextControllers.Controller;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tc.GetSelection(beg, end);\r\t\t\tt := TextModels.CloneOf(c.text); t.InsertCopy(0, c.text, beg, end);\r\t\t\tShowText(EncodedView(TextViews.dir.New(t)))\r\t\tEND\r\tEND EncodeSelection;\r\r\tPROCEDURE "
                    attr: 0
                  - text: EncodeFile
                    attr: 3
                  - text: "*;\r\t\tVAR n: INTEGER; loc: Files.Locator; name: Files.Name; f: Files.File;\r\t\t\tt: TextModels.Model; wr: TextModels.Writer;\r\tBEGIN\r\t\tDialog.GetIntSpec(\"\", loc, name);\r\t\tIF loc # NIL THEN\r\t\t\tf := Files.dir.Old(loc, name, TRUE);\r\t\t\tIF f # NIL THEN\r\t\t\t\tt := TextModels.dir.New(); wr := t.NewWriter(NIL);\r\t\t\t\tn := 0; WriteHeader(wr, n, name, File); WriteFileType(wr, n, f.type); WriteFile(wr, n, f);\r\t\t\t\tShowText(t)\r\t\t\tEND\r\t\tEND\r\tEND EncodeFile;\r\r\tPROCEDURE GetFile(VAR path: ARRAY OF CHAR; VAR loc: Files.Locator; VAR name: Files.Name);\r\t\tVAR i, j: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ti := 0; ch := path[0]; loc := Files.dir.This(\"\");\r\t\tWHILE (ch # 0X) & (loc # NIL) DO\r\t\t\tj := 0;\r\t\t\tWHILE (ch # 0X) & (ch # Separator) DO name[j] := ch; INC(j); INC(i); ch := path[i] END;\r\t\t\tname[j] := 0X;\r\t\t\tIF ch = Separator THEN loc := loc.This(name); INC(i); ch := path[i] END;\r\t\t\tIF loc.res # 0 THEN loc := NIL END\r\t\tEND;\r\t\tpath[i] := 0X\r\tEND GetFile;\r\r\tPROCEDURE ReadPath(rd: TextModels.Reader; VAR path: ARRAY OF CHAR; VAR len: INTEGER);\r\t\tVAR i, l: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ti := 0; l := LEN(path) - 1;\r\t\tREPEAT rd.ReadChar(ch) UNTIL rd.eot OR (ch > \" \");\r\t\tWHILE ~rd.eot & (ch > \" \") & (i < l) DO path[i] := ch; INC(i); rd.ReadChar(ch) END;\r\t\tpath[i] := 0X; len := i\r\tEND ReadPath;\r\t\r\tPROCEDURE WriteString(w: Files.Writer; IN str: ARRAY OF CHAR; len: INTEGER);\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\ti := 0;\r\t\tWHILE i < len DO\r\t\t\tIF ORD(str[i]) > MAX(BYTE) THEN w.WriteByte(SHORT(SHORT(ORD(str[i]) - 256)))\r\t\t\tELSE w.WriteByte(SHORT(SHORT(ORD(str[i]))))\r\t\t\tEND;\r\t\t\tINC(i)\r\t\tEND\r\tEND WriteString;\r\r\tPROCEDURE "
                    attr: 0
                  - text: EncodeFileList
                    attr: 3
                  - text: "*;\r\t\tTYPE\r\t\t\tFileList = POINTER TO RECORD\r\t\t\t\tnext: FileList;\r\t\t\t\tf: Files.File\r\t\t\tEND;\r\t\tVAR\r\t\t\tbeg, end, i, j, n: INTEGER; err: BOOLEAN;\r\t\t\tfiles, last: FileList;\r\t\t\tlist, f: Files.File; w: Files.Writer; loc: Files.Locator;\r\t\t\trd: TextModels.Reader; wr: TextModels.Writer; t: TextModels.Model;\r\t\t\tc: TextControllers.Controller;\r\t\t\tname: Files.Name; path, next: ARRAY 2048 OF CHAR;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF (c # NIL) & c.HasSelection() THEN c.GetSelection(beg, end);\r\t\t\trd := c.text.NewReader(NIL); rd.SetPos(beg); err := FALSE;\r\t\t\tlist := Files.dir.Temp(); w := list.NewWriter(NIL); files := NIL; last := NIL;\r\t\t\tReadPath(rd, path, i);\r\t\t\tWHILE (path # \"\") & (rd.Pos() - i < end) & ~err DO\r\t\t\t\tGetFile(path, loc, name);\r\t\t\t\tIF loc # NIL THEN\r\t\t\t\t\tf := Files.dir.Old(loc, name, TRUE); err := f = NIL;\r\t\t\t\t\tIF ~err THEN\r\t\t\t\t\t\tIF last = NIL THEN NEW(last); files := last ELSE NEW(last.next); last := last.next END;\r\t\t\t\t\t\tlast.f := f;\r\t\t\t\t\t\tReadPath(rd, next, j);\r\t\t\t\t\t\tIF (next = \"=>\") & (rd.Pos() - j < end) THEN\r\t\t\t\t\t\t\tReadPath(rd, next, j);\r\t\t\t\t\t\t\tIF next # \"\" THEN WriteString(w, next, j + 1); ReadPath(rd, next, j)\r\t\t\t\t\t\t\tELSE err := TRUE\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tELSE WriteString(w, path, i + 1)\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tpath := next; i := j\r\t\t\t\t\tEND\r\t\t\t\tELSE err := TRUE\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF ~err & (files # NIL) THEN\r\t\t\t\tt := TextModels.dir.New(); wr := t.NewWriter(NIL);\r\t\t\t\tn := 0; WriteHeader(wr, n, \"\", List);\r\t\t\t\tWriteFileType(wr, n, list.type); WriteFile(wr, n, list);\r\t\t\t\tWHILE files # NIL DO\r\t\t\t\t\tWriteFileType(wr, n, files.f.type); WriteFile(wr, n, files.f); files := files.next\r\t\t\t\tEND;\r\t\t\t\tShowText(t)\r\t\t\tELSIF err THEN\r\t\t\t\tIF path = \"\" THEN ShowError(7, path)\r\t\t\t\tELSIF loc # NIL THEN ShowError(6, path)\r\t\t\t\tELSE ShowError(5, path)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND EncodeFileList;\r\r\tPROCEDURE DecodeView(rd: TextModels.Reader; name: Files.Name);\r\t\tVAR res: INTEGER; f: Files.File; ftype: Files.Type; rds: Stores.Reader; v: Views.View;\r\tBEGIN\r\t\tReadFileType(rd, res, ftype);\r\t\tIF res = 0 THEN\r\t\t\tf := Files.dir.Temp(); ReadFile(rd, res, f);\r\t\t\tIF res = 0 THEN\r\t\t\t\trds.ConnectTo(f); Views.ReadView(rds, v); Views.Open(v, NIL, name, NIL);\r\t\t\t\tViews.SetDirty(v)\r\t\t\tELSE ShowError(res, \"\")\r\t\t\tEND\r\t\tELSE ShowError(res, \"\")\r\t\tEND\r\tEND DecodeView;\r\r\tPROCEDURE DecodeFile(rd: TextModels.Reader; name: Files.Name);\r\t\tVAR res: INTEGER; ftype: Files.Type; loc: Files.Locator; f: Files.File;\r\tBEGIN\r\t\tReadFileType(rd, res, ftype);\r\t\tIF res = 0 THEN\r\t\t\tDialog.GetExtSpec(name, ftype, loc, name);\r\t\t\tIF loc # NIL THEN\r\t\t\t\tf := Files.dir.New(loc, Files.ask);\r\t\t\t\tIF f # NIL THEN\r\t\t\t\t\tReadFile(rd, res, f);\r\t\t\t\t\tIF res = 0 THEN\r\t\t\t\t\t\tf.Register(name, ftype, Files.ask, res);\r\t\t\t\t\t\tIF res # 0 THEN ShowError(4, \"\") END\r\t\t\t\t\tELSE ShowError(res, \"\")\r\t\t\t\t\tEND\r\t\t\t\tELSIF loc.res = 4 THEN ShowError(9, \"\")\r\t\t\t\tELSIF loc.res = 5 THEN ShowError(10, \"\")\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE ShowError(res, \"\")\r\t\tEND\r\tEND DecodeFile;\r\r\tPROCEDURE DecodeFileList (rd: TextModels.Reader; VAR files: FileList; VAR len, res: INTEGER);\r\t\tVAR i, n: INTEGER; b: BYTE; p: FileList;\r\t\t\tftype: Files.Type; f: Files.File; frd: Files.Reader; path: Dialog.String;\r\tBEGIN\r\t\tReadFileType(rd, res, ftype);\r\t\tIF res = 0 THEN\r\t\t\tf := Files.dir.Temp(); ReadFile(rd, res, f);\r\t\t\tIF res = 0 THEN\r\t\t\t\tfiles := NIL; p := NIL; n := 0;\r\t\t\t\tfrd := f.NewReader(NIL); frd.ReadByte(b);\r\t\t\t\tWHILE ~frd.eof & (res = 0) DO\r\t\t\t\t\tINC(n); i := 0;\r\t\t\t\t\tWHILE ~frd.eof & (b # 0) DO path[i] := CHR(b MOD 256); INC(i); frd.ReadByte(b) END;\r\t\t\t\t\tIF (i > 4) & (path[i - 4] = \".\") & (CAP(path[i - 3]) = \"O\")\r\t\t\t\t\t\t& (CAP(path[i - 2]) = \"D\") & (CAP(path[i - 1]) = \"C\")\r\t\t\t\t\tTHEN path[i - 4] := 0X\r\t\t\t\t\tELSE path[i] := 0X\r\t\t\t\t\tEND;\r\t\t\t\t\tIF ~frd.eof THEN\r\t\t\t\t\t\tIF p = NIL THEN NEW(p); files := p ELSE NEW(p.next); p := p.next END;\r\t\t\t\t\t\tp.name := path;\r\t\t\t\t\t\tfrd.ReadByte(b)\r\t\t\t\t\tELSE res := 1\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tp := files; len := n;\r\t\t\t\tWHILE (res = 0) & (p # NIL) DO\r\t\t\t\t\tReadFileType(rd, res, p.type);\r\t\t\t\t\tIF res = 0 THEN p.file := Files.dir.Temp(); ReadFile(rd, res, p.file) END;\r\t\t\t\t\tp := p.next\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND DecodeFileList;\r\r\tPROCEDURE OpenDialog(files: FileList; len: INTEGER);\r\t\tVAR i: INTEGER; p: FileList;\r\tBEGIN\r\t\tpar.files := files; par.list.SetLen(len);\r\t\tp := files; i := 0;\r\t\tWHILE p # NIL DO par.list.SetItem(i, p.name); INC(i); p := p.next END;\r\t\tpar.storeAs := \"\";\r\t\tDialog.Update(par); Dialog.UpdateList(par.list);\r\t\tStdCmds.OpenAuxDialog(\"Std/Rsrc/Coder\", \"Decode\")\r\tEND OpenDialog;\r\r\tPROCEDURE "
                    attr: 0
                  - text: CloseDialog
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\tpar.files := NIL; par.list.SetLen(0); par.storeAs := \"\";\r\t\tDialog.UpdateList(par.list); Dialog.Update(par)\r\tEND CloseDialog;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Select
                    attr: 3
                  - text: "*(op, from, to: INTEGER);\r\t\tVAR p: FileList; i: INTEGER;\r\tBEGIN\r\t\tIF (op = Dialog.included) OR (op = Dialog.excluded) OR (op = Dialog.set) THEN\r\t\t\tIF NofSelections(par.list) = 1 THEN\r\t\t\t\ti := 0; p := par.files;\r\t\t\t\tWHILE ~par.list.In(i) DO INC(i); p := p.next END;\r\t\t\t\tpar.storeAs := p.name\r\t\t\tELSE par.storeAs := \"\"\r\t\t\tEND;\r\t\t\tDialog.Update(par)\r\t\tEND\r\tEND Select;\r\r\tPROCEDURE CopyFile(from: Files.File; loc: Files.Locator; name: Files.Name; type: Files.Type);\r\t\tCONST BufSize = 4096;\r\t\tVAR res, k, l: INTEGER; f: Files.File; r: Files.Reader; w: Files.Writer;\r\t\t\tbuf: ARRAY BufSize OF BYTE;\r\tBEGIN\r\t\tf := Files.dir.New(loc, Files.ask);\r\t\tIF f # NIL THEN\r\t\t\tr := from.NewReader(NIL); w := f.NewWriter(NIL); l := from.Length();\r\t\t\tWHILE l # 0 DO\r\t\t\t\tIF l <= BufSize THEN k := l ELSE k := BufSize END;\r\t\t\t\tr.ReadBytes(buf, 0, k); w.WriteBytes(buf, 0, k);\r\t\t\t\tl := l - k\r\t\t\tEND;\r\t\t\tf.Register(name, type, Files.ask, res);\r\t\t\tIF res # 0 THEN ShowError(4, \"\") END\r\t\tELSIF loc.res = 4 THEN ShowError(9, \"\")\r\t\tELSIF loc.res = 5 THEN ShowError(10, \"\")\r\t\tEND\r\tEND CopyFile;\r\r\tPROCEDURE "
                    attr: 0
                  - text: StoreSelection
