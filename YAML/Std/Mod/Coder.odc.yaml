                  - text: "*(text: TextModels.Model; beg: INTEGER): TextModels.Model;\r\t\tVAR res, i: INTEGER; type: BYTE; name: Files.Name;\r\t\t\trd: TextModels.Reader; report: TextModels.Model; wr: TextMappers.Formatter;\r\tBEGIN\r\t\treport := TextModels.dir.New(); wr.ConnectTo(report);\r\t\trd := text.NewReader(NIL); rd.SetPos(beg);\r\t\tReadHeader(rd, res, name, type);\r\t\ti := 0;\r\t\tWHILE name[i] # 0X DO INC(i) END;\r\t\tIF (i > 4) & (name[i - 4] = \".\") & (CAP(name[i - 3]) = \"O\")\r\t\t\t& (CAP(name[i - 2]) = \"D\") & (CAP(name[i - 1]) = \"C\")\r\t\tTHEN name[i - 4] := 0X\r\t\tEND;\r\t\tIF res = 0 THEN\r\t\t\tIF type = View THEN ListSingleton(\"View\", name, wr)\r\t\t\tELSIF type = File THEN ListSingleton(\"File\", name, wr)\r\t\t\tELSIF type = List THEN ListFiles(rd, wr)\r\t\t\tELSE ShowError(3, \"\")\r\t\t\tEND\r\t\tELSE ShowError(res, \"\")\r\t\tEND;\r\t\tRETURN report\r\tEND EncodedInText;\r\r\tPROCEDURE "
