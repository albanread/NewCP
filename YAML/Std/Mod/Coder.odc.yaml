                  - text: "*;\r\t\tVAR beg, end: INTEGER; c: TextControllers.Controller;\r\tBEGIN\r\t\tCloseDialog;\r\t\tc := TextControllers.Focus();\r\t\tIF c # NIL THEN\r\t\t\tIF c.HasSelection() THEN c.GetSelection(beg, end) ELSE beg := 0 END;\r\t\t\tDecodeAllFromText(c.text, beg, TRUE)\r\t\tEND\r\tEND Decode;\r\r\tPROCEDURE ListFiles(rd: TextModels.Reader; VAR wr: TextMappers.Formatter);\r\t\tVAR i, n, res: INTEGER; b: BYTE;\r\t\t\tftype: Files.Type; f: Files.File; frd: Files.Reader; path: Dialog.String;\r\tBEGIN\r\t\tReadFileType(rd, res, ftype);\r\t\tIF res = 0 THEN\r\t\t\tf := Files.dir.Temp(); ReadFile(rd, res, f);\r\t\t\tIF res = 0 THEN\r\t\t\t\tn := 0;\r\t\t\t\tfrd := f.NewReader(NIL); frd.ReadByte(b);\r\t\t\t\tWHILE ~frd.eof & (res = 0) DO\r\t\t\t\t\tINC(n); i := 0;\r\t\t\t\t\tWHILE ~frd.eof & (b # 0) DO path[i] := CHR(b MOD 256); INC(i); frd.ReadByte(b) END;\r\t\t\t\t\tIF (i > 4) & (path[i - 4] = \".\") & (CAP(path[i - 3]) = \"O\")\r\t\t\t\t\t\t& (CAP(path[i - 2]) = \"D\") & (CAP(path[i - 1]) = \"C\")\r\t\t\t\t\tTHEN path[i - 4] := 0X\r\t\t\t\t\tELSE path[i] := 0X\r\t\t\t\t\tEND;\r\t\t\t\t\tIF ~frd.eof THEN wr.WriteString(path); wr.WriteLn; frd.ReadByte(b) ELSE res := 1 END\r\t\t\t\tEND\r\t\t\tELSE ShowError(res, \"\")\r\t\t\tEND\r\t\tELSE ShowError(res, \"\")\r\t\tEND\r\tEND ListFiles;\r\r\tPROCEDURE ListSingleton(type, name: ARRAY OF CHAR; VAR wr: TextMappers.Formatter);\r\tBEGIN\r\t\twr.WriteString(type);\r\t\tIF name # \"\" THEN wr.WriteString(\": '\"); wr.WriteString(name); wr.WriteChar(\"'\") END;\r\t\twr.WriteLn\r\tEND ListSingleton;\r\r\tPROCEDURE "
