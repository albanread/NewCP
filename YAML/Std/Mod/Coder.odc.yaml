                  - text: "*(text: TextModels.Model; beg: INTEGER; ask: BOOLEAN);\r\t\tVAR res, i: INTEGER; type: BYTE; name: Files.Name; rd: TextModels.Reader; files: FileList;\r\tBEGIN\r\t\tCloseDialog;\r\t\trd := text.NewReader(NIL); rd.SetPos(beg);\r\t\tReadHeader(rd, res, name, type);\r\t\ti := 0;\r\t\tWHILE name[i] # 0X DO INC(i) END;\r\t\tIF (i > 4) & (name[i - 4] = \".\") & (CAP(name[i - 3]) = \"O\")\r\t\t\t& (CAP(name[i - 2]) = \"D\") & (CAP(name[i - 1]) = \"C\")\r\t\tTHEN name[i - 4] := 0X\r\t\tEND;\r\t\tIF res = 0 THEN\r\t\t\tIF type = View THEN DecodeView(rd, name)\r\t\t\tELSIF type = File THEN DecodeFile(rd, name)\r\t\t\tELSIF type = List THEN\r\t\t\t\tDecodeFileList(rd, files, i, res);\r\t\t\t\tIF res = 0 THEN\r\t\t\t\t\tIF ask THEN OpenDialog(files, i) ELSE StoreAllFiles(files) END\r\t\t\t\tELSE ShowError(res, \"\")\r\t\t\t\tEND\r\t\t\tELSE ShowError(3, \"\")\r\t\t\tEND\r\t\tELSE ShowError(res, \"\")\r\t\tEND\r\tEND DecodeAllFromText;\r\r\tPROCEDURE "
