                  - text: "*;\r\t\tVAR i, n: INTEGER; p: FileList; loc: Files.Locator; name: Files.Name;\r\tBEGIN\r\t\tn := NofSelections(par.list);\r\t\tIF n > 1 THEN\r\t\t\ti := 0; p := par.files;\r\t\t\tWHILE n # 0 DO\r\t\t\t\tWHILE ~par.list.In(i) DO INC(i); p := p.next END;\r\t\t\t\tGetFile(p.name, loc, name); CopyFile(p.file, loc, name, p.type);\r\t\t\t\tDEC(n); INC(i); p := p.next\r\t\t\tEND\r\t\tELSIF (n = 1) & (par.storeAs # \"\") THEN\r\t\t\ti := 0; p := par.files;\r\t\t\tWHILE ~par.list.In(i) DO INC(i); p := p.next END;\r\t\t\tGetFile(par.storeAs, loc, name); CopyFile(p.file, loc, name, p.type)\r\t\tEND\r\tEND StoreSelection;\r\r\tPROCEDURE "
