                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r"
                    attr: 0
                  - text: "(*\r\tStdStamps are used to keep track of document changes, in particular program texts.\r\tStdStamps carry a sequence number and a fingerprint of the document with them.\r\tEach time the document (and therefore its fingerprint) is changed and stored,\r\tthe sequence number is incremented. (When determining the fingerprint of the\r\tdocument, whitespace is ignored, except in string literals.)\r\t\r\tEach StdStamp also keeps track of the history of most recent changes.\r\tFor the last maxHistoryEntries sequence numbers, the date and time,\r\tand an optional one-line comment is stored. To avoid too many entries in the history\r\twhile working on a module, the most recent history entry is overwritten upon the\r\tgeneration of a new sequence number if the current date is the same as the date in\r\tthe history entry.\r\r*)"
                    attr: 1
                  - text: "\r\r\tIMPORT\r\t\t"
                    attr: 0
                  - text: SYSTEM
                    attr: 3
                  - text: ", (* SYSTEM.ROT "
                    attr: 0
                  - text: "only, for fingerprint calculation"
                    attr: 1
                  - text: " *)\r\t\tStrings, Dates, StdCmds,\r\t\tPorts, Models, Stores, Containers, Properties, Views, Controllers, Fonts,\r\t\tTextModels, TextSetters, TextMappers, TextViews, TextRulers;\r\r\tCONST\r\t\tsetCommentKey = \"#Std:Set Comment\";\r\t\tmaxHistoryEntries = 25;\r\t\tminVersion = 0; origStampVersion = 0; thisVersion = 3;\r\t\t\r\tTYPE\r\t\tHistory = ARRAY maxHistoryEntries OF RECORD\r\t\t\tfprint, snr: INTEGER;\t(* "
                    attr: 0
                  - text: "fingerprint, sequence number"
                    attr: 1
                  - text: " *)\r\t\t\tdate: INTEGER;\t\t\t(* "
                    attr: 0
                  - text: days since 1/1/1
                    attr: 1
                  - text: " *)\r\t\t\ttime: INTEGER;\t\t\t(* "
                    attr: 0
                  - text: "min + 64 * hour "
                    attr: 1
                  - text: "*)\r\t\t\tcomment: POINTER TO ARRAY OF CHAR;\t(* "
                    attr: 0
                  - text: "nil if no comment "
                    attr: 1
                  - text: " *)\r\t\tEND;\r\t\t\t\r\t\tStdView = POINTER TO RECORD (Views.View)\r\t\t\t(*--snr: LONGINT;*)\t\t\t\r\t\t\tnentries: INTEGER;\t(* "
                    attr: 0
                  - text: number of entries in
                    attr: 1
                  - text: " history *)\r\t\t\thistory: History;\t\t\t(* "
                    attr: 0
                  - text: newest entry in
                    attr: 1
                  - text: " history[0] *)\r\t\t\tcache: ARRAY 64 OF CHAR;\r\t\tEND;\r\r\t\tSetCmtOp = POINTER TO RECORD (Stores.Operation)\r\t\t\tstamp: StdView;\r\t\t\toldcomment: POINTER TO ARRAY OF CHAR;\r\t\tEND;\r\r\tVAR\r\t\t"
                    attr: 0
                  - text: comment
                    attr: 3
                  - text: "*: RECORD\r\t\t\ts*: ARRAY 64 OF CHAR;\r\t\tEND;\r\r\r\tPROCEDURE (op: SetCmtOp) Do;\r\t\tVAR temp: POINTER TO ARRAY OF CHAR;\r\tBEGIN\r\t\ttemp := op.stamp.history[0].comment;\r\t\top.stamp.history[0].comment := op.oldcomment;\r\t\top.oldcomment := temp;\r\tEND Do;\r\r\tPROCEDURE Format (v: StdView);\r\t\tVAR s: ARRAY 64 OF CHAR; d: Dates.Date; t: INTEGER;\r\tBEGIN\r\t\tt := v.history[0].time;\r\t\tDates.DayToDate(v.history[0].date, d);\r\t\tDates.DateToString(d, Dates.plainAbbreviated, s); v.cache := s$;\r\t\tStrings.IntToStringForm(v.history[0].snr, Strings.decimal, 4, \"0\", FALSE, s);\r\t\tv.cache := v.cache + \" (\" + s + \")\"\r\tEND Format;\r\r\r\tPROCEDURE FontContext (v: StdView): Fonts.Font;\r\t\tVAR c: Models.Context;\r\tBEGIN\r\t\tc := v.context;\r\t\tIF (c # NIL) & (c IS TextModels.Context) THEN\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " c(TextModels.Context).Attr().font;\r\t\tELSE\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " Fonts.dir.Default()\r\t\tEND;\r\tEND FontContext;\r\r\tPROCEDURE CalcFP (t: TextModels.Model): INTEGER;\r\t\tCONST sglQuote = \"'\"; dblQuote = '\"';\r\t\tVAR fp: INTEGER;  rd: TextModels.Reader; ch, quoteChar: CHAR; \r\tBEGIN\r\t\tquoteChar := 0X; fp := 0;\r\t\trd := t.NewReader(NIL); rd.ReadChar(ch);\r\t\tWHILE ~rd.eot DO\r\t\t\tIF ch = quoteChar THEN quoteChar := 0X;\r\t\t\tELSIF (quoteChar = 0X) & ((ch = dblQuote) OR (ch = sglQuote)) THEN quoteChar := ch;\r\t\t\tEND;\r\t\t\tIF (quoteChar = 0X) & (21X <= ch) & (ch # 8BX) & (ch # 8FX) & (ch # 0A0X) (* "
                    attr: 0
                  - text: not in string literal
                    attr: 1
                  - text: " *)\r\t\t\t\tOR (quoteChar # 0X) & (20X <= ch) (* "
                    attr: 0
                  - text: within string literal
                    attr: 1
                  - text: " *)\r\t\t\tTHEN\r\t\t\t\tfp := SYSTEM.ROT(fp, 1) + 13 * ORD(ch);\r\t\t\tEND;\r\t\t\trd.ReadChar(ch);\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " fp;\r\tEND CalcFP;\r\r\tPROCEDURE Update (v: StdView; forcenew: BOOLEAN);\r\t\tVAR fp: INTEGER; i: INTEGER; ndays: INTEGER; d: Dates.Date; t: Dates.Time;\r\tBEGIN\r\t\tIF (v.context # NIL) & (v.context IS TextModels.Context) THEN\r\t\t\tfp := CalcFP(v.context(TextModels.Context).ThisModel());\r\t\t\tIF (fp # v.history[0].fprint) OR forcenew THEN\r\t\t\t\tDates.GetDate(d); Dates.GetTime(t);\r\t\t\t\tndays := Dates.Day(d);\r\t\t\t\tIF (ndays # v.history[0].date) OR forcenew THEN\r\t\t\t\t\t(* "
                    attr: 0
                  - text: move down entries in history list
                    attr: 1
                  - text: " *)\r\t\t\t\t\ti := maxHistoryEntries-1;\r\t\t\t\t\tWHILE i > 0 DO\r\t\t\t\t\t\tv.history[i] := v.history[i-1];\r\t\t\t\t\t\tDEC(i);\r\t\t\t\t\tEND;\r\t\t\t\t\tv.history[0].comment := NIL;\r\t\t\t\tEND;\r\t\t\t\tIF v.nentries < maxHistoryEntries THEN INC(v.nentries) END;\r\t\t\t\tINC(v.history[0].snr);\r\t\t\t\tv.history[0].fprint := fp;\r\t\t\t\tv.history[0].date := ndays;\r\t\t\t\tv.history[0].time := t.minute + t.hour*64;\r\t\t\t\tFormat(v);\r\t\t\t\tViews.Update(v, Views.keepFrames);\r\t\t\tEND;\r\t\tEND;\r\tEND Update;\r\r\tPROCEDURE HasWideChars (IN s: ARRAY OF CHAR): BOOLEAN;\r\t\tVAR i: INTEGER; ch: CHAR;\r\tBEGIN i := 0; ch := s[0];\r\t\tWHILE (ch # 0X) & (ch <= 0FFX) DO INC(i); ch := s[i] END;\r\t\tRETURN ch # 0X\r\tEND HasWideChars;\r\r\tPROCEDURE (v: StdView) Externalize (VAR wr: Stores.Writer);\r\t\tVAR i, len: INTEGER; version: INTEGER;\r\tBEGIN\r\t\tUpdate(v, FALSE);\r\t\tv.Externalize^(wr);\r\t\ti := 0; \r\t\tWHILE (i < v.nentries) & ~((v.history[i].comment # NIL) & HasWideChars(v.history[i].comment)) DO\r\t\t\tINC(i)\r\t\tEND;\r\t\tIF i < v.nentries THEN version := thisVersion ELSE version := 2 END;\r\t\twr.WriteVersion(version);\r\t\t(*--wr.WriteLInt(v.snr);*)\r\t\twr.WriteXInt(v.nentries);\r\t\tFOR i := 0 TO v.nentries-1 DO\r\t\t\twr.WriteInt(v.history[i].fprint);\r\t\t\twr.WriteInt(v.history[i].snr);\r\t\t\twr.WriteInt(v.history[i].date);\r\t\t\twr.WriteXInt(v.history[i].time);\r\t\t\tIF v.history[i].comment # NIL THEN\r\t\t\t\tlen := LEN(v.history[i].comment$);\r\t\t\t\twr.WriteXInt(len);\r\t\t\t\tIF version = thisVersion THEN\r\t\t\t\t\twr.WriteString(v.history[i].comment)\r\t\t\t\tELSE\r\t\t\t\t\twr.WriteXString(v.history[i].comment)\r\t\t\t\tEND\r\t\t\tELSE wr.WriteXInt(0);\r\t\t\tEND\r\t\tEND;\r\tEND Externalize;\r\r\tPROCEDURE (v: StdView) Internalize (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER; format: BYTE; i, len: INTEGER;\r\t\t\td: Dates.Date; t: Dates.Time;\r\tBEGIN\r\t\tv.Internalize^(rd);\r\t\tIF ~rd.cancelled THEN\r\t\t\trd.ReadVersion(minVersion, thisVersion, version);\r\t\t\tIF ~rd.cancelled THEN\r\t\t\t\tIF version = origStampVersion THEN (* "
                    attr: 0
                  - text: deal with old StdStamp format
                    attr: 1
                  - text: " *)\r\t\t\t\t\t(* "
                    attr: 0
                  - text: "would like to calculate fingerprint, but hosting model not available at this time"
                    attr: 1
                  - text: " *)\r\t\t\t\t\tv.history[0].fprint := 0;\r\t\t\t\t\tv.history[0].snr := 1; v.nentries := 1;\r\t\t\t\t\trd.ReadXInt(d.year); rd.ReadXInt(d.month); rd.ReadXInt(d.day);\r\t\t\t\t\trd.ReadXInt(t.hour); rd.ReadXInt(t.minute); rd.ReadXInt(t.second);\r\t\t\t\t\trd.ReadByte(format); (* format "
                    attr: 0
                  - text: not used anymore
                    attr: 1
                  - text: " *)\r\t\t\t\t\tv.history[0].date := Dates.Day(d);\r\t\t\t\t\tv.history[0].time := t.minute + t.hour*64;\r\t\t\t\tELSE\r\t\t\t\t\tIF version = 1 THEN rd.ReadInt(v.history[0].snr) END; (* red text: to be removed soon *)\r\t\t\t\t\trd.ReadXInt(v.nentries);\r\t\t\t\t\tFOR i := 0 TO v.nentries-1 DO\r\t\t\t\t\t\trd.ReadInt(v.history[i].fprint);\r\t\t\t\t\t\tIF version > 1 THEN rd.ReadInt(v.history[i].snr)\r\t\t\t\t\t\tELSIF (* (version = 1) & *) i > 0 THEN v.history[i].snr := v.history[i-1].snr - 1;\r\t\t\t\t\t\tEND; (* red text: to be removed soon *)\r\t\t\t\t\t\trd.ReadInt(v.history[i].date);\r\t\t\t\t\t\trd.ReadXInt(v.history[i].time);\r\t\t\t\t\t\trd.ReadXInt(len);\r\t\t\t\t\t\tIF len > 0 THEN\r\t\t\t\t\t\t\tNEW(v.history[i].comment, len + 1);\r\t\t\t\t\t\t\tIF version = thisVersion THEN\r\t\t\t\t\t\t\t\trd.ReadString(v.history[i].comment)\r\t\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\t\trd.ReadXString(v.history[i].comment)\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tELSE v.history[i].comment := NIL;\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND;\r\t\t\t\tEND;\r\t\t\t\tFormat(v);\r\t\t\tEND\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (v: StdView) CopyFromSimpleView (source: Views.View);\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\t(* v.CopyFrom^(source); *)\r\t\tWITH source: StdView DO\r\t\t\t(*--v.snr := source.snr;*)\r\t\t\tv.nentries := source.nentries;\r\t\t\tv.history := source.history;\r\t\t\tv.cache := source.cache;\r\t\t\tFOR i := 0 TO v.nentries - 1 DO\r\t\t\t\tIF source.history[i].comment # NIL THEN\r\t\t\t\t\tNEW(v.history[i].comment, LEN(source.history[i].comment$) + 1);\r\t\t\t\t\tv.history[i].comment^ := source.history[i].comment^$;\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND CopyFromSimpleView;\r\r\tPROCEDURE (v: StdView) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR a: TextModels.Attributes; color: Ports.Color; c: Models.Context; font: Fonts.Font;\r\t\t\tasc, dsc, fw: INTEGER;\r\tBEGIN\r\t\tc := v.context;\r\t\tIF (c # NIL) & (c IS TextModels.Context) THEN\r\t\t\ta := v.context(TextModels.Context).Attr();\r\t\t\tfont := a.font;\r\t\t\tcolor := a.color;\r\t\tELSE font := Fonts.dir.Default(); color := Ports.black;\r\t\tEND;\r\t\tfont.GetBounds(asc, dsc, fw);\r\t\tf.DrawLine(f.l, asc + f.dot, f.r, asc + f.dot, 1, Ports.grey25 );\r\t\tf.DrawString(0, asc, color, v.cache, font);\r\tEND Restore;\r\r\tPROCEDURE SizePref (v: StdView; VAR p: Properties.SizePref);\r\t\tVAR font: Fonts.Font; asc, dsc, w: INTEGER; d: Dates.Date; s: ARRAY 64 OF CHAR;\r\tBEGIN\r\t\tfont := FontContext(v);\r\t\tfont.GetBounds(asc, dsc, w);\r\t\td.day := 28; d.month := 1; d.year := 2222; p.w := 0;\r\t\tWHILE d.month <= 12 DO\r\t\t\tDates.DateToString(d, Dates.plainAbbreviated, s);\r\t\t\ts := s + \" (0000)\";\r\t\t\tw := font.StringWidth(s);\r\t\t\tIF w > p.w THEN p.w := w END;\r\t\t\tINC(d.month)\r\t\tEND;\r\t\tp.h := asc + dsc;\r\tEND SizePref;\r\r\tPROCEDURE (v: StdView) HandlePropMsg (VAR msg: Properties.Message);\r\t\tVAR font: Fonts.Font; asc, w: INTEGER;\r\tBEGIN\r\t\tWITH msg: Properties.Preference DO\r\t\t\tWITH msg: Properties.SizePref DO\r\t\t\t\tSizePref(v, msg)\r\t\t\t| msg: Properties.ResizePref DO\r\t\t\t\tmsg.fixed := TRUE\r\t\t\t| msg: Properties.FocusPref DO\r\t\t\t\tmsg.hotFocus := TRUE\r\t\t\t| msg: TextSetters.Pref DO\r\t\t\t\tfont := FontContext(v);\r\t\t\t\tfont.GetBounds(asc, msg.dsc, w);\r\t\t\tELSE\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\r\tPROCEDURE NewRuler (): TextRulers.Ruler;\r\t\tCONST mm = Ports.mm;\r\t\tVAR r: TextRulers.Ruler;\r\tBEGIN\r\t\tr := TextRulers.dir.New(NIL);\r\t\tTextRulers.SetRight(r, 140 * mm);\r\t\tTextRulers.AddTab(r, 15 * mm); TextRulers.AddTab(r, 35 * mm); TextRulers.AddTab(r, 75 * mm);\r\t\t"
                    attr: 0
                  - text: RETURN
