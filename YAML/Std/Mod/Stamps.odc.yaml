                  - text: " r\r\tEND NewRuler;\r\r\tPROCEDURE ShowHistory (v: StdView);\r\t\tVAR text: TextModels.Model; f: TextMappers.Formatter;\r\t\t\ti: INTEGER; d: Dates.Date; s: ARRAY 64 OF CHAR;\r\t\t\ttv: TextViews.View; attr: TextModels.Attributes;\r\tBEGIN\r\t\ttext := TextModels.dir.New();\r\t\tf.ConnectTo(text);\r\t\tattr := f.rider.attr;\r\t\tf.rider.SetAttr(TextModels.NewStyle(attr, {Fonts.italic}));\r\t\tf.WriteString(\"seq nr.\"); f.WriteTab;\r\t\tf.WriteString(\"fingerprint\"); f.WriteTab;\r\t\tf.WriteString(\"date and time\"); f.WriteTab;\r\t\tf.WriteString(\"comment\"); f.WriteLn;\r\t\tf.rider.SetAttr(attr); f.WriteLn;\r\t\t(*--n := v.snr;*)\r\t\tFOR i := 0 TO v.nentries-1 DO\r\t\t\tf.WriteIntForm(v.history[i].snr, 10, 4, \"0\", FALSE);\r\t\t\t(*--DEC(n);*)\r\t\t\tf.WriteTab;\r\t\t\tf.WriteIntForm(v.history[i].fprint, TextMappers.hexadecimal, 8, \"0\", FALSE);\r\t\t\tf.WriteTab;\r\t\t\tDates.DayToDate(v.history[i].date, d);\r\t\t\tDates.DateToString(d, Dates.plainAbbreviated, s);\r\t\t\tf.WriteString(s);\r\t\t\tf.WriteString(\"  \");\r\t\t\tf.WriteIntForm(v.history[i].time DIV 64, 10, 2, \"0\", FALSE);\r\t\t\tf.WriteString(\":\");\r\t\t\tf.WriteIntForm(v.history[i].time MOD 64, 10, 2, \"0\", FALSE);\r\t\t\tIF v.history[i].comment # NIL THEN\r\t\t\t\tf.WriteTab;\r\t\t\t\tf.WriteString( v.history[i].comment^);\r\t\t\tEND;\r\t\t\tf.WriteLn;\r\t\tEND;\r\t\ttv := TextViews.dir.New(text);\r\t\ttv.SetDefaults(NewRuler(), TextViews.dir.defAttr);\r\t\ttv.ThisController().SetOpts({Containers.noFocus, Containers.noCaret});\r\t\tViews.OpenAux(tv, \"History\");\r\tEND ShowHistory;\r\r\tPROCEDURE Track (v: StdView; f: Views.Frame; x, y: INTEGER; buttons: SET);\r\t\tVAR c: Models.Context; w, h: INTEGER; isDown, in, in0: BOOLEAN; m: SET;\r\tBEGIN\r\t\tc := v.context; c.GetSize(w, h); in0 := FALSE; in := TRUE;\r\t\tREPEAT\r\t\t\tIF in # in0 THEN\r\t\t\t\tf.MarkRect(0, 0, w, h, Ports.fill, Ports.invert, Ports.show); in0 := in\r\t\t\tEND;\r\t\t\tf.Input(x, y, m, isDown);\r\t\t\tin := (0 <= x) & (x < w) & (0 <= y) & (y < h)\r\t\tUNTIL ~isDown;\r\t\tIF in0 THEN\r\t\t\tf.MarkRect(0, 0, w, h, Ports.fill, Ports.invert, Ports.hide);\r\t\t\tIF Controllers.modify IN m THEN\r\t\t\t\tIF v.history[0].comment # NIL THEN comment.s := v.history[0].comment^$;\r\t\t\t\tELSE comment.s := \"\";\r\t\t\t\tEND;\r\t\t\t\tStdCmds.OpenToolDialog(\"Std/Rsrc/Stamps\", \"#Std:Comment\");\r\t\t\tELSE ShowHistory(v);\r\t\t\tEND\r\t\tEND\r\tEND Track;\r\r\tPROCEDURE (v: StdView) HandleCtrlMsg (\r\t\t\t\tf: Views.Frame; VAR msg: Controllers.Message; VAR focus: Views.View);\r\tBEGIN\r\t\tWITH msg: Controllers.TrackMsg DO\r\t\t\tTrack(v, f, msg.x, msg.y, msg.modifiers)\r\t\t| msg: Controllers.PollCursorMsg DO\r\t\t\tmsg.cursor := Ports.refCursor\r\t\tELSE\r\t\tEND\r\tEND HandleCtrlMsg;\r\r\r\t(* ------------ "
