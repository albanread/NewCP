                  - text: "\r\r\tPROCEDURE GetParam (c: TextControllers.Controller; VAR param: ARRAY OF CHAR;\r\t\t\t\t\t\t\t\t\tVAR lbrBeg, lbrEnd, rbrBeg, rbrEnd: INTEGER);\r\t\tVAR rd: TextModels.Reader; i, beg, end: INTEGER;\r\t\t\tch0, ch1, ch2: CHAR;\r\tBEGIN\r\t\tparam[0] := 0X;\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tc.GetSelection(beg, end);\r\t\t\tIF end - beg > 4 THEN\r\t\t\t\trd := c.text.NewReader(NIL);\r\t\t\t\trd.SetPos(beg); rd.ReadChar(ch0);\r\t\t\t\trd.SetPos(end-2); rd.ReadChar(ch1); rd.ReadChar(ch2);\r\t\t\t\tIF (ch0 = \"<\") & (ch1 = \"<\") & (ch2 = \">\") THEN\r\t\t\t\t\trd.SetPos(beg+1); rd.ReadChar(ch0); i := 0;\r\t\t\t\t\tWHILE ~rd.eot & (ch0 # \">\") DO\r\t\t\t\t\t\tIF i < LEN(param) - 1 THEN param[i] := ch0; INC(i) END;\r\t\t\t\t\t\trd.ReadChar(ch0)\r\t\t\t\t\tEND;\r\t\t\t\t\tparam[i] := 0X;\r\t\t\t\t\tlbrBeg := beg; lbrEnd := rd.Pos();\r\t\t\t\t\trbrBeg := end -2; rbrEnd := end\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND GetParam;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: CreateGuard
                    attr: 3
                  - text: "* (VAR par: Dialog.Par);\r\t\tVAR param: ARRAY 512 OF CHAR; lbrBeg, lbrEnd, rbrBeg, rbrEnd: INTEGER;\r\tBEGIN\r\t\tGetParam(TextControllers.Focus(), param, lbrBeg, lbrEnd, rbrBeg, rbrEnd);\r\t\tpar.disabled := param = \"\"\r\tEND CreateGuard;\r\r\tPROCEDURE InsertionAttr (c: TextControllers.Controller; pos: INTEGER): TextModels.Attributes;\r\t\tVAR rd: TextModels.Reader; r: TextRulers.Ruler; a: TextModels.Attributes; ch: CHAR;\r\tBEGIN\r\t\trd := c.text.NewReader(NIL);  a := NIL;\r\t\trd.SetPos(pos); rd.ReadChar(ch); a := rd.attr;\r\t\tIF a = NIL THEN c.view.PollDefaults(r, a) END;\r\t\tRETURN a\r\tEND InsertionAttr;\r\r\tPROCEDURE "
                    attr: 0
                  - text: CreateLink
                    attr: 3
                  - text: "*;\r\t\tVAR lbrBeg, lbrEnd, rbrBeg, rbrEnd: INTEGER;\r\t\t\tleft, right: Link; c: TextControllers.Controller;\r\t\t\tcmd: ARRAY 512 OF CHAR;\r\t\t\top: Stores.Operation;\r\t\t\tw: TextModels.Writer; a: TextModels.Attributes;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tGetParam(TextControllers.Focus(), cmd, lbrBeg, lbrEnd, rbrBeg, rbrEnd);\r\t\tIF cmd # \"\" THEN\r\t\t\tw := c.text.NewWriter(NIL);\r\t\t\tModels.BeginScript(c.text, \"#StdLinks:Create Link\", op);\r\t\t\ta := InsertionAttr(c, rbrBeg);\r\t\t\tc.text.Delete(rbrBeg, rbrEnd);\r\t\t\tright := dir.NewLink(\"\");\r\t\t\tw.SetPos(rbrBeg);\r\t\t\tIF a # NIL THEN w.SetAttr(a) END;\r\t\t\tw.WriteView(right, 0, 0);\r\t\t\ta := InsertionAttr(c, lbrBeg);\r\t\t\tc.text.Delete(lbrBeg, lbrEnd);\r\t\t\tleft := dir.NewLink(cmd);\r\t\t\tw.SetPos(lbrBeg);\r\t\t\tIF a # NIL THEN w.SetAttr(a) END;\r\t\t\tw.WriteView(left, 0, 0);\r\t\t\tModels.EndScript(c.text, op)\r\t\tEND\r\tEND CreateLink;\r\r\tPROCEDURE "
                    attr: 0
                  - text: CreateTarget
                    attr: 3
                  - text: "*;\r\t\tVAR lbrBeg, lbrEnd, rbrBeg, rbrEnd: INTEGER;\r\t\t\tleft, right: Target; c: TextControllers.Controller;\r\t\t\tident: ARRAY 512 OF CHAR;\r\t\t\top: Stores.Operation;\r\t\t\tw: TextModels.Writer; a: TextModels.Attributes;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tGetParam(TextControllers.Focus(), ident, lbrBeg, lbrEnd, rbrBeg, rbrEnd);\r\t\tIF ident # \"\" THEN\r\t\t\tw := c.text.NewWriter(NIL);\r\t\t\tModels.BeginScript(c.text, \"#StdLinks:Create Target\", op);\r\t\t\ta := InsertionAttr(c, rbrBeg);\r\t\t\tc.text.Delete(rbrBeg, rbrEnd);\r\t\t\tright := dir.NewTarget(\"\");\r\t\t\tw.SetPos(rbrBeg);\r\t\t\tIF a # NIL THEN w.SetAttr(a) END;\r\t\t\tw.WriteView(right, 0, 0);\r\t\t\ta := InsertionAttr(c, lbrBeg);\r\t\t\tc.text.Delete(lbrBeg, lbrEnd);\r\t\t\tleft := dir.NewTarget(ident);\r\t\t\tw.SetPos(lbrBeg);\r\t\t\tIF a # NIL THEN w.SetAttr(a) END;\r\t\t\tw.WriteView(left, 0, 0);\r\t\t\tModels.EndScript(c.text, op)\r\t\tEND\r\tEND CreateTarget;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ShowTarget
                    attr: 3
                  - text: "* (IN ident: ARRAY OF CHAR);\r\t\tVAR c: TextControllers.Controller; rd: TextModels.Reader;\r\t\t\tv: Views.View; left, right: Target; beg, end: INTEGER;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF c # NIL THEN\r\t\t\trd := c.text.NewReader(NIL);\r\t\t\tREPEAT rd.ReadView(v)\r\t\t\tUNTIL rd.eot OR (v # NIL) & (v IS Target) & v(Target).leftSide & (v(Target).ident^ = ident);\r\t\t\tIF ~rd.eot THEN\r\t\t\t\tGetTargetPair(v(Target), left, right);\r\t\t\t\tIF (left # NIL) & (right # NIL) THEN\r\t\t\t\t\tbeg := left.context(TextModels.Context).Pos();\r\t\t\t\t\tend := right.context(TextModels.Context).Pos() + 1;\r\t\t\t\t\tc.SetSelection(beg, end);\r\t\t\t\t\tc.view.SetOrigin(beg, 0)\r\t\t\t\tELSE\r\t\t\t\t\tDialog.ShowParamMsg(\"target '^0' not found\", ident, \"\", \"\")\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tDialog.ShowParamMsg(\"target '^0' not found\", ident, \"\", \"\")\r\t\t\tEND\r\t\tEND\r\tEND ShowTarget;\r\r\r\t"
                    attr: 0
                  - text: "(* programming interface *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (d: StdDirectory) NewLink (IN cmd: ARRAY OF CHAR): Link;\r\t\tVAR link: Link; i: INTEGER;\r\tBEGIN\r\t\tNEW(link); link.leftSide := cmd # \"\";\r\t\tIF link.leftSide THEN\r\t\t\ti := 0; WHILE cmd[i] # 0X DO INC(i) END;\r\t\t\tNEW(link.cmd, i + 1); link.cmd^ := cmd$\r\t\tELSE\r\t\t\tlink.cmd := NIL\r\t\tEND;\r\t\tlink.close := ifShiftDown;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " link\r\tEND NewLink;\r\r\tPROCEDURE (d: StdDirectory) NewTarget (IN ident: ARRAY OF CHAR): Target;\r\t\tVAR t: Target; i: INTEGER;\r\tBEGIN\r\t\tNEW(t); t.leftSide := ident # \"\";\r\t\tIF t.leftSide THEN\r\t\t\ti := 0; WHILE ident[i] # 0X DO INC(i) END;\r\t\t\tNEW(t.ident, i + 1); t.ident^ := ident$\r\t\tELSE\r\t\t\tt.ident := NIL\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " t\r\tEND NewTarget;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SetDir
                    attr: 3
                  - text: "* (d: Directory);\r\tBEGIN\r\t\tASSERT(d # NIL, 20);\r\t\tdir := d\r\tEND SetDir;\r\r\tPROCEDURE Init;\r\t\tVAR font: Fonts.Font; d: StdDirectory;\r\r\t\tPROCEDURE DefaultAppearance;\r\t\tBEGIN font := Fonts.dir.Default(); iconFont := font.typeface;\r\t\t\tlinkLeft := \"Link\"; linkRight := \"~\";\r\t\t\ttargetLeft := \"Targ\"; targetRight :=  \"~\";\r\t\t\tcoloredBackg := TRUE\r\t\tEND DefaultAppearance;\r\r\tBEGIN\r\t\tNEW(d); dir := d; stdDir := d;\r\t\tIF Dialog.IsWindows() THEN\r\t\t\ticonFont := \"Wingdings\";\r\t\t\tfont := Fonts.dir.This(iconFont, 10*Fonts.point (*arbitrary*), {}, Fonts.normal);\r\t\t\tIF font.IsAlien() THEN DefaultAppearance\r\t\t\tELSE\r\t\t\t\tlinkLeft[0] := SHORT(CHR(246)); linkLeft[1] := 0X;\r\t\t\t\tlinkRight[0] := SHORT(CHR(245)); linkRight[1] := 0X;\r\t\t\t\ttargetLeft[0] := SHORT(CHR(164)); targetLeft[1] := 0X;\r\t\t\t\ttargetRight[0] := SHORT(CHR(161)); targetRight[1] := 0X;\r\t\t\t\tcoloredBackg := FALSE\r\t\t\tEND\r\t\tELSIF Dialog.IsMac() THEN\r\t\t\tDefaultAppearance\r\t\tELSE\r\t\t\tDefaultAppearance\r\t\tEND;\r\t\tNEW(cleaner);\r\t\tdialog.close.SetResources(\"#Std:links\")\r\tEND Init;\r\rBEGIN\r\tInit\rEND StdLinks.\r"
