                    attr: 0
                  - text: par-
                    attr: 3
                  - text: ": Link;\r\t\ticonFont: Fonts.Typeface;\r\t\tlinkLeft, linkRight, targetLeft, targetRight: ARRAY 8 OF SHORTCHAR;\r\t\tcoloredBackg: BOOLEAN;\r\t\t\r\t\tcleaner: TrapCleaner;\r\r"
                    attr: 0
                  - text: "\t\tdialog"
                    attr: 3
                  - text: "*: RECORD\r\t\t\tcmd*: ARRAY 512 OF CHAR;\r\t\t\ttype-: ARRAY 32 OF CHAR;\r\t\t\tclose*: Dialog.List;\r\t\t\tknown, valid: SET;\r\t\tEND;\r\t\tfingerprint: INTEGER;\r\r\t"
                    attr: 0
                  - text: "(** Cleaner **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (c: TrapCleaner) Cleanup;\r\tBEGIN\r\t\tpar := NIL\r\tEND Cleanup;\r\r"
                    attr: 0
                  - text: "\t(** Properties **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (p: Prop) "
                    attr: 0
                  - text: IntersectWith
                    attr: 3
                  - text: "* (q: Properties.Property; OUT equal: BOOLEAN);\r\t\tVAR valid: SET;\r\tBEGIN\r\t\tWITH q: Prop DO\r\t\t\tvalid := p.valid * q.valid; equal := TRUE;\r\t\t\tIF (cmd IN valid) & (p.cmd^ # q.cmd^) THEN EXCL(valid, cmd) END;\r\t\t\tIF (kind IN valid) & (p.link # q.link) THEN EXCL(valid, kind) END;\r\t\t\tIF (close IN valid) & (p.close # q.close) THEN EXCL (valid, close) END;\r\t\t\tIF p.valid # valid THEN p.valid := valid; equal := FALSE END\r\t\tEND\r\tEND IntersectWith;\r\t\t\r\tPROCEDURE (op: ChangeAttrOp) Do;\r\t\tVAR v: Views.View; s: POINTER TO ARRAY OF CHAR; c: INTEGER;\r\tBEGIN\r\t\tv := op.v; \r\t\tWITH \r\t\t| v: Link DO \r\t\t\tIF cmd IN op.valid THEN s := op.cmd; op.cmd := v.cmd; v.cmd := s END;\r\t\t\tIF close IN op.valid THEN c := op.close; op.close := v.close; v.close := c END\r\t\t| v: Target DO \r\t\t\tIF cmd IN op.valid THEN s := op.cmd; op.cmd := v.ident; v.ident := s END\r\t\tEND\r\tEND Do;\r\r\tPROCEDURE DoChangeAttrOp (v: Views.View; s: POINTER TO ARRAY OF CHAR; c: INTEGER; valid: SET);\r\t\tVAR op: ChangeAttrOp;\r\tBEGIN\r\t\tNEW(op); op.v := v; op.valid := valid;\r\t\tIF close IN valid THEN \r\t\top.close := c END;\r\t\tIF cmd IN valid THEN NEW(op.cmd, LEN(s)+1); op.cmd^ := s$ END;\r\t\tViews.Do(v,   \"#Std:LinkChange\", op)\r\tEND DoChangeAttrOp;\r\t\r\tPROCEDURE SetProp(v: Views.View; msg: Properties.SetMsg);\r\t\tVAR p: Properties.Property;\r \tBEGIN\r\t\tp := msg.prop;\r\t\tWHILE p # NIL DO\r\t\t\tWITH p: Prop DO\r\t\t\t\tIF (cmd IN p.valid) OR (close IN p.valid) THEN DoChangeAttrOp(v, p.cmd, p.close, p.valid) END\r\t\t\tELSE\r\t\t\tEND;\r\t\t\tp := p.next\r\t\tEND\r\tEND SetProp;\r\t\r\tPROCEDURE PollProp(v: Views.View; VAR msg: Properties.PollMsg);\r\t\tVAR p: Prop;\r\tBEGIN\r\t\tNEW(p);\t\r\t\tWITH v: Link DO\r\t\t\tp.known := {kind, cmd, close}; \r\t\t\tp.link := TRUE;\r\t\t\tp.cmd := v.cmd;\r\t\t\tp.close := v.close\r\t\t| v: Target DO\r\t\t\tp.known := {kind, cmd}; \r\t\t\tp.link := FALSE;\r\t\t\tp.cmd := v.ident\r\t\tELSE\r\t\tEND;\r\t\tp.valid := p.known;\r\t\tProperties.Insert(msg.prop, p)\r\tEND PollProp;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: InitDialog
                    attr: 3
                  - text: "*;\r\t\tVAR  p: Properties.Property;\r\tBEGIN\r\t\tdialog.cmd := \"\"; dialog.type := \"\"; dialog.close.index := -1;\r\t\tdialog.known := {}; dialog.valid := {};\r\t\tProperties.CollectProp(p);\r\t\tWHILE p # NIL DO\r\t\t\tWITH p: Prop DO\r\t\t\t\tdialog.valid := p.valid; dialog.known := p.known;\r\t\t\t\tIF cmd IN p.valid THEN\r\t\t\t\t\tdialog.cmd := p.cmd$\r\t\t\t\tEND;\r\t\t\t\tIF kind IN p.valid THEN \r\t\t\t\t\tIF p.link THEN Dialog.MapString(\"#Std:Link\", dialog.type)\r\t\t\t\t\tELSE Dialog.MapString(\"#Std:Target\", dialog.type)\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tIF close IN p.valid THEN\r\t\t\t\t\tdialog.close.index := p.close\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\tEND;\r\t\t\tp := p.next\r\t\tEND;\r\t\tDialog.Update(dialog)\r\tEND InitDialog;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Set
                    attr: 3
                  - text: "*;\r\t\tVAR p: Prop;\r\tBEGIN\r\t\tNEW(p);\r\t\tp.valid := dialog.valid;\r\t\tIF cmd IN p.valid THEN\r\t\t\tNEW(p.cmd, LEN(dialog.cmd) + 1);\r\t\t\tp.cmd^ := dialog.cmd$\r\t\tEND;\r\t\tp.close := dialog.close.index;\r\t\tProperties.EmitProp(NIL, p);\r\t\tfingerprint := 0\t"
                    attr: 0
                  - text: "(* force actualization of fields *)"
                    attr: 1
                  - text: "\r\tEND Set;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: CmdGuard
                    attr: 3
                  - text: "* (VAR par: Dialog.Par);\r\t\tVAR c: Containers.Controller; v: Views.View; fp: INTEGER;\r\tBEGIN\r\t\tIF ~(cmd IN dialog.known) THEN par.disabled := TRUE\r\t\tELSIF ~(cmd IN dialog.valid) THEN par.undef := TRUE\r\t\tEND;\r\t\tControllers.SetCurrentPath(Controllers.targetPath);\r\t\tfp := 0;\r\t\tc := Containers.Focus();\r\t\tIF c # NIL THEN\r\t\t\tc.GetFirstView(Containers.selection, v);\r\t\t\tWHILE v # NIL DO fp := fp + Services.AdrOf(v); c.GetNextView(TRUE, v) END\r\t\tEND;\r\t\tIF fp # fingerprint THEN fingerprint := fp; InitDialog END;\r\t\tControllers.ResetCurrentPath()\r\tEND CmdGuard;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: CloseGuard
                    attr: 3
                  - text: "* (VAR par: Dialog.Par);\r\tBEGIN\r\t\tIF ~(close IN dialog.known) THEN par.disabled := TRUE\r\t\tELSIF ~(close IN dialog.valid) THEN par.undef := TRUE\r\t\tEND;\r\tEND CloseGuard;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Notifier
                    attr: 3
                  - text: "* (idx, op, from, to: INTEGER);\r\tBEGIN\r\t\tIF op = Dialog.changed THEN INCL(dialog.valid, idx) END\r\tEND Notifier;\r\r\tPROCEDURE (d: Directory) "
                    attr: 0
                  - text: NewLink
                    attr: 3
                  - text: "* (IN cmd: ARRAY OF CHAR): Link, NEW, ABSTRACT;\r\tPROCEDURE (d: Directory) "
                    attr: 0
                  - text: NewTarget
                    attr: 3
                  - text: "* (IN ident: ARRAY OF CHAR): Target, NEW, ABSTRACT;\r\r\r\tPROCEDURE InFrame (f: Views.Frame; x, y: INTEGER): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " (f.l <= x) & (x < f.r) & (f.t <= y) & (y < f.b)\r\tEND InFrame;\r\r\tPROCEDURE Mark (f: Views.Frame; show: BOOLEAN);\r\tBEGIN\r\t\tf.MarkRect(f.l, f.t, f.r, f.b, Ports.fill, Ports.hilite, show)\r\tEND Mark;\r\r\tPROCEDURE ThisPos (v: TextViews.View; f: Views.Frame; x, y: INTEGER): INTEGER;\r\t\t(*"
                    attr: 0
                  - text: " \"corrected\" v.ThisPos: does not adjust position when crossing 50% boundary of characters"
                    attr: 1
                  - text: " *)\r\t\tVAR loc: TextViews.Location; pos: INTEGER;\r\tBEGIN\r\t\tpos := v.ThisPos(f, x, y); v.GetThisLocation(f, pos, loc);\r\t\tIF (loc.y <= y) & (y < loc.y + loc.asc + loc.dsc) & (x < loc.x) THEN DEC(pos) END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " pos\r\tEND ThisPos;\r\r\tPROCEDURE GetLinkPair (this: Link; VAR l, r: Link);\r\t\t(* "
                    attr: 0
                  - text: "POST: BalancedPair(l, r) & (l # r) & (l = this OR r = this) OR  (l = r = NIL)"
                    attr: 1
                  - text: " *)\r\t\tVAR t: TextModels.Model; rd: TextModels.Reader; v: Views.View; level: INTEGER;\r\tBEGIN\r\t\tl := NIL; r := NIL; level := 1;\r\t\tIF (this.context # NIL) & (this.context IS TextModels.Context) THEN\r\t\t\tt := this.context(TextModels.Context).ThisModel();\r\t\t\trd := t.NewReader(NIL);\r\t\t\tIF this.leftSide THEN\r\t\t\t\trd.SetPos(this.context(TextModels.Context).Pos() + 1);\r\t\t\t\tREPEAT\r\t\t\t\t\trd.ReadView(v);\r\t\t\t\t\tIF (v # NIL) & (v IS Link) THEN\r\t\t\t\t\t\tIF v(Link).leftSide THEN INC(level) ELSE DEC(level) END\r\t\t\t\t\tEND\r\t\t\t\tUNTIL (v = NIL) OR (level = 0);\r\t\t\t\tIF v # NIL THEN l := this; r := v(Link) END\r\t\t\tELSE\r\t\t\t\trd.SetPos(this.context(TextModels.Context).Pos());\r\t\t\t\tREPEAT\r\t\t\t\t\trd.ReadPrevView(v);\r\t\t\t\t\tIF (v # NIL) & (v IS Link) THEN\r\t\t\t\t\t\tIF v(Link).leftSide THEN DEC(level) ELSE INC(level) END\r\t\t\t\t\tEND\r\t\t\t\tUNTIL (v = NIL) OR (level = 0);\r\t\t\t\tIF v # NIL THEN l := v(Link); r := this END\r\t\t\tEND\r\t\tEND\r\tEND GetLinkPair;\r\r\tPROCEDURE GetTargetPair (this: Target; VAR l, r: Target);\r\t\t(* "
                    attr: 0
                  - text: "POST: BalancedPair(l, r) & (l # r) & (l = this OR r = this) OR  (l = r = NIL)"
                    attr: 1
                  - text: " *)\r\t\tVAR t: TextModels.Model; rd: TextModels.Reader; v: Views.View; level: INTEGER;\r\tBEGIN\r\t\tl := NIL; r := NIL; level := 1;\r\t\tIF (this.context # NIL) & (this.context IS TextModels.Context) THEN\r\t\t\tt := this.context(TextModels.Context).ThisModel();\r\t\t\trd := t.NewReader(NIL);\r\t\t\tIF this.leftSide THEN\r\t\t\t\trd.SetPos(this.context(TextModels.Context).Pos() + 1);\r\t\t\t\tREPEAT\r\t\t\t\t\trd.ReadView(v);\r\t\t\t\t\tIF (v # NIL) & (v IS Target) THEN\r\t\t\t\t\t\tIF v(Target).leftSide THEN INC(level) ELSE DEC(level) END\r\t\t\t\t\tEND\r\t\t\t\tUNTIL (v = NIL) OR (level = 0);\r\t\t\t\tIF v # NIL THEN l := this; r := v(Target) END\r\t\t\tELSE\r\t\t\t\trd.SetPos(this.context(TextModels.Context).Pos());\r\t\t\t\tREPEAT\r\t\t\t\t\trd.ReadPrevView(v);\r\t\t\t\t\tIF (v # NIL) & (v IS Target) THEN\r\t\t\t\t\t\tIF v(Target).leftSide THEN DEC(level) ELSE INC(level) END\r\t\t\t\t\tEND\r\t\t\t\tUNTIL (v = NIL) OR (level = 0);\r\t\t\t\tIF v # NIL THEN l := v(Target); r := this END\r\t\t\tEND\r\t\tEND\r\tEND GetTargetPair;\r\r\tPROCEDURE GetRange (l, r: Link; VAR beg, end: INTEGER);\r\tBEGIN\r\t\tbeg := l.context(TextModels.Context).Pos();\r\t\tend := r.context(TextModels.Context).Pos() + 1\r\tEND GetRange;\r\r\tPROCEDURE MarkRange (v: TextViews.View; f: Views.Frame; beg, end: INTEGER; show: BOOLEAN);\r\t\tVAR b, e: TextViews.Location; r, t: INTEGER;\r\tBEGIN\r\t\tASSERT(beg < end, 20);\r\t\tv.GetThisLocation(f, beg, b); v.GetThisLocation(f, end, e);\r\t\tIF (b.pos < e.pos) OR (b.pos = e.pos) & (b.x < e.x) THEN\r\t\t\tIF b.start # e.start THEN\r\t\t\t\tr := f.r; t := b.y + b.asc + b.dsc;\r\t\t\t\tf.MarkRect(b.x, b.y, r, t, Ports.fill, Ports.hilite, show);\r\t\t\t\tIF t < e.y THEN f.MarkRect(0, t, r, e.y, Ports.fill, Ports.hilite, show) END;\r\t\t\t\tb.x := f.l; b.y := e.y\r\t\t\tEND;\r\t\t    f.MarkRect(b.x, b.y, e.x, e.y + e.asc + e.dsc, Ports.fill, Ports.hilite, show)\r\t\tEND\r\tEND MarkRange;\r\r\tPROCEDURE Reveal (left, right: Views.View; str: ARRAY OF CHAR; opname: Stores.OpName);\r\t\tVAR con: TextModels.Context; t: TextModels.Model; pos: INTEGER;\r\t\t\tw: TextMappers.Formatter; op: Stores.Operation;\r\tBEGIN\r\t\tcon := left.context(TextModels.Context);\r\t\tt := con.ThisModel(); pos := con.Pos();\r\t\tw.ConnectTo(t); w.SetPos(pos);\r\t\tIF con.Attr() # NIL THEN w.rider.SetAttr(con.Attr()) END;\r\t\tModels.BeginScript(t, opname, op);\r\t\tt.Delete(pos, pos + 1);\r\t\tw.WriteChar(\"<\");\r\t\tIF str # \"\" THEN w.WriteString(str) END;\r\t\tw.WriteChar(\">\");\r\t\tcon := right.context(TextModels.Context);\r\t\tpos := con.Pos();\r\t\tw.SetPos(pos);\r\t\tIF con.Attr() # NIL THEN w.rider.SetAttr(con.Attr()) END;\r\t\tt.Delete(pos, pos + 1);\r\t\tw.WriteString(\"<>\");\r\t\tModels.EndScript(t, op)\r\tEND Reveal;\r\t\r\tPROCEDURE RevealCmd (v: Link);\r\t\tVAR left, right: Link;\r\tBEGIN GetLinkPair(v, left, right);\r\t\tIF left # NIL THEN\r\t\t\tIF v.cmd # NIL THEN Reveal(left, right, v.cmd^, \"#StdLinks:Reveal Link Command\") \r\t\t\tELSE Reveal(left, right, \"\", \"#StdLinks:Reveal Link Command\") \r\t\t\tEND\r\t\tEND\r\tEND RevealCmd;\r\r\tPROCEDURE RevealTarget (targ: Target);\r\t\tVAR  left, right: Target;\r\tBEGIN GetTargetPair(targ, left, right);\r\t\tIF left # NIL THEN\r\t\t\tIF left.ident # NIL THEN Reveal(left, right, left.ident^, \"#StdLinks:Reveal Target Ident\")\r\t\t\tELSE Reveal(left, right, \"\", \"#StdLinks:Reveal Target Ident\")\r\t\t\tEND\r\t\tEND\r\tEND RevealTarget;\r\t\r\tPROCEDURE CallCmd (v: Link; close: BOOLEAN);\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tKernel.PushTrapCleaner(cleaner); \r\t\tpar := v;\r\t\tIF v.cmd^ # \"\" THEN \r\t\t\tIF close & (v.close = ifShiftDown) OR (v.close = always) THEN\r\t\t\t\tStdCmds.CloseDialog\r\t\t\tEND;\r\t\t\tDialog.Call(v.cmd^, \"#StdLinks:Link Call Failed\", res) \r\t\tEND;\r\t\tpar := NIL;\r\t\tKernel.PopTrapCleaner(cleaner)\r\tEND CallCmd;\r\r\tPROCEDURE TrackSingle (f: Views.Frame; VAR in: BOOLEAN);\r\t\tVAR x, y: INTEGER; modifiers: SET; in0, isDown: BOOLEAN;\r\tBEGIN\r\t\tin := FALSE;\r\t\tREPEAT\r\t\t\tf.Input(x, y, modifiers, isDown);\r\t\t\tin0 := in; in := InFrame(f, x, y);\r\t\t\tIF in # in0 THEN Mark(f, in) END\r\t\tUNTIL ~isDown;\r\t\tIF in THEN Mark(f, FALSE) END\r\tEND TrackSingle;\r\r\tPROCEDURE TrackRange (v: TextViews.View; f: Views.Frame; l, r: Link; x, y: INTEGER;\r\t\t\t\t\t\t\t\t\t\t\t\tVAR in: BOOLEAN);\r\t\tVAR pos, beg, end: INTEGER; modifiers: SET; in0, isDown: BOOLEAN;\r\tBEGIN\r\t\tin := FALSE;\r\t\tGetRange(l, r, beg, end); pos := ThisPos(v, f, x, y);\r\t\tIF (beg <= pos) & (pos < end) THEN\r\t\t\tREPEAT\r\t\t\t\tf.Input(x, y, modifiers, isDown); pos := ThisPos(v, f, x, y);\r\t\t\t\tin0 := in; in := (beg <= pos) & (pos < end);\r\t\t\t\tIF in # in0 THEN MarkRange(v, f, beg, end, in) END\r\t\t\tUNTIL ~isDown;\r\t\t\tIF in THEN\r\t\t\t\tMarkRange(v, f, beg, end, FALSE)\r\t\t\tEND\r\t\tEND\r\tEND TrackRange;\r\r\tPROCEDURE Track (v: Link; f: Views.Frame; c: TextControllers.Controller;\r\t\t\t\t\t\t\t\t\tx, y: INTEGER; modifiers: SET);\r\t"
