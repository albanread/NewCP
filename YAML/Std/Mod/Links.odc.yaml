                  - text: "\r\tIMPORT "
                    attr: 0
                  - text: Kernel
                    attr: 3
                  - text: ", Services,\r\t\tStores, Ports, Fonts,  Models, Views, Controllers, Properties, Dialog, Containers,\r\t\tTextModels, TextMappers, TextViews, TextControllers, TextSetters, TextRulers,\r\t\tStrings, StdCmds;\r\r\tCONST\r\t\t"
