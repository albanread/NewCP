                    attr: 3
                  - text: "* = POINTER TO RECORD (Properties.Property)\r\t\t\tcmd*: POINTER TO ARRAY OF CHAR;\r\t\t\tlink-: BOOLEAN;\r\t\t\tclose*: INTEGER\r\t\tEND;\r\t\t\r\t\tChangeAttrOp = POINTER TO RECORD (Stores.Operation)\r\t\t\tv: Views.View;\r\t\t\tcmd: POINTER TO ARRAY OF CHAR;\r\t\t\tclose: INTEGER;\r\t\t\tvalid: SET\r\t\tEND;\r\t\t\r\t\tStdDirectory = POINTER TO RECORD (Directory) END;\r\r\t\tTrapCleaner = POINTER TO RECORD (Kernel.TrapCleaner) END;\r\r\tVAR\r\t\t"
                    attr: 0
