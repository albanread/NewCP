                  - text: "*;\r\t\tVAR opts: SET; l, t, r, b, r0, b0: INTEGER; c: Containers.Controller; script: Stores.Operation;\r\tBEGIN\r\t\tc := layout.doc.ThisController();\r\t\topts := c.opts - {Documents.pageWidth..Documents.winHeight};\r\t\tIF layout.wType = page THEN INCL(opts, Documents.pageWidth)\r\t\tELSIF layout.wType = window THEN INCL(opts, Documents.winWidth)\r\t\tEND;\r\t\tIF layout.hType = page THEN INCL(opts, Documents.pageHeight)\r\t\tELSIF layout.hType = window THEN INCL(opts, Documents.winHeight)\r\t\tEND;\r\t\tlayout.doc.PollRect(l, t, r, b); r0 := r; b0 := b;\r\t\tIF layout.wType = fix THEN r := l + SHORT(ENTIER(layout.width * layout.u)) END;\r\t\tIF layout.hType = fix THEN b := t + SHORT(ENTIER(layout.height * layout.u)) END;\r\t\tIF (opts # c.opts) OR (r # r0) OR (b # b0) THEN\r\t\t\tViews.BeginScript(layout.doc, \"#System:ChangeLayout\", script);\r\t\t\tc.SetOpts(opts);\r\t\t\tlayout.doc.SetRect(l, t, r, b);\r\t\t\tViews.EndScript(layout.doc, script)\r\t\tEND\r\tEND SetLayout;\r\t\r\tPROCEDURE "
