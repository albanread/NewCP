                    attr: 0
                  - text: "(* auxiliary procedures *)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE StdProp (): Properties.StdProp;\r\tBEGIN\r\t\tIF propEra # Properties.era THEN\r\t\t\tProperties.CollectStdProp(props);\r\t\t\tpropEra := Properties.era\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " props\r\tEND StdProp;\r\r\tPROCEDURE Append (VAR s: ARRAY OF CHAR; t: ARRAY OF CHAR);\r\t\tVAR len, i, j: INTEGER; ch: CHAR;\r\tBEGIN\r\t\tlen := LEN(s);\r\t\ti := 0; WHILE s[i] # 0X DO INC(i) END;\r\t\tj := 0; REPEAT ch := t[j]; s[i] := ch; INC(j); INC(i) UNTIL (ch = 0X) OR (i = len);\r\t\ts[len - 1] := 0X\r\tEND Append;\t\r\r\t"
