                    attr: 0
                  - text: Clear
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** remove the selection of the current focus **)"
                    attr: 1
                  - text: "\r\t\tVAR msg: Controllers.EditMsg;\r\tBEGIN\r\t\tmsg.op := Controllers.cut; msg.view := NIL;\r\t\tmsg.clipboard := FALSE;\r\t\tControllers.Forward(msg)\r\tEND Clear;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SelectAll
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** select whole content of current focus **)"
                    attr: 1
                  - text: "\r\t\tVAR msg: Controllers.SelectMsg;\r\tBEGIN\r\t\tmsg.set := TRUE; Controllers.Forward(msg)\r\tEND SelectAll;\r\r\tPROCEDURE "
                    attr: 0
                  - text: DeselectAll
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** select whole content of current focus **)"
                    attr: 1
                  - text: "\r\t\tVAR msg: Controllers.SelectMsg;\r\tBEGIN\r\t\tmsg.set := FALSE; Controllers.Forward(msg)\r\tEND DeselectAll;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SelectDocument
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** select whole document **)"
                    attr: 1
                  - text: "\r\t\tVAR w: Windows.Window; c: Containers.Controller;\r\tBEGIN\r\t\tw := Windows.dir.Focus(Controllers.path);\r\t\tIF w # NIL THEN\r\t\t\tc := w.doc.ThisController();\r\t\t\tIF (c # NIL) & ~(Containers.noSelection IN c.opts) & (c.Singleton() = NIL) THEN\r\t\t\t\tc.SetSingleton(w.doc.ThisView())\r\t\t\tEND\r\t\tEND\r\tEND SelectDocument;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SelectNextView
                    attr: 3
                  - text: "*;\r\t\tVAR c: Containers.Controller; v: Views.View;\r\tBEGIN\r\t\tc := Containers.Focus();\r\t\tIF (c # NIL) & ~(Containers.noSelection IN c.opts) THEN\r\t\t\tIF c.HasSelection() THEN v := c.Singleton() ELSE v := NIL END;\r\t\t\tIF v = NIL THEN\r\t\t\t\tc.GetFirstView(Containers.any, v)\r\t\t\tELSE\r\t\t\t\tc.GetNextView(Containers.any, v);\r\t\t\t\tIF v = NIL THEN c.GetFirstView(Containers.any, v) END\r\t\t\tEND;\r\t\t\tc.SelectAll(FALSE);\r\t\t\tIF v # NIL THEN c.SetSingleton(v) END\r\t\tELSE Dialog.ShowMsg(\"#Dev:NoTargetFocusFound\")\r\t\tEND\r\tEND SelectNextView;\r\r\t"
                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\t"
                    attr: 0
                  - text: "(** font menu commands **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: Font
                    attr: 3
                  - text: "* (typeface: Fonts.Typeface);\r\t"
                    attr: 0
                  - text: "(** set the selection to the given font family **)"
                    attr: 1
                  - text: "\r\t\tVAR p: Properties.StdProp;\r\tBEGIN\r\t\tNEW(p); p.valid := {Properties.typeface}; p.typeface := typeface;\r\t\tProperties.EmitProp(NIL, p)\r\tEND Font;\r\r\tPROCEDURE "
                    attr: 0
                  - text: DefaultFont
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** set the selection to the default font family **)"
                    attr: 1
                  - text: "\r\t\tVAR p: Properties.StdProp;\r\tBEGIN\r\t\tNEW(p); p.valid := {Properties.typeface}; p.typeface := Fonts.default;\r\t\tProperties.EmitProp(NIL, p)\r\tEND DefaultFont;\r\r\r\t"
                    attr: 0
                  - text: "(** attributes menu commands **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: Plain
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** reset the font attribute \"weight\" and all font style attributes of the selection **)"
                    attr: 1
                  - text: "\r\t\tVAR p: Properties.StdProp;\r\tBEGIN\r\t\tNEW(p); p.valid := {Properties.style, Properties.weight};\r\t\tp.style.val := {}; p.style.mask := {Fonts.italic, Fonts.underline, Fonts.strikeout};\r\t\tp.weight := Fonts.normal;\r\t\tProperties.EmitProp(NIL, p)\r\tEND Plain;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Bold
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** change the font attribute \"weight\" in the selection;\r\tif the selection has a homogeneously bold weight: toggle to normal, else force to bold **)"
                    attr: 1
                  - text: "\r\t\tVAR p, p0: Properties.StdProp;\r\tBEGIN\r\t\tProperties.CollectStdProp(p0);\r\t\tNEW(p); p.valid := {Properties.weight};\r\t\tIF (Properties.weight IN p0.valid) & (p0.weight # Fonts.normal) THEN\r\t\t\tp.weight := Fonts.normal\r\t\tELSE p.weight := Fonts.bold\r\t\tEND;\r\t\tProperties.EmitProp(NIL, p)\r\tEND Bold;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Italic
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** change the font style attribute \"italic\" in the selection;\r\tif the selection is homogeneous wrt this attribute: toggle, else force to italic **)"
                    attr: 1
                  - text: "\r\t\tVAR p, p0: Properties.StdProp;\r\tBEGIN\r\t\tProperties.CollectStdProp(p0);\r\t\tNEW(p); p.valid := {Properties.style}; p.style.mask := {Fonts.italic};\r\t\tIF (Properties.style IN p0.valid) & (Fonts.italic IN p0.style.val) THEN\r\t\t\tp.style.val := {}\r\t\tELSE p.style.val := {Fonts.italic}\r\t\tEND;\r\t\tProperties.EmitProp(NIL, p)\r\tEND Italic;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Underline
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** change the font style attribute \"underline\" in the selection;\r\tif the selection is homogeneous wrt this attribute: toggle, else force to underline **)"
                    attr: 1
                  - text: "\r\t\tVAR p, p0: Properties.StdProp;\r\tBEGIN\r\t\tProperties.CollectStdProp(p0);\r\t\tNEW(p); p.valid := {Properties.style}; p.style.mask := {Fonts.underline};\r\t\tIF (Properties.style IN p0.valid) & (Fonts.underline IN p0.style.val) THEN\r\t\t\tp.style.val := {}\r\t\tELSE p.style.val := {Fonts.underline}\r\t\tEND;\r\t\tProperties.EmitProp(NIL, p)\r\tEND Underline;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Strikeout
                    attr: 3
                  - text: "*;\r\t"
                    attr: 0
                  - text: "(** change the font style attribute \"strikeout\" in the selection,\r\twithout changing other attributes;\r\tif the selection is homogeneous wrt this attribute: toggle,\r\telse force to strikeout **)"
                    attr: 1
                  - text: "\r\t\tVAR p, p0: Properties.StdProp;\r\tBEGIN\r\t\tProperties.CollectStdProp(p0);\r\t\tNEW(p); p.valid := {Properties.style}; p.style.mask := {Fonts.strikeout};\r\t\tIF (Properties.style IN p0.valid) & (Fonts.strikeout IN p0.style.val) THEN\r\t\t\tp.style.val := {}\r\t\tELSE p.style.val := {Fonts.strikeout}\r\t\tEND;\r\t\tProperties.EmitProp(NIL, p)\r\tEND Strikeout;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Size
                    attr: 3
                  - text: "* (size: INTEGER);\r\t"
                    attr: 0
                  - text: "(** set the selection to the given font size **)"
                    attr: 1
                  - text: "\r\t\tVAR p: Properties.StdProp;\r\tBEGIN\r\t\tNEW(p); p.valid := {Properties.size};\r\t\tp.size := size * Ports.point;\r\t\tProperties.EmitProp(NIL, p)\r\tEND Size;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SetSize
                    attr: 3
                  - text: "*;\r\t\tVAR p: Properties.StdProp;\r\tBEGIN\r\t\tIF (0 <= size.size) & (size.size < 32768) THEN\r\t\t\tNEW(p); p.valid := {Properties.size};\r\t\t\tp.size := size.size * Fonts.point;\r\t\t\tProperties.EmitProp(NIL, p)\r\t\tELSE\r\t\t\tDialog.ShowMsg(illegalSizeKey)\r\t\tEND\r\tEND SetSize;\r\r\tPROCEDURE "
                    attr: 0
                  - text: InitSizeDialog
                    attr: 3
                  - text: "*;\r\t\tVAR p: Properties.StdProp;\r\tBEGIN\r\t\tProperties.CollectStdProp(p);\r\t\tIF Properties.size IN p.valid THEN size.size := p.size DIV Fonts.point END\r\tEND InitSizeDialog;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Color
                    attr: 3
                  - text: "* (color: Ports.Color);\r\t"
                    attr: 0
                  - text: "(** set the color attributes of the selection **)"
                    attr: 1
                  - text: "\r\t\tVAR p: Properties.StdProp;\r\tBEGIN\r\t\tNEW(p); p.valid := {Properties.color};\r\t\tp.color.val := color;\r\t\tProperties.EmitProp(NIL, p)\r\tEND Color;\r\r\tPROCEDURE "
                    attr: 0
                  - text: UpdateAll
                    attr: 3
                  - text: "*;\t"
                    attr: 0
                  - text: "(* for HostCmds.Toggle *)"
                    attr: 1
                  - text: "\r\t\tVAR w: Windows.Window; pw, ph: INTEGER; dirty: BOOLEAN; msg: Models.UpdateMsg;\r\tBEGIN\r\t\tw := Windows.dir.First();\r\t\tWHILE w # NIL DO\r\t\t\tIF ~w.sub THEN\r\t\t\t\tdirty := w.seq.Dirty();\r\t\t\t\tModels.Domaincast(w.doc.Domain(), msg);\r\t\t\t\tIF ~dirty THEN w.seq.SetDirty(FALSE) END\t"
                    attr: 0
                  - text: "(* not perfect: \"undoable dirt\" ... *)"
                    attr: 1
                  - text: "\r\t\t\tEND;\r\t\t\tw.port.GetSize(pw, ph);\r\t\t\tw.Restore(0, 0, pw, ph);\r\t\t\tw := Windows.dir.Next(w)\r\t\tEND\r\tEND UpdateAll;\r\r\tPROCEDURE "
                    attr: 0
                  - text: RestoreAll
                    attr: 3
                  - text: "*;\r\t\tVAR w: Windows.Window; pw, ph: INTEGER;\r\tBEGIN\r\t\tw := Windows.dir.First();\r\t\tWHILE w # NIL DO\r\t\t\tw.port.GetSize(pw, ph);\r\t\t\tw.Restore(0, 0, pw, ph);\r\t\t\tw := Windows.dir.Next(w)\r\t\tEND\r\tEND RestoreAll;\r\t\r\t\r"
                    attr: 0
                  - text: "\t(** document layout dialog **)\r"
