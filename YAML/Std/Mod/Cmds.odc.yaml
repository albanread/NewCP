                  - text: "\t\r\t(* container commands *)\r\t\r"
                    attr: 1
                  - text: "\tPROCEDURE ActFocus (): Containers.Controller;\r\t\tVAR c: Containers.Controller; v: Views.View;\r\tBEGIN\r\t\tc := Containers.Focus();\r\t\tIF c # NIL THEN\r\t\t\tv := c.ThisView();\r\t\t\tIF v IS Documents.Document THEN\r\t\t\t\tv := v(Documents.Document).ThisView();\r\t\t\t\tIF v IS Containers.View THEN\r\t\t\t\t\tc := v(Containers.View).ThisController()\r\t\t\t\tELSE c := NIL\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND;\r\t\t"
