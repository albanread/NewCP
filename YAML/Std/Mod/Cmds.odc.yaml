                    attr: 1
                  - text: "\r\t\r\tPROCEDURE GetCmd (name: ARRAY OF CHAR; OUT cmd: ARRAY OF CHAR);"
                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\t\tVAR i, j: INTEGER; ch, lch: CHAR; key: ARRAY 256 OF CHAR;\r\tBEGIN\r\t\ti := 0; ch := name[0]; key[0] := \"#\"; j := 1;\r\t\tREPEAT\r\t\t\tkey[j] := ch; INC(j); lch := ch; INC(i); ch := name[i]\r\t\tUNTIL (ch = 0X) OR (ch = \".\") OR Strings.IsUpper(ch) & ~Strings.IsUpper(lch);\r\t\tIF ch = \".\" THEN\r\t\t\tkey := \"#System:\" + name\r\t\tELSE\r\t\t\tkey[j] := \":\"; INC(j); key[j] := 0X; j := 0;\r\t\t\tWHILE ch # 0X DO name[j] := ch; INC(i); INC(j); ch := name[i] END;\r\t\t\tname[j] := 0X; key := key + name\r\t\tEND;\r\t\tDialog.MapString(key, cmd);\r\t\tIF cmd = name THEN cmd := \"\" END\r\tEND GetCmd;\r\t\r\tPROCEDURE SearchCmd (call: BOOLEAN; OUT found: BOOLEAN);\r\t\tVAR p: Properties.Property; std: BOOLEAN; v: Views.View;  cmd: ARRAY 256 OF CHAR; pos, res: INTEGER;\r\tBEGIN\r\t\tControllers.SetCurrentPath(Controllers.targetPath);\r\t\tv := Containers.FocusSingleton(); found := FALSE;\r\t\tIF v # NIL THEN\r\t\t\tServices.GetTypeName(v, cmd);\r\t\t\tGetCmd(cmd, cmd);\r\t\t\tIF cmd # \"\" THEN found := TRUE;\r\t\t\t\tIF call THEN Dialog.Call(cmd, \"\", res) END\r\t\t\tEND\r\t\tEND;\r\t\tstd := FALSE;\r\t\tProperties.CollectProp(p);\r\t\tWHILE p # NIL DO\r\t\t\tIF p IS Properties.StdProp THEN std := TRUE\r\t\t\tELSE\r\t\t\t\tServices.GetTypeName(p, cmd);\r\t\t\t\tGetCmd(cmd, cmd);\r\t\t\t\tIF cmd # \"\" THEN found := TRUE;\r\t\t\t\t\tIF call THEN Dialog.Call(cmd, \"\", res) END\r\t\t\t\tELSE\r\t\t\t\t\tServices.GetTypeName(p, cmd);\r\t\t\t\t\tStrings.Find(cmd, \"Desc\", LEN(cmd$)-4, pos);\r\t\t\t\t\tIF LEN(cmd$)-4 = pos THEN\r\t\t\t\t\t\tcmd[pos] := 0X; GetCmd(cmd, cmd);\r\t\t\t\t\t\tIF cmd # \"\" THEN found := TRUE;\r\t\t\t\t\t\t\tIF call THEN Dialog.Call(cmd, \"\", res) END\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tp := p.next\r\t\tEND;\r\t\tIF std & ~found THEN\r\t\t\tDialog.MapString(\"#Host:Properties.StdProp\", cmd);\r\t\t\tIF cmd # \"Properties.StdProp\" THEN found := TRUE;\r\t\t\t\tIF call THEN Dialog.Call(cmd, \"\", res) END\r\t\t\tEND\r\t\tEND;\r\t\tIF ~found THEN\r\t\t\tDialog.MapString(\"#System:ShowProp\", cmd);\r\t\t\tIF cmd # \"ShowProp\" THEN found := TRUE;\r\t\t\t\tIF call THEN Dialog.Call(cmd, \"\", res) END\r\t\t\tEND\r\t\tEND;\r\t\tControllers.ResetCurrentPath\r\tEND SearchCmd;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ShowProp
                    attr: 3
                  - text: "*;\r\t\tVAR found: BOOLEAN;\r\tBEGIN\r\t\tSearchCmd(TRUE, found)\r\tEND ShowProp;\r\t\r\tPROCEDURE "
