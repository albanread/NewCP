                    attr: 1
                  - text: "\r\t\tVAR win: Windows.Window; doc: Documents.Document; v: Views.View; title: Views.Title;\r\t\t\tseq: ANYPTR; clean: BOOLEAN;\r\tBEGIN\r\t\twin := Windows.dir.Focus(Controllers.frontPath);\r\t\tIF win # NIL THEN\r\t\t\tv := win.doc.ThisView();\r\t\t\tIF v.Domain() # NIL THEN seq := v.Domain().GetSequencer() ELSE seq := NIL END;\r\t\t\tclean := (seq # NIL) & ~seq(Sequencers.Sequencer).Dirty();\r\t\t\tdoc := win.doc.DocCopyOf(v);\r\t\t\t(* Stores.InitDomain(doc, v.Domain()); *)\r\t\t\tASSERT(doc.Domain() = v.Domain(), 100);\r\t\t\twin.GetTitle(title);\r\t\t\tWindows.dir.OpenSubWindow(Windows.dir.New(), doc, win.flags, title);\r\t\t\tIF clean THEN seq(Sequencers.Sequencer).SetDirty(FALSE) END\r\t\tEND\r\tEND NewWindow;\r\t\r\t"
