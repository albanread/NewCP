                  - text: "\r\t\tVAR w: Windows.Window; c: Containers.Controller; l, t, r, b: INTEGER;\r\tBEGIN\r\t\tw := Windows.dir.First();\r\t\tIF w # NIL THEN\r\t\t\tlayout.doc := w.doc;\r\t\t\tc := w.doc.ThisController();\r\t\t\tIF Documents.pageWidth IN c.opts THEN layout.wType := page\r\t\t\tELSIF Documents.winWidth IN c.opts THEN layout.wType := window\r\t\t\tELSE layout.wType := fix\r\t\t\tEND;\r\t\t\tIF Documents.pageHeight IN c.opts THEN layout.hType := page\r\t\t\tELSIF Documents.winHeight IN c.opts THEN layout.hType := window\r\t\t\tELSE layout.hType := fix\r\t\t\tEND;\r\t\t\tIF Dialog.metricSystem THEN layout.u := Ports.mm * 10 ELSE layout.u := Ports.inch END;\r\t\t\tw.doc.PollRect(l, t, r, b);\r\t\t\tlayout.width := (r - l) DIV (layout.u DIV 100) / 100;\r\t\t\tlayout.height := (b - t) DIV (layout.u DIV 100) / 100\r\t\tEND\r\tEND InitLayoutDialog;\r\t\r\tPROCEDURE "
