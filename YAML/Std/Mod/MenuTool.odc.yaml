                  - text: ", Files, Fonts, Ports, Models, Views, Dialog, Properties, Containers, Documents,\r\t\tHostMenus, StdLinks, StdCmds,\r\t\tTextModels, TextMappers, TextViews, TextControllers;\r\r\tCONST\r\t\tchar = TextMappers.char; string = TextMappers.string; keyword = 100;\r\t\tmenuFile = \"Menus\"; rsrcDir = \"Rsrc\"; sysDir = \"System\";\r\t\t\r\tTYPE\t\t\r\t\tLangNotifier = POINTER TO RECORD (Dialog.LangNotifier) END;\r\r\tVAR\r\t\tnoerr, showerr, gen: BOOLEAN;\r\t\tincludes: Files.LocInfo;\r\t\tlangNotifier: LangNotifier;\r\t\t\r\tPROCEDURE Scan (VAR s: TextMappers.Scanner);\r\t\tVAR ch: CHAR; p: INTEGER;\r\tBEGIN\r\t\ts.Scan;\r\t\tIF s.type = string THEN\r\t\t\tp := s.rider.Pos() - 1;\r\t\t\tIF ~s.rider.eot THEN DEC(p) END;\r\t\t\ts.rider.SetPos(p); s.rider.ReadChar(ch); s.rider.Read;\r\t\t\tIF ch # '\"' THEN s.type := keyword END\r\t\tEND\r\tEND Scan;\r\t\r\tPROCEDURE Comp (IN s1, s2: ARRAY OF CHAR): INTEGER;\r\t\tVAR i: INTEGER; a, b: CHAR;\r\tBEGIN\r\t\ti := 0; a := s1[0]; b := s2[0];\r\t\tWHILE (a # 0X) & ((a = b) OR (a >= \"A\") & (a <= \"Z\") & (a = CAP(b)) OR (b >= \"A\") & (b <= \"Z\") & (b = CAP(a))) DO\r\t\t\tINC(i); a := s1[i]; b := s2[i]\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " ORD(a) - ORD(b)\r\tEND Comp;\r\t\r\tPROCEDURE Sort (VAR list: Files.LocInfo);\r\t\tVAR inc, last, i1, i2: Files.LocInfo;\r\tBEGIN\r\t\tinc := list; list := NIL;\r\t\tWHILE inc # NIL DO\r\t\t\ti1 := inc; inc := inc.next;\r\t\t\ti2 := list; last := NIL;\r\t\t\tWHILE (i2 # NIL) & (Comp(i1.name, i2.name) > 0) DO last := i2; i2 := i2.next END;\r\t\t\tIF last = NIL THEN i1.next := list; list := i1 ELSE i1.next := last.next; last.next := i1 END\r\t\tEND\r\tEND Sort;\r\r\r\tPROCEDURE ParseMenus (VAR s: TextMappers.Scanner; view: Views.View; loc: Files.Locator; name: Files.Name);\r\t\tVAR menu, category: Dialog.String; n: INTEGER;\r\r\t\tPROCEDURE Error (VAR s: TextMappers.Scanner; err: ARRAY OF CHAR);\r\t\t\tVAR end: INTEGER;\r\t\tBEGIN\r\t\t\tIF noerr & showerr THEN\r\t\t\t\tIF loc # NIL THEN Views.Open(view, loc, name, NIL) END;\r\t\t\t\tend := MAX(s.rider.Pos() - 1, s.start + 1);\r\t\t\t\tend := MIN(end, s.rider.Base().Length());\r\t\t\t\tTextControllers.SetSelection(s.rider.Base(), s.start, end);\r\t\t\t\tTextViews.ShowRange(s.rider.Base(), s.start, end, TextViews.focusOnly);\r\t\t\t\tDialog.ShowMsg(err)\r\t\t\tEND; \r\t\t\tnoerr := FALSE\r\t\tEND Error;\r\r\t\tPROCEDURE Category (VAR s: TextMappers.Scanner; VAR c: ARRAY OF CHAR);\r\t\tBEGIN\r\t\t\tIF (s.type = char) & (s.char = \"(\") THEN\r\t\t\t\tScan(s); IF s.type # string THEN Error(s, \"string expected\") END;\r\t\t\t\tc := s.string$;\r\t\t\t\tScan(s);\r\t\t\t\tIF (s.type # char) OR (s.char # \")\") THEN Error(s, \") expected\") END;\r\t\t\t\tScan(s)\r\t\t\tELSE c := \"\"\r\t\t\tEND\r\t\tEND Category;\r\r\t\tPROCEDURE Item (VAR s: TextMappers.Scanner);\r\t\t\tVAR item, str, shortcut, filter: Dialog.String;\r\t\tBEGIN\r\t\t\tIF s.type = keyword THEN\r\t\t\t\tIF gen THEN HostMenus.AddSeparator END;\r\t\t\t\tScan(s)\r\t\t\tELSE\r\t\t\t\tIF s.len < LEN(item) THEN item := s.string$\r\t\t\t\tELSE item := \"\"; Error(s, \"string too long\")\r\t\t\t\tEND;\r\t\t\t\tIF item = \"\" THEN Error(s, \"nonempty string expected\") END;\r\t\t\t\tScan(s);\r\t\t\t\tshortcut := \"\";\r\t\t\t\tIF s.type = string THEN\r\t\t\t\t\tIF s.len < "
                    attr: 0
