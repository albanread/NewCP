                    attr: 3
                  - text: "THEN shortcut := s.string$\r\t\t\t\t\tELSE Error(s, \"string too long\")\r\t\t\t\t\tEND\r\t\t\t\tELSE Error(s, \"string expected\")\r\t\t\t\tEND;\r\t\t\t\tScan(s); IF s.type # string THEN Error(s, \"string expected\") END;\r\t\t\t\tIF s.len < LEN(str) THEN str := s.string$\r\t\t\t\tELSE str := \"\"; Error(s, \"string too long\")\r\t\t\t\tEND;\r\t\t\t\tIF str = \"\" THEN Error(s, \"nonempty string expected\") END;\r\t\t\t\tScan(s); IF s.type # string THEN Error(s, \"string expected\") END;\r\t\t\t\tIF s.len < LEN(str) THEN filter := s.string$\r\t\t\t\tELSE filter := \"\"; Error(s, \"string too long\")\r\t\t\t\tEND;\r\t\t\t\tIF gen THEN HostMenus.AddItem(item, str, shortcut, filter) END;\r\t\t\t\tScan(s)\r\t\t\tEND\r\t\tEND Item;\r\t\t\r\t\tPROCEDURE IncludeSub (sub: ARRAY OF CHAR);\r\t\t\tVAR loc: Files.Locator; view: Views.View; t: TextModels.Model; s: TextMappers.Scanner;\r\t\tBEGIN\r\t\t\tloc := Files.dir.This(sub); IF loc = NIL THEN "
