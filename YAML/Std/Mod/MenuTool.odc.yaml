                  - text: "\r\t\t\t\t\tIF last = NIL THEN includes := inc.next ELSE last.next := inc.next END\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND Include;\r\t\t\r\tBEGIN\r\t\tn := 0;\r\t\tWHILE noerr & (s.type = keyword) & ((s.string = \"MENU\") OR (s.string = \"INCLUDE\")) DO\r\t\t\tIF s.string = \"INCLUDE\" THEN\r\t\t\t\tScan(s);\r\t\t\t\tIF s.type # string THEN Error(s, \"string expected\") END;\r\t\t\t\tInclude(s.string);\r\t\t\t\tScan(s);\r\t\t\t\tINC(n)\r\t\t\tELSE\r\t\t\t\tINC(n); Scan(s);\r\t\t\t\tIF s.type # string THEN Error(s, \"string expected\") END;\r\t\t\t\tmenu := s.string$;\r\t\t\t\tIF menu = \"\" THEN Error(s, \"nonempty string expected\") END;\r\t\t\t\tScan(s);\r\t\t\t\tCategory(s, category);\r\t\t\t\tIF gen THEN HostMenus.Open(menu, category) END;\r\t\t\t\tWHILE noerr & ((s.type = string) OR (s.type = keyword) & (s.string = \"SEPARATOR\")) DO\r\t\t\t\t\tItem(s)\r\t\t\t\tEND;\r\t\t\t\tIF (s.type # keyword) OR (s.string # \"END\") THEN Error(s, \"END expected\") END;\r\t\t\t\tIF gen THEN HostMenus.Close END;\r\t\t\t\tScan(s)\r\t\t\tEND\r\t\tEND;\r\t\tIF (s.type # TextMappers.eot) OR (n = 0) THEN Error(s, \"MENU expected\") END;\r\tEND ParseMenus;\r\t\r\t\r\tPROCEDURE InitNotifier;\r\tBEGIN\r\t\tIF langNotifier = NIL THEN\r\t\t\tNEW(langNotifier); Dialog.RegisterLangNotifier(langNotifier)\r\t\tEND\r\tEND InitNotifier;\r\r\tPROCEDURE "
