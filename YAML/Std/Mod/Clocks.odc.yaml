                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT\r\t\tDates, Math, Domains := Stores, Ports, Stores, Models, Views, Services, Properties,\r\t\tTextModels;\r\r\tCONST\r\t\tminSize = 25 * Ports.point; niceSize = 42 * Ports.point;\r\t\tminVersion = 0; maxVersion = 0;\r\r\tTYPE\r\t\tStdView = POINTER TO RECORD (Views.View)\r\t\t\ttime: Dates.Time\r\t\tEND;\r\r\t\tTickAction = POINTER TO RECORD (Services.Action) END;\r\r\t\tMsg = RECORD (Models.Message)\r\t\t\tconsumed: BOOLEAN;\r\t\t\ttime: Dates.Time\r\t\tEND;\r\r\tVAR\r\t\tclockTime: Dates.Time;\r\t\taction: TickAction;\r\t\tactionIsAlive: BOOLEAN;\r\r\r\tPROCEDURE Cos (r, g: INTEGER): INTEGER;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " SHORT(ENTIER(r * Math.Cos(2 * Math.Pi() * g / 60) + 0.5))\r\tEND Cos;\r\r\tPROCEDURE Sin (r, g: INTEGER): INTEGER;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " SHORT(ENTIER(r * Math.Sin(2 * Math.Pi() * g / 60) + 0.5))\r\tEND Sin;\r\r\tPROCEDURE (a: TickAction) Do;\r\t\tVAR msg: Msg; time: Dates.Time;\r\tBEGIN\r\t\tDates.GetTime(time);\r\t\tIF clockTime.second = time.second THEN\r\t\t\tServices.DoLater(action, Services.Ticks() + Services.resolution DIV 2)\r\t\tELSE\r\t\t\tclockTime := time;\r\t\t\tmsg.consumed := FALSE;\r\t\t\tmsg.time := time;\r\t\t\tViews.Omnicast(msg);\r\t\t\tIF msg.consumed THEN\r\t\t\t\tServices.DoLater(action, Services.Ticks() + Services.resolution DIV 2)\r\t\t\tELSE\r\t\t\t\tactionIsAlive := FALSE\r\t\t\tEND\r\t\tEND\r\tEND Do;\r\r\r\t"
                    attr: 0
                  - text: "(* View *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE DrawTick (f: Views.Frame; m, d0, d1, s, g: INTEGER; c: Ports.Color);\r\tBEGIN\r\t\tf.DrawLine(m + Sin(d0, g), m - Cos(d0, g), m + Sin(d1, g), m - Cos(d1, g), s, c)\r\tEND DrawTick;\r\r\r\tPROCEDURE (v: StdView) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\tv.Externalize^(wr);\r\t\twr.WriteVersion(maxVersion);\r\t\twr.WriteByte(9)\r\tEND Externalize;\r\r\tPROCEDURE (v: StdView) Internalize (VAR rd: Stores.Reader);\r\t\tVAR thisVersion: INTEGER; format: BYTE;\r\tBEGIN\r\t\tv.Internalize^(rd);\r\t\tIF ~rd.cancelled THEN\r\t\t\trd.ReadVersion(minVersion, maxVersion, thisVersion);\r\t\t\tIF ~rd.cancelled THEN\r\t\t\t\trd.ReadByte(format);\r\t\t\t\tv.time.second := -1\r\t\t\tEND\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (v: StdView) CopyFromSimpleView (source: Views.View);\r\tBEGIN\r\t\tWITH source: StdView DO\r\t\t\tv.time.second := -1\r\t\tEND\r\tEND CopyFromSimpleView;\r\r\tPROCEDURE (v: StdView) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR c: Models.Context; a: TextModels.Attributes; color: Ports.Color;\r\t\t\ttime: Dates.Time;\r\t\t\ti, m, d, u, hs, hd1, ms, md1, ss, sd0, sd1,  w, h: INTEGER;\r\tBEGIN\r\t\tIF ~actionIsAlive THEN\r\t\t\t actionIsAlive := TRUE; Services.DoLater(action, Services.now)\r\t\tEND;\r\t\tIF v.time.second = -1 THEN Dates.GetTime(v.time) END;\r\t\tc := v.context; c.GetSize(w, h);\r\t\tWITH c: TextModels.Context DO a := c.Attr(); color := a.color\r\t\tELSE color := Ports.defaultColor\r\t\tEND;\r\t\tu := f.unit;\r\t\td := h DIV u * u;\r\t\tIF ~ODD(d DIV u) THEN DEC(d, u) END;\r\t\tm := (h - u) DIV 2;\r\t\tIF d >= niceSize - 2 * Ports.point THEN\r\t\t\ths := 3 * u; ms := 3 * u; ss := u;\r\t\t\thd1 := m * 4 DIV 6; md1 := m * 5 DIV 6; sd0 := -(m DIV 6); sd1 := m - 4 * u;\r\t\t\ti := 0; WHILE i < 12 DO DrawTick(f, m, m * 11 DIV 12, m, u, i  * 5, color); INC(i) END\r\t\tELSE\r\t\t\thd1 := m * 2 DIV 4; hs := u; ms := u; ss := u;\r\t\t\tmd1 := m * 3 DIV 4; sd0 := 0; sd1 := 3 * u\r\t\tEND;\r\t\ttime := v.time;\r\t\tf.DrawOval(0, 0, d, d, u, color);\r\t\tDrawTick(f, m, 0, m * 4 DIV 6, hs, time.hour MOD 12 * 5 + time.minute DIV 12, color);\r\t\tDrawTick(f, m, 0, md1, ms, time.minute, color);\r\t\tDrawTick(f, m, sd0, sd1, ss, time.second, color)\r\tEND Restore;\r\r\tPROCEDURE (v: StdView) HandleModelMsg (VAR msg: Models.Message);\r\t\tVAR w, h: INTEGER;\r\tBEGIN\r\t\tWITH msg: Msg DO\r\t\t\tmsg.consumed := TRUE;\r\t\t\tIF v.time.second # msg.time.second THEN\t"
                    attr: 0
                  - text: "(* execute only once per view *)"
                    attr: 1
                  - text: "\r\t\t\t\tViews.Update(v, Views.keepFrames);\r\t\t\t\tv.time := msg.time\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND HandleModelMsg;\r\r\tPROCEDURE SizePref (v: StdView; VAR p: Properties.SizePref);\r\tBEGIN\r\t\tIF (p.w > Views.undefined) & (p.h > Views.undefined) THEN\r\t\t\tProperties.ProportionalConstraint(1, 1, p.fixedW, p.fixedH, p.w, p.h);\r\t\t\tIF p.w < minSize THEN p.w := minSize; p.h := minSize END\r\t\tELSE\r\t\t\tp.w := niceSize; p.h := niceSize\r\t\tEND\r\tEND SizePref;\r\r\tPROCEDURE (v: StdView) HandlePropMsg (VAR msg: Properties.Message);\r\tBEGIN\r\t\tWITH msg: Properties.Preference DO\r\t\t\tWITH msg: Properties.SizePref DO\r\t\t\t\tSizePref(v, msg)\r\t\t\tELSE\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\r\r\t"
                    attr: 0
                  - text: "(** allocation **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: New
                    attr: 3
                  - text: "* (): Views.View;\r\t\tVAR v: StdView;\r\tBEGIN\r\t\tNEW(v); v.time.second := -1; "
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " v\r\tEND New;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Deposit
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\tViews.Deposit(New())\r\tEND Deposit;\r\r\rBEGIN\r\tclockTime.second := -1;\r\tNEW(action); actionIsAlive := FALSE\rCLOSE\r\tIF actionIsAlive THEN Services.RemoveAction(action) END\rEND StdClocks.\r"
                    attr: 0
