                  - text: "* (VAR par: Dialog.Par);\r\tBEGIN\r\t\tpar.disabled := (TextViews.Focus() = NIL) OR foldData.all\r\tEND FindLabelGuard;\r\t\t\r\tPROCEDURE "
                    attr: 0
                  - text: "SetLabelGuard* "
                    attr: 3
                  - text: "( VAR p : Dialog.Par );\r\t\tVAR v: Views.View;\r\tBEGIN\r\t\tControllers.SetCurrentPath(Controllers.targetPath);\r\t\tv := Containers.FocusSingleton();\r\t\tp.disabled := (v = NIL) OR ~(v IS Fold) OR ~v(Fold).leftSide;\r\t\tControllers.ResetCurrentPath()\r\tEND SetLabelGuard;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ExpandLabel
                    attr: 3
                  - text: "*;\r\t\tVAR text: TextModels.Model;\r\tBEGIN\r\t\tIF foldData.all & (foldData.findLabel # \"\") THEN\r\t\t\tfoldData.findLabel := \"\"; Dialog.Update(foldData)\r\t\tEND;\r\t\ttext := TextViews.FocusText();\r\t\tIF text # NIL THEN\r\t\t\tIF ~foldData.all THEN ExpandFolds(text, foldData.nested, foldData.findLabel)\r\t\t\tELSE ExpandFolds(text, foldData.nested, \"\")\r\t\t\tEND\r\t\tEND\r\tEND ExpandLabel;\r\r\tPROCEDURE "
                    attr: 0
                  - text: CollapseLabel
                    attr: 3
                  - text: "*;\r\t\tVAR text: TextModels.Model;\r\tBEGIN\r\t\tIF foldData.all & (foldData.findLabel # \"\") THEN\r\t\t\tfoldData.findLabel := \"\"; Dialog.Update(foldData)\r\t\tEND;\r\t\ttext := TextViews.FocusText();\r\t\tIF text # NIL THEN\r\t\t\tIF ~foldData.all THEN CollapseFolds(text, foldData.nested, foldData.findLabel)\r\t\t\tELSE CollapseFolds(text, foldData.nested, \"\")\r\t\t\tEND\r\t\tEND\r\tEND CollapseLabel;\r\r\tPROCEDURE FindFold(first: BOOLEAN);\r\tVAR c : TextControllers.Controller; r: TextModels.Reader; \r\t\tv : Views.View; pos, i : INTEGER;\r\tBEGIN\r\t\tc := TextControllers.Focus();\r\t\tIF c # NIL THEN\r\t\t\tIF first THEN pos := 0 \r\t\t\tELSE\r\t\t\t\tpos := c.CaretPos();\r\t\t\t\tIF pos = TextControllers.none THEN\r\t\t\t\t\tc.GetSelection(i, pos);\r\t\t\t\t\tIF pos = i THEN pos := 0 ELSE INC(pos) END;\r\t\t\t\t\tpos := MIN(pos, c.text.Length()-1)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tr := c.text.NewReader(NIL); r.SetPos(pos);\r\t\t\tREPEAT r.ReadView(v)\r\t\t\tUNTIL r.eot OR ((v IS Fold) & v(Fold).leftSide) & (foldData.all OR (v(Fold).label$ = foldData.findLabel$));\r\t\t\tIF r.eot THEN\r\t\t\t\tc.SetCaret(0); Dialog.Beep\r\t\t\tELSE\r\t\t\t\tpos := r.Pos();\r\t\t\t\tc.view.ShowRange(pos-1, pos, FALSE);\r\t\t\t\tc.SetSelection(pos-1, pos);\r\t\t\t\tIF LEN(v(Fold).label) > 0 THEN\r\t\t\t\t\tfoldData.newLabel := v(Fold).label\r\t\t\t\tEND;\r\t\t\t\tDialog.Update(foldData)\r\t\t\tEND\r\t\tELSE\r\t\t\tDialog.Beep\r\t\tEND\r\tEND FindFold;\r\r\tPROCEDURE "
                    attr: 0
                  - text: FindNextFold
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\tFindFold(FALSE)\r\tEND FindNextFold;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: "FindFirstFold*"
                    attr: 3
                  - text: ";\r\tBEGIN\r\t\tFindFold(TRUE)\r\tEND FindFirstFold;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: "SetLabel*;\r\t"
                    attr: 3
                  - text: "\tVAR v: Views.View;\r\tBEGIN\r\t\tControllers.SetCurrentPath(Controllers.targetPath);\r\t\tv := Containers.FocusSingleton();\r\t\tIF (v # NIL) & (v IS Fold) & (LEN(foldData.newLabel) > 0) THEN\r\t\t\tv(Fold).label := foldData.newLabel\r\t\tELSE\r\t\t\tDialog.Beep\r\t\tEND;\r\t\tControllers.ResetCurrentPath()\r\tEND SetLabel;\r\r\tPROCEDURE (a: Action) Do;\r\t\tVAR v: Views.View; fp: INTEGER;\r\tBEGIN\r\t\tControllers.SetCurrentPath(Controllers.targetPath);\r\t\tv := Containers.FocusSingleton();\r\t\tIF (v = NIL) OR ~(v IS Fold) THEN \r\t\t\tfingerprint := 0;\r\t\t\tfoldData.newLabel := \"\"\r\t\tELSE \r\t\t\tfp := Services.AdrOf(v);\r\t\t\tIF fp # fingerprint THEN \r\t\t\t\tfoldData.newLabel := v(Fold).label;\r\t\t\t\tfingerprint := fp;\r\t\t\t\tDialog.Update(foldData)\r\t\t\tEND\r\t\tEND;\r\t\tControllers.ResetCurrentPath();\r\t\tServices.DoLater(action, Services.Ticks() + Services.resolution DIV 2)\r\tEND Do;\r\r\t"
                    attr: 0
                  - text: "(* ------------------------ inserting folds ------------------------ *)"
                    attr: 1
                  - text: "\r\t\t\r\tPROCEDURE "
                    attr: 0
                  - text: Overlaps
                    attr: 3
                  - text: "* (text: TextModels.Model; beg, end: INTEGER): BOOLEAN;\r\t\tVAR n, level: INTEGER; rd: TextModels.Reader; v: Views.View;\r\tBEGIN\r\t\tASSERT(text # NIL, 20);\r\t\tASSERT((beg >= 0) & (end <= text.Length()) & (beg <= end), 21);\r\t\trd := text.NewReader(NIL); rd.SetPos(beg);\r\t\tn := 0; level := 0;\r\t\tREPEAT rd.ReadView(v);\r\t\t\tIF ~rd.eot & (rd.Pos() <= end) THEN\r\t\t\t\tWITH v: Fold DO INC(n);\r\t\t\t\t\tIF v.leftSide THEN INC(level) ELSE DEC(level) END\r\t\t\t\tELSE\r\t\t\t\tEND\r\t\t\tEND\r\t\tUNTIL rd.eot OR (level < 0) OR (rd.Pos() >= end);\r\t\tRETURN (level # 0) OR ODD(n)\r\tEND Overlaps;\r\r\tPROCEDURE InsertionAttr (text: TextModels.Model; pos: INTEGER): TextModels.Attributes;\r\t\tVAR rd: TextModels.Reader; ch: CHAR;\r\tBEGIN\r\t\trd := text.NewReader(NIL);\r\t\trd.SetPos(pos); rd.ReadChar(ch);\r\t\tRETURN rd.attr\r\tEND InsertionAttr;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Insert
                    attr: 3
                  - text: "* (text: TextModels.Model; label: Label; beg, end: INTEGER; collapsed: BOOLEAN);\r\t\tVAR w: TextModels.Writer; fold: Fold; insop: Domains.Operation; a: TextModels.Attributes;\r\tBEGIN\r\t\tASSERT(text # NIL, 20);\r\t\tASSERT((beg >= 0) & (end <= text.Length()) & (beg <= end), 21);\r\t\ta := InsertionAttr(text, beg);\r\t\tw := text.NewWriter(NIL); w.SetPos(beg);\r\t\tIF a # NIL THEN w.SetAttr(a) END;\r\t\tNEW(fold);\r\t\tfold.leftSide := TRUE; fold.collapsed := collapsed;\r\t\tfold.hidden := TextModels.CloneOf(text); Stores.Join(fold, fold.hidden);\r\t\tfold.label := label$;\r\t\tModels.BeginScript(text, insertFoldKey, insop);\r\t\tw.WriteView(fold, 0, 0);\r\t\tw.SetPos(end+1);\r\t\ta := InsertionAttr(text, end+1);\r\t\tIF a # NIL THEN w.SetAttr(a) END;\r\t\tNEW(fold);\r\t\tfold.leftSide := FALSE; fold.collapsed := collapsed;\r\t\tfold.hidden := NIL; fold.label := \"\";\r\t\tw.WriteView(fold, 0, 0);\r\t\tModels.EndScript(text, insop)\r\tEND Insert;\r\r\tPROCEDURE "
                    attr: 0
                  - text: CreateGuard
                    attr: 3
                  - text: "* (VAR par: Dialog.Par);\r\t\tVAR c: TextControllers.Controller; beg, end: INTEGER;\r\tBEGIN c := TextControllers.Focus();\r\t\tIF (c # NIL) &  ~(Containers.noCaret IN c.opts) THEN\r\t\t\tIF c.HasSelection() THEN c.GetSelection(beg, end);\r\t\t\t\tIF Overlaps(c.text, beg, end) THEN par.disabled := TRUE END\r\t\t\tEND\r\t\tELSE par.disabled := TRUE\r\t\tEND\r\tEND CreateGuard;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Create
                    attr: 3
                  - text: "* (state: INTEGER);\t"
                    attr: 0
                  - text: "(* menu cmd parameters don't accept Booleans *)"
                    attr: 1
                  - text: "\r\t\tVAR c: TextControllers.Controller; beg, end: INTEGER; collapsed: BOOLEAN;\r\tBEGIN\r\t\tcollapsed := state = 0;\r\t\tc := TextControllers.Focus();\r\t\tIF (c # NIL) & ~(Containers.noCaret IN c.opts) THEN\r\t\t\tIF c.HasSelection() THEN c.GetSelection(beg, end);\r\t\t\t\tIF ~Overlaps(c.text, beg, end) THEN Insert(c.text, \"\", beg, end, collapsed) END\r\t\t\tELSE beg := c.CaretPos(); Insert(c.text, \"\", beg, beg, collapsed)\r\t\t\tEND\r\t\tEND\r\tEND Create;\r\r\tPROCEDURE (d: StdDirectory) New (collapsed: BOOLEAN; label: Label;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\thiddenText: TextModels.Model): Fold;\r\t\tVAR fold: Fold;\r\tBEGIN\r\t\tNEW(fold); fold.leftSide := hiddenText # NIL; fold.collapsed := collapsed;\r\t\tfold.label := label; fold.hidden := hiddenText; \r\t\tIF hiddenText # NIL THEN Stores.Join(fold, fold.hidden) END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " fold\r\tEND  New;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SetDir
                    attr: 3
                  - text: "* (d: Directory);\r\tBEGIN\r\t\tASSERT(d # NIL, 20);\r\t\tdir := d\r\tEND SetDir;\r\r\tPROCEDURE InitMod;\r\t\tVAR d: StdDirectory;\r\tBEGIN\r\t\tfoldData.all := TRUE; foldData.nested := FALSE; foldData.findLabel := \"\"; foldData.newLabel := \"\";\r\t\tNEW(d); dir := d; stdDir := d;\r\t\tNEW(action); Services.DoLater(action, Services.now);\r\tEND InitMod;\r\rBEGIN\r\tInitMod\rEND StdFolds.\r"
                    attr: 0
