                  - text: "(* use device coordinates for symmetric arrow rendering*)"
                    attr: 1
                  - text: "\r\t\tw := w DIV f.unit;\r\t\tasc := asc DIV f.unit;\r\t\tw2 := w * 10 DIV 18;\r\t\tIF ~ODD(w2) THEN DEC(w2) END ;\r\t\tw4 := w2 DIV 2;\r\t\txoff := (w - w2 - w4) DIV 2;\r\t\tIF xoff < 1 THEN xoff := 1 END ;\r\t\tWHILE xoff + w2 + w4 > w DO DEC(w2, 2); DEC(w4) END ; \r\t\t"
                    attr: 0
                  - text: "(* left side icon *)"
                    attr: 1
                  - text: "\r\t\tpath[0].x := xoff; path[0].y := asc; "
                    attr: 0
                  - text: "(* lower left *)"
                    attr: 1
                  - text: "\r\t\tpath[1].x := path[0].x; path[1].y := path[0].y - w2; "
                    attr: 0
                  - text: "(* upper left *)"
                    attr: 1
                  - text: "\r\t\tpath[2].x := path[1].x + w2; path[2].y := path[1].y; "
                    attr: 0
                  - text: "(* upper middle *)"
                    attr: 1
                  - text: "\r\t\tpath[3].x := path[2].x + w4; path[3].y := path[2].y + w4; "
                    attr: 0
                  - text: "(* right arrow *)"
                    attr: 1
                  - text: "\r\t\tpath[4].x := path[2].x - 1; path[4].y := path[0].y; "
                    attr: 0
                  - text: "(* lower middle, x offset -1 needed for symmetric filling *)"
                    attr: 1
                  - text: "\r\t\tIF ~fold.leftSide THEN (* mirror *)\r\t\t\tFOR i := 0 TO LEN(path) - 1 DO path[i].x := w - path[i].x END\r\t\tEND ;\r\t\t"
                    attr: 0
                  - text: "(* convert to universal coordinates *)"
                    attr: 1
                  - text: "\r\t\tFOR i := 0 TO LEN(path) - 1 DO path[i].x := path[i].x * f.unit; path[i].y := path[i].y * f.unit; END\r\tEND GetIconPath;\r\r\tPROCEDURE DrawMarkers(fold: Fold; f: Views.Frame; IN path: ARRAY OF Ports.Point);\r\t\tVAR w2, height, thickness, margin, len, left, top: INTEGER;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: "(* scale size and thickness of +/- markers, thickness / height = 1 / 7*)"
                    attr: 1
                  - text: "\r\t\tw2 := ABS(path[2].x - path[1].x); "
                    attr: 0
                  - text: "(* universal coordinates *)"
                    attr: 1
                  - text: "\r\t\theight := (path[0].y - path[1].y); "
                    attr: 0
                  - text: "(* universal coordinates *)"
                    attr: 1
                  - text: "\r\t\tthickness := height DIV f.unit DIV 7; "
                    attr: 0
                  - text: "(* device coordinates *)"
                    attr: 1
                  - text: "\r\t\tIF thickness < 1 THEN thickness := 1\r\t\t"
                    attr: 0
                  - text: "(* ELSIF ~ODD(thickness) THEN (* alternative for perfect symmetry but scales in larger increments *)\r\t\t\tDEC(thickness) *)"
                    attr: 1
                  - text: "\r\t\tEND ;\r\t\tthickness := thickness * f.unit; "
                    attr: 0
                  - text: "(* universal coordinates *)\r\t\t"
                    attr: 1
                  - text: "margin := height DIV f.unit DIV 4; "
                    attr: 0
                  - text: "(* device coordinates *)"
                    attr: 1
                  - text: "\r\t\tIF margin < 1 THEN margin := 1 END; "
                    attr: 0
                  - text: "(* for small fonts *)"
                    attr: 1
                  - text: "\r\t\tmargin := margin * f.unit; "
                    attr: 0
                  - text: "(* universal coordinates *)"
                    attr: 1
                  - text: "\r\t\tlen := w2 - margin * 2; "
                    attr: 0
                  - text: "(* universal coordinates *)\r"
                    attr: 1
                  - text: "\t\tIF ((len DIV f.unit) MOD 2 = 1) & ((thickness DIV f.unit) MOD 2 = 0) THEN\r\t\t\tINC(len,  f.unit) "
                    attr: 0
                  - text: "(* avoid cross assymetry *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\t\tIF len < 1 THEN len := 1 END ; "
                    attr: 0
                  - text: "(* avoid TRAP in DrawRect for very small sizes *)"
                    attr: 1
                  - text: "\r\t\t"
                    attr: 0
                  - text: "(* draw - *)"
                    attr: 1
                  - text: "\r\t\tIF fold.leftSide THEN left := path[0].x + margin ELSE left := path[2].x + margin END ;\r\t\ttop := path[1].y + (height - thickness) DIV 2;\r\t\tf.DrawRect(left, top, left + len, top + thickness, Ports.fill, Ports.white);\r\t\tIF fold.collapsed THEN "
                    attr: 0
                  - text: "(* draw | *)"
                    attr: 1
                  - text: "\r\t\t\tleft := left + (len - thickness) DIV 2;\r\t\t\ttop := path[1].y + margin;\r\t\t\tf.DrawRect(left, top, left + thickness, top + len, Ports.fill, Ports.white);\r\t\tEND\r\tEND DrawMarkers;\r\r\tPROCEDURE (fold: Fold) "
                    attr: 0
                  - text: Restore
                    attr: 3
                  - text: "* (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR a: TextModels.Attributes; color: Ports.Color; c: Models.Context; font: Fonts.Font;\r\t\t\tw, h: INTEGER; asc, dsc, fw: INTEGER; path: ARRAY 5 OF Ports.Point;"
                    attr: 0
                  - text: "\r"
                    attr: 4
                  - text: "\tBEGIN\r\t\tCalcSize(fold, w, h); "
                    attr: 0
                  - text: "(* important side effect: initializes Log window for drawing folds! *)"
                    attr: 1
                  - text: "\r\t\tc := fold.context;\r\t\tIF (c # NIL) & (c IS TextModels.Context) THEN\r\t\t\ta := fold.context(TextModels.Context).Attr();\r\t\t\tfont := a.font;\r\t\t\tcolor := a.color\r\t\tELSE font := Fonts.dir.Default(); color := Ports.black\r\t\tEND;\r\t\tfont.GetBounds(asc, dsc, fw);"
                    attr: 0
                  - text: "\r\t\t"
                    attr: 4
                  - text: "GetIconPath(fold, f, w, h, asc, path);\r\t\tf.DrawPath(path, LEN(path), Ports.fill, color, Ports.closedPoly);\r\t\tDrawMarkers(fold, f, path)"
                    attr: 0
                  - text: "\r"
                    attr: 4
                  - text: "\tEND Restore;\r\r\tPROCEDURE (fold: Fold) "
                    attr: 0
                  - text: CopyFromSimpleView
                    attr: 3
                  - text: "- (source: Views.View);\r\tBEGIN\r\t\t(* fold.CopyFrom^(source); *)\r\t\tWITH source: Fold DO\r\t\t\tASSERT(source.leftSide = (source.hidden # NIL), 100);\r\t\t\tfold.leftSide := source.leftSide;\r\t\t\tfold.collapsed := source.collapsed;\r\t\t\tfold.label := source.label;\r\t\t\tIF source.hidden # NIL THEN\r\t\t\t\tfold.hidden := TextModels.CloneOf(source.hidden); Stores.Join(fold.hidden, fold);\r\t\t\t\tfold.hidden.InsertCopy(0, source.hidden, 0, source.hidden.Length())\r\t\t\tEND\r\t\tEND\r\tEND CopyFromSimpleView;\r\r\tPROCEDURE (fold: Fold) "
                    attr: 0
                  - text: Internalize-
                    attr: 3
                  - text: " (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER; store: Stores.Store; xint: INTEGER;\r\tBEGIN\r\t\tfold.Internalize^(rd);\r\t\tIF rd.cancelled THEN RETURN END;\r\t\trd.ReadVersion(minVersion, currentVersion, version);\r\t\tIF rd.cancelled THEN RETURN END;\r\t\trd.ReadXInt(xint);fold.leftSide := xint = 0;\r\t\trd.ReadXInt(xint); fold.collapsed := xint = 0;\r\t\tIF version >= 1 THEN  rd.ReadString(fold.label)\r\t\tELSE rd.ReadXString(fold.label)\r\t\tEND;\r\t\trd.ReadStore(store);\r\t\tIF store # NIL THEN fold.hidden := store(TextModels.Model); Stores.Join(fold.hidden, fold)\r\t\tELSE fold.hidden := NIL\r\t\tEND;\r\t\tfold.leftSide := store # NIL\r\tEND Internalize;\r\r\tPROCEDURE HasWideChars (IN s: ARRAY OF CHAR): BOOLEAN;\r\t\tVAR i: INTEGER; ch: CHAR;\r\tBEGIN i := 0; ch := s[0];\r\t\tWHILE (ch # 0X) & (ch <= 0FFX) DO INC(i); ch := s[i] END;\r\t\tRETURN ch # 0X\r\tEND HasWideChars;\r\r\tPROCEDURE (fold: Fold) "
                    attr: 0
                  - text: Externalize
                    attr: 3
                  - text: "- (VAR wr: Stores.Writer);\r\t\tVAR xint, version: INTEGER;\r\tBEGIN\r\t\tfold.Externalize^(wr);\r\t\tIF HasWideChars(fold.label) THEN version := 1 ELSE version := 0 END;\r\t\twr.WriteVersion(version);\r\t\tIF fold.hidden # NIL THEN xint := 0 ELSE xint := 1 END;\r\t\twr.WriteXInt(xint);\r\t\tIF fold.collapsed THEN xint := 0 ELSE xint := 1 END;\r\t\twr.WriteXInt(xint);\r\t\tIF version >= 1 THEN wr.WriteString(fold.label)\r\t\tELSE wr.WriteXString(fold.label)\r\t\tEND;\r\t\twr.WriteStore(fold.hidden)\r\tEND Externalize;\r\r\t"
                    attr: 0
                  - text: "(* --------------------- expanding and collapsing in focus text ------------------------ *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: ExpandFolds
                    attr: 3
                  - text: "* (text: TextModels.Model; nested: BOOLEAN; IN label: ARRAY OF CHAR);\r\t\tVAR op: Domains.Operation; fold, l, r: Fold; rd: TextModels.Reader;\r\tBEGIN\r\t\tASSERT(text # NIL, 20);\r\t\tModels.BeginModification(Models.clean, text);\r\t\tIF nested THEN Models.BeginScript(text, expandFoldsKey, op)\r\t\tELSE Models.BeginScript(text, zoomInKey, op)\r\t\tEND;\r\t\trd := text.NewReader(NIL); rd.SetPos(0);\r\t\tReadNext(rd, fold);\r\t\tWHILE ~rd.eot DO\r\t\t\tIF fold.leftSide & fold.collapsed THEN\r\t\t\t\tIF (label = \"\") OR (label = fold.label) THEN\r\t\t\t\t\tfold.Flip;\r\t\t\t\t\tIF ~nested THEN \r\t\t\t\t\t\tGetPair(fold, l, r);\r\t\t\t\t\t\trd.SetPos(r.context(TextModels.Context).Pos())\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tReadNext(rd, fold)\r\t\tEND;\r\t\tModels.EndScript(text, op);\r\t\tModels.EndModification(Models.clean, text)\r\tEND ExpandFolds;\r\r\tPROCEDURE "
                    attr: 0
                  - text: CollapseFolds
                    attr: 3
                  - text: "* (text: TextModels.Model; nested: BOOLEAN; IN label: ARRAY OF CHAR);\r\t\tVAR op: Domains.Operation; fold, r, l: Fold; rd: TextModels.Reader;\r\tBEGIN\r\t\tASSERT(text # NIL, 20);\r\t\tModels.BeginModification(Models.clean, text);\r\t\tIF nested THEN Models.BeginScript(text, collapseFoldsKey, op)\r\t\tELSE Models.BeginScript(text, zoomOutKey, op)\r\t\tEND;\r\t\trd := text.NewReader(NIL); rd.SetPos(0);\r\t\tReadNext(rd, fold);\r\t\tWHILE ~rd.eot DO\r\t\t\tIF ~fold.leftSide & ~fold.collapsed THEN\r\t\t\t\tGetPair(fold, l, r);\r\t\t\t\tIF (label = \"\") OR (label = l.label) THEN\r\t\t\t\t\tfold.Flip;\r\t\t\t\t\tGetPair(l, l, r);\r\t\t\t\t\trd.SetPos(r.context(TextModels.Context).Pos()+1);\r\t\t\t\t\tIF ~nested THEN REPEAT ReadNext(rd, fold) UNTIL rd.eot OR fold.leftSide\r\t\t\t\t\tELSE ReadNext(rd, fold)\r\t\t\t\t\tEND\r\t\t\t\tELSE ReadNext(rd, fold)\r\t\t\t\tEND\r\t\t\tELSE ReadNext(rd, fold)\r\t\t\tEND\r\t\tEND;\r\t\tModels.EndScript(text, op);\r\t\tModels.EndModification(Models.clean, text)\r\tEND CollapseFolds;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ZoomIn
                    attr: 3
                  - text: "*;\r\t\tVAR text: TextModels.Model;\r\tBEGIN\r\t\ttext := TextViews.FocusText();\r\t\tIF text # NIL THEN ExpandFolds(text, FALSE, \"\") END\r\tEND ZoomIn;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ZoomOut
                    attr: 3
                  - text: "*;\r\t\tVAR text: TextModels.Model;\r\tBEGIN\r\t\ttext := TextViews.FocusText();\r\t\tIF text # NIL THEN CollapseFolds(text, FALSE, \"\") END\r\tEND ZoomOut;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Expand
                    attr: 3
                  - text: "*;\r\t\tVAR text: TextModels.Model;\r\tBEGIN\r\t\ttext := TextViews.FocusText();\r\t\tIF text # NIL THEN ExpandFolds(text, TRUE, \"\") END\r\tEND Expand;\r\r\tPROCEDURE "
                    attr: 0
