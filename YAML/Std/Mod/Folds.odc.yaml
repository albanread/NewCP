                  - text: "* (): Fold, NEW;\r\t\tVAR l, r: Fold;\r\tBEGIN\r\t\tGetPair(fold, l, r);\r\t\tIF l # NIL THEN\r\t\t\tIF fold = l THEN RETURN r ELSE RETURN l END\r\t\tELSE RETURN NIL\r\t\tEND\r\tEND MatchingFold;\r\r\tPROCEDURE CalcSize (f: Fold; VAR w, h: INTEGER);\r\t\tVAR c: Models.Context; font: Fonts.Font;\r\t\t\tasc, dsc, fw: INTEGER;\r\tBEGIN\r\t\tc := f.context;\r\t\tIF (c # NIL) & (c IS TextModels.Context) THEN\r\t\t\tfont := c(TextModels.Context).Attr().font\r\t\tELSE font := Fonts.dir.Default()\r\t\tEND;\r\t\tfont.GetBounds(asc, dsc, fw);\r\t\tw := asc * 29 DIV 20;"
                    attr: 0
                  - text: "\r"
                    attr: 4
                  - text: "\t\th := asc + dsc\r\tEND CalcSize;\r\r\tPROCEDURE Update (f: Fold);\r\t\tVAR w, h: INTEGER;\r\tBEGIN\r\t\tCalcSize(f, w, h);\r\t\tf.context.SetSize(w, h);\r\t\tViews.Update(f, Views.keepFrames)\r\tEND Update;\r\r\tPROCEDURE FlipPair (l, r: Fold);\r\t\tVAR text, hidden: TextModels.Model; cl, cr: Models.Context;\r\t\t\tlpos, rpos: INTEGER;\r\tBEGIN\r\t\tIF (l # NIL) & (r # NIL) THEN\r\t\t\tASSERT(l.leftSide, 100);\r\t\t\tASSERT(~r.leftSide, 101);\r\t\t\tASSERT(l.hidden # NIL, 102);\r\t\t\tASSERT(r.hidden = NIL, 103);\r\t\t\tcl := l.context; cr := r.context;\r\t\t\ttext := cl(TextModels.Context).ThisModel();\r\t\t\tlpos := cl(TextModels.Context).Pos() + 1; rpos := cr(TextModels.Context).Pos();\r\t\t\tASSERT(lpos <= rpos, 104);\r\t\t\thidden := TextModels.CloneOf(text); \r\t\t\thidden.Insert(0, text, lpos, rpos);\r\t\t\ttext.Insert(lpos, l.hidden, 0, l.hidden.Length());\r\t\t\tl.hidden := hidden; Stores.Join(l, hidden);\r\t\t\tl.collapsed := ~l.collapsed;\r\t\t\tr.collapsed := l.collapsed;\r\t\t\tUpdate(l); Update(r);\r\t\t\tTextControllers.SetCaret(text, lpos)\r\t\tEND\r\tEND FlipPair;\r\r\tPROCEDURE (op: FlipOp) Do;\r\t\tVAR rd: TextModels.Reader; left, right: Views.View;\r\tBEGIN\r\t\trd := op.text.NewReader(NIL);\r\t\trd.SetPos(op.leftpos); rd.ReadView(left);\r\t\trd.SetPos(op.rightpos); rd.ReadView(right);\r\t\tFlipPair(left(Fold), right(Fold));\r\t\top.leftpos := left.context(TextModels.Context).Pos();\r\t\top.rightpos := right.context(TextModels.Context).Pos()\r\tEND Do;\r\r\tPROCEDURE (op: SetLabelOp) Do;\r\t\tVAR rd: TextModels.Reader; fold: Views.View; left, right: Fold; lab: Label;\r\tBEGIN\r\t\trd := op.text.NewReader(NIL);\r\t\trd.SetPos(op.pos); rd.ReadView(fold);\r\t\tWITH fold: Fold DO\r\t\t\tGetPair(fold, left, right);\r\t\t\tIF left # NIL THEN\r\t\t\t\tlab := fold.label; left.label := op.oldlabel; op.oldlabel := lab;\r\t\t\t\tright.label := left.label\r\t\t\tEND\r\t\tEND\r\tEND Do;\r\r\tPROCEDURE SetProp (fold: Fold; p : Properties.Property);\r\t\tVAR op: SetLabelOp; left, right: Fold;\r\tBEGIN\r\t\tWHILE p # NIL DO\r\t\t\tWITH p: Controls.Prop DO\r\t\t\t\tIF (Controls.label IN p.valid) & (p.label # fold.label) THEN\r\t\t\t\t\tGetPair(fold, left, right);\r\t\t\t\t\tIF left # NIL THEN\r\t\t\t\t\t\tNEW(op); op.oldlabel := p.label$;\r\t\t\t\t\t\top.text := fold.context(TextModels.Context).ThisModel();\r\t\t\t\t\t\top.pos := fold.context(TextModels.Context).Pos();\r\t\t\t\t\t\tViews.Do(fold, setLabelKey, op)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\tEND;\r\t\t\tp := p.next\r\t\tEND\r\tEND SetProp;\r\r\tPROCEDURE (fold: Fold) "
                    attr: 0
                  - text: Flip
                    attr: 3
                  - text: "*, NEW;\r\t\tVAR op: FlipOp; left, right: Fold;\r\tBEGIN\r\t\tASSERT(fold # NIL, 20);\r\t\tNEW(op);\r\t\tGetPair(fold, left, right);\r\t\tIF (left # NIL) & (right # NIL) THEN\r\t\t\top.text := fold.context(TextModels.Context).ThisModel();\r\t\t\top.leftpos := left.context(TextModels.Context).Pos();\r\t\t\top.rightpos := right.context(TextModels.Context).Pos();\r\t\t\tViews.BeginModification(Views.clean, fold);\r\t\t\tIF ~left.collapsed THEN Views.Do(fold, collapseFoldKey, op)\r\t\t\tELSE Views.Do(fold, expandFoldKey, op)\r\t\t\tEND;\r\t\t\tViews.EndModification(Views.clean, fold)\r\t\tEND\r\tEND Flip;\r\r\tPROCEDURE ReadNext (rd: TextModels.Reader; VAR fold: Fold);\r\t\tVAR v: Views.View;\r\tBEGIN\r\t\tREPEAT rd.ReadView(v) UNTIL rd.eot OR (v IS Fold);\r\t\tIF ~rd.eot THEN fold := v(Fold) ELSE fold := NIL END\r\tEND ReadNext;\r\r\tPROCEDURE (fold: Fold) "
                    attr: 0
                  - text: "FlipNested*, "
                    attr: 3
                  - text: "NEW;\r\t\tVAR text: TextModels.Model; rd: TextModels.Reader; l, r: Fold; level: INTEGER;\r\t\t\top: Domains.Operation;\r\tBEGIN\r\t\tASSERT(fold # NIL, 20);\r\t\tGetPair(fold, l, r);\r\t\tIF (l # NIL) & (l.context # NIL) & (l.context IS TextModels.Context) THEN\r\t\t\ttext := l.context(TextModels.Context).ThisModel();\r\t\t\tModels.BeginModification(Models.clean, text);\r\t\t\trd := text.NewReader(NIL);\r\t\t\trd.SetPos(l.context(TextModels.Context).Pos());\r\t\t\tIF l.collapsed THEN\r\t\t\t\tModels.BeginScript(text, expandFoldsKey, op);\r\t\t\t\tReadNext(rd, fold); level := 1;\r\t\t\t\tWHILE (fold # NIL) & (level > 0) DO\r\t\t\t\t\tIF fold.leftSide & fold.collapsed THEN fold.Flip END;\r\t\t\t\t\tReadNext(rd, fold);\r\t\t\t\t\tIF fold.leftSide THEN INC(level) ELSE DEC(level) END\r\t\t\t\tEND\r\t\t\tELSE (* l.state = expanded *)\r\t\t\t\tModels.BeginScript(text, collapseFoldsKey, op);\r\t\t\t\tlevel := 0;\r\t\t\t\tREPEAT ReadNext(rd, fold);\r\t\t\t\t\tIF fold.leftSide THEN INC(level) ELSE DEC(level) END;\r\t\t\t\t\tIF (fold # NIL) & ~fold.leftSide & ~fold.collapsed THEN\r\t\t\t\t\t\tfold.Flip;\r\t\t\t\t\t\trd.SetPos(fold.context(TextModels.Context).Pos()+1)\r\t\t\t\t\tEND\r\t\t\t\tUNTIL (fold = NIL) OR (level = 0)\r\t\t\tEND;\r\t\t\tModels.EndScript(text, op);\r\t\t\tModels.EndModification(Models.clean, text)\r\t\tEND\r\tEND FlipNested;\r\r\tPROCEDURE (fold: Fold) "
                    attr: 0
                  - text: HandlePropMsg
