                  - text: "*;\r\t\tVAR text: TextModels.Model;\r\tBEGIN\r\t\ttext := TextViews.FocusText();\r\t\tIF text # NIL THEN CollapseFolds(text, TRUE, \"\") END\r\tEND Collapse;\r\r\t"
