                  - text: "* (collapsed: BOOLEAN; label: Label;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\thiddenText: TextModels.Model): Fold, NEW, ABSTRACT;\r\r\r\tPROCEDURE GetPair (fold: Fold; VAR l, r: Fold);\r\t\tVAR c: Models.Context; text: TextModels.Model; rd: TextModels.Reader; v: Views.View;\r\t\t\tnest: INTEGER;\r\tBEGIN\r\t\tc := fold.context; l := NIL; r := NIL;\r\t\tWITH c: TextModels.Context DO\r\t\t\ttext := c.ThisModel(); rd := text.NewReader(NIL);\r\t\t\tIF fold.leftSide THEN l := fold;\r\t\t\t\trd.SetPos(c.Pos()+1); nest := 1;\r\t\t\t\tREPEAT rd.ReadView(v);\r\t\t\t\t\tIF (v # NIL) & (v IS Fold) THEN\r\t\t\t\t\t\tIF v(Fold).leftSide THEN INC(nest) ELSE DEC(nest) END\r\t\t\t\t\tEND\r\t\t\t\tUNTIL (v = NIL) OR (nest = 0);\r\t\t\t\tIF v # NIL THEN r := v(Fold) ELSE r := NIL END\r\t\t\tELSE r := fold;\r\t\t\t\trd.SetPos(c.Pos()); nest := 1;\r\t\t\t\tREPEAT rd.ReadPrevView(v);\r\t\t\t\t\tIF (v # NIL) & (v IS Fold) THEN\r\t\t\t\t\t\tIF ~v(Fold).leftSide THEN INC(nest) ELSE DEC(nest) END\r\t\t\t\t\tEND\r\t\t\t\tUNTIL (v = NIL) OR (nest = 0);\r\t\t\t\tIF v # NIL THEN l := v(Fold) ELSE l := NIL END\r\t\t\tEND\r\t\tELSE (* fold "
