                  - text: "- (VAR msg: Properties.Message);\r\t\tVAR prop: Controls.Prop; c: Models.Context; a: TextModels.Attributes; asc, w: INTEGER;\r\tBEGIN\r\t\tWITH msg: Properties.SizePref DO\r\t\t\tCalcSize(fold, msg.w, msg.h)\r\t\t| msg: Properties.ResizePref DO\r\t\t\tmsg.fixed := TRUE\r\t\t| msg: Properties.FocusPref DO msg.hotFocus := TRUE\r\t\t| msg: Properties.PollMsg DO NEW(prop);\r\t\t\tprop.known := {Controls.label}; prop.valid := {Controls.label}; prop.readOnly := {};\r\t\t\tprop.label := fold.label$;\r\t\t\tmsg.prop := prop\r\t\t| msg: Properties.SetMsg DO SetProp(fold, msg.prop)\r\t\t| msg: TextSetters.Pref DO c := fold.context;\r\t\t\tIF (c # NIL) & (c IS TextModels.Context) THEN\r\t\t\t\ta := c(TextModels.Context).Attr();\r\t\t\t\ta.font.GetBounds(asc, msg.dsc, w)\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\r\tPROCEDURE Track (fold: Fold; f: Views.Frame; x, y: INTEGER; buttons: SET; VAR hit: BOOLEAN);\r\t\tVAR a: TextModels.Attributes; font: Fonts.Font; c: Models.Context;\r\t\t\tw, h, asc, dsc, fw: INTEGER; isDown, in, in0: BOOLEAN; modifiers: SET;\r\tBEGIN\r\t\tc := fold.context; hit := FALSE;\r\t\tWITH c: TextModels.Context DO\r\t\t\ta := c.Attr(); font := a.font;\r\t\t\tc.GetSize(w, h); in0 := FALSE;\r\t\t\tin := (0 <= x) & (x < w) & (0 <= y) & (y < h);\r\t\t\tREPEAT\r\t\t\t\tIF in # in0 THEN\r\t\t\t\t\tf.MarkRect(0, 0, w, h, Ports.fill, Ports.hilite, FALSE); in0 := in\r\t\t\t\tEND;\r\t\t\t\tf.Input(x, y, modifiers, isDown);\r\t\t\t\tin := (0 <= x) & (x < w) & (0 <= y) & (y < h)\r\t\t\tUNTIL ~isDown;\r\t\t\tIF in0 THEN hit := TRUE;\r\t\t\t\tfont.GetBounds(asc, dsc, fw);\r\t\t\t\tf.MarkRect(0, 0, w, asc + dsc, Ports.fill, Ports.hilite, FALSE)\r\t\t\tEND\r\t\tELSE\r\t\tEND\r\tEND Track;\r\r\t\tPROCEDURE (fold: Fold) "
                    attr: 0
                  - text: HandleCtrlMsg
                    attr: 3
                  - text: "* (f: Views.Frame; VAR msg: Views.CtrlMessage;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\t\t\tVAR hit: BOOLEAN; pos: INTEGER; l, r: Fold;\r\t\t\t\tcontext: TextModels.Context; text: TextModels.Model;\r\t\tBEGIN\r\t\t\tWITH msg: Controllers.TrackMsg DO\r\t\t\t\tIF fold.context IS TextModels.Context THEN\r\t\t\t\t\tTrack(fold, f, msg.x, msg.y, msg.modifiers, hit);\r\t\t\t\t\tIF hit THEN\r\t\t\t\t\t\tIF Controllers.modify IN msg.modifiers THEN\r\t\t\t\t\t\t\tfold.FlipNested\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tfold.Flip;\r\t\t\t\t\t\t\tcontext := fold.context(TextModels.Context);\r\t\t\t\t\t\t\ttext := context.ThisModel();\r\t\t\t\t\t\t\tIF TextViews.FocusText() = text THEN\r\t\t\t\t\t\t\t\tGetPair(fold, l, r);\r\t\t\t\t\t\t\t\tpos := context.Pos();\r\t\t\t\t\t\t\t\tIF fold = l THEN\r\t\t\t\t\t\t\t\t\tTextControllers.SetCaret(text, pos + 1)\r\t\t\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\t\t\tTextControllers.SetCaret(text, pos)\r\t\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\t\tTextViews.ShowRange(text, pos, pos + 1, TRUE)\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\t| msg: Controllers.PollCursorMsg DO\r\t\t\t\tmsg.cursor := Ports.refCursor\r\t\t\tELSE\r\t\t\tEND\r\t\tEND HandleCtrlMsg;\r\r\tPROCEDURE GetIconPath (fold: Fold; f: Views.Frame; w, h_dummy, asc: INTEGER; \r\t\t\t\t\t\t\t\t\t\t\tVAR path: ARRAY OF Ports.Point);\r\t\tVAR i, xoff, w2, w4: INTEGER;\r\tBEGIN\r\t\t"
