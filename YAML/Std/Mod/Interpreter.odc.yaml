                  - text: "\r**)\r"
                    attr: 1
                  - text: "\t\r\tIMPORT "
                    attr: 0
                  - text: Kernel
                    attr: 3
                  - text: ", Meta, Strings, Views, Dialog;\r\r\tTYPE\r\t\tIntValue = POINTER TO RECORD (Meta.Value)\r\t\t\tint: INTEGER;\r\t\tEND;\r\t\tStrValue = POINTER TO RECORD (Meta.Value)\r\t\t\tstr: Dialog.String;\r\t\tEND;\r\t\tCallHook = POINTER TO RECORD (Dialog.CallHook) END;\r\r\t\t\r\tPROCEDURE (hook: CallHook) Call (IN proc, errorMsg: ARRAY OF CHAR; VAR res: INTEGER);\r\t\tTYPE Ident = Kernel.Name;\r\t\tCONST\r\t\t\tmodNotFound = 10; procNotFound = 11; identExpected = 12; unknownIdent = 13;\r\t\t\tdepositExpected = 14; noDepositExpected = 15; syntaxError = 16;\r\t\t\tlparenExpected = 17; rparenExpected = 18; containerExpected = 19; quoteExpected = 20;\r\t\t\tfileNotFound = 21; noController = 22; noDialog = 23; cannotUnload = 24; commaExpected = 25;\r\t\t\tincompParList = 26;\r\t\tCONST\r\t\t\t ident = 0; dot = 1; semicolon = 2; eot = 3; lparen = 4; rparen = 5; quote = 6; comma = 7; int = 8;\r\t\tVAR\r\t\t\ti, type: INTEGER; ch: CHAR; id: Ident; x: INTEGER;\r\t\t\tpar: ARRAY 100 OF POINTER TO Meta.Value; numPar: INTEGER;\r\t\t\t\r\t\tPROCEDURE Concat (a, b: ARRAY OF CHAR; VAR c: ARRAY OF CHAR);\r\t\t\tVAR i, j: INTEGER; ch: CHAR;\r\t\tBEGIN\r\t\t\tIF a = \" \" THEN Dialog.MapString(\"#System:CommandError\", c) ELSE c := a$ END;\r\t\t\ti := 0; WHILE c[i] # 0X DO INC(i) END;\r\t\t\tc[i] := \" \"; INC(i);\r\t\t\tj := 0; ch := b[0]; WHILE ch # 0X DO c[i] := ch; INC(i); INC(j); ch := b[j] END;\r\t\t\tc[i] := 0X\r\t\tEND Concat;\r\r\t\tPROCEDURE Error (n: INTEGER; msg, par0, par1: ARRAY OF CHAR);\r\t\t\tVAR e, f: ARRAY 256 OF CHAR;\r\t\tBEGIN\r\t\t\tIF res = 0 THEN\r\t\t\t\tres := n;\r\t\t\t\tIF errorMsg # \"\" THEN\r\t\t\t\t\tDialog.MapString(errorMsg, e);\r\t\t\t\t\tDialog.MapParamString(msg, par0, par1, \"\", f);\r\t\t\t\t\tConcat(e, f, f);\r\t\t\t\t\tDialog.ShowMsg(f)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND Error;\r\t\t\r\t\tPROCEDURE Init (VAR s: ARRAY OF CHAR);\r\t\t\tVAR i: INTEGER;\r\t\tBEGIN\r\t\t\ti := 0; WHILE i < LEN(s) DO s[i] := 0X; INC(i) END\r\t\tEND Init;\r\t\t\r\t\tPROCEDURE ShowLoaderResult (IN mod: ARRAY OF CHAR);\r\t\t\tVAR res: INTEGER; importing, imported, object: ARRAY 256 OF CHAR;\r\t\tBEGIN\r\t\t\tKernel.GetLoaderResult(res, importing, imported, object);\r\t\t\tCASE res OF\r\t\t\t| Kernel.fileNotFound:\r\t\t\t\tError(Kernel.fileNotFound, \"#System:CodeFileNotFound\", imported, \"\")\r\t\t\t| Kernel.syntaxError:\r\t\t\t\tError(Kernel.syntaxError, \"#System:CorruptedCodeFileFor\", imported, \"\")\r\t\t\t| Kernel.objNotFound:\r\t\t\t\tError(Kernel.objNotFound, \"#System:ObjNotFoundImpFrom\", imported, importing)\r\t\t\t| Kernel.illegalFPrint:\r\t\t\t\tError(Kernel.illegalFPrint, \"#System:ObjInconsImpFrom\", imported, importing)\r\t\t\t| Kernel.cyclicImport:\r\t\t\t\tError(Kernel.cyclicImport, \"#System:CyclicImpFrom\", imported, importing)\r\t\t\t| Kernel.noMem:\r\t\t\t\tError(Kernel.noMem, \"#System:NotEnoughMemoryFor\", imported, \"\")\r\t\t\tELSE\r\t\t\t\tError(res, \"#System:CannotLoadModule\", mod, \"\")\r\t\t\tEND\r\t\tEND ShowLoaderResult;\r\r\t\tPROCEDURE CallProc (IN mod, proc: ARRAY OF CHAR);\r\t\t\tVAR i, t: Meta.Item; ok: BOOLEAN;\r\t\tBEGIN\r"
                    attr: 0
                  - text: "\t\t\t"
                    attr: 1
                  - text: "ok := FALSE;\r\t\t\tMeta.Lookup(mod, i);\r\t\t\tIF i.obj = Meta.modObj THEN\r\t\t\t\ti.Lookup(proc, i);\r\t\t\t\tIF i.obj = Meta.procObj THEN\r\t\t\t\t\ti.GetReturnType(t);\r\t\t\t\t\tIF (t.typ = 0) & (i.NumParam() = numPar) THEN\r\t\t\t\t\t\ti.ParamCallVal(par, t, ok)\r\t\t\t\t\tELSE ok := FALSE\r\t\t\t\t\tEND;\r\t\t\t\t\tIF ~ok THEN\r\t\t\t\t\t\tError(incompParList, \"#System:IncompatibleParList\", mod, proc)\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\t\tError(Kernel.commNotFound, \"#System:CommandNotFoundIn\", proc, mod)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tShowLoaderResult(mod)\r\t\t\tEND\r\t\tEND CallProc;\r\r\t\tPROCEDURE GetCh;\r\t\tBEGIN\r\t\t\tIF i < LEN(proc) THEN ch := proc[i]; INC(i) ELSE ch := 0X END\r\t\tEND GetCh;\r\r\t\tPROCEDURE Scan;\r\t\t\tVAR j: INTEGER; num: ARRAY 32 OF CHAR; r: INTEGER;\r\t\tBEGIN\r\t\t\tIF res = 0 THEN\r\t\t\t\tWHILE (ch # 0X) & (ch <= \" \") DO GetCh END;\r\t\t\t\tIF ch = 0X THEN\r\t\t\t\t\ttype := eot\r\t\t\t\tELSIF ch = \".\" THEN\r\t\t\t\t\ttype := dot; GetCh\r\t\t\t\tELSIF ch = \";\" THEN\r\t\t\t\t\ttype := semicolon; GetCh\r\t\t\t\tELSIF ch = \"(\" THEN\r\t\t\t\t\ttype := lparen; GetCh\r\t\t\t\tELSIF ch = \")\" THEN\r\t\t\t\t\ttype := rparen; GetCh\r\t\t\t\tELSIF ch = \"'\" THEN\r\t\t\t\t\ttype := quote; GetCh\r\t\t\t\tELSIF ch = \",\" THEN\r\t\t\t\t\ttype := comma; GetCh\r\t\t\t\tELSIF (ch >= \"0\") & (ch <= \"9\") OR (ch = \"-\") THEN\r\t\t\t\t\ttype := int; j := 0;\r\t\t\t\t\tREPEAT num[j] := ch; INC(j); GetCh UNTIL (ch < \"0\") OR (ch > \"9\") & (ch < \"A\") OR (ch > \"H\");\r\t\t\t\t\tnum[j] := 0X; Strings.StringToInt(num, x, r)\r\t\t\t\tELSIF Strings.IsIdentStart(ch) THEN\r\t\t\t\t\ttype := ident;\r\t\t\t\t\tid[0] := ch; j := 1; GetCh;\r\t\t\t\t\tWHILE (ch # 0X) & (i < LEN(proc)) & Strings.IsIdent(ch) DO\r\t\t\t\t\t\tid[j] := ch; INC(j); GetCh\r\t\t\t\t\tEND;\r\t\t\t\t\tid[j] := 0X\r\t\t\t\tELSE Error(syntaxError, \"#System:SyntaxError\", \"\", \"\")\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND Scan;\r\t\t\r\t\tPROCEDURE String (VAR s: ARRAY OF CHAR);\r\t\t\tVAR j: INTEGER;\r\t\tBEGIN\r\t\t\tIF type = quote THEN\r\t\t\t\tj := 0;\r\t\t\t\tWHILE (ch # 0X) & (ch # \"'\") & (j < LEN(s) - 1) DO s[j] := ch; INC(j); GetCh END; s[j] := 0X;\r\t\t\t\tIF ch = \"'\" THEN\r\t\t\t\t\tGetCh; Scan\r\t\t\t\tELSE Error(quoteExpected, \"#System:QuoteExpected\", \"\", \"\")\r\t\t\t\tEND\r\t\t\tELSE Error(quoteExpected, \"#System:QuoteExpected\", \"\", \"\")\r\t\t\tEND\r\t\tEND String;\r\r\t\tPROCEDURE ParamList ();\r\t\t\tVAR iv: IntValue; sv: StrValue;\r\t\tBEGIN\r\t\t\tnumPar := 0;\r\t\t\tIF type = lparen THEN Scan;\r\t\t\t\tWHILE (numPar < LEN(par)) & (type # rparen) & (res = 0) DO\r\t\t\t\t\tIF type = quote THEN\r\t\t\t\t\t\tNEW(sv);\r\t\t\t\t\t\tString(sv.str);\r\t\t\t\t\t\tpar[numPar] := sv;\r\t\t\t\t\t\tINC(numPar)\r\t\t\t\t\tELSIF type = int THEN\r\t\t\t\t\t\tNEW(iv);\r\t\t\t\t\t\tiv.int := x; Scan;\r\t\t\t\t\t\tpar[numPar] := iv;\r\t\t\t\t\t\tINC(numPar)\r\t\t\t\t\tELSE Error(syntaxError, \"#System:SyntaxError\", \"\", \"\")\r\t\t\t\t\tEND;\r\t\t\t\t\tIF type = comma THEN Scan\r\t\t\t\t\tELSIF type # rparen THEN Error(rparenExpected, \"#System:RParenExpected\", \"\", \"\")\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tScan\r\t\t\tEND\r\t\tEND ParamList;\r\r\t\tPROCEDURE Command;\r\t\t\tVAR left, right: Ident;\r\t\tBEGIN\r\t\t\t"
                    attr: 0
                  - text: "(* protect from parasitic anchors on stack *)\r\t\t\t"
                    attr: 1
                  - text: "Init(left); Init(right);\r\t\t\tleft := id; Scan;\r\t\t\tIF type = dot THEN\t"
                    attr: 0
                  - text: "(* Oberon command *)"
                    attr: 1
                  - text: "\r\t\t\t\tScan;\r\t\t\t\tIF type = ident THEN\r\t\t\t\t\tright := id; Scan; ParamList();\r\t\t\t\t\tCallProc(left, right)\r\t\t\t\tELSE Error(identExpected, \"#System:IdentExpected\", \"\", \"\")\r\t\t\t\tEND\r\t\t\tELSE Error(unknownIdent, \"#System:UnknownIdent\", id, \"\")\r\t\t\tEND\r\t\tEND Command;\r\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: "(* protect from parasitic anchors on stack *)"
                    attr: 1
                  - text: "\r\t\ti := 0; type := 0; Init(id); x := 0;\r\t\tViews.ClearQueue;\r\t\tres := 0; i := 0; GetCh;\r\t\tScan;\r\t\tIF type = ident THEN\r\t\t\tCommand; WHILE (type = semicolon) & (res = 0) DO Scan; Command END;\r\t\t\tIF type # eot THEN Error(syntaxError, \"#System:SyntaxError\", \"\", \"\") END\r\t\tELSE Error(syntaxError, \"#System:SyntaxError\", \"\", \"\")\r\t\tEND;\r\t\tIF (res = 0) & (Views.Available() > 0) THEN\r\t\t\tError(noDepositExpected, \"#System:NoDepositExpected\", \"\", \"\")\r\t\tEND;\r\t\tViews.ClearQueue\r\tEND Call;\r\t\r\tPROCEDURE Init;\r\t\tVAR hook: CallHook;\r\tBEGIN\r\t\tNEW(hook); Dialog.SetCallHook(hook)\r\tEND Init;\r\rBEGIN\r\tInit\rEND StdInterpreter.\r"
                    attr: 0
