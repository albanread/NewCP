                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r(* headers / footers support the following macros:\r\r"
                    attr: 0
                  - text: "\t\t\t&p - replaced by current page number as arabic numeral\r\t\t\t&r - replaced by current page number as roman numeral\r\t\t\t&R - replaced by current page number as capital roman numeral\r\t\t\t&a - replaced by current page number as alphanumeric character\r\t\t\t&A - replaced by current page number as capital alphanumeric character\r\t\t\t&d - replaced by printing date \r\t\t\t&t - replaced by printing time\r\t\t\t&&- replaced by & character\r\t\t\t&; - specifies split point\r\t\t\t&f - filename with path/title\r"
                    attr: 1
                  - text: "\r*)\r\r\tIMPORT\r\t\tStores, Ports, Models, Views, Properties, Printing, TextModels, Fonts, Dialog,\r\t\tTextViews, Dates, Windows, Controllers, Containers;\r\r\tCONST\r\t\tminVersion = 0; maxVersion = 2;\r\t\tmm = Ports.mm; point = Ports.point;\r\t\tmaxWidth = 10000 * mm;\r\t\talternate* = 0; number* = 1; head* = 2; foot* = 3; showFoot* = 4;\r\r\tTYPE\r\t\tBanner* = RECORD\r\t\t\tleft*, right*: ARRAY 128 OF CHAR;\r\t\t\tgap*: INTEGER\r\t\tEND;\r\t\t\r\t\tNumberInfo* = RECORD\r\t\t\tnew*: BOOLEAN;\r\t\t\tfirst*: INTEGER\r\t\tEND;\r\t\t\r\t\tView = POINTER TO RECORD (Views.View)\r\t\t\talternate: BOOLEAN;\t"
                    attr: 0
                  - text: "(* alternate left/right *)"
                    attr: 1
                  - text: "\r\t\t\tnumber: NumberInfo;\t"
                    attr: 0
                  - text: "(* new page number *)"
                    attr: 1
                  - text: "\r\t\t\thead, foot: Banner;\r\t\t\tfont: Fonts.Font;\r\t\t\tshowFoot: BOOLEAN;\r\t\tEND;\r\r\t\t"
                    attr: 0
                  - text: Prop
                    attr: 3
                  - text: "* = POINTER TO RECORD (Properties.Property)\r\t\t\talternate*, showFoot*: BOOLEAN;\r\t\t\tnumber*: NumberInfo;\r\t\t\thead*, foot*: Banner\r\t\tEND;\r\r\t\tChangeFontOp = POINTER TO RECORD (Stores.Operation)\r\t\t\theader: View;\r\t\t\tfont: Fonts.Font\r\t\tEND;\r\r\t\tChangeAttrOp = POINTER TO RECORD (Stores.Operation)\r\t\t\theader: View;\r\t\t\talternate, showFoot: BOOLEAN;\r\t\t\tnumber: NumberInfo;\r\t\t\thead, foot: Banner\r\t\tEND;\r\r\tVAR\r\t\t"
                    attr: 0
                  - text: dialog
                    attr: 3
                  - text: "*: RECORD\r\t\t\tview: View;\r\t\t\talternate*, showFoot*: BOOLEAN;\r\t\t\tnumber*: NumberInfo;\r\t\t\thead*, foot*: Banner;\r\t\tEND;\r\t\t\r\tPROCEDURE (p: Prop) "
                    attr: 0
                  - text: IntersectWith
                    attr: 3
                  - text: "* (q: Properties.Property; OUT equal: BOOLEAN);\r\t\tVAR valid: SET;\r\t\tPROCEDURE Equal(IN b1, b2: Banner): BOOLEAN;\r\t\tBEGIN\r\t\t\tRETURN (b1.left = b2.left) & (b1.right = b2.right) & (b1.gap = b2.gap)\r\t\tEND Equal;\r\tBEGIN\r\t\tWITH q: Prop DO\r\t\t\tvalid := p.valid * q.valid; equal := TRUE;\r\t\t\tIF p.alternate # q.alternate THEN EXCL(valid, alternate) END;\r\t\t\tIF p.showFoot # q.showFoot THEN EXCL(valid, showFoot) END;\r\t\t\tIF (p.number.new # q.number.new) OR (p.number.first # q.number.first) THEN EXCL(valid, number) END;\r\t\t\tIF ~Equal(p.head, q.head) THEN EXCL(valid, head) END;\r\t\t\tIF ~Equal(p.foot, q.foot) THEN EXCL(valid, foot) END;\r\t\t\tIF p.valid # valid THEN p.valid := valid; equal := FALSE END\r\t\tEND\r\tEND IntersectWith;\r\t\t\r\t"
                    attr: 0
                  - text: "(* SetAttrOp *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (op: ChangeFontOp) Do;\r\t\tVAR v: View; font: Fonts.Font; asc, dsc, w: INTEGER; c: Models.Context;\r\tBEGIN\r\t\tv := op.header;\r\t\tfont := op.font; op.font := v.font; v.font := font;\r\t\tfont.GetBounds(asc, dsc, w);\r\t\tc := v.context;\r\t\tc.SetSize(maxWidth, asc + dsc + 2*point);\r\t\tViews.Update(v, Views.keepFrames)\r\tEND Do;\r\r\tPROCEDURE DoChangeFontOp (v: View; font: Fonts.Font);\r\t\tVAR op: ChangeFontOp;\r\tBEGIN\r\t\tIF v.font # font THEN\r\t\t\tNEW(op); op.header := v; op.font := font;\r\t\t\tViews.Do(v,   \"#System:SetProp\", op)\r\t\tEND\r\tEND DoChangeFontOp;\r\r\tPROCEDURE (op: ChangeAttrOp) Do;\r\t\tVAR v: View; alternate, showFoot: BOOLEAN; number: NumberInfo; head, foot: Banner;\r\tBEGIN\r\t\tv := op.header;\r\t\talternate := op.alternate; showFoot := op.showFoot; number := op.number; head := op.head; foot := op.foot;\r\t\top.alternate := v.alternate; op.showFoot := v.showFoot; op.number := v.number; op.head := v.head;\r\t\top.foot := v.foot;\r\t\tv.alternate := alternate; v.showFoot := showFoot; v.number := number; v.head := head; v.foot := foot;\r\t\tViews.Update(v, Views.keepFrames)\r\tEND Do;\r\r\tPROCEDURE DoChangeAttrOp (v: View; alternate, showFoot: BOOLEAN; number: NumberInfo;\r\t\t\t\t\t\t\t\t\t\t\t\t\thead, foot: Banner);\r\t\tVAR op: ChangeAttrOp;\r\tBEGIN\r\t\tNEW(op); op.header := v; op.alternate := alternate; op.showFoot := showFoot; \r\t\top.number := number; op.head := head; op.foot := foot;\r\t\tViews.Do(v,   \"#Std:HeaderChange\", op)\r\tEND DoChangeAttrOp;\r\r\tPROCEDURE (v: View) CopyFromSimpleView (source: Views.View);\r\tBEGIN\r\t\tWITH source: View DO\r\t\t\tv.alternate := source.alternate;\r\t\t\tv.number.new := source.number.new; v.number.first := source.number.first;\r\t\t\tv.head := source.head;\r\t\t\tv.foot := source.foot;\r\t\t\tv.font := source.font;\r\t\t\tv.showFoot := source.showFoot\r\t\tEND\r\tEND CopyFromSimpleView;\r\r\tPROCEDURE (v: View) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\tv.Externalize^(wr);\r\t\twr.WriteVersion(maxVersion);\r\t\twr.WriteString(v.head.left);\r\t\twr.WriteString(v.head.right);\r\t\twr.WriteInt(v.head.gap);\r\t\twr.WriteString(v.foot.left);\r\t\twr.WriteString(v.foot.right);\r\t\twr.WriteInt(v.foot.gap);\r\t\twr.WriteString(v.font.typeface);\r\t\twr.WriteInt(v.font.size);\r\t\twr.WriteSet(v.font.style);\r\t\twr.WriteInt(v.font.weight);\r\t\twr.WriteBool(v.alternate);\r\t\twr.WriteBool(v.number.new);\r\t\twr.WriteInt(v.number.first);\r\t\twr.WriteBool(v.showFoot);\r\tEND Externalize;\r\t\r\tPROCEDURE (v: View) Internalize (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER; typeface: Fonts.Typeface; size: INTEGER; style: SET; weight: INTEGER;\r\r\tBEGIN\r\t\tv.Internalize^(rd);\r\t\tIF ~rd.cancelled THEN\r\t\t\trd.ReadVersion(minVersion, maxVersion, version);\r\t\t\tIF ~rd.cancelled THEN\r\t\t\t\tIF version = 0 THEN\r\t\t\t\t\trd.ReadXString(v.head.left);\r\t\t\t\t\trd.ReadXString(v.head.right); \r\t\t\t\t\tv.head.gap := 5*mm;\r\t\t\t\t\trd.ReadXString(v.foot.left);\r\t\t\t\t\trd.ReadXString(v.foot.right);\r\t\t\t\t\tv.foot.gap := 5*mm;\r\t\t\t\t\trd.ReadXString(typeface);\r\t\t\t\t\trd.ReadXInt(size); \r\t\t\t\t\tv.font := Fonts.dir.This(typeface, size * point, {}, Fonts.normal);\r\t\t\t\t\trd.ReadXInt(v.number.first);\r\t\t\t\t\trd.ReadBool(v.number.new);\r\t\t\t\t\trd.ReadBool(v.alternate)\r\t\t\t\tELSE\r\t\t\t\t\trd.ReadString(v.head.left);\r\t\t\t\t\trd.ReadString(v.head.right);\r\t\t\t\t\trd.ReadInt(v.head.gap);\r\t\t\t\t\trd.ReadString(v.foot.left);\r\t\t\t\t\trd.ReadString(v.foot.right);\r\t\t\t\t\trd.ReadInt(v.foot.gap);\r\t\t\t\t\trd.ReadString(typeface);\r\t\t\t\t\trd.ReadInt(size);\r\t\t\t\t\trd.ReadSet(style);\r\t\t\t\t\trd.ReadInt(weight);\r\t\t\t\t\tv.font := Fonts.dir.This(typeface, size, style, weight);\r\t\t\t\t\trd.ReadBool(v.alternate);\r\t\t\t\t\trd.ReadBool(v.number.new);\r\t\t\t\t\trd.ReadInt(v.number.first);\r\t\t\t\t\tIF version = 2 THEN rd.ReadBool(v.showFoot) ELSE v.showFoot := FALSE END\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE SetProp(v: View; msg: Properties.SetMsg);\r\t\tVAR p: Properties.Property;\r\t\t\ttypeface: Fonts.Typeface; size: INTEGER; style: SET; weight: INTEGER;\r\t\t\talt, sf: BOOLEAN; num: NumberInfo; h, f: Banner;\r \tBEGIN\r\t\tp := msg.prop;\r\t\tWHILE p # NIL DO\r\t\t\tWITH p: Properties.StdProp DO\r\t\t\t\tIF Properties.typeface IN p.valid THEN typeface := p.typeface \r\t\t\t\tELSE typeface := v.font.typeface\r\t\t\t\tEND;\r\t\t\t\tIF Properties.size IN p.valid THEN size := p.size \r\t\t\t\tELSE size := v.font.size\r\t\t\t\tEND;\r\t\t\t\tIF Properties.style IN p.valid THEN style := p.style.val\r\t\t\t\tELSE style := v.font.style\r\t\t\t\tEND;\r\t\t\t\tIF Properties.weight IN p.valid THEN weight := p.weight \r\t\t\t\tELSE weight := v.font.weight\r\t\t\t\tEND;\r\t\t\t\tDoChangeFontOp (v, Fonts.dir.This(typeface, size, style, weight) );\r\t\t\t| p: Prop DO\r\t\t\t\tIF alternate IN p.valid THEN alt := p.alternate ELSE alt := v.alternate END;\r\t\t\t\tIF showFoot IN p.valid THEN sf := p.showFoot ELSE sf := v.showFoot END;\r\t\t\t\tIF number IN p.valid THEN num := p.number ELSE num := v.number END;\r\t\t\t\tIF head IN p.valid THEN h := p.head ELSE h := v.head END;\r\t\t\t\tIF foot IN p.valid THEN f := p.foot ELSE f := v.foot END;\r\t\t\t\tDoChangeAttrOp(v, alt, sf, num, h, f)\r\t\t\tELSE\r\t\t\tEND;\r\t\t\tp := p.next\r\t\tEND\r\tEND SetProp;\r\t\r\tPROCEDURE PollProp(v: View; VAR msg: Properties.PollMsg);\r\t\tVAR sp: Properties.StdProp; p: Prop;\r\tBEGIN\r\t\tNEW(sp);\r\t\tsp.known := {Properties.size, Properties.typeface, Properties.style, Properties.weight};\r\t\tsp.valid := sp.known;\r\t\tsp.size := v.font.size; sp.typeface := v.font.typeface; \r\t\tsp.style.val := v.font.style; sp.style.mask := {Fonts.italic, Fonts.underline, Fonts.strikeout};\r\t\tsp.weight := v.font.weight;\r\t\tProperties.Insert(msg.prop, sp);\r\t\tNEW(p);\r\t\tp.known := {alternate, number, head, foot, showFoot}; p.valid := p.known;\r\t\tp.head := v.head; p.foot := v.foot;\r\t\tp.alternate := v.alternate;\r\t\tp.showFoot := v.showFoot;\r\t\tp.number := v.number;\r\t\tProperties.Insert(msg.prop, p)\r\tEND PollProp;\r\t\r\tPROCEDURE PageMsg(v: View; msg: TextViews.PageMsg);\r\tBEGIN\r\t\tIF Printing.par # NIL THEN\r\t\t\tDialog.MapString(v.head.left, Printing.par.header.left);\r\t\t\tDialog.MapString(v.head.right, Printing.par.header.right);\r\t\t\tDialog.MapString(v.foot.left, Printing.par.footer.left);\r\t\t\tDialog.MapString(v.foot.right, Printing.par.footer.right);\r\t\t\tPrinting.par.header.font := v.font;\r\t\t\tPrinting.par.footer.font := v.font;\r\t\t\tPrinting.par.page.alternate := v.alternate;\r\t\t\tIF v.number.new THEN\r\t\t\t\tPrinting.par.page.first := v.number.first - msg.current\r\t\t\tEND;\r\t\t\tPrinting.par.header.gap := 5*Ports.mm;\r\t\t\tPrinting.par.footer.gap := 5*Ports.mm\r\t\tEND\r\tEND PageMsg;\r\r\tPROCEDURE (v: View) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR d, w, h: INTEGER; (*line: Line; *)asc, dsc, x0, x1, y: INTEGER;\r\t\t\twin: Windows.Window; title: Views.Title; dec: BOOLEAN;\r\t\t\tpw, ph: INTEGER;\r\t\t\tdate: Dates.Date; time: Dates.Time; pageInfo: Printing.PageInfo; banner: Printing.Banner;\r\tBEGIN\r\t\tIF Views.IsPrinterFrame(f) THEN (* am drucken *) END;\r\r\t\tv.font.GetBounds(asc, dsc, w);\r\r\t\twin := Windows.dir.First();\r\t\tWHILE (win # NIL) & (win.doc.Domain() # v.Domain()) DO win := Windows.dir.Next(win) END;\r\t\tIF win = NIL THEN title := \"(\" + Dialog.appName + \")\"\r\t\tELSE win.GetTitle(title)\r\t\tEND;\r\t\td := f.dot; \r\t\tv.context.GetSize(w, h);\r\t\twin.doc.PollPage(pw, ph, l, t, r, b, dec);\r\t\tw := r - l;\r\r\t\tf.DrawRect(0, 0, w, h, Ports.fill, Ports.grey25);\r\t\tf.DrawRect(0, 0, w, h, 0, Ports.black);\r\t\t\r\t\tx0 := d; x1 := w-2*d; y := asc + d;\r\r\t\tDates.GetDate(date);\r\t\tDates.GetTime(time);\r\t\tpageInfo.alternate := FALSE;\r\t\tpageInfo.title := title;\r\t\tbanner.font := v.font;\t\t\r\t\tIF v.showFoot THEN\r\t\t\tbanner.gap := v.foot.gap;\r\t\t\tDialog.MapString(v.foot.left, banner.left); Dialog.MapString(v.foot.right, banner.right)\r\t\tELSE\r\t\t\tbanner.gap := v.head.gap;\r\t\t\tDialog.MapString(v.head.left, banner.left); Dialog.MapString(v.head.right, banner.right)\r\t\tEND;\r\t\tPrinting.PrintBanner(f, pageInfo, banner, date, time, x0, x1, y)\r\tEND Restore;\r\r\tPROCEDURE (v: View) HandlePropMsg (VAR msg: Properties.Message);\r\t\tVAR asc, dsc, w: INTEGER;\r\tBEGIN\r\t\tWITH msg: Properties.SizePref DO\r\t\t\tmsg.w := maxWidth; \r\t\t\tIF msg.h = Views.undefined THEN\r\t\t\t\tv.font.GetBounds(asc, dsc, w);\r\t\t\t\tmsg.h := asc + dsc + 2*point\r\t\t\t END\r\t\t| msg: Properties.ResizePref DO\r\t\t\tmsg.fixed := TRUE\r\t\t| msg: TextModels.Pref DO\r\t\t\tmsg.opts := {TextModels.hideable}\r\t\t| msg: Properties.PollMsg DO\r\t\t\tPollProp(v, msg)\r\t\t| msg: Properties.SetMsg DO\r\t\t\tSetProp(v, msg)\r\t\t| msg: TextViews.PageMsg DO\r\t\t\tPageMsg(v, msg)\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\t\r\tPROCEDURE (v: View) HandleCtrlMsg (f: Views.Frame; VAR msg: Controllers.Message;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\tBEGIN\r\t\tWITH msg: Properties.EmitMsg DO Views.HandlePropMsg(v, msg.set)\r\t\t| msg: Properties.CollectMsg DO Views.HandlePropMsg(v, msg.poll)\r\t\tELSE\r\t\tEND\r\tEND HandleCtrlMsg;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: New
                    attr: 3
                  - text: "*(p: Prop; f: Fonts.Font): Views.View;\r\t\tVAR v: View;\r\tBEGIN\r\t\tNEW(v);\r\t\tv.head := p.head;\r\t\tv.foot := p.foot;\r\t\tv.number := p.number;\r\t\tv.alternate := p.alternate;\r\t\tv.font := f; \r\t\tv.showFoot := FALSE;\r\t\tRETURN v;\t\r\tEND New;\r\r\tPROCEDURE "
                    attr: 0
                  - text: Deposit
                    attr: 3
                  - text: "*;\r\t\tVAR v: View;\r\tBEGIN\r\t\tNEW(v);\r\t\tv.head.left := \"\"; v.head.right :=  \"&d&;&p\"; v.head.gap := 5*mm;\r\t\tv.foot.left := \"\"; v.foot.right := \"\"; v.foot.gap := 5*mm;\r\t\tv.font := Fonts.dir.Default();\r\t\tv.number.first := 1; v.number.new := FALSE; v.alternate := FALSE; v.showFoot := FALSE;\r\t\tViews.Deposit(v)\r\tEND Deposit;\r\t\r"
                    attr: 0
                  - text: "\t(* property dialog *)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: InitDialog
                    attr: 3
                  - text: "*;\r\t\tVAR  p: Properties.Property;\r\tBEGIN\r\t\tProperties.CollectProp(p);\r\t\tWHILE p # NIL DO\r\t\t\tWITH p: Properties.StdProp DO\r\t\t\t| p: Prop DO\r\t\t\t\tdialog.alternate := p.alternate; dialog.showFoot := p.showFoot;\r\t\t\t\tdialog.number := p.number;\r\t\t\t\tdialog.head := p.head; dialog.head.gap := dialog.head.gap DIV point;\r\t\t\t\tdialog.foot := p.foot; dialog.foot.gap := dialog.foot.gap DIV point;\r\t\t\t\tDialog.Update(dialog)\r\t\t\tELSE\r\t\t\tEND;\r\t\t\tp := p.next\r\t\tEND\r\tEND InitDialog;\r\t\r\tPROCEDURE "
                    attr: 0
