                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Dialog, Ports, Services, Stores, Models, Views, Properties, Controllers, StdCFrames;\r\t\r\t\r\tCONST\r\t\t"
                    attr: 0
                  - text: "(* properties & options *)"
                    attr: 1
                  - text: "\r\t\t"
                    attr: 0
                  - text: "horBar* "
                    attr: 3
                  - text: "= 0; "
                    attr: 0
                  - text: verBar
                    attr: 3
                  - text: "* = 1; "
                    attr: 0
                  - text: horHide
                    attr: 3
                  - text: "* = 2; "
                    attr: 0
                  - text: verHide
                    attr: 3
                  - text: "* = 3; "
                    attr: 0
                  - text: width
                    attr: 3
                  - text: "* = 4; "
                    attr: 0
                  - text: height
                    attr: 3
                  - text: "* = 5; "
                    attr: 0
                  - text: showBorder
                    attr: 3
                  - text: "* = 6; "
                    attr: 0
                  - text: savePos
                    attr: 3
                  - text: "* = 7;\r\t\t\r\r\tTYPE\r\t\t"
                    attr: 0
                  - text: Prop
                    attr: 3
                  - text: "* = POINTER TO RECORD (Properties.Property)\r\t\t\thorBar*, verBar*: BOOLEAN;\r\t\t\thorHide*, verHide*: BOOLEAN;\r\t\t\twidth*, height*: INTEGER;\r\t\t\tshowBorder*: BOOLEAN;\r\t\t\tsavePos*: BOOLEAN\r\t\tEND;\r\t\t\r\t\tScrollBar = POINTER TO RECORD (Views.View)\r\t\t\tv: View;\r\t\t\tver: BOOLEAN\r\t\tEND;\r\t\t\r\t\tInnerView = POINTER TO RECORD (Views.View)\r\t\t\tv: View\r\t\tEND;\r\t\t\r\t\tView = POINTER TO RECORD (Views.View);\r\t\t\tview: Views.View;\r\t\t\tsbW: INTEGER;\r\t\t\torgX, orgY: INTEGER;\r\t\t\tw, h: INTEGER;\t\t\t\t\t\t"
                    attr: 0
                  - text: "(* = 0: adapt to container *)"
                    attr: 1
                  - text: "\r\t\t\topts: SET;\r\t\t\t"
                    attr: 0
                  - text: "(* not persistent *)"
                    attr: 1
                  - text: "\r\t\t\thor, ver: ScrollBar;\r\t\t\tinner: InnerView;\r\t\t\trgap, bgap: INTEGER;"
                    attr: 0
                  - text: "\t\t\t\t(* = 0: no scrollbar *)"
                    attr: 1
                  - text: "\r\t\t\tborder: INTEGER;\r\t\t\tupdate: Action\r\t\tEND;\r\t\t\r\t\tContext = POINTER TO RECORD (Models.Context)\r\t\t\tv: View;\r\t\t\ttype: INTEGER\r\t\tEND;\r\t\t\r\t\tAction = POINTER TO RECORD (Services.Action)\r\t\t\tv: View\r\t\tEND;\r\t\r\t\tOp = POINTER TO RECORD (Stores.Operation)\r\t\t\tv: View;\r\t\t\tp: Prop\r\t\tEND;\r\t\t\r\t\tSOp = POINTER TO RECORD (Stores.Operation)\r\t\t\tv: View;\r\t\t\tx, y: INTEGER\r\t\tEND;\r\t\t\r\t\tUpdateMsg = RECORD (Views.Message)\r\t\t\tchanged: BOOLEAN\r\t\tEND;\r\r\t\r\tVAR\r\t\t"
                    attr: 0
                  - text: dialog
                    attr: 3
                  - text: "*: RECORD\r\t\t\thorizontal*, vertical*: RECORD\r\t\t\t\tmode*: INTEGER;\r\t\t\t\tadapt*: BOOLEAN;\r\t\t\t\tsize*: REAL\r\t\t\tEND;\r\t\t\tshowBorder*: BOOLEAN;\r\t\t\tsavePos*: BOOLEAN;\r\t\t\tvalid, readOnly: SET\r\t\tEND;\r\t\t\r\r\t"
                    attr: 0
                  - text: "(* tools *)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE CheckPos (v: View; VAR x, y: INTEGER);\r\t\tVAR w, h: INTEGER;\r\tBEGIN\r\t\tv.context.GetSize(w, h);\r\t\tDEC(w, v.rgap + 2 * v.border);\r\t\tDEC(h, v.bgap + 2 * v.border);\r\t\tIF x > v.w - w THEN x := v.w - w END;\r\t\tIF x < 0 THEN x := 0 END;\r\t\tIF y > v.h - h THEN y := v.h - h END;\r\t\tIF y < 0 THEN y := 0 END\r\tEND CheckPos;\r\t\r\tPROCEDURE InnerFrame (v: View; f: Views.Frame): Views.Frame;\r\t\tVAR g, h: Views.Frame;\r\tBEGIN\r\t\tg := Views.ThisFrame(f, v.inner);\r\t\tIF g = NIL THEN\r\t\t\tViews.InstallFrame(f, v.inner, v.border, v.border, 0, TRUE);\r\t\t\tg := Views.ThisFrame(f, v.inner)\r\t\tEND;\r\t\tIF g # NIL THEN\r\t\t\th := Views.ThisFrame(g, v.view);\r\t\t\tIF h = NIL THEN\r\t\t\t\tViews.InstallFrame(g, v.view, -v.orgX, -v.orgY, 0, TRUE);\r\t\t\t\th := Views.ThisFrame(g, v.view)\r\t\t\tEND\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " h\r\tEND InnerFrame;\r\r\tPROCEDURE Scroll (v: View; dir: INTEGER; ver: BOOLEAN; p: INTEGER; OUT pos: INTEGER);\r\t\tVAR x, y: INTEGER; last: Stores.Operation; op: SOp;\r\tBEGIN\r\t\tx := v.orgX; y := v.orgY;\r\t\tIF ver THEN pos := y ELSE pos := x END;\r\t\tIF dir = StdCFrames.lineUp THEN\r\t\t\tDEC(pos, 10 * Ports.mm)\r\t\tELSIF dir = StdCFrames.lineDown THEN\r\t\t\tINC(pos, 10 * Ports.mm)\r\t\tELSIF dir = StdCFrames.pageUp THEN\r\t\t\tDEC(pos, 40 * Ports.mm)\r\t\tELSIF dir = StdCFrames.pageDown THEN\r\t\t\tINC(pos, 40 * Ports.mm)\r\t\tELSIF dir = Controllers.gotoPos THEN\r\t\t\tpos := p\r\t\tEND;\r\t\tIF ver THEN CheckPos(v, x, pos); y := pos\r\t\tELSE CheckPos(v, pos, y); x := pos\r\t\tEND;\r\t\tIF (x # v.orgX) OR (y # v.orgY) THEN\r\t\t\tlast := Views.LastOp(v);\r\t\t\tIF ~(savePos IN v.opts) OR (last # NIL) & (last IS SOp) THEN\r\t\t\t\tv.orgX := x; v.orgY := y;\r\t\t\t\tViews.Update(v.view, Views.keepFrames)\r\t\t\tELSE\r\t\t\t\tNEW(op); op.v := v; op.x := x; op.y := y;\r\t\t\t\tViews.Do(v, \"#System:Scrolling\", op)\r\t\t\tEND\r\t\tEND\r\tEND Scroll;\r\t\r\tPROCEDURE PollSection (v: View; ver: BOOLEAN; OUT size, sect, pos: INTEGER);\r\t\tVAR w, h: INTEGER;\r\tBEGIN\r\t\tv.context.GetSize(w, h);\r\t\tIF ver THEN size := v.h; sect := h - v.bgap - 2 * v.border; pos := v.orgY\r\t\tELSE size := v.w; sect := w - v.rgap - 2 * v.border; pos := v.orgX\r\t\tEND\r\tEND PollSection;\r\t\r\t\r\t"
                    attr: 0
                  - text: "(* SOp *)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE (op: SOp) Do;\r\t\tVAR x, y: INTEGER;\r\tBEGIN\r\t\tx := op.x; op.x := op.v.orgX; op.v.orgX := x;\r\t\ty := op.y; op.y := op.v.orgY; op.v.orgY := y;\r\t\tViews.Update(op.v.view, Views.keepFrames)\r\tEND Do;\r\t\r\r\t"
                    attr: 0
                  - text: "(* properties *)\r\t\r"
                    attr: 1
                  - text: "\tPROCEDURE (p: Prop) IntersectWith* (q: Properties.Property; OUT equal: BOOLEAN);\r\t\tVAR valid: SET;\r\tBEGIN\r\t\tWITH q: Prop DO\r\t\t\tvalid := p.valid * q.valid; equal := TRUE;\r\t\t\tIF p.horBar # q.horBar THEN EXCL(valid, horBar) END;\r\t\t\tIF p.verBar # q.verBar THEN EXCL(valid, verBar) END;\r\t\t\tIF p.horHide # q.horHide THEN EXCL(valid, horHide) END;\r\t\t\tIF p.verHide # q.verHide THEN EXCL(valid, verHide) END;\r\t\t\tIF p.width # q.width THEN EXCL(valid, width) END;\r\t\t\tIF p.height # q.height THEN EXCL(valid, height) END;\r\t\t\tIF p.showBorder # q.showBorder THEN EXCL(valid, showBorder) END;\r\t\t\tIF p.savePos # q.savePos THEN EXCL(valid, savePos) END;\r\t\t\tIF p.valid # valid THEN p.valid := valid; equal := FALSE END\r\t\tEND\r\tEND IntersectWith;\r\t\r\tPROCEDURE SetProp (v: View; p: Properties.Property);\r\t\tVAR op: Op;\r\tBEGIN\r\t\tWITH p: Prop DO\r\t\t\tNEW(op); op.v := v; op.p := p;\r\t\t\tViews.Do(v, \"#System:SetProp\", op)\r\t\tEND\r\tEND SetProp;\r\t\r\tPROCEDURE PollProp (v: View; OUT prop: Prop);\r\t\tVAR p: Prop;\r\tBEGIN\r\t\tNEW(p);\r\t\tp.valid := {horBar, verBar, horHide, verHide, width, height, showBorder, savePos};\r\t\tp.readOnly := {width, height} - v.opts;\r\t\tp.horBar := horBar IN v.opts;\r\t\tp.verBar := verBar IN v.opts;\r\t\tp.horHide := horHide IN v.opts;\r\t\tp.verHide := verHide IN v.opts;\r\t\tp.width := v.w;\r\t\tp.height := v.h;\r\t\tp.showBorder := showBorder IN v.opts;\r\t\tp.savePos := savePos IN v.opts;\r\t\tp.known := p.valid; prop := p\r\tEND PollProp;\r\t\r\t\r"
                    attr: 0
                  - text: "\t(* Op *)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE (op: Op) Do;\r\t\tVAR p: Prop; v: View; valid: SET;\r\tBEGIN\r\t\tv := op.v; p := op.p; PollProp(v, op.p); op.p.valid := p.valid;\r\t\tvalid := p.valid * ({horBar, verBar, horHide, verHide, showBorder, savePos} + v.opts * {width, height});\r\t\tIF horBar IN valid THEN\r\t\t\tIF p.horBar THEN INCL(v.opts, horBar) ELSE EXCL(v.opts, horBar) END\r\t\tEND;\r\t\tIF verBar IN valid THEN\r\t\t\tIF p.verBar THEN INCL(v.opts, verBar) ELSE EXCL(v.opts, verBar) END\r\t\tEND;\r\t\tIF horHide IN valid THEN\r\t\t\tIF p.horHide THEN INCL(v.opts, horHide) ELSE EXCL(v.opts, horHide) END\r\t\tEND;\r\t\tIF verHide IN valid THEN\r\t\t\tIF p.verHide THEN INCL(v.opts, verHide) ELSE EXCL(v.opts, verHide) END\r\t\tEND;\r\t\tIF width IN valid THEN v.w := p.width END;\r\t\tIF height IN valid THEN v.h := p.height END;\r\t\tIF showBorder IN valid THEN\r\t\t\tIF p.showBorder THEN INCL(v.opts, showBorder); v.border := 2 * Ports.point\r\t\t\tELSE EXCL(v.opts, showBorder); v.border := 0\r\t\t\tEND\r\t\tEND;\r\t\tIF savePos IN valid THEN\r\t\t\tIF p.savePos THEN INCL(v.opts, savePos) ELSE EXCL(v.opts, savePos) END\r\t\tEND;\r\t\tViews.Update(v, Views.rebuildFrames)\r\tEND Do;\r\t\r\t\r"
                    attr: 0
                  - text: "\t(* Action *)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE (a: Action) Do;\r\t\tVAR msg: UpdateMsg;\r\tBEGIN\r\t\tmsg.changed := FALSE;\r\t\tViews.Broadcast(a.v, msg);\r\t\tIF msg.changed THEN Views.Update(a.v, Views.keepFrames)\r\t\tELSE\r\t\t\tViews.Broadcast(a.v.hor, msg);\r\t\t\tViews.Broadcast(a.v.ver, msg)\r\t\tEND\r\tEND Do;\r\t\r\t\r\t"
                    attr: 0
                  - text: "(* ScrollBars *)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE TrackSB (f: StdCFrames.ScrollBar; dir: INTEGER; VAR pos: INTEGER);\r\t\tVAR s: ScrollBar; msg: Controllers.ScrollMsg; pmsg: Controllers.PollSectionMsg; host, inner: Views.Frame;\r\tBEGIN\r\t\ts := f.view(ScrollBar); host := Views.HostOf(f);\r\t\tmsg.focus := FALSE; msg.vertical := s.ver;\r\t\tmsg.op := dir; msg.done := FALSE;\r\t\tinner := InnerFrame(s.v, host);\r\t\tIF inner # NIL THEN Views.ForwardCtrlMsg(inner, msg) END;\r\t\tIF msg.done THEN\r\t\t\tpmsg.focus := FALSE; pmsg.vertical := s.ver;\r\t\t\tpmsg.valid := FALSE; pmsg.done := FALSE;\r\t\t\tinner := InnerFrame(s.v, host);\r\t\t\tIF inner # NIL THEN Views.ForwardCtrlMsg(inner, pmsg) END;\r\t\t\tIF pmsg.done THEN\r\t\t\t\tpos := pmsg.partPos\r\t\t\tEND\r\t\tELSE\r\t\t\tScroll(s.v, dir, s.ver, 0, pos);\r\t\t\tViews.ValidateRoot(Views.RootOf(host))\r\t\tEND\r\tEND TrackSB;\r\r\tPROCEDURE SetSB (f: StdCFrames.ScrollBar; pos: INTEGER);\r\t\tVAR s: ScrollBar; msg: Controllers.ScrollMsg; p: INTEGER; host, inner: Views.Frame;\r\tBEGIN\r\t\ts := f.view(ScrollBar); host := Views.HostOf(f);\r\t\tmsg.focus := FALSE; msg.vertical := s.ver;\r\t\tmsg.op := Controllers.gotoPos; msg.pos := pos;\r\t\tmsg.done := FALSE;\r\t\tinner := InnerFrame(s.v, host);\r\t\tIF inner # NIL THEN Views.ForwardCtrlMsg(inner, msg) END;\r\t\tIF ~msg.done THEN\r\t\t\tScroll(s.v, Controllers.gotoPos, s.ver, pos, p);\r\t\t\tViews.ValidateRoot(Views.RootOf(host))\r\t\tEND\r\tEND SetSB;\r\r\tPROCEDURE GetSB (f: StdCFrames.ScrollBar; OUT size, sect, pos: INTEGER);\r\t\tVAR s: ScrollBar; msg: Controllers.PollSectionMsg; host, inner: Views.Frame;\r\tBEGIN\r\t\ts := f.view(ScrollBar); host := Views.HostOf(f);\r\t\tmsg.focus := FALSE; msg.vertical := s.ver;\r\t\tmsg.wholeSize := 1; msg.partSize := 0; msg.partPos := 0;\r\t\tmsg.valid := FALSE; msg.done := FALSE;\r\t\tinner := InnerFrame(s.v, host);\r\t\tIF inner # NIL THEN Views.ForwardCtrlMsg(inner, msg) END;\r\t\tIF msg.done THEN\r\t\t\tIF msg.valid THEN\r\t\t\t\tsize := msg.wholeSize; sect := msg.partSize; pos := msg.partPos\r\t\t\tELSE\r\t\t\t\tsize := 1; sect := 1; pos := 0\r\t\t\tEND\r\t\tELSE\r\t\t\tPollSection(s.v, s.ver, size, sect, pos)\r\t\tEND\r\tEND GetSB;\r\r\tPROCEDURE (s: ScrollBar) GetNewFrame (VAR frame: Views.Frame);\r\t\tVAR f: StdCFrames.ScrollBar;\r\tBEGIN\r\t\tf := StdCFrames.dir.NewScrollBar();\r\t\tf.disabled := FALSE; f.undef := FALSE; f.readOnly := FALSE;\r\t\tf.Track := TrackSB; f.Get := GetSB; f.Set := SetSB;\r\t\tframe := f\r\tEND GetNewFrame;\r\r\tPROCEDURE (s: ScrollBar) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tWITH f: StdCFrames.Frame DO f.Restore(l, t, r, b) END\r\tEND Restore;\r\t\r\tPROCEDURE (s: ScrollBar) HandleCtrlMsg (f: Views.Frame; VAR msg: Controllers.Message;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\tBEGIN\r\t\tWITH f: StdCFrames.Frame DO\r\t\t\tWITH msg: Controllers.PollCursorMsg DO\r\t\t\t\tf.GetCursor(msg.x, msg.y, msg.modifiers, msg.cursor)\r\t\t\t| msg: Controllers.TrackMsg DO\r\t\t\t\tf.MouseDown(msg.x, msg.y, msg.modifiers)\r\t\t\tELSE\r\t\t\tEND\r\t\tEND\r\tEND HandleCtrlMsg;\r\t\r\tPROCEDURE (s: ScrollBar) HandleViewMsg (f: Views.Frame; VAR msg: Views.Message);\r\tBEGIN\r\t\tWITH msg: UpdateMsg DO\r\t\t\tWITH f: StdCFrames.Frame DO f.Update() END\r\t\tELSE\r\t\tEND\r\tEND HandleViewMsg;\r\r\t\r\t"
                    attr: 0
                  - text: "(* View *)\r\t\r"
                    attr: 1
                  - text: "\tPROCEDURE Update (v: View; f: Views.Frame);\r\t\tVAR msg: Controllers.PollSectionMsg; w, h: INTEGER; depends: BOOLEAN; inner: Views.Frame;\r\tBEGIN\r\t\tv.bgap := 0; v.rgap := 0; depends := FALSE;\r\t\tv.context.GetSize(w, h);\r\t\tDEC(w, 2 * v.border); DEC(h, 2 * v.border);\r\t\tIF horBar IN v.opts THEN\r\t\t\tIF horHide IN v.opts THEN\r\t\t\t\tmsg.focus := FALSE; msg.vertical := FALSE;\r\t\t\t\tmsg.wholeSize := 1; msg.partSize := 0; msg.partPos := 0;\r\t\t\t\tmsg.valid := FALSE; msg.done := FALSE;\r\t\t\t\tinner := InnerFrame(v, f);\r\t\t\t\tIF inner # NIL THEN Views.ForwardCtrlMsg(inner, msg) END;\r\t\t\t\tIF msg.done THEN\r\t\t\t\t\tIF msg.valid THEN v.bgap := v.sbW END\r\t\t\t\tELSIF v.w > 0 THEN\r\t\t\t\t\tIF w < v.w THEN v.bgap := v.sbW\r\t\t\t\t\tELSIF w - v.sbW < v.w THEN depends := TRUE\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tELSE v.bgap := v.sbW\r\t\t\tEND\r\t\tEND;\r\t\tIF verBar IN v.opts THEN\r\t\t\tIF verHide IN v.opts THEN\r\t\t\t\tmsg.focus := FALSE; msg.vertical := TRUE;\r\t\t\t\tmsg.wholeSize := 1; msg.partSize := 0; msg.partPos := 0;\r\t\t\t\tmsg.valid := FALSE; msg.done := FALSE;\r\t\t\t\tinner := InnerFrame(v, f);\r\t\t\t\tIF inner # NIL THEN Views.ForwardCtrlMsg(inner, msg) END;\r\t\t\t\tIF msg.done THEN\r\t\t\t\t\tIF msg.valid THEN v.rgap := v.sbW END\r\t\t\t\tELSIF v.h > 0 THEN\r\t\t\t\t\tIF h - v.bgap < v.h THEN v.rgap := v.sbW END\r\t\t\t\tEND\r\t\t\tELSE v.rgap := v.sbW\r\t\t\tEND\r\t\tEND;\r\t\tIF depends & (v.rgap > 0) THEN v.bgap := v.sbW END;\r\t\tCheckPos(v, v.orgX, v.orgY)\r\tEND Update;\r\t\r\tPROCEDURE Init (v: View; newView: BOOLEAN);\r\t\tCONST min = 2 * Ports.mm; max = MAX(INTEGER); default = 50 * Ports.mm;\r\t\tVAR c: Context; x: INTEGER; msg: Properties.ResizePref;\r\tBEGIN\r\t\tIF newView THEN\r\t\t\tv.opts := v.opts + {horBar, verBar, horHide, verHide};\r\t\t\tStdCFrames.dir.GetScrollBarSize(x, v.sbW);\r\t\t\tIF v.view.context # NIL THEN\r\t\t\t\tv.view.context.GetSize(v.w, v.h);\r\t\t\t\tv.view := Views.CopyOf(v.view, Views.shallow)\r\t\t\tELSE\r\t\t\t\tv.w := Views.undefined; v.h := Views.undefined;\r\t\t\t\tProperties.PreferredSize(v.view, min, max, min, max, default, default, v.w, v.h)\r\t\t\tEND;\r\t\t\tmsg.fixed := FALSE;\r\t\t\tmsg.horFitToWin := FALSE; msg.verFitToWin := FALSE;\r\t\t\tmsg.horFitToPage := FALSE; msg.verFitToPage := FALSE;\r\t\t\tViews.HandlePropMsg(v.view, msg);\r\t\t\tIF ~msg.fixed THEN\r\t\t\t\tINCL(v.opts, width); INCL(v.opts, height);\r\t\t\t\tIF msg.horFitToWin OR msg.horFitToPage THEN v.w := 0 END;\r\t\t\t\tIF msg.verFitToWin OR msg.verFitToPage THEN v.h := 0 END\r\t\t\tEND\r\t\tEND;\r\t\tv.rgap := 0; v.bgap := 0;\r\t\tIF showBorder IN v.opts THEN v.border := 2 * Ports.point ELSE v.border := 0 END;\r\t\tNEW(v.inner); v.inner.v := v;\r\t\tNEW(c); c.v := v; c.type := 3; v.inner.InitContext(c);\r\t\tNEW(v.hor); v.hor.ver := FALSE; v.hor.v := v;\r\t\tNEW(c); c.v := v; c.type := 2; v.hor.InitContext(c);\r\t\tNEW(v.ver); v.ver.ver := TRUE; v.ver.v := v;\r\t\tNEW(c); c.v := v; c.type := 1; v.ver.InitContext(c);\r\t\tNEW(v.update); v.update.v := v;\r\t\tStores.Join(v, v.view);\r\t\tStores.Join(v, v.inner);\r\t\tStores.Join(v, v.hor);\r\t\tStores.Join(v, v.ver);\r\t\tServices.DoLater(v.update, Services.now)\r\tEND Init;\r\t\r\tPROCEDURE (v: View) Internalize (VAR rd: Stores.Reader);\r\t\tVAR thisVersion: INTEGER;\r\tBEGIN\r\t\tv.Internalize^(rd);\r\t\tIF ~rd.cancelled THEN\r\t\t\trd.ReadVersion(0, 0, thisVersion);\r\t\t\tIF ~rd.cancelled THEN\r\t\t\t\tViews.ReadView(rd, v.view);\r\t\t\t\trd.ReadInt(v.sbW);\r\t\t\t\trd.ReadInt(v.orgX);\r\t\t\t\trd.ReadInt(v.orgY);\r\t\t\t\trd.ReadInt(v.w);\r\t\t\t\trd.ReadInt(v.h);\r\t\t\t\trd.ReadSet(v.opts);\r\t\t\t\tInit(v, FALSE)\r\t\t\tEND\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (v: View) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\tv.Externalize^(wr);\r\t\twr.WriteVersion(0);\r\t\tViews.WriteView(wr, v.view);\r\t\twr.WriteInt(v.sbW);\r\t\tIF savePos IN v.opts THEN\r\t\t\twr.WriteInt(v.orgX);\r\t\t\twr.WriteInt(v.orgY)\r\t\tELSE\r\t\t\twr.WriteInt(0);\r\t\t\twr.WriteInt(0)\r\t\tEND;\r\t\twr.WriteInt(v.w);\r\t\twr.WriteInt(v.h);\r\t\twr.WriteSet(v.opts);\r\tEND Externalize;\r\r\tPROCEDURE (v: View) ThisModel(): Models.Model;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " v.view.ThisModel()\r\tEND ThisModel;\r\t\r\tPROCEDURE (v: View) CopyFromModelView (source: Views.View; model: Models.Model);\r\tBEGIN\r\t\tWITH source: View DO\r\t\t\tIF model = NIL THEN v.view := Views.CopyOf(source.view, Views.deep)\r\t\t\tELSE v.view := Views.CopyWithNewModel(source.view, model)\r\t\t\tEND;\r\t\t\tv.sbW := source.sbW;\r\t\t\tv.orgX := source.orgX;\r\t\t\tv.orgY := source.orgY;\r\t\t\tv.w := source.w;\r\t\t\tv.h := source.h;\r\t\t\tv.opts := source.opts;\r\t\tEND;\r\t\tInit(v, FALSE)\r\tEND CopyFromModelView;\r\t\r\tPROCEDURE (v: View) InitContext (context: Models.Context);\r\t\tVAR c: Context;\r\tBEGIN\r\t\tv.InitContext^(context);\r\t\tIF v.view.context = NIL THEN\r\t\t\tNEW(c); c.v := v; c.type := 0; v.view.InitContext(c)\r\t\tEND\r\tEND InitContext;\r\r\tPROCEDURE (v: View) Neutralize;\r\tBEGIN\r\t\tv.view.Neutralize\r\tEND Neutralize;\r\r\tPROCEDURE (v: View) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR w, h: INTEGER;\r\tBEGIN\r\t\tv.context.GetSize(w, h);\r\t\tIF showBorder IN v.opts THEN\r\t\t\tv.border := 2 * f.dot;\r\t\t\tf.DrawRect(0, f.dot, w, v.border, Ports.fill, Ports.black);\r\t\t\tf.DrawRect(f.dot, 0, v.border, h, Ports.fill, Ports.black);\r\t\t\tf.DrawRect(0, h - v.border, w, h - f.dot, Ports.fill, Ports.grey25);\r\t\t\tf.DrawRect(w - v.border, 0, w - f.dot, h, Ports.fill, Ports.grey25);\r\t\t\tf.DrawRect(0, 0, w, f.dot, Ports.fill, Ports.grey50);\r\t\t\tf.DrawRect(0, 0, f.dot, h, Ports.fill, Ports.grey50);\r\t\t\tf.DrawRect(0, h - f.dot, w, h, Ports.fill, Ports.white);\r\t\t\tf.DrawRect(w - f.dot, 0, w, h, Ports.fill, Ports.white)\r\t\tEND;\r\t\tViews.InstallFrame(f, v.inner, v.border, v.border, 0, TRUE);\r\t\tIF v.bgap > 0 THEN Views.InstallFrame(f, v.hor, v.border, h - v.border - v.bgap, 0, FALSE) END;\r\t\tIF v.rgap > 0 THEN Views.InstallFrame(f, v.ver, w - v.border - v.rgap, v.border, 0, FALSE) END\r\tEND Restore;\r\t\r\tPROCEDURE (v: View) HandleCtrlMsg (f: Views.Frame; VAR msg: Controllers.Message; VAR focus: Views.View);\r\t\tVAR w, h, p, n: INTEGER;smsg: Controllers.ScrollMsg; inner: Views.Frame;\r\tBEGIN\r\t\tWITH msg: Controllers.WheelMsg DO\r\t\t\tsmsg.focus := FALSE; smsg.op := msg.op; smsg.pos := 0; smsg.done := FALSE; n := msg.nofLines;\r\t\t\tIF (v.rgap > 0) OR (v.bgap > 0) THEN\r\t\t\t\tsmsg.vertical := v.rgap > 0;\r\t\t\t\tREPEAT\r\t\t\t\t\tsmsg.done := FALSE;\r\t\t\t\t\tinner := InnerFrame(v, f);\r\t\t\t\t\tIF inner # NIL THEN Views.ForwardCtrlMsg(inner, smsg) END;\r\t\t\t\t\tIF ~smsg.done THEN\r\t\t\t\t\t\tScroll(v, smsg.op, smsg.vertical, 0, p);\r\t\t\t\t\t\tViews.ValidateRoot(Views.RootOf(f))\r\t\t\t\t\tEND;\r\t\t\t\t\tDEC(n)\r\t\t\t\tUNTIL n <= 0;\r\t\t\t\tmsg.done := TRUE\r\t\t\tELSE\r\t\t\t\tfocus := v.inner\r\t\t\tEND\r\t\t| msg: Controllers.CursorMessage DO\r\t\t\tv.context.GetSize(w, h);\r\t\t\tIF msg.x > w - v.border - v.rgap THEN\r\t\t\t\tIF msg.y <= h - v.border - v.bgap THEN focus := v.ver END\r\t\t\tELSIF msg.y > h - v.border - v.bgap THEN focus := v.hor\r\t\t\tELSE focus := v.inner\r\t\t\tEND\r\t\t| msg: Controllers.PollSectionMsg DO\r\t\t\tinner := InnerFrame(v, f);\r\t\t\tIF inner # NIL THEN Views.ForwardCtrlMsg(inner, msg) END;\r\t\t\tIF ~msg.done THEN\r\t\t\t\tPollSection(v, msg.vertical, msg.wholeSize, msg.partSize, msg.partPos);\r\t\t\t\tmsg.valid := msg.partSize < msg.wholeSize;\r\t\t\t\tmsg.done := TRUE\r\t\t\tEND\r\t\t| msg: Controllers.ScrollMsg DO\r\t\t\tinner := InnerFrame(v, f);\r\t\t\tIF inner # NIL THEN Views.ForwardCtrlMsg(inner, msg) END;\r\t\t\tIF ~msg.done THEN\r\t\t\t\tScroll(v, msg.op, msg.vertical, msg.pos, p);\r\t\t\t\tViews.ValidateRoot(Views.RootOf(f));\r\t\t\t\tmsg.done := TRUE\r\t\t\tEND\r\t\tELSE focus := v.inner\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: "(* avoid redundant updates in order to save memory and CPU resources *)"
                    attr: 1
                  - text: "\r\t\tIF ~((msg IS Controllers.TickMsg) OR (msg IS Controllers.PollCursorMsg) \r\t\tOR (msg IS Controllers.PollOpsMsg) OR (msg IS Controllers.PollFocusMsg)) THEN\r\t\t\tServices.DoLater(v.update, Services.now)\r\t\tEND\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE (v: View) HandleViewMsg (f: Views.Frame; VAR msg: Views.Message);\r\t\tVAR b, r: INTEGER;\r\tBEGIN\r\t\tWITH msg: UpdateMsg DO\r\t\t\tb := v.bgap; r := v.rgap;\r\t\t\tUpdate(v, f);\r\t\t\tIF (v.bgap # b) OR (v.rgap # r) THEN msg.changed := TRUE END\r\t\tELSE\r\t\tEND\r\tEND HandleViewMsg;\r\r\tPROCEDURE (v: View) HandlePropMsg (VAR msg: Properties.Message);\r\t\tVAR w, h: INTEGER; p: Properties.Property; prop: Prop; fv: Views.View;\r\tBEGIN\r\t\tWITH msg: Properties.FocusPref DO\r\t\t\tv.context.GetSize(w, h);\r\t\t\tViews.HandlePropMsg(v.view, msg);\r\t\t\tIF msg.atLocation THEN\r\t\t\t\tIF (msg.x > w - v.border - v.rgap) & (msg.y > h - v.border - v.bgap) THEN\r\t\t\t\t\tmsg.hotFocus := FALSE; msg.setFocus := FALSE\r\t\t\t\tELSIF ((msg.x > w - v.border - v.rgap) OR (msg.y > h - v.border - v.bgap)) & ~msg.setFocus THEN\r\t\t\t\t\tmsg.hotFocus := TRUE\r\t\t\t\tEND\r\t\t\tEND\r\t\t| msg: Properties.SizePref DO\r\t\t\tIF (v.w > 0) & (v.h > 0) THEN\r\t\t\t\tIF msg.w = Views.undefined THEN msg.w := 50 * Ports.mm END;\r\t\t\t\tIF msg.h = Views.undefined THEN msg.h := 50 * Ports.mm END\r\t\t\tELSE\r\t\t\t\tIF msg.w > v.rgap THEN DEC(msg.w, v.rgap + 2 * v.border) END;\r\t\t\t\tIF msg.h > v.bgap THEN DEC(msg.h, v.bgap + 2 * v.border) END;\r\t\t\t\tViews.HandlePropMsg(v.view, msg);\r\t\t\t\tIF msg.w > 0 THEN INC(msg.w, v.rgap + 2 * v.border) END;\r\t\t\t\tIF msg.h > 0 THEN INC(msg.h, v.bgap + 2 * v.border) END\r\t\t\tEND;\r\t\t\tIF msg.w < 3 * v.sbW THEN msg.w := 3 * v.sbW END;\r\t\t\tIF msg.h < 3 * v.sbW THEN msg.h := 3 * v.sbW END\r\t\t| msg: Properties.ResizePref DO\r\t\t\tViews.HandlePropMsg(v.view, msg);\r\t\t\tIF v.w > 0 THEN\r\t\t\t\tmsg.fixed := FALSE;\r\t\t\t\tmsg.horFitToWin := TRUE;\r\t\t\t\tmsg.horFitToPage := FALSE\r\t\t\tEND;\r\t\t\tIF v.h > 0 THEN\r\t\t\t\tmsg.fixed := FALSE;\r\t\t\t\tmsg.verFitToWin := TRUE;\r\t\t\t\tmsg.verFitToPage := FALSE\r\t\t\tEND\r\t\t| msg: Properties.BoundsPref DO\r\t\t\tViews.HandlePropMsg(v.view, msg);\r\t\t\tINC(msg.w, 2 * v.border);\r\t\t\tINC(msg.h, 2 * v.border);\r\t\t\tIF (horBar IN v.opts) & ~(horHide IN v.opts) THEN INC(msg.w, v.sbW) END;\r\t\t\tIF (verBar IN v.opts) & ~(verHide IN v.opts) THEN INC(msg.h, v.sbW) END\r\t\t| msg: Properties.PollMsg DO\r\t\t\tViews.HandlePropMsg(v.view, msg);\r\t\t\tPollProp(v, prop); Properties.Insert(msg.prop, prop)\r\t\t| msg: Properties.SetMsg DO\r\t\t\tp := msg.prop; WHILE (p # NIL) & ~(p IS Prop) DO p := p.next END;\r\t\t\tIF p # NIL THEN SetProp(v, p) END;\r\t\t\tViews.HandlePropMsg(v.view, msg);\r\t\t| msg: Properties.ControlPref DO\r\t\t\tfv := msg.focus;\r\t\t\tIF fv = v THEN msg.focus := v.view END;\r\t\t\tViews.HandlePropMsg(v.view, msg);\r\t\t\tmsg.focus := fv\r\t\tELSE\r\t\t\tViews.HandlePropMsg(v.view, msg);\r\t\tEND;\r\tEND HandlePropMsg;\r\t\t\r\tPROCEDURE "
                    attr: 0
                  - text: WrappedView
                    attr: 3
                  - text: "* (v: Views.View): Views.View;\r\tBEGIN\r\t\tWITH v: View DO\r\t\t\tRETURN v.view\r\t\tELSE\r\t\t\tRETURN v\r\t\tEND\r\tEND WrappedView;\r\t\r\t\r"
                    attr: 0
                  - text: "\t(* InnerView *)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE (v: InnerView) GetBackground (VAR color: Ports.Color);\r\tBEGIN\r\t\tcolor := Ports.background\r\tEND GetBackground;\r\r\tPROCEDURE (v: InnerView) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tViews.InstallFrame(f, v.v.view, -v.v.orgX, -v.v.orgY, 0, TRUE)\r\tEND Restore;\r\t\r\tPROCEDURE (v: InnerView) HandleCtrlMsg (f: Views.Frame; VAR msg: Controllers.Message;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR focus: Views.View);\r\tBEGIN\r\t\tfocus := v.v.view\r\tEND HandleCtrlMsg;\r\r\r"
                    attr: 0
                  - text: "\t(* Context *)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE (c: Context) MakeVisible (l, t, r, b: INTEGER);\r\t\tVAR w, h, x, y: INTEGER;\r\tBEGIN\r\t\tIF ~(savePos IN c.v.opts) THEN\r\t\t\tc.v.context.GetSize(w, h);\r\t\t\tx := c.v.orgX; y := c.v.orgY;\r\t\t\tIF c.v.w > 0 THEN\r\t\t\t\tDEC(w, c.v.rgap + 2 * c.v.border);\r\t\t\t\tIF r > x + w - Ports.point THEN x := r - w + Ports.point END;\r\t\t\t\tIF l < x + Ports.point THEN x := l - Ports.point END;\r\t\t\tEND;\r\t\t\tIF c.v.h > 0 THEN\r\t\t\t\tDEC(h, c.v.bgap + 2 * c.v.border);\r\t\t\t\tIF b > y + h - Ports.point THEN y := b - h + Ports.point END;\r\t\t\t\tIF t < y + Ports.point THEN y := t - Ports.point END;\r\t\t\tEND;\r\t\t\tIF (x # c.v.orgX) OR (y # c.v.orgY) THEN\r\t\t\t\tCheckPos(c.v, x, y); c.v.orgX := x; c.v.orgY := y; \r\t\t\t\tViews.Update(c.v.view, Views.keepFrames)\r\t\t\tEND;\r\t\t\tServices.DoLater(c.v.update, Services.now)\r\t\tEND\r\tEND MakeVisible;\r\t\r\tPROCEDURE (c: Context) Consider (VAR p: Models.Proposal);\r\tBEGIN\r\t\tc.v.context.Consider(p)\r\tEND Consider;\r\t\r\tPROCEDURE (c: Context) Normalize (): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " ~(savePos IN c.v.opts)\r\tEND Normalize;\r\t\r\tPROCEDURE (c: Context) GetSize (OUT w, h: INTEGER);\r\tBEGIN\r\t\tc.v.context.GetSize(w, h);\r\t\tDEC(w, c.v.rgap + 2 * c.v.border);\r\t\tDEC(h, c.v.bgap + 2 * c.v.border);\r\t\tIF c.type = 0 THEN\r\t\t\tIF c.v.w > 0 THEN w := c.v.w END;\r\t\t\tIF c.v.h > 0 THEN h := c.v.h END\r\t\tELSIF c.type = 1 THEN\r\t\t\tw := c.v.rgap\r\t\tELSIF c.type = 2 THEN\r\t\t\th := c.v.bgap\r\t\tEND\r\tEND GetSize;\r\t\r\tPROCEDURE (c: Context) SetSize (w, h: INTEGER);\r\t\tVAR w0, h0, w1, h1: INTEGER;\r\tBEGIN\r\t\tASSERT(c.type = 0, 100);\r\t\tc.v.context.GetSize(w0, h0); w1 := w0; h1 := h0;\r\t\tIF c.v.w > 0 THEN c.v.w := w\r\t\tELSE w1 := w + c.v.rgap + 2 * c.v.border\r\t\tEND;\r\t\tIF c.v.h > 0 THEN c.v.h := h\r\t\tELSE h1 := h + c.v.bgap + 2 * c.v.border\r\t\tEND;\r\t\tIF (w1 # w0) OR (h1 # h0) THEN\r\t\t\tc.v.context.SetSize(w1, h1)\r\t\tEND\r\tEND SetSize;\r\t\r\tPROCEDURE (c: Context) ThisModel (): Models.Model;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL\r\tEND ThisModel;\r\t\r\t\r"
                    attr: 0
                  - text: "\t(* dialog *)"
                    attr: 1
                  - text: "\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: InitDialog
                    attr: 3
                  - text: "*;\r\t\tVAR  p: Properties.Property; u: INTEGER;\r\tBEGIN\r\t\tProperties.CollectProp(p);\r\t\tWHILE (p # NIL) & ~(p IS Prop) DO p := p.next END;\r\t\tIF p # NIL THEN\r\t\t\tWITH p: Prop DO\r\t\t\t\tIF Dialog.metricSystem THEN u := Ports.mm DIV 10 ELSE u := Ports.inch DIV 100 END;\r\t\t\t\tdialog.valid := p.valid;\r\t\t\t\tdialog.readOnly := p.readOnly;\r\t\t\t\tIF ~p.horBar THEN dialog.horizontal.mode := 0\r\t\t\t\tELSIF p.horHide THEN dialog.horizontal.mode := 1\r\t\t\t\tELSE dialog.horizontal.mode := 2\r\t\t\t\tEND;\r\t\t\t\tIF ~p.verBar THEN dialog.vertical.mode := 0\r\t\t\t\tELSIF p.verHide THEN dialog.vertical.mode := 1\r\t\t\t\tELSE dialog.vertical.mode := 2\r\t\t\t\tEND;\r\t\t\t\tdialog.horizontal.size := p.width DIV u / 100;\r\t\t\t\tdialog.vertical.size := p.height DIV u / 100;\r\t\t\t\tdialog.horizontal.adapt := p.width = 0;\r\t\t\t\tdialog.vertical.adapt := p.height = 0;\r\t\t\t\tdialog.showBorder := p.showBorder;\r\t\t\t\tdialog.savePos := p.savePos\r\t\t\tEND\r\t\tEND\r\tEND InitDialog;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Set
                    attr: 3
                  - text: "*;\r\t\tVAR p: Prop; u: INTEGER;\r\tBEGIN\r\t\tIF Dialog.metricSystem THEN u := 10 * Ports.mm ELSE u := Ports.inch END;\r\t\tNEW(p); p.valid := dialog.valid;\r\t\tp.horBar := dialog.horizontal.mode # 0;\r\t\tp.verBar := dialog.vertical.mode # 0;\r\t\tp.horHide := dialog.horizontal.mode = 1;\r\t\tp.verHide := dialog.vertical.mode = 1;\r\t\tIF ~dialog.horizontal.adapt THEN p.width := SHORT(ENTIER(dialog.horizontal.size * u)) END;\r\t\tIF ~dialog.vertical.adapt THEN p.height := SHORT(ENTIER(dialog.vertical.size * u)) END;\r\t\tp.showBorder := dialog.showBorder;\r\t\tp.savePos := dialog.savePos;\r\t\tProperties.EmitProp(NIL, p)\r\tEND Set;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: DialogGuard
                    attr: 3
                  - text: "* (VAR par: Dialog.Par);\r\t\tVAR  p: Properties.Property;\r\tBEGIN\r\t\tProperties.CollectProp(p);\r\t\tWHILE (p # NIL) & ~(p IS Prop) DO p := p.next END;\r\t\tIF p = NIL THEN par.disabled := TRUE END\r\tEND DialogGuard;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: HorAdaptGuard
                    attr: 3
