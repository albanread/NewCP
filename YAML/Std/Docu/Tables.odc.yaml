                  - text: SetSize
                    attr: 4
                  - text: " (rows, cols: INTEGER), NEW\rSet size of the table.\r\rPre\r20\t(rows >= 0) & (cols >= 0)\r21\t((cols > 0) OR ((cols = 0) & (rows = 0))\r\rPROCEDURE (VAR tab: Table) "
                    attr: 2
                  - text: SetItem
                    attr: 4
                  - text: " (row, col: INTEGER; item: Dialog.String), NEW\rSet contents of cell in row "
                    attr: 2
                  - text: row
