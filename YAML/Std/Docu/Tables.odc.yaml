                  - text: "\r\r"
                    attr: 1
                  - text: "DEFINITION StdTables;\r\r\tIMPORT\r\t\tPorts, Dialog, Views, Properties, Controls;\r\r\tCONST\r\t\tline = 0DX;\r\t\tdeselect = -1; select = -2; changed = -3;\r\t\tlayoutEditable = 0; dataEditable = 1; selectionStyle = 2;\r\t\tnoSelect = 0; cellSelect = 1; rowSelect = 2; colSelect = 3; crossSelect = 4;\r\r\tTYPE\r\t\tTable = RECORD\r\t\t\trows-, cols-: INTEGER;\r\t\t\t(VAR tab: Table) SetSize (rows, cols: INTEGER), NEW;\r\t\t\t(VAR tab: Table) SetItem (row, col: INTEGER; item: Dialog.String), NEW;\r\t\t\t(VAR tab: Table) GetItem (row, col: INTEGER; OUT item: Dialog.String), NEW;\r\t\t\t(VAR tab: Table) SetLabel (col: INTEGER; label: Dialog.String), NEW;\r\t\t\t(VAR tab: Table) GetLabel (col: INTEGER; OUT label: Dialog.String), NEW;\r\t\t\t(VAR tab: Table) HasSelection (): BOOLEAN, NEW;\r\t\t\t(VAR tab: Table) GetSelection (OUT row, col: INTEGER), NEW;\r\t\t\t(VAR tab: Table) Select (row, col: INTEGER), NEW;\r\t\t\t(VAR tab: Table) Deselect, NEW;\r\t\t\t(VAR tab: Table) SetAttr (l, t, r, b: INTEGER; style: SET; weight: INTEGER; color: Ports.Color), NEW;\r\t\t\t(VAR tab: Table) GetAttr (row, col: INTEGER; \r\t\t\t\t\t\t\t\t\t\tOUT style: SET; OUT weight: INTEGER; OUT color: Ports.Color), NEW\r\t\tEND;\r\r\t\tProp = POINTER TO RECORD (Properties.Property)\r\t\t\tlayoutEditable, dataEditable: BOOLEAN;\r\t\t\tselectionStyle: INTEGER;\r\t\t\t(p: Prop) IntersectWith (q: Properties.Property; OUT equal: BOOLEAN)\r\t\tEND;\r\r\t\tDirectory = POINTER TO ABSTRACT RECORD\r\t\t\t(d: Directory) NewControl (p: Controls.Prop): Views.View, ABSTRACT, NEW\r\t\tEND;\r\r\r\tVAR\r\t\tdir-, stdDir-: Directory;\r\t\ttext: Dialog.String;\r\t\tdlg: RECORD\r\t\t\tlayoutEditable, dataEditable: BOOLEAN;\r\t\t\tselectionStyle: Dialog.List\r\t\tEND;\r\r\tPROCEDURE InitDialog;\r\tPROCEDURE Set;\r\tPROCEDURE Guard (idx: INTEGER; VAR par: Dialog.Par);\r\tPROCEDURE Notifier (idx, op, from, to: INTEGER);\r\tPROCEDURE SetDir (d: Directory);\r\tPROCEDURE DepositControl;\r\rEND StdTables.\r\rModule "
                    attr: 2
                  - text: StdTables
                    attr: 3
                  - text: " implements a simple tabular control (\"grid view\"). To allow clients to create new table controls, a directory object is exported ("
                    attr: 2
                  - text: StdTables.dir
                    attr: 3
                  - text: "). As interactor, type "
                    attr: 2
                  - text: StdTables.Table
                    attr: 3
                  - text: " is provided.\r\rTypical menu command:\r\t\"Insert Table\"\t\"\"\t\"StdTables.DepositControl; StdCmds.PasteView\"\t\"StdCmds.PasteViewGuard\"\r\t\rThe property editor for the StdTables is the same as for normal controls. The fields, Link, Label, Guard and Notifier works in the same way as for other controls. In addition to the property editor, a special dialog for tables is offered, where one can choose the visual feedback of the selection in a table. Furthermore one can specify, whether the layout should be editable (column width), and whether the data in the cells should be editable.\r"
                    attr: 2
                  - ruler:
                      left: 0
                      right: 0
                      lead: 11500
                      asc: 134600
                      dsc: 43200
                      grid: 177800
                      opts: 0x00000001
                      tabs:
                        - { stop: 864000 }
                      attr: 2
                      w: 360000000
                      h: 444500
                  - text: "\rCONST "
                    attr: 2
                  - text: line
                    attr: 4
                  - text: "\rNew line character for multiple line labels.\r\rCONST "
                    attr: 2
                  - text: deselect
                    attr: 4
                  - text: "\rNotifier op-code. Indicates that the cell at position row = "
                    attr: 2
                  - text: from
                    attr: 3
                  - text: " and column = "
                    attr: 2
                  - text: to
                    attr: 3
                  - text: " has been deselected.\r\rCONST "
                    attr: 2
                  - text: select
                    attr: 4
                  - text: "\rNotifier op-code. Indicates that the user has selected a cell at position row = "
                    attr: 2
                  - text: from
                    attr: 3
                  - text: " and column = "
                    attr: 2
                  - text: to.
                    attr: 3
                  - text: "\r\rCONST "
                    attr: 2
                  - text: changed
                    attr: 4
                  - text: "\rNotifier op-code. Indicates that the user has changed the contents of a cell in the table at position row = "
                    attr: 2
                  - text: from
                    attr: 3
                  - text: " and column = "
                    attr: 2
                  - text: "to.\r"
                    attr: 3
                  - text: "\rCONST "
                    attr: 2
                  - text: layoutEditable
                    attr: 4
                  - text: "\rElement of a control property's valid set. Determines, whether the layout editable property is valid.\r\rCONST "
                    attr: 2
                  - text: dataEditable
                    attr: 4
                  - text: "\rElement of a control property's valid set. Determines, whether the data editable property is valid.\r\rCONST "
                    attr: 2
                  - text: selectionStyle
                    attr: 4
                  - text: "\rElement of a control property's valid set. Determines, whether the selection style property is valid.\r\r\rCONST "
                    attr: 2
                  - text: "noSelect, cellSelect, rowSelect, colSelect, crossSelect"
                    attr: 4
                  - text: "\rSelection style property constants.\r\r\rTYPE "
                    attr: 2
                  - text: Table
                    attr: 4
                  - text: "\rInteractor for table controls.\r\r"
                    attr: 2
                  - text: rows
                    attr: 4
                  - text: "-, "
                    attr: 2
                  - text: cols
                    attr: 4
                  - text: "-: INTEGER\t\t(rows >= 0) & (cols >= 0)\rNumber of rows and columns of the table.\r\rPROCEDURE (VAR tab: Table) "
