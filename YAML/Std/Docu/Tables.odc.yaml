                    attr: 4
                  - text: " (col: INTEGER; label: Dialog.String), NEW\rSet contents of label of column "
                    attr: 2
                  - text: col
                    attr: 3
                  - text: ". For each occurence of the character "
                    attr: 2
                  - text: StdTables.line
                    attr: 3
                  - text: " in "
                    attr: 2
                  - text: label
