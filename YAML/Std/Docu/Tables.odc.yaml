                  - text: " a new line is created.\r\rPre\r20\tSetSize must have been called before\r\rPROCEDURE (VAR tab: Table) "
                    attr: 2
                  - text: GetLabel
                    attr: 4
                  - text: " (col: INTEGER; OUT label: Dialog.String), NEW\rGet contents of label of column "
                    attr: 2
                  - text: col
                    attr: 3
                  - text: ".\r\rPre\r20\tSetSize must have been called before\r\rPROCEDURE (VAR tab: Table) "
                    attr: 2
                  - text: HasSelection
                    attr: 4
                  - text: " (): BOOLEAN, NEW\rReturns, whether a cell in the table is currently selected.\r\rPROCEDURE (VAR tab: Table) "
                    attr: 2
                  - text: GetSelection
                    attr: 4
                  - text: " (OUT row, col: INTEGER), NEW\rGet coordinates (row and column) of the selected table cell. \r\rPre\r20\tSetSize must have been called before\r21\ttab.HasSelection()\r\rPROCEDURE (VAR tab: Table) "
                    attr: 2
                  - text: Select
                    attr: 4
                  - text: " (row, col: INTEGER), NEW\rSet selection in table to row "
                    attr: 2
                  - text: row
                    attr: 3
                  - text: " and column "
                    attr: 2
                  - text: col
                    attr: 3
                  - text: ".\r\rPre\r20\tSetSize must have been called before\r\rPost\rtab.HasSelection() = TRUE\r\rPROCEDURE (VAR tab: Table) "
                    attr: 2
                  - text: Deselect
                    attr: 4
                  - text: ", NEW\rRemove current selection in table, if any. \r\rPre\r20\tSetSize must have been called before\r\rPost\rtab.HasSelection() = FALSE\r\rPROCEDURE (VAR tab: Table) "
                    attr: 2
                  - text: SetAttr
                    attr: 4
                  - text: " (l, t, r, b: INTEGER; style: SET; weight: INTEGER; color: Ports.Color), NEW\rSets the the attributes for a range of cells. "
                    attr: 2
                  - text: style
                    attr: 3
                  - text: " and "
                    attr: 2
                  - text: weight
                    attr: 3
                  - text: " affects the font for the cell and "
                    attr: 2
                  - text: color
