                    attr: 3
                  - text: " and "
                    attr: 2
                  - text: b
                    attr: 3
                  - text: " being the column and row of the bottom right cell in the range.\r\r\rPROCEDURE (VAR tab: Table) "
                    attr: 2
                  - text: GetAttr
                    attr: 4
                  - text: " (row, col: INTEGER; OUT style: SET; OUT weight: INTEGER; OUT color: Ports.Color), NEW\rRetrieves the current attribute values for the cell at position "
                    attr: 2
                  - text: "row, col"
                    attr: 3
                  - text: " in the table.\r\rPre\r20\tSetSize must have been called before\r\r\rTYPE "
                    attr: 2
                  - text: Prop
                    attr: 4
                  - text: "\rTable specific properties.\r\r"
                    attr: 2
                  - text: layoutEditable
                    attr: 4
                  - text: ", "
                    attr: 2
                  - text: dataEditable
                    attr: 4
                  - text: ": BOOLEAN\rColumn width is editable by the user; data in table cells is editable by the user.\r\r"
                    attr: 2
                  - text: selectionStyle
                    attr: 4
                  - text: ": INTEGER\rVisual feedback of selections:\rnoSelect: \tno visual feedback\rcellSelect: \tselected cell is high-lighted\rrowSelect: \tall cells in selected row are high-lighted\rcolSelect: \tall cells in selected column are high-lighted\rcrossSelect:\tall cells in selected row and column are high-lighted\r\rPROCEDURE (p: Prop) "
                    attr: 2
                  - text: IntersectWith
                    attr: 4
                  - text: " (q: Properties.Property; OUT equal: BOOLEAN)\rIntersect table properties "
                    attr: 2
                  - text: p
                    attr: 3
                  - text: " with another property record "
                    attr: 2
                  - text: q
                    attr: 3
                  - text: ". Iff both are equal, "
                    attr: 2
                  - text: equal
                    attr: 3
