                  - text: "\tPROCEDURE AddTab;\r\tPROCEDURE BeginChanges (tv: View);\r\tPROCEDURE Delete;\r\tPROCEDURE DeleteGuard (VAR par: Dialog.Par);\r\tPROCEDURE Deposit;\r\tPROCEDURE EndChanges (tv: View);\r\tPROCEDURE Focus (): View;\r\tPROCEDURE InitDialog;\r\tPROCEDURE LabelGuard (VAR par: Dialog.Par);\r\tPROCEDURE LayoutModeGuard (VAR par: Dialog.Par);\r\tPROCEDURE Left;\r\tPROCEDURE MaskModeGuard (VAR par: Dialog.Par);\r\tPROCEDURE ModeNotifier (op, from, to: INTEGER);\r\tPROCEDURE NewGuard (VAR par: Dialog.Par);\r\tPROCEDURE NotifierGuard (VAR par: Dialog.Par);\r\tPROCEDURE Rename;\r\tPROCEDURE RenameGuard (VAR par: Dialog.Par);\r\tPROCEDURE Right;\r\tPROCEDURE SetDir (d: Directory);\r\tPROCEDURE SetFrameDir (d: FrameDirectory);\r\tPROCEDURE SetGuard (VAR par: Dialog.Par);\r\tPROCEDURE SetNotifier;\r\tPROCEDURE This (v: Views.View): View;\r\rEND StdTabViews.\r\r\rA "
