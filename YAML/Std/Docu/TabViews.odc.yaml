                  - text: "\r\r\rThis example was created with "
                    attr: 1
                  - text: FormViews
                    attr: 3
                  - text: " but any "
                    attr: 1
                  - text: Views.View
                    attr: 3
                  - text: " can be used in the tabs.\r\rThere are two ways of creating "
                    attr: 1
                  - text: StdTabViews
                    attr: 3
                  - text: ": The tab can be created programmatically or it can be created using a graphical user interface. In most cases the graphical user interface is enough, and no programming is needed to create a "
                    attr: 1
                  - text: StdTabViews.View
                    attr: 3
                  - text: ". For more advanced use there exists a programming interface and this will be described further down.\r\rTo use the graphical user interface a "
                    attr: 1
                  - text: StdTabViews.View
                    attr: 3
                  - text: " needs to be dropped into a document or a form. This can be done by selecting the option "
                    attr: 1
                  - text: Insert Tab View
                    attr: 3
                  - text: " from the "
                    attr: 1
                  - text: Controls
                    attr: 3
                  - text: " menu. The new "
                    attr: 1
                  - text: StdTabViews.View
                    attr: 3
                  - text: " contains two tabs, called "
                    attr: 1
                  - text: Tab1
                    attr: 3
                  - text: " and "
                    attr: 1
                  - text: Tab2
                    attr: 3
                  - text: ", and they each have an (empty) "
                    attr: 1
                  - text: FormViews.View
                    attr: 3
                  - text: " associated with them. A newly created tab looks like this:\r\r"
                    attr: 1
                  - view:
                      kind: StdTabViews.View
                      storeKind: store
                      typeChain:
                        - StdTabViews.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 13
                      bodyPos: 1624
                      bodyLen: 295
                      children:
