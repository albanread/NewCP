                  - text: "\r\rDEFINITION StdTabViews;\r\r\tIMPORT Views, Dialog, StdCFrames;\r\r\tCONST\r\t\tnoTab = -1;\r\t\t\r\tTYPE\r\t\tDirectory = POINTER TO ABSTRACT RECORD \r\t\t\t(d: Directory) New (): View, NEW, ABSTRACT\r\t\tEND;\r\r\t\tFrame = POINTER TO ABSTRACT RECORD (StdCFrames.Frame)\r\t\t\t(f: Frame) GetDispSize (OUT x, y, w, h: INTEGER), NEW, ABSTRACT;\r\t\t\t(f: Frame) InDispArea (x, y: INTEGER): BOOLEAN, NEW, ABSTRACT;\r\t\t\t(f: Frame) SetIndex (i: INTEGER), NEW\r\t\tEND;\r\r\t\tFrameDirectory = POINTER TO ABSTRACT RECORD \r\t\t\t(d: FrameDirectory) GetTabSize (VAR w, h: INTEGER), NEW, ABSTRACT;\r\t\t\t(d: FrameDirectory) New (): Frame, NEW, ABSTRACT\r\t\tEND;\r\r\t\tView = POINTER TO LIMITED RECORD (Views.View)\r\t\t\t(tv: View) GetItem (i: INTEGER; OUT label: Dialog.String; OUT v: Views.View), NEW;\r\t\t\t(tv: View) GetNewFrame (VAR frame: Views.Frame);\r\t\t\t(tv: View) GetNotifier (OUT notifier: Dialog.String), NEW;\r\t\t\t(tv: View) HandleCtrlMsg (f: Views.Frame; VAR msg: Views.CtrlMessage; VAR focus: Views.View);\r\t\t\t(tv: View) Index (): INTEGER, NEW;\r\t\t\t(tv: View) Neutralize;\r\t\t\t(tv: View) NofTabs (): INTEGER, NEW;\r\t\t\t(tv: View) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\t\t(tv: View) SetIndex (i: INTEGER), NEW;\r\t\t\t(tv: View) SetItem (i: INTEGER; label: Dialog.String; v: Views.View), NEW;\r\t\t\t(tv: View) SetNofTabs (nofTabs: INTEGER), NEW;\r\t\t\t(tv: View) SetNotifier (IN notifier: ARRAY OF CHAR), NEW\r\t\tEND;\r\t\t\r\t\tNotifierProc = PROCEDURE (tv: View; from, to: INTEGER);\r\r\tVAR\r\t\tdir-: Directory;\r\t\tdlg: RECORD \r\t\t\tname, notifier: Dialog.String"
                    attr: 1
