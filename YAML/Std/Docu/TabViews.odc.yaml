                  - text: "\r\r\rThe "
                    attr: 1
                  - text: StdTabViews.View
                    attr: 3
                  - text: " is fully functional, but a bit boring. If the "
                    attr: 1
                  - text: StdTabViews.View
                    attr: 3
                  - text: " is focused, each tab can be edited just like a normal form. Controls can be dropped into it and moved aound and their properties can be edited. Also this can be tried on the tab above.\r\rTo add, remove or edit the name of tabs the "
                    attr: 1
                  - text: StdTabViews
                    attr: 3
                  - text: " property editor needs to be started. This is done by selecting the tab and choosing \"Edit->Object Properties...\". The property editor looks like this:\r\r"
                    attr: 1
                  - view:
                      kind: HostBitmaps.StdView
                      storeKind: store
                      typeChain:
                        - HostBitmaps.StdViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 18
                      bodyPos: 2014
                      bodyLen: 189075
                    attr: 1
                    w: 2849879
                    h: 2017868
                  - text: "\r\rThe buttons and fields have the following meaning:\r\r<-\rClicking on this button moves the current tab one step to the left. This can be used to changed the order of the tabs.\r\r"
                    attr: 1
                  - text: "->"
                    attr: 3
                  - text: "\rClicking on this button moves the current tab one step to the right. This can be used to changed the order of the tabs.\r\r"
                    attr: 1
                  - text: Label
                    attr: 3
                  - text: "\rDisplays the label of the current tab.\r\r"
                    attr: 1
                  - text: Rename
                    attr: 3
                  - text: "\rSets the label of the currrent tab to the text displayed in the label field. An empty label is not allowed.\r\r"
                    attr: 1
                  - text: New Tab
                    attr: 3
                  - text: "\rCreats a new tab and adds it to the list. The label of the new tab is set to the text displayed in the label field. If the text field is empty no new tab can be created.\r\r"
                    attr: 1
                  - text: Delete
                    attr: 3
                  - text: "\rRemoves the current tab from the tab view.\r\r"
                    attr: 1
                  - text: Notifier
                    attr: 3
                  - text: "\rDisplays the name of the notifier that is associated with the tab view.\r\r"
                    attr: 1
                  - text: Set
                    attr: 3
                  - text: "\rSets the notifier of the the tab view to the name displayed in the notifier field.\r\r"
                    attr: 1
                  - text: All tabs in Layout Mode
                    attr: 3
                  - text: "\rSets all tabs in the Tab View in Layout Mode. Layout Mode is a container mode that allows for editing. For more information about container modes see "
                    attr: 1
                  - text: About Container Modes
                    attr: 3
                  - text: " futher down.\r\r"
                    attr: 1
                  - text: All tabs in Mask Mode
                    attr: 3
                  - text: "\rSets all tabs in the Tab View in Mask Mode. Mask Mode is a container mode that doesn't allow selecting of contained views. This mode is used for displaying documents as dialogs. For more information about container modes see "
                    attr: 1
                  - text: About Container Modes
                    attr: 3
                  - text: " futher down.\r\r"
                    attr: 1
                  - text: About Notifiers
                    attr: 4
                  - text: "\rThe notifier for "
                    attr: 1
                  - text: StdTabViews
                    attr: 3
                  - text: " is not the same as a notifier for normal "
                    attr: 1
                  - text: Controls
                    attr: 3
                  - text: ", but it works in a similar way. The signarure is different and there is just one type of notification sent. "
                    attr: 1
                  - text: StdTabViews
                    attr: 3
                  - text: " notifiers have the signature described by the type "
                    attr: 1
                  - text: StdTabViews.NotifierProc
                    attr: 3
                  - text: ".\r\rThe notifier is only called when the current tab is changed. When called, "
                    attr: 1
                  - text: tv
                    attr: 3
                  - text: " is the "
                    attr: 1
                  - text: StdTabViews.View
                    attr: 3
                  - text: " that the notification concerns, "
                    attr: 1
                  - text: from
                    attr: 3
                  - text: " is the tab that used to be the current tab and "
                    attr: 1
                  - text: to
                    attr: 3
                  - text: " is the new current tab.\r\rWhen a tab is saved the index of the current tab is saved with it and when the tab is internalized the current tab is set to the index that was saved. This enables the designer of  a dialog with a tab to control which tab is the current tab when the dialog is opened. It also provides a way to find a "
                    attr: 1
                  - text: StdTabViews.View
                    attr: 3
                  - text: " in a dialog. When the current tab is set for the first time during internalization the notifier is called with "
                    attr: 1
                  - text: tv
                    attr: 3
                  - text: " set to the new "
                    attr: 1
                  - text: "StdTabViews.View,"
                    attr: 3
                  - text: " "
                    attr: 1
                  - text: from
                    attr: 3
                  - text: " set to the constant "
                    attr: 1
                  - text: noTab
                    attr: 3
                  - text: " and "
                    attr: 1
                  - text: to
                    attr: 3
                  - text: " set to the index of the current tab saved in externalize.\r\rThis means that whenever a document with a "
                    attr: 1
                  - text: StdTabViews.View
                    attr: 3
                  - text: " inside is opened the notifier is called and this allows the application to bind to the "
                    attr: 1
                  - text: StdTabViews.View
                    attr: 3
                  - text: " if needed. This is an easy way to get to the programming interface described below.\r\r"
                    attr: 1
                  - text: About Container Modes
                    attr: 4
                  - text: "\rContainers can have different modes. A "
                    attr: 1
                  - text: FormViews.View
                    attr: 3
                  - text: " is a container and can for example be put in "
                    attr: 1
                  - text: Layout Mode
                    attr: 3
                  - text: " and "
                    attr: 1
                  - text: Mask Mode
                    attr: 3
                  - text: ". In "
                    attr: 1
                  - text: Layout Mode
                    attr: 3
                  - text: " it is possible to select contained views, such as "
                    attr: 1
                  - text: Controls
                    attr: 3
                  - text: ", and move them around. In "
                    attr: 1
                  - text: Mask Mode
                    attr: 3
                  - text: ", on the other hand, it is not possible to select or move around contained views.\r\rContainer modes can be changed using the "
                    attr: 1
                  - text: Dev
                    attr: 3
                  - text: "-menu but normally this is not needed. The normal way is to save a document in "
                    attr: 1
                  - text: Edit
                    attr: 3
                  - text: " or "
                    attr: 1
                  - text: Layout
                    attr: 3
                  - text: " "
                    attr: 1
                  - text: Mode
                    attr: 3
                  - text: " and then open it in the desired mode using the commands provided in "
                    attr: 1
                  - text: StdCmds
                    attr: 3
                  - text: ". A dialog, for example, is usually saved in "
                    attr: 1
                  - text: Layout Mode
                    attr: 3
                  - text: " and then opened in "
                    attr: 1
                  - text: Mask Mode
                    attr: 3
                  - text: " by using "
                    attr: 1
                  - text: StdCmds.OpenAuxDialog
                    attr: 3
                  - text: ".\r\rThe problem is that "
                    attr: 1
                  - text: StdTabViews
                    attr: 3
                  - text: " breaks this pattern since each tab can contain its own container with its own mode. It is needed to use the "
                    attr: 1
                  - text: Dev
                    attr: 3
                  - text: "-menu to put the tabs in the correct mode before saving a dialog. To use the container modes and the "
                    attr: 1
                  - text: Dev
                    attr: 3
                  - text: "-menu requires some knowledge about Containers. To avoid this requirement the radiobuttons \""
                    attr: 1
                  - text: All tabs in Layout Mode
                    attr: 3
                  - text: "\" and \""
                    attr: 1
                  - text: All tabs in Mask Mode
                    attr: 3
                  - text: "\" are provided. These buttons make it possible to set all tabs in Mask mode before saving the dialog or setting all tabs in Layout mode to edit the dialog, thus eliminating the need to use the Dev-menu.\r\rCONST "
                    attr: 1
                  - text: noTab
                    attr: 4
                  - text: "\rConstant used as "
                    attr: 1
                  - text: from
                    attr: 3
                  - text: " value to the notifier when a "
                    attr: 1
                  - text: StdTabViews.View
                    attr: 3
                  - text: " is internalize. \r\rTYPE "
                    attr: 1
                  - text: View
                    attr: 4
                  - text: " = POINTER TO LIMITED RECORD (Views.View)\rAllows the user to select different views by clicking on tabs.\r\rPROCEDURE (tv: View) "
                    attr: 1
                  - text: SetItem
                    attr: 4
                  - text: " (i: INTEGER; label: Dialog.String; v: Views.View)\rNEW\rAdds a new tab to "
                    attr: 1
                  - text: tv
                    attr: 3
                  - text: ". The new tab gets "
                    attr: 1
                  - text: label
                    attr: 3
                  - text: " as its label and "
                    attr: 1
                  - text: v
                    attr: 3
                  - text: " as its view. "
                    attr: 1
                  - text: "i "
                    attr: 3
                  - text: "indicates the position of the tab among the other tabs. IF "
                    attr: 1
                  - text: i
                    attr: 3
                  - text: " is greater than "
                    attr: 1
                  - text: tv.NofTabs()
                    attr: 3
                  - text: " then then number of tabs in "
                    attr: 1
                  - text: tv
                    attr: 3
                  - text: " is increased, if not, the prevous tab at position "
                    attr: 1
                  - text: i
                    attr: 3
                  - text: " is overwritten. A deep copy of "
                    attr: 1
                  - text: v
                    attr: 3
                  - text: " is made before it is added to "
                    attr: 1
                  - text: tv
                    attr: 3
                  - text: ".\r\rPre\ri >= 0\rlabel # \"\"\rv # NIL\r"
                    attr: 1
                  - text: "\r"
                    attr: 5
                  - text: "PROCEDURE (tv: View) "
                    attr: 1
                  - text: GetItem
                    attr: 4
                  - text: " (i: INTEGER; OUT label: Dialog.String; OUT v: Views.View)\rNEW\rRetrievs the label and the view for tab "
                    attr: 1
                  - text: i
                    attr: 3
                  - text: ".\r\rPre\ri >= 0\ri < tv.NofTabs()\r"
                    attr: 1
                  - text: "\r"
                    attr: 5
                  - text: "PROCEDURE (tv: View) "
                    attr: 1
                  - text: SetNofTabs
                    attr: 4
                  - text: " (nofTabs: INTEGER)\rNEW\rMakes sure that "
                    attr: 1
                  - text: nofTabs
                    attr: 3
                  - text: " tabs are available in "
                    attr: 1
                  - text: tv
                    attr: 3
                  - text: ".Note that "
                    attr: 1
                  - text: SetItem
                    attr: 3
                  - text: " also increases the number of tabs of the "
                    attr: 1
                  - text: View
                    attr: 3
                  - text: " if necessary, so "
                    attr: 1
                  - text: SetNofTabs
                    attr: 3
                  - text: " is strictly only necessary to decrease the number of tabs.\r\rPre\rnofTabs >= 0\r\rPost\rtv.NofTabs() = nofTabs\r\rPROCEDURE (tv: View) "
                    attr: 1
                  - text: NofTabs
                    attr: 4
                  - text: " (): INTEGER, NEW;\rNEW\rRetruns the number of tabs in "
                    attr: 1
                  - text: tv
                    attr: 3
                  - text: ".\r\rPost\rReturned value >= 0\r\rPROCEDURE (tv: View) "
                    attr: 1
                  - text: SetIndex
                    attr: 4
                  - text: " (i: INTEGER)\rNEW\rSets the current tab in "
                    attr: 1
                  - text: "tv, "
                    attr: 3
