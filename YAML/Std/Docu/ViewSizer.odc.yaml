                flow:
                  - text: StdViewSizer
                    attr: 0
                  - text: "\r\rDEFINITION StdViewSizer;\r\r\tIMPORT Dialog;\r\r\tVAR\r\t\tsize: RECORD \r\t\t\ttypeName-: Dialog.String;\r\t\t\tw, h: REAL\r\t\tEND;\r\r\tPROCEDURE InitDialog;\r\tPROCEDURE SetViewSize;\r\tPROCEDURE SizeGuard (VAR par: Dialog.Par);\r\tPROCEDURE UnitGuard (VAR par: Dialog.Par);\r\rEND StdViewSizer.\r\r\r"
                    attr: 1
                  - text: StdViewSizer
                    attr: 2
                  - text: " is a command package allowing the user to resize views embedded in containers by specifying width and height as numbers. This is useful whenever dragging view borders with the mouse is not precise enough. The command package works on any singleton view.\r\rFor entry in a menu, the following line is recommended:\r\r"
                    attr: 1
                  - text: "\"View Size...\"\t\"\"\t\"StdViewSizer.InitDialog; StdCmds.OpenToolDialog('Std/Rsrc/ViewSizer', 'View Size')\"\t\"StdCmds.SingletonGuard\""
                    attr: 3
                  - text: "\r\r\rVAR "
                    attr: 1
                  - text: size
                    attr: 4
                  - text: ": RECORD\rInteractor for setting the view size.\r\r"
                    attr: 1
                  - text: typeName
                    attr: 4
                  - text: "-: Dialog.String\rType of the current singleton view.\r\r"
                    attr: 1
                  - text: w
                    attr: 4
                  - text: ": INTEGER\rView width in cm or inch, depending on the value of "
                    attr: 1
                  - text: Dialog.metricSystem
                    attr: 2
                  - text: ".\r\r"
                    attr: 1
                  - text: h
                    attr: 4
                  - text: ": INTEGER\rView height in cm or inch, depending on the value of "
                    attr: 1
                  - text: Dialog.metricSystem
                    attr: 2
                  - text: ".\r\r\rPROCEDURE "
                    attr: 1
                  - text: InitDialog
                    attr: 4
                  - text: "\rInitialization command for "
                    attr: 1
                  - text: size
                    attr: 2
                  - text: " interactor.\r\rPROCEDURE "
                    attr: 1
                  - text: SetViewSize
                    attr: 4
                  - text: "\rApplies the interactor values in "
                    attr: 1
                  - text: size
                    attr: 2
                  - text: ". To set up "
                    attr: 1
                  - text: size
                    attr: 2
                  - text: " to the selected view, "
                    attr: 1
                  - text: InitDialog
                    attr: 2
                  - text: " needs to be called first.\r\rPROCEDURE "
                    attr: 1
                  - text: SizeGuard
                    attr: 4
                  - text: " (VAR par: Dialog.Par)\rGuard which ensures that the "
                    attr: 1
                  - text: size
                    attr: 2
                  - text: " interactor matches the current singleton selection. If there is no singleton selection, the guard disables.\r\rPROCEDURE "
                    attr: 1
                  - text: UnitGuard
                    attr: 4
                  - text: " (VAR par: Dialog.Par)\rGuard that sets "
                    attr: 1
                  - text: par.label
                    attr: 2
                  - text: " to \"cm\" or \"inch\" respectively, depending on the value of Dialog.metricSystem.\r"
