                    attr: 0
                  - text: "\r\rDEFINITION StdInterpreter;\r\rEND StdInterpreter.\r\r\rModule "
                    attr: 1
                  - text: StdInterpreter
                    attr: 2
                  - text: " implements a plug-in service for BlackBox: an interpreter for some forms of Component Pascal procedure calls. The text string to be interpreted must conform to the following syntax:\r\rCommand = Call { \";\" Call }.\rCall = ModuleName \".\" ProcedureName [ \"(\" Parameter { \",\" Parameter } \")\" ].\rParameter = Integer | String.\rInteger = Decimal | Hex.\rDecimal = [ \"-\" ] Digit { Digit }.\rHex = [ \"-\" ] HexDigit { HexDigit } \"H\".\rString = \" ' \" { Char } \" ' \".\r\rThe calls are executed in the given sequence. Parameters corresponding to integers must be of type INTEGER. Parameters corresponding to strings must be value or IN parameters of type ARRAY OF CHAR. The called procedures must not return a value.\r\rFor example, the following string can be used to call the three given procedures:\r\r\t \"TurtleDraw.GotoPos(35, 587); TurtleDraw.ShowPen; TurtleDraw.WriteString('Hello')\".\r\t\r\tPROCEDURE GotoPos (x, y: INTEGER);\r\tPROCEDURE ShowPen;\r\tPROCEDURE WriteText (IN text: ARRAY OF CHAR);\r\rSuch statement sequences are used mainly in menu command configurations and in control properties.\r\rModule "
                    attr: 1
                  - text: StdInterpreter
                    attr: 2
                  - text: " is installed during startup of BlackBox. Its service is made available through the procedure "
                    attr: 1
                  - text: Dialog.Call
                    attr: 2
                  - text: ".\r"
                    attr: 1
