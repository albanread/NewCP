                flow:
                  - text: XhtmlExporter
                    attr: 0
                  - text: "\r\rThis module implements an HTML exporter that can be used with current Web browsers. Its HTML output already conforms to the stricter XHTML syntax, except for the XML header which is left out so that current browsers are not confused.\r\rThe (X)HTML elements/tags and attributes currently supported are: "
                    attr: 1
                  - text: "html, head, title, body, p, a(href, id), font(face, size, color), strong, em, u.\r\rThe exporter converts text. Embedded views are exported as asterisks. Link and target views (module "
                    attr: 2
                  - text: StdLinks
                    attr: 3
                  - text: ") are exceptions, they are turned into HTML links and anchors. Only links within documents are supported."
                    attr: 2
                  - text: "\r\rThe exporter is preconfigured in "
                    attr: 1
                  - text: Config.Setup
                    attr: 4
                  - text: ":\r\r"
                    attr: 1
                  - text: "\tConverters.Register(\"\", \"XhtmlExporter.ExportText\", \"TextViews.View\", \"html\", {});"
                    attr: 3
                  - text: "\r"
                    attr: 2
