                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Files, XhtmlWriters;\r\r\tCONST tab = 09X; line = 0AX;\r\r\tTYPE\r\t\tWriter = POINTER TO RECORD (XhtmlWriters.Writer)\r\t\t\tlevel: INTEGER;\t"
                    attr: 0
                  - text: "(* indentation level *)"
                    attr: 1
                  - text: "\r\t\t\tcurrent: Tag;\t"
                    attr: 0
                  - text: "(* top of tag stack *)"
                    attr: 1
                  - text: "\r\t\t\trider: Files.Writer;\r\t\t\tafterData: BOOLEAN\t"
                    attr: 0
                  - text: "(* allows delayed newline after data contents *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\r\t\tTag = POINTER TO RECORD\r\t\t\tup: Tag;\r\t\t\tinContent: BOOLEAN;\t"
                    attr: 0
                  - text: "(* subtag was entered, or text data written *)"
                    attr: 1
                  - text: "\r\t\t\tpreserve: BOOLEAN;\t"
                    attr: 0
                  - text: "(* write complete element on one line, no prettyprinting white space *)"
                    attr: 1
                  - text: "\r\t\t\tname: ARRAY 256 OF CHAR\r\t\tEND;\r\r\t"
                    attr: 0
                  - text: "(* generic output procedures *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE Char (wr:Writer; ch: CHAR);\r\tBEGIN\t"
                    attr: 0
                  - text: "(* UTF-8 format *)"
                    attr: 1
                  - text: "\r\t\tIF ch <= 7FX THEN\r\t\t\twr.rider.WriteByte(SHORT(SHORT(ORD(ch))))\r\t\tELSIF ch <= 7FFX THEN\r\t\t\twr.rider.WriteByte(SHORT(SHORT(-64 + ORD(ch) DIV 64)));\r\t\t\twr.rider.WriteByte(SHORT(SHORT(-128 + ORD(ch) MOD 64)))\r\t\tELSE\r\t\t\twr.rider.WriteByte(SHORT(SHORT(-32 + ORD(ch) DIV 4096)));\r\t\t\twr.rider.WriteByte(SHORT(SHORT(-128 + ORD(ch) DIV 64 MOD 64)));\r\t\t\twr.rider.WriteByte(SHORT(SHORT(-128 + ORD(ch) MOD 64)))\r\t\tEND\r\tEND Char;\r\r\tPROCEDURE String (wr: Writer; IN str: ARRAY OF CHAR);\r\t\tVAR i: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ti := 0; ch := str[0];\r\t\tWHILE ch # 0X DO Char(wr, ch); INC(i); ch := str[i] END\r\tEND String;\r\r\tPROCEDURE Tabs (wr: Writer);\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\tIF ~wr.current.preserve THEN\r\t\t\ti := 0; WHILE i # wr.level DO Char(wr, tab); INC(i) END\r\t\tEND\r\tEND Tabs;\r\r\tPROCEDURE StartElemContent (wr: Writer);\r\tBEGIN\t"
                    attr: 0
                  - text: "(* complete start tag *)"
                    attr: 1
                  - text: "\r\t\tString(wr, \">\"); wr.Ln;\r\t\twr.current.inContent := TRUE\r\tEND StartElemContent;\r\r\r\t"
                    attr: 0
                  - text: "(* methods *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (wr: Writer) Error (): XhtmlWriters.Error;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " NIL\r\tEND Error;\r\r\tPROCEDURE (wr: Writer) Ln;\r\tBEGIN\r\t\tIF ~wr.current.preserve THEN\r\t\t\tChar(wr, line)\r\t\tEND\r\tEND Ln;\r\r\tPROCEDURE (wr: Writer) Instruction (IN piTarget, instruction: ARRAY OF CHAR);\r\tBEGIN\r\t\tTabs(wr); String(wr, \"<?\" + piTarget + \" \" + instruction + \"?>\")\r\tEND Instruction;\r\r\tPROCEDURE (wr: Writer) Comment (IN comment: ARRAY OF CHAR);\r\tBEGIN\r\t\tTabs(wr); String(wr, \"<!--\" + comment + \"-->\")\r\tEND Comment;\r\r\tPROCEDURE (wr: Writer) DocType (IN rootName, pubidLiteral, sysidLiteral: ARRAY OF CHAR);\r\tBEGIN\r\t\tASSERT(wr.level = 0, 100);\r\t\tASSERT(rootName # \"\", 101);\r\t\tASSERT((pubidLiteral = \"\") OR (sysidLiteral # \"\"), 102);\r\t\tIF pubidLiteral # \"\" THEN\r\t\t\tString(wr, '<!DOCTYPE ' + rootName + ' PUBLIC \"' + pubidLiteral + '\" \"' + sysidLiteral + '\">')\r\t\tELSIF sysidLiteral # \"\" THEN\r\t\t\tString(wr, '<!DOCTYPE ' + rootName + ' SYSTEM \"' + sysidLiteral + '\">')\r\t\tELSE\r\t\t\tString(wr, '<!DOCTYPE ' + rootName)\r\t\tEND;\r\t\twr.Ln\r\tEND DocType;\r\r\tPROCEDURE (wr: Writer) StartTag (IN elem: ARRAY OF CHAR; preserve: BOOLEAN);\r\t\tVAR t: Tag;\r\tBEGIN\r\t\tIF ~wr.current.inContent & (wr.current.up # NIL) THEN StartElemContent(wr) END;\r\t\tTabs(wr); String(wr, \"<\" + elem); wr.afterData := FALSE;\r\t\tINC(wr.level);\r\t\tNEW(t); t.name := elem$; t.up := wr.current; t.preserve := preserve OR wr.current.preserve; wr.current := t\r\tEND StartTag;\r\r\tPROCEDURE (wr: Writer) Attr (IN name, value: ARRAY OF CHAR);\r\tBEGIN\r\t\tASSERT(wr.level >= 1, 100);\r\t\tString(wr, ' ' + name + '=\"' + value + '\"')\r\tEND Attr;\r\r\tPROCEDURE (wr: Writer) Data (IN data: ARRAY OF CHAR);\r\tBEGIN\r\t\tASSERT(wr.level >= 1, 100);\r\t\tIF data # \"\" THEN\r\t\t\tIF ~wr.current.inContent THEN\r\t\t\t\tStartElemContent(wr);\r\t\t\t\tTabs(wr)\r\t\t\tEND;\r\t\t\tString(wr, data); wr.afterData := TRUE\r\t\tEND\r\tEND Data;\r\r\tPROCEDURE (wr: Writer) EndTag;\r\tBEGIN\r\t\tASSERT(wr.level >= 1, 100);\r\t\tDEC(wr.level);\r\t\tIF wr.current.inContent THEN\r\t\t\tIF wr.afterData THEN wr.Ln END;\r\t\t\tTabs(wr); String(wr, \"</\" + wr.current.name + \">\")\r\t\tELSE\r\t\t\t"
                    attr: 0
                  - text: "(* note that StartElemContents is NOT called! *)"
                    attr: 1
                  - text: "\r\t\t\tString(wr, \"/>\")\r\t\tEND;\r\t\twr.current := wr.current.up;\r\t\twr.Ln; wr.afterData := FALSE;\r\t\tIF wr.level = 0 THEN wr.rider.Base().Flush END\r\tEND EndTag;\r\r\r\t"
                    attr: 0
                  - text: "(* factory functions *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE MakeFileSpec (IN path: ARRAY OF CHAR; OUT loc: Files.Locator; OUT file: Files.Name);\r\t\tVAR i, j: INTEGER; ch: CHAR; s: Files.Name;\r\tBEGIN\r\t\tloc := Files.dir.This(\"\"); IF loc = NIL THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\tj := 0; i := 0; ch := path[0];\r\t\tWHILE ch # 0X DO\r\t\t\tIF ch = \"/\" THEN\r\t\t\t\ts[j] := 0X;\t"
                    attr: 0
                  - text: "(* s contains next path element *)"
                    attr: 1
                  - text: "\r\t\t\t\tloc := loc.This(s); IF loc = NIL THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\t\t\tj := 0\r\t\t\tELSE\r\t\t\t\ts[j] := ch; INC(j)\r\t\t\tEND;\r\t\t\tINC(i); ch := path[i]\r\t\tEND;\r\t\ts[j] := 0X;\t"
                    attr: 0
                  - text: "(* s contains file name *)"
                    attr: 1
                  - text: "\r\t\tfile := s$\r\tEND MakeFileSpec;\r\r\tPROCEDURE "
                    attr: 0
                  - text: New
                    attr: 3
                  - text: "* (f: Files.File): XhtmlWriters.Writer;\r\t\tVAR wr: Writer;\r\tBEGIN\r\t\tASSERT(f # NIL, 20);\r\t\tNEW(wr);\r\t\tNEW(wr.current); wr.current.name := \"\"; wr.current.up := NIL;\r\t\twr.rider := f.NewWriter(NIL);\r\t\tASSERT(wr # NIL, 100); ASSERT(wr.rider # NIL, 101); ASSERT(wr.level >= 0, 102);\r\t\tString(wr, '<?xml version=\"1.0\" encoding=\"UTF-8\"?>'); wr.Ln;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " wr\r\tEND New;\r\r\tPROCEDURE "
                    attr: 0
                  - text: NewForPath
                    attr: 3
                  - text: "* (IN path: ARRAY OF CHAR): XhtmlWriters.Writer;\r\t\tVAR loc: Files.Locator; f: Files.File; name: Files.Name; wr: XhtmlWriters.Writer;\r\tBEGIN\r\t\tASSERT(path # \"\", 20);\r\t\tMakeFileSpec(path, loc, name);\r\t\tf := Files.dir.New(loc, Files.dontAsk);\r\t\tIF f # NIL THEN wr := New(f) ELSE wr := NIL END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " wr\r\tEND NewForPath;\r\rEND XhtmlStdFileWriters.\r"
                    attr: 0
