                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT Ports, Stores, Views, Controllers, Properties, TextModels;\r\r\tCONST minVersion = 0; maxVersion = 1;\r\r\tTYPE\r\t\tView = POINTER TO RECORD (Views.View)\r\t\t\topenMark: BOOLEAN\r\t\tEND;\r\r\r\t"
                    attr: 0
                  - text: "(* View *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (v: View) Internalize (VAR rd: Stores.Reader);\r\t\tVAR version: INTEGER;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: "(* v is not initialized *)\r\t\t(* v.Domain() = NIL *)"
                    attr: 1
                  - text: "\r\t\tIF ~rd.cancelled THEN\r\t\t\trd.ReadVersion(minVersion, maxVersion, version);\r\t\t\tIF ~rd.cancelled THEN\r\t\t\t\trd.ReadBool(v.openMark)\r\t\t\tEND\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE (v: View) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: "(* v is initialized *)"
                    attr: 1
                  - text: "\r\t\twr.WriteVersion(maxVersion);\r\t\twr.WriteBool(v.openMark)\r\tEND Externalize;\r\r\tPROCEDURE (v: View) CopyFromSimpleView (source: Views.View);\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: "(* v is not initialized *)\r\t\t(* v.Domain() = NIL *)\r\t\t(* source # NIL *)\r\t\t(* source is initialized *)\r\t\t(* TYP(v) = TYP(source) *)"
                    attr: 1
                  - text: "\r\t\tWITH source: View DO\r\t\t\tv.openMark := source.openMark\r\t\tEND\r\tEND CopyFromSimpleView;\r\r\tPROCEDURE (v: View) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR w, h, s: INTEGER;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: "(* f # NIL *)"
                    attr: 1
                  - text: "\r\t\tIF ~Views.IsPrinterFrame(f) THEN\r\t\t\tv.context.GetSize(w, h); w := f.r - f.l;\r\t\t\ts := 2 * f.dot;\r\t\t\tf.DrawRect(0, 0, s, h, Ports.fill, Ports.grey25);\t"
                    attr: 0
                  - text: "(* left border *)"
                    attr: 1
                  - text: "\r\t\t\tf.DrawRect(w - s, 0, w, h, Ports.fill, Ports.grey25);\t"
                    attr: 0
                  - text: "(* right border *)"
                    attr: 1
                  - text: "\r\t\t\tIF v.openMark THEN\r\t\t\t\tf.DrawRect(s, 0, w - s, s, Ports.fill, Ports.grey25);\t"
                    attr: 0
                  - text: "(* top border *)"
                    attr: 1
                  - text: "\r\t\t\t\tf.DrawRect(s, s, w - s, h, Ports.fill, Ports.grey12)\t"
                    attr: 0
                  - text: "(* interior *)"
                    attr: 1
                  - text: "\r\t\t\tELSE\r\t\t\t\tf.DrawRect(s, h - s, w - s, h, Ports.fill, Ports.grey25);\t"
                    attr: 0
                  - text: "(* bottom border *)"
                    attr: 1
                  - text: "\r\t\t\t\tf.DrawRect(s, 0, w - s, h - s, Ports.fill, Ports.grey12)\t"
                    attr: 0
                  - text: "(* interior *)"
                    attr: 1
                  - text: "\r\t\t\tEND\r\t\tEND\r\tEND Restore;\r\r\tPROCEDURE (v: View) HandleCtrlMsg (f: Views.Frame; VAR msg: Controllers.Message; VAR focus: Views.View);\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: "(* f # NIL *)"
                    attr: 1
                  - text: "\r\t\t"
                    attr: 0
                  - text: "(* focus = NIL *)"
                    attr: 1
                  - text: "\r\t\tWITH msg: Controllers.PollOpsMsg DO\r\t\t\t"
                    attr: 0
                  - text: "(* specify which editing operations are supported *)"
                    attr: 3
                  - text: "\r\t\t| msg: Controllers.TrackMsg DO\r\t\t\t"
                    attr: 0
                  - text: "(* implement mouse tracking *)"
                    attr: 3
                  - text: "\r\t\t| msg: Controllers.EditMsg DO\r\t\t\t"
                    attr: 0
                  - text: "(* implement editing operations *)"
                    attr: 3
                  - text: "\r\t\tELSE"
                    attr: 0
                  - text: "\t(* ignore other messages *)"
                    attr: 1
                  - text: "\r\t\tEND\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE (v: View) HandlePropMsg (VAR msg: Properties.Message);\r\t\tCONST viewHeight = 2 * Ports.mm;\r\tBEGIN\r\t\tWITH msg: Properties.SizePref DO\r\t\t\tmsg.w := 10000 * Ports.mm; msg.h := viewHeight\r\t\t| msg: Properties.ResizePref DO\r\t\t\tmsg.fixed := TRUE\r\t\t| msg: TextModels.Pref DO\r\t\t\t(*msg.opts := {TextModels.maskChar};\r\t\t\tmsg.mask := TextModels.para*)\r\t\tELSE\t"
                    attr: 0
                  - text: "(* ignore other messages *)"
                    attr: 1
                  - text: "\r\t\tEND\r\tEND HandlePropMsg;\r\r\r\t"
                    attr: 0
                  - text: "(** miscellaneous **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: IsOpenMark
                    attr: 3
                  - text: "* (v: Views.View): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " (v # NIL) & (v IS View) & v(View).openMark\r\tEND IsOpenMark;\r\r\tPROCEDURE "
                    attr: 0
                  - text: IsCloseMark
                    attr: 3
                  - text: "* (v: Views.View): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " (v # NIL) & (v IS View) & ~v(View).openMark\r\tEND IsCloseMark;\r\r\tPROCEDURE "
                    attr: 0
                  - text: New
                    attr: 3
                  - text: "* (openMark: BOOLEAN): Views.View;\r\t\tVAR v: View;\r\tBEGIN\r\t\tNEW(v); v.openMark := openMark; "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " v\r\tEND New;\r\r\tPROCEDURE "
                    attr: 0
                  - text: DepositOpenMark
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\tViews.Deposit(New(TRUE))\r\tEND DepositOpenMark;\r\r\tPROCEDURE "
                    attr: 0
                  - text: DepositCloseMark
