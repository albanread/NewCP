                        - text: "\r\t- bug: rd.ReadChar sometimes returns attr = NIL for a character!?\r\t- may em occur outside of p (as now in table fields)?\r\t- may br only/not occur inside of p?\r\t- where does the document name come from?\r\t- how should unknown view types be handled (extensible translator framework)?\r\t- how can the BlackBox converter mechanism be extended to handle complex documents, which must be converted\r\t   to entire subdirectories?\r\t- should symbolic font sizes (-1..-8) be introduced, for a direct match with HTML?\r\t"
