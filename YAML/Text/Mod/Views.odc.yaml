                  - text: "\r\tBEGIN\r\t\tv.Externalize2^(wr);\r\t\tIF (v.context = NIL) OR v.context.Normalize() THEN\r\t\t\torg := 0; dy := 0; hideMarks := TRUE\r\t\tELSE\r\t\t\torg := v.org; dy := v.dy; hideMarks := v.hideMarks\r\t\tEND;\r\t\twr.WriteVersion(maxStdVersion);\r\t\twr.WriteBool(hideMarks);\r\t\t"
