                  - text: ");\r\t\twr.WriteInt(org); wr.WriteInt(dy)\r\tEND Externalize2;\r\r\tPROCEDURE (v: StdView) CopyFromModelView2 (source: Views.View; model: Models.Model);\r\t\tVAR s: TextSetters.Setter; r: TextRulers.Ruler;\r\tBEGIN\r\t\t(* v.CopyFromModelView^(source, model); *)\r\t\tWITH source: StdView DO\r\t\t\ts := Stores.CopyOf(source.setter)(TextSetters.Setter);\r\t\t\tv.setter := s; v.setter0 := NIL;\r\t\t\tr := TextRulers.CopyOf(source.defRuler, Views.deep);\r\t\t\tv.DisplayMarks(source.HidesMarks());\r\t\t\tv.SetDefaults(r, source.defAttr);\r\t\t\tv.trailer := NIL; v.bot := 0;\r\t\t\tIF v.text = source.text THEN\r\t\t\t\tv.org := source.org; v.dy := source.dy\r\t\t\tEND\r\t\tEND\r\tEND CopyFromModelView2;\r\r\tPROCEDURE (v: StdView) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR st: TextSetters.Setter; u0, u: Line;\r\t\t\ty0, y, w, h: INTEGER; end: INTEGER; pageF: BOOLEAN;\r\tBEGIN\r\t\tASSERT(v.context # NIL, 20);\r\t\tIF v.setter # NIL THEN v.context.GetSize(w, h) END;\r\t\tIF (v.setter = NIL) OR (v.setter.vw # w) THEN\r\t\t\tViews.RemoveFrames(f, l, t, r, b)\r\t\tEND;\r\t\tValidateLines(v, b);\r\t\tu := v.trailer.next; y := v.dy;\r\t\tpageF := Views.IsPrinterFrame(f) & v.context.Normalize();\r\t\tIF pageF THEN\t"
