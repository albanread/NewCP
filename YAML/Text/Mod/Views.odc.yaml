                  - text: "\r\t\t\tASSERT((u.box.len > 0) OR u.box.eot OR (u.next = v.trailer), 100);\r\t\t\tDrawLine(v, u.start, u.box, f, l, r, y + u.asc, y + u.h - u.box.dsc - u.box.asc, pageF);\r\t\t\tINC(y, u.h); u := u.next\r\t\tEND;\r\t\tWHILE (u # v.trailer) & (y < b) & (~pageF OR (u.start < end)) DO\r\t\t\tASSERT((u.box.len > 0) OR u.box.eot OR (u.next = v.trailer), 101);\r\t\t\tIF u.box.ruler # u0.box.ruler THEN\r\t\t\t\tDrawDecorations(v, u0, f, l, y0, r, y); u0 := u; y0 := y\r\t\t\tEND;\r\t\t\tDrawLine(v, u.start, u.box, f, l, r, y + u.asc, y + u.h - u.box.dsc - u.box.asc, pageF);\r\t\t\tINC(y, u.h); u := u.next\r\t\tEND;\r\t\tIF y0 # y THEN DrawDecorations(v, u0, f, l, y0, r, y) END\r\tEND Restore;\r\r\tPROCEDURE (v: StdView) DisplayMarks (hide: BOOLEAN);\r\t\tVAR op: SetOp; c: Containers.Controller;\r\tBEGIN\r\t\tIF v.hideMarks # hide THEN\r\t\t\tc := v.ThisController();\r\t\t\tIF c # NIL THEN Containers.FadeMarks(c, Containers.hide) END;\r\t\t\tIF (v.context # NIL) & ~v.context.Normalize() THEN\r\t\t\t\tNEW(op); op.hideMarks := hide; DoSet(op, setMarks, v)\r\t\t\tELSE\r\t\t\t\tv.hideMarks := hide; RebuildView(v)\r\t\t\tEND\r\t\tEND\r\tEND DisplayMarks;\r\r\tPROCEDURE (v: StdView) HidesMarks (): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 5
                  - text: " v.hideMarks\r\tEND HidesMarks;\r\r\tPROCEDURE (v: StdView) SetSetter (setter: TextSetters.Setter);\r\t\tVAR op: SetOp;\r\tBEGIN\r\t\tASSERT(setter # NIL, 20);\r\t\tIF v.setter # setter THEN\r\t\t\tIF v.setter # NIL THEN\r\t\t\t\tNEW(op); op.setter := setter; DoSet(op, setSetter, v)\r\t\t\tELSE v.setter := setter\r\t\t\tEND\r\t\tEND\r\tEND SetSetter;\r\r\tPROCEDURE (v: StdView) ThisSetter (): TextSetters.Setter;\r\t\tVAR st: TextSetters.Setter; w, h: INTEGER;\r\tBEGIN\r\t\tst := v.setter; ASSERT(st # NIL, 20);\r\t\tIF st # v.setter0 THEN\r\t\t\tIF v.context # NIL THEN\r\t\t\t\tv.context.GetSize(w, h)\r\t\t\tELSE\r\t\t\t\tIF Dialog.metricSystem THEN\r\t\t\t\t\tw := 165*mm\r\t\t\t\tELSE\r\t\t\t\t\tw := 104*inch16\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tst.ConnectTo(v.text, v.defRuler, w, v.hideMarks);\r\t\t\tv.setter0 := st\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 5
                  - text: " st\r\tEND ThisSetter;\r\r\tPROCEDURE (d: StdView) AcceptableModel (m: Containers.Model): BOOLEAN;\r\tBEGIN\r\t\tRETURN m IS TextModels.Model\r\tEND AcceptableModel;\r\t\r\tPROCEDURE (v: StdView) InitModel2 (m: Containers.Model);\r\tBEGIN\r\t\tASSERT(m IS TextModels.Model, 23);\r\t\tv.text := m(TextModels.Model)\r\tEND InitModel2;\r\r\tPROCEDURE (v: StdView) SetOrigin (org, dy: INTEGER);\r\t\tVAR st: TextSetters.Setter; start: INTEGER;\r\tBEGIN\r\t\tASSERT(v.text # NIL, 20);\r\t\tst := v.ThisSetter(); start := st.ThisLine(org);\r\t\tIF start # org THEN org := start; dy := 0 END;\r\t\tDoSetOrigin(v, org, dy, FALSE)\r\tEND SetOrigin;\r\r\tPROCEDURE (v: StdView) PollOrigin (OUT org, dy: INTEGER);\r\tBEGIN\r\t\torg := v.org; dy := v.dy\r\tEND PollOrigin;\r\r\tPROCEDURE (v: StdView) SetDefaults (r: TextRulers.Ruler; a: TextModels.Attributes);\r\t\tVAR op: SetOp;\r\tBEGIN\r\t\tASSERT(r # NIL, 20); ASSERT(r.style.attr.init, 21);\r\t\tASSERT(a # NIL, 22); ASSERT(a.init, 23);\r\t\tIF (v.defRuler # r) OR (v.defAttr # a) THEN\r(*\r\t\t\t(*IF (v.context # NIL) & (r # v.defRuler) THEN*)\r\t\t\tIF (v.Domain() # NIL) & (r # v.defRuler) THEN\r\t\t\t\tStores.InitDomain(r, v.Domain())\r\t\t\tEND;\r*)\r\t\t\tIF r # v.defRuler THEN Stores.Join(v, r) END;\r\t\t\tNEW(op); op.defRuler := r; op.defAttr := a; DoSet(op, setDefs, v)\r\t\tEND\r\tEND SetDefaults;\r\r\tPROCEDURE (v: StdView) PollDefaults (OUT r: TextRulers.Ruler; OUT a: TextModels.Attributes);\r\tBEGIN\r\t\tr := v.defRuler; a := v.defAttr\r\tEND PollDefaults;\r\r(*\r\tPROCEDURE (v: StdView) PropagateDomain;\r\t\tVAR m: Models.Model;\r\tBEGIN\r\t\tASSERT(v.setter # NIL, 20); ASSERT(v.text # NIL, 21);\r\t\tASSERT(v.defRuler # NIL, 22); ASSERT(v.defAttr # NIL, 23);\r\t\tv.PropagateDomain^;\r\t\tm := v.ThisModel();\r\t\tIF m # NIL THEN Stores.InitDomain(m, v.Domain()) END;\r\t\tStores.InitDomain(v.defRuler, v.Domain())\r\tEND PropagateDomain;\r\t*)\r(*\r\tPROCEDURE (v: StdView) Flush, NEW;\r\tBEGIN\r\t\tv.trailer := NIL; v.bot := 0; v.setter0 := NIL\r\tEND Flush;\r*)\r\tPROCEDURE (v: StdView) HandleModelMsg2 (VAR msg: Models.Message);\r\tBEGIN\r\t\tIF msg.model = v.text THEN\r\t\t\tWITH msg: Models.UpdateMsg DO\r\t\t\t\tWITH msg: TextModels.UpdateMsg DO\r\t\t\t\t\tIF msg.op IN {TextModels.insert, TextModels.delete, TextModels.replace} THEN\r\t\t\t\t\t\tUpdateView(v, msg.beg, msg.end, msg.delta)\r\t\t\t\t\tELSE\t"
                    attr: 0
