                    attr: 3
                  - text: "\t\t\tELSE\r\t\t\tEND\r\t\tEND\r\tEND HandleModelMsg2;\r\r\tPROCEDURE (v: StdView) HandleViewMsg2 (f: Views.Frame; VAR msg: Views.Message);\r\tBEGIN\r\t\tIF msg.view = v THEN\r\t\t\tWITH msg: FindAnyFrameMsg DO\r\t\t\t\tIF (msg.frame = NIL) OR (msg.frame.b - msg.frame.t > f.b - f.t) THEN msg.frame := f END\r\t\t\tELSE\r\t\t\tEND\r\t\tELSE\r\t\t\tWITH msg: Views.UpdateCachesMsg DO\t"
                    attr: 0
                  - text: "(* display view in new frame *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF Views.Era(v) # Models.Era(v.text) THEN\r\t\t\t\t\t"
                    attr: 0
                  - text: "(* view/setter caches outdated - possible if v previous to this notification had no frame open *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tv.setter0 := NIL; v.trailer := NIL; v.bot := 0\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\tEND\r\t\tEND\r\tEND HandleViewMsg2;\r\r\tPROCEDURE (v: StdView) HandleCtrlMsg2 (f: Views.Frame;\r\t\tVAR msg: Controllers.Message; VAR focus: Views.View\r\t);\r\tBEGIN\r\t\tWITH msg: Controllers.PollSectionMsg DO\r\t\t\tIF (focus = NIL) OR ~msg.focus THEN\r\t\t\t\tPollSection(v, f, msg);\r\t\t\t\tfocus := NIL\r\t\t\tEND\r\t\t| msg: FindFocusFrameMsg DO\r\t\t\tIF (msg.view = v) & (msg.frame = NIL) THEN msg.frame := f END\r\t\t| msg: Controllers.ScrollMsg DO\r\t\t\tIF (focus = NIL) OR ~msg.focus THEN\r\t\t\t\tScroll(v, f, msg);\r\t\t\t\tfocus := NIL\r\t\t\tEND\r\t\t| msg: Controllers.PageMsg DO\r\t\t\tPage(v, f.b - f.t, msg.op, msg.pageY, msg.done, msg.eoy);\r\t\t\tfocus := NIL\r\t\tELSE\r\t\tEND\r\tEND HandleCtrlMsg2;\r\r\tPROCEDURE (v: StdView) HandlePropMsg2 (VAR p: Properties.Message);\r\t\tCONST minW = 5 * point; maxW = maxHeight; minH = 5 * point; maxH = maxHeight;\r\t\tVAR st: TextSetters.Setter;\r\tBEGIN\r\t\tWITH p: Properties.SizePref DO\r\t\t\tIF p.w = Views.undefined THEN p.w := v.defRuler.style.attr.right END;\r\t\t\tIF p.h = Views.undefined THEN p.h := MAX(INTEGER) END\r\t\t| p: Properties.BoundsPref DO\r\t\t\tst := v.ThisSetter();\r\t\t\tst.GetBox(0, v.text.Length(), maxW, maxH, p.w, p.h);\r\t\t\tIF p.w < minW THEN p.w := minW END;\r\t\t\tIF p.h < minH THEN p.h := minH END\r\t\t| p: Properties.ResizePref DO\r\t\t\tp.fixed := FALSE;\r\t\t\tp.horFitToPage := ~(TextRulers.rightFixed IN v.defRuler.style.attr.opts);\r\t\t\tp.verFitToWin := TRUE\r\t\t| p: Properties.TypePref DO\r\t\t\tIF Services.Is(v, p.type) THEN p.view := v END\r\t\t| p: Containers.DropPref DO\r\t\t\tp.okToDrop := TRUE\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg2;\r\r\r\tPROCEDURE (v: StdView) GetThisLocation (f: Views.Frame; pos: INTEGER; OUT loc: Location);\r\t"
                    attr: 0
                  - text: "(* pre: f must be displayed *)\r"
                    attr: 1
                  - text: "\t"
                    attr: 0
                  - text: "(* if position lies outside view, the next best location inside will be taken *)"
                    attr: 1
                  - text: "\r\t\tVAR rd: TextSetters.Reader; t: Line; p1, y, w, h: INTEGER;\r\tBEGIN\r\t\tValidateLines(v, f.b);\r\t\ty := v.dy;\r\t\tIF pos < v.org THEN\r\t\t\tt := v.trailer.next;\r\t\t\tloc.start := t.start; loc.pos := t.start;\r\t\t\tloc.x := 0; loc.y := y; loc.asc := t.asc; loc.dsc := t.h - t.asc; loc.view := NIL;\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: "\r\t\tELSIF pos < v.trailer.start THEN\r\t\t\tt := v.trailer.next;\r\t\t\tWHILE ~t.box.eot & ~((t.start <= pos) & (pos < t.next.start)) DO\r\t\t\t\tINC(y, t.h); t := t.next\r\t\t\tEND\r\t\tELSE\t"
                    attr: 0
                  - text: "(* pos >= v.trailer.start *)"
                    attr: 1
                  - text: "\r\t\t\tt := v.trailer.next; WHILE ~t.box.eot DO INC(y, t.h); t := t.next END;\r\t\t\tIF t = v.trailer THEN\r\t\t\t\tloc.start := t.start; loc.pos := t.start;\r\t\t\t\tloc.x := 0; loc.y := y; loc.asc := t.asc; loc.dsc := t.h - t.asc; loc.view := NIL;\r\t\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: "\r\t\t\tEND\r\t\tEND;\r\t\tp1 := t.start;\r\t\trd := GetReader(v, p1, t.box); rd.Read;\r\t\tWHILE rd.pos < pos DO\r\t\t\tp1 := rd.pos; rd.AdjustWidth(t.start, p1, t.box, rd.w); INC(rd.x, rd.w); rd.Read\r\t\tEND;\r\t\tIF LEN(rd.string$) > 1 THEN\t"
                    attr: 0
                  - text: "(* collated subsequence *)"
                    attr: 1
                  - text: "\r\t\t\trd.x := f.CharPos(rd.x, pos - p1, rd.string, rd.attr.font);\r\t\t\tIF rd.pos = pos THEN rd.Read END\r\t\tELSIF rd.pos = pos THEN\r\t\t\trd.AdjustWidth(t.start, pos, t.box, rd.w); INC(rd.x, rd.w); rd.Read\r\t\tELSE\r\t\t\tASSERT(p1 = pos, 100)\r\t\tEND;\r\t\tloc.view := rd.view;\r\t\tloc.start := t.start; loc.pos := pos;\r\t\tloc.x := rd.x; loc.y := y; loc.asc := t.asc; loc.dsc := t.h - t.asc;\r\t\tIF loc.view # NIL THEN\r\t\t\tv.context.GetSize(w, h);\r\t\t\tIF rd.x + rd.w > w THEN rd.w := w - rd.x END;\r\t\t\tloc.l := rd.x; loc.t := y - rd.attr.offset + t.asc + rd.dsc - rd.h;\r\t\t\tloc.r := loc.l + rd.w; loc.b := loc.t + rd.h\r\t\tEND;\r\t\tCacheReader(v, rd)\r\tEND GetThisLocation;\r\r\tPROCEDURE (v: StdView) GetRange (f: Views.Frame; OUT beg, end: INTEGER);\r\t\tVAR t: Line;\r\tBEGIN\r\t\tValidateLines(v, f.b);\r\t\tt := ThisViewLine(v, f.t); beg := t.start; end := Limit(v, f.b, TRUE)\r\tEND GetRange;\r\r\tPROCEDURE (v: StdView) ThisPos (f: Views.Frame; x, y: INTEGER): INTEGER;\r\t"
                    attr: 0
                  - text: "(* pre: f must be displayed *)\r\t(* post: f.org <= result <= v.text.Length() *)"
                    attr: 1
                  - text: "\r\t\tVAR rd: TextSetters.Reader; t: Line; p1, end, py: INTEGER;\r\tBEGIN\r\t\tValidateLines(v, f.b);\r\t\tt := v.trailer.next; py := v.dy;\r\t\tWHILE ~t.box.eot & (py + t.h <= y) DO INC(py, t.h); t := t.next END;\r\t\tp1 := t.start; end := p1 + t.box.len;\r\t\tIF py + t.h > y THEN\r\t\t\tIF (end > p1) & (y >= v.dy) THEN\r\t\t\t\tIF t.box.eot THEN INC(end) END;\r\t\t\t\trd := GetReader(v, p1, t.box);\r\t\t\t\trd.Read; rd.AdjustWidth(t.start, rd.pos, t.box, rd.w);\r\t\t\t\tWHILE (rd.x + rd.SplitWidth(rd.w) < x) & (rd.pos < end) DO\r\t\t\t\t\tp1 := rd.pos; INC(rd.x, rd.w);\r\t\t\t\t\trd.Read; rd.AdjustWidth(t.start, rd.pos, t.box, rd.w)\r\t\t\t\tEND;\r\t\t\t\tIF LEN(rd.string$) > 1 THEN\t"
                    attr: 0
                  - text: "(* collated subsequence *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tINC(p1, f.CharIndex(rd.x, x, rd.string, rd.attr.font))\r\t\t\t\tEND;\r\t\t\t\tCacheReader(v, rd)\r\t\t\tEND\r\t\tELSE p1 := end\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " p1\r\tEND ThisPos;\r\r\tPROCEDURE (v: StdView) ShowRangeIn (f: Views.Frame; beg, end: INTEGER);\r\t\tCONST minH = 12 * point;\r\t\tVAR c: Models.Context; st: TextSetters.Setter; t, t1: Line;\r\t\t\torg0, last, len,  org, dy,  p, q: INTEGER; y, h, mh: INTEGER;\r\t\t\tbox, box0: TextSetters.LineBox; loc, loc1: Location;\r\t\t\tfocus: BOOLEAN;\r\tBEGIN\r\t\tfocus := f = Controllers.FocusFrame();\r\t\tc := v.context;\r\t\tst := v.ThisSetter(); ValidateLines(v, f.b); org0 := v.org;\r\t\tlast := Limit(v, f.b, FALSE); len := v.text.Length();\r\t\tIF last = len THEN p := st.ThisLine(last); LocateThisLine(v, p, t1, y); h := f.b - y END;\r\t\tIF (beg > last)\r\t\tOR (beg = last) & ((last < len) OR (len > 0) & (h < t1.h) & (h < minH))"
                    attr: 0
                  - text: "\r"
                    attr: 3
                  - text: "\t\tOR (end < org0)\r\t\tOR (beg < end) & (end = org0) THEN\r\t\t\torg := -1; dy := 0;\r\t\t\tIF beg <= org0 THEN\t"
                    attr: 0
                  - text: "(* try to adjust by scrolling up *)"
                    attr: 1
                  - text: "\r\t\t\t\tp := st.PreviousLine(v.org);\r\t\t\t\tIF p <= beg THEN\t"
                    attr: 0
                  - text: "(* reveal one line at top *)"
                    attr: 1
                  - text: "\r\t\t\t\t\torg := p; st.GetLine(org, box);\r\t\t\t\t\th := box.asc + box.dsc + st.GridOffset(-1, box);\r\t\t\t\t\tIF h > maxScrollHeight + fuseScrollHeight THEN\r\t\t\t\t\t\tdy := -(h - h MOD maxScrollHeight);\r\t\t\t\t\t\tIF h + dy < fuseScrollHeight THEN INC(dy, maxScrollHeight) END\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF (org = -1) & (beg >= last) THEN\t"
                    attr: 0
                  - text: "(* try to adjust by scrolling down *)"
                    attr: 1
                  - text: "\r\t\t\t\tp := st.ThisLine(last); q := st.NextLine(p); st.GetLine(q, box);\r\t\t\t\tIF (beg < q + box.len)"
                    attr: 0
                  - text: " OR (p = q)"
                    attr: 3
                  - text: " THEN\t"
                    attr: 0
                  - text: "(* reveal one line at bottom *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tLocateThisLine(v, p, t1, y);\r\t\t\t\t\th := box.asc + box.dsc + st.GridOffset(t1.box.dsc, box);\r\t\t\t\t\tIF h > maxScrollHeight + fuseScrollHeight THEN h := maxScrollHeight END;\r\t\t\t\t\tmh := y + t1.h - f.b + h;\r\t\t\t\t\tt := v.trailer.next; h := v.dy;\r\t\t\t\t\tWHILE (t # v.trailer) & (h < mh) DO INC(h, t.h); t := t.next END;\r\t\t\t\t\tIF t.start > v.org THEN org := t.start END\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tIF org = -1 THEN\t"
                    attr: 0
                  - text: "(* adjust by moving into \"nice\" position *)"
                    attr: 1
                  - text: "\r\t\t\t\tmh := f.b DIV 3;\r\t\t\t\torg := st.ThisLine(beg); st.GetLine(org, box0);\r\t\t\t\th := box0.asc + box0.dsc + st.GridOffset(-1, box0); p := org;\r\t\t\t\tWHILE (p > 0) & (h < mh) DO\r\t\t\t\t\tDEC(h, st.GridOffset(-1, box0)); org := p;\r\t\t\t\t\tp := st.PreviousLine(org); st.GetLine(p, box);\r\t\t\t\t\tINC(h, box.asc + box.dsc + st.GridOffset(box.dsc, box0));\r\t\t\t\t\tbox0 := box\r\t\t\t\tEND;\r\t\t\t\t"
                    attr: 0
                  - text: "IF (org = len) & (len > 0) THEN org := st.PreviousLine(org) END"
                    attr: 3
                  - text: "\r\t\t\tEND;\r\t\t\tDoSetOrigin(v, org, dy, FALSE)\r\t\tEND;\r\t\tIF focus THEN\r\t\t\tf := Controllers.FocusFrame();\r\t\t\tIF (f # NIL) & (f.view = v) THEN\r\t\t\t\r\t\t\t\tv.GetThisLocation(f, beg, loc);\r\t\t\t\tv.GetThisLocation(f, end, loc1);\r\t\t\t\tIF (loc.y = loc1.y) & (loc.x <= loc1.x) THEN\r\t\t\t\t\tc.MakeVisible(loc.x, loc.y, loc1.x, loc1.y)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tHALT(100); (* this should not happen *)\r\t\t\tEND\r\t\tEND;\r(*\r\t\tIF c IS Documents.Context THEN\r\t\t\tv.GetThisLocation(f, beg, loc);\r\t\t\tv.GetThisLocation(f, end, loc1);\r\t\t\tIF (loc.y = loc1.y) & (loc.x <= loc1.x) THEN\r\t\t\t\tDocuments.MakeVisible(c(Documents.Context).ThisDoc(), f, loc.x, loc.y, loc1.x, loc1.y)\r\t\t\tEND\r\t\tEND\r*)\r\tEND ShowRangeIn;\r\r\tPROCEDURE (v: StdView) ShowRange (beg, end: INTEGER; focusOnly: BOOLEAN);\r\t\tVAR fmsg: FindFocusFrameMsg; amsg: FindAnyFrameMsg; f: Views.Frame;\r\tBEGIN\r\t\tIF focusOnly THEN\r\t\t\tfmsg.view := v; fmsg.frame := NIL; Controllers.Forward(fmsg); f := fmsg.frame\r\t\tELSE\r\t\t\tamsg.frame := NIL; Views.Broadcast(v, amsg); f := amsg.frame\r\t\tEND;\r\t\tIF f # NIL THEN v.ShowRangeIn(f, beg, end) END\r\tEND ShowRange;\r\r\r\t"
                    attr: 0
                  - text: "(* StdDirectory *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (d: StdDirectory) New (text: TextModels.Model): View;\r\t\tVAR v: StdView; c: Controllers.Controller; r: TextRulers.Ruler;\r\tBEGIN\r\t\tr := TextRulers.dir.New(NIL);\r\t\tIF text = NIL THEN text := TextModels.dir.New() END;\r\t\t(* IF text.Domain() # NIL THEN Stores.InitDomain(r, text.Domain()) END; *)\r\t\tStores.Join(text, r);\r\t\tNEW(v); v.hideMarks := FALSE; v.bot := 0; v.org := 0; v.dy := 0;\r\t\tv.InitModel(text);\r\t\tv.SetDefaults(r, d.defAttr);\r\t\tv.SetSetter(TextSetters.dir.New());\r\t\tv.DisplayMarks(hide);\r\t\tIF ctrlDir # NIL THEN v.SetController(ctrlDir.New()) END;\r\t\t(* Stores.InitDomain(v, text.Domain()); *)\r\t\tStores.Join(v, text);\r\t\t"
