                  - text: " t\r\tEND NewLine;\r\r\tPROCEDURE AddLine (st: TextSetters.Setter; VAR t: Line; VAR start, y: INTEGER);\r\tBEGIN\r\t\tt.next := NewLine(st, start, t.box.dsc); t := t.next;\r\t\tINC(start, t.box.len); INC(y, t.h)\r\tEND AddLine;\r\r\tPROCEDURE InitLines (v: StdView);\r\t\tVAR asc, dsc, w: INTEGER; t0, t: Line; start, y: INTEGER;\r\tBEGIN\r\t\tv.defAttr.font.GetBounds(asc, dsc, w);\r\t\tNEW(t0); start := v.org; y := v.dy;\r\t\tt0.box.dsc := -1;\t"
                    attr: 0
                  - text: "(* dsc = -1: trailer.next is first line *)"
                    attr: 1
                  - text: "\r\t\tt := t0; AddLine(v.ThisSetter(), t, start, y); t.next := t0;\t"
                    attr: 0
                  - text: "(* at least one valid line desc *)"
                    attr: 1
                  - text: "\r\t\tt0.start := start; t0.asc := asc; t0.h := asc + dsc;\t"
                    attr: 0
                  - text: "(* trailer.(asc, h) for caret display following last line *)"
                    attr: 1
                  - text: "\r\t\tt0.attr := NIL;\r\t\tt0.box.eot := TRUE; t0.box.len := 0;\r\t\tt0.box.ruler := NIL;\r\t\tt0.box.left := -1;\t"
                    attr: 0
                  - text: "(* make trailer async to every other line *)"
                    attr: 1
                  - text: "\r\t\tv.trailer := t0; v.bot := 0\r\tEND InitLines;\r\r\tPROCEDURE ExtendLines (v: StdView; bot: INTEGER);\r\t\tVAR st: TextSetters.Setter; t0, t: Line; start, y: INTEGER;\r\tBEGIN\r\t\tIF bot >= v.bot THEN\r\t\t\tt0 := v.trailer; start := t0.start;\r\t\t\ty := v.dy; t := t0; WHILE t.next # t0 DO t := t.next; INC(y, t.h) END;\r\t\t\tIF (y < bot) & ~t.box.eot THEN\r\t\t\t\tst := v.ThisSetter();\r\t\t\t\tREPEAT AddLine(st, t, start, y) UNTIL (y >= bot) OR t.box.eot;\r\t\t\t\tt.next := t0; t0.start := start\r\t\t\tEND;\r\t\t\tv.bot := bot\r\t\tEND\r\tEND ExtendLines;\r\r\tPROCEDURE ReduceLines (v: StdView; bot: INTEGER);\r\t\tVAR t0, t: Line; y: INTEGER;\r\tBEGIN\r\t\tIF bot <= v.bot THEN\r\t\t\tt0 := v.trailer; y := v.dy;\r\t\t\tt := t0; WHILE (t.next # t0) & (y < bot) DO t := t.next; INC(y, t.h) END;\r\t\t\tt0.start := t.next.start; t.next := t0;\r\t\t\tv.bot := bot\r\t\tEND\r\tEND ReduceLines;\r\r\tPROCEDURE ValidateLines (v: StdView; bot: INTEGER);\r\t\tVAR st: TextSetters.Setter; w, h, len: INTEGER;\r\tBEGIN\r\t\tIF v.setter # NIL THEN\r\t\t\tv.context.GetSize(w, h);\t"
                    attr: 0
                  - text: "(* possibly adapt to changed width *)"
                    attr: 1
                  - text: "\r\t\t\tIF v.setter.vw # w THEN v.setter0 := NIL; v.trailer := NIL END\r\t\tEND;\r\t\tlen := v.text.Length();\r\t\tIF (v.org > len) OR (v.trailer # NIL) & (v.trailer.start > len) THEN v.trailer := NIL END;\r\t\tIF v.trailer = NIL THEN\r\t\t\tIF v.org > len THEN v.org := len END;\r\t\t\tst := v.ThisSetter(); v.org := st.ThisLine(v.org);\r\t\t\tInitLines(v)\r\t\tEND;\r\t\tExtendLines(v, bot)\r\tEND ValidateLines;\r\r\tPROCEDURE PrependLines (v: StdView);\r\t\tVAR st: TextSetters.Setter;  t0, t1, t: Line; start, y: INTEGER;\r\tBEGIN\r\t\tt0 := v.trailer; start := v.org; y := v.dy;\r\t\tIF t0.start # start THEN\r\t\t\tst := v.ThisSetter();\r\t\t\tt := t0; t1 := t0.next;\r\t\t\tWHILE (t1.start # start) & (y < v.bot) DO AddLine(st, t, start, y) END;\r\t\t\tIF y >= v.bot THEN\r\t\t\t\tt.next := t0; t0.start := start\r\t\t\tELSE\r\t\t\t\tt.next := t1;\r\t\t\t\tIF t1 # v.trailer THEN SetLineAsc(st, t1, t.box.dsc) END\r\t\t\tEND\r\t\tEND\r\tEND PrependLines;\r\r\r\t"
                    attr: 0
                  - text: "(* update frame after insert/delete/replace *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE ThisViewLine (v: StdView; y: INTEGER): Line;\r\t"
                    attr: 0
                  - text: "(* pre: 0 <= y < v.bot *)\r"
                    attr: 1
                  - text: "\t\tVAR t: Line; py: INTEGER;\r\tBEGIN\r\t\tt := v.trailer.next; py := v.dy;\r\t\tWHILE ~t.box.eot & (py + t.h < y) DO INC(py, t.h); t := t.next END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 5
                  - text: " t\r\tEND ThisViewLine;\r\r\tPROCEDURE LocateThisLine (v: StdView; start: INTEGER; OUT t: Line; OUT y: INTEGER);\r\t\tVAR t1: Line;\r\tBEGIN\r\t\tt := v.trailer.next; y := v.dy;\r\t\tt1 := v.trailer.next;\r\t\tWHILE t.start # start DO INC(y, t.h); t := t.next; ASSERT(t # t1, 100) END\r\tEND LocateThisLine;\r\r\tPROCEDURE GetStart (st: TextSetters.Setter; v: StdView; beg: INTEGER; OUT start: INTEGER);\r\t"
                    attr: 0
                  - text: "(* find start of line containing beg after text change; tuned using valid line descs *)"
                    attr: 1
                  - text: "\r\t\tVAR s, t: Line;\r\tBEGIN\r\t\ts := v.trailer; t := s.next;\r\t\tWHILE (t # v.trailer) & (t.start + t.box.len < beg) DO s := t; t := s.next END;\r\t\tIF s # v.trailer THEN\t"
                    attr: 0
                  - text: "(* at least first line desc possibly still valid *)"
                    attr: 1
                  - text: "\r\t\t\tstart := st.NextLine(s.start);\t"
                    attr: 0
                  - text: "(* NextLine can be much cheaper than ThisLine *)"
                    attr: 1
                  - text: "\r\t\t\tIF start # t.start THEN\r\t\t\t\tGetStart(st, v, s.start, start)\r\t\t\tELSIF "
                    attr: 0
                  - text: "~t.box.eot & "
                    attr: 3
                  - text: "(start + t.box.len = beg) & (st.NextLine(start) = beg) THEN\r\t\t\t\tstart := beg\r\t\t\tEND\r\t\tELSE\r\t\t\tIF v.org <= v.text.Length() THEN\r\t\t\t\tstart := st.ThisLine(v.org)\r\t\t\tELSE\r\t\t\t\tstart := st.ThisLine(v.text.Length())\r\t\t\tEND;\r\t\t\tIF start < v.org THEN\r\t\t\t\tDoSetOrigin(v, start, 0, TRUE)\r\t\t\tELSIF start > v.org THEN\r\t\t\t\tstart := v.org\r\t\t\tEND\r\t\tEND\r\tEND GetStart;\r\r\tPROCEDURE GetStringStart (v: StdView; t: Line; pos: INTEGER; OUT p1, x: INTEGER);\r\t\tVAR rd: TextSetters.Reader;\r\tBEGIN\r\t\tp1 := t.start; x := t.box.left;\r\t\tIF t.box.views THEN\r\t\t\trd := GetReader(v, p1, t.box); rd.Read;\r\t\t\tWHILE ~rd.eot & (rd.pos <= pos) DO\r\t\t\t\trd.AdjustWidth(t.start, p1, t.box, rd.w); INC(rd.x, rd.w);\r\t\t\t\tIF rd.view # NIL THEN p1 := rd.pos; x := rd.x END;\r\t\t\t\trd.Read\r\t\t\tEND;\r\t\t\tCacheReader(v, rd)\r\t\tEND\r\tEND GetStringStart;\r\r\tPROCEDURE InSynch (t0, t1: Line): BOOLEAN;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " (t0.start = t1.start) & (t0.asc = t1.asc) & (t0.attr = t1.attr)\r\t\t\t& (t0.box.left = t1.box.left) & (t0.box.asc = t1.box.asc) & (t0.box.dsc = t1.box.dsc)\r\t\t\t& (t0.box.rbox = t1.box.rbox) & (t0.box.bop = t1.box.bop)\r\tEND InSynch;\r\r\tPROCEDURE RebuildView (v: StdView);\r\tBEGIN\r\t\tv.setter0 := NIL;\r\t\tIF v.trailer # NIL THEN v.trailer := NIL; v.bot := 0; Views.Update(v, Views.rebuildFrames) END\r\tEND RebuildView;\r\r\tPROCEDURE UpdateIn (v: StdView; l, t, b: INTEGER);\r\tBEGIN\r\t\tViews.UpdateIn(v, l, t, MAX(INTEGER), b, Views.rebuildFrames)\r\tEND UpdateIn;\r\r\tPROCEDURE UpdateFrames (v: StdView; t0, t1, u: Line; beg, y0, yu: INTEGER);\r\t\tVAR t, te: Line; b, x, b0, b1, top, bot: INTEGER;\r\tBEGIN\r\t\tIF ((beg < t0.next.start) OR t0.box.eot) & ~t0.box.adj\r\t\t & ((beg < t1.next.start) OR t1.box.eot) & ~t1.box.adj\r\t\t & InSynch(t0, t1) THEN\r\t\t\tGetStringStart(v, t1, beg, beg, x)\r\t\tELSE\r\t\t\tbeg := t1.start\r\t\tEND;\r\t\tb := y0; t := t0; WHILE t # u DO INC(b, t.h); t := t.next END;\r\t\tIF b = yu THEN\r\t\t\tte := u\r\t\tELSE\t"
                    attr: 0
                  - text: "(* t = u *)"
                    attr: 1
                  - text: "\r\t\t\tte := v.trailer;\r\t\t\tb0 := b; WHILE t # v.trailer DO INC(b0, t.h); t := t.next END;\r\t\t\tIF yu < b THEN ExtendLines(v, v.bot) ELSE ReduceLines(v, v.bot) END;\r\t\t\tb1 := y0; t := t1; WHILE t # v.trailer DO INC(b1, t.h); t := t.next END;\r\t\t\tIF b1 < b0 THEN UpdateIn(v, 0, b1, b0) END\t"
                    attr: 0
                  - text: "(* erase trailer *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\t\tIF t1.start < beg THEN\t"
                    attr: 0
                  - text: "(* conserve head of t1 *)"
                    attr: 1
                  - text: "\r\t\t\tUpdateIn(v, x, y0, y0 + t1.h);\t"
                    attr: 0
                  - text: "(* redraw tail of t1 *)"
                    attr: 1
                  - text: "\r\t\t\ttop := y0 + t1.h\r\t\tELSE\r\t\t\ttop := y0\r\t\tEND;\r\t\tbot := y0; REPEAT INC(bot, t1.h); t1 := t1.next UNTIL t1 = te;\r\t\tIF top < bot THEN UpdateIn(v, 0, top, bot) END\t"
                    attr: 0
                  - text: "(* redraw affected lines *)"
                    attr: 1
                  - text: "\r\tEND UpdateFrames;\r\r\tPROCEDURE UpdateView (v: StdView; beg, end, delta: INTEGER);\r\t\tVAR st: TextSetters.Setter; r: TextRulers.Ruler; rpos: INTEGER;\r\t\t\ts0, t0, t, tn, u: Line; start, y, y0: INTEGER;\r\tBEGIN\r\t\tIF v.trailer # NIL THEN\r\t\t\tv.setter0 := NIL; st := v.ThisSetter();\r\t\t\tIF (beg <= v.trailer.start) & ((end >= v.org) OR (end - delta >= v.org)) THEN\r\t\t\t\tGetStart(st, v, beg, start);\r\t\t\t\ty0 := v.dy; s0 := v.trailer;\r\t\t\t\tWHILE s0.next.start < start DO s0 := s0.next; INC(y0, s0.h) END;\r\t\r\t\t\t\tt := s0.next; WHILE (t # v.trailer) & (t.start < end) DO t := t.next END;\r\t\t\t\tIF (t = v.trailer.next) & (t.start >= end) THEN\r\t\t\t\t\tREPEAT\r\t\t\t\t\t\tINC(t.start, delta);\r\t\t\t\t\t\tIF t.box.rpos >= end THEN INC(t.box.rpos, delta) END;\r\t\t\t\t\t\tt := t.next\r\t\t\t\t\tUNTIL t = v.trailer.next\r\t\t\t\tELSE\r\t\t\t\t\tWHILE (t # v.trailer.next) & (t.start >= end) DO\r\t\t\t\t\t\tINC(t.start, delta);\r\t\t\t\t\t\tIF t.box.rpos >= end THEN INC(t.box.rpos, delta) END;\r\t\t\t\t\t\tt := t.next\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\ttn := s0; y := y0; t0 := s0.next; u := t0;\r\t\t\t\tREPEAT\r\t\t\t\t\tt := tn; AddLine(st, tn, start, y); "
                    attr: 0
                  - text: "(* start = end(tn), y = bot(tn) *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tWHILE (u # v.trailer) & (u.start < tn.start) DO u := u.next END\r\t\t\t\tUNTIL tn.box.eot OR (y > v.bot)\r\t\t\t\t\tOR (tn.start >= end) & (u.start = tn.start) & (u.box.len = tn.box.len)\r\t\t\t\t\t\t& (u.asc = tn.asc) & (u.attr = tn.attr) & (u.box.dsc = tn.box.dsc)\r\t\t\t\t\t\t& (u.box.rpos = tn.box.rpos);\t(* can be expensive ... *)\r\t\t\t\tIF tn.box.eot OR (y > v.bot) THEN\r\t\t\t\t\tt := tn; u := v.trailer; v.trailer.start := start\r\t\t\t\tELSE\r\t\t\t\t\tDEC(y, tn.h)\r\t\t\t\tEND;\r\t\t\t\tt.next := u;\r\t\t\t\tIF (s0 # v.trailer) & (s0.next # v.trailer) THEN s0.box.eot := FALSE END;\r\t\t\t\tASSERT(v.trailer.start <= v.text.Length(), 100);\r\t\t\t\tUpdateFrames(v, t0, s0.next, u, beg, y0, y)\r\t\t\tELSIF end <= v.org THEN\r\t\t\t\tINC(v.org, delta);\r(*\r\t\t\t\tIF end < v.org - delta - 500 THEN start := v.org ELSE start := st.ThisLine(v.org) END;\r\t\t\t\t"
                    attr: 0
                  - text: "(* this is not safe; even a change 500 characters away could force the view's origin to a\r\t\t\t\tnew position in order to maintain the invariant that the origin always falls on a line start;\r\t\t\t\thowever, ThisLine can be quite expensive -- can we rely on TextSetters cache ? *)"
                    attr: 1
                  - text: "\r*)\r\t\t\t\tstart := st.ThisLine(v.org);\r\t\t\t\tr := v.defRuler; rpos := -1; TextRulers.GetValidRuler(v.text, start, -1, r, rpos);\r\t\t\t\tIF (v.org = start) & (v.trailer.next.attr = r.style.attr) THEN\r\t\t\t\t\tt := v.trailer;\r\t\t\t\t\tREPEAT\r\t\t\t\t\t\tt := t.next; INC(t.start, delta);\r\t\t\t\t\t\tIF t.box.rpos < start THEN t.box.rpos := rpos ELSE INC(t.box.rpos, delta) END\r\t\t\t\t\tUNTIL t = v.trailer\r\t\t\t\tELSE\r\t\t\t\t\tDoSetOrigin(v, start, 0, TRUE); RebuildView(v)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND UpdateView;\r\r\tPROCEDURE StyleUpdate (v: StdView; oldAttr: TextRulers.Attributes);\r\t\tVAR t: Line; beg: INTEGER; first: BOOLEAN;\r\tBEGIN\r\t\tIF v.trailer # NIL THEN\r\t\t\tt := v.trailer.next; first := TRUE;\r\t\t\tWHILE t # v.trailer DO\r\t\t\t\tWHILE (t # v.trailer) & (t.attr # oldAttr) DO t := t.next END;\r\t\t\t\tIF t # v.trailer THEN\r\t\t\t\t\tIF first THEN v.Neutralize; first := FALSE END;\r\t\t\t\t\tbeg := t.start; t := t.next;\r\t\t\t\t\tWHILE (t # v.trailer) & (t.attr = oldAttr) DO t := t.next END;\r\t\t\t\t\tUpdateView(v, beg, t.start, 0)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND StyleUpdate;\r\r\r\t"
                    attr: 0
                  - text: "(* line drawing *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE DrawLine (v: StdView;\r\t\tstart: INTEGER; IN box: TextSetters.LineBox;\r\t\tf: Views.Frame; l, r, y, t: INTEGER; pageF: BOOLEAN\r\t);\r\t"
                    attr: 0
                  - text: "(* pre: area cleared *)\r"
                    attr: 1
                  - text: "\t"
                    attr: 0
                  - text: "(* [l,r) for high-level clipping to tune update after small change *)"
                    attr: 1
                  - text: "\r\t\tCONST cacheLen = 128;\r\t\tVAR rd: TextSetters.Reader; ra: TextRulers.Attributes;\r\t\t\tv1: Views.View; c: Containers.Controller;\r\t\t\tpy, end, skip: INTEGER;\r\t\t\tcache: RECORD\t"
                    attr: 0
                  - text: "(* initially: long = TRUE, len = 0 *)"
                    attr: 1
                  - text: "\r\t\t\t\tx, y: INTEGER; color: Ports.Color; font: Fonts.Font;\r\t\t\t\tlen: INTEGER;\r\t\t\t\tbuf: ARRAY cacheLen OF CHAR\r\t\t\tEND;\r\r\t\tPROCEDURE FlushCaches;\r\t\tBEGIN\r\t\t\tIF cache.len > 0 THEN\r\t\t\t\tcache.buf[cache.len] := 0X;\r\t\t\t\tf.DrawString(cache.x, cache.y, cache.color, cache.buf, cache.font)\r\t\t\tEND;\r\t\t\tcache.len := 0\r\t\tEND FlushCaches;\r\r\t\tPROCEDURE CacheString (x, y: INTEGER; c: INTEGER; IN s: ARRAY OF CHAR;\r\t\t\tf: Fonts.Font\r\t\t);\r\t\t\tVAR i, j, len: INTEGER;\r\t\tBEGIN\r\t\t\tlen := 0; WHILE s[len] # 0X DO INC(len) END;\r\t\t\tIF (cache.len + len >= cacheLen) OR (cache.y # y) OR (cache.color # c) OR (cache.font # f) THEN\r\t\t\t\tFlushCaches\r\t\t\tEND;\r\t\t\tASSERT(cache.len + len < cacheLen, 100);\r\t\t\tIF cache.len = 0 THEN cache.x := x; cache.y := y; cache.color := c; cache.font := f END;\r\t\t\ti := 0; j := cache.len;\r\t\t\tWHILE i < len DO cache.buf[j] := s[i]; INC(i); INC(j) END;\r\t\t\tcache.len := j\r\t\tEND CacheString;\r\r(*\r\t\tPROCEDURE CacheString (x, y: INTEGER; c: INTEGER; IN s: ARRAY OF CHAR;\r\t\t\tf: Fonts.Font\r\t\t);\r\t\t\tVAR i, j, len: INTEGER;\r\t\tBEGIN\r\t\t\t"
                    attr: 0
                  - text: "(* flush first, then promote *)"
                    attr: 1
                  - text: "\r\t\t\tlen := 0; WHILE s[len] # 0X DO INC(len) END;\r\t\t\tIF (cache.len + len >= cacheLen) OR (cache.y # y) OR (cache.color # c) OR (cache.font # f) THEN\r\t\t\t\tFlushCaches\r\t\t\tEND;\r\t\t\tIF (cache.len > 0) & cache.short THEN\t"
                    attr: 0
                  - text: "(* promote short chars to chars *)"
                    attr: 1
                  - text: "\r\t\t\t\ti := 0; WHILE i < cache.len DO cache.buf[i] := cache.sbuf[i]; INC(i) END\r\t\t\tEND;\r\t\t\tcache.short := FALSE;\r\t\t\tASSERT(cache.len + len < cacheLen, 100);\r\t\t\tIF cache.len = 0 THEN cache.x := x; cache.y := y; cache.color := c; cache.font := f END;\r\t\t\ti := 0; j := cache.len;\r\t\t\tWHILE i < len DO cache.buf[j] := s[i]; INC(i); INC(j) END;\r\t\t\tcache.len := j\r\t\tEND CacheString;\r*)\r\r\tBEGIN\r\t\tIF box.len > 0 THEN\r\t\t\tcache.len := 0;\r\t\t\tend := start + box.len; skip := start + box.skipOff;\r\t\t\trd := GetReader(v, start, box); rd.Read;\r\t\t\tWHILE ~rd.eot & (rd.pos <= end) & (rd.x < r) DO\r\t\t\t\tIF rd.pos > skip THEN rd.w := rd.endW END;\r\t\t\t\trd.AdjustWidth(start, rd.pos, box, rd.w);\r\t\t\t\tIF rd.x + rd.w > l THEN\r\t\t\t\t\tv1 := rd.view;\r\t\t\t\t\tIF v1 # NIL THEN\r\t\t\t\t\t\tFlushCaches;\r\t\t\t\t\t\tIF ~((TextModels.hideable IN rd.textOpts) & v.hideMarks) THEN\r\t\t\t\t\t\t\tc := v.ThisController();\r\t\t\t\t\t\t\tViews.InstallFrame(f, v1,\r\t\t\t\t\t\t\t\trd.x, y - rd.attr.offset + rd.dsc - rd.h, 0,\r\t\t\t\t\t\t\t\t(c # NIL) & (v1 = c.ThisFocus()) )\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSIF (rd.h > 0) & (rd.w > 0) THEN\r\t\t\t\t\t\tIF box.rbox & ~v.hideMarks THEN rd.string[0] := parasign END;\t"
                    attr: 0
                  - text: "(* ¶ sign *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\tpy := y - rd.attr.offset;\r\t\t\t\t\t\tIF rd.string[0] > \" \" THEN\r\t\t\t\t\t\t\tCacheString(rd.x, py, rd.attr.color, rd.string, rd.attr.font);\r\t\t\t\t\t\t\tIF ~v.hideMarks & (TextModels.hideable IN rd.textOpts) THEN\r\t\t\t\t\t\t\t\tf.DrawRect(rd.x, py - box.asc + f.dot,\r\t\t\t\t\t\t\t\t\tMIN(rd.x + rd.w, f.r), py + box.dsc - f.dot, 0, Ports.grey25)\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tELSIF rd.string[0] # 0X THEN\r\t\t\t\t\t\t\tFlushCaches;\r\t\t\t\t\t\t\tIF ~v.hideMarks & (TextModels.hideable IN rd.textOpts) THEN\r\t\t\t\t\t\t\t\tf.DrawRect(rd.x, py - box.asc + f.dot, rd.x + rd.w, py + box.dsc - f.dot, 0, Ports.grey25)"
                    attr: 0
                  - text: "\r"
                    attr: 6
                  - text: "\t\t\t\t\t\t\tELSIF ((rd.string[0] = ' ') OR (rd.string[0] = TextModels.tab)) \r\t\t\t\t\t\t\t\t\t& ({Fonts.underline, Fonts.strikeout} * rd.attr.font.style # {})\r\t\t\t\t\t\t\tTHEN\r\t\t\t\t\t\t\t\tf.DrawSpace(rd.x, py, rd.w, rd.attr.color, rd.attr.font)\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tELSIF rd.string[0] # 0X THEN\r\t\t\t\t\t\t\tCacheString(rd.x, py, rd.attr.color, rd.string, rd.attr.font)\r\t\t\t\t\t\tELSE FlushCaches\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tINC(rd.x, rd.w); rd.Read\r\t\t\tEND;\r\t\t\tFlushCaches;\r\t\t\tCacheReader(v, rd)\r\t\tEND;\r\t\tIF v.hideMarks & ~pageF THEN\r\t\t\tra := box.ruler.style.attr;\r\t\t\tIF TextRulers.pageBreak IN ra.opts THEN\r\t\t\t\tIF (box.rpos = start) & (ra.lead >= f.dot) THEN\r\t\t\t\t\tf.DrawLine(l, t, r - f.dot, t, 0, Ports.grey50)\r\t\t\t\tELSIF (box.rpos = start - 1) & (ra.lead < f.dot) THEN\r\t\t\t\t\tf.DrawLine(l, t, r - f.dot, t, 0, Ports.grey50)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND DrawLine;\r\r\tPROCEDURE DrawDecorations (v: StdView; u: Line; f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR a: TextRulers.Attributes; i,  x: INTEGER; col: Ports.Color;\r\t\t\tst: TextSetters.Setter; srd: TextSetters.Reader; rd: TextModels.Reader;\r\tBEGIN\r\t\tIF t < b THEN\r\t\t\ti := 0; a := u.attr; srd := NIL;\r\t\t\tWHILE i < a.tabs.len DO\r\t\t\t\tIF TextRulers.barTab IN a.tabs.tab[i].type THEN\r\t\t\t\t\tx := a.tabs.tab[i].stop;\r\t\t\t\t\tIF (l <= x) & (x < r) THEN\r\t\t\t\t\t\tIF u.box.rpos = -1 THEN col := v.defAttr.color\r\t\t\t\t\t\tELSIF srd = NIL THEN\r\t\t\t\t\t\t\tst := v.ThisSetter();\r\t\t\t\t\t\t\tsrd := v.cachedRd; v.cachedRd := NIL;\r\t\t\t\t\t\t\tsrd := st.NewReader(srd);\r\t\t\t\t\t\t\tsrd.Set(srd.r, v.text, 0, 0, v.defRuler, 0, st.vw, st.hideMarks); rd := srd.r;\r\t\t\t\t\t\t\trd.SetPos(u.box.rpos); rd.Read; col := rd.attr.color\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tf.DrawLine(x, t, x, b - f.dot, 0, col)\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tINC(i)\r\t\t\tEND;\r\t\t\tIF srd # NIL THEN CacheReader(v, srd) END"
                    attr: 0
                  - text: "\r"
                    attr: 3
                  - text: "\t\tEND\r\tEND DrawDecorations;\r\r\r\t"
                    attr: 0
                  - text: "(* focus-message handling *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE PollSection (v: StdView; f: Views.Frame; VAR msg: Controllers.PollSectionMsg);\r\t\tCONST ms = maxScrollSteps; mh = maxScrollHeight;\r\t\tVAR t: Line; steps, step: INTEGER;\r\tBEGIN\r\t\tIF msg.vertical THEN\r\t\t\tValidateLines(v, f.b); t := v.trailer.next;\r\t\t\tIF t.h > 0 THEN\r\t\t\t\tsteps := -((-t.h) DIV mh); step := -(v.dy DIV mh)\r\t\t\tELSE steps := 1; step := 0\r\t\t\tEND;\r\t\t\tmsg.wholeSize := v.text.Length() * ms;\r\t\t\tmsg.partPos := v.org * ms + t.box.len * ms * step DIV steps;\r\t\t\tmsg.partSize := 0;\r\t\t\tmsg.valid := (v.org > 0) OR (t.h > mh) OR (t.next # v.trailer);\r\t\t\tmsg.done := TRUE\r\t\tEND\r\tEND PollSection;\r\r\tPROCEDURE Scroll (v: StdView; f: Views.Frame; VAR msg: Controllers.ScrollMsg);\r\t\tVAR st: TextSetters.Setter; box, box0: TextSetters.LineBox;\r\t\t\tt, t1, trailer: Line; org, len, dy, h, h1, sh, steps, step: INTEGER;\r\t\t\tpoll: Controllers.PollSectionMsg;\r\tBEGIN\r\t\tIF msg.vertical THEN\r\t\t\tpoll.vertical := TRUE;\r\t\t\tPollSection(v, f, poll)\r\t\tEND;\r\t\tIF msg.vertical & poll.valid THEN\r\t\t\torg := v.org; dy := v.dy; st := v.ThisSetter(); trailer := v.trailer;\r\t\t\tCASE msg.op OF\r\t\t\t  Controllers.decLine:\r\t\t\t\tIF dy <= -(maxScrollHeight + fuseScrollHeight) THEN\r\t\t\t\t\tINC(dy, maxScrollHeight)\r\t\t\t\tELSIF dy < 0 THEN\r\t\t\t\t\tdy := 0\r\t\t\t\tELSIF org > 0 THEN\r\t\t\t\t\torg := st.PreviousLine(org); st.GetLine(org, box);\r\t\t\t\t\th1 := box.asc + box.dsc + st.GridOffset(-1, box);\r\t\t\t\t\tIF h1 > maxScrollHeight + fuseScrollHeight THEN\r\t\t\t\t\t\tsh := h1 - h1 MOD maxScrollHeight;\r\t\t\t\t\t\tIF h1 - sh < fuseScrollHeight THEN DEC(sh, maxScrollHeight) END;\r\t\t\t\t\t\tdy := -sh\r\t\t\t\t\tELSE dy := 0\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\t| Controllers.incLine:\r\t\t\t\tt := trailer.next;\r\t\t\t\tIF t.h + dy > maxScrollHeight + fuseScrollHeight THEN\r\t\t\t\t\tDEC(dy, maxScrollHeight)\r\t\t\t\tELS"
                    attr: 0
                  - text: IF ~t.box.eot THEN
                    attr: 3
                  - text: "\r\t\t\t\t\torg := t.next.start; dy := 0\r\t\t\t\tEND\r\t\t\t| Controllers.decPage:\r\t\t\t\tsh := f.b; DEC(sh, maxScrollHeight + sh MOD maxScrollHeight);\r\t\t\t\tIF dy <= -(sh + fuseScrollHeight) THEN\r\t\t\t\t\tINC(dy, sh)\r\t\t\t\tELSE\r\t\t\t\t\tt := trailer.next;\r\t\t\t\t\th := maxScrollHeight - dy;\r\t\t\t\t\tIF t.h < h THEN h := t.h END;\r\t\t\t\t\tbox0 := t.box; h1:= h - st.GridOffset(-1, box0);\r\t\t\t\t\tWHILE (org > 0) & (h + fuseScrollHeight < f.b) DO\r\t\t\t\t\t\torg := st.PreviousLine(org); st.GetLine(org, box);\r\t\t\t\t\t\th1 := box.asc + box.dsc;\r\t\t\t\t\t\tINC(h, h1 + st.GridOffset(box.dsc, box0));\r\t\t\t\t\t\tbox0 := box\r\t\t\t\t\tEND;\r\t\t\t\t\th1 := h1 + st.GridOffset(-1, box0);\r\t\t\t\t\tsh := h1 - (h - f.b); DEC(sh, sh MOD maxScrollHeight);\r\t\t\t\t\tIF h1 - sh >= fuseScrollHeight THEN dy := -sh ELSE dy := 0 END\r\t\t\t\tEND;\r\t\t\t\tIF (org > v.org) OR (org = v.org) & (dy <= v.dy) THEN\t"
                    attr: 0
                  - text: "(* guarantee progress *)"
                    attr: 1
                  - text: "\r\t\t\t\t\torg := st.PreviousLine(org); st.GetLine(org, box);\r\t\t\t\t\th1 := box.asc + box.dsc + st.GridOffset(-1, box);\r\t\t\t\t\tIF h1 > maxScrollHeight + fuseScrollHeight THEN\r\t\t\t\t\t\tdy := - (h1 DIV maxScrollHeight * maxScrollHeight)\r\t\t\t\t\tELSE\r\t\t\t\t\t\tdy := 0\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\t| Controllers.incPage:\r\t\t\t\tt := trailer.next;\r\t\t\t\tsh := f.b; DEC(sh, maxScrollHeight + sh MOD maxScrollHeight);\r\t\t\t\tIF t.h + dy > sh + fuseScrollHeight THEN\r\t\t\t\t\tDEC(dy, sh)\r\t\t\t\tELSE\r\t\t\t\t\tt := ThisViewLine(v, f.b); LocateThisLine(v, t.start, t1, h);\r\t\t\t\t\tIF (h + t.h >= f.b) & (t.h <= maxScrollHeight) THEN\r\t\t\t\t\t\torg := st.PreviousLine(t.start)\r\t\t\t\t\tELSE org := t.start\r\t\t\t\t\tEND;\r\t\t\t\t\tIF h + t.h - f.b > maxScrollHeight THEN\r\t\t\t\t\t\tsh := f.b - h; DEC(sh, maxScrollHeight + sh MOD maxScrollHeight);\r\t\t\t\t\t\tIF sh >= fuseScrollHeight THEN dy := -sh ELSE dy := 0 END\r\t\t\t\t\tELSE\r\t\t\t\t\t\tdy := 0\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tIF (org < v.org) OR (org = v.org) & (dy >= v.dy) THEN\t"
                    attr: 0
                  - text: "(* guarantee progress *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tIF t.h + dy > maxScrollHeight + fuseScrollHeight THEN\r\t\t\t\t\t\tDEC(dy, maxScrollHeight)\r\t\t\t\t\tELSE\r\t\t\t\t\t\torg := t.next.start; dy := 0\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\t| Controllers.gotoPos:\r\t\t\t\torg := st.ThisLine(msg.pos DIV maxScrollSteps); st.GetLine(org, box);\r\t\t\t\tsh := box.asc + box.dsc + st.GridOffset(-1, box);\r\t\t\t\tsteps := -((-sh) DIV maxScrollHeight);\r\t\t\t\tIF (steps > 0) & (box.len > 0) THEN\r\t\t\t\t\tstep := steps * (msg.pos - org * maxScrollSteps) DIV (maxScrollSteps * box.len);\r(*\r\t\t\t\t\tstep := steps * (msg.pos MOD maxScrollSteps) DIV maxScrollSteps;\r*)\r\t\t\t\t\tdy := -(step * maxScrollHeight)\r\t\t\t\tELSE\r\t\t\t\t\tdy := 0\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\tEND;\r\t\t\tlen := v.text.Length();\r\t\t\tIF org > len THEN org := len; dy := 0 END;\r\t\t\tv.SetOrigin(org, dy);\r\t\t\tmsg.done := TRUE\r\t\tEND\r\tEND Scroll;\r\r\tPROCEDURE NotifyViewsOnPage (v: StdView; beg, end, pageNo: INTEGER);\r\t\tVAR st: TextSetters.Setter; rd: TextSetters.Reader; r: TextModels.Reader;\r\t\t\tview: Views.View; current: INTEGER;\r\t\t\tpage: PageMsg;\r\tBEGIN\r\t\tIF pageNo >= 0 THEN current := pageNo\r\t\tELSIF Printing.par # NIL THEN current := Printing.Current() (* Printing.par.page.current *) + 1\r\t\tELSE current := -1\r\t\tEND;\r\t\tIF "
                    attr: 0
                  - text: current
                    attr: 3
                  - text: " >= 0 THEN\r"
                    attr: 0
                  - text: "\t\t\tst := v.ThisSetter();\r"
                    attr: 3
                  - text: "\t\t\trd := v.cachedRd; v.cachedRd := NIL;\t"
                    attr: 0
                  - text: "(* reader recycling *)"
                    attr: 1
                  - text: "\r\t\t\trd := st.NewReader(rd);\r"
                    attr: 0
                  - text: "\t\t\trd.Set(rd.r, v.text, 0, 0, v.defRuler, 0, st.vw, st.hideMarks);\r"
                    attr: 3
                  - text: "\t\t\tr := rd.r; r.SetPos(beg); r.ReadView(view);\r\t\t\tWHILE (r.Pos() <= end) & ~r.eot DO\r\t\t\t\tpage.current := current; Views.HandlePropMsg(view, page); r.ReadView(view)\r\t\t\tEND;\r\t\t\tCacheReader(v, rd)\r\t\tEND\r\tEND NotifyViewsOnPage;\r\r\tPROCEDURE Page (v: StdView; pageH: INTEGER; op, pageY: INTEGER; OUT done, eoy: BOOLEAN);\r\t\tVAR st: TextSetters.Setter; org, prev, page: INTEGER;\r\tBEGIN\r\t\tIF ~v.hideMarks & ((v.context = NIL) OR v.context.Normalize()) THEN\r\t\t\tv.DisplayMarks(hide)\r\t\tEND;\r\t\tst := v.ThisSetter();\r\t\tIF op = Controllers.nextPageY THEN\r\t\t\tdone := TRUE; org := st.NextPage(pageH, v.org); eoy := (org = v.text.Length());\r\t\t\tIF ~eoy THEN NotifyViewsOnPage(v, org, st.NextPage(pageH, org), -1) END\r\t\tELSIF op =  Controllers.gotoPageY THEN\r\t\t\tASSERT(pageY >= 0, 20);\r\t\t\tdone := TRUE; org := 0; eoy := FALSE; page := 0;\r\t\t\tWHILE (page < pageY) & ~eoy DO\r\t\t\t\tprev := org; org := st.NextPage(pageH, org); eoy := org = prev;\r\t\t\t\tIF ~eoy THEN NotifyViewsOnPage(v, prev, org, page) END;\r\t\t\t\tINC(page)\r\t\t\tEND;\r\t\t\tIF ~eoy THEN NotifyViewsOnPage(v, org, st.NextPage(pageH, org), page) END\r\t\tELSE\r\t\t\tdone := FALSE\r\t\tEND;\r\t\tIF done & ~eoy THEN v.org := org; v.dy := 0; v.trailer := NIL; v.bot := 0 END\r\tEND Page;\r\r\r\tPROCEDURE ShowAdjusted (v: StdView; shift: INTEGER; rebuild: BOOLEAN);\r\tBEGIN\r\t\tIF shift # 0 THEN Views.Scroll(v, 0, shift)\r\t\tELSIF rebuild THEN UpdateIn(v, 0, 0, MAX(INTEGER))\r\t\tEND;\r\t\tViews.RestoreDomain(v.Domain())\r\tEND ShowAdjusted;\r\r\tPROCEDURE AdjustLines (v: StdView; org, dy: INTEGER;\r\t\tOUT shift: INTEGER; OUT rebuild: BOOLEAN\r\t);\r\t"
                    attr: 0
                  - text: "(* post: shift = 0  OR  ~rebuild *)"
                    attr: 1
                  - text: "\r\t\tVAR d: Stores.Domain; c: Containers.Controller; t, t0, t1: Line; org0, dy0, y: INTEGER;\r\tBEGIN\r\t\td := v.Domain(); t0 := v.trailer; org0 := v.org; rebuild := FALSE; shift := 0;\r\t\tIF (d # NIL) & ((org # org0) OR (dy # v.dy)) THEN\r\t\t\tViews.RestoreDomain(d);\t"
                    attr: 0
                  - text: "(* make sure that pixels are up-to-date before scrolling *)"
                    attr: 1
                  - text: "\r\t\t\tc := v.ThisController();\r\t\t\tIF c # NIL THEN\r\t\t\t\tContainers.FadeMarks(c, Containers.hide)\t"
                    attr: 0
                  - text: "(* fade marks with overhang *)"
                    attr: 1
                  - text: "\r\t\t\tEND\r\t\tEND;\r\t\tIF (t0 # NIL) & (org = org0) & (dy # v.dy) THEN\t"
                    attr: 0
                  - text: "(* sub-line shift *)"
                    attr: 1
                  - text: "\r\t\t\tshift := dy - v.dy;\r\t\tELSIF (t0 # NIL) & (org > org0) & (org < t0.start) THEN\t"
                    attr: 0
                  - text: "(* shift up *)"
                    attr: 1
                  - text: "\r\t\t\tLocateThisLine(v, org, t, y); t0.next := t;\r\t\t\tshift := dy - y\r\t\tELSIF (t0 # NIL) & (org < org0) THEN\t"
                    attr: 0
                  - text: "(* shift down *)"
                    attr: 1
                  - text: "\r\t\t\tt1 := t0.next; dy0 := v.dy + t1.asc; v.org := org; v.dy := dy;\r\t\t\tIF t1.start = org0 THEN\t"
                    attr: 0
                  - text: "(* new lines need to be prepended *)"
                    attr: 1
                  - text: "\r\t\t\t\tPrependLines(v)\t"
                    attr: 0
                  - text: "(* may change t1.asc *)"
                    attr: 1
                  - text: "\r\t\t\tEND;\r\t\t\tASSERT(t0.next.start = org, 100);\r\t\t\tIF org0 < t0.start THEN\t"
                    attr: 0
                  - text: "(* former top still visible -> shift down *)"
                    attr: 1
                  - text: "\r\t\t\t\tLocateThisLine(v, org0, t, y); shift := y - (dy0 - t1.asc)\r\t\t\tELSE\t"
                    attr: 0
                  - text: "(* rebuild all *)"
                    attr: 1
                  - text: "\r\t\t\t\trebuild := TRUE\r\t\t\tEND\r\t\tELSIF (t0 = NIL) OR (org # org0) OR (dy # v.dy) THEN\t"
                    attr: 0
                  - text: "(* rebuild all *)"
                    attr: 1
                  - text: "\r\t\t\trebuild := TRUE\r\t\tEND;\r\t\tv.org := org; v.dy := dy;\r\t\tIF rebuild THEN\t"
                    attr: 0
                  - text: "(* rebuild all *)"
                    attr: 1
                  - text: "\r\t\t\tv.trailer := NIL; ValidateLines(v, v.bot)\r\t\tELSIF shift < 0 THEN\t"
                    attr: 0
                  - text: "(* shift up *)"
                    attr: 1
                  - text: "\r\t\t\tINC(v.bot, shift); ExtendLines(v, v.bot - shift)\r\t\tELSIF shift > 0 THEN\t"
                    attr: 0
                  - text: "(* shift down *)"
                    attr: 1
                  - text: "\r\t\t\tINC(v.bot, shift); ReduceLines(v, v.bot - shift)\r\t\tEND\r\tEND AdjustLines;\r\r\tPROCEDURE Limit (v: StdView; bot: INTEGER; allLines: BOOLEAN): INTEGER;\r\t\tCONST minH = 12 * point;\r\t\tVAR s, t: Line; pos, y: INTEGER;\r\tBEGIN\r\t\ts := v.trailer.next; t := s; y := v.dy;\r\t\tWHILE ~t.box.eot & (y + t.h <"
                    attr: 0
                  - text: =
                    attr: 3
                  - text: " bot) DO INC(y, t.h); s := t; t := t.next END;\r\t\tIF ~allLines "
                    attr: 0
                  - text: "& (bot - y < t.h)"
                    attr: 3
                  - text: " & (bot - y < minH) THEN t := s END;\r\t\tpos := t.start + t.box.len;\r"
                    attr: 0
                  - text: "(*"
                    attr: 3
                  - text: "\r\t\tIF t.box.eot THEN INC(pos) END;\r"
                    attr: 0
                  - text: "*)"
                    attr: 3
                  - text: "\r\t\tRETURN pos\r\tEND Limit;\r\r\r\t"
                    attr: 0
                  - text: "(* ScrollOp *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (op: ScrollOp) Do;\r\t\tVAR org0, dy0, org, dy, shift: INTEGER; rebuild: BOOLEAN;\r\tBEGIN\r\t\tIF op.bunch THEN org := op.bunchOrg; dy := op.bunchDy\r\t\tELSE org := op.org; dy := op.dy\r\t\tEND;\r\t\torg0 := op.v.org; dy0 := op.v.dy;\r\t\tIF op.silent THEN\r\t\t\top.v.org := org; op.v.dy := dy; op.silent := FALSE\r\t\tELSE\r\t\t\tAdjustLines(op.v, org, dy, shift, rebuild); ShowAdjusted(op.v, shift, rebuild)\r\t\tEND;\r\t\tIF op.bunch THEN op.bunch := FALSE ELSE op.org := org0; op.dy := dy0 END\r\tEND Do;\r\r\tPROCEDURE DoSetOrigin (v: StdView; org, dy: INTEGER; silent: BOOLEAN);\r\t"
                    attr: 0
                  - text: "(* pre: org = v.ThisSetter().ThisLine(org) *)"
                    attr: 1
                  - text: "\r\t\tVAR con: Models.Context; last: Stores.Operation; op: ScrollOp;\r\t\t\tshift: INTEGER; rebuild: BOOLEAN;\r\tBEGIN\r\t\tIF (org # v.org) OR (dy # v.dy) THEN\r\t\t\tcon := v.context;\r\t\t\tIF con # NIL THEN\r\t\t\t\tIF (v.Domain() = NIL) OR con.Normalize() THEN\r\t\t\t\t\tIF silent THEN\r\t\t\t\t\t\tv.org := org; v.dy := dy\r\t\t\t\t\tELSE\r\t\t\t\t\t\tAdjustLines(v, org, dy, shift, rebuild); ShowAdjusted(v, shift, rebuild)\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\t\tlast := Views.LastOp(v);\r\t\t\t\t\tIF (last # NIL) & (last IS ScrollOp) THEN\r\t\t\t\t\t\top := last(ScrollOp);\r\t\t\t\t\t\top.bunch := TRUE; op.bunchOrg := org; op.bunchDy := dy;\r\t\t\t\t\t\top.silent := silent;\r\t\t\t\t\t\tViews.Bunch(v)\r\t\t\t\t\tELSE\r\t\t\t\t\t\tNEW(op); op.v := v; op.org := org; op.dy := dy;\r\t\t\t\t\t\top.bunch := FALSE;\r\t\t\t\t\t\top.silent := silent;\r\t\t\t\t\t\tViews.Do(v, scrollingKey, op)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tv.org := org; v.dy := dy\r\t\t\tEND\r\t\tEND\r\tEND DoSetOrigin;\r\r\r\t"
                    attr: 0
                  - text: "(* SetOp *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (op: SetOp) Do;\r\t\tVAR v: StdView; m: BOOLEAN;\r\t\t\ta: TextModels.Attributes; r: TextRulers.Ruler; s: TextSetters.Setter;\r\tBEGIN\r\t\tv := op.view;\r\t\tCASE op.mode OF\r\t\t  setMarks:\r\t\t\tm := v.hideMarks; v.hideMarks := op.hideMarks; op.hideMarks := m\r\t\t| setSetter:\r\t\t\ts := v.setter;\r\t\t\tIF s # NIL THEN s.ConnectTo(NIL, NIL, 0, FALSE) END;\r\t\t\tv.setter := op.setter; op.setter := s\r\t\t| setDefs:\r\t\t\tr := v.defRuler; a := v.defAttr;\r\t\t\tv.defRuler := op.defRuler; v.defAttr := op.defAttr;\r\t\t\top.defRuler := r; op.defAttr := a;\r(*\r\t\t\tIF (v.defAttr.Domain() # NIL) & (v.defAttr.Domain() # v.Domain()) THEN\r\t\t\t\tv.defAttr := Stores.CopyOf(v.defAttr)(TextModels.Attributes)\r\t\t\tEND;\r\t\t\tStores.Join(v, v.defAttr);\r*)\r\t\t\tIF v.defAttr # NIL THEN (* could be for undo operations *)\r\t\t\t\tIF ~Stores.Joined(v, v.defAttr) THEN\r\t\t\t\t\tIF ~Stores.Unattached(v.defAttr) THEN\r\t\t\t\t\t\tv.defAttr := Stores.CopyOf(v.defAttr)(TextModels.Attributes)\r\t\t\t\t\tEND;\r\t\t\t\t\tStores.Join(v, v.defAttr)\r\t\t\t\tEND;\r\t\t\tEND;\r\t\t\t\r\t\t\tIF v.defRuler # NIL THEN Stores.Join(v, v.defRuler) END;\r\t\tEND;\r\t\tRebuildView(v)\r\tEND Do;\r\r\tPROCEDURE DoSet (op: SetOp; mode: INTEGER; v: StdView);\r\tBEGIN\r\t\top.mode := mode; op.view := v; Views.Do(v, viewSettingKey, op)\r\tEND DoSet;\r\r\r\t"
