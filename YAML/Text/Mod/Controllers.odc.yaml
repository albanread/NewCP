                    attr: 0
                  - text: "(* editing *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE ThisPos (v: TextViews.View; f: Views.Frame; x, y: INTEGER): INTEGER;\r\t\tVAR loc: TextViews.Location; pos: INTEGER;\r\tBEGIN\r\t\tpos := v.ThisPos(f, x, y); v.GetThisLocation(f, pos, loc);\r\t\tIF (loc.view # NIL) & (x > (loc.l + loc.r) DIV 2) THEN INC(pos) END;\r\t\t"
                    attr: 0
