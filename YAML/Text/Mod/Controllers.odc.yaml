                  - text: "\r\t\t\t\tViews.ForwardCtrlMsg(f, scroll);\r\t\t\t\tv.GetRange(f, edge, e)\r\t\t\tELSE edge := len\r\t\t\tEND\r\t\t| dD:\r\t\t\tedge := len\r\t\tEND;\r\t\tIF rightEdge THEN end := edge ELSE beg := edge END;\r\t\tIF ~select THEN\r\t\t\tIF rightDir THEN beg := edge ELSE end := edge END\r\t\tEND;\r\t\tIF beg < 0 THEN beg := 0 ELSIF beg > len THEN beg := len END;\r\t\tIF end < beg THEN end := beg ELSIF end > len THEN end := len END;\r\t\tIF beg = end THEN\r\t\t\tShowPos(c, beg, end)\r\t\tELSE\r\t\t\tIF rightEdge THEN ShowPos(c, end - 1, end) ELSE ShowPos(c, beg, beg + 1) END\r\t\tEND;\r\t\tSetSel(c, beg, end)\r\tEND ArrowChar;\r\r\tPROCEDURE (c: StdCtrl) ControlChar (f: Views.Frame; ch: CHAR);\r\tBEGIN\r\t\tInsertChar(c, ch)\r\tEND ControlChar;\r\r\tPROCEDURE (c: StdCtrl) PasteChar (ch: CHAR);\r\tBEGIN\r\t\tInsertChar(c, ch)\r\tEND PasteChar;\r\r\tPROCEDURE (c: StdCtrl) PasteView (f: Views.Frame; v: Views.View; w, h: INTEGER);\r\t\tVAR t: TextModels.Model; pos, start, beg, end, len: INTEGER;\r\tBEGIN\r\t\tGetTargetRange(c, beg, end);\r\t\tIF beg # none THEN InsertView(c, beg, end, v, w, h) END\r\tEND PasteView;\r\r\tPROCEDURE (c: StdCtrl) Drop (src, f: Views.Frame; sx, sy, x, y, w, h, rx, ry: INTEGER;\r\t\tv: Views.View; isSingle: BOOLEAN\r\t);\r\t\tVAR t: TextModels.Model; pos, start, beg, end, len: INTEGER;\r\tBEGIN\r\t\tpos := ThisPos(c.view, f, x, y);\r\t\tWITH v: TextViews.View DO t := v.ThisModel() ELSE t := NIL END;\r\t\tIF (t # NIL) & ~isSingle THEN\r\t\t\tInsertText(c, pos, pos, t, start); len := t.Length()\r\t\tELSE\r\t\t\tInsertView(c, pos, pos, v, w, h); start := pos; len := 1\r\t\tEND;\r\t\tSetSelection(c.text, start, start + len);\r\t\tAutoShowRange(c, start, start + len)\r\tEND Drop;\r\r\tPROCEDURE (c: StdCtrl) PickNativeProp (f: Views.Frame; x, y: INTEGER; VAR p: Properties.Property);\r\t\tVAR rd: TextModels.Reader;\r\tBEGIN\r\t\trd := CachedReader(c); rd.SetPos(ThisPos(c.view, f, x, y)); rd.Read;\r\t\tIF ~rd.eot THEN p := rd.attr.Prop() ELSE p := NIL END;\r\t\tCacheReader(c, rd)\r\tEND PickNativeProp;\r\r\tPROCEDURE (c: StdCtrl) HandleModelMsg (VAR msg: Models.Message);\r\t\tVAR done: BOOLEAN;\r\tBEGIN\r\t\tc.HandleModelMsg^(msg);\r\t\tIF msg.model = c.text THEN\r\t\t\tWITH msg: Models.UpdateMsg DO\r\t\t\t\tWITH msg: TextModels.UpdateMsg DO\r\t\t\t\t\tCASE msg.op OF\r\t\t\t\t\t  TextModels.insert, TextModels.delete, TextModels.replace:\r\t\t\t\t\t\tUpdateMarks(c, msg.op, msg.beg, msg.end, msg.delta)\r\t\t\t\t\tELSE\t"
                    attr: 0
