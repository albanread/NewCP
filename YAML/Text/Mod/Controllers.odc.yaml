                  - text: "\r\t\t\t\t\t\tc.view.Neutralize\r\t\t\t\t\tEND\r\t\t\t\tELSE\t"
                    attr: 0
                  - text: "(* unknown text update happened *)"
                    attr: 1
                  - text: "\r\t\t\t\t\tc.view.Neutralize\r\t\t\t\tEND\r\t\t\t| msg: ModelMessage DO\r\t\t\t\tWITH msg: SetCaretMsg DO\r\t\t\t\t\tc.SetCaret(msg.pos)\r\t\t\t\t| msg: SetSelectionMsg DO\r\t\t\t\t\tc.SetSelection(msg.beg, msg.end)\r\t\t\t\tELSE\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\tEND\r\t\tEND\r\tEND HandleModelMsg;\r\r\tPROCEDURE (c: StdCtrl) HandleViewMsg (f: Views.Frame; VAR msg: Views.Message);\r\tBEGIN\r\t\tc.HandleViewMsg^(f, msg);\r\t\tIF msg.view = c.view THEN\r\t\t\tWITH msg: ViewMessage DO\r\t\t\t\tWITH msg: CaretMsg DO\r\t\t\t\t\tc.MarkCaret(f, msg.show)\r\t\t\t\t| msg: SelectionMsg DO\r\t\t\t\t\tMarkSelection(c, f, msg.beg, msg.end, msg.show)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\tEND\r\t\tEND\r\tEND HandleViewMsg;\r\r\tPROCEDURE (c: StdCtrl) HandleCtrlMsg (f: Views.Frame;\r\t\tVAR msg: Controllers.Message; VAR focus: Views.View\r\t);\r\t\tVAR g: Views.Frame; beg, end: INTEGER; done: BOOLEAN;\r\tBEGIN\r\t\tIF (msg IS Controllers.MarkMsg) OR (msg IS Controllers.TickMsg) THEN\r\t\t\tbeg := c.autoBeg; end := c.autoEnd;\r\t\t\tc.autoBeg := MAX(INTEGER); c.autoEnd := 0\r\t\tEND;\r\t\tWITH msg: Controllers.TickMsg DO\r\t\t\tIF ~(noAutoScroll IN c.opts)\r\t\t\t\t& (0 <= beg) & (beg <= end) & (end <= c.text.Length())\r\t\t\t\t& c.view.context.Normalize()\r\t\t\tTHEN\r\t\t\t\tc.view.ShowRange(beg, end, TextViews.focusOnly)\r\t\t\tEND;\r\t\t\tIF focus = NIL THEN\r\t\t\t\tCheckCaret(c); BlinkCaret(c, f, msg.tick);\r\t\t\t\tIF (c.selBeg # c.aliasSelBeg) OR (c.selEnd # c.aliasSelEnd) THEN\r\t\t\t\t\t"
