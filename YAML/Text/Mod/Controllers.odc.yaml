                    attr: 3
                  - text: " pos\r\tEND ThisPos;\r\r\tPROCEDURE ShowPos (c: StdCtrl; beg, end: INTEGER);\r\tBEGIN\r\t\tIF ~(noAutoScroll IN c.opts) THEN\r\t\t\tc.view.ShowRange(beg, end, TextViews.focusOnly)\r\t\tEND\r\tEND ShowPos;\r\r\r\tPROCEDURE Indentation (c: StdCtrl; pos: INTEGER): TextModels.Model;\r\t"
                    attr: 0
                  - text: "(* pre: c.carPos # none *)"
                    attr: 1
                  - text: "\r\t\tVAR st: TextSetters.Setter; buf: TextModels.Model; rd: TextModels.Reader;\r\t\t\twr: TextModels.Writer; ch: CHAR; spos: INTEGER;\r\tBEGIN\r\t\tbuf := NIL;\r\t\trd := CachedReader(c);\r\t\tst := c.view.ThisSetter(); spos := st.ThisSequence(pos); rd.SetPos(spos); rd.ReadChar(ch);\r\t\tIF (ch = tab) & (spos < pos) THEN\r\t\t\tbuf := TextModels.CloneOf(c.text); wr := buf.NewWriter(NIL); wr.SetPos(buf.Length());\r\t\t\twr.SetAttr(InsertionAttr(c));\r\t\t\twr.WriteChar(line);\r\t\t\tREPEAT wr.WriteChar(tab); rd.ReadChar(ch) UNTIL (ch # tab) OR (rd.Pos() > pos)\r\t\tEND;\r\t\tCacheReader(c, rd);\r\t\t"
                    attr: 0
