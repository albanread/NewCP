                  - text: " THEN\r\t\t\tASSERT(beg < end, 20);\r\t\t\ts := c.Singleton();\r\t\t\tIF s # NIL THEN\r\t\t\t\tIF beg + 1 = end THEN Containers.MarkSingleton(c, f, show) END\r\t\t\tELSE\r\t\t\t\tc.view.GetThisLocation(f, beg, b); c.view.GetThisLocation(f, end, e);\r\t\t\t\tIF (b.pos < e.pos) OR (b.pos = e.pos) & (b.x < e.x) THEN\r\t\t\t\t\tMarkSelRange(c, f, b, e, f.front, show)\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND MarkSelection;\r\r\tPROCEDURE FlipSelection (c: StdCtrl; beg, end: INTEGER; show: BOOLEAN);\r\t\tVAR msg: SelectionMsg;\r\tBEGIN\r\t\tmsg.beg := beg; msg.end := end; msg.show := show;\r\t\tViews.Broadcast(c.view, msg)\r\tEND FlipSelection;\r\r\r\tPROCEDURE InitMarks (c: StdCtrl);\r\tBEGIN\r\t\tc.autoBeg := MAX(INTEGER); c.autoEnd := 0;\r\t\tc.carPos := none; c.carVisible := FALSE; c.carLast := none; c.carTick := 0; c.carX := -1;\r\t\tc.selBeg := none; c.selEnd := none;\r\t\tc.lastStep := 0\r\tEND InitMarks;\r\r\tPROCEDURE AutoShowRange (c: StdCtrl; beg, end: INTEGER);\r\tBEGIN\r\t\tIF (beg <= c.autoBeg) & (c.autoEnd <= end) THEN\r\t\t\tc.autoBeg := beg; c.autoEnd := end\t"
