                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE\r\t\tEND\r\tEND LeftTerminator;\r\r\tPROCEDURE RightTerminator (ch, ch1: CHAR): BOOLEAN;\r\tBEGIN\r\t\tIF ch < 100X THEN\r\t\t\tCASE ch OF\r\t\t\t  0X, viewcode, tab, line, para,\r\t\t\t  \"!\", '\"', \"'\", \"(\", \")\", \",\", \";\", \"?\", \"[\", \"]\", \"{\", \"}\": "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE\r\t\t\t| \".\", \":\":\r\t\t\t\tCASE ch1 OF\r\t\t\t\t  0X, viewcode, tab, line, para, \" \": "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE\r\t\t\t\tELSE "
                    attr: 0
