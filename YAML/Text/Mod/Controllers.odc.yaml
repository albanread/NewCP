                  - text: "(* support for cursor/selection/focus marking *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE BlinkCaret (c: StdCtrl; f: Views.Frame; tick: LONGINT);\r\t\tVAR vis: BOOLEAN;\r\tBEGIN\r\t\tIF (c.carPos # none) & f.front & (tick >= c.carTick) THEN\r\t\t\tIF c.carVisible THEN\r\t\t\t\tc.MarkCaret(f, Containers.hide); c.carVisible := FALSE\r\t\t\tELSE\r\t\t\t\tc.carVisible := TRUE; c.MarkCaret(f, Containers.show)\r\t\t\tEND;\r\t\t\tc.carTick := tick + Dialog.caretPeriod\r\t\tEND\r\tEND BlinkCaret;\r\r\tPROCEDURE FlipCaret (c: StdCtrl; show: BOOLEAN);\r\t\tVAR msg: CaretMsg;\r\tBEGIN\r\t\tmsg.show := show;\r\t\tViews.Broadcast(c.view, msg)\r\tEND FlipCaret;\r\r\tPROCEDURE CheckCaret (c: StdCtrl);\r\t\tVAR text: TextModels.Model; len, pos: INTEGER;\r\tBEGIN\r\t\tIF ~(Containers.noCaret IN c.opts) THEN\r\t\t\tIF (c.carPos = none) & ~(boundCaret & (c.selBeg # c.selEnd)) & (c.ThisFocus() = NIL) THEN\r\t\t\t\ttext := c.text; len := text.Length(); pos := c.carLast; \r\t\t\t\tIF pos < 0 THEN pos := 0 ELSIF pos > len THEN pos := len END;\r\t\t\t\t(* c.carVisible := FALSE; c.carTick := 0;\t"
