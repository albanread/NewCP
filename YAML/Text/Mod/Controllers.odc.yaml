                  - text: "\r\tBEGIN\r\t\tCASE op OF\r\t\t  TextModels.insert:\r\t\t\tc.carLast := end; c.selBeg := end; c.selEnd := end; beg := end\r\t\t| TextModels.delete:\r\t\t\tc.carLast := beg; c.selBeg := beg; c.selEnd := beg; end := beg\r\t\t| TextModels.replace:\r\t\tELSE\r\t\t\t"
