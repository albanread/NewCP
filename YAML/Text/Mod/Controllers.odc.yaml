                  - text: " FALSE\r\t\t\tEND\r\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE\r\t\tEND\r\tEND RightTerminator;\r\r\tPROCEDURE ReadLeft (rd: TextModels.Reader; pos: INTEGER; OUT ch: CHAR);\r\tBEGIN\r\t\tIF pos > 0 THEN rd.SetPos(pos - 1); rd.ReadChar(ch)\r\t\tELSE rd.SetPos(pos); ch := \" \"\r\t\tEND\r\tEND ReadLeft;\r\r\tPROCEDURE SmartRange (c: StdCtrl; VAR beg, end: INTEGER);\r\t"
                    attr: 0
                  - text: "(* if possible and whole words are covered,\r\textend [beg, end) to encompass either a leading or a trailing blank *)"
                    attr: 1
                  - text: "\r\t\tVAR rd: TextModels.Reader; we, be: INTEGER; ch, ch0, ch1: CHAR; rightTerm: BOOLEAN;\r\tBEGIN\r(*\r"
                    attr: 0
                  - text: disable intelligent delete/cut/move for now
                    attr: 3
                  - text: "\r\t\trd := CachedReader(c); ReadLeft(rd, beg, ch0); rd.ReadChar(ch);\r\t\tIF ((ch0 <= \" \") OR LeftTerminator(ch0)) & (ch # \" \") THEN\r\t\t\t"
                    attr: 0
                  - text: "(* range covers beg of word *)"
                    attr: 1
                  - text: "\r"
                    attr: 0
                  - text: "\t"
                    attr: 1
                  - text: "\t\twe := beg; be := beg;\r"
                    attr: 0
                  - text: "\t"
                    attr: 1
                  - text: "\t\tWHILE (ch # 0X) & (be <= end) DO\r\t\t\t\tch1 := ch; rd.ReadChar(ch); INC(be);\r\t\t\t\tIF (ch1 # \" \") & ((be <= end) OR ~RightTerminator(ch1, ch)) THEN we := be END\r\t\t\tEND;\r\t\t\trightTerm := RightTerminator(ch1, ch);\r"
                    attr: 0
                  - text: "\t"
                    attr: 1
                  - text: "\t\tIF (beg < we) & (we = end) & ((we < be) OR rightTerm) THEN\r\t\t\t\t"
                    attr: 0
                  - text: "(* range covers end of word *)"
                    attr: 1
                  - text: "\r\t\t\t\tIF (we < be) & (ch1 = \" \") THEN\r\t\t\t\t\tINC(end)\t"
                    attr: 0
                  - text: "(* include trailing blank *)"
                    attr: 1
                  - text: "\r\t\t\t\tELSIF (beg > 0) & rightTerm & (ch0 = \" \") THEN\r\t\t\t\t\tDEC(beg)\t"
                    attr: 0
                  - text: "(* include leading blank *)"
                    attr: 1
                  - text: "\r\t\t\t\tEND\r"
                    attr: 0
                  - text: "\t"
                    attr: 1
                  - text: "\t\tEND\r\t\tEND;\r\t\tCacheReader(c, rd)\r*)\r\tEND SmartRange;\r\r\tPROCEDURE OnlyWords (c: StdCtrl; beg, end: INTEGER): BOOLEAN;\r\t\tVAR rd: TextModels.Reader; we, be: INTEGER; ch, ch0, ch1: CHAR;\r\t\t\trightTerm, words: BOOLEAN;\r\tBEGIN\r\t\twords := FALSE;\r\t\trd := CachedReader(c); ReadLeft(rd, beg, ch0); rd.ReadChar(ch);\r\t\tIF ((ch0 <= \" \") OR LeftTerminator(ch0)) & (ch # \" \") THEN"
                    attr: 0
                  - text: "\t(* range covers beg of word *)"
                    attr: 1
                  - text: "\r\t\t\twe := beg; be := beg;\r\t\t\tWHILE (ch # 0X) & (be <= end) DO\r\t\t\t\tch1 := ch; rd.ReadChar(ch); INC(be);\r\t\t\t\tIF (ch1 # \" \") & ((be <= end) OR ~RightTerminator(ch1, ch)) THEN\r\t\t\t\t\twe := be\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\trightTerm := RightTerminator(ch1, ch);\r\t\t\tIF (beg < we) & (we = end) & ((we < be) OR rightTerm) THEN\t"
                    attr: 0
                  - text: "(* range covers end of word *)"
                    attr: 1
                  - text: "\r\t\t\t\twords := TRUE\r\t\t\tEND\r\t\tEND;\r\t\tCacheReader(c, rd);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " words\r\tEND OnlyWords;\r\r\tPROCEDURE GetTargetField (t: TextModels.Model; pos: INTEGER;\r\t\tVAR touchL, touchM, touchR: BOOLEAN\r\t);\r\t\tVAR rd: TextModels.Reader; ch0, ch1: CHAR; leftTerm, rightTerm: BOOLEAN;\r\tBEGIN\r\t\trd := t.NewReader(NIL); ReadLeft(rd, pos, ch0); rd.ReadChar(ch1);\r\t\tleftTerm := (ch0 <= \" \") OR LeftTerminator(ch0);\r\t\trightTerm := (ch1 <= \" \") OR RightTerminator(ch1, 0X);\r\t\ttouchL := ~leftTerm & rightTerm;\r\t\ttouchM := ~leftTerm & ~rightTerm;\r\t\ttouchR := leftTerm & ~rightTerm\r\tEND GetTargetField;\r\r\tPROCEDURE LeftExtend (t: TextModels.Model; attr: TextModels.Attributes);\r\t\tVAR wr: TextModels.Writer;\r\tBEGIN\r\t\twr := t.NewWriter(NIL); wr.SetAttr(attr); wr.SetPos(0); wr.WriteChar(\" \")\r\tEND LeftExtend;\r\r\tPROCEDURE RightExtend (t: TextModels.Model; attr: TextModels.Attributes);\r\t\tVAR wr: TextModels.Writer;\r\tBEGIN\r\t\twr := t.NewWriter(NIL); wr.SetPos(t.Length()); wr.SetAttr(attr); wr.WriteChar(\" \")\r\tEND RightExtend;\r\r\tPROCEDURE MergeAdjust (target, inset: TextModels.Model; pos: INTEGER; OUT start: INTEGER);\r\t\tVAR rd: TextModels.Reader; a: TextModels.Attributes; ch, ch1: CHAR;\r\t\t\ttouchL, touchM, touchR: BOOLEAN;\r\tBEGIN\r\t\tstart := pos;\r(*\r"
                    attr: 0
                  - text: disable intelligent paste for now
                    attr: 3
                  - text: "\r\t\tGetTargetField(target, pos, touchL, touchM, touchR);\r\t\tIF touchL THEN\r\t\t\trd := inset.NewReader(NIL); rd.SetPos(0);\r\t\t\trd.ReadChar(ch); a := rd.attr; rd.ReadChar(ch1);\r\t\t\tIF (ch > \" \") & ~RightTerminator(ch, ch1) THEN LeftExtend(inset, a); INC(start) END\r\t\tEND;\r\t\tIF touchR & (inset.Length() > 0) THEN\r\t\t\trd := inset.NewReader(rd); rd.SetPos(inset.Length() - 1); rd.ReadChar(ch);\r\t\t\tIF (ch > \" \") & ~LeftTerminator(ch) THEN RightExtend(inset, rd.attr) END\r\t\tEND\r*)\r\tEND MergeAdjust;\r\r\r\tPROCEDURE InsertionAttr (c: StdCtrl): TextModels.Attributes;\r\t\tVAR rd: TextModels.Reader; r: TextRulers.Ruler; a: TextModels.Attributes; ch: CHAR;\r\tBEGIN\r\t\ta := c.insAttr;\r\t\tIF a = NIL THEN\r\t\t\trd := CachedReader(c); a := NIL;\r\t\t\tIF c.carPos # none THEN\r\t\t\t\tReadLeft(rd, c.carPos, ch); a := rd.attr;\r\t\t\t\tIF ((ch <= \" \") OR (ch = TextModels.nbspace)) & (c.carPos < c.text.Length()) THEN\r\t\t\t\t\trd.ReadChar(ch);\r\t\t\t\t\tIF ch > \" \" THEN a := rd.attr END\r\t\t\t\tEND\r\t\t\tELSIF boundCaret & (c.selBeg # c.selEnd) THEN\r\t\t\t\trd.SetPos(c.selBeg); rd.ReadChar(ch); a := rd.attr;\r\t\t\t\t"
                    attr: 0
                  - text: "c.insAttr := a"
                    attr: 3
                  - text: "\r\t\t\tEND;\r\t\t\tIF a = NIL THEN c.view.PollDefaults(r, a) END;\r\t\t\tCacheReader(c, rd)\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " a\r\tEND InsertionAttr;\r\r\r\tPROCEDURE GetTargetRange (c: StdCtrl; OUT beg, end: INTEGER);\r\tBEGIN\r\t\tIF boundCaret & (c.selBeg # c.selEnd) THEN\r\t\t\tbeg := c.selBeg; end := c.selEnd\r\t\tELSE\r\t\t\tbeg := c.carPos; end := beg\r\t\tEND\r\tEND GetTargetRange;\r\r\r\tPROCEDURE DoEdit (name: Stores.OpName;\r\t\tc: StdCtrl; beg, end: INTEGER;\r\t\tattr: TextModels.Attributes; ch: CHAR; view: Views.View; w, h: INTEGER;\r\t\tbuf: TextModels.Model; bufbeg, bufend: INTEGER;\t"
                    attr: 0
                  - text: "(* buf # NIL & bufend < 0: bufend = buf.Length() *)"
                    attr: 1
                  - text: "\r\t\tpos: INTEGER\r\t);\r\t\tVAR script: Stores.Operation; wr: TextModels.Writer; cluster: BOOLEAN;\r\tBEGIN\r\t\tIF (beg < end)\t"
                    attr: 0
                  - text: "(* something to delete *)"
                    attr: 1
                  - text: "\r\t\tOR (attr # NIL)\t"
                    attr: 0
                  - text: "(* something new to write *)"
                    attr: 1
                  - text: "\r\t\tOR (buf # NIL)\t"
                    attr: 0
                  - text: "(* something new to insert *)"
                    attr: 1
                  - text: "\r\t\tTHEN\r\t\t\tcluster := (beg < end) OR (attr = NIL) OR (view # NIL);\r\t\t\t"
                    attr: 0
                  - text: "(* don't script when typing a single character -> TextModels will bunch if possible *)"
                    attr: 1
                  - text: "\r\t\t\t"
                    attr: 0
                  - text: "(* ~cluster => name is reverted to #System.Inserting by TextModels *)"
                    attr: 1
                  - text: "\r\t\t\tIF cluster THEN Models.BeginScript(c.text, name, script) END;\r\t\t\tIF beg < end THEN\r\t\t\t\tc.text.Delete(beg, end);\r\t\t\t\tIF pos > beg THEN DEC(pos, end - beg) END\r\t\t\tEND;\r\t\t\tIF attr # NIL THEN\r\t\t\t\tASSERT(buf = NIL, 20);\r\t\t\t\twr := CachedWriter(c, attr); wr.SetPos(pos);\r\t\t\t\tIF view # NIL THEN wr.WriteView(view, w, h) ELSE wr.WriteChar(ch) END;\r\t\t\t\tCacheWriter(c, wr)\r\t\t\tELSIF buf # NIL THEN\r\t\t\t\tIF bufend < 0 THEN bufend := buf.Length() END;\r\t\t\t\tc.text.Insert(pos, buf, bufbeg, bufend)\r\t\t\tEND;\r\t\t\tIF cluster THEN Models.EndScript(c.text, script) END;\r\t\t\t"
                    attr: 0
