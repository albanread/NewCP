                    attr: 0
                  - text: "(* should check Unicode *)"
                    attr: 3
                  - text: "\r\t\tIF (ch = ldel) OR (ch = rdel) THEN name := deletingKey ELSE name := replacingKey END;\r\t\tIF boundCaret & (c.selBeg # c.selEnd) & (legal OR (ch = ldel) OR (ch = rdel) OR (ch = enter)) THEN\r\t\t\tbeg := c.selBeg; end := c.selEnd;\r\t\t\tIF (ch = ldel) OR (ch = rdel) THEN SmartRange(c, beg, end); ch := 0X END\r\t\tELSE\r\t\t\tbeg := c.carPos; end := beg\r\t\tEND;\r\t\tIF (c.carPos # none) OR boundCaret & (c.selBeg # c.selEnd) THEN\r\t\t\tIF (ch = line) OR (ch = enter) THEN\r\t\t\t\tIF noAutoIndent IN c.opts THEN buf := NIL ELSE buf := Indentation(c, beg) END;\r\t\t\t\tIF buf = NIL THEN ch := line; legal := TRUE ELSE ch := 0X; legal := FALSE END\r\t\t\tEND;\r\t\t\tIF legal THEN\r\t\t\t\tattr := InsertionAttr(c)\r\t\t\tELSIF (ch = ldel) & (c.carPos > 0) THEN\r\t\t\t\tbeg := c.carPos - 1; end := c.carPos\r\t\t\tELSIF (ch = rdel) & (c.carPos < c.text.Length()) THEN\r\t\t\t\tbeg := c.carPos; end := c.carPos + 1\r\t\t\tEND\r\t\tEND;\r\t\tDoEdit(name, c, beg, end, attr, ch, NIL, 0, 0, buf, 0, -1, beg)\r\tEND InsertChar;\r\r\tPROCEDURE InsertText (c: StdCtrl; beg, end: INTEGER; text: TextModels.Model; OUT start: INTEGER);\r\t\tVAR buf: TextModels.Model;\r\tBEGIN\r\t\tbuf := TextModels.CloneOf(text); buf.InsertCopy(0, text, 0, text.Length());\r\t\tIF beg = end THEN MergeAdjust(c.text, buf, beg, start) ELSE start := beg END;\r\t\tDoEdit(insertingKey, c, beg, end, NIL, 0X, NIL, 0, 0, buf, 0, -1, beg)\r\tEND InsertText;\r\r\tPROCEDURE InsertView (c: StdCtrl; beg, end: INTEGER; v: Views.View; w, h: INTEGER);\r\tBEGIN\r\t\tDoEdit(insertingKey, c, beg, end, InsertionAttr(c), 0X, v, w, h, NIL, 0, 0, beg)\r\tEND InsertView;\r\r\r\tPROCEDURE InSubFrame (f, f1: Views.Frame; x, y: INTEGER): BOOLEAN;\r\tBEGIN\r\t\tINC(x, f.gx - f1.gx); INC(y, f.gy - f1.gy);\r\t\t"
