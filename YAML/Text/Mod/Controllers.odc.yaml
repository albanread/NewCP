                  - text: " buf\r\tEND Indentation;\r\r\tPROCEDURE InsertChar (c: StdCtrl; ch: CHAR);\r\t\tVAR buf: TextModels.Model; attr: TextModels.Attributes;\r\t\t\tbeg, end: INTEGER; legal: BOOLEAN; name: Stores.OpName;\r\tBEGIN\r\t\tattr := NIL; buf := NIL;\r\t\tIF ch < 100X THEN legal := LegalChar(ch) ELSE legal := "
