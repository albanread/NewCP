                    attr: 1
                  - text: "\r\r\tPROCEDURE LegalChar (ch: CHAR): BOOLEAN;\r\tBEGIN\r\t\tIF ch < 100X THEN\r\t\t\tCASE ORD(ch) OF\r\t\t\t\tORD(viewcode),\r\t\t\t\tORD(tab), ORD(line), ORD(para),\r\t\t\t\tORD(\" \") .. 7EH, 80H .. 0FFH: "
                    attr: 0
                  - text: RETURN
