                  - text: "\r\t\t\t\tSetCaret(text, pos)\r\t\t\tEND\r\t\tELSE c.carPos := none\r\t\tEND\r\tEND CheckCaret;\r\r\r\r\tPROCEDURE HiliteRect (f: Views.Frame; l, t, r, b, s: INTEGER; show: BOOLEAN);\r\tBEGIN\r\t\tIF s = Ports.fill THEN\r\t\t\tf.MarkRect(l, t, r, b, Ports.fill, Ports.hilite, show)\r\t\tELSE\r\t\t\tf.MarkRect(l, t, r - s, t + s, s, Ports.hilite, show);\r\t\t\tf.MarkRect(l, t + s, l + s, b - s, s, Ports.hilite, show);\r\t\t\tf.MarkRect(l + s, b - s, r, b, s, Ports.hilite, show);\r\t\t\tf.MarkRect(r - s, t + s, r, b - s, s, Ports.hilite, show)\r\t\tEND\r\tEND HiliteRect;\r\r\tPROCEDURE MarkSelRange (c: StdCtrl; f: Views.Frame; b, e: TextViews.Location;\r\t\tfront, show: BOOLEAN\r\t);\r\t\tVAR fw, ff, r, t: INTEGER;\r\tBEGIN\r\t\tIF front THEN fw := 0; ff := Ports.fill ELSE fw := f.dot; ff := fw END;\r\t\tIF b.start # e.start THEN\r\t\t\tr := f.r; t := b.y + b.asc + b.dsc;\r\t\t\tHiliteRect(f, b.x, b.y, r + fw, t + fw, ff, show);\r\t\t\tIF t < e.y THEN HiliteRect(f, 0, t, r + fw, e.y + fw, ff, show) END;\r\t\t\tb.x := f.l; b.y := e.y\r\t\tEND;\r\t\tHiliteRect(f, b.x, b.y, e.x + fw, e.y + e.asc + e.dsc + fw, ff, show)\r\tEND MarkSelRange;\r\r\tPROCEDURE MarkSelection (c: StdCtrl; f: Views.Frame; beg, end: INTEGER; show: BOOLEAN);\r\t\tVAR b, e: TextViews.Location; s: Views.View; \r\tBEGIN\r\t\tIF (beg # end)"
                    attr: 0
