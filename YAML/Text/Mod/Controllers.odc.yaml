                  - text: " TRUE\r\t\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE\r\t\t\tEND\r\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE\r\t\tEND\r\tEND LegalChar;\r\r\tPROCEDURE LeftTerminator (ch: CHAR): BOOLEAN;\r\tBEGIN\r\t\tIF ch < 100X THEN\r\t\t\tCASE ch OF\r\t\t\t\tviewcode, tab, line, para, '\"', \"'\", \"(\", \"[\", \"{\": "
                    attr: 0
