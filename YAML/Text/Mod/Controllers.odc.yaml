                  - text: RETURN
                    attr: 3
                  - text: " pref.filter\r\tEND IsFilter;\r\r\tPROCEDURE FindFilter (c: StdCtrl; f: Views.Frame; x, y: INTEGER; OUT filter: Views.View);\r\t\tCONST catchRange = 1000;\r\t\tVAR rd: TextModels.Reader; pos, beg, end: INTEGER; isF: BOOLEAN;\r\tBEGIN\r\t\tc.view.GetRange(f, beg, end); DEC(beg, catchRange);\r\t\tpos := c.view.ThisPos(f, x, y);\r\t\tIF pos < c.text.Length() THEN INC(pos) END;\t"
                    attr: 0
                  - text: "(* let filter handle itself *)"
                    attr: 1
                  - text: "\r\t\trd := CachedReader(c); rd.SetPos(pos);\r\t\tREPEAT\r\t\t\trd.ReadPrevView(filter);\r\t\t\tisF := (filter # NIL) & IsFilter(filter, c, f, x, y);\r\t\tUNTIL isF OR rd.eot OR (rd.Pos() < beg);\r\t\tIF ~isF THEN filter := NIL END;\r\t\tCacheReader(c, rd)\r\tEND FindFilter;\r\r\tPROCEDURE FilteredPollCursor (c: StdCtrl; f: Views.Frame;\r\t\tVAR msg: Controllers.PollCursorMsg; VAR done: BOOLEAN\r\t);\r\t\tVAR filter, focus: Views.View; x, y: INTEGER; modifiers: SET; isDown: BOOLEAN; fmsg: FilterPollCursorMsg;\r\tBEGIN\r\t\tFindFilter(c, f, msg.x, msg.y, filter);\r\t\tIF filter # NIL THEN\r\t\t\t(* f.Input(x, y, modifiers, isDown); *)\r\t\t\tfmsg.x := msg.x; fmsg.y := msg.y; fmsg.cursor := msg.cursor;\r\t\t\tfmsg.controller := c; fmsg.done := FALSE;\r\t\t\t"
                    attr: 0
                  - text: "(*Views.ForwardCtrlMsg(f, fmsg) - does not work f.view # filter !!*)"
                    attr: 3
                  - text: "\r\t\t\tfocus := NIL;\r\t\t\tfilter.HandleCtrlMsg(f, fmsg, focus);\r\t\t\tIF fmsg.done THEN msg.cursor := fmsg.cursor END;\r\t\t\tdone := fmsg.done\r\t\tEND\r\tEND FilteredPollCursor;\r\r\tPROCEDURE FilteredTrack (c: StdCtrl; f: Views.Frame;\r\t\tVAR msg: Controllers.TrackMsg; VAR done: BOOLEAN\r\t);\r\t\tVAR filter, focus: Views.View; fmsg: FilterTrackMsg;\r\tBEGIN\r\t\tFindFilter(c, f, msg.x, msg.y, filter);\r\t\tIF filter # NIL THEN\r\t\t\tfmsg.x := msg.x; fmsg.y := msg.y; fmsg.modifiers := msg.modifiers;\r\t\t\tfmsg.controller := c; fmsg.done := FALSE;\r\t\t\t"
                    attr: 0
                  - text: "(*Views.ForwardCtrlMsg(f, fmsg) - does not work f.view # filter !!*)\r\t\t\t"
                    attr: 3
                  - text: "focus := NIL; filter.HandleCtrlMsg(f, fmsg, focus);\r\t\t\tdone := fmsg.done\r\t\tEND\r\tEND FilteredTrack;\r\r\r\t"
                    attr: 0
                  - text: "(* StdCtrl *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (c: StdCtrl) Internalize2 (VAR rd: Stores.Reader);\r\t\tVAR thisVersion: INTEGER;\r\tBEGIN\r\t\tc.Internalize2^(rd);\r\t\tIF rd.cancelled THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\trd.ReadVersion(minVersion, maxStdVersion, thisVersion);\r\t\tIF rd.cancelled THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\tInitMarks(c)\r\tEND Internalize2;\r\r\tPROCEDURE (c: StdCtrl) Externalize2 (VAR wr: Stores.Writer);\r\tBEGIN\r\t\tc.Externalize2^(wr);\r\t\twr.WriteVersion(maxStdVersion)\r\tEND Externalize2;\r\r\tPROCEDURE (c: StdCtrl) CopyFrom (source: Stores.Store);\r\tBEGIN\r\t\tc.CopyFrom^(source); InitMarks(c)\r\tEND CopyFrom;\r\r\tPROCEDURE (c: StdCtrl) Neutralize2;\r\tBEGIN\r\t\t(* c.Neutralize^; *)\r\t\tc.SetCaret(none)\r\tEND Neutralize2;\r\r\tPROCEDURE (c: StdCtrl) GetContextType (OUT type: Stores.TypeName);\r\tBEGIN\r\t\ttype := \"TextViews.View\"\r\tEND GetContextType;\r\r\tPROCEDURE (c: StdCtrl) GetValidOps (OUT valid: SET);\r\tBEGIN\r\t\tvalid := {};\r\t\tIF (c.carPos # none) OR (boundCaret & (c.selBeg # c.selEnd)) THEN\r\t\t\tvalid := valid + {Controllers.pasteChar, Controllers.paste}\r\t\tEND;\r\t\tIF c.selBeg # c.selEnd THEN\r\t\t\tvalid := valid + {Controllers.cut, Controllers.copy}\r\t\tEND\r\tEND GetValidOps;\r\r\tPROCEDURE (c: StdCtrl) NativeModel (m: Models.Model): BOOLEAN;\r\tBEGIN\r\t\tASSERT(m # NIL, 20);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " m IS TextModels.Model\r\tEND NativeModel;\r\r\tPROCEDURE (c: StdCtrl) NativeView (v: Views.View): BOOLEAN;\r\tBEGIN\r\t\tASSERT(v # NIL, 20);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " v IS TextViews.View\r\tEND NativeView;\r\r\tPROCEDURE (c: StdCtrl) NativeCursorAt (f: Views.Frame; x, y: INTEGER): INTEGER;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " Ports.textCursor\r\tEND NativeCursorAt;\r\r\tPROCEDURE (c: StdCtrl) PollNativeProp (selection: BOOLEAN;\r\t\tVAR p: Properties.Property; VAR truncated: BOOLEAN\r\t);\r\t\tVAR beg, end: INTEGER;\r\tBEGIN\r\t\tIF selection & (c.selBeg = c.selEnd) THEN\r\t\t\tp := InsertionAttr(c).Prop(); truncated := FALSE\r\t\tELSE\r\t\t\tIF selection THEN beg := c.selBeg; end := c.selEnd\r\t\t\tELSE beg := 0; end := c.text.Length()\r\t\t\tEND;\r"
                    attr: 0
                  - text: "(*\r\t\t\ttruncated := (end - beg > lenCutoff);\r\t\t\tIF truncated THEN end := beg + lenCutoff END;\r*)\r"
                    attr: 3
                  - text: "\t\t\tp := c.text.Prop(beg, end)\r\t\tEND\r\tEND PollNativeProp;\r\r\tPROCEDURE (c: StdCtrl) SetNativeProp (selection: BOOLEAN; old, p: Properties.Property);\r\t\tVAR t: TextModels.Model; beg, end: INTEGER;\r\tBEGIN\r\t\tt := c.text;\r\t\tIF selection THEN beg := c.selBeg; end := c.selEnd ELSE beg := 0; end := t.Length() END;\r\t\tIF beg < end THEN\r\t\t\tt.Modify(beg, end, old, p);\r\t\t\tIF selection THEN c.SetSelection(beg, end) END\r\t\tELSIF selection THEN\r\t\t\tc.insAttr := TextModels.ModifiedAttr(InsertionAttr(c), p)\r\t\tEND\r\tEND SetNativeProp;\r\r\tPROCEDURE (c: StdCtrl) MakeViewVisible (v: Views.View);\r\t\tVAR pos: INTEGER;\r\tBEGIN\r\t\tASSERT(v # NIL, 20);\r\t\tASSERT(v.context # NIL, 21);\r\t\tASSERT(v.context.ThisModel() = c.text, 22);\r\t\tpos := v.context(TextModels.Context).Pos();\r\t\tShowPos(c, pos, pos + 1)\r\tEND MakeViewVisible;\r\r\tPROCEDURE (c: StdCtrl) GetFirstView (selection: BOOLEAN; OUT v: Views.View);\r\t\tVAR rd: TextModels.Reader; beg, end: INTEGER;\r\tBEGIN\r\t\tIF selection THEN beg := c.selBeg; end := c.selEnd\r\t\tELSE beg := 0; end := c.text.Length()\r\t\tEND;\r\t\tIF beg < end THEN\r\t\t\trd := CachedReader(c); rd.SetPos(beg); rd.ReadView(v);\r\t\t\tIF rd.Pos() > end THEN v := NIL END;\r\t\t\tCacheReader(c, rd)\r\t\tELSE v := NIL\r\t\tEND\r\tEND GetFirstView;\r\r\tPROCEDURE (c: StdCtrl) GetNextView (selection: BOOLEAN; VAR v: Views.View);\r\t\tVAR con: Models.Context; rd: TextModels.Reader; beg, end, pos: INTEGER;\r\tBEGIN\r\t\tASSERT(v # NIL, 20); con := v.context;\r\t\tASSERT(con # NIL, 21); ASSERT(con.ThisModel() = c.text, 22);\r\t\tIF selection THEN beg := c.selBeg; end := c.selEnd\r\t\tELSE beg := 0; end := c.text.Length()\r\t\tEND;\r\t\tpos := con(TextModels.Context).Pos();\r\t\tIF (beg <= pos) & (pos < end) THEN\r\t\t\trd := CachedReader(c); rd.SetPos(pos + 1); rd.ReadView(v);\r\t\t\tIF rd.Pos() > end THEN v := NIL END;\r\t\t\tCacheReader(c, rd)\r\t\tELSE v := NIL\r\t\tEND\r\tEND GetNextView;\r\r\tPROCEDURE (c: StdCtrl) GetPrevView (selection: BOOLEAN; VAR v: Views.View);\r\t\tVAR con: Models.Context; rd: TextModels.Reader; beg, end, pos: INTEGER;\r\tBEGIN\r\t\tASSERT(v # NIL, 20); con := v.context;\r\t\tASSERT(con # NIL, 21); ASSERT(con.ThisModel() = c.text, 22);\r\t\tIF selection THEN beg := c.selBeg; end := c.selEnd\r\t\tELSE beg := 0; end := c.text.Length()\r\t\tEND;\r\t\tpos := con(TextModels.Context).Pos();\r\t\tIF (beg < pos) & (pos <= end) THEN\r\t\t\trd := CachedReader(c); rd.SetPos(pos); rd.ReadPrevView(v);\r\t\t\tIF rd.Pos() < beg THEN v := NIL END;\r\t\t\tCacheReader(c, rd)\r\t\tELSE v := NIL\r\t\tEND\r\tEND GetPrevView;\r\r\tPROCEDURE (c: StdCtrl) GetSelectionBounds (f: Views.Frame; OUT x, y, w, h: INTEGER);\r\t\tVAR b, e: TextViews.Location;\r\tBEGIN\r\t\tc.GetSelectionBounds^(f, x, y, w, h);\r\t\tIF w = Views.undefined THEN\r\t\t\tc.view.GetThisLocation(f, c.selBeg, b);\r\t\t\tc.view.GetThisLocation(f, c.selEnd, e);\r\t\t\tIF b.start = e.start THEN x := b.x; w := e.x - b.x;\r\t\t\tELSE x := f.l; w := f.r - f.l;\r\t\t\tEND;\r\t\t\ty := b.y; h := e.y + e.asc + e.dsc - b.y\r\t\tEND\r\tEND GetSelectionBounds;\r\r\tPROCEDURE (c: StdCtrl) MarkPickTarget (source, f: Views.Frame;\r\t\tsx, sy, x, y: INTEGER; show: BOOLEAN\r\t);\r\t\tVAR b, e: TextViews.Location; pos: INTEGER;\r\tBEGIN\r\t\tpos := c.view.ThisPos(f, x, y);\r\t\tIF pos < c.text.Length() THEN\r\t\t\tc.view.GetThisLocation(f, pos, b);\r\t\t\tc.view.GetThisLocation(f, pos + 1, e);\r\t\t\tIF (b.pos < e.pos) OR (b.pos = e.pos) & (b.x < e.x) THEN\r\t\t\t\tMarkSelRange(c, f, b, e, TRUE, show)\r\t\t\tEND\r\t\tEND\r\tEND MarkPickTarget;\r\r\tPROCEDURE (c: StdCtrl) MarkDropTarget (source, f: Views.Frame;\r\t\tsx, sy, dx, dy, w, h, rx, ry: INTEGER; type: Stores.TypeName; isSingle, show: BOOLEAN\r\t);\r\t\tVAR loc: TextViews.Location; pos: INTEGER;\r\tBEGIN\r\t\tpos := c.view.ThisPos(f, dx, dy);\r\t\tIF (source # NIL) & ((source.view = f.view) OR (source.view.ThisModel() = f.view.ThisModel()))\r\t\t& (c.selBeg < pos) & (pos < c.selEnd) THEN\r\t\t\tpos := c.selBeg\r\t\tEND;\r\t\tc.view.GetThisLocation(f, pos, loc);\r\t\tf.MarkRect(loc.x, loc.y, loc.x + f.unit, loc.y + loc.asc + loc.dsc, Ports.fill, Ports.invert, show);\r\t\tIF (isSingle OR ~Services.Extends(type, \"TextViews.View\")) & (w > 0) & (h > 0) THEN\r\t\t\tDEC(dx, rx); DEC(dy, ry);\r\t\t\tf.MarkRect(dx, dy, dx + w, dy + h, 0, Ports.dim25, show)\r\t\tEND\r\tEND MarkDropTarget;\r\r\r\tPROCEDURE GetThisLine (c: StdCtrl; pos: INTEGER; OUT beg, end: INTEGER);\r\t\tVAR st: TextSetters.Setter;\r\tBEGIN\r\t\tst := c.view.ThisSetter();\r\t\tbeg := st.ThisLine(pos); end := st.NextLine(beg);\r\t\tIF end = beg THEN end := c.text.Length() END;\r\tEND GetThisLine;\r\r\tPROCEDURE GetThisChunk (c: StdCtrl; f: Views.Frame;\r\t\tVAR s: TrackState; OUT beg, end: INTEGER; OUT mode: INTEGER\r\t);\r\t\tVAR v: TextViews.View; b, e: TextViews.Location;\r\t\t\tst: TextSetters.Setter; ruler: TextRulers.Ruler; ra: TextRulers.Attributes;\r\t\t\tpos, r: INTEGER;\r\tBEGIN\r\t\tv := c.view; st := v.ThisSetter(); pos := ThisPos(v, f, s.x, s.y);\r\t\truler := TextViews.ThisRuler(v, pos); ra := ruler.style.attr;\r\t\tr := ra.right; IF ~(TextRulers.rightFixed IN ra.opts) OR (r > f.r) THEN r := f.r END;\r\t\tst.GetWord(pos, beg, end);\r\t\tv.GetThisLocation(f, beg, b); v.GetThisLocation(f, end, e);\r\t\tIF (s.x < f.l) OR (s.x >= r) THEN\t"
                    attr: 0
                  - text: "(* outside of line box: whole line *)"
                    attr: 1
                  - text: "\r\t\t\tGetThisLine(c, pos, beg, end);\r\t\t\tmode := lines\r\t\tELSIF (s.y < b.y) OR (s.y < b.y + b.asc + b.dsc) & (s.x < b.x)\r\t\tOR (s.y >= e.y) & (s.x >= e.x) OR (s.y >= e.y + e.asc + e.dsc) THEN\r\t\t\t"
                    attr: 0
                  - text: "(* outside of word: single char *)"
                    attr: 1
                  - text: "\r\t\t\tbeg := ThisPos(v, f, s.x, s.y); v.GetThisLocation(f, beg, b);\r\t\t\tIF (b.x > s.x) & (beg > 0) THEN DEC(beg) END;\r\t\t\tIF beg < c.text.Length() THEN end := beg + 1 ELSE end := beg END;\r\t\t\tmode := words\r\t\tELSE\t"
                    attr: 0
                  - text: "(* whole word *)"
                    attr: 1
                  - text: "\r\t\t\tmode := words\r\t\tEND\r\tEND GetThisChunk;\r\r\tPROCEDURE SetSel (c: StdCtrl; beg, end: INTEGER);\r\t"
                    attr: 0
                  - text: "(* pre: ~(Containers.noSelection IN c.opts) *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tIF beg >= end THEN c.SetCaret(beg) ELSE c.SetSelection(beg, end) END\r\tEND SetSel;\r\r\tPROCEDURE PrepareToTrack (c: StdCtrl; f: Views.Frame;\r\t\tVAR s: TrackState; mode: INTEGER;\r\t\tVAR pin0, pin1, pos: INTEGER\r\t);\r\t\tVAR loc: TextViews.Location; beg, end: INTEGER; m: INTEGER;\r\tBEGIN\r\t\tpos := ThisPos(c.view, f, s.x, s.y);\r\t\tIF mode IN {chars, words, lines} THEN\r\t\t\tGetThisChunk(c, f, s, pin0, pin1, m)\r\t\tELSE pin0 := pos; pin1 := pos\r\t\tEND;\r\t\tIF s.toggle & ((c.selBeg # c.selEnd) OR boundCaret & (c.carPos # none))\r\t\t& ~(Containers.noSelection IN c.opts) THEN\t"
                    attr: 0
                  - text: "(* modify existing selection *)"
                    attr: 1
                  - text: "\r\t\t\tIF c.selBeg # c.selEnd THEN\r\t\t\t\tbeg := c.selBeg; end := c.selEnd\r\t\t\tELSE\r\t\t\t\tbeg := c.carPos; end := beg; c.selPin0 := beg; c.selPin1 := beg\r\t\t\tEND;\r\t\t\tIF pin1 > c.selPin0 THEN\r\t\t\t\tend := pin1; pin0 := beg\r\t\t\tELSIF pin0 < c.selPin1 THEN\r\t\t\t\tbeg := pin0; pin0 := end\r\t\t\tEND;\r\t\t\tSetSel(c, beg, end);\r\t\t\tpin1 := pin0\r\t\tELSIF mode IN {chars, words, lines} THEN\r\t\t\tSetSel(c, pin0, pin1);\r\t\t\tpos := pin1\r\t\tELSE\r\t\t\tSetCaret(c.text, pos)\r\t\tEND;\r\t\tc.lastStep := Services.Ticks()\r\tEND PrepareToTrack;\r\r\tPROCEDURE ScrollDelay (d: INTEGER): INTEGER;\r\t\tVAR second, delay: INTEGER;\r\tBEGIN\r\t\tsecond := Services.resolution;\r\t\tIF d < 2 * mm THEN delay := second DIV 2\r\t\tELSIF d < 4 * mm THEN delay := second DIV 3\r\t\tELSIF d < 6 * mm THEN delay := second DIV 5\r\t\tELSIF d < 8 * mm THEN delay := second DIV 10\r\t\tELSE delay := second DIV 20\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " delay\r\tEND ScrollDelay;\r\r\tPROCEDURE ScrollWhileTracking (c: StdCtrl; f: Views.Frame; VAR x0, y0, x, y: INTEGER);\r\t"
                    attr: 0
                  - text: "(* currently, there are no provisions to scroll while tracking inside an embedded view *)"
                    attr: 1
                  - text: "\r\t\tVAR now: LONGINT; "
                    attr: 0
                  - text: "(* "
                    attr: 3
                  - text: "normalize: BOOLEAN; "
                    attr: 0
                  - text: "*)"
                    attr: 3
                  - text: " scr: Controllers.ScrollMsg;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: "(*"
                    attr: 3
                  - text: " normalize := c.view.context.Normalize(); "
                    attr: 0
                  - text: "*)"
                    attr: 3
                  - text: "\r\t\tnow := Services.Ticks();\r\t\tIF x < f.l THEN x0 := x; x := f.l ELSIF x > f.r THEN x0 := x; x := f.r END;\r\t\tIF (y < f.t) "
                    attr: 0
                  - text: "(*"
                    attr: 3
                  - text: " & normalize"
                    attr: 0
                  - text: "*)"
                    attr: 3
                  - text: " THEN\r\t\t\tIF c.lastStep + ScrollDelay(f.t - y) <= now THEN\r\t\t\t\tc.lastStep := now;\r\t\t\t\tscr.focus := "
                    attr: 0
                  - text: "TRUE"
                    attr: 3
                  - text: "; scr.vertical := TRUE; scr.op := Controllers.decLine;\r"
                    attr: 0
                  - text: "\t\t\t\tscr.done := FALSE;\r"
                    attr: 3
                  - text: "\t\t\t\tControllers.ForwardVia(Controllers.frontPath, scr)\r\t\t\tEND\r\t\tELSIF (y > f.b) "
                    attr: 0
                  - text: "(*"
                    attr: 3
                  - text: " & normalize "
                    attr: 0
                  - text: "*)"
                    attr: 3
                  - text: " THEN\r\t\t\tIF c.lastStep + ScrollDelay(y - f.b) <= now THEN\r\t\t\t\tc.lastStep := now;\r\t\t\t\tscr.focus := "
                    attr: 0
                  - text: "TRUE"
                    attr: 3
                  - text: "; scr.vertical := "
                    attr: 0
                  - text: "TRUE"
                    attr: 3
                  - text: "; scr.op := Controllers.incLine;\r\t\t\t\t"
                    attr: 0
                  - text: "scr.done := FALSE;\r"
                    attr: 3
                  - text: "\t\t\t\tControllers.ForwardVia(Controllers.frontPath, scr)\r\t\t\tEND\r\t\tELSE\r\t\t\ty0 := y\r\t\tEND\r\tEND ScrollWhileTracking;\r\r\tPROCEDURE (c: StdCtrl) TrackMarks (f: Views.Frame; x, y: INTEGER; units, extend, add: BOOLEAN);\r\t\tVAR s: TrackState; pos, beg, end, pin0, pin1, p, p1: INTEGER;\r\t\t\tmodifiers: SET; mode, m: INTEGER; isDown, noSel: BOOLEAN;\r\tBEGIN\r\t\tIF c.opts * Containers.mask # Containers.mask THEN\t"
                    attr: 0
                  - text: "(* track caret or selection *)"
                    attr: 1
                  - text: "\r\t\t\ts.x := x; s.y := y; s.toggle := extend;\r\t\t\tnoSel := Containers.noSelection IN c.opts;\r\t\t\tIF units & ~noSel THEN\t"
                    attr: 0
                  - text: "(* select units, i.e. words or lines *)"
                    attr: 1
                  - text: "\r\t\t\t\tGetThisChunk(c, f, s, beg, end, mode)\r\t\t\tELSE\t"
                    attr: 0
                  - text: "(* set caret or selection *)"
                    attr: 1
                  - text: "\r\t\t\t\tmode := none\r\t\t\tEND;\r\t\t\tPrepareToTrack(c, f, s, mode, pin0, pin1, p); x := s.x; y := s.y;\r\t\t\tbeg := pin0; end := pin1;\r\t\t\tIF p < pin0 THEN beg := p ELSIF p > pin1 THEN end := p END;\r\t\t\tp := -1;\r\t\t\tf.Input(s.x, s.y, modifiers, isDown);\r\t\t\tWHILE isDown DO\r(*\r\t\t\tREPEAT\r\t\t\t\tf.Input(s.x, s.y, modifiers, isDown);\r*)\r\t\t\t\tIF (s.x # x) OR (s.y # y) THEN\r\t\t\t\t\tScrollWhileTracking(c, f, x, y, s.x, s.y);\r\t\t\t\t\tp1 := ThisPos(c.view, f, s.x, s.y);\r\t\t\t\t\tIF p1 # p THEN\r\t\t\t\t\t\tp := p1;\r\t\t\t\t\t\tIF mode IN {words, lines} THEN\r\t\t\t\t\t\t\tIF mode = words THEN\r\t\t\t\t\t\t\t\tGetThisChunk(c, f, s, beg, end, m)\r\t\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\t\tGetThisLine(c, p, beg, end)\r\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\tIF p > pin0 THEN pos := end ELSE pos := beg END\r\t\t\t\t\t\tELSE pos := p\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tbeg := pin0; end := pin1;\r\t\t\t\t\t\tIF noSel THEN\r\t\t\t\t\t\t\tc.SetCaret(pos)\r\t\t\t\t\t\tELSE\r\t\t\t\t\t\t\tIF pos < pin0 THEN beg := pos ELSIF pos > pin1 THEN end := pos END;\r\t\t\t\t\t\t\tSetSel(c, beg, end);\r\t\t\t\t\t\t\tIF c.selPin0 = c.selPin1 THEN\r\t\t\t\t\t\t\t\tIF pos < pin0 THEN c.selPin0 := pos; c.selPin1 := pin1\r\t\t\t\t\t\t\t\tELSIF pos > pin1 THEN c.selPin0 := pin0; c.selPin1 := pos\r\t\t\t\t\t\t\t\tEND\r\t\t\t\t\t\t\tEND\r\t\t\t\t\t\tEND\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tf.Input(s.x, s.y, modifiers, isDown)\r\t\t\tEND\r(*\r\t\t\tUNTIL ~isDown\r*)\r\t\tEND\r\tEND TrackMarks;\r\r\tPROCEDURE (c: StdCtrl) Resize (v: Views.View; l, t, r, b: INTEGER);\r\t\tVAR con: Models.Context;\r\tBEGIN\r\t\tASSERT(v # NIL, 20); con := v.context;\r\t\tASSERT(con # NIL, 21); ASSERT(con.ThisModel() = c.text, 22);\r\t\tcon.SetSize(r - l, b - t)\r\tEND Resize;\r\r\tPROCEDURE (c: StdCtrl) DeleteSelection;\r\t\tVAR beg, end: INTEGER;\r\tBEGIN\r\t\tbeg := c.selBeg; end := c.selEnd;\r\t\tIF beg # end THEN\r\t\t\tSmartRange(c, beg, end);\r\t\t\tDoEdit(deletingKey, c, beg, end, NIL, 0X, NIL, 0, 0, NIL, 0, 0, 0)\r\t\tEND\r\tEND DeleteSelection;\r\r\tPROCEDURE (c: StdCtrl) MoveLocalSelection (f, dest: Views.Frame; x, y, dx, dy: INTEGER);\r\t\tVAR buf: TextModels.Model; pos, beg0, end0, beg, end, start, len: INTEGER;\r\tBEGIN\r\t\tpos := dest.view(TextViews.View).ThisPos(dest, dx, dy);\r"
                    attr: 0
                  - text: "(* smart move disabled for now --> use true move instead of copy"
                    attr: 3
                  - text: "\r\t\tbeg0 := c.selBeg; end0 := c.selEnd; beg := beg0; end := end0;\r\t\tSmartRange(c, beg, end);\r\t\tIF (beg < pos) & (pos < end) THEN pos := beg END;\r\t\tbuf := TextModels.CloneOf(c.text); buf.CopyFrom(0, c.text, beg0, end0);\r\t\tIF OnlyWords(c, beg0, end0) THEN MergeAdjust(c.text, buf, pos, start) ELSE start := pos END;\r\t\tlen := end0 - beg0;\r\t\tIF start >= end THEN DEC(start, end - beg) END;\r\t\tIF pos # beg THEN\r\t\t\tDoEdit(movingKey, c, beg, end, NIL, 0X, NIL, 0, 0, buf, pos);\r\t\t\tSetSelection(c.text, start, start + len);\r\t\t\tAutoShowRange(c, start, start + len)\r\t\tEND\r"
                    attr: 0
                  - text: "*)"
                    attr: 3
                  - text: "\r\t\tbeg := c.selBeg; end := c.selEnd;\r\t\tIF (pos < beg) OR (pos > end) THEN\r\t\t\tlen := end - beg; start := pos;\r\t\t\tIF start >= end THEN DEC(start, len) END;\r\t\t\tDoEdit(movingKey, c, 0, 0, NIL, 0X, NIL, 0, 0, c.text, beg, end, pos);\r\t\t\tSetSelection(c.text, start, start + len);\r\t\t\tAutoShowRange(c, start, start + len)\r\t\tEND\r\tEND MoveLocalSelection;\r\r\tPROCEDURE (c: StdCtrl) CopyLocalSelection (f, dest: Views.Frame; x, y, dx, dy: INTEGER);\r\t\tVAR buf: TextModels.Model; pos, beg, end, start, len: INTEGER;\r\tBEGIN\r\t\tpos := dest.view(TextViews.View).ThisPos(dest, dx, dy);\r\t\tbeg := c.selBeg; end := c.selEnd;\r\t\tIF (beg < pos) & (pos < end) THEN pos := beg END;\r\t\tbuf := TextModels.CloneOf(c.text); buf.InsertCopy(0, c.text, beg, end);\r\t\tIF OnlyWords(c, beg, end) THEN MergeAdjust(c.text, buf, pos, start) ELSE start := pos END;\r\t\tlen := end - beg;\r\t\tDoEdit(copyingKey, c, 0, 0, NIL, 0X, NIL, 0, 0, buf, 0, -1, pos);\r\t\tSetSelection(c.text, start, start + len);\r\t\tAutoShowRange(c, start, start + len)\r\tEND CopyLocalSelection;\r\r\tPROCEDURE (c: StdCtrl) SelectionCopy (): Containers.Model;\r\t\tVAR t: TextModels.Model;\r\tBEGIN\r\t\tIF c.selBeg # c.selEnd THEN\r\t\t\tt := TextModels.CloneOf(c.text); t.InsertCopy(0, c.text, c.selBeg, c.selEnd);\r\t\tELSE t := NIL\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " t\r\tEND SelectionCopy;\r\r\tPROCEDURE (c: StdCtrl) NativePaste (m: Models.Model; f: Views.Frame);\r\t\tVAR beg, end, start: INTEGER;\r\tBEGIN\r\t\tWITH m: TextModels.Model DO\r\t\t\tGetTargetRange(c, beg, end);\r\t\t\tIF beg # none THEN InsertText(c, beg, end, m, start) END\r\t\tEND\r\tEND NativePaste;\r\r\tPROCEDURE (c: StdCtrl) ArrowChar (f: Views.Frame; ch: CHAR; units, select: BOOLEAN);\r\t\tVAR st: TextSetters.Setter; v: TextViews.View; loc: TextViews.Location;\r\t\t\torg, len,  p, pos,  b, e,  beg, end,  d, d0, edge,  x, dy: INTEGER;\r\t\t\tchange, rightEdge, rightDir: BOOLEAN;\r\t\t\tscroll: Controllers.ScrollMsg;\r\tBEGIN\r\t\tc.insAttr := NIL;\r\t\tModels.StopBunching(c.text);\r\t\tv := c.view; st := v.ThisSetter();\r\t\tchange := select OR (c.selBeg = c.selEnd);\r\t\tIF c.selBeg # c.selEnd THEN beg := c.selBeg; end := c.selEnd\r\t\tELSE beg := c.carPos; end := beg; c.carLast := beg\r\t\tEND;\r\t\tlen := c.text.Length();\r\t\trightDir := (ch = aR) OR (ch = pR) OR (ch = dR) OR (ch = aD) OR (ch = pD) OR (ch = dD);\r\t\trightEdge := \tchange & (c.carLast < end)\r\t\t\t\t\t\t\tOR rightDir & (~change OR (beg = end) & (c.carLast = end));\r\t\tIF rightEdge THEN edge := end ELSE edge := beg END;\r\t\t"
                    attr: 0
                  - text: "ShowPos(c, edge, edge);"
                    attr: 3
                  - text: "\r\t\tb := beg; e := end; d := edge; d0 := edge;\r\t\tCASE ch OF\r\t\t| aL:\r\t\t\tIF units THEN\r\t\t\t\tp := d; e := d;\r\t\t\t\tWHILE (p > 0) & ((edge = d) OR (edge = e)) DO DEC(p); st.GetWord(p, edge, e) END;\r\t\t\tELSIF change THEN DEC(edge)\r\t\t\tEND\r\t\t| pL, dL:\r\t\t\tv.GetThisLocation(f, edge, loc); edge := loc.start\r\t\t| aR:\r\t\t\tIF units THEN\r\t\t\t\tp := d; e := edge;\r\t\t\t\tWHILE (p < len) & ((edge <= d) OR (edge = e)) DO INC(p); st.GetWord(p, edge, e) END\r\t\t\tELSIF change THEN INC(edge)\r\t\t\tEND\r\t\t| pR, dR:\r\t\t\tv.GetThisLocation(f, edge, loc); p := st.NextLine(loc.start);\r\t\t\tIF p = loc.start THEN p := len ELSE DEC(p) END;\r\t\t\tIF p > edge THEN edge := p END\r\t\t| aU:\r\t\t\tIF units THEN\r\t\t\t\tp := st.ThisSequence(edge);\r\t\t\t\tIF p < edge THEN edge := p ELSE edge := st.PreviousSequence(edge) END\r\t\t\tELSE\r\t\t\t\tv.PollOrigin(org, dy); v.GetThisLocation(f, edge, loc);\r\t\t\t\tIF c.lastX >= 0 THEN x := c.lastX ELSE x := loc.x END;\r\t\t\t\tc.carX := x;\r\t\t\t\tIF loc.start > 0 THEN\r\t\t\t\t\tedge := v.ThisPos(f, x, loc.y - 1);\r\t\t\t\t\tIF (edge >= loc.start) & (org > 0) THEN\r\t\t\t\t\t\tv.SetOrigin(org - 1, 0);\r\t\t\t\t\t\tv.GetThisLocation(f, edge, loc);\r\t\t\t\t\t\tedge := v.ThisPos(f, x, loc.y - 1)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\t| pU:\r\t\t\tv.PollOrigin(org, dy);\r\t\t\tIF edge > org THEN edge := org\r\t\t\tELSIF org > 0 THEN\r\t\t\t\t"
                    attr: 0
