                  - text: "\r\t\t\t\tNEW(sp); sp.len := len; sp.attr := attr;\r\t\t\t\tsp.file := rd.rider.Base(); sp.org := org; un := sp;\r\t\t\t\tINC(org, len)\r\t\t\tELSIF len < 0 THEN\t"
                    attr: 0
                  - text: "(* longchar piece *)"
