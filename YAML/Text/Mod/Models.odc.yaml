                  - text: "\r\t\t\t\tlen := -len; ASSERT(~ODD(len), 100);\r\t\t\t\tNEW(lp); lp.len := len DIV 2; lp.attr := attr;\r\t\t\t\tlp.file := rd.rider.Base(); lp.org := org; un := lp;\r\t\t\t\tINC(org, len)\r\t\t\tELSE\t"
                    attr: 0
                  - text: "(* len = 0  =>  embedded view *)"
                    attr: 1
                  - text: "\r\t\t\t\tNEW(v); v.len := 1; v.attr := attr;\r\t\t\t\trd.ReadInt(v.w); rd.ReadInt(v.h); Views.ReadView(rd, v.view);\r\t\t\t\tv.view.InitContext(NewContext(v, t));\r\t\t\t\tun := v; INC(org)\r\t\t\tEND;\r\t\t\tINC(t.len, un.len); u.next := un; un.prev := u; u := un;\r\t\t\trd.ReadByte(ano)\r\t\tEND;\r\t\trd.SetPos(org);\r\t\tu.next := t.trailer; t.trailer.prev := u\r\tEND Internalize;\r\r(*\r\tPROCEDURE (t: StdModel) PropagateDomain;\r\t\tVAR u: Run; dom: Stores.Domain;\r\tBEGIN\r\t\tIF t.Domain() # NIL THEN\r\t\t\tu := t.trailer.next;\r\t\t\tWHILE u # t.trailer DO\r\t\t\t\tdom := u.attr.Domain();\r\t\t\t\tIF (dom # NIL) & (dom # t.Domain()) THEN u.attr := Stores.CopyOf(u.attr)(Attributes) END;\r\t\t\t\tStores.InitDomain(u.attr, t.Domain());\r\t\t\t\tWITH u: ViewRef DO Stores.InitDomain(u.view, t.Domain()) ELSE END;\r\t\t\t\tu := u.next\r\t\t\tEND\r\t\tEND\r\tEND PropagateDomain;\r*)\r\r\tPROCEDURE (t: StdModel) GetEmbeddingLimits (OUT minW, maxW, minH, maxH: INTEGER);"
                    attr: 0
