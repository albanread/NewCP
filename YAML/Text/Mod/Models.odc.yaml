                  - text: "\r\t\t\t\tt.InsertCopy(pos, t0, beg, end); t0.Delete(beg, end)\r\t\t\tEND\r\t\tEND\r\tEND Insert;\r\r\tPROCEDURE (t: StdModel) Append (t0: Model);\r\t\tVAR len0: INTEGER;\r\tBEGIN\r\t\tStdInit(t);\r\t\tASSERT(t # t0, 20);\r\t\tlen0 := t0.Length();\r\t\tIF len0 > 0 THEN\r\t\t\tIF (t.Domain() # NIL) & (t0 IS StdModel) & (t0.Domain() = t.Domain()) THEN\r\t\t\t\tDoMove(\"#Text:Appending\", t0(StdModel), 0, len0, t, t.len)\r\t\t\tELSE\t"
