                  - text: "\t\t\tsp: Properties.StorePref;\r"
                    attr: 0
                  - text: "*)\r"
                    attr: 3
                  - text: "\t\t\tbuf: ARRAY 1024 OF BYTE;\r\tBEGIN\r\t\tr := NIL;\r\t\tu := t.trailer.next;\r\t\tWHILE u # t.trailer DO\r\t\t\tWITH u: Piece DO\r\t\t\t\tr := u.file.NewReader(r); r.SetPos(u.org);\r\t\t\t\tlen := u.len;\r\t\t\t\tWHILE len > LEN(buf) DO\r\t\t\t\t\tr.ReadBytes(buf, 0, LEN(buf)); wr.rider.WriteBytes(buf, 0, LEN(buf));\r\t\t\t\t\tDEC(len, LEN(buf))\r\t\t\t\tEND;\r\t\t\t\tr.ReadBytes(buf, 0, len); wr.rider.WriteBytes(buf, 0, len)\r\t\t\t| u: LPiece DO\t"
                    attr: 0
                  - text: "(* ~(u IS Piece) *)"
