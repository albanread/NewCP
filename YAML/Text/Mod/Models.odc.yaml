                  - text: "\r\t\t\t\tt.InsertCopy(t.len, t0, 0, len0); t0.Delete(0, len0)\r\t\t\tEND\r\t\tEND\r\tEND Append;\r\r\tPROCEDURE (t: StdModel) Delete (beg, end: INTEGER);\r\t\tVAR op: EditOp;\r\tBEGIN\r\t\tStdInit(t);\r\t\tASSERT(0 <= beg, 20); ASSERT(beg <= end, 21); ASSERT(end <= t.len, 22);\r\t\tIF beg < end THEN\r\t\t\tNEW(op); op.mode := deleteRange; op.canBunch := FALSE;\r\t\t\top.text := t; op.beg := beg; op.end := end;\r\t\t\tModels.Do(t, \"#System:Deleting\", op)\r\t\tEND\r\tEND Delete;\r\r\tPROCEDURE (t: StdModel) SetAttr (beg, end: INTEGER; attr: Attributes);\r\t\tVAR op: SetAttrOp; zp, z: AttrList;\r\t\t\tu, v, w: Run; ud, vd: INTEGER; modified: BOOLEAN;\r\tBEGIN\r\t\tStdInit(t);\r\t\tASSERT(0 <= beg, 20); ASSERT(beg <= end, 21); ASSERT(end <= t.len, 22);\r\t\tIF beg < end THEN\r\t\t\tNEW(op); op.text := t; op.beg := beg;\r\t\t\tFind(t, beg, u, ud); Find(t, end, v, vd);\r\t\t\tIF vd > 0 THEN w := v.next ELSE w := v END;\r\t\t\tzp := NIL; modified := FALSE;\r\t\t\tWHILE u # w DO\r\t\t\t\tIF u = v THEN INC(ud, "
