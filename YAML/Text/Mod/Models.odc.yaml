                    attr: 4
                  - text: "(100)\r\t\tEND\r\tEND Split;\r\r\tPROCEDURE Merge (t: StdModel; u: Run; VAR v: Run);\r\t\tVAR p, q: LPiece;\r\tBEGIN\r\t\tWITH u: Piece DO\r\t\t\tIF (v IS Piece) & ((u.attr = v.attr) OR u.attr.Equals(v.attr)) THEN\r\t\t\t\tp := u; q := v(Piece);\r\t\t\t\tIF (p.file = q.file) & (p.org + p.len = q.org) THEN\r\t\t\t\t\tIF t.pc.prev = p THEN INC(t.pc.org, q.len)\r\t\t\t\t\tELSIF t.pc.prev = q THEN t.pc.prev := t.trailer; t.pc.org := 0\r\t\t\t\t\tEND;\r\t\t\t\t\tINC(p.len, q.len); v := v.next\r\t\t\t\tEND\r\t\t\tEND\r\t\t| u: LPiece DO\t"
                    attr: 0
                  - text: "(* ~(u IS Piece) *)"
                    attr: 1
                  - text: "\r\t\t\tIF (v IS LPiece) & ~(v IS Piece) & ((u.attr = v.attr) OR u.attr.Equals(v.attr)) THEN\r\t\t\t\tp := u(LPiece); q := v(LPiece);\r\t\t\t\tIF (p.file = q.file) & (p.org + 2 * p.len = q.org) THEN\r\t\t\t\t\tIF t.pc.prev = p THEN INC(t.pc.org, q.len)\r\t\t\t\t\tELSIF t.pc.prev = q THEN t.pc.prev := t.trailer; t.pc.org := 0\r\t\t\t\t\tEND;\r\t\t\t\t\tINC(p.len, q.len); v := v.next\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE\t"
                    attr: 0
                  - text: "(* ignore: can't merge ViewRef runs *)"
                    attr: 1
                  - text: "\r\t\tEND\r\tEND Merge;\r\r\tPROCEDURE Splice (un, v, w: Run);\t"
                    attr: 0
                  - text: "(* (u, un) -> (u, v ... w, un) *)"
                    attr: 1
                  - text: "\r\t\tVAR u: Run;\r\tBEGIN\r\t\tIF v # w.next THEN\t"
                    attr: 0
                  - text: "(* non-empty stretch v ... w *)"
                    attr: 1
                  - text: "\r\t\t\tu := un.prev;\r\t\t\tu.next := v; v.prev := u; un.prev := w; w.next := un\r\t\tEND\r\tEND Splice;\r\r\tPROCEDURE NewContext (r: ViewRef; text: StdModel): StdContext;\r\t\tVAR c: StdContext;\r\tBEGIN\r\t\tNEW(c); c.text := text; c.ref := r; "
                    attr: 0
                  - text: "\r\t\t"
