                  - text: "\r\t\tEND;\r\t\twr.WriteInt(pos - org);\r\t\twr.SetPos(pos);\r\t\tWriteCharacters(t, wr);\r\t\tinf.op := store; Models.Broadcast(t, inf)\r\tEND Externalize;\r\r\tPROCEDURE (t: StdModel) Internalize (VAR rd: Stores.Reader);\r\t\tVAR u, un: Run; sp: Piece; lp: LPiece; v: ViewRef;\r\t\t\torg, len: INTEGER; ano: BYTE; thisVersion: INTEGER;\r\t\t\tattr: Attributes; dict: AttrDict;\r\tBEGIN\r\t\tASSERT(t.Domain() = NIL, 20); ASSERT(t.len = 0, 21);\r\t\tt.Internalize^(rd); IF rd.cancelled THEN "
