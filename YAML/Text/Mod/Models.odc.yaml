                  - text: " wr.pos\r\tEND Pos;\r\r\tPROCEDURE WriteSChar (wr: StdWriter; ch: SHORTCHAR);\r\t\tVAR t: StdModel; u, un: Run; p: Piece; pos, spillPos: INTEGER;\r\t\t\top: EditOp; bunch: BOOLEAN;\r\tBEGIN\r\t\tt := wr.base; pos := wr.pos;\r\t\tIF t.spill.file = NIL THEN OpenSpill(t.spill) END;\r\t\tt.spill.writer.WriteByte(SHORT(ORD(ch))); spillPos := t.spill.len; t.spill.len := spillPos + 1;\r\t\tIF (t.Domain() = NIL) OR (t.Domain().GetSequencer() = NIL) THEN\r\t\t"
                    attr: 0
