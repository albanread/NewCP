                  - text: "\r\t\t\t\tr := u.file.NewReader(r); r.SetPos(u.org);\r\t\t\t\tlen := 2 * u.len;\r\t\t\t\tWHILE len > LEN(buf) DO\r\t\t\t\t\tr.ReadBytes(buf, 0, LEN(buf)); wr.rider.WriteBytes(buf, 0, LEN(buf));\r\t\t\t\t\tDEC(len, LEN(buf))\r\t\t\t\tEND;\r\t\t\t\tr.ReadBytes(buf, 0, len); wr.rider.WriteBytes(buf, 0, len)\r\t\t\t| u: ViewRef DO\r"
