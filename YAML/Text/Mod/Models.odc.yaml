                  - text: " wr\r\tEND NewWriter;\r\r\tPROCEDURE (t: StdModel) InsertCopy (pos: INTEGER; t0: Model; beg0, end0: INTEGER);\r\t\tVAR buf: StdModel;\r\tBEGIN\r\t\tStdInit(t);\r\t\tASSERT(0 <= pos, 21); ASSERT(pos <= t.len, 22);\r\t\tASSERT(0 <= beg0, 23); ASSERT(beg0 <= end0, 24); ASSERT(end0 <= t0.Length(), 25);\r\t\tIF beg0 < end0 THEN\r\t\t\tWITH t0: StdModel DO buf := CopyOf(t0, beg0, end0, t)\r\t\t\tELSE buf := ProjectionOf(t0, beg0, end0, t)\r\t\t\tEND;\r\t\t\t(* IF t.Domain() # NIL THEN Stores.InitDomain(buf,t.Domain()) END; *)\r\t\t\tStores.Join(t, buf);\r\t\t\tDoMove(\"#System:Copying\", buf, 0, buf.len, t, pos)\r\t\tEND\r\tEND InsertCopy;\r\r\tPROCEDURE (t: StdModel) Insert (pos: INTEGER; t0: Model; beg, end: INTEGER);\r\tBEGIN\r\t\tStdInit(t);\r\t\tASSERT(0 <= pos, 21); ASSERT(pos <= t.len, 22);\r\t\tASSERT(0 <= beg, 23); ASSERT(beg <= end, 24); ASSERT(end <= t0.Length(), 25);\r\t\tIF beg < end THEN\r\t\t\tIF (t.Domain() # NIL) & (t0 IS StdModel) & (t0.Domain() = t.Domain()) THEN\r\t\t\t\tDoMove(\"#System:Moving\", t0(StdModel), beg, end, t, pos)\r\t\t\tELSE\t"
                    attr: 0
