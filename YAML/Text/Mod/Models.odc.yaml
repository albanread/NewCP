                    attr: 3
                  - text: "\r\t\t\tEND;\r\t\t\tu := u.next\r\t\tEND\r\tEND WriteCharacters;\r\r\tPROCEDURE WriteAttributes (VAR wr: Stores.Writer; t: StdModel;\r\t\ta: Attributes; VAR dict: AttrDict\r\t);\r\t\tVAR k, len: BYTE;\r\tBEGIN\r\t\tlen := dict.len; k := 0; WHILE (k # len) & ~a.Equals(dict.attr[k]) DO INC(k) END;\r\t\twr.WriteByte(k);\r\t\tIF k = len THEN\r\t\t\tIF len < dictSize THEN dict.attr[len] := a; INC(dict.len) END;\r\t\t\t"
                    attr: 0
