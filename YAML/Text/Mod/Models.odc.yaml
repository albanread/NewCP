                  - text: "\r\t\tVAR v: Run; m: INTEGER;\r\tBEGIN\r\t\tIF pos < 0 THEN pos := 0 END;\r\t\tIF pos >= t.len THEN\r\t\t\tu := t.trailer; off := 0; t.pc.prev := t.trailer; t.pc.org := 0\r\t\tELSE\r\t\t\tv := t.pc.prev.next; m := pos - t.pc.org;\r\t\t\tIF m >= 0 THEN\r\t\t\t\tWHILE m >= v.len DO DEC(m, v.len); v := v.next END\r\t\t\tELSE\r\t\t\t\tWHILE m < 0 DO v := v.prev; INC(m, v.len) END\r\t\t\tEND;\r\t\t\tu := v; off := m; t.pc.prev := v.prev; t.pc.org := pos - m\r\t\tEND\r\tEND Find;\r\r\tPROCEDURE Split (off: INTEGER; VAR u, un: Run);\r\t"
