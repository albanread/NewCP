                  - text: "\tBEGIN\r\t\tminW := minWidth; maxW := maxWidth; minH := minHeight; maxH := maxHeight\r\tEND GetEmbeddingLimits;\r\r\r\tPROCEDURE (t: StdModel) Length (): INTEGER;\r\tBEGIN\r\t\tStdInit(t);\r\t\t"
