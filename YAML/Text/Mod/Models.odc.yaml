                  - text: " p\r\tEND Prop;\r\r\tPROCEDURE (t: StdModel) Modify (beg, end: INTEGER; old, p: Properties.Property);\r\t\tVAR op: SetAttrOp; zp, z: AttrList;\r\t\t\tu, v, w: Run; ud, vd: INTEGER; equal, modified: BOOLEAN;\r\t\t\tq: Properties.Property;\r\tBEGIN\r\t\tStdInit(t);\r\t\tASSERT(0 <= beg, 20); ASSERT(beg <= end, 21); ASSERT(end <= t.len, 22);\r\t\tIF (beg < end) & (p # NIL) THEN\r\t\t\tNEW(op); op.text := t; op.beg := beg;\r\t\t\tFind(t, beg, u, ud); Find(t, end, v, vd);\r\t\t\tIF vd > 0 THEN w := v.next ELSE w := v END;\r\t\t\tzp := NIL; modified := FALSE;\r\t\t\tWHILE u # w DO\r\t\t\t\tIF u = v THEN INC(ud, v.len - vd) END;\r\t\t\t\tIF old # NIL THEN\r\t\t\t\t\tq := u.attr.Prop();\r\t\t\t\t\tProperties.Intersect(q, old, equal);\t"
