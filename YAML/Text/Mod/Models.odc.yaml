                  - text: "\r\t\t\t\tNEW(lp);\r\t\t\t\tlp.prev := u.prev; lp.next := u.next; lp.len := u.len; lp.attr := u.attr;\r\t\t\t\tlp.file := u(LPiece).file; lp.org := u(LPiece).org;\r\t\t\t\tINC(lp.org, 2 * off);\r\t\t\t\tun := lp\r\t\t\tEND;\r\t\t\tDEC(un.len, off); DEC(u.len, un.len);\r\t\t\tun.prev := u; un.next := u.next; un.next.prev := un; u.next := un\r\t\tELSIF off = u.len THEN un := u.next\t"
