                    attr: 1
                  - text: "\r\t\t\tStdInit(t)\r\t\tEND\r\tEND InitFrom;\r\r\tPROCEDURE WriteCharacters (t: StdModel; VAR wr: Stores.Writer);\r\t\tVAR r: Files.Reader; u: Run; len: INTEGER;\r"
                    attr: 0
