                  - text: "vd) END;\r\t\t\t\tNEW(z); z.len := u.len - ud; z.attr := attr;\r\t\t\t\tIF zp = NIL THEN op.list := z ELSE zp.next:= z END;\r\t\t\t\tzp := z;\r\t\t\t\tmodified := modified OR ~u.attr.Equals(attr);\r\t\t\t\tu := u.next; ud := 0\r\t\t\tEND;\r\t\t\tIF modified THEN Models.Do(t, \"#Text:AttributeChange\", op) END\r\t\tEND\r\tEND SetAttr;\r\r\tPROCEDURE (t: StdModel) Prop (beg, end: INTEGER): Properties.Property;\r\t\tVAR p, q: Properties.Property; tp: Prop;\r\t\t\tu, v, w: Run; ud, vd: INTEGER; equal: BOOLEAN;\r\t\t\trd: Reader;\r\tBEGIN\r\t\tStdInit(t);\r\t\tASSERT(0 <= beg, 20); ASSERT(beg <= end, 21); ASSERT(end <= t.len, 22);\r\t\tIF beg < end THEN\r\t\t\tFind(t, beg, u, ud); Find(t, end, v, vd);\r\t\t\tIF vd > 0 THEN w := v.next ELSE w := v END;\r\t\t\tp := u.attr.Prop();\r\t\t\tu := u.next;\r\t\t\tWHILE u # w DO\r\t\t\t\tProperties.Intersect(p, u.attr.Prop(), equal);\r\t\t\t\tu := u.next\r\t\t\tEND;\r\t\t\tIF beg + 1 = end THEN\r\t\t\t\tt.rd := t.NewReader(t.rd); rd := t.rd;\r\t\t\t\trd.SetPos(beg); rd.Read;\r\t\t\t\tIF (rd.view = NIL) OR (rd.char # viewcode) THEN\r\t\t\t\t\tq := p; WHILE (q # NIL) & ~(q IS Prop) DO q := q.next END;\r\t\t\t\t\tIF q # NIL THEN\r\t\t\t\t\t\ttp := q(Prop)\r\t\t\t\t\tELSE NEW(tp); Properties.Insert(p, tp)\r\t\t\t\t\tEND;\r\t\t\t\t\tINCL(tp.valid, code); INCL(tp.known, code); INCL(tp.readOnly, code);\r\t\t\t\t\ttp.code := rd.char\r\t\t\t\tEND\r\t\t\tEND\r\t\tELSE p := NIL\r\t\tEND;\r\t\t"
