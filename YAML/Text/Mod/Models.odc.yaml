                    attr: 3
                  - text: "\t\t\tWriteAttr(wr, a)\r\t\tEND\r\tEND WriteAttributes;\r\r\tPROCEDURE (t: StdModel) Externalize (VAR wr: Stores.Writer);\r\t\tVAR (*dom: Stores.Domain;*) u, v, un: Run;\r\t\t\tattr: Attributes; dict: AttrDict;\r\t\t\torg, runlen, pos: INTEGER; lchars: BOOLEAN;\r\t\t\tinf: InfoMsg;\r\tBEGIN\r\t\tt.Externalize^(wr);\r\t\tStdInit(t); (*dom := t.Domain();*)\r\t\twr.WriteVersion(0);\r\t\twr.WriteInt(0); org := wr.Pos();\r\t\tu := t.trailer.next; v := t.trailer; dict.len := 0; lchars := FALSE;\r\t\tWHILE u # v DO\r\t\t\tattr := u.attr;\r\t\t\tWITH u: Piece DO\r\t\t\t\trunlen := u.len; un := u.next;\r\t\t\t\tWHILE (un IS Piece) & un.attr.Equals(attr) DO\r\t\t\t\t\tINC(runlen, un.len); un := un.next\r\t\t\t\tEND;\r\t\t\t\tWriteAttributes(wr, t, attr, dict); wr.WriteInt(runlen)\r\t\t\t| u: LPiece DO\t"
                    attr: 0
                  - text: "(* ~(u IS Piece) *)"
                    attr: 1
                  - text: "\r\t\t\t\trunlen := 2 * u.len; un := u.next;\r\t\t\t\tWHILE (un IS LPiece) & ~(un IS Piece) & un.attr.Equals(attr) DO\r\t\t\t\t\tINC(runlen, 2 * un.len); un := un.next\r\t\t\t\tEND;\r\t\t\t\tWriteAttributes(wr, t, attr, dict); wr.WriteInt(-runlen);\r\t\t\t\tlchars := TRUE\r\t\t\t| u: ViewRef DO\r\t\t\t\tIF Stores.ExternalizeProxy(u.view) # NIL THEN\r\t\t\t\t\tWriteAttributes(wr, t, attr, dict); wr.WriteInt(0);\r\t\t\t\t\twr.WriteInt(u.w); wr.WriteInt(u.h); Views.WriteView(wr, u.view)\r\t\t\t\tEND;\r\t\t\t\tun := u.next\r\t\t\tEND;\r\t\t\tu := un\r\t\tEND;\r\t\twr.WriteByte(-1);\r\t\tpos := wr.Pos();\r\t\twr.SetPos(org - 5);\r\t\tIF lchars THEN wr.WriteVersion(maxStdModelVersion)\r\t\tELSE wr.WriteVersion(noLCharStdModelVersion)\t"
                    attr: 0
