                    attr: 3
                  - text: " c\r\tEND NewContext;\r\r\tPROCEDURE CopyOfPiece (p: LPiece): LPiece;\r\t\tVAR lp: LPiece; sp: Piece;\r\tBEGIN\r\t\tWITH p: Piece DO NEW(sp); sp^ := p^; "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " sp\r\t\tELSE\r\t\t\tNEW(lp);\r\t\t\tlp.prev := p.prev; lp.next := p.next; lp.len := p.len; lp.attr := p.attr;\r\t\t\tlp.file := p(LPiece).file; lp.org := p(LPiece).org; \r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " lp\r\t\tEND\r\tEND CopyOfPiece;\r\r\tPROCEDURE CopyOfViewRef (r: ViewRef; text: StdModel): ViewRef;\r\t\tVAR v: ViewRef;\r\tBEGIN\r\t\tNEW(v); v^ := r^;\r\t\tv.view := Views.CopyOf(r.view, Views.deep);\r\t\tv.view.InitContext(NewContext(v, text));\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " v\r\tEND CopyOfViewRef;\r\r\tPROCEDURE InvalCache (t: StdModel; pos: INTEGER);\r\t\tVAR n: INTEGER;\r\tBEGIN\r\t\tn := t.id MOD cacheWidth;\r\t\tIF cache[n].id = t.id THEN\r\t\t\tIF pos <= cache[n].beg THEN cache[n].beg := 0; cache[n].end := 0\r\t\t\tELSIF pos < cache[n].end THEN cache[n].end := pos\r\t\t\tEND\r\t\tEND\r\tEND InvalCache;\r\r\tPROCEDURE StdInit (t: StdModel);\r\t\tVAR u: Run;\r\tBEGIN\r\t\tIF t.trailer = NIL THEN\r\t\t\tNEW(u); u.len := MAX(INTEGER); u.attr := NIL; u.next := u; u.prev := u;\r\t\t\tt.len := 0; t.id := nextId; INC(nextId); t.era := 0; t.trailer := u;\r\t\t\tt.pc.prev := u; t.pc.org := 0;\r\t\t\tIF t.spill = NIL THEN NEW(t.spill) END\r\t\tEND\r\tEND StdInit;\r\r\tPROCEDURE CopyOf (src: StdModel; beg, end: INTEGER; dst: StdModel): StdModel;\r\t\tVAR buf: StdModel; u, v, r, z, zn: Run; ud, vd: INTEGER;\r\tBEGIN\r\t\tASSERT(beg < end, 20);\r\t\tbuf := Containers.CloneOf(dst)(StdModel); \r\t\tASSERT(buf.Domain() = NIL, 100);\r\t\tFind(src, beg, u, ud); Find(src, end, v, vd);\r\t\tz := buf.trailer; r := u;\r\t\tWHILE r # v DO\r\t\t\tWITH r: LPiece DO\t"
                    attr: 0
                  - text: "(* Piece or LPiece *)"
                    attr: 1
                  - text: "\r\t\t\t\tzn := CopyOfPiece(r); DEC(zn.len, ud);\r\t\t\t\tIF zn IS Piece THEN INC(zn(LPiece).org, ud) ELSE INC(zn(LPiece).org, 2 * ud) END\r\t\t\t| r: ViewRef DO\r\t\t\t\tzn := CopyOfViewRef(r, buf)\r\t\t\tELSE "
                    attr: 0
                  - text: "(* ignore *)"
                    attr: 1
                  - text: "\r\t\t\tEND;\r\t\t\tz.next := zn; zn.prev := z; z := zn; r := r.next; ud := 0\r\t\tEND;\r\t\tIF vd > 0 THEN\t"
                    attr: 0
                  - text: "(* v IS LPiece *)"
                    attr: 1
                  - text: "\r\t\t\tzn := CopyOfPiece(v(LPiece)); zn.len := vd - ud;\r\t\t\tIF zn IS Piece THEN INC(zn(LPiece).org, ud) ELSE INC(zn(LPiece).org, 2 * ud) END;\r\t\t\tz.next := zn; zn.prev := z; z := zn\r\t\tEND;\r\t\tz.next := buf.trailer; buf.trailer.prev := z;\r\t\tbuf.len := end - beg;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " buf\r\tEND CopyOf;\r\r\tPROCEDURE ProjectionOf (src: Model; beg, end: INTEGER; dst: StdModel): StdModel;\r\t"
                    attr: 0
                  - text: "(* rider-conversion to eliminate covariance conflicts in binary operations *)"
                    attr: 1
                  - text: "\r\t\tVAR buf: StdModel; rd: Reader; wr: Writer;\r\tBEGIN\r\t\trd := src.NewReader(NIL); rd.SetPos(beg);\r\t\tbuf := Containers.CloneOf(dst)(StdModel); ASSERT(buf.Domain() = NIL, 100);\r\t\twr := buf.NewWriter(NIL);\r\t\tWHILE beg < end DO\r\t\t\tINC(beg);\r\t\t\trd.Read; wr.SetAttr(rd.attr);\r\t\t\tIF rd.view # NIL THEN\r\t\t\t\twr.WriteView(Views.CopyOf(rd.view, Views.deep), rd.w, rd.h)\r\t\t\tELSE\r\t\t\t\twr.WriteChar(rd.char)\r\t\t\tEND\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " buf\r\tEND ProjectionOf;\r\r\tPROCEDURE Move (src: StdModel; beg, end: INTEGER; dest: StdModel; pos: INTEGER);\r\t\tVAR pc: PieceCache; view: Views.View;\r\t\t\tu, un, v, vn, w, wn: Run; ud, vd, wd: INTEGER;\r\t\t\t(*initDom: BOOLEAN; newDom, dom: Stores.Domain;*)\r\t\t\tupd: UpdateMsg; neut: Models.NeutralizeMsg;\r\tBEGIN\r\t\tModels.Broadcast(src, neut);\r\t\tFind(src, beg, u, ud); Split(ud, u, un); pc := src.pc;\r\t\tFind(src, end, v, vd); Split(vd, v, vn); src.pc := pc;\r\t\tMerge(src, u, vn); u.next := vn; vn.prev := u;\r\t\tDEC(src.len, end - beg);\r\t\tInvalCache(src, beg);\r\t\tINC(src.era);\r\t\tupd.op := delete; upd.beg := beg; upd.end := beg + 1; upd.delta := beg - end;\r\t\tModels.Broadcast(src, upd);\r\t\tIF src = dest THEN\r\t\t\tIF pos > end THEN DEC(pos, end - beg) END\r\t\tELSE\r\t\t\t(*newDom := dest.Domain(); initDom := (src.Domain() = NIL) & (newDom # NIL);*)\r\t\t\tw := un;\r\t\t\tWHILE w # vn DO\r\t\t\t\t(*\r\t\t\t\tIF initDom THEN\r\t\t\t\t\tdom := w.attr.Domain();\r\t\t\t\t\tIF (dom # NIL) & (dom # newDom) THEN w.attr := Stores.CopyOf(w.attr)(Attributes) END;\r\t\t\t\t\tStores.InitDomain(w.attr, newDom)\r\t\t\t\tEND;\r\t\t\t\t*)\r\t\t\t\tIF ~Stores.Joined(dest, w.attr) THEN\r\t\t\t\t\tIF ~Stores.Unattached(w.attr) THEN w.attr := Stores.CopyOf(w.attr)(Attributes) END;\r\t\t\t\t\tStores.Join(dest, w.attr)\r\t\t\t\tEND;\r\t\t\t\tWITH w: ViewRef DO\r\t\t\t\t\tview := w.view;\r\t\t\t\t\t(*IF initDom THEN Stores.InitDomain(view, newDom) END;*)\r\t\t\t\t\tStores.Join(dest, view);\r\t\t\t\t\tview.context(StdContext).text := dest\r\t\t\t\tELSE\r\t\t\t\tEND;\r\t\t\t\tw := w.next\r\t\t\tEND\r\t\tEND;\r\t\tFind(dest, pos, w, wd); Split(wd, w, wn); Splice(wn, un, v);\r\t\tv := wn.prev; Merge(dest, v, wn); v.next := wn; wn.prev := v;\r\t\twn := w.next; Merge(dest, w, wn); w.next := wn; wn.prev := w;\r\t\tINC(dest.len, end - beg);\r\t\tInvalCache(dest, pos);\r\t\tINC(dest.era);\r\t\tupd.op := insert; upd.beg := pos; upd.end := pos + end - beg; upd.delta := end - beg;\r\t\tModels.Broadcast(dest, upd)\r\tEND Move;\r\r\r\t"
                    attr: 0
                  - text: "(* StdModel - operations *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (op: MoveOp) Do;\r\t\tVAR src, dest: StdModel; beg, end, pos: INTEGER; neut: Models.NeutralizeMsg;\r\tBEGIN\r\t\tsrc := op.src; beg := op.beg; end := op.end; dest := op.dest; pos := op.pos;\r\t\tIF src = dest THEN\r\t\t\tIF pos < beg THEN\r\t\t\t\top.pos := end; op.beg := pos; op.end := pos + end - beg\r\t\t\tELSE\r\t\t\t\top.pos := beg; op.beg := pos - (end - beg); op.end := pos\r\t\t\tEND\r\t\tELSE\r\t\t\tModels.Broadcast(op.src, neut);\t"
                    attr: 0
                  - text: "(* destination is neutralized by sequencer *)"
                    attr: 1
                  - text: "\r\t\t\top.dest := src; op.src := dest;\r\t\t\top.pos := beg; op.beg := pos; op.end := pos + end - beg\r\t\tEND;\r\t\tMove(src, beg, end, dest, pos)\r\tEND Do;\r\r\tPROCEDURE DoMove (name: Stores.OpName;\r\t\tsrc: StdModel; beg, end: INTEGER;\r\t\tdest: StdModel; pos: INTEGER\r\t);\r\t\tVAR op: MoveOp;\r\tBEGIN\r\t\tIF (beg < end) & ((src # dest) OR ~((beg <= pos) & (pos <= end))) THEN\r\t\t\tNEW(op);\r\t\t\top.src := src; op.beg := beg; op.end := end;\r\t\t\top.dest := dest; op.pos := pos;\r\t\t\tModels.Do(dest, name, op)\r\t\tEND\r\tEND DoMove;\r\r\r\tPROCEDURE (op: EditOp) Do;\r\t\tVAR text: StdModel; (*newDom, dom: Stores.Domain;*) pc: PieceCache;\r\t\t\tu, un, v, vn: Run; sp: Piece; lp: LPiece; r: ViewRef;\r\t\t\tud, vd, beg, end, pos, len: INTEGER; w, h: INTEGER;\r\t\t\tupd: UpdateMsg;\r\tBEGIN\r\t\ttext := op.text;\r\t\tCASE op.mode OF\r\t\t  deleteRange:\r\t\t\tbeg := op.beg; end := op.end; len := end - beg;\r\t\t\tFind(text, beg, u, ud); Split(ud, u, un); pc := text.pc;\r\t\t\tFind(text, end, v, vd); Split(vd, v, vn); text.pc := pc;\r\t\t\tMerge(text, u, vn); u.next := vn; vn.prev := u;\r\t\t\tDEC(text.len, len);\r\t\t\tInvalCache(text, beg);\r\t\t\tINC(text.era);\r\t\t\top.mode := moveBuf; op.canBunch := FALSE;\r\t\t\top.pos := beg; op.first := un; op.last := v; op.len := len;\r\t\t\tupd.op := delete; upd.beg := beg; upd.end := beg + 1; upd.delta := -len;\r\t\t\tModels.Broadcast(text, upd)\r\t\t| moveBuf:\r\t\t\tpos := op.pos;\r\t\t\tFind(text, pos, u, ud); Split(ud, u, un); Splice(un, op.first, op.last);\r\t\t\tINC(text.len, op.len);\r\t\t\tInvalCache(text, pos);\r\t\t\tINC(text.era);\r\t\t\top.mode := deleteRange;\r\t\t\top.beg := pos; op.end := pos + op.len;\r\t\t\tupd.op := insert; upd.beg := pos; upd.end := pos + op.len; upd.delta := op.len;\r\t\t\tModels.Broadcast(text, upd)\r\t\t| writeSChar:\r\t\t\tpos := op.pos;\r\t\t\tInvalCache(text, pos);\r\t\t\tFind(text, pos, u, ud); Split(ud, u, un);\r\t\t\tIF (u.attr = op.attr) & (u IS Piece) & (u(Piece).file = text.spill.file)\r\t\t\t& (u(Piece).org + u.len = op.len) THEN\r\t\t\t\tINC(u.len);\r\t\t\t\tIF text.pc.org >= pos THEN INC(text.pc.org) END\r\t\t\tELSE\r\t\t\t\t(*\r\t\t\t\tnewDom := text.Domain();\r\t\t\t\tIF newDom # NIL THEN\r\t\t\t\t\tdom := op.attr.Domain();\r\t\t\t\t\tIF (dom # NIL) & (dom # newDom) THEN\r\t\t\t\t\t\top.attr := Stores.CopyOf(op.attr)(Attributes)\r\t\t\t\t\tEND;\r\t\t\t\t\tStores.InitDomain(op.attr, newDom)\r\t\t\t\tEND;\r\t\t\t\t*)\r\t\t\t\tIF ~Stores.Joined(text, op.attr) THEN\r\t\t\t\t\tIF ~Stores.Unattached(op.attr) THEN op.attr := Stores.CopyOf(op.attr)(Attributes) END;\r\t\t\t\t\tStores.Join(text, op.attr)\r\t\t\t\tEND;\r\t\t\t\tNEW(sp); u.next := sp; sp.prev := u; sp.next := un; un.prev := sp;\r\t\t\t\tsp.len := 1; sp.attr := op.attr;\r\t\t\t\tsp.file := text.spill.file; sp.org := op.len;\r\t\t\t\tIF text.pc.org > pos THEN INC(text.pc.org) END\r\t\t\tEND;\r\t\t\tINC(text.len); INC(text.era);\r\t\t\top.mode := deleteRange;\r\t\t\tupd.op := insert; upd.beg := pos; upd.end := pos + 1; upd.delta := 1;\r\t\t\tModels.Broadcast(text, upd)\r\t\t| writeChar:\r\t\t\tpos := op.pos;\r\t\t\tInvalCache(text, pos);\r\t\t\tFind(text, pos, u, ud); Split(ud, u, un);\r\t\t\tIF (u.attr = op.attr) & (u IS LPiece) & ~(u IS Piece) & (u(LPiece).file = text.spill.file)\r\t\t\t& (u(LPiece).org + 2 * u.len = op.len) THEN\r\t\t\t\tINC(u.len);\r\t\t\t\tIF text.pc.org >= pos THEN INC(text.pc.org) END\r\t\t\tELSE\r\t\t\t\t(*\r\t\t\t\tnewDom := text.Domain();\r\t\t\t\tIF newDom # NIL THEN\r\t\t\t\t\tdom := op.attr.Domain();\r\t\t\t\t\tIF (dom # NIL) & (dom # newDom) THEN\r\t\t\t\t\t\top.attr := Stores.CopyOf(op.attr)(Attributes)\r\t\t\t\t\tEND;\r\t\t\t\t\tStores.InitDomain(op.attr, newDom)\r\t\t\t\tEND;\r\t\t\t\t*)\r\t\t\t\tIF ~Stores.Joined(text, op.attr) THEN\r\t\t\t\t\tIF ~Stores.Unattached(op.attr) THEN op.attr := Stores.CopyOf(op.attr)(Attributes) END;\r\t\t\t\t\tStores.Join(text, op.attr)\r\t\t\t\tEND;\r\t\t\t\tNEW(lp); u.next := lp; lp.prev := u; lp.next := un; un.prev := lp;\r\t\t\t\tlp.len := 1; lp.attr := op.attr;\r\t\t\t\tlp.file := text.spill.file; lp.org := op.len;\r\t\t\t\tIF text.pc.org > pos THEN INC(text.pc.org) END\r\t\t\tEND;\r\t\t\tINC(text.len); INC(text.era);\r\t\t\top.mode := deleteRange;\r\t\t\tupd.op := insert; upd.beg := pos; upd.end := pos + 1; upd.delta := 1;\r\t\t\tModels.Broadcast(text, upd)\r\t\t| writeView:\r\t\t\tpos := op.pos; r := op.first(ViewRef);\r\t\t\tInvalCache(text, pos);\r\t\t\tFind(text, pos, u, ud); Split(ud, u, un);\r\t\t\tu.next := r; r.prev := u; r.next := un; un.prev := r;\r\t\t\tINC(text.len); INC(text.era);\r\t\t\tr.view.InitContext(NewContext(r, text));\r\t\t\t(* Stores.InitDomain(r.view, text.Domain()); *)\r\t\t\tStores.Join(text, r.view);\r\t\t\tw := r.w; h := r.h; r.w := defW; r.h := defH;\r\t\t\tProperties.PreferredSize(r.view, minWidth, maxWidth, minHeight, maxHeight, defW, defH,\r\t\t\t\tw, h\r\t\t\t);\r\t\t\tr.w := w; r.h := h;\r\t\t\top.mode := deleteRange;\r\t\t\tupd.op := insert; upd.beg := pos; upd.end := pos + 1; upd.delta := 1;\r\t\t\tModels.Broadcast(text, upd)\r\t\tEND\r\tEND Do;\r\r\tPROCEDURE GetWriteOp (t: StdModel; pos: INTEGER; VAR op: EditOp; VAR bunch: BOOLEAN);\r\t\tVAR last: Stores.Operation;\r\tBEGIN\r\t\tlast := Models.LastOp(t);\r\t\tIF (last # NIL) & (last IS EditOp) THEN\r\t\t\top := last(EditOp);\r\t\t\tbunch := op.canBunch & (op.end = pos)\r\t\tELSE bunch := FALSE\r\t\tEND;\r\t\tIF bunch THEN\r\t\t\tINC(op.end)\r\t\tELSE\r\t\t\tNEW(op); op.canBunch := TRUE;\r\t\t\top.text := t; op.beg := pos; op.end := pos + 1\r\t\tEND;\r\t\top.pos := pos\r\tEND GetWriteOp;\r\r\r\tPROCEDURE SetPreferredSize (t: StdModel; v: Views.View);\r\t\tVAR minW, maxW, minH, maxH, w, h: INTEGER;\r\tBEGIN\r\t\tt.GetEmbeddingLimits(minW, maxW, minH, maxH);\r\t\tv.context.GetSize(w, h);\r\t\tProperties.PreferredSize(v, minW, maxW, minH, maxH, w, h, w, h);\r\t\tv.context.SetSize(w, h)\r\tEND SetPreferredSize;\r\r\tPROCEDURE (op: SetAttrOp) Do;\r\t\tVAR t: StdModel; attr: Attributes; z: AttrList; (*checkDom: BOOLEAN;*)\r\t\t\tpc: PieceCache; u, un, v, vn: Run; ud, vd, pos, next: INTEGER;\r\t\t\tupd: UpdateMsg;\r\tBEGIN\r\t\tt := op.text; z := op.list; pos := op.beg; (*checkDom := t.Domain() # NIL;*)\r\t\tWHILE z # NIL DO\r\t\t\tnext := pos + z.len;\r\t\t\tIF z.attr # NIL THEN\r\t\t\t\tFind(t, pos, u, ud); Split(ud, u, un); pc := t.pc;\r\t\t\t\tFind(t, next, v, vd); Split(vd, v, vn); t.pc := pc;\r\t\t\t\tattr := un.attr;\r\t\t\t\tWHILE un # vn DO\r\t\t\t\t\tun.attr := z.attr;\r\t\t\t\t\t(*\r\t\t\t\t\tIF checkDom & (un.attr.Domain() # t.Domain()) THEN\r\t\t\t\t\t\tIF un.attr.Domain() # NIL THEN un.attr := Stores.CopyOf(un.attr)(Attributes) END;\r\t\t\t\t\t\tStores.InitDomain(un.attr, t.Domain())\r\t\t\t\t\tEND;\r\t\t\t\t\t*)\r\t\t\t\t\tIF ~Stores.Joined(t, un.attr) THEN\r\t\t\t\t\t\tIF ~Stores.Unattached(un.attr) THEN un.attr := Stores.CopyOf(un.attr)(Attributes) END;\r\t\t\t\t\t\tStores.Join(t, un.attr)\r\t\t\t\t\tEND;\r\t\t\t\t\tMerge(t, u, un);\r\t\t\t\t\tWITH un: ViewRef DO SetPreferredSize(t, un.view) ELSE END;\r\t\t\t\t\tIF u.next = un THEN u := un; un := un.next ELSE u.next := un; un.prev := u END\r\t\t\t\tEND;\r\t\t\t\tMerge(t, u, un); u.next := un; un.prev := u;\r\t\t\t\tz.attr := attr\r\t\t\tEND;\r\t\t\tpos := next; z := z.next\r\t\tEND;\r\t\tINC(t.era);\r\t\tupd.op := replace; upd.beg := op.beg; upd.end := pos; upd.delta := 0;\r\t\tModels.Broadcast(t, upd)\r\tEND Do;\r\r\r\tPROCEDURE (op: ResizeViewOp) Do;\r\t\tVAR r: ViewRef; w, h: INTEGER; upd: UpdateMsg;\r\tBEGIN\r\t\tr := op.ref;\r\t\tw := op.w; h := op.h;  op.w := r.w; op.h := r.h;  r.w := w; r.h := h;\r\t\tINC(op.text.era);\r\t\tupd.op := replace; upd.beg := op.pos; upd.end := op.pos + 1; upd.delta := 0;\r\t\tModels.Broadcast(op.text, upd)\r\tEND Do;\r\r\r\tPROCEDURE (op: ReplaceViewOp) Do;\r\t\tVAR new: Views.View; upd: UpdateMsg;\r\tBEGIN\r\t\tnew := op.new; op.new := op.ref.view; op.ref.view := new;\r\t\tINC(op.text.era);\r\t\tupd.op := replace; upd.beg := op.pos; upd.end := op.pos + 1; upd.delta := 0;\r\t\tModels.Broadcast(op.text, upd)\r\tEND Do;\r\r\r\t"
