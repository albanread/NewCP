                  - text: " END;\r\t\trd.ReadVersion(minVersion, maxStdModelVersion, thisVersion);\r\t\tIF rd.cancelled THEN "
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " END;\r\t\tStdInit(t);\r\t\tdict.len := 0; u := t.trailer;\r\t\trd.ReadInt(len); org := rd.Pos() + len;\r\t\trd.ReadByte(ano);\r\t\tWHILE ano # -1 DO\r\t\t\tIF ano = dict.len THEN\r\t\t\t\tReadAttr(rd, attr); Stores.Join(t, attr);\r\t\t\t\tIF dict.len < dictSize THEN dict.attr[dict.len] := attr; INC(dict.len) END\r\t\t\tELSE\r\t\t\t\tattr := dict.attr[ano]\r\t\t\tEND;\r\t\t\trd.ReadInt(len);\r\t\t\tIF len > 0 THEN\t"
                    attr: 0
