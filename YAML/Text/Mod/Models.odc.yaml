                    attr: 1
                  - text: "\r\t\t\tInvalCache(t, pos);\r\t\t\tIF wr.era # t.era THEN WriterReset(wr) END;\r\t\t\tun := wr.run; u := un.prev;\r\t\t\tIF (u.attr # NIL) & u.attr.Equals(wr.attr) & (u IS Piece) & (u(Piece).file = t.spill.file)\r\t\t\t& (u(Piece).org + u.len = spillPos) THEN\r\t\t\t\tINC(u.len);\r\t\t\t\tIF t.pc.org >= pos THEN INC(t.pc.org) END\r\t\t\tELSE\r\t\t\t\tNEW(p); u.next := p; p.prev := u; p.next := un; un.prev := p;\r\t\t\t\tp.len := 1; p.attr := wr.attr;\r\t\t\t\tp.file := t.spill.file; p.org := spillPos;\r\t\t\t\tIF t.pc.org > pos THEN INC(t.pc.org) END;\r\t\t\t\tIF ~Stores.Joined(t, p.attr) THEN\r\t\t\t\t\tIF ~Stores.Unattached(p.attr) THEN p.attr := Stores.CopyOf(p.attr)(Attributes) END;\r\t\t\t\t\tStores.Join(t, p.attr)\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tINC(t.era); INC(t.len);\r\t\t\tINC(wr.era)\r\t\tELSE\r\t\t\tGetWriteOp(t, pos, op, bunch);\r\t\t\tIF (op.attr = NIL) OR ~op.attr.Equals(wr.attr) THEN op.attr := wr.attr END;\r\t\t\top.mode := writeSChar; (*op.attr := wr.attr;*) op.len := spillPos;\r\t\t\tIF bunch THEN Models.Bunch(t) ELSE Models.Do(t, \"#System:Inserting\", op) END\r\t\tEND;\r\t\twr.pos := pos + 1\r\tEND WriteSChar;\r\r\tPROCEDURE (wr: StdWriter) WriteChar (ch: CHAR);\r\t\tVAR t: StdModel; u, un: Run; lp: LPiece; pos, spillPos: INTEGER;\r\t\t\tfw: Files.Writer; op: EditOp; bunch: BOOLEAN;\r\tBEGIN\r\t\tIF (ch >= 20X) & (ch < 7FX)\r\t\tOR (ch = tab) OR (ch = line) OR (ch = para)\r\t\tOR (ch = zwspace) OR (ch = digitspace)\r\t\tOR (ch = hyphen) OR (ch = nbhyphen) OR (ch >= 0A0X) & (ch < 100X) THEN\r\t\t\tWriteSChar(wr, SHORT(ch))\t"
                    attr: 0
