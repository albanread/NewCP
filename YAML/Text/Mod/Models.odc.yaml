                  - text: "\r\t\tELSIF ch = 200BX THEN wr.WriteChar(zwspace)\r\t\tELSIF ch = 2010X THEN wr.WriteChar(hyphen)\r\t\tELSIF ch = 2011X THEN wr.WriteChar(nbhyphen)\r\t\tELSIF ch >= 100X THEN\r\t\t\tt := wr.base; pos := wr.pos;\r\t\t\tIF t.spill.file = NIL THEN OpenSpill(t.spill) END;\r\t\t\tfw := t.spill.writer;\r\t\t\tfw.WriteByte(SHORT(SHORT(ORD(ch))));\r\t\t\tfw.WriteByte(SHORT(SHORT(ORD(ch) DIV 256 - 128)));\r\t\t\tspillPos := t.spill.len; t.spill.len := spillPos + 2;\r\t\t\tIF (t.Domain() = NIL) OR (t.Domain().GetSequencer() = NIL) THEN\r\t\t\t"
