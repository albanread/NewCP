                  - text: "\r\r\tPROCEDURE (t: StdModel) InitFrom (source: Containers.Model);\r\tBEGIN\r\t\tWITH source: StdModel DO\r\t\t\tASSERT(source.trailer # NIL, 20);\r\t\t\tt.spill := source.spill;\t"
