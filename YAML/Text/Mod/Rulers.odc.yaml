                  - text: " END;\r\t\tr.sel := invalid\r\tEND Internalize;\r\r\tPROCEDURE (r: StdRuler) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\tr.Externalize^(wr);\r\t\twr.WriteVersion(maxStdRulerVersion)\r\tEND Externalize;\r\r\tPROCEDURE (r: StdRuler) ThisModel (): Models.Model;\r\tBEGIN\r\t\t"
                    attr: 0
