                  - text: "\r\t"
                    attr: 0
                  - text: "(** post: dir = d **)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tASSERT(d # NIL, 20); ASSERT(d.attr.init, 21); dir := d\r\tEND SetDir;\r\r\r\tPROCEDURE Init;\r\t\tVAR d: StdDirectory; fnt: Fonts.Font; asc, dsc, w: INTEGER;\r\tBEGIN\r\t\tIF Dialog.metricSystem THEN\r\t\t\tmarginGrid := 1*mm; minTabWidth := 1*mm; tabGrid := 1*mm\r\t\tELSE\r\t\t\tmarginGrid := inch16; minTabWidth := inch16; tabGrid := inch16\r\t\tEND;\r\r\t\tfnt := Fonts.dir.Default();\r\t\tfont := Fonts.dir.This(fnt.typeface, 7*point, {}, Fonts.normal);\t"
                    attr: 0
                  - text: "(* font for ruler scales *)"
                    attr: 1
                  - text: "\r\t\tNEW(prop);\r\t\tprop.valid := {first .. tabs};\r\t\tprop.first := 0; prop.left := 0;\r\t\tIF Dialog.metricSystem THEN\r\t\t\tprop.right := 165*mm\r\t\tELSE\r\t\t\tprop.right := 104*inch16\r\t\tEND;\r\t\tfnt.GetBounds(asc, dsc, w);\r\t\tprop.lead := 0; prop.asc := asc; prop.dsc := dsc; prop.grid := 1;\r\t\tprop.opts.val := {leftAdjust}; prop.opts.mask := options;\r\t\tprop.tabs.len := 0;\r\r\t\tNEW(def); def.InitFromProp(prop);\r\t\tNEW(d); d.attr := def; dir := d; stdDir := d\r\tEND Init;\r\r\tPROCEDURE Cleaner;\r\tBEGIN\r\t\tglobRd := NIL\r\tEND Cleaner;\r\rBEGIN\r\tInit;\r\tKernel.InstallCleaner(Cleaner)\rCLOSE\r\tKernel.RemoveCleaner(Cleaner)\rEND TextRulers.\r"
