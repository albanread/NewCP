                    attr: 0
                  - text: SetDsc
                    attr: 3
                  - text: "* (r: Ruler; h: INTEGER);\r\tBEGIN\r\t\tASSERT(r.style # NIL, 20);\r\t\tprop.valid := {dsc}; prop.dsc := h;\r\t\tr.style.SetAttr(ModifiedAttr(r.style.attr, prop))\r\tEND SetDsc;\r\r\tPROCEDURE "
                    attr: 0
