                  - text: "\r\r\tPROCEDURE (d: StdDirectory) NewStyle (attr: Attributes): Style;\r\t\tVAR s: StdStyle;\r\tBEGIN\r\t\tIF attr = NIL THEN attr := d.attr END;\r\t\tNEW(s); s.SetAttr(attr); "
