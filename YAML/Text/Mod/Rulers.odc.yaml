                  - text: "* (r: Ruler; h: INTEGER);\r\tBEGIN\r\t\tASSERT(r.style # NIL, 20);\r\t\tprop.valid := {lead}; prop.lead := h;\r\t\tr.style.SetAttr(ModifiedAttr(r.style.attr, prop))\r\tEND SetLead;\r\r\tPROCEDURE "
                    attr: 0
