                    attr: 4
                  - text: " r.style\r\tEND ThisModel;\r\r\tPROCEDURE (r: StdRuler) CopyFromModelView (source: Views.View; model: Models.Model);\r\tBEGIN\r\t\tr.sel := invalid; r.InitStyle(model(Style))\r\tEND CopyFromModelView;\r\r\tPROCEDURE (ruler: StdRuler) Restore (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR a: Attributes; m: Mark; u, scale, tabBar,  px,  w, h: INTEGER; i: INTEGER;\r\tBEGIN\r\t\tu := f.dot; a := ruler.style.attr;\r\t\truler.context.GetSize(w, h);\r\t\ttabBar := h - tabBarHeight; scale := tabBar - scaleHeight;\r\t\tw := MIN(f.r + 10 * mm, 10000 * mm);\t"
                    attr: 0
                  - text: "(* high-level clipping *)"
                    attr: 1
                  - text: "\r\t\tf.DrawLine(0, scale - u, w - u, scale - u, u, Ports.grey25);\r\t\tf.DrawLine(0, tabBar - u, w - u, tabBar - u, u, Ports.grey50);\r\t\tDrawScale(f, 0, scale, w, tabBar, l, r);\r\t\tDrawNiceRect(f, 0, h - rulerHeight, w, h);\r\t\tSetMark(m, ruler, a.first, h, first, -1); InvertMark(m, f, Ports.show);\r\t\tSetMark(m, ruler, a.left, h, left, -1); InvertMark(m, f, Ports.show);\r\t\tIF rightFixed IN a.opts THEN\r\t\t\tSetMark(m, ruler, a.right, h, right, -1); InvertMark(m, f, Ports.show)\r\t\tEND;\r\t\ti := 0;\r\t\tWHILE i < a.tabs.len DO\r\t\t\tSetMark(m, ruler, a.tabs.tab[i].stop, h, tabs, i); InvertMark(m, f, Ports.show); INC(i)\r\t\tEND;\r\t\tpx := iconGap; i := firstIcon;\r\t\tWHILE i <= lastIcon DO\r\t\t\tIF i IN validIcons THEN\r\t\t\t\tSetMark(m, ruler, px, h - iconPin, i, -1); DrawMark(m, f)\r\t\t\tEND;\r\t\t\tINC(px, iconWidth + iconGap); INC(i)\r\t\tEND;\r\t\tHiliteThisMark(ruler, f, Mode(ruler), Ports.show)\r\tEND Restore;\r\r\tPROCEDURE (ruler: StdRuler) RestoreMarks (f: Views.Frame; l, t, r, b: INTEGER);\r\tBEGIN\r\t\tHiliteThisMark(ruler, f, ruler.sel, Ports.show)\r\tEND RestoreMarks;\r\r\tPROCEDURE (r: StdRuler) GetBackground (VAR color: Ports.Color);\r\tBEGIN\r\t\tcolor := Ports.background\r\tEND GetBackground;\r\r\tPROCEDURE (r: StdRuler) Neutralize;\r\t\tVAR msg: NeutralizeMsg;\r\tBEGIN\r\t\tViews.Broadcast(r, msg)\r\tEND Neutralize;\r\r\tPROCEDURE (r: StdRuler) HandleModelMsg (VAR msg: Models.Message);\r\tBEGIN\r\t\tWITH msg: UpdateMsg DO\r\t\t\tViews.Update(r, Views.keepFrames)\r\t\tELSE\r\t\tEND\r\tEND HandleModelMsg;\r\r\tPROCEDURE (r: StdRuler) HandleViewMsg (f: Views.Frame; VAR msg: Views.Message);\r\tBEGIN\r\t\tWITH msg: NeutralizeMsg DO\r\t\t\tDeselectMark(r, f)\r\t\tELSE\r\t\tEND\r\tEND HandleViewMsg;\r\r\tPROCEDURE (r: StdRuler) HandleCtrlMsg (f: Views.Frame;\r\t\tVAR msg: Controllers.Message; VAR focus: Views.View\r\t);\r\t\tVAR requestFocus: BOOLEAN;\r\tBEGIN\r\t\tWITH msg: Controllers.TrackMsg DO\r\t\t\tTrack(r, f, msg)\r\t\t| msg: Controllers.EditMsg DO\r\t\t\tEdit(r, f, msg)\r\t\t| msg: Controllers.MarkMsg DO\r\t\t\tr.RestoreMarks(f, f.l, f.t, f.r, f.b)\r\t\t| msg: Controllers.SelectMsg DO\r\t\t\tIF ~msg.set THEN DeselectMark(r, f) END\r\t\t| msg: Controllers.PollOpsMsg DO\r\t\t\tPollOps(r, f, msg)\r\t\t| msg: Properties.CollectMsg DO\r\t\t\tPollProp(r, msg.poll)\r\t\t| msg: Properties.EmitMsg DO\r\t\t\trequestFocus := f.front;\r\t\t\tSetProp(r, msg.set, requestFocus);\r\t\t\tmsg.requestFocus := requestFocus\r\t\tELSE\r\t\tEND\r\tEND HandleCtrlMsg;\r\r\tPROCEDURE (r: StdRuler) HandlePropMsg (VAR msg: Properties.Message);\r\t\tVAR m: Mark; requestFocus: BOOLEAN; w, h: INTEGER;\r\tBEGIN\r\t\tWITH msg: Properties.SizePref DO\r\t\t\tmsg.w := 10000 * Ports.mm; msg.h := rulerHeight\r\t\t| msg: Properties.ResizePref DO\r\t\t\tmsg.fixed := TRUE\r\t\t| msg: Properties.FocusPref DO\r\t\t\tIF msg.atLocation THEN\r\t\t\t\tr.context.GetSize(w, h);\r\t\t\t\tGetMark(m, r, NIL, msg.x, msg.y, FALSE);\r\t\t\t\tmsg.hotFocus := (m.kind # invalid) & ~(m.kind IN fieldIcons) OR (msg.y >= h - tabBarHeight);\r\t\t\t\tmsg.setFocus := ~msg.hotFocus\r\t\t\tEND\r\t\t| msg: TextModels.Pref DO\r\t\t\tmsg.opts := {TextModels.maskChar, TextModels.hideable};\r\t\t\tmsg.mask := TextModels.para\r\t\t| msg: Properties.SetMsg DO\r\t\t\trequestFocus := FALSE;\r\t\t\tSetProp(r, msg, requestFocus)\r\t\t| msg: Properties.PollMsg DO\r\t\t\tPollProp(r, msg)\r\t\tELSE\r\t\tEND\r\tEND HandlePropMsg;\r\r\r\t"
