                  - text: "(* mask for presently valid options *)"
                    attr: 1
                  - text: "\r\r\t\tmm = Ports.mm; inch16 = Ports.inch DIV 16; point = Ports.point;\r\t\ttabBarHeight = 11 * point; scaleHeight = 10 * point; iconBarHeight = 14 * point;\r\t\trulerHeight = tabBarHeight + scaleHeight + iconBarHeight;\r\t\ticonHeight = 10 * point; iconWidth = 12 * point; iconGap = 2 * point;\r\t\ticonPin = rulerHeight - (iconBarHeight - iconHeight) DIV 2;\r\r\t\trulerChangeKey = \"#Text:RulerChange\";\r\r\t\tminVersion = 0;\r\t\tmaxAttrVersion = 2; maxStyleVersion = 0; maxStdStyleVersion = 0;\r\t\tmaxRulerVersion = 0; maxStdRulerVersion = 0;\r\r\r\tTYPE\r\t\t"
