                  - text: GetValidRuler
                    attr: 4
                  - text: "* (text: TextModels.Model; pos, hint: INTEGER;\r\t\tVAR ruler: Ruler; VAR rpos: INTEGER\r\t);\r\t\t"
                    attr: 0
                  - text: "(** pre: (hint < 0   OR   (ruler, rpos) is first ruler before hint  &  0 <= pos <= t.Length() **)"
                    attr: 1
                  - text: "\r\t\t"
                    attr: 0
                  - text: "(** post: hint < rpos <= pos & rpos = Pos(ruler) & (no ruler in (rpos, pos])\r\t\t\t\tOR   ((ruler, rpos) unmodified)\r\t\t**)"
                    attr: 1
                  - text: "\r\t\tVAR view: Views.View;\r\tBEGIN\r\t\tIF pos < text.Length() THEN INC(pos) END;\t"
                    attr: 0
                  - text: "(* let a ruler dominate its own position *)"
                    attr: 1
                  - text: "\r\t\tIF pos < hint THEN hint := -1 END;\r\t\tglobRd := text.NewReader(globRd); globRd.SetPos(pos);\r\t\tREPEAT\r\t\t\tglobRd.ReadPrevView(view)\r\t\tUNTIL globRd.eot OR (view IS Ruler) OR (globRd.Pos() < hint);\r\t\tIF (view # NIL) & (view IS Ruler) THEN\r\t\t\truler := view(Ruler); rpos := globRd.Pos()\r\t\tEND\r\tEND GetValidRuler;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SetDir
                    attr: 3
                  - text: "* (d: Directory);\r\t"
                    attr: 0
                  - text: "(** pre: d # NIL, d.attr # NIL **)"
