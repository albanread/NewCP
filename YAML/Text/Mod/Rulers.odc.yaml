                  - text: "\r\t\t\tstyle*: Style;\r\t\t\toldAttr*: Attributes\r\t\tEND;\r\r\r\t\t"
                    attr: 0
                  - text: Directory
                    attr: 3
                  - text: "* = POINTER TO ABSTRACT RECORD\r\t\t\tattr-: Attributes\r\t\tEND;\r\r\r\t\tStdStyle = POINTER TO RECORD (Style) END;\r\r\t\tStdRuler = POINTER TO RECORD (Ruler)\r\t\t\tsel: INTEGER;\t"
                    attr: 0
                  - text: "(* sel # invalid => sel = kind of selected mark *)"
                    attr: 1
                  - text: "\r\t\t\tpx, py: INTEGER\t"
                    attr: 0
                  - text: "(* sel # invalid => px, py of selected mark *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\r\t\tStdDirectory = POINTER TO RECORD (Directory) END;\r\r\t\tMark = RECORD\r\t\t\truler: StdRuler;\r\t\t\tl, r, t, b: INTEGER;\r\t\t\tpx, py, px0, py0, x, y: INTEGER;\r\t\t\tkind, index: INTEGER;\r\t\t\ttype: SET;\t"
                    attr: 0
                  - text: "(* valid if kind = tabs *)"
                    attr: 1
                  - text: "\r\t\t\ttabs: TabArray;\t"
                    attr: 0
                  - text: "(* if valid: tabs[index].type = type *)"
                    attr: 1
                  - text: "\r\t\t\tdirty: BOOLEAN\r\t\tEND;\r\r\t\tSetAttrOp = POINTER TO RECORD (Stores.Operation)\r\t\t\tstyle: Style;\r\t\t\tattr: Attributes\r\t\tEND;\r\r\t\tNeutralizeMsg = RECORD (Views.Message) END;\r\r\r\tVAR\r\t\t"
                    attr: 0
                  - text: dir
                    attr: 3
                  - text: "-, "
                    attr: 0
                  - text: stdDir
                    attr: 3
                  - text: "-: Directory;\r\r\t\tdef: Attributes;\r\t\tprop: Prop;\t"
                    attr: 0
                  - text: "(* recycled *)"
                    attr: 1
                  - text: "\r\t\tglobRd: TextModels.Reader;\t"
                    attr: 0
                  - text: "(* cache for temp reader; beware of reentrance *)"
                    attr: 1
                  - text: "\r\t\tfont: Fonts.Font;\r\r\t\tmarginGrid, minTabWidth, tabGrid: INTEGER;\r\r\r\tPROCEDURE ^ DoSetAttrOp (s: Style; attr: Attributes);\r\r\tPROCEDURE CopyTabs (IN src: TabArray; OUT dst: TabArray);\r\t"
                    attr: 0
                  - text: "(* a TabArray is a 256 byte structure - copying of used parts is much faster than \":= all\" *)"
                    attr: 1
                  - text: "\r\t\tVAR i, n: INTEGER;\r\tBEGIN\r\t\tn := src.len; dst.len := n;\r\t\ti := 0; WHILE i < n DO dst.tab[i] := src.tab[i]; INC(i) END\r\tEND CopyTabs;\r\r\r\t"
                    attr: 0
                  - text: "(** Attributes **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (a: Attributes) "
                    attr: 0
                  - text: CopyFrom
                    attr: 3
                  - text: "- (source: Stores.Store), EXTENSIBLE;\r\tBEGIN\r\t\tWITH source: Attributes DO\r\t\t\tASSERT(~a.init, 20); ASSERT(source.init, 21);\r\t\t\ta.init := TRUE;\r\t\t\ta.first := source.first; a.left := source.left; a.right := source.right;\r\t\t\ta.lead := source.lead; a.asc := source.asc; a.dsc := source.dsc; a.grid := source.grid;\r\t\t\ta.opts := source.opts;\r\t\t\tCopyTabs(source.tabs, a.tabs)\r\t\tEND\r\tEND CopyFrom;\r\r\tPROCEDURE (a: Attributes) "
                    attr: 0
                  - text: Externalize
                    attr: 3
                  - text: "- (VAR wr: Stores.Writer), EXTENSIBLE;\r\t"
                    attr: 0
                  - text: "(** pre: a.init **)"
                    attr: 1
                  - text: "\r\t\tVAR i: INTEGER; typedTabs: BOOLEAN;\r\tBEGIN\r\t\tASSERT(a.init, 20);\r\t\ta.Externalize^(wr);\r\t\ti := 0; WHILE (i < a.tabs.len) & (a.tabs.tab[i].type = {}) DO INC(i) END;\r\t\ttypedTabs := i < a.tabs.len;\r\t\tIF typedTabs THEN\r\t\t\twr.WriteVersion(maxAttrVersion)\r\t\tELSE\r\t\t\twr.WriteVersion(1)\t"
                    attr: 0
                  - text: "(* versions before 2 had only leftTabs *)"
                    attr: 1
                  - text: "\r\t\tEND;\r\t\twr.WriteInt(a.first); wr.WriteInt(a.left); wr.WriteInt(a.right);\r\t\twr.WriteInt(a.lead); wr.WriteInt(a.asc); wr.WriteInt(a.dsc); wr.WriteInt(a.grid);\r\t\twr.WriteSet(a.opts);\r\t\twr.WriteXInt(a.tabs.len);\r\t\ti := 0; WHILE i < a.tabs.len DO wr.WriteInt(a.tabs.tab[i].stop); INC(i) END;\r\t\tIF typedTabs THEN\r\t\t\ti := 0; WHILE i < a.tabs.len DO wr.WriteSet(a.tabs.tab[i].type); INC(i) END\r\t\tEND\r\tEND Externalize;\r\r\tPROCEDURE (a: Attributes) "
                    attr: 0
                  - text: Internalize
                    attr: 3
                  - text: "- (VAR rd: Stores.Reader), EXTENSIBLE;\r\t"
                    attr: 0
                  - text: "(** pre: ~a.init **)"
                    attr: 1
                  - text: "\r\t"
                    attr: 0
                  - text: "(** post: a.init **)"
                    attr: 1
                  - text: "\r\t\tVAR thisVersion, i, n, trash: INTEGER; trashSet: SET;\r\tBEGIN\r\t\tASSERT(~a.init, 20); a.init := TRUE;\r\t\ta.Internalize^(rd);\r\t\tIF rd.cancelled THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\trd.ReadVersion(minVersion, maxAttrVersion, thisVersion);\r\t\tIF rd.cancelled THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " END;\r\t\trd.ReadInt(a.first); rd.ReadInt(a.left); rd.ReadInt(a.right);\r\t\trd.ReadInt(a.lead); rd.ReadInt(a.asc); rd.ReadInt(a.dsc); rd.ReadInt(a.grid);\r\t\trd.ReadSet(a.opts);\r\t\trd.ReadXInt(n); a.tabs.len := MIN(n, maxTabs);\r\t\ti := 0; WHILE i < a.tabs.len DO rd.ReadInt(a.tabs.tab[i].stop); INC(i) END;\r\t\tWHILE i < n DO rd.ReadInt(trash); INC(i) END;\r\t\tIF thisVersion = 0 THEN\t"
                    attr: 0
                  - text: "(* convert from v0 rightFixed to v1 ~rightFixed default *)"
                    attr: 1
                  - text: "\r\t\t\tINCL(a.opts, rightFixed)\r\t\tEND;\r\t\tIF thisVersion >= 2 THEN\r\t\t\ti := 0; WHILE i < a.tabs.len DO rd.ReadSet(a.tabs.tab[i].type); INC(i) END;\r\t\t\tWHILE i < n DO rd.ReadSet(trashSet); INC(i) END\r\t\tELSE\r\t\t\ti := 0; WHILE i < a.tabs.len DO a.tabs.tab[i].type := {}; INC(i) END\r\t\tEND\r\tEND Internalize;\r\r\tPROCEDURE Set (p: Prop; opt: INTEGER; VAR x: INTEGER; min, max, new: INTEGER);\r\tBEGIN\r\t\tIF opt IN p.valid THEN x := MAX(min, MIN(max, new)) END\r\tEND Set;\r\r\tPROCEDURE ModifyFromProp (a: Attributes; p: Properties.Property);\r\t\tCONST maxW = 10000*mm; maxH = 32767 * point;\r\t\tVAR i: INTEGER; type, mask: SET;\r\tBEGIN\r\t\tWHILE p # NIL DO\r\t\t\tWITH p: Prop DO\r\t\t\t\tSet(p, first, a.first, 0, maxW, p.first);\r\t\t\t\tSet(p, left, a.left, 0, maxW, p.left);\r\t\t\t\tSet(p, right, a.right, MAX(a.left, a.first), maxW, p.right);\r\t\t\t\tSet(p, lead, a.lead, 0, maxH, p.lead);\r\t\t\t\tSet(p, asc, a.asc, 0, maxH, p.asc);\r\t\t\t\tSet(p, dsc, a.dsc, 0, maxH - a.asc, p.dsc);\r\t\t\t\tSet(p, grid, a.grid, 1, maxH, p.grid);\r\t\t\t\tIF opts IN p.valid THEN\r\t\t\t\t\ta.opts := a.opts * (-p.opts.mask) + p.opts.val * p.opts.mask\r\t\t\t\tEND;\r\t\t\t\tIF (tabs IN p.valid) & (p.tabs.len >= 0) THEN\r\t\t\t\t\tIF (p.tabs.len > 0) & (p.tabs.tab[0].stop >= 0) THEN\r\t\t\t\t\t\ti := 0; a.tabs.len := MIN(p.tabs.len, maxTabs);\r\t\t\t\t\t\tREPEAT\r\t\t\t\t\t\t\ta.tabs.tab[i].stop := p.tabs.tab[i].stop;\r\t\t\t\t\t\t\ttype := p.tabs.tab[i].type; mask := tabOptions;\r\t\t\t\t\t\t\tIF type * {centerTab, rightTab} = {centerTab, rightTab} THEN\r\t\t\t\t\t\t\t\tmask := mask - {centerTab, rightTab}\r\t\t\t\t\t\t\tEND;\r\t\t\t\t\t\t\ta.tabs.tab[i].type := a.tabs.tab[i].type * (-mask) + type * mask;\r\t\t\t\t\t\t\tINC(i)\r\t\t\t\t\t\tUNTIL (i = a.tabs.len) OR (p.tabs.tab[i].stop < p.tabs.tab[i - 1].stop);\r\t\t\t\t\t\ta.tabs.len := i\r\t\t\t\t\tELSE a.tabs.len := 0\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\tEND;\r\t\t\tp := p.next\r\t\tEND\r\tEND ModifyFromProp;\r\r\tPROCEDURE (a: Attributes) "
                    attr: 0
                  - text: ModifyFrom
                    attr: 3
                  - text: Prop
                    attr: 4
                  - text: "- (p: Properties.Property), NEW, EXTENSIBLE;\r\tBEGIN\r\t\tModifyFromProp(a, p)\r\tEND ModifyFromProp;\r\r\tPROCEDURE (a: Attributes) "
                    attr: 0
                  - text: InitFromProp
                    attr: 4
                  - text: "* (p: Properties.Property), NEW, EXTENSIBLE;\r\t"
                    attr: 0
                  - text: "(** pre: ~a.init **)"
                    attr: 1
                  - text: "\r\t"
                    attr: 0
                  - text: "(** post: (a.init, p # NIL & x IN p.valid) => x set in a, else x defaults in a **)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tASSERT(~a.init, 20);\r\t\ta.init := TRUE;\r\t\ta.first := def.first; a.left := def.left; a.right := def.right;\r\t\ta.lead := def.lead; a.asc := def.asc; a.dsc := def.dsc; a.grid := def.grid;\r\t\ta.opts := def.opts;\r\t\tCopyTabs(def.tabs, a.tabs);\r\t\tModifyFromProp(a, p)\r\tEND InitFromProp;\r\r\tPROCEDURE (a: Attributes) "
                    attr: 0
                  - text: Equals
                    attr: 3
                  - text: "* (b: Attributes): BOOLEAN, NEW, EXTENSIBLE;\r\t"
                    attr: 0
                  - text: "(** pre: a.init, b.init **)"
                    attr: 1
                  - text: "\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\tASSERT(a.init, 20); ASSERT(b.init, 21);\r\t\tIF a # b THEN\r\t\t\ti := 0;\r\t\t\tWHILE (i < a.tabs.len)\r\t\t\t & (a.tabs.tab[i].stop = b.tabs.tab[i].stop)\r\t\t\t & (a.tabs.tab[i].type = b.tabs.tab[i].type) DO\r\t\t\t\tINC(i)\r\t\t\tEND;\r\t\t\t"
                    attr: 0
