                    attr: 0
                  - text: SetLeftFlush
                    attr: 3
                  - text: "* (r: Ruler);\r\tBEGIN\r\t\tASSERT(r.style # NIL, 20);\r\t\tprop.valid := {opts};\r\t\tprop.opts.mask := {leftAdjust, rightAdjust}; prop.opts.val := {leftAdjust};\r\t\tr.style.SetAttr(ModifiedAttr(r.style.attr, prop))\r\tEND SetLeftFlush;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SetRightFlush
                    attr: 3
                  - text: "* (r: Ruler);\r\tBEGIN\r\t\tASSERT(r.style # NIL, 20);\r\t\tprop.valid := {opts};\r\t\tprop.opts.mask := {leftAdjust, rightAdjust}; prop.opts.val := {rightAdjust};\r\t\tr.style.SetAttr(ModifiedAttr(r.style.attr, prop))\r\tEND SetRightFlush;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SetCentered
                    attr: 3
                  - text: "* (r: Ruler);\r\tBEGIN\r\t\tASSERT(r.style # NIL, 20);\r\t\tprop.valid := {opts};\r\t\tprop.opts.mask := {leftAdjust, rightAdjust}; prop.opts.val := {};\r\t\tr.style.SetAttr(ModifiedAttr(r.style.attr, prop))\r\tEND SetCentered;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SetJustified
                    attr: 3
                  - text: "* (r: Ruler);\r\tBEGIN\r\t\tASSERT(r.style # NIL, 20);\r\t\tprop.valid := {opts};\r\t\tprop.opts.mask := {leftAdjust, rightAdjust}; prop.opts.val := {leftAdjust, rightAdjust};\r\t\tr.style.SetAttr(ModifiedAttr(r.style.attr, prop))\r\tEND SetJustified;\r\r\r\tPROCEDURE "
                    attr: 0
                  - text: SetNoBreakInside
                    attr: 3
                  - text: "* (r: Ruler);\r\tBEGIN\r\t\tASSERT(r.style # NIL, 20);\r\t\tprop.valid := {opts};\r\t\tprop.opts.mask := {noBreakInside}; prop.opts.val := {noBreakInside};\r\t\tr.style.SetAttr(ModifiedAttr(r.style.attr, prop))\r\tEND SetNoBreakInside;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SetPageBreak
                    attr: 3
                  - text: "* (r: Ruler);\r\tBEGIN\r\t\tASSERT(r.style # NIL, 20);\r\t\tprop.valid := {opts};\r\t\tprop.opts.mask := {pageBreak}; prop.opts.val := {pageBreak};\r\t\tr.style.SetAttr(ModifiedAttr(r.style.attr, prop))\r\tEND SetPageBreak;\r\r\tPROCEDURE "
                    attr: 0
                  - text: SetParJoin
                    attr: 3
                  - text: "* (r: Ruler);\r\tBEGIN\r\t\tASSERT(r.style # NIL, 20);\r\t\tprop.valid := {opts};\r\t\tprop.opts.mask := {parJoin}; prop.opts.val := {parJoin};\r\t\tr.style.SetAttr(ModifiedAttr(r.style.attr, prop))\r\tEND SetParJoin;\r\r\r\tPROCEDURE "
                    attr: 0
                  - text: AddTab
                    attr: 3
                  - text: "* (r: Ruler; x: INTEGER);\r\t\tVAR ra: Attributes; i: INTEGER;\r\tBEGIN\r\t\tASSERT(r.style # NIL, 20); ra := r.style.attr; i := ra.tabs.len; ASSERT(i < maxTabs, 21);\r\t\tASSERT((i = 0) OR (ra.tabs.tab[i - 1].stop < x), 22);\r\t\tprop.valid := {tabs};\r\t\tCopyTabs(ra.tabs, prop.tabs);\r\t\tprop.tabs.tab[i].stop := x; prop.tabs.tab[i].type := {}; INC(prop.tabs.len);\r\t\tr.style.SetAttr(ModifiedAttr(ra, prop))\r\tEND AddTab;\r\r\tPROCEDURE "
                    attr: 0
                  - text: MakeCenterTab
                    attr: 3
                  - text: "* (r: Ruler);\r\t\tVAR ra: Attributes; i: INTEGER;\r\tBEGIN\r\t\tASSERT(r.style # NIL, 20); ra := r.style.attr; i := ra.tabs.len; ASSERT(i > 0, 21);\r\t\tprop.valid := {tabs};\r\t\tCopyTabs(ra.tabs, prop.tabs);\r\t\tprop.tabs.tab[i - 1].type := prop.tabs.tab[i - 1].type + {centerTab} - {rightTab};\r\t\tr.style.SetAttr(ModifiedAttr(ra, prop))\r\tEND MakeCenterTab;\r\r\tPROCEDURE "
                    attr: 0
                  - text: MakeRightTab
                    attr: 3
                  - text: "* (r: Ruler);\r\t\tVAR ra: Attributes; i: INTEGER;\r\tBEGIN\r\t\tASSERT(r.style # NIL, 20); ra := r.style.attr; i := ra.tabs.len; ASSERT(i > 0, 21);\r\t\tprop.valid := {tabs};\r\t\tCopyTabs(ra.tabs, prop.tabs);\r\t\tprop.tabs.tab[i - 1].type := prop.tabs.tab[i - 1].type - {centerTab} + {rightTab};\r\t\tr.style.SetAttr(ModifiedAttr(ra, prop))\r\tEND MakeRightTab;\r\r\tPROCEDURE "
                    attr: 0
                  - text: MakeBarTab
                    attr: 3
                  - text: "* (r: Ruler);\r\t\tVAR ra: Attributes; i: INTEGER;\r\tBEGIN\r\t\tASSERT(r.style # NIL, 20); ra := r.style.attr; i := ra.tabs.len; ASSERT(i > 0, 21);\r\t\tprop.valid := {tabs};\r\t\tCopyTabs(ra.tabs, prop.tabs);\r\t\tprop.tabs.tab[i - 1].type := prop.tabs.tab[i - 1].type + {barTab};\r\t\tr.style.SetAttr(ModifiedAttr(ra, prop))\r\tEND MakeBarTab;\r\r\r\t"
                    attr: 0
                  - text: "(* SetAttrOp *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (op: SetAttrOp) Do;\r\t\tVAR s: Style; attr: Attributes; upd: UpdateMsg;\r\tBEGIN\r\t\ts := op.style;\r\t\tattr := s.attr; s.attr := op.attr; op.attr := attr;\r\t\t"
                    attr: 0
                  - text: "(*Stores.InitDomain(s.attr, s.Domain());*) (* Stores.Join(s, s.attr); *)\r\t\tASSERT((s.attr=NIL) OR Stores.Joined(s, s.attr), 100);"
                    attr: 3
                  - text: "\r\t\tupd.style := s; upd.oldAttr := attr; Models.Domaincast(s.Domain(), upd)\r\tEND Do;\r\r\tPROCEDURE DoSetAttrOp (s: Style; attr: Attributes);\r\t\tVAR op: SetAttrOp;\r\tBEGIN\r\t\tIF (s.attr # attr) OR ~s.attr.Equals(attr) THEN\r\t\t\t"
                    attr: 0
                  - text: "(* IF attr.Domain() # s.Domain() THEN attr := Stores.CopyOf(attr)(Attributes) END; *)\r\t\t\tIF ~Stores.Joined(s, attr) THEN\r\t\t\t\tIF ~Stores.Unattached(attr) THEN attr := Stores.CopyOf(attr)(Attributes) END;\r\t\t\t\tStores.Join(s, attr)\r\t\t\tEND;"
                    attr: 3
                  - text: "\r\t\t\tNEW(op); op.style := s; op.attr := attr;\r\t\t\tModels.Do(s, rulerChangeKey, op)\r\t\tEND\r\tEND DoSetAttrOp;\r\r\r\t"
                    attr: 0
                  - text: "(* grid definitions *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE MarginGrid (x: INTEGER): INTEGER;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " (x + marginGrid DIV 2) DIV marginGrid * marginGrid\r\tEND MarginGrid;\r\r\tPROCEDURE TabGrid (x: INTEGER): INTEGER;\r\tBEGIN\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " (x + tabGrid DIV 2) DIV tabGrid * tabGrid\r\tEND TabGrid;\r\r\r\t"
                    attr: 0
                  - text: "(* nice graphical primitives *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE DrawCenteredInt (f: Views.Frame; x, y, n: INTEGER);\r\t\tVAR sw: INTEGER; s: ARRAY 32 OF CHAR;\r\tBEGIN\r\t\tStrings.IntToString(n, s); sw := font.StringWidth(s);\r\t\tf.DrawString(x - sw DIV 2, y, Ports.defaultColor, s, font)\r\tEND DrawCenteredInt;\r\r\tPROCEDURE DrawNiceRect (f: Views.Frame; l, t, r, b: INTEGER);\r\t\tVAR u: INTEGER;\r\tBEGIN\r\t\tu := f.dot;\r\t\tf.DrawRect(l, t, r - u, b - u, 0, Ports.defaultColor);\r\t\tf.DrawLine(l + u, b - u, r - u, b - u, u, Ports.grey25);\r\t\tf.DrawLine(r - u, t + u, r - u, b - u, u, Ports.grey25)\r\tEND DrawNiceRect;\r\r\tPROCEDURE DrawScale (f: Views.Frame; l, t, r, b, clipL, clipR: INTEGER);\r\t\tVAR u, h, x, px, sw: INTEGER; i, n, d1, d2: INTEGER; s: ARRAY 32 OF CHAR;\r\tBEGIN\r\t\tf.DrawRect(l, t, r, b, Ports.fill, Ports.grey12);\r\t\tu := f.dot;\r\t\tIF Dialog.metricSystem THEN d1 := 2; d2 := 10 ELSE d1 := 2; d2 := 16 END;\r\t\tDEC(b, point);\r\t\tsw := 2*u + font.StringWidth(\"8888888888\");\r\t\tx := l + tabGrid; i := 0; n := 0;\r\t\tWHILE x <= r DO\r\t\t\tINC(i); px := TabGrid(x);\r\t\t\tIF i = d2 THEN\r\t\t\t\th := 6*point; i := 0; INC(n);\r\t\t\t\tIF (px >= clipL - sw) & (px < clipR) THEN\r\t\t\t\t\tStrings.IntToString(n, s);\r\t\t\t\t\tf.DrawString(px - 2*u - font.StringWidth(s), b - 3*point, Ports.defaultColor, s, font)\r\t\t\t\tEND\r\t\t\tELSIF i MOD d1 = 0 THEN\r\t\t\t\th := 2*point\r\t\t\tELSE\r\t\t\t\th := 0\r\t\t\tEND;\r\t\t\tIF (px >= clipL) & (px < clipR) & (h > 0) THEN\r\t\t\t\tf.DrawLine(px, b, px, b - h, 0, Ports.defaultColor)\r\t\t\tEND;\r\t\t\tINC(x, tabGrid)\r\t\tEND\r\tEND DrawScale;\r\r\tPROCEDURE InvertTabMark (f: Views.Frame; l, t, r, b: INTEGER; type: SET; show: BOOLEAN);\r\t\tVAR u, u2, u3, yc, i, ih: INTEGER;\r\tBEGIN\r\t\tu := f.dot; u2 := 2*u; u3 := 3*u;\r\t\tIF ~ODD((r - l) DIV u) THEN DEC(r, u) END;\r\t\tyc := l + (r - l) DIV u DIV 2 * u;\r\t\tIF barTab IN type THEN\r\t\t\tf.MarkRect(yc, b - u3, yc + u, b - u2, Ports.fill, Ports.invert, show);\r\t\t\tf.MarkRect(yc, b - u, yc + u, b, Ports.fill, Ports.invert, show)\r\t\tEND;\r\t\tIF centerTab IN type THEN\r\t\t\tf.MarkRect(l + u, b - u2, r - u, b - u, Ports.fill, Ports.invert, show)\r\t\tELSIF rightTab IN type THEN\r\t\t\tf.MarkRect(l, b - u2, yc + u, b - u, Ports.fill, Ports.invert, show)\r\t\tELSE\r\t\t\tf.MarkRect(yc, b - u2, r, b - u, Ports.fill, Ports.invert, show)\r\t\tEND;\r\t\tDEC(b, u3); INC(l, u2); DEC(r, u2);\r\t\tih := (r - l) DIV 2;\r\t\ti := b - t; t := b - u;\r\t\tWHILE (i > 0) & (r > l) DO\r\t\t\tDEC(i, u);\r\t\t\tf.MarkRect(l, t, r, b, Ports.fill, Ports.invert, show);\r\t\t\tIF i <= ih THEN INC(l, u); DEC(r, u) END;\r\t\t\tDEC(t, u); DEC(b, u)\r\t\tEND\r\tEND InvertTabMark;\r\r\tPROCEDURE InvertFirstMark (f: Views.Frame; l, t, r, b: INTEGER; show: BOOLEAN);\r\t\tVAR u, i, ih: INTEGER;\r\tBEGIN\r\t\tu := f.dot;\r\t\ti := b - t; t := b - u;\r\t\tih := r - l;\r\t\tWHILE (i > 0) & (r > l) DO\r\t\t\tDEC(i, u);\r\t\t\tf.MarkRect(l, t, r, b, Ports.fill, Ports.invert, show);\r\t\t\tIF i <= ih THEN DEC(r, u) END;\r\t\t\tDEC(t, u); DEC(b, u)\r\t\tEND\r\tEND InvertFirstMark;\r\r\tPROCEDURE InvertLeftMark (f: Views.Frame; l, t, r, b: INTEGER; show: BOOLEAN);\r\t\tVAR u, i, ih: INTEGER;\r\tBEGIN\r\t\tu := f.dot;\r\t\ti := b - t; b := t + u;\r\t\tih := r - l;\r\t\tWHILE (i > 0) & (r > l) DO\r\t\t\tDEC(i, u);\r\t\t\tf.MarkRect(l, t, r, b, Ports.fill, Ports.invert, show);\r\t\t\tIF i <= ih THEN DEC(r, u) END;\r\t\t\tINC(t, u); INC(b, u)\r\t\tEND\r\tEND InvertLeftMark;\r\r\tPROCEDURE InvertRightMark (f: Views.Frame; l, t, r, b: INTEGER; show: BOOLEAN);\r\t\tVAR u, i, ih: INTEGER;\r\tBEGIN\r\t\tu := f.dot;\r\t\tIF ~ODD((b - t) DIV u) THEN INC(t, u) END;\r\t\tih := r - l; l := r - u;\r\t\ti := b - t; b := t + u;\r\t\tWHILE (i > 0) & (i > ih) DO\r\t\t\tDEC(i, u);\r\t\t\tf.MarkRect(l, t, r, b, Ports.fill, Ports.invert, show);\r\t\t\tDEC(l, u);\r\t\t\tINC(t, u); INC(b, u)\r\t\tEND;\r\t\tWHILE (i > 0) & (r > l) DO\r\t\t\tDEC(i, u);\r\t\t\tf.MarkRect(l, t, r, b, Ports.fill, Ports.invert, show);\r\t\t\tINC(l, u);\r\t\t\tINC(t, u); INC(b, u)\r\t\tEND\r\tEND InvertRightMark;\r\r\r\t"
                    attr: 0
                  - text: "(* marks *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE SetMark (VAR m: Mark; r: StdRuler; px, py: INTEGER; kind, index: INTEGER);\r\tBEGIN\r\t\tm.ruler := r; m.kind := kind;\r\t\tm.px := px; m.py := py;\r\t\tCASE kind OF\r\t\t  first:\r\t\t\tm.l := px; m.r := m.l + 4*point;\r\t\t\tm.b := py - 7*point; m.t := m.b - 4*point\r\t\t| left:\r\t\t\tm.l := px; m.r := m.l + 4*point;\r\t\t\tm.b := py - 2*point; m.t := m.b - 4*point\r\t\t| right:\r\t\t\tm.r := px; m.l := m.r - 4*point;\r\t\t\tm.b := py - 3*point; m.t := m.b - 7*point\r\t\t| tabs:\r\t\t\tm.l := px - 4*point; m.r := m.l + 9*point;\r\t\t\tm.b := py - 5*point; m.t := m.b - 6*point;\r\t\t\tm.type := r.style.attr.tabs.tab[index].type\r\t\t| firstIcon .. lastIcon:\r\t\t\tm.l := px; m.r := px + iconWidth;\r\t\t\tm.t := py; m.b := py + iconHeight\r\t\tELSE "
                    attr: 0
                  - text: HALT
                    attr: 4
                  - text: "(100)\r\t\tEND\r\tEND SetMark;\r\r\tPROCEDURE Try (VAR m: Mark; r: StdRuler; px, py, x, y: INTEGER; kind, index: INTEGER);\r\tBEGIN\r\t\tIF m.kind = invalid THEN\r\t\t\tSetMark(m, r, px, py, kind, index);\r\t\t\tIF (m.l - point <= x) & (x < m.r + point) & (m.t - point <= y) & (y < m.b + point) THEN\r\t\t\t\tm.px0 := m.px; m.py0 := m.py; m.x := x; m.y := y;\r\t\t\t\tIF kind = tabs THEN\r\t\t\t\t\tm.index := index; CopyTabs(r.style.attr.tabs, m.tabs)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tm.kind := invalid\r\t\t\tEND\r\t\tEND\r\tEND Try;\r\r\tPROCEDURE InvertMark (VAR m: Mark; f: Views.Frame; show: BOOLEAN);\r\t"
                    attr: 0
                  - text: "(* pre: kind # invalid *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tCASE m.kind OF\r\t\t  first: InvertFirstMark(f, m.l, m.t, m.r, m.b, show)\r\t\t| left: InvertLeftMark(f, m.l, m.t, m.r, m.b, show)\r\t\t| right: InvertRightMark(f, m.l, m.t, m.r, m.b, show)\r\t\t| tabs: InvertTabMark(f, m.l, m.t, m.r, m.b, m.type, show)\r\t\tEND\r\tEND InvertMark;\r\r\tPROCEDURE HiliteMark (VAR m: Mark; f: Views.Frame; show: BOOLEAN);\r\tBEGIN\r\t\tf.MarkRect(m.l, m.t, m.r - point, m.b - point, Ports.fill, Ports.hilite, show)\r\tEND HiliteMark;\r\r\tPROCEDURE HiliteThisMark (r: StdRuler; f: Views.Frame; kind: INTEGER; show: BOOLEAN);\r\t\tVAR m: Mark; px,  w, h: INTEGER;\r\tBEGIN\r\t\tIF (kind # invalid) & (kind IN validIcons) THEN\r\t\t\tpx := iconGap + (kind - firstIcon) * (iconWidth + iconGap);\r\t\t\tr.context.GetSize(w, h);\r\t\t\tSetMark(m, r, px, h - iconPin, kind, -1);\r\t\t\tHiliteMark(m, f, show)\r\t\tEND\r\tEND HiliteThisMark;\r\r\tPROCEDURE DrawMark (VAR m: Mark; f: Views.Frame);\r\t"
                    attr: 0
                  - text: "(* pre: kind # invalid *)"
                    attr: 1
                  - text: "\r\t\tVAR a: Attributes; l, t, r, b, y, d, e, asc, dsc, fw: INTEGER; i: INTEGER;\r\t\t\tw: ARRAY 4 OF INTEGER;\r\tBEGIN\r\t\ta := m.ruler.style.attr;\r\t\tl := m.l + 2 * point; t := m.t + 2 * point; r := m.r - 4 * point; b := m.b - 3 * point;\r\t\tfont.GetBounds(asc, dsc, fw);\r\t\ty := (m.t + m.b + asc) DIV 2;\r\t\tw[0] := (r - l) DIV 2; w[1] := r - l; w[2] := (r - l) DIV 3; w[3] := (r - l) * 2 DIV 3;\r\t\tCASE m.kind OF\r\t\t  rightToggle:\r\t\t\tIF rightFixed IN a.opts THEN\r\t\t\t\td := 0; y := (t + b) DIV 2 - point; e := (l + r) DIV 2 + point;\r\t\t\t\tWHILE t < y DO\r\t\t\t\t\tf.DrawLine(e - d, t, e, t, point, Ports.defaultColor); INC(d, point); INC(t, point)\r\t\t\t\tEND;\r\t\t\t\tWHILE t < b DO\r\t\t\t\t\tf.DrawLine(e - d, t, e, t, point, Ports.defaultColor); DEC(d, point); INC(t, point)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tDEC(b, point);\r\t\t\t\tf.DrawLine(l, t, r, t, point, Ports.defaultColor);\r\t\t\t\tf.DrawLine(l, b, r, b, point, Ports.defaultColor);\r\t\t\t\tf.DrawLine(l, t, l, b, point, Ports.defaultColor);\r\t\t\t\tf.DrawLine(r, t, r, b, point, Ports.defaultColor)\r\t\t\tEND\r\t\t| gridDec:\r\t\t\tWHILE t < b DO f.DrawLine(l, t, r, t, point, Ports.defaultColor); INC(t, 2 * point) END\r\t\t| gridVal:\r\t\t\tDrawCenteredInt(f, (l + r) DIV 2, y, a.grid DIV point)\r\t\t| gridInc:\r\t\t\tWHILE t < b DO f.DrawLine(l, t, r, t, point, Ports.defaultColor); INC(t, 3 * point) END\r\t\t| leftFlush:\r\t\t\ti := 0;\r\t\t\tWHILE t < b DO\r\t\t\t\td := w[i]; i := (i + 1) MOD LEN(w);\r\t\t\t\tf.DrawLine(l, t, l + d, t, point, Ports.defaultColor); INC(t, 2 * point)\r\t\t\tEND\r\t\t| centered:\r\t\t\ti := 0;\r\t\t\tWHILE t < b DO\r\t\t\t\td := (r - l - w[i]) DIV 2; i := (i + 1) MOD LEN(w);\r\t\t\t\tf.DrawLine(l + d, t, r - d, t, point, Ports.defaultColor); INC(t, 2 * point)\r\t\t\tEND\r\t\t| rightFlush:\r\t\t\ti := 0;\r\t\t\tWHILE t < b DO\r\t\t\t\td := w[i]; i := (i + 1) MOD LEN(w);\r\t\t\t\tf.DrawLine(r - d, t, r, t, point, Ports.defaultColor); INC(t, 2 * point)\r\t\t\tEND\r\t\t| justified:\r\t\t\tWHILE t < b DO f.DrawLine(l, t, r, t, point, Ports.defaultColor); INC(t, 2 * point) END\r\t\t| leadDec:\r\t\t\tf.DrawLine(l, t, l, t + point, point, Ports.defaultColor); INC(t, 2 * point);\r\t\t\tWHILE t < b DO f.DrawLine(l, t, r, t, point, Ports.defaultColor); INC(t, 2 * point) END\r\t\t| leadVal:\r\t\t\tDrawCenteredInt(f, (l + r) DIV 2, y, m.ruler.style.attr.lead DIV point)\r\t\t| leadInc:\r\t\t\tf.DrawLine(l, t, l, t + 3 * point, point, Ports.defaultColor); INC(t, 4 * point);\r\t\t\tWHILE t < b DO f.DrawLine(l, t, r, t, point, Ports.defaultColor); INC(t, 2 * point) END\r\t\t| pageBrk:\r\t\t\tDEC(b, point);\r\t\t\tIF pageBreak IN a.opts THEN\r\t\t\t\ty := (t + b) DIV 2 - point;\r\t\t\t\tf.DrawLine(l, t, l, y, point, Ports.defaultColor);\r\t\t\t\tf.DrawLine(r, t, r, y, point, Ports.defaultColor);\r\t\t\t\tf.DrawLine(l, y, r, y, point, Ports.defaultColor);\r\t\t\t\tINC(y, 2 * point);\r\t\t\t\tf.DrawLine(l, y, r, y, point, Ports.defaultColor);\r\t\t\t\tf.DrawLine(l, y, l, b, point, Ports.defaultColor);\r\t\t\t\tf.DrawLine(r, y, r, b, point, Ports.defaultColor)\r\t\t\tELSE\r\t\t\t\tf.DrawLine(l, t, l, b, point, Ports.defaultColor);\r\t\t\t\tf.DrawLine(r, t, r, b, point, Ports.defaultColor)\r\t\t\tEND\r\t\tELSE\r\t\t\t"
                    attr: 0
                  - text: HALT
                    attr: 4
                  - text: "(100)\r\t\tEND;\r\t\tIF ~(m.kind IN {gridVal, leadVal}) THEN\r\t\t\tDrawNiceRect(f, m.l, m.t, m.r, m.b)\r\t\tEND\r\tEND DrawMark;\r\r\tPROCEDURE GetMark (VAR m: Mark; r: StdRuler; f: Views.Frame;\r\t\tx, y: INTEGER; canCreate: BOOLEAN\r\t);\r\t"
                    attr: 0
                  - text: "(* pre: ~canCreate OR (f # NIL) *)"
                    attr: 1
                  - text: "\r\t\tVAR a: Attributes; px,  w, h: INTEGER; i: INTEGER;\r\tBEGIN\r\t\tm.kind := invalid; m.dirty := FALSE;\r\t\ta := r.style.attr;\r\t\tr.context.GetSize(w, h);\r\r\t\t"
                    attr: 0
                  - text: "(* first try scale *)"
                    attr: 1
                  - text: "\r\t\tTry(m, r, a.first, h, x, y, first, 0);\r\t\tTry(m, r, a.left, h, x, y, left, 0);\r\t\tIF rightFixed IN a.opts THEN\r\t\t\tTry(m, r, a.right, h, x, y, right, 0)\r\t\tEND;\r\t\ti := 0;\r\t\tWHILE (m.kind = invalid) & (i < a.tabs.len) DO\r\t\t\tTry(m, r, a.tabs.tab[i].stop, h, x, y, tabs, i);\r\t\t\tINC(i)\r\t\tEND;\r\t\tIF (m.kind = invalid) & (y >= h - tabBarHeight) & (a.tabs.len < maxTabs) THEN\r\t\t\ti := 0; px := TabGrid(x);\r\t\t\tWHILE (i < a.tabs.len) & (a.tabs.tab[i].stop < px) DO INC(i) END;\r\t\t\tIF (i = 0) OR (px - a.tabs.tab[i - 1].stop >= minTabWidth) THEN\r\t\t\t\tIF (i = a.tabs.len) OR (a.tabs.tab[i].stop - px >= minTabWidth) THEN\r\t\t\t\t\tIF canCreate THEN\t"
                    attr: 0
                  - text: "(* set new tab stop, initially at end of list *)"
                    attr: 1
                  - text: "\r\t\t\t\t\t\tm.kind := tabs; m.index := a.tabs.len; m.dirty := TRUE;\r\t\t\t\t\t\tCopyTabs(a.tabs, m.tabs); m.tabs.len := a.tabs.len + 1;\r\t\t\t\t\t\tm.tabs.tab[a.tabs.len].stop := px; m.tabs.tab[a.tabs.len].type := {};\r\t\t\t\t\t\ta.tabs.tab[a.tabs.len].stop := px; a.tabs.tab[a.tabs.len].type := {};\r\t\t\t\t\t\tSetMark(m, r, px, h, tabs, m.index); InvertMark(m, f, Ports.show);\r\t\t\t\t\t\tm.px0 := m.px; m.py0 := m.py; m.x := x; m.y := y\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND;\r\r\t\t"
                    attr: 0
                  - text: "(* next try icon bar *)"
                    attr: 1
                  - text: "\r\t\tpx := iconGap; i := firstIcon;\r\t\tWHILE i <= lastIcon DO\r\t\t\tIF i IN validIcons THEN\r\t\t\t\tTry(m, r, px, h - iconPin, x, y, i, 0)\r\t\t\tEND;\r\t\t\tINC(px, iconWidth + iconGap); INC(i)\r\t\tEND\r\tEND GetMark;\r\r\tPROCEDURE SelectMark (r: StdRuler; f: Views.Frame; IN m: Mark);\r\tBEGIN\r\t\tr.sel := m.kind; r.px := m.px; r.py := m.py\r\tEND SelectMark;\r\r\tPROCEDURE DeselectMark (r: StdRuler; f: Views.Frame);\r\tBEGIN\r\t\tHiliteThisMark(r, f, r.sel, Ports.hide); r.sel := invalid\r\tEND DeselectMark;\r\r\r\t"
                    attr: 0
                  - text: "(* mark interaction *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE Mode (r: StdRuler): INTEGER;\r\t\tVAR a: Attributes; i: INTEGER;\r\tBEGIN\r\t\ta := r.style.attr;\r\t\tIF a.opts * adjMask = {leftAdjust} THEN\r\t\t\ti := leftFlush\r\t\tELSIF a.opts * adjMask = {} THEN\r\t\t\ti := centered\r\t\tELSIF a.opts * adjMask = {rightAdjust} THEN\r\t\t\ti := rightFlush\r\t\tELSE "
                    attr: 0
                  - text: "(* a.opts * adjMask = adjMask *)"
                    attr: 1
                  - text: "\r\t\t\ti := justified\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " i\r\tEND Mode;\r\r\tPROCEDURE GrabMark (VAR m: Mark; r: StdRuler; f: Views.Frame; x, y: INTEGER);\r\tBEGIN\r\t\tGetMark(m, r, f, x, y, "
                    attr: 0
                  - text: "TRUE"
                    attr: 3
                  - text: ");\r\t\tDeselectMark(r, f);\r\t\tIF m.kind = Mode(r) THEN m.kind := invalid END\r\tEND GrabMark;\r\r\tPROCEDURE TrackMark (VAR m: Mark; f: Views.Frame; x, y: INTEGER; modifiers: SET);\r\t\tVAR px, py,  w, h: INTEGER;\r\tBEGIN\r\t\tIF m.kind # invalid THEN\r\t\t\tpx := m.px + x - m.x; py := m.py + y - m.y;\r\t\t\tIF m.kind = tabs THEN\r\t\t\t\tpx := TabGrid(px)\r\t\t\tELSIF m.kind IN validIcons THEN\r\t\t\t\tIF (m.l <= x) & (x < m.r) THEN px := 1 ELSE px := 0 END\r\t\t\tELSE\r\t\t\t\tpx := MarginGrid(px)\r\t\t\tEND;\r\t\t\tIF m.kind IN {right, tabs} THEN\r\t\t\t\tm.ruler.context.GetSize(w, h);\r\t\t\t\tIF (0 <= y) & (y < h + scaleHeight) OR (Controllers.extend IN modifiers) THEN \r\t\t\t\t\tpy := h\r\t\t\t\tELSE\r\t\t\t\t\tpy := -1\t"
                    attr: 0
                  - text: "(* moved mark out of ruler: delete tab stop or fixed right margin *)"
                    attr: 1
                  - text: "\r\t\t\t\tEND\r\t\t\tELSIF m.kind IN validIcons THEN\r\t\t\t\tIF (m.t <= y) & (y < m.b) THEN py := 1 ELSE py := 0 END\r\t\t\tELSE\r\t\t\t\tpy := MarginGrid(py)\r\t\t\tEND;\r\t\t\tIF (m.kind IN {right, tabs}) & ((m.px # px) OR (m.py # py)) THEN\r\t\t\t\tINC(m.x, px - m.px); INC(m.y, py - m.py);\r\t\t\t\tInvertMark(m, f, Ports.hide); SetMark(m, m.ruler, px, py, m.kind, m.index);\r\t\t\t\tInvertMark(m, f, Ports.show);\r\t\t\t\tm.dirty := TRUE\r\t\t\tELSIF (m.kind IN {first, left}) & (m.px # px) THEN\r\t\t\t\tINC(m.x, px - m.px);\r\t\t\t\tInvertMark(m, f, Ports.hide); SetMark(m, m.ruler, px, m.py, m.kind, m.index);\r\t\t\t\tInvertMark(m, f, Ports.show)\r\t\t\tELSIF (m.kind IN validIcons) & (m.px * m.py # px * py) THEN\r\t\t\t\tHiliteMark(m, f, Ports.show);\r\t\t\t\tIF m.kind IN modeIcons THEN HiliteThisMark(m.ruler, f, Mode(m.ruler), Ports.hide) END;\r\t\t\t\tm.px := px; m.py := py\r\t\t\tEND\r\t\tEND\r\tEND TrackMark;\r\r\tPROCEDURE ShiftMarks (a: Attributes; p: Prop; mask: SET; x0, dx: INTEGER);\r\t\tVAR new: SET; i, j, t0, t1: INTEGER; tab0, tab1: TabArray;\r\tBEGIN\r\t\tnew := mask - p.valid;\r\t\tIF first IN new THEN p.first := a.first END;\r\t\tIF tabs IN new THEN CopyTabs(a.tabs, p.tabs) END;\r\t\tp.valid := p.valid + mask;\r\t\tIF first IN mask THEN INC(p.first, dx) END;\r\t\tIF tabs IN mask THEN\r\t\t\ti := 0;\r\t\t\tWHILE (i < p.tabs.len) & (p.tabs.tab[i].stop < x0) DO tab0.tab[i] := p.tabs.tab[i]; INC(i) END;\r\t\t\tt0 := i;\r\t\t\tt1 := 0;\r\t\t\tWHILE i < p.tabs.len DO\r\t\t\t\ttab1.tab[t1].stop := p.tabs.tab[i].stop + dx;\r\t\t\t\ttab1.tab[t1].type := p.tabs.tab[i].type;\r\t\t\t\tINC(t1); INC(i)\r\t\t\tEND;\r\t\t\ti := 0; j := 0; p.tabs.len := 0;\r\t\t\tWHILE i < t0 DO\t"
                    attr: 0
                  - text: "(* merge sort *)"
                    attr: 1
                  - text: "\r\t\t\t\tWHILE (j < t1) & (tab1.tab[j].stop < tab0.tab[i].stop) DO\r\t\t\t\t\tp.tabs.tab[p.tabs.len] := tab1.tab[j]; INC(p.tabs.len); INC(j)\r\t\t\t\tEND;\r\t\t\t\tIF (j < t1) & (tab1.tab[j].stop = tab0.tab[i].stop) THEN INC(j) END;\r\t\t\t\tp.tabs.tab[p.tabs.len] := tab0.tab[i]; INC(p.tabs.len); INC(i)\r\t\t\tEND;\r\t\t\tWHILE j < t1 DO\r\t\t\t\tp.tabs.tab[p.tabs.len] := tab1.tab[j]; INC(p.tabs.len); INC(j)\r\t\t\tEND\r\t\tEND\r\tEND ShiftMarks;\r\r\tPROCEDURE ShiftDependingMarks (VAR m: Mark; p: Prop);\r\t\tVAR a: Attributes; dx: INTEGER;\r\tBEGIN\r\t\ta := m.ruler.style.attr; dx := m.px - m.px0;\r\t\tCASE m.kind OF\r\t\t  first: ShiftMarks(a, p, {tabs}, 0, dx)\r\t\t| left: ShiftMarks(a, p, {first, tabs}, 0, dx)\r\t\t| tabs: ShiftMarks(a, p, {tabs}, m.px0, dx)\r\t\tELSE\r\t\tEND\r\tEND ShiftDependingMarks;\r\r\tPROCEDURE AdjustMarks (VAR m: Mark; f: Views.Frame; modifiers: SET);\r\t\tVAR r: StdRuler; a: Attributes; p: Prop;\r\t\t\tg: INTEGER; i, j: INTEGER; shift: BOOLEAN; type: SET;\r\tBEGIN\r\t\tr := m.ruler;\r\t\tIF  (m.kind # invalid) & (m.kind IN validIcons)\r\t\t\t\t& (m.px = 1) & (m.py = 1)\r\t\tOR (m.kind # invalid) & ~(m.kind IN validIcons)\r\t\t\t\t& ((m.px # m.px0) OR (m.py # m.py0)\r\t\t\t\t\t"
                    attr: 0
                  - text: "OR (m.kind = tabs) (*(m.tabs.len # r.style.attr.tabs.len)*)"
                    attr: 3
                  - text: " )\r\t\tTHEN\r\t\t\ta := r.style.attr; NEW(p);\r\t\t\tp.valid := {};\r\t\t\tshift := (Controllers.modify IN modifiers) & (m.tabs.len = r.style.attr.tabs.len);\r\t\t\tCASE m.kind OF\r\t\t\t  first:\r\t\t\t\tp.valid := {first}; p.first := m.px\r\t\t\t| left:\r\t\t\t\tp.valid := {left}; p.left := m.px\r\t\t\t| right:\r\t\t\t\tIF m.py >= 0 THEN\r\t\t\t\t\tp.valid := {right}; p.right := m.px\r\t\t\t\tELSE\r\t\t\t\t\tp.valid := {opts}; p.opts.val := {}; p.opts.mask := {rightFixed}\r\t\t\t\tEND\r\t\t\t| tabs:\r\t\t\t\tIF ~m.dirty THEN\r\t\t\t\t\tp.valid := {tabs}; CopyTabs(m.tabs, p.tabs);\r\t\t\t\t\ti := m.index; type := m.tabs.tab[i].type;\r\t\t\t\t\tIF shift THEN\r\t\t\t\t\t\ttype := type * {barTab};\r\t\t\t\t\t\tIF type = {} THEN type := {barTab}\r\t\t\t\t\t\tELSE type := {}\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tp.tabs.tab[i].type := p.tabs.tab[i].type - {barTab} + type\r\t\t\t\t\tELSE\r\t\t\t\t\t\ttype := type * {centerTab, rightTab};\r\t\t\t\t\t\tIF type = {} THEN type := {centerTab}\r\t\t\t\t\t\tELSIF type = {centerTab} THEN type := {rightTab}\r\t\t\t\t\t\tELSE type := {}\r\t\t\t\t\t\tEND;\r\t\t\t\t\t\tp.tabs.tab[i].type := p.tabs.tab[i].type - {centerTab, rightTab} + type\r\t\t\t\t\tEND\r\t\t\t\tELSIF ~shift THEN\r\t\t\t\t\tp.valid := {tabs}; p.tabs.len := m.tabs.len - 1;\r\t\t\t\t\ti := 0;\r\t\t\t\t\tWHILE i < m.index DO p.tabs.tab[i] := m.tabs.tab[i]; INC(i) END;\r\t\t\t\t\tINC(i);\r\t\t\t\t\tWHILE i < m.tabs.len DO p.tabs.tab[i - 1] := m.tabs.tab[i]; INC(i) END;\r\t\t\t\t\ti := 0;\r\t\t\t\t\tWHILE (i < p.tabs.len) & (p.tabs.tab[i].stop < m.px) DO INC(i) END;\r\t\t\t\t\tIF (m.px >= MIN(a.first, a.left)) & (m.px <= f.r) & (m.py >= 0)\r\t\t\t\t\t & ((i = 0) OR (m.px - p.tabs.tab[i - 1].stop >= minTabWidth))\r\t\t\t\t\t & ((i = p.tabs.len) OR (p.tabs.tab[i].stop - m.px >= minTabWidth)) THEN\r\t\t\t\t\t\tj := p.tabs.len;\r\t\t\t\t\t\tWHILE j > i DO p.tabs.tab[j] := p.tabs.tab[j - 1]; DEC(j) END;\r\t\t\t\t\t\tp.tabs.tab[i].stop := m.px; p.tabs.tab[i].type := m.tabs.tab[m.index].type;\r\t\t\t\t\t\tINC(p.tabs.len)\r\t\t\t\t\tEND;\r\t\t\t\t\ti := 0;\r\t\t\t\t\tWHILE (i < p.tabs.len)\r\t\t\t\t\t & (p.tabs.tab[i].stop = a.tabs.tab[i].stop)\r\t\t\t\t\t & (p.tabs.tab[i].type = a.tabs.tab[i].type) DO\r\t\t\t\t\t\tINC(i)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF (i = p.tabs.len) & (p.tabs.len = a.tabs.len) THEN "
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " END\t"
                    attr: 0
                  - text: "(* did not change *)"
                    attr: 1
                  - text: "\r\t\t\t\tEND\r\t\t\t| rightToggle:\r\t\t\t\tp.valid := {right, opts};\r\t\t\t\tIF ~(rightFixed IN a.opts) THEN\r\t\t\t\t\tp.right := f.r DIV marginGrid * marginGrid\r\t\t\t\tEND;\r\t\t\t\tp.opts.val := a.opts / {rightFixed}; p.opts.mask := {rightFixed}\r\t\t\t| gridDec:\r\t\t\t\tp.valid := {asc, grid}; g := a.grid - point;\r\t\t\t\tIF g = 0 THEN p.grid := 1; p.asc := 0 ELSE p.grid := g; p.asc := g - a.dsc END\r\t\t\t| gridVal:\r\t\t\t\tSelectMark(r, f, m); "
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: "\r\t\t\t| gridInc:\r\t\t\t\tp.valid := {asc, grid}; g := a.grid + point; DEC(g, g MOD point);\r\t\t\t\tp.grid := g; p.asc := g - a.dsc\r\t\t\t| leftFlush:\r\t\t\t\tp.valid := {opts}; p.opts.val := {leftAdjust}; p.opts.mask := adjMask\r\t\t\t| centered:\r\t\t\t\tp.valid := {opts}; p.opts.val := {}; p.opts.mask := adjMask\r\t\t\t| rightFlush:\r\t\t\t\tp.valid := {opts}; p.opts.val := {rightAdjust}; p.opts.mask := adjMask\r\t\t\t| justified:\r\t\t\t\tp.valid := {opts}; p.opts.val := adjMask; p.opts.mask := adjMask\r\t\t\t| leadDec:\r\t\t\t\tp.valid := {lead}; p.lead := a.lead - point\r\t\t\t| leadVal:\r\t\t\t\tSelectMark(r, f, m); "
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: "\r\t\t\t| leadInc:\r\t\t\t\tp.valid := {lead}; p.lead := a.lead + point\r\t\t\t| pageBrk:\r\t\t\t\tp.valid := {opts}; p.opts.val := a.opts / {pageBreak}; p.opts.mask := {pageBreak}\r\t\t\tELSE "
                    attr: 0
                  - text: HALT
                    attr: 4
                  - text: "(100)\r\t\t\tEND;\r\t\t\tIF shift THEN ShiftDependingMarks(m, p) END;\r\t\t\tIF m.kind IN validIcons - modeIcons THEN HiliteMark(m, f, Ports.hide) END;\r\r\t\t\tr.style.SetAttr(ModifiedAttr(a, p))\r\t\tEND\r\tEND AdjustMarks;\r\r\r\t"
                    attr: 0
                  - text: "(* primitivies for standard ruler *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE Track (r: StdRuler; f: Views.Frame; IN msg: Controllers.TrackMsg);\r\t\tVAR m: Mark; x, y, res: INTEGER; modifiers: SET; isDown: BOOLEAN;\r\t\t\tcmd: ARRAY 128 OF CHAR;\r\tBEGIN\r\t\tGrabMark(m, r, f, msg.x, msg.y);\r\t\tREPEAT\r\t\t\tf.Input(x, y, modifiers, isDown); TrackMark(m, f, x, y, modifiers)\r\t\tUNTIL ~isDown;\r\t\tAdjustMarks(m, f, modifiers);\r\t\tIF Controllers.doubleClick IN msg.modifiers THEN\r\t\t\tCASE m.kind OF\r\t\t\t| invalid:\r\t\t\t\tDialog.MapString(\"#Text:OpenRulerDialog\", cmd); Dialog.Call(cmd, \"\", res)\r\t\t\t| gridVal, leadVal:\r\t\t\t\tDialog.MapString(\"#Text:OpenSizeDialog\", cmd); Dialog.Call(cmd, \"\", res)\r\t\t\tELSE\r\t\t\tEND\r\t\tEND\r\tEND Track;\r\r\tPROCEDURE Edit (r: StdRuler; f: Views.Frame; VAR msg: Controllers.EditMsg);\r\t\tVAR v: Views.View;\r\tBEGIN\r\t\tCASE msg.op OF\r\t\t  Controllers.copy:\r\t\t\tmsg.view := Views.CopyOf(r, Views.deep);\r\t\t\tmsg.isSingle := TRUE\r\t\t| Controllers.paste:\r\t\t\tv := msg.view;\r\t\t\tWITH v: Ruler DO r.style.SetAttr(v.style.attr) ELSE END\r\t\tELSE\r\t\tEND\r\tEND Edit;\r\r\tPROCEDURE PollOps (r: StdRuler; f: Views.Frame; VAR msg: Controllers.PollOpsMsg);\r\tBEGIN\r\t\tmsg.type := \"TextRulers.Ruler\";\r\t\tmsg.pasteType := \"TextRulers.Ruler\";\r\t\tmsg.selectable := FALSE;\r\t\tmsg.valid := {Controllers.copy, Controllers.paste}\r\tEND PollOps;\r\r\tPROCEDURE SetProp (r: StdRuler; VAR msg: Properties.SetMsg; VAR requestFocus: BOOLEAN);\r\t\tVAR a1: Attributes; px, py, g: INTEGER; sel: INTEGER;\r\t\t\tp: Properties.Property; sp: Properties.StdProp; rp: Prop;\r\tBEGIN\r\t\tp := msg.prop; sel := r.sel; px := r.px; py := r.py;\r\t\tIF sel # invalid THEN\r\t\t\tWHILE (p # NIL) & ~(p IS Properties.StdProp) DO p := p.next END;\r\t\t\tIF p # NIL THEN\r\t\t\t\tsp := p(Properties.StdProp);\r\t\t\t\tIF (r.sel = leadVal) & (Properties.size IN sp.valid) THEN\r\t\t\t\t\tNEW(rp); rp.valid := {lead};\r\t\t\t\t\trp.lead := sp.size\r\t\t\t\tELSIF (r.sel = gridVal) & (Properties.size IN sp.valid) THEN\r\t\t\t\t\tg := sp.size; DEC(g, g MOD point);\r\t\t\t\t\tNEW(rp); rp.valid := {asc, grid};\r\t\t\t\t\tIF g = 0 THEN rp.asc := 0; rp.grid := 1\r\t\t\t\t\tELSE rp.asc := g - r.style.attr.dsc; rp.grid := g\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\t\trp := NIL\r\t\t\t\tEND\r\t\t\tEND;\r\t\t\tp := rp\r\t\tEND;\r\t\ta1 := ModifiedAttr(r.style.attr, p);\r\t\tIF ~a1.Equals(r.style.attr) THEN\r\t\t\tr.style.SetAttr(a1);\r\t\t\tIF requestFocus & (r.sel = invalid) THEN\t"
                    attr: 0
                  - text: "(* restore mark selection *)"
                    attr: 1
                  - text: "\r\t\t\t\tr.sel := sel; r.px := px; r.py := py \r\t\t\tEND\r\t\tELSE requestFocus := FALSE\r\t\tEND\r\tEND SetProp;\r\r\tPROCEDURE PollProp (r: StdRuler; VAR msg: Properties.PollMsg);\r\t\tVAR p: Properties.StdProp;\r\tBEGIN\r\t\tCASE r.sel OF\r\t\t  invalid:\r\t\t\tmsg.prop := r.style.attr.Prop()\r\t\t| leadVal:\r\t\t\tNEW(p); p.known := {Properties.size}; p.valid := p.known;\r\t\t\tp.size := r.style.attr.lead;\r\t\t\tmsg.prop := p\r\t\t| gridVal:\r\t\t\tNEW(p); p.known := {Properties.size}; p.valid := p.known;\r\t\t\tp.size := r.style.attr.grid;\r\t\t\tmsg.prop := p\r\t\tELSE "
                    attr: 0
                  - text: HALT
                    attr: 4
                  - text: "(100)\r\t\tEND\r\tEND PollProp;\r\r\r\t"
                    attr: 0
                  - text: "(* StdStyle *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (r: StdStyle) Internalize (VAR rd: Stores.Reader);\r\t\tVAR thisVersion: INTEGER;\r\tBEGIN\r\t\tr.Internalize^(rd);\r\t\tIF rd.cancelled THEN "
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " END;\r\t\trd.ReadVersion(minVersion, maxStdStyleVersion, thisVersion)\r\tEND Internalize;\r\r\tPROCEDURE (r: StdStyle) Externalize (VAR wr: Stores.Writer);\r\tBEGIN\r\t\tr.Externalize^(wr);\r\t\twr.WriteVersion(maxStdStyleVersion)\r\tEND Externalize;\r(*\t\r\tPROCEDURE (r: StdStyle) CopyFrom (source: Stores.Store);\r\tBEGIN\r\t\tr.SetAttr(source(StdStyle).attr)\r\tEND CopyFrom;\r*)\r\r\t"
                    attr: 0
                  - text: "(* StdRuler *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (r: StdRuler) Internalize (VAR rd: Stores.Reader);\r\t\tVAR thisVersion: INTEGER;\r\tBEGIN\r\t\tr.Internalize^(rd);\r\t\tIF rd.cancelled THEN "
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " END;\r\t\trd.ReadVersion(minVersion, maxStdRulerVersion, thisVersion);\r\t\tIF rd.cancelled THEN "
