                  - text: "* (): Setter, NEW, ABSTRACT;\r\r\r\t"
                    attr: 0
                  - text: "(* line box cache *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE InitCache;\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\tnextKey := 1; boxIndex := 0; seqIndex := 0;\r\t\ti := 0; WHILE i < boxCacheLen DO boxCache[i].key := -1; INC(i) END;\r\t\ti := 0; WHILE i < seqCacheLen DO seqCache[i].key := -1; INC(i) END\r\tEND InitCache;\r\r\tPROCEDURE ClearCache (key: INTEGER);\r\t\tVAR i, j: INTEGER;\r\tBEGIN\r\t\ti := 0; j := boxIndex;\r\t\tWHILE i < boxCacheLen DO\r\t\t\tIF boxCache[i].key = key THEN boxCache[i].key := -1; j := i END;\r\t\t\tINC(i)\r\t\tEND;\r\t\tboxIndex := j;\r\t\ti := 0; j := seqIndex;\r\t\tWHILE i < seqCacheLen DO\r\t\t\tIF seqCache[i].key = key THEN seqCache[i].key := -1; j := i END;\r\t\t\tINC(i)\r\t\tEND;\r\t\tseqIndex := j\r\tEND ClearCache;\r\r\r\tPROCEDURE CacheIndex (key, start: INTEGER): INTEGER;\r\t\tVAR i: INTEGER;\r\tBEGIN\rRETURN -1;\r\t\ti := 0;\r\t\tWHILE (i < boxCacheLen) & ~((boxCache[i].key = key) & (boxCache[i].start = start)) DO\r\t\t\tINC(i)\r\t\tEND;\r\t\tIF i = boxCacheLen THEN i := -1 END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " i\r\tEND CacheIndex;\r\r\tPROCEDURE GetFromCache (s: StdSetter; i: INTEGER; VAR l: LineBox);\r\tBEGIN\r\t\tl := boxCache[i].line;\r\t\tIF ~cachedRulers THEN\r\t\t\tIF l.rpos >= 0 THEN\r\t\t\t\ts.r := s.text.NewReader(s.r); s.r.SetPos(l.rpos); s.r.Read;\r\t\t\t\tl.ruler := s.r.view(TextRulers.Ruler)\r\t\t\tELSE l.ruler := s.defRuler\r\t\t\tEND\r\t\tEND\r\tEND GetFromCache;\r\r\tPROCEDURE AddToCache (key, start: INTEGER; VAR l: LineBox);\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\ti := boxIndex; boxIndex := (i + 1) MOD boxCacheLen;\r\t\tboxCache[i].key := key; boxCache[i].start := start; boxCache[i].line := l;\r\t\tIF ~cachedRulers THEN\r\t\t\tboxCache[i].line.ruler := NIL\r\t\tEND\r\tEND AddToCache;\r\r\r\tPROCEDURE CachedSeqStart (key, pos: INTEGER): INTEGER;\r\t\tVAR start: INTEGER; i: INTEGER;\r\tBEGIN\r\t\ti := 0;\r\t\tWHILE (i < seqCacheLen)\r\t\t& ~((seqCache[i].key = key) & (seqCache[i].start <= pos) & (pos <= seqCache[i].pos)) DO\r\t\t\tINC(i)\r\t\tEND;\r\t\tIF i < seqCacheLen THEN start := seqCache[i].start ELSE start := -1 END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " start\r\tEND CachedSeqStart;\r\r\tPROCEDURE AddSeqStartToCache (key, pos, start: INTEGER);\r\t\tVAR i: INTEGER;\r\tBEGIN\r\t\ti := 0;\r\t\tWHILE (i < seqCacheLen) & ~((seqCache[i].key = key) & (seqCache[i].start = start)) DO\r\t\t\tINC(i)\r\t\tEND;\r\t\tIF i < seqCacheLen THEN\r\t\t\tIF seqCache[i].pos < pos THEN seqCache[i].pos := pos END\r\t\tELSE\r\t\t\ti := seqIndex; seqIndex := (i + 1) MOD seqCacheLen;\r\t\t\tseqCache[i].key := key; seqCache[i].pos := pos; seqCache[i].start := start\r\t\tEND\r\tEND AddSeqStartToCache;\r\r\r\t"
                    attr: 0
