                    attr: 4
                  - text: "*;\r\t\tVAR msg: Controllers.EditMsg;\r\tBEGIN\r\t\tmsg.op := Controllers.pasteChar; msg.char := digitspace;\r\t\tControllers.Forward(msg)\r\tEND InsertDigitSpace;\r\r\r\tPROCEDURE GetFindPattern (c: TextControllers.Controller);\r\t\tVAR r: TextModels.Reader; beg, end: INTEGER; i: INTEGER; ch: CHAR;\r\t\t\tnew: ARRAY maxPat OF CHAR;\r\tBEGIN\r\t\tIF (c # NIL) & c.HasSelection() THEN\r\t\t\tc.GetSelection(beg, end);\r\t\t\tr := c.text.NewReader(NIL); r.SetPos(beg); r.ReadChar(ch); i := 0;\r\t\t\tWHILE (r.Pos() <= end) & (i < maxPat - 1) DO\r\t\t\t\tnew[i] := ch; INC(i); r.ReadChar(ch)\r\t\t\tEND;\r\t\t\tnew[i] := 0X;\r\t\t\tIF (new # \"\") & (new # find.find) THEN\r\t\t\t\tfind.find := new$;\r\t\t\t\tfind.ignoreCase := FALSE;\r\t\t\t\tfind.wordBeginsWith := FALSE; find.wordEndsWith := FALSE;\r\t\t\t\tDialog.Update(find)\r\t\t\tEND\r\t\tEND\r\tEND GetFindPattern;\r\r\tPROCEDURE FindIn (c: TextControllers.Controller; first: BOOLEAN; option: ARRAY OF CHAR);\r\t\tVAR spec: FindSpec; beg, end: INTEGER;\r\tBEGIN\r\t\tIF c # NIL THEN\r\t\t\tIF find.find # \"\" THEN\r\t\t\t\tSetFindSpec(c, first, option, spec);\r\t\t\t\tFindPat(c.text, spec, beg, end);\r\t\t\t\tIF end > beg THEN Show(c.text, beg, end) ELSE NoShow(c.text, 0); Dialog.Beep END\r\t\t\tELSE Dialog.ShowMsg(noPatternKey)\r\t\t\tEND\r\t\tELSE Dialog.ShowMsg(noTargetKey)\r\t\tEND\r\tEND FindIn;\r\r\r\tPROCEDURE "
