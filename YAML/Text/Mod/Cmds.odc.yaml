                  - text: "*;\r\t\tVAR q, p0: Properties.Property; p: TextModels.Prop;\r\tBEGIN\r\t\tProperties.CollectProp(q);\r\t\tp0 := q; WHILE (p0 # NIL) & ~(p0 IS TextModels.Prop) DO p0 := p0.next END;\r\t\tNEW(p); p.valid := {TextModels.offset};\r\t\tIF (p0 # NIL) & (TextModels.offset IN p0.valid) THEN\r\t\t\tp.offset := p0(TextModels.Prop).offset + point\r\t\tELSE p.offset := point\r\t\tEND;\r\t\tProperties.EmitProp(NIL, p)\r\tEND Superscript;\r\r\r\tPROCEDURE ForceToNewLine (c: TextControllers.Controller);\r\t\tVAR st: TextSetters.Setter; pos, start: INTEGER; msg: Controllers.EditMsg;\r\tBEGIN\r\t\tIF c.HasCaret() THEN\r\t\t\tpos := c.CaretPos();\r\t\t\tst := c.view.ThisSetter(); start := st.ThisLine(pos);\r\t\t\tIF pos # start THEN\r\t\t\t\tmsg.op := Controllers.pasteChar; msg.char := line;\r\t\t\t\tControllers.Forward(msg)\r\t\t\tEND\r\t\tEND\r\tEND ForceToNewLine;\r\r\tPROCEDURE "
