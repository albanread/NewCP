                  - text: "(* could eliminate ReplList/ReplOp and use Models.Begin/EndScript instead (as already done for shifting) *)\r(* move ListAlienViews to StdCmds and generalize accordingly? *)\r"
                    attr: 3
                  - text: "\r\r\tIMPORT\r\t\tStrings, Ports, Stores, Models, Views, Controllers, Properties, Dialog, Containers,\r\t\tTextModels, TextMappers, TextRulers, TextSetters, TextViews, TextControllers;\r\r\tCONST\r\t\t"
                    attr: 0
                  - text: "(* ShiftOp.left *)"
                    attr: 1
                  - text: "\r\t\tleft = TRUE; right = FALSE;\r\r\t\t"
                    attr: 0
                  - text: "(* PreparePat, FindPat *)"
                    attr: 1
                  - text: "\r\t\tleftTerm = 3X; rightTerm = 4X;\r\r\t\t"
                    attr: 0
                  - text: "(* DoReplace mode *)"
                    attr: 1
                  - text: "\r\t\treplace = 0; replaceAndFind = 1; replaceAll = 2;\r\r\t\t"
                    attr: 0
                  - text: "(* FindIn first *)"
                    attr: 1
                  - text: "\r\t\tfirst = TRUE; again = FALSE;\r\r\t\tmm = Ports.mm; point = Ports.point; maxPat = 256;\r\t\tviewcode = TextModels.viewcode;\r\t\ttab = TextModels.tab; line = TextModels.line; para = TextModels.para;\r\t\tnbspace = TextModels.nbspace; digitspace = TextModels.digitspace;\r\t\thyphen = TextModels.hyphen;\r\t\tnbhyphen = TextModels.nbhyphen; softhyphen = TextModels.softhyphen;\r\r\t\tposKey = \"#Text:Position\";\r\t\tsearchAliensKey = \"#Text:SearchForAlienViews\";\t"
                    attr: 0
                  - text: "(* dormant code option *)"
                    attr: 1
                  - text: "\r\t\talienTypeKey = \"#Text:AlienViewType\";\r\t\tnoAliensKey = \"#Text:NoAlienViewsFound\";\r\t\tnoRulerKey = \"#Text:NoRulerSelected\";\r\t\tnoMatchKey = \"#Text:SelectionDoesNotMatch\";\r\t\tnoTargetKey = \"#Text:NoTargetFound\";\r\t\tnoSelectionKey = \"#Text:NoSelectionFound\";\r\t\tnoPatternKey = \"#Text:PatternNotSpecified\";\r\t\tnotFoundKey = \"#Text:PatternNotFound\";\t"
                    attr: 0
                  - text: "(* not used *)"
                    attr: 1
                  - text: "\r\t\treplacingKey = \"#System:Replacing\";\r\t\tshiftingKey = \"#Text:Shifting\";\r\t\tshowMarksKey = \"#Text:ShowMarks\";\r\t\thideMarksKey = \"#Text:HideMarks\";\r\t\treplaceSelectionKey = \"#Text:ReplaceAllInSelection\";\r\t\treplaceAllKey = \"#Text:ReplaceAll\";\r\r\r\tTYPE\r\t\tFindSpec = RECORD\r\t\t\tvalid, ignoreCase, wordBeginsWith, wordEndsWith, reverse: BOOLEAN;\r\t\t\tstart: INTEGER;\r\t\t\tfind: ARRAY maxPat OF CHAR\r\t\tEND;\r\r\t\tReplList = POINTER TO RECORD\r\t\t\tnext: ReplList;\r\t\t\tbeg, end: INTEGER;\r\t\t\tbuf: TextModels.Model\r\t\tEND;\r\r\t\tReplOp = POINTER TO RECORD (Stores.Operation)\r\t\t\ttext: TextModels.Model;\r\t\t\tlist, last: ReplList;\r\t\t\tfind: FindSpec\r\t\tEND;\r\r\r\tVAR\r\t\t"
                    attr: 0
                  - text: find
                    attr: 3
                  - text: "*: RECORD\r\t\t\tfind*: ARRAY maxPat OF CHAR;\r\t\t\treplace*: ARRAY maxPat OF CHAR;\r\t\t\tignoreCase*, wordBeginsWith*, wordEndsWith*: BOOLEAN;\r\t\t\treverseOrientation*: BOOLEAN\r\t\tEND;\r\r\t\t"
                    attr: 0
                  - text: ruler
                    attr: 3
                  - text: "*: RECORD\r\t\t\tpageBreaks*: RECORD\r\t\t\t\tnotInside*, joinPara*: BOOLEAN\r\t\t\tEND\r\t\tEND;\r\r\r\tPROCEDURE Show (t: TextModels.Model; beg, end: INTEGER);\r\tBEGIN\r\t\tTextViews.ShowRange(t, beg, end, TextViews.focusOnly);\r\t\tIF beg = end THEN\r\t\t\tTextControllers.SetCaret(t, beg)\r\t\tELSE\r\t\t\tTextControllers.SetSelection(t, beg, end)\r\t\tEND\r\tEND Show;\r\r\tPROCEDURE NoShow (t: TextModels.Model; pos: INTEGER);\r\tBEGIN\r\t\tTextControllers.SetSelection(t, pos, pos);\r\t\tTextControllers.SetCaret(t, pos)\r\tEND NoShow;\r\r\tPROCEDURE Ruler (): TextRulers.Ruler;\r\t\tVAR r: TextRulers.Ruler;\r\tBEGIN\r\t\tr := TextRulers.dir.New(NIL);\r\t\tTextRulers.AddTab(r, 4*mm); TextRulers.AddTab(r, 20*mm);\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " r\r\tEND Ruler;\r\r\r\t"
                    attr: 0
                  - text: "(* search & replace *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE LeftTerminator (ch: CHAR): BOOLEAN;\r\tBEGIN\r\t\tIF ch < 100X THEN\r\t\t\tCASE ch OF\r\t\t\t\tviewcode, tab, line, para, \" \",\r\t\t\t\t\"(\", \"[\", \"{\", \"=\",\r\t\t\t\thyphen, softhyphen: "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE\r\t\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE\r\t\t\tEND\r\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE\r\t\tEND\r\tEND LeftTerminator;\r\r\tPROCEDURE RightTerminator (ch: CHAR): BOOLEAN;\r\tBEGIN\r\t\tIF ch < 100X THEN\r\t\t\tCASE ch OF\r\t\t\t\t0X, viewcode, tab, line, para, \" \",\r\t\t\t\t\"!\", \"(\", \")\", \",\", \".\", \":\", \";\", \"?\", \"[\", \"]\", \"{\", \"}\",\r\t\t\t\thyphen, softhyphen: "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE\r\t\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE\r\t\t\tEND\r\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " TRUE\r\t\tEND\r\tEND RightTerminator;\r\r\tPROCEDURE PreparePat (spec: FindSpec;\r\t\t\t\t\t\t\t\tVAR pat: ARRAY OF CHAR; VAR n: INTEGER;\r\t\t\t\t\t\t\t\tVAR wordBeg, wordEnd: BOOLEAN);\r\t\tVAR i: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ti := 0; ch := spec.find[0];\r\t\twordBeg := spec.wordBeginsWith & ~LeftTerminator(ch);\r\t\tIF wordBeg THEN pat[0] := leftTerm; n := 1 ELSE n := 0 END;\r\t\tWHILE ch # 0X DO\r\t\t\tIF ch # softhyphen THEN\r\t\t\t\tIF spec.ignoreCase THEN pat[n] := Strings.Upper(ch) ELSE pat[n] := ch END;\r\t\t\t\tINC(n)\r\t\t\tEND;\r\t\t\tINC(i); ch := spec.find[i]\r\t\tEND;\r\t\twordEnd := spec.wordEndsWith & ~RightTerminator(pat[n - 1]);\r\t\tIF wordEnd THEN pat[n] := rightTerm; INC(n) END\r\tEND PreparePat;\r\r\tPROCEDURE FindPat (t: TextModels.Model; spec: FindSpec; VAR beg, end: INTEGER);\r\t"
                    attr: 0
                  - text: "(* post: beg < end => t[beg, end) = spec.find, start <= beg; else beg = end *)"
                    attr: 1
                  - text: "\r\t\tVAR r: TextModels.Reader; start: INTEGER;\r\t\t\ti, j, b, e, n: INTEGER; ch0, ch, ch1: CHAR; wordBeg, wordEnd, icase: BOOLEAN;\r\t\t\tpat, ref: ARRAY maxPat OF CHAR;\t"
                    attr: 0
                  - text: "(* ref [b..e) is readback buffer *)"
                    attr: 1
                  - text: "\r\t\t\tpos0, pos1, absStart: INTEGER;\r\t\t\torientation: INTEGER;\r\tBEGIN\r\t\tIF spec.reverse THEN\r\t\t\torientation := -1; absStart := t.Length();\r\t\t\tPreparePat(spec, ref, n, wordEnd, wordBeg);\r\t\t\ti := n; j := 0; REPEAT DEC(i); pat[j] := ref[i]; INC(j) UNTIL i = 0\t(* Just reverse the pattern... *)\r\t\tELSE\r\t\t\torientation := 1; absStart := 0;\r\t\t\tPreparePat(spec, pat, n, wordBeg, wordEnd)\r\t\tEND;\r\t\tstart := spec.start; icase := spec.ignoreCase;\r\t\tr := t.NewReader(NIL); i := 0;\r\t\tIF wordBeg THEN\r\t\t\tIF start # absStart THEN\r\t\t\t\tDEC(start, orientation)\r\t\t\tELSE\r\t\t\t\tr.SetPos(absStart);\r\t\t\t\tIF spec.reverse THEN r.ReadPrevChar(ch) ELSE r.ReadChar(ch) END;\r\t\t\t\tIF ~LeftTerminator(ch) THEN i := 1 END\r\t\t\tEND\r\t\tEND;\r\t\tr.SetPos(start); IF spec.reverse THEN r.ReadPrevChar(ch) ELSE r.ReadChar(ch) END;\r\t\tpos0 := start; pos1 := start;\r\t\tIF icase THEN ch := Strings.Upper(ch) END;\r\t\tref[0] := ch; ch0 := ch; j := 0; b := 0; e := 1;\r\t\tWHILE ~r.eot & (i < n) DO\r\t\t\tch1 := pat[i];\r\t\t\tIF (ch1 = ch)\r\t\t\tOR (ch1 = leftTerm) & LeftTerminator(ch)\r\t\t\tOR (ch1 = rightTerm) & RightTerminator(ch) THEN\r\t\t\t\tINC(i); j := (j + 1) MOD maxPat\r\t\t\tELSIF ch = softhyphen THEN\r\t\t\t\tj := (j + 1) MOD maxPat\r\t\t\tELSE\r\t\t\t\ti := 0; INC(pos0, orientation); b := (b + 1) MOD maxPat; j := b\r\t\t\tEND;\r\t\t\tIF j # e THEN\r\t\t\t\tch := ref[j]\r\t\t\tELSE\r\t\t\t\tINC(pos1, orientation);\r\t\t\t\tIF spec.reverse THEN r.ReadPrevChar(ch) ELSE r.ReadChar(ch) END;\r\t\t\t\tIF icase THEN ch := Strings.Upper(ch) END;\r\t\t\t\tref[j] := ch; e := (e + 1) MOD maxPat\r\t\t\tEND\r\t\tEND;\r\t\tIF wordEnd & ~((i + 1 = n) & r.eot) THEN DEC(pos1, orientation) END;\r\t\tIF (n > 0) & ((i = n) OR wordEnd & (i + 1 = n) & r.eot) THEN\r\t\t\tIF wordBeg & ((pos0 # absStart) OR LeftTerminator(ch0)) THEN INC(pos0, orientation) END\r\t\tELSE\r\t\t\tpos0 := pos1\r\t\tEND;\r\t\tIF spec.reverse THEN\r\t\t\tbeg := pos1; end := pos0\r\t\tELSE\r\t\t\tbeg := pos0; end := pos1\r\t\tEND\r\tEND FindPat;\r\r\tPROCEDURE OverrideSpecWithOption (VAR spec: FindSpec; option: ARRAY OF CHAR);\r\t\tVAR i: INTEGER; choice: BOOLEAN; ch: CHAR;\r\tBEGIN\r\t\tchoice := TRUE; i := 0; ch := option[i];\r\t\tWHILE ch # 0X DO\r\t\t\tCASE option[i] OF\r\t\t\t\t'~': choice := ~choice\r\t\t\t|    'I', 'i': spec.ignoreCase := choice; choice := TRUE\r\t\t\t|    'B', 'b': spec.wordBeginsWith := choice; choice := TRUE\r\t\t\t|    'E', 'e': spec.wordEndsWith := choice; choice := TRUE\r\t\t\t|    'R', 'r': spec.reverse := choice; choice := TRUE\r\t\t\tELSE choice := TRUE\r\t\t\tEND;\r\t\t\tINC(i); ch := option[i]\r\t\tEND\r\tEND OverrideSpecWithOption;\r\r\tPROCEDURE SetSpec (VAR spec: FindSpec; pos0, pos1: INTEGER; option: ARRAY OF CHAR);\r\tBEGIN\r\t\tASSERT(find.find # \"\", 20);\r\t\tspec.valid := TRUE;\r\t\tspec.ignoreCase := find.ignoreCase;\r\t\tspec.wordBeginsWith := find.wordBeginsWith;\r\t\tspec.wordEndsWith := find.wordEndsWith;\r\t\tspec.reverse := find.reverseOrientation;\r\t\tOverrideSpecWithOption(spec, option);\r\t\tIF spec.reverse THEN spec.start := pos1\r\t\tELSE spec.start := pos0\r\t\tEND;\r\t\tspec.find := find.find$\r\tEND SetSpec;\r\r\tPROCEDURE SetFindSpec (c: TextControllers.Controller; first: BOOLEAN; option: ARRAY OF CHAR;\r\t\tVAR spec: FindSpec\r\t);\r\t\tVAR (*start,*) pos0, pos1, beg, end: INTEGER;\r\tBEGIN\r\t\tIF first THEN pos0 := 0; pos1 := pos0\r\t\tELSIF c.HasCaret() THEN pos0 := c.CaretPos(); pos1 := pos0\r\t\tELSIF c.HasSelection() THEN c.GetSelection(beg, end); pos0 := beg + 1; pos1 := end - 1\r\t\tELSE pos0 := 0; pos1 := pos0\r\t\tEND;\r\t\tSetSpec(spec, pos0, pos1, option);\r\t\tIF spec.reverse THEN\r\t\t\tIF spec.start = 0 THEN spec.start := c.text.Length() END\r\t\tELSE\r\t\t\tIF spec.start = c.text.Length() THEN spec.start := 0 END\r\t\tEND\r\tEND SetFindSpec;\r\r\r\tPROCEDURE ReplBuf (target: TextModels.Model; pos: INTEGER): TextModels.Model;\r\t\tVAR buf: TextModels.Model; attr: TextModels.Attributes; rd: TextModels.Reader;\r\t\t\tout: TextModels.Writer; i: INTEGER;\r\tBEGIN\r\t\trd := target.NewReader(NIL); rd.SetPos(pos); rd.ReadRun(attr);\r\t\tbuf := TextModels.CloneOf(target); out := buf.NewWriter(NIL); out.SetPos(0);\r\t\tIF attr # NIL THEN out.SetAttr(attr) END;\r\t\ti := 0; WHILE find.replace[i] # 0X DO out.WriteChar(find.replace[i]); INC(i) END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 4
                  - text: " buf\r\tEND ReplBuf;\r\r\r\t"
                    attr: 0
                  - text: "(* operations *)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE (op: ReplOp) Do;\r\t\tVAR u, v: ReplList; text, save: TextModels.Model; beg, end, delta, len: INTEGER;\r\tBEGIN\r\t\ttext := op.text;\r\t\tu := op.list; v := NIL; delta := 0;\r\t\tWHILE u # NIL DO\r\t\t\tINC(u.beg, delta); INC(u.end, delta);\r\t\t\tIF u.end > u.beg THEN\r\t\t\t\tsave := TextModels.CloneOf(text); save.Insert(0, text, u.beg, u.end);\r\t\t\t\tDEC(delta, u.end - u.beg)\r\t\t\tELSE\r\t\t\t\tsave := NIL\r\t\t\tEND;\r\t\t\tIF u.buf # NIL THEN\r\t\t\t\tlen := u.buf.Length();\r\t\t\t\ttext.Insert(u.beg, u.buf, 0, len);\r\t\t\t\tu.end := u.beg + len;\r\t\t\t\tINC(delta, len)\r\t\t\tELSE\r\t\t\t\tu.end := u.beg\r\t\t\tEND;\r\t\t\tu.buf := save;\r\t\t\tv := u; u := u.next\r\t\tEND;\r\t\tIF op.find.valid THEN\r\t\t\tFindPat(text, op.find, beg, end); op.find.valid := FALSE;\r\t\t\tIF beg = end THEN Dialog.Beep END\r\t\tELSIF v # NIL THEN\r\t\t\tbeg := v.beg; end := v.end\r\t\tELSE\r\t\t\tbeg := 0; end := 0\r\t\tEND;\r\t\tIF end > beg THEN Show(text, beg, end) ELSE NoShow(text, beg) END\r\tEND Do;\r\r\tPROCEDURE AddRepl (op: ReplOp; beg, end: INTEGER; reverse: BOOLEAN);\r\t\tVAR u: ReplList;\r\tBEGIN\r\t\tNEW(u); u.beg := beg; u.end := end; u.buf := ReplBuf(op.text, beg);\r\t\tIF reverse THEN\t"
                    attr: 0
                  - text: "(* append *)"
                    attr: 1
                  - text: "\r\t\t\tu.next := op.list; op.list := u\r\t\tELSE\t"
                    attr: 0
                  - text: "(* prepend *)"
                    attr: 1
                  - text: "\r\t\t\tIF op.list = NIL THEN op.list := u ELSE op.last.next := u END;\r\t\t\top.last := u\r\t\tEND\r\tEND AddRepl;\r\r\tPROCEDURE DoReplaceThis ( \r\t\tt: TextModels.Model; mode: INTEGER;\r\t\tfirstBeg, firstEnd: INTEGER;\r\t\trngBeg, rngEnd: INTEGER;\r\t\toption: ARRAY OF CHAR\r\t);\r\t\tVAR op: ReplOp; spec: FindSpec; beg, end, len: INTEGER;\r\tBEGIN\r\t\tNEW(op); op.text := t; op.list := NIL;\r\t\tbeg := firstBeg; end := firstEnd;\r\t\tIF mode IN {replace, replaceAndFind} THEN\r\t\t\tAddRepl(op, firstBeg, firstEnd, spec.reverse)\r\t\tEND;\r\t\tIF mode = replaceAndFind THEN\r\t\t\tSetSpec(op.find, firstBeg + (* LEN(find.replace$) *) ReplBuf(t, 0).Length(), firstBeg, option)\r\t\tELSE\r\t\t\top.find.valid := FALSE\r\t\tEND;\r\t\tIF mode = replaceAll THEN\r\t\t\tlen := LEN(find.find$);\r\t\t\tSetSpec(spec, 0, t.Length(), option);\r\t\t\tWHILE (rngBeg <= beg) & (beg < end) & (end <= rngEnd)  DO\r\t\t\t\tAddRepl(op, beg, end, spec.reverse);\r\t\t\t\tIF spec.reverse THEN spec.start := beg ELSE spec.start := beg + len END;\r\t\t\t\tFindPat(t, spec, beg, end)\r\t\t\tEND\r\t\tEND;\r\t\tModels.Do(t, replacingKey, op)\r\tEND DoReplaceThis;\r\r\tPROCEDURE DoReplace (c: TextControllers.Controller; mode: INTEGER; option: ARRAY OF CHAR);\r\t\tVAR t: TextModels.Model; spec: FindSpec;\r\t\t\tselBeg, selEnd, beg, end, len0: INTEGER; hasSel0: BOOLEAN;\r\tBEGIN\r\t\tIF c # NIL THEN\r\t\t\tt := c.text; len0 := t.Length(); hasSel0 := c.HasSelection();\r\t\t\tIF hasSel0 THEN\r\t\t\t\tc.GetSelection(selBeg, selEnd);\r\t\t\t\tIF selEnd < len0 THEN\r\t\t\t\t\tSetSpec(spec, selBeg, selEnd + 1, option)\r\t\t\t\tELSE SetSpec(spec, selBeg, selEnd, option)\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tselBeg := 0; selEnd := len0;\r\t\t\t\tSetFindSpec(c, (* again *) mode = replaceAll, option, spec)\r\t\t\tEND;\r\t\t\tFindPat(t, spec, beg, end);\r\t\t\tIF mode = replaceAll THEN\r\t\t\t\tIF (selBeg <= beg) & (beg < end) & (end <= selEnd) THEN\r\t\t\t\t\tDoReplaceThis(t, mode, beg, end, selBeg, selEnd, option);\r\t\t\t\t\tIF hasSel0 THEN Show(c.text, selBeg, selEnd + t.Length() - len0) END\r\t\t\t\tELSE NoShow(c.text, 0); Dialog.Beep\r\t\t\t\tEND\r\t\t\tELSIF hasSel0 THEN\r\t\t\t\tIF (beg = selBeg) & (end = selEnd) THEN\r\t\t\t\t\tDoReplaceThis(t, mode, selBeg, selEnd, 0, len0, option)\r\t\t\t\tELSE Dialog.ShowParamMsg(noMatchKey, spec.find, \"\", \"\")\r\t\t\t\tEND\r\t\t\tELSE Dialog.ShowMsg(noSelectionKey)\r\t\t\tEND\r\t\tELSE Dialog.ShowMsg(noTargetKey)\r\t\tEND\r\tEND DoReplace;\r\r\tPROCEDURE DoShift (c: TextControllers.Controller; left: BOOLEAN);\r\t\tVAR script: Stores.Operation;\r\t\t\tt: TextModels.Model; st: TextSetters.Setter;\r\t\t\trd: TextModels.Reader; wr: TextModels.Writer;\r\t\t\tbox: TextSetters.LineBox; beg, pos, end: INTEGER; ch: CHAR;\r\tBEGIN\r\t\tIF (c # NIL) & (c.HasSelection() OR c.HasCaret()) THEN\r\t\t\tt := c.text;\r\t\t\tIF c.HasSelection() THEN c.GetSelection(beg, end) ELSE beg := c.CaretPos(); end := beg END;\r\t\t\tst := c.view.ThisSetter(); beg := st.ThisSequence(beg); pos := beg;\r\t\t\trd := t.NewReader(NIL); rd.SetPos(pos);\r\t\t\tIF ~left THEN wr := t.NewWriter(NIL) END;\r\t\t\tModels.BeginScript(t, shiftingKey, script);\r\t\t\tREPEAT\r\t\t\t\trd.ReadChar(ch);\r\t\t\t\tIF rd.view # NIL THEN\r\t\t\t\t\tst.GetLine(pos, box);\r\t\t\t\t\tIF box.rbox THEN ch := para END\r\t\t\t\tEND;\r\t\t\t\tIF left & ((ch = tab) OR (ch = \" \") OR (ch = digitspace) OR (ch = nbspace)) THEN\r\t\t\t\t\tt.Delete(pos, pos + 1); rd.SetPos(pos); DEC(end)\r\t\t\t\tELSIF ~left & (ch # line) & (ch # para) THEN\r\t\t\t\t\twr.SetPos(pos);\r\t\t\t\t\tIF (ch = \" \") OR (ch = digitspace) OR (ch = nbspace) THEN\r\t\t\t\t\t\twr.WriteChar(ch)\r\t\t\t\t\tELSE wr.WriteChar(tab)\r\t\t\t\t\tEND;\r\t\t\t\t\tINC(pos); INC(end)\r\t\t\t\tELSE INC(pos)\r\t\t\t\tEND;\r\t\t\t\tWHILE ~rd.eot & (ch # line) & (ch # para) DO\r\t\t\t\t\tINC(pos); rd.ReadChar(ch)\r\t\t\t\tEND\r\t\t\tUNTIL rd.eot OR (pos >= end);\r\t\t\tModels.EndScript(t, script);\r\t\t\tIF end > beg THEN TextControllers.SetSelection(t, beg, end) END\r\t\tEND\r\tEND DoShift;\r\r\t"
