                  - text: "(** Scanner **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE ^ (VAR s: Scanner) SetPos* (pos: INTEGER), NEW;\r\tPROCEDURE ^ (VAR s: Scanner) SetOpts* (opts: SET), NEW;\r\tPROCEDURE ^ (VAR s: Scanner) Skip* (OUT ch: CHAR), NEW;\r\tPROCEDURE ^ (VAR s: Scanner) Scan*, NEW;\r\r\r\tPROCEDURE Get (VAR s: Scanner; OUT ch: CHAR);\r\tBEGIN\r\t\ts.rider.ReadChar(ch)\r\tEND Get;\r\r\tPROCEDURE Real (VAR s: Scanner);\r\t\tVAR res: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ts.type := real;\r\t\ts.string[s.len] := \".\"; INC(s.len); Get(s, ch);\r\t\tWHILE (\"0\" <= ch) & (ch <= \"9\") & (s.len < LEN(s.string) - 1) DO\r\t\t\ts.string[s.len] := ch; INC(s.len); Get(s, ch)\r\t\tEND;\r\t\tIF (ch = \"E\") OR (ch = \"D\") THEN\r\t\t\ts.string[s.len] := ch; INC(s.len); Get(s, ch);\r\t\t\tIF (ch = \"-\") OR (ch = \"+\") THEN s.string[s.len] := ch; INC(s.len); Get(s,ch) END;\r\t\t\tWHILE (\"0\" <= ch) & (ch <= \"9\") & (s.len < LEN(s.string) - 1) DO\r\t\t\t\ts.string[s.len] := ch; INC(s.len); Get(s, ch)\r\t\t\tEND\r\t\tEND;\r\t\ts.string[s.len] := 0X;\r\t\tStrings.StringToReal(s.string, s.real, res);\r\t\tIF res # 0 THEN s.type := invalid END\r\tEND Real;\r\r\tPROCEDURE Integer (VAR s: Scanner);\r\t\tVAR n, k, res: INTEGER; ch: CHAR; hex: BOOLEAN;\r\tBEGIN\r\t\ts.type := int; hex := FALSE; ch := s.rider.char;\r\t\tIF ch = \"%\" THEN\r\t\t\ts.string[s.len] := \"%\"; INC(s.len); Get(s, ch); n:= 0;\r\t\t\tIF (\"0\" <= ch) & (ch <= \"9\") THEN\r\t\t\t\tk := ORD(ch) - ORD(\"0\");\r\t\t\t\tREPEAT\r\t\t\t\t\tn := 10*n + k; s.string[s.len] := ch; INC(s.len);\r\t\t\t\t\tGet(s, ch); k := ORD(ch) - ORD(\"0\")\r\t\t\t\tUNTIL (ch < \"0\") OR (ch > \"9\") OR (n > (MAX(INTEGER) - k) DIV 10) OR (s.len = LEN(s.string));\r\t\t\t\tIF (\"0\" <= ch) & (ch <= \"9\") THEN s.type := invalid ELSE s.base := n END\r\t\t\tELSE s.type := invalid\r\t\t\tEND\r\t\tELSIF (ch = \"H\") OR (ch = \"X\") THEN\r\t\t\thex := TRUE; s.base := 16;\r\t\t\ts.string[s.len] := ch; INC(s.len); Get(s, ch)\r\t\tELSE\r\t\t\ts.base := 10\r\t\tEND;\r\t\ts.string[s.len] := 0X;\r\t\tIF s.type # invalid THEN\r\t\t\tStrings.StringToInt(s.string, s.int, res);\r\t\t\tIF res = 0 THEN s.type := int;\r\t\t\t\tIF hex THEN (* Strings.StringToLInt(s.string, s.lint, res); ASSERT(res = 0, 100); *)\r\t\t\t\t\tIF s.int < 0 THEN s.lint := s.int + (LONG(MAX(INTEGER)) + 1) * 2\r\t\t\t\t\tELSE s.lint := s.int\r\t\t\t\t\tEND\r\t\t\t\tELSE s.lint := s.int\r\t\t\t\tEND\r\t\t\tELSIF res = 1 THEN (* INTEGER overflow *)\r\t\t\t\tStrings.StringToLInt(s.string, s.lint, res);\r\t\t\t\tIF res = 0 THEN s.type := lint ELSE s.type := invalid END\r\t\t\tELSE\t(* syntax error *)\r\t\t\t\ts.type := invalid\r\t\t\tEND\r\t\tEND\r\tEND Integer;\r\r\tPROCEDURE Number (VAR s: Scanner; neg: BOOLEAN);\r\t\tVAR m: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ts.len := 0; m := 0; ch := s.rider.char;\r\t\tIF neg THEN s.string[s.len] := \"-\"; INC(s.len) END;\r\t\tREPEAT\r\t\t\tIF (m > 0) OR (ch # \"0\") THEN\t(*"
                    attr: 0
                  - text: " ignore leading zeroes"
                    attr: 1
                  - text: " *)\r\t\t\t\ts.string[s.len] := ch; INC(s.len); INC(m)\r\t\t\tEND;\r\t\t\tGet(s, ch)\r\t\tUNTIL (ch < \"0\") OR (ch > \"9\") & (ch < \"A\") OR (ch > \"F\")\r\t\t\tOR (s.len = LEN(s.string) - 1) OR s.rider.eot;\r\t\tIF (s.len = 0) OR (s.len = 1) & (s.string[0] = \"-\") THEN\t"
                    attr: 0
                  - text: "(* compensate for ignoring leading zeroes *)"
                    attr: 1
                  - text: "\r\t\t\ts.string[s.len] := \"0\"; INC(s.len)\r\t\tEND;\r\t\ts.string[s.len] := 0X;\r\t\tIF ch = \".\" THEN Real(s) ELSE Integer(s) END\r\tEND Number;\r\r\tPROCEDURE Cardinal (VAR s: Scanner; OUT n: INTEGER);\r\t\tVAR k: INTEGER; ch: CHAR;\r\tBEGIN\r\t\tn := 0; s.Skip(ch);\r\t\tIF (\"0\" <= ch) & (ch <= \"9\") THEN\r\t\t\tk := ORD(ch) - ORD(\"0\");\r\t\t\tREPEAT\r\t\t\t\tn := n * 10 + k;\r\t\t\t\tGet(s, ch); k := ORD(ch) - ORD(\"0\")\r\t\t\tUNTIL (ch < \"0\") OR (ch > \"9\") OR (n > (MAX(INTEGER) - k) DIV 10);\r\t\t\tIF (\"0\" <= ch) & (ch <= \"9\") THEN s.type := invalid END\r\t\tELSE s.type := invalid\r\t\tEND\r\tEND Cardinal;\r\r\tPROCEDURE Set (VAR s: Scanner);\r\t\tVAR n, m: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ts.type := set; Get(s, ch); s.Skip(ch); s.set := {};\r\t\tWHILE (\"0\" <= ch) & (ch <= \"9\") & (s.type = set) DO\r\t\t\tCardinal(s, n); s.Skip(ch);\r\t\t\tIF (MIN(SET) <= n) & (n <= MAX(SET)) THEN\r\t\t\t\tINCL(s.set, n);\r\t\t\t\tIF ch = \",\" THEN\r\t\t\t\t\tGet(s, ch); s.Skip(ch)\r\t\t\t\tELSIF ch = \".\" THEN\r\t\t\t\t\tGet(s, ch);\r\t\t\t\t\tIF ch = \".\" THEN\r\t\t\t\t\t\tGet(s, ch); s.Skip(ch); Cardinal(s, m); s.Skip(ch);\r\t\t\t\t\t\tIF ch = \",\" THEN Get(s, ch); s.Skip(ch) END;\r\t\t\t\t\t\tIF (n <= m) & (m <= MAX(SET)) THEN\r\t\t\t\t\t\t\tWHILE m > n DO INCL(s.set, m); DEC(m) END\r\t\t\t\t\t\tELSE s.type := invalid\r\t\t\t\t\t\tEND\r\t\t\t\t\tELSE s.type := invalid\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tELSE s.type := invalid\r\t\t\tEND\r\t\tEND;\r\t\tIF s.type = set THEN\r\t\t\ts.Skip(ch);\r\t\t\tIF ch = \"}\" THEN Get(s, ch) ELSE s.type := invalid END\r\t\tEND\r\tEND Set;\r\r\tPROCEDURE Boolean (VAR s: Scanner);\r\t\tVAR ch: CHAR;\r\tBEGIN\r\t\ts.type := bool; Get(s, ch);\r\t\tIF (ch = \"T\") OR (ch = \"F\") THEN\r\t\t\ts.Scan;\r\t\t\tIF (s.type = string) & (s.string = \"TRUE\") THEN s.type := bool; s.bool := TRUE\r\t\t\tELSIF (s.type = string) & (s.string = \"FALSE\") THEN s.type := bool; s.bool := FALSE\r\t\t\tELSE s.type := invalid\r\t\t\tEND\r\t\tELSE s.type := invalid\r\t\tEND\r\tEND Boolean;\r\r\tPROCEDURE Name (VAR s: Scanner);\r\t\tVAR max: INTEGER; ch: CHAR;\r\tBEGIN\r\t\ts.type := string; s.len := 0; ch := s.rider.char; max := LEN(s.string);\r\t\tREPEAT\r\t\t\ts.string[s.len] := ch; INC(s.len); Get(s, ch)\r\t\tUNTIL ~(Strings.IsIdent(ch) & (ch # \"_\") OR acceptUnderscores & (ch = \"_\")) OR (s.len = max);\r\t\tIF (returnQualIdents IN s.opts) & (ch = \".\") & (s.len < max) THEN\r\t\t\tREPEAT\r\t\t\t\ts.string[s.len] := ch; INC(s.len); Get(s, ch)\r\t\t\tUNTIL\r\t\t\t~(Strings.IsIdent(ch) & (ch # \"_\") OR acceptUnderscores & (ch = \"_\")) OR (s.len = max)\r\t\tEND;\r\t\tIF s.len = max THEN DEC(s.len); s.type := invalid END;\t"
                    attr: 0
                  - text: "(* ident too long *)"
                    attr: 1
                  - text: "\r\t\ts.string[s.len] := 0X\r\tEND Name;\r\r\tPROCEDURE DoubleQuotedString (VAR s: Scanner);\r\t\tVAR max, pos: INTEGER; ch: CHAR;\r\tBEGIN\r\t\tpos := s.rider.Pos();\r\t\ts.type := string; s.len := 0; max := LEN(s.string) - 1; Get(s, ch);\r\t\tWHILE (ch # '\"') & (ch # 0X) & (s.len < max) DO\r\t\t\ts.string[s.len] := ch; INC(s.len);\r\t\t\tGet(s, ch)\r\t\tEND;\r\t\ts.string[s.len] := 0X;\r\t\tIF ch = '\"' THEN Get(s, ch)\r\t\tELSE s.type := invalid; s.rider.SetPos(pos (* s.rider.Pos() - s.len - 1 *)); Get(s, ch)\r\t\tEND\r\tEND DoubleQuotedString;\r\r\tPROCEDURE SingleQuotedString (VAR s: Scanner);\r\t\tVAR max, pos: INTEGER; ch: CHAR;\r\tBEGIN\r\t\tpos := s.rider.Pos();\r\t\ts.type := string; s.len := 0; max := LEN(s.string) - 1; Get(s, ch);\r\t\tWHILE (ch # \"'\") & (ch # 0X) & (s.len < max) DO\r\t\t\ts.string[s.len] := ch; INC(s.len);\r\t\t\tGet(s, ch)\r\t\tEND;\r\t\ts.string[s.len] := 0X;\r\t\tIF s.len = 1 THEN s.type := char; s.char := s.string[0] END;\r\t\tIF ch = \"'\" THEN Get(s, ch)\r\t\tELSE s.type := invalid; s.rider.SetPos(pos (* s.rider.Pos() - s.len - 1 *)); Get(s, ch)\r\t\tEND\r\tEND SingleQuotedString;\r\r\tPROCEDURE Char (VAR s: Scanner);\r\t\tVAR ch: CHAR;\r\tBEGIN\r\t\tch := s.rider.char;\r\t\tIF ch # 0X THEN\r\t\t\ts.type := char; s.char := ch; s.string[0] := ch; s.string[1] := 0X; Get(s, ch)\r\t\tELSE s.type := invalid\r\t\tEND\r\tEND Char;\r\r\tPROCEDURE View (VAR s: Scanner);\r\t\tVAR ch: CHAR;\r\tBEGIN\r\t\ts.type := view; s.view := s.rider.view; s.w := s.rider.w; s.h := s.rider.h;\r\t\tIF maskViews IN s.opts THEN\r\t\t\tIF s.rider.char # TextModels.viewcode THEN\r\t\t\t\ts.type := char; s.char := s.rider.char; s.string[0] := s.char; s.string[1] := 0X\r\t\t\tEND\r\t\tEND;\r\t\tGet(s, ch)\r\tEND View;\r\r\r\tPROCEDURE (VAR s: Scanner) "
                    attr: 0
