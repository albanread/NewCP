                  - text: Skip
                    attr: 3
                  - text: "* (OUT ch: CHAR), NEW;\r\t\tVAR c, v: BOOLEAN;\r\tBEGIN\r\t\tIF s.opts * {returnCtrlChars, returnViews} = {} THEN\r\t\t\tch := s.rider.char;\r\t\t\tWHILE ((ch <= \" \") OR (ch = TextModels.digitspace) OR (ch = TextModels.nbspace))\r\t\t\t& ~s.rider.eot DO\r\t\t\t\tIF ch = LINE THEN INC(s.lines)\r\t\t\t\tELSIF ch = PARA THEN INC(s.paras)\r\t\t\t\tEND;\r\t\t\t\tGet(s, ch)\r\t\t\tEND\r\t\tELSE\r\t\t\tc := returnCtrlChars IN s.opts;\r\t\t\tv := returnViews IN s.opts;\r\t\t\tch := s.rider.char;\r\t\t\tWHILE ((ch <= \" \") OR (ch = TextModels.digitspace) OR (ch = TextModels.nbspace))\r\t\t\t& ~s.rider.eot\r\t\t\t& (~c OR (ch # TAB) & (ch # LINE) & (ch # PARA))\r\t\t\t& (~v OR (ch # VIEW) OR (s.rider.view = NIL)) DO\r\t\t\t\tIF ch = LINE THEN INC(s.lines)\r\t\t\t\tELSIF ch = PARA THEN INC(s.paras)\r\t\t\t\tEND;\r\t\t\t\tGet(s, ch)\r\t\t\tEND\r\t\tEND;\r\t\tIF ~s.rider.eot THEN s.start := s.rider.Pos() - 1\r\t\tELSE s.start := s.rider.Base().Length(); s.type := eot\r\t\tEND\r\tEND Skip;\r\r\tPROCEDURE (VAR s: Scanner) "
                    attr: 0
                  - text: Scan
                    attr: 3
                  - text: "*, NEW;\r\t\tVAR sign, neg: BOOLEAN; ch: CHAR;\r\tBEGIN\r\t\ts.Skip(ch);\r\t\tIF s.type # eot THEN\r\t\t\tneg := (ch = \"-\"); sign := neg OR (ch = \"+\");\r\t\t\tIF sign THEN s.char := ch; Get(s, ch) END;\r\t\t\tIF (\"0\" <= ch) & (ch <= \"9\") THEN Number(s, neg)\r\t\t\tELSIF sign THEN s.type := char;\t"
                    attr: 0
                  - text: "(* return prefetched sign w/o trailing number *)\r\t\t\t\t"
                    attr: 1
                  - text: "s.string[0] := s.char; s.string[1] := 0X\r\t\t\tELSE\r\t\t\t\tIF Strings.IsAlpha(ch) THEN\r\t\t\t\t\tName(s)\r\t\t\t\tELSE\r\t\t\t\t\tCASE ch OF\r\t\t\t\t\t| '\"': DoubleQuotedString(s)\r\t\t\t\t\t| \"'\": SingleQuotedString(s)\r\t\t\t\t\t| TAB: s.type := tab; Get(s, ch)\r\t\t\t\t\t| LINE: s.type := line; Get(s, ch)\r\t\t\t\t\t| PARA: s.type := para; Get(s, ch)\r\t\t\t\t\t| VIEW:\r\t\t\t\t\t\tIF s.rider.view # NIL THEN View(s) ELSE Char(s) END\r\t\t\t\t\t| \"{\":\r\t\t\t\t\t\tIF interpretSets IN s.opts THEN Set(s) ELSE Char(s) END\r\t\t\t\t\t| \"$\":\r\t\t\t\t\t\tIF interpretBools IN s.opts THEN Boolean(s) ELSE Char(s) END\r\t\t\t\t\t| \"_\":\r\t\t\t\t\t\tIF acceptUnderscores THEN Name(s) ELSE Char(s) END\r\t\t\t\t\tELSE Char(s)\r\t\t\t\t\tEND\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND\r\tEND Scan;\r\r\r\t"
                    attr: 0
                  - text: "(** scanning utilities **)"
                    attr: 1
                  - text: "\r\r\tPROCEDURE "
                    attr: 0
                  - text: IsQualIdent
                    attr: 4
                  - text: "* (IN s: ARRAY OF CHAR): BOOLEAN;\r\t\tVAR i: INTEGER; ch: CHAR;\r\tBEGIN\r\t\tch := s[0]; i := 1;\r\t\tIF Strings.IsIdentStart(ch) THEN\r\t\t\tREPEAT\r\t\t\t\tch := s[i]; INC(i)\r\t\t\tUNTIL ~ Strings.IsIdent(ch);\r\t\t\tIF ch = \".\" THEN\r\t\t\t\tINC(i);\r\t\t\t\tREPEAT\r\t\t\t\t\tch := s[i]; INC(i)\r\t\t\t\tUNTIL ~ Strings.IsIdent(ch);\r\t\t\t\tRETURN ch = 0X\r\t\t\tELSE\r\t\t\t\tRETURN FALSE\r\t\t\tEND\r\t\tELSE\r\t\t\tRETURN FALSE\r\t\tEND\r\tEND IsQualIdent;\r\r\tPROCEDURE "
                    attr: 0
                  - text: ScanQualIdent
                    attr: 3
                  - text: "* (VAR s: Scanner; OUT x: ARRAY OF CHAR; OUT done: BOOLEAN);\r\t\tVAR mod: String; i, j, len, start: INTEGER; ch: CHAR;\r\tBEGIN\r\t\tdone := FALSE;\r\t\tIF s.type = string THEN\r\t\t\tIF IsQualIdent(s.string) THEN\r\t\t\t\tIF s.len < LEN(x) THEN\r\t\t\t\t\tx := s.string$; done := TRUE\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tmod := s.string; len := s.len; start := s.start;\r\t\t\t\ts.Scan;\r\t\t\t\tIF (s.type = char) & (s.char = \".\") THEN\r\t\t\t\t\ts.Scan;\r\t\t\t\t\tIF (s.type = string) & (len + 1 + s.len < LEN(x)) THEN\r\t\t\t\t\t\ti := 0; ch := mod[0]; WHILE ch # 0X DO x[i] := ch; INC(i); ch := mod[i] END;\r\t\t\t\t\t\tx[i] := \".\"; INC(i);\r\t\t\t\t\t\tj := 0; ch := s.string[0];\r\t\t\t\t\t\tWHILE ch # 0X DO x[i] := ch; INC(i); INC(j); ch := s.string[j] END;\r\t\t\t\t\t\tx[i] := 0X; done := TRUE\r\t\t\t\t\tEND\r\t\t\t\tEND;\r\t\t\t\tIF ~done THEN s.SetPos(start)"
                    attr: 0
                  - text: ; s.Scan()
                    attr: 3
                  - text: " END\r\t\t\tEND\r\t\tEND\r\tEND ScanQualIdent;\r\r\r\t"
