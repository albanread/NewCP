                  - text: ".\rOf course, sometimes it is necessary to edit the text surrounding an embedded view. For example, selecting the embedded view "
                    attr: 3
                  - text: itself
                    attr: 5
                  - text: ", instead of selecting something "
                    attr: 3
                  - text: inside
                    attr: 5
                  - text: " the embedded view, makes it necessary to disable inside-out activation. This can be done by holding down the "
                    attr: 3
                  - text: alt
                    attr: 5
                  - text: " key (Windows) / "
                    attr: 3
                  - text: command
                    attr: 5
                  - text: " key (Mac OS) when clicking. To select the outermost text view embedded in a document, use the command "
                    attr: 3
                  - text: "Edit->Select Document"
                    attr: 5
                  - text: ". Note that this is different from "
                    attr: 3
                  - text: "Edit->Select All"
                    attr: 5
                  - text: ", which merely selects the focus' contents. In a container, the focusing of embedded views can be prevented altogether, by using the "
                    attr: 3
                  - text: "Dev->Layout Mode"
                    attr: 5
                  - text: " command. This can be convenient in a graphical container which is meant for layout editing, e.g., in the forms editor used for dialog box layouts.\r\rAn embedded view can be resized if the container allows it. To resize such a view, it needs to be selected first, as a singleton. Once it is selected, graphical handles appear that can be dragged to interactively resize the view. The view may enforce constraints on legal sizes - this is immediately visible while resizing the view. By holding down the "
                    attr: 3
                  - text: shift
                    attr: 5
                  - text: " key when resizing, two opposite handles can be dragged simultaneously, effectively turning the resize into a move in the area of the containing view. (For some containers, such as text, free moving does not make sense. In this case the move operation will have no visible effect.)\r\rTo scroll a focused embedded view, hold down the "
                    attr: 3
                  - text: modifier
                    attr: 5
                  - text: " key when the cursor is over a scroll bar.\r\rMac OS:\rIn the following text, the Windows command "
                    attr: 3
                  - text: "Edit->Paste Object"
                    attr: 5
                  - text: " corresponds to the Mac OS command "
                    attr: 3
                  - text: "Edit->Paste As Part"
                    attr: 5
                  - text: ".\r\rNote that the clipboard supports two different paste operations, namely "
                    attr: 3
                  - text: "Edit->Paste"
                    attr: 5
                  - text: " and "
                    attr: 3
                  - text: "Edit->Paste Object"
                    attr: 5
                  - text: ". While "
                    attr: 3
                  - text: "Edit->Paste"
                    attr: 5
                  - text: " tries to merge the clipped "
                    attr: 3
                  - text: model
                    attr: 5
                  - text: " (the data structure displayed by the view in the clipboard) into the destination, "
                    attr: 3
                  - text: "Edit->Paste Object"
                    attr: 5
                  - text: " always pastes the entire view, creating an embedded view. "
                    attr: 3
                  - text: "Edit->Paste"
                    attr: 5
                  - text: " succeeds in merging clipped and destination model, if both are of the same kind. (For example, a text stretch copied into the clipboard is actually carried by a text view held by the clipboard. When pasting into another text, the text view in the clipboard is ignored and the clipped text is directly inserted into the destination text.) If on the other hand the models of clipboard and focus are incompatible, "
                    attr: 3
                  - text: "Edit->Paste"
                    attr: 5
                  - text: " "
                    attr: 7
                  - text: "operates the same way as "
                    attr: 3
                  - text: "Edit->Paste Object"
                    attr: 5
                  - text: ".\r\rDrag & drop always follows the semantics of "
                    attr: 3
                  - text: "Edit->Paste"
                    attr: 5
                  - text: ", i.e., it tries to merge the dragged object into the drop target. (This is the common case when moving model pieces around "
                    attr: 3
                  - text: within
                    attr: 5
                  - text: " a view.) In order to avoid merging of objects, the clipboard can be used: "
                    attr: 3
                  - text: "Edit->Cut"
                    attr: 5
                  - text: " and "
                    attr: 3
                  - text: "Edit->Paste Object"
                    attr: 5
                  - text: " or "
                    attr: 3
                  - text: "Edit->Copy"
                    attr: 5
                  - text: " and "
                    attr: 3
                  - text: "Edit->Paste Object"
                    attr: 5
                  - text: " instead of drag & drop.\r\rWindows:\rIn addition to "
                    attr: 3
                  - text: "Edit->Paste Object"
                    attr: 5
                  - text: ", the command "
                    attr: 3
                  - text: "Edit->Paste to Window"
                    attr: 5
                  - text: " can be used to open a new document containing a copy of the view currently in the clipboard.\r\r"
                    attr: 3
                  - text: "\r"
                    attr: 2
                  - target:
                      name: Text Setting
                      body:
                        - text: 10 Text setting
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 2
                  - text: "\rA text may contain plain characters, embedded views, and various control characters. Control characters and textaware views affect the way a text stretch is set into a text view: a TAB (inserted using the "
                    attr: 3
                  - text: tab
                    attr: 5
                  - text: " key) forces the next word to the next tab stop, a LINE (inserted using the "
                    attr: 3
                  - text: return
                    attr: 5
                  - text: " or "
                    attr: 3
                  - text: enter
                    attr: 5
                  - text: " key) ends a line and continues setting on the next one, a PARA (inserted using command "
                    attr: 3
                  - text: "Text->New Paragraph"
                    attr: 5
                  - text: ") ends a line and at the same time a paragraph, causing beginof-paragraph formats to be applied to the next line. If a TAB is entered in a text for which there is no tab stop to the right of the caret, the TAB acts as a fixed-width space.\r\rTABs at the beginning of a line can be used to control the indentation of structured text, such as programs. After a LINE is entered and the previous line has started with TABs, the new line will start with the same number of tabs (auto indentation). The commands "
                    attr: 3
                  - text: "Text->Shift Left"
                    attr: 5
                  - text: " and "
                    attr: 3
                  - text: "Text->Shift Right"
                    attr: 5
                  - text: " modify the indentation of a selected range of lines. Note that these indentation aids only work if you use TABs for indentation, but not spaces.\r\rSpecial hyphens can be used to control the breaking of words. A standard hyphen, such as in StandardHyphen (inserted using "
                    attr: 3
                  - text: modifierminus
                    attr: 5
                  - text: ") allows for word breaking, just as a softhypen (inserted using command "
                    attr: 3
                  - text: "Text->Insert SoftHyphen"
                    attr: 5
                  - text: ") does. While standard hyphens are always visible, softhyphens are only displayed when actually activated to break a word at the end of a line, or if marks are displayed ("
                    attr: 3
                  - text: "Text->Show Marks"
                    attr: 5
                  - text: " / "
                    attr: 3
                  - text: Hide Marks
                    attr: 5
                  - text: "). Nonbreaking hyphens as in \"NonBreakingHyphen\" (inserted using command "
                    attr: 3
                  - text: "Text->Insert NonBrk Hyphen"
                    attr: 5
                  - text: ") prevent breaking a word after the hyphen. Nonbreaking spaces (inserted using "
                    attr: 3
                  - text: "Text->Insert NonBrk Space"
                    attr: 5
                  - text: ") prevent breaking words. A digit space is the same as a non-breaking space but with a width equal to the digit \"0\" of the same font. Correctly sized digit spaces are not available for all fonts.\r\r\r"
                    attr: 3
                  - target:
                      name: Text Rulers
                      body:
                        - text: 11 Text rulers
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 2
                  - text: "\rThe most prominent textaware views that affect text setting are "
                    attr: 3
                  - text: TextRulers
                    attr: 5
                  - text: ". Every text view contains an invisible default ruler that controls the setting of text in the absence of other rulers. A new ruler can be inserted using command "
                    attr: 3
                  - text: "Text->Insert Ruler"
                    attr: 5
                  - text: ". Rulers and PARA characters are usually invisible; the command "
                    attr: 3
                  - text: "Text->Show Marks"
                    attr: 5
                  - text: " / "
                    attr: 3
                  - text: Hide Marks
                    attr: 5
                  - text: " can be used to make both visible.\r\rA ruler has two active (clickable) areas: an icon bar at the top, and a tab stop and margin marking bar at the bottom. A passive scale is displayed in the middle.\r\rThe leftmost icon allows to switch a right margin on (triangle icon) or off (empty rectangle icon). If the right margin is on, text setting is determined by this margin, i.e., line breaking occurs there, independent of the text view's size. This means that a view may be larger or smaller than the displayed text. In the latter case, part of the text is clipped away. If the right margin is off, lines are broken at the view border's right side, thus automatically adapting to a change of the view's width. For the outermost view, its width is determined by the page setup. Thus it typically is best to have the right margin switched off.\r\rAt the left end there are three icons to adjust the line grid, where clicking the left icon decrements, and clicking the right icon increments, the line grid. Between these two icons the actual line grid setting is shown in points; a value of 0 signals that the line grid has been disabled. This icon can be selected to set the line grid directly using the size entries in the "
                    attr: 3
                  - text: Attributes
                    attr: 5
                  - text: " menu. A double-click on the icon opens a "
                    attr: 3
                  - text: Size
                    attr: 5
                  - text: " dialog box. By default, the line grid is disabled (set to 0).\r\rNote that enabling a line grid can have unexpected results, especially if you successively increment or decrement it by clicking on the line grid icons. Since lines are always forced to lie on the grid, without overlapping each other, small changes of the line grid or of the font size may force a line to jump one whole line up or down.\r\rThe next four icons allow to set the formatting mode. Possible modes are: flush left, centered, flush right, and fully justified. The current mode's icon is highlighted. The next icon triple allows adjustment of the lead space inserted before every paragraph. A double-click on the middle icon opens a Size dialog box for that purpose. Note that new paragraphs are created by inserting either a ruler or a PARA character. A plain LINE character (inserted using the "
                    attr: 3
                  - text: return
                    attr: 5
                  - text: " key) does not begin a new paragraph! Finally, the last icon can be used to force a page break just before the ruler when printing. Pages are not printed if they are empty, i.e., at least a space character must be on a page for it to be printed.\r\rThe tab stop and margin marking bar supports direct manipulation of its components. Two triangles at the left end are used to control the indentation of the first line of every paragraph (upper triangle) and the left margin (lower triangle). A triangle at the right end controls the right margin. Small uppointing triangles show positions of tabulator stops; a line under a tab stop triangle indicates the adjustment mode of that tab stop. New tab stops can be set by clicking into empty areas of the marking bar; old tab stops or the right margin can be removed by dragging them out of the ruler. Single tab stops can be moved by dragging them; all tabs stops to the right of and including the dragged one can be moved simultaneously by holding down the "
                    attr: 3
                  - text: modifier
                    attr: 5
                  - text: " key while dragging.\rSuccessive clicking on a tab icon changes it cyclically from the default right-aligned tab to a centered tab to a left-aligned tab back to a right-aligned tab. Successive modifier-clicking on a tab icon toggles it from a normal tab to a bar tab and back again. Bar tabs show the tab position by a vertical bar.\rNote that when a user enters a TAB character in a paragraph where there are no tab stops defined to the right side of the insertion point, the tab is interpreted as a fixed-size space. In other words: it doesn't hurt to enter TABs when no tab stops are defined; the text system defaults to a reasonable behavior in this case.\r\rThe text system uses an invisible default ruler where no specific ruler has been selected. To change the default ruler of a document, select a ruler which has the desired attributes, and then executed "
                    attr: 3
                  - text: "Text->Make Default Ruler"
                    attr: 5
                  - text: ". This allows (even for empty text documents) to set up template texts (\"stationeries\" on Mac OS) with the right attributes. For example, suitable tab stops could be set up in such a template text.\r\rDouble-clicking anywhere in the passive area, or between icons in the icon bar, opens an auxiliary dialog box that can be used to set ruler options that are not normally dealt with manually. Currently, two such options are controlled by this dialog, both of which affect the way text is broken across pages. The first option, "
                    attr: 3
                  - text: avoid page breaks inside
                    attr: 5
                  - text: ", asks the text setting mechanism to attempt to avoid a page break in the text between this and the next ruler (or the end of the text). If the text is longer than one page, a page break will occur anyway. The second option, "
                    attr: 3
                  - text: keep together with next
                    attr: 5
                  - text: ", asks for avoidance of page breaks between the text following this ruler and the text following the next ruler. (This option has no effect if this ruler is the last one in the text.) Again, a page break will occur if the resulting text block would exceed the length of one page.\r\r\r"
                    attr: 3
                  - target:
                      name: Texts as
                      body:
                        - text: 12 Texts as information environments
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r\rThe whole on-line documentation of BlackBox can be accessed by starting from the "
                    attr: 3
                  - text: Help
                    attr: 5
                  - text: " dialog box, following "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('Std/Docu/Links', 'StdLinks Docu')"
                      body:
                        - text: hyperlinks such as this one
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: ". The "
                    attr: 3
                  - text: Help
                    attr: 5
                  - text: " can be reached over the "
                    attr: 3
                  - text: Help
                    attr: 5
                  - text: " menu.\r\rMac OS:\rIn System 7, the "
                    attr: 3
                  - text: Help
                    attr: 5
                  - text: " menu is the second menubar icon from the right, i.e., the icon with a question mark in it.\r\rIf you click on a blue underlined text stretch with the mouse, a command is executed which opens another document, in this case the documentation of the standard link views. Hyperlinks allow the construction of arbitrary webs of information. Such a web can be customized for one's own use, in effect creating one's own "
                    attr: 3
                  - text: information environment
                    attr: 5
                  - text: ". To help structure a single text document, text stretches can be folded together in a hierarchical fashion, like here:\r\r\t"
                    attr: 3
                  - fold:
                      collapsed: true
                      hidden:
                        - text: "This is a folded text. Folded texts are delimited by "
                          attr: 0
                        - link:
                            target: "StdCmds.OpenBrowser('Std/Docu/Folds', 'StdFolds Docu')"
                            body:
                              - text: fold views
                                attr: 1
                            attr: 0
                            w: 150300
                            h: 152400
                        - text: ", which are represented as arrows."
                          attr: 0
                      body:
                        - text: This is a collapsed fold
                          attr: 3
                      attr: 3
                      w: 179546
                      h: 152400
                  - text: "\r\rIf you click on one of the arrow symbols, the text is expanded into: \r\r"
                    attr: 3
                  - fold:
                      collapsed: false
                      hidden:
                        - text: This is a collapsed text
                          attr: 0
                      body:
                        - text: "This is an expanded fold. Folded texts are delimited by "
                          attr: 3
                        - link:
                            target: "StdCmds.OpenBrowser('Std/Docu/Folds', 'StdFolds Docu')"
                            body:
                              - text: fold views
                                attr: 4
                            attr: 3
                            w: 131250
                            h: 142875
                        - text: ", which are represented as arrows."
                          attr: 3
                      attr: 3
                      w: 179546
                      h: 152400
                  - text: "\r\r\r"
                    attr: 3
                  - target:
                      name: Editor and
                      body:
                        - text: 13 Editor and browser modes
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 2
                  - text: "\rTexts can be used in two different modes. Normally, a text is used in "
                    attr: 3
                  - text: edit mode
                    attr: 5
                  - text: ", i.e., it can be freely edited. Texts are saved in edit mode, and opened in document windows.\r\rFor hypertext documentation, a text can be opened in "
                    attr: 3
                  - text: browser mode
                    attr: 5
                  - text: " instead, in an auxiliary window. Such a text cannot be modified. However, its contents may be selected. The selection can be used to invoke commands on it, e.g., a find (but not a replace) command. Also, a selection may be copied into another document through drag & drop.\r\rDocumentation texts need not be saved in browser mode. They are saved in edit mode, and thus can be opened, edited, and saved again via the normal "
                    attr: 3
                  - text: File
                    attr: 5
                  - text: " menu commands. Hypertext documentation is opened via the "
                    attr: 3
                  - text: StdCmds.OpenBrowser
                    attr: 5
                  - text: " command, which opens a text document into an auxiliary window and forces it into browser mode. For example, the following commands show the difference between the two modes by opening the same (edit mode) text in the two possible ways:\r\r"
                    attr: 3
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 109
                      bodyPos: 9270
                      bodyLen: 6
                    attr: 3
                    w: 177800
                    h: 152400
                  - text: " \"StdCmds.OpenBrowser('Docu/Tut-A', 'A Brief History of BlackBox')\"\r\r"
                    attr: 3
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 110
                      bodyPos: 9316
                      bodyLen: 6
                    attr: 3
                    w: 177800
                    h: 152400
                  - text: " \"StdCmds.OpenDoc('Docu/Tut-A')\"\r\rThe latter command corresponds to the "
                    attr: 3
                  - text: "File->Open"
                    attr: 5
                  - text: " command and allows editing.\r\rThe "
                    attr: 3
                  - text: OpenBrowser
                    attr: 5
                  - text: " command accepts a "
                    attr: 3
                  - text: portable path name
                    attr: 5
                  - text: " as input. A portable path name is a string which denotes a file in a machine-independent way. It uses the \"/\" character as separator, i.e., like in Unix or the World-Wide Web.\r\rThe command is usually used in link views.\r\rSee also "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('Std/Docu/Links', 'StdLinks Docu')"
                      body:
                        - text: StdLinks
                          attr: 4
                      attr: 3
