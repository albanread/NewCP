                      id: 72
                      bodyPos: 5938
                      bodyLen: 4
                    attr: 3
                    w: 317500
                    h: 317500
                  - text: ".\r\rNot only simple and small views like the above clock may float in a text; any view is possible. About thirty lines below you can see a text view embedded in this text; the embedded text view itself contains two other text views.\r\rWindows:\rTo see where there are embedded views in a window, you can click anywhere in white space while holding down the "
                    attr: 3
                  - text: alt
                    attr: 5
                  - text: " key.\r\rMac OS:\rTo see where there are embedded views in a window, you can click in the window's title bar while holding down the "
                    attr: 3
                  - text: "modifier "
                    attr: 5
                  - text: " key.\r\rA "
                    attr: 3
                  - text: container view
                    attr: 5
                  - text: " is a view which may contain arbitrary other views; text views are examples of container views. A container view contains "
                    attr: 3
                  - text: intrinsic contents
                    attr: 5
                  - text: " (in this case, text pieces), and views. Both intrinsic contents and views may be selected, e.g., if you are reading this text on-line, you may select all its contents, including all the text and the various views floating in it (try "
                    attr: 3
                  - text: "Edit->Select All"
                    attr: 5
                  - text: "). However, at times you may want to select exactly one view, which is then called a "
                    attr: 3
                  - text: singleton
                    attr: 5
                  - text: ". Singletons show in a distinguished way that they are selected: with an outline around the view, and with "
                    attr: 3
                  - text: handles
                    attr: 5
                  - text: " if the view is resizable.\r\rThe view which contains the current selection, or the caret, is called the current "
                    attr: 3
                  - text: focus
                    attr: 5
                  - text: ". Except for the outermost view, the focus and all the views in which it is contained show "
                    attr: 3
                  - text: "focus borders. "
                    attr: 5
                  - text: "Note that a focus is "
                    attr: 3
                  - text: not
                    attr: 5
                  - text: " a selection, rather it "
                    attr: 3
                  - text: contains
                    attr: 5
                  - text: " the selection (if there is any).\r\rWindows:\rFocus borders consist of a hatched frame around a view. A focus can be turned into a singleton by pressing the "
                    attr: 3
                  - text: esc
                    attr: 5
                  - text: " key. If the view contains a selection, pressing "
                    attr: 3
                  - text: esc
                    attr: 5
                  - text: " removes the selection, thus a second press of "
                    attr: 3
                  - text: esc
                    attr: 5
                  - text: " is necessary to turn the focus into a singleton. "
                    attr: 3
                  - text: Shift-esc
                    attr: 5
                  - text: " can be used to defocus with a single key press.\r\rMac OS:\rFocus borders consist of two grey or dotted outlines around a view. A focus can be turned into a singleton by clicking into its focus border.\r\rIf several views are nested, the user can focus the innermost simply by clicking into it. This mechanism of directly clicking into the contents of an embedded view is called "
                    attr: 3
                  - text: inside-out activation
                    attr: 5
                  - text: ". It is especially handy when dealing with views nested several levels deep:"
                    attr: 3
