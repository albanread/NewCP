                    attr: 3
                  - text: TextControllers
                    attr: 5
                  - text: ", and "
                    attr: 3
                  - text: TextCmds
                    attr: 5
                  - text: ". Examples are given in the "
                    attr: 3
                  - text: Obx
                    attr: 5
                  - text: " subsystem, in particular the examples "
