                  - text: "\r"
                    attr: 2
                  - text: "\rA novel feature of the BlackBox Component Framework is the capability to drag a selected object to another place in order to "
                    attr: 3
                  - text: pick up attributes
                    attr: 5
                  - text: ". The text system uses this facility to support setting the text attributes of a selected piece of text to those used by any other visible text stretch. To drag & pick, hold down the "
                    attr: 3
                  - text: alt
                    attr: 5
                  - text: " key (Windows) / "
                    attr: 3
                  - text: command
                    attr: 5
                  - text: " key (Mac OS) while you start dragging. Then move the cursor to a similar object with the desired attributes. After releasing the button, the attributes of the selected object(s) are overwritten by the corresponding attributes of the object where the button was released. Like drag & drop, drag & pick also works across windows.\r\r\r"
                    attr: 3
