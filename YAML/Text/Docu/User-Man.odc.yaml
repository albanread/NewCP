                      attr: 3
                      w: 360000000
                      h: 444500
                  - text: "\rThe text subsystem is intended to support tasks of program writing and documentation, but also provides basic abstractions that can be used by every application which needs editable texts or rich text output (e.g., report generators). For this reason, the text system is part of the standard distribution of the BlackBox Component Builder\r\rIt is not intended to cover all subtle features of a standard word processing application. However, the text subsystem can be used for many tasks that would usually ask for a word processor. Furthermore, the unique extensibility of the BlackBox Component Framework allows for customization and extension of the text system with few principal limitations.\r\rThe following sections cover the user interface of the text system, not its "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('Text/Docu/Sys-Map', 'Map of the Text Subsystem')"
                      body:
                        - text: application programming interface
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: ".\r\r\r"
                    attr: 3
                  - target:
                      name: Creating Windows
                      body:
                        - text: "1 Creating, opening, closing, saving, and printing text documents (Windows only)"
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 2
                  - text: "\rAs for other applications, the "
                    attr: 3
                  - text: File
                    attr: 5
                  - text: " menu is used for these purposes. To open a document use "
                    attr: 3
                  - text: "File->Open..."
                    attr: 5
                  - text: ". The list box "
                    attr: 3
                  - text: Files of Type
                    attr: 5
                  - text: " in the "
                    attr: 3
                  - text: "File->Open..."
                    attr: 5
                  - text: " dialog box lets you choose between various file types. Files other than BlackBox documents are converted when they are opened. Currently, converters for plain texts (.txt), unicode texts (.utf), BlackBox symbol files (.osf), BlackBox code files (.ocf), and ETH-Oberon V2 and V4 text files are included. If the converter is both an importer and an exporter (-> Converters), the same converter used for importing will be used as default for exporting, when saving the document. For example, a text file will be written back as a text file again, not as a BlackBox document.\r\rTo create a new document, the command "
                    attr: 3
                  - text: "File->New"
                    attr: 5
                  - text: " can be used. It opens a window containing an editable text. Custom menu commands may allow to open windows with other contents than text. For an introduction on how to edit the menu configuration see section \"Menu Configuration\" in the base system's "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('System/Docu/User-Man', 'User Manual')"
                      body:
                        - text: user manual
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: ".\r\rSaving a document works the same way as in standard Windows applications. The "
                    attr: 3
                  - text: Save as Type
                    attr: 5
                  - text: " list box indicates the converter to be used when saving the file. For example, a text may be saved as a BlackBox document or as a plain text file (.txt).\r\rIn the "
                    attr: 3
                  - text: "File->Page Setup..."
                    attr: 5
                  - text: " dialog box, various parameters can be set up, e.g., the currently selected paper size, a magnification factor, etc. These parameters depend on the current printer. In addition to them, the left, top, right, and bottom margins of a page can be set up. These values denote the distances from the respective paper borders. Furthermore, a standard header (off by default) can be switched on. This standard header consists of the current date and the page number.\r\r\r"
                    attr: 3
                  - target:
                      name: Creating Mac OS
                      body:
                        - text: "2 Creating, opening, closing, saving, and printing text documents (Mac OS only)"
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 2
                  - text: "\rAs for other applications, the "
                    attr: 3
                  - text: File
                    attr: 5
                  - text: " menu is used for these purposes. To open a document use "
                    attr: 3
                  - text: "File->Open..."
                    attr: 5
                  - text: ". It will show all BlackBox documents, as well as directories and disks. If you click on the "
                    attr: 3
                  - text: More files
                    attr: 5
                  - text: " check box, all the files which can be converted to BlackBox will be displayed as well. If there are several converters applicable to a given file, the appropriate one can be selected through the "
                    attr: 3
                  - text: Format
                    attr: 5
                  - text: " pop-up menu. Currently, converters for Mac OS plain texts (TEXT), Mac OS pictures (PICT), BlackBox symbol file (oOSF), BlackBox code files (oOCF), and ETH Oberon V2 and V4 text files are installed. If the converter is both an importer and an exporter (-> Converters), the same converter used for importing will be used as default for exporting, when saving the document. For example, a TEXT file will be written back as a TEXT file again, not as a BlackBox document.\r\rTo create a new document, the command "
                    attr: 3
                  - text: "File->New"
                    attr: 5
                  - text: " can be used. It opens a window containing an editable text. Custom menu commands may allow to open windows with other contents than text. For an introduction on how to edit the menu configuration see section \"Menu Configuration\" in the base system's "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('System/Docu/User-Man', 'User Manual')"
                      body:
                        - text: user manual
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: ".\r\rSaving a document works the same way as in standard Mac OS applications. In the "
                    attr: 3
                  - text: "File->Save As..."
                    attr: 5
                  - text: " dialog box, the "
                    attr: 3
                  - text: Stationery
                    attr: 5
                  - text: " check box indicates whether the document should be written as a stationery pad. By default, this check box is unchecked. The "
                    attr: 3
                  - text: Format
                    attr: 5
                  - text: " pop-up menu indicates the converter to be used when saving the file. For example, a text may be saved as BlackBox document or as a TEXT (ASCII) file.\r\rIn the "
                    attr: 3
                  - text: "File->Page Setup..."
                    attr: 5
                  - text: " dialog box, various parameters can be set up, e.g., the currently selected paper size, a magnification factor, etc. These parameters depend on the current printer. In addition to them, the left, top, right, and bottom margins of a page can be set up. These values denote the distances from the respective paper borders. Furthermore, a standard header (off by default) can be switched on. This standard header consists of the current date and the page number.\r\r\r"
                    attr: 3
                  - target:
                      name: Basic Editing
                      body:
                        - text: 3 Basic editing
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 2
                  - text: "\rBlackBox text views either display a selection or an insertion point (the "
                    attr: 3
                  - text: caret
                    attr: 5
                  - text: "). Text stretches are selected by clicking at one end of the stretch and then moving the cursor over the stretch to the other end. Words may be selected by doubleclicking them. Double clicking outside of a text view to the left or right of a line can be used to select whole lines. (On Mac OS, this does not work for embedded text views.) Also, an existing selection may be extended or reduced by holding down the "
                    attr: 3
                  - text: shift
                    attr: 5
                  - text: " key when clicking. Typed text appears at the caret if there is one, otherwise it replaces the selection. The "
                    attr: 3
                  - text: delete
                    attr: 5
                  - text: " key either clears the selected text, or deletes the character at the caret position.\r\rThe attributes of selected text can be modified using the "
                    attr: 3
                  - text: Attributes
                    attr: 5
                  - text: " menu (and the "
                    attr: 3
                  - text: Font
                    attr: 5
                  - text: " menu under the Mac OS). In addition to these system attributes, texts also support vertical offsets of individual characters. These can be manipulated using the commands "
                    attr: 3
                  - text: Superscript
                    attr: 5
                  - text: " and "
                    attr: 3
                  - text: Subscript
                    attr: 5
                  - text: " in menu "
                    attr: 3
                  - text: Text
                    attr: 5
                  - text: ".\r\rSometimes it is useful to view two or more portions of the same text simultaneously in different windows, e.g., to make a large selection by setting the caret in one view to the start of the stretch to be selected and then "
                    attr: 3
                  - text: shift
                    attr: 5
                  - text: "clicking at the end of that stretch in the other view.\r\rWindows:\rUse the "
                    attr: 3
                  - text: "Window->New Window"
                    attr: 5
                  - text: " command to open an additional window which shows the same document as the front window.\r\rMac OS:\rThe "
                    attr: 3
                  - text: "Edit->View in Window"
                    attr: 5
                  - text: " command opens another view onto the so-called "
                    attr: 3
                  - text: focus view
                    attr: 5
                  - text: ", in a new window. The focus view is the part of a document which contains the selection or the caret, if there is one. In other words: the focus view is the currently active editor.\r\r\r"
                    attr: 3
                  - target:
                      name: Navigation Keys
                      body:
                        - text: 4 Navigation keys
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r\rArrow keys can be used to move the caret to the left, right, upwards, or downwards. If the "
                    attr: 3
                  - text: modifier
                    attr: 5
                  - text: " key is pressed before the left/right arrow key, the caret is moved by word, not by character. If the "
                    attr: 3
                  - text: modifier
                    attr: 5
                  - text: " key is pressed before the up/down arrow key, the caret is moved by paragraph, not by line.\r\rIf the "
                    attr: 3
                  - text: shift
                    attr: 5
                  - text: " key is used in combination with any navigation key, the current selection (or caret) is extended or shrunk accordingly. "
                    attr: 3
                  - text: modifier
                    attr: 5
                  - text: " and "
                    attr: 3
                  - text: shift
                    attr: 5
                  - text: " keys may be used together as well.\r\rWindows:\rThe "
                    attr: 3
                  - text: Page Up
                    attr: 5
                  - text: " and "
                    attr: 3
                  - text: Page Down
                    attr: 5
                  - text: " keys move the caret one page up or down. If used with the "
                    attr: 3
                  - text: modifier
                    attr: 5
                  - text: " key, the caret is moved one page left or right. Finally, the "
                    attr: 3
                  - text: Home
                    attr: 5
                  - text: " and "
                    attr: 3
                  - text: End
                    attr: 5
                  - text: " keys are used to move the caret to the beginning or end of the current line, or to the beginning or end of the document, if combined with the "
                    attr: 3
                  - text: modifier
                    attr: 5
                  - text: " key.\rThe navigation keys can be used to scroll the document "
                    attr: 3
                  - text: without moving the caret
                    attr: 5
                  - text: " by activating the "
                    attr: 3
                  - text: Scroll Lock
                    attr: 5
                  - text: " option on the keyboard.\r\rMac OS:\rThe navigation keys on the extended keyboards ("
                    attr: 3
                  - text: Page up/down
                    attr: 5
                  - text: ", "
                    attr: 3
                  - text: Home
                    attr: 5
                  - text: ", "
                    attr: 3
                  - text: End
                    attr: 5
                  - text: ") may be used to scroll by one page at the time, or to the beginning/end of a document, respectively.\r\r\r"
                    attr: 3
                  - target:
                      name: "Drag & Drop"
                      body:
                        - text: "5 Drag & drop"
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 2
                  - text: "\rWhen clicking into an already selected text stretch without moving the cursor out of that selection, the selection is removed and the caret set instead. However, by moving the cursor out of the text selection while still holding down the mouse button, the selected text stretch is dragged to another place. When releasing the mouse button over a suitable position, the selected stretch is dropped.\r\rWindows:\rIf the target is not able to consume a text stretch at that position, the cursor changes to a stop sign and nothing happens. To cancel a drop operation, move the cursor to a location where the stop sign appears, or press the "
                    attr: 3
                  - text: esc
                    attr: 5
                  - text: " key.\rBy dragging a piece of text and dropping it to a new place, the text piece is moved to the new place. By holding down the "
                    attr: 3
                  - text: modifier
                    attr: 5
                  - text: " key when the mouse button is released, the dropped piece becomes a copy of the dragged one: a "
                    attr: 3
                  - text: copy
                    attr: 5
                  - text: " of the selected piece is inserted at the new place. A copy can also be achieved by pressing the right mouse button as a modifier of the drag & drop operation.\rDrag & drop works across applications, i.e., between BlackBox and any other application which supports OLE drag & drop. If the other application understands RTF (Rich Text Format), then the text attributes are retained during copying.\r\rMac OS:\rIf the target is not able to consume a text stretch at that position, e.g., in a window's scrollbar, nothing happens. To cancel a drop operation, move the cursor into a scrollbar, window title bar, or the menu bar.\rBy dragging a piece of text and dropping it to a new place, the text piece is moved to the new place if drag & drop occurs within the same document, otherwise the text piece is copied. By holding down the "
                    attr: 3
                  - text: modifier
                    attr: 5
                  - text: " key when the mouse button is released, the dropped piece is a copy of the dragged one: a "
                    attr: 3
                  - text: copy
                    attr: 5
                  - text: " of the selected piece is inserted at the new place. When crossing document boundaries the dragged object is"
                    attr: 3
                  - text: " copied"
                    attr: 5
                  - text: ", even if the "
                    attr: 3
                  - text: modifier
                    attr: 5
                  - text: " key is not held down. To force a move across document boundaries, hold down the "
                    attr: 3
                  - text: control
                    attr: 5
                  - text: " key before releasing the mouse button.\rDrag & drop works within BlackBox only, not with the Finder or other applications.\rIf you move the cursor over a partially obscured window while dragging, the window comes to the top when you don't move the cursor for a second or two. When dropping, the window containing the drop destination comes to the top, if it isn't there already.\r\rDrag & drop of a singleton (see below) result in inserting the whole singleton as a view. No merge occurs. For example, a text view singleton which is dropped into another text is not merged, but inserted as a view.\r\r\r"
                    attr: 3
                  - target:
                      name: Find and
                      body:
                        - text: 6 Find and replace
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 2
                  - text: "\rThe command "
                    attr: 3
                  - text: "Text->Find & Replace..."
                    attr: 5
                  - text: " opens a dialog box that allows to find and replace text strings. Text may be found in a case sensitive or insensitive way (check box "
                    attr: 3
                  - text: Ignore case
                    attr: 5
                  - text: "), and the search pattern may be restricted to only match word beginnings, word endings, or both (check boxes "
                    attr: 3
                  - text: Word begins with
                    attr: 5
                  - text: " and "
                    attr: 3
                  - text: Word ends with
                    attr: 5
                  - text: "). The latter case limits the search to exact word matches.\r\rWhen no text is selected there is a button called "
                    attr: 3
                  - text: Replace All
                    attr: 5
                  - text: ". This replaces all matching fragments from the start of the document to the end of it. When a selection exists, the button is labeled "
                    attr: 3
                  - text: Repl. All In Sel
                    attr: 5
                  - text: ". and the command only replaces matching fragments within the selection.\r\rAll replacing actions, including "
                    attr: 3
                  - text: Replace All
                    attr: 5
                  - text: ", can be undone. The replacement always adopts the text attributes of the (first character of the) replaced fragment.\r\r"
                    attr: 3
                  - text: "Text->Find Again"
                    attr: 5
                  - text: " searches for the currently selected string, starting from the end of the selection. If there is only a caret, it searches for the previously used string starting at the caret position. Thus "
                    attr: 3
                  - text: "Text->Find Again"
                    attr: 5
                  - text: " can be applied even without ever using the "
                    attr: 3
                  - text: "Text->Find & Replace..."
                    attr: 5
                  - text: " dialog box.\r\r"
                    attr: 3
                  - text: "Text->Find First"
                    attr: 5
                  - text: " searches for the currently selected string, starting from the beginning of the text.\r\rIf a string is not found from the current position to the end of the text, a beep sound is emitted. If the same operation is executed again, the search is started at the beginning of the text.\r\rSee also module "
                    attr: 3
                  - link:
                      target: "StdCmds.OpenBrowser('Text/Docu/Cmds', 'TextCmds Docu')"
                      body:
                        - text: TextCmds
                          attr: 4
                      attr: 3
                      w: 131250
                      h: 142875
                  - text: ".\r\r\r"
                    attr: 3
                  - target:
                      name: Attributes
                      body:
                        - text: 7 Attributes
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r\rSo far, the discussed features have been mainstream features of programming language editors. In this and the following chapters, more advanced features are described, which allow to use the BlackBox text subsystem also for writing documentation and other texts that require basic word processing functions.\r\rA character of a text has several attributes: font, color, and vertical offset. The font attribute consists of the font's typeface (e.g., Times), its size (e.g., "
                    attr: 3
                  - text: 9 point
                    attr: 6
                  - text: "), its weight (e.g., "
                    attr: 3
                  - text: bold
                    attr: 2
                  - text: "), and its style (e.g., "
                    attr: 3
                  - text: italic
                    attr: 5
                  - text: ", "
                    attr: 3
                  - text: underlined
                    attr: 7
                  - text: ", or "
                    attr: 3
                  - text: strikeout
                    attr: 8
                  - text: "). Vertical offsets such as superscripts or subscripts can be selected with the "
                    attr: 3
                  - text: "Text->Superscript"
                    attr: 5
                  - text: " and "
                    attr: 3
                  - text: "Text->Subscript"
                    attr: 5
                  - text: " commands, the other attributes can be selected with the "
                    attr: 3
                  - text: Attributes
                    attr: 5
                  - text: " menu (and the "
                    attr: 3
                  - text: Font
                    attr: 5
                  - text: " menu on Mac OS).\rThere is a default font typeface and a default color. These values should be used for texts that have no predetermined typeface or color. Typically, the default color is black and the default typeface is Arial (Windows) / Helvetica (Mac OS). All on-line documentation uses these default values. The user can select a text stretch, give it a particular color or typeface, and then set the default color / typeface to the selection's current value. All text stretches which use the default color / typeface will then automatically take on the same values. The default typeface is particularly useful for cross-platform documents, because the user on each platform can decide which typeface is most suitable. For example, some programmers on the Macintosh prefer the Geneva typeface.\rThe text system uses default attributes where no specific attributes have been selected. To change the default attributes of a document, select a text stretch which has the desired attributes, and then execute "
                    attr: 3
                  - text: "Text->Make Default Attributes"
                    attr: 5
                  - text: ". This allows (even for empty text documents) to set up template texts (\"stationeries\" on Mac OS) with the right attributes.\r\rAttributes can be copied and pasted again, using the commands "
                    attr: 3
                  - text: "Edit -> Copy Properties"
                    attr: 5
                  - text: " and "
                    attr: 3
                  - text: "Edit -> Paste Properties"
                    attr: 5
