                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r"
                    attr: 2
                  - text: "\rA text may contain arbitrary BlackBox views, directly floating in the stream of characters. For example, the current time is displayed by a standard clock view: "
                    attr: 3
                  - view:
                      kind: StdClocks.StdView
                      storeKind: store
                      typeChain:
