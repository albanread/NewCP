                  - target:
                      name: New User
                      body:
                        - text: 15 Windows 95 user interface guidelines (Windows only)
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r\rBlackBox largely adopts the Windows interface guidelines defined in 1994 for Windows 95. Besides drag & drop, the guidelines also deal with the usage of the second mouse button. The secondary (usually the right) mouse button can be used like the primary button with the following differences: if drag & drop is invoked using the secondary button, a popup menu appears at the end. Such a menu (also called a "
                    attr: 3
                  - text: context menu
                    attr: 5
                  - text: ") contains the "
                    attr: 3
                  - text: Edit
                    attr: 5
                  - text: " menu entries "
                    attr: 3
                  - text: Cut
                    attr: 5
                  - text: ", "
                    attr: 3
                  - text: Copy
                    attr: 5
                  - text: ", "
                    attr: 3
                  - text: Paste
                    attr: 5
                  - text: ", and "
                    attr: 3
                  - text: Paste Object
                    attr: 5
                  - text: " plus additional commands depending on the actual selection.\r\rIn addition to the features defined by the interface guidelines, BlackBox supports two shortcuts for experienced users. Changing from move to copy during drag & drop can be done without touching the keyboard by clicking the second mouse button, while still holding down the first one. If a three-button mouse is connected (and supported by the installed driver), the middle button can be used for drag & pick.\r\r\r"
                    attr: 3
                  - target:
                      name: Text Preferences
                      body:
                        - text: 16 Text preferences (Windows only)
                          attr: 2
                      attr: 2
                      w: 150300
                      h: 142875
                  - text: "\r\rTo tune the text system for individual needs, some global parameters can be configured. The parameters need only be set once because they are stored in the Windows registry and are loaded automatically upon program start. The parameters are set up by the "
                    attr: 3
                  - text: "Edit->Preferences..."
                    attr: 5
                  - text: " command, which shows a preferences dialog box. The dialog box contains controls for changing the default font, the font metric used for text display, and the way windows are restored when they are scrolled by mouse dragging in a scroll bar. If "
                    attr: 3
                  - text: Use TrueType Metric 
                    attr: 5
                  - text: " is set, the exact metric is used for the placement of individual characters. This gives better results on printers but usually leads to a hard-to-read screen display. If "
                    attr: 3
                  - text: Visual Scrolling
                    attr: 5
                  - text: " is enabled, the contents of a window is continuously updated during dragging of the the handle in the scroll bar. Otherwise a single update is performed, when the mouse button is released.\r\rFor more information on the "
                    attr: 3
                  - text: Text
                    attr: 5
                  - text: " subsystem's programming interface, consult the on-line documentation of the modules "
                    attr: 3
                  - text: TextModels
                    attr: 5
                  - text: ", "
                    attr: 3
                  - text: TextMappers
                    attr: 5
                  - text: ", "
                    attr: 3
