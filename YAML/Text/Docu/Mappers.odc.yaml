                  - text: IsQualIdent
                    attr: 3
                  - text: " (VAR s: ARRAY OF CHAR): BOOLEAN\rTest whether the string "
                    attr: 1
                  - text: s
                    attr: 2
                  - text: " fulfills the syntax of a Component Pascal qualident, i.e. "
                    attr: 1
                  - text: "ident [\".\" ident]"
                    attr: 2
                  - text: ".\r\rPROCEDURE "
                    attr: 1
                  - text: ScanQualIdent
                    attr: 3
                  - text: " (VAR s: Scanner; VAR x: ARRAY OF CHAR;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR done: BOOLEAN)\rAssuming that the scanner returned a string, check if the succeeding symbols can be consumed to scan a qualident. If the scanned string is not a qualident, the scanner is reset the position it had before the call to "
                    attr: 1
                  - text: ScanQualIdent
                    attr: 2
                  - text: ".\r\rPost\rs'.type = string\r\tIsQualIdent(s'.string)\r\t\tdone = TRUE\r\t\tx = s'.string\r\t\ts = s'\r\t~IsQualIdent(s'.string)\r\t\ts'.Scan.type = char  &  s'.Scan.char = \".\"\r\t\t\ts'.Scan.Scan.type = string  &  (s'.len + 1 + s'.Scan.Scan.len < LEN(x))\r\t\t\t\tdone = TRUE\r\t\t\t\tx = s'.string + \".\" + s'.Scan.Scan.string\r\t\t\t\ts = s'.Scan.Scan\r\t\t\ts'.Scan.Scan.type # string  OR  (s'.len + 1 + s'.Scan.Scan.len >= LEN(x))\r\t\t\t\tdone = FALSE\r\t\ts'.Scan.type # char  OR  s'.Scan.char # \".\"\r\t\t\tdone = FALSE\rs'.type # string\r\t\tdone = FALSE\r~done\r\ts = s'.SetPos(s'.start).Scan()\r"
                    attr: 1
