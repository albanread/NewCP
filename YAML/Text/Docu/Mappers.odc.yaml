                    attr: 1
                  - text: WriteIntForm
                    attr: 3
                  - text: " (x: LONGINT; base, minWidth: INTEGER;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tfillCh: CHAR; showBase: BOOLEAN)\rWrite integer "
                    attr: 1
                  - text: x
                    attr: 2
                  - text: ". The numeral string used to represent the number is relative to base "
                    attr: 1
                  - text: base
                    attr: 2
                  - text: ". The total representation form will at least have a width of "
                    attr: 1
                  - text: minWidth
                    attr: 2
                  - text: " characters, where padding (if required) takes place to the left using characters as specified by "
                    attr: 1
                  - text: fillCh
                    attr: 2
                  - text: ". If nondecimal, the base can be requested to form part of the representation using "
                    attr: 1
                  - text: showBase
                    attr: 2
                  - text: ". The special value "
                    attr: 1
                  - text: base
                    attr: 2
                  - text: " = "
                    attr: 1
                  - text: charCode
                    attr: 2
                  - text: " renders the base suffix \"X\", while "
                    attr: 1
                  - text: base
                    attr: 2
                  - text: " = "
                    attr: 1
                  - text: hexadecimal
                    attr: 2
                  - text: " renders the suffix \"H\". All other nondecimal bases are represented by a trailing \"%\" followed by the decimal numerical literal representing the base value itself. Nondecimal representations of negative integers are formed using a basecomplement form of width "
                    attr: 1
                  - text: minWidth
                    attr: 2
                  - text: ". E.g., "
                    attr: 1
                  - text: x
                    attr: 2
                  - text: " = -3 renders for "
                    attr: 1
                  - text: base
                    attr: 2
                  - text: " = 16 and "
                    attr: 1
                  - text: minWidth
                    attr: 2
                  - text: " = 2 as \"FD\". For negative hexadecimal numbers, "
                    attr: 1
                  - text: fillCh
                    attr: 2
                  - text: " is ignored and \"F\" is used instead.\rFor more details, see also the description of "
                    attr: 1
                  - text: Strings.IntToStringForm
                    attr: 2
                  - text: ".\r\rPre\rf.rider # NIL\t(not explicitly checked)\r(base = charCode) OR (base = hexadecimal) OR ((base >= 2) & (base <= 16))\t20\rminWidth >= 0\t22\r\rPROCEDURE (VAR f: Formatter) "
                    attr: 1
                  - text: WriteRealForm
                    attr: 3
                  - text: " (x: REAL; precision, minW,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\texpW: INTEGER; fillCh: CHAR)\rWrite real "
                    attr: 1
                  - text: x
                    attr: 2
                  - text: ". The numeral string used to represent the number is either in fixed point or in scientific format, according to "
                    attr: 1
                  - text: expW
                    attr: 2
                  - text: ". "
                    attr: 1
                  - text: precision
                    attr: 2
                  - text: " denotes the number of valid decimal places (usually 7 for short reals and 16 for reals). "
                    attr: 1
                  - text: minW
                    attr: 2
                  - text: " denotes the minimal length in characters. If necessary, preceding "
                    attr: 1
                  - text: fillCh
                    attr: 2
                  - text: " will be inserted. Numbers are always rounded to the last valid and visible digit.\r"
                    attr: 1
                  - text: expW
                    attr: 2
                  - text: " > 0: exponential format (scientific) with at least "
                    attr: 1
                  - text: expW
                    attr: 2
                  - text: " digits in the exponent.\r"
                    attr: 1
                  - text: expW
                    attr: 2
                  - text: " = 0: fixpoint or floatingpoint format, depending on "
                    attr: 1
                  - text: x
                    attr: 2
                  - text: ".\r"
                    attr: 1
                  - text: expW
                    attr: 2
                  - text: " < 0: fixpoint format with "
                    attr: 1
                  - text: -expW
                    attr: 2
                  - text: " digits after the decimal point.\rFor more details, see also the description of "
                    attr: 1
                  - text: Strings.RealToStringForm
                    attr: 2
                  - text: ".\r\rPre\rf.rider # NIL\t(not explicitly checked)\rprecision > 0\t20\r0 <= minW\t21\rexpW <= 3\t22\r\rPROCEDURE (VAR f: Formatter) "
