                  - text: ").\r\r\rCONST "
                    attr: 1
                  - text: show
                    attr: 4
                  - text: ", "
                    attr: 1
                  - text: hide
                    attr: 4
                  - text: "\rPossible arguments to the "
                    attr: 1
                  - text: hide
                    attr: 2
                  - text: " parameter of "
                    attr: 1
                  - text: view.DisplayMarks
                    attr: 2
                  - text: ".\r\rCONST "
                    attr: 1
