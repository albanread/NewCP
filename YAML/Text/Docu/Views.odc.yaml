                  - text: "\r\rDEFINITION TextViews;\r\r\tIMPORT Models, Views, Containers, TextModels, TextRulers, TextSetters;\r\r\tCONST\r\t\tshow = FALSE; hide = TRUE;\r\t\tany = FALSE; focusOnly = TRUE;\r\r\tTYPE\r\t\tView = POINTER TO ABSTRACT RECORD (Containers.View)\r\t\t\t(v: View) ThisModel (): TextModels.Model, EXTENSIBLE;\r\t\t\t(v: View) DisplayMarks (hide: BOOLEAN), NEW, ABSTRACT;\r\t\t\t(v: View) HidesMarks (): BOOLEAN, NEW, ABSTRACT;\r\t\t\t(v: View) SetSetter (setter: TextSetters.Setter), NEW, ABSTRACT;\r\t\t\t(v: View) ThisSetter (): TextSetters.Setter, NEW, ABSTRACT;\r\t\t\t(v: View) SetOrigin (org, dy: INTEGER), NEW, ABSTRACT;\r\t\t\t(v: View) PollOrigin (OUT org, dy: INTEGER), NEW, ABSTRACT;\r\t\t\t(v: View) SetDefaults (r: TextRulers.Ruler; a: TextModels.Attributes),\r\t\t\t\t\t\t\t\tNEW, ABSTRACT;\r\t\t\t(v: View) PollDefaults (OUT r: TextRulers.Ruler; OUT a: TextModels.Attributes),\r\t\t\t\t\t\t\t\tNEW, ABSTRACT;\r\t\t\t(v: View) GetThisLocation (f: Views.Frame; pos: INTEGER; OUT loc: Location),\r\t\t\t\t\t\t\t\tNEW, ABSTRACT;\r\t\t\t(v: View) GetRange (f: Views.Frame; OUT beg, end: INTEGER), NEW, ABSTRACT;\r\t\t\t(v: View) GetRect (f: Views.Frame; view: Views.View; OUT l, t, r, b: INTEGER);\r\t\t\t(v: View) ThisPos (f: Views.Frame; x, y: INTEGER): INTEGER, NEW, ABSTRACT;\r\t\t\t(v: View) ShowRangeIn (f: Views.Frame; beg, end: INTEGER), NEW, ABSTRACT;\r\t\t\t(v: View) ShowRange (beg, end: INTEGER; focusOnly: BOOLEAN), NEW, ABSTRACT\r\t\tEND;\r\r\t\tDirectory = POINTER TO RECORD\r\t\t\tdefAttr-: TextModels.Attributes;\r\t\t\t(d: Directory) Set (defAttr: TextModels.Attributes), NEW, ABSTRACT;\r\t\t\t(d: Directory) New (text: TextModels.Model): View, NEW, ABSTRACT\r\t\tEND;\r\r\t\tLocation = RECORD\r\t\t\tstart, pos: INTEGER;\r\t\t\tx, y: INTEGER;\r\t\t\tasc, dsc: INTEGER;\r\t\t\tview: Views.View;\r\t\t\tl, t, r, b: INTEGER\r\t\tEND;\r\r\t\tPageMsg = RECORD (Views.PropMessage)\r\t\t\tcurrent: INTEGER\r\t\tEND;\r\r\t\tPositionMsg = RECORD (Models.Message)\r\t\t\tfocusOnly: BOOLEAN;\r\t\t\tbeg, end: INTEGER\r\t\tEND;\r\r\tVAR\r\t\tctrlDir-: Containers.Directory;\r\t\tdir-, stdDir-: Directory;\r\r\tPROCEDURE SetCtrlDir (d: Containers.Directory);\r\tPROCEDURE SetDir (d: Directory);\r\tPROCEDURE Focus (): View;\r\tPROCEDURE FocusText (): TextModels.Model;\r\tPROCEDURE Deposit;\r\tPROCEDURE ShowRange (text: TextModels.Model; beg, end: INTEGER; focusOnly: BOOLEAN);\r\tPROCEDURE ThisRuler (v: View; pos: INTEGER): TextRulers.Ruler;\r\rEND TextViews.\r\r\r"
                    attr: 1
                  - text: TextViews
