                    attr: 3
                  - text: " is of a different implementation than "
                    attr: 1
                  - text: m
                    attr: 3
                  - text: ", rider conversion is used to project the stretch from "
                    attr: 1
                  - text: m0
                    attr: 3
                  - text: " into "
                    attr: 1
                  - text: m
                    attr: 3
                  - text: "'s implementation. Model "
                    attr: 1
