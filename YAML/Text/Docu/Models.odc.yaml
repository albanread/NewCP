                    attr: 1
                  - text: "\tPROCEDURE NewColor (a: Attributes; color: Ports.Color): Attributes;\r\tPROCEDURE NewFont (a: Attributes; font: Fonts.Font): Attributes;\r\tPROCEDURE NewOffset (a: Attributes; offset: INTEGER): Attributes;\r\tPROCEDURE NewTypeface (a: Attributes; typeface: Fonts.Typeface): Attributes;\r\tPROCEDURE NewSize (a: Attributes; size: INTEGER): Attributes;\r\tPROCEDURE NewStyle (a: Attributes; style: SET): Attributes;\r\tPROCEDURE "
