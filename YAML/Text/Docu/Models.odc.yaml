                    attr: 1
                  - text: "\tPROCEDURE ReadAttr (VAR rd: Stores.Reader; VAR a: Attributes);\r\tPROCEDURE WriteAttr (VAR wr: Stores.Writer; a: Attributes);"
                    attr: 2
                  - text: "\r\r\tPROCEDURE ModifiedAttr (a: Attributes; p: Properties.Property): Attributes;\r\r\tPROCEDURE CloneOf (source: Model): Model;\r\r"
                    attr: 1
                  - text: "\tPROCEDURE WriteableChar (ch: CHAR): BOOLEAN;\r"
                    attr: 2
                  - text: "\r\tPROCEDURE SetDir (d: Directory);\r\rEND TextModels.\r\r\r"
                    attr: 1
                  - text: TextModels
                    attr: 3
                  - text: " are container models which contain sequences of attributed characters and embedded views. Characters may be drawn from the BlackBox character set, conforming to the Unicode specification. However, the current implementation supports the ASCII character set and its Latin-1 extension, only.\r\r\rCONST "
                    attr: 1
                  - text: viewcode
                    attr: 4
                  - text: "\rSignals that the read character is actually an embedded view. "
                    attr: 1
                  - text: viewcode
                    attr: 3
                  - text: " is used as a general projection value when reading an embedded view as a "
                    attr: 1
                  - text: CHAR
                    attr: 3
                  - text: ".\r\rCONST "
                    attr: 1
                  - text: tab
                    attr: 4
                  - text: "\rThe tabulation character. When encountered by a text formatter, formatting continues at the next tab stop as defined by some tabulation raster used by the formatter (usually some kind of ruler).\r\rCONST "
                    attr: 1
                  - text: line
                    attr: 4
                  - text: "\rThe line separation character. When encountered by a text setter, setting continues on the next line. However, "
                    attr: 1
                  - text: line
                    attr: 3
                  - text: " does not introduce a new paragraph (cf. "
                    attr: 1
                  - text: para
                    attr: 3
                  - text: " below).\r\rCONST "
                    attr: 1
                  - text: para
                    attr: 4
                  - text: "\rThe paragraph separation character. When encountered by a text setter, setting continues on the next line and a new paragraph is opened (cf. "
                    attr: 1
                  - text: line
                    attr: 3
                  - text: " above).\r\rCONST "
                    attr: 1
                  - text: zwspace
                    attr: 4
                  - text: "\rThe zerowidth space character. Separates words, but takes no space in its own right.\r\rCONST "
                    attr: 1
                  - text: nbspace
                    attr: 4
                  - text: "\rThe nonbreaking space character. Has the same width as a normal space character. When encountered by a text setter, "
                    attr: 1
                  - text: nbspace
                    attr: 3
                  - text: " does not separate words.\r\rCONST "
                    attr: 1
                  - text: digitspace
                    attr: 4
                  - text: "\rIn most fonts, a digit space has the width of digit zero (0) which is equivalent to the width of all digits in most fonts. When encountered by a text setter, "
                    attr: 1
                  - text: digitspace
                    attr: 3
                  - text: " does not separate words. ("
                    attr: 1
                  - text: "Note: "
                    attr: 3
                  - text: "The recommendation made in earlier versions of the text system, namely to use "
                    attr: 1
                  - text: digitspace
                    attr: 3
                  - text: " for number formatting, is outdated. Use right-aligning tab stops instead. See "
                    attr: 1
                  - link:
                      target: "StdCmds.OpenBrowser('Text/Docu/Rulers', 'TextRulers Docu')"
                      body:
                        - text: TextRulers
                          attr: 5
                      attr: 1
                      w: 131250
                      h: 142875
                  - text: ".)\r\rCONST "
                    attr: 1
                  - text: hyphen
                    attr: 4
                  - text: "\rThe hyphen character. To be used for explicit and visible hyphenation. A text setter may choose to break lines just after a "
                    attr: 1
                  - text: hyphen
                    attr: 3
                  - text: ".\r\rCONST "
                    attr: 1
                  - text: nbhyphen
                    attr: 4
                  - text: "\rThe nonbreaking hyphen. Just as "
                    attr: 1
                  - text: hyphen
                    attr: 3
                  - text: ", but a text setter will not break lines just after an "
                    attr: 1
                  - text: nbhyphen
                    attr: 3
                  - text: ".\r\rCONST "
                    attr: 1
                  - text: softhyphen
                    attr: 4
                  - text: "\rThe softhyphen. Just as "
                    attr: 1
                  - text: hyphen
                    attr: 3
                  - text: ", but rendered as a zerowidth character unless actually used to break a line. "
                    attr: 1
                  - text: softhyphen
                    attr: 3
                  - text: " can be used to give hints to a text setter on where to break longer words.\r\r\rCONST "
                    attr: 1
                  - text: maskChar
                    attr: 4
                  - text: "\rOption element\rCan be used as a set element of "
                    attr: 1
                  - text: Pref.opts
                    attr: 3
                  - text: ". Signals that the embedded view prefers to be masked to a normal character, making it behave like that character in most situations. The primary purpose of masking is to simplify the task for text scanning applications. (For example, a text ruler might be masked to behave like a "
                    attr: 1
                  - text: para
                    attr: 3
                  - text: " character. This would allow a text scanner to count the number of paragraphs in a text simply by counting the number of returned "
                    attr: 1
                  - text: para
                    attr: 3
                  - text: " characters while scanning the text.)\r\rCONST "
                    attr: 1
                  - text: hideable
                    attr: 4
                  - text: "\rOption element\rCan be used as a set element of "
                    attr: 1
                  - text: Pref.opts
                    attr: 3
                  - text: ". Signals that the embedded view accepts to be hidden or revealed depending on a mode of the text view. (For example, text rulers might be hideable enabling the the user to hide or reveal the rulers in a displayed text.)\r\rCONST "
                    attr: 1
                  - text: offset
                    attr: 4
                  - text: ", "
                    attr: 1
                  - text: code
                    attr: 4
                  - text: "\rProperty field selectors\rSignals that the indicated field of a "
                    attr: 1
                  - text: Prop
                    attr: 3
                  - text: " property is known, valid, or readOnly.\r\rCONST "
                    attr: 1
                  - text: store
                    attr: 4
                  - text: "\rPossible value of "
                    attr: 1
                  - text: InfoMsg.op
                    attr: 3
                  - text: ", signalling the completed storing of the broadcasting text. This is the only value currently defined for this field.\r\rCONST "
                    attr: 1
                  - text: replace
                    attr: 4
                  - text: "\rPossible value of "
                    attr: 1
                  - text: UpdateMsg.op
                    attr: 3
                  - text: ", signalling the successful replacement of a stretch in the broadcasting text.\r\rCONST "
                    attr: 1
                  - text: insert
                    attr: 4
                  - text: "\rPossible value of "
                    attr: 1
                  - text: UpdateMsg.op
                    attr: 3
                  - text: ", signalling the successful insertion of a stretch in the broadcasting text.\r\rCONST "
                    attr: 1
                  - text: delete
                    attr: 4
                  - text: "\rPossible value of "
                    attr: 1
                  - text: UpdateMsg.op
                    attr: 3
                  - text: ", signalling the successful deletion of a stretch in the broadcasting text.\r\r\rTYPE "
                    attr: 1
                  - text: Model (Containers.Model)
                    attr: 4
                  - text: "\rABSTRACT\rText models are container models, containing sequences of attributed characters and embedded views.\r\rPROCEDURE (m: Model) "
                    attr: 1
                  - text: Length
                    attr: 4
                  - text: " (): INTEGER\rNEW, ABSTRACT\rLength of the text "
                    attr: 1
                  - text: m
                    attr: 3
                  - text: ", where each character and each embedded view counts as one.\r\rPost\rresult >= 0\r\rPROCEDURE (m: Model) "
                    attr: 1
                  - text: NewReader
                    attr: 4
                  - text: " (old: Reader): Reader\rNEW, ABSTRACT\rReturns a reader connected to "
                    attr: 1
                  - text: m
                    attr: 3
                  - text: ". An old reader may be passed as input parameter, if it isn't in use anymore. Note that "
                    attr: 1
                  - text: NewReader
                    attr: 3
                  - text: " does not reposition "
                    attr: 1
                  - text: old
                    attr: 3
                  - text: " if "
                    attr: 1
                  - text: old
                    attr: 3
                  - text: " is reused and its position is in the valid range. ("
                    attr: 1
                  - text: NewReader
                    attr: 3
                  - text: " may or may not use the old reader, depending on internal compatibility criteria.)\r\rPost\rresult # NIL\rresult = old  &  old'.Base() = m  &  old'.Pos() <= m.Length()\r\tresult.Pos() = old'.Pos()\r~(result = old  &  old'.Base() = m  &  old'.Pos() <= m.Length())\r\tresult.Pos() = 0\r\rPROCEDURE (m: Model) "
                    attr: 1
                  - text: NewWriter
                    attr: 4
                  - text: " (old: Writer): Writer\rNEW, ABSTRACT\rReturns a writer connected to "
                    attr: 1
                  - text: m
                    attr: 3
                  - text: ". An old writer may be passed as input parameter, if it isn't in use anymore. Note that "
                    attr: 1
                  - text: NewWriter
                    attr: 3
                  - text: " does not reposition "
                    attr: 1
                  - text: old
                    attr: 3
                  - text: " if "
                    attr: 1
                  - text: old
                    attr: 3
                  - text: " is reused and its position is in the valid range. ("
                    attr: 1
                  - text: NewWriter
                    attr: 3
                  - text: " may or may not use the old writer, depending on internal compatibility criteria.)\r\rPost\rresult # NIL\rresult.attr = dir.attr\rresult = old  &  old'.Base() = m  &  old'.Pos() <= m.Length()\r\tresult.Pos() = old'.Pos()\r~(result = old  &  old'.Base() = m  &  old'.Pos() <= m.Length())\r\tresult.Pos() = m.Length()\r\rPROCEDURE (m: Model) "
                    attr: 1
                  - text: Insert
                    attr: 4
                  - text: " (pos: INTEGER; m0: Model; beg0, end0: INTEGER)\rNEW, ABSTRACT, Operation\rExtract the stretch ["
                    attr: 1
                  - text: beg0
                    attr: 3
                  - text: ", "
                    attr: 1
                  - text: end0
                    attr: 3
                  - text: ") from "
                    attr: 1
                  - text: m0
                    attr: 3
                  - text: " and insert it into "
                    attr: 1
                  - text: m
                    attr: 3
                  - text: " at position "
                    attr: 1
                  - text: pos
                    attr: 3
                  - text: ". In case that "
                    attr: 1
