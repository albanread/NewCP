                    attr: 3
                  - text: " is made shorter, while model "
                    attr: 1
                  - text: m
                    attr: 3
                  - text: " is made longer by "
                    attr: 1
                  - text: (end0 - beg0)
                    attr: 3
                  - text: ".\r\rPre\r0 <= pos\t21\rpos <= Length(m)\t22\r0 <= beg0\t23\rbeg0 <= end0\t24\rend0 <= Length(m0)\t25\rm0 # NIL\t"
                    attr: 1
