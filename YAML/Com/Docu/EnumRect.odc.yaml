                  - text: "\r\r"
                    attr: 0
                  - text: "This is a simple example adapted form the same example in the book \"Inside OLE\". \r\rThe interface "
                    attr: 1
                  - text: IEnumRECT
                    attr: 2
                  - text: " (an enumerator for rectangles) is defined and implemented in this module.\rThe interface consists of the following four methods:\r\r"
