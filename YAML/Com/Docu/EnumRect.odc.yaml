                      dsc: 25400
                      grid: 1
                      opts: 0x00000003
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "\tIEnumRECT = POINTER TO ABSTRACT RECORD\r\t\t\t\t\t\t\t\t\t\t\t [\"{00021140-0000-0000-C000-000000000046}\"] (COM.IUnknown)\r\t\t(this: IEnumRECT) Next (num: INTEGER; OUT elem: ARRAY [untagged] OF WinApi.RECT; \r\t\t\t\t\t\t\t\t\t\t\t\t\tOUT [nil] fetched: INTEGER): COM.RESULT, NEW, ABSTRACT;\r\t\t(this: IEnumRECT) Skip (num: INTEGER): COM.RESULT, NEW, ABSTRACT\r\t\t(this: IEnumRECT) Reset (): COM.RESULT, NEW, ABSTRACT;\r\t\t(this: IEnumRECT) Clone (OUT enum: IEnumRECT): COM.RESULT, NEW, ABSTRACT;\r\tEND;\r\rFor the implementation, an array of length 15 is used.\rAs the interface is implemented in one record ("
                    attr: 1
                  - text: EnumRECT
                    attr: 2
                  - text: "), the default implementation for "
