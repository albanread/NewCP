                      w: 150300
                      h: 142875
                  - text: "\r\r"
                    attr: 0
                  - text: "This version of the Koala example can be linked as an independent exe. It can be tested with the ObjUser.exe program which is provided with the book \"Inside OLE\". Note that you have to set the ObjUser.exe program into "
                    attr: 1
                  - text: "EXE "
                    attr: 2
                  - text: "mode.\r\rThe "
                    attr: 1
                  - text: "EXE "
                    attr: 2
                  - text: "file opens its application window which is closed as soon as the last interface pointer is released. It also must implement a main loop which polls and dispatches all Windows events. Additionally, the body of the module must register the factory upon start up and remove the factory from the registry as soon as the "
                    attr: 1
                  - text: "EXE "
                    attr: 2
                  - text: "is unloaded.\r\rThe ComKoalaExe example can be linked to EKoala1."
                    attr: 1
                  - text: "EXE "
                    attr: 2
                  - text: "with the following command:\r\r\t"
                    attr: 1
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 9
                      bodyPos: 1054
                      bodyLen: 6
                    attr: 1
                    w: 177800
                    h: 152400
                  - text: "DevLinker.LinkExe \"Com/EKoala1.exe\" := Kernel+ ComKoalaExe ~\r\rThe registry must be informed about which program to start if a local server for our IKoala factory ({00021146-0000-0000-C000-000000000046}) is requested. The necessary registry file"
                    attr: 1
                  - link:
                      target: "StdCmds.OpenDoc('Com/Reg/EKoala1.reg')"
                      body:
                        - text: Com/Reg/EKoala1.reg
                          attr: 3
                      attr: 1
                      w: 131250
                      h: 142875
                  - text: " is given below. Use the REGEDIT tool to update the registry. Adjust path names if necessary!\r\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 5940000
                      dsc: 25400
                      grid: 1
                      opts: 0x00000003
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "REGEDIT\rHKEY_CLASSES_ROOT\\Koala1.0 = Koala Object Chapter 5\rHKEY_CLASSES_ROOT\\Koala1.0\\CLSID = {00021146-0000-0000-C000-000000000046}\rHKEY_CLASSES_ROOT\\Koala = Koala Object Chapter 5\rHKEY_CLASSES_ROOT\\Koala\\CurVer = Koala1.0\rHKEY_CLASSES_ROOT\\Koala\\CLSID = {00021146-0000-0000-C000-000000000046}\r\rHKEY_CLASSES_ROOT\\CLSID\\{00021146-0000-0000-C000-000000000046} = Koala Object Chapter 5\rHKEY_CLASSES_ROOT\\CLSID\\{00021146-0000-0000-C000-000000000046}\\ProgID = Koala1.0\rHKEY_CLASSES_ROOT\\CLSID\\{00021146-0000-0000-C000-000000000046}\\VersionIndependentProgID = Koala\rHKEY_CLASSES_ROOT\\CLSID\\{00021146-0000-0000-C000-000000000046}\\LocalServer32 = C:\\BlackBox\\Com\\Ekoala1.exe\rHKEY_CLASSES_ROOT\\CLSID\\{00021146-0000-0000-C000-000000000046}\\NotInsertable\r"
