                      w: 150300
                      h: 142875
                  - text: "\r\r"
                    attr: 0
                  - text: "This version of the Koala example can be linked as an independent "
                    attr: 1
                  - text: DLL
                    attr: 2
                  - text: ". It can be tested with the ObjUser.exe program which is provided with the book \"Inside OLE\". Note that you have to set the ObjUser.exe program into "
                    attr: 1
                  - text: DLL
                    attr: 2
                  - text: " mode.\r\rThe implementation of the "
                    attr: 1
                  - text: DLL
                    attr: 2
                  - text: " only slightly differs from the first "
                    attr: 1
                  - text: ComKoala
                    attr: 3
                  - text: " implementation. One difference is that a counter is provided which counts the number of instances. This counter is incremented whenever a new object is created ("
                    attr: 1
                  - text: CreateInstance
                    attr: 3
                  - text: " method), and it is decremented if the last interface reference is removed ("
                    attr: 1
                  - text: RELEASE
                    attr: 3
                  - text: " finalizer).\r\rEvery in-process server must provide the two functions "
                    attr: 1
                  - text: DllGetClassObject
                    attr: 3
                  - text: " and "
                    attr: 1
                  - text: DllCanUnloadNow
                    attr: 3
                  - text: ". The first procedure is called whenever a factory is required, and with the second command it is tested whether the "
                    attr: 1
                  - text: DLL
                    attr: 2
                  - text: " can be unloaded. The "
                    attr: 1
                  - text: DLL
                    attr: 2
                  - text: " can be unloaded if no object generated by a factory of the DLL is referenced through an interface pointer and if no factory of the DLL was locked with the factory's "
                    attr: 1
                  - text: LockServer
                    attr: 3
                  - text: " method.\r\rThis "
                    attr: 1
                  - text: ComKoalaDll
                    attr: 3
                  - text: " example can be linked to DKoala1.dll with the following command:\r\r\t"
                    attr: 1
                  - view:
                      kind: DevCommanders.StdView
                      storeKind: store
                      typeChain:
                        - DevCommanders.StdViewDesc
                        - DevCommanders.ViewDesc
                        - Views.ViewDesc
                        - Stores.StoreDesc
                      id: 10
                      bodyPos: 1182
                      bodyLen: 6
                    attr: 1
                    w: 177800
                    h: 152400
                  - text: "DevLinker.LinkDll \"Com/DKoala1.dll\" := Kernel+ ComKoalaDll# ~\r\t\rThe registry must be informed about which "
                    attr: 1
                  - text: DLL
                    attr: 2
                  - text: " to launch if a IKoala factory is required. The necessary registry file "
                    attr: 1
                  - link:
                      target: "StdCmds.OpenDoc('Com/Reg/DKoala1.reg')"
                      body:
                        - text: Com/Reg/DKoala1.reg
                          attr: 4
                      attr: 1
                      w: 131250
                      h: 142875
                  - text: " is given below. Use the REGEDIT tool to update the registry. Adjust path names if necessary!\r\r\r"
                    attr: 1
                  - ruler:
                      left: 0
                      right: 5940000
                      dsc: 25400
                      grid: 1
                      opts: 0x00000003
                      attr: 1
                      w: 360000000
                      h: 444500
                  - text: "REGEDIT\rHKEY_CLASSES_ROOT\\Koala1.0 = Koala Object Chapter 5\rHKEY_CLASSES_ROOT\\Koala1.0\\CLSID = {00021146-0000-0000-C000-000000000046}\rHKEY_CLASSES_ROOT\\Koala = Koala Object Chapter 5\rHKEY_CLASSES_ROOT\\Koala\\CurVer = Koala1.0\rHKEY_CLASSES_ROOT\\Koala\\CLSID = {00021146-0000-0000-C000-000000000046}\r\rHKEY_CLASSES_ROOT\\CLSID\\{00021146-0000-0000-C000-000000000046} = Koala Object Chapter 5\rHKEY_CLASSES_ROOT\\CLSID\\{00021146-0000-0000-C000-000000000046}\\ProgID = Koala1.0\rHKEY_CLASSES_ROOT\\CLSID\\{00021146-0000-0000-C000-000000000046}\\VersionIndependentProgID = Koala\rHKEY_CLASSES_ROOT\\CLSID\\{00021146-0000-0000-C000-000000000046}\\InprocServer32 = C:\\BlackBox\\Com\\DKoala1.dll\rHKEY_CLASSES_ROOT\\CLSID\\{00021146-0000-0000-C000-000000000046}\\NotInsertable\r"
