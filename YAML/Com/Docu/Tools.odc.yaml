                  - text: " (IN sm: WinOle.STGMEDIUM): WinOle.IStream;\r\t\rSTGMEDIUM structures must be released manually. Use the OLE library procedure WinOle.ReleaseStgMedium for that purpose:\r\r\tPROCEDURE "
