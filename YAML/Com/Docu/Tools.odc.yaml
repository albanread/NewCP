                  - text: "\r\r"
                    attr: 0
                  - text: "ComTools is a library containing routines for the handling of often used and partially unsafe data structures. These data structures are unsafe because they contain C unions or C pointers (not interface pointers) or both.\r\rComTools can be imported as a tool package or its source can be used as starting point for customized implementations.\r\r\r"
                    attr: 1
                  - text: String handling
                    attr: 2
                  - text: "\r\rStrings are pointers to arrays of unspecified length. They must be allocated and deallocated manually.\r\r\tPROCEDURE "
                    attr: 1
                  - text: NewString
                    attr: 0
                  - text: " (IN str: ARRAY [untagged] OF CHAR): WinApi.PtrWSTR;\r\tPROCEDURE "
                    attr: 1
                  - text: NewEmptyString
                    attr: 0
                  - text: " (length: INTEGER): WinApi.PtrWSTR;\r\tPROCEDURE "
                    attr: 1
                  - text: FreeString
                    attr: 0
                  - text: " (VAR p: WinApi.PtrWSTR);\r\tPROCEDURE "
                    attr: 1
                  - text: NewSString
                    attr: 0
                  - text: " (IN str: ARRAY [untagged] OF SHORTCHAR): WinApi.PtrSTR;\r\tPROCEDURE "
                    attr: 1
                  - text: NewEmptySString
                    attr: 0
                  - text: " (length: INTEGER): WinApi.PtrSTR;\r\tPROCEDURE "
                    attr: 1
                  - text: FreeSString
                    attr: 0
                  - text: " (VAR p: WinApi.PtrSTR);\r\r\r"
                    attr: 1
                  - text: STGMEDIUM
                    attr: 2
                  - text: "\r\rThe STGMEDIUM structure contains a C union and various pointers. The following procedures can be used to properly initialize one of the seven possible STGMEDIUM variants:\r\r\tPROCEDURE "
                    attr: 1
                  - text: GenBitmapMedium
                    attr: 0
                  - text: " (bitmap: WinApi.HBITMAP; unk: COM.IUnknown;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR sm: WinOle.STGMEDIUM);\r\tPROCEDURE "
                    attr: 1
                  - text: GenEMetafileMedium
                    attr: 0
                  - text: " (emf: WinApi.HENHMETAFILE; unk: COM.IUnknown;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR sm: WinOle.STGMEDIUM);\r\tPROCEDURE "
                    attr: 1
                  - text: GenFileMedium
                    attr: 0
                  - text: " (name: ARRAY OF CHAR; unk: COM.IUnknown;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR sm: WinOle.STGMEDIUM);\r\tPROCEDURE "
                    attr: 1
                  - text: GenGlobalMedium
                    attr: 0
                  - text: " (hg: WinApi.HGLOBAL; unk: COM.IUnknown;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR sm: WinOle.STGMEDIUM);\r\tPROCEDURE "
                    attr: 1
                  - text: GenMetafileMedium
                    attr: 0
                  - text: " (mf: WinApi.HMETAFILEPICT; unk: COM.IUnknown;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR sm: WinOle.STGMEDIUM);\r\tPROCEDURE "
                    attr: 1
                  - text: GenStorageMedium
                    attr: 0
                  - text: " (stg: WinOle.IStorage; unk: COM.IUnknown;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR sm: WinOle.STGMEDIUM);\r\tPROCEDURE "
                    attr: 1
                  - text: GenStreamMedium
                    attr: 0
                  - text: " (stm: WinOle.IStream; unk: COM.IUnknown;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tVAR sm: WinOle.STGMEDIUM);\r\rSafe access to the variable part of the structure should be done by one of these functions:\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\r\tPROCEDURE "
                    attr: 1
                  - text: MediumBitmap
                    attr: 0
                  - text: " (IN sm: WinOle.STGMEDIUM): WinApi.HBITMAP;\r\tPROCEDURE "
                    attr: 1
                  - text: MediumEnhMetafile
                    attr: 0
