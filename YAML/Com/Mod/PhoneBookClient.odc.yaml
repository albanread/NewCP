                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT COM, WinOle, WinApi, ComTools, StdLog, ComPhoneBook, Dialog;\r\t\r\tVAR\r\t\t"
                    attr: 0
                  - text: para
                    attr: 3
                  - text: "*: RECORD\r\t\t\tname*: Dialog.Combo;\r\t\t\tnumber*: ARRAY 32 OF CHAR\r\t\tEND;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: GetNumber
                    attr: 3
                  - text: "*;\r\t\tVAR phoneBook: ComPhoneBook.ILookup; res: INTEGER; str: WinApi.PtrWSTR;\r\tBEGIN\r\t\tres := WinOle.CoCreateInstance(ComPhoneBook.CLSID, NIL, WinOle.CLSCTX_SERVER,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tCOM.ID(phoneBook), phoneBook);\r\t\tIF res = WinApi.S_OK THEN\r\t\t\tres := phoneBook.LookupByName(para.name.item, str);\r\t\t\tIF res = WinApi.S_OK THEN\r\t\t\t\tpara.number := str$; ComTools.FreeString(str)\r\t\t\tELSE StdLog.String(\"GetNumber failed, error = \"); StdLog.Int(res); StdLog.Ln;\r\t\t\t\tpara.number := \"\"\r\t\t\tEND;\r\t\t\tDialog.Update(para)\r\t\tELSE StdLog.String(\"Instance creation failed, error = \"); StdLog.Int(res); StdLog.Ln\r\t\tEND;\r\tEND GetNumber;\r\t\rBEGIN\r\tpara.name.SetLen(5);\r\tpara.name.SetItem(0, \"Daffy Duck\");\r\tpara.name.SetItem(1, \"Wile E. Coyote\");\r\tpara.name.SetItem(2, \"Scrogge McDuck\");\r\tpara.name.SetItem(3, \"Huey Lewis\");\r\tpara.name.SetItem(4, \"Thomas Dewey\");\rEND ComPhoneBookClient.\r\r\r"
