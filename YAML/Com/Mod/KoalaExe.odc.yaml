                  - text: "\r**)\r\r"
                    attr: 1
                  - text: "\r\tIMPORT S := SYSTEM, COM, WinApi, WinOle;\r"
                    attr: 0
                  - text: "\r"
                    attr: 1
                  - text: "\tCONST\r\t\tKoalaId = \"{00021146-0000-0000-C000-000000000046}\";\r\r\t\t\r\tTYPE\r\t\tKoala = POINTER TO RECORD (COM.IUnknown) END;\r\t\tKoalaFactory = POINTER TO RECORD (WinOle.IClassFactory) END;\r\t\r\t\r\tVAR\r\t\tinstance: WinApi.HMODULE;\r\t\tmainWnd: WinApi.HWND;\r\t\tlocks: INTEGER;\r\t\tobjects: INTEGER;\r\t\t\r\t\t\r"
                    attr: 0
                  - text: "\t(* ---------- Koala ---------- *)\r\t\r\t(* use default QueryInterface implementation *)\r\t\r\t(* AddRef & Release implemented implicitly by the compiler *)\r\t\r\t"
                    attr: 1
                  - text: "PROCEDURE (this: Koala) RELEASE;\t"
                    attr: 0
                  - text: "(* called when last com reference is removed *)"
                    attr: 1
                  - text: "\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tDEC(objects);\r\t\tIF objects = 0 THEN\r\t\t\tres := WinApi.PostMessageW(mainWnd, WinApi.WM_CLOSE, 0, 0);\r\t\tEND\r\tEND RELEASE;\r\t"
                    attr: 0
                  - text: "\r\t\r\t(* ---------- KoalaFactory ---------- *)\r"
                    attr: 1
                  - text: "\t\r"
                    attr: 0
                  - text: "\t(* use default QueryInterface implementation *)\r\t\r\t(* AddRef & Release implemented implicitly by the compiler *)\r\t\r"
                    attr: 1
                  - text: "\tPROCEDURE (this: KoalaFactory) CreateInstance (outer: COM.IUnknown; IN [iid] iid: COM.GUID;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tOUT [new] int: COM.IUnknown): COM.RESULT;\r\t\tVAR res: COM.RESULT; new: Koala;\r\tBEGIN\r\t\tIF outer # NIL THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.CLASS_E_NOAGGREGATION END;\r\t\tNEW(new);\r\t\tIF new # NIL THEN\r\t\t\tres := new.QueryInterface(iid, int);\r\t\t\tIF res >= 0 THEN INC(objects) END;\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " res\r\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.E_OUTOFMEMORY\r\t\tEND\r\tEND CreateInstance;\r\t\r\tPROCEDURE (this: KoalaFactory) LockServer (lock: WinApi.BOOL): COM.RESULT;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF lock # 0 THEN INC(locks) ELSE DEC(locks) END;\r\t\tIF locks = 0 THEN\r\t\t\tres := WinApi.PostMessageW(mainWnd, WinApi.WM_CLOSE, 0, 0);\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_OK\r\tEND LockServer;\r\r\r"
                    attr: 0
                  - text: "\t(* ---------- window handler ---------- *)\r"
                    attr: 1
                  - text: "\t\r\tPROCEDURE WndHandler (wnd: WinApi.HWND; message, wParam, lParam: INTEGER): INTEGER;\r\t\tVAR res: INTEGER; ps: WinApi.PAINTSTRUCT; dc: WinApi.HDC;\r\tBEGIN\r\t\tIF message = WinApi.WM_CLOSE THEN\r\t\t\tIF (locks > 0) OR (objects > 0) THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " 0 END\r\t\tELSIF message = WinApi.WM_DESTROY THEN\r\t\t\tWinApi.PostQuitMessage(0);\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " 0\r\t\tELSIF message = WinApi.WM_PAINT THEN\r\t\t\tdc := WinApi.BeginPaint(wnd, ps);\r\t\t\tres := WinApi.TextOutW(dc, 50, 50, \"Koala Server\", 12);\r\t\t\tres := WinApi.EndPaint(wnd, ps);\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " 0\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.DefWindowProcW(wnd, message, wParam, lParam)\r\tEND WndHandler;\r\t\r\tPROCEDURE OpenWindow;\r\t\tVAR class: WinApi.WNDCLASSW; res: INTEGER;\r\tBEGIN\r\t\tclass.hCursor := WinApi.LoadCursorW(0, S.VAL(WinApi.PtrWSTR, WinApi.IDC_ARROW));\r\t\tclass.hIcon := WinApi.LoadIconW(0, S.VAL(WinApi.PtrWSTR, WinApi.IDI_APPLICATION));\r\t\tclass.lpszMenuName := NIL;\r\t\tclass.lpszClassName := \"Koala\";\r\t\tclass.hbrBackground := WinApi.GetStockObject(WinApi.WHITE_BRUSH);\r\t\tclass.style := WinApi.CS_HREDRAW + WinApi.CS_VREDRAW;\r\t\tclass.hInstance := instance;\r\t\tclass.lpfnWndProc := WndHandler;\r\t\tclass.cbClsExtra := 0;\r\t\tclass.cbWndExtra := 0;\r\t\tres := WinApi.RegisterClassW(class);\r\t\tmainWnd := WinApi.CreateWindowExW({}, \"Koala\", \"Koala\",\r\t\t\t\t\t\t\t\t\t\t\t\t\t\tWinApi.WS_OVERLAPPEDWINDOW,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\tWinApi.CW_USEDEFAULT, WinApi.CW_USEDEFAULT,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\tWinApi.CW_USEDEFAULT, WinApi.CW_USEDEFAULT,\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t0, 0, instance, 0);\r\t\tres := WinApi.ShowWindow(mainWnd, 10);\r\t\tres := WinApi.UpdateWindow(mainWnd);\r\tEND OpenWindow;\r\t\r\r"
                    attr: 0
                  - text: "\t(* ---------- main loop ---------- *)\r"
                    attr: 1
                  - text: "\t\r\tPROCEDURE Main;\r\t\tVAR msg: WinApi.MSG; res: COM.RESULT; factory: KoalaFactory; token: INTEGER;\r\tBEGIN\r\t\tinstance := WinApi.GetModuleHandleW(NIL);\r\t\tres := WinOle.CoInitialize(0);\r\t\tNEW(factory);\r\t\tres := WinOle.CoRegisterClassObject(KoalaId, factory,\r\t\t\t\t\tWinOle.CLSCTX_LOCAL_SERVER, WinOle.REGCLS_MULTIPLEUSE, token);\r\t\tOpenWindow;\r\t\tWHILE WinApi.GetMessageW(msg, 0, 0, 0) # 0 DO\r\t\t\tres := WinApi.TranslateMessage(msg);\r\t\t\tres := WinApi.DispatchMessageW(msg);\r\t\tEND;\r\t\tres := WinOle.CoRevokeClassObject(token);\r\t\tWinOle.CoUninitialize;\r\t\tWinApi.ExitProcess(msg.wParam)\r\tEND Main;\r\rBEGIN\r\tMain\rEND ComKoalaExe.\r\r\r"
                    attr: 0
