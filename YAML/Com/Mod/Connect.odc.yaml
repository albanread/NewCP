                  - text: " NIL\r\t\tEND\r\tEND GetConnectionPoint;\r\t\r\tPROCEDURE Connect (id: INTEGER);\r\t\tVAR cp: WinOle.IConnectionPoint; res: COM.RESULT;\r\tBEGIN\r\t\tIF obj # NIL THEN\r\t\t\tIF sink[id].cookie = 0 THEN\r\t\t\t\tcp := GetConnectionPoint();\r\t\t\t\tIF cp # NIL THEN\r\t\t\t\t\tres := cp.Advise(sink[id], sink[id].cookie);\r\t\t\t\t\tIF res < 0 THEN StdLog.String(\"Connection failed\"); StdLog.Ln\r\t\t\t\t\tELSE StdLog.String(\"Connection complete\"); StdLog.Ln\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\t\tStdLog.String(\"Failed to get IConnectionPoint\"); StdLog.Ln\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tStdLog.String(\"Sink already connected\"); StdLog.Ln\r\t\t\tEND\r\t\tELSE\r\t\t\tStdLog.String(\"No object\"); StdLog.Ln\r\t\tEND\r\tEND Connect;\r\t\r\tPROCEDURE Disconnect (id: INTEGER);\r\t\tVAR cp: WinOle.IConnectionPoint; res: COM.RESULT;\r\tBEGIN\r\t\tIF obj # NIL THEN\r\t\t\tIF sink[id].cookie # 0 THEN\r\t\t\t\tcp := GetConnectionPoint();\r\t\t\t\tIF cp # NIL THEN\r\t\t\t\t\tres := cp.Unadvise(sink[id].cookie);\r\t\t\t\t\tIF res < 0 THEN StdLog.String(\"Disconnection failed\"); StdLog.Ln\r\t\t\t\t\tELSE\r\t\t\t\t\t\tStdLog.String(\"Disconnection complete\"); StdLog.Ln;\r\t\t\t\t\t\tsink[id].cookie := 0\r\t\t\t\t\tEND\r\t\t\t\tELSE\r\t\t\t\t\tStdLog.String(\"Failed to get IConnectionPoint\"); StdLog.Ln\r\t\t\t\tEND\r\t\t\tELSE\r\t\t\t\tStdLog.String(\"Sink not connected\"); StdLog.Ln\r\t\t\tEND\r\t\tELSE\r\t\t\tStdLog.String(\"No object\"); StdLog.Ln\r\t\tEND\r\tEND Disconnect;\r\t\r\tPROCEDURE "
