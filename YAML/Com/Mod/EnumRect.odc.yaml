                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\r\tIMPORT COM, WinApi;\r\t\r\t\r\tCONST rects = 15;\r\t\r\t\r\tTYPE\r\t\t"
                    attr: 0
                  - text: IEnumRECT
                    attr: 3
                  - text: "* = POINTER TO\r\t\t\t\t\t\t\t\tABSTRACT RECORD [\"{00021140-0000-0000-C000-000000000046}\"] (COM.IUnknown) END;\r\t\t\r\t\t\r\t\tEnumRECT = POINTER TO RECORD (IEnumRECT)\r\t\t\tcur: INTEGER;\r\t\t\tdata: ARRAY rects OF WinApi.RECT;\r\t\tEND;\r\t\t\r\t\t\r\t"
                    attr: 0
                  - text: "(* ---------- abstract interface methods ---------- *)\r\t\r\t(* QueryInterface, AddRef, Release inherited from COM.IUnknown *)"
                    attr: 1
                  - text: "\r\t\t\r\tPROCEDURE (this: IEnumRECT) "
                    attr: 0
                  - text: "Next*"
                    attr: 3
                  - text: " (num: INTEGER; OUT elem: ARRAY [untagged] OF WinApi.RECT;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\tOUT [nil] fetched: INTEGER): COM.RESULT, NEW, ABSTRACT;\r\tPROCEDURE (this: IEnumRECT) "
                    attr: 0
                  - text: "Skip*"
                    attr: 3
                  - text: " (num: INTEGER): COM.RESULT, NEW, ABSTRACT;\r\tPROCEDURE (this: IEnumRECT) "
                    attr: 0
                  - text: "Reset*"
                    attr: 3
                  - text: " (): COM.RESULT, NEW, ABSTRACT;\r\tPROCEDURE (this: IEnumRECT) "
                    attr: 0
                  - text: "Clone*"
                    attr: 3
                  - text: " (OUT enum: IEnumRECT): COM.RESULT, NEW, ABSTRACT;\r\t\r\t\t\r\t"
                    attr: 0
                  - text: "(* ---------- interface implementation ---------- *)"
                    attr: 1
                  - text: "\r\t\r"
                    attr: 0
                  - text: "\t(* use default QueryInterface implementation *)\r\t\r\t(* AddRef & Release implemented implicitly by the compiler *)\r\t\r"
                    attr: 1
                  - text: "\tPROCEDURE (this: EnumRECT) Next (num: INTEGER; OUT elem: ARRAY [untagged] OF WinApi.RECT;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\tOUT [nil] fetched: INTEGER): COM.RESULT;\r\t\tVAR n: INTEGER;\r\tBEGIN\r\t\tn := 0;\r\t\tIF VALID(fetched) THEN fetched := 0\r\t\tELSIF num # 1 THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_FALSE\r\t\tEND;\r\t\tIF this.cur < rects THEN\r\t\t\tWHILE (this.cur < rects) & (num > 0) DO\r\t\t\t\telem[n] := this.data[this.cur];\r\t\t\t\tINC(this.cur); INC(n); DEC(num)\r\t\t\tEND;\r\t\t\tIF VALID(fetched) THEN fetched := n END;\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_OK\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_FALSE\r\tEND Next;\r\t\r\tPROCEDURE (this: EnumRECT) Skip (num: INTEGER): COM.RESULT;\r\tBEGIN\r\t\tIF this.cur + num < rects THEN\r\t\t\tINC(this.cur, num); "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_OK\r\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_FALSE\r\t\tEND\r\tEND Skip;\r\t\r\tPROCEDURE (this: EnumRECT) Reset (): COM.RESULT;\r\tBEGIN\r\t\tthis.cur := 0; "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_OK\r\tEND Reset;\r\t\r\tPROCEDURE (this: EnumRECT) Clone (OUT enum: IEnumRECT): COM.RESULT;\r\t\tVAR new: EnumRECT;\r\tBEGIN\r\t\tNEW(new);\r\t\tIF new # NIL THEN\r\t\t\tnew.cur := this.cur;\r\t\t\tnew.data := this.data;\r\t\t\tenum := new;\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_OK\r\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.E_OUTOFMEMORY\r\t\tEND\r\tEND Clone;\r\t\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: CreateRectEnumerator
                    attr: 3
                  - text: "* (OUT enum: IEnumRECT);\r\t\tVAR new: EnumRECT; i: INTEGER;\r\tBEGIN\r\t\tNEW(new);\r\t\tIF new # NIL THEN\r\t\t\tnew.cur := 0; i := 0;\r\t\t\tWHILE i < rects DO\r\t\t\t\tnew.data[i].left := i;\r\t\t\t\tnew.data[i].top := i * 2;\r\t\t\t\tnew.data[i].right := i * 3;\r\t\t\t\tnew.data[i].bottom := i * 4;\r\t\t\t\tINC(i)\r\t\t\tEND;\r\t\t\tenum := new\r\t\tEND\r\tEND CreateRectEnumerator;\r\t\t\r\rEND ComEnumRect.\r"
                    attr: 0
