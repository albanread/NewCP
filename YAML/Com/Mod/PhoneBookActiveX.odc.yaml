                    attr: 3
                  - text: " WinApi.DISP_E_MEMBERNOTFOUND\r\t\tEND\t\t\r\tEND Invoke;\r\r\tPROCEDURE (this: CLookup) GetIDsOfNames (IN [nil] riid: COM.GUID (* NULL *);\r\t\tIN [nil] rgszNames: WinApi.PtrWSTR;  cNames: INTEGER; "
                    attr: 0
                  - text: lcid
                    attr: 3
                  - text: ": WinOle.LCID;\r\t\tOUT [nil] rgDispId: WinOleAut.DISPID\r\t): COM.RESULT;\r\t\tVAR lib: WinOleAut.ITypeLib; ptinfo: WinOleAut.ITypeInfo; names: WinApi.PtrWSTR;res: INTEGER;\r\tBEGIN\r\t\tres := WinOleAut.LoadTypeLib(ComTools.NewString(typelibrary), lib);\r\t\tres := lib.GetTypeInfoOfGuid(COM.ID(ILookup), ptinfo);\r\t\tnames := ComTools.NewString(rgszNames^);\r\t\tres := WinOleAut.DispGetIDsOfNames(ptinfo, names, cNames, rgDispId);\r\t\tRETURN 0\r\tEND GetIDsOfNames;\r\t\r\tPROCEDURE (this: CLookup) GetTypeInfo (iTInfo: INTEGER; lcid: WinOle.LCID; \r\t\t\t\t\t\t\t\t\t\t\tOUT [nil] ppTInfo: WinOleAut.ITypeInfo): COM.RESULT;\r\t\tVAR lib: WinOleAut.ITypeLib; res: INTEGER;\r\tBEGIN\r\t\tres := WinOleAut.LoadTypeLib(ComTools.NewString(typelibrary), lib);\r\t\tRETURN lib.GetTypeInfo(iTInfo, ppTInfo)\r\tEND GetTypeInfo;\r\t\r\tPROCEDURE (this: CLookup) GetTypeInfoCount (OUT [nil] pctinfo: INTEGER): COM.RESULT;\r\tBEGIN \r\t\tpctinfo := 1;\t(* type info available *)\r\t\tRETURN 0 \r\tEND GetTypeInfoCount;\r\r"
                    attr: 0
                  - text: "\t"
                    attr: 1
                  - text: "PROCEDURE (this: CLookup) RELEASE;\t"
                    attr: 0
                  - text: "(* called when last com reference is removed *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tDEC(objects)\r\tEND RELEASE;\r\t\r\t(* ---------- LookupFactory ---------- *)\r\t\r\t(* use default QueryInterface implementation *)\r\t(* AddRef & Release implemented implicitly by the compiler *)\r\t\r\tPROCEDURE (this: LookupFactory) CreateInstance (outer: COM.IUnknown;\r\t\t\t\tIN [iid] iid: COM.GUID; OUT [new] int: COM.IUnknown): COM.RESULT;\r\t\tVAR res: COM.RESULT; new: CLookup;\r\tBEGIN\r\t\tIF outer # NIL THEN RETURN WinApi.CLASS_E_NOAGGREGATION END;\r\t\tNEW(new);\r\t\tIF new # NIL THEN \r\t\t\tres := new.QueryInterface(iid, int);\r\t\t\tIF res >= 0 THEN INC(objects) END;\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " res\r\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.E_OUTOFMEMORY\r\t\tEND\r\tEND CreateInstance;\r\t\r\tPROCEDURE (this: LookupFactory) LockServer (lock: WinApi.BOOL): COM.RESULT;\r\tBEGIN\r\t\tIF lock # 0 THEN INC(locks) ELSE DEC(locks) END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_OK\r\tEND LockServer;\r\t\r"
                    attr: 0
                  - text: "\t(* ---------- dll interface ---------- *)\r"
                    attr: 1
                  - text: "\t\r\tPROCEDURE"
                    attr: 0
                  - text: " DllGetClassObject"
                    attr: 3
                  - text: "* (IN clsid: COM.GUID;\r\t\t\t\t\t\t\t\t\t\t\t\tIN [iid] iid: COM.GUID; OUT [new] int: COM.IUnknown): COM.RESULT;\r\t\tVAR obj: LookupFactory;\r\tBEGIN\r\t\tIF clsid = CLSID THEN\r\t\t\tNEW(obj);\r\t\t\tIF obj # NIL THEN "
                    attr: 0
