                  - text: "\r\tIMPORT COM, WinApi, WinOle, ComTools, WinOleAut;\r\t\r\tCONST\r\t\t"
                    attr: 0
                  - text: "CLSID*"
                    attr: 3
                  - text: " = \"{E67D346B-2A5B-11D0-ADBA-00C01500554E}\";\r\t\tE_NotFound = -2147467259;\r\t\ttypelibrary = \"C:\\BlackBox\\Com\\Interfaces\\DPhoneBook\\phone.tlb\";\r\t\r\tTYPE\r\t\t"
                    attr: 0
                  - text: "ILookup*"
                    attr: 3
                  - text: " = POINTER TO ABSTRACT RECORD\r\t\t\t[\"{C4910D72-BA7D-11CD-94E8-08001701A8A3}\"] (WinOleAut.IDispatch)\r\t\tEND;\r\t\r\t\tCLookup = POINTER TO RECORD (ILookup) END;\r\t\t\r\t\tLookupFactory = POINTER TO RECORD (WinOle.IClassFactory) END;\r\t\r\t\tEntry = POINTER TO EntryDesc;\r\t\tEntryDesc = RECORD\r\t\t\tnext: Entry;\r\t\t\tname, number: ARRAY 32 OF CHAR\r\t\tEND;\r\t\r\tVAR\r\t\tlocks: INTEGER;\r\t\tobjects: INTEGER;\r\t\t\r\t\tphoneBook: Entry;\r\t\r\t(* ---------- ILookup ---------- *)\r\t\r\tPROCEDURE (this: ILookup) "
                    attr: 0
                  - text: LookupByName
                    attr: 3
                  - text: "*(\r\t\tname: WinApi.PtrWSTR; OUT number: WinApi.PtrWSTR): COM.RESULT, NEW, ABSTRACT;\r\t\r\tPROCEDURE (this: ILookup) "
                    attr: 0
                  - text: LookupByNumber
                    attr: 3
                  - text: "*(\r\t\tnumber: WinApi.PtrWSTR; OUT name: WinApi.PtrWSTR): COM.RESULT, NEW, ABSTRACT;\r\t\t\r\t(* ---------- CLookup ---------- *)\r\t\t\r\t(* use default QueryInterface implementation *)\r\t(* AddRef & Release implemented implicitly by the compiler *)\r\t\r\tPROCEDURE (this: CLookup) LookupByName(name: WinApi.PtrWSTR;\r\t\t\tOUT number: WinApi.PtrWSTR): COM.RESULT;\r\t\tVAR e: Entry; ustr: ARRAY [untagged] 32 OF CHAR; i: INTEGER;\r\tBEGIN\r\t\te := phoneBook;\r\t\tWHILE (e # NIL) & (e.name # name^) DO e := e.next END;\r\t\tIF e # NIL THEN i := 0;\r\t\t\tREPEAT ustr[i] := e.number[i]; INC(i) UNTIL e.number[i-1] = 0X;\r\t\t\tnumber := ComTools.NewString(ustr);\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_OK\r\t\tELSE\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " E_NotFound\r\t\tEND\r\tEND LookupByName;\r\t\r\tPROCEDURE (this: CLookup) LookupByNumber(number: WinApi.PtrWSTR;\r\t\t\t\tOUT name: WinApi.PtrWSTR): COM.RESULT;\r\t\tVAR e: Entry; \r\t\t\tustr: ARRAY [untagged] 32 OF CHAR; i: INTEGER;\r\tBEGIN \r\t\te := phoneBook;\r\t\tWHILE (e # NIL) & (e.number # number^) DO e := e.next END;\r\t\tIF e # NIL THEN i := 0;\r\t\t\tREPEAT ustr[i] := e.name[i]; INC(i) UNTIL e.name[i-1] = 0X;\r\t\t\tname := ComTools.NewString(ustr);\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_OK\r\t\tELSE\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " E_NotFound\r\t\tEND\r\tEND LookupByNumber;\r\t\r\tPROCEDURE (this: CLookup) Invoke (dispIdMember: WinOleAut.DISPID;\r\t\tIN riid: COM.GUID;\r\t\tlcid: WinOle.LCID; wFlags: SHORTINT; VAR [nil] pDispParams: WinOleAut.DISPPARAMS; \r\t\tOUT [nil] pVarResult: WinOleAut.VARIANT; OUT [nil] pExcepInfo: WinOleAut.EXCEPINFO;\r\t\tOUT [nil] puArgErr: INTEGER\r\t): COM.RESULT;\r\t\tVAR wstr: WinApi.PtrWSTR; res: INTEGER; (* bstr: WinOle.BSTR; *)\r\tBEGIN\r\t\tIF (dispIdMember = 1) OR (dispIdMember = 2) THEN\r\t\t\tIF pDispParams.cArgs = 1 THEN\r\t\t\t\tIF pDispParams.rgvarg[0].vt = WinOle.VT_BSTR THEN\r\t\t\t\t\tIF dispIdMember = 1 THEN \r\t\t\t\t\t\tres := this.LookupByName(pDispParams.rgvarg[0].u.bstrVal, wstr)\r\t\t\t\t\tELSE\r\t\t\t\t\t\tres := this.LookupByNumber(pDispParams.rgvarg[0].u.bstrVal, wstr)\r\t\t\t\t\tEND;\r\t\t\t\t\tIF res = 0 THEN\r\t\t\t\t\t\tpVarResult.vt := WinOle.VT_BSTR;\r\t\t\t\t\t\tpVarResult.u.bstrVal := WinOleAut.SysAllocString(wstr^);\r\t\t\t\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_OK\r\t\t\t\t\tELSE\r\t\t\t\t\t\tpExcepInfo.wCode := 0;\r\t\t\t\t\t\tpExcepInfo.wReserved := 0;\r\t\t\t\t\t\tpExcepInfo.bstrSource := WinOleAut.SysAllocString(\"PhoneBook.Lookup\");\r\t\t\t\t\t\tpExcepInfo.bstrDescription := WinOleAut.SysAllocString(\"Entry not found\");\r\t\t\t\t\t\tpExcepInfo.bstrHelpFile := NIL;\r\t\t\t\t\t\tpExcepInfo.pfnDeferredFillIn := NIL;\r\t\t\t\t\t\tpExcepInfo.scode := res;\r\t\t\t\t\t"
                    attr: 0
