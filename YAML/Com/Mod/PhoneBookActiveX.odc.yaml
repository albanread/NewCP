                  - text: " WinApi.S_OK ELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_FALSE END\r\tEND DllCanUnloadNow;\r\r\r\tPROCEDURE NewEntry(name, number: ARRAY OF CHAR);\r\t\tVAR e: Entry;\r\tBEGIN\r\t\tNEW(e); e.next  := phoneBook; phoneBook := e; e.name := name$; e.number := number$\r\tEND NewEntry;\r\rBEGIN\t\r\tlocks := 0; objects := 0;\r\tNewEntry(\"Daffy Duck\", \"310-555-1212\");\r\tNewEntry(\"Wile E. Coyote\", \"408-555-1212\");\r\tNewEntry(\"Scrooge McDuck\", \"206-555-1212\");\r\tNewEntry(\"Huey Lewis\", \"415-555-1212\");\r\tNewEntry(\"Thomas Dewey\", \"617-555-1212\");\rEND ComPhoneBookActiveX.\r\r"
