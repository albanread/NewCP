                  - text: "\r\r\tIMPORT COM, WinApi, StdLog;\r\t\r\t\r\tTYPE\r\t\tIAnimal = POINTER TO\r\t\t\t\t\t\tABSTRACT RECORD [\"{00021143-0000-0000-C000-000000000046}\"] (COM.IUnknown) END;\r\t\t\r\t\tCAnimal = POINTER TO RECORD (COM.IUnknown)\r\t\t\timpl: CImpIAnimal\r\t\tEND;\r\t\tCImpIAnimal = POINTER TO RECORD (IAnimal)\r\t\t\tobj: CAnimal\r\t\tEND;\r\r\t\tIKoala = POINTER TO\r\t\t\t\t\t\tABSTRACT RECORD [\"{00021144-0000-0000-C000-000000000046}\"] (COM.IUnknown) END;\r\t\t\r\t\tCKoala = POINTER TO RECORD (COM.IUnknown)\r\t\t\timpl: CImpIKoala;\r\t\t\tanimal: COM.IUnknown\r\t\tEND;\r\t\tCImpIKoala = POINTER TO RECORD (IKoala)\r\t\t\tobj: CKoala\r\t\tEND;\r\t\t\r\t\t\r\tVAR\r\t\tkoala: COM.IUnknown;\r\t\t\r\t\t\r\t(* ---------- IAnimal ---------- *)\r\t\r\tPROCEDURE (this: IAnimal) Eat (): COM.RESULT, NEW, ABSTRACT;\r\tPROCEDURE (this: IAnimal) Sleep (): COM.RESULT, NEW, ABSTRACT;\r\tPROCEDURE (this: IAnimal) Procreate (): COM.RESULT, NEW, ABSTRACT;\r\r\t\r\t(* ---------- CAnimal ---------- *)\r\t\r\tPROCEDURE (this: CAnimal) QueryInterface (IN [iid] iid: COM.GUID;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tOUT [new] int: COM.IUnknown): COM.RESULT;\r\tBEGIN\r\t\tIF COM.QUERY(this, iid, int) OR COM.QUERY(this.impl, iid, int) THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_OK\r\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.E_NOINTERFACE\r\t\tEND\r\tEND QueryInterface;\r\t\r\t\r\t(* ---------- CImpIAnimal ---------- *)\r\t\r\tPROCEDURE (this: CImpIAnimal) Eat (): COM.RESULT;\r\tBEGIN\r\t\tStdLog.String(\"Animal's IAnimal.Eat called\"); StdLog.Ln;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_OK\r\tEND Eat;\r\t\r\tPROCEDURE (this: CImpIAnimal) Sleep (): COM.RESULT;\r\tBEGIN\r\t\tStdLog.String(\"Animal's IAnimal.Sleep called\"); StdLog.Ln;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_OK\r\tEND Sleep;\r\t\r\tPROCEDURE (this: CImpIAnimal) Procreate (): COM.RESULT;\r\tBEGIN\r\t\tStdLog.String(\"Animal's IAnimal.Procreate called\"); StdLog.Ln;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_OK\r\tEND Procreate;\r\r\t\r\t(* ---------- Animal creation ---------- *)\r\t\r\tPROCEDURE CreateAnimal (outer: COM.IUnknown; IN [iid] iid: COM.GUID;\r\t\t\t\t\t\t\t\t\t\tOUT [new] int: COM.IUnknown): COM.RESULT;\r\t\tVAR new: CAnimal;\r\tBEGIN\r\t\tIF (outer # NIL) & (iid # COM.ID(COM.IUnknown)) THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.CLASS_E_NOAGGREGATION END;\r\t\tNEW(new);\r\t\tIF new # NIL THEN\r\t\t\tIF outer = NIL THEN NEW(new.impl, new)\r\t\t\tELSE NEW(new.impl, outer)\r\t\t\tEND;\r\t\t\tIF new.impl # NIL THEN\r\t\t\t\tnew.impl.obj := new;\r\t\t\t\tStdLog.String(\"Animal allocated\"); StdLog.Ln;\r\t\t\t"
                    attr: 0
                  - text: "\tRETURN"
                    attr: 3
                  - text: " new.QueryInterface(iid, int)\r\t\t\tEND\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.E_OUTOFMEMORY\r\tEND CreateAnimal;\r\r\r\t(* ---------- IKoala ---------- *)\r\t\r\tPROCEDURE (this: IKoala) ClimbEucalyptusTrees (): COM.RESULT, NEW, ABSTRACT;\r\tPROCEDURE (this: IKoala) PouchOpensDown (): COM.RESULT, NEW, ABSTRACT;\r\tPROCEDURE (this: IKoala) SleepForHoursAfterEating (): COM.RESULT, NEW, ABSTRACT;\r\t\r\t\r\t(* ---------- CKoala ---------- *)\r\t\r\tPROCEDURE (this: CKoala) QueryInterface (IN [iid] iid: COM.GUID;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tOUT [new] int: COM.IUnknown): COM.RESULT;\r\tBEGIN\r\t\tIF COM.QUERY(this, iid, int) OR COM.QUERY(this.impl, iid, int) THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_OK\r\t\tELSIF iid = COM.ID(IAnimal) THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " this.animal.QueryInterface(iid, int)\r\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.E_NOINTERFACE\r\t\tEND\r\tEND QueryInterface;\r\t\r\t\r\t(* ---------- CImpIKoala ---------- *)\r\t\r\tPROCEDURE (this: CImpIKoala) ClimbEucalyptusTrees (): COM.RESULT;\r\tBEGIN\r\t\tStdLog.String(\"Koala's IKoala.ClimbEucalyptusTrees called\"); StdLog.Ln;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_OK\r\tEND ClimbEucalyptusTrees;\r\t\r\tPROCEDURE (this: CImpIKoala) PouchOpensDown (): COM.RESULT;\r\tBEGIN\r\t\tStdLog.String(\"Koala's IKoala.PouchOpensDown called\"); StdLog.Ln;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_OK\r\tEND PouchOpensDown;\r\t\r\tPROCEDURE (this: CImpIKoala) SleepForHoursAfterEating (): COM.RESULT;\r\tBEGIN\r\t\tStdLog.String(\"Koala's IKoala.SleepForHoursAfterEating called\"); StdLog.Ln;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_OK\r\tEND SleepForHoursAfterEating;\r\t\r\t\r\t(* ---------- Koala creation ---------- *)\r\t\r\tPROCEDURE CreateKoalaAggregation (OUT unk: COM.IUnknown): BOOLEAN;\r\t\tVAR obj: CKoala; res: COM.RESULT;\r\tBEGIN\r\t\tNEW(obj);\r\t\tIF obj # NIL THEN\r\t\t\tNEW(obj.impl, obj);\r\t\t\tIF obj.impl # NIL THEN\r\t\t\t\tobj.impl.obj := obj;\r\t\t\t\tres := CreateAnimal(obj, COM.ID(obj.animal), obj.animal);\r\t\t\t\tIF res >= 0 THEN\r\t\t\t\t\tStdLog.String(\"Koala allocated\"); StdLog.Ln;\r\t\t\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " obj.QueryInterface(COM.ID(unk), unk) >= 0\r\t\t\t\tEND\r\t\t\tEND\r\t\tEND;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " FALSE\r\tEND CreateKoalaAggregation;\r\t\r\t\r\t(* ---------- user interface ---------- *)\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: CreateKoala
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\tIF CreateKoalaAggregation(koala) THEN StdLog.String(\"Koala created\")\r\t\tELSE StdLog.String(\"Koala creation failed\")\r\t\tEND;\r\t\tStdLog.Ln\r\tEND CreateKoala;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ReleaseKoala
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\tIF koala # NIL THEN\r\t\t\tkoala := NIL;\r\t\t\tStdLog.String(\"Koala released\")\r\t\tELSE StdLog.String(\"no object\")\r\t\tEND;\r\t\tStdLog.Ln\r\tEND ReleaseKoala;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: AnimalEat
                    attr: 3
                  - text: "*;\r\t\tVAR a: IAnimal; res: COM.RESULT;\r\tBEGIN\r\t\tIF koala # NIL THEN\r\t\t\tres := koala.QueryInterface(COM.ID(a), a);\r\t\t\tIF res >= 0 THEN\r\t\t\t\tres := a.Eat();\r\t\t\t\tStdLog.String(\"IAnimal.Eat called\")\r\t\t\tELSE StdLog.String(\"no IAnimal interface\")\r\t\t\tEND\r\t\tELSE StdLog.String(\"no object\")\r\t\tEND;\r\t\tStdLog.Ln\r\tEND AnimalEat;\r\r\tPROCEDURE "
                    attr: 0
