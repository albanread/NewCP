                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\r\tIMPORT COM, WinApi, WinOle;\r\t\r\t\r\tCONST\r\t\tKoalaId = \"{00021146-0000-0000-C000-000000000046}\";\r\t\t\r\t\r\tTYPE\r\t\tKoala = POINTER TO RECORD (COM.IUnknown) END;\r\t\tKoalaFactory = POINTER TO RECORD (WinOle.IClassFactory) END;\r\t\r\t\r\tVAR\r\t\tlocks: INTEGER;\r\t\tobjects: INTEGER;\r\t\t\r\t\t\r"
                    attr: 0
                  - text: "\t(* ---------- Koala ---------- *)\r\t\r\t(* use default QueryInterface implementation *)\r\t\r\t(* AddRef & Release implemented implicitly by the compiler *)\r\t\r\t"
                    attr: 1
                  - text: "PROCEDURE (this: Koala) RELEASE;\t"
                    attr: 0
                  - text: "(* called when last com reference is removed *)"
                    attr: 1
                  - text: "\r\tBEGIN\r\t\tDEC(objects)\r\tEND RELEASE;\r\t"
                    attr: 0
                  - text: "\r\t\r\t(* ---------- KoalaFactory ---------- *)\r"
                    attr: 1
                  - text: "\t\r"
                    attr: 0
                  - text: "\t(* use default QueryInterface implementation *)\r\t\r\t(* AddRef & Release implemented implicitly by the compiler *)\r\t\r"
                    attr: 1
                  - text: "\tPROCEDURE (this: KoalaFactory) CreateInstance (outer: COM.IUnknown; IN [iid] iid: COM.GUID;\r\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tOUT [new] int: COM.IUnknown): COM.RESULT;\r\t\tVAR res: COM.RESULT; new: Koala;\r\tBEGIN\r\t\tIF outer # NIL THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.CLASS_E_NOAGGREGATION END;\r\t\tNEW(new);\r\t\tIF new # NIL THEN\r\t\t\tres := new.QueryInterface(iid, int);\r\t\t\tIF res >= 0 THEN INC(objects) END;\r\t\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " res\r\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.E_OUTOFMEMORY\r\t\tEND\r\tEND CreateInstance;\r\t\r\tPROCEDURE (this: KoalaFactory) LockServer (lock: WinApi.BOOL): COM.RESULT;\r\tBEGIN\r\t\tIF lock # 0 THEN INC(locks) ELSE DEC(locks) END;\r\t\t"
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_OK\r\tEND LockServer;\r\t\r\r"
                    attr: 0
                  - text: "\t(* ---------- dll interface ---------- *)\r"
                    attr: 1
                  - text: "\t\r\tPROCEDURE"
                    attr: 0
                  - text: " DllGetClassObject"
                    attr: 3
                  - text: "* (IN clsid: COM.GUID;\r\t\t\t\t\t\t\t\t\t\t\t\tIN [iid] iid: COM.GUID; OUT [new] int: COM.IUnknown): COM.RESULT;\r\t\tVAR obj: KoalaFactory;\r\tBEGIN\r\t\tIF clsid = KoalaId THEN\r\t\t\tNEW(obj);\r\t\t\tIF obj # NIL THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " obj.QueryInterface(iid, int)\r\t\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.E_OUTOFMEMORY;\r\t\t\tEND\r\t\tELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.E_FAIL\r\t\tEND\r\tEND DllGetClassObject;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: DllCanUnloadNow
                    attr: 3
                  - text: "* (): COM.RESULT;\r\tBEGIN\r\t\tIF (objects = 0) & (locks = 0) THEN "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_OK ELSE "
                    attr: 0
                  - text: RETURN
                    attr: 3
                  - text: " WinApi.S_FALSE END\r\tEND DllCanUnloadNow;\r\t\r\rBEGIN\t\r\tlocks := 0; objects := 0\rEND ComKoalaDll.\r\r\r"
