\th := WinApi.GlobalAlloc(WinApi.GMEM_DDESHARE + WinApi.GMEM_MOVEABLE,\r\t\t\t\t\t\t\t\t\t\t\t\t\tSIZE(WinApi.METAFILEPICT));\r\t\t\t\tIF h # 0 THEN\r\t\t\t\t\tmp := "
