                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT COM, WinApi, WinOle, StdLog;\r\t\r\tCONST\r\t\tKoalaId = \"{00021146-0000-0000-C000-000000000046}\";\r\t\tnMax = 10;\r\t\t\r\tVAR\r\t\tfactory: WinOle.IClassFactory;\r\t\tkoala: ARRAY nMax OF COM.IUnknown;\r\t\tn: INTEGER;\r\t\t\r\tPROCEDURE "
                    attr: 0
                  - text: CreateClass
                    attr: 3
                  - text: "*;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tres := WinOle.CoGetClassObject(KoalaId, WinOle.CLSCTX_LOCAL_SERVER, 0, COM.ID(factory), factory);\r\t\tIF res = WinApi.S_OK THEN StdLog.String(\"Class creation succeeded\"); StdLog.Ln\r\t\tELSE StdLog.String(\"Class creation failed, error = \"); StdLog.Int(res); StdLog.Ln\r\t\tEND\r\tEND CreateClass;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: ReleaseClass
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\tfactory := NIL\r\tEND ReleaseClass;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: CreateInstance
                    attr: 3
                  - text: "*;\r\t\tVAR res: INTEGER;\r\tBEGIN\r\t\tIF factory # NIL THEN\r\t\t\tres := factory.CreateInstance(NIL, COM.ID(COM.IUnknown), koala[0]); n := 1;\r\t\t\tIF res = WinApi.S_OK THEN StdLog.String(\"Instance creation succeeded\"); StdLog.Ln\r\t\t\tELSE StdLog.String(\"Instance creation failed, error = \"); StdLog.Int(res); StdLog.Ln\r\t\t\tEND\r\t\tELSE StdLog.String(\"Creation failed, class not yet created.\"); StdLog.Ln\r\t\tEND\r\tEND CreateInstance;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: AddRef
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\tIF (n > 0) & (n < nMax) THEN koala[n] := koala[n-1]; INC(n) END\r\tEND AddRef;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Release
                    attr: 3
                  - text: "*;\r\tBEGIN\r\t\tIF n > 0 THEN DEC(n); koala[n] := NIL END\r\tEND Release;\r\t\rEND ComKoalaTst.\r\r"
