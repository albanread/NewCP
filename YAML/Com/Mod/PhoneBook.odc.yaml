                  - text: "\r**)\r"
                    attr: 1
                  - text: "\r\tIMPORT COM, WinApi, WinOle, ComTools;\r\t\r\tCONST\r\t\t"
                    attr: 0
                  - text: CLSID
                    attr: 3
                  - text: "* = \"{E67D346C-2A5B-11D0-ADBA-00C01500554E}\";\r\t\t"
                    attr: 0
                  - text: E_NotFound
                    attr: 3
                  - text: "* = 80004005H;\r\t\r\tTYPE\r\t\t"
                    attr: 0
                  - text: ILookup
                    attr: 3
                  - text: "* = POINTER TO ABSTRACT RECORD\r\t\t\t\t[\"{C4910D71-BA7D-11CD-94E8-08001701A8A3}\"] (COM.IUnknown) END;\r\r\t\tCLookup = POINTER TO RECORD (ILookup)\r\t\t\tphoneBook: Entry\r\t\tEND;\r\t\t\r\t\tLookupFactory = POINTER TO RECORD (WinOle.IClassFactory) END;\r\t\r\t\tEntry = POINTER TO RECORD\r\t\t\tnext: Entry;\r\t\t\tname, number: ARRAY 32 OF CHAR\r\t\tEND;\r\t\r\tVAR\r\t\tlocks: INTEGER;\r\t\ttoken: INTEGER;\r\t\tphoneBook: Entry;\r\t\r\t(* ---------- ILookup ---------- *)\r\r\tPROCEDURE (this: ILookup) "
                    attr: 0
                  - text: LookupByName
                    attr: 3
                  - text: "*(\r\t\tname: WinApi.PtrWSTR; OUT number: WinApi.PtrWSTR): COM.RESULT, NEW, ABSTRACT;\r\t\r\tPROCEDURE (this: ILookup) "
                    attr: 0
                  - text: LookupByNumber
                    attr: 3
                  - text: "*(\r\t\tnumber: WinApi.PtrWSTR; OUT name: WinApi.PtrWSTR): COM.RESULT, NEW, ABSTRACT;\r\r\t(* ---------- CLookup ---------- *)\r\t\r\tPROCEDURE (this: CLookup) LookupByName(name: WinApi.PtrWSTR;\r\t\t\tOUT number: WinApi.PtrWSTR): COM.RESULT;\r\t\tVAR e: Entry;\r\tBEGIN e := this.phoneBook;\r\t\tWHILE (e # NIL) & (e.name # name^) DO e := e.next END;\r\t\tIF e # NIL THEN number := ComTools.NewString(e.number); RETURN WinApi.S_OK\r\t\tELSE RETURN E_NotFound\r\t\tEND\r\tEND LookupByName;\r\t\r\tPROCEDURE (this: CLookup) LookupByNumber(number: WinApi.PtrWSTR;\r\t\t\t\tOUT name: WinApi.PtrWSTR): COM.RESULT;\r\t\tVAR e: Entry; \r\tBEGIN e := this.phoneBook;\r\t\tWHILE (e # NIL) & (e.number # number^) DO e := e.next END;\r\t\tIF e # NIL THEN name := ComTools.NewString(e.name); RETURN WinApi.S_OK\r\t\tELSE RETURN E_NotFound\r\t\tEND\r\tEND LookupByNumber;\r\t\r\t(* ---------- LookupFactory ---------- *)\r\t\r\tPROCEDURE (this: LookupFactory) CreateInstance (outer: COM.IUnknown;\r\t\t\t\tIN [iid] iid: COM.GUID; OUT [new] int: COM.IUnknown): COM.RESULT;\r\t\tVAR new: CLookup;\r\tBEGIN\r\t\tIF outer # NIL THEN RETURN WinApi.CLASS_E_NOAGGREGATION END;\r\t\tNEW(new);\r\t\tIF new # NIL THEN new.phoneBook := phoneBook;RETURN new.QueryInterface(iid, int)\r\t\tELSE RETURN WinApi.E_OUTOFMEMORY\r\t\tEND\r\tEND CreateInstance;\r\t\r\tPROCEDURE (this: LookupFactory) LockServer (lock: WinApi.BOOL): COM.RESULT;\r\tBEGIN\r\t\tIF lock # 0 THEN INC(locks) ELSE DEC(locks) END;\r\t\tRETURN WinApi.S_OK\r\tEND LockServer;\r\t\r\t(* ---------- registration ---------- *)\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Register
                    attr: 3
                  - text: "*;\r\t\tVAR res: COM.RESULT; factory: LookupFactory;\r\tBEGIN\r\t\tNEW(factory);\r\t\tres := WinOle.CoRegisterClassObject(CLSID, factory,\r\t\t\t\t\tWinOle.CLSCTX_LOCAL_SERVER, WinOle.REGCLS_MULTIPLEUSE, token)\r\tEND Register;\r\t\r\tPROCEDURE "
                    attr: 0
                  - text: Unregister
                    attr: 3
                  - text: "*;\r\t\tVAR res: COM.RESULT;\r\tBEGIN\r\t\tIF (locks = 0) & (token # 0) THEN res := WinOle.CoRevokeClassObject(token); token := 0 END\r\tEND Unregister;\r\t\r\tPROCEDURE NewEntry(name, number: ARRAY 32 OF CHAR);\r\t\tVAR e: Entry;\r\tBEGIN\r\t\tNEW(e); e.next  := phoneBook; phoneBook := e; e.name := name$; e.number := number$\r\tEND NewEntry;\r\t\rBEGIN\r\tlocks := 0; \r\tNewEntry(\"Daffy Duck\", \"310-555-1212\");\r\tNewEntry(\"Wile E. Coyote\", \"408-555-1212\");\r\tNewEntry(\"Scrogge McDuck\", \"206-555-1212\");\r\tNewEntry(\"Huey Lewis\", \"415-555-1212\");\r\tNewEntry(\"Thomas Dewey\", \"617-555-1212\")\rEND ComPhoneBook.\r\r"
                    attr: 0
                  - text: "\r"
                    attr: 3
